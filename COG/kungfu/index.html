 enjoy the process of playing more than the actual competitive aspects. This surprises you somewhat, since as sparring partners, Lu Jin was always aggressive, and gave no quarter when ${rivalhe} spotted a weakness.\n  *choice\n    #I am happy to focus more on the conversation and less on the game, to match Lu Jin's tone.\n      *set lujin %+10\n      You relax, placing your pieces on the board without worrying too much about what they will surround. Soon, you discover that Lu Jin has changed strategy, and your pieces are in jeopardy!\n\t\t\n      \"I thought you were good at this game,\" Lu Jin teases.\n\t\t\n      \"I was distracted by the excellent company,\" you say pointedly, and Lu Jin looks away in an embarrassment that you think is tinged with pleasure.\n      *if lujin > 70\n        *goto lujinwin\n      *else \n        *goto lujinwarm\n    #Perhaps the cavalier attitude is a ploy on Lu Jin's part to lure me into complacency. I watch for a role reversal while enjoying the game.\n      *set lujin %+15\n      *if cleverness > 70\n        Though you allow yourself to be partially absorbed in the conversation, you spot the moment when Lu Jin's strategy changes. Without tipping your hand, you keep ${rivalhim} from taking control of the board. After a few more plays, Lu Jin laughs out loud.\n\t\t  \n        \"I thought for sure I had you!\" ${rivalhe} says cheerfully. \"You didn't fall for my feint at all.\"\n\t\t  \n        You smile, remembering old sparring matches. \"I've fallen for far too many of your feints in the past,\" you remind ${rivalhim}.\n\t\t  \n        \"Sometimes literally,\" ${rivalhe} says with a grin. \"But I refuse to concede that you are the better player. Rematch?\"\n\t\t  \n        You switch the color of stones and begin a fresh game.\n        *if lujin > 70\n          *goto lujinwin\n        *else\n          *goto lujinwarm\n      *else\n        Even though you are looking for Lu Jin to change strategy, your pieces are in jeopardy several moves before you realize it. By then, it is too late to rally—Lu Jin has won the board.\n\t\t  \n        \"I was even watching for your feint!\" you admit. \"Well played.\"\n\t\t  \n        \"Didn't you say you were good at this game?\" Lu Jin teases.\n\t\t  \n        \"Maybe I was distracted by the excellent company,\" you say pointedly, and Lu Jin looks away in an embarrassment that you think is tinged with pleasure.\n        *if lujin > 70\n          *goto lujinwin\n        *else \n          *goto lujinwarm\n    #I press my advantage. I intend to win.\n      You never let up on the attack, preventing Lu Jin from making a rallying attempt later in the game. Though your conversation remains active, Lu Jin seems put off by your cutthroat attitude.\n      *set failure +1\n      *goto lujinfail\n*if suit = \"Feng\"\n  The game starts slowly with Feng deliberating over every move. You are surprised—you expected her to be a better go player.\n  *choice\n    #I play aggressively regardless. She will be impressed by my clear skill.\n      The game is over very quickly, as Feng clearly did not manage a strategy. She looks bored, however, and unimpressed with your win.\n      *set failure +1\n      *goto fengfail\n    #I coddle her, acting as though I am playing with intent when I have every intention of letting her win.\n      The game takes a very long time, and by the end, it is clear that both of you have gotten completely bored. What's more, Feng looks disappointed that she won.\n      *set failure +1\n      *goto fengfail\n    #She is a fox spirit. I play carefully, trying to puzzle out what she is planning.\n        You play cautiously, waiting for Feng to make her move.\n\t\t  \n        And then she makes it—not on the board, but beneath it. Her toes begin to tickle up and down your leg. Above the table, her eyes lock on you, waiting to gauge your reaction.\n        *choice\n          #I continue to play, though I revel in her bold distraction.\n            *if cleverness > 60\n              *set feng %+15\n              Feng's attempts to keep your mind from the game work—but only in part. She was so badly placed at the beginning that it takes only about half a brain to continue to win, despite her below-the-table efforts.\n\t\t\t\t\n              When you win a short time later, Feng is delighted. \"Good work, monk,\" she says playfully. \"Apparently I need to work harder on being tempting.\"\n\t\t\t\t\n              \"I think you've done it exactly right,\" you say, and her playful expression drops into something more serious, if just for an instant.\n              *if feng > 70\n                *goto fengwin\n              *else\n                *goto fengwarm\n            *else\n              *set feng %+10\n              Despite your efforts to pay attention to the game, you find yourself continually distracted by Feng's efforts, and soon she rallies, winning the game entirely.\n              *label gamelose\n\t\t\t\t\n              \"I suppose I should be disappointed,\" you say. \"But really, how could I stand up to the talents of a huli jing?\"\n\t\t\t\t\n              She shrugs with a smile. \"Tempting monks is what I do,\" she returns.\n\t\t\t\t\n              \"Indeed it is,\" you agree, and her face flushes prettily.\n              *if feng > 70\n                *goto fengwin\n              *else\n                *goto fengwarm\n          #I scold her for her attempts to cheat.\n            Feng pouts prettily, and though she rallies, it is clear that she lost interest in the game on the table as soon as you stopped the one below it.\n            *set failure +1\n            *goto fengfail\n          #I allow myself to give into the distraction completely, not bothering to try to win.\n            *set feng %+5\n            With you so thoroughly distracted, it takes Feng little effort to rally and win the game entirely.\n            *goto gamelose\n\n*label students\n*page_break\nA week goes by before you begin to receive visitors. One bright morning, a young man arrives at your door. When you meet him at the gate, he bows.\n\n\"Honored Master ${surname}, I seek to become your student.\"\n\nYou have already given some thought about how you will greet prospective students. At the Order of the Peach Tree, student spend years doing menial labor before they are granted permission to learn forms and techniques. In other places, students are left to wait outside without food or drink, and only those who survive several days without giving up—or fainting—are allowed to be taught.\n\nHow do you greet your first prospective student?\n*choice\n  #I make him wait—but only a few hours. Then I set him to work doing chores.\n    *if honor > 60\n      Clearly you have a reputation for being a teacher of honor; the prospective student trusts that you will return for him and patiently waits through the lunch hour without abandoning his post. Once you let him in, you set him to work prying up some of the bad flooring from the servants' building. He leaves for the evening, but returns the next day.\n\t  \n      With a friend.\n\t  \n      Before long, you have attracted enough students that you are running out of chores. You take your first student aside and teach a simple technique, then send him back to work.\n\t  \n      The next day, you teach two of them.\n      *set disciples +20\n      *goto teach\n    *else\n      Looking disappointed, the prospective student turns around and leaves, making you wonder if you have gained a reputation for trickery somewhere along the line.\n\t  \n      Despite the disappearance of your prospective student, the next day, a new student arrives, and you try again. This time, the student is determined. He waits through lunch time and does not complain when you set him to work prying up some of the bad flooring from the servants' building. In a few weeks' time, you have gained a handful of students, all of them willing to put in hard work to earn the right to learn.\n      *set disciples +10\n      *goto teach\n  #I welcome him immediately, ushering him inside and discussing what he hopes to learn.\n    *if enlightened > 60\n      You have a gift for making people feel welcome and giving them a sense of importance. The young man eagerly tells you that he hopes to train to become a great martial artist, and one day would like to enter the Order of the Peach Tree, which is why he has sought you out. Soon, the two of you are beginning work on simple footwork and basic strikes.\n      *set disciples +20\n      *goto teach\n    *else\n      What you mean to be welcoming, your prospective student views as desperation to have someone to teach. He soon excuses himself and you do not see him again.\n\t  \n      Another prospective student shows up in a few days, however, and is glad to be welcomed. $!{rivalhe} is eager to learn, and though you think that ${rivalhe} may be taking advantage of your kindness, you are grateful to have your first student. Soon, others arrive as well, and you work out a way to maintain balance among them.\n      *set disciples +10\n      *goto teach\n  #Although it could mean fewer students, I want only the most tenacious. I tell him to come back tomorrow and get to work repairing the servants' building.\n    *if tenacity > 60\n      The prospective student looks initially disappointed, and watches curiously as you climb up onto the roof of the servants' building to begin making repairs to the roof. The next day he returns, with a friend, and they are both confused when you send them home again, continuing your work.\n\t  \n      It is almost a week of this pattern—with another handful of prospective students—before one of them offers to help with the repairs. You smile, refuse, and send them home. The next day, they return with tools to help on the repairs, and you usher them inside, letting them work next to you while you gauge their abilities.\n\t  \n      Though you realize that you are recruiting fewer students than you might be with a different technique, you stick to your decision, determined to pursue your course of action and lead your students to be their best.\n      *set tenacity %+15\n      *set disciples +15\n      *goto teach\n    *else\n      You want only the most determined students, but it is hard to be determined to wait yourself. The first student never returns, and others are slow in coming. You finally loosen your own standards in order to have someone to teach. In a few weeks' time, you have gained a handful of students, all of them willing to put in hard work to earn the right to learn.\n      *set disciples +8\n      *goto teach\n  #I only want the brightest students. I ask them an impossible riddle.\n    *if cleverness > 60\n      You pose a difficult riddle, one that will reveal not only critical thinking skills but a familiarity with literature and philosophy. The prospective student sits to consider it, then leaves.\n\t  \n      But he returns the next day, with a friend.\n\t  \n      A week and a handful of additional minds later, the first student approaches you with an answer, without sharing it with his peers. It is correct, and you let him inside the gate.\n\t  \n      \"Why didn't you share the answer?\" you ask.\n\t  \n      \"How will they learn if they don't figure it out on their own?\" he asks in return.\n\t  \n      It takes time for others to solve the riddle, and many give up. But soon you have a group of very clever students who are eager to learn.\n\n      Having the cleverest students also serves to keep you on your toes, and you have to work to stay one step ahead of them. They drive you to be your best in order to teach them to be theirs.\n      *set cleverness %+20\n      *set disciples +10\n      *goto teach\n    *else\n      The riddle you pose is not quite impressive enough to scare away your prospective student, and soon, he solves it, but is unimpressed with the answer. He stays on, dubiously, to begin to learn from you.\n\t  \n      It takes time, but soon, a very small group of students who are eager to learn find their way to you. One of them suggests that the riddle should be a little more complex, but the others shush him. You suspect that the students think they are cleverer than you are.\n      *set disciples +5\n      *goto teach\n\t  \n*label teach\n*achieve schooled\n\n\nWhat do you teach at your school?\n*choice\n  #Physical combat.\n    *if fighting > 70\n      Your students quickly realize that your prowess with weapons and unarmed combat is beyond their expectations. Soon, you have additional new recruits showing up to study with you.\n      *set disciples +5\n      *goto end\n    *else\n      You have much to teach your students, but some of them appear disappointed that your skills do not live up to their legendary expectations. Still, they work hard and are glad to learn what they can.\n      *goto end\n  #Magic.\n    *if magic > 70\n      Though manipulating chi and the energy of the universe tends to have a bad reputation among those who do not understand it, your students are clearly impressed by your mastery of these mysteries. They drink in every technique you show them and are eager to try on their own. Word spreads, and soon, you have additional new recruits showing up to study with you.\n      *set disciples +5\n      *goto end\n    *else\n      Manipulating chi and the energy of the universe has a bad reputation among those who do not understand it. Though you can perform supernatural feats, you discover as you begin to teach that you are not very good at explaining the concepts. Your students stick it out, but at first, they are more mystified than enthusiastic.\n      *goto end\n  #Both physical combat and magic.\n    *if fighting > 60\n      *if magic > 60\n        You have always worked on balancing the arts, and you feel it is important to develop the body and mind alongside the spirit. The training is strenuous, requiring early morning physical work with afternoon study, but your students are fascinated by the material, and each morning, they are eager for more.\n\t\t\n        Word spreads about your skill—and their excitement—and soon you find you have a new group of students waiting at your door.\n        *set disciples +10\n        *goto end\n      *else\n        *label bothlose\n        Though you believe in balancing body, mind, and spirit, your own skills are not as balanced as you would like. The students recognize your weaknesses, and though they do not say anything, it is clear that they doubt your teaching style.\n\t\t\n        They do begin to learn, however, and you feel that you have a good group of students, with several years of training to look forward to.\n        *goto end\n    *else\n      *goto bothlose\n\t  \n*label end\n*if imperial\n  Governor Rong lives up to his promise to send students your way, as well, and you soon add a small group of children loyal to the Emperor to your classes.\n  *set disciples +10\n  *goto end2\n*if rebel\n  A number of older students begin to arrive, as well, and though they do not say it openly—nor wear their blue scarves—you know that these are the people from the Blue Scarves Rebellion that you have agreed to train. Despite their age difference, you work them into your classes, determined to teach them as much as they can learn.\n  *set disciples +20\n  *goto end2\n  \n*label end2\n*if disciples >= 40\n  *set status %+20\n  *goto end3\n*else\n  *set status %+10\n  *goto end3\n\n*label end3\n\n\nAfter your first year in Kuei Xian, your school has recruited ${disciples} students. Though you know you are waiting to be recalled to the Order of the Peach Tree, you feel you have made a good start settling into your wandering years, and that you are doing your teachers proud.\n\n*finish Chapter Five: The Challenger", "screenshots": "screenshots\n*script window.animateEnabled = false;\n\n*page_break\n*script changeBackgroundColor(\"sepia\")\n\n\"Look out!\"\n\nThe noise of battle is distracting, and it takes you almost too long to realize that the warning was shouted to you. An outlaw wearing a blue turban is charging toward you, his longspear leveled at your heart. What will you do?\n\n*fake_choice\n  #Pounce toward him at the last moment, springing like a tiger, and bring an elbow down on his head.\n  #Dart off to the side, balancing on one leg like a crane before delivering a swift kick to his knee.\n  #Weave hypnotically in my stance, and when he strikes, I am no longer there; I launch a series of quick, snakelike strikes to the pressure points in his exposed rib cage.\n  #Make a series of flashy moves that draw his target toward my right side, then move to the left, delivering a reiken strike to the right side of his head as he passes by.\n  #Remain still, my hands low at the chi center of my body, and at the moment he would hit me, circle his spear away and shift myself away from the strike.\n*script changeBackgroundColor(\"black\")\n*set status 35\n*set fighting 93\n*set magic 70\n*set tenacity 50\n*set cleverness 32\n*set enlightened 50\n*set honor 50\n*set tianxia 50\n*set name \"Liu Hai\"\n*set style \"Wuxia\"\n*set question \"None\"\n*set lujin 52\n\n\nLu Jin's openness is surprising, but what he says amounts to treason. Questioning the Emperor's will so openly will certainly lead him to trouble.\n\t\nDoes that trouble start with you?\n*fake_choice\n  #How dare he question the Emperor! I challenge him immediately.\n  #I agree with Lu Jin, but I respond noncomittally. Just because he is asking for trouble by speaking his mind does not mean I will risk my neck.\n  #I agree with Lu Jin and am glad to find someone to discuss the Empire's problems with.\n  #I do nothing. I am not interested in politics.\n  \n\n*script changeBackgroundColor(\"sepia\")\n*set status 62\n*set fighting 74\n*set magic 74\n*set tenacity 76\n*set cleverness 64\n*set enlightened 52\n*set honor 56\n*set tianxia 58\n*set name \"Cao Yan\"\n*set style \"Wushu\"\n*set question \"How can the Empire return to Heaven's Favor?\"\n*set lujin 68\n\n\nShe looks up when she sees you approach, and, were it not for the tears, she could be a model for a painting: her narrow face and close-set eyes, her thin eyebrows and high cheekbones are the ideal of courtly beauty. But there are tears, and her lovely face is contorted in pain.\n\n*fake_choice\n  #I go to help her at once!\n  #This seems highly suspicious to me. I approach, but carefully.\n  #It is helpless women like her that make it so difficult for women like me to get respect. Let her figure it out herself.\n\n*script changeBackgroundColor(\"black\")\n\n*set status 78\n*set fighting 74\n*set magic 30\n*set tenacity 52\n*set cleverness 70\n*set enlightened 64\n*set honor 62\n*set tianxia 42\n*set name \"Wong Tao\"\n*set style \"Red Hare\"\n*set question \"How can I become the greatest warrior in the world?\"\n*set lujin 32\n*set feng 58\n\nFinally, Master Shen turns you around. \"Remember your training,\" he says, before he, too disappears in the darkness.\n\nYou wait, your stance relaxed as you have been taught, until you are told to begin -- or until the first attack comes.\n\nHow will you face this challenge?\n*fake_choice\n  #I have faith in my fighting skills. I face my opponents with confidence -- they are as blind as I am.\n  #The challenge is to get from one side of the room to the other, but the path was never specified. I weave through the room, confusing my opponents.\n\n*script changeBackgroundColor(\"sepia\")\n*set status 96\n*set fighting 88\n*set magic 25\n*set tenacity 44\n*set cleverness 56\n*set enlightened 68\n*set honor 56\n*set tianxia 54\n*set name \"Wong Meili\"\n*set style \"Celestial Sword\"\n*set question \"Why do kites fly?\"\n*set lujin 52\n*set feng 56\n\n\"Why did you wish to speak with me, Master?\" you ask.\n\n\"Maybe I enjoy the company of my young students in my old age,\" Master Shen says gruffly. He taps your foot with the end of his staff. \"You may be a monk now, but I still concern myself with your education.\"\n\nHow do you respond to this?\n*fake_choice\n  #I am learning much from teaching the students and continuing to spar with the monks.\n  #I admit that I fear my own art is stagnating.\n  #I tell him that I miss the challenge of real combat.\n\n*script changeBackgroundColor(\"black\")\n*set status 96\n*set fighting 88\n*set magic 25\n*set tenacity 64\n*set cleverness 78\n*set enlightened 68\n*set honor 56\n*set tianxia 54\n*set name \"Wong Meili\"\n*set style \"Celestial Sword\"\n*set question \"Why do kites fly?\"\n*set lujin 52\n*set feng 56\n*set zhuge 86\n*set sunan 57\n\nSun An charges at you and runs straight into your arm, outstretched in an iron pipe. As he falls backward, you follow him with an axe kick. He rolls out of the way, but your kick shatters the edge of the platform and sends tremors into the scaffolding below. The platform tilts precariously as one stabilizing corner collapses.\n*fake_choice\n  #I keep my ground. A little tilt of the platform won't dissuade me.\n  #I take the fight to the air, using the platform only for brief moments to touch down.\n  #I jump over the edge of the platform to take the fight to the scaffolding below.\n", "startup": "*title Choice of Kung Fu\n*author Alana Joli Abbott\n\n*scene_list\n  startup\n  bandits\n  test\n  master\n  romance\n  challenger\n  return\n  challenge\n  question\n  ending\n  death\n\n*create status 50\n*create honor 50\n*create fighting 50\n*create magic 50\n*create tenacity 50\n*create cleverness 50\n*create enlightened 50\n*create tianxia 50\n*create name \"Unnamed\"\n*create firstname \"Unnamed\"\n*create surname \"Unnamed\"\n*create male true\n*create pronounhe \"he\"\n*create pronounhis \"his\"\n*create pronounhim \"him\"\n*create romance \"None\"\n*create disciples 0\n*create mixedsexmonks false\n*create rivalsex \"male\"\n*create rivalhe \"he\"\n*create rivalhis \"his\"\n*create rivalhim \"him\"\n*create style \"shorinji\"\n*create question \"unknown\"\n*create lujin 50\n*create feng 50\n*create sunan 50\n*create zhuge 50\n*create insiderinfo false\n*create stars false\n*create met_feng false\n*create met_sunan false\n*create met_zhuge false\n*create rlshp_one \"?\"\n*create rlshp_two \"?\"\n*create rlshp_three \"?\"\n*create scars \"none\"\n*create foxhole false\n*create rebel false\n*create imperial false\n*create dead false\n*create chosen false\n*create sunanstay false\n*create champion false\n*create scenefox 0\n\n*achievement dashanmen visible 25 Dashanmen\n  Will you survive the dashanmen?\n  Fight your way through the dashanmen.\n*achievement test visible 100 Test Mastery\n  How will you prove your worth?\n  Triumph over all three tests with style.\n*achievement urn visible 25 Urn of Coals\n  How far can you carry the urn of coals?\n  Earn scars to reveal your inner strength.\n*achievement scroll visible 25 Scroll of Destiny\n  What lies inside the scroll of destiny?\n  Unravel the scroll's secrets.\n*achievement foxed visible 10 Foxed\n  What manner of creature is this?\n  Avoid being outsmarted by a fox spirit.\n*achievement foxed2 hidden 10 Double Foxed\n  hidden\n  Twice avoid being outsmarted by a fox spirit.\n*achievement foxed3 hidden 10 Thrice Foxed\n  hidden\n  Third time's a charm.\n*achievement foxed4 hidden 10 Foxy Lover\n  hidden\n  Become a fox spirit's lover.\n*achievement frenemy1 visible 10 Friends or Enemies\n  What will your rival become?\n  Become friends with your rival.\n*achievement frenemy2 hidden 10 Enemies or Friends\n  hidden\n  Become enemies with your rival.\n*achievement frenemy3 hidden 10 Rivals in Love\n  hidden\n  Win the love of your former rival.\n*achievement champion visible 100 Imperial Champion\n  Become the Imperial Champion.\n*achievement schooled visible 10 School Master\n  Start a kung fu school.\n*achievement defender visible 100 Style Defender\n  Successfully defend your school's honor.\n*achievement heir visible 50 Zhuge Heir\n  Become heir to the Zhuge style.\n*achievement demonslayer visible 40 Demon Slayer\n  Kill a demon.\n*achievement mindmaster visible 40 Mind Master\n  Win a mental martial combat.\n*achievement mountainclimber visible 40 Mountain Climber\n  Reach the mountain peak.\n*achievement gomaster visible 40 Go Master\n  Admirably play a game of Go.\n*achievement poet visible 40 Poet\n  Learn poetry under the master.\n*achievement ghost hidden 10 Ghost\n  hidden\n  Dead before your time.\n*achievement peachsave hidden 100 Peach Tree\n  hidden\n  Save the monastery from foreign invaders.\n*achievement chosen visible 100 Chosen\n  Chosen to consult Dragon Sage.\n*achievement wellrested hidden 10 Well Rested\n  hidden\n  Get a good night's sleep.\n*achievement dishonored hidden 25 Dishonored\n  hidden\n  Your style ends with you.\n\n*comment OLD IAP CODE\n*comment *check_purchase adfree\n*comment *if choice_purchase_supported and not(choice_purchased_adfree)\n*comment   Become the greatest fighter the world has ever known, harnessing the power of chi to manipulate the energies of the universe. Defeat rivals, find romance, and rise to become the Imperial Champion. Win the right to question the immortal Dragon Sage, who speaks just once every hundred years!\n*comment \n*comment   [i]Choice of Kung Fu[/i] is a fast-paced interactive fantasy novel where your choices determine how the story proceeds. The game is entirely text-based--without graphics or sound effects--but powered by the vast, unstoppable power of your imagination.\n*comment \n*comment   The fate of the Middle Kingdom depends on you! Will you play as male or female? Gay or straight? Will you battle against foreign invaders, or will you rise up against the Emperor? What question will you ask the Dragon Sage, the wisest of all creatures?\n*comment \n*comment   [i]You can play the first two chapters of the game for free. Purchase the rest of the game below.[/i]\n*comment   *if choice_is_advertising_supported\n*comment     [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n*comment \n*comment   *purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n*comment   *page_break Play Now for Free\n*comment   *advertisement\n*comment *label purchased\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Become the greatest fighter the world has ever known, harnessing the power of chi to manipulate the energies of the universe. Defeat rivals, find romance, and rise to become the Imperial Champion. Win the right to question the immortal Dragon Sage, who speaks just once every hundred years!\n \n  [i]Choice of Kung Fu[/i] is a fast-paced interactive fantasy novel where your choices determine how the story proceeds. The game is entirely text-based--without graphics or sound effects--but powered by the vast, unstoppable power of your imagination.\n \n  The fate of the Middle Kingdom depends on you! Will you play as male or female? Gay or straight? Will you battle against foreign invaders, or will you rise up against the Emperor? What question will you ask the Dragon Sage, the wisest of all creatures?\n\n  *if choice_is_steam\n    [i]You can play the first two chapters of the game for free. Purchase the rest of the game below.[/i]\n    *if choice_is_advertising_supported\n      [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n    *purchase_discount adfree 2019-01-01 $4.99 $2.99 purchased\n    *page_break Play Now for Free\n    *goto purchased\n  *else\n    *if choice_is_advertising_supported\n      [i]Choice of Kung Fu[/i] is supported by advertisements, but you can buy the unlimited version\n      to turn off ads forever.\n      \n      *purchase_discount adfree 2019-01-01 $4.99 $2.99 purchased\n      *page_break_advertisement\n      *goto purchased\n    *else\n      [i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n      *purchase_discount adfree 2019-01-01 $4.99 $2.99 purchased\n      *page_break Play Now for Free\n      *goto purchased\n\n*label purchased\n\n\"Look out!\"\n\nThe noise of battle is distracting, and it takes you almost too long to realize that the warning was shouted to you. An outlaw wearing a blue turban is charging toward you, his longspear leveled at your heart. What will you do?\n\n*choice\n  #Stand firm, blocking the spear away at the last moment and slashing twin tiger claws across his face.\n    His spear grazed your robe, but his momentum sent his head plowing right into your claws, and you have raked his face savagely. A classic move in the Tiger style, which shows your aggression and reliance on physical strength.\n    *set fighting %+60\n    *set cleverness %-20\n    *goto animal2\n  #Pounce toward him at the last moment, springing like a leopard, and bring an elbow down on his head.\n    His spear grazed your leg, but your elbow landed a ringing blow, disorienting him. Your unwillingness to be moved shows the tenacity of the Leopard style.\n    *set tenacity %+40\n    *goto animal2\n  #Dart off to the side, balancing on one leg like a crane before delivering a swift kick to his knee.\n    Your evasion, a hallmark of the Crane style, gets you out of the way of his spear, but he is tenacious and grits his teeth against the pain in his knee without falling.\n    *set fighting %+60\n    *set tenacity %-20\n    *goto animal2\n  #Weave hypnotically in my stance, and when he strikes, I am no longer there; I launch a series of quick, snakelike strikes to the pressure points in his exposed rib cage.\n    He stumbles when his attack falters, and he clutches one arm to his injured side. He looks suddently exhausted, courtesy of the disruption in his chi that your knowledge of the mystical Snake technique allowed.\n    *set magic %+60\n    *set enlightened %-20\n    *goto animal2\n  #Make a series of flashy moves that draw his target toward my right side, then move to the left, delivering a reiken strike to the right side of his head as he passes by.\n    His charge sends him wildly to your right, the perfect distance for your disorienting blow to land. His confusion shows that he has clearly never fought a student of the deceptive Dragon style before.\n    *set cleverness %+40\n    *goto animal2\n  #Remain still, my hands low at the chi center of my body, and at the moment he would hit me, circle his spear away and shift myself away from the strike.\n    His momentum sends him stumbling forward, frustrated but unhurt. He spins around to face off against you, but your insight shows you a moment of doubt: you didn't actually hurt him, after all. But though you feel enlightened, as your use of the Buddha-nature technique emphasizes, you see his perspective categorize you as an enemy once again.\n    *set enlightened %+40\n    *goto animal2\n\n*label animal2\n\nWith your opponent deterred, but not out of the fight, how do you follow up your attack?\n\n*choice\n  #Use a palm heel strike under the chin to drive his head backwards, tearing down with a tiger claw on his face as he falls.\n    A classic Tiger move, emphasizing strength and aggression. He falls backward and has the wisdom not to get up.\n    *set fighting %+20\n    *set cleverness %-20\n    *goto style\n  #Drive into him with a series of fast leopard punches down the center of his body until he falls to the ground.\n    A classic use of the quickness of the Leopard style—delivering strike after strike with intense resolve. Once you have stopped, he curls around his center, moaning, and clearly unable to get up any time soon.\n    *set tenacity %+20\n    *goto style\n  #Take his leg out from under him with a sweeping straight kick, delivering a wing strike to his neck at the same moment, graceful as a crane.\n    With the pride and agility of the Crane style, you put him flat on his back, out of wind and unlikely to recover soon.\n    *set fighting %+20\n    *set tenacity %-20\n    *goto style\n  #With my fingers tight like a snake's head, strike out at his face and neck in a complex pattern of several hits that impact on nerve points, disabling him.\n    The quick strikes of the Snake style, combined with the knowledge of chi, drop him to the ground, unconscious. He'll be feeling that when he wakes up.\n    *set magic %+20\n    *set enlightened %-20\n    *goto style\n  #Feign a low kick to the knee, and when he moves the spear shaft down to block, shoot a dragon tooth strike—my fingers separated in a V—into his eyes before sweeping him from behind.\n    Momentarily blinded, the outlaw never sees your sweep coming and falls hard to the ground, breathless and, at least for the moment, out of the fight. Your clever use of the Dragon style has kept him off balance, literally.\n    *set cleverness %+20\n    *goto style\n  #His death would be senseless and against the Buddha nature; pivot around behind him and lock him in a sleeper hold.\n    He falls limp in your arms, and you set him gently on the ground before rising to see your other foes.\n    *set enlightened %+20\n    *goto style\n\n*label Style\n\nThe outlaws continue toward you and your fellow students, flashes of blue catching your eye against the greens and browns of the marsh surrounding your path. It is hard to imagine that only moments ago, the nine of you were making your way back to the monastery of the Order of the Peach Tree, students on the simple assignment of escorting a wagonload of supplies home.\n\nThe students have mostly remained on the path, where their footing is more certain, but the outlaws appear to have little trouble navigating the wetlands. While they fight like untrained peasants, numbers are definitely on their side.\n\nIt's time to get serious. Drawing on the training you received before entering the Order of the Peach Tree, you prepare your next attack. How will you fight?\n\n*choice\n  #Draw my sword. This blade was forged by the most expert smiths in the Middle Kingdom, designed specifically to be used with the Celestial Sword style, taught only to the Imperial Family.\n    Your blade catches the light, and your fellow students look encouraged—even inspired! To fight alongside one of the Imperial Family is to fight on the side of the heavens. Only Lu Jin, your primary rival for the place of senior student, appears unimpressed.\n    *set style \"Celestial Sword\"\n    *set fighting %+30\n    *set magic %-50\n    *set status %+90\n    *goto battle\n  #Unhitch the horse from the cart of supplies. He is a mean beast—not the fine mare I trained on at my father's estate—but few monks could master a horse from as honorable a family as mine. I draw my blade and prepare to charge.\n    Seeing you atop the horse, your fellow students grit their teeth and show their resolve. They respect your lineage and know that any master of the Red Hare—your family's style—is an ally worth having. You are known for your honor and your devotion to your companions.\n\t\n    Only Lu Jin, your primary rival for the place of senior student, appears unimpressed.\n    *set style \"Red Hare\"\n    *set fighting %+40\n    *set magic %-40\n    *set status %+50\n    *set honor %+20\n    *goto battle\n  #Draw on my chi, as well the energy in the world around me. I can sense the life energies of my fellow students and the approaching outlaws.\n    Even your fellow students are wary of the Xian style, which utilizes what the uninformed consider \"magic.\" But you know to be your power to be from the energies of the universe, which are at your beck and call. You also know that the perception of your abilities can be used against your enemies—and one day, you hope it will inspire your allies. For now, the other students shy away from you, except for Lu Jin, your primary rival for the place of senior student, who watches you with a wary eye.\n    *set style \"Xian\"\n    *set magic %+90\n    *set status %-50\n    *set cleverness %+30\n    *goto battle\n  #Release the bindings that secure my longspear to my back. It is only one of the many weapons I have mastered in my wanderings, and it is a good choice to keep the outlaws at bay.\n    Your fellow students must have heard rumors that before you came to the Order, you were a youxia—a wandering hero—and their grins show that they had not given credence to this rumor. Now, they look eager to fight alongside someone who has trained with legendary heroes. Even Lu Jin, your primary rival for the place of senior student, acknowledges you with a smile.\n    *set style \"Wuxia\"\n    *set fighting %+60\n    *set magic %+40\n    *set status %-30\n    *set lujin %+5\n    *goto battle\n  #Why change? The style my masters at the Order of the Peach Tree are teaching me is a superior one, and I am eager to prove the worth of my unarmed style in battle.\n    By settling yourself into one of the stances Master Shen Lao, the oldest teacher in the Order, prefers, you remind the others of their training in the art of wushu. Soon, all have settled into similar stances, and Lu Jin, your rival for the position of senior student at the Order, gives you a nod of approval.\n    *set style \"Wushu\"\n    *set fighting %+35\n    *set magic %+35\n    *set lujin %+10\n    *goto battle\n\n*label Battle\n\nThe battle that follows is hectic; the outlaws have little in the way of skill, but they make up for it in passion. They are determined to have your supplies, despite the clear skill shown by you and your fellow students. Though you are focused on keeping them from trying to kill you, you notice as you disable your opponents that they are skinny, likely the result of being poorly fed. You also note that a number of the outlaws are women.\n\nDoes that surprise you?\n\n*choice\n\n  #Yes. Fighting is the realm of warriors, and the role of the warrior falls to the men.\n    *set MixedSexMonks false\n    Of course. Just to be absolutely clear, are you a man?\n    *choice\n      #Of course! How dare you impugn my honor by suggesting otherwise!\n        *set Male true\n        *goto boyname\n      #Actually, I am a woman. I only have old fashioned views when it comes to other people.\n        *set Male false\n        *goto girlname\n  #No. Outlaws have always bucked convention; why bother following social rules?\n    *set MixedSexMonks true\n    Of course. Outlaws typically have no concern for their honor, and thus get away with setting their own code. Of course, when an order of monks challenges convention, it is an honorable decision.\n\t\n    Just to be absolutely clear, are you a man?\n    *choice\n      #Of course! How dare you impugn my honor by suggesting otherwise!\n        *set Male true\n        *goto boyname\n      #Actually, I am a woman. I only have old fashioned views when it comes to other people.\n        *set Male false\n        *goto girlname\n  #Yes, but it is nice to know that I am not alone in questioning traditional roles.\n    *set MixedSexMonks false\n    It is good that you can appreciate something about your enemies in combat. To be absolutely clear, are you a woman?\n    *choice\n      #Certainly. It has been a challenge to prove myself despite my gender, but I have done it admirably.\n        *set Male false\n        *goto girlname\n      #No, I only meant that I am a forward thinking man who feels women should have the same opportunities as men to kill their enemies.\n        *set Male true\n        *goto boyname\n  #No. I am used to fighting side by side among men and women accomplished in the way of battle.\n    *set MixedSexMonks true\n    You have had a wonderfully open-minded experience in your training. Luckily for you, the Order of the Peach Tree feels similarly. Are you a man or a woman?\n    *choice\n      #I am a man.\n        *set Male true\n        *goto boyname\n      #I am a woman.\n        *set Male false\n        *goto girlname\n\n*label Boyname\n*set pronounhe \"he\"\n*set pronounhis \"his\"\n*set pronounhim \"him\"\nWhat is your given name?\n\n*choice\n  #Hai.\n    Ah, named after the sea. Perhaps you have much hidden below your surface.\n    *set firstname \"Hai\"\n    *goto rival\n  #Zihao.\n    Your name means heroic son. Clearly your parents felt you were destined for greatness.\n    *set firstname \"Zihao\"\n    *goto rival\n  #Tao.\n    A devoted name, given to you to bless you with the hope of a long life.\n    *set firstname \"Tao\"\n    *goto rival\n  #None of these is my name.\n    *label InputName\n    What is your given name?\n    *input_text firstname\n    Your given name is $!{firstname}. Is that correct?\n    *choice\n      #Yes.\n        *set firstname \"$!{firstname}\"\n        *goto rival\n      *if (firstname != \"$!{firstname}\") #No, my name is \"${firstname},\" just as I wrote it.\n        *goto rival\n      #No, let me try again.\n        *goto InputName\n\t\n*label Girlname\n*set pronounhe \"she\"\n*set pronounhim \"her\"\n*set pronounhis \"her\"\nWhat is your given name?\n\n*choice\n  #Yin.\n    A musical name, which implies that you have a strong voice. Perhaps people are destined to listen to you.\n    *set firstname \"Yin\"\n    *goto rival\n  #Meili.\n    A name as beautiful as your features.\n    *set firstname \"Meili\"\n    *goto rival\n  #Yan.\n    Ah, named after the swallow. Perhaps it means you will reach great heights.\n    *set firstname \"Yan\"\n    *goto rival\n  #None of these is my name.\n    *goto InputName\n\n*label Rival\n*if Male\n  *if MixedSexMonks\n    *label RivalFemale\n    *set RivalSex \"female\"\n    *set RivalHe \"she\"\n    *set RivalHim \"her\"\n    *set RivalHis \"her\"\n    *comment note that you have to make the variables he, him, his; if you make them she, her, her, you end up with an ambiguous variable (do you mean her possessive or her accusative)\n    *goto Surname\n  *else\n     *label RivalMale\n     *set RivalSex \"male\"\n     *set RivalHe \"he\"\n     *set RivalHim \"him\"\n     *set RivalHis \"his\"\n     *goto Surname\n*else\n  *if MixedSexMonks\n     *goto RivalMale\n  *else\n     *goto RivalFemale\n\t\n\n*label Surname\n\n\nAnd what is your family name?\n\n*choice\n  #Liu.\n    A fine name.\n    *set surname \"Liu\"\n    *goto Outlaws\n  #Wong.\n    A fine name.\n    *set surname \"Wong\"\n    *goto Outlaws\n  #Cao.\n    A fine name.\n    *set surname \"Cao\"\n    *goto Outlaws\n  #None of these is my family name.\n    *label InputFamily\n    What is the name of your honored family?\n    *input_text surname\n    Your family is $!{surname}. Is that correct?\n    *choice\n      #Yes.\n        *set surname \"$!{surname}\"\n        *goto Outlaws\n      *if (surname != \"$!{surname}\") #No, my family is \"${surname},\" just as I wrote it.\n        *goto Outlaws\n      #No, let me try again.\n        *goto InputFamily\n\n*label Outlaws\n*set Name (surname & \" \")& firstname\n\n\nThe bandits are quickly losing their resolve to steal your wagon; they still have numbers on their side, but many have fallen, wounded or dead, at your feet. You hear the far-off sound of a whistle, and the bandits begin to disengage, quickly fading back into the marsh. Though you and your fellow students have done a formidable job of holding off the bandits, you see that your fellows have taken some injuries as well.\n\nWhat do you do?\n\n*choice\n  #Retreat back to the monastery, so that my fellow students can have their wounds treated immediately.\n    Only one of your fellow students is badly enough injured to need help getting back to the monastery. You and Lu Jin help lever the younger student onto the back of the wagon, making room among the supplies to give him the space he needs to recline.\n\t\n    \"Thank you for showing mercy,\" says Lu Jin, and you can see that it grates on ${Rivalhim} slightly to be thanking ${Rivalhis} primary rival.\n\t\n    *label laowai\n\n\n    Lu Jin takes a deep breath, as though deciding whether or not to share a thought, before ${Rivalhe} says, \"It wasn't like this before the foreigners came. With them eating up resources—and with the Emperor standing by while his people starve and lose their land to these invaders—the people have no hope.\"\n\t\n    Lu Jin's openness is surprising, but what ${Rivalhe} says amounts to treason. Questioning the Emperor's will so openly will certainly lead ${RivalHim} to trouble.\n\t\n    Does that trouble start with you?\n    *choice\n      #How dare ${Rivalhe} question the Emperor! I challenge ${Rivalhim} immediately.\n        Lu Jin lets out a bitter chuckle, looking around at your fellow students, who watch you anxiously. \"Perhaps another time.\"\n\t\n        $!{RivalHis} refusal to fight puts you in an awkward position; if ${Rivalhe} refused to defend himself, you could be thrown out of the Order of the Peach Tree for attacking a fellow student without provocation.\n        *set tianxia %-30\n        *set LuJin %-50\n        *choice\n          #$!{RivalHe} insulted the Emperor. I cannot delay in seeking retribution.\n            *if fighting > 80\n              Without waiting for Lu Jin to accept your challenge, you strike, delivering a powerful blow to the back of ${rivalhis} neck. $!{RivalHe} crumples, and you load ${rivalhim} into the wagon next to the wounded student, who looks at you with fear.\n\t\t\t\n              But surely you have established who is truly the senior student.\n              *set honor %-20\n              *goto peachtree\n            *else\n              You move to attack, but Lu Jin is there, countering your moves with the deft precision you have noticed during sparring. But this is no sparring match, and your rival pulls no punches. You remember seeing ${RivalHim} start to turn, and you are on the ground before you feel the kick that sent you there.\n\t\t\t\n              Not only have you shown less concern for honor than for vengeance, but you have lost face among your fellow students, who have certainly decided who the senior student is—and not in your favor.\n              *set honor %-40\n              *goto peachtree\n          #I wait, but I do not forget.\n            A wise decision.\n            *goto peachtree\n      #I agree with Lu Jin, but I respond noncommittally. Just because ${Rivalhe} is asking for trouble by speaking ${Rivalhis} mind does not mean I will risk my neck.\n        A wise decision. It is dangerous to speak against the Emperor.\n        *set tianxia %-15\n        *set lujin %+10\n        *goto peachtree\n      #I agree with Lu Jin and am glad to find someone to discuss the Empire's problems with.\n        \"The Empire is out of balance with the Heavens, and something must be done to correct it,\" you say quietly.\n\t\t\n        Lu Jin seems surprised, but also relieved, that you are on ${RivalHis} side. \"Not many are willing to question the Son of Heaven,\" ${Rivalhe} says, referring to the Emperor. \"I agree that things are out of balance, and that it is up to people like us to restore the will of the heavens.\"\n\t\t\n        Though ${Rivalhe} speaks with passion, Lu Jin realizes that this may be going too far and, with a quick nod to acknowledge the conversation, moves off to help organize the rest of the students.\n        *set tianxia %+30\n        *set LuJin %+50\n        *goto peachtree\n      #I do nothing. I am not interested in politics.\n        Perhaps the world will take care of itself.\n        *set tianxia %-10\n        *goto peachtree\n  #Question one of the wounded bandits about the attack.\n    You pull one of the outlaws to his feet, and in the process realize that this scrawny bandit is no more than thirteen. Malnourished and weak, it is amazing he is not dead from the beating he received.\n    *choice\n      #I feel admiration for his bravery, in spite of his conditions. I tell him he fought well.\n        *set enlightened %+5\n        He seems surprised by your praise, and he holds his head high, despite his pain. \"I must fight well,\" he says, \"because no one else will fight for me.\" He says it almost like a mantra.\n        *label interrogation\n        You ask your questions, and the boy gives you answers he appears to believe are true: the supplies you carry were targeted because they would be useful to the bandits, not because the outlaws wish to offend the Order of the Peach Tree. He does not know how many bandits there are, but he says that almost all that he knows were farmers, forced out of their homes by the foreigners who have been encroaching on the Middle Kingdom.\n        *choice\n          #I let the boy and the other wounded bandits go with no intention of bringing them to the law. They are people suffering from circumstances beyond their control.\n            *set enlightened %+5\n            *set tianxia %+15\n            A sympathetic decision. Hopefully it will not come back to haunt you.\n            *goto laowai\n          #I let the boy go and warn him and the other bandits that they must cease their crimes against the Empire. I will make sure that their banditry is reported to the local magistrate, but will hope they repent of their crimes.\n            Considering that your peers are wounded and you have no way to bring the wounded bandits to face the magistrate in person, this is a responsible way to handle the situation.\n            *goto laowai\n      #I feel pity for this boy who has turned to thievery to survive.\n        The expression of pity on your face clearly angers the boy. \"Do you think you are better than I?\" he demands. \"The Emperor lets the laowai take our land, and you do nothing.\" He speaks of the foreigners who have been encroaching on the Middle Kingdom. No one particularly likes them, but the Emperor tolerates their presence in his lands and in his court. \"The people starve, and you do nothing. The people fight for themselves, and you obey the Emperor's law—the law that condemns us to this life. Don't pity me, monk. Pity yourself.\"\n        *choice\n          #Drop him. He is not worth my time, and I have the wounds of my fellow students to attend to.\n            You abandon your intention to question the bandits in favor of returning to the monastery.\n            *goto laowai\n          #Release him in surprise at his vehemence. I explain that I have no fondness for the foreigners.\n            *set enlightened %+5\n            *if enlightened > 50\n              The boy listens to your argument, and you are able to draw him into a conversation about the bandits.\n              *goto interrogation\n            *else\n              The boy is uninterested in your protests. He argues that the Emperor—and you and your fellow students, by virtue of having defended yourselves—support the foreign invasion of the Middle Kingdom. Soon, he claims, there will be no land left for the people.\n              *choice\n                #I let the boy and the other wounded bandits go with no intention of bringing them to the law. They are people suffering from circumstances beyond their control.\n                  *set tianxia %+15\n                  *set enlightened %+5\n                  A sympathetic decision. Hopefully it will not come back to haunt you.\n                  *goto laowai\n                #I let the boy go and warn him and the other bandits that they must cease their crimes against the Empire. I will make sure that their banditry is reported to the local magistrate, but will hope they repent of their crimes.\n                  Considering that your peers are wounded and you have no way to bring the wounded bandits to face the magistrate in person, this is a responsible way to handle the situation.\n                  *goto laowai\n      #I am furious that this urchin attacked us.\n        Sensing your anger, the boy looks up at you and spits in your face, resistant to the last.\n\t\t\n        \"You are no better than the laowai,\" he says, cursing you by comparing you to the foreigners who have been encroaching on the Middle Kingdom. No one particularly likes them, but the Emperor tolerates them, even as the foreigners take land away from the Emperor's citizens.\n        *choice\n          #I slay him for his insolence.\n            Since he is already wounded and weak, it is no difficulty to deliver a killing blow. Your fellow students appear divided on how to respond to your behavior: some look on in approval, as these bandits commit crimes against the Middle Kingdom, and thus against the Emperor. Others, however, look appalled that you have killed a boy, barely more than a child.\n            *set honor %-10\n            *set enlightened %-10\n            *choice\n              #Find another bandit to question.\n                The next outlaw is more accommodating. Intimidated by the death of her peer, she quickly gives you the information you desire: the Order of the Peach Tree was not a personal target, just a convenient one. The supplies you are responsible for would have been of great use to the bandits. She does not know how many bandits there are; she claims to have been a farmer's wife until a few months ago, when she and her family were forced from their home by foreigners.\n                *choice\n                  #Let her and the other wounded bandits go. Her information was useful, and she is clearly too frightened to be of use on a future raid. The others are likely to follow her example.\n                    Perhaps your mercy will be remembered. Or perhaps you will come to regret it.\n                    *set enlightened %+5\n                    *goto peachtree\n                  #Kill her, and order the students to kill the other wounded bandits. These criminals against the Emperor's will must not trouble future travelers.\n                    A bloodthirsty decision, but a practical one: a dead enemy cannot fight you in the future.\n                    *goto peachtree\n              #Return to the monastery.\n                *goto peachtree\n          #Drop him. He is not worth my time, and I have the wounds of my fellow students to attend to.\n            You abandon your intention to question the bandits in favor of returning to the monastery.\n            *goto laowai\n          #Release him in surprise at his vehemence, letting go of my own anger to explain that I am certainly not on the same side as the foreigners.\n            *set enlightened %+5\n            *if enlightened > 59\n              The boy listens to your argument, and you are able to draw him into conversation about the bandits.\n              *goto interrogation\n            *else\n              The boy is uninterested in your protests. He argues that the Emperor—and you and your fellow students, by virtue of having defended yourselves—support the foreign invasion of the Middle Kingdom. Soon, he claims, there will be no land left for the people.\n              *choice\n                #I let the boy and the other wounded bandits go with no intention of bringing them to the law. They are people suffering from circumstances beyond their control.\n                  *set tianxia %+15\n                  *set enlightened %+5\n                  A sympathetic decision. Hopefully it will not come back to haunt you.\n                  *goto laowai\n                #I let the boy go and warn him and the other bandits that they must cease their crimes against the Empire. I will make sure that their banditry is reported to the local magistrate, but will hope they repent of their crimes.\n                  Considering that your peers are wounded and you have no way to bring the wounded bandits to face the magistrate in person, this is a responsible way to handle the situation.\n                  *goto laowai\n  #Pursue the bandits into the marsh.\n    *if tenacity > 59\n      It is difficult going, slogging through the marsh, but you are determined, and you are able to track down several of the fleeing bandits. Frightened, they surrender, begging for your understanding. The outlaws were once farmers, they claim, but the foreigners who have been encroaching on the Middle Kingdom have forced them from their homes. With no land and no livelihood—and no support from the Emperor, who tolerates the presence of the foreigners, despite what is happening to the people—they have been forced to take desperate measures to survive.\n      *choice\n        #Let them go. They are people suffering from circumstances beyond their control.\n          *set tianxia %+15\n          *set enlightened %+5\n          A sympathetic decision. Hopefully it will not come back to haunt you.\n\n          You rejoin your companions, returning to the monastery, and Lu Jin asks whether you encountered any more bandits. You acknowledge that you did.\n          *goto laowai\n        #Accept their surrender and take them to the magistrate. They broke the Emperor's laws and they must face justice.\n          They reluctantly accept your decision, but you are convinced they will act honorably. When you return to your companions, you entrust one of the other students with the task of watching over them as Lu Jin approaches you.\n          *goto laowai\n    *else\n      After spending enough time in the marsh to get completely soaked, not to mention lost, you stumble back upon your companions. Lu Jin asks whether you encountered any more bandits, and you admit that you did not.\n      *goto laowai\n\n*label peachtree\n*page_break\nAs you walk back to the monastery, you take a moment to consider the path that has brought you here. As a child, you were told stories of the Order of the Peach Tree, a monastery where many great warriors were trained. But it was not just the combat skills that enticed you. Every hundred years, one member of the Order of the Peach Tree is given the honor of consulting the Dragon Sage. That monk may ask a single question of the wise dragon. It is only thirty years until the next monk of the Order of the Peach Tree is selected, and you are determined to be the order's representative to the dragon.\n\nWhat question drives you toward this goal?\n*choice\n  #I know I have much to learn of combat, but I am convinced that the Dragon Sage holds the key to greatness beyond what I can learn from mortal teachers. I plan to ask, \"How can I become the greatest warrior in the world?\"\n    *label warrior\n    *set fighting %+10\n    *set question \"How can I become the greatest warrior in the world?\"\n    A worthy goal. Perhaps you will go down in history with such legends as Thundering Ting or Rampaging Ox.\n    *finish Chapter One: Bandits in the Woods\n  #The strife I see in the Middle Kingdom—so recently reiterated by my encounter with the bandits—disturbs me greatly. I wish to see balance restored to the Middle Kingdom, so that the Emperor is once again in alignment with the Heavens. I will ask, \"How can the Empire return to Heaven's Favor?\"\n    *label favor\n    *set question \"How can the Empire return to Heaven's Favor?\"\n    *set tianxia %+20\n    You have set your sights high; if anyone would know how to set the Emperor back on the path of Heaven, it is the Dragon Sage.\n    *finish Chapter One: Bandits in the Woods\n  #I am more concerned with esoteric knowledge than worldly issues. I wish to ask, \"What is the first question?\"\n    *label question\n    *set question \"What is the first question?\"\n    *set cleverness %+10\n    You have meditated on this question a number of times on your own, but have come to no further conclusions. Surely the Dragon Sage will provide the insight you need to reach enlightenment.\n    *finish Chapter One: Bandits in the Woods\n  #My question is simple: \"Why do kites fly?\"\n    One question in a hundred years, and you intend to ask why kites fly?\n    *choice\n      #Yes.\n        *set question \"Why do kites fly?\"\n        *set enlightened %+10\n        Surely the Dragon Sage will know that as well. Probably best to keep that question to yourself until you are in the dragon's presence.\n        *finish Chapter One: Bandits in the Woods\n      #I joke. I meant one of the other questions.\n        What will you ask the Dragon Sage?\n        *choice\n          #\"How can I become the greatest warrior in the world?\"\n            *goto warrior\n          #\"How can the Empire return to Heaven's Favor?\"\n            *goto favor\n          #\"What is the first question?\"\n            *goto question\n\n", "test": "*temp success 0\n*temp failure 0\n*temp findfailure 0\n*advertisement\n\nThere are rumors upon rumors of what happens during the final test that separates students from monks. You have heard that it involves tracking and defeating a wild tiger. Some say that you must face and disperse a hungry ghost. Still others say that the true final test is a measure of the spirit and the ability of the student to achieve a perfect moment of inner peace.\n\nGiven the scars you have seen on the fully accepted monks, if the test is about finding inner peace, inner peace leaves marks.\n\nMaster Shen leads you to the inner temple of the monastery. He walks in a relaxed fashion, leaning on his staff, as though he is merely observing the growth of the peach tree, not leading you to where your fate will be decided.\n\nHow are you feeling about this test?\n*choice\n  #I am eager to begin. My training has prepared me well.\n    Master Shen looks at you and chuckles. \"You are vibrating with enthusiasm,\" he observes. \"Be careful that your eagerness does not distract you from threats.\"\n\n    You feel his staff tap you on the back of the head before you see him move. He looks at you with fondness, nods, and opens the doors to the inner temple.\n    *goto temple\n  #I am nervous. I want to do well, but I fear failure.\n    Master Shen looks at you and shakes his head, but he wears a fond smile. \"You are anxious, my student,\" he observes. \"You must let go of your worries. Do not think of what was or what will be; focus on what IS.\"\n\n    He moves, quickly, and you turn to block his staff the instant before it would have tapped you lightly on the head. Master Shen raises an eyebrow and, with a grin, nods at you. He moves a step ahead toward the huge doors of the inner temple and pushes them open.\n    *goto temple\n  #I am calm. This is a moment, and I exist within it.\n    Master Shen places one calloused hand on your shoulder, and you feel its weight: the old master's strength, his wisdom, and his confidence in you all flow through that simple touch.\n\t\n    He stops in front of the huge doors to the inner temple, carved with intricate scroll work and the shapes of the five animals: dragon, tiger, snake, crane, and leopard. After a short moment of waiting, he gestures with his staff for you to push the doors open. As you do, he falls into step next to you and you enter the chamber.\n    *goto temple\n\n*label temple\nThe inner temple is humble: a small chamber with candles lining three of the four walls. Above the candles are paintings and sculptures of the spiritual animals of kung fu and the immortals. On the far wall, on a raised shelf above the flame, is a Buddha statue, one hand resting in his lap, the other raised in blessing. \n\nAbbot Bao stands in front of the last candle, lighting it from his own small candle. Once the room is lit, he blows his candle out. \n\n\"${name}, you have been deemed worthy of the final test to join the Order of the Peach Tree,\" says the abbot as he turns to you. \"Do you accept this honor, ready to face the challenges before you and take on the role of monk?\"\n\n*choice\n  #\"I accept.\"\n    *goto threetests\n  #\"I do not feel ready.\"\n    Abbot Bao is quick to disguise his disappointment, but you can feel the sorrow of Master Shen beside you. You have clearly failed your teacher.\n\n    \"The only one who can defeat you is you,\" Master Shen whispers.\n    *choice\n      #I will overcome my doubt and make my teacher proud. I tell Abbot Bao that I accept.\n        *goto threetests\n      #I stand by my feeling. I am not ready.\n        *goto testfail\n\n*label threetests\nYou bow to the masters and they bow to you, though theirs is shallower, as befitting a teacher to a student.\n\n\"There are three challenges in the test to become a member of the Order,\" Abbot Bao explains. \"You must complete two of the three successfully. Consider your options wisely, as only one failure can be forgiven.\"\n\n\"Part of the test is identifying your weaknesses and being honest about your strengths,\" Master Shen says quietly. \"Know yourself, student, and you will triumph.\"\n\n\"The three challenges are these,\" Abbot Bao continues. \"The first is the Dashanmen, a challenge of your combat skills against the monks of the Order. You will enter a dark chamber, and you must cross from one side to the other while being attacked.\"\n\nMaster Shen chuckles. \"In the old days, we fought to the death. Too messy. Now we stop attacking as soon as you are unconscious.\"\n\nThis commentary does not serve to give you confidence.\n\n*page_break\n\n\"For the second challenge, you must carry an urn filled with hot coals from the monastery down to the river. There, you may release the urn and bathe your arms in the cold water.\"\n*comment skg changing \"release the vase\" to \"urn\" because vase=lightweight glass or pottery, not suitable for coals\n\nThe distance from the monastery to the river is short enough when not carrying an urn, but it will certainly feel longer with burning metal on your arms. That certainly explains some of the scars you have seen on the monks of the Order!\n\n\"For the third challenge, you must retrieve the Scroll of Destiny from behind Bingdian Waterfall, and learn the lesson it holds,\" Abbot Bao finishes.\n\n\"Don't worry,\" says Master Shen, \"it is stored in a waterproof scroll case. You'll be able to read it.\"\n\nWhich task would you like to undertake first?\n*label tasks\n*choice\n  *If (success >= 2) #I am satisfied with my performance on my tasks and conclude the test.\n    *goto testwin\n  *hide_reuse #I am confident I can fight my way through Dashanmen.\n    With a sweep of his hands, Abbot Bao extinguishes all the flames in the room. For an instant, you think the peach tree statue glows with reflected light, but then all is dark.\n\t\n    Master Shen's hand tightens on your shoulder, escorting you to the far side of the chamber. You can hear the soft sounds of people entering the room, though with the quiet treads the monks have practiced, it is impossible to tell how many. Certainly more than the sounds you hear would indicate.\n\t\n    Finally, Master Shen turns you around. \"Remember your training,\" he says, before he, too disappears in the darkness.\n\n    You wait, your stance relaxed as you have been taught, until you are told to begin—or until the first attack comes.\n\n    How will you face this challenge?\n    *choice\n      #I have faith in my fighting skills. I face my opponents with confidence—they are as blind as I am.\n        *if fighting > 60\n          From somewhere near the door, you hear Abbot Bao's voice announce, \"Begin!\" And then the motion starts. While one foe grabs your wrist (you distract him with a chicken-wrist and a locked shoulder before dropping him to the ground), a second attacks you from behind, giving you only a moment to kick backwards, clearing the space, before a third attack comes in from the corner of the room.\n\t\t  \n          Some of the attacks land, but soon you discern a pattern: each attack prompts the techniques you were taught from the beginning of your study of Wushu. As soon as you make this realization, your defenses flow easily, despite your lack of vision. You turn with a block at exactly the right height to allow you to complete Enemy Inside the Gate, which flows into Fair Lady Works the Shuttle.\n\n          Everything is moving quickly around you, but you are able to move slowly, anticipating each moment, using your speed in small bursts when you strike. You move through the attackers, feeling their bodies bend to your fists and feet, and though you continue to receive the occasional lumps, you find yourself flowing to the chamber's exit.\n\n          \"Finish,\" Abbot Bao says quietly, immediately in front of you. He moves to attack, but you slip to the side, delivering a perfect Crane on the Mountain and dropping him to the ground.\n\n          You step forward, and in front of you is the door to the chamber. You push it open a crack, just enough to let a sliver of light in, but after the darkness, it illuminates the room. \n\n          The monks of the Order of the Peach Tree stand and bow to you.\n          *set fighting %+20\n          *set success +1\n          *achieve dashanmen\n          *if success = 3\n            *goto testwin\n          *else\n            Which task will you undertake next?\n            *goto tasks\n        *else\n          *set fighting %+10\n          From somewhere near where you think the door might be, you hear Abbot Bao's voice announce, \"Begin!\" Almost before his voice has finished, you feel a hand on your wrist, yanking you aside. You attempt a shoulder lock, but before you can complete your escape, you are kicked in the back, right at your kidneys.\n\t\t  \n          It continues like that for some time. You get in a few hits now and then, but you simply can't keep up with the speed of your attackers. You almost sense a pattern to the attacks, but every time you think you have it figured out, you take another hit. It seems hopeless.\n          *label surrender\n          *choice\n            #Clearly I was not prepared for this test. I call out my surrender.\n              In grappling practice, students are trained to tap out to let their opponent know that the pain is too great. Your decision here is similar: you have been pushed to the limit of your endurance and can go no further.\n\t\t\t\n              The candles are lit to reveal the room and your former opponents.\n              *goto bow\n            #I must fight on! I grit my teeth and keep going.\n              *if tenacity > 75\n                Your determination to succeed keeps you moving forward, despite the continual pain. Few of your hits are connecting—and many of the hits of your opponents are connecting with you. You hurt in places you didn't know could hurt.\n\t\t\t\t\n                But still, you push on.\n\t\t\t\t\n                After what seems like an eternity, you stumble, and the monks do not let you recover without giving you a few more lumps. You think that one of your ribs has been kicked all the way through to your spine. But even though you cannot quite regain your feet, you keep moving forward, stumbling and crawling blindly in the dark.\n\t\t\t\t\n                Your hand reaches out, and you feel the wood of the door in front of you.\n\t\t\t\t\n                \"Finish,\" says Abbot Bao from above you.\n\t\t\t\t\n                You push with your fingertips, and as the sliver of light comes in through the door, you see that these, too, are wounded, possibly from pulling you across the floor. You force yourself to roll onto your back so you can see the room.\n\n                The monks of the Order of the Peach Tree are bowing to you. You have survived your first test.\n                *set tenacity %+20\n                *set success +1\n                *achieve dashanmen\n                *if success = 3\n                  *goto testwin\n                *else\n                  Which task will you undertake next?\n                  *goto tasks\n              *else\n                  You press on, despite the pain. Eventually, a punch—or perhaps a kick?—connects with the back of your head. You have a moment to recall that this gall bladder pressure point is one of the knock-out locations on the body before you lose consciousness.\n\t\t  \n                  When you come to, the candles are lit once again. \n                  *label bow\n                  The monks bow to you to show that there are no hard feelings. It is clear, however, that you have failed.\n                  *set tenacity %+20\n                  *set failure +1\n                  *if failure = 1\n                    *goto tasks\n                  *else\n                    *goto testfail\n      #The challenge is to get from one side of the room to the other, but the path was never specified. I weave through the room, confusing my opponents.\n        *if cleverness > 60\n          In your time with the Order of the Peach Tree, you have often been complimented on your ability to think outside of the boundaries of the exercise. That skill is useful here. You begin by crouching low to the ground, and you feel where the strike of your first opponent would have been had you remained in place. You strike to a pressure point on the back of his leg, collapsing it under him, as you move away from the center of the room and through the crowd of opponents.\n\t\t  \n          The monks realize your strategy quickly, so you have to keep shifting your pattern of movement. The intention is to be where the strikes are not. You get into a low stance and circle walk. You move, changing directions and heights of your stance with syncopation so that your foes never catch you in a rhythm. You launch a flurry of palm strikes as you feel the body of a monk ahead of you. The next monk, however, you just evade, moving around him the moment that your earlier foe counterstrikes your former position.\n\n          It is not easy, but you focus on the strategies you have learned for keeping your opponents off balance, leading them into each other and falling away from their attacks. Occasionally, a strike catches you, but your steps never falter, and you keep moving. You can feel that what you are doing borders on what some would call the supernatural talents of the monks; you know you are drawing on your own knowledge of strategy and the principles of bagua—the eight diagrams that represent the nature of the universe.\n\n          You can sense how close you are coming to the far side of the room, where Abbot Bao awaits. You reach the wall, then circle back into the throng, gliding out of the way of the monks turning to attack you. You reach out and place your hand on the warm wood of the door.\n\t\t  \n          \"Finish,\" says Abbot Bao. He makes a final attack—a high strike aimed at your throat—but you back against the door and push it open, shooting yourself backward out of his reach. Light floods the room, dazzling you and the monks. As your eyes adjust, you realize that they are all bowing to you.\n          *set cleverness %+20\n          *set magic %+10\n          *set tenacity %-10\n          *set success +1\n          *achieve dashanmen\n          *if success = 3\n            *goto testwin\n          *else\n            Which task will you undertake next?\n            *goto tasks\n        *else\n          *set cleverness %+10\n          It seems a fine idea: how hard can it be to simply shift out of the way of the attacks? But you soon realize that it is much harder than you'd expected. The monks seem to have a sense for where you are, and despite your best efforts, you can feel yourself falling into a pattern as you move, making it easy to predict where you will be next. Worse, they find the most sensitive nerves to strike, and rather than controlling your motion across the room, you feel that you are being driven from one attack into the next.\n          *goto surrender\n  *hide_reuse #I will carry the urn of coals.\n    Abbot Bao leads you to the gates of the monastery. The courtyard has been cleared of students, and only a handful of monks are here to witness the beginning of your challenge. Just inside the gates, a brazier is lit, and over it is suspended a large urn, full of burning coals. Aligned to the cardinal directions are four animals: to the north is the tortoise; south, the phoenix; east, the dragon; and west, the tiger.\n\t\n    While the metalwork is beautiful, it mostly looks hot.\n\n    You must carry the urn with your forearms from the monastery to the river below. How will you face this challenge?\n    *choice\n      #I grit my teeth and carry the heavy load through sheer will.\n        With a nod to Abbot Bao, you move forward and edge your forearms closer to the scalding urn. Once you have started, there will be no stopping until you have reached the bottom of the mountain. You breathe deeply, then embrace the urn.\n\t\t  \n        It hurts even more than you anticipated. You breathe again and lift the urn from its supports over the brazier. The heat wafts to your chest, and you can almost feel it singeing the skin on your neck and chin.\n        *if tenacity > 60\n          The hardest step is the first. Putting your foot down is sheer agony as the urn jolts against your skin. You take another step. Then another. You will your feet to walk the familiar path from the monastery to the river. You have walked it hundreds of times before. The pain in your arms sharpens the details: the cooing of a pair of turtledoves in an osmanthus tree, the vibrant green of the marsh grasses far below the monastery, the whistling of wind through the bamboo on the lower hills, the smooth texture of a path that has been worn away by the soft tread of monks and pilgrims, the coppery taste of blood on your tongue from your teeth gritted against the searing pain.\n\n          Your shoulders begin to complain of the urn's weight halfway down the hill. Still, you put one foot in front of the other, keeping your pace steady, always moving forward. All you have to do is keep going.\n\t\t  \n          The smell of charred flesh hits you just before you hear the sound of the river. The babble of the water gives you the renewed strength you need to fight through the pain. Your forearms have long since stopped screaming their pain through your body, because your mind cannot process it, but your shoulders and chest have no qualms about making their own pains known. Five more steps, then three, then one.\n\t\t  \n          You stand over the river for a moment to show that you remain in control of your pain, that you embrace it, before you slowly lower the urn, and your arms, into the cold water. The shock of cold against the burns nearly sends you into a spasm, but you keep your teeth gritted and hold your arms below the river's moving surface until the urn has stopped hissing.\n          *set tenacity %+20\n          *label scars\n          *set success +1\n          *achieve urn\n          When you return to the monastery, you show the monks your new scars to prove that you have withstood the challenge. You have passed. What scars do you bear?\n          *choice\n            #The dragon and the tiger.\n              *set scars \"dragon and tiger\"\n              *if success = 3\n                *goto testwin\n              *else\n                Which task will you undertake next?\n                *goto tasks\n            #The tortoise and the phoenix.\n              *set scars \"tortoise and phoenix\"\n              *if success = 3\n                *goto testwin\n              *else\n                Which task will you undertake next?\n                *goto tasks \n        *else\n          It is all that you can do to take that first step, let alone the next few. The pain is intense—so much so that you cannot hold thoughts in your head. You want to take another step forward, and another, but if the pain weren't enough, the weight of the urn sends shock screaming through your shoulders.\n          *label coals\n          Your legs give out not ten steps beyond the threshold of the monastery. The urn clatters to the ground, spilling coals,
