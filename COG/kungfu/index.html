ont of you, and you topple from your horse.\n\t\t\t\t\t\n              Whatever poison was on that dagger acts quickly.\n\t\t\t\t\t\t\t\n              You hear cries of \"Poison!\" from the spectators, and you see the Imperial doctor standing over you moments later.\n\t\t\t\t\t\t\t\n              But you know it is too late. Though you are sure that you and Lu Jin will be named Imperial Champions due to the treachery of the foreigners, your title will have to be rewarded posthumously.\n              *goto_scene death\n          *else\n            *set opponentout true\n            *goto lujinfight\n        #My opponent is tired enough; I attack him.\n          *if fighting > (70 - advantageModifier)\n            You spring to action, putting all your energy into offense. Your tired foe cannot keep up with the strikes you deliver, and though most of them skitter off his armor, the force behind them sends him crashing to the ground. \"I surrender!\" he cries, putting his arms in front of his face, then, when he is sure you have let up on your attack, he takes off his helmet. \"I surrender,\" he says again.\n\t\t\t\n            You bow to your defeated foe and hurry to the other end of the field.\n            *goto dodgethatdagger\n          *else\n            Unfortunately, your foe still has enough fight left in him to deflect your attacks, and strike back with his own. You dodge the edge of his blade, but the hilt strikes hard against your head, sending you falling into darkness.\n\t\t\t\n            *goto unconscious\n        #I use my chi to root myself, and when he charges, I throw him over my hip, crashing to the ground.\n          You wait for him to charge, and when he does, you put your hip in his way, guiding his progress with your arm.\n          *if magic > (60 - advantageModifier)\n            He tumbles over you, crashing into the ground face first. You move to get his surrender, but you realize he is unconscious; the throw has knocked him on his head, and he is out for the rest of the battle.\n            *set opponentout true\n            *goto lujinfight\n          *else\n            You forgot, however, to compensate for his armor's weight, and the two of you crash to the ground together. From his position on top, he punches at you with his armored fists, and soon, you lose consciousness.\n\t\t\t\n            *goto unconscious\n    *else\n      Though you are quicker on your feet, your opponents blows are strong, and the longer you stay on the defensive, the more tired you get. When you realize you have to change strategies and move to the attack, it is too late—you dodge a blow but take the hit from the flat of his blade to your head. You fall into darkness.\n\n      *goto unconscious\n  #I will make it look like I am giving him openings, leading him to overextend and throw himself off balance.\n    *if cleverness >(70 - advantageModifier)\n      Part of the art is knowing when to fade and knowing when to strike—and knowing when to combine those two elements to launch a surprise attack. You keep drawing your opponent into your range, deflecting his blows and keeping him off balance. Eventually, he overextends himself, and his lunge sends him stumbling forward. You strike him on the back of his helmet as he falls, and when you check him to receive his surrender, you find that he is sleeping peacefully—though he will likely have quite the headache in the morning.\n\t  \n      Across the field, Lu Jin and ${rivalhis} opponent are still locked in battle. You hurry across the field to join them.\n      *set opponentout true\n      *goto lujinfight\n    *else\n      You fade away, making your foe think you are providing openings, and then you feint and strike an unexpected target. But your ploys do not seem to work; this fighter thinks in a straight line, and he continues to make the same moves regardless of your bait. Worse, you are trying so hard to trap him that you miss deflecting one of his blows. Though the blade does not cut you, his sword's hilt comes crashing down on your head, rattling your teeth and sending you into blackness.\n\t  \n      *goto unconscious\n  #I will disarm him—whether that means his weapon or his arm.\n    *if fighting >(70-advantageModifier)\n      You are in your element on the ground, and the armored fighter is not. You are faster than he is, and while you are moving out of the way of his sword's strikes, you are delivering blows to his armor that may not make him bleed, but are sure to leave him rattled. You see an opening as he raises his sword over his head—his armpit is practically unprotected. You thrust your jian up into the opening and your foe stumbles, then tumbles to the ground as you withdraw your sword.\n\t  \n      As you leave him to cross the field to where Lu Jin is still locked in combat, you see the Imperial doctor descend from the stands to attend to your fallen foe.\n      *set opponentout true\n      *goto lujinfight\n    *else\n      You were sure that you would have an advantage once you got the armored fighter to the ground, but he is more skilled than you realized. He is faster in his armor than you would have guessed, and his blows are strong and hard to dodge. As you deflect one of his blows, his sword slides on your jian, but the weight of the blow comes down on your head, and the hilt strikes you with enough force to put spots in your eyes. Your foe follows with a punch to your face with his armored fist, and you remember no more.\n\t  \n      *goto unconscious\n\n*label lujinfight\n\nBy the time you reach Lu Jin, both Lu Jin and ${rivalhis} opponent are on the ground, locked in a sword fight. The foreign warrior is relying on his armor to protect him from Lu Jin's blows, and for the most part, this strategy works, with Lu Jin's hook swords skittering off the steel. But his strikes are slow, and Lu Jin, though wounded, is dancing out of the way of his strikes. When Lu Jin sees you approach, however, ${rivalhis} strategy changes. $!{rivalhe} darts around behind the armored warrior and hooks both of the warrior's arms in his hook swords.\n\n\"Now!\" Lu Jin yells at you.\n*choice\n  #I am tough enough that I can deliver a knockout blow from beneath the helmet, despite the armor between me and my foe's chin.\n    *if tenacity > (70-advantageModifier)\n      You deliver a fierce blow that sends the fighter's head cracking backwards, despite the helmet. Your fist feels the impact, and you know it will be bruised—and possibly broken—when you next have it checked, but the unconscious falling form in front of you makes the sacrifice worthwhile.\n\n      *label ending\t  \n      *if not(opponentout) and not(opponentdead)\n        As you expected, your foe returns, just as you drop Lu Jin's opponent. But this time, you and Lu Jin are fighting back to back, and your enemy has no chance against the two of you together. After a few attempts, he surrenders. You keep your sword at his throat to make sure his surrender is genuine.\n\t\t\n      You and Lu Jin stand together, both of your foes out of the fight, and as one, you face the dais and give a deep bow in the direction of the Emperor. The spectators cheer wildly in the stands, and the drums beat in a roll so constant that it sounds like a thunderstorm. The magistrate announces you as the winners and Imperial Champions, proving the fighters of the Middle Kingdom are superior. You and Lu Jin are once again escorted back to the Imperial palace, this time as heroes.\n\t  \n      *if lujinpoison\n        But when you reach the palace, another group of soldiers are waiting for you. Rong Jue looks at them in confusion, but a soldier whose insignia shows a higher rank demands to take Lu Jin into custody.\n\n        \"By the Emperor's command, Lu Jin won ${rivalhis} freedom,\"\tRong Jue says cautiously.\n\t\t\n        The ranking officer shakes his head. \"That was before it was discovered that the rebel coated ${rivalhis} blade with poison,\" he accuses, and Lu Jin pales. $!{rivalhe} draws your jian from its sheath and you prepare to stop ${rivalhim} from attacking the guards. But ${rivalhe} does not lash out at them—instead, ${rivalhe} stabs ${rivalhim}self through the stomach, a deep wound that will bring about ${rivalhis} death.\n\t\t\n        \"I die a free man,\" ${rivalhe} says.\n\t\t\n        \"And an Imperial Champion,\" you say kindly. Your old rival's eyes flutter closed one last time, and ${rivalhis} blood cascades like liquid ruby down the palace steps.\n        *page_break\n        Two days later, you are summoned before the Emperor. Though you are required to remain several steps back from the throne, the Emperor shows you his face, and bestows one of his rare smiles upon you. \n\t\t\t\t\t\t\t\t\n        \"Congratulations, my Imperial Champion,\" he says. \"You have shown the Middle Kingdom that we have much to be proud of.\"\n\t\t\n        He does not mention Lu Jin's tragic fate.\n\n        *if (style = \"Celestial Sword\")\n          The Emperor's gaze locks on you for a moment. \"And I am very proud of you, my child,\" he says, acknowledging your blood relationship for the first time since you left to join the Order of the Peach Tree.\n\t\t\t\t\t\t\t\t  \n        \"You are welcome in my Court,\" he says. \"Let it be known throughout the Middle Kingdom that you are the empire's hero.\"\n\n        The subsequent awards you receive of land and wealth to match your new status are almost secondary to that proclamation.\n        *set champion true\n        *achieve champion\n        *set status %+30\n        *finish Chapter Eight: The Dragon Sage        \n      *else\n        *goto wearethechampions\n    *else\n      You deliver the blow, but the armor is too strong—you feel your bones crushing on impact.\n      *label fail\n      *if lujin \u003c 60\n        Lu Jin, with a look of disgust, thrusts ${rivalhis} opponent at you, and both you and the armored warrior topple to the ground. The armored warrior loses no time in attacking you, punching you in the face with his armored gauntlets. You lose consciousness, though only for a moment; when you come around, you see the crowds cheering for Lu Jin, who has been declared the Imperial Champion. You deserve only an honorary mention for your part in the battle, it seems.\n\t\t\n        *if lujinpoison\n          *page_break\n          After the competition, it was discovered that Lu Jin used poison to defeat his opponent. As a result, the Emperor declared the competition a draw, and Lu Jin was sentenced for execution. Despite the performance of his chosen champion, Gower has maintained his position at the Emperor's side, continuing to push the agenda of the foreigners.\n          *set lujin 0\n          *finish Chapter Eight: The Dragon Sage\n        *else\n          So, while you lose no status, you gain nothing, either, except for the pride that the Middle Kingdom's honor has been upheld.\n          *set tianxia %+25\n          *finish Chapter Eight: The Dragon Sage\n      *else\n        Lu Jin uses the distraction you have created to kick out the armored warrior's knees. As he crashes to the ground, Lu Jin places ${rivalhis} hook sword into the opening in the helmet, hovering just above the eyes. It looks as though it is taking a great deal of control for Lu Jin to wait to hear a surrender, but eventually, the armored fighter calls out his acceptance of your win.\n\t\t\n        *goto ending\n  #I deliver a piercing blow with the jian's tip through the hole in the helmet, killing him.\n    *if fighting > (60-advantageModifier)\n      With Lu Jin holding onto your foe, the blow is easy. The only hard part is getting the jian back out.\n\t  \n      *goto ending\n    *else\n      Despite the ease of the strike, your blade skitters off the helmet.\n      *goto fail\n  #I gather my chi and throw the energy at him with a shout, momentarily paralyzing him.\n    *if magic > (70-advantageModifier)\n      You can't resist the chance to make one final flashy move in this combat; you gather chi from the earth beneath you, cradling it in front of you until you hear a gasp from the spectators, indicating that they can see your chi ball as well. You thrust it at the armored fighter, and as the shock of the energy hits him, he collapses to the ground.\n      *goto ending\n    *else\n      You couldn't resist the chance to do a final, flashy move in this combat, but when it comes to gathering the chi into a tangible force, your efforts fall flat. Instead of looking like you've done something amazing, it looks like you're making a fool of yourself to create a distraction.\n      *goto fail\n", "challenger": "*temp match \"none\"\n*temp wounds 0\n*temp sunanwounds 0\n*temp weapon \"none\"\n*temp trap false\n*temp disarmed false\n*temp sunstay true\n*advertisement\n\nOne evening in late spring, the bloom of cherry blossoms perfuming the air, you watch a pair of your students sparring and you are reminded of your days as a young student at the Order of the Peach Tree. It seems now many years ago—and, in fact, it has been many years since you were last there. Eight years have passed since your training under Master Zhuge ended, but still, the Order has not sent for you to return. You have kept busy and, in fact, prosperous. Though several of your earliest students have left to pursue other training—or have gone on their own years of wandering—others have joined your school to take their places.\n\n*set disciples +10\n\n*if rebel\n  Your training of Deng Ping's Blue Scarves rebels has also gone well. Although your students are often away on missions, in many occasions under the command of Lu Jin, thus far they have always returned in one piece. They often bring questions about how to counter specific types of attacks—usually from the weapons of the foreigners, which harness a handheld explosive—and their scenarios give you a chance to explore different strategic options with all your students. While you are not officially training your students to be able to stand up against the foreign invaders, it is certainly the skill set they are developing.\n  *goto goals\n  \n*elseif imperial\n  Due to your imperial connections, you have received several students from Xiaonanhai, the imperial city, from families of high birth. The patronage of their families has allowed your school to prosper, and you can afford to hire several servants to see to the needs of your students. It is a much easier life than the one you yourself faced at the Order of the Peach Tree, but your well-born connections expect you to maintain a certain level of hospitality for their children, and all your students have been treated in the same fashion.\n  *goto goals\n \n*else\n  Despite your lack of connections to either the ranking families of the Middle Kingdom or the Blue Scarves Rebellion, you have managed to attract a number of students who have the core desire of learning the martial arts from a master. Given your years of study, you certainly have much to teach!\n  *goto goals\n  \n*label goals\n\nBut on a day like today, as your students bow to each other, and then to you, your mind is less on their critique than it is on your future. The years between now and the appearance of the Dragon Sage are shrinking—but in the meantime, you have built a satisfying life for yourself. What are your thoughts about the future?\n\n*choice\n  #I am surprisingly content with this life and question my earlier ambitions.\n    You are well suited to being a teacher, and are happy that it has taken so long for the Order of the Peach Tree to remember that they can one day call you back to the monastery. When that day comes, you will face a hard choice of which part of your life to leave behind.\n    *goto study\n  #I am concerned that it has taken so long for the Order to remember me.\n    Though you are doing well as a teacher, you still identify yourself as a member of the Order of the Peach Tree first. You often wonder what Master Shen and the other teachers are accomplishing, and you hope every day that you will receive word of news from the Order. Five years ago, you sent to the monastery for a cutting from the peach tree, and you hope this is the year that the tree will produce fruit.\n    *goto study\n  #I continue to strive toward becoming the one monk worthy enough to consult the Dragon Sage.\n    Though you are a good teacher, you continue to focus first on your own studies, knowing that you must never let your own training slide if you are to become the chosen one to meet the Dragon Sage.\n    *goto study\n  *if (rebel) #I am more concerned than ever about the balance of the Middle Kingdom and the presence of the foreigners.\n    The foreigners have always been bold, but in recent years, they have become even more daring. Entire coastal towns are dominated by foreign merchants and colonists, who arrive with their families in tow. Those citizens of the Middle Kingdom who remain in their homes are treated as second class citizens, despite their greater rights to the homes of their ancestors. Still, the Emperor does nothing, and allows the foreigners an honored presence in his court, trading fine silks and silver for their explosive weapons.\n    *goto study\n\t\n*label study\n\nAfter dismissing your students, you prepare to retire for the evening, letting the smell of the cherry blossoms wash over you. As you enter the part of the house that remains your private chambers, you settle into the routine of your own training. How have you been focusing your studies?\n\n*choice\n  #I study the texts of ancient masters, applying old traditions to the new techniques I am working to develop.\n    *set magic %+15\n    *set cleverness %+15\n    *set fighting %-5\n    *set tenacity %-5\n    Though you have continued your physical practice as you teach your students, your own studies have focused more on book-learning and innovation. You recognize that both the past and the future have a great deal to offer to the present. Though your reflexes are a little slower than they were in your younger days and your endurance is less than it once was, you know that you have gained wisdom, and your chi has grown strong enough to overcome what physical strength you may have lost. Each night when you are on your own time, you study texts and take notes, compiling your own treatise on the arts.\n    *goto reputation\n  #I focus on my physical efforts and on my teaching, particularly in sparring with my senior students and teaching my lowest level students their basics.\n    *set fighting %+15\n    *set enlightened %+15\n    *set magic %-5\n    *set cleverness %-5\n    You have focused on the building blocks of wushu when teaching your lowest level students, and though some advanced martial artists shun their basic training as too simple, you find that by practicing those core movements over and over again, there continues to be something to learn each time you make a basic move. At the other end of your teaching, your highest level students have become adequate sparring partners, and you find ways to challenge them—and yourself—each time you meet in combat. Through your focus on understanding your students in order to become a better teacher, your insight has improved, and your fighting skills are at their peak. But because you have had to abstain from more scholarly studies, you know that you are not as well versed in the wisdom of earlier masters. You have also not made much time to meditate, and you know you are less in touch with your chi than you were when you were still a student of Master Zhuge. Each night when you are on your own time, you practice your forms with devotion, focusing on keeping each move precise and powerful.\n    *goto reputation\n  #I take trips into the mountains in order to challenge myself as a survivor in the wilds.\n    *set tenacity %+25\n    *set enlightened %-5\n    You view the natural world as your greatest adversary, always giving you a greater opponent to overcome. While some monks journey into the wilderness in order to learn from the world around them and gain insight into the universe, your focus is on competition, on challenging yourself to overcome rather than to understand. You have heard the old saying that reeds bend in a great wind, while a mighty tree may break, but you have always found your stubbornness an asset when you face a foe. Each night when you are on your own time, you make plans for your next trip as a way to express your training.\n    *goto reputation\n  #I seek out other teachers of renown, inviting them to lecture at my school.\n    *set magic %+4\n    *set fighting %+4\n    *set enlightened %+4\n    *set cleverness %+4\n    *set tenacity %+4\n    By providing new perspectives to yourself—and to your students—you find that you've been able to improve all of your skills to a small degree. Considering the applications of different strategies has given you fodder for thought and developing your own strategies; observing different styles has given you insight into how others view the martial arts, and how you can apply what they have learned. Your physical strength and your chi are constantly needed when practicing with practitioners of other styles, and your determination to improve has increased as your assumptions about your own knowledge are challenged. Though you know you haven't experienced any vast improvements, you also haven't lost any ground. Each night when you are on your own time, you practice the latest techniques you have learned and consider new ways to counter these moves.\n    *goto reputation\n\t\n*label reputation\n\nThe prosperity of your school has given you additional opportunities for real training: your reputation has made you the inevitable target of challengers, seeking to prove that their style of wushu is superior to your own. Some challenges are for sport, with representatives of two schools facing off against each other in a friendly bout, usually with a determined point system decided on by you and another master. Some are a little more brutal than others, with the fight going to first blood, a knockout, or a surrender. What is your opinion of these sport competitions?\n\n*choice\n  #My school must prove itself to be the best, and we will always meet a challenge to defend our honor.\n    *set honor %+5\n    Thus far, you have not failed in that defense: although your students have not won every bout,  in every overall competition they have successfully defended the style you have taught them. You are also undefeated in your bouts against other masters.\n    *goto personal\n  #I am always eager to test my skills—and to have my students test their skills—against real challengers.\n    *set cleverness %+5\n    By viewing each competition as a way to test your skills, you focus on observing the strategies of others and applying those lessons in your teaching and your own combat. Although sparring is certainly not a direct correlation to real battle, fighting an unknown foe builds the critical thinking skills necessary for students facing real combat. You are glad to give your students that learning opportunity.\n    *goto personal\n  #I look forward to learning from others.\n    *set enlightened %+5\n    Each challenge to the school is a chance for you to learn from other masters, simply by observing what they have taught their students. You have a knack for learning about people by how they express themselves while fighting, and the more challenges you encounter, the faster your assessments become.\n    *goto personal\n\t\n*label personal\n\nOther challenges are more personal: they specifically challenge you and your skills in a one-on-one challenge. An implication comes with these challenges: if you cannot defend yourself against the challenger, you are not worthy of being an instructor, and the style that you have taught your students is weak. You have faced very few of these challenges, in part because your reputation is strong enough to make others wary of approaching you in battle. The fact that you have easily dispatched the three challengers who questioned your honor in this way has also kept others from making the same mistake.\n\nAs you conclude your evening training, Feng enters your room, wearing the guise of a female house servant and carrying a scroll. \"A messenger arrived for you this afternoon,\" she says demurely, her humble body language reflecting her current role. She holds out the scroll to you.\n*page_break\n\nYou are unsurprised to see that it is a challenge letter, but you are shocked to see that it has been signed by Sun An. A youxia—a wandering hero—of great skill, Sun An has the reputation for being a generous hero, but also a bit of a hothead. According to the stories, he has defended villages plagued by bandits and fought off scores of dangerous monsters in an effort to keep the common people safe. But he also seems to spend an inordinate amount of time making challenges to schools of wushu. Some claim he is a wandering immortal, who seeks to make sure that other martial artists deserve their reputations. Others say that while he is undeniably a great warrior, his conquests are more pride-driven than completed out of any sense of restoring balance.\n\nThe text of the letter is quite short: Sun An writes, using every courtesy of language, that your reputation as a teacher has encouraged him to seek you out and test your skills. He intends to meet you in single combat to give you the opportunity to prove your worth, and he is prepared to sign a waiver of death—an official government document that removes any legal repercussions should a challenge match end in death—if that is the style of match you desire.\n\nSun An is staying at the Plum Blossom tea house, where he eagerly awaits your reply.\n*set met_sunan true\n\nHow do you respond?\n\n*choice\n  #Bah! He will fall like all my other challengers have fallen.\n    You are confident enough in your skills that you see no need to deliberate: you write a letter in response, saying you will be ready to fight him in three days, and that you will send further details about where and when.\n    *goto where\n  #I reply, inviting Sun An to the school to discuss our match and extend my generosity to a fellow warrior.\n    *set sunan %+10\n    His challenge letter is scrupulously polite, and you see no reason not to respond in kind.\n\t\n    *label greeting\n    In the morning, bright and early as per your invitation, Sun An arrives at the gate. Watching his approach from one of the windows in the servants' building, you see that he is a tall, wiry man, his whiplike body made of corded muscle. A long scar stretches from his left eyebrow to his chin, which gives the warrior a menacing appearance. He wears a loose tangzhuang—lightweight pants and a jacket designed for ease of movement—and across his back, a pair of shuang dao, identical single-edged sabers. He walks with confidence and wears a perpetually unimpressed expression on his face.\n\t\n    How do you greet him?\n    *choice\n      #Like any who approach my school, he must wait patiently until I decide to answer the door.\n        After several minutes of waiting, Sun An laughs. \"Very well, ${name},\" he calls out loudly, his voice a boom that can be heard through the entire courtyard. \"Treat me as you would a student or a petitioner. We will see who the master is on the field of battle. You know where to reach me.\"\n\t\t\n        With that, he turns around, abandoning the meeting you'd intended to have. At least now you have had a chance to see your opponent in the flesh.\n        *goto where\n      #I send students to greet Sun An at the door and have him brought through the school to my dining room, where I will receive him.\n        *set SunAn %+5\n        You move from the position you'd taken to watch your challenger's approach, trusting your senior students to greet Sun An with the proper respect. As you make your way to the dining room, you see two of your younger students talking over a particular move in one of their forms, unsure of the proper strike after a 180 degree turn. Do you stop to correct them?\n        *choice\n          #It would be churlish to keep my guest waiting. I remember which students have the question and will address them later.\n            There is no sense in being late to meet with your opponent, after all. You reach the dining room well before your guest. When Sun An arrives, you rise from the table, where hot tea awaits you, and greet your opponent.\n\t\t\t\n            \"Thank you for your hospitality,\" Sun An says with a shallow bow. \"I am pleased to have the chance to meet you before defeating you in combat.\"\n\t\t\t\n            \"We shall see,\" you respond, then gesture to the chair next to yours. \"Please, join me for some tea.\"\n\t\t\t\n            *goto meeting\n          #Any one of my upper level students can answer the question for them. These students can get the answer from one of them.\n            You have delegated your responsibilities toward the lower level students. Certainly one of the advanced students can sort out the issue for them. You reach the dining room well before your guest. When Sun An arrives, you rise from the table, where hot tea awaits you, and greet your opponent.\n\n            \"Thank you for your hospitality,\" Sun An says with a shallow bow. \"I am pleased to have the chance to meet you before defeating you in combat.\"\n\t\t\t\n            \"We shall see,\" you respond, then gesture to the chair next to yours. \"Please, join me for some tea.\"\n\t\t\t\n            *goto meeting\n          #I stop briefly to tell them the proper strike and let them get on with their practice.\n            The students seem embarrassed that you are the one to answer their question—they look as though they have been caught gossiping rather than trying to properly recall a form—but they are immediately grateful to have the correct answer. They bow deeply as you hurry on toward the dining room.\n\t\t\t\n            You arrive there just before Sun An and greet him at the door to the dining room. \"Welcome to my school,\" you say with a shallow bow.\n\t\t\t\n            \"Thank you for your hospitality,\" Sun An says, his bow slightly shallower than yours. \"I am pleased to have the chance to meet you before defeating you in combat.\n\t\t\t\n            \"We shall see,\" you respond, then gesture to the chair next to yours. \"Please, join me for some tea.\"\n\t\t\t\n            *goto meeting\n          #I stop to talk to my students, giving them the proper instruction and moving through the form with them to make sure they have it.\n            *set sunan %+10\n            As you move through the form with your students, all three of you moving in synch, you see your two senior students walking with Sun An through the courtyard. The students continue to lead Sun An toward the dining room, but the tall man stops, watching you move. You incline your head ever so slightly in acknowledgement, never interrupting the flow of your movement, and your challenger smiles, nodding in return.\n\t\t\t\n            The form concludes, and you turn to your students to make sure they have no further questions. Both bow to you, looking slightly embarrassed to have been caught uncertain of their work, but grateful that you stopped to go over it with them. You return their bows with a shallow one of your own, then walk to join Sun An, who is still standing in the center of the courtyard.\n\t\t\t\n            \"My apologies for my tardiness,\" you say in greeting, offering your opponent a respectful bow. \"I had to resolve a question for my students.\"\n\n            *label watchyouwork\t\t\t\n            \"I enjoyed the chance to watch you work,\" Sun An says, returning your bow. He grins at you, and you are not entirely certain whether it is intended as friendly or fierce. \"It gives me an advantage for our coming battle.\"\n\n            How do you respond?\n            *choice\n              #I laugh it off. Watching me teach a low level form is not likely to give him insight into my higher level skills.\n                \"I assure you that the form you saw is hardly representative of my level of skill,\" you assure your challenger.\n\t\t\t\t\n                Sun An shrugs. \"A warrior can unravel his foe's secrets by watching even the smallest motion.\" He looks down at you with what appears to be a condescending expression on his scarred face. \"But of course, I am sure a master of your level is aware of that. Shall we have tea?\"\n\t\t\t\t\n                Your challenger moves toward the open door to the dining room, where your two senior students wait to admit you.\n\t\t\t\t\n                *goto meeting\n              #I tell him he is welcome to the advantage. I would not wish for him to enter our competition unprepared.\n                The warrior bears his teeth at you in an expression that is not very like a smile at all. \"I assure you, I am never unprepared.\"\n\t\t\t\t\n                You gesture toward the open door to your dining room. \"Shall we discuss further over tea?\"\n\n                *goto meeting\n              #I suggest that, as an honorable man, he might like to even the odds by demonstrating a form of his own.\n                *set sunan %+5\n                \"You have a reputation as a man of honor,\" you say. \"Perhaps you would be willing to even that advantage by showing me one of your forms?\"\n\t\t\t\t\n                Sun An laughs. \"Never let it be said that I am a man of dishonor,\" he says cheerfully. He moves to the open space you and your students have vacated and begins to move.\n\t\t\t\t\n                The form is a blocking system, involving almost no footwork, but focusing on an elaborate pattern of blocks, strikes, and counterstrikes. As your opponent begins to move, your students stop their own activities throughout the courtyard and join you in watching. In truth, Sun An moves beautifully, and his form is a pleasure to watch: the rhythm to his movement is syncopated, and his strikes are quick, but he never ceases to flow from one shape to the next. When he concludes, he bows, and you and your students bow back to him in appreciation.\n\t\t\t\t\n                He rejoins you, and you begin to lead him toward the open door to your dining room. \"A snake blocking system, I assume?\"\n\t\t\t\t\n                Sun An grins, and though his scar continues to give him an air of menace, he seems genuinely happy with your comment. \"It is called Plum Tree,\" he says, \"and yes, it is snake. Most people assume crane.\"\n\t\t\t\t\n                Given his body type and his air of arrogant confidence, you are not surprised. \"Syncopation with slow flowing movements punctuated by quick strikes?\" you say in summary. \"It could only be snake. You performed it well, but again, based on your reputation, I am hardly surprised.\" You gesture through the open door. \"Will you join me for tea?\"\n\t\t\t\t\n                *goto meeting\n      #I meet Sun An at the gate myself, to greet him as an equal.\n        *set sunan %+10\n        You greet the tall warrior at the gate and bow to him as you would to another teacher, or a fellow member of the Order of the Peach Tree. He bows in return.\n\n        \"Welcome to my school,\" you say. \"I am glad you could make the time to meet with me to discuss the terms of your challenge.\"\n\t\t\n        \"Thank you for your hospitality,\" he returns, falling into step with you as you begin to cross the courtyard to the main building. \"I have heard much about you as both an instructor and a warrior. I am eager to see if you live up to your reputation.\"\n\t\t\n        As you pass the cherry trees, you see two of your lower level students discussing a move in one of their forms. They are debating on a particular strike that follows a 180 degree turn in the sequence, and it is unlikely that they will resolve the issue on their own, as both are arguing the case for an incorrect strike. Do you stop to help them?\n        *choice\n          #It would be rude to leave my guest. I remember the students to discuss it with them later.\n            You continue walking with Sun An, not even pausing as you pass the quiet argument. When you reach the main building, you slide open the door to the dining room.\n\t\t\t\n            \"Would you join me for some tea?\" you ask.\n\t\t\t\n            \"Of course,\" says Sun An.\n\n            *goto meeting\n          #Any of my senior student can resolve this debate. I will leave it to them.\n            You have delegated your responsibilities toward your lower level students and you are confident that one of the advanced students can clear up the matter. You continue walking with Sun An, not even pausing as you pass the quiet argument. When you reach the main building, you slide open the door to the dining room.\n\t\t\t\n            \"Would you join me for some tea?\" you ask.\n\t\t\t\n            \"Of course,\" says Sun An.\n\n            *goto meeting\n          #I stop briefly to tell them the proper strike and let them get on with their practice.\n            *set sunan %+5\n            \"Excuse me a moment,\" you say to Sun An, leaving him with a bow. Your students stop their conversation as you approach, and you briefly explain the proper strike, making sure they understand. They look slightly embarrassed—almost as though they have been caught gossiping rather than discussing their forms—but they seem to understand the correction and continue on with their practice. As you rejoin Sun An, they have started the form again behind you.\n\t\t\t\n            \"Thank you for waiting,\" you say to Sun An.\n\t\t\t\n            \"The work of a teacher is never done,\" Sun An says charitably. \"Now, I believe that in your invitation you mentioned tea?\"\n\t\t\t\n            You guide Sun An to your dining room and gesture him to a seat at the table as you sit down.\n\t\t\t\n            *goto meeting\n          #I stop to talk to my students, giving them the proper instruction and moving through the form with them to make sure they have it.\n            *set sunan %+10\n            \"Excuse me a moment,\" you say to Sun An, leaving him with a bow. Your students stop their conversation as you approach, and they quickly fall into rank behind you, starting the form at the beginning. As you move through the form with your students, all three of you moving in synch, you see that Sun An is watching you raptly.\n\t\t\t\n            The form concludes, and you turn to your students to make sure they have no further questions. Both bow to you, looking slightly embarrassed to have been caught uncertain of their work, but grateful that you stopped to go over it with them. You return their bows with a shallow one of your own, then walk to join Sun An, who is still standing in the center of the courtyard.\n\t\t\t\n            \"Thank you for waiting,\" you say.\n\t\t\t\n            *goto watchyouwork\n\n*label meeting\n*page_break\nThe two of you take a moment to breathe in the aroma of your tea and appreciate its flavor before moving on to a discussion. You make small talk, asking after Sun An's travels prior to reaching Kuei Xian. He, in turn, asks about your school, politely inquiring about the number of students you teach and the length of time you have been teaching. It is much more like the conversation you would expect between two youxia meeting in a tea house than the conversation between the master of a school and a challenger questioning that master's skill.\n\nAfter a while, the discussion turns to business, and you determine the boundaries of your competition. Once you have worked out the details, Sun An rises, thanking you again for your hospitality. You will see him in three days.\n\n*label where\n*page_break\nThe challenge will take place at a fighting tower, which you and your students constructed five years ago for training exercises, not far from your home and just outside of town, on the edge of a bamboo forest. The tower is built like scaffolding—there is a flat surface at the top, about sixty feet in the air, but no ropes around the outside to keep opponents from falling to the ground. Though the scaffolding is easy to climb, two lines of tall posts also spiral around the tower and serve as more challenging steps to reach the top. You have had your students spar on the posts as well, chasing each other up and down to practice maintaining their balance during a fight.\n\nYou also keep a cache of weapons in a trap door accessible from the top of the platform for easy access while your students are training. This will enable you to pick and choose your own gear as you see fit during the competition.\n\nA contest like this one requires witnesses, and you have requested the presence of a magistrate in order to keep things official. To your surprise, Governor Rong himself has volunteered to preside over the event. Additional witnesses have been invited, and you would not be surprised if some large part of the population of Kuei Xian—and perhaps members of the Blue Scarves Rebellion—arrive to watch the combat.\n\nWhat terms have you decided on?\n*choice\n  #We will fight to unconsciousness or disabling; I am prepared to sign a death waiver.\n    *set sunan %+10\n    Governor Rong has agreed to supply the death waivers. Stakes like this one ensure that the turnout to the event will be quite high, so there will be many people to witness your defense of your honor—or your dishonor and death if you lose.\n    *set match \"death\"\n    *goto fight\n  #We will fight to surrender, but no death waivers will be required.\n    *set sunan %+5\n    Though you have heard the expression \"Death before dishonor,\" you do not see the logic in depriving the world of the knowledge a skilled martial artist can acquire. Your death, or the death of Sun An, would be a loss of knowledge and skill, and you see no need to take the challenge that far.\n    *set match \"surrender\"\n    *goto fight\n  #We will fight using the point system devised by the Imperial swordmaster.\n    Though there is no standard point system for challenges, in the past year, likely due to the influence of the foreigners at the Imperial court, a point system for unarmed and weapons competitions has been adopted by the Emperor. While it allows for injuries—even deep ones—the match goes to the competitor who reaches a specific number of hits first.\n    *set match \"point\"\n    *goto fight\n\t\n*label fight\n\n*page_break\n\nOn the morning of the fight, all of your students accompany you to the training tower. There are few clouds, and the temperature is perfect for the late spring. Conditions could not be better for a challenge—unless, of course, they could somehow favor you rather than being equally good for your opponent.\n\nFeng walks alongside the group, today wearing the guise of a male doctor, glasses perched on the bridge of his nose and acupuncture kit clutched in his arms. Hopefully you will not need Feng's expertise, but it is good to know he is there.\n\nAs you expected, there is a large turnout from the village. Governor Rong has brought several bureaucrats to attend and take notes.\n\n*if Romance != \"None\"\n  ${Romance} squeezes your hand for luck as you move toward the tables where Governor Rong and his attendees are waiting.\n  *goto fight2\n*else\n  *goto fight2\n  \n*label fight2\n*if match = \"death\"\n  Governor Rong waits for you to sign the death waiver. After you do, he lofts it into the air and the audience cheers, excited at the prospect of seeing you or Sun An crash to your deaths. Another official confirms that Sun An has signed his waiver, and that you may begin at any time.\n  *goto fight3\n*else\n  *goto fight3\n\n\t\n*label fight3\n\nSun An stands at the first pole, contemplating the height of your fighting field. He towers over the villagers, his whiplike body naked to the waist, except for the shuang dao—the dual sabers—he wears strapped to his back. Despite the scar that runs down his cheek, many of the female villagers seem quite taken with his appearance, and you notice money changing hands as people bet whether you or your challenger will win the day.\n\nWhat do you do?\n*choice\n  #I approach Sun An and bow so that the match begins with honor.\n    *set honor %+5\n    *set sunan %+5\n    Sun An returns your bow. \"Any statement before we begin, monk?\" he asks. He seems eager for the fight ahead, and no worry marks his expression. Either he has already dismissed you as a challenge, or he has no fear of losing.\n\n    *choice\n      #I say that my fists will do my talking for me.\n        He laughs. \"Big words, little monk,\" he says. Though you are not considered particularly small to most people, the warrior's vast height makes his jeer reasonably accurate. \"Let's see what your fists have to say to my swords.\"\n\t\t\n        Sun An draws his dual swords from their sheaths and begins spinning them in a fast figure-eight pattern. The crowd oooohs, but you recognize that this move is flashier than it is practical.\n\n        \"They can continue the discussion at the top,\" you respond.\n        *goto top\n      #I wish him a good fight.\n        *set honor %+5\n        *set sunan %+5\n        \"I look forward to seeing which of us will triumph,\" Sun An says, and despite the confidence in his demeanor, you are fairly certain he means what he says.\n\t\t\n        Then, he grins. \"See you at the top!\" He leaps onto the first pole and begins his race to the top of the tower.\n        *goto top\n      *if (match != \"death\") #I express a hope that after the challenge, Sun An may stay on at the school for a while, either to share his own knowledge or to learn what I can share.\n        *set sunan %+10\n        *set enlightened %+5\n        *set honor %+5\n        The tall warrior seems genuinely surprised at what might, in normal circumstances, be a peace offering. But you are clearly not backing down from the challenge, and he looks at you with new respect.\n\t\t\n        \"If you win,\" he says slowly, \"I will seriously consider your offer.\"\n\t\t\n        \"Then I had better win,\" you say lightly.\n\t\t\n        Sun An bows, then mounts the first post in his spiral. \n\t\t\n        *goto top\n      #I race to the top—I have nothing left to say.\n        *goto top\n  #I race to the top. I am eager to get the competition underway.\n    *label top\n    How do you get to the top of the tower?\n    *choice\n      #I run up the posts, using my chi to allow me to remain grounded, even when I am in the air.\n        *if magic > 50\n          You race up the posts, maintaining your balance with no trouble at all. You reach the top to the roaring sound of the crowd, appreciating your smooth ascent.\n\t\t  \n          Sun An appears a moment later, leaping from the final post and onto the platform atop the tower.\n          *goto platform\n        *else\n          You start up the posts, but your balance is not what it should be; you are not confident that you will be able to leap gracefully from post to post to reach the top. Getting to the tower platform in any other manner than gracefully could mean shaming yourself in front of the crowd, and your opponent.\n          *choice\n            #Leap to the scaffolding and climb up the side.\n              *if tenacity > 60\n                You make a great leap and catch your balance on the side of the scaffolding. You climb up, hand over hand, with ease, and make it to the top of the platform just moments after Sun An.\n                *goto platform\n              *else\n                *set wounds +1\n                Luckily, you are still close enough to the ground that when your leap to the scaffolding fails, you do not have far to fall. As you approach the ground, you curve into a roll, taking the impact all along your shoulders and back, and rolling to your feet without slowing down. You suffer nothing more than some hard bruises for your mistake, and you manage not to look like a fool, but it is not an auspicious way to begin. You arrive at the top of the platform after Sun An has already gotten there, and has had time to encourage the crowd to cheer for him.\n                *goto platform\n            #I leap back down to the ground and run along the spectator boundary to get them excited, as though this is what I had intended in the first place.\n              *if enlightened > 50\n                You leap back to the ground, tumble forward in a graceful roll, and cheer into the crowd. The crowd cheers back at you, and one of your students starts chanting your name. With a wave, you hurry up the scaffolding in an easy climb, and you make it to the top of the platform just moments after Sun An.\n                *goto platform\n              *else\n                *set wounds +1\n                You leap back to the ground, tumble forward in a graceful roll, and cheer into the crowd. But despite your excitement, only a few cheers echo back, and you suspect that at least some of the spectators have seen through your ruse. To make matters worse, as you dash back to the scaffolding to race up the side, you miss your grip and slip down a foot. The cuts on your hands where they slipped against the boards are not deep, but they are sore, and they will certainly set you back during your fight. You arrive at the top of the platform after Sun An has already gotten there, and has had time to encourage the crowd to cheer for him.\n                *goto platform\n            #Among the weapons I brought from the school is a long whip chain—I sling it from my back and use it to catch the scaffolding to swing myself over.\n              *goto whipchain\n\n\t\t\t  \n      #I use my chi to bounce off a few of the posts and fly to the top.\n        *if magic > 65\n          Though you use the posts to make your initial leaps, your movements are so smooth that it looks like you are indeed floating to the top of the tower. It takes you very little time to reach the top, and you look down to see your students cheering you on before Sun An arrives a few moments later.\n          *goto platform\n        *else\n          You have seen the move performed by others, but it seems you have not yet mastered the art of flight. After your first great leap, you find yourself falling, and though you try to bounce again off the air, you cannot recover your momentum.\n\t\t  \n          How do you save yourself?\n          *choice\n            #I aim my fall toward one of the lower posts, hoping to grab it and slide down.\n              *set wounds +1\n              Though you were not able to maintain your flight, you do manage to angle your fall. You catch the edge of a post with one outstretched hand and slam against it, then slide down to the ground. Your body aches from the force of your impact, but you know you will recover with only bruises. You dash to the base of the scaffolding, climbing quickly to make up for lost time.\n              *goto platform\n            #I aim my fall toward the crowd, intending to run atop the shoulders of the spectators until I can slow my momentum enough to leap back onto the posts.\n              *if fighting > 70\n                Though you were not able to maintain your flight, you do manage to angle your fall. Feet first, you descend toward the crowd, and you land running, allowing the knees of the spectators to absorb some of the impact you would have felt at falling from that height. The crowd seems to think this was your plan all along, and they cheer as you race across their shoulders to the series of posts that Sun An mounted. You rely on your strength to leap from pole to pole all the way to the top, following closely behind Sun An the last four posts.\n\t\t\t\t\n                You leap to the top after him, narrowly dodging a strike from Sun An intended to prevent you from landing on his side of the platform. You roll and come up clear of your opponent, ready to officially begin your match.\n                *goto platform\n              *else\n                Though you were not able to maintain your flight, you do manage to angle your fall. Unfortunately, your balance is still compromised, and rather than landing on your feet and letting the knees of the spectators absorb some of your momentum, you crash into the audience. Not only are you wounded—bumps and bruises to both your body and your pride—but some of the spectators sustain minor injuries as well.\n\t\t\t\t\n                One of Governor Rong's attendants makes notes on a scroll and looks at you disapprovingly. You get to your feet and dash over to the scaffolding to climb to the top as quickly as you can. When you arrive at the platform, Sun An is waiting patiently for you to crest the top.\n                *set wounds +2\n                *set honor %-5\n                *goto platform\n            #Among the weapons I brought from the school is a long whip chain—I sling it from my back and use it to catch the scaffolding to swing myself to safety.\n              *label whipchain\n              *if fighting >= 75\n                You have practiced with nearly all the weapons from Master Zhuge's collection, and the whip chain is one of the most challenging. Thankfully, you have become quite proficient with it. The spiked end and balancing flag lodge themselves in the rungs of the scaffolding, and you swing forward, easily catching the scaffolding to maneuver your way up. After freeing the whip chain, you wrap it back around your shoulder, ready to use it in combat as well.\n\t\t\t\t\n                You reach the top only moments after Sun An.\n                *goto platform\n              *else\n                You have practiced with nearly all the weapons from Master Zhuge's collection, and the whip chain is one of the most challenging. Sadly, you have not quite mastered it. You free it from your shoulder and swing it out, but the chain does not catch in the scaffolding, and you crash downward, slamming into the ground. You are beginning this match with serious bruises, and with a delay in reaching your opponent. By the time you have climbed the scaffolding, Sun An has already been at the top long enough to win a quarter of the crowd over to his side.\n                *set wounds +2\n                *goto platform\n            #I hit the ground rather than letting the ground hit me.\n              *if cleverness > 50\n                Hitting the ground rather than making impact is partially a matter of physics. If you choose the impact point, you also create more give with your body, sending the force of collision through your body in small doses rather than all at once. It is also a matter of mind over body: the body wants to tense up before impact, but aside from the part of you striking the earth, you must remain relaxed to keep from jarring yourself.\n\t\t\t\t\n                Luckily, you know all of this and are well practiced at keeping your mind in control of your fighting, rather than your instincts. You slap the ground, hard, and through a combination of chi and physics and strength, you send a shudder through the ground as you impact. It hurts, but it gives you time to recover without the types of bruises you would have suffered if you had allowed the ground to strike first.\n\t\t\t\t\n                You hurry to the scaffolding and climb, knowing that Sun An is already waiting for you at the top.\n                *set wounds +1\n                *goto platform\n              *else\n                Hitting the ground before it hits you is largely a case of mind over matter. Sadly, your body doesn't listen when your mind tells it what it should be doing. You crash into the ground, hard, and can already feel the body-sized bruise beginning to form when you stand up from your point of impact. You hurry to the scaffolding and climb, knowing that Sun An is already waiting for you at the top.\n                *set wounds +2\n                *goto platform\n      #I quickly climb up the scaffolding, hurrying to beat Sun An to the top.\n        While climbing up the scaffolding doesn't win you any points for style, it is the easiest and fastest way to reach the top. You beat Sun An to the platform and are already in position while he is making the leap from the last post.\n        *choice\n          #I let him take his place on the platform, giving him a moment to collect himself before we begin.\n            That is the honorable thing to do.\n            *set honor %+5\n            *goto platform\n          #As he makes his final leap, I attack him while he is in the air, trying to push him back out over thin air.\n            *set honor %-5\n            Your preemptive strike is dishonorable, but could end the fight before it has even begun. \n            *if fighting > 70\n              As Sun An attempts to land, you throw a side kick at his chest, knocking him back. He catches himself on the highest post, but not before he cracks into it. The pole shudders with his impact, and you know you have made an impressive first strike against your foe.\n\t\t\t  \n              He joins you at the top of the platform a moment later, leaping well clear of you to get his bearings back before launching into combat.\n              *set sunanwounds +1\n              *goto platform\n            *else\n              As Sun An attempts to land, you throw a side kick at his chest. But rather than landing on the platform, he lands on your outstretched leg and flips over you. His feet plant on the platform, near where you would have dismounted the other set of posts, and he drops his weight into a fighting stance.\n              *goto platform\n      #I climb the scaffolding slowly, using a razor-thin wire to weave traps subtly along the way.\n        *if cleverness > 60\n          *set honor %-5\n          *set trap true\n          Weighted with small darts, the wires are easy enough to fling into place. Should the fight come down the side of the scaffolding—and you've seen it happen before—Sun An will have to face these super-sharp hazards you have left behind, if he notices them in time.\n\t\t  \n          When you reach the top, Sun An is waiting, and he has succeeded in winning over a small section of the crowd. You are, thus far, unconcerned with the crowd's loyalties.\n          *goto platform\n        *else\n          You know how to use the dart-weighted wires, but every time you try to secure one, it loses its tension. Should the fight come down the side of the scaffolding—and you've seen it before—the sharp, loose wires will make going hazardous for both of you.\n\t\t  \n          When you reach the top, Sun An is waiting, and he has succeeded in winning over a small section of the crowd. The shifting loyalties sting, but you do not take the time to focus on that just yet.\n          *goto platform\n  #I acknowledge the crowd, encouraging their cheers.\n    *set status %+5\n    The crowd has a buzz of energy that makes your heart lighter and gives your confidence a boost. They cheer for you, the local master, and their faith in you fills you with courage.\n\t\n    *goto top\n\n*label platform\n\nYou face Sun An across the platform, and the tall warrior draws his shuang dao, spinning them with what is clearly intended as an intimidating flourish. It is flashy, but rather than intimidate you, it shows you more of Sun An's movement style. The weapons are bladed only on one side, but it is clear from the speed and confidence with which he wields them that he can easily target the bladed side as he chooses. Your best options would be to get in too close for his swords to be effective, to choose a weapon that gives you a longer reach than his, or to keep moving around behind him. All of the shuang dao techniques you have seen rely on forward, side, or over the head striking; given his greater height, the last poses little threat for you.\n\n*choice\n  #I select a guan dao from the weapons cache, choosing to keep him at greater distance.\n    *set weapon \"guan dao\"\n    *if sunan > 60\n      You open the trap door in the platform and withdraw your weapon, and Sun An waits, spinning his swords around him so that they look like lightning at his sides as they catch the sunlight. You present the guan do, holding it over your head in both hands to proclaim that it is the weapon you've chosen for the fight.\n      *goto guan_dao\n    *else\n      You open the trap door in the platform to withdraw your weapon, but as you are lifting the guan dao out of the compartment, Sun An charges. You crouch below the first sweep of his swords and slam the trap door into his shins. He dives over you, coming up in a roll and turning back toward you. You quickly withdraw the weapon before he can attack again.\n      *goto guan_dao\n  #I will fight with daggers—two long knives and several throwing darts to give me long and short options.\n    *set weapon \"dagger\"\n    *if sunan > 60\n      You open the trap door in the platform and withdraw your weapons, wrapping the wrist sheath of darts around your wrist. Sun An waits, spinning his swords around him so that they look like lightning at his sides as they catch the sunlight. You present your two daggers with a flourish.\n\t  \n      Do you make a point of showing the wrist sheath?\n      *choice\n        #No. If he does not notice it, I will have the element of surprise.\n          *set honor %-5\n          After all, if he does not notice it, he cannot possibly be as good a martial artist as the stories say.\n          *goto daggers\n        #Yes, of course. It would not be honorable to do otherwise.\n          *set honor %+5\n          In competitions like this, behaving with honor is almost as important as winning. Almost.\n          *goto daggers\n    *else\n      You open the trap door in the platform to withdraw your weapon, but as you are wrapping the wrist sheath of darts around your wrist, Sun An charges. You throw the first dagger, and he deflects it with one sword while striking at you with the other. You crouch beneath the blow and slam the trap door into his shins. He dives over you, coming up in a roll and turning back toward you. You quickly withdraw your daggers before he can attack again.\n      *goto daggers\n  #I select the whip chain I carried with me from the school, which allows me both long- and close-range options.\n    *set weapon \"whip chain\"\n    You unwrap the whip chain from around your shoulder and present it. While it is still above your head, Sun An charges, trying to get inside your distance range before you can attack. You snap the whip chain at him, the red silk flag at its end fluttering toward the sparking silver of his swords. He bats the whip chain out of the way, and you make a quick pull, tangling his sword and pulling him off balance. As he gets close enough to strike with his free sword, you leap forward and side-kick to his other arm, sending his second sword off target as well. Sun An continues past you and you free your whip chain as your opponent spins his swords around him in a clearing move, giving you both some space to consider what you will do next.\n\n    *label attack1\n    What is your goal as you meet in combat this time?\n    *choice\n      #The faster the fight is over, the better. I am confident that I am the better fighter and seek to disable Sun An quickly.\n        *goto fastfight\n      *hide_reuse #I feel that I should learn more about his style to target his weaknesses. I fight defensively.\n        *goto defense\n      #I want to keep Sun An at the edge of the platform and cause him to lose his balance.\n        *goto edge\n\t  \n*label guan_dao\n\nSun An charges in, and you snap the guan dao in front of you, then step to the side, sweeping his swords away from you, and continuing the arc of your swing around, aiming for Sun An's back as he passes you. But, like you, he moves away from the strike, then swings around to your side. You counter with an upward swing that prevents him from getting close, causing him to leap back and giving you both some distance to consider your next move.\n\n*goto attack1\n\n*label daggers\n\nSun An charges in, and now you send a flurry of the small darts at him. His swords cross in front of him, deflecting your attacks as he closes. You brace your daggers along the inside of your wrists, and as his swords cross into your space, you spin outside his strike, shooting your own blade upward at his wrist. He sees the move and spins away, clearing the space behind him with a broad sweep of his swords and giving you both some distance to consider your next move.\n\n*goto attack1\n\n*label fastfight\nYou come on strong, swinging aggressively and putting Sun An on the retreat. But Sun An has a reputation for being an aggressive fighter as well, and soon you are dancing back and forth, each darting out of the way of the other's attacks.\n\n*if fighting > 75\n  You see the moment for a decisive blow. \n  *if weapon = \"guan dao\"\n    Sun An lunges, his long legs open as he shoots both swords straight on toward your chest. You sidestep, sweeping your guan dao upward at his open pelvis. Do you strike with the blunt side of the blade, or slash with the sharp edge, which could sever his femoral artery?\n    *choice\n      *if (match != \"death\") #I want the fight over quickly, and there are doctors on hand to keep him from death. I strike with the sharp edge.\n        *set honor %-5\n        *set sunan %-5\n        You are willing to risk the dishonor of his death—and the potential legal problems from not signing death waivers—in order to win quickly. You slash upwards, slicing through his pants and biting into his leg, sending a spray of blood upward into the air. To your surprise, however, you also hear the clash of metal; Sun An brought one sword down to deflect the worst of the blow, and though he is certainly wounded, he is unlikely to die from that attack.\n\t\t\n        Really, that should be a legal relief. Sun An darts backwards, allowing himself some space to recover.\n        *set sunanwounds +2\n        *goto slam\n      *if (match = \"death\") #I want the fight over quickly, and we both signed death waivers. I strike with the sharp edge.\n        *set sunan %+5\n        You slash upwards, slicing through his pants and biting into his leg, sending a spray of blood upward into the air. To your surprise, however, you also hear the clash of metal; Sun An brought one sword down to deflect the worst of the blow, and though he is certainly wounded, he is unlikely to die from that attack.\n\t\t\n        Still, it was a good strike, and Sun An allows a flash of worry to cross his face before getting out of the range of your guan dao to recover.\n        *set sunanwounds +2\n        *goto slam\n      #I strike with the blunt side of the blade, willing to break his bone but not cause his death.\n        You slash upwards, feeling the blunt of the blade crash into his leg, which shudders from the impact. You see the moves almost in slow motion—as you continue the sweep through, Sun An brings one of his swords around, using the blunt side of his own blade as a guard, scraping against your guan dao and causing sparks to fly at the impact. The result deflects some of the damage from his leg. As your guan dao swings free, Sun An darts away, treading lightly on the affected leg.\n        *set sunanwounds +1\n        *if match = \"death\"\n          *set sunan %-5\n          *goto slam\n        *else\n          *set sunan %+5\n          *goto slam\n  *elseif weapon = \"dagger\"\n    Sun An crosses his blades in front of him and scissors them outward, leaving the center of his body completely open. Because you are fighting with daggers, almost any strikes you make to the center of his body with your blades are likely to be kill strikes. Are you slashing with the blades, or are you trying to disable with the hilts?\n    *choice\n      *if (match != \"death\") #I want the fight over quickly, and there are doctors on hand to keep him from death. I strike with the blades.\n        *set sunan %-5\n        *set honor %-5\n        You are willing to risk the dishonor of his death—and the potential legal problems from not signing death waivers—in order to win quickly. You block his open arms so that he cannot get the blades back around you, send your knee shooting to his stomach, then turn into him, the blade from your turning arm slicing upward across his chest and neck in a spray of blood. But to your surprise, the cut is not deep—despite the knee to his stomach, Sun An leaned away from the blade as it crossed, falling backwards into a sacrifice roll or sutemi to keep his vital organs from damage.\n\t\t\n        Really, that should be a legal relief. Sun An rolls backwards before standing, allowing himself some space to recover.\n        *set sunanwounds +2\n        *goto slam\n      *if (match = \"death\") #I want the fight over quickly, and we both signed death waivers. I strike with the blades.\n        You block his open arms so that he cannot get the blades back around you, send your knee shooting to his stomach, then turn into him, the blade from your turning arm slicing upward across his chest and neck in a spray of blood. But to your surprise, the cut is not deep—despite the knee to his stomach, Sun An leaned away from the blade as it crossed, falling backwards into a sacrifice roll or sutemi to keep his vital organs from damage.\n\t\t\n        Still, it was a good strike, and Sun An allows a flash of worry to cross his face as he rolls backwards before standing, allowing himself some space to recover.\n        *set sunanwounds +2\n        *goto slam\n      #I strike with the pommel, willing to break his bones but not cause his death.\n        You spring toward him, striking out with the pommels of your blades and connecting with his biceps. You see his expression darken with pain, but do not stop; with your forward momentum, you drive your foot into his knee, then strike quickly with both pommels to his temples—but suddenly, he is not there. He is falling backwards in sutemi—a sacrifice roll—and though your hilts graze his face, he is rolling away to recover some space before facing you again.\n\n        You notice as he stands that he is favoring the leg you kicked, so while you did not break his knee, he felt the impact.\n        *set sunanwounds +1\n        *if match = \"death\"\n          *set sunan %-5\n          *goto slam\n        *else\n          *set sunan %+5\n          *goto slam\n  *else\n    Sun An swings both swords downward at your head. You catch them with the whip chain and wrap his swords together. From here, you could stab the spike to his throat, which would certainly end the fight.\n    *choice\n      *if (match != \"death\") #I want the fight over quickly, and there are doctors on hand to keep him from death. I strike with the spike.\n        *set honor %-5\n        *set sunan %-5\n        You are willing to risk the dishonor of his death—and the potential legal problems from not signing death waivers—in order to win quickly. Keeping the spike in your hand, you send a hammer punch shooting toward his throat, but as your strike grazes his throat, he is falling away in a sutemi—a sacrifice roll. Metal rings against metal as his swords slide out of your whip chain, and he kicks both of his legs up at you, driving you backward and clearing some space for him to recover.\n\n        Really, that should be a legal relief. You hear him cough and see blood seeping from his neck, so you certainly connected before he had a chance to retreat.\n        *set sunanwounds +2\n        *goto slam\n      *if (match = \"death\") #I want the fight over quickly, and we both signed death waivers. I strike with the spike.\n        Keeping the spike in your hand, you send a hammer punch shooting toward his throat, but as your strike grazes his throat, he is falling away in a sutemi—a sacrifice roll. Metal rings against metal as his swords slide out of your whip chain, and he kicks both of his legs up at you, driving you backward and clearing some space for him to recover.\n\n        You hear him cough and see blood seeping from his neck, so you certainly connected before he had a chance to retreat.\n        *set sunanwounds +2\n        *goto slam \n      #I take a different opening in order to avoid possibly killing him.\n        Rather than take the easy strike, you step closer, elbowing his face as you pivot, your back to his side, so that you can land a second elbow on his spine. You elbow with the front arm again, dropping your grip on the whip chain with that hand as you pivot back to strike with an open palm to his chin and send him angling backward into a takedown.\n\t\t\n        As he falls, you see Sun An regain his balance in midair, and his feet shoot out. You dart out of the way of his kicks as he lands, injured but unwilling to let you get the best of him yet.\n        *set sunanwounds +1\n        *if match = \"death\"\n          *set sunan %-5\n          *goto slam\n        *else\n          *set sunan %+5\n          *goto slam\n*else\n  You find that you are evenly matched; he never provides you with an opening you can exploit for a decisive move, though you continue to try for every opening he provides. Finally, Sun An breaks through your guard: while you are striking high, he drops to the ground, spinning on his back and slashing your ankles. His roll continues around behind you, and you feel the blades cut the skin perilously close to your Achilles tendon. You dive forward out of his spiral, leaving a trail of blood behind you.\n  *set wounds +2\n  *goto slam\n\n*label defense\nSun An takes your defensive posture for hesitation, and his moves become flashier as his confidence increases. You can tell that his greatest weakness is his arrogance, and that despite this flaw, his confidence is well earned.\n\n*if fighting > 75\n  And though that confidence is well earned, you are increasingly confident that you are better than he.\n  *goto attack1\n  \n*else\n  And by watching him, you are certain that, with his fighting skills alone, he is better than you are. You will have to outwit him, overwhelm him with your chi, or simply outlast him in order to win. Or you must find a way to concede that he is the winner without losing face entirely.\n  *label betterthanme\n  *choice\n    #I want to keep Sun An at the edge of the platform and cause him to lose his balance.\n      *goto edge\n    #I continue on the defensive, determined to outlast him. When he tires, he will become sloppy, and I will make my move.\n      *if tenacity > 63\n        You keep on, refusing to give Sun An any ground, but never gaining any, either. Finally, he drops his guard, and you make a fast strike to his solar plexus, knocking the wind out of your already hard-breathing foe. Before you can follow up on the attack, he recovers, but having seen one opportunity, you are certain that more will come if you persevere.\n        *set sunanwounds +1\n        *goto slam\n      *else\n        Despite your best efforts, you, too, are tiring. You think you see an opening, but as you are striking out, Sun An sends an elbow shattering into your humerus, disrupting the strike and making a loud enough cracking sound that you think the bone may have suffered a small break. Then both of you are back in the thick of combat, and you are confident that, even if it is broken, you can continue to use the arm for now.\n        *set wounds +1\n        *goto slam\n    *hide_reuse #I meet his eyes, drawing him into a fight of the minds; the rest of the battle will play out without further injury to our bodies and allow for an honorable surrender.\n      *set enlightened %+5\n      There is a long tradition of mind-battles, in which both opponents see clearly what would happen if they were to meet in combat. As Sun An looks at you, the two of you lock gazes, and soon, you see the combat, as real as if you were both still engaged. He is the better fighter, but you continue on in the mind battle, revealing secrets of your style, enticing him with movements you believe he has never seen. You have stopped trying to win, and started attempting to persuade him that combat is not the only measure of your worthiness.\n      *if enlightened > 63\n        *if sunan > 65\n          The mind battle draws to a conclusion, Sun An's swords hesitating as they rest, crossed on your throat. You can almost feel the coolness of their metal against your skin, despite the fact that neither you nor he has moved atop the platform for several minutes. Finally, after an almost agonizingly long time, he removes his swords from your neck.\n\t\t  \n          \"You have an interesting concept of what it means to win,\" he says, sheathing his swords behind his back. And then you are both back atop the platform, where Sun An has indeed put his swords away.\n\t\t  \n          \"I concede this contest!\" Sun An shouts for the whole of the audience to hear. \"${name} is a worthy teacher and upholds the reputation of the Order of the Peach Tree and the school in Kuei Xian.\" He moves to kneel before you. \"${name}, I surrender to you. Accept me as a student.\"\n          *choice\n            #Now that his guard is down, I attack.\n              *set honor %-20\n              *set sunan %-70\n              *set cleverness %+10\n              Your clever ruse was successful, and you strike as Sun An kneels before you, unwilling to let him reveal the truth about which of you is actually the better martial artist. Unfortunately, being without his weapons does not impair his ability to fight. You quickly find yourself as the one at the disadvantage, and as you stumble backwards, completely at his mercy, you wait for the death blow to come.\n              *if match = \"death\"\n                He unsheathes one sword as you lay on the ground, exhausted, at his feet, and stabs you through the heart.\n                *goto_scene death\n              *else\n                As you lie on the ground, exhausted, at his feet, he unsheathes one sword and strikes, pommel down, at your head. \n                *goto unconscious\n            #I graciously accept Sun An as a student.\n              Sun An rises and bows to you, and the audience below cheers.\n\t\t\t  \n              Several hours later, over a meal you share with Sun An, you again reiterate your invitation for him to become your student.\n              *goto sunstudent\n            #I announce Sun An as my peer.\n              *set sunan %+10\n              \"I must refuse,\" you say loudly, and Sun An looks at you in confusion. \"I cannot accept you as my student when we are so well matched. Rather than a concession, let this contest be recorded as a draw, and let us discuss how we can learn from each other.\"\n\t\t\t  \n              The audience erupts in applause as you offer Sun An your hand. He accepts it and allows you to draw him to his feet.\n\t\t\t  \n              Several hours later, over a meal you share with Sun An, you offer him a place at your school, where he could stay and become a teacher alongside you.\n\n              *goto sunteach\n        *else\n          The mind battle draws to a conclusion, Sun An's swords hesitating as they rest, crossed on your throat. You can almost feel the coolness of their metal against your skin, despite the fact that neither you nor he has moved atop the platform for several minutes. \n\n          *label concede\t\t  \n          \"Concede,\" he says. \"I am clearly
