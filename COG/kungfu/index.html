ou have not so strongly won the favor of the Heavens that they would support you, and depose their already chosen son. There must be another cause to which you can devote yourself, or you will never attain that which you desire.\n      *goto greatestfighter\n  *hide_reuse *if (style != \"Celestial Sword\") #I would depose the ineffective Emperor and succeed where he has failed, expanding the borders of our glorious Empire.\n    The current Emperor has done little but cater to the whims of others; what the Middle Kingdom needs is a strong guiding hand, and you are the one to provide it. By proving yourself as the greatest warrior, you will show that you are the Chosen of Heaven, and none will question your authority.\n\t\n    *if tianxia > 75\n      The Dragon Sage nods its huge head. \"Such a path will lead you to great strife, and you will never again know peace. Each day will be a battle. Is this truly the life that you choose?\"\n      *choice\n        #The struggle will only keep me strong. This is my choice.\n          *set fighting 100\n          *set magic 100\n          The Dragon Sage holds your eyes with its own, which seem to look right through you. \"I see that you believe in this cause with passion. I will train you for nine days and nine nights, and when you descend, the foreigners will tremble at your might.\"\n\t\t\n          Nine days and nine nights pass by with no sleep and no food, but you find that you need neither of these things. The Dragon Sage is sustaining you with its divine breath, and as it teaches, you are learning. You had thought yourself advanced before; now you see whole doors of the universe opened before you, in the arts of magic and of physical combat. Your training feels as though it has just begun, but at the same time, it feels as though it has been going on your whole life.\n\t\t\n          \"You have the keys,\" the Dragon Sage says finally. \"Go open the doors.\"\n\t\t\n          When you return to the other monks, they can see the change the Dragon Sage has wrought in you. \"The Heavens have blessed me to become the next Emperor,\" you say. They gasp in shock, and a few of them—your allies and peers—immediately attack you for your blasphemy. But you are the Chosen of Heaven, and they fall before you, like so many others will. You see the future before you: a constant battle, even after you claim the throne. The Middle Kingdom will be divided into factions for a time, but you will forge them into a new weapon. United, you will expand the borders of the Middle Kingdom until they are so vast the sun will never set on your Empire.\n          *goto_scene ending\n        #I want peace within, even if I do not have peace surrounding me. There must be another path.\n          *goto greatestfighter\n    *else\n      The Dragon Sage shakes its huge head. \"You have not so strongly won the favor of the Heavens that they would support you, and depose their already chosen son. There must be another cause to which you can devote yourself, or you will never attain that which you desire.\n      *goto greatestfighter\n*label imperial3\nWhat role best suits your future?\"\n*label imperial4\n*choice\n  #A respected scholar, whom even the Emperor seeks for advice.\n    *set cleverness 100\n    *set tianxia 100\n    The Dragon Sage nods, then breathes on you. You feel the divine energy wash over you, filling you with confidence and, you quickly realize, a sharper intellect. \"Then go on as you have before, Scholar ${name}, and you will find that soon, your name will become synonymous with cleverness and wisdom.\"\n\t\n    You quickly realize the weight of this gift. Everything you say will be listened to and judged by others; everything you write will be analyzed by critics, and perhaps, in the future, studied by future scholars. \n    *label balance\n\t\n    You bow deeply to the Dragon Sage, pressing your forehead to the ground, and when you rise, the dragon is already flying back into the heavens. But as you watch the sun glint off those carplike scales, you are filled with confidence. There will be balance, and you will serve as the conduit. And as you descend the mountain, you feel as though your place in tianxia—all the world under heaven—is exactly where it should be.\n    *goto_scene ending\n  #An Imperial advisor, whom the Emperor uses as primary counsel.\n    *set cleverness %+80\n    *set enlightened %+80\n    *set tianxia 100\n    The Dragon Sage nods, then breathes on you. You feel the divine energy wash over you, filling you with confidence and, you quickly realize, a sharper intellect and a greater insight. You realize that the Dragon Sage wants the Heavens and the Middle Kingdom to be aligned, and in asking this question and choosing this role, you are fulfilling its wishes as well. \"The path before you will be a dangerous one,\" the Dragon Sage warns. \"The Imperial Court is difficult to navigate even at the best of times. But your cleverness and your intuition will guide you, and the Emperor will come to rely on your judgment.\"\n\t\n    You quickly realize the weight of this gift. You will be under the scrutiny of the most powerful members of the Imperial Court, and many will be looking for a way to remove you from the equation. It will not be an easy path, but you are prepared to walk it without fear.\n    *goto balance\n  #A general in the Imperial Army, whom the Emperor relies upon for matters of state.\n    *set cleverness %+80\n    *set fighting %+80\n    *set tianxia 100\n    The Dragon Sage nods, then breathes on you. You feel the divine energy wash over you, filling you with confidence and, you quickly realize, a sharper intellect and faster reflexes. You can tell without moving that your muscle memory is stronger than it had been, and that you are already a more capable fighter. \"The path of a warrior is always fraught with peril,\" the Dragon Sage warns, \"but your skill in combat and your flawless tactics will ensure you a high rank in the Imperial Army. The Emperor will realize your value, and will come to rely on your judgment.\"\n\t\n    You quickly realize the weight of this gift. Before, as a warrior, only your reputation and that of your students relied on your performance. Soon, you will be leading not a small group of students, but legions of the Imperial Army. Life and death will hang on your decisions, and you must have the faith that you will make the right ones.\n    *goto balance\n  #A leader in the Order of the Peach Tree—who will build firmer ties to the Emperor.\n    *set enlightened %+80\n    *set tianxia 100\n    *set tenacity %+80\n    The Dragon Sage nods, then breathes on you. You feel the divine energy wash over you, filling you with confidence and, you sense, a greater determination and a better understanding of the world and the creatures in it. You realize that the Dragon Sage wants the Heavens and the Middle Kingdom to be aligned, and in asking this question and choosing this role, you are fulfilling its wishes as well. \"Go on as you have before, ${name}. As the chosen monk to speak with me, you are already well on your way to becoming the heir of Abbot Bao.\" The great tiger paw comes to rest on your shoulder, the eagle talons from its four toes lightly piercing your skin. \"Be the voice of wisdom in your Order. Do not let the Emperor ignore that voice, and he will come to respect you.\"\n\t\n    The weight of this gift settles on you, and you think of the years ahead of you, guiding the future of the Order—and, through it, the Middle Kingdom. You must never give up in this task, and as long as your will holds firm, there will be balance.\n    *goto balance\n  *hide_reuse *if (style = \"Celestial Sword\") #The Emperor. The rule of the Middle Kingdom is in my blood, and I will succeed the Emperor as its leader.\n    *if tianxia > 70\n      *set status 100\n      *set tianxia 100\n      The Dragon Sage nods, then breathes on you. You feel the divine energy wash over you, filling you with confidence. \"You are of the same blood as the Son of Heaven,\" the Dragon Sage intones. \"When his time has ended, it is you who will take his place. The Imperial Court will be difficult to navigate—but you have the blessing of Heaven, and you will not be denied.\"\n\t\n      The final words the Dragon Sage speaks echo with thunder, and the ground shakes around you. You know that all of tianxia—the whole world under Heaven—has been informed of your status. The weight of this gift makes your heart heavy for a moment, but you know that the heavens will guide you, and that, through you, the Middle Kingdom will align with the will of Heaven.\n      *goto balance\n    *else\n      The Dragon Sage shakes its huge head. \"Though the blood of the Imperial family runs through your veins, you have not so strongly won the favor of the Heavens that they would support you, and depose their already chosen son. There must be another role in which you can see yourself, or you will never attain that which you desire.\"\n      *goto imperial4\n  *hide_reuse *if (style != \"Celestial Sword\") #The Emperor. This dynasty nearly brought the Middle Kingdom to ruin; I will return us to glory.\n    *if tianxia > 75\n      *set status 100\n      *set tianxia %+80\n      The Dragon Sage looks at you for a long time before it nods, then breathes on you. You feel the divine energy wash over you, filling you with confidence. \"You have seen what many in the Heavens have not: that the time has come for the blessing of Heaven to rest on someone who still seeks the will of Heaven. This path will not be easy, and it will take many long years and many great battles for you to succeed. The Middle Kingdom will be broken before it can be restored.\"\n\t\n      You have a flash of all the lives that will end because of your choice. But you know that the Middle Kingdom needs an Emperor who will obey the Heavens, and you are confident that you are that person.\n      *goto balance\n    *else\n      The Dragon Sage shakes its huge head. \"You have not so strongly won the favor of the Heavens that they would support you, and depose their already chosen son. There must be another role in which you can see yourself, or you will never attain that which you desire.\"\n      *goto imperial4\n", "return": "*temp guns false\n*temp preemptive false\n*temp sabotage false\n*temp ammunition false\n*temp negotiate false\n*temp negotiate2 false\n*temp imperial2 false\n*temp rebel2 false\n*temp difficultyModifier 0\n*temp negotiateDifficultyModifier 0\n*advertisement\n\n\nThe leaves have fallen from the cherry trees in your courtyard, and the chill in the air announces the approach of winter. More than a year has passed since your battle with Sun An, and you find your thoughts frequently returning to the Order of the Peach Tree.\n\nPerhaps it is a premonition.\n\n*if romance = \"Lu Jin\"\n  You develop an uneasy feeling, one you are sure would be more settled if Lu Jin had returned from ${rivalhis} latest mission for the Blue Scarves Rebellion. They should have returned days ago, but neither you nor Deng Ping has received word of their whereabouts.\n  \n  *goto feng\n*else\n  *goto feng\n\n*label feng\nOn a chilly afternoon, Feng, wearing the shape of a single-tailed fox—warmer, she says, than her human guises—enters your room with a scroll in her mouth. She drops it on the floor and gives you a fox's smile, tongue lolling out from between her teeth.\n\nDespite some lingering saliva and the bite-marks creasing the sealing wax, it is clear from the symbol pressed into the seal that this is a letter from the Order. It may well contain your summons to return to the monastery.\n\n*choice\n  #I am in no hurry to open the letter.\n    The Order waited for eleven years to summon you; clearly they are in no hurry to have you back. Likewise, you are in no mood to hurry to accommodate them. You leave the scroll unopened in your room for several days before you finally open it.\n    *goto open\n  #I am eager to read news from the monastery, and to return if called.\n    If your body were less honed to your control, you are sure your fingers would be trembling as you cracked open the seal.\n    *goto open\n  #I hesitate for a moment before opening the letter.\n    Odds are good that once you open the letter, life as you know it will change again. You take a moment to appreciate what you have learned over the past decade before cracking open the seal.\n    *goto open\n\t\n*label open\n\nThe letter reads:\n\n\"To my student, ${name},\n\n\"All at the Order hope this message finds you well. I send my apologies for waiting so long to call for your return. Things have been unsettled here, and I was hoping that matters could be better resolved before adding additional voices—and tempers—to the mix. Sadly, the situation has only become worse in recent days, and I find myself calling all of our wandering monks to return to the monastery, to face what may be the largest challenge the Order has ever encountered. \n\n\"As you are aware, the foreign presence in the Middle Kingdom has grown over the last twenty years. The Order has always followed the lead of the Son of Heaven in our actions with the foreigners and maintained an aloof stance toward these worldly affairs. But the world has come to our door, and we can ignore the foreign presence no longer. A small army of the foreigners is gathering to the east, setting up camp between the monastery and Xiaonanhai. Though we have sent word to the Emperor of the growing force on our doorstep, we cannot be sure that any of our messengers have made it past the army. Though they have not yet delivered terms, it is clear that if we do not surrender our resources—and possibly the monastery itself—they will attack.\n\n\"You are called upon to return to the Order immediately, with any resources that will aid our plight. I maintain hope that this can be resolved peacefully, or that help will arrive from the Son of Heaven, but we must be prepared for things to go otherwise.\n\n\"Abbot Bao\"\n\n*page_break\n\nThe abbot's letter is sobering; if the foreigners do attack the monastery, it will be their first prominent target beyond the villages they have already claimed. Such a display will make it clear that they do not intend to assimilate to the Middle Kingdom, but forge their own society in spite of the Emperor and his laws.\n\n*choice\n  #This outcome is unsurprising, based on the previous behavior of the foreigners. The Order should have been better prepared.\n    *set cleverness %+5\n    Scholars of war have written that it is a crime to be caught unprepared, and the greatest of virtues to prepare for all contingencies. Scholars of harmony, however, maintain that preparing to defend yourself is folly. In the face of a pending attack, you are inclined to agree with the great generals.\n\t\n    Based on Abbot Bao's letter, however, it is clear that the Order was caught unprepared, or you and the other wandering monks would have been called home long before.\n    *goto prepare\n  #Surely if the foreigners were so great a threat, the Emperor would intervene. Like Abbot Bao, I hope for a peaceful resolution.\n    *set enlightened %+5\n    Though it is hard to dismiss an army at the gate as a simple misunderstanding, you have faith in both Abbot Bao's policies of noninterference and the Emperor's own attitude toward the foreigners. Surely there is a way to bring this potential conflict to a peaceful resolution.\n    *goto prepare\n  #The Emperor has been too lax in dealing with the foreign threat, but perhaps a peaceful solution can be found.\n    *set enlightened %+5\n    The Emperor has certainly not delivered clear boundaries for the foreigners, given the way they have treated the people of the Middle Kingdom whose lands they have taken. If the Emperor is not willing to make that clear, perhaps the Order can draw some of those lines and defend all of the Middle Kingdom through negotiation.\n    *goto prepare\n  #The Order must dig in and defend the monastery, whether or not it comes to fighting.\n    *set tenacity %+5\n    You are less concerned with how things got to this degree of hostility and more concerned with not allowing the foreign army to have an inch of ground. The monks have been at the monastery for hundreds of years; far too much history is there to simply give up in the face of adversity.\n    *goto prepare\n\t\n*label prepare\n\nHow will you return to the Order?\n*choice\n  *if (rebel) #I gather my students and members of the Blue Scarves Rebellion to bring a small army of my own into play.\n    *set rebel2 true\n    Your connection with the Blue Scarves Rebellion has given you access to a large number of fighters—not all of them trained, and some of them of questionable moral character. But despite those flaws, you know you can rely on Deng Ping to bring a force to aid the monastery.\n\t\n    *goto students\n  *if (imperial) #I gather my students and hire some of Governor Rong's guards, then write the governor a letter asking him to intercede.\n    *set imperial2 true\n    Your connection to the Governor has given you access to monastery resources you would not otherwise have, and you are able to hire some of the guards who work for the governor and his family when he lives in the summer estate in Kuei Xian. Due to the season, the governor is not present, and you send him word, explaining your plight. Perhaps he will be able to speak with the Emperor on your behalf—or ask his son Rong Jue, a commander in the Imperial army, to plead your case.\n    *set disciples +10\n    \n    *goto students\n  #I gather my students together and ask them who will come to fight on behalf of the Order.\n    *label students\n    You call all of your students together and explain the situation. Though some of them wear fear in their expressions, others meet your news with determination to prove their worth.\n    *if honor > 70\n      Despite the fear some of them show, however, all are willing to follow you wherever you lead them. You instruct everyone to pack whatever they wish to take with them; you will be leaving in the morning. The following dawn, all are ready with slim bags, their weapons of choice, and small packages with warm buns provided by Feng, wearing the form of a human servant. The fox spirit will be staying in Kuei Xian.\n\t  \n      *label romance\n      *if romance != \"None\"\n        *if romance = \"Lu Jin\"\n\t\t\n          Feng has pledged to send word to you as soon as Lu Jin returns, and you take comfort in knowing that the fox spirit will be waiting for ${rivalhis} return.\n\t\t  \n          *label sun\n          *if sunanstay\n\t\t  \n            Sun An, however, has pledged to accompany you—for the glory of the fight, he says, more than any cause. Regardless of his motive, you are glad to have him at your back.\n            *goto hittheroad\n          *else\n            *goto hittheroad\n        *elseif romance = \"Feng\"\n\t\t\n          From here, she will keep your affairs in order; once the matter with the foreigners has been resolved, you can decide what will happen with the courtyard house and the life you have built in Kuei Xian.\n          *goto sun\n        *else\n\t\t\n          ${romance} will also be staying behind in safety, keeping your affairs in Kuei Xian in order. Once the matter with the foreigners has been resolved, you can decide what will happen with the courtyard house and the life you have built in Kuei Xian.\n          *goto sun\n      *else\n        *goto sun\n    *else\n      *set disciples -15\n\t  \n      You tell everyone to pack what they wish to take with them, and that you will be leaving in the morning. But as dawn comes, you see that many of your students have not gathered. It appears their fear is stronger than their loyalty, and you will be bringing a much smaller force with you to the monastery. Feng, in her guise as a human servant, gives each student a small package filled with warm buns. The fox spirit will be staying in Kuei Xian.\n      *goto romance\n  #I do not wish to put anyone else in danger; I will travel to the monastery alone.\n    *set enlightened %+5\n    Despite your best efforts, your students soon discover your intention to leave, and someone—most likely a nosy fox spirit—has provided them with the details of what is transpiring at the monastery. You know you must stop further rumors before they start.\n    *goto students\n  *hide_reuse #I have no interest in returning to the monastery. My life is here now; the Order can fend for itself.\n    *set honor %-10\n    You have grown fond of life in Kuei Xian. In the ten years since you left the Order, this life has become more real to you than your years at the monastery.\n\n    Of course, if you refuse to return, you could forfeit the possibility of being chosen to consult the Dragon Sage.\n    *choice\t\n      #I truly am content with my life. I feel no need to pursue my early ambitions.\n        *set tianxia %-15\n        You close the letter from the monastery and ignore it. Life goes on much as it has before, and though you worry some over the fate of your old teachers, you are too involved in the lives of your students to dwell on it for long.\n        *if tianxia > 60\n          About a month later, you receive another letter from the monastery. The letter assumes that the first was unable to reach you, but bears good news: the foreign army that threatened the monastery was fended off through a combination of battle and negotiation. Abbot Bao requests the presence of all wandering monks for a meeting to discuss the terms of that negotiation.\n          *choice\n            #I attend the meeting.\n              You make the journey to the Order of the Peach Tree, but your thoughts are still on your home in Kuei Xian. Luckily, none of the wandering monks are being recalled, so you will be able to return home after the meeting.\n\t\t\t  \n              The terms of the agreement with the foreigners, however, does have some changes in store for you. Abbot Bao has agreed to offer martial training to a select number of foreigners in schools, or under masters, outside the monastery. You are one of those whom the monastery has chosen for this role. You will receive a few students in the coming months—the very light-skinned foreigners who so recently threatened the monastery—or you will no longer be considered a member of the Order.\n              *choice\n                #I refuse to train foreign barbarians!\n                  A noble stance, but if you felt so strongly, perhaps you should have helped to fight them off. If you refuse now, you will be expelled from the Order and stand no chance at questioning the Dragon Sage.\n                  *choice\n                    #I stick by my decision. I am happy with my life in Kuei Xian and no longer need the Order.\n                      *goto yearspass\n                    #I acquiesce. Better to remain a member of the Order and have the possibility of meeting the Dragon Sage.\n                      *goto acquiesce\n                #I agree to the terms. I am not concerned about the political implications.\n                  It does not matter to you who your students are, so long as they are worthy to be taught.\n                  *label acquiesce\n                  To your surprise, you find that the foreigners who are sent to study under you are capable and willing to learn. You soon stop distinguishing them from your other students, though they never show you quite the devotion that you have received in the past. Still, you are glad that life has largely returned to normal.\n                  *finish Chapter Seven: The Imperial Challenge\n                #I am glad to take on foreigners as students; if they can learn our ways, perhaps they can assimilate into our culture.\n                  *set enlightened %+5\n                  *set tianxia %+10\n                  Despite the initial cultural and language gaps you face with your new students, they quickly surprise you as individuals who are capable and willing to learn. You soon stop distinguishing them from your other students, though they never show you quite the devotion that you have received in the past. Still, you are glad that life has largely returned to normal.\n                  *finish Chapter Seven: The Imperial Challenge\n            #I do not attend the meeting. I am happy with my life in Kuei Xian and no longer need the Order.\n              *label yearspass\n              The years pass. Life continues on much as it did before in Kuei Xian, and for the most part, you do not think of the Order or the grand destiny you once hoped to achieve. You learn that an Imperial Challenge was held in the capital, and that a representative of the Order was chosen to fight for the honor of the Middle Kingdom. Later, you realize that the time has come for the Dragon Sage to descend, and you watch the heavens to see if you can spot the dragon for yourself. One day, you believe you may have seen it—but it could also have been a trick of the light.\n              *goto_scene ending\n        *else\n          You later hear that the monastery has survived the attack of the foreign army, but only by surrendering. The foreign leader now occupies the monastery, and though the peach tree—and Master Shen, rumors say—are safe, most of the monks have been scattered. In fact, because the Order has officially been disbanded, that makes you one of the few remaining monks of the Order who have not surrendered.\n          *finish Chapter Seven: The Imperial Challenge\n      #I do not want to sacrifice my chance of meeting the Dragon Sage. I will go.\n        *goto prepare\n\n*label hittheroad\n*page_break\nYou and your company start traveling east toward the monastery. It is a three-day journey directly to the Order of the Peach Tree, which gives you some time to decide which actions you will take, or which course of action you will advise, when you arrive. As you are traveling, you encounter a few messengers and merchants heading toward Kuei Xian; they are able to provide you with updated news since the delivery of your letter.\n\nThe foreign army is led by a man named George Gower, who is supposedly a fearsome warrior, though the rumors vary as to his origin. Some say he was an outlaw before he came to the Middle Kingdom, while others swear that he is a representative of a foreign government. Still others call him an explorer who landed on the Middle Kingdom's shores and paved the way for more foreign settlers to arrive.\n\nGower's forces have moved in on the monastery, making it difficult for anyone to travel to or from the Order of the Peach Tree. Based on what you are told, someone who knows the terrain as well as you once did—and, hopefully, still do—should be able to find a path around their location. \n\nHow will you approach the army?\n*choice\n  #We will avoid the army and go straight to the monastery.\n    After your first day of travel, you shift to traveling mostly under cover of darkness. On the third night of your journey, you reach the hills below the monastery. \n    *set cleverness %+5\n    *if cleverness > 65\n      Luckily, your memory is good, and you are sure of the paths back through the bamboo forest leading up to the monastery's gate.\n      *goto monastery\n    *else\n      But though you spent years doing chores in these bamboo-forested hills, the darkness and your years away from the monastery leave you confused. Instead of reaching the gates of the monastery, you arrive at an overlook from which you can see the fires of Gower's army. They look nothing like the organized Imperial Army—instead, they are dressed in a variety of foreign clothing, with nothing resembling a uniform. There is very little that resembles armor, but then, you do not wear armor, either. What is distressing about their encampment is that you see a number of cannons and hand cannons—supplies commonly used by the Imperial Army, though of a different style.\n\t  \n      The Order of the Peach Tree, with their reliance on the physical and spiritual arts of battle, has nothing like cannons at the monastery.\n      *choice\n        #Go back into the bamboo forest and make another attempt at finding the monastery gate without being seen.\n          *set tenacity %+5\n          *if tenacity > 65\n            Your second attempt is more out of stubbornness than memory, but you soon find your way up through the bamboo to the monastery's gate.\n            *goto monastery\n          *else\n            Your second attempt to make it to the monastery gate is no more successful than the first. Worse, it puts you right in the path of a pair of outlying foreign scouts. They are as startled to encounter you as you are to happen into them, which gives you a moment to turn the situation to your advantage.\n            *choice\n              #My followers and I can kill two scouts silently before they can raise the alarm.\n                *set fighting %+5\n                *if fighting > 70\n                  *set guns true\n                  You move to attack, much faster than these foreigners have seen their adversaries move. As they raise their weapons—hand cannons with blades attached to their ends—you and your followers have already closed. You move inside the range of the hand cannon and sweep it upward, driving the scout's arms up as well, then strike your palm under his chin to drive him backward onto the ground, planting your heel behind his closest foot. As he hits the ground, you strike his forehead, crashing his skull into the ground and opening his throat, which you strike with an eagle talon to break his windpipe.\n\t\t\t\t  \n                  Two of your students have made short work of the second guard, equally silently. You retrieve the weapons the scouts carried and carefully add them to your own supplies.\n\t\t\t\t  \n                  Eventually, you find the right path to the monastery, arriving at the gates shortly before dawn.\n                  *goto monastery\n                *else\n                  *set guns true\n                  *set preemptive true\n                  *set negotiateDifficultyModifier +5\n                  *set disciples -1\n                  You and your followers move in to attack, but one of the scouts has a quicker reaction time than you anticipated. Just as you are closing to attack, he fires his weapon—a hand cannon with a blade attached to the end—and though the shot misses you, one of your students drops to the ground, blood pouring from his side.\n\t\t\t\t  \n                  You move inside the range of the fired hand cannon and sweep it upward, driving the scout's arms up as well, then strike your palm under his chin to drive him backward onto the ground, planting your heel behind his closest foot. As he hits the ground, you strike his forehead, crashing his skull into the ground and opening his throat, which you strike with an eagle talon to break his windpipe. Two of your students have dealt with the other guard. But the noise from the cannon fire is sure to bring other foreigners this way.\n\t\t\t\t  \n                  You grab the guns and fade back into the bamboo forest. Eventually, you find the right path to the monastery, arriving at the gates shortly before dawn. The sounds of foreigners in the bamboo forest grow louder as the light of day reveals the bodies you left behind.\n                  *goto monastery\n              #I whistle for my students to leap into the bamboo; we can attack the scouts from above.\n                *set magic %+5\n                *set guns true\n                *if magic > 70\n                  You and your followers leap into the bamboo. Your disappearance startles the scouts, and the two huddle next to each other, aiming their weapons—hand cannons with long blades attached to the end—into the shadows. They never look above them, so they do not see the bamboo spears hurtling down as you and a few of your students glide down the bamboo to strike into their shoulders from above. With two bamboo spears piercing each heart, the scouts drop to the ground.\n\t\t\t\t  \n                  You return to the ground, retrieving their weapons and carefully adding them to your own supplies. Eventually, you find the right path to the monastery, arriving at the gates shortly before dawn.\n                  *goto monastery\n                *else\n                  *set preemptive true\n                  *set negotiateDifficultyModifier +5\n                  *set disciples -1\n                  You and your followers leap up into the bamboo, but not fast enough to evade the shot of one of the scout's weapons—a hand cannon with a long blade attached to the end. The shot is strong enough to send one of your students hurtling off the bamboo and crashing to the ground. With a shout, you and three of your students glide down on top of the scouts, each wielding a bamboo spear. Your weight atop the spears sends the scouts crashing to the ground, their bodies pierced through. You have defeated your foes at the cost of one of your own students, and the noise from the cannon fire is sure to bring other foreigners this way.\n\t\t\t\t  \n                  You grab the guns and fade back into the bamboo forest. Eventually, you find the right path to the monastery, arriving at the gates shortly before dawn. The sounds of foreigners in the bamboo forest grow louder as the light of day reveals the bodies you left behind.\n                  *goto monastery\n              #I whistle for my students to leap into the bamboo—we will evade the scouts and travel to the monastery from above.\n                *set magic %+5\n                *if magic > 50\n                  The foreigners are clearly among those uneducated who see such feats of energy manipulation as magic. You notice them making superstitious signs as you and your followers fade into the shadows. Eventually, you find the right path to the monastery, arriving at the gates shortly before dawn.\n                  *goto monastery\n                *else\n                  You make the move to leap into the bamboo, but your command of the spiritual energies required for this technique is simply not strong enough, and you and your students—who are only as skilled as you have been able to teach them—instead flee along the ground. The shadows aid you in hiding, but the scouts fire their weapons—hand cannons with long blades attached to the ends—at you. It is through sheer luck that none of you are injured.\n\t\t\t\t  \n                  Eventually, you find the right path to the monastery, arriving at the gates shortly before dawn.\n                  *goto monastery\n              #I come out into the open, requesting to be taken to their leader.\n                *set enlightened %+5\n                \"Greetings,\" you say, holding your hands open in a position you hope they will view as peaceful. \"I am ${name}, a monk of the Order of the Peach Tree. I am hoping to converse with George Gower.\"\n                *goto contact\n        #I want to sabotage their camp.\n          *goto sabotage\n        #We are clearly facing more dangerous distance weapons than we have available to us. I want to seek out Gower to negotiate.\n          You send most of your followers in the direction of the monastery, taking only a few to accompany you into the enemy camp. The perimeter guards see you coming and greet you in their foreign tongue, probably calling for you to halt.\n\t\t  \n          \"Greetings,\" you say, holding your hands open in a position you hope they will view as peaceful. \"I am ${name}, a monk of the Order of the Peach Tree. I am hoping to converse with George Gower.\"\n          *goto contact\n        #I want to get closer so that we can gather better firsthand information about the foreigners.\n          *goto scout2\t\t\n  #I want to get firsthand information about the foreigners. We will scout their army before going to the monastery.\n    You make your way down to the outskirts of the foreign camp. \n    *goto scout\n  #I want to meet Gower for myself. We will make contact with the army in the open.\n    You send most of your followers in the direction of the monastery, taking only a few to accompany you into the enemy camp. The perimeter guards see you coming and greet you in their foreign tongue, probably calling for you to halt.\n\t\t  \n    \"Greetings,\" you say, holding your hands open in a position you hope they will view as peaceful. \"I am ${name}, a monk of the Order of the Peach Tree. I am hoping to converse with George Gower.\"\n    *goto contact\n\t\n*label scout\nYou time your arrival to the hills below the monastery so that you can see the foreign army as dusk is falling. You and your company keep off of the road and travel through the bamboo forest that lies in the hills beneath the home of the Order. Gower's army looks nothing like the organized Imperial Army—instead, they are dressed in a variety of foreign clothing, with nothing resembling a uniform. There is very little that resembles armor, but then, you do not wear armor, either. What is distressing about their encampment is that you see a number of cannons and hand cannons—supplies that are commonly used by the Imperial Army, though of a different style.\n\t  \nThe Order of the Peach Tree, with their reliance on the physical and spiritual arts of battle, has nothing like cannons at the monastery.\n\n*label scout2\nFrom within the shadows, you can see that the size of the army has not been exaggerated. Probably five hundred men are here; though that is a small force compared to the Imperial Army, the monks and students that live at the monastery would be facing odds of five to one. Even with the support you bring, the odds are bleak. One outright fight could be disastrous if the men are skilled at combat, especially given their likelihood of bringing those explosive weapons into play.\n\n*choice\n  #I have seen what I want to see. From here we can cut over to the path that leads to the monastery without being noticed.\n    *set cleverness %+5\n    Your location is reasonably close to the monastery path, and you are able to parallel it from inside the bamboo forest until you are out of range of both the army and Gower's scouts. You reach the gates of the monastery without further complications.\n    *goto monastery\n  #I want to sabotage their camp.\n    *goto sabotage\n  #I am concerned about those cannons. I want to seek out Gower to negotiate.\n    You send most of your followers in the direction of the monastery, taking only a few to accompany you into the enemy camp. The perimeter guards see you coming and greet you in their foreign tongue, probably calling for you to halt.\n\t\t  \n    \"Greetings,\" you say, holding your hands open in a position you hope they will view as peaceful. \"I am ${name}, a monk of the Order of the Peach Tree. I am hoping to converse with George Gower.\"\n    *goto contact    \n\n*label sabotage \n*set cleverness %+5\n*set honor %-5\n*set sabotage true\nOne way to even the odds is to sabotage their camp. Even though this could be considered dishonorable, you feel it is the best way to keep the foreigners at bay and keep the Order safe. From what you have heard about the way the foreigners have treated the people of the Middle Kingdom, what do they know about honor anyway? \n\nAt the Order, you were trained to walk silently, even over rice paper, and to move through shadows without being seen. You have taught these skills to your students as well, and you fade back into the bamboo forest to make your plan.\n*choice\n  #Collect poisonous insects and spiders from the forest and release them in the camp.\n    *set tenacity %+5\n    A number of poisonous creatures live in the bamboo forest, which you and other students at the Order were taught to avoid early in your training. However, some medicines can be made from the venom of these creatures, and so later in your studies you were also taught to collect these creatures. Very carefully.\n\t\n    There is little time for you to fully train your followers in how to safely gather such creatures, and one night is hardly enough time to collect a stockpile that will really threaten the foreign army. Your determination to find at least some specimens in the dark pays off. After you have found the burrows of a few wolf spiders, some golden earth tiger spiders, and one angry bird spider; collected a number of scorpions and giant red-headed centipedes; and found a pair of multibanded krait snakes, you think you have a good start to causing, if not widespread injury, a sense of panic and paranoia among the foreign troops. You get close to the edges of the foreign camp and slip creatures under the edges of their tents.\n\t\n    Your efforts pay off in the early morning hours, when you hear the screams of men no doubt finding scorpions in their shoes. Given that the venoms can cause nerve damage and paralysis in the case of the bird spider, numbness and difficulty breathing from the kraits, extreme pain from the centipedes, and swollen joints from the wolf spiders, you suspect that if any injuries get through before the creatures are killed, the foreigners will be looking around nervously everywhere they step. You head up to the monastery feeling as though your night has been well spent.\n    *goto monastery\n  #Find their outhouses and poison their water supply.\n    *set cleverness %+5\n    *set preemptive true\n    *set negotiateDifficultyModifier +5\n    Unfortunately, the main water supply for the army camp, as for the monastery, is the river. Even more unfortunately, the army camp is between the monastery and the normal place students are sent to gather water. Clearly, the monks have access to the source of the river in the mountains, but the easy access they once took advantage of is no longer available.\n\t\n    However, you are able to find a number of casks containing a foul smelling alcohol that you can only assume is for drinking. After collecting resources from the outhouses, you and your followers make your way to the army's collections of food and drink, spreading the ample and wretched-smelling makeshift poison before fading back into the bamboo forest. You and your followers bear the taint of your work, but you are confident that the foreigners will at least have to replenish their supplies. You head up to the monastery feeling as though your night has been well spent.\n    *goto monastery\n  #Set their ammunition on fire.\n    *set cleverness %+5\n    *set preemptive true\n    *set negotiateDifficultyModifier +5\n    The biggest threat you see from this foreign army comes not from their numbers, but from their weaponry. The Imperial Army has been using gunpowder for centuries, particularly in fighting off the horse barbarians from the western plains. But though the Imperial Army has long used it, the weaponry has not been released beyond the jurisdiction of the Emperor. You have rarely seen such weapons used, but you are well aware of their destructive force.\n\t\n    Now you seek to use that destructive force for your own means. Clearly, the ammunition and supplies of gunpowder are not kept at the edges of the camp, so this ruse requires you to go deeper into the army's encampment than any of your other plans. It will take all your tactical ability to get in and out without being discovered.\n    *choice\n      #I send half my followers to make a distraction at the far south side of the camp. From there they can disappear into the marsh.\n        *if cleverness > 65\n          You give half of your followers clear instructions on where to strike, and then to lead the foreigners into the marsh. If you are lucky, some of the foreigners will lose their step and fall victim to the marsh themselves. If you are lucky, none of your students will get lost in the marsh.\n\t\t\n          The signal for the rest of you to sneak into the camp is obvious—one of your students screams a battle cry, and the rest join in. There's a clash of metal, followed by a few blasts of hand cannon, as the rest of the camp moves into action, headed toward the sounds of battle. You hope that your students have followed your instructions to retreat as soon as they are spotted.\n\t\t  \n          Though the camp is not emptied, there are far fewer eyes to see the rest of your followers sneaking in toward the munitions stores. You spot a few locations for the cannons and their gunpowder, so you divide into groups. Once you are in place, you give the signal—the warble of a red-crowned crane—and when you hear the answering calls, you take a pinewood stick with sulfur at its tip and light a cloth leading to the crates of gunpowder. Then, you run.\n\t\t  \n          A trio of explosions rocks the camp as you and your followers fade into the bamboo forest. You climb higher into the forest, hoping to get a look at the camp—clearly, they have called off any pursuit into the marsh as they try to put out the fires you have set. You regroup with the followers who led the diversion and are delighted to find them all without wounds. You make your way to the monastery feeling as though your night has been well spent.\n          *set ammunition true\n          *goto monastery\n        *else\n          You give half of your followers clear instructions on where to strike, and then to lead the foreigners into the marsh. If you are lucky, some of the foreigners will lose their step and fall victim to the marsh themselves—and none of your students will get lost.\n\n          You are confident that the plan is a good one—but you did not anticipate how difficult it would be to convince the foreigners to leave their posts. Something about the challenge you hear one of your students yell sets them on edge, and though many of them do leave the camp to follow your students, several stand guard, making it difficult to slip into the camp unnoticed. You manage to get into position at the largest stock of munitions, but as you prepare to light a cloth with a pinewood sulfur stick, you hear something called out in the foreign tongue. You and your followers are surrounded and outnumbered.\n          *label distractionfail\n          *choice\n            #I try to blow up the munitions anyway. We will escape in the confusion.\n              *set ammunition true\n              Your sulfur stick is ready, so you light it and throw the cloth. It takes only seconds for the foreign soldiers to realize what is happening, and in that time you and your followers are already moving away from the munitions. The explosion rocks everyone who was nearby. You and your followers continue to flee the camp as the soldiers deal with the fire. Several soldiers attempt to stop you, but those who stand in your way, you trip and strike down into the ground; shots from the foreign hand cannons follow you, but you change directions as you run, making yourselves hard to hit.\n\t\t\t  \n              *if disciples > 6 \n                When you finally reach the place where you agreed to regroup, you find that the adventure was not without losses: six of your followers have not returned, one lost in the marsh and five still behind in the enemy camp. It is with a heavy heart that you make your way to the monastery gates.\n                *set disciples -6\n                *goto monastery\n              *else\n                When you finally reach the place where you agreed to regroup, you wait…but no one else arrives. Your actions may have gained you some advantage over the foreigners, but they have lost you your disciples.\n                *set disciples 0\n                *goto monastery\n            #We can fight our way out of here and flee into the bamboo forest.\n              *if fighting > 75\n                There are fewer of you than there are of the foreigners, but your goal is only to get past them and into the bamboo forest. You and your followers make for the same point in their surrounding circle, meaning you will only have to face a few of the enemy—and they dare not shoot at you while their allies are surrounding you on the other side! As a soldier grabs for you, you lock his arm in a painful hold and drag him along with you, using him as a shield for a few moments before kicking out his knee and letting him fall behind you. Once you and your followers have cleared the enemy line, they begin to fire at you, but you change directions as you run, making yourselves hard to hit.\n\t\t\t\t\n                *label lostsurprise\n                When you finally reach the place where you agreed to regroup, you are glad that neither of your teams has suffered any losses, despite the danger you were in. All you have lost is a night's rest and the element of surprise. It could have been far worse. You and your followers make your way to the monastery, ready to feel the safety of its walls.\n                *goto monastery\n              *else\n                Once the foreigners realize that the real battle is inside their own camp, they outnumber you severely—and despite your best efforts, and though you have wounded and incapacitated more than your fair share of opponents, there are simply too many to fight. As you face two opponents in front of you—elbowing one in the throat while lashing out into the other's knee with a side kick—a third hits your spine with a blunt object, sending a momentary shock through your nerves that is enough for your foes to grapple you into submission.\n                *goto prisoner\n            #We can use our command of chi to escape into the bamboo forest.\n              *if magic > 60\n                Your first move is jumping up onto their shoulders and running across them—a move you and your students have practiced any number of times. The foreigners quickly regroup, but by then you are already beyond them. A few more leaps through the camp and you are in the bamboo forest, high above their heads and hidden in the green shadows.\n\n                *goto lostsurprise\n              *else\n                The chaos that erupts around you disrupts your connection to the energies you had intended to draw on to evade your captors. And soon, enough foreign soldiers have surrounded you and your followers that any further attempts at escape lead to battle. You give better than you receive, taking on several opponents at once in a flurry of fists and feet, but eventually you leave an opening, and a blunt object slams into the back of your head, stunning you just long enough for the foreigners to grapple you into submission.\n                *goto prisoner\n            *hide_reuse #I speak as though I am in control of the situation, demanding to see George Gower.\n              When you find yourself suddenly outnumbered and surrounded, acting as though it is exactly where you had intended to be is sure to, at least, confuse the enemy. Standing near their munitions with a sulfur stick, it is clear that you do retain some power in this transaction.\n\t\t\t  \n              *if enlightened > 60\n                The foreign soldiers share glances, as though they are uncertain of what to do with you—it is the sort of decision normally made, you assume, by their superiors. Which works exactly in your favor.\n\t\t\t\t\n                \"Come with us,\" a brave soldier finally says, his accent dreadful and his speech halting. \"No funny business.\"\n                *goto contact\n              *else\n                But despite your cool and confident manner, the soldiers seem to think that since you are surrounded, you are in no position to demand anything. They shout something in their foreign tongue, and it looks as though they are going to charge.\n                *goto distractionfail\n      #I send all my followers to make a distraction at the south side of the camp while I sneak into the camp alone.\n        One person can hide much more easily than several, and you are confident in your ability to create utter havoc on your own. Assuming that your students can navigate the marsh, at worst only you risk being captured.\n\t\t\n        The signal is easy to identify: one of your students shouts some insults, and other voices join with his. It does not take long for the foreign soldiers to respond, and the attention of the camp shifts to the southern side. The north side, where you are lurking, is much quieter. You make for the nearest of the munitions storage areas you have identified and prepare to light it on fire.\n\t\t\n        *if cleverness > 60\n          *set ammunition true\n          *set preemptive true\n          *set negotiateDifficultyModifier +5\n          You take a pinewood stick infused with sulfur and light a piece of cloth, leaving the beginning fire next to a supply of gunpowder. Then, you flee. The explosion rocks the camp, sending you tumbling with its force, but you roll and get back to your feet quickly, leaping into the bamboo forest before anyone discovers your presence.\t\t  \n\t\t  \n          You climb higher into the forest, hoping to get a look at the camp—clearly, they have called off any pursuit into the marsh as they try to put out the fires you set. You regroup with your followers and are delighted to find them all without wounds. You make your way to the monastery feeling as though your night has been well spent.\n          *goto monastery\n        *else\n          *set preemptive true\n          *set negotiateDifficultyModifier +5\n          But just as you are about to light a pinewood stick tipped with sulfur, a hand cannon fires, its ammunition shooting between you and the munitions stock. Foreign soldiers are forming a ring around you, with several aiming their strange hand cannons directly at your heart. Clearly, not as many of the foreigners went after your followers as you had thought, since it seems there are plenty left here to confront you.\n\t\t  \n          \"Come with us,\" one of the soldiers says, haltingly, in a dreadful accent. \"General Gower will want to see you.\"\n          *goto prisoner\n      #I lead the distraction on my own, while my followers set the munitions alight.\n        You know these marshes from your years at the monastery, and you are certain you can lead a merry goose chase while some of your followers sneak into the camp. After skirting around the camp and avoiding being spotted by the perimeter guards, you step into the light of their lanterns and begin hurling insults at the guards stationed closest to the marsh.\n\t\t\n        *if enlightened > 60\n          *set ammunition true\n          *set preemptive true\n          *set negotiateDifficultyModifier +5\n          Your taunts, understood by the foreigners or not, are clearly delivered in a tone that challenges their position. The two soldiers call to others, and you dart away before they can capture you, leading them into the marsh behind you. You dart in and out of their view, always close enough that they are sure they can catch you if they only press on a little further.\n\t\t  \n          When the explosions rock their camp, however, they turn away, and you vanish into the wetlands, allowing them to forget about you in the chaos you are sure will follow. When you finally regroup with your followers, you are delighted to find them all without wounds. You make your way to the monastery feeling as though your night has been well spent.\n          *goto monastery\n        *else\n          Unfortunately, you are just not that convincing. The two soldiers on the perimeter nearest the marsh point and laugh at you, calling back insults in their own tongue.\n\t\t  \n          Fortunately, your followers realized that the distraction was not working and did not attempt the sabotage on their own. So, while you have gained nothing, you have also lost nothing except a night's work. You regroup with your followers and make your way up to the monastery gates, prepared to try another strategy.\n          *goto monastery\n      *if (sunanstay) #Sun An and I stage a diversion on the edge of the marsh.\n        You know these marshes from your years at the monastery, and with Sun An as your companion, you are sure you can come up with a clever ruse that will not only get the attention of the foreign soldiers, but allow you to lead them into the marsh, making them wet and miserable before their camp catches fire.\n\t\t\n        The two of you skirt the perimeter, staying out of sight of the guards you notice, until you reach the south side and a pair of guards closest to the marsh. There, Sun An begins to act the drunkard, elaborately boasting of his abilities. You play along, demanding satisfaction for a perceived slight, and the two of you begin to fight.\n\t\t\n        *if fighting > 60\n          The mock battle is somewhere between a form and a sparring match. Sun An is using the drunken master style the two of you have been reading about in your recent studies. You adopt a scrapping stance you spent hours training one of your students NOT to use. Using the postures of those two divergent styles, you settle into the Dragon Meets Phoenix form, adding steps and strikes as seems appropriate. A crowd begins to gather, and you think you see men placing bets, which is exactly the result you had hoped for.\n\t\t  \n          Sun An, too, notices the crowd and begins to retreat into the marsh. You pursue, and you are soon just out of sight, but making enough noise that it is clear the battle continues. You hear the sounds of the soldiers following and smile before throwing a series of sloppy leopard punches at Sun An's center. Weaving drunkenly, Sun An drops and spins a sweep kick at your feet, driving you further into the marsh just as the soldiers step into view.\n\t\t  \n          The game continues: you chase Sun An or he chases you, and the soldiers follow, cheering you on in their foreign tongue. Until, of course, the explosions rock their camp. In an instant, you are forgotten, and you take advantage of the moment to be sure you are gone before they remember you. You and Sun An make your way through the marsh, gliding as quietly as cranes. When you finally regroup with your followers, you are delighted to find them all without wounds. You make your way to the monastery feeling as though your night has been well spent.\n          *set preemptive true\n          *set negotiateDifficultyModifier +5\n          *set ammunition true\n          *goto monastery\n        *else\n          Unfortunately, rather than viewing you as an intriguing spectacle, the soldiers decide you are a threat. Both lower hand cannons, fastened with blades on the ends, at you and Sun An, firing just as the two of you drop to the ground. You tumble to one side as Sun An darts farther into the marsh. The two of you find each other moments later, and you hurry back to where you left your followers, hoping that they will know the distraction was a failure.\n\t\t  \n          Luckily, they saw no opening in the camp and did not attempt the sabotage on their own. So, while you have gained nothing, you have also lost nothing except a night's work. You regroup with your followers and make your way up to the monastery gates, prepared to try another strategy.\n          *goto monastery\n         \n*label contact\n*set negotiate true\nThe guards escort you to a large tent in the middle of the encampment. One steps inside and holds a conversation in the foreign tongue; after a moment, he returns and ushers you inside. Within, the walls are illuminated by glass lanterns, and a bespectacled man with a mop of gray hair tied into a tail at his neck stands in greeting.\n\n\"I am George Gower,\" he says, his accent clear and his mastery of your language evident. \"I understand you requested a meeting?\"\n\n\"I am ${name},\" you say. \"I have come to discuss the matter of the monastery above us.\"\n\nThe pale man grins, and you begin to suspect that the gray in his hair is affected—he looks as though he must be in his early thirties at best. \"Ah, I am glad to hear it,\" he says. \"It's been such trouble getting you people to converse openly about anything. There's always some matter of tea to be shared, or vague references to spirits and ancestors and other bothersome things. Always happy to meet someone with a straightforward perspective.\"\n\n*label terms\n*choice\n  *hide_reuse #I explain the monks are interested in a peaceful outcome to this situation and wish to negotiate.\n    \"And reasonable too!\" Gower crows. \"I knew I liked you the moment you walked in. Would you like a cigar?\" He holds up a sweet but noxious smelling tube of wrapped herbs, and you shake your head. \"No, no, none of you seem to. A pity, really, but you'll learn. Well, then, to business. We're quite interested in the location your monks have taken up on that mountain. Quite defensible, by all appearances, but close to a major trade route. Seems like an excellent place to camp an army. And your people don't seem to be doing much with it aside from jumping about at each other, occasionally using sticks, as far as I can tell. Looks a bit silly to an outsider, I have to say. Could really do that sort of thing anywhere.\"\n    *choice\n      #I cannot stand the condescending tone this barbarian is using. Negotiating will get us nowhere.\n        A man who refuses to understand those who seek negotiation is unlikely to make any concessions. You decide to take the conversation in a different direction.\n        *goto terms\n      #I explain that the monks are teachers, scholars, and warriors, well respected in the Middle Kingdom for their knowledge.\n        *if enlightened > (50 + negotiateDifficultyModifier)\n          Gower pauses a moment to consider you carefully. \"When you put it that way, it seems less a matter of simple tradition and more a practical issue, which I must say sets you above anyone else I've bothered to have these conversations with. Sit, won't you?\" He gestures to a chair near his own, then sits as you sit. \"To be honest, I haven't been much impressed by what I've seen of the Middle Kingdom. You've got such a wealth of resources, and quite a few advances in technology, that you don't seem to be putting good use to. It's as though you're existing in this state of potential, but you've no one to push you forward into progress. I've a mind a person like me could help you in that regard.\"\n\t\t  \n          \"I have trouble believing that all of your actions are driven by your desire to help the Middle Kingdom,\" you say curtly.\n\t\t  \n          Gower smiles. \"Caught me there. No, I see great potential for myself as well. But I admit, in talking to you, it occurs to me that I may be missing something. Some insight that would give me a better notion for just what it is that makes the Middle Kingdom tick, so to speak.\" He runs a hand over his grayed hair, and you begin to suspect that it's a wig, some sort of affectation with no purpose that you can see. \"Teachers, you say?\"\n\t\t  \n          You nod. Clearly, despite his tangents, he was listening.\n\t\t  \n          \"And warriors.\"\n\t\t  \n          Another nod. You are unsure where the foreigner is going with this, so it seems best to let him process his thoughts aloud.\n          *label manoamano2\n          *page_break\t\t  \n          But instead of speaking, he takes a swig out of a metal flask; the liquid smells a bit like rice wine, but stronger, with an acrid odor that threatens to burn your nostrils on a whiff. He mutters a foreign word in a tone that makes you guess it was a curse. \"All right then, ${name}. Here's how you can prove to me that your monks are the knowledgeable warriors you claim they are. We'll each choose a champion who represents the best of our fighters with the best of our weaponry. If you—or the warrior of your choosing—can best who I select, then I will acknowledge we have something to learn.\" He tries for a smile, but doesn't quite manage. \"We've a long tradition of this sort of thing where I come from.\"\n\t\t  \n          \"So do we,\" you assure him, before he can launch into further explanation.\n\t\t  \n          \"If my champion wins,\" he says, \"then you'll agree to vacate the property.\"\n\t\t  \n          This seems a lot to agree to without the permission of Abbot Bao. \"A reasonable suggestion,\" you say. \"I will confer with the abbot and send a message confirming the terms.\"\n\t\t  \n          \"I'll expect word by tomorrow morning,\" Gower says, rising. You stand, and he thrusts a hand at you; you realize just in time that he means it as a sign of agreement, not an attack. You meet his hand and shake it as you rise from your own seat.\n\t\t  \n          When you arrive at the monastery, you explain to Abbot Bao what has transpired, and though he is concerned about the possible outcome, he is eager to resolve the conflict without massive casualties on either side. Given your role in the negotiation, it does not surprise you when Abbot Bao selects you as the Order's champion.\n          *goto champion\n        *else\n          *set negotiateDifficultyModifier +2\n          Gower just laughs. \"See, there it is again! That annoying bit about tradition trumping other factors. Progress! That's where the real business is, monk. You've got to stop looking backward at how you've always done it and move into the future!\"\n\t\t  \n          You realize you will have to try a different tactic.\n          *goto terms\n      #I question his desire to have an army. Does he expect to challenge the Emperor?\n        Gower has the good grace to look sheepish. \"Heavens, no!\" he protests, but you see the insincerity behind his statement. \"I intend to raise my men to protect the good of the Middle Kingdom. There are a number of outside interests not nearly so benevolent as me and mine. When one of them comes to threaten the well-being of this land, surely your emperor will be glad of an ally.\"\n\t\t\n        If he has convinced himself of this lie, there is really no sense in negotiating along this line any further. You'll have to try a different tactic.\n        *goto terms\n  *hide_reuse #I lie and say that the Emperor is sending troops to make sure the matter resolves quickly.\n    You suspect the foreigner of being uncertain of his position where the Emperor is concerned, and your intuition leads you to point out just how fragile that relationship could be.\n\t\n    \"Despite the welcome you have received in the Imperial Court, the Son of Heaven cannot forgive an affront to one of the Middle Kingdom's most respected monasteries,\" you say.\n\t\n    *if enlightened > (70 + negotiateDifficultyModifier)\n      Gower seems taken aback by this. \"We have always had the best of relationships with your emperor,\" he says.\n\t  \n      \"You have never before openly attacked the Order of the Peach Tree,\" you respond. \"The Son of Heaven has been kind, and has overlooked many of your transgressions against his people…\"\n\t  \n      \"Now see here,\" Gower begins to interrupt, but you talk over his protestations.\n\t  \n      \"But he cannot allow such disrespect for one of his favored monasteries,\" you say firmly. \"The Order of the Peach Tree has long supported the Emperor. The legions of the Imperial Army are many. You are a mere five hundred. The Emperor boasts ten thousand troops. How long do you think you will last?\"\n\t  \n      Gower's pale skin goes white as rice. \"We of course meant no offense to his Imperial Majesty,\" the foreigner stutters.\n\t  \n      *label negotiatewin\n      *achieve peachsave\n      \"Your army will be removed by noon tomorrow,\" you order.\n\t  \n      \"Of course, ${name},\" Gower says, the pitch of his voice rising. \"Many apologies for the misunderstanding.\"\n      *page_break\n\t  \n      You make your way up to the monastery to tell Abbot Bao of your conversation. Sure enough, the foreign troops begin packing up immediately, and at noon, Gower himself is shouting at them to hurry, nervously watching the road east for signs of the Imperial troops that will never arrive.\n\t  \n      \"I do not know what we will do the next time he makes this attempt,\" Abbot Bao says. \"Surely he will eventually see through your lie.\"\n\t  \n      \"We will be ready,\" you promise.\n\n      You have avoided conflict with the foreign army, through treachery, but successfully nonetheless. One day this may return to haunt you, but in the meantime, you have gained status in the eyes of the Order of the Peach Tree, and are pleased with the role you have played in defending the monastery.\n      *set status %+20\n      *finish Chapter Seven: The Imperial Challenge\n    *else\n      *set negotiateDifficultyModifier +2\n      Gower only laughs. \"Good try, monk,\" he says. \"I've word that your emperor has quite contented himself with entertainers, and is delighted with the shipment of trinkets and devices we've imported and brought to the capital. He's quite pleased with us. So I doubt there will be any Imperial troops here to get you out of trouble.\"\n\t  \n      The foreigner smiles broadly. \"Would you like to try again?\"\n      *goto terms\n  *hide_reuse #I explain that the monks do not intend to leave the monastery, and a siege will end badly for his men.\n    *if tenacity > (50 + negotiateDifficultyModifier)\n      Gower begins to smile, then looks at your face and sees how earnest you are. \"You're quite serious,\" he says, and you hear a note of astonishment in his voice. He studies you for a little longer, then runs a hand over his grayed hair, and you begin to suspect that it's a wig, some sort of affectation with no purpose that you can see. \n      *goto manoamano2\n    *else\n      *set negotiateDifficultyModifier +2\n      Gower shakes his head. \"I can't see how, with the odds I've been given, a siege would be worse for my men than for yours. But your confidence is admirable. Perhaps you'll find a different argument to sway me.\"\n      *goto terms\n  *hide_reuse #I lie about the number of warriors available to the Order, claiming that we are ready for an attack.\n    Strategically, Gower's position makes the most sense if he believes the Order to be as severely outnumbered as you are. By undermining his confidence about his superior numbers, perhaps you can convince him to leave.\n  \n    \"I am surprised you brought only five hundred warriors,\" you say, almost casually. \"The Order of the Peach Tree may appear small, but I assure you, we are of far greater number than you clearly believe. And there are certain elements in this area who have a bone to pick with you about the treatment their families received when you settled to the south. I suspect you will not find them—or the Order—the riffraff you anticipate fighting.\"\n    *if cleverness > (70 + negotiateDifficultyModifier)\n\n      Gower's eye tics, just once, but enough to let you know he is nervous. \"I assure you, our numbers will be sufficient to convince your leaders to find some way to accommodate us.\"\n\t  \n      You shake your head. \"If that were true, certainly the abbot would have tried already to reach an agreement. Instead, he is waiting for you to make a move, so that he can crush your forces and scatter them to the winds. And while such a result would please me, I am at heart a monk of peace. I do not seek death—but neither do I fear it.\"\n\t  \n      Gower meets your eyes, and the nervous tic returns. You stare back at him, just as you would enter into a mental combat with a worthy warrior. Gower, however, looks away.\n\t  \n      *goto negotiatewin    \n    *else\n      *set negotiateDifficultyModifier +2\n\n      Gower laughs. \"You mean the Blue Scarves Rebellion? That rabble can't hope to pull together a fighting force. They can manage guerrilla tactics at best, damaging supplies and committing acts of random sabotage, but warriors they are not. As for your monks, I've had reliable sources inform me of exactly how many warriors are within those walls, many of which are hardly more than children, and more of whom are wrinkled old men. If your abbot were so secure, why would he be sending out messengers to the ends of the kingdom to gather back monks who have gone astray? We've stopped enough messengers to be clear on exactly what the old man is about. So if you wish to convince me with exaggerations, by all means, do your best. But thus far, I am not impressed.\"\n      *goto terms\n  #I believe we are at an impasse. He can offer his surrender, or he will face the Order in battle.\n    \"Well, if you've nothing more to offer,\" Gower says, trailing off. \"I'll let you get back to your monastery. Be sure to send a messenger with your surrender when you've changed your mind.\"\n    *goto monastery\n\n*label prisoner\n*set negotiateDifficultyModifier +5\nYour mood is as subdued as you are when the foreign soldiers bring you to a tent at the center of the camp. One of them enters and has a discussion in the foreign tongue before lifting the flap back and gesturing for you to be brought forward. Within, the walls are illuminated by glass lanterns, and a bespectacled man with a mop of gray hair tied into a tail at his neck stands, waiting for you to enter.\n\n\"So this is the monk causing such a fuss among my troops,\" he says with a false note of cheer. His accent is clear, and he speaks your language with no hint of hesitation. \"I am George Gower, as I'm sure you've surmised. I must say, I was beginning to wonder if I'd be given a cold shoulder from you monks until I brought the fight to your doorstep. Glad to see one of you showing a bit of initiative. What do they call you?\"\n\nYou see no reason to keep the information to yourself; perhaps he's even heard of you. But Gower shows no sign of recognition when he hears your name. \"I imagine you'd like to talk about the fate of your monastery, then. I'm a reasonable man, and given the difficulty I've had in having an open conversation with your fellows on the hill, I'm willing to momentarily forget the indiscretions that brought you here this evening, in favor of getting right down to business. Now, what have you to say about the situation in which we find ourselves?\"\n*goto terms\n\n*label monastery\n*if negotiate2\n  *goto tactics\n*else\n  *goto monastery2\n  \n*label monastery2\n*page_break\nYour arrival at the monastery is greeted with cheers from the monks who remember you. Among the students, there are whispers—clearly, you've been spoken about by your old teachers, you hope with compliments rather than as an example of what not to do under their instruction.\n\nBut it is Abbot Bao who is most relieved by your presence. The abbot has aged in the decade you have been away, and the current situation weighs heavily on him. He calls you into the Inner Temple to share what you have learned. When you tell him of your journey and what you have learned of the foreign army, he greets your news with a blank expression, taking it all in without judgment.\n\n\"You have been in the world, my student,\" he says slowly, \"and I have been here in the temple for far too long. I fear this decision is beyond me, and I ask your advice. How do you think we should deal with these foreigners?\"\n\n*if (disciples > 50)\n  *goto pretactics\n*if (disciples > 25)\n  *set difficultyModifier +5\n  *goto pretactics\n*else\n  *set difficultyModifier +10\n  *goto pretactics\n  \n*label pretactics\n*if (guns)\n  *goto pretactics2\n*else\n  *set difficultyModifier +2\n  *goto pretactics2\n  \n*label pretactics2\n*if (ammunition)\n  *set difficultyModifier +0\n  *goto pretactics3\n*else\n  *set difficultyModifier +3\n  *goto pretactics3\n\n*label pretactics3\n*if (sabotage)\n  *goto pretactics4\n*else\n  *set difficultyModifier +2\n  *goto pretactics4\n  \n*label pretactics4\n*if (preemptive)\n  *set difficultyModifier +5\n  *goto tactics\n*else\n  *goto tactics\n  \n*label tactics\nHow do you think the monks should face the foreigners?\n\n*choice\n  *if (negotiate = false) #We should negotiate with the foreigners.\n    *set negotiate2 true\n    *set enlightened %+5\n    You are sure that the foreigners can be made to see reason, and Abbot Bao allows you to take the lead. Along with a few of your followers, you travel down to the camp. The perimeter guards see you coming and greet you in their foreign tongue, probably calling for you to halt.\n\t\t  \n    \"Greetings,\" you say, holding your hands open in a position you hope they will view as peaceful. \"I am ${name}, a monk of the Order of the Peach Tree. I am hoping to converse with George Gower.\"\n    *if preemptive\n      One of the perimeter guards looks at you with wide eyes. He says something in the foreign tongue to his companion, who looks at you sharply. \"General Gower has told us if we encounter you that we are to capture you and bring you to him. If you wish to see the General, you must leave all your weapons and come alone.\"\n\t  \n      Given the trouble you've already made for the foreigners, you are a little surprised that this is the only requirement. You nod to your companions and leave your weapons behind, knowing perfectly well that you are equally deadly without them.\n      *goto prisoner\n    *else\n      *goto contact\n  #The monastery is well fortified. We can defend it against an outright attack and withstand a siege.\n    *set tenacity %+5\n    The abbot defers to your plan, announcing to the monks that all should be prepared to withstand both a siege and an assault on the monastery gates. The monks busy themselves strengthening the fortifications and gauging supplies. There is enough food to last a month once it is rationed, and you and the other monks have been trained to get by on even less sustenance if required. You and Master Shen, who looks exactly the same as when you last saw him, devise a watch schedule so that the gates are guarded at all times. \n\n    In addition to the walls, you and several other monks who know the terrain well journey out at night to set up additional obstacles and hazards on the path leading to the monastery. Some natural hazards—loose rocks from one of the walls along the path—are made more dangerous, ready to fall at the slightest provocation. In addition, you dig a few pits and plant spears at the bottom, run trip wires among the bamboo, and leave caltrops seeded among the pebbles. Few of these traps will be fatal, but they should be dispiriting, and you are certain that the monks have the tenacity to outlast the foreigners.\n\t\n    Once all your preparations are settled, there is a week of waiting while nothing seems to happen. The foreigners have dug in, and so have you. The waiting begins to wear on everyone at the monastery, but you encourage everyone to have patience. You are here to stay. You will not be moved.\n\t  \n    *if tenacity > (60+difficultyModifier) \n      And then, the first attack comes. After stumbling up the mountain path to reach the monastery, bungling into your traps and gaining casualties and wounded along the way, the army tries to camp outside your door. A rain of spears from the monastery walls stalls them. A second charge with a crude battering ram is defeated by dumping all the stores of sesame oil the monastery had kept in its kitchens.\n\t  \n      *if ammunition\n        You can tell that Gower had been planning to use his cannons to further aid in this attack, but the few munitions he has left make little progress. Not only are they difficult to bring up the mountain path, but they have far less impact without the number that you destroyed. And while t
