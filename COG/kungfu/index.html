<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Choice of Kung Fu — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "kungfu", "title": "Choice of Kung Fu", "scenes": {"bandits": "*advertisement\nA few days after the conflict with the outlaws in the marsh, Abbot Bao Ho sends for you to meet him beneath the peach tree. The tree itself is ancient: you have been told that most peach trees live, at most, fifty years, but this one has grown wide around the trunk and gnarled in the branches. Despite its age, it continues to produce fruit. Some say that this is the peach tree after which the monastery was named, a true immortal tree in the breed of trees that represents immortality. Others believe it to be a descendant of the original peach tree, the result of careful cultivation by the monks who teach you. \n\nWhat do you think?\n\n*choice\n  #It must be immortal.\n    Perhaps it is.\n    *goto peachtree\n  #If it is grown from the cuttings of earlier trees, the continuation of its line makes it immortal despite its many incarnations.\n    *set enlightened %+10\n    Perhaps you're right.\n    *goto peachtree\n  #The tree is clearly not immortal; only the superstitious and uneducated would believe so.\n    Perhaps you're right.\n    *goto peachtree\n  #I haven't given it much thought.\n    Your studies keep you busy thinking about more concrete things, of course.\n    *goto peachtree\n  #I don't care.\n    There are certainly more important issues at hand.\n    *goto peachtree\n\n*label peachtree\n\n\nThe peach tree's branches extend over a reflection pool. It is normally a very peaceful spot, but now the atmosphere is tense. Abbot Bao stands there with Master Shen, the oldest teacher in the monastery, at his side, and the two men wear identical expressions of concern. \n\nJust as you arrive, Lu Jin approaches from the other side. $!{Rivalhe} appears as surprised to see you as you are to see ${rivalhim}.\n\n\"Greetings, my senior students,\" Abbot Bao says in greeting.\n\nLu Jin bows. \"Do you have training for us today, masters?\"\n\nMaster Shen chuckles. \"Always so eager for more, Lu Jin? As I recall, at our last bout between the senior students, ${name} gave you a very fine black eye.\"\n\nLu Jin bares ${rivalhis} teeth at you in a smile that is neither humble nor friendly.\n*page_break\n\"Unfortunately, my students, this is no simple matter of training,\" Abbot Bao says. \"Or, perhaps it is, but not of our usual devising. You told us of your experience with the bandits along the road to the Order, and I am afraid it is becoming an all too common experience in these interesting times. Too many people of the Middle Kingdom are turning to thieving and banditry to make their ends meet, and too many honest folk are made to suffer.\"\n\nMaster Shen grunts, and you think you hear him mutter something about a distinct lack of honest folk, but it is unclear.\n\nThe abbot continues: \"Because you have some experience, and because we feel it will be a good test of your readiness to fully join the order, we have chosen the two of you to lead a group of students to the village of Kuei Xian, across the Baijiang Bridge, to solve the trouble locals are having with the bandits.\"\n\nLu Jin blanches momentarily, but your teachers do not seem to notice.\n\nHow do you respond to this mission?\n\n*choice\n  #It is an honor to be chosen, even if I must share leadership with Lu Jin. I agree to set off at once.\n    You accept immediately, bowing and turning to set off immediately. Master Shen's laugh brings you back.\n\t\n    \"You must first prepare, my student,\" says the old master fondly. \"First learn the risks, then lead your men. A fool who runs over the bridge without looking first may find himself in the water. Nothing is so urgent that time cannot be taken to think.\"\n\t\n    Lu Jin nods hesitantly, still looking uncertain about this task.\n\t\n    *goto details\n  \n  #I can't wait to try my skills against real opponents again.\n    \"These bandits will learn that the Order of the Peach Tree will not stand for chaos on the roads,\" you say confidently. \n\t\n    Lu Jin scowls at you, but the abbot looks pleased at your enthusiasm.\n\t\n    \"I know you will carry out this task with honor, ${name},\" Abbot Bao says.\n\t\n    But Master Shen looks at you sharply. \"Be certain that you look at all your options before committing to a course of action,\" he advises. \"A man who looks only at the thorns of the rose may never see the beauty of its petals.\"\n\t\n    *goto details\n  *if (LuJin>50) #Working as a team will be good for both me and Lu Jin. Perhaps we can converse more on the state of the Middle Kingdom.\n    *set lujin %+10\n    You nod at Lu Jin, and ${rivalhe} nods in return, looking encouraged.\n\t\n    \"We will do our best to see to the heart of the matter,\" Lu Jin says quietly.\n\t\n    \"I know you will, my students,\" says the abbot.\n\t\n    Master Shen laughs. \"Do not forget that the heart is not the only vulnerable organ, Lu Jin. A strong hit to the kidney will do just as well.\"\n\t\n    *goto details\n  #Lu Jin's hesitation is an opportunity for me. I volunteer to take the team alone.\n    Abbot Bao looks surprised, then glances at Lu Jin and recognizes your rival's hesitation.\n\t\n    \"I feel it would be best to have both of you on this task,\" he says slowly. \"If you are uncertain…\"\n\t\n    \"No,\" says Lu Jin. \"I am ready to do what the Order asks of me.\"\n\t\n    Both Master Shen and Abbot Bao watch Lu Jin with some concern for another moment. Even though you will both be going together, it seems you have successfully undermined ${rivalhis} position.\n\t\n    *goto details\n  #I am not really interested in this interruption to my training.\n    *set lujin %-10\n    \"Could you send more advanced monks instead?\" you ask. \"I worry that my training will be interrupted with this mundane matter.\"\n\t\n    Lu Jin's temper flares—you see it in ${rivalhis} expression a moment before your teachers.\n\t\n    \"I will take the students on this mission, if you are so heartless as to ignore the pleas of your countrymen,\" ${rivalhe} says sharply. $!{rivalhe} takes two steps toward you, looking ready to make a challenge.\n\t\n    Master Shen steps between the two of you, placing his wizened hands on each of your chests. \"No, my students, it would be best to have both of you there. Two minds think with greater strength than one, and four eyes see twice as much as two.\"\n\t\n    \"Especially when they disagree,\" says the abbot.\n\t\n    *goto details\n\t\n*label details\n*page_break\nThere are actually fewer details than you would have expected for this mission. Neither Abbot Bao nor Master Shen knows how many bandits are present near Kuei Xian. They do know that the center of activity seems to be at Baijiang Bridge, an old stone bridge that remains from the years of the Sun Dynasty, when an army marched across it five horses at a time, or so legends say. Kuei Xian, which sits in the shadow of a huge, turtlelike karst hill in the foothills of the Yellow Mountains, is a small village, but with important enough history—and pleasant enough weather—that the governor of the province keeps his summer home there.\n\nGovernor Rong is disinclined to ask the Emperor to help combat the problem directly. (You gather from Master Shen's muttered commentary that this would make it look as though he cannot solve the problems of his own district.) Instead, he has asked the Order of the Peach Tree for aid, and given the importance of the trade that flows across the Baijiang Bridge, and the order's dedication as protectors of the people of the Middle Kingdom, the abbot has agreed.\n\nOf course, should you and Lu Jin fail to quell the problem, more important resources than students will have to be expended, either by the Order or by the Emperor. This would bring dishonor to everyone: you, the order, Governor Rong, and possibly the Emperor himself in the face of the foreigners at his court.\n\nAbbot Bao tells you the names of the students he expects to accompany you. Several of them were present when the bandits attacked. You are to ready your equipment and leave in the morning.\n\n*choice\n  #I seek out Lu Jin to discuss this mission.\n    *if LuJin > 50\n      Lu Jin is eager to discuss the situation with you, especially ${rivalhis} own hesitations.\n\t  \n      \"I know that the people of Kuei Xian are suffering,\" ${rivalhe} says, \"but the people who have been driven to banditry are suffering, too.\"\n\t  \n      \"Maybe we can find a way to settle things peacefully,\" you offer.\n\t  \n      Lu Jin looks at you hopefully. \"Do you really think so?\"\n      *choice\n        #Not really, but I tell Lu Jin so to ease ${rivalhis} conscience.\n          A wise general once said dishonesty is sometimes required to keep morale high. You have apparently taken this lesson to heart.\n          *goto onward\n        #Not really, and I admit this to Lu Jin.\n          Lu Jin sighs. \"That is exactly what I am afraid of.\"\n\n          The two of you discuss tactics—how best to use the other students when it comes to an actual fight, and how to best make use of the terrain—until late. You feel better prepared for the coming conflict, but tired, and you hope there is time to get enough sleep.\n\t\t  \n          *goto onward\n        #Yes, and I will seek a way to bring about a peaceful resolution.\n          *set enlightened %+10\n          Lu Jin looks encouraged. \"If you believe it, then I will believe with you,\" ${rivalhe} says.\n          *goto onward\n    *else\n      Lu Jin is not entirely thrilled by the prospect of working as a co-leader with you—but you're equally unenthusiastic about working with ${rivalhim}. Still, as Master Shen would say, better to be prepared.\n\t  \n      You look over a map of the Baijiang Bridge, and, unsurprisingly, you conflict about every possible approach. \n\t  \n      Exasperated, Lu Jin finally says, \"We may as well just ask them to leave, for all the good we're going to do.\"\n      *choice\n        #We could try negotiation. If we can find the leader, maybe we can work something out.\n          *set lujin %+10\n          Lu Jin looks at you suspiciously for suggesting this.\n\n          \"Maybe we can,\" ${rivalhe} agrees noncommittally.\n\n          You discuss tactics for a little while longer, with greater success than previously, and you decide to turn in, to make sure you have prepared and rested enough for morning.\n          *goto onward\n        #What a ridiculous idea.\n          *set lujin %-10\n          Lu Jin throws up ${rivalhis} hands. \"We're certainly not going to get anything more done tonight. We can talk on the road.\"\n\n          You head back to your room to prepare your things.\n          *goto onward\n  #I go to my room to prepare for morning.\n    You prepare the supplies you will personally need and get a good night's rest before the coming travel.\n    *goto onward\n*label onward\n*page_break The next morning…\n\nThe Order of the Peach Tree, though farther from the Yellow Mountains than Kuei Xian, is nestled among karst mountains that increase as you travel west toward the Baijiang River. The road is a well-traveled one, a drier route than the road you so recently traversed through the wetlands south of the monastery. Despite the traditional sengfu monk garb that you and your fellow students wear—the high boots, pants, and one-sleeved robe, tied with a sash—which marks you as members of the Order, you are given no more notice than the other travelers you encounter. There are eighteen of you, total: you and Lu Jin each have a team of eight students, for good luck. Each team is nine, a symbol of permanence, and of synergy with the heavens.\n\nDoes the numerology comfort you?\n\n*fake_choice\n  #Of course. When embarking upon matters like this, I am glad for any numerical advantage.\n    Perhaps the supernatural numbering will help if the bandits outnumber you.\n  #No. The outcome will be determined by greater skill, not by numbers.\n    Hopefully your greater skill will aid you if greater numbers are on the side of the bandits.\n  #We are all one team, making us eighteen, which is neither lucky nor unlucky. We will make our own fate.\n    Perhaps you are right.\n  #More superstitious nonsense.\n    Perhaps you're right.\n  #I hadn't noticed the numbers before.\n    Hopefully you were at least aware of the number of your group.\n\n\nYou pass a number of merchants with carts drawn by water buffalo, messengers and warriors on horseback, and travelers walking along the road with bundles on their backs. It is a fine day: the sky is blue, the clouds are wisps, and the summer air is thick with the smell of blossoms and ripening rice. As on your last trip from the monastery, you are traveling with a horse and cart, full of the food and supplies you will need for your journey.\n\nIt is up to you and Lu Jin to set the tone for this mission. The trip to Kuei Xian takes three days at a steady pace.\n\n*choice\n  #Three days is fast enough; the situation is urgent, but unlikely to get much worse in three days' time.\n    *temp day\n    *set day \"third\"\n    The steady pace also has the benefit of allowing you time to converse with your fellow students. How will you use it?\n    *choice\n      #Continue planning strategy with Lu Jin.\n        *set cleverness %+5\n        Lu Jin advocates approaching the bandits to make an attempt at negotiation, believing that the bandits can be reasoned with. \n        *label plan\n        What is your strategy in facing the bandits?\n        *choice\n          #Fight them, and show them the power of the Order of the Peach Tree.\n            *temp strategy\n            *set strategy \"tiger\"\n            A direct solution, and one that will certainly do the Order proud, if you succeed.\n            *page_break\n            *goto hulijing\n          #Devise a clever plan to stop their raids, but avoid a direct conflict.\n            *temp strategy\n            *set strategy \"dragon\"\n            There are many stories of nature spirits in the woods in this area. Given the reputation many farmers and other country folk have for fearing spirits—a wise position, to be fair, given their greater likelihood of encountering them than people who live in cities—it might encourage the bandits to leave the area, or at least put a stop to their raids for a while.\n            *page_break\n            *goto hulijing\n          #Attempt to contact their leaders and negotiate some form of peace.\n            *set enlightened %+10\n            *temp strategy\n            *set strategy \"buddha\"\n            You have sympathy for these people forced from their homes, and you would like to support them, but given your orders, you cannot do it openly. Perhaps you can persuade them to take their business elsewhere and find a way to help them against the foreigners in the future.\n            *page_break\n            *goto hulijing\n          *if (stars=true) #Delay arrival a day to raid the bandit camp under the cover of fog.\n            *set day \"fourth\"\n            *temp strategy\n            *set strategy \"snake\"\n            Your understanding of the stars has granted you insight into the best approach: raid the camp under cover of fog. Numbers will no longer matter, and surely ghost warriors who attack in the fog will cause enough fear to dissuade the bandits from raiding the road again for quite some time.\n            *goto hulijing\n      #Stop early at night so I can run the students through training drills, keeping our fighting skills fresh.\n        *set fighting %+5\n        *set honor %+5\n        At the end of the first day of travel, you drill the students, setting up a mock combat between Lu Jin's group and your own. Your training at the monastery seldom involves squad combat, and the drill helps the students get a better idea of how to work together as a group.\n\t\t\n        The drill on the second night goes even more smoothly. You are confident that they will be able to use their skills effectively should it come to combat.\n        *goto plan\n      #Consult the stars at night, watching for signs that will make clear the most beneficial path.\n        *set magic %+5\n        *if magic > 50\n          As you consult the heavens, your reading, as always, is somewhat vague. It appears as though, a day after your planned arrival, the weather will turn foggy, and the fog will likely be so thick that both you and your enemy will be cloaked.\n\n          You also see that, regardless of your strategy, at least one among your number will not be returning to the Order of the Peach Tree after this encounter.\n          *set stars true\t\t  \n          *goto plan\n        *else\n          Despite your best efforts to read the heavens, you don't see much besides clouds and stars. You feel the practice has improved your ability somewhat, but not enough to gain any useful information for this mission.\n          *goto plan\n      #Focus on the well-being of the students, keeping them entertained with other tales of travel.\n        *set enlightened %+5\n        *if enlightened > 50\n          *set honor %+5\n          *set disciples +8\n          By telling stories and singing songs with your fellow students, you feel the group become more cohesive. You are becoming comrades, rather than just peers. The eight members of your team especially look eager to follow wherever you will lead them.\n\t\t  \n          *if LuJin \u003c 51\n            *set LuJin %+10\n            Even Lu Jin appears to appreciate your efforts.\n            *goto plan\n          *else\n            *goto plan\n        *else\n          Your efforts are noted by your fellow students, but you do not yet have the knack for reading people's emotions the way you can read their bodies in combat.\n          *goto plan\n  #This mission is urgent, and we have been trained to move quickly. We can make the trip in two days.\n    *temp day\n    *set day \"second\"\n    Making up a full day of travel will be a challenge, but by eating meals while walking and taking only short rests, you will arrive on the second night after leaving the monastery, rather than the third.\n    *goto plan\n\n*label hulijing\n\nOn the ${day} morning of your journey, the terrain has shifted from valley fields to the true foothills of the Yellow Mountains. Forests have closed around you, mostly pine, fir, and cedar here, though you know there are also bamboo forests near Kuei Xian. You are nearing what could be enemy territory, depending on how far out the raiders have roamed.\n\nAs you walk, you hear a human noise in the distance—it sounds as though it might be sobbing, or perhaps low voices. It is too far to tell.\n\nWhat do you do?\n\n*choice\n  #Send one of the students to scout ahead to discover the source of the noise as we continue toward Kuei Xian. The scout can catch up.\n    You continue along the road, more wary than you were, especially when your scout fails to catch up. Some of the students mutter about the huli jing—the fox spirits—that are said to inhabit these woods and make a game of tormenting monks.\n    *label scout\n    *choice\n      #Continue on; ${rivalhe} knows our route and can meet up with us in Kuei Xian.\n        *set honor %-5\n        *goto strategy\n      *hide_reuse #Send a second student off to find the first, and wait for him to return with news.\n        The second scout returns shortly, saying that he found no sign of the first scout, but did see evidence of a broken trap of the type used to catch foxes. \n        *goto scout\n      *hide_reuse #Go after the scout myself. I'll catch up with the group before they reach Kuei Xian.\n        *set honor %+5\n        You make your way into the woods, moving as quietly and softly as though you were walking on rice paper. The sound of sobbing—or whatever it may have been—stopped long ago, but you quickly recognize an empty fox trap. After spending some time looking around, a few yards from the fox trap, you see the telltale marks of a bootprint, the type you and your fellow students would leave if you were being careless about how you walked.\n\n        Next to the bootprint are animal tracks.\n        *choice\n          #Follow the tracks.\n            *set tenacity %+5\n            You walk through the fir trees, even more wary than before, following the indentations in the fir needles on the ground. The air is so still it might be holding its breath. Soon, the trail comes to an end at the base of a tree, where you see a hole in the ground, far too small to accommodate a human.\n\n            It looks like the students were right: this very much appears to be the work of a fox spirit.\n            *choice\n              #I announce myself to the fox spirit and humbly request the huli jing's presence.\n                *set tianxia %+15\n                *set Feng %+10\n                A fox's face emerges from the hole, and in a moment, an old man with foxlike whiskers and a narrow face is sitting next to you, right where the fox had been moments before. Behind him, seven fox tails peek out from beneath his changshan—a fine, brocaded red robe with the symbol for luck embroidered on it.\n\n                \"You are polite for a monk,\" says the spirit. \"I am, at the very least, intrigued.\"\n\n                \"One of my fellow students wandered this way,\" you say, keeping your polite tone. \"I thought perhaps you might have happened upon ${rivalhim}.\"\n\n                The old man laughs, but the voice that comes out of his mouth is at once an old man's, a young woman's, and the barking of a fox. \"I did indeed, my polite monk. And what will you offer me for ${rivalhis} return?\"\n\n                *label gift\n                *choice\n                  *hide_reuse #I offer coins. Foxes like shiny things.\n                    The huli jing scoffs at your offering. \"What need have I of money, when I can create my own?\" The old man lifts a hand, and you see that coins are pinched between each finger. \"Try again, polite monk.\"\n                    *goto gift\n                  #I offer food and drink, in the spirit of generosity and companionability.\n                    *set feng %+10\n                    The huli jing reaches out with a hand too quick for the old man's elderly appearance, taking the rice ball you have offered and making it disappear it into his mouth. He follows with a swig from the wine gourd you wear for traveling, and pats his belly contentedly.\n                    \n                    \"A fine trade, friend monk. I imagine we shall see each other in the future, if you can recognize me…\"\n\n                    *label trade\n                    *set scenefox +1\n                    *achieve foxed\n                    Once again, the fox is in front of you, seven tails stirring the fir needles behind it. Then the fox vanishes back into the hole, and your fellow student appears next to you, covered with dirt, twigs, and a disturbing bit of mouse fur in ${rivalhis} teeth.\n\t\t\t\t\t\n                    \"I was in a palace,\" ${rivalhe} says dreamily. \"I was eating the ripest lychee fruit I have ever tasted.\"\n\t\t\t\t\t\n                    By the time you have rejoined your companions, your scout has regained ${rivalhis} senses, and you are ready to press onward.\n                    *set disciples +1\n                    *goto strategy\n                  *if (cleverness > 50) #I offer a riddle.\n                    *set tianxia %+ 15\n                    *set feng %+20\n                    The old man blinks, then smiles. \"Oh, that is a fine riddle. One day I will appear to you with the answer. We will have to see if you recognize me.\"\n                    *goto trade\n                  #I offer my name.\n                    *set feng %+50\n                    *set tianxia %+ 25\n                    *set met_feng true\n                    The old man bows. \"A pleasure to meet you, ${name}. I am Feng. And I am quite sure that we will meet again.\"\n                    *goto trade\n              #I will not negotiate with spirits. I announce myself and demand the return of my scout.\n                *set tianxia %-10\n                *set feng %-90\n                Out of nowhere, a beautiful young woman stands before you, wearing a red brocaded qipao and her hair wrapped into an elaborate headpiece, like an aristocrat might wear. If her expression were not so angry, her face would be perfect: narrow with close-set eyes, thin eyebrows and high cheekbones. You notice seven fox tails flared out behind her.\n\n                \"You are an incredibly rude monk!\" she says. \"Why should I even bother to speak with you, let alone return your scout?\"\n                \n                \"You have no power over me, spirit,\" you say confidently.\n\n                She grins a wicked grin. \"Oh, we'll just see about that…\"\n\n                *goto foxhole\n              #I have no interest in engaging a fox spirit. I'll come back for the scout later.\n                *set tianxia %-5\n                *set honor %-5\n                *set tenacity %-5\n                The huli jing could tire of your fellow student before you are done in Kuei Xian, in which case, you can avoid confrontation with the fox all together. You hurry back to the others and press onward, leaving the huli jing behind.\n                *goto strategy\n          #I don't like the feel of these woods. I return to the road and the rest of my group.\n            *goto scout\n  #Send one of the students to scout ahead and wait for ${rivalhim} to return.\n    You wait, but after what you believe to be a reasonable amount of time, the scout has not returned. Some of the students mutter about the huli jing—the fox spirits—that are said to inhabit these woods and make a game of tormenting monks.\n    *goto scout\n  #Scout ahead on my own.\n    *set tenacity %+5\n    *goto feng\n\n*label feng\nYou make your way into the woods, moving as quietly and softly as though you walk on rice paper. The sound is definitely sobbing, and you see a flash of red through the fir trees. A few steps closer and you see that a beautiful young woman is kneeling in the fir needles, crying. She wears a heavy qipao, a long dress with a high neckline made of thick, brocaded fabric. Her hair is woven up into an elaborate headpiece, clearly marking her as a member of the aristocracy.\n\nShe looks up when she sees you approach, and, were it not for the tears, she could be a model for a painting: her narrow face and close-set eyes, her thin eyebrows and high cheekbones are the ideal of courtly beauty. But there are tears, and her lovely face is contorted in pain.\n\n*choice\n  #I go to help her at once!\n    *set cleverness %-10\n    *set honor %+5\n    As you reach the woman, you see that her foot—small and delicate, as you'd expect from a woman whose other features fulfill the perfect expectations of beauty—is caught in a fox trap.\n\n    \"Oh, kind monk,\" she says, her voice trembling with pain, \"could you bring yourself to help me out of this trap?\"\n    *label ledastray\n    \"Of course!\" you say. You set about prying the trap open, and soon, that delicate foot is free. The beautiful young woman makes a yelp, like a fox might, and pulls her wounded foot beneath her.\n\n    \"Oh, thank you!\" she says, breathlessly, and at once, she leaps up and kisses you, directly on the lips. The next instant, she has vanished.\n\n    As you look around the forest, you suddenly realize you have no idea which direction you need to go to meet up with your fellow students. This seems ridiculous, since you were quite certain you knew where you were until the woman kissed you.\n\t\n    But then, it's awfully ridiculous that she vanished into thin air, as well. You think that in the distance, you hear the yipping laughter of a fox, and it occurs to you that this woman was very likely a huli jing—a fox spirit trickster that likes, especially, to prey on monks.\n    *choice\n      #I go after the fox spirit to convince it to lead me back to the road.\n        *set cleverness %-5\n        In the same direction of the yipping laugh, you see small flares of light—foxlights, no doubt—lighting the way. You walk deeper and deeper into the forest, compelled to follow the spirit….\n        *goto foxhole\n      #I look at and listen to my surroundings, determined to puzzle my way back to my companions.\n        *if cleverness > 50\n          *set cleverness %+5\n          *set tenacity %+5\n          You know how to quiet your mind and observe, as any thinking person should. It does not take you long to get back to the path, and you count yourself lucky that you escaped from the fox spirit's mischief without further delay.\n          *goto strategy\n        *else\n          *set honor %-10\n          Try as you might, you cannot figure out where you are. While you are still working on a solution, one of the students from Lu Jin's team discovers you and leads you back to the road.\n          *goto strategy\n      #I go in the opposite direction of the fox's yelps. Better to move forward than stay put.\n        *set tenacity %+5\n        *if tenacity > 50\n          You're not entirely sure you're going the right way, but at least you know you're moving. In a short time, your perseverance pays off, and you hear the quiet sounds of conversation ahead of you, in a slightly different direction than you have been heading. You pause, but soon you realize that you recognize the voices, and you pick up your pace to rejoin your friends.\n          *goto strategy\n        *else\n          *set honor %-10\n          After wandering off in one direction, you are certain you've seen the area before, and you change your course to match what you remember. Unfortunately, this takes you in a wildly different direction, and it takes hours of wandering before you manage to find the scout, one of the students from Lu Jin's group, who was sent out to look for you.\n          *goto strategy\n  #This seems highly suspicious to me. I approach, but carefully.\n    *set cleverness %+10\n    *set feng %+10\n    As you approach, the woman looks up at you with tear-filled eyes. \"Oh, kind monk, could you help me?\" she calls, her voice as lovely as the rest of her appearance. \"My foot has become caught in a trap!\"\n    *choice\n      #I go help her immediately.\n        *goto ledastray\n      #This still seems suspicious. I step closer, but do not yet agree to help.\n        *set cleverness %+5\n        *set feng %+10\n        \"What kind of trap?\" you ask.\n\t\n        She grins, though there is real pain on her face, and after the first flash of amusement, it turns into a grimace. \"A fox trap, I'm afraid.\"\n\n        Behind the woman, seven fox tails flare to life, revealing that this is no true woman at all. She is a huli jing, a mischievous fox spirit that delights particularly in tormenting monks.\n\n        \"Why should I help you?\" you ask.\n\t\n        She shakes her head. \"Why is it always the wise ones who find me in such a predicament?\" she asks, mostly to herself. \"I will make it worth your while, monk. I can offer you unimaginable pleasure,\" she says with a coy wink that, upon the slight shift of her body, becomes a wince. \"I promise that we fox spirits are exceedingly creative.\"\n        *choice\n          #Unimaginable pleasure? Sounds good to me.\n            You remember releasing her from the trap, but that's where your clear memory stops.\n            *goto foxhole\n          #I want information about the bandits.\n            *set insiderinfo true\n            *set honor %+10\n            \"I've seen their main camp; it's not too far from here,\" says the huli jing. \"They are mostly former farmers or poor villagers, and a motley crew at that. Still, there are near a hundred of them, which dramatically outnumbers your little group, if I counted correctly. They are becoming quite the militia; they call themselves the Blue Scarves Rebellion. Their leader is a giant of a man named Deng Ping, a skilled fighter with fists like hammers.\"\n\n            She tells you the location of the camp and describes the best way to find it.\n\t\t\n            \"They have no quarrel with the Order,\" she says. \"I think their intent is more to tweak the nose of Governor Rong, since he's done absolutely nothing to help them against the foreigners in the southern parts of the province.\"\n\n            She winces again. \"Will that suffice?\"\n            *choice\n              #Release her from the trap.\n                *set feng %+20\n                *set tianxia %+15\n                *set met_feng true\n                You pry open the trap and the fox spirit slips her leg out. Suddenly, she is no longer a woman, but a fox, her seven tails spread out behind her. \n\n                \"Thank you,\" she says. \"My name is Feng, and I will remember your kindness.\"\n\t\t\t\t\n                She offers you a bow in her fox form, then dashes off into the trees, leaving you to return to your companions with no further trouble.\n                *set scenefox +1\n                *achieve foxed\n                *goto strategy\n              #Leave her stuck.\n                *set honor %-20\n                *set feng %-99\n                *set tianxia %-5\n                The huli jing screams curses at you as you abandon her and return to your companions, eager to use the information you've stolen.\n                *set scenefox +1\n                *achieve foxed\n                *goto strategy\n          #Her favor. It can never hurt to have a spirit on my side.\n                *set tianxia %+15\n                *set feng %+50\n                *set cleverness %+10\n                The fox spirit shakes her head. \"Wise indeed,\" she says. \"Agreed. You have earned my good will by freeing me now.\"\n\n                You open the trap and the huli jing snatches her leg back, as though afraid the trap will bite her again. She stands and bows to you.\n\n                \"My name is Feng,\" she says. \"And I am in your debt. We will meet again.\"\n\n                You make your way back to the road and your companions with no further trouble.\n                *set met_feng true\n                *set scenefox +1\n                *achieve foxed\n                *goto strategy\n  *if (male=false) #It is helpless women like her that make it so difficult for women like me to get respect. Let her figure it out herself.\n    *set feng %-10\n    She got herself into that mess, she can get herself out. She is clearly not a bandit and not a risk to you. You make your way back to the road and your companions without further delay.\n    *goto strategy\n  *if (male) #I don't have time to help a woman who clearly cannot help herself. This is no concern of mine.\n    *set feng %-10\n    She got herself into that mess, she can get herself out. She is clearly not a bandit and not a risk to you. You make your way back to the road and your companions without further delay.\n    *goto strategy\n\n*label strategy\n\n\nBaijiang Bridge is a huge, stone structure that spans the width of the Baijiang River. From this side, you can see the large black turtle of a mountain that rises over Kuei Xian. Now that you are here, it is time to put your plan into action. Are you ready to act on your plan?\n*choice\n  #I stand by my first plan.\n    *if (strategy = \"tiger\")\n      *goto tiger\n    *elseif (strategy = \"dragon\")\n       *goto dragon\n    *elseif (strategy = \"buddha\")\n        *goto buddha\n    *else\n        *goto snake\n  #I want to rethink my options.\n    *choice\n      #Prepare for battle.\n        *goto tiger\n      #Convince the bandits that the nature spirits want them to leave.\n        *goto dragon\n      #Seek out the leaders to negotiate.\n        *goto buddha\n      *if (strategy = \"snake\") #Use fog as cover to raid their camp.\n        *goto snake\n\n*label tiger\nYou are prepared to do battle, and, like the armies that made the Baijiang Bridge legend, you are ready to defend it. All you need is for the enemy to approach.\n*gosub end_trial_teaser\n*choice\n  #Block the Kuei Xian side of the bridge and wait; the bandits will show themselves.\n    You take up your positions, making it clear that you are there to block the road until your foes appear. And appear they do: row after row of men and women wearing blue turbans approach the bridge—at least a hundred all told. Those are bad odds, even for trained warriors like you.\n    *choice\n      #I have faith in our skills. We can win this battle!\n        *label fight\n        *if fighting > 70\n          *set fighting %+5\n          The bandits—more like a militia than outlaws—approach, keeping their formation. But you can see that they are frightened to face you. You grin, and their fear intensifies.\n\t\t  \n          The battle begins, and it is the loud crash of bodies you were craving; you and the other students so clearly outpace these would-be warriors that the odds no longer seem so bad. Because you are blocking the bridge, they cannot approach in full force, and you see that victory will soon be yours, with a rout that will go down in the history books.\n\n          Until Lu Jin cries out, \"Retreat!\" In surprise, the other students look at ${rivalhim}, and you realize that Lu Jin has crossed from your line into the bandits. In ${rivalhis} hand is a blue turban, and in the chaos, ${rivalhe} wraps it around ${rivalhis} own head. \"Retreat!\" ${rivalhe} calls again.\n\t\t  \n          And then, as the bandits retreat and Lu Jin disappears among them, it is all over but the shouting.\n          *goto returnwin\n        *else\n          *set fighting %+5\n          The head-on fight seemed like a good idea, especially with the bridge as terrain you control, but the sheer number of your foes is overwhelming. You and your fellow students fight bravely, but you know that the battle will not go your way. You are almost ready to call for a retreat when you hear Lu Jin's voice over the din.\n\t\t   \n          \"Surrender!\" ${rivalhe} calls out. \"We surrender!\"\n\n          There are a few more moments of chaos, but then one of the bandits comes forward, his blue turban in slightly better condition than most of the others.\n\t\t   \n          \"I am Deng Ping,\" he says, \"one of the leaders of the Blue Scarves Rebellion. We have no quarrel with the Order of the Peach Tree. Why have you come to fight us?\"\n\t\t   \n          \"Governor Rong asked us to come on his behalf,\" Lu Jin explains. The blue scarves grumble, but Lu Jin continues, \"We intended to protect the people of Kuei Xian from the danger surrounding them.\"\n\t\t   \n          \"The true danger is from the laowai who invade our lands!\" one of the rebels calls out, and, to the surprise of the students, Lu Jin nods.\n\t\t   \n          \"I agree,\" Lu Jin says firmly.\n\t\t   \n          \"Perhaps we can come to an arrangement,\" Deng Ping says. \"You, who understand our cause, stay with us to train us in the ways of your fighting. The rest can leave.\"\n\t\t   \n          *label lujinleavefail\n          *choice\n            #Try to persuade Lu Jin not to go.\n              *set lujin %+10\n              You discover you will actually miss your rival. But it seems Lu Jin is resolute. No amount of persuasion can convince ${rivalhim} to return to the Order with you.\n              *goto returnfail\n            #Support Lu Jin's choice.\n              *set lujin %+20\n              Perhaps Lu Jin can help restore balance from within the bandit forces while you work from inside the Order.\n\n              You are sure you will meet each other again.\n              *goto returnfail\n            #Good riddance.\n              *set lujin %-20\n              With Lu Jin gone, even though you have failed on this mission, you will have no rival for the role of senior student.\n              *goto returnfail\n      #I think we should reconsider negotiating.\n        *goto buddha\n  #Send a scout to issue a challenge to the rebel leader to meet in single combat.\n    Combat between champions of each side could save a lot of injuries and trouble. Your scout returns, and a veritable army of farmers follows behind him, led by a large man wearing a blue turban in slightly better condition than the others.\n\n    \"I am Deng Ping, one of the leaders of the Blue Scarves Rebellion,\" he says. \"We have no quarrel with the Order of the Peach Tree. We agree that if you defeat me in single combat, we will no longer trouble Governor Rong with our activities.\"\n\t\n    This last is said with a sneer; it is clear the rebels do not think much of the governor.\n    *label manoamano\n    Who will fight for the Order?\n    *choice\n      #Me.\n        *label champion\n        *if fighting > 50\n          *set fighting %+5\n          You charge at Deng Ping, and a short but furious battle ensues. Though he is not as well trained as you are, he is strong, and quicker than his size suggests. \n\n          But you know that when fighting men who rely on their strength, the trick is to use their momentum against them. Deng Ping makes a fast jab to your head, but you are not there: you quickly dart off the line, striking with a low blow to his ribs. As he stumbles forward on his own momentum, you land a kick to the nerve in the back of his thigh. Apparently oblivious to the pain, he recovers quickly, grabbing for the shoulder of your hanfu to slow you down. His grip makes it easy for you to lock his elbow and break his balance: a strike to his shoulder and a quick pivot into his grab sends him toppling to the ground. You slam a palm heel strike to his forehead, rendering him dazed.\n\t\t  \n          The bandits collect their fallen leader, and you allow them to, as honor dictates. Lu Jin hesitates for a moment, then says, \"We are wrong to fight them. I am going to join their cause.\" $!{rivalhe} continues, solemnly, \"Balance must return to the Middle Kingdom.\"\n          *goto lujinleavewin\n        *else\n          *set fighting %+5\n          Despite your best efforts, Deng Ping is a giant of a man, both strong and quick, and though he has little skill, a well-timed hammerstrike to your head sets your ears ringing and brings you to your knees.\n\n          Your fellow students collect you and load you into the cart with the supplies, preparing for the long trip back to the monastery.\n\n          Lu Jin, however, tells you of ${rivalhis} decision to stay with the bandits. \"I believe I can help their cause,\" ${rivalhe} explains. \"Balance must return to the Middle Kingdom.\"\n          *goto lujinleavefail\n      #Lu Jin.\n        *set lujin %+5\n        Lu Jin approaches Deng Ping, looking ready to fight, then suddenly bows before the rebel leader.\n\n        \"Forgive me,\" Lu Jin says, \"but I cannot fight you. I know I dishonor the Order, but I surrender to the worthier cause.\"\n\t\t\n        The students reel from the shock of Lu Jin's abandonment of the Order, and honor demands that you accept Lu Jin's surrender and report your failure back to the order.\n        *choice\n          #Forget honor. We will not lose this day.\n            *set honor %-10\n            *goto champion\n          #Accept defeat graciously.\n            *set honor %+10\n            This is not how you had hoped your mission would go, but you will not dishonor the order by going against your bargain. You and your fellow students—with the exception of Lu Jin—start back toward the monastery.\n            *goto lujinleavefail\n\n*label dragon\nYou cross the bridge into Kuei Xian to gather the supplies you will need. Though the village is not a large one, the presence of Governor Rong's summer estate gives the small town a cosmopolitan air. They see enough trade along the road that there are permanent shops where the items you need can be purchased.\n\nYou hear that most of the raids on the outskirts of town, typically on the farms closest to the Baijiang Bridge, have happened at dawn.\n\nHow have you decided to \"haunt\" the bandits?\n\n*label haunt\n*choice\n  #Set an ambush at the bridge to terrify the bandits the next time they cross.\n    *gosub end_trial_teaser\n    *if cleverness > 60\n      Because your trap must be designed in the open, the bridge is a trickier option, but you are confident you can manage it. As night falls, you, Lu Jin, and the students work in silence, spreading blossoms along the bridge like a carpet.\n\n      Your costuming comes next. \n      *label preparation\n      You were able to procure a number of robes, changshans and qipaos in traditional style, and now you and your fellow monks appear to be aristocrats, both male and female, particularly once one of the more intrepid students manages to pin up the hair of the students dressed as women into headdresses.\n\n      A little rice flour to whiten your faces and you look ethereal in the darkness. Hopefully you will look as good in the halflight of dawn.\n\n      What do you do while you wait?\n      *choice\n        #Allow the students to rest in short shifts, so that the bandits do not come on us by surprise.\n          *set enlightened %+5\n          It has been a long trip; a little rest will keep you fresh for your performance at dawn, if the bandits arrive at their usual time.\n          *goto spirits\n        #Use musical instruments to further the ethereal atmosphere.\n          *set cleverness %+5\n          *if status > 60\n            Given your upbringing, you yourself have musical training and are a reasonable performer at the erhu. You take it from where you packed it in the cart with the rest of your supplies and begin to play. Its mournful tones reach out into the forest around you, and you are certain that if the bandits can hear you, they will already be ill at ease when they arrive.\n            *goto spirits\n          *else\n            Several of the students have some musical training. One brought an erhu from the monastery and takes it from the cart. After tuning, ${rivalhe} begins to play, making the strings weep and creating a chill in your bones. If you are feeling unsettled by the strange beauty of the music, you can only imagine that the bandits will be ill at ease as well.\n            *goto spirits\n    *else\n      *goto dragonfail\n  *if insiderinfo = true\n    #Head to the bandit camp, based on the location given to you by the fox spirit.\n      *gosub end_trial_teaser\n      *if cleverness > 60\n        *goto camp\n      *else\n        *goto dragonfail\n  *else\n    *hide_reuse #Ask around the village and, based on local gossip, calculate the most probable location for their camp.\n      *gosub end_trial_teaser\n      *if cleverness > 70\n        *set cleverness %+5\n        Though everyone professes not to know where the bandits keep their camp, between the locations of their raids on local farms, the time at which the raids occur, and the fact that you're fairly certain at least two of the people you talk to are sympathizers with what they call the Blue Scarves Rebellion, you have no trouble figuring out the location of the bandit camp.\n        *goto camp\n      *else\n        Someone better at analyzing scraps of gossip might stand a better chance at puzzling this out than you. As it is, no one in town admits to knowing where the bandits make their camp, and you are completely at a loss as to where to find it.\n        *goto haunt\n\n*label camp\nYou head into the night with your supplies, silently making your way to the bandit camp. From the way the few torches are arranged in the camp, you are fairly certain you know where the bandits will emerge when they make their way to their morning raid. After selecting an ideal location, one that will be full of shadows and feature easy places to hide (or quickly make an escape, should it be necessary), you begin your preparations.\n\n*goto preparation\n\n*label spirits\nFinally, dawn arrives, and with it comes a chilly fog that blankets the bridge in mist. You could not have asked for a better atmosphere to accompany your plan! As predicted, the bandits begin to approach your location. You are the closest to them and are ready to begin the charade.\n\n\"You must stop,\" you say, keeping your voice low and mysterious.\n\nThe bandits freeze where they stand.\n\n\"To attack your countrymen upsets the balance of the heavens,\" one of the students hisses behind you. You imagine how terrifying he must appear, as though suddenly springing forth from the mist.\n\n\"The village is under our protection,\" another says. You see out of the corner of your eye that ${rivalhe} is standing on a ledge, an effect that makes ${rivalhim} appear to float in midair.\n\nPhrase after phrase tumbles through the fog as the students proclaim their \"nature spirit\" duties protecting the village and the people who live there. You deliver your own lines, allowing a little menace into your tone. The bandits have begun to edge backward, away from you into deeper fog. You raise one hand, the signal for all the students to fall silent, and from the back, one lets out a blood-curdling scream on cue.\n\nAs one, the bandits turn and flee, faster than the speed of the Baijiang River beneath the bridge.\n\nNow, it is your turn to fade into the fog. You retreat, knowing that you must disappear before the light gets better and the fog wears off.\n\n*page_break\n\nHours later, the fog is still thick, and you and the students are celebrating your success in a tea house in Kuei Xian. You will return to the monastery in a few days—you need to be sure that your plan truly worked before you can report your success.\n\nAfter those few days have passed, it becomes clear that your plan did indeed succeed, at least in the short term. Nothing has been seen of the bandits since your trick.\n\nThe morning you are to leave, Lu Jin approaches you.\n*label lujin2\n\"I have decided to seek out the rebels and join them,\" ${rivalhe} says abruptly. \"Don't worry; I won't dishonor the Order by revealing your trick. It will be better for their cause if they don't bring Imperial attention to themselves too early anyway.\" $!{rivalhe} scoffs. \"Not that the Son of Heaven could be bothered to pay attention to them when they sought his help.\"\n*label lujinleavewin\n*choice\n  #Try to persuade Lu Jin not to go.\n    *set lujin %+10\n    You discover you will actually miss your rival. But it seems Lu Jin is resolute. No amount of persuasion can convince ${rivalhim} to return to the Order with you.\n    *goto returnwin\n  #Support Lu Jin's choice.\n    *set lujin %+20\n    Perhaps Lu Jin can help restore balance from within the bandit forces while you work from inside the Order.\n\n    You are sure you will meet each other again.\n    *goto returnwin\n  #Good riddance.\n    *set lujin %-20\n    With Lu Jin gone and this success behind you, no one can dispute your proper role as senior student.\n    *goto returnwin\n\n*label dragonfail\nDespite your best laid plans—costuming, makeup, atmosphere, and even ideal weather—your plan was an utter failure. The plan never managed to come together. Perhaps if you had chosen a better position or a simpler script…\n\nThe bandits were on to you the moment your performance began, which meant that you and the students were forced to fight in the qipaos and changshan robes you'd chosen as costuming—not ideal clothing for combat. The fog that had at first seemed like a blessing meant instead that the bandits, who knew the terrain better, could take advantage of that greater knowledge.\n\nIn short, you had to retreat. Worse, Lu Jin has announced ${rivalhis} decision to abandon you and the students to join the rebellion. Bruised and battered, you prepare to make your way home.\n\n*goto lujinleavefail\n\n*label buddha\nDespite the fact that the bandits are criminals, they are also your countrymen, people who have fallen on hard times due to the incursion of foreigners in the Middle Kingdom. Though you may not agree with their tactics, you want to help their cause.\n*gosub end_trial_teaser\n*label contact\nHow will you make contact?\n\n*choice\n  *hide_reuse #Scout the woods in pairs until we find it.\n    *set tenacity %+5\n    *if tenacity > 50\n      It takes some time, but you manage to discern the location of the bandit camp without being noticed.\n      *goto negotiate\n    *else\n      The woods continue to confuse you, and you lose your way more than once. Eventually you decide there must be a better way to discover the location of the camp.\n      *goto contact\n  #Wait until the bandits make a raid across the Baijiang Bridge and follow them back.\n    *set cleverness %+5\n    The morning after you arrive, the bandits make a raid on one of the terraced farms outside of Kuei Xian. It is difficult not to interfere with the theft of some poor farmer's rice harvest, but you are determined to find the bandit camp, and this is a certain way. You follow silently, without being noticed.\n    *goto negotiate\n  *if insiderinfo = true\n    #Head to the bandit camp to talk to Deng Ping, using the location given to you by the fox spirit.\n      *goto negotiate\n  *else\n    *hide_reuse #Ask around the village and, based on local gossip, intuit the most probable location for their camp.\n      *if enlightened > 60\n        Of course, no one admits that they know where the bandit camp is, but based on the body language you watch as people talk, the tones of their voices, and other subtle cues, you are able to discern exactly where most people think the camp is.\n\n        You also learn that the leader of the self-titled Blue Scarves Rebellion is named Deng Ping.\n        *goto negotiate\n      *else\n        Someone better at reading people might be able to guess at the right direction, but the people of Kuei Xian leave you at a loss. You'll have to try another way.\n        *goto contact\n*label negotiate\nYou and your fellow students walk into the camp calmly, as though you belong, despite your sengfu clothing marking you as monks of the Order of the Peach Tree. The bandits, most of whom do seem to come from humble backgrounds, have no idea what to do with you. Because you do not appear to be hostile, they seem unwilling to confront you.\n\nFinally, a large woman of middle age, her hair wrapped in the same blue turban you see throughout the camp, stands in front of your group.\n\n\"What is your business?\" she asks sternly. You imagine that this is the same tone of voice she uses when she suspects her children of having gotten into mischief.\n\n\"We'd like to speak to your leader,\" Lu Jin says politely.\n\nThe woman looks suspicious, but after a moment, she nods, then beckons for you to follow. In the center of the camp—which gives the appearance of being a tent city, something quickly dismantled to move—there is a large fire, at which sit a number of men and women talking seriously.\n\n\"Deng Ping,\" the woman says loudly, and the tallest of the men, wearing clothing slightly better cared for than that of his peers, stands. \"Order of the Peach Tree to see you.\"\n\nDeng Ping approaches suspiciously and waits for you to speak.\n*choice\n  #Begin by offering our condolences for the misfortune that brought the bandits here.\n    *set enlightened %+5\n    *if enlightened > 60\n      For a moment, it looks as though Deng Ping might take your empathy for pity and be insulted. But he sees the earnest expression on your face and relaxes.\n\n      \"We are not born warriors, and most of us would prefer the lives we had to the ones we lead now,\" he says. \"But I am sure it is not your sympathy for our plight that brought you here.\"\n\t  \n      \"No,\" you agree. \n      *label conversation\n      \"Governor Rong asked the Order of the Peach Tree for aid in stopping your raids on the farmers of his province.\"\n\t  \n      \"Farmers much like you once were,\" Lu Jin reminds them, and many of the bandits look shamefaced at this.\n\t  \n      \"We know you need supplies, and food, but these raids draw undue attention to your activities,\" you continue. \"If the Emperor sends men to stop you…\"\n\t  \n      \"Your rebellion will end,\" Lu Jin says quietly. \"And no one will fight to bring balance back to the Middle Kingdom.\"\n\n      \"What do you suggest?\" asks Deng Ping.\n      *choice\n        #Suggest taking their raids against the foreigners.\n          *set tianxia %+10\n          Deng Ping sighs. \"I wish it were that simple,\" he says. \"But perhaps we can move closer to some of the foreign settlements for a time and cause them the kind of trouble they've caused us.\"\n          *goto buddhawin\n        #Recommend making allies among the townsfolk to gain supplies.\n          *set enlightened %+5\n          The woman who led you to Deng Ping nods at this recommendation. \"I've been trying to convince him of the same thing myself,\" she says. \"We know there are those in Kuei Xian who support our cause—and who would support it more openly were we not attacking their farms.\"\n\n          Deng Ping grunts. \"Next you'll be telling me that we can count on Governor Rong for support.\"\n\t\t  \n          \"I suspect you can count on him to look the other way, if you don't cause him direct trouble,\" Lu Jin offers. \"He prefers that the difficult work of governing be done by the bureaucracy, rather than by his own hand.\"\n          *goto buddhawin\n        #Encourage them to live off the land and train for a full-scale rebellion.\n          *set tenacity %+5\n          Deng Ping sighs. \"There are enough of us to make that difficult—and more every day. We had land to support ourselves, and it was taken away. The farther away we go from the villages, the wilder the land becomes.\"\n\t\t  \n          \"And the harder to tame,\" you agree. \"It won't last for long, perhaps only a season, but that might be enough time to relocate someplace where you can find allies to support you, or richer targets—\"\n\n          \"Laowai targets,\" Lu Jin offers.\n\n          \"—to raid,\" you conclude.\n          *goto buddhawin\n    *else\n      Rather than seeing your words as empathy, Deng Ping looks insulted. \"Do not offer us pity, monk,\" he spits. \n      *label rejection\n      \"You may as well be in league with the laowai, for all that you do to prevent their incursions. Every day that passes, their power and influence grows, and it is time for someone to stand against them. If that means us, so be it.\"\n\n      There are cheers from among the bandits, and the atmosphere that was previously uncertain has taken on a distinct air of hostility.\n\n      \"I intended no dishonor,\" you begin, but Deng Ping scoffs.\n\n      \"Tell your masters—tell the Son of Heaven himself—that we will do whatever it takes to rid the laowai from our land.\" He steps forward, aiming a finger at your chest. \"Whatever it takes.\"\n      *choice\n        #I cannot refuse a challenge to my honor—and neither can he. Challenge him to a fight.\n          Clearly Deng Ping will not listen to reason. Instead, you challenge him to fight a member of the order, one on one. If he loses, he is bound by honor to leave Kuei Xian alone.\n\t\t  \n          In order to avoid losing face among the bandits, Deng Ping accepts your challenge.\n          *goto manoamano\n        #Accept defeat. Clearly he will not listen to me.\n          You offer a shallow bow, knowing that words will do you no more good. You and the other students retreat to the road to decide what to do.\n          *choice\n            #Return home in defeat.\n              Before you return home, Lu Jin takes you aside. \"I believe I can help them more here than by continuing my studies at the Order,\" ${rivalhe} explains. \"Balance must return to the Middle Kingdom.\"\n\t\t\t  \n              Without waiting for your response, Lu Jin runs back into the forest, toward the bandit camp.\n              *goto returnfail\n            #I cannot go back to the monastery without trying another way. We must fight them.\n              *goto fight\n        #Find out what we can offer them to change their minds.\n          *set cleverness %+10\n          \"Surely there is something we can offer that will persuade you to change your targets,\" you offer.\n\n          \"You have little enough with you,\" Deng Ping says, gesturing to your small party in the face of his hundred or more bandits. \"What of value could you offer us?\"\n\t\t \n          \"Knowledge,\" Lu Jin says quietly. $!{Rivalhe} hesitates for a moment, then looks up at Deng Ping. \"We could offer you a teacher, someone who could help you learn the ways of battle, who could train you in the skills you will need to face the Emperor's army one day, if it comes to that.\"\n\n          You and the other students look at Lu Jin in surprise. This possibility had never been discussed. But Deng Ping scratches his chin thoughtfully. Finally, he nods.\n\t\t  \n          \"I have some skill—as do some of the others—but not the same caliber as what you have received,\" he says slowly. \"Who would you offer?\"\n\t\t  \n          \"Me,\" Lu Jin says, and this time, you are not surprised.\n\t\t  \n          Deng Ping agrees to the deal, and you can see that this arrangement would bring the success you need on this mission. Still, you have a moment to pull Lu Jin aside and discuss it.\n          *goto lujinleavewin\n  #Get straight to business: explain that we were instructed to oust them, but that we'd rather see whether negotiation is possible.\n    *if enlightened > 50\n      *goto conversation\n    *else\n      Despite your efforts at sounding reasonable, it is clear that Deng Ping does not trust you or your intentions.\n      *goto rejection\n  #Try to strike some fear into their hearts: we may sympathize with their plight, but the next group will not.\n    \"We come with a warning,\" you say fiercely. \"You have little training. You may be a danger to others equally untrained, but when an army comes down on you, you will be crushed.\"\n    *if enlightened > 70\n      Deng Ping looks for a moment as though he will act in rage rather than fear, but he sees your earnest expression and realizes that, though your words are hard, you mean to help them.\n\t  \n      \"Say what you have come to say, and I will listen,\" he says.\n      *goto conversation\n    *else\n      Deng Ping roars in response, his anger clearly beyond words. He looks as though he does not have a fearful bone in his body.\n\t  \n      \"If you are so certain of victory, face us at Baijiang Bridge, and we shall see,\" he says when his wits overcome his anger. \"We will even give you the benefit of the easier terrain to defend.\"\n\t  \n      And so you go to the bridge to prepare for battle.\n      *goto fight\n\n*label buddhawin\n\nYou have done it. The bandits will leave Kuei Xian alone for now. You can return home with your head held high. The bandits offer to have you spend a meal with them to seal their promise to you.\n\nAfter the meal, Lu Jin approaches you.\n\n\"I have decided not to return to the Order,\" ${rivalhe} says. \"There is much to be done here, among these people, and I think I am the one to do it. Balance must return to the Middle Kingdom.\"\n*goto lujinleavewin\n\n*label snake\nYour consultation of the heavens proved correct: the fog as rolled in just as expected, and you will be able to do your work unseen.\n\nAfter spending some time consulting the land around you, it becomes clear that the bandits have made their camp to the south of the road, a few hours' walk in ideal weather. It will take longer in the fog, but surely not many of the bandits themselves will venture out into weather that swallows vision so completely.\n\n*gosub end_trial_teaser\n\nYou reach the camp in near silence. How will you manage this raid?\n*choice\n  #Fight by picking off targets, relying on our martial skill.\n    *set fighting %+5\n    *if fighting > 60\n      You and your fellow students weave in and out of the tent city. There are nearly a hundred bandits in the camp, not counting the children among them. You leave the children alone, of course, only fighting those who look as though they could be responsible for the bandit raids.\n\n      But even better than the damage caused by the fighting is the chaos that comes from the bandits not knowing how many enemies are among them. \n      *label panic\n      Once the panic begins, you and your fellow students are able to melt back into the fog, forgotten, as the bandit camp practically tears itself apart.\n\t  \n      Before you return to the monastery, Lu Jin approaches you.\n      *goto lujin2\n    *else\n      *label snakefail\n      Despite the advantage given by the fog, you are vastly outnumbered. Once the alert has been raised, all of the able-bodied bandits—around a hundred of them—come out in force, and you find yourselves surrounded.\n\n      \"Surrender!\" Lu Jin calls out. \"We surrender!\"\n\n      There are a few more moments of chaos, but then one of the bandits comes forward, his blue turban in slightly better condition than most of the others.\n\n      \"I am Deng Ping,\" he says, \"one of the leaders of the Blue Scarves Rebellion. We have no quarrel with the Order of the Peach Tree. Why have you come to fight us?\"\n\n      \"Governor Rong asked us to come on his behalf,\" Lu Jin explains. The blue scarves grumble, but Lu Jin continues, \"We intended to protect the people of Kuei Xian from the danger surrounding them.\"\n\n      \"The true danger is from the laowai who invade our lands!\" one of the rebels calls out, and, to the surprise of the students, Lu Jin nods.\n\n      \"I agree,\" Lu Jin says firmly.\n\n      \"Perhaps we can come to an arrangement,\" Deng Ping says. \"You, who understand our cause, stay with us to train us in the ways of your fighting. The rest can leave.\"\n\n      It is settled almost before you have a chance to say anything; Lu Jin wraps a blue turban around ${rivalhis} head, and the Blue Scarves escort the rest of you back to the road and out of the forest.\n      *goto returnfail\n  #While the students are fighting, use my chi to leap from tent to tent, bringing the bandits' housing crashing down around them.\n    *set magic %+5\n    *if magic > 60\n      If the weather were clear, your fellow students would be able to see you fly. As it is, your graceful floating from one unstable tent to another leaves only a wake of chaos. It is not long before the bandits begin to panic. They have no idea how many enemies are among them, nor what forces are at work bringing their camp to utter destruction.\n      *goto panic\n    *else\n      Your raid begins well as you make the first leap atop one of the already wobbly tents. But you miss your balance early on, tumbling to the ground and surrounded by three bandits who are ready to bring combat directly to you. Your fellow students have had no better luck.\n      *goto snakefail\n  #Locate their stores of water and the outhouses, then taint their water.\n    *set honor %-10\n    *set cleverness %+5\n    It is said that a goddess offers gifts of prophecy to those who seek her wisdom while using the outhouse. Though you are not seeking wisdom, you discover a bounty of supplies. Though the smell is wretched and you and your fellow students also bear the taint of your work, you successfully poison the water.\n\n    The result will, frankly, be dreadful. Those who don't get sick from the water will have to go elsewhere to find fresh water to drink. If they take their fellows when they relocate, it will be some ti
