he monks have no gunpowder inside the monastery, they do have enough haphazard supplies to make fire arrows—which you order loosed directly into the remaining munitions stocks. The result is explosive.\n        *goto fortified\n      *else\n        The real trouble comes from Gower's cannons. They are difficult to bring up the mountain path, but they fire well, and the walls shake whenever they are impacted. One of the monks on guard and a student are killed from the dangerous rubble spray. Though the monks have no gunpowder inside the monastery, they do have enough haphazard supplies to make fire arrows. You order these aimed directly for the munitions—to explosive results.\n        *goto fortified\n    *else\n      But even your patience is waning, and the other monks can sense your anxiety about the coming attack. As the foreigners approach, bungling into traps and gaining casualties and wounded along the way, you order a counterstrike too early, sending spears raining down between them and the monastery and wasting valuable ammunition. The foreigners gather around a makeshift battering ram, and you order the monks to find any kind of oil in the supplies to keep the ram from being useful. By the time they have gathered what you've requested, the ram has done some damage, and though the full stock of the kitchen's sesame oil has made the ram too slippery to pick up again, the doors have already splintered.\n\t  \n      *if ammunition\n        The only consolation you have is that, with the damage you've done to Gower's cannons, it will take far longer for them to break down the door. But the result is already inevitable.\n        *goto cranemaster\n      *else\n        And then, everything becomes worse when Gower orders the cannons to fire.\n        *goto cranemaster\n  #I will challenge a champion from the foreign army in single combat.\n    *set honor %+5\n    Even the foreigners should respect the tradition of single combat as a way to determine who is right. You send a messenger down to Gower to announce your intention, and receive an acceptance. If you lose, the foreigners will take possession of the monastery. If you win, they will leave. The next day, you will face a champion from within the ranks of the foreigners, your best weapon against his. \n    *goto champion\n  *hide_reuse #I will call the forces of nature against the foreign army. \n    *set magic %+5\n    Like Master Zhuge before you, you are confident that you can summon the forces of nature to act on your behalf. From the monastery walls, you see that the foreign army has placed most of their campfires at the eastern edge of the camp, the farthest part of the camp from the path to the monastery. If you could spread those fires, you might be able to set the whole camp alight.\n\t\n    All you need is an east wind.\n\n    *if magic > (60+difficultyModifier)\n      Wrangling the forces of nature to your will is difficult, but you are confident that you can draw on both the wind and the fire to do your bidding. That night, you climb the mountain above the monastery, all the way to Bingdian Waterfall, and begin to set up a circle of twenty-eight flags. These represent the zodiac and the four cardinal directions: seven blue-green flags make up the east quadrant, seven black flags take the north, seven white flags in the west, and seven red flags along the south. Next, you arrange sixty-four yellow flags, for the lines of prophecy in one of the great books, in an outer circle. Twenty-eight monks take the positions you assign them, looking outward rather than at you. You light incense in the center of the circle and meditate.\n\t  \n      You call on the fire and you feel its heat. You call on the wind and feel its breath. It whispers at you out of the east, and you allow the strength of both powers to build, stronger, until they are beyond even your control.\n      *page_break\t  \n      Even this far up the mountain, the sounds of chaos begin to reach you. \n      *if ammunition\n        *label windend\n        *achieve peachsave\n        After waiting a little longer, you gather your flags and dismiss the monks who took part in the ceremony. When you reach the monastery, you climb up on its walls to view the enemy camp below. It is engulfed in flame, with men scurrying about like ants whose hill has been crushed, trying to douse the flames. By morning much of the enemy camp—and no small portion of the bamboo forest surrounding it—has gone up in smoke. The foreigners retreat, and you make sure to have rumors spread by every merchant and traveler who does business with the monastery: the winds listen to the Order of the Peach Tree. No mere man can stand against them.\n\t\t\n        Your fellows hail you as the hero of the hour, and you know that your prestige has grown in the eyes of the Order. For your own sake, you are glad of the success you had in defending the monastery, and are relieved that another challenge is behind you.\n        *set status %+25\n        *set tianxia %+20\n        *finish Chapter Seven: The Imperial Challenge\n      *else\n        The explosions as the fire hits their stocks of munitions is especially satisfying. You have used their own weapons against them.\n        *goto windend\n    *else\n      Wrangling the forces of nature is difficult, and though you and several others you intended to participate in the ritual travel all the way up to Bingdian Waterfall to call on the winds, you can tell early on that your meditation has no effect. The wind is the same breeze from the northwest that you have been feeling for days, and the fires in the enemy camp continue their merry cheer, with no thought of turning into blazing infernos.\n\t  \n      You will need to try something different.\n      *goto tactics\n  *hide_reuse #We will create a ruse, making the monastery look better fortified and populated than it is.\n    Master Zhuge is said to have created an entire army out of smoke once. While you studied under her, she admitted that the tale is only partly true: she created a decoy army out of stick men and the trappings of a fighting force. Within the monastery, there are plenty of tapestries and other cloths that could be made to look like the flags of squads of warriors. You are confident that with a little effort—and some judicious placement—you can create a whole decoy army on the mountainside around the monastery.\n\t\n    *if disciples > 40\n      It helps that you have enough followers to be able to spread them along the mountainside without stretching the resources of the monastery itself.\n      *goto ruse\n    *else\n      *goto ruse\n  #I will defer to another of Abbot Bao's advisors and abide by that decision.\n    *goto cranemaster\n   \n*label fortified\n*page_break\n*achieve peachsave\n*if imperial2\n  Fortunately, you do not have to withstand the siege for long. Your letter to Governor Rong has paid off, and a cavalry unit, accompanied by light infantry shock troops, is sighted from the monastery within days of the first attack. The foreigners immediately retreat to address the new group, and you are unsurprised when, after a meeting between the two groups, the foreigners retreat. A few hours later, Commander Rong Jue, Governor Rong's eldest son, arrives at the monastery gates.\n  \n  \"Forgive us for not arriving sooner,\" he says. \"Clearly there has been a misunderstanding between George Gower and the Son of Heaven. I have been assured that you will not be troubled again.\"\n  \n  You have outlasted the foreign army, and the Emperor has finally shown some willingness to stand against the foreign barbarians. You feel victorious about the role you have played in defending the monastery. Not only have you increased your status in the eyes of the Order of the Peach Tree, but you have drawn the notice—and, apparently, approval—of the Emperor himself.\n  *set tianxia %+30\n  *set status %+25\n  *finish Chapter Seven: The Imperial Challenge\n*elseif rebel2\n  In addition to your defenses, Deng Ping and the rebels have come to your aid. Familiar with guerrilla tactics in difficult environments, the bandits pick away at the foreign army, harrying their perimeter and drawing them on chases into traps they have laid in the bamboo forest and, farther down the mountain, into the marsh. After another week of making no progress against your fortifications and being constantly under attack from the rebels, Gower retreats.\n  \n  You have outlasted the foreign army and given the Blue Scarves Rebellion their first major victory against the foreigners. As the last of the foreigners leave, the rebels arrive at the monastery, welcomed by the monks despite the Order's former neutrality. From the remaining supplies and those that Deng Ping's men have procured, a feast is held, and you are celebrated as the hero of the hour. You feel victorious about the role you have played in defending the monastery. Not only have you increased your status in the eyes of the Order of the Peach Tree, but you have given confidence to the Blue Scarves Rebellion.\n  *set tianxia %+20\n  *set status %+25\n  *finish Chapter Seven: The Imperial Challenge\n*else\n  After weeks of rationing and fighting, you finally cause enough attrition within Gower's ranks that your numbers are close to even. Gower, realizing that his advantage is wearing thin, makes a retreat while he can—followed by spears hurled and arrows shot from your walls.\n  \n  You have outlasted the foreign army through sheer strength of will. The Order of the Peach Tree has proven that it can stand on its own and withstand adversity from beyond its walls. You feel victorious about the role you have played in defending the monastery, and know that your status has increased in the eyes of all of the members of the Order.\n  *set tianxia %+20\n  *set status %+25\n  *finish Chapter Seven: The Imperial Challenge\n\n*label cranemaster\n*page_break\nOne of the monks, a Master of the Crane style, calls for a retreat. \"The only hope we have now is to abandon the monastery,\" he says. \"We know this land, and we can evade them. The Order of the Peach Tree must not perish.\"\n\nAnd so the monks and the students gather what treasures they can from the monastery—weapons, scrolls, tapestries, and cuttings from the peach tree—and begin the climb up the mountain under cover of darkness. The Crane Master advises you to scatter, and so you do, hoping that the others will have as good, or better, a chance for survival as you do. You make your way back to your home in Kuei Xian, heartsore and weary, distressed that you were unable to do more to save the monastery.\n\n*set status %-25\n*finish Chapter Seven: The Imperial Challenge\n\n*label champion\n*set fighting %+5\nTo make a point, you have decided to face their champion empty handed. \n*page_break\nYou walk confidently down the path as the time of your meeting approaches. Many of the monks follow you, as much to witness the battle as to provide you with support should the foreigners prove dishonorable. Just before the camp of the foreigners, a space has been cleared, and a young man wearing a cutlass and wielding a hand cannon stands next to George Gower himself.\n\n\"Greetings, ${name},\" Gower says cheerfully. \"This is Erasmus Fontaine. He'll be your opponent today.\"\n\nFontaine looks up at you from his hand cannon and you see clear hatred in his eyes. This man means to kill you, regardless of any agreement you might be able to reach with Gower.\n\n\"Should your man die, I expect you to continue to honor our agreement,\" you shout out, so that everyone can hear.\n\nFontaine snorts.\n\n\"Of course!\" Gower says, waving away your concerns as though they are unmerited, and as though you have not just called his honor into question. \"We've agreed to the terms, monk. Shall we get on with it?\"\n*page_break\nWithout waiting for you to agree, Fontaine lifts the hand cannon and shoots.\n*choice\n  #I dodge beneath the shot, closing so that his weapon becomes useless.\n    *if fighting > (55+difficultyModifier)\n      You dodge low into a roll, covering the ground between you as the bullet whizzes over your head. When you come up, you are directly in front of Fontaine, closer to him than the end of his hand cannon, which he starts to drop in order to reach his cutlass. \n      *label roses\n      But you are too fast, and you launch into the Eight Deadly Roses—eight strikes, each one deadly, done in such quick precision that even if one is blocked, any subsequent one will kill your foe. Fontaine is dead before his body hits the ground. \n\t\n      *label fightwin\n      *achieve peachsave\n      The foreigners, who had begun to cheer when Fontaine shot, fall deadly silent. But Gower simply nods at you. \"It seems I have underestimated you,\" he says. \"We will abide by our agreement.\" He says something in the foreign tongue and you tense—but immediately, the foreigners turn away, heading back into their camp. Within hours, they have started a retreat, leaving the Order of the Peach Tree to once again decide its own fate.\n  \n      You are hailed as the hero of the hour, and it is clear your prestige has grown among the members of the Order. For your own sake, you are glad of the success you had in defending the monastery, and are relieved that another challenge is behind you.\n      *set tianxia %+20\n      *set status %+25\n      *finish Chapter Seven: The Imperial Challenge\n    *else\n      *label death\n      You dodge, but not quite in time. The bullet rips through your chest, piercing your heart. As you fall to the ground, you hear Abbot Bao calling out a surrender, and you know the Order of the Peach Tree will survive—though clearly, now under the thumb of the foreigners.\n      *goto_scene death\n  #I use my chi to leap over his shot and attack him from above.\n    *if magic > (55+difficultyModifier)\n      You leap faster than the bullet fires, feeling it pass below you as you descend on your opponent. He raises his hand cannon at you in the air, but you are already on him, using your higher vantage point to execute Parting the Clouds—which rakes twice across his face before piercing the pressure point called the village rain, the notch right between the clavicles, with an Immortal Man strike. The strike drives him downward as your full body weight presses on top of him, and as he hits the ground, you feel your fingers crush his windpipe.\n      *goto fightwin\n    *else\n      *goto death\n  #I fade slightly to the side, allowing the bullet to graze my shoulder, before closing the distance.\n    *if tenacity > (50+difficultyModifier)\n      You are unafraid to face the power behind the hand cannon, and you know that if you keep walking toward him while you are shot and bleeding, you will drive fear into the hearts of the foreigners. The bullet hurts when it pierces through a thin layer of skin at your shoulder, but you ignore it, marching toward Fontaine unhurriedly. He reloads, fumbling with his hand cannon and quivering as you approach, clearly in terror of your advance. Step after step, you close the gap, and he drops the half-loaded gun, reaching for his cutlass. Though your progress has been slow until this point, suddenly you are a blur of motion, and the light of hatred rekindles in Fontaine's eyes as he draws his sword to fight you.\n      *goto roses\n    *else\n      *goto death  \n*label ruse\n*if cleverness > (60+difficultyModifier)\n\n  In one of the monastery's storage rooms, you find a number of drums, which gives you an additional idea: you can stretch skins on circular frames—easy enough to make from young bamboo—to create additional instruments. Drums have long been a traditional way of sending messages and commands to soldiers, and if you can fill the mountainside with the noise of drums, along with your decoy flags, you can create a convincing diversion.\n  *page_break\n  That night, under cover of darkness, you send your assigned drummers out into the mountainside, armed with cloth to use as banners, drums, and materials to start a fire. As morning dawns, the mountainside looks as though it is covered in campfires.\n\t\n  From the monastery walls, you drum a signal. The drums along the mountainside answer back. You drum out again a little while later. The drums answer, louder and closer to the monastery than before. The enemy camp is abuzz with energy, and you believe your ruse is working.\n\t\n  *if rebel2\n    A little later, another series of drum calls joins your ruse, and you know that Deng Ping's drummers are answering you from below. Using a telescope that is one of the monastery's treasures, you look down at the foreign army and see their sheer panic at being faced on two fronts. Hours later, the enemy camp is on the move.\n\t  \n    \"I do not know what we will do the next time he makes this attempt,\" Abbot Bao says. \"Surely he will eventually see through your ruse.\"\n\t  \n    \"We will be ready,\" you promise.\n\n    You have avoided conflict with the foreign army, through deceit, but successfully none the less. One day this may return to haunt you, but in the meantime, you have gained status in the eyes of the Order of the Peach Tree, and are pleased with the role you have played in defending the monastery.\n    *achieve peachsave\n    *set status %+20\n    *finish Chapter Seven: The Imperial Challenge\n  *else\n    To top off the ruse, you send archers down into the bamboo forest. You have monks within the monastery fire arrows down the mountain; moments later, the archers in the bamboo forest shoot their ammunition down at the enemy camp. The effect makes it look as though, despite the vast range from the monastery to the camp, your arrows can reach your enemy. Hours later, the enemy camp is on the move.\n\t  \n    \"I do not know what we will do the next time he makes this attempt,\" Abbot Bao says. \"Surely he will eventually see through your ruse.\"\n\t  \n    \"We will be ready,\" you promise.\n\n    You have avoided conflict with the foreign army, through deceit, but successfully none the less. One day this may return to haunt you, but in the meantime, you have gained status in the eyes of the Order of the Peach Tree, and are pleased with the role you have played in defending the monastery.\n    *set status %+20\n    *achieve peachsave\n    *finish Chapter Seven: The Imperial Challenge\n*else\n\n  Despite your best efforts, the flags representing additional forces that you assign to be spread throughout the mountainside have no impact on the foreign camp. The appearance of additional troops was not enough to be convincing, and the foreigners have seen through your ruse.\n\t\n  You will have to try something else to force them to leave.\n  *goto tactics", "romance": "*temp sexpref \"none\"\n*temp lovehe\n*temp lovehis\n*temp lovehim\n*temp lujineligible false\n*temp letters 0\n*temp samesex false\n*temp failure 0\n*temp suit \"none\"\n*temp fengeligible true\n*set fengeligible true\n*temp readletter1 false\n*temp readletter2 false\n*temp readletter3 false\n*temp samesex2 false\n*advertisement\n\nThe move from Master Zhuge's hermitage up the mountain to the house on the outskirts of Kuei Xian goes smoothly, especially with Feng's help. The fox spirit has a knack for making heavy objects—like the racks of weapons that Master Zhuge has entrusted to you, or the trunks of scrolls from Master Zhuge's library—take up far less space than they ought to. Her willingness to put in her own hard labor is surprising, given the reputation of huli jing, but considering Master Zhuge's kind words about the fox spirit, you take her efforts at face value.\n\nFor now.\n\nThe house is far larger than the small cottage you expected, and more space than you have had to yourself since you first joined the Order of the Peach Tree. Built in the traditional courtyard design, it has a front wall with an entryway into a large open courtyard, decorated by a pair of cherry trees. The house is built in a U around the courtyard; opposite the wall is the main section of the house, with a kitchen, a study, a dining room, and a bedroom. The two sides, connected to the main section of the house by open-air hallways at the corners, are large, empty spaces with smooth bamboo flooring. A final L-shaped building, which doubles as the wall around two sides of the property, appears intended to house a staff of servants. Clearly, this property once belonged to someone wealthy enough to live in comfort, though the servants' building is in a state of disrepair.\n\nFeng does not take a room for herself, but she does seem to know when her help is required, and over the course of a few weeks, you discover that you always wake to the smell of a hot breakfast and a scented oolong tea. The side halls never seem to gather dust, despite the fact that you have little use for so much space. Feng herself rarely appears, leaving you to unpack Master Zhuge's weapons and scrolls—and continue your studies—in solitude.\n\n*page_break\n\nAt the start of the fourth week, Feng makes herself present at breakfast, wearing a face and garb that give her the appearance of being the fair daughter of some well-to-do merchant or tea house owner. Despite her human form, her seven tails wave behind her back.\n\n\"I know that Miao was a hermit, but I didn't expect you to follow her path that way,\" the fox spirit complains, almost petulantly. \"If you're going to be here for a while, you ought to connect with members of the community, and invite them to visit before I become utterly bored.\"\n\nA bored fox spirit does not sound like a positive feature of your new home.\n\n*choice\n  #I am content with solitude. I will hole up in the main section of the house and continue my training.\n    The fox spirit notices your lack of enthusiasm about the prospect of meeting people. She throws up her hands in frustration.\n\t\n    \"Fine, fine,\" she says. \"You stay here. I'LL drum up some excitement for the both of us.\"\n\n    \"That sounds ominous,\" you respond, and Feng lets out a high-pitched bark that must be her laugh.\n\t\n    \"So you DO have a sense of humor,\" she giggles. \"Tell me honestly, monk, won't you get lonely?\"\n    *choice\n      #Honestly, I am prepared for the life of a hermit. I do not need companionship and I do not wish to get involved with worldly matters.\n        *label hermit\n        Feng sighs. \"I know that is not the path that Miao intended for you, monk. Don't be surprised if things don't go as you plan.\"\n\n        With that warning, Feng shifts quickly into her fox shape and dashes out of the dining room and into your courtyard. You do not see her again for several days.\n        *goto students\n      #I lie and say that I will not be lonely, though I probably will be. I intend to suffer for my art.\n        *if enlightened > 70\n          *goto hermit\n        *else\n          Feng's eyes sparkle. \"There's a bald lie if I've ever heard one.\"\n          *goto matchmaker\n      #I could stand to have some company, I suppose.\n        Feng seems nonplussed by your resignation. \"I'm glad you've come to your senses,\" she says with a smile.\n        *goto matchmaker\n      #I am already lonely in this big house.\n        \"I knew it!\" Feng crows. \"I knew you would need me for something more than dusting and dinner.\"\n        *goto matchmaker\n      #I assure the fox spirit that her company is enough.\n        *label fenglover\n        *set feng %+20\n        *if Feng > 60\n          To your surprise, the fox spirit blushes.\n\t\t  \n          \"How unexpected,\" she says, almost to herself. \"I admit I find you intriguing—certainly more so than other monks that I have met—but I did not think a monk would return those feelings.\" She turns away, as though she is unable to meet your eyes. \"I want us to be clear. I have promised Miao that I will not take you down the foxhole unless you ask it, but I promised nothing about the possibility of warming your bed. Is that what you wish?\"\n          *choice\n            #What? No! I meant she was good company as a friend!\n              *set feng %-15\n              *label friend\n              *set fengeligible false\n              Feng gives you a sad smile. \"Of course. I didn't really think that you and I…. It doesn't matter. We will indeed be friends.\"\n              *goto matchmaker\n            #Oh. Well. The truth is, I am interested in men….\n              *set sexpref \"male\"\n              Feng laughs her barking laugh, and as she does, her voice deepens, and her form shifts. Though the seven tails remain constant, almost everything else about her changes: her narrow face broadens and a mustache sprouts from her lips. Her shoulders widen, and the qipao shifts into a man's formal changshan. His hands—for it would be foolish to think of the fox spirit as a woman in this obviously male form—thicken, gaining the calluses you have seen on the hands of sword fighters. The only real similarity between this Feng and the woman you've met before is the narrow, foxlike setting of the eyes, and the utter perfection of their physical form.\n\t\t\t\n              \"I assure you,\" Feng says, his voice deep and resonant, \"that your preference is not a problem.\"\n              *choice\n                #I apologize, but the shapechanging is out of my depth. I cannot accept Feng's companionship that way.\n                  *set feng %-15\n                  Almost instantly, Feng has returned to the shape of the merchant's daughter. Her tails droop behind her.\n                  *set fengeligible false\n\n                  *goto friend\n                #I recoil in horror.\n                  *set feng %-30\n                  The fox spirit narrows his eyes in a glare almost frightening in its intensity. \"The heavens do not forget a slight against one of their servants,\" he says ominously.\n\t\t\t\t  \n                  Then he is once again in the form of the merchant's daughter. Feng looks at you with a brittle smile. If it is meant to assure you that all is well, it does not even come close.\n                  *set fengeligible false\n                  *goto matchmaker\n                #I cannot deny my attraction to the fox spirit in this form.\n                  You reach for Feng, cupping his marvelous face in your hand. He leans into the touch, reaching toward you to brush your cheek with his calloused fingers. Unable to contain his enthusiasm, he closes the space between you and kisses your lips, not holding back an ounce of passion.\n                  *label foxlove\n                  *set romance \"Feng\"\n                  *achieve foxed4\n\t\t\t\t  \n                  The legends about fox spirits proclaim them to be such able lovers that those who fall in love with them lose interest in the world. While you acknowledge that the romance that has sprung up between you is heady, and that the first few days after Feng decides to warm your bed are lost in a whirl of passion, there is also conversation and companionship. Soon, you settle into a more stable pattern that balances your studies, your romance, and your practice of the physical arts.\n\t\t\t\t  \n                  One day, Feng asks if you would like to go to the festival of Qi Xi happening in the center of Kuei Xian. Qi Xi is a romantic holiday, but you get the sense that Feng is asking not for romance, but for entertainment.\n\t\t\t\t  \n                  \"After all, there are certainly political issues in which we can embroil ourselves,\" Feng says cheerfully. \"The Emperor or the rebels? Which end best serves Heaven? Perhaps we can learn by attending.\"\n\t\t\t\t  \n                  *choice\n                    #I am unconcerned with worldly issues, but am intrigued by the festival, and would like to amuse Feng.\n                      Feng seems genuinely pleased with your response. As well as you are coming to know the fox spirit, it remains hard to tell when some expressions are feigned—but this one strikes you as true.\n\n                      *goto festival\n                    #I am unconcerned with worldly issues and would rather not attend the festival.\n                      Certainly you and Feng can find other ways to occupy your time.\n\t\t\t\t\t  \n                      *goto students\n                    #I feel I should get involved with the community, and attending the festival is a good way to do so.\n                      \"I am sure there will be interesting people to talk to,\" Feng says, the seven tails swishing behind the fox spirit's back. \"Governor Rong is sure to be there with his family, if you're interested in meeting someone with political clout who could raise your status in the eyes of the Emperor. Deng Ping, the rebel leader, is also likely to be there. And there's a quaint family—the Hans—whose children are looking for employment. I'll correspond with them in advance, and you can decide who you'd like to speak with. Just leave it all to me.\"\n\t\t\t  \n                      You have a feeling that there is more at work here than the huli jing acknowledges.\n                      *set readletter1 true\n                      *set readletter2 true\n                      *set readletter3 true\n\t\t\t\t\t  \n                      *goto festival\n                *if (rivalsex=\"male\") #The truth is that I am already interested in a particular man: Lu Jin.\n                  You have not seen Lu Jin since he left the Order, but though years have passed, you admit that you carry a torch for your former rival.\n\t\t\t\t  \n                  Feng shifts forms, returning once again to the shape of the merchant's daughter. \"Unrequited love,\" she says with a sigh. \"How romantic. I cannot fault your choice, ${name}.\"\n\t\t\t\t  \n                  She leans over and kisses you on the forehead. \"Let me see what I can do.\" With that, her human body dissolves, and the slight form of a seven-tailed fox dashes out of your dining room and into the courtyard.\n                  *goto lujin\n            #I am honored that she would suggest such a relationship, but feel more comfortable with the prospect of romancing a human.\n              *set feng %-10\n              A sad smile crosses her face before she covers it up with a haughty one. \"It is true that not all mortals can withstand the passion of a fox spirit,\" she says with a sniff. \"I certainly wouldn't want to push you beyond your limits.\" Now, she grins devilishly. \"Even if it would be fun. Still, if humans are what you desire…\"\n              *set fengeligible false\n              *goto matchmaker\n            #I cannot deny my attraction to the fox spirit.\n              Feng is almost inhumanly beautiful, and what she offers holds the promise of great pleasure—and, you  hope, something more. You stand and go to her, reaching to cup her face in your hand before you draw her into a deep kiss. She returns it with ardor, and soon breakfast has been long forgotten.\n\t\t\t  \n              *goto foxlove\n        *else\n          *set feng %+5\n          Feng barks her foxlike laugh. \"That's very sweet, monk, but foolish.\"\n          *goto matchmaker\n  #The point of my wandering years is to experience more of the world. I will explore the social dynamics of Kuei Xian.\n    Feng sighs. \"Politics! I was hoping for something a little more interesting.\" She gives you a devilish grin. \"Like romance.\"\n    *goto matchmaker\n  #This space is ideal for starting a school to teach others the skills I have learned.\n    Feng nods, though she looks reluctant to acknowledge your point. \"You are right, of course,\" she says. \"I think that is what Miao had in mind when she chose it. But along with becoming a teacher, don't you think you would like a little more personal companionship?\"\n    *choice\n      #I could stand to have some \"companionship,\" I suppose.\n        Feng seems nonplussed by your resignation. \"I'm glad you've come to your senses,\" she says with a smile.\n        *goto matchmaker\n      #I acknowledge it; I am already lonely in this big house. It would be nice to have a partner to share my future with.\n        \"I knew it!\" Feng crows. \"I knew you would need me for something more than dusting and dinner.\"\n        *goto matchmaker\n      #I assure the fox spirit that her company is enough.\n        *goto fenglover\n      #I am uninterested in personal attachments or politics; the important thing is the art.\n        Feng looks at you with puzzlement, then shakes her head. \"All right, monk. I can see that your intent is serious. The way I see it, you have two options: go out to recruit your students or wait for them to come to you. Both have been known to work in the past, and since you trained with the famous Master Zhuge and are a member of the Order of the Peach Tree, it's likely that students will come looking for training. Which sounds best?\"\n        *choice\n          #The students will come. I will wait for them to find me.\n            *set enlightened %+5\n            Others might view this as inaction, but you know that waiting is a type of movement, and that those who are meant to come will come.\n            *goto students\n          #I don't want to sit and wait; I'd rather go out and find worthy students.\n            *set tenacity %+5\n            \"An excellent choice,\" says Feng. She seats herself at the table and pours herself a cup of tea.\n            *goto matchmaker2\n\t  \n*label matchmaker\n\nThe fox spirit seats herself at the table and pours herself a cup of tea—the oolong scented with osmanthus flowers that she brews every morning. \"There are really two scenarios here. One is that you allow me to help you shape your social and romantic life, with your consent. The other is that I shape it without your permission. I'm a fox spirit. I can't help myself. So, shall we do this the friendly way or the sure-to-create-chaos way?\"\n\n*choice\n  #I accept Feng's help. At least I will have partial control of the chaos.\n    \"Let's do this the friendly way,\" you say, with some resignation. \n\t\n    Feng lets out a gleeful shriek, then hides her smile behind her teacup.\n    *if sexpref=\"none\"\n\t\n      \"I've already done some research,\" she says. \"But first I need to know about your taste. Give me your hand.\"\n\t\n      As soon as your hand is enclosed in the fox spirit's nimble fingers, the room vanishes, and before your eyes parade images of handsome men and beautiful women in all styles of clothing. Though the shapes of their faces and forms vary, all of them are almost inhumanly attractive.\n\t\n      Which do you find yourself most attracted to?\n      *choice\n        #The men.\n          *set sexpref \"male\"\n          *goto preference\n        #The women.\n          *set sexpref \"female\"\n          *goto preference\n        #Both men and women.\n          You feel a wave of amusement wash over you, almost as though it is your own.\n          *set sexpref \"both\"\n          *set samesex2 true\n          *goto matchmaker2\n        #None of them.\n          You feel a wave of frustration wash over you, almost as though it is your own emotion, and the images change. They are no longer so beautiful, instead having the appearance of people for whom life has not been kind. Despite blemishes or scars, however, they have a look of determination. These are survivors.\n\t\t\n          Which do you find yourself most attracted to?\n          *choice\n            #The men.\n              *set sexpref \"male\"\n              *goto preference\n            #The women.\n              *set sexpref \"female\"\n              *goto preference\n            #Both men and women.\n              A wave of amusement runs through you, just as the frustration did moments before.\n              *set sexpref \"both\"\n              *set samesex2 true\n              *goto matchmaker2\n            #I am really not attracted to either. I prefer an ascetic life.\n              A wave of astonishment runs through you, just as the frustration did moments before. The images dissolve to reveal Feng staring at you with a look of puzzlement on her face.\n\t\t\t\n              \"I've heard of monks like you who really don't have the passion of the flesh, but I admit I thought you were a legend,\" she says, voice tinged with surprise. The irony of being considered legendary by a fox spirit amuses you.\n\t\t\t  \n              She shakes her head. \"I still don't think you're meant to be alone, monk. It just isn't the way I imagined. But I'm sure that something will come up.\"\n              *goto matchmaker2\n    *else\n      *goto matchmaker2\n  #I can stand up to the chaos of a fox spirit. Let her do her worst.\n    Feng yips gleefully, a sound at odds with her prim features and dress. \"You are a delight, monk. We'll do this the fun way.\"\n    *goto lujinpush\n\t\n*label preference\n*if sexpref=\"female\"\n  *set lovehe \"she\"\n  *set loveHim \"her\"\n  *set loveHis \"her\"\n  *if male = false\n    *set samesex2 true\n    *goto matchmaker2\n  *else\n    *goto matchmaker2\n*else\n  *set lovehe \"he\"\n  *set lovehim \"him\"\n  *set lovehis \"his\"\n  *if male\n    *set samesex2 true\n    *goto matchmaker2\n  *else\n    *goto matchmaker2\n \n*label matchmaker2\nFeng takes a slow sip from her teacup, hiding her expression, then sets it down on the table.\n\n\"You may not have noticed the time passing,\" she says, \"but we are nearing Qi Xi—the seventh day of the seventh month—and Kuei Xian is having a festival in honor of the holiday in a week's time. There will be food, dancing, fireworks, and plenty of traveling merchants creating a huge marketplace in our normally humble village. It is a perfect time to begin a romance. I will make sure that eligible candidates happen to run into you at the festival. I've also heard that your former rival, Lu Jin, may be visiting Kuei Xian soon, if you'd be interested in…reconnecting.\" Her delivery of the last word is heavily weighted with innuendo.\n\nThe Qi Xi festival is always one of the most cheerful festivals—and Feng is right, it is a time that is ripe for romance. There is an old legend about a cowhand who fell in love with a celestial maiden—and she returned his love. But the gods frowned on the romance and separated the lovers; when they realized how deeply the two felt for each other, however, they granted them one day a year, the seventh day of the seventh month, that they could be together.\n\nLegends aside, how do you feel about Feng's plan?\n*label plan\n*choice\n  #Feng is right, it is the perfect time to begin a romance. I accept her guidance in meeting people at the festival.\n    Feng looks tickled. \"Excellent. I shall set the wheels in motion.\" She stands, but almost immediately, her form begins to shift, and a fox with seven tails stands next to the table rather than a human. \"Keep an eye out for messengers!\"\n    *goto correspondence\n  #I will attend the festival to meet the town leaders.\n    Feng sighs. \"If you insist.\" She gets a wicked glint in her eye. \"I'll arrange for some letters of introduction. Maybe those will encourage you to open your mind to additional possibilities.\"\n    *goto correspondence\n  #I will attend the festival in order to recruit students for my school.\n    Feng shrugs. \"All right, sifu. If that's your priority, who is this humble fox spirit to argue?\"\n\t\n    She transforms back into her fox shape, but the wicked glint in her eyes makes you think that, despite her easy agreement, she has other plans for you.\n    *goto correspondence\n  *hide_reuse #I am interested in romance, but I confess to Feng that I am already interested in someone.\n    Feng looks mischievously intrigued by this development. \"I thought I would have noticed your having any romantic interest by now, monk,\" she says. \"Tell me, who is the lucky person?\"\n    *choice\n      #I admit my longing for my former rival, Lu Jin.\n        You have not seen Lu Jin since ${rivalhe} left the Order, but though years have passed, you admit that you carry a torch for ${rivalhim}.\n\n        \"Unrequited love,\" Feng says with a sigh, the expression on her face like she has just tasted something delicious. \"How romantic. I cannot fault your choice, ${name}. The festival can wait.\"\n\n        She leans over and kisses you on the forehead. \"Let me see what I can do.\" With that, her human body dissolves, and the slight form of a seven-tailed fox dashes out of your dining room and into the courtyard.\n        *goto lujin\n      *if (fengeligible = true) #I confess my interest in Feng herself.\n        *set feng %+15\n        *if feng > 60\n          To your surprise, the fox spirit blushes.\n\t\t  \n          \"How unexpected,\" she says, almost to herself. \"I admit I find you intriguing—certainly more so than other monks that I have met—but I did not think a monk would return those feelings.\" She turns away, as though she is unable to meet your eyes. \"I want us to be clear. I have promised Miao that I will not take you down the foxhole unless you ask it, but I promised nothing about the possibility of warming your bed. Is that what you wish?\"\n          *choice\n            #Yes. I cannot deny my attraction to the fox spirit.\n              *set romance \"Feng\"\n              *achieve foxed4\n              Feng is almost inhumanly beautiful, and what she offers holds the promise of great pleasure—and, you hope, something more. You move to kneel next to her, then reach out to cup her face in your hand before you draw her into a deep kiss. She returns it with ardor, and soon, breakfast and your conversation have been forgotten.\n\t\t\t\n              But hours later, after you have explored each other thoroughly and are lying in the bed she promised to warm, she looks at you, draping her long hair, now worn loose, across your chest. \"I certainly won't suggest that you use the festival to find a bedmate,\" she says cheerfully, \"but it remains an opportunity to get involved with Kuei Xian, or recruit students to teach here if that's what you really want. There will be food, and dancing. I think we should attend.\"\n              *choice\n                #I am unconcerned with worldly issues, but am intrigued by the festival, and would like to amuse Feng.\n                  Feng seems genuinely pleased with your response. As well as you are coming to know the fox spirit, it remains hard to tell when some expressions are feigned—but this one strikes you as true.\n\n                  *goto festival\n                #I am unconcerned with worldly issues and would rather not attend the festival.\n                  Certainly you and Feng can find other ways to occupy your time.\n\t\t\t\t\t  \n                  *goto students\n                #I feel I should get involved with the community, and attending the festival is a good way to do so.\n                  \"I am sure there will be interesting people to talk to,\" Feng says, the seven tails swishing behind the fox spirit's back. You have a feeling that there is more at work here than the huli jing acknowledges.\n\t\t\t\t\t  \n                  *goto festival\n            #I did not actually believe she would accept my advance. Faced with the reality of being a fox spirit's lover, I find I cannot actually accept.\n              *set feng %-10\n              *set fengeligible false\n              Feng's blush deepens, though you think this time due to embarrassment rather than the pleasure of being courted. She hides behind a fierce and haughty smile, however. \"It is true that not all mortals can withstand the passion of a fox spirit,\" she says with a sniff. \"I certainly wouldn't want to push you beyond your limits.\" Now, she grins devilishly. \"Even if it would be fun. Will you attend the festival then, my friend?\"\n              *goto plan\n        *else\n          *set feng %+5\n          Feng barks her foxlike laugh. \"That's very sweet, monk, but foolish. You should set your sights a little more reasonably.\"\n\t\t  \n          Despite her rejection, you think she has warmed to you based only on your admission of admiration. Perhaps by attending the festival, you will have a chance to win her over after all.\n          *goto plan\n      *if (fengeligible = false) #I was wrong to reject Feng earlier. I realize now that I am in love with the fox spirit.\n        *set feng %+5\n        *if Feng > 75\n          *set romance \"Feng\"\n          *achieve foxed4\n          \"I am sorry for my reaction earlier,\" you say. \"I was surprised, but now I realize that for me, there can be no other.\"\n\n          Feng blushes. \"I am glad you have reached that conclusion,\" she says demurely.\n\t\t  \n          Feng is almost inhumanly beautiful, and what she offers holds the promise of great pleasure—and, you hope, something more. You move to kneel next to her, then reach out to cup her face in your hand before you draw her into a deep kiss. She returns it with ardor, and soon, breakfast and your conversation have been forgotten.\n\t\t\t\n          But hours later, after you have explored each other thoroughly and are lying in the bed she promised to warm, she looks at you, draping her long hair, now worn loose, across your chest. \"I certainly won't suggest that you use the festival to find a bedmate,\" she says cheerfully, \"but it remains an opportunity to get involved with Kuei Xian, or recruit students to teach here if that's what you really want. There will be food, and dancing. I think we should attend.\"\n          *choice\n            #I am unconcerned with worldly issues, but am intrigued by the festival, and would like to amuse Feng.\n              Feng seems genuinely pleased with your response. As well as you are coming to know the fox spirit, it remains hard to tell when some expressions are feigned—but this one strikes you as true.\n\n              *goto festival\n            #I am unconcerned with worldly issues and would rather not attend the festival.\n              Certainly you and Feng can find other ways to occupy your time.\n\t\t\t\t\t  \n              *goto students\n            #I feel I should get involved with the community, and attending the festival is a good way to do so.\n              \"I am sure there will be interesting people to talk to,\" Feng says, the seven tails swishing behind the fox spirit's back. \"Governor Rong is sure to be there with his family, if you're interested in meeting someone with political clout who could raise your status in the eyes of the Emperor. Deng Ping, the rebel leader, is also likely to be there. And there's a quaint family—the Hans—whose children are looking for employment. I'll correspond with them in advance, and you can decide who you'd like to speak with. Just leave it all to me.\"\n\t\t\t  \n              You have a feeling that there is more at work here than the huli jing acknowledges.\n              *set readletter1 true\n              *set readletter2 true\n              *set readletter3 true\n\t\t\t\t\t  \n              *goto festival\n        *else\n          \"I am sorry for my reaction earlier,\" you say. \"I was surprised, but now I realize that for me, there can be no other.\"\n\t\t  \n          \"I am afraid the moment has passed for that,\" Feng says crossly. But there is enough hesitation before her response that you think there may yet be hope for you. Perhaps by attending the festival, you will have a chance to win her over after all.\n\t\t  \n          *goto plan\n\n*label lujinpush\nThough you continue to pursue your studies, determined not to let Feng's mischief get the best of you, you find yourself uneasy after the conversation. Every time Feng appears, you suspect she has some trouble in mind for you.\n\nOne day, as she is sweeping what appears to be an already spotless patio area in the courtyard, she pauses to smile at you.\n\n\"I don't know if it's of interest to you,\" she says coyly, \"but I've heard that your old rival, Lu Jin, may in Kuei Xian. I don't suppose you'd be interested in seeing ${rivalhim}?\"\n*choice\n  #I realize at Feng's words that I have been pining after my old rival. I must see ${rivalhim} again and find out whether ${rivalhe} could feel the same.\n    At your expression, Feng laughs. \"Oh, don't worry, monk. I'm sure something can be arranged.\"\n\t\n    With that, she vanishes, leaving you feeling even more off balance than before.\n    *goto lujin\n  #I have no interest in seeing my old rival.\n    Feng shrugs. \"I just thought you might be interested,\" she says. With that, she vanishes, leaving you feeling even more off balance than before.\n    *goto correspondence\n  #I would love to see my old rival, but as a friend, not as a romantic interest.\n    Feng pouts prettily. \"Of course. Just as friends. Because you don't want me to have any fun.\" Feng vanishes, leaving you feeling even more off balance than before. \n\t\n    But a few days later, you receive a letter from Lu Jin. $!{rivalhe} is unable to meet you in Kuei Xian, but heard you had asked after ${rivalhim} and wanted to make contact. Lu Jin urges you to meet Deng Ping, the leader of the Blue Scarves Rebellion, and discuss the injustice facing the people of the Middle Kingdom as the foreigners encroach upon their land. $!{rivalhe} believes that, with the skills you have been taught at the Order of the Peach Tree over the years, you could be an invaluable resource for the resistance.\n\t\n    Feng appears, reading over your shoulder. \"I'm certain you'll have the opportunity to have a conversation with Deng Ping,\" she says, with no pretense of respecting your private correspondence. \"But, of course, you don't want my interference.\"\n\t\n    She vanishes again before you can argue the point.\n    *goto correspondence\n\t\t  \n*label lujin\n*set lujineligible true\n*if male\n  *if RivalSex = \"male\"\n    *set samesex true\n    *goto lujin2\n  *else\n    *set samesex false\n    *goto lujin2\n*else\n  *if Rivalsex = \"male\"\n    *set samesex false\n    *goto lujin2\n  *else\n    *set samesex true\n    *goto lujin2\n*label lujin2\n*page_break\nThe conversation with Feng leaves you feeling wistful, and though you continue about your everyday pattern of practicing your martial arts and making the house more livable, you find your thoughts continually wandering back toward your days of sparring—both physically and verbally—with Lu Jin. Despite your continued training at the Order of the Peach Tree and with Master Zhuge, you have missed having someone who was essentially your equal, who had the ability to, at times, put you in your place.\n\nAfter a few days of frustrated pining, Feng again appears at the breakfast hour, but for the first time since you moved into the house, she has no food prepared.\n\n\"Forgive me, ${name}, but it seems our larder is empty,\" she says, doing her best to look contrite. She has taken the form of a simple serving woman to enhance the impression of humility, but you know better than to take a fox spirit at face value. \"Perhaps you could have breakfast at the Plum Blossom? Their steamed dumplings are exceptional.\"\n\nThe Plum Blossom is Kuei Xian's largest tea house, and you were familiar with the reputation of its dumplings even before you moved to the village. Though you are aware that Feng is up to something, you have not yet mastered the technique of requiring nourishment from only the essence of the universe to live. If you want breakfast, it seems you must go into town to get it.\n\n*page_break\n\nThe atmosphere at the tea house is bright and congenial, even at this early time of day. You see four old men sitting at one corner playing a game of mahjong, while at other tables, people you assume are merchants are conversing over dim sum and puerh tea. You find an empty table and begin walking toward it when you sense someone moving toward you. As a hand is about to reach your shoulder, you pivot, and your arm comes up in a soft deflection.\n\nLu Jin's smiling face greets you. \"Still in good practice, I see,\" ${rivalhe} says cheerfully. \"I heard you had moved into the empty courtyard house at the base of the mountain, but I didn't believe it until just now.\"\n\n\"Lu Jin!\" you say with genuine enthusiasm. \"What a surprise to see you!\"\n\nYou are almost certain you hear the sound of a fox yipping in the distance.\n\n*choice\n  #I invite Lu Jin to join me for breakfast.\n    *set LuJin %+5\n    *if LuJin > 60\n      \"I'd be delighted,\" ${rivalhe} says. \"There is so much for us to catch up on!\"\n      *goto breakfast\n    *else\n      Lu Jin seems surprised by your cordiality. \"Things certainly have changed, if my old rival is glad enough to see me to invite me to share a table,\" ${rivalhe} says cheerfully. And though you can tell ${rivalhe} intends it as a joke, there is just enough suspicion behind ${rivalhis} eyes to make you wonder if you will ever win ${rivalhim} over.\n      *goto breakfast\n  #I wait to try to gauge my former rival's reaction to my presence.\n    *if LuJin > 60\n      After a moment of silence, Lu Jin laughs. \"Master Shen would be surprised by the two of us meeting without immediately challenging one another to a duel,\" ${rivalhe} says. \"I confess that I am no longer used to sparring before breakfast. Would you join me?\"\n\n      Lu Jin gestures to the empty table you'd just been planning to occupy. \"I'd be glad of the company,\" you say. \"We have years to catch up on!\"\n      *goto breakfast\n    *else\n      The moment of silence stretches out as you both observe each other, trying to take in how the years may have changed you both. \"Well,\" Lu Jin says after a moment, \"I suppose I will be seeing more of you, then. I'm settled near Kuei Xian as well.\"\n      *choice\n        #I cannot let ${rivalhim} just leave. I invite ${rivalhim} to share my breakfast.\n          *set LuJin %+5\n          Lu Jin seems surprised by your cordiality. After a slight hesitation, ${rivalhe} nods. \"I suppose we have years to catch up on,\" ${rivalhe} acknowledges, and joins you as you move to the empty table.\n          *goto breakfast\n        #Clearly, Lu Jin has not thought of me fondly over the years. Perhaps I should reach for a more attainable companion.\n          You watch as Lu Jin heads to another section of the tea house, your heart heavy as you say goodbye to the desires you had been entertaining even this morning. If your feelings are not returned, you would be better served to take up Feng's offer to introduce you to other eligible candidates.\n\t\t  \n          After breakfast, you return home, and your disappointment is evident to Feng. But rather than console you with words, she pats you on the shoulder and says, \"You've had some messengers visit. I'll fetch what they delivered.\"\n          *goto correspondence\n        #Seeing Lu Jin again, especially looking at me so warily, makes me realize that I have imagined ${rivalhim} better than life. I say farewell.\n          *label oldcrush\n          You watch as Lu Jin heads to another section of the tea house and allow yourself a moment to say farewell to an old crush. You order a yellow tea and dumplings, and though at first both taste bittersweet, you discover you find them both quite satisfying.\n\t\t  \n          On your return home, you greet Feng with a smile. \"It was not to be, I'm afraid,\" you say, but your tone reveals a lack of disappointment that even you find surprising.\n\t\t  \n          \"Will you attend the festival, then?\" she asks.\n          *set lujineligible false\n          *goto plan\n  #I challenge ${rivalhim} to a sparring match to try to gauge how much both of us have changed.\n    *set LuJin %+5\n    *if LuJin > 60\n      Lu Jin laughs. \"You haven't changed at all!\" ${rivalhe} says, clapping a hand on your shoulder. This time, you allow the touch, which you admit sends a new set of shivers down your spine. \"Master Shen would be proud. Unfortunately, my old friend, I am no longer used to sparring before breakfast. Would you join me?\"\n\n      Lu Jin gestures to the empty table you'd been planning to occupy. \"I'd be glad of the company,\" you say. \"We have years to catch up on!\"\n      *goto breakfast\n    *else\n      Lu Jin frowns, but you think you see a smile in ${rivalhis} eyes. \"You haven't changed at all,\" ${rivalhe} says. \"As much as a good match would do old Master Shen proud, I'd much rather have breakfast. No sense serving your defeat on an empty stomach.\"\n      *choice\n        #Defeat me? I suddenly recall Lu Jin's arrogance as one of ${rivalhis} less attractive qualities. I bid ${rivalhim} farewell.\n          Clearly, you had been remembering only the good things about your old rival. The reality is far less rosy.\n          *goto oldcrush\n        #The clear returned challenge thrills me. I say, \"Eat, then, so that you can have a full belly before I knock you from your feet.\"\n          *set LuJin %+10\n          \"Haven't changed at all,\" Lu Jin says again, but this time, the smile is no longer hidden. \"Breakfast, then.\"\n\t\t  \n          \"I shall eat you under the table,\" you taunt.\n\t\t  \n          \"With a belly like the one you've grown, I'm inclined to believe you,\" Lu Jin parries. The sport of banter delights you, though as you walk together to the empty table, you do take a glance at your stomach. It is clearly hidden beneath your wuseng, and you take comfort in knowing that you can pull yourself upright from an upside-down hang from the cherry tree branches in your courtyard.\n          *goto breakfast\n        #I acknowledge that I would hate to be defeated on an empty stomach.\n          *set LuJin %+10\n          *set enlightened %+5\n          Your humility startles a laugh out of your former rival. \"I was wrong,\" ${rivalhe} says. \"You have changed after all. Then by all means, let us fill that belly.\"\n          *goto breakfast\n\t\t  \n*label breakfast\n\nBoth of you order breakfast and tea—you have a yellow and Lu Jin has the jasmine green—and make small talk about the weather. It seems hard to know just how to start catching up on the years that have passed.\n\nWhat are you most interested in discussing?\n*choice\n  #I want to discuss the old days, to remind Lu Jin of our shared history and connections.\n    *set LuJin %+10\n    You find that as you discuss your old teachers and fellow students with Lu Jin, it is as though little time has passed. Neither of you brings up the last time you were in Kuei Xian together, instead reminiscing about practical jokes the students played on each other and particularly good bouts you saw—and participated in. Lu Jin congratulates you on your attained rank, though ${rivalhe} does not ask about the test, respecting the secrecy enforced by the order.\n\t\n    You have such a lively chat that time flies by, and soon Lu Jin has to leave. \n\t\n    *label seeyouagain\n    \"I have errands to run while I am here in Kuei Xian, but I am glad I ran into you,\" ${rivalhe} says with apparent sincerity. \"It is nice to remember the good old days.\"\n\t\n    \"Will we see each other again?\" you ask.\n\t\n    Lu Jin thinks for a moment, then shrugs. \"I will be back in Kuei Xian for the festival. Perhaps I will see you there.\"\n    *goto lujindate\n  #I am eager to tell Lu Jin about my studies with Master Zhuge, hoping to impress ${rivalhim}.\n    *set LuJin %+5\n    When Lu Jin asks what brought you to Kuei Xian, it is the perfect opportunity to launch into a retelling of your studies under Master Zhuge. You are able to give highlights of the best parts of your training, while also telling a few stories that allow both of you to laugh at your mistakes. The important thing about telling those humorous tales is it gives you a chance to show how much you have learned and improved under Master Zhuge.\n\t\n    The conversation seems a bit one-sided, but you can tell that Lu Jin is also enjoying letting you talk. After a while, however, Lu Jin announces that ${rivalhe} has to leave.\n\t\n    *goto seeyouagain\n  #I want to know about how Lu Jin has been spending these years.\n    *set LuJin %+10\n    Lu Jin is happy to regale you with tales of teaching martial arts in the countryside, though you notice that ${rivalhe} is always careful not to mention any place names or discuss exactly who ${rivalhe} has been teaching. \n    *label lifeordeath\n    Quietly, ${rivalhe} mentions life or death situations in battle, which you suspect could be construed from ${rivalhis} language as combat with a rival school. \n\t\n    It is clear that there have been many hard times—and difficult choices—since you last met. You remember your rival as being fairly brash and quick to anger; the years have clearly tempered Lu Jin into a person who is much wiser and more patient.\n\t\n    You hope that the years have reflected equally well on you.\n    *page_break\n    Too soon, Lu Jin announces that ${rivalhe} has to leave.\n    *goto seeyouagain\n  #I am eager to know how Lu Jin's work with Deng Ping has gone.\n    *set LuJin %+15\n    Lu Jin interrupts before you can even finish the name of the rebel leader. As ${rivalhe} talks over your question, ${rivalhe} grabs your hand and squeezes it, firmly, and despite the lighthearted words about the weather, ${rivalhe} wears an expression of gratitude.\n\t\n    $!{rivalhis} hand feels warm in yours, and you are sad when ${rivalhe} moves it away.\n\t\n    After a little more deflection, Lu Jin begins to open up about teaching martial arts in the countryside, being scrupulously careful never to mention any place names or discuss exactly who ${rivalhe} has been teaching. \n    *goto lifeordeath\n*label lujindate\n\nYou return home with your heart light. Meeting up with Lu Jin was better than you might have imagined, and your unrequited pining is quickly blossoming into a determination to pursue this romance.\n\nFeng, however, seems to want you not to put all your eggs in one basket. Though she grins at your enthusiasm, she interrupts the third retelling of your \"chance\" meeting by saying she is off to fetch some messages that were delivered while you were out.\n*page_break\n*label correspondence\n\nNot long after, Feng, wearing the guise of a humble housemaid, brings you three scrolls. One is made of fine paper with a wax seal that bears the stamp of the ring of Governor Rong, who you recall makes his residence in Kuei Xian during the summer and presides over the province. A second is of a more humble paper, but still has a wax seal—this one blue and marked with a thumbprint. The third is the humblest, and is bound by a braid made of dried rice stalks.\n*label letters\n\n\nWhich letter do you open?\n\n*choice\n  *hide_reuse #Open the letter from Governor Rong.\n    *set readletter1 true\n    Governor Rong writes to welcome you to Kuei Xian.\n\t\n    \"With the long history of good will between myself and the Order of the Peach Tree,\" the letter reads, \"you can imagine my delight in finding that one of its illustrious members had come to reside in my own summer home. I do hope that you will attend the upcoming Qi Xi festival, so that I may introduce you to my family, and so that we may discuss how we might best serve the Emperor together.\"\n\n    The letter continues with a number of other pleasantries, but the gist is that Governor Rong expects you to be a loyal citizen of the Middle Kingdom and do what must be done to support the Emperor—which, in this scenario, means supporting the governor who presides over your new home.\t\n    *page_break\n    Feng bounces on her toes in her eagerness to give you more information. \"Governor Rong has two children of marriageable age—a son, Mu, and a daughter, Niu—who are sure to be attending the festival,\" she explains. \"His elder son is a commander in the Imperial army, and may also be there with his wife and children.\"\n\t\n    Feng's seven tails swish around behind her. \"Both Rong Mu and Rong Niu have grown up somewhat sheltered, though they are well educated,\" she continues. \"Both are also quite attractive, in the way of those who can afford to be so.\"\n\t\n    *if samesex2\n      She pauses for a moment. \"Like most more conservative human residents of the Middle Kingdom, the Rong family is more likely to accept a traditional marriage than a non-traditional relationship.\" She shrugs. \"I, for one, do not understand the hangups so many have about gender. It's all quite fluid to me.\" Her form wavers briefly, giving the hint of broader shoulders and a mustache before she settles back into her housemaid form. \"But Governor Rong is easily impressed by status, and for someone important enough, he is likely to look the other way about a relationship that does not meet his preconceived requirements. I can work to improve your reputation, if you wish to pursue ties with the Rong family.\"\n\t\n    If you seek to gain standing in the Imperial Court, allying with the Rong family, who have always been firm supporters of the Son of Heaven, would certainly help you gain the Emperor's favor. Having the governor's favor could also go a long way toward helping you recruit new students for your school.\n    *set letters +1\n    *if letters = 3\n      *goto prefestival\n    *choice\n      #Read another letter.\n        *goto letters\n      #I know whom I intend to speak to at the festival.\n        *goto prefestival\n      #Honestly, I'm not interested in any of this.\n        *goto prefestival\n  *hide_reuse #Open the letter with the blue stamp.\n    *set readletter2 true\n    You scan the letter first to see who sent it, and you are surprised to see that Deng Ping, the leader of the Blue Scarves Rebellion, has sent something to you so directly. He writes that Lu Jin, whom he considers a trusted advisor, suggested he contact you asking for aid.\n\t\n    \"Your reputation as a great martial artist precedes you,\" the letter reads, \"and though Lu Jin has been an excellent trainer and leader to those who have joined our cause, ${rivalhe} has become busier with assignments that take ${rivalhim} away from Kuei Xian. It would be a great help to us to have someone in the village who could not only teach our people, but provide a safe haven should we run into trouble.\"\n\t\n    Deng Ping goes on to explain that despite the efforts of the Blue Scarves Rebellion to head off the foreign incursion, more and more people are being pushed out of their homes—away from their family shrines and their livelihoods. Still, the Emperor does nothing. The letter concludes with a plea for help. Deng Ping will not risk further contact through a messenger, but hopes that you will be at the festival of Qi Xi, where he can speak with you in person and, if you are willing, formalize an alliance through direct ties to his family.\n    *page_break\n    Feng's seven tails swish behind her human form. \"You wouldn't guess it from meeting him, but the stern rebel leader is also a generous and kind father,\" she says. \"He has a son and a daughter, both unmarried, and both a bit past their proper age for relationships. I suppose that in a rebel camp, potential liaisons are limited, particularly if you are a child of the leader.\"\n\t\n    \"What are their names?\" you ask.\n\t\n    \"The daughter is Qiao; the son is Quon. I believe that Qiao is just a few years younger than you, and Quon is about your age. Both have seen their fair share of combat.\"\n\n    *if samesex2\n      She pauses for a moment. \"Deng Ping may be willing to question the traditional status of the Emperor, but he is a proud man, and his views on marriage are rather traditionally limited.\" She shrugs. \"Humans would be far better off with more flexible ideas about gender, in my opinion.\" Her form wavers briefly, and you see the shape of an old man wearing glasses briefly before her housemaid form reemerges. \"But Deng is concerned with the will of the Heavens and the balance of the Middle Kingdom. He has a sense for those who have Heaven's Blessing. If he believes that you are taking an active role in restoring tianxia—the realignment of the physical and metaphysical world under heaven—he is likely to accept a nontraditional overture. I can put in a good word for you in the Celestial Realms if you wish to make ties with the Deng family.\"\n\t\n    Aligning yourself with the rebellion could have dramatic consequences for your reputation, if it were discovered. Still, you would have an immediate supply of students to teach.\n    *set letters +1\n    *if letters = 3\n      *goto prefestival\n    *choice\n      #Read another letter.\n        *goto letters\n      #I know whom I intend to speak to at the festival.\n        *goto prefestival\n      #Honestly, I'm not interested in any of this.\n        *goto prefestival\n  *hide_reuse #Open the letter bound with rice stalks.\n    *set readletter3 true\n    The letter written on the poor quality scroll is the hardest to read. The calligraphy is nearly illegible, made worse by the shoddy paper. But the earnestness of the words rings through, and you see it is written by a man named Han Bei. The Han family has, it seems, hit hard times. Foreigners raided and later pushed them out of the farm where they had lived for generations; they are now relying on the kindness of relatives in Kuei Xian to support them. The situation has pressed their relations to the border of poverty, and they fear that soon, all of them will become homeless.\n\t\n    \"We have heard of the generosity of the Order of the Peach Tree,\" the letter reads, \"and hoped perhaps you might be able to aid us in some way. Even taking on one of my children as a servant would be a help, though it has been made known to us that you are seeking a spouse. It would please us more than you can imagine to become family to you!\"\n    *page_break\n    You look suspiciously at Feng. \"I wonder who might have informed them that I am seeking a spouse,\" you say, the silent accusation clear from your tone.\n\t\n    \"Who can say how the Heavens shape one's fate?\" she asks philosophically. Then she grins. \"There are several children in the Han family, but the two who most deserve your attention are the beautiful Kiew, who has just reached marriageable age and is quite the young blossom, and Kang, her elder brother, whose face isn't much to look at, but it's made up for by his broad shoulders. Their family is in dire straits and certainly won't be hard to impress.\"\n\t\n    *if samesex2\n      After a moment, Feng continues. \"I have to say that Han Bei is not the kind of fellow who thinks outside the box, and he may resist the idea of your becoming attached to one of his children if a traditional marriage isn't offered. Still, they are in a desperate situation, and if you are honorable enough to impress them, I suspect he won't say anything about it. Of course, your honor is a personal thing, and not the sort of thing I can affect, I'm afraid, so you're on your own there.\"\n\t\n    The truth is, once you have fixed up the servants' building, it would be good to have a servant around who isn't Feng, especially if you begin to have students to train. Even if you are uninterested in the children romantically, you may be able to help the family by hiring one of them on.\n    *set letters +1\n    *if letters = 3\n      *goto prefestival\n    *choice\n      #Read another letter.\n        *goto letters\n      #I know whom I intend to speak to at the festival.\n        *goto prefestival\n      #Honestly, I'm not interested in any of this.\n        *goto prefestival\n\n*label prefestival\n\nOnce you have finished reading the letters, Feng looks at you mischievously. \"I considered ordering you more formal clothing for the festival, but decided that a sengfu is the best representation for who you are. So I had a new one tailored to your size. It's in your chambers. Feel free to try it on, but please don't practice in it until after we've shown you off in town, all right?\"\n\nWhen you return to your room, you see that there is, indeed, a new sengfu laid out for you. Rather than the one-sleeved style you are used to, however, Feng has chosen a long-robed linen changgua, which is slit up the sides to free your legs, and has two sleeves, with a collar that crosses over from one side to the other and ties shut. It fits well, and you imagine it gives you the look of a true teacher of kung fu—though anyone who believes that such things can be shown by an outfit is gullible.\n\nWill you attend the festival?\n*choice\n  #Yes. I am eager to attend.\n    And certainly there are people eager to see you.\n\t\n    *goto festival\n  #No. Feng's plans have gone far enough.\n    You have more pressing concerns, such as the disrepair of the servants' building on your estate.\n\t\n    *goto students\n\n*label festival\nThe evening of the festival arrives. Feng takes your arm and accompanies you into Kuei Xian. The center of the village has been transformed into an outdoor banquet hall: it looks as though everyone in the village has contributed something. Clearly Governor Rong and his family have contributed more than most, a fact the governor is not shy about making known, based on the way he appears to be holding court.\n\nPaper lanterns have been strung up from the doors of all the nearby homes and businesses, and musicians perform in the streets. Already, some of the younger villagers have begun dancing.\n\nHow do you wish to spend your evening?\n*label partners\n*choice\n  *hide_reuse *if ((rebel = false) and (readletter1)) #I want to speak with Governor Rong.\n    Governor Rong is an easy man to find in the crowd. He is not only surrounded by a well-dressed group of people who you suspect are his family, but he also has several guards present. Merchants and peasants alike are making their way to Governor Rong to acknowledge his contribution to the festival.\n\t\n    When you approach, Governor Rong offers you a deeper bow than most of the villagers have received. \"${name}, welcome to our humble village. I am glad to have the opportunity to speak with you.\"\n\t\n    You bow in return, and the governor smiles. \"Allow me to introduce you to my family. My eldest son, Jue, and his wife and son.\" The governor gestures to one of the soldiers standing next to him, who you notice is wearing the Imperial dragon on his helmet, and a well-dressed woman standing next to him, cradling a baby in her arms. \"My younger son, Mu\"—he gestures to an attractive young man with the slim form of a scholar, probably a few years younger than you, who has an impeccably trimmed mustache—\"and my daughter, Niu,\" he concludes, drawing forward a beautiful young woman, younger than her brothers, whose skin is pale and hair is up in an elaborate comb.\n\t\n    Governor Rong gestures for you to sit next to him so you can continue to converse. As you sit, you notice that many of those who had been waiting for the governor's attention begin to disperse. Clearly, the attention the governor is paying you marks you as important.\n\t\n    \"Tell me, ${name}, have you given thought to how you can best serve our Emperor from here in Kuei Xian?\"\n    *choice\n      #I am happy to defer to the governor's wisdom in that matter.\n        *set tianxia %-10\n        \"See how wise this monk is?\" the governor says over his shoulder, addressing his eldest son. \"I assure you, ${name}, we can find a way for you to show that your loyalty to the Son of Heaven is firm.\" \n\n        *label rongromance\n        The governor gives you a broad smile. \"I believe it would be beneficial for you to bind yourself to the Rong family in a formal way—if such an arrangement would be agreeable to you.\"\n        *choice\n          *if (romance = \"none\") #I would like to spend some time getting to know Rong Mu.\n            *if male\n              *set status %+5\n              *if status > 60\n                Governor Rong looks momentarily shocked. \"Perhaps you misunderstood me. I was thinking in terms of marriage, good monk.\"\n\n                \"I am not interested in marriage,\" you say politely. \"It would be a boon to have a companion, however, and no less important to me than a formal tie through marriage.\"\n\t\t\t\t\n                The governor still looks skeptical, but clearly he values your status highly enough to brush off those concerns. \"Well then,\" he says, \"I suggest you get to know each other better. Go out and enjoy the festival, and see if you can become…companions.\"\n\t\t\t\t\n                At his father's bidding, Rong Mu stands, and the two of you leave the governor and his family to enjoy the festival.\n\t\t\t\t\n                How do you hope to get to know Rong Mu?\n                *label rongmu\n                *choice\n                  *hide_reuse #I hope to impress him with stories about my exploits.\n                    *if honor > 50\n                      Given his sheltered upbringing, Rong Mu is easily impressed by the stories of your training, especially under Master Zhuge, whose legends he knows nearly as well as you do. He adds to the conversation by comparing you with legendary heroes—which is certainly flattering if not (yet) entirely accurate. He has an easy laugh and seems like the type of person who is naturally inclined to be happy.\n\n                      *label rongmusuccess\t\t\t\t\t  \n                      You can tell from the admiring looks he gives you that, though he might not have been inclined to it without your encouragement, he would not be averse to becoming romantically involved with you.\n\t\t\t\t\t\n                      *choice\n                        #I am pleased with how things have gone and will tell Governor Rong I find Rong Mu to be a suitable companion.\n                          *set romance \"Rong Mu\"\n                          *set status %+20\n                          *if male\n                            At the end of the evening, you announce your intentions to Governor Rong, and it is soon arranged for Rong Mu to take up residence in your home. \n\t\t\t\t\t\t\n                            You thank Feng for her guidance in this matter—certainly, you will no longer be so lonely, and Rong Mu is an excellent, upbeat addition to your household.\n                            *set imperial true\n                            *goto students\n                          *else\n                            It seems as though in no time, a wedding is arranged. You had never expected to be a bride, but here you are, married to the son of a governor. Though it is not traditional, given the situation, Rong Mu soon moves into your home, and the place is no longer quite so lonely as it was. Rong Mu's cheerful and upbeat attitude brightens the house, and you thank Feng for her guidance in this matter.\n                            *set imperial true\n                            *goto students\n                        #I am not ready to commit to a romantic relationship, despite my growing fondness for Rong Mu.\n                          You hesitate, suggesting that you and Rong Mu part ways, perhaps finding each other later during the festival. Your hesitation, however, may cost you, as you see him immediately join a group of well-dressed young people and ask one of the women to dance.\n                          *goto partners\n                        #I do not think that Rong Mu is a good match for me.\n                          You politely extract yourself from your conversation and suggest that you each go your separate ways through the festival. Rong Mu hesi
