me before they can be organized enough to be a force to be concerned about.\n\t\n    Of course, resorting to poison of this type is not particularly honorable. It is, however, effective.\n\t\n    Before returning to the monastery, Lu Jin approaches you.\n    *goto lujin2\n\n*label returnfail\n*set honor %- 30\n*set status %-10\n*page_break\nAs you return to the monastery, morale among the students is at an utter low. Not only did one of your number abandon the Order completely, but you have nothing to show for your efforts.\n\nYour first real mission on behalf of the Order is a failure.\n\nAfter you tell Abbot Bao and Master Shen about what has happened, they consult the heavens to determine the best course of action. Ultimately, the Order does nothing further—and despite your failure, attacks by the bandits near Kuei Xian die down for a time. Though this initially seems like good news, Governor Rong has heard about the events that transpired from his informants—likely village gossips, who may have heard it from the bandits themselves. No credit will be given to the Order of the Peach Tree for the temporary peace.\n\nMaster Shen admits to you that he and the abbot had planned to test you to become a full member of the Order had your mission been a success. Now, you will have to prove yourself again through humble service and continued training before you can become a monk, rather than the senior student.\n\nCompared to your dishonor at the hands of the bandits, the wait to test is a small setback—but what if it means that you will not be the one chosen to consult the Dragon Sage? You will have to work even harder to prove that you are worthy before the dragon reappears in the Middle Kingdom.\n\n*finish Chapter Two: The Test\n\n*label returnwin\n*set honor %+ 30\n*set status %+10\n*page_break\n*if lujin > 60\n  *achieve frenemy1\n*if lujin \u003c 40\n  *achieve frenemy2\nDespite your success against the bandits, the morale of your group is low. The students are shocked by Lu Jin's departure, and some are open in how much they will miss ${rivalhim}.\n\nBut those emotions fade when you return to the Order. Your teachers praise all of you at the news of your success, and Governor Rong sends gifts of thanks for your efforts. Without Lu Jin present to share the credit, you are the hero of the hour.\n\nYou have done so well that Master Shen tells you to prepare for your test to be made a full member of the Order of the Peach Tree. If all goes well, you will soon be a monk!\n\nThough you were confident of your path to meet the Dragon Sage before, this victory confirms that you are on the right path. You are another step closer to achieving your goal.\n\n*finish Chapter Two: The Test\n\n*label foxhole\n*gosub end_trial\n*set honor %-10\n*set foxhole true\nWhat happens next is hazy. You recall being taken to a palace, where you were doted upon by the loyal servants of the noble residing there. You were served the finest foods: ripe lychee, plums, and persimmons; sweet bean bread and cakes made from lotuses; wild goose and deer, and once even elephant. You wanted for nothing, and nothing was required of you other than to enjoy your stay.\n\n*if feng>55\n  The lady in red spent the majority of your time there keeping you company and seeing that you were able to engage in whatever recreational pursuits you chose. She was very eager to show you every type of pleasure she could provide—and those that you recall were indeed quite creative.\n  *goto haze\n*else\n  *goto haze\n\n*label haze\nAnd then, you awoke in the forest. Though you feel healthy, whole, and pampered, your sengfu is in an obvious state of disrepair. Your hair is matted with dirt, and you find suspicious bits of fur stuck in your teeth.\n\nAfter hours of trying to regain your senses and find your way back to the road, one of the students from your mission finds you. They have been looking for you for three days—such a short amount of time compared to how you experienced your life in the palace! In that time, Lu Jin has surrendered to the bandits, joining their cause and abandoning the students and the Order. \n\n*goto returnfail\n\n\n*label end_trial_teaser\n*check_purchase adfree\n*if not(choice_is_steam) or (choice_purchased_adfree or not(choice_purchase_supported))\n  *label purchased_teaser\n  *return\n*page_break\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *return\nWill your strategy quell the bandits of Kuei Xian?\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*temp full_price \"$2.99\"\n*temp discount_price \"$2.99\"\n*if choice_is_steam\n  *set full_price \"$3.99\"\n  *set discount_price \"$2.99\"\n*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased_teaser\n*goto abort\n\n\n*label end_trial\n*check_purchase adfree\n*if not(choice_is_steam) or (choice_purchased_adfree or not(choice_purchase_supported))\n  *label purchased\n  *return\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n*temp full_price \"$2.99\"\n*temp discount_price \"$1.99\"\n*if choice_is_steam\n  *set full_price \"$3.99\"\n  *set discount_price \"$2.99\"\n*purchase_discount adfree 2019-01-01 $4.99 $2.99 purchased_teaser\n*label abort\n*abort", "challenge": "*temp advantageModifier 0\n*temp lujinpoison false\n*temp poison false\n*temp opponentpoison true\n*temp opponentdead false\n*temp opponentout false\n*temp disarmed false\n*advertisement\n\nAfter the conflict between the Order of the Peach Tree and the foreigners at the monastery, events seem to pass quickly. News of the foreigners is hard to avoid: more of their ships are landing in the fishing villages they took over to establish their own port. While their numbers increase, they are also making a clear attempt to insinuate themselves further into the Imperial Court. George Gower has taken up residence in Xiaonanhai, and the rumor is that he calls on the Emperor every day, trying to mold a space for himself as an Imperial advisor.\n\nOr, some whisper, as the man who will try to steal the Emperor's throne.\n\nBut though tensions are high, the violence has slowed. The Blue Scarves Rebellion has continued with raids, hassling the foreigners at every opportunity, but there have been no large-scale battles. It is though everyone is holding their breath.\n\n*if romance = \"Lu Jin\"\n  You know that you are. Lu Jin has still not returned, and Feng has been unable to gather any news of ${rivalhim}. As the months pass, your worry only grows, and you become accustomed to an unsettled ache in the pit of your stomach.\n\nWhat do you think the foreigners will do next?\n*choice\n  #I am still not concerned with worldly affairs. At this point, if I weren't also seeking to detach myself from emotional reactions, I'd be annoyed with everyone pointing them out to me.\n    *set tianxia %-5\n    *set enlightened %+10\t\n    To be fair, given your role in the events of the Middle Kingdom, one could forgive people for assuming that you would want to be kept in the loop. Clearly, however, continuing your quest to enlightenment takes precedence over all other matters.\n    *goto invitation\n  #Clearly, there is a reason behind their change in tactics. I analyze their locations to determine what outcome they may seek.\n    *set cleverness %+5\n    You acquire a large map and start marking the rumored locations of the foreigners on it. They are densest at the shoreline, but while more are landing there, there is a trend from the shore northward, toward the capital, skirting the marshes when possible. It makes perfect sense now why the foreigners wanted control of the monastery: its location is directly in the path of the settlements the foreigners have been making over the past twenty years.\n\t\n    But the presence of George Gower at the capital makes you suspect that he is not planning to lead an army against the Emperor. If anything, you see wisdom in the rumors that he hopes to gain power through influencing the Emperor, rather than replacing him. Given how the foreigners have treated the people they've displaced, Gower having the Imperial ear could be disastrous for the Middle Kingdom.\n    *goto invitation\n  #They are saving their resources for a large fight. I make discreet inquiries into their weapon stores and the supply chain between Gower and his men.\n    *set fighting %+5\n    The way that more and more foreigners are arriving on the coast makes you think that Gower seeks to improve his numbers for a battle between the foreigners and the Imperial Army. Some of the rumors bear you out: the southern coastal villages the foreigners took over are supposedly stockpiling grain and other supplies, the way a general might prepare for a long campaign. Their weapons supplies, from what you are able to gather, support the same theory.\n\t\n    But other details don't mesh. Why is Gower at the capital if his men are gathering in force on the coast? You begin to think that a long campaign is his fallback plan rather than his primary goal, and that he hopes to insinuate himself into power some less direct way than through the might of arms.\n    *goto invitation\n\t\n*label invitation\n*page_break\nYou get a clue into Gower's plans the spring after the attack on the monastery. It arrives in the form of a summons: sealed with blue wax impressed with the shape of a rampant lion, the bleached white paper is so stiff it crackles when it opens. The letter reads:\n\n\"To ${name}:\n\n\"Based on the reputation of your skill and honor, you have been selected to compete in a fighting exhibition for the entertainment of the glorious Emperor. The fight, which will take place in an arena now being constructed just south of the Imperial capital, will feature two warriors of my native country on horseback, wielding the weapons of our lands. You will fight alongside a captured rebel and traitor to the Middle Kingdom, Lu Jin, who will be released from the Imperial dungeons for the event. The outcome of the combat will settle a wager between myself and the Emperor as to which nation boasts superior fighters. \n\n\"As a reward, the winners will be granted lands and a title by the crown, and, should it be relevant, receive a pardon for crimes against the Empire. More, however, the winners will have the prestige of having defended their country's honor.\n\n\"An Imperial guard will be sent to accompany you.\n\n\"Cheers,\n\n\"George Gower\"\n\nIt looks as though you will be unable to simply decline participating in this competition. How do you react to this summons?\n*choice\n  #Lu Jin, a prisoner? Of course we will fight—and win—to insure ${rivalhis} freedom!\n    *set lujin %+5\n    *set enlightened %+5\n    *if romance = \"Lu Jin\"\n      You now know that for the months Lu Jin has been missing, at least some of that time has been spent in jail, while ${rivalhe} waited for the Emperor and his bureaucrats to decide ${rivalhis} fate. Your blood boils at the thought of your love subjected to incarceration at best, and at worst, torture. You have no idea what is done to the rebels that are caught, and you shudder to think of what captivity may have done to Lu Jin.\n\n      *label notforced\t  \n      Even if you were not being forced to participate in this farce, you would do so in a heartbeat for the chance of freeing Lu Jin.\n      *goto arrival\n    *else\n      You think of your old rival and imagine a person full of life, always active, and only barely stoppable when ${rivalhe} got an idea into ${rivalhis} head. To think of Lu Jin stuck behind the bars of a jail—for who knows how long?—grates against you like sandpaper on your skin. Though the two of you did not always see eye to eye, you refuse to leave ${rivalhim} to suffer.\n\n      *goto notforced\n  #This is our moment to prove the foreigners are unworthy. We will fight for the honor of the Middle Kingdom!\n    *set honor %+10\n    Whatever George Gower may be wrong about—and you are sure those things are legion—he is right about one thing: you will defend your country's honor with pride.\n    *goto arrival\n  #This is sure to be a farce, with the game board aligned against us, but we will triumph regardless—by whatever means necessary.\n    *set cleverness %+10\n    Gower wouldn't have planned a simple competition without being sure that the odds were in his favor. He expects to win more than an event—he is using this as one more step to gain the Emperor's ear. The mere fact that he is having wagers with the Son of Heaven is unbelievably presumptuous.\n\t\n    Whatever it takes to prove that the foreigners are unworthy, you will make sure it is done.\n    *goto arrival\n  #I have no interest in fighting in this competition. I will escape before the supposed honor guard arrives.\n    *set tianxia %-5\n    *set tenacity %-5\n    *set cleverness %+5\n    Like other worldly matters, this is one among the many things that is interrupting your training. You have no interest in the competition, no real interest in defending the honor of the Middle Kingdom—which has fared well enough on its own without your help—and no desire to take part in what is sure to be a setup to see you dishonored. Better to flee—like the legendary crane and dragon masters who fled their monastery when it caught fire—than to burn in flames you cannot quench.\n\t\n    You hide in the mountains until the date for the competition is well past. Then, you descend, and when you are confronted by Imperial soldiers at your home, you tell them you never received the summons—you were far too busy training in the mountains. You are under some scrutiny for a time, but eventually, their interest fades.\n\t\n    Though you are not interested, you do later hear that the foreigners won the so-called Imperial Challenge, and that Lu Jin and Commander Rong Jue of the Imperial Army both died in an attempt to defend the Middle Kingdom.\n    *set lujin 0\n    *finish Chapter Eight: The Dragon Sage\n\t\n*label arrival\nThe following week, a group of Imperial soldiers, led by Commander Rong Jue, the son of Governor Rong, arrives to collect you. The procession has all the trappings of an honor guard, but from the way they watch you, you know that—like you—they consider you a prisoner. As you travel to the capital, how do you pass the time?\n*choice\n  #I talk to Rong Jue, hoping to find out more about what is happening in the capital.\n    *set cleverness %+5\n    *if (((romance = \"Rong Niu\") or (romance = \"Rong Mu\")) or (romance = \"${Surname} Niu\"))\n      Your brother-in-law is glad to catch you up on life in the capital, as long as you tell him about how his sibling is faring. He first wants to talk about his immediate family—his son is eight now, and he has a four-year-old daughter. The former is eager to study under you, if you are accepting new students. You smile and say you'd be happy to see your nephew whenever it is convenient for Rong Jue.\n\t  \n      After that, talk turns more serious.\n    The commander does his best to fill you in on the details of Xiaonanhai life. You can tell that he is trying to give a fair account of the foreign presence in the capital city, but you suspect that he has no fond feelings for George Gower or the foreigner's position at court. If Rong Jue's feelings are representative, you may have other allies inside the Imperial city.\n\t\n    In addition, Rong Jue informs you of how the contest is to work: you and Lu Jin will face a pair of foreigners wearing what Gower calls \"courtly\" armor—which Rong explains means outdated armor designed to stand against hand-to-hand combat but not hand cannons. The exhibition will start on horseback and resolve on the ground, as long as one member of each team is alive. \n    *goto city\n  #I tell stories and jokes, trying to set the soldiers at ease.\n    *set enlightened %+5\n    *set disciples +5\n    Over the days of travel, your cheerful demeanor sets all the soldiers at ease. You gather they were afraid that you—notable warrior that you are—would hold their mission against them. Instead, with your clear willingness to treat them as you would treat your students or other warriors you met under more auspicious circumstances, you have gained some devoted followers within the Imperial army.\n    *goto city\n  #I cast an oracle bone to determine whether the Imperial Challenge will have good results.\n    *set magic %+10\n    *if magic > 70\n      You cast an oracle bone into the fire late one night, and you notice a few of the soldiers making a sign, warding against magic. After the bone cracks from the heat of the fire, you withdraw it and read the lines. As is always the case with divination, it is hard to discern an exact result, but you are sure the bone tells you that the results of the challenge will be auspicious. You feel that if you make the right choices and play to your strengths, you will be able to defeat the foreigners and throw the results of Gower's bet back in his face.\n      *goto city\n    *else\n      You cast an oracle bone into the fire late one night, and you notice a few of the soldiers making a sign, warding against magic. After the bone cracks from the heat of the fire, you withdraw it and read the lines. As is always the case with divination, it is hard to discern an exact result. You can tell that the bone predicts an auspicious ending, but you can't tell if it means good results for you, or for the Emperor, or for Gower himself. You take comfort in the fact that divination is an inexact science at best and decide not to worry about the prediction.\n      *goto city\n  #I say nothing to anyone. Traveling in silence will be my rebellion against Gower for forcing me into his contest.\n    *set tenacity %+5\n    Your quiet demeanor is off-putting to the soldiers, who become overly concerned with your well-being. You appreciate their efforts, but your will is firm: you will not speak again until you reach Xiaonanhai.\n    *goto city\n\t\n*label city\n*page_break\nNo matter how many times you have been to Xiaonanhai, it never ceases to take your breath away at first sight. As you crest the last hill between you and the capital, the walled city stretches out in front of you, fading into mist, so that it appears that the city itself extends forever. A river runs through the center of the city, and one wall of the palace rubs against it like a cat against a friendly hand. The palace itself towers above the rest of the city, its golden calligraphy catching stray bits of light that float in through the mist, making it seem as though the whole building sparkles.\n\nXiaonanhai is the center of the Middle Kingdom, its heart and its breath. It is a testament to the working of humans, and proof that human hands can create something lasting. It also buzzes like a hive of angry bees; anyone within its walls must be wary that they are not stung by criminals and bureaucrats alike.\n\nThe soldiers are eager to get you to the palace, given that you have arrived the day before the competition, but you persuade them to stop by Tai Thong, a pastry shop you remember fondly from the last time you were in Xiaonanhai. The proprietors treat all their customers like family, and the atmosphere gives a sense that, through pastries, one can achieve both peace and prosperity. You make a small purchase, setting a pork bun aside for Lu Jin, as Rong Jue thinks Lu Jin will be released into the custody of the Imperial soldiers as soon as you arrive at the palace.\n\n*if romance = \"Lu Jin\"\n  Your heart pounds with both anxiety and anticipation at seeing your love again, and you hope Rong Jue is right.\n\nInstead, however, you are escorted to a guest room in the palace, attended to by servants, all with the intent of making you comfortable while you wait for hours for further news. All of you ignore the fact that soldiers are stationed outside your door. Finally, after night has fallen, a thin and damp Lu Jin is ushered into your room. They have clearly just bathed ${rivalhim}, in order to look presentable, you assume, for your competition.\n\n*choice\n  #I go to Lu Jin's side immediately to make sure ${rivalhe} is unharmed.\n    *set lujin %+15\n    *if lujin > 60\n      *if romance = \"Lu Jin\"\n        Lu Jin falls into your embrace, and tears fall down ${rivalhis} face, unashamed. \"I thought I would never see you again,\" ${rivalhe} says.\n\t\t\n        \"It's all right,\" you say. \"We're together now. The foreigners don't stand a chance.\"\n\t\t\n        You hear Lu Jin's quiet laugh and know you've said the right thing. Then you offer ${rivalhim} the pork bun and are rewarded with a genuine smile.\n\t\t\n        *goto poison\n      *else\n        Lu Jin allows ${rivalhim}self to lean on you, showing just how much the time in captivity has weighed on ${rivalhim}. \"Thank you for coming for me,\" ${rivalhe} says.\n\t\t\n        \"I couldn't let a fellow monk rot away in prison,\" you say lightly, and Lu Jin offers a sliver of a smile. You offer ${rivalhim} the pork bun, and Lu Jin grins, shaking ${rivalhis} head.\n\t\t\n        \"If anyone had to rescue me,\" ${rivalhe} says, \"I'm glad it was you.\"\n\t\t\n        \"After we defeat the foreigners, I'll make sure you never live it down,\" you promise.\n\t\t\n        *goto poison\n    *else\n      Lu Jin stands firm as you approach, refusing to show you any weakness despite ${rivalhis} thin frame. \"So they've roped you into this, too,\" ${rivalhe} says bitterly.\n\t  \n      \"It's all right,\" you say, ignoring ${rivalhis} tone. \"Once we defeat the foreigners, you can deny I came to your rescue for the rest of your life.\"\n\t  \n      Lu Jin snorts and actually cracks a smile, accepting the pork bun you offer with what looks like real gratitude.\n      *goto poison\n  #We don't know who might be watching. I gesture to the table in the guest chamber and offer Lu Jin a pork bun.\n    *set lujin %+10\n    *if lujin > 60\n      *if romance = \"Lu Jin\"\n        Lu Jin dashes across the room to you and flings ${rivalhim}self into your arms. \"Months apart and you offer me a pork bun,\" ${rivalhe} breathes in your ear. \"You are completely incorrigible.\"\n\t\t\n        \"You look like you need to eat,\" you say, pulling back slightly. \"I don't know who is watching us here. We should be careful.\"\n\t\t\n        Lu Jin separates with a serious nod. \"Of course. We can have a proper reunion after we defeat the foreigners. Seeing you again, I'm actually beginning to believe that's possible.\"\n\t\n        *goto poison\n      *else\n        Lu Jin joins you at the table and accepts the pork bun you offer. \"A pork bun?\" ${rivalhe} asks, questioning your greeting, though ${rivalhe} wastes no time in eating it.\n\t\t\n        \"You look like you need to eat,\" you say, then add quietly, \"I don't know who is watching us here. We should be careful.\"\n\t\t\n        \"Just like old times when Master Shen almost caught us raiding the monastery pantry,\" Lu Jin says, trying hard to smile. \"We'll be careful. And after we defeat the foreigners, we can talk about old times. Seeing you again, I'm actually beginning to believe that winning is possible.\"\n\t\t\n        *goto poison\n    *else\n      Lu Jin joins you at the table and accepts the pork bun, not wasting any time eating it. \"So,\" ${rivalhe} says finally, \"I suppose you have a plan to defeat the foreigners. I hope you'll consider my ideas as well.\"\n\t  \n      You agree to listen to Lu Jin's suggestions, though as ${rivalhe} has been incarcerated for months, it appears, you wonder how ${rivalhe} could have anything useful to add.\n      *goto poison\n  *if (romance != \"Lu Jin\") #I nod to Lu Jin and wish ${rivalhim} a good night.\n    *set lujin %-15\n    It has been a long trip for you, and you're sure that Lu Jin can find a place to sleep in these spacious quarters you've been assigned.\n\t\n    \"We should really talk about our tactics,\" Lu Jin says. \"I have no intention of going back to prison once this is done. We have to win.\"\n\t\n    You sigh and agree to sit down at the table to discuss your next moves.\n \n    *goto poison\n\t\n*label poison\nAs you sit together, Lu Jin gives you all the information about the competition ${rivalhe} has been able to glean. The two foreign competitors are masters of an old sport combat style called jousting that is rarely practiced in Gower's home country except for entertainment. They will be wearing thick plates of armor and carrying shields, using long lances to try to unhorse or kill you in a direct charge. You will be provided with ji, spear-tipped halberds that have crescent blades around a sword-breaker on either side of the haft.\n\n\"Their armor is an advantage on horseback, but we'll move much faster than they will on the ground,\" Lu Jin theorizes. \"And they'll have limited visibility due to their helmets—we should be able to stay in their blind spots, again if we can bring them to the ground. The hard part about the armor is that it offers very few openings: their eyes and at the softer armor covering their joints—which is still heavy enough to deflect a blade.\"\n\nYour brain begins working around these issues. \"We'll need to figure out their other disadvantages,\" you say, almost to yourself.\n\n\"Or you could ask for help,\" says a familiar voice. The only remaining palace servant steps forward, and you instantly recognize Feng, despite the fox spirit's new disguise. Lu Jin looks at you in confusion, but you just nod for ${rivalhim} to listen. \"I can offer you these,\" Feng says, rolling two small vials out onto the palm of her hand. \"Poison enough to coat one blade each.\"\n\nLu Jin begins to reach for the poison.\n\n*choice\n  #Feng has never led me astray before. This is a clever plan, even if it is dishonorable, and I am confident we can execute it without notice.\n    *set feng %-10\n    *set fighting %+20\n    *set honor %-20\n    *set lujin %+10\n    *set poison true\n    The three of you sit together at the table making a plan. It is of upmost importance that you not be caught, which will require a great deal of cleverness to pull off. Coating the blades must happen where no one can see you—Lu Jin suggests coating a rag with the poison, which you will then use instead of oil to \"clean\" the blades you select.\n\t\n    *if cleverness > 70\n      You make the preparations, going further with Lu Jin's idea by mixing the poison and oil together in a flask, so you won't risk being seen with Feng's delicate vials. As you create the mixture, you notice Feng sneaking off, much like how she came, but there is a set to her shoulders that seems unlike the proud fox spirit, regardless of her costume.\n\t  \n      \"Feng,\" you call out, and she pauses, turning to look at you. \"Did Master Zhuge tell you to obey me if I gave you an exact instruction?\"\n\t  \n      The fox spirit looks curiously at you, then nods slowly.\n\t  \n      \"Then I am telling you to go to Kuei Xian, where you will wait until I come to meet with you.\" You watch her expression carefully. \"Do not discuss our plans for the competition with anyone.\"\n\t  \n      Feng's face brightens and her shoulders regain their confident posture. \"Of course, ${name}. I will await your return.\"\n\t  \n      The huli jing transforms into a seven-tailed fox and vanishes through a window. Lu Jin looks at you curiously, and you shrug. \"It was just a hunch. She is a fox spirit, and it's her role in life to tempt monks. My old master instructed her not to deceive me by making me see a world that was not real, but betraying us would not have technically been against Master Zhuge's instructions—just the spirit of them. I gave her a way out of her dilemma and gave us a better chance at succeeding at this.\"\n\t  \n      Lu Jin looks at the window where Feng disappeared. \"It is a good thing you're so clever,\" ${rivalhe} says. \"Though you'll forgive me if I don't sleep well tonight.\"\n\t  \n      You nod and return to your task. You are not sure you will sleep well tonight, either.\n      *goto competition\n    *else\n      *set status %-50\n      You make your preparations on how to hide the poison to get it down to the competition arena and believe that all is well, even after Feng disappears into the night. The next morning, however, you are awakened by banging at the door, and you answer it to find angry guards waiting outside. Rong Jue looks at you in clear disappointment.\n\t  \n      \"You are arrested for attempting to undermine the Imperial Challenge through deceit and treachery,\" one of the soldiers, who wears an insignia of greater rank than Rong Jue, announces coldly. \"You will be placed in prison to await the judgment of the Emperor.\"\n\t  \n      \"No!\" screams Lu Jin. \"I will not go back!\" ${rivalhe} breaks the leg from a tall, decorative stand and wields it like a club, charging at the soldiers.\n      *choice\n        #I fight alongside Lu Jin, determined to get us both out of here.\n          *label fightout\n          *set lujin %+20\n          *set status %-20\n          *set tianxia %-15\n          *if fighting > 70\n            With Lu Jin's screaming distraction, the ranking soldier never even sees you move before your elbow is in his throat. You pull his sword out of its scabbard as he falls and slice into the next rank of soldiers. Rong Jue flees to sound the alarm, as you and Lu Jin—who also takes a sword as soon as ${rivalhe} disarms one of your opponents—clear a path through the Imperial guard.\n\t\t\t\n            You remember the path you took through the palace to get here, and though the guards keep coming, you and Lu Jin are like a tornado, cutting through full ranks of soldiers, sending them falling like gwat pai tiles. Your race through the palace and the combat that continues at every turn becomes a blur of motion, of your sword mowing down the enemy like a sickle in a rice field.\n\t\t\t\n            And then Xiaonanhai is in front of you, and the two of you race through the streets, over rickshaws and horse-carts, until you have made it to the city walls. Once again there is a battle, and the soldiers spill their blood in a ruby pool as you force your way out of the capital city.\n\t\t\t\n            You will not be welcome here for quite some time. The two of you take to the wilderness, where you will hide as long as it takes for the Emperor to forget your transgressions.\n            *finish Chapter Eight: The Dragon Sage\n          *else\n            With Lu Jin's screaming distraction, the ranking soldier never even sees you move before your elbow is in his throat. You pull his sword out of its scabbard as he falls and slice into the next rank of soldiers. Rong Jue flees to sound the alarm, as you and Lu Jin—who also takes a sword as soon as ${rivalhe} disarms one of your opponents—clear a path through the Imperial guard.\n\t\t\t\n            Like the heroes of old, you make a noble attempt at fighting your way through legions of soldiers. You imagine those tales, how the men who fought against the heroes were described as sending their enemies falling like gwat pai tiles, or like harvested rice. But the reality is grimmer. These men are trained fighters, and their supply is inexhaustible. Their attacks begin to make it through your defenses, and no matter how many you kill, there is another to take his place.\n\t\t\t\n            You see Lu Jin stumble—and you realize in that moment that you have fallen. There is no pain yet, but the blood pooling around you makes you suspect that it is a matter of shock. Your eyes flutter closed and you let yourself fall into darkness.\n            *page_break\n            *goto_scene death\n        #I stop Lu Jin from attacking and explain that there must be a mistake.\n          *set lujin %-10\n          You catch Lu Jin before ${rivalhe} reaches the door. \"Forgive my companion,\" you say over Lu Jin's shouts. \"$!{rivalhe} is understandably reluctant to return to the dungeons. But I'm sure there has been a mistake. Won't you come in and join us?\"\n\t\t  \n          You continue to hold Lu Jin in a bear hug as the soldiers enter the guest chambers. You smile politely at each of them as they come in.\n\t\t  \n          \"Last night we were approached by a member of the palace staff, who offered us poison to use in the competition,\" you say, beginning with the truth before moving into your hastily constructed lie. \"Given that the Emperor himself had wagered on our winning, we assumed that someone with the Emperor's best interests at heart had sought to guarantee that the warriors of the Middle Kingdom were proven more worthy. We'll gladly give you the two vials of poison that were presented to us. We simply did not wish to offend our mysterious patron by refusing the gift.\"\n\t\t  \n          *if enlightened > 70\n            *set lujin %+10\n            You carefully watched the expression on the leader's face as you delivered your lie, making sure that your inflections were as convincing as your words. You have also hinted that the Emperor himself would have wanted you to use the poison, though suggesting such openly would be akin to slander. Still, you see you have planted just enough doubt in the soldier's mind to make him wonder about his own orders.\n\t\t\t\n            Lu Jin relaxes, and you release ${rivalhim} to retrieve the vials, which you offer to the leader. He thinks for a moment, clearly weighing his own options, before shaking his head. \"The Imperial Courts are a treacherous place, where good, honorable people can find themselves victims of cruel gossip and accusations,\" he says. \"Clearly our informant was mistaken about the situation.\"\n\t\t\t\n            \"Thank you,\" you say with a bow, concealing the vials once more. The soldiers depart, leaving you and Lu Jin to finish preparing for the competition.\n            *goto competition\n          *else\n            \"Regardless of who the vials came from—and you can be sure the Magistrate of Inquiries will uncover eventually—I have my orders.\" The leader gestures to the rest of the soldiers to take you, and Lu Jin breaks from your hold, club swinging.\n            *choice\n              #I will fight my way out with Lu Jin.\n                *goto fightout\n              #I will submit to arrest and let Lu Jin face the consequences of fighting.\n                *goto fate\n        #I submit to arrest, leaving Lu Jin to ${rivalhis} fate.\n          *label fate\n          *set lujin 0\n          *set status %-10\n          Lu Jin clobbers one of the soldiers over the head and pushes ${rivalhis} way out into the hallway as Rong Jue comes to stand guard in front of you, watching warily as you stand peacefully next to him. The sounds of battle continue as other guards are summoned, and the injured guards in your chambers begin to find their feet and trail after Lu Jin.\n\t\t  \n          The battle does not last much longer, and you hear Lu Jin's death cry. \n\t\t  \n          After a few weeks in prison, you are released, as a helpful, unnamed witness blamed the entire event on Lu Jin and convinced the magistrate to clear you of any wrongdoing. You return home, free, but with a stain on your reputation and no chance now to compete against the foreigners for the honor of the Middle Kingdom.\n          *finish Chapter Eight: The Dragon Sage\n  #Feng is a fox spirit—my companion or not, tempting monks into dishonor is in her nature. No good will come of taking up her offer.\n    *set cleverness %+10\n    *set feng %+10\n    \"You're crafty, Feng, but I am too familiar with your tricks to be fooled by this one,\" you say, and Feng offers a polite bow, her face wearing a wicked smile.\n\t\n    \"What do you mean?\" Lu Jin demands. \"This is a great opportunity for us. If we can strike with poisoned blades, it will negate all the other factors.\"\n\t\n    You shake your head. \"The whole mission of a fox spirit's life is to tempt monks away from the path of honor,\" you say. \"If we accept now, Feng is very likely to have to betray us, just to sow further chaos. It's in her nature. Think of the consequences if we get caught.\"\n\t\n    *if lujin > 60\n      Lu Jin weighs your words for a moment, then sighs. \"You know more about fox spirits than I do—clearly,\" Lu Jin says with a frown at Feng. The fox spirit smiles back sweetly. \"I'll stand by your decision.\"\n\t  \n      \"Yet another test passed, ${name},\" says Feng before she turns into her seven-tailed fox form and vanishes, taking the vials of poison with her.\n      *page_break\n      *goto competition\n    *else\n      Lu Jin weighs your words, then turns away. \"You are the expert on fox spirits,\" ${rivalhe} says, sounding bitter. \n      *label poison2\n      You say goodbye to Feng, and both you and Lu Jin agree to turn in for the night. As you are falling asleep, you think you hear voices, but you put it off to being the palace servants going about their work.\n      *set lujinpoison true\n      *set advantageModifier +5\n      *goto competition\n  #If we were caught using poison, we would be shown as dishonorable opponents. We cannot risk that loss of face, so we cannot accept the poison.\n    *set cleverness %+10\n    *set feng %+10\n    \"We cannot do this,\" you say firmly. \"If we were to be caught, the consequences not only to us, but to the reputation of the Middle Kingdom, would be disastrous.\"\n\t\n    \"Then let's not get caught,\" Lu Jin says excitedly. \"We need this sort of advantage, ${name}.\"\n\t\n    You look at both Feng and Lu Jin, giving them your best teacher stare. \"No,\" you say, \"we don't. We can use the sword breakers on the ji to open their armor like peeling off a can if it comes down to it. But this…someone will find out eventually. And everything we're seeking to prove—that we are better fighters than the foreigners, that the Middle Kingdom has greater honor—will be completely undone.\"\n\t\n    *if lujin > 60\n      Lu Jin nods slowly. \"All right. I concede your point.\" $!{rivalhe} suddenly grins. \"Like you say, we don't need it anyway. We'll win regardless.\"\n\t  \n      You sense that Lu Jin's confidence is based almost entirely upon you.\n\n      \"Yet another test passed, ${name},\" says Feng before she turns into her seven-tailed fox form and vanishes, taking the vials of poison with her.\n      *goto competition\n    *else\n      Lu Jin weighs your words, then turns away. \"May your confidence be merited,\" ${rivalhe} says bitterly.\n      *goto poison2\n  #We will not stoop to such a dishonorable tactic!\n    *set honor %+20\n    *set feng %-10\n    *set cleverness %-10\n    \"Poison?\" you say incredulously. \"I would never participate in so dishonorable a tactic. Feng, I'm astonished that you'd propose such a plan.\"\n\t\n    Lu Jin shakes ${rivalhis} head. \"We need an advantage, ${name}. This is a perfect opportunity.\"\n\t\n    \"No,\" you say firmly. \"Nothing you say can persuade me otherwise.\"\n    *if lujin > 60\n      Lu Jin laughs. \"All right, all right,\" ${rivalhe} says. \"No poison. We'll win without it.\"\n\t  \n      Feng just shrugs and departs without saying another word.\n      *goto competition\n    *else\n      Lu Jin looks away. \"Whatever you say,\" ${rivalhe} says.\n      *goto poison2\n\t  \n*label competition\n*page_break\n*if romance = \"Lu Jin\"\n  After realizing that you have little left to discuss about the coming battle, you and Lu Jin make up for the time you lost while ${rivalhe} was in prison. You ask about what happened there, but Lu Jin promises to tell you on a different day, when you are both free and victorious. You spend the night in the comfort of each other's arms.\n  \nThe next morning, you and Lu Jin are escorted by no fewer than twenty armed Imperial soldiers, including Rong Jue, to a field north of the city wall. There are raised stands of seating, crafted, you suspect, from bamboo, and a pavilion is on a raised dais overlooking an oblong arena. The whole thing looks very odd to you, and Gower's work is evident in everything from the pennant flag decorations to the strange rope, suspended at chest height, that divides the arena. Two riders, completely covered in steel armor, stand next to two horses at the far end of the arena; you and Lu Jin are escorted to two waiting horses and a weapons rack at the other side.\n\nNow that the moment is upon you, how will you prepare for this competition to begin?\n*label preparations\n*choice\n  *hide_reuse #Select a weapon from the rack.\n    There are several ji to choose from, as well as a half-dozen straight-edged jian and a pair of hook swords. Lu Jin takes the hook swords and flourishes them for a moment before nodding and hooking them into ${rivalhis} belt. You choose a ji that is almost as weighty as one of Master Zhuge's guan dao and a jian that ends in a red tassel, which should catch your opponent's eyes as a distraction should the combat move to the ground.\n\t\n    Do you make any additional preparations?\n    *goto preparations\n  *hide_reuse *if (poison) #Use the poison to \"clean\" the blades.\n    *set advantageModifier +10\n    You and Lu Jin apply the poison to your ji, smearing it along the point and on the crescent blades of the sword catcher. You have applied it subtly enough, and diluted enough, that it is unlikely to kill your opponents, but it will probably slow them down and give you the advantage. Better still, by doing it this way, no one will be able to prove that poison was used on your blades. You have gotten away with this tactic with only your honor to suffer for it.\n\t\n    Do you make any further preparations?\n    *goto preparations\n  *hide_reuse #Greet our opponents so that the combat begins with honor.\n    *set enlightened %+15\n    You do not know the traditions of the foreigners for occasions like this, but you see no reason for your fight to begin without honor. You strike out across the field until Lu Jin grabs you by the wrist.\n\t\n    \"What are you doing?\" ${rivalhe} hisses.\n\t\n    \"Greeting our opponents,\" you say. \"They may not wish to follow our customs, but we should represent the Middle Kingdom by beginning this fight with honor.\"\n    *if lujin > 60\n      Lu Jin's lips tighten, but then ${rivalhe} lets go of your arm. \"All right,\" ${rivalhe} sighs. \"We will behave honorably.\"\n\t  \n      You walk together to the other side of the arena and bow in greeting to your opponents. The two armored fighters lift the visors of their helmets, and you see the light-skinned faces of two men younger than you are, but clearly skilled fighters or they would not be here.\n\n      One of them asks the other a confused question, which the second answers with a smile. \"Hello to you, too,\" he says to you and Lu Jin, his accent quite competent for a foreigner. \"Lovely day for a battle to the death, isn't it?\"\n\t  \n      Lu Jin nearly chokes, but you smile. \"Perhaps it will not come to that,\" you say serenely, imagining Abbot Bao's voice behind your words. \"We look forward to seeing your skills on display and hope for an honorable competition.\"\n\t  \n      *if enlightened > 60\n        *set opponentpoison false\n        *set advantageModifier +5\n        The warrior looks slightly embarrassed. \"Yes, well, we look forward to seeing your skills, too,\" he says clumsily. \"Honor and all that.\"\n\t\t\n        The first warrior asks for a translation, and the two of them rattle back and forth for a minute, with the first warrior soon looking as sheepish as the second. \"Nice to meet you,\" he says, haltingly, with a big smile. You and Lu Jin bow again and return to your side of the field.\n\t\t\n        \"They were up to something,\" Lu Jin mutters.\n\t\t\n        \"Well, perhaps now they'll change their minds,\" you say.\n\t\t\n        Do you make any additional preparations?\n        *goto preparations\n      *else\n        \"Indeed,\" the second warrior says cheerfully. \"We'll see you on the field!\"\n\t\t\n        You and Lu Jin wander back to the other side of the field, Lu Jin muttering the whole way about the men who have every intention of killing you as soon as this competition starts.\n\n        Do you make any additional preparations?\n        *goto preparations\n    *else\n      Lu Jin sneers. \"They are not worthy of such respect. Go on your own if you wish.\"\n\t  \n      You leave Lu Jin behind without further argument, walking to the other side of the arena and bowing in greeting to your opponents. The two armored fighters lift the visors of their helmets, and you see the light-skinned faces of two men younger than you are, but clearly skilled fighters or they would not be here.\n\n      One of them asks the other a confused question, which the second answers with a smile. \"Hello to you, too,\" he says to you, his accent quite competent for a foreigner. \"Lovely day for a battle to the death, isn't it?\"\n\t  \n      You smile politely. \"Perhaps it will not come to that,\" you say serenely, imagining Abbot Bao's voice behind your words. \"We look forward to seeing your skills on display and hope for an honorable competition.\"\n\t  \n      *if enlightened > 65\n        *set opponentpoison false\n        *set advantageModifier +5\n        The warrior looks slightly embarrassed. \"Yes, well, we look forward to seeing your skills, too,\" he says clumsily. \"Honor and all that.\"\n\t\t\n        The first warrior asks for a translation, and the two of them rattle back and forth for a minute, with the first warrior soon looking as sheepish as the second. \"Nice to meet you,\" he says, haltingly, with a big smile. You bow again and return to your side of the field.\n\t\t\n        The encounter seems rather suspicious, but you think that by crossing the field to greet them, you have inspired some real respect from your opponents, which can only work to your advantage.\n\t\t\n        Do you make any additional preparations?\n        *goto preparations\n      *else\n        \"Indeed,\" the second warrior says cheerfully. \"We'll see you on the field!\"\n\t\t\n        You wander back to the other side of the field, feeling as though, despite their cheerful demeanors, those men have every intention of murdering you.\n\n        Do you make any additional preparations?\n        *goto preparations\n  *hide_reuse #Examine the horses to make sure they are in good condition.\n    You look over the horses and check their equipment to make sure that nothing has been tampered with. Sure enough, you see that the tie securing the saddle on one of the horses has been sliced, and that the other has a burr in its bridle. \n\t\n    You call for Rong Jue, who comes over immediately. \"Is there a problem?\"\n\t\n    When you explain, Rong Jue's face goes dark. But before he can say anything, you suggest, \"Could you bring us two fresh horses?\"\n\t\n    He nods shortly. \"I will see that two stallions are brought from the army stables,\" he says, and you can hear the anger in his voice. \"You will not be taken advantage of.\"\n\t\n    A short time later, the commander returns with two new mounts, and they are glorious ones, far better than the pair here originally. \n    *if (((romance = \"Rong Niu\") or (romance = \"Rong Mu\")) or (romance = \"${Surname} Niu\"))\n      The horse that Rong Jue gives to you is his own mount. \"He will do you honor,\" your brother-in-law promises. \"He has always stuck by me.\"\n      *set advantageModifier +2\n\t  \n    You and Lu Jin bow to Rong Jue, and he returns the bow, saying nothing further about the incident.\n\n    Do you make any further preparations?\n    *set advantageModifier +5\n    *if style = \"Red Hare\"\n      *set advantageModifier +5\n    *goto preparations\n  #I am ready for battle!\n    You look at Lu Jin, who nods in readiness, and the two of you bow to each other.\n\t\n    \"We will win,\" Lu Jin says confidently. You wonder whether ${rivalhe} is reassuring ${rivalhim}self or you.\n\t\n    You tell Rong Jue that you are ready, and he gestures to one of the other soldiers. Suddenly, a drum call fills the arena, and you and Lu Jin, on horseback, are escorted to the dais. The two foreigners, also riding their horses, stop next to you, and the four of you wait as the Emperor's silk-enclosed litter is run up to the dais by his guards. They stop and lower the Emperor to the ground, where he watches from behind the thin curtains.\n\t\n    George Gower and several members of the Imperial bureaucracy take their seats near the Emperor's litter. As everyone is settled, one of the magistrates calls out, \"Let the Imperial Challenge begin!\"\n\t\n    The stands, full now of spectators, erupt in cheers. The foreign horsemen ride quickly back to their end of the arena. Rong Jue, who is providing your escort, hisses instructions to you.\n\t\n    \"The foreigners will ride the center of the field—they call it the pitch—with their lances,\" he says. \"They are steel tipped and meant to kill. But they are accustomed to continuing on the pass, reaching the end, and turning around again, based on the practices I have watched. You're on the first pass—Lu Jin's second.\"\n\t\n    He pulls away as you reach the end of the field. \"Good luck!\"\n\t\n    What strategy do you use to face the foreigners?\n    *choice\n      *if (style = \"Red Hare\") #I was trained to fight from the saddle from an early age. I will fight on horseback.\n        *set advantageModifier +5\n        *label horseback\n        You charge down the lane, keeping to your assigned side of the silly rope divider. You can see your opponent's strategy: he is seated firmly in his saddle, weight forward, his lance balanced across the horse's neck so that his shield faces you. His attack is based on momentum, and clearly his customary rules expect you to stay where he will hit you.\n\t\t\n        But one of the first rules of combat you learned was that if you are in a place where someone wants to hit you, don't be there. Move somewhere else and disrupt their offense to gain the advantage.\n\t\t\n        How do you attack?\n        *choice\n          #I use a clever evasion, shifting away from the line, then wheeling around and chase after my opponent from his blind spot.\n            *if cleverness > (60 - advantageModifier)\n              You dart away from the center just as your opponent's lance would have connected with your shoulder. Your horse does not appreciate the sudden change of direction, but it obeys, and you chase after your foe from behind—where he cannot see you, and where his shield does not protect his vulnerable elbow joint. By the time he starts to rein his horse in, you are on top of him, your ji's point stabbing into his vulnerable joint. You are sure the crack of breaking bone can be heard throughout the arena. You yank your ji back to you and make some space.\n\t\t\t  \n              Lu Jin's horse flies past yours, and you realize ${rivalhe} is headed into ${rivalhis} own part of the combat. Your foe may have one arm disabled, but he is still in the competition.\n              *set advantageModifier +5\n              *label tactics\n              *choice\n                #I work from his blind spot and try to knock off his helmet.\n                  *if tenacity > (60 - advantageModifier)\n                    Keeping your horses together is the first challenge—neither wants to be riding so closely to each other as you are locked in combat. The sheer weight of creature beneath you is difficult to control. You move in and out, keeping a collision from happening to protect your leg from being crushed between the two horses.\n\t\t\t\t\t\n                    But your constant battering on the warrior's helmet seems to have unnerved him. He keeps trying to shift his position to get at you, but the head blows keep him off balance. Finally, he puts his horse into a charge you did not anticipate, just to put space between you. He charges back with his lance, but he doesn't have the kind of length he had at the start, and you dart past him, striking out with the crescent blade of the ji at his head. He topples from his horse, his helmet ruined and his expression dazed.\n                    *label surrender\n\t\t\t\t\t\n                    At the other end of the arena, Lu Jin is locked in combat with ${rivalhis} opponent, and not doing as well as you.\n                    *set advantageModifier +5\n                    *choice\n                      *if (disarmed = false) #Lu Jin can handle ${rivalhim}self. I dismount and put the tip of the ji to my opponent's throat, demanding his surrender.\n                        As you dismount, your opponent struggles to his feet, drawing his sword to fight you from the ground.\n                        *goto groundgame\n                      #I trample my opponent, not worrying about his death, then rush to Lu Jin's aid.\n                        *label trample\n                        The army horse does not shy away from the gory task, and you leave your foe in a bloody mess as you rush down the field to Lu Jin's aid.\n                        *set opponentdead true\n                        *goto lujinfight\n                      #Lu Jin will be fine for a few moments. I whicker for my horse to approach my downed opponent, my ji lowered, and extract his surrender.\n                        With the threat of both a warhorse and a weapon above him, the warrior surrenders. You raise your ji toward the imperial dais, hoping that everyone heard the foreigner's words, before hurrying across the field to Lu Jin's aid.\n\t\t\t\t\t\t\n                        *if opponentpoison\n                          *if magic > (60 - advantageModifier)\n                            You move in your saddle almost before you realize why, raising your ji in a block. In slow motion, you see a dagger fly by you and clang against the swordcatcher on your ji. You spin your weapon so that the dagger is caught, then grab the hilt before it can fall. The blade has a dark coating along its edges, and you realize that you were nearly poisoned by the foreigner.\n\t\t\t\t\t\t\t\n                            *choice\n                              #Ride back to trample my opponent, who clearly did not mean his surrender.\n                                *goto trample\n                              #Call out \"Poison!\" and hold the blade up high, hoping the magistrates will halt Lu Jin's battle.\n                                Your shout sends a gasp through the crowd, and Imperial soldiers rush onto the field to apprehend Lu Jin's opponent. You ride your horse back to the position from which you demanded your foe's surrender before, standing over him prepared to kill should he try again to kill you.\n\t\t\t\t\t\t\t\t\n                                \"Use of poison is both illegal in this competition, and dishonorable!\" the magistrate announcer calls out after a moment. \"Both warriors from the foreign lands will hereby be detained until fault can be ascertained. This contest is ended in favor of the Middle Kingdom!\"\n\t\t\t\t\t\t\t\t\n                                A roar goes up from the crowd, and the drums play wildly in rejoicing. You leave your foe in the capable hands of the Imperial soldiers and ride across the field to a wounded Lu Jin. Despite a gash across ${rivalhis} side, ${rivalhe} looks happy to have survived. The Imperial doctor rushes onto the field to inspect the wound, but finds no immediate evidence of poison. You and Lu Jin are once again escorted back to the Imperial palace.\n\t\t\t\t\t\t\t\t\n                                *label wearethechampions\n                                Two days later, you are summoned before the Emperor. Though you are required to remain several steps back from the throne, the Emperor shows you his face, and bestows one of his rare smiles upon you.\n\t\t\t\t\t\t\t\t\n                                \"Congratulations, my Imperial Champions,\" he says. \"You have shown the Middle Kingdom that we have much to be proud of.\"\n\n                                *if (style = \"Celestial Sword\")\n                                  The Emperor's gaze locks on you for a moment. \"And I am very proud of you, my child,\" he says, acknowledging your blood relationship for the first time since you left to join the Order of the Peach Tree.\n\t\t\t\t\t\t\t\t  \n                                \"You are welcome in my Court,\" he says. \"Let it be known throughout the Middle Kingdom that you are the empire's heroes.\"\n\n                                The subsequent awards you receive of land and wealth to match your new status are almost secondary to that proclamation.\n                                *set champion true\n                                *achieve champion\n                                *set status %+30\n                                *finish Chapter Eight: The Dragon Sage\n                              #Throw the dagger back at his unprotected head.\n                                *if fighting > (80 - advantageModifier)\n                                  It is a difficult shot at this distance and angle, even without the bouncing of a horse beneath you, but you have never let that stop you before. The dagger flies precisely through the air, blade punching into your opponent's cheek. It is a wound he may survive—if the poison coating his blade is not too deadly.\n                                  *set opponentdead true\n                                  *goto lujinfight\n                                *else\n                                  It would be a difficult shot at this distance and angle, even without the bouncing of a horse beneath you. As it is, your throw goes wild, and you leave a falsely surrendered foe on the ground behind you. You would not be surprised to see him back on his horse, charging down the field to join the fray.\n                                  *goto lujinfight\n                          *else\n                            As you ride away, you feel a sharp, piercing pain in your right shoulder, and you are shocked to see a dagger protruding from your back. The world wavers in front of you, and you topple from your horse.\n\t\t\t\t\t\t\t\n                            Whatever poison was on that dagger acts quickly.\n\t\t\t\t\t\t\t\n                            You hear cries of \"Poison!\" from the spectators, and you see the Imperial doctor standing over you moments later.\n\t\t\t\t\t\t\t\n                            But you know it is too late. Though you are sure that you and Lu Jin will be named Imperial Champions due to the treachery of the foreigners, your title will have to be rewarded posthumously.\n                            *goto_scene death\n                        *else\n                          *set opponentout true\n                          *goto lujinfight\t\t\t\t\t\t  \n                  *else\n                    Despite your best efforts, you cannot keep the horse under your control to remain in your foe's blind spot. Your spiraling around means he has not yet been able to bring his lance back to bear on you, but you will have to change your tactics.\n                    *set advantageModifier -1\n                    *goto tactics\n                #I move around to his lance side, aiming for the elbow.\n                  The armor at the lance elbow is not as thin as the shield side, but you think you can damage him there as well. \n\n                  *if fighting > (70 - advantageModifier)\n                    You wheel around, closing fast on your opponent's side. As he dodges, he drops his lance and draws his sword. He swings at you in big broad strokes, awkward due to the weight of his armor. You deflect with the crescent blade of your ji, waiting for the opportunity to disarm him with the sword catcher. He stabs at you, and you flick your ji sideways, trapping the blade and wrenching it from his armored hand. In the next instant, you stab at the elbow joint with a blow that crushes the metal beneath your ji's point. The bone beneath the armor does not shatter, but the damage to the armor will make it difficult to fight.\n\t\t\t\t\t\n                    The weight of your blow tilts your opponent out of his saddle and sends him, cringing with pain, onto the ground.\n                    *set disarmed true\n                    *goto surrender\n                  *else\n                    Your foe is just as good a rider as you are, and he does not want to risk your gaining access to his other arm. Your horses dance around each other, and though he tries to gain the space to charge you with his lance, neither of you can get into position to accomplish your goals.\n                    *goto tactics\n                #I leap from my horse and onto his, attacking him from behind and dragging him to the ground.\n                  *goto leap\n            *else\n              You dart away from the center just as your opponent would have struck, but you miss the return strike. You do successfully put yourself in his blind spot, however.\n              *goto tactics\n          #I command my horse to leap across the rope and swing my ji to attack on his unshielded side.\n            *label crosstheline\n            *if fighting > (70 - advantageModifier)\n              Your horse is well-trained enough to respond to your commands, and he leaps across the line, startling the other horse into shying. While your opponent tries to regain control of his horse, the crescent blade of your ji strikes the metal on his chest full force, sending him backwards and out of his saddle.\n\t\t\t  \n              You pat the rump of his mount with the flat of the ji's blade, sending it skittering off and leaving your opponent on the ground. \n\t\t\t  \n              Lu Jin's horse flies past yours, and you realize ${rivalhe} is headed into ${rivalhis} own part of the combat.\n              *goto surrender\n            *else\n              Your horse prepares to leap, but then shies at the close proximity of the other horse. Its knees buckle, and you go flying over the line, rolling as you tumble onto the ground and coming up to your feet almost instantly.\n\t\t\t  \n              *goto unmounted\n          #I stay steady on the path, catching the tip of his lance in my ji's swordcatcher and disarming him, even if I take some force from the impact.\n            *if tenacity > (60 - advantageModifier)\n              You stay on target, knowing that it will require only a slight movement on your part to divert the blow of the lance out of the range of danger and out of your enemy's hands. You imagine that he is surprised to see you—wearing no armor other than your clothes—bearing down on him when he has his body encased in metal.\n\t\t\t  \n              The lance pierces the air inches from you. You snap your ji into place, blocking the blow with the haft of the ji while the lance threads the sword catcher. A twist of the ji and the lance is pulled out of your enemy's hands.\n\t\t\t  \n              As your foe passes down the pitch, Lu Jin's horse flies past yours, and you realize ${rivalhe} is headed into ${rivalhis} own part of the combat.\n\n              How will you next attack your opponent?\n              *set advantageModifier +5\n              *goto tactics\n            *else\n              Your plan was noble, but staying in the path of the lance, staring down your enemy, takes more determination than you have. You dodge at the last moment, but it's too late—the lance sinks into your ribs and sends you toppling from the horse.\n\t\t\t  \n              You think that you see Lu Jin's horse charging past as ${rivalhe} goes into ${rivalhis} own part of the battle, and then you see your enemy's horse bearing down on Lu Jin. But things become fuzzy after that, and though you remember the face of the Imperial doctor looking down at you and saying something, the words make no sense. Your consciousness floats off. You feel your body shudder with one last breath.\n\t\t\t  \n              *goto_scene death\n      *if (style != \"Red Hare\") #I am confident I can fight on horseback.\n        *goto horseback\n      #I want to fight on the ground, and will aim to unhorse the rider.\n        You charge down the lane, keeping to your assigned side of the silly rope divider. You can see your opponent's strategy: he is seated firmly in his saddle, weight forward, his lance balanced across the horse's neck so that his shield faces you. His attack is based on momentum, and clearly his customary rules expect you to stay where he will hit you.\n\t\t\n        But one of the first rules of combat you learned was that if you are in a place where someone wants to hit you, don't be there. Move somewhere else and disrupt their offense to gain the advantage.\n\t\t\n        How do you plan to unhorse your foe?\n        *choice\n          #I stand on the saddle and use my chi to leap onto his horse, dragging him to the ground.\n            *label leap\n            *if magic > (70 - advantageModifier)\n              You secure your ji across your back to leave both of your hands free. As your opponent bears down on you, you crouch in the saddle, then you spring over his lance and tackle him. Your combined weight and the change in momentum send both of you toppling from the back of his horse. You land on top of him, allowing your full weight to crash into him before you roll off and spring to your feet. He clambers after you, moving faster than you'd have expected given the awkward weight of the armor, though still far slower than you. He draws his sword.\n\t\t\t  \n              Lu Jin's horse flies past yours, and you realize ${rivalhe} is headed into ${rivalhis} own part of the combat.\n              *set advantageModifier +2\n              *goto groundgame\n            *else\n              You leap free of your horse, but your opponent pulls his horse into a rear, and you roll to the ground, only barely out of the way of the horse's dangerous hooves. You dash away to clear some space and draw your ji.\n\t\t\t  \n              *goto unmounted\n          #I command my horse to leap across the rope and swing my ji to attack on his unshielded side.\n            *goto crosstheline\t\n          #My horse is stronger than I am; I speak to it in comforting words, letting it dart out of the way before it rears to kick my foe from his saddle.\n            You have learned that relying on your own strength is not always the answer.\n            *if enlightened > (60 - advantageModifier)\n              In this case, you have made the right choice. This horse is nearly as skilled a fighter as you are, and it listens to your commands. You gently keep your mount just out of the range of the lance, using the crescent blades of your ji to guard against the weapon. In return, as soon as your foe begins to pass, it rears up, launching its hooves into the armored warrior.\n\t\t\t  \n              The horses get tangled up in each other, and your horse cannot keep you in your saddle, so you go flying as well. But unlike your foe, you have not been kicked by a horse, and you have been trained and trained again to roll when you fall.\n\t\t\t  \n              As you stand, you see Lu Jin racing past you, charging off to take ${rivalhis} part in the combat.\n              *set advantageModifier +5\n              *goto groundgame\n            *else\n              In this case, however, this horse was not the right animal to trust. Rather than rearing and striking your opponent, the horse just rears—sending you crashing to the ground.\n              *goto unmounted\n      #I can take a mounted fighter from the ground. I will get off the horse at the pass and attack unmounted.\n        As your foe approaches, you leap down from your horse, smacking it on its rump to sending it away. You were meant to have your feet on the ground.\n        *label unmounted\n        Your foe charges down on you, the tip of his lance pointed for your heart.\n        *choice\n          #Use my chi to run up the lance and punch him in the helmet before jumping off on the other side.\t\n            *if magic > (70 - advantageModifier)\n              You dart up the lance, and it is easier than balancing on bamboo, despite the movement of the horse. As you reach your foe's shield, you jump up and deliver a crushing elbow to the top of his helmet. You leap down on the other side, coming up in a roll, and you can see that though your foe is still on his horse, he cannot see, because the helmet has crushed down over his eyes. He attempts to steer his horse, but the creature is clearly no longer under his control.\n\t\t\t  \n              Lu Jin's horse charges past behind you, and you realize ${rivalhe} is making ${rivalhis} way to ${rivalhis} part of the combat.\n              *set advantageModifier +2\n              *choice\n                #I leave my blinded opponent crashing about on his horse. I will join Lu Jin.\n                  You let your foe blunder around, blinded, while you hurry toward the other side of the arena. There, Lu Jin and ${rivalhis} opponent crash into each other, and in an action you can't make out, Lu Jin tumbles from ${rivalhis} saddle, a wound in ${rivalhis} side. But as the armored warrior approaches, Lu Jin launches ${rivalhis} ji under ${rivalhis} foe's shield, and the foreigner wavers in his saddle.\n                  *goto lujinfight\n                #I tip my blinded opponent from his horse while he is unable to see where the blow comes from.\n                  You dance around the horse's hooves as it moves from side to side and finally get into a position where all it takes from you is a slight push to tip your blinded foe out of his saddle. With both of his arms trying to push up his helmet as he falls, the helmet pops off, though the fall leaves your foe momentarily dazed.\n                  *goto groundgame\n                #I grab the horse's bridle and lead it out of the arena, then join Lu Jin.\n                  You dart out of the way of the horse's hooves, grabbing for the bridle and finally wrenching the horse under your control. As you lead it to the exit, the foreigner talks to you, but you have no idea what he's saying in his own tongue. When you reach the exit, you smack the horse on the rump, and it bolts, taking your opponent with it.\n                  *set opponentout true\n                  *goto lujinfight\n            *else\n              You leap onto the lance and are unable to keep your balance; its point dips to the ground rather than into you, and your opponent loses control of the weapon. \n              *label horsesword\n              He drops the lance and comes back toward you, swinging his sword.\n              *choice\n                #I duck low, out of sword range, and grab for one of his legs to drag him off the horse.\n                  *goto duck\n                #I attack the weakest spot in the horse/rider combination: I trip the horse with the haft of my ji.\n                  *goto trip\n                #I hold my position, then strike upwards with my ji, launching him backwards.\n                  *goto launch\n          #I duck low, weaving out of the way, and grab for one of his legs to drag him off the horse.\n            *label duck\n            This move requires speed and accuracy, and you are confident you have both. You stay low, constantly moving so that you are not a static target, and when he starts to pass you, you latch onto his leg.\n            *if fighting > (70 - advantageModifier)\n\n              You dig in and grit your teeth, pulling backwards as the horse continues forward. Your opponent crashes onto the ground, face first—because you are still holding his leg in the air. You place his armored foot against your hip and crescent-kick over him, flipping him onto his stomach, then kicking into his armor. The technique clearly does not work as well on an armored foe, and he starts to crawl away from you before you finish, but you suspect you have dislocated his knee in the process.\n\t\t\t  \n              You see Lu Jin charge past you and realize that ${rivalhe} is off to ${rivalhis} part of the combat.\n              *set advantageModifier +5\n              *goto groundgame\n            *else\n              You hold on, but rather than pulling him from his horse, his horse pulls you, dragging your legs behind it. Though the arena ground tears at your feet, you keep a hold on the armored foot until something slams into your head from above, and everything goes black.\n\t\t\t  \n              *label unconscious\t\t\t  \n              When you awake, you discover that you were the lucky one: you survived the conflict. Lu Jin, facing two opponents, refused to surrender and was killed. The foreigners are the Imperial Champions, and you are just a monk who lost.\n              *set lujin 0\n              *set tianxia %-15\n              *set status %-10\n              *finish Chapter Eight: The Dragon Sage\n          #I attack the weakest spot in the horse/rider combination: I trip the horse with the haft of my ji.\n            *label trip\n            *if cleverness > (70 - advantageModifier)\n              You have to wait until exactly the right moment to execute your blow. Too soon and the horse will jump; too late, and you'll be run down or run through. You calculate the right angle and the proper moment…\n\t\t\t  \n              And then you strike. The horse, unprepared for its front legs to be taken out from under it, crashes into the ground. The armored warrior flies over the horse's head and crashes into the ground yards ahead of you.\n\t\t\t  \n              Lu Jin charges past on ${rivalhis} horse toward the other end of the field, where the second combat awaits.\n              *set advantageModifier +5\n              *goto groundgame\n            *else\n              You prepare to trip the horse, but you put your ji in place too early. The horse jumps over the haft of your ji, and, when it lands, kicks you from behind. You have a moment of dizziness before darkness steals away your vision.\n\t\t\t  \n              *goto unconscious\n          #I hold my position, then strike upwards with my ji, launching him backwards.\n            *label launch\n            *if tenacity > (70 - advantageModifier)\n              You stand still, breathing deeply and waiting for the moment and the position to come. You deflect his attack, and then you strike, propelling your rooted weight into the armored body, your full weight and force concentrated to the tip of the ji.\n\t\t\t  \n              The blow tosses him out of his saddle and sends him crashing to the ground. Lu Jin's horse charges past behind you, and you realize ${rivalhe} is making ${rivalhis} way to ${rivalhis} part of the combat.\n              *goto groundgame\n            *else\n              You hold your position, but at the last moment have to dodge out of the way of his weapon, unable to hold your block. As your foe charges by, the horse kicks out behind it, sending you flying. You have a moment of dizziness before darkness steals away your vision.\n\t\t\t  \n              *goto unconscious\t\n*label groundgame\n*page_break\nNow that you and your foe are both on the ground, how do you attack?\n\n*choice\n  #I will outlast him. That armor is heavy, and I can dance around him all day.\n    *if tenacity > (60 - advantageModifier)\n      That heavy armor is his biggest disadvantage, and you have trained to move constantly over the course of a day. It takes almost no effort to fade out of the path of his blows. You leave your ji behind to fight with the lighter jian, deflecting his blows and making him attack you over and over again.\n\t  \n      While your opponent is tiring, you notice that Lu Jin's battle is not going as well—${rivalhe} seems to have suffered a wound to the side, but is still fighting.\n      *set advantageModifier +2\n      *choice\n        #I stick with my strategy. My foe will not last much longer.\n          In fact, it takes only a few more moves before your foe is so slow in lifting his sword that you see your opening. You rush in, striking at the shoulder joint with the hilt of your jian, knowing that the shockwaves from the blunt blow will cause him to lose the sword. As his sword falls, he collapses to his knees in front of you.\n\t\t  \n          \"I surrender!\" he cries, removing his helmet.\n\t\t  \n          You bow to your defeated foe and hurry toward the other end of the field.\n          *label dodgethatdagger\n          *if opponentpoison\n            *if magic > (60 - advantageModifier)\n              You shift out of your path almost before you realize why, raising your jian in a block. In slow motion, you see a dagger clang against your blade. As it falls, you see the blade has a dark coating along its edges, and you realize that you were nearly poisoned by the foreigner.\n              *choice\n                #Call out \"Poison!\" and hold the blade up high, hoping the magistrates will halt Lu Jin's battle.\n                  Your shout sends a gasp through the crowd, and Imperial soldiers rush onto the field to apprehend Lu Jin's opponent. You ride your horse back to the position from which you demanded your foe's surrender before, standing over him prepared to kill should he try again to kill you.\n\t\t\t\t\t\t\t\t\n                  \"Use of poison is both illegal in this competition, and dishonorable!\" the magistrate announcer calls out after a moment. \"Both warriors from the foreign lands will hereby be detained until fault can be ascertained. This contest is ended in favor of the Middle Kingdom!\"\n\t\t\t\t\t\t\t\t\n                  A roar goes up from the crowd, and the drums play wildly in rejoicing. You leave your foe in the capable hands of the Imperial soldiers and ride across the field to a wounded Lu Jin. Despite a gash across ${rivalhis} side, ${rivalhe} looks happy to have survived. The Imperial doctor rushes onto the field to inspect the wound, but finds no immediate evidence of poison. You and Lu Jin are once again escorted back to the Imperial palace.\n                  *goto wearethechampions\n                #Throw the dagger back at his unprotected head.\n                  *if fighting > (60 - advantageModifier)\n                    The dagger flies precisely through the air, blade punching into your opponent's cheek. It is a wound he may survive—if the poison coating his blade is not too deadly.\n                    *set opponentdead true\n                    *goto lujinfight\n                  *else\n                    Your throw goes wild, and you leave a falsely surrendered foe on the ground behind you. You would not be surprised to see him back charging toward you and Lu Jin after he takes a moment to recover.\n                    *goto lujinfight\n                #Return and deliver the death blow your opponent deserves.\n                  You march back toward your falsely surrendered foe, and without waiting for him to gather his sword, you stab into his neck. You put your foot on his steel armor and push against him to free your blade, and you do not bother to look back as his body hits the ground.\n                  *goto lujinfight\n            *else\n              As you walk away, you feel a sharp, piercing pain in your right shoulder, and you are shocked to see a dagger protruding from your back. The world wavers in fr
