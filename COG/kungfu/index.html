tates, but agrees to your wishes. He quickly finds a dance partner to occupy his thoughts.\n                          *goto partners\n                        #I don't think Rong Mu is the right choice for me, but I want to formalize my alliance with the Rong family.\n                            You return to Governor Rong and explain that you think you would be happiest if no personal requirements were involved to confirm your alliance.\n                            *goto allies\t\t\t\t  \t\t\t\t  \n                    *else\n                      Though it seems as though Rong Mu would be impressed by your stories, as sheltered as he is, there is something about the way you tell them that makes him uncomfortable. Perhaps you do not live up to the ideals of honor that he has placed on wandering warrior monks.\n                      *label rongmufailure\n                      *set failure +1\n                      *if failure = 2\n                        Rong Mu spends a little more time with you, but soon finds a way to excuse himself, making an effort not to give offense. You are certain that he is not interested in getting to know you any better.\n\t\t\t\t\t\t\n                        What would you like to do?\n                        *choice\n                          #Meet other people. The night is still young!\n                            That's the spirit!\n                            *goto partners\n                          #I think I will ally myself with the Rong family without romantic entanglements.\n                            You return to Governor Rong and explain that you think you would be happiest if no personal requirements were involved to confirm your alliance.\n                            *goto allies\n                          #I don't think I am cut out for romance after all. I return to my house.\n                            *label done\n                            This was a silly exercise of Feng's, and you are just as glad that you can consider the festival over. You make your way home to your quiet courtyard and your comfortable—albeit lonely—bed.\n\t\t\t\t\t\t\t\n                            *goto students\n                      *else\n                        Do you try to win him over another way?\n                        *choice\n                          #Certainly! I will not be deterred by one failure.\n                            Well said. How will you try to change his impression of you?\n                            *goto rongmu\n                          #I don't think Rong Mu is the right choice for me, but I want to formalize my alliance with the Rong family.\n                            You return to Governor Rong and explain that you think you would be happiest if no personal requirements were involved to confirm your alliance.\n                            *goto allies\t\t\t\t  \n                          #I don't think Rong Mu is the right choice for me. I look for someone else.\n                            The two of you part, and Rong Mu quickly finds a dancing partner among the other young people at the festival.\n\t\t\t\t\t\t\t\n                            Who do you seek out?\n                            *goto partners\n                          #I've had enough of the festival. I return to my house.\n                            *goto done\n                  *hide_reuse #I think he will appreciate poetry.\n                    *if enlightened > 80\n                      At first, it doesn't seem as though Rong Mu is interested in poetry. But soon, you show that your skill weaving words together is as accomplished as your skills in the martial arts. He asks where you learned to create poetry, and you explain that you were a student of Master Zhuge. He admits to being only vaguely familiar with the master's poems, and you assure him that you would be happy to help him get further acquainted. \n\t\t\t\t\t  \n                      *goto rongmusuccess\n                    *else\n                      Rong Mu is clearly uninterested in poetry, and your recitations do nothing to improve his opinion. Every attempt falls flat, and the young man begins to look bored.\n\t\t\t\t\t  \n                      *goto rongmufailure\n                  *hide_reuse #I want to see if he can discuss more academic matters.\n                    *if cleverness > 60\n                      Rong Mu is very well educated, and you have read many of the same texts. Occasionally, he introduces a philosophy that you've not heard, and at other times, you refer to ideas it is clear had not previously occurred to him. You mention the library that Master Zhuge has entrusted to you, and his eyes light up like a child who has been promised a fireworks display.\n\t\t\t\t\t  \n                      *goto rongmusuccess\n                    *else\n                      It is quickly clear that Rong Mu is far better read than you are, and he seems unimpressed by your increasingly meager contributions to the conversation.\n\t\t\t\t\t  \n                      *goto rongmufailure\n                  *hide_reuse #While I don't want to display showy \"magic\" at the festival, there are a few tricks I think might be entertaining.\n                    You start to show some simple tricks, which really amount to body mechanics, despite how mystifying they seem. But as soon as you start to discuss concepts of pressure points and chi, Rong Mu turns skeptical.\n\t\t\t\t\t\n                    \"I'd rather not get into anything like 'magic,'\" he says in a bit of a huff. \"It all seems like so much superstitious nonsense to me.\"\n                    *goto rongmufailure\n                  *hide_reuse *if (male = false) #Ask Rong Mu to dance.\n                    *if fighting > 70\n                      Given his upbringing, it is unsurprising that Rong Mu is an accomplished dancer. Though you are hardly accomplished, you find that moving to the rhythms of the musicians, and moving in time with Rong Mu, is not so different from performing a kata to a drum cadence, an exercise you have participated in many times.\n                      *goto rongmusuccess\n                    *else\n                      You had thought that dancing would come easily to you, given its physical nature, but you can't seem to translate from fighting to dancing. Rong Mu is clearly unimpressed with your skills and suggests you both retire from the dancing. He leaves unsaid that he hopes to avoid any further collisions with the other dancers.\n                      *goto rongmufailure\n              *else\n                Governor Rong looks at you crossly. \"I must have misheard you,\" he says. \"I thought you said you wanted to spend time with my son. Such a relationship would be shameful to both of you, and I do not wish to hear any more about it.\"\n\t\t\t\t\n                You must not yet have enough status in the Middle Kingdom to impress Governor Rong.\n\t\t\t\t\n                *choice\n                  #I agree to get to know Rong Niu.\n                    That's very accommodating of you. How do you hope to get to know Rong Niu?\n                    *goto rongniu\n                  #I apologize for the perceived slight. I intended no dishonor, and wish to ally myself to the Rong family without a marriage arrangement.\n                    *label allies\n                    *set imperial true\n                    Governor Rong looks skeptical for a moment, then nods. \"Allies, then,\" he says, bowing.\n\t\t\t\t\t\n                    \"Allies,\" you agree.\n\t\t\t\t\t\n                    You spend the rest of the festival with the Rong family and soon find yourself feeling as though this is where you belong. In the coming weeks, you are a regular feature at the Rong household, and members of the family are regularly seen at your courtyard house. Despite the lack of a formal relationship, your allegiance to the family—and thus, to the Emperor—is clear.\n                    *set status %+20\n                    *goto students\n                  #I wish the Rong family farewell. Perhaps I would be better off connecting with someone else.\n                    Perhaps you would.\n                    *goto partners\n            *else\n              \"Delightful!\" the governor says. At his father's bidding, Rong Mu stands, and the two of you leave the governor and his family to enjoy the festival.\n\t\t\t\t\n              How do you hope to get to know Rong Mu?\n              *goto rongmu\n          *if (romance = \"none\") #I would like to spend some time getting to know Rong Niu.\n            *if male\n              \"Delightful!\" the governor says. At her father's bidding, Rong Niu stands, and the two of you leave the governor and his family to enjoy the festival.\n\t\t\t\n              How do you hope to get to know Rong Niu?\n              *label rongniu\n              *choice\n                *hide_reuse #I hope to impress her with stories about my exploits.\n                  *if honor > 50\n                    Given her sheltered upbringing, Rong Niu is easily impressed by the stories of your training, especially under Master Zhuge, whose legends she knows nearly as well as you do. She adds to the conversation by comparing you with legendary heroes—which is certainly flattering if not (yet) entirely accurate. She has an easy laugh and seems like the type of person who is naturally inclined to be happy.\n\n                    *label rongniusuccess\t\t\t\t\t  \n                    You can tell from the admiring looks she gives you that, though she might not have been inclined to it without your encouragement, she would not be averse to becoming romantically involved with you.\n\t\t\t\t\t\n                    *choice\n                      #I am pleased with how things have gone and will tell Governor Rong I find Rong Niu to be a suitable companion.\n                        *set status %+20\n                        *set romance \"Rong Niu\"\n                        *if male = false\n                          At the end of the evening, you announce your intentions to Governor Rong, and it is soon arranged for Rong Niu to take up residence at your home. \n\t\t\t\t\n                          You thank Feng for her guidance in this matter—certainly, you will no longer be so lonely, and Rong Niu is an excellent, upbeat addition to your household.\n                          *set imperial true\n                          *goto students\n                        *else\n                          It seems as though in no time, a wedding is arranged. You had never expected to be a husband, but here you are, married to the daughter of a governor. Rong Niu soon moves into your home, and the place is no longer quite so lonely as it was. Rong Niu's cheerful and upbeat attitude brightens the house, and you thank Feng for her guidance in this matter.\n                          *set imperial true\n                          *goto students\n                      #I am not ready to commit to a romantic relationship, despite my growing fondness for Rong Niu.\n                        You hesitate, suggesting that you and Rong Niu part ways, perhaps finding each other later during the festival. Your hesitation, however, may cost you, as you see her immediately join a group of well-dressed young people and accept the hand of one of the men for a dance.\n                        *goto partners\n                      #I do not think that Rong Niu is a good match for me.\n                        You politely extract yourself from your conversation and suggest that you each go your separate ways through the festival. Rong Niu hesitates, but agrees to your wishes. She quickly finds a dance partner to occupy her thoughts.\n                        *goto partners\n                      #I don't think Rong Niu is the right choice for me, but I want to formalize my alliance with the Rong family.\n                          You return to Governor Rong and explain that you think you would be happiest if no personal requirements were involved to confirm your alliance.\n                          *goto allies\t\t\t\t  \n                  *else\n                    Though it seems as though Rong Niu would be impressed by your stories, as sheltered as she is, there is something about the way you tell them that makes her uncomfortable. Perhaps you do not live up to the ideals of honor that she has placed on wandering warrior monks.\n                    *label rongniufailure\n                    *set failure +1\n                    *if failure = 2\n                      Rong Niu spends a little more time with you, but soon finds a way to excuse herself, making an effort not to give offense. You are certain that she is not interested in getting to know you any better.\n\t\t\t\t\t\n                      What would you like to do?\n                      *choice\n                        #Meet other people. The night is still young!\n                          That's the spirit!\n                          *goto partners\n                        #I don't think I am cut out for romance after all. I return to my house.\n                          *goto done\n                        #I think I will ally myself with the Rong family without romantic entanglements.\n                          You return to Governor Rong and explain that you think you would be happiest if no personal requirements were involved to confirm your alliance.\n                          *goto allies\n                    *else\n                      Do you try to win her over another way?\n                      *choice\n                        #Certainly! I will not be deterred by one failure.\n                          Well said. How will you try to change her impression of you?\n                          *goto rongniu\n                        #I don't think Rong Niu is the right choice for me, but I want to formalize my alliance with the Rong family.\n                          You return to Governor Rong and explain that you think you would be happiest if no personal requirements were involved to confirm your alliance.\n                          *goto allies\t\t\t\t  \n                        #I don't think Rong Niu is the right choice for me. I'll look for someone else.\n                          The two of you part, and Rong Niu quickly finds a dancing partner among the other young people at the festival.\n\t\t\t\t\t\t\n                          Who do you seek out?\n                          *goto partners\n                        #I've had enough of the festival. I return to my house.\n                          *goto done\n                *hide_reuse #I think she will appreciate poetry.\n                    *if enlightened > 70\n                      At first, it doesn't seem as though Rong Niu is interested in poetry. But soon, you show that your skill weaving words together is as accomplished as your skills in the martial arts. She asks where you learned to create poetry, and you explain that you were a student of Master Zhuge. She admits to being only vaguely familiar with the master's poems, and you assure her that you would be happy to help her get further acquainted. \n\t\t\t\t\t  \n                      *goto rongniusuccess\n                    *else\n                      Rong Niu is clearly uninterested in poetry, and your recitations do nothing to improve her opinion. Every attempt falls flat, and the young woman begins to look clearly bored.\n\t\t\t\t\t  \n                      *goto rongniufailure\n                *hide_reuse #I want to see if she can discuss more academic matters.\n                    *if cleverness > 60\n                      Rong Niu is very well educated, and you have read many of the same texts. Occasionally, she introduces a philosophy that you've not heard, and at other times, you refer to ideas it is clear had not previously occurred to her. You mention the library that Master Zhuge has entrusted to you, and her eyes light up like a child who has been promised a fireworks display.\n\t\t\t\t\t  \n                      *goto rongniusuccess\n                    *else\n                      It is quickly clear that Rong Niu is far better read than you are, and she seems unimpressed by your increasingly meager contributions to the conversation.\n\t\t\t\t\t  \n                      *goto rongniufailure\n                *hide_reuse #While I don't want to display showy \"magic\" at the festival, there are a few tricks I think might be entertaining.\n                    You start to show some simple tricks, which really amount to body mechanics, despite how mystifying they seem. But as soon as you start to discuss concepts of pressure points and chi, Rong Niu turns skeptical.\n\t\t\t\t\t\n                    \"I'd rather not get into anything like 'magic,'\" she says in a bit of a huff. \"It all seems like so much superstitious nonsense to me.\"\n                    *goto rongniufailure\n                *hide_reuse *if (male) #Ask Rong Niu to dance.\n                    *if fighting > 70\n                      Given her upbringing, it is unsurprising that Rong Niu is an accomplished dancer. Though you are hardly accomplished, you find that moving to the rhythms of the musicians, and moving in time with Rong Niu, is not so different from performing a kata to a drum cadence, an exercise you have participated in many times.\n                      *goto rongniusuccess\n                    *else\n                      You had thought that dancing would come easily to you, given its physical nature, but you can't seem to translate from fighting to dancing. Rong Niu is clearly unimpressed with your skills and suggests you both retire from the dancing. She leaves unsaid that she hopes to avoid any further collisions with the other dancers.\n                      *goto rongniufailure\n\n            *else\n              *set status %+5\n              *if status > 60\n                Governor Rong looks momentarily shocked. \"Perhaps you misunderstood me. I was thinking in terms of marriage, good monk.\"\n\n                \"I am not interested in marriage,\" you say politely. \"It would be a boon to have a companion, however, and no less important to me than a formal tie through marriage.\"\n\t\t\t\t\n                The governor still looks skeptical, but clearly he values your status highly enough to brush off those concerns. \"Well then,\" he says, \"I suggest you get to know each other better. Go out and enjoy the festival, and see if you can become…companions.\"\n\t\t\t\t\n                At her father's bidding, Rong Niu stands, and the two of you leave the governor and his family to enjoy the festival.\n\t\t\t\n                How do you hope to get to know Rong Niu?\n                *goto rongniu\n              *else\n                Governor Rong looks at you crossly. \"I must have misheard you,\" he says. \"I thought you said you wanted to spend time with my daughter. Such a relationship would be shameful to both of you, and I do not wish to hear any more about it.\"\n\t\t\t\t\n                You must not have enough status yet in the Middle Kingdom to impress Governor Rong.\n\t\t\t\t\n                *choice\n                  #I agree to get to know Rong Mu.\n                    That's very accommodating of you. How do you hope to get to know Rong Mu?\n                    *goto rongmu\n                  #I apologize for the perceived slight. I intended no dishonor, and wish to ally myself to the Rong family without a marriage arrangement.\n                    *goto allies\n                  #I wish the Rong family farewell. Perhaps I would be better off connecting with someone else.\n                    Perhaps you would.\n                    *goto partners\n          #I appreciate the offer, but am not interested in marriage. I would be glad of an alliance, however.\n            *goto allies\n          *if (romance = \"Feng\") #I appreciate the offer but explain that I am already involved with someone else. I am glad of an alliance, however.\n            *goto allies\n          #I decline an alliance with the family as gracefully as I can, hoping the governor will still speak well of me.\n            The governor looks disappointed, and you can tell that he will not sing your praises, but he will certainly make it known that a wandering monk has settled in his community.\n            *goto partners\n      #Actually, I am concerned with the Emperor's policy on the foreigners in the Middle Kingdom.\n        Governor Rong looks aghast. \"It is not for us to question the will of the Son of Heaven,\" he says sharply. \"Perhaps you would be better off discussing your concerns elsewhere, monk.\"\n\t\t\n        It is clear you have been uninvited from conversation with the Rong family.\n\t\t\n        Who will you seek out next?\n        *goto partners\n      #I believe I can best serve the Middle Kingdom by making my home into a school.\n        \"What a fine idea,\" Governor Rong says. He looks over his shoulder at his eldest son. \"What did I tell you? I think this monk will make a fine addition to our community.\"\n\t\t\n        The governor turns back to you. \"I admit I had something more…personal in mind, ${name}.\"\n\t\t\n        *goto rongromance\n  *hide_reuse *if (readletter2) #I want to seek out Deng Ping, the leader of the Blue Scarves Rebellion.\n    With Feng's help, you find Deng Ping in the crowd. The huge rebel leader towers over most of the villagers, though this evening, no one seems to recognize differences in size or class or ability, in the spirit of good will. Deng Ping bows deeply to you, and you return a polite bow.\n\t\n    \"Welcome to Kuei Xian,\" the big man says. \"Have you given thought to whether you would be willing to lend some aid to my people?\"\n\t\n    Very cautiously, Deng Ping explains what he hopes to receive from you: training in the martial arts for rebel soldiers and a safe haven in Kuei Xian, should such a thing be needed. He once again expresses his concerns about foreigners. If you would like to formalize the arrangement, he mentions that a wedding is possible.\n\t\n    As Deng Ping lays out his ideas, you notice a young man and a young woman, both around your age and thus older than people are typically married, are hovering nearby, listening to the conversation. Both have the look of people who have seen much hardship but borne it well.\n    *choice\n      #I am happy to give my aid to the rebellion, but prefer to avoid any further discussion of marriage.\n        *label rebelalliance\n        *set tianxia %+15\n        *set honor %-10\n        *set rebel true\n        Deng Ping looks somewhat relieved, and you can tell that he was unsure about the idea of arranging a marriage with a wandering monk.\n\n        \"Thank you, ${name},\" he says with another bow. \"I will begin sending you students within the month.\"\n\t\t\n        Do you wish to seek out anyone else?\n        *goto partners\n      #I am afraid that as a loyal servant of the Emperor, I cannot agree to help the rebellion, despite my sympathy for their plight.\n        *set tianxia %-5\n        *set honor %+10\n        Deng Ping cools noticeably and wishes you a good night.\n\t\t\n        Do you wish to seek out anyone else?\n        *goto partners\n      *if (romance = \"none\") #I would like to be introduced to Deng Ping's son.\n        *if male\n          *set tianxia %+10\n          *if tianxia > 60\n            Deng Ping frowns. \"I am uncertain how things are done among monks,\" he says slowly, \"but I am fairly certain that a wedding would not encompass such a relationship.\"\n\n            \"I am not interested in marriage,\" you say politely. \"It would be a boon to have a companion, however, and no less important to me than a formal tie through marriage.\"\n\t\t\t\t\n            Deng Ping relaxes at the word \"companion,\" clearly dismissing the romantic possibilities from his mind.\n            *label dengquon\n\n            \"This is my son, Deng Quon,\" he says, beckoning to his son. The young man greets you with a bow. \"Go out and enjoy the festival, and see if you can get to know each other better.\"\n\t\t\t\t\n            The two of you leave Deng Ping on his own to enjoy the festival.\n\t\t\t\t\n            How do you hope to get to know Deng Quon?\n            *label dengquonchoice\n            *choice\n              *hide_reuse #I hope to impress him with stories about my exploits.\n                *if honor > 70\n                  At first, you are afraid you have made a mistake in talking about your adventures, given Deng Quon's hesitant expression as you begin your storytelling. But soon, you discover that Quon has as many stories as you have, particularly about his time fighting against the foreign invaders. You begin exchanging stories and find that you have much in common.\n                  *label quonsuccess\t\t\t\t\t  \n                  You can tell from the admiring looks he gives you that, though he might not have been inclined to it without your encouragement, he would not be averse to becoming romantically involved with you.\n\t\t\t\t\t\n                  *choice\n                    #I am pleased with how things have gone and return to tell Deng Ping that I find Quon to be a suitable companion.\n                      *set romance \"Deng Quon\"\n                      *set rebel true\n                      *set tianxia %+10\n                      *if male\n                        At the end of the evening, you announce your intentions to Deng Ping, and it is soon arranged for Deng Quon to take up residence at your home. \n\t\t\t\t\t\t\n                        You thank Feng for her guidance in this matter—certainly, you will no longer be so lonely, and though Deng Quon is on the whole a quiet spirit, just the fact that he is present lessens the feeling of solitude that once draped your house.\n                        *goto students\n                      *else\n                        It seems as though in no time, a wedding is arranged. You had never expected to be a bride, after a simple ceremony among outlaws and bandits, it is accomplished. Though it is not traditional, given the situation, Deng Quon soon moves into your home, and the place is no longer quite so lonely as it was. Deng Quon's silent strength buoys your spirit, and you thank Feng for her guidance in this matter.\n                        *goto students\n                    #I am not ready to commit to a romantic relationship, despite my growing fondness for Deng Quon.\n                      You hesitate, suggesting that you and Deng Quon part ways, perhaps finding each other later during the festival. Your hesitation, however, may cost you, as you see him immediately join a group of other young people and ask one of the women to dance.\n                      *goto partners\n                    #I do not think that Deng Quon is a good match for me.\n                      You politely extract yourself from your conversation and suggest that you each go your separate ways through the festival. Deng Quon hesitates, but agrees to your wishes. He quickly finds a dance partner to occupy his thoughts.\n                      *goto partners\n                    #I don't think Deng Quon is the right choice for me, but I want to formalize my alliance with the Blue Scarves Rebellion.\n                      You return to Deng Ping and explain that you think you would be happiest if no personal requirements were involved to confirm your alliance.\n                      *goto rebelalliance\t\t\t\t  \t\t\t\t  \n                *else\n                  It doesn't take long for you to realize that Deng Quon has been through enough adventures of his own to find yours unimpressive. While you have formal training, Deng Quon has faced real battles against foreigners. He seems to feel that your exploits are frivolous in the face of the hardships his people have seen.\n                  *label quonfail\n                  *set failure +1\n                  *if failure = 2\n                    Deng Quon spends a little more time with you, but soon finds a way to excuse himself, making an effort not to give offense. You are certain that he is not interested in getting to know you any better.\n\t\t\t\t\t\t\n                    What would you like to do?\n                    *choice\n                      #Meet other people. The night is still young!\n                        That's the spirit!\n                        *goto partners\n                      #I think I will ally myself with the Blue Scarves Rebellion without romantic entanglements.\n                        You return to Deng Ping and explain that you think you would be happiest if no personal requirements were involved to confirm your alliance.\n                        *goto rebelalliance\n                      #I don't think I am cut out for romance after all. I return to my house.\n                        *goto done\n                  *else\n                    Do you try to win him over another way?\n                    *choice\n                      #Certainly! I will not be deterred by one failure.\n                        Well said. How will you try to change his impression of you?\n                        *goto dengquonchoice\n                      #I don't think Deng Quon is the right choice for me, but I want to formalize my alliance with the Blue Scarves Rebellion.\n                        You return to Deng Ping and explain that you think you would be happiest if no personal requirements were involved to confirm your alliance.\n                        *goto rebelalliance\t\t\t\t  \n                      #I don't think Deng Quon is the right choice for me. I look for someone else.\n                        The two of you part, and Deng Quon quickly finds a dancing partner among the other young people at the festival.\n\t\t\t\t\t\t\t\n                        Who do you seek out?\n                        *goto partners\n                      #I've had enough of the festival. I return to my house.\n                        *goto done\n              *hide_reuse #I think he will appreciate poetry.\n                *if enlightened > 60\n                  You have a great love of poetry, so you were sure that a fellow warrior would also harbor an appreciation for the insight offered by poetic language. Sure enough, Deng Quon has also tried his hand at poetry, though he admits that he finds yours superior to his own. You recommend that he read some of the works you have in your library by Master Zhuge, and he grins, saying that he would love to see them.\n\t\t\t\t\t  \n                  *goto quonsuccess\n                *else\n                  Though it is clear that Deng Quon has an appreciation for poetry, your efforts tonight are not at their best. Every attempt falls flat, and Deng Quon begins to look bored.\n\t\t  \n                  *goto quonfail\n              *hide_reuse #I want to see if he can discuss more academic matters.\n                Deng Quon stops you short before you can even begin discussing philosophy. \"You do realize that people are losing their homes—or dying trying to defend them?\" he says sternly. \"Who has time to philosophize on the nature of the universe? Our minds should be on the here and now, concentrating on what is in front of us.\"\n                *goto quonfail\n              *hide_reuse #While I don't want to display showy \"magic\" at the festival, there are a few tricks I think might be entertaining.\n                *if magic > 50\n                  Your plan was just to show a few quick tricks you have learned—the type that dazzle without really doing anything substantial—but you quickly realize that Deng Quon is fascinated by what you can accomplish. You show him how a combination of body mechanics and chi flow allow a person to push down an opponent's extended arm without effort, and how the opponent can root himself so that his arm is stable. Quon asks for one demonstration after another, all using him as the model, so that he can feel as though he is doing \"magic\" himself.\n\t\t\t\t\t  \n                  His enthusiasm is catching, and you have a feeling that, given time, you could teach him how he could accomplish even greater feats.\n                  *goto quonsuccess\n                *else\n                  Your plan was to show a few tricks that you have learned—the type that dazzle without really doing anything substantial—but you find that the crowd has made you lose your concentration. Every trick fails, despite the fact that most are based on body mechanics rather than any real secret techniques. Deng Quon is unimpressed.\n                  *goto quonfail\n              *hide_reuse *if (male = false) #Ask Deng Quon to dance.\n                *if fighting > 70\n                  Deng Quon clearly has no formal dance training, but he moves like someone who has been dancing with the joy of it for his entire life. Though you are hardly accomplished, you find that moving to the rhythms of the musicians, and moving in time with Deng Quon, is not so different from performing a kata to a drum cadence, an exercise you have participated in many times.\n                  *goto quonsuccess\n                *else\n                  You had thought that dancing would come easily to you, given its physical nature, but you can't seem to translate from fighting to dancing. Deng Quon is no accomplished dancer himself, but he seems frustrated by your lack of coordination, and suggests you both get out of the way of the people who know what they're doing.\n                  *goto quonfail\n          *else\n            Deng Ping shakes his head. \"I don't know how it is for monks,\" he says, \"but the suggestion of that kind of relationship among my people is dishonorable. No matter how much we need your help, or how much I believe you are blessed by the Heavens, I cannot allow such a thing.\"\n\t\t\t\n            Clearly, though Deng Ping acknowledges your relationship to restoring the balance of tianxia, you have not tipped that balance enough to make him reconsider his traditional views.\n\t\t\t\t\n            *choice\n              #I agree to get to know Deng Ping's daughter.\n                That's very accommodating of you. Deng Ping eyes you warily, but introduces you to his daughter, Qiao. How do you hope to get to know Deng Qiao?\n                *goto dengqiaochoice\n              #I apologize for the perceived slight. I intended no dishonor, and wish to ally myself to the Blue Scarves Rebellion without a marriage arrangement.\n                *goto rebelalliance\n              #I wish the Deng family farewell. Perhaps I would be better off connecting with someone else.\n                Perhaps you would.\n                *goto partners\n        *else\n          *goto dengquon\n      *if (romance = \"none\") #I would like to be introduced to Deng Ping's daughter.\n        *if male\n          *label dengqiao\n          \"This is my daughter, Deng Qiao,\" he says, beckoning to his daughter. The young woman greets you with a bow. \"Go out and enjoy the festival, and see if you can get to know each other better.\"\n\t\t\t\t\n          The two of you leave Deng Ping on his own to enjoy the festival.\n\t\t\t\t\n          How do you hope to get to know Deng Qiao?\n          *label dengqiaochoice\n          *choice\n            *hide_reuse #I hope to impress her with stories about my exploits.\n              *if honor > 70\n                At first, you are afraid you have made a mistake in talking about your adventures, given Deng Qiao's hesitant expression as you begin your storytelling. But soon, you discover that Qiao has as many stories as you have, particularly about her time fighting against the foreign invaders. You begin exchanging stories and find that you have much in common.\n                *label qiaosuccess\n\t\t\t\t\t  \n                You can tell from the admiring looks she gives you that, though she might not have been inclined to it without your encouragement, she would not be averse to becoming romantically involved with you.\n\t\t\t\t\t\n                *choice\n                  #I am pleased with how things have gone and return to tell Deng Ping that I find Qiao to be a suitable companion.\n                    *set tianxia %+20\n                    *set rebel true\n                    *set romance \"Deng Qiao\"\n                    *if male = false\n                      At the end of the evening, you announce your intentions to Deng Ping, and it is soon arranged for Deng Qiao to take up residence at your home. \n\t\t\t\t\t\t\n                      You thank Feng for her guidance in this matter—certainly, you will no longer be so lonely, and though Deng Qiao is on the whole a quiet spirit, just the fact that she is present lessens the feeling of solitude that once draped your house.\n                      *goto students\n                    *else\n                      It seems as though in no time, a wedding is arranged. You had never expected to be a husband, but after a simple ceremony among outlaws and bandits, you bring home a wife. Deng Qiao soon moves into your home, and the place is no longer quite so lonely as it was. Deng Qiao's quiet strength and easy laughter brighten the house, and you thank Feng for her guidance in this matter.\n                      *goto students\n                  #I am not ready to commit to a romantic relationship, despite my growing fondness for Deng Qiao.\n                    You hesitate, suggesting that you and Deng Qiao part ways, perhaps finding each other later during the festival. Your hesitation, however, may cost you, as you see her immediately join a group of other young people and accept the hand of one of the men for a dance.\n                    *goto partners\n                  #I do not think that Deng Qiao is a good match for me.\n                    You politely extract yourself from your conversation and suggest that you each go your separate ways through the festival. Deng Qiao hesitates, but agrees to your wishes. She quickly finds a dance partner to occupy her thoughts.\n                    *goto partners\n                  #I don't think Deng Qiao is the right choice for me, but I want to formalize my alliance with the Blue Scarves Rebellion.\n                      *goto rebelalliance\n              *else\n                It doesn't take long for you to realize that Deng Qiao has been through enough adventures of her own to find yours unimpressive. While you have formal training, Deng Qiao has faced real battles against foreigners. She seems to feel that your exploits are frivolous in the face of the hardships her people have seen.\n                *label qiaofail\n                *set failure +1\n                *if failure = 2\n                  Deng Qiao spends a little more time with you, but soon finds a way to excuse herself, making an effort not to give offense. You are certain that she is not interested in getting to know you any better.\n\t\t\t\t\t\t\n                  What would you like to do?\n                  *choice\n                    #Meet other people. The night is still young!\n                      That's the spirit!\n                      *goto partners\n                    #I don't think I am cut out for romance after all. I return to my house.\n                      *goto done\n                    #I think I will ally myself with the Blue Scarves Rebellion without romantic entanglements.\n                      You return to Deng Ping and explain that you think you would be happiest if no personal requirements were involved to confirm your alliance.\n                      *goto rebelalliance\n                *else\n                  Do you try to win her over another way?\n                  *choice\n                    #Certainly! I will not be deterred by one failure.\n                      Well said. How will you try to change her impression of you?\n                      *goto dengqiaochoice\n                    #I don't think Deng Qiao is the right choice for me, but I will ally myself with the Blue Scarves Rebellion without romantic entanglements.\n                        You return to Deng Ping and explain that you think you would be happiest if no personal requirements were involved to confirm your alliance.\n                        *goto rebelalliance\n                    #I don't think Deng Qiao is the right choice for me. I'll look for someone else.\n                      The two of you part, and Deng Qiao quickly finds a dancing partner among the other young people at the festival.\n\t\t\t\t\t\t\t\n                      Who do you seek out?\n                      *goto partners\n                    #I've had enough of the festival. I return to my house.\n                      *goto done\n            *hide_reuse #I think she will appreciate poetry.\n                *if enlightened > 60\n                  You have a great love of poetry, so you were sure that a fellow warrior would also harbor an appreciation for the insight offered by poetic language. Sure enough, Deng Qiao has also tried her hand at poetry, though she admits that she finds yours superior to her own. You recommend that she read some of the works you have in your library by Master Zhuge, and she grins, saying that she would love to see them.\n\t\t\t\t\t  \n                  *goto qiaosuccess\n                *else\n                  Though it is clear that Deng Qiao has an appreciation for poetry, your efforts tonight are not at their best. Every attempt falls flat, and Deng Qiao begins to look bored.\n\t\t  \n                  *goto qiaofail\n            *hide_reuse #I want to see if she can discuss more academic matters.\n                Deng Qiao stops you short before you can even begin discussing philosophy. \"You do realize that people are losing their homes—or dying trying to defend them?\" she says sternly. \"Who has time to philosophize on the nature of the universe? Our minds should be on the here and now, concentrating on what is in front of us.\"\n                *goto qiaofail\n            *hide_reuse #While I don't want to display showy \"magic\" at the festival, there are a few tricks I think might be entertaining.\n                *if magic > 50\n                  Your plan was just to show a few quick tricks you have learned—the type that dazzle without really doing anything substantial—but you quickly realize that Deng Qiao is fascinated by what you can accomplish. You show her how a combination of body mechanics and chi flow allow a person to push down an opponent's extended arm without effort, and how the opponent can root herself so that her arm is stable. Qiao asks for one demonstration after another, all using her as the model, so that she can feel as though she is doing \"magic\" herself.\n\t\t\t\t\t  \n                  Her enthusiasm is catching, and you have a feeling that, given time, you could teach her how she could accomplish even greater feats.\n                  *goto qiaosuccess\n                *else\n                  Your plan was to show a few tricks that you have learned—the type that dazzle without really doing anything substantial—but you find that the crowd has made you lose your concentration. Every trick fails, despite the fact that most are based on body mechanics rather than any real secret techniques. Deng Qiao is unimpressed.\n                  *goto qiaofail\n            *hide_reuse *if (male) #Ask Deng Qiao to dance.\n                *if fighting > 70\n                  Deng Qiao clearly has no formal dance training, but she moves like someone who has been dancing with the joy of it for her entire life. Though you are hardly accomplished, you find that moving to the rhythms of the musicians, and moving in time with Deng Qiao, is not so different from performing a kata to a drum cadence, an exercise you have participated in many times.\n                  *goto quonsuccess\n                *else\n                  You had thought that dancing would come easily to you, given its physical nature, but you can't seem to translate from fighting to dancing. Deng Qiao is no accomplished dancer herself, but she seems frustrated by your lack of coordination, and suggests you both get out of the way of the people who know what they're doing.\n                  *goto qiaofail\n        *else\n          *set tianxia %+5\n          *if tianxia > 60\n            Deng Ping frowns. \"I am uncertain how things are done among monks,\" he says slowly, \"but I am fairly certain that a wedding would not encompass such a relationship.\"\n\n            \"I am not interested in marriage,\" you say politely. \"It would be a boon to have a companion, however, and no less important to me than a formal tie through marriage.\"\n\t\t\t\t\n            Deng Ping relaxes at the word \"companion,\" clearly dismissing the romantic possibilities from his mind.\n\t\t\t\n            *goto dengqiao\n          *else\n            Deng Ping shakes his head. \"I don't know how it is for monks,\" he says, \"but the suggestion of that kind of relationship among my people is dishonorable. No matter how much we need your help, or how much I believe you are blessed by the Heavens, I cannot allow such a thing.\"\n\n            Clearly, though Deng Ping acknowledges your relationship to restoring the balance of tianxia, you have not tipped that balance enough to make him reconsider his traditional views.\t\t  \n            *choice\n              #I agree to get to know Deng Ping's son.\n                That's very accommodating of you. Deng Ping eyes you warily, but introduces you to his son, Quon. How do you hope to get to know Deng Quon?\n                *goto dengquonchoice\n              #I apologize for the perceived slight. I intended no dishonor, and wish to ally myself to the Blue Scarves Rebellion without a marriage arrangement.\n                *goto rebelalliance\n              #I wish the Deng family farewell. Perhaps I would be better off connecting with someone else.\n                Perhaps you would.\n                *goto partners\n\n  *hide_reuse *if ((romance = \"none\") and (readletter3)) #I ask Feng to point out the Han family.\n    Feng introduces you to the Han family, who are delighted that you have sought them out. Han Bei does not bother to reiterate the family's hardships, but instead introduces you to his daughter Kiew and his son Kang.\n\t\n    \"Both of them are good workers,\" he promises.\n    *label hanfamily\n    *choice\n      #I would like to help the family by offering them a place to stay in my servants' quarters if they are willing to repair them—no strings attached.\n        Han Bei's jaw drops, and his wife bursts into tears. \"Thank you, thank you, kind monk!\" he says, bowing low. \"Your generosity exceeds everything we had expected!\"\n\t\t\n        Though you are sure this is not what Feng had in mind, you are glad that the house will not be so lonely, and that the Han family will have a place to stay. Some of the family's younger children seem eager to learn the martial arts as well, and you think they could number among your first students.\n        *set enlightened %+10\n        *set honor %+10\n        *set disciples +2\n\n        Do you seek out anyone else before leaving the festival?\n        *goto partners\n      #I would be happy to offer both Kiew and Kang positions at my home, and will pay them well enough to help support the family.\n        Master Zhuge left you plenty of supplies, and you think that you can support two servants for a while. Once you have students whose families, ideally, pay for their training, you will be able to afford to keep them on afterward.\n\t\t\n        The Han family is extremely grateful; you have relieved their burden and helped them think toward the future instead of worrying about the present.\n        *set enlightened %+10\n        *set honor %+10\n\t\t\n        Do you seek out anyone else before leaving the festival?\n        *goto partners\n      *hide_reuse #I am interested in getting to know Kiew.\n        Han Kiew is as beautiful as Feng promised, and, after spending some time talking with her, you find that she has a delightful sense of humor. She would be a delightful companion, though she will never feel your equal, nor will she ever have your level of skill.\n        *choice\n          #I sense a spark here. I decide to ask Han Bei to formalize our arrangement through my relationship to Kiew.\n            *if male\n              Han Bei is delighted that you have chosen to marry his daughter. There is hardly a ceremony at all, but you are soon a husband to a charming, if shy, bride. You find she is adept at managing a household, and soon she and Feng are thick as thieves. This would concern you, but Kiew always has a smile on her face, so you suppose there isn't any harm.\n              *set romance \"Han Kiew\"\n              *goto students\n            *else\n              *if honor > 50\n                Han Bei is happy to send his daughter to a better life, even if it is an untraditional one. You find that Kiew, who is charming, if shy, is quite adept at managing a household. Soon she and Feng are thick as thieves. This would concern you, but Kiew always has a smile on her face, so you suppose there isn't any harm.\n                *goto students\n              *else\n                Though poor, Han Bei has pride in his family and their traditions, and he cannot give his blessing to such a relationship. \"Perhaps you would prefer to get to know my son? Or offer a more professional relationship?\" he offers.\n\t\t\t\t\n                You can see that he is not fully confident that you are honorable enough to make a nontraditional relationship work.\n                *goto hanfamily\n          #I think Kiew would make an excellent servant, but not a romantic partner.\n            Kiew's attitude about your difference in status means she could never be more than a servant to you in her own mind. Recognizing that difference, you offer her a position as a servant, which she readily and cheerfully accepts. You will easily be able to afford to pay her well enough to help support her family for some time; once you begin to take on students, ideally their families will pay for their training, and you will be able to continue to afford her.\n\t\t\t\n            Do you seek out anyone else before leaving the festival?\n            *goto partners\n          #I don't think Kiew is right for me, and I do not think I can help the Han family.\n            Han Bei is clearly disappointed. \"I thought the Order of the Peach Tree would be more generous with those of us in need,\" he growls. He and his family wander off into the festival and soon disappear into the crowd.\n\t\t\t\n            Do you seek out anyone else before leaving the festival?\n            *goto partners\n      *hide_reuse #I am interested in getting to know Kang.\n        As Feng said, Han Kang does not have a pretty face, but he moves well and has a great deal of untapped strength. Though his humor is coarse, you see that, under your tutelage, he might become a martial artist.\n        *choice\n          #I sense a spark here. I decide to ask Han Bei to formalize our arrangement through my relationship to Kang.\n            *if male = false\n              Han Bei is delighted that you have chosen to marry his son. There is hardly a ceremony at all, but you are soon a wife to a funny, if rough around the edges, husband. He is eager to put himself to work repairing problems with the house, and you find he is a fine companion to work beside.\n              *set romance \"Han Kang\"\n              *goto students\n            *else\n              *if honor > 50\n                Han Bei is happy to send his son to a better life, even if it is an untraditional one. Kang is a funny, if rough around the edges, companion, who is eager to put himself to work repairing problems with the house. You find he is a fine companion to work beside.\n                *set romance \"Han Kang\"\n                *goto students\n              *else\n                Though poor, Han Bei has pride in his family and their traditions, and he cannot give his blessing to such a relationship. \"Perhaps you would prefer to get to know my daughter? Or offer a more professional relationship?\" he offers.\n\t\t\t\t\n                You can see that he is not fully confident that you are honorable enough to make a nontraditional relationship work.\n                *goto hanfamily\n          #I think Kang would make an excellent servant, but not a romantic partner.\n            Kang's attitude about your difference in status means he could never be more than a servant to you in his own mind. Recognizing that difference, you offer him a position as a servant, which he readily and cheerfully accepts. You will easily be able to afford to pay him well enough to help support his family for some time; once you begin to take on students, ideally their families will pay for their training, and you will be able to continue to afford him.\n\t\t\t\n            Do you seek out anyone else before leaving the festival?\n            *goto partners\n          #I don't think Kang is right for me, and I do not think I can help the Han family.\n            Han Bei is clearly disappointed. \"I thought the Order of the Peach Tree would be more generous with those of us in need,\" he growls. He and his family wander off into the festival and soon disappear into the crowd.\n\t\t\t\n            Do you seek out anyone else before leaving the festival?\n            *goto partners\n  *hide_reuse *if (lujineligible) #I look for Lu Jin in the crowd.\n    *set suit \"Lu Jin\"\n    It is clear from the expression on ${rivalhis} face when ${rivalhe} sees you that Lu Jin has been looking for you as well. Side by side, the two of you walk through the festival, once again beginning the conversation by talking about small things. You find that your rapport is just as congenial as it was at breakfast.\n\n    But soon, Lu Jin turns serious. \"${name}, you know that I am still with the Blue Scarves Rebellion,\" ${rivalhe} says quietly, letting the words be eaten up by the noise of the revelry. \"The truth is that we could use your help. I am gone on missions more often than I was, and have been better used leading battles than training our soldiers for fighting. We need someone willing to train our people—and a safe haven in Kuei Xian, should anything happen. I don't want to take advantage of our past, but the truth is, we could use you as an ally to our cause.\n    *choice\n      #I believe the Middle Kingdom is out of balance with the Heavens. I would be glad to help Lu Jin and the Rebellion.\n        *set tianxia %+20\n        *label joinup\n        *set rebel true\n        *set lujin %+15\n        Lu Jin looks relieved. \"I can't tell you what good news this is,\" ${rivalhe} says, placing a hand on your shoulder. $!{rivalhe} leaves it there, just a little longer than necessary, and you shiver. \"I will tell Deng Ping to begin sending students to you.\"\n\n        \"You'll tell him after the festival, I hope,\" you say.\n\n        Lu Jin smiles, and the excited energy with which ${rivalhe} greeted your news calms into something more personal. \"Yes. It can wait the night. And I would like to spend more time with you.\"\n\t\t\n        \"Shall we get some food?\" you suggest.\n        *goto banquet\n      #I am still not interested in political matters, but I will help if it makes Lu Jin happy.\n        *set tianxia %+10\n        *goto joinup\n      #I am hesitant to openly oppose the Son of Heaven. Surely convincing the Emperor of the threat of the foreigners would be better than open war.\n        *set tianxia %+10\n        *set lujin %-15\n        Lu Jin sighs. \"You sound like Abbot Bao,\" ${rivalhe} says. \"That was always ${rivalhis} excuse for not getting involved when I questioned him. But ${name}, people's lives are being taken from them—sometimes quite literally. If the Emperor doesn't defend the people, who will?\"\n        *choice\n          #I will gain enough status so that the Emperor will listen to me one day.\n            Lu Jin just shakes ${rivalhis} head. \"We just can't wait that long, ${name}.\" \n\t\t\t\n            *label partways\n            $!{rivalhe} looks over ${rivalhis} shoulder and seems to spot someone in the crowd. \"Perhaps we should part ways here, and think on each other as friends.\"\n            *choice\n              #No! If it is that important to Lu Jin, I will offer my help.\n                *goto joinup\n              #Perhaps we should.\n                *label perhaps\n                You bow to each other and say farewell. As you watch Lu Jin's back disappear into the crowd, you can't help but wonder whether things might have been different if you'd met in less interesting times.\n\t\t\t\t\n                Do you seek out anyone else at the festival?\n                *goto partners\n      #As much as I care for Lu Jin, I cannot defy the Emperor.\n        *set tianxia %-5\n        Lu Jin sighs. \"I am sorry to hear that, old friend.\"\n        *goto partways\n      *if (rebel) #I tell Lu Jin that I have already made arrangements with Deng Ping for exactly what ${rivalhe} has asked for.\n        *set lujin %+20\n        Lu Jin looks relieved. \"I can't tell you what good news this is,\" ${rivalhe} says, placing a hand on your shoulder. $!{rivalhe} leaves it there, just a little longer than necessary, and you shiver. \"I will talk over with Deng Ping the best candidates to become your students.\"\n\n        \"You'll talk to him after the festival, I hope,\" you say.\n\n        Lu Jin smiles, and the excited energy with which ${rivalhe} greeted your news calms into something more personal. \"Yes. It can wait the night. And I would like to spend more time with you.\"\n\t\t\n        \"Shall we get some food?\" you suggest.\n        *goto banquet\n\t\t\n  *hide_reuse #I want to spend time with Feng.\n    *if (romance = \"Feng\")\n      You and Feng spend a lovely evening together, dancing, eating, and enjoying each other's company. After a time, you return home. If Feng is disappointed you did not converse with anyone else, she says nothing more on the matter.\n\t  \n      *goto students\n    *else\n      *set suit \"Feng\"\n      Though Feng does not look at you as a potential lover, you believe you can convince her to see you in a different light.\n\n      \"Would you like to get something to eat?\" you suggest to her.\n\t  \n      She looks at you suspiciously. \"All right,\" she agrees, and walks with you toward one of the banquet tables.\n      *set feng %+5\n      *goto banquet\n  #I wander through the festival until I am ready to return home.\n    *set enlightened %+5\n    After so much solitude, it is heartwarming to be surrounded by so many joyous people. It is also tiring. Though the food is excellent and the dancing is scheduled to go on until dawn, you find yourself ready to return home to the quiet of your courtyard and the comfort of your bed.\n\t\n    *goto students\n\n*label banquet\n*page_break\nThe tables are piled high with foods: roast suckling pig, whole ducks, jellyfish, quail, chicken (and chicken feet), and fish, alongside sweet buns, sticky dumplings, and lotus cakes. The list is only the beginning, as the tables stretch to fill much of the center of the village. Governor Rong has certainly invested much in making sure the feast would provide for all the village's residents—and the many guests you have noticed spread throughout the crowd. You think you even see some of the light-skinned foreigners in their strange clothing, but when you look for them again, they have vanished amongst the villagers.\n\nYou and ${suit} find a place to sit and eat among the already seated villagers. ${suit} offers you some lobster; you share some pigeon. Unfortunately, there is nothing to drink near where you are seated. You see pots of tea steeping a short walk away, and offer to get some and bring it back. What type of tea do you select for ${suit}?\n*choice\n  #Jasmine green.\n    *if suit = \"Lu Jin\"\n      *set lujin %+10\n      Lu Jin is delighted that you remembered the choice ${rivalhe} made when you met for breakfast. $!{rivalhe} breathes the steam deeply, relishing in the aroma before drinking.\n      *goto suittest\n    *else\n      Feng accepts the tea, but sets it down next to her plate, leaving it untouched.\n      *goto suittest\n  #Yellow.\n    ${suit} accepts the tea and drinks it without further comment.\n    *goto suittest\n  #Puerh.\n    ${suit} accepts the tea and drinks it without further comment.\n    *goto suittest\n  #Osmanthus oolong.\n    *if suit = \"Feng\"\n      *set feng %+10\n      Feng breathes the scent of the tea deeply, letting the steam surround her face, before she takes her first sip. \"This is one of my favorite things about taking human form,\" she tells you quietly. You think it is possibly the most sincere you have ever seen her.\n      *goto suittest\n    *else\n      Lu Jin sniffs the tea and makes a coughing sound. \"What a strange selection,\" ${rivalhe} says, setting it aside.\n\t  \n      You explain with some embarrassment that this is the type of tea your housekeeper has been making for breakfast.\n      *goto suittest\n\n*label suittest\nAfter you have both eaten your fill, you have the chance to decide how you will further improve ${suit}'s impression of you. How do you want to win ${suit} over?\n*label suittestchoice\n*choice\n  *hide_reuse #Regale ${suit} with stories of my training.\n    Given the number of years you spent at the Order and the time you spent under Master Zhuge, you have several amusing anecdotes you can share. The question is, do you reveal any secrets, such as the final test to join the Order of the Peach Tree?\n    *choice\n      #I allude to secrets, but do not dishonor the Order or Master Zhuge by sharing secrets.\n        *set honor %+10\n        You hint at the challenges you faced without ever crossing the line into breaking your word to the Order or Master Zhuge.\n\t\t\n        *if scars != \"none\"\n          You certainly show off your scars, and ${suit} admires the perfect outline of the ${scars}.\n          *goto next\n        *else\n          *goto next\n      #I know I can trust ${suit} with my secrets, so I share them freely.\n        *set honor %-10\n        *if suit = \"Lu Jin\"\n          *set failure +1\n          Though ${rivalhe} says nothing, you notice by the way that Lu Jin's mouth tightens that ${rivalhe} is uncomfortable with hearing such secrets. Even after leaving the Order, it looks as though your old rival has retained enough loyalty to feel the secrets should not be revealed.\n          *label lujinfail\n\t\t  \n          *if failure = 2      \n            Although there is plenty of time left for festivities, Lu Jin begins to withdraw. \"There are people I should meet,\" ${rivalhe} says. \"We part as friends, ${name}, and I will not forget what you are doing for the Rebellion.\"\n            *goto perhaps\n          *else\n            What do you try next?\n            *goto suittestchoice\n        *else\n          *set failure +1\n          Though you suspect Feng knows more about Master Zhuge's teaching than even you do, she seems unimpressed that you have chosen to share her friend's secrets.\n          *goto fengfail\n      #I do not even allude to secret matters; those who are not initiated cannot be trusted even with hints.\n        Though you intend for your secrecy to uphold the honor of the Order and Master Zhuge, it is clear that ${suit} feels untrusted. The conversation stagnates, and you are at a loss to fix it.\n        *if suit = \"Lu Jin\"\n          *set failure +1\n          *goto lujinfail\n        *else\n          *set failure +1\n          *label fengfail\n\t\t  \n          *if failure = 2\n            Although there is plenty of time left for festivities, it is clear that Feng is getting tired of your company. \"${name},\" she finally says in an exasperated tone of voice, \"I have things to do. Chaos to cause. I'll see you back at the house.\"\n\t\t\t\n            With that, Feng shifts forms, suddenly appearing as an old man. You are surprised that no one notices her change but you. The fox spirit leans heavily on a cane and hobbles off into the crowd, sure to start chaos wherever it can be sown.\n\n            Though your heart is heavy, there is still time to find a companion here. Do you wish to speak to anyone else?\n            *goto partners\n          *else\n            What do you try next?\n            *goto suittestchoice\n  *hide_reuse *if (suit = \"Lu Jin\") #I offer to train with Lu Jin in ${rivalhis} spare time, showing techniques I have learned since we parted.\n    Lu Jin thinks for a moment, then says, \"I admit, after I heard you had been studying with Master Zhuge, I was curious if you'd learned any of the 'magic' the Veiled Dragon is said to know. I would be interested in trying my hand at some of those advanced techniques. In return, I'd be happy to share some of the unit fighting I've learned. Do you remember when we first faced members of the Rebellion on our way back to the monastery? I have learned so much about leading units since then; fighting in a group can do so much more than dissolve into a series of one-on-one fights.\"\n\n    *choice\n      #I would be glad to teach Lu Jin some of the \"magic\" techniques I know, and would be glad to get extra training from ${rivalhim}.\n        *if magic > 60\n          *set lujin %+15\n          Lu Jin looks delighted by both your willingness to teach and your willingness to learn. You pass several hours talking about some of the basics of the fighting techniques you have studied.\n          *if lujin > 70\n            *goto lujinwin\n          *else\n            *goto lujinwarm\n        *else\n          Although Lu Jin is immediately eager to learn, with some discussion, ${rivalhe} quickly realizes that your magic skills are not at the level ${rivalhe} had perceived. He expresses some disappointment about your skills, but you pick up that even more disappointing is your deliberate misrepresentation of your abilities, or so ${rivalhe} implies.\n          *set failure +1\n          *goto lujinfail\n      #I would be glad to teach Lu Jin some \"magic,\" but I doubt I could learn much from ${rivalhim}.\n        Lu Jin looks stung by your dismissal of ${rivalhis} skills. Though you talk a little longer, it is clear that because you have rejected ${rivalhis} training, ${rivalhe} is less interested in learning from you.\n        *set failure +1\n        *goto lujinfail\n      #I am not confident about my magical skills, but I will share what I know and gladly learn from ${rivalhim}.\n        *if magic > 60\n          *set lujin %+10\n          Despite your humility, Lu Jin is eager to hear about what you have learned, and ${rivalhe} quickly gathers that your abilities are better than you have portrayed them.\n\t\t  \n          \"I did not expect modesty from you,\" ${rivalhe} says. \"It was never one of your virtues.\"\n\t\t  \n          \"Perhaps I have learned something over the years, then,\" you return, and your banter returns to its earlier, lighthearted camaraderie.\n          *if lujin > 70\n            *goto lujinwin\n          *else\n            *goto lujinwarm\n        *else\n          *set lujin %+15\n          \"I did not expect modesty from you,\" Lu Jin says. \"It was never one of your virtues.\"\n\t\t  \n          \"Perhaps I have learned something over the years, then,\" you answer with a laugh, and the two of you begin a discussion about what little magic you do know—and the many lessons Lu Jin has learned as a field commander. You can tell that what you learn from Lu Jin will be of greater value, but you perceive that ${rivalhe} is extremely pleased with your acknowledgement of ${rivalhis} skills.\n          *if lujin > 70\n            *goto lujinwin\n          *else\n            *goto lujinwarm\n  *hide_reuse #I challenge ${suit} to a game of go.\n    The game tables from the Plum Blossom tea house have been moved outside, where many players—mostly old men—engage in games of go. You find an open board and sit. How do you open the game?\n    *choice\n      #I allow ${suit} to play black, and thus make the opening move.\n        The player who goes first has a small advantage in the game. Why do you choose to go second?\n        *choice\n          #This is a friendly game, and winning matters less than spending time with ${suit}.\n            *if suit = \"Lu Jin\"\n              *set lujin %+10\n              *goto play\n            *else\n              *goto play\n          #I am confident that my skills at the game will render the advantage meaningless.\n            There is no sense in playing if you don't intend to win, after all.\n            *if suit = \"Feng\"\n              *set feng %+10\n              *goto play\n            *else\n              *goto play\n          #I feel it is honorable to give my opponent the advantage in the first game.\n            The first game is, in part, about gauging your opponent. Even if you lose the first game, you will have learned something about your opponent—and, in the meantime, will have given every courtesy.\n\t\t\t\n            *set honor %+5\n            *if suit = \"Lu Jin\"\n              *set lujin %+5\n              *goto play\n            *else\n              *set feng %+5\n              *goto play\n      #I choose black to gain the advantage in the game.\n        There is no sense playing if you don't intend to win, after all.\n\t\t\n        *goto play\n  *hide_reuse *if (suit = \"Feng\") #I declare myself honestly. She may not see me as a potential romance, but I want the chance to change her mind.\n    *if tenacity > 60\n      *set feng %+10\n      At first, Feng laughs, clearly not believing that you intend to win her over. The two of you wander around the festival, stopping at a booth of games and watching as children try to scoop small fish out of a tray of water or run a relay with chopsticks. She seems surprised when, after a while, you are still there, keeping her company.\n\t  \n      She stops to watch the go players. And you are still there.\n\t  \n      Finally, she grins at you. \"You really are serious about this, aren't you?\" she asks. She gives your hand a quick squeeze, which you take as encouragement.\n      *if feng > 70\n        *goto fengwin\n      *else\n        *goto fengwarm\n    *else\n      You wander the festival with Feng for a while, despite her dubious expression. But the fox spirit ignores you entirely, never once engaging you in conversation. You have never seen a clearer cold shoulder. Following her in this way is clearly not working to win her over, or convince her of your sincerity.\n      *set failure +1\n      *goto fengfail\n  *hide_reuse #I ask ${suit} to dance.\n    *if suit = \"Feng\"\n      As soon as you are among the dancers, it is clear that dancing is one of the things that Feng loves to do.\n      *if fighting > 70\n        *set feng %+20\n        Luckily, you are able to keep up with her. You are used to following another person's body movements, and though the dance is hardly a battle, the footwork translates well. After several songs, Feng spins away, breathless and flushed, and beaming at you with sheer pleasure.\n        *if feng > 70\n          *goto fengwin\n        *else\n          *goto fengwarm\n      *else\n        Unfortunately, you are not able to keep up. Despite the similarities that dancing shares with forms and katas, you are unable to translate one type of movement to the next. After just one song, Feng wanders away from the dancing, radiating disappointment.\n        *set failure +1\n        *goto fengfail\n    *else\n      *if samesex\n        Lu Jin looks at you askance. \"I somehow doubt that Kuei Xian would look well on the two of us dancing together,\" ${rivalhe} says.\n\n        *label tigermeetsdragon\t\t\n        \"Not dancing, dancing,\" you explain. \"I was thinking of Tiger Meets Dragon.\"\n\t\t\n        The form is one of the upper level forms you and Lu Jin had perfected shortly before Lu Jin left the Order. One partner performs the Dragon moves in the form, circling around the partner who is performing the moves of the Tiger. The Tiger is continually chasing the Dragon, and while they clash several times, neither is the clear winner.\n\t\t\n        \"I haven't done that for a long time,\" Lu Jin says quietly.\n\t\t\n        \"It will come back to you,\" you promise.\n\t\t\n        *if fighting > 60\n          *set lujin %+20\n          At first, it seems as though Lu Jin has actually forgotten it, but as you start to move, ${rivalhe} sees the pattern, and you watch as ${rivalhis} memory comes back. As the Tiger, you chase after ${rivalhim}, and ${rivalhe} darts out of your way, coming around behind you and tapping you on the back of your neck.\n\t\t  \n          You know very well that this form represents a battle between enemies, but you cannot help but feel that the way the pair of you are moving—you chasing Lu Jin, ${rivalhe} staying just out of reach—it more closely resembles courtship.\n\t\t  \n          When you reach the end of the form, you realize that you have gained a crowd, and that they are cheering your performance. Lu Jin grins broadly at you and clasps your forearm.\n\t\t  \n          \"Thank you,\" ${rivalhe} says.\n          *if lujin > 70\n            *goto lujinwin\n          *else\n            *goto lujinwarm\n        *else\n          As you begin the form it looks as though Lu Jin has forgotten it—and without ${rivalhis} part, you have lost it, as well. You both stop and laugh at each other in embarrassment.\n\n          *label dancefail\t\t  \n          \"Perhaps we are not meant for dancing,\" Lu Jin says, looking as though ${rivalhe} would rather be anywhere else.\n\t\t  \n          \"Perhaps not,\" you agree.\n          *set failure +1\n          *goto lujinfail\n      *else\n        \"I don't really dance,\" Lu Jin says, somewhat embarrassed.\n        *choice\n          #I am confident I can make Lu Jin look good while we are dancing together.\n            \"I'll lead, you follow,\" you insist. Lu Jin takes your hand and lets you usher ${rivalhim} out on the floor.\n            *if fighting > 70\n              And though you are no accomplished dancer, you make easy translations between your forms and the dance, mimicking the moves of the other dancers so perfectly that Lu Jin falls right into place. You guide Lu Jin through the crowd, and ${rivalhe} begins to revel in the dance, looking gleeful about the ease with which the two of you move together.\n              *if lujin > 70\n                *goto lujinwin\n              *else\n                *goto lujinwarm\n            *else\n              *set honor %-5\n              But sadly, not only are you unable to keep Lu Jin from looking foolish among the dancers, you look fairly ridiculous yourself. You are certain you notice some of the villagers laughing at the pair of you from the crowd.\n              *goto dancefail\n          #I suggest that we do a form instead. Tiger Meets Dragon has two, intertwined parts.\n            *goto tigermeetsdragon\n          #I agree that we can do something else.\n            *goto suittestchoice\n  #I feel as though I have exhausted my options.\n    If ${suit} has not recognized your worth by now, the odds are that ${suit} will never see you the way you wish to be seen. You part ways and decide what else to do with your evening.\n    *goto partners\t\t  \n\t\n*label next\n*if suit = \"Lu Jin\"\n  *if honor > 60\n    *set lujin %+15\n    Lu Jin is suitably impressed with your stories, and shares some of ${rivalhis} own in return. $!{rivalhis} training—and teaching—since leaving the order could not be more different from your own, but though Lu Jin has certainly faced greater hardships, ${rivalhe} has enough humorous and exciting stories to match yours.\n    *if lujin > 75\n      *label lujinwin\n      *page_break\n      *set romance \"Lu Jin\"\n      *achieve frenemy3\n      As you spend time together, you grow confident that the chemistry you feel between you is returned. You take Lu Jin's hand in your own and are unsurprised when ${rivalhe} squeezes yours in return.\n\t\t\n      \"Would you like to come back to my house?\" you ask tentatively.\n\t\n      Lu Jin grins. \"Do you have a sparring match in mind?\" And though ${rivalhe} uses words that refer back to your training days, you can tell by the heat in ${rivalhis} eyes exactly which activity ${rivalhe} actually has in mind.\n\t\t\n      \"I'd like nothing more.\"\n\t\t\n      Over the next few weeks, Lu Jin becomes a regular feature at your house—and in your bed. Though ${rivalhe} continues to travel on behalf of the Blue Scarves Rebellion, ${rivalhis} trips back to Kuei Xian become more frequent and longer than they had been in the past. Lu Jin is confident, however, that no one is suffering from ${rivalhis} absence just yet.\n\t\t\n      \"If the Heavens wish to grant me a little happiness,\" ${rivalhe} says, \"who will argue if I spend a little time indulging in it?\"\n\t\t\n      Since the indulgence is to your benefit as well, you are hardly one to argue.\n      *goto students\n    *else\n      *label lujinwarm\n      Though you believe Lu Jin is warming to you, you are not confident you have yet won ${rivalhis} heart. What do you attempt next?\n      *goto suittestchoice\n*if suit = \"Feng\"\n  *set feng %+5\n  Feng seems less interested in the content of your stories than how you tell them. She seems to particularly love embellishments, and once, she retells one of your own stories to make it sound as though you are a hero out of ancient legends. \n  *if feng > 70\n    *label fengwin\n    *set romance \"Feng\"\n    *achieve foxed4\n    As you spend time together, you realize that Feng is decreasing the amount of space between your bodies as you wander through the crowd. Late into the evening, she grabs your hand.\n\t  \n    \"I think we should go home,\" she says, and it is clear from her tone exactly what she intends.\n\t  \n    You squeeze her fingers. \"I was hoping you would come to that conclusion,\" you say, surprised at the husky tone of your own voice.\n\t  \n    Your bed soon becomes a much warmer place, and though you returned home before dawn, daylight streams into your windows before you both fall asleep.\n\t  \n    The legends about fox spirits proclaim them to be such able lovers that those who fall in love with them lose interest in the world. While you acknowledge that the romance that has sprung up between you is heady, and that the first few days after Feng decides to warm your bed are lost in a whirl of passion, there is also conversation and companionship. Soon, you settle into a more stable pattern that balances your studies, your romance, and your practice of the physical arts.\n    *goto students\n  *else\n    *label fengwarm\n    Though you believe Feng is warming to you, you are not confident that you have won her heart. What do you attempt next?\n    *goto suittestchoice\n\n*label play\n*if suit = \"Lu Jin\"\n  It is quickly clear to you that, at best, Lu Jin is a casual player. Despite the lack of practice, however, ${rivalhe} keeps up a steady stream of conversation, seeming to
