egends you have learned about Zhuge the Immortal, the Veiled Dragon. But though all the stories you know refer to Zhuge as a man, you can sense the gravitas this woman has.\n    \n    The old woman beams. \"It has been at least fifteen years since someone identified me so quickly,\" she says. \"Either you are a remarkably clever monk, or I am getting less crafty in my old age.\" She holds the door open. \"I choose to believe it is the former. Please, come inside.\"\n    *goto inside\n\n*label morning\nThough it is summer, you are in the mountains, and the chill in the air becomes pronounced as the night wears on. Because the old woman does not come to the door again, and because the hut itself is so remarkably stable, there is nothing to do but spend the night outside and think about what has happened. An old woman has denied hospitality to a traveling monk.\n\nIt occurs to you that in order to join the Order of the Peach Tree, prospective students—those without connections that would allow them to bypass the initial test—must wait outside the gates for several days, proving they have the persistence to reach their goals. Some potential students in need of humbling are kept outside longer than others. Some wander off after a day or two, unwilling to wait for a decision to be made. Others find something useful to do with themselves while they wait.\n\nThe old woman has treated you as though you are a prospective student. She is clearly Master Zhuge, despite the contrast between the wizened old lady and the immortal hero of legend. You just have to decide how you will approach this first test she has put before you.\n*label gates\n*choice\n  *hide_reuse #Consult the stars, as she suggested.\n    *set magic %+5\n    *if magic > 70\n      Your study of the night sky reveals that another rain storm will be coming through tomorrow, so you had better figure out a way to impress Master Zhuge before it arrives. You also notice with some amusement that the constellation of the ox is rising over Kuei Xian. Perhaps that is where the missing ox ended up.\n      *goto gates\n    *else\n      Although the stars are very pretty up here in the mountains, you don't discern anything useful.\n      *goto gates\n  *hide_reuse #Collect resources from the woods at night.\n    Moving around helps you to warm up against the cool mountain breeze. But in the dark it is difficult to see which useful things you may be collecting.\n    *choice\n      #I remember reading about herbs that are best harvested at night. I look for those.\n        *set magic %+5\n        *set cleverness %+5\n        *if cleverness > 60\n          You recall the passages from the scroll you studied at the Order of the Peach Tree quite vividly. With some careful looking, you are able to collect a number of useful herbs.\n          *goto gates\n        *else\n          Despite your best efforts, you just don't remember enough of the text to help you find what you are looking for. However, as you search you feel your night vision improving, and you feel more comfortable spending the rest of the night here.\n          *goto gates\n      #I am sure there must be nuts and berries worth picking if I just keep trying.\n        *set tenacity %+5\n        *if tenacity > 50\n          You aren't at all sure what you are picking, but you're picking something. Perhaps mountain lore will be among the skills you can learn with Master Zhuge. You'll have a small bounty to offer to her as teaching samples.\n          *goto gates\n        *else\n          Shortly after you begin, you realize that you really have no idea what you are doing. Better to quit while you can still get some rest.\n          *goto gates\n  *hide_reuse #Meditate upon the nature of the mountains.\n    *set enlightened %+5\n    *if enlightened > 70\n      You empty your mind of everything but the mountains. You ponder the nature of the mountain, consider the creatures that live on its back. Though you do not come to any great epiphanies, you feel as though you are getting to know the mountain better by merely sitting and being a part of it.\n      *goto gates\n    *else\n      You sit and meditate, but the breeze grows colder as the night deepens, and you find yourself too distracted to continue.\n      *goto gates\n  #Wait until morning and humbly knock on Master Zhuge's door.\n    It is a long night, but finally morning arrives. You knock on the door once again, and the old woman, looking much the same as she did last night, answers the door with her same gruff demeanor.\n\t\n    \"Well?\"\n    *choice\n      #I apologize for my behavior and ask to be taken on as her student.\n        Master Zhuge nods. \"All right. Come inside and have something to eat. We'll discuss the terms of your apprenticeship.\"\n        *goto inside\n      #I thank her for the night outside and tell her what I have learned.\n        *set zhuge %+10\n        \"Sometimes, setbacks bring wisdom,\" she says serenely. She opens the door. \"Come inside and have something to eat. We'll discuss the terms of your apprenticeship.\"\n        *goto inside\n      *hide_reuse #I demand to be taken on as a student.\n        *set zhuge %-10\n        Master Zhuge sighs. \"Try again tomorrow,\" she says. Despite your best efforts, she will not open the door again, leaving you to spend another night outside the master's house.\n        *goto gates\n\n*label inside\n*set met_zhuge true\nThe hut is larger on the inside than it appeared on the outside, and though it is sparely furnished, it is comfortable. The main room has a small hearth; a kettle for tea water is currently suspended over it. One wall is filled with racks of scrolls. Another has weapons of all sizes and shapes suspended from it. Two paper doors hide additional rooms.\n\nMaster Zhuge offers you tea.\n*choice\n  #Accept the tea and drink it as Master Zhuge drinks it.\n    *set zhuge %+5\n    It is hot, but refreshing.\n    *goto presentation\n  #Take the tea cup and contemplate the tea, considering its qualities.\n    *set zhuge %+10\n    *set enlightened %+10\n    You drink the tea mindfully, and notice that Master Zhuge drinks hers in the same fashion. Neither of you speaks while you drink, waiting instead until both tea cups are empty to continue.\n    *goto presentation\n  #Decline the tea.\n    *set zhuge %-5\n    Master Zhuge takes her own cup of tea and drinks it slowly, refusing to engage in conversation until she is finished.\n    *goto presentation\n\n*label presentation\n*if gift = \"none\"\n  *goto apprentice\n*else\n  Once tea is concluded, you offer the ${gift} to Master Zhuge. She takes what you offer with little expression, and you cannot tell whether you have impressed the master or not.\n*label apprentice\nMaster Zhuge asks about your travels and the training you have already had. She listens, revealing little with her expression, as you explain your background.\n\n\"I have decided to accept you, provisionally, as my apprentice,\" Master Zhuge says. \"I can teach you any number of things, if you are willing to learn them.\"\n\nWhat do you hope to learn from Master Zhuge?\n*label education\n*choice\n  *hide_reuse #I want to improve my fighting.\n    You have chosen to train in fighting, and Master Zhuge begins in her home, in the center of her main room. For your first session, she turns to the wall and pulls down two guan dao—long-bladed polearms with a pointed metal counterweight at the opposite end. Despite their weight, she shows no exertion, and when she tosses you one, you are surprised by how heavy it feels in your hands.\n\t\n    \"Do try to keep up,\" says Master Zhuge.\n\t\n    Then she attacks. Her arms whirl the guan dao into a blur, the metal ends catching the light of her hearth and glimmering. Almost too late you see the blow she aims for your knees, but make the block, using a move you learned in your staff fighting lessons with Master Shen to block and then strike high. Master Zhuge doesn't bother to block, evading your strike and moving around behind you, guan dao still whirling. You manage to keep your feet through a few more exchanges before she successfully sweeps you.\n\t\n    \"Good,\" she says. As you get up, she hands you a bucket. \"Go down to the stream and gather some water. Wash up while you're there. Then we'll go again.\"\n\t\n    The next few weeks continue like this: battles with the weapons from her walls paired with menial chores. Master Zhuge displays amazing skill with every weapon displayed on her wall, and improvised weapons as well. Once, she battles you with ox legs she sent you to town to collect.\n\n    Does it bother you that Master Zhuge sends you on errands?\n    *choice\n      #I find it frustrating. My hours gathering wood or journeying into town could be sent with additional drills.\n        *set zhuge %-10\n        If Master Zhuge notices your frustration, she says nothing, but neither does she offer to relieve you of any of your duties.\n        *goto fightchallenge\n      #She is the master. I do the work dutifully.\n        *set zhuge %+5\n        *set honor %+5\n        Obeying your master is the honorable thing to do.\n        *goto fightchallenge\n      #Master Zhuge is crafty. Whether I see it or not, there is some purpose behind my chores.\n        *set zhuge %+15\n        *set cleverness %+5\n        Just as was true at the Order of the Peach Tree, menial labor has its own lessons, and not only in humility. Master Zhuge begins to give you challenges in your chores: she requires you to collect three large buckets of water from the stream to see how you will manage the task with only two hands. She sets almost impossible time limits on your journeys to Kuei Xian and back. Each time you succeed at one of these challenges, she tells you her memories of the combats that have worked their way into her legends, and you find you can apply some of the details she offers in your sparring matches.\n        *goto fightchallenge\n  *hide_reuse #I want to learn the magic the Zhuge of legend is said to practice.\n    You have chosen to learn magic—or, at least, what the superstitious would call magic. Master Zhuge explains that it is all a matter of understanding the flow of energy through the universe. When she says it, of course, it sounds simple. But your new training regimen is anything but. You find that magic is much less about action and much more about scholarship. Master Zhuge has you studying star charts, herbal encyclopedias, and books on anatomy. You imagine you can feel your muscles atrophy as you do nothing but read.\n\t\n    Are you frustrated by all this book learning?\n    *choice\n      #I am fascinated by everything I am learning, and am eager to learn more.\n        *set zhuge %+10\n        *set cleverness %+5\n        Considering the size of her library, it is lucky that you are so engaged by your work.\n        *goto magicchallenge\n      #I love what I am learning, but wake before dawn in order to have time to go through my forms, so that my body remembers its fighting arts.\n        *set zhuge %+15\n        *set cleverness %+5\n        *set fighting %+5\n        You sense that Master Zhuge approves of your efforts. One afternoon, rather than get out another text on anatomy, she teaches you a form from the art of qigong, a style that emphasizes the energy points within the body, both for disabling foes and for healing friends. You add this to your morning practice.\n        *goto magicchallenge\n      #I am sick of books and wish I were doing something with more action.\n        *set zhuge %-15\n        Perhaps it is good you chose the path of a monk, rather than a scholar. Surely this part of Master Zhuge's teaching cannot last forever.\n        *goto magicchallenge\n  *hide_reuse #I need to work on my determination.\n    Master Zhuge's idea of improving your tenacity involves long trips into the woods with very little in the way of supplies. She sends you out with some food and water and tells you how many days you must stay away before you can return. You get the sense that she is watching you—that she may even be traveling alongside you—and that she will know if you cheat by going into Kuei Xian where people are more civilized.\n\t\n    Do the hours alone wear on you?\n    *choice\n      #I question her teaching methods. How is sending me alone into the wilderness teaching?\n        *set zhuge %-15\n        You believe the legends about Master Zhuge's skills, but you question whether or not she should be considered a worthy instructor.\n        *goto tenacitychallenge\n      #I do not understand her methods, but I refuse to give up.\n        *set zhuge %+5\n        *set tenacity %+5\n        *set honor %+5\n        Clearly something about the training is already working, then.\n        *goto tenacitychallenge\n      #I feel as though I am learning more than just courage and determination. The mountains are a living place.\n        *set zhuge %+15\n        *set magic %+5\n        *set enlightened %+5\n        You can almost feel the energy of the mountains connecting everything living on its surface. Your time alone in the wilderness has not only made you determined to learn the art of survival, but it has given you an appreciation for the natural beauty of the world around you, and the connectedness between all living things.\n        *goto tenacitychallenge\t\t\n  *hide_reuse #I am looking forward to studying strategy under the Veiled Dragon, who is said to have been responsible for the defeat of three armies at Hongcao Pass.\n    You know the history of Hongcao Pass—it was one of your favorite stories as a child, and you have studied the different tellings of that event at every opportunity. Master Zhuge was on the side of Hong Wei, the most capable general among the three armies, who fought on behalf of the Imperial Family against a rebelling warlord and the horse-riding savages of the western plains. Between General Hong and Master Zhuge, the battle was decisive, and Hongcao Pass was named after the general, who became a trusted advisor to the Emperor.\n\t\n    The story that Master Zhuge tells you surprises you: Zhuge knew that in order for the general's strategy to work, the army would need to double the number of drummers sending out the orders to the soldiers. In order to meet the army's need, Zhuge recruited a number of young women instrumentalists from a nearby village. Though General Hong was unsure about using untried women in the role, they were vital to his ruse: he needed the drum calls to disorient his enemies and keep the opposing armies from learning his location until it was too late for them to prevent his attack. Zhuge snuck the women up into the pass into secure locations, where their drum calls would echo and multiply, thus adding further confusion to General Hong's original plan. Many other details played into the battle, of course—including an east wind Master Zhuge summoned, which caused the banners of the horse barbarians to flutter chaotically in the winding pass and further disorient the enemy—but history's record of the numbers is entirely accurate.\n\t\n    As you discuss old battles, day after day, Master Zhuge insists that you play go. The board game, played on a grid where stones of opposing colors—black and white—are used to attempt to surround their opponent's pieces, distracts you from the tales of Master Zhuge's important strategic decisions.\n\t\n    Do you question her technique?\n    *choice\n      #The distraction is unwelcome. I would rather pore over maps of Master Zhuge's campaigns.\n        *set zhuge %-15\n        A battlefield seldom looks like a grid, and the game frustrates you, as Master Zhuge always seems to win.\n        *goto cleverchallenge\n      #The multitasking is difficult, but I suspect it is part of the exercise.\n        *set zhuge %+15\n        *set enlightened %+5\n        Paying attention to both the stories and the strategy of the game, retaining both in your head without being distracted, is certainly a skill that requires a quick mind. It also has the added benefit of causing you to focus more closely on Master Zhuge's reactions and expressions. You feel you are beginning to learn how to read her emotions more clearly, and your insight into her expressions aids both your game and your understanding of her campaign decisions.\n        *goto cleverchallenge\n      #I love go! I could play this game all day.\n        *set zhuge %+5\n        *set cleverness %+5\n        You have always been good at go. Now you find yourself becoming quicker at adopting strategies, and even applying lessons from Master Zhuge's campaigns to your game.\n        *goto cleverchallenge\n  *hide_reuse #I really want to learn the art of poetry.\n    Master Zhuge seems surprised by the request, as very few people have ever sought her out as a poetry instructor. Still, she is eager to find another person with whom she can share her love of poetry.\n\t\n    But rather than putting your own words together, or even studying the words of the masters, Master Zhuge divides your day into two parts: practicing calligraphy and meditating in a clearing near the hut. Neither of these things feels much like poetry when you begin.\n    *choice\n      #I do not understand Master Zhuge's techniques and have taken to making up poems in my head without her.\n        *set zhuge %-15\n        Sadly, you don't think your poems are actually very good.\n        *goto poemchallenge\n      #Clearly, the art of calligraphy is poetry's physical expression. The words must also appear beautiful.\n        *set zhuge %+10\n        *set fighting %+5\n        You have also noticed that calligraphy translates well to your body—the movement of brush over paper is like the movement of a sword through the air, or your feet over the ground. Calligraphy is a physical art, and you think it will help your fighting skills as well as your poetry.\n        *goto poemchallenge\n      #Sitting in nature is clearly about poetry. Poetry is about observation as much as it is about creation.\n        *set zhuge %+15\n        *set enlightened %+5\n        Master Zhuge begins to accompany you as you sit in the clearing, and as you walk home together, she speaks to you in what you soon recognize as extemporaneous verse. As you reply, you find that your words, too, are becoming more poetic.\n        *goto poemchallenge\t\n\t\t\n*label fightchallenge\n*set fighting %+20\nOne morning, after you have been training with Master Zhuge for several months, the old woman wakes you before dawn. \"A pair of yaoguai have descended to the mountain,\" she says, her voice a hushed whisper. \"It's time to test what you have learned.\"\n\nYaoguai. While you have heard cases where the creatures are not evil, they are typically celestial beings who have been thrown out of the heavens, or malevolent animal spirits. Monsters. If Master Zhuge intends for you to do battle with them, they are clearly not the type to be reasoned with. You follow her quietly, and the two of you move almost silently through the woods; Master Zhuge herself leaves no trace of her passing, and though you are not as skilled as she is, you are confident that no one short of a master tracker could follow your path. The terrain is difficult as the mountains become steeper. Master Zhuge practically floats uphill, and you do your best to keep up with the legendary immortal.\n\nShe stops just after noon, within view of a cave. Two creatures move around just inside it: one looks almost like a man, but has long pointed ears, thick eyebrows that come to a point at his temples, red skin, curly hair along his chin, and a flame of hair in place of a queue. The second looks like a monster: his body is like the mythical rhinoceros, but his head has the muzzle of a bear, and he walks half-upright. Master Zhuge looks at you, then gestures to the monster. She waits for your nod of understanding, then leaps out of the trees, slicing the blade of her guan dao down at the red-skinned yaoguai before she has landed. The yaoguai draws a sword just before Master Zhuge can connect, and the pair spin off into a battle almost too fast to watch.\n\nThe monstrous yaoguai looks as though he is considering charging into the middle of the battle to aid his companion.\n\nWhat do you do?\n*choice\n  #Charge ahead with my guan dao, using the techniques I have learned from Master Zhuge.\n    *if fighting > 75\n      *set zhuge %+15\n      You charge straight ahead, not bothering to hide your presence. All those trips up and down the mountain from Master Zhuge's hut to Kuei Xian now serve you well: despite the uphill climb, you cover the distance quickly, and soon see the bearlike muzzle bearing down on you as the monster also charges.\n\n      The guan dao is a heavy weapon, and the blade is sharp. You slash downward at the beast, and it turns aside just in time, so that the blade slashes through its thick, dry hide rather than its nose. But while its momentum has changed, yours has only increased: you continue in a series of spinning cuts to keep the blade moving, cutting through the hide, and when the yaoguai turns, roaring at you, you whip the blunt end up and into its muzzle, forcing its jaws together and snapping its head back with a loud crunch.\n\t  \n      *label fightwin\n      *achieve demonslayer\n      *set success +1\n      The first few hits are not enough to kill or disable the beast, but your constant slashing wears at it, and the dark ichor of its blood slicks the ground. Eventually it shudders and dies.\n\n      You noticed that Master Zhuge took her fight away from the cave some time ago; you did not notice her return. She sits on a log near the mouth of the cave, waiting for you to become aware of her presence.\n      *choice\n        #I bow to Master Zhuge.\n          *set zhuge %+5\n          She stands and returns your bow, then approaches. \n\t\t  \n          *label nochores\n          \"We'll stop by the stream to get you cleaned up,\" she says. \"No chores today.\"\n          *if zhuge \u003c 60\n            *goto end \n          *else\n            As you start back down the mountain, she claps you on the shoulder. \"You have made me proud, my student.\"\n            *if success = 3\n              *goto end\n            *else\n              \"Tomorrow, I think, we will start something new. What else would you like to learn that I have to teach?\"\n              *goto education\n        #I collapse next to Master Zhuge on the log, having earned my relaxation.\n          *goto nochores\n        #I demand to know why she didn't help.\n          She shrugs. \"It did not appear as though you needed help, my student.\" \n          *if zhuge \u003c 60\n            *goto end\n          *else\n            She rises from the log and approaches you. \"Consider it part of your training. You have made me proud, my student.\"\n            *if success = 3\n              *goto end\n            *else\n              \"In fact, I think it is time we expanded your training. What else would you like to learn that I may teach?\"\n              *goto education\n    *else\n      *set zhuge %-15\n      You charge into battle, but the monster hears you coming and charges faster. Despite your training in running errands up and down the mountain, you cannot gain the momentum you need to meet it properly, and the yaoguai's bearlike muzzle clamps down on your shoulder before you can make your first slash with your guan dao. You scream in agony as the teeth grind through your muscle.\n\n      *label fightlose\t  \n      Master Zhuge appears at the edge of your vision. She brings her hands together in a circle, and a wave of energy hits the monster, blasting it off of you. You try to struggle to your feet, but you find you cannot move—the monster's spit must have had venom in it, paralyzing you so that you can only watch while Master Zhuge faces not one, but two, yaoguai. Despite the odds, it is clear early on that Master Zhuge will triumph: her guan dao dances between her enemies, the flat edge of the blade blocking the red demon's sword, the blunt end crushing the bear-monster's jaw. By the time you can feel your legs again, it is over, and though Master Zhuge is uninjured, she looks weary.\n\t\t\n      \"It seems we still have some training to do,\" she says, and the two of you walk slowly back down the mountain to her hut.\n      *goto end\n  #Sneak around the monster from behind while he is focused on Master Zhuge and cut him down with my guan dao.\n    *if cleverness > 60\n      *set zhuge %+15\n      The monster never sees you coming. Distracted by the battle between Master Zhuge and the other yaoguai, it does not notice you slip up from behind until you make your first strike: a strong downward slash with your guan dao. The creature screams in agony, turning to face you, but it is already too late: you continue in a series of spinning cuts to keep the blade moving, cutting through the hide, and when the yaoguai turns, roaring at you, you whip the blunt end up and into its muzzle, forcing its jaws together and snapping its head back with a loud crunch.\n      *goto fightwin\n    *else\n      *set zhuge %-15\n      It seemed like such a good idea, but you neglected to consider that the beast might have superior hearing or smell, and thus would notice you despite its distraction. It notices you before you are prepared, and it charges. Before you can raise your guan dao, its bearlike muzzle has clamped down hard on your shoulder. You scream in agony as the teeth grind through your muscle.\n      *goto fightlose\n  #Fly into battle like Master Zhuge, drawing on the energy around me to propel me above the creature.\n    *if magic > 60\n      *set zhuge %+15\n      Like Master Zhuge, you fly into battle—but rather than floating down gracefully, as soon as you are above the yaoguai, you fold yourself around your guan dao and drop, blade down, into the creature. The blade pierces its thick hide and a shudder courses through its body, loosening the guan dao blade and tossing you aside. You land on your feet, knowing that though the yaoguai may not yet realize it, it is already as good as dead.\n      *goto fightwin\n    *else\n      *set zhuge %-15\n      Unlike Master Zhuge, you are not an immortal. You leap into battle, but rather than flying, you stumble forward, crashing out of the woods. It notices you before you are prepared, and it charges. Before you can raise your guan dao, its bearlike muzzle has clamped down hard on your shoulder. You scream in agony as the teeth grind through your muscle.\n      *goto fightlose\n\n*label magicchallenge\n*set magic %+20\nOne day, Master Zhuge draws you away from the texts she has assigned you to study and takes you on a walk through the woods. Though you have been to the stream near her hut before, you have never noticed the gazebo to which she takes you. It is a rainy day, and the sound of the raindrops falling on the water adds volume to the stream's babble and the rustling of wind through the trees.\n\n\"Today, we spar,\" she announces.\n\nShe moves to the gazebo and sits on one of the benches inside. A figure comes out of the woods—a beautiful woman dressed in a thick brocaded qipao, who carries an erhu.\n\n*if met_feng\n  After a moment, you recognize the woman as Feng, the huli jing. \n  *goto spar\n*else  \n  *goto spar\n\n*label spar  \nShe draws her bow and sits demurely on the ground at the door of the gazebo, where she begins to play a haunting melody.\n\n*choice\n  #I stand in a fighting stance, prepared to spar as Master Zhuge said.\n    *set zhuge %-5\n    After a moment, Master Zhuge sighs. She gestures across the gazebo at another bench. \"You have learned enough now that you and I should be able to do battle mind to mind,\" she explains. \"Sit. We will see which of us would win.\"\n    *goto erhu\n  #I sit in the gazebo and await further instruction.\n    Master Zhuge explains, \"You have learned enough now that you and I should be able to do battle mind to mind. Meet my eyes and we will see which of us would win.\"\n    *goto erhu\n  #I sit in the gazebo and look at Master Zhuge until she meets my eyes.\n    *set zhuge %+15\n    You realize exactly what is happening: Master Zhuge has challenged you to a mind-to-mind battle. She locks eyes with you, and you begin.\n    *goto erhu\n\n*label erhu\nYou see the scene clearly, everything moving in slow motion, from the rain hitting the water of the stream to the strings of the erhu vibrating. In your mind, Zhuge stands, her giant bladed spear—her guan dao—in her hand, lowered at you.\n\n*choice\n  #In my mind, I also rise, focusing on the pressure points I have learned from the anatomy texts, and strike out open-handed.\n    *if magic > 60\n      *set zhuge %+15\n      *set success +1\n      *achieve mindmaster\n      In the vision, you stand, your body coiled like a snake's, and as Master Zhuge approaches you, you step to the side and strike out, targeting thirteen different points on her head and neck, determined to hit every one of them in a quick series of strikes.\n\t  \n      Your blows begin to land, but Master Zhuge, too, is a master of snake forms. Her guan dao vanishes and she meets you snake for snake. You shift to crane stance, evading her strikes and flying out of the way.\n\t  \n      The erhu plays, and your battle becomes a dance. You become so engaged in the patterns and movement that you cease to care who will win, living in this moment and letting go of worries of the future. You strike out, dance back, strike again, parry and counter. And still the erhu plays, and the rain glides across the surface of the stream.\n\t  \n      Master Zhuge spins away, grants you a broad smile, and bows. You return the bow, and discover that you are both still seated in the gazebo. The erhu vibrates with the last note of the song.\n      *if zhuge \u003c 60\n        *goto end\n      *else\n        \"Well done,\" says Master Zhuge.\n        *if success = 3\n          *goto end\n        *else\n          \"I think perhaps it is time to add another topic to your training. What else might I teach you?\"\n          *goto education\t\n    *else\n      *label magicfail\n      *set zhuge %-15\n      You begin to enact your strategy, but as soon as you begin to visualize what will happen next, you falter. You feel the wood of the gazebo bench beneath you, hear the sounds of the erhu bow on the strings, feel the wet rain blow in on the back of your neck with the breeze.\n\t  \n      Master Zhuge looks at you with disappointment. \"You were not ready,\" she says with a shrug. \"We will try again some other day.\"\n      *goto end\n  #I visualize the battle the way I wish it to go, shaping the reality of the vision with my will.\n    *if tenacity > 60\n      *set zhuge %+15\n      *set success +1\n      *achieve mindmaster\n      This is as much a contest of will as it is a contest of magic—and you are determined you will win. Rather than visualizing a weapon, you shift the terrain. You are no longer in a gazebo, but on the open plains, a far cry from the mountains Master Zhuge has considered her home for many years.\n\t  \n      Master Zhuge smiles, and suddenly you are at the base of a waterfall. You wrestle control back and forth, visiting far reaches of the Middle Kingdom as both of you have remembered them. The scenery is a blur, but neither of you moves, locked in a contest of terrain.\n\t  \n      You visualize the gazebo once again, bringing you both back to the present, and the strings of the erhu vibrate with the last note of the song. Master Zhuge smiles at you and gives you a shallow bow.\n\t  \n      \"Well done,\" she says.\n      *if success = 3\n        *goto end\n      *else\n          \"I think perhaps it is time to add another topic to your training. What else might I teach you?\"\n          *goto education\t\n    *else\n      *goto magicfail\n\n*label tenacitychallenge\n*set tenacity %+20\n\nEarly one morning, Master Zhuge wakes you and hands you a small pack—lighter than it should be for the number of days she has been sending you out into the wilderness.\n\n\"Today is a climbing day,\" she announces. \"You are to reach the top of Minxia Peak with only the tools provided here.\"\n\nThe peak is nearby, but it is nearly impossible to climb. You suspect this is a test. Master Zhuge's grin does nothing to convince you otherwise.\n\n*choice\n  #I take my pack and begin my climb.\n    You head out from the hut with just the light pack. It contains enough for two light meals, a pair of thick gloves, and some rope.\n\n    Almost as soon as you have left the hut, you see a small girl following you. She has an impish face, though you suspect she will grow up to be a real beauty.\n\n    \"Where are you going?\" she asks after a moment.\n\t\n    \"Minxia Peak,\" you answer.\n\t\n    She laughs. \"That's impossible!\" she says. \"No one can climb that.\"\n\t\n    You feel doubt creep in. Has Master Zhuge really assigned you an impossible task?\n    *choice\n      #I ignore the girl and keep going.\n        *set tenacity %+10\n        Impossible or not, this is your task, and you're going to stick to it.\n        \n        The little girl continues to tag along with you, even as the road gets more challenging. You put on your gloves as you reach a point where you will have to climb a rock face.\n\t\t\n        \"You're going to fall!\" the little girl shouts. \"You should turn around and go home!\"\n        *choice\n          #I ignore the girl and keep going.\n            *set tenacity %+10\n            You won't fall. You have faith in your own skills.\n\t\t\t\n            *label reachthepeak\n            The climb is difficult, and you slip several times. You reach an overhang where you have to maneuver your body around a lip jutting out, and there are several very tense moments when you are not sure if you are going to make it after all.\n\t\t\t\n            As you stop for a moment to rest, you realize you can't even see the peak from here, the wall of the cliff is so sheer.\n\n            *choice\n              #I make a try for the peak regardless.\n                *if tenacity > 60\n                  *set zhuge %+15\n                  *set feng %+15\n                  *set success +1\n                  *set tenacity %+10\n                  You press on. The climb is a struggle, and your fingers ache inside the thick gloves, but you go one moment at a time, striving hand over hand until finally, you reach the top.\n\t\t\t\t  \n                  It was not so impossible after all.\n                  *label peaksuccess\n                  *achieve mountainclimber\n\t\t\t\t  \n                  When you return to the hut, you find supper, and a small guest, waiting for you. Master Zhuge smiles at you.\n\t\t\t\t  \n                  \"Feng tells me that you accomplished excellent work,\" Master Zhuge says. You see seven fox tails protruding from beneath the little girl's tunic. The little girl waggles her fingers at you cheerfully. \"Come, eat with us.\"\n                  *if success = 3\n                    *goto end\n                  *else\n                    \"I think perhaps it is time to add another topic to your training. What else might I teach you?\"\n                    *goto education\n                *else\n                  *set zhuge %-15\n                  *set tenacity %+10\n                  You try to keep moving forward, but you find your body tiring, and you know it is no longer safe for you to be attempting this climb when you cannot feel your fingertips. Despite your desires, you realize you have to turn back.\n                  *label peakdefeat\n\n                  With a heavy heart, you return to the hut, acknowledging your defeat. Master Zhuge offers you dinner and consolation, with the promise that you will have the chance to try again.\n                  *goto end\n              #Climbing may be too difficult for me, but from here, I can draw on my chi and glide to the peak.\n                *if magic > 60\n                  *set zhuge %+10\n                  *set feng %+10\n                  *set success +1\n                  *set magic %+10\n                  You leap. The distance is greater than you realized, and several times, you have to stop to balance on the extending branch of a tree and leap again. In this way, you make it up Minxia Peak, a solitary place that seems undisturbed by anyone, except, perhaps, the occasional mountain goat.\n                  *goto peaksuccess\n                *else\n                  You leap. The distance is greater than you realized, however, and you glide back down to the outcropping where you started. You realize that getting to the peak from here is beyond your current level of skill.\n\t\t\t\t  \n                  *goto peakdefeat\n              #I am filled with dread. This really is an impossible climb. I decide to give up and return home.\n                *goto giveup\n          #The little girl is right. I'll never make it.\n            *goto giveup\n          #This little girl is supernaturally annoying. There's something suspicious about this.\n            *goto questionfox\n      #The little girl is right. This is a horrible idea.\n        *label giveup\n        *set feng %-15\n        *set zhuge %-15\n        You turn back. The little girl follows you, mocking you all the way.\n\t\t\n        When you reach the hut, Master Zhuge shakes her head at you. \"You cannot succeed without effort,\" Master Zhuge says quietly. \"Perhaps someday you will learn.\"\n        *goto end\n      #What is a little girl doing up here in the mountains by herself? There's something suspicious about this.\n        *label questionfox\n        *set cleverness %+5\n        *set tenacity %+5\n        \"Where are you headed, little girl?\" you ask, not yet revealing your suspicions.\n\t\t\n        \"I'm just looking for a mountain goat,\" she says. \"Want to help me find one?\"\n        *choice\n          #I offer to help her look for a goat. Even if she is a spirit rather than a little girl, offering my help is surely the right thing to do.\n            *label distracted\n            *set feng %-10\n            *set zhuge %-10\n            You truly intend to get back to your climb, but the little girl keeps spotting a mountain goat to chase\tjust on the edge of your vision. Before you know it, the afternoon has turned into night. You will never make it up the peak in the dark. You turn to the little girl to suggest that it would be better to look for a goat in better light—only to discover that she has vanished, and a fox with seven tails is darting into the underbrush.\n\t\t\t\n            *if met_feng\n              \"Feng,\" you growl under your breath. You hear a yip of mocking laughter in the distance.\n            You acknowledge that you have been outsmarted by the fox, because you chose a kind option over a clever one. You turn back. When you reach the hut, Master Zhuge shakes her head at you. \"You must not allow yourself to be distracted from your tasks, by spirits or humans or causes,\" she says quietly. \"Perhaps someday you will learn.\"\n            *goto end\t\t\t  \n\t\n          #I invite her to climb higher with me to find a goat—offering my help but not letting her dissuade me from my path.\n            *set cleverness %+5\n            *set tenacity %+10\n            *set zhuge %+5\n            *set feng %+5\n            *if scenefox >1\n              *achieve foxed3\n              *goto littlegirlsmiles\n            *elseif scenefox >0\n              *achieve foxed2\n              *goto littlegirlsmiles\n            *else\n              *achieve foxed\n              *goto littlegirlsmiles\n\n            *label littlegirlsmiles\n            The little girl smiles and nods. \"That seems like a good plan. I'm sure you can use the company before you fall to your death.\"\n\t\t\t\n            She says it so sweetly that if you weren't certain before, now you'd be absolutely sure she was a nature spirit, sent to tempt you.\n\t\t\t\n            Still, chatting with the little girl—and resisting her continual requests that you go after a goat that she sees just over whichever rise you're approaching—actually does make the task more enjoyable. It takes your mind off the physical exertion required by this climb—which the girl, or nature spirit, is managing without difficultly.\n\t\t\t\n            *goto reachthepeak\n          #I ignore the little girl, who is probably a spirit trying to tempt me, and continue my climb.\n            *set tenacity %+10\n            *if scenefox >1\n              *achieve foxed3\n              *goto walkawayfrom\n            *elseif scenefox >0\n              *achieve foxed2\n              *goto walkawayfrom\n            *else\n              *achieve foxed\n              *goto walkawayfrom\n            *label walkawayfrom\n            You start to walk away from the little girl, who looks at your retreating back with her hands on her hips. \"How rude!\" she calls after you. \"Have you no manners? What kind of a monk are you?\"\n\t\t\t\n            But despite her berating, she continues along with you, telling you at every turn that no matter how hard you try, you're going to fail.\n\t\t\t\n            *goto reachthepeak\n  #I roll over in bed and decide I do not have the determination to accomplish the impossible.\n    *achieve wellrested\n    *set zhuge %-15\n    \"You cannot succeed without effort,\" Master Zhuge says quietly. \"Perhaps someday you will learn.\"\n    *goto end\n\n*label cleverchallenge\n*set cleverness %+20\nOne evening, during which you are comparing two accounts of the campaign during the Border War fought between Emperor Da Xiaoten—the grandfather of current Emperor Da Gaozu, the Son of Heaven—and the barbarians of the western plains, Master Zhuge sets up the go board, as has become your custom. This time, however, she sets three chairs around the table.\n\n\"Are we having company?\" you ask.\n\n\"In a manner of speaking,\" Master Zhuge says in her typical cryptic fashion.\n\nAfter arranging the board, Master Zhuge disappears into her room, then returns with a silk bag and heads outside. You follow, curious, and watch as she withdraws a bundle of small flags and arranges them in a circle. She begins to chant in a language that is only vaguely familiar—it sounds like a very old dialect of your own language, with a very different vocabulary—and, after a few moments, the ghost appears. At first he is only a shade, but as Master Zhuge's chanting continues, he resolves into a tall man wearing scale armor over a changshan. A red cloak is draped over his armor, and his helmet is decorated with an equally red feather plume. A well-shaped beard and mustache, flecked with gray, surround a mouth that breaks into a smile when he sees your master.\n\n\"Zhuge Miao,\" he says, sounding like an echo of a once-booming voice. \"Has it been long, my friend?\"\n\n\"Ages,\" Master Zhuge confirms, taking the ghost's hands in her own. \"I have a go player to introduce you to while I tell you stories of the future.\"\n\nThe man looks at you sharply.\n*choice\n  #I bow, in deference to this old friend of my master's.\n    *set honor %+5\n    *set zhuge %+5\n    The ghost returns your bow with a deep nod.\n    \"${name}, this is my old friend, Hong Wei,\" Master Zhuge explains. \"He is a fine go player, and I hope you will offer him some competition.\"\n    She ushers the ghost inside, leaving you to process that you will be playing go against the legendary general.\n    *goto go\n  #I bow, but only slightly. Surely I have greater status than a ghost!\n    *set zhuge %-10\n    *set magic %+5\n    *set cleverness %+5\n    Both Master Zhuge and the ghost look astonished by your disrespect. Clearly, this old spirit is more important than you realized.\n\t\n    \"General Hong Wei, my impertinent student, ${name}. I hope that ${pronounhis} skills at go will impress you more than ${pronounhis} manners.\"\n\t\n    \"Indeed,\" the ghost of the general says, giving you a disdainful glance as Master Zhuge ushers him inside. You take a moment to process that you will be playing go against the legendary general.\n\t\n    Before you go inside, however, you study the ground where Master Zhuge planted her flags. You analyze the pattern, memorizing it. Though you are uncertain how the flow of chi was effected to bring about the summoning, you are sure you could recreate this exact shape if you were called upon to do so.\n    *goto go\n  #I remain frozen in place, unsure how to greet a ghost.\n    *set zhuge %-5\n    *set magic %+10\n    Master Zhuge sighs. \"${name} is new to this type of magic. I am certain once the game starts, you will see the young monk does have wits.\"\n\t\n    The ghost snorts as Master Zhuge gestures him inside. \"I should hope so,\" he says as he passes you. \"Otherwise it will be a poor game.\"\n\t\n    \"Do your best to offer General Hong some competition,\" Master Zhuge says as she passes you, leaving you to process that you will be playing go against the legendary general. After a moment to yourself, you realize that what you have just experienced was not simple intimidation, but a chill of fear from the ghost himself. Now that you have recognized the effect, and having watched Master Zhuge perform the summoning ritual, you have greater insight into the energies she harnessed to accomplish the task.\n    *goto go\n  *if (cleverness > 60) #I bow, recognizing General Hong Wei from his description in the legends.\n    *set honor %+10\n    *set zhuge %+10\n    The general notices the clear respect on your face and returns your bow.\n    \"I see you have recognized my old friend,\" Master Zhuge says warmly. \"Wei, this is ${name}, my student. ${name}, I present to you General Hong Wei.\"\n    \"It is an honor,\" you say, and your admiration, honed by years of studying his feats in combat, is clear.\n    The ghost laughs. \"We will see what you say after I have defeated you at go!\"\n    *goto go\n*label go\n\n\nInside, Master Zhuge offers the ghost her usual seat. She begins to busy herself around the hut in a way that strikes you as more domestic than her typical fashion. \n\n\"You may go first,\" says General Hong.\n\nWhat is your strategy?\n*choice\n  #I play in silence, focused solely on the game, even though this will be construed as rudeness.\n    *set honor %-10\n    *set zhuge %-15\n    *if cleverness > 50\n      Several times, the general tries to engage you in conversation, and you notice Master Zhuge shooting you disapproving looks over the ghost's shoulder, but you are unwilling to let anything distract you from the game.\n\n      Eventually, you win, but it is clear that no one has had very much fun, and that Master Zhuge is ashamed of your social behavior.\n\t  \n      \"Perhaps it is best if we do not have other company,\" she says once she has sent the ghost back to the celestial realms.\n      *goto end\n    *else\n      Several times, the general tries to engage you in conversation, and you notice Master Zhuge shooting you disapproving looks over the ghost's shoulder, but you are unwilling to let anything distract you from the game.\n\n      Worse, you don't even win. General Hong is a master, and though you provide some competition for him, he eventually defeats you. It is clear that no one has had very much fun, and that Master Zhuge is ashamed of your social behavior.\n      *label go3\n      \"Perhaps it is best if we do not have other company,\" she says once she has sent the ghost back to the celestial realms. \n      *goto end\t  \n  #I have been training with Master Zhuge to converse and play at the same time. I can handle the challenge.\n    *set honor %+10\n    *set zhuge %+15\n    *set success +1\n    You place your first piece, then wait politely for the general to draw you into conversation. Once he begins to talk, you are free to ask questions, guiding the discussion toward the events that Master Zhuge has told you about. Master Zhuge soon joins you, adding a second voice of distraction to the game. But while it makes the game more challenging, you realize that even when General Hong has you in a poor position on the board, you are having an incredible amount of fun.\n\t  \n    *if cleverness > 60\n      What's more, you are able to rally. The general is just as distracted as you are, especially given the events that Master Zhuge is catching him up on. General Hong is dismayed by the foreign presence in the Middle Kingdom—after all, he spent years trying to keep out the horse-riding barbarians—but he is scrupulously polite regarding the Imperial Family. You can tell that he believes the intercession of the Emperor is required to align the Middle Kingdom with the will of the Heavens.\n\t  \n      While he is otherwise distracted, you regain control of the board. By the time the general notices, it is practically impossible for him to recover. He almost manages it, but you press him, surrounding his pieces for the ultimate win.\n      *set zhuge %+5\n      *label go2\n      *achieve gomaster\n      General Hong remains for conversation after the game, but eventually, Master Zhuge returns him to the celestial realms. It is clear that none of you really wanted the evening to end.\n\t  \n      When Master Zhuge returns with her silk bag, she looks at you, clearly pleased.\n\n      \"I believe we can have company more often,\" she says.\n      *if success = 3\n        *goto end\n      *else\n        \"I also believe that you are ready for lessons on an additional topic. What else would you like to learn?\"\n        *goto education\n    *else\n      Even though you are unable to rally, and General Hong soundly defeats you, it is clear that everyone is pleased by how the evening went.\n      *goto go2\n  #I study General Hong's expressions, trying to draw him into storytelling and conversation that will distract him from the game.\n    You place your first piece, then wait politely for the general, who—for the purposes of the evening at least—outranks you, to draw you into conversation. Once he begins to talk, you are free to ask questions.\n    *if enlightened > 50\n      *set zhuge %+15\n      While you might be inclined to keep him engaged on topics from his own life, it is clear from the way he reacts to your questions and to comments from Master Zhuge that he is far more interested in current events. General Hong is dismayed by the foreign presence in the Middle Kingdom—after all, he spent years trying to keep out the horse-riding barbarians—but he is scrupulously polite regarding the Imperial Family. You tell him of your own campaign—small though it was—at Kuei Xian and ask what he would have done.\n\t  \n      The puzzle of the bandits—and what he would do to confront both them and the foreigners were he the current Imperial General—captivates him utterly. So utterly that he does not notice your command of the board, or how quickly you are surrounding his pieces. When he eventually realizes what has happened, he laughs.\n\t  \n      \"Miao, your student has distracted me!\" he complains good-naturedly.\n\t  \n      \"Didn't you always tell me that distractions are an inevitable part of battle?\" she asks, mischief clear in her voice.\n\t  \n      \"So I did,\" he answers, finishing the game to his inevitable defeat.\n      *set success +1\n      *goto go2\n    *else\n      Unfortunately, the general's expressions are incredibly difficult to read, even after he has removed his helmet. Worse, he seems to notice the way you are trying to steer conversation and looks annoyed by the gambit.\n\t  \n      He wins, and the awkward conversation means that no one has had a particularly good time.\n      *goto go3\n\t  \n*label poemchallenge\n*set enlightened %+20\nOne evening as you are practicing calligraphy, Master Zhuge returns to the hut from an errand, and you realize that she is carrying wine skins. You have never seen Master Zhuge drink alcohol—in fact, you have actually seen her ingest little other than tea and herbal compounds, which you have heard is one of the ways a person may become immortal—so this comes as a surprise.\n\n\"Are we having company?\" you ask.\n\n\"Yes,\" Master Zhuge says, setting a third chair at the table where you drink tea together. \"A friend of mine will be staying with us this evening, and I suspect he will want plenty to drink while he is here.\" She gestures to the several skins. \"You may have some as well, of course.\"\n\nYou are curious about her guest, but she says no more, vanishing into her room until, hours later, there is a knock on the door of her hut. She goes to the door, a far cry from the crotchety old woman who answered for you the first night you met her: she has piled her hair into an elaborate coif and she wears a beautifully brocaded qipao, looking every bit like a noble woman rather than a hermit.\n*page_break\n\"Miao!\" a man's voice booms when she opens the door, and it sounds clear to you that he has already had a bit to drink. \"It has been far too long!\"\n\n\"Then you should visit more often, you old fool,\" Master Zhuge says, but her voice is playful, and she ushers her guest inside. \n\nHe is a huge man who wears a long robe with wide sleeves, and a tunic draped on top of it. A waist-sash surrounds his enormous girth, and a scholar's cap crowns his head. He sees you and starts in surprise. \"And who is this, Miao? A new student?\"\n\n\"Pai, this is ${name}, who is studying poetry with me. ${name}, allow me to present Li Pai.\"\n\nThe large man bellows a laugh. \"A poet! I hope Miao has actually let you write something down, young pupil. She is notorious for keeping everything in her head.\"\n\n*choice\n  #I bow politely to Master Zhuge's guest.\n    *set honor %+5\n    *set zhuge %+5\n    The man bows back. \n    *goto poetry2\n  #I laugh and admit that I have not yet written any poetry down while studying under Master Zhuge, but insist that she is a fine teacher.\n    *set honor %+10\n    *set zhuge %+10\n    \"You see?\" Master Zhuge says, a touch defensively. \"Your school is not the only one, Pai.\"\n    *goto poetry2\n  #I am intimidated by this man and scared stiff at the notion of discussing poetry with him.\n    *set honor %-5\n    *set zhuge %-5\n    \"Intimidated, I see?\" says Li Pai. He claps you on your shoulder. \"Don't worry. I'm used to it.\"\n\n    Master Zhuge, however, looks disappointed that you have not made more of an effort to honor her guest.\n    *goto poetry2\n  *if (enlightened > 50) #I bow deeply to the poet. I recognize his name from the legends; he, like Master Zhuge, is considered an immortal.\n    *set honor %+10\n    *set zhuge %+10\n    \"I am greatly looking forward to hearing a performance of the Immortal Poet,\" you say.\n\t\n    Li Pai thunders another laugh. \"An admirer! I am delighted. You have taught your pupil well, Miao, to instill such fine taste.\"\n\t\n    Master Zhuge sighs. \"Another reason you should visit more often,\" she says. \"Your head gets too swelled if you are left to your own devices.\"\n\t\n    Li Pai grins broadly and doesn't argue.\n    *goto poetry2\n\n*label poetry2\n\"Let us speak of poetry! But first, Miao, tell me that you have brought me wine.\"\n\n\"Of course,\" says Master Zhuge, handing her guest the first of, you suspect, many wine skins to be drunk that night.\n\nLi Pai begins to launch into his own poetry, and Master Zhuge responds with her own, some that you recognize from the work of hers that you have already heard and read, and some that sounds extemporaneous, but no less sophisticated. After you have listened to the exchanges for some time, it is clear that, in order to participate in this evening, you will need to contribute some poetry of your own.\n*choice\n  #I am happy just to be in the presence of two such gifted poets. I will let it all sink in.\n    *set zhuge %-15\n    You listen for hours, it seems, as Li Pai drains the wine skins Master Zhuge brought. They both look to you from time to time to see if you will join in, but they make no move to force you to do so. \n    *label poetry3\n    Eventually, Master Zhuge announces that it is time to retire, and the two poets wish you a good night.\n\t\n    The next day, Li Pai leaves, wishing fond goodbyes to Master Zhuge. He also presents you with a collection of his poems, encouraging you to keep trying—to gain confidence in yourself and your words in order to become a better poet.\n\t\n    You resume your studies with Master Zhuge, but she never again mentions inviting a fellow poet back to the hut.\n    *goto end\n  #I am confident that I will be able to create extemporaneous poetry.\n    *set zhuge %+15\n    *if enlightened > 60\n      *set success +1\n      *achieve poet\n      You add to the conversation slowly at first, using your hours in the clearing to call up appropriate imagery to reflect the emotional tone of the conversation. And as the poets accept your contributions, your confidence grows. Soon, you are spouting poetry as though you have been doing it all your life.\n\t  \n      Many wine skins later and far after the moon has set, Master Zhuge announces that it is time for the evening to come to an end. Your two fellow poets wish you a good night, and you dream in verse.\n\t  \n      Li Pai stays for several more days before returning to the road, and you bask in the poetry of the household. You continue your practice of calligraphy and meditation while the poet is at the house—he sleeps the majority of the day and does not miss your presence—and spend the evenings engaging with the two masters of the art, honing your skill. When Li Pai eventually has to leave, he encourages you to write down some of your poems, despite Master Zhuge's training.\n\t  \n      To your surprise, Master Zhuge agrees. \"I think it is time that you commit some works to paper,\" she says after her friend has gone.\n      *if success = 3\n        *goto end\n      *else\n        \"But I think we can find some time for things other than poetry as well, my student, if there are other things you wish to learn.\"\n        *goto education\n    *else\n      You attempt to add bits and pieces of poetry to the conversation, but your lack of confidence in your own words undermines you. Each verse falls flat, and soon, you stop interrupting the flow of poetry and simply listen to the two masters, disappointed by your own inability to keep up.\n      *goto poetry3\n  #I am uncertain about creating my own poetry, but I rely on my memory of older poems to add to the conversation.\n    *set zhuge %+10\n    *if cleverness > 50\n      *set success +1\n      *achieve poet\n      Unsure of your own poetic voice, you are confident in applying the voices of others. At appropriate moments, you quote passages from the poems you grew up learning—stories of heroes and sages, descriptions of the change of seasons or the lonely life of a wanderer. Each of the poems is familiar to the two master poets, and they seem pleased with your ability to apply the verses to the ongoing conversation. After a little while, you begin to recognize that Master Zhuge and Li Pai are also quoting other, older poems, and the evening turns into a challenge of stringing one old poem into another, seamlessly.\n\t  \n      Li Pai stays for several more days, and though he sleeps until late in the afternoon, he offers you advice on creating your own poetry and finding your confidence as a poet. When he eventually has to leave, he expresses his hope that one day, he will read original poems by ${name}.\n\t  \n      \"I will say that I was there when the poet was still only a monk!\" he declares.\n      *if success = 3\n        *goto end\n      *else\n        Master Zhuge, too, acknowledges that you have talent, but suggests that it may be time to expand your training. \"We can continue to work on poetry,\" she says, \"but surely there is something else I can teach you.\"\n        *goto education\n    *else\n      You attempt to add bits and pieces of poetry to the conversation, but you quickly lose confidence in your memorization skills. You keep combining poems together that you remember imperfectly, and the verses fall flat. Soon, you stop interrupting the flow of poetry and simply listen to the two masters, disappointed by your own inability to keep up.\n      *goto poetry3\n*label end\n*page_break\nAfter you have studied with Zhuge Miao for two years, your teacher once again asks you to sit with her for tea. \"I have decided to go away for a time,\" she announces. \"I have been in touch with Master Shen at the Order of the Peach Tree, and I understand that you are to remain in the Kuei Xian region. I would offer you my humble home,\" she says with a gesture around the room, \"but I am afraid it is not quite the same when I am not here.\"\n\nYou have noticed strange properties of the building—the way it seems to hold more than it should, that furniture seems to move out of Master Zhuge's way, that the windows darken against the sun or brighten on cloudy days—and are unsurprised that it, like Master Zhuge, is more than natural.\n\n\"I have arranged for you to have a small house on the edge of Kuei Xian,\" she continues. \"It should have enough space for you to continue your training, as well as live in comfort. My friend Feng will see to it that you have everything that you need.\" She sees your expression of surprise and continues with a smile. \"Feng is a huli jing—a fox spirit—but she has been my trusted companion for many years. She will not take you down the foxhole unless you either wish it or become very, very foolish.\"\n\n*if met_feng\n  Clearly Master Zhuge is unaware of your previous interactions with the fox spirit—which, you suppose, is just as well.\n\n*if zhuge > 80\n  Master Zhuge puts her tea cup down, looking older than she has in the whole time you have known her. \"My student,\" she says, \"the truth is that even I will not live forever. You have learned much from me—as much as any single one of all the students I have taught in my years as a master—and I have decided to make you my heir. If you accept, you shall be considered a member of the Zhuge family, and the heir to the Zhuge style of kung fu. Will you accept this responsibility?\"\n  *choice\n    #Yes, of course! It is a great honor.\n      *achieve heir\n      *set surname \"Zhuge\"\n      *set name (surname & \" \")& firstname\n      *set style \"Zhuge\"\n      *set status %+30\n      *set honor %+10\n      Master Zhuge smiles. \"It is settled then, ${name}. Use what I have taught you wisely, and perhaps, one day, we will meet again.\"\n      *goto endfinal\n    #I do not want that responsibility. I must decline.\n      Master Zhuge nods sadly. \"Then it was not meant to be. I hope I will find another student like you!\"\n      *goto endfinal\n*else\n  *goto endfinal\n\n*label endfinal\nIt seems that your time of study under Master Zhuge has come to an end, but that your years away from the Order continue.\n*finish Chapter Four: Kuei Xian\n", "question": "*advertisement\n\nYou have learned, in all your years as a student, as a monk, and as a teacher that life contains surprises. Sometimes the thing that you most wanted is the thing most likely to set you back on the path to your goals. Sometimes those goals must be set aside to fully live the life in front of you. There are moments when you must simply be, existing in a time and space that will never again occur. Other times, you must act, fulfilling the role that has been placed before you. These are the thoughts that enter your mind as you travel with a group of the monks of the Order of the Peach Tree to Xiaxue Mountain. \n\nMore than twenty years have passed since you first became a monk, and the Order is celebrating the hundredth year: the day when the Dragon Sage descends to the top of Xiaxue Mountain is almost here. You are among the candidates to be chosen to greet the Dragon and ask a question.\n\n*choice\n  #I may be eligible, but I am happy with my life. I would rather someone else ask the Sage a question than risk a life-changing event.\n    Your life, right now, is complete. Though you accomplished your youthful goal to be among those to journey to the Dragon Sage—and, quite possibly, succeeded at becoming the one monk chosen by the Order—you have withdrawn yourself from the candidates. Instead, you recommend Yang Lifong, a younger woman who was recently made a monk, and who has been studying with you for the past two years as part of her time spent away from the monastery. Though she is still a new monk compared to the rest of you, you see that as a benefit—she is still seeking to perfect her art, and to learn, but she has also not created a life for herself that she would be unwilling to give up, if that is what the Dragon Sage demands.\n\t\n    When she is chosen for the honor, you are delighted. \n    *label lifong\n    You and the other monks wait far below the peak of Xiaxue Mountain as Yang Lifong journeys to the top. You watch as the form of the Dragon Sage spirals down from above the clouds and settles on Xiaxue's peak. And as you wait below for her return, two days after her journey first began, you see the skies open and not one, but two dragons fly back into the Heavens. You know then that Yang Lifong will not be returning—and that whatever question she asked has been answered.\n    *goto_scene ending\n  #I am still concerned about issues of this world, and know that the Dragon Sage will have the answers I crave.\n    *set tenacity %+5\n    Your concerns are of the worldly kind, and thus you are certain that, however your life may change after you speak with the Dragon Sage, the aspects of your life that you care about will remain. You are determined to carry through on your original goals.\n    *goto lottery\n  #I have led a good life, but I am ready to leave everything behind if that is what the Dragon Sage requires.\n    *set enlightened %+5\n    Whatever happens next, you are prepared to face it. As you learned from Master Shen so long ago, do not worry over the past or fear the future: exist in the moment. If you are the one chosen to question the Dragon Sage, you will do the Order proud.\n    *goto lottery\n\t\n*label lottery\n*if status > 70\n  *if honor > 55\n    *if fighting > 70\n      *set chosen true\n      *goto chosen\n    *else\n      *if magic > 70\n        *set chosen true\n        *goto chosen\n      *else\n        *goto lifong1\n  *else\n    *goto lifong1\n*else\n  *goto lifong1\n  \n*label lifong1\nBut your decision about whether or not to stay in the running for the chosen monk turns out to be a moot point. You are surprised when a young woman who has been a monk for only a few years is chosen for the honor. Yang Lifong is an impressive monk, you agree, and her status from a noble family and her reputation of undeniable honor—as well as her clear skill as a fighter and her control of her chi—make her a solid choice. You are just taken aback that Abbot Bao selected someone so young to represent the Order.\n\n*goto lifong\n\n*label chosen\n*achieve chosen\nAnd thankfully, you came to terms with your eligibility just in time. Abbot Bao, who has traveled with the group of monks, draws you aside.\n\n\"${name}, you have proven yourself to be honorable, and you have gained the respect of the Middle Kingdom. The Order has chosen you to represent us in speaking to the Dragon Sage. Will you accept this task on our behalf?\"\n\nYou bow solemnly, as the occasion requires. \"Yes,\" you say, and are pleased with the clarity of your voice in this important moment.\n\nAbbot Bao returns your bow. Then he surprises you by clapping you on both shoulders and looking at you with tears at the corners of his eyes.\n\n\"You have made me proud, my student,\" he says.\n\nEmotion threatens to overwhelm you as well, but instead you heft your climbing gear on your shoulder, squeeze the old abbot's hand, and begin your climb up the mountain.\n*page_break\nThough monks have been climbing Xiaxue for centuries, the path is a difficult one. You think back to something Master Zhuge once told you about mountain climbing—that it is important to think only of the next step, and that soon you will reach the top—and it makes you smile. You wonder now where the Veiled Dragon may be, and whether she is still writing poetry.\n\nYou think for a moment that you see a flash of red—like the tail of a fox—against the mountain snow, but when you look, it is gone. \n\nThe way is cold, and the air is thin, but you go at a steady pace, and the activity keeps your body warm. You reach a large cave near the peak, which provides you with shelter against the wind, just as you see a thin shape spiraling down from the Heavens. Though the sky is covered in clouds, every once in a while, light catches off the yellow scales of the Dragon Sage, who grows larger with every heartbeat. The dragon's head is like a camel; its legs end in paws like a tiger's, with each toe capped in an eagle's claw. As it comes closer, you see its belly is like a clam, its neck is like a snake, and on its head are cow's ears, deer's horns, and demon eyes. The Dragon Sage descends, and its scales remind you of those of a carp, catching the glimmer of sunlight through the clouds as a fish's scales gleam beneath the water's surface. You had heard all of these qualities before—scholars have catalogued dragon bodies down to the number of scales—but seeing the combination in person is breathtaking.\n\nAs the Dragon Sage lands next to you, you find yourself holding your breath in awe. The dragon chuckles. \"Greetings, monk,\" it says, in a voice that sounds like the rumble of thunder. You can feel it vibrate in your chest. \"The time has come for you to ask me a question.\"\n\nThe moment has come. Long ago, you chose a question, but many years have passed, and you have grown and changed. With what you now know about the world and what you know about yourself, what question will you ask?\n*choice\n  #How can I become the greatest warrior in the world?\n    The Dragon Sage's huge body coils around behind you, reminding you of a dragon-style technique you learned long ago, but never saw how to apply. In a flash of insight, you now realize how that technique is meant to be used.\n\t\n    \"You are already a great fighter,\" the Dragon Sage rumbles. \n    *label imperial1\n    *if champion\n      \"You are better than great: you are the Imperial Champion.\n      *goto imperial2\n    *else\n      \"\n      *goto imperial2\n    \n  #How can the Empire return to Heaven's Favor?\n    *if tianxia > 60\n      The Dragon Sage's laugh shakes snow from the cave's roof, and sends it tumbling down outside the door. \"Little monk,\" it chortles, \"you have already returned the Middle Kingdom to the favor of Heaven! With every choice you have made, you have restored that balance. You have regained tianxia.\"\n\t  \n      The word the Dragon Sage uses—under heaven—means the entire world; you believe the Dragon Sage means that the world, in both physical and metaphysical aspects, has aligned to once again be a single entity.\n\t  \n      \"But balance can always be tipped, and thus your job is far from over, little monk.\" The Dragon Sage places one of its huge tiger paws on your shoulder, and you feel each of the four eagle talons as they gently rest on your skin. \n      *if champion\n        \"You are already the Imperial Champion, giving you a voice in the Imperial Court. \n        *goto imperial3\n      *else\n        \"\n        *goto imperial3\n    *else\n      The Dragon Sage looks at you earnestly. \"There is much work to do before the Middle Kingdom can once again regain the favor of Heaven. But perhaps there is still time to regain tianxia.\"\n\t  \n      The word the Dragon Sage uses—under heaven—means the entire world; you believe the Dragon Sage means that the world, in both physical and metaphysical aspects, has aligned to once again be a single entity.\n\t  \n      \"You must take a role in the world and make your work to restore balance known, little monk.\" \n\t  \n      The Dragon Sage places one of its huge tiger paws on your shoulder, and you feel each of the four eagle talons as they gently rest on your skin. \n      *if champion\n        \"You are already the Imperial Champion, giving you a voice in the Imperial Court. \n        *goto imperial3\n      *else\n        \"\n        *goto imperial3\n\t  \n  #What is the first question?\n    The Dragon Sage's demon eyes stare deeply into yours, and you can see your reflection dancing in them. \"I have waited for a long time for someone to ask that question,\" it rumbles.\n\t\n    The shared gaze becomes something like the mental combats you have practiced, but this is no fight, no challenge of wills. It is an invitation, and at once, you see the questions that the Dragon Sage has been asked over the years. You begin to understand what wisdom can be found in asking questions—and in listening to what is asked—rather than in simple answers. The knowledge floods you until you feel as though you are overflowing, pouring out of your body because it cannot contain the vast stores of wisdom you are receiving. All the questions that have ever been asked flow through you and around you like water.\n\t\n    When the flood ends, you realize that your reflection in the Dragon Sage's eyes shows the head of a camel, with the antlers of a deer and yellow scales that shimmer in the sunlight. The Dragon Sage in front of you begins to shimmer and dissolve into light. And you know that in a hundred years, you will return to this cave to answer the question of another monk.\n\t\n    And in listening to that question, you will learn something more about wisdom.\n    *goto_scene ending\n  #Why do kites fly?\n    The Dragon Sage's demon eyes blink. \"From such koans is enlightenment found,\" it says, and its voice seems to send the whole world shaking. \"Little monk, kites fly because they wish to.\"\n\t\n    You accompany the Dragon Sage to the cave's mouth, and you survey the land below you. From here, you can see tianxia—all the world under heaven.\n\t\n    From here, you can fly.\n\t\n    \"Go,\" says the Dragon Sage, its breath filling you with divine energy. You step forward into nothing.\n\t\n    And then you fly.\n    *goto_scene ending\n\t\t\n*label imperial2\nBut to become the greatest warrior, you must have a great cause. How would you use such ability?\"\n*label greatestfighter\n*choice\n  #I would rid the Middle Kingdom of the foreigners to restore the glory of the Empire.\n    *set fighting 100\n    *set magic 100\n    The Dragon Sage nods its huge head. \"I see by the heat in your eyes that you believe in this cause with passion. I will train you for nine days and nine nights, and when you descend, the foreigners will tremble at your might.\"\n\t\t\n    Nine days and nine nights pass by with no sleep and no food, but you find that you need neither of these things. The Dragon Sage is sustaining you with its divine breath, and as it teaches, you are learning. You had thought yourself advanced before; now you see whole doors of the universe opened before you, in the arts of magic and of physical combat. Your training feels as though it has just begun, but at the same time, it feels as though it has been going on your whole life.\n\t\t\n    \"You have the keys,\" the Dragon Sage says finally. \"Go open the doors.\"\n\t\t\n    When you return to the other monks, they can see the change the Dragon Sage has wrought in you. \"I am going now to defeat the foreigners,\" you say, and though it is clear you mean to do this single-handedly, none of them show the slightest doubt. You see the future before you, and though you know it will take time, you also know that you will drive the foreigners from the Middle Kingdom, and that all the world will know your name.\n    *goto_scene ending\n  #The highest cause is the art of battle itself. I would become a wandering warrior, accepting all challenges.\n    *set fighting 100\n    *set magic 100\n    The Dragon Sage nods its huge head. \"I see by the heat in your eyes that you believe in this cause with passion. I will train you for nine days and nine nights, and when you descend, the foreigners will tremble at your might.\"\n\t\t\n    Nine days and nine nights pass by with no sleep and no food, but you find that you need neither of these things. The Dragon Sage is sustaining you with its divine breath, and as it teaches, you are learning. You had thought yourself advanced before; now you see whole doors of the universe opened before you, in the arts of magic and of physical combat. Your training feels as though it has just begun, but at the same time, it feels as though it has been going on your whole life.\n\t\n    \"You have the keys,\" the Dragon Sage says finally. \"Go open the doors.\"\n\t\t\n    When you return to the other monks, they can see the change the Dragon Sage has wrought in you. \"If anyone wishes to prove themselves the greater warrior, let them come,\" you say. None of the monks accept your challenge, instead staring at you with something akin to awe. You see the future before you: you will wander in the wilderness, subsisting on the energy of the universe as the Dragon Sage has shown you. You will become an immortal, and warriors will seek you out, both to challenge you and to study at your feet. Your name will go down in legend.\n    *goto_scene ending\n  *hide_reuse *if (style = \"Celestial Sword\") #I would rule the Middle Kingdom as a just Emperor, whose might no one would question.\n    *if tianxia > 70\n      The Imperial throne is your birthright; you long to claim your place in the Middle Kingdom without suffering through the endless politics. Being the greatest warrior in the world would prove that you were the Chosen of Heaven and the rightful heir.\n      *set fighting 100\n      *set magic 100\n      The Dragon Sage nods its huge head. \"I see by the heat in your eyes that you believe in this cause with passion. I will train you for nine days and nine nights, and when you descend, the foreigners will tremble at your might.\"\n\t\t\n      Nine days and nine nights pass by with no sleep and no food, but you find that you need neither of these things. The Dragon Sage is sustaining you with its divine breath, and as it teaches, you are learning. You had thought yourself advanced before; now you see whole doors of the universe opened before you, in the arts of magic and of physical combat. Your training feels as though it has just begun, but at the same time, it feels as though it has been going on your whole life.\n\t\n      \"You have the keys,\" the Dragon Sage says finally. \"Go open the doors.\"\n\t\t\n      When you return to the other monks, they can see the change the Dragon Sage has wrought in you. \"The Heavens have blessed me to become the next Emperor,\" you say. Your fellow monks begin to bow, but you stop them. \"I am not the Emperor yet, my friends. And we have a long way down the mountain to travel together.\" As your journey begins, you see the future before you: you will arrive in Xiaonanhai and be greeted warmly, then will navigate the Imperial Court through sheer force of will until the time comes for you to sit on the throne. Your succession will be unchallenged—and you will bring years of prosperity to the Middle Kingdom.\n      *goto_scene ending\n    *else\n      The Dragon Sage shakes its huge head. \"Though the blood of the Imperial family runs through your veins, y
