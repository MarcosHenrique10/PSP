 the superior fighter. Since you do not wish to face me in real combat, let us end this now, without wasting any more of my time.\"\n          *choice\n            #I will give him the fight he wants.\n              *set sunan %+10\n              \"I will not give up that easily,\" you declare, and move into a position to start the fight again.\n\n              \"Good,\" Sun An says, his broad smile made crooked by his long scar.\n\t\t\t  \n              What will you do?\n              *goto betterthanme\n            #I tell him that though he is the better fighter, his lack of understanding proves he is no master.\n              Sun An growls at this insult. \"Understand my blades, ${name}, and we will see who triumphs.\"\n\t\t\t  \n              The tall warrior moves to attack. What will you do?\n              *goto betterthanme\n            #He is right. I concede the fight.\n              At your concession, the audience below gasps in astonishment. You and Sun An agree to meet back at your school in a few hours to discuss the terms of your concession. Your students glumly follow you back, and all too soon, Sun An is there in your dining room, wearing a gloating expression.\n              *goto sunanungracious\n      *else\n        Despite your efforts to engage him, Sun An does not let up the attack, and in the mind battle, you find yourself defeated, Sun An's swords locked around your neck.\n        *goto concede\n*label edge\n\nPart of the challenge of the tower is that it is such a confined space, with the potential for death waiting over the edge. You are confident of your ability to stay on the tower, even when skirting the edge, and you think your best bet against Sun An is to face him, not straight on, but with the advantage of gravity on your side.\n\nWhat is your technique?\n*choice\n  #I attack, driving him to the edge.\n    You come on strong, swinging aggressively and putting Sun An on the retreat. But Sun An has a reputation for being an aggressive fighter as well, and he pushes back, keeping you from driving him successfully.\n    *if fighting > 63\n      Suddenly, his strategy shifts. You continue to see openings, and you realize he is allowing you to drive him to the edge. Based on your read of his body language, he intends to tempt you into an aggressive move right at the edge. His feet touch the edge and he throws you a look of false terror. His head and shoulders are unguarded.\n      *choice\n        #I spring his trap. He will not be able to pull me off balance.\n          *if weapon = \"guan dao\"\n            You swing down at his head, using only half your strength, because you know he will counter your move at the last minute. Fast as lightning, his swords block your strike, catching the guan dao and yanking it from your hands. \n            *if fighting > 75\n              But you have already let go, and his own momentum, aided by your kick to his chest, sends him toppling back over the edge. He drops his swords and reaches out as he falls, the weapons clattering to the ground and Sun An's body making a satisfying thump as he catches the scaffolding and climbs back up.\n              *set sunanwounds +2\n              *set disarmed true\n              *if trap\n                As he climbs, a thread of the trap you left behind you slices his skin deeply, and blood pools on his arm as he continues his climb.\n                *set sunanwounds +1\n                *goto slam\n              *else\n                *goto slam\n            *else\n              You had intended to let go of the guan dao before the momentum could carry you forward, but Sun An is too fast, and you stumble to the edge.\n              *label fall\n              *choice\n                #Grab Sun An and take him over with me.\n                  Your hands free of the ${weapon}, they connect with Sun An's belt and yank him over the side with you. The two of you topple over, weapons clanging to the ground below as you both reach for the scaffolding. You catch, and the impact stings, but you are still in the game. Sun An has dropped a few feet below you, and you race to the top.\n                  *set sunanwounds +2\n                  *set wounds +2\n                  *set disarmed true\n                  *if trap\n                    As he climbs, a thread of the trap you left behind you slices his skin deeply, and blood pools on his arm as he continues his climb.\n                    *set sunanwounds +1\n                    *goto slam\n                  *else\n                    *goto slam\n                #Catch the edge before I go over.\n                  *if tenacity > 65\n                    Your hands free of the guan dao, you grab the edge of the platform and hold yourself up, using your raw willpower and strength to keep from impacting. Sun An makes a move to stomp on your hands, but instead, you catch his leg and use it to pull yourself up. He lands a blow with the pommel of his sword in your ribs as you recover your footing, but you are back atop the platform and ready to face him.\n                    *set wounds +1\n                    *goto slam\n                  *else\n                    You reach for the edge, and though your fingers connect, they skitter off the side, and you are unable to catch the platform. You slow your fall on the scaffolding, then quickly climb back up, ignoring the complaints in your hands and arms.\n                    *set wounds +2\n                    *goto slam\n                #Leap for one of the posts, using my chi to give me the distance I need.\n                  *if magic > 65\n                    You turn your stumble into a leap at the last instant, and you land, hard, on one of the tall posts near the top of the platform. You run back along the posts until you are at the edge of the platform again, ready to meet Sun An's next attack.\n                    *goto slam\n                  *else\n                    You leap, but you are enough off balance that you miss the post with your feet, instead catching it with your body. You cling to it, holding on for a moment until you can right yourself and climb the poles back up to the top of the platform. You ignore your aching ribs—one of which you suspect may have broken on the impact—and prepare to meet Sun An's next attack.\n                    *set wounds +2\n                    *goto slam\n          *else \n            You chose a weapon that could be used close or at a distance for a reason. Rather than charging forward, you throw your ${weapon} at his unprotected face, and are unsurprised when he bats it out of the way, his swords flashing in a blur of speed.\n            *if fighting > 75\n              But because you anticipated it, you already have a follow-up move. With a flick of your wrist, your ${weapon} is back in his face again, and because he has not prepared for the follow-up strike, he has no chance but to step back—onto nothing. You close the distance between you with a kick, and he drops his swords as he falls. The weapons clatter to the ground and Sun An's body makes a satisfying thump as he catches the scaffolding and climbs back up.\n              *set sunanwounds +2\n              *set disarmed true\n              *if trap\n                As he climbs, a thread of the trap you left behind you slices his skin deeply, and blood pools on his arm as he continues his climb.\n                *set sunanwounds +1\n                *goto slam\n              *else\n                *goto slam\n            *else\n              Although you anticipated his block, you did not prepare for him to follow up with his own strike. He closes the distance between you and, rather than striking with his swords, hooks a kick to the back of your knee. You stumble, and he spins into a second kick, this one sending you hurtling toward the edge. You drop your ${weapon} to free your hands.\n              *goto fall\n        #I sweep his legs out from under him.\n          *if fighting > 75\n            This is a move he is not expecting, and he stumbles back over the edge. Sun An drops his swords and reaches out as he falls, the weapons clattering to the ground and his body making a satisfying thump as he catches the scaffolding and climbs back up.\n            *set sunanwounds +2\n            *set disarmed true\n            *if trap\n              As he climbs, a thread of the trap you left behind you slices his skin deeply, and blood pools on his arm as he continues his climb.\n              *set sunanwounds +1\n              *goto slam\n            *else\n              *goto slam\n          *else\n            He anticipates this move, leaping over your sweep and getting behind you to kick while you are still off balance. You drop your weapon, knowing you are about to go over the edge.\n            *goto fall\n    *else\n      Suddenly, his strategy changes, and you take advantage, pressing harder until you realize abruptly that he is the one who has lured you in. Too late, you pull back on an attack, but he slaps your back with the flat of his sword, making it impossible for you to keep your balance. You drop your weapon, knowing you are about to fall.\n      *goto fall\n  #I remain grounded, then send waves of energy blasting at him, forcing him back.\n    *if magic > 70\n      Rather than engage Sun An, you fall into a circle walk, always staying just out of the range of his strikes, or deflecting with soft blocks when one comes too close. He looks infuriated by his inability to hit you, which plays into your plan. You keep at the center, and after several passes in which he makes no contact with his blades, he charges at you.\n\t  \n      You shout, your hands shooting out, fingertips touching so they appear to form a circle, letting loose a wave of energy that causes Sun An to stumble backwards, right over the edge. He drops his swords and reaches out as he falls, the weapons clattering to the ground and his body making a satisfying thump as he catches the scaffolding and climbs back up.\n      *set sunanwounds +2\n      *set disarmed true\n      *if trap\n        As he climbs, a thread of the trap you left behind you slices his skin deeply, and blood pools on his arm as he continues his climb.\n        *set sunanwounds +1\n        *goto slam\n      *else\n        *goto slam\n    *else\n      You intended to circle walk out of the range of his strikes, but despite your best efforts, he sticks to you, and soon, all your attention is focused on simply maintaining your defenses. You are caught unaware when you realize he has driven you to the side, your heels sticking out over the edge. You know you are about to fall, so you drop your weapon.\n      *goto fall\n  #I dance along the edge, tempting him to overcommit and tumble over the side.\n    You have practiced on this platform many times, and you could walk the edge with your eyes closed if required. You use that memorized skill now, taunting Sun An with both your movements and your words—insulting his style, his balance, his skill, and his swords.\n    *if cleverness > 63\n      You seem to have hit a nerve. Sun An charges at you and you sidestep, watching his expression shift as he realizes he is going to fall. He drops his swords and reaches out as he falls, the weapons clattering to the ground and Sun An's body making a satisfying thump as he catches the scaffolding and climbs back up.\n      *set sunanwounds +2\n      *set disarmed true\n      *if trap\n        As he climbs, a thread of the trap you left behind you slices his skin deeply, and blood pools on his arm as he continues his climb.\n        *set sunanwounds +1\n        *goto slam\n      *else\n        *goto slam\n    *else\n      Your tricks and taunts seem to have no effect on Sun An, however. Instead, he brings the fight to the edge and keeps it there, seemingly as comfortable with the nothingness next to you as you are. Then it happens: he makes use of an opening you hadn't meant to provide, and when you dodge his sword, you lose your balance. Knowing you are about to fall, you drop your weapon.\n      *goto fall\n\t  \n*label slam\nThe pair of you clash and clash again, leaving blood and bruises on each other's bodies. The fight takes on such a high speed—your feet performing check kicks and blocks as he tries to stomp through your feet, your arms a flurry of motion as you try to catch each other off guard—that you would be surprised if anyone below can follow it.\n\n*if disarmed\n  *goto slam2\n*else\n  Eventually, you disarm him, and he relieves you of your weapons, so you are matched fists to feet, nothing but you and your bodies to fight with.\n  *goto slam2\n  \n*label slam2\nSun An charges at you and runs straight into your arm, outstretched in an iron pipe. As he falls backward, you follow him with an axe kick. He rolls out of the way, but your kick shatters the edge of the platform and sends tremors into the scaffolding below. The platform tilts precariously as one stabilizing corner collapses.\n*choice\n  #I keep my ground. A little tilt of the platform won't dissuade me.\n    *if tenacity > 63\n      You plant your feet, sticking to the platform even as it tilts. Sun An slides, then regains his feet and darts toward the edge of the platform that is not collapsing. Seeing that you have maintained your position, he hurtles toward you, but you send a flurry of leopard punches into the center of his body, striking nerves all the way down.\n      *set sunanwounds +2\n      *if sunanwounds > 4\n        Disoriented from your attack, Sun An slides toward the broken edge of the platform. The fall is likely to kill him if he doesn't regain control.\n        *label sunanwounded\n        *choice\n          #I let him fall.\n            Sun An tumbles down, trying to catch himself by grabbing onto the scaffolding. The scaffolding, already weakened, continues to tremble, and another side snaps. The tower begins to collapse around you.\n            *set sunanwounds +1\n            *choice\n              #I navigate the scaffolding that is still solid to reach the bottom safely.\n                One side of the scaffolding is still solid; you hurry down to the bottom and to safety, unconcerned about the fate of your opponent. After another moment, the rest of the tower shatters, with Sun An somewhere in the rubble.\n                *if match = \"death\"\n                  Good thing you signed those death waivers.\n                  *if sunanwounds > 5\n                    *goto winsundead\n                  *else\n                    *goto winliving\n                *else\n                  *if sunanwounds > 5\n                    *goto winsundead\n                  *else\n                    *goto winliving\n              #I leap down the spiral posts to reach the bottom safely.\n                *if magic > 50\n                  It takes you no time at all to run down the posts and get to the bottom, so you watch the tower collapse at your leisure. Sun An is still only halfway down the scaffolding when the whole structure collapses.\n                  *if match = \"death\"\n                    Good thing you signed those death waivers.\n                    *if sunanwounds > 5\n                      *goto winsundead\n                    *else\n                      *goto winliving\n                  *else\n                    *if sunanwounds > 5\n                      *goto winsundead\n                    *else\n                      *goto winliving\n                *else\n                  You run down the posts, but you also slip and fall. You hurtle toward the ground, unable to catch yourself.\n                  *set wounds +2\n                  *if wounds > 5\n                    *if match = \"death\"\n                      As you plummet below, you wonder whether choosing a fight to the death was the smartest move you could have made. If your earlier wounds had been shallower, in keeping with the spirit of the terms, perhaps the impact on the ground would not end in your death….\n\t\t\t\t\t  \n                      You feel the ground come up and crush your body, and you feel your spirit leaving the broken remains behind.\n                      *goto_scene death\n                    *else\n                      You feel the ground come up to meet you, and the impact has only an instant to hurt before everything goes dark.\n                      \n                      When you wake, Feng is standing over you in doctor form, picking needles out of your body. \"Glad you could join us,\" he says sourly. \"The magistrate is prepared to discuss the results of the contest with you, as soon as you are ready.\"\n                      *if sunanwounds > 5\n                        *goto winsundead\n                      *else\n                        *goto winliving\n                  *else\n                    You crash to the ground hard, then scramble to your feet and dash toward the magistrates' table as the tower collapses behind you.\n                    *if sunanwounds > 5\n                      *goto winsundead\n                    *else\n                       *goto winliving\n              #I go down after Sun An, knowing he is unlikely to be able to save himself before the tower collapses.\n                *label savesunan\n                *set sunan %+20\n                You leap toward Sun An, bracing one leg against the tallest pole and the other against one firm beam of scaffolding to guide and control your fall. When you reach Sun An's position, you slide to a stop, then clamber over to where the tall warrior has caught himself.\n\t\t\t\t\n                \"Grab on!\" you say, offering him your hand.\n\n                He reaches for you, and you pull him toward your more stable position, just as another section of scaffolding gives out. But he is not much help in controlling your position, and though you make it back over to the firm beam and the pole, you are not sure of the best way to get you both down.\n                *choice\n                  #I can brace myself the way I did earlier and keep us both from falling.\n                    *if tenacity > 70\n                      You hang on by sheer will. Sun An's weight is hard to balance, but you refuse to let go. Slowly, you slide your way down to the ground, just as the rest of the structure collapses.\n\t\t\t\t\t  \n                      Covered with more bruises than you can count, you stumble toward where Governor Rong was seated, clearing your way out of the rubble as it crashes down around you. You collapse, but both you and Sun An are safe.\n                      *goto winliving\n                    *else\n                      You give it a noble attempt, but you end up skidding most of the way down in a barely controlled fall. The crash knocks Sun An out completely, and you are only slightly better yourself. You stumble with him An toward the magistrates' table, clearing your way out of the rubble as the rest of the structure crashes around you. You collapse, unable to stay conscious any longer.\n                      *set wounds +1\n                      *if wounds > 5\n                        *if match = \"death\"\n                          As you lose consciousness and feel an errant bit of lumber from the collapsing tower strike you across the back, you wonder whether choosing a fight to the death was the smartest move you could have made. If your earlier wounds had been shallower, in keeping with the spirit of the terms, perhaps even a tower collapsing on you would not end in your death….\n\t\t\t\t\t  \n                          You feel your body give out, and you feel your spirit leaving the broken remains behind.\n                          *goto_scene death\n                        *else\n                          You feel the ground come up to meet you, and the impact has only an instant to hurt before everythi aving the broken remains behind.\n                          *goto_scene death\n                        *else\n                          You feel the ground come up to meet you, and the impact has only an instant to hurt before everything goes dark.\n                      \n                          When you wake, Feng is standing over you in doctor form, picking needles out of your body. \"Glad you could join us,\" he says sourly. \"You have a guest in the dining room, when you are ready.\"\n                          *goto winliving\n                      *else\n                        You scramble to safety as the tower shudders a final time, dragging Sun An out of harm's way. Soon, you are surrounded by your students and others concerned about your safety, and you allow them to guide you away—and allow others to take care of the wounded Sun An.\n                        *goto winliving\n          #I go after Sun An to keep him from falling to his death.\n            As you dash after Sun An, the tower collapses further, one of the major support beams shuddering under its increased weight.\n            *goto savesunan  \n      *else\n        Sun An falls from your strikes, but he strikes behind the back of your neck with a ridge hand. You fall on top of him, but his feet are pulled in to his stomach—and he launches you up and over, sending you skittering toward the edge.\n        *label fall2\n        *choice\n          #Grab Sun An and take him over with me.\n            *if fighting > 63\n              As you hurtle airborne over Sun An, you catch the straps of his harness and haul him over the side with you. The two of you topple over, and you both reach for the scaffolding. You catch, slamming against the already trembling tower. Sun An has dropped a few feet below you, and the handholds he's found are dropping out from under him.\n              *set sunanwounds +1\n              *set wounds +1\n              *label getmedown\n              *if wounds > 5\n to you, suddenly stumbles, and you see he is in worse shape than you had realized. Feng, wearing his doctor guise, hurries toward you.\n                    *choice\n                      #I catch Sun An and brace him on my shoulder, treating him as an ally.\n                        *set sunan %+15\n                        Sun An leans into you, letting you take his weight, though you feel a bit unsteady yourself. \"Thank you,\" he says.\n\t\t\t\t\t\t\n                        \"Let's get you back to the school, and we'll have Feng make sure we both recover,\" you answer.\n\n                        The pair of you limp back to Kuei Xian, Feng clucking at you and your students surrounding you, ready to catch you if you should fall. Once you make it back to the school, you let your students take Sun An and set him up in a room to recover, and you allow yourself to collapse into your bed.\n                        *goto winliving\n                      #I let Sun An fall, but instruct my students and Feng to get him back to the school.\n                        Between Feng and some of your senior students, Sun An is carried back safely to the school and given a room to recover. As soon as you reach the school, you get to your room and allow yourself to collapse into your bed.\n                        *goto winliving\n                      #I let Sun An fall and instruct Feng to leave him there.\n                        *set sunan %-10\n                        He challenged you on his own; let him deal with his choices. You leave Sun An at the base of the collapsed tower and return to the school, where you allow yourself to fall into your bed.\n                        *set sunstay false\n                        *goto winliving\n                  *elseif wounds > sunanwounds\n                    You step forward and your legs wobble under you; you are only barely able to keep your balance.\n                    *if sunan > 60\n                      Sun An catches you before you can fall, bending low so that your heights are closer to equal, and he slings your arm over his shoulder to support you. \"Let's get you back to the school,\" he says gently, and it is clear from the exchange that, while he is the victor, he does not plan to take advantage of your current weakness to defeat you completely.\n                      *goto sunangraciouswin\n                    *else\n                      With your next step, you fall, the battle taking its toll. You see Feng rushing to your side before you slip into unconsciousness.\n                      *goto unconscious\n                  *else\n                    You two warriors, both beaten bloody and bruised, look at each other and recognize that today is a draw.\n                    *set status %+10\n                    *if sunan > 60\n                      Sun An bows to you. \"You live up to your reputation,\" he says. \"I will not trouble you further.\"\n                      *goto shouldIstayorshouldIgo\n                    *else\n                      Sun An looks at you consideringly. \"I see we will not resolve the question of the stronger warrior any further,\" he says. \"Perhaps in a few years, I will test you again.\"\n                      *goto shouldIstayorshouldIgo\t\t\t\t\t  \n            *else\n              You make a grab for Sun An, but he evades, and you fall without him, leaving the tall warrior to make his own way down the tower. You grab the scaffolding and slam against it, taking the impact across your body.\n              *set wounds +1\n              *goto getmedown\n          #Catch the edge before I go over.\n            *if tenacity > 65\n              You grab the edge of the platform and hold yourself up, using your raw willpower and strength to keep from impacting. Sun An makes a move to stomp on your hands, but you spin out of the way. His stomp causes the tower to shudder further, and the entire structure begins to collapse around both of you.\n              *set wounds +1\n              *goto getmedown\n            *else\n              You reach for the edge. Though your fingers connect, they skitter off the side, and you are unable to catch the platform. You slow your fall on the scaffolding as the entire structure begins to collapse around you.\n              *set wounds +2\n              *goto getmedown\n          #Leap for one of the posts, using my chi to give me the distance I need.\n            *if magic > 65\n              Rather than allowing Sun An's throw to become a fall, you glide away and land, hard, on one of the tall posts near the top of the platform. The tower gives another shudder and begins to crack and collapse. This close to the tower, the shards of broken wood spray at you, and you are still in danger of falling.\n              *goto getmedown\n            *else\n              You try to turn the fall into a glide, but you are enough off balance that you miss the post with your feet, instead catching it with your body. You cling to it, holding on for a moment until you can right yourself and climb the poles back up to the platform. But before you regain your balance, you realize that the tower is collapsing in on itself, and the debris flying could still cause you to fall.\n              *set wounds +2\n              *goto getmedown\n    *else\n      You breathe in, trying to ground yourself, but as the tower begins to shudder uncontrollably, you lose your balance and slide toward the platform's edge. Sun An charges at you and spins into a trip at the last instant, taking your feet out from under you.\n      *set wounds +1\n      *goto fall2\n  #I take the fight to the air, using the platform only for brief moments to touch down.\n    *if magic > 63\n      You leap into the air and Sun An meets you there, the pair of you clashing briefly before you spin and land, touching down on opposite corners of the platform. Again, you soar above the center of the platform, this time flying with a side kick at Sun An's oncoming body. Instead of taking the kick, Sun An runs up your leg, aiming a kick at your head, but you block, landing a hammer strike to the inside of each thigh. The nerve strike deadens his legs for just long enough that he falls back to the platform. Though you land gracefully in one corner, the entire structure has begun to shudder, and you suspect that it will soon collapse.\n      *set sunanwounds +2\n      *if sunanwounds > 4\n        Sun An, struggling to regain his feet, slides as the platform teeters to the side. The fall is likely to kill him if he doesn't regain control.\n        *goto sunanwounded\n      *else\n        Sun An quickly regains his feet and once again leaps to the sky. As you soar toward him, he abruptly changes directions, spinning into a cartwheel kick from beneath you that sends you headfirst toward the edge of the shuddering platform.\n        *goto fall2\n    *else\n      You bend your knees to launch yourself into the air, but a shudder passes through the tower as another beam breaks loose. You lose your balance and slide toward the platform's edge. Sun An charges at you and spins into a trip at the last instant, taking your feet out from under you.\n      *set wounds +1\n      *goto fall2\n  #I jump over the edge of the platform to take the fight to the scaffolding below.\n    You drop onto the scaffolding; Sun An follows behind you. The scaffolding is trembling, and beams are cracking from the pressure of the tilted platform. The hazards provide cover from Sun An's attacks, and you each strike at each other through gaps in the construction.\n    *if fighting > 63\n      Your strategy is to keep Sun An toward the top of the scaffolding, trying to knock him loose so that he tumbles to the ground below. You weave in and out of the supports, landing strikes to his arms and legs—which he echoes on your body. You can tell that both of you are weakening.\n      *if trap\n        You lead Sun An into the area you trapped, and he collides with the hidden wires, slicing his skin open. In fury, he roars and kicks through the support beams between the two of you, the shattering wood further lacerating his body.\n        *set sunanwounds +2\n        *if sunanwounds > 4\n          The kick, powerful though it was, seems to have done him in. Though he has cleared the obstructions between you, his momentum is too great, and he begins to fall past you, out of control. The fall is likely to kill him if you don't intervene.\n          *goto sunanwounded\n        *else\n          With the obstructions between you cleared, Sun An roars and slams a hammer strike at the side of your head. You block, but the force is great enough that it drives you into the scaffolding. Your handholds give way and send you flying away from the scaffolding.\n          *set wounds +1\n          *goto fall2\n      *else\n        Frustrated by your ability to dodge away from him, Sun An roars in fury and kicks through the support beams between the two of you, the shattering wood further lacerating his body.\n        *set sunanwounds +1\n        *if sunanwounds > 4\n          The kick, powerful though it was, seems to have done him in. Though he has cleared the obstructions between you, his momentum is too great, and he begins to fall past you, out of control. The fall is likely to kill him if you don't intervene.\n          *goto sunanwounded\n        *else\n          With the obstructions between you cleared, Sun An roars and slams a hammer strike at the side of your head. You block, but the force is great enough that it drives you into the scaffolding. Your handholds give way and send you flying away from the scaffolding.\n          *set wounds +1\n          *goto fall2\n\t\t  \n*label winliving\n*achieve defender\n*page_break\n*set status %+15\nYou and Sun An have survived your battle, and though you were close to evenly matched, Sun An has conceded the fight.\n*if sunstay = false\n  You hear that Sun An has left town after the fight with no further word. That is good enough for you. You have defended your home and your reputation with honor, and you will be pleased to never see the tall warrior again.\n  *finish Chapter Six: Return to the Order\n*else\n  After a few days, when you have both had time to recover from your wounds, Sun An comes to discuss the terms of his concession.\n  \n  *if sunan > 60\n    \"You defended your reputation with honor,\" he says. \"If I had to be defeated, I can certainly accept defeat at the hands of as capable a warrior as you.\"\n    *label shouldIstayorshouldIgo\n    *choice\n      #I accept his acknowledgement of my skill and wish him on his way.\n        *label immortal\n        After a meal, brought to you by a demure Feng wearing the form of a serving girl, Sun An departs, looking spry despite his injuries.\n\t  \n        \"Is he an immortal?\" you ask Feng.\n\t  \n        The fox spirit just scoffs and busies herself clearing the table. You are pleased that you have managed to prove yourself—and, hopefully, ward off any future challengers for some time to come.\n        *finish Chapter Six: Return to the Order\n      #I invite him instead to stay and teach for a while. His name will be listed permanently as an instructor on the training room wall.\n        *label sunteach\n        *set sunan %+10\n        *if sunan > 65\n          Sun An smiles. \"You are a gracious winner, and you extend me an invitation that is quite generous,\" he says. \"Such an offer prevents me from losing face.\"\n\t\t\n          \"And also grants us the opportunity to learn from each other,\" you point out.\n\t\t\n          Sun An makes a slight bow. \"There were moves of yours I am very curious to see repeated. And a soft bed would be a nice change for a while.\"\n\t\t\n          \"Then you are most welcome,\" you say, and the two of you enjoy a meal together as companions.\n\t\t\n          Sun An stays on, each day saying he intends to leave soon, but he makes no move to do so. Over the coming months, you become used to his presence at the school, and the students become accustomed to learning from two masters. As for you, you now have a formidable sparring partner—though none of your matches are ever as intense as the one on the training tower. Neither of you suggests revisiting that ground.\n          *set disciples +1\n          *set sunanstay true\n          *finish Chapter Six: Return to the Order\n        *else\n          *label moveon\n          \"That is a very generous offer,\" he says, \"but I'm afraid staying in one place is not in my nature. I wish you well, ${name}.\"\n          *goto immortal  \n      #I invite him to stay as a student.\n        *label sunstudent\n        *set sunan %+5\n        *if sunan > 70\n          Sun An gives you a low bow from his seat at your table. \"You honor me. Few who meet me believe that I am still willing to learn.\"\n\t\t\n          You laugh. His arrogance certainly did make it a question in your mind whether he could humble himself enough to take you as a master. \"You have great potential, Sun An. As skilled as you already are, you could be even greater.\"\n\t\t  \n          \"With a teacher like you, I believe that is true,\" he says. \"And it would be nice to stay in one place for a while.\"\n\n          \"Then you are most welcome,\" you say, and the two of you enjoy a meal together as companions.\n\t\t\n          Sun An stays on, each day saying he intends to leave soon, but he makes no move to do so. Over the coming months, you become used to his presence at the school, and you now have a formidable sparring partner—though none of your matches are ever as intense as the one on the training tower. Neither of you suggests revisiting that ground.\n          *set disciples +1\n          *set sunanstay true\n          *finish Chapter Six: Return to the Order\n        *else\n          *goto moveon\n  *else\n    \"I don't know how you did it,\" he says begrudgingly. \"But you are clearly the winner. Perhaps in a few years, I will return to try you again.\"\n    *goto shouldIstayorshouldIgo\n\t\n*label winsundead\n*achieve defender\nSun An is dead, and you are alive: that, more than anything, makes it clear that you are the winner of this challenge, and that you have defended your honor.\n*if match = \"death\"\n  *set status %+15\n  Because you both signed death waivers, there are no legal complications. Sun An's belongings, humble as they are, are sold toward his funeral expenses, which are handled by Governor Rong. It is a simple affair, attended by you, your students, and the magistrates who presided over your match.\n  *label immortal2\n  \n  Later, you hear rumors of a warrior named Sun An traveling across the countryside, challenging martial arts masters to prove they are worthy of their reputations. You wonder again about the stories of Sun An as an immortal. Perhaps it is true. Or perhaps someone else has taken on his identity to resume the work he left behind. In any case, you doubt that you will be visited by challengers again any time soon.\n  *finish Chapter Six: Return to the Order\n*else\n  *set honor %-10\n  *set status %+5\n  Because you did not sign death waivers, there are complications with Governor Rong. Although you are not arrested, you are served with a heavy fine. Your reputation also changes: some whisper that you dishonored Sun An in his defeat, and though your status has increased, you can tell it would have increased far more had your opponent survived.\n  *goto immortal2\n*label unconscious\nWhen you wake, you feel as though you have been kicked by a horse, then trampled. Your eyes open to show needles protruding from your body, and Feng the doctor leaning over you. You are in your room at the courtyard house, and you smell a strange scent of incense burning that reminds you of a sickroom.\n\n\"About time,\" he says irritably, plucking out the needles. \n\n\"I don't suppose I won,\" you say, though your memory has left you with a pretty clear impression that that is not what happened.\n\nFeng pulls out a needle, then jabs a new one in at a nerve you are fairly certain has no healing properties whatsoever. \"No, you didn't. Give me a few minutes to clean you up and you can get dressed, then go make nice with the victor.\"\n\nYou get to your feet and pull yourself together enough that you are not limping. Sun An is sitting at your table, enjoying a cup of tea. You notice he, too, has been bandaged up, though he hides it well under his tangzhuang.\n*if sunan > 60\n  *label sunangraciouswin\n  The tall warrior stands as you enter. \"You are looking well for a warrior who faced death not two hours ago.\"\n  \n  You smirk. \"I hope you will allow me to say the same of you.\"\n  \n  He laughs. \"It was a closer match than I expected, I will grant you that. Which brings me to the terms of your defeat. Please, sit, so that we can discuss.\"\n  \n  You sit, gingerly, and Sun An matches your awkward movements with his own. \"The truth is that, despite your defeat, I am impressed with your performance and think you are worthy of the school you teach and your reputation. I am content to leave all that intact so long as you leave posted a notice that you have been defeated by the wandering warrior Sun An.\"\n  \n  *choice\n    #I agree to his terms. I will lose face, but will be able to continue life as before.\n      *label terms\n      *set status %-15\n      \"It is settled, then,\" Sun An says, looking pleased with himself. \"The name of Sun An shall live on.\"\n\t  \n      After a meal, brought to you by a demure Feng wearing the form of a serving girl, Sun An departs, looking spry despite his injuries.\n\t  \n      \"Is he an immortal?\" you ask Feng.\n\t  \n      The fox spirit just scoffs and busies herself clearing the table. In the coming months, life returns to normal, with the exception of a posted notice on the wall of your training room that leaves evidence of Sun An's presence.\n      *finish Chapter Six: Return to the Order\n    #I invite him instead to stay and teach for a while. His name will be listed permanently as an instructor on the training room wall.\n      *if sunan > 65\n        Sun An chuckles. \"You are both as humble and as crafty as your reputation,\" he says, though how those two qualities can exist together in one story, you are uncertain. \"To invite me to teach prevents you from losing face.\"\n\t\t\n        \"And also grants me the opportunity to learn,\" you point out.\n\t\t\n        Sun An makes a slight bow. \"I confess, there were moves of yours I would be curious to see repeated. And a soft bed would be a nice change for a while.\"\n\t\t\n        \"Then you are most welcome,\" you say, and the two of you enjoy a meal together as companions.\n\t\t\n        Sun An stays on, each day saying he intends to leave soon, but he makes no move to do so. Over the coming months, you become used to his presence at the school, and the students become accustomed to learning from two masters. As for you, you now have a formidable sparring partner—though none of your matches are ever as intense as the one on the training tower. Neither of you suggests revisiting that ground.\n        *set disciples +1\n        *set sunanstay true\n        *finish Chapter Six: Return to the Order\n      *else\n        *label acceptdefeat\n        He shakes his head. \"It isn't my way to stay in one place. I've stated my terms. Take them, or I will rescind my generosity and see to it that your school is closed.\"\n\t\t\n        *choice\n          #I accept his terms.\n            *goto terms\n          #I would rather see the school closed then hang the sign of my defeat.\n            Sun An frowns. \"I am sorry to hear that,\" he says, and he seems genuine. \"I think you are a worthy teacher, and your students will be losing a fine instructor. But if that is how you feel, I'll let the governor know; I'm sure he will put things in motion.\"\n\t\t\t\n            And so your time as a teacher comes to an end. You once contemplated life as a hermit, and though some of your students refuse to leave you entirely—making social calls or asking for your advice, purely hypothetically, on your training—others wander off in search of other masters.\n\t\t\t\n            You begin to hope that the Order of the Peach Tree calls for your return soon.\n            *set status %-10\n            *set disciples -10\n            *achieve dishonored\n            *finish Chapter Six: Return to the Order\n    #I offer to make him the heir to my school when I return to the Order.\n      \"One day I will be called back to the Order of the Peach Tree,\" you explain. \"I would like to know that my school will continue on without me, and that it will remain in good hands.\"\n\t  \n      \"And, of course, you will save face from your defeat,\" Sun An adds. You nod, because this is also true.\n      *if sunan > 65\n        Sun An chuckles. \"You are both as humble and as crafty as your reputation,\" he says, though how those two qualities can exist together in one story, you are uncertain. \n        *comment skg: removing \"To invite me to teach prevents you from losing face.\" from this branch because Sun An has said it already, and tweaking the next line slightly\n\t\t\n        \"The invitation also grants me the opportunity to learn,\" you point out.\n\t\t\n        Sun An makes a slight bow. \"I confess, there were moves of yours I would be curious to see repeated. I have been thinking about settling down some place before the wandering life takes too much out of me—this place would be as good as any.\"\n\t\t\n        \"Then you are most welcome,\" you say, and the two of you enjoy a meal together as companions.\n\t\t\n        Over the coming months, you become used to Sun An's presence at the school, and the students become accustomed to learning from two masters. As for you, you now have a formidable sparring partner—though none of your matches are ever as intense as the one on the training tower. Neither of you suggests revisiting that ground.\n        *set disciples +1\n        *set sunanstay true\n        *finish Chapter Six: Return to the Order\n      *else\n         *goto acceptdefeat\n*else\n  The tall warrior does not bother to stand when you arrive. \"You look like death warmed over,\" he says.\n  \n  You say nothing. What is there to say?\n  *label sunanungracious\n  \n  \"I have to say, based on your reputation, that I am not impressed,\" he says. \"I am debating whether to take this school from you and teach my style here, or whether to have you disband it entirely. Do you have a preference?\"\n  *choice\n    #Sun An is clearly a warrior I could learn from. I would be glad to have him take over the school if I could stay on as a student.\n      *set sunan %+10\n      Sun An seems surprised by your reaction. \"You have so little pride? You would be dishonored in front of your students.\"\n\t  \n      \"Only if I believed I had nothing to learn,\" you say. \"There is no dishonor in acknowledging that someone has greater skills. Someone usually does.\"\n      *if sunan > 60\n        *if enlightened > 60\n          \"Perhaps there is something I could learn from you as well, then,\" he says, considering his words carefully. \"I rescind my offer and make a new one. Let us teach here together, where you can teach me the inner peace you seem to have mastered. No dishonor.\"\n\t\t  \n          \"I would be delighted,\" you say.\n\n          Over the coming months, you become used to Sun An's presence at the school, and the students become accustomed to learning from two masters. As for you, you now have a formidable sparring partner—though none of your matches are ever as intense as the one on the training tower. Neither of you suggests revisiting that ground. And though Sun An was the victor, he clearly feels that what he is learning from you is of greater value; few among your students are as devotedly your follower.\n          *set disciples +1\n          *set sunanstay true\n          *finish Chapter Six: Return to the Order\n        *else\n          *label arrogant\n          He laughs. \"Perhaps,\" he says. \"But I have yet to find the man or woman I see as my superior. I will be glad to have you acknowledge me as your master, ${name}. And I will agree to let you stay on as my student—in fact, you may continue to teach the low ranking students.\"\n\t\t  \n          You swallow your gut reaction to his arrogance, knowing that he truly has defeated you.\n\t\t  \n          And so Sun An becomes the master of your school. You move out of the main house, and with the money you had saved over the past eight years, you buy a little cottage nearby. Over the coming months, you become accustomed to this arrangement, and are even glad to have a sparring partner who continually challenges you—even if you have to bite your tongue at his unparalleled arrogance.\n\t\t  \n          In consolation, you expect that one day, someone will challenge him, and he will be defeated.\n          *set status %-15\n          *achieve dishonored\n          *finish Chapter Six: Return to the Order\n      *else\n        *goto arrogant\n    #I would rather see the school closed then hand it over to Sun An.\n      Sun An shrugs. \"If that is how you feel, I'll let the governor know; I'm sure he will put things in motion.\"\n\n      And so your time as a teacher comes to an end. You once contemplated life as a hermit, and though some of your students refuse to leave you entirely—making social calls or asking for your advice, purely hypothetically, on your training—others wander off in search of other masters.\n\t\t\t\n      You begin to hope that the Order of the Peach Tree calls for your return soon.\n      *set status %-10\n      *set disciples -10\n      *achieve dishonored\n      *finish Chapter Six: Return to the Order", "choicescript_description": "Become the greatest fighter the world has ever known, harnessing the power of chi to manipulate the energies of the universe. Defeat rivals, find romance, and rise to become the Imperial Champion. Win the right to question the immortal Dragon Sage, who speaks just once every hundred years!\n\n[i]Choice of Kung Fu[/i] is a fast-paced interactive fantasy novel where your choices determine how the story proceeds. The game is entirely text-based--without graphics or sound effects--but powered by the vast, unstoppable power of your imagination.\n\nThe fate of the Middle Kingdom depends on you! Will you play as male or female? Gay or straight? Will you battle against foreign invaders, or will you rise up against the Emperor? What question will you ask the Dragon Sage, the wisest of all creatures?\n", "choicescript_stats": "*if met_feng\n  *set rlshp_one \"Feng\"\n  *goto sunan1\n*else\n  *goto sunan1\n\n*label sunan1\n*if met_sunan\n  *set rlshp_three \"Sun An\"\n  *goto zhuge1\n*else\n  *goto zhuge1\n\n*label zhuge1\n*if met_zhuge\n  *set rlshp_two \"Zhuge Miao\"\n  *goto display\n*else\n  *goto display\n\n*label display\n*stat_chart\n  percent Status\n  percent Fighting\n  percent Magic\n  percent Tenacity\n  percent Cleverness\n  percent Enlightened\n  percent Honor\n  opposed_pair Tianxia\n    Laowai\n\n[b]Name[/b] ${name}\n*line_break\n[b]Style[/b] ${style}\n*line_break\n[b]Question[/b] ${question}\n  \nYour relationships:\n*stat_chart\n  percent lujin Lu Jin\n  percent feng ${rlshp_one}\n  percent zhuge ${rlshp_two}\n  percent sunan ${rlshp_three}\n  text Romance\n  text Disciples\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Remove all ads and delays.\n\n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  You've paid to remove all ads and delays.\n", "death": "*set dead true\n*achieve ghost\n\nThough you are quite aware you are dead, you are also aware that your consciousness is still lingering in the Middle Kingdom. After several days of wandering, not quite sure how to interact with the world around you, it comes to you: you are a ghost. Despite your best efforts to become the member of the Order of the Peach Tree who meets the Dragon Sage, you realize that instead, you must now wander the world until your spirit continues on into the cycle of death and rebirth.\n\nUnable to move from this world to the next, you make your way back to the Order of the Peach Tree and find a comfortable place to rest in the branches of the order's namesake. Time passes, season after season, blossom, fruit, and fall, until one day you realize the time has come for the Order to choose the person who will represent them and approach the Dragon Sage.\n\nTypically, you find yourself alone, as no one at the Order seems to notice—or at least, acknowledge—the presence of a ghost. But on this day, you find that you have company: Master Shen, now at death's door himself, leans against the trunk of the tree below where you always hover.\n\n*page_break\n\n\"Ah, my student,\" he says, his voice much weaker than it once was, \"after today, I suspect there will be nothing to hold you here. These branches will miss you, and I will miss knowing that you are here.\" The old master chuckles to himself. \"Although I suspect I will join you soon enough! These old bones don't have much life left in them.\"\n\n\"More than mine,\" you say. They are the first words you have spoken since your death, and they sound, even to your ears, like the rustling of wind through the leaves.\n\n\"The monk who will go to see the Dragon Sage is a woman named Yang Lifong,\" Master Shen continues. \"She is quite a talent! Not the way that you were, but then, I suspect her differences may keep her alive.\"\n\nThe thought stings for a moment, but you are able to let it go.\n\n\"What will she ask?\" you wonder aloud.\n\nMaster Shen only shrugs. \"Who can say? The important thing is that she asks, and all will be well.\"\n\nYou feel your spirit begin to fade and depart from the Middle Kingdom. \n\n*page_break\n\n*if tianxia > 60\n  You leave the Middle Kingdom on its way toward returning to balance, aligning with the Will of the Heavens. Perhaps it will continue that way without you.\n  *goto again\n*else\n  Though strife continues to plague the Middle Kingdom, perhaps things will change by the time the Dragon Sage next returns.\n  *goto again\n  \n*label again\nYou linger only a little longer, watching as Yang Lifong makes her journey to the Dragon Sage, and watching the skies as the Dragon Sage descends, then flies away.\n\n*goto_scene ending", "ending": "The Dragon Sage has returned to the Heavens.\n\n*if chosen = false\n  Though you were not the one to consult the Dragon Sage, you find fulfillment from the rest of your life.\n  *if champion\n    As the Imperial Champion, people from all over the Middle Kingdom listen to you. Even the Emperor weighs your opinions when you offer them. You are renowned for your fighting skills throughout the lands, and though any changes you effect are small ones, you know that your influence can be the seed that causes great change.\n    *goto questions\n  *else\n    *label questions\n    *if question = \"How can I become the greatest warrior in the world?\"\n      *if fighting > 60\n        Over the years, your fighting skills become a thing of renown. You never give up perfecting the art, and people travel the world over to challenge you and test their skills—or to learn, if you will teach them. During a great battle with the horse barbarians, who once again rise up to test the Middle Kingdom, you serve alongside General Rong Jue, and you suspect that one day, stories will be told about the two of you as they were long told about Master Zhuge and General Hong.\n        *goto question\n      *else\n        Though you once hoped to become the greatest warrior in the world, you have realized that fighting is not your greatest priority. Instead, you have invested yourself in other monkish devotions, and you have become well respected among your peers.\n        *goto question\n    *elseif question = \"How can the Empire return to Heaven's Favor?\"\n      *if tianxia > 50\n        Throughout your life, you never stop striving for the balance of the Middle Kingdom and the Heavens. Eventually, you are noisy enough that the Emperor summons you. You half suspect that he is concerned your ideas support open rebellion—but when you assure him that your concern is for the people of the Middle Kingdom, and that balance can happen only if the Emperor himself seeks to serve the will of Heavens, the Emperor takes you quite seriously. Though you are never granted an official title, you are treated as a liaison between the Order of the Peach Tree and the Emperor himself, and you watch as your influence helps to restore balance to the Middle Kingdom.\n        *goto question\n      *else\n        Though you once hoped to help restore balance to the Middle Kingdom, you find that in your later years, you are increasingly interested in the more esoteric traditions of the Order of the Peach Tree. You spend much time in silent meditation, and at a great age, when you find yourself alone as your friends and family have passed on before you, you make your way to a hermitage in the mountains, where young students come to seek your advice.\n        *goto question\n    *elseif question = \"What is the first question?\"\n      *if ((cleverness > 50) or (enlightened > 50))\n        Though you never discover what the first question was, you dedicate your life to gathering wisdom. Over the years, you become known as a scholar monk, a truly wise individual whom others seek out to ask advice. You are no Dragon Sage, but your accessibility makes you even more valuable to those who seek your knowledge. You write a few philosophical works, and though you do not know whether they will carry on through the ages, you feel certain that you have learned one of the most important lessons life has to offer: the importance is not in what the question is, but that it was asked.\n        *goto question\n      *else\n        Though you once sought to determine the original question, you've learned since that wisdom is not your greatest priority. Instead, you have invested yourself in other monkly devotions, and you have become well respected among your peers.\n        *goto question\n    *elseif question = \"Why do kites fly?\"\n      Though you never discover the real reason kites fly, in your later years you devote yourself to the art of kite making. You spend time painting calligraphy on each of your creations: the words are clear on both sides of the thin silk you use, which means that both the Heavens and the nature spirits can view your thoughts. In their way, your kites are prayers, a symbol of the unity of tianxia—of all things under heaven—and you are content knowing that, so long as the breeze is strong enough, they will keep flying.\n      *goto question\n    *else\n      *goto question\n\n*label question\nIf you had it to do all over again, what question would you ask?\n*page_break\nWe hope you've enjoyed playing [i]Choice of Kung Fu.[/i]\n\n*feedback\n\nChoice of Games releases new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99\n", "master": "*temp gift \"none\"\n*temp success 0\n*advertisement\n\nYour first few years as a monk feel little different from your last year as a senior student. Though you now have a greater leadership role, and an official ranking as a teacher with the students, much continues on as it had before. You work at the monastery, taking care of the things required of all who live there to maintain the daily workings of the Order. You spar with the monks and continue to learn the intricacies of wushu. You oversee the newest applicants as they prove their worth by accomplishing the most menial chores. You do not miss those days from your own apprenticeship.\n\nThe seasons change. The peach tree blossoms and bears fruit, then shows its naked branches until spring returns. The strength of the Blue Scarves Rebellion grows as the foreigners maintain and further develop their presence in the Middle Kingdom. Still, the Emperor shows no intention of changing their role at his court, or defending the people of the Middle Kingdom against the foreigners' encroachment upon lands they have farmed for generations.\n\nNo further threats call for the attention of the Order of the Peach Tree, however, and Abbot Bao has not become involved with the quarrel between the rebels and the Emperor on either side. The monks are divided in their opinions of the world's events: some strongly support the Emperor, others profess that it is not the Order's role to get involved in events of the world, and a few mention their concerns for the common people without ever fully defying the Son of Heaven. \n\nDo you involve yourself in these conversations?\n\n*choice\n  #I support the Emperor. He is the Son of Heaven and clearly knows what's best for the Empire.\n    A wise choice. Who dares question the Emperor?\n    *set tianxia %-10\n    *goto master1\n  #I agree that the Middle Kingdom is out of balance with the Heavens, but do not openly question the Emperor.\n    You realize that doing nothing only lends strength to the Emperor's position, but openly admitting doubt in the Son of Heaven is both unwise and dangerous. But if the choice is saying nothing or giving up your path to the Dragon Sage and joining the rebellion like Lu Jin…well, you know what you will choose.\n    *set tianxia %-5\n    *goto master1\n  #I am not concerned with such worldly matters when I strive toward Enlightenment.\n    Clearly you have more important parts of your training to be concerned about. If the abbot does not involve himself or the Order in these political events, then why waste time considering them?\n    *set tianxia %-5\n    *goto master1\n  *if (lujin >50) #Since Lu Jin is not here to work from the inside of the monastery, I will do so in ${rivalhis} place.\n    You soon notice that conversations about the state of the Middle Kingdom stop when you are within hearing. No one wants to be involved in discussions with someone who openly dissents against the Emperor. However, some of the monks who quietly voice their concerns make a point of practicing with you more frequently, trying to get to know you better. With them, you find you can make comments about the role a leader should perform for his people, or about how the strength of a kingdom rests on the humblest residents.\n    *set tianxia %+20\n    *set disciples +3\n    *goto master1\n\n*label master1\n\nOne day in late summer, the third year after your test, Master Shen asks to speak with you beneath the peach tree. When you arrive, the old master is dozing off beneath the tree, his staff leaning next to him. You approach quietly, but as soon as you are within range of Master Shen's staff, it shoots out to tap your ankle, suddenly in his gnarled but quick hand. His eyes remain closed.\n\n\"This ankle feels like it belongs to ${name},\" he says with a grin. He opens one eye. \"Ah, good. If it had been Kai Lo bringing a late afternoon snack to the decrepit old man, that would have been an embarrassing mistake.\"\n\nMaster Shen pats the ground beside him in a gesture for you to sit. It is oddly informal for one who served as your teacher for so long.\n\n\"Why did you wish to speak with me, Master?\" you ask.\n\n\"Maybe I enjoy the company of my young students in my old age,\" Master Shen says gruffly. He taps your foot with the end of his staff. \"You may be a monk now, but I still concern myself with your education.\"\n\nHow do you respond to this?\n*choice\n  #I am learning much from teaching the students and continuing to spar with the monks.\n    \"Ho ho,\" Master Shen laughs. \"Such a polite answer from an ambitious student. There is much more for you to learn outside these walls.\"\n    *goto walls\n  #I admit that I fear my own art is stagnating.\n    He raps your ankle. \"As well you should. There is much more for you to learn outside these walls, ${name}.\"\n    *goto walls\n  #I tell him that I miss the challenge of real combat.\n    \"Ho ho,\" Master Shen laughs. \"Ever the troublemaker, my student? Perhaps you wish to fight with the rebellion? Or against them?\"\n\n    You are surprised to hear Master Shen mention these things, and he notices your expression. \"Do not think that because I am old I am blind and deaf as well, ${name}. But your feelings about the Middle Kingdom are your own. I merely wish to talk to you about an opportunity to learn more outside these walls.\"\n\n*label walls\nMaster Shen raises his staff and knocks twice on one of the peach tree's branches. Two peaches tumble down, and you catch them both, handing one to the old master when he reaches for it. He takes a bite of juicy peach, savoring it, before continuing.\n\n\"It is traditional for members of the Order to spend some time away from the monastery after they become monks,\" he explains. \"For some it is a time of wandering, living only on the kindness others drop into their begging bowls. For others, it is a chance to become embroiled in the matters of the Middle Kingdom. Abbot Bao suggested that for you, actually, and was planning to send you to Xiaonanhai, but I think that perhaps the capital is not the place for you now.\"\n\nYou are surprised that Abbot Bao would think to send you to the capital of the Middle Kingdom—and that Master Shen has objected to the abbot's plans.\n\n\"I think you would gain a greater benefit from studying under an old teacher of mine.\"\n\n\"Of yours, Master?\" you ask, trying to imagine a teacher of Master Shen's that would still be walking, let alone alive.\n\nHe raps his staff against your ankle again, clearly guessing your thoughts. \"I recommend that you seek out Master Zhuge in the Yellow Mountains. Zhuge is an old hermit—a true recluse—but crafty as a dragon.\"\n\n*page_break\n\nIn fact, you have heard of Master Zhuge, whom some call the Veiled Dragon. Stories say that Master Zhuge has followed the path to immortality, though whether this was through alchemy, devout living, or the mystical arts of the bedchamber is the subject of much debate. No one knows how old he is or the full extent of his abilities, but people say he can blow on water to change the direction of its current, heal the sick at a distance, and take on the shape of any object. He also writes very fine poetry.\n\n\"Zhuge lives in the mountains above Kuei Xian,\" Master Shen continues. He pulls a scroll out of his sengfu and hands it to you. It is a map of that section of the Yellow Mountains, incredibly detailed. A hermitage is marked.\n\nMaster Shen stands, slowly, hiding the quick reactions you know he is capable of. \"I suggest you take a present,\" he says, and knocks the bough of the peach tree with his staff again. A pile of peaches falls into your lap. \"Go. Learn. I will see you in a few years, if I am still around. And if you survive.\"\n\nWhat gift will you take with you?\n*choice\n  #Peaches. If Master Shen suggested them, they must be a good idea.\n    *set gift \"peaches\"\n    *set honor %+5\n    *set zhuge %+5\n    You gather the peaches Master Shen tumbled into your lap, then return to your room to prepare for your travel.\n    *goto yellowmountains\n  #I take a cutting from the peach tree, which will eventually produce its own peaches.\n    *set gift \"cutting\"\n    *set enlightened %+5\n    *set zhuge %+10\n    Caring for the peach tree is one of the tasks you have learned as a monk. You carefully take a cutting, wrapping the base in a wet cloth to prepare it for travel. Then you return to your room to pack your remaining things.\n    *goto yellowmountains\n  #I take the time to copy one of the scrolls from the temple library before I leave.\n    *set gift \"scroll\"\n    *set cleverness %+5\n    *set zhuge %+10\n    Master Shen did not give you a time limit, after all. Taking your time to copy down some of the knowledge from the Order of the Peach Tree shows that you care about knowledge and learning—and respect Master Zhuge's academic reputation.\n    *goto yellowmountains\n  *if (style = \"Celestial Sword\") #I take a knife I brought with me from the Imperial treasury, from my life before joining the Order.\n    *set gift \"knife\"\n    *set status %+5\n    *set zhuge %+5\n    A gift from the Imperial treasury is certainly appropriate to present to a legendary master, though it will reveal you as a member of the Imperial family rather than as a simple monk.\n    *goto yellowmountains\n\n*label yellowmountains\nYou leave from the monastery on a beautiful, sunny day to begin your journey to the Yellow Mountains. It has been years since you traveled this road, and the journey alone is very different from one with seventeen companions. By the time you reach Baijiang Bridge, the weather has started to turn, and a summer squall hits just as you arrive in Kuei Xian. You sit in the tea house for a few hours until the skies clear, then begin your ascent into the mountains.\n\nYou are hardly out of sight of town when you see a young woman on the road ahead of you, pacing and looking quite distraught. She is dressed in humble clothes, bedraggled from the recent storm, but despite the smudged dirt on her face and the disarray of her hair, it is clear that she is beautiful. A heavy pack lies near her by the side of the road. She spots you and the worry on her face eases.\n\n\"Thank the heavens,\" she says, then looks down and bows in deference, despite the fact that she clearly intends to address you without waiting for you—of higher social rank—to speak first. \"Honored monk, forgive my boldness, but I am in need of aid. I was traveling toward Kuei Xian when the storm hit, and my ox startled at the thunder and bolted off the road. Could you help me?\"\n\n*choice\n  #I don't have the time or inclination to help a peasant.\n    *set feng %-20\n    You tell the peasant woman that you must be on your way. A lost ox is really no concern of yours. A noticeably less than humble look of amusement crosses the woman's face at your refusal, which you find odd—but continue on your way regardless.\n    *goto zhugemiao\n  #I can spare a little time to help a poor woman.\n    \"Bolted, you say?\" you respond. You can see some deep tracks in the mud where an ox might have charged off the road and into the woods. The trees are not terribly dense, but the terrain is uneven, and you could see how a woman without your training might be concerned about bandits or worse—particularly given the problems Kuei Xian has had in the past.\n\n    \"I'm afraid so,\" she answers. \"I did start to go after him.\" She gestures down to her mud-caked boots and skirt. \"My pack was too heavy to let me navigate the mud, and I didn't want to go too far into the woods. I wish I could be of use!\" Suddenly, her face brightens. \"I know! If you went after my ox, I could watch your pack for you. That way you wouldn't be weighed down!\"\n    *choice\n      #What a thoughtful suggestion. I could manage the pack, but it would be kind to make her feel useful.\n        *set cleverness %-10\n        *set feng %-10\n        *set gift \"none\"\n        *set zhuge %-10\n        You leave the pack with your gift to Master Zhuge and your remaining supplies and make your way off the road. The tracks lead deep into the woods, and dusk falls before you realize they have led you back to the road.\n\n        The woman, and your pack, are gone. It appears you have been the victim of a thoroughly unscrupulous bandit.\n        *goto zhugemiao\n      #It's kind—if a little suspicious—of her to offer, but I can manage my pack AND hers.\n        *set cleverness %+10\n        *set feng %+10\n        \"I know how you can be helpful,\" you say enthusiastically. \"Lead me the direction your ox took into the woods. I'll take both packs so you won't be weighed down.\"\n\t\t\n        She smiles prettily and hands you her pack, lifting it with such ease that you are surprised by its weight when she hands it to you. You have to take it in both hands to keep the weight balanced, and while your arms are occupied, she pats you gently on the face.\n\t\t\n        \"Very clever, monk,\" she says coyly. \"When you see Master Zhuge, please offer my pack as a gift. Say it comes from Feng. It will be appreciated.\"\n\n        Before you can reach to stop her, the woman turns and moves into the woods, transforming with each step until there is no longer a woman, but a fox with seven tails running off into the trees.\n        *set met_feng true\n        *if scenefox >0\n          *set scenefox +1\n          *achieve foxed2\n          *goto gifts\n        *else\n          *achieve foxed\n          *goto gifts\n        *label gifts\n        When you meet with Master Zhuge, will you offer the fox spirit's gift?\n        *choice\n          #I will present my original gift to Master Zhuge.\n            Perhaps that is best.\n            *goto zhugemiao\n          #I will present the fox spirit's pack to Master Zhuge.\n            Perhaps that is best.\n            *set gift \"fox spirit's pack\"\n            *set zhuge %+5\n            *goto zhugemiao\n          #I will offer both gifts.\n            Perhaps that is best.\n            *set gift \"gifts\"\n            *set zhuge %+10\n            *goto zhugemiao\n      #Ah ha! She is a bandit! I want nothing more to do with this woman.\n        You wish the woman good luck \"finding her ox\" in a tone that clearly shows you no longer believe her. A noticeably less than humble look of amusement crosses the woman's face at your refusal, which you find odd—but continue on your way regardless.\n        *set feng %-10\n        *goto zhugemiao\n  *if (met_feng = true) #This woman seems very familiar—she reminds me of a certain fox spirit I met the last time I traveled this way.\n    *set feng %+10\n    *if scenefox > 0\n      *set scenefox +1\n      *achieve foxed2\n      *goto fengyousay\n    *else\n      *achieve foxed\n      *set scenefox +1\n      *goto fengyousay\n    *label fengyousay\n    \"Feng?\" you say cautiously.\n\n    The woman beams. \"You remembered me!\"\n\n    As though you were likely to forget an encounter with a fox spirit.\n\n    The huli jing gestures to her pack, letting her seven tails peek out from beneath the humble peasant clothing she wears as a disguise. \"I thought perhaps you might like an additional option to present to Master Zhuge. No tricks, I promise.\" She gives you a wink, then bounds off into the woods, changing to her fox form as she goes.\n    *goto gifts\n\n*label zhugemiao\nIt is dark before you reach the small mountain hut where Master Shen's map said it would be. You rap on the door, expecting it to open with hospitality, even at this late hour and even from a legendary hermit. What you do not expect is for a wizened and wiry old woman, white hair dangling in a long braid down her back, to open the door with distaste.\n\n\"I am not interested in visitors,\" she snaps. \"Fend for yourself in the mountains. Consult the stars. Maybe you'll learn something.\"\n*choice\n  #Explain I am here from the Order of the Peach Tree to see Master Zhuge, relying on the Order's reputation to bring goodwill.\n    *set zhuge %+5\n    \"My old student Shen went back to the Order of the Peach Tree after he had learned what he could from me,\" she says with a whimsical expression on her face. \"He couldn't master the secrets of immortality, but he was a good student nonetheless. I often wondered what became of him.\"\n    *choice\n      #\"He became one of the most honored teachers in the Order of the Peach Tree, Master Zhuge.\"\n        *set zhuge %+10\n        The old woman smiles at you and opens her door wide. \"I am glad to hear he taught at least one of his students some sense. Come on inside. It's nice enough now, but even in summer the cold hits the mountains at night and chills even young bones.\"\n        *goto inside\n      #\"He became old.\"\n        \"Almost everyone does,\" the old woman says. \"Have you come with a message from him?\"\n        *choice\n          #\"He sent me to study under Master Zhuge. Is he here?\"\n            The old woman shuts the door in your face.\n            \"Consult the stars and try again in the morning. See if you're any smarter then,\" you hear her say from inside.\n            *goto morning\n          #\"Master Shen thought I could learn from his old teacher.\"\n            The old woman folds her arms across her chest. \"And what did he say about this teacher?\"\n            *choice\n              #\"The legends already say so much about Master Zhuge—what could he add?\"\n                The old woman sighs.\n                \"Try again in the morning and see if you're any cleverer then,\" she says. \"Consult the stars, get some night air, and knock on my door when you have something more insightful to say.\"\n\n                You start to move toward the door, but she shakes her head. \"After dawn. We old legends need our sleep.\"\n                *goto morning\n              #\"He neglected to contradict rumors of your gender, Master Zhuge.\"\n                *set zhuge %+10\n                The old woman laughs aloud. \"Not one to beat around the bush, are you?\" She holds open the door. \"Well, come inside. It's nice enough now, but even in summer the cold hits the mountains at night and chills even young bones.\"\n                *goto inside\n              *if (cleverness > 60) #\"He said Master Zhuge was an old hermit—a true recluse—and crafty as a dragon.\"\n                *set zhuge %+20\n                The old woman smiles broadly at you. \"That sounds exactly like him. And, clever as you are to remember his words verbatim, I am sure you also realize that you are speaking to his old master now.\"\n\t\t\t\t\n                You nod. You suspect Master Shen is grinning to himself even now at the idea that you—like anyone who has heard the legends of Zhuge—went to the hermitage expecting a man, not a wrinkled old woman.\n\t\t\t\t\n                She holds open the door. \"Well, come inside. It's nice enough now, but even in summer the cold hits the mountains at night and chills even young bones.\"\n                *goto inside\n      #Wait, Master Zhuge is a woman?\n        The old woman clearly notices the way you are looking at her, contrasting what she just said about being Master Shen's instructor with the legends about Zhuge the Immortal, the Veiled Dragon.\n\t\t\n        \"Well? Are you done staring?\" She folds her arms across her chest. \"Or would you like to sleep outside tonight?\"\n        *choice\n          #\"Of course!\" I stammer. \"I mean, I apologize for staring, Master.\"\n            *set zhuge %+5\n            The old woman quirks an eyebrow at you. \"Young people today,\" she says gleefully. \"Come on inside, young fool. We'll see if we can't train some sense into you. When we're through, you may wish you'd been told to sleep outside.\"\n            *goto inside\n          #\"I apologize. I was awed by the presence of an immortal.\"\n            The old woman sighs. \"Flattery to cover foolishness works only on the young. Sleep outside, consult the stars, and try again in the morning. See if you can pull your wits together by then.\"\n\n            She closes the door, leaving you alone in the dark.\n            *goto morning\n          #\"Don't flatter yourself, lady. You're not that pretty.\"\n            *set zhuge %-10\n            The old woman smiles at you, but there is nothing friendly about it. It is rather reminiscent of the way a tiger bears its fangs in a threat.\n\t\t\t\n            \"Insulting someone you hope will take you on as a student is a remarkably foolish way to make a first impression. I suggest you consult the stars and try again in the morning.\" With another flash of those threatening teeth, she continues. \"Perhaps in my old age, I will have forgotten about this conversation by then.\"\n\t\t\t\n            She slams the door behind her, leaving you alone in the dark.\n            *goto morning\n  #Demand that this insolent old woman introduce me to Master Zhuge, whom I have traveled so far to see.\n    *set zhuge %-10\n    \"Master Zhuge is not interested in visitors, particularly at this time of night,\" she says sharply. \"Consult the stars and try again in the morning. Perhaps the mountain will knock some sense into you.\"\n\t\n    She slams the door, and, despite its humble appearance, the structure is remarkably resistant to any attempts to push the door open.\n    *goto morning\n  #Apologize for the late hour and ask for hospitality to be granted to a humble monk.\n    *set zhuge %+10\n    *set enlightened %+5\n    \"Never let it be said that Zhuge Miao denied her hospitality to a traveling monk,\" says the old woman quietly, holding the door open. \"It would absolutely ruin the tales of my generosity.\"\n\n    It takes you a moment to reconcile what she has just said—calling herself Zhuge Miao, and claiming that there are tales about her—with the legends you have learned about Zhuge the Immortal, the Veiled Dragon. But though all the stories you know refer to Zhuge as a man, you can sense the gravitas this woman has. \n\t\n    \"Thank you, Master Zhuge,\" you say, and allow yourself to be ushered inside.\n    *goto inside\n  *if (cleverness > 60) #Bow deeply. The way this woman moves, despite her age, reveals her skill. I address her: \"Master Zhuge.\"\n    *set zhuge %+20\n    It takes you a bare moment to reconcile the woman before you with the l
