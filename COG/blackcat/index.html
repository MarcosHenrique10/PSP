et orb. A smoke bomb. Not that you're going to set it off—you just need something to roll down the hall to pique the guard's interest. Edging toward the corner, you hold your breath and set it rolling to the left. \n\n*if flash \u003c=40\n   The guard is startled. \"What was that noise?\" he says into his headset. \"Paulo, stand by. I'm gonna go check something out.\" He moves toward the left, scanning the ground—but you were careful and the smoke bomb's rolled out of his sight by now. \n\n   Silently, you and Reg duck behind the pillar, then into the correct hall. You exhale. Perfect.\n   *goto door\n*else \n   The guard is startled. \"What was that noise?\" he says into his headset. \"Paulo, stand by. I'm gonna go check something out.\" He moves to the left, scanning the ground, and picks up the orb. \"What the hell is is this?\" He glances behind him and moves toward the pillar—but by then, you and Reg have ducked out of sight. \n\n   The guard, finding nothing, shakes his head. \"Could be nothing, could be something,\" he says to his cohorts as you and Reg round the corner into the correct hall. \"Keep an eye out.\" Great. More suspicion is all you need. \n   *set alert %+25\n   *goto door\n\n*label door\n*page_break\nYou're in a sumptuous hallway—actually, this is the far end of the one you and Le Roux explored last night. You glance up; you're well aware of the cameras hidden in the fancy gilt mouldings. \"Nora,\" you say. \"We need the cameras in the upstairs hallway killed.\" \n\n\"Done,\" she says. \"I'm running a loop of empty hallway right now. Hurry up, though. Rania and Le Roux are nearly in position and I'll need access to the window alarms to let them in.\"\n\nThe door to the security office is closed and luckily, no one's going in or out. Next to it is the storage closet you're interested in—and, to your dismay, you find it locked with a keypad lock. Never mind. You're prepared. \n\nYou nod at Reg, who reaches into the bag and hands you a tiny container of powder and a small, ultraviolet flashlight. You tap a thin film of powder over the keypad, then shine the light on it. Glowing violet ghosts of fingerprints appear, the vast majority of them on the numbers 5 and 7. \n\n\"Le Roux,\" you say. \"You checked out this hallway last night. Anything special about this door?\" \n\n*if leroux_recon =false\n   \"I didn't get a chance to look at it,\" he says. \"Remember, I had to turn around.\"\n\n   You've seen all kinds of locks, and you're familiar with this particular brand of lock; the keycode is invariably three numbers. You look closer, checking for further clues. \n\n   *if intellect >70\n      *if entrycode =\"575\"\n         There are definitely more fingerprints on the 5, and as you look even more closely, something about the way the prints on the 7 are smudged triggers memories of other locks on other jobs. The 7 is the middle number. You confidently type 575. \n         *goto door_open\n      *elseif entrycode =\"755\"\n         There are definitely more fingerprints on the 5, and as you look even more closely, something about the way the prints on the 7 are smudged triggers memories of other locks on other jobs. The 7 is the first number. You confidently type 755. \n         *goto door_open\n      *else\n         There are definitely more fingerprints on the 5, and as you look even more closely, something about the way the prints on the 7 are smudged triggers memories of other locks on other jobs. The 7 is the last. You confidently type 557. \n         *goto door_open\n   *else\n      There are definitely twice as many fingerprints on the 5, but there's nothing to indicate the order of the numbers. You're going to have to guess.\n\n      *label keypad\n      *choice\n         *hide_reuse #Type 557.\n            *if entrycode =\"557\"\n               *goto door_open\n            *else\n               There's a slight click, then the keypad light flashes red. Reg frowns. \"I hope we didn't set off something,\" he says. \n               *set alert %+10\n               *goto keypad\n         *hide_reuse #Type 755.\n            *if entrycode =\"755\"\n               *goto door_open\n            *else\n               Nothing happens, save for the keypad light flashing red. You certainly hope the Duke isn't keeping tabs on attempted entries.\n               *set alert %+10\n               *goto keypad\n         *hide_reuse #Type 575.\n            *if entrycode =\"575\"\n               *goto door_open\n            *else\n               The keypad light flashes red. The security system can't be keeping track of failed code entry attempts, can it?\n               *set alert %+10\n               *goto keypad\n*else\n   \"I was going to say,\" Le Roux says. \"I saw one of the maids go through that door last night. I'm pretty sure the code is ${entrycode}.\" \n\n   Good old Le Roux, putting those powers of observation to work. You confidently type in ${entrycode}.\n   *set alert %-10 \n   *goto door_open\n\n*label door_open\n*page_break\nThe door swings open and you and Reg hurry inside, shutting the door behind you. You flip the light switch to find a tiny closet full of boxes of documents and numerous file cabinets. You try one out of curiosity. Locked. Ah well, that's not why you're here. \n\nReg opens the bag and pulls out the device in question. It's a tiny thing, about the size of a mobile phone, with a wide, flat microphone on a wire. You'll need to set it up just right and hide it well enough so that no one entering the closet can find it—not like this place looks like it gets much traffic. \n*choice\n   #Set it up myself. \n      You peel off a layer of film from the microphone and stick it to the west wall behind a set of metal shelves. You pull some duct tape from your trusty bag (never leave home without it) and tape the device itself to the bottom of the shelf. Brilliant, if you do say so yourself. \n\n      \"All done. Let's go,\" you say to Reg. \"Nora, is it up?\" \n\n      \"Oh, it's up,\" Nora says. \"Information's coming in now.\" She sounds worried. That's not good. \"The Duke's chambers…oh, dear. Oh dear.\" \n\n      \"What? What?\" \n\n      \"Get to the rendezvous point and I'll tell you,\" she says. \n      *finish\n   #Have Reg set it up. \n      Reg peels off a layer of film from the microphone and sticks it to the west wall behind a set of metal shelves. You pull some duct tape from your trusty bag (never leave home without it) and hand it to him so he can tape the device itself to the bottom of the shelf. Perfect. \n\n      \"All done. Let's go,\" you say to Reg. \"Nora, is it up?\" \n\n      \"Oh, it's up,\" Nora says. \"Information's coming in now.\" She sounds worried. That's not good. \"The Duke's chambers…oh, dear. Oh dear.\" \n\n      \"What? What?\" \n\n      \"Get to the rendezvous point and I'll tell you,\" she says. \n      *finish\n\n*label breakin_nick\n\n*page_break\n[i]That evening—the Duke's palace[/i]\n\nIn the dying twilight, the palace looks both less spectacular and more foreboding than it did last night, the walls of the ancient keep bereft of artistic lighting, and the glitterati replaced by servants and maintenance and cleaning staff. \n\nYou and ${nickname} are dressed to the nines—well, since this is less formal than last night, more like the six-and-a-halves. He's in character as Javier Quiroga in an impeccable linen suit and bespoke shirt with no tie, and you're playing ${alias_firstname} ${alias_lastname} to a T—with the addition of a jaunty satchel containing your gear, and some stylish glasses in which Nora has hidden a small, high-resolution camera. ${nickname}'s got a pair, too. That woman thinks of everything. \n\n\"Remember,\" Nora says in your ear. \"The Duke's got it set up so that only he or a member of the royal family can get into the inner trophy rooms. I won't know exactly what he's got set up until Reg gets my relay installed, but we need biometric data. Definitely fingerprints and voiceprint, but also height, weight, facial scans, maybe even a retina scan. Shake their hands, get voice recordings and take as many photos as you can.\" \n\nYou flex your fingers. You're both wearing stylish driving gloves into which Nora has inserted fingerprint scanning sensors. \"How are we supposed to get a retina scan?\" you ask. \n\n\"Get close,\" she says. \"Get really close.\"\n*achieve frontal\n*page_break\n*goto charm_target\n\n*label charm_target\n\n*if (duke_charm =true) or (duke_flirt =true)\n   You're announced at the gate and, after a few moments waiting in the grand foyer, the Duke arrives to meet you. \"${alias_firstname}!\" he exclaims, obviously delighted to see you. \"And Senor Quiroga. Welcome back to the palace. I'm so glad you were able to join us for dinner.\" \n\n   \"The pleasure is ours,\" you say smoothly, and hold out your hand without taking off your gloves. The Duke regards it a little strangely—the cheek-kiss is the usual greeting in San Castellano—but, as you're a foreigner, he grasps it warmly. \n\n   \"Good job,\" Nora whispers in your ear, and you follow the Duke into the second burgundy drawing room for pre-dinner drinks.\n   *set duke_fingerprints true\n   *goto drawing_room\n*elseif (duchess_charm =true) or (duchess_flirt =true)\n   You're announced at the gate and, after a few moments waiting in the grand foyer, the Duchess arrives to meet you. \"${alias_firstname}!\" she exclaims, delighted. \"And Senor Quiroga. Welcome back to the palace. I'm simply overjoyed you were able to join us for dinner.\" \n\n   \"The pleasure is all ours,\" you say smoothly, and hold out your hand without taking off your gloves. The Duchess regards it strangely—the cheek-kiss is the usual greeting of San Castellano—but, as you're a foreigner, she grasps it warmly.\n\n   \"Good job,\" Nora whispers in your ear, and you follow the Duchess into the second burgundy drawing room for pre-dinner drinks.\n   *set duchess_fingerprints true\n   * ourse.\n\n\"Yes, Leclerc. She's saying there's someone in town looking to steal the Black Cat. Can you believe that?\"\n*choice\n   #\"Yes.\" \n      The Duchess laughs. \"They're always coming around telling us someone's trying to steal something or other. It's one of the inconveniences of having such a…unique collection.\" \n\n      \"Are you concerned?\" you ask nonchalantly. \n      *if alert >=75\n         *goto suspicious\n      *elseif alert >=50\n         *goto kinda_suspicious\n      *else \n         *goto not_suspicious\n   #\"No.\" \n      \"Sounds like a movie, right?\" ${heir} says. \"If Papa didn't have such a crazy collection, I wouldn't believe it, either. But Leclerc sounded pretty concerned.\" \n\n      \"Are you?\" you ask nonchalantly.\n      *if alert >=85\n         *goto suspicious\n      *elseif alert >=50\n         *goto kinda_suspicious\n      *else\n         *goto not_suspicious\n   #\"Hey, if I weren't having dinner with you right now, I'd steal it myself!\"\n      *if bouchard_dead =false\n         ${nickname} shoots you a nasty look. Even for him, there's such a thing as being too cocky. \n\n         The Duke doesn't notice, though. \"They're always coming around telling us someone's trying to steal something or other,\" he says. \"Unsurprising. I've got quite the collection.\" He preens a little.\n\n         \"Are you concerned?\" ${nickname} asks nonchalantly.\n         *set flash %+10\n         *if alert >=75\n            *goto suspicious\n         *elseif alert >=50\n            *goto kinda_suspicious\n         *else\n            *goto not_suspicious\n      *else\n         Hey now. Even for you there's such a thing as being too cocky. \n\n         The Duke doesn't notice, though. \"They're always coming around telling us someone's trying to steal something or other,\" he says. \"Unsurprising. I've got quite the collection.\" He preens a little.\n\n         \"Are you concerned?\" you ask nonchalantly.\n         *set flash %+10\n the next part of the plan. \n      *goto fake_sick\n\n*label fake_sick\n*page_break\n\nYou raise your hand to your head, then stagger a bit, catching yourself on an 18th century globe. \"All of a sudden I'm feeling a bit…off,\" you say, your voice just a touch weak. \n\n\"Oh no!\" exclaims the Duchess as you sink down onto a couch. She looks genuinely concerned. \"Please, sit! Do you need anything?\" \n\n\"You're too kind,\" you say. \"I'm just…I haven't felt well for a few days. I think I might need to rest here a bit before dinner….\" \n\n\"Oh no!\" the Duchess says again. \"You're a guest of this family and I won't have you pushing yourself if you don't feel well.\" She tugs on a bellpull on the wall, and a footman in dinner dress appears. \"Jeremy, won't you please take our guest to one of the guest rooms? You can stay as long as you need to.\" The Duke looks irritated, but says nothing. \n\n*page_break\n\nOnce the unsmiling Jeremy has settled you in your room, you duck out the door. You're one hall over from the Duke's private chambers and the rendezvous spot—and then you find yourself blocked by a door with a keypad lock. You sigh. Annoying but simple enough.\n\nYou pull out a tiny container of powder from your satchel, along with a small, ultraviolet flashlight. You tap a thin film of powder over the keypad, then shine the light on it. Glowing violet ghosts of fingerprints appear, the vast majority of them on the numbers 5 and 7. \n\n\"Le Roux,\" you say. \"You checked out this hallway last night. Anything special about this door?\" \n\n*if leroux_recon =false\n   \"I didn't get a chance to look at it,\" he says. \"Remember, I had to turn around.\"\n\n   You've seen all kinds of locks and you're familiar with this particular brand of lock; the keycode is invariably three numbers. You look closer, checking for further clues. \n\n   *if intellect >70\n      *if entrycode =\"575\"\n         There are definitely more fingerprints on the 5, and as you look even more closely, something about the way the prints on the 7 are smudged triggers memories of other locks on other jobs. The 7 is the middle number. You confidently type 575. \n         *goto door_open2\n      *elseif entrycode =\"755\"\n         There are definitely more fingerprints on the 5, and as you look even more closely, something about the way the prints on the 7 are smudged triggers memories of other locks on other jobs. The 7 is the first number. You confidently type 755. \n         *goto door_open2\n      *else\n         There are definitely more fingerprints on the 5, and as you look even more closely, something about the way the prints on the 7 are smudged triggers memories of other locks on other jobs. The 7 is the last number. You confidently type 557. \n         *goto door_open2\n   *else\n      There are definitely twice as many fingerprints on the 5, but there's nothing to indicate the order of the numbers. You're going to have to guess.\n      *label keypad2\n      *choice\n         *hide_reuse #Type 557.\n            *if entrycode =\"557\"\n               *goto door_open2\n            *else\n               There's a slight click, and then the keypad light flashes red. You frown. You hope you didn't set off something. \n               *set alert %+15\n               *goto keypad2\n         *hide_reuse #Type 755. \n            *if entrycode =\"755\"\n               *goto door_open2\n            *else\n               Nothing happens, save for the keypad light flashing red. You certainly hope the Duke isn't keeping tabs on attempted entries.\n               *set alert %+15\n               *goto keypad2\n         *hide_reuse #Type 575.\n            *if entrycode =\"575\"\n               *goto door_open2\n            *else\n               A red flash of the keypad light. The security system wouldn't log repeated entry attempts, right?\n               *goto keypad2\n*else\n   \"I was going to say,\" Le Roux says. \"I saw one of the maids go through that door last night. I'm pretty sure the code is ${entrycode}.\" \n\n   Good old Le Roux, putting those powers of observation to work. You confidently type in ${entrycode}.\n   *set alert %-10 \n   *goto door_open2\n\n*label door_open2\n\nThe door swings open. \"We're ready on my end,\" Reg says in your ear. \"Relay online…now.\" \n\n\"Okay, getting information,\" Nora says. She sounds worried. Not good. \"Alright, the Duke's chambers…oh, dear. Oh dear.\" \n\n\"What? What is it?\" \n\n\"Get to the rendezvous point and I'll tell you,\" Nora says.\n*finish\n\n*label breakin_rania_leroux\n*page_break\n[i]That evening—the Duke's palace[/i]\n\nIn the dying twilight, the palace looks both less spectacular and more foreboding than it did last night, the tower walls bereft of artistic lighting, and the glitterati replaced by servants and maintenance and cleaning staff. \n\nYou, Rania, and Le Roux are all in cat-burglar black, lurking behind the tall wall of the eastern gardens. This is not a well-trafficked part of the palace, and for good reason; below you are the Cliffs of San Castellano, a straight drop to the sea. Half-crumbled, stone walls mark where parts of the ancient keep have fallen into the Mediterranean. You're waiting for the sun to fall a little lower below the horizon before you get to work, and as the pinkness fades from the sky, Rania asks, \"So, who's doing recon?\" \n*achieve overtop\n\n*choice\n   #\"I will.\"\n      Le Roux is carrying the bag. He opens it up and ceremoniously hands you a grappling hook. With a practiced swing, you twirl and throw it easily up the fifteen-foot wall, then climb. You peer over the top. \"Just like we thought,\" you say. \"Come on.\" \n\n      Two more grappling hooks attach next to yours, and Rania and Le Roux scramble up the ropes. Together, the three of you drop to the other side of the wall. \n      *goto other_side     \n   #\"Rania should.\" \n      Le Roux is carrying the bag. He opens it up and ceremoniously hands Rania a uspicious. He's recruited some of the local police force to patrol the palace. Nothing that should stop us but it'll make things a little more difficult. And you know who told him to do it?\" \n\n   \"Who?\" you ask, but you can guess.\n\n   \"Leclerc,\" he says. \"She just left the palace moments before I got here. Hot on your trail as usual, ${firstname}—that at least never changes. \n   *goto first_run\n*else\n   \"Well, one dog,\" Nora says. \"And two officers, from the sound of it.\"\n\n   \"Blame it on Leclerc,\" ${nickname} says. Of course. One step behind, as always. \"She left the palace minutes before I arrived, telling the Duke someone's here to steal the Black Cat. He didn't quite believe her but he let her bring in a couple officers. Shouldn't cramp our style.\"\n \n   *goto first_run\n\n\n*label first_run\n*page_break\n\n\"First, let's worry about the infrared scanners, then we'll deal with the dogs,\" Rania says. The palace's network of infrared scanners can pinpoint the location of anyone on the grounds. Nora will be shutting them down individually as you pass by, so you'll have to keep her posted. \n\nThe three of you slide along the wall. Sea grass and scrub grow here, as compared to the more manicured grounds of the inner garden. You eye the inner garden wall; it's not as tall as the outer wall, but you know the quaint iron filigree decorating the top is electrified. There are two ways you could go here. \n*choice\n   #Tell Nora to shut down the electric fence so I can go over the top.\n      \"You sure? Shutting down the whole system at once won't go unnoticed in the security office,\" Nora says. \n\n      \"Just do it,\" you say. A moment later, the ironwork emits a couple of blue sparks and the loud hum of the fence goes silent. \n\n      Again, the three of you expertly hook your grappling hooks onto the top of the wall, and you're over it in seconds—but not before you hear someone yell, \"Hey! The fence is out!\"\n\n      *if flash \u003c=40\n         You disappear into the shadows. Sparks fly off the fence again. \"Never mind, it's back on,\" shouts the guard. Whew. \n         *goto second_run\n      *else\n         You disappear into the shadows—or, rather, you almost manage it before a guard comes into view, a flashlight beam bobbing in front of her. Luckily, rather than investigate the hint of motion in the underbrush, she's distracted by the fence sparking again. \"Never mind, it's back on,\" a colleague shouts. \n\n         \"I thought I saw something,\" the guard says. \"Could be nothing but we'd better let the captain know. Maybe they can bring one of the dogs over.\" You cringe. If only you'd moved a little faster. \n         *set alert %+15\n         *goto second_run\n   #Tranquilize the guard and go through the gate.\n      There's one guard on the gate right now. You take the bag from Le Roux and pull out the tranquilizer gun. \"You sure that's just a tranquilizer?\" Le Roux asks nervously. \n\n      \"Stops 'em from yelling when you shoot 'em,\" Rania says, and the kid looks positively scandalized. You take the gun and, back to the inner wall, edge your way toward the gate, steady your arm, and take aim. \n\n      *if technique >=60\n         You pull the trigger. There's a soft \"pop\" and the guard looks up, stunned, with the dart right in her neck—then silently keels over. Good shot!\n\n         The three of you edge toward the gate. Rania bends to grab the guard's keycard, and you're through the gate in seconds, disappearing into the shadows. \n         *goto second_run\n      *else\n         You pull the trigger. There's a soft \"pop\" and the guard looks up, stunned, with the dart in her arm, not her neck. Drat! Now it won't work as fast. \"Hey,\" she says weakly into her headset. \"I think I…\" She keels over. \n\n         Quickly, Rania grabs the guard's keycard and you're through the gate and into the shadows, but behind you, another guard calls, \"Evora? Hey! What happened?\" You'd better move before her body is discovered.\n         *set alert %+15\n         *goto second_run\n\n*label second_run\n*page_break\n\nThere are guards clustered around the entrance to the palace but you're not interested in the entrance. There's a decorative trellis in the corner of the garden against the tower wall, very convenient to give some crooks a leg up. \n\nYou pull three pairs of gloves out of the bag: the most high-tech climbing gear you could get your hands on. Le Roux glances at them skeptically—you know he doesn't need them, the kid is basically Spider-Man. He puts them on anyway and goes first, shimmying up the trellis and getting a decent foothold on the old stone before nodding at you and Rania.\n\nRania goes next, with you bringing up the rear. The gloves grip the stone firmly but you still wish you had a harness as you ease your way up the sheer face of the east tower. Your goal is a window on the fifth floor, just beyond the locked door leading to the Duke's most private rooms; you'll cut your way through and let the rest of the team in from the inside. That's the plan, anyway. \n\nYou're about twenty feet up when you hear barking below you. \"Shit!\" Rania says. \"What do we do?\" \n\nYou survey your surroundings. To your left, there's a ledge on which you might be able to wait out the dogs; on your right, the ground drops abruptly away, leaving only the Mediterranean. Or you could keep climbing and hope you move fast enough not to be spotted. \n\n*choice\n   #Go left. \n      \"Everyone go toward that ledge,\" you say. Le Roux scrambles toward it, followed by Rania and then you. The three of you stand, back to the wall, holding your breath as the dogs bark and flashlights search the wall below you. \n\n      \"I don't see anything,\" someone yells finally. \"False alarm.\" You wait anxiously for a few more minutes of silence, then continue your ascent. \n      *goto reg_call\n   #Go right. \n      There's nothing for it. You ease your way rightwards toward the cliffs, trying to pretend you don't hear the sound of the waves crashing against the base of the tower. The three of you hang, breathless, above the sheer drop as the dogs bark and flashlights search the wall below you.\n      \n      \"I don't see anything,\" someone yells finally. \"False alarm.\" You wait anxiously for a few more minutes of silence, then continue your ascent. \n      *goto reg_call\n   #Keep climbing. \n      \"We can make it,\" you insist. \"Keep going!\" \n\n      *if flash \u003c=50\n         Le Roux scrambles up the wall, followed by Rania. You climb after them as quickly as you can—and sure enough, the flashlights searching the wall below you don't quite reach your location. \n\n         \"I don't see anything,\" someone yells finally. \"False alarm.\" The sound of the barking dogs retreats into the distance, and you continue your ascent. \n         *goto reg_call\n      *else\n         Le Roux scrambles up the wall, followed by Rania. You climb after them as quickly as you can—but you're not quite fast enough, and a flashlight beam grazes your ankle. You're out of range in a second or two, but still. \n\n         \"I thought I saw something,\" someone shouts. \"Keep looking.\" Great. They can't spot you now, all you've done is piqued their suspicion, but suspicion is the last thing you need. \n         *set alert %+20\n         *goto reg_call\n\n*label reg_call\n\n\"Approaching the entry point now,\" you say. \"Nora, have you got the fifth-floor window alarm offline yet?\" \n\n\"Still waiting on Reg,\" Nora says. \"Reg, how are you doing?\"\n\n\"Just got to the storage closet,\" he says. \"It's got a keypad lock. Le Roux, weren't you in this hallway yesterday? Did you get a look at this door?\" \n\n*if leroux_recon =true\n   \"As a matter of fact, I did,\" Le Roux says. \"I saw a maid go through. It looked like the code was 575 but don't quote me on that.\" \n\n   There's a brief silence, and then, \"Good job!\" Reg says. \"I'm in. I'm setting up the device now.\" \n   *goto device_setup\n*else\n   \"I had to turn around, remember?\" Le Roux says. \"Sorry. I wish I could help.\" \n\n   \"Alright,\" Reg sighs. There's a brief moment of silence, and then, \"Looks from the fingerprint pattern like there's two fives and a seven,\" he says. \"Let me try—oh, shit. Wrong order.\" Another brief silence and then, \"Okay, got it this time. I'm in. I'm setting up the device now.\" You sincerely hope the Duke's not paying attention to failed entry attempts on palace doors. \n   *set alert %+15\n   *goto device_setup\n\n*label device_setup\n*page_break\n\nYou climb. You're approaching the fifth floor fast; this has been too easy, especially with Nora's access to the security system. You're feeling a little smug when- \n\n\"Information coming in now, Nora says. \"Alright, the Duke's chambers…oh, dear. Oh dear.\" She sounds worried. \"${firstname}, go in through the fourth floor. Not the fifth. Definitely not the fifth.\" \n\n\"What? What is it?\" \n\n\"Get to the secondary rendezvous point and I'll tell you,\" she says. \n*finish\n\n*label breakin_dead\n*page_break\n[i]That evening—the Duke's palace[/i]\n\nIn the dying twilight, the Palace looks both less spectacular and more foreboding than it did last night, the walls of the ancient keep bereft of artistic lighting, and the glitterati replaced by servants and maintenance and cleaning staff. \n\nYou're dressed to the nines—well, since this is less formal than last night, more like the six-and-a-halves. You're playing ${alias_firstname} ${alias_lastname} to a T—with the addition of a jaunty satchel containing your gear, and some stylish glasses in which Nora has hidden a small, high-resolution camera. That woman thinks of everything. \n\n\"Remember,\" Nora says in your ear. \"The Duke's got it set up so that only he or a member of the royal family can get into the inner trophy rooms. I won't know exactly what he's got set up until Reg gets my relay installed, but we need biometric data. Definitely fingerprints and voiceprint, but also height, weight, facial scans, maybe even a retina scan. Shake their hands, get voice recordings and take as many photos as you can.\" \n\nYou flex your fingers. You're wearing stylish driving gloves into which Nora has inserted fingerprint scanning sensors. \"How are we supposed to get a retina scan?\" you ask. \n\n\"Get close,\" she says. \"Get really close.\"\n*page_break\n*achieve frontal\n\n*if (duke_charm =true) or (duke_flirt =true)\n   You're announced at the gate, and after a few moments waiting in the grand foyer, the Duke arrives to meet you. \"${alias_firstname}!\" he exclaims, obviously delighted to see you. \"Welcome back to the palace. It's too bad Senor Quiroga isn't feeling well, but I'm so glad you're still able to join us for dinner.\" \n\n   \"The pleasure is mine,\" you say smoothly, and hold out your hand without taking off your gloves. The Duke regards it a little strangely—the cheek-kiss is the usual greeting in San Castellano—but, as you're a foreigner, he grasps it warmly. \n\n   \"Good job,\" Nora whispers in your ear, and you follow the Duke into the second burgundy drawing room for pre-dinner drinks.\n   *set duke_fingerprints true\n   *goto drawing_room\n*elseif (duchess_charm =true) or (duchess_flirt =true)\n   You're announced at the gate, and after a few moments waiting in the grand foyer, the Duchess arrives to meet you. \"${alias_firstname}!\" she exclaims, delighted. \"Welcome back to the palace. It's too bad Senor Quiroga isn't feeling well, but I'm simply overjoyed you were able to join us for dinner.\" \n\n   \"The pleasure is all mine,\" you say smoothly, and hold out your hand without taking off your gloves. The Duchess regards it strangely—the cheek-kiss is the usual greeting of San Castellano—but, as you're a foreigner, she grasps it warmly.\n\n   \"Good job,\" Nora whispers in your ear, and you follow the Duchess into the second burgundy drawing room for pre-dinner drinks.\n   *set duchess_fingerprints true\n   *goto drawing_room\n*elseif (heir_charm =true) or (heir_flirt =true) \n   You're announced at the gate, and after a few moments waiting in the grand foyer, ${heir} arrives to meet you. \"${alias_firstname}!\" {subject} exclaims, delighted. \"I'm so glad you were able to join us for dinner. It's too bad Javier's not feeling well, but I'm certain you can hold up his end of the conversation.\" \n\n   \"The pleasure is all mine,\" you say smoothly, and hold out your hand without taking off your gloves. ${heir} regards it strangely—the cheek-kiss is the usual greeting in San Castellano—but, as you're a foreigner, ${subject} grasps it warmly.\n\n   \"Good job,\" Nora whispers in your ear, and you follow ${heir} into the second burgundy drawing room for pre-dinner drinks. \n   *set heir_fingerprints true\n   *goto drawing_room\n*else\n   You're announced at the gate, and after a few moments waiting in the grand foyer, the Duke arrives to meet you. \"So pleased you could join us for dinner,\" he says. \"It's such a pity Senor Quiroga couldn't make it.\" \n\n   \"He sends his regards and wants you to know he's still on for golf Thursday,\" you lie. \"It's a pleasure to see you again.\" You hold out your hand without taking off your gloves. The Duke regards it strangely—the cheek-kiss is the usual greeting in San Castellano—but, as you're a foreigner, he grasps it briefly. \n\n   \"Good enough,\" Nora whispers in your ear, and you follow the Duke into the second burgundy drawing room for pre-dinner drinks. \n   *set duke_fingerprints true\n   *goto drawing_room\n", "chase": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n   Come back in a few minutes to play the next part of [i]Thieves’ Gambit: The Curse of the Black Cat[/i]!\n\n   Or, you can buy the game now to skip the wait.\n\n   *purchase_discount adfree 2020-04-29 $4.99 $2.99 delay_purchased\n   *delay_break 1200\n\n*label delay_purchased\n\n*temp car \"\"\n*temp driver \"\"\n*temp tail false\n\n*set alert 1\n\n[i]Two weeks later—The Caffe La Scala, San Castellano[/i]\n\nNestled in a corner of the Mediterranean is the tiny city-state of San Castellano, a vacation destination for the rich and discreet, best known for its amazing views and lax banking regulations. This morning, you wound your way through steep, green hills in a very nice, rented Jaguar convertible, down through the ivy-covered, old city to your safe house, a run-down palazzo rented through the auspices of one of Nora's shell corporations.\n\nYou've been here often, although not recently. It's a charming place, and it'll be even more charming when you've got the Black Cat in your greedy, little hands.\n\nRight now, you and Rania are sitting outdoors at a cafe in the seaside market district, enjoying an [i]affogato[/i] and the late summer air. The Mediterranean sparkles brilliant-blue on the horizon. A clot of noisy tourists wanders by and after a moment, you realize one of them is waving at you. \n\n*choice\n   #Wave back. \n      *goto hi_nora\n   #Pretend I don't see her.\n      *goto hi_nora\n   #How would I know some uncouth tourist, anyway?\n      *goto hi_nora\n\n*label hi_nora\n*page_break\n\nIt's Nora, wearing truly atrocious sandals and a Grateful Dead T-shirt. She strolls over to your table. \"I thought we were keeping a low profile,\" Rania says with a raised eyebrow.\n\n\"This is low-profile,\" Nora says, shrugging. \"I've got a cover identity, remember? Sandy Bunker, American tourist and gem collector. Don't knock Sandy. She's getting you into the Duke's shindig.\" \n\nThe Duke, of course, is throwing a soiree to show off his latest acquisition, and in addition to the minor nobility and thinly-veiled-underworld types he associates with, he's also invited his fellow collectors so that he might gloat. You're going as Nora's cover identity's plus-one, and she managed to wrangle an invite for Rania, too. Reg and Le Roux are going in as caterers, as one does.\n\nYou won't be stealing the diamond at the party, of course. That's simply a chance to case the joint. And, it goes without saying, snag some free food. The canapés should be divine. \n\n*page_break\n\n\"Where are Reg and Le Roux?\" Nora asks. \n\n\"Back at the house getting things set up,\" Rania says. The party's in three days and, if everything goes well, the heist is in four. You've all got a lot to do—memorize cover identities and floor plans, practice with gadgets, you know, the usual. \n\nYou simply couldn't resist enjoying the sights, though. You've spent some good times here on the beaches and at the casinos. Granted, your last visit didn't go so well. Your sidekick, a local kid named Marco, got cold feet at the last minute and turned you in to the police; you barely got out. Last you checked, there's still a warrant out for your arrest. \n\nWhere isn't there a warrant out for your arrest, though? If you worried about that sort of thing, you'd never go anywhere.\n\nSpeak of the devil. A police officer in shorts, on a bicycle, is approaching the cafe. There's no chance the local authorities would recognize you—you've taken care to cut and dye your hair and are wearing sunglasses, and that was five years ago, in any case. \n\n*choice\n   #Smile at the police officer. \n      You smile and nod at the officer as he cycles by. He's a young man, and he glances at you and nods and smiles back—the police force of San Castellano is friendly, small, and more or less for show, handling parking violations and pickpockets, mostly. The Duke's private security force handles the more unpleasant jobs.\n\n      Something about him seems familiar, though, and as you realize what it is, the bottom drops out of your stomach. The bike screeches to a halt. \n\n      \"Marco?\" you gasp before you can stop yourself. \n\n      \"${firstname}?\" your old partner says in disbelief.\n      *goto recognized\n   #Keep my head down. \n      The officer, a young man, is smiling and nodding at the occasional passerby as he rides down the street. The police force of San Castellano is friendly, small, and more or less for show, handling parking violations and pickpockets, mostly. The Duke's private security force handles the more unpleasant jobs. Still, attracting the attention of the authorities is never a good idea. You focus your eyes on your cup. \n\n      The bike passes your table, then screeches to a halt. You glance up to see an unfortunately familiar face, and the bottom drops out of your stomach. \n\n      \"${firstname}?\" your old partner says in disbelief. \n\n      \"Marco?\" you gasp before you can stop yourself. \n      *goto recognized\n   #Stand up and walk away. \n      You can't be too careful. The more distance you put between yourself and the authorities, the better. Even though the San Castellan police force is small and more or less for show, handing parking violations and pickpockets—the Duke's private security force handles the more unpleasant jobs—you can't risk recognition. \n\n      You stand up and nonchalantly stroll back into the cafe proper, but as you turn your back, you feel a tap on your shoulder. Too late. \n\n      You turn around and, to your shock, you see a familiar face. \n\n      \"Marco?\" you gasp before you can stop yourself. \n\n      \"${firstname}?\" your old partner says.\n      *goto recognized\n\n*label recognized\n*set alert 50\n*choice\n   #Pretend I've gone straight. \n      \"Marco!\" you exclaim. \"It's been so long! How [i]are[/i] you? I see you've got a new job….\"\n\n      \"It's a long story,\" he says, then regards you with narrowed eyes. \"I never expected to see you back here, of all people.\" \n\n      \"It's for work,\" you say. \"No, not that kind of work. I'm on the straight and narrow these days. Event planning. Duke's having a party, there's catering to arrange….\" \n\n      Nora has edged away from the table, heading off and losing herself in the crowd of tourists. Rania is half-standing, ready to run. You wait for a loaded moment— \n      *page_break\n\n      *if honor >=60\n         —and Marco grins. \n\n         \"I knew you had it in you,\" he says. \"I really hated turning you in, you know, but when it came down to it, I just couldn't go through with the crime. And I really hate to do this but look, since you didn't get away with the painting, it's not going to be a long sentence, maybe a year….\"\n\n         He's got his radio in one hand and is pulling out his handcuffs with another. \"You're under arrest,\" he says, but he sounds reluctant about it. \n\n         You exchange desperate glances with Rania, leap to your feet, and run.\n         *set marco \"friend\"\n         *set alert %-10\n         *goto running\n      *elseif honor \u003c=40\n         \"What are you doing here?\" he says, voice dripping with contempt.\n\n         \"Honestly, Marco, I've gone straight. You've got to believe me-\" \n\n         \"Remember how you left me behind? I only betrayed you because you betrayed me,\" he says. \"And now, I've changed but you're still a criminal. And you'll always be a criminal. You're under arrest.\"\n\n         He's got his radio in one hand and is pulling out his handcuffs with another. You exchange desperate glances with Rania, leap to your feet, and run.\n         *set marco \"enemy\"\n         *set alert %+10\n         *goto running\n      *else\n         \"I wish I could believe you,\" he says, a little sadly. \"In any case, you're under arrest.\" \n\n         He's got his radio in one hand and is pulling out his handcuffs with the other. You exchange desperate glances with Rania, leap to your feet and run.\n         *goto running      \n   #Bribe him to leave me alone. \n      \"It's so good to see you!\" you say. \"I like the new uniform—quite a change from old times, isn't it? We had some good times together, didn't we? Fond memories.\" \n\n      Reaching into your wallet, you discreetly slide a stack of small bills across the table, half-tucked under a napkin.\n\n      Nora has already edged away from the table, heading off and losing herself in the crowd of tourists. Rania is half-standing, ready to run. You wait for a loaded moment….\n      *if honor \u003c=40\n\n         \"A bribe?\" Marco snaps. \"That's just like you. Remember when you left me behind to save yourself? I only betrayed you because you betrayed me. It worked out for me eventually, though. And speaking of which, you're under arrest.\"\n\n         He's got his radio in one hand and is pulling out his handcuffs with the other. You exchange desperate glances with Rania, leap to your feet, and run.\n         *set marco \"enemy\"\n         *set alert %+10\n         *goto running\n      *else\n\n         Marco regards the money. \"Sorry, old friend,\" he says. \"I'm over that these days. You're under arrest.\"\n\n         He's got his radio in one hand and is pulling out his handcuffs with the other. You exchange desperate glances with Rania, leap to your feet, and run.\n         *goto running\n   #Run for it. \n      You're not even going to try to talk your way out of this one. You exchange desperate glances with Rania, leap to your feet, and run.\n      *goto running\n\n*label running\n*page_break\n\nYou push through the crowd, Marco close behind, shouting for backup. You've got a head start, though, and duck through a crowd and into a restaurant, past the startled patrons, out the back door, and into an alley. You're fairly sure you've shaken him, but the police presence is pretty solid in the market district, you recall. You're not going to get away on foot.\n\nBut there are three cars parked next to the alleyway. A tiny, blue Fiat is neatly parked at the curb, just the sort of thing for maneuvering around the narrow city streets. Some rich idiot has left a banana-yellow Lamborghini sprawled halfway across the street—fast but easy to spot. Interestingly, parked next to it is a sedan marked with the San Castellan coat of arms and the word \"Polizia\"—fast, indestructible, but risky. Luckily, its driver is nowhere to be found. \n\nRania gestures to the vehicles. \"Your choice,\" she says. \n\n*choice\n   #Steal the Fiat. \n      There are countless blue Fiats on the streets of San Castellano. It's not the fastest car there is but its small size should serve you well on the narrow streets, and if you want to lose yourself in traffic, well, there you go.\n\n      You gesture to the little car. Rania shrugs. \"Yeah. Probably a good idea to keep a low profile,\" she says. Pulling out a wicked-looking pistol, she smashes in the passenger's side window. It's pretty clear the woman's got an arm on her. Very competent driver, too.\n\n      You slide into the car, reach into your ever-present satchel, and pull out a screwdriver. Rania keeps lookout while you pry the cover off the steering column. As you strip the starter wire, Rania says, \"Okay, who's driving?\"\n      *set car \"Fiat\"\n      *set flash %-10\n      *goto choose_driver\n   #Steal the Lamborghini. \n      Gloriously, extravagantly sleek and bright yellow, this is not a car that's going to blend into traffic. But if you want to outrun everyone and everything and look fabulous while you do it, this is definitely the car for you. \n\n      Rania sees your eyes latch hungrily onto the sports car and grins. \"I thought so,\" she says. Pulling out a wicked-looking pistol, she smashes in the passenger's side window. It's pretty clear the woman's got an arm on her. Very competent driver, too.\n\n      An alarm bleats. You slide into the car, reach into your ever-present satchel, and pull out a screwdriver. Rania keeps lookout while you pry the cover off the steering column, silencing the alarm with one practiced jab—luckily, no one passes by. As you strip the starter wire, Rania says, \"Okay, who's driving?\"\n      *set car \"Lamborghini\"\n      *set flash %+10\n      *goto choose_driver\n   #Steal the police car.\n      The police car looks fast and maneuverable, and it'll definitely bolster your reputation for risk-taking if—no, when—you get away. \n      \n      \"You want to steal a police car? Are you insane?\" Rania says. After a moment, she shrugs—she already knows the answer to that—and, pulling out a wicked-looking pistol, smashes in the passenger's side window. It's pretty clear the woman's got an arm on her. Very competent driver, too.\n\n      You slide into the car, reach into your ever-present satchel, and pull out a screwdriver. Rania keeps lookout while you pry the cover off the steering column. As you strip the starter wire, Rania says, \"Okay, who's driving?\"\n      *set car \"police car\"\n      *set flash %+20\n      *goto choose_driver\n\n*label choose_driver\n*choice\n   #I'll drive. \n      \"Suit yourself,\" Rania says. She's a competent, fearless driver but this job is your baby and you're in the driver's seat on this one.\n\n      \"You can drive next time,\" you say as the car revs to life. You slide up into the driver's seat.\n\n      *if car !=\"Lamborghini\"\n         \"Next time, we steal the Lamborghini,\" she says. She's smiling. She enjoys this.\n \n         *set driver \"me\" \n         *goto start_car\n      *else\n         \"Better not get caught or there won't be a next time,\" she says. But she's smiling. She enjoys this.\n\n         *set driver \"me\" \n         *goto start_car\n   #Rania should drive.\n      Rania is a competent, fearless driver, and you'll feel comfortable if she's in the driver's seat. \"After you,\" you say.\n\n      \"You sure?\" she says. \"I don't know San Castellano and my GPS doesn't have a car-chase setting. You're going to have to navigate.\" \n\n      \"Shouldn't be a problem,\" you say as the car revs to life. Rania squeezes past you into the driver's seat.\n      *set driver \"rania\"\n      *goto start_car\n\n*label start_car\n*if car = \"police car\"\n   The police scanner flips on in a torrent of brusque Italian. You hear Marco relay your position, and you a car respond; you'd better get out of here.\n\n   *if driver = \"me\"\n      You hit the gas, peeling out of the side-street and onto the main thoroughfare.  \n      *goto choose_path\n   *else\n      Rania hits the gas, peeling out of the side-street and onto the main thoroughfare.\n      *goto choose_path\n*else\n   *if driver = \"me\"\n      You hit the gas, peeling out of the side-street and onto the main thoroughfare. You hoped you hadn't been spotted but there's Marco, pointing at your car and shouting into his radio. Shit.\n      *goto choose_path\n   *if driver = \"rania\"\n      Rania hits the gas, peeling out of the side-street and onto the main thoroughfare. You hoped you hadn't been spotted but there's Marco, pointing at your car and shouting into his radio. Shit.\n   *goto choose_path\n\n*label choose_path\n*page_break\n\nThe only way out of here is through the seaside market district to the roundabout at the Piazza di Prugne at the edge of town, and after that, onto the autostrada and into the hills. If you haven't shaken them by the time you get there, you'll do it on the way to the Italian border—and whatever happens, you can't go back to the safehouse until you're sure no one's on your tail.\n\n*if driver = \"rania\"\n   Rania blows through the intersection to raised eyebrows from passersby. \"Are you sure this is the way you want to go?\" she says. \"Everyone's going to be able to see us.\"\n\n   \"Yes, but will they be able to catch us?\" you say cheerfully. Rania shrugs and leans on the gas.\n   *goto sirens \n*else\n   You blow through the intersection to raised eyes from passersby and Rania. \"Are you sure this is the way you want to go?\" she says. \"Everyone's going to be able to see us.\" \n\n   \"Yes, but will they be able to catch us?\" you say cheerfully, and speed up.\n   *goto sirens\n\n      \n*label sirens\n*page_break\n*if car = \"police car\"\n   Someone is attempting to call your car. You and Rania exchange a look but before you can grab the radio and impersonate a police officer, the radio cuts off. They've discovered you. Great.\n\n   \"I told you not to steal the police car,\" Rania says. \"They'll have the whole city after us. I really hope you know what you're doing.\"\n\n   Behind you, you hear the sirens. Glancing in the rearview mirror, you see one police car, then another, cresting the top of the hill…then another, then another. You lose track after four and turn your attention grimly back to the road. \n   *set alert %+10\n   *goto intersection\n*else\n   Behind you, you hear the sirens. Glancing in the rearview mirror, you see a police car cresting the top of the hill. Good. One car, you can handle.\n   *goto intersection\n\n*label intersection\n*page_break\n\nThere's an open stretch of road ahead, leading down the shore and toward the main market district, a picturesque square where shoppers stroll through a maze of stalls offering everything from street food to antiques to live poultry. After that, you'll need to reach the roundabout at the Piazza di Prugne, and after that, it's a straight shot into the hills, and from there to the Italian border, where you're certain to lose your pursuers. \n\nDirectly ahead, though, is a yellow light, about to turn red. If you manage to make it, it'll put plenty of traffic between you and your pursuers.\n*page_break\n\n*if ((driver = \"me\") and (technique >70)) or (car = \"Lamborghini\") \n   You blow easily through the intersection. The light changes and traffic behind you slams to a halt, trapping your pursuers in its midst. Behind you, angry sirens wail above a cacophony of horns.\n\n   Ahead of you, though, a delivery truck has stalled in the middle of the road. \"The sidewalk!\" you yell. The car jumps the curb and hits a bookshop's sidewalk display, scattering shrieking shoppers and remainders everywhere. Ah, well—you've lost the cops for now, and this is a quick, if drastic, shortcut to the Piazza.\n   *set tail false\n   *goto sidewalk\n*elseif (driver = \"me\") and (technique \u003c=50)\n   The car's engine revs as you speed up but you're not going to make it. \n   *choice\n      #Stop.\n         *gosub trial_end\n         You screech to a halt—and just in time, as two lanes of irritable cross-traffic surge forward. Had you tried to run the light, it might not have been pleasant. \n\n         But behind you, you hear a cacophony of angry horns. Your pursuers are weaving their way through the mess, sirens wailing. You try not to panic—you've got to get out of here. \n\n         The only option at this point is the sidewalk. You swerve out of the mess of traffic and jump the curb, scattering shrieking shoppers everywhere. \"What do you think you're doing?\" Rania shouts.\n\n         \"This is the only way to the Piazza from here,\" you say as you plow through a bookshop's sidewalk display, scattering remainders everywhere.\n         *goto sidewalk    \n      #Run the red light. \n         *gosub trial_end\n         You exchange another glance with Rania and, without another word, you run the red light and speed into the intersection… \n\n         …and a sizable sedan slams into the ${car}'s front passenger's side, spinning you around and knocking you onto the sidewalk. The airbags deploy in your faces. Luckily, you're just jarred and you manage to scramble for the knife in your pocket to slice open first yours, then Rania's. \"You okay?\" you ask.\n         *goto collision\n*else\n   \"We're not going to make it!\" Rania yells. \n\n   But you do. Unfortunately, so do the police. The cross traffic freezes in the wake of a police car, and you swerve around the corner headed to the market, the authorities hot on your tail. \n\n   Ahead of you, though, a delivery truck has stalled in the middle of the road. \"The sidewalk!\" you yell. The car jumps the curb and hits a bookshop's sidewalk display, scattering shrieking shoppers and papers everywhere. It's not ideal but it's the best shortcut to the Piazza.\n   *set tail true\n   *goto sidewalk\n\n*label collision\n*if car = \"Fiat\"\n\n   Rania groans. \"My shoulder…. But it's fine. Let's go.\"\n\n   The little car's engine makes an uncomfortable scraping sound. You smell smoke, and then the car dies. You're not going anywhere. \n\n   \"What do we do now?\" Rania says. \n\n   \"What do you think?\" you say. Throwing the doors open, both of you get out and run like hell. \n\n   You hear shouts behind you. \"Stop! Police!\" You try to make one last dash but after that impact you're too shaken to make it. A police officer tackles you from behind, and as you lie on the sidewalk, hands bound behind you, being read your rights, you wonder if you're going to get out of this one, and if not, what kind of meals they serve in San Castellan jails.\n   *goto captured\n*else\n\n   Rania groans. \"My shoulder…. But it's fine. Let's go.\" \n\n   The police car's engine shudders and restarts without even a rattle. This thing certainly was built to survive impact. \"The sidewalk,\" you say. \"It's the only way to the piazza from here.\" Rania nods, and the car plows through a bookshop's sidewalk display, scattering shrieking shoppers and papers everywhere.\n\n   *goto sidewalk\n\n*label sidewalk\n*page_break\n\nThe ${car} rockets around a corner, then screeches to a stop as you very nearly run over a gaggle of uniformed schoolkids. They shout at you as the car pushes through them. The sirens are, thankfully, not as close, but you can't afford to lose any time. \n\nNow you're next to a narrow courtyard with a little fountain, occupied by a couple of elderly women and some flowerboxes. On the other side, you can see the stalls and crowds of the marketplace. \"That's a shortcut,\" you tell Rania. But it's narrow. Really narrow.\n\n*choice\n   #Attempt the alleyway.\n      *gosub trial_end\n      *if ((driver = \"me\") and (technique >= 70)) or (car = \"Fiat\")\n         The ${car} zips through the alley without so much as scraping a flowerbox. The old ladies shout at you and one tries to get a hit in with an umbrella but she misses. \n\n         You emerge into the marketplace. You check the rearview mirror; nothing. You've made it without a tail. \n         *set tail false\n         *goto market\n      *elseif (technique \u003c=50) or (((technique \u003c=60) and (car = \"police car\")) or ((driver = \"rania\") and (car = \"police car\")))\n         The ${car} eases its way through the alley, splintering flowerboxes. The old ladies shout at you, and one bars your way, flailing with a big, black umbrella. The engine revs threateningly, but she doesn't move….\n\n         And then you hear the siren. Lights flare at the end of the courtyard. They've found you. \n\n         \"Shit,\" gasps Rania, and in unison, both of you throw open the car doors and run for it.\n\n         Before you can take two steps, you feel an impact against your knees and drop to the ground. You've been felled by the umbrella. The old lady cackles madly as the police surround you, and as you lie on the ground, hands boundd behind you, you wonder if you're going to get out of this, and if not, what the food is like in San Castellan jails.\n         *goto captured\n      *else\n         The ${car} eases its way through the alley, splintering a flowerbox and scraping the door of the car against the ancient fountain. The old ladies shout at you, one of them whacking the hood of your car with an umbrella. You make it out the other side, though….\n\n         But behind you, you hear sirens, growing louder. Great. You've got a tail. You're going to have to shake them in the market.\n         *set tail true\n         *goto market\n   #Go the long way around.\n      *gosub trial_end\n      *if driver = \"me\"\n         You decide not to risk the alleyway. The ${car} lurches, and you barrel your way through the outside seating area of a cafe, luckily unoccupied, splintering chairs and knocking down a patio umbrella. Behind you, you can hear the sirens coming closer. \n\n         You're winding your way up into the old city now—twisty, cobbled, ancient streets not built for cars. You're nearly to the marketplace when a street ends abruptly at a sharp corner. You barely have a moment to register as the car hurtles around the hairpin turn.\n\n         *if (car = \"Fiat\") or (car = \"Lamborghini\")\n            The ${car} is maneuverable enough that you make it around the corner without too significant a drop in speed. You hear the sirens growing fainter as the marketplace opens up in front of you. Great! You've made it without a tail.\n            *set tail false\n            *goto market\n         *else\n            As maneuverable as the ${car} is, it's not a small car, and you scrape the wall as you careen past. \n\n            \"Shit, that slowed us down,\" Rania says. You hear the sirens behind you coming closer. Great. You've got a tail. You're going to have to shake them in the market. \n            *set tail true\n            *goto market\n      *if driver = \"rania\"\n         You decide not to risk the alleyway. The ${car} lurches, and Rania barrels her way through the outside seating area of a cafe, luckily unoccupied, splintering chairs and knocking down a patio umbrella. Behind you, you can hear the sirens coming closer. \n\n         Rania's winding her way up into the old city now—twisty, cobbled, ancient streets not built for cars. You're nearly to the marketplace when a street ends abruptly at a sharp corner. You both have barely a moment to register this new obstacle as the car hurtles around the hairpin turn.\n         *if (car = \"Fiat\") or (car = \"Lamborghini\")\n            The ${car} is maneuverable enough that you make it around the corner without too significant a drop in speed. You hear the sirens growing fainter as the marketplace opens up in front of you. Great! You've made it without a tail.\n            *set tail false\n            *goto market\n         *else\n            As maneuverable as the ${car} is, it's not a small car, and Rania scrapes the wall as she careens past. \n\n            \"Shit, that slowed us down,\" Rania says. You hear the sirens behind you coming closer. Great. You've got a tail. You're going to have to shake them in the market. \n            *set tail true\n            *goto market\n\n\n*label market\n*page_break\n\nThe marketplace of San Castellano is an ancient square dating back more than a thousand years, with a wide terrace on the hill called the Colligna di Fagioli overlooking the sea. Sellers have been hawking their wares here since time immemorial, and stalls fill the square in wide, neat rows, the calls of the merchants echoing against the ancient walls and through the shattered window of your stolen car. \n\nThere are a fair number of vehicles here, easing their way through the aisles—the sellers' trucks and vans, mostly, with a few tourist limousines. But mostly, the square is crowded with people. If you can get through here, it's a straight shot to the Piazza di Prugne, and from there to the autostrada and into the hills. \n\nBut the place is a maze, and there are countless, tiny streets leading from the marketplace. \"Do you know where we're going?\" Rania says. \n\n*fake_choice\n   *if (intellect \u003c=55) #I have no idea!\n      *if driver = \"rania\" \n         You really don't have a head for directions. What little you remember of the streets of San Castellano has gotten you this far, but now you're going to have to guess. \n\n         Rania veers through the market, the ${car}'s horn honking. Patrons scatter, sellers shout at you. You see a fruit stall ahead of you—and the owner standing defiantly in front of it, picking up a watermelon.\n\n         For a fraction of a second, you debate telling Rania to just gun it, damn the torpedoes! And then the watermelon hits your windshield and splashes. You shout, your vision obscured, and the car weaves and crashes into what sounds like a chicken coop. You're stuck. \n\n         You exchange a desperate glance with Rania, throw the doors open, and run for it but it's too late. You're surrounded by police. As you're pushed to the ground and handcuffed, you wonder if you're going to get out of this one—and if not, what the food is like in San Castellan jails.\n         *goto captured\n      *if driver = \"me\"\n         You really don't have a head for directions. What little you remember of the streets of San Castellano has gotten you this far, but now you're going to have to guess. \n\n         You veer through the market, the ${car}'s horn honking. Patrons scatter, sellers shout at you. You see a fruit stall ahead of you—and the owner standing defiantly in front of it, picking up a watermelon.\n\n         For a fraction of a second, you debate just gunning it, damn the torpedoes! And then the watermelon hits your windshield and splashes. You shout, your vision obscured, and the car weaves and crashes into what sounds like a chicken coop. You're stuck. \n\n         You exchange a desperate glance with Rania, throw the doors open, and run for it but it's too late. You're surrounded by police. As you're pushed to the ground and handcuffed, you wonder if you're going to get out of this one—and if not, what the food is like in San Castellan jails.\n         *goto captured\n   *if (intellect >=70) #I know exactly where I'm going. \n      You know this city like the back of your perfectly manicured hand. \"We've got to veer over to the left by the chickens,\" you say. As the ${car} weaves its way through the market, you finally come to the street you're looking for. Down a steep hill, there's an open square with a huge statue in the middle of a busy roundabout. The Piazza di Prugne. You're almost there! And if the police were on your tail, you've managed to shake them.\n      *set tail false\n d luckily, you've picked the right path; down a steep hill, you see an open square with a huge statue in the middle of a busy roundabout. The Piazza di Prugne. You're almost there! But the fruit stand slowed you down and the cops are right behind you. \n      *set honor %-15\n      *set reg_rapport %-15\n      *set tail true\n      *goto escape_market\n\n*label escape_market\n*page_break\n\nYou hurtle down the hill and to the Piazza, the traffic hub of San Castellano. In the center of the roundabout is a large statue of Francesco d'Orrechiette, the first Duke of San Castellano, triumphantly holding up a plum, the national fruit. Cars whirl around it at breakneck speeds, shooting off in various directions. You see the sign for the autostrada and hit the roundabout at high speed. \n\n*if ((driver = \"me\") and ((technique \u003c=50) and (tail = true))) or ((car = \"police car\") and (tail = true))\n   You hear sirens close behind you. Too close. The ${car} hurtles toward the exit for the autostrada, pulls off…\n\n   …and runs smack into a blockade. Three cars block the road, and a couple of officers are getting out of a fourth, batons and handcuffs at the ready. You and Rania exchange a desperate look, throw open the doors, and run like hell. \n\n   You don't make it. A burly officer tackles you from behind, and as you're lying on the ground getting handcuffed and having your rights read, you wonder if you're going to make it out of this one, and if not, what the food is like in San Castellan jails. \n   *goto captured\n*elseif ((driver = \"me\") and (technique >=70)) and (tail = false)\n   You hurtle toward the exit to the autostrada and pull off, nice and easy. \"I think we lost them,\" Rania says, and laughs. \"Not bad. Not bad at all.\"\n\n   \"I still think we should take a nice, scenic drive,\" you say. \"Just to make sure.\" \n\n   *if rania_flirt = true\n      Rania raises a flirty eyebrow. \"Oh, do you now,\" she says. \"And here I've forgotten my picnic basket.\" \n\n      You lean back, enjoying the sun, the view, and the company, as you speed off into the hills.\n      *set rania_rapport %+20\n      *set notoriety %+20\n      *achieve formula1\n      *finish\n   *else\n      \"Probably a good idea,\" Rania says. \"You can't be too careful. Where should we go?\"\n      *choice\n         #\"It doesn't matter. I've got a lovely view right here.\" \n            Rania raises a slightly-skeptical eyebrow, then smiles warmly. \"Too bad I forgot my picnic basket, then,\" she says. \n\n            You lean back, enjoying the sun, the view, and the company, as you speed off into the hills.\n            *set rania_flirt true\n            *set rania_rapport %+20\n            *set notoriety %+20\n            *achieve formula1\n            *finish\n         #\"Toward the Italian border. They won't follow us out that far.\" \n            \"Not a bad idea at all,\" Rania says. She leans back, sunglasses on, and so do you, enjoying the sun and the view as you speed off into the hills. \n            *set notoriety %+20\n            *set rania_rapport +5\n            *achieve formula1\n            *finish\n*elseif ((driver = \"rania\") and (tail = true)) or (((technique >50) and (technique \u003c70)) and (tail = true))\n   You hear sirens close behind you. Too close. You hurtle toward the exit for the autostrada, pull off…\n\n   …and run smack into a blockade. Just one car, though. The officer is standing by the side of the road, baton and handcuffs at the ready. \n\n   \"We have to just go through!\" you shout. Peeling past the police car at top speed, your ${car} very nearly takes one of the doors off, leaving the officer shouting with rage behind you. You see her jump into her car.  \n\n   You speed down the highway, dodging and weaving, and take the first exit for the Italian border. You're gaining distance but as the traffic thins out, you still see the lights in the rearview mirror. \n\n   Desperate, you and Rania pull onto a gravel path at the top of a steep drop. Hurtling along the edge, you do your best not to look down. A few moments of panic flash by as one wheel slips off the path, then you master a few hairpin turns, and after a few forks in the road, you slow down, heart pounding. \n\n   \"I think we lost them,\" you say.\n\n   Rania shrugs. \"I hope we lost them,\" she says. \"Now let's find some nice motorist who'll let us steal their car. There's no way we're getting back to town in this one.\"\n\n   You sigh. A master thief's work is never done.\n   *achieve formula1   \n   *finish\n*else\n   You hear sirens close behind you. Too close. You hurtle toward the exit for the autostrada, pull off…\n\n   …and run smack into a blockade. Just one car, though. The officer is standing by the side of the road, baton and handcuffs at the ready. \n\n   \"We have to just go through!\" you shout. Peeling past the police car at top speed, your ${car} very nearly takes one of the doors off, leaving the officer shouting with rage behind you. You see her jump into her car.  \n\n   You speed down the highway, dodging and weaving, and take the first exit for the Italian border. You're gaining distance and as you wind your way into the hills, you no longer see police lights in your rearview mirror.\n\n   \"I think we lost them,\" Rania says.\n\n   \"I still think we should take a nice scenic drive,\" you say. \"Just to make sure.\" \n\n   *if rania_flirt =true\n      Rania raises a flirty eyebrow. \"Oh, do you now,\" she says. \"And here I've forgotten my picnic basket.\" \n\n      You lean back, enjoying the sun, the view, and the company, as you speed off into the hills.\n      *set rania_rapport %+20\n      *set notoriety %+10\n      *achieve formula1\n      *finish\n   *else\n      \"Probably a good idea,\" Rania says. \"You can't be too careful. Where should we go?\"\n      *choice\n         #\"It doesn't matter. I've got a lovely view right here.\" \n            Rania raises a slightly skeptical eyebrow, then smiles warmly. \"Too bad I forgot my picnic basket, then,\" she says. \n\n            You lean back, enjoying the sun, the view, and the company, as you speed off into the hills.\n            *achieve formula1\n            *set rania_flirt true\n            *set rania_rapport %+20\n            *set notoriety %+15\n            *finish\n         #\"Toward the Italian border. They won't follow us out that far.\" \n            \"Not a bad idea at all,\" Rania says. She leans back, sunglasses on, and so do you, enjoying the sun and the view as you speed off into the hills. \n            *set notoriety %+15\n            *achieve formula1\n            *set rania_rapport %+10\n            *finish\n\n*label captured\n*page_break\n\nAn hour later, you're sitting, bedraggled, next to Rania in a San Castellan police car. You've been informed of your rights, interrogated, shoved about, and treated generally rudely. Right now, the officer in charge of you has left you in the car in order to double-check your identification, which may or may not hold up under close scrutiny. \n\nRania glares at you. \"This is all your fault,\" she says. \n\n\"My fault?\" you say. \"Last I checked we were both involved in-\"\n\nYou hear a rapping at the window. Glancing outside, you see a huge man in a huge trench coat; bending down, you can see it's Reg. He's brandishing a lockpick and a San Castellan police inspector's badge. Behind him is Le Roux, gangly in a beat cop's uniform. \n\n\"Better get out of here fast,\" Reg says once he gets the door open. \"This disguise won't hold up long. They're calling for the real inspectors now. Come on!\" He hustles you out of the car, directing you to an unmarked, dark sedan where Nora is waiting in the driver's seat. \n\nEmbarrassed, you hurriedly climb into the car, Rania close behind you. Nora turns around and gives you an eyeroll. Le Roux pats your arm reassuringly. \"It could have happened to anyone,\" he says. You get the sense the team is, if not angry, at least somewhat annoyed at this turn of events. \n\n\"They know we're here now,\" Reg says. \"They're going to up security at the palace. You know that, right?\"\n\n\"I know,\" you sigh. But despite setbacks, you're still convinced you can do it.\n*achieve formula1 \n*set notoriety %-20\n*set alert %+20\n*set reg_rapport %-10\n*set rania_rapport %-15\n*set nora_rapport %-10\n*finish\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n   *label purchased\n   *return\n*temp should_trial_end false\n*if choice_is_steam\n   *set should_trial_end true\n*if choice_prerelease\n   *set should_trial_end true\n*if choice_randomtest\n   *set should_trial_end true\n\n*if not(should_trial_end)\n   *return\n   \nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n   *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2020-04-29 $4.99 $2.99 purchased\n*abort\n", "choicescript_description": "\nYou're the world's greatest jewel thief! Well, second greatest. But if you and your team of talented crooks can steal the Black Cat, the world's unluckiest diamond, you'll be legendary!\n\n[i]Thieves’ Gambit: The Curse of the Black Cat[/i] is an interactive heist caper by Dana Duffield, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nPlay as male or female; gay, straight, or bi. Choose your methods and your motives. Will you be an honorable thief or a ruthless criminal? A technical genius or a master of disguise? Who can you trust, and who will you double-cross?\n\nThe Black Cat has never been stolen, its previous owners all having died under improbably unfortunate circumstances. Break into the palace of San Castellano, pinch the gem, evade the relentless Inspector Leclerc and get away before you succumb to the Curse of the Black Cat!\n", "choicescript_stats": "*set team_rapport round(team_rapport)\n*stat_chart\n  text fullname Name\n  percent technique Technique\n  percent intellect Intellect\n  percent jnsq Je Ne Sais Quoi\n  opposed_pair flash\n     Flash\n     Stealth\n  opposed_pair honor\n     Honor\n     Ruthlessness\n  percent team_rapport Team Rapport\n  percent alert Alert Status\n  percent notoriety Notoriety\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  *if choice_is_omnibus_app or choice_is_web\n    [b]Remove Advertising and Delays[/b]\n\n    Permanently remove all ads and delays from the game.\n  *if (choice_is_omnibus_app = false) and (choice_is_web = false)\n    [b]Rest of the Game[/b]\n\n    Unlock the rest of the game, including the thrilling conclusion!\n  *purchase_discount adfree 2020-04-29 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n", "escape": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n   Come back in a few minutes to play the next part of [i]Thieves’ Gambit: The Curse of the Black Cat[/i]!\n\n   Or, you can buy the game now to skip the wait.\n\n   *purchase_discount adfree 2020-04-29 $4.99 $2.99 purchased\n   *delay_break 1200\n\n*label purchased\n\n*temp has_diamond \"Bouchard\"\n*temp escape true\n*temp bouchard_escape true\n*temp dead false\n*temp deathscene 1\n*rand deathscene 1 4\n\n*if bouchard_dead =true\n   *set has_diamond \"none\" \n\n\n*if bouchard_dead =true\n   *goto dead_intro\n*elseif knows_bouchard =false\n   *goto normal_intro\n*elseif bouchard_revealed =true\n   *goto revealed_intro\n*elseif bouchard_collude\n   *goto collude_intro\n*else\n   *goto surprise_intro\n\n*label dead_intro\n\nRacing down the hall, you reach the stairwell to the roof. The door has a simple keypad lock: \"5568,\" Nora tells you, and you type it in, throw the door open, and run.\n\nIt's a narrow, stone stair, winding its way up to the extraction point—the windy roof of the east tower. You reach the top of the staircase. The only security measure is a simple, steel door; the tower juts out over the Mediterranean and is completely inaccessible from the outside. That is, without a helicopter. Luckily, Nora, in addition to the eccentric billionaire thing, also has a pilot's license. \n\nShe'll be meeting you in…four minutes. Better hurry. You reach for the door handle.\n\n*if (rania_betray =true) and (rania_romance =true)\n   Rania grabs your arm. \"I just-\" she starts but her voice catches. \"I want you to know I really do care about you. It's just…some things need to be important enough to make sacrifices for.\"\n\n   \"What are you talking about?\" you ask. \n\n   She sighs and leans into you for a brief, melancholy kiss…then opens the door and strides out onto the roof. \"Inspector, we're here,\" she says.  \n\n   Lights flare in your eyes, and you find yourself confronted by a full company of the palace guard, with additional members of the local police force. In front of them is Leclerc, striding toward you. \n\n   \"Ah, Ms. Benzakour,\" Leclerc says. \"I see you've lived up to your end of the bargain.\" \n\n   You stand there, stunned. Rania turns to you. \"I told you how important it was to catch Ivankov,\" she said. \"This is the only way I could think of to do it.\" \n\n   \"By double crossing me?\" you shout. \n\n   \"We'll get amnesty,\" Rania says. She walks reluctantly over to Leclerc, who cuffs her and hands her off to one of her uniformed sidekicks. \n\n   \"You'll get amnesty,\" Leclerc corrects her. \"But as for you, ${lastname}…you're not getting off so easily.\" \n\n   \"This isn't what we agreed on!\" shouts Rania as they lead her away. \n   *set alert %+50\n   *goto confront_leclerc\n*elseif (rania_betray =true) and (rania_romance =false)\n   Rania grabs your arm. \"I just want you to know this isn't personal,\" she says and opens the door. \n\n   Lights flare in your eyes and you find yourself confronted by a full company of the palace guard, with additional members of the local police force. In front of them is Leclerc, striding toward you. \n\n   \"Ah, Ms. Benzakour,\" Leclerc says. \"I see you've lived up to your end of the bargain.\" \n\n   You stand there, stunned. Rania turns to you. \"I told you how important it was to catch Ivankov,\" she said. \"This is the only way I could think of to do it.\" \n\n   \"By double crossing me?\" you shout. \n\n   \"We'll get amnesty,\" Rania says. She walks reluctantly over to Leclerc, who cuffs her and hands her off to one of her uniformed sidekicks. \n\n   \"You'll get amnesty,\" Leclerc corrects her. \"But as for you, ${lastname}…you're not getting off so easily.\" \n\n   \"This isn't what we agreed on!\" shouts Rania as they lead her away. \n   *set alert %+50\n   *goto confront_leclerc\n*else\n   \"Be careful,\" Rania says. \"This reminds me too much of Abu Dhabi.\"\n\n   \"You almost double crossed me in Abu Dhabi,\" you remind her. \n\n   She shrugs. \"Well, I didn't,\" she says. You open the door and together, you step out onto the roof. \n   *goto roof\n\n*label revealed_intro\n\n*if nick_romance =true\n   Bouchard sighs and hands you the diamond. The weight of it in your hand is one of the most satisfying things you've ever felt. \"We're working as a team now,\" he says. \"I hope this shows how much I trust you.\" \n\n   Reg glares at the two of you, but you smile a little to yourself. Maurice Bouchard notoriously works alone; not, apparently, any more. Oh, the things you're going to steal together!\n   *set has_diamond \"me\"\n   *set join_bouchard true\n   *goto reg_betray\n*elseif nick_rapport >=60\n   \"Oh no,\" he says, slipping the dia us and groaning. You feel a wave of regret that it has to end like this. He's right - the two of you did have something. The two of you, as a team... \n\n      \"Maybe next time,\" you whisper in his ear. The only response is a muffled groan. You tuck the diamond into your bag and run for the stairwell, hoping at least that he's well enough to escape before the authorities arrive. Your next encounter should prove... interesting.\n      *set has_diamond \"me\"\n      *set bouchard_escape false\n      *goto leroux_check\n   *else\n      \"Thanks, old friend,\" you say to Reg. \"I owe you one.\"      \n\n      Bouchard lies on the ground, barely conscious and groaning. You consider for a moment trussing him up and leaving him for the authorities, but you haven't got the time. You tuck the diamond into your bag and run for the stairwell.\n      *set has_diamond \"me\"\n      *set bouchard_escape false\n      *goto leroux_check\n*else\n   Reg dives for Bouchard, body-slamming him into the wall. Your rival staggers, woozy, as Reg prepares to head-butt him into unconsciousness- \n\n   -but then, with a deft kick, he knocks Reg off his feet and runs for the stairwell to the roof. \n\n   Reg picks himself up, ashamed. \"He's good,\" he says. \n\n   \"That he is,\" you say, and the four of you race after him.\n   *set has_diamond \"Bouchard\"\n   *goto bouchard_runs\n\n*label bouchard_runs\n*page_break\n\nBouchard is almost at the stairwell! If he gets there, he'll be harder to catch. He's too far away to tackle but you need to stop him now. \n\nYou draw your gun.\n \n*choice\n   #Shoot to kill. \n      You aim for Bouchard's heart, the only sure-fire way to stop him.\n\n      *if (honor \u003c40) and (technique >60)\n         You fire and hit home. Bouchard staggers, makes a small strangling noise, and falls to the ground, blood leaking from his chest wound. You find him slumped in front of the stairwell door. \n         *if nick_romance =true\n            To your surprise,
