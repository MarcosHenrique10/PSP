ough you never did enjoy working alone. \n\n   You sit down at the kitchen table and pick up the newspaper lying there. Flipping aimlessly through it, you think about your next move. You can't rest on your laurels forever. \n\n   What do you plan to do next?\n   *choice\n      #I think it's time for me to go straight. \n         You've had a long and illustrious career. You've made a lot of money, made a lot of enemies. You've thought of going straight before and laughed it off.\n\n         *goto go_straight_escape\n      *if ((rania_romance =true) and (rania_betray =true)) #I need to find Rania. \n         *goto find_rania_escape\n      *if ((bouchard_dead =false) and ((join_bouchard =false) and (nick_romance =true))) #I need to track down Bouchard and find out why he betrayed me.\n         *goto find_bouchard_romance_escape\n      *if ((bouchard_dead =false) and ((join_bouchard =false) and (nick_romance =false))) #I'll find Bouchard and get my revenge.\n         *goto find_bouchard_revenge_escape\n      #Time to plan my next score. \n         After your escape from San Castellano, you've been pretty much cooling your heels. But you're starting to get itchy. It's time to move on to bigger things. \n\n         *goto nextscore_escape\n\n*label go_straight_escape\n\nBut this time you mean it. This was the last heist; it really was. Your way of life is aging you prematurely, and you wonder what it would be like to settle down and do something normal. Like, say, running a restaurant. \n\nYou idly thumb through the newspaper till you get to the Life & Style section, your favorite. There's a travel feature on Las Vegas. \"Divina Commedia Expands to Become Vegas's Largest Casino,\" trumpets the headline. \n\nVegas, you think. Hmmm. It's not like you don't have connections in the hospitality industry (so to speak). There could be some really big opportunities there. Culinary. Culinary opportunities. \n\nMaking up your mind, you pick up the phone. \n*goto ending\n\n*label find_rania_escape\n\nYou didn't exactly leave things with Rania on a good note. What had possessed her to turn you—not just you, all of you—in to Leclerc? What had happened with her and Ludomir Ivankov to make her hate him enough to go to prison to expose him? You wish you knew. \n\nYou know she got a plea deal. You don't know where she is now. You can't make up your mind whether the sudden visceral urge you have to find her comes from love or from a need for revenge. All you know is…\n\nMaking up your mind, you pick up the phone and call a cab to take you to the airport. You'll find her. Wherever she is now, you'll find her. \n*goto ending\n\n*label find_bouchard_romance_escape\n\nYou know why he betrayed you. He's a professional liar, a morally bankrupt criminal. But there really was something there. Could you, in his shoes, have had the night you'd had together, then turned around and double crossed him? \n\nPerhaps. Perhaps you could have. The two of you are more alike than you want to think. \n\nYou don't know if the sudden, visceral urge you have to track him down comes from a broken heart seeking answers or from a more primal need for revenge. All you know is…\n\nMaking up your mind, you pick up the phone and call a cab to take you to the airport. You'll find him. Wherever he is now, you'll find him.\n*goto ending\n\n*label find_bouchard_revenge_escape\n\n[i]That bastard[/i], you think. For years he had you fooled—all the schemes he ruined, all the humiliation, all the while smiling right in your face…\n\nIt will not go unanswered. One way or another, you'll visit every wrong you've ever suffered upon the person of Maurice Bouchard. And you'll laugh while you do it. \n\nMaking up your mind, you pick up the phone and call a cab to take you to the airport. You don't have any time to waste. \n*goto ending\n\n*label nextscore_escape\n\nHmmm, what should be next, and where? Where the money is, of course. Monaco? Macau? Miami Beach? \n\nYou pick up the newspaper on the kitchen table and idly flip through it, coming up on the Life & Style section, your favorite. It just so happens there's a travel spread on Las Vegas. \"Divina Commedia Expands to Become Largest Vegas Casino,\" trumpets a headline. \n\nHmmm. An attempt on a casino that big? That would be dangerous and stupid and you'd have little chance of success.\n\nJust your style. \n\nMaking up your mind, you pick up the phone and call a cab to the airport. There's no time to waste.\n*goto ending\n\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]Thieves' Gambit: The Curse of the Black Cat.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending", "heist": "*temp notify \"pass\"\n\n*if (breakin_path =\"nick\") or (breakin_path =\"dead\")\n   The secondary rendezvous point is a small, forgotten bedroom on the fourth floor of the east tower, which Nora assures you is free of surveillance devices. You duck through the door and find Reg already there, wearing the uniform of a local cleaning service and arranging his gear. \n\n   You hear the high-pitched squeal of a glass cutter, and a perfect circle of glass falls from the tower window onto the carpet. A hand reaches in and unlocks the window, and a moment later, Le Roux and Rania climb through, dressed in cat-burglar black. \n   *goto nora_exposition\n*elseif breakin_path =\"reg\"\n   The secondary rendezvous point is a small, forgotten bedroom on the fourth floor of the east tower, which Nora assures you is free of surveillance devices. You duck through the door, hoping that Nick is doing his best to distract the Duke and family while you get on with things. \n\n   You hear the high-pitched squeal of a glass cutter, and a perfect circle of glass falls from the tower window onto the carpet. A hand reaches in and unlocks the window, and a moment later, Le Roux and Rania climb through, dressed in cat-burglar black. \n   *goto nora_exposition\n*else\n   You stop outside the window of the secondary rendezvous point, a small, forgotten bedroom on the fourth floor, which Nora assures you is free of surveillance devices. You carefully reach into your bag for the glass cutter and hand it up to Le Roux, who traces a perfect circle on the glass, pushes it in and reaches in to unlock the window. The three of you scramble through. \n\n   Reg is here already, wearing the uniform of a local cleaning service and arranging his gear. You hope Nick is doing his best to distract the ducal family while you get on with things. \n   *goto nora_exposition\n\n*label nora_exposition\n\n\"So, Nora, what's the problem?\" you ask. \n\n\"The security system for the Duke's collection is good,\" she says. \"Really good. Better than I expected. I'm not going to be able to just shut off the alarms and let you all waltz through there.\" \n\n\"So?\" you say. \"Where's the fun in that? We're prepared.\" \n\nNora sighs. \"Suit yourselves,\" she says. \"The first thing you're going to have to do is avoid the guns.\" \n\n\"Guns?\" Rania says. \n\n\"The door to the fifth floor looks ordinary enough but it's two feet thick, the lock's not on the main system, and it's booby-trapped,\" she says. \"Extreme measures. Mess up, and it'll do a lot more than alert the authorities.\" \n\nThe four of you exchange glances. \"So we go in through the floor?\" Reg poses. \n\n\"We go in through the floor,\" Nora says. \n\n*page_break\n\n\"There are sensors on all the air vents and most of the crawl spaces,\" she continues. \"Except one. A secret passage that hasn't been shown on any maps of the palace since the 1600s. Let's hope the Duke's security contractors forgot about it.\" \n\n\"Let's hope,\" Reg says. \"Where is it?\" \n\n\"I remember going over that map,\" Rania says. \"Help me with this.\" She starts pushing the heavy wooden bed away from the wall; you give her a hand, and the bed slides aside revealing nothing in particular. \n\n\"Let me,\" Reg says. He feels along the wall, tapping at stones, then presses one. Something clicks, and he pushes a portion of the wall back to reveal a narrow, decaying, wooden staircase. \n\n\"It'd be best if only one or two of you went,\" Nora says. \"There's a camera blind spot in one of the hallways upstairs. I'll tell you where to go through, and then you can turn off the guns from the inside and let everyone else in.\"\n\n\"Got it,\" you say. \"Rania, you're with me.\" You disappear into the passage, Rania following. \n\n*page_break\n\nThe passage is dark and too narrow, dry, and musty-smelling with extreme age. You can see how the later palace architects might have missed it; it's set inside the palace's exterior wall. \n\nYou reach the top, where the passage narrows to a cramped crawl space, a forgotten gap between the fourth and fifth floors. You kneel and squeeze yourself in. Thank goodness you're not claustrophobic.\n\nRania follows you around a sharp corner, then she tugs sharply on your foot. \"Listen,\" she hisses. \"I hear something.\" \n\n*choice\n   #Stop. \n      You stop where you are and go silent. Yes, there's definitely a conversation going on in the room below you.\n      *goto duke_conversation\n   #Look.\n      You pause, scanning your environment—there. There's a small sliver of light coming through the floor in front of you, along with a voice. \n      *goto duke_conversation\n   #Listen.\n      You go silent, listening as closely as you can. Yes. there's definitely a conversation going on in the room below you. \n      *goto duke_conversation\n\n*label duke_conversation\n\nIt's the Duke. \"I'm sorry I kept you waiting,\" he says, his voice muffled through the floor of the crawl space. You inch forward; there's a small peephole in the wood below you, and you put your eye to it. The Duke is there, still in his dinner jacket, and he's talking to a fat man with a beard who's leaning back in a deep, leather chair like a sweaty king. \n\nThe fat man shrugs. \"No problem,\" he says in Slavic-tinged Italian. \"I drank your whisky while I waited. Now. Down to business. Can you get the equipment I need?\" \n\n\"Two thousand RPG launchers,\" the Duke says. \"Not a problem in the least. What about drones? I can get you some drones. They're all the rage these days.\" \n\nHuh. So the Duke's a gun runner, too. Somehow you're not surprised. Who's the fat guy, though? \n\n\"Move,\" Rania hisses. \"Let me see.\" You move forward, letting Rania have the peephole…\n\n…and a few seconds later, she shoves you, hard. \"Move!\" she hisses, and you hurry toward an open space in the passage ahead of you, where you're able to turn and face her.\n\n\"Ivankov,\" she says, shaking with rage. \"He's dealing with Ludomir Ivankov.\"\n\n*choice\n   #Who?\n      \"The world-famous Russian gangster?\" she says. \"Don't tell me you don't know who he is. You've probably worked for him at some point, even if you didn't know it at the time. A lot of people have. But not me. Not anymore.\"\n      *goto ivankov_exposition\n   #The Russian gangster?\n      \"The same,\" Rania says. \"Have you ever worked for him?\"\n\n      \"Not to my knowledge,\" you say. \n\n      \"You might have, even if you didn't know it at the time,\" Rania says. \"A lot of people have. But not me. Not anymore.\"\n      *goto ivankov_exposition\n   #Who cares?\n      You shrug. \"He's just a gun runner. Everyone runs some guns. Why should I care about this one?\"\n\n      \"You really don't know who he is,\" she says in disbelief. \"He's…Ivankov. You've probably worked for him at some point, even if you didn't know it at the time. A lot of people have. But not me. Not anymore.\"\n      *goto ivankov_exposition      \n\n*label ivankov_exposition\n\nRania's not the type to hold grudges; you're curious. \"Why not?\" you say. \"A gangster's a gangster and a paycheck's a paycheck. What's the deal with Ivankov?\"\n\n\"Human trafficking,\" she says. \"He's a slave trader. One of the worst in Eastern Europe. I do a lot of dirty work but there's a line I won't cross.\" In the dark, her eyes are glittering. \"I'm looking forward to spitting on his grave.\" \n\n*if rania_romance =true\n   You're sensing there's a story here and that this is not the time to ask for it. You put a reassuring hand on her arm, and she relaxes noticeably and reaches up to squeeze it. \"Thanks,\" she says. \"And no, I'm not going to shoot him now and ruin everything. As much as I might want to.\"\n\n   \"I wish I could help,\" you say.\n   *goto leave_clue\n*else\n   You're sensing there's a story here but you'll have to ask for details later. \"It'd probably be a bad idea to jump down there and shoot him right now. I'm sorry. I wish I could help.\" \n   *goto leave_clue\n\n*label leave_clue\n\n\"You can,\" she says. \"If we can't kill him, we can collar him. Leclerc is here. We can drop Ivankov right in her lap. All we need to do is…leave her a clue.\" \n\n\"What kind of clue?\"\n\n\"I don't know,\" Rania says. \"I'm just the muscle. You're the expert at this sort of thing.\"\n\nYou watch the gangster below sip his scotch. Exactly what you needed: one more complication. You consider Rania's suggestion.\n*choice\n   #Ivankov's evil. I want him taken down. \n      You're in complete agreement with Rania. You'll certainly be able to think of a way to take him down without putting yourself at risk…right?\n      *set honor %+15\n      *goto duke_takes_call\n   #I don't care about Ivankov but I'll do it for Rania. \n      What Ivankov does for a living is not your concern but if it means this much to Rania, you might as well do something. Besides, you're smooth enough that you can tip off Leclerc without putting yourself at risk. Right?\n      *set honor %+10\n      *goto duke_takes_call\n   #He's a perfect distraction! Leclerc will chase him and ignore us. \n      That is, if you're careful when you tip her off to Ivankov's presence. You don't want her figuring out your location or route, do you? \n      *goto duke_takes_call\n   #I don't care how the man makes money. I'm not sticking my neck out for this. \n      You've worked too hard and are too close to your goal to waste your time with risky do-goodery. Rania won't like it but a risk's a risk.\n      *set honor %-10\n      *goto duke_takes_call\n\n*label duke_takes_call\nBelow you, you hear the Duke take a call mid-haggle. \"What is it?\" he snaps, and then: \"She's back? You brought her to the east wing? What kind of idiot are you?\" He sighs, hangs up. \"You'll have to excuse me, old friend. I'll be right back.\" He storms out.\n\nNora clears her throat. \"Reg and Le Roux are waiting,\" she says. \n\n\"I'll go ahead,\" Rania says. \"And you…you think of something.\" She disappears into the darkness of the crawl space, and you decide to follow the sound of the Duke's voice.\n\n*page_break\n\nYou crawl further. Another sliver of light indicates another peephole, and you glance down into it to see the Duke emerge into another reception room. \"Ah, you're back,\" he says. \"Any progress?\" \n\nIce runs through your veins at the sound of his guest's voice. \"Nothing yet,\" Inspector Leclerc says. She walks into your view, looking as indomitable as ever. \n\n\"If you've found nothing, why return to the palace in person? Surely, my guards and the city police can handle things.\"\n\nLeclerc shrugs. \"I've been chasing Bouchard for years. Him and his copycats.\" You hope no one can hear you grinding your teeth. \"If he's going to make a move, it'll be soon—and I want to be here when he does. Now, if you don't mind, I'd like to go over some of your security precautions one more time.\"\n\nThe Duke is fidgeting—no doubt due to the presence of the international gangster enjoying his hospitality so close by. You think for a moment about Rania's request. Is there a way you could inform on Ivankov without giving yourself away? You pull one of your calling cards out of your pocket—you could try to slip Leclerc a note she'd find once you had the diamond and were safely on your way. \n\nOf course, you could just call the city police yourself, play the anonymous tipster…but if you went through official channels, by the time word got to Leclerc, Ivankov would be safely out of the building. Then your mind jumps to your old pal Marco. Is he on duty here tonight? It's a long shot but he might be able to help.\n\nThe most audacious choice would be, of course, to have Nora hack into Leclerc's or the Duke's mobile and inform the Inspector yourself. \n\nOr you could just be on your way. The last thing you need is to add another layer of risk to this scenario. \n\n*choice\n   #Try to drop a note into Leclerc's pocket. \n      You pull out your gold-plated pen and scribble a hurried note. \"Inspector: Duke doing business with Ludomir Ivankov, on premises now. No need to thank me.\" \n\n      She's pacing the room, edging closer to the narrow peephole, and…there! She's right in position for you to drop the card straight into her trench coat pocket. You aim.\n      *set honor %+20\n      *set rania_betray false\n      *set rania_rapport %+20\n      *if flash \u003c=40\n         Neither the Duke nor Leclerc is watching as the card falls neatly into place. \"Hm? Did you hear something?\" Leclerc says, but then shakes her head and keeps pacing. She'll have to go into that pocket for something, and hopefully she'll find the note after you've made yourself scarce, but before Ivankov does. Ah well. Either way, you can tell Rania you did your best. You head back down the crawl space toward the fifth floor entrance.\n         *achieve ivankov\n         *set notify \"pass\"\n         *goto follow_rania\n      *else\n         Oops! The card flips in midair, and although it very nearly lands in Leclerc's pocket, it ends up on the floor by her boot. \"Hm? Did you hear something?\" she says and, glancing at the floor, picks up the card and reads it. \"Huh,\" she says, sounding completely unsurprised. She paces the edges of the room, then glares at the ceiling—not, you notice, at the peephole, which must be ingeniously disguised. She takes the Duke by the arm. \"Come with me, Your Grace. This is not the place to talk.\" \n\n         Great! Now she knows you're in the building. Hopefully, messing around with Ivankov will slow her down a little, but you suspect her priority will be hunting you down. Trying not to panic, you scramble down the passageway after Rania. \n         *set alert %+30\n         *set notify \"fail\"\n         *achieve ivankov\n         *goto follow_rania\n   #Have Nora give the Duke's phone a call.\n      \"Nora,\" you say. \"What would you say if I asked you to call the Duke for me?\"\n\n      Nora sighs. \"I'm busy figuring out the door locks right now. But…Rania's right. Ivankov's scum—let's get him. Give me a second.\"\n\n      After a short moment, the Duke's phone rings. He excuses himself to Leclerc and answers, irritated. \"Hello?\" \n\n      \"Hello, Your Grace,\" you say pleasantly. \"You'll want to put this on speakerphone.\"\n\t  \n      *set honor %+20\n      *set rania_betray false\n      *set rania_rapport %+20\n      *if flash >=60\n         The Duke sputters, and you laugh. Nora has indeed put the phone on speaker, and Leclerc hears your voice and practically snarls. \"${lastname}. Where are you?\"\n\n         \"You think I'd tell you? Let's just say I'm…close but not too close. I just wanted to let you know you've got bigger, fatter, sweatier fish to fry at the moment. Have you ever heard of Ludomir Ivankov? He's two doors down.\" \n\n         The Duke turns bright red. \"I…how is this…\" \n\n         Leclerc is searching the room, pacing the carpet, but she doesn't seem to spot the peephole, which must be ingeniously disguised. \"You've got a lot of nerve, I'll give you that much,\" she says. She takes the spluttering Duke firmly by the arm. \"Come with me, Your Grace.\" \n\n         \"Ta-ta,\" you say cheerfully, and hang up. Now Leclerc knows you're in the building—but not necessarily where, and it looks like she'll be taking care of Ivankov before she comes after you. Resisting the urge to whistle to yourself, you follow Rania. \n         \n         *set notify \"pass\"\n         *achieve ivankov\n         *goto follow_rania\n      *else\n         The Duke sputters, and you laugh. Nora has indeed put the phone on speaker, and Leclerc hears your voice and practically snarls. \"${lastname}. Where are you?\"\n\n         \"Close enough,\" you say. \"I just wanted to let you know the Duke's been doing business with Ludomir Ivankov. I've seen it with my own eyes. He's two doors down.\" \n\n         The Duke turns red and starts to sputter, and Leclerc, still calm, says \"So you saw him, did you?\" Oh no. You've given away the fact that you're on this floor. \n\n         \"Come on, Your Grace,\" she says, taking the Duke by the arm. \"Apparently this is…not a good place to talk. See you soon, ${lastname}. I'm coming for you.\" \n\n         She's most likely going to arrest Ivankov before coming after you. You've still got some time, and she doesn't know you have a way onto the fifth floor…but you're silently kicking yourself. Ah well. At least you can tell Rania you did a good deed.\n         *set alert %+30\n         *achieve ivankov\n         *set notify \"fail\"\n         *goto follow_rania\n   #Call Marco. \n      \"Nora,\" you say. \"Check the local police directory. Have you got a work number for a Marco Augeri? Can you patch me through?\" \n\n      \"Huh,\" Nora says. \"Alright, let me check…got it.\" Your phone rings. \"Augeri,\" says a curt voice. \n\n      \"Hey, Marco,\" you say. \"Look, no hard feelings about the other day. Business is business. But I've got a hot tip. If you're in the palace…\"\n\n      *set honor %+20\n      *set rania_betray false\n      *set rania_rapport %+20\n      *if marco =\"friend\"\n         \"${Firstname}?\" Marco whispers. \"What the hell? You know we're on the lookout for a thief, right? Is it you?\" \n\n         \"I'm not even in the palace,\" you lie. \"I just…heard that the Duke's got one of his business partners in his sitting room right now. You might have heard of him. Ludomir Ivankov?\"\n\n         Silence on the other end of the line. \"I knew it,\" Marco says. \"We've been looking for proof of the Duke's criminal dealings for years now. This is a big deal. Thanks.\" He pauses. \"And you know what, for old times' sake, I won't tell Leclerc it was you who called. I'm assuming you're in the palace now.\" \n\n         \"I swear, I'm at a hotel downtown!\"\n\n         \"Just get the diamond and go,\" he says. \"The Duke deserves to have it stolen.\" He hangs up.\n\n         Huh. He's a stand-up guy, that Marco. Below you, you see Leclerc answer the phone, then hurry out of the room, dragging the Duke behind her. Resisting the urge to whistle to yourself, you follow Rania.\n         *set alert %-25\n         *achieve ivankov\n         *set notify \"pass\"\n         *goto follow_rania\n      *elseif marco =\"enemy\"\n         It takes Marco a moment to recognize your voice. \"You!\" he snarls. \"I should have known. Tipping off the authorities to your own presence—so brash, so stupid. Just your style.\"\n\n         \"I don't know what you're talking about!\" you cry desperately. \"I'm in a hotel downtown! I'm just saying, the Duke's doing business with Ludomir Ivankov and he's in the palace right now. Someone really needs to check-\"\n\n         There's a click on the end of the line. Then Leclerc's phone rings. \"Yes, hello,\" she says. \"Yes…What? Ivankov? Here?\" The Duke goes pale at the mention of the gangster's name; Leclerc steps in front of the door and glares at him. \"Wait…and the thief here, too?\" She pauses. \"Right. You stay there, Augeri, I'll take care of this.\" Dragging the Duke behind her, she stomps out the door. \n\n         You should have known better than to bring your old partner into it again. Muttering to yourself, you follow Rania.\n         *set alert %+30\n         *set notify \"fail\"\n         *achieve ivankov\n         *goto follow_rania\n      *else\n         It takes Marco a moment to recognize your voice. \"You!\" he says, surprised. \"You know we're still looking for you after the car chase, right? Are you turning yourself in?\"\n\n         \"Hardly,\" you say. \"I'm in a hotel downtown. You won't find me. I just wanted to let you know Ludomir Ivankov is in the palace with the Duke right now. If you hurry, you can grab him before the Duke tips him off and he escapes.\"\n\n         Silence on the other end of the line. \"We've been looking for proof of the Duke's criminal dealings for years now,\" he says. \"If this is true, it could be what we need. Thanks.\" He pauses. \"Of course I'll have to go tell the Chief you're the one who tipped me off.\"\n\n         You sigh. He really has settled into the whole cop thing. At least he didn't say he was calling Leclerc right this second. \"Good luck with that,\" you say, and hang up. Your job here is done. You follow Rania.\n         *achieve ivankov\n         *set notify \"pass\"\n         *goto follow_rania      \n   #Don't do anything.\n      Smarter not to risk it. You glance down into the room one more time, then continue on your way, Leclerc none the wiser. Rania won't like this, but Ivankov isn't your problem. \n      *set honor %-20\n      *set rania_betray true\n      *set notify \"no\"\n      *goto follow_rania\n\n*label follow_rania\n*page_break\n\nFinally, you reach the long-forgotten trapdoor, now open. Rania helps you out of the passage. \"Cameras? Motion sensors?\" you ask. \n\n\"Two sensors on the trap door. I shorted them out,\" Rania says. \"And we're in a camera blind spot, although Nora says she's finally got control of the rest of the ones on this floor. Still, we'll have to move fast. Did you manage to tip off Leclerc about Ivankov?\"\n\n*if notify =\"no\" \n   You shrug. \"I'm not putting us at further risk. Sorry,\" you say. \n\n   She goes silent a moment, then gives you a cold look. \"I understand,\" she says, although you can tell she doesn't. \n   *set rania_betray true\n   *goto open_door\n*elseif notify =\"fail\"\n   \"I did my best,\" you say. \"But I'm afraid I might have tipped her off about more than that.\" \n\n   Rania smiles. You can tell she thinks you did the right thing. \"We'd better hurry, then,\" she says. \n   *goto open_door\n*else\n   \"I did my best,\" you say. \"Unfortunately, now Leclerc knows we're in the building. Fortunately, I don't think she knows where. We've still got some time.\" \n\n   \"Better get to work, then,\" Rania says. You can tell she's pleased that you did the right thing. \n   *goto open_door\n\n*label open_door\n*page_break\n\nThe two of you hurry into the fifth floor hallway. The top floor of the east tower is small, round, with an archway to a spiral stair leading up on one end and a heavy door with an ID scanning apparatus at the other. There are four other doors here, all steel, all with scanners at eye height—and one of them has a considerably more complicated mechanism than the others, it looks like. You suspect that's the location of your object. \n\nThe door to the fourth floor is a massive, foreboding thing. You look for a switch to shut off the deterrent system and open it to let in Reg and Le Roux, but it looks like that's controlled from the ID panel.\n\n\"I'd guess this one's keyed to the Duke's security staff,\" Nora says. \"Let's see…\" She fades out as she checks something. \n\n*if fingerprints =true\n   \"Looks like we've got the guard's fingerprints from the night of the party,\" she says. You reach into your bag and pull out a pair of hydrogel gloves, which you slide on. There's a slight warmth in your fingertips as the gel arranges itself into the pattern of the guard's fingerprints. \n   *if retina \n      \"And look at this,\" Nora says happily. \"You've got the guard's retina scan, too. You have no idea how much trouble you just saved me.\" You reach into the bag again for the case containing one of Nora's company's niftier inventions—a retina-scan-fooling contact lens—and dab it in your right eye. It stings a bit.\n\n      You place your thumb on the keypad and lean in to the scanner. A white light flashes in your eye, and then a green light winks on and the door slowly opens.\n      *set alert %-15\n      *goto reg_leroux_arrive\n   *else\n      \"Too bad we haven't got the guard's retina scan,\" Nora says. \"That would have saved me a little time. As it is, I can fake it, but…\" \n\n      \"…every minute we waste is another minute closer to getting caught,\" you finish. \"Yes, I know. We all know.\" You reach into the bag again for one of Nora's niftier inventions, a retina-scan-fooling contact lens, which you dab into your right eye. It stings a bit. \n\n      You put your thumb on the pad, then lean into the scanner. A white light flashes in your eye…and a light on the keypad flashes red. \"Try it again,\" Nora says. You do, and it works this time, although you hope no one notices the failed attempt. The door slowly opens.\n      *goto reg_leroux_arrive\n*else\n   \"Too bad you didn't get the guard's fingerprints the night of the party,\" Nora sighs. \"Or his retina scan. I can fake it, but it's going to take some time, and…\"\n\n   \"…every minute we waste is another minute closer to getting caught,\" you finish. \"Yes. I know. We all know.\" You reach into the bag, pulling out a pair of hydrogel gloves and putting them on, followed by one of Nora's even niftier inventions, a contact lens for fooling retina scans. You dab the lens in your right eye—it stings a bit—and the tips of your fingers feel warm as Nora arranges the new fingerprint patterns. \n\n   \"Try it now,\" she says. You tentatively put your thumb on the keypad, and lean in to the scanner…a light flashes in your eye, and a light on the keypad flashes red. \"Again,\" says Nora; same result. You shrug, annoyed, and try it again…and this time the light flashes green and the door slowly swings open. You can't pretend someone didn't notice the failed attempts, though. \n   *set alert %+15\n   *goto reg_leroux_arrive\n\n*label reg_leroux_arrive\n*page_break\n\nThe door is solid steel, several inches thick, and secured with multiple deadbolts. As it swings open, a message appears on the lock panel: DETERRENTS DISABLED. You hear a descending whine as something no doubt deadly shuts itself off. You call Reg and Le Roux and they appear within moments. \n\nYou shut the door behind you and examine the hallway. \"I've got the camera feed covered,\" Nora says, \"except for the Duke's main trophy room. That's the one nearest the staircase.\" You guessed it was; it's the largest, and has a larger scanner set into the wall next to it.\n\n\"What's in the other three rooms?\" you ask. \n\n\"I can't see. But do we really have time?\" Nora says. \n\n\"For more loot?\" you say, exchanging a glance with the rest of your team. \"I'll say we do.\" \n\nWhich door do you try first?\n*goto door_choice\n\n*label door_choice\n\n*choice\n   *hide_reuse #The door to the left. \n      *if duchess_fingerprints =true\n         You place your thumb on the scanner and a light flashes green. Apparently this door opens to the Duchess's fingerprints. \n         *if duchess_retina =true\n            \n            Then you lean in to the retina scanner…and again, a light flashes green. The door clicks and you pull it open. \n            *set alert %-15\n            *goto duchess_stash\n         *else\n            \n            Then you lean in to the retina scanner…and the light flashes red. Drat. You haven't got the Duchess's retina scan. \"Nora, can you give me a hand?\" you say. \n\n            Nora sighs. \"Alright, alright, but only because you're already past the fingerprint scanner. Remember, every minute we linger…\" \n  \n            \"I know,\" you sigh. In a few moments, the light flashes green and you pull the door open. \n            *goto duchess_stash\n      *else\n         You place your thumb on the scanner and the light flashes red. \"Nora? Little help?\" you ask. \n\n         Nora sighs. \"I've got to work on the facial scan for the main door. Sorry, I don't have time.\" Drat. \n         *goto door_choice\n   *hide_reuse #The center door. \n      *if duke_fingerprints =true\n         You place your thumb on the scanner and a light flashes green. Apparently this door opens to the Duke's fingerprints. \n         *if duke_retina =true\n            \n            Then you lean in to the retina scanner…and again, a light flashes green. The door clicks and you pull it open. \n            *set alert %-15\n            *goto duke_stash\n         *else\n            \n            Then you lean in to the retina scanner…and the light flashes red. Drat. You haven't got the Duke's retina scan. \"Nora, can you give me a hand?\" you ask. \n\n            Nora sighs. \"Alright, alright, but only because you're already past the fingerprint scanner. Remember, every minute we linger…\" \n  \n            \"I know,\" you sigh. In a few moments, the light flashes green, and you pull the door open. \n            *goto duke_stash\n      *else\n         You place your thumb on the pad and the light flashes red. \"Looks like I haven't got the right ID for this,\" you say. \n\n         \"I wish I could help,\" Nora says, \"but I'm kind of busy right now.\" You hate passing up loot, but she's right - you have to hurry.\n         *goto door_choice\n   *hide_reuse #The door to the right. \n      *if heir_fingerprints =true\n         You place your thumb on the scanner, and a light flashes green. Apparently this door opens to ${heir}'s fingerprints. \n         *if heir_retina =true\n            \n            Then you lean in to the retina scanner…and again, a light flashes green. The door clicks and you pull it open. \n            *set alert %-15\n            *goto heir_stash\n         *else\n            \n            Then you lean in to the retina scanner…and the light flashes red. Drat. You haven't got ${heir}'s retina scan. \"Nora, can you give me a hand?\" you ask. \n\n            Nora sighs. \"Alright, alright, but only because you're already past the fingerprint scanner. Remember, every minute we linger…\" \n  \n            \"I know,\" you sigh. In a few moments, the light flashes green and you pull the door open. \n            *goto heir_stash\n      *else\n         You place your thumb on the pad and the light flashes red. \"Nora, have you got…\" you begin. \n\n         \"No time,\" she interrupts. \"Sorry.\" You sigh. Ah well. If it's secondary loot or the Black Cat, you'll take the Black Cat.\n         *goto door_choice\n   #The door to the Black Cat. \n      *goto blackcat_door\n\n*label duchess_stash\nThis room appears to hold the Duchess's private collection and, as you switch on the light, you gasp. The Duke's taste runs to macabre curios but the Duchess's is nothing but jewelry. Huge pieces in display cases, rings spread out on low tables, a rack hung with strings of precious beads. One piece stands out to you: a brooch set with a deep-pink stone: the Alhambra Spinel.\n\nYou grab the stone and beat a hasty retreat. Your reputation will get a further boost from this acquisition. Now back to the hallway. Where to next?\n*set notoriety %+20\n*goto door_choice\n\n*label duke_stash\nThis room holds some of the lesser items from the Duke's collection of macabre curios—but even the lesser items are impressive. A Greek statue of some half-animal god leers at you, and paintings of death and destruction line the walls. A simple, wooden rocking chair sits in the center of a rope cordon with a sign that says DANGER, DO NOT SIT; a battered rag doll with a half-torn smile rests on it. You really don't want to know the story behind that one. \n\nOn a pedestal in the corner you see a yellowed, handwritten manuscript. You take a closer look—it appears to be the original of Edgar Allan Poe's \"The Tell-Tale Heart\". What choice do you have? You roll it up and gently place it in your bag, then beat a hasty retreat. You reputation will get a further boost from this acquisition. \n\nNow back to the hallway. Where to next?\n*set notoriety %+20\n*goto door_choice\n\n*label heir_stash\nThis room appears to be where ${heir} keeps ${possessive} prized possessions—and, like ${possessive} father, ${subject} seems to be a collector. Movie posters from the 1920s through the 1970s line the walls, along with racks of film, probably original prints. There's also a solid collection of memorabilia. You briefly consider swiping the replica of Han Solo's blaster, then notice the glint of red sequins in the corner; Marilyn Monroe's dress from [i]Gentlemen Prefer Blondes[/i]. You hastily strip the mannequin, roll up the dress, and shove it (gently) in your bag. Your reputation will definitely get a boost from this acquisition.\n\nNow back to the hallway. Where to next?\n*set notoriety %+20\n*goto door_choice\n\n*label blackcat_door\n\nYou approach the largest and most forbidding door. \"This is it,\" Nora says. \"The best biometric scanner money can buy. Height, weight, facial recognition, voice print, fingerprints, and retina scan. Now. We've got the most data for… \n*if duke_fingerprints =true\n   …the Duke. That means you're up, Reg.\" \n\n   Reg, the closest in height and weight to the Duke, dons a hydrogel glove similar to yours, then, over it all, a hood of sheer microfiber. \"I can't see,\" he complains. \n\n   \"It'll be over soon,\" you reassure him as he steps forward onto the plate in front of the door. He places his hand on the panel. A beam of light plays over the mask; whatever information it's feeding the system, it has nothing to do with Reg. Finally, \"Duke Pietro d'Orrechiette,\" he says, the speaker in his earpiece changing his voice to the Duke's. \n\n   The door clicks open. You're in!\n   *goto dodge_boobytrap\n*elseif duchess_fingerprints =true\n   …the Duchess. That means you're up, Rania.\" \n\n   Rania, the closest in height and weight to the Duchess, dons a hydrogel glove similar to yours, then, over it all, a hood of sheer microfiber. \"I can't see,\" she complains. \n\n   \"It'll be over soon,\" you reassure her as she steps forward onto the plate in front of the door. She places her hand on the panel. A beam of light plays over the mask; whatever information it's feeding the system, it has nothing to do with Rania. Finally, \"Duchess Elizaveta d'Orrechiette,\" she says, the speaker in her earpiece changing her voice to the Duchess's. \n\n   The door clicks open. You're in!\n   *goto dodge_boobytrap\n*else\n   ${heir}. That means you're up, Le Roux.\" \n\n   Le Roux, the closest in height and weight to ${heir}, dons a hydrogel glove similar to yours, then, over it all, a hood of sheer microfiber. \"I can't see,\" he complains. \n\n   \"It'll be over soon,\" you reassure him as he steps forward onto the plate in front of the door. He places his hand on the panel. A beam of light plays over the mask; whatever information it's feeding the system, it has nothing to do with Le Roux. Finally, \"${heir} d'Orrechiette,\" he says, the speaker in his earpiece changing his voice to ${heir}'s. \n\n   The door clicks open. You're in!\n   *goto dodge_boobytrap\n\n*label dodge_boobytrap\n*page_break\n\nThe Duke's primary trophy room is…impressive. Ancient statues of dead gods stand guard, eyes black pits in the low light. As the door opens, spotlights wink on, highlighting certain items you remember from last night and others you don't: a poison-green emerald set in a copper knife, a heavy book bound in a leather you don't want to look at more closely. \n\nThe Black Cat is nowhere to be found—but in the center of the room is a small, heavy-looking safe. You're disappointed the Duke didn't decide to keep it on a pedestal in the very center of the room. It's what's you would have done. Ah well, it's not like you don't have multiple, experienced safe-crackers with you.  \n\nYou're about to take a step into the room when Nora shouts, \"Stop!\" \n*page_break\n\n\"What?\" you ask. \"We opened the door. Shouldn't that turn off any other security measures?\" \n\n\"The motion and sound sensors, yes,\" she says. \"But it looks like there's still a network of laser sensors active. Anyone coming in here probably needs to bring the remote to turn it off.\"\n\n\"Goggles,\" you say to Le Roux. The four of you pull out infared goggles from your bag and put them on; a dense network of lines does indeed criss-cross the entire room. Troublesome. Although it looks like there's a kill switch on the back wall—if you could only get to it.\n\nYou notice the lines are less dense near the ceiling. And you do have those nifty climbing gloves of Nora's—and you did bring Le Roux for a reason. Although, if you really want to be known as the true thief of the Black Cat, you might want to attempt the climb yourself. A third option is to just have Nora cut the power and hope you can crack the safe and get to the extraction point on the roof before they figure out where you are. \n\n*choice\n   #Send Le Roux across. \n      *set notoriety %-10\n      *goto leroux_ascent\n   #Go across myself.\n      *set notoriety %+10\n      *goto i_climb \n   #Cut the power.\n      *goto cut_power\n\n*label leroux_ascent\n\n\"You're up, Le Roux,\" you say. \n\nThe kid grins. This is his element. He slips the electrostatic climbing gloves on, along with a pair of shoe covers of the same material, and scuttles effortlessly up the wall like an infared-goggled insect. It's dizzying watching him carefully navigate his way along the ceiling, working his way around each beam—and finally, he reaches the other side of the room. \n\nIn a dazzling maneuver, he grips an exposed beam with his toes, dangles by one leg and reaches, ever so slowly, down to the kill switch—there! The beams disappear and Le Roux dismounts with a flourish. \n\n\"Fantastic job!\" you say. You hurry to examine the safe.\n*set alert %-10\n*goto examine_safe\n\n*label i_climb\n\nYou decide to attempt the climb yourself. Donning the electrostatic climbing gloves and a matching pair of shoe covers, you ease your way up the wall. \"You sure you don't want me to do this?\" Le Roux says. \n\n\"Watch and learn, kid,\" you retort. \n\n*if technique >65\n   You slowly climb the wall, and in a dizzying turn, attach yourself to the ceiling. Bit by bit, you inch your way across the room, working your way around the occasional infared beam. Le Roux could have done it more quickly but you didn't get into cat burglary to let your staff do the fun parts. \n\n   Finally, in a maneuver so deft you impress even yourself, you dangle by one leg from an exposed steel beam, reach down, and shut off the kill switch. The beams disappear, and you drop to the ground. Everyone hurries to examine the safe.\n   *goto examine_safe\n*else\n   You slowly climb the wall, and in a dizzying turn, attach yourself to the ceiling. Bit by bit, you inch your way across the room, working your way past the occasional infared beam. Le Roux could have done it much more quickly but you didn't get into burglary to let your staff do the fun parts. \n\n   Finally, it's time to get the kill switch. You dangle dangerously by one foot from an exposed steel beam, reaching down for the switch- \n\n   -and you move a little too awkwardly. Your hand goes through one of the infared beams. \n   \n   There's no sound but Nora gasps. \"The alarm!\" she shouts. \"Cutting power now!\" \n\n   The room is engulfed in darkness—until the emergency lights come back on. Reg, Rania, and Le Roux glare at you but you just shrug. These things happen, and you're almost out the door anyway. You hurry to examine the safe.\n   *set alert %+30\n   *goto examine_safe\n\n*label cut_power\n\n\"I think it's best if Nora just cuts the power,\" you say. \"They'll know something's up but it'll take them a few beats to figure out what.\" \n\n\"Suit yourself,\" says Rania. \"We just have to be ready to run.\" \n\n\"Okay,\" says Nora. \"In three…two…one.\" \n\nThe room is engulfed in darkness—until the emergency lights come on. The alarm system is down but now they're looking for you. You hurry to examine the safe.\n*set alert %+15\n*goto examine_safe\n\n*label examine_safe\n*page_break\n\nThe safe, unfortunately, is not an electronic model. Nora could hack one of those in her sleep. This is a complicated, standard safe, too heavy to lift and too thick to cut through or blow up in time, even if you'd brought the blowtorch or the Semtex. Cracking one of these requires intuition as much as pure skill. Gadgets don't hurt, either. \n*if knows_bouchard =false\n   *goto normal_safe\n*elseif bouchard_dead =true\n   *goto dead_safe\n*elseif bouchard_revealed =true\n   *goto revealed_safe\n*elseif bouchard_collude =true\n   *goto collude_safe\n*else\n   *goto surprise_safe\n\n*label normal_safe\n\nAny of you are up for it but Nick's the best safecracker you've ever met. Unfortunately, he's running late. \"Nick, it's about time,\" you say into your earpiece as you reach into the bag for the X-ray device. \n\n\"Hey,\" Nick says, strolling in behind you. \"Miss me?\" \n\nYou didn't even hear him come in. He looks perfectly relaxed, a contrast to your increasingly frazzled nerves. \"Where were you?\" \n\n\"Stopped for an aperitif,\" he says. \"The Duke got his best stuff out for Ivankov and I wasn't about to let it go to waste. So do you need my help with this thing or not?\" \n\nRania and Reg exchange looks but you know Nick. Going off-book is his style. \"Sure,\" you say, handing him the X-ray device. \n\nHe kneels in front of the safe and attaches it to the lock. The tumblers appear on the screen, shuffling as he turns the dial. \"Hmmm,\" he says…and in moments, he has it open. You raise an eyebrow. He's even better at this than you remember.\n*page_break\n\nAnd there it is, sitting on a velvet cushion: the Black Cat, your prize, the object of all your efforts. Nick takes it reverently out of the safe…then laughs, tosses it into the air, and catches it again. \n\n\"Thanks for all your hard work,\" he says. \"You really did a fine job. Finding that old secret passage was a stroke of genius. And Nora! What would I have done without all your little toys?\" \n\nSomething about his tone makes your hackles raise. It sounds like he thinks this is his score. \"Give it to me, Nick,\" you say. \"I'll hang on to it while we escape. That's the plan.\"\n\n\"That may have been your plan but it was never mine,\" he says, drawing his gun and pointing it at you. \"Sorry, ${firstname},\" he says. \"I hate to reveal myself after all this time but you'd have found out sooner or later.\" \n\nHis stance has changed; even his facial features seem to have shifted. His accent is no longer American but Parisian French. If he's not Nick McCord, then who is he?\n\nAnd it hits you. Your bitterest rival, always showing up where you were about to be, one step ahead, as if he had information on you…and as if he knew you well enough to know your next move. \n\nAs if he were someone you trusted. \n\n\"You [i]bastard[/i],\" you spit at Bouchard.\n*achieve diamond\n*finish\n\n*label dead_safe\n\nYou could be in and out of this thing in minutes—except for the fact that you shot your safecracker. As it is, you're good but not as good as he was. It's a crapshoot whether you can get this thing open or not. \n\nYou reach into your bag for the X-ray device. Kneeling in front of the safe, you attach it to the lock. The tumblers appear on the screen, shuffling as you turn the dial. Keep working. Keep working. You spare a glance for Reg; even he's looking fidgety now. Faster…\n\nThere's a click, the lights turn back on, and then a weary sigh from Nora. \"They're onto us,\" she says. \"We either crack the safe in the next two minutes or we run now. I'd suggest running but that's just me. It's your call.\" \n\n*choice\n   #Keep trying! \n      \"I'm not leaving without the Black Cat!\" you say. Faster, faster…drat, you almost had it….\n\n      Reg, crouched next to you, stands up. \"Well, I am,\" he says. \"It's too late, ${firstname}. There's no way we're getting into that safe without Bouchard. The best we can hope for now is getting out with our skins intact.\" Et tu, Reg? \n\n      He grabs you by the arm, and you fight him, still desperately attempting to open the safe. Finally, he sighs. \"Rania, give me a hand.\" You're briskly seized by both parties and lifted to your feet and back out into the hall, protesting all the way. \n      *set notoriety %-50\n      *set alert %+50\n      *finish\n   #Give up and run.\n      You sadly regard the safe. Inside it rest your fondest hopes for your career…now smashed. Next time, you'll remember to think before you shoot. Slowly, reluctantly, you stand. \"Guess we'd better go,\" you concede. \n\n      Reg lays a hand on your shoulder. \"Sorry it didn't work out,\" he says. \"But we've gotten closer than anyone ever has. That should count for something.\" It's not very comforting but it's all you've got. Together, you, Rania, Reg, and Le Roux head back out into the hall, heading for the roof. \n      *set notoriety %-25\n      *set alert %+25\n      *finish\n      \n*label revealed_safe\n\nAny of you are up for it but Bouchard is the best safecracker you've ever met. Unfortunately, he's running late. \"Bouchard, it's about time,\" you say into your earpiece as you reach into the bag for the X-ray device. \n\n\"Hello,\" Bouchard says, strolling in behind you. \"Did you miss me?\" \n\nYou didn't even hear him come in. He looks perfectly relaxed, a contrast to your increasingly frazzled nerves. \"Where were you?\" \n\n\"Stopped for an aperitif,\" he says. \"The Duke got his best scotch out for Ivankov, and I wasn't about to let it go to waste. So do you need my help or not?\" \n\nRania and Reg exchange looks—but even when he was Nick, going off-book was his style. \"Sure,\" you say, handing him the X-ray device. \n\nHe kneels in front of the safe and attaches it to the lock. The tumblers appear on the screen, shuffling as he turns the dial. \"Hmmm,\" he says…and in moments, he has it open. You raise an eyebrow. He's even better at this than you remember.\n*page_break\n\nAnd there it is, sitting on a velvet cushion: the Black Cat, your prize, the object of all your efforts. Bouchard takes it reverently out of the safe…then laughs, tosses it into the air, and catches it again. \"Excellent job,\" he says. \"Thank you, ${firstname}. I couldn't have done it without you.\" \n\n\"You mean I couldn't have done it without [i]you[/i],\" you say. \"Remember whose score this is, Maurice. Now give me the diamond. The plan is that I hold onto it while we escape.\"\n*achieve diamond\n*finish\n\n*label surprise_safe\n\nAny of you are up for it but Nick's the best safecracker you've ever met. Unfortunately, he's running late. \"Nick, it's about time,\" you say into your earpiece as you reach into the bag for the X-ray device.\n\n\"Hey,\" Nick says, strolling in behind you. \"Miss me?\" \n\nYou didn't even hear him come in. He looks perfectly relaxed, a contrast to your increasingly frazzled nerves. \"Where were you?\" \n\n\"Stopped for an aperitif,\" he says. \"The Duke got his best stuff out for Ivankov and I wasn't about to let it go to waste. So do you need my help with this thing or not?\" \n\nRania and Reg exchange looks but you know Nick. Going off-book is his style. \"Sure,\" you say, handing him the X-ray device. \n\nHe kneels in front of the safe and attaches it to the lock. The tumblers appear on the screen, shuffling as he turns the dial. \"Hmmm,\" he says…and in moments, he has it open. You raise an eyebrow. He's even better at this than you remember.\n*page_break\n\nAnd there it is, sitting on a velvet cushion: the Black Cat, your prize, the object of all your efforts. Nick takes it reverently out of the safe… \n\n…and turns around to see your gun pointed at his face. \n\n\"Give me the diamond, Bouchard,\" you say. \n*achieve diamond\n*finish\n\n*label collude_safe\nAny of you are up for it but Nick's the best safecracker you've ever met. Unfortunately, he's running late. \"Nick, it's about time,\" you say into your earpiece as you reach into the bag for the X-ray device.\n\n\"Hey,\" Nick says, strolling in behind you. \"Miss me?\" \n\nYou didn't even hear him come in. He looks perfectly relaxed, a contrast to your increasingly frazzled nerves. \"Where were you?\" \n\n\"Stopped for an aperitif,\" he says. \"The Duke got his best stuff out for Ivankov and I wasn't about to let it go to waste. So do you need my help with this thing or not?\" \n\nRania and Reg exchange looks but going off-book is this guy's style. \"Sure,\" you say, handing him the X-ray device. \n\nHe kneels in front of the safe and attaches it to the lock. The tumblers appear on the screen, shuffling as he turns the dial. \"Hmmm,\" he says…and in moments, he has it open. You raise an eyebrow. He's even better at this than you remember.\n*page_break\n\nAnd there it is, sitting on a velvet cushion: the Black Cat, your prize, the object of all your efforts. Nick takes it reverently out of the safe…then he tosses it in the air, catches it again, and laughs. \n\n\"Is it time to let them in on the secret, do you think?\" he says, his accent Bouchard's again. \"I find it's always more fun to let the dupes know they've been duped.\" He draws his gun, points it at Reg. \"Bouchard's the name. I'm sure you've heard of me. You've done a wonderful job here…but the diamond is mine.\"\n*achieve diamond\n*finish\n         ", "party": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n   Come back in a few minutes to play the next part of [i]Thieves’ Gambit: The Curse of the Black Cat[/i]!\n\n   Or, you can buy the game now to skip the wait.\n\n   *purchase_discount adfree 2020-04-29 $4.99 $2.99 purchased\n   *delay_break 1200\n\n*label purchased\n\n*temp outfit\n*temp sig_other\n*temp fake_name\n\n*if gender =\"male\"\n   *set heir \"Alexei\"\n   *goto setheir\n*elseif gender =\"female\"\n   *set heir \"Alexa\"\n   *goto setheir\n*else \n   *set heir \"Alexa\"\n   *goto setheir\n\n*label setheir\n*if heir =\"Alexei\"\n   *set subject \"he\"\n   *set object \"him\"\n   *set possessive \"his\"\n   *set sig_other \"son\"\n   *set fake_name \"Leo\"\n   *goto palazzo\n*else\n   *set subject \"she\"\n   *set object \"her\"\n   *set possessive \"her\"\n   *set sig_other \"daughter\"\n   *set fake_name \"Flora\"\n   *goto palazzo\n\n*label palazzo\n\n*set alert %-50\n*set team_rapport (((rania_rapport) + (reg_rapport)) + ((leroux_rapport) + (nora_rapport)))/4\n\n\n[i]Two days later—your safe house[/i]\n\nThe old palazzo you're using as a safe house is the summer home of a Greek banker who lost it all in the economic crash, and Nora's rented it for a steal. The room you've chosen is tastefully opulent, and right now it's covered in clothes. Silk and wool and serge and velvet are spread on top of the duvet, and as you examine the respective outfits, Reg comes in and hands you another one. \n\n\"The Duke's party is tonight, remember,\" he says. \n\nOh yes. The Duke's party, where he'll be showing off the Black Cat to his compatriots and fellow collectors, just because he can. A perfect opportunity for you and your team to case the joint and get valuable information—and then, tomorrow evening, you'll steal the diamond right out from under his nose. \n\n*page_break\n\nNora follows Reg in, not even bothering to knock. She's got a tablet and a folder full of papers and photographs. \"More information for your cover identity,\" she says. \"You've been studying up, right?\"\n\nYou wave a han  all been talking this over for days, so you don't waste time on small talk. \"We've already got the architectural plans thanks to Rania, and Nora's been able to get the basic specs of the security system,\" you say. \"The problem is, it's not networked. We're not going to be able to control the cameras and alarms remotely. Nora?\"\n\n\"Tonight's plan isn't just to case the joint,\" she says. \"We've got to get this attached to the Duke's security network.\" She holds up what looks like a perfectly normal USB drive, but with two little prongs on the exterior. \"Once that's hooked in, I'll be able to manipulate some of the palace's cameras and alarms. But not all of them. The Duke's too paranoid to have everything controlled from a central system.\" \n\n*page_break\n\n\"And in a situation like that,\" Reg says, \"the weak link isn't the tech but the people running it. Right?\"\n\n\"Right,\" you say. \"A keycard here, a password there, and we're one more locked door closer to our goal. So that's another task for the evening. Get what we can from the guards.\"\n\n\"Are they all the Duke's security force?\" Le Roux says. \"I hear they're tough.\"\n\n\"He's hiring some rent-a-guards for the party,\" Rania says. \"They can get sloppy. Some can be bribed. I know—I've been one.\" \n\n\"Aside from the guards,\" you add, \"we'll be going right to the source for information about the diamond, not to mention the rest of the Duke's collection. I know we've all seen the dossiers on the Duke and his family but a refresher never hurts. Nora, will you do the honors?\" \n\n\"Sure,\" she says. \"Who do you want to hear about?\"\n*goto family_dossier\n\n*label family_dossier\n*choice\n   *hide_reuse #The Duke. \n      A photo of a tall, middle-aged, sandy-haired man with a distinctive nose and an unpleasant glint in his eye appears on the screen. \n\n      \"Pietro d'Orecchiette, Duke of San Castellano,\" Nora says. \"Figurehead of state. The Dukes haven't had political power since the p was fairly public. Alexei's mother talked him into coming home for the party in the hopes it'll cheer him up.\"\n         *set heir \"Alexei\"\n         *goto family_dossier\n      *else\n         A photo clearly taken for a tabloid pops up on the screen. It shows a blonde, strikingly lovely young woman in casual clothes, very clearly leaving a dance club with some friends, although she doesn't look like the party-girl type. \n\n         \"Alexa d'Orecchiette, heir to the Duchy,\" Nora says. \"Currently a grad student in film at NYU. She's a constant disappointment to the tabloids, as young aristocrats go—drinks responsibly, doesn't scream at photographers. All she really cares about is her art and her girlfriend, who's the daughter of an American politician—so of course, their recent breakup went fairly public. Alexa's mother talked her into coming home for the party in the hopes that it'll cheer her up.\"\n         *set heir \"Alexa\"\n         *goto family_dossier\n   #I've heard enough. \n      *goto end_briefing\n\n*label end_briefing\n\n\"The more information we can get from them, the better,\" you say. \"The Duke loves to talk about his collection, and the more he talks, the more likely he'll slip in something we can use.\"\n\nOne last photo appears on the screen, just for motivational purposes. It's a closeup of a huge, black diamond displayed on a black, velvet background. It's an astonishing jewel but something about the angle of the cut is disconcerting. The light catches the facets in strange ways, as if they were odd corners of an unpleasant dreamscape.\n\n\"Our prize,\" you say. \"The Black Cat. Are you ready to be the first in modern history to successfully steal it?\"\n\n\"That's a lot of qualifiers,\" Rania says. \"But yeah. We're ready.\" She raises her glass. \"To not ending up mauled by harbor seals.\" \n\n\"To fame and fortune,\" you amend, and the team's glasses clink in agreement.\n\n*page_break\n\n[i]That evening—the Duke's palace[/i]\n\nYou relax, take a deep breath, and try to look like you're in your element. The doorman in his tuxedo—make no mistake, he's armed, although it takes a close look to notice—takes Nora's (or, rather, Sandy Bunker's) invitation. His features don't change as you pass through the front entryway of the palace, through an impossibly mirrored hall, and into the Duke's soirée. \n\nThe east ballroom is magnificent, if not huge; this is a relatively intimate gathering tonight, a hundred fifty or so guests. Baroque chandeliers cast a sparkling light on the ostentatiously gilt walls, the parquet floors, the sweeping staircase at the west end leading to the rest of the palace. To the east is a wall of windows, and through French doors, you see a wide balcony overlooking the Mediterranean.\n\nThroughout the room stand glass cases of various sizes, each one holding an artifact of notorious provenance. You see Rania standing by a display of Maori funeral masks, and you and Nora wander in her direction. She's wearing a flawless white gown and holding her sequined clutch like a hand grenade, which, for all you know, it might contain. And she's talking to- \n\nOh no. \n\n*page_break\n\nHe's exchanged the small-time swindler look he was working in Vegas for a $300 haircut and a $6000 suit but it's definitely Nick McCord. \n\n\"Let me introduce Javier Quiroga,\" Rania says. \"The Argentinian banker. He tells me he's been dying to meet you.\" Her voice drips with sarcasm. The two of them never did get along. \n\nNick smiles at the three of you, the lazy smile of a rich man in his element. He always did have a knack for Billionaire Playboy. \"A pleasure,\" he says, his accent perfect. \"Your friend here was telling me all about you.\"\n*choice\n   #\"What do you think you're doing here?\"\n      \"I'm accepting your offer.\" At your skeptical glance, he laughs. \"Come on, you know me. Messing with people is what I do. And you have to admit, the look on your face was priceless. Anyway, I'm here to help you. I want in.\"\n\t  \n      \"That's not what you said in Vegas.\" \n\t  \n      \"We're not in Vegas,\" Nick says. \"Look, whether you want me or not, I'm here. And I can pay you back for my little stunt.\"\n      *goto nick_intro\n   #\"Ah, Senor Quiroga. How was Buenos Aires?\" \n      \"Lovely,\" Nick says, \"although there are a few banks that will be getting some bad news in a few days. In the meantime, this alias has a little life left in it, I figured it was a good time for a European vacation, you know? Buy a new suit, meet some new people….\"\n\t  \n      \"Stop messing with us and just admit what you're doing here,\" Rania snaps. \n\t  \n      \"Accepting your offer,\" he says. \"And messing with people is what I do. What else did you expect? But if you're skeptical, I can pay you back for my little prank.\"\n      *set nick_rapport %+10\n      *goto nick_intro\n   #\"Back off, McCord. This is my job.\"\n      \"Call me Javier,\" Nick says. \"And of course it's your job. I never said it wasn't! I just want in.\" \n\t  \n      \"That's not what you said in Vegas.\"\n\t  \n      \"We're not in Vegas,\" Nick says. \"Look, this alias has a little life in it now that I'm done with Buenos Aires. I figured, why not come by and surprise you? You can use me. In fact, I can pay you back right now for my little prank.\"\n      *set nick_rapport %-5\n      *goto nick_intro\n   #\"Wow, McCord. Looking good.\" \n      \"You're not looking so bad yourself,\" he says with a wink. \"Wish you'd been in Buenos Aires with me. Made a killing.\" You're not sure if he means this literally or not. \n\t  \n      \"What are you doing here?\" you ask, although you've already guessed. \n\t  \n      \"Accepting your offer,\" he says. \"I would have let you know I was coming but I just wanted to see the look on your faces. And I can pay you back for my little prank, no problem.\"\n      *set nick_rapport %+10\n      *set nick_flirt true\n      *goto nick_intro\n\t    \n*label nick_intro\n*set team_rapport ((((rania_rapport) + (reg_rapport)) + ((leroux_rapport) + (nora_rapport))) + (nick_rapport))/5\n\t  \nHis eyes scan the ballroom. \"If I know you, you want an introduction to the Duke, right? I've been in town a few days and I've already got an invitation to golf with him. Or would you rather talk to the Duchess? Lovely woman. Or-\" His eyes fall on ${heir}. \"The duke's heir might be worth a shot. What do you say? Are we good? Am I in?\"\n\nJust then, Reg glides by in a footman's coat, bearing a tray of shrimp rolls. He glances at Nick, then at Rania, then at you, and gestures with the tray to an alcove nearby. \"If you'll excuse me for a moment,\" you say to Nick, taking Rania by the arm and heading for the alcove. \n*page_break\n\n\"What is up with that guy?\" Rania says irritably. \"Does he get some kind of nasty thrill from lying to people?\"\n\n\"That's kind of the definition of a con artist,\" you say. \"This isn't out of character. Once in Budapest, we were supposed to be casing an estate, he claimed to back out, and when I knocked on the door two days later, he answered. He'd gotten himself hired as the butler.\"\n\nReg sighs. \"I'm familiar with Mr. McCord's antics as well. The question right now is: is he in or out?\"\n\n\"He can't just say no, then show up and expect to get in on the game,\" Rania snaps. \"It's suspicious. He's playing at something. I say he's out.\"\n\n\"But we want him in on the game,\" Reg says. \"That was the whole point of asking him in the first place. His skills will be quite an asset for us. Not only his knack for deception, but we don't know what kind of safe the Duke has, and Nick's the best safecracker I know. I say he's in.\"\n\nYou think about it. In the moment, a formal introduction could do a lot to ingratiate you to the family and get you the information you need. And it seems that Nick has won the family's trust in record time. You should probably find a way to utilize his skills, one way or another.\n\n*choice\n   #\"Nick was one of my first choices for this job. He's eccentric but he does good work. We're bringing him on board.\"\n      Rania frowns. \"Suit yourself but I don't like the guy.\"\n\n      \"You'll like him more when he's helped us get the diamond,\" you say. \"Trust me.\"\n      *set honor %+20\n      *goto nick_is_in\n   #\"It does seem strange that he said no and then showed up. He's in for now but let's keep an eye on him.\"\n      \"McCord does do things his own way,\" Reg says. \"We should probably use caution with him at this point.\"\n\n      \"Good idea,\" you say. \"He's never let me down when we've been working together, but when we're not, all bets are off. Remember the thing with the opals in Canberra?\"\n\n      \"He still owes you a plane, I recall,\" Reg says. \n\n      \"We'll take it out of his share.\"\n      *set nick_suspicious \"kinda\"\n      *goto nick_is_in\n   #\"I don't like it, but he knows too much. We can't risk him exposing us. Let's take advantage of his skills—but after this is all over, it'll be a different story.\"\n      Reg shakes his head. \"I'd rather not plan to cut him out before he's done anything demonstrably wrong.\"\n\n      \"Better than trusting someone blindly and getting screwed,\" Rania says. \"So we agree he won't get any of the payoff?\"\n\n      \"Maybe. Maybe not. We'll double cross that bridge when we come to it,\" you say. \n      *set nick_suspicious \"very\"\n      *set honor %-20\n      *goto nick_is_in\n\n*label nick_is_in\n*achieve conman\n\nYou walk back over to Nick. \"Alright. You're in,\" you say.\n\nNick beams. \"You won't regret it. Now, which member of the family looks most interesting?\"\n*choice\n   #\"The Duke.\"\n      *if jnsq >70\n         *set duke_rapport +10\n         *goto duke_greeting\n      *elseif jnsq >60\n         *set duke_rapport +5\n         *goto duke_greeting\n      *elseif jnsq \u003c45\n         *set duke_rapport -5\n         *goto duke_greeting\n      *else\n         *goto duke_greeting\n   #\"The Duchess.\" \n      *if jnsq >70\n         *set duchess_rapport +10\n         *goto duchess_greeting\n      *elseif jnsq >60\n         *set duchess_rapport +5\n         *goto duchess_greeting\n      *elseif jnsq \u003c45\n         *set duchess_rapport -5\n         *goto duchess_greeting\n      *else\n         *goto duchess_greeting\n   #\"${heir}.\"\n      *if heir =\"Alexa\"\n         *if jnsq >70\n            *set heir_rapport +10\n            *goto alexa_greeting\n         *elseif jnsq >60\n            *set heir_rapport +5\n            *goto alexa_greeting\n         *elseif jnsq \u003c45\n            *set heir_rapport -5\n            *goto alexa_greeting\n         *else\n            *goto alexa_greeting\n      *else\n         *if jnsq >70\n            *set heir_rapport +10\n            *goto alexei_greeting\n         *elseif jnsq >60\n            *set heir_rapport +5\n            *goto alexei_greeting\n         *elseif jnsq \u003c45\n            *set heir_rapport -5\n            *goto alexei_greeting\n         *else\n            *goto alexei_greeting\n\n*label duke_greeting\nNick steers you over toward the Duke, who notices Nick and smiles. \"Ah, Senor Quiroga,\" he says. \"Still on for golf Sunday?\"\n\n\"Wouldn't miss it,\" Nick says smoothly. \"Pietro, let me introduce an old friend of mine, ${alias_firstname} ${alias_lastname}. ${alias_firstname}, this is His Grace the Duke of San Castellano.\"\n\nThe Duke gives you a thin smile. He's a thin man, tall and sandy-haired, with a sharp nose and a receding hairline. There's something a bit predatory about him. \n\n*if alias =\"philanthropist\"\n   \"${alias_firstname} is one of those American technology billionares you hear about,\" Nick continues. \"Very dedicated to making the world a better place. I'm almost embarrassed into starting a foundation every time we talk.\" You smile and try to look altruistic. \n\n   The Duke gives you a once-over.\n   \n   *g appening in Val Verde?\"\n   *goto duchess_int_check\n*else\n\n   You decide to start the conversation. \"I hear you're a philanthropist,\" you say to the Duchess. \"Where do you focus your efforts?\"\n   \n   \"South America, lately,\" she says. \"I've recently paid a visit to the rural areas of Val Verde. Isn't it terrible what's happening there?\"\n   *goto duchess_int_check\n   \n*label duchess_int_check\n*choice\n   *if intellect \u003c55\n      #Make a noncommital noise.\n         \"Mmm?\"\n\t\t \n         The Duchess waits for you to elaborate and when you don't, she sighs. \"I was going to say that it looks like Ruiz will be ousted any day now, but no matter. Let's change the subject.\"\n         *set duchess_rapport -5\n         *goto duchess_chat2\n      #Agree with her.\n         \"I agree. It's…like, really bad, and…stuff.\"\n\t\t \n         The Duchess raises an eyebrow, and when you don't elaborate, she sighs. \"I was going to say that it looks like Ruiz will be ousted any day now, but no matter. Let's change the subject.\"\n         *set duchess_rapport -10\n         *goto duchess_chat2\n      #Admit that I have no idea what she's talking about.\n         \"Americans,\" she says with a resigned sigh. \"Whatever do they teach you in those schools? No matter. Let's change the subject.\" \n         *set duchess_rapport -15\n         *goto duchess_chat2\n   *elseif intellect \u003c70\n      #Agree.\n         \"Yes?\"\n\t\t \n         The Duchess waits for you to elaborate and when you don't, she sighs. \"I was going to say that it looks like Ruiz will be ousted any day now, but no matter. Let's talk about something else.\" \n         *set duchess_rapport -5\n         *goto duchess_chat2\n      #Talk about the political situation.\n         \"I think the president is just days from being ousted.\"\n\t\t \n         \"Oh, I do too,\" the Duchess says. She seems slightly impressed with your knowledge of current events. \"Ruiz has always been welcoming to the
