ays eagerly the instant Nick is out of earshot. \"That's fascinating. Poetry takes a certain spark I can't quite muster. I'm a filmmaker. Film student, rather. It scandalizes my parents to no end but at least it keeps me out of the tabloids. Until lately, of course.\"\n   \n   You nod sympathetically. You've had your fair share of unflattering publicity yourself.\n   \n   \"But on a lighter note,\" ${heir} says, \"I'm curious—what did you think of [i]Rivers of Sand[/i]?\"\n   *goto heir_int_check\n*else\n   \"So, ${alias_firstname},\" ${heir} says. \"Are you enjoying your stay in San Castellano?\" You detect a strong streak of boredom in ${possessive} tone, and you realize you're going to have to make yourself interesting, fast.\n   \n   \"It's a lovely place,\" you say. \"Beautiful beaches, fantastic light. Speaking of which, you're a filmmaker, aren't you?\"\n   \n   ${heir} laughs. \"I wish,\" ${subject} says. \"Film student. It scandalizes my parents to no end but at least it keeps me out of the tabloids. Most of the time.\" \n\n   You nod sympathetically. You've had your fair share of unflattering publicity yourself.   \n   \n   \"But on a lighter note,\" ${subject} says, eyes alight, \"I'm curious—what did you think of [i]Rivers of Sand[/i]?\"\n   *goto heir_int_check\n   \n*label heir_int_check\n*choice\n   *if intellect \u003c55\n      #Bluff. \n         \"Isn't that an Oprah's Book Club thing?\" you say. \n         ${heir} laughs, not at all kindly. \"Oh, you're funny,\" ${subject} says.\n         *set heir_rapport -10\n         *goto heir_chat2\n      #Say that it didn't make much of an impression.\n         ${heir} seems a little taken aback. \"Really? The most talked-about film of the year? Everyone I've talked to either loves it or hates it. Are you sure we're talking about the same film? Ah, no matter.\" \n         *set heir_rapport -5\n         *goto heir_chat2\n      #Admit I have no idea what ${subject}'s talking about. \n         \"You haven't seen it? How could anyone not see such a talked-about film? Ah, no matter.\"\n         *set heir_rapport -15\n         *goto heir_chat2\n   *elseif intellect \u003c70\n      #Say that it didn't make much of an impression.\n         ${heir} seems a little taken aback. \"Really? Everyone I've talked to either loves it or hates it. Are you sure we're talking about the same film?\" \n         *set heir_rapport -5\n         *goto heir_chat2\n      # Complain about the subtitles.\n         \"I wasn't that excited about it. Maybe it was the subtitles.\" \n\t\t \n         \"A bad translation can ruin a good movie,\" ${heir} says. \"I saw it in the original and trust me, it's not the translator's fault. So overrated.\" \n         *goto heir_chat2\n      #Talk about its film festival win.\n         \"Didn't that get the Marchand Prize?\"\n\t\t \n         \"Undeserved,\" ${heir} says vehemently. \"So undeserved. Bad writing, bad lighting, bad all around.\" You nod, pretending to agree.\n         *set heir_rapport +5\n         *goto heir_chat2\n   *else\n      #Say that it didn't make much of an impression.\n         \"Really? Everyone I know either loved it or hated it. Are you sure we're talking about the same film?\"\n         *goto heir_chat2\n      #Say I loved it.\n         \"I loved it. It deserved the Marchand Prize.\"\n\t\t \n         \"Personally, I hated it,\" ${heir} says. \"Tsai's imagery was heavy-handed and the cinematography was just sort of…there. But to each their own.\" At the very least, ${subject} seems pleased you had a strong opinion. \n         *set heir_rapport +5\n         *goto heir_chat2\n      #Say I hated it. \n         \"I hated it. Tsai's imagery was heavy-handed. It didn't deserve to win.\"\n\t\t \n         \"I hated it too!\" ${heir} says. \"I completely agree with you. I don't know what the Marchand Prize jury was thinking.\" \n         *set heir_rapport +10\n         *goto heir_chat2\n\n*label duke_chat1\n\n*if alias =\"aristocrat\"\n   \"So, you're a Cholmondely,\" the Duke says once Nick is out of earshot. \"I know your uncle. Good man, good man. And you're a collector, too? I'm surprised I haven't seen you at any auctions.\" \n   \n   \"It's a fairly new hobby,\" you say, trying your best to sound suitably posh. \n   \n   \"Is it now?,\" the Duke asks. \"But surely you were there for the auction of the Tsarina's Laurel Circlet, weren't you? At the very least you've heard of its provenance.\"\n   *goto duke_int_check\n*else\n   \"I can't say I remember inviting you,\" the Duke says brusquely. \"But Eliza handles the invitations and she's very particular, so I trust you're good people. And it's only natural for someone to be interested enough in my collection to take a look.\" \n   \n   \"I'm extremely interested in your collection,\" you say. \n   \n   \"I'll show you the Black Cat in a moment,\" he says. \"But have you noticed my wife is wearing the Tsarina's Laurel Circlet? Have you heard of its provenance?\"\n   *goto duke_int_check\n   \n*label duke_int_check\n*choice\n   *if intellect \u003c55\n      #Admit I don't know what \"provenance\" is.\n         \"Provenance,\" the Duke says, exasperated. \"Its ownership prior to my purchase of it? The tiara Agafya Feodorovna insisted on wearing to the gallows in 1581? There's a painting of the scene in the Louvre? Oh, never mind.\" \n         *set duke_rapport -15\n         *goto duke_chat2\n      #Say yes.\n         The Duke waits for you to elaborate, then sighs. \"Aren't you impressed?\" he says. \"The tiara Agafya Feodorovna insisted on wearing to the gallows in 1581? I've been waiting for the Sultan of Oman to give it up for fifteen years now? Ah, never mind. Let me show you my latest acquisition.\" \n         *set duke_rapport -5\n         *goto duke_chat2\n      #Say no.\n         \"How could you not have heard of it?\" the Duke says. \"The tiara Agafya Feodorovna insisted on wearing to the gallows in 1581? There's a painting of it in the Louvre? Oh, never mind. Let me show you my latest acquisition.\"\n         *set duke_rapport -10\n         *goto duke_chat2\n   *elseif intellect \u003c70\n      #Say yes.\n         The Duke waits for you to elaborate, then sighs. \"Aren't you impressed?\" the Duke says. \"The tiara Agafya Feodorovna insisted on wearing to the gallows in 1581? I've been waiting for the Sultan of Oman to give it up for fifteen years now? Oh, never mind. Let me show you my latest acquisition.\" \n         *set duke_rapport -5\n         *goto duke_chat2\n      #Talk about the tiara's history.\n         \"Isn't there some story about the tsarina being executed?\"\n\t\t \n         \"Hanged,\" says the Duke. \"For adultery. She insisted on wearing it to the gallows. I've been waiting for the Sultan of Oman to give it up for fifteen years and now it's mine.\" \n         *set duke_rapport +5\n         *goto duke_chat2\n      #Praise the duke for acquiring it.\n         \"It's very impressive. How did you get your hands on it?\"\n\t\t \n         \"The Sultan of Oman finally decided to sell,\" the Duke says. \"The price was astronomical but money is no object for me when it comes to my collection.\" He sounds incredibly pleased with himself.\n         *goto duke_chat2\n   *else\n      #Say yes.\n         The Duke waits for you to elaborate, then sighs. \"Aren't you impressed?\" the Duke says. \"The tiara Agafya Feodorovna insisted on wearing to the gallows in 1581? I've been waiting for the Sultan of Oman to give it up for fifteen years now? Ah, never mind. I've got something more interesting to show you.\" \n         *goto duke_chat2\n      #Talk about the tiara's history.\n         \"I've seen the painting in the Louvre. It's an impressive acquisition.\"\n\t\t \n         \"The tiara Agafya Feodorovna insisted on wearing to the gallows in 1581,\" the Duke says, sounding very pleased with himself. \"I thought the Sultan of Oman would never sell. It's been taken apart over the centuries but the main gems are still…Oh, but I can tell you about it after I show you my latest prize.\"\n         *set duke_rapport +5\n         *goto duke_chat2\n      #Praise the duke for acquiring it.\n         \"I thought the Sultan of Oman would never sell. It's quite a piece.\"\n\t\t \n         \"The tiara Agafya Feodorovna insisted on wearing to the gallows in 1581,\" the Duke says, sounding very pleased with himself. \"You'll never guess how I got the Sultan to sell. I traded him the pipe organ from the city's cathedral for it. Anything for my collection. And speaking of my collection, I should show you my latest prize.\"\n         *set duke_rapport +10\n         *goto duke_chat2\t\n\t\t \n*label duke_chat2\n*page_break\n\n\"I'm sure you're eager to see the gem in question,\" he says. He leads you through the partygoers, passing a bizarre display of a battered piece of black rubber hanging on the wall. \"A tire from James Dean's car,\" he says proudly. A terracotta statue of a frowning Chinese warrior: \"Everyone who's ever owned this particular statue has gone bankrupt within seven years.\" A Greek vase: \"Mange. Every dog of every owner of this vase comes down with mange.\"\n\n\"Have yours?\" you say. \"I mean, if you have dogs.\" \n\nHe laughs. \"Of course they haven't,\" he says. \"There's no such thing as a curse. These items were all owned by people who blamed bad luck for their own shortcomings. And even if one of these curses was real, the House d'Orrechiette is the luckiest in Europe, so that negates any possible curse. These are merely curiosities. And here's the Black Cat.\" A throng of partygoers parts when they see the Duke approach, and you find yourself in front of the object in question.\n\n*page_break\n\nIt's in a large glass case on a pedestal, two liveried guards on either side. It's truly stunning. You're taken aback by the depths of its color, how it seems to drink the light. Your trip was definitely worth it. Now to dig for information. \"Which wing is the trophy room in?\" is probably a bad place to start, so you decide to ease your way into that conversation.\n\n\"You have quite an impressive collection,\" you say nonchalantly. \"What makes the Black Cat special?\"\n\n\"Surely you know some of its background,\" he says. \"It's even more storied than the others. This gem has left behind a bizarre trail of insanity and death from the time it left India, to a long stay in Britain, to its modern owners. Do you want to hear some of the story?\"\n*goto duke_blackcat\n\n*label duke_blackcat \n*choice\n   *hide_reuse #\"Tell me about its origins.\"\n      \"The first official records of the Black Cat occurred when it was given to the British as tribute from the Sikh Empire in 1850,\" the Duke says. \"It wasn't the only diamond to allegedly carry a curse—there were the Hope and the Koh-i-Noor—but the Black Cat was the most beautiful of all. The last two owners of the gem were rumored to each have been trampled to death, along with their wives, by elephants. A certain Lord Blackthorne received the gem and took it back to England with him, using the rationalization that since there were no elephants at his estate, he'd have no problems. Little did he know.\"\n      *goto duke_blackcat\n   *hide_reuse #\"Tell me about its British owners.\"\n      \"Lord Blackthorne's wife wore the gem once and promptly went mad,\" the Duke says. \"She was locked in the attic, as was the style at the time. Blackthorne's prize horses bolted from the stable one day, and the stableboy swears he saw a huge, ghostly figure in one of the stalls. Lord Blackthorne scoffed at this for all of three weeks, until he was killed when his ancestral manor burned to the ground. An elephant's footprint was found in the ashes.\n\t  \n      \"After that, Lord Blackthorne's son gambled himself into oblivion. After the son's wife went mad, he ran off to join the circus. You can guess how that turned out.\"\n      *goto duke_blackcat\n   *hide_reuse #\"Tell me about its modern owners.\"\n      \"Somehow, the gem made its way to America and into the hands of a shipping magnate, who was somewhat of a spiritualist. He thought he could purge the curse of the gem through a seance; everyone who participated had nightmares for the rest of their lives, or so they claimed, and the owner, it was rumored, spontaneously combusted. His wife's last act before she was taken to the sanitarium was to sell it to an Australian banker, who had an unfortunate accident at an aquarium with some elephant seals. His daughter was a marine biologist. You may have read about that one. And after that, the gem disappeared. Until I found it.\"\n      *goto duke_blackcat\t  \n   *hide_reuse #\"What possessed you to buy it?\"\n      \"Because it was there,\" the Duke says. \"Why else does anyone buy anything? The perfect addition to my collection—the unluckiest gem in the world—appearing out of the blue. I don't care if an elephant tromps in from the balcony right now and squashes all my guests. It's worth it to own the Black Cat.\" \n      *goto duke_blackcat\n   #\"I'd rather just see it up close.\"\n      \"By all means,\" the Duke says, unhooking the rope that surrounds the pedestal. The guard to your left flicks his eyes in your direction but doesn't move. You lean in to take a closer look, reveling in cut and color, and indulge a brief fantasy about what it'd look like in your own trophy room. \n\n      \"Isn't it a handsome gem?\" says the Duke.\n      *goto duke_flirt\n\t  \n*label duke_flirt\n*choice\n   #\"Not as handsome as you.\" \n      *if gender =\"male\"\n         *if duke_rapport \u003c50\n            \"I beg your pardon?\" he says coldly. \n            *set duke_rapport -5\n            *goto duke_final\n         *else\n            \"Ahem. Ah. Well.\" The Duke seems flustered but not offended. \"I'm a married man, you know.\" \n            *goto duke_final\n      *else\n         *if (duke_flirt =true) or (duke_rapport >65)\n            The Duke lays a hand on your arm, and you know you've got this. \"Indeed,\" he says with a wicked grin. \"Would you like to wear it sometime?\"\n\t\t\t\n            \"I suppose I would,\" you say. \"It's definitely something I'd like to see even closer up.\" \n\t\t\t\n            \"Would you now,\" he says. His eyes drink you in. This might be easier than you thought. \n            *set duke_flirt true\n            *set duke_charm true\n            *goto duke_final\n         *elseif duke_rapport \u003c50\n            \"I beg your pardon?\" he says coldly.\n            *set duke_rapport -5\n            *goto duke_final\n         *else\n            \"Ahem. Ah. Well.\" The Duke seems flustered but not offended. \"I'm a married man, you know.\"\n            *goto duke_final\n   #\"It really is a fantastic gem. Why isn't the Duchess wearing it?\"\n      *if duke_rapport \u003c50\n         \"None of your business,\" the Duke says. Is this a sore spot for him? \n         *set duke_rapport -5\n         *goto duke_final\n      *elseif duke_rapport >65\n         \"Superstitious woman,\" the Duke says, bitterly. \"She knows I like to see her wear the things I buy, but she's been less and less supportive, and she won't even touch the Black Cat. Something about the wives of the owners going mad, or some such poppycock. She simply doesn't care what this collection means to me. You and I…I can tell we understand each other about this sort of thing.\"\n         *set duke_charm true\n         *goto duke_final\n      *else\n         The Duke waves a hand. \"Oh, she's just being superstitious,\" he says. \"Something about the wives of the owners going mad. I keep telling her, if you were going to go mad you'd have done it a long time ago, but no, she won't touch the thing.\"\n         *goto duke_final\n   #\"Do you really not believe in the curse?\" \n      \"I don't,\" the Duke says. \"I don't believe in luck. Every man is the master of his fate, and that's more or less the point of my collection arm true\n   *goto outro\n*else\n   \"I'm sorry, my private collection isn't available for viewing at this time,\" the Duke says. \"I do have parties like this one from time to time, however. I'll make a note to tell Eliza to invite you to the next one. Now, unfortunately, I must mingle. Host's duty. It has been a pleasure.\" He moves off in the direction of a French cabinet minister. \n   \n   Drat! Ah well, Rania and Nick might have had better luck with the Duchess and ${heir}.\n   *goto outro\n\n*label duchess_chat2\n\n*page_break\n\"I'm sure you're eager to see my husband's latest acquisition,\" she says. She leads you through the partygoers, passing a bizarre display of a battered car tire hanging on the wall. \"A tire from James Dean's car,\" she says. Another display: \"Dishes from the Titanic.\" Another: \"It's said that any dogs owned by the owner of this vase will come down with mange.\" \n\n\"Do you believe in any of these curses?\" you ask. \n\nShe sighs, a long weary sigh. \"If I were a superstitious woman, I couldn't live in this palace. So no. Or, rather, not for the most part. The Black Cat…there's something disturbing about it. Pietro wants me to wear it but I won't touch the thing. And here it is.\" A throng of partygoers parts when they see the Duchess approach, and you find yourself in front of the object in question.\n\n*page_break\n\nIt's in a large, glass case on a pedestal, two liveried guards on either side. It's truly stunning. You're taken aback by the depths of its color, how it seems to drink the light. Your trip was definitely worth it. Now, for information. \"Which wing is the trophy room in?\" is probably a bad place to start, so you decide to ease your way into that conversation.\n\n\"The Duke has quite an impressive collection,\" you say nonchalantly. \"What makes the Black Cat special?\"\n\n\"Surely you know some of its background,\" she says. \"It's even worse than whatever you may have heard. This gem has left behind a bizarre trail of insanity and death from the time it left India, to a long stay in Britain, to its modern owners. Would you like to hear some of the story?\"\n*goto duchess_blackcat\n\n*label duchess_blackcat \n*choice\n   *hide_reuse #\"Tell me about its origins.\"\n      \"The first official records of the Black Cat occurred when it was given to the British as tribute from the Sikh Empire in 1850,\" the Duchess says. \"'Given as tribute' meaning 'taken as plunder', of course. Most of the allegedly cursed diamonds started out that way, you know. But the Black Cat already had a bad history attached to it. The last two owners of the gem were rumored to each have been trampled to death, along with their wives, by elephants. A certain Lord Blackthorne received the gem and took it back to England with him, using the rationalization that since there were no elephants at his estate, he'd have no problems. Little did he know.\"\n      *goto duchess_blackcat\n   *hide_reuse #\"Tell me about its British owners.\"\n      \"Lord Blackthorne's wife wore the gem once and promptly went mad,\" the Duchess says. \"She was locked in the attic, as was the style at the time. Blackthorne's prize horses bolted from the stable one day, and the stableboy swears he saw a huge, ghostly figure in one of the stalls. Lord Blackthorne scoffed at this for all of three weeks, until he was killed when his ancestral manor burned to the ground. An elephant's footprint was found in the ashes.\n\t  \n      \"After that, Lord Blackthorne's son gambled himself into oblivion. After the son's wife went mad, he ran off to join the circus. I suppose you can guess how that turned out.\"\n      *goto duchess_blackcat\n   *hide_reuse #\"Tell me about its modern owners.\"\n      \"Somehow, the gem made its way to America and into the hands of a shipping magnate, who was somewhat of a spiritualist. He thought he could purge the curse of the gem through a seance; everyone who participated had nightmares of strange tentacled things for the rest of their lives, and the owner, it was rumored, spontaneously combusted. His wife's last act before she was taken to the sanitarium was to sell it to an Australian banker, who had an unfortunate accident at an aquarium with some elephant seals. His daughter, unfortunately, was a marine biologist. You may have read about that one. And after that, the gem disappeared. Until now.\"\n      *goto duchess_blackcat\t  \n   *hide_reuse #\"What possessed the Duke to buy it?\"\n      \"Arrogance,\" she says, and you can detect real bitterness in her tone. \"Pure arrogance. He thinks he's immune. San Castellano has never been conquered, the D'Orrechiette line is so lucky, it can cancel out any curse, he says, but the real reason is that he's rich and bored and has nothing better to do than to drain the national coffers for his grotesque hobby.\" She stops, then continues in a more cheerful tone, \"But that's just my opinion.\"\n      *goto duchess_blackcat\n   #\"I'd rather just see it up close.\"\n      \"By all means,\" the Duchess says, unhooking the rope that surrounds the pedestal. The guard to your left flicks his eyes in your direction but doesn't move. You lean in to take a closer look, reveling in cut and color, and indulge a brief fantasy about what it'd look like in your own trophy room. \n\n      \"Isn't it a lovely gem?\" says the Duchess.\n      *goto duchess_flirt\n\t  \n*label duchess_flirt\n*choice\n   #\"Not as lovely as you.\"\n      *if gender =\"female\" \n         *if duchess_rapport \u003c50\n            \"I beg your pardon,\" the Duchess says stiffly. \n            *set duchess_rapport -5\n            *goto duchess_final\n         *else\n            The Duchess smiles awkwardly but not unkindly. \"I appreciate the sentiment, dear, but I'm a married woman,\" she says. \n            *goto duchess_final\n      *else\n         *if (duchess_flirt =true) or (duchess_rapport >65)\n            She puts her hand on your arm a moment and you   She looks you right in the eye and smiles. Her hand tightens on yours, and you feel her fingers lightly brush the back of your neck. \"Do you remember that room we had over the coffee house?\" she asks softly. \n\n      You do. A dingy, cramped hole-in-the-wall where the two of you were laying low till the heat was off, venturing outside only to get some pretty good [i]kebap[/i] from that stall on the corner. Somewhere in there, you discovered you could make her drop her hard-edged front by making her laugh. You spent pretty much the rest of the next two weeks in bed, alternating between searing hot sex and making fun of daytime TV (a fairly easy task since neither of you speaks much Turkish).\n\n      Somewhere along the way, you'd found a vulnerability in each other. It scared you. So you did what you always do: you ran.\n\n      You're used to running. It could be time to try something else. \n      *goto rania_romance_choice\n   #\"Yeah, those were good times.\"\n      She grins. \"And we got away with the microchip, too. I would have asked you to help me spend the payout except you'd disappeared.\"\n\n      \"I do that,\" you say. \"You do, too. It's in our nature.\"\n\n      Her hand tightens a bit on yours, and she looks away, dark eyes lowered. You remember that room above the coffee shop, two weeks laying low till the heat was off, the wit and vulnerability you saw in her beneath the hard-boiled exterior. \"It doesn't have to be.\"\n      *choice\n         #\"You're right. It doesn't have to be.\"\n            *goto rania_romance_choice\n         #\"Why change? We both get by just fine.\"\n            She sighs. \"I guess we do, for the most part,\" she says. \"It'd just be nice to have…Oh, what am I even talking about. Dip me.\" You do, gracefully, watching the approving eyes on the two of you. You have to admit the two of you look damn good together.\n            *if rania_rapport >60\n               *goto rania_romance_choice\n            *else\n ow dip me.\" You do, receiving approving looks from the crowd. You have to admit the two of you look good together.\n      *goto rania_end_dance\n   #\"Just shut up and dance.\"\n      She seems a little taken aback but she shuts up, and you dance.\n      *set rania_rapport %-10\n      *goto rania_end_dance\n\n*label nick_flirt_dance\n\nNick's leading. The two of you begin stepping elegantly through the twirling couples on the dance floor; he dances with grace and precision. \"I didn't think you could make it through the whole night without a dance,\" he says. \"You never could resist the urge to show off.\"\n\n\"It's a waltz,\" you say. \"What's to show off? Now, if it were a tango-\"\n\n\"Oh, I've seen you tango,\" Nick says with a wicked little half-smirk. \"Which reminds me, I was just in Venice and it brought back some old memories. Remember Venice?\"\n*goto remember_venice_1\n\n*label remember_venice_1\n\n*choice\n   *hide_reuse #\"Didn't you say you were just in Buenos Aires?\"\n      \"I was,\" he says. \"Venice was before that. I've been a lot of places recently. You know how it is. But you remember what we got up to, right?\"\n      *if nick_suspicious =\"no\"\n         *set nick_suspicious \"kinda\"\n         *goto remember_venice_1\n      *elseif nick_suspicious =\"kinda\"\n         *set nick_suspicious \"very\"\n         *goto remember_venice_1\n      *else\n         *goto remember_venice_1\n   #\"I've said it before and I'll say it again: I could never forget our time together in Venice.\"\n      His dark eyes lock on yours and you see something almost vulnerable in his expression before he catches himself. \"Of course you couldn't,\" he says. His hand grips yours more tightly and he slides his hand almost suggestively along your waist.\n\n      \"You remember that hotel by the Ponte Rialto?\" you ask before you can stop yourself. The two of you were posing as Australian investors, running a con on a German flooring magnate, and you took over the Presidential Suite at the Ca'Sagredo and spent those few weeks eating, drinking, and partying on the German's dime. There would be a point each night past which your spiky, one-upping banter stopped, after you got back to the historic 18th century bed under the historic painted ceiling, and you saw the depth that Nick spent most of his waking hours trying to hide. \n\n      There was a vulnerability there in both of you. It scared you. You ran. You've wondered for a long time if it was the right choice; if not, you could have a chance now to make it right.\n      *goto nick_romance_choice\n   #\"Yeah, those were good times.\"\n      He grins. \"Yeah, the old 'Foreign Investors' con. Eating, drinking, and partying on that German CEO's dime. Remember we had that massive suite at that fancy hotel near the Ponte Rialto? Those were the days.\" He sighs, and you see a little bit of the vulnerability you saw after the occasional long night in Venice, the very thing he spends most of his waking hours trying to hide. \"I would have asked you to help me spend the rest of the payoff except you'd disappeared.\"\n\n      \"I do that,\" you say. \"You do, too. It's in our nature.\"\n\n      \"It is,\" he says. His hand grips yours more tightly; he looks at you, looks away. \"Always running away from something. Never really thought about having someone running in the same direction, though, have you?\"\n      *choice\n         #\"Only if it's you.\"\n            *goto nick_romance_choice\n         #\"Why change? We both get by just fine.\"\n            \"You're right. If it ain't broke don't fix it.\" Nick seems almost chipper but you know him well enough to tell when he's faking it. \"It's just…these last couple of jobs, the thrill's not there. Something's missing.\"\n            *if nick_rapport >60\n               *goto nick_romance_choice\n            *else\n               *goto nick_end_dance\n         #\"Don't get sappy on me now.\"\n            \"Sappy? I'm insulted,\" Nick says xamining the Maori masks. Your stomach clenches. How…?\n\n\"Leclerc? Here?\" you whisper to Reg.\n\nHe shrugs. \"Your guess is as good as mine.\" \n*page_break\n\nYou're well out of Leclerc's line of sight. Reg gestures anxiously at a spot near the wall where the rest of the team has gathered, waiting for you. You shake your head; you need to find out what she's doing here. \n\nAt that moment, the Duke steps up behind Leclerc while she frowns at the masks. \"Aren't they fascinating?\" he says in her ear. \"I got them from a very old family in Auckland. Perfectly authentic.\"\n\nLeclerc turns and regards the Duke. \"And legal, let's hope,\" she says sharply. \"I'd hate for my department to have to intervene like it did with that Macedonian icon.\"\n\n\"As you well know, I had no idea that was stolen,\" the Duke says, smiling. \"Honestly, Inspector—may I call you Marie?\"\n\n\"Inspector will do,\" Leclerc says icily. \"Your Grace, I appreciate your invitation to this…gathering, but as I've told you, I'm not in town on a social call. I'm simply here to review your security measures. There's been a recent rash of high-profile burglaries that lead Interpol to believe the Black Cat might soon be a target.\"\n\nThe Duke laughs. \"The Black Cat is always a target,\" he says. \"And it's never been successfully stolen, at least if the legend is to be believed. My security is airtight, in any case.\" He waves a hand, dismissing Leclerc's concerns. \"Now let me show you some other choice items in my collection. For example, I have a jade frog from-\"\n\n\"Oh, the frog? That's a fake.\" \n\n\"What?\" gasps the Duke. They move away, out of earshot.\n\n*page_break\nShaken, you and Reg find your team in the corner. \"Leclerc's here,\" you tell them. \n\n\"She's onto us!\" Le Roux gasps. \n\nYou shake your head. \"Whatever information she has, it can't be anything concrete, or else this place would be overrun with police right now. We're still alright.\" \n\n\"She's onto us,\" Le Roux repeats mournfully. \n\nNick grins and Rania just shrugs but Le Roux droops like a cut flower. Reg frowns and Nora looks like she's about to jump out of her skin. \n\n*choice\n   #\"Don't worry. We've got a plan, we've got an amazing team, and we'll be in and out of here before Leclerc can so much as call headquarters. She'll never notice.\"\n      Nora sighs. Some of the tension seems to have drained out of her. \"I do have to admit it's a pretty good plan. And that's not just because I came up with a lot of it.\"\n\n      \"We've worked under Leclerc's nose before and come out alright,\" Reg says to Le Roux. \"Remind me to tell you the story about the Cambridge heist sometime.\" Le Roux nods eagerly. He really looks up to Reg. \n\n      Nick snorts. \"Rah rah go team. Want me to wave a pom-pom or should we get going with this thing?\" \n\n      \"Right,\" you say. \"Let's get on with it.\"\n      *set nora_rapport %+5\n      *set nick_rapport %-5\n      *set leroux_rapport %+5\n      *goto recon_start\n   #\"This doesn't change anything. Let's just pretend she's not here, get the diamond, and go home. All that matters is the job. She's just another distraction.\"\n      \"This wasn't in the risk profile when I signed on,\" Nora says. \"But it's not like we can back out now.\" You can tell she's still nervous. \n      \n      \"We've worked under Leclerc's nose before and come out alright,\" Reg says to Le Roux. \"Remind me to tell you the story about the Cambridge heist sometime.\" Le Roux nods. Reg's matter-of-fact manner seems to have reassured him.\n\n      \"Right,\" you say. \"Let's get on with it. \n      *set nora_rapport %-5\n      *goto recon_start\n   #\"This will just make it all more fun! Imagine stealing the Black Cat out from under Leclerc's very nose. She'll be a laughing stock.\"\n      \"Or else we'll get caught,\" Nora says. \"Three years in white-collar prison for computer crimes was enough for me. I don't even want to think where they'll send us for this.\" \n\n      \"Look who's a Debbie Downer,\" Nick says. He seems invigorated by this turn of events. He looks at Le Roux. \"You want fame and fortune, kid, this is how you get it. Hey, has ${lastname} told you the story about the Cambridge heist yet?\" Le Roux shakes his head weakly, still nervous. \n\n      \"Right,\" you say. \"Let's get on with it.\"\n      *set nick_rapport %+5\n      *set nora_rapport %-5\n      *goto recon_start\n\n*label recon_start\n\n\"Alright,\" you say briskly. \"You all know what to do. Rania, you distract the guard at the top of the stairs and then keep an eye on the hoi polloi. Warn us if you see the Duke, his chief of security, or Leclerc leave the party. Nick, you're with her. Reg, you head to the garage. Nora, you're with me. We'll meet Le Roux upstairs.\"\n\n\"Got it,\" says Nora. \"Here's your security badge.\" She reaches into her sizable purse and pulls out an ID badge from the private security agency the Duke uses for events. It contains your photo and the name of an actual employee of theirs who looks a lot like you. The woman does her research. Then she hands you something else small and flat, a phone. \"Take this. If we run into one of the Duke's elite guards, drop it; it'll save his fingerprints as soon as he touches it. It's also got a retina scanner in the eyepiece, if you can get that close.\"\n\n\"And how am I supposed to get that close?\"\n\n\"It's also a taser.\"\n\nGood old Nora. She thinks of everything. Speaking of which, she hands out your earpieces; you insert yours and take another for Le Roux. With a nod, Reg is gone, headed towards the garage and the getaway car. Rania seems a little disappointed to be left behind, and Nick grins. You'll have to figure out what to do with him tomorrow.\n\n*page_break\n\nThe party's definitely reaching the raucous stage; the guests are getting a little too loud, and you notice a couple of spoiled, young debutante types taking a blitzed selfie with a crude (in more than one sense) fertility idol. Definitely a great time to make yourself scarce. Eyeing the crowd to see if you're being watched, you and Nora ascend the staircase to the second floor.\n\nThe doors at the top of the stairs are thrown open. There's a guard here—not one of the Duke's plainclothes security team. This one is in full livery, there for show and crowd control. \"Restroom?\" you say politely.\n\n\"To your right,\" he says. \"Please stay within the roped areas.\"\n\nYou head through the doors and feint right, and then you hear Rania's voice from the stairwell, asking the guard for some complicated directions to the western overlook gardens. That's your cue. You and Nora slip past the rope and into the second unlocked room on your left.\n\n*page_break\n\nThis is one of the Duke's salons, paneled in dark wood, decorated mostly with leather and hunting trophies, with a truly huge, snarling tiger dominating one wall. There's also a fireplace and a massive saltwater fish tank full of exotic lionfish. Le Roux is here, in the striped trousers and apron of the palace kitchen staff.\n\nYou hand him his earpiece and he grins. With a flourish, he pulls on a fireplace iron and one of the wall panels clicks and creaks open. Just like in the plans Rania found. The palace is riddled with not-all-that-secret tunnels like this, although they're not really networked. Most are just haphazard shortcuts, installed by paranoid Dukes as each new tower or wing was built. This one has a gate across it, locked with a heavy padlock. Short work for a master thief.\n\n*choice\n   #Pick the lock.\n      *if technique >60\n         Nora hands you the leather wallet in which you keep your lockpicks. What else has she secreted in that magic purse? Kneeling, you do your work, and as you feel the tumblers click, the lock falls away.\n         *goto gate\n      *else\n         Nora hands you the leather wallet in which you keep your lockpicks. What else has she secreted in that magic purse? Kneeling, you give it a shot, but after a few minutes, you still haven't felt the tumblers click. \"Here, let me,\" Le Roux says apologetically. He has it open in seconds. Not that you're not proud of the kid, but it's a little embarrassing.\n         *set notoriety %-5\n         *goto gate\n   #Have Le Roux pick the lock.\n      This is why you brought the kid in the first place. Nora hands him the leather wallet in which you keep your lockpicks—what else has she secreted in that magic purse?—and he has the lock open in seconds.\n      *goto gate\n   #Shoot the lock.\n      What? No. Why would you do that? You don't even have your gun.\n\n      \"Here, let me,\" Le Roux says. Nora hands him the leather wallet in which you keep your lockpicks—what else has she secreted in that magic purse?—and he has the lock open in seconds. You can't help but feel a little proud of the kid.\n      *goto gate\n\n*label gate\n\nNora slips through the gate. This tunnel doesn't lead anywhere special, hence the low-fi security measures, just down to a closet outside the offices in the northeastern tower. Close enough to the Duke's household security server for Nora to hack it. \"See you in a few,\" she says, and disappears into the dark, narrow corridor.\n\n*page_break\n\nLe Roux, meanwhile, is donning white servant's gloves and tucking his distinctive red hair into a tight-fitting cook's cap with a low brim, the better to keep cameras off his face. His job is reconnaissance: checking doors, spotting cameras, and sussing out what kind of security measures you'll encounter in the palace proper during the break-in. He picks up a load of hand towels he swiped from the bathroom, does a quick check of the corridor, and strolls out into the hall, heading toward the private apartments. If he's confronted, a lost servant in the hall is bound to look less suspicious than a lost guest.\n\nSpeaking of confrontation. You peek outside the door and see a burly gentleman striding purposefully down the hall, one of the Duke's security detail. A few more steps and he'll see Le Roux and stop him, and at the very least redirect him to the kitchen. You've got to buy the kid some time—more time than a simple \"where's the bathroom?\" will buy.\n\n*choice\n   #Confront the guard and pretend to be a lost, drunk partygoer.\n      You hurriedly close the secret panel, then stagger out into the hall, giggling to yourself. The guard stops short. \"This area is off limits,\" he says brusquely. \"Please return to the ballroom.\"\n      *choice\n         #Engage the guard in conversation.\n            *if jnsq >55\n               \"Hello,\" you say cheerfully. \"Say, have you seen the Duke's hunting trophies? There are some really amazing specimens in here. I just wanted to get a picture of the tiger-\"\n\n               \"Look, you need to get back to the ballroom right now.\"\n\n               You reach into your pocket, pretend to fumble, and drop the phone Nora gave you on the ground. The guard leans down to pick it up and frowns at it. \"No unauthorized cameras,\" he says, but he doesn't sound convinced.\n\n               \"Come on,\" you say. \"Just one photo.\"\n\n               There's a long pause. \"Just one,\" the guard says reluctantly, and follows you into the Duke's study.\n               *goto phone\n            *else\n               \"Hello,\" you say cheerfully. \"I'm lost. I was trying to find my way to the restroom, but I got so turned around.\"\n\n               \"It's this way,\" the guard says shortly, gesturing back the way you came. \"I'll escort you.\"\n\n               The guard moves to take you by the arm and you reluctantly head down the hallway. The guard stops at the bathroom and watches you enter. As the door closes, you see him return to his rounds.\n\n               The bathroom is empty. \"Le Roux,\" you say quietly into your earpiece. \"Coming your way. Found anything?\"\n\n               \"No,\" he says. \"Nothing. Should I turn around?\"\n\n               \"Probably,\" you say. \"Head for the rendezvous.\" Damn it. You were counting on him having more time.\n\n               You wait a few moments and duck back down the stairs, back to the ballroom, and through the servants' entrance, where you push past some surprised kitchen staff to get to the garage.\n               *set guard \"suspicious\"\n               *goto garage\n         #Lure the guard into the study and tase him.\n            \"Hey, have you seen these animal heads?\" you slur, and stagger back into the study. The guard follows you, frowning, prepared to forcibly remove you-\n\n            -when you flick the thumb switch on your taser-phone, hit the home button, and two tiny prongs shoot out and pump high voltage through the unsuspecting guard. He lets out a loud groan and falls to the floor, twitching. You lean over and touch his unresisting hands to the phone and, for good measure, hold the eyepiece up to his eye for the retina scan. You certainly hope he's got clearance to more sensitive areas of the palace.\n\n            \"Sorry, friend,\" you say. \"Nothing personal.\"\n\n            You drag him over to the fireplace, pull down a curtain cord to tie his hands, and disappear out the door.\n\n            Ducking back down the stairs, you return to the party, then head through the servants' entrance, push past some kitchen staff in the corridor, and make your way to the garage.\n\n            \"I should warn you,\" you say into your earpiece. \"Reg, warm up the car. We're going to have company.\"\n            *set honor %-20\n            *set guard \"tased\"\n            *set leroux_recon true\n            *set fingerprints true\n            *set retina true\n            *goto garage\n         #Drop my phone.\n            \"Hello there! I was just looking for the restroom and wow, there was this room, and have you seen that tiger? It's amazing!\"\n\n            \"The restroom is this way,\" the guard says brusquely, gesturing back the way you came. You reach into your pocket, pretend to fumble, and drop the phone Nora gave you on the ground. The guard picks it up, frowning.\n\n            \"Hey, give that back,\" you say. \"Or, wait, no, can you do me a big favor? Huge. Huge favor. Can you get a picture of me and the tiger?\"\n\t\t\t\n            *if jnsq >60\n               \"No unauthorized cameras,\" the guard says, but then, glancing at the tiger—a truly awesome specimen—reconsiders. After a long pause, he says, \"Alright. We do tours through here sometimes, the Duke won't mind. Then you go back downstairs, okay?\"\n               *goto phone\n            *else\n               \"No unauthorized cameras,\" the guard says. \"You're lucky I'm not going to confiscate this. I'll escort you to the restroom.\"\n\n               The guard moves to take you by the arm and you reluctantly head down the hallway. The guard stops at the bathroom and watches you enter. As the door closes, you see him return to his rounds.\n\n               The bathroom is empty. \"Le Roux,\" you say quietly into your earpiece. \"Coming your way. Found anything?\"\n\n               \"No,\" he says. \"Nothing. Should I turn around?\"\n\n               \"Probably,\" you say. \"Head for the rendezvous.\" Damn it. You were counting on him having more time.\n\n               You wait a few moments and duck back down the stairs, back to the ballroom, and through the servants' entrance, where you push past some surprised kitchen staff to get to the garage.\n               *set guard \"suspicious\"\n               *set fingerprints true\n               *goto garage\n   #Smash the fish tank to draw him into the salon. Who knows, you might be able to pose as a fish tank repair team tomorrow.\n      You slam the secret door shut, heft a tiny end table and, with a crash, smash the fish tank. Water floods out, accompanied by angry lionfish. You regret their inevitable demise but it's for a good cause.\n\n      \"What was that noise?\" you hear the guard shout from the hallway as he races into the room to see you standing half-drenched and grinning drunkenly at him.\n\n      \"Whoops,\" you slur. \"Didn't mean to do that. Had a little much. Wanted to see the tiger. You see that tiger? Huuuuuge tiger-\"\n\n      \"Angelo,\" the guard snaps into his earpiece. \"I'm gonna need backup. Some drunk idiot smashed the fish tank in East 14. You! Don't go anywhere.\" You slump obediently on a leather chair, and the guard leans over to inspect the damage.\n      *set flash %+20\n      *set aquarium true\n      *set leroux_recon true\n      *choice\n         #Tase the guard.\n            *goto tased\n         #Ask him to take my picture with the tiger.\n            *if jnsq >55\n               \"What? You want me to what?\" snaps the guard. \"After you stagger in here drunk and break the-\" He examines you closely. You endeavor to look as innocently intoxicated as you can.\n\n               \"I'll replace it,\" you offer.\n\n               The guard sighs. \"I'll need your name and address,\" he says, \"and sure, I'll take your tiger picture. This isn't even the weirdest day I've had in this place. And then you're going back to your hotel, sobering up, and we'll contact you in the morning. Okay?\" You nod eagerly and hand him your phone.\n               *goto phone\n            *else\n               \"Don't be ridiculous,\" he snaps. \"And now you've got an unauthorized camera in addition to a broken fish tank. Just don't move.\" He turns again to examine the gasping lionfish. Moving as slowly as you can, you stand and creep toward the secret panel, which is still open a crack. You ease it open and are halfway in before the guard turns around and sees you. \"Hey!\" he shouts, and you bolt, running as fast as you can in the narrow, dark passage. You're pretty sure you lose him at a fork. You burst out of a closet near the offices and run in the direction of the garage.\n\n               \"I should warn you,\" you say into your earpiece. \"Reg, warm up the car. We're going to have company.\"\n               *set guard \"chased\"\n               *goto garage\n         #Get out of there.\n            While the guard is cradling a gasping lionfish, you slowly stand and creep toward the secret panel, which is still open a crack. You ease it open, and you're halfway in before the guard turns around and sees you. \"Hey!\" he shouts, and you bolt, running as fast as you can in the narrow, dark passage. You're pretty sure you lose him at a fork. You burst out of a closet near the offices and run in the direction of the garage.\n\n            \"I should warn you,\" you say into your earpiece. \"Reg, warm up the car. We're going to have company.\"\n            *set guard \"chased\"\n            *goto garage\n   #Confront the guard and pretend to be another guard.\n      You step out into the hallway and nod curtly at the guard. \"Hey,\" you say. \"Doing the second-floor rounds? That's my assignment.\"\n\n      The guard stops, confused, then suspicious. \"Who are you?\" he snaps.\n\n      \"Marzetti. Elite Security,\" you say, pulling out your fake badge and hoping this guard hasn't worked with the real Marzetti before.\n\n      \"In that outfit?\"\n\n      You shrug. \"They told us to blend in.\"\n\n      *if ((looks =\"brute\") or (looks =\"vet\")) or (honor \u003c40)\n         The guard looks at you, then seems to decide that your appearance and attitude are plausibly tough and no-nonsense. \"Marzetti,\" he says. \"I remember seeing your name. You were at the Greek reception, I recall. Carry on.\" He gives you a quick nod and turns to go back the way he came.\n         *choice\n            #Hand him the phone Nora gave me.\n               *if jnsq >60\n                  \"Wait a minute. I found this on the floor in here. Take a look.\" You pull out the phone Nora gave you and hand it to the guard. He takes it, looks at it, then shrugs.\n\n                  \"Just a phone,\" he says, handing it back. \"Nice one. One of the guests must have dropped it. I can take it down to the office-\"\n\n                  \"I'll take it,\" you say. The guard casually hands it back to you, then leaves. Whew! Le Roux should be able to make his rounds on this floor no problem, and now you've got the guard's fingerprints.\n\n                  You wait for the guard to round the corner, then hurry back down the stairs, into the ballroom, through the servants' entrance, past the kitchen staff, and into the garage, where Reg will be waiting with the getaway car.\n                  *set leroux_recon true\n                  *set fingerprints true\n                  *goto garage\n               *else\n                  \"Wait a minute. I found this on the floor in here. Take a look.\" You pull out the phone Nora gave you and hand it to the guard. He takes it, looks at it, then shrugs.\n\n                  \"Just a phone,\" he says, handing it back. \"Nice one. One of the guests must have dropped it. I can take it down to the office-\"\n\n                  \"I'll take it,\" you say hurriedly, reaching for it—but he snatches it back.\n\n                  \"Not your job,\" he says. \"I've got it. Carry on.\" He walks off the way he came. Your only option is to tackle him but that'd bring every guard in the palace to your location, so you decide against it. Instead, you call Nora and tell her the guard got her fancy spy phone.\n\n                  \"Shit,\" she says. \"Ah well. It sent me the fingerprints automatically, so we've got those. I'm wiping it now. All we can do is hope that they don't look too closely and tase themselves.\"\n\n                  Ducking back down the stairs, you return to the party, then head through the servants' entrance, push past some kitchen staff in the corridor, and make your way to the garage, where Reg will be waiting with the getaway car.\n                  *set leroux_recon true\n                  *set fingerprints true\n                  *set guard \"suspicious\"\n                  *goto garage\n            #Tase him and get his fingerprints and retina scan.\n               *goto tased\n            #I won't press my luck. Just let him go.\n               If you gave him the phone, he might want to keep it, and the last thing you want is one of Nora's fancy spy gadgets in the hands of the palace staff. Even though she could wipe it remotely, you don't want to leave any clues that someone's trying for the Black Cat…not yet, anyway.\n\n               In any case, you've bought Le Roux time to do his recon. Ducking back down the stairs, you return to the party, then head through the servants' entrance, push past some kitchen staff in the corridor, and make your way to the garage, where Reg will be waiting with the getaway car.\n               *set leroux_recon true\n               *goto garage\n      *else\n         The guard frowns. \"I don't know a Marzetti,\" he says. \"I'm going to have to check with the office.\" He puts a finger to his ear. \"Angelo, there's someone here claiming to be from Elite. Are they supposed to have someone on this floor?\" Judging from the black look he gives you, he doesn't like the answer. He grabs you by the arm.\n         *choice\n            #Tase him.\n               *goto tased\n            #Run for it.\n               You shake your arm loose and run straight into the Duke's study. The guard's fast, but you're faster, and you run through the still-open secret panel, slam the gate behind you, and race down the narrow, dark passage. You're pretty sure you've lost him at a fork. You burst out of a closet near the offices and run in the direction of the garage.\n\n               \"I should warn you,\" you say into your earpiece. \"Reg, warm up the car. We're going to have company.\"\n               *set guard \"chased\"\n               *goto garage\n\n*label phone\nYou arrange yourself in front of the snarling, stuffed beast and grin like the stupid tourist you're impersonating. The guard raises the phone to eye level and presses the button. \"Ow!\" he shouts. \"That's bright. I think your flash is messed up.\" He examines the phone suspiciously, and then, finding nothing problematic, hands it back to you. \"I'll escort you back to the party,\" he says.\n\nOnce down the stairs, you pause in relief. Le Roux should have had plenty of time to check things out by now, and not only do you have the guard's fingerprints, you've got his retina scan as well. You head through the throngs of guests and through the servants' entrance, push past some kitchen staff in the corridor, and make your way to the garage, where Reg will be waiting with the getaway car.\n*set fingerprints true\n*set retina true\n*set leroux_recon true\n*goto garage\n\n*label tased\n\nYou flick the thumb switch on your taser-phone, hit the home button, and two tiny prongs shoot out and pump high voltage through the unsuspecting guard. He lets out a loud groan and falls to the floor, twitching. You lean over and touch his unresisting hands to the phone and, for good measure, hold the eyepiece up to his eye for the retina scan. You certainly hope he's got clearance to more sensitive areas of the palace.\n\n\"Sorry, friend,\" you say. \"Nothing personal.\"\n\nYou drag him over toward the fireplace, pull down a curtain cord to tie his hands, and disappear out the door.\n\nDucking back down the stairs, you return to the party, then head through the servants' entrance, push past some kitchen staff in the corridor, and make your way to the garage, where Reg will be waiting with the getaway car.\n\n\"Get ready, everyone,\" you say into your earpiece. \"We may have company.\"\n*set fingerprints true\n*set retina true\n*set leroux_recon true\n*set guard \"tased\"\n*set honor %-20\n*goto garage\n\n*label garage\n*page_break\nThe palace dungeons were expanded in 1640 by the notorious Duchess Violeta, who was later thrown off the cliffs into the sea in the peasant uprising of 1657. She'd be rolling in her watery grave if she knew half the dungeons had been dug up and replaced with the modern concrete catacombs of the Duke's parking garages, wildly impractical sports cars now parked on the bones of her enemies.\n\nYou enter the garage through a side door. Several valets are standing around smoking in front of the main entrance to the palace, their backs to you. Behind a velvet rope, a few of the Duke's favorite vehicles—probably the unluckiest ones—are on display for the guests, strategic lighting glinting enticingly off chrome. You're half-considering stealing the vintage Aston Martin when Reg pulls up in the limo Nora has rented for the occasion.\n*page_break\n\n*if guard=\"suspicious\"\n   You notice the guard from upstairs come through the main entrance, muttering something into his headset. Dammit. Something about your encounter must have set off his suspicions. You duck behind a pillar as he goes over to address the valets.\n\n   Reg pulls up right next to you. Realizing time is of the essence, you throw open the door and hop into the car, where Nora and Le Roux are already waiting, just as the guard frowns and starts walking over to you. You're sure he didn't see your face, but still. He seems like he's going to try to stop you but he hesitates, and Reg uses the opportunity to drive off.\n\n   \"Trouble?\" Nora asks.\n\n   \"There was a run-in upstairs,\" you say. \"Nothing serious. By tomorrow he'll forget he ever saw me.\" You sound more confident than you feel.\n   *set alert %+10\n   *achieve chapter5\n   *finish\n*elseif guard=\"tased\"\n   Realizing that time is of the essence, you quickly throw open the door of the limo and hop inside, where Nora and Le Roux are already waiting. As you slam the door, you see another plainclothes security guard rush through the main entrance, shouting something to the valets. Drat. They must have found his incapacitated colleague.\n\n   As Reg begins to pull away, a phalanx of valets and guards moves to surround the limo. \"Keep going!\" you shout.\n   *if (technique >60) or (reg_rapport >55)\n      Reg hits the gas and the limo's tires squeal as it lurches forward. The valets dive out of your way just as another two guards appear at the main entrance. One of them draws a gun but you're out of there and away before any shots are fired.\n\n      \"Trouble?\" Nora says.\n\n      \"Oh, nothing,\" you say lightly. \"I just tased a guy, that's all. The poor man probably won't even remember what I look like after a shock like that.\" You sound more confident than you feel.\n      *set alert %+20\n      *achieve chapter5\n      *finish\n   *else\n      \"You want me to what?\" Reg shouts, and in that moment of hesitation, the valets surround the car. Reg, leery of running them over in cold blood, revs the engine menacingly, and you see another two guards emerge from the main entrance. One draws a gun and-\n\n      -[i]crack[/i]! Le Roux shrieks like a girl as one of the windows explodes. Before you can duck, you meet the eyes of an angry valet; he's about to reach in and grab you when the limo finally lurches and, tires squealing, you peel out of the garage.\n\n      \"What was that?\" Le Roux says.\n\n      \"A problem,\" you say shortly. The guard you tased is probably not feeling well enough to ID you in a lineup right now but the valet got a good look at your face. You're not getting into the palace tomorrow through the front door without a flawless disguise.\n      *set recognized true\n      *set notoriety %-15\n      *set alert %+50\n      *achieve chapter5\n      *finish\n*elseif guard=\"chased\"\n   There's no time to waste. Reg doesn't even stop as you throw open the door and fling yourself into the car, where Nora and Le Roux are already waiting. The guard bursts through the door moments later and shouts something to the valets, who move to surround the limo.\n\n   Reg revs the engine menacingly. \"Drive!\" you shout, but you know he's not the type to run over five guys in cold blood. Another two guards emerge from the main entrance. One draws a gun and-\n\n   -[i]crack[/i]! Le Roux shrieks like a girl as one of the windows explodes. Before you can duck, you meet the eyes of an angry valet; he's about to reach in and grab you when the limo finally lurches and, tires squealing, you peel out of the garage.\n\n   \"What was that?\" Le Roux says.\n\n   \"A problem,\" you say shortly. The guard and the valet both got a good long look at your face. If you want to get in the palace through the front door tomorrow, you'll be doing it with a truly flawless disguise.\n   *set alert %+670\n   *achieve chapter5\n   *set notoriety %-20\n   *set spotted true\n   *finish\n*else\n   Reg, dressed in a white-gloved-limo-driver uniform, gets out and opens the door with a flourish. Le Roux and Nora are already inside.\n\n   As you get in the car and Le Roux hands you a champagne flute, you notice a familiar, sharp scent wafting from the snack tray. \"Is that…caviar?\"\n\n   \"It came with the limo,\" Nora says.\n\n   \"Remind me to have you book all our car rentals from now on.\"\n\n   Sipping champagne, you head back into town, your reconnaissance mission complete. Tomorrow's the big day.\n   *achieve chapter5\n   *set notoriety %+25\n   *finish\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set technique 63\nhah!\n*fake_choice\n   #duh\n   #wretch\n\n*script changeBackgroundColor(\"black\")\n\n*set fullname \"Genevieve d'Autrechose\"\n*set technique 85\n*set intellect 50\n*set jnsq 60\n*set flash 50\n*set honor 35\n*set team_rapport 60\n*set alert 80\n*set notoriety 50\n\nYou carefully ease your way along the ledge to your left. The gargoyle to your right is providing some cover against being spotted from the street, but you're going to have to move into the line of sight of the police in order to get to the fire escape, which is two windows over. You'll need something to draw their attention. \n\nThere's a polite cough in your ear. \"Any suggestions on what sort of distraction would be most distracting?\" Reg says.\n\n*fake_choice\n   #Instruct Reg on how to hack into the police scanner. \n   #Tell Reg to cause an explosion. \n   #Forget the distraction and just make a break for it.\n\n*script changeBackgroundColor(\"sepia\")\n\n*set fullname \"John Doe\"\n*set technique 35\n*set intellect 60\n*set jnsq 85\n*set flash 60\n*set honor 50\n*set team_rapport 70\n*set alert 20\n*set notoriety 60\n\nSellers have been hawking their wares in this market square since time immemorial, the calls of the merchants echoing against the ancient walls and through the shattered window of your stolen car. If you can find your way through, it's a straight shot to the Plaza and from there to the autostrada and freedom. \n\nYou hear the sound of a police siren growing closer. \n\n*fake_choice\n   #I think I know where I'm going. \n   #Pick a path at random. \n   #Just gun it through the market. I don't care who I hit.\n   \n*set fullname \"Agniezka von Diederitz\"\n*set technique 50\n*set intellect 85\n*set jnsq 35\n*set flash 50\n*set honor 60\n*set team_rapport 40\n*set alert 70\n*set notoriety 65\n\n\"The Duke has quite an impressive collection,\" you say nonchalantly. \"What makes the Black Cat special?\"\n\n\"Whatever rumors you've heard about the Black Cat's dark past, its real history is even stranger,\" Alexei says. \"A long, weird tale of death, insanity, and destruction by wild animal. Would you like to hear some of it?\"\n\n*fake_choice\n   #\"Tell me about its origins.\"\n   #\"Tell me about its modern owners.\"\n   #\"What possessed the Duke to buy it?\"\n   #\"I'd rather just see it up close.\"\n   \n*set fullname \"Sasha Smythe-Jones\"\n*set technique 50\n*set intellect 85\n*set jnsq 60\n*set flash 65\n*set honor 20\n*set team_rapport 35\n*set alert 60\n*set notoriety 75\n         \nRania saunters past you and sets something down on the table—a bottle of wine. Chateau St. Grimbald, 2002. Your favorite, and she knows it. \"And what are you doing up this late the night before a big job? You should know better,\" she says teasingly. \n\nShe stops and leans toward you, smile enigmatic, and you can tell she's waiting for you to make a move.\n\n*fake_choice\n   #Turn her down gently.\n   #Turn her down harshly. \n   #Kiss her. \n   \n*set fullname \"Jun Kurosawa\" \n*set technique 35\n*set intellect 50\n*set jnsq 50\n*set flash 35\n*set honor 85\n*set team_rapport 80\n*set alert 65\n*set notoriety 30\n\nYou take stock of the situation. It could be worse. With luck, you can get to the helicopter when it arrives, or if all else fails, to the edge of the palace roof for a daring leap into the sea.\n\n\"You should have been more careful!\" Inspector Leclerc shouts. \n\n*fake_choice\n   #Taunt her. \n   #Duck behind that smokestack. \n   #Shoot at her.\n\n\n", "startup": "*title Thieves' Gambit: The Curse of the Black Cat\n*author Dana Duffield\n\n*scene_list\n   startup\n   team\n   chase\n   party\n   recon\n   breakin\n   heist\n   escape\n\n*create firstname \"\"\n*create lela \"\"\n*create lastname \"\"\n*create fullname \"\"\n*create technique 50\n*create intellect 50\n*create jnsq 50\n*create flash 50\n*create honor 50\n*create notoriety 50\n*create gender \"unknown\"\n*create reg_rapport 60\n*create rania_rapport 60\n*create nora_rapport 50\n*create nick_rapport 50\n*create leroux_rapport 50\n*create alert 1\n*create looks \"\"\n\n*create rania_flirt false\n*create nick_flirt false\n*create rania_romance false\n*create nick_romance false\n\n*create duke_rapport 50\n*create duchess_rapport 50\n*create heir_rapport 50\n*create duke_flirt false\n*create duchess_flirt false\n*create heir_flirt false\n*create duke_charm false\n*create duchess_charm false\n*create heir_charm false\n*create fingerprints false\n*create retina false\n*create aquarium false\n*create leroux_recon false\n*create spotted false\n*create breakin_path \"reg\"\n*create duke_fingerprints false\n*create duchess_fingerprints false\n*create heir_fingerprints false\n*create duke_retina false\n*create duchess_retina false\n*create heir_retina false\n*create entrycode 1\n\n*create marco \"\"\n*create heir \"Alexa\"\n*create subject \"she\"\n*create object \"her\"\n*create possessive \"her\"\n\n*create alias \"\"\n*create alias_title \"\"\n*create alias_firstname \"\"\n*create alias_lastname \"\"\n\n*create reg_betray false\n*create nora_betray false\n*create leroux_betray false\n*create rania_betray false\n*create leclerc_spotted false\n\n*create nick_suspicious \"none\"\n*create knows_bouchard false\n*create bouchard_revealed false\n*create bouchard_dead false\n*create nickname \"Nick\"\n*create join_bouchard false\n*create bouchard_collude false\n\n*create team_rapport 50\n*create team_rapport1 50\n\n*achievement aurevoir visible 25 Au Revoir\n   Escape the Paris police.\n   Escaped the Paris police.\n\n*achievement soldier visible 15 The Soldier\n   Recruit Rania.\n   Recruited Rania.\n   \n*achievement hacker visible 15 The Hacker\n   Recruit Nora.\n   Recruited Nora.\n   \n*achievement burglar visible 15 The Burglar\n   Recruit Le Roux.\n   Recruited Le Roux.\n   \n*achievement formula1 visible 25 Formula One\n   Escape the city.\n   Escaped the city.\n   \n*achievement conman hidden 15 The Con Man\n   hidden\n   Recruited Nick.\n   \n*achievement duke hidden 25 The Aristocrat\n   hidden\n   Charmed the Duke.\n   \n*achievement duchess hidden 25 The Philanthropist\n   hidden\n   Charmed the Duchess. \n   \n*achievement alex hidden 25 The Artist\n   hidden\n   Charmed the heir. \n   \n*achievement raniadance visible 15 A Waltz to Remember\n   Dance with Rania.\n   Danced with Rania. \n   \n*achievement nickdance visible 15 Last Tango in San Castellano\n   Dance with Nick.\n   Danced with Nick.\n   \n*achievement chapter5 visible 25 Case the Joint\n   Investigate the palace.\n   Investigated the palace.\n   \n*achievement bouchard hidden 100 That Bastard!\n   hidden\n   Discover Nick's true identity.\n   \n*achievement raniaromance visible 15 Memories of Istanbul\n   Start a romance with Rania.\n   Started a romance with Rania. \n   \n*achievement nickromance visible 15 Memories of Venice\n   Start a romance with Nick.\n   Started a romance with Nick.\n   \n*achievement bouchardromance hidden 15 You Like Me Because I'm a Scoundrel\n   hidden\n   Started a romance with Bouchard.\n   \n*achievement frontal hidden 15 Frontal Assault\n   hidden\n   Went in through the front door.\n   \n*achievement overtop hidden 15 Over the Top\n   hidden\n   Went in over the garden wall. \n   \n*achievement cleanup hidden 15 Cleanup Crew\n   hidden\n   Went in disguised as a maintenance team. \n   \n*achievement ivankov hidden 50 Honor Among Thieves\n   hidden\n   Revealed Ludomir Ivankov.\n   \n*achievement diamond visible 50 The Prize\n   Steal the Black Cat.\n   Successfully stole the Black Cat.\n\n*achievement refuse hidden 15 I'll Never Join You\n   hidden\n   Refused to join Bouchard. \n\n*achievement join hidden 15 Unlikely Allies\n   hidden\n   Teamed up with Bouchard. \n\n*achievement doublecross hidden 25 Double Cross That Bridge\n   hidden\n   Double crossed Bouchard.\n\n*achievement escape visible 50 The Great Escape\n   Escape the palace.\n   Escaped the palace. \n\n*achievement notorious visible 100 Notorious\n   Become the world's most famous jewel thief.\n   Became the world's most famous jewel thief. \n\n*achievement die hidden 25 Cursed\n   hidden\n   Succumb to the Curse of the Black Cat.   \n\n*rand entrycode 1 3\n\n*set team_rapport reg_rapport\n\n*if not(choice_is_web or choice_is_steam)\n   *temp skip_description\n   *config skip_description false\n   *if skip_description\n\n      *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n   You're the world's greatest jewel thief! Well, second greatest. But if you and your team of talented crooks can steal the Black Cat, the world's unluckiest diamond, you'll be legendary!\n\n   [i]Thieves’ Gambit: The Curse of the Black Cat[/i] is an interactive heist caper by Dana Duffield, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n   Play as male or female; gay, straight, or bi. Choose your methods and your motives. Will you be an honorable thief or a ruthless criminal? A technical genius or a master of disguise? Who can you trust, and who will you double-cross?\n\n   The Black Cat has never been stolen, its previous owners all having died under improbably unfortunate circumstances. Break into the palace of San Castellano, pinch the gem, evade the relentless Inspector Leclerc and get away before you succumb to the Curse of the Black Cat!\n\n   *if choice_is_steam\n      [i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n      *if choice_is_advertising_supported\n         [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n      *purchase_discount adfree 2020-04-29 $4.99 $2.99 purchased\n      *page_break Play Now for Free\n      *goto purchased\n   *elseif choice_is_advertising_supported\n      [i]Thieves’ Gambit: The Curse of the Black Cat[/i] is supported by advertisements, but you can buy the unlimited version\n      to turn off ads forever.\n      \n      *purchase_discount adfree 2020-04-29 $4.99 $2.99 purchased\n      *page_break_advertisement\n\n      *goto purchased\n   *else\n      [i]You can play the game for free, with 20 minute breaks between chapters, or you can buy the game now for unlimited play without breaks.[/i]\n\n      *purchase_discount adfree 2020-04-29 $4.99 $2.99 purchased\n      *page_break Play Now for Free\n\n*label purchased\n\nAh, Paris. City of Lights, City of Romance. In the streets, lovers love and dreamers dream; and in the Rue des Caniches, a playground of the wealthy and well-connected, they do so with considerable style—the sleek business types and ladies who lunch moving effortlessly through the shops and cafes attired in the [i]haute[/i]-est of [i]haute couture[/i].\n\nIt would be much more enjoyable to watch if you weren't currently five stories above it, standing on a narrow ledge on the outside of a building, wind whipping at your hair and your perfectly tailored Italian jacket.\n\nBehind you is an open window leading to one of Paris's most expensive and discreet art galleries. It was supposed to be an easy job; the place really should have had better security if they were going to handle a Chagall. An afternoon's reconnaissance playing a potential buyer, a few quick and subtle tricks to disarm the alarm system, a distraction for the rent-a-guards, and you'd be in and out and home in time for dinner and a show. After all, you're the world's greatest jewel thief.\n\nWell. Second greatest.\n\n*set alert 40\n\n*page_break \n\nBut when you entered the gallery, to your dismay, the stretch of wall where the Chagall was supposed to be hanging was empty. Below it, you found a small note on the floor. Picking it up, you couldn't help but grit your teeth at the all-too-familiar, spiky handwriting. \n\n[i]Better luck next time[/i], it said.\n\nAnd almost at that very moment, the gallery's alarm went off. You'd made sure to disable it. Apparently, someone took some care to re-enable it—no doubt the same person who'd made off with your prize. \n\nBouchard. That bastard. \n\nLuckily, the window wasn't bulletproof. Luckier still, this is an old-fashioned building, covered in ledges and crenellations and ornamental bits. There's even a gargoyle to your right, leering uncomfortably at you. To your left—far to your left—there's a rickety fire escape, but even if you were able to reach it, it'd put you in full view of the street. A power line slants over your head, leading to what looks to be a transformer or fuse box, reachable with some effort. A climb straight down would be the best option to keep you out of sight but you've left your pitons and your climbing harness in your other jacket.\n\nYou take stock of your skills in light of the situation and consider the best possible course of action. \n\n*choice\n   #I'll have no problem climbing the building's face. My agility is my greatest asset, my upper arm strength my second greatest. \n      Your body is a finely honed machine. Your strength, flexibility, and lightning reflexes have gotten you out of more than a few sticky situations, like that fistfight on the roof of that Turkish train. Good times.\n      *set technique 70\n      *goto nextstat\n   #I'll see if I can access the building's electrical system and reroute the alarm. My intellect is considerable, and my skill with technology is legendary. \n      Your wide knowledge of the arts, sciences, and technology is your defining trait, and, impressively, you are entirely self-taught. Rumor has it you got your Ph.D. at Oxford—which is true, in a sense, since you stole it off the curator's office wall while ransacking the Ashmolean Museum.\n      *set intellect 70\n      *goto nextstat\n   #A flying leap for the fire escape is definitely an option. I don't care if I'm seen—it makes my inevitable escape that much more thrilling. \n      What's more fun than taunting the authorities while you dash off with their prize right under their noses? It's so cute watching them shake their fists in rage. \n      *set flash 70\n      *goto nextstat\n   #I'll go back inside and try to bluff my way out of it. I'm persuasive enough that it just might work. \n      People always say there's something inscrutably charming about you…a certain, shall we say, [i]je ne sais quoi[/i]? You can chat, flirt, bluff, or outright lie your way out of just about anything.\n      *set jnsq 70\n      *goto nextstat\n   #Whatever I do, I simply cannot be seen. Stealth is the most important thing in any heist.\n      You're best known for never leaving a trace of your presence at the crime scene.  \n      *set flash 30\n      *goto nextstat\n\n*label nextstat\n\nIf that means of descent becomes unfeasible, however, you're going to need a Plan B. (Not that it did you any good in the gallery; once the alarm sounded, all your plans went quite literally out the window.) What do you consider to be the next best option, considering your skills?\n\n*choice\n   *if (technique=50) #I could probably climb straight down the building with some effort. \n      You're quick, strong, and a halfway decent rock climber; you could easily make the descent, although you'd prefer a nice, soft dumpster at the bottom to catch you.\n      *set technique 60\n      *goto worststat\n   *if (intellect=50) #I'm sure I could come up with something by examining the fuse box.\n      You're well-read, you think fast, and you know your way around technology. You could probably manage to cut the power to the alarm, or, if all else fails, to the whole building.\n      *set intellect 60\n      *goto worststat\n   *if (flash=50) #I could plunge down the fire escape while thumbing my nose at the authorities.\n      Subtlety was never your strong suit and you could never pass up the thrill of escaping at the last minute.\n      *set flash 60\n      *goto worststat\n   *if (flash=50) #I could move slowly and carefully toward the fire escape, taking pains to remain unseen.\n      You're well-known for leaving minimal traces of your presence at any given crime scene; you could probably move stealthily enough to avoid being spotted from the street.\n      *set flash 40\n      *goto worststat\n   *if (jnsq=50) #I could re-enter the building and calmly walk out through the front door.\n      You have an inscrutable charm—a certain [i]je ne sais quois[/i]—and have always been able to bluff or outright lie your way out of tricky situations. \n      *set jnsq 60\n      *goto worststat\n\n*label worststat\n\nOne of those two options should work best. However, there's one method you'd rather not try—it's your weakest area.\n\n*choice\n   *if (technique=50) #I'm neither agile nor strong enough to successfully climb straight down. \n      Remember Barcelona? You'll never try a straight descent without a harness again. Your leg still twinges sometimes.\n      *set technique 30\n      *goto gender\n   *if (intellect=50) #I'm not that technologically astute and would have no idea what to do with the fuse box.\n      Remember the bomb in Istanbul? If it's got wires and you don't have the manual, you should stay far away from it. You're more of an action type than a book-smarts type.\n      *set intellect 30\n      *goto gender\n   *if (flash=50) #I shouldn't go for the fire escape in full view. If I get spotted, I'll freeze up and then I'll get caught.\n      Remember how Reg had to bail you out in Chicago? Taunting the authorities never plays out well for you; you're more of an under-the-radar type.\n      *set flash 30\n      *goto gender\n   *if (flash=50) #I couldn't try to sneak toward the fire escape. I'm too impatient to move that slowly and quietly.\n      Remember Bangalore? Sneaking around only ends with you making a crucial mistake out of impatience. You'd much rather rely on flash and a perfectly timed getaway.\n      *set flash 70\n      *goto gender\n   *if (jnsq=50) #I'm not all that great with people and wouldn't be able to bluff my way out of the building. They'd see right through me.\n      Remember Nairobi? They were onto you in days and you had to skip town. People skills aren't your thing; you're a burglar, not a con artist.\n      *set jnsq 30\n      *goto gender\n\n*label gender\n\nOf course, that's far from your whole skill set. You consider yourself to be…\n\n*choice\n   #A man of many talents.\n      You are a gentleman of distinction and a force to be reckoned with. \n      *set gender \"male\"\n      *set heir \"Alexei\"\n      *goto reg_intro\n   #A woman of many talents.\n      You are a lady of distinction and a force to be reckoned with.\n      *set gender \"female\"\n      *set heir \"Alexa\"\n      *goto reg_intro\n   #A person of many talents. \n      You are a personage of distinction and a force to be reckoned with.\n      *set gender \"unknown\"\n      *set heir \"Alexa\"\n      *goto reg_intro\n\n*label reg_intro\n\nA very British voice comes through your earpiece: Reg Claythorne, your unflappable right-hand man. \"I trust you've run into a bit of difficulty?\"\n\n\"The painting was gone already. It was a setup,\" you tell him.\n\n\"Who?\"\n \n\"Who do you think? Bouchard.\"\n \n\"That bastard.\"\n\nIn the gallery behind you, over the sound of the alarm, you hear shouting and pounding at the door. You've barricaded it but it's not going to last. \n\n\"According to the scanner, we have about a five-minute window before the police arrive,\" Reg says. \"I've got an eye on the building and can help guide you down. But you'd better move. Now.\"\n\nAs you ease your way along the ledge, you plot revenge against your rival. He's good. He's good enough that neither you nor anyone you know has ever met him in the flesh; all anyone has ever seen is his calling card. His skills of disguise are thought to be legendary. Bouchard could be a man, could be a woman, could even be a code name for a group of elite thieves (although you sincerely doubt that last one). But if you ever do meet the real Bouchard, you'll…\n\n*choice\n   #Kill him. \n      You're not known for your forgiving nature. Once someone has crossed you like Bouchard has crossed you, well…let's just say he'd better not make any long-term plans.\n      *set honor 20\n      *goto police\n   #Frame him and send him to prison.  \n      This alarm debacle is the last straw, taking this from a rivalry to an outright vendetta. As soon as you get the chance, you'll throw him to the
