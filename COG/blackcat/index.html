a is here, being led away in handcuffs. An officer hands the Black Cat to Leclerc, who holds it up to the light and smiles thinly. Oh well. If you didn't get it, at least Rania didn't, either.\n      *set notoriety %-20\n      *set rania_betray true\n      *goto confront_leclerc\n   *elseif rania_betray\n      Rania is here, being led away in handcuffs. You try to feel sorry for her but fail.\n      *goto confront_leclerc\n   *else\n      *goto confront_leclerc\n*elseif alert >70\n   Bright lights shine in your eyes. \"Hands up!\" someone shouts. Your eyes adjust to an unpleasant sight—police and palace guards surround you. Desperately you scan the perimeter and decide it could be worse; with luck, you can get to the helicopter when it arrives, or if all else fails, to the edge of the roof for a daring leap into the sea.\n\n   In front of the officers, striding toward you, is Leclerc, of course, looking as smug as you've ever seen her.\n\n   *if bouchard_dead =true\n      *goto confront_leclerc\n   *elseif has_diamond =\"Bouchard\"\n      You look around for Bouchard but he's nowhere to be found. Probably swimming in the Mediterranean right now with your prize. Drat.\n      *set bouchard_escape true\n      *set notoriety %-30\n      *goto confront_leclerc\n   *elseif has_diamond !=\"me\" \n      You look around for ${has_diamond}—nowhere to be found. Probably swimming in the Mediterranean with your prize right now. Drat.\n      *set notoriety %-20\n      *goto confront_leclerc\n   *else\n      *goto confront_leclerc\n*elseif alert >50\n   \"There they are!\" someone shouts as you run onto the roof. Running toward you are a handful of police officers and palace guards—led, of course, by Leclerc. \n\n   \"Hands where I can see them!\" she shouts. You duck behind a narrow smokestack and take stock of the situation. It could be worse. With luck, you can get to the helicopter when it arrives, or if all else fails, to the edge of the roof for a daring leap into the sea.\n o close! You can't help but laugh hollowly as they lead you away.\n      *set escape false\n      *goto epilogue\n   *else\n      So close, though! You were so close! You can't help but laugh hollowly as they lead you away.\n      *set escape false\n      *goto epilogue\n*elseif alert >50\n   Without Nora here, your only option is to leap off the edge of the roof into the Mediterranean, a risky proposition at the best of times and even more so when surrounded by the authorities. You scan the roof for openings. Perhaps over by that battlement….\n\n   Gunfire strikes the ground near your feet. You take stock of the situation. You could try to stay behind cover as you run for the edge. You could just make a break for it. Or else…you know what? It's been a long day—you could just turn yourself in and be done with it.\n   *choice\n      #Dodge. \n         *if flash \u003c40\n            You wait behind the smokestack, then dash and duck behind an air vent; gunfire rattles against the metal. With a quick roll, you're at the edge of the roof, and you fling yourself over. The air whistles in your ears as you fall. \n            *if notoriety \u003c35\n               *set escape false\n               *set dead true\n               *goto epilogue\n            *elseif (rania_betray =true) and ((leroux_betray =true) or (reg_rapport \u003c50))\n               *set escape false\n               *set dead true\n               *goto epilogue\n            *else\n               The impact jolts you but you seem to have made the fall with no broken limbs, and the water is chilly but not freezing. At least you missed the rocks surrounding the base of the tower. A splash behind you indicates that the rest of your team made it, too. \n\n               Catching your breath, you struggle toward land…and there it is. The inflatable motorboat you left here yesterday, aka the [i]S.S. Contingency Plan[/i]. You haul yourself in, breathing hard, and once everyone's on board, you motor toward the able motorboat you left here yesterday, aka the [i]S.S. Contingency Plan[/i]. You haul yourself in, breathing hard, and once everyone's on board, you motor toward the mainland. You made it! \n               *set notoriety %+40\n               *set escape true\n               *goto epilogue\n         *else\n            The impact jolts you but you seem to have made the fall with no broken limbs, and the water is chilly but not freezing. At least you missed the rocks surrounding the base of the tower. Catching your breath, you start to slowly struggle toward land…\n\n            …and someone grabs you by the back of the shirt and hauls you into a police speedboat. \n            *if has_diamond =\"me\"\n               You're too exhausted to put forth more than a perfunctory struggle as they take the Black Cat out of your bag. Handcuffed, you wait to be taken back to the mainland. So close. You were so close!\n               *set escape false\n               *goto epilogue\n            *else\n               You lie exhausted on the floor of the boat while they handcuff you and take you back to the mainland. So close. You were so close!\n               *set escape false\n               *goto epilogue \n      #Turn myself in.\n         Panicked, you scan the perimeter of the roof. There are too many of them. There's no way you can make it. If you try to hide, or try to run, you'd be putting your own life and that of your team at risk. \n\n         Sometimes, you have to know when to give up. \n\n         \"I surrender,\" you say, walking out with your hands up. \"You win, Leclerc. Just go easy on everyone else.\"\n\n         \"What?\" splutters Reg, as a police sergeant approaches him with handcuffs. \n\n         \"Smart. Very smart,\" Leclerc says. She strolls up to you, looking you in the eye. \"But a little disappointing, I must say. I was looking forward to fishing you out of the Mediterranean.\" \n         *set reg_betray true\n         *set rania_betray true\n         *set leroux_betray true\n         *set nora_betray true\n         *if has_diamond =\"me\"\n            She reaches into your bag and pulls out the Black Cat. Its glimmer is even more eldritch in the moonlight. \"Hello there,\" Leclerc says, and passes it off to a subordinate. So close. You were so close! \n            *set notoriety %-60\n            *set escape false\n            *goto epilogue\n         *else\n            You sigh, suddenly regretting your choice. So close. You were so close!\n            *set notoriety %-80\n            *set escape false\n            *goto epilogue\n*else\n   Without Nora here, your only option is to leap off the edge of the roof into the Mediterranean, a risky proposition at the best of times and even more so when surrounded by the authorities. You scan the roof for cover….\n\n   Subtlety be damned. You run pell-mell for the tower's edge. \"Stop them!\" Leclerc shouts, but it's too late; you've flung yourself over the edge. The wind whistles in your ears as you fall.\n\n   The impact jolts you but you seem to have made the fall with no broken limbs, and the water is chilly but not freezing. At least you missed the rocks surrounding the base of the tower. A big splash behind you indicates that the rest of your team made it, too. \n\n   Catching your breath, you struggle toward land…and there it is. The inflatable motorboat you left here yesterday, aka the [i]S.S. Contingency Plan[/i]. You haul yourself in, breathing hard, and once everyone's on board, you motor toward the mainland. \n   *if has_diamond =\"me\"\n\n      And finally, you remove your prize from its bag: the Black Cat. The diamond's shimmer is more eldritch than ever in the moonlight. You've done it. You've really done it. \n      *set notoriety %+40\n      *set escape true\n      *goto epilogue\n   *else\n\n      You only regret you weren't able to complete your mission and escape with the Black Cat. \n      *set escape true\n      *goto epilogue\n      \n*label reg_betray\n\n\"Can't you remember what he's done to you?\" Reg snaps. \"That diamond is yours! You don't need to play nice with this bastard! Oh, screw it. I'm out.\" \n\nReg may be big but he's also fast. He trips Bouchard as he runs past, collaring him around the throat and snatching the diamond from him. \"Urp,\" Bouchard croaks, obviously not expecting this turn of events. \n\nReg, using Bouchard as a human shield, backs away, gun drawn. \"It's well past time I branched out on my own anyway,\" he says. \n*choice\n   #Shoot Reg.\n      You draw your gun and aim. Out of consideration for his years of loyal partnership, you only shoot Reg in the leg. He falls to the ground, groaning; and Bouchard, free from his grip, snags the diamond with a little flourish. \n\n      \"Sorry, old friend,\" you say. \"You know how it is.\" Reg's face is drawn with pain and rage; you may have created an alliance with Bouchard but you've also made a new enemy. It remains to be seen if your nascent partnership with Maurice Bouchard will be worth it.\n\n      Leaving Reg behind, the rest of you head for the stairwell.\n      *set has_diamond \"Bouchard\" \n      *set reg_betray true\n      *set leroux_rapport %-20\n      *goto rania_check2\n   #Decide not to join Bouchard after all.\n      *if nick_romance =false \n         Huh. You weren't expecting this turn of events. You weigh your options: team up with your worst enemy, or stay loyal to one of your oldest friends. You're slightly ashamed you went with Bouchard in the first place, considering. \n\n         You gesture to Reg. \"Sorry, old chum. Didn't know what I was thinking. Take him down, won't you?\" With a quick headbutt from Reg, Bouchard is on the floor, unconscious. \n      \n         Reg strides back over to you. \"You had me going there for a moment,\" he says. \n \n         *set has_diamond \"me\"\n         *set join_bouchard false\n         *achieve doublecross\n         *set bouchard_escape false\n         *goto leroux_check\n      *else\n         You weren't expecting this turn of events. Reg is your oldest and most trusted colleague. And yet, you have feelings for…No. You have feelings for Nick. And Nick is an illusion.\n\n         You gesture to Reg. \"Sorry, old chum. Didn't know what I was thinking. Take him down, won't you?\" Bouchard gives you a hurt, startled look—but with a quick headbutt from Reg, he's on the floor, unconscious. \n\n         Reg strides back over to you. \"You had me going there for a moment,\" he says. \n\n         You sigh. \"Me, too,\" you reply.\n         *achieve doublecross\n         *set has_diamond \"me\"\n         *set join_bouchard false\n         *set bouchard_escape false\n         *goto leroux_check \n   #Leave it to Bouchard to handle.\n      Faster than you would have thought, Bouchard draws his own gun and calmly shoots Reg in the foot. Reg groans and drops to the ground; Bouchard snatches the diamond back with a little flourish. \n\n      \"Sorry, old friend,\" you say to Reg. \"You know how it is.\" Reg's face is drawn with pain and rage; you may have created an alliance with Bouchard but you've also made a new enemy. \n      *set has_diamond \"Bouchard\"\n      *set reg_betray true\n      *goto rania_check2\n\n*label rania_check2\n\nYou reach the stairwell. The door has a simple keypad lock. \"5568,\" Nora tells you, and you type it in, throw the door open, and run. \n\nIt's a narrow, stone stair, winding its way up to the extraction point, the windy roof of the east tower. You reach the top of the staircase. The only security measure is a simple, steel door; the tower juts out over the Mediterranean and is completely inaccessible from the outside. That is, without a helicopter. Luckily, Nora, in addition to the eccentric billionaire thing, also has a pilot's license. \n\nShe'll be meeting you in…four minutes. Better hurry. You reach for the door handle.\n*page_break\n\n*if rania_betray =true\n   *if rania_romance =true\n      Rania grabs your arm. \"I just-\" she starts but her voice catches. \"I want you to know I really do care about you. It's just…some things need to be important enough to make sacrifices for.\"\n\n      \"What are you talking about?\" you ask. \n\n      She sighs and leans into you for a brief, melancholy kiss…then opens the door and strides out onto the roof. \"Inspector, we're here,\" she says.  \n\n      Lights flare in your eyes and you find yourself confronted by a full company of the palace guard, with additional members of the local police force. In front of them is Leclerc, striding toward you. \n\n      \"Ah, Ms. Benzakour,\" Leclerc says. \"I see you've lived up to your end of the bargain.\" \n\n      You stand there, stunned. Rania turns to you, shoulders slumped. \"I told you how important it was to catch Ivankov,\" she said. \"This is the only way I could think of to do it.\" \n\n      \"By double crossing me?\" you shout. \n\n      \"We'll get amnesty,\" Rania says. She walks reluctantly over to Leclerc, who cuffs her and hands her off to one of her uniformed sidekicks. \n\n      \"You'll get amnesty,\" Leclerc corrects her. \"But as for you, ${lastname}…you're not getting off so easily.\" \n\n      \"This isn't what we agreed on!\" shouts Rania as they lead her away.  \n      *set alert %+70\n      *goto leroux_check2\n   *else\n      Rania grabs your arm. \"I just want you to know this isn't personal,\" she says, and opens the door. \n\n      Lights flare in your eyes, and you find yourself confronted by a full company of the palace guard, with additional members of the local police force. In front of them is Leclerc, striding toward you. \n\n      \"Ah, Ms. Benzakour,\" Leclerc says. \"I see you've lived up to your end of the bargain.\" \n\n      You stand there, stunned. Rania turns to you, shoulders slumped. \"I told you how important it was to catch Ivankov,\" she said. \"This is the only way I could think of to do it.\" \n\n      \"By double crossing ]S.S. Contingency Plan[/i]. You haul yourself up and glance around. \"Bouchard?\" you call out. \"Maurice?\" And then: \"Nick?\"\n\n               Nothing. And wherever he's gone, he's got the diamond. \n\n               When everyone's aboard who's coming aboard, you motor off for the mainland.\n               *set join_bouchard false\n               *set bouchard_escape true\n               *set escape false\n               *set notoriety %-50\n               *goto epilogue\n      #Turn myself in.\n         Panicked, you scan the perimeter of the roof. There are too many of them. There's no way you can make it. If you try to hide, or try to run, you'd be putting your own life and that of your team at risk. \n\n         Sometimes, you have to know when to give up. \n\n         \"I surrender,\" you say, walking out with your hands up. \"You win, Leclerc. Just go easy on everyone else.\"\n\n         Bouchard stares. \"I never would have thought…\" he says. \"Anyway, suit yourself.\" Dodging the cops, he runs for the tower's edge and manages to leap off into the sea. So much for the Black Cat. \n\n         \"Fish him out,\" Leclerc says brusquely to her goons, but you suspect they won't be able to catch up with Bouchard. \"As for you…smart move. Very smart. Much easier this way.\" \n         *set rania_betray true\n         *set leroux_betray true\n         *set notoriety %-80\n         *set escape false\n         *set bouchard_escape true\n         *set join_bouchard false\n         *goto epilogue\n*else\n   Without Nora here, your only option is to leap off the edge of the roof into the Mediterranean, a risky proposition at the best of times and even more so when surrounded by the authorities. You scan the roof for cover….\n\n   Subtlety be damned. You run pell-mell for the tower's edge. \"Stop them!\" Leclerc shouts, but it's too late; you've flung yourself over the edge, followed by Bouchard. The wind whistles in your ears as you fall.\n\n   The impact jolts you but you seem to have made the fall with no broken limbs, and the water is chilly but not freezing. At least you missed the rocks surrounding the base of the tower. A splash behind you indicates that the rest of your team made it, too. \n\n   Catching your breath, you struggle toward land…and there it is. The inflatable motorboat you left here yesterday, aka the [i]S.S. Contingency Plan[/i]. You haul yourself in, breathing hard. \n   *if (nick_rapport >65) or (nick_romance =true)\n      You pull Bouchard up after you. When everyone's aboard who's coming aboard, you motor off to the mainland. \n\n      \"How does it feel to be a legend?\" Bouchard asks. You have to admit—it feels pretty good.\n      *set escape true\n      *set notoriety %+50\n      *set bouchard_escape true\n      *set has_diamond \"me\"\n      *goto epilogue\n   *else\n      You glance around. \"Bouchard?\" you call out. \"Maurice?\" And then: \"Nick?\"\n\n      Nothing. And wherever he's gone, he's got the diamond. \n\n      When everyone's aboard who's coming aboard, you motor off for the mainland.\n      *set escape true\n      *set join_bouchard false\n      *set bouchard_escape true\n      *set notoriety %+30\n      *goto epilogue\n   \n*label epilogue\n\n*if escape =false\n   *if dead\n      *goto deathlist\t\t \n   *elseif notoriety >=70\n      *achieve notorious\n      *goto fancy_prison\n   *elseif notoriety >=45\n      *goto normal_prison\n   *else\n      *goto lousy_prison\n*else\n   *achieve escape\n   *if notoriety >=70\n      *achieve notorious\n      *goto private_resort\n   *elseif notoriety >=45\n      *goto normal_apartment\n   *else\n      *goto crap_apartment\n\t  \n*label deathlist\n*achieve die\n*if deathscene =1\n   *goto eaten_by_seals\n*elseif deathscene =2\n   *goto penguin\n*if deathscene =3\n   *goto trampled\n*if deathscene =4\n   *goto lobsters\n\n*label eaten_by_seals\n*page_break\n\nUnfortunately, you aim badly. The base of the tower is surrounded by a surprising quantity of very sharp rocks—no doubt put there in earlier times to deter escapees such as yourself. \n\nYou lie on the rocks, bruised and bloody, wondering how many bones you've broken and whether you'll be able to haul yourself to safety on the mainland, when you hear a sound that sends an icy chill down your battered spine. \n\nThe disconsolate honking of harbor seals. \n\nIt's the last sound you'll ever hear. The Curse of the Black Cat has claimed another victim. \n*goto ending\n\n*label trampled\n*page_break\nYou hit the water hard enough to break your wrist; fortunately, that's the only injury you suffer. After an agonizing swim to an outcropping of rocks, you wait for a day an a half before a passing boat picks you up. \n\nIt just so happens it's Dr. Spectacular's Magnificent Circus Barge. \"You can bunk with the elephant,\" you're told, and after a meal and a drink, you lie down in some soft but smelly straw to examine your wrist. The elephant seems nice enough company. \n\nUnfortunately, as it's been said, there's no such thing as a truly tame animal. The last thing you'll ever see is a massive grey foot, descending fast. The Curse of the Black Cat has claimed another victim.\n*goto ending\n\n*label penguin\n*page_break\nYou hit the water hard enough to break your ankle; fortunately, that's the only injury you suffer. After an agonizing swim to an outcropping of rocks, you wait for a day before a passing fishing boat picks you up. \n\nSkulking back to the mainland, you get a cheap room in town and try to lay low for a few days while you recover. Not a day goes by when you don't overhear some passersby talking about the hilarious, failed attempt on the Black Cat. Finally, to cheer yourself up, you decide to stop by a local cafe for some flan. You think you notice something odd about one bite, but you swallow anyway.\n\nWhen the authorities find you, it's too late. You've choked on a tiny, ceramic penguin that had been hidden in your dessert. The Curse of the Black Cat has claimed another victim. \n*goto ending \n\n*label lobsters\n\nYou hit the water hard enough to break your arm; fortunately, that's the only injury you suffer. After an agonizing swim to an outcropping of rocks, you wait for a day before a passing fishing boat picks you up. \n\nYou wearily head back to the mainland, then, after you recover, find your way back to Paris, where you do your best to resume your old life—under another alias, because your real name has been thoroughly ruined by your failed attempt on the Black Cat. Thinking a career change might be in order, you buy a restaurant. \n\nA year to the day since the attempted burglary, you're touring a fish market, trip, and fall into a tank full of lobsters, the claw-restraining bands of which had all coincidentally snapped at the same time. The lobsters, naturally, are very put out. You don't make it. \n\nThe Curse of the Black Cat has claimed another victim.\n*goto ending\n\n*label fancy_prison\n*page_break\n\n[i]One year later—San Anselmo Correctional Facility, San Castellano[/i]\n\nYou stroll through the yard on your last day at San Anselmo Minimum Security Prison accompanied by Toni, one of your favorite guards, who's carrying your bag. \n\n\"Leaving so soon, ${firstname}?\" one of the other inmates shouts from the tennis court as you pass. \"We're going to miss you!\" Several more wave at you from the driving range.\n\nYou have to admit, as much as incarceration cramps your style, you've certainly enjoyed being one of the more famous inmates. Your notoriety netted you one of the best criminal lawyers in the region, and through some miraculous failure of jurisprudence, you're out on parole after only a year in minimum security. Your cohorts have asked you to tell the story again and again of how you almost got away with the Black Cat. Your reputation is set for life.  \n\n\"Let's hope we don't see you again, ${lastname},\" Toni says, handing you your bag as you pass through the gate. \"But if we ever do, we'll save you some of that risotto you like.\" Say what you like about the San Castellanese, they know how to run a correctional system.\n\nYou glance around for your ride. There it is! A sleek, black stretch limo, idling in the horseshoe drive.\n\n*goto prison_bouchard_meetup\n\n*label normal_prison\n*page_break\n\n[i]Three years later—La Magdalena Prison, San Castellano[/i]\n\nYou walk through the yard on your last day at La Magdalena Prison, accompanied by one of the less unpleasant guards. A few of the inmates are playing basketball, and a particular friend gives you a little salute as you pass; another couple of your cohorts wave. You're going to miss some of these crooks. \n\nIt's been a boring stay but you've managed to liven it up a bit with tales of some of your past exploits. The story of how you almost got the Black Cat is well known—you try to leave out the parts where you messed up the plan, but everyone knows those, too. All in all, your reputation is no better or worse than it was when you went in: you're clearly a master thief, but you're far from [i]the[/i] master thief.\n\nGood thing you were just famous enough to attract one of the region's better defense attorneys, who, through some failure of jurisprudence, managed to get you out on parole after three years. Incarceration always cramps your style. \n\n\"Hope we don't see you back here any time soon,\" the guard says, handing you your bag as you pass through the gate. You hope so, too. \n\nYou glance around for your ride. There it is! A big, plain, black sedan idles in the pick-up zone.\n\n*goto prison_bouchard_meetup\n\n*label lousy_prison\n*page_break\n\n[i]Six years later—the Promontory, San Castellano[/i]\n\nYou trudge, handcuffed, through the yard on your last day at the Promontory, San Castellano's maximum-security lockup. A silent guard walks alongside you. The yard is eerily empty; inmates get an hour a day for recreation, and right now isn't it.\n\nIt's been a hard six years. You tried to find a good lawyer but the sharks who would have represented you had you been a bigger name were otherwise occupied. This is the soonest your current attorney was able to get you out on parole. Life is grim at the Promontory: bad food, bad guards, bad company. Surrounded by violent criminals of the lowest common denominator, you could hardly get anyone to listen to your stories of international intrigue; but one thing everyone knew is how gloriously you messed up the theft of the Black Cat.\n\n\"Don't come back,\" grunts the guard, unlocking your shackles and handing you your bag as you reach the gate. You won't, if you have anything to say about it. \n\nYou glance around for your ride. There it is! A beat-up taxi van, idling in the pick-up zone.\n\n*goto prison_bouchard_meetup\n \n*label prison_bouchard_meetup\n*page_break\n*if (bouchard_dead =true) and (nick_romance =true)\n   Someone else should have been here to meet you, if all had gone according to plan. But Nick McCord never existed. In your head, you tell yourself you didn't shoot your lover; you shot the man who killed him. \n\n   You tell yourself a lot of things. \n   *goto rania_prison_meetup\n*elseif (bouchard_dead = true) and (nick_romance =false)\n   *goto rania_prison_meetup\n*elseif (join_bouchard =true) and (nick_romance =true)\n   Someone steps out of the car—someone lean, dark-haired, tanned, relaxed, and delightfully familiar. \"Hey there,\" Nick—or, rather, Maurice, although it'll be hard to start calling him that—says, walking right up to you and catching you up in a warm embrace. \"Long time no see.\"\n\n   *if bouchard_escape =true\n      \"I didn't think you'd wait for me,\" you say. \n\n      \"What? I'm insulted,\" he says teasingly. \"What sort of cad do you take me for?\" You tactfully decide not to answer that.\n      *if has_diamond =\"Bouchard\"\n         \"Hey,\" he says, \"I know something that'll cheer you up.\" \n\n         He reaches into his stylish satchel and pulls out the Black Cat, shimmering jet-black in the afternoon sun. \"Thought you might want to see it,\" he says. \"I thought about cutting it up and selling it but I think I'd rather hang on to it for now. For sentimental reasons.\" \n\n         \"I like that idea,\" you say. \n         *goto rania_prison_meetup\n      *else\n         \"The only thing that'd make this moment better is if I had the Black Cat to show you,\" he says.\n\n         You shrug. \"There'll be other diamonds.\" \n         *goto rania_prison_meetup           \n   *else\n      \"I thought you were getting out after me,\" you say. \n\n      \"Your lawyer's good but mine is better,\" he says. \"In any case, it's so, so good to see you.\"\n\n      *if has_diamond =\"Bouchard\"\n         He reaches into his stylish satchel. \"Something that might cheer you up,\" he says. \n\n         He pulls out the Black Cat, shimmering jet-black in the afternoon sun. \"I thought about cutting it up and selling it but I think I'd rather hang on to it for now,\" he says. \"For sentimental reasons.\" \n\n         \"I like that idea,\" you say. \n         *goto rania_prison_meetup\n      *else\n         \"The only thing that'd make this moment better is if I had the Black Cat to show you,\" he says.\n\n         You shrug. \"There'll be other diamonds.\" \n         *goto rania_prison_meetup           \n*elseif (join_bouchard =true) and (nick_romance =false)\n   Someone steps out of the car—someone lean, dark-haired, tanned and relaxed. \"Hey,\" says Bouchard cheerfully—or Nick, or Maurice, as you suppose you're going to have to start calling him. He extends a hand. \"Good to see you, partner.\"  \n   *if bouchard_escape =true\n      \"What brings you back here?\" you say. \"You should be up to your neck in new schemes by now.\"\n\n      He shrugs. \"Who says I'm not? I just thought you might want to see a familiar face when you got out.\"\n      *if has_diamond =\"Bouchard\"\n\n         He reaches into his stylish satchel and pulls out the Black Cat, shimmering jet-black in the afternoon sun. \"Thought you might want to see this, too,\" he says. \"I thought about cutting it up and selling it but I didn't want to do anything with it before asking you. Partner.\" \n\n         You grin. This could be the beginning of a beautiful friendship. \n         *goto rania_prison_meetup\n      *else \n         *goto rania_prison_meetup           \n   *else\n      \"I thought you were getting out after me,\" you say. \n\n      \"Your lawyer's good but mine is better,\" he says with a wicked grin.\n\n      *if has_diamond =\"Bouchard\"\n         He reaches into his stylish satchel and pulls out the Black Cat, shimmering jet-black in the afternoon sun. \"Thought you might want to see this, too,\" he says. \"I thought about cutting it up and selling it but I didn't want to do anything with it before asking you. Partner.\" \n\n         You grin. This could be the beginning of a beautiful friendship. \n         *goto rania_prison_meetup\n      *else \n         *goto rania_prison_meetup\n\n*elseif (join_bouchard =false) and (nick_romance =true)\n   If things had gone the way you'd hoped, Nick would be here to meet you now—not Maurice Bouchard, that double crossing bastard, but Nick McCord, your friend and lover. You wonder where he is now. You tell yourself you don't care. \n\n   You tell yourself a lot of things.\n   *if (bouchard_escape =true) and (has_diamond =\"Bouchard\")\n\n      And the worst of it is, not only did he break your heart but he got away with the diamond, too. \n      *goto rania_prison_meetup\n   *else\n      *goto rania_prison_meetup\n*else\n   *goto rania_prison_meetup\n\n*label rania_prison_meetup\n*page_break\n*if (rania_betray =false) and (rania_romance =true)\n\n   Rania, tall and cool in a leather jacket and sunglasses like a sexy figher pilot, steps out of the car—and in moments, the two of you are in a warm embrace. \"Hey,\" she murmurs. \"Good to see you. I was getting tired of waiting.\"\n\n   \"So was I,\" you say. \"What have you been up to?\" \n\n   \"Got my pilot's license,\" she says. \"Also learned how to hotwire a plane. I'll tell you the story sometime.\"\n   *goto reg_prison_meetup\n*elseif (rania_betray =false) and (rania_romance =false)\n\n   Rania, tall and cool in a leather jacket and sunglasses, steps out of the car. \"Hey,\" she says. \"Long time no see.\" \n\n   \"You look good,\" you say. \"What have you been up to?\" \n\n   \"Got my pilot's license,\" she says. \"Also learned how to hotwire a plane. I'll tell you the story sometime.\"  \n   *goto reg_prison_meetup\n*elseif (rania_betray =true) and (rania_romance =true)\n\n   Your heart twists as you notice Rania's not here. You wish things had turned out differently—but that's the way the business goes. It may be that you'll see her again someday. You just hope it's not at the wrong end of a gun.\n   *goto reg_prison_meetup\n*else\n   *goto reg_prison_meetup\n\n*label reg_prison_meetup\n*if reg_betray =false\n\n   Reg is here, looking a little worse for wear; his arm is in a sling but he doesn't seem fazed by it at all. \"Oh, that. Nothing like a nice, bracing round of Muay Thai when you're feeling out of sorts,\" he says cheerfully. \"Good to see you. You look well enough, considering the circumstances.\" \n   *goto leroux_prison_meetup\n*else\n   *goto leroux_prison_meetup\n\n*label leroux_prison_meetup\n*if leroux_betray =false\n\n   Le Roux steps out of the car, grinning ear to ear. \"Guess what?\" he says with no preamble. \"I got it! I got the Cirque du Soleil role! Finally!\" \n\n   \"Well, then, what are you doing hanging out with a bunch of crooks?\" you say. \n\n   He shrugs. \"The job doesn't start till next month,\" he says. \n   *goto nora_prison_meetup\n*else\n   *goto nora_prison_meetup\n\n*label nora_prison_meetup\n*if nora_betray =false\n\n   To your surprise, Nora is here. \"Weren't you telling me the Black Cat job was supposed to be your last?\" you ask. \"What happened to the straight and narrow?\"\n\n   She grins. \"Guess I'm hooked again,\" she says. \"As the man said, I try to get out but it keeps pulling me back in.\" \n   *goto prison_ending\n*else\n   *goto prison_ending\n\n*label prison_ending\n*page_break\n*if (bouchard_dead =false) and (join_bouchard =true)\n\n   \"So,\" Bouchard says as you climb into the car, \"where to next?\"\n   *choice\n      #Back to town. I'm going to try going straight for once. \n         \"What?\" Bouchard says. \"No. Absolutely not. That would be a devastating loss to the criminal community. You can't mean that.\"\n\n         *goto go_straight_prison\n      *if ((rania_romance =true) and (rania_betray =true)) #The airport. I need to find Rania.\n         \"Are you sure she wants to be found?\" Bouchard says. \n\n         \"No,\" you say quietly, \"but I have to.\"\n\n         *goto find_rania_prison \n      #Back into town. Gotta start researching my next score.\n         \"Getting back on the horse,\" Bouchard says. \"That's what I like. Whatever you're up for next, I'm in. We're a team now. So where were you thinking?\"\n\n         *goto nextscore_prison\n \n*elseif rania_betray =false\n\n   \"So,\" Rania says as you climb into the car. \"Where to next?\"\n   *choice\n      #Back to town. I'm going to try going straight for once. \n         Rania laughs. Then continues laughing. After she winds down, she wipes tears of hilarity out of her eyes and says, \"I'll believe it when I see it.\" \n\n         *goto go_straight_prison\n      *if ((bouchard_dead =false) and ((join_bouchard =false) and (nick_romance =true))) #The airport. I need to track down Bouchard and find out why he betrayed me.\n         \"He doesn't deserve to see you,\" Rania says. \n\n         You sigh. \"It's more complicated than that.\"\n\n         *goto find_bouchard_romance_prison\n      *if ((bouchard_dead =false) and ((join_bouchard =false) and (nick_romance =false))) #The airport. I'll find Bouchard and get my revenge.\n         *goto find_bouchard_revenge_prison \n      #Back into town. Gotta start researching my next score.\n         \"Getting back on the horse,\" Rania says. \"Good idea. Whatever you're up for next, I'm in. Now, where were you thinking?\"\n\n         *goto nextscore_prison\n\n*elseif reg_betray =false\n\n   \"So,\" Reg says as you climb into the car. \"Where to next?\"\n   *choice\n      #Back to town. I'm going to try going straight for once. \n         \"Hmm,\" Reg says solemnly. \"That's got to be the tenth time I've heard you say that.\"\n\n         *goto go_straight_prison\n      *if ((rania_romance =true) and (rania_betray =true)) #The airport. I need to find Rania.\n         \"Are you sure she wants to be found?\" Reg says. \n\n         \"No,\" you say quietly, \"but I have to.\"\n\n         *goto find_rania_prison\n      *if ((bouchard_dead =false) and ((join_bouchard =false) and (nick_romance =true))) #The airport. I need to track down Bouchard and find out why he betrayed me.\n         \"He doesn't deserve to see you,\" Reg says. \n\n         You sigh. \"It's more complicated than that.\"\n\n         *goto find_bouchard_romance_prison\n      *if ((bouchard_dead =false) and ((join_bouchard =false) and (nick_romance =false))) #The airport. I'll find Bouchard and get my revenge.\n         *goto find_bouchard_revenge_prison \n      #Back into town. Gotta start researching my next score.\n          \"Getting back on the horse,\" Reg says. \"Good idea. Whatever you're up for next, I'm in. Now, where were you thinking?\"\n\n         *goto nextscore_prison \n\n \n*elseif leroux_betray =false\n\n   \"So,\" Le Roux says as you climb into the car. \"Where to next?\"\n   *choice\n      #Back to town. I'm going to try going straight for once. \n         \"What? You? Really?\" Le Roux says. \"I mean, I was planning to, but I'm nobody. You're…you. Really?\"\n\n         *goto go_straight_prison\n      *if ((rania_romance =true) and (rania_betray =true)) #The airport. I need to find Rania.\n         \"Are you sure she wants to be found?\" Le Roux says. \n\n         \"No,\" you say quietly, \"but I have to.\"\n\n         *goto find_rania_prison\n      *if ((bouchard_dead =false) and ((join_bouchard =false) and (nick_romance =true))) #The airport. I need to track down Bouchard and find out why he betrayed me.\n         \"He doesn't deserve to see you,\" Le Roux says. \n\n         You sigh. \"It's more complicated than that.\"\n\n         *goto find_bouchard_romance_prison\n      *if ((bouchard_dead =false) and ((join_bouchard =false) and (nick_romance =false))) #The airport. I'll find Bouchard and get my revenge.\n         *goto find_bouchard_revenge_prison \n      #Back into town. Gotta start researching my next score.\n          \"What, right now?\" Le Roux says. \"Well, you know what, if it's before I start my new job, I'll come along. Where were you thinking?\n\n         *goto nextscore_prison\n\n*elseif nora_betray =false\n   \"So,\" Nora says as you climb into the car. \"Where to next?\"\n   *choice\n      #Back to town. I'm going to try going straight for once. \n         \"You sure?\" Nora says. \"It's boring as hell.\"\n\n         *goto go_straight_prison\n      *if ((rania_romance =true) and (rania_betray =true)) #The airport. I need to find Rania.\n         \"Are you sure she wants to be found?\" Nora says. \n\n         \"No,\" you say quietly, \"but I have to.\"\n\n         *goto find_rania_prison\n      *if ((bouchard_dead =false) and ((join_bouchard =false) and (nick_romance =true))) #The airport. I need to track down Bouchard and find out why he betrayed me.\n         \"He doesn't deserve to see you,\" Nora says. \n\n         You sigh. \"It's more complicated than that.\"\n\n         *goto find_bouchard_romance_prison\n      *if ((bouchard_dead =false) and ((join_bouchard =false) and (nick_romance =false))) #The airport. I'll find Bouchard and get my revenge.\n         *goto find_bouchard_revenge_prison \n      #Back into town. Gotta start researching my next score.\n          \"Might as well,\" Nora says. \"Get on the horse and keep riding. If it's challenging enough, I might just join you. Now, where were you thinking?\"\n\n         *goto nextscore_prison\n*else\n\n   There's no one else here. Your team has dispersed, and whether they're in prison or off on their own adventures, you'll never know. The way the last job turned out, you're not sure if any of them would ever want to hear from you again.\n\n   You climb into the car. The driver turns to you. \"Where to?\" he says. \n   *choice\n      #Back to town. I'm going to try going straight for once. \n         \"That's what they all say,\" the driver says as the car pulls away.\n         *goto go_straight_prison\n      *if ((rania_romance =true) and (rania_betray =true)) #The airport. I need to find Rania.\n         *goto find_rania_prison\n      *if ((bouchard_dead =false) and ((join_bouchard =false) and (nick_romance =true))) #The airport. I need to track down Bouchard and find out why he betrayed me.\n         *goto find_bouchard_romance_prison\n      *if ((bouchard_dead =false) and ((join_bouchard =false) and (nick_romance =false))) #The airport. I'll find Bouchard and get my revenge.\n         *goto find_bouchard_revenge_prison \n      #Back into town. Gotta start researching my next score.\n         The best way to cheer up after a stay in prison, you've learned over the years, is to immediately jump into planning your next job. You know what they say about idle hands. \n\n         *goto nextscore_prison\n\n\n*label find_rania_prison\n\nYou didn't exactly leave things with Rania on a good note. What had possessed her to turn you—not just you, all of you—in to Leclerc? What had happened with her and Ludomir Ivankov to make her hate him enough to go to prison to expose him? You wish you knew. \n\nYou know she got a plea deal. You don't know where she is now. You can't make up your mind whether the sudden, visceral urge you have to find her comes from love or from a need for revenge. All you know is…\n  \n\"The airport,\" you say to the driver. \"And hurry.\" You're a competent sleuth. Wherever she is, you'll find her.\n*goto ending\n\n\n*label go_straight_prison\n\nBut you mean it. This was the last heist; it really was. Your way of life is aging you prematurely, and you wonder what it would be like to settle down and do something normal. Like, say, running a restaurant. \n\nThere's a local paper on the seat next to you. You pick it up and thumb through the news till you get to the Life & Style section, your favorite. There's a travel feature on Las Vegas. \"Divina Commedia Expands to Become Vegas's Largest Casino,\" trumpets the headline. \n\nVegas, you think. Hmmm. There could be some really big opportunities there. Culinary. Culinary opportunities. \n\nNose deep in the newspaper, you drive away. \n*goto ending\n\n*label find_bouchard_romance_prison\n\nYou know why he betrayed you. He's a professional liar, a morally bankrupt criminal. But there really was something there. Could you, in his shoes, have had the night you'd had together, then turned around and double crossed him? \n\nPerhaps. Perhaps you could have. The two of you are more alike than you want to think. \n\nYou don't know if the sudden, visceral urge you have to track him down comes from a broken heart seeking answers or from a more primal need for revenge. All you know is…\n\n\"The airport,\" you say. \"And step on it.\" You're a competent sleuth. You'll find him. Wherever he is now, you'll find him.\n*goto ending\n\n*label find_bouchard_revenge_prison\n\n[i]That bastard[/i], you think. That bastard. For years he had you fooled. All the schemes he ruined, all the humiliation, all the while smiling right in your face…\n\nIt will not go unanswered. One way or another, you'll visit every wrong you've ever suffered upon the person of Maurice Bouchard. And you'll laugh while you do it. \n\n\n\"The airport,\" you say. \"And hurry. I don't have time to waste.\" \n*goto ending\n\n*label nextscore_prison\n\nHmmm, what should be next, and where? Where the money is, of course. Monaco? Macau? Miami Beach? \n\nThere's a local newspaper on the seat next to you. You pick it up and flip to the Life & Style section, your favorite. It just so happens there's a travel spread on Las Vegas. \"Divina Commedia Expands to Become Largest Vegas Casino,\" trumpets a headline. \n\nHmmm. An attempt on a casino that big? That would be dangerous and stupid and you'd have little chance of success.\n\nJust your style. \n\n\"The airport,\" you tell the driver. \"International terminal. And step on it.\"\n*goto ending\n\n\n*label private_resort\n*page_break\n\n[i]Three months later—a Caribbean island very few people have ever heard of[/i]\n\nYou awake to a warm, tropical wind blowing through the bedroom of your luxury bungalow, gauzy, white curtains drifting in the breeze. You were out on the yacht till all hours yesterday, followed by drinks and dancing at Consuelo's villa, where you told the tale of the Black Cat heist yet again. The other phenomenally wealthy criminals who populate this hidden island just can't get enough of that story. \n\nAnyway, you've slept in longer than you intended. Stepping into your dressing gown, you wander from the bedroom, past the infinity pool, through the Japanese garden, and back inside to the kitchen for some breakfast. \n*goto nick_presence\n\n\n\n*label normal_apartment\n*page_break\n\n[i]Three months later—a decent apartment in Paris[/i]\n\nYou awake to a cool breeze through your window in a mid-price, mid-rise apartment in Paris. After the Black Cat heist, you returned to your old stomping grounds, and now you're working the old cons, scheming the old schemes. Had the job gone seamlessly, you could take your pick of the biggest jobs in town, but as is, you're still known as a master thief, just not [i]the[/i] master thief. \n\nYou were up late last night carousing with some of your old cohorts, so you've slept in later than you expected. Stepping into your dressing gown, you wander from the comfortable bedroom through the living room done in Swedish furniture to the small kitchen for some breakfast.\n\n*goto nick_presence\n\n\n*label crap_apartment\n*page_break\n\n[i]Three months later—a dingy apartment in Atlantic City[/i]\n\nYou awake to the tinny blare of your drugstore alarm clock and the smell of cigarette smoke that permeates this tiny, dingy apartment in Atlantic City. It's all you can afford right now with the small-time schemes you're able to run. Word spread quickly about the Black Cat heist debacle, and right now, not only are you locked out of the big jobs, you're lucky that anyone will work with you at all. You're reduced to scamming elderly gamblers and low-stakes domestic burglary. \n\nYou were up late last night with a bottle of cheap wine and Season 1 of \"True Detective\", so you've slept in later than you expected. Stepping into your bathrobe, you wander from the cramped bedroom, past the water-stained walls of the living room, and into the tiny kitchen for some breakfast. \n\n*goto nick_presence\n\n*label nick_presence\n\n\n*if (bouchard_dead =false) and (nick_romance =true)\n   *if join_bouchard =true\n   \n      Nick is here—or, rather, Maurice, although you can't quite get used to calling him that, and he doesn't mind if you call him Nick. \"It's who I was when I met you,\" is how he puts it. \n\n      He sees you come in and scoops you up in a warm embrace. \"Thought you'd never wake up,\" he says. Once you disentangle yourself, you notice he's trying to make pancakes. He's terrible at it but you like them, so he keeps trying. \n      *if (has_diamond =\"me\") or (has_diamond =\"Bouchard\") \n\t  \n         You have to admit, the moment is made significantly sweeter as you think of the Black Cat in its case in your trophy room. \n         *goto bouchard_enters\n      *else\n\t
