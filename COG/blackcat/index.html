<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thieves' Gambit: The Curse of the Black Cat — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "blackcat", "title": "Thieves' Gambit: The Curse of the Black Cat", "scenes": {"breakin": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n   Come back in a few minutes to play the next part of [i]Thieves’ Gambit: The Curse of the Black Cat[/i]!\n\n   Or, you can buy the game now to skip the wait.\n\n   *purchase_discount adfree 2020-04-29 $4.99 $2.99 purchased\n   *delay_break 1200\n\n*label purchased\n\n*if heir =\"Alexa\"\n   *set subject \"she\"\n   *set object \"her\"\n   *set possessive \"her\"\n   *goto set_entrycode\n*else\n   *set subject \"he\"\n   *set object \"him\"\n   *set possessive \"his\"\n   *goto set_entrycode\n\n*label set_entrycode\n*if entrycode =1\n   *set entrycode \"557\"\n   *goto open_scene\n*elseif entrycode =2\n   *set entrycode \"575\"\n   *goto open_scene\n*else\n   *set entrycode \"755\"\n   *goto open_scene\n\n*label open_scene\n[i]That night—at the palazzo[/i]\n\nYou should really be in bed—a rested thief is a successful thief—but, as usual, the night before a job, you're too keyed up to sleep. Your outfit from the party is thrown messily over a chair, and papers and equipment are strewn across the bed and floor. You've been busy…\n\n*choice\n   #Practicing my knife fighting. \n      In your opinion, whoever said \"violence is never the answer\" was asking the wrong question.\n\t  \n      *set honor %-25\n      *goto suspicion\n   #Reading up on the world's most uncrackable safes. \n      You're not exactly sure what the Duke's got the Black Cat stashed in when he's not showing it off, but you'll be prepared when you see it.\n\t  \n      *set technique %+25\n      *goto suspicion\n   #Considering my team members' strengths and planning out a fair distribution of the profits. \n      You have total confidence in your team, and you're nothing if not honorable when it comes to your obligation to them.\n\t  \n      *set honor %+25\n      *goto suspicion\n   #Reviewing \"Security System Hacking for Dummies\". \n      Nora's going to be working remotely, so she might need someone on site to take care of anything she missed. \n\t  \n      *set intellect %+25\n      *goto suspicion\n   #Perfecting details of my alias—and practicing my disguises, just in case. \n      The security system is only as strong as the people who maintain it—and you know your way around people. \n\t  \n      *set jnsq %+25\n      *goto suspicion\n   #Carefully handwriting the calling cards I'm going to leave. Everyone will know who did this job. \n      It's just good manners to leave a calling card. You wouldn't want the police arresting innocent people, now, would you?\n\t  \n      *set flash %+25\n      *goto suspicion\n   #Planning the stealthiest escape route. No one will know who did this job. \n      They'll be talking about this one for decades, and only you and your team will know who really stole the diamond. You grin just thinking about it. \n\t  \n      *set flash %-25\n      *goto suspicion\n\n*label suspicion\n*if (intellect \u003c50) or (nick_suspicious =\"none\")\n\n   Your laptop is open on the bed. You've been going through Nora's files on the Duke and the Black Cat, among other things. You feel like you already know everything there is to know but it never hurts to be overprepared.\n   *goto knock\n*elseif nick_suspicious =\"kinda\"\n\n   Your laptop is open on the bed. You've been going through Nora's files on the Duke and the Black Cat, and for some reason you've also looked up a list of Bouchard's latest scores—the latest, a set of world-famous pearls stolen from a private home in Venice—and an article with a few terse quotes from Leclerc. You've also had Nora run a search on Nick. You're still not comfortable with his bait-and-switch routine, and it never hurts to background check your allies from time to time. You're certain they've done it to you. You glance at the open tabs. \n   *choice\n      #Read the article quoting Leclerc. \n         You glance at it and then sigh. It's just the news story about the Chagall theft, the one where they spelled your name wrong. Seriously! Do news outlets not hire fact-checkers anymore?\n         *goto knock\n      #Read the article about Bouchard's Venice heist. \n         It was, by all accounts, a brilliant job. Bouchard had outdone himself disguise-wise, going in as a female member of the cleaning staff, taking the pearls, and leaving behind a handwritten note and an admonition for the homeowner to pay housekeeping a better wage. The article also ran a photo believed to be of the real Bouchard, the only photo you've ever seen to prove he's a real person. At a distance and out of focus, all you can see is a hazy hint of a profile.\n\n         Something is itching at the back of your mind and you can't quite place it. You examine the photo more closely. There's something distinctive about that build, that haircut, foggy though the photo is…. Wait. Venice. Didn't Nick say he was just in-\n\n         And it hits you like a truck doing 125 kph on the autostrada. Right under your nose. All this time, pretending to be someone you trusted, someone you considered a friend, using any information you gave him to steal your own scores out from under you. Absolutely brilliant. Despicable but brilliant.\n\n         Nick. Bouchard. [i]That bastard.[/i]\n         *achieve bouchard\n         *set knows_bouchard true\n         *goto knock\n      #Read about Nick. \n         Nick McCord is just one of his fifteen aliases. Amateur. You've got twenty-seven. You read over the list of arrest records, fake diplomas, a surprising Australian medical license, and apparently he's part owner of a hotel in Macau? Interesting. You're not sure what you were expecting to find but it pretty much jibes with what he's told you about himself.\n         *goto knock\n*else\n   Your laptop is open on the bed. You've been going through Nora's files on the Duke and the Black Cat, and, for some reason, you've also looked up a list of Bouchard's latest scores—the latest, a set of world-famous pearls stolen from a private home in Venice—and an article with a few terse quotes from Leclerc. You've also had Nora run a search on Nick. You really did not like the stunt he pulled, and it never hurts to do regular due diligence on your allies, in any case. Something is itching you and you can't quite place it.\n   *choice\n      #Read the article about Bouchard's Venice heist.\n         It was, by all accounts, a brilliant job. Bouchard had outdone himself disguise-wise, going in as a female member of the cleaning staff, taking the pearls, and leaving behind a handwritten note and an admonition for the homeowner to pay housekeeping a better wage. The article also ran a photo believed to be of the real Bouchard, the only photo you've ever seen to prove he's a real person. At a distance, well out of focus, all you can see is a hazy hint of a profile.\n\n         That itch is bothering you again. You examine the photo more closely. There's something distinctive about that build, that haircut, foggy though the photo is…. Wait. Venice. Didn't Nick say he was just in-\n\n         And it hits you like a truck doing 125 kph on the autostrada. Right under your nose. All this time, pretending to be someone you trusted, someone you considered a friend, using any information you gave him to steal your own scores out from under you. Absolutely brilliant. Despicable but brilliant.\n\n         Nick. Bouchard. [i]That bastard.[/i]\n         *achieve bouchard\n         *set knows_bouchard true\n         *goto knock\n      #Read about Nick.\n         Nick McCord is just one of his fifteen aliases. Amateur. You've got twenty-seven. You read over the list of arrest records, fake diplomas, a surprising Australian medical license, and apparently he owns a hotel in Macau? Interesting. You're not sure what you were expecting to find but it pretty much jibes with what he's told you about himself.\n\n         But that's not enough. Nora has an algorithm for these things. You call up her special search program and plug in several of Nick's aliases, and a few more facts pop up on the screen. Last known location—wait, it says Venice, not Buenos Aires. And for nationality it has \"French.\" French? Nick is from New York. \n\n         Wait. You glance at the article about Bouchard's latest score—in Venice. It's got a blurry photo attached, the one photo you've ever seen that's purported to be of the real Bouchard, just a dark figure in the distance with a hazy hint of a profile—a profile that now seems sickeningly familiar.\n\n         Right under your nose. All this time, pretending to be someone you trusted, someone you considered a good friend, using any information you gave him to steal your own scores out from under you. Absolutely brilliant. Despicable but brilliant. \n\n         Nick. Bouchard. [i]That bastard.[/i]\n         *achieve bouchard\n         *set knows_bouchard true\n         *goto knock\n      #Read the article with quotes from Leclerc.\n         With Leclerc in town, it's more important than ever to stay one step ahead of her…oh, who are you kidding, you just want to reread that article the New York Times did after you pulled off the Hong Kong job and got famous. Leclerc, for once, was more verbose than her usual, terse \"no comment\" to the press. \"Even with all the technology available to criminals these days, a thief's greatest weapon is the victim's trust,\" was one quote. \n\n         That itch is bothering the back of your mind again. Idly, you click away from the article and to the search results on Nick—hm, that's odd. It has \"last known location\" as Venice, not Buenos Aires, and claims his nationality is French, when you know very well he's from New York. Wait. Wasn't Bouchard's last job in- \n\n         Hands shaking a bit, you check the article on Bouchard's heist. Venice. Yes. And Nick said he was just there. And that photo, the only photo known to be of that particular thief, a blurry shot of a figure in the distance escaping—you know those shoulders now. \n\n         Right under your nose. All this time, pretending to be someone you trusted, someone you considered a good friend, using any information you gave him to steal your own scores out from under you. Absolutely brilliant. Despicable but brilliant. \n\n         Nick. Bouchard. [i]That bastard.[/i]\n         *achieve bouchard\n         *set knows_bouchard true\n         *goto knock\n\n*label knock\n\nSuddenly, you're startled by a sudden knock at the door. Your first instinct is to grab your gun—but you stop yourself. It's probably just Reg. The two of you have done so many jobs together over the years that you know he can't sleep the night before a heist, either. \n\nYou tighten the belt of the bathrobe you stole from the Hotel des Voitures and open the door. \n*page_break\n\n*if (rania_romance =true) or (rania_flirt =true) \n   *goto rania_door\n*elseif (nick_romance =true) or (nick_flirt =true)\n   *goto nick_door\n*else\n   *goto reg_door\n\n*label rania_door\n\nIt's Rania. Hair tousled, still in that incredible white dress from the soirée like some sort of satin-clad goddess. She leans against the door in a way that makes your heart race. \"Hi,\" you say. \n\n\"Hi,\" she replies. \"I was thinking, you know, about the curse. I want you to have this.\" \n\nShe slips something into your hands before you can stop her. You glance down: a slim, battered volume of poetry. \"Rumi,\" she says. \"It was my grandmother's. My good luck charm. I take it with me on tough jobs. This time, I think you're going to need it.\" \n\n\"You don't actually believe in the curse, do you?\" you say. \n\nShe shrugs. \"Better safe than sorry,\" she says.\n\n*if (knows_bouchard)\n   *goto tell_rania\n*else\n   *goto let_rania_in\n\n\n*label tell_rania\n\n*choice\n   #Tell her Nick is Bouchard. \n      She steps back, a little shocked. \"You're sure?\" she asks. \n\n      You gesture to the laptop on your bed. She follows you into the room, leans down, reviews the evidence. \"I'd say you've got a pretty good case,\" she says bitterly. \"That bastard! Want me to go shoot him right now? I can be back in five minutes.\" \n\n      You think it over for a moment. \"No,\" you say. \"I haven't decided what to do with him yet. We could keep it quiet and double cross him the way he double crossed me. Or—he's been useful. We could let bygones be bygones and see if we can work together for once.\"\n\n      \"What?\" snaps Rania. \"No!\"\n\n      \"Says the woman who shot me the first time she met me.\"\n\n      \"In the leg!\" She sighs. \"Alright. He doesn't know we know, so he's not going anywhere. We can decide in the morning.\"\n\n      \"And if anyone's going to shoot him,\" you add, \"it'll be me.\"\n\n      She shrugs, accepting this. Then, glancing around the room, she notices the mess—plans and gadgets strewn everywhere. \"Up too late the night before a heist? You should know better,\" she says, sauntering past you and putting something down on the table. It's a bottle of wine. You examine it. \n\n      \"Chateau St. Grimbaud. 2002! My favorite,\" you say. \n\n      \"I know,\" she says. \n\n      She stops and leans toward you, smile enigmatic, and you can tell she's waiting for you to make a move.\n      *set bouchard_revealed true\n      *goto rania_make_a_move\n   #Keep that information to myself. \n      The revelation about Nick is too fresh and raw in your mind. You don't know what to do about it yet—will you kill him? Reveal him to your team and let them have at him? Or, alternately, will you team up with him? Your friendship with Rania is proof enough that former adversaries can make good partners. Not that you wouldn't find a way to pay him back for each and every job he's stolen out from under you. \n\n      Speaking of Rania, she's still standing expectantly in front of your door.\n      *goto let_rania_in\n\n*label let_rania_in\n*choice\n   #Invite her in.\n      \"If you're already up this late, you might as well come in,\" you say. \n         \n      She saunters past you and sets something down on the table—a bottle of wine. Chateau St. Grimbald, 2002. Your favorite, and she knows it. \"And what are you doing up this late the night before a big job? You should know better,\" she says teasingly. \n\n      She stops and leans toward you, smile enigmatic, and you can tell she's waiting for you to make a move.\n      *goto rania_make_a_move\n   #Tell her I'm busy. \n      You see she's holding a bottle of wine. Chateau St. Grimbald, 2002. Your favorite, and she knows that. She fidgets; you can tell she's waiting for an invitation. \n\n      \"Thank you,\" you say earnestly. \"This means a lot. Wow, there's so much to do, so many plans to go over. In fact, I was just doing that. So busy! I should probably get some rest. You should, too.\"\n\n      Is it just you or did her shoulders sag a bit? She shrugs. \"Yeah,\" she says. \"I probably should. Good night.\" She turns and leaves. \n      *set rania_rapport %-20\n      *goto morning\n   #Shoot her down harshly. \n      \"Look,\" you say, \"thanks for the thing. But as for the rest of it—I don't know what you've gotten into your head but I'm not interested. Don't waste my time.\" \n\n      Rania recoils as if slapped. \"But I thought…\" she begins, and then her features harden. \"Guess I was wrong about you,\" she says. \"I'd better find someone else to help me drink this.\" You see she's holding a bottle of wine—Chateau St. Grimbald, 2002. Your favorite, and she knows it. She turns and storms away. \n      *set rania_rapport %-40\n      *goto morning\n   *if (rania_romance =true) #Kiss her.\n      Without a word, you pull her into your arms and kiss her. She wraps her arms around you, body warm against yours, and when you finally pull away, she laughs a little. \"I knew this was going to happen,\" she says.  \n\n      \"So did I,\" you say. \"From the moment I saw you in that hotel room in Paris. I never should have left Istanbul without telling you how I felt.\"\n\n      \"I knew,\" she said. \"I still know.\" \n\n      Her hands reach for the belt of your bathrobe, and you fall together onto the bed. \n      *goto rania_morning_after\n\n*label rania_make_a_move\n*choice\n   #Turn her down gently.\n      \"Look,\" you say. \"I respect you as a colleague and occasional adversary. Let's not make things complicated.\"\n      *if rania_rapport >60\n         \"I thought you liked things complicated,\" she says, sounding disappointed. \"But I do value our friendship. I understand.\" She gestures to the bottle of wine. \"You can at least do me the favor of helping me drink this, though.\" \n\n         The two of you end up sitting up much later than you'd intended, making plans, reminiscing about old times. You talk about the heist, Istanbul, what you'll do with the money (her answer, as you expected: guns. Lots of guns.) You discuss options for the heist and, of course, engage in careful analysis of all your colleagues, and plans for the briefing tomorrow. Finally, she heads to her room and you head to your bed, grateful to have her on your side.\n         *goto morning              \n      *else\n         \"I thought you liked things complicated,\" she says. She sounds nonchalant but you can tell she's hurt—at least her ego is, in any case. She picks up the bottle of wine. \"I guess I'll have to find someone else to help me drink this. I wonder if Reg is up.\" \n\n         You raise an eyebrow but say nothing as she turns and leaves. \n         *goto morning\n   #Turn her down harshly.\n      \"Look,\" you say, \"I don't know what you've gotten into your head but I'm not interested. Don't waste my time.\" \n\n      Rania recoils as if slapped. \"But I thought…\" she begins, and then her features harden. \"I get it. Not that you needed to be such an ass about it.\" She angrily grabs the bottle off the table. \"I thought better of you. Guess I was wrong.\" She storms out. \n      *set rania_rapport %-40\n      *goto morning\n   #Kiss her. \n      Without a word, you pull her into your arms and kiss her. She wraps her arms around you, body warm against yours, and when you finally pull away, she laughs a little. \"I knew this was going to happen,\" she says. \"I knew from the moment I saw you in that hotel room in Paris.\" \n\n      \"Did you?\" you ask. \n\n      \"I should have told you how I felt in Istanbul.\" \n\n      \"Well,\" you say, stroking her hair. \"We've got some time to catch up on that now.\"\n\n      Her hands reach for the belt of your bathrobe, and you fall together onto the bed. \n      *goto rania_morning_after\n\n*label rania_morning_after\n*page_break\n\nMorning, the day of the heist. You wake up in the vast, antique four-poster bed, the place next to you still warm. You sit up and see Rania wearing your bathrobe, sitting at the breakfast table, and reviewing a set of blueprints. \n\nSeeing you awake, she smiles warmly. \"Good morning, you. You look fantastic. Ready to take on the Duke's palace?\"\n\n*choice\n   #\"Look. Let's not pretend last night was more than it was.\" \n      Rania pauses a second—composing herself?—and then raises a cool eyebrow. \"Of course,\" she says. \"Just some fun before the big event. Say no more about it.\" If she has any emotions at all about the issue, she doesn't show them. Rania's always been a professional first.\n\n      Half an hour later, both of you are briskly showered, dressed, and heading down to the dining room to do the pre-heist briefing—leaving separately, of course. You don't want anyone knowing what you got up to last night.\n      *set rania_rapport %-10\n      *set rania_romance false\n      *goto morning\n   #\"I'm ready for anything if you're with me.\" \n      \"Don't get all sappy on me,\" she says, but she comes over to you, leans down, and kisses you thoroughly till both of you are a little breathless. \n\n      \"So no running away after this job,\" you say. \"I promise. I'm done with that.\" \n\n      She laughs. Wow, you love to see hear her laugh. \"I'm fine with running,\" she says, \"so long as we're doing it in the same direction.\" She kisses you again and you lose track of time for a moment.\n\n      After a leisurely shower and cup of coffee, you and Rania head down to the pre-heist briefing holding hands. As you descend the staircase to the ground floor, Reg passes by. You pull apart quickly but it's too late; he knows. \n\n      He breaks into a wide grin. \"It's about time,\" he says. Ah well, what does it matter who knows? You tuck her arm into yours and continue to the briefing. \n      *set rania_rapport %+50\n      *achieve raniaromance\n      *set rania_romance true\n      *goto morning\n\n*label nick_door\n\nIt's Nick. Still in his tux from the party, bow tie undone and the collar of his shirt loosened tantalizingly. He looks rumpled, cocky, and every bit the scoundrel that he is—and, you have to admit, right now he also looks like sex on legs. He leans casually against the door. \n\n\"Hi,\" he says. \"I was thinking, you know, about the curse. I want you to have this.\" \n\nHe slips something into your hands before you can stop him. You glance down: a small medal with a haloed figure stamped on it. \"St. Jude, patron saint of lost causes,\" Nick says. \"It was my grandmother's. I take it with me on tough jobs. This time, I think you're going to need it.\"\n*set nick_flirt true\n*if knows_bouchard =true\n   *set bouchard_dead false\n   *goto confrontation_1\n*else\n   *set bouchard_dead false\n   *goto let_nick_in\n\n*label confrontation_1\nYour heart is pounding—anxiety? Rage? You're not sure, but right in front of you is your worst enemy in the guise of one of your closest friends. Someone you've come to rely on. Someone who's been there for you—and stabbed you in the back more times than you can count. \n\nAnd you know that suave-yet-hopeful look on his face. Clearly, he thinks he can get somewhere with you tonight. \n\n*choice\n   #Shoot him.\n      You draw your gun. \"I know who you are,\" you say. \n\n      He backs up against the wall. \"Hey, wait—what—no, think about this, it's not what it looks like-\" His accent slides from Brooklyn to Parisian French as he babbles and that's what does it. \n\n      \"You bastard!\" you yell, and pull the trigger. \n\n      The first bullet hits him in the throat, the second in the chest. He topples backward. Conflicting emotions are fighting in your gut as you look down at the body of your legendary rival, bleeding out onto the thick Persian carpet. He'd been your friend. He could have been…more than that. Too late now.\n\n      Footsteps pound down the hall. Reg rounds the corner and stops short, startled at the body on the floor. \"What…?\" he begins. \n\n      \"Bouchard,\" you say. \"All this time.\" \n\n      \"That bastard,\" Reg says with feeling.\n      *if nick_romance =false\n\n         You both stand silently, looking down at the body for a moment. It won't do to get overemotional at a time like this. \"How about I give you a hand getting rid of this thing and then we both get very drunk?\" Reg says.  \n\n         \"Sounds like a plan,\" you sigh. Reg lifts the body up by the arms and starts dragging.\n         *set honor %-50\n         *set nickname \"Bouchard\"\n         *set bouchard_dead true\n         *goto morning\n      *else\n         You both stand silently looking down at the body for a moment. \"I'm sorry,\" Reg says. \n\n         You sigh. \"Occupational hazard,\" you say bitterly. \"Fall for someone, they turn out to be your worst enemy in disguise. I'll bet this doesn't happen to bankers.\" \n\n         \"You never know,\" Reg says. \"Finance is a cutthroat profession. Do you want me to take care of this for you?\" \n\n         You're fighting back the anger and sadness. It won't do to get overemotional at a time like this. \"Yes,\" you say finally. \"Please.\"  Reg, nodding, lifts the body up and starts dragging.\n         *set honor %-50\n         *set nickname \"Bouchard\"\n         *set bouchard_dead true\n         *goto morning \n   #Confront him. \n      Before he can say anything else, you cut him off. \"Nice try,\" you say coldly. \"Another attempt to get me to trust you. Well, it's too late for that, Nick. Or should I say…Maurice.\"\n\n      He tenses up for just a moment, then laughs, blowing you off. \"I don't know what you're talking about,\" he says.\n      *if nick_romance =true\n\n         \"Don't you?\" you demand. \"The Chagall, and all those others. Teaming up with me when it suited you, stealing my intel when it didn't. And Venice.\" Your voice is shaking. You can't help it. \"I can understand hiding your identity. I can understand stealing my scores. Nature of the business. But pretending to care about me…that's taking it too far. Even I wouldn't stoop so low.\" \n\n         \"Wouldn't you?\" Nick—Bouchard—fires back. His stance has changed: no longer a casual, American slouch, he's composed, poised. His voice slides from the accents of Brooklyn to Parisian French. \"Wouldn't you do what it takes for fame and fortune? I thought that's why you took up this line of work. Same as me.\" \n\n         He steps closer to you, voice pleading. \"But I need to tell you something, ${firstname}. I was going to reveal myself to you. I'm not just pretending to care about you. I may be a liar but my feelings for you are real. Look me in the eye and tell me you don't feel it, too.\"\n         *set nickname \"Bouchard\"\n         *goto confront_choice\n      *else\n\n         \"Don't you?\" you demand. \"The Chagall, and all those others. Teaming up with me when it suited you, stealing my intel when it didn't. And pretending to be interested in me. The rest I can understand—nature of the business—but that last one's just tacky.\" \n\n         \"Well, it almost worked,\" Nick—Bouchard—says. His stance has changed: no longer a casual, American slouch, he's composed, poised. His voice slides from the accents of Brooklyn to Parisian French. \"And you'd do it too, admit it. You're just like me. You'll do whatever it takes for fame and fortune.\" \n\n         He steps closer to you. \"I'll be honest. I was going to reveal myself to you soon anyway. I'm not faking my interest in you, ${firstname}. It's become obvious to me that we make a much better team than we do enemies. Look me in the eye and tell me you don't agree.\"\n         *set nickname \"Bouchard\"\n         *goto confront_choice\n   #Don't let on that I know.\n      The charade has gone on this long. Why spoil it for him? He's obviously here because he needs your help to steal the diamond, and he intends to double cross you once you've successfully stolen it—something you can head off, now that you know. And, you have to admit, you need his help, too. You need to keep the upper hand here. Besides, you haven't yet figured out what you're going to do with the information. Might as well proceed according to plan for now.\n      *set bouchard_dead false\n      *goto let_nick_in\n\n      \n\n*label confront_choice\n*choice\n   #\"I don't. You disgust me.\" \n      He sighs. \"I suppose I've earned that,\" he says. \"I'd say the same to you, if I was in your position. But let's face it, you need me. Not only am I a valuable distraction for the Duke during the break-in, I'm also the best safecracker there is.\" \n\n      He has a point. Angry as you are, you can't kick him off the team. He'd just tip off the authorities. \"Fine,\" you growl. There's nothing stopping you from shooting him when this is all over, anyway.\n\n      \"Now,\" Bouchard says briskly, \"there's the little matter of the rest of the team. There's no reason they need to know this trivial bit of information. In fact, there's no reason they need to be involved at all, once we have the diamond. What do you say?\"\n      *set nick_romance false\n      *set nick_rapport %-20\n      *goto team_tell_choice\n   #\"Alright, I admit we've been working well as colleagues. But romantically…not a chance.\"\n      He sighs. \"It was worth a shot,\" he says. \"Ah well. At least we can finally be partners instead of adversaries. No more one-upping. ${firstname} and Bouchard, working together from here on out. There's nothing we can't steal.\"\n\n      \"You have a point,\" you say. \"I do have to say, though, if you try to pull one over on me again, I'll kill you.\" \n\n      \"Likewise,\" Bouchard says cheerfully. \"Now, with that out of the way, there's the little matter of the rest of the team. There's no reason they need to know this trivial bit of information. In fact, there's no reason they need to be involved at all, once we have the diamond. What do you say?\"\n      *set nick_romance false\n      *goto team_tell_choice\n   #Kiss him. \n      Without a word, you grab him by the collar, pull him close and kiss him, hard. He wraps his arms around you and returns the favor. You're locked in a tight embrace for a long moment—and then he pulls away and laughs. \n\n      \"I take it you're not angry,\" he says. \n\n      \"I'm furious,\" you say. \"But you're right. Nick—Maurice—whoever you are, we have something.\" You lean into him. \"I'll just have to find a way to revenge myself upon you.\" \n\n      He raises an eyebrow. \"Will you now?\" \n\n      His hands reach for the belt of your robe, and you fall together onto the bed.\n      *set nick_flirt true\n      *goto bouchard_romance\n\n*label bouchard_romance\n*page_break\n\nMorning, the day of the heist. You wake up in the vast, antique four-poster bed, the place next to you still warm. You sit up and see Bouchard wearing your bathrobe, sitting at the breakfast table, and reviewing a set of blueprints. \n\nSeeing you awake, he grins. \"Good morning, you. You look fantastic. Ready to take on the Duke's palace?\"\n*choice\n   #\"Save it. Just because we have chemistry doesn't mean I have to like you.\"\n      \"Ah,\" Bouchard says dryly. \"That old story. Foes with benefits.\"\n\n      \"If that's what you want to call it,\" you say. \"We've had our fun. Now, down to business.\"\n\n      \"Indeed,\" he says smoothly. If he's hurt, he doesn't show it. \"Now, before we go join the rest of the team, we need to discuss whether they need to know this trivial bit of information about me. In fact, there's no reason they need to be involved at all, once we have the diamond. What do you say?\"\n      *set nick_romance false\n      *set nick_rapport %-10\n      *goto romance_tell_choice\n   #\"Look, I like you, but I don't trust you. Let's keep things light.\"\n      \"Understood,\" Bouchard says smoothly. If his feelings are deeper than that, he doesn't let on. \"I don't trust me, either. Casual it is. Now, before we go join the rest of the team, we need to discuss whether they need to know this trivial bit of information about me. In fact, there's no reason they need to be involved at all, once we have the diamond. What do you say?\"\n      *set nick_romance false\n      *goto romance_tell_choice\n   #\"I'm ready to do anything so long as it's with you.\" \n      He laughs, pulling you down for a long, satisfying kiss. \"So you've forgiven me. Good.\"\n\n      \"I never said that,\" you protest. \"I'm just saying…we make a good team.\"\n\n      \"We do,\" your former enemy says. \"I see a long, happy, and lucrative partnership in our future. Now, before we go join the rest of the team, we need to discuss whether they need to know this trivial bit of information about me. In fact, there's no reason they need to be involved at all, once we have the diamond. What do you say?\"\n      *achieve bouchardromance\n      *set nick_romance true\n      *goto romance_tell_choice\n\n*label romance_tell_choice\n*choice\n   #\"They're my team! They deserve to know who they're dealing with. And you're crazy if you think I'd double cross them.\"\n      \"I thought so,\" sighs Bouchard. \"Ah well. Just promise me you won't let Rania shoot me.\"\n\n      You shrug. \"I'll do what I can but no promises.\"\n\n      *set honor %+20\n      *set bouchard_revealed true\n      *if nick_romance =false\n         Half an hour later, both of you are briskly showered, dressed, and heading down to the dining room to do the pre-heist briefing—leaving separately, of course. You don't want anyone knowing what you got up to last night.\n         *goto morning\n      *else\n         After a leisurely shower and cup of coffee, you and Bouchard head down to the pre-heist briefing—and you'll be honest, you don't mind if everyone sees you together.\n         *goto morning\n   #\"I won't tell them but I won't double cross them, either.\"\n      \"Ah well,\" Bouchard sighs. \"It was worth a shot. I'm glad you're going to keep my secret, though. I'd rather not have Rania shoot me.\"\n\n      *set bouchard_collude true\n      *if nick_romance =false\n         Half an hour later, both of you are briskly showered, dressed, and heading down to the dining room to do the pre-heist briefing—leaving separately, of course. You don't want anyone knowing what you got up to last night.\n         *goto morning\n      *else\n         After a leisurely shower and cup of coffee, you and Bouchard head down to the pre-heist briefing—and you'll be honest, you don't mind if everyone sees you together.\n         *goto morning\n   #\"Hmmm…you have a point.\" \n      You like your team. You really do. But, as Bouchard has just pointed out, whatever proceeds you get from the heist will go a lot farther spread two ways instead of six. Besides, if they were in your position, they'd likely do the same thing. \n\n      \"Agreed,\" you say. \"We take the diamond when this is all done. Just the two of us.\"\n\n      *set honor %-30\n      *set bouchard_collude true\n      *if nick_romance =false\n         Half an hour later, both of you are briskly showered, dressed, and heading down to the dining room to do the pre-heist briefing—leaving separately, of course. You don't want anyone knowing what you got up to last night.\n         *goto morning\n      *else\n         After a leisurely shower and cup of coffee, you and Bouchard head down to the pre-heist briefing—and you'll be honest, you don't mind if everyone sees you together.\n         *goto morning        \n\n*label team_tell_choice\n*choice\n   #Lie and say I won't tell the team. \n      \"Double cross my team after the heist of the decade?\" you ask. \"That's low. Even for you. But you're right, they don't need to know who you really are.\"  \n      \n      \"Then that's settled,\" he says. \"Now let's get some rest. We're going to need our energy tomorrow. Good night…partner.\" \n\n      As he saunters away, you're already planning how you're going to let the rest of the team know. They don't deserve to be kept in the dark. \n      *set honor %+10\n      *set bouchard_collude true\n      *goto morning\n   #I won't tell. But I'll lie and say I'll double cross the team. \n      \"You have a point,\" you lie. \"They're useful now but after all this is done, they're dead weight. I'll keep your identity quiet and we can split the proceeds when this is all done…but after that, all bets are off.\"\n\n      \"Fair enough,\" Bouchard says. \"You know, you're almost as immoral as I am. That's why I like you. Good night…partner.\" \n\n      As he saunters away, you consider your options. The team doesn't need to know—it'll just throw things off, and you need this heist to work seamlessly. However, you'll be damned if you double cross them in favor of Bouchard. He'll get a little surprise at the end, that's for sure.\n      *set bouchard_collude true\n      *goto morning\n   #Hmmm…he's right. We're the best jewel thieves in the world. Everyone else is dead weight.\n      \"You have a point,\" you say. \"We need them for now, but at the end of this, all bets are off.\" \n\n      \"Nice,\" Bouchard says approvingly. \"You're almost as cutthroat as I am. That's one of the things I like about you. I'd discuss particulars now but I suspect it'll be easier to play it by ear. Besides, we need our sleep. It's a busy day tomorrow. Good night…partner.\" He saunters off.\n      *set bouchard_collude true\n      *set honor %-30\n      *goto morning\n\n\n*label let_nick_in\n\n*choice\n   #Invite him in.\n      \"Thanks,\" you say. \"If you're already up this late, you might as well come in.\" \n\t  \n      He saunters past you and sets something down on the table—a bottle of wine. Chateau St. Grimbald, 2002. Your favorite, and he knows it. \"And what are you doing up this late the night before a big job? You should know better,\" he says.\n\n      He stops mere inches from you, leaning in a bit with a sexy, little smirk, and you can tell he's waiting for you to make a move.\n      *choice\n         #Turn him down gently.\n            \"Look,\" you say. \"I respect you as a colleague and occasional adversary. Let's not make things complicated.\"\n            *set nick_romance false\n            *if nick_rapport >60\n               \"I thought you liked things complicated,\" he says. \"But I get it. Night before a heist, can't have stuff getting weird.\" He gestures to the bottle of wine. \"You can at least do me the favor of helping me drink this, though.\" \n               *if knows_bouchard =false\n\n                  The two of you end up sitting up much later than you'd intended, making plans, reminiscing about old times. Finally, he heads off to his room, and as he leaves, you think about how glad you are that he showed up - and that he's on your side. \n                  *goto morning \n               *else\n               \n                 The two of you end up sitting up discussing the heist and reminiscing about old times. As he laughs about old scores, you seethe silently, thinking of all the priz ope,\" Reg says. Your glasses clink and you drink.\n      *goto clink\n\n*label clink\n\nThe two of you spend the rest of the night going over plans and reminiscing about old scores, not to mention discussing what's going to go down at the briefing tomorrow. When Reg finally leaves to get some rest, you think about how glad you are that he's on your side. \n*set reg_rapport %+20\n*goto morning\n\n*label morning\n\n*page_break\n[i]Noon, the day of the heist—at the palazzo[/i]\n\n*if knows_bouchard =false\n   *goto normal_briefing\n*elseif bouchard_dead =true\n   *goto dead_briefing\n*elseif bouchard_revealed =true\n   Nearly everyone is seated in the palazzo's entertainment room, Nora's laptop hooked up to the big screen TV, which shows a layout of the second and third floors of the palace's east wing. You glance around. Reg and Rania aren't here yet. Nick—Bouchard—on the other hand, looks relaxed in expensive sunglasses and a sportcoat, sprawled in a white, leather armchair. Obviously, he doesn't know you know. \n   *if nick_flirt =false   \n      You're mulling over what to do about this when Reg and Rania enter together. Rania has that sharp grin on her face that she gets right before she's about to do a lot of damage; Reg just looks solemn. Together they glance at you. The message is clear: [i]if you don't tell, we will.[/i]\n\n      You sigh. There's no way out of it.\n      *set bouchard_revealed true\n      *goto hostile_reveal\n   *else\n      Everyone is seated in the palazzo's entertainment room, Nora's laptop hooked up to the big screen TV, which shows a layout of the second and third floors of the palace's east wing. \n\n      You and Bouchard lock eyes, and for a moment you think twice about revealing him—then you shrug. \"Do you want to do it or should I?\" you say. \n\n      \"It'll sound better coming from you,\" he sighs. Everyone else is exchanging confused glances. You stand up.\n      *goto friendly_reveal\n*elseif (nick_flirt =false) and (bouchar \"And, unfortunately, the rug, too. Nobody could get those stains out after that. A shame.\"\n\nLe Roux opens his mouth, then closes it again. He'd been fairly close to Nick, you recall. Nora looks a little sick. Reg is stoic as always, though, and Rania seems relieved that he's gone. \"That bastard,\" she says. \"He deserved it.\"\n\nYour mind flashes back to the astonished look on your former friend's face as you shot him—and then you shake it off. \"Let's just get on with it,\" you say. \n*page_break\n*goto briefing\n         \n\n*label hostile_reveal\n\nYou stand. \"Everyone,\" you say, clapping your hands. \"I have an announcement. We have a very special guest among us today. Someone of high reputation, marked skill-\" you glance at Nick out of the corner of your eye, he's gone very still but you can't see his expression behind the sunglasses \"-and definitely someone you could say…I owe a lot to. Ladies and gentlemen: Maurice Bouchard.\"\n*page_break\n\nNick is out of his seat in seconds, sprinting for the door. Reg steps in front of it, arms crossed, immovable. Rania grabs his arms and shoves him toward you. Nora and Le Roux are watching, astonished. \n\nYou walk up to him, regarding him from inches away. \"You [i]bastard[/i],\" you say, and spit in his face.\n*page_break \n\n*if (bouchard_collude =true) \n   He stands there stunned, and then, pulling one of his arms out of Rania's vice grip, wipes his face with the back of his hand. He's laughing. \"I deserved that,\" he says. The flat vowels and hard consonants of his American accent have been instantly replaced with the notes of Parisian French. \"But then again, you're no paragon of honor, either. You said you weren't going to expose me.\" \n\n   \"Well, I lied,\" you say. \"A lot of that going around lately.\" \n\n   \"How long have you known?\" Reg says. No one looks pleased at this turn of events, but Reg least of all.\n\n   \"Since last night,\" you say. \"Courtesy of Nora's brilliant, little search engine. My greatest rival, right under my nose. I don't know why it took me so long to see it.\"\n   *goto hostile_reveal_choice\n*else\n   He stands there stunned, and then, pulling one of his arms out of Rania's vice grip, wipes his face with the back of his hand. He's laughing. \"I deserved that,\" he says. The flat vowels and hard consonants of his American accent have been instantly replaced with the notes of Parisian French. \"And I must say it's been a long time coming. It certainly took you long enough to figure me out.\"\n\n   \"All these years…pretending to be my friend. Why? Why would you do that to me?\"\n\n   \"Business,\" Bouchard says. \"Always business. You were an easy enough mark to pump for information on your upcoming jobs. I joined in when it suited me, and when it didn't…I took care of it myself. It wasn't personal.\"\n   *goto hostile_reveal_choice\n\n*label hostile_reveal_choice\n\nRania grabs him again. It's up to you to decide what to do with him now. \n*choice\n   #Kill him.\n      \"Stand back, Rania,\" you say. She lets go, obligingly steps out of the way. You draw your gun…. \n\n      \"No!\" shouts Bouchard. \"I'm on your side now! I can help-\"\n\n      The first bullet hits him in the throat, the second in the chest. He falls over backward. You look down at your now ex-rival as he bleeds out onto the rare Persian rug. \n\n      \"Nothing personal,\" you echo. \n      *set bouchard_dead true\n      *set leroux_betray true\n      *set honor %-50\n      *goto shot_bouchard\n   #Probably a good idea to keep him scared.\n      You draw your gun and set it to his temple. \"I should kill you right now,\" you say. \n\n      \"But you won't,\" Bouchard says. \"You need me. I know you do. There's a reason I came here to team up with my longtime rival, and that's because the Black Cat is not going to be stolen by anyone less than the two greatest jewel thieves in the world. Working together.\"\n\n      You glance around the room at the rest of the team. Are they buying this bullshit? \"Everyone, what do you think?\"\n\n      Rania grins as Bouchard struggles against her grip. \"I say we keep taking advantage of him for now. He's not so big. I can take him if I have to.\" \n\n      Underneath Reg's stiff-upper-lip exterior, you can tell he's angry. \"I'd rather not,\" he says. \"Who knows if he'll double cross us at the end?\"\n\n      Nora just seems amused. \"Not my call, but go ahead if you want,\" she says. \"I've worked with worse.\" \n\n      And Le Roux? He's beaming. \"Wow! Working with ${lastname} and Bouchard at the same time!\" he exclaims. \"Wow! This is amazing!\" He turns to Bouchard. \"Maurice—can I call you Maurice?—I've always been a big fan of your work.\"\n\n      You sigh and rub your temples. \"Fine,\" you say. Rania lets go, and Bouchard staggers back to the white armchair and sits down. \"You're right, we need you. For now. But if you think you can double cross us again and escape—you'll have to go through all of us first. And when this is over, I never want to see you again.\"\n\n      \"Duly noted,\" Bouchard mutters.\n      *set nickname \"Bouchard\"\n      *page_break\n      *goto briefing\n   #Ah, why not? Enemies, friends, it's all the same in this business. \n      You sigh. \"Let him go, Rania.\" \n\n      Surprised, she lets go. Bouchard staggers his way back to the armchair and sits down, grinning, only slightly more disheveled than he was. \"See, you need me,\" he says. \"The Black Cat can only be stolen by the two greatest jewel thieves in the world. Working together.\"\n\n      You glance around at your team. \"Everyone, what do you think?\" \n\n      \"I won't work with him,\" Reg says flatly. Underneath his stiff-upper-lip demeanor, you can tell he's enraged. \"How will we know he won't double cross us at the end?\" \n\n      \"How will we know any of us won't double cross each other at the end?\" Nora says. \"We're crooks. It's what we do.\" She regards Bouchard shrewd t sometimes it's best for business to let bygones be bygones. Right, Rania?\" \n\nShe sighs. \"You have a point. But if he double crosses us, can I shoot him?\" \n\n\"Be my guest,\" you say. Reg shrugs—he doesn't look pleased but he seems to have accepted it for now. \"Now, let's get on with things.\" \n*set bouchard_revealed true\n*page_break\n*goto briefing\n\n*label shot_bouchard\n\nTo Le Roux's horror, Rania and Reg drag the body (and the rug) off to the garage. You'll drive it over and toss it off the cliffs into the sea as soon as you get a chance—an appropriately anonymous burial for a man with no real identity. Right now, though, as everyone re-gathers, you realize the loss of your con man might cause more problems than Bouchard's death solved. No matter. Let's get on with it. \n*page_break\n*goto briefing\n\n*label normal_briefing\n\nYou're all seated in the palazzo's entertainment room, Nora's laptop hooked up to the big screen TV, which shows a layout of the second and third floors of the palace's east wing. You glance around; everyone seems eager and ready to go.\n*goto briefing\n\n*label briefing\n\n\"Alright,\" you say. \"Today's the day. Let's go over this one last time.\n\n\"We'll be going in just after dark, right when the guard shift changes. Nora's going to be in the van just outside the perimeter, handling things remotely. Let's go over how the rest of us will be approaching the palace.\"\n\nNora's laser pointer highlights the back entry of the palace. \"Reg will be going in disguised as a member of the cleanup crew,\" you say.\n\nReg nods. \"The cleanup's going to take a few days, and there will be people going in and out of the palace at all hours,\" he says. \"And once I'm in, I head for the third floor security office, right?\" \n\n\"That's right,\" Nora says. \"The Duke's security systems aren't networked on the Internet or even with each other. Last night, I was able to set up an ultrasonic relay to hack into the palace's external sensors and alarms, but I'll need Reg to set up another one for the internal alarms. Once I have control of those, we're halfway there.\"\n*page_break\n*if bouchard_dead =true\n   Now Nora points at the front gate of the palace. \"Nick had a dinner invite. He was going to be going in the front playing Senor Quiroga to distract the royal family. Now that role has to go to you, ${firstname}. Think you're up for it?\" \n\n   You grin. \"Not a problem. ${alias_firstname} ${alias_lastname} will simply tell the Duke that Senor Quiroga isn't feeling well and couldn't make it. I can handle the lack of backup.\"\n\n   \"Let's hope,\" Nora says. \"You'll need to get biometric data from at least one member of the family. From the security files I accessed last night, it looks like only the Duke or a member of his family can get into the final trophy room. I think I can fool the system anyway but that would make it a lot easier.\"\n   *goto garden_wall\n*else\n   Now Nora points at the front gate of the palace. \"${nickname} will be playing the part of Senor Quiroga, distracting the royal family,\" you say.\n\n   \"I took the liberty of getting myself invited to the palace for dinner,\" ${nickname} says. \"I'll make sure to keep the family occupied and away from the east wing while the rest of you get things set up.\" \n\n   \"And get biometric data from at least one member of the family,\" Nora says. \"From the security files I accessed last night, it looks like only the Duke or a member of his family can get into the final trophy room. I think I can fool the system anyway but that would make it a lot easier.\" \n   *goto garden_wall\n\n*label garden_wall\n*page_break\n\nFinally, Nora points at the garden wall outside the East Tower, where the diamond itself is kept on the top floor. \"Rania and Le Roux will be climbing the wall of the East Tower and breaking into the Duke's private chambers,\" you say.\n\n\"We'll have to be careful,\" Rania says. \"Nora's going to be able to turn off the external alarms, but only one at a time. We'll have to time every move just right.\" \n\n\"And make sure no one spots us from the ground,\" Le Roux says. \"Then we cut through the window, and voila! We're in the trophy room next to the one where the Black Cat's kept. Once Reg and Nora take out the internal alarms, we're ready for the next step.\" \n\n\"After that,\" you say, \"it's on to phase 2.\"\n*page_break\n\n\"What's Phase 2?\" Rania asks. \n\n\"We play it by ear,\" you say. \"The whole trophy room area is a blind spot right now. Once Reg sets up access, Nora will be able to see the security layout of those rooms, but we have to be prepared for anything.\" \n\n\"Cameras everywhere. Heat, motion, and pressure sensors. Laser tripwires,\" Le Roux says. \n\n*if spotted =true\n   \"Guards,\" Rania says. \"A lot of guards. Since we were spotted last night, they're likely to have increased security. We're going to have to be stealthy. If we get too cocky, we could bring this whole thing down on us.\"\n   *goto harbor_seals\n*else\n   \"Guards, guards, and more guards,\" Rania says. \n   *goto harbor_seals\n\n*label harbor_seals   \n\n\"And don't forget the harbor seals,\" Reg says. Everyone turns to stare at him, and he shrugs. \"Hey, I wouldn't put it past the Duke.\" \n\n\"And then there's the safe where the Black Cat is kept,\" you say. \"Once we crack that, we get our hands on the diamond and run. Maybe take a few extra trinkets with us as well. You know, for posterity. Then we head to the roof, Nora picks us up in the helicopter, and there we are—legends in our own time. Any questions?\" \n\n*if bouchard_dead =false\n   \"Just one,\" ${nickname} says. He's leaning back in his seat, as relaxed and confident as if he'd been in on this thing since the beginning. \"Who are you going with again?\"\n   *choice \n      #\"I'll be going with you.\" \n         ${nickname} grins. \"Great!\" he says. \"I'd better let the Duke know I'll have a plus one for dinner.\"\n ide of the palace, leading to the kitchens and from there to the laundry, physical plant, and servants' quarters. There's a metal detector and a guard there, and two irritated-looking maids are shuffling their way through as you approach. \n\n\"ID,\" the guard says, and you and Reg show him your fake San Castellan drivers' licenses and temporary palace IDs as Reg cheerfully puts the toolbox on the X-ray conveyor belt. \n\n\"Busy day,\" you say cheerfully. \n\n*if (spotted =true)\n   The guard makes a noncommittal noise. The toolbox glides through the scanner, Reg steps through the detector, and you're about to follow him when the guard puts a firm hand on your shoulder.\n\n   \"Hold it,\" he says. He leans in, examines you closely, frowning. Then he picks up a piece of paper, and—drat. You should have figured. It's a sketch of…well, somebody, with the heading \"Incident Report—Parking Garage\". Whoever drew it was obviously not a master of the fine arts, but at the right angle you could argue there's a vague resemblance.\n\n   *choice\n      #Bluff my way out of it. \n         *label bluff\n         *if jnsq >=70\n            Among your many persuasive skills is the skill of disguise. Not that it'll do you much good right now—what you wouldn't give for glasses and a wig—but you manage to subtly alter your expression until you look nothing like that sad excuse for a likeness. \n\n            \"Is there a problem?\" you say innocently. \n\n            The guard looks at the paper, then you, then the paper again, then you. Then he shrugs. \"Not at all,\" he says. \"Go on in.\"\n            *goto got_past_guard\n         *else\n            You use what acting skills you have to alter your features so you look less like that sad excuse for a likeness—but you're not sure if it's working. The guard frowns at you. \"Wait here,\" he says, then takes the tool chest. \"I'm going to have to search this.\" \n\n            \"We're in a hurry,\" Reg says, but the guard fumbles through the chest—luckily, not finding the false bottom—and then frisks you both and frowns, glancing again at the horribly drawn mug shot. \n\n            Finally, he shrugs. \"Go on ahead,\" he says reluctantly. \"But don't get up to anything. We'll be keeping our eye on you.\" Great. Now they're even more suspicious. \n            *set alert %+25\n            *goto got_past_guard\n      #Intimidate the guard. \n         *if (honor \u003c40) or (looks = \"brute\")\n            You glare threateningly. \"We're in a hurry,\" you say, with as much menace as you can muster. Next to you, Reg draws himself up to his full (considerable) height. \n\n            The guard seems taken aback. He probably wasn't expecting metal detector duty to contain any risk of bodily harm. \"Okay,\" he says, waving you through. \n            *goto got_past_guard\n         *else\n            You glare threateningly. \"We're in a hurry,\" you say, with as much menace as you can muster. \n\t\t\t\n            The guard is not impressed. \"Wait here,\" he says. \"I'm going to have to search this.\" \n\n            He fumbles through the tool chest—luckily, not finding the false bottom—and then frisks you both, and frowns, glancing again at the horribly drawn mug shot. \n\t\t\t\n            Finally, he shrugs. \"Go on ahead,\" he says reluctantly. \"But don't get up to anything. We'll be keeping our eye on you.\" Great. Now they're even more suspicious. \n            *set alert %+25\n            *goto got_past_guard\n      #Bribe the guard. \n         It's a rule of yours: never go anywhere without enough cash to bribe your way through any given checkpoint. You size up the guard. Unfortunately, he's got a poker face. You just hope he's not one of the moral ones. \n\n         You slyly pull out a wad of euros and slide it onto the conveyor belt tucked under Reg's bag. \"We're really in a hurry,\" you say. The guard examines the X-ray machine, then looks at you and raises an eyebrow. \n\n         \"Here you go,\" he says, handing it back to you with a black look. He proceeds to thoroughly search the chest—luckily, not finding the false bottom—and frisks you both, then frowns, glancing at the horribly drawn mug shot. \n\n         Finally, he shrugs. \"Don't get up to anything,\" he says. \"We'll be keeping an eye on you.\" Great. If he wasn't suspicious of you before, the bribe cinched it. Good move, genius.\n         *set alert %+25\n         *goto got_past_guard\t  \n*else\n   The guard makes a noncommittal noise. He gives you and Reg a cursory glance, the toolbox glides through the scanner, and you're through. Nora's scan-proof bags are good stuff. \n   *goto got_past_guard\n\n*label got_past_guard\n*page_break\nThe security room you're looking for is on the second floor of the east wing, near but not in the Duke's highly secured private chambers. You're not aiming to break into the room proper—you just need to get into the closet next door, where you'll plant a microphone on the wall and set up Nora's ingenious device, which uses ultrasonic pulses to hack into the computer system's audio input. She thinks of everything. \n\nYou approach the staircase to the second floor, unnoticed among the bustling palace staff. \n\n*if alert >=85\n   Drat! Two police officers flank the staircase, armed and looking grim. \"Great,\" you mutter into your earpiece. \"The Duke has called in the authorites.\" \n\n   Someone clears their throat nervously. \"Um,\" ${nickname} says. \"I just found out something about that. The Duke just had a guest who left minutes before I showed up. Guess who?\" \n\n   \"Enlighten me.\" \n\n   \"Leclerc again,\" he says. \"And you guys have been careless. The Duke told her about what went down last night, and she's convinced the Duke to call in local law enforcement. Officers all over the place. This job just got a lot harder.\"\n\n   *goto upstairs\n*elseif alert >=50\n   Drat! A police officer stands at the foot of the staircase, and you can see she's armed. \"Great,\" you mutter into your earpiece. \"The Duke has called in the authorities.\" \n\n   Someone clears their throat nervously. \"Um,\" ${nickname} says. \"I just found out something about that. The Duke had a guest who left minutes before I arrived. Guess who?\" \n\n   \"Enlighten me.\" \n\n   \"Leclerc again,\" he says. \"And you guys have been a little careless. The Duke told her about some suspicious events he's noticed, and she called in the local cops. Shouldn't ruin things for us but we have to be careful.\" \n\n   *goto upstairs\n*else\n   Drat! A police officer stands at the foot of the stairs…but she's not armed. She looks bored. \"Great,\" you mutter into your earpiece. \"The Duke has called in the authorities.\" \n\n   Someone clears their throat nervously. \"Um,\" ${nickname} says. \"I should probably tell you. The Duke had a guest leave moments before I arrived. Guess who?\" \n\n   \"Enlighten me.\" \n\n   \"Leclerc,\" he says. \"Good news is, the Duke blew her off again. He said he didn't see enough suspicious events to merit bolstering the palace staff with local cops…but she did talk him into adding just a few. Shouldn't be a problem for us.\" \n\n   *goto upstairs\n\n\n*label upstairs\n*page_break\n\nSuddenly, a woman with a clipboard rushes up to the staircase. \"You two,\" she says, eyeing your coveralls and badges. \"We weren't expecting more cleaning staff. Where were you told to be?\"\n\n\"Upstairs,\" you say.\n\n*if aquarium =true\n   \"This is about the aquarium, isn't it?\" she says. \"Some drunken idiot smashed it last night. There's always one. Those poor fish! Alright, go ahead.\" \n\n   She waves you up the stairs. The police officer to your left gives you a sidelong glance but does nothing. You grin to yourself as you climb the stairs. This is too easy. \n   *goto door\n*else\n   The woman frowns at her clipboard. \"You're not on the roster. Go talk to your agency supervisor. She's busy fishing thousand-dollar shoes
