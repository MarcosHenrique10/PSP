wolves.\n      *set honor 40\n      *goto police\n   #Congratulate him on work well done, then humiliate him by stealing his next score.\n      You've got more than a grudging respect for the man, but what goes around comes around. The next time he goes to steal something big, he'll find an empty space and your calling card.  \n      *goto police\n   #Find his personal collection, steal it back, and return the items to their original owners. \n      Nothing would make Bouchard angrier than seeing his trophies back in the hands of his victims. You grin at the thought of the look on his face.\n      *set honor 70\n      *goto police \n\n*label police\n\n*set alert 60\n\nYou are abruptly jerked from thoughts of revenge by the sound of sirens. A police car comes rocketing up the street below, pulling to a halt in front of the building. A pair of officers exit the vehicle and another car pulls up behind them, followed by another. Soon there are five cars blocking off the building's entrance, a small crowd of curious passersby being herded off by a couple of officers, and a group of several other officers who have run into the building. Your escape just became much more complicated.\n\n\"Bugger it, they're early,\" Reg says in your ear. \"Alright. They haven't broken through the gallery door yet. From what I can hear, they think you're still in the building, so going back inside is right out. If you tried to climb straight down, you'd land on a police car, and there's no use cutting the power at this point. Your best option is the fire escape.\" \n\n*page_break Look down.\n\nYou glance down at the street, straining your eyes to look at the clot of gawkers. Yes, there's Reg, towering above the crowd. Your partner is a huge man and deadly, trained in several forms of martial arts, but he nonetheless gives off an air of polite normality, and indeed would much rather talk art and literature than crush a man's skull in his bare hands. Casually, he walks away from the crowd and into the alleyway, remaining within your line of sight. \n\n\"What do you need me to do?\" he says quietly in your ear.\n\n*choice\n   #Cause a distraction so I can get down unnoticed. \n      \"I'll see what I can do but no promises. That's a lot of police,\" Reg says. \"Does it matter what kind of distraction?\"\n\n      \"A distracting one,\" you say.\n \n      \"Brilliant,\" he says dryly. \"Your instructions are ever clear as day.\"\n\n      *temp method \"distraction\"\n      *goto leclerc\n   #Tell him to get out of the way. If they spot me, I'm going to fire into the crowd. \n      \"That's a terrible idea,\" Reg says. \"A very, very bad idea. Art theft charges are serious enough if you're caught—do you really want murder charges on top of that?\"\n\n      \"I don't intend to hit anyone,\" you say.\n\n      Reg says nothing. He doesn't appreciate random acts of senseless violence.\n      *set reg_rapport %-10\n      *temp method \"shooting\"\n      *goto leclerc \n   #Tell him to get a car and meet me at the bottom of the fire escape. I'm just going to go for it.\n      \"That's risky,\" Reg says. \"Very risky. You'll have to be fast and lucky to make it.\"\n\n      \"Then it's a good thing I'm both,\" you quip, sounding more confident than you feel.\n\n      *temp method \"goforit\"\n      *goto leclerc\n\n*label leclerc\n\n*set alert 70\n\nOn the street below, you see another car pull up, this time unmarked. The door opens and a slim, silver-haired figure in a very handsome trench coat steps out, striding over to the gathered police officers with determination. Of course. \n\nOf course you had to decide to steal a priceless work of art while Inspector Marie Leclerc was in town. You've been of significant interest to Interpol's Cultural Property Theft Division ever since Hong Kong, and Leclerc has made you one of her special projects. Scarily competent, she knows all your usual methods and all your best tricks. If she's involved, you have no margin for error.\n\nYou hear some louder shouts and a crashing sound from the gallery window. It sounds like they're about to break through the door! It's time to move. \n\n*page_break Go!\n\nYou carefully ease your way along the ledge to your left. The gargoyle to your right is providing some cover against being spotted from the street but you're going to have to move into the line of sight of the police in order to get to the fire escape, which is two windows over.\n\n*if method=\"shooting\"\n   Back to the wall, wind in your ears, you draw your pistol. \n\n   They don't spot you until you're about five feet from the fire escape, when every officer looks up in unison; they must have gotten through the gallery door and seen the broken window. Raising your gun, you take aim as you edge toward the stairs. \n   *label gun\n   *choice\n      *hide_reuse #Fire into the crowd.\n         *if (honor \u003c50) and (technique \u003c=50)\n            *set alert 100\n            You fire indiscriminately into the large crowd of bystanders. Screams erupt from the crowd and they panic, scattering into the street in a near-stampede that blocks the officers from making their way to the fire escape. You hear an especially high-pitched shriek and see a woman stagger, clutching her shoulder.\n\n            A few shots zing against the building but none come anywhere near you. Finally, you swing onto the rickety, metal staircase and barrel down it, leaping over bannisters, continuing to fire at the police who've entered the alleyway and are taking cover behind a dumpster. You hear the squeal of tires at the other end of the alley, and as you reach the bottom of the fire escape, you see a nondescript, black car with a familiar hulking figure in the driver's seat: Reg.\n\n            The passenger door swings open. \"Get in!\" shouts Reg, as a shot cracks against the windshield. You fire off a couple more shots for good measure and dive into the car, the engine revving as Reg drives off at top speed.\n\n            He spares you a black glance. \"I thought you weren't going to hit anyone.\" \n\n            You shrug. Reg doesn't say another word to you as you ditch the car and head back to the safehouse. You got away, after all, and that's what matters.\n            *set reg_rapport %-15\n            *set notoriety %+10\n            *goto hotel\n         *elseif (honor \u003c50) and (technique >50)\n            *set alert 100\n            You size up the crowd with a careful eye before you take your first shot, making sure to hit the street, not the gawkers. Screams erupt from the crowd and they panic, scattering into the street in a near-stampede that blocks the officers from making their way to the fire escape. \n \n            A few shots zing against the building but none come anywhere near you. Finally, you swing onto the rickety, metal staircase and barrel down it, leaping over bannisters, continuing to fire at the police who've entered the alleyway and are taking cover behind a dumpster. You hear the squeal of tires at the other end of the alley, and as you reach the bottom of the fire escape, you see a nondescript, black car with a familiar hulking figure in the driver's seat: Reg. \n\n            The passenger door swings open. \"Get in!\" shouts Reg, as a shot cracks against the windshield. You fire off a couple more shots for good measure and dive into the car, the engine revving as Reg drives off at top speed.\n\n            \"Good eye,\" he says, as you speed off to ditch the car and head for the safehouse. \"Not so much as a scratch on the bystanders. That should bolster your reputation as a crack shot.\" He shakes his head. \"Still, though, I'd rather you didn't try that again.\"\n            *set reg_rapport %-10\n            *set notoriety %+10\n            *goto hotel\n         *else\n            What, fire at the crowd? That's too risky, and besides, it's not your style. You should really go with one of the other options. \n            *goto gun\n      #Fire at the police cars.\n         *if technique >50\n            *set alert 100\n            You eye the row of police cars lining the street—specifically, the one closest to the alleyway, currently parked almost like a barricade. Convenient. You line up a careful shot and blow out first one rear tire, then the other.\n \n            Screams erupt from the crowd and they panic, scattering into the street in a near-stampede that blocks the officers from making their way to the fire escape. You fire a few more shots, shattering windshields, as the officers duck behind their cars and draw their weapons.\n  \n            A few shots zing against the building but none come anywhere near you. Finally, you swing onto the rickety, metal staircase and barrel down it, leaping over the bannisters. You hear the squeal of tires at the other end of the alley, and as you reach the bottom of the fire escape, you see a nondescript, black car with a familiar hulking figure in the driver's seat: Reg. \n\n            The passenger door swings open. \"Get in!\" shouts Reg, as a shot cracks against the windshield. You fire off a couple more shots for good measure and dive into the car, the engine revving as Reg drives off at top speed.\n\n            He spares you a neutral glance as you speed off to ditch the car and head for the safehouse. \"Good eye shooting out those tires,\" he says. \"I'd rather you didn't use that thing at all, though, to be honest.\"\n            *set notoriety %+10\n            *goto hotel\n         *else\n            *set alert 100\n            You fire indiscriminately at the row of police cars lining the street. A bullet zings off the hood of one car and cracks the windshield of another but a lot of your shots are going wide.\n\n            Screams erupt from the crowd and they panic, scattering into the street in a near-stampede. Half the officers duck behind their cars and draw their weapons but the other half peels off and heads for the fire escape. It seems you're not intimidating them quite as much as you'd hoped.\n \n            A few shots zing off the building, one an inch or so from your ear.  Finally, you swing onto the rickety, metal staircase and barrel down it, leaping over the bannisters, firing at the trash cans, but there are four or five officers racing toward you. You're losing hope that you'll get out of this one. \n\n            Suddenly, there's a squeal of tires from the other end of the alley, and a large, nondescript, black car peels through, screeching to a halt to block the alley just past your landing spot. You drop to the ground. \"Get in!\" shouts Reg, and you throw yourself into the passenger's seat as a shot cracks the rear window and the sirens begin to sound.\n\n            Luckily, Reg is a competent driver, and after some time, you're able to shake the cops, ditch the car, and head wearily back to the safehouse.\n            *set notoriety %-10\n            *goto hotel\n      #Forget the gun and just make a break for it.\n         *goto dash\n\n*if method=\"distraction\"   \n   Back to the wall, wind in your ears, you consider your next course of action. You intend to proceed slowly and silently to get on the ground with the minimum amount of fuss, but you're going to need some help. \n\n   There's a polite cough in your ear. \"Any suggestions on what sort of distraction would be most distracting?\" Reg says.\n   *label distract\n   *choice\n      *hide_reuse #Instruct Reg on how to hack into the police scanner.\n         *if (flash \u003c50) and (intellect >50)\n            *set alert 50\n            You usually keep a microwave jammer among the random doodads in your getaway car; you never know when you'll have to hijack a signal. You instruct Reg on how to find the correct frequency and wire in one of your old-school walkie-talkies. \"I'm going to tell them you've been spotted heading in the opposite direction,\" Reg says, and sure enough, after a few minutes, more than half the officers get in their cars and drive off, sirens blaring.\n\n            You take a deep breath and move slowly, very slowly, easing your way over toward the fire escape. Your gray suit blends into the weathered stone of the building, and you manage to pass unseen until you reach the rusty, rickety fire escape. Descending this without a sound is crucial, but with care, you manage it. \n\n            You're so careful, in fact, that the few officers milling about in front of the building pay no attention to the figure casually strolling out of the alley. You resist the urge to whistle nonchalantly as you walk past the police, past the bystanders, and get into the nondescript, dark sedan where Reg is waiting for you.\n\n            He grins as you drive off to ditch the car and head for the safehouse. \"Not bad,\" he says. \"We'll have to remember that trick for next time.\" \n            *set notoriety %+15\n            *goto hotel\n         *elseif (flash >=50) and (intellect >50)\n            *set alert 70\n            You usually keep a microwave jammer in your getaway car—you never know when you'll have to hijack a signal.  You instruct Reg on how to find the correct frequency and wire in one of your old-school walkie-talkies. \"I'm going to tell them you've been spotted heading in the opposite direction,\" Reg says, and sure enough, after a few minutes, more than half the officers get in their cars and drive off, sirens blaring.\n\n            You manage to pass unseen until you reach the rusty, rickety fire escape. You put one foot on the staircase and almost instantly, it lets out a loud creak. The remaining officers look up sharply. You've been spotted! Immediately, you barrel down the staircase, leaping over the bannisters. There aren't very many officers left, though, and as they draw their weapons and run toward your location, you figure you're going to make it.\n\n            There's a squeal of tires from the other end of the alley, and a large, nondescript, black car peels through, screeching to a halt in front of you. \"Get in!\" shouts Reg, and you drop to the ground and throw yourself into the passenger's seat as a shot cracks the rear window. You speed off to ditch the car and head back to the safehouse. \n            *set notoriety %+10\n            *goto hotel\n         *else\n            You have no idea how to do that! You'd better pick another option.\n            *goto distract\n      #Tell Reg to cause an explosion.\n         *if flash >=50\n            *set alert 90\n            You hold still for ten minutes, maybe fifteen, until a loud crack reverberates through the air. The police, as a unit, turn toward the sound and, after a quick conversation with the lieutenant, about half the officers rush off toward the explosion.  \n\n            You manage to pass unseen until you reach the rusty, rickety fire escape. You put one foot on the staircase and almost instantly, it lets out a loud creak. The remaining officers look up sharply. You've been spotted! \n\n            Immediately, you barrel down the staircase, leaping over the bannisters, but there are four or five officers racing toward you. You're losing hope that you'll get out of this one. \n\n            Suddenly, there's a squeal of tires from the other end of the alley, and a large, nondescript, black car peels through, screeching to a halt in front of you. \"Get in!\" shouts Reg, and you throw yourself into the passenger's seat as a shot cracks the rear window and the sirens begin to sound.\n\n            Luckily, Reg is a competent driver, and after some time you're able to shake the cops, ditch the car, and head wearily back to the safehouse.\n            *set notoriety %-10\n            *goto hotel\n         *else\n            *set alert 75\n            Reg sighs. \"Explosions again? Well, we do have some extra C4 in the trunk….\"\n\n            You hold still for ten minutes, maybe fifteen, until a loud crack reverberates through the air. The police, as a unit, turn toward the sound and, after a quick conversation with the lieutenant, about half the officers rush off toward the explosion. \n\n            You take a deep breath and move slowly, very slowly, easing your way over toward the fire escape. Your gray suit blends into the weathered stone of the building, and you manage to pass unseen until you reach the rusty fire escape. Descending this without a sound is crucial—but with care, you manage it. \n\n            Until, right at the bottom, you hear a shout—you've been seen. A few officers rush toward you, drawing their sidearms. Suddenly, there's a squeal of tires from the other end of the alley, and a large, nondescript, black car peels through, screeching to a halt in front of you. You drop to the ground. \n\n            \"Get in!\" shouts Reg as a bullet cracks the windshield. You throw yourself into the passenger's seat and speed off to ditch the car and make your way back to the safehouse.\n            *set notoriety %+10\n            *goto hotel\n      #Forget the distraction and just make a break for it.\n         *goto dash\n\n*if method=\"goforit\"\n   *label dash\n   *set alert 100\n   Forget distractions. You need to get on the ground, and you need to get there now. You glance down at the street where Leclerc stands, watching the building like a hawk. Waiting you out. Someone hands her a megaphone.\n   *choice\n      #Taunt Leclerc while I escape.\n         *if (flash >50) and (jnsq >50)\n            It's now or never. Back to the wall, wind whipping at you, you ease your way over to the fire escape in full view of the crowd on the ground. A few officers raise their guns to shoot, and a couple bullets zing against the building, but then Leclerc gestures, and they lower their weapons. \n\n            She raises the megaphone. \"Come down from there, Bouchard!\" she shouts. \"You're surrounded!\"\n\n            \"Bouchard?\" you shout. \"You wound me. I'm much better-looking than he is.\"\n\n            \"Oh,\" Leclerc says flatly. \"You. I should have figured. Where's the painting?\"\n\n            \"Where you'll never find it,\" you shout, and lunge for the fire escape. \n\n            You barrel down it, leaping over bannisters, taking stairs three or four at a time. The police are racing toward you at top speed but you're faster. Jacket flying, you jump from the landing of the fire escape onto the ground. You execute a stylish roll upon landing and come up mere inches from the open passenger door of a nondescript, black sedan. \"Get in!\" Reg shouts. Leclerc is running toward you; she looks furious.\n\n            \"Madam, my card,\" you say jauntily, tossing one of your ever-present calling cards out the window as you and Reg speed off. Reg is grinning—you can tell he's impressed. So are you, for that matter. Ten points for style.\n            *set reg_rapport %+10\n            *set notoriety %+15\n            *goto hotel\n         *elseif (flash >50) and (jnsq \u003c=50)\n            It's now or never. Back to the wall, wind whipping at you, you ease your way over to the fire escape in full view of the crowd on the ground. A few officers raise their guns to shoot, and a couple bullets zing against the building, but then Leclerc gestures, and they lower their weapons. \n\n            She raises the megaphone. \"Come down from there, Bouchard!\" she shouts. \"You're surrounded!\"\n\n            You start to shout a witty comeback at her, or at least inform her she's got the wrong crook, but it sticks in your throat; damn that stage fright. Instead, you just lunge for the fire escape. You barrel down it, leaping over bannisters, taking stairs three or four at a time. The police are racing toward you at top speed but you're faster. \n\n            Jacket flying, you jump from the landing of the fire escape onto the ground. You execute a stylish roll upon landing and come up mere inches from the open passenger door of a nondescript, black sedan. \"Get in!\" Reg shouts. \n\n            You give the authorities a jaunty wave as you slam the door and speed off, tires squealing. As you drive off, you think of the perfect witty comeback to Leclerc. [i]Drat[/i], you think. But at least you won a few points for style.\n            *set notoriety %+10\n            *goto hotel\n         *elseif (flash \u003c=50)and (jnsq >50)\n            It's now or never. Back to the wall, wind whipping at you, you ease your way over to the fire escape in full view of the crowd on the ground. Leclerc raises her megaphone. \n\n            \"Come down from there, Bouchard!\" she shouts. \"You're surrounded!\"\n            \n            \"Bouchard?\" you shout. \"You wound me. I'm much better-looking than he is.\"\n\n            \"Oh,\" Leclerc says flatly. \"You. I should have figured. Where's the painting?\"\n\n            \"Where you'll never find it,\" you shout, and lunge for the fire escape. \n\n            You barrel down it, leaping over bannisters, taking stairs three or four at a time…but you're less graceful than you've given yourself credit for, and your foot slips on the way down. You stumble and take too long to recover, and you see four or five officers racing toward you. \n\n            Suddenly there's a squeal of tires from the other end of the alley, and a large, nondescript, black car peels through, screeching to a halt in front of you. \"Get in!\" shouts Reg, and you drop awkwardly to the ground and throw yourself into the passenger's seat as a shot cracks the rear window.\n\n            \"Nice banter,\" Reg says as you speed off to ditch the car and return to the safehouse. \"Bad execution. Well, at least we got away.\" \n            *set notoriety %+10\n            *set reg_rapport %+5\n            *goto hotel\n         *else\n            It's now or never. Back to the wall, wind whipping against you, you ease your way over to the fire escape in full view of the crowd on the ground. Leclerc raises the megaphone.\n\n            \"Come down from there, Bouchard!\" she shouts. \"You're surrounded!\"\n\n            You think for a moment. \"Um,\" you shout. \"No! I mean…yes?\" Drat. Now you look like an idiot. Giving up, you lunge for the fire escape and barrel down it, leaping over bannisters, taking the stairs three or four at a time…but you're less graceful than you've given yourself credit for, and your foot slips on the way down. You stumble and take too long to recover, and you see four or five officers racing toward you. \n\n            You're about to lose hope that you'll get out of this one when there's a squeal of tires from the other end of the alley, and a large, nondescript, black car peels through, screeching to a halt in front of you. \"Get in!\" shouts Reg, and you drop awkwardly to the ground and throw yourself into the passenger's seat as a shot cracks the rear window and the sirens start to sound.\n\n            Reg spares you a disappointed glance as you drive off to ditch the car and get back to the safehouse. \"That was the most awkward escape I've ever seen,\" he says. \"Still, though, we got away.\"\n            *set notoriety %-10\n            *goto hotel\n      #Just go.\n         *if flash >50\n            It's now or never. Back to the wall, wind whipping at you, you ease your way over to the fire escape in full view of the crowd on the ground. A few officers raise their guns to shoot, and a couple bullets zing against the building, but then Leclerc gestures, and they lower their weapons. \n\n            She raises the megaphone. \"Come down from there, Bouchard!\" she shouts. \"You're surrounded!\"\n\n            You don't bother responding and just lunge for the fire escape. You barrel down it, leaping over bannisters, taking stairs three or four at a time. The police are racing toward you at top speed but you're faster. \n\n            Jacket flying, you jump from the landing of the fire escape onto the ground. You execute a stylish roll upon landing and come up mere inches from the open passenger door of a nondescript, black sedan. \"Get in!\" Reg shouts. \n\n            You give the authorities a jaunty wave as you slam the door and speed off, tires squealing. You may not have gotten the painting but you've won a few points for style.\n            *set notoriety %+10\n            *goto hotel\n         *else\n            It's now or never. Back to the wall, wind whipping against you, you ease your way over to the fire escape in full view of the crowd on the ground. Leclerc raises the megaphone.\n\n            \"Come down from there, Bouchard!\" she shouts. \"You're surrounded!\"\n\n            You don't bother answering. You lunge for the fire escape and barrel down it, leaping over bannisters, taking the stairs three or four at a time…but you're less graceful than you've given yourself credit for, and your foot slips on the way down. You stumble and take too long to recover, and you see four or five officers racing toward you. \n\t\t\t\n            You're about to lose hope that you'll get out of this one when there's a squeal of tires from the other end of the alley, and a large, nondescript, black car peels through, screeching to a halt in front of you. \"Get in!\" shouts Reg, and you drop awkwardly to the ground and throw yourself into the passenger's seat as a shot cracks the rear window and the sirens start to sound.\n\n            Reg rolls his eyes as you drive off to ditch the car and get back to the safehouse. \"That was an awkward escape,\" he says. \"Still, though, we got away.\"\n            *set notoriety %-10\n            *goto hotel\n\n*label hotel\n*achieve aurevoir\n\n*page_break\n*set alert 15\n\n*temp noun\n*temp nextdoor\n*temp attractive\n*temp classy\n*temp title\n\n\n*if gender=\"male\"\n   *set noun \"man\"\n   *set nextdoor \"boy-next-door\"\n   *set attractive \"handsome\"\n   *set classy \"debonair\"\n   *set title \"gentleman\"\n\n*if gender=\"female\"\n   *set noun \"woman\"\n   *set nextdoor \"girl-next-door\"\n   *set attractive \"beautiful\"\n   *set classy \"elegant\"\n   *set title \"lady\"\n\n*if gender=\"unknown\"\n   *set noun \"person\"\n   *set nextdoor \"kid-next-door\"\n   *set attractive \"handsome\"\n   *set classy \"elegant\"\n   *set title \"aristocrat\"\n\nThe next morning, you awaken from a disquieting dream in which you're being chased through the Kremlin by Leclerc, who is wearing a rabbit suit. Pondering what could possibly have gone wrong with the previous day's job, you get out of bed, wrap yourself in your luxurious, Turkish cotton robe and throw open the curtains to reveal the cityscape of Paris below your suite at the Hotel des Voitures. \n\nYou call down to room service for a pot of green tea and a croissant, then head into the bathroom and look into the mirror. You see…\n*fake_choice\n   #A rumpled, impish ${noun} with a wicked grin.\n      *set looks \"impish\"\n      *goto firstname\n   #A fresh-faced ${nextdoor} type; appearances can be deceiving.\n      *set looks \"nextdoor\"\n      *goto firstname\n   #A strikingly ${attractive} ${noun} with smoldering eyes.\n      *set looks \"sexy\"\n      *goto firstname \n   #A hard-bitten, hard-edged criminal. \n      *set looks \"criminal\"\n      *goto firstname\n   #A perfectly poised, ${classy} ${title}, at home in high society.\n      *set looks \"aristocrat\"\n      *goto firstname\n   #An experienced veteran of many scores, weary lines around my eyes.\n      *set looks \"vet\" \n      *goto firstname\n   #A hulking brute of a ${noun}, not someone to cross.\n      *set looks \"brute\"\n      *goto firstname \n\n\n*label firstname\n\nYou examine your face and note the dark circles under your eyes. Yesterday was exhausting, and no doubt you've probably slept too late. You wander into the sitting room and pick up your pocketwatch; good, it's still morning. \n\nYou love this pocketwatch and keep it with you always. It was given to you by an old friend, and is engraved: \"With affection to my dearest…\"\n\n*choice\n   *if gender=\"female\"\n      #Genevieve.\n         *set firstname \"Genevieve\"\n         *goto paper\n      #Priya. \n         *set firstname \"Priya\"\n         *goto paper\n      #Agnieszka.\n         *set firstname \"Agnieszka\"\n         *goto paper\n      #La Comtesse.\n         *set lela (\"La\" & \" \")\n         *set firstname \"Comtesse\"\n         *goto paper\n      #Jane.\n         *set firstname \"Jane\"\n         *goto paper\n      #Miyako.\n         *set firstname \"Miyako\"\n         *goto paper\n      #Ripper.\n         *set firstname \"Ripper\"\n         *goto paper\n      #Something else. \n         *input_text firstname\n         *goto paper\n   *if gender=\"male\" \n      #Alfonse.\n         *set firstname \"Alfonse\"\n         *goto paper\n      #Vladimir.\n         *set firstname \"Vladimir\"\n         *goto paper\n      #John.\n         *set firstname \"John\"\n         *goto paper\n      #Hiro.\n         *set firstname \"Hiro\"\n         *goto paper\n      #Sunil.\n         *set firstname \"Sunil\"\n         *goto paper\n      #Le Comte.\n         *set lela (\"Le\" & \" \")\n         *set firstname \"Comte\"\n         *goto paper\n      #Ripper.\n         *set firstname \"Ripper\"\n         *goto paper\n      #Something else.\n         *input_text firstname\n         *goto paper\n   *if gender=\"unknown\"\n      #Claude.\n         *set firstname \"Claude\"\n         *goto paper\n      #Chandra. \n         *set firstname \"Chandra\"\n         *goto paper\n      #Hikaru.\n         *set firstname \"Hikaru\"\n         *goto paper\n      #Andrea.\n         *set firstname \"Andrea\"\n         *goto paper\n      #Dominique.\n         *set firstname \"Dominique\"\n         *goto paper\n      #Sasha.\n         *set firstname \"Sasha\"\n         *goto paper\n      #Sam.\n         *set firstname \"Sam\"\n         *goto paper\n      #Ripper.\n         *set firstname \"Ripper\"\n         *goto paper\n      #Something else.\n         *input_text firstname\n         *goto paper\n\n*label paper\n\nThere's a knock on the door. They're awfully quick with the croissants this morning! You go to answer it—hiding your gun in the pocket of your bathrobe first, of course. One can never be too careful. \n\nNot your croissant, alas. It's Reg, looking unshaven and a bit grim, holding a copy of today's [i]Le Monde[/i]. He doesn't wait for an invitation but heads over to sit heavily on the couch. \"Here,\" he says. \"Look at this.\"\n\nYou take the newspaper and regard the front page. A headline halfway down stops you in your tracks. [i]Famed Thief Steals Chagall[/i], it says. \n\nThe article continues: [i]A fragment of a long-lost work by Marc Chagall was stolen from a private gallery Monday. Sources say the prime suspect is the famous burglar Maurice \"Fingers\" Bouchard, best known for the 2011 theft of…[/i]\n\n\"Skip to the middle,\" Reg says.\n \nYou do. [i]According to police sources, there is rumored to be a second suspect but Interpol Inspector Marie Leclerc denied this. \"This is the work of a master thief,\" she said, \"not an amateur.\" The alleged second suspect is thought to be….[/i]\n\nHuh. Not only did Leclerc get in a nasty little dig in at you, but they spelled your last name wrong. It's not that hard to spell….\n\n*choice\n   #D'Autrechose.\n      *set lastname \"D'Autrechose\"\n      *goto origin\n   #Von Diederitz.\n      *set lastname \"Von Diederitz\"\n      *goto origin\n   #Doe.\n      *set lastname \"Doe\"\n      *goto origin\n   #Kurosawa.\n      *set lastname \"Kurosawa\"\n      *goto origin\n   #Rao.\n      *set lastname \"Rao\"\n      *goto origin\n   #Spicoli.\n      *set lastname \"Spicoli\"\n      *goto origin\n   #Smythe-Jones.\n      *set lastname \"Smythe-Jones\"\n      *goto origin\n   #Something else. \n      *input_text lastname\n      *goto origin\n\n*label origin\n*set fullname (lela & ((firstname & \" \") & lastname))\n\nWell, at least you're getting mentioned in the international media. You've worked hard to get where you are, and you've come a long way from your origins in… \n\n*temp hometown\n\n*fake_choice\n   #The Tokyo underworld.\n      *goto rania_intro\n   #A sprawling, run-down French estate.\n      *goto rania_intro\n   #The elite private schools of Mumbai.\n      *goto rania_intro\n   #The streets of St. Petersburg.\n      *goto rania_intro\n   #A Wisconsin dairy farm.\n      *goto rania_intro\n   #A poor-but-hardworking Manchester family.\n      *goto rania_intro\n   #None of your goddamn business. \n      *goto rania_intro\n\n*label rania_intro\n\nThere's another knock at the door. Finally, your breakfast. You conceal your gun in your bathrobe pocket again and open the door to someone you definitely were not expecting. Especially not after Istanbul.\n\nA tall, dark, lean woman with a tumble of dark hair and an impatient look on her face, a face that's almost as familiar to you as Reg's is. Rania Benzakour, your old friend, compatriot, and, occasionally, enemy. Of course, who in this business isn't hired to kill everyone else in this business at some point? You've never held any hard feelings toward each other for that sort of thing.\n\nYou've seen her in fatigues and ballgowns—mostly fatigues—but rarely in ordinary civilian clothes. Indeed, she looks a bit uncomfortable in her jeans and turtleneck. You wonder how many concealed firearms she currently has on her person. \n\n\"${firstname},\" she says, with a quick flash of a grin at your stupefied expression. \"I heard you were here. It's good to see you.\"\n\n*choice\n   #Greet my old friend. \n      You trade air-kisses. \"It's good to see you, too,\" you say. \n\n      Which is true. Working with Rania was always a good time, even if she did tend to leave more bodies in her wake than you would have liked. A former military officer and a mercenary by trade, Rania didn’t even get into running heists until she was hired to kill you seven years ago in Azerbaijan. A year later, she found you in a dive in Barcelona, proposed a job, and the two of you have been working together ever since. \n\n      You've still got the bullet she shot you with in a box of your old souvenirs somewhere. \n      *goto painting\n   #Greet my old lover.     \n      You go in to trade air-kisses but you brush your lips against her cheek and let them linger a bit too long. \"Hello, beautiful,\" you say.\n\n      Rania really is astonishingly good-looking. You thought so the first time you met her, when she'd just left the Moroccan military and was working as a freelance assassin.  You've still got the bullet she shot you with in a little box somewhere. A year later, she found you at a bar in Barcelona and proposed a heist. The two of you staggered back to her spartan apartment, and the following morning you planned the Spanish job. You've been off-and-on professional and romantic partners ever since.\n\n      Not that the romance has ever gotten serious. People in your line of work can't afford deep attachments. Well, there was…\n\n      She steps into the room, glaring at you, and you can't tell if she's angry or teasing. \"You. You've got a lot of nerve after disappearing on me after Istanbul. Remember Istanbul?\"\n\n      Oh yeah. Istanbul.\n      *choice\n         #\"I could never forget it.\" \n            \"I should hope not,\" Rania says. \"Those three weeks were amazing. I've almost forgiven you for leaving. Almost.\" But she's looking at you with that rare warm smile you like so much, and you can tell it's water under the bridge—and, not for the first time, you wonder what would have happened if you had stayed.\n            *set rania_rapport %+25\n            *set rania_flirt true\n            *goto painting\n         #\"That was a long time ago.\" \n            She rolls her eyes. \"Not long enough,\" she says, and you can't tell if she's teasing or not. From the small smile she spares you, though, she seems willing to let bygones be bygones.\n            *set rania_rapport %+15\n            *goto painting\n         #\"Um….\"\n            She stares at you in disbelief for a moment. \"You really don't remember. The little hotel above the coffee shop? The dinners overlooking the Bosphorus?\" She rolls her eyes. \"I shouldn't have expected better from you.\" \n\n            She shouldn't have, really. Still, she seems willing enough to let bygones be bygones.\n            *goto painting\n            \n*label painting\n\n\"I heard about the painting,\" she says. \"Was it actually Bouchard?\"\n\nYou nod. \"He left his card,\" you say. \n\n\"That bastard,\" she says with feeling. She moves past you and makes herself comfortable in the overstuffed armchair, and you wonder what she's actually here for. Visits from Rania are rarely just social occasions. \n\nThen she smiles slyly at you. \"What if I told you,\" she says, \"that I've got something for you that would let you show him up for good?\"    \n\n\"I'm listening,\" you reply.  \n\n\"What do you know about the Black Cat?\" Rania asks. \n\n*label questions1\n\n*choice\n   *hide_reuse #\"The famous cursed black diamond, right?\"\n      \"It's known as the unluckiest diamond in the world,\" Rania says. \"Legend has it that the British appropriated it from India in the 1850s along with the Koh-i-Noor, and since then it's made the Hope diamond look like a four-leaf clover. Its last owner was mauled to death by harbor seals.\" \n\n      Reg raises a skeptical eyebrow. \"I remember that. She was a marine biologist, wasn't she? Seal attacks would be a bona fide employment hazard.\" \n\n      \"It happened to the previous owner, too. And he was a banker.\"\n\n      You're thinking that the moral of this story is not so much \"the diamond is cursed\" as \"harbor seals are violent bastards.\" Superstitious types will see connections anywhere…. But Rania's never been a superstitious type. \n\n      *goto questions1\n   *hide_reuse #\"I thought it was just a legend.\"\n      \"So did a lot of people. Then a black diamond popped up at auction in Bern a couple months ago. It's stunning. Not so much massive, but just the color and cut of it…something about the angles of the facets made me feel like I was looking at something otherworldly. It fits all the descriptions of the Black Cat.\"\n\n      *goto questions1\n\n   *hide_reuse #\"If it exists, no one has seen it for years.\"\n      \"Oh, it exists,\" Rania says. \"And its new owner is the Duke of San Castellano. You've heard of him.\"\n\n      You nod. Of course you have. You know San Castellano fairly well; it's a minuscule, lovely Mediterranean nation-state, known for sea, sun, sand, and lax banking regulations. The hereditary Duke is known for being a little…morbid, you could say, when it comes to his collection. The cursed mask of the pharaoh Khentika Ikhekhi, the original infamous Crying Boy painting, a volume of H.P. Lovecraft's handwritten diary…you'd love to get your hands on that stuff, although you'd probably have to wash them with holy water afterwards. \n\n      *goto questions1\n   *hide_reuse #\"People say it can't be stolen.\"\n      \"I've heard stories about the last time someone thought they'd found it, in the 1960s,\" Reg says. \"A teamup of a few big names. Not only was the job a disaster but less than a year later, one of the guys was killed by falling from a weather balloon, another died of third-degree burns from a fondue party accident, and the third was bitten by a Komodo dragon and died a week later. The diamond disappeared shortly afterward.\"\n\n      Note to self: if you're ever going to try for the Black Cat, stay away from large, toothy animals.\n \n      *goto questions1\n   #\"I'm interested. Keep talking.\"\n\n      \"So what's that got to do with us?\" Reg says. \"The Duke's palace security is airtight. Everyone knows it's a no-go.\"\n\n      *goto exposition\n\n*label exposition\n\nWith a glint in her eye that you recognize all too well, Rania reaches into her bag. She pulls out a sheaf of paper and unfolds it on the coffee table. Building plans. \n\n\"You don't know what I had to go through to get these,\" she says. \"It's only the new wing, of course, and the Duke stores his collection in the old keep, but there are ways in. For the right people.\"\n\n*label questions2\n\n*choice\n   *hide_reuse #\"What makes you think we're the right people?\"\n      \"Hong Kong,\" she says. \"If this called for force, I'd organize a squad myself. If it was a solo job, I'd go to—\" She stops herself. \n\n      \"Bouchard?\" Reg says dryly. \n\n      She shrugs and ignores him. \"But for the team job this requires, I need you. Your connections, your skills. You're the best in the world at the organized heist.\" \n\n      Rania did always know how to flatter you.\n      *goto questions2\n   *hide_reuse #\"Who and what would we need for this?\"\n      \"The security system's rumored to be unbreakable,\" she says. \"We'd need state of the art equipment and someone who knows how to use it. The place is overrun with aristocrats and servants and guards, so we'd need someone who could blend in and serve as a human distraction when needed. And the Duke's trophy room is wired with motion and pressure sensors, so we'd need a very talented and flexible burglar for the actual theft.\"\n\n      You lean forward and take a look at the plans. Your mind is already racing through your extensive list of dubious contacts.\n      *goto questions2\n   #\"Okay, I've heard plenty.\"\n      Reg is examining the plans, too. Finally he sits back. \"I'm game if you are,\" he says. \"What do you think?\"\n      *choice\n         #\"It would be the perfect way to show up Bouchard.\" \n            \"And about time, too,\" Reg says. \"We'll show him who deserves to be #1 on Interpol's Most Wanted!\"\n            *set flash %+5\n            *set reg_rapport %+10\n            *goto outro\n         #\"No one will ever know we were there.\" \n            \"If we're lucky,\" Rania says. \"It's going to take an incredible amount of skill. But I know we're up to the task.\"\n            *set flash %-5\n            *goto outro\n         #\"A black diamond of that quality would be worth a fortune once it's broken down.\" \n            \"Break down the Black Cat?\" Reg says in disbelief. \"What would be the point of stealing something that famous and then destroying it for quick cash?\" \n\n            Rania shrugs. \"Cash,\" she says. \"Cash is the point.\" \n            *set honor %-5\n            *set rania_rapport %+10\n            *goto outro\n         #\"That diamond belongs in a museum!\" \n            \"Repatriating it to India?\" Reg says thoughtfully. \"That's very Robin Hood of you.\" Rania rolls her eyes. \n            *set honor %+5\n            *set rania_rapport %-10\n            *set reg_rapport %+10\n            *goto outro\n         #\"Breaking through the security system will be an exciting challenge.\" \n            \"It's going to take an incredible amount of skill,\" Rania says. \"But I know we're up to the task.\" \n            *set intellect %+5\n            *goto outro\n         #\"No one plays the aristocrat like I do. I'll just walk in the front door and walk off with the diamond.\" \n            \"If anyone can do it, you can,\" Rania says. \n\n            \"But don't get cocky,\" Reg says. \"Remember Nairobi.\"\n            *set jnsq %+5\n            *goto outro\n         #\"Finally, an occasion to use my new grappling hook!\"\n            \"The trophy room's likely to be in one of the towers,\" Rania says. \"It's going to be quite a climb. But if anyone's up to it, you two are.\"\n            *set technique %+5\n            *goto outro\n\n*label outro\n\nYou stand and walk over to the window. Outside, the morning sun plays over the streets of Paris, and you consider what you're about to agree to. This could not only make or break your career, it could make or break your entire future, the bulk of which might end up spent in prison in whichever country gets to you first. But the risk is nothing compared to the reward. \n\nThe ${noun} who stole the Black Cat from an impregnable palace and lived to tell about it. In the best-case scenario, you wouldn't just be notorious, you'd be a legend. \n\nWorst-case scenario? The diamond is guarded by a pack of angry harbor seals. \n\nBut you always like to focus on the best-case scenario. You glance at Reg, who nods once, and then turn to Rania with a grin.\n\n\"We're in,\" you say.\n*achieve soldier\n*set team_rapport (reg_rapport + rania_rapport)/2\n*finish\n", "team": "*temp dead_thug\n*set dead_thug false\n*temp nickforgot false\n*temp epithet\n*if gender = \"male\"\n   *set epithet \"sonovabitch\"\n   *goto san_jose\n*else\n   *set epithet \"so-and-so\"\n   *goto san_jose\n\n*label san_jose\n[i]One week later—San Jose, California[/i]\n\nIt's a pleasant fall day in Silicon Valley, and you're sitting in one of San Jose's best Thai restaurants. Your target—I mean, your friend and lunch companion—is late. Around you, young people with eager expressions and ironic T-shirts alternate between planning the nation's technological future and ignoring each other to text. \n\nYou're starting to get antsy and wonder if you should just go ahead and order when you see her come through the door—a shortish, solid woman in her fifties with a beat-up leather jacket and a shock of wild, auburn hair gone half-gray. It's Nora Ballard, brilliant hacker of the old school and your former, literal partner in crime. She's been in the business since she started hacking banks in the early 80s to pay her MIT tuition, and now she's finally gone white hat as the principal of her own firm, Ballard Security. Every time you've tried to find out what they do, you've hit a dead end. You can't decide if this is a bad sign or a good sign.\n\nThe hostess gestures to the back of the restaurant where you're sitting, and Nora grins and barrels toward you. \"${firstname}, you old ${epithet},\" she says, grabbing your hand and shaking it hard. \n\nShe slides into a seat and snags a spring roll. \"So tell me what this latest gig is,\" she says. \"Not that I'm interested. It's just that Rania said it was something big and now I'm curious.\" \n\n*choice\n   #\"I'm not comfortable talking about it here. Why did you want to meet in public, anyway?\"\n      Nora grins. \"Good question. And I'll tell you as soon as I've done…this.\"\n      *goto coneofsilence\n   #\"Before we start, how are [i]you[/i] doing? How's the straight and narrow?\" \n      Nora smiles. \"To be honest, it's really nice. I'm not shitting you, I'm making more money now than I was in my…old life. I just bought a sailboat. Actually, I think it's technically a yacht but who's measuring?\" Behind the bravado, you can tell something about the question is bugging her. \n      *goto family\n   #\"First, prove to me the government's let you off the short leash. I don't want you turning me in for cookies and back pats from the NSA.\"\n      Nora glares at you. \"You know I only dealt with them because it was that or jail time after Omaha. I'm strictly private sector now. Here, let me show you something that should bolster your confidence.\" \n      *set nora_rapport %-15\n      *set honor %-5\n      *goto coneofsilence\n\n*label family\n*choice\n   #Ask about her family. \n      *if jnsq \u003c50\n         \"How's the wife? And…um, Emma? She's at Stanford, right?\"\n\n         \"[i]Emily,[/i]\" Nora says coldly, \"is at MIT. And Alicia's…gone back to Phoenix.\" Shit. Were they divorcing or something? You're completely drawing a blank. You should have known better than to attempt small talk. \n\n         After an awkward silence, Nora sighs. \"To completely change the subject from this very sensitive topic—here, I have something to show you.\"\n         *set nora_rapport %-10    \n         *goto coneofsilence\n      *else\n         \"Are things any better with Alicia? How's Emily doing at MIT?\"\n\n         Nora looks pensive. \"Alicia's staying with her family in Phoenix. She's saying she just wants a trial separation but I don't even know anymore. Emily's handling it okay, I think. She never calls.\" \n\n         She shakes her head ruefully. \"I got boring, ${firstname}. My life is board meetings and arguing over who gets the antique dining room table. I barely even get down to R&D once a month anymore. Oh, and speaking of R&D—before you go any further, I've got something to show you.\" \n         *set nora_rapport %+20\n         *goto coneofsilence\n   #Ask about the boat.  \n         \"Yacht,\" Nora says. \"It's a yacht. I'm now officially the kind of person who owns a yacht. I don't know how comfortable I am with that.\" \n\n         \"You must be doing really good business,\" you say. \n\n         She grins. \"Understatement of the year. Here, before we take this conversation further, I have something to show you.\"\n         *set nora_rapport %+5\n         *goto coneofsilence\n   #Just tell her about the job.\n      You open your mouth to tell Nora about the job but she stops you. \"Before we start that discussion, I've got a couple things to set up,\" she says. \n      *goto coneofsilence\n\n*label coneofsilence\n\nShe reaches into her battered canvas knapsack and pulls out a sleek tablet that probably costs more than your last getaway car. She taps something, and seconds later you hear irritated sighs and some [i]sotto voce[/i] profanity from most of the patrons. You glance at your own phone and notice all services are down. Then the screen flashes once, briefly, and in moments, reception is back to normal. Nora checks her tablet and gives a small, satisfied nod; then she pulls out what looks like a cheap flip phone and puts it in the middle of the table.\n\n\"All the communications in the restaurant are going through me now,\" she says. \"I've got software scanning every conversation for signs of people listening to us. Security cameras, too. And this phone here has an app I like to call the Cone of Silence. Dampens the sound of our conversation outside a given radius—like, say, this table.\" \n\nShe sits back, looking smug.\n\n*choice\n   #\"Holy cats, Nora. That's amazing. You're still the best. That's exactly why we need you for this job.\"\n      She gives you an aw-shucks grin, but you know she accepts that kind of flattery as her due. The woman's intellect is matched only by the size of her ego. You can relate.\n      *set nora_rapport %+10\n      *goto job\n   #\"Nice. Probably overkill but nice. Might come in handy where we're going.\" \n      \"Overkill? People know me in this town,\" she says, sounding a little irritated. \"I don't live my life behind a stash of wigs and secret identities anymore. I can't be too careful. Now what's this job?\"\n      *set nora_rapport %-5\n      *goto job\n   #\"Interesting stuff. Is there more where that comes from?\"\n      \"It's what we do,\" Nora says. \"Surveillance and counter-surveillance. We've got all kinds of crazy stuff like this down in R&D. Or at least I'm pretty sure. I don't have as much time to get down there as I'd like lately. Now, what's this job?\"\n      *goto job\n\n*label job\n\n\"Have you ever heard of the Duke of San Castellano?\" you say.\n\nYou don't really expect her to say yes but her eyebrows immediately raise. \"What, the collector? Hoo boy. Yeah, I've heard of him. He's into lifestyles-of-the-rich-and-paranoid type stuff—blast doors on the bathrooms, sharks in the moat, that sort of thing.\"\n\nPay dirt. You knew calling Nora was a good idea. \"Do you know anything about the system itself?\" \n\n\"Nothing,\" she says. \"Not even who built it. All I know is that it's not going to be networked. We'll have to get onsite and physically tap into whatever system we want to mess with. What would we be stealing, anyway?\"\n\n\"The unluckiest diamond in the world.\"\n\n\"Of course we are,\" she sighs. Then she thinks for a moment and shrugs. \"I don't think I'm the person you want for this. If I could do it offsite, sure. But I've got bad knees. I can't go crawling through ducts at my age.\"\n\nThere's a bit of a spark in her eye, though. She wants to do it. She wants back in the game. All she needs is a little push.\n*goto argument\n\n*label argument\n*choice\n   #\"It's the Black Cat. No one's ever been able to steal it. If we do it, we'll be legends.\"\n      She looks alarmed for a second. \"Hell no. Okay, let me make this clear: if I do this for you, and that's a purely theoretical 'if' at this point, my name is nowhere near it. I've still got outstanding charges from Omaha, and if I so much as ping the NSA's radar—I know you don't understand this, but I've got a company, I've got a family. I can't lose that.\"\n      *choice\n         #\"But you're the best. We can't do this without you.\"\n            \"We?\" she says. \"Who's 'we'? You didn't tell me other people were already in. Rania, of course, and Reg, and—who else?\"\n            \n            \"Nobody yet,\" you tell her. \"I mean it. If we can't get you, we call the whole thing off. No one else is even close to being on your level.\"\n\n            \"Huh,\" she says. \"You'd really call it off without me?\" She thinks for a minute again, staring down at her spring roll, and then looks up with a half-grin. \"Okay. Okay. One last job just to prove I still got it. But if we get caught, you're on your own, you got it?\"\n            *goto nora_accepts\n         #\"Look, if anything happens, I'll take the heat. I hear San Castellano has excellent jails. Fantastic catering.\"\n            *if looks = \"impish\"\n               \"You're serious?\" She looks at you for a moment—a long, hard look—as if she's wondering what shenanigans you have up your sleeve. \n\n               \"Fine,\" she says. \"Fine. I'll do it. But I'm holding you to that last part. We get caught, I'm turning state's evidence and you're on your own. Okay?\"\n               *set honor %+10\n               *goto nora_accepts \n            *elseif looks = \"nextdoor\"\n               \"You're serious?\" She looks at you for a moment—a long, hard look—and seems to conclude you're telling the truth. People always say you have an honest face. It comes in handy.\n\n               \"Fine,\" she says. \"Fine. I'll do it. But I'm holding you to that last part. We get caught, I'm turning state's evidence and you're on your own. Okay?\"\n               *set honor %+10\n               *goto nora_accepts\n            *elseif looks = \"sexy\"\n               \"You're serious?\" She looks at you for a moment—a long, hard look—and her face softens. It's hard for people to say no to someone as attractive as you are.\n\n               \"Fine,\" she says. \"Fine. I'll do it. But I'm holding you to that last part. We get caught, I'm turning state's evidence and you're on your own. Okay?\"\n               *set honor %+10\n               *goto nora_accepts\n            *elseif looks = \"criminal\"\n               \"You're serious?\" She looks at you for a moment—a long, hard look—but your grim features brook no argument.\n\n               \"Fine,\" she says. \"Fine. I'll do it. But I'm holding you to that last part. We get caught, I'm turning state's evidence and you're on your own. Okay?\"\n               *set honor %+10\n               *goto nora_accepts\n            *elseif looks = \"aristocrat\"\n               \"You're serious?\" She looks at you for a moment—a long, hard look—but your air of casual confidence bordering on arrogance seems to win her over.\n\n               \"Fine,\" she says. \"Fine. I'll do it. But I'm holding you to that last part. We get caught, I'm turning state's evidence and you're on your own. Okay?\"\n               *set honor %+10\n               *goto nora_accepts\n            *elseif looks = \"vet\"\n               \"You're serious?\" She looks at you for a moment—a long, hard look—and seems to come to the conclusion that after all these years, you know what you're doing. \n\n               \"Fine,\" she says. \"Fine. I'll do it. But I'm holding you to that last part. We get caught, I'm turning state's evidence and you're on your own. Okay?\"\n               *set honor %+10\n               *goto nora_accepts\n            *else\n               \"You're serious?\" She looks at you for a moment—a long, hard look—but your grim features brook no argument. \n\n               \"Fine,\" she says. \"Fine. I'll do it. But I'm holding you to that last part. We get caught, I'm turning state's evidence and you're on your own. Okay?\"\n               *set honor %+10\n               *goto nora_accepts\n   #\"Fine. I'll use someone else. If you've gotten that soft, the technology's probably too much for you to handle, anyway.\"\n\n      She bristles at this. \"I said I didn't want to do it. I didn't say I couldn't do it. There have got to be ways into the system that don't involve climbing through—oh shit, you just reverse-psychologied me, didn't you?\" She glares. \"You asshole.\"\n\n      You smile serenely. She frowns. But you can tell from the set of her shoulders that as much as she may regret it later, she's in.\n      *set nora_rapport %-15\n      *set honor %-5\n      *goto nora_accepts\n   *hide_reuse #\"It's not just the Black Cat. The Duke has a whole collection of cursed jewelry and art, not to mention the Duchess's jewels. We're looking at a lot of money here. A lot.\" \n\n      Nora shrugs. \"I just bought a yacht because it was Tuesday. You're not going to win me over with cash. Not these days. Try again.\"\n      *goto argument\n   #\"Didn't you say you weren't getting down to R&D often enough? Well, this would be a great chance to field-test some of those gadgets you like to build.\"\n      \n      \"We already do field tests.\"\n\n      \"Yes, but staged break-ins lack a certain…something, don't they?\"\n\n      She looks down at her spring roll. \"Could be,\" she says. \"Could be we've also got some stuff that's a little more on the…creative side, you might say. A trial run in extreme conditions might be just what some of our products need. It'd save me some money on testing, in any case.\"\n      *goto nora_accepts\n   #\"He claims it's an unbreakable system, but you're the one who can break it.\"\n\n      Nora looks down at her spring roll, eyebrows lowered. \"Hm,\" she says. \"Hm. That's…hm. It's been a long time. The technology's changed. I might just be an old dog trying to learn new tricks.\" But you can practically see the cogs whirring in her head.\n\n      In a much shorter time than you would have thought, she looks up at you. \"Can you guarantee nothing about this could ever in any way lead back to me? Even rumors. Even rumors of rumors. I want complete deniability and then I'll do it.\" \n      *set nora_rapport %+15\n      *goto nora_accepts\n\n*label nora_accepts\n*achieve hacker\n\n\"Great!\" you say, with an inward grin. With Nora on your team, that palace security system doesn't stand a chance.\n\n*set team_rapport ((reg_rapport + rania_rapport) + nora_rapport)/3 \n*page_break\n*goto vegas\n\n*label vegas\n[i]A few days later-Las Vegas, Nevada[/i]\n\nThe Divina Commedia, Vegas's newest mega-resort and casino, is a magnificent piece of work, for a given value of \"magnificent\"—it's tacky to such a breathtaking, self-aware, billion-dollar degree that it might as well be an art installation. \n\nRight now, you're waiting for your next target—I mean, another old friend—in the Den of Thorns, a bar with sinister red lighting and glass floors through which you can see the tourists wandering through the casino's lower level, surrounded by projected flames. Gargoyles leer drunkenly down at men in muscle shirts and women in sequins, who leer back.\n\nA gothed-out waitress wearing cute little demon horns stops by your table. \"What're you drinking?\" she says amiably. \n\n*fake_choice\n   #\"Coffee.\" I need to be alert when I meet up with this guy. He keeps people on their toes.\n      *goto nick_intro\n   #\"Just water, please.\" \n      *goto nick_intro\n   #\"That last glass of champagne was not expensive enough. I want another.\" \n      *goto nick_intro\n   #\"A Candy Appletini with extra sprinkles.\" \n      *goto nick_intro\n   #\"Martini. Shaken, not…you know the drill.\" \n      *goto nick_intro\n   #\"Beer me!\"\n      *goto nick_intro\n\n*label nick_intro\n\nBehind you, you hear a low chuckle. \"After all the years I've known you, you still always order the same thing.\" \n\nYou stand up and turn around, half-startled despite yourself. The speaker is a dark-haired, dark-eyed man with a broad American accent and a broad American grin, wearing a cheap suit with his shirt unbuttoned one button past classy. He's not overly tall, nor muscular, nor striking, but there's something fascinating about him, a kind of manic, magnetic energy. \n\nIt's Nick McCord, one of the best con artists you've ever had the pleasure of working with. \n\n*choice\n   #Greet my old friend. \n      You nearly go in for the cheek-kiss, then remember you're not in Paris right now and hold out your hand instead. Nick gives it the firm shake of a trustworthy man. He's good at what he does.\n\n      A former stage actor, a card sharp, and an outrageously effective liar, he first crossed your radar maybe four years ago in Canberra. By the time you smelled the first hint that he wasn’t what he seemed, he’d already absconded with your plane and the opals. You met him again in New York City not long after you'd made your name with the Hong Kong job. Nick offered you the security codes to a billionaire’s penthouse as payback for the opals, and you agreed. \n\n      It went well. You’ve teamed up more than a few times since then, and at this point you consider him a friend. He still owes you a plane, though. \n\n      \"So the Black Cat, huh?\" he says. \"Crazy duke, impregnable palace. I'm interested to hear your take. Sell me.\"\n      *goto nickjob\n   #Greet my old lover. \n      You nearly go in for the cheek-kiss, then remember what country you're in and hold out your hand instead. Nick takes it—and, you have to admit, maybe both of you hang on a lot longer than necessary. \"Hi, handsome,\" you say. \n\n      \"Don't give me that,\" he says, but he's smiling. A former stage actor, a card sharp, and an outrageously effective liar, he first crossed your radar maybe four years ago, when he pulled one over on you in Canberra. You met him again in New York City not long after you'd made your name with the Hong Kong job. He offered up the security codes to a billionaire's penthouse to pay you back for the fast one he pulled. \n\n      You worked beautifully together during the job. And after the job, high on adrenalin, you fell into bed together. It's been a lot of fun but never anything too serious—or so you like to tell yourself. Of course, there was…\n\n      \"Been a while,\" he says. \"Since Venice.\" \n\n      Ah, Venice.  \n      *choice\n         #Reminisce about the good times. \n            \"Remember the time we got bored and commandeered that boat?\" you say. \n\n            \"Grand theft gondola,\" he says, grinning at you, eyes locked on yours. \"We always did know how to have a good time.\n\n            You're getting the impression he'd be up for having some more. Even if you didn't still find his eyes totally fascinating (you do), the fact that he's still into you is good information to have on file.\n\n            \"So the Black Cat, huh?\" he says. \"Crazy duke, impregnable palace. I'm interested to hear your take. Sell me.\"\n            *set nick_flirt true\n            *set nick_rapport %+25\n            *goto nickjob\n         #Leave the past in the past. \n            \"Yeah,\" you say noncommitally. \"Let's…talk about this job.\" \n\n            Nick looks at you for a moment. \"Hm,\" he says, and a flash of disappointment crosses his face, but it's gone in a moment and the salesman grin is back again. \"So the Black Cat, huh? Crazy duke, impregnable palace. I'm interested to hear your take. Sell me.\"\n            *set nick_flirt false\n            *goto nickjob\n         #What's he talking about?\n            \"Venice?\" you ask.\n\n            He seems taken aback for a moment, and then he laughs. \"That's one thing I like about you,\" he says. \"You're a kidder.\" But his smile doesn't reach his eyes, and you think you might have actually hurt his feelings. \n\n            He pauses a little too long and then says, \"So the Black Cat, huh? Crazy duke, impregnable palace. I'm interested to hear your take. Sell me.\"\n            *set nick_flirt false\n            *set nickforgot true\n            *set nick_rapport %-5\n            *goto nickjob\n\n*label nickjob \n*page_break\n\n\"Come on,\" you say. \"A famous diamond, a jaunt to sunny San Castellano. What else do you need?\"\n\nHe shrugs, a wry, American shrug. You think he might actually be American but you can never be sure; his repertoire of accents and mannerisms is fairly extensive and never ceases to surprise you. You've done some fine work together over the years, and if anyone can snob his way through the lavishly wrought front door of the Duke's palace, it's this guy. \n\nNick shrugs. \"I like it here. Fish in a barrel, yeah, but my room gets comped if I win enough and the restaurants can't be beat. You know they've got an ice bar here? It's a bar. Made of ice.\"\n\n*choice\n   #\"You can buy your own casino once we've sold the Black Cat.\"\n      He gives you a skeptical look. \"It's famous, yeah, but value-wise it's no Star of Africa. We'll get, what, $9 million? Divide that six ways and I can make more scamming investment bankers with a fraction of the risk.\"\n\n      \"We won't just get the diamond, then. The Duke's got a whole collection. It's rumored he's got a few pieces of the Lydian Hoard-\"\n\n      Nick shakes his head. \"We get caught, we've got Interpol cultural property theft charges on top of everything else. I don't like the risk profile here, ${firstname}. Plus, I've got a commitment in Buenos Aires next month, and those banks aren't going to defraud themselves. I'm sorry, I'm out.\"\n\n      He stands up, offering an apologetic handshake.\n      *goto convince\n   #\"I need to get one up on Bouchard or I'll never live it down.\"\n      \"What's the point?\" he says. \"You wanna take a risk this size just to piss off that irritating bastard?\"\n      \n      \"Irritating? He tried to frame me!\"\n\n      Nick gives a shrug that says, \"who hasn't?\". \n\n      \"Look, your reputation's your problem, not mine. And all revenge does is make you careless. If that's why you're doing this—no hard feelings, but I've got a thing coming up in Buenos Aires and those banks aren't going to defraud themselves. I'm out.\" \n\n      He stands up, offering an apologetic handshake.\n      *set nick_rapport %-5\n      *goto convince     \n   #\"A diamond like that exists to be stolen. Come on, it'll be fun.\"\n      \"It's cute how you get all excited about this stuff,\" Nick says. \"High-profile heists, fame and fortune. Me, I'm fine with whatever, so long as I'm making the right kind of money. Speaking of which, I really do wish I could help you but I've got this thing coming up in Buenos Aires and those banks aren't gonna defraud themselves. I'm sorry, I'm out.\"\n\n      He stands up, offering an apologetic handshake.\n      *goto convince\n   #\"You're the best there is at what you do. I can't do this without you.\"\n      \"Flattery will get you everywhere,\" Nick says, \"You're right, I am the best. But is it worth the risk?\"\n\n      \"It's the Black Cat,\" you say. \"Of course it is.\" \n\n      He shrugs. \"To you, maybe,\" he says. \"I wish I could help, I really do. But I've got this thing brewing in Buenos Aires and those banks aren't going to defraud themselves. I'm sorry, I'm out.\"\n\n      He stands up, offering an apologetic handshake.\n      *goto convince\n\n*label convince\n*choice\n   #Shake hands. \n      You shake his hand. \"No hard feelings,\" you say, but only sort of mean it. You can probably pull this off without him but it'd be a lot easier with him. \"I'll send you a postcard from my private island after we finish the job.\" \n\n      \"Yeah, you do that,\" he says. It seems like he's about to say more but then he seems to spot something in the crowd of gamblers—probably a new mark—and saunters off, leaving you to your drink and your thoughts.\n      *goto paris\n   #Turn away. \n      You turn away. \"Good luck, then,\" you say coldly. \"Guess I'll see you around.\" \n\n      At first, Nick's face betrays no emotion. Then his shit-eating, con-man grin spreads across it again, but his eyes are angry. \"Yeah, you do that,\" he says, and saunters off, leaving you to your drink and your thoughts.\n      *set nick_rapport %-10\n      *goto paris\n   #Flirt. Maybe that'll convince him. \n      You lean in a little too close, your hand gripping his a little too long. \"Come on,\" you say. \"For old times' sake.\"\n\n      *if nick_flirt=true\n         He doesn't pull away. \"Mmmm,\" he says. \"It's tempting. Really, really tempting.\" Then he steps back and sighs. \"But no, seriously, it's not personal. This Buenos Aires thing is just really big. You sure you don't want to give up the quest for the magic diamond and come make some real money with me?\"\n\n         \"Sorry,\" you say. \"But you've got an open invitation to my private island after I finish the job and buy one.\"\n\n         He laughs. \"Sure,\" he says. It seems like he's about to say more but then he seems to spot something in the crowd of gamblers—probably a new mark—and saunters off, leaving you to your drink and your thoughts.\n         *set nick_rapport %+15\n         *goto paris        \n      *elseif (nickforgot)\n         He steps back and gives you a skeptical look. \"So you forgot everything that happened with us and now you want to make nice. Typical.\" \n\n         You shrug. It was worth a shot. \"Look, okay, no hard feelings. I'll just send you a postcard from my private island once I've finished the job.\" \n\n         \"Yeah, you do that,\" he says. It seems like he's about to say more but then he seems to spot something in the crowd of gamblers—probably a new mark—and saunters off, leaving you to your drink and your thoughts.\n         *set nick_rapport %-5\n         *goto paris\n      *else\n         He steps back with a wry grin. \"Didn't you say you wanted to leave the past in the past? Make up your mind already.\" He doesn't pull his hand back right away, though, which is interesting. \"The answer's still no. Buenos Aires is too good an opportunity to pass up.\"\n\n         \"Sure,\" you say. \"No hard feelings. I'll send you a postcard from my private island when we've finished the job.\" \n\n         \"Yeah, you do that,\" he says. It seems like he's about to say more but then he seems to spot something in the crowd of gamblers—probably a new mark—and saunters off, leaving you to your drink and your thoughts.\n         *set nick_flirt true\n         *set nick_rapport %+10\n         *goto paris\n     \n*label paris\n*page_break\n\n[i]A few days later—Montmartre, Paris[/i]\n\nBack in your old stomping grounds, you're taking a Saturday afternoon stroll through the streets of Montmartre, watching the tourists exclaim over the displayed oeuvre of the street artists. \n\nOver toward a street corner famous for a legendary absinthe-fueled fistfight between Van Gogh and Toulouse-Lautrec, a cluster of tourists has gathered. You edge your way through the crowd. \n\nAn acrobat is doing a handstand there, effortlessly juggling two bowling pins with his stocking feet. After a tense minute, he does a smooth flip in mid-toss, landing neatly and catching the bowling pins—one, two. The crowd breaks into well-deserved applause, and the acrobat, a lanky black kid with an eager smile and a shock of copper hair, begins passing around his newsboy cap.  \n\n*page_break\nHe sees you and stops, startled, then grins, legitimately pleased to see you. \"${firstname}!\" he says, then glances nervously over at a police officer strolling by. \"I mean…what brings you to these parts, complete stranger?\"\n\nDidier—or Le Roux, his preferred stage name—is a good kid and a very talented burglar, but a bit naïve. A kid his age should be in university, drinking heavily and sleeping late, but instead he's become one of Montmartre's best pickpockets. You've hired him for smaller burglaries before and been impressed with his work. Perhaps it's time for a bigger job. \n\n\"Come with me and we'll talk,\" you say, taking him by the arm. \n\nHe follows you through Montmartre for a few blocks, until the cafes start to give way to adult theaters, and then you duck into a quiet, apparently disused alley.\n\n*page_break\n\nYou tell him about the plan. Actually, you get about a third of the way through the plan when he interrupts you. \n\n\"I'll do it,\" he says eagerly. \"Sounds great. I'm in.\" \n\n\"But I haven't even told you what you'll be doing-\" \n\n\"Doesn't matter,\" he says with a wide grin. \"I'll be working for the notorious ${firstname} ${lastname} again, won't I? I do this, I'm set. Le Roux, Thief of the Black Cat! No one's ever going to write me off as 'just a pickpocket' again.\" \n\nHe reaches out to shake your hand and seal the deal, then hesistates just a moment.\n\n\"One thing,\" he says nervously. \"It's just a break-in, right? No shooting? No hostages? You know I'm not good with…you know. That stuff. \"\n\n*choice\n   #\"You know I don't do that sort of thing.\" \n      *if honor >=50\n         \"Yeah,\" Le Roux says, \"that's one of the reasons I like working for you.\" He grins, obviously relieved. \n         *set honor %+5\n         *set leroux_rapport %+15\n         *goto thugs\n      *else\n         \"Yeah,\" Le Roux says, \"that's good to hear.\" You're not sure he believes you but it doesn't really matter so long as he's accepted the job.\n         *set honor %+5\n         *goto thugs\n   #\"Who knows? We'll go where the situation takes us.\"\n      \"Oh no! No no no, it's fine. Totally fine,\" he lies. You shrug. Le Roux has the skills of a top-notch criminal and you're pretty sure that when push comes to shove he's not a coward, but that squeamish attitude has got to go. A crook's gotta do what a crook's gotta do.\n      *set honor %-5\n      *set leroux_rapport %-5\n      *goto thugs\n   #\"If you haven't got the stomach for a big job, I'll find someone else.\"\n      *if honor \u003c50\n         \"Oh no! No no no, it's fine. Totally fine,\" he lies. You regard him through narrowed eyes and he cringes a bit. He's never going to get anywhere in this business if he stays this squeamish. Oh well. You know he'll do what you make him do, and what's more, you can guarantee he'll do it for less than a full share. \n         *set honor %-10\n         *set leroux_rapport %-10\n         *goto thugs\n      *else\n         \"Oh no! No no no, it's fine. Totally fine,\" he lies. \n\n         You regard him through narrowed eyes but this appears to be less intimidating than you expected, as he just looks at you, confused. \"Do you need some sunglasses?\" he asks. You probably should have left the intimidation thing to Reg.\n         *set honor %-10\n         *set leroux_rapport %-5\n         *goto thugs\n\n*label thugs\n\nJust then, a shadow blocks the alley. \n\nTwo big guys. Two very big guys. \"Hey, Le Roux,\" one of them says. \"Saw you were performing today. Good job. Really good job with that foot-juggling.\" He's wearing a busker's ragtag ensemble and a bully's false cheerfulness, and Le Roux cringes back against the wall of the building.\n\n\"Hey, Michel. Hey, Wim,\" he says weakly. \"Hey, yeah, about that money-\"\n\nYou just barely resist the urge to slap your forehead in exasperation. You'd think he'd know better than to borrow money from thugs. \n\n*page_break\n\n\"Yeah, I know, I know, next week,\" the other thug says, sounding downright cheerful. \"Next week's not gonna do it. There's no time like the present, you know?\" \n\n\"Okay, okay, I've got it, I just don't have it [i]on[/i] me-\"\n\nYou give them a once-over; likely, they're not armed. But they're pure muscle, and they could do a lot of damage if they put their mind to it. Fighting them's not an option, since your burglar is going to need as many unbroken bones as possible. Your mind races—how are you getting out of this one?\n\n*fake_choice\n   #Offer to pay them what Le Roux owes. \n      \"Look,\" you say, stepping out from the shadows next to your frightened compatriot. \"How much does this idiot owe you? I have need of him for the time being, so how about I take care of it and you forget this ever happened?\" You sincerely hope these two are just neighborhood thugs instead of scions of organized crime. You'd rather not get caught up in some debt-of-honor business.\n\n      \"Who the hell are you?\" Michel snarls. \n\n      \"Who cares?\" Wim says. \"Just so long as we get the money. 2,000 euros.\"\n\n      \"It was 1,500,\" Le Roux argues. \n\n      \"Interest and late fee,\" Wim says as you calmly reach for your wallet and peel off enough money from your ever-present stack of unmarked bills. \n\n      \"Here it is,\" you say. \"And another 500 for you gentlemen for your time and effort.\" You'd rather not get beaten up right now, honestly, and this is a small investment when it comes to having Le Roux on your team. He's a lot better than he thinks he is. \n\n      Michel looks like he's interested in a full-blown mugging but Wim gives him a look and he backs off. \"Thanks,\" Wim says as he walks off. \"See you around.\" \n\n      You turn to Le Roux, who looks half-relieved and half ashamed of himself. \"I hope you know that comes out of your share,\" you say.\n      *goto bugfix \n   #Pull out my gun.\n      You sigh, an I'd-rather-not-do-this-but-I-have-no-choice sort of sigh, and reach into your bag. \"Hey!\" yells one of the guys, and then sees that you've pulled out your pistol with silencer attached; you'd come prepared. You always come prepared. He stops inches from grabbing you.\n\n      The two toughs' eyes go wide. \"You think that's supposed to scare us?\" Wim says.\n      *fake_choice\n         #\"Yes.\"\n            *if ((honor \u003c60) or ((looks = \"brute\") or (looks = \"criminal\")))\n               One look at you and they know you're not joking. \"Shit,\" Wim says hoarsely. \"Okay. Yeah. Le Roux, you're good. Now just let me go, okay?\"\n\n               Your gaze cold and steely, you slowly lower the gun and both thugs, panting, turn and run. \n\n               Le Roux gives you a grateful glance. \"Thanks,\" he says sincerely, slumping against the building wall in relief. \"You saved my ass. I won't forget this.\"\n               *goto bugfix\n            *else\n               \"You wouldn't shoot us,\" Wim says, but his voice is shaking. \"You don't look like the type. How about I just—argh!\" \n\n               A warning shot pings off the wall, scattering bits of old brick. Panting, both of them turn and run like hell. \n\n               Le Roux gives you a grateful glance, and then you hear a passerby shout \"What was that noise?\" Even with a silencer, a gunshot's a gunshot. You grab Le Roux roughly by the arm and drag him down the alley into the first unlocked door you can find, the empty back room of a porn shop. If you move fast, no one will ever know you were there. This isn't the first gun you've fired in an alley in broad daylight.\n\n               \"Thanks,\" Le Roux says sincerely, slumping against the wall in relief. \"You saved my ass. I won't forget this.\"\n               *goto bugfix\n         #Shoot W
