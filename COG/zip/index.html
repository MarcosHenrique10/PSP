<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zip! Speedster of Valiant City — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "zip", "title": "Zip! Speedster of Valiant City", "scenes": {"1-slothfight": "*text_image chap_1.png center Chapter One A Dark Alley\n\n\"Hold…still…damnit!\" the Sloth growls, hanging from the fire escape. \n\nA flash of lightning streaks across the night sky. You zip under your enemy's swipe, eyeing his claws. Those things would leave a nasty mark! That is, if they ever touched you.\n\nAnd they haven't, not in 15 years!\n\nYou whoosh around the Sloth with super speed, cutting a path through the water rushing down the alley. Sure, fighting in a downpour adds a unique element to this fight, but the outcome is hardly in doubt. You'll beat the Sloth like you always do.\n\nStill you wonder why the Sloth is literally hanging around outside Futuro Electronics? Trendy bars and restaurants hum with activity down the block, but this stretch of businesses is closed for the night. Judging from the shattered front glass window, the Sloth had some shopping that couldn't wait until morning!\n\n\"Stop…moving…so…fast!\" the Sloth bellows. The gray-brown fur on his helmet, matted from the downpour, conceals the top half of his face; his goggles glow a pale green. Without them, he can barely see. \n\nSo he's slow and half-blind, but he's three times your size, super-humanly strong, and has those claws! Plus, he's good at…hanging on things! That's a skill, right?\n\nEven with his weaknesses, he's the most persistent member of the Miscreants, the loosely-organized band of villains running amok in the city. The Sloth is always scheming, and it's always up to you to stop him!\n\nYou clench your fists. It's time to take down the Sloth!\n\nAgain!\n*fake_choice\n    #Sneak up on him and steal his goggles!\n        *set sneak %+20\n        You rush around your adversary, running up the side of the Futuro Electronics building. You pluck off the Sloth's goggles as easily as you'd pluck a finger sandwich from an hors d'oeuvres plate at a fancy party.    \n\n        In a flash, you're back on the ground. You snap his goggles in two and toss them over your shoulder.\n\n        The Sloth pats his face, squinting in your direction. \n\n        \"Those…are…prescription!\" he yells. The villain tries to adjust his grip, but misses the railing, causing him to tumble in a heap onto a pile of cardboard boxes.         \n    #Toss a bunch of garbage at high velocity!\n        *set violence %+20\n        Even ordinary hunks of garbage become effective projectiles when tossed at 200 miles per hour! Luckily for the Sloth, you don't throw with lethal intent.\n\n        Reaching into a dumpster, you toss empty bottles, soda cans, and even dirty diapers at the Sloth. The bottles shatter against the thick hair on the torso of his suit, causing him to lose his grip and fall from the railing. \n        \n        The Sloth tumbles in a heap onto a pile of cardboard boxes. The impact knocks his goggles from his face, and they shatter on the ground. A soiled diaper falls on his head.\n\n        \"Curse…you!\" he yells as he sits up.\n    #Target the fire escape; it looks creaky!\n        *set brain  %+20\n        You rub your chin, searching for the weakest joint on the fire escape.\n        \n        \"Afraid…to…fight?\" the Sloth yells, visibly confused by your tactics.\n\n        You smirk and race up the wall of Futuro Electronics, using your index finger as a high-speed drill on the rustiest section of railing until it snaps.\n        \n        \"Timber!\" you yell.\n\n        The metal twists and squeals, sending the Sloth tumbling in a heap onto a pile of cardboard boxes. The impact knocks his goggles from his face, and they shatter on the ground.\n    #Do majestic figure-eights around him until he loses his balance!\n        *set art %+20\n        \"What…are…yo—?\"\n\n        Before the Sloth can finish his question, you've dashed up the wall and started running loops around him.\n        \n        \"Can't hit me!\" you taunt, darting around. \"I'm over here! Now I'm over here!\"\n        \n        He leans out and swats at you again, but he misses, and his claws slip off the railing.\n\n        You zip back down to the ground, dusting off your hands as the Sloth tumbles in a heap onto a pile of cardboard boxes.\n\nYou almost feel sorry for this guy. He's the slowest villain in town, and you're the speediest hero! Not a great match-up for the Sloth, now is it?\n\nPlus, his name is sort of lame. The Sloth? Really?\n\nYours is much better!\n\n*fake_choice\n    #Accelerator!\n        *set heroname \"Accelerator\"        \n    #Zipper!\n        *set heroname \"Zipper\"        \n    #Beeline!\n        *set heroname \"Beeline\"\n    #Streaking Comet!\n        *set heroname \"Streaking Comet\"\n    #Captain Quick!\n        *set heroname \"Captain Quick\"\n    #Not so fast! My name isn't any of those!\n        *input_text heroname\n        \nSo let's just call it something like ${heroname}: 104 wins, the Sloth: 0 wins. That sounds about right.\n\nAs the Sloth struggles to his feet, you glance over to the intact portion of the Futuro Electronics display window. With the glow from the street light above, you can make out your reflection between the droplets of water on the glass. \n\nYou have to admit, you look spectacular for a 38-year-old. \n\n*fake_choice\n    #Not many women my age look this great!\n        *set gender \"female\" \n        *set him \"her\"\n        *set his \"her\"\n        *set he \"she\"\n    #Not many men my age look this great!\n        *set gender \"male\"\n        *set him \"him\"\n        *set his \"his\"\n        *set he \"he\"\n    #Not many people my age look this great!\n        *set gender \"nonbinary\"\n        *set him \"them\"\n        *set his \"their\"\n        *set he \"they\"\n        \nYour costume's styling has stood the test of time. Really, you can't go wrong with your chosen style.\n\n*fake_choice\n    #An aerodynamic spandex bodysuit.\n        *set uniform \"spandex bodysuit\"\n        It's a safe choice, and a logical one too. Why not keep yourself as streamlined as possible? \n    #A sleek track suit.\n        *set uniform \"track suit\"\n        Simple, comfortable, and so washable. Plus, it's cheap enough so that you can afford a whole closet full of them!\n    #Head to toe leather.\n        *set uniform \"leather uniform\"\n        Okay, so there's always a sweaty \"breaking in\" period when you buy a new uniform, but it looks awesome!\n    #A hoodie and jeans.\n        *set uniform \"street clothes\"\n        You've never felt the need to wear an 'official' uniform, choosing comfort and affordability over style. \n        \nAnd to keep your identity safe, you cover your face. What do you wear? \n\n*fake_choice\n    #A simple domino mask.\n        *set mask \"domino mask\"\n        Okay, so it only covers the area around your eyes, but it lets you feel the wind against your face. \n    #Goggles.\n        *set mask \"goggles\"\n        They're highly effective against road debris, glare from the sun, and the occasional bug! \n    #A ski mask.\n        *set mask \"ski mask\"\n        So you've had to convince a few citizens that ski masks aren't reserved only for bank robbers! Still, it hides your face completely, which is the whole point of having a secret identity.\n        \nYou squint over at the Sloth, shielding your eyes from the rain with one hand. Do you really have the time to continue pondering your uniform in the middle of the fight?\n\nHe slips on the slick pavement, and tumbles onto his back with a bellowed, \"Ouch!\"\n\nYep, you have more time.\n\nEvery famous hero has an equally famous color scheme for their uniform, and yours is no exception. \n\n*fake_choice\n    #Blue and gold!\n        *set color \"blue and gold\"   \n        Classic and timeless! \n    #Purple and green!\n        *set color \"purple and green\"\n        Sure, usually villains pick this combination, but nothing stops a hero from adopting it, right?\n    #A million shades of gray and black.\n        *set color \"gray and black\"\n        It's so very dark! And so very ominous!\n    #Basic red!\n        *set color \"red\"\n        No other speedster wears red, right?\n    #Something so awesome that it's never on a list like this!\n        *input_text color\n        \nYou eye the Sloth again. He's sitting up. He's pushing off the pavement. He's so close to standing up!\n\nOkay, it's time to wrap up your suit analysis!\n\nYour ${color} uniform has a unique element that makes you stand out from the crowd. What is it?\n\n*fake_choice\n    #A cape!\n        *set special \"cape\"\n        Sure, it can get caught in revolving doors sometimes, but you've learned to avoid those.\n    #A cool belt with '${heroname}' on it!\n        *set special \"belt\"\n        No, it's not a utility belt like that other hero uses in that other city. It's just a belt.\n    #Boots that always emit a stream of smoke!    \n        *set special \"boots\"\n        Sure, the effect looks odd when you're standing still, but when you zip away, it looks awesome!\n    #Glow-in-the-dark piping.\n        *set special \"piping\"\n        Running down your arms and legs, it turns you into a glowing blur, especially at night!\n        \nOkay, back to the Sloth.\n        \nHe pats under his right arm, and you notice a small dark-colored tote bag strapped over his shoulder. Proceeds from his theft, no doubt! Well, he won't be crawling away with that tonight!\n\n\"Hold…it…\" the Sloth huffs. You blink, and you're staring into the barrel of a revolver. Wait. This is new. The Sloth has never pulled a gun on you. \n\nNot in 15 years!\n\nBut now, his claw rests on the trigger and the barrel is aimed at your chest. It clicks as he cocks the hammer. \n\n\"This…is…too…important…${heroname},\" he mumbles, his hand unsteady and his eyes narrowed in squinty, wrinkled lines.\n\nHe can hardly see without his goggles. All you need to do is…\n\nA gasp from behind catches you off-guard. A young couple, unsteady on their feet, have blundered upon the scene. One drops an umbrella on the ground. The Sloth squints harder, his aim shifting to the new arrivals. He starts to squeeze the trigger.\n\n*fake_choice\n    #It's whirlwind time!\n        *set violence %+20            \n        With a mighty whoosh, you accelerate around the Sloth, tossing up trash cans, cardboard boxes, and other debris at your opponent. \n\n        The Sloth raises his hands to protect himself from the vortex. As you intensify the whirlwind, you make sure the citizens take the chance to flee.\n        \n        \"Get out of here!\" you bark to the couple. They scramble away as you turn back to the Sloth.\n        \n        \"Damn…you…\" he snarls, lowering his shoulder and forcing his way through his temporary wind prison.\n    #Block the shot!\n        *set tenacity %+20\n        \"Down!\" you yell to the couple. \n\n        Your eyes narrow at the barrel of the gun.\n        \n        Blam! The Sloth fires!\n        \n        Gazing at the streaking bullet, you swat your hand at the perfect time, knocking the bullet to the ground, where it lands with a clink.\n        \n        \"That…is…impossible,\" mumbles the Sloth.\n\n        \"Get out of here!\" you bark to the couple behind you. They scramble away as you stare down the Sloth. \n    #Distract him with my sick moves!\n        *set art %+20\n        \"Sloth, over here!\" you yell.\n\n        The Sloth's gun swings in your direction. He fires!\n\n        You perform a slick limbo move, arching back and watching the bullet zip past your face and strike the brick wall. \n        \n        \"You missed!\" you taunt. \"Huge surprise there!\"\n\n        One member of the couple screams, and you exhale in relief as you hear them run away.\n    #Charm the Sloth into holding his fire!\n        *set magnet %+20\n        \"Sloth, come on! Fighting me is one thing, I can take it! But shooting a civilian? You're better than that.\"\n        \n        The Sloth hesitates, his claw not yet squeezing back enough to fire.\n        \n        \"Have…it…your…way,\" he growls, returning his aim to you.\n\n        \"Get out of here!\" you bark over your shoulder at the couple. You exhale in relief as you hear them run away.\n\n*page_break\nWith the civilians safe, you set your jaw and glare at your arch-enemy. Another flash of lightning illuminates the sky; thunder booms. \n\nYou've played around with him too long. Those people could have been killed, and it would have been your fault. \n\nYour priority now? That gun!\n\n*fake_choice\n    #Talk him into putting it down!\n        *set magnet %+20    \n        You keep a light tone to your voice, as if bantering with a friendly rival rather than a deadly adversary. \n\n        Doing a few jumping jacks and stretching your hamstrings for added effect, you say \"Come on, toss the gun, Sloth! Let's do this the old-fashioned way, the way we always have!\" \n\n        The Sloth snarls, pausing before tossing the gun aside. \"I…don't…need…it!\"\n    #Tap him on the shoulder and snatch the gun away!\n        *set sneak %+20\n        With a mighty whoosh, you circle around the Sloth, tapping him on his left shoulder from behind.\n        \n        \"Huh…?\" he grunts, turning toward the tap.\n\n        You zip around to his right, snatching the gun from his hand and dashing back to your starting spot before he realizes what you did.\n\n        \"Damn…you!\" he snarls as you toss the gun aside.\n    #Calculate the perfect angle to send a shock wave.\n        *set brain %+20\n        It's just a matter of doing a little math. You vibrate your right hand into a blur. The Sloth takes aim just as your hand reaches the speed of sound!\n        \n        Boom!\n        \n        The shock wave thunders through the alley and bashes the Sloth! He hunches, trying to lift his gun hand.\n        \n        Gritting your teeth, you keep shaking your hand. The Sloth's claws try to keep their grip, but the vibrations succeed in loosening his hold on the weapon. The gun drops to the ground; you snatch it in mid-air and zip away, setting it down where he can't get to it. \n\n        \"Damn…you…\" he snarls.\n    #Focus my willpower to shift into an impossible-to-hit blur!\n        *set tenacity %+20\n        This sort of stunt takes all of your focus, but it's totally worth it!\n        \n        You cross your arms over your chest, vibrating your body so fast that you transform into a fuzzy, crackling version of yourself.\n        \n        \"Try it,\" you tell the Sloth, your voice popping and crackling.\n        \n        Shots ring in the night. Blam! Blam! Blam!\n\n        The revolver only holds six bullets, and within seconds, his chamber is empty. The Sloth stares in disbelief as you stand there, untouched.\n\n        The Sloth growls at you, \"You…ruin…everything!\"\n\n*page_break\nWith the gun no longer a factor, this fight is over! You can treat it as practice now, a chance to hone your greatest weakness.\n\n*fake_choice\n    #My intelligence!\n        *set brain %-20\n        What can you say? Even after all of these years, you sometimes feel a bit slow-witted, nothing like that know-it-all detective in that other city!\n        \n        But maybe you can strengthen your mind against the Sloth!\n        \n        The Sloth lumbers toward you, raising his claws. You start calculating the optimal time to zip away!\n    #My stealth!\n        *set sneak %-20\n        What can you say? Even after all of these years, you sometimes feel a bit clumsy, nothing like that slippery ninja in that other city!\n        \n        But maybe you can strengthen your guile against the Sloth!\n        \n        The Sloth lumbers toward you, raising his claws. You plan to zip away to the shadows!\n    #My charisma!\n        *set magnet %-20\n        What can you say? Even after all of these years, you sometimes feel a bit drab, nothing like that charming futurist in that other city!\n        \n        But maybe you can strengthen your gravitas against the Sloth!\n        \n        The Sloth lumbers toward you, raising his claws! You'll zip around him and sternly remind the Sloth that you're out of his league! \n    #My fighting prowess!\n        *set violence %-20\n        What can you say? Even after all of these years, you sometimes feel a bit puny, nothing like that invincible alien in that other city!\n        \n        But maybe you can toughen yourself up against the Sloth!\n        \n        The Sloth lumbers toward you, raising his claws! It's time for a speed rush right into his chest!\n    #My resolve!\n        *set tenacity %-20\n        What can you say? Even after all of these years, you sometimes feel a bit timid, nothing like that tireless patriot in that other city!\n        \n        But maybe you can strengthen your resolve against the Sloth!\n        \n        The Sloth lumbers toward you, raising his claws! You're going to zip forward and block his attack!\n    #My creativity!\n        *set art %-20\n        What can you say? Even after all of these years, you sometimes feel a bit uninspired, nothing like that clever conjurer in that other city!\n        \n        But maybe you can strengthen your imagination against the Sloth!    \n        \n        The Sloth lumbers toward you, raising his claws! It's time to zip onto his back and ride him like a big (very slow) bull!\n\nYou start to raise your heel and whoosh ahead. It's a move you've made a thousand times. \n\nBut the ball of your foot slips on the slick ground. \n\nYour ankle rolls, throwing you off balance. \n\nAnd the Sloth's claws finally find their mark!\n*page_break\n\nA rush of scalding pain shoots up your right arm. You twist away, stumbling until your back slams against Futuro's brick facade. Grinding your teeth, you clamp your left hand over the wound. Immediately, your fingers are wet.\n\nThe Sloth's mouth hangs open as he gasps, \"I…did…it.\" You watch him raise his hand and gaze at his claws, impaled on a bloody shred of your ${uniform}. \n\nA wave of dizziness causes your head to roll back and your knees to buckle. You blink furiously to stay awake. Each time you open your eyes, the Sloth looms larger. \n\n\"I've…waited…so…long,\" he snarls. \n\nYou blink again and open your eyes, staring into a mouth of crooked teeth. Ragged breaths smelling of rotten eggs assail your nostrils. The Sloth's thick forearm crushes your throat. He's too heavy, too strong. No matter how hard you try, you can't push yourself from the wall. \n\nEverything is blurry. It's hard to concentrate.\n\n*fake_choice\n    #I screwed up! This is my time.\n        *set ego %-10\n        Even with your powers, you're just as human as anyone else. Another slash of the Sloth's claws will end you.\n    #As long as I'm breathing, I have a chance.\n        *set future %+10\n        You've never given up before. Why now? You grasp the Sloth's forearm with both hands and push against his weight. But it's no use; he's too heavy.\n    #I can't let this nobody kill me!\n        *set ego %+10\n        It can't end like this, not after 15 years of battles! You'll meet your end saving the world or something, not in some dingy alley!\n    #I had a good run. That's more than most people can say.    \n        *set future %-10\n        You've served as Valiant City's guardian for 15 years, helping countless citizens along the way. No one can ever take that from you.\n        \nPolice sirens pierce the night sky, and you silently thank the couple who blundered upon the scene. The Sloth's forearm eases up the pressure. \"I…want…to…end…you…slowly,\" he growls into your ear. \"Now…I…know…I…can.\"\n\nYour enemy backs off, squinting around, presumably for an escape route. He lumbers down an alley on all fours before disappearing into the shadows, the tote bag still secured around his shoulder. \n\nYou can't stop blinking. You need to sleep.\n\nJust sit down in the alley and sleep.    \n\nNo. You can't.\n\nBefore you lose consciousness, you summon some of your Juice, your emergency energy reserves. In a whoosh, you zip off to your only refuge.\n*set juice -20\n*page_break Everything goes dark…\n*finish\n", "10-resolution": "*page_break\n*text_image chap_10.png center Chapter Ten Loose Ends\n\n\"You did good, Boss,\" Whippet huffs as you both finally reach the lobby. She lowers her hood and tries to tame her frazzled hair.\n\nYou wait for one of Whippet's patented verbal jabs to follow her compliment, but it never comes.\n\nYou give her a wink. \"You too.\"\n\nAs soon as you push open the revolving doors of Zenith Tower, a crowd of reporters swarms from the sidewalk. Everyone shouts out questions as if theirs is more important than the others.\n\n\"Tell us what happened up there! Is the city in danger?\"\n\n\"Where is the Sloth? Is he in custody?\"\n\n\"Are you working with the VCPD? Did they authorize your involvement?\"\n\n*if (ego > 50)\n    You instinctively step up to field the questions. After all, you're still the 'main' hero, and Whippet is still the sidekick. You whisper over to her, \"Your time will come,\" before you launch into a blow-by-blow account of your show-down with the Sloth.\n    \n    From the corner of your eye, you see Whippet purse her lips and cross her arms over her chest. \n    \n    She may not be happy, but she's not ready yet. And you're not ready to pass the baton.\n    *goto sloth_handled\n*else\n    You give Whippet a look and gesture outward in a sweeping motion toward the members of the media. \"Why don't you take the questions?\"\n    \n    Whippet's eyes go wide. \"Are you legit serious?\"    \n    \n    You nod. \"I've never been so legit serious in my life.\"\n    \n    Standing back, you can't help but smile as Whippet starts talking with the reporters. She's growing into quite the hero. \n    \n    And one day, she'll want to strike out on her own.\n    \n    But you're not ready for that yet.\n    *goto sloth_handled\n    \n    \n*label sloth_handled\n*page_break\nWith the Sloth's threat handled, at least for now, you have time to take a breath and consider some personal decisions.\n\nWhat does the future hold with you and $!{ro_name}?\n\n*choice    \n    #I reaffirm my love for $!{ro_name}. We can make this work.\n        *if ro >60\n            *set romantic_status \"ro\"\n            *achieve happily\n            $!{ro_name} smiles and hugs you tightly when you break the news. \n        \n            \"I feel the same way, ${mc_petname}! I love you so much! You're my everything, you know?\"\n            \n            *if (puppy = \"yes\")\n                Your pug puppy sneezes in apparent agreement, squeezing in between the two of you.\n        \n            \"We're a team,\" you whisper in ${ro_his} ear. \"Always.\"\n        \n            \"A team, huh?\" $!{ro_name} whispers back. \"That gives me all sorts of ideas.\"\n        \n            Whippet is unusually salty when you share your good news later. \"Hey, I'm happy for you, you know that. But I've got dibs on the sidekick…I mean crime-fighting collaborator…gig!\"\n            *goto professional_goals\n        *if ro > 45   \n            *set romantic_status \"ro\"\n            $!{ro_name} nods when you break the news. \n        \n            \"I think we can too,\" $!{ro_name} says, \"as long as you're willing to change.\"\n        \n            \"[i]Me[/i] change?\" you ask.\n        \n            \"Would it be asking too much for you to prioritize me over the crime-fighting stuff? I mean, doesn't that seem reasonable for someone your age instead of running around with an 18-year-old?\"\n        \n            \"Wait, how did this become about me?\" \n            \n            *if (puppy = \"yes\")\n                Your pug puppy sneezes and trots out of the room as the bickering starts. \n        \n            \"And another thing,\" $!{ro_name} adds, summarizing all of your mistakes over the past six months.\n        \n            And the six months before that.\n        \n            Whippet rolls her eyes when you share the news later. \"It sounds like true love, alright, Boss. Sounds awesome. Just, uh, awesome.\"\n            *goto professional_goals\n        *else\n            *set romantic_status \"single\"\n            \"Make this work?\" $!{ro_name} asks incredulously. \"Are you on drugs? Did you run into a wall or something?\"\n        \n            \"Excuse me?\" you ask.\n        \n            \"There's nothing to 'make work' here. I mean, I thought we both kind of understood that we were each doing our own thing and just sort of, sharing space.\"\n        \n            \"Sharing space?\"\n        \n            \"Look, Peyton and I have been together for, well, for a while. I'm moving out.\"\n        \n            Whippet struggles to fight a wide smile when you share the news later. \"That's horrible, like that really sucks. But at least we can train more at your house again, right? I mean, I assume $!{ro_name} is taking all the lamps.\"        \n        *goto professional_goals\n    #I end things with $!{ro_name} and pursue Silver Rocket.\n        *if ro > 65\n            $!{ro_name}'s face falls, devastated at your news. \"You…want to break up? I thought you were happy. I thought [i]we[/i] were happy!\"\n        \n            You pause, sensing there's more to come.\n        \n            There is.\n        \n            $!{ro_name}'s tone gets nastier with each word. \"But you obviously prefer this Silver person to me! How am I supposed to compete with that? I can't fly! I don't get to zip around the city and play hero.\"\n        \n            @{ro_he2 His forehead wrinkles as he scowls.|Her forehead wrinkles as she scowls.|Their forehead wrinkles as they scowl.} \"Is is the rocket pack? Some sort of sick fetish?\"\n        \n            Things go downhill from there. $!{ro_name} moves out two days later.\n        \n            Whippet cocks her head in curiosity when you share the story later. Her voice lowers as she asks, \"Just between the two of us, [i]is[/i] it the rocket pack? Because I can totally see that.\"        \n            *goto silverrocket_ask\n        *if ro > 45\n            $!{ro_name} doesn't seem surprised by the news.\n        \n            \"I should have suspected something like this would happen. It makes sense, spending all that time [i]on patrol[/i] or whatever it is you call it.\"\n        \n            You pause, sensing there's more to come.\n        \n            There is.\n        \n            \"But…maybe it's for the best,\" $!{ro_name} says. \"I know things haven't been right for a long time. We have a lot to talk about.\"\n        \n            Over the next few days, you and $!{ro_name} agree to end your relationship amicably, splitting your possessions evenly. $!{ro_name} is the one to move out, insisting that a fresh start is needed.\n        \n            Whippet fights a yawn later when you share the news. \"So, you're both being mature and civilized about the whole thing? Who does that?\"\n            *goto silverrocket_ask\n        *else\n            $!{ro_name} scoffs at the news. \n            \n            \"Oh, that's a big shocker! One egotistical hero wants to bang another egotistical hero!\"\n            \n            You pause, sensing that there's more. \n            \n            There is.\n            \n            \"You know what, I don't even care! I've been with Peyton for a while now. It's refreshing to be with someone who actually puts my needs first. You might want to try it sometime!\"\n            \n            Things get even uglier when $!{ro_name} goes on social media and trashes Silver Rocket on ${ro_his} own fan page, spreading vicious lies about your colleague.\n            \n            Whippet texts you later. \n            \n            [i]hey did u know rocket legit stole 4 sick puppies from a puppy orphanage? that sicko!![/i]\n            *goto silverrocket_ask        \n    #I end things with $!{ro_name}. I don't want a relationship.\n        *if ro > 65\n            *set romantic_status \"single\"\n            \"I see,\" $!{ro_name} stammers, the shock apparent on ${ro_his} face. \"I'm so stupid! I thought you were happy. I thought [i]we[/i] were happy.\"\n            \n            You pause, sensing that there's more.\n            \n            There is.\n            \n            \"If you didn't want to be with me, why did you wait this long to tell me? It's been years! Years! If you wanted to be alone, you should have been honest with me. You owe me that much!\"\n            \n            You bite your lip and stop yourself from reminding $!{ro_name} of ${ro_his} own dishonesty. \n            \n            $!{ro_name} moves out two days later. Although emotions are still raw, goodbyes are civil and fairly calm. There's even a hug.\n            \n            \"I hope you find whatever you're looking for,\" $!{ro_name} says, carrying boxes to ${ro_his} car.\n            \n            Whippet pats you on the back when she hears the news. \"That's rough, really rough. But I guess the good news is that you get to spend more time with me? So…yay?\"\n            *goto professional_goals\n        *if ro > 45\n            *set romantic_status \"single\"\n            $!{ro_name} doesn't seem surprised by the news.\n        \n            \"I should have suspected something like this would happen. You just put everything into your work, you don't leave enough for anyone else. You never really have.\"\n        \n            You pause, sensing there's more to come.\n        \n            There is.\n        \n            \"It's for the best,\" $!{ro_name} says. \"I know things haven't been right for a long time. And it's not just you. I need to focus on myself too.\"\n        \n            Over the next few days, you and $!{ro_name} agree to end your relationship amicably, splitting your possessions evenly. $!{ro_name} is the one to move out, insisting that a fresh start is needed.\n        \n            Whippet fights a yawn later when you share the news. \"So, you're both being mature and civilized about the whole thing? Who does that?\"\n            *goto professional_goals\n        *else\n            *set romantic_status \"single\"\n            $!{ro_name} scoffs at the news. \n            \n            \"Oh, so you finally decided that you don't have enough room in your life for anyone other than you, your massive ego, and some teenager running around in dog pajamas?\"\n            \n            You pause, sensing that there's more. \n            \n            There is.\n            \n            \"You know what, I don't even care! I've been with Peyton for a while now. It's so refreshing to be with someone who actually puts my needs first. Of course, you wouldn't know what that's like!\"\n            \n            The next few days are especially nasty. $!{ro_name} moves out, taking more than ${ro_his} share of your stuff. \n            \n            Whippet looks around the mostly empty house. \"Well, on the bright side, there aren't nearly as many lamps to break anymore. So that's like…something, right?\"\n            *goto professional_goals\n            \n        \n*label silverrocket_ask\n*page_break\nOf course there's still the issue of talking to Silver Rocket. You get your chance a few nights later on a joint patrol when you hint you'd be interested in a date.\n\n*if silver > 50    \n    *set romantic_status \"silver\"\n    \"Hmmm…\" Silver Rocket lowers ${ro_his} visor just an inch, eying you with a smirk. \"A date, huh?\"\n    \n    The hero pauses before blasting off, the moonlight illuminating the contours of ${ro_his} form-fitting uniform. \n    \n    \"You're free to try to catch me, ${heroname},\" the hero shouts over ${ro_his} shoulder, \"if you can.\"  \n    \n    You grin. [i]The chase is on![/i]\n    *goto professional_goals\n*else\n    *set romantic_status \"single\"\n    \"Hmmm…\" Silver Rocket bites ${ro_his} lip before responding. \"I've had some bad luck mixing business and pleasure; it can make things really complicated. Maybe we can see how things go as colleagues?\"\n    \n    You nod, shrugging it off. \"Oh, sure. That totally makes sense.\"\n    \n    \"Okay, back to work!\" Silver Rocket blasts off, the moonlight illuminating the contours of ${ro_his} form-fitting uniform.    \n    \n    You sigh. [i]Colleagues it is.[/i]\n    *goto professional_goals\n        \n        \n*label professional_goals\n*page_break\nThere's more to consider than relationships. \n\nThere's the issue of the Miscreants popping up everywhere and causing mayhem. Maybe you can intimidate them into backing off, at least temporarily?\n\nAnd what about that big shoe contract Echo Rylan mentioned to you? Do you focus on winning it?\n\nAlso, the mayor's term ends soon. Are you popular enough to run for mayor and win? Think about all the good you could accomplish!\n\n*choice\n    #I sit down and demand concessions from the Miscreants. \n        *if rogues > 3 \n            *set professional_status \"treaty\"\n            The talks go better than you ever could have anticipated. They're definitely intimidated by you.\n            \n            K9er, Speedbump, and Perpetual Man agree to your terms.\n            \n            K9er strokes a pug on her lap. \"We'll agree to temporarily halt our various…enterprises, at least here in the city. The key word is [i]temporarily[/i].\"\n            \n            Perpetual Man nods, leaning back with his hands behind his head. \"And in the meantime, 'acquisitions' outside city limits are fair game for us. You'll look the other way.\"\n            \n            Speedbump tilts her head to Perpetual Man. \"Acquisitions?\"\n            \n            \"Taking things that don't belong to us,\" he replies, rubbing his forehead.\n            \n            \"Oh, that'll make it easier to upgrade my armor!\" Speedbump says, perking up. \"And just a warning, ${heroname}, I'll be back! You and I are like the Yin and the Yang, Romeo and Juliet, ice cream and sprinkles. Our fates are intertwined!\"\n            \n            K9er makes a low growling sound to Perpetual Man. \"Is she officially in the group?\"        \n            *goto whippet_joke                                  \n        *else\n            *set professional_status \"none\"\n            The talks don't go exactly as planned. They just aren't afraid of you. Nothing changes.\n            \n            K9er growls, stroking a dog on her lap. \"You have some nerve, trying to tell us what we can and can't do in this city! Go piss on a hydrant.\"\n            \n            Perpetual Man nods, leaning in and lowering his voice. \"I'm not afraid of you. You can beat me 100 times, but I'll keep coming back. All it takes is one lucky shot, and you're history.\"\n            \n            Speedbump elbows Perpetual Man. \"Just to clarify, I'll be the one to end you, ${heroname}, and it will be an epic battle! Heroes and villains from across the country, nay, the globe, will marvel at our showdown!\" She pauses and adds, \"But I need to finish some hologram upgrades first.\"\n            \n            K9er makes a low growling sound to Perpetual Man. \"Is she officially in the group?\"    \n            *goto whippet_joke\n    #I run for Mayor. I'm popular enough to beat that moron!   \n        *if pop > 65  \n            *set professional_status \"mayor\"\n            You win in a landslide! The city council passes legislation allowing you to serve as mayor while keeping your identity secret. It's a win/win!\n        \n            You give an impressive speech and vow to steer the city on an exciting new course.\n        \n            But Whippet brings you back to earth as she scans a list of your official duties. \"Uh, ya realize that this is mostly a ceremonial position, right? The city council has all the power.\"\n        \n            Her eyes light up when she digs around in a desk drawer and pulls out a pair of comically large plastic scissors.\n        \n            \"Forget what I just said! This is legit the best job in the world!\"\n            *goto whippet_joke\n        *if pop > 45   \n            *set professional_status \"none\"\n            You lose in a nail-biter! Voters just weren't quite ready to vote for a person with a secret identity into office.\n            \n            *gosub whippet_scissors\n            *goto whippet_joke\n        *else\n            *set professional_status \"none\"\n            You lose in a landslide! Across the political spectrum, voters agreed that you having a secret identity was a deal-breaker. \n            \n            *gosub whippet_scissors\n            *goto whippet_joke            \n    #I pursue the big bucks with Steps Ahead. They should be impressed with me.\n        *if commercial > 3\n            *set professional_status \"contract\"\n            \"Well, I have good news for you,\" Echo Rylan says with sustained eye contact over dinner. \"The Board wants you. It's a done deal. All I need is your signature.\"\n            \n            \"And the payment?\" you ask.\n            \n            Rylan twists ${ro_his} lips. \"I have this urge to write down the number on a cocktail napkin and slide it over to you, like in the movies. But I don't have a pen on me.\"   \n            \n            \"Write it in the air.\"\n            \n            Rylan laughs and uses ${ro_his} index finger to write a number in the air. You count 5 zeros.\n            \n            @{ro_he2 Then he adds|Then she adds|Then they add} another zero.\n            \n            You swallow hard and use your index finger to write out the word, \"Deal.\"\n            \n            \"Welcome to the team,\" Rylan says, clinking glasses with you.\n            *goto whippet_joke\n        *else   \n            *set professional_status \"none\"\n            Echo Rylan sends you an email with the company's response.\n            \n            [i]The Board decided to go another way. They felt that a more youthful spokesperson might speak more effectively to our target audience.[/i]\n            \n            [i]Let's stay in touch. Between you and me, I'm not sure how this new strategy is going to work out.[/i]\n            \n            Whippet texts you a few days later. [i]hey the new steps ahead commercial is dope. they use this guy quickie who is fast af! hes like half your age I think. sorry.[/i]\n            *goto whippet_joke\n\n\n*label whippet_joke\n*page_break\nAs it always does, Valiant City moves forward from the Sloth's attack.\n*if citydamage > 1\n    Crews work diligently to fix the electronic infrastructure destroyed by the Sloth's EMP machine. It may take years, but people seem to be adjusting to the new 'normal.' People are less distracted. Newspapers make a comeback. And commuters ride bikes to work instead of hover-cars.\n    \n    But for all the positives, lives were lost because of the Sloth's attack. Hospitals and transit systems were hit especially hard. \n    \n    A well-known hero from another city, a futurist relying on technology to solve every problem, offers to help, promising to cut the recovery time by 95 percent.   \n    \n    Only time will tell if that prediction proves to be accurate.\n    *goto routine_10    \n*if citydamage > 0\n    The \"Dark Zone\" around Zenith Tower becomes a refuge from technology. Some citizens seem to welcome the sanctuary, embracing a slower pace in the eight-square block area.\n    \n    The city closes roads in the Dark Zone, and converts much of it to park land.     \n    \n    Echo Rylan announces that Steps Ahead will build a new headquarters and will convert Zenith Tower for public use.\n    *goto routine_10\n*else\n    Your quick thinking that fateful night protected the city's infrastructure. For better or for worse, the city's frantic pace continues.\n    *goto routine_10\n\n*label routine_10\n\nYou get into a routine again, which includes daily training with your sidekick.\n\nWhippet glances at you during a leisurely 200-mph jog through Valiant City.\n\n*if citydamage > 1\n    You both wear night-vision goggles to compensate for the total lack of street lamps.\n    *goto nod_10   \n*if citydamage > 0\n    You've each brought a pair of night-vision goggles to use when you enter the \"Dark Zone\" around Zenith Tower.\n    *goto nod_10\n*else\n    The city shines brighter than ever, its lights casting a glow through the night sky.\n    *goto nod_10\n\n*label nod_10\n*page_break\nAnd you ponder your place in the hero landscape, and the world in general.\n\n*if (future > 50)\n    Not everything went perfectly in the past few days, but you're convinced that you can still do good in the world. Sure, you're pushing 40, but that doesn't mean that you're going downhill. You have some gas left in the tank!\n           \n    And whenever you hang up your uniform for good, you're confident that you can carve out a second act for yourself and adapt to whatever comes your way. After all, if the fastest person in the world can't keep up with progress, who can?\n    \n    Your thoughts of a bright future are interrupted by your young sidekick. \n    *goto boss_ask\n*else\n    The events of the past few days make you wonder how much longer you can keep up this pace. Young people, with their tech-savvy and fresh ideas, are the future. You're pushing 40, and in just a few years, you'll be viewed as a relic.\n    \n    You already feel overwhelmed by the rapid pace of change in the world, and things aren't going to slow down, that's for sure. Some people might say that 40 is the new 30, but which people actually say that?\n    \n    40-year-olds. \n    \n    Your thoughts of obsolescence are interrupted by your young sidekick.\n    *goto boss_ask\n    \n*label boss_ask    \n\n\"Hey Boss, can I ask you something?\" \n\nYou nod, maintaining your pace. \"Sure, what?\"\n\n\"Something's been bothering me. I've been talking to other sidekicks, I mean crime-fighting collaborators, and well, they all seem to know their heroes better than I know you.\"\n\n\"Uh, you've trained in my house, Whippet. You know where I live.\"\n\nShe nods. \"Yeah, I know. But you've never told me certain stuff, private stuff.\"\n\n\"Such as?\" you ask, cocking your head.    \n\n\"Like, well, your social security number. Your date of birth.\" Whippet's voice goes funny as she ducks her head down out of your view.\n\n*fake_choice    \n    #\"Are you okay?\"\n    #\"Is something wrong?\"\n    #\"Uh, are you being serious?\"\n    \nYour sidekick's head raises back to you as she slurs the word, \"Yesssssss!\"\n\nAnd she's wearing a futuristic visor like the Yes Men wear.\n\n\"Damnit, Whippet,\" you sigh, rolling your eyes. \"You are not under mind control.\" \n\n\"It didn't surprise ya at all? Geez, there goes 45 bucks down the drain!\" \n\nShe shrugs and tosses the visor over her shoulder. \"Wanna really stretch our legs? I'll race ya to Port Noir! I hear it's super filthy and awesome!\"\n\nWhippet zips ahead, bursting with youthful exuberance. \n\nYou smirk to yourself and pick up the pace. You can't turn back the clock, and you know that one day Whippet will beat you in a race like this one.\n\nBut today's not that day.    \n*goto end\n*label end\n*page_break End\nWe hope you've enjoyed playing [i]Zip! Speedster of Valiant City[/i].\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99   \n\n\n*comment gosubs\n\n*label whippet_scissors\n\"It's okay,\" Whippet reassures you, slapping you on the back. \"I found out that it's more of a ceremonial position anyway. And look what I found for you when I zipped around the mayor's office!\"\n        \nShe holds out a pair of comically large plastic scissors.\n        \n\"Am I the best crime-fighting collaborator in the world or what?\"\n*return\n\n\n\n\n\n\n", "2-partnerintro": "*text_image chap_2.png center Chapter Two Memory Lane\n\n*check_purchase adfree\n*if choice_purchased_adfree\n    *set juice_boost true\n*set ro_he2 1\nA voice calls out, but it's hard to understand. You shake your head feebly. Who's talking? What are they saying?\n\n*if (gender = \"male\")\n    *goto male_names_act1\n*if (gender = \"female\")\n    *goto female_names_act1\n*else\n    *goto all_names_act1\n\n*label male_names_act1\nWait. The voice is calling a name. Your name.\n\n*choice\n    #Nicholas\n        *set firstname \"Nicholas\"\n        *goto lastnames_act1\n    #Elijah\n        *set firstname \"Elijah\"\n        *goto lastnames_act1\n    #Tyler\n        *set firstname \"Tyler\"\n        *goto lastnames_act1\n    #Isaiah\n        *set firstname \"Isaiah\"\n        *goto lastnames_act1\n    #Matthew\n        *set firstname \"Matthew\"\n        *goto lastnames_act1\n    #Bruce\n        *set firstname \"Bruce\"\n        *goto lastnames_act1\n    #Carlos\n        *set firstname \"Carlos\"\n        *goto lastnames_act1\n    #I don't hear any of those. I hear…\n        *input_text firstname\n        *goto lastnames_act1\n    \n*label female_names_act1\nWait. The voice is calling a name. Your name.\n\n*choice\n    #Alexis\n        *set firstname \"Alexis\"\n        *goto lastnames_act1\n    #Jade\n        *set firstname \"Jade\"\n        *goto lastnames_act1\n    #Megan\n        *set firstname \"Megan\"\n        *goto lastnames_act1\n    #Coral\n        *set firstname \"Coral\"\n        *goto lastnames_act1\n    #Jessica\n        *set firstname \"Jessica\"\n        *goto lastnames_act1\n    #Jayla\n        *set firstname \"Jayla\"\n        *goto lastnames_act1\n    #Emily\n        *set firstname \"Emily\"\n        *goto lastnames_act1\n    #I don't hear any of those. I hear…\n        *input_text firstname\n        *goto lastnames_act1\n    \n    \n*label all_names_act1\nWait. The voice is calling a name. Your name.\n\n*choice\n    #Skyler\n        *set firstname \"Skyler\"\n        *goto lastnames_act1\n    #Justice\n        *set firstname \"Justice\"\n        *goto lastnames_act1\n    #Ramsey\n        *set firstname \"Ramsey\"\n        *goto lastnames_act1\n    #Murray\n        *set firstname \"Murray\"\n        *goto lastnames_act1\n    #Clarke\n        *set firstname \"Clarke\"\n        *goto lastnames_act1\n    #Dakotah\n        *set firstname \"Dakotah\"\n        *goto lastnames_act1\n    #Ryley\n        *set firstname \"Ryley\"\n        *goto lastnames_act1\n    #I don't hear any of those. I hear…\n        *input_text firstname\n        *goto lastnames_act1\n    \n\n*label lastnames_act1\nYes, you hear \"$!{firstname}\" over and over, from a familiar voice. And once or twice, the voice says your last name too. \n\n*fake_choice\n    #Bishop\n        *set lastname \"Bishop\"        \n    #Kim\n        *set lastname \"Kim\"        \n    #Rich\n        *set lastname \"Rich\"  \n    #Sterling\n        *set lastname \"Sterling\"       \n    #Watts\n        *set lastname \"Watts\"  \n    #Waverly\n        *set lastname \"Waverly\"       \n    #Henry\n        *set lastname \"Henry\"      \n    #I don't hear any of those. I hear…\n        *input_text lastname\n\n\"$!{firstname}, hey $!{firstname} $!{lastname}, you need to wake up.\"\n\nThe speaker comes into focus, and a smile of relief spreads across your lips even as a sharp pain shoots down your shoulder. \n\nYou're home. \n\n\"Hey there,\" you mumble, gazing up at the same face you've woken up to for over a decade; 13 years to be exact. You reach up and stroke the person's cheek.\n\n*fake_choice\n    #It's a man.\n        *set orientation \"men\"\n        *set ro_he \"he\"\n        *set ro_he2 1\n        *set ro_him \"him\"\n        *set ro_his \"his\"\n    #It's a woman.\n        *set orientation \"women\"\n        *set ro_he \"she\"\n        *set ro_he2 2\n        *set ro_him \"her\"\n        *set ro_his \"her\"\n    #It's a person not defined by traditional views of gender.   \n        *set orientation \"nonbinary\"\n        *set ro_he \"they\"\n        *set ro_he2 3\n        *set ro_him \"them\"\n        *set ro_his \"their\"\n        \nAnd you remember ${ro_his} name.\n*fake_choice\n    #Campbell.\n        *set ro_name \"Campbell\"        \n    #Salem.\n        *set ro_name \"Salem\"        \n    #Perry.\n        *set ro_name \"Perry\"        \n    #Jules.\n        *set ro_name \"Jules\"        \n    #Oakley.\n        *set ro_name \"Oakley\"\n    #It's something else.\n        *input_text ro_name\n        \nYes, that's it.\n    \nYou struggle to sit up in bed, tossing the sheets to the side. Another jolt of pain races down your shoulder. You wince but wave your hand to show $!{ro_name} that you're okay. \n\n$!{ro_name} gently urges you to lay back down, using the pet name ${ro_he} gave you years ago. \n\n*fake_choice\n    #Babe.\n        *set mc_petname \"babe\"\n    #Boo.\n        *set mc_petname \"boo\"\n    #Honey.\n        *set mc_petname \"honey\"\n    #Love.\n        *set mc_petname \"love\"\n    #It's something else.\n        *input_text mc_petname\n                \n\"$!{mc_petname}, take it easy,\" $!{ro_name} says, \"I had to stitch you up.\"\n\n\"Ugh, what happened?\" you mumble, rubbing your head.\n\n\"I was going to ask you the same question,\" $!{ro_name} replies, ${ro_his} brow wrinkled in concern. \"Your vitals were going crazy: heart rate, blood pressure, everything. I could tell it was more than just exertion; you were hurt! Remember how you argued that I was going overboard monitoring you 24/7?\"\n\nYou nod. $!{ro_name} just doesn't monitor your vitals, but also your location, your movements, and your conversations, all through an electronic patch on your neck. $!{ro_he} even tried to install a camera, but it would have been of little use at high speeds, and the plan was scrapped.\n\n\"Yeah,\" you reply, glancing at the gauze wrapped around your shoulder, \"What would I do without my own personal medic, slash computer whiz, slash tailor, slash crime analyst?\"\n\n@{ro_he2 He runs his hands through your hair,|She runs her hands through your hair,|They run their hands through your hair,} fingertips gently scratching your scalp. \"You do all the important stuff. I just help.\"\n\nYou close your eyes and enjoy the intimate gesture, reminded of what you admire the most about $!{ro_name}.\n\n*fake_choice\n    #$!{ro_his} intelligence.\n        *set ro_trait \"intelligence\"\n        $!{ro_name}'s brilliance is impossible to ignore. With degrees in nursing and criminal justice, vast technical knowledge, and even a CEH (certified ethical hacker) certification, ${ro_he} can get you out of almost any jam. And plus, it's sort of awesome to have a partner who is just wicked smart.\n    #$!{ro_his} compassion.\n        *set ro_trait \"compassion\"\n        $!{ro_name}'s compassion sometimes seems endless. @{ro_he2 He stays|She stays|They stay} incredibly busy just supporting your exploits, but @{ro_he2 he finds|she finds|they find} the time to volunteer with the Valiant City Adopt-A-Dog program and work twice a week with reluctant readers in a local elementary school. \n    #$!{ro_his} sexiness.\n        *set ro_trait \"sexiness\"\n        You'll admit that it was pretty much lust at first sight when you first met $!{ro_name} all those years ago. $!{ro_his} hair, ${ro_his} smile, and that body; you couldn't peel your eyes away, even if you had tried.  And somehow ${ro_he} picked you. It was hard to believe your luck.\n \nAnd that's not $!{ro_name}'s only awesome quality, to be sure. In many ways, @{ro_he2 he is|she is|they are} a near perfect partner. \n\nYou try to focus on that, and sometimes you go days, or even weeks, without being reminded of how ${ro_name} so recently broke your trust, and your heart.\n\n*page_break Two years ago…\n\"$!{ro_name}, how…could you?\"\n\nYou had just gotten home after a patrol, sweaty and still panting. $!{ro_name}, always so vigilant in monitoring your every move, was sloppy that day. You zipped in the front door and surprised ${ro_name} while @{ro_he2 he was|she was|they were} doing something you could never imagine!\n\n*choice\n    #Having sex with ${ro_his} supposed \"friend.\"\n        *set ro_crime \"affair\"\n        *goto ro_affair_act1        \n    #Gambling away our life's savings.\n        *set ro_crime \"gambling\"\n        *goto ro_gambling_act1            \n    #Drunkenly chatting on the phone with someone about my secret identity.\n        *set ro_crime \"secret\"\n        *goto ro_secret_act1\n    \n*label ro_affair_act1\nThe image is burned in your brain and you still can't scrub it away no matter how hard you try.\n\nYou remember staggering back, a wave of nausea forcing you to kneel. You never dreamed $!{ro_name} would cheat on you. Everything had seemed fine! And what made it hurt even more? The love of your life had invited this same \"friend\" over for dinner just two nights earlier! \n\nYou felt like such an idiot! $!{ro_name} had convinced you that it was totally platonic between the two of them. \n\nAnd then you find the two of them having sex in your own bed! \n\nAfter spending all those years with the same person, you had some serious decisions to make.\n*page_break\n\nScreams and tears and promises followed. $!{ro_name} begged you for forgiveness, promising that it had been a one-time thing, and that the \"friend\" meant nothing to ${ro_him}. \n\nThen $!{ro_name} started pointing out the issues in your relationship. How you spent most of your time racing around the city, focusing more on total strangers than your own partner, how you treated $!{ro_name} more like a roadie than a partner.\n\n\"$!{firstname}, I love you, I truly do,\" $!{ro_name} pleaded, tears streaking ${ro_his} cheeks, kneeling in front of you and grasping for your hands, ${ro_his} fingers interlocking with yours. \"I'm not perfect! I made a mistake! I was just lonely!\"\n\nYou swallowed your rage and bit your lip as $!{ro_name} babbled with swollen, puffy eyes, \"Please don't throw this all away just because of one mistake! Will you give me another chance? Can we work on this? Please?\"\n*goto took_ro_back_act1\n\n\n\n*label ro_gambling_act1\nThe image is burned in your brain and you still can't scrub it away no matter how hard you try.\n\nYou remember staggering back, a wave of nausea forcing you to kneel as you caught $!{ro_name} blowing $5,000.00 on a single round of online poker. Then you reviewed all the credit card statements. The extent of ${ro_his}'s addiction became clear. \n\nYou never dreamed $!{ro_name} would ruin you. Everything had seemed fine! And what made it hurt even more? That money was earmarked to let you and ${ro_him} travel the world and eventually retire with dignity. \n\nYou were in your mid-30s, and had to start your financial life all over. You had some serious decisions to make with your partner.\n*page_break\n\nScreams and tears and promises followed. $!{ro_name} begged you for forgiveness, promising to get professional help for ${ro_his} gambling addiction.  \n\nThen $!{ro_name} started pointing out the issues in your relationship. How you spent most of your time racing around the city, focusing more on total strangers than your own partner, how you treated $!{ro_name} more like a roadie than a partner.\n\n\"$!{firstname}, I love you, I truly do,\" $!{ro_name} pleaded, tears streaking ${ro_his} cheeks, kneeling in front of you and grasping for your hands, ${ro_his} fingers interlocking with yours. \"I have a problem, but I'll see a therapist, I promise! And you can take care of the finances for now on!\"\n\nYou swallowed your rage and bit your lip as $!{ro_name} babbled with swollen, puffy eyes, \"Please don't throw this all away because of money! Will you give me another chance? Can we work on this? Please?\"\n*goto took_ro_back_act1\n\n\n\n*label ro_secret_act1\nThe image is burned in your brain and you still can't scrub it away no matter how hard you try.\n\nYou remember staggering back, a wave of nausea forcing you to kneel as you watched $!{ro_name}, wine glass in hand, spill to ${ro_his} friend that you were ${heroname}. You never dreamed that ${ro_he} would divulge your biggest secret, one you had sacrificed so much to protect.\n\nNausea quickly yielded to anger as you zipped over to ${ro_him} and tossed the phone against the fireplace. $!{ro_his} eyes wide, $!{ro_name} could only stammer, \"…What?\"\n\nAfter spending so many years hiding your secret life, you had a big decision to make about your partner.\n*page_break\n\nScreams and tears and promised followed. $!{ro_name} begged you for forgiveness, blaming it both on the wine and a desire to impress ${ro_his} friend. $!{ro_he} promised that the friend would never tell a soul. \n\nThen $!{ro_name} started pointing out the issues in your relationship. How you spent most of your time racing around the city, focusing more on total strangers than your own partner, how you treated $!{ro_name} more like a roadie than a partner.\n\n\"$!{firstname}, I love you, I truly do,\" $!{ro_name} pleaded, tears streaking ${ro_his} cheeks, kneeling in front of you and grasping for your hands, ${ro_his} fingers interlocking with yours. \"I'm not perfect! But I knew they could be trusted! I would never do anything to hurt you!\"\n\nYou swallowed your rage and bit your lip as $!{ro_name} babbled with swollen, puffy eyes, \"Please don't throw this all away because of this! Will you give me another chance? Can we work on this? Please?\"\n*goto took_ro_back_act1\n\n\n*label took_ro_back_act1\n\nUltimately, you gave $!{ro_name} another chance. Still, the whole episode permanently changed the relationship; you'd never look at ${ro_him} the same way ever again.\n\n*fake_choice\n    #I reminded myself of the mistakes I had made over the years.\n        *set ego %-10\n        *set ro %+10\n        At least some of what $!{ro_name} said was true. Most of the time your life as ${heroname} came first. It was just a matter of time before $!{ro_name} started feeling taken for granted. It would happen to anyone.\n    #Still, I hoped that we could repair the relationship and have a happy life together.\n        *set future %+10\n        *set ro %+10\n        This incident didn't outweigh the years of laughter, love, and adventure with $!{ro_name}. It just didn't. You still had a long life ahead of you. Hopefully, this would just be a speed bump, and $!{ro_name} would stay by your side for the rest of the journey.\n    #I would have ended it, but $!{ro_name} knew all my secrets.\n        *set ego %+10\n        *set ro %-10\n        You called several attorneys, and gave serious thought to zipping through the house and tossing all of $!{ro_name}'s stuff out in the street, but pragmatism won over emotion. $!{ro_name} knew every detail about your career as ${heroname}, and a break-up could be disastrous for you if $!{ro_name} held a grudge.\n    #The future with $!{ro_name} seemed bleak. All we had were some happy memories.\n        *set future %-10\n        *set ro %-10\n        Every memory from your mid-20s onward involved $!{ro_name}. Every single one. Through different jobs, different apartments, then a house, $!{ro_name} had always been there, making decisions with you as equals. You feared the happy moments were over.\n        \nDid you continue to call $!{ro_name} a pet name after this betrayal?\n\n*fake_choice\n    #Yes, I call $!{ro_name} babe.\n        *set ro_petname \"babe\"\n    #Yes, I call $!{ro_name} boo.\n        *set ro_petname \"boo\"\n    #Yes, I call $!{ro_name} honey.\n        *set ro_petname \"honey\"\n    #Yes, I call $!{ro_name} love.\n        *set ro_petname \"love\"    \n    #I call $!{ro_name} something else.\n        *input_text ro_petname  \n            \n$!{ro_name}'s voice wakes you again. You smack your lips and gingerly stretch your arms. \n\n\"I must have fallen back asleep,\" you say. \n\nAnd then you notice the look on $!{ro_name}'s face. $!{ro_his} eyes, those eyes you wake up to each morning, tell you everything you need to know. Your partner is worried. $!{ro_name}'s voice breaks as @{ro_he2 he talks. | she talks. |they talk.}\n\n\"You've slept all day, ${mc_petname}. I know you needed the rest.\"\n\n\"What is it?\" you ask, pushing against the mattress and sitting up straighter.\n\n$!{ro_name} pauses for a minute, swallowing hard. \"What happened last night? I need to know. I mean, I heard the fighting. I see the marks. The…Sloth did this? How?\" \n\nYour mouth goes dry. \"I just had a misstep, that's all.\"\n\n\"A misstep?\" $!{ro_name} asks. \"That doesn't sound like you.\" $!{ro_name} pauses and squeezes your hand. \n\nYou struggle to say out loud what you've been thinking.\n\n*fake_choice\n    #It was just one mistake. It doesn't mean anything. \n        *set future %+10\n        You're still at the top of your game, the most powerful hero in all of Valiant City. It's not even close!\n\n        So your foot slipped [i]one[/i] time! In the rain! So what? It could have happened to anyone. $!{heroname} isn't going anywhere, not until you're ready for it to happen. When you choose to hang it up, you'll do it on your own terms.\n    #I'm getting older. And this is a young person's game.\n        *set future %-10\n        So being 38 doesn't exactly make you ancient, but you [i]have[/i] been doing this hero thing for quite a while, and the new heroes in Valiant City, including your sidekick, Whippet, are looking younger every day.\n\n        Many heroes don't enjoy the relatively long career you've had. In this business, even a minor injury or momentary lapse in judgment can prove fatal.\n    #Losing to the Sloth will tarnish my legacy. I can't let that happen.\n        *set ego %+10\n        You haven't served Valiant City for all these years to be taken down by someone like the Sloth! You're not 20 anymore, but you're still the fastest person in the world! That title comes with certain expectations; an aura of invincibility being one of them.\n\n        When you call it quits, you'll do it on your own terms. You won't allow the Sloth to take that away from you!\n    #I need to work harder. I got lazy and lethargic.\n        *set ego %-10\n        This was a wake-up call. Even someone like the Sloth can beat you if you allow yourself to get complacent.\n        \n        You need to focus and stop taking success for granted. Luckily for you, you can put your ego aside enough to admit this.\n     \n$!{ro_name} kisses your forehead and hands you the television remote. \"Okay, I can tell you're not in the mood to talk yet. I'll work on dinner, while you take it easy. And I'm serious about that. Your Juice level is still high, 80 percent, but you really pushed yourself getting home last night.\"\n\nYes, $!{ro_name} constantly monitors your Juice, which is your emergency energy reserves. Since your Juice replenishes very slowly, you tap into it only when you feel it absolutely necessary (like getting home last night before passing out in the alley).\n*if juice_boost\n\n    In recent weeks, $!{ro_name} has mentioned working on a \"Juice Booster\" that would theoretically double your Juice reserves, at for a short time. You've asked about testing it, but $!{ro_name}'s answer is always the same: \"I just need to do one more round of testing.\"\n\n    It's hard to be patient. Doubled Juice would let you whiz past almost any obstacle! But knowing your partner, $!{ro_name} won't be satisfied until any potential risk, no matter how small, has been eliminated.\n\n@{juice_boost Either way, you|You} suspect you'll need a certain amount of Juice to take down the Sloth, so you'd be wise to save some for that show-down. \n\nYou click on a few different channels, settling on local channel WAVC-3, which is airing…\n\n*fake_choice\n    #a super hero reality show.        \n    #a fantasy show about a talking dragon.        \n    #a cartoon about psychic teenagers.        \n    #a heist movie about jewel thieves!        \n        \nNormally you'd embrace the distraction while you heal, but your brush with death has raised important, life-altering questions you can't get out of your mind.\n\nAre you committed to staying with $!{ro_name} and investing the emotional energy needed to strengthen the relationship? Is there a better match out there for you? Someone who wouldn't break your trust? Are you willing to look for them?\n\nThen there's the issue of money. When you first started your hero career, you assumed that you'd eventually make some money as ${heroname}, but instead, the hero thing has become an all-consuming undertaking. Most of your earnings are invested in new technology (like $!{ro_name}'s monitoring equipment). Your savings are minimal.\n\n*if (ro_crime = \"gambling\")\n    And of course, $!{ro_name}'s gambling habit just made matters worse.\n\nYou glance around at the modest furnishings of your bedroom. Is it time for you to finally get paid, with or without $!{ro_name} by your side? \n*page_break\n\nThe television screen goes black. A message of \"WAVC-3 apologizes for these technical difficulties\" scrolls at the bottom. You reach for the remote but before you can click to another channel, a familiar face appears on the screen.\n\n\"My…name…is…the…Sloth,\" your arch-enemy announces in his painfully slow cadence. His green goggles emit a faint glow, but not enough to identify his location. Your eyes are drawn to those crooked, yellowing teeth, one of the most vivid images from last night. \n\nYou sit up straight, grabbing a scrap of paper from your end table. \"$!{ro_petname}, get a pen! Hurry!\"\n\nThe Sloth wheezes, and you're struck by how old and tired he looks as he talks. Thick gray stubble coats his jaw; deep wrinkles frame his mouth. \"To…my…fellow…entrepreneurs…I…say…\"\n\nYou mentally urge the Sloth to get to the point. Almost on cue, he lifts up a bloody scrap of your ${uniform} for all the viewers to see. His thin lips curl into a wicked grin. \n\n\"$!{heroname}…is…dead…The…city…is…yours!\"\n\nOh crap. \n\n*fake_choice\n    *if (juice_boost) #I ask $!{ro_name} to give me the Juice Booster! (Doubles Juice and reduces difficulty of game, not recommended for first playthrough)\n        *set ro %+20\n        *set juice 200\n        You suspect that if the circumstances were different, $!{ro_name} would argue against it, but with the Sloth on the loose, and considering your injury, the time seems right.\n\n        \"Okay,\" $!{ro_name} says, \"Sit up.\"\n\n        @{ro_he2 He disappears for a moment and returns with a syringe.|She disappears for a moment and returns with a syringe.|They disappear for a moment and return with a syringe.} \"You're going to feel very…bouncy.\"\n\n        Bouncy is right! The needle punctures your skin, and a rush of energy surges through your body. You hop out of bed. Your foot taps on the floor. It's impossible to hold still.\n\n        ${ro_name} laughs. \"Don't tap a hole in the floor! And the effects should smooth out soon; in fact, you'll probably feel pretty close to normal here in a few minutes.\" She walks over to her laptop and punches a few buttons. \"But it's confirmed. Your Juice is hovering at 200% of normal levels. I hope you're ready for this!\"\n\n        \"Oh I'm ready,\" you reply. \"I just hope the Sloth is ready for me! Wait…actually it would be better if he underestimates me.\"\n\n        You dash to your closet, toss on your fresh ${uniform}, and zip out the door, calling out to $!{ro_name}, \"You're the best!\"\n    #I zip away to save the city without saying goodbye to $!{ro_name}.\n        *set ro %-10\n        You barely hear $!{ro_name} start the word \"Wait!\" before you've grabbed a fresh outfit, ch
