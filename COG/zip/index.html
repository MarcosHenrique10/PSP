ind! You curse your lack of creativity; thinking back to kindergarten when you proudly molded your Play-Doh into a \"rock.\" \n            \n            You narrowly stumble away from another swipe of the Sloth's claws! Think! Think!\n            \n            A hover-bus of cheerleaders catches your eye and you have a stroke of…genius? You race over, leap up, and snatch a megaphone through an open window.\n            \n            \"Hey! Give that back!\" the cheerleader protests.\n            \n            You spin around and shout as loud as you can into the megaphone. \"Police! Police! It's the Sloth! Come qui—\"\n            \n            The Sloth's claws tear through the megaphone. The end dangles for a split second, and then bounces on the asphalt, leaving you with a tiny piece of plastic in your mouth.\n            \n            Two police officers race onto the scene, although you suspect you had nothing to do with that happening. \"Seriously?\" one barks at you, ducking behind a garbage can as the Sloth rumbles past. Even with the police on the scene, it's clear this fight is just getting started!\n            *goto rocket_arrives_7\n    #Get the Sloth talking to reveal his motivations.\n        Even after all of these years, you don't really understand what makes the Sloth tick.  \n        \n        It's painful to listen to villains monologue, and considering how slowly the Sloth speaks, this will be hellish, but you might learn something you can use to thwart his scheme.      \n        *if magnet > 59 \n            *set sloth +2   \n            *gosub monologue\n            \"Oh…it's…much…worse…than…this! Bigger…more…powerful…permanent!\" The Sloth surprises you by swinging the rifle at your head. You stumble back as the rifle whooshes right where your head was a second ago. \n             \n            That was close! \n             \n            You sense the Sloth's monologue is over, and that you extracted all he was willing to say about his goals.\n            \n            *gosub officers_eye\n            *goto rocket_arrives_7\n        *if magnet > 50\n            *set sloth +1    \n            *gosub monologue\n            \"You…won't…be…around…to…find…out!\" the Sloth bellows as he swings his rifle at your head! You stumble back as it whooshes right where your head was a second ago. \n            \n            That was close! \n            \n            That was also a short monologue, but at least you learned something about his goal.\n                                   \n            *gosub officers_eye\n            *goto rocket_arrives_7\n        *else\n            *set sloth +0\n            *achieve monologue\n            \"You're going to kill me anyway,\" you tease the Sloth, careful to keep away from his swinging claws. \"So you should go ahead and share—\"\n            \n            The Sloth's claws slice the air just inches from your nose!\n            \n            \"—your plans like villains do—\"\n            \n            The Sloth grabs his rifle with both hands and swings it down at your head! You barely jump out of the way as the weapon batters the asphalt! \n            \n            Gasping for breath, you start crawling away, desperately continuing your faltering interrogation. \"—like in movies, you want to be one of those types, ri—\"\n            \n            \"Shut…up…and…die!\" the Sloth bellows, gripping his rifle, ready to strike again!\n            \n            Well, that didn't go well. You need to work on your 'villain goading' skills, assuming you survive this!\n            \n            *gosub officers_eye\n            *goto rocket_arrives_7\n    #Intimidate the Sloth to impress Echo Rylan.\n        Rylan could be up there, some 100 stories above, watching you confront your arch-enemy! A show of strength here could impress the Steps Ahead CEO enough to award you that shoe contract!\n        \n        Only the Sloth stands between you and those fat stacks of cash!\n        *if tenacity > 59 \n            *set commercial +2     \n            *gosub stealing_speed\n            \n            \"No!\" Your enemy totters back, grinding his yellow teeth. \"You're…bluffing!\"\n            \n            \"Maybe I am, and maybe I'm not,\" you respond, \"but we have company now.\" And you gesture to the VCPD officers forming a perimeter around the two of you. The Sloth cocks his head and retreats a few steps.\n            \n            Your tactics made you look strong and bought time for the police to move in, but you suspect this fight is just getting started!\n            *goto rocket_arrives_7\n        *if tenacity > 50\n            *set commercial +1    \n            *gosub stealing_speed\n            \n            \"You're…bluffing,\" your enemy growls. \n            \n            \"Two,\" you repeat, speaking as slowly as the Sloth, \"one.\"\n            \n            The Sloth sneers and advances on you. \"Continue.\"\n            \n            Your voice falters and you start backing away, tapping the palm of one hand with the fingertips of the other in a classic 'time out' gesture. \"Umm…ninety-nine one hundredths. Ninety-eight one hundredths.\"\n            \n            You're saved by the arrival of VCPD officers forming a perimeter around the two of you. Although you started strongly, anyone watching would have noticed that the Sloth was getting the better of you by the end.\n            \n            With the arrival of Valiant City's finest, it's clear that this fight is just getting started!\n            *goto rocket_arrives_7\n        *else\n            *set commercial +0\n            \"You think stealing my speed makes us even?\" You sneer at the Sloth and clinch your fists. \"You're still not in my league!\"\n            \n            \"Not…in…your…league?\" The Sloth growls and flings his rifle at you!\n            \n            Ouch! It bonks you in the head so hard that you're knocked flat on your back. \"Ugh,\" you grunt, dazed as you try to sit up.\n            \n            \"You're…in…the…minor…league…now,\" the Sloth chuckles, his shadow looming over you in the mid-morning sun. \n            \n            \"Hands up!\"\n            \n            You're saved by the arrival of VCPD officers forming a perimeter around the two of you. You can only hope Echo Rylan wasn't watching, because after this performance, you can't imagine ${ro_him} wanting you as the face of ${ro_his} company's new campaign.\n            \n            But you can worry about that later! With the arrival of Valiant City's finest, it's clear that this fight is just getting started!\n            *goto rocket_arrives_7\n        \n*label rocket_arrives_7\n*page_break\nYour head starts to tingle, and your fingertips start to buzz. A hum rises all around you. Hover-cars start to float upward. Scrolling electronic signs flicker back to life.\n\nThe Sloth's rifle worked, but it didn't work for long!\n\nThe Sloth slaps his rifle, and roars at the cops pinning him in! Finally, the odds are against him.\n\nAs if on cue, additional reinforcements arrive in the form of a striking silver figure zipping through the sky. Silver Rocket is on the scene! \n\nYou wiggle your fingers, eager to feel that familiar burst of energy coursing through your body. But it's not quite back yet, and the Sloth takes the chance to strike!\n\nHe raises his rifle to the sky and fires! Silver Rocket's jet pack sputters! Hover-cars slam back to the ground, scattering the officers! Citizens scream out!\n\nYour eyes flicker. Your heart thunders. You're not at 100 percent, but you have enough power back to make a move!\n\nSilver Rocket could be killed! You could try to estimate ${ro_his} landing spot and save ${ro_him}! Or you could rush the Sloth and snatch his gun away! You need to know how it works! But then what about all of these people? Isn't their safety your main concern? You could stealthily lead many of them away!\n\n*choice\n     #Calculate where Silver Rocket will land! \n        The last few flickers of power from Silver Rocket's pack push ${ro_him} diagonally across the sky.  \n        \n        You squint, tracking Silver Rocket's trajectory as you race in ${ro_his} direction!\n        \n        A second later, the jet pack dies, and the silver-clad hero plummets straight down, ${ro_his} arms and legs flailing. \n        *if brain > 59 \n            *set silver %+20     \n            \n            But you change course effortlessly, keeping your focus on the falling figure, while zipping around hover-cars and pedestrians.\n            \n            You skid to a halt at the exact right spot, with time to spare.\n            \n            Gazing up as the falling figure appears larger and larger, you mutter to yourself, \"Incoming in three…two…one….\"\n            \n            \"Ooph!\" Silver Rocket grunts as you catch ${ro_him} in your arms.   \n            \n            \"I'm not jealous of that pack anymore,\" you say with a smirk. \n            \n            \"What the heck happened?\" Silver Rocket's voice is shaken, as the hero pats ${ro_his} arms and chest. \"I thought I was going to…I mean, I just kept falling!\"\n            \n            \"Yeah, yeah, I saved your butt,\" you say, easing Silver Rocket into a standing position. \"Now it's time to hunt for Sloth! Maybe you can throw that blaster at him? Or blind him with your helmet's reflection?\"\n            \n            Silver Rocket's lips curl up. \"I seem to remember my helmet getting your attent—\"\n            \n            Zip! You're gone before Silver Rocket finishes ${ro_his} sentence.\n            *goto sloth_escapes_7 \n        *if brain > 50\n            *set silver %+10 \n            \n            You change course, but stumble along the way. Just that split second puts you behind! You accelerate, the wind howling against your face! \n            \n            Will you get there in time? You leap, arms extended to snag ${ro_him}!\n            \n            \"Ooph!\" Silver Rocket grunts as you catch ${ro_him} in your arms in mid-leap. You barrel forward, your chest and Silver Rocket's backside skidding over the pavement until you roll to a stop.\n            \n            \"I'm not jealous of that pack anymore,\" you say with a smirk, panting for breath.\n            \n            \"You cut that pretty close!\" Silver Rocket gasps, patting ${ro_his} arms and chest. \"Another second and—\"\n            \n            \"A second? That's an eternity to me,\" you reply, standing and looking around for the Sloth. \"Now if you'll excuse me…\"\n            \n            Zip! You're gone before Silver Rocket gets to ${ro_his} feet.\n            *goto sloth_escapes_7\n        *else\n            *set silver %-10\n            It throws off your concentration! \n            \n            You stumble, then accelerate too quickly, almost shooting right past Silver Rocket's flailing body! \n            \n            Ooph! The silver-clad hero lands on your back! The impact knocks you forward into a light post with a thud.\n            \n            There's a crash behind you! You turn to see Silver Rocket sprawled on ${ro_his} back on top of a hover-car, groaning, \"Ugh!\"\n            \n            You limp over, nursing your shoulder. \"I kept you from splattering, you know.\"\n            \n            \"No,\" Silver Rocket grunts, sitting up. \"You kept me from splattering once, and instead splattered me twice. But…ugh…my suit can handle it.\"\n            \n            \"Ah, well,\" you look around, scanning for the Sloth. \"You sit there and recover while I hunt for Sloth!\"\n            \n            Zip! You're gone before Silver Rocket can grumble a reply.\n            *goto sloth_escapes_7\n    #Out-muscle the Sloth and take his rifle!\n        You need to grab the Sloth's weapon! Without it, he's just…the Sloth. But with it, he poses a danger to the whole city! \n        \n        But he's so much bigger and stronger than you are; something tells you this won't be easy!   \n        *if violence > 59 \n            *set emp +2   \n            \n            *gosub launch_7\n                        \n            You jerk away the weapon, whooshing away behind the corner of Zenith Tower where you kneel down to examine it. [i]Hmmm…how does this thing work? What's the power source?[/i]\n            \n            Over the next few seconds, your eyes and brain go into overdrive, committing every detail of the rifle, from stock to muzzle, to memory. You'll have a better understand of how the Sloth's weapon works now.\n            \n            A hairy fist thunders past your jaw, punching a hole in the corner of Zenith Tower! The blow staggers you backward, the Sloth's weapon tumbles from your hands. You curse yourself for not running further away! \n            \n            \"It…is…mine!\" the Sloth roars, swatting your injured shoulder and lumbering away. \n            \n            You grit your teeth and fight through the pain, struggling to your feet.            \n            *goto sloth_escapes_7\n        *if violence > 50\n            *set emp +1    \n            \n            *gosub launch_7\n            \n            You snatch it away from his grasp, your eyes shifting into overdrive as your brain starts processing every visible detail of the rifle. In just half a second, you start understanding some basics of the weapon.\n            \n            But your analysis is short-lived! The Sloth is already grabbing it back!\n            \n            A hairy fist rocks your jaw, staggering you backward. \"It…is…mine!\" the Sloth roars, swatting your injured shoulder and lumbering away. \n            \n            You grit your teeth and fight through the pain, struggling to your feet.\n                                   \n            *goto sloth_escapes_7\n        *else\n            *set emp +0\n            And it's not!\n            \n            You grasp the rifle by the barrel, but your tactic backfires! The Sloth keeps hold of the rifle's stock, slinging the weapon around over his head. Your fingers loosen every time he swings you around, until you lose your grip on the barrel entirely!\n            \n            You go flying into Zenith Tower, slamming against the building and crumpling to the ground. \n            \n            The Sloth roars in victory as he lumbers off. \"You're…no…match…for…me…${heroname}!\"\n            \n            You grit your teeth and fight through the pain, struggling to your feet. That didn't work at all! Maybe you can still catch up to him?                                \n            *goto sloth_escapes_7\n    #Slip off with the civilians!\n        With hover-cars slamming to the ground, police scattering, and the Sloth blasting his weapon with impunity, this is no place for civilians!\n        \n        You motion to a group of seven or eight people, curling your finger, and attempting to lead them out of the war zone.\n        *if sneak > 59 \n            *set pop %+20     \n\n            *gosub careful_eye_7\n            \n            She nods as you lead the group behind a bus, its windows dim, its engine dead. From there, it's a quick sprint around the far corner of Zenith Tower to safety!\n            \n            \"Thank you! Thank you!\" the people start patting your head and shoulders like you're a football player who just leaped into the stands.\n            \n            \"Thank you, ${heroname}!\" the little girl says, tossing her arms around you in a fierce hug. \"But I've gotta tell you something!\"\n            \n            \"I sort of have to go,\" you say, itching to take the Sloth down.\n            \n            \"He's not a monkey! Sloths are arboreal mammals from Central and South America!\" she says, tugging on your fingers. \n            \n            \"Gotcha! Arboreal mammal!\" You nod, pat her head, and zip away!\n            *goto sloth_escapes_7\n        *if sneak > 50\n            *set pop %+10   \n            \n            *gosub careful_eye_7\n                    \n            She nods as you lead the group behind a bus, its windows dim, its engine dead. But just as you motion the citizens to run for it, the bus starts humming to life.\n            \n            \"Rahhh!\" the Sloth roars in the distance. The bus slams to the ground again, sending your group scattering. \n            \n            \"Ahh!\" screams the little girl, who trips and falls face first on the pavement.\n            \n            \"Ava!\" a man you assume to be her father snatches her off the ground and scowls at you. \"I thought you knew what you're doing!\"\n            \n            \"I do, I do,\" you reply, scowling back. \"Now on the count of three, go. Three. Two. One. Go!\"\n            \n            With the Sloth's attention diverted back to the VCPD, you direct the civilians to run behind the corner of Zenith Tower where they're safe.\n            \n            \"Sorry about that,\" Ava's father says, giving you a nod. \"You did a great job.\"\n            \n            \"I always look out for you. Always!\" you say to the group before zipping away to find the Sloth!\n            *goto sloth_escapes_7\n        *else\n            *set pop %-10\n            But your stealthiness has never been one of your strengths. \n            \n            \"Ahhh!\" a little girl in your group screams as the Sloth turns in your direction and roars. Several people scatter! You try to round them back up, but they bolt in different directions!\n            \n            The Sloth fires his rifle again at a bus behind you! The bus slams back to the ground, almost squashing a young couple. They barely roll out of the way!\n            \n            \"Are you trying to get us killed?\" screams a man who scoops up the little girl and runs behind the corner of Zenith Tower. \n            \n            You blink and glance around. \"Anyone need help? Anyone?\"\n            \n            No one answers, and for obvious reasons. No one is within 100 feet of you. Apparently, your brand of 'help' isn't needed.\n            \n            But at least you can go after the Sloth now! You turn and zip in his direction.\n            *goto sloth_escapes_7\n\n\n*label sloth_escapes_7\n*page_break\nBut the Sloth is nowhere to be found. He's escaped, and with his rifle!\n\nYou ball your fist and slam it into your open hand. [i]How does such a slow villain keep escaping?[/i]\n\nYou're pretty sure you'll get a final show-down, and soon. Whatever the Sloth is planning, he seems ready to unleash it on Valiant City. \n*finish\n\n\n\n \n \n*label coward\n\"Coward!\" the Sloth roars as you sprint across the street at a decidedly non-superhuman speed. He rumbles after you, his breathing labored by the time you duck inside.\n            \nHe bashes the front window! Shards of glass pierce the air! Racing down the camping aisle, you snatch what you need and duck out the back as the Sloth lumbers through the empty window frame.\n*return\n            \n*label monologue\n\"You're going to kill me anyway,\" you tease the Sloth, careful to keep away from his swinging claws. \"So you should go ahead and share your plan. You know, like a super confident movie villain! You want to be one of those, right?\"\n            \nThe Sloth takes your bait, grunting as he lumbers toward you.\n            \n\"Things…go…too…fast,\" he growls, \"I…will…slow…them…down. Way…down.\"\n            \nYou curl your finger at him, backing up carefully as you urge him to follow you. \"How are you going to do that? With this gun of yours?\"\n*return\n\n    \n*label officers_eye\nFrom the corner of your eye, you spot VCPD officers scampering into position behind trash cans and grounded hover-cars. One thing's clear: this fight has just started!\n*return\n\n*label stealing_speed   \n\"You think stealing my speed makes us even?\" You sneer at the Sloth and clinch your fists. \"You're still not in my league!\"\n            \n\"Not…in…your…league?\" The Sloth growls and points his rifle at you.\n            \n\"Sorry to disappoint you, but that gun of yours didn't work very well.\" You crack your knuckles and hunch forward like a sprinter at the starting block. \"Speed rush coming in three…two…\"\n*return\n    \n\n*label launch_7\nYou launch yourself with a level of ferocity you reserve for the most dire situations! And it catches the Sloth by surprise.\n             \n\"Huh?\" he grunts.\n            \nGrasping the barrel of the rifle with one hand, you grab the Sloth's wrist with the other, sending vibrations up his arm and causing him to lose his grip.  \n*return\n            \n\n*label careful_eye_7\nYou keep a careful eye on the Sloth, waving your followers to sneak further away every time the villain is distracted by the police. \n           \n\"Shhh,\" you whisper to the youngest member of the group, a girl looking to be about seven-years-old. \"It's a game called 'hide from the silly monkey.'\"\n*return\n\n\n*label shoes_charity\n\"Pardon me, can I have your attention?\" you tap on the microphone and wait for heads to turn your way.\n        \nThe din of conversation softens until the room is almost quiet.\n        \n\"As you might know, I'm ${heroname}, the fastest person in the world!\"\n        \nYou pause for applause, but you're met with befuddled faces. One man scoops an oyster from an appetizer tray.\n        \n[i]Wow. Tough room. And an old room.[/i]\n        \nWell, here goes nothing!\n*return\n    \n\n\n\n\n\n\n    \n    \n", "8-finalnight": "*page_break\n*text_image chap_8.png center Chapter Eight Mad Dash\n\nYou're struck by the blanket of silence. And then the little things normally masked by the incessant sounds of the city.\n\nA bee buzzes by your ear.\n\nThe wind captures a few leaves; they crackle against the ground.\n\nBut it doesn't last.\n\nElectronic devices return to normal with the departure of the Sloth and his weapon. The buzzing. The beeping. The humming. \n\nHover cars lift off the ground. Holographic advertisements flicker back to life. Valiant City once again cloaks itself in cutting edge technology. \n\n*fake_choice    \n    #Nothing stops Valiant City from marching on, not even the Sloth.\n        *set future %+20\n        This city will survive whatever scheme the Sloth is cooking up. You can't stop progress.\n    #I'm glad the effects were short-lived, but the silence was nice.         \n        Maybe there's a balance somewhere? But you're not sure how to find it.\n    #Why couldn't the silence last longer? I could almost hear myself think.\n        *set future %-20\n        You love your city, but you might love it more if things slowed down a bit. But in today's world, is that even possible?\n        \nMessages start pouring in. First, $!{ro_name}'s voice crackles in your ear.\n\n*if (ro > 60)\n    \"Are you okay, ${mc_petname}? Everything went dead! What's going on?\"\n    *goto rogues_return_8  \n*if (ro > 42)\n    \"What's going on? The signal went dead.\"\n    *goto rogues_return_8  \n*else\n    \"Did you turn off your comm? Why would you do that?\"\n    *goto rogues_return_8  \n\n*label rogues_return_8  \n\nWhippet starts talking over $!{ro_name}. You can hear dogs barking and howling in the background.\n\n\"Get away! Bad dog! Hey, boss, are you around? I could—don't bite my tail!—use an assist! Boss, I've got some dog-on-dog violence with K9er!\" \n\nPolice alerts buzz in your communicator over Whippet's shouts.\n\n[i]\"Perpetual Man spotted in the Hub neighborhood. Was observed conversing with the Sloth. Exercise extreme caution, subject may possess advanced weapons.\"[/i]\n\n[i]\"Silver Rocket has engaged Speedbump by the waterfront. Significant collateral damage. Multiple units needed to block area.\"[/i]\n\n\"$!{firstname}, did you hear me?\" $!{ro_name}'s voice returns to the jumble of messages filling your ear. \n\nK9er. Perpetual Man. Speedbump. They're all members of the Miscreants, and they keep popping up like weeds. What should you do? \n\nHelp your sidekick against K9er? Question Perpetual Man about the Sloth? Sneak up on Speedbump before she can cause more damage?\n\n*choice\n     #Outsmart Perpetual Man to make him squeal on the Sloth! \n        *gosub perpetualman_intro_8\n                                 \n        *if brain > 59 \n            *set sloth +2\n            *set rogues +2\n            *page_break\n            Quickly scanning the Sloth's rifle, you break the news to Perpetual Man. \"This is a fake.\" In a stroke of genius you add, \"He told me he gave these to all the Miscreants. But, well, it looks like he used you as a distraction to help mask his escape.\"\n            \n            \"That cretinous…\" Perpetual Man grumbles. \n            \n            \"So, turnabout is fair play, right?\" \n            \n            Perpetual Man nods. \"I don't know if it'll help, but he's always going on about how things are moving too fast. He drones on about the 'good ole days,' like when he was growing up, with kids riding bikes and people using those old phones with curly cords. You know what I mean? It's like he wants to go back in time.\"    \n            \n            \"Or…take us all back there…\" you ponder, stroking your chin before gripping the villain's arm and walking him over to a newly arrived VCPD cruiser.\n            \n            Perpetual Man's information has your brain racing about the Sloth's motives. This worked out really well!\n            *goto last_perpetualman_joke_8                                  \n        *if brain > 50\n            *set sloth +1\n            *set rogues +1            \n            *page_break\n            Quickly scanning the Sloth's rifle, you break the news to Perpetual Man. \"This is a fake.\" Inspiration strikes and you blurt out, \"But he told me about it! He set you up, man!\"\n            \n            Perpetual Man scowls. \n            \n            \"So, turnabout is fair play, right?\" \n            \n            Perpetual Man shrugs. \"I'm not a snitch. But, between me and you, the dude is weird, even for, you know, one of us. Always talking about how things move too fast.\" He smirks. \"Guess that's why he hates you so much.\" \n            \n            \"Things moving too fast, huh?\" you ponder, stroking your chin before gripping the villain's arm and walking him over to a newly arrived VCPD cruiser.\n            \n            You feel like Perpetual Man held out on you, but at least he told you something.\n            *goto last_perpetualman_joke_8   \n        *else\n            *set sloth +0\n            *set rogues +0\n            *page_break\n            Quickly scanning the Sloth's rifle, you break the news to Perpetual Man. \"This is a fake.\" Your mind goes blank. \"And uh, it's the Sloth's fault.\"\n            \n            Perpetual Man scowls. \n            \n            \"So, you want to rat him out.\" You gulp. \"Right?\" \n            \n            Perpetual Man shakes his head. \"Miscreants have a code. You know that. We handle things…internally.\"\n            \n            \"Of all the cities, I get the ones where the villains have codes,\" you mumble, gripping the villain's arm and walking him over to a newly arrived VCPD cruiser.\n            \n            Well, that was a waste of time. Other than jailing a Miscreant, of course.\n            *goto last_perpetualman_joke_8\n    #Help Whippet establish dominance against K9er.\n        *gosub k9er_intro_8\n                    \n        *if tenacity > 59 \n            *set whippet +2\n            *set rogues +2\n            *page_break\n            You accelerate into a blur, zipping beside Whippet as she keeps running circles around the ring. \n            \n            \"Whippet! Take charge! You can end this [i]now[/i]! So do it!\"\n            \n            Your sidekick's eyebrows lower. She nods and skids to a stop. The Boston Terrier and dachshund fly off and tumble on the ground unharmed.\n             \n            Whippet's voice becomes sharper as she barks \"Sit!\" to the dogs. \n            \n            K9er gasps as hundreds of canines sit on their haunches. Whippet darts to a jacket left by a dog handler on the floor. Searching the pocket, she pulls out a treat bag and sniffs it.\n            \n            K9er rolls her eyes in defeat. \"It's fiesta chicken flavor. I can smell it from here.\"\n             \n            \"Good dog! Good dog! Good dog! Good dog!\" Whippet whooshes from dog to dog, rewarding each for their obedience. \n            \n            She takes K9er's arm and walks her to a newly-arrived VCPD officer. \"Using them as shields is pretty low,\" she growls to the villain. \"I was going easy on you. But not anymore.\"       \n            \n            It's hard to fight a grin. Whippet took charge once you gave her some encouragement. Maybe she's on her way to becoming more than just a sidekick.\n            *goto last_k9er_joke_8\n        *if tenacity > 50\n            *set whippet +1 \n            *set rogues +1\n            *page_break\n            You accelerate into a blur, zipping beside Whippet as she keeps running circles around the ring. \n            \n            \"Whippet! Do something! Don't just keep running around!\"\n            \n            Your sidekick gently puts on the brakes and starts to pry the Boston Terrier from her ankle. \"Come on, let go.\"\n             \n            K9er snaps her fingers again, and at least a dozen other dogs charge Whippet, burying her under a pile of glossy, well-groomed furry bodies.\n            \n            \"Whippet!\" you shout. \"Take charge!\"\n            \n            A hum starts from Whippet's location. And then it stops. The dogs scatter, retreating behind K9er.\n             \n            Your sidekick gets to her feet, doing a finger gun at you. \"I created a frequency only dogs can hear. Pretty epic huh?\"\n            \n            You sigh. Maybe you should have taken charge sooner. Whippet did okay, but she still has a lot to learn. In any case, this ends now. \n            \n            You zip around, placing treats in front of each of the dogs, pacifying them as you take K9er by the arm and walk her to a newly-arrived VCPD officer. \n            *goto last_k9er_joke_8\n        *else\n            *set whippet +0\n            *set rogues +0\n            *page_break\n            You accelerate, zipping beside Whippet as she keeps running circles around the ring. \n            \n            \"Whippet! We need to take charge! What's the plan?\"\n            \n            Your sidekick shrugs in mid-run. \"I don't know! That's why I asked for help!\"\n             \n            K9er snaps her fingers again. Dozens of dogs start trotting toward the exits. \n            \n            \"No more leashes for you!\" K9er barks. \"Today you taste not gourmet, GMO-free treats, but sweet, sweet freedom!\"\n            \n            \"What do we do? We can't beat up dogs!\" Whippet yells. \"That's like not even allowed in movies!\"\n            \n            You sigh. \"But we can't let her get away just because she uses them! Maybe we can—\"\n            \n            You hear a thud. In their quest for freedom, some of the dogs tripped up K9er, who falls flat on her snout.\n            \n            \"Ah,\" you say. \"Just as I planned.\"\n            \n            You walk over to K9er and nod to a new-arriving VCPD officer. Yes, this was a total disaster, and Whippet is nowhere close to being as assertive as she needs to be, but at least K9er is going to jail. That's something, right?\n            *goto last_k9er_joke_8\n    #Surprise Speedbump while she's focusing on Silver Rocket!\n        *gosub speedbump_intro_8                        \n        *if sneak > 59 \n            *set silver %+20  \n            *set rogues +2\n            *page_break                       \n            Zip! You burst from your hiding spot at just the right moment, shoving Speedbump in the back!\n            \n            The villain loses her balance, swinging her arms wildly in little circles as she steps forward into a puddle of oil on the ground. She slips and lands with a thud on her back.\n            \n            Without losing a beat, you streak under Silver Rocket and break ${ro_his} fall.\n            \n            \"I had her on the ropes!\" Silver Rocket insists. \"But thanks for the assist!\"\n            \n            \"It's not a competition,\" you reply with a smirk, \"but if it was, I'd be winning.\"\n            \n            Silver Rocket hops out of your arms, shaking ${ro_his} head. \"Why was she carrying a super-reflective mirror shield thing? How can that possibly be helpful in most situations?\"            \n                        \n            \"I admit it sounds sort of contrived,\" you reply. \"But it's no worse than her glue gun. Or her big bag of tacks.\"\n            \n            You stroll over to Speedbump and help her off the ground, your fingers slick with oil. A pair of VCPD cars pull up.\n            *goto last_speedbump_joke_8                        \n        *if sneak > 50\n            *set silver %+10\n            *set rogues +1            \n            *page_break\n            Zip! You burst from your hiding spot but bang your hip against the fender of the food truck. \"Crap!\" you mutter as Speedbump turns to face you.\n            \n            \"Keeping me on my toes, ${heroname}?\" Speedbump taunts, reaching into a bag strapped over her shoulder. \"Let me return the favor!\" \n            \n            The villain tosses dozens of razor-sharp tacks at the ground in front of you. You tilt hard to the right, the pads of your feet barely avoiding the tacks. But the move throws you off balance. You start skidding on an oil puddle, your arms swinging wildly.\n            \n            \"Just like I drew it up,\" you say through gritted teeth as you slam into Speedbump and send her skidding on her butt on the oil.\n            \n            \"Oof!\" Silver Rocket grunts, landing on top of the villain.\n            \n            You spin to a stop, offering a hand to Silver Rocket. \"You okay?\"\n            \n            The hero accepts the assist, getting to ${ro_his} feet. \"It wasn't the softest landing, but it beat the alternative. Thanks.\"\n            \n            You help Speedbump up, your fingers slick with oil. A pair of VCPD cars pull up.   \n            *goto last_speedbump_joke_8\n        *else\n            *set silver %-10\n            *set rogues +0            \n            *page_break\n            Zip! Your burst from your hiding spot but slam your elbow against the driver's side mirror of the food truck. \"Ouch!\" you mutter as Speedbump turns to face you.    \n            \n            \"Ha! The city's heroes double-teaming me! I've dreamed of this for so long!\"\n            \n            \"Don't phrase it like that!\" you shout, charging at the villain.   \n            \n            Speedbump whips out a glue gun! A gooey stream of fast-quickening adhesive shoots toward you! You rocket around it, but slip in a puddle of oil on the ground.\n            \n            Thud! You crash onto your back, sliding on the oil, and knocking Speedbump's feet out from under her!\n            \n            She lands in a heap on top of you, the impact of her heavy armor knocking the wind from your lungs. \n            \n            Then, another impact! And you know Silver Rocket has landed on top of Speedbump. \n            \n            \"Ugh,\" you groan, slowly crawling out from under the heap. \n            \n            Silver Rocket wipes oil from ${ro_his} uniform and rolls ${ro_his} eyes. \"[i]Slick[/i] move there.\" \n            \n            You ignore the comment and help Speedbump to her feet just as VCPD patrol cars pull up.          \n            *goto last_speedbump_joke_8\n    *selectable_if (juice > 20) #Use Juice against Perpetual Man!\n        *set juice -20\n        *set sloth +2\n        *set rogues +2\n        *gosub perpetualman_intro_8    \n        *page_break\n        Well, Juice certainly makes it easier!\n        \n        \"Tell me everything you know about the Sloth,\" you growl, pouring on the Juice. You move so quickly that 'copies' of you appear to Perpetual Man, whose eyes slowly move in terror from one of 'you' to another. \n        \n        You repeat \"Everything!\" and slow down enough to let Perpetual Man's brain process the word. He starts nodding, and you ease off the Juice.\n        \n        \"Look, I don't know that much,\" Perpetual Man insists. \"I mean, we've had drinks a few times. He's always going on about how things are moving too fast. He drones on about the 'good ole days,' and stuff.\"\n        \n        \"What do you mean?\" you press.\n        \n        \"Like when he was growing up, with kids riding bikes and people using those old phones with curly cords. It's like he wants to go back in time.\"    \n            \n        \"Or…take us all back there…\" you ponder, stroking your chin before gripping the villain's arm and walking him over to a newly arrived VCPD cruiser.\n            \n        Perpetual Man's information has your brain racing about the Sloth's motives. You're glad you used some Juice this time!\n        *goto last_perpetualman_joke_8\n    *selectable_if (juice > 20) #Use Juice against K9er!\n        *set juice -20\n        *set whippet +2\n        *set rogues +2\n        *gosub k9er_intro_8\n        *page_break\n        And Juice makes it so much easier!\n        \n        You pour on the speed until even Whippet is moving in slow motion. K9er and her canine companions appear frozen in place. This allows you to reposition everyone to your liking and teach your sidekick a few lessons about tactics and assertiveness. \n        \n        You put all of the dogs in a tightly-packed group in the middle of the show ring. \n        \n        \"See,\" you tell Whippet, as you point to the dogs. \"you could have created a gentle whirlwind around them, easing them into a more easily controlled pack. No one would have been hurt.\"\n        \n        Whippet nods in slow motion, her eyes eventually making contact with yours. \n        \n        You continue a few more lessons before easing off the Juice and grabbing K9er's arm as you escort the confused villain to a newly-arrived VCPD officer. \n        \n        This was a great way to teach Whippet a valuable lesson and put another Miscreant in jail! You're glad you used some Juice this time!\n        *goto last_k9er_joke_8\n    *selectable_if (juice > 20) #Use Juice against Speedbump!\n        *set juice -20\n        *set silver %+20\n        *set rogues +2\n        *gosub speedbump_intro_8   \n        *page_break\n        *achieve sink\n        And Juice makes it so much easier!\n        \n        You pour on the speed and start relieving Speedbump of every gadget and weapon contained in her armored suit. One by one, you add components to the pile, all while Speedbump barely moves.\n        \n        An oil cannister!\n        \n        An igniter!\n        \n        A glue gun!\n        \n        The mirror!\n                       \n        A bag of jacks! Oh, those hurt like crap!        \n        \n        Once she's thoroughly disarmed, you leap up and reposition Silver Rocket in mid-air, ensuring that ${ro_he} will land safely. \n        \n        Speedbump blinks in confusion when you ease off the Juice. \"You beat me again, didn't you?\" she asks. \n        \n        You nod, taking her arm and leading her to a newly-arrived VCPD officer.\n        *goto last_speedbump_joke_8\n\n\n\n*label last_speedbump_joke_8\n\nBefore handing her over, you leave her with some parting words.\n\n*choice    \n    #\"Stay in jail for a day or two before inevitably escaping. Things might be getting weird.\"\n        Speedbump pauses and shrugs. \"Two days sounds about right. That gives my AI-controlled prototype enough time to—wait, I've said too much!\"\n        *goto final_push_8    \n    #\"Ever think about switching sides? Rocket and I could use the help.\"    \n        Speedbump's mouth drops. \"I'm flattered, but when we team up, and I do mean [i]when[/i], you'll be switching to my side, not the other way around.\"\n        *goto final_push_8\n    #\"Got any gadgets to help me out? The Sloth wants me dead.\"\n        Speedbump pauses for a moment, her eyes focused on yours her tone deathly serious. \"I will avenge your death. I hope that brings you some comfort.\"\n        *goto final_push_8\n\n\n\n*label last_perpetualman_joke_8\n\nBefore handing him over, you leave him with some parting words.\n\n*choice\n    #\"Stay in jail for a day or two before inevitably escaping. Things might be getting weird.\"\n        Perpetual Man pauses and shrugs. \"Noted. See you in a few days. And you might want to avoid dying. It sucks.\"\n        *goto final_push_8    \n    #\"Ever think about switching sides? Rocket and I could use the help.\"    \n        Perpetual Man chuckles and shakes his head. \"Now where would the fun be in that? And I won't tell Whippet you forgot about her. But you owe me.\"\n        *goto final_push_8\n    #\"I wish you could lend me that immortality of yours. The Sloth wants me dead.\"\n        Perpetual Man looks you in the eye. \"He does. You pushed him too far, too many times.\" He pauses. \"Don't make that mistake with the rest of us.\"    \n        *goto final_push_8\n\n\n\n*label last_k9er_joke_8\n\nBefore handing her over, you leave her with some parting words.\n\n*choice\n    #\"Stay in jail for a day or two before inevitably escaping. Things might be getting weird.\"\n        K9er pauses and shrugs. \"I might stay in for a few days. To be honest, I sort of like the food there.\"\n        *goto final_push_8    \n    #\"Ever think about switching sides? Rocket and I could use the help.\"    \n        K9er scowls and shakes her head. \"Did [i]you[/i] ever think about changing sides? You're fighting for the people holding the leashes, after all.\"\n        *goto final_push_8\n    #\"Have your dogs heard anything about the Sloth? He wants me dead.\"\n        K9er looks you in the eye. \"He does. And not like in a fun 'play dead' metaphorical way. You just pushed him way too far, way too many times.\"\n        *goto final_push_8\n\n\n\n*label final_push_8\n*page_break\n\"$!{firstname}?\" \n\nAs the police escort the villain away, $!{ro_name}'s voice crackles in your ear. \"You okay? Is the fight over? What's next?\"\n\n[i]That's a good question.[/i] \n\nShould you and $!{ro_name} teach Whippet some creative new stunts? That would let you spend time with $!{ro_name} and also prepare your sidekick for a possible show-down with the Sloth.\n\nOr you could get on social media and chat with a celebrity scientist about the Sloth's device! This move could boost your popularity, and if it goes well, you'll better understand what your enemy is building.\n\nAnother police communication interrupts your talk with $!{ro_name}. \n\n[i]\"All units respond to Spectrum Park. Yes Men activity observed in area. At least a dozen suspects, all armed.\"[/i]\n\nOr…maybe you should give the VCPD an assist with the Yes Men? The police would appreciate the help, and you could remind the Miscreants that you're always willing to drop everything to stop them!\n\nIt's probably best to conserve your remaining Juice. You can't help but think that a fight against the Sloth looms in the very near future.\n\nStill, you need to do something, even without Juice. \n\nPausing, you respond to $!{ro_name}.\n\n*choice\n    #\"You and I need to teach Whippet some new tricks tonight.\"\n        *if art > 59\n            *set ro %+20\n            *set whippet +2\n            *achieve newdog\n            The session goes even better than you could have hoped!\n            \n            $!{ro_name} begrudgingly agrees to using the basement this time instead of the storage pod, and offers some valuable insight during the exercises.\n            \n            You share some artistic tips with your sidekick and $!{ro_name} helps Whippet master your spinning whirlwind attack, relying on years of experience watching you. Only two lamps (you didn't care for either, although $!{ro_name} did) are damaged in the process.\n            \n            \"Did you see me spin?\" Whippet hollers, pumping both fists and thrusting her hips. \"Maybe I should change my name to Cyclone! Or the Raging Tornado!\"\n            \n            \"Uh, you might want to stick with the obscure dog name,\" you tell her. \"It would be pretty hard to dress up like a tornado.\"\n            \n            \"Cyclone attack!\" Whippet yells, one of her fists punching a hole in the drywall. \"Oops! I mean, I think that was legit already there!\"\n            \n            $!{ro_name} shakes ${ro_his} head but manages a small smile at you. You suspect that, even given the property damage, @{ro_he2 he appreciates | she appreciates | they appreciate} being included in your sidekick's training.\n            *goto bed_8\n        *if art > 50\n            *set ro %+10\n            *set whippet +1\n            The session goes okay, and Whippet makes some small strides forward.\n            \n            $!{ro_name} begrudgingly agrees to using the basement this time instead of the storage pod, and serves as a more objective instructor during the exercises.\n            \n            You share some artistic tips with your sidekick, but even with $!{ro_name} helping, Whippet's unintentionally destructive tendencies won't be denied.\n            \n            \"Oops!\" she hollers as she spins into a bookcase.\n            \n            \"Ouch!\" she yells as she knocks over a CD-tower, sending $!{ro_name}'s cherished collection of late-1990s CDs flying everywhere.\n            \n            Eventually, Whippet learns to 'sort of' master a spin attack, but $!{ro_name} cringes every time your sidekick destroys another household item. \n            \n            \"It's legit not my fault!\" Whippet insists as she starts sweeping up cracked CD cases. \"And who uses these now anyway?\"\n            \n            $!{ro_name} rolls ${ro_his} eyes at your sidekick, but stifles a laugh, mouthing silently to you, \"Are we [i]that[/i] old?\"\n            \n            Even with all of the damage, you suspect that @{ro_he2 he appreciated | she appreciated | they appreciated} being included tonight.          \n            *goto bed_8\n        *else\n            *set ro %-10\n            *set whippet +0\n            Unfortunately, the session is a disaster. In every fathomable way. \n            \n            $!{ro_name} begrudgingly agrees to using the basement this time instead of the storage pod, and tries to offer some objective advice during the exercises. Sadly, you just don't have the artistic flair necessary to teach Whippet innovative stunts in such tight quarters.\n            \n            \"Ack!\" Whippet yells, spinning into $!{ro_name}'s desk, sending papers everywhere.\n            \n            \"Stop!\" $!{ro_name} insists.\n            \n            \"Oops!\" Whippet hollers, trying to redirect her spin attack. She manages to change direction. \n            \n            Right into your flat screen.\n            \n            \"The DVR! My shows!\" $!{ro_name} wails.\n            \n            \"Whippet, spin the other way! But slowly! But fast enough to counter your present speed…oh, never mind,\" you mutter in defeat.\n            \n            The night ends with Whippet learning nothing of value. $!{ro_name} sweeps up all the damage, ${ro_his} eyes daring you to say a single word.         \n            *goto bed_8\n    #\"I'm unleashing the power of my social media! Someone out there has to understand the Sloth's tech!\"\n        *if magnet > 59\n            *set emp +2\n            *set pop %+20\n            Your charisma pays off!\n            \n            You post a video of yourself describing your most recent show-down with the Sloth, and perhaps along the way you…enhance the facts a bit!\n            \n            \"The Sloth is ten feet tall! Capable of lifting a city bus, with claws the size of a T-Rex! And his teeth are gnarled and disgusting!\"\n            \n            [i]Well…that last part is true.[/i]\n            \n            And the 'likes' start pouring in! Your fans can't get enough! And judging from some of the DMs, maybe they want a bit [i]too[/i] much!\n            \n            But when it comes to the Sloth's weapon, you stick to the facts, and you're  rewarded with a response from Akio Nakamura, Japan's most celebrated physicist, famous for analyzing exactly how super powers work.\n            \n            Nakamura sends you a 'dumbed down' video explaining EMP devices, and elaborates about the possible effects  in exchange for information about your speedster powers.\n            \n            \"It wouldn't be a nuclear device; obviously in that case, the EMP effects would be the least of your problems. Look into high-power microwaves. They could, under optimal circumstances, corrupt electronic data, and permanently disable electronic and electric devices.\" \n            \n            Hmmm…that sounds like a potential lead. \n            *goto bed_8\n        *if magnet > 50\n            *set emp +1\n            *set pop %+10\n            You don't go viral, but a small splash is better than nothing!\n            \n            You post a video of yourself describing your most recent show-down with the Sloth, but haven't learned the need to…enhance the facts on social media. Your by-the-book account is accurate, but not as exciting as it could have been.\n            \n            \"The Sloth, he's pretty strong, okay? I think he can lift a car over his head! And he has these big claws. And, well, he can swing and hang on stuff better than any of the other Miscreants! It's seriously not even close!\"\n            \n            A few 'likes' start streaming in, and you even get a scandalous DM from one of your groupies, one who $!{ro_name} previously described as 'clearly seeking attention.' \n            \n            You similarly stick to the facts regarding the Sloth's weapon, which results in a short response from Akio Nakamura, a Japanese celebrity scientist famous for studying super powers. \n            \n            \"Study high-power microwaves. See link. And what's your top speed? DM me if private.\"\n            \n            Hmmm…you might have some reading to do. \n            *goto bed_8\n        *else\n            *set emp +0\n            *set pop %-10\n            If only you had a compelling social media presence! Geez, you didn't fully realize how toxic some platforms can be!\n            \n            You start typing out a series of factually accurate, but admittedly dry, posts detailing your last show-down with the Sloth, but negative comments start immediately pouring in.\n            \n            [i]$!{heroname}'s big bad[/i] \n            \n            A GIF shows a happy sloth taking fifteen seconds to smile. \n            \n            [i]HTF did you LOOSE to him???? srously???[/i] \n            \n            You roll your eyes, stopping yourself from correcting the misspelling.\n            \n            Laughing emojis start following each comment. DMs trickle in. One in particular catches your eye.\n            \n            [i]give ur sidekick a chance!!! she is legit awesome…fast and hot af[/i]\n            \n            You grind your teeth when you notice the user name: whippetgood2001\n            \n            No scientist, celebrity or otherwise, enters the fray. This was a total waste of time.\n            *goto bed_8        \n    #\"I'm pummeling some Yes Men tonight. Don't wait up.\"\n        *if violence > 59\n            *set rogues +2\n            *set law %+20\n            The pummeling ends up being an unmitigated success!\n            \n            \"Damn, that had to hurt!\"\n            \n            The VCPD fights along your side, officers frequently expressing shock at how ruthlessly you take down the mind-controlled thugs. \n            \n            You run the perimeter of Spectrum Park, snatching Yes Men's guns and forcing them into tighter and tighter spaces. Not one villain escapes from the park!\n            \n            This allows the VCPD to stay together, nabbing the unarmed Yes Men left and right, leading a parade of handcuffed thugs to waiting patrol cars. No officer is injured.\n            \n            When one of the leaders manages to escape an officer's grasp, you intervene by zipping in front of her and flicking her in the forehead, knocking her to the ground.\n            \n            You dust off your hands to the cheers of Valiant City's finest.\n            \n            \"Come on, ${heroname}, drinks are on us,\" a lieutenant says, slapping you on the back. \n            \n            \"Damn, you got that cheap bastard O'Hara to pay for drinks?\" another officer jokes. \"McNamara ain't gonna believe this.\"        \n            *goto bed_8\n        *if violence > 50\n            *set rogues +1\n            *set law %+10\n            As far as pummelings go, it goes reasonably well!\n            \n            You start by racing around the perimeter of Spectrum Park, forcing the Yes men into a tighter and tighter area. This helps the VCPD focus their efforts, but you forget to grab some of the Yes Men's weapons, which leads to a shoot-out in the middle of the park.\n            \n            \"Take cover!\" barks a lieutenant as officers duck behind their patrol cars, returning fire at the mind-controlled thugs.\n            \n            You zip around the firefight, snatching guns from the Yes Men and punching them out, one by one! But you have to keep alert as bullets whiz past you from both directions. You may be the fastest person alive, but you're not bullet-proof!\n            \n            \"Officer down!\" someone yells from behind a patrol car. This seems to intensify the VCPD's efforts. Yes Men start dropping left and right. You knock out the last two and the bullets stop flying.\n            \n            The sirens of an ambulance wail in the background as officers tend to their fallen comrade.\n            \n            The lieutenant slaps you on the back. \"Thanks for the help, ${heroname}. It would have been uglier without you here. Now we just gotta pray O'Hara makes it.\"\n            *goto bed_8\n        *else\n            *set rogues +0\n            *set law %-10\n            But the planned pummeling is a disaster from the start!\n            \n            You try to round up the Yes Men into a more management group, racing in circles around Spectrum Park to pin them in, but the mind-controlled thugs start immediately firing at the VCPD officers!\n            \n            Bullets fly! Officers go down! Others scurry back, taking shelter behind their patrol cars! Their Glocks just aren't a match for the Yes Men's M16s!\n            \n            \"Damnit,\" you mutter through gritted teeth. You take cover behind a tree, flinching at the bursts of gunfire seemingly coming from every direction.    \n                                   \n            You grab one of their guns, but a shout of \"Officer down!\" in the distance distracts you, allowing the villain to land a punch to your jaw. \"Damnit!\" you grunt, swatting her away with a super fast finger flick to her forehead.\n            \n            Eventually, you clear Spectrum Park of Yes Men, although many simply run away, some still armed. \n            \n            Ambulances wail in the distance. Wounded officers writhe on the ground. Your offers to transport officers to the hospital are harshly denied.\n            \n            \"Get outta here before I lock your ass up!\" a lieutenant barks at you. \"You don't know the first thing about procedure! We would have been better off without you!\"    \n            *goto bed_8\n            \n*label bed_8\n*page_break\nA half hour later, you gulp a handful of aspirin before flopping into bed. A rush of pain sears down your shoulder. Crap. You must have pulled some of your stitches. Maybe $!{ro_name} can patch you up in the morning. You glance over in the dark.\n\n*if (ro > 60)\n    @{ro_he2 He snuggles | She snuggles |They snuggle} behind you, looping an arm lazily over your waist and whispering in your ear, \"Love you.\"\n    \n    Yep, your partner will take care of you, just like @{ro_he2 he always does. |she always does. |they always do.} \n    *finish\n*if (ro > 42)\n    @{ro_he2 He gives | She gives | They give} you a brief pat on the arm and a terse \"Goodnight,\" before rolling away so you're back-to-back. \n    \n    You lay awake, looking up at the ceiling, wondering if $!{ro_name} will make time to patch you up in the morning.\n    *finish\n*else\n    @{ro_he2 He moves his | She moves her |They move their} feet away from yours so they don't touch, grumbling, \"Don't put those ice cubes on me!\"\n    \n    Not another word is said.\n        \n    You might have to tend to those stitches yourself when you wake up. \n    *finish\n\n\n*comment my gosubs    \n\n*label speedbump_intro_8\nYou manage a quick, \"I'm fine, gotta run!\" to $!{ro_name} before zipping away to the waterfront!\n        \nSpeedbump isn't hard to find. As you streak toward the battle, you spot blue energy blasts raining down from a sleek silver-clad figure in the sky. Well, that's Silver Rocket!\n\nThe energy blasts ricochet off someone dressed in clunky brown and grey metal armor. The figure shakes her fist at Silver Rocket and squirts a spray of oil that fizzles out before it gets within 100 feet of the flying hero. And…that's the villain who fancies herself your greatest enemy, Speedbump!\n\nYou zip closer, ducking behind a recently-abandoned food truck. Sniffing the air, you pick up a whiff of $16.00 artisanal baloney sandwiches. But there's no time for distractions; you need to surprise Speedbump while she's focused entirely on Silver Rocket!\n\n\"Come down and fight me, you coward!\" Speedbump yells at Silver Rocket.\n\n\"You really expect me to do that?\" Silver Rocket shouts, swooping over the villain's head and blasting the villain's oil gun from her wrist.\n\n\"No, hero! I expect you to die! Or, at least lose in a humiliating manner!\" \n\nSilver Rocket fires again! But this time, Speedbump whips out a thin mirror, and reflects the blast back at Silver Rocket! The shot finds its mark, and the futuristic hero starts losing altitude!\n\nNow! It's time to make your move!\n*return\n\n\n*label perpetualman_intro_8\nYou manage a quick, \"I'm fine, gotta run!\" to $!{ro_name} before zipping away to the Hub!\n        \nPerpetual Man isn't hard to find. You spot the villain, donning his trademark purple and black bodysuit, crouching down by a jewelry store's display window. He aims what appears to be the Sloth's rifle at the store's front door.\n        \nYou creep closer in short bursts. There's no way you're letting him blast you with that thing!\n        \nPerpetual Man slips his sunglasses up on his forehead and squints at the window. Then he bashes the glass with the butt of the Sloth's weapon.\n        \nThe security alarm blares, masking what appears to be an R-rated diatribe from the villain.\n        \nWhile he's distracted, you dart behind him and snatch the weapon! Then you move your hands in a flurry over Perpetual Man's body, removing four different gadgets from various pouches on his suit.\n        \n\"You?\" he groans.\n        \n\"Who else?\" you respond, satisfied that Perpetual Man is weaponless. But catching him wasn't the goal; you still have work to do. Can you trick him into talking?\n*return\n\n\n*label k9er_intro_8\nYou manage a quick, \"I'm fine, gotta run!\" to $!{ro_name} before zipping away! Whippet relays her location and ceases communications.\n        \nAnd it turns out that the location is a dog show, one of those fancy ones where dogs are judged on standards that regular people can't even spot, much less evaluate. \n        \n\"$!{heroname}!\" K9er snarls at your arrival. The militant animal rights activist snaps her fingers, and at least a hundred dogs of various breeds jerk their heads toward you. \"This is a rescue operation!\"\n        \nWhippet is running circles around the show ring. A Boston Terrier and a dachshund have latched their jaws onto her uniform around her ankles, their bodies whipping up like furry mud flaps. \n        \n\"K9er! Call them off or else!\" she yells.\n        \nK9er scoffs, her spotted black and white muzzle curling into a grin. Her sharp canine teeth glisten. \"Sniff my ass, Whippet! You don't have the guts!\"\n        \nYou survey the scene. The last few audience members are pushing through the exits. It's just you, Whippet, K9er, and dogs. \n        \nSo many dogs. \n        \nIt's time to show K9er that you and Whippet are the alphas!\n*return\n\n\n\n\n\n\n\n", "9-showdown": "*page_break\n*text_image chap_9.png center Chapter Nine Showdown\n*if choice_quicktest\n    *set oldspot2 1\nThe beeping of your phone stirs you awake. You grab it from your night stand and squint at the news alert.\n\n[i]\"BREAKING: BLACKOUT AT ZENITH TOWER. CEO ECHO RYLAN EVACUATES TOWER, MEETING WITH MAYOR AT CITY HALL\"[/i]\n\nThis is it.\n\nThis has to be the Sloth.\n\nYou stumble out of bed, answer the call of nature, and tug on your ${uniform}. Crap! Your shoulder! The pain makes you grind your teeth, but there's no time to mess with it! Whatever the Sloth is doing, he's doing it now!\n\nTapping your communicator, you buzz Whippet.\n\n\"Whippet, you awake? Meet me at base of Zenith Tower. Do [i]not[/i] enter! Wait for me!\"\n\n\"Whut…?\" Whippet mumbles, making a lip-smacking sound.\n\nYou repeat everything, twice, and then reach down to squeeze $!{ro_name}'s foot that's sticking out from under the comforter. \n\n\"I've got to go,\" you whisper, dashing to the door, and zipping toward Zenith Tower! \n\nThere's so much racing through your head, but mostly you're thinking…\n\n*fake_choice    \n    #…that at least Echo is safe!\n        If something happened to Echo, any chances for you landing that Hypersonic 3000  endorsement deal would probably go down the drain.\n    #…about the size of the power outage.\n        What's the range of the Sloth's weapon? Depowering the tallest building in the city is quite the leap from temporarily zapping you yesterday. \n    #…that Silver Rocket won't be showing up today.\n        It's pretty obvious, isn't it? With Rylan tied up briefing the Mayor, ${ro_he} won't be able to slip away to become the city's second-most-famous hero.\n        \nZenith Tower looms on the horizon, dark and silent. You narrow your eyes and pour on the speed, streaking toward your destination, and looking around for your sidekick.\n\n\"Whippet? You here?\" you ask into your communicator as you skid to a stop.\n\nThere's a tap on your shoulder. You turn to Whippet, decked out in her dog pajamas-slash-uniform, looking more serious than you've ever seen her.\n\n\"I got here like three seconds ago. I dunno what's going on, but look,\" Whippet says, pointing to the sky. Two VCPD helicopters circle the tower, although they seem to be keeping a wide radius. \n\n\"The Sloth's up there,\" an officer briefs a colleague as they gaze at the top of Zenith Tower. \"On the roof. We just need to keep him contain—\"\n\n\"Until we step in,\" you interrupt the officer, giving him a curt nod. \"Whippet and I are ready. Can you relay that up the chain?\"\n\nThe officer nods, walking away, talking into his shoulder radio. \n\n\"We're ready?\" Whippet asks, swallowing hard.\n\n*fake_choice\n    #I nod. \"We're going to make it through this. I promise.\"\n        *set future %+20\n        \"I'm holding you to that,\" Whippet says, her voice shaking. \"Let's go.\"\n    #I crack my knuckles. \"It's time to remind the Sloth who he's dealing with!\"\n        *set ego %+20\n        Whippet nods, jogging in place to loosen up. \"You've got his number! We've got this!\"\n    #I put my hand on Whippet's shoulder. \"Yes we are, both of us. I have faith in you.\"\n        *set ego %-20\n        Whippet pauses and purses her lips. After a few seconds she says, \"Thank you. That means a lot. Now let's kick some Sloth ass!\"\n    #I inhale sharply and look in her eyes. \"Yes. But if things go south, don't worry about me. Just run. Got it?\"\n        *set future %-20\n        \"Got it,\" Whippet replies. \"But you run too, okay? We're in this together.\"\n        \n\"We're taking the stairs. And, whatever he's using up there, it's probably like the gun he used to zap me.\"\n\n\"So, what's the plan?\" Whippet asks.\n\n\"If you feel depowered, then you retreat back to the stairs. I'm serious! You're not taking him on at less than 100 percent.\"\n\n\"But what about you?\"\n\nYou shrug and hold out your hands, palms up. \"Me? I'm taking him down, one way or the other.\"\n*page_break\n\nThe stairwell presents several challenges. It's pitch black all the way up, all eighty-seven stories, and a full-speed race up the steps would be too noisy. So, you and Whippet settle into a steady jog, floor after floor.\n\nWhippet whispers on the forty-second floor, \"He won't be expecting me. We'll have the element of surprise too.\"\n\n\"Remember what I said. If you feel weird, like your powers aren't working, you run.\"\n\n\"What was that?\" Whippet asks, racing ahead, accelerating as you near the top.\n\nYou mutter at her stubbornness, picking up the pace.\n\nYou reach the top floor together. Whippet nudges the door open a few inches.\n\nPeeking through the gap, you see the Sloth tinkering with a monstrous device, at least twice his own size. The machine pulses, and a wave of weakness washes over your body. \n\n\"Ugh,\" Whippet groans. \"I feel funny.\"\n\n\"I feel it too,\" you mumble. You tap your finger against the door as fast as you can. It quickens in a blur, but not at full speed. How much longer will you have any powers at all? Seconds? \n\nIt's time to make a huge decision!\n\nWhat do you do about the Sloth's device?\n\n*choice\n    #Team up with Whippet to destroy it!\n        *gosub whippet_emp_9\n        *if whippet > 4\n            *set citydamage 0\n            *page_break\n            *achieve kaboom\n            Whoosh!\n            \n            You and Whippet race out to the machine, cutting to the right and accelerating in a pair of blurs. \n            \n            From the corner of your eye, you spot the Sloth vaguely recognize that something is going wrong, as his mouth gradually opens in dismay.\n            \n            But you can't focus on him! You can only focus on running as fast as you can, even as the Sloth's device continues to hum and pulse, draining energy from you and your sidekick.\n            \n            \"Faster!\" you scream to Whippet, gritting your teeth and pumping your arms until you feel your heart will explode.\n            \n            The squeal of twisting metal is music to your ears. The machine starts to dent and bend inward, contorting into a macabre version of itself.\n            \n            \"Faster!\" you scream again, on the verge of passing out. \n            \n            The Sloth's device groans, exploding into a shower of electrical hisses and sparks. Then it goes dark and silent.\n            \n            You and Whippet are tossed to the ground! Pressing your hands against the roof, you struggle to get to all fours.\n            \n            The Sloth growls in rage. \"You…killed…my…dream! You…will…die…for…this!\"\n            *goto sloth_showdown_9\n        *if whippet > 2\n            *set citydamage 1\n            *page_break\n            Whoosh!\n            \n            You and Whippet race out to the machine! You cut right, but Whippet cuts to the left! This is not how you drew up the plan! You're supposed to be running in the same direction!\n            \n            You skid to a halt, glancing over at the Sloth, who eyes you with dismay, his gnarled teeth exposed in a snarl. \"No!\" he grunts.\n            \n            You turn around and start running in Whippet's direction. Her error has screwed up your entire plan!\n            \n            As you accelerate behind her, the Sloth's machine glows a bright blue and sends a strong pulse out in a circle. You blink and look out to the city. For blocks in every direction, Valiant City has grown dark. \n            \n            Another pulse could affect the entire city! You pour on the speed!\n            \n            \"Faster!\" you scream to Whippet, on the verge of passing out.\n            \n            The Sloth's device groans, exploding into a shower of electrical hisses and sparks. Then it goes dark and silent.\n            \n            You and Whippet are tossed to the ground! Pressing your hands against the roof, you struggle to get to all fours.\n            \n            The Sloth growls in rage. \"It…had…only…just…started! You…will…die…for…this!\"\n            *goto sloth_showdown_9\n        *else    \n            *set citydamage 2\n            *page_break\n            Whoosh!\n            \n            You and Whippet race out to the machine! You cut right, but Whippet cuts to the left! This is not how you drew up the plan! You're supposed to be running in the same direction! Whippet's error will prove to be a costly one.\n            \n            You start skidding to change direction, but it's too late!\n            \n            Whippet comes flying at you, bumping you from your orbit and sending you flying across the roof!\n            \n            You tumble over and over, rolling off the edge of Zenith Tower! \n            \n            You grasp the edge and hang there, your feet swinging in the air. \n            \n            Gritting your teeth, you tug yourself back to the roof just in time to see the Sloth's plan succeed.\n            \n            Whippet is running in a blur around the Sloth's device, but her speed alone isn't enough. The machine sends a strong pulse out in a circle around it. City blocks in every direction go dark.\n            \n            The device glows a bright blue and hums louder, sending out a far stronger pulse! The force flings Whippet away, knocking her against the stairwell.    \n            \n            The Sloth looks out over the city, his back to you. \"Isn't…it…perfect?\" he grunts.\n            \n            You look out onto Valiant City. The entire city is dark and silent. The Sloth has won.        \n            \n            \"Enjoy…the…peace…before…you…die.\"\n            *goto sloth_showdown_9\n    #Use your knowledge of the Sloth's motives to convince him to deactivate it!\n        *gosub sloth_emp_9\n        *if sloth > 4\n            *set citydamage 0\n            *page_break\n            *gosub sloth_lurch                       \n            \"Look,\" you say, \"Maybe things were better when you were a kid. Life had a slower pace. People talked with each other more. Kids rode their bikes instead of staring at screens all day. Everything was more…genuine.\"\n            \n            The Sloth slowly nods.    \n            \n            \"But what would your machine do? Think about it. Kids in hospitals are kept alive by technology. Technology lets people from around the world communicate and share ideas. Hell, technology has helped our city go green. We can help save the planet. But not if you shut it all down.\"\n            \n            The Sloth slumps and pauses. Then he reaches out with a long arm, tapping a few buttons on his device. It goes silent and dark.    \n            \n            \"This…changes…nothing. Only…one…of…us…is…leaving…this…roof.\"           \n            *goto sloth_showdown_9\n        *if sloth > 2\n            *set citydamage 1\n            *page_break\n            *gosub sloth_lurch\n            \"Look,\" you say, \"Are you just upset about…getting old? Feeling like you're lost or something? Because I can totally under—\"\n            \n            \"That's…not…it!\" the Sloth growls.\n            \n            \"Then what is it? I mean, do you really want to destroy all of our technology? It keeps kids alive in hospitals! It lets people from around the world communicate and share ideas.\"\n            \n            \"I…need…a…sanctuary.\"\n            \n            \"A sanctuary?\"\n            \n            \"Yes,\" the Sloth replies, reaching out with a long arm, tapping a few buttons on his device. The machine glows blue and emits a pulse in a circle around it. For blocks in every direction, the city goes dark and silent. But beyond the dark circle around Zenith Tower, the city remains vibrant and unaffected.\n            \n            \"There…I…have…my…sanctuary. And…I…will…be…at…peace…when…I…kill…you.\"\n            *goto sloth_showdown_9\n        *else\n            *set citydamage 2\n            *page_break\n            *gosub sloth_lurch\n            \"Look, whatever you think your machine will do, it's not going to work like you think it will!\"\n            \n            The Sloth growls, \"It…will…work…exactly…like…I…think…it…will!\"\n            \n            You struggle to get inside the Sloth's head. What's driving him? Maybe an insult might throw him off?\n            \n            \"You're not some evil genius! You're just the Sloth!\"\n            \n            Instead of snarling, the villain smiles, his thin lips stretched wide. \"Did…any…of…the…other…Miscreants…do…this?\"\n            \n            He reaches out with a long arm, tapping a few buttons on his device. It glows a bright blue and hums louder, sending out a pulse so strong that you must raise your arms over your face and dig in to avoid being blown off the roof!\n            \n            The Sloth looks out over the city, his back to you. \"Isn't…it…perfect?\" he grunts.\n            \n            You look out onto Valiant City. The entire city is dark and silent. The Sloth has won.        \n            \n            \"Enjoy…the…peace…before…you…die.\"\n            *goto sloth_showdown_9\n    #Use your knowledge of the device to deactivate it!\n        *gosub emp_emp_9\n        *if emp > 4\n            *set citydamage 0\n            *page_break\n            You zip straight at the machine, before the Sloth can even react! \n            \n            Running circles around the device, you start studying the different components. There are some panels that might slide, and there are a lot of glowing buttons. The Sloth probably designed some safeguards, so you'll have to be precise!\n            \n            Using all of the knowledge you've gained about the device and how it works, you start darting around, pushing buttons until a panel slides open revealing a 9-key pad. This might grant you access to the battery compartment, but only if you key in the right code. \n            \n            The small display seems limited to about four digits.\n            \n            Your fingers flying, you get two-thirds of the way through every possible combination of four digits until the machine beeps and a door pops open, exposing the batteries.\n            \n            \"No!\" the Sloth groans in slow motion.\n            \n            But such close exposure to the device has weakened you. It takes every bit of your strength to tug the batteries free, and for you to toss them to Whippet. The Sloth's device goes silent and dark as Whippet chucks the batteries down the stairs. \n            \n            The Sloth growls and starts advancing. \"You…killed…my…dream. You'll…die…for…that!\"\n            *goto sloth_showdown_9\n        *if emp > 2\n            *set citydamage 1\n            *page_break\n            You zip straight at the machine, before the Sloth can even react! \n            \n            Running circles around the device, you start studying the different components. There are some panels that might slide, and there are a lot of glowing buttons. The Sloth probably designed some safeguards, so you'll have to be precise!\n            \n            You wish you better understood the machine! How are you supposed to know which buttons to push? And where are the batteries? You'll have to find them to shut this thing down!\n            \n            Zap! As soon as your finger punches the first button, a jolt of electricity crackles down your hand! You jerk your hand away, cussing under your breath. \n            \n            You need to be careful with those safeguards!\n            \n            You start circling the machine again. It glows a bright blue and emits a pulse that almost knocks you over! You look out over the city. For blocks in every direction, all you see is darkness. Another pulse could affect the whole city!\n            \n            You zip around again, pushing different buttons. To your surprise, a panel slides open to reveal the battery!\n            \n            Weakened, it takes every bit of your strength to tug the batteries free and toss them to Whippet, who chucks them down the stairs. The device goes dark and silent.\n            \n            The Sloth growls in rage. \"It…had…only…just…started! You…will…die…for…this!\"\n            *goto sloth_showdown_9\n        *else\n            *set citydamage 2\n            *page_break\n            You zip straight at the machine, which starts to look bigger and more imposing as you get closer.\n            \n            Why did you think you know how to shut down this thing?\n            \n            Dozens of buttons glow on different parts of the device, and you spot a few panels, but you have no idea how to open them. And where's the battery?\n            \n            Zap! As soon as your finger punches the first button, a jolt of electricity crackles down your hand! You jerk your hand away, cussing under your breath. \n            \n            You look over your shoulder at the Sloth. He chuckles, \"Go…ahead…and…try!\"\n            \n            Darting into action, you try again!\n            \n            Zap! Another shock!\n            \n            Then a claw pops out from behind a panel and grabs your wrist, flinging you away!\n            \n            The Sloth chuckles again and turns his back to you, looking over the city. \"In…three…two…one…\"\n            \n            His machine glows a bright blue and hums louder, sending out a pulse so strong that you must raise your arms over your face and dig in to avoid being blown off the roof!\n            \n            The Sloth looks out over the city, his back to you. \"Isn't…it…perfect?\" he grunts.\n            \n            You look out onto Valiant City. The entire city is dark and silent. The Sloth has won.        \n            \n            \"Enjoy…the…peace…before…you…die.\"\n            *goto sloth_showdown_9\n        \n            \n*label sloth_showdown_9\n*page_break\nYour knees buckle as the Sloth lumbers closer. Standing too close to the machine for too long has taken its toll. You feel drained, weak.\n\nThe Sloth raises his claws over his head, spittle flying from his mouth as he roars.\n\nYour sidekick has to be similarly drained; you won't see her die tonight. \n\n\"Whippet, stay back!\" you bark. \"Stay back!\"\n\n\"No way!\" Whippet screams. \"I'm coming!\"\n\n\"No!\" you repeat. \"Stay there! I'll handle him!\"\n\nThe Sloth's furry chest heaves as he lurches closer, long arms flailing.\n\nNow's the time to make a life or d
