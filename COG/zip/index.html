e things can be dangerous. It's common knowledge.\"\n            \n            You zip out of the building before Rylan can respond.\n            *goto backofmind_5\n    #Give a creative pitch!\n        If you can help Rylan visualize an ad campaign, your stock will surely rise! \n        \n        But someone like Rylan has probably already brainstormed this! What angle can you use?\n        \n        *if art > 50\n            *set commercial +1\n            Words alone aren't sufficient! This is more of an \"act it out\" situation!\n            \n            \"Picture this,\" you exclaim, tapping your temple, \"Speedbump has a bag of money in her hand, like she just robbed a bank—\"\n            \n            \"Wait, does the bag have a big money sign on it?\" Rylan asks with a grin.\n            \n            \"Of course!\" you reply without missing a beat. \"And she's [i]this[/i] close to slipping away on a private jet, like she's walking up the steps to the airplane door, when—\"\n            \n            You kneel down, acting out the motion of tying your shoes. \"The camera pans to me putting on my Hypersonic 3000s! And then—\"\n            \n            Whoosh! You appear on the far end of Rylan's office extending your fists up like you've snagged the money bag in one hand and Speedbump in the other. \n            \n            \"Now that's a commercial that will sell some shoes!\" you say.\n            \n            You wink before zipping out of the building.\n            *goto backofmind_5\n        *else            \n            And you come up with…nothing.\n            \n            Everything you consider seems generic and pedestrian. \n            \n            You hold up your index finger. \"I'm still interested, but there's a Sloth on the loose, and, well, those things can be dangerous. It's common knowledge.\"\n            \n            You zip out of the building before Rylan can respond.\n            *goto backofmind_5\n    *selectable_if (juice > 20) #Show off with my Juice! (uses 20 Juice)\n        *set commercial +1\n        *set juice -20\n        *achieve bagel\n        \"You said the Board thinks the shoes speak for themselves, huh?\" you ask.\n        \n        Before Rylan gets the word \"Yes,\" out of ${ro_his} mouth, you've unleashed the full power of your Juice!\n        \n        Zip! You leave the office and return seconds later, leaving Rylan blinking and confounded. \"Where…where did you go?\" @{ro_he2 he asks|she asks|they ask}, \"and what's so impressive about zipping away for a second? Everyone knows you can do that.\"\n        \n        \"I'll let my abilities speak for themselves,\" you respond, slipping a napkin-wrapped onion bagel on Rylan's desk.\n        \n        \"Where did you get that?\" Rylan sputters, losing ${ro_his} cool for the first time.\n        \n        You simply reply, \"New York,\" before zipping out of the building.    \n        *goto backofmind_5\n        \n*label backofmind_5\n*page_break\n\nIn the light of day, the alley beside Futuro Electronics doesn't look ominous at all, and neither does the store itself. It's just a humble little shop in a plain brick building. The front window is boarded up, but the door's sign is flipped to \"Open.\"\n\nStepping inside, you wave to the young lady behind the counter. She pushes her glasses higher on her nose. \"Hi, I'm Jordin! Welcome to Futuro! The future starts here!\"\n\n\"Catchy! Anyway, the other night, a villain called the Sloth stole something from your store. Can you help me with that?\"\n\n\"Oh, I'm just a part-timer. I can't really, uh, talk about that. You'd have to talk to corporate. Sorry!\"\n\nThe bell on the door rings, and Jordin repeats, \"Sorry,\" before turning to the new customer.\n\nYou stroll over to the phone accessories section to consider your next move. Actually, people [i]used[/i] to call them 'phones,' but really they're mini-computers. And neural implant options roll out next year.  \n\n*if (future > 50)\n    That's what you call progress! Why carry a little computer in your pocket or your purse when you can skip the need for hardware all-together? It's just more efficient that way.\n    \n    You're excited to see what they think up next!\n    *goto glancing_back\n*else\n    People are already addicted to these damn things, and the neural implants will just make it worse. Everyone already walks around like zombies; what's the end goal, to completely rewire our brains?\n    \n    This sort of 'progress' is killing society.\n    *goto glancing_back\n\n*label glancing_back\nGlancing over your shoulder, you confirm that Jordin is still busy with the new customer. You absolutely [i]need[/i] to determine what the Sloth took from this store. What's the best way to approach this?\n\n*choice\n    #I use my brain! What's the most valuable item they sell?\n        The Sloth wouldn't waste his time, or risk getting arrested, to steal some trinket! \n        \n        It's really just a matter of sorting through the high-end stuff and narrowing down the possibilities. \n        \n        *if brain > 50 \n            *set emp +1        \n            So you approach this logically, ignoring the cheaper merchandise on the walls and focusing on the fancier stuff closer to the counter, some of which is behind glass. \n            \n            Your eyes narrow as you spot an empty spot behind the display glass under the cash register. You motion Jordin closer and tap on the glass. \"Was this here the last time you worked?\"\n            \n            Jordin swallows nervously, like she's afraid to even answer your question, but eventually nods. \"Yeah, it was. And it's weird that it's gone now. I haven't sold one in two years.\"           \n                       \n            *gosub battery_5\n            \n            *page_break\n            Playing a hunch, you race out the door and hit the other two Futuro locations in Valiant City. One store has the battery on display, but the other store is also missing the battery. And the slightly more helpful employee admits it was recently stolen. \n            \n            It's not a stretch to assume the Sloth has not one, but [i]two[/i] of these batteries in his furry clutches! Whatever he's up to, he needs a lot of power!\n            \n            *gosub leave_futuro_yes_5\n            *goto meet_whippet_5\n        *else\n            *set emp +0\n            But that's easier said than done. The store is full of cutting edge gadgets, a number of which could have enticed the Sloth.        \n                     \n            And the store keeps getting busier. Customers clamor around you, asking for selfies and impeding your progress. No matter how hard you look, you can't locate the mystery item. This is a waste of time!\n            \n            You give up and zip away, deflated.\n            *gosub leave_futuro_no_5\n            *goto meet_whippet_5            \n    #I need to go over Jordin's head and talk to Futuro's corporate office!\n        This low-level employee may not know what's going on, but the bigwigs certainly will! \n        \n        \"Jordin,\" you ask after she finishes helping the customer, \"Can you call corporate and tell them that, ahem, ${heroname} needs to speak with them about the theft?\"\n        \n        \"Oh, of course,\" she says, consulting a piece of paper taped on the counter beside the cash register. \"There's a phone in the back corner over there, it'll be more private.\"\n        \n        *if magnet  > 50 \n            *set emp +1      \n            *achieve leveraging\n            The conversation contains a maddening level of corporate-speak, requiring you to 'speak the language' to get the results you need. \n            \n            \"We appreciate and value your concern, ${heroname}, and as we speak, we're building consensus on some exciting new best practices for risk assessment while adhering to our core competencies.\"\n            \n            \"Sooooo…you're…leveraging your synergies?\" you ask, keeping your voice smooth and confident.\n            \n            \"Precisely!\" the woman on the other end of the line exclaims.\n            \n            In the end, you both use too many words to convey too little information, but you learn what the Sloth stole. You put the phone down and dart over to the service counter to check it out.            \n                       \n            *gosub battery_5\n            \n            *page_break\n            You dash back to the phone and learn one more interesting tidbit of information from the corporate drone. \n            \n            [i]Another[/i] of these batteries was stolen recently, apparently at another Futuro location in Valiant City. Whatever the Sloth is up to, he needs a lot of power!\n            \n            *gosub leave_futuro_yes_5\n            *goto meet_whippet_5\n        *else\n            *set emp +0\n            The conversation starts out pleasantly enough, but soon you're inundated with maddening levels of corporate-speak.   \n            \n            \"We appreciate and value your concern, ${heroname}, and as we speak, we're building consensus on some exciting new best practices for risk assessment while adhering to our core competencies.\"\n            \n            \"Sooooo…you're doing what, exactly?\" you ask, trying to mask your irritation.\n            \n            \"Well, it all starts with leveraging our synergies,\" the woman on the other end of the line explains unhelpfully. \n            \n            This is a huge waste of time. You're not getting any real information from these corporate drones. You hang up and zip away, deflated.\n            \n            *gosub leave_futuro_no_5\n            *goto meet_whippet_5\n    #I can sneak into the manager's office. Maybe I'll find a clue there!\n        Who knows, maybe the manager scribbled some notes on a sticky pad or maybe they don't password-protect their computer? It's worth a shot!\n        \n        You just have to be sure Jordin doesn't spot you.\n        \n        *if sneak > 50\n            *set emp +1\n            You creep back to the manager's office, careful to avoid bumping the end-cap displays of AAA batteries and cheap cell phone cases.\n            \n            Gently twisting the door knob, you slip into office and inspect the manager's desk. You sift through the scraps of paper and take-out menus on the desk with no luck. \n            \n            But when you click the computer mouse, the manager's emails pop up. The second sent message reads as follows:\n            \n            [i]Marc, any guidance on storing these batteries in the future? Should they be available online only? I'm aware of issue at Store 324 as well. Regards, Julie[/i] \n            \n            Hmmm…a battery? You dart back out to the service counter and see that Jordin is still assisting a customer. You inspect the display glass and find what you're looking for!\n            \n            *gosub battery_5\n            \n            *page_break\n            You dash back to the manager's office one last time, clicking through replies in the e-mail chain. \n            \n            [i]Julie, we will advise shortly. With two units stolen in two days from VC locations, I'm leaning towards online only, but no final decision yet. Sincerely, Marc[/i]\"\n        \n            So [i]another[/i] of these batteries was stolen recently, apparently at another Futuro location in Valiant City? Whatever the Sloth is up to, he needs a lot of power!\n            \n            *gosub leave_futuro_yes_5\n            *goto meet_whippet_5         \n        *else\n            *set emp +0\n            Damnit! You bump against an end-cap display of AAA batteries, knocking two packages to the floor.\n            \n            Jordin glances back at you and gives a cautious wave. \n            \n            Then the bell over the door rings again. Two more customers stroll inside and head in your direction.  \n            \n            Crap! You can't risk getting caught sneaking into the manager's office now, not with multiple potential witnesses. \n            \n            You zip away, deflated.\n            \n            *gosub leave_futuro_no_5\n            *goto meet_whippet_5\n            \n    *selectable_if (juice > 20) #With Juice, I can review the store's inventory in seconds! (uses 20 Juice)\n        *set emp +1\n        *set juice -20\n        You bolt to Jordin's computer, your fingers tapping keys in a frenzy, pulling up an inventory list and leaving it displayed on the monitor. Jordin has barely moved, her hand moving in slow motion toward a charging cable on a display hook.\n        \n        Zip! Whoosh! You dash back and forth from the screen to the various hooks and shelves, comparing the items still available for sale versus the inventory listing. \n        \n        It takes thirty or forty trips, but you find your target in the display glass under the counter.\n        \n        *gosub battery_5\n        \n        *page_break\n        You take once last glance at the monitor and notice an asterisk by the battery. A comment has been entered that says, \"Enhanced risk of theft, two units stolen within 48 hours at VC stores 321 and 324.\"\n        \n        So [i]another[/i] of these batteries was stolen recently, apparently at another Futuro location in Valiant City? Whatever the Sloth is up to, he needs a lot of power!\n        \n        *gosub leave_futuro_yes_5\n        *goto meet_whippet_5\n    \n*label meet_whippet_5\n*finish\n\n\n\n        \n        \n        \n*label battery_5\nFuturo is missing a very expensive battery, with a retail price of $1,999.00! Glancing at the specifications on the shelf label, it uses silicon, not graphite like most others. And it's powerful enough to run, well, something pretty big!\n*return\n\n*label leave_futuro_yes_5\nSo, you have a clue about the Sloth's scheme, but no way to track him, at least for now. But, you have plenty to keep you busy!\n\nYou dart out of the electronics store and tap your communications device on your ear. \"Whippet, you there?\" you ask, \"Your vacation's over, it's time to go to work.\"\n*return\n        \n*label leave_futuro_no_5\nWell, that turned out to be a bust! You're no closer to figuring out the Sloth's scheme. Thankfully, you have plenty to keep you busy!\n\nYou dart out of the electronics store and tap your communications device on your ear. \"Whippet, you there?\" you ask, \"Your vacation's over, it's time to go to work.\"\n*return\n\n        \n        \n        \n        \n        \n", "6-trainwhippet": "*page_break\n*text_image chap_6.png center Chapter Six Sidekicked\n\n\"Yaaasss, I missed this! Nine days on a cruise ship, it legit felt like prison!\"\n\nYour speedster sidekick gives you a high five that continues to a low five as you walk past each other. Whippet looks around the storage locker you use as a private training room, saying \"Home sweet home.\"\n\nAt 10 feet by 30 feet, the unit is cozy, and became necessary after Whippet broke one too many lamps in your home. $!{ro_name} insisted.\n\n\"Prison, really? In the South Caribbean? You poor thing.\" \n\n\"I couldn't even run laps on the track at three in the morning cuz of all the drunks and thirsty old people!\"\n\nYou nod, rummaging through a taped up cardboard box full of training supplies. \"What's your poison? Want me handcuffed?\"\n\n\"Nah, we did that last time! How about blindfolded?\"\n\n\"Okay,\" you reply, searching the box for a blindfold.\n\nBy mutual agreement, you don't use your Juice in these sessions, but otherwise you go all out. If you don't push Whippet hard enough, she'll never get to your level. Still, you have to give yourself a disadvantage, or you'd mop the floor with her in seconds. It's a tenuous balance.\n\nWhippet reaches up and starts to tie the blindfold around your head. \"Don't get salty when I kick your ass, okay?\"\n\n*fake_choice  \n    #\"It might just happen this time! And for the record, I admit to being salty.\"\n        *set future %+20\n        \"Whoa, big concession there!\" Whippet laughs as she cinches the blindfold tight.\n    #\"I want you to kick my ass! That's the whole point of this!\"\n        *set ego %-20\n        \"Ooooh! Does $!{ro_name} know you're into that?\" Whippet laughs as she cinches the blindfold tight. \n    #\"Aww…you remind me of when I was young…and raw…and obnoxious.\"\n        *set future %-20\n        \"Yeah, like you remember that far back,\" Whippet laughs as she cinches the blindfold tight.\n    #\"You'll never kick my ass, but you're an adequate sidekick!\"\n        *set ego %+20\n        \"Just so you know, the preferred term these days is 'crime-fighting collaborator,'\" Whippet says as she cinches the blindfold tight.\n        \n\"Drop the silliness,\" you say, \"Focus! Think of all the ways you can beat me!\"\n\n\"You mean like the Sloth did?\" \n\nWhippet's question almost squeezes the air from your lungs. [i]How does she know?[/i]\n\n\"Don't get mad. I checked in with $!{ro_name} this morning when I got in, and @{ro_he2 he told | she told | they told} me about it.\" Whippet's tone seems cautious for once, almost timid. \"You know, nobody's perfect, everyone screws up.\"\n\nYour forehead furrows as you scowl. You stand up and clench your fists. \"Come on, focus!\"\n\nYou feel a rush of air across your face. A punch rocks your jaw. \n\nWhippet cackles, \"Today's the day!\"\n\nAnother rush of air. Something pointy (an elbow?) jabs your stomach, forcing you to hunch forward! \n\n\"I feel it!\" Whippet snickers.\n\nHas Whippet always been this fast? You feel sluggish, lethargic in comparison. How in the world are you going to beat her blindfolded, and without your Juice?\n\n*choice\n    #Tornado time!\n        It's tough to launch a precise counterattack when you're blind, but tornadoes are big and violent and not precise at all! Perfect for an enclosed area like this!\n            \n        But spinning around like that, if you miss her, she can easily catch you off balance and put an end to this! It's a risky move!\n        \n        *if violence > 50 \n            *set whippet +1     \n            Spinning on your right foot like a top, you swing out your arms to build up momentum and to blindly search for Whippet.\n            \n            The rush of air in your ears make its hard to hear, forcing you to rely on instinct, wobbling from one end of the storage locker to the other, like a drunken top.\n            \n            A loud bang gets your attention over the whooshing wind. You stop rotating and rip off your blindfold. \n            *gosub beat_whippet_6\n            *goto whippet_sloth_6\n        *else\n            *set whippet +0\n            You start spinning, swinging your arms out in an attempt to land a blind blow.\n            \n            Around and around you go, until you bang into a wall and lose your balance! Like a drunken top, you wobble and tilt back and forth. \n            \n            To regain your balance, you  slow down, and as soon as you slow down, a foot trips you up, sending you crashing to the floor.\n            *gosub lose_whippet_6\n            *goto whippet_sloth_6\n    #Let her wear herself out!\n        Whippet is fast, and she's strong for her size, but if you can block some of her blows, she'll wear down and be open for a counterattack.\n        \n        But you'll need every ounce of your fortitude, because this is definitely going to hurt!\n        *if tenacity > 50 \n            *set whippet +1        \n            \n            She lands another shot to your face, which rocks your jaw to the side. You need to deflect some of these!\n            \n            You block high, but she goes low to you kidney! You flinch and block high again, this time stopping her kick from battering your chin!\n            \n            It's a guessing game each time, as she's smart enough to mix up her attacks, but you get lucky a few times in a row! Block high! Block low! Spin and block from behind!\n            \n            She pants for breath, and you strike with a vibrating punch! Your fist lands against lips and teeth! Ripping off your blindfold, you check to make sure she's okay.\n            *gosub beat_whippet_6\n            *goto whippet_sloth_6     \n        *else\n            *set whippet +0\n            \n            Wham! She lands a shot on your jaw! Pow! An elbow bashes your kidney!\n            \n            You cross your forearms across your chest, but still Whippet's kick staggers you back. No matter what you do, she keeps you off balance!\n            \n            And a blow to the back of your calves sends you crashing to the floor!\n            *gosub lose_whippet_6\n            *goto whippet_sloth_6\n    #Channel my inner actor to feign injury!\n        Maybe it's not playing fair, but doesn't that prepare her for villainous tactics she may encounter in the future?\n        \n        Of course, the whole plan relies on you catching her by surprise and selling the injury! If she sees through your \"out of the box\" plan, you're done!\n        \n        *if art > 50\n            *set whippet +1\n          \n            Whippet lands a fierce kick to the back of your leg, giving you just the opening you need.\n            \n            \"Ow!\" you howl, clutching the area with both hands. \"My hamstring!\"\n            \n            \"But I didn't kick you that hard!\" she protests. \"Sit down and—\"\n            \n            Before she can finish her sentence, you swing a vibrating punch in the direction of her voice. Your fist lands against lips and teeth! Ripping off your blindfold, you check to make sure she's okay.\n            *gosub beat_whippet_6\n            *goto whippet_sloth_6  \n        *else\n            *set whippet +0\n            *achieve fake\n            \n            Whippet lands a fierce kick to the back of your leg, giving you just the opening you need.\n            \n            \"Ow!\" you howl, clutching the area with both hands. \"My hamstring!\"\n            \n            \"Yeah right, you faker!\" Whippet cackles, taking advantage of your unguarded face.\n            \n            Wham! Pow! Wham! Forearm strikes batter your face, sending you crashing to the floor!\n            *gosub lose_whippet_6\n            *goto whippet_sloth_6\n\n    \n*label whippet_sloth_6\n*page_break\nYou summarize the events of the last two days, including the Sloth's break-in at Futuro and your narrow escape, the Sloth's attempt to convince the city of your demise, the resulting mayhem, and your continuing investigation. \n\n\"You've been fighting him for what, twenty years?\" Whippet asks, lowering the hood of her uniform. Her afro blowout, no longer stuffed into the hood, explodes in all directions.\n\nActually, the word 'uniform' is generous. Your sidekick wears a gray polyester/cotton blend dog-themed pajama onesie with a zipper down the front. The hood has floppy dog ears. \n\n\"Not quite,\" you reply, \"but almost fifteen, yeah. I guess you were in kindergarten or something.\"\n\nWhippet's ridiculously white teeth pop against her copper lips and dark brown skin as she smiles. One of the benefits of having a dentist for a mother, you suppose. \n\n\"Yup, and kicking butt in dodge ball!\" she says before adopting a more serious tone. \"So, we're stuck on what the Sloth is making. Maybe we should look at [i]him[/i] and his motivations?\"\n\nYou pause, considering the teenager's advice. \"Whippet, that's not a bad idea.\"\n\n*choice\n     #\"Let's analyze my personal collection of notes and recordings.\"\n        \"Research your files?\" Whippet groans. \"You picked like the most cringy plan possible!\"\n        \n        You curl your finger to her. \"Come on, race me back to the house! I have flash drives full of material!\"     \n        \n        *if brain > 50 \n            *set sloth +1     \n            You and Whippet hole up in your home office and sort through years of records detailing your various show-downs with the Sloth. $!{ro_name} stays out of your way, but brings snacks which Whippet gobbles down with gusto.\n            \n            \"Yaaasss, cheddar biscuits,\" your sidekick says as she munches.\n            \n            *gosub sloth_patterns      \n            *goto training_6\n        *else\n            *set sloth +0\n            \n            Hours spent holed up in your home office yield few results, although Whippet enjoys $!{ro_name}'s cheddar biscuits. \"These are everything!\" she says as she happily munches.\n            \n            \"Damnit, why can't we find a pattern?\" you grumble, rubbing your temples in frustration. \n            \n            \"Maybe his extreme boringness is distracting us,\" Whippet replies. \"I have to roll though, I'm legit starving!\" she says as she rockets away.\n            *goto training_6\n    #\"Let's chat up some WAVC-3 news anchors about how the Sloth acted at the station.\"\n        \"Oh yeah, he like hijacked the station yesterday, right?\" Whippet asks. \"But how did you know about it? You watch TV? Who does that?\"\n        \n        \"Fossils and invalids, and yesterday I was both,\" you snap. \"Now let's turn on the charm and coax some info out of those anchors.\"\n\n        \"Solid clap back! Race ya to the station!\" Whippet shouts as she darts off.\n        *if magnet > 50 \n            *set sloth +1    \n            \n            The new anchors are accustomed to dealing with you, so they're not quite 'starstruck,' but you can tell they're surprised to be helping you instead of just reporting on your antics.\n            \n            \"He was so incredibly, I mean mind-numbingly, slow when he talked,\" explains one of the anchors. \"It took him almost four minutes to explain that he was forcing us to broadcast his message.\"\n            \n            \"And he kept asking what all the lights meant on our cameras, like he was suspicious if they were even on,\" offers a camera operator. \"We had to explain every detail.\"\n            \n            \"He's an odd dude,\" says a scruffy-looking young man with thick midnight blue glasses, \"So we checked our archives on him. You can take a look.\" \n            *gosub sloth_patterns      \n            *goto training_6\n        *else\n                        \n            But you don't find the warm reception you had hoped for. You summon every ounce of your affable hero persona, but these aren't squealing fans, these are seasoned professionals.\n            \n            \"Look, I can't help you,\" explains one anchor. \"Journalists don't disclose the substance of their interviews unless the interviewee gave permission for such disclosure.\"\n            \n            \"So you're a [i]journalist[/i] now?\" chuckles a camera operator. \"You haven't left the studio in three years.\"\n            \n            Whippet points a finger in the anchor's face. \"Lady, this is an official investigation! Tell us what he said!\"\n            \n            You tug Whippet away, apologizing to the anchor for your sidekick's behavior and muttering about this waste of time.\n            *goto training_6\n    #\"Let's pressure the criminal underworld until someone offers info about Sloth!\"\n        Whippet cracks her knuckles. \"Let's do this! I was legit afraid you were gonna have us searching on computers all night.\"\n        \n        \"Remember Whippet, we're only pressuring! Just enough to get the information we want.\"\n        \n        Whippet bolts away, shouting, \"I didn't hear that last part!\"\n        *if tenacity > 50\n            *set sloth +1\n            \n            You and Whippet quickly have the criminal element shaking in their boots. A few times you have to talk your sidekick off the ledge, but you eventually convince her to adopt more acceptable tactics.\n            \n            \"I'm gonna pants you in front of all your friends here,\" Whippet growls to a gang leader, \"unless you start talking [i]now[/i]. And I'm 100 percent serious.\"\n            \n            The gang leader keeps a straight face, but you see a glimmer of fear in her eyes as she glances at her five 'colleagues' who are all gathered around.\n            \n            \"Let's chat,\" she says flatly, walking away with Whippet as you stare down the rest of them.\n            \n            Word gets out, and the city's ruffians fall in line, providing plenty of information about their own personal encounters with the Sloth.\n            \n            *gosub sloth_patterns      \n            *goto training_6\n        *else\n            \n            *achieve punked\n            You and Whippet shake down the city's criminal element, with no success. It's almost as if word has spread that you don't have to fortitude to follow up on any threats. \n            \n            \"I'm gonna pants you in front of all your friends here,\" Whippet growls to a gang leader, \"unless you start talking [i]now[/i]. And I'm 100 percent serious.\"\n            \n            \"Go sniff ass,\" the gang leader snarls back, brandishing a pistol in the waistband of her jeans.\n            \n            Whippet lunges forward. You snatch her by the hood and pull her away just as five other guns are drawn. You just don't have time for this tonight. \n            *goto training_6\n    *selectable_if (juice > 20) #Read all 10,492 on-line articles on the Sloth. In an hour. (uses 20 Juice)\n        *set sloth +1\n        *set juice -20\n        You type in \"sloth supervillain valiant city\" in the search bar and click your mouse on the first article. \n        \n        You tilt your head to Whippet. \"Scoot closer, and try to keep up. I'm aiming to read each article in three tenths of a second.\"\n        \n        \"Whut? That's impossi—\"\n        \n        Before Whippet can finish her objections, you've already scanned fifteen articles. Your index finger blurs, becoming almost invisible as you tap the mouse.\n        \n        *gosub sloth_patterns      \n        *goto training_6\n\n\n*label training_6\n*page_break\nYou grab a quick shower as the night winds to a close. \n\nPart of you longs for immediate rest, but what's that saying, you can get plenty of sleep when you're dead? $!{ro_name} would surely appreciate getting some quality time with you, and you might be able to hone one of your skills at the same time. \n\n*fake_choice\n    #Take $!{ro_name} out dancing. (Bonus to Artistry)\n        *set ro %+20\n        *set art %+20\n        *achieve nightout\n        $!{ro_name}'s eyes light up at your suggestion. \"Give me fifteen minutes, ${mc_petname}!\"\n        \n        Fifteen minutes becomes thirty, but the waiting proves worth it when $!{ro_name} emerges from your bedroom, dressed to kill, in black from head to toe. \"Let's go wear each other out,\" @{ro_he2 he whispers | she whispers | they whisper} in your ear.\n        \n        At the city's hottest new club, you and $!{ro_name} work up a sweat, grinding to the beat in a sea of unapologetic hedonism.  \n        \n        Drinks flow. Hands explore. Hair sticks to the back of necks. Only when $!{ro_name} feels dizzy with exhaustion do you take ${ro_his} hand and stagger out into the night.\n    \n    #With $!{ro_name}, finish the 2,500-piece jigsaw puzzle that's been sitting out for five months. (Bonus to Tenacity)\n        *set ro %+20\n        *set tenacity %+20\n        \n        $!{ro_name} blinks and gives you a skeptical look. \"We've started and stopped working on it [i]so[/i] many times already! I keep waiting for you to just put it up. I mean, it's an eyesore in the living room.\"\n        \n        \"This time will be different, ${ro_petname},\" you vow, your voice taking on an exaggerated tone normally reserved for clipping wires to nuclear devices.\n        \n        $!{ro_name} wipes an imaginary bead of sweat from ${ro_his} brow, and takes a deep breath before saying, \"Let's do this. I really want my uncluttered living room back.\"\n        \n        Four hours later, ${ro_name} lets out a loud whoop as you press the last piece into place, revealing an image of a basket of dozing pug puppies.\n        \n        You feel an odd level of satisfaction at the accomplishment as you stare at the adorable pups. $!{ro_name} stands up and eyes the image before studying the living room wall. \n        \n        \"Oh this bad boy is getting framed, no doubt about it!\"     \n                                \n    #Surprise $!{ro_name} with a grand romantic gesture. (Bonus to Sneakiness)\n        *set ro %+20\n        *set sneak %+20\n        \n        You rocket out the door after your shower, deciding exactly what's on your late-night shopping list:\n        \n        *fake_choice\n            #Roses so I can scatter petals all over our bedroom and on…certain parts of my body.  \n                @{ro_he2 He smirks | she smirks | they smirk}, leaning in to whisper in you ear, \"Oh, those are going to end up [i]all[/i] over the place.\"\n                \n                And they do.\n                \n                But you don't even mind cleaning up the next morning. \n                \n                You find rose petals on the kitchen counter, on the washing machine, and even in the chimney, which $!{ro_name} strongly implied was a \"one time only\" kind of thing.\n                \n            #Wine, spaghetti, and a chocolate cake mix so I can make $!{ro_name}'s favorite meal! \n                One of the most frustrating parts of being a speedster is having to wait for things like water to boil and cakes to bake. You eye the water like a hawk, letting out an exhale of relief when the first bubble in the pot finally pops to the surface.\n                \n                But your frustration is short-lived, and $!{ro_name} devours your mediocre cooking, constantly smiling at you across the table. \n                \n                As the dinner winds to a close, $!{ro_name} walks closer and takes your hand. \"There's some sauce on the corner of your lip,\" @{ro_he2 he whispers | she whispers | they whisper}. \"Let me help you with that.\"\n                \n            #A pug puppy! I'll have to break into the animal shelter, but it's for a good cause!\n                *set puppy \"yes\"\n                \"I thought we decided on no dogs!\" $!{ro_name} asks with wide eyes before scooping the wriggling puppy out of your arms. Fawn-colored fur starts to fly everywhere.\n                \n                \"Well, I know you wanted one, and we both had dogs when we were kids, so…\"\n                \n                The pug sneezes on $!{ro_name}, who acts like it's the most adorable thing ever. \"Aren't you a good girl?\" @{ro_he2 he playfully asks| she playfully asks | they playfully ask} the puppy, who proceeds to leak on the floor.\n                \n                \"We just cleaned the carpet!\" $!{ro_name} gasps.\n                \n                \"Boy, I'm [i]beat[/i]!\" you exclaim, stretching your arms and bolting to bed.\n                \n                \"$!{firstname}!\" $!{ro_name} yells playfully from the living room. \"Get back here!\"\n                \n                It's a long night with a whimpering new puppy, who somehow ends up in your bed. \n    *selectable_if (juice \u003c 81) #Go to bed to replenish some Juice. (+20 Juice)\n        *set ro %-10\n        *set juice +20\n                \n        \"You've been so tired lately,\" $!{ro_name} says in a neutral tone. You're not sure if this is a complaint or just an observation. \n        \n        \"I just have a lot going on, that's all,\" you reply, slipping into bed. \"I need to keep my Juice levels up.\"\n        \n        $!{ro_name} pauses for a minute and starts to say something, but stops and just whispers, \"Good night,\" before closing the bedroom door. \n\n        As soon as your head hits the pillow, you drift off to a heavy slumber.    \n            \n*finish\n\n\n\n\n\n*label sloth_patterns\n*page_break\nA few patterns in the Sloth's behavior emerge: he is slow to upgrade his Sloth suit with new technology, only doing so when absolutely necessary. \n\nAnd his fighting preferences have changed little in fifteen years. In almost every encounter, he tends to hang, swing, and swat. Other than when he pulled a gun on you two days ago, that is.\n            \n\"It's like he's stuck in the past,\" Whippet pipes up, \"Even more than you, I mean.\"\n            \n[i]Hmmm…Maybe she's onto something?[/i]\n*return\n     \n           \n*label beat_whippet_6\n*page_break\nWhippet lays slouched against the wall, rubbing her head. \"Ugh, what did you do?\" she grumbles.\n\nYou take a knee and look her eye to eye. \"It was a veteran move from a salty pro.\"\n\nHer lips almost curl into a smile before she bangs the wall with her fist. \"I'm tired of you beating me all the time!\"\n\nYou put a hand on her shoulder. \"But you learned something today. You won't let me win like this again. And that means you made progress.\"\n\n\"Well let me 'progress' on my butt here for a minute while I catch my breath. And tell me what's going on with Sloth! I know $!{ro_name} didn't tell me everything!\"\n\nYou sit down beside Whippet. \"Something big is going on, I can feel it.\"\n*return\n\n\n*label lose_whippet_6\n\"Ugh!\" you grunt as you sprawl onto your back, your arms out to your sides.\n\nA foot presses on your chest. Whippet impersonates a boxing announcer by bellowing, \"By knockout, the new lightweight champion of the world!\" \n\nThis can't be happening. First the Sloth gets a lucky blow on you! Now…this? The student has defeated the teacher? You didn't push Whippet hard enough today, so even though she won, she didn't really progress in any meaningful way.\n\nYou rip off the blindfold and swat Whippet's foot away. \"I was blindfolded! Remember that!\"\n\nSitting up, you grumble, \"Let me brief you on the Sloth situation. Something big is going on, I can feel it.\"\n*return\n\n\n    \n    \n    \n    \n    \n\n\n\n\n        \n        \n    \n    \n    \n\n\n\n\n\n\n\n\n", "7-slothambush": "*page_break\n*text_image chap_7.png center Chapter Seven Ambush\n\nMorning comes earlier than you'd like. Thin ribbons of light peek between the blinds, causing you to squint and turn on your side. The idea of sleeping in and tugging the blanket around you like a burrito is appealing.\n\n*if (ro > 60)\n    $!{ro_name} begs you to spend the morning snuggled against ${ro_his} warm body.\n    \n    \"I wish I could, ${ro_petname},\" you whisper, kissing $!{ro_name}'s forehead. \n    *goto mental_check    \n*if (ro > 42)\n    $!{ro_name} murmurs and lazily pats your side. You're not sure if $!{ro_name} is encouraging you to stay or just checking to see if you're still there, but the city needs you. \n    *goto mental_check\n*else\n    $!{ro_name} murmurs, \"Don't you have things to do?\" and turns ${ro_his} back to you before going back to sleep. You might not be wanted here, but the city needs you anyway. \n    *goto mental_check\n\n*label mental_check\n\nToday's mental checklist nags at every corner of your brain, compelling you to crawl out of bed. \n\nYou shower and dress quietly, so as not to disturb $!{ro_name}. Racing out into the city, you run a self-diagnostic to verify your Juice levels. An electronic message sounds in your ear.\n\n[i]Juice level confirmed at ${juice} percent.[/i]\n\n*if (juice > 80)\n    Every inch of your body crackles with energy! On days like this, you feel capable of doing absolutely anything! \n    *goto patrol_7\n*if (juice > 40)\n    Your body gently hums with energy. Your Juice level should sustain you for today, but you'll need to be mindful of when to use it.\n    *goto patrol_7\n*else\n    You feel lethargic, drained and weak. Sure, you have enough in the tank for at least one burst of Juice, but you'll have to be extremely selective about tapping your reserves. \n    *goto patrol_7\n\n*label patrol_7\n*page_break\nYou shift into 'auto pilot,' trusting your muscle memory to navigate the route you've taken thousands of times. Valiant City, with its gleaming skyscrapers and humming masses of hover cars, buzzes with activity even at this early hour.\n\nNeither the Sloth, nor any of the other Miscreants, are anywhere to be seen. You'll spend most of your day tracking down your nemesis, but right this second, you can use your powers to spread some positive energy. And options are everywhere! \n\nAre you tough enough to dunk all over those young people playing a pick-up basketball game? You could work in a reference to those new Hypersonic 3000s that Echo Rylan wants to promote! \n\nThere's a Valiant City Police Department substation just a half block away! You could sneak in and surprise them with their favorite treat? (hint: it rhymes with \"go nuts!\")\n\nThe city's incompetent mayor is struggling with a new Info-Hub branch opening! You can him see standing outside the doors of the new facility, fumbling with a pair of over-sized plastic scissors. The ceremonial red ribbon is completely untouched, and the crowd grows restless! You could zip over and show him up! But you'll have to be creative!\n\nOr use Juice to do all three? It'll get the job done, but you won't have as much time to build rapport with the people you're helping.\n\n*choice\n     #Dunk!\n        You zip over to the teens, some of whom appear young enough to still be in high school, but you're here to promote shoes, not enforce truancy laws like some narc.\n        \n        Cupping your hands over your mouth, you yell, \"Ball!\" A wide-eyed kid with a bandana tied around his floppy hair tosses you a crisp bounce pass. It's show time!   \n        *if violence > 59 \n            *set commercial +2  \n            *achieve inyourface\n            You dart down the court, dribbling the ball in a blur. Using just a fraction of your speed, you leap six feet over three defenders, hang in mid-air with your legs raised like a frog, and unleash a violent dunk on your way back to earth!\n            \n            \"Dayuuuuum!\" the chorus of teens hoots as they hold up their smartphones.\n            \n            Hanging on the rim with one hand, you point your finger at them and say, \"Now imagine if I was wearing Hypersonic 3000s! Raise. Your. Game!\"\n            \n            As you drop back down to earth, you're surrounded by clamoring teens excited about this new shoe. Hypersonics will trend online. Echo Rylan will certainly be impressed, and with that comes the potential for a fat contract.\n            *goto dart_away_7\n        *if violence > 50\n            *set commercial +1    \n            You evade a defender, and then another, as you streak toward the rim and unleash a thunderous drunk on a teen just trying to get out of your way.\n            \n            \"Dope!\" yells one player. \"You got posterized!\" hoots another.\n            \n            You're about to say some snappy slogan for the Hypersonics, but an opposing player snatches the ball from your hand as your feet touch the ground. Play resumes.\n            \n            A few kids took video of your drunk, but others seems only mildly impressed. Still, maybe this could get some buzz going and impress Echo Rylan. Signing a contract with ${ro_him} could change your life!\n            *goto dart_away_7\n        *else            \n            You dribble around a few players, focusing on the rim. You just need to dunk and say some awesome catch phrase about the Hypersonics that will go viral. \n            \n            And your dunk attempt goes viral alright. But for all the wrong reasons.\n            \n            You leap up to the rim, ball extended over your head. \n            \n            But you're rejected. Hard!\n            \n            \"Dayuuuuum!\" a chorus of teens hoots as the tallest player on the court swats the ball out of your grip. It sails through the air and bounces against the chain link fence surrounding the court.\n            \n            Echo Rylan isn't going to like this! You may have just blown your chance at life-changing money!\n            *goto dart_away_7\n    #Sneak!\n        Getting the donuts is the easy part. The crowd at \"Dunk It Like It's Hot\" lets you cut in line, and no one even complains when you take the last bear claws. \n        \n        But the delivery will be trickier. You want this to be a [i]surprise[/i], and police stations aren't the easiest places to infiltrate when you're carrying ten boxes of donuts. \n        \n        And a cup of coffee (you were thirsty).   \n        *if sneak > 59 \n            *set law %+20   \n            You time your entry just right, zipping in behind a waddling sergeant, who (annoyingly enough) is carrying his own donut. Way to rain on your parade!\n            \n            Whoosh! Vroom! You take a few wrong turns down some hallways, but manage to dart into an empty office whenever you're close to being spotted.\n            \n            You find the break room and dump the boxes on the table. \n            \n            Then you stroll back out to the lobby, giving high fives and shaking hands with every cop you see. \"The donut fairy came,\" you tease with a wink.\n            \n            Dozens of officers bolt for the break room! You hear someone bellow from the back, \"There's even bear claws!\"\n            \n            Well, if that doesn't get you some goodwill, what will?\n            *goto dart_away_7\n        *if sneak > 50\n            *set law %+10\n            Your struggles start with the front door. It's a standard door with a handle, but opening it while carrying all these donuts is difficult enough. You hold your breath and hug the walls as you step into the lobby.\n            \n            \"Hey, O'Shaughnessy, you got that report?\" one detective asks another, flipping through papers on her desk.\n            \n            \"Yeah, yeah, it's here somewhere.\"\n            \n            You seize the opportunity to bolt down a hall! But it's the wrong one! Whoosh! Vroom! After a few more wrong turns, you find the hall leading to the break room. \n            \n            But as you bolt down the hall, a patrolman emerges from the restroom. He's looking at his phone! Not paying attention!  You try to stop but it's too late!\n            \n            Donuts fly everywhere! Luckily, a few boxes are undamaged. You dust yourself off and say to the shaken officer, \"Tell everyone these are from me! Well, not the loose ones on the floor. Just the good ones.\"\n            *goto dart_away_7\n        *else        \n            *set law %-10\n            *achieve donut\n            Your struggles start with the door. You lose two boxes just trying to get it open.\n            \n            You drop another three boxes as you zip and zoom down hallways that do not lead to the break room. Why didn't you map this place out?\n            \n            \"Freeze!\" barks a stern female voice behind you. You gulp, realizing you've accidentally darted into the evidence room. \n            \n            \"Donut fairy!\" you squeak, tossing the remaining boxes in the air as a distraction, and racing out of the police station.\n            \n            Well, that was a waste of your time. And about 30,000 calories!\n            *goto dart_away_7\n    #Cut!\n        Those are the biggest scissors you've ever seen! Who manufacturers stuff like that? What's the market?\n        \n        You push those legitimate questions from your brain, streaking toward the Info-Hub's entrance, where the red ribbon still hangs intact, blocking the doors, while the Mayor fumbles with the over-sized novelty item. \n        *if art > 59 \n            *set pop %+20   \n            \"I can lend a hand!\" you announce to the press corps, steadying the mayor with one hand while slipping the scissors from her grasp with the other.\n            \n            \"I hear the computers at this new Info-Hub are fast!\" You pause, and then smile. \"Almost as fast as me!\"\n            \n            And with that, you make hundreds of delicate snips in a matter of seconds, transforming the ribbon into a gorgeous chain of paper dolls, each with a unique silhouette, down to the shoes. \"And don't forget the children,\" you add. \"They're our future!\" \n            \n            Citizens claps. Arms extend upward with smartphones to take photos. Reporters stick out recorders to capture every sappy word. They're eating it up! Unfortunately, you don't have time to keep standing here and soaking the attention.         \n            *goto dart_away_7\n        *if art > 50\n            *set pop %+10\n            You slip the scissors from the mayor's hand and start snipping at the ribbon, intent on making a glorious image as an homage to the ceremony!\n            \n            But what to make? You decide to play it safe, snipping and cutting until the ribbon spells out the word \"Info Hub.\" \n            \n            You gesture to your creation. A few people clap and some phones go up to photograph the image. Hey, a lukewarm reception's better than nothing!\n            \n            \"Children are our future!\" you yell out in a last gasp for more applause. \n            *goto dart_away_7\n        *else\n            *set pop %-10\n            You slip the scissors from the mayor's hand but soon realize that you don't have any experience making patterns from ribbon, not even with normal scissors. \n            \n            It'll be fast! But it won't be pretty!\n            \n            Snip snip snip snip snip snip!\n            \n            Crap, you meant to make a chain of paper dolls, but you decapitated half of them! \n            \n            Gasps ripple through the crowd. \"Their heads!\" someone shouts.\n            \n            You change tactics, trying to spell out \"Info Hub,\" but you screw up the \"H,\" making it look more like \"Info tub.\" \n            \n            \"What are you doing?\" asks the mayor. \"This is a travesty!\"\n            \n            You gulp and give a half-hearted wave to the dozens of confused faces staring back at you. This won't help your popularity at all.\n            *goto dart_away_7\n    *selectable_if (juice > 20) #Use Juice to do all three! (uses 20 Juice)\n        *set commercial +1\n        *set pop %+10\n        *set law %+10\n        *set juice -20\n        *achieve thin\n        It's show time!\n        \n        In a snap, you're on the basketball court! \n        \n        Zip! You dunk so hard you pull the rim off the backboard! \"Buy Hypersonic 3000s!\" you yell to the blinking teens as you disappear again.  \n        \n        Whoosh! In the blink of an eye, you dump a dozen boxes of donuts on the table in the VCPD's break room. An officer drops her mug on the floor before stammering, \"Are there any creme-filled?\" \n        \n        But you're already gone!     \n               \n        Zip! You snatch the giant scissors from the mayor's hands!\n        \n        She staggers back as you make thousands of cuts in the ribbon, leaving the message, \"$!{heroname} supports Info-Hubs because they are for our children, and children are our future, and they are the next generations of our leaders.\"\n        \n        You hand the scissors back to the Mayor and stroke your chin. [i]That sentence sort of rambled. And it's impossible to read except from like an inch away. Oh well.[/i]\n        *goto dart_away_7\n       \n   \n*label dart_away_7 \n*page_break\nYou dart away, checking police communications for any sign of the Sloth or the other Miscreants. The city remains quiet, perhaps [i]too[/i] quiet, but there's no sense in continuing a mindless patrol. Who knows when you'll get an easy afternoon again? \n\nYou seem to remember an article in [i]The Valiant City Chronicle[/i] reporting that Echo Rylan would be appearing at a charity luncheon today. That sounds like an opportunity to get in front of an influential audience and score some time with the Steps Ahead CEO!\n\nYou zip to the luncheon, skidding to a stop outside a posh country club and stare at an ornate banner hanging over the gated entrance. It reads [i]Monocle Society[/i].\n        \nA tasteful sign posted on one of the stone pillars explains that the luncheon is designed to raise funds to preserve the Valiant City Museum's monocle collection, the third-largest in the world.\n        \nWait, there are two larger monocle collections? \n        \nThat's a thought for another time (maybe). For now, you just need to get past a lanky man at the front doors. He holds a clipboard and checks off names as posh people pass between the velvet ropes. He's sporting a waxy thin mustache, so if you've learned anything from watching movies, he'll be a stickler for the rules.     \n\nHow will you ever get past him?\n\n*fake_choice\n    #I use my creative flair and pretend to be a rich person already on the list.\n        *if art > 50\n            \"Surname?\" he asks, eying your ${uniform} with visible disdain. \n            \n            Your imagination goes into overdrive as you start concocting the sort of name one might expect to find on such a list.\n            \n            \"It's Von…\"\n            \n            \"Just…Von?\" he asks, tracing his finger over the V-names.\n            \n            \"No, my good man, it's Von…Berk…shire?\" you eek out, watching his finger move along the list.   \n            \n            \"Ah, yes, Von Berkshire, here it is,\" his voice goes flat with obvious disappointment. He motions for you to pass between the ropes to the luncheon.\n            *goto luncheon\n            \n        *else\n            \"Surname?\" he asks, eying your ${uniform} with visible disdain. \n            \n            You start brainstorming snooty-sounding names, but you struggle to decide on just one. There are just so many options!\n            \n            \"Surname?\" he repeats.\n            \n            You stammer, \"It's Von…Carmichael…Hawthorne…Montgomery?\"\n            \n            \"Ah, here it is, Von Carmichael Hawthorne Montgomery.\"\n            \n            \"…Seriously?\" you sputter.\n            \n            \"No,\" he answers, tapping his clipboard against his podium. \"Now leave the premises, before I have to get snooty.\"\n            \n            \"Wait, so you're not already…?\" You stop yourself from making more of a scene and leave in utter defeat.\n            *goto racing_back\n    #I sneakily put my name on the list!\n        *if sneak > 50\n            \"Surname?\" he asks, eying your ${uniform} with visible disdain.   \n        \n            In a blur, your grab his pen, scrawl your name on his list, return the pen, and straighten your back, assuming a regal posture.\n        \n            \"$!{heroname},\" you reply. \"You'll see that I'm on the list.\"\n        \n            The man studies his list, and your name, neatly written on the last available space, in almost the exact style as the other entries.\n        \n            \"I see,\" he says, an incredulous tone to his voice. He motions for you to pass between the ropes to the luncheon.\n            *goto luncheon            \n        *else\n            \"Surname?\" he asks, eying your ${uniform} with visible disdain.   \n        \n            In a blur, your grab his pen and try to scrawl your name. However, it's difficult to write from your upside-down angle. You do your best, fumbling with the pen and slipping it back into his hand.\n        \n            \"$!{heroname},\" you reply. \"I'm on the list. Just check it out.\"\n            \n            The man's eyes shrink into lines as he inspects your last-second addition to his list. \"Whatever you claim this to be, it is certainly not the work of a graduate of the Meinheim Academy of Penmanship.\" \n            \n            He gestures to himself, making it clear that he personally wrote each entry on his list. \"Now leave the premises, before I have to get snooty.\"\n            \n            \"Wait, so you're not already…?\" You stop yourself from making more of a scene and leave in utter defeat.\n            *goto racing_back\n    #I keep telling him to check the list until he gives up.\n        *if tenacity > 50\n            \"Surname?\" he asks, eying your ${uniform} with visible disdain.   \n            \n            \"It's $!{heroname},\" you say smoothly. \"I'm on the list.\"\n            \n            The man carefully inspects his list and looks up at you. \"I don't see you anywhere.\"\n            \n            \"Look again.\"\n            \n            The man's eyes shrink into lines as he inspects the list again, using his finger to trail over the entries where your name would be.\n            \n            \"It's not there,\" he says with a sneer. \"I've doubled-checked.\"\n            \n            [i]This guy thinks he can intimidate me?[/i]\n            \n            \"Look again,\" you repeat in a stern voice usually reserved for the most dangerous members of Valiant City's criminal underworld. \"And keep looking until you find it.\"\n            \n            \"I…err…\" The man stammers and waves you through. \"Enjoy the luncheon.\"\n          \n            You glare at him and growl, \"Don't tell me what to do.\" Softening your tone, you add, \"But yes, it does seem delightful.\"\n            *goto luncheon            \n        *else\n            \"Surname?\" he asks, eying your ${uniform} with visible disdain.   \n            \n            \"It's $!{heroname},\" you say smoothly. \"I'm on the list.\"\n            \n            The man carefully inspects his list and looks up at you. \"I don't see you anywhere. You're not on he list.\"\n            \n            \"Look again.\"\n            \n            \"I don't need to look again,\" he replies haughtily. \"I wrote the list.\"\n            \n            \"What if I made it worth your while to look again?\" you ask desperately, slipping him a $5 bill.\n            \n            The man pinches the wrinkly bill with his fingertips and holds it at a distance away from his body. \n            \n            \"Bribery, especially poor attempts at such, will not gain you entry to this event. Now leave the premises, before I have to get snooty.\"\n            \n            \"Wait, so you're not already…?\" You stop yourself from making more of a scene and leave in utter defeat.         \n            *goto racing_back\n    *selectable_if (juice > 20) #I'm using Juice even though it's almost impossible to screw this up! (uses 20 Juice)\n        *set juice -20\n        You zip past the man in a blur! \n        \n        Toupees and monocles go flying in your wake, but you're in!\n        *goto luncheon\n    *selectable_if (juice \u003c 81) #I just find a quiet spot for a mid-afternoon nap. (+20 Juice)\n        *set juice +20\n        You stroll away from the clipboard guy and dart into a side entrance, looking for a cozy spot.\n        \n        And you find the coat check room! As the line to check coats dwindles, you zip behind the attendants and head to the back corner of the room.\n        \n        There are fur coats and wraps as far as the eye can see! Inspecting a few tags, you confirm that virtually all of them are synthetic. Apparently even Valiant City's upper crust is more enlightened these days!\n        \n        You quietly tug a dozen coats off their hangers and construct a makeshift bed for yourself on the floor. Nestled in a pile of cozy synthetic polymers, you drift off to sleep.\n        \n        A few hours later, you awake, recharged and refreshed, with increased Juice levels.\n        \n        Strolling back out, you bump into a fancy-looking lady with a coat check ticket in her hand. \n        \n        \"I hope it's still there,\" you tell her. \"Between you and me, security around here is almost non-existent.\"\n        *goto racing_back\n           \n*label luncheon\n*page_break\nWandering into the banquet hall, you realize how seldom you interact with Valiant City's elite.\n\nIf money had a smell, it would permeate every corner of this cavernous hall. White-coated servers attend to the guests' every need, carrying silver trays of yummy-looking appetizers. The scents of roasting meat and freshly baked bread fill the air.\n\nAttendees chat in small groups. People of all genders sport monocles. \n\n[i]I wonder what it would be like to have an arch-nemesis who wore a monocle?[/i]\n\nYou shake that weird thought from your head and consider the possibilities at hand. \n\nThere's Echo Rylan over there, all smiles as @{ro_he2 he works|she works|they work} the crowd, patting shoulders and shaking hands. Maybe you should grab a few minutes with the Steps Ahead CEO?\n\nYou glance over at the microphone stationed at the front of the room. Or you could zip over there and address the audience about whatever you feel is more important right now. With all the media in attendance, your message will likely be deemed newsworthy.\n\nYou could promote the Hypersonic 3000s, talk about what you'd want to accomplish as mayor, or issue a dire warning to the Miscreants.\n\n*choice\n    #Talk with Echo Rylan.\n        *set silver %+20\n        You make your way over to Echo Rylan as @{ro_he2 he pulls|she pulls|they pull} away from a group of attendees. As always, Rylan is impeccably dressed, wearing mostly white with a touch of silver.\n        \n        [i]@{ro_he2 He thinks he's so clever|She thinks she's so clever!|They think they're so clever}![/i]\n        \n        \"Ah, you're a fan of monocles as well?\" @{ro_he2 he asks|she asks|they ask} with a smirk, stepping closer to you. \"Is one eye weaker than the other, or do you just like the aesthetics?\"\n        \n        [i]Smooth as the CEO but bumbling as the hero? I'm onto your game![/i]\n        \n        *choice\n            #\"That's a secret between me and my ophthalmologist.\"\n                Rylan leans in closer. \"I play tennis with mine. And I always lose. Coincidence? I think not.\" \n                \n                You pause. \"But it could be a coincidence, right? Maybe you just really suck at tennis?\"\n                *goto rylan_grins\n            #\"I'll have you know that both of my eyes are spectacular.\"    \n                Rylan leans in closer. \"I concur. Oh, you're talking about your vision!\"\n                \n                You pause. \"Wait, what were [i]you[/i] talking about?\"\n                *goto rylan_grins\n            #\"I was actually just thinking earlier about how it would feel to have an arch-enemy who wore a monocle.\"    \n                Rylan nods knowingly. \"The odd things you heroes must ponder. I can't imagine what it must be like.\"\n                \n                You stroke your jaw and eye Rylan with barely-hidden suspicion. \"Oh, I'm sure you can't.\"\n                *goto rylan_grins\n            #\"It just makes me feel younger being surrounded by 80-year-olds devoted to the preservation of obsolete corrective lenses.\"\n                Rylan nods knowingly. \"I think we're the only people in the room who listen to TED Talks.\"\n                \n                You pause. \"Oh, sure. I listen to those all the time. Like, constantly.\"\n                *goto rylan_grins\n                \n                *label rylan_grins    \n                \n                Rylan grins and takes your arm as you both cut through the crowd. \"Walk with me,\" @{ro_he2 he says|she says|they say}.\n            \n                \"So, are you getting a feel for the Hypersonic 3000s? I wasn't sure if I should expect another visit from you, or if you might, I don't know, send me a sign that you were still pursuing the offer?\"\n            \n                \"I have a pretty full plate,\" you reply, choosing your words carefully. \"But I'm working on it. And actually I'm glad that we ran into each other, because there was something I've been wanting to ask you.\"\n            \n                *choice\n                    #\"What's the most high tech item that your company makes?\"\n                        \"Oh, well that's probably the Hypersonic 3000s, to be honest,\" Rylan answers. \"The amount of features we're inc—\"\n                    \n                        Attempting to press any advantage you might have, you interrupt the CEO. \"So you don't make anything, like I don't know, rocket packs?\"\n                    \n                        Rylan's smile fades as @{ro_he2 he backs|she backs|they back} away. \"That's an odd thing to ask. But no, I can assure you that we don't make rocket packs, or laser pistols or anything like that.\"\n                    \n                        The CEO stops talking and puts up ${ro_his} hand. \"I'm sorry, ${heroname}, but I need to keep working the room. You understand! But stay in touch about the campaign!\"\n                    \n                        You leave the luncheon with just one thought on your mind.\n                    \n                        [i]I didn't mention anything about laser pistols.[/i]    \n                        *goto racing_back                    \n                    #\"Do you ever feel like you're constantly being pulled in two [i]very different[/i] directions?\"\n                        \"Oh, well I'm sure we all feel like sometimes,\" Rylan concedes. \"My job demands all of my en—\"\n                    \n                        Attempting to press any advantage you might have, you interrupt the CEO. \"So you don't have any time or energy left for other…pursuits? Lots of rich people gravitate toward…extreme sports, don't they?\"\n                    \n                        Rylan's smile fades as @{ro_he2 he backs|she backs|they back} away. \"I guess maybe some of them do, but I don't have a death wish, I can assure you. I can't even stand heights.\"\n                    \n                        The CEO stops talking and puts up ${ro_his} hand. \"I'm sorry, ${heroname}, but I need to keep working the room. You understand! But stay in touch about the campaign!\"\n                    \n                        You leave the luncheon with just one thought on your mind.\n                    \n                        [i]I didn't mention anything about heights.[/i]  \n                        *goto racing_back\n                    #\"What do you know about this Silver Rocket person?\"\n                        Rylan looks taken aback. \"Silver Rocket? I'm afraid I don't know anything ab—\"\n                    \n                        Attempting to press any advantage you might have, you interrupt the CEO. \"You don't know anything at all about Silver Rocket? I was just asking because I've met Silver Rocket in person, and you two could be twins.\"\n                    \n                        Rylan's smile fades as @{ro_he2 he backs|she backs|they back} away. \"I'm sorry, but I just don't keep up with all of this city's heroes. So if there's some hero rocketing around with a shiny helmet or whatever, I mean, that's not really of interest to me.\"\n                    \n                        The CEO stops talking and puts up ${ro_his} hand. \"I'm sorry, ${heroname}, but I need to keep working the room. You understand! But stay in touch about the campaign!\"\n                    \n                        You leave the luncheon with just one thought on your mind.\n                    \n                        [i]I didn't mention anything about a shiny helmet.[/i]\n                        *goto racing_back                                                                                          \n    #Promote the Hypersonic 3000s, mustering every ounce of my charisma!\n        *gosub shoes_charity\n        \n        *if magnet > 50\n            *set commercial +1\n            \"The Hypersonic 3000s are [i]the[/i] shoe for young people, and you have the chance to get ahead of the curve!\"\n            \n            Noticing the blank looks, you change tactics.\n            \n            \"If you're looking for an end-of-the-year tax deduction, and a way to help the young people of our great city, contact Steps Ahead directly to purchase bulk orders to donate to public schools!\"\n            \n            \"Public schools?\" asks a round man a few rows back. \n            \n            \"You know,\" you say, \"schools where regular kids go.\"\n            \n            \"Regular children?\" gasps a woman in the front. \"Those poor dears! We must help them immediately!\" \n            \n            Applause spreads throughout the room, with numerous people asking you for contact information. From the back, Echo Rylan gives you a wink.\n            *goto racing_back            \n        *else\n            \"The Hypersonic 3000s are the—\"\n        \n            \"Excuse me, can you speak up?\" a man shouts from the back, waving his arm.\n        \n            \"Oh, okay,\" you lean into the microphone and start again. \"The Hypersonic 3000s are the most excit—\"\n        \n            \"Hypoallergenic?\" calls out a woman near the front. \"Like one of those cats with less dander?\"\n        \n            \"No, no,\" you grumble, trying to focus the group. But this just isn't the right audience for the Hypersonic 3000s, and your charisma isn't sufficient to save you.\n      \n            You trudge off the stage and zip past Echo Rylan, who gives you a curious look but nothing more.\n            *goto racing_back                      \n    #Using hard data and logical arguments, lay out my priorities as the next potential mayor.\n        *gosub shoes_charity\n        \n        *if brain > 50\n            *set pop %+10\n            \"I'm taking this opportunity to announce my candidacy for mayor!\"\n            \n            \"But…you wear a mask!\" says a lady near the front.\n            \n            \"I thought you were a robot! Charles dear, isn't that what you call those metal things that do work no one else wants to do?\"\n\n            You wave your hand to refocus the crowd. \"I can assure you I am 100 percent human, and I can also assure you that I have a very detailed platform. Issue number one, waste disposal…\"\n            \n            As it turns out, this crowd enjoys dry, fact-based policy speeches. Based on the contributions you receive, they seem to appreciate your no-nonsense approach. Maybe your campaign has some traction after all!\n            \n            You stroll off the stage with an armful of checks. Echo Rylan gives you a thumbs up but nothing more.            \n            *goto racing_back\n        *else         \n            *set pop %-10\n            But you start fumbling from the very start.\n            \n            \"I'm announcing my candidacy for mayor! And I welcome all quest—\"\n            \n            \"What is your position on the new property tax rates?\" asks a woman near the front.   \n            \n            \"Oh, well, I suppose they are too low.\"\n            \n            The crowd groans and you quickly add, \"Wait, I mean too high! They're way too high!\"\n            \n            A man in the back waves his hand and shouts, \"Will you support increased funding for the museum's monocle display? I'm all for charitable giving, but shouldn't the city foot the bill? Why is it always up to us?\"\n            \n            It just goes downhill from there. You trudge offstage with few new supporters and plenty of promises you can't possibly keep.           \n            *goto racing_back                        \n    #Demonstrate my destructive powers as a warning to the Miscreants!\n        *gosub shoes_charity\n        \n        *if violence > 50\n            *set rogues +1\n            \"I'm ${heroname} and this message is for the Miscreants!\" \n            \n            You motion a videographer to zoom in on you. \"Keep me in the frame, because trust me this is going to be good!\"\n            \n            For the next twelve minutes, you act out everything you're going to do to the Miscreants the next time they show their faces in Valiant City.\n            \n            You snap the Sloth's goggles on his face! Then you use an old-fashioned dogcatcher's net to scoop up K9er!\n            \n            Of course since you're acting this out with minimal props, the audience seems more confused than alarmed. But you're pretty sure the Miscreants will get the message!\n            \n            When your demonstration ends, you slip the videographer a $20 bill and whisper, \"Give me your card and my associate Whippet will pick up some copies next week. Oh, she'll be the one in, uh, dog pajamas.\"\n            \n            You swagger off the stage and shoot finger guns to Echo Rylan, who grins and acts like ${ro_he} dodged your fake shots.\n            *goto racing_back            \n        *else\n            \"I'm ${heroname} and this message is for the Miscreants!\"\n            \n            You start acting out all the things you're going to do to the Miscreants the next time they show their faces in Valiant City. But violence isn't exactly your specialty, and things go downhill quickly.\n            \n            You go overboard battling a fake Perpetual Man on the edge of a fake cliff. You slip off the edge of the (very real!) stage and crash on top of a table on the front row. Wine glasses, pieces of silverware, and even a few monocles crash to the floor!   \n            \n            Attendees start streaming out the exits as you crawl to your feet.\n            \n            The videographer comes over and asks, \"Did you want a copy of this? For those Miscreant people?\"   \n           \n            You slip the woman a $20 bill. \"Burn the video, burn it all. And if anyone named Whippet contacts you, you weren't here, got it?\"\n\n            You trudge out of the room, bits of crystal and glass crunching under your feet.\n            *goto racing_back\n        \n             \n*label racing_back\n*page_break\nRacing back to the city center, you decide on one more patrol before calling it a day. \n\nA sudden blast from behind knocks you to the ground! A tingly sensation rushes over your body, from your head to your toes. Your brain sizzles. It's hard to think. You close your eyes and struggle to concentrate. \n\nThe sizzling in your head subsides, but so does the buzz of traffic.    \n\nThe world is quiet. \n\nAnd a familiar voice growls, \"Not…so…fast…now.\"\n*page_break\n\nYou roll over on you back, your elbows pressed against the asphalt. The Sloth looms over you with a sneer stretched across his face. \n\nHis claws on his right hand grip a gun, but it's not a cheap handgun like last time. Now, he holds a wicked-looking rifle, battleship gray with a pulsing blue tip.\n\nWhere did he get that? What [i]is[/i] it?\n\nNo matter what it is, you need to get it out of his grubby claws! Now!\n\nYou push yourself off the ground to snatch his gun, but the Sloth…evades you?\n\nWhat? You swipe at the Sloth's gun again! He brushes off your attempt, swatting your hand away. It's like you're moving in slow motion!\n\nA sickening revelation dawns on you.\n\nNo wonder the Sloth is sneering! Whatever that gun is, it stole your speed!\n\n*fake_choice\n    #I'm dead. It's over!\n        *set future %-20\n        He beat you the other night even when you [i]had[/i] your powers! How are you supposed to beat him now?\n    #Even without my powers, I'll find a way to survive this!\n        *set future %+20\n        He's still pretty slow! You might be de-powered, but that doesn't make you helpless!    \n    #I'm freaking ${heroname}! He's still the Sloth! This changes nothing.\n        *set ego %+20\n        There's no way that nobody is going to beat you twice in a row! You refuse to let that happen.\n    #If I survive this, I'll never take my powers for granted ever again!\n        *set ego %-20\n        Moving so slowly, like a normal human, is…humbling. For years, you've always just assumed you could outrun most of your problems. \n        \n\"Slow…to…figure…things…out?\" the Sloth grunts. \n\nYou take a few cautious steps back, your eyes darting from left to right, but always refocusing on your enemy. Hover-cars have landed on the streets, dim and lifeless, with confused drivers tapping on the consoles.\n\nTraffic lights, dead. Scrolling marques and holo-billboards, dead. Even the huge neon orange \"Z\" on the top of Zenith tower is dark. What did the Sloth use? Some sort of electromagnetic pulse attack?\n\n\"This…is…just…a…taste,\" the Sloth says as he swipes at you, the gleaming tips of his claws whistling past your chest. \"It…will…be…magnificent.\"\n\nA few citizens are watching you now, but they keep their distance. You tap your communicator to patch in $!{ro_name}, but it's just as dead as everything else. You can't call in Whippet either.\n\nDo you try to summon the VCPD? With your communicator down, you'd have to think of something clever! Or maybe it's smarter to smooth talk the Sloth into revealing his motivations? And of course, you're standing right in front of Zenith Tower. If Echo Rylan has returned from the luncheon and is watching this right now, ${ro_he} might be impressed by a show of strength!\n\n*choice\n     #Creatively summon the VCPD!  \n        It only makes sense to get the police involved! Who knows what else the Sloth's gun is capable of doing? \n        \n        But with electronic communications down, how can you get the VCPD's attention? \n        *if art > 59 \n            *set law %+20     \n            The sporting goods store across the street gives you a rush of inspiration! [i]Flare gun![/i]\n            \n            *gosub coward\n            \n            Sprinting down an alley, you double over to catch your breath. After a few seconds, you aim upward and fire three shots, sending flashes of light streaking through the air! \n            \n            As you head back to Zenith Tower, a pair of officers move into view. They duck behind a garbage can just as the Sloth bursts back out of the store! \n            \n            One gives you a quick nod. The other salutes. They must appreciate that you notified them without the Sloth catching on.\n            \n            One thing's clear; even with the police on the scene, this fight is just starting!\n            *goto rocket_arrives_7\n        *if art > 50\n            *set law %+10 \n            The sporting goods store across the street gives you a rush of inspiration! [i]An air horn![/i]\n            \n            *gosub coward\n            \n            Sprinting down an alley, you double over to catch your breath. After a few seconds, you aim upward and pull the air horn's trigger, unleashing a ear-splitting honking sound! Surely a cop somewhere heard that!\n            \n            As you head back to Zenith Tower, a pair of officers move into view. They duck behind a garbage can just as the Sloth flings a motorcycle at them!\n            \n            The Sloth's aim is off, and the motorcycle skids down the sidewalk. But the officers are rattled! One gives you a quick nod, while the other races to another spot. Your air horn worked, but it also drew the Sloth's attention to your reinforcements!\n            \n            One thing's clear; even with the police on the scene, this fight is just starting!\n            *goto rocket_arrives_7\n        *else\n            *set law %-10\n            Crap! Nothing comes to m
