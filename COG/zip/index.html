eath decision! Do you just focus on avoiding his attacks long enough to wear him out? If you're okay with him escaping to fight you another day, this approach might work, and would only require minimal Juice.\n\nOr you can try to beat him in a straight up fight! You're nowhere near 100 percent, but if you have enough Juice, you might be able to pull it off.   \n\nOr what about the VCPD? Do they respect you enough to intervene? Maybe you could distract the Sloth long enough for reinforcements to arrive.\n\nThe Sloth charges!\n\n*choice\n    #I'll wear him out.\n        *gosub end_me_9\n        *if juice > 19    \n            *set mcalive \"yes\"\n            *set sloth_status \"free\"\n            *gosub sloth_misses\n            \n            \"Stand still,\" you interrupt. \"I've got it! I've got it! It's just instinct!\"\n            \n            \"Rahhhh!\" the Sloth bellows, unleashing a blundering flurry of punches and swipes.\n            \n            You dodge a punch. \"Sorry! Instinct!\" \n            \n            You hop over a swipe. \"Instinct again!\" \n            \n            You slide through his legs to avoid a bear hug. \"Damn that instinct!\"\n            \n            The Sloth, gasping for breath, steps back to the edge of the roof. \"This…isn't…over,\" he grumbles as he swings over and disappears from sight.\n            \n            Whippet peeks out from her hiding spot and asks, \"It's not over? I sorta feel like it is, like things are wrapping up.\"   \n            *goto_scene 10-resolution\n        *else\n            *set mcalive \"no\"\n            *gosub mcdeath\n            *goto mc_dies        \n    #I'm taking him down!\n        *gosub end_me_9\n        *if juice > 39\n            *set mcalive \"yes\"       \n            *set sloth_status \"jail\"\n            *gosub sloth_misses\n            \n            *achieve bigbad\n            Wham! Pow! You punch his jaw a dozen times in less than a second, sending him reeling backward. \n            \n            \"Rahhhh!\" the Sloth bellows as he charges you one last time. You've situated yourself right in front of the stairwell. Winking at Whippet, you stand still as the Sloth gets closer and closer.\n            \n            The Sloth lunges at you, his claws extended! You dart away at the last second! The Sloth's claws piece the concrete stairwell! He tugs and tugs, but can't free himself. You hear the thud of boots coming up the stairs - the VCPD is here!\n            \n            \"I…hate…you!\" the Sloth sputters.\n            \n            Whippet emerges from her hiding spot and teases the villain. \"If it makes you feel better, asking nicely wouldn't have helped anyway.\"        \n            *goto_scene 10-resolution    \n        *else\n            *set mcalive \"no\"\n            *gosub mcdeath\n            *goto mc_dies        \n    #I'll distract him until the police arrive.\n        \"You think I'm alone, but I'm not!\" you shout, narrowly avoiding the Sloth's charge.\n        *if law > 60\n            \n            *set sloth_status \"jail\"\n            The Sloth jerks his head around. \"Who…?\"\n            \n            The thud of heavy boots pounds up the stairwell. The Sloth lumbers back, but you sweep his legs out from under him, sending him crashing to the roof on his back.\n            \n            \"Freeze!\" yells a lieutenant in heavy armor, her gun drawn on the Sloth as a dozen SWAT officers stream out from the stairs, flanking the Sloth on both sides.\n            \n            \"You…can't…be…\" The Sloth grumbles, starting to stand up.\n            \n            A gunshot rings out! The lieutenant's aim is just over the Sloth's head. \"That was a warning, Possum! Stay down!\"\n            \n            \"My…name…is…the…Sloth!\" \n            \n            A dozen guns stay focused on the villain, who grinds his teeth at you while lowering his hands. \"I'll…be…back.\"    \n            \n            Whippet pokes her head out from the stairwell. \"Yeah, you probably will! But not like right away. We have other Miscreants to fight, you know.\"\n            *goto_scene 10-resolution\n        *else            \n            You keep stalling, your eyes darting to the stairwell for any sign of the VCPD. But they never do. The Sloth keeps attacking, and you get weaker, slower.\n            \n            The Sloth roars as his claws slash through the air! \"You…die…alone!\"\n            \n            *set mcalive \"no\"    \n            *gosub mcdeath\n            *goto mc_dies\n\n\n*label mc_dies\n*page_break\nDo you want to know what happens after your death?   \n*choice\n    #No. I died, so I wouldn't realistically know what happens.\n        *goto dead_over\n    #Yes. I'm [i]dying[/i] to know what happens!    \n        *goto dead_continue    \n   \n*label dead_over\nTHE END\n*ending\n   \n*label dead_continue\n*if pop > 65\n    *achieve gooddeath\n    Your funeral is held at the Valiant City football stadium. It's the only venue in town capable of accommodating the throngs of mourners, estimated at 40,000, paying their respects. \n    \n    Citizens share stories of your heroism; how you saved lives and inspired others to become better versions of themselves. Silver Rocket soars over the crowd, using ${ro_his} laser pistol to write your name across the sky.\n    \n    Dignitaries and heroes from across the globe speak about your life and your sacrifice. The mysterious detective from Port Noir makes a rare appearance but stays silent. The Earth's premiere guardian, an alien from another galaxy, implores other heroes to consider a union.\n    \n    \"What happened to ${heroname} cannot happen again. We must band together. And we must do it now.\"\n    \n    Four months later, the Vigil is born. Earth finally has the league of heroes it needs to battle the forces of evil. \n    \n    Your formerly modest wing at the Valiant City Art Museum grows from three pieces to a collection of over 2,000, including works from regaled artists and elementary school children alike. Striking, art deco-style sculptures are mixed seamlessly with drawings made with marker and colored pencils.\n    *goto die_whippet\n*if pop > 45    \n    Your funeral is held at the Valiant City basketball arena to accommodate the over 10,000 mourners wishing to pay their respects. \n    \n    The mayor awards you, posthumously, the key to the city, and designates a specific day as $!{heroname} Day. But the date chosen is not the date of your death. Instead, it is the date of your first appearance in Valiant City so many years ago. You will be remembered for the impact you made on this city, not for the specifics of your demise.\n    \n    Silver Rocket speaks at the service, promising to fill your shoes as best ${ro_he} can. \"No one will ever replace ${heroname}; I can only promise to do the best I can. I owe it to ${heroname}, and I owe it to you.\" \n    \n    Your formerly modest wing at the Valiant City Art Museum grows from three pieces to a collection of over 100, including works from local artists and elementary school children alike. \n    *goto die_whippet\n*else\n    Your funeral is held at Moe's Funeral Home in a 'transitional' area of Valiant City. Around 100 people pack a modest room and share their personal stories about their interactions with you.\n    \n    The mayor pops in for five minutes, but is whisked away for another Info-Hub opening. \n    \n    The service is not publicized; your passing is nothing more than a tiny blip on most citizens' radar. Valiant City is accustomed to moving forward and not looking back; your passing is no exception.\n    \n    Your tiny 'wing' at the Valiant City Art Museum, featuring only three pieces, survives for a few months after your passing, and is then moved to archives to accommodate the rapidly-expanding Silver Rocket collection. Many of the paintings and drawings idolizing Silver Rocket are drawn in vibrant marker and colored pencil. \n    \n    Even the city's children have moved on from your death.\n    *goto die_whippet\n    \n        \n*label die_whippet\n*page_break\n*if whippet > 3\n    Despite the Sloth's best efforts, Whippet does not die with you. She escapes to fight another day.      \n\n    And six months later, after hundreds of hours of additional training, Whippet tracks down the Sloth and brings him to justice.\n\n    She zips into the Sloth's hideout in the middle of the night and douses him in gasoline before he can even wake up. The villain's eyes slowly blink open, darting to Whippet's thumbs caressing lighters in each hand. \"Move an inch. I dare you,\" she growls.\n    *goto ro_grave\n*else\n    *achieve deathinfamily\n    True to his word, the Sloth kills Whippet just minutes after throwing you off Zenith Tower.\n    \n    Whippet fights for all she's worth, battering the Sloth with rapid elbows and knees targeted to the most vulnerable parts of his body. But the machine has sapped her energy, and she's not skilled enough to put the Sloth down.\n    \n    The Sloth's claws peel open her back. Whippet cries in agony. \n    \n    He grabs her hair and drags her behind him, stopping at the roof's edge.\n    \n    \"Don't kill me,\" Whippet bawls, tears streaming down her cheeks.\n    \n    \"The…ground…will…do…that…for…me,\" the Sloth growls as he flings your teenage sidekick into the night sky.\n    *goto ro_grave\n    \n    \n*label ro_grave\n*page_break\n*if ro > 60\n    \"I'm trying to forgive you,\" $!{ro_name} whispers to your headstone, wiping away a tear, ${ro_his} voice shaking. \"You weren't supposed to leave me. We were a team.\"\n    \n    \"If you're watching, or if you can hear me, I want you to know I wouldn't have traded our life together for anything. I mean it, not for anything in the world.\"\n    \n    $!{ro_name}'s hands slip into ${ro_his} pockets, a lump caught in ${ro_his} throat.\n    \n    \"I'm selfish, and I hate myself for thinking of this, but I keep hoping that you're not still mad at me. You seemed happy recently, but I keep wondering if it was an act, or if you had forgiven me. If you had, please…please send me a sign.\"\n    \n    $!{ro_name} pauses, peering up to the sky before fishing something from one pocket. \"We'll talk more next week. I promise.\"\n    \n    @{ro_he2 He stoops|She stoops|They stoop} down to place a small item on the ground.\n    \n    @{oldspot2 The smoothie|The glass of iced tea|The milkshake|The bottle of beer} leans against your headstone in the late afternoon sun.\n    *page_break\n    *goto dead_over\n    \n*if ro > 45\n    \"I'm sorry, but I can't keep doing this,\" $!{ro_name} whispers to your headstone, wiping away a tear, ${ro_his} voice shaking. \"I just can't.\"\n    \n    \"I think a lot about all of the years we had together. Were you happy? Was I? Did we waste our lives? I wish I knew the answers, I really do.\"    \n    \n    $!{ro_name}'s hands slip into ${ro_his} pockets, a lump caught in ${ro_his} throat.\n    \n    \"I can't cry anymore over you. I'm all out of tears, all dried up and hollow inside. What do I do with you gone? It's like my whole identity was wrapped up in you, being your [i]helper[/i]. I never should have put myself in that role, but I did.\"\n    \n    $!{ro_name} pauses. \"This has to be goodbye. I have to let go. Wherever you are, I hope you're at peace. You helped a lot of people. Nobody can argue with that.\"\n    \n    @{ro_he2 He blows|She blows|They blow} a final kiss to your headstone and @{ro_he2 walks|walks|walk} off.\n    *page_break\n    *goto dead_over\n*else\n    \"You left me with nothing,\" $!{ro_name} hisses to your headstone, wiping away a tear, ${ro_his} voice shaking. \"After all we've been through, to leave me like this…\"\n    \n    \"I gave you everything I had, and it was never enough. It never was.\"\n    \n    $!{ro_name}'s hands slip into ${ro_his} pockets, ${ro_his} voice rising.\n    \n    \"I devoted my life to you. I deserve something for it. I mean, how isn't that fair? And most of what's in the book, it's true. You know it is.\"\n    \n    $!{ro_name} stoops down and rests a book against your headstone. \n    \n    The book's title: [i]Going Nowhere Fast: My Life with $!{heroname}[/i].\n    \n    \"Come on,\" $!{ro_name} says to ${ro_his} new partner, turning ${ro_his} back to your headstone and walking off. \"Let's go.\"\n    *page_break\n    *goto dead_over\n    \n    \n*comment my gosubs follow\n\n*label mcdeath\nAnd they find their mark again!\n            \nWhite hot pain sears your chest as you stumble back. The Sloth's long arms wrap you in a bear hug, pinning your arms to your sides.\n            \nThe villain's noxious breath heats your face as he growls. \"I'm…going…to…enjoy…this.\"\n            \nThe Sloth squeezes harder, his embrace pressing the air from your lungs. Crack! One of your ribs snap! Every ragged breath is agony!\n            \nYou're barely aware of a shuffling motion as the Sloth walks to the edge of Zenith Tower. \n            \nYou hear a scream and a whooshing sound behind the Sloth. But it's too late for Whippet to save you.\n            \nThe Sloth whispers in your ear. \"Just…so…you…know…I'm…going…to…kill…her…too.\"\n            \nAnd with that, the Sloth flings you off Zenith Tower, your body flipping and flopping in the air.\n            \nIt's 87 stories to the pavement below.\n*return\n\n\n\n\n*label sloth_misses\nBut misses by a mile!\n          \nSummoning every bit of your Juice, you zip away from his attack, stopping directly behind him. Tapping him on the shoulder, you ask, \"Do you want me to stay still the next time? I'll totally do that if you ask nicely!\"\n            \n\"Rah!\" sputters the Sloth, twisting around and trying to grab you with both hands. You duck, sliding between his legs and tapping him on the shoulder again. \"I'm serious! Just ask nicely!\"\n            \nYou hear Whippet yell, \"Nah, he'd rather go \"rahhhhh'!\"\n            \nThe Sloth's attacks become more and more desperate as he continues to miss you. Panting hard, he huffs, \"Coward…just…sta—\"\n*return\n\n\n\n*label end_me_9\nYou crouch down, your leg muscles coiled, ready to strike!\n\n\"Remember that night in the alley when you said you wanted to end me? Well, here's your chance!\"\n\nThe Sloth slashes at you!\n*return\n\n\n*label sloth_lurch\nThe Sloth lurches back when he spots you walking calmly toward him. \"Is…this…a…trick?\" he bellows, retreating another step and glancing around.\n            \n\"No trick,\" you reply, keeping your tone steady. \"Just a conversation.\"\n            \nThe Sloth huffs, clenching his fists and grinding his teeth, as if daring you to take another step.\n            \n\"You can't do it, you know,\" you say.\n                                   \n\"Do…what?\"\n            \n\"Stop progress. No one can.\"\n            \nThe Sloth huffs again, banging his fist on the roof, sending shards of concrete flying. \"Yes…I…can!\"\n*return\n\n\n*label emp_emp_9\nYou point to Whippet to get her attention and then point to yourself, making a \"turning a knob\" motion with her hand.\n\n\"Huh?\" Whippet whispers.\n\nYou sigh, leaning in closer to whisper in her ear.\n\n\"I'm going to deactivate it. I think I know how it works.\"\n\n\"But what was that thing you did with your hand?\" Whippet asks.\n\n\"I was turning a knob.\"\n\n\"But, I don't see any knobs on it, I just see like glowing buttons and stu—\"\n\n\"It was just an example!\" you whisper. \"I know what I'm doing. You stay here. And if things go south, you run! Got it?\"\n\nWhippet grumbles, \"Okay.\"\n\nYou nod and stand up, braced to bolt out to the machine and start dismantling it.\n\nBut do you really understand how it works?\n\nYou're about to find out!\n*return    \n       \n        \n*label sloth_emp_9\nYou point to Whippet to get her attention and then point to yourself, making a classic \"talking\" motion with your hand.\n\n\"Huh?\" Whippet whispers.\n\nYou sigh, leaning in closer to whisper in her ear.\n\n\"I'm going to talk with the Sloth. I think I can get inside his head and reason with him to shut it down.\"\n\n\"Are you crazy?\" she hisses back. \"You think you can just change his mind after he went through all of this trouble?\"\n\n\"It's our best shot. You stay right here. If things go south, you run! Got it?\"\n\nWhippet grumbles, \"Okay.\"\n\nYou nod and stand up, slipping through the cracked door to address the Sloth.\n\nHow well do you know your enemy's motivations?\n\nYou're about to find out!\n*return\n    \n\n*label whippet_emp_9\nYou point to Whippet and then back to yourself. Straightening your index finger and middle finger, you tap your fingertips on the palm of your other hand, making quick circles. \n\n\"Huh?\" Whippet whispers.\n\nYou sigh, leaning in closer to whisper in her ear. \n\n\"My fingers, those are you and me. We're going to run as fast as we can around the Sloth's machine. The forces should crush it.\"\n\n\"But, am I the middle finger or the—\"\n\n\"It doesn't matter!\" you hiss. \"On the count of three, we dash out and start running around it as fast as we can! That close to the machine, we'll probably feel more drained, so we have to make this count! It's our only shot!\"\n\nWhippet nods, a look of steely determination on her face.\n\nHow well have you trained your sidekick?\n\nYou're about to find out!\n*return\n\n\n\n\n        \n        \n        \n\n\n        \n\n        \n\n   \n        \n", "choicescript_description": "Use your speedster powers to defeat the superpowered Sloth and save the day, all while tracking down a deadly new weapon threatening your city! There's no room for error in the hero business, not even for the fastest person in the world. One tiny mistake against your deadliest foe threatens to end your career and plunge your city in chaos.\n\n[i]Zip! Speedster of Valiant City[/i] is a 48,000-word superpowered interactive novel by Eric Moser. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\nAs a superpowered hero, you've beaten the Sloth before, but this time he's finally gotten the upper hand (claw?) and he's aiming his deadly new device right at the innocent citizens of Valiant City. It's up to you to stop him and his terrible machine before time runs out!\n\n• Play as male, female, or non-binary; gay, straight, or bi.\n• Use your speed powers to battle an array of superpowered foes.\n• When facing especially tough decisions, use your limited supply of Juice to run even faster.\n• Focus on your struggling relationship with your romantic partner or flirt with a new hero.\n• Train your snarky sidekick to prepare for battle with the Sloth, or leave her to make her own mistakes.\n• Unleash your powers to run for mayor, land a lucrative endorsement deal, or run your enemies out of town.\n• Destroy the Sloth's machine, learn how to disarm it, or even convince the Sloth to give up his criminal scheme.\n• Paying to turn off advertisements (or buying the whole game on Steam) will also unlock a special power boost feature!\n\nAre you fast enough to thwart the Sloth’s scheme and save the day?\n\n", "choicescript_stats": "*text_image speedster.png center Speedster Information\nHero Name: $!{heroname} \n*line_break\nSecret Identity: $!{firstname} $!{lastname}\n*line_break\nJuice: ${juice}\n*line_break\n*stat_chart\n    percent pop Popularity in Valiant City\n\n*text_image abilities.png center Abilities\n*stat_chart\n    percent brain Brainpower!\n    percent sneak Sneakiness!\n    percent magnet Magnetism!\n    percent violence Violence!\n    percent tenacity Tenacity!\n    percent art Artistry!\n*line_break\n*text_image worldview.png center Worldview\n*stat_chart\n    opposed_pair Future\n        Past\n    opposed_pair Ego\n        Humble\n*line_break\n*text_image relationships.png center Relationships\n*stat_chart\n    percent ro $!{ro_name}\n    percent silver Silver Rocket\n    percent law Law Enforcement\n*line_break\n*text_image goals.png center Progress Toward Goals\n*stat_chart\n    text whippet Whippet Training\n    text emp EMP Investigation\n    text sloth Sloth Investigation   \n    text commercial Commercial Appeal   \n    text rogues Miscreant Intimidation", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 10[/b]\n  \n  Unlock chapters 4 through 10, including the thrilling conclusion!\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 10[/b]\n  \n  You've paid to unlock chapters 4 through 10.\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Zip! Speedster of Valiant City[/i].\n\n*feedback\n\nThanks for playing!\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99\n", "screenshots": "*set heroname \"Zipper\"\n*set firstname \"Dre\"\n*set lastname \"Clark\"\n*set juice 100\n*set pop 50\n\n*set brain 60 \n*set sneak 50 \n*set magnet 50   \n*set violence 60    \n*set tenacity 50 \n*set art 50\n\n*set future 50\n*set ego 60   \n\n*set ro 50\n*set silver 50\n*set law 50\n\n*set whippet 0\n*set emp 0\n*set sloth 0\n*set commercial 0\n*set rogues 0     \n\nThe citizens are safe, but the Sloth still has his gun pointed at you!\n\nYou set your jaw and glare at your arch-enemy. Another flash of lightning streaks across the sky; thunder booms. \n\nYou've played around with the Sloth for too long. That innocent young couple could have been killed, and it would have been your fault. \n\nYour priority now? Get that gun out of his hand!\n\n*fake_choice\n    #Talk him into putting it down!\n    #Tap him on the shoulder and snatch the gun away!\n    #Calculate the perfect angle to send a shock wave!\n    #Focus my willpower to shift into an impossible-to-hit blur!\n\n\n\n*set heroname \"Captain Quick\"\n*set firstname \"Michelle\"\n*set lastname \"Moser\"\n*set juice 80\n*set pop 55\n\n*set brain 60    \n*set sneak 40 \n*set magnet 50   \n*set violence 50\n*set tenacity 50 \n*set art 68\n\n*set future 45\n*set ego 55   \n\n*set ro 60\n*set silver 50\n*set law 40\n\n*set whippet 0   \n*set emp 0\n*set sloth 0\n*set commercial 0\n*set rogues 0\n\nThree different superpowered enemies have been spotted at three different locations, all at the same time! With your sidekick still on vacation, you're on your own!\n\nDo you stop Perpetual Man from swiping art from the museum?\n\nDo you thwart K9er's scheme to steal dogs from a grooming salon?\n\nOr do you prevent Speedbump from intimidating reporters at the news room?\n\nYou're ready to run! But where?\n\n*fake_choice\n    #To the art museum to confront Perpetual Man!\n    #To the grooming salon to stop K9er!\n    #To the news room for a show-down with Speedbump!\n\n*set heroname \"Beeline\"\n*set firstname \"Joy\"\n*set lastname \"Ambrose\"\n*set juice 60\n*set pop 60\n\n*set brain 68\n*set sneak 50\n*set magnet 50\n*set violence 40  \n*set tenacity 60\n*set art 50\n\n*set future 65\n*set ego 35 \n\n*set ro 60\n*set silver 60\n*set law 40\n\n*set whippet 1 \n*set emp 2    \n*set sloth 1 \n*set commercial 0\n*set rogues 1\n\nA bead of sweat drips down your nose, clinging to your skin before plopping to the sidewalk between you feet. It's been a hell of a day, but the fighting is finally over.\n\nYou need to decide how to wind down.\n\nYour fellow hero, Silver Rocket, is dealing with a new crush of selfie-seekers, but seems open to spending some time together. Your mind races. \n\n[i]So many options![/i] \n\nHow do you spend your night?\n\n*fake_choice\n    #Go to dinner with my romantic partner, of course.\n    #Ditch my partner to hang out with Silver Rocket instead.             \n    #Go to bed to replenish some Juice. (+20 Juice)\n    #Hit the speed bag. (Bonus to Violence)\n    #Crunch area crime data. (Bonus to Brainpower)\n    #Watch public speaking videos. (Bonus to Magnetism)\n\n\n\n*set heroname \"Accelerator\"\n*set firstname \"Alana\"\n*set lastname \"Myles\"\n*set juice 40\n*set pop 68\n\n*set brain 40\n*set sneak 50\n*set magnet 50\n*set violence 68\n*set tenacity 68\n*set art 50\n\n*set future 30\n*set ego 40  \n\n*set ro 35\n*set silver 65\n*set law 65\n\n*set whippet 2  \n*set emp 2\n*set sloth 2\n*set commercial 0\n*set rogues 1\n\n\nYour sidekick might actually beat you!\n\nWhippet cackles, \"Today's the day!\"\n\nYou've given her too much of an advantage! Something pointy (her elbow?) jabs your stomach, forcing you to hunch forward.\n\n\"I feel it!\" Whippet snickers.\n\nShe sweeps your legs out from under you, sending you crashing against the wall.\n\nHas Whippet always been this fast? You feel sluggish, lethargic in comparison. How in the world are you going to beat her blindfolded, and without your Juice?\n\n*fake_choice\n    #It's tornado time!\n    #Let her wear herself out!\n    #Channel my inner actor to feign injury!\n\n\n\n*set heroname \"Streaking Comet\"\n*set firstname \"Bryce\"\n*set lastname \"Thompson\"\n*set juice 20\n*set pop 40\n\n*set brain 40  \n*set sneak 50  \n*set magnet 50\n*set violence 50\n*set tenacity 60\n*set art 74\n\n*set future 75\n*set ego 65    \n\n*set ro 30 \n*set silver 65\n*set law 40    \n\n*set whippet 3\n*set emp 2\n*set sloth 0\n*set commercial 2\n*set rogues 0  \n\nK9er is beaten! At least one of the Miscreants will be spending the night in jail where they belong. Although, to be honest, the Valiant City jail cells are actually pretty nice.\n\nYou realize this is just a small win. The Sloth is still out there, devising some weapon that could bring the city to its knees. Does K9er know anything about it?    \n\nBefore handing her over to the waiting police officer, you leave her with some parting words o much of your favorite beverage.\n\t\tGuzzle way too much of your favorite beverage.\n\n*achievement ducttape visible 20 Duct Tape Fixes Everything\n\t\tDefeat a villain with duct tape.\n\t\tDefeat Perpetual Man with duct tape.\n\t\t\n*achievement sit visible 20 Sit! Stay!\n\t\tShow some dogs who's the boss.\n\t\tCommand K9er's Dobermans.\n\t\t\n*achievement stopdroproll visible 20 Stop, Drop, and Roll!\n\t\tFail to escape a fire.\n\t\tFail to escape Speedbump's circle of flames.\n\t\t\n*achievement comingthrough visible 20 Coming Through\n\t\tGet too reckless during a rescue.\n\t\tGet too reckless while rescuing the injured child.\n\t\t\n*achievement sewer visible 20 Middle-Aged Mutant Ninja Speedster\n\t\tNavigate the sewers to surprise some villains.\n\t\tNavigate the sewers to surprise the Yes Men.\n\t \n*achievement supersex visible 20 Super Sex\n\t\tEngage in super sex.\n\t\tEngage in super sex with your romantic partner.\n\t\t\n*achievement justdrinks visible 20 Just Drinks\n\t\tEnjoy a drink or three with a colleague.\n\t\tEnjoy a drink or three with Silver Rocket.\n\t\t\n*achievement bagel visible 20 Chewy and Delicious\n\t\tUse a bagel in a negotiation.\n\t\tZip to New York to grab a bagel for Echo Rylan.\n\t\t\n*achievement leveraging visible 20 Leveraging Synergies\n\t\tUse corporate-speak in your investigation.\n\t\tUse corporate-speak to obtain information about a stolen battery.\n\t\t\n*achievement fake visible 50 You Fake Faker!\n\t\tFail to successfully fake an injury.\n\t\tFail to convince Whippet that you're injured.\n\t\t\n*achievement punked visible 50 Punked Out\n\t\tFail to intimidate common street criminals.\n\t\tFail to intimidate the gang members.\n\t\t\n*achievement nightout visible 50 Night Out\n\t\tEnjoy a night out with your romantic partner.\n\t\tEnjoy a night out with your romantic partner.\n\t\t\n*achievement inyourface visible 50 In Your Face!\n\t\tDunk on some teenagers.\n\t\tDunk on the teenagers.\n\t\t\n*achievement donut visibl tens to end your career and plunge your city in chaos.\n\n\t[i]Zip! Speedster of Valiant City[/i] is a 48,000-word superpowered interactive novel by Eric Moser. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n\tAs a superpowered hero, you've beaten the Sloth before, but this time he's finally gotten the upper hand (claw?) and he's aiming his deadly new device right at the innocent citizens of Valiant City. It's up to you to stop him and his terrible machine before time runs out!\n\n\t• Play as male, female, or non-binary; gay, straight, or bi.\n\t• Use your speed powers to battle an array of superpowered foes.\n\t• When facing especially tough decisions, use your limited supply of Juice to run even faster.\n\t• Focus on your struggling relationship with your romantic partner or flirt with a new hero.\n\t• Train your snarky sidekick to prepare for battle with the Sloth, or leave her to make her own mistakes.\n\t• Unleash your powers to run for mayor, land a lucrative endorsement deal, or run your enemies out of town.\n\t• Destroy the Sloth's machine, learn how to disarm it, or even convince to Sloth to give up his criminal scheme.\n\t• Paying to turn off advertisements (or buying the whole game on Steam) will also unlock a special power boost feature!\n\n\tAre you fast enough to thwart the Sloth's scheme and save the day?\n\n\t*if choice_prerelease\n\t\t[i]You can play the first portion game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t*choice\n\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t*restart\n\t\t\t#Play the first portion of the game now for free.\n\t\t\t\t*goto purchased\n\n\t*elseif choice_is_steam\n\t\t[i]You can play the first portion of the game for free. Purchase the rest of the game below.[/i]\n\t\t*if choice_is_advertising_supported\n\t\t\t[i]Purchasing the rest of the ga
