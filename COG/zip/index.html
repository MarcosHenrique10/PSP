anged, and zipped out the door and down the block. \n\n        $!{ro_name} would have just tried to make you stay. There's no time for that. Even at less than 100 percent, you're the city's most powerful guardian. People depend on you.\n    #I zip away to save the city, but kiss $!{ro_name} goodbye first.\n        *set ro %+10\n        You zip over to $!{ro_name} and give ${ro_him} a quick smooch. \n\n        \"Be careful,\" @{ro_he2 he says. | she says. | they say.} \"You aren't 100 percent. And who knows what's going on out there.\"\n\n        \"Well, there's only one way to find out,\" you reply, whooshing into the bathroom to change into your fresh ${uniform} and then disappearing into a blur outside.\n    #I lie to $!{ro_name} about taking a walk, but secretly go on patrol.\n        *set ro %-20\n        $!{ro_name}'s arched brow clearly indicates that @{ro_he2 he doesn't | she doesn't | they don't} believe your story, but @{ro_he2 he makes | she makes | they make} no effort to stop you.\n\n        \"Just be careful. On your walk, I mean. You're not 100 percent. And who knows what's going on out there.\"\n\n        \"Well, a walk never hurt anyone,\" you reply. Waiting for $!{ro_name} to turn ${ro_his} back, you whoosh into the bedroom, toss on your fresh ${uniform} and zip out the door.\n    #I discuss strategy with $!{ro_name} and give ${ro_him} a kiss before I go.\n        *set ro %+20    \n        $!{ro_name} races to you, pen in hand. \"Why is he saying that you're dead? Does he really think that?\"\n\n        You wave off the pen. The Sloth didn't say anything important enough to write down. But you're as confused as $!{ro_name} about the Sloth's closing line.\n\n        \"I don't think so,\" you reply. \"He made it clear he expected another show-down.\"\n\n        $!{ro_name} starts clicking the pen absentmindedly. You can see the wheels turning in ${ro_his} head. \"So, he has something to gain from making people think you're dead.\"\n\n        You nod. \"He stole something from Futuro last night. There's an angle there. But right now,  I need to get dressed,\" you say. You zip over to $!{ro_name} and give ${ro_him} a quick smooch before you dash into your bedroom to toss on your fresh ${uniform}.\n\n        \"I know I can't stop you from going,\" $!{ro_name} calls out as you dress. \"Just be careful, $!{mc_petname}. You're not 100 percent! And who knows what's going on out there!\"\n        \n        You zip out the door as you ask, \"Come on, $!{ro_petname}, when am I not careful?\"\n       \nYou press the electronic patch on your neck, initiating a scan of Valiant City police communications. You need to stay on your toes!\n\nThe criminal element believes that you're dead.\n\nAll hell is going to break loose.\n\nAnd fast.\n*finish\n", "3-roguesintro": "*page_break\n*text_image chap_3.png center Chapter Three Miscreant Mayhem\n\nThis is when you're truly in your element, dashing through the teeming streets of Valiant City, a sea of shimmering skyscrapers, dazzling technological innovations, and welcoming, well-educated citizens.\n\nAt least that's how VC, Inc., the city's chamber of commerce, describes the city in its promotional materials.\n\nYou weave and dance through dense crowds of pedestrians. There's no sign of criminal activity; it's just a typical afternoon. Most people study their phones. Some wear ear buds. Few make eye contact. The masses surge forward, moving as one, inherently understanding the unspoken rhythm they are expected to keep.\n\nEverything moves fast in your hometown. People here seem to like it that way.\n\nAlready building up a sweat on this muggy mid-afternoon, you dash over for a cold drink at your favorite spot.\n\n*fake_choice\n\t#Main Squeeze.\n\t\t*set oldspot \"Main Squeeze\"\n\t\t*set oldspot2 1\n\t\tThey only have the best smoothies in the city! Well, that's what the chalkboard sign says out front.\n\t#Just the Tea.\n\t\t*set oldspot \"Just the Tea\"\n\t\t*set oldspot2 2\n\t\tThey only have the best tea in the city. Well, that's what the chalkboard sign says out front.\n\t#Udderly Delightful.\n\t\t*set oldspot \"Udderly Delightful\"\n\t\t*set oldspot2 3\n\t\tThey only have the best lactose-free milkshakes in the city! Well, that's what the chalkboard sign says out front.\n\t#Liquid Courage. \n\t\t*set oldspot \"Liquid Courage\"\n\t\t*set oldspot2 4\n\t\tThey have the coldest beer in the city! Well, that's what the chalkboard sign says out front.\n\t\t\nYou skid to a halt outside. \n\nToday the bright blue chalk offers not a tantalizing description of today's special, but a eulogy for your most cherished destination. \n\n\"Loyal customers: Due to the changing business environment, we are closing our doors. Thank you so much for your support these past four months.\"\n\nWhat? They can't be serious. \n\nConsidering the freshness of the chalk message, obviously written after last night's storm, the owners must have just posted this today. You press your nose to the window and peer inside. It's dark, but you can make out the familiar environment inside. If not for the message, you'd assume they were just late to open today.\n\n*fake_choice\n\t#Destroy all of the ${oldspot} signs! It will save time for the next owners.\n\t\t*set future %+20\n\t\tWhoosh!\n\n\t\tBam!\n\n\t\tSlam!\n\n\t\tIn a flash, you remove every shred of evidence that the closed business ever existed, from the front signage down to the \"Welcome to ${oldspot}!\" decal on the front door. You're pretty sure the new owners will appreciate the slightly reduced workload.\n\n\t\tTossing the remnants in a dumpster, you zip away, optimistic that the next business to operate here will be awesome, maybe even more awesome than ${oldspot} ever was.\n\t#Decide to support the next place that opens here.\n\t\t*set future %+10\n\t\tYou're an adult, and adults accept change, right?\n\n\t\tIt's not like ${oldspot} was going to be there forever, anyway. \n\n\t\tYou zip away, optimistic that the next business to operate here will be awesome, maybe even more awesome than ${oldspot}. \n\n\t\tAnd maybe the support of the city's fastest hero can help keep them in business!\n\t#Refuse to accept the news and break inside to guzzle what I can!\n\t\t*set future %-20\n\t\t*achieve pee\n\t\tWhoosh!\n\n\t\tIn a flash, you drill your finger through the door lock, zipping inside before you're spotted.\n\n\t\tYou guzzle cold, delicious @{oldspot2 smoothies | iced tea | milkshakes | beer} until your stomach threatens to rebel. \n\n\t\tWaddling out for the last time, you're hit with a wave of nostalgia. \n\n\t\tThere'll never be another spot like ${oldspot}. \n\n\t\tAnd some people call this progress.\n\t#Send an e-mail to the chamber of commerce complaining about this.\n\t\t*set future %-10\n\t\tThis is ridiculous.\n\n\t\tThere's something wrong with a business environment when restaurants and other businesses routinely close just months after opening their doors. They need support from organizations like the chamber of commerce to plant roots, lure in customers, and become successful. Growth takes time and patience.\n\n\t\tPeople are too fickle these days. Customers are always on the lookout for the trendiest new spot. What happened to old-fashioned loyalty?\n\n\t\tTapping out an e-mail to the chamber of commerce expressing these sentiments, you're hit with a wave of nostalgia. \n\n\t\tThere'll never be another spot like ${oldspot}. \n\n\t\tAnd some people call this progress. \n\n*page_break\nYou continue your patrol, darting up and down streets, metro lines, and highways. All seems normal. Well, everything other than the pain in your shoulder and the swelling in your ankle. Just as you start to consider dashing back home, the police calls start pouring in.\n\n[i]\"Alarm at Valiant City Art Museum on 42 Progress Way. Suspect identified as Perpetual Man, believed to be armed. All units respond.\"[/i]\n\n[i]\"K9er spotted at Fur Babies Grooming Salon on 320 Valor Blvd. Approach with caution. Do not send canine units! Repeat. Do not send canine units!\"[/i]\n\n[i]\"Suspect identified as Speedbump at WAVC-3 newsroom. Suspect wears heavy armor, SWAT requested.\"[/i]\n\nPerpetual Man is immortal and therefore not afraid to take big risks! K9er is an animal-rights terrorist who can communicate with animals. She and your sidekick Whippet have had their share of dog fights in recent months!\n\nAnd then there's Speedbump, who wears a battle suit designed to neutralize your speed abilities! You'd be flattered, but she uses a brown and gray color scheme. Who does that?\n\nWhippet doesn't get back from her summer vacation until tomorrow, so you're on your own! As fast as you are, you can't be in all three places at once! Where do you go?\n*choice\n\t#The art museum to confront Perpetual Man!\n\t\t*gosub trial_end\n\t\t*set rogue_fought \"Perpetual Man\"\n\t\t*goto perpetualman_3\n\t#The grooming salon to stop K9er!\n\t\t*gosub trial_end\n\t\t*set rogue_fought \"K9er\"\n\t\t*goto k9er_3\n\t#The WAVC-3 newsroom for a show-down with Speedbump!\n\t\t*gosub trial_end\n\t\t*set rogue_fought \"Speedbump\"\n\t\t*goto speedbump_3\n\t\n*label perpetualman_3\n*gosub onway_rogue\n*page_break You're There!\n\"Perpetual Man!\" you shout, hands on hips after you skid to a halt in the $!{heroname} wing of the Valiant City Art Museum. The 'wing' only has three pieces, and two of them were done by elementary school kids for a mandatory project, but they both earned A's!\n\nA tall, lithe figure dressed in a purple and black bodysuit freezes. He stands with his back to you, and holds a drill in his left hand. In front of him on the wall is displayed a 10-foot by 12-foot portrait of you, the only one made by one of your adult fans. How dare he try to steal this masterpiece, created entirely of fruit-flavored puff cereal? \n\n\"…$!{heroname}?\" Perpetual Man asks, slowly pivoting to face you. \n\nYou're not surprised that he failed to recognize the city's premiere hero. He had his back to you, after all. And he thinks you're dead. And you forgot to use your famous catch phrase when you entered!\n\nYou can fix that last one.\n\n*fake_choice\n\t#\"Not so fast, Perpetual Man!\"\n\t\t*set catch \"Not so fast!\"\n\t#\"Bad news travels fast for you, Perpetual Man!\"\n\t\t*set catch \"Bad news travels fast for you!\"\n\t#\"Looking for a quick trip to jail, Perpetual Man?\"\n\t\t*set catch \"Looking for a quick trip to jail!\"\n\t\t\n\"Ah, so the Sloth pulled a fast one on us, huh?\" Perpetual Man's designer sunglasses barely disguise his annoyance. The lines on his forehead deepen. \"See, villains can make the stupid puns too, $!{heroname}.\"\n\n\"Why are you taking this?\" you ask, your body tensed, ready for any move your enemy might make.\n\n\"He set the rest of us up.\" Perpetual Man scowls. \"He's trying to eliminate the competition.\"\n\n\"Why are you taking this?\" you repeat, clinching your fists. \"Of all the things to steal, you pick…my portrait?\"\n\n\"I've never been one for monologues.\" Perpetual Man smirks and opens his right hand to reveal a beeping metal sphere. \"If my thumb leaves this device, we both go boom! Now, back off!\"\n\nA bomb! \n\nIs he bluffing, or is he serious? With most villains, you'd assume the former, but Perpetual Man has a history of getting himself killed to further his goals.\n\nPatrons have long since escaped the museum, so at least you don't have to worry about anyone getting hurt. Other than you!\n\n*choice\n\t#I use my brain! I can find the perfect tool for the job somewhere!\n\t\t\"Fine, you win, Perpetual Man! I hope it looks great over your mantle!\"\n\t\t\t\n\t\tYou zip away to the security office and rummage through the storage locker, muttering to yourself in the process.\n\t\t\n\t\t\"Let's see, walkie talkie? Uh, no help. Yellow vest with 'Security' on it? Nope! Wait, is this what I needed?\"\n\t\t\t\t\n\t\t*if brain > 50 \n\t\t\t*set rogues +1\n\t\t\t*achieve ducttape\n\t\t\tThe most useful item you find is a roll of duct tape.\n\t\t\t\n\t\t\t\"Yes it is! Duct tape fixes everything!\"\n\t\t\t\n\t\t\tIn a blur, you're back in your wing. Perpetual Man has just turned around to start drilling open the portrait's frame with his free hand. He blinks, and his bomb hand is hopelessly stuck to the bomb, thanks to an entire roll of duct tape being wrapped around it.\n\t\t\t\n\t\t\t\"I have to know,\" you ask, \"of all the pieces in the museum, why this one?\"\n\t\t\t\n\t\t\t*gosub perpetual_beat\n\t\t\t*goto beat_perpetualman\n\t\t*else\n\t\t\tYou keep searching, pulling out a VHS tape labeled \"1989 Training Seminar.\"\n\t\t\t\n\t\t\t\"Nope, that's not it!\" you groan, tossing it aside.\n\t\t\t\n\t\t\tYou zip back to your wing, but Perpetual Man is gone! And so is your fruit puff portrait!\n\t\t\t*goto lose_perpetualman    \n\t#I call his bluff! He's not as tough as he pretends to be!\n\t\tIs Perpetual Man really prepared to blow himself up? It has to hurt! And plus, he'd destroy the painting, which he apparently really wants!\n\t\t\n\t\tCrossing your arms across your chest, you set your jaw and growl, \"Do it.\" \n\t\t*if tenacity > 50\n\t\t\t*set rogues +1\n\t\t\t\n\t\t\tYou can tell by his response that your strategy worked.\n\t\t\t\n\t\t\t\"What?\" Perpetual Man sputters. \"I'm serious! You know I'll come back!\"\n\t\t\t\n\t\t\t\"And I'll zip away in an instant. So all you'll accomplish is splattering your internal organs all over this majestic wing, and you'll destroy this masterpiece,\" you reply, motioning to the cereal portrait.\n\t\t\t\n\t\t\t\"It hurts like hell,\" the villain admits, slowly extending his bomb hand to you.\n\t\t\t\n\t\t\tYou nod, slipping your index finger over the trigger. \"I have to know, of all the pieces in the museum, why this one?\"\n\t\t\t\n\t\t\t*gosub perpetual_beat\n\t\t\t*goto beat_perpetualman\n\t\t*else\n\t\t\tBut the villain doesn't blink. \"Fine. On the count of three…two…\"\n\t\t\t\n\t\t\t\"Wait!\" you shout, backing up. \"There's no reason to destroy all of this stuff. I mean, that portrait must be worth…hundreds!\"\n\t\t\t\n\t\t\tOut of options, you keep shuffling away from Perpetual Man. You can only watch as he easily drills the frame open and slips the portrait free. He constantly eyes you, keeping his thumb on the bomb.\n\t\t\t\n\t\t\t\"Now if you'll excuse me, I need to measure my mantle,\" he quips as he strolls away. \"See you around, $!{heroname}.\"    \n\t\t\t*goto lose_perpetualman\n\t#I unleash the vast, unstoppable power of my imagination!\n\t\tIf Perpetual Man wants this magnificent painting so badly, why not remove it from the equation?\n\t\t\n\t\tYou zip over behind the villain and kneel down to study the corners of the massive metal frame. The frame itself is too massive to carry, but if you can spot the optimal places to drill, you can slip the painting out with minimal damage. \n\t\t*if art > 50\n\t\t\t*set rogues +1\n\t\t\t\n\t\t\tSuccess!\n\t\t\t\n\t\t\tYou gently drill your index finger along a seam and roll the portrait onto the floor, without denting a single puff! \n\t\t\t\n\t\t\tYou zoom outside, giving the painting to authorities. Then you zoom back to your wing and tap Perpetual Man on the shoulder, pointing to the empty spot on the wall.\n\t\t\t\n\t\t\t\"Where did it go…?\" Perpetual Man stammers, blinking in disbelief. \n\t\t\t\n\t\t\t\"It's safe, and that's all that matters,\" you reply, encountering no resistance as you slowly reach for the bomb.  \"I have to know, of all the pieces in the museum, why this one?\"                        \n\t\t\t*gosub perpetual_beat\n\t\t\t*goto beat_perpetualman\n\t\t*else\n\t\t\tYou curse and grumble about zoning out in art history class in college, as you can't figure out how to safely remove the portrait.\n\t\t\t\n\t\t\t\"Not so fast, hero!\" Perpetual Man chuckles, tapping you on the shoulder. \"Leave that to the professionals. And back up!\"\n\t\t\t\n\t\t\tOut of options, you back away and watch as Perpetual Man easily drills the frame open and slips the portrait free. He constantly eyes you, keeping his thumb on the bomb.\n\t\t\t\n\t\t\t\"Now if you'll excuse me, I need to measure my mantle,\" he quips as he strolls away. \"See you around, $!{heroname}.\"    \n\t\t\t*goto lose_perpetualman\n\t*selectable_if (juice >20) #This calls for some Juice! (uses 20 Juice)\n\t\t*set juice -20\n\t\t*set rogues +1\n\t\tWhoosh! \n\t\t\n\t\tIn a blink, you're behind Perpetual Man. He's as still as a statue, his brain not having registered your movement yet. \n\t\t\n\t\tYou slide your index finger onto the bomb, using it to slowly press his thumb away, keeping a constant pressure on the trigger.\n\t\t\n\t\tThen you flick his temple with your free hand, knocking the villain dizzy! \n\t\t\n\t\tJuice makes everything easy! \n\t\t\n\t\tSteadying Perpetual Man, you ask, \"I have to know, of all the pieces in the museum, why this one?\"\n\t\t\n\t\t*gosub perpetual_beat        \n\t\t*goto beat_perpetualman\n\t\n\t\n*label beat_perpetualman\n*page_break\n*set pop %+20\n\n\nAfter you hand Perpetual Man over to the police, you tap your communications device, listening for updates on the other Miscreants.\n\n*goto silver_rocket_intro\n\n*label lose_perpetualman\n*page_break\nLosing to Perpetual Man is humiliating, especially combined with your close call against the Sloth, but it could be worse. At least there weren't any witnesses to your defeat! You tap your communications device, listening for updates on the other Miscreants.\n\n*goto silver_rocket_intro\n\t\n\n\n\n\n*label k9er_3\n*gosub onway_rogue\n*page_break You're There!\n\"K9er!\" you shout, hands on hips after you skid to a halt inside Fur Babies Grooming Salon. Two workers and a customer cower against a stainless steel tub. The customer holds a wrinkly pug in her arms. A pair of sleek black Doberman Pinschers snarl and bark at the victims. \n\n\"Sniff my ass! You're supposed to be roadkill, $!{heroname}!\" a female voice growls, her furry muzzle the only part of her face not disguised by her thick navy hoodie.\n\nShe flips back her hood, revealing her canine facial features, a thick heard of tan hair, a black spotted muzzle, and sharp white teeth. Entirely human green eyes study you with obvious disdain. Her furry hands clench into fists.\n\n\"You're not stopping the revolution, hero! No one is! Miranda! Snuffy!\" The Dobermans bolt to her side and turn their throaty barks to you. \n\nYou wave a hand at K9er and her canine companions. \"Wait! Wait! First of all, I haven't said my catchphrase yet! Have some decorum! And second of all, [i]Snuffy[/i]?\"\n\nShe snarls, \"Always with the jokes! Fine! You have three seconds!\"\n\nOh, that's plenty of time! \n\n*fake_choice\n\t#\"Not so fast, K9er!\"\n\t\t*set catch \"Not so fast!\"\n\t#\"Bad news travels fast for you, K9er!\"\n\t\t*set catch \"Bad news travels fast for you!\"\n\t#\"Looking for a quick trip to jail, K9er?\"\n\t\t*set catch \"Looking for a quick trip to jail!\"\n\t\t\n\"You are so cheesy!\" K9er rolls her eyes. \n\nYou wipe dog spittle from your ${uniform}. \"So before I inevitably defeat you, why don't you tell me why you're terrorizing these nice folks?\" \n\n\"Not that I owe you an explanation, but Raphael over there sent out a distress call.\"\n\n\"Wait, which of you is Raphael?\" you call over to the three people still huddled against the rinsing station, none of whom have moved or spoken since you've arrived.\n\nK9er huffs. \"Raphael is the pug! Only his [i]owner[/i] calls him Pugsy. Dogs have the right to pick their own names, you know! He wants his freedom, and he's getting it today!\"\n\nThe patron grips her pug more tightly as it wiggles and sheds on her t-shirt. \"You can't have Pugsy!\"\n\nYou blink, pondering K9er's claims. Is this a dog-napping or did the pug really ask for K9er's help? You know she can communicate with non-human animals like dogs and cats. \n\n\"Enough yapping!\" K9er barks. \"Miranda! Snuffy! Defend Momma!\"\n\nThe Dobermans close in on you, drool hanging from their jaws. No matter her intentions, you can't let K9er threaten innocent people! She has to be stopped! But how do you neutralize these dogs without harming them?\n\n*choice\n\t#I use my brain! I can find the perfect tool for the job somewhere!\n\t\t\"Excuse me, I'll be right back!\" \n\t\t\t\n\t\tYou zip out the door and down the street, popping into various stores, looking for the perfect distraction for those drooly dogs. \n\t\t\n\t\t\"Let's see, an auto parts store? Uh, no help. Vegan bakery? Nope, I don't think they'd go for that! Wait, is this what I need?\"        \n\t\t\n\t\t*if brain > 50 \n\t\t\t*set rogues +1            \n\t\t\tYou spot a steakhouse!\n\t\t\t\n\t\t\t\"Yes! \n\t\t\t\n\t\t\tIn a blur, you snatch two plates of sizzling sirloins from the kitchen and race back to Fur Babies. K9er has taken a few steps toward the woman with the pug. You slide the steaks into two cages and click the doors shut after the Dobermans bolt inside. \n\t\t\t\n\t\t\tK9er whimpers in defeat when she realizes that her muscle has abandoned her. You put your hand on her shoulder and escort her to the police who have gathered outside.\n\t\t\t\n\t\t\t*gosub k9er_beat\n\t\t\t*goto beat_k9er\n\t\t*else\n\t\t\tYou spot a beauty salon!\n\t\t\t\n\t\t\t\"Maybe the dogs would like those little cucumbers they put on your eyes? Uh, no.\"\n\t\t\t\n\t\t\tYou keep zipping around, but can't find what you need. By the time you return to Fur Babies, K9er, her Dobermans, and the pug have all vanished!\n\t\t\t\n\t\t\tYou expect the pug's owner to be upset, but you overhear her telling the groomers, \"He did shed a lot! Now I can once again wear colors other than tan.\"\n\t\t\t\n\t\t\t*goto lose_k9er  \n\t#I impose my will and order those dogs to sit!\n\t\tThose Dobermans seem loyal to K9er, but perhaps you can out-alpha the villain?\n\t\t\n\t\tPointing your index finger at the dogs, you set your jaw and bark, \"Sit!\"\n\t\t*if tenacity > 50           \n\t\t\t*set rogues +1\n\t\t\t*achieve sit\n\t\t\t\n\t\t\tMaybe you missed your calling as a trainer for scary, drooling dogs with deceptively innocuous names, because the Dobermans immediately sit!\n\t\t\t\n\t\t\t\"What?\" K9er sputters. \"Miranda! Snuffy! After I expressed your anal glands!\"\n\t\t\t\n\t\t\tBut the dogs stay rooted to the floor, and K9er whimpers in defeat.\n\t\t\t\n\t\t\tYou put your hand on her shoulder and escort her to the police who have gathered outside.\n\t\t\t\n\t\t\t*gosub k9er_beat\n\t\t\t*goto beat_k9er\n\t\t*else\n\t\t\t\n\t\t\tBut the Dobermans ignore your command and advance on you, snarling and showing their teeth. You hold up your hands and back up a few steps.\n\t\t\t\n\t\t\t\"They know an enemy to the revolution when they see one!\" K9er barks, snatching the pug from the customer. \n\t\t\t\n\t\t\t\"Pugsy!\" the customer wails as K9er strolls out the door with her Dobermans.\n\t\t\t\n\t\t\tYou start to console the customer, but she has a quick change of heart. Between sobs as she dabs her eyes, she sniffles, \"I loved Pugsy! But…he did shed a lot! Now I can once again…wear colors…other than tan!\"            \n\t\t\t\n\t\t\t*goto lose_k9er\n\t#I unleash the vast, unstoppable power of my imagination!\n\t\tWhat do dogs like just as much as treats, or belly rubs, or sniffing butts? That's right: games!\n\t\t\n\t\tIf you can come up with the right game, maybe you can wear out the Dobermans, leaving K9er without her muscle!\n\t\t\n\t\tYou rub your chin and come up with a game called…\n\t\t*if art > 50\n\t\t\t*set rogues +1\n\t\t   \n\t\t\t'Spin in a Circle!'\n\t\t\t\n\t\t\tYou snatch treats from the front counter and dangle them in front of the Dobermans' noses. The dogs stop growling. Success!\n\t\t\t\n\t\t\tYou spin the treats faster and faster, until the treats are a blur. The Dobermans spin around, bumping into each other until they collapse on the floor, tongues hanging out. \n\t\t\t\n\t\t\t\"Good doggies,\" you say, tossing the exhausted pooches the treats. \n\t\t\t\n\t\t\t\"Miranda! Snuffy! Get up!\" K9er barks in disbelief. \"I was going to play with you when we got home! But the revolution comes first!\"\n\t\t\t\n\t\t\tBut when the dogs stay sprawled on the floor, K9er whimpers in defeat.\n\t\t\t\n\t\t\tYou put your hand on her shoulder and escort her to the police who have gathered outside.    \n\t\t\t\t\t\t\n\t\t\t*gosub k9er_beat\n\t\t\t*goto beat_k9er\n\t\t*else\n\t\t\t\n\t\t\t'Watch a Stranger Juggle Treats!'\n\t\t\t\n\t\t\tOkay, so you need to work on your dog game titles.\n\t\t\t\n\t\t\tIn a fit of desperation, you snatch  a few treats from the front counter and start juggling them in front of the slobbery Dobermans.\n\t\t\t\n\t\t\t\"See, this is fun to watch, right?!\" you say nervously as the dogs advance, their teeth bared. Snuffy snaps at your left hand. You flinch and drop the treats, taking a few careful steps back. \n\t\t\t\n\t\t\t\"They know an enemy to the revolution when they see one!\" K9er barks, snatching the pug from the customer. \n\t\t\t\n\t\t\t\"Pugsy!\" the customer wails as K9er strolls out the door with her Dobermans.\n\t\t\t\n\t\t\tYou start to console the customer, but she has a quick change of heart. Between sobs as she dabs her eyes, she sniffles, \"I loved Pugsy! But…he did shed a lot! Now I can once again…wear colors…other than tan!\" \n\t\t\t\t\t\t \n\t\t\t*goto lose_k9er\n\t*selectable_if (juice >20) #This calls for some Juice! (uses 20 Juice)\n\t\t*set juice -20\n\t\t*set rogues +1\n\t\tWhoosh! \n\t\t\n\t\tIn a blink, you're behind the Dobermans. They're as still as statues, their brains not having registered your movement yet. \n\t\t\n\t\tYou scoop them up one at a time, setting them in cages and clicking the doors shut before sliding a few treats from the front counter through the bars. \n\t\t\n\t\tThen you snatch a leash from display hook and tie K9er's hands behind her back before she can even flinch. She blinks as you start escorting her outside to the police officers who have responded to the call.\n\t\t\n\t\tJuice makes everything easy! \n\t\t\n\t\t*gosub k9er_beat        \n\t\t*goto beat_k9er\n\t\n\t\n*label beat_k9er\n*page_break\nAfter you hand K9er over to the police, you tap your communications device, listening for updates on the other Miscreants.\n\n*goto silver_rocket_intro\n\n*label lose_k9er\n*page_break\nLosing to K9er  is humiliating, especially combined with your close call against the Sloth, but it could be worse. No citizens were injured. And although the pug was taken, you strongly suspect he'll be happy with K9er. \n\nYou tap your communications device, listening for updates on the other Miscreants.\n\n*goto silver_rocket_intro\n\n\n\n\n\n\n*label speedbump_3\n*gosub onway_rogue\n*page_break You're There!\n\"Speedbump!\" you shout, hands on hips after you skid to a halt inside the WAVC-3 newsroom. \n\nA news anchor stands defiantly in front of the villain, shaking her head. \"I don't know where the Sloth went! It wasn't an interview or anything! Can you imagine how long that would take?\"\n\n\"$!{heroname}!?\" Speedbump turns away from the anchor and faces you. Her voice, muffled under her full-head helmet, sounds almost…happy?\n\n\"You're alive!\" she says, clapping her rusty metal gauntlets together. \"I knew that the Sloth couldn't have prevailed against my worthiest adversary!\"\n\nYou blink. \"Uh, you have…other adversaries?\" To your knowledge, Speedbump has been uniquely obsessed with you since she emerged as a new villain three years ago.\n\n\"Oh, dozens, but none that can compare to you!\" Speedbump gestures to the torso of her armor, which looks a bit like an engineering student was asked to create a battle suit in 48 hours using only the contents of a typical garage. \"And I'm sure you feel the same way?\"\n\nYou can only manage a quick \"…Uh,\" before she continues. \"I was afraid I'd never hear your catchphrase again! Say it now! Come on, say it before we fight!\"\n\nYou make eye contact with the anchor, who is taking the opportunity to slip away. Deciding to indulge Speedbump, you proclaim…\n\n*fake_choice\n\t#\"Not so fast, Speedbump!\"\n\t\t*set catch \"Not so fast!\"\n\t#\"Bad news travels fast for you, Speedbump!\"\n\t\t*set catch \"Bad news travels fast for you!\"\n\t#\"Looking for a quick trip to jail, Speedbump?\"\n\t\t*set catch \"Looking for a quick trip to jail!\"\n\t\t\n*comment willpower creative smart \n\"There it is!\" Speedbump claps again.\n\n\"So what's your angle here, Speedbump? You're trying to track down the Sloth?\"\n\n\"That was the plan, in an 'avenge the death of my worthiest adversary' type of way. But now that you're here, our rivalry can continue! Think fast!\"\n\nSpeedbump aims her fist at the ground by your feet! A blast of oil shoots from a nozzle on the top of her wrist! \n\nYou accelerate, running in a circle, staying ahead of the oil as it splatters against your heels. This is hardly the first time Speedbump has used the oil trick on you! You've always dodged it easily!\n\nBut your recent slip up against the Sloth weighs on you. You can't afford to slip up again!\n\n\"Now let's light a fire under you, ${heroname}!\" Speedbump cackles as she points her other hand to the circle of oil. A stream of fire erupts from a tube running down her arm, connected to a tank on her back. This is new!\n\nIn a whoosh, the circle of oil on the floor transforms into a circle of raging flames. You're trapped in the middle!\n\n*choice\n\t#I use my brain! I can put this fire out!\n\t\tYou shield your face from the heat, crouching down to avoid the plumes of smoke. One thing's for sure, you need to extinguish the fire, and fast, but how?\n\t\t\n\t\tYou mutter to yourself, covering your mouth with one hand. \"Oil fire, oil fire, how to put it out?\"        \n\t\t*if brain > 50 \n\t\t\t*set rogues +1\n\t\t\t\n\t\t\tYou're struck with a stroke of genius! \"I'll steal its oxygen!\" \n\t\t\t\n\t\t\tThat's the way to put out an oil fire! It's a good thing you didn't try to use water; that would have just made things worse!\n\t\t\t\n\t\t\tIt's time to pick up some speed! You start racing inside the circle, faster and faster, sucking all the air away from the flames! The faster you go, the weaker the flames become. By the time you skid to a halt, the blaze has died. Only wisps of smoke remain.\n\t\t\t\n\t\t\t\"I thought I finally had you!\" Speedbump cries. \n\t\t\t\n\t\t\tYou step over the remaining oil and tell Speedbump to surrender.            \n\t\t\t\t\t\t\n\t\t\t*gosub speedbump_beat\n\t\t\t*goto beat_speedbump\n\t\t*else\n\t\t\t*achieve stopdroproll\n\t\t\tYou go with the best idea you have. \"I'll let the sprinklers handle it!\"\n\t\t\t\n\t\t\tYou glance up at the sprinkler head and smirk at your good luck. The heat from the flames will activate the sprinkler in seconds!\n\t\t\t\n\t\t\tAnd it does…but that's not a good thing!\n\t\t\t\n\t\t\tWater just intensifies an oil fire! The flames explode around you, sapping your strength and forcing you to your knees.\n\t\t\t\n\t\t\tOver the rush of the blaze, you can barely hear Speedbump cackle, \"I did it! I beat you!\" before she swaggers out of the newsroom.\n\t\t\t\n\t\t\tBut by the time the flames die down, she's nowhere to be found.\n\t\t\t\n\t\t\t*goto lose_speedbump \n\t#I steady my nerves and rush straight through the flames!\n\t\tRunning through fire seems sort of crazy, but if you zip quickly enough through the blazing ring, maybe it won't be so bad?\n\t\t\n\t\tCracking your knuckles, you plant your back foot and try to convince your brain to let you run through the blaze!\n\t\t*if tenacity > 50           \n\t\t\t*set rogues +1\n\t\t\t\n\t\t\tAnd you succeed!\n\t\t\t\n\t\t\tWhoosh! You emerge on the outside of the ring, your ${uniform} singed but otherwise no worse for wear!\n\t\t\t\n\t\t\t\"I thought I finally had you!\" Speedbump cries. \n\t\t\t\n\t\t\t\"You thought wrong,\" you reply, ordering Speedbump to surrender.  \n\t\t\t\n\t\t\t*gosub speedbump_beat\n\t\t\t*goto beat_speedbump\n\t\t*else\n\t\t\t\n\t\t\tBut you chicken out at the last minute!\n\t\t\t\n\t\t\tRun through fire? You're not that crazy! It's smarter to just let the fire burn itself out.\n\t\t\t\n\t\t\tOver the rush of the blaze, you can barely hear Speedbump cackle, \"I did it! I beat you!\" before she swaggers out of the newsroom.\n\t\t\t\n\t\t\tBy the time the flames die down, she's nowhere to be found.           \n\t\t\t\n\t\t\t*goto lose_speedbump\n\t#I unleash the vast, unstoppable power of my imagination!\n\t\tYou can't go through the fire; that would be nuts! And you really need to escape the ring before the sprinklers activate! Water just intensifies oil fires!\n\t\t\n\t\tSo you can't go through the fire, but you can't stay inside the fire either.\n\t\t\n\t\tYou rub your chin, looking for a creative angle.\n\t\t*if art > 50\n\t\t\t*set rogues +1\n\t\t\tAnd you decide to go [i]over[/i] the fire!\n\t\t\t\n\t\t\tYou stand and put your arms down to your sides. Then you start rotating your arms clockwise, faster and faster, until you start to generate thrust under you.\n\t\t\t\n\t\t\tIt's awesome to feel your feet leave the ground. It's even more awesome to see Speedbump's head cocked in what you assume is an expression of disbelief under her helmet.\n\t\t\t\n\t\t\tYou angle your arms a bit behind you as you cross over the fire and return to the ground outside the flaming circle. \"Bet you didn't know I could do that!\" \n\t\t\t\n\t\t\tSpeedbump seems to take the defeat in stride as you order her to surrender.   \n\t\t\t\t\t\t\n\t\t\t*gosub speedbump_beat\n\t\t\t*goto beat_speedbump\n\t\t*else\n\t\t\tBut you can't think of anything! Stupid imagination!\n\t\t\t\n\t\t\tThe heat rises, which activates the sprinklers. The flames explode around you, sapping your strength and forcing you to your knees. If you were trapped before, you're even more trapped now!\n\t\t\t\n\t\t\tOver the rush of the blaze, you can barely hear Speedbump cackle, \"I did it! I beat you!\" before she swaggers out of the newsroom.\n\t\t\t\n\t\t\tBut the time the flames die down, she's nowhere to be found.     \n\t\t\t\n\t\t\t*goto lose_speedbump\n\t*selectable_if (juice >20) #This calls for some Juice! (uses 20 Juice)\n\t\t*set juice -20\n\t\t*set rogues +1\n\t\tWhoosh! \n\t\t\n\t\tIn a blink, you zip through a tiny gap right where the last part of the circle ignites! You're safe, by a tenth of a second!\n\t\t\n\t\tSpeedbump cocks her head when you appear right in front of her. \"But…but…you were inside the circle! I saw you!\"\n\t\t\n\t\tYou just smirk in response. Juice makes everything easy! \n\t\t\n\t\tSpeedbump seems to take the defeat in stride as you order her to surrender. \n\t\t\n\t\t*gosub speedbump_beat        \n\t\t*goto beat_speedbump\n\t\n\t\n*label beat_speedbump\n\nAfter you hand Speedbump over to the police, you tap your communications device, listening for updates on the other Miscreants.\n\n*goto silver_rocket_intro\n\n*label lose_speedbump\n\nLosing to Speedbump is humiliating, especially combined with your close call against the Sloth, but it could be worse. No citizens were injured, but you'll need to toss your ${uniform} in the garbage! Pee yew, you're smoky!\n\nYou tap your communications device, listening for updates on the other Miscreants.\n\n*label silver_rocket_intro\n*page_break\n*finish\n\n\n*label onway_rogue\nA sonic boom thunders! Wind whips against your face! Your surroundings fade into a blur!\n\nYou'll reach your destination in five seconds!\n\nThree seconds!\n\nOne second!\n*return\n\n\n*label perpetual_beat\nThe villain mumbles, \"I thought you were dead. I was going to put it over my mantle.\"\n\t\t\n\"Oh!\" You put your hand on his shoulder and escort him outside to police. \"Well between you and me, the artist could have used fewer fruit puffs in the ass area. I'm just saying.\"\n*return\n\n\n*label k9er_beat\nYou lower your voice to K9er. \"I have to ask about that name again. I mean, Snuffy? He wears a spiked collar! And he pulls it off rather well, if I do say so myself!\"\n\n\"Don't name-shame,\" K9er growls. \"He picked it out. But I agree about the collar. He's definitely living his best life.\"\n*return\n\n\n*label speedbump_beat\n\"You win this time, ${heroname}, but I'll keep improving my armor! You can never truly defeat me!\"\n\nYou put your hand on her shoulder and escort her outside to the police. \"You know what would be a good idea? Holograms! Those might really slow me…wait, why am I giving you ideas? Forget I said that!\"\n*return\n\n*label trial_end\n*check_purchase adfree\n*if not((choice_is_steam or choice_prerelease) or choice_randomtest) or (choice_purchased_adfree or not(choice_purchase_supported))\n\t*label purchased\n\t*if not(choice_prerelease or choice_is_steam) and not(choice_purchased_adfree)\n\t\tCome back later to play the next part of [i]Zip! Speedster of Valiant City[/i]!\n\n\t\tOr, you can buy the game now to skip the wait.\n\n\t\t*purchase_discount adfree 2020-02-27 $4.99 $2.99 delay_purchased\n\t\t*delay_break 1200\n\n\t*label delay_purchased\n\t*return\nRemember earlier how we told you that some of the game's content is available for free? This is the end of the free content.\n\n*if choice_prerelease\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining content.[/i]\n\n*purchase_discount adfree 2020-02-27 $4.99 $2.99 purchased\n*abort\n\n", "4-rocketrobbery": "*page_break\n*text_image chap_4.png center Chapter Four Rocket Launch\n*if choice_quicktest\n    *set oldspot2 1\n\n*if (rogue_fought = \"Perpetual Man\")\n    [i]\"Suspects Speedbump and K9er no longer at previous locations. Call for back-up if either are sighted.\"[/i]\n    *goto slap_head\n*if (rogue_fought = \"K9er\")\n    [i]\"Suspects Speedbump and Perpetual Man no longer at previous locations. Call for back-up if either are sighted.\"[/i]\n    *goto slap_head\n*else\n    [i]\"Suspects K9er and Perpetual Man no longer at previous locations. Call for back-up if either are sighted.\"[/i]\n    *goto slap_head\n\n*label slap_head\n\nYou slap your forehead. Great. Just great. But hardly surprising.\n\nYou can never count on the VCPD to help you with the Miscreants. It's almost as if, whenever some villain shows up in a crazy costume or with some unorthodox weapon, the police just assume you or one of the city's other superpowered protectors will handle it.\n\nMaybe you can build a stronger relationship with law enforcement and get them to help out?\n\nThe city's bungling mayor is even worse! He can't even shovel a ceremonial scoop of dirt without bonking someone in the head. How does the city run so well with him at the helm? \n\nSomeone really should run against him in the election coming up. Hmmm…[i]run?[/i] That gives you a crazy idea. Who's better at running than you?\n\nBut you need to push those issues aside for now. Shifting gears mentally, you patch in $!{ro_name}.\n\n\"Juice level?\"\n\n*if (ro > 55)\n    $!{ro_name} responds within seconds. \"Juice level is at ${juice} percent, ${mc_petname}.\"\n\n    \"Roger that, ${ro_petname},\" you reply. \"I'll check in later. Gonna do another sweep for Miscreants.\"\n\n    \"Happy cleaning,\" $!{ro_name} quips. \"Oh, and speaking of that, can you pick up the steam cleaner on the way home? It's already paid for! Thanks!\" You can almost hear the smile on ${ro_his} face. $!{ro_name} really, [i]really[/i], likes a clean house!\n    *goto juice_plan\n*if (ro > 45)\n    $!{ro_name} responds after a brief delay. \"Juice level is at ${juice} percent.\"\n\n    \"Roger that,\" you reply. \"I'll check in later. Gonna do another sweep for Miscreants.\"\n\n    \"Got it,\" $!{ro_name} responds. $!{ro_his} tone seems professional, but a bit detached.\n    *goto juice_plan\n*else\n    $!{ro_name} doesn't immediately respond, so you try again. \"My Juice level, $!{ro_name}?\"\n    \n    \"I'm checking, I'm checking,\" $!{ro_name} grumbles. \"Okay, it's at ${juice} percent.\"\n\n    \"Roger that,\" you reply. \"I'll check in later. Gonna do another sweep for Miscreants.\"\n\n    \"Oh, [i]now[/i] you tell me where you're going,\" $!{ro_name} snaps before ending the call.\n    \n    You sigh. It looks like you might have some work to do on the home front.\n    *goto juice_plan\n   \n*label juice_plan\n   \nThis does bring up an important issue. How do you plan to use your Juice over the next couple of days?\n\n*fake_choice    \n    #Whenever I feel my skills aren't up for a certain challenge!\n        That makes sense! You'll pay close attention to whether a certain task plays to your strengths or could exploit your weaknesses.\n    #Whenever I see a goal I really want to accomplish!\n        That makes sense! You'll keep your eyes on the prize and use Juice to pursue the things most important to you.\n    #Whenever I want!\n        Life is short, so maybe you'll use Juice whenever you want an epic \"insta-win!\"\n    #As little as possible. I'm saving Juice for the Sloth!\n        You'd be shocked if the Sloth didn't (slowly) rear his smelly head again in the near future! I mean, he's the Big Bad, right?\n        \nA new alert gets your attention!\n\n[i]\"Robbery in progress. Shots fired. Three suspects wearing high-tech visors  leaving Vector Bank on 9002 Market St. Believed to be members of the Yes Men.\"[/i]\n\nAh, the Yes Men. The growing army of thugs and degenerates led by the mind controller known as…wait for it…the Yes Man! Somehow, the Yes Man controls his army through those fancy visors he makes them wear.\n\nWhatever the Sloth is up to, he's succeeded in creating chaos! But how does this benefit him?\n\nA roar sounding like a jet rumbles behind you! You glance up just in time to spot a streak of silver zipping through the sky in the direction of Vector Bank!\n\nIt looks like the city's second-most famous hero, the Silver Rocket, plans to take down the Yes Men! Let's see who gets there first!\n\nAnd in a flash, you're off!\n*page_break\nPeople are scattering from the front doors of Vector Bank. Adults scoop up children and stumble for safety. Sirens sound in the distance. There's no sign of the robbers.\n\n\"My baby's been shot! Help!\" a frantic voice cries out.\n\nYou dash in the direction of the voice. A little boy, maybe eight or nine years old, lays sprawled on his back near the bank entrance. His light blue t-shirt is stained deep red across his stomach. The boy's eyes squeeze shut as he winces. \n\nA woman leans over him, holding his left hand. She sobs, repeating, \"My baby! Oh my baby! Help him!\" \n\nYou swallow hard. Sure, you take it easy on most of the Miscreants, as they rarely injure anyone, but Yes Man and his thugs have crossed the line. They're going to pay!\n\nBut you need to get this child to the hospital first! \n*choice\n    #Assure the child that he's safe with ${heroname} on the job!\n        You kneel down to the child.\n        \n        \"I'm going to take care of you,\" you tell him, starting to scoop him up. \"And when you get better, you can tell everyone that you're friends with ${heroname}. How does that sound?\"\n        \n        *if magnet > 50 \n            *set pop %+20          \n            \"Okay…\" he whimpers.\n            \n            Whoosh! The city becomes a blur around you!\n            *gosub weaknod_child\n            *goto meet_silverrocket\n        *else\n            *set pop %-20\n            But the child doesn't trust you.       \n            \n            \"Nooooooo!\" he whimpers. You flinch and ease away from him.\n            *gosub childfail         \n            *goto meet_silverrocket\n    #Trick him into believing that his wound isn't serious. I need to keep him calm!\n        You kneel down to the child.\n        \n        \"It's just a scrape,\" you tell the boy, starting to scoop him up. \"Just like when you fall off a bike. That's happened to you before, right?\"\n        \n        *if sneak > 50 \n            *set pop %+20          \n            \"Okay…\" he whimpers.\n            \n            Whoosh! The city becomes a blur around you!\n            *gosub weaknod_child\n            *goto meet_silverrocket\n        *else\n            *set pop %-20\n            But the child sees through your lie.      \n            \n            \"It hurts…more…than that,\" he whimpers. You flinch and ease away from him.\n            *gosub childfail\n            *goto meet_silverrocket\n    #Just grab him and go! Anything in our way is getting destroyed!\n        \"What…?\" the mother doesn't have time to blurt out another word. You scoop up the child, hold him close to your chest, and go!\n        \n        *if violence > 50\n            *set pop %+20\n            You bust through store windows, sprint through cafes, and even crash an outdoor wedding on your way to the hospital. The quickest path between two points is a straight line, so a straight line it is!\n\n            \"This is fun, isn't it? Wheeee!\" you squeal, desperate to keep the child calm.\n            *gosub weaknod_child\n            *goto meet_silverrocket\n        *else\n            *set pop %-20\n            *achieve comingthrough\n            This won't go down as one of your better ideas.\n            \n            You bust through a store window, sending shards of glass all over the sidewalk, and almost stumble to the ground.\n            \n            A police officer barks, \"Hey, what are you doing? Are you crazy? That boy needs an ambulance!\"\n            \n            You nod, setting the child carefully down as the cop radios am ambulance. \n            \n            \"Don't you have some caped weirdo to chase down?\" the officer asks.\n            \n            Grinding your jaw in response, you snap, \"Most of them do [i]not[/i] wear capes!\" and you speed off back to Vector Bank!\n            \n            Maybe the Silver Rocket has tracked down the robbers? It's time to find out!\n            *goto meet_silverrocket\n    *selectable_if (juice > 20) #It's time for Juice! (uses 20 Juice)\n        *set pop %+20\n        *set juice -20\n        \"Let's go,\" you whisper in the child's ear, keeping him secure against your chest.\n\n        Juice flows through your veins, and the world slows down to a crawl. Time and space blur together; there's no friction, only a light breeze on your face.  \n        \n        \"Doesn't the wind feel good?\" you ask, keeping your voice low. \"It's one of my favorite things in the world.\"\n        *gosub weaknod_child\n        *goto meet_silverrocket\n\n\n*label childfail\nThe mother bawls, \"Did you hurt my baby? What did you do?\"\n            \nYou take a few steps back and mumble, \"I was trying to help.\"\n                        \nSirens blare behind you!\n            \nEMTs race up and swarm the child. One EMT elbows you out of the way and barks, \"Stay clear!\"\n            \nUnable to help, you race back to Vector Bank. Did Silver Rocket manage to snag the robbers?\n\nIt's time to find out!\n*return\n\n\n*label weaknod_child\n\nSeconds later, you gingerly hand him off to emergency room personnel.\n\nOne of the nurses yells, \"Thank you!\" as they wheel the child back for surgery.\n\n\"You're a hero, ${heroname}!\" shouts a man sitting in the waiting room. Others around him applaud and shout words of encouragement and appreciation.\n\nYou give a quick wave and dart back towards the bank. Did Silver Rocket manage to snag the robbers?\n\nIt's time to find out!\n*return\n\n\n*label meet_silverrocket\n*page_break\nWhoosh! You speed down Market Street and follow the sounds of gunfire. About 100 feet ahead of you, a figure clad in a shiny silver jumpsuit zips through the air, thanks to a rocket pack on ${ro_his} back. It's Silver Rocket!\n\nPursuing a swerving hover car, Silver Rocket whips out a sleek blaster pistol from a holster on ${ro_his} right thigh. \n\n@{ro_he2 He fires |She fires |They fire} bright blue torrents of energy down at the fleeing vehicle, which veers at the last second. The energy bursts pummel the road with loud 'bloom' noises. \n\nThe car's back-seat occupants lean out the windows, aiming what look to be M16s up at Silver Rocket. Just as the Yes Men fire at Silver Rocket, @{ro_he2 he banks | she banks | they bank} sharply to the right, avoiding the deadly barrage.\n\nThese Yes Men are going to kill someone if you don't do something! You increase your speed, sweat pouring down your neck as you close in on the speeding hover car. You hear sirens behind you! The VCPD is in pursuit now too!\n\nOne of the Yes Men spots you and opens fire!\n\n*fake_choice\n    #Dodge right!\n        Whew! The bullets zip to your left!\n    #Dodge left!\n        Whew! The bullets zip to your right!\n    #Duck your head!\n        Whew! The bullets zip over your head!\n        \nPanting and narrowing your eyes, you pour on the speed. \n\nSilver Rocket's energy blasts find their mark this time, bashing the hover car and crumpling its roof!\n\nBut the car keeps going, and the Yes Men won't give up! More bullets fly at you! Mind-controlled thugs can be annoyingly persistent!\n\n*fake_choice\n    #Slide!\n        You lean back and do a feet-first baseball slide, scraping your butt on the road!\n    #Jump!\n        You leap in the air, tucking your knees against your chest!\n    #Flip!\n        You tuck your chin against your chest and do a front flip!\n\nThat was close! The bullets whiz past you, just inches from finding their mark! You glance back, checking on the two VCPD patrol cars behind you. The bullets missed them this time, but that likely won't happen again!\n\n*choice       \n    #Figure out how to disable the hover car!\n        If you can bring that hover car to a halt, then Silver Rocket and the VCPD can help you surround the Yes Men and bring this chase to an end!\n        \n        The hover car uses four propellers to cruise over the ground, like a low-flying helicopter. So how can you stop it?\n        \n        *if brain > 50 \n            *set law %+20          \n            You aim whirlwinds going in the opposite direction!\n            \n            You unleash whirlwinds from both your hands, wrecking havoc on the hover car's back propellers. The blades strain and wobble, finally snapping! The hover car skids across the street, slamming into a light pole!\n            *gosub stop_yes\n            *goto intro_shoedeal\n        *else\n            *set law %-20\n            You try to find something to throw into the propellers.       \n            \n            But you can't find anything that's both light enough for you to lift and sturdy enough to jam the blades.\n            *gosub stop_no  \n            *goto intro_shoedeal\n    #Trick them into thinking that the chase is ending!\n        But how?\n        \n        You look around for inspiration.\n        \n        *if sneak > 50 \n            *set law %+20   \n            *achieve sewer\n            You snap your fingers! The sewers!\n            \n            You wave back to the VCPD and Silver Rocket, motioning for them to ease off. Skidding to a halt at the next man hole cover, you strain to pull the cover away.\n            \n            As the hover car speeds further ahead, you jump down into the sewers and pour on the speed! Nasty gunk kicks up with every step as you zoom a few blocks from your jumping in point! \n            \n            But it's worth all the stench and muck when you leap from the next man hole and surprise the Yes Men!\n            \n            The driver jerks hard to the right and slams into a light pole!\n            *gosub stop_yes\n            *goto intro_shoedeal\n        *else\n            *set law %-20\n            But inspiration eludes you.\n            \n            You can't figure out how deceive them without getting riddled with bullets.\n            *gosub stop_no\n            *goto intro_shoedeal\n    #Unleash an assault of unmatched brutality!\n        Yes, there are times to go easy on opponents. In fact, that's usually how you approach fights against the Miscreants. \n        \n        And yes, the Yes Men are victims of mind control. \n        \n        But when bullets are flying and lives are at stake, the kid gloves come off!\n        \n        *if violence > 50\n            *set law %+20\n            Bam! Bam! Bam! \n            \n            You zip right at the hover car, hammering the fenders with your fists! \n            \n            When one of the Yes Men points his gun at you, you snatch it and toss it away, jabbing him in the chin so hard he flies back inside the car.\n            \n            You zip around to the front and kick the hood like a jackhammer. Wham! Wham! Wham!\n            \n            The driver loses control, slamming the vehicle into a light pole!\n            *gosub stop_yes\n            *goto intro_shoedeal\n        *else\n            *set law %-20\n            But even still, you can't get around those M16s!\n            \n            Bursts of machine gun fire rip through the air, and it's all you can do to dodge the bullets. \n            \n            You try to smash the propellers, but every time you get close, sprays of bullets force you to retreat. \n            *gosub stop_no\n            *goto intro_shoedeal\n    *selectable_if (juice > 20) #Use juice to snatch all of their weapons! (uses 20 Juice)\n        *set law %+20\n        *set juice -20\n        You give a thumbs up to Silver Rocket and the VCPD and then…whoosh! \n\n        Time almost stands still! You zip over and snatch each of the Yes Men's guns and toss them aside before they can even flinch. \n        \n        Then you zip around to the front driver's side and tap the window as you scream, \"Boo!\"\n        \n        The driver slams on the breaks and skids out of control, slamming the vehicle into a light pole!\n        *gosub stop_yes\n        *goto intro_shoedeal\n    \n    \n*label stop_yes\n\n\"Freeze!\" bark the officers as they kneel behind their car doors, all weapons pointed at the crippled hover car.\n\nSilver Rocket keeps ${ro_his} aim focused on the criminals. Their visors shattered, they stagger out of their vehicle, wobbling and disoriented, with their hands up. \n\nOfficers cuff the Yes Men, leading them away for booking. One of them nods to you, her look one of steely appreciation. \"Thanks for the assist, ${heroname},\" she says, \"You're alright in my book.\"\n\nAnother officer slaps you on the shoulder before starting a search of the hover car. \"These scumbags don't got a chance with you two around.\"\n*return    \n\n*label stop_no\n\nThankfully, Silver Rocket saves the day!\n\nExecuting a graceful mid-air loop over the hover car, Silver Rocket fires ${ro_his} blaster, disabling the hover car's back two propellers with blasts of blue energy!\n\nThis sends the car spinning out of control, ultimately slamming into a light pole.\n\n\"Freeze!\" bark the officers as they kneel behind their car doors, all weapons pointed at the crippled hover car.\n\n\"You heard them!\" says Silver Rocket, still aiming ${ro_his} blaster at the Yes Men. Their visors shattered by the impact, the criminals stumble out, disoriented.\n\nOfficers cuff the Yes Men, leading them away for booking. One of them nods to Silver Rocket, her look one of steely appreciation. \"Thanks for the assist, Rocket!\" she says, \"You're out of this world!\"\n\nThe other officers groan at the joke. \n*return\n\n\n*label intro_shoedeal\n*page_break\nThe heroes of Valiant City don't exactly hang out in any sort of league or anything, so you take the chance to size up one of your biggest competitors up close.\n\nSilver Rocket's body-hugging flight suit, coupled with ${ro_his} dual-rocket jet pack, is certainly flashier than your own look. With smooth, rounded boots and gloves, and a helmet with a blue-tinted visor, you're reminded of the exotic curves of an Italian sports car.\n\nA few locks of blond hair tumble from the back of ${ro_his} helmet, an observation which, embarrassingly enough for you, Silver Rocket catches you making as @{ro_he2 he holsters | she holsters | they holster} that awesome-looking laser pistol.  \n\n\"Oh, uh, checking out your reflection?\" Silver Rocket asks, pointing ${ro_his} index finger to ${ro_his} reflective silver helmet. \"People tend to, uh, do that sometimes. It's tough to keep it that clean.\"\n\nSilver Rocket pauses, mumbling, \"Real smooth there, get it together.\"\n\nWait…the ultra flashy hero is intimidated by [i]you[/i]? Awesome!\n\n*fake_choice\n    #Ask Silver Rocket if @{ro_he2 he wants | she wants | they want} my autograph. People still like those, right?\n        *set ego %+20\n        *set future %-20\n        Silver Rocket flashes a nervous smile. \"Oh, I don't really, you know, collect autographs, not since like elementary school. Uh, no offense!\" \n                \n        The futuristic hero tentatively motions for a nearby admirer to come closer. \"These days, people usually ask for selfies.\" @{ro_he2 He poses | She poses | They pose} with the fan before glancing back to you.  \n    #Ask Silver Rocket for ${ro_his} autograph.\n        *set ego %-20\n        *set future %-20\n        Silver Rocket flashes a nervous smile. \"Sorry, I don't exactly carry a pen and paper.  Every inch of this has to stay as aerodynamic as possible.\" \n        \n        The futuristic hero tentatively motions for a nearby admirer to come closer. \"These days, people usually ask for selfies.\" @{ro_he2 He poses | She poses | They pose} with the fan before glancing back to you.        \n    #Compliment ${ro_his} gear while pointing out I still beat ${ro_him} to the scene.\n        *set ego %+20\n        *set future %+20\n        Silver Rocket flashes a nervous smile. \"Yeah, it's pretty cutting edge. Honestly, it sometimes feels like I'm, you know, just along for the ride when I fire this thing up!\" \n        \n        @{ro_he2 He cocks his head | She cocks her head | They cock their head}. \"But I don't really pay attention about who gets where first. I figure we're all in this together, and we just do the best we can.\"\n    #Ask Silver Rocket if ${ro_he} can hook you up with a rocket pack! \n        *set ego %-20\n        *set future %+20\n        Silver Rocket flashes a nervous smile. \"Trying to put me out of business? Without this gear, I'm just, you know, normal. Not like you.\"\n        \n        @{ro_he2 He cocks his head | She cocks her head | They cock their head}. \"But if you can arrange to trade me some of that super speed, yeah, let's talk!\"\n         \n*page_break\nSilver Rocket holds ${ro_his} index finger up to the slowly growing crowd, and flashes ${ro_his} pearly whites to the onlookers. \"Pardon us for a moment, we're talking about our tailors.\"\n\nPeople shuffle back a bit, giving you and Silver Rocket just a sliver of privacy. \n\n\"Ugh, 'tailors'? Why did I say that?\" Silver Rocket chastises @{ro_he2 himself.|herself.|themselves.} \"It's not like this stuff is cloth.\" \n\n@{ro_he2 He gestures at his|She gestures at her|They gesture at their} shiny metallic uniform. \"I mean obviously it isn't. It's just that, I don't know, I haven't gotten used to the public relations side of the hero business yet.\"\n\n*fake_choice\n    #I let my eyes casually roam over that body-hugging uniform. I'm curious about the material.\n        It reminds you of some sort of spacesuit heroes might wear in those 1950s science fiction movies, somehow both light and protective. \n        \n        You wonder where you could get some of that material. Surely, it must be hard to come by. How does a normal person get something like that?\n        \n    #I let my eyes casually roam over that body-hugging uniform. I'm curious about the @{ro_he2 man|woman|person} who fills it out so nicely.\n        You do your best not to stare, but that outfit hugs every contour of Silver Rocket's body, and you mean [i]every[/i] contour. Swallowing hard, you reestablish eye contact and compose yourself.\n        \n        And as you study the lower, exposed half of Silver Rocket's face, you can't help but find that jawline rather distinctive, familiar even. And those perfectly tousled strands of blond hair peeking out from the helmet. You just can't put your finger on where you've seen it before.\n        \n    #I wonder why someone with such flashy equipment and conventionally good looks would be nervous around people.\n        It doesn't really make sense. To your knowledge, Silver Rocket has been around for at least two years. Surely that's enough time to adjust to the inevitable fan base and media scrutiny that comes with the job. \n        \n        It's almost like Silver Rocket is [i]too[/i] nervous. But why would someone act like they're nervous if they really aren't?\n        \n    #I wonder where Silver Rocket gets ${ro_his} gear from. Even in Valiant City, this equipment would be hard to find.    \n        That's the big question, isn't it? Rocket packs and laser pistols might be used in the military, but they aren't typically found in civilian hands. \n        \n        One would need access to lots of money and high-tech resources to score stuff like this. That rather limits the list of suspects, doesn't it?\n        \n*page_break     \n\"You there?\" $!{ro_name}'s voice crackles in your ear, snapping you from your thoughts. \"It sounds like things have finally slowed down?\"\n\n\"Yep, just wrapping things up,\" you confirm, lowering your voice and cupping your hand over your mouth.\n\n\"So, we're still on for dinner at the new Italian place on the corner, right?\" $!{ro_name} asks.\n\nA bead of sweat drips down your nose, clinging to your skin before plopping to the sidewalk between your feet. It's been a hell of a day, and you need to decide how to wind down.\n\nYou eye Silver Rocket, who's dealing with a new crush of selfie-seekers. Your mind races. [i]So many options![/i] \n\nHow will you spend your night?\n\n*fake_choice\n    #Go to dinner with $!{ro_name}, of course.\n        *set ro %+20\n        \"Absolutely we're still on!\" \n        \n        You wave to Silver Rocket, and zip back home. $!{ro_name}, dressed to the nines, greets you with a fierce hug, but quickly releases you. \"You worked up a sweat,\" @{ro_he2 he says | she says | they say}, wrinkling ${ro_his} nose. \n        \n        Well, $!{ro_name} has a point. And a shower is definitely in order. But, how do you want the rest of the night to go?\n        \n        *fake_choice\n            #Superpowered shower sex!  \n                *achieve supersex\n                $!{ro_name}'s eyes light up at your suggestion, and ${ro_his} fancy outfit is peeled off before you even get the water running.\n                \n                Vibrating your fingers (and other parts of your anatomy) in all the right ways, you reduce $!{ro_name} to a whimpering mess under the scalding rush of water. \n                \n                But just as you're ready to shut off the shower, $!{ro_name} whispers a challenge to you, nibbling at the tender flesh of your ear lobe. \"Mmmm…you know that [i]thing[/i] we've always talked about trying?\"\n                \n                Your eyes widen. [i]$!{ro_name} wants to try the thing![/i]\n                \n                Needless to say, you sleep like a rock after the prolonged shower session.\n            #A much-needed heart-to-heart to help heal our relationship.\n                \"We need to talk,\" you tell $!{ro_name}, much to ${ro_his} obvious chagrin. \n                \n                \"I thought we were going out?\" $!{ro_name} asks, cocking ${ro_his} head and eying you curiously. \"What's wrong?\"\n                \n                You seize the moment to get everything off your chest, all of the nagging doubts and worries and lingering resentment. $!{ro_name} listens and nods, sliding ${ro_his} hand over yours as you share your innermost thoughts.\n                \n                \"I knew you weren't really over it. But I'm sorry, I really am,\" $!{ro_name} says, ${ro_his} voice soothing and calm. \"And I'll keep doing everything I can to earn back your trust. But…you have to let me, okay? I can't do this alone.\"\n                \n                You nod and murmur, \"I'm trying my best, ${ro_petname},\" before pulling ${ro_name} against you, caressing ${ro_his} hair and closing your eyes, savoring ${ro_name}'s familiar scent. \"I promise I am.\"\n                \n                You spoon all night, legs intertwined as you drift off to sleep with a more hopeful vision of your future together.                             \n            #A romantic dinner out, just as planned.\n                You and $!{ro_name} are escorted to a secluded corner table in the neighborhood's newest hot spot. Wine flows. Feet brush against one another. For an evening, it's almost like old times, before \"the incident.\"\n                \n                $!{ro_name} raises ${ro_his} fork to your lips with a loopy, wine-induced smile. \"You have to try the eggplant parmesan, it's life changing.\"\n                \n               Dinner gives way to dessert. Things heat up over tiramisu when $!{ro_name} leans over the table and whispers, \"Mmmm…you know that [i]thing[/i] we've always talked about trying?\"\n               \n               Your eyes widen. [i]$!{ro_name} wants to try the thing![/i]\n               \n               \"Check please!\" you snap at the server, shoveling one last bite of tiramisu down your throat. \n               \n               Needless to say, you sleep like a rock after an eventful nightcap with $!{ro_name}.\n    #Ditch $!{ro_name} to hang out with Silver Rocket.\n        *set ro %-20\n        *set silver %+20\n        *gosub step_back_4\n        \n        You grimace, dreading ${ro_his} reaction. \"Mind if I beg off dinner? I've met up with a colleague, and we need to compare some notes. You know, professional stuff.\"\n        \n        \"A colleague, huh?\" $!{ro_name}'s voice goes flat. \"It must be urgent if you want to cancel date night. Whatever, I'll see if Peyton wants to go out.\"\n        \n        Before you can reply, $!{ro_name} severs the connection.\n        \n        You motion over to Silver Rocket. \"Hey, want to grab a drink? My treat!\"\n        \n        \"Uh, sure why not?\" @{ro_he2 he says. | she says. | they say.} \"Got a place in mind?\"\n        \n        You ponder and rub your chin. \"Well, my favorite place just closed, so…\"\n        \n        \"Yeah,\" Silver Rocket chimes in, \"mine too. I used to hit ${oldspot} all the time, and I just found out—\"\n        \n        \"That it closed,\" you finish Silver Rocket's sentence.\n        \n        Silver Rocket's lips curl up, showing a hint of immaculately white teeth. \"I guess we'll have to improvise, won't we?\"\n        *page_break\n        \n        *achieve justdrinks\n        Thankfully, you can both cover the city pretty fast! After just nine minutes of searching every nook and cranny of Valiant City, you stumble upon a @{oldspot2 smoothie place | tea place | milkshake place | bar}  that's [i]almost[/i] as awesome as your old fave.\n        \n        Your conversation with Silver Rocket sprawls on for hours, hitting on dozens of topics, as @{ro_he2 he loosens |she loosens|they loosen} up considerably.\n        \n        Silver Rocket raises ${ro_his} glass, and toasts, \"To fast friends!\" \n        \n        \"To fast friends,\" you reply.\n        \n        *fake_choice\n            #\"And to keeping the streets safe!\"\n            #\"And to a jail cell for the Sloth!\"\n            #\"And to faster allies!\"\n            #\"And to Valiant City!\"\n                \n        \"I'll drink to that,\" Silver Rocket gives you a quick nod and chugs the rest of ${ro_his} drink without spilling a drop on ${ro_his} silver suit.\n        \n        The night ends later than you expected, and you don't whoosh back home until 2:00 a.m. $!{ro_name} doesn't stir as you slip into bed, but you wonder how upset @{ro_he2 he'll | she'll | they'll } be in the morning.\n    *selectable_if (juice \u003c 81) #Go to bed to replenish some Juice. (+20 Juice)\n        *set ro %-10\n        *set juice +20\n        *gosub step_back_4\n        \n        You grimace, dreading ${ro_his} reaction. \"Mind if I beg off dinner? I need to hit the sack and recharge the batteries.\"\n        \n        \"Oh, I see.\" $!{ro_name}'s voice goes flat. \"Well, get some rest then. It's not safe, you running around with your Juice too low. I'll see if Peyton wants to go out.\"\n        \n        Before you can reply, $!{ro_name} severs the connection.\n        \n        You wave goodbye to Silver Rocket and adopt a leisurely dashing pace back home. You might have disappointed $!{ro_name}, but after a solid night's sleep, your Juice levels will tick up a bit.\n        \n        As soon as your head hits the pillow, you drift off to a heavy slumber.    \n    #Spend the night hitting the speed bag! (Bonus to Violence)\n        *set ro %-20\n        *set violence %+20\n        *gosub step_back_4\n        \n        You grimace, dreading ${ro_his} reaction. \"Mind if I beg off dinner? I need to hit the speed bag tonight and vent some frustration.\"\n        \n        *gosub reject_ro_4\n        \n        You wave goodbye to Silver Rocket and adopt a leisurely dashing pace back home. You might have disappointed $!{ro_name}, but a few hours on the speed bag never fails to hone your hand-eye coordination. And at your age, you need [i]every[/i] advantage you can muster.\n        \n        Two grueling hours later, you groan under a hot shower and crawl into bed. As soon as your head hits the pillow, you drift off to a heavy slumber.  \n    #Spend the night crunching area crime data! (Bonus to Brainpower)\n        *set ro %-20\n        *set brain %+20\n        *gosub step_back_4\n        \n        You grimace, dreading ${ro_his} reaction. \"Mind if I beg off dinner? I need to crunch some crime data and analyze some patterns. I've been putting that off.\"\n        \n        *gosub reject_ro_4\n        \n        You wave goodbye to Silver Rocket and adopt a leisurely dashing pace back home. You might have disappointed $!{ro_name}, but analyzing crime data keeps your mind sharp. And at your age, you need [i]every[/i] advantage you can muster.\n        \n        Two mentally grueling hours later, you power down your laptop and crawl into bed. As soon as your head hits the pillow, you drift off to a heavy slumber.  \n                \n    #Spend the night watching public speaking videos on YouTube! (Bonus to Magnetism)\n        *set ro %-20\n        *set magnet %+20\n        *gosub step_back_4\n        \n        You grimace, dreading ${ro_his} reaction. \"Mind if I beg off dinner? I really need to binge that video series about public speaking. I feel like if I don't do it tonight, I'll keep putting it off.\"\n        \n        *gosub reject_ro_4\n        \n        You wave goodbye to Silver Rocket and adopt a leisurely dashing pace back home. You might have disappointed $!{ro_name}, but this series is supposed to be \"life changing,\" and if you've learned anything about the internet, it's that content providers rarely exaggerate the importance of their products. And at your age, you need [i]every[/i] advantage you can muster.\n        \n        Two inspirational hours later, you're ready to be interviewed by even the most hard-nosed reporter! As soon as your head hits the pillow, you drift off to a heavy slumber.  \n        \n*finish\n    \n        \n\n        \n*label step_back_4\nYou step away from Silver Rocket and speak into your mouthpiece to $!{ro_name}. \"Look, it's been a long day, and I've got to get on the Sloth's trail first thing in the morning.\"\n*return\n        \n        \n*label reject_ro_4\n\"Oh, I see.\" $!{ro_name}'s voice goes flat. \"I guess I'll see if Peyton wants to go.\"\n\nBefore you can reply, $!{ro_name} severs the connection.\n*return\n    \n    \n", "5-tracksloth": "*page_break\n*text_image chap_5.png center Chapter Five Sloth Hunt\n\nYou ease out of bed at the crack of dawn, careful not to disturb the still-snoring $!{ro_name}. Trudging to the bathroom, you stretch out your arms and yawn. In your early morning fog, it's hard to prioritize everything you could do today.\n\nVisit Futuro Electronics to determine what the Sloth stole from them?\n\nContinue Whippet's training? She'll be rusty after vacationing with her family for the past ten days.\n\nFind a way to strengthen your tenuous relationship with the Valiant City Police Department?\n\nFigure out a way to solve your money problems?\n\nBut most importantly, you need to track down the Sloth and put an end to whatever plan he's hatched!\n\nDeep in thought, you bang your toe on the corner of the bathroom door and let out a yelp.\n\n*fake_choice\n    #\"Ouch!\" \n    #\"Dammit!\"\n    #\"Shoot!\"\n    #\"Shit!\"\n      \nCringing, you glance over to $!{ro_name}.\n\n[i]Still sleeping. Whew![/i]\n\nYou spit foamy toothpaste in the sink and examine yourself in the bathroom mirror. \n\n*if (ego > 50)\n    And you like what you see!\n    \n    You're the fastest person in the world, the guardian of Valiant City, and frankly you're in spectacular shape for someone your age.\n    \n    Admiring yourself in the mirror, without $!{ro_name}'s patented eye roll to bring you down, you aim double finger guns at the mirror.\n    \n    \"You've got this!\" you whisper before hopping into the shower\n    *goto quick_shower\n*else\n    And reality smacks you in the face.\n    \n    Sometimes you feel like you're twenty-years-old, dashing through the city with a sense of youthful invincibility.\n    \n    But that's all a lie.\n    \n    In reality, you're almost forty with nagging relationship issues and no money. Studying yourself in the mirror, you're forced to admit that no one will ever again mistake you for a twenty-year-old. \n    \n    \"Another day living the dream,\" you grumble before hopping into the shower.\n    *goto quick_shower\n\n*label quick_shower\n\nTwenty minutes later you're dressed and ready to pay a visit to Futuro. Snagging breakfast from the pantry, you zip out the door!\n\nTapping your communications device on your ear, you stop to run a self-diagnostic on your Juice levels. It's not quite as accurate as when ${ro_name} does it, but there's no point waking ${ro_him} up just for this.\n\n[i]Juice level at ${juice} percent.[/i]\n\n*if (juice > 80)\n    You bounce around and do a little shadow boxing, brimming with Juice! You're ready to face the day at full speed!\n    *goto whooshing_5\n*if (juice > 40)\n    You inhale and stretch your arms over your head. You should have enough Juice for the day, so long as you're prudent.\n    *goto whooshing_5\n*else\n    You rub your jaw and double-check the number. Only ${juice} percent? That's dangerously low, especially considering that the Sloth is still out there!\n    *goto whooshing_5\n    \n*label whooshing_5 \n\nWhooshing through the central business district, you zip past Zenith Tower, Valiant City's tallest skyscraper, and corporate headquarters for Steps Ahead, Inc., the second-largest shoe company in America.\n\nThe repeating message from the Steps Ahead CEO, projected as a hologram in the building's front plaza, causes you to stop in your tracks!\n\n\"$!{heroname}! Come inside for an exciting business opportunity! At Steps Ahead, our doors are always open to you!\"\n\n[i]Exciting business opportunity, huh?[/i] Well, you still have a few minutes before Futuro opens. You zip inside, check the directory, and race up the steps to the top floor.\n*page_break\n\nIf you catch the CEO by surprise, @{ro_he2 he doesn't | she doesn't | they don't } show it. \n\n\"$!{heroname}! You must have seen our message! Come on in,\" @{ro_he2 he says | she says | they say } with an outstretched hand. \"I'm Echo Rylan, and you're just the person I've been wanting to see.\"   \n\nYou shake Rylan's hand, studying the CEO in person for the first time. Tall and lithe? Check. Charismatic as hell? Check. Perfectly tousled blond hair and impeccable fashion sense? Yep, this is the Steps Ahead CEO you've seen on the commercials. Wait…have you seen ${ro_him} somewhere else? There's something about ${ro_his} jaw, ${ro_his} hair, that seems oddly familiar.\n\n\"We have a groundbreaking new shoe coming out,\" Rylan says, flashing ${ro_his} fingers wide for emphasis, \"called the Hypersonic 3000. That's where you [i]might[/i] come in.\"    \n\n\"Might?\" you ask, cocking your head. \"You sought me out, not the other way around.\"\n\n\"True,\" Rylan concedes. \"But, the Board isn't convinced we need a spokesperson at all. They think the shoes speak for themselves. Now me, I want this to be the most thrilling launch in history! So, wow me.\"\n\n\"Wow you?\" you ask, stalling for time. [i]How much could a contract like this be worth?[/i]\n\n\"Wow me,\" Rylan repeats.  \n\n*choice\n    #Schmooze Rylan!\n        Put on the spot, you summon on all the charm you can muster, edging closer to Rylan as you start to talk. \n        \n        But how do you impress someone like Rylan who has it all? \n        \n        *if magnet > 50 \n            *set commercial +1     \n            Well, you start with the things only you can say.\n            \n            \"You know, when the wind whips over my face, and the world is a blur, and everyone else is standing still, like Roman statues in a gallery, there's only one thing I can think about.\"\n            \n            Rylan leans forward, ${ro_his} lips pursed. \"What's that?\" The curiosity in ${ro_his} voice is undeniable. \"What do you think about?\"\n            \n            \"I think about getting my hands on a pair of those Hypersonic 3000s,\" you reply with a wink before zipping out of the building.\n            *goto backofmind_5\n        *else            \n            Unfortunately, the answer doesn't come to you. Crap, where did all of your pizzazz go?\n            \n            You hold up your index finger. \"I'm still interested, but there's a Sloth on the loose, and, well, those things can be dangerous. It's common knowledge.\"\n            \n            You zip out of the building before Rylan can respond.\n            *goto backofmind_5\n    #Insist I'm the best person for the job!\n        People like Rylan aren't impressed easily. They're use to saying \"No\" ten times for every \"Yes\"!\n        \n        This is going to require every ounce of your tenacity to make your case!     \n        *if tenacity > 50 \n            *set commercial +1        \n            \"Look, it's a natural fit, that's why you thought about it in the first place,\" you say, edging closer to Rylan as you talk.\n            \n            \"I'm the fastest. Person. In. The. World. No one else can say that.\" You pause and add, \"Well, they could say it, but they'd be lying.\"\n            \n            Rylan opens ${ro_his} mouth to say something, but you keep pressing your case.\n            \n            \"So you tell the Board, if they want to sell millions of these shoes, they offer me a pile of money. Using anyone else, well, it's settling for second place.\"\n            \n            You wink before zipping out of the building.\n            *goto backofmind_5\n        *else            \n            But inspiration eludes you.\n            \n            You stumble for a few moments, mentioning your speed and your fame, but you don't manage to craft an airtight case for yourself.\n            \n            You hold up your index finger. \"I'm still interested, but there's a Sloth on the loose, and, well, thos
