 the war.\n\t\t*if alliance_out > 50\n\t\t\tCouncilor Tayu looks shocked.  He seems nervous about where these questions are going.\n\t\t\t\n\t\t\"At present we are occupied building our Alliance,\" the Ambassador replies, visibly frustrated by your inquiry.  \"We must wait until after the war to resolve the disputes that concerned us before it began.\"\n\t\t*choice\n\t\t\t*if alliance_out \u003c=50\n\t\t\t\t#Ask whether you can have any guarantee that ${plan_name} will not become the future site of such a dispute.\n\t\t\t\t\tThe Ambassador is obviously insulted by this question, and she takes her time responding.  \"You have my word,\" she finally replies.  \"That is all I can offer.  \n\t\t\t\t\t*set mil_trust %+10\n\t\t\t\t\t*set political_mana %-10\n\t\t\t\t\t*goto now_if\n\t\t\t*if alliance_out >=50\n\t\t\t\t#On behalf of ${plan_name}, ask that the Alliance members learn from the plight of your people, and consider their treaties permanent.\n\t\t\t\t\t*set political_mana %+15\n\t\t\t\t\t*if (demian_out \u003c=25) and (mil_trust >=41)\n\t\t\t\t\t\t*if goodguy = true\n\t\t\t\t\t\t\t*goto safesay8\n\t\t\t\t\t*set mil_trust %-10\n\t\t\t\t\t*label safesay8\n\t\t\t\t\tYou make an urgent plea to the consciences of all Alliance members.  You ask them to remember the suffering that your people are enduring under the ${enemy_name}.  You say that you hope they will consider extending indefinitely the treaties they have signed in wartime.\n\t\t\t\t\t\n\t\t\t\t\t\"We have heard these words spoken many times,\" the Ambassador says, \"but they mean a great deal more coming from you.  Thank you for your candor, Captain.  It is my hope that we will all learn a lesson from it.  \n\t\t\t\t\t*goto now_if\n\t\t\t#Agree with her, and say that you understand her position.\n\t\t\t\t*if (demian_out \u003c=25) and (mil_trust >=41)\n\t\t\t\t\t*if goodguy = true\n\t\t\t\t\t\t*goto safesay10\n\t\t\t\t*set mil_trust %-5\n\t\t\t\t*label safesay10\n\t\t\t\t*if alliance_out \u003c 50\n\t\t\t\t\tYou are uncertain she is convinced of your sincerity.  \n\t\t\t\t\t*set political_mana %-7\n\t\t\t\t*if alliance_out >=50\n\t\t\t\t\tThe Ambassador seems grateful that you are no longer pursuing this line of inquiry.  \n\t\t\t\t*if questions_asked >=3\n\t\t\t\t\t\"Let us move on to another matter entirely,\" she says.  \"We have heard much about your people, and we are sure they have heard much about us.  Today, it appears that we will have the rare opportunity to meet each other...\"\n\t\t\t\t\t*goto grand_tour\n\t\t\t\t*else\n\t\t\t\t\t\"Now, have you any further questions for us?\"\n\t\t\t\t\t*if political_mana \u003c 40\n\t\t\t\t\t\t*goto end_of_that\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto questions\n\t\t\t#Drop the subject.\n\t\t\t\t*set mil_trust %+7\n\t\t\t\t*set political_mana %-7\n\t\t\t\t*goto drop_it\n\n\t#Drop the subject.\n\t\t*goto drop_it\n\n\n\n\n\n\n*label disrespectful\n*set first_offense true\nCouncilor Tayu begins to speak before the Ambassador can answer you, no doubt finding this line of questioning worrying, but she quiets him with a gesture.  \n*return\n\n*label now_if\n*if questions_asked >=3\n\tNow, if you don't mind, let us move on to another matter.  We have heard much about your people, and we are sure they have heard much about us.  Today, it appears that we will have the rare opportunity to meet each other...\"\n\t*goto grand_tour\n*if questions_asked \u003c 3\n\tNow, have you any further questions for us?\"\n\t*if political_mana \u003c 40\n\t\t*goto end_of_that\n\t*if political_mana >=40\n\t\t*goto questions\n\n*label drop_it\nYou nod noncommittally.  The Ambassador senses that the subject has passed.  \n\n*if questions_asked >=3\n\t\"Now, if you don't mind, let us move on to another matter.  We have heard much about your people, and we are sure they have heard much about us.  Today, it appears that we will have the rare opportunity to meet each other...\"\n\t*goto grand_tour\n*if questions_asked \u003c 3\n\t\"Now, have you any further questions for us?\"\n\t*if political_mana \u003c 40\n\t\t*goto end_of_that\n\t*if political_mana >=40\n\t\t*goto questions\n\n*label end_of_that\n\n\"The Captain has no more questions,\" Councilor Tayu interrupts.  \"Thank you, Ambassador.\"\n\nThe meeting begins to disband, and the Councilor makes his way toward you, through the confusion.  \n*if alliance_out > 50\n\t\"I thought once that you supported our cause, but today you have shown your true colors.\"\n*if alliance_out = 50\n\t\"Today have shown your true feelings toward our cause.  Do not think for a moment that this will be forgotten.\"\n*if alliance_out \u003c 50\n\t\"Your very existence brings shame upon our people.\"\n*if alliance_out \u003c=25\n\tAs you leave, you can see him conferring with Ambassador Bashena, mad with fury.  You are, it would seem, a particular challenge for this Alliance.\n*if alliance_out > 25\n\tAs you leave, you can see him conferring with Ambassador Bashena, his hands moving quickly as he attempts to do some damage control.  You seem to have become a particular challenge for the Councilor.\n\t\n*gosub as_for_demian\n*if alliance_out > 15\n\t*set alliance_out 15\n*label grand_tour\n*if (political_mana >=40) and (alliance_out >=25)\n\t*if (political_mana >=40) and (political_mana \u003c=55)\n\t\t\n\t\tThe meeting disbands, and you receive a polite nod from Councilor Tayu.  You do not sense you have sufficiently impressed him, but he remains cordial.\n\t\t\n\t*if political_mana > 55\n\t\t\n\t\tThe meeting disbands, and Councilor Tayu is moved to embrace you.\n\t\t\n\t*gosub as_for_demian\n*if (political_mana >=40) and (alliance_out \u003c 25)\n\t\n\tThe meeting disbands, but as it does, you can see Councilor Tayu and Ambassador Bashena conferring at the far end of the chamber.  As he talks to her, the Ambassador stares back toward you, her expression stern.  \n\t*if political_mana \u003c 60\n\t\tIt seems that the Councilor is telling her about his own experiences with your brand of diplomacy.\n\t*if political_mana >=60\n\t\tHowever well you may have impressed the other diplomats here today, Councilor Tayu seems determined that at least one of them will know you for what you really are.\n\t\n\t*gosub as_for_demian\n*page_break\n*if political_mana \u003c 40\n\t*if alliance_true \u003c 50\n\t\t*set integrity %+20\n*if political_mana > 60\n\t*if alliance_true \u003c 50\n\t\t*set integrity %-20\n\t*if alliance_true = 50\n\t\t*set integrity %-10\nA short tour of one of the civilian passenger liners is arranged, giving Ambassador Bashena and the other Alliance representatives a chance to meet the people of ${plan_name} in the flesh.  \n*if standard_deduction \u003c 20\n\tYou are a little surprised to note how lean your people look aboard the ship.  The air on the vessel, too, seems thin for a civilian craft.  But then you remember the energy limits.\n\t\n\tThe delegates of the Alliance don't seem to mind.  \nTheirs is a cause that has always had strong popularity among civilians, and yours prove more than happy to meet their intergalactic delegates.  \n*if civ_trust \u003c 42\n\tBut as you are introduced to the citizenry, you notice that they are far less warm to you.  In fact, they are almost adversarial, glaring at you balefully and whispering to each other.  To what do you attribute this?\n\t*choice\n\t\t*if (standard_deduction \u003c 20) and (alliance_true \u003c=50)\n\t\t\t#Their lack of discipline.\n\t\t\t\tTypical civilian behavior.\n\t\t\t\t*goto nullzone_talk\n\t\t*if (standard_deduction \u003c 20) and (alliance_true >=50)\n\t\t\t#The squalor of their conditions.\n\t\t\t\tYou will remember what you have seen today.\n\t\t\t\t*goto nullzone_talk\n\t\t#The fear that assails them on a daily basis.\n\t\t\tTheirs has not been an easy voyage.\n\t\t\t*goto nullzone_talk\n\t\t#Their lack of faith in my ability.\n\t\t\tThe truth is the bitterest pill.\n\t\t\t*goto nullzone_talk\n\t\t*if alliance_true >=50\n\t\t\t#Their feelings of powerlessness, which have made them untrusting of authority.\n\t\t\t\tLeadership is a convenient focal point for anger, particularly in trying times.\n\t\t\t\t*goto nullzone_talk\n\t\t*if alliance_true \u003c 50\n\t\t\t#Their general lack of respect for authority figures.\n\t\t\t\tLeadership is a convenient focal point for anger, particularly among the common civilians.\n\t\t\t\t*goto nullzone_talk\n\n*if (civ_trust >=42) and (civ_trust \u003c 60)\n\tThe people respond to you less warmly, almost the same way you might respond to a superior officer.  Still, it is comforting to note that you have their respect. How do you think you have earned it?\n\t*goto pal_choice \n*if civ_trust >=60\n\tThe people respond no less warmly to you, coming forward to embrace their beloved Captain, offering you good-luck trinkets, and expressing their gratitude.  How do you think you have earned it?\n\t*goto pal_choice\n*label pal_choice\n*fake_choice\n\t#By keeping them alive.\n\t\tIn these trying times, even survival is an achievement.\t\n\t#By projecting power.\n\t\tYou wonder if they would agree with that assessment.\n\t#By respecting them as equals.\n\t\tNot all your comrades would do the same.\n\t#I have earned nothing.  I am merely a symbol.\n\t\tCynicism is one way to unburden yourself of power's weight.\n*label nullzone_talk\n*page_break\nLater, you are brought alone to your ship's diplomatic chamber for a private meeting with Ambassador Bashena, where she reveals the Alliance's plans for your fleet.  \"We cannot yet bring the civilians under our protection,\" she explains.  \"${enemy_name} tracers continue patrolling our systems for refugees.  To leave your people in our system would only further endanger them.  Instead, we have made arrangements for your fleet to conceal itself in a place where the ${enemy_name} will never think to look: the Null Zone.\"\n\nThis will be a risky endeavor indeed.  The Null Zone is a desolate expanse where the rules of astrogational physics do not always apply, with few if any resources in evidence.  It is also the rumored home of the Grix, a mysterious race of pirates whose existence has never been positively confirmed.  \n*if alliance_out \u003c 25\n\t*set coercion true\n\t\n\t\"We understand that your people may object to this decision,\" the Ambassador admits, \"but it is one that is made in your best interests.  And lest the good Captain should be tempted to disobey us, we have taken the liberty of altering your astrogational systems.  Once you depart from this rendezvous, your ships will respond only to input that will bring them into the Null Zone.\"\n\t\n\n*if alliance_out >=25\n\t*if alliance_true > 50\n\t\tYour people may object to this decision, but you know the Alliance would not suggest it unless they had considered every available option.\n\t*if alliance_true = 50\n\t\tYour people will take issue with this decision, but you know the Alliance must feel it is their only option.\n\t*if alliance_true \u003c 50\n\t\tYou sense that your people will not take kindly to this decision, but it would appear that your compliance is expected.\n*page_break\n*if rep >=65\n\t*goto big_support\n*if alliance_out \u003c 25\n\tThankfully, the Alliance's alterations to your astrogational system were not their only gift.  They have also \n*if alliance_out >=25\n\tThankfully, the Alliance supporters have \n*if rep \u003c 50\n\tmanaged to supply your fleet with an enhanced arsenal.\n\t\n\tFirst, your ion cannons are given the ability to fire projectiles, along with two new forms of ammunition:  gravity mines, which exert a powerful attractive force on any vessels around them, and scrambler torpedoes, which emit a powerful EMP blast that can disrupt electronic systems.\n\t\n\tThen, your strikers are given blast mines, which can be jettisoned at targets or planted on them, and tow beam emitters, which can be used to pull objects through space.\n\t*goto expos\n*if (rep >=50) and (rep \u003c 65)\n\tcobbled together some enhancements for your fleet.\n\t\n\tFirst, your ion cannons are given the ability to fire projectiles, along with two new forms of ammunition:  gravity mines, which exert a powerful attractive force on any vessels around them, and scrambler torpedoes, which emit a powerful EMP blast that can disrupt electronic systems.\n\t\n\tYour strikers are given blast mines, which can be jettisoned at targets or planted on them, and tow beam emitters, which can be used to pull objects through space.\n\t\n\tFinally, the Alliance forces...\n\t*choice\n\t\t*hide_reuse #...have their utility craft install additional cannons on your capital ships.\n\t\t\tYour cannon coverage increases.  \n\t\t\t*set can_cov_up true\n\t\t\t*if can_coverage \u003c=30\n\t\t\t\t*set can_coverage +35\n\t\t\t\t*goto expos\n\t\t\t*elseif can_coverage \u003c=65\n\t\t\t\t*set can_coverage +25\n\t\t\t\t*goto expos\n\t\t\t*else\n\t\t\t\t*set can_coverage +10\n\t\t\t\t*goto expos\n\n\t\t*hide_reuse #...land additional fighters in the launching bays.\n\t\t\tThe fighters from Tzir are a near-match for your strikers, and handle much the same way. \n\t\t\t*set str_cov_up true \n\t\t\t*if striker_coverage \u003c=30\n\t\t\t\t*set striker_coverage +35\n\t\t\t\t*goto expos\n\t\t\t*elseif striker_coverage \u003c=65\n\t\t\t\t*set striker_coverage +25\n\t\t\t\t*goto expos\n\t\t\t*else\n\t\t\t\t*set striker_coverage +10\n\t\t\t\t*goto expos\n\t\t\t\n\t\t*hide_reuse #...offer modification implants to enhance your pilots' skills.\n\t\t\tYou are sure this will make a difference.  \n\t\t\t*set str_skill_up true\n\t\t\t*if striker_skill \u003c=30\n\t\t\t\t*set striker_skill +35\n\t\t\t\t*goto expos\n\t\t\t*elseif striker_skill \u003c=65\n\t\t\t\t*set striker_skill +25\n\t\t\t\t*goto expos\n\t\t\t*else\n\t\t\t\t*set striker_skill +10\n\t\t\t\t*goto expos\n\n\t\t*hide_reuse #...offer modification implants to enhance your gunners' skills.\n\t\t\tYou are sure this will improve your chances against the ${enemy_name}.  \n\t\t\t*set can_skill_up true\n\t\t\t*if can_skill \u003c=30\n\t\t\t\t*set can_skill +35\n\t\t\t\t*goto expos\n\t\t\t*elseif can_skill \u003c=65\n\t\t\t\t*set can_skill +25\n\t\t\t\t*goto expos\n\t\t\t*else\n\t\t\t\t*set can_skill +10\n\t\t\t\t*goto expos\n\n\t\t*hide_reuse #...share some of their fuel reserves with you.\n\t\t\tThis should help replenish some of your supply.  \n\t\t\t*set fuel_from_alliance true\n\t\t\t*set energy %+15\n\t\t\t*goto expos\n\n*label big_support\n*set second_round false\n*if alliance_out \u003c 25\n\tThankfully, the alterations to your astrogational systems were not the Alliance's only \"gift.\"  They have also \n*if alliance_out >= 25\n\tThankfully, the Alliance forces have \nleveraged their remarkable support to provide further assistance for your fleet.\n\nThey begin by enhancing your arsenal.\n\nYour ion cannons are given the ability to fire projectiles, along with two new forms of ammunition:  gravity mines, which exert a powerful attractive force on any vessels around them, and scrambler torpedoes, which emit a powerful EMP blast that can disrupt electronic systems.\n \nYour strikers are given blast mines, which can be jettisoned at targets or planted on them, and tow beam emitters, which can be used to pull objects through space.\n\nFinally, the Alliance...\n*label supplemental\n*choice\n\t*hide_reuse #...has their utility craft install additional cannons on your capital ships.\n\t\tThe new cannons increase your coverage.  \n\t\t*set can_cov_up true\n\t\t*if can_coverage \u003c=30\n\t\t\t*set can_coverage +35\n\t\t\t*goto luxury_choice\n\t\t*elseif can_coverage \u003c=65\n\t\t\t*set can_coverage +25\n\t\t\t*goto luxury_choice\n\t\t*else\n\t\t\t*set can_coverage +10\n\t\t\t*goto luxury_choice\n\n\t*hide_reuse #...lands additional fighters in the launching bays.\n\t\tThe fighters from Tzir are a near-match for your strikers, and handle much the same way.  \n\t\t*set str_cov_up true \n\t\t*if striker_coverage \u003c=30\n\t\t\t*set striker_coverage +35\n\t\t\t*goto luxury_choice\n\t\t*elseif striker_coverage \u003c=65\n\t\t\t*set striker_coverage +25\n\t\t\t*goto luxury_choice\n\t\t*else\n\t\t\t*set striker_coverage +10\n\t\t\t*goto luxury_choice\n\n\t*hide_reuse #...offers modification implants to enhance your pilots' skills.\n\t\tYou are sure this will make a difference.  \n\t\t*set str_skill_up true\n\t\t*if striker_skill \u003c=30\n\t\t\t*set striker_skill +35\n\t\t\t*goto luxury_choice\n\t\t*elseif striker_skill \u003c=65\n\t\t\t*set striker_skill +25\n\t\t\t*goto luxury_choice\n\t\t*else\n\t\t\t*set striker_skill +10\n\t\t\t*goto luxury_choice\n\n\t*hide_reuse #...offers modification implants to enhance your gunners' skills.\n\t\tYou are sure this will improve your chances against the ${enemy_name}.  \n\t\t*set can_skill_up true\n\t\t*if can_skill \u003c=30\n\t\t\t*set can_skill +35\n\t\t\t*goto luxury_choice\n\t\t*elseif can_skill \u003c=65\n\t\t\t*set can_skill +25\n\t\t\t*goto luxury_choice\n\t\t*else\n\t\t\t*set can_skill +10\n\t\t\t*goto luxury_choice\n\n\t*hide_reuse #...shares some of their fuel reserves with you.\n\t\tThis should help replenish some of your supply.  \n\t\t*set fuel_from_alliance true\n\t\t*set energy %+15\n\t\t*goto luxury_choice\n\n*label luxury_choice\n*if second_round = true\n\t*goto expos\n*if second_round = false\n\t*set second_round true\n\tBut that's not all the Alliance has in store.  The Alliance also...\n\t*goto supplemental\n\n*label as_for_demian\nAt the chamber door, you pass Lieutenant Demian.  \n*if (political_mana >=45) and (political_mana \u003c=55)\n\tShe seems perplexed by your showing at the table, and politely avoids looking your way.  \n\t*if mil_trust >=41\n\t\tPerhaps she feels she has not seen you at your best today.\n*if political_mana \u003c 45\n\t*if mil_trust \u003c 41\n\t\tShe seems quite satisfied with your showing at the table today, but she avoids looking your way nonetheless.\n\t*if (mil_trust >=41) and (demian_out >=50)\n\t\tShe seems perplexed by your showing at the table, and politely avoids your eyes.  Perhaps she feels she has not seen you at your best today.\n\t*if (mil_trust >=41) and (demian_out \u003c 50)\n\t\t*if goodguy = true\n\t\t\tShe seems perplexed by your showing at the table.  \"I do not think you have convinced them you are on their side,\" she whispers to you, suppressing a smile.\n\t\t*if goodguy = false\n\t\t\tShe seems quite satisfied by your showing at the table today, but she is too polite to mention this in mixed company.\n*if political_mana > 55\n\t*if mil_trust \u003c 41\n\t\tShe seems quite unnerved by what she has seen from you today, but she remains silent on the subject, and avoids looking your way.\n\t*if (mil_trust >=41) and (demian_out >=50)\n\t\tShe seems quite unnerved by what she has seen from you today, but she remains cordial to you, and nods as you pass.\n\t*if (mil_trust >=41) and (demian_out \u003c 50)\n\t\t*if goodguy = true\n\t\t\tShe seems unfazed by your show of support for the Alliance here today, and nods politely as you pass.  \n\t\t\t*if alliance_true \u003c 50\n\t\t\t\tAfter all, she knows your true feelings.  \n\t\t\t*if alliance_true >=50\n\t\t\t\tAfter all, she thinks it a ruse.\n\t\t*if goodguy = false\n\t\t\tShe seems alarmed by your show of support for the Alliance here today.  She cannot bear to look at you.\n*return\n\n*label expos\n*if rep > 50\n\t*if (rep >=50) and (rep \u003c 65)\n\t\tOnce this process is complete, \n\t*if rep >=65\n\t\tOnce these processes are complete, \nAmbassador Bashena sends you a farewell transmission from her ship.  You receive it on the bridge.  \n*if alliance_out \u003c 25\n\t\"Captain, we have placed our faith in you.  We know that you will do everything you can to help us protect your people, and return them to their home, in the name of our great cause.\"  You feel certain that no one but yourself recognizes this as a threat.\n\t*finish\n*if political_mana > 60\n\t*if (alliance_out >=25) and (alliance_out \u003c=50)\n\t\t\"Captain, it has been an unexpected pleasure to meet you.  Our prayers for strength are with your people, in the hope that we will meet again soon, face to face.\"\n\t*if alliance_out > 50\n\t\t\"Captain, our prayers for strength are with your people.  May your honor and leadership inspire them as they have inspired us.\"\n*if (political_mana \u003c=60) and (political_mana >=40)\n\t\t\"Captain, our prayers for strength are with your people.  The road will be difficult for us all, but we have no doubt we will meet again.\"\n*if political_mana \u003c 40\n\t\t\"Captain, I wish your fleet a safe journey into the Null Zone.  Your courageous people inspire us.\"  Whether or not she feels they are safe in your hands remains unspoken.\n*if political_mana \u003c 40\n\t*set rep %-10\n*finish", "new_dawn": "*temp pos_to_pos\n*temp opinion_shift\n*temp damage\n*temp cannon_damage\n*temp striker_damage\n*temp away_from_fleet\n*temp can_choice\n*temp exposition_conquest\n\n*set pos_to_pos false\n*set opinion_shift false\n*set damage 0\n*set cannon_damage 0\n*set striker_damage 0\n*set away_from_fleet 0\n*set can_choice 0\n*set exposition_conquest false\n\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]The Fleet[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\nYour fleet regroups in a fallow quadrant of the Makkeris system.  It should afford a few hours' safety.\n\nThe Communication Room reports over the bridge speakers.  \"We're receiving a transmission from the merchant ship Draco.  But Captain, they are transmitting on the frequency reserved for the High Council...\"\n\nYou exchange a bewildered look with Lieutenant Demian, and open a communications channel with the trade ship.  A man with short white hair appears on the main viewscreen, clad in the workmanlike attire of a deep space merchant.\n\nYou recognize him, although the last time you saw this man, he was in ceremonial garb.\n\n\"High Councilor Tayu?\"\n*page_break\nTwenty minutes later you are in your cruiser's diplomatic chamber, alone with the High Councilor.  \"My ship is a trawler,\" he explains.  \"Half of its crew are genuine merchants.  The rest are members of my retinue, in disguise.\"\n\nYou ask what mission the Councilor is on that requires such secrecy.\n\n\"We are traveling to the first meeting of the Intergalactic Alliance,\" he replies.  You are taken aback, and the Councilor notices your surprise.  \"Yes, Captain, the Alliance is a reality.  When the ${enemy_name} began their attacks, three of our sister systems—Rakashi, Calpurnia, and Tzir—began working with us to make it so.  And now that process must quicken.  Every hour the ${enemy_name} keep hold of our planet will be disastrous for our people, indeed for the universe.\"\n\nCouncilor Tayu looks at you meaningfully.  You sense that he wants to know where you stand on the matter of the Alliance.  \n*if alliance_true = 50\n\tIn reality, you are quite neutral on the matter, \n*if alliance_true \u003c 50\n\tIn truth, you find the whole concept absurd, \n*if alliance_true > 50\n\tYou support them in reality, \nbut what do you tell him?\n*choice\n\t*if alliance_true > 50\n\t\t#Admit to my overwhelming support for the Alliance.\n\t\t\tThere is no use in concealing your true feelings in a time of such hardship and difficulty.  You tell the Councilor, in no uncertain terms, that you stand with him in his cause.\n\t\t\t*set alliance_out 75\n\t\t\t*set integrity %+15\n\t\t\t*goto agreement\n\t*if alliance_true > 50\n\t\t#Feign neutrality on the matter.\n\t\t\tBetter to keep your mouth shut about your true feelings for now.  You tell Councilor Tayu that you would need to see the Alliance in action before you made any decisions about your support.  \n\t\t\t*goto convincer\n\t*if alliance_true = 50\n\t\t#Admit to your essential neutrality on the matter.\n\t\t\tThere is no use in concealing your true feelings in a time of such hardship and difficulty.  You tell the Councilor, in no uncertain terms, that you remain unconvinced.  \n\t\t\t*goto convincer\n\t*if alliance_true = 50\n\t\t#Feign overwhelming support for the Alliance.\n\t\t\tThere is no need to sow tension with the Councilor.  Better to keep your mouth shut about your true feelings, and see how things work out. You pretend to be a proud supporter of the Councilor's cause.\n\n\t\t\t*set alliance_out 75\n\t\t\t*set integrity %-15\n\t\t\t*goto agreement\n\t*if alliance_true \u003c 50\n\t\t#Admit to your overwhelmingly negative feelings toward the Alliance.\n\t\t\t*set alliance_out 25\n\t\t\tThere is no use in concealing your true feelings in a time of such hardship and difficulty.  You tell Councilor Tayu, in no uncertain terms, that you stand opposed to the very notion of the Alliance.  \n\t\t\t*goto convincer\n\t*if alliance_true \u003c 50\n\t\t#Feign neutrality on the matter.\n\t\t\tBetter to keep your mouth shut about your distaste for the Alliance, and see how things work out.  You tell the Councilor that you are only lukewarm on the matter of the Alliance, and explain that it is something you would need to see in action to support fully.\n\t\t\t*goto convincer\n\t*if alliance_true \u003c 50\n\t\t#Feign overwhelming support for the Alliance.\n\t\t\tThere is no need to make waves with the Councilor.  Better to keep your mouth shut about your true feelings, and see how things work out. You pretend to be a proud supporter of the Councilor's cause.\n\n\t\t\t*set alliance_out 75\n\t\t\t*set integrity %-15\n\t\t\t*goto agreement\n\n*label agreement\n*if opinion_shift = true\n\tCouncilor Tayu seems thrilled to see that you have come around to his way of thinking.  \n\t*if pos_to_pos = true\n\t\tLittle does he know, you were already there.  You feel a tinge of guilt for having concealed your feelings before, but the truth is out now.\n\t*if alliance_true \u003c 75\n\t\tIndeed, he does not seem to doubt for a moment that your transition was a genuine one.  \n\t*if alliance_true \u003c 50\n\t\tPerhaps he has too much faith in the power of his own charm.  \n\n*if opinion_shift = false\n\t\"Admiral Kalla would be proud,\" he tells you.  \"When the ${enemy_name} attacks began, the Admiral was the first to understand that we would need outside help.  Indeed, he arranged this mission to the Alliance for me.  Now it is our only hope.\"\n\t\n\t*if wash = true\n\t\tSuddenly the cryptic words of the Admiral make sense to you.  The shape of the universe is indeed changing.  \n\t\t*if alliance_true \u003c 50\n\t\t\tHow, you wonder, could a leader as intelligent as Admiral Kalla be led astray by an idea so facile?\n\t*if patt = true\n\t\tSuddenly, the Admiral's cryptic words make sense.  \"Time to change,\" indeed.  \n\t\t*if alliance_true \u003c 50\n\t\t\tHow, you wonder, could a leader as formidable as Admiral Kalla be led astray by an idea so facile?\n\t*if sun = true\n\t\tSo this is the mysterious \"strategy\" to which the Admiral referred.  \n\t\t*if alliance_true \u003c 50\n\t\t\tYou are disturbed indeed to think that your old teacher could be hoodwinked into supporting an idea so facile.\n*goto coordinates\n\n\n*label convincer\n*set integrity %-15\n\nHe seems nonplussed by your \n*if alliance_out = 50\n\ttepid response.  \n*if alliance_out \u003c 50\n\tresponse.\n*comment endif\n\n\"We cannot afford \n*if alliance_out = 50\n\tto be neutral on a matter of such importance,\" he says, his tone pleading.  \n*if alliance_out \u003c 50\n\tto bicker about matters of such importance,\" he says, his tone firm.  \n\"Admiral Kalla knew that.  When the ${enemy_name} attacks began, the Admiral was the first to understand that we would need outside help.  Indeed, it was the Admiral who arranged this mission to the Alliance for me.  Now it is our only hope.\"\n\n*if wash = true\n\tSuddenly the cryptic words of the Admiral make sense to you.  The shape of the universe is indeed changing.  \n\t*if alliance_true \u003c 50\n\t\tAnd Admiral Kalla must have changed, too, if he truly came to support the Alliance.\n*if patt = true\n\tSuddenly, the Admiral's words make sense.  \"Time to change,\" indeed.  \n\t*if alliance_true \u003c 50\n\t\tAnd Admiral Kalla must have changed too, if he truly came to support the Alliance.\n*if sun = true\n\tSo this is the strategy to which the Admiral referred.  \n\t*if alliance_true \u003c 50\n\t\tSomething must have changed in him, if he truly came to support the Alliance.\n*choice\n\t#Tell the Councilor that he has raised an important point, and effectively changed your mind on the matter of the Alliance.\n\t\t*set alliance_out 75\n\t\t*if alliance_true = 75\n\t\t\t*set opinion_shift true\n\t\t\t*set pos_to_pos true\n\t\t\t*goto agreement\n\t\tAre you being sincere?\n\t\t*choice\n\t\t\t#Indeed I am.  The Councilor has made me re-assess my position.\n\t\t\t\t*set opinion_shift true\n\t\t\t\t*set alliance_true 75\n\t\t\t\t*set position \"Pro-Alliance\"\n\t\t\t\t*set integrity %+15\n\t\t\t\t*goto agreement\n\t\t\t*if alliance_true = 50\n\t\t\t\t#Of course not, I'm merely placating him.  I remain unconvinced.\n\t\t\t\t\t*set opinion_shift true\n\t\t\t\t\t*set integrity %-15\n\t\t\t\t\t*goto agreement\n\t\t\t*if alliance_true \u003c 50\n\t\t\t\t#Of course not, I'm merely placating him.  I remain flatly opposed to the Alliance.\n\t\t\t\t\t*set opinion_shift true\n\t\t\t\t\t*set integrity %-15\n\t\t\t\t\t*goto agreement\n\t#Tell the Councilor that he has raised an important point, but that you can only promise you will keep an open mind, and remain neutral on the matter.\n\t\t*if alliance_true > 50\n\t\t\t*set integrity %-15\n\t\t\t*goto neutral\n\t\t*if alliance_true \u003c 50\n\t\t\tAre you being sincere?\n\t\t\t*choice\n\t\t\t\t#Indeed I am.  The Councilor has made me re-assess my position.\n\t\t\t\t\t*set alliance_true 50\n\t\t\t\t\t*set position \"Neutral\"\n\t\t\t\t\t*set integrity %+15\n\t\t\t\t\t*goto neutral\n\t\t\t\t#Of course not, I'm merely placating him.  I remain flatly opposed.\n\t\t\t\t\t*set integrity %-15\n\t\t\t\t\t*goto neutral\n\t\t*else\n\t\t\t*set integrity %+15\n\t\t\t*goto neutral\n\n\t*if alliance_out \u003c 50\n\t\t#Tell the Councilor that, as certain as he is of your people's need for the Alliance, you are just as certain that these outlanders cannot be trusted.\n\t\t\tTayu's face stiffens somewhat when he hears your response, but he nods.  \"I see that you remain dubious.  Then I must leave it to the Alliance itself to put your fears to rest.\"\n\t\t\t*set integrity %+15\n\t\t\t*goto coordinates\n\t*if alliance_out \u003c 50\n\t\t#Tell the Councilor that you would rather see the entire fleet perish than accept the assistance of the outlanders.\n\t\t\t*set alliance_out 15\n\t\t\t*set integrity %+15\n\t\t\tYour words hit Tayu's face like a backhanded slap.  He appears both shocked and horrified.\n\n\t\t\t\"For you to make such a disgusting statement during this sensitive time tells me much about your character,\" he says.  \"Fortunately for our people, I am not merely suggesting that we seek the support of the Alliance.  It is an order, and it is mine to give.\"\n\n\t\t\t*goto coordinates\n\n*label neutral\nTayu nods.  \"As I have said, I understand your position, Captain.  But you will see that you are wrong, and our new allies will prove it to you.\"\n\nHe seems to be at peace with your neutrality, just as he seems convinced that you will change your mind.\n*if alliance_true = 50\n\t\n\t*goto coordinates\n*if alliance_true > 50\n\tLittle does he know, you are already with him.  You feel a tinge of guilt at lying to the Councilor, but it can't be helped.  You know you must continue to play your part.\n\t\n\t*goto coordinates\n\t\n*if alliance_true \u003c 50\n\tLittle does he know, your mind is made up already, and it is against him.\n\t\n\t*goto coordinates\n\n*label coordinates\n*page_break\nThe communicator box flashes green.  You tap it twice, and the image of Lieutenant Demian appears on the far wall of the diplomatic chamber.\n\n\"We've just completed our assessment of the fleet,\" she reports.  \"We have two other cruisers, two battleships, and one carrier.  The utility ship that houses our Core should be capable of supporting our energy needs for a limited time.\"\n\nYou thank the Lieutenant, but from the look on her face you already know there is something wrong.  You ask her what further news she has to report.\n\n\"Taking into account the defensive capabilities of our military vessels,\" Demian says, \"and the needs of these civilian ships, our assessment of the fleet has revealed a major deficit.  It would appear...\"\n\n*choice\n\n\t#\"...that we have a serious shortage of fighter ships.\"\n\t\t*set striker_coverage -20\n\t\tYou nod.  You will just have to be careful with the fighters you've got, avoiding situations that require optimum coverage.\n\t\t*goto badnews1\n\n\t#\"...that we lost a lot of our most experienced fighter pilots in the battle over ${plan_name}.\"\n\t\t*set striker_skill -20\n\t\tYou nod.  You will just have to avoid strategic choices that call for fighter skills you don't have.\n\t\t*goto badnews1\n\n\t#\"...that the remaining warships have very little cannon coverage.\"\n\t\t*set can_coverage -20\n\t\tYou nod.  You will just have to use the cannons you've got carefully, avoiding situations that require optimum coverage.\n\t\t*goto badnews1\n\n\t#\"...that the cannon operators we have left are inexperienced.\"\n\t\t*set can_skill -20\n\t\tYou nod.  You will just have to avoid strategic choices that call for cannon skills you don't have.\n\t\t*goto badnews1\n\n\t#\"...that there is a general lack of resource-mining vessels.\"\n\t\t*set mine %-40\n\t\tYou nod.  You will just have to be sparing with your energy resources, avoiding prolonged battles, or conserving energy in other ways.\n\t\t*goto badnews1\n\n*label badnews1\nLieutenant Demian nods too, but she remains silent, and the familiar look remains.\n\n\"I'm afraid there is more to tell, Captain.  It also appears...\"\n\n*choice\n\n\t*if striker_coverage = 50\n\t\t#\"...that we have a serious shortage of fighter vessels.\"\n\t\t\t*if striker_skill \u003c 50\n\t\t\t\tYou sigh.  A shortage of fighters, and a bunch of newbies flying the few you have?  It sounds like you will have to go easy on the fighters as a strategic tool, period.\n\t\t\t\t*set striker_coverage -20\n\t\t\t\t*goto badnews2\n\t\t\t*else\n\t\t\t\tYou sigh.  Something else to keep that in mind.  If you don't have fighter coverage to execute a maneuver, you won't even attempt it.\n\t\t\t\t*set striker_coverage -20\n\t\t\t\t*goto badnews2\n\n\t*if striker_skill = 50\n\t\t#\"...that we lost some of our most experienced fighter pilots in the battle over ${plan_name}.\"\n\t\t\t*set striker_skill -20\n\t\t\t*if striker_coverage \u003c 50\n\t\t\t\tYou sigh.  A shortage of fighters, and a bunch of newbies flying the few you have?  It sounds like you'll have to go easy on the fighters as a strategic tool, period.\n\t\t\t\t*goto badnews2\n\t\t\t*else\n\t\t\t\tYou sigh.  Something else to keep in mind.  If you don't have enough skill to execute a maneuver with your fighters, you won't even attempt it.\n\t\t\t\t*goto badnews2\n\t*if can_coverage = 50\n\t\t#\"...that we have a serious shortage of cannon coverage.\"\n\t\t\t*set can_coverage -20\n\t\t\t*if can_skill \u003c 50\n\t\t\t\tYou sigh.  A shortage of cannons, and a bunch of newbies firing the few you have?  It sounds like you'll have to go easy on the cannons as a strategic tool, period.\n\t\t\t\t*goto badnews2\n\t\t\t*else\n\t\t\t\tYou sigh.  Something else to keep in mind: if you don't have cannon coverage to execute an attack, you won't even attempt it.\n\t\t\t\t*goto badnews2\n\t*if can_skill = 50\n\t\t#\"...that the cannon operators we have left are inexperienced.\"\n\t\t\t*set can_skill -20\n\t\t\t*if can_coverage \u003c 50\n\t\t\t\tYou sigh.  A shortage of cannons, and a bunch of newbies firing the few you have?  It sounds like you will have to go easy on the cannons as a strategic tool, period.\n\t\t\t\t*goto badnews2\n\t\t\t*else\n\t\t\t\tYou sigh.  Something else to keep in mind.  If your gunners don't have skill to execute a particular cannon attack, you shouldn't attempt it.\n\t\t\t\t*goto badnews2\n\t*if mine = 50\n\t\t#\"...that there is a general lack of resource-mining vessels in our fleet.\"\n\t\t\t*set mine %-40\n\t\t\tYou sigh.  Something else to keep in mind.  You will need to be sparing with your energy resources, avoiding prolonged battles, or conserving energy in other ways.\n\t\t\t*goto badnews2\n\n*label badnews2\n\"It's not impossible if we remain careful,\" she offers.\n\nWarily, you ask if there is anything else you should know.\n\nHere the Lieutenant's face relaxes somewhat, approaching something like a smile.  \"Yes.  There is also some good news.  Our assessment has revealed an advantage.  It seems that our fleet has...\"\n\n*choice\n\n\t*if striker_coverage = 50\n\t\t#\"...more than adequate fighter coverage.\"\n\t\t\t*set striker_coverage +35\n\t\t\tThis will make it easier to execute fighter maneuvers that require strength in numbers.\n\t\t\t*goto goodnews\n\n\t*if striker_skill = 50\n\t\t#\"...some of the finest striker pilots in the force.\"\n\t\t\t*set striker_skill +35\n\t\t\tThis will make it easier to execute tricky fighter maneuvers.\n\t\t\t*goto goodnews\n        \n\t*if can_coverage = 50\n\t\t#\"...more than adequate cannon coverage.\"\n\t\t\t*set can_coverage +35\n\t\t\tThis will make it easier to execute cannon tactics that require a show of force.\n\t\t\t*goto goodnews\n\n\t*if can_skill = 50\n\t\t#\"...some of the finest cannon operators in the force.\"\n\t\t\t*set can_skill +35\n\t\t\tThis will make it easier to execute cannon tactics that require precision.\n\t\t\t*goto goodnews\n        \n\t*if mine = 50\n\t\t#\"...extra resource-mining vessels.\"\n\t\t\t*set mine %+70\n\t\t\tThis will help you renew some of the resources that are depleted during travel and combat.\n\t\t\t*goto goodnews\n\n*label goodnews\n\n\"I will upload the assessment into the ship's computer for your perusal.  Here it is on-screen...\"\n\n*if striker_coverage = 50\n\t*set striker_coverage +15\n\n*if striker_skill = 50\n\t*set striker_skill +15\n\n*if can_coverage = 50\n\t*set can_coverage +15\n\n*if can_skill = 50\n\t*set can_skill +15\n\n*if mine = 50\n\t*set mine %+30\n\n*stat_chart\n\tpercent striker_coverage Striker Coverage\n\tpercent striker_skill Striker Skill\n\tpercent can_coverage Cannon Coverage\n\tpercent can_skill Cannon Skill\n\tpercent mine Mining Support\n\tpercent energy Energy Reserves\n\nIt is hardly an ideal situation.  If you lose any more of your pilots or gunners in battle, your defensive capabilities will shrink further still.  But it will have to do.\n\nYou thank Lieutenant Demian, and the screen shuts off.\n*page_break\n\"Now I must go to the summit on Calpurnia,\" Councilor Tayu explains.  He produces a translucent data card.  \"This contains the coordinates for the quadrant where your fleet can meet with the Alliance in three weeks' time.  At the rendezvous, the civilians can be left in the Alliance's care.  Until that time, they will be in your fleet's safe keeping.\"\n*choice\n\t#Say that it will be your honor to protect the civilians during the journey to the rendezvous.\n\t\tYou explain that you will proudly fulfill your duty to the people of your planet.\n\t\t\n\t\t*if alliance_out >=25\n\t\t\t\"I would expect nothing less from a protege of Admiral Kalla.  Now, join me in the launching bay.  There is more to discuss.\"\n\t\t\t*goto launching_bay\n\t\t*else\n\t\t\t\"I would hope so,\" the Councilor says somewhat snidely.  \"Now please join me in the launching bay, if you would.  There is more to discuss.\"\n\t\t\t*goto launching_bay\n\n\t#Ask whether the civilians would not be better off traveling apart from the military.\n\t\tYou ask whether it would make more sense for the civilians to travel separately from your squadron.  Surely they will become targets if they remain in your care.\n\t\t*if alliance_out >=25\n\t\t\t\n\t\t\tCouncilor Tayu seems a little confused by your point.  \"And how would the civilians be safer if they were undefended?\" he asks, and then allows the subject to pass.  \"Please follow me to the launching bay.  There is more to discuss.\"\n\t\t\t*goto launching_bay\n\t\t*else\n\t\t\tCouncilor Tayu seems perturbed by your words.  \"Are you suggesting they would be safer if they were undefended?\" he asks snidely.  He allows the subject to drop after an awkward silence.  \"You will come with me to the launching bay now.  There is more yet for you to hear.\"\n\t\t\t*goto launching_bay\n\n\t#Express your outright dismay about the burden these civilians will represent for your fleet.\n\t\tYou explain that the civilians will be difficult to defend, and place your fleet in more peril.  If your mission is to preserve your military for its return to ${plan_name}, they will certainly endanger that mission.\n\t\t\n\t\t*set civ_like false\n\t\t*if alliance_out >=50\n\t\t\tCouncilor Tayu seems perturbed by your words.  \"You will accompany the civilians until they can be left in the safe keeping of the Alliance,\" he stresses.  \"That is an order.  Now come, we must go to the launching bay.  There is more to tell...\" \n\t\t\t*goto launching_bay\n\t\t*else\n\t\t\tCouncilor Tayu is positively scandalized by your words.  \"You will accompany the civilians until they can be left in the safe keeping of the Alliance,\" he stresses.  \"It is my decision, and your command.  Now follow me to the launching bay.  I have more directives for you...\"\n\t\t\t*goto launching_bay\n*label launching_bay\n*page_break\nYou are met by the Councilor's retinue at the launching bay.  \n*if alliance_out \u003c=25\n\t*set envoy_introduced true\n\tThe Councilor gives a wave of his hand, and one of his cronies steps forward.  \"Envoy Eidon will remain with you, should you need any assistance.  The rest of us must leave right away, if our ship is to remain undetected.  You will inform the people of their new destination on my behalf.\"\n*if alliance_out > 25\n\t\"My ship must leave right away if it is to remain undetected.  Please inform the people of their new destination, on my behalf.\"\n\nHigh Councilor Tayu gestures for you to come closer.  He speaks so that only you can hear.  \n*if alliance_out \u003c 25\n\t\"As I'm sure you have surmised, I have left Envoy Eidon here to ensure that your interpretation of my orders does not verge on treason.  And to see that you follow my advice.\"  He raises a single finger.  \"Be \n*if alliance_out = 25\n\t\t\"I have left Envoy Eidon here as my representative.  Know that I trust him with my life, and that if you have any questions about the mission of the Alliance, he has been privy to that knowledge.  I will leave you, too, with this advice.\"  He raises a single finger.  \"Be \n*if alliance_out > 25\n\t\"You must know that I respect your prowess as a Captain.  I would not issue any order that would interfere with your ability to protect our people.  And so my next advice to you can be no more than that:  advice.\"  He places his hand on your shoulder.  \"Be \ncareful how you deal with the ${enemy_name}.  They will continue to show great cruelty to us, and the temptation to retaliate will be great.  But you must not give our potential allies any cause to turn against us in our hour of need.  Obey the rules of engagement in your encounters with the ${enemy_name}.  Our cause is justice, not revenge.\"\n*choice\n\t#Nod your assent.\n\t\tThe Councilor smiles back.\n\t\t*goto post_chat\n\t#Tell him you will do what you can.\n\t\t*if alliance_out > 50\n\t\t\t\"So shall we all, until this war is at an end.\"\n\t\t\t*goto post_chat\n\t\t*if alliance_out = 50\n\t\t\t\"I have faith in you, Captain.\"\n\t\t\t*goto post_chat\n\t\t*if (alliance_out \u003c 50) and (alliance_out > 15)\n\t\t\t\"You must do more than remember, Captain.\"\n\t\t\t*goto post_chat\n\t\t*else\n\t\t\t\"You will do more than remember, Captain.\"\n\t\t\t*goto post_chat\n\t#Tell him you will remember what he has said.\n\t\t*if alliance_out > 50\n\t\t\t\"I know you will, my friend.\"\n\t\t\t*goto post_chat\n\t\t*if alliance_out = 50\n\t\t\t\"I have faith in you, Captain.\"\n\t\t\t*goto post_chat\n\t\t*if (alliance_out > 15) and (alliance_out \u003c 50)\n\t\t\t\"You must do more than that, Captain.\"\n\t\t\t*goto post_chat\n\t\t*else\n\t\t\t\"You will do more than remember, Captain.\"\n\t\t\t*goto post_chat\n\t*if alliance_out \u003c 26\n\t\t#Tell him you make no promises.\n\t\t\t\"You make no promises, eh?  Well, Captain, if you truly do value your own beliefs above our people's cause, then it is I who shall have to make a promise to you.  One that I will keep, whatever the cost.\"\n\t\t\t*goto post_chat\n\n*label post_chat\n*page_break\nMinutes later, you watch the Council's transport vessel wink out of sight in the bridge's holographic field.\n\nYou deliver the data card directly to Officer Kelmer, your Astrogator, reaching into the nest of telescreens that surrounds him.  \"What is this, Captain?\" he asks, eyes glazed from their vigilant focus on the navigational dashboard.  You tell him they are the coordinates of your new destination, where you must arrive in no more than three weeks.\n\nHe is about to ask more, but the proximity klaxons have begun to sound.  The fore monitor shows ${enemy_name} capital ships phasing into the edge of the quadrant.   In the holographic field, squadrons of fighters emerge from them, and begin to close in on your fleet.  They have found you.\n\n\"Engineering reports it will be ten more minutes at least before we can link the fleet and enter phase!\" Kelmer warns.  You have no choice.  You must fight.  Your pilots load into their striker ships.  Your gunners climb into the cannon bays.  Against a force of this size, it will require the combined efforts of your full arsenal.\n\nYou order your cannons...\n\n*choice\n\n\t#...to fire en masse at the approaching ${enemy_name} fighters.\n\t\t*set can_choice +1\n\t\t*if can_coverage > 65\n\t\t\t*set bat_style %+10\n\t\t\t*set damage +30\n\t\t\t*goto strikers_second\n\t\t*if can_coverage = 65\n\t\t\t*set bat_style %+10\n\t\t\t*set damage +20\n\t\t\t*goto strikers_second\n\t\t*else\n\t\t\t*goto strikers_second\n\n\t#...to pinpoint the navigational sensors of the ${enemy_name} team leaders.\n\t\t*set can_choice +2\n\t\t*if can_skill > 65\n\t\t\t*set bat_style %-10\n\t\t\t*set damage +30\n\t\t\t*goto strikers_second\n\t\t*if can_skill = 65\n\t\t\t*set bat_style %-10\n\t\t\t*set damage +20\n\t\t\t*goto strikers_second\n\t\t*else\n\t\t\t*goto strikers_second\n\n\t#...to crossfire en masse ahead of the fleet, making it unsafe for the enemy fighters to approach.\n\t\t*set can_choice +3\n\t\t*if can_coverage > 65\n\t\t\t*set bat_style %-10\n\t\t\t*set damage +30\n\t\t\t*goto strikers_second\n\t\t*if can_coverage = 65\n\t\t\t*set bat_style %-10\n\t\t\t*set damage +20\n\t\t\t*goto strikers_second\n\t\t*else\n\t\t\t*goto strikers_second\n\n\t#...to obliterate the distant ${enemy_name} capital ships.\n\t\t*set can_choice +4\n\t\t*set away_from_fleet +1\n\t\t*if can_skill > 65\n\t\t\t*set bat_style %+10\n\t\t\t*set damage +30\n\t\t\t*goto strikers_second\n\t\t*if can_skill = 65\n\t\t\t*set bat_style %+10\n\t\t\t*set damage +20\n\t\t\t*goto strikers_second\n\t\t*else\n\t\t\t*goto strikers_second\n\n*label strikers_second\nWith the cannons employed, you next order your striker fighters to...\n\n*choice\n\n\t#...engage the ${enemy_name} squadrons head-on, driving them back with your sheer numbers.\n\t\t*gosub roundone_result\n\t\tAs for your strikers, they thrust themselves into the fray, confronting the ${enemy_name} fighters headlong.  \n\t\t*if striker_coverage > 65\n\t\t\tTheir numbers prove to be a significant advantage, \n\t\t\t*set bat_style %+10\n\t\t\t*if away_from_fleet = 0\n\t\t\t\t*if damage = 20\n\t\t\t\t\tdestroying most of the enemy fighters that escaped your cannons.\n\n\t\t\t\t\t*goto major_victory\n\t\t\t\t*else\n\t\t\t\t\tand their attack helps pick up some of the slack from your cannon strategy.\n\n\t\t\t\t\t*goto standard_victory\n\t\t\t*else\n\t\t\t\tand the success of their direct attack helps to make up for your cannons' focus on the capital ships.\n\n\t\t\t\t*if damage = 20\n\t\t\t\t\t*goto split_fleetgreat_capgood\n\t\t\t\t*else\n\t\t\t\t\t*goto split_fleetgreat_capfail\n\n\t\t*if striker_coverage = 65\n\t\t\tThey perform acceptably in their chosen strategy, \n\t\t\t*set bat_style %+10\n\t\t\t*if away_from_fleet = 0\n\t\t\t\t*if damage > 20\n\t\t\t\t\tcleaning up many of the ${enemy_name} fighters that your cannons left behind.\n\n\t\t\t\t\t*goto major_victory\n\t\t\t\t*if damage = 20\n\t\t\t\t\tcombining well with your cannon strategy.\n\n\t\t\t\t\t*goto standard_victory\n\t\t\t\t*else\n\t\t\t\t\tpicking up some of the slack from your failed cannon strategy.\n\n\t\t\t\t\t*goto standard_failure\n\t\t\t*else\n\t\t\t\tdoing what they can to make up for your cannons' focus on the capital ships.\n\n\t\t\t\t*if damage > 20\n\t\t\t\t\t*goto split_fleetgood_capgreat\t\n\t\t\t\t*if damage = 20\n\t\t\t\t\t*goto split_fleetgood_capgood\n\t\t\t\t*else\n\t\t\t\t\t*goto split_fleetgood_capfail\n\t\t*else\n\t\t\tBut it is immediately apparent there are not nearly enough strikers to execute the maneuver.  \n\t\t\t*if away_from_fleet = 0\n\t\t\t\t*if damage > 20\n\t\t\t\t\tThankfully, your successful cannon strategy helps to ward off the ${enemy_name} nonetheless.\n\n\t\t\t\t\tEven with your fleet taking some damage, it looks like you've won this round, albeit by the skin of your teeth.\n\n\t\t\t\t\t*set civ_trust %+5\n\t\t\t\t\t*set mil_trust %+10\n\t\t\t\t\t*set can_coverage -10\n\t\t\t\t\t*set can_skill -5\n\t\t\t\t\t*set striker_coverage -10\n\t\t\t\t\t*set striker_skill -5\n\t\t\t\t\t*goto roundtwo_choice\n\t\t\t\t*if damage = 20\n\t\t\t\t\tThe ${enemy_name} fighters are able to hit them back hard.\n\n\t\t\t\t\t*goto standard_failure\n\t\t\t\t*else\n\t\t\t\t\tThe ${enemy_name} fighters are able to hit them back very hard.\n\n\t\t\t\t\t*goto major_failure\n\t\t\t*else\n\t\t\t\tThe failure of their direct attack leaves your fleet undefended.\n\n\t\t\t\t*if damage > 20\n\t\t\t\t\t*goto split_fleetfail_capgreat\n\t\t\t\t*if damage = 20\n\t\t\t\t\t*goto split_fleetfail_capgood\n\t\t\t\t*else\n\t\t\t\t\t*goto split_fleetfail_capfail\n\n\t#...skillfully bait and chase the enemy pilots into the paths of the firing cannons.\n\t\t*gosub roundone_result\n\t\tAs for your strikers, they engage the enemy pilots in chases, all the while luring them toward destruction.  \n\t\t*if striker_skill > 65\n\t\t\tTheir advanced skill helps the strategy come off without a hitch, \n\t\t\t*set bat_style %-10\n\t\t\t*if away_from_fleet = 0\n\t\t\t\t*if damage = 20\n\t\t\t\t\tand most of the remaining enemy fighters are easily dispatched by cannon blasts.\n\n\t\t\t\t\t*goto major_victory\n\t\t\t\t*else\n\t\t\t\t\tand a number of their fighters are eliminated by cannon blasts.\n\n\t\t\t\t\t*goto standard_victory\n\t\t\t*else\n\t\t\t\thelping to make up for your cannons' focus on the capital ships.\n\n\t\t\t\t*if damage = 20\n\t\t\t\t\t*goto split_fleetgreat_capgood\n\t\t\t\t*else\n\t\t\t\t\t*goto split_fleetgreat_capfail\n\n\t\t*if striker_skill = 65\n\t\t\tYour pilots are able to execute the strategy, though some of the ${enemy_name} are able to see through the ruse.\n\n\t\t\t*set bat_style %-10\n\t\t\t*if away_from_fleet = 0\n\t\t\t\t*if damage > 20\n\t\t\t\t\t*goto major_victory\n\t\t\t\t*if damage = 20\n\t\t\t\t\t*goto standard_victory\n\t\t\t\t*else\n\t\t\t\t\t*goto standard_failure\n\t\t\t*else\n\t\t\t\t*if damage > 20\n\t\t\t\t\t*goto split_fleetgood_capgreat\n\t\t\t\t*if damage = 20\n\t\t\t\t\t*goto split_fleetgood_cap ackers and the capital ships, and your cannons' tactic an utter failure, your fleet sustains substantial damage.  If only your attack on the capital ships had been more successful, this might have turned out very differently.\n\t\t\t\t\t*set mil_trust %-15\n\t\t\t\t\t*set civ_trust %-10\n\t\t\t\t\t*set can_coverage -20\n\t\t\t\t\t*set can_skill -10\n\t\t\t\t\t*set striker_coverage -15\n\t\t\t\t\t*set striker_skill -7\n\t\t\t\t\t*goto defeat\n\n\t\t\t*else\n\t\t\t\t*set can_coverage -20\t\n\t\t\t\t*if damage > 20\n\t\t\t\t\tIt's your cannons' skillful attack that makes the difference here.  They obliterate several ${enemy_name} capital ships, and turn the tide of the battle in your favor.  The incoming enemy fighters are forced to halt their approach entirely.  Even so, many brave pilots succumbed to the ${enemy_name} defenses before this victory could be achieved.\n\t\t\t\t\t*set striker_coverage -15\n\t\t\t\t\t*set striker_skill -7\n\t\t\t\t\t*set mil_trust %+10\n\t\t\t\t\t*set civ_trust %-10\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto cruelty_choice\n\t\t\t\t*if damage = 20\n\t\t\t\t\tYour combined attack results in the destruction of several capital ships, and the tide of the battle has turned in your favor.  All this despite the loss of several brave pilots in the attack.\n\t\t\t\t\t*set striker_coverage -10\n\t\t\t\t\t*set striker_skill -5\n\t\t\t\t\t*set mil_trust %+5\n\t\t\t\t\t*set civ_trust %-5\n\t\t\t\t\t*goto roundtwo_choice\n\t\t\t\t*else\n\t\t\t\t\tEven combined, the two attacks are not enough to significantly damage the ${enemy_name} battleships, and your undefended fleet takes a very palpable hit.\n\t\t\t\t\t*set striker_coverage -15\n\t\t\t\t\t*set striker_skill -7\n\t\t\t\t\t*set mil_trust %-15\n\t\t\t\t\t*set civ_trust %-10\n\t\t\t\t\t*goto defeat\n\n\t\t*else\n\t\t\tThey are not up to the task, and their maneuver is unsuccessful.\n\n\t\t\t*if away_from_fleet = 0\n\t\t\t\t*if damage > 20\n\t\t\t\t\tThankfully, the approaching enemy fighters have been decimated by your successful cannon strategy.  Your fleet receives only minor damage.\n\n\t\t\t\t\tYour pilots are not so fortunate.\n\t\t\t\t\t*set can_coverage -10\n\t\t\t\t\t*set can_skill -5\n\t\t\t\t\t*set striker_coverage -20\n\t\t\t\t\t*set striker_skill -10\n\t\t\t\t\t*set mil_trust %+10\n\t\t\t\t\t*set civ_trust %+5\n\t\t\t\t\t*goto roundtwo_choice\n\t\t\t\t*if damage = 20\n\t\t\t\t\tWith your strategy split between the ${enemy_name} attackers and the capital ships, and your fighters having faltered, both your fleet and your striker squadrons sustain substantial damage.\n\t\t\t\t\t*set mil_trust %-15\n\t\t\t\t\t*set civ_trust %-10\n\t\t\t\t\t*set striker_coverage -20\n\t\t\t\t\t*set striker_skill -10\n\t\t\t\t\t*set can_coverage -15\n\t\t\t\t\t*set can_skill -7\n\t\t\t\t\t*goto defeat\n\t\t\t\t*else\n\t\t\t\t\t*goto split_fleetfail_capfail\n\n\t\t\t*else\n\t\t\t\t*set can_coverage -20\n\t\t\t\t*set can_skill -10\t\n\t\t\t\t*if damage > 20\n\t\t\t\t\tDespite the utter failure of your strikers' attack, your cannons seriously damage their targets.  Unfortunately, the combined focus of your attack on those distant vessels has left you defenseless to the approach of the enemy fighters.  Your fleet, and your striker squadrons, suffer substantial losses.\n\t\t\t\t\t*set can_coverage -20\n\t\t\t\t\t*set can_skill -10\n\t\t\t\t\t*set striker_coverage -15\n\t\t\t\t\t*set striker_skill -7\n\t\t\t\t\t*set mil_trust %+10\n\t\t\t\t\t*set civ_trust %-10\n\t\t\t\t\t*goto roundtwo_choice\n\n\t\t\t\t*if damage = 20\n\t\t\t\t\tThe combined force of your attack on the capital ships is still not enough to eliminate them, and what's worse, you have left your fleet undefended.  Your ships on the whole suffer a devastating blow, and so does your credibility as a Captain.\n\t\t\t\t\t*set mil_trust %-20\n\t\t\t\t\t*set civ_trust %-15\n\t\t\t\t\t*set can_coverage -15\n\t\t\t\t\t*set can_skill -7\n\t\t\t\t\t*set striker_coverage -20\n\t\t\t\t\t*set striker_skill -10\n\t\t\t\t\t*goto defeat\n\t\t\t\t*else\n\t\t\t\t\tYour combined attacks on the capital ships are a total failure, and your undefended fleet suffers a devastating blow, along with your credibility.\n\t\t\t\t\t*set mil_trust %-20\n\t\t\t\t\t*set civ_trust %-20\n\t\t\t\t\t*set can_coverage -20\n\t\t\t\t\t*set can_skill -10\n\t\t\t\t\t*set striker_coverage -20\n\t\t\t\t\t*set striker_skill -10\n\t\t\t\t\t*goto defeat\n\n*label roundone_result\n*if can_choice = 1\n\tYour cannons blast the approaching ${enemy_name} fighters full force.  \n\t*if damage > 20\n\t\tThe attack comes off phenomenally well, thanks to their superior coverage, and the explosions of the enemy ships shine brightly in the holographic field.\n\n\t\t*return\n\t*if damage = 20\n\t\tThe attack is effective, thanks to their adequate coverage.\n\n\t\t*return\n\t*else\n\t\tUnfortunately, your defense fizzles.  You simply don't have enough cannon coverage to effectively execute this strategy.\n\n\t\t*return\n\n*if can_choice = 2\n\tYour cannon operators bring all their skill to bear on the approaching ${enemy_name} fighters, \n\t*if damage > 20\n\t\tpicking off the squadron leaders one by one.  The enemy fighters are soon aimlessly circling, their approach effectively disrupted by your cannons' successful attack.\n\n\t\t*return\n\t*if damage = 20\n\t\tpicking off as many of the squadron leaders as they can.  They don't have quite enough expertise to execute the maneuver, but the ${enemy_name} fighters are noticeably fazed by your precise attack nonetheless.  It becomes much easier for your gunners to take them out.\n\n\t\t*return\n\t*else\n\t\tbut they just don't have the experience required to accurately pick off the team leaders.  Your attack fizzles, and the enemy fighters aren't even slowed down.\n\n\t\t*return\n\t\t\n*if can_choice = 3\n\tYour cannon operators aim to cross their blasts, creating a \n\t*if damage > 20\n\t\tterrifying field of fire that any pilot would dread to navigate.  Those ${enemy_name} foolhardy enough to attempt a direct approach are quickly obliterated.\n\n\t\t*return\n\t*if damage = 20\n\t\tfield of fire that few could successfully navigate.  Some skillful ${enemy_name} fighter pilots are still able to sneak past the defense, but more are destroyed in the attempt.\n\n\t\t*return\n\t*else\n\t\tsparse field of fire that does little to deter the approaching ${enemy_name} fighters.  It appears you simply do not have the cannon coverage to execute this strategy effectively. \n\n\t\t*return\n*if can_choice = 4\n\tYour cannons bring all their skill to bear on their capital ship attack, \n\t*if damage > 20\n\t\teffectively igniting fuel tanks, crippling sensors, and sending concentrated blasts into landing bays.  You can see several ${enemy_name} battleships coming apart in pieces on the fore monitor.\n\n\t\t*return\n\t*if damage = 20\n\t\tdoing their best to hit the ships' weak points.  Their aim is not as true as it could be, and not all of their shots hit the ${enemy_name} hard enough, but significant damage is done nonetheless.\n\n\t\t*return\n\t*else\n\t\tbut they simply don't have enough to pull it off.  The ${enemy_name} ships are too distant for them to effectively attack.\n\n\t\t*return\n\n*label major_victory\nCombined, your two strategies work well, and the ${enemy_name} are dealt a serious blow.  As for your own fleet, it suffers only negligible losses.\n*set civ_trust %+10\n*set mil_trust %+20\n*goto roundtwo_choice\n\n*label standard_victory\nTaken together, your strategies help deal the ${enemy_name} a serious blow, but not before your fleet has taken damage.\n*set civ_trust %+5\n*set mil_trust %+10\n*set can_coverage -10\n*set can_skill -5\n*set striker_coverage -10\n*set striker_skill -5\n*goto roundtwo_choice\n\n*label standard_failure\nEven taken together, these strategies are not enough to hold the ${enemy_name} off.  Your losses are considerable.\n*set civ_trust %-5\n*set mil_trust %-10\n*set can_coverage -15\n*set can_skill -7\n*set striker_coverage -15\n*set striker_skill -7\n*goto defeat\n\n*label major_failure\nEven taken together, these strategies are nowhere near enough to hold the ${enemy_name} off.  Your losses are disastrous.\n*set civ_trust %-10\n*set mil_trust %-15\n*set can_coverage -20\n*set can_skill -10\n*set striker_coverage -20\n*set striker_skill -10\n*goto defeat\n\n*label split_fleetgreat_capgood\nThough your cannons' attack is marginally less successful, both strategies pay off, and the ${enemy_name} are dealt a major blow.  Your fleet receives only minor damage.\n*set can_coverage -10\n*set can_skill -5\n*set striker_coverage -10\n*set striker_skill -5\n*set mil_trust %+20\n*set civ_trust %+10\n*goto roundtwo_choice\n\n*label split_fleetgreat_capfail\nDespite the utter failure of your cannons' attack on the capital ships, the ${enemy_name} fighters have been dealt a palpable blow by your striker squadrons.  Your fleet receives only minor damage.\n*set can_coverage -10\n*set can_skill -5\n*set striker_coverage -10\n*set striker_skill -5\n*set mil_trust %+10\n*set civ_trust %+5\n\n*label split_fleetgood_capgreat\nIt's the attack on the capital ships that makes the difference here.  The hits to these carrier-class vessels have effectively ended the onslaught before it could begin.\n*set mil_trust %+30\n*set civ_trust %+20\n*page_break\n*goto cruelty_choice\t\n\n\n*label split_fleetgood_capgood\nUnfortunately, it's just not enough.  With your strategy split between the ${enemy_name} attackers and the capital ships, and neither maneuver being a total success, your fleet sustains substantial damage.\n*set mil_trust %-15\n*set civ_trust %-10\n*set can_coverage -15\n*set can_skill -7\n*set striker_coverage -15\n*set striker_skill -7\n*goto defeat\n\n*label split_fleetgood_capfail\nUnfortunately, it's nowhere near enough.  With your strategy split between the ${enemy_name} attackers and the capital ships, and your cannons having faltered, your fleet sustains substantial damage.\n*set mil_trust %-20\n*set civ_trust %-15\n*set striker_coverage -15\n*set striker_skill -7\n*set can_coverage -15\n*set can_skill -7\n*goto defeat\n\n*label split_fleetfail_capgreat\n*if can_skill > 65\n\tIt's the success of your cannon attack that proves to be the deciding factor here.  \n\t*set striker_coverage -10\n\t*set striker_skill -5\n\t*set can_coverage -10\n\t*set can_skill -5\n*if striker_skill > 65\n\tIt's the success of your striker attack that proves to be the deciding factor here.  \n\t*set can_coverage -15\n\t*set can_skill -7\nYour destruction of the capital ships has effectively ended the onslaught before it could begin.  Although your fleet sustains damage from the failure of your supporting maneuver, the tide has clearly turned in your favor.\n*set mil_trust %+20\n*set civ_trust %+10\n*goto roundtwo_choice\n\n*label split_fleetfail_capgood\nWith your strategy split between the ${enemy_name} attackers and the capital ships, and your fighters' maneuver an utter failure, your fleet sustains substantial damage.  If only your attack on the capital ships had gone as planned, this might have turned out differently.\n*set mil_trust %-15\n*set civ_trust %-10\n*set can_coverage -20\n*set can_skill -10\n*set striker_coverage -20\n*set striker_skill -10\n*goto defeat\n\n*label split_fleetfail_capfail\nWith your strategy split between the ${enemy_name} attackers and the capital ships, and both maneuvers failing, your fleet sustains substantial damage.\n*set mil_trust %-20\n*set civ_trust %-15\n*set can_coverage -20\n*set can_skill -10\n*set striker_coverage -20\n*set striker_skill -10\n*goto defeat\n\n*label defeat\n*set energy %-15\n*set rep %+20\n*page_break\nOfficer Kelmer hails you.  \"Captain, Engineering has just informed me that the Core is fully charged...\"\n\nThe ${enemy_name} fighters appear on every monitor now.  They are surrounding your fleet, moving in for the kill.  Every face on the bridge is grave.\n\nAfter suffering a loss like this one, you know that you cannot afford to remain in the quadrant any longer.\n\nAs the ${enemy_name} tighten their net, you issue the order to phase.\n*finish\n\n*label roundtwo_choice\n*set energy %-15\n*page_break\nThe remaining ${enemy_name} fighters are still reeling from your maneuvers.  You know it will not take much to put them out of commission permanently.\n\n\"Captain, Engineering has just informed me that the Core is fully charged...\"\n\nThe fleet can leave now, or you can continue the fight.  Another round of combat will not significantly task your fleet's coverage or skill, but it will cost energy.  You decide...\n\n*choice\n\n\t#...to continue fighting.\n\t\t*goto second_round_combat\n\t#...to phase into hyperspace.\n\t\tYour fleet's future is uncertain.  You know it will be more important to be conserve your energy reserves than to complete this engagement with the ${enemy_name}, which will certainly not be your last.\n\n\t\tYou issue the order for the fleet to phase into hyperspace.\n\t\t*set rep %+20\n\t\t*set battle2_victory true\n\t\t*finish\n\n*label second_round_combat\nThe heavy losses sustained by the ${enemy_name} have sent their  \n*if away_from_fleet = 0\n\tremaining fighters \n*if away_from_fleet = 1\n\tfighters \nscrambling.  During this second round, your cannons and strikers can work together with a unified strategy to clean them up.\n\nHow will you finish the battle?\n*choice\n\n\t#Bombard the fighters with direct fire, thinning their numbers.\n\t\t*set bat_style %+10\n\t\tYou order a relentless assault on the ${enemy_name} fighters.  \n\t\t*goto cruelty_choice\n\t\t\n\t#Block their access to their capital ships.  They will soon be at risk of losing power.\n\t\t*set bat_style %-10\n\t\tYou order that your cannons and strikers focus on keeping the ${enemy_name} fighters from reaching their capital ships.  The enemy fighters begin to circle, slowing down, and falling into a loose formation.  \n\t\t*goto cruelty_choice\n\n\n\n*label cruelty_choice\n*set battle2_victory true\n*set energy %-15\nBefore long, the ${enemy_name} are transmitting their official surrender.  The signal sounds on the bridge, a low cycling beep.\n\nYou regard the defeated ships on the monitors.  They are now immobile, their weapons offline.  \n*if hate_type \u003c 25\n\tHelplessly, your mind returns to the fear and doubt that you felt when you watched their ships descending upon your world.\n\t\n*if hate_type = 25\n\tThey helplessly await your next move.\n\t\n*if (hate_type > 25) and (hate_type \u003c=50)\n\tYou cannot help but recall Admiral Kalla's defenseless ship, collapsing under the assault of the ${enemy_name} ion cannons.\n\t\n*if hate_type > 50\n\tYou cannot help but think of the millions of civilians who were just as helpless when those ${enemy_name} energy weapons were brought to bear on ${plan_name}.\n\t\n\"What now?\" Lieutenant Demian asks.\n\nIt would be satisfying indeed to give the ${enemy_name} a taste of their own cruelty, though you know that to do so after receiving the \"white flag\" transmission would be in strict opposition to the rules of engagement.\n\nYou issue your orders...\n\n*choice\n\n\t#\"Eliminate the remaining ${enemy_name} vessels.\"\n\t\t*set rep %-20\n\t\t*set energy %-5\n\t\t*set battle2_cruelty true\n\t\tZagi seems surprised to hear your order, but she doesn't question it.\n\n\t\tYou watch as the remaining ${enemy_name} ships are reduced to charred bits of metal in the holographic field.  It is a long time before all of the active vessels are destroyed, and the bleat of the surrender signal finally ceases.  Then the bridge is silent.  \n\t\t*if alliance_out \u003c=25\n\t\t\tIn the glow of the aft monitor, you can see the dumbstruck Envoy Eidon, still in shock at what he has just witnessed.  \n\n\t\t\"It's no less than they deserve,\" Lieutenant Demian assures you.  For your part...\n\t\t*goto deserve_choice\n\n\t#\"Astrogation, order the phase into hyperspace.\"\n\t\t*set rep %+20\n\t\tYou detect a note of disappointment in Officer Kelmer's voice as he passes the order along, and you can feel Lieutenant Demian stiffen.  Nonetheless, you know you've done the right thing.  After all...\n\t\t*goto magna_choice\n\n*label deserve_choice\n\n*fake_choice\n\t#...you know she's right.\n\t\tYou order the phase into hyperspace, satisfied that justice has been done.\n\t*if alliance_true \u003c 51\n\t\t#...you have only just begun.\n\t\t\tThe ${enemy_name} will pay for what they have done to you, until every last one of them feels the same pain that they have inflicted upon your people.  You order the phase into hyperspace, satisfied that justice has been done.\n\t#...you are haunted by the cruelty of your decision.\n\t\tYou order to phase into hyperspace.  You are grateful when the sound of the engines fills the deepening silence.\n\t*if alliance_true > 49\n\t\t#...you worry how news of your choice will be received by the Alliance.\n\t\t\tOnly time will tell what the results of your actions will be.  At long last, you order the phase into hyperspace, and the fleet is gone.\n\t*if (alliance_true \u003c 50) and (alliance_out > 49)\n\t\t#...you worry you have exposed your true colors to the Alliance.\t\n\t\t\tOnly time will tell what the results of your actions will be.  At last, you order the phase into hyperspace, and the fleet is gone.\n\t*if (alliance_true \u003c 50) and (alliance_out \u003c 50)\n\t\t#...you hope that the ${enemy_name}, and the Alliance too, receive the message you have just sent to them.\n\t\t\tYou have no doubt you will have occasion to send many such messages, and soon.  You order the phase into hyperspace, satisfied that justice has been done.\n\n*finish\n\n*label magna_choice\n*choice\n\t#...your goal is to end this war, not to reap vengeance.\n\t\t*if alliance_true \u003c 50\n\t\t\tPerhaps Councilor Tayu was right after all.  \n\t\t\t*goto dawn_end\n\t\t*else\n\t\t\tAnd perhaps you are a step closer to the war's end today, having made this choice.  \n\t\t\t*goto dawn_end\n\t#...your decision will aid the cause of the Alliance.\n\t\t*if alliance_true \u003c 51\n\t\t\tOr at least keep you on their good side.  \n\t\t\t*goto dawn_end\n\t\t*else\n\t\t\tThere can be no higher purpose.  \n\t\t\t*goto dawn_end\n\t\n\t#...you must conserve your fleet's energy.\n\t\tThere is something to be said for survival, and these days, it is no guarantee.  \n\t\t*goto dawn_end\n\n*label dawn_end\nYou phase into hyperspace, leaving the ${enemy_name} behind for now.\n*finish", "prepare_for_battle": "\n*temp continued_cruelty\n*temp sudden_cruelty\n*temp continued_failure\n*temp sudden_failure\n*temp continued_victory\n*temp sudden_victory\n\n*temp conspiracy_aware\n*temp conspiracy_complicit\n*temp refused_demian\n*temp warned_demian\n*temp tricked_demian\n*temp highroad\n\n*temp empress\n*temp insolent\n*temp amnesty\n\n*temp messup\n*temp doubt_information\n*temp tattle\n\n*temp convinced\n*temp switch_to_pro\n\n*temp elegant\n*temp old_talking_points_score\n\n*set continued_cruelty false\n*set sudden_cruelty false\n*set continued_failure false\n*set sudden_failure false\n*set continued_victory false\n*set sudden_victory false\n\n*set conspiracy_aware false\n*set conspiracy_complicit false\n*set refused_demian false\n*set warned_demian false\n*set tricked_demian false\n*set highroad false\n\n*set messup false\n*set good_information true\n*set doubt_information true\n*set tattle false\n\n*set empress false\n*set insolent false\n*set amnesty false\n\n*set convinced false\n*set switch_to_pro false\n\n*set elegant false\n*set old_talking_points_score 0\n\n\n*if (battle2_cruelty = true) or (battle3_civility \u003c 30)\n\t*if drone_production \u003c 50\n\t\t*set continued_cruelty true\n\n*if (battle2_cruelty = false) and (battle3_civility >=30)\n\t*if drone_production \u003c 50\n\t\t*set sudden_cruelty true\n\n*if (battle2_victory = false) and (battle4_victory = false)\n\t*set continued_failure true\n\n*if (battle2_victory = true) and (battle4_victory = false)\n\t*set sudden_failure true\n\n*if (battle2_victory = true) and (battle4_victory = true)\n\t*set continued_victory true\n\n*if (battle2_victory = false) and (battle4_victory = true)\n\t*set sudden_victory true\n\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]The Fleet[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\nThe Alliance's vessels tow your fleet into hyperspace.   \n*if stasis = false\n\tTogether, you embark on the week-long journey to Calpurnia.  \n*if stasis = true\n\t\n\tDuring your week-long journey, Alliance scientists attempt to revive the citizens who have been placed in stasis, but there is only a fifty percent survival rate, and a few of the revived remain near-vegetative.\n\t\n\tThis was...\n\t*fake_choice\n\t\t#Problematic.\n\t\t#Regrettable.\n\t\t#Unavoidable.\n\t*page_break\n*if alliance_true > 50\n\tWhen you finally see the shimmering blue-gray orb of your host planet, you know you are saved.\n\t\n*if alliance_true = 50\n\tBut only when you see the shimmering blue-gray orb of your host planet do you truly accept that you have been saved.\n\t\n*if alliance_true \u003c 50\n\tWhen you finally see the blue-gray orb of your host planet, you utter a silent curse for the time you spent abandoned in the Null Zone by your so-called allies.\n\t\nObserving the outer atmosphere of the planet, you can't help but notice \n*if rep >=60\n\tthe enormous numbers of vessels in orbit, from throughout the Outer Systems.  The Alliance is more real than ever now, and it is clearly a force to be reckoned with.\n*if (rep >=40) and (rep \u003c 60)\n\tthat still more systems have joined the Alliance.  You can see the evidence in the strange ships in orbit around Calpurnia.  \n\t*if alliance_true >=50\n\t\tYou only hope there will be enough of them to drive the ${enemy_name} from ${plan_name}.\n\t*if alliance_true \u003c 50\n\t\tYou wonder how they'll stack up against the ${enemy_name}.\n*if rep \u003c 40\n\tthat there are not enough ships represented here to overpower the ${enemy_name}.  Even with the Outer Systems' support, you know that it will be up to your fleet to take back ${plan_name} from your enemies.  \n\t*if alliance_true > 50\n\t\tThis is not the Alliance you had envisioned.\n\t*if alliance_true = 50\n\t\tThe Alliance will not be enough.\n\t*if alliance_true \u003c 50\n\t\tThe Alliance has proven its own uselessness.\n\n*if rep \u003c 40\n\t\n\tAt least \n\t*if civ_like = true\n\t\tthe civilian vessels will be safe here, in Calpurnian space.\n\t*if civ_like = false\n\t\tyou can finally relinquish command of the burdensome civilian vessels, and leave them here in Calpurnian space.\n*if rep >=40\n\t\n\t*if civ_like = true\n\t\tAs for your civilian vessels, they can be left safely in Calpurnian space.\n\t*if civ_like = false\n\t\tAs for the burdensome civilian vessels, they can be left safely in Calpurnian space.\n*page_break\n*set energy 100\nYour energy levels have been completely replenished, and your other stats will return to the levels they held before your sojourn in the Null Zone.\n\n*if civ_like = true\n\tWhat's more, now that the civilians are no longer your responsibility, you can focus on your battle strategy.\n*if civ_like = false\n\tWhat's more, with those blasted civilian vessels finally out of the fleet, you can finally focus on the battle with no distractions.  \nThe stats for your fleet now look like this:\n\n*stat_chart\n\tpercent striker_coverage Striker Coverage\n\tpercent striker_skill Striker Skill\n\tpercent can_coverage Cannon Coverage\n\tpercent can_skill Cannon Skill\n\tpercent mine Mining Support\n\tpercent energy Energy Reserves\n\n\n\n*page_break\n*if alliance_true > 50\n\tYou are honored some days later with a public welcome.  \n*if alliance_true = 50\n\tYou are called some days later to a public welcome in your honor.  \n*if alliance_true \u003c 50\n\tYou are called some days later to be paraded about before Alliance supporters at a public welcome.  \n*if alliance_true > 50\n\tThe Calpurnian Empress addresses the people on your behalf, and there are cheers from the crowd below.  \n*if alliance_true = 50\n\tThe Calpurnian Empress speaks to the people on your behalf, and there are cheers from the crowd below.  \n*if alliance_true \u003c 50\n\t*if alliance_out \u003c 25\n\t\tThe Calpurnian Empress, in a ridiculous headdress, shouts some kind words of dubious sincerity to the crowd on your behalf, and it is done.  \n\t*if alliance_out >=25\t\n\t\tThe Calpurnian Empress, in a ridiculous headdress, shouts some kind words to the crowd on your behalf, and it is done.  \n*if continued_cruelty = true\n\t*goto mean\n\n*if sudden_cruelty = true\n\t*goto suddenly_mean\n\n*if continued_failure = true\n\t*goto lost\n\n*if sudden_failure = true\n\t*goto suddenly_lost\n\n*if continued_victory = true\n\t*goto superstar\n\n*if sudden_victory = true\n\t*goto up_and_comer\n\n*goto superstar\n\n*label mean\n*gosub no_empress\n\"With that formality at an end, we can move to more pressing matters,\" Ambassador Bashena says.  \n*if skeletons >=2\n\t\"Your fleet suffered great hardships in the Null Zone, in no small part because we were unable to extract you sooner.  \n*if skeletons \u003c 2\n\t\"Your fleet suffered in the Null Zone, in no small part because we were unable to extract you sooner.  \nWhat you may not realize is that your careless acts of destruction against the ${enemy_name} were the very reason for our delay...\"\n\nBefore you can respond, Councilor Tayu speaks.\n\n\"Your attack on the ${enemy_name} city was an act of cruelty!\" he says.  \"Much support has been lost for our cause as a result.  The Alliance fleet barely had ships to spare to retrieve you from the Null Zone.  \n*if alliance_out \u003c=25\n\tWhat can you possibly say to justify this chaos you have caused?\"\n\t\n*if alliance_out = 50\n\tYou have claimed to be skeptical of our cause, but we can see plainly now that you are against it.  What can you possibly say to defend your actions?\"\n\t\n*if alliance_out > 50\n\tYou have claimed to be a supporter of our cause, but your actions tell another tale.  What can you possibly say to defend yourself?\"\n\t\n*label defend_yourself\nYou tell the Councilor...\n*choice\n\t*if alliance_true >=50\n\t\t#...that you lost control of the battle.\n\t\t\tYou explain that your passion for the cause of ${plan_name} caused you to lose sight of your priorities.\n\t\t\t\n\t\t\t*if continued_cruelty = true\n\t\t\t\tCouncilor Tayu laughs bitterly.  \"You seem to lose sight of them often,\" he says.  \"And the ${enemy_name} have happily shared the results with the entire civilized universe.\"\n\t\t\t\t\n\t\t\t\t*gosub dissemination_expo\n\t\t\t\t*goto second_exchange\n\t\t\t*else\n\t\t\t\t\"The ${enemy_name} have happily shared the results of your 'passion' with the entire civilized universe,\" the Councilor tells you.\n\t\t\t\t\n\t\t\t\t*gosub dissemination_expo\n\t\t\t\t*goto second_exchange_suddenly\t\t\t\t\n\t*if alliance_true \u003c=50\n\t\t#...that the Alliance's cause is no concern of yours.  Only the reclaiming of ${plan_name} matters.\n\t\t\tYou explain that you have only one goal in mind—the return of ${plan_name} to its rightful owners.\n\t\t\t\n\t\t\tCouncilor Tayu laughs bitterly, but his fury never disappears.  \"And how have you furthered that goal,\" he asks, \"by undermining our supporters?  The ${enemy_name} have shared the news of this attack with the entire civilized universe.  The results have been disastrous.\"\n\t\t\t\n\t\t\t*gosub dissemination_expo\n\t\t\t*if continued_cruelty = true\n\t\t\t\t*goto second_exchange\n\t\t\t*else\n\t\t\t\t*goto second_exchange_suddenly\n\n\t#...that you will not apologize for victory.\n\t\tYou explain that you have saved the lives of many of your own people
