ack easily and head straight for your fleet.\n\t\t\t*gosub can_fail\n\t*if (can_slick = true) and (can_cov = true)\n\t\tthey volley gravity mines into the paths of the incoming fighters.  \n\t\t*if fleet_cannon > 50\n\t\t\tThe field becomes impassable for the enemy fighters, which torque and spin to a halt as they are drawn helplessly to the devices, forming great clusters of metal.\n\t\t\t*gosub can_win_big\n\t\t*if fleet_cannon = 50\n\t\t\tThe field becomes almost impassable for the enemy fighters, many of which find themselves drawn to the devices, pulled out of formation.  Still, some drones make it through.\n\t\t\t*gosub can_win_mod\n\t\t*if fleet_cannon \u003c 50\n\t\t\tIf you had more cannons to spread the devices, it might have worked, but as it is, there is not enough coverage.  You barely even slow the fighters down.\n\t\t\t*gosub can_fail\n\t*if (can_aggro = true) and (can_skilly = true)\n\t\tthey fire precise blasts at the power cells on the incoming fighters' bellies,   \n\t\t*if fleet_cannon > 50\n\t\t\tand create a chain reaction throughout the squadron.  The overloading vessels explode like blast mines, taking the other drones in formation along with them.  The threat is over before it can begin.\n\t\t\t*gosub can_win_big\n\t\t*if fleet_cannon = 50\n\t\t\tand manage to hit several of them, causing destructive overloads that transform the vessels into enormous bombs.  The other drones beside them in formation don't stand a chance.  However, your gunners miss several shots, and a few drones manage to sneak through your defense.\n\t\t\t*gosub can_win_mod\n\t\t*if fleet_cannon \u003c 50\n\t\t\tand miss.  The drones are barely damaged as they cruise onward toward your fleet.\n\t\t\t*gosub can_fail\n\t*if (can_aggro = true) and (can_cov = true)\n\t\tthey fire straight into the incoming fighter squadron, \n\t\t*if fleet_cannon > 50\n\t\t\tdecimating it in a barrage of head-on cannon fire.\n\t\t\t*gosub can_win_big\n\t\t*if fleet_cannon = 50\n\t\t\tdestroying many of the drones in a barrage of head-on cannon fire, though some still manage to sneak through.\n\t\t\t*gosub can_win_mod\n\t\t*if fleet_cannon \u003c 50\n\t\t\ttrying to hold them back with a barrage of fire.  The trouble is, there aren't enough cannons to pull it off, and the drones glide straight through your defense.\n\t\t\t*gosub can_fail\n*if shipyard_cannon != 0\n\t*if (can_slick = true) and (can_skilly = true)\n\t\tthey fire scramblers directly at the shipyard's gravity generators, the devices responsible for holding its idle drones in formation.  \n\t\t*if shipyard_cannon > 50\n\t\t\tMultiple shots hit their mark, disrupting the yard's hold, and sending the unmoored ships spinning into the Null Zone, lost forever.\n\t\t\t*gosub can_win_big\n\t\t*if shipyard_cannon = 50\n\t\t\tTheir shots manage to partially disrupt the yard's hold, and send several unmoored ships spinning into the Null Zone, lost forever.  But not all.\n\t\t\t*gosub can_win_mod\n\t\t*if shipyard_cannon \u003c 50\n\t\t\tThese shots miss.\n\t\t\t*gosub can_fail\n\t*if (can_slick = true) and (can_cov = true)\n\t\tthey volley hundreds of gravity mines deep into the shipyard, in the hopes of disrupting its formation.  \n\t\t*if shipyard_cannon > 50\n\t\t\tThe strategy proves a success.  The idle drones unmoor, spinning into the Null Zone, where they are lost forever.\n\t\t\t*gosub can_win_big\n\t\t*if shipyard_cannon = 50\n\t\t\tThe strategy proves only partially successful, though a few of the idle drones are unmoored completely, spinning into the Null Zone.\n\t\t\t*gosub can_win_mod\n\t\t*if shipyard_cannon \u003c 50\n\t\t\tBut you can't deliver enough mines to overpower the shipyard's own gravity generators, not with the few cannons you have.\n\t\t\t*gosub can_fail\n\t*if (can_aggro = true) and (can_skilly = true)\n\t\tthey hit the shipyard, firing precise blasts at the power cells on the idle drones' bellies, \n\t\t*if shipyard_cannon > 50\n\t\t\tand creating a chain reaction.  The overloading vessels explode like blast mines, taking the other drones in the formation along with them.  The rest unmoor and spin into the Null Zone.\n\t\t\t*gosub can_win_big\n\t\t*if shipyard_cannon = 50\n\t\t\tand managing to hit several of them.  This causes destructive overloads that transform the vessels into enormous blast mines.  The other drones beside them in the shipyard don't stand a chance.  However, your gunners miss several shots, and many drones still remain in the yard after your attack.\n\t\t\t*gosub can_win_mod\n\t\t*if shipyard_cannon \u003c 50\n\t\t\tand missing.\n\t\t\t*gosub can_fail\n\t*if (can_aggro = true) and (can_cov = true)\n\t\tthey attempt to visit a massive hail of cannon fire onto the shipyard.  \n\t\t*if shipyard_cannon > 50\n\t\t\tThose vessels not destroyed by direct hits are unmoored from formation, and spin into the Null Zone.  All the idle drones are lost.\n\t\t\t*gosub can_win_big\n\t\t*if shipyard_cannon = 50\n\t\t\tSome cannons land direct hits, and others unmoor drones from formation, sending them spinning into the Null Zone.  But many drones remain.\n\t\t\t*gosub can_win_mod\n\t\t*if shipyard_cannon \u003c 50\n\t\t\tIn this they fail, lacking the coverage necessary to make such a sizable attack successful.\n\t\t\t*gosub can_fail\n*if facility_cannon != 0\n\t*if (can_slick = true) and (can_skilly = true)\n\t\tthey fire scramblers \n\t\t*if facility_cannon > 50\n\t\t\tinto the collector cells of the ${enemy_name} colony's power plant.  It's an attack that works better than you expected, not merely shutting down the power, but overloading it.  Soon, the effects of massive internal explosions are visible throughout the city, as whole structures depressurize, including the production facility.  Once the effects of your strategy have played out, you doubt there will be many survivors.\n\t\t\t*gosub can_win_big\n\t\t*if facility_cannon = 50\n\t\t\tinto the collector cells of the ${enemy_name} colony's power plant.  This doesn't merely shut down the power, but overloads it in places.  Soon, the effects of internal explosions are visible, as several structures depressurize, including part of the production facility.  It is not a decisive hit, but many ${enemy_name} perish.\n\t\t\t*gosub can_win_mod\n\t\t*if facility_cannon \u003c 50\n\t\t\tat the collector cells of the ${enemy_name} colony's power plant, and miss.\n\t\t\t*gosub can_fail\n\t*if (can_slick = true) and (can_cov = true)\n\t\tthey attempt to litter the ${enemy_name} colony with scramblers.   \n\t\t*if facility_cannon > 50\n\t\t\tIt's an attack that works better than you expected, not merely shutting down the power, but overloading it.  Soon, the effects of massive internal explosions are visible throughout the city, as whole structures depressurize, including the production facility.  Once the effects of your strategy have played out, you doubt there will be many survivors.\n\t\t\t*gosub can_win_big\n\t\t*if facility_cannon = 50\n\t\t\tThis doesn't merely shut down the power, but overloads it in places.  Soon, the effects of internal explosions are visible, as several structures depressurize, including part of the production facility.  It is not a decisive hit, but many ${enemy_name} perish.\n\t\t\t*gosub can_win_mod\n\t\t*if facility_cannon \u003c 50\n\t\t\tIt is a strategy that might have worked better if you had more cannons to spread the devices effectively.  With the scant few you have, it fails.\n\t\t\t*gosub can_fail\n\t*if (can_aggro = true) and (can_skilly = true)\n\t\tthey fire precise shots at the ${enemy_name} colony's atmosphere generators, aiming to destroy them outright, causing internal fires throughout the city.  \n\t\t*if facility_cannon > 50\n\t\t\tIn this they are successful.  As the blazes course through the city's pressurized corridors, the effects of massive internal explosions are visible throughout.  Whole structures depressurize, including the production facility.  You doubt there will be many survivors from this attack once its effects have played out.\n\t\t\t*gosub can_win_big\n\t\t*if facility_cannon = 50\n\t\t\tIn this they are partially successful.  As the blazes course through the city's pressurized corridors, the effects of internal explosions are visible, as several structures depressurize, including half of the production facility.  It is not a decisive hit, but many ${enemy_name} perish.\n\t\t\t*gosub can_win_mod\n\t\t*if facility_cannon \u003c 50\n\t\t\tBut the shots miss.\n\t\t\t*gosub can_fail\n\t*if (can_aggro = true) and (can_cov = true)\n\t\tthey rain fire into the rock of the satellite itself, aiming to create a seismic disturbance at the ${enemy_name} colony.  \n\t\t*if facility_cannon > 50\n\t\t\tThe resulting quake depressurizes buildings, and sends internal fires coursing through others.  The production facility is completely destroyed, and as the wave of destruction spreads, you feel certain no survivors will remain.\n\t\t\t*gosub can_win_big\n\t\t*if facility_cannon = 50\n\t\t\tThe minor quake that results depressurizes several buildings, ignites internal fires in others, and damages the production facility.  It is not a decisive hit, but many ${enemy_name} perish.\n\t\t\t*gosub can_win_mod\n\t\t*if facility_cannon \u003c 50\n\t\t\tThere are, however, not enough cannons in your arsenal to make a success of this attack.\n\t\t\t*gosub can_fail\n\t\t\n*goto victory_matrix\n\n*label str_win_big\n*set mil_trust %+15\n*return\n\n*label str_win_mod\n*set striker_coverage -10\n*set striker_skill -5\n*set mil_trust %+10\n*return\n\n*label str_fail\n*set striker_coverage -20\n*set striker_skill -10\n*set mil_trust %-15\n*return\n\n*label can_win_big\n*set mil_trust %+15\n*return\n\n*label can_win_mod\n*set mil_trust %+10\n*return\n\n*label can_fail\n*set mil_trust %-15\n*return\n\n*label combined_fleet\n*if (str_slick = true) and (str_skilly = true)\n\tYour strikers lure the drones out of their formations, and engage them in elaborate chases.  \n\t*if fleet_striker > 50\n\t\tYour expert pilots send them smashing into each other, hitting the squadron hard.  \n\t*if fleet_striker = 50\n\t\tYour pilots don't quite have the skill to trick the advanced AI of the drones, but they send quite a few of the enemy fighters smashing into each other.  \n\t*if fleet_striker \u003c 50\n\t\tUnfortunately, your unskilled pilots aren't able to trick the advanced AI of the drones, and the strategy is a failure.  \n*if (str_slick = true) and (str_cov = true)\n\tYour strikers break off on their own, to befuddle their AI.  \n\t*if fleet_striker > 50\n\t\tWith so many sources of unpredictable, disorderly input to keep track of, the processors of the drones begin to lock up, and their ships are easily dispatched.  \n\t*if fleet_striker = 50\n\t\tThe many sources of unpredictable, disorderly input send many drone processors into loops, making them easy to dispatch, though a few manage to make it past your defense.  \n\t*if fleet_striker \u003c 50\n\t\tUnfortunately, you would need many more fighters to effectively confound them.  \n*if (str_aggro = true) and (str_skilly = true)\n\tYour strikers attempt to position themselves within the drones' formations, to plant mines directly on the enemy fighters.  \n\t*if fleet_striker > 50\n\t\tThey execute the strategy flawlessly, and glide out of blast range long before the explosions begin.  The enemy squadron is hit hard.  \n\t*if fleet_striker = 50\n\t\tThe skill of your pilots is put to the test, but many of the drones let the infiltration go undetected, and soon their squadron is being obliterated by detonations.  Only a few enemy ships make it past your defense.  \n\t*if fleet_striker \u003c 50\n\t\tUnfortunately, the skill of your pilots is simply not up to snuff, and the drones easily detect the infiltration.  \n\t \n*if (str_aggro = true) and (str_cov = true)\n\tYour strikers fill the battlespace between the approaching drones and your fleet, sending all of their fire at the incoming ships, \ are drawn helplessly to the devices, forming great clusters of metal.\n\t*if fleet_cannon = 50\n\t\tThe field becomes almost impassable for the enemy fighters, many of which find themselves drawn to the devices, pulled out of formation.  Still, some drones make it through.\n\t*if fleet_cannon \u003c 50\n\t\tIf you had more cannons to spread the devices, it might have been a more successful strategy, but as it is, there is not enough coverage.  You barely even slow the fighters down.\n\t\n*if (can_aggro = true) and (can_skilly = true)\n\tThey fire precise blasts at the power cells on the drones' bellies,   \n\t*if fleet_cannon > 50\n\t\tand create a chain reaction throughout the squadron.  The overloading vessels explode like blast mines, taking the other drones in formation along with them.  \n\t*if fleet_cannon = 50\n\t\tand manage to hit several of them, causing destructive overloads that transform the vessels into enormous blast mines.  The unlucky drones beside them in formation don't stand a chance.  \n\t*if fleet_cannon \u003c 50\n\t\tand miss.\n\t\n*if (can_aggro = true) and (can_cov = true)\n\tThey fire straight into the drones, \n\t*if fleet_cannon > 50\n\t\tdestroying many of them in the barrage.\n\t*if fleet_cannon = 50\n\t\tdestroying a good number of the drones in the barrage.\n\t*if fleet_cannon \u003c 50\n\t\ttrying to hold them back with the barrage.  The trouble is, there aren't enough cannons to pull it off.\n\t\n*if fleet_striker > 50\n\t*if fleet_cannon > 50\n\t\tIn the end, your fleet takes no damage at all, and the approaching drones are decimated.\n\t\t*set energy %-30\n\t\t*set mil_trust %+25\n\t\t*set civ_trust %+20\n\t\t*goto depart_victorious \n\t*if fleet_cannon = 50\n\t\tIn the end, your fleet takes no damage at all, and the approaching drones are decimated.\n\t\t*set energy %-30\n\t\t*set mil_trust %+25\n\t\t*set civ_trust %+20\n\t\t*goto depart_victorious\n\t*if fleet_cannon \u003c 50\n\t\tIn the end, the success of your strikers' strategy makes up for your cannons' failure, and the fleet takes no damage at all.  The approaching drones are decimated.\n\t\t*set energy %-30\n\t\t*set mil_trust %+15\n\t\t*set civ_trust %+20\n\t\t*goto depart_victorious\n*if fleet_striker = 50\n\t*if fleet_cannon > 50\n\t\tIn the end, your fleet takes no damage at all, and the approaching drones are decimated.\n\t\t*set energy %-30\n\t\t*set mil_trust %+25\n\t\t*set civ_trust %+20\n\t\t*goto depart_victorious\n\t*if fleet_cannon = 50\n\t\tIn the end, your fleet takes no damage at all, and the approaching drones are decimated.\n\t\t*set energy %-30\n\t\t*set mil_trust %+25\n\t\t*set civ_trust %+20\n\t\t*goto depart_victorious\n\t*if fleet_cannon \u003c 50\n\t\tDespite the combined forces of your arsenal, your fleet takes damage from the attack.  But you are still able to turn the tide against the ${enemy_name}.\n\t\t*set energy %-30\n\t\t*set civ_trust %+10\n\t\t*set mil_trust %+15\n\t\t*set can_coverage -10\n\t\t*set can_skill -5\n\t\t*set striker_coverage -10\n\t\t*set striker_skill -5\n\t\t*goto depart_victorious\n*if fleet_striker \u003c 50\n\t*if fleet_cannon > 50\n\t\tIn the end, the success of your cannons' strategy makes up for your strikers' failure, and the fleet takes no damage at all.  The approaching drones are decimated.  \n\t\t*set energy %-30\n\t\t*set mil_trust %+15\n\t\t*set civ_trust %+20\n\t\t*goto depart_victorious\n\t*if fleet_cannon = 50\n\t\tDespite the combined forces of your arsenal, your fleet takes damage from the attack.  But you are still able to turn the tide against the ${enemy_name}.\n\t\t*set energy %-30\n\t\t*set civ_trust %+10\n\t\t*set mil_trust %+15\n\t\t*set can_coverage -10\n\t\t*set can_skill -5\n\t\t*set striker_coverage -10\n\t\t*set striker_skill -5\n\t\t*goto depart_victorious\n\t*if fleet_cannon \u003c 50\n\t\tDespite the combined forces of your entire arsenal, your fleet takes devastating damage from the attack.  \n\t\t*set energy %-30\n\t\t*set civ_trust %-15\n\t\t*set mil_trust %-25\n\t\t*set can_coverage -20\n\t\t*set can_skill -10\n\t\t*set striker_coverage -20\n\t\t*set striker_skill -10\n\t\t*goto depart_defeated\n\n*label combined_shipyard\n*if (str_slick = true) and (str_skilly = true)\n\tYour strikers bob and weave through the shipyard, hoping to trick its defensive cannons into firing on the idle drones. \n\t*if shipyard_striker > 50\n\t\tThe yard begins to decimate itself.  \n\t*if shipyard_striker = 50\n\t\tThey are not always able to outmaneuver the cannon's advanced AI, but they are able to coerce it into landing many hits on its own quarry.  \n\t*if shipyard_striker \u003c 50\n\t\tUnfortunately, they don't have the skill to pull this maneuver off.  \n\t\n*if (str_slick = true) and (str_cov = true)\n\tYour strikers band together to tow idle drones out of formation, \n\t*if shipyard_striker > 50\n\t\tand it works better than you could have hoped.  They unsettle several ships from key positions, creating a chain reaction that unmoors more vessels.  \n\t*if shipyard_striker = 50\n\t\tand the strategy seems to work well.  Several drones in key positions are yanked out of formation, and many more drift after them.  \n\t*if shipyard_striker \u003c 50\n\t\tbut there aren't enough of them to muster the gravitational pull they need.  \n\t\n*if (str_aggro = true) and (str_skilly = true)\n\tYour strikers bob and weave through the ships of the yard, planting blast mines in key positions as they go.  \n\t*if shipyard_striker > 50\n\t\tMany drones are eliminated.  \n\t*if shipyard_striker = 50\n\t\tThey aren't able to land as many as you had hoped, but the successfully planted explosives deliver palpable hits.  \n\t*if shipyard_striker \u003c 50\n\t\tUnfortunately, they aren't skillful enough to land many of them at all.  \n\t\n*if (str_aggro = true) and (str_cov = true)\n\tYour strikers blast away at the shipyard, hitting every vessel in sight.  \n\t*if shipyard_striker > 50\n\t\tWith their sheer numbers, it proves a brutal but effective strategy.  \n\t*if shipyard_striker = 50\n\t\tMany of the idle drones are obliterated.\n\t*if shipyard_striker \u003c 50\n\t\tUnfortunately, you don't have enough fighters to make a go of it.  \n\t\n*if shipyard_striker > 50\n\t*if shipyard_cannon > 50\n\t\tAs for your cannons, they are every bit as successful in their own attack.  \n\t*if shipyard_cannon = 50\n\t\tAs for your cannons, they are only somewhat successful in their own attack.  \n\t*if shipyard_cannon \u003c 50\n\t\tAs for your cannons, their own attack is unsuccessful.  \n*if shipyard_striker = 50\n\t*if shipyard_cannon > 50\n\t\tAs for your cannons, their own attack is far more successful.  \n\t*if shipyard_cannon = 50\n\t\tAs for your cannons, their own attack is also somewhat successful.  \n\t*if shipyard_cannon \u003c 50\n\t\tAs for your cannons, their own attack is unsuccessful.  \n*if shipyard_striker \u003c 50\n\t*if shipyard_cannon > 50\n\t\tAs for your cannons, their own attack is a huge success.  \n\t*if shipyard_cannon = 50\n\t\tAs for your cannons, their own attack is at least partially successful.  \n\t*if shipyard_cannon \u003c 50\n\t\tAs for your cannons, their failure is every bit as disastrous.  \n*if (can_slick = true) and (can_skilly = true)\n\tThey fire scramblers directly at the devices responsible for holding the shipyard's idle drones in formation, \n\t*if shipyard_cannon > 50\n\t\tlanding many direct hits.  \n\t*if shipyard_cannon = 50\n\t\tlanding a few direct hits.\n\t*if shipyard_cannon \u003c 50\n\t\tbut the shots miss.\n\t\n*if (can_slick = true) and (can_cov = true)\n\tThey volley hundreds of gravity mines deep into the shipyard, in the hopes of disrupting its formation.  \n\t*if shipyard_cannon > 50\n\t\tThe strategy proves a success.  \n\t*if shipyard_cannon = 50\n\t\tThe strategy proves only partially successful.  \n\t*if shipyard_cannon \u003c 50\n\t\tHere, your low coverage proves an obstacle, and the strategy fails.\n\t\n*if (can_aggro = true) and (can_skilly = true)\n\tThey fire precise blasts at the power cells on the idle drones' bellies, \n\t*if shipyard_cannon > 50\n\t\tcreating a chain reaction throughout the shipyard.  The overloading vessels explode like blast mines, taking the other nearby drones with them.  \n\t*if shipyard_cannon = 50\n\t\tand manage to hit several of them, causing destructive overloads that transform the vessels into enormous blast mines, and taking many nearby drones with them.  \n\t*if shipyard_cannon \u003c 50\n\t\tand miss.\n\t\n*if (can_aggro = true) and (can_cov = true)\n\tThey attempt to visit a massive hail of cannon fire onto the shipyard.  \n\t*if shipyard_cannon > 50\n\t\tThose vessels not destroyed by direct hits are shaken by the blasts.  \n\t*if shipyard_cannon = 50\n\t\tThey are only partially successful, though many cannons land direct hits, and other drones are shaken by the blasts.  \n\t*if shipyard_cannon \u003c 50\n\t\tIn this they fail, lacking the coverage necessary to make such a sizable attack successful.\n\t\n*if shipyard_striker > 50\n\t*if shipyard_cannon > 50\n\t\tYour combined attack proves devastating.  The shipyard's full supply of drones is sent spinning into the Null Zone, lost forever.  \n\t\t*set yard_win true\n\t\t*set drone_production 50\n\t\t*set yard_destroyed true\n\t\t*set mil_trust %+10\n\t\t*set energy %-30\n\t\t*goto double_guilt\n\t*if shipyard_cannon = 50\n\t\tYour combined attack proves devastating.  The shipyard's full supply of drones is sent spinning into the Null Zone, lost forever.  \n\t\t*set yard_win true\n\t\t*set drone_production 50\n\t\t*set yard_destroyed true\n\t\t*set mil_trust %+10\n\t\t*set energy %-30\n\t\t*goto double_guilt\n\t*if shipyard_cannon \u003c 50\n\t\tIn the end, your striker attack makes up for the failure of your cannons, and a devastating blow is struck to the shipyard.  Its full supply of drones is sent spinning into the Null Zone, lost forever.  \n\t\t*set yard_win true\n\t\t*set drone_production 50\n\t\t*set yard_destroyed true\n\t\t*set mil_trust %+10\n\t\t*set energy %-30\n\t\t*goto double_guilt\n*if shipyard_striker = 50\n\t*if shipyard_cannon > 50\n\t\tYour combined attack proves devastating.  The shipyard's full supply of drones is sent spinning into the Null Zone, lost forever.  \n\t\t*set yard_win true\n\t\t*set drone_production 50\n\t\t*set yard_destroyed true\n\t\t*set mil_trust %+10\n\t\t*set energy %-30\n\t\t*goto double_guilt\n\t*if shipyard_cannon = 50\n\t\tDespite the partial success of both attacks, their combined effect proves devastating.  The shipyard's full supply of drones is sent spinning into the Null Zone, lost forever.  \n\t\t*set yard_win true\n\t\t*set drone_production 50\n\t\t*set yard_destroyed true\n\t\t*set mil_trust %+10\n\t\t*set energy %-30\n\t\t*goto double_guilt\n\t*if shipyard_cannon \u003c 50\n\t\tIn the end, only your strikers have any success in this attack, sending about half of the idle drones spinning into the Null Zone forever.  That said, some brave pilots pay for this achievement with their lives, thanks to the yard's defensive cannon.  \n\t\t*set yard_win true\n\t\t*set drone_production 75\n\t\t*set yard_damaged true\n\t\t*set mil_trust %+5\n\t\t*set energy %-30\n\t\t*set striker_coverage -10\n\t\t*set striker_skill -5\n\t\t*goto double_guilt\n*if shipyard_striker \u003c 50\n\t*if shipyard_cannon > 50\n\t\tIn the end, your cannon attack makes up for the failure of your strikers, and a devastating blow is struck to the shipyard.  Its full supply of drones is sent spinning into the Null Zone, lost forever.  \n\t\t*set yard_win true\n\t\t*set drone_production 50\n\t\t*set yard_destroyed true\n\t\t*set mil_trust %+10\n\t\t*set energy %-30\n\t\t*goto double_guilt \n\t*if shipyard_cannon = 50\n\t\tIn the end, only your cannons have any success in this attack, sending about half of the idle drones spinning into the Null Zone forever.  Many pilots pay for the failed strategy with their lives, picked off by the yard's defensive cannon.  \ \t*if facility_striker = 50\n\t\tand they are somewhat successful, creating a minor tremor that spreads gradually.  \n\t*if facility_striker \u003c 50\n\t\tbut they fail to hit the mark.  They simply haven't the skill to execute the maneuver.  \n\t\n\t\n*if (str_aggro = true) and (str_cov = true)\n\tYour strikers spread out over the city and rain destruction onto it.  \n\t*if facility_striker > 50\n\t\tThey are highly successful.  \n\t*if facility_striker = 50\n\t\tThey manage to hit a few key targets.  \n\t*if facility_striker \u003c 50\n\t\tUnfortunately, there aren't nearly enough of them to make a dent in the defenses.  \n\t\n\t\n*if facility_striker > 50\n\t*if facility_cannon > 50\n\t\tAs for your cannons, they are every bit as successful in their own attack.  \n\t*if facility_cannon = 50\n\t\tAs for your cannons, they are only somewhat successful in their own attack.  \n\t*if facility_cannon \u003c 50\n\t\tAs for your cannons, their own attack is unsuccessful.  \n*if facility_striker = 50\n\t*if facility_cannon > 50\n\t\tAs for your cannons, their own attack is far more successful.  \n\t*if facility_cannon = 50\n\t\tAs for your cannons, their own attack is also somewhat successful.  \n\t*if facility_cannon \u003c 50\n\t\tAs for your cannons, their own attack is unsuccessful.  \n*if facility_striker \u003c 50\n\t*if facility_cannon > 50\n\t\tAs for your cannons, their own attack is a huge success.  \n\t*if facility_cannon = 50\n\t\tAs for your cannons, their own attack is at least partially successful.  \n\t*if facility_cannon \u003c 50\n\t\tAs for your cannons, their failure is every bit as disastrous.  \n\n*if (can_slick = true) and (can_skilly = true)\n\tThey fire scramblers \n\t*if facility_cannon > 50\n\t\tinto the collector cells of the city's power plant.  It's an attack that works better than you expected, not merely shutting down the power, but overloading it.  \n\t*if facility_cannon = 50\n\t\tinto the collector cells of the city's power plant.  This doesn't merely shut down the power, but overloads it in places.  \n\t*if facility_cannon \u003c 50\n\t\tat the collector cells of the city's power plant, and miss.\n\t\n\t\n*if (can_slick = true) and (can_cov = true)\n\tThey attempt to litter the city with scramblers, \n\t*if facility_cannon > 50\n\t\tand this works better than you expected, not merely shutting down the power, but overloading it.  \n\t*if facility_cannon = 50\n\t\tand this works adequately, not merely shutting down the power in places, but overloading it.  \n\t*if facility_cannon \u003c 50\n\t\twhich might have worked better if you had more cannons to spread the devices effectively.  With the scant few you have, the strategy fails.\n\t\n\t\n*if (can_aggro = true) and (can_skilly = true)\n\tThey fire precise shots at the atmosphere generators, aiming to destroy them outright.  \n\t*if facility_cannon > 50\n\t\tIn this they are successful, and many resulting blazes course through the city's pressurized corridors.  \n\t*if facility_cannon = 50\n\t\tIn this they are partially successful, and several resulting blazes begin to course through the city's pressurized corridors.\n\t*if facility_cannon \u003c 50\n\t\tBut the shots miss.\n\t\n\t\n*if (can_aggro = true) and (can_cov = true)\n\tThey rain fire into the rock of the satellite itself, aiming to create \n\t*if (str_aggro = false) and (str_skilly = false)\n\t\ta seismic disturbance.  \n\t*if (str_aggro = true) and (str_skilly = true)\n\t\ttheir own seismic disturbance.  \n\t*if facility_cannon > 50\n\t\tThe resulting quake is astounding.  \n\t*if facility_cannon = 50\n\t\tThe minor quake that results builds gradually.  \n\t*if facility_cannon \u003c 50\n\t\tThere are, however, not enough cannons in your arsenal to make a success of this attack.  \n\t\n\t\n*if facility_striker > 50\n\t*if facility_cannon > 50\n\t\tYour combined attack proves devastating.  Soon, the effects of massive explosions and internal fires are spreading throughout the city, as w rspace one final time, heading further into the Null Zone.  The ${enemy_name} drones do not look capable of solo phasing, and should be unable to follow you there.\n\n*if alliance_out >=25\n\tBut you know that the fleet will not have the energy to phase together again.\n*finish", "startup": "*title The Fleet\n*author Jonathan Valuckas\n*scene_list\n  startup\n  begin\n  new_dawn\n  encounter_in_the_field\n  meet_the_alliance\n  secret_city\n  the_drift\n  prepare_for_battle\n  junction\n  final_battle\n  turning_of_the_tide\n  epilogue\n\n*comment $s from meet_the_alliance\n\n\n*create plan_name \"Unknown\"\n*create enemy_name \"Classified\"\n*create enemy_type \"Unseen\"\n*create position \"Undisclosed\"\n*create integrity 50\n*create sun false\n*create wash false\n*create patt false\n*create hate_type 0\n*create battle1_damage 0\n*create battle2_victory false\n*create battle2_cruelty false\n*create battle3_civility 0\n*create battle4_victory false\n*create battle4_cruelty false\n*create battle5_victory false\n*create battle5_result 0\n*create hadhelp false\n*create envoy_speech false\n*create envoy_brig false\n*create talked_out false\n*create envoy_introduced false\n*create striker_coverage 50\n*create striker_skill 50\n*create can_coverage 50\n*create can_skill 50\n*create mine 50\n*create bat_style 50\n*create energy 80\n*create standard_deduction 20\n*create rep 50\n*create political_mana 50\n*create fuel_from_alliance false\n*create str_cov_up false\n*create str_skill_up false\n*create can_cov_up false\n*create can_skill_up false\n*create fuel_up false\n*create civ_like true\n*create civ_trust 50\n*create mil_trust 50\n*create coercion false\n*create revolt_success true\n*create grixtory 0\n*create deadly_blackout false\n*create stasis false\n*create wait_weeks 0\n*create skeletons 0\n*create alliance_out 50\n*create alliance_true 50\n*create tayu_doubt false\n*create original_out 50\n*create demian_out 50\n*create demian_trust true\n*create goodguy false\n*c  can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n*if civ_trust > 50\n\t*set unrest 11\n*if (civ_trust \u003c=50) and (civ_trust > 40)\n\t*set unrest 12\n*if civ_trust \u003c=40\n\t*set unrest 14\n*set saved_unrest unrest\nOnce more your fleet enters a formation drift, and the hyperspace engines power down.  All else is quiet until Officer Sarrell requests a secure meeting.\n\nIt is unusual to see Officer Sarrell at all, stationed as he is in the Communication Room.  When you arrive in the diplomatic chamber, you can see that the man is unnerved, sitting rigidly in his chair.  He waits until the doors are sealed to begin speaking.  \n*if unrest \u003c 12\n\t*set kelos_established true\n\t\"We are overhearing some alarming chatter from the Kelos, a corporate-class ship.  Their security force has been sowing dissent over the civilian channels, spreading fear about the Grix, and urging the other civilians to take the fleet out of the Null Zone by force.  It seems they see an opportunity here.\"\n\t\n\t*goto post_corporate\n*if unrest >=12\n\t\"It is my duty to report some alarming chatter, overheard on the civilian channels.  At first it was just common citizens frightened of the Grix, but there is other talk, too.  About taking the fleet out of the Null Zone by force.\"\n\t\n\tYou ask whether the problematic chatter can be traced to any specific ships.  Officer Sarell nods deliberately.  \"The most dangerous talk is coming from the corporate-class ships, the ones with private security forces.  If you ask me, they see an opportunity here.  But the talk is growing too, spreading to the other vessels.\"\n\t*goto post_corporate\n*label post_corporate\n\n*if unrest \u003c 12\n\t\"Though it sounds like a small problem right now,\" Demian suggests, \"it could grow if we don't act.  And your popularity with the civilians may not be enough to prevent that.\"\n*if (unrest >=12) and (unrest \u003c 14)\n\t\"He says the talk is getting worse,\" Demian points out.  \"If we don't act now, we'll have an even bigger problem on our hands.\"  \n*if unrest >=14\n\t\"It may already be too late to rein this in,\" Demian points out.  \n*choice\n\t*if unrest >=12\n\t\t#Deploy military personnel from your ships to the problematic merchant vessels.\n\t\t\t*set mil_trust %+10\n\t\t\t*goto your_orders\n\t*if unrest \u003c 12\n\t\t#Deploy military personnel from your ships to the Kelos.\n\t\t\t*set mil_trust %+10\n\t\t\t*goto your_orders\n\t#Address the issue in a transmission to the civilians.\n\t\tYou order Officer Sarell to link the bridge intercom to the civilian ships.  What message will you send to the people?\n\t\t*label address_choices\n\t\t*choice\n\t\t\t#Issue a clear challenge to those who would dare sow dissent.\n\t\t\t\t*set mil_trust %+10\n\t\t\t\tAs you address the faceless masses of ${plan_name}, you have no immediate way of knowing how your words will be received.  That said, it is clear that your military comrades on the bridge appreciate the direct approach you've taken.\n\t\t\t\t\n\t\t\t\t*if unrest >=12\n\t\t\t\t\t*set unrest +1\n\t\t\t\t\t*set civ_trust %-10\n\t\t\t\t\tBut a few days later, Sarell reports to you privately that the chatter over the civilian channels has merely switched to encrypted lines, where it is growing at an alarming rate.  If anything, it appears that your speech has only made the situation worse.\n\t\t\t\t\t*goto drift_dilemma_1\n\t\t\t\t*else\n\t\t\t\t\t*set unrest -1\n\t\t\t\t\t*set civ_trust %+10\n\t\t\t\t\tA few days later, Sarell reports to you what's he's heard over the civilian channels.  It seems that most people stand in solidarity with you, against the dissenters.  They do not want more chaos in the fleet.  \n\t\t\t\t\t*if kelos_established = true\n\t\t\t\t\t\tAs for the chatter on the Kelos, it is still there, but has switched to encrypted lines.\n\t\t\t\t\t\t*goto drift_dilemma_1\n\t\t\t\t\t*else\n\t\t\t\t\t\tAs for the chatter on the merchant vessels, it is still there, but has switched to their encrypted lines.\n\t\t\t\t\t\t*goto drift_dilemma_1\n\n\t\t\t#Urge commonality during this time of distress.\n\t\t\t\t*set unrest -1\n\t\t\t\t*set civ_trust %+10\n\t\t\t\t*set mil_trust %-10\n\t\t\t\tAs you address the faceless masses of ${plan_name} from your perch on the bridge, you can sense the discomfort of your military peers.  Perhaps they feel that you are going too easy on the dissenters.\n\t\t\t\t\n\t\t\t\tIt is several days before you learn the civilian reaction, which Sarell reports to you in private.  He says that many people on the passenger craft are voicing support for your position, and have taken your words to heart.  \n\t\t\t\t*if unrest >=12\n\t\t\t\t\tBut he also notes a sharp rise in encrypted chatter aboard the merchant ships since your speech.  Your problem may have merely gone underground.\n\t\t\t\t\t*goto drift_dilemma_1\n\t\t\t\t*else\n\t\t\t\t\t*if Kelos_established = true\n\t\t\t\t\t\tThe chatter on the Kelos vessel dies down, but it does not go away completely.  Some lines on the ship remain suspiciously active, only now they are over encrypted channels.\n\t\t\t\t\t\t*goto drift_dilemma_1\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe chatter on the merchant vessels dies down, but it does not go away completely.  Some lines on the ships remain suspiciously active, over encrypted channels.\n\t\t\t\t\t\t*goto drift_dilemma_1\n\t\t\t*hide_reuse #Explain that your fleet's energy levels prevent departure from the Null Zone.\n\t\t\t\t\tUntil now, all details related to your energy reserves have been considered classified.  Are you sure that you want to disclose this information now?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Yes, tell them the truth.\n\t\t\t\t\t\t\t*set policy_of_truth true\n\t\t\t\t\t\t\t*set unrest +2\n\t\t\t\t\t\t\t*set civ_trust %-20\n\t\t\t\t\t\t\tOfficer Sarell reports an explosion of panicked chatter over the channels from common civilians, whose anxiety level has jumped to new heights after your revelation that the fleet is, in effect, trapped in the Null Zone.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAs for the treacherous chatter that Officer Sarell had reported previously, it seems to have disappeared.  However, he notes that there has been a noticeable jump in usage on the merchant ships' encrypted lines.  He theorizes that the conspiracy has not gone away, merely gone underground, and from the sheer amount of chatter he is registering, it is growing fast.\n\t\t\t\t\t\t\t*goto drift_dilemma_1\n\n\t\t\t\t\t\t#No, I have another idea.\n\t\t\t\t\t\t\tWhat is it?\n\t\t\t\t\t\t\t*goto address_choices \n\n\t\t\t\t\n\t#Order Sarell to continue monitoring civilian communications.\n\t\t*set exposed_hand false\n\t\t*if mil_trust \u003c=50\n\t\t\t*set outburst true\n\t\t\tLieutenant Demian reacts as though you've thrown ice water in her face.\n\t\t\t\n\t\t\t\"Are you serious?!\" she asks.  \"We're going to do nothing?\"  She is highly agitated.\n\t\t\t\n\t\t\tYou explain...\n\t\t\t*choice\n\t\t\t\t#...nothing, and let Demian's reaction go unaddressed.\n\t\t\t\t\tWhen she sees that you do not even plan to acknowledge her reaction, she storms out of the diplomatic chamber ahead of you.\n\t\t\t\t\t*goto consequences_of_patience\n\n\t\t\t\t#...that you cannot risk acknowledging to the dissenters that you are monitoring their communications channels.\n\t\t\t\t\tLieutenant Demian seems unconvinced by your strategy, but your response ends the discussion.  By replying to her with patience, you have shown her that you respect her.  Whether that respect is returned is another matter.\n\t\t\t\t\t*goto consequences_of_patience\n\n\t\t\t\t#...that your drift through the Null Zone will prove ordeal enough for your people, without giving credence to paranoid civilian chatter.\n\t\t\t\t\tLieutenant Demian seems unconvinced by your strategy, but your response ends the discussion.  By replying to her with patience, you have shown her that you respect her.  Whether that respect is returned is another matter.\n\t\t\t\t\t*goto consequences_of_patience\n\t\t\t\t#...that violence toward your own people would logically follow from any confrontation, and this you cannot allow.\n\t\t\t\t\tLieutenant Demian seems unconvinced by your strategy, but your response ends the discussion.  By replying to her with patience, you have shown her that you respect her.  Whether that respect is returned is another matter.\n\t\t\t\t\t*goto consequences_of_patience\n\t\t\t\t#...that as Captain of this vessel, you will do as you damn well please.\n\t\t\t\t\tYour firm response ends the argument here.  When you leave the diplomatic chamber, Lieutenant Demian walks quickly ahead of you down the corridor.  By the time you get to the lift, she is gone from your sight.\n\t\t\t\t\t*goto consequences_of_patience\n\n\t\t*else\n\t\t\tYou can see that Lieutenant Demian is surprised by your decision, but she trusts your judgment.  Time will tell if you were correct.\n\t\t\t\n\t\t\tWhat was the reason for your choice?\n\t\t\t*choice\n\t\t\t\t#Any acknowledgement that you are monitoring the civilian communication channels will merely alert the dissenters, making them more likely to hide their activities.\n\t\t\t\t\t*goto consequences_of_patience\n\t\t\t\t#We are adrift in the Null Zone with no end to our ordeal in sight.  There are larger matters to consider at the moment than civilian chatter.\t\n\t\t\t\t\t*goto consequences_of_patience\n\t\t\t\t#The inevitable result of confronting the dissenters directly will be violence toward our own people.\n\t\t\t\t\t*goto consequences_of_patience\n\n*label your_orders\n*set occupied true\n*if unrest \u003c 12\n\t*set occupation_level 25\n*if (unrest >=12) and (unrest \u003c 14)\n\t*set occupation_level 50\n*if (unrest >=14)\n\t*set occupation_level 75\n*if kelos_established = true\n\tWhat orders do you issue to the service personnel you are deploying to the Kelos ship?\n*if kelos_established = false\n\tWhat orders do you issue to the service personnel you are deploying to the corporate ships?\n*choice\n\t*if kelos_established = true\n\t\t#Urge them to refrain from violence toward the Kelos security personnel.\n\t\t\tThese are civilians, after all.  You order the soldiers only to keep careful watch over the Kelos ship, and to recall that their role is to keep the peace.  \n\t\t\t*if mil_trust \u003c=50\n\t\t\t\t*set unrest +2\n\t\t\t\t*set civ_trust %-20\n\t\t\t\t*set confrontation true\n\t\t\t\tUnfortunately, your orders are not strictly obeyed, and reports of violence toward the Kelos security forces, even toward the merchants themselves, soon begin to surface.\n\t\t\t\t\n\t\t\t\tThere is no hiding this news from the rest of the civilians, and soon Officer Sarell reports that chatter is on the rise, although it has switched to encrypted channels.  Only time will tell whether this will lead to outright revolt.\n\t\t\t\t*goto occupied_trauma\n\t\t\t*else\n\t\t\t\t*set unrest -1\n\t\t\t\t*set civ_trust %+10\n\t\t\t\tThey respect your commands.\n\t\t\t\t\n\t\t\t\tAfter a few days, Officer Sarell notes that most common civilians, and even many of the merchants from the other corporate vessels, are voicing approval for your assertive maneuver.  As for the dangerous chatter aboard the Kelos, it has disappeared, though there is now a suspicious amount of activity on their encrypted lines...\n\t\t\t\t*goto drift_dilemma_1\n\n\t*if kelos_established = false\n\t\t#Urge them to refrain from violence toward the merchant ships' security personnel.\n\t\t\tThese are civilians, after all.  You order the soldiers to keep careful watch over the merchant ships, but to recall that their role is to keep the peace.  \n\t\t\t*if mil_trust \u003c=50\n\t\t\t\t*set confrontation true\n\t\t\t\t*set unrest +2\n\t\t\t\t*set civ_trust %-20\n\t\t\t\tUnfortunately, your orders are not strictly obeyed, and reports of violence toward corporate security forces, even toward the merchants themselves, begin to surface.\n\t\t\t\t\n\t\t\t\tThere is no hiding this news from the rest of the civilians, and soon Officer Sarell reports that chatter is on the rise, now over encrypted lines.  Only time will tell whether this will lead to outright revolt.\n\t\t\t\t*goto occupied_trauma\n\t\t\t*else\n\t\t\t\tYour comrades respect your commands.\n\t\t\t\t*set unrest -1\n\t\t\t\t*set civ_trust %+10\n\t\t\t\t*if unrest >=14\n\t\t\t\t\tAfter a few days, Officer Sarell notes there is widespread civilian support for your maneuver from the common civilians, and that dangerous chatter aboard the merchant ships has nearly disappeared.  But there has also been a suspicious amount of chatter over the encrypted lines...\n\t\t\t\t\t*goto drift_dilemma_1\n\t\t\t\t*else\n\t\t\t\t\tAfter a few days, Officer Sarell notes that dangerous chatter aboard the transport vessels and merchant ships seems to have diminished somewhat.  But there is also a noticeable rise in chatter over the encrypted lines.  Only time will tell if this will grow into outright revolt...\n\t\t\t\t*goto drift_dilemma_1\n\t\t\t\t\t\n\t*if unrest \u003c 12\n\t\t#Tell them that they should consider the Kelos ship to be hostile territory.\n\t\t\t*set confrontation true\n\t\t\t*set unrest +2\n\t\t\t*set civ_trust %-20\n\t\t\t*set mil_trust %+10\n\t\t\tYour soldiers do what they can to assert their authority aboard the Kelos vessel, disarming the security forces directly in a series of planned encounters.  Officer Sarell reports that chatter over the lines almost immediately begins to rise, this time over encrypted channels.  Only time will tell whether this will lead to outright revolt.\n\t\t\t*goto occupied_trauma\n\n\t*if unrest >=12\n\t\t#Tell them that they should consider the corporate vessels to be hostile zones.\n\t\t\t*set confrontation true\n\t\t\t*set unrest +2\n\t\t\t*set civ_trust %-20\n\t\t\t*set mil_trust %+10\n\t\t\tYour soldiers do what they can to assert their authority aboard the merchant vessels, disarming the security forces in a series of planned encounters, many of which turn violent.  Officer Sarell reports that chatter over the lines almost immediately begins to rise, this time over encrypted channels.  Only time will tell whether this will lead to outright revolt.\n\t\t\t*goto occupied_trauma\n\n*label occupied_trauma\nWhat will you do now?\n*choice\n\t*if kelos_established = true\n\t\t#Deploy more officers to additional merchant vessels if the chatter continues to spread.\n\t\t\tA growing threat must be matched with growing force.\n\t\t\t*set dispatch_check true\n\t\t\t*goto drift_dilemma_1\n\t*if kelos_established = true\n\t\t#Withdraw your officers from the Kelos.\n\t\t\tYou are brave enough to admit when a plan has failed.\n\t\t\t*set occupation_level 0\n\t\t\t*goto drift_dilemma_1\n\t*if kelos_established = false\n\t\t#Deploy more officers to additional merchant vessels as the chatter spreads.\n\t\t\tA growing threat must be matched with growing force.\n\t\t\t*set dispatch_check true\n\t\t\t*goto drift_dilemma_1\n\t*if kelos_established = false\n\t\t#Withdraw your officers from the merchant ships.\n\t\t\tYou are brave enough to admit when a plan has failed.\n\t\t\t*set occupation_level 0\n\t\t\t*goto drift_dilemma_1\n\t\n*label consequences_of_patience\n*set unrest +1\n*set civ_trust %-10\n*if unrest >=12\n\t\n\tAs you requested, Officer Sarell gives you regular reports about the chatter aboard the corporate vessels, which continues as fearlessly as before, and even grows.  But now you know that if concrete plans begin to form, you will be one step ahead of the dissenters.\n\t\n*if unrest \u003c 12\n\t\n\tAs you requested, Officer Sarell gives you regular reports about the chatter aboard the Kelos vessel, which continues as fearlessly as before.  But you know now that if the talk begins to grow into something more than idle words, you will be one step ahead of the enemy...\n*label drift_dilemma_1\n*page_break\nOnce again, you order Engineering to update you in your cabin on the state of your reserves.  \n*if energy >=25\n\t*set surplus true\n\tThey are by no means high, but they are perhaps as good as can be expected:\n\t\n*if (energy \u003c 25) and (energy > 19)\n\tThey are by no means high:\n\t\n*if energy \u003c=19\n\tThey are already dangerously low:\n\t\n*stat_chart\n\tpercent energy Energy Reserves\n\n*if standard_deduction = 5\n\t\"With the ships consolidated like this, we can't really limit our energy use any further,\" the Core Operator explains.  \"Not when the civilians have got so little to share between them.  The only thing left now would be to put people in stasis.  'Course, we don't have the proper equipment to do that on this scale.  Not safely, anyway...\"\n\t\n\tThe Operator is right on both counts.  All spacefaring vessels are outfitted with the means to put passengers in some form of emergency stasis.  But only long-term science missions have a truly safe version of the technology.\n\t\n\tWith luck, your people will never need to take this path...\n\t*goto grix_1\n*if standard_deduction = 10\n\t\"Consolidation is the only one way we can really limit our energy use any further now,\" the Operator notes.  \"Short of charging up the stasis units...\"\n\t\n\tYou can't tell if he's serious about the stasis units.  Granted, all spacefaring vessels are outfitted with the means to put passengers in some form of emergency stasis.  But only long-term science missions have a truly safe version of the technology.\n\t \n\tYou tell yourself that it will never come to this, and focus on the choice at hand.  \n*if standard_deduction = 15\n\t\"We can tighten the energy use if we want.  But I'd suggest we consolidate.  There's no surer way to conserve energy, short of charging up those stasis units...\"\n\t\n\tYou can't tell if he's being serious, mentioning the stasis units.  Granted, all spacefaring vessels are outfitted with the means to put passengers in some form of emergency stasis.  But only long-term science missions have a truly safe version of the technology.\n\t\n\tDo you change your current energy use limits?\n*if standard_deduction = 15\n\t*choice\n\t\t#No, continue limiting energy use at a low level.\n\t\t\tThe Operator grows silent.  You imagine you can feel his disappointment that you did not choose stricter measures.  Or is it his fear that you sense?  \n\t\t\t*label by_your_order\n\t\t\t\"By your order,\" he finally acknowledges, and breaks the link.\n\t\t\t*goto grix_1\n\t\t#Yes, impose heavy limits on energy use.\n\t\t\tThe Operator grows silent.  You imagine you can feel his disappointment that you did not choose stricter measures.  Or is it his fear you sense?  \n\t\t\t*set standard_deduction 10\n\t\t\t*goto by_your_order\n\t\t#Yes, commence consolidation.\n\t\t\t*set standard_deduction 5\n\t\t\t*gosub consolidation\n\t\t\t*goto grix_1\n\n*if standard_deduction = 10\n\t*choice\n\t\t#No, continue heavy limits on energy use.\n\t\t\t*goto by_your_order\n\t\t#Yes, shift to lighter limits on energy use, to ease the burden on the civilians.\n\t\t\t*set standard_deduction 15\n\t\t\tYou can almost see the Operator's surprised expression through the speaker when you make the announcement.  \n\t\t\t*set unrest -1\n\t\t\t*set civ_trust %+10\n\t\t\t*goto by_your_order\n\t\t#Yes, commence consolidation.\n\t\t\t*set standard_deduction 5\n\t\t\t*set unrest +1\n\t\t\t*set civ_trust %-10\n\t\t\t*gosub consolidation\n\t\t\t*goto grix_1\n\n*label consolidation\nIt takes more than two standard days to complete the consolidation process:  emptying the chosen ships of personnel and civilians, harvesting their remaining resources, and decommissioning the craft.\n\nWith the ships forced to handle more people than they were designed to hold, life support systems will be overtaxed.  Even with lights running lower to compensate, the air on the ships will be naturally thinner now, and food synthesis units will be pushed to the limit.\n\nAs you watch the dead ships drift idly into the Null Zone, you remind yourself that it had to be done.\n*return\n\n*label grix_1\n*set energy %-(standard_deduction)\n*set energy %-(standard_deduction)\n*page_break\nDuring the third week of your drift, the proximity alert sounds.  \"Detecting multiple incoming vessels,\" Ziri reports.  \"About the size of large transport ships, with inordinately high life signs...\"\n\nThe ships appear in the holographic field.  They are ridged and green, with stripes of white along their bellies.  You momentarily mistake the openings in their sides for docking bays, until you notice the teeth.  \"They're attaching to the smaller ships, piercing their hulls!  We've got reports of a breach on passenger transport twelve, another on merchant ship fifteen.  Captain, something's coming out of these organisms through the breaches.  Our ships are being boarded...\"\n\n*if energy >=22\n\tYou know you can't spare the energy for a coordinated attack.  \n*if (energy \u003c 22) and (energy > 17)\n\tYou can't spare the power for a coordinated attack, and your low energy supply has weakened your defenses.  \n\t*if striker_skill >=16\n\t\t*set striker_skill -15\n\t*if striker_skill \u003c 16\n\t\t*set striker_skill 7\n\t*if striker_coverage >=16\n\t\t*set striker_coverage -15\n\t*if striker_coverage \u003c 16\n\t\t*set striker_coverage 7\n\t*if can_skill >=16\n\t\t*set can_skill -15\n\t*if can_skill \u003c 16\n\t\t*set can_skill 7\n\t*if can_coverage >=16\n\t\t*set can_coverage -15\n\t*if can_coverage \u003c 16\n\t\t*set can_coverage 7\n\n*if energy \u003c=17\n\tYou know you can't spare the power for a coordinated attack, and your low energy supply has seriously weakened your defenses.  \n\t*if striker_skill >=26\n\t\t*set striker_skill -25\n\t*if striker_skill \u003c 26\n\t\t*set striker_skill 7\n\t*if striker_coverage >=26\n\t\t*set striker_coverage -25\n\t*if striker_coverage \u003c 26\n\t\t*set striker_coverage 7\n\t*if can_skill >=26\n\t\t*set can_skill -25\n\t*if can_skill \u003c 26\n\t\t*set can_skill 7\n\t*if can_coverage >=26\n\t\t*set can_coverage -25\n\t*if can_coverage \u003c 26\n\t\t*set can_coverage 7\nYou employ only...\n*choice\n\t#Strikers\n\t\t*goto strikers_1\n\t#Cannons\n\t\t*goto cannons_1\n\n*label strikers_1\nHow will you employ your strikers?\n*choice\n\t#Separate the creatures from the ships using tow beams.\n\t\t*if striker_coverage > 60\n\t\t\t*set grixtory 75\n\t\t\t*set bat_style %-20\n\t\t\tThe strikers wrest the creatures free of the besieged ships, and they flee into the void.  \n\t\t\t*goto after_grix\n\t\t*if (striker_coverage \u003c=60) and (striker_coverage > 45)\n\t\t\t*set grixtory 50\n\t\t\t*set bat_style %-10\n\t\t\tThe strikers wrest some of the creatures free of the besieged ships, but others hang on.  It takes longer than you hoped to rid your fleet of them all.  \n\t\t\t*goto after_grix\n\t\t*else\n\t\t\t*set grixtory 25\n\t\t\tYour strategy is barely effective.  \n\t\t\t*if energy \u003c 22\n\t\t\t\tYour strikers simply don't have the coverage to wrest them free, especially after the reductions imposed by your energy shortage.  \n\t\t\t\t*gosub loiter\n\t\t\t\t*goto after_grix\n\t\t\t*else\n\t\t\t\tYour strikers simply don't have the coverage to wrest them free.  \n\t\t\t\t*gosub loiter\n\t\t\t\t*goto after_grix\n\t#Blast the creatures' sight organs out with precise shots.\n\t\t*if striker_skill > 60\n\t\t\t*set grixtory 75\n\t\t\t*set bat_style %+20\n\t\t\tAfter only a few precise shots have landed in the creatures' eyes, they detach and flee with remarkable speed.  \n\t\t\t*goto after_grix\n\t\t*if (striker_skill \u003c=60) and (striker_skill > 45)\n\t\t\t*set grixtory 50\n\t\t\t*set bat_style %+10\n\t\t\tIt takes more shots than you had hoped to scare the creatures away, but they eventually depart.  \n\t\t\t*goto after_grix\n\t\t*else\n\t\t\t*set grixtory 25\n\t\t\t*if energy \u003c 22\n\t\t\t\tYour strikers simply don't have the skill to scare them off, especially with weapons operating at \t\t\t*goto after_grix\n\t\t*else\n\t\t\t*set grixtory 25\n\t\t\t*if energy \u003c 22\n\t\t\t\tYour cannons simply don't have the skill to scare them off, especially with weapons operating at suboptimal functionality.  \n\t\t\t\t*gosub loiter\n\t\t\t\t*goto after_grix\n\t\t\t*else\n\t\t\t\tYour cannons don't have the skill to cause the damage you were hoping to inflict.  \n\t\t\t\t*gosub loiter\n\t\t\t\t*goto after_grix\n\n\t#Riddle the creatures with puncture-holes, to depressurize their bodies.\n\t\t*if can_coverage > 60\n\t\t\tAfter bringing the full brunt of your cannons to bear on the bodies of the creatures, some of them flee, and others simply collapse slightly, and drift off.  \n\t\t\t*set grixtory 75\n\t\t\t*set bat_style %+20\n\t\t\t*goto after_grix\n\t\t*if (can_coverage \u003c=60) and (can_coverage > 45)\n\t\t\tYou bring the full brunt of your cannons to bear on the bodies of the creatures.  Some of them collapse slightly, and drift off.  Others remain attached to the fleet's civilian vessels for longer than you would have liked. \n\t\t\t*set grixtory 50\n\t\t\t*set bat_style %+10\n\t\t\t*goto after_grix\n\t\t*else\n\t\t\t*if energy \u003c 22\n\t\t\t\tYou don't have the coverage to cause the damage you were hoping to inflict, perhaps due to your dwindling energy supply.  \n\t\t\t\t*gosub loiter\n\t\t\t\t*goto after_grix\n\t\t\t*else\n\t\t\t\tYou don't have the coverage to cause the damage you were hoping to inflict.  \n\t\t\t\t*gosub loiter\n\t\t\t\t*goto after_grix\n\n\t#Frighten the creatures away with sharp shots to nearby fuel lines.\n\t\t*if can_skill > 60\n\t\t\tYour cannons hit some of the exposed fuel lines near the creatures, and they respond accordingly, releasing the ships and sailing on.  \n\t\t\t*set grixtory 75\n\t\t\t*set bat_style %-20\n\t\t\t*goto after_grix\n\t\t*if (can_skill \u003c=60) and (can_skill > 45)\n\t\t\tYour cannons try to hit some of the exposed fuel lines near the creatures, and you are able to scare a few away.  But some remain for longer, only leaving of their own volition. \n\t\t\t*set grixtory 50\n\t\t\t*set bat_style %-10\n\t\t\t*goto after_grix\n\t\t*else\n\t\t\t*set grixtory 25\n\t\t\t*if energy \u003c 22\n\t\t\t\tEven your sharpest pilots have difficulty operating these energy-tapped vessels.  They are unable to hit enough of the fuel lines.  \n\t\t\t\t*gosub loiter\n\t\t\t\t*goto after_grix\n\t\t\t*else\n\t\t\t\tYour pilots have difficulty hitting the fuel lines.  \n\t\t\t\t*gosub loiter\n\t\t\t\t*goto after_grix\n\n*label loiter\nThe creatures remain attached to your vessels for quite a long time before moving.\n*return\n\n*label after_grix\n*if bat_style \u003c 50\n\t*set rakashi true\n\n\nLater, on the bridge's monitor, you review security footage from a freighter that was attacked by one of the alien juggernauts.\n\nAfter the hull is breached, a writhing crowd of featureless humanoids emerges into the ${plan_name} ship's corridor, from inside the monster.  They shamble through the unfortunate vessel, carrying their victims back into the darkness.\n\nSo these are the Grix.  Not pirates at all, but symbionts residing within the living ships, collecting food for their hosts.  When you can bear to watch no more, you order the playback stopped.  \n*if grixtory \u003c 50\n\t*set unrest +2\n\t*set civ_trust %-20\n\t*set skeletons +1\n\tYou cannot help but wonder how many more of your people endured this fate today, \t\t\n\t*if unrest >=12\n\t\tand how your failed defense will affect the growing civilian unrest.\n\t*if unrest \u003c 12\n\t\tand how your failed defense will affect the civilians as the days wear on.\n*if grixtory = 50\n\t*if unrest >=12\n\t\tWhat has happened on this day will do little to curb the growing civilian unrest.  \n\t*if unrest \u003c 12\n\t\tWhat has happened on this day will affect your civilians in ways you can only imagine.  \n\t*set unrest +1\n\t*set civ_trust %-10\n*if grixtory > 50\n\t*set unrest -1\n\t*set civ_trust %+10\n\tYou are grateful that only a few of your people were forced to endure such a horrific fate.  Hopefully, your successful defense will eradicate some of the civilian unrest.\n*page_break\n*if exposed_hand = false\n\t*goto takecharge\n*if dispatch_check = true\n\t*if unrest >=14\n\t\t\t*set occupation_level 75\n\t\t\t*goto two_days\n\t*if unrest >=12\n\t\t\t*set occupation_level 50\n\t\t\t*goto two_days\n*label two_days\n*if occupation_level = 0\n\tTwo days later, the alert sounds on the bridge.  Zagi reports: \n*if occupation_level > 0\n\tTwo days later, you lose contact with your forces aboard \n\t*if occupation_level = 25\n\t\tthe Kelos ship.  \n\t*if occupation_level >=50\n\t\tthe merchant ships.  Then Zagi reports:  \n*if unrest >=12\n\t\"We've got corporate vessels launching personnel transports, straight for our capital ships!\"\n\t\n*if unrest \u003c 12\n\t\"Kelos has begun launching its personnel transports for our capital ships!\"\n\t\nYou give the order that the landing bays be closed, but Zagi can't follow through.  \"They've hacked the docking codes, Captain...\"\n\n\n*label launched_attack\nYou watch the tiny transport vessels in the holographic field, as they make their way through the fleet.\n\n\"Their ships have no outboard weapons,\" Lieutenant Demian notes.  \"They're depending on us not to open fire.  But this is treason, plain and simple.\"\n*choice\n\t#You agree with Lieutenant Demian.  Open fire on the approaching traitors.\n\t\t*gosub revolution_matrix\n\t\t*goto results_matrix\n\t#You cannot fire on an unarmed vessel.  Allow the transports to land on the capital ships, where your infantry can engage these attackers on even terms.\n\t\t*gosub revolution_matrix\n\t\t*goto landing_bay_confrontation\n\t*if confrontation = true\n\t\t#You cannot allow any more violence toward your own civilians.  Allow the transport vessels to land on the capital ships, and issue the fleet's surrender.\n\t\t\t*set surrendertron true\n\t\t\t*goto surrender\n\t*if confrontation = false\n\t\t#You cannot allow any violence toward your own civilians.  Allow the transport vessels to land on the capital ships, and issue the fleet's surrender.\n\t\t\t*set surrendertron true\n\t\t\t*goto surrender\n\n*label takecharge\nAnother week passes, and Officer Sarrell reports that \n*if saved_unrest >=14\n\t*if unrest >=14\n\t\tthe threatening chatter is as rife as ever. \n\t*if (unrest >=12) and (unrest \u003c 14)\n\t\talthough the threatening chatter has lessened somewhat, there are still multiple ships engaged in it.  \n\t*if unrest \u003c 12\n\t\talthough threatening chatter has died down considerably, there is one merchant ship in particular that still seems to be rife with it, under the command of Kelos corporation.  \n*if (saved_unrest >=12) and (saved_unrest \u003c 14)\n\t*if unrest >=14\n\t\tthe threatening chatter is much worse than it was when it began.  The channels are exploding with activity.\n\t*if (unrest >=12) and (unrest \u003c 14)\n\t\tthe threatening chatter has not gone anywhere.  There are multiple ships engaged in it.  \n\t*if unrest \u003c 12\n\t\talthough threatening chatter has died down considerably, there is one merchant ship in particular that still seems to be rife with it, under the command of Kelos corporation.  \n\t\t*set kelos_established true\n*if saved_unrest \u003c 12\n\t*if unrest >=14\n\t\tthe chatter that began on the Kelos vessel is now everywhere.  \n\t*if (unrest >=12) and (unrest \u003c 14)\n\t\tthe threatening chatter that began on the Kelos vessel has spread to some of the other merchant ships.  \n\t*if unrest \u003c 12\n\t\tthe Kelos vessel's channels are rife with threatening chatter.  They may have failed to sow dissent among the other civilians, but that has not stopped them from plotting their own maneuver.  \n\nThankfully, your silence has given the conspirators a false sense of security.  They continue to use insecure channels, unaware that you are listening to their every word.  In a few days, Sarrell knows their plan:\n*if unrest \u003c 12\n\tThe Kelos' crew is planning to hack your docking codes, and land mercenaries on your capital ships.\n*if unrest >=12\n\tThe corporate ships are planning to hack your docking codes, and land mercenaries on your capital ships.\n\n*if outburst = true\n\t\"I was wrong,\" the Lieutenant admits.  \"You were right to bide your time.  Now we've got the traitors right where we want them.  The question is, what do we do now?\"\n*if outburst = false\n\t\"We've got these traitors right where we want them,\" Lieutenant Demian notes.  \"The question is, what do we do now?\"\n\n*if unrest \u003c 12\n\t*choice\n\t\t#Dispatch officers to the Kelos ship to disable its transport systems, and those of its passenger vessels.\n\t\t\tYou dispatch infantry to the Kelos ship.  Its security personnel do not go down without a fight, but your officers easily overturn the opposition.  With its passenger vessels disabled, the Kelos becomes little more than a floating prison for its traitorous crew, who will be tried when you return from the Null Zone.\n\t\t\t*set revolt_success false\n\t\t\t*goto fifth_week\n\t\t#Cut the Kelos ship loose from your formation, and declare it banished from your fleet.\n\t\t\tNot surprisingly, the Kelos crew disobeys your order to break off from the fleet.  You suppose they have realized that their chances of surviving an attack on your capital ships are much better than their chances of surviving in the Null Zone on their own.\n\t\t\t\n\t\t\tForced into sudden action, they launch their personnel transports, and make a mad run for your capitals, demanding over the public channel that you allow them aboard in the name of the ${plan_name} people.\n\t\t\t*choice\n\t\t\t\t#Open fire on them.\n\t\t\t\t\t*label fire_on_kelos\n\t\t\t\t\tTheir transport ships are destroyed, along with their security teams.  Officer Sarrell, who continues to monitor communication channels, reports that the people are not happy with your decision to fire on ships with no outboard weapons, but there will be no more talk of taking over the fleet now.  The civilians are firmly in their place.\n\t\t\t\t\t*set skeletons +1\n\t\t\t\t\t*set energy %-5\n\t\t\t\t\t*set revolt_success false\n\t\t\t\t\t*goto fifth_week\n\n\t\t\t\t#Allow them aboard, but have your officers waiting for them in the landing bay.\n\t\t\t\t\tYou concede to the demands of the Kelos' invaders, but with your full infantry waiting for them upon their arrival in the capital ships' landing bays, their security forces don't stand a chance.  The surviving attackers surrender within minutes, and are relegated to the brig.\n\t\t\t\t\t*set revolt_success false\n\t\t\t\t\t*goto fifth_week\n\n\t\t\t\t#Surrender the ship, it is the only way to avoid bloodshed.\n\t\t\t\t\t*goto surrender\n\n\t\t#Allow the Kelos conspirators to approach the capital ships as planned, but fire upon them as they approach.\n\t\t\tThe Kelos security team launches its personnel transports, and makes a mad run for your capital ships, demanding over the public channel that you allow them aboard in the name of the people, at which point you order your cannons to open fire.\n\n\t\t\tThe transport ships are destroyed, along with their security teams.  Officer Sarrell, who continues to monitor communication channels, reports that the people are not happy with the way this has played out, but there is no more talk of taking over the fleet.  The civilians are firmly in their place now.\n\t\t\t*set skeletons +1\n\t\t\t*set energy %-5\n\t\t\t*set revolt_success false\n\t\t\t*goto fifth_week\n\n\t\t#Allow the Kelos conspirators to board the capital ships as planned, but keep your full security team on alert, prepared for the arrival of the enemy in the landing bay.\n\t\t\tThe Kelos security team launches their personnel transports, and makes a mad run for your capital ships, demanding over the public channel that you allow them aboard in the name of the people.\n\t\t\t\n\t\t\tWith your full infantry waiting for them upon their arrival in the capital ships' landing bay, their security forces don't stand a chance.  The surviving attackers surrender within minutes, and are relegated to the brig.\n\t\t\t*set revolt_success false\n\t\t\t*goto fifth_week\n\n*if unrest >=12\n\t*choice\n\t\t#Have your officers board the problem ships, disabling their transport drives, and those of their passenger vessels.\n\t\t\t*set unprepared true\n\t\t\t*gosub mini_dispatch\n\t\t\tYou dispatch infantry to the problematic ships.  Their security personnel do not go down without a fight, and the soldiers you have dispatched prove to be outnumbered.  Your teams are taken hostage.\n\t\t\t\n\t\t\tNext, the mercenaries launch their personnel transports, and make a mad run for your capital ships, demanding over the public channel that you allow them aboard in the name of the ${plan_name} people.\t\n\t\t\t*goto sudden_action\n\n\t\t#Cut the conspiring ships loose from your formation, and declare them banished from your fleet.\n\t\t\t*set unprepared true\n\t\t\tNot surprisingly, the ships disobey your order to break off from the fleet.  You suppose they have realized that their chances of surviving an attack on your command are much better than their chances of surviving in the Null Zone on their own.\n\t\t\t\n\t\t\tForced into sudden action, they launch their personnel transports, and make a mad run for your capital ships, demanding over the public channel that you allow them aboard in the name of the ${plan_name} people.\n\t\t\t*label sudden_action\n\t\t\t*choice\n\t\t\t\t#Open fire on them.\n\t\t\t\t\t*gosub revolution_matrix\n\t\t\t\t\t*goto cannon_fire\n\n\t\t\t\t#Allow them aboard, but have your officers waiting for them in the landing bay.\n\t\t\t\t\t*gosub revolution_matrix\n\t\t\t\t\t*goto landing_bay_confrontation\n\n\t\t\t\t#Surrender the ship, it is the only way to avoid bloodshed.\n\t\t\t\t\t*goto surrender\n\t\t#Allow the conspirators to launch their attack, but open fire on them with cannons as they approach.\n\t\t\tA day later, the ships launch their personnel transports, which make a mad run for your capital ships.  A transmission over the public channel demands that you allow them aboard in the name of the people, at which point you order your cannons to open fire.\n\t\t\t\n\t\t\t*gosub revolution_matrix\n\t\t\t*goto cannon_fire\n\t\t#Allow the conspirators to board the capital ships, but keep your full security team on alert, prepared for their arrival in the landing bay.\n\t\t\tA day later, the ships launch their personnel transports, which make a mad run for the capital ships.  You allow the security teams to land.  \n\t\t\t*gosub revolution_matrix\n\t\t\t*goto landing_bay_confrontation\n\n*label surrender\nYou cannot allow this chaos to overtake your people.  Clutching the railing of the bridge overlook, you issue the order to surrender.  \n*if mil_trust \u003c=50\n\t\n\t\"Captain!\" Lieutenant Demian gasps, dumbfounded.  You explain to her, and to the others on the bridge, that your people have shed enough blood since the war began.  You repeat your order, and the Tactician relays it.  \nWithin an hour, the fleet is no longer your command!\n*goto after_the_fall\n\n*label mini_dispatch\n*if unrest >=14\n\t*set occupation_level 75\n\t*return\n*if unrest >=12\n\t*set occupation_level 50\n\t*return\n*return\n\n*label revolution_matrix\n*if unrest >=14\n\t*set revolt 90\n*if (unrest >=12) and (unrest \u003c 14)\n\t*set revolt 80\n*if unrest \u003c 12\n\t*set revolt 70\n\n*if occupation_level = 0\n\t*set revolt -30\n*if occupation_level = 25\n\t*set revolt -20\n*if occupation_level = 50\n\t*set revolt -10\n*if occupation_level = 75\n\t*comment Then you get no bonus, sorry!\n\n*if unprepared = true\n\t*set revolt -10\n\n*if open_fire = true\n\t*set revolt -10\n\n*if revolt > 50\n\t*set overtaken true\n*return\n\n*label results_matrix\n*label cannon_fire\n*if unrest \u003c 12\n\t*goto fire_on_kelos\nThe cannons blast away at the approaching transport vessels, but they can't destroy them all.  \n*label landing_bay_confrontation\n*if overtaken = true\n\t\n\tAs the civilian forces arrive in the landing bays, it becomes clear that your security teams are outnumbered!  \n\t*if occupation_level > 25\n\t\tHaving so many of your fleet's military personnel dispatched to the civilian ships must have thinned their ranks.  \n\t*goto after_the_fall\n*if overtaken = false\n\t*if open_fire = true\n\t\t\n\t\tThankfully, as the civilian security forces arrive in the landing bays, it is clear that the invaders' numbers have been sufficiently depleted.  Your defensive team is victorious in a matter of minutes, and the surviving attackers are hastened to the brig.\n\t\t*set revolt_success false\n\t\t*goto fifth_week\n\t*if open_fire = false\n\t\t\n\t\tAs the civilian security forces arrive in the landing bays, it is clear that the invaders are outnumbered.  Your teams are victorious in a matter of minutes, and the surviving attackers are hastened to the brig.\n\t\t*set revolt_success false\n\t\t*goto fifth_week\n\n*label fifth_week\n*if wait_weeks = 5\n\t*set civ_trust saved_civ_trust\n\t*set civ_trust %-(skeletons*10)\n\t*if skeletons \u003c 2\n\t\t*set civ_trust %+20\n\t*set striker_skill saved_striker_skill\n\t*set striker_coverage saved_striker_coverage\n\t*set can_skill saved_can_skill\n\t*set can_coverage saved_can_coverage\n\t*page_break\n\tDays later, a squadron of ships approaches from the mists of the Null Zone.  Your weakened instruments cannot register details at first, and you assume these new arrivals are more Grix.  But as the vessels grow closer, they become clear in the holographic field.\n\t\n\tRakashi battle cruisers.  Tzir glideships.  The Alliance has come.\n\t\n\t*if skeletons = 0\n\t\t*finish\n\t*if skeletons > 0\n\t\tIt appears that you are free of the Null Zone, though you will never forget what happened here.  And neither will your people.\n\t\t*finish\n*set energy %-(standard_deduction)\n*page_break\nAnother week passes, and still there is no sign of the Alliance.  Again, the Core Operator makes contact with you in your cabin.  \n\n*if surplus = true\n\t\"I don't know what to tell you, Captain!  We came in here with a good supply, considering what we've been through.  But if we stay in the Null Zone much longer, that's not gonna matter.  It'll be a challenge just to keep transmitting the energy at all.  Shutdowns will come next, and if the ships stay like that for long enough, we're gonna lose citizens.  What do you want to do?\"\n\t\n*if surplus = false\n\t\"I don't know what to tell you, Captain!  We're not done for yet, but we didn't come into the Null Zone with a surplus.  If we stay here much longer, it'll be a challenge just to keep transmitting the energy at all.  Shutdowns will come next, and if the ships stay like that for long enough, we're gonna lose citizens.  What do you want to do?\"\n\t\nThe Operator sounds exhausted and jumpy.  You wonder if you can even trust his assessment.  True, the danger may be as bad as he says, but perhaps he is just reacting to his long stretch in the Null Zone.\n\n*goto heavy_energy_choice\n\n*label after_the_fall\n*if wait_weeks \u003c=5\n\t*goto shame_face\n*page_break\n*if kelos_established = true\n\tYou are brought to the Kelos as a prisoner, and placed in a private brig.  \n*if kelos_established = false\n\tYou are brought to a merchant ship owned by Kelos corporation, and held prisoner in a private brig.  \nFrom the growing brightness of the lights in your cell, and the increase in air quality, you \n*if standard_deduction = 5\n\tcan tell that the civilians are running the life support systems harder on the few remaining vessels.  \n*if standard_deduction !=5\n\tcan tell that the civilians are loosening the energy restrictions.\n\nDays later, the Kelos suddenly shudders around you, and you hear the sounds of explosions and conflict elsewhere in the vessel.  Through the steel door, you can faintly hear your guard depart his post in a hurry.  Two hours later, you hear something slowly making its way down the hallway to your cell.\n\nWhen the door slides open, you expect to see the shambling form of a Grix, but it is one of your own soldiers.\n\t\n\"Follow me, Fleet Captain.\"\n*page_break\n*set energy %-(standard_deduction)\n*set energy %-(standard_deduction)\nYou are in your private chamber with Lieutenant Demian, being debriefed on the takeover.  \"The mercenaries were able to take control of the fleet,\" she explains, \"but their energy use caused blackouts on several vessels.  They returned partial control to us, to tend to the evacuations.  After that show of weakness, the rest of the fleet was easily taken back.\"\n\nYou contact engineering, to see how dire the power situation really is.  \"The blackouts have fully destabilized the Core,\" the panicked Operator reports.  \"We've powered down all the weaponry to avoid further trouble, but we could lose more ships if things stay this way.  What do we do?\"\n\nYou can't tell whether or not he is deliberately neglecting to mention the possibility of using the stasis units.\n*label heavy_energy_choice\n*choice\n\t*if standard_deduction > 5\n\t\t#Commence consolidation.\n\t\t\t*set standard_deduction 5\n\t\t\tIt takes more than two standard days to complete the consolidation process:  emptying the chosen ships of personnel and civilians, harvesting their remaining resources, and decommissioning the craft.\n\t\t\t\n\t\t\tOn the aft monitor you watch the abandoned vessels as they drift idly into the Null Zone.  Then you wait, hoping that it has made the difference.\n\t\t\t\n\t\t\t*goto power_test\n\t*if standard_deduction > 5\n\t\t#Skip consolidation and begin putting civilians into stasis.\n\t\t\t*goto stasis_deal\n\n\t*if standard_deduction \u003c=5\n\t\t#Start putting civilians into stasis.\n\t\t\t*label stasis_deal\n\t\t\t*set skeletons +1\n\t\t\t*set stasis true\n\t\t\tA lottery system is used to select those citizens who will enter stasis.  Once elected, some of these \"winners\" take arms against ship security to avoid their fate, and must be forcefully sedated by fellow crew members.\n\t\t\t\n\t\t\tHalf of the civilian population goes into the units in the end.  It allows the Core to stabilize.  But you dread what will happen when you attempt to revive these poor souls.\n\t\t\t*goto seven_or_not\n\t#Wait.\n\t\tYou do not change your current limits, and wait to see what will come of your decision.  \n\t\t\n\t\t*goto power_test\n\n*label power_test\n*set energy %-(standard_deduction)\n*set energy %-(standard_deduction)\n*if energy \u003c=13\n\t*set skeletons +2\n\t*set deadly_blackout true\n\t*if standard_deduction = 5\n\t\tUnfortunately, even with your ships having been consolidated, there is not enough energy.  The Core is further destabilized.  \n\t*if standard_deduction !=5\n\t\tUnfortunately, there is simply not enough energy to keep the fleet online.  The Core is further destabilized.  \n\tSeveral ships go into total shutdown, and by the time you have relocated their crews to other vessels, other shutdowns have occurred.\n\t\n\tBefore the Core is finally stabilized again, hundreds have died from asphyxiation on the darkened ships, and in the ensuing panic. \n*if energy > 11\n\tThankfully, the system seems to stabilize.  You have avoided the inevitable, for now.\n\n*label seven_or_not\n*page_break\n*if wait_weeks \u003c=6\n\t*goto rescue\nThe days wear on with no sign of rescue.  Then, like a nightmare rising from a nightmare, the living ships return.  They have come in greater numbers, to finish what they started.\n\n\"Our weaponry has been powered down to conserve energy.  How will we fight them?\"\n\nYou have no choice but to improvise...\n\n*choice\n\t#Attack the juggernauts with the drills from our mining craft.\n\t\tUsing mining vessels as weapons is a tricky proposition, but these are desperate times.  \n\t\t\n\t\t*if mine >=60\n\t\t\tThankfully, they are plentiful enough to make this a successful strategy.  Emitting sonic booms that you must presume are some kind of scream, the juggernauts detach and move on.\n\t\t\t*set grixtory 75\n\t\t\t*goto rescue\n\t\t*else\n\t\t\t*set grixtory 25\n\t\t\t*set skeletons +1\n\t\t\t*gosub talk_about_failure\n\t\t\tYou don't have enough mining craft to make a difference here, and the juggernauts barely flinch, only leaving when they have had their fill of your civilians.\n\t\t\t*goto rescue\n\t\t\t\n\t#Reroute the Core's energy streams to the juggernauts, melting the creatures from the inside out.\n\t\tRouting the energy stream into open space is a dangerous proposition, but these are desperate times.\n\t\t\n\t\t*if energy > 8\n\t\t\tThankfully, you have more than enough power to spare.  The juggernauts fold into themselves unpleasantly, and drift away.\n\t\t\t*set grixtory 75\n\t\t\t*page_break\n\t\t\t*goto rescue\n\t\t*else\n\t\t\t*gosub talk_about_failure\n\t\t\tThere is simply not enough energy to spare to significantly damage the juggernauts.  They take their time filling themselves with your civilians before taking off again.\n\t\t\t*set grixtory 25\n\t\t\t*set skeletons +1\n\t\t\t*page_break\n\t\t\t*goto rescue\n\t#Manually initiate the self-destruct sequence on the ships that are being attacked. It will kill the juggernauts and save the lives of civilians on other vessels.\n\t\t*set skeletons +1\n\t\t*set grixtory 25\n\t\tThe Tactician and the Astrogator enter their separate override codes.  You enter yours, and initiate the sequence.  Twenty seconds later, the affected ships explode into clouds of glowing debris.  The living ships are gone, but you know this decision will not be forgotten.\n\t\t*page_break\n\t\t*goto rescue\n\n*label shame_face\n*page_break\n*if kelos_established = true\n\tYou are brought to Kelos as a prisoner, and placed in a private brig.  \n*if kelos_established = false\n\tYou are brought to a merchant ship owned by Kelos corporation, and held prisoner in a privat
