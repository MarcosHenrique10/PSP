t\t\t\n\t\t\tPerhaps they will believe you this time.\n\t\t\t*goto thank_you\n*if scenario !=8\n\t*if alliance_true = 75\n\t\tIt is true that the Alliance is your true calling, but has this new ${enemy_name} presence altered its goals?\n\t*if (alliance_true = 50) or (alliance_true = 25)\n\t\tThe Alliance are offering you an alternative to imprisonment.  Do you want to take it?\n*choice\n\t#Accept the offer of freedom, and travel to Calpurnia with the ${enemy_name} spy.\n\t\t*if alliance_true \u003c=25\n\t\t\tYou have no love for the Alliance, but imprisonment is hardly an attractive alternative to their offer.  You take the stealth transport into the stratosphere, and into your uncertain future.  \n\t\t\t*if slippage = 75\n\t\t\t\t\n\t\t\t\tAs for Liberated ${plan_name}, perhaps there are ways to be of service to its cause from afar...\n\t\t\t\t*goto thank_you\n\t\t\t*else\n\t\t\t\t*goto thank_you\n\t\t*elseif alliance_true \u003c=50\n\t\t\tYou are no stalwart of the Alliance, but imprisonment is hardly an attractive alternative to their offer.  You take the stealth transport into the stratosphere, and into your uncertain future.\n\t\t\t*if slippage = 75\n\t\t\t\t\n\t\t\t\tAs for Liberated ${plan_name}, perhaps there are ways to be of service to its cause from afar...\n\t\t\t\t*goto thank_you\n\t\t\t*else\n\t\t\t\t*goto thank_you\n\t\t*else\n\t\t\t*if slippage = 75\n\t\t\t\tYou take the stealth transport into the stratosphere, and your uncertain future.  As for Liberated ${plan_name}, perhaps there are ways you can be of service to its cause from afar...\n\t\t\t\t*goto thank_you\n\t\t\t*else\n\t\t\t\tYou take the stealth transport into the stratosphere.  ${plan_name} may be lost to you now, but the universe is open in a new way, and you have no need of this place now.  Your home is the future.\n\t\t\t\t*goto thank_you\n\n\t*if alliance_true >=50\n\t\t#Refuse the offer, on the grounds that the ${enemy_name} have tainted the Alliance.\n\t\t\tYou tell the ${enemy_name} that its system's involvement, however small, proves that the Alliance has been corrupted.  You refuse to accompany it on the ship.\n\t\t\t\n\t\t\tThe ${enemy_name} seems unsurprised by your response.  \"So be it,\" the creature says, and while the translation synthesizer does little to convey emotion, you detect a note of disappointment.\n\t\t\t\n\t\t\tBut can this ${enemy_name} truly be as disappointed as you are?  Your home planet has been usurped by rebels, and the Alliance is slowly being infiltrated by the most corrupt system in the universe.  There truly is no quarter for you now.\n\t\t\t\n\t\t\tYou can hear the prison transports gliding closer, sirens blaring.  They are too late to stop the ${enemy_name} ship.\n\t\t\t\n\t\t\tAs it breaks into the stratosphere, the clouds over ${plan_name} slowly change, into unfamiliar shapes.\n\t\t\t*goto thank_you\n\t*if alliance_true \u003c=50\n\t\t#Refuse the offer, on the grounds that you have no wish to be associated with the Alliance.\n\t\t\tYou tell the ${enemy_name} that you will not further the Alliance's political purposes, even if it means securing your freedom.\n\t\t\t\n\t\t\tThe ${enemy_name} seems stunned by your response.  \"So be it,\" the creature says, and while the translation synthesizer does little to convey emotion, you detect a note of bewilderment in its voice.  It disappears into its ship, and takes off.\n\t\t\t\n\t\t\t*if slippage > 50\n\t\t\t\tYou wait for the inevitable sirens of the prison craft, and prepare to tell the soldiers your story: how the Alliance tried to rescue you, and how you refused their help.  Whatever your former crimes against the rebellion, you have proven yourself to be a true citizen of Liberated ${plan_name}.\n\t\t\t\t\n\t\t\t\tPerhaps now, the Supreme Commander will recognize you as as one.\n\t\t\t\t*goto thank_you\n\t\t\t*elseif slippage = 50\n\t\t\t\tYou do not wait for the inevitable sirens of the prison craft.  Instead, you run into the wilderness.  The Alliance may not have gotten what they wanted out of you, but they have given you your greatest escape yet.\n\t\t\t\t*goto thank_you\n\t\t\t*else\n\t\t\t\tYou do not wait for the inevitable sirens of the prison craft.  Instead, you run into the wilderness.  The Alliance may not have gotten what they wanted out of you, but they have given you a chance at freedom, on your own terms.  And you will not pass it up.\n\t\t\t\t*goto thank_you\n\n\n\n*label win_scenario_rebel\nThe door to your chamber opens.  An ensign salutes you.  \"Supreme Commander!  The visitors are waiting for you in the diplomatic hall...\"\n\nYou tell the Ensign to alert the Minister of Security.  She salutes and leaves.\n\nYou begin to pin your medals to your lapel, in preparation for the meeting.  Decorations for valor in battle, strategic prowess, and above all, sacrifice.  \n*if leader = true\n\tThey are not official military medals, of course.  How could they be?  When you returned to ${plan_name}, you were the only leader left to follow.  Admiral Kalla was already dead, and the rest of the High Council had been assassinated by the ${enemy_name} during their occupation.  Only the traitor Councilor Tayu remained, somewhere on Calpurnia.  And so you became Supreme Commander.\n\t\n\tBut your loyal crew members thought that you deserved something more tangible than a title, and so they had the decorations made that you wear today. The rebels humbly called them \"tokens,\" but in truth, they are your greatest treasures.\n\t\n\tYou owe your respect from the military to...\n\t*fake_choice\n\t\t*if integrity \u003c 50\n\t\t\t#...your skill at diplomacy.\n\t\t\t\tThe military appreciates the myriad ways you have manipulated politics to your own ends. \n\t\t*if mil_trust > 50\n\t\t\t#...your respect for them.\n\t\t\t\tYour support from the ${plan_name} military remains the backbone of your rule, and you will never let them down.\n\t\t*if skeletons = 0\n\t\t\t#...your proud showing in the Null Zone.\n\t\t\t\tYou gave the fleet something to hope for during its darkest hour.  The survivors of that ordeal have seen to it that tales of your skill and leadership were told widely on ${plan_name}.\n\t\t*if continued_victory = true\n\t\t\t#...your famous prowess in battle.\n\t\t\t\tTo have talent in battle will earn you many supporters, in the military and out of it, for the people come to think of you as a protector.\n\t\t#...their sensing that you are fated to be their leader.\n\t\t\tYou were destined to be where you are today, and you know precisely what to do with your power.\n*if leader = false\n\tThey are not official military medals, of course.  How could they be?  When you returned to ${plan_name}, you were the only leader left to follow.  Admiral Kalla was already dead, and the rest of the High Council had been assassinated by the ${enemy_name} during their occupation.  Only the traitor Councilor Tayu remained, somewhere on Calpurnia.  And so you became Supreme Commander.\n\t\n\tBut you felt that you deserved something more than a title, and so you had these made.  They are a reminder of how far you have come.  If only more of the military believed you deserved them.  You attribute their mistrust to...\n\t*fake_choice\n\t\t*if skeletons > 1\n\t\t\t#...your disgrace in the Null Zone.\n\t\t\t\tYour comrades should blame the Alliance for the suffering that went on in the Null Zone, but you appear to be the more convenient target.\n\t\t*if integrity \u003c 50\n\t\t\t#...your dishonest dealings.\n\t\t\t\tYour comrades should understand that every lie you told, you told for them.\n\t\t*if had_help = true\n\t\t\t#...the fact that you needed a great deal of Alliance support to win the battle over ${plan_name}.\n\t\t\t\tYour know that your use of the Alliance support was strategy, not dishonor.  But your comrades do not see it that way.\n\t\t*if continued_failure = true\n\t\t\t#...their libelous theory that you won the battle over ${plan_name} by luck.\n\t\t\t\tThere was no luck involved in your success during the battle of ${plan_name}, only fate.\n\t\t*if civ_trust > 50\n\t\t\t#...your weakness for the civilian population.\n\t\t\t\tOnly a corrupt military like this one could find fault in someone who seeks to treat the civilians with respect.\n\t\t*if political_mana \u003c 50\n\t\t\t#...the fact that politics do not come naturally to you.\n\t\t\t\tPerhaps your military comrades would prefer that the High Council return, and the Alliance with them.\n\t\t#...the fact that they simply do not like you.\n\t\t\tNo leader craves approval from fools.\n\t\t#...jealousy.\n\t\t\tRising to the top of the military has only awakened the envy of your comrades.\n*page_break\nOnce fully prepared for your meeting, you advance down the long corridors of the ${plan_name} Ministry of Law, toward the diplomatic hall.\n\nAs you pass the balcony, you look out at the courtyard and beyond, to the nearby city of Cothal.  There is no longer any sign of the damage that it suffered during the occupation, when the ${enemy_name} destroyed all the great cities of ${plan_name} as a show of their power.  Now Cothal has been rebuilt, more beautiful than before.  The new Ministry buildings speak of power and control.  Soldiers march in formation through a distant lot.\n\n*if civ_trust \u003c 50\n\tIf only ${plan_name} were truly as orderly as it appears.  Just yesterday the Universalists, a faction of citizens sympathetic to the Alliance, destroyed your statue in the public square.  And some of their other recent gestures have not been nearly as bloodless.\n\t\n\tTheir demands have remained the same for fifteen years: a return to free trade with the Outer Systems, and a place for ${plan_name} in the growing Alliance.\n\t\n\tYou blame their bravado on...\n\t*fake_choice\n\t\t*if leader = false\n\t\t\t#...their knowledge that your position as leader is uncertain.\n\t\t\t\tWhen the weak sense weakness, they imagine themselves strong, and so the Universalists become more dangerous every day.\n\t\t\t\t\n\t\t#...your own strict policies with regard to the civilian population.\n\t\t\tThe Universalists merely fear your strength.\n\t\t\t\n\t\t#...the Universalists' restless envy of the corrupt and changeable Outer Systems.\n\t\t\tThese Universalists will never be happy with what they have, even though the Outer Systems offer nothing better.\n\t\t\t\n\t\t*if continued_cruelty = true\n\t\t\t#...your reputation for brutality.\n\t\t\t\tThe Universalists merely fear your strength.\n\t\t\t\t\n\t\t#...the fact that the common people can never truly be content.\n\t\t\tThese Universalists will never be happy with what they have, even though the Outer Systems offer nothing better.\n\t\n\tAs always, you will to respond to them by...\n\t*choice\n\t\t#...calling for armed raids on their known compounds.\n\t\t\t*set it 1\n\t\t\t*goto hi_minister\n\t\t#...incarcerating any known collaborators.\n\t\t\t*set it 2\n\t\t\t*goto hi_minister\n\t\t#...ordering \"Chronicle of the Republic,\" the only news source on Liberated ${plan_name}, to lambast this Universalist chaos publicly.\n\t\t\t*set it 3\n\t\t\t*goto hi_minister\n*if civ_trust >=50\n\tTruly, this is a city at peace.  Even the Universalists, a popular Alliance sympathizer group, have been safely relegated to the ranks of a \"fringe\" group.\n\t\n\tYou feel that you can take at least partial credit for that, thanks to...\n\t*choice\n\t\t#...the violent raids you ordered on their compounds.\n\t\t\t*goto hi_minister\n\t\t#...your policy of lifetime incarceration for any known Universalist collaborators.\n\t\t\t*goto hi_minister\n\t\t#...ordering \"Chronicle of the Republic,\" the only news source on Liberated ${plan_name}, to lambast the Universalists' self-defeating demands for free trade with the Outer Systems.\n\t\t\t*goto hi_minister\n*label hi_minister\nA time-tested technique.\n*page_break\nWhen you arrive in the anteroom, Minister of Security Demian is already there.  She salutes, and you walk together into the diplomatic hall.\n\n*if enemy_type = \"blob\"\n\tWithin waits a group of shapeless green creatures, their skin partly translucent in the sunlight that pours through the long row of windows.  \n*if enemy_type = \"lizard\"\n\tWithin waits a group of remarkably poised green creatures with leathery skin, their huge black eyes fixed on you with an uncanny stillness.  \n*if enemy_type = \"squid\"\n\tThere wait several glistening blue masses of tentacles, with yellow eyes that pop obscenely from their skull sacs.  \n*if enemy_type = \"bug\"\n\tThere wait several leathery insects of enormous size and uncanny stillness, with their legs folded under their abdomens in lieu of chairs.  \n*if enemy_type = \"blob\"\n\tTheir leader addresses \n\t*goto address1\nTheir leader rises and addresses \n*label address1\nyou with a series of ${sound}.  The translation unit manages to craft these sounds into your native tongue: \"The ${enemy_name} are honored to extend their greeting to you, Supreme Commander.\"\n\n\"The Supreme Commander...\n*choice\n\t#...is likewise honored.\"\n\t\tYou return the gesture, and take your seat.\n\t\t*goto antes\n\t#...cannot return the sentiment.\"\n\t\tYou are unsure that the translation unit can do justice to your insult, but when the ${enemy_name} hears your words put forward in its own language, it does seem to wither slightly.\n\t\t*goto antes\n\t#...hopes this meeting will be worthwhile for our two systems.\"\n\t\tYou make it clear what you expect from this meeting, and take your seat.\n\t\t*goto antes\n*label antes\n*page_break\n\"We are here because the Alliance grows stronger day by day,\" the ${enemy_name} advises.  \"Despite their defeat in the ${plan_name} War, their reach extends throughout the universe.  It will only be a matter of time before it has secured control of all known space.  We can help you change that.\n\n\"In the years since the war, my fellow soldiers and I have offered our services for hire.  For the right price, we would be willing to begin targeting Alliance vessels.  With your funding, we could even build advanced weapons to combat them.  And the Alliance need never know that you are behind the attacks.  The good Minister informed us you might be interested in this plan.\"\n\nYou exchange a look with Minister Demian.  In suggesting to the ${enemy_name} that you would approve a plan such as this, she was...\n*choice\n\t#...sorely mistaken.\n\t\tYou refuse the ${enemy_name} offer.\n\t\t\n\t\tThe mercenaries and Minister Demian exchange a look.  Perhaps she had given them a sense that the meeting would play differently.\n\t\t\n\t\t\"Very well,\" the ${enemy_name} grumbles.\n\t\t*goto scuseme\n\t#...totally correct.\n\t\t*goto agreed_to_it\n\n*label scuseme\n*page_break\nOnce they have gone, Minister Demian \n*if leader = true\n\tasks why you refused the offer.\n*if leader = false\n\tdemands to know why you would refuse the offer.\n\nYou explain...\n*choice\n\t#...that the ${enemy_name} are inherently untrustworthy.\n\t\t*set it 1\n\t\tYou explain to Minister Demian that the ${enemy_name} cannot be trusted.  They are in far too desperate a position, and would certainly find a way to betray your interests if you hired them.\n\t\t*if leader = true\n\t\t\t*goto understand\n\t\t*else\n\t\t\t\n\t\t\t\"It is you who have betrayed the interests of Liberated ${plan_name},\" she shouts, and storms out of the diplomatic chamber.\n\t\t\t*goto worries\n\n\t#...that engaging in such a devious plan could only lead to your own corruption.\n\t\t*set it 2\n\t\tYou explain to Minister Demian that making a pact with the ${enemy_name} in this way would surely lower you all, even if you did such a thing in secret.\n\t\t*if leader = true\n\t\t\t*goto understand\n\t\t*else\n\t\t\t\n\t\t\t\"I only hope your scruples do not someday invite an Alliance invasion,\" she mutters, and skulks out of the diplomatic chamber.\n\t\t\t*goto worries\n\n\t#...that your people have driven the Alliance off of their home planet, and need not interact with them further.\n\t\t*set it 3\n\t\tYou explain to Minister Demian that the Alliance is not your problem anymore, and certainly no reason to consort with mercenaries.\n\t\t*if leader = true\n\t\t\t*label understand\n\t\t\t\n\t\t\tShe seems to understand the reason for your decision.  \"If I have offended you today, Supreme Commander, then I am sorry.\"\n\t\t\t*goto loyal_no\n\t\t*else\n\t\t\t\n\t\t\t\"The Alliance will be our problem once they come here to invade,\" she shouts, and storms out of the diplomatic chamber.\n\t\t\t*goto worries\n\n*label loyal_no\n\nYou return to your chamber, confident that you have made the right choice.  On the way back, you stop again at the balcony overlooking Cothal.  You wait until you have seen the ${enemy_name} passenger transport ascend into the sky.\n\nAs it breaks into the stratosphere, the clouds change into unfamiliar shapes, but you keep watching and slowly, the sky returns to what it was.\n*goto thank_you\n\n*label worries\n\nMinister Demian...\n*choice\n\t#...has only your planet's best interests in mind, although she misunderstands your position.\n\t\tYou will be talking like old comrades again in a matter of days, or so you tell yourself.  It is only because you know each other so well that Minister Demian feels permitted to speak to you this way.\n\t\t\n\t\tYou emerge from the diplomatic hall, and see her farther down the corridor, discussing something quietly with two generals.  When they notice that you are watching, it seems that their whispering ends quickly.  But perhaps you are only being paranoid.\n\t\t\n\t\t*goto out\n\t#...is obviously a negative influence on your government.\n\t\tMinister Demian seems intent on using her power to turn your planet into a force of chaos.\n\t\t\n\t\tWhen you exit the diplomatic hall, as if to confirm your fears, you see her discussing something quietly with two generals, farther down the corridor.  When they notice that you are watching, their whispering ends quickly, and they disperse.  Your instincts for survival inform you that something will need to be done about this, and soon.\n\t\t\n\t\t*goto out\n\t#...cannot be trusted with matters of leadership.\n\t\tMinister Demian does not have the temperament to wield power with a sure hand.  It is for the best that it is you, and not her, whom fate has selected to be Supreme Commander.  You are considering this when you emerge from the diplomatic hall, and see her discussing something quietly with two generals, father down the corridor.  When they notice that you are watching, their whispering ends quickly, and they disperse.  But perhaps you are only being paranoid.\n\t\t\n\t\t*goto out\n\n*label out\nYou return to your chamber, but on the way back, you stop again at the balcony overlooking Cothal.  You wait until you have seen the ${enemy_name} passenger transport ascend into the sky.\n\nAs it breaks into the stratosphere, the clouds slowly change into unfamiliar shapes.\n*goto thank_you\n\n*label agreed_to_it\nYou voice your agreement with the mercenaries' plan.  Minister Demian exchanges a look of dark excitement with you.  Soon, you will be striking out against your true foes.\n\nAfter the meeting, you return to your chamber.  On the way back, you stop again at the balcony overlooking Cothal.  You wait until you have seen the ${enemy_name} passenger transport ascend into the sky, and beyond.\n\nA new Alliance is on the rise.\n*goto thank_you\n\n\n*label prisoner_of_alliance\nYou should be dead.\n\nThe Calpurnians execute traitors, don't they?  Instead, they have held you in this cell for the past fifteen years, like some artifact from a far-off time.  And all at the behest of the Calpurnian Empress.\n\nShe asks often for reports on your health.  She even visits you, and has gone so far as to teach you Calpurnian, both classical and colloquial.  You are her prize.  The traitor, alive.\n\nThe Empress is nearly the only contact you have had with the outside world since your arrival here.  Indeed, aside from the odd representative of her court, the only other persons you have seen here are the palace guards, to whom you are well known...\n*choice\n\t#...because of your numerous escape attempts.\n\t\t*set slippage 50\n\t\tYou have have yet to succeed in escaping the palace, but you have been moved seven times within its walls.  Too many close calls.\n\t\t\n\t\tIt is of no consequence.  In fact, you are already hard at work planning your next break.  It helps to keep your mind alive.  A little game, between you and the Empress.\n\t\t*goto after_attitude2\n\n\t#...for your (sincere) obedience.\n\t\t*set slippage 75\n\t\tYou are grateful for the charity that the Alliance and the Empress have shown to you in letting you live, and you have honored them these past fifteen years with total obedience.\n\t\t*goto after_attitude2\n\n\t#...for your (deceptive) obedience.\n\t\t*set slippage 25\n\t\tYou have always known that it is best to keep your enemies close.  Over the years, the guards have come to think of you almost like one of their own.  For fifteen years, you have been biding your time for the right moment.\n\t\t\n\t\tYou know you will find the weak link in the Empress's armor.  You need only wait.\n\t\t*goto after_attitude2\n\n*label after_attitude2\n*page_break\n\"Visitor for the prisoner,\" the guards announce.  The door opens, and you are surprised to see the Royal Chamberlain enter your cell.  But there is something unusual and uncertain about his manner, and his expression has a frozen look to it.\n\n\"Prisoner, follow me,\" the Chamberlain orders, in a conspicuously loud voice.  Then he leans forward and whispers conspiratorially in your ear.  \"Your freedom is at hand, Captain.\"\n\nSuddenly you understand why the Chamberlain's face looks so strangely flat and implacable.  This is not the Chamberlain, but someone impersonating him, probably by using a chameleon band.\n\nBut who could it be, you wonder?  Lieutenant Demian was executed, but perhaps...\n*fake_choice\n\t#...that was merely a lie of the Empress's, intended to break your spirit.\n\t#...Demian was able to fake her own death, and has been working to free you all this time.\n\t#...it is another member of the rebellion, loyal to your cause.\nYou have no way of knowing, but you do not have to wait long to find out.  The \"Chamberlain\" brings you to an open field beyond the palace, and then to a shaded clearing in the woods, where the tracers will be unable to find you from above.  Your first taste of true freedom in fifteen years.\n\nThen the impostor de-activates the chameleon band, and his features begin to blur and fade.  The illusion dissipates, to reveal \n*if enemy_type = \"blob\"\n\tthe shapeless glistening form \n*if enemy_type = \"lizard\"\n\tthe leathery green form \n*if enemy_type = \"squid\"\n\tthe glistening tentacled form \n*if enemy_type = \"bug\"\n\tthe segmented eyes and leathery feelers \nof the ${enemy_name} soldier who has just freed you.\n\nFaced with your old enemy, you...\n*choice\n\t#...attack the ${enemy_name} instantly.\n\t\tYou are not sure if a rock will do you any good against the ${flattering_adj} ${enemy_name}, but it is the only weapon available.  You grab one and attack your would-be liberator.\n\t\t\n\t\t*gosub whoops\n\t\t\"You fool!\" it says, still in the synthesized voice of the Chamberlain.  \"If I wanted to kill you, you would be dead already!  I am here to help you, Captain.\"\n\t\t*goto i_dont_wanna\n\t#...prepare to defend yourself.\n\t\tYou are not sure if a rock will do you any good against the ${flattering_adj} ${enemy_name}, but it is the only weapon available.  You lift one and hold it in your hand, ready to strike.\n\t\t\n\t\t\"You fool!\" the ${enemy_name} says, still in the synthesized voice of the Chamberlain.  \"If I wanted to kill you, you would be dead already!  I am here to help you, Captain.\"\n\t\t*goto i_dont_wanna\n\t#...ask the ${enemy_name} why it released you.\n\t\t\"To humiliate our mutual enemy: the Alliance.  Their influence has spread throughout the known universe since our defeat over ${plan_name}.  Some traitorous ${enemy_name} have even lobbied to join its ranks, hoping to feed off the scraps of its growing power.  But the true ${enemy_name} know this is blasphemy, and we seek only to fight.\"\n\t\t*goto interesting_point\n\n*label i_dont_wanna\n*choice\n\t#\"Why would I want to seek help from a creature like you?\"\n\t\t\"Because we have a mutual enemy, Captain: the Alliance.\"\n\t\t\n\t\tThe ${enemy_name} soldier has your attention now.\n\t\t\n\t\t\"Their influence has spread throughout the known universe since our defeat over ${plan_name}.  Some traitorous ${enemy_name} have even lobbied to join its ranks, hoping to feed off the scraps of its growing power.  But the true ${enemy_name} know this is blasphemy, and we seek only to fight.\"\n\t\t*goto interesting_point\n\t#\"How do I know I can trust you?\"\n\t\t\"If having risked my life to release you from the cage in which the Empress has held you does not demonstrate my sincerity, there is no other way to show it!  Besides, we have a mutual enemy: the Alliance.\"\n\t\t\n\t\tThe ${enemy_name} soldier has your attention now.\n\t\t\n\t\t\"Their influence has spread throughout the known universe since our defeat over ${plan_name}.  Some traitorous ${enemy_name} have even lobbied to join its ranks, hoping to feed off the scraps of its growing power.  But the true ${enemy_name} know this is blasphemy, and we seek only to fight.\"\n\t\t*goto interesting_point\n\t#\"Keep talking, ${enemy_name}.\"\n\t\t\"We have a mutual enemy, Captain: the Alliance.  Their influence has spread throughout the known universe since our defeat over ${plan_name}.  Some traitorous ${enemy_name} have even lobbied to join its ranks, hoping to feed off the scraps of its growing power.  But the true ${enemy_name} know this is blasphemy, and we seek only to fight.\"\n\t\t*goto interesting_point\n\n*label interesting_point\n*choice\n\t#\"What makes you think I would help you monsters?\"\n\t\t*set it 1\n\t\tYou ask why any ${enemy_name} would be so foolish as to think you would support their plan.  \n\t\t\n\t\t\"Would you prefer to die here?\" the ${enemy_name} replies.  Suddenly, there is a distant boom in the sky above you.  \"That is the passenger transport.  It will land in this clearing, to take you to the system of your choice.  Merely let me take you where the Empress cannot find you.  You will have humiliated her, and all of the Alliance.  That will be enough for us.\"\n\t\t*page_break\n\t\t*goto when_you_start_hatin\n\n\t#\"How can I help you?\"\n\t\t*set it 2\n\t\tYou ask what you can do to help the ${enemy_name} in their mission.\n\t\t\n\t\t\"In a few moments,\" the ${enemy_name} explains, \"a passenger transport will land in this clearing, to take you to the system of your choice.  Merely by going where the Empress cannot find you, you will have helped our cause, for you will have humiliated her, and all of the Alliance.\"\n\t\t\n\t\tYou hear the distant boom of the ship approaching.  You know it will be here soon, and that the Calpurnian tracers will come soon after.\n\t\t\n\t\t\"But there is another way to aid our cause.  Should you choose, we could take you to our new war station the Null Zone, where we would teach you the use of the New Machines.  Do not be concerned about our military conditioning, we will not subject you to it.  We want your mind to be your own.  We can think of no better way to repay the Alliance than by helping you take your revenge on them.\"\n\t\t*page_break\n*label when_you_start_hatin\n*if it = 1\n\t\n\tYou know the ${enemy_name} is merely using you, and that you would be hunted throughout the universe once you escaped from Calpurnia, but you can taste freedom.\n*if it = 2\n\t\n\tYou know the ${enemy_name} is merely using you, and that your chances of liberating ${plan_name} from the Alliance would be scant.  But you could do serious damage to the Alliance with the help of these new friends.\n\t\n\tThat said, can you really forgive the ${enemy_name} for all they put your people through?  And are you so set on revenge that you'd fight at their side?\n*choice\n\t#You agree to let the ${enemy_name} agent hide you somewhere in the universe.\n\t\tYou tell the ${enemy_name} agent that you will gladly take its offer of freedom.\n\t\t\n\t\t\"Very well.  You have until we are in hyperspace to tell me where you wish to go.\"\n\t\t\n\t\tWhile you sit in the harness of the transport vessel, coursing through the stratosphere, you think about all the places that the ${enemy_name} could take you.  It hardly matters which one you pick first, because you know that you will be traveling to many places over the coming years, as you hide from the relentless pursuit of the Alliance.\n\t\t\n\t\tFor the rest of your life, you will be running.\n\t\t*goto thank_you\n\t*if it = 2\n\t\t#You agree to let the ${enemy_name} agent to take you to the Null Zone.\n\t\t\tYou tell the ${enemy_name} that you will gladly accept its offer of a position within its fighting force.\n\t\t\t\n\t\t\t\"And we will be most honored to have you,\" the ${enemy_name} replies.  \"But quickly now, the ship is coming.  We must make haste, before the tracers find us.\"\n\t\t\t\n\t\t\tWhile you sit in the harness of the transport vessel, coursing through the stratosphere, you find yourself looking back on the past fifteen years of coddled imprisonment like it was all some awful dream, and looking forward to the Null Zone with what you can only describe as excitement.\n\t\t\t\n\t\t\tYou are ready to fight again.\n\t\t\t*goto thank_you\n\n\t#You decline the offer to board, because you refuse to help your people's hated enemy.\n\t\tYou will not accept the help of the ${enemy_name}, for any reason.  You tell the agent to leave you here on Calpurnia.\n\t\t\n\t\tEven although it is essentially ${creature}, the ${enemy_name} appears stunned by your words.  \"Very well, Captain.  I will leave you to your imprisonment.\"\n\t\t\n\t\t*if slippage = 50\n\t\t\tMinutes later, you watch the ${enemy_name} disappear in its ship, but you do not wait for the inevitable arrival of the Empress's tracers.  Instead, you run into the wilderness.\n\t\t\t\n\t\t\tThe ${enemy_name} agent may not have gotten what it wanted out of you, but it was wrong about your continued imprisonment.  Today, it has given you your greatest escape yet.\n\t\t\t*goto thank_you\n\t\t*elseif slippage = 25\n\t\t\tMinutes later, you watch the ${enemy_name} disappear in its ship, but you do not wait for the inevitable sirens of the tracers.  Instead, you run into the wilderness.\n\t\t\t\n\t\t\tThe ${enemy_name} agent may not have gotten what it wanted out of you today, but it has given you a chance at freedom, on your own terms.  And you will not pass it up.\n\t\t\t*goto thank_you\n\t\t*else\n\t\t\tWhen you are brought back to the palace, and you tell the Empress the story of the ${enemy_name} visitor, she and the other members of the court are shocked.  But no one is surprised that you refused to run.\n\t\t\t\n\t\t\tYou are, as ever, loyal to your keepers.\n\t\t\t*goto thank_you\n\t*if slippage = 75\n\t\t#You decline the offer to board, because you prefer it here.\n\t\t\tYou tell the agent that your choice is to remain here on Calpurnia.\n\t\t\t\n\t\t\tEven although it is essentially ${creature}, the ${enemy_name} appears stunned by your words.  \"Very well, Captain.  I will leave you to your imprisonment.\"\n\t\t\t\n\t\t\tWhen you are brought back to the palace, and you tell the Empress the story of the ${enemy_name} visitor, she and the other members of the court are shocked.  But no one is surprised that you refused to run.\n\t\t\t\n\t\t\tYou are, as ever, loyal to your keepers.\n\t\t\t*goto thank_you\n\n*label whoops\n*if enemy_type = \"blob\"\n\tThe rock passes through the creature entirely.  It is unharmed.  \t\n*if enemy_type = \"squid\"\n\tThe ${enemy_name} catches the rock in one of its burly tentacles and tosses it aside.  \n*if enemy_type = \"lizard\"\n\tThe ${enemy_name} simply steps aside to let the rock fly by.  \n*if enemy_type = \"bug\"\n\tThe ${enemy_name} simply twitches to the left, and the rock flies by.  \n*return\n\n*label thank_you\n*page_break End\nWe hope you've enjoyed playing [i]The Fleet.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*stat_chart\n\tpercent striker_coverage Striker Coverage\n\tpercent striker_skill Striker Skill\n\tpercent can_coverage Cannon Coverage\n\tpercent can_skill Cannon Skill\n\tpercent mine Mining Support\n\tpercent energy Energy Reserves\n\topposed_pair bat_style\n\t\tElegance\n\t\tForce\n\tpercent mil_trust Military Support\n\tpercent civ_trust Civilian Support\n\topposed_pair integrity\n\t\tDeception\n\t\tIntegrity\n\ttext position True Stance\n*ending\n\n\n", "final_battle": "*temp elegant\n*temp bonus\n*temp ordered_to_be_tough\n*temp battle_result\n*temp gun_berserker\n*temp gun_gunship\n*temp jammer_success\n*temp drone_success\n*temp berserker_success\n*temp hub_success\n*temp jammer_delay\n*temp berserkers\n*temp droidses\n*temp droidpro\n*temp emp\n\n*set elegant false\n*set bonus false\n*set ordered_to_be_tough false\n*set battle_result 0\n*set gun_berserker false\n*set gun_gunship false\n*set jammer_success 0\n*set drone_success 0\n*set berserker_success 0\n*set hub_success 0\n*set jammer_delay false\n*set berserkers true\n*set droidses \"droid\"\n*set droidpro \"it\"\n*set emp false\n\n*if drone_production >=25\n\t*set droidses \"droids\"\n\t*set droidpro \"them\"\n\n*if (bat_style \u003c 35) or (bat_style > 65)\n\t*set bonus true\n\n*if bat_style \u003c 50\n\t*set elegant true\n\t*set ordered_to_be_tough true\n\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]The Fleet[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n*label jammers\nThe Alliance armada, with your fleet at its helm, hurtles through hyperspace toward the ${plan_name} quadrant.  You focus your mind on...\n\n*choice\n\t#Dreams of revenge.\n\t\t\t*if hate_type = 50\n\t\t\t\tAnd this vengeance will be wrought in the name of Admiral Kalla.\n\t\t\t\t*goto oh_sandy\n\t\t\t*else\n\t\t\t\tAnd this vengeance will be wrought in the name of your people.\n\t\t\t\t*goto oh_sandy\n\t#What surprises the ${enemy_name} may have waiting for you.\n\t\t\tWhatever they may be, you will know soon.  \n\t\t\t*goto oh_sandy\n\t#The thought of winning ${plan_name} back for your people.\n\t\t\tYou know that your planet will be at peace soon.  \n\t\t\t*goto oh_sandy\n\t*if insincere_rebel = true\n\t\t#The satisfaction of defeating the ${enemy_name}.\n\t\t\tThe first step is up ahead. \n\t\t\t*goto oh_sandy \n\t*if insincere_rebel = false\n\t\t#Driving your enemies away from ${plan_name}, in all their many forms.\n\t\t\tAnd so the battle begins.\n\t\t\t*goto oh_sandy\n*label oh_sandy\n*page_break\nThe armada travels to the very edge of the quadrant before a disruption signal forces you to phase.\n\nWhen you return to normal space, you can already see the source of the transmission: hyperspace jammers, with antennae on either end of their cylindrical bodies, looking more like science vessels than instruments of war.  Each machine is surrounded by a glowing blue bubble.  \"Looks like we'll have to use our fighters here, Captain,\" Zagi notes.  \"Cannon fire can't clear those energy barriers.\"\n\nBut when your strikers approach one unit, mechanized gripping arms emerge from its sides, and reach ominously for your ships.  Your strikers need a clear shot if they are to disable the jammer, and this new defense will prove a challenge.  You order your ships to...\n*choice\n\t#...dodge the unit's gripping arms and blast its body.\n\t\t*comment Skill Aggressive\n\t\t*if elegant = true\n\t\t\t*if striker_skill >=74\n\t\t\t\tYour pilots are confused by this aggressive strategy.  Some of them even lose control, and crash into the grippers.  It takes longer than expected to disable the unit, and the ${enemy_name} have more time to prepare their defense.\n\t\t\t\t*gosub minor_striker\n\t\t\t\t*set battle_result +10\n\t\t\t\t*set jammer_success 10\n\t\t\t\t*set jammer_delay true\n\t\t\t\t*goto jammer_alliance\n\t\t\t*else\n\t\t\t\tYour pilots are confused by this aggressive strategy, and it hurts their performance.  Several lose control and crash into the unit's arms before it can be disabled.\n\t\t\t\t\n\t\t\t\t*gosub fail_jammer\n\t\t\t\t*gosub major_striker\n\t\t\t\t*goto jammer_alliance\n\t\t*else\n\t\t\t*if bonus = false\n\t\t\t\t*if striker_skill >=74\n\t\t\t\t\tYour pilots handily dodge the arms, and plant blast mines in the unit's points of weakness.  The jammer is disabled within minutes.\n\t\t\t\t\t*set battle_result +20\n\t\t\t\t\t*set jammer_success 20\n\t\t\t\t\t*goto jammer_alliance\n\t\t\t\t*elseif striker_skill >=45\n\t\t\t\t\tYour pilots dodge the arms and plant blast mines in the unit's points of weakness, but not before some of them lose control and crash.  It takes longer to disable the machine as a result, and the the ${enemy_name} have more time to prepare their defense.\n\t\t\t\t\t*gosub minor_striker\n\t\t\t\t\t*set jammer_delay true\n\t\t\t\t\t*set battle_result +10\n\t\t\t\t\t*set jammer_success 10\n\t\t\t\t\t*goto jammer_alliance\n\t\t\t\t*else\n\t\t\t\t\tYour fighters don't have the skill to execute this maneuver effectively.  Several lose control and crash into the unit's arms before it can be damaged.\n\t\t\t\t\t\n\t\t\t\t\t*gosub fail_jammer\n\t\t\t\t\t*gosub major_striker\n\t\t\t\t\t*set jammer_delay true\n\t\t\t\t\t*goto jammer_alliance\n\t\t\t*else\n\t\t\t\t*if striker_skill >=45\n\t\t\t\t\tYour pilots handily dodge the arms, and plant blast mines in the unit's points of weakness.  The jammer is disabled within minutes.\n\t\t\t\t\t*set battle_result +20\n\t\t\t\t\t*set jammer_success 20\n\t\t\t\t\t*goto jammer_alliance\n\t\t\t\t*else\n\t\t\t\t\tYour fighters don't have the skill to execute this maneuver effectively.  Several lose control and crash into the unit's arms before it can be damaged.\n\t\t\t\t\t\n\t\t\t\t\t*gosub fail_jammer\n\t\t\t\t\t*gosub major_striker\n\t\t\t\t\t*set jammer_delay true\n\t\t\t\t\t*goto jammer_alliance\n\n\t#...encircle the jammer with all of your strikers, to confuse the grippers.\n\t\t*comment Coverage Elegant\n\t\t*if elegant = false\n\t\t\t*if striker_coverage >=74\n\t\t\t\tYour pilots are confused by this evasive strategy.  Some of them are grabbed and crushed by the grippers as they attempt the formation.  It takes longer than expected to disable the unit, and the ${enemy_name} are given more time to prepare their defense.\n\t\t\t\t*gosub minor_striker\n\t\t\t\t*set battle_result +10\n\t\t\t\t*set jammer_success 10\n\t\t\t\t*set jammer_delay true\n\t\t\t\t*goto jammer_alliance\n\t\t\t*else\n\t\t\t\tYour pilots are confused by this evasive strategy.  Several strikers are grabbed and crushed by the unit's grippers before a clear shot can be fired.\n\t\t\t\t\n\t\t\t\t*gosub fail_jammer\n\t\t\t\t*gosub major_striker\n\t\t\t\t*goto jammer_alliance\n\t\t*else\n\t\t\t*if bonus = false\n\t\t\t\t*if striker_coverage >=74\n\t\t\t\t\tYour pilots circle around the jammer in an enormous formation that befuddles the sensors.  The grippers clutch fruitlessly at nothing in particular, leaving the unit's body open to attack.  A palpable hit is landed in under three minutes.\n\t\t\t\t\t*set battle_result +20\n\t\t\t\t\t*set jammer_success 20\n\t\t\t\t\t*goto jammer_alliance\n\t\t\t\t*elseif striker_coverage >=45\n\t\t\t\t\tYour pilots attempt to distract the gripping arms to get a clear shot at the unit.  They are successful, but some of them are crushed in t*set battle_result +30\n\n*if battle_result >=80\n\t*set battle5_victory true\n\t*return\n*if (rep >=40) and (battle_result >=60)\n\t*set battle5_victory true\n\t*return\n*if (rep >=65) and (battle_result >=50)\n\t*set battle5_victory true\n\t*set had_help true\n\t*return\n*return\n\n*label victory\n*if emp = true\n\tThe pod powers down, and the ${enemy_name} gunships go dark a moment later.\n\t\n*if emp = false\n\tThe energy being transmitted through the pod creates a near-blinding explosion when it detonates.  The ${enemy_name} gunships go dark a moment later.\n\t\nYou hear a noise over the bridge communications system, steadily repeating.  It is several bewildered seconds before you realize that it is the surrender signal of the ${enemy_name}.  The battle has been won!\n*page_break\n*if alliance_out \u003c 25\n\tAmbassador Bashena appears on the main viewscreen.  \n\t\n*if alliance_out >=25\n\tCouncilor Tayu appears on the main viewscreen.  \n\t\n\"The diplomatic ships will be linking signals with the ${enemy_name} flagship to discuss the terms of their surrender.  It may be some time before you hear from us, but let me be the first to congratulate you on a job well done!\"\n\n*if alliance_out \u003c 25\n\tThe smile does not reach her eyes.  Both of you know the fight is not over.\n\t*finish\n*if alliance_out >=25\n\tThe smile does not reach his eyes.  Both of you know the fight is not over.\n\t*finish\n\n*label defeat\nThe gunships deliver a shot directly to your cruiser, and continue to burn a path through your fleet.\n\nThe Alliance surrenders on your behalf, and the ${enemy_name} forces begin to close in.\n*page_break\n*set prisoner_enemy true\n*goto_scene epilogue\n\n\n*label major_striker\n*set striker_coverage -15\n*set striker_skill -10\n*return\n\n*label major_cannon\n*set can_coverage -15\n*set can_skill -10\n*return\n\n*label minor_striker\n*set striker_coverage -10\n*set striker_skill -5\n*return\n\n*label minor_cannon\n*set can_coverage -10\n*set can_skill -5\n*return\n", "fleet_startup": "*restart", "junction": "*temp conspiracy_aware\n*temp conspiracy_complicit\n*temp refused_demian\n*temp warned_demian\n*temp tricked_demian\n*temp highroad\n\n*temp junk false\n\n*temp messup\n*temp good_information\n*temp doubt_information\n*temp tattle\n\n*set conspiracy_aware false\n*set conspiracy_complicit false\n*set refused_demian false\n*set warned_demian false\n*set tricked_demian false\n*set highroad false\n\n*set messup false\n*set good_information true\n*set doubt_information true\n*set tattle false\n\n*if alliance_out \u003c 25\n\t*set good_information false\n*if continued_cruelty = true\n\t*set good_information false\n*if (sudden_cruelty = true) and (alliance_out \u003c 75)\n\t*set good_information false\n\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]The Fleet[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n*label attitude_check\n*if (mil_trust >=50) and (demian_out \u003c 50)\n\t*goto comrade_talk\n\n*if (mil_trust >=50) and (demian_out >=50)\n\t*goto conversion_talk\n\n*if mil_trust \u003c 50\n\t*goto early_warning\n\n*label comrade_talk\n*set conspiracy_aware true\nSoon after the summit, Lieutenant Demian asks you to meet her in one of Calpurnia's many labyrinthine gardens.  It is the ideal place to have a private conversation, and you can sense from her excitement that she has something of great importance to tell you.\n\nWhen you are sufficiently distant from the other visitors, she turns to you.  \"We have the opportunity to shift this battle against the Alliance.  If we position ourselves so that our fleet takes control of the ${enemy_name} gunships, it will be the ideal time to turn the tables on them.  \n*if rep >=50\n\tOf course their numbers are greater than ours, but we will have the element of surprise.  And we will also have you, Captain.\"\n\t\n*if rep \u003c 50\n\tTheir numbers are smaller than ours to begin with, and we will have the element of surprise.  And we will also have you, Captain.\"\n\t\nYou tell Lieutenant Demian...\n*choice\n\t#...that you will work with her to bring the Alliance down.\n\t\t*set conspiracy_complicit true\n\t\t*goto why_ally\n\t#...that you will not betray those who would help your people.\n\t\t*goto whynot_ally\n\n*label why_ally\nYou say that you look forward to the opportunity to bring your planet's enemies to their knees: first the ${enemy_name}, then the Alliance.  \n*if alliance_true >=50\n\tBut as you speak these words, you find yourself questioning where your true loyalties lie.  \n\t\n\tThus far, you have only been pretending to share Lieutenant Demian's distaste for the Alliance.  Has this changed, you wonder?  You search your soul, and find...\n\t*choice\n\t\t#...that you have indeed had a change of heart.  You now consider yourself an enemy of the Alliance.\n\t\t\t*set alliance_true 25\n\t\t\t*set position \"Anti-Alliance Convert\"\n\t\t\t*set integrity %+10\n\t\t\t*gosub why_hater\n\t\t\t*goto yarva_intro\n\n\t\t*if alliance_true = 50\n\t\t\t#...that you remain neutral on the matter.\n\t\t\t\t*set integrity %-10\n\t\t\t\tYou know that you will always regard the Alliance with neutrality, but for now, it would be prudent to pretend that you are on the Lieutenant's side.  This way, you can learn everything there is to know about her rebellion, and prevent it from causing harm.\n\t\t\t\t*goto yarva_intro\n\n\t\t*if alliance_true = 75\n\t\t\t#...that you remain a steadfast supporter of the Alliance.\n\t\t\t\t*set integrity %-10\n\t\t\t\tYou know in your heart that you will always support the Alliance, but for now, it would be prudent to pretend that you are on the Lieutenant's side.  This way, you can learn everything there is to know about her rebellion, and prevent it from causing harm.\n\t\t\t\t*goto yarva_intro\n\n*if alliance_true \u003c 50\n\t*goto yarva_intro\n\n*label whynot_ally\n\"Why not?\" she asks.\n\n*if alliance_true > 50\n\t*choice\n\t\t#Reveal to the Lieutenant that you have secretly been an Alliance supporter all along.\n\t\t\t*set demian_out 85\n\t\t\t*set integrity %+15\n\t\t\t\"So you lied to me to earn my confidence,\" she says.  \"Know then that you have lost it for good.\"\n\t\t\t\n\t\t\t*gosub advice_to_a_stormer\n\t\t\t*goto late_warning\n\t\t#Pretend that you changed your mind on the matter of the Alliance.\n\t\t\tYou tell the Lieutenant that you have been moved by the Alliance's support for your people, and that you refuse to take arms against them.\n\t\t\t*set integrity %+5\n\t\t\t*set demian_out 75\n\t\t\t*goto awkward_goodbye\n\n*if alliance_true = 50\n\t*choice\n\t\t#Reveal to the Lieutenant that, despite your never having been a steadfast supporter of the Alliance, you have never truly been against them.\n\t\t\t*set demian_out 85\n\t\t\t*set integrity %+15\n\t\t\t\"So you lied to me to earn my confidence,\" she says.  \"Know then that you have lost it for good.\"\n\t\t\t\n\t\t\t*gosub advice_to_a_stormer\t\t\t\n\t\t\t*goto late_warning\n\n\t\t#Pretend that you changed your mind.\n\t\t\tYou tell the Lieutenant that you have been moved by the Alliance's support for your people, and that you refuse to take arms against them.\n\t\t\t*set demian_out 75\n\t\t\t*set integrity %+5\n\t\t\t*goto awkward_goodbye\n\n*if alliance_true \u003c 50\n\t*choice\n\t\t#Tell Lieutenant Demian that her plan is dishonorable, and that there will be a better chance to make your move against the Alliance in the future.\n\t\t\tYou tell Lieutenant Demian that the time to make the move against the Alliance is not during this all-important battle.  But as you speak these words aloud, you wonder if your objection to her plan goes deeper.  Have your loyalties shifted over time?  Have you become an Alliance supporter?  You search your soul, and discover...\n\t\t\t*gosub change_check\n\t\t\t*goto awkward_goodbye\n\n\t\t#Say that you have been moved by the Alliance's support for the struggle of ${plan_name}, and that you refuse to take arms against them.\n\t\t\t*set demian_out 75\n\t\t\tAs you speak these words aloud, you realize that the Lieutenant will inevitably take them as a profession of your support for the Alliance.  You wonder if that is true.  Have your loyalties shifted over time?  Have you become an Alliance sympathizer?  You search your soul, and discover...\n\t\t\t*gosub change_check\n\t\t\t*goto awkward_goodbye\n\n\n*label conversion_talk\nSoon after the summit, Lieutenant Demian asks you to meet her in one of Calpurnia's many labyrinthine gardens.  It is the ideal place to have a private conversation, and you can sense from her tense demeanor that Lieutenant has something of great importance to discuss, though it takes her several minutes to work up to speaking.\n\n\"Tell me, what are your true feelings about the Alliance?\" she finally asks.  \n*if demian_out > 50\n\t\"You once told me that you supported them.  Has this changed?\"\n*if demian_out = 50\n\t\"You once told me that you were neutral regarding their cause.  Has this changed?\"\n\nIt does not sound like an offhand question to you.  You sense that your loyalties are being assessed.\n\n*if demian_out > 50\n\t*if alliance_true > 50\n\t\tYou tell her...\n\t\t*choice\n\t\t\t#That you remain true to the Alliance.\n\t\t\t\tYou will not hide your true feelings.  You remain a supporter of the Alliance through and through, and you tell Lieutenant Demian so.  \n\t\t\t\t*goto awkward_goodbye\n\t\t\t#That you have lost faith in their cause.\n\t\t\t\t*set demian_out 25\n\t\t\t\t*gosub is_this_true\n\t\t\t\t*goto heartened\n\t*if alliance_true = 50\n\t\tYou tell her...\n\t\t*choice\n\t\t\t#...that you remain true to the Alliance.\n\t\t\t\tYour true feelings about the Alliance are somewhat lukewarm, but you have already told Lieutenant Demian that you are a supporter, and you maintain that veneer today.  \n\t\t\t\t*goto awkward_goodbye\n\t\t\t#...that you have lost faith in their cause.\n\t\t\t\t*set demian_out 25\n\t\t\t\t*gosub is_this_true\n\t\t\t\t*goto heartened\n\t*if alliance_true \u003c 50\n\t\tYou once told Lieutenant Demian that you were a supporter of the Alliance—an outright lie, and one that there is no use maintaining now.  Unless, of course, you have changed inside.\n\t\t\n\t\tHave you?  In a sudden panic, you search your soul and discover...\n\t\t*choice\n\t\t\t#...that over time, you have grown sympathetic toward the Alliance.\n\t\t\t\tIt is not merely a matter of feeling less animosity toward the Alliance.  You have also come to feel great compassion for their cause.  \n\t\t\t\t*gosub why_like\n\t\t\t\t\n\t\t\t\tHaving realized this, you can only tell Lieutenant Demian that you are a supporter.  It is, after all, the truth.\n\t\t\t\t*goto awkward_goodbye\n\t\t\t#...that you remain as against the Alliance as ever.\n\t\t\t\tIf time has changed anything, it has only made you despise the cause of the Alliance more.\n\t\t\t\t\n\t\t\t\tYou tell Lieutenant Demian that your support for the Alliance was merely a ruse to fool your enemies.  You say that you have ever been, and ever will be, on her side.\n\t\t\t\t\n\t\t\t\t*goto heartened\n\n*if demian_out = 50\n\t*if alliance_true > 50\n\t\tYou tell her...\n\t\t*choice\n\t\t\t#...that you remain neutral on the matter of the Alliance.\n\t\t\t\tYour true feelings about the Alliance are more positive, but you have already told Lieutenant Demian that you are neutral on the matter, and you maintain that veneer today.  \n\t\t\t\t*goto awkward_goodbye\n\t\t\t#...that you have lost faith in their cause.\n\t\t\t\t*set demian_out 25\n\t\t\t\t*gosub is_this_true\n\t\t\t\t*goto heartened\n\t*if alliance_true = 50\n\t\tYou tell her...\n\t\t*choice\n\t\t\t#That you remain neutral on the matter of the Alliance.\n\t\t\t\tYou cannot muster passion one way or the other about the Alliance.  You tell the Lieutenant so.  \n\t\t\t\t*goto awkward_goodbye\n\t\t\t#That you have lost faith in their cause.\n\t\t\t\t*set demian_out 25\n\t\t\t\t*gosub is_this_true\n\t\t\t\t*goto heartened\n\t*if alliance_true \u003c 50\n\t\tYou tell her...\n\t\t*choice\n\t\t\t#...that over time, you have become neutral on the matter of the Alliance.\n\t\t\t\tYou can no longer muster the passionate anger that once drove you.  Instead, you feel that you can see both sides of this issue.  Truly, you are no longer an enemy of the Alliance.\n\t\t\t\t\n\t\t\t\tHaving realized this, you can only tell Lieutenant Demian that you are neutral.  It is, after all, the truth.\n\t\t\t\t*goto awkward_goodbye\n\t\t\t#...that you remain as against the Alliance as ever.\n\t\t\t\tIf time has changed anything, it has only made you despise the cause of the Alliance more.\n\t\t\t\t\n\t\t\t\tYou tell Lieutenant Demian that your neutrality was merely a ruse to fool your enemies.  You say that you have ever been, and ever will be, on her side.\n\t\t\t\t\n\t\t\t\t*goto heartened\n\n*label is_this_true\nAre you telling the truth?\n*choice\n\t#Yes, I have turned against the Alliance.\n\t\t*set alliance_true 25\n\t\t*set position \"Anti-Alliance Convert\"\n\t\t*set integrity %+15\n\t\t*gosub why_hater\n\t\tYou tell Lieutenant Demian, truthfully, that you have soured on the notion of the Alliance.\n\t\t\n\t\t*return\n\t#No, I am only saying this to learn what Lieutenant Demian is trying to tell me.\n\t\t*set integrity %-15\n\t\tYou opt for deceit, and tell Lieutenant Demian that you have soured on the notion of the Alliance.  It appears to be the very thing she had hoped you would say.\n\t\t\n\t\t*return\n*return\n\n*label awkward_goodbye\nThe Lieutenant seems disappointed.\n\n\"Then it must be so,\" she says regretfully.  \"Know that, whatever happens, you will always have my respect, Captain.\"\n*fake_choice\n\t#Tell her that she likewise has yours.\n\t\tYou assure the Lieutenant that, whatever occurs, you have been grateful to work with a leader such as her.\n\t\t\n\t#Advise her not to do anything rash.\n\t\tYou can sense that there is something she is not telling you.  You urge Lieutenant Demian to be careful, but she only smiles gravely.\n\t\t\n\t#Ask her what she means by this.\n\t\tYou ask her what she is talking about, but she smiles gravely and remains silent.\n\t\t\nShe salutes once, and leaves you alone in the garden.\n*goto late_warning\n\n*label awkward_rejection\nShe seems disappointed.\n\n\"Then it must be so,\" she says regretfully.  \"Know that, whatever happens, you will always have my respect, Captain.\"\n*fake_choice\n\t#Tell her that she likewise has yours.\n\t\tYou assure the Lieutenant that, whatever occurs, you have been grateful to work with a leader such as her.\n\t\t\n\t#Advise her not to proceed with her plan.\n\t\tYou assure Lieutenant Demian that her plan will fail, but she only smiles gravely.\n\t\t\n\t\t\"Of course you are right,\" she says.\n\t\t\n\t#Threaten to report her to the Alliance.\n\t\tYou threaten to report Lieutenant Demian to the Alliance.\n\t\t\n\t\t\"For my words?\" she asks defiantly.  \"They are only words, Captain.  Perhaps you misinterpreted them.\"\n\t\t\nShe salutes once, and leaves you alone in the garden.\n*goto late_warning\n\n*label advice_to_a_stormer\n\nAs she turns to storm out of the garden, you...\n*fake_choice\n\t#...advise her not to proceed with her plan.\n\t\tYou assure Lieutenant Demian that her plan will fail.\n\t\t\n\t\t\"Of course you are right,\" she says over her shoulder.\n\t\t\n\t\tBut she does not look back.\t\n\t#...threaten to report her to the Alliance.\n\t\tYou threaten to report Lieutenant Demian to the Alliance.\n\t\t\n\t\tThis stops her in her tracks, and she turns to face you.\n\t\t\n\t\t\"What I said to you today were only words,\" she says.  \"Not unlike the words you once said to me, Captain.  Should you value mine any more than I would value yours?\"\n\t\t\n\t\tShe leaves you alone in the garden.\n\t#...say nothing.\n\t\tYou watch her leave.\n\t\t\n\t\tShe does not look back.\n*return\n\n\n\n*label early_warning\nSome days later, a member of the royal guard arrives at your door.  He insists that you come with him immediately.\n\nThe guard escorts you to an automated trolley.  He is the only passenger beside yourself.  The vehicle courses through the streets of Calpurnia, then disappears into a series of tunnels below the royal palace.  \n\n*gosub arrival_expo\n*gosub telepathy\n*gosub spoke_against\n*gosub learned_plans\n\"This is as we expected.  But as it happens, we have it on good authority that Lieutenant Demian is planning to betray the Alliance, along with other members of your military team.  Once the ${enemy_name} are defeated, they will commandeer their orbiting gunships, and turn them against us.\"\n\nThe telepath's voice in your head becomes even more intimate, an icy whisper.  \"We would like for you to approach Lieutenant Demian as an ally,\" he intones.  \"Warn her that the Alliance is planning to block all signals to the gunships.  Tell her that the only way to take charge of the ships is for her and the other rebels to board them, and take control manually.\"\n\nYou ask yourself why the Alliance would want Demian and the conspirators to board the gunships.\n\n*if good_information = false\n\t\"Do not concern yourself with these details,\" comes the voice in your head.\n*if good_information = true\n\t\"It will be safer for you,\" comes the voice in your head, \"if you do not know...\"\n*page_break\n*if alliance_true >=50\n\tRiding back to the surface on the automated trolley, you realize that you have much to consider.  The Alliance is asking you to infiltrate a conspiracy led by one of your own comrades, earning her trust only to betray it later.  And yet, Lieutenant Demian is herself betraying you, by plotting to undermine the Alliance behind your back.\n\t\n\tBefore you can even consider taking your next step, you know you must first decide once and for all where you stand on the matter of the Alliance.  \n\t*if alliance_true > 50\n\t\tYou began your journey as a supporter of their cause.  But as you draw closer to the final battle, do you still feel they have your best interests in mind?  Or have you begun to doubt their intentions with regard to the future of ${plan_name}?  You search your soul for the answer, and discover...\n\t*if alliance_true = 50\n\t\tYou began your journey as a neutral party.  But have you perhaps begun to doubt their intentions with regard to the future of ${plan_name}?  You search your soul for the answer, and discover...\n*if alliance_true >=50\n\t*choice\n\t\t#...that you have indeed had a change of heart.  You now consider yourself an enemy of the Alliance.\n\t\t\t*set alliance_true 25\n\t\t\t*set position \"Anti-Alliance Convert\"\n\t\t\t*gosub why_hater\n\t\t\tBut what will you do about their sinister request regarding Lieutenant Demian?  You think quietly to yourself for a time, and decide...\n\t\t\t*goto what_to_do_early\n\n\t\t*if alliance_true = 50\n\t\t\t#...that you remain neutral.\n\t\t\t\tIn your eyes, the Alliance has done nothing to make you mistrust them.  You are now as you were before, a neutral observer.  But that does not mean you must follow all their orders.  You consider the Alliance's mysterious plans for Lieutenant Demian, and decide...\n\t\t\t\t*goto what_to_do_early\n\n\t\t*if alliance_true = 75\n\t\t\t#...that you remain a steadfast supporter of the Alliance.\n\t\t\t\tIn your eyes, the Alliance has done nothing to make you mistrust them.  You know in your heart that you will always support them.  But that does not mean you must follow all their orders.  You consider the Alliance's mysterious plans for Lieutenant Demian, and decide...\n\t\t\t\t*goto what_to_do_early\n\n*if alliance_true \u003c 50\n\tRiding into the light of Calpurnia's three moons on the pulse-trolley, you realize that you have much to consider.  The Alliance, your enemies, are asking you to deceive your way into a conspiracy led by one of your own comrades, earning her trust only to betray it later.\n\t\n\tAnd yet Lieutenant Demian did not trust you enough to include you in her plans.  In a sense, she has struck the first blow.  \n\t*if demian_out > 25\n\t\t*if goodguy = true\n\t\t\tOr perhaps you have merely played your role of an Alliance supporter all too well, and convinced her that you cannot be trusted?\n\t\n\tWhatever the case, you find yourself reassessing your position.  With no allies in your military, you wonder if you can afford to remain an enemy of the Alliance.  And with all you have seen, do you truly mistrust them the way you did when your journey began?  You search your soul, and discover...\n\t*choice\n\t\t#...that you now support the Alliance.\n\t\t\t*set alliance_true 75\n\t\t\t*set position \"Pro-Alliance Convert\"\n\t\t\tWhy are you willing to change your position on this matter?\n\t\t\t*choice\n\t\t\t\t#By asking for my help, the Alliance has shown that they value my service.  Clearly, I can no longer expect that kind of trust from my comrades.\n\t\t\t\t\tFor all their faults, the Alliance has placed its trust in you, and you will return the favor with your loyalty.  \n\t\t\t\t\t*goto after_reason\n\t\t\t\t#It is dishonorable to fight against those who would lay down their lives for my planet.\n\t\t\t\t\tThe Alliance has placed the fate of your home planet above their own.  It would be crude to remain the enemy of these brave citizens of the universe.  \n\t\t\t\t\t*goto after_reason \n\t\t\t\t#Their foreknowledge of the military conspiracy shows that the conspirators cannot win.\n\t\t\t\t\tThe Alliance has outsmarted your military, and in the end, you would rather be on the winning team.  \n\t\t\t\t\t*label after_reason\n\t\t\t\t\tBut that does not mean you must follow ever order they issue.\n\t\t\t\t\t\n\t\t\t\t\tYou consider the Alliance's mysterious plans for Lieutenant Demian, and decide...\n\t\t\t\t\t*goto what_to_do_early\n\n\t\t#...that you remain an enemy of the Alliance.\n\t\t\tHowever weak your support from your military comrades, you do not need the Alliance's acceptance.\n\t\t\t\n\t\t\tNext, you consider their sinister plans for Lieutenant Demian.  You decide...\n\t\t\t*goto what_to_do_early\n\t\n*label what_to_do_early\n*choice\n\t*if alliance_true \u003c=25\n\t\t#...to warn Lieutenant Demian of the Alliance's trickery.  The rebellion must not fail!\n\t\t\t*set integrity %+15\n\t\t\tLieutenant Demian may not have brought you into the rebellion, but you will not hold that against her.  What is important is the cause.\n\t\t\t\n\t\t\tYou ask Lieutenant Demian to meet you in one of the labyrinthine gardens of Calpurnia.  There, \n\t\t\t*if demian_out > 50\n\t\t\t\tyou work to convince her of your support for the rebellion.  \n\t\t\t\t*if good_information = true\n\t\t\t\t\t*set insincere_rebel false\n\t\t\t\t\t*set scenario 7\n\t\t\t\t\t*goto tell_her\n\t\t\t\t*else\n\t\t\t\t\t*set insincere_rebel false\n\t\t\t\t\t*set scenario 8\n\t\t\t\t\t*goto tell_her\n\t\t\t*else\n\t\t\t\tyou reinforce your support for the rebellion.  \n\t\t\t\t*if good_information = true\n\t\t\t\t\t*set insincere_rebel false\n\t\t\t\t\t*set scenario 5\n\t\t\t\t\t*goto tell_her\n\t\t\t\t*else\n\t\t\t\t\t*set insincere_rebel false\n\t\t\t\t\t*set scenario 6\n\t\t\t\t\t*goto tell_her\n\t\t\t*label tell_her\n\t\t\tYou tell her of your meeting with the Alliance, and of their plan to trick the rebels into boarding the ${enemy_name} gunships.  She seems wary of you, but she thanks you for the information.\n\t\t\t\n\t\t\t\"If they are trying to force us to board the gunships,\" she reasons, \"then we should obviously do the opposite.  At the finish of the battle, I will have the rebels take control of the gunships remotely.\"\n\t\t\t\n\t\t\tLater that day, you call on Ambassador Bashena, and pretend that the trap is set.  The rebels are sure to board the gunships as planned, you insist.\n\t\t\t\n\t\t\t\"Then there is nothing left to do,\" the Ambassador notes, \"but prepare for battle...\"\n\t\t\t*finish\n\n\t*if alliance_true >=50\n\t\t#...to approach Lieutenant Demian in the guise of a fellow rebel, and urge her to board the gunships.\t\n\t\t\t*set integrity %-15\n\t\t\t*label demian_trap\n\t\t\tYou ask Lieutenant Demian to meet you in one of the labyrinthine gardens of Calpurnia.  There, \n\t\t\t*if demian_out >=50\n\t\t\t\tyou work to convince her of your support for the rebellion.\n\t\t\t\t*if good_information = true\n\t\t\t\t\t*set scenario 3\n\t\t\t\t\t*goto tell_her2\n\t\t\t\t*else\n\t\t\t\t\t*set scenario 4\n\t\t\t\t\t*goto tell_her2\n\t\t\t*else\n\t\t\t\tyou reinforce your support for the rebellion.  \n\t\t\t\t*if good_information = true\n\t\t\t\t\t*set scenario 1\n\t\t\t\t\t*goto tell_her2\n\t\t\t\t*else\n\t\t\t\t\t*set scenario 2\n\t\t\t\t\t*goto tell_her2\n\t\t\t*label tell_her2\n\t\t\tYou tell her of your meeting with the Alliance, and urge her to board the gunships, pretending that it is the only way to ensure control.  She seems wary of you, but she thanks you for the information.  There is no way to know if she believes what you have said.\n\t\t\t\n\t\t\tAssuming that you have successfully deceived her, how do you feel?\n\t\t\t*goto lie_feelings2\n\t\t\t\n\t*if alliance_true >=50\n\t\t#...to stay out of it.  There must be another way to stop the rebellion, without leading the Lieutenant into a trap.\n\t\t\t*set integrity %+15\n\t\t\t*goto wont_trick\n\n\t*if alliance_true \u003c=25\n\t\t#...to lead Lieutenant into the trap that the Alliance is preparing for her.  You may not support their cause, but her plans to attack them during battle are dishonorable.\n\t\t\t*set integrity %-15\n\t\t\tYou agree with Lieutenant Demian's position, but not with her plan.  This is a wrongheaded rebellion, and what better way than to ensure that it fails than by springing the Alliance's trap on her?\n\t\t\t\n\t\t\t*goto demian_trap\n\t\t\t\n\t*if alliance_true \u003c=25\n\t\t#...to stay out of it.  You believe you can stop the Lieutenant's dishonorable rebellion without leading her into a trap.\n\t\t\t*set integrity %+15\n\t\t\t*goto wont_trick\n\n*label late_warning\n*if conspiracy_aware = true\n\tDo you report Lieutenant Demian to the Alliance?\n\t*choice\n\t\t#Yes.\n\t\t\t*set integrity %-5\n\t\t\t*set tattle true\n\t\t\t*set good_information true\n\t\t\tThat very day, you approach Ambassador Bashena in the third auxiliary palace, to tell her what Lieutenant Demian has revealed to you.\n\t\t\t*label reaction_to_reveal\n\t\t\t*if alliance_out \u003c 25\n\t\t\t\tThe information itself does not seem to surprise her, but something else does.  Perhaps the fact that you, of all people, would want her to know.\n\t\t\t\t*goto after_wide_eyes\n\t\t\t*else\n\t\t\t\tShe does not seem surprised by what you are telling her.  \n\t\t\t\t*goto after_wide_eyes\n\t\t\t*label after_wide_eyes\n\t\t\t\n\t\t\t\"I must discuss this with my associates,\" she says.  \"Expect a messenger at your chamber tomorrow morning.\"\n\t\t\t*page_break\n\t\t\tThe next day, a member of the royal guard arrives at your door, and escorts you to an automated trolley.  He is the only passenger beside yourself.\n\t\t\t\n\t\t\tThe vehicle courses through the streets of Calpurnia, then disappears into a series of tunnels below the royal palace.\n\t\t\t*goto secret_chamber_late\n\n\t\t#No.\n\t\t\t*label silent_all_these_years\n\t\t\t*set integrity %-5\n\t\t\tYou keep the facts of Lieutenant Demian's plan to yourself.  After all...\n\t\t\t*gosub why_silent\n\t\t\tBut your silence on the matter does not keep for long.\n\t\t\t\n\t\t\tThe next morning, you emerge from your chamber to find five members of the royal guard at your door.  They escort you to an automated trolley, and ride along with you as it courses through the streets of Calpurnia.  Finally, it disappears into a series of tunnels below the royal palace.\n\t\t\t\n\t\t\t*goto secret_chamber_late\n\n*if conspiracy_aware = false\n\tDo you report the suspicious meeting with Lieutenant Demian to the Alliance?\n\t*choice\n\t\t#Yes\n\t\t\t*set integrity %-5\n\t\t\t*set tattle true\n\t\t\t*set good_information true\n\t\t\tThat very day, you go the the third auxiliary palace, and tell Ambassador Bashena of your strange meeting with Lieutenant Demian.  \n\t\t\t*goto reaction_to_reveal\n\t\t#No\n\t\t\t*set integrity %-5\n\t\t\t*goto silent_all_these_years\n\n*label why_silent\n*fake_choice\n\t*if conspiracy_aware = true\n\t\t#...you hope that Lieutenant Demian may yet hear the voice of reason.\n\t\t\tYou believe that all is not yet lost.  \n\t#...you do not betray your comrades.\n\t\tYou do not turn on the people who are close to you.  \n\t*if alliance_true \u003c 50\n\t\t#...you do not trust the Alliance.\n\t\t\tYou will not help who you don't trust.  \n\t*if conspiracy_aware = false\n\t\t#...you may have misunderstood what transpired between you.\n\t\t\tAfter all, there may be nothing to tell.  \n*return\n\n*label secret_chamber_late\n*if conspiracy_aware = false\n\t*goto clue_you_in\n*if (tattle = true) and (conspiracy_aware = true)\n\t*goto tattletale\n*comment YOU KNOW THE PLAN BUT HAVE NOT TOLD THEM ANYTHING\n*gosub arrival_expo\n*gosub telepathy\n*gosub spoke_against\n\"But what has she told you concerning her plans for the coming battle?\"\n*if messup = true\n\t*label creepout_4\n\t*choice\n\t\t*selectable_if (junk) #\"She mentioned no specific plans.\"\n\t\t\t*goto post_creepout_4\n\t\t*selectable_if (junk) #\"She said that, however much she detests you, she fears the Alliance is too powerful a foe to fight.\"\n\t\t\t*goto post_creepout_4\n\t\t#\"She plans to overtake the orbiting gunships and turn them against the Alliance.\"\n\t\t\t*goto post_creepout_4\n\n*if messup = false\n\t*choice\n\t\t#\"She mentioned no specific plans.\"\n\t\t\t*gosub muddled\n\t\t\t\"Now, I will ask again.  What has she told you concerning her plans?\"\n\t\t\t*set messup true\n\t\t\t*goto creepout_4\n\t\t#\"She has said that, however much she detests you, she fears the Alliance is too powerful a foe to fight.\"\n\t\t\t*gosub muddled\n\t\t\t\"Now, I will ask again.  What has she told you concerning her plans?\"\n\t\t\t*set messup true\n\t\t\t*goto creepout_4\n\t\t#\"She plans to overtake the orbiting gunships and turn them against the Alliance.\"\n\t\t\t*goto post_creepout_4\n\n*label post_creepout_4\n\"Indeed, this corresponds with the intelligence we have received,\" the telepath says.  \"And I could not help but notice, from my brief glimpse of your memories, that you refused to participate in the Lieutenant's plan.  For that, the Alliance is grateful.\"\n\n*label another_voice\nYou hear another voice now, this one audible outside your head.  \"Thank you for your assistance, Inquisitor,\" Ambassador Bashena says.  \"It appears your services are no longer necessary.\"\n\nNow the Ambassador turns to you, her tone softer.  \"We apologize for this formality.  As you have learned firsthand, no one is what they seem to be in this difficult time.  We had to be sure that you were not a part of the rebellion.\"\n\nYou tell her...\n*fake_choice\n\t#...that you can understand her cautiousness.\n\t\tYou say that Ambassador Bashena is obviously doing what is necessary to secure the return of ${plan_name} to your people.\t\t\n\t\t\n\t\t\"And there is something that we hope you will do for us,\" she replies, \"to ensure just that.  \n\t#...that you are offended by her doubt.\n\t\t\"I can only apologize again, Captain.  Our concern, as ever, is the return of ${plan_name} to your people.  And there is something we hope you will do for us, to ensure just that.  \n*if conspiracy_aware = false\n\tYou see, Lieutenant Demian's plans are known to us.  After the battle with the ${enemy_name} is finished, she seeks to commandeer their orbiting gunships, and turn them against the Alliance.\n\t\n\t\"We would like for you to approach Lieutenant Demian as an ally.  Warn her that, when she attempts to overtake the gunships, the Alliance is planning to block her control signal.  Tell her that the only way to take charge of the ships is for her and the other rebels to board them, and assume manual control.\"\n\t\n*if conspiracy_aware = true\n\tYou see, we want you to tell the Lieutenant that you have had a change of heart, and approach her as an ally.  Warn her that, when she attempts to overtake the gunships, the Alliance is planning to block her control signal.  Tell her that the only way to take charge of the ships is for her and the other rebels to board them, and assume manual control.\"\n\t\nYou ask the Ambassador why it is so important that Lieutenant Demian board the gunships, but she only says, \"It will be safer for you if you do not know.\"\n*page_break\nRiding back to the surface, you realize that you have much to consider.  The Alliance is asking you to infiltrate a conspiracy led by one of your own comrades, earning her trust only to betray it later.\n\nYou decide...\n*choice\n\t#...to approach Lieutenant Demian as the Alliance suggests, and urge her to board the gunships.\n\t\t*goto on_second_thought\n\t#...to stay out of it.  There must be another way to stop the rebellion, without leading the Lieutenant into a trap.\n\t\t*goto wont_trick\n\n*label tattletale\n*gosub arrival_expo\n\n\"It was decided that this meeting should be conducted telepathically.  I will project my thoughts to the other delegates, and reflect yours to them.  Please refrain from utilizing your verbal mechanism.\"\n*page_break\n\"Telepathy...\" you think to yourself.\n\nThe telepath takes this as a question.  \"Using telepathy,\" he explains, \"we can safeguard against our discussion being overheard.  Though, since Lieutenant Demian has already approached you, little will be said that you do not already know.  Tell me, had Lieutenant Demian ever mentioned her opposition to the Alliance in the past?\"\n\n*choice\n\t#\"Yes.\"\n\t\t*goto post_creepout7\n\t#\"No.\"\n\t\t*set messup true\n\t\t*goto creepout7\n\t#\"I do not recall.\"\n\t\t*set messup true\n\t\t*goto creepout7\n\n*label creepout7\n*gosub muddled \n\"Now, I will ask again.  Did Lieutenant Demian ever speak against the Alliance in your presence?\"\n*choice\n\t#\"Yes.\"\n\t\t*goto post_creepout7\n\t*selectable_if (junk) #\"No.\"\n\t\t*goto post_creepout7\n\t*selectable_if (junk) #\"I do not recall.\"\n\t\t*goto post_creepout7\n\n*label post_creepout7\n\"We thought as much,\" the telepath says.  \"And is it true that you are working in collusion with Lieutenant Demian, and have come here today merely to learn more about our plans for the coming battle?\"\n*if messup = false\n\t*choice\n\t\t#\"Yes, the Lieutenant and I will overthrow the Alliance together, in the name of ${plan_name}.\"\n\t\t\t*set messup true\n\t\t\t*goto creepout12\n\t\t#\"No, I have brought the rebellion to your attention in the hope of stopping it.\"\n\t\t\t*goto post_creepout12\n\n\t\t#\"In fact, I am actually a shapeshifter from Nimbus-3.\"\n\t\t\t*set messup true\n\t\t\t*goto creepout12\n*if messup = true\n\t*goto stankus\n*label creepout12\n\"Your thoughts become muddled and indistinct when you lie, Captain.  And this is no time for the thing your people call 'humor'.\"  \n*if alliance_true > 50\n\tA bright light seems to illuminate your very mind.  \n*if alliance_true = 50\n\tSuddenly, you can feel a change in your mind.  \n*if alliance_true \u003c 50\n\tYou feel something grip your mind, and squeeze.  \n*page_break\n\"I will ask again now.  Are you working in collusion with Lieutenant Demian?\"\n*label stankus\n*choice\n\t*selectable_if (junk) #\"Yes, the Lieutenant and I will overthrow the Alliance together, in the name of ${plan_name}.\"\n\t\t*goto post_creepout12\n\t#\"No, I brought the rebellion to your attention in the hope of stopping it.\"\n\t\t*goto post_creepout12\n\t*selectable_if (junk) #\"In fact, I am actually a gene trader from Nimbus-3.\"\n\t\t*goto post_creepout12\n\n*label post_creepout12\t\t\n\"This is as we hoped,\" the telepath says.\n\n*goto another_voice\n\n\n\n\n*label arrival_expo\nYou soon find yourself in a subterranean hall.  \n*if alliance_true \u003c=25\n\tDespite the bright light shining into your eyes from above, you can plainly see that you are not alone here.  \n*if alliance_true > 25\n\tYou are not alone here.  \nAmong the attendees you can see Councilor Tayu, Ambassador Bashena, and other representatives from the Alliance systems.  But you also see a Calpurnian inquisitor, \n*if alliance_true > 50\n\this bare head tattooed with the distinctive ornamentation particular to their telepaths.  \n*if alliance_true = 50\n\this bare head tattooed in the manner of their telepaths.  \n*if alliance_true \u003c 50\n\this bald head tattooed with the threatening occult patterns particular to their telepaths.  \nNo sooner have you looked his way than you hear his words spoken in your head...\n\n*return\n\n*label muddled\n\"Your thoughts become muddled and indistinct when you lie, Captain.  Allow me to clarify them for you.\"  \n*if alliance_true > 50\n\tA bright light seems to illuminate your very mind.  \n*if alliance_true = 50\n\tSuddenly, you can feel a change in your mind.  \n*if alliance_true \u003c 50\n\tYou feel something grip your mind, and squeeze. \n*page_break\n*return\n\n*label on_second_thought\nYou approach Lieutenant Demian, and ask that she meet you again in one of the royal gardens.  \n*if conspiracy_aware = true\n\t*if demian_out > 75\n\t\t*set scenario 9\n\t\tYou begin to tell her of your \"change of heart\", but when you are halfway through the explanation, she steps forward and spits in your face.\n\t\t\n\t\t\"I am not a fool,\" she says, and marches away.  So ends your great deception.\n\t\t\n\t\tYou inform Ambassador Bashena the next day, in the third auxiliary palace.  \"Regrettable,\" she concedes.  \"But there is nothing to be done.  I would urge you to find another way to stop the rebellion if you can, Captain.  If not, the Alliance may be forced to take more drastic measures.\"\n\t\t\n\t\tSomewhat humbled, you begin to prepare for the coming battle...\n\t\t*finish\n\t*if demian_out \u003c=75\n\t\t*if demian_out >=50\n\t\t\t*if good_information = true\n\t\t\t\t*set scenario 3\n\t\t\t*if good_information = false\n\t\t\t\t*set scenario 4\n\t\t*if demian_out \u003c 50\n\t\t\t*if good_information = true\n\t\t\t\t*set scenario 1\n\t\t\t*if good_information = false\n\t\t\t\t*set scenario 2\n\t\tYou explain your \"change of heart\" to her, and she seems receptive to the ruse.  She is especially grateful for the intelligence you provide regarding the gunships.\n\t\t\n\t\t*label lie_feelings\t\t\n\t\tHaving successfully deceived her, you feel...\n\t\t*label lie_feelings2\n\t\t*choice\n\t\t\t#Remorseful\n\t\t\t\tYou have taken the first step down a very difficult road, but it must be done to protect your people.  Now you turn your attention to the battle for ${plan_name}...\n\t\t\t\t*finish\n\t\t\t#Triumphant\n\t\t\t\tLieutenant Demian's rebellion will fail, you are sure of it.  Now you turn your attention to the battle for ${plan_name}...\n\t\t\t\t*finish\n\t\t\t#Nothing\n\t\t\t\tIf Lieutenant Demian allows her trust to cloud her judgment, let it be on her head.  You turn your attention to the battle for ${plan_name}...\n\t\t\t\t*finish\n*if conspiracy_aware = false\n\tYou tell Lieutenant Demian that you have learned of her plans, and that you wish to join her effort to overcome the Alliance.  She seems receptive to the ruse.  She is especially grateful for the intelligence you provide regarding the gunships.\n\t\n\t*goto lie_feelings\n\n*comment YOU KNOW SOMETHING IS UP, BUT NOT WHAT\n*comment (THIS ONE WORKS WHETHER YOU REPORTED IT OR NOT)\n\n*label clue_you_in\n*gosub arrival_expo\n*gosub telepathy\n*gosub spoke_against\n*gosub learned_plans\n\"We had assumed as much.  And I could not help but notice, from my brief glimpse of your memories, that it was your refusal
