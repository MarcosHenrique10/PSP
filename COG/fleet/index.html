<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Fleet — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "fleet", "title": "The Fleet", "scenes": {"begin": "*temp premonition false\n*temp derogatory \"things\"\n\nYou are the Captain of an epsilon-class deep space cruiser.  You stand on its bridge.  The only illumination here, apart from viewscreens and service lights, comes from a vast holographic field in the center of the command chamber.  Within it floats an image of your ship, surrounded by the other vessels in its convoy.\n\nHalf of them are military class.  Fortified metal boxes and cylinders, built in space, to live and die in space.  The rest are civilian trade and transport vessels, many bearing commercial emblems.  They are being escorted to a safe phase-point, thirty klicks from your home planet...\n*label redo_planet\n*choice\n  #...Duroon.\n    *set plan_name \"Duroon\"\n    *goto post_planet\n  #...Altaia.\n    *set plan_name \"Altaia\"\n    *goto post_planet\n  #...Zaidan.\n    *set plan_name \"Zaidan\"\n    *goto post_planet\n  #...Madris.\n    *set plan_name \"Madris\"\n    *goto post_planet\n  #I will tell you the name of my home planet.\n    *input_text plan_name\n    *if (plan_name = \"Kargham\") or (plan_name = \"kargham\")\n      *goto alien_glitch\n    *if (plan_name = \"Q'uai\") or (plan_name = \"q'uai\")\n      *goto alien_glitch\n    *if (plan_name = \"Skryll\") or (plan_name = \"skryll\")\n      *goto alien_glitch\n    *if (plan_name = \"Quai\") or (plan_name = \"quai\")\n      *goto alien_glitch\n    *if (plan_name = \"Varr\") or (plan_name = \"varr\")\n      *goto alien_glitch\n    *if (plan_name = \"Calpurnia\") or (plan_name = \"calpurnia\")\n      *goto ally_glitch\n    *if (plan_name = \"Tzir\") or (plan_name = \"tzir\")\n      *goto ally_glitch\n    *if (plan_name = \"Rakashi\") or (plan_name = \"rakashi\")\n      *goto ally_glitch\n    *if (plan_name = \"Mercury\") or (plan_name = \"mercury\")\n      *goto solar_glitch\n    *if (plan_name = \"Venus\") or (plan_name = \"venus\")\n      *goto solar_glitch\n    *if (plan_name = \"Mars\") or (plan_name = \"mars\")\n      *goto solar_glitch\n    *if (plan_name = \"Neptune\") or (plan_name = \"neptune\")\n      *goto solar_glitch\n    *if (plan_name = \"Saturn\") or (plan_name = \"saturn\")\n      *goto solar_glitch\n    *if (plan_name = \"Jupiter\") or (plan_name = \"jupiter\")\n      *goto solar_glitch\n    *if (plan_name = \"Uranus\") or (plan_name = \"uranus\")\n      *goto solar_glitch\n    *if (plan_name = \"Earth\") or (plan_name = \"earth\")\n      *goto solar_glitch\n    *if (plan_name = \"Pluto\") or (plan_name = \"pluto\")\n      Unlike ${plan_name}, your home planet is a planet.  Please choose again...\n      \n      *goto redo_planet\n    *if (plan_name = \"Dantooine\") or (plan_name = \"dantooine\")\n      *goto ally_glitch\n    *if (plan_name = \"Tatooine\") or (plan_name = \"tatooine\")\n      *goto ally_glitch\n    *if (plan_name = \"Tattooine\") or (plan_name = \"tattooine\")\n      *goto ally_glitch\n    *if (plan_name = \"Endor\") or (plan_name = \"endor\")\n      *goto ally_glitch\n    *if (plan_name = \"Mongo\") or (plan_name = \"mongo\")\n      *goto ally_glitch\n    *if (plan_name = \"Helium\") or (plan_name = \"helium\")\n      *goto ally_glitch\n    *if (plan_name = \"Hoth\") or (plan_name = \"hoth\")\n      *goto ally_glitch\n    *if (plan_name = \"Texas\") or (plan_name = \"texas\")\n      *goto ally_glitch\n    *if (plan_name = \"Manhattan\") or (plan_name = \"manhattan\")\n      *goto ally_glitch\n    *if (plan_name = \"Brooklyn\") or (plan_name = \"brooklyn\")\n      *goto ally_glitch\n    *if (plan_name = \"Las Vegas\") or (plan_name = \"las vegas\")\n      *goto ally_glitch\n    *if (plan_name = \"Vegas\") or (plan_name = \"vegas\")\n      *goto ally_glitch\n    *if (plan_name = \"Krull\") or (plan_name = \"krull\")\n      *goto ally_glitch\n    *if (plan_name = \"Tralfamadore\") or (plan_name = \"tralfamadore\")\n      *goto ally_glitch\n    *if (plan_name = \"Thra\") or (plan_name = \"thra\")\n      *goto ally_glitch\n    *if (plan_name = \"Pandora\") or (plan_name = \"pandora\")\n      *goto ally_glitch\n    *if (plan_name = \"LV-426\") or (plan_name = \"lv-426\")\n      *goto ally_glitch\n    *if (plan_name = \"lv426\") or (plan_name = \"LV426\")\n      *goto ally_glitch\n    *if (plan_name = \"L.V.426\") or (plan_name = \"L.V. 426\")\n      *goto ally_glitch\n    *if (plan_name = \"LV-223\") or (plan_name = \"lv-223\")\n      *goto ally_glitch\n    *if (plan_name = \"lv223\") or (plan_name = \"LV223\")\n      *goto ally_glitch\n    *if (plan_name = \"L.V. 223\") or (plan_name = \"L.V.223\")\n      *goto ally_glitch\n    *if (plan_name = \"Naboo\") or (plan_name = \"naboo\")\n      *goto ally_glitch\n    *if (plan_name = \"Nabu\") or (plan_name = \"nabu\")\n      *goto ally_glitch\n    *if (plan_name = \"Melancholia\") or (plan_name = \"melancholia\")\n      *goto ally_glitch\n    *if (plan_name = \"Cybertron\") or (plan_name = \"cybertron\")\n      *goto ally_glitch\n    *if (plan_name = \"Vulcan\") or (plan_name = \"vulcan\")\n      *goto ally_glitch\n    *if (plan_name = \"Alderon\") or (plan_name = \"alderon\")\n      *goto ally_glitch\n    *if (plan_name = \"Alderaan\") or (plan_name = \"alderaan\")\n      *goto ally_glitch\n    *if (plan_name = \"Krypton\") or (plan_name = \"krypton\")\n      *goto ally_glitch\n    *if (plan_name = \"Ork\") or (plan_name = \"ork\")\n      *goto ally_glitch\n    *if (plan_name = \"Omicron Persei 8\") or (plan_name = \"Omicron Persei Eight\")\n      *goto ally_glitch\n    *if (plan_name = \"Arrakis\") or (plan_name = \"Arakkis\")\n      *goto ally_glitch\n    *if (plan_name = \"Arakis\") or (plan_name = \"Arrakkis\")\n      *goto ally_glitch\n    *if (plan_name = \"Melmac\") or (plan_name = \"melmac\")\n      *goto ally_glitch\n    *if (plan_name = \"Melmack\") or (plan_name = \"melmack\")\n      *goto ally_glitch\n    *if (plan_name = \"Kobol\") or (plan_name = \"kobol\")\n      *goto ally_glitch\n    *if (plan_name = \"Cobol\") or (plan_name = \"cobol\")\n      *goto ally_glitch\n    *if (plan_name = \"Remulak\") or (plan_name = \"remulak\")\n      *goto ally_glitch\n    *if (plan_name = \"Kronos\") or (plan_name = \"kronos\")\n      *goto ally_glitch\n    *if (plan_name = \"Cronos\") or (plan_name = \"cronos\")\n      *goto ally_glitch\n    *if (plan_name = \"Chronos\") or (plan_name = \"chronos\")\n      *goto ally_glitch\n    *if (plan_name = \"Dagobah\") or (plan_name = \"dagobah\")\n      *goto ally_glitch\n    *if (plan_name = \"Archeron\") or (plan_name = \"archeron\")\n      *goto ally_glitch\n    *if (plan_name = \"Kharak\") or (plan_name = \"kharak\")\n      *goto ally_glitch\n    *if (plan_name = \"Karak\") or (plan_name = \"karak\")\n      *goto ally_glitch\n    *if (plan_name = \"Gallifrey\") or (plan_name = \"gallifrey\")\n      *goto ally_glitch\n    *if (plan_name = \"Eternia\") or (plan_name = \"eternia\")\n      *goto ally_glitch\n    *if (plan_name = \"Etheria\") or (plan_name = \"etheria\")\n      *goto ally_glitch\n    *if (plan_name = \"Paris\") or (plan_name = \"paris\")\n      *goto ally_glitch\n    *if (plan_name = \"France\") or (plan_name = \"france\")\n      *goto ally_glitch\n    *if (plan_name = \"London\") or (plan_name = \"london\")\n      *goto ally_glitch\n    *else\n      *goto post_planet\n\n*label alien_glitch\nYou must be confused, Captain.  ${plan_name} is located in the Outer Systems.  Please choose again...\n\n*goto redo_planet\n\n*label ally_glitch\nYou must be confused, Captain.  ${plan_name} is located in the Outer Systems.  Please choose again...\n\n*goto redo_planet\n\n*label solar_glitch\nYou seem to be confused, Captain.  ${plan_name} is an obscure body in the S.K. system, too primitive to participate in interstellar trade.\n\nPlease choose again...\n\n*goto redo_planet\n\n\n*label post_planet\n${plan_name} glitters like a jewel on the aft monitor, the image of safety and peace.  But these days, it is not as serene as it appears.\n\nIn the holographic field, you watch your roster of civilian vessels break from the convoy, preparing to phase into hyperspace.  Soon they will be on their way to rendezvous with the light-beings of Tzir, the feline warriors of Rakashi, and other citizens of the Outer Systems.\n\nBut they must always be on guard against your enemies...\n*label try_again2\n*choice\n  #...the Kargham.\n    *set enemy_name \"Kargham\"\n    *goto form_of_the_destructor\n  #...the Q'uai.\n    *set enemy_name \"Q'uai\"\n    *goto form_of_the_destructor\n  #...the Skryll.\n    *set enemy_name \"Skryll\"\n    *goto form_of_the_destructor\n  #...the Varr.\n    *set enemy_name \"Varr\"\n    *goto form_of_the_destructor\n  #I will tell you the name of the enemy.\n    My enemies are known as the...\n    *input_text enemy_name\n    *if (enemy_name = \"Calpurnia\") or (enemy_name = \"calpurnia\")\n      *goto enemy_glitch\n    *if (enemy_name = \"Calpurnians\") or (enemy_name = \"calpurnians\")\n      *goto enemy_glitch\n    *if (enemy_name = \"Tzir\") or (enemy_name = \"tzir\")\n      *goto enemy_glitch\n    *if (enemy_name = \"Rakashi\") or (enemy_name = \"rakashi\")\n      *goto enemy_glitch\n    *if (enemy_name = plan_name)\n      You cannot tell your enemies from your friends, an easy enough mistake.  Please choose again...\n      \n      *goto try_again2\n    *else\n      *goto form_of_the_destructor\n\n*label enemy_glitch\nThe ${enemy_name} are not enemies of yours.  Yet.\n\nPlease choose again...\n\n*goto try_again2\n\n\n*label form_of_the_destructor\nYes, the ${enemy_name}, a civilization feared for its cruelty and insatiable greed.  They have been raiding your trade routes for four months now, and they will not rest until all the riches of ${plan_name} have fallen into their...\n\n*choice\n  #...reptilian hands.\n    *set enemy_type \"lizard\"\n    *goto grumble\n  #...tentacled clutches.\n    *set enemy_type \"squid\"\n    *goto grumble\n  #...insectoid foreclaws.\n    *set enemy_type \"bug\"\n    *goto grumble\n  #...oozing pseudopodia.\n    *set enemy_type \"blob\"\n    *goto grumble\n\n*label grumble\n*if enemy_type = \"blob\"\n  *set derogatory \"walking pools of slime\" \n*if enemy_type = \"bug\"\n  *set derogatory \"claw-handed maniacs\"\n*if enemy_type = \"lizard\"\n  *set derogatory \"snake-skinned maniacs\"\n*if enemy_type = \"squid\"\n  *set derogatory \"tentacle balls\"\nYou have never seen one of the ${enemy_name} up close.  Only from ship's distance, and often in combat.  They are not fond of negotiating, and seldom appear on the viewscreens.  But you know they are feared and hated in equal measure.\n\nLieutenant Demian emerges from the shadows beyond the fore monitor, the starburst insignia of the ${plan_name} navy gleaming on her uniform.  Her dark eyes survey the commercial ships as they prepare to phase.  \"Thirty escort runs, this week alone.  It's time to fight back against \n*if enemy_type = \"blob\"\n  these blobs.  \n*if enemy_type = \"bug\"\n  these bugs.  \n*if enemy_type = \"lizard\"\n  these overgrown lizards.  \n*if enemy_type = \"squid\"\n  these squids.  \nOur fleet should be making a direct attack on the ${enemy_name} home world!\"\n\nMany of your military comrades feel the same way she does.  As for your opinion, it is well known to your crew, and even to the civilians you oversee...\n*choice\n  #You feel it is time to bring the battle to the ${enemy_name}, not waste time overseeing civilian patrols.\n    *set civ_like false\n    *set civ_trust %- 10\n    *set mil_trust %+ 10\n    You and Lieutenant Demian have had your share of disagreements over the years, but when it comes to the ${enemy_name}, you are of the same mind: you want to bring the battle to them.\n    \n    You tell the Lieutenant of your hope that you will soon stand together in a direct attack against the enemy.  \"I will look forward to that day, Captain,\" she replies.\n    \n    Though there may be another way.  The High Council of ${plan_name} has revived talk of forging an alliance with the Outer Systems to combat the ${enemy_name} menace, and most civilians seem to be in favor of the idea.\n    \n    *goto personally\n  #You feel trade is essential to the health of your planet, and your efforts to protect these civilians are an honorable contribution to the fight.\n    *set civ_trust %+ 10\n    *set mil_trust %- 10\n    You remind the Lieutenant that trade is the life's blood of your planet.  While there may be little glamour in the protection of the people, there is much honor.\n    \n    As you speak these words, she remains focused on the vessels in the monitor, in silent defiance.  You know she will hold stubbornly to her opinion, much the way you hold to yours.  But perhaps this is why you respect her so much.\n    \n    At any rate, there may be nothing left to argue.  The High Council of ${plan_name} has revived talk of forging an alliance with the Outer Systems to combat the ${enemy_name} menace, and most civilians seem to be in favor of the idea.\n    \n    *goto personally\n  #You feel there is too much work to do in a time of warfare to question orders.\n    You remind the Lieutenant that the ${plan_name} military is not held together by bickering, but obedience.  As you speak these words, she remains focused on the vessels in the monitor, silently enduring your rebuke.  She will allow the matter to drop, if only for now.\n    \n    The Lieutenant is not one to hide her opinions from you, no matter how hard they sting.  Perhaps this is why you respect her so much.  You let the subject pass.\n    \n    There may be nothing left to argue, at any rate.  The High Council of ${plan_name} has revived talk of forging an alliance with the Outer Systems to combat the ${enemy_name} menace, and most civilians seem to be in favor of the idea.\n    \n    *goto personally\n\n*label postwhine\nThe High Council of ${plan_name} has revived talk of forging an alliance with the Outer Systems, to combat the threat.  Most civilians seem to be in favor of the idea.\n\n*label personally\nPersonally, you feel...\n\n*choice\n  #...that the very idea of an Intergalactic Alliance is an absurd one, given the cruel and ignoble nature of the creatures in the neighboring systems.\n    *set alliance_true 25\n    *set position \"Anti-Alliance\"\n    As the ${enemy_name} have demonstrated, the civilizations of the Outer Systems are not to be trusted.  Unhappy to master trade, they resort to warfare.\n    \n    Thankfully, after enduring their cruelty, many of your colleagues in the military are of the same opinion on this matter, and they assume correctly that you hold it too.\n    *goto moment_of_untruth\n  #...that the Intergalactic Alliance, and its ideals, would represent the dawning of a bright new era for the universe at large.  \n    *set alliance_true 75\n    *set position \"Pro-Alliance\"\n    As the ${enemy_name} have demonstrated, your need for an intergalactic alliance is greater now than ever.  With the support of like-minded civilizations in the Outer Systems, you could band together against the cruelty of the ${enemy_name}, and create order out of the chaos they wish to sow.\n    \n    Unfortunately, after four months of ${enemy_name} attacks, your comrades in the military do not share your point of view.  In fact, none of them knows you feel the way you do.  Not even your Lieutenant.\n    *goto moment_of_untruth\n  #...that you'd need to see such a group like the Intergalactic Alliance in action before you made any decisions for or against it.\n    *set position \"Neutral\"\n    Indeed, it's only sensible to remain neutral on a matter as untested as intergalactic accord.  You know that some civilizations of the Outer Systems truly yearn for peace, while others merely sow chaos.  Only time will tell if these vastly different worlds can come together, and work toward common goals.\n\n    Unfortunately, after four months of ${enemy_name} attacks, your comrades in the military do not share your even-handed point of view.  In fact, none of them knows you feel the way you do.  Not even your Lieutenant.\n    *goto moment_of_untruth\n\n*label moment_of_untruth\n*page_break\nCommunications announces an incoming transmission.  Admiral Kalla, leader of the Planetary Defense Fleet, appears on the main telescreen.\n\nYou are always glad to see the face of your old mentor...\n*choice\n  #...a dignified leader of great honor and grace.\n    *set wash true\n    *goto washy\n  #...a curmudgeonly war horse who regards a good argument as a sign of friendship.\n    *set patt true\n    *goto patty\n  #...a distant but brilliant strategic genius to whom battle itself is a kind of science.\n    *set sun true\n    *goto sunny\n\n*label washy\nAdmiral Kalla taught you how respect holds a military unit together, be it a squadron or a fleet.  You learned from his example that the trust of your fellow soldiers is a commodity above price.  Although he is your superior, he addresses you at respectful attention.  With him in it, the viewscreen becomes a portrait of formality.\n\n\"Regards, Captain,\" the Admiral says, typically decorous.  \"How does our mission proceed?\"\n\n*choice\n  #Report your current status.\n    You report that you are preparing for a final hyperspace scan before sending the civilians on their way.\n    \n    *if civ_trust \u003c 50\n      The Admiral smiles knowingly.  \"There is nothing that this fighting force prizes above your loyalty, Captain.  And though I know that you feel these missions are below your talent, I can promise you our struggle will change very soon, and the shape of the universe with it.\"\n      \n      *goto before_you\n    *else\n      The Admiral smiles knowingly.  \"There is nothing that this fighting force prizes above your loyalty, Captain.  I know that these escort runs are tiring.  But I can promise you our struggle will change very soon, and the shape of the universe with it.\"\n      \n      *goto before_you\n  #Express your confidence in another successful run.\n    You say that you feel certain you are assured another successful escort run.\n    \n    *if civ_trust \u003c 50\n      The Admiral smiles knowingly.  \"There is nothing that this fighting force prizes above your loyalty, Captain.  And though I know that you feel these missions are below your talent, I can promise you our struggle will change very soon, and the shape of the universe with it.\"\n      \n      *goto before_you\n    *else\n      The Admiral smiles proudly.  \"I am sure that your confidence is not misplaced.  Rest assured our struggle will change very soon, and the shape of the universe with it.\"\n      \n      *goto before_you\n\n  *if civ_trust \u003c 50\n    #Reinforce your objection to these escort details.\n      As you have in the past, you respectfully voice your misgivings about the escort runs.\n      \n      The Admiral nods, smiling like an old friend.  \"I know the fight has been long,\" he says, \"but I can promise that this struggle will change soon, Captain.  And the shape of the universe will change with it.\" \n      \n      *goto before_you\n\n  *if civ_trust >= 50\n    #Confess your concerns about the growing ${enemy_name} threat.\n      *set premonition true\n      You explain that the persistence of the ${enemy_name} raids has begun to worry you.  What if they are plotting something bigger than you think?\n      \n      The Admiral nods, and you can see that he shares your concerns.  \"You may be right,\" he admits, \"but I am confident this struggle will change soon.  And mark my words, Captain: the shape of the universe will change with it.\"\n      \n      *goto before_you\n\n*label patty\nAdmiral Kalla seems to have made combat a way of life.  Even talking with him feels like a skirmish.  But is there any better way to keep a fighting force on guard?\n\n\"Wake up, Captain!\" the crusty marine barks in his typically blunt manner, leaning into the vidlink confrontationally.  \"You look tired!  What's the trouble, no ${enemy_name} out there today to keep you company?\"\n*choice\n  #Report that indeed, the way seems clear.\n    You report that the hyperspace channels are empty as far as you can see.  One more scan to go, and your civilians will be on their way.\n    \n    \"Well don't let yourself get bored out there, Captain.  The ${enemy_name} aren't gonna wait for you to wake up to start the shooting, you hear?  We've got to hold these ${derogatory} off for a few more weeks.  Give things time to change out there.\"\n    \n    *goto before_you\n\n  #Tell the Admiral that you only tire of waiting for the chance to fight.\n    You assure the Admiral that you will be ready to take the ${enemy_name} when the chance arises.\n    \n    \"That's good to hear,\" the Admiral grins.  \"Because you've got to buy us time.  Hold these ${derogatory} off for a few more weeks.  Give things time to change out there.\"\n    \n    *goto before_you\n  *if civ_trust \u003c 50\n    #Remind the Admiral that you are bored of escort runs, and ready for a bigger mission.\n      You reiterate your objection to the escort runs.\n      \n      \"Good thing I'm the one giving the orders then, isn't it?\" the Admiral chuckles.  \"Stick to it a little longer, Captain.  Hold these ${derogatory} off for a few more weeks.  We've just gotta give things time to change out there.\"\n      \n      *goto before_you\n  *if civ_trust >=50\n    #Confess your concerns about the ${enemy_name} threat.\n      *set premonition true\n      You explain that the persistence of the ${enemy_name} raids has begun to worry you.  What if they are plotting something bigger than you think?\n      \n      \"Then we'll deal with it,\" the Admiral barks.  \"Believe me, Captain, I'll tell you when it's time to move against these ${derogatory}.  And it's not time yet.  We gotta give things time to change out there.\"\n      \n      *goto before_you\n\n*label sunny\nAdmiral Kalla's stoicism has taught you much.  Namely that warfare, for all its terrors, is best approached dispassionately, from a strategic distance.  And no one embodies that distance more than Admiral Kalla.\n\nA gaunt figure in his service uniform, he stands at rigid attention, his face flat, his eyes piercing.\n\n\"Report, Captain.  Any signs of the enemy?\"  \n*choice\n  #Report that you are about to initiate your final scan.\n    You report that the hyperspace channels are empty as far as you can see.  One more scan to go, and your civilians will be on their way.\n    \n    *if civ_trust \u003c 50\n      \"Proceed, Captain.  And remain alert.  I realize you are unhappy with these escort missions, but such thoughts are mere distractions, and of little value to our operation.  You must hold the line just a few weeks more.  Rest assured, our true strategy will reveal itself in time.\"        \n      *goto before_you\n    *else\n      \"Proceed, Captain.  And remain alert.  I realize that these escort runs are wearying.  Focus on the facts at hand, not your emotions.  You must hold the line a few weeks more.  Rest assured, our true strategy will reveal itself in time.\"\n      \n      *goto before_you\n\n  #Express your confidence that you will be able to deal with them, should they come.\n    You assure the Admiral that you will be ready to take the ${enemy_name} when the chance arises.\n    \n    \"I asked for information, not prophecy.\"  The Admiral takes a step closer to the vidlink, and speaks firmly.  \"You must maintain your focus, Captain.  Fear and confidence are equally dangerous in combat.  They are both illusions.  Hold the line a few weeks more.  And rest assured, our true strategy will reveal itself in time.\"\n    \n    *goto before_you\n  *if civ_trust \u003c 50\n    #Explain that you are having difficulty focusing on these endless escort runs.\n      You reiterate your objection to the escort runs.\n      \n      \"I asked for information, not opinions.  You must focus on the task at hand; that must be the only thing in your mind.\"  The Admiral takes a step closer to the vidlink, and speaks firmly.  \"I am aware that you worry our strategy is purely defensive.  But our true strategy has not been revealed to you yet, Captain.  It will be in time.\"\n      *goto before_you\n  *if civ_trust >=50\n    #Confess your concerns about the ${enemy_name} threat.\n      *set premonition true\n      You explain that the persistence of the ${enemy_name} raids has begun to worry you.  What if they are plotting something bigger than you think?\n      \n      \"I asked for information, not conjecture.\" The Admiral takes a step closer to the vidlink, and speaks firmly.  \"You must maintain your focus, Captain.  Fear and confidence are equally dangerous in combat.  They are both illusions.  Hold the line a few weeks more.  And rest assured, our true strategy will reveal itself in time.\"\n      *goto before_you\n\n*label before_you\n\nBefore you can ask what he means by this, the battle klaxon sounds.  Zagi, your tactician, scans hyperspace for the source of the alert.  \"${enemy_name} ships on the way!\" she cries.  \"Looks like we've got another raid on our hands!\"\n\n*if patt = true\n  \"You know what to do, Captain,\" the Admiral advises.  \n*if wash = true\n  \"Again we fight for the honor of ${plan_name},\" the Admiral says.  \n*if sun = true\n  \"Engage the enemy,\" the Admiral orders. \nYou hear him calling his own forces to battle stations as his transmission cuts out.\n\nYou ask for a report on the attackers' capabilities.  \"I'm seeing fortified battleships and cruisers.  And something else at the back of the formation, too.  Something big.\"  Zagi looks up from her screen, directly at you.  \"Captain, it's a dreadnought...\"\n\nThe news sends a wave of silence through the bridge.\n*page_break\nSeconds later, you can see it in the holographic field, emerging from hyperspace. Like most of the ${enemy_name} capital vessels, it looks like a cross between a ship and a sideways mountain.  A taste of the barrenness of their home world.\n\nYou don't need Zagi to tell you it is mere klicks away from your convoy.  ${enemy_name} fighters are already beginning to launch from the spires at its helm.  Other vessels from its squadron are emerging beside it.\n\n\"What are your orders?\" she asks, and the rest is practically a reflex.  You employ the strategy for which you are well-known...\n\n*choice\n  #Force: You order Tactical to hit the incoming vessels with everything you have.\n    You've learned the hard way that, in wartime, the direct approach is usually the most effective one.\n\n    You launch your strikers directly into the fray, along with a healthy dose of cannon fire to flank the attack.  If the ${enemy_name} expected hesitation from the people of ${plan_name}, they found none today.\n    *set bat_style %+ 20\n    *goto post_inst\n  #Elegance: You find a simple way to turn the fight against the ${enemy_name}.\n    You've learned over the years that the bigger brain can beat the bigger gun.\n\n    You order the convoy to reconfigure into a corridor pattern, creating a blockade with a defensive flaw too tempting for the ${enemy_name} to resist.  When their fighters try to sneak below your ships to attack the civilians, they bring themselves directly in range of your cannons, and your gunners pick them off readily.\n    *set bat_style %- 20\n    *goto post_inst\n\n*label post_inst\nYou exchange a triumphant smile with Lieutenant Demian.\n\nYour squadron seems well-tuned to your preferred strategy, even though many of these ships are new to your command.\n\nAnd you know they will only get better.  The longer you keep your fleet fighting in your preferred style, the more skill they will develop in that area.\n*page_break\n\"Another wave of attackers is approaching from hyperspace!\" Zagi reports, her eyes locked on the field.  She moves like she is in combat herself, dragging and spinning the hologram as the enemy ships phase in, relaying orders to the cannon operators on the battleship, and the strikers out in the zone.\n\n\"There's a hole in their defenses!\" Lieutenant Demian shouts, pointing triumphantly into the field.  Sure enough the ${enemy_name} fighters, in their attack on your civilian vessels, have forgone evasive maneuvers and left the starboard side of their dreadnought wide open.  An invitation to change the course of the entire battle.\n\nHowever, the dreadnought is dangerously close to your convoy, and you know the civilian ships under your protection are lightly armored at best.  If you hit the dreadnought at all, collateral damage will be inevitable.\n\nIt is not so much a question of strategy, but priorities, and yours are crystal clear.\n\n*choice\n\n  #Destroy the dreadnought: you know many more lives will be at risk if you do not act decisively.\n    You give the order to hammer the dreadnought hard with a steady barrage of cannon fire.\n\n    Before the ${enemy_name} fighters can respond to the onslaught, your forces have broken through to the dreadnought's core.  The resulting explosion carries through the vessel like a fault line, and debris sails into space on every side as the ship comes apart.\n\n    Your convoy takes evasive action, but you lose several merchant vessels in the destruction of the massive ${enemy_name} ship.\n\n    You remind yourself that more ships would have been lost if you had not acted as you did, and proceed with the battle as before.\n    *set civ_trust %- 20\n    *set mil_trust %+ 20\n    *page_break\n    *goto post_dread\n  #Damage the dreadnought: you know you have to measure this strategic opportunity against the risk posed to the civilians under your protection.\n    You can't pass up a chance to disable the vessel, but you don't want to endanger the merchants unnecessarily, either.  You order the cannons to hit the dreadnought in short bursts, aiming to incapacitate it.\n\n    Before the ${enemy_name} fighters can respond to your attack, your forces have damaged the fuel housing on its side.  The resulting explosion sends the enormous vessel into a slow spin, and debris begins shearing off one side.\n\n    Your convoy has time to take evasive action, but a few civilian vessels are unable to get themselves clear in time.\n\n    You remind yourself that more ships would have been lost if you had not acted as you did, and proceed with the battle as before.\n    *set battle1_damage +25\n    *set civ_trust %- 10\n    *set mil_trust %+ 10\n    *page_break\n    *goto post_dread\n  #Ignore the opportunity: you know that your mission is to protect the civilians, and you will not risk their lives for victory.\n    Your mission is to protect the civilian vessels, and that is just what you are going to do.\n\n    \"Let it pass, Lieutenant.  We'll have to get more clearance before we can strike a vessel of that size.\"\n\n    Lieutenant Demian seems disappointed, but you know you have acted correctly.  Even if the civilians will never know how many of their lives your decision saved.\n    *set battle1_damage +50\n    *set mil_trust %- 10\n    *page_break\n    *goto post_dread\n\n*label post_dread\n\"Captain, I'm seeing another wave of ships phasing in from hyperspace, from multiple points around ${plan_name}.  But these ones aren't military grade...\"\n\nZagi rotates the holographic field and closes in on the unknown craft as they emerge into the quadrant.  They are tiny, each just a few hundred cubic meters.  Along their hulls are glowing rows of exposed energy cells.\n\n\"The new ships aren't in our database, Captain.  My guess is they're refueling stations of some sort.  Their energy readings are off the charts.\"\n\n\"Refueling stations capable of phasing out of hyperspace on their own?\" Lieutenant Demian asks, the alarm coming through in her voice.\n\nWhen Zagi widens the viewing area, your blood runs cold.  The unknown vessels have settled into a pattern just shy of ${plan_name}'s outer layer.  Their cells glow blue, and a devastating energy blast breaks through the thermosphere with a flash, like lightning.\n*page_break\nThe crew stares in stunned silence as the atmosphere below the ${enemy_name} ships visibly ignites.  Although the glow does not spread far, you know that this attack has meant the devastation of whole cities.\n\nAdmiral Kalla's defense fleet begins destroying the new weapons before they can fire again, but more ${enemy_name} are phasing into the battle zone every second.  The Admiral's fleet is wide open to attack as they attempt to eliminate the threat.\n\nYou put out the call to your fleet...\n*choice\n\n  #...to use your combined forces to help the Admiral defeat the ${enemy_name} warships.\n    *set mil_trust %+ 20\n    You link communications with the other military vessels and do your best to turn the tide against the ${enemy_name}, but more and more ships are phasing into the quadrant every minute.\n    \n    *goto post_destruction\n  \n  #...to use your combined forces to keep all civilian ships within protective range during this operation.\n    *set civ_trust %+ 20\n    You know your mission is to protect the civilians above all.  Linking communications with the other military vessels, you do your best to gather them into defensive range.  As for Admiral Kalla's defensive squadrons, more and more ${enemy_name} ships phase into the quadrant every minute to confront them.\n    \n    *goto post_destruction\n\n*label post_destruction\n*page_break\nAdmiral Kalla appears on the main viewscreen wearing a grave expression, a red alert screaming overhead.\n\n*if patt = true\n  \"We've taken care of those new guns, but it's cost us.  We can't hold off the ${enemy_name} with the ships we have left.  These things are smarter than we thought.\"\n*if wash = true\n  \"The new weapons have been destroyed, but at great cost.  We cannot hope to hold the ${enemy_name} at bay with the ships that remain in our defense fleet.\"\n*if sun = true\n  \"Our enemy planned this day well, Captain.  These new weapons have forced us to abandon our defensive formation.  We have no hope of holding off the ${enemy_name} now.  Not with so few ships.\"\n\nThe Admiral taps a series of numbers into the overhead console.  \n*if patt = true\n  \"I'm sending you the drive codes for the ships we've got left.  I'll stay here and keep the ${enemy_name} occupied.  You take the rest of the fleet to a safe waypoint, and do it now...\" \n*if wash = true\n  \"I am sending you the drive codes for the remaining ships in our fleet.  I will stay behind with one of our squadrons.  Together, we will keep the ${enemy_name} occupied.  But you must take the rest of the fleet to a safe waypoint, and you must do it now...\"\n*if sun = true\n  \"These are the drive codes for the remaining ships in our fleet.  I will stay behind with one of our squadrons, to distract the ${enemy_name}.  But you must take the other ships in the quadrant to a safe waypoint.  Do it now...\"\n*choice\n  #Tell the Admiral that you will not leave ${plan_name} to the ${enemy_name}.\n    *label puh_leez\n    *if patt = true\n      \"Dammit, Captain!  Look at the size of the incoming squadrons, will you?  ${plan_name} is lost, and without our fleet, we'll have no chance of winning it back!\"\n      \n      You still feel that the planet is being handed over without a fight, but this is not the time to argue.\n      *page_break\n      *goto your_orders\n    *if wash = true\n      \"Your heroism will find its moment, Captain.  But today, we are defeated.  The incoming squadrons are too large to drive off.  ${plan_name} is lost, and without our fleet, we have no hope of winning it back.\"\n      \n      You still feel that the planet is being handed over without a fight, but this is not the time to argue.\n      *page_break\n      *goto your_orders\n    *else\n      \"${plan_name} has already fallen, Captain.  Without our fleet, it will be impossible to win it back.  You must take it now, and go.\"\n      \n      You still feel that the planet is being handed over without a fight, but this is not the time to argue.\n      *page_break\n      *goto your_orders\n\n  #Say that you know you can turn the battle in your favor.\n    *goto puh_leez\n  #Tell the Admiral that you will follow your orders. \n    *if wash = true\n      \"We are fortunate indeed to have such a dedicated defender.  This trait will serve you well as our new Fleet Captain.\"  Noting your surprise at the news of your promotion, the Admiral smiles sadly.  \"It is a title you would have achieved in time.  I only wish that it were granted under happier circumstances.  But go, link with the other ships!  And at all costs, bring the merchant ship Draco with you.  There is something aboard that can help us.  Farewell...\" He cuts the transmission.\n      \n      *goto you_have\n    *if patt = true\n      \"Glad to hear it, because you're Fleet Captain now.  I'm promoting you as of this minute.  So link with every ship you can and get the hell into hyperspace!\" he barks.  \"But don't leave the merchant ship Draco behind, you hear?  You're gonna need what's on board.\" He looks you in the eye for a moment.  Somehow you know it will be the last time you see him.  He cuts the transmission.\n      \n      *goto you_have\n    *else\n      \"It is you who will give the orders from now on: you are hereby promoted to Fleet Captain,\" the Admiral declares.  \"Now, link with as many other active vessels as you can, and phase into hyperspace.  But be sure to bring the merchant ship Draco with you.  It is essential to our strategy.\" He looks up at you, and for the first time in your history, you catch a glimpse of quiet sadness in his eyes.  \"It may be that you do not feel ready to take this step, Fleet Captain.  But you do not have to feel ready.  Such thoughts are incidental.  Remember that.  And good luck.\"  The transmission cuts off.\n      \n      *goto you_have\n\n*label your_orders\n*if wash = true\n  \"You are promoted to Fleet Captain,\" the Admiral declares.  \"It is an honor you would have achieved in time, under happier circumstances.  But now you must go!  Link with the other ships, and phase together into hyperspace!  And at all costs, bring the merchant ship Draco with you.  There is something aboard that can help us.\" He cuts the transmission.\n  \n*if patt = true\n  \"Effective immediately, I'm promoting you to Fleet Captain,\" the Admiral declares.  \"It's not right to have it happen like this, but there isn't enough time.  I'm sorry for that.  I truly am.\"  For only a moment, there is an unfamiliar sadness in his eyes, and then it vanishes.  \"Now link with every ship you can and get the hell into hyperspace!\" he barks.  \"And don't leave the merchant ship Draco behind, you hear?  You're gonna need what's on board.\" He cuts the transmission.\n  \n*if sun = true\n  \"You are promoted to Fleet Captain,\" the Admiral declares abruptly.  \"Now, link with as many other active vessels as you can, and phase into hyperspace.  But be sure to bring the merchant ship Draco with you.  It is essential to our strategy.\" He looks up at you, and for the first time in your history, you catch a glimpse of quiet sadness in his eyes.  \"It could be that you do not feel ready to take this step, Fleet Captain.  But you do not have to feel ready.  Such thoughts are incidental.  Remember that.  And good luck.\"  The transmission cuts off.\n  \n*label you_have\nYou have your orders.  You command the fleet to connect astrogational systems, managing to link with most of the military vessels, and all of the civilians.\n\nIn the aft monitor, you can see the Admiral's ship, imploding from the relentless attack.  As your phase proceeds, his vessel disintegrates in a hail of ion cannon fire.  Behind it you can see the firestorms down on ${plan_name} still glowing brightly, and ${enemy_name} landers preparing their approach.  Then you are gone.\n\nYour mind reaches for something, anything that will make sense of this chaos...\n*choice\n  #The Admiral will be avenged.\n    *set hate_type 50\n    You will never forget what you have seen today.\n    *finish\n  #The ${enemy_name} will pay for what they have done to your planet.\n    *set hate_type 75\n    This is your mission.\n    *finish\n  #You will return to ${plan_name} and free your people.\n    *set hate_type 25\n    This is your mission.\n    *finish\n  #All is lost.\n    This is your darkest day, and you cannot see your way through to the light.\n    *finish", "choicescript_description": "Take back your home world from alien invaders! Forge an Intergalactic Alliance (with untrustworthy allies) to reclaim your planet; blast your way to victory with an ever-expanding arsenal. Will you sacrifice civilian lives to exact vengeance on your enemies?\n\n[i]The Fleet[/i] is a thrilling interactive science-fiction novel where your choices determine how the story proceeds. The game is entirely text-based–without graphics or sound effects–but powered by the vast, unstoppable power of your imagination.\n\nWill you return home as a military dictator, a prisoner of war, or the president of a puppet state? Will you even recognize home when you get there?\n", "choicescript_stats": "See below for an assessment of your fleet's progress:\n\n*stat_chart\n\tpercent striker_coverage Striker Coverage\n\tpercent striker_skill Striker Skill\n\tpercent can_coverage Cannon Coverage\n\tpercent can_skill Cannon Skill\n\tpercent mine Mining Support\n\tpercent energy Energy Reserves\n\topposed_pair bat_style\n\t\tForce\n\t\tElegance\n\tpercent mil_trust Military Support\n\tpercent civ_trust Civilian Support\n\topposed_pair integrity\n\t\tIntegrity\n\t\tDeception\n\ttext position True Stance\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  *if choice_is_omnibus_app or choice_is_web\n    [b]Remove Advertising and Delays[/b]\n    \n    Permanently remove all ads and delays from the game.\n  *if (choice_is_omnibus_app = false) and (choice_is_web = false)\n    [b]Rest of the Game[/b]\n\n    Unlock the rest of the game, including the thrilling conclusion!\n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n", "encounter_in_the_field": "*temp closeness 0\n*temp translator_exposition false\n*temp highroad false\n*temp warning false\n*temp shootfirst false\n*temp thossian_dissonance 0\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]The Fleet[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n*if battle2_victory = false\n\tYour fleet weaves in and out of hyperspace, phasing six times before you are finally able to shake your pursuers.\tOnce you are certain the coast is clear, you realize that you must address the fleet. \n\t\n\t*set energy %-20\n*if (battle2_victory = true) and (rep > 50)\n\tYou leave the defeated ${enemy_name}, phasing in and out of hyperspace twice more to cover your trail.\tNow it is time to address the fleet.\n\t\t\n\t*set energy %-10\n*if (battle2_victory = true) and (rep \u003c 50)\n\tYou flee the carnage you have visited upon the ${enemy_name}, and phase in and out of hyperspace twice more to cover your trail.\tNow you must address the fleet.\n\t\t\n\t*set energy %-10 \n\nBut before your people learn about the Alliance, there is someone else who must be informed.\tYou call Lieutenant Demian into your cabin, and reveal to her the details of your impending rendezvous.\tShe is visibly shocked.\t\n\n\"An Intergalactic Alliance?\tIs Councilor Tayu so anxious that our people should have no control over their own fate?\tSurely you told him that he is a fool...\"\n\n*if alliance_true > 50\n\t*if alliance_out > 50\n\t\tShe speaks these last words doubtfully, fearing your response.\tPerhaps she suspects that her Captain is not on her side.\n\t\t\n\t\tWhat do you tell your Lieutenant?\n\t\t*choice\n\t\t\t#Admit that I support the Alliance.\n\t\t\t\t*set demian_out 75\n\t\t\t\t*set integrity %+15\n\t\t\t\t*gosub honest_commander\n\t\t\t\t*gosub address\n\t\t\t\t*gosub hot\n\t\t\t\tYou can feel the crew going still on the bridge, though you are sure that some of your military comrades are on your side just the same.\tThey merely fear the repercussions of voicing their support aloud.\n\n\t\t\t\tAs for the civilians listening to your transmission on their own ships, you know your words will inspire them.\tThey have long favored the idea of the Alliance.\tThey know it is the future.\n\t\t\t\t*goto fuel_dilemma_1\n\n\t\t\t#Pretend that I am on Lieutenant Demian's side.\n\t\t\t\t*set integrity %-15\n\t\t\t\t*set demian_out 25\n\t\t\t\t*gosub faker\n\t\t\t\t*gosub address\n\t\t\t\t*gosub hot\n\t\t\t\tYou can feel the crew going still around you on the bridge, as they hear you profess your belief in the Alliance.\tBut you can rely on Lieutenant Demian to convince them you are really on their side.\tAnd with luck, you can hide the truth just long enough for the good work of the Alliance to be done.\tYou cannot be the only one here who is hiding your real feelings.\n\t\t\t\t*goto fuel_dilemma_1\n\n\t*if alliance_out = 50\n\t\tShe speaks these last words doubtfully, fearing your response.\tPerhaps she suspects the truth: that at heart, you are an Alliance supporter.\n\t\t\n\t\tWhat will you tell your Lieutenant?\n\t\t*choice\n\t\t\t#Feign neutrality on the matter, as I did with Councilor Tayu.\n\t\t\t\t*set integrity %-15\n\t\t\t\t*set demian_out 50\n\t\t\t\t*gosub neutral\n\t\t\t\t*gosub address\n\t\t\t\t*gosub lukewarm\n\t\t\t\tYou can feel the crew going still around you on the bridge as the word hits them that the fleet is traveling to meet the Alliance.\tImmediately, you know you've done the right thing, concealing your support for the cause.\tYou only hope there will be time enough for the good work of the Alliance to be done.\n\t\t\t\t*goto fuel_dilemma_1\n\n\t\t\t#Pretend that I am on Lieutenant Demian's side.\n\t\t\t\t*set integrity %-15\n\t\t\t\t*set demian_out 25\n\t\t\t\t*gosub faker\n\t\t\t\t*gosub address\n\t\t\t\t*gosub lukewarm\n\t\t\t\tYou can sense the crew going still around you on the bridge, but you know Lieutenant Demian will set them at ease later, when she tells them of your recent conversation, and your \"real\" feelings.\n\t\t\t\t\n\t\t\t\tYou only hope you can hide the truth long enough for the good work of the Alliance to be done.\n\t\t\t\t*goto fuel_dilemma_1\n\n*if alliance_true = 50\n\t*if alliance_out > 50\n\t\tHowever bold her words, there is concern in her eyes.\tPerhaps she suspects your neutrality on the matter.\n\t\t\n\t\tWhat will you tell your Lieutenant?\n\t\t*choice\n\t\t\t#Continue to feign support for the Alliance, as I did with Councilor Tayu.\n\t\t\t\t*set integrity %-15\n\t\t\t\t*set demian_out 75\n\t\t\t\t*gosub honest_commander\n\t\t\t\t*gosub address\n\t\t\t\t*gosub hot\n\t\t\t\tYou can feel the crew going still around you on the bridge, as they hear you profess your belief in the Alliance. You hope you have made the right decision, pretending to be on Tayu's side.\tIt is one thing to pretend to hold a belief that is not really yours, but it would be a tragedy to die for one.\n\t\t\t\t*goto fuel_dilemma_1\n\n\t\t\t#Pretend that I am on Lieutenant Demian's side.\n\t\t\t\t*set integrity %-15\n\t\t\t\t*set demian_out 25\n\t\t\t\t*gosub faker\n\t\t\t\t*gosub address\n\t\t\t\t*gosub hot\n\t\t\t\tYou can feel the crew going still around you on the bridge, as they hear you profess your belief in the Alliance. But you can rely on Lieutenant Demian to tell them that you are really on their side, which should help keep this matter from reaching the boiling point, at least for now.\n\t\t\t\t*goto fuel_dilemma_1\n\n\t*if alliance_out = 50\n\t\tHowever bold her words, there is concern in her eyes.\tPerhaps she suspects your neutrality on the matter.\n\t\t\n\t\tYou have told Councilor Tayu the truth.\tWhat will you tell your Lieutenant?\n\t\t*choice\n\t\t\t#Reveal my neutrality on the subject.\n\t\t\t\t*set integrity %+15\n\t\t\t\t*set demian_out 50\n\t\t\t\t*gosub neutral\n\t\t\t\t*gosub address\n\t\t\t\t*gosub lukewarm\n\t\t\t\tYou can feel the crew going still around you on the bridge as the word hits them that the fleet is traveling to meet the Alliance. Immediately, you know you've done the right thing, remaining in the middle on this matter. Between Councilor Tayu's overwhelming support of the Alliance, and your crew's obvious bias against it, you may be the only person who has the distance necessary to see things clearly here.\n\t\t\t\t*goto fuel_dilemma_1\n\n\t\t\t#Pretend that I am on Lieutenant Demian's side.\n\t\t\t\t*set integrity %-15\n\t\t\t\t*set demian_out 25\n\t\t\t\t*gosub faker\n\t\t\t\t*gosub address\n\t\t\t\t*gosub lukewarm\n\t\t\t\tEven so, you can feel the crew going still around you on the bridge. Thankfully, you can rely on Lieutenant Demian to tell them that you are really on their side, which should help keep this matter from reaching a boiling point, for now.\n\t\t\t\t*goto fuel_dilemma_1\n\n*if alliance_true \u003c 50\n\t*if alliance_out > 50\n\t\tTo hear her speak, it would seem that the Lieutenant assumes you share her opinion on the matter.\n\t\t\n\t\tShe's right, of course, though you have already sold yourself to Councilor Tayu as a supporter.\tWhat do you do?\n\t\t*choice\n\t\t\t#Admit that I am on her side.\n\t\t\t\tYou tell the Lieutenant that you share her views, though you have told Councilor Tayu you are a supporter.\n\t\t\t\t*set integrity %+15\n\t\t\t\t*set demian_out 25 \n\t\t\t\t*if mil_trust >=41\n\t\t\t\t\t*gosub shebuysit\n\t\t\t\t*if mil_trust \u003c 41\n\t\t\t\t\t*gosub shenobuy\n\t\t\t\t*gosub address\n\t\t\t\t*gosub hot\n\t\t\t\tYou can feel the crew going still around you on the bridge, as they hear you profess your belief in the Alliance.\tBut you can rely on Lieutenant Demian to tell them that you are really on their side.\n\t\t\t\t*goto fuel_dilemma_1\n\n\t\t\t#Maintain my veneer of support for the Alliance.\n\t\t\t\t*set integrity %-15\n\t\t\t\t*set demian_out 75\n\t\t\t\t*gosub honest_commander\n\t\t\t\t*gosub address\n\t\t\t\t*gosub hot\n\t\t\t\tYou can feel the crew going still around you on the bridge, as they hear you profess your belief in the Alliance.\tIn your heart, you hope you have made the right decision, pretending to be on Tayu's side.\tIt would be a tragedy to die for a belief you do not hold yourself.\n\t\t\t\t*goto fuel_dilemma_1\n\n\t*if alliance_out = 50\n\t\tTo hear her speak, it seems that the Lieutenant assumes you share her opinion on the matter.\n\t\t\n\t\tShe's right, of course, though you have told Councilor Tayu otherwise.\tWhat do you do?\n\t\t*choice\n\t\t\t#Admit that I am on Lieutenant Demian's side.\n\t\t\t\tYou tell the Lieutenant that you share her views, though you have told Councilor Tayu you are undecided on the matter.\n\t\t\t\t*set integrity %+15\n\t\t\t\t*set demian_out 25\t\n\t\t\t\t*if mil_trust >=41\n\t\t\t\t\t*gosub shebuysit\n\t\t\t\t*if mil_trust \u003c 41\n\t\t\t\t\t*gosub shenobuy\n\t\t\t\t*gosub address\n\t\t\t\t*gosub lukewarm\n\t\t\t\tYou can feel the crew going still around you on the bridge as the word hits them that the fleet is traveling to meet the Alliance.\tBut you can rely on Lieutenant Demian to tell them that you are really on their side.\n\t\t\t\t*goto fuel_dilemma_1\n\n\t\t\t#Maintain my veneer of neutrality on the subject.\n\t\t\t\t*set demian_out 50\n\t\t\t\t*set integrity %-15\n\t\t\t\t*gosub neutral\n\t\t\t\t*gosub address\n\t\t\t\t*gosub lukewarm\n\t\t\t\tYou can feel the crew going still around you on the bridge as the word hits them that the fleet is traveling to meet the Alliance.\tYou share their sentiment, but you know it is for the best that you stay in character.\tIf the time comes for you to change your position, you console yourself that one can always move quickly from the center.\n\t\t\t\t*goto fuel_dilemma_1\n\n\t*if alliance_out \u003c 50\n\t\t*goto all_hang_out\n\n*label all_hang_out\n*set demian_out 25\nYou tell her that you too stand against them, and explain that you've already told Councilor Tayu as much.\t\n\nShe nods.\t\"Then the lines have been drawn,\" she says.\t\"So be it.\"\t\n*if mil_trust \u003c 41\n\tAnd yet her tone is not as warm as you would have expected it to be.\tYou cannot help but feel that she is lately wary of your leadership.\n*page_break\n*gosub address\nAs you reveal your intended destination to your people, you do your best to make it clear that the rendezvous is Councilor Tayu's idea.\tYou know your comrades on the crew will read between the lines.\tThey will know where you stand on the matter.\n\nAs you are wrapping up, you notice Envoy Eidon stepping out of the darkness, and ascending to the overlook platform.\tLieutenant Demian stops him before he can interrupt you.\t\"While we are still linked to the full fleet,\" he says, \"may I address the people?\tOn behalf of the Councilor...\"\n\nLieutenant Demian looks to you.\n\n*choice\n\t#Allow Envoy Eidon to address the people.\n\t\t*set envoy_speech true\n\t\tEnvoy Eidon takes your position on the platform, and addresses the fleet.\tAs you had expected, he produces a glowing speech detailing the supposed glories of your cooperation with the other systems.\t\n\t\t*if rep \u003c 50\n\t\t\t*set civ_trust %-10\n\t\t\tHe is careful to direct his closing words at you.\t\"I hope our choices as a people will come to embody this new spirit of togetherness and civility,\" he says.\t\"Even in this time of war, we cannot allow the cruelty of our enemies to dictate our response to it.\"\tA reference, no doubt, to your actions toward the survivors.\n\t\t\t\t\n\t\t\tYou realize now that it may have been a mistake to let him speak, but it will certainly bring you into better favor with Councilor Tayu.\n\t\t\t*goto fuel_dilemma_1\n\t\t*else\n\t\t\t*if battle2_victory = false\n\t\t\t\tHe is careful to direct his closing words at you.\t\"I hope our choices as a people will come to embody this new spirit of togetherness,\" he says.\t\"And with our new comrades by our side, I hope that fate will grant us the victory that is our right.\"\n\t\t\t\t\t\n\t\t\t\tYou are unsure how to feel about his speech, but it will certainly bring you into better favor with Councilor Tayu.\n\t\t\t\t*goto fuel_dilemma_1\n\t\t\t*else\n\t\t\t\tHe is careful to direct his closing words at you.\t\"I hope our choices as a people will come to embody this new spirit of togetherness,\" he says.\t\"And with our new comrades by our side, I hope that fate will grant us even greater victories in the days ahead.\"\n\t\t\t\t\t\n\t\t\t\tYou are unsure how to feel about his speech, but it will certainly bring you into better favor with Councilor Tayu.\n\t\t\t\t*goto fuel_dilemma_1\n\n\t#Decline.\n\t\tWithout pausing in your speech, you shake your head gently at Lieutenant Demian.\tYou can see her muttering some excuse to Envoy Eidon, refusing his offer.\tIncensed, he returns to the lower level.\tAs you close your address, you are sure you can feel him watching you from the darkness beyond the monitors.\n\t\t*goto fuel_dilemma_1\n\n*label hot\n\nYou tell your people about Councilor Tayu's plans for the future, and the true meaning of your intended destination.\tYou make it clear that you support his cause.\n\n*return\n\n*label lukewarm\n\nYou tell your people about Councilor Tayu's plans for the future, and the truth about who waits for you at your intended destination.\tYou do your best to present the information dispassionately, as though you are delivering a military briefing.\n\n*return\n\n*label honest_commander\nYou tell the Lieutenant that you cannot share her cynical views.\tSupport for the Alliance, you explain, is the best way to ensure that your people reclaim ${plan_name}.\n\n*if mil_trust >=41\n\tLieutenant Demian seems shocked, and mutters that she will reconsider her position.\tYou can sense that your declaration of support has come as a crushing disappointment to her.\tBut she seems to respect your position.\n*if mil_trust \u003c 41\n\tLieutenant Demian does her best to hide her shock and anger at your confession.\tShe mutters something about reconsidering her position that sounds unconvincing.\tShe'll be watching you.\n*if alliance_true > 50\n\t\n\tOut of curiosity, why did you tell her the truth?\n\t*fake_choice\n\t\t#Nothing can come of duplicity but our own destruction.\n\t\t\tBut you wonder if you truly can escape both.\n\t\t#I cannot bring myself to lie to someone with whom I have worked so closely for so long.\n\t\t\tBut you wonder if your honesty will force you to make still more difficult choices.\n\t\t#I am hoping to win her over to my side.\n\t\t\tBut you wonder if you can achieve this without crossing over to hers.\n*if alliance_true \u003c=50\n\t\n\tOut of curiosity, why did you perpetuate this deception?\n\t*fake_choice\n\t\t#I must maintain the appearance of support if I am to keep Councilor Tayu's trust.\n\t\t\tYou wonder if you can play the part without becoming it.\n\t\t#I can trust no one but myself.\n\t\t\tYou steel yourself for a lonely path.\n\t\t#It is not yet time for her to know the truth.\n\t\t\tIndeed, she may never be ready for it.\n*page_break\n*return\n\n*label faker\nYou tell the Lieutenant that you share her views, though you admit you have told Councilor Tayu \n*if alliance_out > 50\n\tthat you are an Alliance supporter.\t\n*if alliance_out \u003c=50\n\tthat you are neutral on the matter.\n\n*if mil_trust >=41\n\t*gosub shebuysit\n\tYou tell yourself you should feel proud that she supports you so unquestioningly, but you can't help but feel ashamed.\n\t*set demian_out 25\n\t\n*if mil_trust \u003c 41\n\tLieutenant Demian seems suspicious of you.\tYou wonder if she has guessed that you are lying.\tStill, she says that she will do her best to take your advice, and convince her own military comrades to hide their true feelings.\n\t*set demian_out 25\n\t\nOut of curiosity, what is your main reason for lying to her?\n*fake_choice\n\t#It will help me keep an eye on any dissent that may develop within the fleet.\n\t\tBut you wonder if you can play this part without becoming it.\n\t*if battle2_victory = false\n\t\t#After the failure of our recent battle, my command is already in jeopardy.\tI need the military on my side.\n\t\t\tBut you know that words alone will not be enough to win them back.\n\t*if battle2_victory = true\n\t\t#I want to keep the military on my side.\n\t\t\tBut you know that words alone will not be enough to keep them there.\n\t#There is no telling where the future will take us.\tI want to keep my options open.\n\t\t\tBut by concealing your own convictions, you know they may desert you in the end.\n*page_break\n*return\n\n*label neutral\n*if mil_trust >=41\n\tLieutenant Demian seems shocked that you can have any neutrality on a matter such as this one, and mutters that she will do her best to reconsider her position.\tYou can sense that your words have shaken her, but you have worked together in the service for years, and she remains respectful.\n*if mil_trust \u003c 41\n\tLieutenant Demian is shocked and, you sense, a little angry.\tShe mutters something about reconsidering her position that sounds unconvincing.\tShe'll be watching you.\n*if alliance_true > 50\n\t\n\tOut of curiosity, why did you perpetuate the deception?\n\t*fake_choice\n\t\t#I must maintain my neutrality at all times if I am to keep Councilor Tayu convinced of it.\n\t\t\tBut you wonder if you can play this part without becoming it.\n\t\t#My neutrality will prove an easier pill for Lieutenant Demian to swallow than the truth.\n\t\t\tProvided you can keep it from coming to light.\n\t\t#I hope to stay connected to both sides of this issue, despite being a supporter in my heart.\n\t\t\tBut you wonder if you can play this part without becoming it.\n*if alliance_true = 50\n\t\n\tOut of curiosity, why did you tell her the truth?\n\t*fake_choice\n\t\t#Nothing can come of duplicity but our own destruction.\n\t\t\tBut you wonder if you can truly escape both.\n\t\t#I cannot bring myself to lie to someone with whom I have worked so closely for so long.\n\t\t\tBut you wonder if your honesty will force you to make still more difficult choices.\n\t\t#I am hoping to make her see reason.\n\t\t\tBut you know she hopes the same for you.\n*if alliance_true \u003c 50\n\t\n\tOut of curiosity, why did you perpetuate this deception?\n\t*fake_choice\n\t\t#Adding my voice to Lieutenant Demian's objections would only destabilize our situation further.\n\t\t\tBut you wonder what else you will lose without her support.\n\t\t#I must maintain character at all times if I am to convince Councilor Tayu of my neutrality.\n\t\t\tBut you wonder if you can play this part without becoming it.\n\t\t#A neutral party can move freely among both sides.\n\t\t\tBut you wonder now if you can ever truly belong to either of them.\n*page_break\n*return\n\n*label address\nMinutes later, you are on the bridge, having ordered Communications to link you to the entire fleet at once.\t\n*return\n\n*label shebuysit\nYour stalwart comrade does not question your strategy.\tShe agrees to convince her own military comrades to keep a low profile about their true feelings, in order to keep the Councilor's suspicion low.\t\n*return\n\n*label shenobuy\nEven though you speak the truth, Lieutenant Demian seems suspicious of you.\tStill, she says that she will do her best to take your advice, and convince her own military comrades to hide their true feelings.\n*return\n\n*label fuel_dilemma_1\n*page_break\nIn a few days the journey brings your fleet through the Antares cluster, comprised of quadrants rich in asteroids and drifting planetary matter.\tThere is no guarantee that you will have another opportunity like this again to replenish your energy.\tYou phase, \n*if mine \u003c 60\n\tand watch warily as your scant few\t\t \n*if (mine >=60) and (mine \u003c 80)\n\tand watch hopefully as your \n*if mine >=80\n\tand watch as dozens of \nmining vessels depart from the fleet.\tIt is ten hours before the harvest is complete.\n\n*if mine \u003c 60\n\t*set energy %+ 15\n*if (mine >=60) and (mine \u003c 80)\n\t*set energy %+ 35\n*if mine >=80\n\t*set energy %+ 50\n*if energy > 80\n\t\"Energy reserves are even higher than they were when we made our first phase from ${plan_name}!\" the Core Operator informs you on your cabin telescreen.\t\"We sure lucked out with those miners.\"\t\n*if (energy >=72) and (energy \u003c=80)\n\t\"Energy reserves are looking good!\" the Core Operator informs you over your cabin telescreen.\t\"Matter of fact, they're close to where they were when we made our first phase from ${plan_name}!\"\t\n*if (energy \u003c 72) and (energy > 60)\n\t\"It's adequate, Captain,\" the Core Operator informs you over your cabin telescreen.\t\"But we're gonna have to watch ourselves out there.\"\t\n*if energy \u003c=60\n\t\"It's not good, Captain,\" the Core Operator informs you over your cabin telescreen.\t\"Even with the new resources from the miners, we're getting close to half capacity.\t\nSee for yourself...\"\n\n*stat_chart\n\t\tpercent energy Energy Reserves\n*if energy >=72\n\t\"It may be too early to consider it, but it's worth thinking about limiting our energy use,\" the Operator suggests.\t\n*if (energy \u003c 72) and (energy > 60)\n\t\"It may be worth thinking about limiting our energy use,\" the Operator mentions.\t\n*if energy \u003c=60\n\t\"We need to seriously consider limiting our energy use,\" the Operator warns.\t\nYou're no stranger to the procedure yourself:\tair quality, personal energy allotment, even food synthesis.\tDuring your long voyages in the military, you have often endured strict limits on these aspects of spacefaring life to conserve resources.\tCivilians will be less familiar with the practice, of course, \n*if energy >=72\n\tbut even with your current abundance, you have no way of knowing how long your fleet will be forced to voyage in space.\n*if (energy \u003c 72) and (energy > 60)\n\tbut you may not want to take the current level of your reserves for granted.\tAfter all, you cannot tell how long you will be on your own out there.\n*if energy \u003c=60\n\tbut you may have no other choice at this point.\n*choice\n\t#Heavily limit energy use.\n\t\t*set standard_deduction 10\n\t\t*set civ_trust %-20\n\t\t*if energy >=72\n\t\t\tYou hope the people will understand that you are doing this for their own good.\n\t\t\t*page_break\n\t\t\t*goto thossian_intro\n\t\t*if (energy \u003c 72) and (energy > 60)\n\t\t\tBetter to get this choice out of the way now, before you are forced to make it later.\n\t\t\t*page_break\n\t\t\t*goto thossian_intro\n\t\t*else\n\t\t\tYou know it must be done.\n\t\t\t*page_break\n\t\t\t*goto thossian_intro\n\t#Slightly limit energy use.\n\t\t*set standard_deduction 15\n\t\t*set civ_trust %-15\n\t\t*if energy >=72\n\t\t\tYou hope the people will understand that you are doing this for their own good.\n\t\t\t*page_break\n\t\t\t*goto thossian_intro\n\t\t*if (energy \u003c 72) and (energy > 60)\n\t\t\tBetter to ease the civilians into it, of course.\n\t\t\t*page_break\n\t\t\t*goto thossian_intro\n\t\t*else\n\t\t\tBetter to avoid the worst for as long as you can.\n\t\t\t*page_break\n\t\t\t*goto thossian_intro\n\t#Do not limit energy use at this point.\n\t\t*if energy > 60\n\t\t\tYour people have been through enough.\n\t\t\t*page_break\n\t\t\t*goto thossian_intro\n\t\t*else\n\t\t\tYou tell yourself there must be another way.\n\t\t\t*page_break\n\t\t\t*goto thossian_intro\n\n*label thossian_intro\nThe proximity alert sounds, sending a wave of tension through the bridge.\t\"Ships emerging from hyperspace,\" Zagi reports.\t\"It looks like a small Thossian convoy.\"\n\nThe disc-like craft of the Thossians are identical to the untrained eye, but you have seen enough of their kind to recognize several of these as battleships.\tThey appear to be escorting a squadron of Thossian miners.\tAs the convoy turns your way, you notice that most of the ships capable of attack are moving to the front.\t\n\n\"No incoming transmission,\" Zagi reports meaningfully.\t\"That's a bad sign.\tMy guess is they are waiting until they are close enough to hit us before announcing their intent to fire.\tThese Thossian ships don't have long-range cannons.\"\tYou wonder just what it is that has made a neutral civilization like the Thossians so aggressive to you.\t\n*if alliance_true \u003c 50\n\tFear of the ${enemy_name}?\tOr perhaps they are merely taking advantage of your precarious position?\n\t\n*if alliance_true >=50\n\tFear of the ${enemy_name}, perhaps?\t\n\t\nYou feel certain you can fend the convoy off, even with your fleet's deficits.\tBut the closer they get to you, the more time you'll spend fighting, and the more energy.\tWhat do you do?\n*choice\n\t\n\t#Demand that the Thossians state the intent of their approach.\n\t\t*set closeness +10\n\t\t\"Thossian Convoy, this is the Fleet Captain.\tWhat is the intent of your approach?\"\n\t\t\n\t\tThere is no reply.\tThe Thossians continue on their current heading.\tWhat do you do?\n\t\t*choice\n\t\t\t#Request safe passage through the quadrant.\n\t\t\t\t*gosub end_trial\t\t\t\t\n\t\t\t\t*set closeness +10\n\t\t\t\t*set thossian_dissonance +10\n\t\t\t\t*goto safe_passage\n\t\t\t#Threaten to attack them.\n\t\t\t\t*gosub end_trial\n\t\t\t\t*set closeness +10\n\t\t\t\t*goto thoss_threaten\n\t\t\t#Open fire on them.\n\t\t\t\t*gosub end_trial\n\t\t\t\t*set closeness +10\n\t\t\t\t*goto thoss_battle_without_warn
