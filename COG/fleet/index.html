ing\t\n\n\t#Ask the Thossians for safe passage through the quadrant.\n\t\t*gosub end_trial\n\t\t*set closeness +10\n\t\t*set thossian_dissonance +10\n\t\t*goto safe_passage\n\n\t#Demand that the Thossian convoy leave the quadrant, or be fired upon.\n\t\t*gosub end_trial\n\t\t*set closeness +10\n\t\t*goto thoss_threaten\n\n\t#Launch your attack.\n\t\t*gosub end_trial\n\t\t*set closeness +10\n\t\t*if alliance_out \u003c 50\n\t\t\t*goto thoss_battle_without_warning\n\t\t*else\n\t\t\t*goto sureabout\n\t\t\t\n\n*label safe_passage\n\"Thossian Convoy, this is the Fleet Captain.\tWe are currently in flight from the ${enemy_name} attack on ${plan_name}.\tWe request safe passage through this quadrant.\"\tYou can't help but notice the crew's surprise, to hear you making such a courteous request of a much smaller fighting force.\t\n*if closeness = 20\n\tNevertheless, the Thossians continue their approach.\tStill no communication.\tIn mere moments, they will be within range to begin their attack.\n\n\tWhat do you do?\n*if closeness != 20\n\tNevertheless, the Thossians continue their approach.\tStill no communication.\n\t\n\tWhat do you do?\n*choice\n\t#Continue your appeal to the Thossians.\n\t\t*set closeness +10\n\t\t*set thossian_dissonance +10\n\t\t\"Thossian Convoy, we are survivors of an unlawful attack on the civilian population of our home planet.\tIf you choose to aid the ${enemy_name} now, you are participating in genocide.\tStand with us!\"\n\n\t\t*if closeness > 20\n\t\t\t*set energy %-15\n\t\t\t*set translator_exposition true\n\t\t\tThe beeps of a connecting transmission sound over the bridge, followed by the percussive tones of spoken Thossian.\tIn a few seconds, the translator unit kicks in, reconfiguring the alien's sharp plosives into your native tongue.\t\"Captain, this is Commander Trakh.\tThe ${enemy_name} have decreed that all war criminals of ${plan_name} are to be attacked on sight.\tPrepare to receive fire.\"\n\n\t\t\tThe blasts begin, and your ship vibrates from the force of the incoming attack.\tYou give the order for Zagi to take evasive action, but as you begin your defense, something changes in the holographic field.\n\n\t\t\tThe military vessels of the Thossian squadron have stopped firing on your fleet, and are beginning to fire on each other, the larger vessels toward the front of the formation responding to a surprise attack from the scout vessels toward the rear.\n\t\t\t*goto open_revolt\n\t\t*else\n\t\t\t*set translator_exposition true\n\t\t\tThe Thossians continue their approach, and the beeps of a connecting transmission sound over the bridge, followed by the percussive tones of spoken Thossian.\tIn a few seconds, the translator unit kicks in, reconfiguring the alien's sharp plosives into your native tongue.\t\"Captain, this is Commander Trakh.\tThe ${enemy_name} have decreed that all war criminals of ${plan_name} are to be attacked on sight.\tYour presence in this quadrant is a violation.\"\n\n\t\t\tSuddenly, you see explosions erupting on the approaching battleships.\tThe Thossian aggressors begin to drift off-course.\t\"Who gave the order to fire?\" you demand.\n\n\t\t\t\"The attack is not from our ships,\" Zagi explains, sounding as surprised as you are.\tYou can see it for yourself now, in the holographic field:\tthe military vessels of the Thossian squadron have begun to fire on each other, their scout vessels making an attack on the sterns of the battleships at the front of their formation.\n\t\t\t*goto open_revolt\n\n\t#Threaten the Thossians with attack.\n\t\t*set closeness +10\n\t\t*goto thoss_threaten\n\t#Open fire.\n\t\t*set closeness +10\n\t\t*if alliance_out \u003c 50\n\t\t\t*goto thoss_battle_without_warning\n\t\t*else\n\t\t\t*goto sureabout\n\t*if closeness = 20\n\t\t#Phase immediately out of the quadrant.\n\t\t\t*set closeness +10\n\t\t\t*goto surprise_jump\n\n*label open_revolt\n\"It's an open revolt,\" Lieutenant Demian observes.\n*page_break\n*if translator_exposition = false\n\tThe beeps of a connecting transmission sound over the bridge, followed by the percussive tones of spoken Thossian.\tIn a few seconds, the translator unit kicks in, reconfiguring the alien's sharp plosives into your native tongue.\t\n*if translator_exposition = true\n\tAnother transmission comes through, this one from elsewhere in the Thossian squadron.\t\n\"Captain, this is the Scout Vessel Jevia.\tFor the honor of our people, we will stand by your side.\"\n\nIt would appear that your words to the Thossians have made a difference, but as the battle plays out before you, you can see that the odds are stacked against the rebel scouts.\tThey do not appear to have enough strength to ward off the battleships.\tDo you order your own ships to assist them?\n\n*choice\n\t#Yes.\n\t\t*set energy %-15\n\t\t*set battle3_civility 70\n\t\tYour intervention in the battle costs some energy, but takes no more effort than a tactical exercise.\tOnce the Thossian battleships have had enough, they phase to hyperspace, towing the mining vessels with them.\tThe rebel scouts are left behind.\n\n\t\tAnother transmission comes from the Jevia.\t\"We are incapable of solo phase.\tPlease allow us to escort your fleet,\" the Thossian Lieutenant reports.\n\n\t\tThere is general laughter on the bridge at the idea of a scant few scout vessels \"escorting\" a fleet of your size.\t\n\t\t*if alliance_true \u003c 50\n\t\t\tIt seems that familiar Thossian arrogance never washes away.\n\t\t\t\n\t\t\tYour fleet phases to the next quadrant with the scout ships in tow.\tAs it does, you turn absently to Lieutenant Demian.\tShe does not meet your gaze.\n\t\t\t*goto before_the_jump\n\t\t*else\n\t\t\tAnother translator unit flub, of course.\n\t\t\t\n\t\t\tYour fleet phases to the next quadrant with the scout ships in tow.\tAs it does, you turn absently to Lieutenant Demian.\tShe does not meet your gaze.\n\t\t\t*goto before_the_jump\n\t#No.\n\t\tThe scouts were brave to launch their attack on the battleships, but they do not have enough power to turn the tide.\tSoon they have taken considerable damage, and they emit their surrender signals.\n\n\t\t*if closeness > 20\n\t\t\tThe battleships now return the attention of their cannons to your fleet.\t\n\t\t\t*goto response\t\n\t\t*else\n\t\t\tThe battleships now continue their approach on your fleet.\tTheir intent is unmistakable.\t\n\t\t*label response\n\t\tWhat is your response?\n\t\t*choice\n\t\t\t#Phase out of the quadrant.\n\t\t\t\t*set battle3_civility 40\n\t\t\t\t*set closeness +10\n\t\t\t\t*goto surprise_jump\n\t\t\t#Engage them in battle.\n\t\t\t\tThe Thossians may have been a match for each other, but they are no match for your fleet.\n\t\t\t\t*set battle3_civility 60\t\n\t\t\t\t*if closeness > 20\n\t\t\t\t\tYour battle with them amounts to little more than a drawn-out tactical exercise.\t\n\t\t\t\t*if closeness \u003c=20\n\t\t\t\t\tYour battle with them amounts to little more than a tactical exercise.\t\n\t\t\t\tOnce their commander is convinced of your superiority, the entire convoy phases out of the quadrant, towing even the rebellious scouts along with them.\n\t\t\t\t*if closeness > 20\n\t\t\t\t\t*set energy %-20\n\t\t\t\t\t\n\t\t\t\t\tYou ask for a damage report.\t\"Nothing serious,\" Zagi reports.\t\"Unfortunately, the encounter was long, and it did cost energy.\tBut we held our own.\"\tYou nod.\tPerhaps it was inevitable.\n\n\t\t\t\t\tAt any rate, you have no time to dwell on this news.\tThe longer you stay in the quadrant, the more likely you are to meet more hostiles.\tYou give the order to phase.\n\t\t\t\t\t*goto before_the_jump\n\t\t\t\t*else\n\t\t\t\t\t*set energy %-15\n\t\t\t\t\t\n\t\t\t\t\tYou ask for a damage report.\t\"Nothing serious,\" Zagi reports.\t\"Just the energy we spent fighting.\tThey weren't even in range when the battle began.\"\n\n\t\t\t\t\tIt's good news, but there is no time to rest.\tThe longer you stay in the quadrant, the more likely you are to meet more hostiles.\tYou give the order to phase.\n\t\t\t\t\t*goto before_the_jump\n\n*label thoss_threaten\n*set translator_exposition true\n*set warning true\n\"Thossian Convoy, this is the Fleet Captain.\tCease your approach.\tWe demand that your ships depart this quadrant immediately or be fired upon.\tRepeat, depart immediately or be fired upon.\"\n\t\t\nThe beeps of a connecting transmission sound over the bridge, followed by the percussive tones of spoken Thossian.\tIn a few seconds, the translator unit kicks in, reconfiguring the alien's sharp plosives into your native tongue.\t\"Captain, this is Commander Trakh.\tThe ${enemy_name} have decreed that all war criminals of ${plan_name} are to be attacked on sight.\tYour presence in this quadrant is a violation.\"\t\n\n*if talked_out = true\n\tEnvoy Eidon is visibly horrified.\tPerhaps he had hoped the Thossians were calling to volunteer for Councilor Tayu's Alliance.\n\t\n\t*if closeness != 20\n\t\tAs for Lieutenant Demian, she seems merely confused.\t\"What do you make of that transmission?\" she asks.\t\n\t*if closeness = 20\n\t\tAs for Lieutenant Demian, she seems merely confused.\t\"They'll be in range to fire on us within seconds,\" she says.\tHow do you interpret their transmission?\n*if talked_out = false\n\t*if closeness != 20\n\t\tLieutenant Demian turns to you, her face screwed up in confusion.\t\"What do you make of that?\"\t\n\t*if closeness = 20\n\t\tLieutenant Demian turns to you.\t\"They'll be within range to fire on us in a few seconds.\"\tHow do you interpret their transmission?\n*if closeness = 30\n\tBut there is no chance to reply to her.\tThe bridge of the ship begins to vibrate from incoming hits.\tThe Thossians have opened fire on your fleet.\n\t*goto they_shootfirst\n*choice\n\t#The Thossian Commander is too cowardly to disobey the unjust orders of the ${enemy_name}.\tOpen fire immediately.\n\t\t*set battle3_civility 20\n\t\t*goto we_shootfirst\n\t#The Thossian Commander is trying to tell you that their convoy has no choice but to attack your fleet.\tAppeal to their reason.\n\t\t\"Thossian Convoy, halt your approach.\tWhatever threats the ${enemy_name} have made against your people, you do not serve them.\tJoin us in our struggle!\"\n\t\t*set closeness +10\n\t\t*set thossian_dissonance +10\n\t\t*if (closeness > 20) and (thossian_dissonance >=20)\n\t\t\t*set energy %-15\n\t\t\t\n\t\t\tIt seems your words have come too late.\tThe blasts begin, and your ship vibrates from the force of an incoming cannon attack.\tYou give the order for Zagi to take evasive action, but as you begin your defense, something changes in the holographic field.\n\n\t\t\tThe military vessels of the Thossian squadron have stopped firing on your fleet, and are beginning to fire on each other, the larger vessels toward the front of the formation responding to a surprise attack from the scout vessels toward the rear.\n\t\t\t*goto open_revolt\n\t\t*if (closeness > 20) and (thossian_dissonance \u003c 20)\n\t\t\tYour words seem to have come too late.\tThe blasts of the Thossian attack begin, and the bridge vibrates from the force of an incoming cannon attack.\t\n\t\t\t*goto they_shootfirst\n\t\t*if (closeness \u003c=20) and (thossian_dissonance >=20)\n\t\t\tSuddenly, you see explosions erupting on the approaching battleships.\tThe Thossian aggressors begin to drift off-course.\t\"Who gave the order to fire?\" you demand.\n\n\t\t\t\"The attack is not from our ships,\" Zagi explains, sounding as surprised as you are.\tYou can see it for yourself now, in the holographic field:\tthe military vessels of the Thossian squadron have begun to fire on each other, their scout vessels making an attack on the sterns of the battleships toward the front of their formation.\n\t\t\t*goto open_revolt\n\t\t*else\n\t\t\t*comment Closeness can't really be LESS than 20 here, just being careful.\n\t\t\tThey continue their approach, with no response to your entreaties.\tIn a few moments, they will be within range to attack.\n\t\t\t*choice\n\t\t\t\t#Continue your appeal.\n\t\t\t\t\t*set closeness +10\n\t\t\t\t\t*set thossian_dissonance +10\n\t\t\t\t\t*set energy %-15\n\t\t\t\t\t\"Thossian Convoy, we are survivors of an unlawful attack on the civilian population of our home planet.\tIf you choose to aid the ${enemy_name} now, you are participating in genocide.\tStand with us!\"\n\t\t\t\t\t\n\t\t\t\t\tIt appears that your words are not enough.\tThe blasts begin, and your ship vibrates from the force of the incoming attack.\tYou give the order for Zagi to take evasive action, but as you begin your defense, something changes in the holographic field.\n\n\t\t\t\t\tThe military vessels of the Thossian squadron have stopped firing on your fleet, and are beginning to fire on each other, the larger vessels toward the front of the formation responding to a surprise attack from the scout vessels toward the rear.\n\t\t\t\t\t*goto open_revolt\n\t\t\t\t#Open fire.\n\t\t\t\t\t*set closeness +10\n\t\t\t\t\t*set battle3_civility 20\n\t\t\t\t\t*goto we_shootfirst\n\t\t\t\t#Phase out of the quadrant.\n\t\t\t\t\t*set closeness +10\n\t\t\t\t\t*set battle3_civility 40\n\t\t\t\t\t*goto surprise_jump\n\t\t\t\n\t#The Thossian Commander is trying to tell you that their convoy has no choice but to attack your fleet.\tPhase out of the quadrant immediately.\n\t\t*set highroad true\n\t\t*set closeness +10\n\t\t*set battle3_civility 40\n\t\t*goto surprise_jump\n\n*label thoss_battle_without_warning\n*if alliance_out >=50\n\t*goto we_shootfirst\n*if alliance_out \u003c 50\n\tYou give the order to open fire.\tAs Zagi begins to execute it, you hear a panicked response from the far corner of the bridge.\n\n\t\"Rescind that command, by the order of the High Council!\"\tIt is Envoy Eidon.\tHe stands directly beside the tactical grid, staring up at you on the platform.\tThe Tactician looks up at you too, unsure what to do next.\n\n\t\"It is contrary to intergalactic protocol to fire upon a neutral party without a warning transmission!\" Eidon insists.\t\"Rescind the command!\"\t\n*if (alliance_out \u003c 50) and (closeness \u003c 30) \n\t\n\tYou are unsure the Envoy truly has the authority to make such a request, though Councilor Tayu would probably feel differently.\tWhat do you do?\n\t*choice\n\t\t#Rescind the order and issue the warning transmission as requested.\n\t\t\t*set talked_out true\n\t\t\t*set mil_trust %-5\n\t\t\tTo the visible shock of the crew members on the bridge, and even Envoy Eidon himself, you back down, and connect to the Thossian capital ship.\n\t\t\t*goto thoss_threaten\t\n\t\t#Have Envoy Eidon escorted off the bridge, and continue with the attack.\n\t\t\t*set envoy_brig true\n\t\t\tYou order security crew to bring Eidon down to the diplomatic chamber, and watch him closely.\tAs he is walked off, he glares back at you.\t\n\t\t\t*goto we_shootfirst\n*if (alliance_out \u003c 50) and (closeness >=30)\n\tDespite his entreaties, the Thossians are within range now.\tThe beeps of a connecting transmission sound over the bridge, followed by the percussive tones of spoken Thossian.\tIn a few seconds, the translator unit kicks in, reconfiguring the alien's sharp plosives into your native tongue.\t\"Captain, this is Commander Trakh.\tThe ${enemy_name} have decreed that all war criminals of ${plan_name} are to be attacked on sight.\tPrepare to receive fire.\"\n\t\n\t*goto they_shootfirst\n\n*label we_shootfirst\n*set shootfirst true\n*if warning = false\n\t*set battle3_civility 10\n*if alliance_out >=50\n\tYou issue the order to attack the Thossians.\n*if (alliance_out \u003c 50) and (warning = false)\n\tWhen he is gone, you re-issue the order to attack the Thossians.\n*if (alliance_out \u003c 50) and (warning = true)\n\tEnvoy Eidon visibly cringes when you issue the order to attack, but the Thossians have been warned.\t\n*if closeness = 10\n\t*set energy %-10\n\tWhat comes next can hardly be called a battle.\tThe battleships are no match for your fleet, and with no opportunity for them to use their cannons, your encounter with them feels more like target practice.\tTheir entire convoy phases out of the quadrant within minutes, to escape the onslaught.\n\n\tYou ask for a damage report.\t\"Zero damage,\" Zagi notes.\t\"And nearly no energy expended.\"\n\n\tYou nod.\tIt's good news, but you know the longer you stay in this quadrant, the more likely you will be to meet more hostiles.\tYou give the order to phase.\n\t*goto before_the_jump\n\n*if closeness = 20\n\t*set energy %-15\n\tThankfully, what follows can hardly be called a battle.\tThe battleships are no match for your attack, and by the time they are close enough to use their cannons, your damage to their ships has made them think twice.\tTheir entire convoy phases out of the quadrant to escape the onslaught.\n\n\tYou ask for a damage report.\t\"Barely any damage at all,\" Zagi reports.\t\"As for energy losses, they're minimal.\"\n\t\n\tYou nod.\tIt's good news, but you know the longer you stay in this quadrant, the more likely you will be to meet more hostiles.\tYou give the order to phase.\n\t*goto before_the_jump\n\n*if closeness = 30\n\t*set energy %-20\n\tYour battle with them amounts to little more than a drawn-out tactical exercise.\n\t\n\tOnce their commander is convinced of your superiority, the entire convoy phases out of the quadrant, bringing even the rebellious scouts along with them.\n\t\n\tYou ask for a damage report.\t\"Nothing serious,\" Zagi reports.\t\"Unfortunately, the encounter was long, and it did cost energy.\"\n\n\tYou nod.\tPerhaps it was inevitable.\n\n\tThe longer you stay in this quadrant, the more likely you are to meet more hostiles.\tYou give the order to phase.\n\t*goto before_the_jump\n\n*label they_shootfirst\n*set battle3_civility 30\n*set energy %-20\nThankfully, the Thossians are no match for you, and your battle with them amounts to little more than a drawn-out tactical exercise.\n\t\nOnce their commander is convinced of your superiority, their entire convoy phases out of the quadrant, bringing even the rebels with them.\n\t\t\t\t\t\nYou ask for a damage report.\t\"Nothing serious,\" Zagi notes.\t\"Unfortunately, the encounter was long, and it did cost energy.\"\tYou nod.\tPerhaps it was inevitable.\n\nThe longer you stay in this quadrant, the more likely you are to meet more hostiles.\tYou give the order to phase.\n*goto before_the_jump\n\n*label surprise_jump\n\"Prepare to phase immediately.\"\n\n*if mil_trust \u003c 41\t\n\t\"Captain?\" Zagi asks, boldly.\n\t\n\t\"Need I repeat my orders?\" you ask.\tShe looks away, sufficiently cowed.\n\t\n\"Phasing to hyperspace,\" Kelmer confirms.\n\t\nYou can sense that you've surprised the crew with your decision.\tAfter all, the approaching convoy is a much smaller fighting force, and it would be easy to take them on.\tBut your decision stands.\n\nThe monitors glow brightly as you depart normal space.\t\n\nYou turn absently to Lieutenant Demian.\tShe does not meet your gaze.\t\n*goto before_the_jump\n\n*label sureabout\nIt is in direct violation of the rules of engagement to fire upon a neutral party without first warning them of your intent.\tAre you sure that you want to open fire without warning the Thossians?\n*choice\n\t#Yes.\tOpen fire.\n\t\t*goto we_shootfirst\n\t#No.\tIssue a warning transmission.\n\t\t*goto thoss_threaten\n\n*label before_the_jump \n*if battle3_civility = 10\n\t*comment You shot first without warning them\n\t*set rep %-20\n\t*set mil_trust %+15\n\t*set civ_trust %-15\n\t*finish\n\n*if battle3_civility = 20\n\t*comment You shot first after warning them\n\t*set rep %-10\n\t*set mil_trust %+10\n\t*set civ_trust %-10\n\t*finish\n\n*if battle3_civility = 30\n\t*comment They shot you first\n\t*set rep %+10\n\t*if thossian_dissonance = 20\n\t\t*set mil_trust %-10\n\t\t*set civ_trust %+10\n\t*if thossian_dissonance = 10\n\t\t*set mil_trust %-5\n\t\t*set civ_trust %+5\n\t*finish\n\n*if battle3_civility = 40\n\t*comment You jumped away from the quadrant without any battle\n\t*comment Your civility is 50 if you did that after the thossian encounter\n\t*if thossian_dissonance = 0\n\t\t*set mil_trust %-15\n\t*if thossian_dissonance = 10\n\t\t*set mil_trust %-20\n\t*if thossian_dissonance = 20\n\t\t*set mil_trust %-25\n\t\t*set rep %+10\n\t\t*set battle3_civility 50\n\t*finish\n\n*if battle3_civility = 50\n\t*comment You got the scouts to help you, but didn't help them, and then jumped away.\n\n\n*if battle3_civility = 60\n\t*comment You got the scouts to help you, didn't help them, and fought with their fleet.\n\t*set mil_trust %-10\n\t*set civ_trust %+10\n\t*set rep %+10\n\t*finish\n\n*if battle3_civility = 70\n\t*comment You got the scouts to help you, and helped them\n\t*set civ_trust %+15\n\t*set mil_trust %-15\n\t*set rep %+20\n\t*finish\n*finish\n\n*label end_trial\n*check_purchase adfree\n*if (choice_purchased_adfree or (choice_is_omnibus_app or choice_is_web)) or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n*abort", "epilogue": "*comment Stats from Prepare for Battle\n*temp continued_cruelty\n*temp sudden_cruelty\n*temp continued_failure\n*temp sudden_failure\n*temp continued_victory\n*temp sudden_victory\n\n*set continued_cruelty false\n*set sudden_cruelty false\n*set continued_failure false\n*set sudden_failure false\n*set continued_victory false\n*set sudden_victory false\n\n*if (battle2_cruelty = true) or (battle3_civility \u003c 30)\n\t*if drone_production \u003c 50\n\t\t*set continued_cruelty true\n\n*if (battle2_cruelty = false) and (battle3_civility >=30)\n\t*if drone_production \u003c 50\n\t\t*set sudden_cruelty true\n\n*if (battle2_victory = false) and (battle4_victory = false)\n\t*set continued_failure true\n\n*if (battle2_victory = true) and (battle4_victory = false)\n\t*set sudden_failure true\n\n*if (battle2_victory = true) and (battle4_victory = true)\n\t*set continued_victory true\n\n*if (battle2_victory = false) and (battle4_victory = true)\n\t*set sudden_victory true\n\n*comment epilogue Stats\n*temp slippage\n*temp stockholm\n*temp sound\n*temp sound2\n*temp flattering_adj\n*temp well_liked\n*temp leader\n*temp alliance_influence\n*temp it\n*temp creature\n\n\n*if enemy_type = \"squid\"\n\t*set sound \"guttural moans\"\n\n*if enemy_type = \"blob\"\n\t*set sound \"guttural sobs\"\n\n*if enemy_type = \"lizard\"\n\t*set sound \"rolling hisses\"\n\n*if enemy_type = \"bug\"\n\t*set sound \"unnerving clicks\"\n\n*if (enemy_type = \"blob\") or (enemy_type = \"squid\")\n\t*set sound2 \"blubbering\"\n*if enemy_type = \"lizard\"\n\t*set sound2 \"hisses\"\n*if enemy_type = \"bug\"\n\t*set sound2 \"clicking\"\n\n*if enemy_type = \"blob\"\n\t*set flattering_adj \"amorphous\"\n*if enemy_type = \"squid\"\n\t*set flattering_adj \"many-armed\"\n*if enemy_type = \"lizard\"\n\t*set flattering_adj \"lightning-fast lizard reflexes of the\"\n*if enemy_type = \"bug\"\n\t*set flattering_adj \"lightning-fast insect reflexes of the\"\n\n*if enemy_type = \"blob\"\n\t*set creature \"faceless\"\n*if enemy_type = \"squid\"\n\t*set creature \"faceless\"\n*if enemy_type = \"lizard\"\n\t*set creature \"expressionless\"\n*if enemy_type = \"bug\"\n\t*set creature \"expressionless\"\n\n\n*set well_liked true\n*set leader true\n*set alliance_influence true\n*set it 0\n\n*if skeletons > 1\n\t*set well_liked false\n*if civ_trust \u003c 50\n\t*set well_liked false\n\n*if had_help = true\n\t*set leader false\n*if continued_failure = true\n\t*set leader false\n*if mil_trust \u003c 50\n\t*set leader false\n\n*if (alliance_out \u003c 25) or (political_mana \u003c 50)\n\t*set alliance_influence false\n\nYour stats at the end of the battle over ${plan_name} were as follows...\n\n*stat_chart\n\tpercent striker_coverage Striker Coverage\n\tpercent striker_skill Striker Skill\n\tpercent can_coverage Cannon Coverage\n\tpercent can_skill Cannon Skill\n\tpercent mine Mining Support\n\tpercent energy Energy Reserves\n\topposed_pair bat_style\n\t\tForce\n\t\tElegance\n\topposed_pair integrity\n\t\tDeception\n\t\tIntegrity\n\ttext position True Stance\n\t\n\t\n\n*if prisoner_enemy = true\n\t*page_break FIVE YEARS LATER\n\tFive standard years pass...\n\t*page_break\n\t*goto prisoner_of_enemy\n\n*if prisoner_alliance = true\n\t*page_break FIFTEEN YEARS LATER\n\tFifteen standard years pass...\n\t*page_break\n\t*goto prisoner_of_alliance\n\n*if prisoner_rebels = true\n\t*page_break FIFTEEN YEARS LATER\n\tFifteen standard years pass...\n\t*page_break\n\t*goto prisoner_of_rebels\n\n*if winner = true\n\t*page_break FIFTEEN YEARS LATER\n\tFifteen standard years pass...\n\t*page_break\n\t*goto win_scenario\n\n*if winner_rebel = true\n\t*page_break FIFTEEN YEARS LATER\n\tFifteen standard years pass...\n\t*page_break\n\t*goto win_scenario_rebel\n\n*bug\n\n*label win_scenario\nThe door to your chamber opens, and your envoy enters with his head bowed.  \"Our guest has arrived,\" he reports.\n\nYou thank him and ask for him to await you in the corridor.  When he is gone, you open your wardrobe, and don the formal robes of your station, that of High Councilor.\n\n*if well_liked = false\n\tYour rise to this post proved inevitable after your victory in the ${enemy_name} war, though there are many who feel you do not deserve the honor.\n\t\n\tAs a reason, they point to...\n\t*fake_choice\n\t\t*if skeletons > 1\n\t\t\t#...your disgrace in the Null Zone.\n\t\t*if alliance_out \u003c 25\n\t\t\t#...your generally objectionable demeanor.\n\t\t*if had_help = true\n\t\t\t#...the fact that you needed a great deal of Alliance support to win the battle over ${plan_name}\n\t\t*if continued_cruelty = true\n\t\t\t#...your cruelty in battle.\n\t\t*if (civ_like = false) or (civ_trust \u003c 50)\n\t\t\t#...your open disdain for the civilian population.\n\t\t*if political_mana \u003c 50\n\t\t\t#...your incompetence as a politician.\n\t\t#...the fact that they simply do not trust you.\n\tBut you know the real reason they cannot accept you as ruler is \n\t*if alliance_out \u003c 25\n\t\tthe insidious influence former High Councilor Manon Tayu has over public opinion.  He has done what he can to poison the people against you, even as you soared to the pinnacle of public office.\n\t\t*goto after_zoom\n\t*if (civ_like = false) or (civ_trust \u003c 50)\n\t\tthe simple fact that the civilians are fickle and changeable, and will never be happy.\n\t\t*goto after_zoom\n\t*if alliance_true \u003c=25\n\t\tthe simple fact that you are not as rabid a supporter of the Alliance as some might hope.  You watched them with a wary eye before the war, and you continue to do so now.\n\t\t*goto after_zoom\n\tsimple jealousy.\n\t*goto after_zoom\n*if well_liked = true\n\tYour rise to this post proved inevitable after your victory in the ${enemy_name} War, and you have near-universal acceptance, \n\t*if alliance_out >=25\n\t\teven earning the blessing of the former High Councilor.\n\t\t\n\t\tYou attribute your unprecedented popularity to...\n\t*if alliance_out \u003c 25\n\t\tmuch to the chagrin of the former High Councilor.  But even his vocal attempts to halt your ascent could not prevent it.\n\t\t\n\t\tYou attribute your success to...\n\t*fake_choice\n\t\t*if political_mana > 50\n\t\t\t#...your charming personality.\n\t\t\t\tThe people tend to appreciate their defenders twice as much when they feel they are approachable or magnetic.  You are both.\n\t\t*if mil_trust > 50\n\t\t\t#...your popularity within the military.\n\t\t\t\tYour support from the ${plan_name} military remains the backbone of your rule, and you will never let them down.\n\t\t*if civ_trust > 50\n\t\t\t#...your popularity among civilians.\n\t\t\t\tYour support from the common people of ${plan_name} remains the backbone of your rule, and you will never let them down.\n\t\t*if skeletons = 0\n\t\t\t#...your proud showing in the Null Zone.\n\t\t\t\tYou gave the civilians in your fleet something to hope for during their darkest hour.  The survivors of that ordeal have seen to it that tales of your skill and compassion were told widely on ${plan_name}.\n\t\t*if alliance_out >=50\n\t\t\t#...the influence of Manon Tayu.\n\t\t\t\tYou cannot undervalue the role that the former High Councilor has played in your rise to power.  You owe him.\n\t\t*if continued_victory = true\n\t\t\t#...your famous prowess in battle.\n\t\t\t\tTo have talent in battle will earn you many supporters, in the military and out of it, for the people come to think of you as a protector.\n\t\t#...blind luck.\n\t\t\tYou have no idea what strange twist brought you where you are today, but you are grateful for its having occurred.\n\t\t#...fate.\n\t\t\tYou were destined to be where you are today, and you know precisely what to do with your power.\n*label after_zoom\n*page_break\nOnce fully prepared for your meeting, you advance down the long corridors of the ${plan_name} Council House, toward the diplomatic hall.  Your envoy trails over your shoulder.\n\nAs you pass the balcony, you look out at the courtyard and beyond, to the nearby city of Cothal.  There is no longer any sign of the damage it suffered during the occupation, when the ${enemy_name} destroyed all the great cities of ${plan_name}, as a show of their power.  Now Cothal has been rebuilt, more beautiful than before.  \n*if well_liked = false\n\tIf only it were truly at peace.\n\t\n\tJust yesterday, the Rebellion destroyed a statue in the public square, a gift from the Calpurnians that depicted the Outer Systems offering ${plan_name} back to its people.  Other gestures of the Rebellion in recent years have not been as bloodless.\n\t\n\tIn truth, you feel partly responsible for the rise of the Rebellion forces, blaming their growing strength to...\n\t*fake_choice\n\t\t#...your decision to have Lieutenant Demian executed.\n\t\t\tBy having the Lieutenant executed after her many years of imprisonment, you fear that you turned a mere dissident into a martyr, and gave the Rebellion something to rally behind.  But of course, you could be wrong...\n\t\t#...your having pardoned the Lieutenant for her crimes.\n\t\t\tBy allowing the Lieutenant to leave her cell at last, you turned loose a dangerous figure, and gave her free rein to incite the dissidents.  You are sure this is the reason for the rise in Rebellion activity.  But of course, you could be wrong...\n\t\t#...your following the Empress's suggestion that the Lieutenant be imprisoned on Calpurnia.\n\t\t\tBy having the Lieutenant's ongoing imprisonment relocated to Calpurnia, you reinforced the Rebellion's position that the Alliance is merely a front for the conquests of the Calpurnian Empire.  You are sure this is the reason for the rise in Rebellion activity.  But of course, you could be wrong...\n*if well_liked = true\n\tIt is a city at peace.\n\t\n\tEven the Rebellion has been quashed, relegated to a mere fringe group, and you feel that you can take at least partial credit for that, thanks to...\n\t*fake_choice\n\t\t#...your decision to have Lieutenant Demian executed.\n\t\t\tBy having the Lieutenant executed after her many years in prison, you made it clear that your reign would not tolerate the old ideals of the Rebellion, and that those who sought to relive the past would have no place in the future.\n\t\t#...your pardon of the Lieutenant for her crimes.\n\t\t\tBy finally allowing the Lieutenant to be released, you made it clear that the Rebellion was no longer a threat to the power of the High Council, and thereby neutralized it.\n\t\t#...your decision to move the imprisoned Lieutenant to Calpurnia.\n\t\t\tBy having the Lieutenant's ongoing imprisonment relocated to Calpurnia, you silenced an important voice of the Rebellion.  Without their bold leader to look to, her followers quickly found themselves without direction.\n*page_break\nYou enter the diplomatic hall.  Apart from the ${plan_name} soldiers lining the walls, there is only one other occupant here:\n*if enemy_type = \"blob\"\n\tA shapeless green creature, its skin partly translucent in the sunlight that pours through the long row of windows. \n\t\n*if enemy_type = \"lizard\"\n\tA remarkably poised green creature with leathery skin, its huge black eyes fixed on you with an uncanny stillness.\n\t\n*if enemy_type = \"squid\"\n\tA glistening blue mass of tentacles, with yellow eyes that pop obscenely from its skull sac.\n\t\n*if enemy_type = \"bug\"\n\tA leathery insect of enormous size and uncanny stillness, with its legs folded under its abdomen in lieu of a chair.\n\t\n*if enemy_type = \"blob\"\n\tIt addresses \n\t*goto address\nIt rises and addresses \n*label address\nyou with a series of ${sound}.  The translation unit manages to craft these sounds into your native tongue: \"The ${enemy_name} Ambassador is honored to meet the esteemed High Councilor of ${plan_name} at last.\"\n\nYou reply: \"The High Councilor...\n*choice\n\t#...is likewise honored.\"\n\t\t*if enemy_type = \"blob\"\n\t\t\tYou take your seat.\n\t\t\t*goto after_amb\n\t\t*else\n\t\t\tYou and the Ambassador take your seats.\n\t\t\t*goto after_amb\n\t#...cannot return the sentiment.\"\n\t\tYou are unsure that the translation unit can do justice to your insult, but when the ${enemy_name} hears your words put forward in its own language, it does seem to wither slightly.  \n\t\t*if enemy_type = \"blob\"\n\t\t\tYou take your seat.\n\t\t\t*goto after_amb\n\t\t*else\n\t\t\tYou take your seats.\n\t\t\t*goto after_amb\n\t#...hopes this meeting will be beneficial to our two systems.\"\n\t\t*if enemy_type = \"blob\"\n\t\t\tYou take your seat.\n\t\t\t*goto after_amb\n\t\t*else\n\t\t\tYou and the Ambassador take your seats.\n\t\t\t*goto after_amb\n*label after_amb\n\n\"The years since the war have been hard on my citizens,\" the ${enemy_name} recounts.  \"For a time, we were a system in turmoil, attempting to root out those who first led us into conflict with your people.  But the criminals of the ${plan_name} War have been found and tried.  They are no more.  Today, we are moving in a new direction, and we are ready to join the Alliance.\"\n\nIf the ${enemy_name} are appealing to you on this matter, they must think that you are an enthusiastic Alliance member.  This is...\n*choice\n\t*if alliance_influence = true\n\t\t#...true, and your influence in the Alliance is indeed great.\n\t\t\t*if alliance_true > 25\n\t\t\t\tSince they aided your people in the fight to win back ${plan_name} you have been very close with the leaders of the Alliance, the Calpurnian Empress in particular.  You look out for each other's interests, in-system and out.\n\t\t\t\t\n\t\t\t\tThe Ambassador is right to presume that your friends would never dare to allow the ${enemy_name} into the Alliance without your approval.\n\t\t\t\t*goto why_come\n\t\t\t*else\n\t\t\t\tSince they aided your people in the fight to win back ${plan_name} you have enjoyed a cautious partnership with the leaders of the Alliance, the Calpurnian Empress in particular.  You do not necessarily trust each other, but you look out for each other's interests, in-system and out.\n\t\t\t\t\n\t\t\t\tThe Ambassador is right to presume that these \"friends\" would never dare to allow the ${enemy_name} into the Alliance without your approval.\n\t\t\t\t*goto why_come\n\t*if alliance_influence = false\n\t\t#...true, though your influence in the Alliance is limited.\n\t\t\t*if alliance_true > 25\n\t\t\t\tSince they helped your people in the fight to win back ${plan_name} you have attempted to forge a partnership with the leaders of the Alliance.  It has come to naught, beyond the cordial exchange of aid.\n\t\t\t\t\n\t\t\t\tThough the Ambassador is right on one point: the Alliance leaders would never dare to allow the ${enemy_name} into their fold without your approval.\n\t\t\t\t*goto why_come\n\t\t\t*else\n\t\t\t\tSince they helped your people in the fight to win back ${plan_name} you have attempted to forge a cautious partnership with the leaders of the Alliance.  It has come to naught, beyond the cordial exchange of aid.  Perhaps they simply don't trust you.\n\t\t\t\t\n\t\t\t\tThough the Ambassador is right on one point: the Alliance leaders would never dare to allow the ${enemy_name} into their fold without your approval.\n\t\t\t\t*goto why_come\n\t#...not entirely true, since you have done what you could since the war to limit your dealings with them.\n\t\t*if alliance_true > 25\n\t\t\tThe fact of the matter is, you have worked to distance your planet's political future from theirs.  You are by no means against the Alliance, but you have found over the years that they often make disturbing presumptions about what your people owe them, especially when it comes to the many riches of ${plan_name}.\n\t\t\t\n\t\t\tThat said, the Alliance would never dare to allow the ${enemy_name} into their fold without your blessing, so the Ambassador's visit is hardly a waste of time.\n\t\t\t*goto why_come\n\t\t*else\n\t\t\tAlthough you objected to Lieutenant Demian's brutal methods, you shared her suspicion of the Alliance's motives for helping to free ${enemy_name}.  After the war, many of those suspicions proved true.  Almost immediately, your \"friends\" in the Outer Systems began to make unreasonable demands on your resources.  You have done your best to distance your planet's political future from theirs since then.\n\t\t\t\n\t\t\tThat said, the Alliance would never dare to allow the ${enemy_name} into their fold without your blessing, so the Ambassador's visit today is hardly a waste of time.\n\t\t\t*goto why_come\n*label why_come\nYou ask the ${enemy_name}...\n*fake_choice\n\t#\"What do you hope to gain by joining the Alliance?\"\n\t\tYou ask the ${enemy_name} what the Alliance can give their system that the ${enemy_name} do not already have.\n\t\t\n\t\t\"The acknowledgement of our efforts to coexist peacefully with the rest of the intergalactic community,\" it replies.  \"And the opportunity to make a positive contribution to that community.\"\n\t\t\n\t#\"What guarantee do I have that the ${enemy_name} have reformed?\"\n\t\tYou ask the ${enemy_name} how it can demonstrate to you that its system has reformed its warlike ways.\n\t\t\n\t\t\"The war on your ${plan_name} is a source of great shame to us, but it also stretched our scant resources to their limit.  If anything, those resources have only further diminished since the end of the conflict.  Simply put, we could not make war if we tried.\"\n \t\t\n\t#\"What sort of reparations are the ${enemy_name} willing to make in exchange for Alliance membership?\"\n\t\tYou bring up the fact that the ${enemy_name} have made no effort at reparations since the war, and that your people had to rebuild your cities with Alliance aid.  If the ${enemy_name} were to offer to help offset some of the devastation they caused, perhaps you would consider their request more seriously.\n\t\t\n\t\t\"The war on your ${plan_name} is a source of great shame to us,\" the ${enemy_name} replies, \"but it stretched our scant resources to their limit.  If anything, those resources have only further diminished since the end of the conflict.  Simply put, we can barely tend to the needs of our own system.  I know this is not the answer you wish to hear, but it is the truth.\"\n \t\t\nYou weigh your options.  The ${enemy_name} Ambassador is very convincing, but can you afford to risk betrayal?\n*choice\n\t#Agree to give the Alliance your recommendation for ${enemy_name} membership.\n\t\tYou tell the ${enemy_name} that you will give the Alliance your recommendation.\n\t\t\n\t\tThe Ambassador is stunned.  It begins to produce more ${sound2}, but the translation unit cannot make sense of it.  The ${enemy_name} is too overjoyed to make sense.\n\t\t\n\t\t*goto touch\n\t#Decline to give the Alliance your recommendation at this time.\n\t\tYou tell the ${enemy_name} that you cannot give the Alliance your recommendation in good conscience.\n\t\t\n\t\tThe ${enemy_name} produces more ${sound2}.  The translator unit simply asks, \"Why?\"\n\t\t*choice\n\t\t\t#You are not convinced the ${enemy_name} can have reformed their system in just fifteen standard years.\n\t\t\t\tYou explain to the ${enemy_name} that, with all due respect, you do not believe that a system as corrupt as theirs can reform in such a relatively short time.\n\t\t\t\t\n\t\t\t\tIf you are wrong, and they truly have reformed, you tell the Ambassador that the ${enemy_name} need only continue on their current path.  They will prove to the universe in time that they are worthy.\n\t\t\t\t*goto regret\n\t\t\t#This decision would come too soon for your people, who have endured great hardship at the hands of the ${enemy_name}.\n\t\t\t\tThe crimes of the ${enemy_name} are still fresh in the minds of the ${plan_name} people, you explain.  It will be another generation at least before they are ready to take this step.\n\t\t\t\t*goto regret\n\t\t\t#You don't have to explain yourself to ${enemy_name}.\n\t\t\t\tYou tell the Ambassador that fifteen standard years ago, you were driven out of your own system by their kind, and crossed oceans of blood and fire to get back here.  After such a trial, you shouldn't have to explain yourself to anyone, let alone one of the ${enemy_name}.\n\t\t\t\t*goto nasty_regret\n\t#Tell the ${enemy_name} Ambassador that you will see to it they are kept out of the Alliance until the stars themselves burn out.\n\t\tYou tell the ${enemy_name} that you have seen the cruelty and warlike nature of their system firsthand.  They will never be allowed into the Alliance while you still live, and your people will see to it that your wishes are respected long after you have gone.\n\t\t*goto nasty_regret\n \n*label touch\nYou stand as it approaches you.  It reaches out a single \n*if enemy_type = \"blob\"\n\tfin-like pseudopod, \n*if enemy_type = \"bug\"\n\tjagged feeler, \n*if enemy_type = \"lizard\"\n\tscaly claw, \n*if enemy_type = \"squid\"\n\ttentacle, \nand you understand it wishes for you to give it your hand.  This you do.\n\nIts touch should feel terribly uncomfortable in your own, but the fragile need that you sense in this creature is all too familiar.\n\nThere is nothing truly alien about the ${enemy_name}.\n*goto thank_you\n\n*label regret\n\nThe ${enemy_name} seems to accept what you have said.  Perhaps such a response was anticipated.  \"Your opinion is of great importance to us, and to the Alliance.  And so, we will make no formal request of them until we have received your permission.  But we will continue to ask you for that permission, once every year, until we have come to understand each other.\"  The translation unit does not convey emotion, but you can almost swear that you hear a note of hope.\n\nThe Ambassador leaves, and you return to your chamber.  On the way back, you stop again at the balcony overlooking Cothal.  You wait until you have seen the ${enemy_name} passenger transport ascend into the sky.\n\nAs it breaks into the stratosphere, the clouds slowly change into unfamiliar shapes.\n*goto thank_you\n\n*label nasty_regret\n\nThe ${enemy_name} seems unsurprised by what you have said.  Perhaps such a response was anticipated.  \"What has been done to your world cannot be undone.  Neither should it be forgotten.  But we promise you that it will never happen again.  You will see that in time, I am sure of it.\"  The translation unit does not convey emotion, but you can almost swear that you hear a note of hope.\n\nThe Ambassador leaves, and you return to your chamber.  On the way back, you stop again at the balcony overlooking Cothal.  You wait until you have seen the ${enemy_name} passenger transport ascend into the sky.\n\nAs it breaks into the stratosphere, the clouds slowly change into unfamiliar shapes.\n*goto thank_you\n\n*label prisoner_of_enemy\nThe morning bell sounds.  You awake in your cell, where you have lived since you first came to Rakiis, the ${enemy_name} penal planet.  You stand at the edge of your steel bed, and look out at the jagged cliffs on the horizon.\n\nThe ${enemy_name} know that Rakiis is even more inhospitable and lifeless than their own home world.  By giving you a view of its unrelenting nothingness, they are breaking you down a little more each day.\n\nYou hear a series of ${sound} over the colony soundsystem.  You recognize your ${enemy_name} name immediately.  You will have one minute to prepare for the guards.  They know you well...\n*choice\n\t#...because of your numerous escape attempts.\n\t\t*set slippage 50\n\t\tYou have have yet to succeed in escaping the penal colony, but you have been moved twice within the complex.  Too many close calls.\n\t\t\n\t\tIn fact, you are already hard at work planning your next break.  It helps to keep your mind alive.\n\t\t*goto after_attitude\n\t#...for your borderline-worshipful obsession with the ${enemy_name}.\n\t\t*set slippage 75\n\t\tSince the defeat, you longer think of the ${enemy_name} as your enemy.  Instead you have come to regard them as a superior form.  You know there is a reason your people were fated to fall under their rule.\n\t\t*goto after_attitude\n\n\t#...for your (deceptive) obedience.\n\t\t*set slippage 25\n\t\tYou have always known that it is best to keep your enemies close.  Over the years, the guards have come to think of you almost like one of their own.  One day, you know it will prove their undoing.  You need only wait.\n\t\t*goto after_attitude\n\n*label after_attitude\n*page_break\n*if slippage !=50\n\tThe guards come to the room, and you are politely led to a featureless chamber.  \n*if slippage = 50\n\tThe guards arrive.  After the requisite struggle, you are dragged to a featureless chamber.  \n*if enemy_type = \"blob\"\n\t${enemy_name} soldiers line the rear of the room.  You know they are military from the protective skein that covers their shapeless flesh.\n\t\n\tOne of them, a commander of some kind, is located away from the rabble, waiting for you beside an empty ${plan_name}-style chair.  \n\t\n*if enemy_type = \"lizard\"\n\t${enemy_name} soldiers line the rear of the room.  You know they are military from their distinctive leather uniforms, rumored to be harvested from the bodies their own dead.  A sign of respect, or so you are told.\n\t\n\tAnother one of them, a commander of some kind, is located away from the rabble, its huge black eyes fixed on you with an uncanny stillness.  Beside it is an empty ${plan_name}-style chair.  \n\t  \n*if enemy_type = \"squid\"\n\t${enemy_name} soldiers line the rear of the room, their bodies wrapped in semi-permeable uniforms, with weaponry available to any appendage that should need to take action.\n\t\n\tAnother of their kind, a commander, you presume, is perched separate from the soldiers on a square block toward the center of the room.  Just beside it is an empty ${plan_name}-style chair.  \n\t\n*if enemy_type = \"bug\"\n\t${enemy_name} soldiers line the rear of the room.  You recognize them as military because their exoskeletons are pierced or modified in places, to accommodate weaponry and equipment.  \n\t\n\tAnother of their kind, a commander, you presume, waits apart from the others with uncanny stillness, its legs folded under its abdomen.  Beside it sits an empty ${plan_name}-style chair.  \n*if slippage = 50\n\tYou are summarily dropped into it.  \n*if slippage !=50\n\tYou walk over to it, and seat yourself.  \n\nAs ever when you are very close to  \n*if enemy_type = \"blob\"\n\tone of these oozing \n*if enemy_type = \"lizard\"\n\tone of these leathery green \n*if enemy_type = \"squid\"\n\tone of these glistening \n*if enemy_type = \"bug\"\n\tone of these preternaturally still \n${enemy_name}, you are overcome with...\n*choice\n\t*if slippage > 50\n\t\t#Awe: you are not worthy to be in their presence.\n\t\t\tThere are those on ${plan_name} who would find the presence of the ${enemy_name} unbearable, but you have learned to admire every aspect of their philosophy, even their physical form.\n\t\t\t*goto stank\n\t*if slippage > 50\n\t\t#Envy: your only wish is to become more like your captors.\n\t\t\tThe only issue with being so close to one of the ${enemy_name} is how it reminds you of your own imperfections.  The people of ${plan_name} are such regrettably weak forms...\n\t\t\t*goto stank\n\t*if slippage !=75\n\t\t#Fear: the ${enemy_name} horrify you.\n\t\t\tIt is not something you are likely to admit to the Commander, but the ${enemy_name} terrify you.  Their sheer otherness, inside and out, chills you to the bone.\n\t\t\t*goto stank\n\t*if slippage !=75\n\t\t#Disgust: the ${enemy_name} assail your senses.\n\t\t\t*if enemy_type = \"blob\"\n\t\t\t\tThese amoebic horrors have invaded your very dreams, and your skin crawls just picturing one, let alone sitting beside it.\n\t\t\t\t*goto stank\n\t\t\t*if enemy_type = \"lizard\"\n\t\t\t\tThese slithering bogeys have invaded your nightmares, and your skin crawls just picturing them, let alone sitting beside one.\n\t\t\t\t*goto stank\n\t\t\t*if enemy_type = \"squid\"\n\t\t\t\tThese slime-limbed horrors have invaded your nightmares, and your skin crawls just picturing one, let alone sitting beside it.\n\t\t\t\t*goto stank\n\t\t\t*else\n\t\t\t\tThese spindly, creeping horrors have invaded your nightmares, and your skin crawls just picturing one, let alone sitting beside it.\n\t\t\t\t*goto stank\n\t*if slippage > 50\n\t\t#Curiosity: you wish to know more about these amazing beings.\n\t\t\tIt is the fate of the ${enemy_name} to become the keepers of the known universe, and you always hope to learn more about their greatness.\n\t\t\t*goto stank\n\t*if slippage !=75\n\t\t#Curiosity: you are strangely fascinated with the ${enemy_name}.\n\t\t\tThe ${enemy_name} have an intriguing physiology and a unique culture.  By making a study of both, you have been able to endure their presence more effectively.\n\t\t\t*goto stank\n*label stank\n*page_break\nThe creature begins to \n*if enemy_type = \"blob\"\n\tblubber and shriek, while its single eye floats ominously through its form, taking in your whole body at once.  Then the translation unit whirs into gear, and a synthesized voice emerges from above you, relating the ${enemy_name} Commander's message in perfect ${plan_name}.\n*if enemy_type = \"lizard\"\n\thiss and tweet profusely.  The translation unit whirs into gear, and a synthesized voice emerges from above you, relating the ${enemy_name} Commander's message in perfect ${plan_name}.\n*if enemy_type = \"squid\"\n\tblubber and shriek, its beak making an unnerving snapping noise as it speaks.  Then the translation unit whirs into gear, and a synthesized voice emerges from above you, relating the ${enemy_name} Commander's message in perfect ${plan_name}.\n*if enemy_type = \"bug\"\n\tissue forth a series of unnerving clicks and buzzes.  They sound so much like the noises made by the translation unit that it comes as a surprise when a synthesized voice emerges from above you, relating the Commander's message in perfect ${plan_name}.  \n\n\"You have been brought to our attention as one who excelled in the trials,\" it says.\n\nAt first you are uncertain what the ${enemy_name} means by \"the trials,\" but then you recall the endless battle simulation programs that you and the other prisoners have been playing for entertainment these past few standard months.  Apparently these were actually some form of test.\n\nYou say...\n*if slippage !=75\n\t*choice\n\t\t#...that you are very honored.\n\t\t\tYou tell the ${enemy_name} Commander that you are proud to have been singled out for this distinction.\n\t\t\t*goto after_chats\n\t\t*if slippage = 50\n\t\t\t#...that you merely pretended you were destroying ${enemy_name} ships.\n\t\t\t\tYou tell the Commander that you owe your success in the battle simulator to the singular focus you achieved by pretending that the squadrons you destroyed in the game belonged to the ${enemy_name}.\n\t\t\t\t\n\t\t\t\tYou intend the statement to be received as an insult, but when you say it out loud, you realize the ${enemy_name} Commander will regard it as a compliment.\n\t\t\t\t*goto after_chats\n\t\t*if slippage = 50\n\t\t\t#...that you found their combat simulator remarkably easy to beat.\n\t\t\t\tYou say that you cannot be the only prisoner to have beaten this simplistic combat game.\n\t\t\t\t\n\t\t\t\tOnly after you have bragged in this way do you realize that, as a prisoner of war, your brave words will probably fail to impress the Commander.\n\t\t\t\t*goto after_chats\n\t\t*if slippage = 25\n\t\t\t#...that you are sure the Commander would do far better at the simulator than you.\n\t\t\t\tYou say that you are only grateful you were not pitted against the Commander, for then you would surely fail.\n\t\t\t\t\n\t\t\t\tYou intend the statement as flattery, but realize once you have spoken that the Commander will likely regard it as a simple statement of fact.\n\t\t\t\t*goto after_chats\n\t\t*if slippage = 25\n\t\t\t#...that you merely did as well as you could, being a humble creature of ${plan_name}.\n\t\t\t\tYou say that, as a lowly prisoner from ${plan_name}, you are happy to have achieved anything at all.\n\t\t\t\t\n\t\t\t\tThe words sting your tongue to speak them, but lies like this are the reason you are so well-liked by your keepers.\n\t\t\t\t*goto after_chats\n*if slippage = 75\n\t*choice\n\t\t#You are honored to have met with the approval of the ${enemy_name}.\n\t\t\tYou tell the Commander that it is ever your hope to be recognized by the ${enemy_name}.\n\t\t\t*goto after_chats\n\t\t#As a humble creature of ${plan_name}, you must do what you are able.\n\t\t\tYou tell the Commander that you find life difficult as a ${plan_name}, and are honored to receive any praise from the ${enemy_name}.\n\t\t\t*goto after_chats\n\t\t#Nothing, and keep your eyes respectfully averted.\n\t\t\tYou do not dare to look in the face of the ${enemy_name}.  You merely accept the compliment, and wait until the leader speaks again.\n\t\t\t*goto after_chats\n*label after_chats\n*page_break\n\"Your success in the trials recommends you for military recruitment,\" the ${enemy_name} reveals.  \"In two months you could be fighting beside us, under my command.  We hope you will view this proposal in a positive light, as an opportunity for you to redeem your disgrace in the battle over ${plan_name}.\"\n\n*if slippage > 50\n\tAn ordinary ${plan_name} citizen might balk at the suggestion of the Commander, but you understand that you are being offered a unique chance to reclaim your honor.  This is one of the greatest concepts of the noble ${enemy_name}:  their ideal of redemption through combat.\n\t\n\tBeyond even that, the Commander's suggestion would afford you the chance to...\n\t*goto sycophant\n*if slippage \u003c=50\n\tIt takes a moment for the meaning of this insolent suggestion to truly sink in.  The ${enemy_name} want you to fight for them, and what's more, they think that the notion should be attractive to you, precisely because they defeated you in combat.\n\t\n\tHow little they know of your people, and their ideals.  There are so many reasons that their suggestion is absurd, it is difficult to pick just one...\n*label bad_reason\n*choice\n\t#The ${enemy_name} are the sworn enemy of your people.\n\t\tThe ${enemy_name} conquered your home planet, killing thousands of your own people.  What kind of ${plan_name} citizen would you be if you supported them in open combat?\n\t\t\n\t\tBut even as you consider this, you begin to understand that there are several reasons it might be attractive to do that very thing...\n\t\t*goto good_reason\n\n\t#The ${enemy_name} could force you to fight against planets and systems that have done no harm to you.\n\t\tThe ${enemy_name} conquered your home planet, and would certainly expect you to participate in the wholesale conquest of other corners of the universe.  You would, in effect, become the very thing you hate.\n\t\t\n\t\tBut suddenly, you begin to understand that there may be several good reasons to do just that...\n\t\t*goto good_reason\n\n\t#The ${enemy_name} would almost certainly treat you like some sort of pet.\n\t\tThe ${enemy_name} view themselves as the chosen system, destined to conquer the universe.  They treat any planet that is not under their command like a society of servants with delusions of grandeur.\n\t\t\n\t\tBut even as you sort through all the reasons to ignore the Commander's suggestion, you begin to understand that there would be certain advantages to taking it...\n\t\t*goto good_reason\n\n*label good_reason\n*choice\n\t#You could find a way to free ${plan_name} from the ${enemy_name} occupation.\n\t\tThere are myriad ways that you could use your access to the ${enemy_name} military to positive advantage for ${plan_name}.  Perhaps the Commander is right.  Perhaps you could redeem yourself after all.\n\t\t*goto advantage\n\t#You may find an opportunity to sabotage the ${enemy_name} military during one of their operations, and affect a devastating blow to their pride.\n\t\tThere are myriad opportunities for revenge against your enemy if they think that you are one of them.\n\t\t*goto advantage\n\t#You might even be able to change the attitudes of the ${enemy_name} military from within.\n\t\tIt's possible that, by working alongside the ${enemy_name}, you could slowly alter the way they view the universe, and teach them to question their megalomaniacal ideas.\n\t\t*goto advantage\n*label advantage\n\nJust as you are considering this possible advantage, the ${enemy_name} Commander speaks again: \"Of course, all candidates must submit to the military conditioning...\"\n\nYou have heard of the ${enemy_name} military conditioning.  Its details are mysterious, but you know that there are few minds up to the challenge of resisting it.  Most candidates who agree to the conditioning come out of the program having forgotten their own names.  And it is telling indeed that the ${enemy_name}, who have taken so much of the universe by force, would still feel the need to ask you for your permission to take this step.  Even they, who recognize no known borders, respect your soul.\n\nYou wonder if you are up for the challenge.  Do you run the risk of losing yourself to the ${enemy_name}, for the opportunity to infiltrate their military?\n*choice\n\t#Absolutely not, it's too risky.\n\t\t*goto forget_it\n\t#I am no use to ${plan_name} in prison.\n\t\t*goto brainasplode\n\n*label sycophant\n*choice\n\t#Spread the wisdom of the ${enemy_name} throughout the known universe.\n\t\tThe purpose of the universe is to serve the ${enemy_name}, but so many systems have yet to awaken to that truth.  What an honor it would be to disseminate it!\n\t\t\n\t\t*goto wash_expo\n\t#Work in the service of the universe's true rulers.\n\t\tThe purpose of the universe is to serve the ${enemy_name}, and what an honor it would be to further that noble cause!\n\t\t\n\t\t*goto wash_expo\n\t#Do what you were trained to do.\n\t\tYou were born to fight.  \n\t\t*if bat_style > 50\n\t\t\tBorn to see through your opponent's weaknesses and trick your way through their defenses.  And if you could do it again in the service of the destined overlords, what an honor that would be!\n\t\t\t*goto wash_expo\n\t\t*else\n\t\t\tBorn to visit a rain of fury and destruction upon your opponents.  And if you could do that again in the service of the destined overlords, what an honor that would be!\n\t\t\t*goto wash_expo\n\n*label wash_expo\n\nJust as you are considering this bright future, the ${enemy_name} Commander speaks again: \"Of course, all candidates must submit to the military conditioning...\"\n\nYou have heard of the ${enemy_name} military conditioning.  Its details are mysterious, but you know that there are few minds up to the challenge of resisting it.  Most candidates who agree to the conditioning come out of the program having forgotten their own names.\n\nTo erase yourself utterly, and replace your very being with the great thoughts of the ${enemy_name}?  It sounds like a dream come true.  Do you accept this fate?\n\n*choice\n\t#Cleanse me of my ignoble ${plan_name} mind.\n\t\t*goto brainasplode\n\t#I am not worthy.\n\t\t*goto forget_it\n\n*label brainasplode\n*if integrity >=50\n\tYou are the Captain of an Akari-class dreadnought.  You stand on its bridge.\n\t\n\tYou are surrounded by your ${enemy_name} crew, who remain at battle-stations.  Your tactical grid is projected within a spinning stone circle, which lines a pit in the floor of the command chamber.  Inside this, you see an image of the Alliance convoy you have been ordered to destroy.  Its ships cruise peacefully through their quadrant, unaware that you are waiting for them in hyperspace.\n\t\n\tYou order your crew to prepare their attack, but advise the Astrogator to charge your engine to phase-point very slowly, so that your imminent approach will not be detected from normal space.\n\t\n\tAlthough you speak only a crude form of ${enemy_name}, the Astrogator receives your order with pride.  These soldiers know they can count on you to further their purpose.  And although you do not know where you are from, or why your form is so different from that of your comrades, the fact that you have their respect fills you with pride.\n\t\n\tYour dreadnought begins to phase, and as your enemies appear, you give the order to fire.\n\t*goto thank_you\n*if integrity \u003c 50\n\t*if slippage !=75\n\t\tYou are able to hide inside your mind during the conditioning procedure.  While you can feel all the information that the ${enemy_name} units are uploading into your brain, you find that you can build a wall between your real self and the person they want you to be.\n\t\t\n\t\tOn the day you finally begin your formal training in the ${enemy_name} battle corps, none of your \"comrades\" suspect that you still know who you are, or what you are going to do.\n\t\t\n\t\tIt will only be a matter of waiting for the right moment.  A moment that will surely come.\n\t\t\n\t\tYou tell yourself that the battle for ${plan_name} has just begun.\n\t\t*goto thank_you\n\t*if slippage = 75\n\t\tYou can feel every speck of information that the ${enemy_name} units upload into your brain, but there seems to be an impassable a wall between your real self and the ${enemy_name} soldier that the machine is trying to build inside you.\n\t\t\n\t\tOn the day you finally begin your formal training in the ${enemy_name} battle corps, none of your \"comrades\" suspects that you remember who you really are.  But you do, and what is worse, you find that you cannot make yourself forget.\n\t\t\n\t\tThe rest of the training, and your remaining career as a ${enemy_name} Captain, is a success—but in your mind, it is a kind of torture.  You had hoped to lose your ${plan_name} identity in the new one that the ${enemy_name} have placed into your mind.  Instead, you are a sorry simulation of a ${enemy_name}, forever wandering the vast distance between the creature you are, and the one you hoped so much to be.\n\t\t*goto thank_you\n\n*label forget_it\n*if slippage = 75\n\tYou simply cannot believe that your tiny mind could fit the thoughts and concepts that fill the ${enemy_name} world.  How could the puny thing survive the process?  No, you are sure you could only ever hope to become a sorry simulation of a ${enemy_name}, nothing more.\n\t\n\tYou refuse the Commander's offer as politely as possible and return to your cell.  Once there, you remind yourself that, in a sense, you have already furthered the noble cause of the ${enemy_name}, simply by losing the battle over ${plan_name} to their forces.\n\t\n\tAnd suddenly, you are filled with pride.\n\t*goto thank_you\n*if slippage = 50\n\tYou refuse the Commander's offer, and not politely either.  The guards return, depositing you back in your cell with a hearty push that sees your face making contact with the far wall.\n\t\n\tEven as you wipe the blood away, you know you have made the right decision.  Who is to say you would be able to withstand the ${enemy_name} conditioning?  The mind is a hard thing to quantify.  Better to count on what you can see and touch.\n\t\n\tLike those energy barriers on the third level of the prison, for instance.  The ones that turn off for supply deliveries every night.\n\t\n\tYou look at the forbidding landscape beyond your cell, and smile.\n\t*goto thank_you\n*if slippage = 25\n\tYou politely decline the offer, explaining that you doubt your puny mind could hold all the grand concepts that embody the ${enemy_name} universe.\n\t\n\tAs you are escorted back to your cell, you know you have made the right decision.  Who is to say you would be able to withstand the ${enemy_name} conditioning?  There is no way to know for sure.\n\t\n\tBut you do know, for instance, that the guards have been allowing you to visit them at their posts more and more these past few months.  And you know, too, that they have no fear of leaving their weapons out in your presence.  After all, who could doubt your loyalty?\n\t\n\tYou look at the forbidding landscape beyond your cell, and smile.\n\t*goto thank_you\n\n*label prisoner_of_rebels\nThe morning bell sounds, and you awaken in your steel cell.\n\nThere is no view here, and there is no company.  Your only companion is a glowing red library tablet on your shelf.  Every day, it uploads propagandized reports from the \"Chronicle of the Republic,\" the only news source on Liberated ${plan_name}.\n\n\"Prisoner 405137,\" announces a voice over the loudspeaker.  You recognize your code, and you know you will have only a few minutes to prepare for the guards.  By now, they know your code well too.  You are somewhat famous, in fact...\n\n*choice\n\n\t*if scenario = 8\n\t\t#...for your frequent escape attempts.\n\t\t\t*set slippage 50\n\t\t\tYou have have yet to succeed in escaping the complex, but you have been moved seven times within its walls, after a few too many close calls.\n\t\t\t\n\t\t\tIt is of no consequence.  In fact, you are already hard at work planning your next break.  You know you will find a way.\n\t\t\t\n\t\t\tAnd once you are free, you will find Lieutenant Demian, and confront her with the truth.  She must understand that you have always stood with her.\n\t\t\t*goto after_attitude3\n\n\t*if scenario !=8\n\t\t#...for your frequent escape attempts.\n\t\t\t*set slippage 50\n\t\t\tYou have have yet to succeed in escaping the complex, but you have been moved seven times within its walls, after a few too many close calls.\n\t\t\t\n\t\t\tIt is of no consequence.  In fact, you are already hard at work planning your next break.  It helps to keep your mind alive.  A little game, between you and the Lieutenant.\n\t\t\t*goto after_attitude3\n\n\t*if scenario !=8\n\t\t#...for your obsession with earning Lieutenant Demian's pardon, and being accepted as a member of the Rebellion.\n\t\t\t*set slippage 75\n\t\t\t*if alliance_true \u003c 50\n\t\t\t\tYou have tried to explain to the guards that, while you may not have supported the Rebellion, you were no Alliance sympathizer.  Surely one day the Lieutenant will forgive you for your crimes against Liberated ${plan_name}.\n\t\t\t\t*goto after_attitude3\n\t\t\t*else\n\t\t\t\tYou have tried to convince the guards that you have accepted the truth of the rebellion.  Surely one day the Lieutenant will forgive you for your crimes against Liberated ${plan_name}.\n\t\t\t\t*goto after_attitude3\n\n\t*if scenario = 8\n\t\t#...for your insistence that you are really a rebel.\n\t\t\t*set slippage 50\n\t\t\tYou have tried, and failed, to convince your captors that you are loyal to their cause.  That during the battle over ${plan_name}, Lieutenant Demian was fooled by the Alliance's trickery into thinking you were a traitor.  But no one believes you, and after hearing you tell your tale over and over for fifteen years, it is safe to say they think you are mad.\n\t\t\t\n\t\t\tIf only there were a way you could explain everything to Lieutenant Demian in person.\n\t\t\t*goto after_attitude3\n\n\t*if scenario = 8\n\t\t#...for your obedience.\n\t\t\t*set slippage 25\n\t\t\tThe best way to demonstrate that you bear the Rebellion no ill will is to submit to its authority, day after day, without question.  You hope that somehow, in this way, news of your respectful demeanor will reach the Lieutenant.\n\t\t\t*goto after_attitude3\n\n\t*if scenario !=8\n\t\t#...for your (sincere) obedience.\n\t\t\t*set slippage 75\n\t\t\tThe best way to demonstrate that you bear the Rebellion no ill will is to submit to its authority, day after day, without question.  You hope that somehow, in this way, news of your respectful demeanor will reach the Lieutenant.\n\t\t\t*goto after_attitude3\n\n\t*if scenario !=8\n\t\t#...for your (deceptive) obedience.\n\t\t\t*set slippage 25\n\t\t\tYou have always known that it is best to keep your enemies close.  Over the years, the guards have come to think of you almost like one of their own.  For fifteen years, you have been biding your time for the right moment.  You know you will find it.  You need only wait.\n\t\t\t*goto after_attitude3\n\n\n\n*label after_attitude3\n*page_break\nBut you are forgetting yourself, calling her a mere Lieutenant.  Since the Rebellion, she has been Supreme Commander Demian.\n\nThe new post seems to suit her well.  You have not seen her in person, of course.  But she is a frequent presence in the \"Chronicle.\"\n\nWhenever you catch a glimpse of her defiant face on the Commemoration Day banners, you cannot help but wonder why she left you alive, of all people.  You can only presume...\n*choice\n\t#...that she worried your death would only empower the Alliance.\n\t\tYou are sure that Lieutenant Demian's only reason for leaving you alive is her fear of creating an Alliance martyr.  You do not owe your survival to charity, but strategy.\n\t\t*goto ag\n\t#...that she values your old friendship too much.\n\t\tYou are sure that Lieutenant Demian still holds dear the days when you were fighting side by side, and cannot bear to give the order that would end the life of one she trusted so well.\n\t\t*goto ag\n\t#...that she wants you to suffer.\n\t\tYou are sure that Lieutenant Demian has only kept you alive as a kind of punishment.  To cut your existence short would merely release you from the humiliation that she hopes to perpetuate.\n\t\t*goto ag\n*label ag\t\n*page_break\n*if slippage = 50\n\tThe guards arrive.  After the requisite struggle, you are carried to a receiving room, \n*if slippage !=50\n\tThe guards arrive, and you are accompanied to a receiving room, \nwhere a member of the Liberated Army awaits you.  There is a frozen quality to the man's face that makes you uncomfortable, and his voice is strangely flat.\n\n\"Greetings, Prisoner 405137.  \n*if slippage = 50\n\tYou have been designated a flight risk, and will be moved to the new quarter of the penitentiary today.  Please come with me immediately.\"  \n*if slippage !=50\n\tPlease accompany me to the interrogation chamber, in relation to a recent contraband incident.\"  \nThe soldier walks you through the labyrinthine halls of the prison complex, and finally down to a subterranean service level.  You realize almost immediately that this cannot be the route to the \n*if slippage = 50\n\tnew quarter, \n*if slippage !=50\n\tinterrogation chamber, \nand when you hear the escape alarm sound in the levels above, your suspicions are confirmed.\n\n\"Run!\" the soldier demands, and you find yourselves scuttling through the underground service corridors of the prison, until you emerge in a drainage ditch nearly a mile away.\n\n\"We will need to leave the grounds immediately,\" your mysterious escort says.\n*fake_choice\n\t#\"But who are you?\"\n\t\t\"A representative of the Alliance,\" the escort says.  \"I have been sent to bring you back to Calpurnia.\"  \n\t\t\n\t#\"But where are we going?\"\n\t\t\"To Calpurnia,\" the escort says.  \"The Alliance has sent me to rescue you.\"\n\t\t\n\t#\"But what is going on?\"\n\t\t\"You are being rescued, Captain.  I have orders to bring you to Calpurnia immediately.  Orders from the Alliance.\"  \n\t\t\nYou are not entirely surprised by this development.  The Alliance was not conquered during the battle over ${plan_name}, merely driven off.  Their influence continues to grow in the Outer Systems.  \n*if scenario !=8\n\t*if alliance_out \u003c=25\n\t\t\n\t\tIf that is true, your imprisonment by the rebels must be a great source of shame to them.  It does not matter that you were vocally opposed to their cause.  After fifteen years, you have become a living symbol of their failure.\n\t\t*goto after_after\n\t*if alliance_true \u003c 50\n\t\t\n\t\tIf that is true, your imprisonment by the rebels must be a great source of shame to them, even though you are hardly an Alliance supporter.\n\t\t*goto after_after\n\t\n\tIf that is true, your imprisonment by the rebels must be a great source of shame to them.  \n*if scenario = 8\n\t\n\tIf they truly believe you were working for their cause, then your imprisonment by the rebels must be a great embarrassment to them.   \n*label after_after\n*page_break\nYou regard the soldier who stands before you.  Suddenly you understand the reason for his expressionless face, and his flat tone.  He must be employing some kind of chameleon band, and a translation cipher, to conceal his true identity.\n\nIn reality, this \"soldier\" is probably...\n*choice\n\t#...a spy from the Calpurnian secret service.\n\t\t*set it 1\n\t\t*goto after_it\n\t#...a Rakashi stealth assassin.\n\t\t*set it 2\n\t\t*goto after_it\n\t#...a Tzir warrior-wraith.\n\t\t*set it 3\n\t\t*goto after_it\n*label after_it\nYou will know soon enough.  As you watch, the soldier de-activates his invisible device, and his features begin to blur.  He returns to his true form, that of \n*if enemy_type = \"blob\"\n\ta pulsating green blob.\n*if enemy_type = \"lizard\"\n\ta reptilian green biped.\n*if enemy_type = \"squid\"\n\ta glistening blue squid.\n*if enemy_type = \"bug\"\n\tan enormous insectoid warrior.\n\t\t\nIt takes a moment for your mind to accept what you are seeing.  Your rescuer is not a \n*if it = 1\n\tCalpurnian, \n*if it = 2\n\tRakashi, \n*if it = 3\n\tTzir, \nbut one of the ${enemy_name}.\n\nFaced with your people's oldest enemy, you...\n*choice\n\t#...attack the ${enemy_name} instantly.\n\t\tYou are not sure if a tritium pipe will do you any good against the ${flattering_adj} ${enemy_name}, but it is the only weapon available.  You grab one from the runoff ditch and attack your would-be liberator.\n\t\t\n\t\t*gosub whoops2\n\t\t\"That will not be necessary, Captain,\" it says, still in the flat synthesized voice of the soldier.  \"You must understand that   \n\t\t*gosub right\n\t\t*goto wait_a_minute\n\t#...prepare to defend yourself.\n\t\tYou are not sure if a tritium pipe will do you any good against the ${flattering_adj} ${enemy_name}, but it is the only weapon available.  You lift it from a puddle and hold it in your hand, ready to strike.\n\t\t\n\t\t\"That will not be necessary, Captain,\" it says, still in the flat synthesized voice of the soldier.  \"You must understand that   \n\t\t*gosub right\n\t\t*goto wait_a_minute\n\t#...ask the ${enemy_name} why it released you.\n\t\t\"You must understand that \n\t\t*gosub right\n\t\t*goto wait_a_minute\n\n*label right\n*if (scenario = 2) or (scenario = 8)\n\tI am here to help you.  You have endured fifteen years of imprisonment because of our mistake.  Now we wish to right that wrong, once and for all.\"\n*if (scenario !=2) and (scenario !=8)\n\tI am here to help you.  You have endured fifteen years of imprisonment because of our failure.  Now we wish to right that wrong, once and for all.\"\n*return\n\n*label whoops2\n*if enemy_type = \"blob\"\n\tThe pipe swipes through the creature's gelatinous flesh.  It is unharmed.  \n*if enemy_type = \"squid\"\n\tThe ${enemy_name} catches the pipe in one of its burly tentacles and tosses it aside.  \n*if enemy_type = \"lizard\"\n\tThe ${enemy_name} simply steps aside to let the pipe swing by.  Its reflexes are too fast for you.  \n*if enemy_type = \"bug\"\n\tThe ${enemy_name} simply twitches to the left, and the pipe swings by.  Its reflexes are too fast for you.  \n*return\n\n*label wait_a_minute\n\nOnly when you hear the ${enemy_name} say \"we\" and \"us\" do you realize the implications of its words: has the Alliance truly accepted the ${enemy_name} into its fold?\n\nYou ask...\n*fake_choice\n\t#...why the Alliance would allow a corrupt system like ${enemy_name} into their organization.\n\t\tThe ${enemy_name} seems unsurprised by your words, perhaps it is accustomed to such talk.\n\t\t\n\t\t\"Make no mistake, Captain: the ${enemy_name} are not yet fully Alliance members, though there are many of us who wish to earn our place among them.  So we work to prove our loyalty through service, by taking missions that are deemed too dangerous for their other agents.\"\n\t\t\n\t#...what the Alliance wants with an old prisoner like you.\n\t\t\"The Alliance wishes to correct the mistakes of its past.  But your freedom would also mean a great deal to my system.  Make no mistake, Captain: the ${enemy_name} are not yet fully Alliance members.  For now we can only prove our loyalty through service, taking missions that are deemed too dangerous for their other agents.\"\n\t\t\n\t#...how you can be sure this is not a trick.\n\t\t\"This is no trick,\" the ${enemy_name} explains.  \"Make no mistake, the ${enemy_name} system is not yet fully accepted into the Alliance.  But we are working to prove our loyalty through service, taking missions that are deemed too dangerous for their other agents.  Your rescue is one such mission, Captain.  And I can promise you, I would not risk my life for a 'trick'.\"\n\t\t\nWhile the ${enemy_name} speaks, a transport vessel is landing beside the water treatment pods.  The ship has the look of an extraction craft, able to come and go quickly through a planet's atmosphere.\n\n\"Our vessel has arrived,\" the ${enemy_name} says.  \"Please follow me...\"\n\nBefore you do, you consider the offer of the ${enemy_name}.  \n*if scenario = 8\n\tSupreme Commander Demian may never come to accept that you are a true rebel.  Maybe you can better help your cause by wheedling your way into the Alliance, and working against them from within.  Then again, can you truly stomach the idea of being saved by the ${enemy_name}?\n\t*choice\n\t\t#Take the offer made by the ${enemy_name} spy, and pretend to be an Alliance supporter.\n\t\t\tYou board the ship with the ${enemy_name}, and are quickly locked into the takeoff harness.  Before the defenses of the prison have arrived on the scene, your craft is in the stratosphere, and climbing.\n\t\t\t\n\t\t\tPerhaps one day you can return to ${plan_name}, and offer them valuable intelligence.  Perhaps you can sabotage the Alliance from within.\n\t\t\t\n\t\t\tHow strange that by joining the Alliance, you are at last becoming a true servant of Liberated ${plan_name}.\n\t\t\t*goto thank_you\n\t\t#Refuse the offer, explaining that you are a rebel.\n\t\t\tYou say that you have no need of rescuing, for you are actually a rebel, and reject the Alliance's very existence.\n\t\t\t\n\t\t\tThe ${enemy_name} clearly thinks you are mad, and backs away slowly.  \"I did not realize,\" the spy says, before disappearing into the vessel.  The ship takes off less than a minute later.  It is in the stratosphere in moments.\n\t\t\t\n\t\t\tAs you hear the sirens of the prison craft converging on you from above, you prepare to tell the soldiers your story: how the Alliance tried to rescue you, and how you refused their help, because you are a true rebel of Liberated ${plan_name}.\n\
