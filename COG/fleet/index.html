to speak against the Alliance that prevented her from revealing more.  For this we are grateful.\"\n\n*goto another_voice\n\n*label spoke_against\n*if tattle = true\n\t\"And remind us, has Lieutenant Demian ever spoken against the Alliance in your presence?  \n*if tattle = false\n\t\"And tell us, has Lieutenant Demian ever spoken against the Alliance in your presence?  \nIt need not have been recently.  Think back.\"\n\n*choice\n\t#\"Yes.\"\n\t\t*goto post_creepout5\n\t#\"No.\"\n\t\t*set messup true\n\t\t*goto creepout5\n\t#\"I do not recall.\"\n\t\t*set messup true\n\t\t*goto creepout5\n\n*label creepout5\n*gosub muddled \n\"Now, I will ask again.  Has Lieutenant Demian spoken against the Alliance in your presence?\"\n*choice\n\t#\"Yes.\"\n\t\t*goto post_creepout5\n\t*selectable_if (junk) #\"No.\"\n\t\t*goto post_creepout5\n\t*selectable_if (junk) #\"I do not recall.\"\n\t\t*goto post_creepout5\n\n*label post_creepout5\n\"We thought as much,\" the telepath says.  \n*return\n\n*label telepathy\n\"It was decided that this meeting should be conducted telepathically.  I will project my thoughts to the other delegates, and reflect yours to them.  Please refrain from utilizing your verbal mechanism.\"\n*page_break\n\"Telepathy...\" you think to yourself.\n\nThe telepath takes this as a question.  \"There is information of a sensitive nature to report,\" he explains.  \"By using telepathy, we can safeguard against our discussion being overheard.  The fact is, Captain, there is a rebellion within your fleet.  A conspiracy to overthrow the Alliance.  And by now we are sure you have guessed who is at its helm...\"\n\nAlmost instinctively, the image of Lieutenant Demian forms in your mind.\n\nAgain, the telepath takes your thought as a response.  \"You are correct,\" he remarks.  \n*return\n\n*label learned_plans\n\"But what has she told you concerning her plans for the coming battle?\"\n\n*if messup = true\n\t*label creepout_6\n\t*choice\n\t\t*selectable_if (junk) #\"She has assured me that she would never endanger our people by turning against the Alliance in our time of need.\"\n\t\t\t*goto post_creepout_6\n\t\t*selectable_if (junk) #\"She has said that, however much she detests you, she fears the Alliance is too powerful a foe to fight.\"\n\t\t\t*goto post_creepout_6\n\t\t#\"She has told me nothing.\"\n\t\t\t*goto post_creepout_6\n\n*if messup = false\n\t*choice\n\t\t#\"She has assured me that she would never endanger our people by turning against the Alliance in our time of need.\"\n\t\t\t*gosub muddled\n\t\t\t\"Now, I will ask again.  What has she told you concerning her plans?\"\n\t\t\t*set messup true\n\t\t\t*goto creepout_6\n\t\t#\"She has said that, however much she detests you, she fears the Alliance is too powerful a foe to fight.\"\n\t\t\t*gosub muddled\n\t\t\t\"Now, I will ask again.  What has she told you concerning her plans?\"\n\t\t\t*set messup true\n\t\t\t*goto creepout_6\n\t\t#\"She has told me nothing.\"\n\t\t\t*goto post_creepout_6\n\n*label post_creepout_6\n*return\n\n\n\n*label why_like\nWhat has made you change your position?\n*choice\n\t#It is dishonorable to work against those who would lay down their lives for my planet.\n\t\tThe Alliance has placed the fate of your home planet above their own.  It would be crude to remain the enemy of these brave citizens of the universe.\n\t\t\n\t\t*return\n\n\t#Our true enemy is the ${enemy_name}.\n\t\tThe Alliance has sworn to fight the ${enemy_name}, and fight them they will.  Does anyone need any greater proof of their honor?\n\t\t\n\t\t*return\n\n\t#The Alliance represents the future, and it is useless to resist them.\n\t\tYou can sense that the universe is changing, moving in a direction that brings the Outer Systems together.  History will remember those who seek to stand in the way of that change as small-minded cowards.  You want to be remembered for your bravery, not your fear.\n\t\t\n\t\t*return\n\n*label heartened\n*set conspiracy_aware true\n\"I am heartened to hear this,\" she says.  \"Because the opportunity has presented itself to turn the tables on the Alliance.  At the end of the coming battle, if we can take control of the ${enemy_name} gunships, they will be at our mercy.  And with your support, we will be unstoppable.\"\n\n\n\n*if alliance_true \u003c=25\n\tYou tell Lieutenant Demian...\n\t*choice\n\t\t#...that you will gladly work with her to bring the Alliance down.\n\t\t\t*set conspiracy_complicit true\n\t\t\t*goto yarva_intro\n\t\t#...that her plan is dishonorable, and there will be a better chance to make your move against the Alliance in the future.\n\t\t\t*set refused_demian true\n\t\t\t*goto awkward_rejection\n\n*if alliance_true > 25\n\tYou...\n\t*choice\n\t\t#...tell Lieutenant Demian that you will gladly work with her to bring the Alliance down.\n\t\t\t*set conspiracy_complicit true\n\t\t\t*goto yarva_intro\n\t\t#...refuse to participate in the Lieutenant's plan.\n\t\t\t*set refused_demian true\n\t\t\tYou will not even pretend to support a maneuver like the one the Lieutenant has proposed.  You tell her that you will not join her.\n\t\t\t\n\t\t\t*goto awkward_rejection\n\n*label yarva_intro\nThe Lieutenant's eyes fill with tears.  \"We stand together then.  And here is something that will aid our cause...\"\n\nShe produces an opaque white bubble from her pocket, and places it in your hand.  You notice the telltale factory code on its rim, and realize that you are holding a dose of Yarva.\n\nYou ask, a little sharply, where your Lieutenant obtained this dangerous substance.  \"From the merchants,\" she admits.  \"But it is a necessary evil.  Yarva makes it easier to control the thoughts.  Easier to focus the mind, and mold it.  In short, it makes it easier to lie.  The Alliance has been sending telepaths to interrogate our crew members, hoping to sniff out the rebellion.  This drug has proven quite effective for throwing them off the scent.  Take it as soon as you return to your room.  A single dose should last you a week, then I will supply another.\"\n*page_break\n*if alliance_true > 25\n\t*goto tattle_choice_yarva\nYou take the Yarva back to your chamber and administer it, pouring the crystals onto your palm.  \n*gosub yarva_through_telepathy_subroutine\n\n\"It was decided that this meeting should be conducted telepathically.  I will project my thoughts to the other delegates, and reflect yours to them.  What we say must not be overheard, Captain.  There is a rebellion within your fleet.  A conspiracy to overthrow the Alliance.  Can you guess who is at its helm?\"\n\nYou know what the Inquisitor expects you to say, but the Yarva makes it easy to bury the truth.\n*choice\n\t#\"I have no idea.\"\n\t\tThe telepath seems surprised by your response.  \"No idea?  \n\t\t*goto after_idea\n\t#\"One of the recent recruits, perhaps?\"\n\t\tThe telepath seems surprised by your response.  \"A recent recruit?  No, \n\t\t*goto after_idea\n\t*selectable_if (junk) #\"Lieutenant Demian, of course.\"\n\t\t*goto after_idea\n\t#\"I find it hard to believe that anyone would stoop so low.\"\n\t\tThe telepath seems surprised by your response.  \"Do you? \n\t\t*goto after_idea\n*label after_idea\n*set integrity %-5\nCaptain, the rebel leader is your Lieutenant!  Have you not suspected her?  Has she never expressed her opposition to the Alliance in the past?\"  You steer your mind away from the truth, and think...\n\n*choice\n\t*selectable_if (junk) #\"She has told me that she is planning to betray the Alliance during the coming battle.\"\n\t\t*goto not_true\n\t#\"On the contrary, she has told me that she supports the Alliance with all her heart.\"\n\t\t\"Then she has lied to you. \n\t\t*goto not_true\n\t#\"I would trust Lieutenant Demian with my life.\"\n\t\t\"If you continue to afford her that trust, you will have made a grave error.  \n\t\t*goto not_true\n*label not_true\n*set integrity %-5\nThe Lieutenant is planning on turning against the Alliance during the battle for ${plan_name}.  But you already know this, of course, because she has asked you to join her rebellion.  Is this not true?\"\n*choice\n\t*if alliance_out \u003c=50\n\t\t#\"Of course it is not true!  How dare you question the word of a humble soldier who is planning to fight alongside you in the coming conflict!\"\n\t\t\t*goto before\n\t*if alliance_out > 50\n\t\t#\"Of course it is not true!  Have I not demonstrated my loyalty to you?\"\n\t\t\t*goto before\n\t*if alliance_out \u003c=25\n\t\t#\"Of course it is not true!  I may have spoken out against the Alliance in the past, but that would not lead me to an act of such dishonor.\"\n\t\t\t*goto before\n\t*if alliance_out >=50\n\t\t#\"Of course it is not true!  Is this how the Alliance treats all its leaders?\"\n\t\t\t*goto before\n\t*selectable_if (junk) #\"Indeed it is, and your Alliance will soon perish in flame.\"\n\t\t*goto before\n*label before\n*set integrity %-5\nBefore the telepath can respond, Ambassador Bashena cuts into the conversation, speaking with her voice, not her mind.  \"Thank you, Inquisitor.  It appears that we will no longer require your services.  Our Captain is clearly telling us the truth.\"  The telepath bows slightly, and the Ambassador turns to you, her tone conciliatory.  \"Allow me to apologize for this precaution.  No one is what they seem to be in this difficult time.  We had to be sure that you were not a part of the rebellion.\"\n\nYou tell her...\n*fake_choice\n\t#...that you can understand.\n\t\tYou say that Ambassador Bashena is obviously doing what is necessary to secure the return of ${plan_name} to your people.\t\t\n\t\t\n\t\t\"And there is something that we hope you will do for us,\" she replies, \"to ensure just that.  \n\t#...that you are offended by her doubt.\n\t\t\"I can only apologize again, Captain.  Our concern, as ever, is the return of ${plan_name} to your people.  And there is something we hope you will do for us, to ensure just that.  \nYou see, Lieutenant Demian's plans are known to us.  After the battle with the ${enemy_name} is finished, she seeks to commandeer their orbiting gunships, and turn them against the Alliance.\n\t\n\"We would like for you to approach Lieutenant Demian as an ally.  Warn her that, when she attempts to overtake the gunships, the Alliance is planning to block her control signal.  Tell her that the only way to take charge of the ships is for her and the other rebels to board them, and assume manual control.\"\n\nYou ask the Ambassador why the Alliance would want Demian and the conspirators to board the gunships.\n\n*if good_information = false\n\t\"Do not concern yourself with these details,\" comes her reply.\n*if good_information = true\n\t\"It will be safer for you,\" comes her reply, \"if you do not know...\"\n*page_break\n*set insincere_rebel false\n*if good_information = true\n\t*set scenario 5\n*if good_information = false\n\t*set scenario 6\nYou report the news of the Alliance trap to Lieutenant Demian in another garden meeting.\n\n\"Very well,\" she says.  \"If they are trying to get us to board the gunships, we should obviously do the opposite.  When the battle is over, I will have the rebels take control of the gunships remotely.\"\n\nThat bit of business concluded, you prepare yourself for the first step of the rebellion: the battle for ${plan_name}.\n*finish\n\n*label tattle_choice_yarva\nWill you tell the Alliance about Lieutenant Demian's rebellion?\n*choice\n\t#Yes.\n\t\t*set integrity %-5\n\t\t*set tattle true\n\t\t*set good_information true\n\t\tThat very day, you approach Ambassador Bashena in the third auxiliary palace.  You hand over the Yarva, and tell her what Lieutenant Demian has revealed to you.  \n\t\t*if alliance_out \u003c 25\n\t\t\tThe information itself does not seem to surprise her, but something else does.  Perhaps the fact that you, of all people, would want her to know about it.\n\t\t\t*goto after_wide_eyes2\n\t\t*else\n\t\t\tShe does not seem surprised by what you are telling her.  \n\t\t\t*goto after_wide_eyes2\n\t\t*label after_wide_eyes2\n\t\t\n\t\t\"I must discuss this with my associates,\" she says.  \"Expect a messenger at your chamber tomorrow morning.\"\n\t\t\n\t\tThe next day, a member of the royal guard arrives at your door, and escorts you to an automated trolley.  He is the only passenger beside yourself.\n\t\t\n\t\tThe vehicle courses through the streets of Calpurnia, then disappears into a series of tunnels below the royal palace.\n\t\t*page_break\n\t\t*goto conspirator_chat\n\t#No.\n\t\t*set integrity %-5\n\t\tWhy not?\n\t\t*gosub why_silent\n\t\tBut you realize that it will be difficult to hide what you know from the Alliance, unless you take the Yarva.  When back at your chamber, you pop open the bubble and pour the crystals onto your palm.  \n\t\t*gosub yarva_through_telepathy_subroutine\n\t\t*goto yarva_lies\n\n*label yarva_lies\n\"It was decided that this meeting should be conducted telepathically.  I will project my thoughts to the other delegates, and reflect yours to them.  What we say must not be overheard, Captain, for there is a rebellion within your fleet.  A conspiracy to overthrow the Alliance.  And by now we are sure you have guessed who is at its helm...\"\n\nYou can feel the telepath in your mind, prepared to detect any lies, but the effects of the Yarva make it easy to avoid the trap he has laid for you.  You think...\n\n*choice\n\t#\"I have no idea.\"\n\t\t*goto surprise\n\t#\"One of the recent recruits, perhaps?\"\n\t\t*goto surprise\n\t*selectable_if (junk) #\"Lieutenant Demian.\"\n\t\t*goto surprise\n\n*label surprise\n*set integrity %-5\nThe telepath seems surprised by your response.  \"No, Captain!  It is your Lieutenant!  Have you truly not suspected her?  Has she never expressed her opposition to the Alliance in the past?\"  You steer your mind away from the truth, and think...\n\n*choice\n\t*selectable_if (junk) #\"She has told me that she is planning to betray the Alliance during the coming battle.\"\n\t\t*goto splits\n\t#\"On the contrary, she has told me that she supports the Alliance with all her heart.\"\n\t\t\"Then she has lied to you. \n\t\t*goto splits\n\t#\"I would trust Lieutenant Demian with my life.\"\n\t\t\"If you continue to afford her that trust, you will have made a grave error.  \n\t\t*goto splits\n*label splits\n*set integrity %-5\nThe Lieutenant is planning on turning against the Alliance during the battle for ${plan_name}.  But you already know this, of course, because she has asked you to join her rebellion.  Is this not true?\"\n*choice\n\t*if alliance_out \u003c=50\n\t\t#\"Of course it is not true!  How dare you question the word of a humble soldier who is planning to fight alongside you in the coming conflict!\"\n\t\t\t*goto prisoner_candy\n\t*if alliance_out > 50\n\t\t#\"Of course it is not true!  Have I not demonstrated my loyalty to you?\"\n\t\t\t*goto prisoner_candy\n\t*selectable_if (junk) #\"Of course it is not true!  There is a rebellion, but I am only participating in it so that I can dismantle it from within.\"\n\t\t*goto prisoner_candy\n\t*if alliance_out \u003c=25\n\t\t#\"Of course it is not true!  I may have spoken out against the Alliance in the past, but that would not lead me to an act of such dishonor.\"\n\t\t\t*goto prisoner_candy\n\t*if alliance_out >=50\n\t\t#\"Of course it is not true!  Is this how the Alliance plans to treat its own leaders?\"\n\t\t\t*goto prisoner_candy\n*label prisoner_candy\n*set integrity %-5\nBefore the telepath can respond, Ambassador Bashena cuts into the conversation, speaking aloud.  \"Thank you, Inquisitor.  It appears that we will no longer require your services.  Our Captain is clearly telling us the truth.\"  The telepath bows slightly, and the Ambassador turns to you, her tone conciliatory.  \"Allow me to apologize for this precaution.  As you have now learned, no one is what they seem to be in this difficult time.  We had to be sure that you were not a part of the rebellion.\"\n\nYou tell her...\n*fake_choice\n\t#...that you can understand.\n\t\tYou say that Ambassador Bashena is obviously doing what is necessary to secure the return of ${plan_name} to your people.\t\t\n\t\t\n\t\t\"And there is something that we hope you will do for us,\" she replies, \"to ensure just that.  \n\t#...that you are offended by her doubt.\n\t\t\"I can only apologize again, Captain.  Our concern, as ever, is the return of ${plan_name} to your people.  And there is something we hope you will do for us, to ensure just that.  \nYou see, Lieutenant Demian's plans are known to us.  After the battle with the ${enemy_name} is finished, she seeks to commandeer their orbiting gunships, and turn them against the Alliance.\n\t\n\"We would like for you to approach Lieutenant Demian as an ally.  Warn her that, when she attempts to overtake the gunships, the Alliance is planning to block her control signal.  Tell her that the only way to take charge of the ships is for her and the other rebels to board them, and assume manual control.\"\n\nYou ask the Ambassador why the Alliance would want Demian and the conspirators to board the gunships.\n\n*if good_information = false\n\t\"Do not concern yourself with these details,\" comes her reply.\n*if good_information = true\n\t\"It will be safer for you,\" comes her reply, \"if you do not know...\"\n*page_break\n*label moral_choice\nRiding back to the surface on the automated trolley, you realize that you have much to consider.  It may be an effective strategy to feed Lieutenant Demian the Alliance's lie.  Then again, you are uncertain you can bear the thought of leading her directly into their trap.  Perhaps there is still a way to dismantle the rebellion without the Alliance's help?  You decide...\n*choice\n\t#...to give Lieutenant Demian the misinformation.\n\t\t*set integrity %-10\n\t\tYou meet with Lieutenant Demian in another of Calpurnia's endless gardens.  You explain that you have information that would be helpful to the rebellion, which you gathered during your recent interrogation.\n\t\t\n\t\tYou \"warn\" Lieutenant Demian about the gunships, and impress that the only way to utilize them will be by boarding them yourselves, and taking control manually.  She seems especially grateful for the intelligence.\n\t\t*if good_information = true\n\t\t\t*set scenario 1\n\t\t\t*goto lie_feelings\n\t\t*else\n\t\t\t*set scenario 2\n\t\t\t*goto lie_feelings\n\t#...to find another way to stop the rebellion.\n\t\t*set integrity %+10\n\t\tYou meet with Lieutenant Demian in another of Calpurnia's endless gardens.  You tell her that you have been interrogated by the Alliance, and that you revealed nothing thanks to the Yarva.  But you do not try to trick the Lieutenant into boarding the gunships.\n\t\t\n\t\t*label wont_trick\n\t\t*set scenario 9\n\t\tThe next day, in the third auxiliary palace, you tell Ambassador Bashena that you have chosen not to trick the Lieutenant.  You tell her that you hope, when the time comes, you can find another way to end the rebellion.  \n\t\t*if alliance_out \u003c 25\n\t\t\tShe does not seem surprised in the least.  \n\t\t*if alliance_out = 25\n\t\t\tShe seems disappointed, but not surprised.  \n\t\t*if alliance_out = 50\n\t\t\tShe seems to understand your choice, though she is unquestionably disappointed.  \n\t\t*if alliance_out = 75\n\t\t\tShe seems surprised.  \n\t\t\n\t\t\"I hope you truly are able to deal with the rebellion without our help, Captain.  But I warn you, we have other ways of dealing with it, if you are not.\"\n\t\t\n\t\tNow, the time has come to focus on the matter at hand: the battle for ${plan_name}.\n\t\t*finish\n\n*label conspirator_chat\n*gosub arrival_expo\n\"It was decided that this meeting should be conducted telepathically.  I will project my thoughts to the other delegates, and reflect yours to them.  Please refrain from utilizing your verbal mechanism.\"\n*page_break\n\"Telepathy...\" you think to yourself.\n\nThe telepath takes this as a question.  \"By using telepathy, we are assured certain safeguards.  The fact is, Captain, as you know, there is a rebellion within your fleet.  A conspiracy to overthrow the Alliance, led by one of your own...\"\n\nThe image of Lieutenant Demian forms in your mind.\n\n\"Exactly,\" the telepath says.  \"And tell us, what did Lieutenant Demian tell you about her plans to overthrow the Alliance?\"\n\n*choice\n\t#\"She plans to use the ${enemy_name} drones as attack ships.\"\n\t\t*set messup true\n\t\t*goto creepout33\n\t#\"She plans to commandeer the ${enemy_name} gunships.\"\n\t\t*goto post_creepout33\n\t#\"She plans to reverse the polarity of the gunship power source and employ it as a weapon.\"\n\t\t*set messup true\n\t\t*goto creepout33\n\n*label creepout33\n\"Your thoughts become muddled and indistinct when you lie, Captain.  But perhaps you are merely nervous.  Allow me to clear your head for a moment.\"  \n*if alliance_true > 50\n\tA bright light seems to illuminate your very mind.  \n*if alliance_true = 50\n\tSuddenly, you can feel a change in your mind.  \n*if alliance_true \u003c 50\n\tYou feel something grip your mind, and squeeze. \n*page_break\n\"Now, I will ask again.  What did Lieutenant Demian tell you about her plans to overthrow the Alliance?\"\n\n*choice\n\t*selectable_if (junk) #\"She plans to use the ${enemy_name} drones as attack ships.\"\n\t\t*goto creepout33\n\t#\"She plans to commandeer the ${enemy_name} gunships.\"\n\t\t*goto post_creepout33\n\t*selectable_if (junk) #\"She plans to reverse the polarity of the power source.\"\n\t\t*goto creepout33\n\n*label post_creepout33\n*set good_information true\n\"We had assumed as much.  And I could not help but notice, from my brief glimpse of your memories, that you are not her ally in this fight.  For this we are grateful.\"\n\nYou hear another voice now, this one audible outside your head.  \"Thank you for your assistance, Inquisitor,\" Ambassador Bashena says.  \"It appears your services are no longer necessary.\"\n\nNow the Ambassador turns to you, her tone softer.  \"We apologize for this formality.  As you have learned firsthand, no one is what they seem to be in this difficult time.  We had to be sure that you were not a part of the rebellion.\"\n\nYou tell her...\n*fake_choice\n\t#...that you can understand her cautiousness.\n\t\tYou say that Ambassador Bashena is obviously doing what is necessary to secure the return of ${plan_name} to your people.\t\t\n\t\t\n\t\t\"And there is something that we hope you will do for us,\" she replies, \"to ensure just that.  \n\t#...that you are offended by her doubt.\n\t\t\"I can only apologize again, Captain.  Our concern, as ever, is the return of ${plan_name} to your people.  And there is something we hope you will do for us, to ensure just that.  \nWe would like for you to tell Lieutenant Demian that you have received intelligence of a plot against her.  Warn her that, when she attempts to overtake the gunships, the Alliance is planning to block her control signal.  Tell her that the only way to take charge of the ships is for her and the other rebels to board them, and assume manual control.\"\n\nYou ask why it is so important for the rebels to board the gunships.\n\n\"It will be safer,\" she tells you, \"if you do not know.\"\n*page_break\n*goto moral_choice\n\n*label yarva_through_telepathy_subroutine\nThey sink through into your skin like burrowing worms.  Your vision blurs slightly, but your thoughts sharpen.  In fact, you find that you can think of anything you wish with absolute clarity.  Even your imagination is as palpable as a recent memory.\n\nYou dispose of the empty bubble, and not a moment too soon.  There is an alert tone from your chamber door, which opens to reveal five members of the royal guard.  \"Please come with us,\" their leader says.\n\nYou...\n*choice\n\t#...demand to know where they wish to take you.\n\t\t\"You have been asked to a private meeting with the Alliance.\"  The  energized blades of the royal guard hum ominously in the silence that follows his response.  You go quietly.\n\t\t*page_break\n\t\t*goto twisty\t\t\n\t#...ask what you have done.\n\t\t\"We know only your name and rank, Captain.  And that you have been asked to a private meeting by the Alliance.\"  The energized blades of the royal guard hum ominously in the silence that follows his response.  You go quietly.\n\t\t*page_break\n\t\t*goto twisty\n\t#...politely agree to accompany the guard.\n\t\t*goto twisty\n*label twisty\nThey escort you to an automated trolley, and ride along with you as it courses through the streets of Calpurnia.  Finally, it disappears into a series of tunnels below the royal palace.\n\n*gosub arrival_expo\n*return\n\n*label why_hater\nWhat turned you against them?\n\n*fake_choice\n\t#Our abandonment in the Null Zone.\n\t\tThe Alliance has proven that its leadership is ineffective, and that your people are not its priority.  \n\t#Their obvious self-interest.\n\t\tYou have realized that, if the Alliance were allowed to win back ${plan_name}, you would not be liberating the planet, only exchanging the ${enemy_name} for new masters.  \n\t#A feeling I cannot describe.\n\t\tIt is best not to question your instincts.  \n*page_break\n*return\n\n*label change_check\n*choice\n\t#...that you have come to believe in the cause of the Alliance.\n\t\t*set alliance_true 75\n\t\t*set position \"Pro-Alliance Convert\"\n\t\t*gosub why_like\n\t\t*goto nightmare\n\n\t#...that you remain opposed to the Alliance.  You merely object to the Lieutenant's plan.\n\t\t*goto nightmare\n*label nightmare\n*return", "meet_the_alliance": "*temp envoy_diss false\n*if envoy_speech = false\n\t*if talked_out = false\n\t\t*if envoy_brig = false\n\t\t\t*set envoy_diss true\n*if envoy_brig\n\t*set envoy_diss true\n\n*temp questions_asked 0\n*temp second_round false\n*temp first_offense false\n\n*if alliance_out > 50\n\t*set goodguy true\n*if alliance_out \u003c=50\n\t*set goodguy false\n\n*set energy %-(standard_deduction)\n*set energy %-(standard_deduction)\n\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]The Fleet[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\nIt takes several weeks for your fleet to reach the rendezvous coordinates.  Your ships emerge from hyperspace at the edge of an iridescent red nebula.  Clearly, Councilor Tayu has opted for seclusion.\n\nChecking the monitors, you see the vessels of the Alliance's convoy.  You can't help but notice \n*if rep >=65\n\tthat the ships represented here are not merely from Rakashi, Calpurnia, and Tzir.  You spot a heavy warship from Kalaz, a distinctive cobalt-blue cruiser from Malthus-3, and a compact planet-hopper from Yso.  \n\t*if alliance_true > 50\n\t\tThe Councilor has done as he promised, and recruited more systems to your cause.  \n\t\t*if battle3_civility = 70\n\t\t\tConsidered alongside the presence of the Thossian rebels in your fleet, this is overwhelming news.  It is clear that the Alliance is growing fast, and you are filled with hope.\n\t\t*if battle3_civility != 70\n\t\t\tIt is clear to you that the Alliance is growing fast.  You are filled with hope.\n\t*if (alliance_true = 50) and (battle3_civility = 70)\n\t\tThe Alliance has clearly made great strides since you last spoke to Councilor Tayu, and the Thossian rebels who accompany you will only add to that success.\n\t*if (alliance_true = 50) and (battle3_civility != 70)\n\t\tThe Alliance has clearly made great strides since you last spoke to Councilor Tayu.\n\t*if alliance_true \u003c 50\n\t\tCouncilor Tayu and his cohorts have clearly been busy, recruiting systems to their cause.    \n\t\t*if battle3_civility = 70\n\t\t\tYou imagine they will be most anxious to meet the Thossian rebels who accompany you, and win more converts to their cause.\n*if (rep >=50) and (rep \u003c 65)\n\tthat the ships represented are not only from Rakashi, Calpurnia, and Tzir.  You also spot a heavy warship from Kalaz.\n\t*if alliance_true > 50\n\t\tThe Alliance may only be growing slowly, but it is growing nonetheless.  \n\t\t*if battle3_civility = 70\n\t\t\tYou feel certain the Thossian rebels who accompany you here today will bring them one step closer to their destined success.  The thought fills you with hope.\n\t\t*if battle3_civility != 70\n\t\t\tYou are filled with hope.\n\t*if alliance_true = 50\n\t\t*if (alliance_true = 50) and (battle3_civility = 70)\n\t\t\tThe Alliance has clearly made another ally since you last spoke with Councilor Tayu and, with the addition of the Thossian rebels, it may yet make one more.\n\t\t*if (alliance_true = 50) and (battle3_civility != 70)\n\t\t\tThe Alliance has clearly made another ally since you last spoke with Councilor Tayu.\n\t*if alliance_true \u003c 50\n\t\tYou presume that Councilor Tayu and his cohorts have managed to recruit another ally to their cause.  \n\t\t*if battle3_civility = 70\n\t\t\tThey should be excited indeed to learn of the Thossian rebels.  More fuel for the fire of their \"brave future.\"\n*if (rep \u003c 50)\n\tthat it looks tiny.  The only systems represented here are the ones Councilor Tayu already told you about previously: Calpurnia, Rakashi, and Tzir.  \n\t*if alliance_true > 50\n\t\tYou get a sinking feeling in your gut.  It has been weeks since the ${enemy_name} attack on ${plan_name}, yet it would appear that support for the Alliance has not grown at all.  \n\t\t*if battle3_civility = 70\n\t\t\tHowever, perhaps the presence of your Thossian guests will prove to be a sign of good things to come.\n\t*if alliance_true = 50\n\t\tThe Alliance, you can see, has not grown.  \n\t\t*if battle3_civility = 70\n\t\t\tPerhaps the presence of your Thossian guests will change that.\n\t*if alliance_true \u003c 50\n\t\tIs this the mighty Alliance Councilor Tayu was crowing about?  \n\t\t*if battle3_civility = 70\n\t\t\tIt seems your only new allies are the Thossian rebels you brought to the quadrant yourself.  So much for Councilor Tayu's political skill.\n\n*if alliance_out >=50\n\t\n\tLieutenant Demian accompanies you to a meeting on the Calpurnian flagship.  \n*if alliance_out \u003c 50\n\t\n\tLieutenant Demian and Envoy Eidon accompany you to a meeting on the Calpurnian flagship.  Its interior is decorated in the gaudy fashion of their ruling class.  \n*if alliance_true > 50\n\tIn keeping with the traditions of Calpurnia's ancient culture, the vessel's interior is decorated in a manner befitting royalty.  It is an honor indeed to be welcomed aboard.\n*if alliance_true = 50\n\tIn keeping with the traditions of Calpurnia's culture, the ship's interior looks more like an ancient hall.  \n\nCouncilor Tayu stands before a tapestry, waiting for you.  \n*if alliance_out \u003c 50\n\tEnvoy Eidon strides ahead and speaks briefly with him.  The Councilor \n\t*if rep \u003c 50\n\t\t*if envoy_speech = true\n\t\t\t*if envoy_brig = true\n\t\t\t\tglares at you angrily as he listens.  \n\t\t\t*if talked_out = true\n\t\t\t\tlooks at you in a confusion as he listens.  He seems puzzled by what he is hearing.\n\t\t\t*if (envoy_brig = false) and (talked_out = false)\n\t\t\t\tlooks at you in a confusion as he listens.  He seems puzzled by what he is hearing.\n\t\t*if envoy_speech = false\n\t\t\t*if envoy_brig = true\n\t\t\t\tglares at you angrily as he listens.  \n\t\t\t*if talked_out = true\n\t\t\t\tlooks at you in a confusion as he listens.  He seems puzzled by what he is hearing.\n\t\t\t*if (envoy_brig = false) and (talked_out = false)\n\t\t\t\tglares at you angrily as he listens.  \n\t*if rep >=50\n\t\t*if envoy_speech = true\n\t\t\t*if envoy_brig = true\n\t\t\t\tlaughs.  Much to Eidon's chagrin, he seems to be dismissing what he hears.  \n\t\t\t*if talked_out = true\n\t\t\t\tsmiles and nods.  He seems pleased with what he is hearing.\n\t\t\t*if (envoy_brig = false) and (talked_out = false)\n\t\t\t\tsmiles and nods.  He seems pleased with what he is hearing.  \n\t\t*if envoy_speech = false\n\t\t\t*if envoy_brig = true\n\t\t\t\tlooks to be confused and concerned by what he is hearing.  \n\t\t\t*if talked_out = true\n\t\t\t\tnods as he listens, though his face betrays confusion at what he hears.  \n\t\t\t*if (envoy_brig = false) and (talked_out = false)\n\t\t\t\tlooks to be confused and concerned by what he is hearing.  \n\t\"Lieutenant Demian,\" the Councilor calls finally, \"please proceed to the main chamber.  \n*if alliance_out >=50\n\t\"Lieutenant Demian,\" he says, \"please proceed to the main chamber.  \nThe Captain and I must speak privately \n*if (rep >=50) and (battle2_victory = true)\n\tbefore joining the celebration.\"\n*if (rep >=50) and (battle2_victory = false)\n\tbefore conferring with the Alliance.\"\n*if rep \u003c 50\n\tbefore meeting with the Alliance.\"\n*if (rep >=50) and (battle2_victory = true)\n\t*goto goodnews\n*if (rep >=50) and (battle2_victory = false)\n\t*goto bittersweet\n*if rep \u003c 50\n\t*goto badnews\n\n*label goodnews\n*page_break\nIn the tiny chamber where you meet with Councilor Tayu, a monitor is flanked by thick red curtains.  There you see the fleet, glistening in the phantom hues of the nebula.  \n*if alliance_out >=50\n\tThe Councilor stands before it as he speaks.  \n*if alliance_out \u003c 50\n\tThe Councilor watches it as he speaks.  \n\n\t*if envoy_speech = true\n\t\t*if envoy_brig = true\n\t\t\t\t*comment This shouldn't actually be possible because if you put him in the brig it means you shot without warning, which puts your rep below 50, and results in badnews.\n\t\t*if talked_out = true\n\t\t\t\t\"My Envoy tells me that you were open to his counsel, and his advice has not misled you.\"  He turns to face you.  \n\t\t*if (envoy_brig = false) and (talked_out = false)\n\t\t\t\t\"My Envoy tells me that, despite your doubts, you allowed his message of hope to be delivered to the crew.  I am most grateful for this.\"  He turns to face you.  \n\t*if envoy_speech = false\n\t\t*if envoy_brig = true\n\t\t\t\t*comment Again, should not be possible. \n\t\t*if talked_out = true\n\t\t\t\t\"My Envoy tells me that, despite your initial resistance, you learned to accept his good counsel.  His advice has not misled you.\"  He turns to face you.  \n\t\t*if (envoy_brig = false) and (talked_out = false)\n\t\t\t\t\"My Envoy insists that you were rather unwelcoming to him on your ship.  I will be forgiving, though I cannot promise the same for him.\"  He turns to you.  \n\"There is good news, Captain.  \n*if (rep >=65)\n\tSupport for the Alliance is growing in leaps and bounds.  \n*if (rep >=50) and (rep \u003c 65)\n\tSlowly but surely, support for the Alliance is growing.  \nThe Outer Systems have heard the cry of our people, and they are responding in kind.  The ${enemy_name} diplomats hope to prevent this, of course.  They are claiming their attack was a pre-emptive one, after we threatened them with invasion ourselves.  They have even said the destruction on our planet was caused by a misfiring weapon we intended to use against their home world!  \n*if rep \u003c 65\n\tBut few in the Outer Systems believe these desperate claims.\"\n\t\n\tHe comes a step closer.  \n*if rep >=65\n\tBut no one in the Outer Systems believes these desperate claims.\"\n\t\n\tHe comes a step closer.  \n*if battle3_civility = 20\n\t\"Even your recent action against the Thossians cannot hide the fact that we are on the right side of history.\"  \n*if battle3_civility = 30\n\t\"The details of the Thossian convoy's unprovoked attack have also reached our spies, and that information has helped us gain further support.\"  \n*if battle3_civility = 40\n\t\"Alliance spies have also reported to me the details of your encounter with the Thossians.  You did well to avoid any military engagement with them; it may have hurt our chances of gaining support.\"  \n*if (battle3_civility >=50) and (battle3_civility \u003c=60)\n\t\"Your encounter with the Thossians has also helped our cause considerably.  Their system is in turmoil over the revolt that occurred in the Antares cluster, with many of their citizens expressing sympathy for the rebels.\"  \n*if battle3_civility = 70\n\t\"Your encounter with the Thossians has also helped our cause considerably.  Though I will admit it was perhaps ill-advised for you to intervene in the battle itself, many Thossians citizens are now expressing sympathy for the rebels.  To have them as our guests today is a great honor.\"  \n*if alliance_out > 50\n\t*if alliance_true \u003c 50\n\t\tIn a somewhat theatrical manner, he grasps your hands in his own.  \n\t*if alliance_true = 50\n\t\tIn a traditional gesture of gratitude and humility, he grasps your hands.  \n\t*if alliance_true > 50\n\t\tHe warmly clasps your hands, enthused.  \n\t\"I must congratulate you, Captain.  You have more than proven yourself.  Do you have anything to say?\"\n\t*choice\n\t\t#You could not have succeeded without the inspiration of the Alliance, and the new future it promises.\n\t\t\t\"It is a shining light for us all,\" Councilor Tayu replies.  \"But come, let us go.  The delegates are waiting for us in the main hall...\"\n\t\t\t*goto celebration\n\t\t#The real achievement will be the return of ${plan_name} to its rightful owners.\n\t\t\t\"That achievement is just around the corner, I assure you.  But come, let us go.  The delegates are waiting for us in the main hall...\"\n\t\t\t*goto celebration\n\t\t#You only did what any leader would do under the circumstances.\n\t\t\t\"No workaday leader could not have brought us where we are today.  But come, the delegates are waiting for us in the main hall...\"\n\t\t\t*goto celebration\n*if alliance_out = 50\n\tHe furrows his brow.  \"There is only one matter that confuses me.  \n\t*if rep > 54\n\t\tYou have done all you can to honor the Alliance's wishes, \n\t*if rep \u003c=54\n\t\tYou have done so much to support the Alliance's wishes, \n\tyet you told me yourself that you doubted our cause.  How do you explain your actions?\"\n\t*choice\n\t\t#You are no enemy of the Alliance, merely a neutral party.\n\t\t\tYou assure Councilor Tayu that your neutrality regarding the Alliance does not necessarily represent your opposition to its goals, merely your caution.  You promise that you will not stand in its way.\n\t\t\t\n\t\t\t*if alliance_true \u003c 50\t\t\t\t\n\t\t\t\tYour carefully-worded lie does its work.  If anything, the Councilor now seems to suspect that you are actually a supporter.\n\t\t\t\t\n\t\t\t\t*goto okay\n\t\t\t*if alliance_true > 50\n\t\t\t\tIt is difficult indeed for you to conceal your real feelings about the Alliance, but you manage to stay in character.  Still, you sense the Councilor may suspect where your true loyalties lie.\n\t\t\t\t\n\t\t\t\t*goto okay\n\t\t\t*else\n\t\t\t\t*goto okay\n\t\t\t*label okay\n\t\t\t\"I admire your honesty,\" he says, \"though I still feel confident that we will win you over in time.  Come now, the delegates await us in the main hall...\"\n\t\t\t*goto celebration\n\t\t\t\t\n\t\t#You have merely honored the rules of engagement, which speak for themselves.\n\t\t\tYou tell Councilor Tayu that the rules of engagement are not open to interpretation.  Having experienced the cruelty of the ${enemy_name}, and their utter disregard for protocol, you are in no rush to foster more chaos in the universe.\n\n\t\t\t*if alliance_true \u003c 50\n\t\t\t\tYour carefully-worded response does its work, and Councilor Tayu nods.  If anything, the Councilor now seems to suspect that you are actually an Alliance supporter.\n\t\t\t\t*goto respectful\n\t\t\t*if alliance_true > 50\n\t\t\t\tYou do what you can to conceal your enthusiasm for the Alliance as you speak the words, but you still suspect that the Councilor has some idea where your true loyalties lie.\n\t\t\t\t*goto respectful\n\t\t\t*else\n\t\t\t\t*goto respectful\n\t\t\t*label respectful\n\t\t\t\n\t\t\t\"Know that you have my respect,\" he says.  \"Come now, the delegates are waiting for us in the main hall...\"\n\t\t\t*goto celebration\n\t\t#If the Alliance is willing to help ${plan_name} in their time of need, it would be folly to oppose them.\n\t\t\tYou tell Councilor Tayu that, although the success of the Alliance remains untested, it would be a worthless gesture to undermine them.  They are working to help ${plan_name}, and this is surely an honorable cause.\n\n\t\t\t*if alliance_true \u003c 50\n\t\t\t\tYour carefully-worded response does its work, and Councilor Tayu nods.  If anything, now the Councilor seems to suspect that you are actually an Alliance supporter.\n\t\t\t\t*goto honor\n\t\t\t*if alliance_true > 50\n\t\t\t\tIt is difficult for you to conceal your real feelings about the Alliance as you say these words.  Indeed, you sense the Councilor may suspect where your true loyalties lie.\n\t\t\t\t*goto honor\n\t\t\t*else\n\t\t\t\t*goto honor\n\t\t\t*label honor\n\t\t\t\n\t\t\t\"We are honored to have your respect,\" he says.  \"And I still feel confident that our cause will win you over in time.  But come now, the delegates await us in the main hall...\"\n\t\t\t*goto celebration\n\n*if alliance_out \u003c 50\n\tHe scratches his chin.  \"But one point still confuses me, Captain,\" the Councilor continues.  \n\t*if (alliance_out \u003c 50) and (alliance_out > 15)\n\t\t\"You have told me outright that you are against the Alliance, \n\t*if (alliance_out \u003c=15)\n\t\t\"You have told me outright that you would prefer to see our own people perish before seeing us join forces with the Alliance, \n\t*if rep \u003c=54\n\t\tyet you have done much to honor our cause.  \n\t*if rep > 54\n\t\tyet you have done all you can to honor our cause.  \n\t*if envoy_speech = true\n\t\tYou have even gone so far as to allow my Envoy to address our people, knowing that he would further that cause.  \n\tHow can you explain this?\"\n\t*choice\n\t\t#You have merely acted honorably.\n\t\t\t*if alliance_out \u003c 25\n\t\t\t\t*set alliance_out 25\n\t\t\t*if envoy_speech = true\n\t\t\t\tYou tell Councilor Tayu that you merely showed the same respect to Envoy Eidon that you would expect him to return to you.  As for your conduct in battle, you explain that the rules of engagement are not open to interpretation.  \n\t\t\t*if envoy_speech = false\n\t\t\t\tYou tell Councilor Tayu that the rules of engagement are not open to interpretation.  \n\t\t\tHaving experienced the cruelty of the ${enemy_name}, with their utter disregard for protocol, you are in no rush to foster more chaos in the universe.\n\t\t\t\n\t\t\tCouncilor Tayu is moved by your words.  \"This is truth indeed,\" he says.  \"But come, the delegates are waiting in the main hall...\"\n\t\t\t*goto celebration\n\t\t#If the Alliance is willing to help ${plan_name} in their time of need, you can have no quarrel with them.\n\t\t\t*if alliance_out \u003c 25\n\t\t\t\t*set alliance_out 25\n\t\t\tYou tell Councilor Tayu that, since they are working to help ${plan_name}, the Alliance's cause is aligned with yours, and you would be foolish to oppose them.\n\n\t\t\tHe laughs.  \"You are a thoughtful leader, I see.  Perhaps that is something we have in common after all. Come, let us join the delegates in the main hall...\"\n\t\t\t*goto celebration\n\t\t#You don't need to explain yourself to him, and you won't.\n\t\t\t*if alliance_out = 25\n\t\t\t\t*set alliance_out 15\n\t\t\t\t*goto backpat\n\t\t\t*else\n\t\t\t\t*set alliance_out 10\n\t\t\t\t*goto backpat\n\t\t\t*label backpat\n\t\t\tYou will not play Councilor Tayu's political back-pat game.  You tell him that your reasons are your own concern, and none of his.  The statement seems to stop the conversation in its tracks.  \n\t\t\t*if alliance_out = 15\n\t\t\t\tYou know you have struck a serious blow to your fragile truce.\n\t\t\t\t\n\t\t\t\t*goto perhaps\n\t\t\t*else\n\t\t\t\tYou feel certain that, at long last, he understands there can be no kinship between you.\n\t\t\t\t\n\t\t\t\t*goto perhaps\n\n\t\t\t*label perhaps\t\t\t\n\t\t\t\"Then perhaps you will follow me to the main hall,\" he says sternly.  \"The delegates are waiting...\"\n\t\t\t*goto celebration\n\n*label bittersweet\n*page_break\nIn the tiny chamber where you meet with Councilor Tayu, a wide telescreen is flanked by thick red curtains.  There you see the fleet, glistening in the phantom hues of the nebula.  You see, too, the telltale signs of damage from your battle in the Makkeris system.\n\nThe Councilor steps forward \n*if alliance_true = 50\n\tand \n*if alliance_true > 50\n\tand consolingly \n*if alliance_true \u003c 50\n\tand, in an awkward move, \ntakes your hands in his. \"Alliance spies told me of your fleet's recent defeat at the hands of the ${enemy_name},\" he says.  \"It was a tragedy, but even this defeat has brought more attention to the cause of our \n*if battle3_civility \u003c 20\n\tplanet.  \n*if battle3_civility = 20\n\tplanet.  Your unfortunate confrontation with the Thossians could not change that.  \n*if battle3_civility = 30\n\tplanet.  News of the Thossian attack has only increased awareness of our plight.  \n*if battle3_civility = 40\n\tplanet.  \n*if (battle3_civility >=50) and (battle3_civility \u003c=60)\n\tplanet.  Your encounter with the Thossians has also helped.  Their system is in turmoil over the revolt that occurred in the Antares cluster, with many of their citizens expressing sympathy for the rebel scouts.  \n*if battle3_civility = 70\n\tplanet.  Your encounter with the Thossians has also helped us considerably.  Many Thossian citizens are expressing sympathy for the rebels, and I am honored that they are present here today.  \nThe Outer Systems have heard the cries of our people.\"\n\nHe releases your hands and takes a step back.  \"${enemy_name} diplomats hope to fight this, of course.  They are claiming their attack was a pre-emptive one, after we threatened them with invasion ourselves.  They have even said that the destruction on our planet was caused by a misfiring weapon we intended to use against their home world!  \n*if rep \u003c 65\n\tBut few in the Outer Systems believe these desperate lies.  \n*if rep >=65\n\tBut no one in the Outer Systems believes these desperate lies.  They merely strengthen our cause.  \nI only must ask you, why did we fail in the Makkeris system?  What happened, Captain?\"\n*choice\n\t#Take full responsibility for the defeat, and promise that it will not happen again.\n\t\tYou explain the flaws in your strategy, and you take full responsibility.  You tell the Councilor that you failed to weigh your options properly, and that you let your people down as result.  However, you tell him, you have learned from this experience, and you will return from the experience with renewed vigor.\n\t\t\n\t\tHe nods and places his hand on your shoulder.  \"I know you will,\" he says.  \"But come, let us join the delegates from the Outer Systems.  They await us in the main hall...\"\n\t\t*if alliance_out \u003c 25\n\t\t\t*set alliance_out 25\n\t\t*goto celebration\n\t#Tell the Councilor that your fleet was under-supported.\n\t\tYou explain that the fleet you have charge of is not a coordinated military unit.  The pilots and gunners have no history together, and have yet to master the skills that they will need to bring to bear in order to successfully defend your people.\n\t\t\n\t\tYou can read the disappointment in Councilor Tayu's face, as he hears your defense.  \"Perhaps the Alliance can remedy this situation,\" he says.  \"Come, let us go.  The delegates are waiting for us in the main hall...\"\n\t\t*if alliance_out >=50\n\t\t\t*set tayu_doubt true\n\t\t*goto celebration\n\t*if (battle3_civility \u003c=30) or (battle3_civility >=60)\n\t\t#Remind the Councilor of your victory against the Thossian convoy.\n\t\t\tYou ask the Councilor to consider your fleet's victory in the Antares cluster.  He laughs bitterly.  \"Captain, do you seriously seek my approval for winning a battle against a fuel convoy?  As far as I am concerned, there should have been no battle in the Antares cluster at all!  Stop defending yourself and accept responsibility for your actions.\"  He leaves the room without looking at you.\n\t\t\t\n\t\t\t\"You will now follow me to the main hall,\" he calls over his shoulder.  \"The other delegates are waiting.\"\n\t\t\t*if alliance_out >=50\n\t\t\t\t*set tayu_doubt true\n\t\t\t*goto celebration\n\t#Say it is no concern of his.\n\t\t*if alliance_out >=50\n\t\t\t*set tayu_doubt true\n\t\tYou tell the Councilor that your military strategy should not concern him.  You say that you did the best you could with the tools you had.\n\t\t\n\t\tHe seems shocked by your response.  \"Your military strategy is of course my concern!\" he snaps.  \"Would that it were of greater concern to you!  \n\t\t*if alliance_out > 50\n\t\t\tThis insolence is very unlike you, Captain!\"\n\t\t\t*goto step_away\n\t\t*if alliance_out = 50\n\t\t\tThis insolence is appalling, Captain!\"\n\t\t\t*goto step_away\n\t\t*if alliance_out \u003c=15\n\t\t\tYour continued insolence disgusts me, Captain.\"\n\t\t\t*goto step_away\n\t\t*else\n\t\t\t*if envoy_diss = true\n\t\t\t\tYour continued insolence disgusts me, Captain.\"\n\t\t\t\t*goto step_away\n\t\t\t*else\n\t\t\t\tYou have gone too far, Captain.\"\n\t\t\t\t*goto step_away\n*label step_away\t\t\n\nHe steps away from you and spends a few seconds in silence, checking his anger.  When he begins to speak again, his tone is more subdued.  \"I apologize, Captain.  I know that the matter of your defeat is a tender subject.  But these are no mere drills we are discussing.  You hold the future of our people in your hands.  And I must ask that you take responsibility for that future.\"  He leaves the room without looking at you.\n\n\"You will now follow me to the main hall,\" he calls over his shoulder.  \"The other delegates are waiting.\"\n*goto celebration\n\n*label badnews\n*page_break\nIn the tiny chamber where you meet with Councilor Tayu, there is a wide telescreen flanked by thick red curtains.  It presents a live image of the fleet, glistening in the phantom hues of the nebula.  The Councilor watches it as he begins to speak.  \n\n\"Our sources tell us that the ${enemy_name} are trying to hide from their own atrocity,\" he tells you.  \"They are claiming that their attack was a pre-emptive one, after we threatened them with invasion ourselves.  They have even said that the destruction on our planet was caused by a misfiring weapon we intended to use against their home world!  These are outrageous fabrications of course, one and all.  \n*if rep >=48\n\tNonetheless, your recent actions have given some citizens in the Outer Systems good reason to believe them.\"\n\t\n\tHe turns to face you.  \n\t*if battle2_cruelty = true\n\t\t\"You showed excessive cruelty toward the ${enemy_name}, in direct violation of the rules of engagement.  You ignored their surrender signal.  Did you not realize that the tactical databases of their vessels would survive the attack?  The ${enemy_name} have used this information against us, \n\t\t*if battle3_civility >=70\n\t\t\tmaking it a challenge indeed for us to garner Alliance support from the Outer Systems.  Even the Thossian Republic refuses to admit that their rebels joined our cause willingly.\"\n\t\t*if (battle3_civility >=50) and (battle3_civility \u003c=60)\n\t\t\tmaking it a challenge indeed for us to garner Alliance support from the Outer Systems.  The Thossian Republic has even gone so far as to execute the rebels who attempted to defend you in the Antares cluster.\"\n\t\t*if battle3_civility \u003c 50\n\t\t\tmaking it a challenge for us to garner Alliance support from the Outer Systems.\"\n\n\t*if battle3_civility = 10\n\t\t\"Your unannounced attacks on the Thossians were in direct violation of the rules of engagement.  Copies of their electronic records have been shared with the intergalactic community, the ${enemy_name} have seen to that.  It has made it challenging indeed to garner Alliance support in the Outer Systems.\"  \n\t\t\t\t\t\n*if rep \u003c 48\n\tNonetheless, your actions have helped convince many citizens in the Outer Systems that the ${enemy_name} speak the truth.\"\n\t\n\tHe turns to you.  \"Did you not realize that the ${enemy_name} tactical databases would survive the destruction of their ships?  \n\t*if battle3_civility = 10\n\t\tOr that the Thossians would share the record of your unlawful attack on them with the intergalactic community?  \n\t*if battle3_civility = 20\n\t\tOr that the Thossians would share the record of your attack on them with the intergalactic community?  \n\tOur enemies hope to convince the Outer Systems that we are dangerous renegades.  Your choices have given them good reason to believe that claim.  Support for the Alliance has suffered dearly at your hands.\"\n\t\n\tHe looks back at the monitor.  \n\t*if alliance_out > 50\n\t\t*set tayu_doubt true\n\t\t*if battle2_victory = false\n\t\t\t\"We have, of course, learned the details of your defeat.  Alliance spies intercepted a transmission from the ${enemy_name}, gloating over their victory in the Makkeris system.  Perhaps you have allowed this failure to cloud your vision...\"\n\t\t*if battle2_victory = true\n\t\t\t\"You say that you support our cause, but your choices demonstrate otherwise.\"\n\t*if alliance_out = 50\n\t\t*set tayu_doubt true\n\t\t*if battle2_victory = false\n\t\t\t\"We have, of course, learned the details of your defeat.  Alliance spies intercepted a transmission from the ${enemy_name}, gloating over their victory in the Makkeris system.  Perhaps you have allowed this failure to cloud your vision...\"\n\t\t*if battle2_victory = true\n\t\t\t\"You say that you remain neutral in the matter of our cause, but your choices demonstrate otherwise.\"\n\t*if alliance_out \u003c 50\n\t\t\"I suppose I should not be surprised by the choices you have made, given your position.\"\n\n*choice\n\t#Apologize for your actions.\n\t\tYou do your best to abase yourself before the Councilor, throwing yourself upon the mercy of the Alliance.  \n\t\t*if alliance_out \u003c 50\n\t\t\t*if (envoy_brig = true) and (envoy_speech = false)\n\t\t\t\tHe merely laughs at your words, unconvinced and visibly insulted.\n\t\t\t\t*goto if_you_truly\n\t\t\t*elseif (envoy_brig = true) or (envoy_speech = false)\n\t\t\t\tHe merely laughs at your words, unconvinced and visibly insulted.\t\n\t\t\t\t*goto if_you_truly\n\t\t\t*else\n\t\t\t\tHe seems moved by your pleas.  He places a hand firmly on your shoulder.\n\t\t\t\t*if alliance_out \u003c 25\n\t\t\t\t\t*set alliance_out 25\n\t\t\t\t*goto if_you_truly  \n\t\t*elseif alliance_out = 50\n\t\t\tHe merely shakes his head.  \n\t\t\t*goto if_you_truly\n\t\t*else\n\t\t\tHe seems moved by your pleas.  He places a hand firmly on your shoulder.  \n\t\t\t*goto if_you_truly\n\t\t*label if_you_truly\n\t\t\"If you truly are sorry for what you've done,\" he says, \"then you must tell me how you plan to remedy the situation.  Can you or can you not be trusted to represent our cause in your future encounters?\"\n\t\t*goto pledge_choice\n\t#Defend your actions as being a matter of survival.\n\t\tYou do your best to put your actions in the proper context, telling the Councilor that the rules of engagement simply do not apply to a group in such a delicate position as yours.  You make the point that your goal has always been, and will always be, the survival of your people.\n\t\t\n\t\t*if alliance_out \u003c 50\n\t\t\t\"Must our survival depend on dishonor and destruction, Captain?  Your attitude is uncomfortably similar to that of our enemy, and if the Alliance is to put its faith in you as a leader, that must change.  Can you or can you not be trusted to represent our cause in your future encounters?\"\n\t\t\t*goto pledge_choice\n\t\t*if alliance_out = 50\n\t\t\t\"Then you have clearly allowed your fear to dictate your actions,\" the Councilor replies.  He clasps your arm firmly.  \"Captain, until now I have respected you as a leader who can choose between right and wrong, unhindered by passion.  But will you be able to call on that clarity in the future, to represent our cause?\"\n\t\t\t*goto pledge_choice\n\t\t*else\n\t\t\tHe seems moved by your argument.  He places a hand firmly on your shoulder.  \"I understand.  Rest assured that our cause is just, Captain.  But so too must our actions be, in this dangerous time.  Can you be trusted to master your passion for justice, and represent our Alliance in the future?\"\n\t\t\t*goto pledge_choice\n\t*if alliance_out > 50\n\t\t#Request that you be removed as Fleet Captain.\n\t\t\t\"That is cowardice talking,\" Councilor Tayu replies bluntly.  \"You must simply make better decisions, and preserve the goals of the Alliance.  Something that Admiral Kalla would have counted on you to do, I might add.  And so I ask, can you be trusted to represent our cause in your future encounters?\"\n\t\t\t*goto pledge_choice\n\t*if alliance_out \u003c=50\n\t\t#Tell the Councilor that you are actually quite proud of your actions.\n\t\t\tFor a second, Councilor Tayu's face twists into a mask of pure hatred.  Even when his diplomatic demeanor has returned, the anger continues burning in his eyes.  \"And what can my associates and I expect from such a leader?\"\n\t\t\t*choice\n\t\t\t\t#Tell the Councilor that you will continue to do whatever is necessary to ensure the survival of your people, without regard for his political goals.\n\t\t\t\t\t*if alliance_out \u003c 25\n\t\t\t\t\t\t*set alliance_out 10\n\t\t\t\t\t\tA chill seems to settle over the room, and the Councilor leaves in silence.  You feel certain that, at long last, he understands there can be no kinship between you.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Follow me to the main hall,\" comes his voice from beyond the chamber.  \"The delegates are waiting...\"\n\t\t\t\t\t\t*goto celebration\n\t\t\t\t\t*if alliance_out = 25\n\t\t\t\t\t\t*set alliance_out 15\n\t\t\t\t\t\tA chill seems to settle over the room, and the Councilor leaves in silence.  You have struck a blow to your fragile truce.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Follow me to the main hall,\" comes his voice from beyond the chamber.  \"The delegates are waiting...\"\n\t\t\t\t\t\t*goto celebration\n\t\t\t\t\t*else\n\t\t\t\t\t\t*set alliance_out 15\n\t\t\t\t\t\t\"At least we see your true colors at last,\" the Councilor says.  He turns his back to you and leaves the chamber, calling over his shoulder, \"The delegates await us in the main hall...\"\n\t\t\t\t\t\t*goto celebration\n\t\t\t\t#Tell the Councilor that you will strike down all the fleet's enemies, for the honor of ${plan_name}.\n\t\t\t\t\t*label chilly\n\t\t\t\t\t*if alliance_out \u003c 25\n\t\t\t\t\t\t*set alliance_out 10\n\t\t\t\t\t\tA chill seems to settle over the room, and the Councilor leaves in silence.  You feel certain that, at long last, he understands there can be no kinship between you.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Follow me to the main hall,\" comes his voice from beyond the chamber.  \"The delegates are waiting...\"\n\t\t\t\t\t\t*goto celebration\n\t\t\t\t\t*if alliance_out = 25\n\t\t\t\t\t\t*set alliance_out 15\n\t\t\t\t\t\tA chill seems to settle over the room, and the Councilor leaves in silence.  You have struck a blow to your fragile truce.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Follow me to the main hall,\" comes his voice from beyond the chamber.  \"The delegates are waiting...\"\n\t\t\t\t\t\t*goto celebration\n\n\t\t\t\t\t*else\n\t\t\t\t\t\t*set alliance_out 15\n\t\t\t\t\t\t\"At least we see your true colors at last,\" the Councilor says.  He turns his back to you and leaves the chamber, calling over his shoulder, \"The delegates await us in the main hall...\"\n\t\t\t\t\t\t*goto celebration\n\n*label pledge_choice\n*choice\n\t#\"Of course I can.\"\n\t\t\t\"Good,\" he replies, somewhat doubtfully.  \"Now let us go to the main hall.  The other delegates are waiting...\"\n\t\t\t*goto celebration\n\t#\"I can only achieve what is possible.\"\n\t\t\t\"It will take more than that, Captain.  Much more.\"  He turns his back to you and leaves the chamber, calling over his shoulder, \"The delegates await us in the main hall...\"\n\t\t\t*goto celebration\n\t*if alliance_out = 50\n\t\t#\"Not if the fulfillment of that trust infringes upon the safety of our people.\"\n\t\t\t*goto chilly\n\t*if alliance_out \u003c 50\n\t\t#\"Your cause is not my cause, Councilor.  I will do as my sense of justice dictates.\"\n\t\t\t*goto chilly\n\n*label celebration\n*page_break\nThe main chamber of the Calpurnian flagship \n*if alliance_true \u003c 50\n\tis an anachronistic replica of an imperial hall, \n*if alliance_true = 50\n\tis an estimable replica of an imperial hall, \n*if alliance_true > 50\n\tis an inspiring replica of an ancient hall, \ncomplete with veined columns, polished tritium statues, and microlume candelabras.  \n*if alliance_true \u003c 50\n\tIt is calculated to impress, but to you it smacks of dusty old empires.  \n*if alliance_true = 50\n\tYou decide that some of the structures must be holographic, but you find it impossible to tell the reality from the illusion.  \n*if alliance_true > 50\n\tIt is a miracle of craftsmanship and design.  \n\n\nHovering above the longest table, \n*if rep \u003c 50\n\twhere the scant few delegates await you, \n*if (rep >=50) and (rep \u003c 65)\n\twhere the delegates await you, \n*if (rep >=65)\n\twhere dozens of delegates await you, \nis a shining three-dimensional image of ${plan_name}, rotating in midair.  The image is repeated on flags that you see hanging from the rafters.  \n*if alliance_true \u003c 50\n\tYou suddenly realize that the Alliance has had the audacity to choose this as their symbol.  Floating there above the table, you cannot help but think that it looks suspiciously like the main course at a banquet.\n\t\n\t\n*if alliance_true = 50\n\tYou suddenly understand that the Alliance has chosen this as their symbol. \n\t\n\t \n*if alliance_true > 50\n\tYou suddenly understand that the Alliance has chosen this as the symbol of their cause.  You find yourself momentarily overcome.  \n\t\n\t\nAs you approach the table, you can see that a seat has been left available for you on one side.  On the side opposite, among the delegates, you see Councilor Tayu, \n*if rep \u003c 50\n\t*if alliance_out \u003c=15\n\t\twatching you as closely as he would watch a poisonous insect.  \n\t*if (alliance_out > 15) and (alliance_out \u003c 50)\n\t\twatching you like a ${plan_name} schoolmaster on high alert.  \n\t*if alliance_out = 50\n\t\twatching you with great interest.  \n\t*if alliance_out > 50\n\t\twatching you like a concerned father.  \n*if rep >=50\n\t*if alliance_out \u003c 25\n\t\twatching you as closely as he would watch a poisonous insect.  \n\t*if tayu_doubt = true\n\t\twatching you with great interest, and some degree of concern.  \n\t\t*goto after_tayu\n\t*if (alliance_out >=25) and (alliance_out \u003c=50)\n\t\twatching you eagerly.  \n\t*if alliance_out > 50\n\t\twatching you with pride.  \n*label after_tayu\nFurther down sits Lieutenant Demian, awaiting your next move.  \n*if battle3_civility = 70\n\t\n\tBut there is someone drawing your attention from them.  A creature with a head like a fleshy tube of silver.  Turquoise eyes stare from either side of the shape as it looks in your direction.  Several seconds pass before you realize this is the Captain of the Thossian scout ship, come to the diplomat's table.\n*page_break\n*if alliance_true > 50\n\tOne of the Calpurnian chamberlains politely \n*if alliance_true = 50\n\tOne of the Calpurnian chamberlains \n*if alliance_true \u003c 50\n\tSome unfortunate Calpurnian serf \nprovides you with a translation earpiece.  The familiar clicking fills your ear, as the device works to translate the muttering around you into the language of your home planet.\n\nThe Calpurnian Ambassador stands to address you.  \n*if alliance_true > 50\n\tShe wears grand attire, and her face bears the ornate tattoos that befit her diplomatic station.  \n*if alliance_true = 50\n\tShe wears the traditional attire of Calpurnian royalty, and her face bears decorative tattoos to identify her rank.  \n*if alliance_true \u003c 50\n\tShe wears a decadent robe weighed down with precious stones, and her face is a maze of ceremonial tattoos.  \n*if (rep >=50) and (battle2_victory = true)\n\t\"Captain,\" she says, \"before we begin our celebration, I wish to formally recognize your achievements as a warrior and leader.  \n*if (rep >=50) and (battle2_victory = false)\n\t\"Captain,\" she says, \"before we begin our meeting, I wish to formally recognize your bravery as a warrior.  May the blessing of victory be yours.  \n*if (rep \u003c 50)\n\t*if alliance_out \u003c=50\n\t\t\"Captain,\" she says, \"the Alliance extends its welcome to a brave warrior whose trust we have yet to earn.  It is our hope that you will come to recognize us as the humble servants of your people.  \n\t*if alliance_out > 50\n\t\t\"Captain,\" she says, \"the Alliance extends the hand of welcome to a brave warrior, whose presence here today honors us all.  \nI am Ambassador Bashena.  On behalf of the Alliance and the Calpurnian people, I welcome you to this table.\"\n\n*if alliance_true > 50\n\tShe delivers a graceful bow in the Calpurnian manner, resting both of her hands on the table and gently touching her forehead to it.  You sense that this is a sign of great respect.  \n*if alliance_true = 50\n\tShe executes a bow in the Calpurnian manner, placing both her hands on the surface of the table, and lowering her forehead until it rests between them.  You sense this is a sign of great respect.  \n*if alliance_true \u003c 50\n\tShe bows in the bombastic manner of the Calpurnians, making a great show of placing her hands on the table and swinging her head down to rest between them.  \nWhen she completes the gesture she does not take her seat.  Clearly your response is expected.\n*choice\n\t#Return her bow, in the Calpurnian manner.\n\t\t*set political_mana %+10\n\t\t*goto cal_bow\n\t\t\n\t#Respond by crossing your chest with your arm, its hand in a fist, a traditional sign of respect in the ${plan_name} military.\n\t\t*set political_mana %+5\n\t\t*goto home_bow\n\n\t#Do nothing and take your seat.\n\t\t\t*set political_mana %-10\n\t\t\t*set mil_trust %+5\n\t\t\t*goto no_bow\n\n*label cal_bow\nThere is a respectful silence from the delegates as you replicate her gesture.  \n*if alliance_out >=50\n\tCouncilor Tayu beams with pride,   \n*if (alliance_out \u003c 50) and (alliance_out >=25)\n\tCouncilor Tayu nods cautiously, \n*if alliance_out \u003c 25\n\tAn unconvinced Councilor Tayu averts his eyes, \n*if mil_trust \u003c 41\n\t*set mil_trust %-5\n\twhile Lieutenant Demian squirms visibly.  \n*if mil_trust >=41\n\t*if demian_out \u003c=25\n\t\t*if goodguy = true\n\t\t\twhile you and Lieutenant Demian exchange a knowing smile.  \n\t\t\t*if alliance_true \u003c 50\n\t\t\t\tShe knows it is all part of the act.  \n\t\t\t*if alliance_true = 50\n\t\t\t\tShe assumes it is all part of the act.  \n\t\t\t*if alliance_true >=75\n\t\t\t\tShe thinks it is all part of an act.  \n\t\t*if goodguy = false\n\t\t\twhile Lieutenant Demian seems visibly confused by your choice.  \n\t\t\t*set mil_trust %-5\n\t*if demian_out > 25\n\t\twhile Lieutenant Demian squirms visibly.  \n\t\t*set mil_trust %-5\nYou and the Calpurnian Ambassador take your seats, and the meeting begins.  \n*goto after_bow\n\n*label home_bow\nThere is momentary surprise at the table over your response, but its meaning is understood.  \n*if alliance_out \u003c 25\n\tCouncilor Tayu, on the other hand, averts his eyes, taking visible offense to your prideful gesture.  \n\nYou and the Calpurnian Ambassador take your seats, and the meeting begins.\n*goto after_bow\n\n*label no_bow\nYou need no earpiece to translate the shocked silence that follows when you take your seat.  \n*if alliance_true > 50\n\tIt would seem that you have managed to insult the entire Alliance.  \n*if alliance_true \u003c=50\n\tYou have sent a message to the Alliance that could not be clearer.  \n*if alliance_out >=50\n\tCouncilor Tayu seems genuinely horrified, \n*if (alliance_out >=25) and (alliance_out \u003c 50)\n\tCouncilor Tayu shakes his head in disapproval,   \n*if alliance_out \u003c 25\n\tCouncilor Tayu averts his eyes, \n*if demian_out \u003c=25\n\t*if goodguy = true\n\t\t\twhereas Lieutenant Demian is visibly confused by your choice.\n\t*if goodguy = false\n\t\t\twhereas Lieutenant Demian smiles to herself.\n*if demian_out > 25\n\t\t\twhereas Lieutenant Demian is visibly confused by your choice.\n\n*if alliance_out \u003c=50\n\tThe Calpurnian Ambassador takes your disrespectful gesture in stride, and sits back down.  \n\t*if alliance_out \u003c 25\n\t\tPerhaps she has been warned about you.\n*if alliance_out > 50\n\tThe Calpurnian Ambassador is taken entirely by surprise.  It is some time before she takes her seat, and the meeting can at last begin.  \n\n*label after_bow\n\nAmbassador Bashena explains that she believes the brutal occupation of ${plan_name} was only the first step of an intergalactic conquest.  \"It is true that we have no formal proof,\" the Ambassador admits.  \"But consider that ${plan_name} is unusually rich in resources, a veritable nexus of spacefaring trade.  This makes it a natural target for any system looking to expand aggressively, and that is why we believe the ${enemy_name} attacked you with such force.\"\n\nThe Ambassador informs you that the Alliance's hope is to develop a force to challenge the blockade that the ${enemy_name} are forming around ${plan_name}, and win your planet back.  \"But you have heard enough from us for now.  This is your first meeting with the Alliance.  Surely you have some questions for us...\"\n*label questions\n*choice\n\t*hide_reuse #Which system leads the Alliance?\n\t\t*set questions_asked +1\n\t\t*set second_round true\n\t\t*goto who_will_lead\n\t*hide_reuse #What are the Alliance's own plans for the resources of ${plan_name}?\n\t\t*set questions_asked +1\n\t\t*set second_round true\n\t\t*goto resources\n\t*hide_reuse #How will the Alliance overcome the existing conflicts between its member systems?\n\t\t*set questions_asked +1\n\t\t*set second_round true\n\t\t*goto conflict\n\t*if second_round = true\n\t\t#I have no more questions.\n\t\t\t*goto grand_tour\n\n*label who_will_lead\n*if (alliance_out \u003c 50) and (first_offense = false)\n\t*gosub disrespectful\n\"It was decided that Calpurnia would lead the cause,\" she explains.  \"We have pledged the most military power for this purpose, and will remain the organizing system.\"\n*choice\n\t#Say that you are honored to fight alongside them, as you are honored to fight alongside all the other systems of the Alliance.\n\t\t*set political_mana %+10\n\t\t*if (demian_out \u003c=25) and (mil_trust >=41)\n\t\t\t*if goodguy = true\n\t\t\t\t*goto safesay\n\t\t*set mil_trust %-7\n\t\t*label safesay\n\t\t*if alliance_out \u003c 50\n\t\t\tThe Ambassador appears somewhat befuddled by your response.  \"I am most flattered to hear such words from you, Captain.  \n\t\t\t*goto now_if\n\t\t*else\n\t\t\tThe Ambassador smiles to hear your response.  \"It is our pleasure, indeed our duty, to serve your cause.  \n\t\t\t*goto now_if\n\n\t#Ask why a representative of ${plan_name} was not chosen to lead instead.\n\t\t*if alliance_out > 50\n\t\t\tCouncilor Tayu gasps, and the Ambassador seems flustered.  This is not a question either of them expected you to ask.  \n\t\t\"For the simple reason that the majority of our military leaders are from Calpurnia,\" she offers.  \"At the current time, the Alliance is a military enterprise, not a political entity.  Surely you can appreciate that it makes strategic sense to have the system with the most representation leading the charge?\"\n\t\t*choice\n\t\t\t*if alliance_out \u003c=50\n\t\t\t\t#Say that this decision only makes strategic sense for Calpurnia.\n\t\t\t\t\t*set mil_trust %+10\n\t\t\t\t\t*set political_mana %-10\n\t\t\t\t\tThe translation unit buzzes as the delegates mutter to each other, scandalized by your words.  \n\t\t\t\t\t*if questions_asked >=3\n\t\t\t\t\t\t\tWhen the confusion dies down the Ambassador says, \"If you don't mind, let us move on to another matter entirely.  We have heard much about your people, and we are sure they have heard much about us.  Today, it appears that we will have the rare opportunity to meet each other...\"\n\t\t\t\t\t\t\t*goto grand_tour\n\t\t\t\t\t*else\n\t\t\t\t\t\t\tWhen the confusion dies down the Ambassador asks cautiously, \"Do you have any other questions?\"\n\t\t\t\t\t\t\t*if political_mana \u003c 40\n\t\t\t\t\t\t\t\t*goto end_of_that\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto questions\n\n\t\t\t#Say that you appreciate her reasoning, and assure her you meant no offense.\n\t\t\t\t\"I'm sure that the other delegates understand.  \n\t\t\t\t*if (demian_out \u003c=25) and (mil_trust >=41)\n\t\t\t\t\t*if goodguy = true\n\t\t\t\t\t\t*goto safesay2\n\t\t\t\t*set mil_trust %-10\n\t\t\t\t*label safesay2\n\t\t\t\t*set political_mana %-5\n\t\t\t\t*goto now_if\n\n\t\t\t#Drop the subject.\n\t\t\t\t*set political_mana %-10\n\t\t\t\t*set mil_trust %+5  \n\t\t\t\t*goto drop_it\n\n\t#Drop the subject.\n\t\t*goto drop_it\n\n*label resources\nSeveral delegates shift uncomfortably.  Presumably, they think you have implied a connection between their support for your people, and an interest in obtaining control of ${plan_name}'s resources.  \n*if (alliance_out \u003c 50) and (first_offense = false)\n\t*gosub disrespectful\n\"It is true that our cause will have great need of resources, once we have helped you reclaim ${plan_name},\" the Ambassador concedes.  \"But it is our intent to resume trade at that time, not merely commandeer your wealth.  We are not thieves, Captain.\"\n*choice\n\n\t*if alliance_out \u003c=50\n\t\t#Say that only time will tell whether her assertion is true.\n\t\t\t*set mil_trust %+7\n\t\t\t*set political_mana %-10\n\t\t\t\"You will find that time will prove our cause both victorious and just, Captain.   \n\t\t\t*goto now_if\n\n\t#Apologize and assure the Ambassador you meant no offense.\n\t\t*set political_mana %-7\n\t\t*if (demian_out \u003c=25) and (mil_trust >=41)\n\t\t\t*if goodguy = true\n\t\t\t\t*goto safesay3\n\t\t*set mil_trust %-5\n\t\t*label safesay3\n\t\tYou do your best to backpedal out of your inquiry, having clearly struck a nerve.  \"No offense was taken,\" the Ambassador assures you, but you are not certain that is true.  \n\t\t*if questions_asked >=3\n\t\t\t\"Now, if you don't mind, let us move on to another matter.  We have heard much about your people, and we are sure they have heard much about us.  Today, it appears that we will have the rare opportunity to meet each other...\"\n\t\t\t*goto grand_tour\n\t\t*else\n\t\t\t\"Now, have you any further questions for us?\"\n\t\t\t*if political_mana \u003c 40\n\t\t\t\t*goto end_of_that\n\t\t\t*else\n\t\t\t\t*goto questions\n\n\t*if alliance_out >=50\n\t\t#Say that the Ambassador misunderstands your question.  You only wanted to suggest that some of ${plan_name}'s resources be apportioned for the Alliance's continued use, in the event of their victory.\n\t\t\t*set political_mana %+15\n\t\t\t*if (demian_out \u003c=25) and (mil_trust >=41)\n\t\t\t\t*if goodguy = true\n\t\t\t\t\t*goto safesay4\n\t\t\t*set mil_trust %-10\n\t\t\t*label safesay4\n\t\t\tThe Ambassador seems taken aback by your response, and the other delegates mutter excitedly.  \"That is a generous suggestion,\" she replies finally, \"But it is one we would need to discuss with your Council when the time comes.  \n\t\t\t*goto now_if\n\n\t#Drop the subject.\n\t\t*set mil_trust %+7\n\t\t*set political_mana %-7\n\t\t*goto drop_it\n\n*label conflict\n*if (alliance_out \u003c 50) and (first_offense = false)\n\t*gosub disrespectful\n\"It is true that there is much as yet unresolved between our systems.  But all of the members of the Alliance have signed a wartime treaty to leave off our various disputes, in the interest of our cause.  We must be united if we are to win the war against the ${enemy_name}.\"\n*choice\n\t#Ask how successful their efforts to unite have been thus far.\n\t\t*if alliance_out > 50\n\t\t\tCouncilor Tayu looks alarmed.  He seems to think this is a dangerous line of questioning.\n\t\t\t\n\t\t\"There have been no outright conflicts.  We have experienced setbacks, however.  For instance, there are strategic jump points in the Drishan Expanse that have been under dispute between my system and the Tzir for generations now.  Even now, neither side has permitted the other to access the quadrants that they occupy within the Expanse, even for purposes of munitions transport.  But I am confident we will overcome these difficulties.\"\n\t\t*choice\n\t\t\t*if alliance_out \u003c=50\n\t\t\t\t#State that you are far less optimistic.\n\t\t\t\t\t*set political_mana %-10\n\t\t\t\t\t*set mil_trust %+10\n\t\t\t\t\tYou express your lack of faith in the Alliance's ability to unite behind your cause.  The Ambassador responds coolly.\n\t\t\t\t\t\n\t\t\t\t\t*if rep \u003c 50\n\t\t\t\t\t\t\"Perhaps the lack of faith displayed by your own military has undermined our efforts.  \n\t\t\t\t\t\t*goto now_if\n\t\t\t\t\t*else\n\t\t\t\t\t\t\"Conflict comes all too easily in times of doubt, Captain.  We must fight the urge to descend into chaos, and so must you.  \n\t\t\t\t\t\t*goto now_if\n\t\t\t\t\t\t\n\t\t\t*if alliance_out >=50\n\t\t\t\t#On behalf of ${plan_name}, ask that the Alliance members look past their differences to unite behind your cause.\n\t\t\t\t\t*set political_mana %+15\n\t\t\t\t\t*if (demian_out \u003c=25) and (mil_trust >=41)\n\t\t\t\t\t\t*if goodguy = true\n\t\t\t\t\t\t\t*goto safesay22\n\t\t\t\t\t*set mil_trust %-10\n\t\t\t\t\t*label safesay22\n\t\t\t\t\tYou make an urgent plea to the consciences of all Alliance members.  You ask them to remember the suffering that your people are enduring under the ${enemy_name}.  You say that you hope they will allow each other to move freely through any occupied territories, showing that universe will not allow itself to be divided.\n\t\t\t\t\t\n\t\t\t\t\t\"We have heard these words spoken many times,\" the Ambassador says, \"but they mean a great deal more coming from you.  Thank you for your candor, Captain.  It is my hope that we will all learn a lesson from it.  \n\t\t\t\t\t*goto now_if\n\t\t\t#Wish the Ambassador good fortune in her endeavor.\n\t\t\t\t*if alliance_out \u003c 50\n\t\t\t\t\t\"Good fortune?\"  The Ambassador seems to have taken your statement as an insult.  \"As I am sure you well appreciate Captain, no endeavor this serious can depend on the whims of fortune.  \n\t\t\t\t\t*set political_mana %-10\n\t\t\t\t\t*set mil_trust %+10\n\t\t\t\t*if alliance_out >=50\n\t\t\t\t\t\"It is our good fortune indeed to have a just cause to unite behind.  \n\t\t\t\t\t*if (demian_out \u003c=25) and (mil_trust >=41)\n\t\t\t\t\t\t*if goodguy = true\n\t\t\t\t\t\t\t*goto safesay14\n\t\t\t\t\t*set mil_trust %-7\n\t\t\t\t\t*label safesay14\n\t\t\t\t\t*set political_mana %+10\n\t\t\t\t*goto now_if\n\n\t\t\t#Drop the subject.\n\t\t\t\t*set mil_trust %+7\n\t\t\t\t*set political_mana %-7\n\t\t\t\t*goto drop_it\n\n\t*if alliance_out >=50\n\t\t#Tell the Ambassador that you are honored the Alliance members are willing to overlook their individual conflicts in coming to your aid.\n\t\t\t*set political_mana %+10\n\t\t\t*if (demian_out \u003c=25) and (mil_trust >=41)\n\t\t\t\t*if goodguy = true\n\t\t\t\t\t*goto safesay5\n\t\t\t*set mil_trust %-5\n\t\t\t*label safesay5\n\t\t\t\"The brutal attack on ${plan_name} was felt by every one of us, Captain.  \n\t\t\t*goto now_if\n\t\t\t\n\t#Ask whether the Alliance has given any thought to what will happen to their treaties after
