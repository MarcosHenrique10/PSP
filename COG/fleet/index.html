e brig.  \nFrom the growing brightness of the lights in your cell, and the increase in air quality, you \n*if standard_deduction = 5\n\tcan tell that the civilians are running the life support systems harder on the few remaining vessels.  \n*if standard_deduction !=5\n\tcan tell that the civilians are loosening the energy restrictions.\n\nDays later, the Kelos suddenly shudders around you, and you hear the sounds of explosions and conflict elsewhere in the vessel.  Through the steel door, you can faintly hear your guard depart his post in a hurry.  Two hours later, you hear something slowly making its way down the hallway to your cell.\n\n*if rakashi = false\n\tWhen the door slides open, you expect to see the shambling form of a Grix.  Instead, a soldier with wild, feline features stands before you, wearing the battle armor of the Rakashi.\n\t\n\tThe creature growls into a microphone hidden in its helmet, and the translation emerges from hidden speakers: \"Follow me, Fleet Captain.\"\n\t\n*if rakashi = true\n\tWhen the door slides open, you expect to see the shambling form of a Grix.  Instead, a skeleton-thin Tzir soldier stands before you, in a full atmosphere suit.  Its eyes beam white light through its goggles.\n\t\n\tThe creature makes a whispering noise into its mouthpiece, and a translation emerges from hidden speakers: \"If you would be so kind as to follow me, Fleet Captain.\"\n\t\n*set striker_skill saved_striker_skill\n*set striker_coverage saved_striker_coverage\n*set can_skill saved_can_skill\n*set can_coverage saved_can_coverage\n*set civ_trust saved_civ_trust\n*set civ_trust %-(skeletons*10)\n*if skeletons \u003c 2\n\t*set civ_trust %+20\nIt appears that you are free of the Null Zone, though you will never forget what happened here.  And neither will your people.\n*finish\n\n\n*label rescue\n*set civ_trust saved_civ_trust\n*set civ_trust %-(skeletons*10)\n*if skeletons \u003c 2\n\t*set civ_trust %+20\nDays later, a squadron of ships approaches from the mists of the Null Zone.  Your weakened instruments cannot register details at first, and you assume these new arrivals are more Grix.  But as they grow closer, they come clear in the holographic field.\n\nRakashi battle cruisers.  Tzir glideships.  The Alliance has come.\n\n*if skeletons > 0\n\tIt appears that you are free of the Null Zone, though you will never forget what happened here.  And neither will your people.\n*set striker_skill saved_striker_skill\n*set striker_coverage saved_striker_coverage\n*set can_skill saved_can_skill\n*set can_coverage saved_can_coverage\n*finish\n\n*label talk_about_failure\n*if grixtory > 50\n\tUnfortunately, this maneuver against the juggernauts is not nearly as successful as your last one.  \n*if grixtory = 50\n\tUnfortunately, this maneuver against the juggernauts is not even slightly successful.  \n*if grixtory \u003c 50\n\tUnfortunately, like your last maneuver against the juggernauts, this one is a failure.  \n*return", "turning_of_the_tide": "*temp trouble_in_store\n*temp poor_guy\n\n*set trouble_in_store false\n*set poor_guy false\n\n*temp sabotage\n*temp comlink\n*temp hostage\n\n*set sabotage false\n*set comlink false\n*set hostage false\n\n\n\n*temp expo_name\n*temp expo_title\n*temp expo_nym\n*temp expo_its\n*temp expo_self\n*temp expo_your_our\n*set expo_name \"Ralfaz\"\n*set expo_title \"Rister\"\n*set expo_nym \"it\"\n*set expo_its \"its\"\n*set expo_your_our \"dur\"\n*set expo_self \"itself\"\n\n*if alliance_out \u003c 25\n\t*set expo_nym \"she\"\n\t*set expo_title \"Ambassador\"\n\t*set expo_name \"Bashena\"\n\t*set expo_its \"her\"\n\t*set expo_your_our \"your\"\n\t*set expo_self \"herself\"\n*if alliance_out >=25\n\t*set expo_nym \"he\"\n\t*set expo_title \"Councilor\"\n\t*set expo_name \"Tayu\"\n\t*set expo_its \"his\"\n\t*set expo_your_our \"our\"\n\t*set expo_self \"himself\"\n\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]The Fleet[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n*if scenario = 1\n\t*goto scenario_one\n*if scenario = 2\n\t*goto scenario_two\n*if scenario = 3\n\t*goto scenario_three\n*if scenario = 4\n\t*goto scenario_four\n*if scenario = 5\n\t*goto scenario_five\n*if scenario = 6\n\t*goto scenario_six\n*if scenario = 7\n\t*goto scenario_seven\n*if scenario = 8\n\t*goto scenario_eight\n*if scenario = 9\n\t*goto scenario_nine\n\n\n\n*label scenario_one\n*set scenario 1\n*comment A Pro-Alliance Scenario\n*comment You trick her into getting onto the gunships!\n*comment The results are devastating for the rebels.\n*comment This scenario is NOT for rebels\n*gosub start_of_rebellion_trust\n*gosub gloat_thru_boarding\nOn the crude ${enemy_name} tactical grid, you can see the other gunships moving into place, ready to open fire.\n\nJust then, an urgent call comes over the Lieutenant's comlink.  \"Something's wrong!  The ship is...\"  Before the soldier can finish, one of the gunships on the tactical grid disappears.\n\n\"What's happening?\" the Lieutenant asks, her face frozen in terror.  Another gunship disappears from the grid.  Then another, then another.\n\nAnd then yours is dragged into hyperspace.\n*page_break\nOnce in hyperspace, you see a Rakashi battle squadron waiting on the tactical screen.  So this was the Alliance's trap: to pluck the vessels from normal space, where they would be cut off from their power source.\n\nLieutenant Demian notices your distinct lack of surprise.  \"You knew!\" she spits, the betrayal coursing through her veins.  \"You led us into this!\"  She orders the other soldiers to seize you, and you are fitted with tritium shackles.\n\nYou watch, immobilized, as Lieutenant Demian's rebels attempt to stave off the Alliance, but the ship has been cut off.  It can barely muster the energy to fire, and you know that the other gunships are in a similar predicament.\n\nWhen her defeat appears inevitable, she looks at you meaningfully.  You...\n*fake_choice\n\t*if alliance_out > 50\n\t\t#...tell her that the impurity of her cause has assured her defeat.\n\t\t\tYou tell her that the corruptness of her plan doomed it to fail.  She spits in your face.\n\t*if alliance_out \u003c=50\n\t\t#...tell the Lieutenant that the dishonor of her plan virtually assured its defeat.\n\t\t\tYou tell her that the corruptness of her plan doomed it to fail.  She spits in your face.\n\t#...tell her that you are sorry that it has come to this.\n\t\tYou tell the Lieutenant that fate placed you on opposite sides of this bitter struggle.\n\t\t\n\t\t\"I am sorry too, for having trusted you.\"\n\t#...look away.\n\t\tYou cannot bear to look in the face of the brave friend you betrayed today.\n*page_break\n*label scenario_one_expo\n*if poor_guy = true\n\tSome weeks later you and Officer Kelmer, looking somewhat worse for wear, are honored by the Alliance in a public ceremony at the city of ${plan_name}.  Together, you take a long look at the city below.  \n*if chest_shot = true\n\tSome weeks later you are honored by the Alliance in a public ceremony at the capital of ${plan_name}.  You are barely able to stand after the injury you sustained during the rebellion, but when you do, you take a long look at the city below.  \n*if (poor_guy = false) and (chest_shot = false)\n\tSome weeks later, you are honored by the Alliance in a public ceremony, held at the capital of ${plan_name}.  You take a long look at the city below.  \nThe signs of damage from the ${enemy_name} occupation are everywhere, but the enemy is gone.\n\n*if alliance_true >=50\n\tWith the help of your new comrades, \n*if alliance_true \u003c 50\n\tWith the help of the Outer Systems, \nyou have reclaimed your home planet, and suppressed the chaos of the rebellion.\n\n*if alliance_true \u003c 50\n\tYet, doubt lingers in your soul about the choices you have made.\n*if alliance_true = 50\n\tOnly time will tell what the future holds.\n*if alliance_true > 50\n\tThe future of ${plan_name}, and the universe itself, shines ahead.\n*set winner true\n*finish\n\n*label scenario_two\n*set scenario 2\n*comment A Pro-Alliance Scenario\n*comment You trick her into getting onto the gunships...\n*comment But the Alliance thought you would betray them.\n*comment So this actually HELPS the rebels, whoops!\n*set trouble_in_store true\n*gosub start_of_rebellion_trust\n*gosub gloat_thru_boarding\t\t\n\nThe attack is about to begin, and you wait expectantly for the Alliance's mysterious \"trap\" to spring.  But nothing happens, and when the gunships actually open fire on the Alliance, you realize that something has gone horribly wrong.\n\nThe Alliance's plan has failed somehow, and now the tide is turning against them!  You have no choice, you...\n*fake_choice\n\t#...appeal to the rebel soldiers to cease fire, even though it will reveal that you are not on their side.\n\t\tYou demand that the soldiers cease fire on the Alliance.  You realize at once that it is a ridiculous request.  Lieutenant Demian, now aware that you are disloyal to her, orders that you be seized and shackled.\n\t\t\n\t#...attempt to take the Lieutenant hostage.\n\t\tYou grab a pulse gun from one of the soldiers, and train it on Lieutenant Demian.  You demand that the soldiers cease fire, but a rebel on the far side of the room blasts the weapon out of your hand.\n\t\t\n\t\t\"Now we know where your sympathies truly lie,\" the Lieutenant says.  You are seized and shackled.\n\t\t\n\t#...make a mad dash for the controls.\n\t\tYou attempt to redirect the gunship, but you realize at once that it is a futile maneuver.  Even if you could win this gunship over, the other ones are still firing.  The soldiers descend upon you, and you are shackled.\n\t\t\n*if rep >=50\n\t*goto scenario_two_rebel_loss\n*if rep \u003c 50\n\t*goto scenario_two_rebel_win\n\n*label scenario_two_rebel_loss\nBut thankfully, even though they control the gunships, the ${plan_name} rebels are outmatched by the Alliance forces.  They close in on your core ship and fire on it until it is unable to transmit energy to the gunships.  Soon the control room grows dark again.\n\nDefeated, the Lieutenant looks at you meaningfully.  You...\n*fake_choice\n\t*if alliance_out > 50\n\t\t#...say that the impurity of her cause has assured her defeat.\n\t\t\tYou tell her that the corruptness of her plan doomed it to fail.  She spits in your face.\n\t*if alliance_out \u003c=50\n\t\t#...say that her dishonorable plot has assured her defeat.\n\t\t\tYou tell her that the corruptness of her plan doomed it to fail.  She spits in your face.\n\t#...tell her that you are sorry that it has come to this.\n\t\tYou tell the Lieutenant that fate placed you on opposite sides of this bitter struggle.\n\t\t\n\t\t\"I am sorry too, for having trusted you.\"\n\t#...look away.\n\t\tYou cannot bear to look in the face of your friend.  Though fate placed you on opposite sides of the struggle, she has indeed fought bravely for her cause.\n\n\n*page_break\nHours later, aboard a Calpurnian diplomatic vessel, you meet with ${expo_title} ${expo_name}, and ask what went wrong with the Alliance's plan.  After all, you coerced Lieutenant Demian's rebels into boarding the gunships, just as you were asked to do.\n\nThe ${expo_title} seems ashamed when ${expo_nym} hears your question.  \"Because of our past dealings with you,\" ${expo_nym} admits, \"we made the mistake of assuming that you would betray us to Lieutenant Demian.  So we gave you bad information.  The fact is, we told you the gunships were trapped because we were hoping you would warn the rebels to stay off of them!\"\n\nStill confused, you ask how keeping the rebels off the gunships would have helped the Alliance.\n\n\"If the rebels had been afraid to board,\" ${expo_name} explains, \"it would have forced the Lieutenant to commandeer the gunships remotely, with a control signal.  We would have used that signal to overtake your ship's systems, and shut them down.  Alas, the real trap never had the chance to spring, precisely because you remained loyal to us...\"\n\n*fake_choice\n\t#\"I see now why you did what you did.\"\n\t\t\"We are lucky,\" the ${expo_title} admits, \"that the rebels were so far outnumbered.  You have my apologies for failing to put our trust in you, Captain.\"\n\t#\"How dare you question my motives!\"\n\t\t\"You have my apologies,\" the ${expo_title} says.  \"We have paid greatly for our mistrust.  We are only lucky that the price was not even greater.\"\n\t#\"Wait...I still don't understand!\"\n\t\t\"This war has been a tangle of shifting loyalties,\" the ${expo_title} admits.  \"But the confusion is over.  And truly, it is not important, now that ${plan_name} is free.\"\n*page_break\n*goto scenario_one_expo\n\n*label scenario_two_rebel_win\n*set rebel_win true\nThe rest plays out like a nightmare, as you watch the rebel forces turn the tide against the Alliance.  You cannot understand what has gone wrong.  What happened to the trap?\n\n*gosub demian_victory_chat\n*page_break\n*set prisoner_rebels true\nIn the brig, you piece it all together: there never was any trap on the gunships.  This was merely misinformation, fed to you by a dubious Alliance.  They thought you were a rebel.\n\nThey hoped that, if they convinced you that the gunships were dangerous, you would warn Lieutenant Demian to stay off of them!  But now their lies have backfired, and you are brought home to ${plan_name} as a prisoner.\n\nThis is...\n*label sad\n*fake_choice\n\t#A tragedy.\n\t\tFate was not on your side today, for reasons you will long contemplate.\n\t#What comes of deceit.\n\t\tDeception itself is to blame for your fate.\n\t#Not finished yet.\n\t\tAs long as you yet live, there is hope.\n*finish\n\n*label scenario_three\n*set scenario 3\n*comment A Pro-Alliance Scenario\n*comment She refuses to get onto the gunship.\n*comment Instead she links with the ships remotely.\n*comment Bad news for the Alliance!\n*gosub despite_the_victory\n*gosub she_guessed\nYou watch in the holographic field as the enormous weapons turn in unison, and begin to fire.\n\nYou have to stop this madness.  The tide is turning against the Alliance!\n*fake_choice\n\t#Appeal to the soldiers to cease fire.\n\t\tYou demand that the soldiers cease fire on the Alliance.  You realize at once that it is a ridiculous request.  Lieutenant Demian orders that you be seized and shackled.  You watch helplessly from the shadows as the rebellion unfolds.\n\t\t\n\t#Attempt to take the Lieutenant hostage.\n\t\tYou grab a pulse gun from one of the soldiers, and train it on Lieutenant Demian.  You demand that the soldiers cease fire, but a rebel on the far side of the room blasts the weapon out of your hand.\n\t\t\n\t\t\"Keep the Captain from interfering,\" the Lieutenant says.  You are seized, and watch helplessly from the shadows as the rebellion unfolds.  \n\t\t\n\t#Make a mad dash for the controls.\n\t\tYou attempt to wrest the controls away from Officer Kelmer, and are shackled for the attempt.  You watch helplessly from the shadows as the rebellion unfolds.  \n\t\t\n*if rep >=50\n\t*goto scenario_three_rebel_loss\n*if rep \u003c 50\n\t*goto scenario_three_rebel_win\n\n*label scenario_three_rebel_loss\nBut thankfully, even with the gunships on their side, the ${plan_name} rebels are outmatched by the Alliance forces.  They close in on the cruiser that houses your core, and fire upon it, until it is unable to transmit energy.\n\nOnce Lieutenant Demian's defeat appears inevitable, she looks at you meaningfully.  You...\n*fake_choice\n\t*if alliance_out > 50\n\t\t#...say that the impurity of her cause has assured her defeat.\n\t\t\tYou say that her corrupt plan was bound to fail.  She spits in your face.\n\t*if alliance_out \u003c=50\n\t\t#...say that her dishonorable plot has assured her defeat.\n\t\t\tYou say that her corrupt plan was bound to fail.  She spits in your face.\n\t#...tell her that you are sorry that it has come to this.\n\t\tYou tell the Lieutenant that fate placed you on opposite sides of this bitter struggle.\n\t\t\n\t\t\"I am only sorry that I was on the losing one,\" she laughs bitterly.  \n\t#...look away.\n\t\tYou cannot bear to look in the face of your friend.  Though fate placed you on opposite sides of the struggle, she has indeed fought bravely for her cause.\n*page_break\nHours later, on a Calpurnian diplomatic vessel, you tell ${expo_title} ${expo_name} what happened aboard your ship.\n\nThe ${expo_title} admits that it was a mistake to have you deceive Lieutenant Demian.  \"We should have never put this plan into action.  It placed you in an exceedingly delicate position.\"\n*fake_choice\n\t#\"A delicate position?  It nearly cost me my life!\"\n\t\t\"You have my apologies,\" the ${expo_title} says.  \"We have paid greatly for our foolishness.  But we are fortunate that the price was not even greater.\"\n\t#\"I see now why you did what you did.\"\n\t\t\"We are only lucky,\" the ${expo_title} replies, \"that the rebels were so far outnumbered.  You have my apologies for involving you in this imbroglio.\"\n\t#\"All that matters now is that ${plan_name} is safe.\"\n\t\t\"Indeed,\" the ${expo_title} replies.  \"There can be no greater consolation.\"\n*page_break\n*goto scenario_one_expo\n\n*label scenario_three_rebel_win\n*set rebel_win true\nThe rest plays out like a nightmare, as you watch the rebel forces turn the tide against the Alliance.\n\n*gosub demian_victory_chat\n\nWhen you return to ${plan_name} at last, it is as a prisoner.  This is...\n*set prisoner_rebels true\n*goto sad\n\n\n*label scenario_four\n*set scenario 4\n*comment A Pro-Alliance Scenario\n*comment She refuses to get on the gunship.\n*comment But the Alliance thought you would betray them.\n*comment So this backfires on the rebels!\n*gosub despite_the_victory\n*gosub she_guessed\nBut something is wrong.  \"Lieutenant, my controls are seizing!\" Officer Kelmer cries from his console.  \"Our ship is going into lockdown!\"\n\nLieutenant Demian looks at you in horror as the power on your ship dies down.  She seems to think you know what is happening, but you don't!\n*page_break\nHours later, aboard a Calpurnian diplomatic vessel, you meet with ${expo_title} ${expo_name}, and ask what went wrong with the Alliance's plan.  After all, you had tried to coerce the Lieutenant into boarding the gunships, just as you were asked.\n\nThe ${expo_title} seems ashamed when ${expo_nym} hears this question.  \"Because of our past dealings with you,\" ${expo_nym} admits, \"we assumed that you would betray us.  So we told you the gunships were trapped, because we were hoping you would warn the rebels to stay off of them!  This way they would be forced to use a control signal.  I am sorry to say, we had not counted on your loyalty.\"\n\n*fake_choice\n\t#\"I understand.\"\n\t\t\"You nevertheless have my apologies for failing to believe in you.\"\n\t#\"How dare you question my motives!\"\n\t\t\"You have my apologies,\" the ${expo_title} says.  \"But truly, this misunderstanding hardly matters, now that ${plan_name} is free.\"\n\t#\"Your explanation is only confusing me more!\"\n\t\t\"This war has been a tangle of shifting loyalties,\" the ${expo_title} admits.  \"But the turmoil is at an end.  And truly, it is not important, now that ${plan_name} is free.\"\n*page_break\n*goto scenario_one_expo\n\n\n*label scenario_five\n*set scenario 5\n*comment A Rebel Scenario\n*comment She stays off the gunships like you asked.\n*comment Bad news for the Alliance!\n*gosub start_of_rebellion_trust\n\nYou transmit energy to the gunships, and all at once, the darkened ${enemy_name} vessels begin to glow with power again.  Then Lieutenant Demian orders Officer Kelmer to issue the control signal, and commandeer them.\n\nMoments later, the gunships are once again cutting a destructive swath through the armada.  As the situation turns dire for the Alliance, a transmission comes over the main viewscreen from Councilor Tayu.  \n*if alliance_out \u003c=50\n\tHis eyes bore holes into you.  \n*if alliance_out > 50\n\tHe seems horrified to see his own comrade at the command platform.  \n\"Cease this unlawful attack at once!\" he orders.\n*choice\n\t#\"Unfortunately, High Councilor, I am unable to comply with your request.\"\n\t\t*if alliance_out > 50\n\t\t\t\"You will pay for this betrayal, Captain...\"\n\t\t\t*goto gone_mad\n\t\t*if alliance_out = 50\n\t\t\t\"You will pay for your disloyalty, Captain...\"\n\t\t\t*goto gone_mad\n\t\t*else\n\t\t\t\"You will pay for your insolence, Captain...\"\n\t\t\t*goto gone_mad\n\t#\"Join us, High Councilor!  The freedom of your people is at stake!\"\n\t\t*if alliance_out >=50\n\t\t\t\"Have you gone mad, Captain?  Do you not see the chaos you are causing for the future of ${plan_name}?  Stop this attack at once!\"\n\t\t\t*goto gone_mad\n\t\t*else\n\t\t\t\"Indeed it is, Captain.  And I will not allow a fanatic like you to take it away from them.\"\n\t\t\t*goto gone_mad\n\t#\"Our attack will cease only when the Alliance invaders are eliminated.\"\n\t\t\"You have gone mad, Captain!\"\n\t\t*goto gone_mad\n*label gone_mad\n\nYou cut the transmission, and continue the offensive against the Alliance.  \n*if rep >=50\n\tBut even with the deadly gunships of the ${enemy_name}, you find it difficult to fend them off.  The Alliance has grown big enough to fight back.  They attack and destroy the gunships directly, and then turn their attention to your fleet.\n\t\n\tCouncilor Tayu appears once more on the main viewscreen.  \"You cannot win, Captain.  Surrender at once!\"\n\t*choice\n\t\t#\"Never!\"\n\t\t\tYou refuse to give the battle to the Alliance, but it is no longer your choice to make.  In time their forces have blasted their way through your defenses, and disabled your cruiser.  The ship shudders.  The viewscreens go blank.  Communications reports that your transmission channels are dead.\n\t\t\t\n\t\t\tBut the holographic field is alive.  Within it, you watch as your cruiser is slowly surrounded.\n\t\t\t\n\t\t\tThis is...\n\t\t\t*set prisoner_alliance true\n\t\t\t*goto sad\n\t\t\t\n\t\t#\"We surrender!\"\n\t\t\tWhen you issue your surrender, you expect Lieutenant Demian to argue the point, but she says nothing.  She too knows that the fight is over.  In some way, this is worst of all, to see her defeated.  It makes your failure somehow more palpable.\n\t\t\t\n\t\t\tTogether you watch in the holographic field, as your cruiser is slowly surrounded.\n\t\t\t\n\t\t\tThis is...\n\t\t\t*set prisoner_alliance true\n\t\t\t*goto sad\n\n*if rep \u003c 60\n\t*set rebel_win true\n\tWith the deadly gunships of the ${enemy_name} at your command, your attack is unstoppable.  You decimate the Alliance forces within minutes.  The Councilor sends a distress signal, and you call him back on-screen.\n\t\n\t\"This is madness, Captain!  Cease fire immediately!  The Alliance surrenders!\"\n\t*choice\n\t\t#Cease fire.\n\t\t\tIt is only fair that you honor the High Councilor's request.  You give the order for the gunships to stand down, but you keep the weapons trained on the Alliance nonetheless.\n\t\t\t\n\t\t\tThe specific terms of their surrender will need to be established quickly if they are to leave your quadrant.  And leave they must.\n\t\t\t\n\t\t\tYou have a future to build, and the Alliance has no place in it.\n\t\t\t*set winner_rebel true\n\t\t\t*finish\n\t\t#Order the guns to continue shooting.\n\t\t\tYou refuse to stand down.  You want the Alliance to remember this day.  They must know that ${plan_name} will not be bought or sold.  That its people are a proud people.\n\t\t\t\n\t\t\tAnd so you order the cannons to fire, and continue firing, until every last Alliance vessel has phased into hyperspace, or been destroyed.  Once they are gone, you regard the fore monitor, where ${plan_name} is glittering just as you remember it.\n\t\t\t\n\t\t\tBut it is not the ${plan_name} of the Alliance's empire dreams, or the ${plan_name} you knew from the days of the first ${enemy_name} attacks.  It is the ${plan_name} you knew as a child, uncluttered by war, serving only the purpose of its people.\n\t\t\t\n\t\t\tIt stands alone.\n\t\t\t*set winner_rebel true\n\t\t\t*finish\n\n*label scenario_six\n*set scenario 6\n*comment A Rebel Scenario\n*comment She stays off the gunships like you asked.\n*comment But the Alliance knew you'd warn her.\n*comment So this backfires on the rebels!\n*gosub start_of_rebellion_trust\n\nYou order the Core Operator to divert energy to the gunships.  All at once, the darkened ${enemy_name} vessels begin to glow with power again.  Lieutenant Demian orders Officer Kelmer to issue the control signal, and commandeer them.\n\nThe melodic sequence of tones that indicates an outgoing connection sounds, but something is wrong.  \"Lieutenant, my controls are seizing!\" the Astrogator cries.  \"Our ship is going into lockdown!\"  The lights begin to power off on the cruiser, and the emergency illumination comes on.  The air recycler slows to a wheeze.\n\nLieutenant Demian looks at you in horror, while you return a mask of pure confusion.  Then a transmission comes over the main screen from Councilor Tayu.  He looks satisfied indeed.\n\n\"Did you really think that we would be foolish enough to trust you, Captain?  There was no trap on the gunships!  We only told you that to coerce you into using a control signal—a control signal which we have traced, in order to disable your fleet.\"\n\n*fake_choice\n\t#\"You will pay for this...\"\n\t\t\"Spare me your threats.  In a few short years, even your disloyalty will have been forgotten.  You are but a footnote in the history of the Intergalactic Alliance, Captain.\"\n\t\t\n\t#\"You are a traitor...\"\n\t\t\"It is you who are the traitor, Captain.  You have chosen to sow dissent in a time of historic unity.  The citizens of the future will not remember you fondly, if they remember you at all.\"\n\t\t\n\t#\"The people will never accept the Alliance...\"\n\t\t\"The people have already accepted it, Captain!  The Alliance is feared only by those who would sow dissent.  You are a part of the very chaos we stand against.\"\n\t\t\nThe ship is shortly boarded by the Alliance forces, and you are brought to a Calpurnian brig, to await judgment.  This is...\n*set prisoner_alliance true\n*goto sad\n\n*label scenario_seven\n*set scenario 7\n*comment A Rebel Scenario\n*comment She thinks you're lying and gets on the gunship anyway.\n*comment This backfires on the rebels!\n*gosub despite_the_victory\n*gosub she_guessed_wrong\n\nJust then, an urgent call comes over the Lieutenant's comlink.  \"Something's wrong!  The ship is...\"  Before the soldier can finish his sentence, his gunship disappears from the tactical grid.\n\n\"What's happening?\" the Lieutenant asks, her face frozen in terror.  Another gunship disappears from the grid.  Then another, then another.\n\nFinally, the monitors of the gunship go blank.  You are being dragged into hyperspace.\n*page_break\nWhen your gunship has emerged into hyperspace, you can see a Rakashi battle squadron waiting on the tactical screen.  So this was the Alliance's trap: to pluck the vessels from normal space, where they would be cut off from their power source.\n\nYou watch, immobilized, as the rebels attempt to stave off the Alliance, but the ship has been cut off.  It can barely muster the energy to fire, and you know that the other gunships are in a similar predicament.\n\nIt is a disaster for the rebellion, but at least it is a quick one.  Lieutenant Demian declares surrender in under fifteen minutes of combat.  As the Rakashi vessels close in, the Lieutenant orders the rebels to release your shackles.  She knows now that you were right, and only tried to warn her.\n\n\"Captain, can you forgive me?\" she asks.\n*fake_choice\n\t#\"Not in your lifetime.\"\n\t\tYour words chill the air, and no more words are spoken between you.\n\t\t\n\t#\"You were only trying to protect your people.\"\n\t\tYou tell her that you understand why she did what she did, but it is of small comfort now.\n\t\t\n\t#\"Your forgiveness will be decided by history.\"\n\t\tYou say that fate will decide if she is forgiven, and by whom.  Unfortunately, you know that the same is true for you.\n\t\t\n\t#Say nothing.\n\t\tThere is nothing you could say to Lieutenant Demian now that she would benefit by hearing, and so you remain silent.\n\t\t\nIn time, the Alliance will discern the truth.  They will review your ship's recordings, and \n*if (hostage = true) or (sabotage = true)\n\tsee the evidence of your attempt to detain the rebels.  \n*if comlink = true\n\thear the warning you gave to the other rebels.  \nThen they will most likely send an Inquisitor to read your thoughts, and learn how you tried to warn Lieutenant Demian about the trap.  Assuming you are not executed, the only thing in doubt now is how long you will be imprisoned for your crimes.\n\nWhen the gunships are towed back into normal space, you take a long look through the monitor at ${plan_name}, your home.  In all likelihood, you will never set foot there again.\n\nThis is...\n*set prisoner_alliance true\n*goto sad\n\n\n*label scenario_eight\n*set scenario 8\n*comment A Rebel Scenario\n*comment She thinks you're lying and gets on the gunship anyway.\n*comment But the Alliance gave you bad information, so this was a good idea for her!\n*comment Bad news for the Alliance!\n*set trouble_in_store true\n*gosub despite_the_victory\n\nLieutenant Demian, it seems, has presumed you are an Alliance spy, and that your warning about the gunships is part of some trick.  \"If your friends in the Alliance want to keep me off the gunships, there must be some reason for their reluctance.  We will board them as planned.\"\n\nYou assure the Lieutenant that...\n*fake_choice\n\t#...you are loyal to the cause of the rebellion.\n\t\tIt is apparent that Lieutenant Demian thinks you are in league with the Alliance, and you do your best to convince her otherwise.  \"No more lies,\" she says.  \"You had your chance to lead alongside me.  Now march, prisoner!\"\n\t\t\n\t#...your warning to be wary of the gunships is a legitimate one.\n\t\tYou do your best to make Lieutenant Demian understand that you are not an Alliance sympathizer.  You tell her that, by boarding the gunships, she is making a terrible mistake.\n\t\t\n\t\t\"My only mistake would be trusting you,\" she says,  \"ever again.  Now march, prisoner!\"\n\t\t\n\t#...the rebellion will be doomed if she mistrusts you.\n\t\tYou realize that Lieutenant Demian has decided you are in league with the Alliance.  You try to explain that she is mistaken, and that if she chooses unwisely, the rebellion may well end today.\n\t\t\n\t\t\"The rebellion will end today,\" she replies,  \"with its victory over the Alliance scum!\"\n\t\t\nRebel soldiers enter the cabin and seize you.  \"Bring this one with us to the transport ships,\" Lieutenant Demian orders.  \"The Captain can see his precious Alliance fall firsthand.\"  You are marched off through the hallways of the cruiser, the smell of recently fired weaponry in the air.  Knowing that this is your last chance to stop the Lieutenant from falling into the Alliance's trap, you...\n*choice\n\t#...break free and threaten them with a pulse pistol.\n\t\t*set hostage true\n\t\tYou wrest free and grab a pistol from one of the soldiers.  You threaten Lieutenant Demian with it, and demand that the soldiers stop their advance to the passenger carriers.  But before anyone can make another move, a rebel on the far side of the hall blasts the weapon out of your hand. \n\t\t\n\t\t\"You put on a good show, Captain,\" Lieutenant Demian says.  \"Enough theatrics now.\"\n\t\t\n\t\tYou are shackled, and marched to the passenger carriers. \n\t\t*page_break\n\t\t*goto control_room2\n\n\t#...use your comlink to warn the rebels that the gunships are a trap.\n\t\t*set comlink true\n\t\tYou surreptitiously activate your comlink, and use it to connect to the ship's communication system.  You announce that the rebellion is in danger, and that a trap is waiting for your soldiers aboard the gunships.  Your voice echoes down the halls of the cruiser, but your comlink is shortly seized and crushed under a rebel's boot.\n\t\t\n\t\t\"You put on a good show, Captain,\" Lieutenant Demian says.  \"Enough theatrics now.\"\n\t\t\n\t\tYou are shackled, and marched to the passenger carriers.\n\t\t*page_break\n\t\t*goto control_room2\n\n\t#...attempt to sabotage the controls of the passenger vessel.\n\t\t*set sabotage true\n\t\tWhen you have arrived at the passenger vessels, you wrest free, grab a pistol from one of the soldiers, and begin blasting the controls.  You are able to disable the vehicle for the time being, but there are many others, and you are restrained before you can do any more damage.\n\t\t\n\t\t\"You put on a good show, Captain,\" Lieutenant Demian says.  \"Enough theatrics now.\"\n\t\t\n\t\tYou are shackled, and taken to another passenger carrier.\n\t\t*page_break\n\t\t*goto control_room2\n\n*label control_room2\nWhile en route to the gunship, Alliance forces begin to fire upon you, and you feel a profound sense of unease.  If the Alliance wants the rebels to board the gunships, why would they try to deter them from approaching?\n\nYou momentarily forget this occurrence when you arrive at the dimly-lit gunship, where you are surprised to find no ${enemy_name} soldiers in sight.  Only hulking Bersooni mercenaries, who retreat modestly as the rebels make their way to the control room.\n\nOnce there, your soldiers take their place at the consoles, Lieutenant Demian issues her orders to the Core, and the interior of the vessel begins to glow with power.  But when the rebel gunships open fire, you know that something has gone wrong.  \"Where is your so-called trap, Captain?\" the Lieutenant taunts, as the battle rages.  As you watch the tide turn against the Alliance, your confusion only grows.\n*fake_choice\n\t#Admit that you have no idea what has happened.\n\t#Suggest that the trap must have malfunctioned.\n\t#Throw yourself on her mercy.\n*if rep >=50\n\t*goto scenario_eight_rebel_loss\n*if rep \u003c 50\n\t*goto scenario_eight_rebel_win\n*label scenario_eight_rebel_loss\n*set prisoner_alliance true\nShe laughs at your words, but not for long.  Even with the gunships on their side, the ${plan_name} rebels are outmatched by the Alliance forces.  They close in on your core cruiser and fire upon it, until it is unable to transmit energy.  The rebellion is defeated, and you are hauled into a Calpurnian brig.\n\nIt is only hours later, in the brig, that you piece it all together: there never was any trap on the gunships.  This was misinformation, fed to you by a dubious Alliance, to keep the rebels from boarding.  They knew that the Lieutenant would have the upper hand if she controlled the ships manually.\n\nBut this hardly matters now.  Even with its advantage, the rebellion has failed.  You can look forward to a long imprisonment, and possibly execution.\n\nThis is...\n*fake_choice\n\t#A tragedy.\n\t#A disaster.\n\t#Not over yet.\n*finish\n\n*label scenario_eight_rebel_win\n*set rebel_win true\nShe laughs at your words, and you are left to wonder what went wrong, while the rebels drive the Alliance off for good.\n\nIt is only hours later, in the brig, that you piece it all together: there never was any trap on the gunships.  This was misinformation, fed to you by a dubious Alliance, to keep the rebels from boarding.  They knew that the Lieutenant would have the upper hand if she controlled the ships manually.\n\nYou have to hand it to Lieutenant Demian. She was right to mistrust this intelligence, even if she was wrong to mistrust you.  You look out at a monitor beyond the energy barrier in your cell, and see the Alliance armada pulling out of the quadrant, defeated.  You take some pride in the fact that they have been driven off.  But you will never be able to convince Lieutenant Demian that you were on her side.\n*set prisoner_rebels true\n*finish\n\n\n*comment Scenario Nine\n*label scenario_nine\nWith the victory over the ${enemy_name} secured, you know that Lieutenant Demian will call her rebellion to arms at any moment.\n\nYou do not know how the Alliance plans to stop her, but if Ambassador Bashena's warning was any sign, it would be better if you stopped the rebellion yourself.\n\nYou can think of no better way than by...\n*choice\n\t#...ordering your fleet to phase into hyperspace immediately.\n\t\tYou issue an order for the fleet to phase into hyperspace.  \n\t\t*if mil_trust >=50\n\t\t\tLieutenant Demian demands that Officer Kelmer ignore the order before it can be executed, but he hesitates, unsure who to follow.  In the awkward silence, Lieutenant Demian mashes down on a communicator pad and issues an order for all \"Alpha Team\" members to take action immediately.\n\t\t\t\n\t\t\t*goto hyperspace\n\t\t\t\n\t\t*else\n\t\t\tOfficer Kelmer does not respond, and turns instead to Lieutenant Demian, as if for further instruction.  \"That order is countermanded,\" she tells him, and he stands down.  She mashes down on a communicator pad and issues an order for all \"Alpha Team\" members to take action immediately.\n\t\t\t\n\t\t\t*goto hyperspace\n\t\t\t\n\t#...speaking with the Lieutenant in private, and attempting to dissuade her.\n\t\tYou disappear into your cabin, and try to reason with Lieutenant Demian.\n\t\t\n\t\t*gosub chittychat\n\t\t*if mil_trust \u003c 50\n\t\t\tSignifying the end of your conversation, she pushes her comlink emphatically.  It issues a transmission.  Seconds later, you hear the sound of blasting erupt from the bridge behind you.  When you move to investigate, the Lieutenant raises a pulse gun and points it at your chest.\n\t\t\t\n\t\t\t\"Have a seat, Captain,\" she says.  \"The rebellion has not yet secured the ship.  It's not safe out there for the likes of you.\"\n\t\t\t*page_break\n\t\t\tWhen the sounds of fighting have died down, rebel soldiers enter the cabin and seize you, bringing you to the bridge, where Lieutenant Demian orders the terrified Officer Kelmer to bring the image of ${plan_name} onto the main viewscreen, in all its radiant glory.\n\t\t\t\n\t\t\t*goto monologuing\n\t\t*else\n\t\t\tShe pushes her comlink, issuing an automatic transmission.  Seconds later, you hear the sound of blasting erupt from the bridge behind you.  When you move to investigate, the Lieutenant raises a pulse gun and points it at your chest.\n\t\t\t\n\t\t\t\"Please, Captain,\" she says.  \"Don't make this harder than it already is.  The rebellion has not yet secured the ship.  It isn't safe out there.\"\n\t\t\t*page_break\n\t\t\tWhen the sounds of fighting have died down, rebel soldiers enter the cabin and seize you, bringing you to the bridge, where Lieutenant Demian orders the terrified Officer Kelmer to bring the image of ${plan_name} onto the main viewscreen, in all its radiant glory.\n\t\t\t\n\t\t\t*goto monologuing\n\t\t\t\n\t#...sabotaging your ship's systems.\n\t\tYou disappear into your cabin and order the Core Operator to initiate an emergency shutdown of the entire fleet.  Moments later, there is a sound of gunfire on the bridge.  When you move to investigate, Lieutenant Demian appears in the doorway, blocking you.  You try to steal past her, but she raises a pulse gun and points it at your chest.\n\t\t\n\t\t*if mil_trust \u003c 50\n\t\t\t\"Have a seat, Captain,\" she says.  \"The rebellion has not yet secured the ship.  It isn't safe out there for the likes of you.\"\n\t\t\t\n\t\t\t*gosub demian_philosophy\n\t\t\t*page_break\n\t\t\tOutside, the sounds of fighting have died down.  Rebel soldiers enter the cabin and seize you, bringing you to the bridge.  Lieutenant Demian orders the terrified Officer Kelmer to bring the image of ${plan_name} onto the main viewscreen, in all its radiant glory.\n\t\t\t\n\t\t\t*goto monologuing\n\t\t*else\n\t\t\t\"Please, Captain,\" she says.  \"Don't make this any harder than it already is.  The rebellion has not yet secured the ship.  It isn't safe out there.\"\n\t\t\t\n\t\t\t*gosub demian_philosophy\n\t\t\t*page_break\n\t\t\tOutside, the sounds of fighting have died down.  Rebel soldiers enter the cabin and seize you, bringing you to the bridge.  Lieutenant Demian orders the terrified Officer Kelmer to bring the image of ${plan_name} onto the main viewscreen, in all its radiant glory.\n\t\t\t\n\t\t\t*goto monologuing\n\n\n*label hyperspace\nYou have never heard of \"Alpha Team\" before, but you quickly guess that it is a code name for those members of your fleet who are sympathetic to the rebellion.  The bridge erupts into chaos, and pulse gun blasts start flying past your head.  You are seized and held and soon enough, the chamber has been secured by the rebels.  Lieutenant Demian stands on the command platform, looking down at you \n*if mil_trust \u003c 50\n\ttriumphantly.\n\t\n*if mil_trust >=50\n\tregretfully.\n\t\n*gosub demian_philosophy\n*page_break\nShe orders the terrified Officer Kelmer to bring the image of ${plan_name} onto the main viewscreen, in all its radiant glory.\n\n*label monologuing\n\"I had intended to commandeer the ${enemy_name} gunships,\" the Lieutenant explains, \"but that was before the Alliance learned my plan.  Now instead, I have decided to give them what they want most: ${plan_name}.  You see, our ships have been given the drive codes for the entire armada, to help us phase into and out of hyperspace together during battle.  But those same codes can be used to move the armada other places.  Such as the Taesan Sea...\"\n\nShe orders Officer Kelmer to link with the Alliance vessels and set them on a collision course with the planet below.\n\nYou tell the Lieutenant...\n*choice\n\t#...that this is madness.\n\t\t*if mil_trust \u003c 50\n\t\t\t\"Not madness, Captain.  Merely conviction.\"\n\t\t\t\n\t\t\t*goto please\n\t\t*else\n\t\t\t\"History will prove you wrong.\"\n\t\t\t\n\t\t\t*goto please\n\t#...that this maneuver is in strict opposition to the rules of engagement.\n\t\t*if drone_production \u003c 50\n\t\t\t\"Spare me your hypocrisy, Captain.  I'm surprised you even know them.\"\n\t\t\t\n\t\t\t*goto please\n\t\t*elseif (battle2_cruelty = true) or (battle3_civility \u003c 30)\n\t\t\t\"I seem to recall your having broken them yourself.\"\n\t\t\t\n\t\t\t*goto please\n\t\t*else\n\t\t\t\"History will say that I was willing to do whatever was necessary to truly free our people.\"\n\t\t\t\n\t\t\t*goto please\n\t#...that the Alliance will fight back.\n\t\t*if mil_trust \u003c 50\n\t\t\t\"Then you should advise them to do so quickly, before their ships hit the outer atmosphere.\"\n\t\t\t\n\t\t\t*goto please\n\t\t*else\n\t\t\t\"I am sure of that.\"\n\t\t\t\n\t\t\t*goto please\n*label please\n*if mil_trust \u003c 50\n\t*goto nobody_likes_you\nBut the armada ships aren't moving.  It would appear that Officer Kelmer has not linked to them, as Lieutenant Demian ordered him to do.\n\nShe draws her pulse gun and levels it at the Astrogator through the array of telescreens.  The implication is painfully clear.  \"Issue the signal,\" she repeats.\n\nYou notice the focus of the entire bridge has shifted to Officer Kelmer.  You can even feel the grip of the soldiers holding your shoulders relax slightly, as their attention is distracted.  If you are going to make a move, now is the time.\n*choice\n\t#Use your comlink to send a warning to the Alliance.\n\t\t*set chest_shot true\n\t\tYou break free from your captors and use your comlink to connect directly with the Alliance ships.  You warn them that Lieutenant Demian is planning to overtake their drives, but you don't have the opportunity to say much more before you feel a pulse blast hit you in the back.\n\t\t\n\t\tYou collapse on the floor, your heart beating hard inside your chest.  The pain is unbearable, like steel pins in every vessel.\n\t\t\n\t\t\"Captain, what have you done?\" Lieutenant Demian asks as she stands over your writhing body.\n\t\t\n\t\t\"Lieutenant,\" one of the rebels reports over her shoulder.  \"The Alliance is closing in fast...\"\n\t\t\n\t\tFeeling your consciousness fading, you tell the Lieutenant...\n\t\t*goto sorry_sucker\n\n\t#Grab a pistol and fire at the rebel Lieutenant.\n\t\t*set poor_guy true\n\t\tYou break free from your captors and grab a pistol from one of their holsters, firing at Lieutenant Demian.  Her own weapon is blasted out of her hand, and she grabs her wrist, screaming.\n\t\t\n\t\tOfficer Kelmer steals this moment of confusion to connect to the Alliance.  \"Alert, Alliance armada!  Scramble your drive codes immediately!  Repeat, scramble your drive codes...\"\n\t\t\n\t\tThe rebels' pulse blasts take him down, but they are too late.  By the time the Lieutenant has taken his place at the command panel, the Alliance ships have already responded to the warning.  The command signal is blocked.\n\t\t\n\t\tIn the holographic field, Alliance vessels slowly converge on your ships.  Lieutenant Demian slowly turns to you, her eyes filled more with sadness than anger.\n\t\t\n\t\tYou tell her...\n\t\t*goto sorry_sucker\n\n\t#Grab a pistol and blast the control panel.\n\t\t*set poor_guy true\n\t\tYou break free from your captors and grab a pistol from one of their holsters, firing at the command center hardware.\n\t\t\n\t\tKelmer steals the moment of confusion to connect to the Alliance with his commlink.  \"Alert, Alliance armada!  Scramble your drive codes immediately!  Repeat, scramble your drive codes...\"\n\t\t\n\t\tThe rebels' pulse blasts take him down, but they are too late.  By the time the Lieutenant has taken his place at the command panel, the Alliance ships have already responded to the warning.  The command signal is blocked.\n\t\t\n\t\tIn the holographic field, Alliance vessels slowly converge on your ships.  Lieutenant Demian turns to you, her face filled more with sadness than anger.\n\t\t\n\t\tYou tell her...\n\t\t*goto sorry_sucker\n\n*label nobody_likes_you\nYou watch in the holographic field as the armada ships begin soaring inexorably closer to the planet's surface.  Distress signals by the dozen are being issued, which Lieutenant Demian orders Communications to ignore.\n\n\"Keep on them,\" the Lieutenant orders.  \"Don't let them scramble their codes on you.\"  Officer Kelmer continues to work furiously at the command panel, fighting to maintain control over the Alliance ships, and keep them on their fatal course.\n\n*if rep \u003c 50\n\t*goto alliance_loses\n*comment ALLIANCE WINS!  HORRIBLY!!!\nBut when their ships begin gliding past yours in the holographic field, you notice fan-like transmitters extending from the hulls of the Alliance vessels.  You know that the transmitters are weapons of some kind, but you are having difficulty remembering where you have seen them before.  Then you recall a history lesson about the ancient combat techniques of Calpurnia, and the long-banned practice of using HTE radiation as a kind of crude weapon.  \n*fake_choice\n\t#You are certain the Alliance would never do such a thing...\n\t\tOnly they did.  You hear a choked scream, \n\t#You would not put it past the Alliance to do such a thing...\n\t\tYou steel yourself for the infamous pain of HTE radiation.  Then you hear a choked scream, \n\t#There must be some mistake...\n\t\tThere must be some mistake.  That is what you are thinking when you hear a choked scream, \nuncomfortably close to you.  You turn to see Lieutenant Demian, shuddering and reaching for her face, as though trying to remove an invisible hand from her mouth.  The effects hit Officer Kelmer next, his muscles clenching as he collapses at the control panel, bleeding eyes rolling back into his head.  There is no way he will be able to hold the command signal now.\n\nSoon the entire crew of the bridge is writhing in agony, and you with them.  At first it feels like tiny insects biting at the inside of your skin, then like molten lead burning its way through your veins.  Finally you feel as though your very bones are swelling, squeezing your body to pulp from the inside out.\n*page_break\nIn the Calpurnian sick bay, where you will be recovering for some weeks while you regain the use of your limbs, ${expo_title} ${expo_name} does ${expo_its} best to defend the Alliance's decision to use HTE radiation on your fleet.\n\n\"We agreed to use it only as a last resort,\" ${expo_nym} explains.  \"And the situation called for it.  It is true, of course, that any exposure to HTE can be dangerous.  But the after-effects are only temporary.\"\n\nYou say...\n*choice\n\t#Considering Lieutenant Demian's intended strategy, it was comparatively humane of the Alliance's to use HTE.\n\t\t\"For someone who has survived the excruciating pain of HTE radiation firsthand, these are brave words indeed.\"  \n\t\t\n\t\tYou can sense that the ${expo_title} is somewhat ashamed of your ordeal, despite the brave face ${expo_nym} shows.\n\t\t\n\t\t*goto lets_not_dwell\n\n\t#You understand the reasoning behind the Alliance's decision, but the fact remains that they employed a banned weapon.\n\t\t\"And yet,\" the ${expo_title} notes, \"had we employed our military forces, far more of ${expo_your_our} soldiers would have perished.  To say nothing of the thousands more Alliance soldiers who would have died in ${plan_name}'s outer atmosphere, had we failed.\"\n\t\t*label sensitive\n\t\t\n\t\t*if alliance_true \u003c=50\n\t\t\tThe ${expo_title} says these words in an emphatic way that suggests this part of the conversation is at an end.\n\t\t\t\n\t\t\t*goto lets_not_dwell\n\t\t*else\n\t\t\tYou can sense that the ${expo_title} is somewhat ashamed, despite the brave face ${expo_nym} shows.\n\t\t\t\n\t\t\t*goto lets_not_dwell\n\t\t\n\t#The after-effects were hardly \"temporary\" for the fifty ${plan_name} soldiers that the radiation killed.\n\t\t\"Far more of ${expo_your_our} soldiers would have perished in a military confrontation.  And had we not acted at all, thousands more Alliance soldiers would have died in ${plan_name}'s outer atmosphere.\"\n\t\t*goto sensitive\n\n*label lets_not_dwell\n\"Let us no longer dwell on the struggle,\" ${expo_nym} declares.  \"The time has come to celebrate.  ${plan_name} is truly free.\"\n*page_break\n*goto scenario_one_expo\n\n*label alliance_loses\nWhen their few ships begin gliding past yours in the holographic field, you notice fan-like transmitters extending from the hulls of the Alliance vessels.  \"Lieutenant,\" Zagi reports.  \"The armada is trying to hit us with HTE radiation.\"\n\n\"Is it enough to breach the hull?\" Demian asks, suddenly worried.\n\n\"Negative, Lieutenant.  They don't have enough ships to muster minimum density.\"\n*page_break\n*set prisoner_rebels true\nOne by one, the ships of the Outer Systems are forced into the atmosphere of your planet, where they begin to ignite.  Some of them are able to scramble their codes, and escape into hyperspace, but a good half of the armada is destroyed utterly.\n\nWhen their fate is duly sealed, Lieutenant Demian walks over to you and stares into your defeated face.  \n*if mil_trust \u003c 50\n\tPerhaps it is her silent way of gloating.  You...\n*if mil_trust >=50\n\tThere is a distant sadness in her eyes.  You...\n*choice\n\t#...tell her that she has committed a great injustice.\n\t\t*if mil_trust \u003c 50\n\t\t\t\"On the contrary, I have prevented one,\" she says.  \"Our planet has been restored to its people.\"\n\t\t\t*finish\n\t\t*else\n\t\t\t\"Indeed I have.  An injustice to you, Captain.  But never to our people.\"\n\t\t\t*finish\n\t#...beg her forgiveness for your disloyalty to your people.\n\t\t*if mil_trust \u003c 50\n\t\t\tShe laughs.  \"Surely you can't expect me to believe you.\"\n\t\t\t*finish\n\t\t*else\n\t\t\t\"That will be up to them.\"\n\t\t\t*finish\n\t#...spit directly in her face.\n\t\t*if mil_trust \u003c 50\n\t\t\tHer eyes widen with cold fury.  \"You will pay for that,\" she says.  And they are no mere words.\n\t\t\t*finish\n\t\t*else\n\t\t\tUnsurprised, and perhaps a little disappointed, she quietly wipes her face.  \"I am sorry to see you remain unconvinced, Captain.  Today, our people enjoyed a true victory, over all their enemies of the Outer Systems.  Perhaps in time, you will come to see that.\"\n\t\t\t*finish\n\n*label sorry_sucker\n*choice\n\t#...that what happened here today was inevitable.\n\t\t*if mil_trust \u003c 50\n\t\t\t\"Spoken like a true Calpurnian,\" she replies bitterly. \n\t\t\t*label chesty\n\t\t\t*if chest_shot = true\n\t\t\t\t\n\t\t\t\tThe world fades to black around you.\n\t\t\t\t*goto rebel_fail_expo\n\t\t\t*else\n\t\t\t\t*goto rebel_fail_expo\n\t\t*else\n\t\t\t\"Then our people truly are doomed,\" she mutters.\n\t\t\t*goto chesty\n\t\t\t\n\t#...that you are sorry it has come to this.\n\t\t*if mil_trust \u003c 50\n\t\t\t\"This is not over, Captain,\" she replies bitterly.  \"Make no mistake.\"\n\t\t\t*goto chesty\n\t\t*else\n\t\t\t\"You cannot be more sorry than I am, Captain.\"\n\t\t\t*goto chesty\n\t*if alliance_true > 50\n\t\t#...that only now is ${plan_name} truly free.\n\t\t\t*if mil_trust \u003c 50\n\t\t\t\t\"${plan_name} is not free,\" she replies bitterly, \"but it will be.\"\n\t\t\t\t*if chest_shot = true\n\t\t\t\t\t\n\t\t\t\t\tAs the world fades to black around you, you are left to wonder what she means.\n\t\t\t\t\t*goto rebel_fail_expo\n\t\t\t\t*else\n\t\t\t\t\t\n\t\t\t\t\tYou are left to wonder what she means.\n\t\t\t\t\t*goto rebel_fail_expo\n\t\t\t*else\n\t\t\t\t\"${plan_name} is not free,\" she replies, \"but it will be.\"\n\t\t\t\t*if chest_shot = true\n\t\t\t\t\t\n\t\t\t\t\tAs the world fades to black around you, you are left to wonder what she means.\n\t\t\t\t\t*goto rebel_fail_expo\n\t\t\t\t*else\n\t\t\t\t\t\n\t\t\t\t\tYou are left to wonder what she means.\n\t\t\t\t\t*goto rebel_fail_expo\n\t*if alliance_true \u003c=50\n\t\t#...that you did what you did for the good of ${plan_name}.\n\t\t\t*if mil_trust \u003c 50\n\t\t\t\t\"There will be more than only this done in the name of ${plan_name},\" she replies bitterly.  \"Wait and see.\"\n\t\t\t\t*if chest_shot = true\n\t\t\t\t\t\n\t\t\t\t\tAs the world fades to black around you, you are left to wonder what she means.\n\t\t\t\t\t*goto rebel_fail_expo\n\t\t\t\t*else\n\t\t\t\t\t\n\t\t\t\t\tYou are left to wonder what she means.\n\t\t\t\t\t*goto rebel_fail_expo\n\t\t\t*else\n\t\t\t\t\"I believe you, Captain,\" she replies.\n\t\t\t\t*goto chesty\n\n*label chittychat\nYou tell the Lieutenant...\n*choice\n\t#...that she only thinks she wants to fight the Alliance.\n\t\tYou tell Lieutenant Demian that you can see the fear in her eyes, and warn her that no action this dishonorable can succeed.\n\t\t\n\t\t*if mil_trust \u003c 50\n\t\t\t\"There is no dishonor in loyalty,\" she replies snidely.  \"Only in treason.\"\n\t\t\t\n\t\t\t*goto postchat\n\t\t*else\n\t\t\t\"For the sake of our people, I hope you are wrong, old friend.\"\n\t\t\t\n\t\t\t*goto postchat\n\t*if alliance_true >=50\n\t\t#...that any action against your Alliance comrades goes against the virtues of your people.\n\t\t\tYou tell Lieutenant Demian that any movement against the Alliance would mean shedding the blood of those who have shed blood for her people's sake mere moments ago.\n\t\t\t\n\t\t\t*if mil_trust \u003c 50\n\t\t\t\t\"They shed their blood to control our people,\" she refutes.  \"And if I must, I will shed my own to stop them.\"\n\t\t\t\t\n\t\t\t\t*goto postchat\n\t\t\t*else\n\t\t\t\t\"They shed their blood to control us,\" she refutes.  \"Like all conquerors.  And I am willing to shed my own to stop them.  I only wish you understood, old friend.\"\n\t\t\t\t\n\t\t\t\t*goto postchat\n\n\t*if alliance_true \u003c 50\n\t\t#...that although you agree with her politics, you feel this is an ignoble path.\n\t\t\tYou tell Lieutenant Demian that although you are with her in spirit, you reject the notion that the Alliance must be dealt such a traitorous blow.\n\t\t\t\n\t\t\t*if mil_trust \u003c 50\n\t\t\t\t\"If you were truly 'with' us,\" she replies, \"then you would know that they are not deserving of your sympathy.  They are thieves, Captain.  And you are something even worse.\"\n\t\t\t\t\n\t\t\t\t*goto postchat\n\t\t\t*else\n\t\t\t\t\"It is the only way that our people can be truly free, Captain.  I wish you understood this.\"\n\t\t\t\t\n\t\t\t\t*goto postchat\n\n\t#...that she is putting lives at risk for a political goal.\n\t\tYou tell Lieutenant Demian that her politics are no reason to shed blood.\n\t\t\n\t\t*if mil_trust \u003c 50\n\t\t\t\"Why not?\" she asks.  \"Today, the Alliance has shed their own blood to claim ${plan_name} for themselves.  I am fighting back the only way I know how.\"\n\t\t\t\n\t\t\t*goto postchat\n\t\t*else\n\t\t\t\"Why not?\" she asks.  \"I would gladly shed my own, for this cause.  I only wish you understood, old friend.\"\n\t\t\t\n\t\t\t*goto postchat\n*label postchat\n*return\n\n*label demian_philosophy\nYou tell the Lieutenant...\n*choice\n\t#...that whatever she has planned, it will fail.\n\t\tYou tell Lieutenant Demian that you can see the fear in her eyes.  You warn her that no plan this desperate can succeed.\n\t\t\n\t\t*if mil_trust \u003c 50\n\t\t\t\"It is you who are the desperate one now,\" she hisses.\n\t\t\t\n\t\t\t*goto post_philosophy\n\t\t*else\n\t\t\t\"It is the only way for our people to be truly free.  I only wish you understood, old friend.\"\n\t\t\t\n\t\t\t*goto post_philosophy\n\t*if alliance_true >=50\n\t\t#...that this is not the right way to gain what she seeks.\n\t\t\tYou tell Lieutenant Demian that she has set a dangerous precedent, by using violence against those who have shed blood for her people mere moments ago.\n\t\t\t\n\t\t\t*if mil_trust \u003c 50\n\t\t\t\t\"They shed their blood to control our people,\" she refutes.  \"And if I must, I will shed my own to stop them.\"\n\t\t\t\t\n\t\t\t\t*goto post_philosophy\n\t\t\t*else\n\t\t\t\t\"They shed their blood to control us,\" she refutes.  \"Like all conquerors.  And I am willing to shed my own to stop them.  I only wish you understood, old friend.\"\n\t\t\t\t\n\t\t\t\t*goto post_philosophy\n\t*if alliance_true \u003c 50\n\t\t#...that although you agree with her politics, you feel this is an ignoble path.\n\t\t\tYou tell Lieutenant Demian that although you are with her in spirit, you reject the notion that the Alliance must be dealt such a traitorous blow.\n\t\t\t\n\t\t\t*if mil_trust \u003c 50\n\t\t\t\t\"If you were truly 'with' us,\" she replies, \"then you would know that they are not deserving of your sympathy.  They are thieves, Captain.  And you are something even worse.\"\n\t\t\t\t\n\t\t\t\t*goto post_philosophy\n\t\t\t*else\n\t\t\t\t\"It is the only way that our people can be truly free, Captain.  I only wish you understood this.\"\n\t\t\t\t\n\t\t\t\t*goto post_philosophy\n\t#...that if her rebellion requires the armed takeover of your ship, it cannot represent the priorities of your people.\n\t\t\tYou tell her that if ${plan_name} were truly being represented by her rebellion, there would be no opposition to it aboard the ship.\n\t\t\t\n\t\t\t*if mil_trust \u003c 50\t\t\t\n\t\t\t\t\"And does the Alliance represent ${plan_name}?  Were any of our people even asked if they wanted to hand over their future to their care?  Or was that decided for them, in a time of crisis, by those who stood to gain the most from their fear?\"\n\t\t\t\t\n\t\t\t\t*goto post_philosophy\n\t\t\t*else\n\t\t\t\t\"Those who oppose us are merely blinded by the empty promises of the Alliance.  They will come to understand we are doing, once ${plan_name} is truly free.  I only wish you understood, old friend.\"\n\t\t\t\t\n\t\t\t\t*goto post_philosophy\n*label post_philosophy\n*return\n\n*label rebel_fail_expo\n*page_break\n*if chest_shot = true\n\tDays later, you are visited by ${expo_title} ${expo_name} in the sick bay of a Calpurnian vessel.\n*if chest_shot = false\n\tDays later, you are visited by ${expo_title} ${expo_name} in the diplomatic chamber of your cruiser.\n\n\"Your bravery is great,\" the ${expo_title} says.  \"You have truly saved ${expo_your_our} people.  From the ${enemy_name}, and from themselves.\"\n\n*choice\n\t#Say that you only did what was necessary.\n\t\t*if poor_guy = true\n\t\t\tYou say that you only did what the situation demanded, as did the Astrogator who issued the warning signal.\n\t\t\t\n\t\t\t\"You are both to be thanked,\" the ${expo_title} replies.  \"But let us no longer dwell on the struggle.  Today, let us speak only of the future.\"\n\t\t\t*page_break\n\t\t\t*goto scenario_one_expo\n\t\t*else\n\t\t\tYou say that you only did what the situation demanded.\n\t\t\t\n\t\t\t\"And for that you are to be thanked,\" the ${expo_title} replies.  \"But let us no longer dwell on the struggle.  Today, let us speak only of the future.\"\n\t\t\t*page_break\n\t\t\t*goto scenario_one_expo\n\t*if chest_shot = true\n\t\t#Say that it is merely a flesh wound.\n\t\t\tYou brag that your injuries did not amount to much.\n\t\t\t\n\t\t\t\"On the contrary,\" ${expo_title} replies, \"if it were not for the immediate attention of the Alliance medics, we would not be speaking now.  But let us no longer dwell on the struggle.  Today, let us speak only of the future.\"\n\t\t\t*page_break\n\t\t\t*goto scenario_one_expo\n\t*if poor_guy = true\n\t\t#Say that you did not act alone.\n\t\t\tYou say that the Astrogator who issued the warning signal is the real hero.\n\t\t\t\n\t\t\t\"You are both to be thanked,\" the ${expo_title} replies.  \"But let us no longer dwell on the struggle.  Today, let us speak only of the future.\"\n\t\t\t*page_break\n\t\t\t*goto scenario_one_expo\n\t#Ask what the Alliance was planning to do to stop the rebellion, had you not interceded.\n\t\tThe ${expo_title} brushes aside your question.  \n\t\t*goto lets_not_dwell\n\n*label demian_victory_chat\nWhen her victory appears inevitable, Lieutenant Demian looks at you meaningfully.  You...\n*choice\n\t#...tell her that she has committed a great injustice.\n\t\t\"On the contrary, I have prevented one,\" she says.  \"And restored our planet to our people.\"  Minutes later, the surrender of the Alliance is declared.\n\t\t\n\t\t*return\n\t#...beg her forgiveness.\n\t\tShe laughs.  \"Surely you can't expect me, or any other citizen of ${plan_name}, to trust you.\"  Minutes later, the surrender of the Alliance is declared.\n\t\t\n\t\t*return\n\t#...spit directly in her face.\n\t\tHer fury turns cold.  \"You will pay for that in time,\" she says, and it does not appear that you will wait for long.  Minutes later, the surrender of the Alliance is declared.\n\t\t*return\n\n*label start_of_rebellion_trust\n*if insincere_rebel = true\n\tThe time has come for you to stop Lieutenant Demian's rebellion.  But in order for the trap to spring, the rebels must believe you are on their side.\n\t\n\tLieutenant Demian cuts the communication signal to the other Alliance ships, so that you can address only your fleet.\n*if insincere_rebel = false\n\tNow, the time has come to turn the tide against the Alliance.  Lieutenant Demian cuts the communication signal to the other Alliance ships, so that you can address only your fleet.\n\nYou tell your fellow soldiers that you are going to commandeer the gunships, and turn them against the Alliance.  You say...\n*choice\n\t#...that any aboard your ships who stand in the way of the rebellion will pay with their lives.\n\t\t*if mil_trust >=50\n\t\t\tYou send a message that could not be clearer, but it appears that your forces will not need to exert themselves today.  Officer Zagi attempts to send a warning to the Alliance, and is quickly stunned by one of the rebels.  \n\t\t\t*gosub successful_ask\n\t\t\t*return\n\t\t*else\n\t\t\tYou send a message that could not be clearer, but it appears that several crew members would rather die than follow your lead.  \n\t\t\t*gosub failed_ask\n\t\t\t*return\n\t#...that those who do not wish to participate in the rebellion stand down, and they will come to no harm.\n\t\t*if mil_trust >=50\n\t\t\tIt appears that your forces will not need to exert themselves today.  Officer Zagi surrenders, and is quickly detained.  One of the rebels replaces her at the tactical station.\n\t\t\t*gosub successful_ask\n\t\t\t*return\n\t\t*else\n\t\t\tYou have offered your crew a peaceful solution, but it appears that several would rather die than follow your lead.  \n\t\t\t*gosub failed_ask\n\t\t\t*return\n\t#...that each soldier should do as they see fit.\n\t\t*if mil_trust >=50\n\t\t\tYou ask your crew to follow their consciences, but most of them seem to be in line with your will.  Officer Zagi attempts to connect to the Alliance, presumably to warn them, but she is quickly stunned by one of the rebels.  \n\t\t\t*gosub successful_ask\n\t\t\t*return\n\t\t*else\n\t\t\tYou ask your crew to follow their consciences, a request which guides several of them to open fire on you.  \n\t\t\t*gosub failed_ask\n\t\t\t*return\n\t\t\t\n*label successful_ask\nThe rest of the bridge seems to be standing with you in solidarity.\n\nReports soon come from the other vessels that they have been likewise secured by the rebellion.  \n*if insincere_rebel = true\n\tYou are overcome with...\n\t*choice\n\t\t#...excitement.  Your plan to trick Lieutenant Demian is proceeding.\n\t\t\t*if alliance_true > 50\n\t\t\t\tSoon the path to ${plan_name} will be clear for the Alliance!\n\t\t\t\t*goto insincere\n\t\t\t*else\n\t\t\t\tSoon this madness will be over.\n\t\t\t\t*goto insincere\n\t\t#...guilt.  It disgusts you to feign support for this dishonorable rebellion.\n\t\t\tBut you know, too, that it is too late to change your mind.\n\t\t\t*goto insincere\n\t\t#...doubt.  You are no longer certain that this is the safest course of action.\n\t\t\tBut you know, too, that it is too late to change your mind.\n\t\t\t*goto insincere\n*label insincere\n*page_break\n*return\n\n*label failed_ask\nThe bridge erupts in panic and pulse-gun blasts, and it is some time before the chaos winds down.  Eventually the ship is taken, and reports come from the other ${plan_name} ships that they have been likewise secured.\n\n*if insincere_rebel = true\n\tYou are overcome with...\n\t*choice\n\t\t#...excitement.  Your plan to trick Lieutenant Demian is proceeding.\n\t\t\t*if alliance_true > 50\n\t\t\t\tSoon the path to ${plan_name} will be clear for the Alliance!\n\t\t\t\t*goto in_insincere\n\t\t\t*else\n\t\t\t\tSoon this madness will be over.\n\t\t\t\t*goto in_insincere\n\t\t*if alliance_true > 50\n\t\t\t#...guilt.  You are disgusted to think that your deception has caused the death of fellow Alliance supporters.\n\t\t\t\tBut you know, too, that it is too late to change your mind.\n\t\t\t\t*goto in_insincere\n\t\t*if alliance_true \u003c=50\n\t\t\t#...guilt.  It disgusts you to know that your deception has caused the death of honorable soldiers.\n\t\t\t\tBut you know, too, that it is too late to change your mind.\n\t\t\t\t*goto in_insincere\n\t\t#...doubt.  You are no longer certain that this is the safest course of action.\n\t\t\tBut you know, too, that it is too late to change your mind.\n\t\t\t*goto in_insincere\n*label in_insincere\n*page_break\n*return\n\n*label gloat_thru_boarding\nPassenger carriers launch, to take manual control of the gunships.  You and Lieutenant Demian board one of them.\n\nRebel soldiers surround you in the cabin of the transport, preparing their weapons.\n\n\"This is a great moment for our people,\" the Lieutenant says.  \n*if insincere_rebel = true\n\tYou cannot share your true thoughts, so you reply that...\n*if insincere_rebel = false\n\tYou reply that...\n\n*fake_choice\n\t#...you are honored to share it with her.\n\t\t\"It is our destiny,\" she replies.\n\t\t\n\t#...you are yet awaiting the moment when the Alliance is driven off for good.\n\t\t\"A sobering point, Captain.  It is foolish indeed to gloat over a victory we have yet to earn.\"\n\t\t\n\t#...the future of ${plan_name} begins now.\n\t\t\"And together, we will write its history,\" she says.\n\t\t\n*if trouble_in_store = true\n\tJust then, there is a rumble.  Alliance forces have begun to fire upon your transport ship.  Lieutenant Demian merely laughs the attack off, but you feel a profound sense of unease.  If the Alliance wants the rebels to board the gunships, why would they try to deter them from approaching?\n*page_break\t\nWhen you arrive on the dimly-lit gunship, you are surprised to see no ${enemy_name} soldiers in sight.  Only hulking Bersooni mercenaries, who retreat modestly as the rebels make their way to the control room.\n\nOnce there, the soldiers take their place at the consoles.  Reports come in from the rebels on the other gunships, also in position.  Finally, the Lieutenant issues her orders to the Core, and all at once, the interior of the vessel begins to glow with power.\n*return\n\n*label despite_the_victory\nDespite this victory, Lieutenant Demian appears concerned.  She is watching the holographic field carefully, cautiously.  \"Something is wrong,\" she says.\n\nShe suggests you head to your cabin to discuss the matter.  Once there, you hear a discharge of weapons outside the door, and the Lieutenant's hand emerges from her pocket with a pulse gun.  \"Don't move, Captain.  My fellow rebels have not yet secured the bridge.  It isn't safe.\"\n*return\n\n*label she_guessed\nIt seems that Lieutenant Demian has guessed you are in league with the Alliance.\n\n\"I don't know why you and your Alliance cohorts are trying to trick me into boarding these gunships, but it stands to reason I should do the opposite.  Once my rebels have secured the fleet, I will engage a signal to commandeer the ships remotely.\"\n\nYou know it is your best bet to maintain your facade of support for the rebellion, so you assure the Lieutenant that...\n*fake_choice\n\t#...you are loyal to their cause.\n\t\tIt is apparent that Lieutenant Demian knows you are in league with the Alliance, but you do your best to convince her otherwise.  \"No more lies,\" she says.  \"You had your chance to lead alongside me.  Now march, prisoner.\"\n\t\t\n\t#...your warning to avoid the use of a control signal is a legitimate one.\n\t\tYou do your best to convince Lieutenant Demian that you are not working against her.  You tell her that, by linking to the gunships, she is making a terrible mistake.\n\t\t\n\t\t\"My only mistake would be trusting you,\" she says.  \"Ever again.  Now march, prisoner.\"\n\t\t\n\t#...the rebellion will be doomed if she chooses incorrectly.\n\t\tYou realize that Lieutenant Demian knows you are in league with the Alliance, but you try to explain that she is mistaken, and that if she chooses unwisely, the rebellion may well end today.\n\t\t\n\t\t\"The rebellion will end today,\" she replies.  \"With its victory over the Alliance.\"\n\t\t\nRebel soldiers enter the cabin and seize you, bringing you to the bridge.  The Lieutenant orders energy be transmitted to the gunships, and all at once, the darkened ${enemy_name} vessels begin to glow with power again.\n\nThe Lieutenant smiles ruefully, and orders the terrified Officer Kelmer to commence linking with the gunships, using a control signal.  \n*return\n\n\n\n*label she_guessed_wrong\n\nLieutenant Demian, it seems, has presumed you are an Alliance spy, and that your warning about the gunships is part of some trick.  \"If your friends in the Alliance want to keep me off the gunships, there must be some reason for their reluctance.  We will board them as planned.\"\n\nYou assure the Lieutenant that...\n*fake_choice\n\t#...you are loyal to the cause of the rebellion.\n\t\tIt is apparent that Lieutenant Demian thinks you are in league with the Alliance, and you do your best to convince her otherwise.  \"No more lies,\" she says.  \"You had your chance to lead alongside me.  Now march, prisoner!\"\n\t\t\n\t#...your warning to be wary of the gunships is a legitimate one.\n\t\tYou do your best to make Lieutenant Demian understand that you are not an Alliance sympathizer.  You tell her that, by boarding the gunships, she is making a terrible mistake.\n\t\t\n\t\t\"My only mistake would be trusting you,\" she says.  \"Ever again.  Now march, prisoner!\"\n\t\t\n\t#...the rebellion will be doomed if she mistrusts you.\n\t\tYou realize that Lieutenant Demian has decided you are in league with the Alliance.  You try to explain that she is mistaken, and that if she chooses unwisely, the rebellion may well end today.\n\t\t\n\t\t\"The rebellion will end today,\" she replies.  \"With its victory over the Alliance scum!\"\n\t\t\nRebel soldiers enter the cabin and seize you.  \"Bring this one with us to the transport ships,\" Lieutenant Demian orders.  \"The Captain can see his precious Alliance fall firsthand.\"  You are marched off through the hallways of the cruiser, the smell of recently fired weaponry in the air.  Knowing that this is your last chance to stop the Lieutenant from falling into the Alliance's trap, you...\n*choice\n\t#...break free and threaten them with a pulse pistol.\n\t\t*set hostage true\n\t\tYou wrest free and grab a pistol from one of the soldiers.  You threaten Lieutenant Demian with it, and demand that the soldiers stop their advance to the passenger carriers.  But before anyone can make another move, a rebel on the far side of the hall blasts the weapon out of your hand. \n\t\t\n\t\t\"You put on a good show, Captain,\" Lieutenant Demian says.  \"Enough theatrics now.\"\n\t\t\n\t\tYou are shackled, and marched to the passenger carriers. \n\t\t*page_break\n\t\t*goto control_room\n\n\t#...use your comlink to warn the rebels that the gunships are a trap.\n\t\t*set comlink true\n\t\tYou surreptitiously activate your comlink, and use it to connect to the ship's communication system.  You announce that the rebellion is in danger, and that a trap is waiting for your soldiers aboard the gunships.  Your voice echoes down the halls of the cruiser, but your comlink is shortly seized and crushed under a rebel's boot.\n\t\t\n\t\t\"You put on a good show, Captain,\" Lieutenant Demian says.  \"Enough theatrics now.\"\n\t\t\n\t\tYou are shackled, and marched to the passenger carriers.\n\t\t*page_break\n\t\t*goto control_room\n\n\t#...attempt to sabotage the controls of the passenger vessel.\n\t\t*set sabotage true\n\t\tWhen you have arrived at the passenger vessels, you wrest free, grab a pistol from one of the soldiers, and begin blasting the controls.  You are able to disable the vehicle for the time being, but there are many others, and you are restrained before you can do any more damage.\n\t\t\n\t\t\"You put on a good show, Captain,\" Lieutenant Demian says.  \"Enough theatrics now.\"\n\t\t\n\t\tYou are shackled, and taken to another passenger carrier.\n\t\t*page_break\n\t\t*goto control_room\n\n*label control_room\n*if trouble_in_store = true\n\tWhile en route to the gunship, there is a rumbling sound.  Alliance forces have begun to fire upon you.  Lieutenant Demian merely laughs the attack off, but you feel a profound sense of unease.  If the Alliance wants the rebels to board the gunships, why would they try to deter them from approaching?\n\t*page_break\t\nWhen you arrive on the dimly-lit gunship, you are surprised to see no ${enemy_name} soldiers in sight.  Only hulking Bersooni mercenaries, who retreat modestly as the rebels make their way to the control room.\n\nOnce there, the soldiers take their place at the consoles.  Reports come in from the rebels on the other gunships, also in position.  Finally, the Lieutenant issues her orders to the Core, and all at once, the interior of the vessel begins to glow with power.\n*return"}};
