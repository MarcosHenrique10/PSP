, whatever the cost to the ${enemy_name}.\n\t\t\n\t\tCouncilor Tayu laughs bitterly, but his fury never disappears.  \"And what will be the cost to our people,\" he asks, \"when we are unable to win back ${plan_name}?  The ${enemy_name} have shared news of this attack with the entire civilized universe.  This has cost the Alliance dearly.\"\n\t\t\n\t\t*gosub dissemination_expo\n\t\t*if continued_cruelty = true\n\t\t\t*goto second_exchange\n\t\t*else\n\t\t\t*goto second_exchange_suddenly\n\n\t#...that the ${enemy_name} city's purpose was the production of artificially-intelligent weaponry, and the civilians who died there were war criminals.\n\t\tYou explain that the civilians in the ${enemy_name} city knew that they were contributing to the ${enemy_name} war effort, and that their lives were fairly taken.\n\t\t\n\t\tCouncilor Tayu laughs bitterly, but his fury never disappears.  \"Forgetting that this 'defense' of yours could be used to justify the destruction of several of our own cities, did you ever stop to think that the ${enemy_name} would share the news of your righteous barbarity with the universe at large?  And that the Alliance, being out of communication with your fleet, would have no way to counteract their claims?\"\n\t\t\n\t\t*gosub dissemination_expo\n\t\t*if sudden_cruelty = true\n\t\t\t*goto second_exchange_suddenly\n\t\t*else\n\t\t\t*goto second_exchange\n\n*label second_exchange\nYou say...\n*choice\n\t#...that you should be lauded for your actions.\n\t\t\"Then you are mad!\" Councilor Tayu barks.  \"But enough arguing...\"\n\t\t*goto can_we_trust_you\n\t#...that you refuse to play the part of the helpless refugee, simply because it would benefit the Alliance politically.\n\t\t\"We are not asking that you play any role other than that of a civilized leader!\" Councilor Tayu responds.  \"One which eludes you, it would seem...\"\n\t\t*goto can_we_trust_you\n\t#...that you are sorry.\n\t\t\"Then you will have ample opportunity to prove it...\" Councilor Tayu says.\n\t\t*goto can_we_trust_you\n\n*label dissemination_expo\nHe turns away, too disgusted to continue speaking.  Ambassador Bashena takes over for him.  \"The ${enemy_name} disseminated only the information that would benefit them.  The citizens of the Outer Systems were not told about the weapons in the Null Zone settlement.  They were only told that it was an experimental community, and that your fleet destroyed it, killing thousands of civilians.  The evidence of the attack is supported by the records of their defense systems, which have been shared freely.\"\n\n*return\n\n\n*label suddenly_mean\n*gosub no_empress\n\n\n\"With that formality at an end, we can move to more pressing matters,\" Ambassador Bashena says.  \n*if skeletons >=2\n\t\"Your fleet suffered great hardships in the Null Zone, in no small part because we were unable to extract you sooner.  \n*if skeletons \u003c 2\n\t\"Your fleet suffered in the Null Zone, in no small part because we were unable to extract you sooner.  \nBut do you realize, Captain, that your careless acts of destruction against the ${enemy_name} were the very reason for our delay?\"\n\nBefore you can respond, Councilor Tayu speaks.  \"Your attack on the ${enemy_name} city was an affront to all civilized life!\" he says.  \"What can you possibly say to justify the chaos you have caused?\"\n\t\n*goto defend_yourself\n\n*label second_exchange_suddenly\n*choice\n\t#Say that you are sorry.\n\t\t\"Well, make no mistake, you will be expected to prove it...\" Councilor Tayu says.\n\t\t*goto can_we_trust_you\n\t#Tell them that you are ashamed.\n\t\t\"The time has come for actions, not words...\" Councilor Tayu says.\n\t\t*goto can_we_trust_you\n\t#Declare that you should be lauded for your actions.\n\t\t\"Then you are mad!\" Councilor Tayu barks.  \"But enough arguing...\"\n\t\t*set alliance_out 10\n\t\t*goto can_we_trust_you\n\t#Explain that you refuse to play the part of the helpless refugee, simply because it would benefit the Alliance.\n\t\t*set alliance_out 10\n\t\t\"We are not asking that you play any role,\" Councilor Tayu counters, \"other than that of a civilized leader!  Which brings us to our next matter...\"\n\t\t*goto can_we_trust_you\n\n*label lost\n*gosub no_empress\n\n\n\n\"With that formality done, we can move to more pressing matters,\" Councilor Tayu says.  \n*if skeletons > 0\n\t\"Your journey to the Null Zone was a fiasco, and you were defeated once again by the ${enemy_name}.  \n*if skeletons = 0\n\t\"Your journey to the Null Zone resulted in yet another a disgrace at the hands of the ${enemy_name}.  \n*if alliance_out >=25\n\tWe have concealed the truth of this from the other Allied systems, but we wonder whether we can count on you to fulfill your promise in the battle ahead.\"\n\t\n*if alliance_out \u003c 25\n\tAnd while it would be my pleasure to share your failure with the Alliance, we have instead concealed it, for the sake of our cause.  Yet we wonder whether we can count on you to maintain control of your fleet during battle ahead.\"\n\t\n\"Understand,\" Ambassador Bashena adds, \"that the burden of this operation will not be yours alone.  But you are the only captain with experience in the ${plan_name} quadrant, and our forces will be following your lead.  What have you to say?\"\n\nYou tell them...\n*label excuse_choice\n*choice\n\t*hide_reuse #...that they should relieve you from active duty and have Lieutenant Demian take your place as Fleet Captain.\n\t\t\tYou respectfully request that you be relieved of your responsibilities as Fleet Captain, and that Lieutenant Demian be promoted in your place.\n\t\t\t\n\t\t\t\"Would that this were feasible...\" Ambassador Bashena says, and then trails off.  She exchanges a mysterious look with Councilor Tayu, but says no more.  You get the sense that she is withholding something from you.\n\t\t\t\n\t\t\tAs the silence deepens, you realize that your response is still expected.  You tell them...\n\t\t\t*goto excuse_choice\n\t#...that you apologize.\n\t\t\t\"The time for apologies is over,\" Councilor Tayu says.  \"Now is the time for victory.\"\n\t\t\t*page_break\n\t\t\t*goto one_last_question\n\t#...that you are ready to rise to the challenge.\n\t\t\"Do that, Captain,\" Councilor Tayu urges.  \"There is more at stake than your reputation.\"\n\t\t*page_break\n\t\t*goto one_last_question\n\t#...that they should be grateful you have kept as many people alive as you have.\n\t\tYou tell them that the very survival of your people is as sure a victory as any, considering your situation.\n\t\t\t\n\t\t*if alliance_out >=25\n\t\t\t\"Your pride has not won any battles for you thus far,\" Councilor Tayu sneers.  \"And so I advise that you dispense with it, before it costs you more than just your reputation.\"\n\t\t\t*page_break\n\t\t\t*goto one_last_question\n\t\t*else\n\t\t\t\"I should have expected this sort of response from you,\" Councilor Tayu sneers.  \"But survival alone will not win back ${plan_name}.  Only victory can do that.\"\n\t\t\t*page_break\n\t\t\t*goto one_last_question\n\n*label suddenly_lost\n*gosub no_empress\n\n\"With that formality finished, we can move to more pressing matters,\" Councilor Tayu says.  \"We are, quite frankly, concerned.  \n*if skeletons !=0\n\tYour journey to the Null Zone was a fiasco, and you were disgraced at the hands of our enemy.    \n*if skeletons = 0\n\tYour journey to the Null Zone resulted in a disgrace at the hands of the ${enemy_name}.  \n*if alliance_out >=25\n\tWe have concealed this from the other Allied systems, of course.  But we wonder whether we can count on you to regain your focus in the battle ahead.\"\n\n*if alliance_out \u003c 25\n\tWe have done what we can to conceal the truth.  But we wonder whether we can count on you to maintain control of your fleet during the battle ahead.\"\n\n\"Understand,\" Ambassador Bashena adds, \"that @{(rep >=40) the other Alliance systems will be looking for your guidance.  This is your battle to lead.\"|your squadron is larger than any of the others that have joined our cause.  And you are the only captain with experience defending the ${plan_name} quadrant.\"}\n\t\nYou tell them...\n*goto excuse_choice\n\n*label i_lied_semi_loser\nOur supporters are now convinced that you are the great military leader Admiral Kalla believed you to be.  \n*return\n\n*label superstar\n*label up_and_comer\n*set empress true\nYou retire to a diplomatic chamber after the event.  The hall is decorated for a celebration, and crowded with representatives of the Outer Systems.\n\nThe Empress walks you away from the throng for a moment, and the other attendees respectfully recede, but for \n*if alliance_true >=50\n\ttwo members of the royal guard.  \n*if alliance_true \u003c 50\n\ther personal bodyguards, who hover within intervention's range.  \t\n*if alliance_true > 50\n\tYou are honored indeed to be in the leader's presence.\n*if alliance_true = 50\n\tYou have heard her enemies describe her as a despot, but she is most gracious to you today.\n*if alliance_true \u003c 50\n\tRegarding her cold grey eyes, you have no doubt that all the stories of her famous cruelty are true.\n*if grixtory \u003c 50\n\t*goto tryitout\n*if revolt_success = true\n\t*goto tryitout\n*if stasis = true\n\t*goto tryitout\n*if deadly_blackout = true\n\t*label tryitout\n\t\"I humbly offer my apologies for the trials you faced in the Null Zone.  Had we known what awaited you there, our leaders would have sought another way to protect your fleet.  And yet there is still reason to celebrate.  \n\t*if sudden_victory = true\n\t\tYour recent victory against the ${enemy_name} showed great ingenuity.  Make no mistake, they are skilled warriors.  You should be proud for having bested them.\"  \n\t*if continued_victory = true\n\t\tYour victories against the ${enemy_name} have shown great ingenuity.  Make no mistake, they are skilled warriors, and you have bested them twice now.\"  \n\t*if alliance_out \u003c 50\n\t\t\n\t\tThe Empress looks you directly in the eyes.  \"Admiral Kalla was right.  In you there is great potential.\"  \n\t*if alliance_out >=50\n\t\t\n\t\tThe Empress looks you directly in the eyes.  \"We expect great things from you, Captain.  Not merely in the coming battle, but in the future of our Alliance.\"  \n\t*goto first_emp_choice\n*if alliance_out \u003c=25\n\t*goto confront\n*if sudden_victory = true\n\t\"Your recent victory against the ${enemy_name} showed great ingenuity.  Make no mistake, they are skilled warriors.  You should be proud for having bested them.\"  \n*if continued_victory = true\n\t\"Your victories against the ${enemy_name} have shown great ingenuity.  Make no mistake, they are skilled warriors, and you have bested them twice now.\"  \n\n\nThe Empress looks you directly in the eyes.  \"We expect great things from you, Captain.  Not merely in the coming battle, but in the future of our Alliance.\"  \n*label first_emp_choice\n*if alliance_out \u003c=25\n\t*choice\n\t\t#Say that you will show the Empress more evidence of this in the battle for ${plan_name}.\n\t\t\t\"Indeed you are a brave leader,\" she says.  \n\t\t\t*goto and_yet\n\t\t#Tell her the ${enemy_name} will perish if they do not make way for you.\n\t\t\t\"Indeed you are a brave leader,\" she says.  \n\t\t\t*goto and_yet\n\t\t#Explain you are no student, but a Fleet Captain, and there is more in you than mere \"potential.\"\n\t\t\tThe Empress seems amused by your response.  \"You are clearly a proud leader,\" she says.  \n\t\t\t*goto and_yet\n*if alliance_out > 25\n\t*choice\n\t\t#Say that you have every intention of fulfilling her expectations.\n\t\t\t\"Of this I have no doubt,\" she says.  \n\t\t\t*goto second_emp_exchange\n\t\t#Tell her that you have only done what you can to protect what you hold dear.\n\t\t\t\"This is the very heart of our cause,\" she says.  \n\t\t\t*goto second_emp_exchange\n\t\t#Explain that it is your vision of that future which drives you.\n\t\t\t\"And it shall be a glorious one,\" she says.\n\t\t\t*goto second_emp_exchange\n\n*label confront\n*if sudden_victory = true\n\t\"Your recent victory against the ${enemy_name} showed great ingenuity.  Make no mistake, they are skilled warriors.  You should be proud for having bested them.  \n*if continued_victory = true\n\t\"Your victories against the ${enemy_name} have shown great ingenuity.  Make no mistake, they are skilled warriors, and you have bested them twice now.  \n*if (political_mana \u003c 40)\n\tAnd yet my sources tell me that you do not favor our Alliance.  You have said as much at the diplomatic table.\"\n*if (political_mana >=40)\n\tAnd yet, despite your proud showing at the diplomatic table, sources close to me say that you do not truly favor our Alliance.\"\n*label confrontation_response\n\n*if alliance_true > 50\n\tYou say...\n\t*choice\n\t\t#...that you are merely a supporter of the Alliance who has yet to learn the art of public expression.\n\t\t\tThe Empress smiles, though there is steel in her eyes.  \"You seem to be improving at it,\" she says.  \n\t\t\t*goto second_emp_exchange\n\t\t#...that you had no idea an honest discussion at the diplomatic table would cause the Alliance to question your loyalty.\n\t\t\tThe Empress smiles, though there is steel in her eyes.  \"I apologize for our sensitivity,\" she says.  \n\t\t\t*goto second_emp_exchange\n\t\t#...that her sources are incorrect.\n\t\t\tThe Empress smiles, though there is steel in her eyes.  \"I am sure it was merely a misunderstanding,\" she says.  \n\t\t\t*goto second_emp_exchange\nYou say...\n*choice\n\t#...that she is correct.  It would be dishonorable to conceal the truth.\n\t\t*if alliance_true \u003c 50\n\t\t\tThe Empress has shown great respect to your people, and you will not disrespect her by lying.  You say that her sources are correct: you are not a supporter of the Alliance.\n\t\t\t\n\t\t\tThe Empress smiles, though there is steel in her eyes.  \"I see,\" she says.  \n\t\t\t*goto second_emp_exchange\n\t\t*else\n\t\t\tThe Empress has shown great respect to your people, and you will not disrespect her by lying.  You say that her sources are correct: you remain neutral on the matter of the Alliance.\n\t\t\t\n\t\t\tThe Empress smiles, though there is steel in her eyes.  \"I see,\" she says.  \n\t\t\t*goto second_emp_exchange\n\n\t#...that you do not allow your opinions to interfere with your duties.\n\t\tYou tell the Empress that, just as your feelings toward the Alliance have not affected your ability to defend your people, neither shall they interfere with your ability to rid ${plan_name} of the ${enemy_name}.\n\t\t\n\t\tThe Empress smiles.  \"I have no doubt of that,\" she says.  \n\t\t*goto second_emp_exchange\n\t#...that can you have no other enemy while ${enemy_name} ships still occupy ${plan_name}.\n\t\tYou tell the Empress that your goal remains the freedom of your people from the ${enemy_name} occupation, and that nothing can deter you, especially not matters of political disagreeement.\n\t\t\n\t\tThe Empress smiles.  \"I have no doubt of that,\" she says.  \n\t\t*goto second_emp_exchange\n\n*label and_yet\n*if (political_mana \u003c 40)\n\t\"And so, I am disappointed to hear that you do not favor our young Alliance.  My sources tell me you have said as much at the diplomatic table.\"\n*if (political_mana >=40)\n\t\"And so, I am disappointed that you do not favor our young Alliance.  Despite your proud showing at the diplomatic table, sources close to me say you do not truly stand with our cause.\"\n\n*goto confrontation_response\n\n*label second_emp_exchange\n\"But let us discuss another matter, and one which, I acknowledge, may be difficult for you.  I have taken it upon myself to transport the leaders of your fleet's revolt to my fortress.  Theirs were not merely crimes against the people of ${plan_name}, but Calpurnia and the Alliance itself.\"\n\nYou ask what awaits these \n*if alliance_true \u003c 50\n\t\"conspirators.\"  \n*if alliance_true >=50\n\tconspirators.  \n\"By our law, the punishment for treason is death.  Their execution will occur six moons from now, a little more than two of your standard days.  But as the Fleet Captain, should you have a different recommendation regarding their fate, I am willing to listen...\"\n\n*goto fate_of_prisoners\n\n\n*label can_we_trust_you\n\nThe Ambassador again intercedes.  \"The fact is, we find ourselves in a difficult position.  Word   \n*if continued_victory = true\n\thas spread fast of your victories over the ${enemy_name} among our supporters, \n\t*if sudden_cruelty = true\n\t\twhatever your actions toward them in the Null Zone.  \n\t*if continued_cruelty = true\n\t\twhatever their repercussions.  \n*if sudden_victory = true\n\tof your victory over the ${enemy_name} in the Null Zone has spread quickly among our supporters, whatever its repercussions outside the Alliance.  \n*if (continued_victory = false) and (sudden_victory = false)\n\thas spread fast about your fleet.  \nAnd we are reluctant to separate you, a leader who has been \n*if sudden_victory = true\n\tso recently successful, \n*if continued_victory = true\n\tso successful, \n*if (sudden_victory = false) and (continued_victory = false)\n\tso admired by your crew, \nfrom a fighting force accustomed to your command.  \n*if sudden_cruelty = true\n\tBut your actions in the Null Zone have given also us serious doubts about trusting you to maintain control.\"\n\t\n*if continued_cruelty = true\n\tBut we have our doubts about relying on you in a battle so important to our future.\"\n\t\nYou tell them...\n\n*if sudden_cruelty = true\n\t*choice\n\t\t*if alliance_out > 50\n\t\t\t#...that your obedience will extinguish all doubt.\n\t\t\t\tCouncilor Tayu seems impressed by your contriteness.\n\t\t\t\t*goto one_last_question\n\t\t#...that you will fight honorably, and win back the trust of The Alliance.\n\t\t\t*if alliance_out \u003c 25\n\t\t\t\tCouncilor Tayu seems unconvinced by your professed contriteness.\n\t\t\t\t*goto one_last_question\n\t\t\t*else\t\t\n\t\t\t\tCouncilor Tayu seems impressed by your contriteness.\n\t\t\t\t*goto one_last_question\n\t\t#...that you can be trusted to deliver justice for your people, by whatever means may be necessary.\n\t\t\tAmbassador Bashena and Councilor Tayu both eye you warily. \n\t\t\t*set alliance_out 10\n\t\t\t*goto one_last_question\n\t\t#...that you will give the ${enemy_name} something to fear.\n\t\t\tAmbassador Bashena and Councilor Tayu both eye you warily.  \n\t\t\t*set alliance_out 10\n\t\t\t*goto one_last_question\n\n*if continued_cruelty = true\n\t*fake_choice\n\t\t#...that you will continue to fight bravely for your people.\n\t\t#...that you can be trusted to deliver justice.\n\t\t#...that you will give the ${enemy_name} something to fear.\n\tAmbassador Bashena and Councilor Tayu both eye you warily.  \n\t*set alliance_out 10\n\t*goto one_last_question\n\n\n*label one_last_question\n*page_break\nA guard arrives to escort you to your chamber, but there is one more matter to discuss.\n\nAmbassador Bashena tells you that the survivors responsible for the revolt in the Null Zone have been transported to Calpurnia's royal fortress.  The Empress has declared that their crimes against your fleet are also crimes against the Alliance, and therefore Calpurnia itself.  Those responsible will be executed in six moons, a little less than two standard days from now.\n\t\n\"But if you wish, I could make a different recommendation to the Empress on your behalf,\" Ambassador Bashena offers.\n\n*goto fate_of_prisoners\n\n*label no_empress\nBut the tone shifts when you retire to a diplomatic chamber afterward, with only Councilor Tayu and Ambassador Bashena.\n*return\n\n*label fate_of_prisoners\n*choice\n\t#Recommend that the revolt's participants be imprisoned until they can be tried on ${plan_name}.\n\t\t*goto impression_matrix\n\t#Suggest the participants be freed and pardoned despite their crimes.\n\t\t*set amnesty true\n\t\t*goto impression_matrix\n\t#Let the Empress proceed with her plan to execute the traitors.\n\t\t*set civ_trust %-10\n\t\t*if empress = true\n\t\t\tYou tell the Empress that you agree with her plan.\n\t\t\t*label snack_cakes\n\t\t\t\n\t\t\t\"Very well,\" she replies.  Six moons later, the traitors are dead.\n\t\t\t*goto war_meeting\n\t\t*else\n\t\t\tYou tell Ambassador Bashena that you agree with the Empress' plan.\n\t\t\t*goto snack_cakes\n\n*label impression_matrix\n\n*if alliance_out >=25\n\t*if (continued_victory = true) or (sudden_victory = true)\n\t\t*if (continued_cruelty !=true) and (sudden_cruelty !=true)\n\t\t\t*set convinced true\n\n*if alliance_out > 50\n\t*if sudden_failure = true\n\t\t*set convinced true\n\n*if Empress = true\n\t*if amnesty = true\n\t\tYou suggest to the Empress that the merchants who led the revolt have been punished enough by their defeat.  \"I will take this under advisement,\" she says, and with that, your audience with the supreme leader of the Calpurnians is at an end.\n\t\t\n\t*if amnesty = false\n\t\tYou suggest to the Empress that the merchants who led the revolt acted out of fear, and that they may not have realized the wide-ranging implications of their actions.  You recommend that they should be tried by their own people, in a court of ${plan_name}.  \"I will take your advice under advisement,\" she says, and with that, your audience with the supreme leader of the Calpurnians is at an end.\n\t\t\n*if Empress = false\n\t*if amnesty = true\n\t\tYou suggest to the Ambassador that the merchants who led the revolt have been punished enough by their defeat.  \"I will take your advice to the Empress,\" she says, and with that, your meeting is at an end.\n\t\t\n\t*if amnesty = false\n\t\tYou suggest to the Ambassador that the merchants who led the revolt acted out of fear, and that they may not have realized the wide-ranging implications of their actions.  You recommend that they should be tried by their own people, in a court of ${plan_name}.  \"I will take your advice to the Empress,\" she says.  With that, your meeting is at an end.\n\t\t\n*if Empress = true\n\tYou are unsure just how to interpret the Empress's response until, six moons later, \n\t*if convinced = true\n\t\t*if amnesty = true\n\t\t\tyou are informed by an emissary that the prisoners have been pardoned.\n\t\t\t*set civ_trust %+15\n\t\t*if amnesty = false\n\t\t\t*set civ_trust %+10\n\t\t\tyou are informed by an emissary that the execution has been countermanded.\n\t\t\t\n\t\t\tThe prisoners will be held until they can be tried on ${plan_name}, provided you can win it back.\n\t*if convinced = false\n\t\t*set civ_trust %-10\n\t\tyou are informed by an emissary that the prisoners are dead.\n\n*if Empress = false\n\tYou are unsure whether your words will make a difference until, six moons later, \n\t*if convinced = true\n\t\t*if amnesty = true\n\t\t\t*set civ_trust %+15\n\t\t\tyou are informed by an emissary that the prisoners have been pardoned.\n\t\t*if amnesty = false\n\t\t\t*set civ_trust %+10\n\t\t\tyou are informed by an emissary that the execution has been countermanded.\n\t\t\t\n\t\t\tThe prisoners will be held until they can be tried on ${plan_name}, provided you can win it back.\n\t*if convinced = false\n\t\t*set civ_trust %-10\n\t\tyou are informed by an emissary that the prisoners are dead.\n\n*label war_meeting\n*page_break\n*if bat_style \u003c 50\n\t*set elegant true\nA war meeting is held in the royal battle chamber, \n*if rakashi = true\n\toverseen by a Rakashi general in full battle armor.\n*if rakashi = false\n\toverseen by a Tzir commandant in a skin-tight atmosphere suit.\n\t\nIn a holographic field floats a representation of ${plan_name}'s quadrant.  \n*if rakashi = true\n\tThe General counts the challenges off one by one:  \n*if rakashi = false\n\tThe Commandant points the challenges out one by one: \nhyperspace jammers, ${enemy_name} drones, and a line of manned defense cannons orbiting the planet itself.  \n*if rakashi = true\n\t\"The cannons would be a challenge to fight directly, but if we can manage to cut their power supply from the planet below, the battle will be ours!\" proclaims the General enthusiastically.  \n\t*if alliance_true > 50\n\t\tAs you regard the speaker's needle-sharp teeth and copious fur, you cannot help but be impressed that beings so different from the citizens of ${plan_name} would be willing to face these dangers alongside you.  \n\t*if alliance_true = 50\n\t\tYou are told that the Rakashi regard all battles as games, however high the stakes.  Perhaps this is the reason you detect an air of playful excitement in your presenter's demeanor.\n\t*if alliance_true \u003c 50\n\t\tYou get the uncomfortable feeling, watching the presentation, that the General is speaking about ${plan_name} like some sort of rare prize, to be won by the Rakashi for the honor of the Alliance.\n*if rakashi = false\n\t\"It would be unwise to confront the cannons directly,\" proclaims the Commandant in a strangely calming voice.  \"We will focus our energies instead on cutting their connection to the power supply on ${plan_name}.\"  \n\t*if alliance_true > 50\n\t\tAs you regard the speaker's unmistakably alien form, and its glowing white eyes, you cannot help but be impressed that beings so different from the citizens of ${plan_name} would be willing to face these dangers alongside you.  \n\t*if alliance_true = 50\n\t\tYou are told that the Tzir regard all battles as puzzles, to be solved rather than fought.  Perhaps this is the reason for the presenter's placid demeanor.\n\t*if alliance_true \u003c 50\n\t\tYou get the uncomfortable feeling, watching the presentation, that the Commandant is speaking about ${plan_name} like a business acquisition, to be acquired by the Tzir for the honor of the Alliance.\n\n*label motivational_speaker\n*if rakashi = true\n\t\n\tNow the Rakashi General \n*if rakashi = false\n\t\n\tNow the Tzir Commandant \ngives the podium over to you.  \nYou know it will be important to bring the different combatants in line with your battle style, so you begin your speech by making it clear that you believe...\n*choice\n\t#...victory is achieved best by using the enemy's energy against itself.\n\t\tFinding the right approach to a scenario, you explain, is about taking advantage of the enemy's own aggression.  Through careful observation, you can even trick them to destroying themselves.\n\t\t*if elegant = true\n\t\t\t*set talking_points +10\n\t\t\t*gosub what_i_meant\n\t\t\t*goto question_two\n\t\t*else\n\t\t\t*gosub not_what_i_meant\n\t\t\t*goto question_two\n\t#...one's destructive force must be demonstrated from the outset.\n\t\tImpressing the enemy with your sheer power, you explain, will often stun them into submission from the start.\n\t\t*if elegant = false\n\t\t\t*set talking_points +10\n\t\t\t*gosub what_i_meant\n\t\t\t*goto question_two\n\t\t*else\n\t\t\t*gosub not_what_i_meant\n\t\t\t*goto question_two\n\n\t#...the best strategies require the least effort.\n\t\tEvery strategy, you explain, has a simple solution that may not even require traditional conflict.  You make it clear that distraction and confusion are as effective in warfare as destruction.\n\t\t*if elegant = true\n\t\t\t*set talking_points +10\n\t\t\t*gosub what_i_meant\n\t\t\t*goto question_two\n\t\t*else\n\t\t\t*gosub not_what_i_meant\n\t\t\t*goto question_two\n\n\t#...the best victories leave the opponent awestruck with fear.\n\t\tYou make it clear that it is not enough to harm the opponent's forces, you must also harm their morale.  The best way to achieve this, you explain, is by crushing them so effectively that the power of their defeat burns into their memory.\n\t\t*if elegant = false\n\t\t\t*set talking_points +10\n\t\t\t*gosub what_i_meant\n\t\t\t*goto question_two\n\t\t*else\n\t\t\t*gosub not_what_i_meant\n\t\t\t*goto question_two\n\n*label question_two\nAs another illustration of your beliefs regarding combat, you reference the well-known proverb of...\n*choice\n\t#...the Ilurian planet-killer, a weapon that was employed only once by its creators.  The device's destructive force was so terrifying, the Ilurians became legendary after using it, and they supposedly never fought another war.\n\t\t*if elegant = false\n\t\t\t*set talking_points +10\n\t\t\t*gosub what_i_meant2\n\t\t\t*goto question_three\n\t\t*else\n\t\t\t*gosub not_what_i_meant2\n\t\t\t*goto question_three\n\n\t#...the clever shepherd king of Daltrese, who frightened an invading army away by placing hundreds of glow-crystals in a desert valley the night before the attack.  The invaders mistook these clusters of light for the camplights of fierce Andooshian brigands, and the attack on the shepherds was abandoned.\n\t\t*if elegant = true\n\t\t\t*set talking_points +10\n\t\t\t*gosub what_i_meant2\n\t\t\t*goto question_three\n\t\t*else\n\t\t\t*gosub not_what_i_meant2\n\t\t\t*goto question_three\n\n\t#...the walled city of Drelk, whose Zaar chose to wait seven standard days before responding to a siege by an army of grafters.  The grafters fell into dissent, and literally disassembled each other.  By the time the Zaar answered their challenge, none of his enemies remained whole.\n\t\t*if elegant = true\n\t\t\t*set talking_points +10\n\t\t\t*gosub what_i_meant2\n\t\t\t*goto question_three\n\t\t*else\n\t\t\t*gosub not_what_i_meant2\n\t\t\t*goto question_three\n\n\t#...the ruthless pilots of Tavis-16.  They were so feared that the progeny of their enemies have been born with actual memories of their attacks for seventy generations and counting.\n\t\t*if elegant = false\n\t\t\t*set talking_points +10\n\t\t\t*gosub what_i_meant2\n\t\t\t*goto question_three\n\t\t*else\n\t\t\t*gosub not_what_i_meant2\n\t\t\t*goto question_three\n\n*label question_three\n*set old_talking_points_score talking_points\n*if rakashi = true\n\tOne of the Rakashi Lieutenants, \n*if rakashi = false\n\tOne of the Tzir Lieutenants, \n*if talking_points = 0\n\twho seems befuddled by your speech, \n*if talking_points = 10\n\twho is still uncertain of your meaning, \n*if talking_points = 20\n\twho seems fascinated by your approach to the military sciences, \nasks if you have any closing advice for the Alliance squadrons.\n*choice\n\t#\"If you remove its head, even the dreaded fireworm cannot strike.\"\n\t\t*if elegant = false\n\t\t\t*set talking_points +10\n\t\t\t*goto summation\n\t\t*else\n\t\t\t*goto summation\n\n\t#\"Those who deliver death without fear will be immune to both.\"\n\t\t*if elegant = false\n\t\t\t*set talking_points +10\n\t\t\t*goto summation\n\t\t*else\n\t\t\t*goto summation\n\n\t#\"By confounding the expectations of your enemy, you have dealt them a powerful blow without firing a single shot.\"\n\t\t*if elegant = true\n\t\t\t*set talking_points +10\n\t\t\t*goto summation\n\t\t*else\n\t\t\t*goto summation\n\n\t#\"All aggression comes from a central weakness.  You must find that weakness in your enemy, and use it to your advantage.\"\n\t\t*if elegant = true\n\t\t\t*set talking_points +10\n\t\t\t*goto summation\n\t\t*else\n\t\t\t*goto summation\n\n*label summation\n*if old_talking_points_score = 0\n\t*if talking_points = 0\n\t\tYour audience remains confused, and you leave the podium in awkward silence.  By merely opening your mouth today, you have lost the confidence of a great many Alliance leaders.  You know your group cohesion in battle will suffer for this.\n\t*if talking_points = 10\n\t\tYou can tell that your audience absorbed this last point, at least.  Perhaps your speech was not a total disaster, after all.\n\n*if old_talking_points_score = 10\n\t*if talking_points = 10\n\t\tSomehow you sense that you have not properly explained yourself, and you leave the podium in awkward silence.  You feel certain that you have damaged the other leaders' confidence in your ability, not to mention the cohesion of the armada.\n\t*if talking_points = 20\n\t\tThis last point hits home, and as you leave the podium, you hear the leaders of the Outer Systems muttering excitedly.  You know that you have certainly helped build morale, and encouraged group cohesion among the combatants.\n*if old_talking_points_score = 20\n\t*if talking_points = 20\n\t\tAlthough this final point fails to make an impression, you can still hear the leaders of the Outer Systems muttering excitedly as you exit the podium.  You know that you have certainly helped build morale, and encouraged group cohesion among the combatants.\n\t*if talking_points = 30\n\t\tThis last point hits home, and as you leave the podium, you can hear the leaders of the Outer Systems muttering excitedly.  Each expresses their enthusiasm in the manner traditional to their system: \n\t\t*if rakashi = true\n\t\t\tThe Rakashi clang their armor, the Tzir let their tendril-like fingers glow through their skinsuits, \n\t\t*if rakashi = false\n\t\t\tThe Tzir let their tendril-like fingers glow through their skinsuits, the Rakashi clang their armor, \n\t\t*if rep >=60\n\t\t\t\tthe Mesikans raise their wings, and the Calpurnians cheer.\n\t\t*if rep \u003c 60\n\t\t\t\tand the Calpurnians cheer.\n\t\t*if alliance_true \u003c 50\n\t\t\tIt is quite a cacophony.\n\t\t*if alliance_true > 50\n\t\t\tIt is astounding.\n\t\t\n\t\tYou know for sure that you have helped build morale, and encouraged group cohesion among the combatants.\n*goto after_speech\n*label not_what_i_meant\n\nYou feel a wave of confusion wash over you from the listeners in the room.  Perhaps you have failed to explain yourself properly, but you will have the chance to try again.  \n*return\n\n*label what_i_meant\n\nThough many of the listeners in the room may be surprised by your words, you can feel that your message is sinking in.  \n*return\n\n*label not_what_i_meant2\n\nYou can sense that your point is not coming across as you intended.  \n*return\n\n*label what_i_meant2\n\nThis timeless tale drives your point home in a way that you know your listeners will remember.  \n*return\n\n*label after_speech\n*page_break\n*if str_cov_up = false\n\t*if str_skill_up = false\n\t\t*if can_cov_up = false\n\t\t\t*if can_skill_up = false\n\t\t\t\t*if fuel_up = false\n\t\t\t\t\tThankfully, in preparation for this battle, the Alliance has gathered enough resources to provide your fleet with upgrades.\n\t\t\t\t\t*goto upgrade_choice\nThankfully, in preparation for this battle, the Alliance has gathered enough resources to provide for more upgrades.\n*label upgrade_choice\n\nFirst, your cannons are given two new kinds of weapon: force mines and decoy torpedoes.\n\nForce mines act like gravity mines, only they repel ships rather than attract them.  Decoy torpedoes can be piloted once they are fired, and a skillful gunner can make them appear just like strikers to the ${enemy_name} drone's tactical sensors.\n\nFinally the Alliance forces...\n*choice\n\t*if can_cov_up = false\n\t\t#...have their utility craft install additional cannons on your capital ships.\n\t\t\tYou are sure this will improve your chances against the ${enemy_name}.  \n\t\t\t*set can_cov_up true\n\t\t\t*if can_coverage \u003c=30\n\t\t\t\t*if rep >=65\n\t\t\t\t\t*set can_coverage +55\n\t\t\t\t\t*finish\n\t\t\t\t*else\n\t\t\t\t\t*set can_coverage +35\n\t\t\t\t\t*finish\n\t\t\t*elseif can_coverage \u003c=65\n\t\t\t\t*set can_coverage +25\n\t\t\t\t*finish\n\t\t\t*else\n\t\t\t\t*set can_coverage +10\n\t\t\t\t*finish\n\n\t*if str_cov_up = false\n\t\t#...land additional fighters in your launching bays.\n\t\t\tThe fighters from Tzir are a near-match for your strikers, and handle much the same way.  You are sure they will improve your chances against the ${enemy_name}.  \n\t\t\t*set str_cov_up true\n\t\t\t*if striker_coverage \u003c=30\n\t\t\t\t*if rep >=65\n\t\t\t\t\t*set striker_coverage +55\n\t\t\t\t\t*finish\n\t\t\t\t*else\n\t\t\t\t\t*set striker_coverage +35\n\t\t\t\t\t*finish\n\t\t\t*elseif striker_coverage \u003c=65\n\t\t\t\t*set striker_coverage +25\n\t\t\t\t*finish\n\t\t\t*else\n\t\t\t\t*set striker_coverage +10\n\t\t\t\t*finish\n\n\t*if str_skill_up = false\t\t\t\n\t\t#...offer modification implants to enhance your pilots' skills.\n\t\t\tYou are sure this will improve your chances against the ${enemy_name}.   \n\t\t\t*set str_skill_up true\n\t\t\t*if striker_skill \u003c=30\n\t\t\t\t*if rep >=65\n\t\t\t\t\t*set striker_skill +55\n\t\t\t\t\t*finish\n\t\t\t\t*else\n\t\t\t\t\t*set striker_skill +35\n\t\t\t\t\t*finish\n\t\t\t*elseif striker_skill \u003c=65\n\t\t\t\t*set striker_skill +25\n\t\t\t\t*finish\n\t\t\t*else\n\t\t\t\t*set striker_skill +10\n\t\t\t\t*finish\n\n\t*if can_skill_up = false\n\t\t#...offer modification implants to enhance your gunners' skills.\n\t\t\tYou are sure this will improve your chances against the ${enemy_name}.\n\t\t\t*set can_skill_up true\n\t\t\t*if can_skill \u003c=30\n\t\t\t\t*if rep >=65\n\t\t\t\t\t*set can_skill +55\n\t\t\t\t\t*finish\n\t\t\t\t*else\n\t\t\t\t\t*set can_skill +35\n\t\t\t\t\t*finish\n\t\t\t*elseif can_skill \u003c=65\n\t\t\t\t*set can_skill +25\n\t\t\t\t*finish\n\t\t\t*else\n\t\t\t\t*set can_skill +10\n\t\t\t\t*finish", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set striker_coverage 65\n*set striker_skill 85\n*set can_coverage 35\n*set can_skill 62\n*set mine 65\n*set energy 32\n*set bat_style 78\n*set mil_trust 65\n*set civ_trust 30\n*set integrity 35\n*set position \"Pro-Alliance\"\nThe proximity klaxons have begun to sound.  The fore monitor shows Varr capital ships phasing into the edge of the quadrant.   In the holographic field, squadrons of fighters emerge from them, and begin to close in on your fleet.  They have found you.\n\n\"Engineering reports it will be ten more minutes at least before we can link the fleet and enter phase!\" Kelmer warns.  You have no choice.  You must fight.  Your pilots load into their striker ships.  Your gunners climb into the cannon bays.  Against a force of this size, it will require the combined efforts of your full arsenal.\n\nYou order your cannons...\n\n*fake_choice\n\n\t#...to fire en masse at the approaching enemy fighters.\n\t#...to pinpoint the navigational sensors of the Varr team leaders.\n\t#...to crossfire en masse ahead of the fleet, making it unsafe for the enemy fighters to approach.\n\t#...to obliterate the distant Varr capital ships.\n\n*script changeBackgroundColor(\"black\")\n\n*set striker_coverage 35\n*set striker_skill 85\n*set can_coverage 65\n*set can_skill 65\n*set mine 35\n*set energy 45\n*set bat_style 22\n*set mil_trust 30\n*set civ_trust 75\n*set integrity 50\n*set position \"Anti-Alliance\"\n\n\"The Alliance is a reality,\" Councilor Tayu explains.  \"Once the Varr began their attacks on our home planet, our sister systems began working with us to make it so.  But now that process must quicken.  Every hour the Varr keep hold of our planet will be disastrous for our people, indeed for the universe.\"\n\nCouncilor Tayu looks at you meaningfully.  You sense that he wants to know where you stand on the matter of the Alliance.  In truth, you find the whole concept absurd, but what do you tell him?\n*fake_choice\n\t#Admit to your overwhelmingly negative feelings toward the Alliance.\n\t#Feign neutrality on the matter.\n\t#Feign overwhelming support for the Alliance.\n\n*script changeBackgroundColor(\"sepia\")\n\n*set striker_coverage 85\n*set striker_skill 65\n*set can_coverage 65\n*set can_skill 32\n*set mine 65\n*set energy 25\n*set bat_style 34\n*set mil_trust 52\n*set civ_trust 78\n*set integrity 72\n*set position \"Neutral\"\n\nThe disc-like craft of the Thossians are identical to the untrained eye, but you have seen enough of their kind to recognize several of these as battleships.  They appear to be escorting a squadron of Thossian miners.  As the convoy turns your way, most of the ships capable of attack begin moving to the front.\n\n\"No incoming transmission,\" Zagi reports meaningfully.  \"That's a bad sign.  They must be waiting until they're close enough to hit us before announcing their intent to fire.\"\n\nThe closer they get to you, the more time you'll spend fighting, and the more energy.  What do you do?\n*fake_choice\n\t#Demand that the Thossians state the intent of their approach.\n\t#Request safe passage through the quadrant.\n\t#Threaten to attack.\n\t#Open fire.\n\n*set striker_coverage 55\n*set striker_skill 25\n*set can_coverage 55\n*set can_skill 25\n*set mine 85\n*set energy 62\n*set bat_style 51\n*set mil_trust 46\n*set civ_trust 65\n*set integrity 63\n*set position \"Pro-Alliance\"\n\nYou tell the Lieutenant that you cannot share her cynical views. Support for the Alliance, you explain, is the best way to ensure that your people reclaim Madris.\n\nLieutenant Demian seems shocked, and mutters that she will reconsider her position. You can sense that your declaration of support has come as a crushing disappointment to her. But she seems to respect your position.\n\nOut of curiosity, why did you tell her the truth?\n\n*fake_choice\n\t#Nothing can come of duplicity but our own destruction.\n\t#I cannot bring myself to lie to someone with whom I have worked so closely for so long.\n\t#I am hoping to win her over to my side.\n\n\n*set striker_coverage 15\n*set striker_skill 58\n*set can_coverage 15\n*set can_skill 58\n*set mine 85\n*set energy 77\n*set bat_style 58\n*set mil_trust 61\n*set civ_trust 29\n*set integrity 46\n*set position \"Anti-Alliance\"\n\nThe proximity alert sounds, sending a wave of tension through the bridge. \"Ships emerging from hyperspace,\" Zagi reports. \"It looks like a small Thossian convoy.\"\n\nThe disc-like craft of the Thossians are identical to the untrained eye, but you have seen enough of their kind to recognize several of these as battleships. They appear to be escorting a squadron of Thossian miners. As the convoy turns your way, you notice that most of the ships capable of attack are moving to the front.\n\n\"No incoming transmission,\" Zagi reports meaningfully. \"That's a bad sign. My guess is they are waiting until they are close enough to hit us before announcing their intent to fire. These Thossian ships don't have long-range cannons.\" You wonder just what it is that has made a neutral civilization like the Thossians so aggressive to you. Fear of the Varr? Or perhaps they are merely taking advantage of your precarious position?\n\nYou feel certain you can fend the convoy off, even with your fleet's deficits. But the closer they get to you, the more time you'll spend fighting, and the more energy. What do you do?\n*fake_choice\n\t#Demand that the Thossians state the intent of their approach.\n\t#Ask the Thossians for safe passage through the quadrant.\n\t#Demand that the Thossian convoy leave the quadrant, or be fired upon.\n\t#Launch your attack.\n", "secret_city": "*temp fleet_cannon 0\n*temp facility_cannon 0\n*temp shipyard_cannon 0\n*temp fleet_striker 0\n*temp facility_striker 0\n*temp shipyard_striker 0\n*temp can_slick false\n*temp can_aggro false\n*temp can_skilly false\n*temp can_cov false\n*temp str_slick false\n*temp str_aggro false\n*temp str_skilly false\n*temp str_cov false\n*temp unprotected true\n*temp str_down false\n*temp can_down false\n*temp matching_strat\n*temp been_warned false\n*temp worried false\n*temp yard_win false\n*temp prod_win false\n*temp fleet_distraction false\n\n*set energy %-(standard_deduction)\n*set energy %-(standard_deduction)\n\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]The Fleet[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\nMany standard days later, your fleet arrives in the Null Zone.\n\nHere, space itself looks more like a turbulent sky.  Stars are invisible, washed out by electric grey clouds.  It is said that this is the edge of the universe, where our reality stops and another starts.  Seeing it on the monitors, you aren't about to disagree.\n\nYou make two microphases to get deeper inside its borders, but even these require hairpin astrogational adjustments to bring you back from hyperspace.  Engineering recommends that you begin a formation drift.  The core is powered down, and the fleet begins to coast into the glowing night of the Null Zone.\n\nYour ship begins to transmit a homing signal, which the Alliance can follow to your ships when they are ready to extract them.  The plan is to remain in drift for as long as it takes, though you have no way of knowing how long that will be.\n*page_break\nIn your cabin, you confer once more in confidence with the Core Operator, who presents your energy levels on your screen:\n\n*stat_chart\n\tpercent energy Energy Reserves\n\n*if energy >=40\n\t\"We're doing all right, considering how long we've been out here.  I think we've even got enough juice to make an emergency phase, if it came to that.  \n\t*if standard_deduction = 20\n\t\tBut we definitely need to start restricting energy use if we're going to remain in the Null Zone.  This place is nil for resources.  What's worse, we don't know how long the Alliance is going to keep us waiting.\"\n\t\t\n\t*if standard_deduction = 15\n\t\tBut it's sure a good thing we started limiting energy use when we did, I can tell you that.  And no matter what the civilians say, we gotta keep doing it if we're going to remain in the Null Zone.  \n\t\t*gosub andwegotta\n\t\t\n\t*if standard_deduction = 10\n\t\tIt's sure good we started limiting energy use when we did.  The civilians may be hating it, but it's gotten us this far.  And we gotta keep doing it if we're going to remain in the Null Zone.  \n\t\t*gosub andwegotta\n\t\t\n*if (energy \u003c 40) and (energy > 30)\n\t\"It's getting down there, just like you'd expect after this long in transit.  We have enough juice for one more complete phase, if the need arises.  \n\t*if standard_deduction = 20\n\t\tBut bottom line, we need to start restricting energy use some if we're going to remain in the Null Zone.  \n\t\t*gosub andwegotta\n\t\t\n\t*if standard_deduction = 15\n\t\tBut it's a good thing we started limiting energy use when we did, I can tell you that.  It's kept us afloat, however much the civilians hate it.  And we gotta keep doing it if we're gonna stay in the Null Zone.  \n\t\t*gosub andwegotta\n\t\t\n\t*if standard_deduction = 10\n\t\tIt's sure good we started limiting energy use when we did.  The civilians may be hating it, but it's gotten us this far.  And we gotta keep doing it if we're going to remain in the Null Zone.  \n\t\t*gosub andwegotta\n\t\t\n*if energy \u003c=30\n\t\"We got it as bad as can be, Captain.  There's enough for maybe one more complete phase, if we're in a pinch.  \n\t*if standard_deduction = 20\n\t\tBut bottom line, we gotta start restricting energy use immediately, and we gotta get tough with it, no matter what the civilians say.  The Null Zone is nil for resources.  What's worse, we don't know how long the Alliance is going to keep us waiting here.\"\n\t*if standard_deduction = 15\n\t\tEven though we started restricting energy use when we did, it hasn't been enough to keep up with our use.  I'm telling you, no matter how much the civilians squawk, we gotta deepen the limits if we're going to stay in the Null Zone.  \n\t\t*gosub andwegotta\n\t\t\n\t*if standard_deduction = 10\n\t\tGood thing we imposed heavy restrictions.  But we may need to tighten our belts even more.  So what if the civilians scream bloody murder about it?  The Null Zone is nil for resources.  What's worse, we don't know how long the Alliance is going to keep us waiting in here.\"\n\t\t\n\n*if standard_deduction = 20\n\tYou cannot go on without limiting energy use.  You can limit lightly, limit strictly, or choose a third option.\n*if standard_deduction = 15\n\tYou can continue limiting energy use at your current level, or you can further restrict your use.  However, if you would like to save even more energy, there is also a third option.\n*if standard_deduction = 10\n\tYou can continue at your current energy limit level, or you can ease your restrictions.  There is also a third option.\n\n\"Of course I don't even like to think about it,\" the Operator explains, \"but there's always consolidation.  We can move the civilians onto fewer ships, then decommission the empty vessels.  It's bound to overcrowd people, but it's the steepest way to limit energy safely.\"\n\n*choice\n\t*if standard_deduction = 20\n\t\t#Begin light limits on energy use.\n\t\t\t*set standard_deduction 15\n\t\t\t*set civ_trust %-15\n\t\t\t*goto silence\n\t*if standard_deduction = 15\n\t\t#Continue light limits on energy use.\n\t\t\t*set civ_trust %-15\n\t\t\t*goto silence\n\t*if standard_deduction = 10\n\t\t#Shift to light limits on energy use.\n\t\t\t*set standard_deduction 15\n\t\t\t*set civ_trust %+10\n\t\t\t*goto silence\n\t*if standard_deduction = 20\n\t\t#Impose heavy limits on energy use.\n\t\t\t*set standard_deduction 10\n\t\t\t*set civ_trust %-20\n\t\t\t*goto gotta_do\n\t*if standard_deduction = 15\n\t\t#Shift to heavy limits on energy use.\n\t\t\t*set standard_deduction 10\n\t\t\t*set civ_trust %-20\n\t\t\t*goto gotta_do\n\t*if standard_deduction = 10\n\t\t#Continue heavy limits on energy use.\n\t\t\t*set civ_trust %-20\n\t\t\t*goto gotta_do\n\t#Commence consolidation.\n\t\t*set standard_deduction 5\n\t\t*set civ_trust %-30\n\t\tIt takes more than two standard days to complete the consolidation process:  emptying the chosen ships of personnel and civilians, harvesting their remaining resources, and decommissioning the craft.\n\t\t\n\t\tWith the ships forced to handle more people than they were designed to hold, life support systems will be overtaxed.  Even with lights running lower to compensate, the air on the ships will be naturally thinner now, and food synthesis units will be pushed to the limit.\n\t\t\n\t\tAs you watch the dead ships drift idly into the Null Zone, you remind yourself that it had to be done.\n\t\t*goto arrival\t\n\n*label andwegotta\nThis place is nil for resources.  What's worse, we don't know how long the Alliance is going to keep us waiting here.\"\n*return\n\n*label silence\nThe Operator stares at you a long while when he hears your orders.  \"Will do,\" he replies finally, but you can hear him sigh heavily as he cuts the transmission, and not with relief.\n*goto arrival\n\n*label gotta_do\n\"We gotta do what we gotta do,\" sighs the Operator.\n*goto arrival\n\n*label arrival\n*page_break\nTwo days into your drift, the fleet approaches a tiny natural satellite, floating in the Null Zone.  Officer Kelmer scans it, to determine whether the rock can be shot off-course, or whether you must maneuver around it.  Excitedly, he begins tapping one of the screens that surround him in the Astrogator's station.  \"Captain, there are life signs here!  Lots of them.  It appears to be a colony...\"\n\nKelmer continues to scan the satellite, which seems to be home to a factory, with a small city around it.  There is no question what they produce, either: nearby in space, a shipyard of drone fighters floats in wet dock.\n\n\"Have we found the elusive Grix?\" Lieutenant Demian wonders aloud, but as Tactical zooms in on the drones, it's clear that this is a more familiar enemy.\n\n\"Look at the shapes,\" Zagi advises.  \"They're ${enemy_name}.\"\n*page_break\nIt's all too obvious now.  The ${enemy_name} can't count on winning allies, so they are building them, here in the Null Zone where no one will find out about it.  And from the sheer number of drones in their shipyard, you guess they have something big in mind.  \n*if alliance_true \u003c 50\n\tMuch as you hate to admit it, the Alliance was right.  \n*if alliance_true >=50\n\tThe Alliance was right.  \n${plan_name} was only the first step in a greater campaign.\n\nThere is movement on the edges of the shipyard, as a single active drone squadron breaks from the other ships and speeds toward your fleet.  You order Engineering to bring the core back online immediately, but you can't wait that long to respond.\n\nThis attack will require the coordinated effort of your full arsenal, but you may split its focus if you prefer.  \n*label first_deployment\nYour strikers will focus on...\n\n*choice\n\t#The defense of our fleet from the incoming drones.\n\t\t*set fleet_striker 10\n\t\t*set unprotected false\n\t\t*goto second_deployment\n\t#The destruction of the shipyard.\n\t\t*set shipyard_striker 10\n\t\t*goto second_deployment\n\t*if worried = false\n\t\t#The destruction of the production facility.\n\t\t\t*gosub warning_striker\n\t\t\t*set facility_striker 10\n\t\t\t*goto second_deployment\n\t#Nothing.  The strikers will stay docked to save energy, and our cannons will handle the encounter.\n\t\t*set str_down true\n\t\t*goto second_deployment\n\n*label second_deployment\nYour cannons will focus on...\n*choice\n\t*if fleet_striker > 0\n\t\t#Supporting our strikers in their defense of the fleet.\n\t\t\t*set matching_strat true\n\t\t\t*set fleet_cannon 10\n\t\t\t*set unprotected false\n\t\t\t*goto str_strat\n\t*if fleet_striker = 0\n\t\t#The defense of our fleet from the incoming drones.\n\t\t\t*set fleet_cannon 10\n\t\t\t*set unprotected false\n\t\t\t*goto str_strat\n\t*if shipyard_striker > 0\n\t\t#Supporting our strikers in their attack on the shipyard.\n\t\t\t*set matching_strat true\n\t\t\t*set shipyard_cannon 10\n\t\t\t*goto str_strat\n\t*if shipyard_striker = 0\n\t\t#The destruction of the shipyard.\n\t\t\t*set shipyard_cannon 10\n\t\t\t*goto str_strat\n\t*if facility_striker > 0\n\t\t#Supporting our strikers in their attack on the production facility.\n\t\t\t*set matching_strat true\n\t\t\t*set facility_cannon 10\n\t\t\t*goto str_strat\n\t*if (facility_striker = 0) and (worried = false)\n\t\t#The destruction of the production facility.\n\t\t\t*gosub cannon_warning\n\t\t\t*set facility_cannon 10\n\t\t\t*goto str_strat\n\t*if str_down = false\n\t\t#Nothing.  The cannons will remain unengaged to save energy, and let the strikers handle the encounter.\n\t\t\t*set can_down true\n\t\t\t*goto str_strat\n\n*label str_strat\n*if str_down = true\n\t*goto can_strat\nWhat strategy will your strikers employ in their \n*if fleet_striker != 0\n\tdefense of the fleet?\n\t*choice\n\t\t#Lure the drones into elaborate chases that force them to collide.\n\t\t\t*set str_slick true\n\t\t\t*set str_skilly true\n\t\t\t*if striker_skill \u003c 45\n\t\t\t\t*goto can_strat\n\t\t\t*elseif striker_skill \u003c 75\n\t\t\t\t*set fleet_striker 50\n\t\t\t\t*set bat_style %-10\n\t\t\t\t*goto can_strat\n\t\t\t*else\n\t\t\t\t*set fleet_striker 75\n\t\t\t\t*set bat_style %-20\n\t\t\t\t*goto can_strat\n\n\t\t#Destroy the drones as they approach in a massive wave of direct fire.\n\t\t\t*set str_aggro true\n\t\t\t*set str_cov true\n\t\t\t*if striker_coverage \u003c 45\n\t\t\t\t*goto can_strat\n\t\t\t*elseif striker_coverage \u003c 75\n\t\t\t\t*set fleet_striker 50\n\t\t\t\t*set bat_style %+10\n\t\t\t\t*goto can_strat\n\t\t\t*else\n\t\t\t\t*set fleet_striker 75\n\t\t\t\t*set bat_style %+20\n\t\t\t\t*goto can_strat\n\n\t\t#Have your pilots break squadron formation and fly solo.  Keeping track of so many separate targets will play havoc with the drones' artificial intelligence.\n\t\t\t*set str_slick true\n\t\t\t*set str_cov true\n\t\t\t*if striker_coverage \u003c 45\n\t\t\t\t*goto can_strat\n\t\t\t*elseif striker_coverage \u003c 75\n\t\t\t\t*set fleet_striker 50\n\t\t\t\t*set bat_style %-10\n\t\t\t\t*goto can_strat\n\t\t\t*else\n\t\t\t\t*set fleet_striker 75\n\t\t\t\t*set bat_style %-20\n\t\t\t\t*goto can_strat\t\t\t\n\n\t\t#Maneuver into the drones' formations to plant blast mines on some of their ships.\n\t\t\t*set str_aggro true\n\t\t\t*set str_skilly true\n\t\t\t*if striker_skill \u003c 45\n\t\t\t\t*goto can_strat\n\t\t\t*elseif striker_skill \u003c 75\n\t\t\t\t*set fleet_striker 50\n\t\t\t\t*set bat_style %+10\n\t\t\t\t*goto can_strat\n\t\t\t*else\n\t\t\t\t*set fleet_striker 75\n\t\t\t\t*set bat_style %+20\n\t\t\t\t*goto can_strat\n\n*if shipyard_striker != 0\n\tattack on the shipyard?\n\t*choice\n\t\t#Maneuver quickly through the shipyard, tricking its defensive cannons into firing on their own idle ships.\n\t\t\t*set str_slick true\n\t\t\t*set str_skilly true\n\t\t\t*if striker_skill \u003c 45\n\t\t\t\t*goto can_strat\n\t\t\t*elseif striker_skill \u003c 75\n\t\t\t\t*set shipyard_striker 50\n\t\t\t\t*set bat_style %-10\n\t\t\t\t*goto can_strat\n\t\t\t*else\n\t\t\t\t*set shipyard_striker 75\n\t\t\t\t*set bat_style %-20\n\t\t\t\t*goto can_strat\n\n\t\t#Blast every vessel in the shipyard into the next universe with a massive wave of direct fire.\n\t\t\t*set str_aggro true\n\t\t\t*set str_cov true\n\t\t\t*if striker_coverage \u003c 45\n\t\t\t\t*goto can_strat\n\t\t\t*elseif striker_coverage \u003c 75\n\t\t\t\t*set shipyard_striker 50\n\t\t\t\t*set bat_style %+10\n\t\t\t\t*goto can_strat\n\t\t\t*else\n\t\t\t\t*set shipyard_striker 75\n\t\t\t\t*set bat_style %+20\n\t\t\t\t*goto can_strat\n\n\t\t#Have your strikers use the combined force of their tow beams to drag idle ships out of the shipyard's gravity-enforced formation, sending them spinning into the Null Zone.\n\t\t\t*set str_slick true\n\t\t\t*set str_cov true\n\t\t\t*if striker_coverage \u003c 45\n\t\t\t\t*goto can_strat\n\t\t\t*elseif striker_coverage \u003c 75\n\t\t\t\t*set shipyard_striker 50\n\t\t\t\t*set bat_style %-10\n\t\t\t\t*goto can_strat\n\t\t\t*else\n\t\t\t\t*set shipyard_striker 75\n\t\t\t\t*set bat_style %-20\n\t\t\t\t*goto can_strat\t\t\t\n\n\t\t#Duck and dodge through the blasts of the shipyard's defense cannon to plant blast mines on some of the idle ships.\n\t\t\t*set str_aggro true\n\t\t\t*set str_skilly true\n\t\t\t*if striker_skill \u003c 45\n\t\t\t\t*goto can_strat\n\t\t\t*elseif striker_skill \u003c 75\n\t\t\t\t*set shipyard_striker 50\n\t\t\t\t*set bat_style %+10\n\t\t\t\t*goto can_strat\n\t\t\t*else\n\t\t\t\t*set shipyard_striker 75\n\t\t\t\t*set bat_style %+20\n\t\t\t\t*goto can_strat\n\n\n*if facility_striker != 0\n\tattack on the production facility?\n\t*choice\n\t\t#Bob and weave between the factories and power plants, causing the city's own defenses to turn against it.\n\t\t\t*set str_slick true\n\t\t\t*set str_skilly true\n\t\t\t*if striker_skill \u003c 45\n\t\t\t\t*goto can_strat\n\t\t\t*elseif striker_skill \u003c 75\n\t\t\t\t*set facility_striker 50\n\t\t\t\t*set bat_style %-10\n\t\t\t\t*goto can_strat\n\t\t\t*else\n\t\t\t\t*set facility_striker 75\n\t\t\t\t*set bat_style %-20\n\t\t\t\t*goto can_strat\n\n\t\t#Rain down a massive wave of direct fire on the whole of the city.\n\t\t\t*set str_aggro true\n\t\t\t*set str_cov true\n\t\t\t*if striker_coverage \u003c 45\n\t\t\t\t*goto can_strat\n\t\t\t*elseif striker_coverage \u003c 75\n\t\t\t\t*set facility_striker 50\n\t\t\t\t*set bat_style %+10\n\t\t\t\t*goto can_strat\n\t\t\t*else\n\t\t\t\t*set facility_striker 75\n\t\t\t\t*set bat_style %+20\n\t\t\t\t*goto can_strat\n\n\t\t#Use the combined force of your tow beams to detach the production facility from the rock, and send it spinning into the Null Zone.\n\t\t\t*set str_slick true\n\t\t\t*set str_cov true\n\t\t\t*if striker_coverage \u003c 45\n\t\t\t\t*goto can_strat\n\t\t\t*elseif striker_coverage \u003c 75\n\t\t\t\t*set facility_striker 50\n\t\t\t\t*set bat_style %-10\n\t\t\t\t*goto can_strat\n\t\t\t*else\n\t\t\t\t*set facility_striker 75\n\t\t\t\t*set bat_style %-20\n\t\t\t\t*goto can_strat\t\t\t\n\n\t\t#Have your strikers deliver a few precise shots into the fault lines of the rock, to create a seismic disturbance that will expand in strength to destroy the entire city.\n\t\t\t*set str_aggro true\n\t\t\t*set str_skilly true\n\t\t\t*if striker_skill \u003c 45\n\t\t\t\t*goto can_strat\n\t\t\t*elseif striker_skill \u003c 75\n\t\t\t\t*set facility_striker 50\n\t\t\t\t*set bat_style %+10\n\t\t\t\t*goto can_strat\n\t\t\t*else\n\t\t\t\t*set facility_striker 75\n\t\t\t\t*set bat_style %+20\n\t\t\t\t*goto can_strat\n\n*label can_strat\n*if can_down = true\n\t*goto results_show\nWhat strategy will your cannons employ in their \n*if fleet_cannon != 0\n\t*if fleet_striker != 0\n\t\tsupporting maneuver?\n\t*if fleet_striker = 0\n\t\tdefense of the fleet?\n\t*choice\n\t\t#Lob scramblers at their signal receptors, to block incoming commands.\n\t\t\t*set can_slick true\n\t\t\t*set can_skilly true\n\t\t\t*if can_skill \u003c 45\n\t\t\t\t*goto results_show\n\t\t\t*elseif can_skill \u003c 75\n\t\t\t\t*set fleet_cannon 50\n\t\t\t\t*set bat_style %-10\n\t\t\t\t*goto results_show\n\t\t\t*else\n\t\t\t\t*set fleet_cannon 75\n\t\t\t\t*set bat_style %-20\n\t\t\t\t*goto results_show\n\n\t\t#Fire all cannons on full blast into the coming squadron, wiping them out.\n\t\t\t*set can_aggro true\n\t\t\t*set can_cov true\n\t\t\t*if can_coverage \u003c 45\n\t\t\t\t*goto results_show\n\t\t\t*elseif can_coverage \u003c 75\n\t\t\t\t*set fleet_cannon 50\n\t\t\t\t*set bat_style %+10\n\t\t\t\t*goto results_show\n\t\t\t*else\n\t\t\t\t*set fleet_cannon 75\n\t\t\t\t*set bat_style %+20\n\t\t\t\t*goto results_show\n\n\t\t#Have your cannons volley hundreds of gravity mines directly into the path of the approaching drones, to make maneuvering impossible.\n\t\t\t*set can_slick true\n\t\t\t*set can_cov true\n\t\t\t*if can_coverage \u003c 45\n\t\t\t\t*goto results_show\n\t\t\t*elseif can_coverage \u003c 75\n\t\t\t\t*set fleet_cannon 50\n\t\t\t\t*set bat_style %-10\n\t\t\t\t*goto results_show\n\t\t\t*else\n\t\t\t\t*set fleet_cannon 75\n\t\t\t\t*set bat_style %-20\n\t\t\t\t*goto results_show\t\t\t\n\n\t\t#Target blasts at the tiny energy cells on the drones' bellies, to overload their cores and obliterate whole formations.\n\t\t\t*set can_aggro true\n\t\t\t*set can_skilly true\n\t\t\t*if can_skill \u003c 45\n\t\t\t\t*goto results_show\n\t\t\t*elseif can_skill \u003c 75\n\t\t\t\t*set fleet_cannon 50\n\t\t\t\t*set bat_style %+10\n\t\t\t\t*goto results_show\n\t\t\t*else\n\t\t\t\t*set fleet_cannon 75\n\t\t\t\t*set bat_style %+20\n\t\t\t\t*goto results_show\n\n*if shipyard_cannon!= 0\n\t*if shipyard_striker != 0\n\t\tsupporting maneuver?\n\t*if shipyard_striker = 0\n\t\tattack on the shipyard?\n\t*choice\n\t\t#Lob scramblers at the distant shipyard's gravity generators, to disrupt its formation.\n\t\t\t*set can_slick true\n\t\t\t*set can_skilly true\n\t\t\t*if can_skill \u003c 45\n\t\t\t\t*goto results_show\n\t\t\t*elseif can_skill \u003c 75\n\t\t\t\t*set shipyard_cannon 50\n\t\t\t\t*set bat_style %-10\n\t\t\t\t*goto results_show\n\t\t\t*else\n\t\t\t\t*set shipyard_cannon 75\n\t\t\t\t*set bat_style %-20\n\t\t\t\t*goto results_show\n\n\t\t#Blast the idle ships to bits in a massive hail of cannon fire.\n\t\t\t*set can_aggro true\n\t\t\t*set can_cov true\n\t\t\t*if can_coverage \u003c 45\n\t\t\t\t*goto results_show\n\t\t\t*elseif can_coverage \u003c 75\n\t\t\t\t*set shipyard_cannon 50\n\t\t\t\t*set bat_style %+10\n\t\t\t\t*goto results_show\n\t\t\t*else\n\t\t\t\t*set shipyard_cannon 75\n\t\t\t\t*set bat_style %+20\n\t\t\t\t*goto results_show\n\n\t\t#Volley hundreds of gravity mines into the shipyard, to disrupt its formation.\n\t\t\t*set can_slick true\n\t\t\t*set can_cov true\n\t\t\t*if can_coverage \u003c 45\n\t\t\t\t*goto results_show\n\t\t\t*elseif can_coverage \u003c 75\n\t\t\t\t*set shipyard_cannon 50\n\t\t\t\t*set bat_style %-10\n\t\t\t\t*goto results_show\n\t\t\t*else\n\t\t\t\t*set shipyard_cannon 75\n\t\t\t\t*set bat_style %-20\n\t\t\t\t*goto results_show\t\t\t\n\n\t\t#Blast the tiny energy cells on the idle drones' bellies, overloading their cores and destroying the other ships around them.\n\t\t\t*set can_aggro true\n\t\t\t*set can_skilly true\n\t\t\t*if can_skill \u003c 45\n\t\t\t\t*goto results_show\n\t\t\t*elseif can_skill \u003c 75\n\t\t\t\t*set shipyard_cannon 50\n\t\t\t\t*set bat_style %+10\n\t\t\t\t*goto results_show\n\t\t\t*else\n\t\t\t\t*set shipyard_cannon 75\n\t\t\t\t*set bat_style %+20\n\t\t\t\t*goto results_show\n\n\n*if facility_cannon != 0\n\t*if facility_striker != 0\n\t\tsupporting maneuver?\n\t*if facility_striker = 0\n\t\tattack on the production facility?\n\t*choice\n\t\t#Lob scramblers directly into the collector cells of the city's distant power plant, to disable it.\n\t\t\t*set can_slick true\n\t\t\t*set can_skilly true\n\t\t\t*if can_skill \u003c 45\n\t\t\t\t*goto results_show\n\t\t\t*elseif can_skill \u003c 75\n\t\t\t\t*set facility_cannon 50\n\t\t\t\t*set bat_style %-10\n\t\t\t\t*goto results_show\n\t\t\t*else\n\t\t\t\t*set facility_cannon 75\n\t\t\t\t*set bat_style %-20\n\t\t\t\t*goto results_show\n\n\t\t#Fire en masse into the rock itself, to create a seismic disturbance that will grow to destroy the entire city.\n\t\t\t*set can_aggro true\n\t\t\t*set can_cov true\n\t\t\t*if can_coverage \u003c 45\n\t\t\t\t*goto results_show\n\t\t\t*elseif can_coverage \u003c 75\n\t\t\t\t*set facility_cannon 50\n\t\t\t\t*set bat_style %+10\n\t\t\t\t*goto results_show\n\t\t\t*else\n\t\t\t\t*set facility_cannon 75\n\t\t\t\t*set bat_style %+20\n\t\t\t\t*goto results_show\n\n\t\t#Have every cannon in your arsenal litter the city with scramblers, to cause widespread power failure.\n\t\t\t*set can_slick true\n\t\t\t*set can_cov true\n\t\t\t*if can_coverage \u003c 45\n\t\t\t\t*goto results_show\n\t\t\t*elseif can_coverage \u003c 75\n\t\t\t\t*set facility_cannon 50\n\t\t\t\t*set bat_style %-10\n\t\t\t\t*goto results_show\n\t\t\t*else\n\t\t\t\t*set facility_cannon 75\n\t\t\t\t*set bat_style %-20\n\t\t\t\t*goto results_show\t\t\t\n\n\t\t#Use precise shots to destroy the atmosphere generators, spreading internal fires through the air supply.\n\t\t\t*set can_aggro true\n\t\t\t*set can_skilly true\n\t\t\t*if can_skill \u003c 45\n\t\t\t\t*goto results_show\n\t\t\t*elseif can_skill \u003c 75\n\t\t\t\t*set facility_cannon 50\n\t\t\t\t*set bat_style %+10\n\t\t\t\t*goto results_show\n\t\t\t*else\n\t\t\t\t*set facility_cannon 75\n\t\t\t\t*set bat_style %+20\n\t\t\t\t*goto results_show\n\n*label warning_striker\nBefore you proceed with your decision, you ask Tactical about the colony.  Is this a military base?\n\n\"There's a military presence here, Captain, but a colony of this size can't be exclusively military.  I'm guessing we're also talking scientists, workers, and their families.  If we hit this rock at all, we'll be hitting civilians, there's no question about that.\"\n\nDoes this affect your decision?\n\n*choice\n\t#Yes.  This changes my plans.  Let me choose a different deployment strategy for my strikers.\n\t\tVery well.  You rescind the order to attack the production facility.  Instead, \n\t\t*set been_warned true\n\t\t*set worried true\n\t\t*goto first_deployment\n\t#No.  I know what I'm doing.\n\t\t*set been_warned true\n\t\tVery well.  \n\t\t*return\n\n\n*label cannon_warning\n*if been_warned = true\n\t*return\nBefore you proceed with your decision, you ask Tactical about the life readings that they picked-up from the colony.  Where are they coming from, precisely?\n\n\"They're everywhere, Captain.  A colony of this size can't be exclusively military.  I'm guessing we're also talking scientists, workers, and their families.  If we hit this rock at all, we'll be hitting civilians, there's no question about that.\"\n\nDoes this affect your decision?\n\n*choice\n\t#Yes.  Let me choose a different strategy for my cannons.\n\t\tVery well.  You rescind the order to attack the production facility.  Instead, \n\t\t*set worried true\n\t\t*set been_warned true\n\t\t*goto second_deployment\n\t#Yes.  Let me choose different strategies for both my strikers and my cannons.\n\t\tVery well.  You rescind the order to attack the production facility, and rethink your strategy.  \n\t\t*set fleet_striker 0\n\t\t*set shipyard_striker 0\n\t\t*set worried true\n\t\t*set been_warned true\n\t\t*goto first_deployment\n\t#No.  I know what I'm doing.\n\t\tVery well.  \n\t\t*set been_warned true\n\t\t*return\n\n*label results_show\n*if (fleet_striker != 0) and (fleet_cannon != 0)\n\t*goto combined_fleet\n*if (shipyard_striker != 0) and (shipyard_cannon != 0)\n\t*goto combined_shipyard\n*if (facility_striker != 0) and (facility_cannon != 0)\n\t*goto combined_facility\n*if (str_down = true) or (can_down = true)\n\t*set energy%-15\n*if (str_down = false) and (can_down = false)\n\t*set energy %-30\n*label striker_results\n*if str_down = true\n\tYour strikers stand down to conserve energy.  \n\t*goto can_results\n*if fleet_striker != 0\n\t*if (str_slick = true) and (str_skilly = true)\n\t\tYour strikers lure the drones out of their formations, and engage them in elaborate chases.  \n\t\t*if fleet_striker > 50\n\t\t\tTheir expert maneuvering sends the drones smashing into each other, decimating the squadron.\n\t\t*if fleet_striker = 50\n\t\t\tYour pilots don't quite have the skill to trick the advanced AI of the drones.  They send quite a few of the enemy fighters smashing into each other, but a few make it past the defense.\n\t\t*if fleet_striker \u003c 50\n\t\t\tUnfortunately, your unskilled pilots aren't able to trick the advanced AI of the drones, and the strategy is a failure.\n\t\t\n\t\t\n\t*if (str_slick = true) and (str_cov = true)\n\t\tYour strikers break off on their own, to befuddle the drones' AI.  \n\t\t*if fleet_striker > 50\n\t\t\tWith so many sources of unpredictable, disorderly input to keep track of, the processors of the machines begin to lock up, and the ships are easily dispatched.\n\t\t*if fleet_striker = 50\n\t\t\tThe multiple sources of unpredictable, disorderly input send many of the machines' processors into loops, making them easy to dispatch.  However, a few manage to make it past your defense.\n\t\t*if fleet_striker \u003c 50\n\t\t\tUnfortunately, you would need many more fighters in the mix to effectively confound these machines.  The drones handily glide past your defense.\n\t\t\n\t\t\n\t*if (str_aggro = true) and (str_skilly = true)\n\t\tYour strikers attempt to position themselves within the drones' formations, to plant mines directly on the enemy fighters.  \n\t\t*if fleet_striker > 50\n\t\t\tThey execute the strategy flawlessly, and glide out of blast range long before the explosions begin.  The enemy squadron is decimated.\n\t\t*if fleet_striker = 50\n\t\t\tThe skill of your pilots is put to the test, but many of the drones let the infiltration go undetected, and soon their squadron is being obliterated by detonations.  However, a few enemy ships make it past your defense.\n\t\t*if fleet_striker \u003c 50\n\t\t\tUnfortunately, the skill of your pilots is simply not up to snuff.  The drones detect the infiltration, and fight back hard.\n\t\t\n\t\t\n\t*if (str_aggro = true) and (str_cov = true)\n\t\tYour strikers fill the battle zone between the approaching drones and your fleet, sending all of their fire at the incoming ships, \n\t\t*if fleet_striker > 50\n\t\t\tand destroying the squadron before a single fighter can break through.\n\t\t*if fleet_striker = 50\n\t\t\tclearly damaging the enemy fighters.  However, a few drones make it past the blockade.\n\t\t*if fleet_striker \u003c 50\n\t\t\tbut there are not enough ships on your end to pull it off.  The drones easily make it past the blockade.\n\t\t\n\t\t\n*if shipyard_striker != 0\n\t*if (str_slick = true) and (str_skilly = true)\n\t\tYour strikers bob and weave through the shipyard, hoping to trick its defensive cannon into firing on the idle drones. \n\t\t*if shipyard_striker > 50\n\t\t\tBy the time your pilots are through with it, the yard has practically decimated itself!\n\t\t\t*gosub str_win_big\t\t\n\t\t*if shipyard_striker = 50\n\t\t\tThey are not always able to mislead the cannon's advanced AI, but they are able to coerce it into landing many hits on its own quarry.\n\t\t\t*gosub str_win_mod\n\t\t*if shipyard_striker \u003c 50\n\t\t\tThey don't have the skill to pull this maneuver off, however, and the AI of the defensive cannon is soon training itself on your pilots.\n\t\t\t*gosub str_fail\n\t\t\n\t\t\n\t*if (str_slick = true) and (str_cov = true)\n\t\tIn the shipyard, your strikers band together to tow idle drones out of formation, \n\t\t*if shipyard_striker > 50\n\t\t\tand it works better than you could have hoped.  They unsettle several ships from key positions, creating a chain reaction that destabilizes the gravity grid entirely.  The unmoored vessels spin into the chaos of the Null Zone.\n\t\t\t*gosub str_win_big\n\t\t*if shipyard_striker = 50\n\t\t\tand the strategy works moderately well.  Several drones in key positions are yanked out of formation, and many more spin after them into the chaos of the Null Zone.  Unfortunately, you lose some pilots to the defensive cannon.\n\t\t\t*gosub str_win_mod\n\t\t*if shipyard_striker \u003c 50\n\t\t\tbut there aren't enough of them to muster the gravitational pull they need.  The defensive cannon easily picks them off as they try in vain to disrupt the yard.\n\t\t\t*gosub str_fail\n\t\t\n\t\t\n\t*if (str_aggro = true) and (str_skilly = true)\n\t\tYour strikers bob and weave through the ships of the yard, planting blast mines in key positions as they go.  \n\t\t*if shipyard_striker > 50\n\t\t\tThey are far out of range when the chain of explosions begins.  Any drones not eliminated by the bombs are sent spinning into the chaos of the Null Zone by shockwaves.\n\t\t\t*gosub str_win_big\n\t\t*if shipyard_striker = 50\n\t\t\tThey aren't able to land as many as you had hoped, and some pilots fall victim to the defensive cannon, but the mines that are successfully planted do deliver palpable hits to the idle drones.\n\t\t\t*gosub str_win_mod\n\t\t*if shipyard_striker \u003c 50\n\t\t\tThey aren't skillful enough to avoid the AI of the defensive cannon, however.\n\t\t\t*gosub str_fail\n\t\t\n\t\t\n\t*if (str_aggro = true) and (str_cov = true)\n\t\tYour strikers blast away at the shipyard, hitting every vessel in sight.  \n\t\t*if shipyard_striker > 50\n\t\t\tWith their sheer numbers, it proves a brutal but effective strategy.  The drones are completely destroyed.  \n\t\t\t*gosub str_win_big\n\t\t*if shipyard_striker = 50\n\t\t\tSome of the idle drones are obliterated, but you also lose some pilots to the defensive cannon.  \n\t\t\t*gosub str_win_mod\n\t\t*if shipyard_striker \u003c 50\n\t\t\tIt is a strategy that might have worked better if you had more fighters to bring to the table.  You deliver little palpable damage, and the shipyard's defensive cannon has no trouble picking your few pilots off.\n\t\t\t*gosub str_fail\n\t\t\n\t\t\n*if facility_striker != 0\n\t*if (str_slick = true) and (str_skilly = true)\n\t\tDown on the rock, your pilots swoop and dodge between the factories and power plants, hoping to cause the city's defense cannons to fire on what it is meant to protect.  \n\t\t*if facility_striker > 50\n\t\t\tThe strategy works better than you could have hoped.  In their attempt to root out your strikers, the cannons depressurize whole buildings, start internal fires in others, and knock out gravity generators.  The production facility is decimated as the destruction spreads.  You would be surprised if the attack left a single survivor.\n\t\t\t*gosub str_win_big\n\t\t*if facility_striker = 50\n\t\t\tIt is a semi-effective strategy.  In their attempt to root out your strikers, the enemy cannons accidentally depressurize several buildings, and start internal fires that seriously damage the production facility.  But some of your less-skillful pilots perish along with the ${enemy_name}.\n\t\t\t*gosub str_win_mod\n\t\t*if facility_striker \u003c 50\n\t\t\tUnfortunately, your pilots aren't skillful enough to avoid the cannons, much less force them to hit their own city.  Many brave pilots perish.\n\t\t\t*gosub str_fail\n\t\t\n\t\t\n\t*if (str_slick = true) and (str_cov = true)\n\t\tYour strikers band together to tow the production facility out of the city, an ambitious strategy to be sure, \n\t\t*if facility_striker > 50\n\t\t\tand one that works surprisingly well.  As the facility is wrest into the Null Zone, it causes widespread damage to the city around it.  Internal fires spread through the air supply, and seismic waves begin to depressurize other structures from below.  You doubt there will be any survivors once the results of your attack have played out.\n\t\t\t*gosub str_win_big\n\t\t*if facility_striker = 50\n\t\t\tand one that is only partially successful.  You do not have enough fighters to completely wrest the facility from the surface of the satellite, and some of your pilots are picked off by the defensive cannons during the attempt.  However, you do manage to depressurize portions of the factory, and other structures connected to the building soon follow suit.  Many ${enemy_name} perish.\n\t\t\t*gosub str_win_mod\n\t\t*if facility_striker \u003c 50\n\t\t\tand one that fails utterly.  There simply aren't enough fighters to muster the gravitational force they would need to pull the facility into the Null Zone.  As they try in vain to execute your orders, the defensive cannon easily picks them off.\n\t\t\t*gosub str_fail\n\t\t\n\t\t\n\t*if (str_aggro = true) and (str_skilly = true)\n\t\tYour strikers attempt to send precise shots into the satellite's fault lines, \n\t\t*if facility_striker > 50\n\t\t\tand they succeed admirably, creating a seismic reaction that depressurizes buildings, and sends internal fires coursing through others.  The production facility is completely destroyed, and as the wave of destruction spreads, you feel certain no survivors will remain.\n\t\t\t*gosub str_win_big\n\t\t*if facility_striker = 50\n\t\t\tand they are somewhat effective, creating a minor seismic disturbance that spreads gradually.  It depressurizes several buildings, starts internal fires in others, and seriously damages the production facility.  Many ${enemy_name} perish, but so do some of your less-skillful pilots.\n\t\t\t*gosub str_win_mod\n\t\t*if facility_striker \u003c 50\n\t\t\tbut they fail to hit the mark.  They simply haven't the skill to execute the maneuver.  While they focus in vain on the surface of the rock, the defensive cannons pick them off one by one.\n\t\t\t*gosub str_fail\n\t\t\n\t\t\n\t*if (str_aggro = true) and (str_cov = true)\n\t\tYour strikers spread out over the city and rain destruction.  \n\t\t*if facility_striker > 50\n\t\t\tMany structures depressurize under the attack, and internal fires begin to spread through others.  The production facility implodes.  You feel certain there will be no survivors anywhere once the effects of your onslaught have run their course.\n\t\t\t*gosub str_win_big\n\t\t*if facility_striker = 50\n\t\t\tSome structures depressurize under the attack, and internal fires start in a few others.  Many ${enemy_name} perish, and the production facility is damaged.  But there aren't enough strikers to overwhelm the enemy cannons, and some of your pilots don't make it back.\n\t\t\t*gosub str_win_mod\n\t\t*if facility_striker \u003c 50\n\t\t\tUnfortunately, there aren't nearly enough of them to make a dent in the defenses, and the AI cannons pick many of them off.\n\t\t\t*gosub str_fail\n\t\t\n\t\t\n*label can_results\n\n\nAs for your cannons, \n*if can_down = true\n\tthey stand down to conserve energy.\n\t\n\t*goto victory_matrix\n*if fleet_cannon != 0\n\t*if (can_slick = true) and (can_skilly = true)\n\t\tthey fire scramblers at the signal receptors of the incoming fighters.  \n\t\t*if fleet_cannon > 50\n\t\t\tThe affected fighters lose their connection with command, and go berserker.  The attack ends before it can begin.\n\t\t\t*gosub can_win_big\n\t\t*if fleet_cannon = 50\n\t\t\tThe fighters they manage to hit lose their connection with command, and go berserker, disrupting the squadron.  Still, some drones make it through.\n\t\t\t*gosub can_win_mod\n\t\t*if fleet_cannon \u003c 50\n\t\t\tIt's a good strategy, but your gunners don't have the skill to hit the mark.  The drones pass through their att
