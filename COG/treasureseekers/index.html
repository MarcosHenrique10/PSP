rying the sweat on your skin and making you shiver.  A series of stalactites and stalagmites line the eastern cave wall. Somewhere, water drips.\n\nThe mouth of the cave is to the west, leading outside.  The cave continues south into darkness.\n\n${teammate} stands close to you.\n*label cave_interior_choice\n*choice\n  *hide_reuse #Talk to ${teammate}.\n    *if ((teammate = \"Thisi\") and (preference != \"neither\"))\n      *set thisi_taloo %-10\n      Thisi shudders and grabs your arm.  \"I don't like it here,\" ${thisi_he} whispers. Then ${thisi_he} smiles, adding with a wink, \"Although we certainly are alone in a dark, secluded place.\"\n      *goto cave_interior_choice\n    *elseif ((teammate = \"Thisi\") and (preference = \"neither\"))\n      Thisi shudders. \"I don't like it here,\" ${thisi_he} whispers.\n      *goto cave_interior_choice\n    *elseif teammate = \"Taloo\"\n      *set thisi_taloo %+10\n      Taloo, her face reflecting yours, squeezes your hand. You don't mind; it's nice to have someone with you in the gloom.\n      *goto cave_interior_choice\n    *elseif teammate = \"Shelou\"\n      *set rallix_shelou %+10\n      \"This cave appears immense,\" observes Shelou Vili.  \"I wonder what we will find inside.\"\n      *goto cave_interior_choice\n    *else\n      *set rallix_shelou %-10\n      \"I hate it here,\" grumbles Rallix.  \"Let's find this crown as quickly as possible.\"\n      *goto cave_interior_choice\n  #Examine the stalactites and stalagmites.\n    You take a closer look at the stalactites and stalagmites.  They're too orderly to be natural, you think, three evenly spaced stalagmites followed by two stalactites followed by four stalagmites.\n    \n    At their base is a square section of rock that's different than the rest.  It almost looks like a depression that can be pushed farther down when stepped on. Like a button or a release of some kind.\n    *choice\n      #Step on the depression.\n        *set stepped_depression true\n        *label step_on\n        *set follower_leader %+10\n        *set cowardice_bravery %+10\n        Tossing caution to the wind, you step down on the depression. It lowers with a heavy grating sound.  An instant later, a handful of small arrows fly at you from hidden compartments in the wall,\n        *if psrs > 0\n          *set psrs -1\n          causing your personal shield recharger to spark on contact. The arrows bounce off you and fall harmlessly to the ground.\n\n          ${teammate} looks at you with even more concern.\n          *label damaged_choice\n          *choice\n            #Exit the cave through the west.\n              *goto cave_entrance\n            #Continue south, deeper into the cave.\n              *goto cave_wall\n        *else\n          *set health -20\n          piercing your flesh!\n          *if health \u003c 1\n            You collapse to the ground. ${teammate} rushes over to you, but your body's already succumbing to the poison-filled arrows.  Writhing in pain, you feel your last breath escaping your chest and close your eyes forever.\n\n            GAME OVER.\n            *goto_scene ending\n          *else\n            You quickly yank the arrows out of your skin, trying to ignore the pain, while ${teammate} hovers over you.\n            *goto damaged_choice\n      *hide_reuse *if (stepped_depression = false) #Have ${teammate} step on the depression.\n        *set follower_leader %-30\n        *set cowardice_bravery %-30\n        *set suspicion +5\n        *if teammate = \"Thisi\"\n          \"Sorry,\" says Thisi flatly, \"but I don't want to take that risk.  It could be a trap.\"\n          *label teammate_step_choice\n          *choice\n            #Step on the depression yourself.\n              *goto step_on\n            #Exit the cave through the west.\n              *goto cave_entrance\n            #Continue south, deeper into the cave.\n              *goto cave_wall\n        *elseif teammate = \"Taloo\"\n          Taloo shakes her head vigorously, her whole body shaking.  You'll never get her to step on the depression.\n          *goto teammate_step_choice\n        *elseif teammate = \"Shelou\"\n          \"Taking that action would be unwise,\" states Shelou Vili firmly, \"given that we do not know what it will do.  I do not feel comfortable taking that risk.\"\n          *goto teammate_step_choice\n        *else\n          Rallix growls at you.  \"Are you insane?!  We have no idea what that will do!\"\n          *goto teammate_step_choice\n      #Exit the cave through the west.\n        *goto cave_entrance\n      #Continue south, deeper into the cave.\n        *goto cave_wall\n  #Exit the cave through the west.\n    *goto cave_entrance\n  #Continue south, deeper into the cave.\n    *goto cave_wall\n\n\n\n*comment -----CAVE WALL-----\n\n*label cave_wall\n*set found_dead_end true\n*set mission_step 5\nYou continue deeper into the cave until the darkness becomes almost unbearable.  Turning a corner by feel alone, you're thrilled to see light again.  Soon you arrive at a dead end. Two red torches burn against the back wall. You're stuck.\n*label cave_wall_choice\n*choice\n  *selectable_if (specialization = \"infiltration\") #Thoroughly search for other paths in the cave. (INFILTRATION)\n    You know the direct route is seldom the best, so you feel around for hidden side paths leading to other areas of the cave.\n\n    *rand success_chance 1 10\n    *if success_chance \u003c 7\n      *set success_chance 0\n      Unfortunately, you don't find any hidden passages.  You think fast. Either you try again, or you figure out some other way out of the cave.\n      *goto cave_wall_choice\n    *else\n      *set success_chance 0\n      Your advanced training in infiltration pays off as you discover a small crawl space. Even better, there's a medium-sized passage leading south beyond it!\n      *page_break Follow the passage, leaving ${teammate} behind.\n      *goto treasure_room\n  #Examine the southern wall closely.\n    You scrutinize the southern wall and discover a series of glyphs carved there. Each glyph sits atop a button built directly into the wall. You quickly recognize the glyphs as numbers reading, ${glyph_1}, ${glyph_2}, ${glyph_3}. Excited, you knock on the wall, producing a hollow sound. You're sure something's behind it.\n    *choice\n      *selectable_if (specialization = \"tactical\") #Search for weaknesses in the wall. (TACTICAL)\n        You're on a mission and have a crown to find; there's no time for subtlety. Using your advanced tactical training, you begin to examine the wall in minute detail, hoping to find any structural weaknesses.\n\n        *rand success_chance 1 10\n        *if success_chance \u003c 7\n          *set success_chance 0\n          Unfortunately, you can't find any weaknesses in the wall.  You think fast. Either you try again, or you figure out some other way out of the cave.\n          *goto cave_wall_choice\n        *else\n          *set success_chance 0\n          Your perseverance pays off, and you quickly determine the wall's weak spot.  Picking up a heavy rock, you bang on the spot, causing the wall to begin to crack.  ${teammate} watches as you continue to slam down until the wall gives way, collapsing to rubble.  A makeshift path opens before you, heading south beyond the false wall and deeper into the cave.\n          *page_break Walk through the rubble, leaving ${teammate} behind.\n          *goto treasure_room\n      *selectable_if (pistol_charges > 0) #Destroy the wall with your disposable laser pistol.\n        *set pistol_charges -1\n        You pull out your disposable pistol. Aiming it squarely at the wall, you pull the trigger.\n\n        *rand success_chance 1 10\n        *if success_chance \u003c 6\n          *set success_chance 0\n          The laser beam strikes the wall but fails to destroy any rock.   You think fast. If you have any charges, you can try again, or you'll have to figure out some other way out of the cave.\n          *goto cave_wall_choice\n        *else\n          The laser beam strikes the wall, which collapses in on itself.  Rubble spills to the ground, exposing a makeshift path that leads south, beyond the wall and deeper into the cave.\n          *page_break Walk through the rubble, leaving ${teammate} behind.\n          *goto treasure_room\n      #Change the numbers on the glyphs.\n        *label glyphs_change\n        The glyphs currently read: ${glyph_1}, ${glyph_2}, ${glyph_3}.  Which glyph do you want to change?\n        *choice\n          #Glyph 1.\n            *label glyph_1_choice\n            Glyph 1 reads: ${glyph_1}.\n            *choice\n              *selectable_if (glyph_1 \u003c 9) #Raise the number.\n                *set glyph_1 +1\n                *if ((glyph_1 = 3) and (glyph_2 = 2)) and (glyph_3 = 4)\n                  *goto glyphs_solved\n                *else\n                  *goto glyph_1_choice\n              *selectable_if (glyph_1 > 1) #Lower the number.\n                *set glyph_1 -1\n                *if ((glyph_1 = 3) and (glyph_2 = 2)) and (glyph_3 = 4)\n                  *goto glyphs_solved\n                *else\n                  *goto glyph_1_choice\n              #You're done adjusting glyph 1.\n                *goto glyphs_change\n          #Glyph 2.\n            *label glyph_2_choice\n            Glyph 2 reads: ${glyph_2}.\n            *choice\n              *selectable_if (glyph_2 \u003c 9) #Raise the number.\n                *set glyph_2 +1\n                *if ((glyph_1 = 3) and (glyph_2 = 2)) and (glyph_3 = 4)\n                  *goto glyphs_solved\n                *else\n                  *goto glyph_2_choice\n              *selectable_if (glyph_2 > 1) #Lower the number.\n                *set glyph_2 -1\n                *if ((glyph_1 = 3) and (glyph_2 = 2)) and (glyph_3 = 4)\n                  *goto glyphs_solved\n                *else\n                  *goto glyph_2_choice\n              #You're done adjusting glyph 2.\n                *goto glyphs_change\n          #Glyph 3.\n            *label glyph_3_choice\n            Glyph 3 reads: ${glyph_3}.\n            *choice\n              *selectable_if (glyph_3 \u003c 9) #Raise the number.\n                *set glyph_3 +1\n                *if ((glyph_1 = 3) and (glyph_2 = 2)) and (glyph_3 = 4)\n                  *goto glyphs_solved\n                *else\n                  *goto glyph_3_choice\n              *selectable_if (glyph_3 > 1) #Lower the number.\n                *set glyph_3 -1\n                *if ((glyph_1 = 3) and (glyph_2 = 2)) and (glyph_3 = 4)\n                  *goto glyphs_solved\n                *else\n                  *goto glyph_1_choice\n              #You're done adjusting glyph 3.\n                *goto glyphs_change\n          #Do something else.\n            *goto cave_wall_choice\n      #Go north, back the way you came.\n        *goto cave_interior\n  *hide_reuse #Talk to ${teammate}.\n    *if teammate = \"Thisi\"\n      *set thisi_taloo %-10\n      Thisi eyes the back wall suspiciously.  \"Why would someone build a tunnel through a cave that leads to a dead end—especially a dead end with lit torches?\"  The Nyarri bites ${thisi_his} lower lip, then turns to you and smiles. \"We should take a closer look at that wall.\"\n      *goto cave_wall_choice\n    *elseif teammate = \"Taloo\"\n      *set thisi_taloo %+10\n      Taloo's eyes narrow as she appraises the back wall.  After staring at it for several seconds, she turns to you, beaming, and points to the wall.  She couldn't be any clearer if she screamed, \"Look closer!\"\n      *goto cave_wall_choice\n    *elseif teammate = \"Shelou\"\n      *set rallix_shelou %+10\n      Shelou Vili stands in the center of the dark room and crosses his arms.  \"This makes no sense,\" he mutters.  \"Why would this passage lead to a dead end?  Furthermore, why highlight this wall with two torches?\"  He turns to you.  \"We should investigate further.\"\n      *goto cave_wall_choice\n    *else\n      *set rallix_shelou %-10\n      Rallix growls as it looks around, darting side to side like a caged animal.  \"There must be a way out of here!\" it shouts. \"Hurry up and find it!  I can't stand feeling trapped.\"\n      *goto cave_wall_choice\n  #Go north, back the way you came.\n    *goto cave_interior\n\n*label glyphs_solved\nThe glyphs now read 3, 2, and 4, respectively.  The instant these numbers appear, a section of rock slides down, causing the entire cave to rumble. Bits of debris fall to the ground around you, some stabbing your arms and ankles. A southbound passage opens before you, leading deeper into the cave.\n*page_break Walk through the passage, leaving ${teammate} behind.\n*goto treasure_room\n\n\n\n*comment -----TREASURE ROOM-----\n\n*label treasure_room\n*set mission_step 6\nYou traverse the southern passage alone, ${teammate} having stayed behind in case your lead doesn't pan out.  After several minutes wandering in near darkness, you see sunlight up ahead.  The passage terminates in a large, circular room carved out of the cave wall. Sunlight streams down from the open ceiling, highlighting a marble pedestal in the center of the room. Your mouth opens, then closes when you realize what's resting on the pedestal—a majestic crown, sparkling in the sunlight.\n\nOff to one side of the room sits a sturdy but worn treasure chest.\n\nFrom the corner of your eye, you spot a dark shadow quickly gliding along the outskirts of the room. Before you can react, it reaches the pedestal.\n\nKraska.\n*page_break\nSinister laughter rings in your ears as the Shadow Fiend greedily darts toward the center of the room.  Once he reaches the pedestal, he turns to you, smiles wickedly, and reaches up to grab the crown's shadow.  As Kraska touches the crown's shadow, the actual, physical crown floats into the air. You rub your eyes. Did you really see that?\n\nThe shadow of Kraska places the crown on his head, and as he does, he materializes into existence, a physical creature manifested in the world.  Kraska snarls and shoves you aside to exit in the direction you came.  His laughter echoes across the dark walls of the cave.\n\nYou…\n*choice\n  #…chase after Kraska!\n    *goto_scene chapter_4c_jeeq_chase\n  #…examine the treasure chest.\n    Kraska can wait.  You hurry to the treasure chest and examine it.  The lid is locked and requires an ancient key to open it…a key you don't have.\n    *label chest_choice\n    *choice\n      *selectable_if (lockpicks > 0) #Pick the lock with a sonic lockpick.\n        *set lockpicks -1\n        Grateful that you have one, you use the sonic lockpick to unlock the chest. With a satisfying click, the chest opens.\n\n        *goto treasure_chest\n      *disable_reuse #Try to force open the lid.\n        *if harsh_kind > 35\n          *if harsh_kind > 65\n            *set health -10\n            *if health \u003c 1\n              Try as you might, you can't force open the lid, and trying strains something in your back.  You drop to the ground, unable to move due to the pain.  You call out for ${teammate}, but no response comes.  After hours of waiting, you fall asleep.  Days pass, and unable to move, let alone eat or drink, you die a slow, agonizing death. Your body is never found.\n              *goto_scene ending\n            *else\n              Try as you might, you can't force open the lid, and attempting to do strains your back.\n              *goto chest_choice\n          *else\n            Try as you might, you can't force open the lid.\n            *goto chest_choice\n        *else\n          Huffing and puffing, you give the lid one last heave and force it open.\n\n          *goto treasure_chest\n      #Give up and chase after Kraska.\n        You realize that you're wasting time staring at this treasure chest.  You quickly turn and follow Kraska into the darkness.\n        *finish Continue\n\n*label treasure_chest\nThe chest is filled with shiny gold coins.\n*choice\n  #Take the coins before chasing after Kraska.\n    *set has_stolen_treasure_jeeq true\n    *set number_of_goods_stolen +1\n    *set suspicion +10\n    *set duplicity_loyalty %-20\n    *set cowardice_bravery %+10\n    This is too good an opportunity to miss. You scoop up all the coins and drop them into your pouch.  Hopefully you can keep them hidden from the rest of the crew.  After all, that much loot will earn you some serious credits the next time you land on Tuskin.  Once the coins are securely tied up, you chase after Kraska.\n    *finish Continue\n  #Take the coins for the crew before chasing after Kraska.\n    *set duplicity_loyalty %+30\n    *set cowardice_bravery %+10\n    This is too good an opportunity to miss. You scoop up all the coins and drop them into your pouch to share with the others later.  Once the coins are securely tied up, you chase after Kraska.\n    *finish Continue\n  #Leave the coins and chase after Kraska.\n    *set duplicity_loyalty %+10\n    *set cowardice_bravery %-20\n    The coins are tempting—you've never seen so much gold in one place before—but what if they're fake? Or a trap? You finally decide to leave them behind and chase after Kraska instead.\n    *finish Continue\n", "chapter_4c_jeeq_chase": "*temp following\n*set following \"Isan\"\n\nYou return the way you came, running north through the dark passage leading to the false dead end in the cave. You're going to catch the Shadow Fiend Kraska!\n*if cowardice_bravery \u003c 25\n  As you run, you look over your shoulder. Your heart pounds with fear.\n  *goto chase_continued_1\n*elseif cowardice_bravery \u003c 50\n  As you run, you're a little worried but think you'll be okay.\n  *goto chase_continued_1\n*elseif cowardice_bravery > 75\n  As you run, exhilaration fills you, making you fearless. Whatever happens, this is definitely an adventure!\n  *goto chase_continued_1\n*else\n  As you run, you're fearless. You feel like you could fly.\n  *goto chase_continued_1\n*label chase_continued_1\nThough you trip several times on the way, it's not long before you arrive back in the cave with the glyphs. There you find ${teammate} fidgeting in confusion and worry.\n\n*if teammate = \"Thisi\"\n  \"What happened?!\" demands Thisi, ${thisi_his} voice panicked.\n  *goto chase_continued_2\n*elseif teammate = \"Taloo\"\n  Taloo's eyes widen in fear. You can see her shaking. She gestures frantically, clearly demanding to know what happened.\n  *goto chase_continued_2\n*elseif teammate = \"Shelou\"\n  Shelou Vili looks around suspiciously.  \"A figure ran by me,\" he states, \"and it looked like Kraska.  But Kraska in a physical form.  What has transpired, ${name}?\"\n  *goto chase_continued_2\n*else\n  Rallix looks livid.  \"I saw Kraska!\" it shouts.  \"In the physical world!  What in the name of the Great Mother did you do?\"\n  *goto chase_continued_2\n*label chase_continued_2\n\nYou explain to ${teammate} what you saw in the cave—that Kraska's shadow picked up the crown, which caused him to turn solid.\n*if follower_leader \u003c 50\n  Not used to taking control, you ask ${teammate} what to do next.\n  \n  *if teammate = \"Taloo\"\n    Taloo points in the direction Kraska ran. \"Go after him!\" she seems to say.\n\n    *goto chase_continued_3\n  *else\n    ${teammate} wastes no time, pointing in the direction Kraska ran and replying, \"After him!\"\n\n    *goto chase_continued_3\n*else\n  A natural leader, you seize control of the situation and tell ${teammate} to point you in the direction Kraska ran.\n  *goto chase_continued_3\n*label chase_continued_3\nA second later, you run alongside ${teammate}, hot on Kraska's trail. The Shadow Fiend's sinister laughter echoes through the walls as you race north through the cave. The entrance comes into view, and you veer west, heading toward its bright mouth.\n\nYou dash outside, and the daylight momentarily blinds you. As your pupils constrict, trying to compensate, a horrifying image comes into focus: hundreds of Shadow Fiends fill the clearing, all of them wearing physical bodies. At the center of the clearing is Kraska, the crown on his head, a wicked smile on his face.\n*page_break\n\"You fools!\" he shouts. \"[i]I[/i] was your anonymous buyer. Thanks to you, I once again have the Sacred Crown…and my people are no longer cursed to walk in the shadows!  We will rule this galaxy once more!\"\n\nKraska falls back until he blends in with the crowd of Shadow Fiends. Your stomach clenches as the evil creatures surround you.\n\nYou…\n*label surrounded_choice\n*choice\n  #…abandon ${teammate} to save yourself.\n    *if teammate = \"Thisi\"\n      *set thisi_taloo %+40\n      *goto abandon_teammate\n    *elseif teammate = \"Taloo\"\n      *set thisi_taloo %-40\n      *goto abandon_teammate\n    *elseif teammate = \"Shelou\"\n      *set rallix_shelou %-40\n      *goto abandon_teammate\n    *else\n      *set rallix_shelou %+40\n      *goto abandon_teammate\n  #…stand with ${teammate}. You'll face the creatures together.\n    *if teammate = \"Thisi\"\n      *set thisi_taloo %-40\n      *goto face_creatures\n    *elseif teammate = \"Taloo\"\n      *set thisi_taloo %+40\n      *goto face_creatures\n    *elseif teammate = \"Shelou\"\n      *set rallix_shelou %+40\n      *goto face_creatures\n    *else\n      *set rallix_shelou %-40\n      *goto face_creatures\n  *hide_reuse #…try to reason with the Shadow Fiends.\n    Hoping to convince the Shadow Fiends to see reason, you point out the futility of their imminent attack. Don't they want to work something out with you? Unfortunately, your words do nothing to stop them from closing in.\n    *goto surrounded_choice\n\n\n\n*label abandon_teammate\n*set duplicity_loyalty %-30\n*set follower_leader %+10\n*set cowardice_bravery %-40\n*set harsh_kind %-20\nTo hell with ${teammate}! Your life is in danger, and you're going to do whatever you can to protect yourself. As the Shadow Fiends approach, you take several slow, cautious steps backward. You glance around, but ${teammate}'s staring helplessly at the shadow creatures.\n\nYou dart to the left. Taken aback, the Shadow Fiends don't immediately react. With their attention split between you and ${teammate}, you slip between two of the creatures and run into the brush.\n*label run_through_brush\n*page_break\nYou run and run, ignoring the stitch in your side. The harsh sounds behind you make it clear the Shadow Fiends are in close pursuit. Terrified, you plunge into dense foliage. Branches and thorns slice your skin, but you don't stop.\n*if borion_died = false\n  *set following \"Borion\"\n  \"${name}!\" whispers a voice up ahead. Glancing in the direction of the voice, you spot a wide-eyed Borion frantically waving at you. You charge toward the Vervoo slave, who grabs your arm and guides you through the foliage.\n\n  For the first time, you risk a look behind you and wish you hadn't. Four Shadow Fiends are gaining on you.\n\n  \"Hurry!\" shouts Borion, making a sharp right.\n  \n  Your lungs burn, but you run, unable to think, legs on autopilot as you fight to keep up with Borion as he speeds up.\n  *goto return_to_ship\n*else\n  \"${name}!\" whispers a voice up ahead. Glancing in the direction of the voice, you spot Captain Isan, ${isan_his} face intense, fiercely waving at you. You charge toward the lean captain, who grabs your arm and guides you through the foliage.\n\n  For the first time, you risk a look behind you and wish you hadn't. Four Shadow Fiends are gaining on you.\n\n  \"Hurry!\" shouts Isan, making a sharp right.\n\n  Your lungs burn, but you run, unable to think, legs on autopilot as you fight to keep up with the captain as ${isan_he} speeds up.\n  *goto return_to_ship\n\n\n\n*label face_creatures\n*set duplicity_loyalty %+30\n*set follower_leader %-10\n*set cowardice_bravery %+40\n*set harsh_kind %+20\nYou refuse to leave ${teammate}'s side; no matter what happens, you're in this together.\n*if follower_leader \u003c 66\n  *if teammate = \"Taloo\"\n    Taloo looks around, panicked, her form morphing back and forth between doubles of you and various Shadow Fiends.  She cocks her head to the left, and her eyes widen. Grabbing your hand, she starts running.\n    \n    You follow her, darting to the left. Taken aback, the Shadow Fiends don't immediately react. Before they recover, ${teammate} and you slip between two of the creatures and run into the brush.\n    *goto run_through_brush\n  *else\n    ${teammate} looks around at the ring of Shadow Fiends surrounding you. \"There's an opening in their left flank,\" ${teammate} whispers to you. \"Get ready to move on three.\" You nod subtly.\n    \n    \"One. Two. Three!\"\n    *page_break\n    The instant ${teammate} says \"three,\" you dart to the left, ${teammate} at your side. Taken aback, the Shadow Fiends don't immediately react. Before they recover, ${teammate} and you slip between two of the creatures and run into the brush.\n    *goto run_through_brush\n*else\n  Looking around at the ring of Shadow Fiends surrounding you, you spot an opening in their left flank. \"You direct ${teammate}'s eyes to that point and mutter, \"On three.\" ${teammate} nods subtly.\n  \n  \"One. Two. Three!\"\n  *page_break\n  The instant you say, \"three,\" you dart to the left, ${teammate} at your side. Taken aback, the Shadow Fiends don't immediately react. Before they recover, ${teammate} and you slip between two of the creatures and run into the brush.\n  *goto run_through_brush\n\n\n\n*label return_to_ship\n*page_break\nJust as you know you're going to vomit if you don't stop running, you spot a welcome sight in the distance: the sleek, shining [i]Lady Luck[/i]. ${following} must've led you back to your starting point! Adrenaline rushes through you, and you hurtle toward the crew waving frantically from the ship's entrance ramp.\n\nAn instant later, you race up the ramp and into the ship. How did you even make it this far? you wonder, gasping for breath. You don't know, but you're grateful. The ramp retracts as the Shadow Fiends approach, snarling and hissing. As the door closes, you see Kraska grinning maniacally, still wearing that hateful crown.\n\nYou turn away and meet Captain Isan's intent gaze. The [i]Lady Luck[/i] lifts off, rising up into the air, away from this hellish world and the traitorous Kraska.\n*finish", "chapter_5a_intro": "*advertisement 1200\nCHAPTER 5 - TUSKIN REVISITED\n\nThe trip away from Jeeq passes in a haze. No one speaks, lost in morose thoughts about the mission's disastrous outcome. It's impossible to concentrate on any of your duties. You practically jump with relief when, nearly twenty-four hours after the [i]Lady Luck[/i] departed the planet, you're summoned to Captain Isan's office.\n*page_break Proceed to the captain's office.\nYou enter Isan's office to find ${isan_him} standing staring through a small window out at space.\n*choice\n  #Greet Isan.\n    *set follower_leader %+10\n    You greet the captain, and ${isan_he} nods almost imperceptibly.\n    *goto isan_continued_1\n  #Remain silent.\n    *set follower_leader %-10\n    \"I'm not in much of a mood to talk, either,\" murmurs the captain.\n    *goto isan_continued_1\n*label isan_continued_1\n\"We're returning to Tuskin,\" ${isan_he} says, not moving from ${isan_his} position near the window. \"After what happened on Jeeq, I think we could all use some time to recover.\"  ${isan_he} turns to face you, and ${isan_his} eyes are dark with regret.  \"Kraska's betrayal devastated us all.  I should've seen it coming, should have known better.  But I was stupid. I had my eyes set on the treasure…on profit.\n*if borion_died = true\n  And because of my ignorance, Borion is dead.  This mission—his death—it's all my fault.\"\n  *goto isan_continued_2\n*else\n  We only survived because of dumb luck…and because of you.  This disaster of a mission—it's all my fault.\"\n  *goto isan_continued_2\n*label isan_continued_2\n*choice\n  #\"It's completely your fault. You should be ashamed of yourself.\"\n    *set duplicity_loyalty %-10\n    *set cowardice_bravery %+20\n    *set harsh_kind %-20\n    *set garce_isan %-10\n    Isan drops ${isan_his} gaze. \"You're absolutely right, ${name}. I dropped the ball. And we're all paying for it now.\"\n    *goto isan_continued_3\n  #\"What happened was everyone's fault. We all agreed to the mission, and we're all to blame.\"\n    *set cowardice_bravery %+10\n    *set harsh_kind %+10\n    Isan's mouth purses. \"No, it's my fault, ${name}. The buyer of the crown was anonymous. Anonymous! I know better than to take assignments like that!\"\n    *goto isan_continued_3\n  #\"No one's at fault for what happened. No one, that is, but Kraska.\"\n    *set duplicity_loyalty %+10\n    *set cowardice_bravery %-10\n    *set harsh_kind %+20\n    *set garce_isan %+10\n    Isan's mouth purses. \"But it is my fault, ${name}. The buyer of the crown was anonymous.  Anonymous! I know better than to take assignments like that!\"\n    *goto isan_continued_3\n*label isan_continued_3\n\nIsan quickly looks away and straightens ${isan_his} shirt. \"Do you know what species I am, ${name}?  I don't think I ever told you.\"\n*choice\n  #\"Aren't you human?\"\n    Isan chuckles humorlessly.  \"You might think so, but no,\" ${isan_he} says.\n    *goto isan_continued_4\n  #\"You're a Procon, aren't you?\"\n    Isan looks mildly impressed.  \"You're right, ${name},\" ${isan_he} says. \"Well done.\"\n    *goto isan_continued_4\n  #\"I'd guess Vervoo, but I can't see through your skin.\"\n    Isan chuckles humorlessly.  \"Funny,\" ${isan_he} says. \"Very funny.\"\n    *goto isan_continued_4\n  #\"I have no idea what you are.\"\n    Isan shoots you an amused look.  \"I appreciate your honesty,\" ${isan_he} says.\n    *goto isan_continued_4\n*label isan_continued_4\n\"I am Procon.  My people are all albino.  We may be frail, but that doesn't mean we aren't powerful.  Some call us magical because we have the ability to shoot lightning from our fingertips.\" Isan laughs. \"But it's simpler than that; we can absorb electricity from our surroundings and direct it toward specific targets.  Doing so, however, strains our system. Oh, and it's usually fatal.\"\n\nIsan steps away from the window and looks you straight in the eye. \"I'm telling you this because I want you to know that I'd die for my crew.  I should have died there on Jeeq to protect the rest of you.\n*if borion_died = true\n  I should've been the one to die, not Borion.\n  *goto isan_continued_5\n*label isan_continued_5\nBut I'm a coward, and now you know it as well as the rest of the crew.  I vow to you now, ${name}, that I will never make this mistake again.  I vow it on my life.\"\n\nYou nod, and Isan continues. \"When we arrive back at Tuskin, I will look for more work—reputable work this time.  I swear to you, I will make this right.\"\n\nIsan walks slowly over to ${isan_his} desk and sits down.\n*if borion_died = true\n  \"Now, about Borion.  He meant a lot to us all, ${name}, and his loss saddens me deeply. That said, he once told me that if anything happened to him, he wanted his possessions divided among the crew.  That includes you. I'm giving you 100 credits—they were to be part of a gift to Borion the day I set him free from slavery.\" Isan sighs.\n  *choice\n    #\"Thank you, Captain.  I accept the credits.\"\n      *set credits +100\n      \"I know it won't make up for his death,\" says Isan, \"but it's the best I can do.\"\n      *goto isan_continued_6\n    #\"Credits can't fix this. Nothing can.  I don't want them.\"\n      \"Suit yourself,\" says Isan.  \"But it's what Borion would have wanted.\"\n      *goto isan_continued_6\n*label isan_continued_6\n*if (took_garce_offer = true) and (told_isan_about_garce = true)\n\n      Isan folds ${isan_his} hands on the desk and adopts a more formal tone.  \"Since we're returning to Tuskin, there's a chance you may run into your new friend Detective Garce again.  I assume you still have the tracking device ${garce_he} gave you? I suggest trying to plant it on ${garce_him}.  Let's use ${garce_his} own plan against ${garce_him}, so that we can avoid tangling with the GPF.  Is this acceptable to you?\"\n      *choice\n        *if (planted_device = true) #\"I…er…I lost the device.\" (Lie.)\n          *set suspicion +10\n          *set garce_isan %-10\n          *set duplicity_loyalty %-10\n          \"Hmm,\" grumbles Isan, eyeing you suspiciously.  \"That's a shame, isn't it?\"\n          *goto isan_continued_7\n        #\"Yes, I can try to plant the device on ${garce_him}.\"\n          *set garce_isan %+10\n          *set duplicity_loyalty %+10\n          *set cowardice_bravery %+10\n          \"Wonderful,\" says Isan sarcastically.  \"All we were missing was Garce on our tail. Glad that's rectified.\"\n          *goto isan_continued_7\n        #\"No, I'd rather not get involved.\"\n          *set garce_isan %-10\n          *set duplicity_loyalty %-10\n          *set cowardice_bravery %-10\n          \"Well,\" says a disappointed Isan, \"I can't force you.  But at least consider it.\"\n          *goto isan_continued_7\n*label isan_continued_7\nIsan sits back in ${isan_his} chair.  \"That's all for now.  I'm not going to bother with any official debriefings, promotions, or demotions.  Not after what happened on Jeeq.  Just rest up and prepare to revisit Tuskin.  And ${name}?  Once again, I'm sorry.\"\n*finish Continue", "chapter_5b_tuskin": "*temp went_to_mess_hall\n*set went_to_mess_hall false\n*temp went_to_bar\n*set went_to_bar false\n*temp saw_borion\n*set saw_borion false\n*temp saw_girl\n*set saw_girl false\n*temp got_message\n*set got_message false\n*temp has_drink\n*set has_drink false\n\nA few days later, the ship arrives on Tuskin. The crew's morale is so miserable, you can almost feel it, and all you want to do is hide in your bed. Once the ship finally lands, the captain releases the crew for the rest of the evening. Isan, Rallix,\n*if borion_died = true\n  and Shelou Vili\n  *goto depart_ship\n*else\n  Shelou Vili, and Borion\n  *goto depart_ship\n*label depart_ship\ndepart the ship, while Thisi and Taloo remain aboard.\n\n*if rank = 1\n  Despite your current status as prisoner, you've been granted a night of free access to Tuskin.  Before you left the ship, Captain Isan informed you that Rallix would be monitoring your location closely through your slave collar.  Should you try to escape, they'll catch you, so it's in your best interest to stay within the commercial sector. The captain did seem sympathetic, though—enough that Rallix won't be escorting you.\n  *goto depart_ship_continued\n*elseif rank = 2\n  Despite your current status as slave, you've been granted a night of free access to Tuskin.  Before you left the ship, Captain Isan informed you that Rallix would be monitoring your location closely through your slave collar.  Should you try to escape, they'll catch you, so it's in your best interest to stay within the commercial sector. The captain did seem sympathetic, though—enough that Rallix won't be escorting you.\n  *goto depart_ship_continued\n*else\n  As a member of the crew, you've been granted unrestricted access to the planet.  Captain Isan only asks that you remain within the commercial sector, and that you return by 0000 hours, local time. That's easy enough.\n  *goto depart_ship_continued\n*label depart_ship_continued\n*page_break\n*label ship_exit\nIt's early evening as you near the [i]Lady Luck[/i]'s exit.\n*label ship_exit_choice\n*choice\n  #Go to the ship's mess hall.\n    *goto mess_hall\n  *if (has_stolen_treasure_ship = false)\n    *hide_reuse #Go to the ship's cargo bay.\n      *goto cargo_bay\n  #Depart the ship.\n    You walk down the ramp connecting the ship to the brown earth of Tuskin.\n    *if (saw_borion = false) and (borion_died = false)\n      *set saw_borion true\n\n      As you reach the bottom of the ramp, you spot Borion admiring the nearby buildings, a big smile on his face.\n      \n      \"Hey, ${name}!\" he says.  \"Boy, T-Tuskin sure is amazing, isn't it?\"  Without waiting for your answer, he runs off into the crowd.\n      *page_break\n      *goto tuskin_entrance\n    *else\n      *page_break\n      *goto tuskin_entrance\n\n*label cargo_bay\nYou enter the spacious cargo bay. The ship's lone shuttle sits idly at the back of the room, almost hidden among the crates heaped inside. You notice the crate at your feet is open. Curious, you peek inside. It's packed with valuables and treasures, probably enough to fund you for the rest of your life.\n*choice\n  #Steal a piece of treasure.\n    *set has_stolen_treasure_ship_2 true\n    *set number_of_goods_stolen +1\n    *set duplicity_loyalty %-10\n    *set suspicion +5\n    You find an exquisite hand-crafted wooden bowl. No one will miss this, you think, dropping it into your pocket. There's no reason to stay and risk getting caught, so you exit the cargo bay and return to the [i]Lady Luck[/i]'s exit.\n    *page_break\n    *goto ship_exit\n  #Leave the cargo bay without taking anything.\n    *set duplicity_loyalty %+10\n    It's tempting, but you don't want to steal from the crew who took you in, so you turn and leave the cargo bay.\n    *page_break\n    *goto ship_exit\n\n\n*label mess_hall\n*if went_to_mess_hall = true\n  You enter the ship's mess hall and find Thisi and Taloo still sitting together, Thisi in the middle of telling a story.  You decide not to interrupt them further.\n  *page_break Return to the ship's exit.\n  *goto ship_exit\n*else\n  *set went_to_mess_hall true\n  *set duplicity_loyalty %+20\n  Hungry, you enter the ship's mess hall. Two Thisis huddle over a table, deep in conversation. It's Thisi's dream come true, you think, trying not to laugh—a chance to talk to ${thisi_him}self. Of course, one of them must be Taloo.\n  *if thisi_taloo \u003c 35\n    Thisi glances up and waves you over.\n    *goto mess_talk\n  *elseif thisi_taloo > 65\n    Taloo—at least you assume it's Taloo, as she's the silent Thisi—glances up and waves you over.\n    *goto mess_talk\n  *else\n    Both Thisis glance up and wave you over.\n    *goto mess_talk\n  *label mess_talk\n\n  \"Hello, ${name},\" says Thisi.  \"Taloo and I were just working out some of our differences.\"  The Nyarri nods toward ${thisi_his} doppelgänger, and Taloo smiles back.  \"Given everything that happened on Jeeq, it seems kind of petty for us not to get along.\"\n\n  Taloo looks at you, then away, her cheeks flushing.  \n\n  *if ((preference = \"men\") or (preference = \"women\"))\n     You're flattered and embarrassed—you've never had two capable, attractive people competing for you before!\n\n  \"The mission was a disaster, wasn't it?\" continues Thisi.  \"I can't believe Kraska betrayed us.  Captain Isan should never have trusted him.  It's ${isan_his}'s fault everything happened the way it did.\"\n  \n  Taloo shakes her head vehemently. Clearly she doesn't blame Isan.\n  *choice\n    #\"The captain set up the mission, so the blame goes to ${isan_him}.\"\n      *set thisi_taloo %-20\n      *set harsh_kind %-10\n      *set duplicity_loyalty %-20\n      \"I couldn't agree more, ${name},\" says Thisi, smiling in approval. Taloo shakes her head sadly.\n      *goto mess_borion_check\n    #\"It wasn't the captain's fault.\"\n      *set thisi_taloo %+20\n      *set harsh_kind %+10\n      *set duplicity_loyalty %+20\n      Taloo smiles brightly, but Thisi scowls.  \"Isan's our commander,\" Thisi says, \"and ${isan_he} should take better care of us.\"\n      *goto mess_borion_check\n    #\"We all agreed to the mission.  We're all equally to blame.\"\n      *set thisi_taloo %+10\n      *set duplicity_loyalty %-10\n      Taloo nods in assent.  Thisi, however, protests.  \"I don't know about the two of you, but I was only following orders.  How is it even partially my fault?\"\n      *goto mess_borion_check\n    #\"The only person responsible for what happened is Kraska.\"\n      *set thisi_taloo %-10\n      *set duplicity_loyalty %+10\n      \"You know,\" Thisi says thoughtfully, \"that's a good point, ${name}.  I've been blaming the captain when Kraska's the one who betrayed us.  He played us all.\"  Taloo nods sadly.\n      *goto mess_borion_check\n  *label mess_borion_check\n  *if borion_died = true\n\n    Thisi's face turns somber.  \"It's so sad about Borion,\" ${thisi_he} whispers.  Taloo lowers her head.  \"He deserved better than he got.\"\n    *choice\n      #\"Poor Borion!  I miss him so much already.\"\n        *set harsh_kind %+20\n        *set duplicity_loyalty %+10\n        Taloo nods in sad agreement as Thisi's eyes mist over.  \"Me, too,\" Thisi says.\n        *goto mess_log_check\n      #\"He could be annoying at times, but he didn't deserve to die.\"\n        *set harsh_kind %+10\n        *set duplicity_loyalty %+10\n        Taloo nods in sad agreement as Thisi's eyes mist over.  \"He may have come off as annoying, but it's only because of how much he cared about us,\" Thisi says.\n        *goto mess_log_check\n      #\"What happened to Borion was his own fault.  He was careless.\"\n        *set harsh_kind %-10\n        *set duplicity_loyalty %-10\n        Taloo looks at you in shock as Thisi's eyes mist over.  \"That's a horrible thing to say, ${name},\" ${thisi_he} whispers.  \"Borion really cared about you.\"\n        *goto mess_log_check\n      #\"Borion was a pain.  Good riddance to him.\"\n        *set harsh_kind %-20\n        *set duplicity_loyalty %-10\n        Taloo looks at you in shock as Thisi's eyes mist over.  \"How can you say that?\" ${thisi_he} demands.  \"Borion showed you nothing but kindness.  How can you be so heartless?\"\n        *goto mess_log_check\n    *label mess_log_check\n    *if saw_log = false\n\n      Thisi pauses and looks away. \"I finally decrypted the files from the Vervoo ship we encountered.  Remember how we tried to find out what happened to the crew when the Rekelians attacked?\" You nod, waiting. \"Well, it turns out most of the crew escaped the ship in time. They fled here to Tuskin! I just wish…I wish Borion were still alive so that I could tell him that.  It would've made him happy.\"\n\n      Thisi bows ${thisi_his} head, joining Taloo in a moment of silence. You, too, say nothing.\n      *goto mess_hall_wrap_up\n    *goto mess_hall_wrap_up\n  *else\n    *if saw_log = false\n      \n      Thisi forces a small smile.  \"Well, at least there's some good news.  I finally decrypted the files from the Vervoo ship we encountered.  Remember how we tried to find out what happened to the crew when the Rekelians attacked?\" You nod, waiting. \"Well, it turns out most of the crew escaped the ship in time. They fled here to Tuskin! Seeing Borion's relief when I told him—well, at least one member of the crew is happy.\"\n      \n      Taloo nods sadly.\n      *goto mess_hall_wrap_up\n    *goto mess_hall_wrap_up\n  *label mess_hall_wrap_up\n\n  \"Anyway,\" says Thisi, \"Taloo and I have a lot to discuss.\"  Taloo nods.  \"If you don't mind, ${name}, we'd like some privacy.\"\n\n  You nod and wave goodbye.\n  *page_break Return to the ship's exit.\n  *goto ship_exit\n\n\n*label tuskin_entrance\nYou arrive at Tuskin's crowded commercial sector.  A medley of alien visitors roams the strip, making it easy to slip right into the crowd.  The [i]Lady Luck[/i] waits nearby in the shipyard, a reassuring sight.\n*if (girl_saved = true) and (saw_girl = false)\n  *set saw_girl true\n\n  You spot an unexpected but familiar face—the young girl you saved on the [i]Cheyenne[/i]. You do a double take. \"Hey, wait!\" she shouts.  She runs up to you, dragging two confused adults with her by the hand.\n\n  Impossible! you think. The odds of encountering her here, now, are astronomical…yet here she is.\n\n  \"This is the human who saved me,\" the girl explains to the two adults. They must be her parents.\n  \n  The man grabs your hand in both of his.  \"I just want to thank you,\" he gushes.  \"You saved my daughter's life.\"\n  \n  \"We were waiting for our dear Andrea on Tuskin when we got word that the ship had exploded,\" says the woman, her voice shaking.  \"I couldn't believe it—my daughter was dead! I thought my own life was over. But then a miracle occurred, and she returned to us a few days later…thanks to you!\"\n\n  \"Here,\" says the father, releasing your hand and reaching into his pocket.  \"Please take this.  It's the least we can do.\"  He pushes 100 credits into your hand.\n  *choice\n    #Accept the reward.\n      *set credits +100\n      You thank the parents for their generosity and wish the family the best. Andrea waves goodbye as they walk away.\n      *goto tuskin_choice\n    #Turn down the reward.\n      *set harsh_kind %+10\n      You tell the family that saving Andrea's life was more than enough compensation.  The parents insist, but when you refuse again, they take turns hugging you until you can't breathe.  As they walk away, Andrea waves goodbye.\n      *goto tuskin_choice\n    #Ask to donate the reward to charity.\n      *set harsh_kind %+20\n      You suggest that the reward would be better spent donating it to those in need.  The parents smile warmly and accept your proposal. As they walk away, Andrea waves goodbye.\n      *goto tuskin_choice\n    #Ask for more money.\n      *set harsh_kind %-30\n      *set credits +150\n      You inform the parents that 100 credits doesn't seem like much of a reward for saving their daughter's life at the risk of your own.  The father frowns but offers up another 50 credits.  \"There,\" he says tightly.  \"That's already more than we can afford.\"\n\n      You thank the parents for their most generous offer. They stalk off, still glaring at you. Oblivious to your extortion attempt, Andrea waves goodbye.\n      *goto tuskin_choice\n*label tuskin_choice\n*choice\n  #Board the [i]Lady Luck[/i].\n    *goto ship_exit\n  #Continue down the street.\n    *goto tuskin_street\n\n\n\n*label tuskin_street\nYou fight your way through the crowded streets of Tuskin's commercial district. It's so packed, you're sure every traveler in this sector of the galaxy must be here. To the west lies a bar—the same bar where you and the crew relaxed on your last visit.  You spot Rallix and Shelou Vili inside, two people you'd never imagined ever voluntarily sharing a drink.  A small alley leads southeast.  The street continues north, leading back to the sector's entrance.\n*choice\n  #Go up the street, back toward the [i]Lady Luck[/i].\n    *goto tuskin_entrance\n  #Go into the bar to the west.\n    *goto tuskin_bar\n  #Enter the alley to the southeast.\n    *if got_message = false\n      *set got_message true\n      As you approach the alley, a skinny man bumps into you, whispering in your ear. \"Take the alley to the café you'll find there. Sit down at the small table outside. Detective Garce is waiting for you.\"  Before you can respond, the man disappears into the crowd.\n      *page_break\n      *goto tuskin_alley\n    *else\n      *goto tuskin_alley\n\n\n\n*label tuskin_bar\n*if went_to_bar = true\n  You enter the bar where Rallix and Shelou Vili still sit. You greet them, but the two officers are too far gone in their cups to form a coherent sentence. The barkeep shakes his head in annoyance. You roll your eyes in agreement and leave. So much for friendly company.\n  *page_break Step back outside.\n  *goto tuskin_street\n*else\n  *set went_to_bar true\n  You enter the bar in time to catch Rallix's boisterous laugh. Shelou Vili looks smug. Maybe it's the influence of the drinks they're nursing, but the two actually seem to be having a good time.  Shelou Vili notices you and wildly gestures you over. So that's how you get him to show some emotion, you think, biting back a smirk. Rallix turns, its face flushed, and waves its drink at you.\n \n  \"${name}!\" it crows. \"We were just catching up!  Come join us for a drink.\"\n  *choice\n    #\"I'd love a drink, thanks.\"\n      *set has_drink true\n      *set harsh_kind %+20\n      *set duplicity_loyalty %+10\n      *set follower_leader %-10\n      Rallix and Shelou Vili smile as you take your drink from the barkeep. They inundate you with stories about old missions, and you listen eagerly, trying not to laugh. They should get drunk all the time!\n      *goto bar_continued\n    #\"Only if you're buying, Rallix.\"\n      *set has_drink true\n      *set rallix_shelou %+20\n      *set harsh_kind %-10\n      *set duplicity_loyalty %-10\n      *set follower_leader %+10\n      Shelou Vili laughs, spilling his drink.  \"He's got you there, Rallix,\" he singsongs.\n\n      Rallix grumbles. \"Fine, just this round.\"  It orders you a drink. As you sip, Rallix's and Shelou Vili's words tumble over one another, inundating you with stories about old missions. You listen eagerly, trying not to laugh. They should get drunk all the time!\n      *goto bar_continued\n    #\"I thought you two hated each other.\"\n      *set rallix_shelou %-20\n      Even drunk, Shelou Vili flashes you an indignant look.  Rallix, however, laughs.  \"Ignore him,\" it says to its shipmate, then turns to you.  \"If you're going to insult us like that, then you can forget the free drink!\"  Both snicker.\n      *goto bar_continued\n    #\"I don't want to drink with either of you.\"\n      *set harsh_kind %-20\n      *set duplicity_loyalty %-10\n      *set follower_leader %+20\n      Rallix shrugs.  \"His loss!\" it shouts to Shelou Vili, who bursts into laughter. Rallix joins in a second later.  Wishing you could stick your fingers in your ears, you wonder sourly if anything could spoil their good moods tonight.\n      *goto bar_continued\n  *label bar_continued\n\n  \"You know,\" slurs Rallix, \"you're not so bad, Shelou Vili.  You've just got to lighten up a bit!\"\n\n  \"Lighten up like fly!\" cries the Aviark, flapping his wings. \"My wings make me light enough to leave the ground. Get it?\" An instant later, both of them guffaw drunkenly.\n\n  Rallix points to Shelou Vili.  \"Can you believe that this guy has never had a drink before tonight?\" it exclaims.  \"It's about time!\"\n\n  Shelou Vili clanks his glass against Rallix's, and the two take another swig.\n\n  *if borion_died = true\n    Rallix's face sobers.  It raises its mug into the air in salute.  \"To Borion,\" it says.  Shelou Vili also raises his cup in a show of respect.\n    *choice\n      #Join their toast.\n        *set harsh_kind %+10\n        *set duplicity_loyalty %+10\n        *if has_drink = true\n          The three of you drink to the memory of your Vervoo shipmate.\n\n          *goto bar_wrap_up\n        *else\n          Though you've got no drink, you join in the salute to Borion.\n\n          *goto bar_wrap_up\n      #Remain silent.\n        *set duplicity_loyalty %-10\n        You remain silent as Rallix and Shelou Vili drink to the memory of your Vervoo shipmate.\n\n        *goto bar_wrap_up\n      #Mock their toast.\n        *set harsh_kind %-20\n        *set duplicity_loyalty %-20\n        *set suspicion +5\n        You laugh sarcastically at your shipmates' sudden display of sympathy for the deceased slave. Where was this compassion when Borion still lived? Too drunk to notice your scorn, the two tip back their glasses.\n\n        *goto bar_wrap_up\n  *label bar_wrap_up\n  Rallix and Shelou Vili quickly finish their drinks.  \"Another?\" asks the security officer.  When Shelou Vili nods, Rallix orders another round. Rallix launches into yet another war story, and Shelou Vili listens raptly. \n\n  You've had enough drunken war stories for one night, so you slip away.\n  *page_break Return to the streets of Tuskin.\n  *goto tuskin_street\n\n*label tuskin_alley\nYou enter a narrow alley, similar to the one where Detective Garce first accosted you. The crowd's much thinner here, more a couple handfuls of wanderers than a crowd.  A small, out-of-the-way café sits to the east, while the alley exits back onto the main street to the northwest.\n*choice\n  #Go east to the café.\n    *goto tuskin_cafe\n  #Go northwest to the main street.\n    *goto tuskin_street\n\n\n*label tuskin_cafe\nYou arrive at a small café with an unlit sign. A tiny iron table and two chairs sit before the door. Most people would walk right past the establishment, you think. Your hackles rise, and you wonder if you'd be better off making for the small alley to the west.\n*choice\n  #Sit down at the table.\n    *if (went_to_mess_hall = false) and (went_to_bar = false)\n      *set duplicity_loyalty %-20\n      *set suspicion +10\n      *goto_scene chapter_5b_tuskin_garce\n    *else\n      *goto_scene chapter_5b_tuskin_garce\n  #Enter the alley.\n    *goto tuskin_alley", "chapter_5b_tuskin_garce": "*temp items_to_sell\n*set items_to_sell 0\n*if has_stolen_treasure_vervoo = true\n  *set items_to_sell +1\n  *goto items_setup_2\n*label items_setup_2\n*if has_stolen_treasure_ship = true\n  *set items_to_sell +1\n  *goto items_setup_3\n*label items_setup_3\n*if has_stolen_treasure_jeeq = true\n  *set items_to_sell +1\n  *goto items_setup_4\n*label items_setup_4\n*if has_stolen_treasure_ship_2 = true\n  *set items_to_sell +1\n  *goto start\n*label start\nDespite the fear pressing at your neck, you sit down at the empty table. You keep looking around, not just for Detective Garce but also for anyone who might want to rob you. Several minutes pass, and you're about to leave when Garce walks toward you.\n\n\"Hello again, ${name},\" Garce says, smirking.  \"I see you've survived your visit to Jeeq. I'm glad; it would've been a waste of my time if you hadn't.\"\n\nGarce drops into the other chair and grins at you.\n*choice\n  *selectable_if (cowardice_bravery \u003c 40) #\"Jeeq was the worst experience of my life.  I'm lucky to be alive.\"\n    *set duplicity_loyalty %+10\n    *set cowardice_bravery %-10\n    *set garce_isan %+10\n    \"From everything I've heard of the planet, that's probably true,\" Garce murmurs.\n    *goto garce_2\n  *selectable_if (cowardice_bravery > 60) #\"Pfft, Jeeq was nothing. It takes a lot more than that to stop me!\"\n    *set cowardice_bravery %+20\n    *set garce_isan %-10\n    \"You're pretty cocky,\" notes Garce, chuckling.  \"I like that.\"  You stand a little taller at this praise.  Garce smiles and continues.\n    *goto garce_2\n  #\"Jeeq was a waste of time.  We didn't even get paid for our trouble.\"\n    *set duplicity_loyalty %+10\n    *set garce_isan %-10\n    \"I couldn't have put it better myself, ${name},\" says Garce, baring ${garce_his} teeth.\n    *goto garce_2\n  #\"Jeeq was a ton of fun, and I can't wait to go back!\"\n    *set duplicity_loyalty %-10\n    *set cowardice_bravery %+10\n    *set garce_isan %+10\n    \"This isn't the time for sarcasm,\" says Garce, setting ${garce_his} jaw. \"We're dealing with a serious matter.\"  You try not to laugh at Garce's ill humor; instead, you gesture for ${garce_him} to continue.\n    *goto garce_2\n  #Remain silent.\n    *set follower_leader %+20\n    *set cowardice_bravery %+20\n    *set garce_isan %+20\n    You won't play Garce's game, so you say nothing. Garce narrows ${garce_his} eyes but finally speaks again.\n    *goto garce_2\n*label garce_2\n*if planted_device = true\n  \"You're probably wondering why I never showed up to arrest the crew.\"  Garce rubs ${garce_his} forehead.  \"Thank you for planting the beacon on Isan, by the way,\" ${garce_he} quickly adds.\n  *choice\n    #\"I'm sure you had your reasons.\"\n      *set garce_isan %-20\n      *set harsh_kind %+10\n      \"That we did,\" Garce says.  \"You see, my men were about to move in when we detected a large group of Shadow Fiends around you.  I didn't have enough officers to adequately secure the perimeter, so I was forced to back off.  I wasn't happy about it, I assure you.\"\n\n      Garce reaches into ${garce_his} pocket. \"In any case, you did what was asked of you. Here's your payment, as discussed.\"  ${garce_he} hands you 100 credits.\n      *goto garce_payment\n    #\"Yeah, why didn't you show up?  I held up my end of the bargain.\"\n      *set garce_isan %-10\n      \"We had a good reason, I assure you,\" says Garce.  \"You see, my men were about to move in when we detected a large group of Shadow Fiends around you.  I didn't have enough officers to adequately secure the perimeter, so I was forced to back off.  I wasn't happy about it, but there was nothing I could do.\"\n\n      Garce reaches into ${garce_his} pocket.  \"In any case, you did what was asked of you.  Here's your payment, as discussed.\"  ${garce_he} hands you 100 credits.\n      *goto garce_payment\n    *selectable_if (harsh_kind \u003c 40) #\"Was Jeeq too scary for you and your officers, Garce?\"\n      *set garce_isan %+20\n      *set harsh_kind %-20\n      \"Nothing scares me,\" Garce says harshly.  \"Nothing at all.  My men were about to move in when we detected a large group of Shadow Fiends around you.  I didn't have enough officers to adequately secure the perimeter, so I was forced to back off.  I wasn't happy about it, I assure you.\"\n\n      Garce reaches into ${garce_his} pocket.  \"In any case, you carried out your end of the bargain.  Here's your payment, as discussed.\"  ${garce_he} hands you 100 credits.\n      *goto garce_payment\n    #\"Who cares why? Just give me my money.\"\n      *set garce_isan %+10\n      *set harsh_kind %-10\n      Garce laughs in disbelief.  \"Fair enough,\" ${garce_he} says, reaching into his pocket.  \"Even though my officers weren't able to move in, you did do what I asked.  Here's your payment, as discussed.\"  ${garce_he} hands you 100 credits.\n      *goto garce_payment\n*else\n  \"So you have some explaining to do, ${name}.  I gave you a proposition: plant a device on Isan Cehnta in exchange for money. Great, except you didn't do it.  Why?\"\n  *choice\n    *selectable_if (garce_isan > 65) #\"Captain Isan is my friend.\"\n      *set garce_isan %+20\n      *set duplicity_loyalty %+20\n      *set harsh_kind %+10\n      *set cowardice_bravery %+10\n      Detective Garce shakes ${garce_his} head. \"You poor fool,\" ${garce_he} says.  \"Isan is using you.  Can't you see that?\"\n      *goto garce_3\n    #\"I didn't have a chance.\"\n      *set garce_isan %+10\n      *set cowardice_bravery %-10\n      Garce laughs sharply.  \"Do you think I'm an idiot, ${name}?  If you wanted to plant the device, you'd have found a way.\"\n      *goto garce_3\n    #\"I decided not to.\"\n      *set garce_isan %+10\n      *set duplicity_loyalty %+10\n      *set cowardice_bravery %+10\n      \"Well, at least you're honest,\" says Garce, ${garce_his} voice defeated.  \"I don't understand what hold Isan has over you.  Your captain is using you, ${name}.  Can't you see that?\"\n      *goto garce_3\n    *selectable_if (cowardice_bravery \u003c 35) #\"Oops, I forgot. Please forgive me!\"\n      *set garce_isan %-10\n      *set duplicity_loyalty %+10\n      *set cowardice_bravery %-20\n      Garce rolls ${garce_his} eyes.  \"I'm dealing with an amateur,\" ${garce_he} mutters.\n      *goto garce_3\n    *selectable_if (garce_isan > 65) #\"I don't like you, Garce.\"\n      *set garce_isan %+10\n      *set harsh_kind %-20\n      *set cowardice_bravery %+20\n      Garce's eyes bulge.  \"How dare you, you worthless piece of—\" ${garce_his} takes a deep breath. \"I'm trying to help us both here!\"\n      *goto garce_3\n\n*label garce_payment\n*choice\n  *hide_reuse #\"Hey, you promised me 200 credits.\"\n    \"Yes,\" says Garce, \"I did.  I also told you that I was going to arrest Isan Cehnta.  But that didn't happen, and I can't justify giving you the full amount.\"  ${garce_he} appraises you.  \"But don't worry, ${name}; you're getting another opportunity to earn the rest.  For now, be smart and take what I'm offering you.\"\n    *goto garce_payment\n  #Accept the money.\n    *set garce_isan %-10\n    *set duplicity_loyalty %-10\n    *set credits +100\n    You accept Garce's money without question.\n\n    *goto garce_3\n  #Turn down the money politely.\n    *set garce_isan %+10\n    *set duplicity_loyalty %+10\n    *set harsh_kind %+10\n    You politely inform Detective Garce that you can't accept ${garce_his} money.  Eyes narrowed, Garce drops the credits into ${garce_his} pocket.\n    \n    *goto garce_3\n  #Turn down the money harshly.\n    *set garce_isan %+20\n    *set duplicity_loyalty %+10\n    *set harsh_kind %-10\n    You tell Garce where ${garce_he} can shove ${garce_his} money.  The detective's face turns red, and ${garce_he} forcefully drops the credits into ${garce_his} pocket.  You smile sweetly as ${garce_he} struggles to calm down.\n    \n    *goto garce_3\n\n*label garce_3\nGarce sighs.  \"Look, ${name}.  Here's the deal: right now, Isan is haggling with a reputable source for another contract.  So I'm giving us both another chance…one last chance.\n*if planted_device = true\n  *set has_second_device true\n  The device you planted on Isan during the Jeeq mission has run out of power.  I can't track ${isan_him} any longer.  That means I need you to plant another one.\"  Garce hands you a second homing device.  \"Do the same thing as you did last time, and this time my men will move in.  Without exception.  In exchange, you'll get your 200 credits.  So what do you say?  Do we have a deal?\"\n  *goto garce_4\n*else\n  You didn't plant the tracker on Isan, which means you still have it.  That's good: it means you can use it on your upcoming mission.  I want you to plant it on Isan.  Only this time, my men will move in.  Without exception.  In exchange, you'll get your 200 credits.  So what do you say?  Do we have a deal?\"\n  *goto garce_4\n\n*label garce_4\n*choice\n  *if planted_device\n    *hide_reuse #\"How do I know I can trust you?  You already screwed me once.\"\n      *set garce_isan %+10\n      \"There were extenuating circumstances,\" Garce rushes to say.  \"My team wasn't equipped to deal with the Shadow Fiends.  That won't happen again.\"\n      *goto garce_4\n  #\"Sure, we have a deal.\"  You stand up and shake Garce's hand.\n    *set garce_isan %-10\n    *set duplicity_loyalty %-10\n    Garce nods in clear relief and reaches out to shake your hand.\n    *if planted_device = false\n      *choice\n        #Plant the tracking device on Garce while shaking ${garce_his} hand.\n          *set garce_isan %+10\n          *set duplicity_loyalty %+10\n          *if garce_isan > 65\n            You move to plant the device on Garce, but you can't shake ${garce_his} attention. ${garce_he} pulls away before you can carry out your subterfuge.\n            *goto garce_5\n          *else\n            *set planted_device_garce true\n            You move to plant the device on Garce, taking advantage of ${garce_his} momentary distraction as ${garce_he} scans a handheld computer. Just before ${garce_he} looks back at you, you attach the device to ${garce_his} shirt. Garce clicks off the computer and smiles.\n            *goto garce_5\n        #Don't plant the tracking device on Garce.\n          You firmly shake hands with Garce. \"Nice doing business with you.\"\n          *goto garce_5\n    *else\n      *goto garce_5\n  #\"Sure, we have a deal.\" You remain sitting.\n    *set garce_isan %-10\n    *set duplicity_loyalty %-10\n    Garce nods in clear relief.  \"Good,\" ${garce_he} says.  \"You won't regret it, ${name}.  The sooner Isan is in my custody, the safer this sector of space will be.\"\n    *goto garce_5\n  #\"No deal, Garce.\"\n    *set garce_isan %+10\n    *set duplicity_loyalty %+10\n    Garce leaps to ${garce_his} feet, ${garce_his} eyes piercing your own.  \"Then we have nothing left to discuss.\"\n    *goto garce_5\n\n*label garce_5\n\nWithout another word, Garce stalks off, disappearing around the corner of the deserted café. You wait until ${garce_he}'s gone, then leave, too.\n*page_break Continue exploring Tuskin.\nYou spend the next several hours exploring the trade port, taking care to remain within the commercial sector as Captain Isan recommended.  The sheer amount of things to see and do amazes you,\n*if like_tuskin_level = 3\n  leaving you dazzled and overstimulated. Every element of this planet is a spectacle unlike anything you've seen before.\n  *goto store_start\n*elseif like_tuskin_level = 2\n  but less impressive than your first visit. In fact, you think, you wouldn't mind a quiet, simple dinner alone.\n  *goto store_start\n*else\n  though they fail to impress you. You roll your eyes. Everything feels so \"touristy\" and superficial.\n  *goto store_start\n\n\n\n\n\n*comment ----------STORE----------\n\n*label store_start\n\nYou peek into a store window. The owner eagerly waves you insde.  You shrug and go in. Why not? You might as well see if there's anything worth spending your credits on.\n\nAs you wander through the packed aisles, most of the wares on display are a bit too much for your wallet. A few items, however, are both cheap and potentially useful. You pick one up, considering.\n\nThe owner comes up beside you.  \"What can I do for you today?  Are you interested in selling anything?\"\n*choice\n  *selectable_if (items_to_sell > 0) #Sell some stuff.\n    *label selling_items\n    \"What do you want to sell?\" asks the owner.  \"Please note that all my offers are final—I have a strict no-negotiation policy.\"\n    *choice\n      *if (has_stolen_treasure_vervoo = true) #\"This golden idol.\"\n        \"This is nice,\" says the owner, examining the idol.  \"Really nice!  It's genuine, too.  I'll gladly pay you 200 credits for it!\"\n        *choice\n          #Accept the offer.\n            \"You are one smart human,\" says the owner, greedily tucking the idol out of sight.  \"Here are your credits.  You definitely deserve them!  Now would you like to buy something or keep selling stuff?\"\n            *set has_stolen_treasure_vervoo false\n            *set credits +200\n            *set items_to_sell -1\n            *choice\n              *if (items_to_sell > 0) #Sell more.\n                *goto selling_items\n              #Buy something.\n                *goto buy_stuff\n              #\"No.\"\n                *goto neither\n          #Decline the offer.\n            \"I really wish you'd reconsider, but it's your loss,\" says the owner.  \"Now would you like to buy something or keep selling stuff?\"\n            *choice\n              *if (items_to_sell > 0) #Sell more.\n                *goto selling_items\n              #Buy something.\n                *goto buy_stuff\n              #End all transactions.\n                *goto done_transactions\n      *if (has_stolen_treasure_ship = true) #\"A jewel-embedded chalice.\"\n        \"Wow,\" says the owner, examining the chalice. \"The jewels alone are priceless, and the chalice itself is exquisite!  Tell you what—I'll give you 250 credits for this.\"\n        *choice\n          #Accept the offer.\n            \"Thank you very much!\" exclaims the owner, handing you your credits.  \"Now would you like to buy something or keep selling stuff?\"\n            *set has_stolen_treasure_ship false\n            *set credits +250\n            *set items_to_sell -1\n            *choice\n              *if (items_to_sell > 0) #Sell more.\n                *goto selling_items\n              #Buy something.\n                *goto buy_stuff\n              #End all transactions.\n                *goto done_transactions\n          #Decline the offer.\n            \"I really wish you'd reconsider, but it's your loss,\" says the owner.  \"Now, would you like to buy something or keep selling stuff?\"\n            *choice\n              *if (items_to_sell > 0) #Sell more.\n                *goto selling_items\n              #Buy something.\n                *goto buy_stuff\n              #End all transactions.\n                *goto done_transactions\n      *if (has_stolen_treasure_jeeq = true) #\"These ancient Shadow Fiend coins.\"\n        \"Hmm,\" says the owner, biting one of the coins.  \"They're made of gold, all right, and they're definitely old enough to be from the Shadow Fiend Empire.  But the lack of markings means there's no way to prove their origin.  I'll give you 100 credits for the lot.\"\n        *choice\n          #Accept the offer.\n            The owner takes the coins and hands you your credits.  \"Thank you for your business,\" he says.  \"I'm sorry that I couldn't offer you more, but I have no way to verify your claim of their origin.  Now would you like to buy something or keep selling stuff?\"\n            *set has_stolen_treasure_jeeq false\n            *set credits +100\n            *set items_to_sell -1\n            *choice\n              *if (items_to_sell > 0) #Sell more.\n                *goto selling_items\n              #Buy something.\n                *goto buy_stuff\n              #End all transactions.\n                *goto done_transactions\n          #Decline the offer.\n            \"I really wish you'd reconsider, but it's your loss,\" says the owner.  \"Now would you like to buy something or keep selling stuff?\"\n            *choice\n              *if (items_to_sell > 0) #Sell more.\n                *goto selling_items\n              #Buy something.\n                *goto buy_stuff\n              #End all transactions.\n                *goto done_transactions\n      *if (has_stolen_treasure_ship_2 = true) #\"A hand-crafted wooden bowl.\"\n        \"This bowl is definitely hand crafted,\" observes the owner.  \"The carvings are intricate and add a good deal to its value.  I'm willing to give you 150 credits for it.  What do you say?\"\n        *choice\n          #Accept the offer.\n            The owner hands you your credits.  \"I appreciate it. I wonder whether the bowl is a religious relic,\" he mumbles.  \"That might add to its value…anyway, would you like to buy something or keep selling stuff?\"\n            *set has_stolen_treasure_ship_2 false\n            *set credits +150\n            *set items_to_sell -1\n            *choice\n              *if (items_to_sell > 0) #Sell more.\n                *goto selling_items\n              #Buy something.\n                *goto buy_stuff\n              #End all transactions.\n                *goto done_transactions\n          #Decline the offer.\n            \"I really wish you'd reconsider, but it's your loss,\" says the owner.  \"Now would you like to buy something or keep selling stuff?\"\n            *choice\n              *if (items_to_sell > 0) #Sell more.\n                *goto selling_items\n              #Buy something.\n                *goto buy_stuff\n              #End all transactions.\n                *goto done_transactions\n      #\"Nothing.  Never mind.\"\n        *label done_transactions\n        \"In that case, maybe you'ld like to buy something?\"\n        *choice\n          #\"Of course!\"\n            *goto buy_stuff\n          #\"No, thanks.\"\n            \"In that case, thank you for your time.  Please come again soon!\"\n            *finish Return to the [i]Lady Luck[/i].\n  #Don't sell anything; just buy items.\n    *goto buy_stuff\n  #Neither\n    *label neither\n    \"Then why'd you come to my store?\" asks the owner sarcastically. \"Really, tell me. I could use a laugh.\"\n    *finish Return to the [i]Lady Luck[/i].\n\n*label buy_stuff\nYou ask the owner if he has anything someone in the retrieval business might find useful.\n\n\"Well,\" he replies, ticking the items off on his fingers, \"I've got a number of items including camo suits, disposable pistols, HRDs, shield rechargers, and sonic lockpicks.\"\n\nYou nod, careful not to show your interest.\n\n\"So what would you like to buy?\"\n*label interested\n*choice\n  #Ask about camo suits.\n    \"Camo suits make you temporarily invisible, allowing you to sneak around without detection.  50 credits.\"\n    *choice\n      #Buy\n        *if credits \u003c 50\n          \"You don't have enough credits for that.  Maybe something cheaper?\"\n          *goto interested\n        *else\n          *set credits -50\n          *set suits +1\n          \"The item is yours! Thank you for your business. I hope you're satisfied with your purchase.\"\n          *goto interested\n      #Ask about something else.\n        \"Of course!  What item would you like to discuss?\"\n        *goto interested\n  #Ask about disposable pistols.\n    \"Laser pistols are one of the most common weapons around.  These babies are good for three shots each.  After that, you just toss 'em away.  50 credits.\"\n    *choice\n      #Buy\n        *if credits \u003c 50\n          \"You don't have enough credits for that.  Maybe you want something cheaper?\"\n          *goto interested\n        *else\n          *set credits -50\n          *set pistol_charges +3\n          \"The item is yours! Thank you for your business.  I hope you're satisfied with your purchase.\"\n          *goto interested\n      #Ask about something else.\n        \"Of course!  What item would you like to discuss?\"\n        *goto interested\n  #Ask about HRDs.\n    \"HDR stands for 'Hacking Resonator Device.'  With one of these babies, you gain access to computer systems without needing to do any manual hacking.  25 credits.\"\n    *choice\n      #Buy\n        *if credits \u003c 25\n          \"You don't have enough credits for that.  Maybe you want something cheaper?\"\n          *goto interested\n        *else\n          *set credits -25\n          *set hrds +1\n          \"The item is yours! Thank you for your business.  I hope you're satisfied with your purchase.\"\n          *goto interested\n      #Ask about something else.\n        \"Of course!  What item would you like to discuss?\"\n        *goto interested\n  #Ask about shield rechargers.\n    \"Personal shield rechargers will take a hit for you, keeping you from getting injured.  Each shield can take one hit before dissipating.  50 credits.\"\n    *choice\n      #Buy\n        *if credits \u003c 50\n          \"You don't have enough credits for that.  Maybe you want something cheaper?\"\n          *goto interested\n        *else\n          *set credits -50\n          *set psrs +1\n          \"The item is yours! Thank you for your business.  I hope you're satisfied with your purchase.\"\n          *goto interested\n      #Ask about something else.\n        \"Of course!  What item would you like to discuss?\"\n        *goto interested\n  #Ask about sonic lockpicks.\n    \"Sonic lockpicks help you to break into locked areas you shouldn't necessarily be in, if you know what I mean.  What you do with them is your own business—just don't tell me about it.  25 credits.\"\n    *choice\n      #Buy\n        *if credits \u003c 25\n          \"You don't have enough credits for that.  Maybe you want something cheaper?\"\n          *goto interested\n        *else\n          *set credits -25\n          *set lockpicks +1\n          \"The item is yours! Thank you for your business.  I hope you're satisfied with your purchase.\"\n          *goto interested\n      #Ask about something else.\n        \"Of course!  What item would you like to discuss?\"\n        *goto interested\n  #Finish buying items.\n    \"Thank you for your business, and please come again soon!\"\n    *finish Return to the [i]Lady Luck[/i].", "chapter_5c_outro": "It's getting late, and you don't want to risk getting lost in Tuskin, so you return to the [i]Lady Luck[/i].  You reach the ship's entrance ramp and find the entire crew standing there. All faces turn to you, wearing varying degrees of dislike and distrust. Captain Isan slowly approaches you, ${isan_his} face unreadable.\n*fake_choice\n  #\"Hello, Captain.  Did you find us more work?\"\n  #\"What's going on, Captain?\"\n  #\"Is there a problem?\"\n  #Remain silent.\n*if suspicion >= 60\n  \"We have to have a little talk, ${name},\" Isan says, eyeing you coldly.  The rest of the crew nods solemnly. Your heart drops. Are you in trouble again?\n\n  Isan stands close to you, ${isan_his} face inches from yours.  \"There've been an increasing number of questions raised about your sincerity and honesty.  The crew doesn't trust you.\n  *if number_of_goods_stolen > 2\n    We know you've been stealing items from us.\n    *goto suspicion_high_continued\n  *label suspicion_high_continued\n  To put it simply, your acts of rebellion have not gone unnoticed.\n  *if garce_isan > 50\n    That's why I have no choice but to demote you.\"\n\n    Isan points an accusatory finger at you.\n    *goto demotion\n  *else\n    On top of all that, I'm just not that crazy about you.  We've talked it over, and I have no choice but to demote you.\"\n\n    Isan points an accusatory finger at you.\n    *goto demotion\n*elseif suspicion >= 50\n  \"We have to have a little talk, ${name},\" Isan says quietly.  The rest of the crew nods, and your heart drops. Did something happen?\n\n  Isan stands close to you, ${isan_his} face inches from yours.  \"There've been an increasing number of questions raised about your sincerity and honesty.  The crew doesn't trust you.\n  *if number_of_goods_stolen > 2\n    We know you've been stealing items from us.\n    *goto suspicion_high_continued_2\n  *label suspicion_high_continued_2\n  To put it simply, your acts of rebellion have not gone unnoticed.\n  *if garce_isan > 75\n    That said, there's something about you that I like, despite myself.  So consider this your final warning: shape up, or you're gone.  No matter how I feel about you, the crew comes first.\"\n    *goto mission_plan\n  *else\n    We've talked it over, and I have no choice but to demote you.\"\n    \n    Isan points an accusatory finger at you.\n    *goto demotion\n*else\n  \"We have to have a little talk, ${name},\" Isan says quietly.  The rest of the crew nods, and your heart drops. Are you in trouble?\n\n  Isan moves close to you, ${isan_his} face inches from yours. \"Don't think your actions have gone unnoticed…\" \n\n  You panic. What actions?! What'd you do?\n\n  An instant later, Isan and the crew break into huge smiles.  \"You've been loyal to us for some time, ${name}.  I'd say that warrants a promotion—wouldn't you?\"\n\n  You heave a huge sigh of relief, and Isan holds out ${isan_his} hand to shake yours.\n  *goto promotion\n\n\n\n*label demotion\n*if rank = 5\n  *set rank 4\n  \"Effective immediately, you're no longer a senior member of this crew.  From now on, as a junior member, you'll get no special privileges on this ship.  Consider yourself lucky I don't demote you further.\"\n  *goto mission_plan\n*elseif rank = 4\n  *set rank 2\n  \"Effective immediately, you will be my slave.  Rallix will place a slave collar around your neck, and you will do as I say.  Follow orders to the letter.  If you so much as twitch without my permission, I promise you'll regret it.\"\n  *goto mission_plan\n*elseif rank = 2\n  *set rank 1\n  \"If you thought things were bad as a slave, then I'm afraid you're in for quite a nasty surprise.  You may now consider yourself our prisoner.  Our requests will become orders, and Rallix will not leave your side.\"  Isan bares ${isan_his} teeth.  \"If you disobey us, you'll learn pretty quickly just how far I'll go to get my way.\"\n  *goto mission_plan\n*else\n  \"Luckily for you, you're already our prisoner, so it's not possible for me to demote you any further.\"  Isan bares ${isan_his} teeth.  \"But we're keeping a much closer watch on you from this point forward.  You don't want to test me, ${name}.  If you become too much of a problem, I may have to consider more…extreme measures.\"\n\n  *goto mission_plan\n\n*label promotion\n*if rank = 1\n  *set rank 2\n  \"Effective immediately, you'll no longer be a prisoner, but you will still be my slave.  You will do as I say and follow orders to the letter.\" Isan smiles. \"
