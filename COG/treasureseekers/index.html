e deck, forcing you to your knees.  Once the smoke clears, you grin to see the vault door is still intact.\n\n    Isan's lips thin. \"If I didn't know any better,\" ${isan_he} says to you angrily, \"I'd say you were trying to waste our time.\"\n    \n    Thisi consults ${thisi_his} scanner once more.  A beat later, ${thisi_he} waves it triumphantly.  \"According to my scanner, if we set our energy weapons to a modulated frequency of 102.8, it should be enough to disrupt the matter of the tirrinium.\"\n\n    *if specialization = \"tactical\"\n      *set garce_isan %-10\n      Captain Isan scowls at you.  \"Seems to me like you should've been aware of that, ${name}, given your tactical training.\" You look away.\n\n      *goto Thisi_solution\n    *label Thisi_solution\n    Rallix grins.  \"Then what are we waiting for?\" it demands, raising its weapon.  It adjusts the weapon's frequency, aims at the door, and fires.  A steady stream of bright red energy strikes the vault door, which dissolves into nothing.\n\n    Shivering, you remind yourself never to get on Rallix's bad side.\n\n    Isan gestures at the open doorway.  \"All right, everyone.  Let's see what's inside!\"\n    *page_break Enter the vault.\n    *goto enter_vault\n  #\"Sorry, I can't think of anything.\" (Lie.)\n    *set follower_leader %-10\n    *set duplicity_loyalty %-10\n    *set suspicion +5\n    *set garce_isan %-10\n    Captain Isan frowns, clearly unimpressed by your lack of motivation.  \"After all the training you've had?\" You look away.\n\n    Thisi consults ${thisi_his} scanner once more.  A beat later, ${thisi_he} waves it triumphantly.  \"According to my scanner, if we set our energy weapons to a modulated frequency of 102.8, it should be enough to disrupt the matter of the tirrinium.\"\n\n    *if specialization = \"tactical\"\n      *set garce_isan %-10\n      Captain Isan scowls at you.  \"Seems to me like you should've been aware of that, ${name}, given your tactical training.\"\n\n      *goto Thisi_solution_2\n    *label Thisi_solution_2\n    Rallix grins.  \"Then what are we waiting for?\" it demands, raising its weapon.  It adjusts the weapon's frequency, aims at the door, and fires.  A steady stream of bright red energy strikes the vault door, which dissolves into nothing.\n\n    Shivering, you remind yourself never to get on Rallix's bad side.\n\n    Isan gestures at the open doorway.  \"All right, everyone.  Let's see what's inside!\"\n    *page_break Enter the vault.\n    *goto enter_vault\n*label enter_vault\nThe walls of the small room are lined with shelves bursting with goods ranging from priceless to worthless.  As the crew enters, the space goes from cozy to claustrophobic. Shelou Vili takes one look and decides to remain outside.\n\n\"Wow!\" exclaims Borion.  \"I d-didn't know any of my p-people had these kinds of v-valuables!\"\n\n*choice\n  #\"You deserve to have them, too, Borion.\"\n    *if rank = 2\n      *set harsh_kind %+10\n      An electric shock jolts out from your collar, making you cry out.  \"Stop filling Borion's head with all this nonsense!\" shouts Rallix angrily.\n      \n      Borion stares at the two of you in conflicted confusion.\n      *goto vault_camefrom\n    *else\n      *set harsh_kind %+10\n      \"Really?\" Borion asks.  \"Wow, I don't think m-most people would s-say that.  Thanks, ${name}!\"\n\n      You wonder if he thinks the people on this ship should have been enslaved, too.\n      *goto vault_camefrom\n  #\"Looks like not all your people are slaves, after all, Borion.\"\n    \"I suppose n-not,\" replies Borion.  You can tell he's conflicted, but he forces a cheery smile. \"Oh, well.  I g-guess I drew the short s-straw there, huh?\"\n    *goto vault_camefrom\n  *if (rank = 2) #\"Slaves like us will never get such valuables, Borion.\"\n    *set harsh_kind %-10\n    Borion sighs.  \"Y-you know, you're p-probably right, ${name}.\"\n    *goto vault_camefrom\n  *if (rank > 2) #\"You don't deserve anything beyond what you already have, slave.  You're already treated too well as it is.\"\n    *set harsh_kind %-10\n    Borion laughs.  \"Y-you know, you're p-probably right, ${name}. Who am I to c-complain?\"\n\n    You realize that no matter what you say, Borion's too brainwashed to be affected.\n    *goto vault_camefrom\n*label vault_camefrom\n\n\"Where do you suppose all these goods came from?\" asks Captain Isan, hypnotized by the valuables shining on the shelves.\n\nThisi chews ${thisi_his} lip. \"They must be the passengers' belongings, don't you think?\"\n\n\"And just where [i]are[/i] those passengers, Thisi?\" asks Shelou Vili snidely. No one responds.\n\n\"It was the right decision to come here,\" the captain says softly, but you can't tell who ${isan_he}'s talking to.  Thisi and you exchange uneasy glances.\n\nThe captain shakes ${isan_his} head, and ${isan_his} eyes clear. \"Where was I? Ah, yes. Even accounting for the junk, there's far too much here to take it all, so we'll have to be choosy.  Let's catalog everything and—\"\n\nSuddenly, a sharp shadow hurries toward a small ventilation shaft in the corner.  Kraska! you think, but then you remember he stayed behind.\n\n\"Look!\" shouts Thisi, pointing.\n*choice\n  #Look where Thisi is pointing.\n    *set thisi_taloo %-10\n    *set follower_leader %-10\n    You immediately turn to see a large, brown roachlike creature scurry through the ventilation shaft. You gasp—it has to be at least a half meter tall!\n    *goto about_the_bugs\n  #Ignore Thisi.\n    *set thisi_taloo %+10\n    *set follower_leader %+10\n    Refusing to be told what to do, you don't turn.  The rest of the crew rushes to look, and you hear Borion gasp.\n\n    \"W-what was that?\" he cries. \"It—it ran right for the ventilation sh-shaft!\"\n\n    \"It looked like some kind of dark brown roach, approximately half a meter in size,\" answers Rallix, forelegs twitching.\n    *goto about_the_bugs\n*label about_the_bugs\n\nCaptain Isan eyes the ventilation shaft doubtfully.  \"I thought you said there weren't any signs of life onboard.\"\n\n\"There aren't, Captain,\" Thisi says, consulting ${thisi_his} scanner. The Nyarri frowns. \"At least not according to my equipment.\"\n\nRallix snorts. \"Well, apparently there are.\"\n\n\"The logical conclusion would be that this creature does not show up on our scanners,\" points out Shelou Vili, earning a glare from both Rallix and Thisi.\n\nBorion stares at you, his cheeks purpling.  \"W-what do you think that th-thing was, ${name}?\"\n*choice\n  #\"Just a bug.  I'll squash it.\"\n    *set cowardice_bravery %+10\n    \"Don't get cocky, ${name},\" warns Isan.  \"There're a lot of unknown creatures out here in deep space.  Few of them are friendly, and even fewer are defenseless.\"\n    *goto vault_plan\n  #\"I don't know, but it's going to kill us all!\"\n    *set cowardice_bravery %-10\n    Borion darts his terrified gaze from one crew member to the next.  \"T-that was a joke, right?  ${name} was j-just k-kidding, right?\"\n\n    \"This isn't time for jokes, ${name},\" warns Isan.  \"There're a lot of unknown creatures out here in deep space.  Few of them are friendly, and even fewer are defenseless.\"\n    *goto vault_plan\n  #\"I'm not sure, but I wouldn't worry.\"\n    *set harsh_kind %+10\n    Borion visibly relaxes. \"If you say not to w-worry, I w-won't!\"\n    *goto vault_plan\n  #\"I don't know, but I'm concerned.  Someone should deal with this.\"\n    *set follower_leader %-10\n    *set cowardice_bravery %-10\n    \"C-concerned?\" stammers Borion.  \"W-why?\"\n\n    Isan walks over to Borion and put an arm around him. \"There're a lot of unknown creatures out here in deep space, Borion.  Few of them are friendly, and even fewer are defenseless.  We just want to remain alert.\"\n    *goto vault_plan\n*label vault_plan\n\n\"What should we do about this?\" growls Rallix.\n\n\"Okay,\" says Isan, striding over to the Nixian, \"let's talk.  Everyone gather around.\"  Shelou Vili finally comes inside the vault.\n\nOnce everyone's settled, you realize you're right next to the vault's exit. You look around. The rest of the crew is focused on Isan.\n*label vault_choice\n*choice\n  *hide_reuse #Grab a piece of treasure while no one's looking.\n    *set duplicity_loyalty %-20\n    You hastily grab a small, expensive-looking golden idol from a nearby shelf and stuff it inside the small carrying sack Rallix gave you at the start of the mission.\n    *set has_stolen_treasure_vervoo true\n    *set number_of_goods_stolen +1\n    *goto vault_choice\n  #Listen to Isan's orders.\n    You hesitate. The vault is so small and suffocating! Then the captain waves you closer. Sighing, you join the rest of the crew.  Isan immediately lays out ${isan_his} directives.\n\n    \"All right, we're clearly not alone on this ship.  We don't know whether these creatures—whatever they are—are responsible for the crew's disappearance.  We do, however, know this treasure is ready and waiting to be harvested. That said, Team A should proceed to the ship's bridge to determine what happened to the crew.  If you encounter any of those creatures along the way, avoid them at all costs.\n\n    \"Team B will remain here, gather whatever valuables we can find, and return to the ship.\"  Isan looks at Shelou. \"I'm counting on you, Shelou Vili, to make a quick assessment of each item in this vault.  We only take what we know we can sell.\"  The dignified Aviark nods in assent.\n\n    \"All right,\" concludes Isan, \"Team A will consist of Rallix, Thisi, and ${name}.  The rest of you are with me on Team B.  Let's get to it.\"\n    *choice\n      #Proceed with the plan.\n        *set follower_leader %-10\n        *goto proceed_with_plan\n      #Request to be on Team B instead.\n        *set follower_leader %+10\n        You quickly explain to Captain Isan that you believe you'd be more useful on Team B.\n        \n        *if rank = 2\n          \"Did I ask for your opinion, slave?\" retorts Isan.  \"You have your orders.  Follow them, or you'll be shocked.\"\n\n          As if to validate the captain's claim, Rallix grabs your arm.  You grit your teeth, but unless you want another round of spasming muscles, you've got no choice. You yield.\n\n          *goto proceed_with_plan\n        *else\n          \"I appreciate your perspective,\" says Isan, \"but I've got my reasons for placing you with Thisi and Rallix.  Your ${specialization} training may come in handy.\"\n\n          As though to underscore the captain's point, Rallix grabs your arm.  You grit your teeth, but it would foolish to anger this creature, so you smile and nod. \"Let's go, then!\"\n\n          *goto proceed_with_plan\n    *label proceed_with_plan\n    You walk in a triangle through the ship: at the apex, Thisi; and at the base, Rallix and you, scowling at each other.  After several minutes, you arrive at a crossroads in the corridor.\n    *goto_scene chapter_2b_mission_plan\n  *selectable_if (cowardice_bravery > 50) #Make a run for it.\n    *set ran_away_from_crew true\n    Realizing this may be your only chance, you sneak out of the vault.  The instant you're out of the crew's line of sight, you run, not knowing or caring where you're headed. You just want to be free.\n\n    After several minutes of running, you come to a crossroads in the corridor.\n    *set duplicity_loyalty %-10\n    *set suspicion +5\n    *finish Continue", "chapter_2c_outro": "You spend the next few hours alone in your quarters on the [i]Lady Luck[/i].  Borion's nowhere to be found, and you suspect the other crew members are still recuperating from the mission.  It's not until 2200 hours, local ship time, that the speaker system crackles to life, summoning you to the captain's office.\n*page_break Go to the captain's office.\nYou leave your quarters and head toward the operations center.  \n\n*if ((killed_rekelians=true) and ((preference = \"men\") or (preference = \"women\")))\n  On your way, you encounter Thisi, who gives you a cold glare and sweeps past you down the hall. You probably should have expected that, after ${thisi_his} reaction to the Rekelians' deaths, but it still hurts. A lot.\n  *goto hallway\n*elseif ((killed_rekelians=true) and (preference = \"neither\"))\n  On your way, you encounter Thisi, who gives you a cold glare and sweeps past you down the hall. You probably should have expected that, after ${thisi_his} reaction to the Rekelians' deaths.\n  *goto hallway\n*elseif ((preference = \"men\") or (preference = \"women\"))\n  On your way, you encounter Thisi, who smiles as you pass by.  \"Good work today, ${name}!\" ${thisi_he} says brightly. Your heart leaps, as it always does when Thisi smiles at you.\n  *goto hallway\n\n*else\n  *goto hallway                             \n\n*label hallway\nA moment later, you arrive at the ops center. Taloo Dalma sits in the pilot's seat, wearing your face. Once again, seeing it reflected back at you brings on a bout of vertigo. You can't believe you'll ever get used to this.\n\nAs always, Taloo drops her eyes and turns away at your approach.\n*choice\n  #Encourage Taloo to be less shy.\n    *set harsh_kind %+10\n    *set thisi_taloo %+10\n    You gently encourage Taloo not to be afraid. She has no reason to fear you, you promise. Taloo hesitantly turns her head.  With an audible \"pop,\" your doppelgänger disappears, only to be replaced by a duplicate of Captain Isan. Taloo smiles playfully, pleased to show off her ability.  Her message is clear: Captain Isan is waiting in ${isan_his} office.\n    *page_break Proceed to Captain Isan's office.    \n    You bid Taloo a warm farewell and enter Isan's office.\n    *goto go_to_office\n  #Chastise Taloo for her shyness.\n    *set thisi_taloo %-10\n    *set harsh_kind %-20\n    You shout at Taloo to stop being so shy. She hangs her head in shame like a broken animal.  With an audible \"pop,\" your doppelgänger disappears, only to be replaced by a duplicate of Captain Isan.  Taloo's head remains down; she's clearly afraid to look at you.  Her message, however, is clear: Captain Isan is waiting in ${isan_his} office.\n    *page_break Proceed to Captain Isan's office.\n    You turn away from Taloo and enter Isan's office.\n    *goto go_to_office\n  #Ignore Taloo.\n    *set thisi_taloo %-10\n    *set harsh_kind %-10\n    Realizing you can't be bothered by Taloo, you ignore the A'Morpha completely. Taloo lowers her head sadly but lets you go.\n    *page_break Proceed to Captain Isan's office.\n    You enter into Isan's office.\n    *goto go_to_office\n*label go_to_office\n*temp mistakes\n*set mistakes 0\nThe captain glowers at you from behind ${isan_his} desk. \"I know you're probably tired, so this won't take long,\" ${isan_he} says.\n*if ran_away_from_crew = true\n  *set garce_isan %-20\n  *set mistakes +1\n  *if rank = 2\n    \"You should know that I'm furious with you, slave.  You ran away at the vault and tried to escape.  How dare you disobey my direct order to remain by Rallix's side?\"\n    *choice\n      #\"I don't want to be here, Captain.\"\n        *set cowardice_bravery %+10\n        \"Do you think I care?\" shouts Isan.  \"If you ever try to run from us again, I promise you'll suffer worse than my angry words.\"\n        *goto mission_results\n      #\"I don't have to justify my actions to you!\"\n        *set cowardice_bravery %-10\n        A familiar jolt of electricity sets your muscles spasming. You moan. \"I beg to differ,\" says Isan harshly.  \"Know that I am not happy with your actions, slave.  Don't ever try to run from us again, or you'll suffer worse than my angry words—I promise you.\"\n        *goto mission_results\n      #\"I was just trying to find a way to help the crew.\" (Lie.)\n        *set garce_isan %-10\n        Isan scoffs.  \"Do you really expect me to believe that?  You're a terrible liar, ${name}.  Don't waste your time, and don't ever try to run from us again, or you'll suffer worse than my angry words, I promise you.\"\n        *goto mission_results\n  *else\n    \"First, I want to talk about your actions on the mission.  You ran away from us at the vault, ${name}.  If Thisi and Rallix hadn't been on the bridge when you showed up, we may not have found you.  Why'd you do it?\"\n    *choice\n      #\"I don't want to be here, Captain.\"\n        *set cowardice_bravery %+10\n        \"I appreciate honesty, even if it's not what I want to hear,\" notes Isan.  \"That said, I'm not happy with your actions.  Don't ever try to run from us again.\"\n        *goto mission_results\n      #I can't bring myself to look the Captain in the eyes.\n        *set cowardice_bravery %-10\n        Captain Isan sighs and rubs ${isan_his} temples.  \"I wish you would learn to trust me, ${name}.  If you don't, this arrangement simply can't work.  Don't ever try to run from us again, okay?\"\n        *goto mission_results\n      #\"I was just trying to find a way to help the crew.\" (Lie.)\n        *set garce_isan %-10\n        Isan raises an eyebrow.  \"Be careful, ${name}.  You're new here.  Whatever you may think of us, we've been  kind to you so far.  If you keep making mistakes like this, though, that could change.\"\n        *goto mission_results\n*label mission_results\n\nIsan folds ${isan_his} hands. \"Now, as to the mission itself. \n*if mission_success_level = 1\n  I won't lie. It went badly.  The Rekelians posed a dangerous threat, one we were unprepared for.  The blame for that lies with everyone, myself included.  Given the negligible number of items we retrieved before being driven off the ship, I'm afraid I cannot justify paying you for your services.  Maybe we'll fare better next time.\"\n  *set mistakes +1\n  *goto rank_change\n*elseif mission_success_level = 2\n  The mission went well.  It could've been better, of course, but few missions play out exactly as we'd hope.  All in all, I'm happy with the number of valuables we collected onboard, thanks in part to your actions. As such, I'm immediately transferring 100 credits to your account.  You'll be able to spend them once we arrive at Tuskin.  Good work today.\"\n  *set credits +100\n  *goto rank_change\n*else\n  I won't lie: this has been one of the most profitable missions we've ever been on.  We're going to make a fortune on Tuskin, thanks in part to your actions.  As such, I'm immediately transferring 200 credits to your account.  You'll be able to spend them once we arrive at the trade port. Great work today.\"\n  *set credits +200\n  *goto rank_change\n*label rank_change\n\nPausing, the captain takes a sip of water. \"Lastly, I want to talk about your status among the crew.\n*if mistakes = 2\n  *set garce_isan %-10\n  I'll be blunt.  You're not working out so far, ${name}.  I'm sorry to say you've left me no choice but to demote you.\n  *goto demotion\n*elseif mission_success_level \u003c 3\n  I'm pretty happy with where things stand, and I hope you're warming to the idea, too.  There's potential here, ${name}, if you'd just put in a little extra effort.\"\n\n  Captain Isan nods.  \"I think that's all.  You may leave now.\"\n  *page_break Leave the captain's office.\n  *goto wrap_up\n*else\n  *set garce_isan %+10\n  Given your actions today, I think you're due for a promotion.\n  *goto promotion\n\n*label demotion\n*if rank = 2\n  *set rank 1\n  If you thought things were bad as a slave, I'm afraid you're in for a really nasty surprise.  You may now consider yourself our prisoner.  Our requests will become orders, and Rallix will never leave your side.\"  You start to argue, and Isan bares ${isan_his} teeth.  \"If you disobey us, you'll learn just how far I am willing to go to get my way.\"\n\n  You mutter, and the captain frowns at you. \"Now get out of my sight.\"\n  *page_break Leave the captain's office.\n  *goto wrap_up\n*else\n  *set rank 2\n  From this point forward, you will be my slave.  Rallix will place a slave collar around your neck, and you will do as I say.  Follow orders, and I may consider promoting you again in the future.  Until that time, if you so much as twitch without permission, you'll regret it.\" You open your mouth to protest, and Isan frowns.  \"Now get out of my sight.\"\n  *page_break Leave the captain's office.\n  *goto wrap_up\n\n*label promotion\n*if rank = 2\n  *set rank 4\n  You may now consider yourself an official junior member of this ship's crew.  Congratulations, ${name}!  I'll have Rallix stop by your quarters to remove the slave collar from around your neck immediately.  You deserve it.\"\n\n  You smile, and Captain Isan nods.  \"I think that's all.  You may leave now, ${name}.\"\n  *page_break Leave the captain's office.\n  *goto wrap_up\n*else\n  *set rank 5\n  You've shown yourself to be quite useful, ${name}.  That's why I'm now promoting you to senior crew member.  Some of the others may not be that happy about it, given that you've only been with us for a short time.  But I'm a good reader of people, and I trust you.  As long as you never betray that trust, you and I will get along just fine.  Congratulations on the promotion.\"\n\n  You smile, and Captain Isan nods.  \"I think that's all.  Now I have some work I have to get to.  You may leave now, ${name}. And again, good work today.\"\n  *page_break Leave the captain's office.\n\n*label wrap_up\nYou leave Isan's office and return to your quarters.  It's been a long day, and you're ready for bed.  The trade port Tuskin is only a few days away.  You can't wait to check it out. Who knows where your future will take you next?\n*finish", "chapter_3a_intro": "*advertisement 1200\nCHAPTER 3 - TUSKIN\n\nThe rest of the journey to the trade port Tuskin is quiet but busy.\n*if rank \u003c 3\n  When you're not working, you spend as much time as you can in your quarters, hiding from everyone except Borion. As far as you're concerned, you can't get off this ship fast enough.\n  *goto intro_1\n*else\n  You spend a lot of time with the crew even when you're not working. Though you get along with some people better than others, it's great to be part of the group. You really found a place where you belong.\n  *goto intro_1\n*label intro_1\n\nThe day you arrive on Tuskin, the whole crew's in high spirits, but no one more than Captain Isan.  During the morning meeting, ${isan_he} outlines ${isan_his} plans for the entire crew.\n\n\"It's been awhile since we've been here,\" ${isan_he} says, \"but most of you know the drill.  We'll land and depart the ship.  You're all free to do as you please for the remainder of the day. Meanwhile, I'll sell our wares and look for more work.  We meet back at the [i]Lady Luck[/i] no later than 0200 hours.  Any questions?\"\n*choice\n  #\"What should I do while we're here?\"\n    *if rank \u003c 3\n      Isan frowns at you.  \"You'll do as you're told,\" ${isan_he} says firmly. \"You will be in Rallix's custody for the duration of the mission.\"\n\n      Rallix flashes you a gruesome smile that makes you shudder.\n      *goto intro_2\n    *else\n      Isan smiles indulgently.  \"Whatever you want, ${name}.  You're a member of this crew now, just like everyone else. Go have some fun.\"\n\n      You're excited. A chance to get off the ship and stretch your legs! Who knows what you'll see?\n\n      Borion pats you on the back.  \"S-see?\" he says.  \"I t-told you you'd f-fit in here.\"\n      *goto intro_2\n  #\"What can you tell me about Tuskin?\"\n    \"You want to take this one, Thisi?\" asks Isan.\n    *if ((killed_rekelians=true) and ((preference = \"men\") or (preference = \"women\")))\n      Thisi gives you a look with narrowed eyes, and pointedly turns ${thisi_his} back on you. \"Actually, I'd rather not. Captain.\"\n\n      \"Very well, then,\" says Isan, turning to you. \"Tuskin is a small planetoid devoid of natural life. Eighteen years ago, the Bewoth Empire snapped it up, converting it into this sector's most popular trade port. Because there's a wealth of local merchants, ships from all over the galaxy trade there.\" ${isan_he} thinks. \"What else? Oh, and Tuskin's renowned for all the entertainment available to visitors like the crew.\"\n\n      Thisi breathes out, obviously relieved ${thisi_he} didn't have to talk to you ${thisi_him}self. You sigh - you had worried that your actions against the  Rekelians had angered Thisi, and it's becoming more and more clear that you were right. The pheromone rush that you get from being around Thisi is still there, but Thisi isn't returning any of your glances.\n      *goto intro_2\n\n    *elseif ((killed_rekelians=true) and (preference = \"neither\"))\n      Thisi gives you a look with narrowed eyes, and pointedly turns ${thisi_his} back on you. \"Actually, I'd rather not. Captain.\"\n\n      \"Very well, then,\" says Isan, turning to you. \"Tuskin is a small planetoid devoid of natural life. Eighteen years ago, the Bewoth Empire snapped it up, converting it into this sector's most popular trade port. Because there's a wealth of local merchants, ships from all over the galaxy trade there.\" ${isan_he} thinks. \"What else? Oh, and Tuskin's renowned for all the entertainment available to visitors like the crew.\"\n\n      Thisi breathes out, obviously relieved ${thisi_he} didn't have to talk to you ${thisi_him}self. You had worried that your actions against the  Rekelians had angered Thisi, and it's becoming more and more clear that you were right.\n      *goto intro_2\n\n    *elseif ((preference = \"men\") or (preference = \"women\"))      \n      Thisi smiles warmly, sending a rush of heat through you. \"It would be my pleasure, Captain,\" ${thisi_he} says. \"Tuskin is a planetoid devoid of natural life. Eighteen years ago, the Bewoth Empire snapped it up, converting it into this sector's most popular trade port. There's no shortage of local merchants, you see, so ships from all over the galaxy trade there.\"  Thisi pauses, and ${thisi_his} voice turns sultry. \"There's also more…entertainment here than you can handle,\" she adds with a wink.\n      *goto intro_2\n    *else\n      Thisi nods \"It would be my pleasure, Captain,\" ${thisi_he} says. \"Tuskin is a planetoid devoid of natural life. Eighteen years ago, the Bewoth Empire snapped it up, converting it into this sector's most popular trade port. There's no shortage of local merchants, you see, so ships from all over the galaxy trade there.\"  Thisi pauses, and ${thisi_his} voice turns sultry. \"There's also a wide variety of…entertainment.\"\n\n      *goto intro_2\n  #Remain silent.\n    *goto intro_2\n*label intro_2\n\n\"All right, then,\" concludes Isan, ${isan_his} voice serious.  \"You all know what I'm going to say next: be careful.  I don't want any incidents, and I mean any.  If you get into trouble with the authorities, you'll have to deal with me.\"  Isan's face softens.  \"That's it.  Let's go.\"\n*page_break\nWhile Taloo Dama lands the ship on the planet, the rest of the crew and you crowd around the main viewscreen in the ops center.  At first, all you can see is brown soil, but the other crew members grin in anticipation. As the [i]Lady Luck[/i] near Tuskin's surface, dozens of other ships come into view, parked across a vast expanse of flat land. A sea of multicolored lights and signs illuminates the dark sky, reminding you of Earth's Las Vegas.  You react with…\n*choice\n  #…awe.\n    *set harsh_kind %+10\n    *set like_tuskin_level 3\n    The vast array of flashing lights mesmerizes you.  \"Wow,\" you whisper as the ship continues its descent. You can't wait to explore!\n    *goto landing\n  #…indifference.\n    *set like_tuskin_level 2\n    The vast array of flashing lights may impress some, but you've seen better—and back on your own planet! Still, you don't want to ruin this moment for the rest of the crew, so you keep silent.\n    *goto landing\n  #…scorn.\n    *set harsh_kind %-10\n    *set like_tuskin_level 1    \n    Despite the vast array of flashing lights before you, you can't help but feel let down.  \"This is it?\" you mutter.  Whatever you were expecting, well, it was a lot more than this.\n    *goto landing\n*label landing\n\nSoon the [i]Lady Luck[/i] touches down on the planet's surface, and Captain Isan orders the crew to depart.\n\n*if rank \u003c 3\n  Rallix guides you to the exit, located down by the stern. From there, he grabs your arm and roughly leads you off the ship.  \"Don't get any ideas,\" he whispers menacingly. \"You are stuck with me, slave.\"\n  *finish Depart the [i]Lady Luck[/i].\n*else\n  You hurry with the rest of the crew toward the exit, located down by the stern.  From there, Captain Isan leads you all off the ship.\n  *finish Depart the [i]Lady Luck[/i].", "chapter_3b_engine_room": "Beaming with pride, you hurry into the engine room.  Your sense of accomplishment fades the second you see what's inside, however.  Instead of some fancy engine system or complex machinery, there's a lone figure lying prone in a tank of clear liquid. $!{thela_his} body and face are connected to dozens of wires, all plugged into the complex series of computers lining one wall.  The ${thela_gender} is human, perhaps mid-twenties, and seems to be sleeping peacefully.  The soft, comforting hum and blue light radiating up from the bottom of the tank only add to the surreal mood.\n*page_break\n\"Looks peaceful, doesn't ${thela_he}?\" says a voice from behind you.\n*choice\n  #You're startled.\n    *set cowardice_bravery %-10\n    Jumping at the sound of the voice, you turn, heart racing, to find Captain Isan standing at the entrance.  You can't believe you missed ${isan_his} arrival. The incredible sight in the tank must have hypnotized you.\n    \n    \"I see you've found your way into engineering,\" says Isan, nodding toward the tank.\n    *goto isan_entrance\n  #You're calm.\n    *set cowardice_bravery %+10\n    Keeping your face blank, you turn and find Captain Isan standing at the entrance. You meet ${isan_his} gaze calmly, as if you knew ${isan_he}'d be there.\n    \n    \"I see you've found your way into engineering,\" says Isan, nodding toward the tank.\n    *goto isan_entrance\n  #You're suspicious.\n    *set suspicion +5\n    Your eyes narrow. You turn around, but it's just Captain Isan at the entrance. The captain's timing is so perfect that you can't help but wonder if ${isan_he} planned for this to happen.\n    \n    \"I see you've found your way into engineering,\" says Isan, nodding toward the tank.\n    *goto isan_entrance\n  #You're angry.\n    *set harsh_kind %-10\n    Your eyes bulge as you spin around to find Captain Isan standing at the entrance.  Enraged, you march toward ${isan_him}. Isan holds up a pacifying hand.\n    \n    \"There's no need for violence, ${name},\" ${isan_he} says. \"It'll all make sense soon.\" Isan nods toward the tank.\n    *goto isan_entrance\n*label isan_entrance\n\"Meet Thela. $!{thela_he} was to be my ${thela_husband}, and I love ${thela_him} with all my heart.\"  Isan walks over to the tank and leans down. With careful, deft strokes, ${isan_he} gently caresses the ${thela_gender}'s—Thela's, you remind yourself—cheek.  \"Thela is human like you.  Twenty-six years old.  And the kindest, most gentle person I've ever met.\"\n\nIsan turns back toward you with glistening eyes.  \"We met a little over two years ago.  Before that, I'd been going through some hard times.  Things got bad.  But then I met Thela, and ${thela_he} changed my life.  We were bursting with plans: we were going to travel the stars together, start our own colony. Maybe even our own restaurant! But…\"\n\n\"Yes?\" you nudge, trying not to sound pushy. \n\n\"There was…an accident. Thela was exposed to something. A virus that caused ${thela_him} to develop a condition. It grants ${thela_him} certain abilities, but it's also killing ${thela_him} at the same time. The tank is the only thing keeping my love alive.\"\n\nIsan glances at you from the corner of ${isan_his} eye.  \"You're probably wondering why Thela is here in the engine room.  Well, Thela [i]is[/i] the engine room, ${name}.  Those abilities I mentioned?  Thela's able to interface with our computers, controlling our engines and helping to pilot this ship.  Thela's the reason our ship moves.  Not only that, but it's because of ${thela_him} that we're the fastest ship in the sector.  Without ${thela_him}, we'd be dead in space.\"\n*choice\n  #\"You monster.  Thela deserves better than this!  You need to find a cure.\"\n    *set garce_isan %-10\n    *set cowardice_bravery %+10\n    *set harsh_kind %+10\n    \"Don't you think I've tried?\" exclaims Isan, glaring. You take a step back. \"I looked everywhere for a cure. Turned over every stone. Spent more money than you can imagine trying various elixirs and vaccines.  Nothing worked.  Nothing.\" Isan gulps back tears. \"When Thela discovered what the virus let ${thela_him} do, ${thela_he} volunteered for this.  Begged me for it, ${name}, so that we could be together forever.  But I swear to you, not a day goes by that I don't search for a cure.\"\n    *goto isan_continued\n  #\"This isn't living.  You should put ${thela_him} out of ${thela_his} misery.\"\n    *set garce_isan %-20\n    *set harsh_kind %-10\n    Isan's eyes darken in warning, making you take a step back.  \"I am going to save ${thela_him}, ${name}.  You can count on that.  In the meantime, Thela is exactly where ${thela_he} wants to be, having begged me for this. ${thela_he} wanted to be connected to the engines so ${thela_he} could fly the ship while I look for a cure.  So if you think I'm going to just unplug the love of my life and watch ${thela_him} die, you're wrong.  Dead wrong.\"\n    *goto isan_continued\n  #\"It's sad, but you did what had to be done.\"\n    *set garce_isan %+20\n    *set harsh_kind %+10\n    Isan's shoulders slump in defeat.  \"You're right, I did.  It broke my heart, but it's what Thela asked for. $!{thela_he} knew I couldn't save ${thela_him}, but the tank could. Or at least it could prolong ${thela_his} life. So ${thela_he} had me set this up, a way for ${thela_him} to fly the ship while I continue looking for a cure.  And I swear to you, ${name}, I will find one, even if it's the last thing I ever do.\"\n    *goto isan_continued\n  #\"You're smart to use ${thela_him} to speed up the ship.  I support you!\"\n    *set follower_leader %-10\n    *set harsh_kind %-20\n    \"Intelligence had nothing to do with it,\" replies Isan scornfully.  \"Have you no heart, ${name}? I did this to save the love of my life.  Thela begged for this, wanted to be connected to the engines so ${thela_he} could fly the ship and free me to look for a cure.  The instant I find that cure—and I will; make no mistake—I'll free my love from this living hell.\"\n    *goto isan_continued\n*label isan_continued\nIsan sighs regretfully. \"The important thing to know is that Thela isn't conscious. Instead, ${thela_he}'s in a dream state, feeling no pain.\" Isan sniffs and rubs ${isan_his} eyes. \"I—I can't live without ${thela_him}, ${name}. And that's all you need to know.\"  Uncomfortable, you stare at the floor.\n\n*if (has_stolen_treasure_ship = true) and (specialization != \"infiltration\")\n  \"By the way,\" says Isan sternly, \"I couldn't help but notice that a piece of treasure is missing from the cargo bay. A piece of treasure that you appear to have in your pocket.\"  You back away, but Isan strides over to you and yanks the chalice from your pocket.  \"There's no place for theft on this ship,\" ${isan_he} says, \"especially by a member of my team.  Don't disappoint me again, ${name}.\"\n\n  \"H-how did you—?\" you stammer, breathing hard. \"How did you know?\"\n\n  \"Did you forget Shelou Vili catalogued everything we took?\" Isan shakes ${isan_his} head. \"A thief and unobservant, too.\"\n  *set has_stolen_treasure_ship false\n  *set garce_isan %-20\n  *set duplicity_loyalty %-20\n  *set suspicion +10\n  *goto isan_continued_2\n*label isan_continued_2\n\nIsan tugs on ${isan_his} shirt and runs a hand through ${isan_his} hair. When ${isan_he} looks back at you, ${isan_his} face is composed. \"Now then.  We should go meet with the others, as I have some important news to share.  But before we do, is there anything you want to tell me, ${name}?\" $!{isan_he} looks at you expectantly.\n*choice\n  #Tell Isan about your meeting with Detective Garce.\n    *set told_isan_about_garce true\n    *set garce_isan %+20\n    *set duplicity_loyalty %+20\n    You describe your meeting with Detective Garce to Captain Isan and lay out the proposal the GPF officer made you.\n    \n    \"Hmm.\" Isan rubs ${isan_his} chin.  \"I'm definitely familiar with ${garce_him}. ${garce_he}'s been tracking us for a long time.\" Isan's voice turns low and conspiratorial. \"I assume that you turned down ${garce_his} offer, right?\"\n    *if took_garce_offer = true\n      *choice\n        #\"Of course.\" (Lie.)\n          *set duplicity_loyalty %-10\n          *set suspicion +5\n          \"Good,\" replies Isan.  \"I know Garce well.  More than you know. ${garce_he} might be working for the police, but you can't trust ${garce_him}. Anyway, let's go meet with the others, shall we?\"\n          *finish Follow Isan back to the rest of the crew.\n        #\"Actually, I took the offer.\"\n          *set duplicity_loyalty %+10\n          \"You wouldn't tell me that,\" says Isan thoughtfully, \"if you actually meant to go through with the deal.\" ${isan_he} smiles. \"I'm glad you told me, ${name}. This is good. This is very good, in fact. We can use this info down the line. But for now, let's go meet with the others, shall we?\"\n          *finish Follow Isan back to the rest of the crew.\n    *else\n      *choice\n        #\"Of course.\"\n          *set duplicity_loyalty %+10\n          \"Good,\" replies Isan.  \"I know Garce well.  More than you know. ${garce_he} might be working for the police, but you can't trust ${garce_him}. Anyway, let's go meet with the others, shall we?\"\n          *finish Follow Isan back to the rest of the crew.\n        #\"Actually, I took the offer.\" (Lie.)\n          *set duplicity_loyalty %-10\n          *set suspicion +5\n          \"You wouldn't tell me that,\" says Isan thoughtfully, \"if you actually meant to go through with the deal.\" ${isan_he} smiles. \"I'm glad you told me, ${name}. This is good. This is very good, in fact. We can use this info down the line. But for now, let's go meet with the others, shall we?\"\n          *finish Follow Isan back to the rest of the crew.\n  #Keep quiet about your meeting with Detective Garce.\n    *set garce_isan %-20\n    *set duplicity_loyalty %-20\n    *set suspicion +5\n    You assure Captain Isan that you have nothing to report.  Isan stares at you, holding your gaze for several seconds before nodding.  \"All right, ${name}.  I believe you.  Let's get back to the crew then, shall we?\"\n    *finish Follow Isan back to the rest of the crew.", "chapter_3b_tuskin_garce": "You continue exploring Tuskin on your own. The colorful flashing lights, the savory, unfamiliar aromas, the loud, foreign songs blasting from alien nightclubs…you can't decide what to try first. It's all so exciting! You stop to read the menus outside restaurants featuring foods you'd never even heard of, and your mouth waters.\n\nJust as you settle on a café farther down the strip, a figure approaches you from behind, coming way closer than a stranger should. Before you can turn, a low-pitched voice whispers in your ear.\n\n\"Follow me.\"\n*label follow_me\n*choice\n  *hide_reuse #\"Who are you?\"\n    \"Never mind that,\" whispers the figure. Something hard pokes you in the back. \"Do as I say.\"\n    *goto follow_me\n  #Follow the figure.\n    *set follower_leader %-20\n    *set cowardice_bravery %-20\n    You turn slowly, your heart pounding in your throat. A green neon sign illuminates the human before you—the first human you've seen since the [i]Cheyenne[/i] crashed. $!{garce_he}'s dressed in a cloak that obscures most of ${garce_his} face, but you can make out dark, deadened eyes. They bore into you, forcing you to look away.\n    *goto led\n  #Ignore the figure.\n    *set follower_leader %-10\n    You're not impressed by shadowy figures with grating voices. Brushing off the command, you keep walking.  A few seconds later, a firm hand grabs your arm. You try to wrench away, but the figure steers you forward. Your eyes dart over a human face—the first human you've seen since the [i]Cheyenne[/i] crashed. $!{garce_he}'s dressed in a cloak that obscures most of ${garce_his} face, but you can make out dark, deadened eyes. They bore into you, forcing you to look away.\n    *goto led\n  #Firmly reject the figure.\n    *set follower_leader %+20\n    *set cowardice_bravery %+20\n    No one tells you what to do, especially not some idiot on the street.  You shove the figure away with a firm \"No way.\" Undeterred, the figure grabs your arm. You try to wrench away, but the figure steers you forward. Your eyes dart over a human face—the first human you've seen since the [i]Cheyenne[/i] crashed. $!{garce_he}'s dressed in a cloak that obscures most of ${garce_his} face, but you can make out dark, deadened eyes. They bore into you, forcing you to look away.\n    *goto led\n*label led\n\nThe human hauls you down another two blocks before turning into a small, out-of-the-way alley between two buildings. It's barely wide enough for the two of you.\n\nYou keep yourself braced, ready to escape the second you have a good distraction.\n\nThe figure flings back the hood of ${garce_his} cloak, revealing at a middle-aged ${garce_gender} with black hair. $!{garce_he} grins and unfastens the cloak. You suck in your breath at the uniform underneath; it belongs to the Galactic Police Force. Tall and muscular, this ${garce_gender} is powerful, dangerous, and in full control of the situation. Alarmed, you zip your lips. No way will you spill any incriminating information.\n\n\"I'm Detective Ennin Garce,\" the ${garce_gender} announces, ${garce_his} voice deep and sure.  \"And you're ${name}, former passenger on the transport ship [i]Cheyenne[/i], which exploded several days ago.  Is that correct?\"\n*fake_choice\n  #\"Yes.\"\n  #\"No.\"\n  #\"Get to the point, Garce.\"\nThe detective ignores you.  \"Now since that time, you've been taken onto the vessel [i]Lady Luck[/i], captained by a ${isan_gender} named Isan Cehnta. The name just rolls off your tongue, doesn't it?\"  Garce chuckles. \"Anyway, this ship specializes in what you might call the 'retrieval business.' But we both know what it really is—a pirate ship. More importantly, I don't think you have what it takes to be part of that kind of operation. Am I right, ${name}?\"\n*choice\n  #\"I love being part of the crew.\"\n    *set harsh_kind %+10\n    *set garce_isan %+10\n    *goto mind_picture\n  #\"I couldn't care less about the crew.\"\n    *goto mind_picture\n  #\"I hate the crew and can't wait to get away from them.\"\n    *set harsh_kind %-10\n    *set garce_isan %-10\n    *goto mind_picture\n*label mind_picture\nGarce nods. \"Tell you what,\" ${garce_he} says. \"Why don't I tell you a little about myself?  Beyond the name, I mean. You recognize this uniform, ${name}?  It makes me a member of the Galactic Police Force. That means it's my job to apprehend anyone who performs illicit activities. Or even just takes part in them. I've been tracking the [i]Lady Luck[/i] for months now, but every time I think I've caught the crew, they manage to slip away. Do you have any idea of some of the things they've done?\"\n*fake_choice\n  #\"Yes.\"\n  #\"No.\"\n\"Stealing Prince Wagner's scepter on Unis Prime. Breaking into and removing the Crystal of Isec in the Vindale Kinkades. The Great Heist of Torcus II. These are dangerous people, ${name}, and you have the power to stop them. With my help, of course.\"\n*choice\n  #\"Why me?\"\n    \"Why not you?\" counters Garce. \"Hear me out. If you have questions after that, I'll be happy to answer them.\"\n\n    Garce unfolds ${garce_his} arms and moves closer to you.\n    *goto what_to_do\n  #\"What do you want me to do?\"\n    *goto what_to_do\n  #\"I'm not interested in helping you.\"\n    Garce frowns and crosses ${garce_his} arms.  \"You're going to hear me out.  If you say no after that, fine.  But first…\"\n\n    Garce unfolds ${garce_his} arms and takes several steps closer to you.\n    *goto what_to_do\n*label what_to_do\n\"I want you to lead me to Isan, ${name}.  Someone like me can only get so close in an official capacity. But in an unofficial one, you can get closer. You're in a unique situation here.\n*if rank \u003c 3\n  The crew accepts you as one of them, you see.  You may not think so, given your status onboard the ship, but they do. They might not fully trust you, and you might even have to wear that silly collar around your neck, but they accept you. And you can use that to your advantage.\"\n  *goto what_to_do_2\n*else\n  The crew trusts you. That's clear from your current rank. You've managed to earn that trust and acceptance in very little time. It's impressive—and something you can use to your advantage.\"\n*label what_to_do_2\n*choice\n  *hide_reuse #\"You seem to know a lot about me.\"\n    Garce smiles tightly. \"That I do, ${name}.  You're probably wondering how, am I right? Well, let me tell you.\"\n\n    Reaching into ${garce_his} uniform, Garce pulls out a handheld datapad. ${garce_he} licks ${garce_his} finger and consults the device.  \"You're fairly new to the equation, I admit.  But I've been tracking the [i]Lady Luck[/i] for some time—two years, in fact.  The instant they found you in the [i]Cheyenne[/i] wreckage, I started tracking you. Of course I looked you up.\n\n    *if origin = 1\n      \"You've lived on Earth most of your life. Aside from a few trips to other planets in your own solar system, you stuck close to home.  Then lo and behold, your grandpa dies and leaves you his entire fortune in the will.\"  Garce points accusingly at you.  \"Hey, you think, I'm tired of my life. So why not use that money and travel?\"\n      *goto your_backstory\n    *elseif origin = 2\n      \"You've lived on Earth most of your life. Aside from a few trips to other planets in your own solar system, you stuck close to home. Then lo and behold, you parents die, and find yourself owing the wrong people some cash.\"  Garce points accusingly at you.  \"And you realize you can't pay up.  So instead of trying to earn enough on Earth to repay your debt, you spend what little money you have on a ticket to the outer sectors of known space, to try your luck there.\"\n      *goto your_backstory\n    *else\n      \"You've lived on Earth most of your life. Aside from a few trips to other planets in your own solar system, you stuck close to home. Then lo and behold, you find yourself involved with some, shall we say, less-than-reputable people. And now the law's after you.\"  Garce points accusingly at you. \"So what do you do? You run, see? You flee Earth, hoping that the authorities won't be able to catch up with you.\"\n      *goto your_backstory\n    *label your_backstory\n\n    Garce shrugs exaggeratedly.  \"Heck, I might have done the same thing in your position. Who could blame you, right? So anyway, you go off on the transport ship [i]Cheyenne[/i].  The ship crashes, thanks to some kind of alien web my people are still investigating, and you end up onboard the [i]Lady Luck[/i].\n\n    \"And now here you are. Part of an alien crew that gets its kicks robbing people. Do you feel good about yourself, ${name}?  Getting that warm, tingly sensation up your spine?\" Garce smiles knowingly. \"Or maybe…just maybe…you want out. I can help you with that.\"\n    *goto what_to_do_2\n  #\"What do you want from me?\"\n    \"Nothing that you wouldn't be willing to do alone, and nothing for free, of course. Don't worry, ${name}—I'm only asking you to do what is right. What is lawful under the terms of GPF jurisdiction.\" Grace raises an eyebrow. \"You are a lawful person, aren't you, ${name}?\"\n    *goto lawful_choice\n*label lawful_choice\n*choice\n  #\"Of course.\"\n    *set follower_leader %-10\n    *set cowardice_bravery %-10\n    *set garce_isan %-20\n    \"I knew it,\" replies Garce, nodding. \"You're just like me.  A good, just, honest, lawful citizen of Earth. You don't want to be complicit in any illegal activity any more than I would.  Let me tell you my proposal.\n    *goto the_pitch\n  #\"When it suits me.\"\n    *set cowardice_bravery %+10\n    \"You know, ${name},\" says Garce, \"personal values are a great thing.  I have them, too.  But at some point, you're going to have to believe in something greater.  You can't always look out just for yourself, or you're going to land yourself in a whole lot of hot water. Give my proposal a listen, why don't you?\n    *goto the_pitch\n  #\"I do what I want.\"\n    *set follower_leader %+10\n    *set cowardice_bravery %+10\n    *set garce_isan %+20\n    \"Of course you do.\" Garce shrugs.  \"Who doesn't?  But in this case, I think you'd want to do what I propose, because it would work out best for everyone involved—if you know what I mean.\n    *goto the_pitch\n*label the_pitch\n\n\"I want you to take a small homing beacon and place it on Captain Isan. Doing so will activate the device. But you'd only do this after the [i]Lady Luck[/i] has reached its next destination, whatever that happens to be.  I'm sure that Isan Cehnta is looking into that as we speak.  Anyway, should you decide to assist with this GPF operation, you would be compensated with quite a large sum of money. How does 200 credits sound?\"\n*label pitch_choice\n*choice\n  *hide_reuse #\"You've been able to track them all this time. Why do you need me?\"\n    \"I might be able to get close, but Isan's good. Too good, unfortunately. Every time I move in, ${isan_he} manages to slip right through my fingers.  Combine that with the fact that the [i]Lady Luck[/i] is the fastest ship in the galaxy, and that crew makes for a collective slippery target.\n\n    \"But with you helping us, we might finally apprehend them.  So what do you say?\"\n    *goto pitch_choice\n  *hide_reuse #\"What happens to the crew if they're caught?\"\n    Garce shrugs.  \"I'm not interested in the crew,\" ${garce_he} says, though ${garce_he} refuses to meet your eyes. \"I just want Isan Cehnta. We catch ${isan_him}, and the rest will be free to go. But you can bet the captain will face charges.\" A muscle in Garce's jaw clenches. \"For everything ${isan_he}'s done.\"\n\n    Garce takes a few deep breaths, but ${garce_he}'s not fooling you. This is personal. \"So what do you say?\"\n    *goto pitch_choice\n  *hide_reuse #\"Why do you want to catch them so badly?\"\n    \"You mean, besides the fact that they're criminals, and it's my job as a law enforcement officer to stop them?\"  Garce rolls ${garce_his} eyes.  \"Quit stalling, ${name}.  Are you going to help me or not?\"\n    *goto pitch_choice\n  *hide_reuse #\"What would I get out of this?\"\n    \"Other than the 200 credits, you mean?\" Garce's sarcasm is so thick, it burns. \"Fine, I'll bite. In addition to the credits,\n    *if origin = 1\n      you'll have taken part in the longest GPF chase in modern history. And you'll have played a key role. People will know your name. You wanted an adventure, right? Well, this is your chance.\"\n      *goto pitch_choice\n    *elseif origin = 2\n      I'll personally ensure that all your debts on Earth are wiped clean. You won't owe anyone a dime.  And you can keep the 200 credits on top of it. How does that sound?\"\n      *goto pitch_choice\n    *else\n      I'll personally clear the air with the authorities on Earth. You'll be free again, ${name}. No more hiding ever. How does that sound?\"\n      *goto pitch_choice\n  *hide_reuse #\"What happens if I don't comply?\"\n    Garce frowns. \"I hate to say it, but you really haven't done anything wrong in this sector.\" $!{garce_he} narrows ${garce_his} eyes. \"Yet. So if you say no to me, I'll allow you to leave here. For now. Call me a sucker, but I'm still hoping you'll go to bat for your own people instead of some aliens. What do you say?\"\n    *goto pitch_choice\n  #\"Sure, I'll do it.\"\n    *label help_him\n    *set garce_isan %-20\n    *set duplicity_loyalty %-40\n    *set took_garce_offer true\n    *goto help_garce\n  #\"Sure, I'll help you.\" (Lie.)\n    *set cowardice_bravery %+10\n    *set duplicity_loyalty %+10\n    *goto help_him\n  #\"I won't betray them.\"\n    *set garce_isan %+20\n    *set duplicity_loyalty %+40\n    \"You mean to tell me,\" says Garce menacingly, \"that you'd protect a ship of alien thieves over one of your own kind?  I'm the only human you've met since the [i]Cheyenne[/i] crashed.  You and I, we're alone out here. You think those aliens will ever truly accept you as one of them?  They may act like it, but at the end of the day, you'll always be nothing more than an outsider.\n\n    \"On the other hand, I can respect you. Work with you. Help you. You want more money? Because I can make all that happen. All you need to do is work with me here. Do your duty as a lawful citizen of Earth. Think about it, yeah?\"\n    *choice\n      #\"You've made a good case, so sure, I'll help you.\"\n        *set cowardice_bravery %-10\n        *goto help_him\n      #\"Sure, I'll help you.\" (Lie.)\n        *set cowardice_bravery %+10\n        *set duplicity_loyalty %+10\n        *goto help_him\n      #\"My answer is still no.\"\n        *set cowardice_bravery %+10\n        Garce's eyes widen in anger but close again so quickly you're sure you imagined it.  \"Very well,\" ${garce_he} says evenly.  \"That's your right.  Go back to your pirate ship, ${name}. But know I've got my eye on you.\"\n\n        Garce puts ${garce_his} cloak back on and raises the hood over ${garce_his} head. Seconds later, ${garce_he} pushes past you and returns to the street, where ${garce_he} instantly blends into the diverse crowd.\n        *page_break Return to the streets of Tuskin.\n        *goto_scene chapter_3b_tuskin_ship\n  *hide_reuse #\"I need some time to think about this.\"\n    \"No,\" says Garce fiercely. \"No time.  I can't stay undercover here for long; I'm too well known on this world.  Tell me now if you're going to assist the GPF or not. What's your answer?\"\n    *goto pitch_choice\n*label help_garce\n\"You've made a smart choice,\" booms Garce, clapping you on the shoulder. \"Helping me is your best chance of surviving this situation. Things are far more dangerous than you realize. But we'll talk about that later.\"\n\nGarce slides the datapad back into ${garce_his} pocket and dons ${garce_his} cloak. Once done, ${garce_he} removes a small, spherical device from a pocket and hands it to you.\n\n\"This is the homing beacon,\" ${garce_he} explains. \"As soon as you arrive at your next mission, plant this on Isan and push the button to activate it. Then my team will come in.  At that point, all you have to do is step back and let us take charge.\n\n\"Oh, if you happen to run into any unexpected opportunities during the mission—and by that, I mean sabotage—use them. The less successful this crew is, the better off we'll all be, if you follow. Do you have any questions?\"\n*label questions\n*choice\n  *hide_reuse #\"What if I can't plant the device on Isan?\"\n    \"Then plant it on someone else,\" Garce replies, impatiently waving a hand.  \"As long as it's someone near Isan, that should be more than enough for me to move my team in.\"\n    *goto questions\n  *hide_reuse #\"How should I sabotage the mission?\"\n    \"I know you're new at this, but do you really expect me to guide you through this entire operation step by step?\" says Garce, sounding incredulous.  \"I don't know, and I don't care. My job is to arrest Isan. Your job is to make that possible. I would hope, given what I know about you, that you've got enough sense to figure out the rest on your own.\"\n    *goto questions\n  *hide_reuse #\"What if I'm caught?\"\n    \"Don't,\" says Garce forcefully. \"It's that simple.\"\n    *goto questions\n  *hide_reuse #\"Do you have legal jurisdiction in this sector of space?\"\n    \"I'm going to pretend you didn't ask that,\" responds Garce with a roll of ${garce_his} eyes. \"Now you're just wasting my time.\"\n    *goto questions\n  *hide_reuse #\"Why do you need me at all?  Why not simply arrest everyone yourself right now?\"\n    \"Two reasons,\" says Garce flatly.  \"First, Captain Isan is good…too good.  At this time, I don't have any hard evidence of wrongdoing, so I need to catch the crew in the act. That means getting help from someone inside.\"\n\n    Garce pauses, eyeing you carefully before continuing.  \"And second, let's just say that Captain Isan and I have a…complicated relationship.  If I were to move in without concrete proof, the GPF might not take too kindly to my actions.\"\n    *goto questions\n  #\"I'm ready.\"\n    \"Good,\" replies Garce, pulling the hood back over ${garce_his} face. \"Then get going. We shouldn't be seen together.  I'll contact you later, after I've caught Isan.  At that time, you'll get your reward.\"\n\n    Seconds later, ${garce_he} pushes past you and returns to the street, where ${garce_he} instantly blends into the diverse crowd.\n    *page_break Return to the streets of Tuskin.\n    *goto_scene chapter_3b_tuskin_ship", "chapter_3b_tuskin_ship": "*temp unlocked_door\n*temp caused_crisis\n*temp obtained_pass\n*temp entered_cargo_bay\n*set unlocked_door false\n*set caused_crisis false\n*set obtained_pass false\n*set entered_cargo_bay false\nYou return to the crowded streets of Tuskin and plow past the bewildering array of neon-lit shops, restaurants, and arcades. The pounding music, the spicy, savory, oily smells—they're all too much after weeks of austere ship life. You jog along aimlessly and stumble past a crossroads, only to discover that you've gone in a circle.  The left path leads to the industrial sector, and alien guards block the entrance.  The right path leads back to the ship landing zone.  You can see the [i]Lady Luck[/i] off in the distance. A pair of figures emerge from the sleek vessel—\n*if thisi_taloo \u003c 51\n  Taloo and\n  *goto second_crew\n*else\n  Thisi and\n  *goto second_crew\n*label second_crew\n*if rallix_shelou \u003c51\n  Shelou Vili.\n  *goto emerged\n*else\n  Rallix.\n  *goto emerged\n*label emerged\nYou quickly realize that this may be your only opportunity to explore the ship without interference from the crew.\n*page_break Explore the [i]Lady Luck[/i].\nYou run to the pirate vessel and board it. Just as you'd thought, the entire crew is out enjoying themselves on the planet.\n\nYou don't have much time, so you hurry to…\n*choice\n  #the operations center.\n    *goto ops\n  #the engine room.\n    *goto engine_room\n  #the cargo bay.\n    *goto cargo_bay\n  #the brig.\n    *goto brig\n  #the science lab.\n    *goto science_lab\n\n*label ops\nYou enter the operations center, relieved to discover that doors part when you touch the hand scanner. Most of the lights inside are off, though the computer panels are still operational.\n*label ops_choice\n*choice\n  *selectable_if (specialization = \"infiltration\") #Access the ship's manifest. (INFILTRATION)\n    *if obtained_pass = true\n      You've already created a temporary pass granting you access to nearly every area of the ship. There's not much else you can do here.\n      *page_break Go somewhere else.\n      *goto where_to_go\n    *else\n      You spot a computer station at the back of the room and use it to access the ship's manifest. A list of names appears, every member of the crew but Kraska. Odd, you think and read on. Under each name is a full description of that crew member and their role on the ship.\n      *if rank \u003c 3\n        Your status on the ship doesn't appear to be respected by the rest of the crew. Your chest tightens as you read on. The collar you wear is deemed necessary.\n        *goto ops_cpu\n      *else\n        From what you read, you're both welcomed and accepted by the crew.\n\n      *label ops_cpu\n      Grinning, you realize that, thanks to your infiltration training, you can manipulate this database to gain access to the areas of the ship normally off-limits to you.\n      *choice\n        #Manipulate the database.\n          You access your own file in the database. It's basically what you expected: facts about your past, though nothing too personal, and an evaluation of your performance during the last mission.\n\n          Beneath this data are several options, one of which allows you to bypass security restrictions. You type in the commands necessary to issue yourself a temporary all-access pass good for the next thirty minutes.\n\n          Pleased with your results, you erase all evidence of your tampering and shut down the computer. Now it's time to explore!\n          *set obtained_pass true\n          *page_break Go somewhere else.\n          *goto where_to_go\n        #Leave the computer and go somewhere else.\n          *goto where_to_go\n  *hide_reuse #Go into the captain's office.\n    You try the door leading to the captain's office, only to find that it won't open for you,\n    *if obtained_pass = true\n      even with the temporary pass you issued yourself. You're disappointed but accept that you're not getting inside.\n      *goto ops_choice\n    *else\n      and no hand scanner is anywhere in sight. You're disappointed but accept that you're not getting inside.\n      *goto where_to_go\n  #Go somewhere else.\n    *goto where_to_go\n\n*label engine_room\nIntrigued, you approach the entrance to the engine room, the one place on the ship you've never been.\n*if caused_crisis = true\n  Just as you thought, the doors to the room stand open, thanks to the environmental \"crisis\" you initiated in the science lab.\n  *choice\n    #Go into the engine room.\n      *goto_scene chapter_3b_engine_room\n    #Go somewhere else.\n      *goto where_to_go\n*else\n  *choice\n    #Attempt to open the doors.\n      *if unlocked_door = true\n        You walk toward the doors, hoping that they will open, but they don't. Undeterred, you press a small button on the wall. The doors slide open. You're sure it's a result of having unlocked them from Rallix's security station in the brig.\n        *choice\n          #Go into the engine room.\n            *goto_scene chapter_3b_engine_room\n          #Go somewhere else.\n            *goto where_to_go\n      *elseif obtained_pass = true\n        You walk toward the doors, hoping that they will open, but they don't. Undeterred, you press a small button on the wall. The doors slide open. You chalk it up to the temporary pass you forged for yourself while in the ops center.\n        *choice\n          #Go into the engine room.\n            *goto_scene chapter_3b_engine_room\n          #Go somewhere else.\n            *goto where_to_go\n      *else\n        You walk toward the doors, hoping that they'll open, but they don't. Undeterred, you press a small button on the wall. They still don't budge. If you want to get inside the engine room, you'll have to outsmart the ship's computer.\n        *page_break Go somewhere else.\n        *goto where_to_go\n    #Go somewhere else.\n      *goto where_to_go\n\n*label cargo_bay\n*set entered_cargo_bay true\nYou enter the spacious cargo bay. The ship's lone shuttle sits idly at the back of the room, almost hidden among the crates heaped inside. You notice the crate at your feet is open. Curious, you peek inside. It's packed with valuables and treasures, probably enough to fund you for the rest of your life.\n*choice\n  #Steal a piece of treasure.\n    *set has_stolen_treasure_ship true\n    *set number_of_goods_stolen +1\n    *set duplicity_loyalty %-10\n    *set suspicion +5\n    You pull out a small chalice embedded with jewels. No one will miss this, you think, dropping it into your pocket. There's no reason to stay and risk getting caught, so you exit the cargo bay.\n\n    *goto where_to_go\n  #Leave the cargo bay without taking anything.\n    *set duplicity_loyalty %+10\n    It's tempting, but you don't want to steal from the crew who took you in, so you turn and leave the cargo bay.\n\n    *goto where_to_go\n\n*label brig\nYou enter the brig, otherwise known as Rallix's domain. To your relief, the room is, indeed, empty. Rallix's computer sits idly, its soft light illuminating the room. You eye it suspiciously, remembering the things Rallix muttered when processing you.\n*choice\n  *selectable_if (specialization = \"tactical\") #Access Rallix's computer. (TACTICAL)\n    *if unlocked_door = true\n      You've already unlocked the engine room doors using Rallix's computer. There's not much else you can do here.\n      *page_break Go somewhere else.\n      *goto where_to_go\n    *else\n      You're nervous about getting caught, but this may be your only chance to access Rallix's personal database. You hurry to the computer and tap in a few commands. Seconds later, you see a list of all members of the crew…save Kraska. Odd, you think, and read on. Under each name, Rallix includes its own personal notes about that crew member. While most of the crew descriptions are only one or two sentences long, Rallix's rant about Shelou Vili goes on for pages—each angrier than the last.\n\n      *if rallix_shelou \u003c 40\n        Rallix's thoughts on you are, thankfully, a bit kinder. He seems to respect you and your beliefs.\n        *goto brig_computer\n      *elseif rallix_shelou > 60\n        Rallix's thoughts on you are no different. He may not consider you as detrimental to the crew as Shelou Vili, but he doesn't like you, either.\n        *goto brig_computer\n      *else\n        Rallix's thoughts on you are neutral, even boring.\n        *goto brig_computer\n      *label brig_computer\n\n      Shelou Vili isn't the only one Rallix despises. Apparently, it knows next to nothing about the Shadow Fiend and heavily objected to Captain Isan's appointment of him to the crew. You shake your head. How does Rallix not get itself kicked off the ship?\n\n      In addition to Rallix's thoughts on the crew, you find security-related information about the ship itself. Grinning, you realize that, thanks to your tactical training, you can manipulate this database to gain access to the areas of the ship normally off-limits to you.\n      *choice\n        #Attempt to access the off-limits areas of the ship.\n          After several minutes of playing around with the various security systems built into the computer, you find a menu labeled \"Door Control.\" From there, you can access every door on the ship except the one leading to the captain's office. At the moment, the only other locked doors are the ones leading to the engine room, which you promptly unlock.\n\n          Pleased with your results, you erase all evidence of your tampering and shut down the computer. Now it's time to explore!\n          *set unlocked_door true\n          *page_break Go somewhere else.\n          *goto where_to_go\n        #Leave the computer and go somewhere else.\n          *goto where_to_go\n\n  #Go somewhere else.\n    *goto where_to_go\n\n*label science_lab\nYou enter the science lab. It feels strange and empty without Thisi at the science station along the wall. The room is dark and quiet, the only sound the comforting hum of the ship's computers.\n*choice\n  *selectable_if (specialization = \"science\") #Access Thisi's science station. (SCIENCE)\n    *if caused_crisis = true\n      You've already faked an environmental emergency in order to unlock the engine room doors.  There's not much else you can do here.\n      *page_break Go somewhere else.\n      *goto where_to_go\n    *else\n      This might be your only chance to gain access to Thisi's terminal, so you hurry over and access ${thisi_his} computer system. You're shocked to learn that ${thisi_he}'s researching Kraska's race, the Shadow Fiends. Thisi's notes make it clear ${thisi_he} neither trusts Kraska nor does ${thisi_he} understand why he's on the ship.\n\n      You also find several personal notes Thisi has written, some of which pertain to you.\n      *if (preference = \"neither\")\n        When Thisi first met you, ${thisi_he} was surprised - and slightly disappointed - that ${thisi_his} pheromones didn't have much effect on you.\n        *goto thisi_cpu\n      *elseif thisi_taloo \u003c 40\n        Thisi thinks very highly of you, to the point of having a crush. You can't help but feel flattered at all ${thisi_his} glowing descriptions of your body and your mind.\n        *goto thisi_cpu\n      *elseif killed_rekelians=true\n        Thisi doesn't think much of you - not after what you did to the Rekelians.\n        *goto thisi_cpu\n      *elseif thisi_taloo > 60 \n        Thisi doesn't think much of you. You sigh. What did you do to ${thisi_him}?\n        *goto thisi_cpu\n      *else\n        Thisi thinks highly of you. But you're surprised that ${thisi_he}'s jealous of Taloo Dama, who ${thisi_he}'s sure is competing for your affection.\n      *label thisi_cpu\n\n      Moving on, you find an interesting series of menus on the computer. There's a training exercise someone with the right skill set—your skill set—could use to mimic an environmental emergency on the ship. Inducing this fake crisis automatically unlocks all doors on the ship, except the one outside the captain's office.\n      *choice\n        #Attempt to fake an environmental crisis.\n          Tapping in a series of commands, you begin the training exercise. It causes the computer to think toxic gas is leaking throughout the ship.  The computer notifies you that all doors on the ship—except for the one outside the captain's office—have been unlocked, allowing the crew to escape from the presumed emergency.\n\n          Pleased with your results, you erase all evidence of your tampering and shut down the computer. Now it's time to explore!\n          *set caused_crisis true\n          *page_break Go somewhere else.\n          *goto where_to_go\n        #Leave the computer and go somewhere else.\n          *goto where_to_go\n  #Go somewhere else.\n    *goto where_to_go\n\n*label where_to_go\nNext, you decide to go to…\n*choice\n  #the operations center.\n    *goto ops\n  #the engine room.\n    *goto engine_room\n  *if (entered_cargo_bay = false) #the cargo bay.\n    *goto cargo_bay\n  #the brig.\n    *goto brig\n  #the science lab.\n    *goto science_lab", "chapter_3b_tuskin_start": "Once your shoes touch the planet's soil, Captain Isan bids you and the rest of the crew farewell, heading off in one direction, a small computer pad in hand. You assume ${isan_he}'s on ${isan_his} way to negotiate the sale of the wares you found onboard the adrift Vervoo ship and to look for new work.\n\nKraska also departs the ship, quickly vanishing. You watch the shadow glide and dart around, clearly not interested in socializing with the rest of the crew.  What purpose could this creature possibly serve onboard the [i]Lady Luck[/i]?\n*if rank \u003c3\n  *goto slave_explore\n*else\n  *goto crew_explore\n\n*label slave_explore\nWhile the rest of the crew goes off to a local tavern for some drinks and a good time, Rallix leads you in another direction. \"It's just you and me now,\" it says in a low voice. \"Try to keep up.\"\n\nAs Rallix leads you through the dense crowds, your senses light up in response to the multitude of stimuli. Unlike Earth, the visitors represent every possible sentient species, most of whom you've never seen before. You pass by a live band, its clearly alien beat leading the progression of sound.  The tangy aroma of hot, spicy food blows across your nostrils, reminding you you still need to eat dinner. Animated displays welcoming visitors beckon to you in every color of the neon rainbow, dazzling you.\n*if like_tuskin_level = 3\n  Each breath you take leaves you more thrilled to be here. You can't wait to see what there is to see!\n  *goto slave_explore_cont\n*elseif like_tuskin_level = 2\n  The sights, while clearly designed to impress, do nothing but bore you. It's like a larger version of Earth's own Las Vegas.\n  *goto slave_explore_cont\n*else\n  The pathetic, tacky sights fill you with scorn. If only you weren't stuck here in this silly alien port!\n  *goto slave_explore_cont\n*label slave_explore_cont\n*page_break\n\"Rallix!\" shouts a heavily accented voice. \"It's been too long!\"\n\nRallix turns to the figure and smiles, though not quite as menacingly as usual.  \"Verle,\" it says, \"I had no idea you were here on Tuskin!\"  Verle is short, stocky, and lizardlike, his body green and scaled.\n\nRallix hurries to its friend and gestures wildly in greeting. Maybe now you could sneak off…\n*choice\n  #Attempt to escape from Rallix.\n    *set follower_leader %+20\n    You see your opportunity to escape and don't hesitate to take it.  While Rallix is distracted by its old friend, you quickly duck into a large group of people heading in the opposite direction. A few blocks later, you turn a corner and run for fifteen minutes, only stopping when you reach an outdoor theater.\n\n    Looking around, you're sure Rallix won't find you no matter how hard it looks.\n    *page_break Look around Tuskin.\n    *goto alone_streets\n  #Stay near Rallix, as you were told.\n    *set follower_leader %-20\n    Not wanting to suffer the consequences of disobedience, you decide to stay where you are.\n\n    Rallix and Verle talk for several minutes and then begin to march down the street. Lost in its conversation, Rallix doesn't even look back at you. You huff and pant, but you just can't keep up.\n\n    Despite your best efforts, you realize you've lost Rallix a few minutes later. You cup your hands around your mouth and call its name, but you can't find the Nixian anywhere.\n    *page_break Look around Tuskin.\n    *goto alone_streets\n\n*label crew_explore\nYou decide to join several of your crewmates at a local tavern, which Borion insists features the best ale in the sector.  While\n*if thisi_taloo \u003c 51\n  Taloo and\n  *goto crew_explore_b\n*else\n  Thisi and\n*label crew_explore_b\n*if rallix_shelou \u003c51\n  Shelou Vili\n  *goto crew_explore_c\n*else\n  Rallix\n  *goto crew_explore_c\n*label crew_explore_c\nremain behind, the rest of you head over to the tavern. Along the way, your senses light up in response to the multitude of stimuli. Unlike Earth, the visitors represent every possible sentient species, most of whom you've never seen before. You pass by a live band, its clearly alien beat leading the progression of sound.  The tangy aroma of hot, spicy food blows across your nostrils, reminding you you still need to eat dinner. Animated displays welcoming visitors beckon to you in every color of the neon rainbow, dazzling you.\n\n*if like_tuskin_level = 3\n  Each breath you take leaves you more thrilled to be here.\n  *goto crew_explore_cont\n*elseif like_tuskin_level = 2\n  The sights, while clearly designed to impress, do nothing but bore you. It's like a larger version of Earth's own Las Vegas.\n  *goto crew_explore_cont\n*else\n  The pathetic, tacky sights fill you with scorn. If only you weren't stuck here in this silly alien port!\n  *goto crew_explore_cont\n*label crew_explore_cont\n*page_break\nThe rest of the crew, familiar with the chaotic, crisscrossing streets of Tuskin, walks quickly, making it hard for you to keep up.\n\nA few minutes later, you realize you've lost Borion and the others. Desperate, you cup your hands around your mouth and call their names, but no one answers.\n*page_break Look around Tuskin.\n*goto alone_streets\n\n*label alone_streets\nHmm, you think, you might as well look around. You wander from store to restaurant to club, just drinking in the sights and sounds and smells. Half an hour later, you stop in front of a brightly colored but poorly maintained storefront. The vendor spots you through the window and waves you inside.\n\n\"Come on in,\" he coaxes, \"and have a look at my wares.\" In the window display, several trinkets are available for sale, a strange mix of low-budget jewelry and potentially useful items. Curious, you head inside.\n\n\"So,\" says the vendor, rubbing his hands together, \"are you looking to buy or sell?\"\n*choice\n  *selectable_if (has_stolen_treasure_vervoo = true) #Sell.\n    You show the vendor the golden idol you grabbed from the Vervoo ship when no one was looking.  The vendor appraises the item, assessing every inch of its surface. \"Hmm,\" he says. \"Looks good, but it's a knockoff. I'll give you 100 credits for it. No negotiations.\"\n    *choice\n      #Accept the offer.\n        \"Smart choice,\" says the vendor happily. \"You won't regret this sale.\" You exchange the item for the promised credits. \"Now do you want to buy something, too?\"\n        *set has_stolen_treasure_vervoo false\n        *set credits +100\n        *choice\n          #\"Yes.\"\n            *goto buy_stuff\n          #\"No.\"\n            *goto neither\n      #Decline the offer.\n        *set cowardice_bravery %+10\n        \"150 credits,\" counters the vendor a bit too eagerly. \"And that's my final offer. Don't push me again.\"\n        *choice\n          #Accept the offer.\n            \"Smart choice,\" says the vendor happily.  \"You won't regret this sale.\"  You exchange the item for the promised credits.  \"Now do you want to buy something, too?\"\n            *set credits +150\n            *set has_stolen_treasure_vervoo false\n            *choice\n              #\"Yes.\"\n                *goto buy_stuff\n              #\"No.\"\n                *goto neither\n          #Decline the offer.\n            \"Your loss,\" says the vendor, shrugging.  \"Now do you want to buy something?\"\n            *choice\n              #\"Yes.\"\n                *goto buy_stuff\n              #\"No.\"\n                *goto neither\n  #Buy.\n    *goto buy_stuff\n  #Neither.\n    *label neither\n    \"Suit yourself,\" says the vendor, shrugging. \"Move along, then, and make way for some [i]real[/i] customers.\"\n    *finish Continue exploring Tuskin.\n\n*label buy_stuff\nYou ask what kind of items the vendor has that might benefit someone in the retrieval business.\n\n\"Well,\" he replies, \"I've got some stuff over here that might be useful in your line of work. Nothing fancy, mind you, just the usual stuff: camo suits, disposable pistols, HRDs, shield rechargers, and sonic lockpicks.\"\n\nYou nod, keeping your face blank.\n\n\"So,\" asks the vendor with a toothy grin. \"You interested?\"\n*label interested\n*choice\n  #Ask about camo suits.\n    \"Camo suits make you temporarily invisible, allowing you to sneak into an area without detection. 50 credits.\"\n    *choice\n      #Buy\n        *if credits \u003c 50\n          \"Hey, you trying to scam me?  You don't have enough credits. Now are you going to buy something you can afford, or are you just wasting my time?\"\n          *goto interested\n        *else\n          *set credits -50\n          *set suits +1\n          \"There you go. Thank you for your patronage. Would you like to buy something else?\"\n          *goto interested\n      #Ask about something else.\n        \"That item not for you?  Let's talk about something else, then.\"\n        *goto interested\n  #Ask about disposable pistols.\n    \"Laser pistols are one of the most common weapons around. These babies are good for three shots each. After that, you just toss 'em away. 50 credits.\"\n    *choice\n      #Buy\n        *if credits \u003c 50\n          \"Hey, you trying to scam me? You don't have enough credits. Now are you going to
