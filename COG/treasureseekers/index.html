 -1\n        Thankfully, your personal shield recharger absorbs the damage from the blast. It flashes, startling the officer.  You take advantage of his distraction to knock him out, quickly disarming him and throwing the pistol into the brush nearby. Once you drag him to a safe spot at the side of the path, you move on.\n        *goto event_select\n      *else\n        *set health -10\n        The laser blast hits your chest.\n        *if health \u003c 1\n          The wound pierces your heart, and you collapse, bleeding out.\n\n          GAME OVER.\n          *goto_scene ending\n        *else\n          Luckily, the wound doesn't appear fatal. Stunned by what he just did, the officer jumps up and runs off.  Ignoring the pain as best you can, you stand and move on.\n          *goto event_select\n    *else\n      *set pistol_charges -1\n      *set harsh_kind %-20\n      Trusting your razor-quick reflexes, you draw your own laser pistol and shoot the officer in his trigger hand. He screams and drops his weapon. You throw it into the bushes and move on, leaving the deranged officer behind.\n      *goto event_select\n  *selectable_if (chosen_side = \"Garce\") #Convince the officer you're on his side. (GARCE)\n    *set harsh_kind %+10\n    *set duplicity_loyalty %-10\n    *set garce_isan %-10\n    You attempt to talk the officer down, explaining you're on his side, working against the crew of the [i]Lady Luck[/i] in an attempt to take down Captain Isan.\n    *if follower_leader \u003c 35\n      Unfortunately, you talk a little too confidently, scaring the officer. He pulls the trigger of his pistol.\n      *if officer_weapons_active = false\n        It doesn't work, due to the device Isan activated earlier. Thankful you planted the device on Garce back on Tuskin, you punch the officer in the face, knocking him out cold. Quickly disarming the unconscious man, you throw the pistol into the nearby brush. Once you drag him to a safe spot at the side of the path, you move on.\n        *goto event_select\n      *else\n        *goto officer_pistol_attack\n    *else\n      You come off as trustworthy to the officer, who must see you as a comrade. Visibly relaxing, he lowers his weapon. \"I never wanted any of this,\" he exclaims, running off. Happy you survived the confrontation without bloodshed, you move on.\n      *goto event_select\n  *selectable_if (chosen_side = \"Isan\") #Talk the officer into lowering his weapon. (ISAN)\n    *set harsh_kind %+10\n    *set duplicity_loyalty %+10\n    *set garce_isan %+10\n    You raise your arms in surrender, hoping to pacify the young officer. As you do, you talk the officer down.\n    *if follower_leader \u003c 35\n      Unfortunately, you talk a little too confidently, scaring the officer. He pulls the trigger of his pistol.\n      *if officer_weapons_active = false\n        It doesn't work, due to the device Isan activated earlier. Thankful you planted the device on Garce back on Tuskin, you punch the officer in the face, knocking him out cold. Quickly disarming the unconscious man, you throw the pistol into the nearby brush. Once you drag him to a safe spot at the side of the path, you move on.\n        *goto event_select\n      *else\n        *goto officer_pistol_attack\n    *else\n      You come off as trustworthy to the officer. Visibly relaxing, he lowers his weapon and agrees when you suggest finding an out-of-the-way place to hide. \"I never wanted any of this,\" he exclaims, running off. Happy you survived the confrontation without bloodshed, you move on.\n      *goto event_select\n  #Order the officer to lower his weapon, or else.\n    *set harsh_kind %-10\n    *set cowardice_bravery %+10\n    You sternly tell the officer to lower his weapon. Instead, he attempts to shoot you.\n    *if officer_weapons_active = false\n      It doesn't work, however, due to the device Isan activated earlier. Thankful you planted the device on Garce back on Tuskin, you punch the officer in the face, knocking him out cold. Quickly disarming the unconscious man, you throw the pistol into the nearby brush. Once you drag him to a safe spot at the side of the path, you move on.\n      *goto event_select\n    *else\n      *if cowardice_bravery \u003c 35\n        Luckily, you're fidgeting so much, his shot misses. You take off before he can fire another.\n        *goto event_select\n      *else\n        *goto officer_pistol_attack\n  #Distract the officer and make a run for it.\n    *set cowardice_bravery %-20\n    Thinking fast, you quickly point in a direction behind the officer and contort your face to mimic fear and panic.\n    *if cowardice_bravery \u003c 35\n      Your actions appear genuine, and the officer falls for it, turning to see what's wrong. You run without looking back. Before you know it, you've left the officer far behind. Relieved, you move on.\n      *goto event_select\n    *else\n      Unfortunately, you're too cowardly to pull off the ruse. The officer aims and pulls the trigger of his pistol.\n      *goto officer_pistol_attack\n\n*label event_8\n*set event_8_used true\nAs you run, you spot a small computer terminal embedded in the side of a large rock. Curious, you stop to examine it. The terminal appears to be a medical station, and there's a hole in the side. Engraved instructions indicate that one should insert an arm into the hole.  However, the terminal requires a password to unlock it.\n*label event_8_choice\n*choice\n  *selectable_if (hrds > 0) #Hack into the computer terminal with a hacking resonator device.\n    *set hrds -1\n    You pull out a hacking resonator device and activate it, then attach it to the computer terminal.  A second later, the device beeps, unlocking the screen.\n    *set health +25\n    *if health > 100\n      *set health 100\n      *goto terminal_heal\n    *label terminal_heal\n    Once unlocked, the computer instructs you to insert your arm.  When you do, it replenishes a small portion of your health.\n\n    Energized, you set off.\n    *goto event_select\n  *hide_reuse #Try to manually hack into the terminal.\n    *if specialization = \"science\"\n      *set health +10\n      You attempt to unlock the terminal by guessing the password. It doesn't work, but you try a series of various actions and commands. Thanks to your scientific skills, you finally find a loophole in the software.\n      *set health +25\n      *if health > 100\n        *set health 100\n        *goto terminal_heal\n      *else\n        *goto terminal_heal\n    *else\n      You attempt to unlock the terminal by guessing the password. Unfortunately, you lack the skill with computers you need to crack the code.\n      *goto event_8_choice\n  *hide_reuse #Place your arm into the hole without accessing the terminal first.\n    *set cowardice_bravery %+10\n    You place your arm into the hole, but nothing happens. You sigh. Clearly you can't use the device without unlocking it.\n    *goto event_8_choice\n  #Destroy the terminal so no one else can use it.\n    *set harsh_kind %-20\n    If you can't use the device, you decide, no one else can, either. You pick up a rock and smash the terminal repeatedly until the screen shatters in an array of sparks. Pleased that the healing device won't be helping your enemies, you move on.\n    *goto event_select\n  #Ignore the terminal.\n    *set cowardice_bravery %-10\n    You ignore the terminal and keep on running.\n    *goto event_select\n\n\n\n*label event_9\n*set event_9_used true\nYou reach a small clearing and discover a fragile wooden shack. The sounds of fighting in the distance make you want to hide, and what better place than this shack? But when you try the front door, it's locked.\n*label shack_choice\n*choice\n  *hide_reuse #Knock on the shack's door.\n    You knock on the door, but no one answers. There's no movement inside, either.\n    *goto shack_choice\n  *hide_reuse #Search the shack's exterior.\n    You carefully examine the shack's outer walls.  Instead of a window, you spot a small hole in one wall. You peek inside. The place is empty except for a small table. There's something on the table, but you're too far away to see what, exactly.\n    *goto shack_choice\n  *selectable_if (lockpicks > 0) #Break into the shack with a sonic lockpick.\n    *set lockpicks -1\n    *set health +25\n    *if health > 100\n      You pull out a sonic lockpick and use it to break into the small shack. The one-use device successfully unlocks the shack's door before breaking. You open the door and step inside.\n      *set health 100\n      *goto shack_interior\n    *label shack_interior\n\n    Inside the shack, it's dark and falling apart. Squinting in the gloom, you feel for the table, and your hand closes around a healing kit.\n\n    You hurry back outside with the kit, where you use it to restore some of your health. Feeling better, you continue on your way.\n    *goto event_select\n  #Try to force your way into the shack.\n    *set harsh_kind %+10\n    *if harsh_kind \u003c 35\n      After everything you've been through, you've got no qualms about smashing down the shack's door. It splinters easily, and you push your way inside.\n      *set health +25\n      *if health > 100\n        You pull out a sonic lockpick and use it to break into the small shack. The one-use device successfully unlocks the shack's door before breaking. You open the door and step inside.\n        *set health 100\n        *goto shack_interior\n      *else\n        *goto shack_interior\n    *else\n      You decide to smash down the shack's door. Unfortunately, you can't even muster the strength for one good kick. Whatever's inside will just have to stay there. Disappointed, you turn and continue on your way.\n      *goto event_select\n  #Ignore the shack.\n    *set cowardice_bravery %-10\n    You don't have time to waste on some stupid shack. Ignoring it, you jog on by.\n    *goto event_select\n\n\n*label event_10\n*set event_10_used true\nYou ease forward and see Thisi facing off against a group of Garce's men. A sniff of the air and a glance at the officers tells you everything you need to know: Thisi's hypnotized the officers with ${thisi_his} pheromones. The Nyarri glances up and spots you.\n\n*if chosen_side = \"Garce\"\n  \"Traitor!\" Thisi shouts.\n  *goto event_10_choice\n*else\n  \"${name}, help me!\" Thisi shouts.\n  *goto event_10_choice\n*label event_10_choice\n*choice\n  *hide_reuse #Ask Thisi what ${thisi_he}'s doing here.\n    \"What does it look like?\" Thisi snaps, straining to hold the officers at bay.\n    *goto event_10_choice\n  *hide_reuse #Ask Thisi where Isan and Garce went.\n    *if chosen_side = \"Garce\"\n      \"Why would I tell you?\" cries Thisi.  \"You betrayed us, just like Kraska!\"\n      *goto event_10_choice\n    *else\n      \"I don't know!\" cries Thisi, straining to hold the officers at bay.  \"Please, ${name}, help me!\"\n      *goto event_10_choice\n  *if (chosen_side = \"Garce\") #Attack Thisi head on.\n    *set cowardice_bravery %+20\n    *set duplicity_loyalty %-20\n    *set follower_leader %+20\n    *set thisi_taloo %+20\n    You charge toward Thisi, determined to take ${thisi_him} down. But the instant you come within half a meter of ${Thisi_him}, your body freezes. Thisi's scent is electrifying, and you can't resist it no matter what you do. The Nyarri's voice invades your brain, implanting a command: \"Stay.\"\n    \n    You blink, and Thisi's gone. So are the officers. You shake your head, trying desperately to clear it. For the first time, you realize just how powerful ${thisi_his} pheromones really are.\n\n    All you know is, you never want ${thisi_him} to use them on you again. You run forward.\n    *goto event_select\n  *if (chosen_side = \"Garce\") #Tell the officers to request backup.\n    *set cowardice_bravery %+20\n    *set duplicity_loyalty %-20\n    *set follower_leader %+20\n    *set thisi_taloo %+40\n    You know firsthand just how powerful Thisi's pheromones can be. Shuddering, you run and find another group of officers. You scream at them to call for reinforcements.  Some laugh and mutter skeptically, but one follows your advice, doubling the number of officers surrounding the Nyarri.  You join them and watch as Thisi breaks out into a sweat, ${thisi_his} face straining. You smile: Thisi can't release ${thisi_his} pheromones on so many officers at once.\n\n    Seconds later, the officers overtake Thisi and ${thisi_he} collapses, screaming in protest as they take ${thisi_him} into custody. Your job's done here, so you continue on your way.\n    *goto event_select\n  *if (chosen_side = \"Garce\") #Stand with the officers and help them stop Thisi.\n    *set cowardice_bravery %+10\n    *set duplicity_loyalty %-10\n    *set follower_leader %-20\n    *set thisi_taloo %+20\n    Thisi's seductive scent is electrifying, and you can't resist it no matter what you do. The Nyarri's voice invades your brain, implanting a command: \"Stay.\"\n    \n    You blink, and Thisi's gone. So are the officers. You shake your head, trying desperately to clear it. For the first time, you realize just how powerful ${thisi_his} pheromones really are.\n\n    All you know is, you never want ${thisi_him} to use them on you again. You run forward.\n    *goto event_select\n  *if (chosen_side = \"Garce\") #Try to convince Thisi to stand down.\n    *set cowardice_bravery %-20\n    *set duplicity_loyalty %-20\n    *set thisi_taloo %+40\n    As the officers remain frozen, held in thrall by Thisi's pheromones, you explain your reasoning for switching sides to ${thisi_him}. Surely, you say, ${thisi_he} can see you're not the enemy?\n\n    You wink, catching Thisi off guard, and for a second, the flow of pheromones breaks off. That tiny window is enough for the officers to overtake ${Thisi_him}. Thisi screams in protest as they take ${Thisi_him} into custody, kicking and flailing. Your job's done here, so you continue on your way.\n    *goto event_select\n  *if (chosen_side = \"Isan\") #Stand with Thisi and help ${Thisi_him} fight off the officers.\n    *set cowardice_bravery %+20\n    *set duplicity_loyalty %+20\n    *set thisi_taloo %-20\n    *set follower_leader %-10\n    Thisi's pheromones might be powerful, but ${Thisi_he} can't hold out forever. You rush to ${Thisi_his} side and help the Nyarri fend off ${Thisi_his} attackers. While ${Thisi_he} holds them at bay with ${Thisi_his} electrifying scent, you knock them out one by one. Unfortunately, the second you come within half a meter of Thisi, your body freezes. You can't resist ${Thisi_his} pheromones no matter what you do. The Nyarri's voice invades your brain, implanting a command: \"Stay.\"\n    \n    You blink, and Thisi's gone. So are the officers. You shake your head, trying desperately to clear it. For the first time, you realize just how powerful ${Thisi_his} pheromones really are.\n\n    All you know is, you never want ${Thisi_him} to use them on you again. You run forward.\n    *goto event_select\n  *if (chosen_side = \"Isan\") #Outflank the officers and attack them from behind.\n    *set cowardice_bravery %+20\n    *set duplicity_loyalty %+20\n    *set follower_leader %+10\n    *set thisi_taloo %-40\n    Thisi's pheromones might be powerful, but ${Thisi_he} can't hold out forever. You give a tiny nod and pretend to flee. While the Nyarri holds the officers in thrall with ${Thisi_his} scent, you sneak up from behind and knock them out one by one. Once all the officers lie unconscious before you, Thisi mutters a quick thanks before dashing off.  You take off in the other direction.\n    *goto event_select\n  *if (chosen_side = \"Isan\") #Try to convince the officers to surrender.\n    *set cowardice_bravery %-20\n    *set duplicity_loyalty %+10\n    *set thisi_taloo %-20\n    Thisi's pheromones might be powerful, but ${Thisi_he} can't hold out forever. Stepping in front of ${Thisi_him}, you attempt to convince the officers to surrender. Unfortunately, you just can't get through to them. Frustrated, you step too close to Thisi, and your words cut off midstream. Your body freezes, and you can't resist ${Thisi_his} pheromones no matter what you do. The Nyarri's voice invades your brain, implanting a command: \"Stay.\"\n    \n    You blink, and Thisi's gone. So are the officers. You shake your head, trying desperately to clear it.  For the first time, you realize just how powerful ${Thisi_his} pheromones really are.\n\n    All you know is, you never want ${Thisi_him} to use them on you again. You run forward.\n    *goto event_select\n  *if (chosen_side = \"Isan\") #Help Thisi to make a hasty retreat.\n    *set cowardice_bravery %-30\n    *set duplicity_loyalty %+10\n    *set thisi_taloo %-30\n    Thisi's pheromones might be powerful, but ${Thisi_he} can't hold out forever. You nod in a show of support and gesture behind you. As Thisi holds the officers at bay, the two of you back away.  Once you've put enough distance between the officers and you, you say, \"Now.\" The two of you run as fast as you can before the officers break out of their pheromone-induced trance. Once you catch your breath, Thisi mutters a quick thanks before dashing off.  You take off in the other direction.\n    *goto event_select\n\n\n\n*label event_11\n*set event_11_used true\nAs you run by a thick set of bushes, you spot someone hiding in them: Taloo, her appearance cycling wildly through several different forms. Her eyes are wide with panic. You halt and stare. She looks up and\n*if chosen_side = \"Garce\"\n  gasps in fear.\n  *goto event_11_choice\n*else\n  *if thisi_taloo > 65\n    smiles warmly, instantly calmed by your presence.\n    *goto event_11_choice\n  *elseif thisi_taloo \u003c 35\n    freezes. Her form continues to flicker.\n    *goto event_11_choice\n  *else\n    sighs with relief, though her form continues to flicker.\n    *goto event_11_choice\n*label event_11_choice\n*choice\n  *selectable_if (thisi_taloo > 65) #Attempt to comfort Taloo and assure her she'll be safe.\n    *set cowardice_bravery %+10\n    *set harsh_kind %+20\n    *set thisi_taloo %+20\n    You explain to Taloo that Garce's officers are looking to arrest Isan, not her.\n    *if harsh_kind \u003c 35\n      Unfortunately, you've been mean enough to Taloo in the past that your words don't ring true. Taloo slowly disappears into the bushes, and you realize you just made the situation worse. Discouraged, you move on.\n      *goto event_select\n    *else\n      Taloo relaxes, mirroring your appearance and holding it. You smile, glad you're leaving her in a better state than you found her, and move on.\n      *goto event_select\n  *selectable_if (thisi_taloo \u003c 35) #Laugh at Taloo's fear and cowardice.\n    *set cowardice_bravery %-10\n    *set harsh_kind %-20\n    *set thisi_taloo %-20\n    The sight of Taloo hidden in the bushes is so pathetic that it makes you laugh.\n    *if harsh_kind > 65\n      When push comes to shove, however, you can't bring yourself to kick someone so sad when she's down. Your laugh turns into a lighthearted chuckle. Misinterpreting it as a kind gesture, Taloo smiles, and her appearance mirrors yours. Shrugging, you move on.\n      *goto event_select\n    *else\n      You snicker and chastise Taloo for being so cowardly.\n\n      She bursts into tears as you storm off. It feels good to know you kicked her when she was down.\n      *goto event_select\n  *selectable_if (chosen_side = \"Isan\") #Suggest that Taloo find better cover elsewhere. (ISAN)\n    *set harsh_kind %+10\n    *set thisi_taloo %+10\n    *set duplicity_loyalty %+20\n    *if thisi_taloo > 65\n      In a kind tone, you suggest Taloo find a better hiding spot if she's avoiding the battle. She eagerly nods and scampers off. Relieved your friend will be safe, you continue on your way.\n      *goto event_select\n    *elseif thisi_taloo \u003c 35\n      In a harsh tone, you order Taloo to find a better hiding spot, since she clearly isn't going to take part in the battle.  She bursts into tears but scurries off like an abused animal. Rolling your eyes at her pathetic nature, you continue on your way.\n      *goto event_select\n    *else\n      In a neutral tone, you suggest to Taloo that she find a better hiding spot if she's avoiding the battle. She slowly nods, still wide eyed, and scurries off. She'll be safe now, you think, and continue on your way.\n      *goto event_select\n  *selectable_if (chosen_side = \"Garce\") #Apprehend Taloo. (GARCE)\n    *set harsh_kind %-10\n    *set thisi_taloo %-20\n    *set duplicity_loyalty %-20\n    Any chance to apprehend one of Isan's crew, you think. You march toward the hidden A'Morpha, already envisioning the praise you'll receive from Garce for catching her. Taloo looks you squarely in the eyes. She must sense your actions, because she darts off.\n    *if follower_leader > 65\n      You don't hesitate, leaping forward and grabbing Taloo midstep. Collapsing on the ground, she goes limp, her eyes filled with tears. You let her cry as you drag her to a large tree and bind her to the trunk. Satisfied that she's not going anywhere, you bid Taloo a sarcastic farewell and continue on your way.\n      *goto event_select\n    *else\n      You stare after her. You never would've guessed she had it in her to run. Your shock gives Taloo the time she needs to evade you, and within seconds, she's hidden somewhere in the jungle. Cursing your poor reflexes, you continue on your way.\n      *goto event_select\n  #Pretend not to notice Taloo and move on.\n    *set cowardice_bravery %-10\n    *set harsh_kind %-20\n    *if chosen_side = \"Garce\"\n      Not wanting to scare Taloo, you pretend you didn't see her and keep going. Hopefully none of the detective's officers will spot her.\n      *goto event_select\n    *else\n      Not wanting to embarrass or frighten Taloo, you pretend you didn't see her and keep going, hoping she'll be okay.\n      *goto event_select\n\n\n\n*label event_12\n*set event_12_used true\nYou reach a large crowd of Garce's officers. They form a ring around Rallix, who's screaming at the tops of its lungs. \"Come on, you puny humans!\" it shouts amid bursts of wild laughter. \"Show me what you've got!\" Rallix spins in circles, waving its pincers menacingly at the officers.\n*label event_12_choice\n*choice\n  *if (chosen_side = \"Garce\") #Join the officers in fighting Rallix.\n    *set cowardice_bravery %+20\n    *set duplicity_loyalty %-20\n    *set follower_leader %-20\n    *set rallix_shelou %+20\n    You join the circle of officers. Though Rallix fights bravely, the group of you slowly overtake it. The Nixian security chief may be strong, but it's no match against your combined might. With your help, the officers tackle and handcuff it.\n\n    As it struggles to get away, Rallix shouts at you. \"Traitor!  You will die for this.  The Great Queen will see to it!\"\n\n    Your job complete, you run forward, unconcerned.\n    *goto event_select\n  *if (chosen_side = \"Garce\") #Attempt to distract Rallix from the officers.\n    *set follower_leader %+10\n    *set duplicity_loyalty %-20\n    *set rallix_shelou %+20\n    You realizing the officers might need some help with Rallix, so you climb a small hill and call Rallix's name.  Despite itself, Rallix turns to you. \"What?\" it shouts.\n    \n    With Rallix looking elsewhere, the officers move in and overtake it. They waste no time tackling and handcuffing the Nixian.\n\n    As it struggles to get away, Rallix shouts at you. \"Traitor!  You will die for this.  The Great Queen will see to it!\"\n\n    Your job complete, you run forward, unconcerned.\n    *goto event_select\n  *if (chosen_side = \"Garce\") #Try to talk Rallix into standing down.\n    *set cowardice_bravery %-20\n    *set duplicity_loyalty %+10\n    *set rallix_shelou %-10\n    You shout until you get Rallix's attention. Then you try to reason with the Nixian, pointing out that not even a soldier of the Great Queen can win a fight against so many officers. Rallix refuses to listen, however, and continues to fight. Before long, Rallix becomes overwhelmed, and the officers tackle and secure it with handcuffs.\n\n    As it struggles to get away, Rallix shouts at you. \"Traitor!  You will die for this.  The Great Queen will see to it!\"\n\n    Your job complete, you run forward, unconcerned.\n    *goto event_select\n  *if (chosen_side = \"Garce\") #Attack Rallix from above.\n    *set cowardice_bravery %+20\n    *set duplicity_loyalty %-20\n    *set follower_leader %+20\n    *set rallix_shelou %+20\n    You know attacking the Nixian directly would be suicidal, so you look around for an alternative. You spot a hill. Perfect! You climb the hill and tower over Rallix. As Garce's officers close in, you dive down toward the Nixian…\n\n    *if cowardice_bravery > 65\n      …and land on it, knocking it over. As you keep Rallix pinned down, Garce's officers move in, quickly securing it with handcuffs.\n\n      As it struggles to get away, Rallix shouts at you. \"Traitor!  You will die for this.  The Great Queen will see to it!\"\n\n      Your job complete, you run forward, unconcerned.\n      *goto event_select\n    *else\n      …but miss your target. Instead, you crash into the circle of Garce's officers, knocking them down. Rallix seizes the chance to run off and escape. As it disappears into the wilderness, vowing revenge to all hear it, you stand up and apologize to the officers. They glare at you and chase after the Nixian.\n      \n      Feeling foolish, you run forward.\n      *goto event_select\n  *if (chosen_side = \"Isan\") #Stand with Rallix and fight the officers.\n    *set cowardice_bravery %+20\n    *set duplicity_loyalty %+20\n    *set follower_leader %-10\n    *set rallix_shelou %-20\n    You break into the circle of Garce's officers and team up with Rallix. Ignited by your presence and support, the Nixian fights furiously in a way you've never seen before. Soon you find yourselves in a safe position to retreat, and you gesture to Rallix. It grumbles its thanks to you before scampering off. Once you know the security officer will be safe, you run in the other direction, forcing Garce's men to split up. They're so confused, losing them is easy.\n    \n    Feeling good about saving your shipmate, you continue on your way.\n    *goto event_select\n  *if (chosen_side = \"Isan\") #Attempt to secretly pick off the officers one at a time.\n    *set cowardice_bravery %+20\n    *set duplicity_loyalty %+20\n    *set follower_leader %+10\n    *set rallix_shelou %-20\n    Realizing Rallix has the officers' attention, you decide the best maneuver would be to pick them off one by one. As Rallix fights the group, you sneak up to a soldier and knock him out.\n  \n    *if follower_leader \u003c 35\n      You continue to take the officers down one at a time. You're so unassuming, the others don't notice you, and soon there are so officers few left that Rallix finishes them off for you.\n      \n      Once all of the guards are unconscious, Rallix nods. \"Good work,\" it growls. \"It's lucky you were here.  I owe you one, human.\" Without waiting for a response, Rallix scampers off, looking for another fight. Knowing he's safe for the moment, you run in the other direction.\n\n      Feeling good about saving your shipmate, you continue on your way.\n      *goto event_select\n    *else\n      Unfortunately, the nearby officers spot you. They close in, and Rallix notices you for the first time. \"What are you doing, ${name}?!\" it shouts. \"This is my fight!\"\n\n      Rallix's screams draw the officers' attention, and they turn back to it. Rallix glares at you. \"Don't just stand there, human. Run!\"\n      \n      Chastising yourself for your poor judgment, you do what he says. Hopefully Rallix will be all right.\n      *goto event_select\n  *hide_reuse *if (chosen_side = \"Isan\") #Try to distract the guards to give Rallix an advantage.\n    *set duplicity_loyalty %+10\n    *set rallix_shelou %-10\n    It won't be long before the officers overtake Rallix, so you look for a distraction. Climbing a nearby hill, you shout at the officers. Unfortunately, their battle cries drown out your voice.\n    *goto event_12_choice\n  *if (chosen_side = \"Isan\") #Convince Rallix to retreat.\n    *set cowardice_bravery %-20\n    *set duplicity_loyalty %+10\n    *set rallix_shelou %-10\n    You shout until you get Rallix's attention. Then you try to reason with the Nixian, pointing out that not even a soldier of the Great Queen can win a fight against so many officers. The Nixian security chief reluctantly agrees and starts to back away. Soon you find yourselves in a safe position to retreat, and you gesture to Rallix. It grumbles its thanks to you before scampering off. Once you know the security officer will be safe, you run in the other direction, forcing Garce's men to split up. They're so confused, losing them is easy.\n    \n    Feeling good about saving your shipmate, you continue on your way.\n    *goto event_select\n\n\n\n*label event_13\n*set event_13_used true\nAs you run into a small patch of bushes, a shadow looms over you. Your head jerks up, and you spot Shelou Vili flying high above the battlefield, sternly looking down.\n\n*if chosen_side = \"Garce\"\n  \"You have betrayed us, ${name},\" he reproaches you.  \"Were it not against my people's philosophy, I would kill you where you stand.\"\n  *goto event_13_choice\n*else\n  *if rallix_shelou \u003c 35\n    \"I see you are still alive,\" he says bitterly.\n    *goto event_13_choice\n  *elseif rallix_shelou > 65\n    \"It is a relief to see you alive and well, my friend,\" he says with a bow.\n    *goto event_13_choice\n  *else\n    \"It is good to see you alive,\" he says formally.\n    *goto event_13_choice\n*label event_13_choice\n*choice\n  *if (chosen_side = \"Isan\") #Convince Shelou Vili to join the fight.\n    *set duplicity_loyalty %+20\n    *set cowardice_bravery %+20\n    *set rallix_shelou %-10\n    *set follower_leader %+10\n    Knowing Captain Isan and the others could use an extra hand, you try to convince Shelou Vili to join in the fighting, warning him that the crew is already outnumbered as it is.\n\n    The Aviark scoffs at you. \"My people do not believe in nonritualistic combat. It is…beneath us. I shall remain in the sky until the battle's completion.\"\n\n    He flies away before you can respond. Sighing, you move on.\n    *goto event_select\n  *if (chosen_side = \"Isan\") #Tell Shelou Vili that he should fly away while he can.\n    *set duplicity_loyalty %-20\n    *set cowardice_bravery %-20\n    You know this fight is hopeless for Isan and ${isan_his} crew, so you're doing what you can to save as many people as possible. You tell Shelou Vili that everyone's out for themselves now, and he should get away while there's still time.\n\n    The Aviark scoffs. \"My people do not believe in nonritualistic combat. It is…beneath us. That said, I shall not abandon my crewmmates; instead, I shall remain in the sky until the battle's completion.\"\n\n    He flies away before you can respond. Sighing, you move on.\n    *goto event_select\n  *if (chosen_side = \"Isan\") #Praise Shelou Vili for staying out of the fighting.\n    *set duplicity_loyalty %-20\n    *set cowardice_bravery %-20\n    *set rallix_shelou %+20\n    *set harsh_kind %-10\n    He has the right idea, you think. After all, if you had wings, you'd probably be in the air right next to him.  You tell this to Shelou Vili, pointing out how intelligent you find him to be for staying out of the fighting.\n\n    The Aviark smiles. \"My people do not believe in nonritualistic combat. It is…beneath us. I am humbled to see you share this opinion. That said, I suggest you find a place to hide.\"\n\n    With a nod, Shelou Vili flies away, and you move on.\n    *goto event_select\n  *if (chosen_side = \"Garce\") #Call Shelou Vili a coward for not assisting his crewmates.\n    *set duplicity_loyalty %-30\n    *set cowardice_bravery %+20\n    *set rallix_shelou %-20\n    *set harsh_kind %+10\n    What a pathetic sight, you think. You insult Shelou Vili for hiding from the fight instead of helping the rest of the crew, calling him a coward and taunting him about Rallix's bravery in contrast to his own cowardice.\n\n    The Aviark scoffs. \"My people do not believe in nonritualistic combat. It is…beneath us. I shall remain in the sky until the battle's completion.\"\n\n    He flies away before you can respond. You laugh scornfully, confident Garce's officers will catch him, and move on.\n    *goto event_select\n  *if (chosen_side = \"Garce\") #Try to attack Shelou Vili from the ground.\n    *set duplicity_loyalty %-30\n    *set cowardice_bravery %+20\n    *set harsh_kind %-20\n    *set rallix_shelou %-20\n    Shelou Vili thinks he can stay out of the fighting? Well, he should think again. You pick up a heavy rock and hurl it at the Aviark researcher.\n    *if harsh_kind \u003c 35\n      *set duplicity_loyalty %-10\n      The rock strikes him in the temple, and Shelou Vili falls to the ground, unconscious. You run over to his body and confirm that he's still alive. Good, you think, imagining the praise you'll receive from Garce. With a smile, you move on.\n      *goto event_select\n    *else\n      The rock, however, misses its target. \"You will have to do better than that, ${name},\" Shelou Vili scoffs. \"You are lucky that my people do not believe in nonritualistic combat. But try something like that again, and I may have no choice but to defend myself.\"\n      \n    He flies away before you can respond. You laugh at the Aviark's pathetic threat, confident that Garce's officers will catch him, and move on.\n    *goto event_select\n  *if (chosen_side = \"Garce\") #Attempt to convince Shelou Vili to join you.\n    *set duplicity_loyalty %-20\n    *set harsh_kind %+10\n    *set follower_leader %+10\n    Shelou Vili's a reasonable creature, you say, appealing to his sense of logic. You point out that Captain Isan broke the law. Doesn't that deserve punishment? You invite Shelou Vili to help you help Detective Garce arrest the captain in exchange for pardoning the Aviark of any part in the captain's crimes.\n\n    \"There is a difference between a legal crime and a moral one, ${name},\" the Aviark scoffs. \"And in terms of morality, Captain Isan is one of the most enlightened people I know.\"\n    \n    He flies away before you can respond. You laugh at the Aviark's pathetic justifications, confident that Garce's officers will catch him, and move on.\n    *goto event_select\n  *selectable_if (rallix_shelou > 65) #Point out the absurdity of this entire fight to Shelou Vili. (SHELOU)\n    *set duplicity_loyalty %-20\n    *set rallix_shelou %+30\n    *set harsh_kind %+10\n    This entire conflict is pointless and absurd, and you tell Shelou Vili so. It all comes down to a petty grudge between Detective Garce and Captain Isan. Why should the rest of you suffer because of it?  The only logical thing to do, then, is avoid joining in.\n\n    \"I could not agree more, ${name},\" the Aviark says. \"My people do not believe in nonritualistic combat.  It is…beneath us. I shall remain in the sky until the battle's completion. Given that you are unable to follow my lead, I suggest you find a place to hide.\"\n\n    With a respectful nod, Shelou Vili flies away, and you move on.\n    *goto event_select\n\n\n*label event_14\n*set event_14_used true\n*if borion_died = true\n  You arrive in a small, eerily silent clearing. A light wind raises goose bumps over your skin. For some reason, you think of Borion and feel a surge of sadness over his passing.\n\n  After a moment of silence, you shake your head clear of the past and move on.\n  *goto event_select\n*else\n  Exhausted, you arrive in a small clearing and plop down on a rock. Suddenly a familiar face appears, startling you. It's Borion, running toward you!\n  *if chosen_side = \"Garce\"\n    \"${name},\" he says sadly, \"w-why did you betray us?\"\n    *choice\n      #\"Because Captain Isan must pay for ${isan_his} crimes.\"\n        *set cowardice_bravery %+10\n        \"Isan hasn't d-done anything that bad,\" counters Borion timidly. \"The c-captain's really nice, once you g-get to know ${isan_him} better. You sh-should have stood by ${isan_him}, ${name}. I'm d-disappointed in you.\"\n\n        With those parting words, Borion dashes away. You brush off the sting of his words and start running again.\n        *goto event_select\n      #\"Because Detective Garce offered me a lot of money.\"\n        *set cowardice_bravery %-10\n        \"So you chose m-money over family?\" asks Borion sadly. \"That's how the c-crew saw you, ${name}. You may not have always r-realized it, but we c-considered you one of us. You shouldn't have b-betrayed the captain, ${name}. I'm d-disappointed in you.\"\n\n        With those parting words, Borion dashes away. You brush off the sting of his words and start running again.\n        *goto event_select\n      #\"Because I felt like it, slave!\"\n        *set harsh_kind %-10\n        *set cowardice_bravery %+10\n        Borion lowers his head sadly. \"I l-liked you, ${name},\" he says softly. \"We all t-tried to be so kind to you, and this is h-how you've repaid us? What d-did we ever do to hurt you? You were one of us. You shouldn't have b-betrayed the captain, ${name}. I'm d-disappointed in you.\"\n\n        With those parting words, Borion dashes away. You brush off the sting of his words and start running again.\n        *goto event_select\n      #\"I haven't switched sides; I'm undercover!\" (Lie.)\n        *set harsh_kind %-10\n        *set duplicity_loyalty %-10\n        *set cowardice_bravery %-10\n        Borion's eyes widen in excitement. \"Oh!\" he exclaims, eagerly accepting your lie. \"C-Captain Isan sure is one s-smart Procon! I'm s-sure this is all part of some elaborate p-plan to trap D-Detective Garce and ${garce_his} officers, right?\"\n\n        You nod, and Borion shakes his head in wonder. \"One s-smart Procon,\" he repeats to himself.\n\n        With those parting words, Borion dashes away. Rolling your eyes, you jump up and start running again.\n        *goto event_select\n  *else\n    \"Isn't this exciting?!\" he asks.\n    *choice\n      #\"Exciting? This?\"\n        *set cowardice_bravery %-10\n        *set kraska_borion %+20\n        \"I g-guess it's kind of nerve-wracking, t-too,\" notes Borion with hesitant laughter. \"But I'd rather f-focus on the good than the bad.  And w-what better way to u-unify the crew than a giant b-battle against an evil threat a-and impossible odds? We'll be okay. Anyway, b-be careful, ${name}. Stay safe!\"\n\n        With those parting words, Borion dashes off. Shaking your head at his odd rambling, you jump up and start running again.\n        *goto event_select\n      #\"Yes, it's extremely exciting!\"\n        *set cowardice_bravery %+10\n        *set kraska_borion %+20\n        \"I c-couldn't agree more!\" Borion says, beaming. \"I know the c-crew is in trouble, but I-I'm not much of a fighter. So I'm just r-running and avoiding anyone I s-spot. And hey, don't let the f-fighting get you down.  We'll be okay. After all, w-what better way to u-unify the crew than a giant b-battle against an evil threat a-and impossible odds? Anyway, good luck!\"\n        \n        With those parting words, Borion dashes off. Shaking your head at his odd rambling, you jump up and start running again.\n        *goto event_select\n      #\"Shouldn't you be under Rallix's supervision?\"\n        *set duplicity_loyalty %+10\n        *set kraska_borion %+20\n        \"Rallix's off fighting a bunch of officers,\" replies Borion. \"I-I'm not much of a fighter. So I'm just r-running and avoiding anyone I s-spot. And hey, don't let the f-fighting get you down.  We'll be okay. After all, w-what better way to u-unify the crew than a giant b-battle against an evil threat a-and impossible odds? Anyway, good luck!\"\n\n        With those parting words, Borion dashes off. Shaking your head at his odd rambling, you jump up and start running again.\n        *goto event_select\n      #\"Just whose side are you on, by the way?\"\n        *set kraska_borion %+20\n        *set harsh_kind %-10\n        \"The c-crew's side, of course, just l-like you!\" exclaims Borion. \"I may be a s-slave, but I'm still a part of the t-team. Like you. G-good job standing with C-Captain Isan! I'm sure ${isan_he} appreciates your s-support! And hey, don't let the f-fighting get you down. We'll be okay. After all, w-what better way to u-unify the crew than a giant b-battle against an evil threat a-and impossible odds? Anyway, good luck!\"\n        \n        With those parting words, Borion dashes off. Shaking your head at his odd rambling, you jump up and start running again.\n        *goto event_select", "chapter_7c_outro": "Finally you reach a clearing and stop in your tracks. Ennin Garce and Isan Cehnta each hold a pistol to the other's head.\n\n\"Stay out of this, ${name},\" warns Isan. \"This has nothing to do with you.\"\n\n\"Help me arrest this criminal, ${name},\" counters Garce. \"You know the crimes ${isan_he}'s committed. Isan Cehnta has broken intergalactic law time and again.\"\n\n\"This has nothing to do with the law!\" spouts Isan. \"${name}, this is a personal grudge for Garce. Remember Thela in the [i]Lady Luck[/i]'s engine room?\n*if thela_gender = \"woman\"\n  She's Garce's sister, ${name}. Garce blames me for what happened to her and wants revenge!\"\n  *goto argument_continued\n*else\n  He's Garce's brother, ${name}. Garce blames me for what happened to him and wants revenge!\"\n  *goto argument_continued\n*label argument_continued\n\n\"Thela loved you!\" shouts Garce. \"And you hooked ${thela_him} up to that—that machine. Now ${thela_he}'s an abomination. And I won't stand for it!\"\n\n\"I'm trying to save ${thela_him},\" whispers Isan.\n\n\"Then let ${thela_him} die peacefully.\"\n\n\"Not a chance. Not when I could find a cure.\"\n\n\"Don't you get it?\" yells Garce. \"There is no cure!\"\n\n*if crew_weapons_active = false\n  \"Your pistol won't work,\" notes Garce.\n\n  *if officer_weapons_active = false\n    \"Neither will yours.\"\n\n    Garce doesn't budge.\n\n    *goto the_choice\n  *else\n    Isan stares back intensely.\n    *goto the_choice\n*else\n  *if officer_weapons_active = false\n    \"Don't think a broken pistol will stop me from killing you,\" growls Garce.\n    \n    *goto the_choice\n  *else\n\n    *goto the_choice\n\n*label the_choice\n\"If you're going to blame me for my actions,\" says Isan, \"then fine. Blame me.  But leave my crew out of it.  Spare them, and I'll surrender to you.\"\n\nYou spot a laser pistol on the ground, still charged. You could easily pick it up and use it before either Isan or Garce had a chance to react.\n*choice\n  *selectable_if (garce_isan > 10) #Kill Detective Garce.\n    *set duplicity_loyalty %+40\n    *set garce_isan %+40\n    *set cowardice_bravery %+20\n    *set follower_leader %+20\n    *set harsh_kind %-20\n    You quickly dive for the laser pistol, take aim,\n    *if ((crew_weapons_active = false) and (officer_weapons_active = false))\n      and pull the trigger…only to find the weapon doesn't work.\n\n      *goto isan_sacrifice\n    *else\n      *set killed_garce true\n      and shoot Detective Garce square in the chest, sealing your loyalty to Captain Isan and ${isan_his} crew. The detective stares at you, shock on ${garce_his} face, and falls to the ground.\n\n      Captain Isan takes several tense breaths before lowering ${isan_his} own weapon. $!{isan_he} kneels by Garce and checks for a pulse, then shakes ${isan_his} head. \"I didn't want it to end like that. I really didn't.\"\n\n      You don't say anything. You did what you had to do.\n\n      Finally Isan stands and brushes off ${isan_his} pants. \"Let's go home, ${name}.\" You nod, and Isan puts ${isan_his} arm around your shoulder. The two of you walk back to the [i]Lady Luck[/i] in silence.\n      *finish\n  *selectable_if (garce_isan \u003c 90) #Kill Captain Isan Cehnta.\n    *set duplicity_loyalty %-40\n    *set garce_isan %-40\n    *set suspicion +20\n    *set cowardice_bravery %+20\n    *set follower_leader %+20\n    *set harsh_kind %-20\n    You quickly dive for the laser pistol, take aim,\n    *if ((crew_weapons_active = false) and (officer_weapons_active = false))\n      and pull the trigger…only to find the weapon doesn't work.\n      *goto isan_sacrifice\n    *else\n      *set killed_isan true\n      and shoot Captain Isan square in the chest, sealing your loyalty to the Detective Garce and the Galactic Police Force. The captain stares at you, shock on ${isan_his} face, and falls to the ground.\n\n      Detective Garce takes several tense breaths before lowering ${isan_his} own weapon. ${isan_he} kneels by Isan and checks for a pulse, then shakes ${isan_his} head. \"I didn't want it to end like that. I really didn't.\"\n\n      You don't say anything. You did what you had to do.\n\n      Detective Garce stands and brushes off ${garce_his} pants. \"Good work, ${name}. It may not be what I wanted, but you did the right thing.\"\n\n      You nod, and Garce puts ${garce_his} arm around your shoulder. The two of you walk back to ${garce_his} ship in silence.\n      *finish\n  #Allow Detective Garce to arrest Captain Isan.\n    *set follower_leader %-20\n    *set harsh_kind %+20\n    \"That sounds like a fair plan to me,\" you interject. Both Isan and Garce turn to stare at you.\n    \n    Finally Garce speaks. \"So be it.\" Never lowering ${garce_his} weapon, ${garce_he} turns to Isan. \"Captain Isan, surrender peacefully and call off your crew, and I'll guarantee their safety. They'll be free to go in exchange for your arrest. Do you accept these terms?\"\n\n    Captain Isan doesn't take ${isan_his} furious eyes from you as ${isan_he} says, \"Yes.\"\n\n    Detective Garce formally arrests Captain Isan, who orders ${isan_his} crew to stand down. The fighting immediately ceases, and Isan is taken on board Garce's ship.\n\n    *if garce_isan \u003c 35\n      *set isan_arrested true\n      Garce honors ${garce_his} word and departs with only Captain Isan in ${garce_his} custody. The rest of Isan's crew, yourself included, are permitted to leave on board the [i]Lady Luck[/i].\n      *finish\n    *else\n      *set isan_crew_arrested true\n      Unfortunately, Garce doesn't honor ${garce_his} word. The detective immediately takes Isan's remaining crew into custody. When you protest, you're forcibly brought onto Garce's vessel, too.\n      *finish\n  *selectable_if ((duplicity_loyalty > 20) and (duplicity_loyalty \u003c 80)) #Stay out of it entirely. (NEUTRAL)\n    *set follower_leader %-20\n    *set cowardice_bravery %-20\n    The smartest thing you can do is to stay out of this confrontation. Let Isan and Garce work it out on their own.  Keeping your distance, you wait for one of them to act.\n\n    *label isan_sacrifice\n    *set isan_sacrifice true\n    Captain Isan closes ${isan_his} eyes and lowers ${isan_his} pistol. Just as you think ${isan_he}'s about to surrender, a large surge of static bursts from the captain's chest, knocking both Isan and Garce out cold. This must be the fabled Procon \"magic\" Isan mentioned!\n\n    Your throat tightens in fear as you remember the blast is usually fatal. Running over to the two prone figures, you're horrified to find that neither has a pulse.\n    \n    Both Captain Isan and Detective Garce are dead.\n\n    On autopilot, you sprint onto the battlefield and round up the rest of the [i]Lady Luck[/i]'s crew. Though they're as upset as you, the crew understands the sacrifice Isan made and don't want it to be for nothing. All of you rush back to the ship and lift off before Garce's officers discover what happened.\n    *finish", "chapter_8": "*advertisement 1200\nCHAPTER 8 - A NEW ADVENTURE BEGINS\n\n*if killed_isan = true\n  *goto ending_gpf\n*elseif isan_crew_arrested = true\n  *goto ending_gpf\n*else\n  *goto ending_lady_luck\n\n\n\n\n\n*comment ----------GPF ENDING----------\n\n*label ending_gpf\n*temp prisoners_spoken_to\n*set prisoners_spoken_to 0\nThe next morning, Detective Garce and you stand on the bridge of Garce's spaceship, the [i]GPF Justice[/i], watching the stars through the bridge's large central window. The room's dark and quiet, lit only by the cold blue glow of the ship's computers. It suits your mood; though you got what you wanted, you feel anything but victorious.\n\n*if killed_isan = true\n  \"You did good work, ${name},\" says Garce. \"You made the human race proud. Now Isan Cehnta is dead, the crew of the [i]Lady Luck[/i] is in custody, and Thela finally has justice.\"\n  *goto ending_gpf_continued\n*else\n  \"You did good work, ${name},\" says Garce. \"You made the human race proud. Now Isan Cehnta and ${isan_his} crew are in custody, and Thela finally has justice.\"\n  *goto ending_gpf_continued\n*label ending_gpf_continued\n\nGarce leads you to ${garce_his} office, located off the bridge. Ironic, you think, how this ship's layout resembles the [i]Lady Luck[/i]'s. Maybe it's fate's way of reminding you how you betrayed the crew.\n\nYou enter Garce's office and sit down. \"Now then,\" ${garce_he} begins, \"do you have any questions?\"\n*label ending_gpf_questions\n*choice\n  *hide_reuse *if (isan_crew_arrested = true) #\"What'll happen to Captain Isan?\"\n    Garce smirks.  \"Isan Cehnta will be tried for ${isan_his} crimes, including all the thefts ${isan_he} carried out, and found guilty.\"  Garce's smile disappears.  \"And if I have my way, ${isan_he}'ll also be held accountable for Thela's imprisonment.\"\n    *goto ending_gpf_questions\n  *hide_reuse #\"What 'll happen to the crew of the [i]Lady Luck[/i]?\"\n    \"They'll go to prison,\" says Garce flatly, folding ${garce_his} hands on the desk. \"They're criminals, each and every one.\n    *if borion_died = false\n      Except for the Vervoo slave, of course. He'll be returned to his people, all charges dropped. I'm not without a heart, ${name}. Borion wasn't responsible for Isan's actions, and he won't suffer for them.\"\n      *goto ending_gpf_questions\n    *else\n      And they'll pay for what they've done.\"\n      *goto ending_gpf_questions\n  *hide_reuse #\"What'll happen to the [i]Lady Luck[/i]?\"\n    Garce chuckles. \"The ship will be impounded. A towing vessel's already on its way to Essch to haul the ship back to Earth. It'll likely be disassembled and sold as scrap metal.\"\n    *goto ending_gpf_questions\n  *hide_reuse #\"Can I visit the crew in the brig?\"\n    \"Do you really think that's a good idea after what you did to them?\"\n\n    You don't answer. Grace should mind ${garce_him} own business.\n\n    \"GPF law doesn't normally allow for any civilians to visit or speak with prisoners.\" Garce sighs. \"But then, you did do me a great service back there on Essch. I'll tell you what; after we're done here, I'll take you to them.\"  The detective smirks. \"But don't say I didn't warn you.\"\n    *goto ending_gpf_questions\n  *hide_reuse #\"Tell me about your history with Isan.\"\n    \"Oh, we go back a ways,\" says Garce, sitting back in ${garce_his} chair. \"Before I worked in the GPF, Isan Cehnta and I were business partners, working together as traders—strictly on the up and up, mind you. That's when ${isan_he} first met Thela. Let's just say things didn't go too well from there.\"\n    *goto ending_gpf_questions\n  *hide_reuse #\"Tell me about Thela.\"\n    Garce closes ${garce_his} eyes and bows ${garce_his} head. \"Thela was disconnected from the [i]Lady Luck[/i]'s engines late last night. ${thela_he} passed away peacefully within minutes. I held ${thela_him} in my arms the whole time. ${thela_he}…${thela_he} never opened ${thela_his} eyes.\"\n    \n    A lone tear drips down Garce's worn cheek. \"Isan Cehnta made Thela less than human—the ${thela_gender} I knew died years ago. Now what was left of ${thela_him} can finally rest in peace.\"\n\n    \"But Thela asked to be put in stasis!\" you protest. \"Isan planned to spend the money we earned on Essch to search for a cure to save ${thela_him}!\"\n\n    Garce looks at you with undisguised pity. \"${name}, there's no cure for Thela's condition anywhere in the galaxy. I know because I've been hunting for one, too. Isan refused to listen and let ${thela_him} believe they'd find something. Giving someone false hope is the worst crime of all.\"\n    *goto ending_gpf_questions\n  #\"I don't have any more questions.\"\n    Garce studies you. \"Then I have a question for you, ${name}. Now that you're no longer bound to Captain Isan or ${isan_his} crew, you're free to do as you please. We're en route back to Earth at this very minute and should arrive in a few days. What do you plan to do?\"\n    *choice\n      #\"Live a nice, quiet life on Earth. I've had enough excitement for one lifetime.\"\n        Garce chuckles.  \"I can't say I blame you.  After what you went through these past few weeks, I don't think I'd want to do anything more than live a simple life, either.\"\n        *goto ending_gpf_brig\n      #\"Go back out and explore some more. I've really developed a taste for adventure!\"\n        Garce smiles. \"I'm impressed, ${name}. Not many people in your position would want to go back out there again…not after what you went through. It speaks to your character.\"\n        *goto ending_gpf_brig\n      *if (origin = 2) #\"Use the money you're paying me to settle my debts.\"\n        Garce nods. \"And I'll make sure that you have more than enough money to do it. Consider yourself free of debt, ${name}. I want you to go home and live your life.\"\n        *goto ending_gpf_brig\n      *if (origin = 3) #\"Hope my work for you can help settle my legal troubles back home.\"\n        Garce nods. \"Consider your past erased, ${name}. I will personally see to it that your record is cleared of any wrongdoing and all charges dropped. You're free now, so I want you to go and live your life.\"\n        *goto ending_gpf_brig\n      #\"Actually, I was hoping to join the GPF.\"\n        *if garce_isan \u003c 25\n          Garce smiles. \"You know what, ${name}? I was hoping you'd say that. We could use someone like you within our ranks. Consider me your sponsor for the training academy.\" Garce holds out ${garce_his} hand, and you shake it gratefully. What an exciting new opportunity!\n          *goto ending_gpf_brig\n        *else\n          Garce shakes ${garce_his} head. \"Sorry, ${name}, but you just don't cut it. I've seen you work. So let me tell you straight up: you're not GPF material. We'll drop you back off on Earth, but then we part ways. Go home and live your life.\"\n          *goto ending_gpf_brig\n      *selectable_if (duplicity_loyalty > 65) #\"If the [i]Lady Luck[/i]'s crew is going to jail, I should be, too.\" (LOYALTY)\n        Garce chuckles. \"No can do, I'm afraid, though I do admire your loyalty to your former crew, especially given some of the things you've done. You do realize that they hate you now, right?\" Garce laughs again, amused by your loyalty to Isan even after everything that's happened. \"Regardless, you can't be imprisoned if you haven't committed any crimes.\"\n\n        ${garce_he} holds up a hand when you open your mouth to argue. \"You were kidnapped and forced to participate in Cehnta's missions under duress. So no, you haven't committed any crimes, and I have no choice but to set you free. Deal with it.\"\n        *goto ending_gpf_brig\n\n\n\n*label ending_gpf_brig\n\nGarce abruptly stands and walks around ${garce_his} desk.  \"Now,\" ${garce_he} says, \"against my better judgment, I'd like you to come with me.  You deserve the chance to see your former crewmates one last time.\"\n*page_break\nGarce leads you to the ship's brig. It's much bigger than the [i]Lady Luck[/i]'s. You look around. There are eight holding cells, small but comfortable, each featuring a small bed and privacy screen for the latrine. Most of the cells are occupied by the scowling faces of your former crew. You don't know what to say, so you look away.\n\nA lone GPF officer stands guard in the room. After dismissing her, Garce turns to you. \"Talk away.  I'll be outside when you're done.\"  Garce exits the brig, leaving you alone with the prisoners.\n*if borion_died = true\n  *set prisoners_spoken_to +1\n  *goto prisoners_choice\n*label prisoners_choice\n*choice\n  *hide_reuse *if (borion_died = false) #Speak to Borion Olmo.\n    *set prisoners_spoken_to +1\n    You walk up to Borion, who's lounging on his bed. Unlike the others, he's made himself at home in his cell. \n\n    \"Oh, ${name},\" he says sadly, his pounding heart visible through his chest, \"I thought you were my f-friend. I guess I m-misjudged you.\" His shoulders droop. \"Detective Garce told me I'll b-be free once we reach Earth.  But w-where will I go? My h-home is here with the crew. And b-before you betrayed us, I-I thought it was yours, too.\"\n    *goto prisoners_choice\n  *hide_reuse #Speak to Thisi B'Artunt.\n    *set prisoners_spoken_to +1\n    *if thisi_taloo \u003c 30\n      Thisi barely raises ${Thisi_his} head as you approach ${Thisi_his} cell. Gone is ${Thisi_his} typical effusive flirtation. \"You hurt us, ${name},\" ${Thisi_he} says somberly. \"More importantly, you hurt me. I thought you were special. I…I thought you liked me.\" The Nyarri sniffs. \"Now I wish we'd never rescued you from the [i]Cheyenne[/i]'s crash.\"\n      *goto prisoners_choice\n    *else\n      Thisi glares coldly as you approach ${Thisi_his} cell. \"Get away from me, ${name},\" ${Thisi_he} orders. \"You've betrayed me to the core.\"  The Nyarri whirls around, but not before you glimpse tears in ${Thisi_his} eyes. \"Goddess forgive us all,\" Thisi whispers to ${Thisi_him}self.\n      *goto prisoners_choice\n  *hide_reuse #Speak to Taloo Dama.\n    *set prisoners_spoken_to +1\n    You sidle up to Taloo Dama, who currently resembles Rallix. You think that means she's angry at being imprisoned, maybe angry at you, too.\n    *if thisi_taloo > 70\n      As you get closer, however, you hear a familiar \"pop.\" Taloo transforms into a double of you, staring at you with your own eyes, though hers are filled with tears. You explain why you did what you did, and she starts to cry.  When you finish, she reaches her hand through the bars to grasp yours. After a few silent minutes, she withdraws her hand and slides down to the floor, curling into a ball.\n      *goto prisoners_choice\n    *else\n      As you get closer, Taloo turns her back to you. You explain why you did what you did, but Taloo refuses to face you.  Instead, she stalks to the rear of her cell and vanishes behind the privacy screen.\n      *goto prisoners_choice\n  *hide_reuse #Speak to Rallix.\n    *set prisoners_spoken_to +1\n    When you approach Rallix's cell, the Nixian's pacing back and forth like a caged animal. \"A member of the Hive should not have to tolerate this kind of captivity!\" it shouts to no one.  As it spots you, Rallix\n    *if rallix_shelou \u003c 30\n      narrows its eyes. \"So,\" it growls, \"the traitor makes an appearance. Tell me, did you decide to betray us before or after we set foot on Essch?\" Before waiting for your response, Rallix swipes its pincer at you. \"You're lucky I liked you, human, or else not even these bars would prevent me from ripping out your heart.\"\n      *goto prisoners_choice\n    *else\n      lunges toward you, its razor-sharp pincers striking at you through the cell bars. \"Die, you traitorous worm! No one treats a Nixian this way. By the name of the Great Queen herself, I swear I shall exact revenge upon you, human!\" Your eyes widen. All you need is for Rallix to get out and attack you. You back away as quickly as you can.\n      *goto prisoners_choice\n  *hide_reuse #Speak to Shelou Vili.\n    *set prisoners_spoken_to +1\n    You stand before Shelou Vili's cell. His arms folded forbiddingly across his chest, he stares you straight in the eyes. \"${name},\" he says formally, \"my people do not believe in either pacification or placation, so pardon me for being both direct and blunt:\n    *if rallix_shelou > 70\n      though I am highly disappointed in your betrayal, I can understand your reasons behind it.  It is the philosophy of my people that each of us must hold true to his or her own code. That said, I suggest you remove yourself from my presence immediately, lest I say something we would both regret.\"\n      *goto prisoners_choice\n    *else\n      your betrayal is shallow and shameful. You have given up your colleagues in exchange for assisting the enemy, and that speaks volumes about your character. You are not someone with whom I would speak further, human. Now leave me before I say something we would both regret.\"\n      *goto prisoners_choice\n  *if (isan_crew_arrested = true) #Speak to Captain Isan Cehnta.\n    *if prisoners_spoken_to \u003c 5\n      Isan stares at you silently, ${isan_his} arms folded behind his back. Somehow you know ${isan_he} won't speak to you until you've faced the rest of the crew.\n      *goto prisoners_choice\n    *else\n      Having spoken with everyone else, you now approach Captain Isan. The captain glares at you, ${isan_his} stance rigid. \"How does it feel to sell out the people who saved you from the crash, ${name}?\"\n\n      \"You never gave me a choice,\" you protest, but Isan doesn't listen.\n\n      \"I reached out to you, and you bit that hand. I did everything I could to make you a part of this crew, and this is how you repay us?\" Isan takes a single dangerous step forward. \"Because of you, Thela's dead. That's unforgivable. My love's death will be on your conscience for the rest of your life, and I hope it eats you alive.\"\n      \n      Isan stares at you silently, ${isan_his} eyes piercing yours. Finally, when you can't stand it anymore, you walk away from the captain's cell.\n      \n      *goto leave_bring\n  #Leave the brig.\n    *label leave_bring\n    Ready to close this chapter of your life, you turn your back on the [i]Lady Luck[/i]'s crew and exit the brig. Garce waits for you in the hall.\n\n    The detective cocks ${garce_his} head. \"Ready?\"\n\n    You nod, and Garce leads you back to your quarters, where you spend the rest of the day deep in thought.\n    *goto ending_gpf_end\n\n\n\n*label ending_gpf_end\n*page_break\nSeveral days later, the [i]GPF Justice[/i] arrives on Earth. As you settle back into your life, the last few weeks feel like a dream. You can't decide if you're sorry or happy to leave the crew of the [i]Lady Luck[/i] behind. In the end, you just put one foot in front of the other and begin your journey into the future, into your new life.\n\nTHE END.\n*goto_scene ending\n\n\n\n\n\n*comment ----------LADY LUCK ENDING----------\n\n*label ending_lady_luck\nThe next morning, you stand in the operations center of the [i]Lady Luck[/i], ringed by its crew. You're a hero, having saved the ship from Detective Garce and ${garce_his} band of officers. You watch the stars through the viewport. It's a bittersweet sight; the ship's on its way to Earth, your gift for the bravery you showed back on Essch.\n\n*if isan_arrested = true\n  Everyone's thrilled to be free, but Captain Isan's arrest puts a damper on the mood. Thisi B'Artunt, in temporary command of the ship, steps forward. \"On behalf of all of us, ${name}, I want to thank you for your quick thinking on Essch. We're sad to lose Captain Isan, but ${isan_he} chose to turn ${isan_him}self over to the authorities and save us all. Of course, it couldn't have happened without you.\"\n  *goto ending_lady_luck_continued\n*elseif isan_sacrifice = true\n  Everyone's thrilled to be free, but Captain Isan's arrest puts a damper on the mood. Thisi B'Artunt, in temporary command of the ship, steps forward. \"On behalf of all of us, ${name}, I want to thank you for your quick thinking on Essch. We're sad to lose Captain Isan, but ${isan_he} chose to sacrifice ${isan_him}self and save us all. Of course, it couldn't have happened without you.\"\n  *goto ending_lady_luck_continued\n*else\n  It feels like a party; everyone's cheering and laughing, giddy over the escape and the mission's success. Captain Isan steps forward. \"On behalf of the entire crew, I'd like to thank you, ${name}. Without you, we never would've gotten away from Garce and ${garce_his} officers. Now we can finally be free, and I can hardly believe it myself.  We—I—owe you everything.\"\n  *goto ending_lady_luck_continued\n*label ending_lady_luck_continued\n\nTaloo Dama grabs your attention with a loud \"pop,\" morphing into your double. You grin.\n*if thisi_taloo > 70\n  Taloo smiles and pulls you in for a hug, tears flowing down her—your—face. Hugging yourself is weird but oddly comforting. Finally she lets go and steps back.\n  *goto ending_lady_luck_rallix\n*elseif thisi_taloo > 30\n  Taloo smiles coolly and inclines her head in respect.\n  *goto ending_lady_luck_rallix\n*else\n  Taloo frowns and shakes her head. Obviously she doesn't agree with the rest of the crew.\n  *goto ending_lady_luck_rallix\n*label ending_lady_luck_rallix\n\nNext, Rallix steps forward and\n*if rallix_shelou \u003c 30\n  cackles, thumping you on the back. You wince. \"You did good work on Essch,\" it growls. \"The Great Queen would be proud!\"\n\n  You grin. \"She would, wouldn't she?\"\n  *goto ending_lady_luck_shelou\n*elseif rallix_shelou \u003c 70\n  chuckles, nudging you in the shoulder. \"Good work,\" it growls. \"You may not be as inept as I first thought, human.\"\n\n  You grin. \"I try, I try.\"\n  *goto ending_lady_luck_shelou\n*else\n  growls. \"You're lucky the crew now considers you a hero,\" it says, waving a pincer. \"It may have just saved your life.\"\n\n  Wincing, you force a smile.\n  *goto ending_lady_luck_shelou\n*label ending_lady_luck_shelou\n\nShelou Vili unfurls his wings and moves toward you.\n*if rallix_shelou > 70\n  He pauses, debating something, then sticks out his right hand. \"It has been an honor to serve with you, ${name},\" he says respectfully. You shake his hand, grinning.\n  *goto ending_lady_luck_borion\n*elseif rallix_shelou > 30\n  He pauses, debating something, then nods respectfully. \"I have been suitably impressed by your actions, human,\" he admits. \"Well done.\" You grin.\n  *goto ending_lady_luck_borion\n*else\n  He pauses, glaring, but doesn't say a word. You roll your eyes.\n  *goto ending_lady_luck_borion\n*label ending_lady_luck_borion\n*if borion_died=false\n\n  Borion eagerly runs up to you next. \"B-boy, did you see that b-battle down on E-Essch?\" he says eagerly between rapid breaths. \"That was p-pretty amazing, wasn't it? A-anyway, thanks for s-saving all of us!\" He pulls you in for a quick hug before returning to the circle, his heart visibly pounding in excitement.\n  *goto ending_lady_luck_thisi\n*label ending_lady_luck_thisi\n\n*if thisi_taloo \u003c 30\n  Thisi B'Artunt smiles. \"It's been a pleasure,\" ${Thisi_he} purrs, winking. The scent of ${Thisi_his} pheromones fills the air.\n  *if preference = \"neither\"\n    They still don't have any effect on you, but they're a part of who Thisi is, and that makes them part of what the crew of Lady Luck is.\n    *goto ending_lady_luck_goto_engine\n  *else\n    You catch your breath. As ${Thisi_he} edges past you, ${Thisi_his} body brushes yours. Your eyes fly open.\n  *goto ending_lady_luck_goto_engine\n*elseif thisi_taloo \u003c 70\n  Thisi B'Artunt smiles neutrally.  \"I'm impressed, ${name},\" ${Thisi_he} says. \"Who knew you'd be so helpful?\"\n  *goto ending_lady_luck_goto_engine\n*else\n  Thisi B'Artunt frowns. \"Does this mean you'll be leaving us? Such a shame.\"  As ${Thisi_he} edges past you, ${Thisi_his} body brushes yours. Your eyes fly open.\n  *goto ending_lady_luck_goto_engine\n*label ending_lady_luck_goto_engine\n*if killed_garce = true\n  \n  Captain Isan takes a step forward and stands before you. \"Now we just have one last matter to attend to,\" ${isan_he} says. \"Would you please follow me, ${name}?\"\n  *page_break Follow Captain Isan.\n  *goto ending_lady_luck_engine_isan\n*else\n  Thisi pauses and looks at you from the corner of ${Thisi_his} eye. The Nyarri's face turns serious. \"All pleasantries aside, would you please come with me, ${name}? There's something we need to discuss…\"\n  *page_break Follow Thisi.\n  *goto ending_lady_luck_engine_thisi\n\n\n\n*label ending_lady_luck_engine_isan\nCaptain Isan leads you out of the operations center, down the hall, and to the engine room. After unlocking the door, ${isan_he} steps aside. Wary, you enter the dark room, stopping before the unconscious form hooked up to the wires and equipment. Thela, source of the ship's power.\n\n\"It's amazing,\" whispers Isan, gesturing to ${thela_him}, \"how one person can cause so much to happen. So much damage and regret.\"  Isan turns to you.  \"I'm not referring to Thela, mind you, but myself.\"  The captain shakes ${isan_his} head miserably.  \"Anyway, I'm sure you have questions for me, ${name}. Ask away.\"\n*label isan_questions\n*choice\n  *hide_reuse #\"Do you disapprove of how I dealt with Garce back on Essch?\"\n    Isan studies you.  \"You murdered him.  What more is there to say?\"  ${isan_he} sighs.  \"Look, ${name}, I don't approve of murder. You know that. But you did what you had to do to save us, and for that, I'm grateful.  Let's just put it behind us and move on.\"\n    *goto isan_questions\n  *hide_reuse #\"Won't other GPF officers come after you?\"\n    The captain shrugs.  \"Probably not.  Garce's grudge against me was personal, and I guarantee you that the [i]Lady Luck[/i] isn't a big enough target to be on the GPF's radar.  Now that Garce is out of the way, I have a feeling we'll be fine.\"\n    *goto isan_questions\n  *hide_reuse #\"Will the law be after me for killing Garce?\"\n    Isan slings an arm around your shoulders.  \"Only three people witnessed what happened down on Essch, and one of them is dead.  That leaves you and me.  I swear on my life, ${name}—no one will ever know who killed Detective Garce. You have my word.\"\n    *goto isan_questions\n  *hide_reuse #\"How can I live with myself after what happened?\"\n    Isan lowers ${isan_his} head.  After a moment, ${isan_he} whispers, \"That's not my place to say, ${name}. I hope things will get better for you with time, but I can tell you from personal experience that they won't. I know firsthand what it means to take a life, and it's something that will haunt you for the rest of your days.  It may not be much comfort, but I can tell you this: you're not alone.\"\n    *goto isan_questions\n  *hide_reuse #\"Tell me about your history with Garce.\"\n    Isan smirks, though ${isan_his} eyes darken.  \"We have a long history.  Before ${garce_he} joined the GPF, Ennin Garce and I used to work together. Partners trading goods between worlds.  The business was completely legitimate.  And then I met Thela.  Garce wasn't happy about it.  You already know the rest.\"\n    *goto isan_questions\n  *hide_reuse #\"What'll happen to Thela?\"\n    Isan walks over to Thela and clasps ${thela_his} hand, looking down at ${thela_him} sadly.  \"I plan to dedicate the rest of my life to finding a cure for ${thela_him}.  Thela may never forgive me for Garce's death, of course.  But even if ${thela_he} doesn't, seeing ${thela_him} conscious again, able to live ${thela_his} life—that will make everything I've gone through worthwhile.  Thela will get better, ${name}.  That I swear to you.\"\n    *goto isan_questions\n  #\"I don't have any questions.\"\n    Captain Isan folds ${isan_his} hands behind ${isan_his} back.  \"Very well, ${name}.  In that case, I have one for you.  You know our next destination—your home planet, Earth.  Now that all of this is over, what do you intend to do?\"\n    *choice\n      #\"Live a nice, quiet life on Earth. I've had enough excitement for one lifetime.\"\n        Isan raises  ${isan_his} eyebrows.  \"So be it.  Me, I couldn't live without the thrill of adventure.  But given everything you've been through, I can't say that I blame you.  Take care of yourself, ${name}, and know you'll always have a home here with us.\"\n        *goto ending_lady_luck_engine_earth_end\n      *if (origin = 2) #\"Use the money I earned on our missions to settle my debts.\"\n        Isan smirks.  \"We did earn some money together, didn't we?\" ${isan_he} says. \"Well, take care of yourself, ${name}, and know you'll always have a home here with us.\"\n        *goto ending_lady_luck_engine_earth_end\n      *if (origin = 3) #\"Hope I can settle my legal troubles back home.\"\n        Isan smirks. \"I've certainly been in more than my fair share of those situations, as you've seen firsthand.\"  ${isan_he} appraises you. \"And you know what?  I think you'll handle yourself just fine, ${name}. Take care, and know you'll always have a home here with us.\"\n        *goto ending_lady_luck_engine_earth_end\n      #\"Actually, I was hoping to stick around and see what other trouble you get into.\"\n        *if (garce_isan > 50) and (rank > 3)\n          Isan smiles broadly. \"You know, ${name}? I knew you were one of us.\" The captain claps you on the back. \"As of this moment, consider yourself a permanent member of my crew.\"  With a proud smile, ${isan_he} gestures for you to follow ${isan_him} out of the room. \"Come on, let's go tell the others the good news.\"\n          *goto ending_lady_luck_engine_ll_end\n        *else\n          Isan frowns. \"You do realize that your actions onboard this ship haven't exactly been stellar, right?\" You open your mouth to argue, but ${isan_he} holds up a hand. \"Don't get me wrong—I appreciate you killing Garce for us, and I'll keep that secret until the end of days. But that doesn't excuse your earlier behavior. You dug this hole for yourself, ${name}, and now you have to live with it.\" Isan turns away from you. \"We'll drop you off safely at your home on Earth, and that's where we say goodbye.\"\n          *goto ending_lady_luck_engine_earth_end\n\n*label ending_lady_luck_engine_earth_end\n*page_break\nSeveral days later, the [i]Lady Luck[/i] arrives on Earth. As you settle back into your life, the last few weeks feel like a dream. You can't decide if you're sorry or happy to leave the crew of the [i]Lady Luck[/i] behind. In the end, you just put one foot in front of the other and begin your journey into the future, into your new life.\n\nTHE END.\n*goto_scene ending\n\n\n\n*label ending_lady_luck_engine_thisi\nThisi leads you out of the operations center, down the hall, and to the engine room. After unlocking the door, ${Thisi_he} steps aside. Wary, you enter the dark room, stopping before the unconscious form hooked up to the wires and equipment. Thela, source of the ship's power.\n\n\"This,\" says Thisi, gesturing toward the ${thela_gender}, \"has been the cause of all of our problems from the start.\"  The Nyarri turns to you. \"Sure, Thela makes the ship go fast, but is that really worth it?  Is what we're doing to ${thela_him} right?\" Thisi shakes ${Thisi_his} head. \"Not that I'd ever agree with Detective Garce's methods, mind you, but the truth is, I'm not sure Thela can even be saved.  The captain certainly thought so, but the ship no longer belongs to ${isan_him}. Now ${isan_he}'s gone, and some hard choices have to be made. What do with do with Thela?\"\n\nThisi pauses and looks at you solemnly. \"What do you think, ${name}?\"\n*choice\n  #\"Thela should be allowed to die in peace.\"\n    Thisi sighs. \"I've been thinking the same thing.\" The Nyarri looks over at Thela, so delicate and fragile in ${thela_his} current state. \"I'll have Shelou Vili disconnect ${thela_him} from the engines later today. ${thela_he}'ll die, but at least ${thela_he}'ll be at peace.\" A muscle twitches in Thisi's cheek.\n    *goto ending_lady_luck_engine_thisi_continued\n  #\"Thela asked for this. Leave ${thela_him} there until you find a cure.\"\n    Thisi looks over at Thela, so delicate and fragile in ${thela_his} current state. \"You know what? You're right,\" Thisi says finally. \"It's what the captain would have wanted. We'll find Thela a cure. It's the least we can do after everything Isan did for us over the years.\"\n    *goto ending_lady_luck_engine_thisi_continued\n  #\"Forget the cure; you'll never find a better power supply!\"\n    Thisi's jaw drops. \"Thela is a person with a soul, ${name}! We can't just use ${thela_him} like ${thela_he}'s some animal.\" Thisi sighs, clearly frustrated. \"We'll keep ${thela_him} hooked up to the engines for now. And we'll try to find ${thela_him} a cure in the meantime. It's what Captain Isan would have wanted. But if—when we find a cure, I'm freeing Thela from this horrid fate. No one deserves to suffer like this.\"\n    *goto ending_lady_luck_engine_thisi_continued\n  #\"It's not my place to decide what to do with her. Nor is it yours.\"\n    Thisi chews on ${Thisi_his} lower lip, thinking. Eventually ${Thisi_he} nods. \"You're right. Thela was Captain Isan's responsibility, and we should respect ${isan_his} wishes. We'll keep Thela hooked up to the engines and try to find a cure. It's the least we can do after everything the captain has done for us over the years.\"\n    *goto ending_lady_luck_engine_thisi_continued\n\n*label ending_lady_luck_engine_thisi_continued\n\n*if (duplicity_loyalty > 65) and (rank > 3)\n  Thisi takes a deep breath and smiles. \"So, ${name}, I wanted to ask you something.\" The Nyarri clears ${Thisi_his} throat. \"With Captain Isan gone, this crew needs a leader. Given everything we've been through together, I was wondering—\" Thisi stops and laughs. \"I mean, we were wondering if you'd like to take command of the [i]Lady Luck[/i]?\"\n  *choice\n    #\"I would be honored!\"\n      *set rank 6\n      Thisi's face lights up. \"I was hoping you'd say that!\" ${Thisi_he} exclaims, grabbing your arm and wrapping it around ${Thisi_his} waist. \"Come on, let's go tell the others the good news. May you lead us to great fortune, ${name}!\"\n      *goto ending_lady_luck_engine_ll_end\n    #\"That's quite an honor, but I have to decline.\"\n      Thisi nods, trying to appear casual, but it's obvious ${Thisi_he}'s disappointed. \"Very well, ${name}. I understand. In that case, since we're headed back to Earth, will you be returning home?\"\n      *goto ending_lady_luck_engine_thisi_choice\n*else\n  After a moment of silence, Thisi speaks again. \"So, ${name}, now that we're headed back to your home planet, what are your plans for the future?\"\n  *label ending_lady_luck_engine_thisi_choice\n  *choice\n    #\"Live a nice, quiet life on Earth. I've had enough excitement for one lifetime.\"\n      Thisi laughs. \"I can't say I blame you,\" ${Thisi_he} says with a wink. \"You've been through more these past few weeks than most people go through in a lifetime! You deserve some peace and quiet. I wish you the best and hope you know you'll always have a home here with us.\"\n      *goto ending_lady_luck_engine_earth_end\n    *if (origin = 2) #\"Use the money I got from my time here to settle my debts.\"\n      \"It all comes down to money, doesn't it?\" Thisi says, shaking ${Thisi_his} head. When you don't respond, ${Thisi_he} shrugs. \"I guess that's just the law of the universe. In any case, I wish you well in your life, ${name}. Please know  you'll always have a home here with us.\"\n      *goto ending_lady_luck_engine_earth_end\n    *if (origin = 3) #\"Hope I can settle my legal troubles back home.\"\n      Thisi smirks. \"Isn't that
