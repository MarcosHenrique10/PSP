) #\"You're both wrong and out of line.  Let's focus on the mission at hand and forget this nonsense.\"\n    *set harsh_kind %-10\n    *set follower_leader %+10\n    Both Rallix and Shelou Vili glare at you.  After several tense seconds, Rallix speaks.\n\n    \"The human is right,\" it says.  \"Let us focus on the mission and leave our personal beliefs out of it.\"\n    *goto temple_arrival\n  *selectable_if (rank \u003c 3) #\"Will whoever I side with free me from my captivity?\"\n    *set harsh_kind %+10\n    *set duplicity_loyalty %+10\n    Both Rallix's and Shelou Vili's jaws drop.  They pause, then burst into side-splitting laughter, like you've told the best joke ever. You roll your eyes.\n\n    \"Thank you, human,\" says Shelou Vili, \"for introducing some levity to our conversation.\"\n    \n    \"I admit to being a bit intolerant at times,\" admits Rallix, glancing at Shelou Vili.  \"Forgive me.\"\n\n    \"And I am too often self-deluded,\" says Shelou Vili humbly.  \"It is good to remember that my view is not the only one.\"\n    *goto temple_arrival\n  #Remain silent.\n    *set cowardice_bravery %-20\n    *set follower_leader %-20\n    You refuse to take sides and keep your mouth shut. Let your teammates glare at each other as much as they want. It's not your problem.\n    *goto temple_arrival\n\n\n\n*label temple_arrival\n\nYour earpiece crackles to life in a burst of static.  \"Team A, are you in position?\" asks Isan.\n\n\"We're here, Captain,\" replies Thisi through the earpiece.\n\n\"Good.  Team B, what about you?\"\n\n\"In place and awaiting Team A's signal,\" growls Rallix, nodding to Shelou Vili and you.\n\n*if borion_died = false\n  \"What about you, Borion?\"\n  \n  The Vervoo slave speaks proudly.  \"Ready to r-run to anyone's aid if need b-be, ${Isan_sir}!\"\n  *goto teams_proceed_continue\n*label teams_proceed_continue\n\n\"All right,\" says Isan.  \"Whenever you're ready, Team A. The rest of us are standing by.\"\n\nA few tense seconds pass. You stare at your nails. Finally, your earpiece crackles to life once more. \"We're approaching the guards now,\" whispers Thisi.\n\n\"Acknowledged,\" says Isan.\n\nNext to you, Rallix gasps. You jerk your head and follow its gaze. Near the temple, two guards escort a young Nixian, one who could have been a younger Rallix, in chains. Rallix's forelegs shake in anger.\n\n\"How dare they take one of the Hive captive?\" it growls.\n\n\"I thought these people had never encountered off-worlders,\" says Shelou Vili, his brow furrowed.\n\n\"Obviously, we were wrong,\" replies Rallix.  \"We have to do something to free my blood brother!\"\n\n\"Though I sympathize, we cannot risk the mission for it,\" counters Shelou Vili. You're shocked; he actually sounds sympathetic.\n*label captive_choice\n*choice\n  #Help Rallix free the Nixian captive.\n    *set rallix_shelou %-20\n    *set cowardice_bravery %+20\n    *set harsh_kind %+20\n    *set essch_mistakes +1\n    \"We can't leave that Nixian to die,\" you state firmly.  Rallix nods in approval, and Shelou Vili backs down, resigned.\n    \n    \"This will only take a moment,\" says Rallix, raising its laser pistol.  It takes careful aim and, with two powerful blasts, shoots both guards.  They drop to the ground. Its mandibles clicking, the young Nixian looks around frantically.\n\n    \"Wait!\" calls Rallix. It rushes to the former prisoner and uses its laser to melt the chains binding the young Nixian's wrists. \"Now go!\"\n\n    Completely bewildered, the young Nixian dashes off into the wilderness.  \"Good luck, brother,\" whispers Rallix.\n    *goto inside_temple\n  #Help Shelou Vili convince Rallix to back down.\n    *set rallix_shelou %+20\n    *set cowardice_bravery %-20\n    *set harsh_kind %-20\n    *set duplicity_loyalty %+10\n    \"Shelou Vili is right,\" you state firmly.  \"We just can't risk the mission.\"\n    \n    Rallix glares at you, breathing heavily. You wait, keeping your face bland. At last Rallix calms down.  \"You're right, of course,\" it says, still looking infuriated.\n    \n    \"If we find a way to assist your fellow later without jeopardizing the mission,\" promises Shelou Vili, \"then we will.\"\n    \n    Rallix shoots him a disbelieving look.  \"We won't, and you know it,\" it mutters grumpily.\n    *goto inside_temple\n  *selectable_if (harsh_kind \u003c 30) #Laugh at the Nixian captive. (HARSH)\n    *set rallix_shelou %+10\n    *set harsh_kind %-20\n    *set duplicity_loyalty %-10\n    The sight of one of Rallix's kind in chains is the funniest thing you've seen lately, and you laugh loudly.  Rallix turns its flushed face on you.  \"How dare you laugh, human!\" it spits.  \"My blood brother is suffering!\"\n    \n    \"And how do you think I felt every time you taunted me?\" you yell back.\n\n    Rallix says nothing, but its forelegs tremble.\n\n    \"This is not the time,\" Shelou Vili interjects. \"There is nothing we can do for the Nixian.  We must focus on the mission.\"\n    \n    Rallix glares at you, breathing heavily. You wait, keeping a smug smile on your face. It turns away, staring at the sky until it calms down.  \"You're right, of course,\" it says, still looking infuriated.\n\n    \"If we find a way to assist him later without jeopardizing the mission,\" says Shelou Vili, \"then we will.\"\n\n    Rallix shoots him a disbelieving look.  \"We won't, and you know it,\" it mutters grumpily.\n    *goto inside_temple\n  *selectable_if ((pistol_charges > 0) and (rank > 3)) #Shoot the captive with your pistol.\n    *set rallix_shelou %+20\n    *set cowardice_bravery %+20\n    *set follower_leader %+20\n    *set harsh_kind %-40\n    *set essch_mistakes +1\n    *set pistol_charges -1\n    No way will you stand idly by while someone's held captive. You reach for your laser pistol and shoot the Nixian prisoner, who dies instantly.\n\n    Rallix's eyes widen in angry disbelief.  \"Why in the name of the Queen did you do that?\" it hisses.\n\n    \"The Nixian is free now,\" whispers Shelou Vili, putting a hand on Rallix's shoulder.  \"It will no longer suffer, and we were in no position to assist it otherwise.  Mercy killing was the right thing to do.\"\n\n    Rallix's forelegs shake like it can barely keep from strangling you, but it reluctantly backs down.\n    *goto inside_temple\n  *selectable_if ((pistol_charges > 1) and (rank > 3)) #Shoot the guards holding the captive with your pistol.\n    *set rallix_shelou %-20\n    *set cowardice_bravery %+20\n    *set harsh_kind %+20\n    *set essch_mistakes +1\n    *set pistol_charges -2\n    No way will you stand idly by while someone's held captive. After all, why do you have a laser pistol if not to use it? You take careful aim and, with two powerful blasts, shoot both guards. They drop to the ground. Its mandibles clicking, the young Nixian looks around frantically.\n\n    \"Wait!\" calls Rallix. It rushes to the former prisoner and uses its laser to melt the chains binding the young Nixian's wrists. \"Now go!\"\n\n    Completely bewildered, the young Nixian dashes off into the wilderness.  \"Good luck, brother,\" whispers Rallix. \"And thank you, ${name}, for taking action.\"\n\n    \"That was a foolish decision,\" says Shelou Vili.  \"Though I am glad the Nixian is now safe.\"\n    *goto inside_temple\n  *selectable_if (rank \u003c 3) #Try to sneak away while your teammates debate what to do. (SLAVE)\n    *goto run_slave\n  *hide_reuse #Contact Captain Isan and ask for advice on the situation.\n    *set garce_isan %+10\n    *set rallix_shelou %+10\n    *set cowardice_bravery %-10\n    *set duplicity_loyalty %+10\n    This is a stickier situation than you know how to deal with, so you contact Captain Isan and report what's happening.\n    \n    Isan quickly responds.  \"We can't afford to jeopardize this mission to save any captives.  Do whatever you can to get Rallix back on track.\"\n    \n    Unfortunately, Rallix overhears the captain on its own earpiece.  \"If you are not going to assist me in this matter, human, the least you can do is make a decision for yourself instead of tattling to the captain,\" it hisses.\n    \n    \"${name} did the right thing by reporting this incident to the captain,\" counters Shelou Vili softly.\n    \n    Rallix still watches the captive Nixian intently. It's obvious the security officer's not going to give up that easily.\n    *goto captive_choice\n\n*label inside_temple\n\nA moment later, static crackles in your earpiece.  \"We've managed to distract the guards,\" reports Thisi.\n\n\"Good,\" the captain replies.  \"Now move into the temple.\"\n\nYour team holds its position until Thisi says, \"We're in.\"\n\n\"Good,\" says Isan.  \"Scanning the site now.\"  A few seconds later, ${isan_he} continues.  \"Okay, I'm detecting the relics approximately twenty meters from your location.  Team A, find some place to hide.  Team B, move in.\"\n\n\"Copy that,\" says Rallix, still distracted by the incident with the Nixian.  \"Team B, moving in.\"\n\nThe three of you head toward the temple, now clear of guards thanks to Team A.  You quickly enter the camp and follow Isan's directions.  Moments later, you find an enclosed space within the temple—a shrine. You peek through the windows and grin. There on the walls of the shrine are the relics you seek.\n\nUnfortunately, the entrance to the shrine is sealed.\n\n\"Curses!\" growls Rallix.  \"How will we get in?\"\n\n\"The most logical solution would be to find the key to the door,\" suggests Shelou Vili.\n\n\"I say we just smash the door open!\" says Rallix.\n*label locked_door\n*choice\n  *hide_reuse #Search for a key with Shelou Vili.\n    *set rallix_shelou %+20\n    *set harsh_kind %+20\n    \"I suppose it's worth a try,\" admits Rallix begrudgingly.\n    \n    The three of you split up to search the shrine's perimeter for a key.  Unfortunately, if there is one, you can't find it.\n\n    \"Well, that was a waste of time,\" says Rallix irritably, glaring at Shelou Vili.  \"Now what?\"\n    *goto locked_door\n  #Let Rallix smash open the door.\n    *set rallix_shelou %-20\n    *set harsh_kind %-10\n    *set essch_mistakes +1\n    \"Now we're talking!\" shouts Rallix, smashing the door with its mighty pincers. You're thrilled the door's gone, but you point out the guards must be on their way to locate the source of the commotion.\n\n    \"Perhaps we should hurry inside before the guards investigate,\" suggests Shelou Vili in a low voice.\n    \n    Rallix claps its forelegs together. \"Good idea.\"\n    \n    The three of you hurry inside the shrine.\n    *goto distraction\n  *selectable_if (follower_leader > 50) #Propose taking a guard captive and making him open the door.\n    *set guard_captive true\n    *set duplicity_loyalty %+20\n    \"Are you crazy?!\" demands Rallix.  \"We're to avoid the guards!\"\n    \n    \"Wait,\" says Shelou Vili.  \"The human has a point: taking a guard captive would be an easy means of obtaining what we want, and we can take steps to ensure that he does not pose any threat to us.\"\n    \n    It takes a lot of convincing, but Shelou Vili finally wins over the dubious Rallix. The three of you approach a single guard, and Shelou Vili makes himself visible as bait. When the guard advances, Rallix grabs him from behind and growls into his ear, \"You will come with us.\"\n    \n    Rallix escorts the guard to the shrine's entrance and forces him to unlock the door.  Once the door's open, Rallix knocks him out and drags him into the shrine.\n    \n    \"All right, so maybe that was a good idea, after all, ${name},\" says Rallix.  Grinning, you follow your teammates into the shrine.\n    *goto distraction\n  #Suggest blasting open the door with a laser pistol.\n    *set harsh_kind %-10\n    *set duplicity_loyalty %-10\n    *set essch_mistakes +1\n    \"Good idea,\" says Rallix.  Without waiting, it pulls out a laser pistol and takes aim.\n    \n    \"Wait,\" cries Shelou Vili. \"Are you sure that's a good—\"\n\n    Without waiting for Shelou Vili to finish his question, Rallix fires at the door. It vaporizes before you.  You're thrilled the door's gone, but you point out the guards must be on their way to locate the source of the commotion.\n\n    \"Perhaps we should hurry inside before the guards investigate,\" suggests Shelou Vili.\n    \n    Rallix claps its forelegs together. \"Good idea.\"\n    \n    The three of you hurry inside the shrine.\n    *goto distraction\n  *hide_reuse #Look for an alternate way into the shrine.\n    *set rallix_shelou %+10\n    *set follower_leader %+10\n    *if cowardice_bravery \u003c 35\n      You propose searching for a different way in.\n\n      \"The shrine appears relatively small,\" says Shelou Vili condescendingly.  \"Does it look like there could be another way in?\"\n\n      \"Only one way to find out,\" you point out.\n\n      As Rallix grumbles about the plan's lack of action, you carefully inspect the exterior of the shrine for hidden entrances.  Unfortunately, you're forced to conclude that in fact, there isn't any way in besides the front door.\n      \n      \"What a waste of time,\" mutters Rallix.\n      \n      \"What now?\" asks Shelou Vili.\n      *goto locked_door\n    *else\n      *set essch_mistakes +1\n      You propose searching for a different way in.\n\n      \"The shrine appears relatively small,\" says Shelou Vili condescendingly.  \"Does it look like there could be another way in?\"\n\n      \"Only one way to find out,\" you point out.\n\n      As Rallix grumbles about the plan's lack of action, you carefully inspect the exterior of the shrine for hidden entrances. Unfortunately, you're a bit too bold. As you round the rear corner of the shrine's outer wall, a pair of guards several meters away spot you.  \"Halt!\" they cry, advancing on you.\n\n      Rallix quickly smashes open the door with its mightly pincers.  The door crumbles to dust, making you cough, and piling into a wall too high for the guards to penetrate.\n\n      \"Perhaps we should hurry inside before the guards find a way through,\" suggests Shelou Vili.\n\n      You nod, and Rallix claps its forelegs together. \"Good idea.\"\n    \n      The three of you quickly enter the shrine.\n      *goto distraction\n  *selectable_if (lockpicks > 0) #Unlock the door yourself with a sonic lockpick.\n    *set duplicity_loyalty %+20\n    *set lockpicks -1\n    Grinning, you tell your teammates that all you have to do is unlock the door with the sonic lockpick you bought on Tuskin.\n\n    \"Well why didn't you say so earlier?\" growls Rallix, stepping aside to grant you access to the door.  Pulling out your sonic lockpick, you unlock the door in a matter of seconds.\n    \n    \"Good work, ${name},\" says Shelou Vili with a smile.  \"You got us inside without causing a scene.\"\n    \n    The three of you step inside the shrine.\n    *goto distraction\n\n*label distraction\n\nInside the shrine, you look around, overwhelmed. There are so many artifacts! How will you find the ones you need?\n\n\"Team B checking in,\" whispers Rallix.  \"We've located the relics and are beginning to—\"\n\nSomething roars behind you, raising the hair your arms.  Whirling around, you come face-to-face with two large, doglike creatures at the entrance to the shrine. They growl menacingly, saliva dripping from their razor-sharp teeth.\n\n\"They are Vilas,\" informs Shelou Vili in a cautious whisper.  \"The domesticated pack animals of this world.  They make excellent guardians but can be quite deadly if crossed.\"\n\n\"Quick!\" shouts Rallix.  \"We need a distraction!\"\n*label vilas_attack\n*choice\n  *hide_reuse #Throw a relic at the Vilas.\n    *set cowardice_bravery %-10\n    *set rallix_shelou %-10\n    You blindly reach for the nearest relic. Maybe if you throw it at the Vilas, they'll get scared and go away.\n\n    \"No,\" says Rallix, its mandibles clicking. \"That could be one of the relics we're seeking.\"\n\n    \"Rallix is right,\" says Shelou Vili. \"You might rid us of one problem, but in doing so, create another.\"\n\n    You rethink your idea and realize they have a point.\n    *goto vilas_attack\n  *selectable_if (follower_leader \u003c 35) #Hide behind your teammates and wait for them to act. (FOLLOWER)\n    *set follower_leader %-20\n    *set cowardice_bravery %-10\n    *set duplicity_loyalty %-10\n    *set essch_mistakes +1\n    Terrified, you hide behind Shelou Vili. Let him figure out how to deal with these rabid animals!\n\n    \"Do not choose now to display your cowardice,\" cautions Shelou Vili, restraining you.  \"If you run, there is no reason I should not let the Vilas have you.\"\n\n    You quake but stay where you are. Maybe now you'll die.\n\n    Rallix rolls its eyes and quickly raises a laser pistol, shooting the two Vilas. They yelp and fall to the floor.  \n    \n    You catch your breath, thrilled to be alive.\n\n    \"We should inform the others that we are safe,\" says Shelou Vili, letting you go.\n    *goto evacuate\n  #Attack the Vilas with your bare hands.\n    *set harsh_kind %-20\n    *set cowardice_bravery %+20\n    *set duplicity_loyalty %+10\n    *if harsh_kind \u003c 30\n      Without thinking, you dive toward the wild animals. How dare these horrible things get in your way? You'll rip them to shreds! You growl and snarl as you slash at the animals, who quickly turn and run away whimpering, tails between their legs.\n\n      Rallix and Shelou Vili stare at you in shock.  \"Well done,\" says Rallix, clearly impressed. \"You are a berserker!\"\n\n      \"We should inform the others that we are safe,\" says Shelou Vili.\n      *goto evacuate\n    *else\n      *set essch_mistakes +1\n      Without thinking, you dive toward the wild animals. How dare these horrible things get in your way? You'll rip them to shreds!  Unfortunately, once you're tangled up with them, your bravado flees. The animals instantly pick up on your fear, snarling and biting you.\n      *if psrs > 0\n        *set psrs -1\n        Luckily, your personal shield recharger protects you from the attack.\n        *goto dog_attack_continued\n      *else\n        *set health -10\n        *if health \u003c 1\n          The bites are too much for you to bear, and your eyes close. You lie there in unimaginable pain, helplessly shrieking and praying to die as the Vilas tear you to pieces.\n\n          GAME OVER.\n          *goto_scene ending\n        *else\n          *goto dog_attack_continued\n      *label dog_attack_continued\n\n      Rallix and Shelou Vili join your attack, and together, you drive off the rabid animals.\n\n      \"That was messy,\" states Rallix, oozing yellow pus.\n\n      \"The important thing is that it worked,\" notes an out-of-breath Shelou Vili.\n\n      You're too busy trying to get your heart to slow down to answer.\n      *goto evacuate\n  *selectable_if ((rank > 3) and (pistol_charges > 1)) #Shoot the Vilas with your laser pistol.\n    *set harsh_kind %-10\n    *set follower_leader %+20\n    *set duplicity_loyalty %-10\n    *set pistol_charges -2\n    *set essch_mistakes +1\n    There's a quick and easy solution, you think, as you raise your laser pistol and shoot the two Vilas.  They yelp and drop dead. You cheer.  Then you realize the sound of the laser pistol probably caught the attention of any nearby guards. Oops.\n\n    \"Let's hope nobody heard that,\" grumbles Rallix.\n\n    \"In case they have, we must make haste,\" notes Shelou Vili.\n    *goto evacuate\n  *hide_reuse #Tell Rallix to shoot the animals.\n    *set harsh_kind %-20\n    Rallix looks at you with regret.  \"My faith forbids the killing of animals,\" it states.  \"I will not actively do so; to break my faith would pull me away from my Queen.\"\n\n    \"You hesitate to kill beasts but not people,\" says Shelou Vili sardonically.  \"Yet you justify it in terms of your religion.\" He sighs. \"In any case, let us come up with an alternative solution.\"\n    *goto vilas_attack\n  *hide_reuse #Search the room for ideas.\n    Glancing around the room, you spot a ceremonial blade.\n    *choice\n      #Attack the Vilas with the blade.\n        *set harsh_kind %-20\n        *set rallix_shelou %-30\n        *set duplicity_loyalty %-10\n        *set essch_mistakes +1\n        You pick up the blade and swing it around aggressively, hoping to scare away the Vilas.  To your surpise, they run away whimpering, tails between their legs.  They do, however, bark up a storm as they depart.\n\n        Rallix and Shelou Vili look at you in shock.  \"Well done,\" notes Rallix, clearly impressed.\n\n        \"You desecrated a holy relic by swinging it like a common weapon,\" says Shelou Vili, disappointed.  \"I expected better of you.\"\n        *goto evacuate\n      #Try something else, ignoring the blade.\n        *set harsh_kind %+20\n        *set duplicity_loyalty %+10\n        Not wanting to desecrate a holy relic, you leave the blade where it is.\n        *goto vilas_attack\n  *if (guard_captive = true) #Distract the Vilas with the unconscious guard.\n    *set harsh_kind %-40\n    *set duplicity_loyalty %-20\n    *set essch_mistakes +1\n    *set rallix_shelou %-40\n    The beasts must be hungry, you think. Well, that's easily solved. You step aside to let them see the guard still lying on the ground.  \"Move!\" you tell your teammates, watching the beasts drag the body away.\n\n    Shelou Vili looks at you in shock.  \"You have just sentenced that guard to death,\" he states.  \"As far as I am concerned, you have killed him. Can you live with that?\"\n\n    \"Isn't it wonderful?\" asks Rallix, relishing the moment.\n    \n    Ignoring both of them, you point out you should let the others know you're safe.\n    *goto evacuate\n  *selectable_if (cowardice_bravery \u003c 30) #Panic. (COWARDICE)\n    *set cowardice_bravery %-20\n    *set duplicity_loyalty %+20\n    All you can do is panic. There are wild animals ready to eat you! You flail your arms and scream. To your shock, your reaction startles the Vilas, who turn and run away whimpering, tails between their legs.\n    \n    \"I've never been more happy to call you a coward, ${name},\" says Rallix happily.\n\n    \"We should inform the others that we are now safe,\" notes Shelou Vili, shaking his head.\n    *goto evacuate\n\n\n\n*label evacuate\n\n\"We're okay,\" Rallix says into its earpiece.  \"We encountered some wild Vilas, but we managed to subdue them.\"\n\n\"Acknowledged,\" replies Isan over the earpiece.\n\n\"Let's collect the relics now,\" says Shelou Vili.\n\nOver the next few minutes, you gather the relics from the shrine into large sacks and divide the sacks among the three of you.  Once you have everything in your possession, Shelou Vili contacts the other teams.\n\n\"We have obtained all the relics,\" he states.  \"We are now proceeding to the site's exit.\"\n\n\"All teams, evacuate the site,\" orders Isan.  \"Repeat: evacuate the site.\"\n\n\"Come on, then,\" says Rallix.  The three of you make your way back to the temple's exit, careful to avoid the guards' attention.  Near the exit, you spot Team A.  As your teams intersect, you pass through the exit…\n*goto_scene chapter_6c_outro\n\n\n*label run_slave\nWhile Rallix and Shelou Vili debate, you sneak off, running around the corner of the temple's perimeter.  Just as you're sure you've lost them, you turn around and find a guard standing before you, spear raised.\n*choice\n  #Attempt to fight off the guard.\n    *set cowardice_bravery %+20\n    *set follower_leader %+20\n    You lunge toward the guard, attempting to fight your way to freedom.  Unfortunately, you're no match for her spear, which stabs you.\n    *label guard_attack\n    *if psrs > 0\n      Luckily, your personal shield recharger prevents you from being physically harmed. It can't, however, stop the guard from stunning you, making it impossible for you to escape her grasp.\n      *goto slave_held\n    *else\n      *set health -10\n      *if health \u003c 1\n        The spear goes straight through your heart, and you die a quick but agonizing death.\n        \n        GAME OVER.\n        *goto_scene ending\n      *else\n        The spear digs deeply into you. You scream. As you stand stunned and bleeding, the guard grabs hold of you.\n        *goto slave_held\n  *selectable_if (duplicity_loyalty \u003c 50) #Warn the guard that the temple relics are about to be stolen. (DUPLICITY)\n    *set follower_leader %-10\n    *set cowardice_bravery %-20\n    *set duplicity_loyalty %-30\n    At the sight of the spear, you quickly spill the crew's entire plan to the guard. Of course, you make sure to emphasize that you're here against your will.  The guard eyes you carefully, nods, and firmly grabs hold of your arm.  After asking another guard to pass the word on about the [i]Lady Luck[/i]'s planned heist, she walks you to the temple's entrance.\n    *goto slave_held\n  #Try to lie your way out of the situation.\n    *set cowardice_bravery %-10\n    *set duplicity_loyalty %+10\n    *set follower_leader %+10\n    At the sight of the spear, you weave an elaborate web of lies explaining your presence, telling the guard that your ship crash-landed nearby.  The guard doesn't believe you, asking why, if you crashed, you don't have a scratch on you.  When you can't think of a good reason, she grabs your arm firmly, making it impossible for you to escape.\n    *goto slave_held\n  #Run away from the guard.\n    *set follower_leader %+10\n    *set cowardice_bravery %-10\n    At the sight of the spear, you take off at a run.  A second later, something sharp pierces your back. You gasp and fall. The guard must've thrown her spear at you!\n    *goto guard_attack\n  #Surrender to the guard.\n    *set follower_leader %-20\n    *set harsh_kind %+10\n    Realizing that escape is impossible, you slowly raise your hands.  The guard nods mockingly and grabs hold of you, making it impossible for you to escape.\n    *goto slave_held\n\n*label slave_held\n*set essch_mistakes +1\n\nThe guard removes your earpiece, cutting you off from contact with the crew.  She escorts you to a security office and sits you down while she speaks with the other guards.  An argument breaks out, and you realize all the guards have their backs to you.\n*choice\n  #Remain seated, waiting for the guards to finish their argument.\n    *set follower_leader %-10\n    *set essch_mistakes +1\n    Not wanting to risk any more trouble, you remain where you are.  The guards continue arguing for several minutes, and you tremble, knowing your fate's in their hands.  Finally they reach a consensus: you're to be thrown out of the temple.  If you're seen again, you'll be killed.\n    *goto slave_held_2\n  #Attempt to run back to your crew.\n    *set cowardice_bravery %+10\n    *set follower_leader %+10\n    *if ((cowardice_bravery > 50) and (follower_leader > 50))\n      You're never going to get another chance like this. You leap out of your chair and run, not risking any looks behind to see if the guards are following.  You run for several minutes, twisting and turning down the various paths within the temple, until you somehow spot Rallix and Shelou Vili near the entrance to a small shrine.\n\n      You stop, unable to believe your luck. When you look back, no one's there. You got away!\n      \n      \"Where have you been?\" demands Rallix, furious.\n      \n      \"We can worry about that later,\" interrupts Shelou Vili in a hushed tone.  \"Right now, we must focus on the mission.\"\n\n      Shelou Vili gestures at the shrine before you. You peek through the windows and grin. There on the walls of the shrine are the relics you seek.\n\n      \"Shelou Vili is right,\" growls Rallix.  \"We need to find a way into this shrine.  Any ideas?\"\n\n      \"The most logical solution would be to find the key to the door,\" suggests Shelou Vili.\n\n      \"I say we just smash the door open!\" replies Rallix.\n\n      *goto locked_door\n    *else\n      *set essch_mistakes +1\n      You're never going to get another chance like this. You leap out of your chair. Unfortunately, you're not used to these kinds of bold moves, and you stumble.  The guards nab you before you reach the door, forcing you back down onto the chair. This time, they tie you down.\n\n      You remain seated, the guards now watching you closely.  They continue arguing for several minutes, and you tremble, knowing your fate's up to them.  Finally they reach a consensus: you're to be thrown out of the temple.  If you're ever seen again, you'll be killed.\n      *goto slave_held_2\n  #Listen to the guards' conversation.\n    You listen closely to the guards' conversation, absorbed by it. The guard who captured you, along with two others, believe that you should be killed on the spot.  The other guards disagree. They want you to be kicked out of the temple and left to die in the wilderness instead.\n\n    The disagreement continues for several minutes. In the end, the guards agree to kick you out of the temple to avoid staining their souls with firsthand murder. Should you ever come back, they add, you'll be killed on the spot.\n    *goto slave_held_2\n  *selectable_if (duplicity_loyalty > 65) #Try to convince the guards that you're alone. (LOYALTY)\n    *set follower_leader %+10\n    *set duplicity_loyalty %+20\n    Not content to sit idly by and let the guards discuss your fate, you stand up and argue your case, attempting to convince them that you're here on the planet alone.\n    *if harsh_kind > 65\n      Because of your kind, unassuming nature, you're somehow able to trick the guards into believing you!  Warning you that you'll be watched closely, they allow you to leave the temple unharmed.  Not wanting to risk any further conflict, you hurry off at a quick pace, twisting and turning down the various paths within the temple.  Eventually, you spot Rallix and Shelou Vili nearing the entrance to a small shrine.\n      \n      \"Where have you been?\" growls Rallix, furious.\n      \n      \"We can worry about that later,\" interrupts Shelou Vili in a hushed tone.  \"Right now, we must focus on the mission.\"\n\n      Shelou Vili gestures toward the shrine that lies before you, and you examine it.  Through a sealed entry door's window, you find the relics you seek to be held within.\n\n      \"Shelou Vili is right,\" growls Rallix.  \"We need to find a way into this shrine.  Any ideas?\"\n\n      \"The most logical solution would be to find the key to the door,\" suggests Shelou Vili.\n\n      \"I say we just smash the door open!\" replies Rallix.\n\n      *goto locked_door\n    *else\n      *set essch_mistakes +1\n      Because of your aggressive, harsh nature, however, the guards don't believe you.  They laugh and force you to sit back down in the chair. They continue arguing over what to do with you.  Finally they reach a consensus: you're to be thrown out of the temple.  If you're ever seen again, you'll be killed on the spot.\n      *goto slave_held_2\n  *selectable_if (duplicity_loyalty \u003c 35) #Try to convince the guards that you're with a crew that's trying to steal their relics. (DUPLICITY)\n    *set follower_leader %+10\n    *set duplicity_loyalty %-20\n    *set essch_mistakes +1\n    No way are you going to sit idly by while these strangers decide your fate. You leap up and argue your case, stressing again how you were brought here against your will by a group of space pirates currently attempting to raid the guards' sacred temple.\n    \n    Unfortunately, this just serves to anger the guards even more.  You can't tell whether they believe you, but a shouting match ensues.  The guard who captured you, along with two others, believes you should be killed on the spot.  The other guards, however, disagree.  They suggest you be kicked out of the temple and left to die in the wilderness instead.\n\n    In the end, the guards agree to kick you out of the temple to avoid staining their souls with firsthand murder. Should you ever come back, they add, you'll be killed immediately.\n    *goto slave_held_2\n*label slave_held_2\n\nThe guards finish conversing, and the guard that brought you here grabs hold of you again and escorts you forcefully to the temple exit.\n\nAs you get closer, you see Teams A and B converging. The guard, distracted by your presence, doesn't notice them.  The teams pass through the temple entrance mere seconds before the guard shoves you forward.  With no other choice, you approach your crewmmates, who sneer at you. Rallix whispers, \"I'll deal with you on the ship.\"  Your heart drops, but you reluctantly walk forward with the crew…\n*goto_scene chapter_6c_outro", "chapter_6c_outro": "*if essch_mistakes > 1\n  only to discover a group of six guards standing in your way, their spears raised.  \"Stop, intruders!\"\n\n  The guards quickly surround you, trapping your teammates and your in their circle.  Outnumbered, the crew has no choice but to surrender.  You hesitate. Surely there's something you can do, but what?\n\n  From the corner of your eye, you see ${friend} gesture discreetly, warning you not to try anything dangerous.  You…\n  *label surrender_choice\n  *choice\n    #…raise your arms in surrender.\n      *set follower_leader %-10\n      *set cowardice_bravery %-10\n      *set duplicity_loyalty %+20\n      You know better than to risk a confrontation in the face of all those spears. You slowly raise your hands, making it clear you pose no threat.\n\n      The guards quickly grab the sacks that contain the relics stolen by Team B and sort through them. Then they withdraw to the temple, spitting at your feet and shouting that they'll attack if you're ever stupid enough to return.\n\n      After they disappear inside the temple, the crew breathes a collective sigh of relief. You begin the slow trek back to the [i]Lady Luck[/i], feeling like mud as you recall all the mistakes made during the mission.  You in particular were a large part of its failure, and you know it.\n\n      Everyone is silent, no doubt blaming you for the current situation.\n      *goto arrive_at_ship\n    *selectable_if (cowardice_bravery \u003c 35) #…attempt to flee. (COWARDICE)\n      *set follower_leader %-10\n      *set cowardice_bravery %-10\n      *set duplicity_loyalty %-20\n      You turn and bolt.  This takes the guards by surprise, and you manage to run past their circle before they react. As you run, you risk a glance backward. Several of the guards begin to chase you…which gives Shelou Vili the opportunity he needs to grab the sacks of relics and fly high into the air.\n\n      The ensuing commotion confuses the guards. Not sure who to follow, they scatter. Meanwhile, the crew runs off into the wilderness. You keep running, and soon the guards are long gone.\n\n      Shocked at this unexpected turn of events, you attempt to check in with Captain Isan. But there's no answer. The captain must be busy, you think, so instead, you contact the rest of the crew and arrange to meet up outside the [i]Lady Luck[/i].  As you walk toward the ship, you marvel at the relics you obtained despite all the mistakes you made.  Once these wares are sold to the Aviark archaeologists who employed you, you may never have to work again!\n\n      *goto arrive_at_ship\n    *hide_reuse #…attempt to talk your way out of the situation.\n      *set follower_leader %+10\n      *set cowardice_bravery %+10\n      *set duplicity_loyalty %-10\n      You're not giving up the relics without at least trying to talk your way out of the situation. You address the guards, who immediately drown out your voice with harsh screams, demanding no less than your immediate surrender.\n      *goto surrender_choice\n    *selectable_if (cowardice_bravery > 65) #…attempt to fight the guards. (BRAVERY)\n      *set follower_leader %-20\n      *set cowardice_bravery %+20\n      *set duplicity_loyalty %-20\n      *set suspicion +5\n      You're not giving up the relics without a fight, considering what they're worth! You charge toward the guards.  Your crewmates watch in horror as you strike one.  The guards immediately raise their spears, and one stabs you.\n      *if psrs > 0\n        *set psrs -1\n        Luckily, your personal shield recharger protects you from any damage, but it doesn't stop the guards from grabbing you and the others.\n        *label attack_post\n        They forcibly remove the sacks containing the holy relics from Shelou Vili's hands and sort through them.  Then they withdraw to the temple, spitting at your feet and shouting that they'll attack if you're ever stupid enough to return.\n\n        After they back off, the crew glares at you, furious at your aggressive reaction. You begin the slow trek back to the [i]Lady Luck[/i], feeling like mud as you recall all the mistakes made during the mission.  You in particular were a large part of its failure, and you know it.\n\n        Everyone is silent, no doubt blaming you for the current situation.\n        *goto arrive_at_ship\n      *else\n        *set health -10\n        The spear stabs into your rib cage\n        *if health \u003c 1\n          and hits a major artery.  You instantly collapse, and everything around you fades.  You lose consciousness before you can see whether your crewmates evade the guards…and never wake again.\n          \n          GAME OVER.\n          *goto_scene ending\n        *else\n          and causes you to scream in agony.  The spear's owner withdraws the spear once he's satisfied that you're no longer a threat.  Then the guards grab you and the others.\n          *goto attack_post\n\n*else\n  and begin the journey back toward the ship.  As you walk with the others, you marvel at the relics you managed to obtain as a crew, each member working together to achieve this very successful goal.  Once these wares are sold to the Aviark archaeologists who employed you, the crew may never have to work again!\n  *goto arrive_at_ship\n\n*label arrive_at_ship\nYou walk for several minutes until the temple's no longer visible behind you.  After several minutes more, you finally reached the [i]Lady Luck[/i], nestled snugly among the trees of this lush, tropical world.\n\nSomething's wrong. As you get near, you spot Captain Isan at the foot of the ship's ramp, ${isan_his} face catatonic.  A circle of uniformed humans surround the captain.  At the base of the circle, one steps forward: Detective Ennin Garce.  Every member of the crew immediately freezes.\n\n\"Isan Cehnta,\" Garce states, drawing ${garce_his} weapon, \"on behalf of the Galactic Police Force, I am hereby placing you under arrest.\"\n*finish", "chapter_7a_intro": "*advertisement 1200\nCHAPTER 7 - THE ATTACK\n\nGarce's men outnumber the crew of the [i]Lady Luck[/i] by at least four to one. You get dizzy just imagining a confrontation. From the looks on your crewmates' faces, they feel the same way. The tension between Isan and Garce is so thick, you can hardly breathe.\n\n*if planted_device_garce = true\n  *set officer_weapons_active false\n  Suddenly, Isan taps a button on ${isan_his} belt.  An instant later, sparks leap off all Garce's officers' weapons.  You stare, amazed. Did the tracking device you planted on Garce have anything to do with this?\n  *if planted_device = true\n    *set crew_weapons_active false\n    Garce immediately taps a button on ${garce_his} own belt.  Sparks surge through the crew's weapons—including yours. You yelp in shock. Is this because you planted devices on both Garce and Isan?\n    *goto stand_off\n  *else\n    *goto stand_off\n*elseif planted_device = true\n  *set crew_weapons_active false\n  Garce suddenly taps a button on ${garce_his} own belt.  Sparks surge through the crew's weapons—including yours. You yelp in shock.  Did the tracking device you planted on Isan have anything to do with this?\n  *goto stand_off\n*label stand_off\n\n\"This is over,\" states Garce flatly.\n\n\"I don't think so,\" says Isan, looking triumphantly toward you.\n*if garce_isan \u003c 35\n\n  \"You've done well, ${name},\" says Garce.  \"Step forward and join my officers.  We couldn't have stopped Isan's crew without your help.\"\n  \n  \"Stay where you are, ${name},\" orders Isan.\n  *goto side_choice\n*elseif garce_isan > 65\n  \"${name}, remember everything I told you about Garce,\" says Isan desperately.  \"That's not what you want. Stay with the crew.  You're one of us now.\"\n  \n  \"Don't listen to ${isan_him},\" counters Garce.  \"Isan's an alien; ${isan_he} can never understand you like I do.  Stand with your own kind.\"\n  *goto side_choice\n*else\n\n  \"Join my officers, ${name},\" says Garce, smiling.  \"You're human.  That makes you one of us.\"\n\n  \"Stay where you are, ${name},\" orders Isan.\n  *goto side_choice\n\n*label side_choice\n*choice\n  #Take a position next to Garce's officers.\n    *set duplicity_loyalty %-50\n    *set garce_isan %-50\n    *set chosen_side \"Garce\"\n    This is it. You make your choice; you hurry forward and join Garce's officers.  ${friend} looks at you in shock.\n    *goto third_party_arrives\n  #Stay with Isan's crew.\n    *set duplicity_loyalty %+50\n    *set garce_isan %+50\n    *set chosen_side \"Isan\"\n    You're not going anywhere. Smiling, you move closer to your crewmates. Garce glares at you. \"Traitor!\"\n    *goto third_party_arrives\n  *hide_reuse #Remain where you are, trying to bide your time.\n    *set follower_leader %+10\n    *set cowardice_bravery %-10\n    You bite your lip, not wanting to side with either of them. Everyone stares at you, waiting, and that just makes you panic. Garce's officers stand with their weapons out, waiting for their commander's directive, while your crewmates turn pleading glances on you. Whatever you choose, even if you choose nothing, the consequences will lie squarely on your shoulders.\n    *goto side_choice\n\n*label third_party_arrives\n\nBefore anyone can say anything, dozens of creatures appear out of thin air. You jump in surprise.\n*if helped_bugs = true\n  *set third_party \"Rekelian\"\n  It's the Rekelians from the abandoned Vervoo ship! Clicking frighteningly, they surround Garce's men.\n\n  *if borion_died = false\n    Borion reels at the sight. He must be remembering the encounter with his own people's ship, you think distractedly.\n    *goto rekelians\n  *label rekelians\n  \"Friend ${name},\" says one Rekelian in your own language. You're amazed; how did the creature learn to speak it in the brief time since you met them? \"You honored us by resolving our earlier conflict peacefully.  Now let us assist you however we can.\"\n\n  You start to explain what's going on, but someone fires, and suddenly, it's chaos everywhere. Garce's officers charge at the crew, the crew stands their ground, and then the Rekelians jump in. You stare in disbelief: everyone's screaming and throwing punches and shooting. It's a free-for-all!\n  *finish Continue\n*else\n  *set third_party \"Shadow Fiend\"\n  You gasp as dozens of Shadow Fiends surround you. Still wearing his crown, Kraska steps forward. \"The GPF has been filling this sector of space with electrical webs that are causing our ships to crash,\" he proclaims haughtily.  \"The Shadow Fiend Empire will not put up with such treachery!\" He glances at the other Fiends.  \"What are you waiting for, you fools?  Attack!\"\n  \n  Chaos erupts as the Shadow Fiends overrun both Garce's officers and the crew of the [i]Lady Luck[/i]. Garce's officers charge, while the crew stands their ground. You stare in disbelief: everyone's screaming and throwing punches and shooting. It's a free-for-all!\n  *finish Continue", "chapter_7b_attack": "*comment -----YOU CAN EASILY CHANGE THE NUMBER OF EVENTS (OUT OF 14) THAT THE PLAYER SHOULD ENCOUNTER EVERY PLAY-THROUGH BY CHANGING THE EVENTS_VISITED VARIABLE ON LINE 3 BELOW (DEFAULT 6)-----\n*temp total_events\n*set total_events 6\n*temp events_visited\n*set events_visited 0\n*temp random_select\n*set random_select 0\n\n*temp encounter_chance\n*set encounter_chance 0\n*temp encounter_type\n*set encounter_type \"\"\n\n*temp event_1_used\n*temp event_2_used\n*temp event_3_used\n*temp event_4_used\n*temp event_5_used\n*temp event_6_used\n*temp event_7_used\n*temp event_8_used\n*temp event_9_used\n*temp event_10_used\n*temp event_11_used\n*temp event_12_used\n*temp event_13_used\n*temp event_14_used\n*set event_1_used false\n*set event_2_used false\n*set event_3_used false\n*set event_4_used false\n*set event_5_used false\n*set event_6_used false\n*set event_7_used false\n*set event_8_used false\n*set event_9_used false\n*set event_10_used false\n*set event_11_used false\n*set event_12_used false\n*set event_13_used false\n*set event_14_used false\n\nA second later, you stand alone in the clearing. Your mind races.  Whichever way you go, you think, trying to slow your breathing, it needs to be now.\n\n*label event_select\n*if events_visited = total_events\n  *finish\n*set events_visited +1\n\nWhich way do you go?\n*rand random_select 1 14\n*fake_choice\n  #Go northwest\n  #Go north\n  #Go northeast\n*label event_select_B\n*if random_select = 1\n  *if event_1_used = true\n    *set random_select +1\n    *goto event_select_B\n  *else\n    *goto event_1\n*elseif random_select = 2\n  *if event_2_used = true\n    *set random_select +1\n    *goto event_select_B\n  *else\n    *goto event_2\n*elseif random_select = 3\n  *if event_3_used = true\n    *set random_select +1\n    *goto event_select_B\n  *else\n    *goto event_3\n*elseif random_select = 4\n  *if event_4_used = true\n    *set random_select +1\n    *goto event_select_B\n  *else\n    *goto event_4\n*elseif random_select = 5\n  *if event_5_used = true\n    *set random_select +1\n    *goto event_select_B\n  *else\n    *goto event_5\n*elseif random_select = 6\n  *if event_6_used = true\n    *set random_select +1\n    *goto event_select_B\n  *else\n    *goto event_6\n*elseif random_select = 7\n  *if event_7_used = true\n    *set random_select +1\n    *goto event_select_B\n  *else\n    *goto event_7\n*elseif random_select = 8\n  *if event_8_used = true\n    *set random_select +1\n    *goto event_select_B\n  *else\n    *goto event_8\n*elseif random_select = 9\n  *if event_9_used = true\n    *set random_select +1\n    *goto event_select_B\n  *else\n    *goto event_9\n*elseif random_select = 10\n  *if event_10_used = true\n    *set random_select +1\n    *goto event_select_B\n  *else\n    *goto event_10\n*elseif random_select = 11\n  *if event_11_used = true\n    *set random_select +1\n    *goto event_select_B\n  *else\n    *goto event_11\n*elseif random_select = 12\n  *if event_12_used = true\n    *set random_select +1\n    *goto event_select_B\n  *else\n    *goto event_12\n*elseif random_select = 13\n  *if event_13_used = true\n    *set random_select +1\n    *goto event_select_B\n  *else\n    *goto event_13\n*else\n  *if event_14_used = true\n    *set random_select 1\n    *goto event_select_B\n  *else\n    *goto event_14\n\n\n\n*label event_1\n*set event_1_used true\nYou run until you reach an overpass. Spotting a group of Garce's officer, you screech to a halt. You realize they're rushing toward the crew of the [i]Lady Luck[/i], their weapons out. Several large boulders line the overpass. Hmm, you think. You're pretty sure you could push them over the edge and into the officers' path.\n*choice\n  *selectable_if (duplicity_loyalty > 60) #Push the boulders over the edge. (LOYALTY)\n    *set duplicity_loyalty %-20\n    *set cowardice_bravery %+20\n    *set follower_leader %+10\n    *set harsh_kind %-10\n    *if ((harsh_kind > 90) or (follower_leader \u003c 10))\n      You attempt to push the heavy boulders, but they don't budge. That's what you get for avoiding manual labor. Sighing, you run off in the other direction.\n      *goto event_select\n    *else\n      You give the heavy boulders a good shove. Grunting, you're thankful for all the manual labor you've done lately and the muscles you've acquired, because the rocks slowly start moving. A few seconds later, you roll them over the edge of the overpass. They crash down below, forcing the GPF officers to dive out of the way. You grin, knowing you've helped the crew.\n\n      Without looking back, you take off in the other direction.\n      *goto event_select\n  *selectable_if (duplicity_loyalty \u003c 40) #Push the boulders toward the crew of the [i]Lady Luck[/i]. (DUPLICITY)\n    *set duplicity_loyalty %+20\n    *set cowardice_bravery %+20\n    *set follower_leader %+10\n    *set harsh_kind %-10\n    *if ((harsh_kind > 90) or (follower_leader \u003c 10))\n      You attempt to push the heavy boulders, but they don't budge. That's what you get for avoiding manual labor. Sighing, you run off in the other direction.\n      *goto event_select\n    *else\n      You give the heavy boulders a good shove. Grunting, you're thankful for all the manual labor you've done lately and the muscles you've acquired, because the rocks slowly start moving. A few seconds later, you roll them over the edge of the overpass. They crash down below, forcing your crewmmates to dive out of the way. You grin, knowing you've helped Detective Garce's officers.\n\n      Without looking back, you run off in the other direction.\n      *goto event_select\n  #Push the boulders between both sides.\n    *set harsh_kind %+20\n    *set cowardice_bravery %+10\n    *set follower_leader %+10\n    *if ((harsh_kind > 90) or (follower_leader \u003c 10))\n      You attempt to push the heavy boulders, but they don't budge. That's what you get for avoiding manual labor. Sighing, you run off in the other direction.\n      *goto event_select\n    *else\n      You give the heavy boulders a good shove. Grunting, you're grateful for all the manual labor you've done lately and the muscles you've acquired, because the rocks slowly start moving. A few seconds later, you roll them over the edge of the overpass. They crash down below, dividing the two factions. You grin, knowing you've forced them to find another way to attack each other.\n\n      Without looking back, you run off in the other direction.\n      *goto event_select\n  #Push the boulders away from both groups to create a distraction.\n    *set harsh_kind %+20\n    *set cowardice_bravery %-10\n    *set follower_leader %+10\n    *if ((harsh_kind > 90) or (follower_leader \u003c 10))\n      YYou attempt to push the heavy boulders, but they don't budge. That's what you get for avoiding manual labor. Sighing, you run off in the other direction.\n      *goto event_select\n    *else\n      You give the heavy boulders a good shove. Grunting, you're grateful for all the manual labor you've done lately and the muscles you've acquired, because the rocks slowly start moving. A few seconds later, you roll the them over the edge of the overpass, but out of sight of the warring factions. Both Garce's officers and the [i]Lady Luck[/i]'s crew jump at the noise, then scatter. So much for the fighting, you think, pleased.\n\n      Without looking back, you run off in the other direction.\n      *goto event_select\n  *selectable_if (follower_leader \u003c 35) #Don't push the rocks. (FOLLOWER)\n    *set cowardice_bravery %-20\n    *set follower_leader %-10\n    *set harsh_kind %+10\n    You don't typically take action without being directly told to—and you've had enough of both sides trying to use you, anyway. Not to mention this skirmish doesn't even involve you. Without looking back, you run off in the other direction.\n    *goto event_select\n\n*label event_2\n*set event_2_used true\nYou run right up to a tree-lined passage. It's only wide enough for one person at a time.  At the other end of the tunnel, you see a ${third_party} running toward you.  It hasn't seen you yet. You don't have much time, so you…\n*choice\n  *selectable_if (follower_leader > 65) #…immediately run through the passage. (LEADER)\n    *set follower_leader %+20\n    On instinct, you dash through the narrow passage, reaching the end before the ${third_party} gets there.  Not giving it a chance to do anything, you race right past and continue on your way.\n    *rand encounter_chance 1 10\n    *if encounter_chance > 7\n      Unfortunately, the ${third_party} spots you then and runs right at you.\n      *if chosen_side = \"Garce\"\n        Once it reaches you, the ${third_party} attacks, slashing at you before hurrying on its own way,\n        *if psrs > 0\n          *set psrs -1\n          but your personal shield recharger protects you from any damage. You run right through the tunnel.\n          *goto event_select\n        *else\n          *set health -10\n          opening a few cuts on your arms and face.\n          *if health \u003c 1\n            Your body's already sustained way more damage than it can handle, and you collapse. Your last thought before you die is that you never did make it back to Earth.\n            GAME OVER.\n            *goto_scene ending\n          *else\n            Undeterred, you run right past and out the tunnel.\n            *goto event_select\n      *else\n        The ${third_party} squeezes past you as though you're not even there. You exhale heavily and keep going.\n        *goto event_select\n    *else\n      You just keep running.\n      *goto event_select\n  *selectable_if (follower_leader \u003c 35) #Wait for the ${third_party} to go through the tunnel. (FOLLOWER)\n    *set follower_leader %-20\n    You take cover behind a small tree and wait for the ${third_party} to pass through the tunnel. It jogs on through, hissing menacingly, though it never once sees you.  Once it's gone, you hurry through the tunnel yourself.\n    *goto event_select\n  #…run through the tunnel at the same time as the ${third_party}.\n    *set cowardice_bravery %+20\n    You run into the tunnel at the same time as the ${third_party}, forcing a confrontation.  As you meet in the middle of the passage,\n    *if cowardice_bravery \u003c 35\n      you panic, quickly turning and running in the opposite direction before the ${third_party} can react.  Forget the passage, you think. You'll find another way through.\n      *goto event_select\n    *else\n      you bravely face off against the ${third_party}.  It\n    *if chosen_side = \"Garce\"\n      attacks, slashing at you before hurrying on its own way,\n      *if psrs > 0\n        *set psrs -1\n        but your personal shield recharger protects you from any damage. You run right through the tunnel.\n        *goto event_select\n      *else\n        *set health -10\n        causing you damage.\n        *if health \u003c 1\n          Your body's already sustained way more damage than it can handle, and you collapse. Your last thought before you die is that you never did make it back to Earth.\n          \n          GAME OVER.\n          *goto_scene ending\n        *else\n          Undeterred, you run right past and out the tunnel.\n          *goto event_select\n    *else\n      squeezes past you as though you aren't even there. You exhale heavily and keep going.\n      *goto event_select\n  *if (third_party = \"Shadow Fiend\") #…attempt to kill the Shadow Fiend to clear the path ahead.\n    *set cowardice_bravery %+30\n    *set harsh_kind %-20\n    Furious, you march forward, ready to take down the Shadow Fiend. That's all she deserves, especially after the way Kraska betrayed all the crew. The two of you reach the passage's center at the same time. You raise your fists at the snarling creature.\n\n    *if harsh_kind \u003c 35\n      Your harsh, aggressive persona comes to the fore, and you let out all your rage, punching and kicking until the creature collapses. You don't know whether she's unconscious or dead, nor do you care. You brush off your hands and jog through the rest of the tunnel.\n      *goto event_select\n    *else\n      Unfortunately, you hate hurting people, and you can't do it now, either. Sensing your hesitation, the Shadow Fiend slashes at you.\n      *if psrs > 0\n        *set psrs -1\n        Luckily, your personal shield recharger protects you from any damage.  Uninjured, you dodge the Shadow Fiend before she can strike again and run on.\n        *goto event_select\n      *else\n        *set health -10\n        The wound burns,\n        *if health \u003c 1\n          Your body's already sustained way more damage than it can handle, and you collapse. Your last thought before you die is that you never did make it back to Earth.\n\n          GAME OVER.\n          *goto_scene ending\n        *else\n          but you move forward, undeterred, dodging the Shadow Fiend before she can strike again.\n          *goto event_select\n  *selectable_if (specialization = \"infiltration\") #…look for an alternative way through the passage. (INFILTRATION)\n    *set follower_leader %+20\n    Why go through the passage when you can climb over it? You scale the rocks slowly but steadily, watching in amusement as the oblivious ${third_party} runs through the passage far below you.  Long after the ${third_party}'s gone, you reach the other side and climb down. Smirking, you resume your run.\n    *goto event_select\n\n*label event_3\n*set event_3_used true\nYou pass through a tree-lined area of thick brush.  Worried you're going to get lost, you turn a narrow corner. The path suddenly forks before you. From the left come the distant shouts and cries of battle. You cock your head. From the right, there's only silence.\n*choice\n  #Go left.\n    *set cowardice_bravery %+20\n    *if cowardice_bravery > 65\n      Never one to be scared, you hurry toward the cries of battle. You run right into a crowd of Garce's men and ${third_party} soldiers.  Weaving your way between combatants, you somehow get through without any major harm. Once beyond the skirmish, you keep running.\n      *goto event_select\n    *else\n      Bravery's not your strong suit, but you run toward the cries of battle, anyway. You run right into a crowd of Garce's men and ${third_party} soldiers.  As you weave your way between two officers fighting against a ${third_party}, you're hit several times,\n      *if psrs > 0\n       *set psrs -1\n       though your personal shield recharger protects you from any damage.  A few seconds later, you reach the other side of the group and continue running.\n       *goto event_select\n      *else\n        *set health -10\n        the pain burning across your side.\n        *if health \u003c 1\n          Your body's already sustained way more damage than it can handle, and you collapse. Your last thought before you die is that you never did make it back to Earth.\n          \n          GAME OVER.\n          *goto_scene ending\n        *else\n          Undeterred, you keep running.\n          *goto event_select\n  #Go right.\n    *set cowardice_bravery %-20\n    *if cowardice_bravery \u003c 35\n      A coward, you rush away from the sounds of battle and hurry down the quiet path.  Thankful to have avoided any conflict, you keep running.\n      *goto event_select\n    *else\n      Normally you'd never say no to a good fight, but right now, you run away from the sounds of battle and onto the quiet path.  Seconds later, you trip over something, and a handful of small darts fly at you.\n      *if psrs > 0\n        *set psrs -1\n        Luckily, your personal shield recharger protects you from any damage.  Undeterred by the booby trap, you keep running.\n        *goto event_select\n      *else\n        *set health -10\n        They hit you in the chest, stealing your breath.\n        *if health \u003c 1\n          Your body's already sustained way more damage than it can handle, and you collapse. Your last thought before you die is that you never did make it back to Earth.\n\n          GAME OVER.\n          *goto_scene ending\n        *else\n          Trying your hardest to ignore the pain, you grit your teeth and yank out the darts. Then you keep running.\n          *goto event_select\n  *selectable_if (specialization = \"tactical\") #Cut a new path through the wilderness. (TACTICAL)\n    *set follower_leader %+20\n    You've had enough of other people and circumstances dictating your choices. Thanks to your tactical training, which includes a stint in the wilderness, you know precisely how to cut through the trees and brush. So you create your own path and hurry along it. Several minutes later, you find a small clearing, which leads to another path.  You keep running.\n    *goto event_select\n  *selectable_if (cowardice_bravery \u003c 35) #Turn around. (COWARDICE)\n    *set cowardice_bravery %-30\n    No way, you think.  The left path clearly leads to danger, while the right is too quiet for your tastes—it has to be a trap.  You turn around and run back the way you came.\n    *goto event_select\n\n\n\n*label event_4\n*set event_4_used true\nYou almost jog right by an injured Galactic Police Force officer.  She lies prone, her leg bloody and bent at an unnatural angle. If no one helps her, you realize, she probably won't make it. \n\n*if chosen_side = \"Garce\"\n  \"Please…\" she mutters. \"…Help me.\"\n  *goto event_4_help\n*else\n  The officer spits in your direction.\n  *goto event_4_help\n*label event_4_help\n*choice\n  #Dress the officer's wound as best as you can.\n    *set harsh_kind %+20\n    *set duplicity_loyalty %-10\n    You run over to the officer, rip strips from her uniform, and attempt to bandage her up.\n    *if (harsh_kind > 65)\n      Your kind, patient demeanor calms the officer.  Her bleeding stops, and she falls into a comfortable sleep.  Confident she'll be okay now, you stand and move on.\n      *goto event_select\n    *else\n      Unfortunately, your gruff demeanor brings her little comfort. Though the bleeding stops, she writhes in pain.  You wish you could do something else, but you can't, so you stand and move on.\n      *goto event_select\n  #Try to find help.\n    *set harsh_kind %+10\n    *set follower_leader %-20\n    *set duplicity_loyalty %-20\n    You know nothing about healing. You promise the officer you'll return with help and run off.\n    *if follower_leader > 65\n      After several moments of careful searching, you spot another of Garce's officers. The guard\n      *if chosen_side = \"Garce\"\n        nods at you. You quickly fill him in, and the two of you run back to the injured officer. Once you arrive, the uninjured guard informs you that he'll take over and thanks you for your help. He pulls out some bandages and begins to patch up his injured colleague. Satisfied you've done your part, you move on.\n        *goto event_select\n      *else\n        snarls and raises his pistol. You quickly fill him in, and he puts down his gun. The two of you run back to the injured officer. Once you arrive, the uninjured guard informs you that he'll take over and thanks you for your help. He pulls out some bandages and begins to patch up his injured colleague. Satisfied that you've done your part, you move on.\n        *goto event_select\n    *else\n      You search and search, but eventually you lose hope—just when you need to find someone, you can't. You return to the injured officer alone…only to find her dead. Riddled with guilt, you move on.\n      *goto event_select\n  #Ignore the officer and move on.\n    *set harsh_kind %-20\n    *set duplicity_loyalty %+10\n    The officer isn't your concern, so you ignore her pleas for help and keep running.\n    *goto event_select\n  *selectable_if (specialization = \"science\") #Try to find some plants nearby to heal the the officer. (SCIENCE)\n    *set harsh_kind %+20\n    *set duplicity_loyalty %-20\n    There's not much you can do for the officer without medicine. Since there aren't any med kits nearby, you'll have to find a natural healing agent. Thanks to your scientific training and the lessons Thisi gave you during your time aboard the [i]Lady Luck[/i], you can easily locate a flower with medicinal qualities. Pinching its stem, you sniff it. Yes, you think, this should do nicely.\n    \n    You hurry back to the injured officer and rub the plant's sap into her wound. Seconds later, the officer's pain subsides, and she falls into a comfortable sleep.  Confident she'll be okay, you stand and move on.\n    *goto event_select\n  *selectable_if (harsh_kind \u003c 30) #Knock out the officer.\n    *set harsh_kind %-20\n    *set duplicity_loyalty %+20\n    You can't take the officer's whining another second. You hit her hard over the head, knocking her out.  Serves her right, you think.  With nothing holding you there, you move on.\n    *goto event_select\n  *selectable_if (chosen_side = \"Isan\") #Kill the officer.\n    *set harsh_kind %-30\n    *set duplicity_loyalty %+30\n    You dash over to the officer and kneel by her side. The officer—the enemy—is injured and in pain, making her an easy target. Killing her not only benefits the [i]Lady Luck's crew[/i], but it also puts her out of her misery. It's the only choice, you rationalize as you close your hands around her neck.  Too weak to fight back, the officer soon falls limp. You stand and look down at the pathetic figure.  Well, that's one less problem to worry about, you think before moving on.\n    *goto event_select\n\n\n\n*label event_5\n*set event_5_used true\nAs you round a corner, you come face-to-face with\n*if third_party = \"Shadow Fiend\"\n  Kraska himself!  \"So we meet again, foul human,\" he hisses, smiling cruelly.\n  *if chosen_side = \"Garce\"\n    \"It seems you have chosen to side with your own kind.  That makes us enemies once more!  What say you, meat puppet?\"\n    *goto kraska_questions\n  *else\n    \"Luckily for you, we are not enemies on this day.  Now what say you, meat puppet?  Make it fast, for the battle rages on!\"\n    *goto kraska_questions\n*else\n  a Rekelian. The buglike creature\n  *if (chosen_side = \"Garce\") or (hurt_bugs)\n    *label rekelian_attack\n    clicks menacingly, poised to attack. Before you can move, it strikes, slashing at you with its pincers.\n    *if psrs > 0\n      *set psrs -1\n      Luckily, your personal shield recharger protects you from any damage from the attack. An instant later, the Rekelian scurries off in search of another target.\n      *goto event_select\n    *else\n      *set health -10\n      The pain is immense and\n      *if health \u003c 1\n        brings you to your knees. You collapse a moment later, your eyes closing. The world dims and disappears forever.\n\n        GAME OVER.\n        *goto_scene ending\n      *else\n        nearly knocks you out as the Rekelian scurries off in search of another target.\n        *goto event_select\n  *else\n    pauses, its antennae waving. \"Friend ${name},\" it says.\n    *label rekelian_choice\n    *choice\n      *hide_reuse #\"What are you doing here?\"\n        \"We are here to help friend ${name} and the crew of the [i]Lady Luck[/i] in thanks for your peaceful resolution of our earlier encounter.\"\n        *goto rekelian_choice\n      *hide_reuse #\"What happened to the Vervoo freighter?\"\n        \"We drained it of energy,\" explains the Rekelian, \"and then left the ship adrift.  No one has been injured.\"\n        *goto rekelian_choice\n      *hide_reuse #\"Why are you helping us against Garce's officers?\"\n        The Rekelian's antennae droop.  \"Our brood-keepers have discovered that the ship belonging to the being you identify as 'Garce' is responsible for scattering electrical webs across this sector of space.  It poses a danger to all and must be stopped.\"\n        *goto rekelian_choice\n      *hide_reuse #\"How did you find us?\"\n        \"The Vervoo vessel has excellent sensors,\" replies the Rekelian.  \"Our people scanned for your life signs in order to repay our debt to you.\"\n        *goto rekelian_choice\n      #\"Die, bug!\" (ATTACK)\n        *set harsh_kind %-20\n        *set cowardice_bravery %+20\n        *set duplicity_loyalty %-20\n        *set garce_isan %-20\n        When it comes down to it, you just don't like bugs. You launch yourself at the Rekelian. The insectoid creature\n        *if harsh_kind \u003c 35\n          scurries away in fear. Grinning, you move on.\n          *goto event_select\n        *else\n          *goto rekelian_attack\n      #I don't have any more questions.\"\n        The Rekelian lowers its head in a sign of respect. \"Then I must be off to assist my kindred.\" The insectoid creature scurries off before you can blink. Grinning, you move on.\n        *goto event_select\n\n*label kraska_questions\n*choice\n  *hide_reuse #\"What are your people doing here?\"\n    Kraska narrows his eyes. \"The cursed GPF have scattered their electrical space webs across this entire sector, and several of my people's vessels have crashed as a result. The Shadow Fiend Empire will not stand for such treachery, and it is time for the GPF to learn that important fact.\"\n    *goto kraska_questions\n  *hide_reuse *if (borion_died = true) #\"You must answer for the death of Borion!\"\n    *set duplicity_loyalty %+10\n    *set kraska_borion %+40\n    \"Must I?\"  Kraska laughs heartily.  \"That pathetic slave was a waste of flesh, translucent or not!  I did you a service by ending his miserable existence.\"\n    *goto kraska_questions\n  *hide_reuse *selectable_if (chosen_side = \"Isan\") #\"Why aren't we enemies?\"\n    \"What is it you humans say?  'The enemy of my enemy is my friend'?\"  Kraska's lips curl wickedly.  \"The atrocities the GPF has committed with its electrical space webs far outweighs any personal animosity I may have toward you, ${name}.\"\n    *goto kraska_questions\n  *hide_reuse #\"You betrayed Captain Isan and the [i]Lady Luck[/i]'s crew!\"\n    \"Oh, boo-hoo,\" mocks Kraska.  \"Yes, I betrayed you all.  The universe isn't a fair place, human.  Get used to it!\"\n    *goto kraska_questions\n  *hide_reuse #\"Tell me about the Shadow Fiends and the crown.\"\n    Kraska cocks his head.  \"When it was lost to us, my people became a mere echo of their former selves.  Now that I wield the crown, I can restore my people to their former glory…and the first step to achieving that is destroying the GPF!\"\n    *goto kraska_questions\n  *hide_reuse #\"How did you find us?\"\n    \"I watched you back on Tuskin the first time we arrived,\" explains Kraska.  \"I saw you meet with the human Garce.  Once I left Jeeq with my people, we began to follow the detective and ${garce_his} officers.  We knew that the GPF had been planting those electrical webs, and we were waiting for just the right moment to strike.  That time is now!\"\n    *goto kraska_questions\n  *if (chosen_side = \"Garce\") #\"Die, fiend!\" (ATTACK)\n    *set cowardice_bravery %+20\n    *set duplicity_loyalty %+20\n    *set harsh_kind %-20\n    You've talked enough with this foul creature. Now you launch yourself at him.\n    \n    Unfortunately, Kraska's too fast for you. He dodges your attack, leaving you swinging at the air.\n    *goto kraska_attack\n  *selectable_if (cowardice_bravery \u003c 35) #Run from Kraska. (COWARDICE)\n    *set cowardice_bravery %-10\n    *set follower_leader %+10\n    *set duplicity_loyalty %-10\n    The nightmarish Fiend has plagued you since your first day onboard the [i]Lady Luck[/i], and now it's too much. Breaking under the pressure, you turn and run.\n    \n    Kraska cackles behind you.  \"Run, coward!\" he screams.  \"Run from the Great Kraska and his Shadow Empire!\"\n    \n    You do what he says, running until you know for sure you're alone. Your chest heaving, you stop to catch your breath before moving on.\n    *goto event_select\n  #\"I don't have any more questions.\"\n    Kraska's lips curl.  \"In that case…\"\n\n    *if chosen_side = \"Garce\"\n      *goto kraska_attack\n    *else\n      Kraska breezes right by you.  \"Out of my way,\" he orders, gliding back toward the fight.\n      *goto event_select\n\n*label kraska_attack\nBefore you can move, Kraska drives his bladelike hands into your chest. You scream.\n*if psrs > 0\n  *set psrs -1\n  Luckily, your personal shield recharger protects you from harm.  Kraska glides off, laughing maniacally.\n  *goto event_select\n*else\n  *set health -10\n  The pain is immense and\n  *if health \u003c 1\n    brings you to your knees. You collapse a moment later, your eyes closing. The world dims and disappears forever.\n\n    GAME OVER.\n    *goto_scene ending\n  *else\n    nearly knocks you out as Kraska glides off, laughing maniacally.\n    *goto event_select\n\n\n\n*label event_6\n*set event_6_used true\n*if chosen_side = \"Garce\"\n  *set encounter_type third_party\n  *goto event_6_continued\n*else\n  *set encounter_type \"Garce's\"\n  *goto event_6_continued\n*label event_6_continued\nYou spot a group of ${encounter_type} soldiers approaching.  There's no place for you to hide; you'll have to face them.\n*choice\n  *selectable_if (specialization = \"infiltration\") #Use your infiltration ability to hide in plain sight. (INFILTRATION)\n    *set cowardice_bravery %+10\n    A master of infiltration, you drop to the ground and stay perfectly still, the foliage masking you.\n    *if follower_leader > 75\n      Unfortunately, possibly because of your intimidating presence, your infiltration skills aren't good enough to hide you. The soldiers see you and immediately move to attack.\n      *goto event_select\n    *else\n      To your immense relief, the group passes by without any idea you're there. You wait until they've been gone at least fifteen minutes before standing up and moving on.\n      *goto event_select\n  *selectable_if (suits > 0) #Use a camo suit to hide from the group as it comes by.\n    *set suits -1\n    You quickly don your camo suit and vanish.  You hold your breath for several seconds, waiting for the group to pass. It marches by, never realizing you're there. Relieved, you wait until the suit's energy dissipates, making you visible, and start off again.\n    *goto event_select\n  #Try to quickly run through the group.\n    *set follower_leader %+10\n    *set cowardice_bravery %+10\n    You brace yourself and quickly run through the crowd of ${third_party}, hoping to avoid any serious injury along the way.\n    *if ((follower_leader > 65) and (cowardice_bravery > 65))\n      Used to taking charge, you move without hesitation.  You move so quickly, the group doesn't have time to react until you've already left them behind.  Relieved, you turn a sharp corner, disappearing into the wilderness before the group could even think of following you.\n      *goto event_select\n    *else\n      Unfortunately, you're not used to such bold moves, and you hesitate. The group senses your weakness and swarms to attack.\n      *goto event_6_attack\n    *label event_6_attack\n    *if psrs > 0\n      *set psrs -1\n      Luckily, your personal shield recharger takes the damage for you. You escape unharmed and keep running.\n      *goto event_select\n    *else\n      *set health -10\n      Unfortunately, you incur several scrapes and bruises as they attack.\n      *if health \u003c 1\n        You're worn out by everything you've been through, and this latest onslaught is just too much for you to endure. You keel over, your eyes closing, and breathe your last.\n\n        GAME OVER\n        *goto_scene ending\n      *else\n        In the end, bruised and battered, you manage to escape from the group. Not daring to look back, you keep running.\n        *goto event_select\n  #Try to negotiate your way past the group.\n    *set harsh_kind %+10\n    *set cowardice_bravery %-10\n    You're ridiculously outnumbered, and you know it.  As they approach, you beg them to leave you alone, insisting you're harmless and just want to go home.\n    *if harsh_kind > 65\n      Your sincere words strike a chord with the soldiers. To your astonishment, they allow you to pass unharmed.  Not wanting to push your luck, you run off.\n      *goto event_select\n    *else\n        You speak so brashly and rudely that the soldiers ignore your plea and attack.\n    *goto event_6_attack\n  #Run from the group.\n    *set cowardice_bravery %-20\n    You're ridiculously outnumbered, and you know it. You've got no chance of getting past them, so you attempt to run away.\n    *if follower_leader > 50\n      Unfortunately, they overtake you in no time. Seconds later, they surround you.\n      *goto event_6_attack\n    *else\n      You must seem as unassuming as you feel, because the soldiers don't bother pursuing you. Grateful to have avoided a direct confrontation, you run and run.\n      *goto event_select\n\n\n\n*label event_7\n*set event_7_used true\n\"S-stop right where y-you are!\" stutters a nervous, nasal voice from behind you.  \"Turn around slowly.\"  Quivering with fear, you comply.\n\nYou see a young GPF officer, his laser pistol pointed at your chest. He's clearly out of his element. The crazed, fearful expression on his face tells you he'll shoot you at the slightest provocation.\n*choice\n  *selectable_if (specialization = \"tactical\") #Attack the officer. (TACTICAL)\n    *set harsh_kind %-20\n    *set follower_leader %+20\n    You immediately tackle the young officer,\n    *if harsh_kind \u003c 35\n      punching him in the face and knocking him out.  You disarm the unconscious man and throw the pistol into the nearby brush.  Once you drag him to a safe spot at the side of the path, you move on.\n      *goto event_select\n    *else\n      but you're too soft in your punches. The officer quickly pulls the trigger of his pistol.\n      *if officer_weapons_active = false\n        Nothing happens, because the pistol doesn't work, due to the device Isan activated earlier.  Thankful you planted the device on Garce back on Tuskin, you grab the officer and punch him in the face, knocking him out cold. Quickly disarming the unconscious man, you throw the pistol into the nearby brush.  Once you drag him to a safe spot at the side of the path, you move on.\n        *goto event_select\n      *else\n        *goto officer_pistol_attack\n      *label officer_pistol_attack\n      *if psrs > 0\n        *set psrs -1\n        Thankfully, your personal shield recharger absorbs the damage from the blast. It flashes, startling the officer.  You take advantage of his distraction to knock him out, quickly disarming him and throwing the pistol into the brush nearby. Once you drag him to a safe spot at the side of the path, you move on.\n        *goto event_select\n      *else\n        *set health -10\n        The laser blast hits your chest.\n        *if health \u003c 1\n          The wound pierces your heart, and you collapse, bleeding out.\n\n          GAME OVER.\n          *goto_scene ending\n        *else\n          Luckily, the wound doesn't appear fatal. Stunned by what he just did, the officer jumps up and runs off.  Ignoring the pain as best you can, you stand and move on.\n          *goto event_select\n  *selectable_if (pistol_charges > 0) #Shoot the officer with your laser pistol.\n    *if crew_weapons_active = false\n      You quickly raise your weapon and fire at the officer…only to find that it doesn't work.  Cursing your poor luck, you remember Garce activated the device you planted on Isan, disabling everyone's weapons.\n      \n      The young officer smirks and pulls the trigger of his pistol.\n      *if officer_weapons_active = false\n        It doesn't work, either, due to the device Isan activated earlier. Thankful you planted the device on Garce back on Tuskin, you punch the officer in the face, knocking him out cold. Quickly disarming the unconscious man, you throw the pistol into the nearby brush. Once you drag him to a safe spot at the side of the path, you move on.\n        *goto event_select\n      *else\n        *goto officer_pistol_attack_b\n      *label officer_pistol_attack_b\n      *if psrs > 0\n        *set psrs
