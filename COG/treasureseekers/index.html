always the case? Well, I hope you can get them sorted out! Please know you'll always have a home here with us.\"\n      *goto ending_lady_luck_engine_earth_end\n    #\"Actually, I was hoping to stay on as a member of the crew.\"\n      Thisi winks. \"I think that can be arranged.\" The Nyarri pats you on the back and leads you out of the room. \"Come on. Let's see if we can find a job for you here on the ship. You've shown everyone what you're capable of - I'm sure there's something around here for you to do.\"\n      *goto ending_lady_luck_engine_ll_end\n\n*label ending_lady_luck_engine_ll_end\n*page_break\nSeveral days later, the [i]Lady Luck[/i] arrives on Earth—though you'll be staying right where you are. The others can trade and look around the place all they want, but now that you're a permanent member of the crew, your former home planet holds nothing for you. You can't wait to begin your journey toward all the adventures yet to come.\n\nTHE END.\n*goto_scene ending", "choicescript_description": "Jump to hyperspace aboard the Lady Luck, the fastest starship in the galaxy! Join her ragtag crew of space pirates, or infiltrate their ranks, working undercover for the Galactic Police.\n\n[i]Treasure Seekers of Lady Luck[/i] is an interactive sci-fi novel by Christopher Brendel, where your choices determine how the story proceeds.  The game is entirely text-based—without graphics or sound effects—but driven by the vast, unstoppable power of your imagination.\n\nThe fate of the ship rests in your hands!  Will you play as male or female?  Gay or straight?  Will you unlock the mystery hidden in the heart of the ship?\n", "choicescript_stats": "*temp ship_rank\n*set ship_rank \"\"\n*temp spec\n*set spec 0\n*if suspicion > 100\n  *set suspicion 100\n*if suspicion \u003c 0\n  *set suspicion 0\n*if health > 100\n  *set health 100\n\n\n*if rank = 1\n  *set ship_rank \"Prisoner\"\n  *goto set_specialization\n*elseif rank = 2\n  *set ship_rank \"Slave\"\n  *goto set_specialization\n*elseif rank = 3\n  *set ship_rank \"Passenger\"\n  *goto set_specialization\n*elseif rank = 4\n  *set ship_rank \"Junior Crewmember\"\n  *goto set_specialization\n*elseif rank = 5\n  *set ship_rank \"Senior Crewmember\"\n  *goto set_specialization\n*elseif rank = 6\n  *set ship_rank \"Captain of the [i]Lady Luck[/i]\"\n  *goto set_specialization\n\n*label set_specialization\n\n*if specialization = \"none\"\n  *set spec \"None\"\n  *goto chart\n*elseif specialization = \"infiltration\"\n  *set spec \"Infiltrator\"\n  *goto chart\n*elseif specialization = \"science\"\n  *set spec \"Scientist\"\n  *goto chart\n*else\n  *set spec \"Tactician\"\n  *goto chart\n\n*label chart\n\nCHARACTER:\n*stat_chart\n  text name Name\n  text gender Gender\n  percent health Health\n  text ship_rank Rank\n  text spec Specialization\n  percent expertise Expertise\n  opposed_pair cowardice_bravery\n    Bravery\n    Cowardice\n  opposed_pair follower_leader\n    Leader\n    Follower\n  opposed_pair harsh_kind\n    Kind\n    Harsh\n\n\nINVENTORY:\n*stat_chart\n  text Credits\n  text suits Camo Suits\n  text pistol_charges Pistol Charges\n  text lockpicks Sonic Lockpicks\n  text HRDs\n  text PSRs\n\nCREW:\n*stat_chart\n  percent suspicion Suspicion\n  opposed_pair duplicity_loyalty\n    Loyalty\n    Duplicity\n\n\nSOCIAL:\n*stat_chart\n  opposed_pair garce_isan\n    Isan\n    Garce\n  opposed_pair thisi_taloo\n    Taloo\n    Thisi\n  opposed_pair rallix_shelou\n    Shelou\n    Rallix\n  opposed_pair kraska_borion\n    Borion\n    Kraska", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Permanently remove all ads and delays.\n\n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  You've paid to permanently remove all ads and delays.\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Treasure Seekers of Lady Luck.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 7200 $4.99 $0.99\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Idric Mirrin\"\n*set gender \"Male\"\n*set health 50\n*set rank 3\n*set specialization \"none\"\n*set expertise 35\n*set cowardice_bravery 63\n*set follower_leader 55\n*set harsh_kind 40\n*set suspicion 20\n*set duplicity_loyalty 83\n*set garce_isan 55\n*set thisi_taloo 15\n\n\nYour sense of self-preservation pays off; the corridor is lined with multiple small doors, and a sign labels them as entrances to escape pods. But the doors are closed. Your stomach drops. They wouldn't be closed if the pods hadn't already been launched.\n\nYour hands ball into fists—this isn't fair!—until you realize there's one door still open. One pod still intact. Grinning so hard your cheeks ache, you stride toward the aperture. You knew you were going to make it.\n\nYou're almost there when a flash of movement registers at the corner of your vision. Looking up, you see a young girl, no older than twelve. Her watery eyes are huge, and she's gnawing on her thumbnail.\n\nYour gaze swivels disbelievingly from her to the pod. Who left her here? Then you notice there's only room in the pod for one person. \n\n*fake_choice\n\t#Put the child in the evacuation pod.\n\t#Get into the evacuation pod yourself.\n\n\n*script changeBackgroundColor(\"black\")\n\n*set name \"Idric Mirrin\"\n*set gender \"Male\"\n*set health 60\n*set rank 4\n*set specialization \"science\"\n*set expertise 65\n*set cowardice_bravery 67\n*set follower_leader 48\n*set harsh_kind 68\n*set suspicion 40\n*set duplicity_loyalty 50\n*set garce_isan 45\n*set thisi_taloo 49\n\n\n\n\nYou look around the bridge. Every single piece of equipment is ridiculously outdated, and all but two computer systems appear to be offline.  There's no sign of the Vervoo. It's as if the air swallowed them up, you think, shuddering. At least there's no trace of your crew, either.\n\nYou thought you'd gotten away, but your stomach drops. Thisi B'Artunt and Rallix stand at a computer console near the bridge's center. Rallix immediately spots you, its yellow eyes narrowing. Its forelegs shake violently. So much for your escape attempt.\n\n\"Where have you been?!\" it growls, livid.\n\n\"I needed the latrine!\" you lie. Rallix looks like it's about to lunge at you, and you brace yourself.\n\n\"Worry about it later, honey,\" says Thisi, tapping away at the computer console. \"Right now, we could really use ${name}'s help.\"\n\nThisi searches out your gaze with his. \"${name}, would you be a dear and help me with this computer?  I'm trying to access the commanding officer's logs.  They may give us some indication of what happened here.\"\n\n*fake_choice\n\t*selectable_if (specialization = \"science\") #\"Of course, Thisi.  Anything for you.\" (SCIENCE)\n\t*selectable_if (specialization != \"science\") #\"Of course, Thisi.  I'm great with computers.\" (Lie.)\n\t*if (specialization != \"science\") #\"I'd love to help, but I don't know much about computers.\"\n\t*if (specialization = \"science\") #\"I'd love to, but I don't know much about computers.\" (Lie.)\n\t#\"I don't want anything to do with you, Thisi.\"\n\n\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Eileen Gilmore\"\n*set gender \"Female\"\n*set health 60\n*set rank 4\n*set specialization \"none\"\n*set expertise 47\n*set cowardice_bravery 71\n*set follower_leader 37\n*set harsh_kind 33\n*set suspicion 15\n*set duplicity_loyalty 72\n*set garce_isan 71\n*set thisi_taloo 25\n\n\n\nYou greet the captain, and ${isan_he} nods almost imperceptibly. \"We're returning to Tuskin,\" ${isan_he} says, not moving from ${isan_his} position near the window. \"After what happened on Jeeq, I think we could all use some time to recover.\"  ${isan_he} turns to face you, and ${isan_his} eyes are dark with regret.  \"Kraska's betrayal devastated us all.  I should've seen it coming, should have known better.  But I was stupid. I had my eyes set on the treasure…on profit. We only survived because of dumb luck…and because of you.  This disaster of a mission—it's all my fault.\"\n*fake_choice\n\t#\"It's completely your fault. You should be ashamed of yourself.\"\n\t#\"What happened was everyone's fault. We all agreed to the mission, and we're all to blame.\"\n\t#\"No one's at fault for what happened. No one, that is, but Kraska.\"\n\n\n\n\n*set name \"Eileen Gilmore\"\n*set gender \"Female\"\n*set health 40\n*set rank 5\n*set specialization \"science\"\n*set expertise 72\n*set cowardice_bravery 53\n*set follower_leader 71\n*set harsh_kind 59\n*set suspicion 45\n*set duplicity_loyalty 72\n*set garce_isan 53\n*set thisi_taloo 59\n\n\n\nThe detective ignores you.  \"Now since that time, you've been taken onto the vessel [i]Lady Luck[/i], captained by a man named Isan Cehnta. The name just rolls off your tongue, doesn't it?\"  Garce chuckles. \"Anyway, this ship specializes in what you might call the 'retrieval business.' But we both know what it really is—a pirate ship. More importantly, I don't think you have what it takes to be part of that kind of operation. Am I right?\"\n\n*fake_choice\n\t#\"I love being a part of the crew.\"\n\t#\"I couldn't care less about the crew.\"\n\t#\"I hate the crew and can't wait to get away from them.\"\n\n\n\n*if choice_is_ios_app\n\t*finish\n\n\n\n\n*comment *fake_choice\n*comment \t#\"What if we attempt to communicate with them and explain that we mean them no harm?\"\n*comment \t#\"If we play our cards right, we can disable them.\"  (SCIENCE)\n*comment \t#\"We should kill them all...and I just might know how!\" (TACTICAL)\n*comment \t#\"None of this is our business.  Let's avoid them.\"  (INFILTRATION)\n*comment \n*comment The detective ignores you.  \"Now since that time, you've been taken onto the vessel [i]Lady Luck[/i], captained by a man named Isan Cehnta. The name just rolls off your tongue, doesn't it?\"  Garce chuckles. \"Anyway, this ship specializes in what you might call the 'retrieval business.' But we both know what it really is—a pirate ship. More importantly, I don't think you have what it takes to be part of that kind of operation. Am I right?\"\n\n\n\n*set name \"Idric Mirrin\"\n*set gender \"Male\"\n*set health 50\n*set rank 3\n*set specialization \"none\"\n*set expertise 35\n*set cowardice_bravery 63\n*set follower_leader 55\n*set harsh_kind 40\n*set suspicion 20\n*set duplicity_loyalty 83\n*set garce_isan 55\n*set thisi_taloo 15\n\nThe hall ends, but on either side of the corridor are multiple open doors, so short that you'll have to duck down to pass through them.  A sign above these doors labels them as entrances to evacuation pods.\n\nScreaming, everyone in your group runs to the pods. In the mad dash to be first, a desperate few shove the people around them out of the way. No one bothers to check if anyone else needs help. Instead, they immediately claim their seats and strap themselves in.  The doors on the occupied pods quickly seal shut, and you hear a loud \"thump\" as each pod is ejected.\n\nA mere thirty seconds later, you find yourself standing alone in the hall. No, you realize, you're standing next to a young human girl. She's staring ahead, her eyes huge, and gnawing on a thumbnail. She can't be any older than twelve.\n\nYou glance around, looking for her parents. That's when you notice that there's only one pod left.  Not only that, but there's only room in the pod for one person.\n\n*fake_choice\n\t#Put the child in the evacuation pod.\n\t#Get into the evacuation pod yourself.\n*comment \n*comment \"They're clearly hostile,\" surmises Thisi in a much more reasonable tone, \"but that doesn't mean we can't find a peaceful way to deal with them.  We're just here to collect some valuables, after all.  We mean them no harm.\"\n*comment \n*comment *fake_choice\n*comment   #\"What if we attempt to communicate with them and explain that we mean them no harm?\"\n*comment   #\"If we play our cards right, we can disable them.\"  (SCIENCE)\n*comment   #\"We should kill them all...and I just might know how!\" (TACTICAL)\n*comment   #\"None of this is our business.  Let's avoid them.\"  (INFILTRATION)\n*comment \n*comment The detective ignores you.  \"Now since that time, you've been taken onto the vessel [i]Lady Luck[/i], captained by a man named Isan Cehnta. The name just rolls off your tongue, doesn't it?\"  Garce chuckles. \"Anyway, this ship specializes in what you might call the 'retrieval business.' But we both know what it really is—a pirate ship. More importantly, I don't think you have what it takes to be part of that kind of operation. Am I right?\"\n*comment \n*comment *fake_choice\n*comment   #\"I love being a part of the crew.\"\n*comment   #\"I couldn't care less about the crew.\"\n*comment   #\"I hate the crew and can't wait to get away from them.\"", "startup": "*title Treasure Seekers of Lady Luck\n*author Christopher Brendel\n\n*scene_list\n  startup\n  chapter_1b_lab\n  chapter_1b_engine\n  chapter_1b_brig\n  chapter_1b_ops\n  chapter_1c_captain\n  chapter_2a_intro\n  chapter_2b_mission_start\n  chapter_2b_mission_plan\n  chapter_2b_mission_bridge\n  chapter_2c_outro\n  chapter_3a_intro\n  chapter_3b_tuskin_start\n  chapter_3b_tuskin_garce\n  chapter_3b_tuskin_ship\n  chapter_3b_engine_room\n  chapter_3c_outro\n  chapter_4a_intro\n  chapter_4b_jeeq\n  chapter_4c_jeeq_chase\n  chapter_5a_intro\n  chapter_5b_tuskin\n  chapter_5b_tuskin_garce\n  chapter_5c_outro\n  chapter_6a_intro\n  chapter_6b_tactical\n  chapter_6b_science\n  chapter_6b_infiltration\n  chapter_6c_outro\n  chapter_7a_intro\n  chapter_7b_attack\n  chapter_7c_outro\n  chapter_8\n  ending\n\n\n\n*create name \"???\"\n*create gender \"???\"\n*create health 100\n*create specialization \"none\"\n*create expertise 0\n*create rank 3\n*create infiltration 0\n*create science 0\n*create tactical 0\n*create credits 0\n*create suits 0\n*create pistol_charges 0\n*create hrds 0\n*create psrs 0\n*create lockpicks 0\n*create duplicity_loyalty 50\n*create garce_isan 50\n*create rallix_shelou 50\n*create thisi_taloo 50\n*create kraska_borion 50\n*create suspicion 0\n*create cowardice_bravery 50\n*create follower_leader 50\n*create harsh_kind 50\n*create origin 0\n*create girl_saved false\n*create ran_away_from_crew false\n*create mission_success_level 0\n*create hurt_bugs false\n*create bugs_attacked false\n*create has_stolen_treasure_vervoo false\n*create has_stolen_treasure_ship false\n*create has_stolen_treasure_jeeq false\n*create has_stolen_treasure_ship_2 false\n*create saw_log false\n*create helped_bugs false\n*create like_tuskin_level 0\n*create took_garce_offer false\n*create told_isan_about_garce false\n*create friend \"none\"\n*create teammate \"none\"\n*create planted_device false\n*create borion_died false\n*create planted_device_garce false\n*create number_of_goods_stolen 0\n*create has_second_device false\n*create essch_mistakes 0\n*create chosen_side \"none\"\n*create third_party \"\"\n*create killed_garce false\n*create killed_isan false\n*create isan_arrested false\n*create isan_crew_arrested false\n*create isan_sacrifice false\n*create isan_gender \"man\"\n*create garce_gender \"man\"\n*create thela_gender \"woman\"\n*create isan_he \"he\"\n*create garce_he \"he\"\n*create thela_he \"she\"\n*create isan_his \"his\"\n*create garce_his \"his\"\n*create thela_his \"her\"\n*create isan_him \"him\"\n*create garce_him \"him\"\n*create thela_him \"her\"\n*create thela_husband \"wife\"\n*create isan_sir \"sir\"\n*create crew_weapons_active true\n*create officer_weapons_active true\n*create met_security_officer false\n*create thisi_gender \"woman\"\n*create thisi_he \"she\"\n*create thisi_his \"her\"\n*create thisi_him \"her\"\n*create preference \"neither\"\n*create killed_rekelians false\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Jump to hyperspace aboard the Lady Luck, the fastest starship in the galaxy! Join her ragtag crew of space pirates, or infiltrate their ranks, working undercover for the Galactic Police.\n\n  [i]Treasure Seekers of Lady Luck[/i] is an interactive sci-fi novel by Christopher Brendel, where your choices determine how the story proceeds.  The game is entirely text-based—without graphics or sound effects—but driven by the vast, unstoppable power of your imagination.\n\n  The fate of the ship rests in your hands!  Will you play as male or female?  Gay or straight?  Will you unlock the mystery hidden in the heart of the ship?\n\n  [i]You can play the first two chapters of the game for free. Purchase the rest of the game below.[/i]  \n  *if choice_is_steam\n    [i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n    *goto next\n  *elseif choice_is_advertising_supported\n    [i]The Treasure Seekers of Lady Luck[/i] is supported by advertisements, but you can buy the unlimited version to turn off ads forever.\n    *goto next\n  *else\n    [i]You can play through the game for free, with twenty minute breaks between chapters, or purchase unlimited replays below.[/i]\n    *goto next\n  *label next\n  *purchase adfree $4.99 purchased\n  *if choice_is_advertising_supported\n    *page_break_advertisement\n  *if not(choice_is_advertising_supported)\n    *page_break Play Now for Free\n\n*label purchased\n\n*comment -----GENERATE RANDOM GENDERS FOR ISAN, THISI, GARCE, AND THELA-----\n*temp gender_generate\n*rand gender_generate 0 1\n*if gender_generate = 0\n  *set isan_gender \"man\"\n  *set isan_he \"he\"\n  *set isan_his \"his\"\n  *set isan_him \"him\"\n  *set isan_sir \"sir\"\n  *goto gender_select_2\n*else\n  *set isan_gender \"woman\"\n  *set isan_he \"she\"\n  *set isan_his \"her\"\n  *set isan_him \"her\"\n  *set isan_sir \"ma'am\"\n  *goto gender_select_2\n*label gender_select_2\n*rand gender_generate 0 1\n*if gender_generate = 0\n  *set garce_gender \"man\"\n  *set garce_he \"he\"\n  *set garce_his \"his\"\n  *set garce_him \"him\"\n  *goto gender_select_3\n*else\n  *set garce_gender \"woman\"\n  *set garce_he \"she\"\n  *set garce_his \"her\"\n  *set garce_him \"her\"\n  *goto gender_select_3\n*label gender_select_3\n*rand gender_generate 0 1\n*if gender_generate = 0\n  *set thela_gender \"man\"\n  *set thela_he \"he\"\n  *set thela_his \"his\"\n  *set thela_him \"him\"\n  *set Thela_husband \"husband\"\n  *goto start_of_game\n*else\n  *set thela_gender \"woman\"\n  *set thela_he \"she\"\n  *set thela_his \"her\"\n  *set thela_him \"her\"\n  *set Thela_husband \"wife\"\n  *goto start_of_game\n\n*comment -----START OF GAME-----\n*label start_of_game\nCHAPTER 1 - THE ADVENTURE BEGINS\n\nAn alarm klaxon blares, jerking you awake. Where am I? you wonder, your brain still foggy with sleep. You rub your gritty eyes and take in the details: a tiny cabin, a regulation dresser, sheets tangled around your waist. Then it hits you: you're on a bed in a transport ship headed to the galactic frontier.\n\nYou're here because…\n*choice\n  #…you want an adventure.\n    *set origin 1\n    Looking back, it was just a matter of time.  While your space-fearing grandfather still lived, you'd passed your days on boring, predictable Earth, never once setting foot beyond your own solar system.  But you'd always known there had to be more. A whole universe existed outside your borders, after all.  So once your grandfather passed on, leaving you a small fortune, off you went.\n    *goto three_days_out\n  #…you want to pay off your family's debts.\n    *set origin 2\n    In retrospect, you couldn't have made any other decision.  You'd lived a simple life on Earth, content to while away your days on your home planet.  Let others do the risk taking, you thought.  You had what little you needed. Then your parents died in a crash. Even worse, you learned your father had left you quite the inheritance: a mess of unpaid debts to some less-than-reputable \"businessmen.\"  Your had two choices: either let the your father's former associates break your bones or head to the galactic frontier in search of work to square the debts.\n    *goto three_days_out\n  #…you want to hide from the law.\n    *set origin 3\n    You'd had no choice. Lonely and bored, you'd fallen in with a popular gang of Earth-bound thrill-seekers. Before long, your new friends' harmless games escalated into a slew of illegal activities, some of which you'd give anything to forget.  Unfortunately for you, the authorities remember all too well, and they're determined to bring you in.  Desperate to escape a life behind bars, you booked immediate passage to the galactic frontier.\n    *goto three_days_out\n\n*label three_days_out\nWhen you'd gone to bed, the transport ship, the [i]Cheyenne[/i], was three days out from your destination of Polarium Theta.  You lean over and check the time. That was less than two hours ago.\n\nThe alarm speeds up—clang! clang! clang!—as the ship's loudspeakers spit out a prerecorded message:  \"Warning, warning.  All hands, abandon ship.  This is not a drill.  Repeat:  All hands, abandon ship.  This is not a drill…\"\n*temp stay_bed\n*set stay_bed false\n*temp panic\n*set panic false\n*choice\n  #Stay in bed.\n    *set follower_leader %-10\n    You figure if this were a real emergency, someone would come get you.  For all you know, you're still dreaming.  Either way, your bed's so nice and cozy, why get up?\n    *set stay_bed true\n    *goto quarters_action\n  #Calmly get dressed.\n    *set follower_leader %+10\n    Never one to take unnecessary chances, you climb out of bed. Palming your room key, you step into your neatly folded clothes. Whatever's going on, you'll need a cool head to deal with it.\n    *goto quarters_action\n  #Panic.\n    *set cowardice_bravery %-20\n    Panicking, you hop out of bed and dart madly around your cramped quarters. Clothes? Who needs clothes when you're about to die?\n    *set panic true\n    *goto quarters_action\n*label quarters_action\n\nA minute later, the ship bucks sharply, causing you\n*if stay_bed = true\n  to roll out of bed.  You sigh, toss your warm bed a longing glance, and reluctantly get dressed.\n  *goto quarters_stay\n*else\n  to lose your footing.  Gasping, you crash painfully onto the oddly vibrating deck.  Something's clearly wrong.\n  *if panic = true\n    Fear sweeps over you, making your stomach clench and your pulse race. Your breath comes too quickly, and one word echoes in your mind: Escape!\n    *goto quarters_stay\n  *else\n    *goto quarters_stay\n*label quarters_stay\n\nYour thoughts race. If the transport vessel really is in danger, the next few seconds could save—or end—your life. Knowing that, you…\n*choice\n  #…stay put in your quarters.\n    *set follower_leader %-10\n    *if panic = true\n      Too panicked to think straight, you stay where you are, your heart slamming against your rib cage and your hands shaking. Your eyes dart wildly around the room, hunting for a way out.\n      \n      The deck shakes several more times, and you begin to hyperventilate.\n        \n      Just you're about to pass out,\n      *goto sec_officer_door\n    *else\n      You weigh your options. The smart thing to do, you decide, is to remain where you are and wait for updates.  Fear screams at you to run, but you shove it down and head for the lumpy sofa in the corner. Panicking never got anyone anywhere.\n\n      The deck shakes several more times, each tremor more violent than the last.\n\n      Just as you start to reconsider,\n      *goto sec_officer_door\n    *label sec_officer_door\n    *set met_security_officer true\n    the door leading into the hallway slides open, and a uniformed security officer bursts into the room.\n\n    \"The ship's been hit!\" she shouts.  \"We have to evacuate!  Now!\"\n    *choice\n      *if panic = true\n        #Continue panicking.\n          *set cowardice_bravery %-10\n          *set follower_leader %-20\n          Wheezing with panic, you gape at her.  All you want to do is escape, but your body won't move. The irritated security officer has no choice but to drag you into the hall.\n          *goto hall_choice\n      #Lead the way into the hall.\n          *set follower_leader %+10\n          *goto hall_choice\n      #Follow the security officer into the hall.\n          *set follower_leader %-10\n          *goto hall_choice\n  #…exit into the hall.\n    *set follower_leader %+10\n    Deciding to heed the automated message, you make your exit into the ship's public hallway.\n    *goto hall_choice\n*label hall_choice\n\nYou've never seen the hall out of control like this.  Smoke wafts from several ruptured pipes, and dozens of passengers dash willy-nilly through the corridor.  Throwing yourself to the right, you barely avoid smashing into a gawky boy. Your mouth goes dry as you realize you've lost the officer in the commotion. Where do you go now?\n\n*if met_security_officer\n  \"This way,\" calls another officer, waving you down. His partner quickly directs you to join a group of terrified-looking passengers.  \"We're going to the escape pods!  Just do what we say, and everything will be all right.\"\n*if met_security_officer = false\n  \"This way,\" calls a security officer, waving you down.  His partner quickly directs you to join a group of terrified-looking passengers.  \"We're going to the escape pods!  Just do what we say, and everything will be all right.\"\n*choice\n  #Offer to assist the officers.\n    *set follower_leader %+20\n    You're not about to risk ending up alone again. Time to make yourself useful, you think. \"I can help!\" you say to the first officer, smiling widely. \"Just tell me what you need me to do.\"\n    \n    The officers exchange glances, and the second one shrugs. \"That's very kind of you,\" says the first. He points to a half-dozen people sprinting past. They look as bewildered as you felt just a moment ago.  \"Please walk with that group and ensure that they get into the escape pods safely, then get yourself out, too.  We'll handle the rest!\"\n    *goto follow_the_group\n  #Follow the security officer and remain with the group.\n    *set follower_leader %-10\n    *label follow_the_group\n    Nervous, you chase after the group fleeing down the corridor.  A single question drums through your head in time with the pounding of your footsteps: Can you possibly survive whatever's happening?\n\n    As you approach a ninety-degree turn in the hall, a bulkhead suddenly explodes outward, exposing the corridor to the star-dotted vastness of deep space.\n    *choice\n      #Grab hold of something.\n        You race to grab onto a small railing along the wall, but before you get there,\n        *goto bulkhead_A\n      #Dive to the side.\n        Without thinking, you dive toward the other side of the deck.  As you do,\n        *goto bulkhead_A\n    *label bulkhead_A\n    a force field zaps into place, immediately repressurizing the deck.  You're safe! Unfortunately, two of the passengers aren't so lucky.  You watch helplessly as they're sucked through the hole into eternal night. You already know their faces will haunt your dreams.\n\n    \"Keep moving!\" shouts a security officer. You do, feeling sick.\n    *page_break Continue down the corridor.\n\n    The hall ends, but on either side of the corridor are multiple open doors, so short that you'll have to duck down to pass through them.  A sign above these doors labels them as entrances to evacuation pods.\n\n    Screaming, everyone in your group runs to the pods. In the mad dash to be first, a desperate few shove the people around them out of the way. No one bothers to check if anyone else needs help. Instead, they immediately claim their seats and strap themselves in.  The doors on the occupied pods quickly seal shut, and you hear a loud \"thump\" as each pod is ejected.\n\n    A mere thirty seconds later, you find yourself standing alone in the hall. No, you realize, you're standing next to a young human girl. She's staring ahead, her eyes huge, and gnawing on a thumbnail. She can't be any older than twelve.\n\n    You glance around, looking for her parents. That's when you notice that there's only one pod left.  Not only that, but there's only room in the pod for one person.\n    *goto hall_child\n  #Run off on your own.\n    *set follower_leader %+10\n    You ignore the security officer's instruction. If you don't save yourself, no one else will, and you didn't come this far to die now. Using the chaos around you to your advantage, you weave in and out of the crowd until you can take off down the corridor.\n\n    As you approach a ninety-degree turn in the hall, a bulkhead suddenly explodes outward, exposing the corridor to the star-dotted vastness of deep space.\n    *choice\n      #Grab hold of something.\n        You race to grab onto a small railing along the wall, but before you get there,\n        *goto bulkhead_B\n      #Dive to the side.\n        Without thinking, you dive toward the other side of the deck.  As you do,\n        *goto bulkhead_B\n    *label bulkhead_B\n    a force field zaps into place, immediately repressurizing the deck.  You catch your breath and try hard not to vomit. A single question drums in your head: Can you possibly survive whatever's happening?\n    *page_break Continue down the corridor.\n\n    Your sense of self-preservation pays off; the corridor is lined with multiple small doors, and a sign labels them as entrances to escape pods. But the doors are closed. Your stomach drops. They wouldn't be closed if the pods hadn't already been launched.\n\n    Your hands ball into fists—this isn't fair!—until you realize there's one door still open. One pod still intact.  Grinning so hard your cheeks ache, you stride toward the aperture. You knew you were going to make it. \n\n    You're almost there when a flash of movement registers at the corner of your vision. Looking up, you see a young girl, no older than twelve.  Her watery eyes are huge, and she's gnawing on her thumbnail.\n\n    Your gaze swivels disbelievingly from her to the pod. Who left her here? Then you notice there's only room in the pod for one person.\n    *goto hall_child\n*label hall_child\n*choice\n  #Put the child in the evacuation pod.\n    *set cowardice_bravery %+20\n    *set girl_saved true\n    Without a thought for your own safety, you urge the distraught girl into the final evacuation pod. \"You'll be safe,\" you assure her.  What else could you do?\n\n    The door to the pod closes before your eyes, and your only chance for escape ejects without you. You want to live, but you never could have paid the price of that girl's life in exchange for yours. \n\n    The ship shudders, knocking you to the deck. Your head smacks the floor, opening a gash on your temple.  Heat intense enough to fry a million eggs slaps you in the face. Addled, you assume it's a hallucination brought on by the pain. Then the air hisses—the telltale sound of decompression.  You close your eyes, accepting your fate.  At least the girl will be safe.\n    *goto launch\n  #Get into the evacuation pod yourself.\n    *set cowardice_bravery %-20\n    Your heart goes out to the girl, but it's you or her. Surely someone will come around to rescue her, right? Turning your back on her teary face, you settle into the escape pod's cramped compartment. You grimace. The pod definitely wasn't built for comfort, consisting of nothing beyond a chair, a seat belt, and a bright red button. Just as you're thinking the journey had better be short, the door to the pod hisses shut behind you.\n\n    You immediately buckle yourself in and press the button.  With a nauseating jolt, your pod launches.  The g-force from the sudden speed shoves you deep into your seat. You're sure the pressure's going to crush your skull.  Closing your eyes, you accept your fate.\n    *goto launch\n*label launch\n\nAnd then…\n\nBlackness.\n*page_break\nYou're lying on your back, your eyes shut. The last thing you remember is the smell of burning metal searing your nostrils.  The air around you feels cool, and the acrid stench is blessedly absent. Just how long were you out?\n\nKeeping your eyes closed, you shift slightly to one side. The touch of what feels like cold metal makes you shiver. Good—if you're shivering, you're alive. You gently flex your various body parts one by one. Sore, you think, but not injured.\n\nThe hair on your arms prickles. Someone's nearby.\n*choice\n  #Open your eyes.\n    You open your eyes.\n    *goto wake_up\n  #Keep your eyes closed.\n    \"H-hey,\" a soft, nervous voice stammers.  \"Wake up.  You awake yet?\"  A second later, something pokes your abdomen, startling you enough that you open your eyes.  \"Ha,\" the lanky male humanoid seated before you crows, \"I knew you were awake!\"\n    *goto wake_up\n*label wake_up\n*temp questions\n*set questions 0\nWary, you take in every detail of your dubious savior. His lanky frame sports nothing more than a pair of torn brown pants, and a small electric collar rings his neck. The latter makes you wince, but it's his blue-tinted, translucent skin that catches your attention. He's a Vervoo—a slave race.  The man looks at you expectantly, his cheek twitching, his fingers picking at one another. His expression is kind but apprehensive.\n*label initial_questions\n*choice\n  *hide_reuse #\"Who are you?\"\n    The Vervoo's face breaks into an unabashed smile.  \"Borion,\" he says. \"Borion Olmo.  It's nice to meet you…um…w-what's your name, anyway?\"\n    *input_text Name\n    \"And you're a…\"\n    *choice\n      #\"Male.\"\n        *set gender \"male\"\n        *goto gender_continued\n      #\"Female.\"\n        *set gender \"female\"\n        *goto gender_continued\n    *label gender_continued\n    The words spill from his mouth. \"Okay, great.  It's n-nice to meet you, ${name}!  Wow, you're human, aren't you?  I've never met a human before.\"  Borion's eyes narrow.  \"You know, you remind me of someone.  B-back in my days before working on this ship, I used to—\"  He pauses, then shakes his head.  \"S-sorry.  Thisi's always reminding me that I t-talk too much.  I'm sure you don't c-care about my story.\"\n    *set kraska_borion %+20\n    *set questions +1\n    *choice\n      #\"No, please continue.\"\n        *set harsh_kind %+20\n        Borion's eyes widen. \"Really?  Wow, okay.  Well, b-back before I worked on this ship, I used to be a c-cook on a Davarian carrier.  This one soldier, I f-forget the name, used to c-come in every day and eat like you wouldn't believe.  Looked j-just like you!\" Borion gestures to his neck.  \"Anyway, you're p-probably wondering about this collar.\"  You nod, encouraging him to continue.\n        *goto slave\n      #\"Who is Thisi?\"\n        \"Oh, Thisi?  Didn't realize I m-mentioned her.  Thisi is the ship's s-science officer.  You'll meet her soon!\"\n\n        Borion gestures toward his neck.  \"Anyway, you're probably wondering about this collar.\"  You look from the collar back to Borion, waiting for him to continue.\n        *goto slave\n      #\"You're right, slave. I don't.\"\n        *set harsh_kind %-20\n        Borion's cheeks redden—an amusing sight, given his bluish skin. Too bad you don't like purple. \"Oh, you noticed the c-collar, did you?  Or maybe you're just f-familiar with my species?\"  You look from the collar back to Borion, waiting for him to continue.\n        *goto slave\n  *hide_reuse #\"Where am I?\"\n    The Vervoo looks around.  You lift your head to do the same, and your surroundings come into focus. Rather than the deck you were expecting, you're lying on a solid bed frame with no mattress. You frown. Why no mattress? The bunk itself is small but tidy, and the view of the stars through the window steals your breath away.\n\n    The Vervoo scrunches up his face in obvious confusion.  \"Where are you?  You're in my q-quarters, of course!\"  He stops, and you can almost see the neurons firing in his brain.  \"Ooh, you mean where [i]are[/i] you?\"  He gestures around the room.  \"Welcome to the [i]Lady Luck[/i], f-fastest ship in the galaxy!\"\n    *set kraska_borion %+20\n    *set questions +1\n    *goto initial_questions\n  *hide_reuse #\"What happened?\"\n    The Vervoo drops his gaze, but you don't miss his furrowed brow.  \"Your ship crashed,\" he explains.  \"Engine failure—or s-sabotage, if you ask Thisi.  You don't see that h-happen too often in this sector.\"  He looks back up and gives you a small, encouraging smile.  \"Luckily for you, we were p-passing by when we did.\n    *if girl_saved = true\n      We found a f-few escape pods, but they didn't make it past the b-blast of the ship—everyone onboard was k-killed.  We're still m-missing one pod, though.\" The Vervoo picks at a hangnail. \"I h-hope whoever was on it made it out!\n      *goto borion_continued\n    *else\n      We found a few escape p-pods, including yours.  The others didn't m-make it past the blast of the sh-ship, unfortunately—everyone onboard was k-killed.\n      *goto borion_continued\n    *label borion_continued\n    As far as we know, you w-were the only survivor.  Amazing, t-too: not a scratch on you—how'd you do that?  Anyway, the c-captain decided to bring you on b-board, and here you are!\"\n\n    \"I'm not sure…my head…\" you begin, only now realizing that part of the great weight on your shoulders is not your pounding head, but also a slave collar, like the Vervoo's, locked around your neck.\n\n    The Vervoo watches you with a mixture of pity and compassion.  \" ust s-say, it's not as bad as some p-people think.  At least not in my c-case.  I'm really treated well.\" He turns away. \"Anyway, do you h-have any more questions?\"\n    *goto initial_questions\n  #\"I don't mind slavery at all…so long as I'm not the slave.\"\n    Borion averts his gaze.  \"B-better me than you, then, I suppose!\" He chews his lips. \"I know humans view s-slavery as evil. But it's not l-like that.  I have a place I belong, a d-duty to perform, and I'm well c-cared for.\" His voice breaks off. \"Anyway, do you have any more q-questions?\"\n    *goto initial_questions\n  #\"You're boring me, Borion.  Shut up and get back to work like a good little slave, and don't speak unless spoken to.\"\n    *set harsh_kind %-20\n    Borion smiles shyly.  \"Sorry,\" he says. \"I t-told you I ramble on!  You might think I'd be offended b-by what you just said, b-but I'm not.  Every person deserves to have th-their own opinion.  Anyway, do you have any m-more questions?\"\n    *goto initial_questions\n\n*label see_ship\n*set kraska_borion %+20\nBorion guides out you of his cramped quarters.  The doors automatically part and close again after you enter the hall, which is nothing more than a long, narrow, depressing stretch of bare metal walls. You're tempted to scream just to test the acoustics, which must be fabulous.\n\nPractically bouncing on his toes, Borion turns to face you.  \"The [i]L-Lady Luck[/i] only has one deck,\" he proudly babbles, \"so it's p-pretty small overall.  Aside from c-crew quarters and the brig, there's the operations center, science l-lab, cargo bay—lots of good stuff there, let me t-tell you—brig, galley, and engine room.  Oh, there are s-seven of us in all, me included.\" He grins in realization. \"I g-guess you make eight!\n\n\"Now the captain—C-Captain Isan Cehnta, if you want to g-get all official—wants to meet you as s-soon as you get p-processed.  But f-first, we should go see Th-Thisi in the science lab.\"\n\nYour head reels from the barrage of information. Before you can protest, Borion sets off down the hall. This is all going way too fast, but you reluctantly follow.  You idly observe that the crew quarters you just left sit in the aft section of the vessel.  Before you know it, you're outside the science lab.\n\n\"In here,\" Borion says with a gesture.\n*finish Enter the science lab.\n"}};
