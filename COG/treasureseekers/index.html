 Borion and you is also equipped with a laser pistol.\n\n*if rank = 2\n  No matter how you try to shake the tactical officer off, you can't lose Rallix. Somehow it keeps its bulbous yellow eyes glued to you. You sigh. It's pretty clear Captain Isan wants to make sure ${isan_his} newest slave doesn't escape during the mission.\n\nPalms prickling with anticipation, you join the others inside the cramped shuttle and belt yourself in. It only takes Captain Isan a moment to power up the engines. Before you can blink, you're on your way to the Vervoo vessel and your very first mission.\n*finish Continue", "chapter_2b_mission_bridge": "You look around the bridge. Every single piece of equipment is ridiculously outdated, and all but two computer systems appear to be offline.  There's no sign of the Vervoo. It's as if the air swallowed them up, you think, shuddering. At least there's no trace of your crew, either.\n\n*if ran_away_from_crew = false\n  Thisi B'Artunt immediately rushes to one of the active computer systems. The Nyarri must be hunting for the missing Vervoo crew.  Rallix sticks to your side, its bulbous yellow eyes trained on you.\n  *goto thisi_instructions\n*else\n  You thought you'd gotten away, but your stomach drops. Thisi B'Artunt and Rallix stand at a computer console near the bridge's center. Rallix immediately spots you, its yellow eyes narrowing. Its forelegs shake violently. So much for your escape attempt.\n\n  \"Where have you been?!\" it growls, livid.\n\n  \"I needed the latrine!\" you lie. Rallix looks like it's about to lunge at you, and you brace yourself.\n\n  \"Worry about it later, honey,\" says Thisi, tapping away at the computer console. \"Right now, we could really use ${name}'s help.\"\n  *goto thisi_instructions\n*label thisi_instructions\n\nThisi searches out your gaze with ${thisi_his}. \"${name}, would you be a dear and help me with this computer?  I'm trying to access the commanding officer's logs.  They may give us some indication of what happened here.\"\n\n*if ((preference = \"men\") or (preference = \"women\"))\n\n  The instant your eyes connect with Thisi's, electricity sparks between the two of you. You know it has to be the pheromones ${thisi_his} species puts off, but your body doesn't care.\n  *choice\n    *selectable_if (specialization = \"science\") #\"Of course, Thisi.  Anything for you.\" (SCIENCE)\n      *set thisi_taloo %-10\n      *set duplicity_loyalty %+10\n      *set harsh_kind %+10\n      You approach the neighboring computer terminal.  Having Thisi so close by sends delicious chills up and down your body. You bite your lip and force yourself to ignore the sensation. Now is the time to impress Thisi with your intelligence, so you need to stay focused.\n\n      A quick search of the computer's directory provides access to the official ship's log.  It's encrypted, but the coding's no match for your scientific skills. In a few moments, you've cracked it.\n\n      \"Good work,\" murmurs Thisi, ${thisi_his} eyes sparkling.  You flush.  Smiling goofily, you activate the last log entry submitted by the ship's captain.\n      *set saw_log true\n      *goto log_entry\n    *selectable_if (specialization != \"science\") #\"Of course, Thisi.  I'm great with computers.\" (Lie.)\n      *set thisi_taloo %+10\n      *set duplicity_loyalty %-10\n      *set suspicion +5\n      You approach the neighboring computer terminal.  Having Thisi so close by sends delicious chills up and down your body. You bite your lip and force yourself to ignore the sensation. Now is the time to impress Thisi with your intelligence, so you need to stay focused.\n\n      The trouble is, you have no idea how to break the encryption. You just press random buttons. Hopefully no one will notice. Seconds later, the console lights flash red, and a cacophony of security alarms go off. You jump at the jarring noise, but the computer system's already locking down.\n    \n      Thisi frowns.  \"Maybe I'll take over from here, ${name},\" ${thisi_he} says. The yummy flow of pheromones is gone, replaced by Thisi's obvious irritation. \"You have no clue what you're doing, do you?  You should've just admitted that up front.\"\n\n      You hang your head, knowing you just lost what respect Thisi had for you. The Nyarri works the computer in a way you wouldn't even know how to begin. In the background, Ralix grumbles to itself.\n\n      Finally Thisi says, \"Okay, I think I've found out some info.  Apparently, the bugs are a species known as Rekelians.  I'm finding some encrypted data, but I'll have to send it back to the [i]Lady Luck[/i] for analysis.\"  Thisi taps the computer one more time, downloading the data.\n    \n      \"Enough with the computer.  These creatures must be stopped!\" shouts Rallix.\n\n      *goto what_to_do\n    *if (specialization != \"science\") #\"I'd love to help, but I don't know much about computers.\"\n      *set harsh_kind %+10\n      Thisi shrugs - very attractively, you must admit - and turns back to the computer. \"Just thought you might like to try.\"  Rallix rolls its eyes.\n\n      You don't miss the way Thisi arches ${thisi_his} back as ${thisi_he} hacks the computer, or the way ${thisi_his} eyes keep darting over to you to make sure that you're watching. And you [i]are[/i] watching, as much in admiration of Thisi's skill as the way ${thisi_he} looks in a jumpsuit.\n\n      \"Okay,\" ${thisi_he} says at last.  \"Okay, I think I've found the ship's log entries.  Let's take a look.\"  Thisi taps the computer one more time, activating the latest entry submitted by the ship's captain.\n      *set saw_log true\n      *goto log_entry\n    *if (specialization = \"science\") #\"I'd love to, but I don't know much about computers.\" (Lie.)\n      *set harsh_kind %-10\n      *set thisi_taloo %+10\n      *set duplicity_loyalty %-10\n      *set suspicion +5\n      \"That's not what Captain Isan tells me,\" says Thisi, surprised. \"Well, I suppose it must've been a mix-up. Guess that leaves me!\"\n\n      You don't miss the way Thisi arches ${thisi_his} back as ${thisi_he} hacks the computer, or the way ${thisi_his} eyes keep darting over to you to make sure that you're watching. And you [i]are[/i] watching, as much in admiration of Thisi's skill as the way ${thisi_he} looks in a jumpsuit.\n\n      \"Okay,\" Thisi says at last.  \"Here's what I found. Apparently, the bugs are a species known as Rekelians.  I'm finding some encrypted data, but I'll have to send it back to the [i]Lady Luck[/i] for analysis.\"  Thisi taps the computer one more time, downloading the data.\n    \n      \"Enough with the computer.  These creatures must be stopped!\" shouts Rallix.\n\n      *goto what_to_do\n\n*else\n\n  *choice\n    *selectable_if (specialization = \"science\") #\"Of course, Thisi.  Anything for you.\" (SCIENCE)\n      *set thisi_taloo %-10\n      *set duplicity_loyalty %+10\n      *set harsh_kind %+10\n      You approach the computer terminal next to Thisi and set to work. A quick search of the computer's directory provides access to the official ship's log.  It's encrypted, but the coding's no match for your scientific skills.\n\n      \"Good work,\" praises Thisi, ${thisi_his} eyes sparkling.  You flush.  Smiling goofily, you activate the last log entry submitted by the ship's captain.\n      *set saw_log true\n      *goto log_entry\n    *selectable_if (specialization != \"science\") #\"Of course, Thisi.  I'm great with computers.\" (Lie.)\n      *set thisi_taloo %+10\n      *set duplicity_loyalty %-10\n      *set suspicion +5\n      You approach the computer terminal next to Thisi and set to work. You have no idea how to break the encryption, so you just press random buttons. Hopefully no one will notice. Seconds later, the console lights flash red, and a cacophony of security alarms go off. You jump at the jarring noise, but the computer system's already locking down.\n    \n      \"Maybe I'll take over from here, ${name},\" Thisi says, ${thisi_his} voice dripping with disdain. \"You have no clue what you're doing, do you?  You should've just admitted that up front.\"\n\n      You hang your head, knowing you just lost what respect Thisi had for you. The Nyarri works the computer in a way you wouldn't even know how to begin. In the background, Ralix grumbles to itself.\n\n      Finally Thisi says, \"Okay, I think I've found out some info.  Apparently, the bugs are a species known as Rekelians.  I'm finding some encrypted data, but I'll have to send it back to the [i]Lady Luck[/i] for analysis.\"  Thisi taps the computer one more time, downloading the data.\n    \n      \"Enough with the computer.  These creatures must be stopped!\" shouts Rallix.\n\n      *goto what_to_do\n    *if (specialization != \"science\") #\"I'd love to help, but I don't know much about computers.\"\n      *set harsh_kind %+10\n      Thisi shrugs and turns back to the computer. \"Just thought you might like to try.\"  Rallix rolls its eyes.\n\n      After a few moments, Thisi says,  \"Okay, I think I've found the ship's log entries.  Let's take a look.\"  Thisi taps the computer one more time, activating the latest entry submitted by the ship's captain.\n      *set saw_log true\n      *goto log_entry\n    *if (specialization = \"science\") #\"I'd love to, but I don't know much about computers.\" (Lie.)\n      *set harsh_kind %-10\n      *set thisi_taloo %+10\n      *set duplicity_loyalty %-10\n      *set suspicion +5\n      \"That's not what Captain Isan tells me,\" says Thisi, surprised. \"Well, I suppose it must've been a mix-up. Guess that leaves me!\"\n\n      After a few moments, Thisi says, \"Okay. Apparently, the bugs are a species known as Rekelians.  I'm finding some encrypted data, but I'll have to send it back to the [i]Lady Luck[/i] for analysis.\"  Thisi taps the computer one more time, downloading the data.\n    \n      \"Enough with the computer.  These creatures must be stopped!\" shouts Rallix.\n      *goto log_entry\n    #\"Isn't that more your job than mine, Thisi?\"\n      *set harsh_kind %+10\n      Thisi shrugs and turns back to the computer. \"Just thought you might like to try.\"  Rallix rolls its eyes.\n\n      After a few moments, Thisi says,  \"Okay, I think I've found the ship's log entries.  Let's take a look.\"  Thisi taps the computer one more time, activating the latest entry submitted by the ship's captain.\n      *set saw_log true\n      *goto log_entry\n\n    #\"I don't want anything to do with you, Thisi.\"\n      *set thisi_taloo %+10\n      *set harsh_kind %-10\n      \"Fine,\" Thisi says stiffly.  \"If that's how you feel.\"  Rallix rolls its eyes.  You sigh. Thisi can shower you with pheromones all ${thisi_he} wants, but in the end, ${thisi_he}'s just not your type.\n\n      \"Okay,\" Thisi says at last, striking a few keys.  \"Here's what I found. Apparently, the bugs are a species known as Rekelians.  I'm finding some encrypted data, but I'll have to send it back to the [i]Lady Luck[/i] for analysis.\"  Thisi taps the computer one more time, downloading the data.\n    \n      \"Enough with the computer.  These creatures must be stopped!\" shouts Rallix.\n\n      *goto what_to_do\n\n*label log_entry\n*page_break Watch the log entry.\nThe computer screen flares to life, displaying a Vervoo male in a crisp black uniform. He resembles Borion enough to make you cringe.\n\nThe Vervoo speaks, his tone relaxed.  \"[i]Andax Theta[/i] log, the second day of the Great Emperium, Captain Erranza speaking.  Today we continue our journey to the trade port Tuskin, where we will—\"  The captain's head abruptly jerks to the side. What could he have heard?  White static fills the screen, followed by the image of the now-disheveled captain. You notice he's standing in a different place, and his uniform's wrinkled.\n\nHis eyes are wide with panic, and he whispers frantically. \"We've been boarded!  The creatures—Rekelians, I believe—are taking over the ship.  They've already murdered eight of my crew, and our passengers are in an uproar.  I'm ordering the immediate evacuation of this vessel.  To anyone who may find this ship—beware!\"  Another burst of static, and the screen goes black. \n\nYou stare at the blank screen. Is the captain dead?\n\nThisi purses ${thisi_his} lips.  \"Rekelians…I'm not familiar with that species.\"\n\n\"Never heard of them,\" growls Rallix.\n\n\"What about you, ${name}?\"\n*choice\n  #\"Yes, I know the species.\" (Tell them about Rekelians.)\n    *set duplicity_loyalty %+10\n    *set follower_leader %+10\n    *if specialization = \"tactical\"\n      Thanks to your advanced tactical training, you're quite familiar with Rekelians.  In fact (as you tell Thisi and Rallix) you're shocked you didn't recognize them earlier.  The large, roachlike species infests any functioning ship it encounters, searching for a specific source of food—the ship's power core. Though dangerous, you explain, the now-feeding Rekelians shouldn't pose a threat if left alone.\n      *goto what_to_do\n    *elseif specialization = \"science\"\n      Thanks to the large amount of scientific research you've done in the past, you're quite familiar with Rekelians.  In fact (as you tell Thisi and Rallix) you're shocked you didn't recognize them earlier.  The large, roachlike species infests any functioning ship it encounters, searching for a specific source of food—the ship's power core. Though dangerous, you explain, the now-feeding Rekelians shouldn't pose a threat if left alone.\n      *goto what_to_do\n    *else\n      Thanks to your advanced infiltration training, you're quite familiar with Rekelians.  In fact (as you tell Thisi and Rallix) you're shocked you didn't recognize them earlier.  The large, roachlike species infests any functioning ship it encounters, searching for a specific source of food—the ship's power core. Though dangerous, you explain, the now-feeding Rekelians shouldn't pose a threat if left alone.\n      *goto what_to_do\n  #\"Yes, I know the species.\" (Make something up.)\n    *set duplicity_loyalty %-10\n    *set follower_leader %+10\n    *set suspicion +5\n    *if specialization = \"tactical\"\n      Thanks to your advanced tactical training, you're quite familiar with Rekelians.  In fact, you're shocked you didn't recognize them earlier.  The large, roachlike species infests any functioning ship it encounters, searching for a specific source of food—the ship's power core.\n\n      You don't share any of this with Thisi or Rallix, however. Instead, you spin a wild tale about how Rekelians are aggressive, brain-sucking creatures that want to exterminate all other species and take over the galaxy.  They should, you stress, be avoided at all costs.\n      *goto what_to_do\n    *elseif specialization = \"science\"\n      Thanks to the large amount of scientific research you've done in the past, you're quite familiar with Rekelians.  In fact, you're shocked you didn't recognize them earlier. The large, roachlike species infests any functioning ship it encounters, searching for a specific source of food—the ship's power core.\n\n      You don't share any of this with Thisi or Rallix, however.  Instead, you spin a wild tale about how Rekelians are aggressive, brain-sucking creatures that want to exterminate all other species and take over the galaxy.  They should, you stress, be avoided at all costs.\n      *goto what_to_do\n    *else\n      Thanks to your advanced infiltration training, you're quite familiar with Rekelians.  In fact, you're shocked you didn't recognize them earlier.  The large, roachlike species infests any functioning ship it encounters, searching for a specific source of food—the ship's power core.\n\n      You don't share any of this with Thisi or Rallix, however.  Instead, you spin a wild tale about how Rekelians are aggressive, brain-sucking creatures that want to exterminate all other species and take over the galaxy.  They should, you stress, be avoided at all costs.\n      *goto what_to_do\n  #\"No, I've never heard of them.\"\n    *set follower_leader %-10\n    \"What do we need to know?\" demands Rallix. \"They pose a threat, and it's either them or us!\"\n\n    \"They're clearly hostile,\" surmises Thisi in a much more reasonable tone, \"but that doesn't mean we can't find a peaceful way to deal with them.  We're just here to collect some valuables, after all.  We mean them no harm.\"\n    *goto what_to_do\n\n*label what_to_do\n\nThisi looks to you.  \"What do you think we should do, ${name}?\"\n*if rank = 2\n\n  \"Why ask the slave's opinion?\" demands Rallix, its mandibles clicking.\n  \n  \"Just because ${name} is a slave doesn't mean we can't use the extra input,\" Thisi says soothingly, turning to face you. \"So what do you think?\"\n  *goto what_to_do_choice\n*label what_to_do_choice\n*choice\n  #\"What if we attempt to communicate with them and explain that we mean them no harm?\"\n    *gosub trial_end\n    *set follower_leader %+10\n    *set cowardice_bravery %+10\n    \"Are you insane?\" cries Rallix. \"They'll kill us!\"\n\n    Thisi holds up a hand, and the Nixian immediately quiets.  \"If ${name} thinks it's possible, then it might be worth a try.\"\n\n    Rallix scoffs.  \"Do what you want, human.  But I for one hold that your idea is pure insanity.\"  It storms to the other side of the room.\n\n    \"I have something for you,\" Thisi says, handing you ${thisi_his} scanning device.  \"Try this.  It might be able to convert any sounds the Rekelians make into text, which may enable you to communicate with them.\" You feel ${thisi_him} brush your wrist with soft fingers. \"Are you sure you want to do this?\"\n    *fake_choice\n      #\"Yes.  It's our only chance to resolve this issue without violence.\"\n      #\"Not really, but it's our best option.\"\n    \"I have faith in you, ${name},\" says Thisi, beaming.  The Nyarri points to an exit on the far side of the bridge.  \"There are probably some Rekelians in that corridor.  But be careful.  If they try to hurt you, hurry back here, and we'll try something else.\"\n\n    \"Good luck,\" grumbles Rallix from across the bridge.  \"You'll need it.\"\n    *page_break Attempt to talk to the Rekelians.\n    Your heart slamming against your rib cage, you creep toward the far side of the bridge.  A pair of doors part at your approach. Hmm, you think. So the Vervoo weren't as worried about security as your crew. Maybe they should have been.\n\n    You pass through the doors into another cramped corridor.  Inside, you find three Rekelians standing in formation.  Their antennae quiver at your presence, and one of them unfurls a pair of shiny wings. You brace yourself, but the Rekelians make no move to attack.\n    *page_break \"My name is ${name}.  I mean you no harm.\"\n    *if hurt_bugs = true\n      *if bugs_attacked = false\n        The creatures emit a scary series of clicking sounds, making the hairs on your arms rise.  A second later, the device Thisi handed you displays plain text on its screen:  \"We are Rekelian, and we do not believe your lies. You have already harmed our kind, outsider.  Leave this ship immediately, or we will drive you off.\"\n        \n        The aliens move to form a blockade.  You gasp and back away, expecting them to lunge at any second. Oddly, they observe you but let you go.\n\n        Back at the bridge, you warn the others that communications with the Rekelians didn't go well and that you need to leave this ship right away.\n\n        Rallix growls. \"I told you trying to communicate was a bad idea.\" It rubs its spiky forelegs together. \"Now we must hurry back to the vault.  You'd better hope for your sake, human, that the others are okay.\"\n        *page_break Return to the vault.\n        The return to the vault is a waking nightmare.  The buglike creatures appear everywhere, running from corridor to corridor, clicking menacingly as you pass.  Even with the stitch burning in your side, you don't dare pause to catch your breath.\n\n        *goto need_to_go\n      *else\n        The creatures emit a scary series of clicking sounds, making the hairs on your arms rise.  A second later, the device Thisi handed you displays plain text on its screen:  \"We are Rekelian, and we do not believe your lies. You have already harmed our kind, outsider.  Leave this ship immediately, or we will drive you off.\"\n        \n        The aliens move to form a blockade. You gasp, expecting them to lunge at any second, but try to stay calm.\n        *label last_warning\n        *choice\n          *hide_reuse #\"You have harmed me, too.  Consider us even.\"\n            \"We only injured in self-defense; we did not kill,\" the aliens reply.  \"But you have. This is your last warning.\"\n            *goto last_warning\n          #Retreat from the room.\n            You back away as quickly as possible. The Rekelians observe you but let you go.\n\n            Back at the bridge, you warn the others that communications with the Rekelians didn't go well and that you need to leave this ship right away.\n\n            Rallix growls. \"I told you trying to communicate was a bad idea.\" It rubs its spiky forelegs together. \"Now we must hurry back to the vault.  You'd better hope for your sake, human, that the others are okay.\"\n            *page_break Return to the vault.\n            The return to the vault is a waking nightmare. The buglike creatures appear everywhere, running from corridor to corridor, clicking menacingly as you pass.  Even with the stitch burning in your side, you don't dare pause to catch your breath.\n\n            *goto need_to_go\n    *else\n      *goto continue_communication\n    *label continue_communication\n    The creatures emit a scary series of clicking sounds, making the hairs on your arms rise. A second later, the device Thisi handed you displays plain text on its screen: \"We are Rekelian.  We do not wish to harm you, either.  What is it that you seek?\"\n    *choice\n      #\"My crew wants to retrieve some items from this ship and then leave.  We won't interfere with you.\"\n        *set mission_success_level 3\n        A new line of text appears on the device's display:  \"Though we do not approve of the removal of items from this vessel, we do appreciate your peaceful intentions. It is not often that other species attempt to communicate with us rather than kill us. Should we meet again in the future, we will remember your civility. For now, please proceed; we will not hinder you.\"\n\n        Elated, you do your best to suppress your grin. You did what Rallix, that slaver, thought you couldn't! Bidding the Rekelians farewell, you return to the bridge to announce the peaceful agreement you've worked out.\n        *set helped_bugs true\n        *goto plan_communicate\n      #\"The people I'm here with are trying to steal from this ship.  Help me drive them off.\"\n        *set duplicity_loyalty %-20\n        *set mission_success_level 2\n        A new line of text appears on the device's display:  \"We do not approve of stealing or theft. If your people are doing this and you wish to stop it, we will assist you.  However, we will not kill any of your people. Are these terms favorable to you?\"\n        *fake_choice\n          #\"I'd prefer if you killed them. Really.\"\n          #\"Yes, I can agree to those terms.\"\n          #\"Just scare them off.\"\n        A final line of text appears on the device's display:  \"It is not often that other species attempt to communicate with us rather than kill us. Should we meet again in the future, we will remember your civility. For now, we shall frighten off your associates without harming anyone.\"\n\n        Elated, you do your best to suppress your grin. You've worked out a peaceful agreement with the creatures! You bid them farewell and return to the bridge.\n        *set helped_bugs true\n        *goto plan_communicate\n      #\"Surrender to us or be exterminated, bugs!\"\n        *set harsh_kind %-20\n        *set mission_success_level 1\n        A new line of text appears on the device's display:  \"We do not appreciate threats, alien.  Consider our negotiations at an end.  If you do not leave this ship immediately, we will drive you off.\"\n        \n        The aliens move to form a blockade. You gasp and try to back away as quickly as possible. The Rekelians observe you but let you go.\n\n        Back at the bridge, you warn the others that communications with the Rekelians didn't go well and that you need to leave this ship right away.\n\n        Rallix growls. \"I told you trying to communicate was a bad idea.\" It rubs its spiky forelegs together. \"Now we must hurry back to the vault.  You'd better hope for your sake, human, that the others are okay.\"\n        *page_break Return to the vault.\n        The return to the vault is a waking nightmare. The buglike creatures appear everywhere, running from corridor to corridor, clicking menacingly as you pass. Even with the stitch burning in your side, you don't dare pause to catch your breath.\n\n        *goto need_to_go\n\n    *label plan_communicate\n\n    The instant you enter the bridge, Thisi and Rallix pounce on you.  \"Well?\" Thisi demands.  \"How did it go?\"\n    *if mission_success_level = 3\n      *page_break \"I got through to them!\"\n      Excited, you tell the others that you managed to communicate with the Rekelians and that they won't harm you.\n\n      \"It could be a trick,\" says Rallix.  \"Get us to trust them and then attack.\"\n\n      \"Don't listen to Rallix, ${name},\" says Thisi, flashing you a smile.  \"You did good work!\"\n\n      Rallix huffs. \"In any case, our job here is done.  We should return to the others.\"\n      *page_break Return to the vault.\n      Ten minutes later, the three of you return to the vault, where Team B busily transfers goods to the shuttle. You look around for Borion and find him loading up a sack of valuables under Shelou Vili's direction. Relief washes over Captain Isan's face at the sight of you, and Thisi launches right into the story of what happened.\n\n      \"So you managed to work out an agreement with the Rekelians?\" asks Isan, shaking ${isan_his} head in awe. \"I'd never have thought it possible.  Well done, ${name}, well done!  Now we can finish our work here without any danger or interference.\"\n\n      Borion lowers his overflowing sack. \"D-did—did you learn what h-happened to the c-crew?\" His voice wavers with fearful hope.\n      *choice\n        *if (saw_log = true) #\"Yes. They abandoned ship when the Rekelians came aboard.  They're probably safely on Tuskin by now.\"\n          *set harsh_kind %+10\n          \"Oh!\" says Borion, his eyes lighting up.  \"That's splendid n-news!\"\n          *goto plan_communicate_3\n        *if (saw_log = false) #\"We don't know yet, Borion, but Thisi's going to conduct some research when we get back to the ship.\"\n          *set harsh_kind %+10\n          \"Oh,\" says Borion. His shoulders slump. \"Okay. I h-hope ${thisi_he} finds s-something.\"\n          *goto plan_communicate_3\n        #\"Yes.  They're all dead.\" (Lie.)\n          *set harsh_kind %-10\n          *set duplicity_loyalty %-10\n          \"They are?!\" whispers Borion, tearing up. He sucks in air before falling to his knees.\n\n          \"${name}'s kidding, honey,\" interjects Thisi, glaring at you.\n          *if saw_log = true\n            \"They evacuated when the Rekelians showed up. They're fine!\"\n            *goto borion_response_1\n          *else\n            \"We don't know what happened yet, but I'm going to research it when I get back to the ship.\"\n            *goto borion_response_1\n          *label borion_response_1\n          \"Oh…oh!\" replies Borion. He forces a small smile. \"That is k-kind of f-funny, actually. Yeah. Ha, ha.\"\n          *goto plan_communicate_3\n      *label plan_communicate_3\n\n      \"All right,\" says Isan, clapping ${isan_his} hands. \"Let's finish up and get out of here. There's money to be made!\"\n      *page_break Gather the remaining goods and return to the shuttle.\n      The relieved crew makes a point of grabbing every last valuable from the Vervoo ship. By the time you return to the shuttle, the already-cramped interior is close to bursting. With a laugh, you let yourself be smashed in between a pile of silk fabric and a stack of golden plates.\n\n      Everyone's spirits are high as you depart from the [i]Andax Theta[/i] and head back toward the [i]Lady Luck[/i].\n      *finish Continue\n    *else\n      *page_break \"We need to leave. Now.\"\n      You warn the others that negotiations with the Rekelians couldn't have gone worse. Of course, you omit any plans to halt the crew's thievery of the ship's valuables.\n\n      Rallix growls. \"I told you trying to communicate was a bad idea.\" It rubs its spiky forelegs together. \"Now we must hurry back to the vault.  You'd better hope for your sake, human, that the others are okay.\"\n      *page_break Return to the vault.\n      The return to the vault is a waking nightmare, even though you know the Rekelians won't harm you. The buglike creatures appear everywhere, running from corridor to corridor, clicking menacingly as you pass. It's enough to convince both Rallix and Thisi that the valuables onboard this ship just aren't worth the risk.\n\n      *label need_to_go\n      Ten long minutes later, the three of you return to the vault, where Team B busily transfers goods to the shuttle. You look around for Borion and find him loading up a sack of valuables under Shelou Vili's direction. Relief washes over Captain Isan's face at the sight of you, and Thisi launches right into the story of what happened.\n\n      \"Rekelians?\" repeats Captain Isan.  \"Here?!\"\n\n      \"We have to leave, Captain,\" announces Rallix. \"Now. It's only a matter of time before they attack.\"\n\n      Isan reluctantly nods.  \"All right. We'll leave with what we have on us.  If Rekelians are here, and if they're as aggressive as Team B states, then this ship isn't worth risking our lives over.\"\n\n      Borion lowers his overflowing sack. \"But d-did you learn what happened to the c-crew?\" His voice wavers with fearful hope.\n      *choice\n        *if (saw_log = true) #\"Yes.  They abandoned ship when the Rekelians came on board.  They're probably safely on Tuskin by now.\"\n          *set harsh_kind %+10\n          \"Oh!\" says Borion, his eyes lighting up. \"That's splendid n-news!\"\n          *goto plan_communicate_4\n        *if (saw_log = false) #\"We don't know yet, Borion, but Thisi is going to conduct some research when we get back to the ship.\"\n          *set harsh_kind %+10\n          \"Oh,\" says Borion. His shoulders slump. \"Okay. I h-hope ${thisi_he} finds s-something.\"\n          *goto plan_communicate_4\n        #\"Yes.  They're all dead.\" (Lie.)\n          *set harsh_kind %-10\n          *set duplicity_loyalty %-10\n          \"They are?!\" whispers Borion, tearing up. He sucks in air before falling to his knees.\n\n          \"${name}'s kidding, honey,\" interjects Thisi, glaring at you.\n          *if saw_log = true\n            \"They evacuated when the Rekelians showed up. They're fine!\"\n            *goto borion_response_2\n          *else\n            \"We don't know what happened yet, but I'm going to research it when I get back to the ship.\"\n            *goto borion_response_2\n          *label borion_response_2\n          \"Oh…oh!\" replies Borion. He forces a small smile. \"That is k-kind of f-funny, actually. Yeah. Ha, ha.\"\n      *label plan_communicate_4\n\n      \"All right,\" says Isan irritably.  \"Enough chitchat! Let's get out of here while we still can.\"\n      *page_break Return to the shuttle.\n      The return to the shuttle feels like it takes a million years. Every bit of the ship seethes with Rekelians.  Their hostile clicking forces Captain Isan to lead the crew along a different series of paths than the ones that brought you to the vault, and even then, the group has to double back countless times. By the time you return to the shuttle, the entire crew is ready to scream from frayed nerves. You couldn't pay them enough to stay another minute.\n\n      Everyone's spirits are low as you depart from the [i]Andax Theta[/i] and head back toward the [i]Lady Luck[/i].\n      *finish Continue\n  *selectable_if (specialization = \"science\") #\"If we play our cards right, we can disable them.\" (SCIENCE.)\n    *gosub trial_end\n    Thisi looks at you curiously.  \"What did you have in mind, ${name}?\"\n\n    You explain to Thisi that, thanks to your scientific training, you know the Rekelians' weakness: they're sensitive to certain frequencies of sound.  In theory, you explain, it would be easy to magnify a loud multifrequency tone over the ship's speakers and temporarily incapacitate the invaders.\n\n    Thisi grins, looking pleased at hearing someone else talking about technical matters in such a skillful way. \"I think I can arrange that for you.\"  The Nyarri taps a few controls on the computer. \"Okay, we're all set!\"\n    \n    \"This plan is stupid!\" shouts Rallix.  \"We should just kill them all!\"\n    *choice\n      #\"Maybe we should…but they outnumber us. It's too risky.\"\n        *set rallix_shelou %-10\n        *set thisi_taloo %+10\n        *set harsh_kind %-10\n        \"I hate to admit it,\" growls Rallix, \"but you're right.\" Thisi frowns at both of you.\n        *goto plan_disable\n      #\"Our priority is getting out of here safely, not killing the aliens.\"\n        *set rallix_shelou %+10\n        \"He's right,\" says Thisi, smiling at you. Rallix shakes its head and sighs.\n        *goto plan_disable\n      #\"The aliens have a right to life just as much as we do, Rallix.\"\n        *set rallix_shelou %+10\n        *set thisi_taloo %-10\n        *set harsh_kind %+10\n        \"Tell that to the former crew of this ship,\" Rallix hisses in response. Thisi smiles at you all the same.\n        *if ((preference = \"men\") or (preference = \"women\"))\n          You're happy to have Thisi's support, at least, and ${thisi_his} smile makes your heart skip a beat.\n        *goto plan_disable\n    *label plan_disable\n\n    \"Okay,\" says Thisi excitedly, glancing between Rallix and you. \"Here we go!\" The Nyarri scientist taps a control on the computer panel.\n\n    An instant later, a piercing noise rends the air, forcing you all to cover your ears. Just when you start to think your eardrums are going to shatter into a million pieces, the noise stops.\n\n    \"That was…horrible,\" whispers Thisi, wide-eyed and shaking. \"Those poor creatures!\"\n\n    *fake_choice\n      #\"They're okay, Thisi—just knocked out.\"\n      #\"Wow, that was awful!\"\n\n    Thisi looks to you. \"Do you think it worked, though?\"\n\n    \"Only one way to find out,\" snaps Rallix. \"Let's go!\"\n\n    It leads the way into a corridor off the bridge.  Even you're taken aback when you find the deck littered with unconscious Rekelians.\n\n    \"Heh!\" snickers Rallix. \"I guess it did.\"\n    \n    Thisi's large eyes glisten. \"I hope they're okay.\"\n\n    \"Who cares?\" Rallix shakes its head impatiently.  \"Our job here is done.  We should return to the others.\"\n    *page_break Return to the vault.\n    Ten minutes later, the three of you return to the vault, where Team B busily transfers goods to the shuttle. You look around for Borion and find him loading up a sack of valuables under Shelou Vili's direction. Relief washes over Captain Isan's face at the sight of you, and Thisi launches right into the story of what happened.\n\n    \"So that's what that awful noise was,\" says Isan. \"I thought we were under attack! Rekelians can be dangerous. While they don't pose a threat directly, they're extremely territorial and prone to violence. You were smart to disable them.\"\n\n    Borion lowers his overflowing sack. \"D-did—did you learn what happened to the c-crew?\" His voice wavers with fearful hope.\n    *choice\n      *if (saw_log = true) #\"Yes. They abandoned ship when the Rekelians came on board. They're probably safely on Tuskin by now.\"\n        *set harsh_kind %+10\n        \"Oh!\" says Borion, his eyes lighting up. \"That's splendid n-news!\"\n        *goto plan_disable_2\n      *if (saw_log = false) #\"We don't know yet, Borion, but Thisi is going to conduct some research when we get back to the ship.\"\n        *set harsh_kind %+10\n        \"Oh,\" says Borion. His shoulders slump. \"Okay. I h-hope ${thisi_he} finds s-something.\"\n        *goto plan_disable_2\n      #\"Yes. They're all dead.\" (Lie.)\n        *set harsh_kind %-10\n        *set duplicity_loyalty %-10\n        \"They are?!\" whispers Borion, tearing up. He sucks in air before falling to his knees.\n\n        \"${name}'s kidding, honey,\" interjects Thisi, glaring at you.\n        *if saw_log = true\n          \"They evacuated when the Rekelians showed up. They're fine!\"\n          *goto borion_response_3\n        *else\n          \"We don't know what happened yet, but I'm going to research it when I get back to the ship.\"\n          *goto borion_response_3\n        *label borion_response_3\n        \"Oh…oh!\" replies Borion. He forces a small smile. \"That is k-kind of f-funny, actually. Yeah. Ha, ha.\"\n        *goto plan_disable_2\n    *label plan_disable_2\n\n    \"All right,\" says Isan, clapping ${isan_his} hands.  \"Let's finish up and get out of here.  There's money to be made!\"\n    *page_break Gather the remaining goods and return to the shuttle.\n    The relieved crew makes a point of grabbing every last valuable on the Vervoo ship. By the time you return to the shuttle, the already-cramped interior is close to bursting. With a laugh, you let yourself be smashed in between a pile of silk fabric and a stack of golden plates.\n\n    Everyone's spirits are high as you depart from the [i]Andax Theta[/i] and head back toward the [i]Lady Luck[/i].\n    *set mission_success_level 3\n    *finish Continue\n  *selectable_if (specialization = \"tactical\") #\"We should kill them all…and I just might know how!\" (TACTICAL)\n    *gosub trial_end\n    \"Now we're talking!\" exclaims Rallix, clicking its mandibles in anticipation.  \"What did you have in mind, human?\"\n    \n    You explain that, thanks to your tactical training, you can configure the security system to sweep all the decks with a refined laser set to target only the Rekelians. That way, the ship would kill the aliens for you.\n\n    *if ((preference = \"men\") or (preference = \"women\"))\n      Thisi looks at you, but instead of ${thisi_his} usual dazzling smile, ${thisi_his} expression has nothing but apprehension. \"I [i]could[/i] set that up for you, but are you sure you want to do this? We'd be killing every one of them…\"\n      *goto killthemchoice\n    *else\n      Thisi looks at you, eyes full of apprehension. \"Are you sure you want to do this? We'd be killing every one of them.\"\n      *goto killthemchoice\n\n    *label killthemchoice\n    *choice\n      #\"Yes. Kill them all!\"\n        *set harsh_kind %-20\n        \"I'm not sure I'm comfortable with that, ${name}…\" whispers Thisi, looking away.\n        *set thisi_taloo %+10\n        *goto plan_kill\n      #\"They're the ones who invaded this ship. Let them die.\"\n        *set harsh_kind %-10\n        \"Technically,\" replies Thisi, \"so did we. Does that mean we deserve to die, too?\"\n        *set thisi_taloo %+10\n        *goto plan_kill\n      #\"I don't want to kill them, but I think it's our only choice.\"\n        Thisi frowns. \"I don't like it, but…you may be right, ${name}.\"\n        *goto plan_kill\n      #\"Maybe there's a way we could simply stun them instead.\"\n        *set harsh_kind %+10\n        Thisi lets out a sigh of relief. \"Just what I was thinking! Maybe if we decrease the strength of the laser, it will only stun them. What do you think, Rallix?\"\n        *set thisi_taloo %-10\n        *goto plan_kill\n    *label plan_kill\n\n    \"Enough talk!\" shouts Rallix, shoving you aside and marching over to Thisi.  \"Like I said,\" it growls, \"it's us or them.\"  Before Thisi can react, Rallix slams its foreleg down on the computer panel.\n\n    An instant later, a warning flashes blood red on the screen, informing you that lasers are sweeping the deck.  You watch, your heart in your throat, as a message appears: \"Laser sweep complete. Infestation eliminated.\"\n\n    \"That was…horrible,\" whispers Thisi, wide-eyed and shaking. \"Those poor creatures!\"\n\n    *fake_choice\n      #\"They deserved it.\"\n      #\"I really wish you hadn't done that, Rallix.\"\n\n    Thisi hugs ${thisi_him}self. \"Do you think it worked?\"\n\n    \"Only one way to find out,\" answers Rallix cheerfully.\n\n    It leads the way into a corridor off the bridge. Your stomach tightens when you find the deck littered with the corpses of Rekelians.\n\n    \"Heh,\" snickers Rallix.  \"I guess it did.\"\n    \n    Thisi's large eyes glisten, and ${thisi_his} lips tremble. Watching ${thisi_him}, you feel sick. \"They didn't mean us any harm,\" ${thisi_he} says. \"What we did was wrong.\"\n\n    \"Remorse is for the weak,\" states Rallix coldly.  \"Our job here is done.  We should return to the others.\"\n    *page_break Return to the vault.\n    Ten minutes later, the three of you return to the vault, where Team B busily transfers goods to the shuttle. You look around for Borion and find him loading up a sack of valuables under Shelou Vili's direction. Relief washes over Captain Isan's face at the sight of you, and Thisi launches right into the story of what happened.\n\n    \"So that's what that awful noise over the speakers was,\" says Isan. \"Rekelians can be dangerous. While they don't pose a threat directly, they are extremely territorial and prone to violence. You were smart to kill them all.\"\n\n    From Thisi's distraught face, it's plain ${thisi_he} disagrees. \n\n    *if ((preference = \"men\") or (preference = \"women\"))\n      Your stomach twists at the sight of Thisi's pain. You hope you can do something to make it up to ${thisi_him}, but you're worried that this might have damaged your relationship beyond repair.\n    *set killed_rekelians true\n\n    Borion lowers his overflowing sack. \"D-did—did you learn what happened to the c-crew?\" His voice wavers with fearful hope.\n    *choice\n      *if (saw_log = true) #\"Yes.  They abandoned ship when the Rekelians came on board.  They're probably safely on Tuskin by now.\"\n        *set harsh_kind %+10\n        \"Oh!\" says Borion, his eyes lighting up. \"That's splendid n-news!\"\n        *goto plan_kill_2\n      *if (saw_log = false) #\"We don't know yet, Borion, but Thisi is going to conduct some research when we get back to the ship.\"\n        *set harsh_kind %+10\n        \"Oh,\" says Borion. His shoulders slump. \"Okay. I h-hope ${thisi_he} finds s-something.\"\n        *goto plan_kill_2\n      #\"Yes.  They're all dead.\" (Lie.)\n        *set harsh_kind %-10\n        *set duplicity_loyalty %-10\n        \"They are?!\" whispers Borion, tearing up. He sucks in air before falling to his knees.\n\n        \"${name}'s kidding, honey,\" interjects Thisi, glaring at you.\n        *if saw_log = true\n          \"They evacuated when the Rekelians showed up. They're fine!\"\n          *goto borion_response_4\n        *else\n          \"We don't know what happened yet, but I'm going to research it when I get back to the ship.\"\n          *goto borion_response_4\n        *label borion_response_4\n        \"Oh…oh!\" replies Borion. He forces a small smile. \"That is k-kind of f-funny, actually. Yeah. Ha, ha.\"\n        *goto plan_kill_2\n\n    *label plan_kill_2\n\n    \"All right,\" says Isan, clapping ${isan_his} hands.  \"Let's finish up and get out of here.  There's money to be made!\"\n    *page_break Gather the remaining goods and return to the shuttle.\n    The relieved crew makes a point of grabbing every last valuable from the Vervoo ship. By the time you return to the shuttle, the already-cramped interior is close to bursting. With a laugh, you let yourself be smashed in between a pile of silk fabric and a stack of golden plates.\n\n    Everyone's spirits are high as you depart from the [i]Andax Theta[/i] and head back toward the [i]Lady Luck[/i].\n    *set mission_success_level 3\n    *finish Continue\n  *selectable_if (specialization = \"infiltration\") #\"None of this is our business. Let's avoid them.\"  (INFILTRATION)\n    *gosub trial_end\n    \"A wise course of action,\" agrees Thisi, sounding relieved.  Rallix, for his part, looks anything but impressed.  \"Well,\" Thisi continues, \"this is your area of expertise, ${name}. How should we proceed?\"\n    *page_break Come up with a plan.\n    The three of you map out a stealth-based operation to bypass the alien creatures altogether. After all, how is it your business what they're doing on this ship? Your job is to get the valuables onto the shuttle, nothing more.\n\n    \"Running from an enemy is contrary to the directives of my Queen,\" argues Rallix, fidgeting. \"It is dishonorable.\"\n    *choice\n      #\"We're not running, Rallix. We're avoiding a fight we can't possibly win.\"\n        \"If you say so,\" Ralix grumbles. \"But I still don't like it.\"\n        *goto plan_stealth\n      #\"We either run, or we die. It's as simple as that.\"\n        \"Then we die,\" says a blunt Rallix. \"At least we would if I were in command.\"  \n        Thisi makes a face. \"Lucky for us, you aren't. Some of us would like to live awhile longer.\"\n        *goto plan_stealth\n    *label plan_stealth\n    \n    Ten minutes later, the three of you return to the vault, where Team B busily transfers goods to the shuttle. You look around for Borion and find him loading up a sack of valuables under Shelou Vili's direction. Relief washes over Captain Isan's face at the sight of you, and Thisi launches right into the story of what happened.\n\n    \"Rekelians?\" Isan repeats, shaking ${isan_him} head. \"Yeah, I've heard of them. You were smart to avoid engaging them in a fight. Best that we get off this ship right away, then.\"\n    \n    Borion lowers his overflowing sack. \"D-did—did you learn what happened to the c-crew?\" His voice wavers with fearful hope.\n    *choice\n      *if (saw_log = true) #\"Yes. They abandoned ship when the Rekelians came on board. They're probably safely on Tuskin by now.\"\n        *set harsh_kind %+10\n        \"Oh!\" says Borion, his eyes lighting up. \"That's splendid n-news!\"\n        *goto plan_stealth_1\n      *if (saw_log = false) #\"We don't know yet, Borion, but Thisi is going to conduct some research when we get back to the ship.\"\n        *set harsh_kind %+10\n        \"Oh,\" says Borion. His shoulders slump. \"Okay. I h-hope ${thisi_he} finds s-something.\"\n        *goto plan_stealth_1\n      #\"Yes.  They're all dead.\" (Lie.)\n        *set harsh_kind %-10\n        *set duplicity_loyalty %-10\n        \"They are?!\" whispers Borion, tearing up. He sucks in air before falling to his knees.\n\n        \"${name}'s kidding, honey,\" interjects Thisi, glaring at you.\n        *if saw_log = true\n          \"They evacuated when the Rekelians showed up. They're fine!\"\n          *goto borion_response_5\n        *else\n          \"We don't know what happened yet, but I'm going to research it when I get back to the ship.\"\n          *goto borion_response_5\n        *label borion_response_5\n        \"Oh…oh!\" replies Borion. He forces a small smile. \"That is k-kind of f-funny, actually. Yeah. Ha, ha.\"\n        *goto plan_stealth_1\n    *label plan_stealth_1\n\n    Captain Isan stands before you. \"${name}, since you're our new infiltration specialist, do you think you could get us back to the shuttle without being detected?\"\n    *choice\n      #\"Without a doubt.\"\n        *set follower_leader %+10\n        *set cowardice_bravery %+10\n        \"Good,\" replies Isan. \"Then lead the way.\"\n        *goto plan_stealth_2\n      #\"Maybe.\"\n        *set follower_leader %+10\n        \"I'll take what I can get,\" replies Isan. \"Lead the way.\"\n        *goto plan_stealth_2\n      #\"Probably not.\"\n        *set follower_leader %-10\n        *set cowardice_bravery %-10\n        \"At least you're honest.\" Isan chuckles ruefully. \"Why don't you give it a try, though? Lead the way.\"\n        *goto plan_stealth_2\n\n    *label plan_stealth_2\n\n    Captain Isan puts you in charge of getting the crew off the ship. Using your infiltration training, you successfully lead the crew back to the shuttle right under the Rekelians' oblivious olfactory organs.\n\n    Minutes later, you set off for the [i]Lady Luck[/i], leaving the Vervoo vessel and its buglike invaders far behind.\n    *set mission_success_level 2\n    *finish Continue\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *label purchased\n  *return\n*temp should_trial_end false\n*if choice_is_steam\n  *set should_trial_end true\n*if choice_prerelease\n  *set should_trial_end true\n*if choice_randomtest\n  *set should_trial_end true\n\n*if not(should_trial_end)\n  *return\n\t\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n  *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase adfree $4.99 purchased\n*abort\n", "chapter_2b_mission_plan": "*temp has_gas_canister\n*set has_gas_canister false\n*temp gassed_bugs\n*set gassed_bugs false\n*temp has_weapon\n*set has_weapon false\n*temp unlocked_lockers\n*set unlocked_lockers false\n*temp turned_off_lasers\n*set turned_off_lasers false\n*temp saw_bugs\n*set saw_bugs false\n\nYou stand in a central corridor near the center of the Vervoo ship. The dark, oppressive bulkheads and red emergency lighting set your already-frayed nerves on edge.\n\n*if ran_away_from_crew = false\n  Science officer Thisi B'Artunt and security chief Rallix flank you, making sure you can't escape. \"Now what?\" growls Rallix.\n\n  \"Now,\" replies Thisi, \"we find a way to get to the bridge.\" The Nyarri turns to you, ${thisi_his} gaze wary.\n  *if rank = 2\n    \"This is your chance to prove your loyalty, slave. Look around and see if you can find any way there. We'll wait here for now.\"\n    \n    \"But if you do anything to double-cross us,\" interjects Rallix, \"you'll regret it.\" An electric shock runs from your collar through your muscles, and you gasp.\n    *goto init_choice\n  *else\n    \"Look around and see if you can find any way there. We'll wait here for now.\"\n    *goto init_choice\n*else\n  Banking on the fact that you've got a few minutes before anyone comes looking, you stop to catch your breath. Somehow you have to come up with a plan…and soon.\n*label init_choice\n*choice\n  #Go north to the bridge.\n    *goto bridge\n  #Go west to the science lab.\n    *goto science_lab\n  #Go east to the equipment room.\n    *goto equipment_room\n  #Climb down into a maintenance hatch.\n    *goto maintenance_hatch\n  *hide_reuse #Go south, back the way you came.\n    *if ran_away_from_crew = false\n      Thisi turns ${thisi_his} concerned expression on you.\n\n      Rallix rolls its bulbous eyes. \"We need to find a way onto the bridge before we return to the vault,\" it complains.\n      *goto init_choice\n    *else\n      You consider doubling back but realize it's too dangerous. The crew would surely catch you. No, it's too late now—you've got no choice but to move forward.\n      *goto init_choice\n\n*label crossroads\nYou stand in a central corridor near the center of the Vervoo ship.  The dark, oppressive bulkheads and red emergency lighting set your already-frayed nerves on edge.\n*if ran_away_from_crew = false\n  Science officer Thisi B'Artunt and security chief Rallix flank you. \n*label crossroads_choice\n*choice\n  *hide_reuse *if (ran_away_from_crew = false) #Talk to your shipmates.\n    *if rank = 2\n      \"Don't waste our time with small talk, slave,\" spits Rallix. It sticks itself between Thisi and you, its eyes piercing yours. \"You've been given a direct order, and you're to follow it. Get us onto the bridge, or you'll regret it!\"\n      *goto crossroads_choice\n    *else\n      Rallix grunts in aggravation, but Thisi comes closer, ${thisi_his} expression kind. \"Please try to find a way to get onto the bridge, ${name}.\" The Nyarri leans in and whispers, ${thisi_his} breath warm on your ear. \"Consider this a test of your ability. The captain wants to see if you can think on your feet.\"\n\n      *if ((preference = \"men\") or (preference = \"women\"))\n        Shivers go through you at the sensation of Thisi standing so close to you. You want to impress the captain, but you want to impress Thisi even more.\n\n      *goto crossroads_choice\n  #Go north to the bridge.\n    *goto bridge\n  #Go west to the science lab.\n    *goto science_lab\n  #Go east to the equipment room.\n    *goto equipment_room\n  #Climb down into a maintenance hatch.\n    *goto maintenance_hatch\n\n*label bridge\n*if gassed_bugs = true\n  You hurry down the north corridor, heading directly toward the bridge. You sigh in relief; the dozens of buglike creatures appear to be either unconscious or dead, victims of the gas attack you unleashed only moments ago.  No one's left standing to block the way to the bridge.\n  *if ran_away_from_crew = false\n    *page_break Summon Thisi and Rallix, then proceed to the bridge.\n    *goto_scene chapter_2b_mission_bridge\n  *else\n    *page_break Proceed to the bridge.\n    *goto_scene chapter_2b_mission_bridge\n*else\n  *if has_weapon = true\n    *set saw_bugs true\n    You hurry down the north corridor, determined to reach the bridge as soon as possible. Then you turn a corner, and your stomach clenches. The hall's littered with frightening buglike creatures. Making furious clicking sounds, they swarm around you.\n    *choice\n      #Shoot the bugs with the arc welder.\n        *set hurt_bugs true\n        Fighting down your fear, you take careful aim and loose the fury of the arc welder on the roachlike creatures. Less than a minute later, bright green blood floods the deck. You wrinkle your nose but smile. Disgusting as the mess is, you've cleared the way to the bridge.\n        *if ran_away_from_crew = false\n          *page_break Summon Thisi and Rallix, then proceed to the bridge.\n          *goto_scene chapter_2b_mission_bridge\n        *else\n          *page_break Proceed to the bridge.\n          *goto_scene chapter_2b_mission_bridge\n      #Run back to the crossroads.\n        You retreat, making your way back to the crossroads.\n\n        *goto crossroads\n  *else\n    *set saw_bugs true\n    *if bugs_attacked = true\n      Hoping the north corridor's cleared out, you hurry back through it. You turn into the next hall and groan. It's still brimming with the insectoid creatures. The last thing you want is a repeat of the past few minutes, so you retreat back to the crossroads before the bugs can attack.\n      *goto crossroads\n    *set bugs_attacked true\n    You hurry down the north corridor, intent on reaching the bridge as soon as possible. Then you turn a corner, and your stomach clenches. The hall's littered with frightening buglike creatures. Making furious clicking sounds, they swarm around you.\n\n    Several bugs sink their teeth into your skin. Flailing your arms wildly before you, you barely manage to retreat back to the crossroads. Your body screams from the agony of more than a hundred bites.\n    *set health -10\n    *if health \u003c 1\n      Seconds later, your body succumbs to the accumulated poison of more than a hundred bites, and you collapse. A final thought rises through the haze of black: If only you'd never left Earth…\n\n      GAME OVER.\n      *goto_scene ending\n    *else\n      *goto crossroads\n\n*label science_lab\nWalking to the west, you open a single door with an old-fashioned handle. It leads to a cramped, dimly lit science lab. Most of the outdated equipment appears to be offline—not surprising, you think, given the lack of power elsewhere on the ship. Then you notice a single terminal emitting a soft glow.\n*choice\n  #Access the computer terminal.\n    You access the computer terminal, but all you can pull up is an error message. Most of the commands no longer work. You sigh, pounding the console with your fist. Only two systems appear to still be operational: door controls and life support.\n    *choice\n      #Access door controls.\n        *label door_controls\n        *if unlocked_lockers = true\n          Since you've already unlocked the equipment room lockers, you can't see anything else to gain here.\n          *choice\n            #Access life support.\n              *goto life_support\n            #Return to the crossroads.\n              You leave the science lab and return to the corridor.\n\n              *goto crossroads\n        *else\n          You access the door controls. Most of the doors on the ship are already unlocked, including the vault your crew's currently emptying out. One room, however, contains several sealed lockers. With a start, you realize you can unlock them from here.\n          *choice\n            #Unlock the lockers.\n              *set unlocked_lockers true\n              You tap the computer screen where indicated, and the locks on the lockers release.\n              *choice\n                #Access life support.\n                  *goto life_support\n                #Leave the computer and return to the crossroads.\n                  You leave the science lab and return to the corridor.\n\n                  *goto crossroads\n            #Leave the lockers alone.\n              You decide to leave the lockers alone for now. They can't be that useful, anyway.\n              *choice\n                #Access life support.\n                  *goto life_support\n                #Leave the computer and return to the crossroads.\n                  You leave the science lab and return to the corridor.\n\n                  *goto crossroads\n      #Access life support.\n        *label life_support\n        *if gassed_bugs = true\n          You've already gassed the bugs. There's not much else you can do here.\n          *choice\n            #Access door controls.\n              *goto door_controls\n            #Return to the crossroads.\n              You leave the science lab and return to the corridor.\n\n              *goto crossroads\n        *else\n          You access the life support system. Your pulse speeds up as realize you can inject various gases into\n          the airstream of particular rooms on the ship.\n          *choice\n            #Gas a room.\n              *if specialization = \"science\"\n                *if saw_bugs = false\n                  You're not sure what room you would want to gas.\n                  *choice\n                    #Access door controls.\n                      *goto door_controls\n                    #Leave the computer and return to the crossroads.\n                      You leave the science lab and return to the corridor.\n\n                      *goto crossroads\n                *else\n                  *if has_gas_canister = true\n                    You inject the canister of gas you obtained into a slot next to the computer terminal. Then you set the command to gas the corridor leading to the bridge. Hopefully, it'll either kill or immobilize the buglike creatures swarming there.\n\n                    A few seconds later, the terminal informs you that the gas has been unleashed. You heave a sigh of relief. The corridor should be safe now.\n                    *set gassed_bugs true\n                    *set hurt_bugs true\n                    *page_break Leave the computer and return to the crossroads.\n                    *goto crossroads\n                  *else\n                    Excited, you devise a way to immobilize the creatures in the corridor leading to the bridge. Unfortunately, you quickly discover you can't do anything without a canister of toxic gas.\n                    *choice\n                      #Access door controls.\n                        *goto door_controls\n                      #Leave the computer and return to the crossroads.\n                        You leave the science lab and return to the corridor.\n\n                        *goto crossroads\n              *else\n                As much as you'd love to play with the life support systems, you have to admit your scientific knowledge is nowhere near good enough to warrant the risk.\n                *choice\n                  #Access door controls.\n                    *goto door_controls\n                  #Leave the computer and return to the crossroads.\n                    You leave the science lab and return to the corridor.\n\n                    *goto crossroads\n            #Access door controls.\n              *goto door_controls\n            #Leave the computer and return to the crossroads.\n              You leave the science lab and return to the corridor.\n\n              *goto crossroads\n      #Leave the computer and return to the crossroads.\n        You leave the science lab and return to the corridor.\n\n        *goto crossroads\n  #Return to the crossroads.\n    You leave the science lab and return to the corridor.\n\n    *goto crossroads\n\n*label equipment_room\nYou enter an equipment room lined with benches and lockers.\n*if unlocked_lockers = false\n  The lockers, all closed, appear to be locked. You can't see any way of opening them from within this room, unless— Your eyes land on a small security panel glowing next to one locker. Your breath catches; you're pretty sure the panel's operational.\n*choice\n  *if (unlocked_lockers = true) #Open the lockers.\n    *label lockers\n    *if has_weapon = false\n      You fling open the lockers, now unlocked thanks to the science lab computer, and ransack their contents.  You sigh; most of the lockers are either empty or filled with useless goods. One, however, contains an engineering tool that brings a smile to your face. It's an arc welder.\n      *choice\n        #Take the arc welder to use as a weapon.\n          *if specialization = \"tactical\"\n            Thanks to your vast store of tactical knowledge, you know precisely how to arm the arc welder for use against the buglike creatures. Grinning, you harness the device.\n            *set has_weapon true\n            *page_break Leave the equipment room and return to the corridor.\n            *goto crossroads\n          *else\n            You examine the arc welder thoroughly. Sadly, you just don't have the advanced tactical training to operate this thing. After tinkering with it for a few minutes, you set it aside.\n            *choice\n              #Access the security panel.\n                *goto security_panel\n              #Return to the crossroads.\n                You leave the equipment room and return to the crossroads.\n\n                *goto crossroads\n        #Leave the arc welder where it is.\n          You decide to leave the arc welder alone for now.\n          *choice\n            #Access the security panel.\n              *goto security_panel\n            #Return to the crossroads.\n              You leave the equipment room and return to the crossroads.\n\n              *goto crossroads\n    *else\n      You've already taken the arc welder, and nothing else in the lockers will help you take down the bug creatures.\n      *choice\n        #Access the security panel.\n          *goto security_panel\n        #Return to the crossroads.\n          You leave the equipment room and return to the crossroads.\n\n          *goto crossroads\n  #Access the security panel.\n    *label security_panel\n    You examine the security panel's screen. There's a simple toggle that connects to some kind of laser-based security system built into the ventilation ducts. Hmm, you think. It would be so easy to turn it on or off.\n    *if turned_off_lasers = false\n      The lasers are currently on.\n      *goto set_lasers\n    *else\n      The lasers are currently off.\n    *label set_lasers\n    *choice\n      #Toggle the lasers.\n        *if turned_off_lasers = false\n          You toggle the lasers off.\n          *set turned_off_lasers true\n          *choice\n            *if (unlocked_lockers = true) #Open the lockers.\n              *goto lockers\n            #Return to the crossroads.\n              You leave the equipment room and return to the crossroads.\n\n              *goto crossroads\n        *else\n          You toggle the lasers on.\n          *set turned_off_lasers false\n          *choice\n            *if (unlocked_lockers = true) #Open the lockers.\n              *goto lockers\n            #Return to the crossroads.\n              You leave the equipment room and return to the crossroads.\n\n              *goto crossroads\n      *if (unlocked_lockers = true) #Open the lockers.\n        *goto lockers\n      #Return to the crossroads.\n        You leave the equipment room and return to the crossroads.\n\n        *goto crossroads\n  #Return to the crossroads.\n    You leave the equipment room and return to the crossroads.\n\n    *goto crossroads\n\n*label maintenance_hatch\nYou climb down into a small maintenance hatch embedded in the floor of the corridor. It's full of dust, making you cough. Once you clear your lungs, you spot a few portable canisters of toxic gas heaped under a small ventilation duct. Grimacing, you wonder if they were used to control unruly passengers.\n*choice\n  #Take a gas canister.\n    *label gas_canister\n    *if has_gas_canister = true\n      You've already taken a gas canister. There's no need for another.\n      *choice\n        #Enter the ventilation duct.\n          *goto vent_duct\n        #Return to the crossroads.\n          You climb up out of the maintenance hatch and return to the crossroads.\n\n          *goto crossroads\n    *else\n      You grab one of the canisters of gas.\n      *set has_gas_canister true\n      *choice\n        #Enter the ventilation duct.\n          *goto vent_duct\n        #Return to the crossroads.\n          You climb up out of the maintenance hatch and return to the crossroads.\n\n          *goto crossroads\n  #Enter the ventilation duct.\n    *label vent_duct\n    *if specialization = \"infiltration\"\n      Thanks to your infiltration training, you're able to contort your body to easily fit inside the cramped ventilation shaft. Crawling farther in, you locate a security system embedded into the wall.\n      *if turned_off_lasers = false\n        A set of visible green lasers spans the width of the shaft. You keep your distance, knowing a single brush with a laser could be fatal. Annoyed, you admit your path's blocked for now.\n        *page_break Exit back the way you came.\n        *goto maintenance_hatch\n      *else\n        You see devices on the wall that would ordinarily emit deadly laser beams across the shaft…but thanks to your earlier actions, they've been fully deactivated. Once you reach the end of the shaft, you peer through the opening. Your heart lifts; you're looking directly out on the Vervoo ship's bridge.\n        *if ran_away_from_crew = false\n          \n          You double back and inform Thisi and Rallix that you've found a way to the bridge. You're confident you can help both of them fit inside the shaft.\n\n          Minutes later, the three of you crawl into the shaft, easily bypassing any creatures you might have otherwise run into.\n          *page_break Proceed to the bridge.\n          *goto_scene chapter_2b_mission_bridge\n        *else\n          *page_break Proceed to the bridge.\n          *goto_scene chapter_2b_mission_bridge\n    *else\n      Try as you might, you can't fit into the cramped duct. If only you'd had more specific training in infiltration… But since you don't, you decide to stop wasting valuable time.\n      *choice\n        #Take a gas canister.\n          *goto gas_canister\n        #Return to the crossroads.\n          You climb up out of the maintenance hatch and return to the crossroads.\n\n          *goto crossroads\n  #Return to the corridor.\n    You climb up out of the maintenance hatch and return to the crossroads.\n\n    *goto crossroads", "chapter_2b_mission_start": "On the flight to the Vervoo ship, you're sandwiched between Shelou Vili and Rallix. They're locked in a staring contest, shooting each other fierce glances as if you're not even there. Just when you're about to get up and find another seat, Shelou Vili speaks to you. His eyes never leave Rallix.\n\n\"Tell me, human, would you consider yourself to be a religious fanatic?\"\n\nRallix's already bulbous eyes bulge. \"Do you have something to say to me, Vili?\"\n\n\"Not at all,\" responds Shelou Vili smoothly. He finally looks at you. \"My people, the Aviarks, devote our lives to studying culture, religion, and philosophy.  We believe that enlightenment is only attained through exposure to a multitude of beliefs, rituals, and customs. It is of the utmost importance to us that tradition be upheld. For example, my tribe, Vili, is in charge of performing the S'Nashta ritual every third solar year.  Without our adherence to tradition, our entire society would devolve into chaos.\"  He glances at Rallix.  \"Unlike some of us,\" he continues, \"we hold that all beliefs are equal.\"\n\nRallix rolls its eyes in clear contempt. \"He's baiting you, human,\" it growls. \"He is simply trying to use you to upset me.\"\n\n\"Not at all,\" says Shelou Vili. You try not to laugh. How did you end up in the middle of this? \"I am truly curious to hear your take on the subject, ${name}.  Do you value tradition yourself?\"\n*choice\n  #\"Traditions are the foundation of any worthwhile culture.\"\n    *set rallix_shelou %+20\n    Shelou Vili bows his head in deference. \"It is rare that I meet another species with such enlightened beliefs. You honor me, human, as well as my people.\"\n\n    \"Pathetic,\" spits Rallix.  \"Both of you!  If you are not One with the Hive, your rituals are meaningless.\"\n\n    *goto shuttle_end\n  #\"I do what I can to uphold my own traditions, yes.\"\n    *set rallix_shelou %+10\n    Shelou Vili nods in approval.  \"And you are wise to do so.  A strong system of beliefs fuels a strong heart and mind.\"\n\n    \"Pathetic,\" spits Rallix.  \"Both of you!  If you are not One with the Hive, your rituals are meaningless.\"\n\n    *goto shuttle_end\n  #\"I couldn't care less about tradition.\"\n    *set rallix_shelou %-20\n    Shelou Vili looks incredulous.  \"If you do not understand the past, human, how do you expect to prepare for the future?  Without a firm set of beliefs, one simply cannot function.\"\n\n    \"Leave the human alone.\" Rallix laughs, patting you a little too hard on the back. \"Not everyone is as deluded as you when it comes to traditions, Vili.\"\n\n    Shelou Vili glowers at Rallix.\n\n    *goto shuttle_end\n  #\"Sorry, but this is between you two.\"\n    *set garce_isan %+20\n    Rallix glares at you, and Shelou Vili huffs indignantly, but Captain Isan laughs. \"Good answer.\"\n\n    *goto shuttle_end\n*label shuttle_end\nThe rest of the journey to the Vervoo vessel is tense. How, you wonder, does this crew actually manage to work together? Their beliefs differ so sharply, it might as well drive a knife between them.\n\nTwenty minutes later, you arrive at the ship and dock.  After proceeding through a dark, outdated airlock, Captain Isan leads the entire team onto the ship. Everything except for emergency power appears to be offline. The gloomy red light stains the deserted corridor the color of blood, prompting everyone to reach for flashlights.\n\nCaptain Isan pauses. \"Thisi, run a quick scan of the ship. We need to know we're headed in the right direction.\"\n\nThisi trades ${thisi_his} flashlight for a handheld scanner. Tapping a few buttons, ${thisi_he} slowly waves the device around the room. \"According to my scans, the vault is straight ahead and two decks down.\"\n\n\"Where's the nearest lift?\" asks Isan.\n\n\"Straight down this hall,\" Thisi replies. \"Not that it'll do us much good with the main power offline.\"\n\n\"Then we'll climb down,\" growls Rallix. \"Find us a ladder.\"\n\n\"Th-Thisi?\" asks Borion, his voice shaking. \"S-still no sign of life?\"\n\nThisi shakes ${thisi_his} head sympathetically. \"I'm afraid not, Borion.\" Borion bows his head, barely holding back his tears.\n\n*choice\n  *selectable_if (harsh_kind > 70) #Comfort Borion.\n    *if rank = 2\n      *set harsh_kind %+10\n      You start to put your arm around the Vervoo slave when an electric shock from your collar jolts through you. Crying out, you drop your arm.\n      \n      \"Did I say you could touch him, slave?\" hisses Rallix, looking very pleased with itself.\n\n      \"Rallix, that's enough,\" staps Isan, irritated. \"Don't abuse your power.\" ${isan_he} waits until Rallix apologizes, then says, \"Come on, all. We've got work to do.\"\n      *goto down_the_hall\n    *else\n      *set harsh_kind %+10\n      You put your arm around the Vervoo slave and tell him that it will be okay.  \n\n      \"Thanks,\" Borion says, a surprised but pleased smile breaking over his face. He returns the squeeze.\n\n      \"Come,\" states Isan, nodding approvingly at you. \"Let's go, all; we've got work to do.\"\n      *goto down_the_hall\n  #Nod politely toward Borion.\n    Unsure of how to react, you nod briefly at Borion.\n\n    \"Thanks,\" says Borion. He nods back, still clearly disheartened.\n\n    \"Come,\" states Isan.  \"Let's go, all; we've got work to do.\"\n    *goto down_the_hall\n  *selectable_if (harsh_kind \u003c 30) #Laugh at Borion's pain.\n    *set harsh_kind %-10\n    You can't help but snicker at Borion's disappointment.  Captain Isan looks at you sharply, eyes narrowed, and Borion himself begins to laugh nervously.  \"I…guess this s-situation is pretty unusual,\" he says.  \"B-better to laugh than to c-cry, right?\"\n\n    \"Enough,\" states Isan, shooting you one last disgusted glance. \"Let's go. We've got work to do.\"\n    *goto down_the_hall\n*label down_the_hall\n*page_break Proceed to the vault.\nThe climb down the empty lift shaft is quick but taxing. Panting, you arrive at the sealed vault.\n\nThisi once again equips ${thisi_his} scanner.  \"The vault appears to be made of tirrinium.\"\n\nRallix scoffs.  \"We couldn't possibly break through that!\"\n\n\"Have patience, Nixian,\" Shelou Vili counsels smugly.  \"A solution will come.\"\n\n\"Maybe,\" says Captain Isan, \"but I'd rather not waste any more time here than we have to.\"  ${isan_he} turns directly to you.\n*if rank = 2\n  \"What about you, slave?  Any ideas?\"\n  *goto vault_ideas\n*else\n  \"What about you, ${name}?  Any ideas?\"\n  *goto vault_ideas\n*label vault_ideas\n*choice\n  *selectable_if (specialization = \"tactical\") #\"If we tune our weapons to a specific frequency, we might be able to blow open the door.\" (TACTICAL)\n    *set follower_leader %+10\n    *set duplicity_loyalty %+10\n    Captain Isan frowns and addresses his scientific officer.  \"Thisi, is ${name} right?\"\n\n    Thisi consults ${thisi_his} scanner once more.  A beat later, ${thisi_he} smirks.  \"According to my scanner, if we set our energy weapons to a modulated frequency of 102.8, it should be enough to disrupt the matter of the tirrinium.\"\n\n    Rallix grins.  \"Then what are we waiting for?\" it proclaims, raising its weapon.  It adjusts the weapon's frequency, aims at the door, and fires.  A steady stream of bright red energy strikes the vault door, which dissolves into nothing.\n\n    Shivering, you remind yourself never to get on Rallix's bad side.\n\n    Captain Isan beams.  \"Well done, ${name}!  That tactical training certainly came in handy.\"  ${isan_he} gestures at the open doorway.  \"All right, everyone.  Let's see what's inside!\"\n    *page_break Enter the vault.\n    *goto enter_vault\n  *selectable_if (specialization = \"science\") #\"There must be a computer system nearby that will open the door for us, if we can hack it.\" (SCIENCE)\n    *set follower_leader %+10\n    *set duplicity_loyalty %+10\n    Captain Isan nods, looking up at the crew.  \"All right, everyone, take a look around.  If you spot any computers that look like they may relate to the vault, notify ${name}.\"\n\n    You hope you were right. The captain asks you more questions about computers while the others search the deck.  Five minutes later, Borion rushes up to you.  \"I t-think I found s-something,\" he says, huffing and puffing.\n\n    \"Lead the way,\" says Isan crisply.\n\n    You follow Borion to a small computer terminal set in one wall.  \"All right, ${name},\" says the captain.  \"Show me what you can do.\"\n\n    Thanks to your advanced computer training, you have no problem accessing the vault control interface and unlocking the seal.  The vault door slides right open.\n\n    Captain Isan beams.  \"Well done, ${name}!  That scientific and engineering training certainly came in handy.\"  ${isan_he} gestures at the open doorway.  \"All right, everyone.  Let's see what's inside!\"\n    *set garce_isan %+10\n    *page_break Enter the vault.\n    *goto enter_vault\n  *selectable_if (specialization = \"infiltration\") #\"Perhaps there's another way in.\" (INFILTRATION)\n    *set follower_leader %+10\n    *set duplicity_loyalty %+10\n    Captain Isan shrugs.  \"Anything's possible.\"\n    *if rank = 2\n      Isan looks at ${isan_his} security officer. \"Rallix, do you have any concerns about letting our slave take a look around?\"\n\n      Rallix hesitates, its forelegs vibrating. \"I'm not thrilled about this, Captain.\"\n\n      \"But do you have any actual concerns?\" presses Isan.\n\n      \"No,\" Rallix reluctantly admits. If you insist, Captain, I suppose the slave can try.\"\n      *goto safe_to_look\n    *label safe_to_look\n    Isan steps closer to you.  \"All right, ${name}, this is your chance. Find us another way into the vault.\"\n    *page_break Search for an alternate way into the vault.\n    You spend the next fifteen minutes creating a mental layout of the Vervoo ship's mazelike corridors.  Your attention to detail pays off; you discover a series of ventilation shafts that intersect with the vault.  Grinning, you clamber into the nearest shaft and climb until you reach the vault. From there, it's just a turn of a wheel and a press of a few buttons to let the others in. The door slides right open.\n\n    Captain Isan beams.  \"Well done, ${name}!  That scientific and engineering training certainly came in handy.\"  ${isan_he} gestures at the open doorway.  \"All right, everyone.  Let's see what's inside!\"\n    *set garce_isan %+10\n    *page_break Explore the vault.\n    *goto enter_vault\n  #Suggest blowing up the vault door, knowing it won't work.\n    *set follower_leader %+10\n    *set duplicity_loyalty %-10\n    *set suspicion +10\n    You suggest to Captain Isan that blowing up the vault door with explosives might be worth trying.\n    \n    Isan looks over to Rallix and arches ${isan_his} eyebrows.  \"What do you think?\"\n    \n    Rallix sneers.  \"I never say no to blowing things up.\"\n    \n    Ten minutes later, the vault door is completely wired, and everyone stands back.  Rallix presses a button. Seconds later, a controlled explosion shakes th
