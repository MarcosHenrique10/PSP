If you do, you'll be given a bit more freedom than you have now.\"\n  *goto mission_plan\n*elseif (rank = 2) or (rank = 3)\n  *set rank 4\n  \"You may now consider yourself an official junior member of this ship's crew.  Congratulations, ${name}.  Rallix will remove the slave collar from around your neck immediately.\" Isan smiles. \"You deserve it.\"\n  *goto mission_plan\n*elseif rank = 4\n  *set rank 5\n  \"You've shown yourself to be quite useful, ${name}.  That's why I'm now considering you a senior member of the crew.  Some of the others weren't too happy at first, but you've proven yourself, and everyone's come to accept you.\" Isan smiles. \"More importantly, I trust you. Don't betray that trust, and you'll have earned your promotion.\"\n  *goto mission_plan\n*else\n  \"Unfortunately, you already rank about as high as you can get in this crew.  Unless you want to be captain, that is,\" Isan adds with a wink.  \"In any case, keep doing what you're doing, ${name}.  You're a shining example for us all.\"\n  *goto mission_plan\n\n\n\n*label mission_plan\n*page_break\nIsan steps back into the circle of the crew. \"And now on to more important matters,\" ${isan_he} says loudly.  \"I've found us work.  Now I know what you're all thinking, and yes, this time our client is reputable.  Our next mission will not be another Jeeq.\"\n*choice\n  #\"Another mission?  Fantastic!\"\n    *set garce_isan %+20\n    *set duplicity_loyalty %+10\n    *set harsh_kind %+10\n    *set follower_leader %-10\n    Isan nods at you.  \"That it is.\" ${isan_he} looks at every member of the crew.  \"This mission is going to be the one that makes our careers.  Yes, you heard me right. If we pull this off, we'll never need to work again.\" Everyone gasps, and you shake your head in awe. \"Now gather around and let me tell you all about it…\"\n    \n    The crew eagerly listens as Isan describes the mission. You can't help the excitement that rushes through you. After what happened on Jeeq, you need some hope.\n\n    A few hours later, the ship departs from Tuskin, the trade port already just a memory—one you may never revisit.\n    *finish\n  #\"What's our next mission, Captain?\"\n    *set garce_isan %+10\n    *set duplicity_loyalty %+10\n    \"I'm glad you asked,\" replies Isan. ${isan_he} looks at every member of the crew.  \"This mission is going to be the one that makes our careers.  Yes, you heard me right. If we pull this off, we'll never need to work again.\" Everyone gasps, and you shake your head in awe. \"Now gather around and let me tell you all about it…\"\n\n    The crew eagerly listens as Isan describes the mission. You can't help the excitement that rushes through you. After what happened on Jeeq, you need some hope.\n\n    A few hours later, the ship departs from Tuskin, the trade port already just a memory—one you may never revisit.\n    *finish\n  #\"So when are we finally heading to Earth?\"\n    *set garce_isan %-10\n    *set duplicity_loyalty %-10\n    *set harsh_kind %-10\n    *set follower_leader %+10\n    *set cowardice_bravery %+10\n    Isan ignores you, looking at every member of the crew instead.  \"This mission is going to be the one that makes our careers.  Yes, you heard me right. If we pull this off, we'll never need to work again.\" Everyone gasps, and you shake your head in awe. \"Now gather around and let me tell you all about it…\"\n\n    The crew eagerly listens as Isan describes the mission. You can't help the excitement that rushes through you. If you're not going home yet, you might as well make some serious money.\n\n    A few hours later, the ship departs from Tuskin, the trade port already just a memory—one you may never revisit.\n    *finish\n  #\"Whatever the mission is, I'm sure you'll find a way to screw it up.\"\n    *set garce_isan %-20\n    *set duplicity_loyalty %-10\n    *set harsh_kind %-10\n    *set cowardice_bravery %+10\n    Isan glares before turning to face the rest of the crew. They sneer at you. \"This mission is going to be the one that makes our careers,\" Isan promises.  \"If we pull this off, we'll never need to work again.  Now let me tell you all about it…\"\n\n    TThe crew eagerly listens as Isan describes the mission. You can't help the excitement that rushes through you. After what happened on Jeeq, you need some hope.\n\n    A few hours later, the ship departs from Tuskin, the trade port already just a memory—one you can't wait to forget.\n    *finish\n  #\"Oh, no, not another mission.\"\n    *set garce_isan %-10\n    *set duplicity_loyalty %-20\n    *set harsh_kind %-10\n    Isan glares at you before turning to face the rest of the crew. \"This mission is going to be the one that makes our careers,\" ${isan_he} promises.  \"If we pull this off, we'll never need to work again.  Now let me tell you all about it…\"\n\n    TThe crew eagerly listens as Isan describes the mission. Even though you just want a break, you can't help the excitement that rushes through you. After what happened on Jeeq, you need some hope.\n\n    A few hours later, the ship departs from Tuskin, the trade port already just a memory—one you can't wait to forget.\n    *finish\n  #Remain silent.\n    *set follower_leader %-20\n    *set cowardice_bravery %-10\n    \"This mission is going to be the one that makes our careers.  Yes, you heard me right. If we pull this off, we'll never need to work again.\" Everyone gasps, and you shake your head in awe. \"Now gather around and let me tell you all about it…\"\n    \n    The crew eagerly listens as Isan describes the mission. You can't help the excitement that rushes through you. After what happened on Jeeq, you need some hope.\n\n    A few hours later, the ship departs from Tuskin, the trade port already just a memory—one you may never revisit.\n    *finish", "chapter_6a_intro": "*advertisement 1200\n*temp comp1\n*temp comp1_score\n*temp comp2\n*temp comp2_score\n*if thisi_taloo \u003c 50\n  *set comp1 \"Thisi\"\n  *set comp1_score 100 - thisi_taloo\n  *goto config_1\n*else\n  *set comp1 \"Taloo\"\n  *set comp1_score thisi_taloo\n  *goto config_1\n*label config_1\n*if rallix_shelou \u003c 50\n  *set comp2 \"Rallix\"\n  *set comp2_score 100 - rallix_shelou\n  *goto config_2\n*else\n  *set comp2 \"Shelou\"\n  *set comp2_score rallix_shelou\n  *goto config_2\n*label config_2\n*if comp1_score >= comp2_score\n  *set friend comp1\n  *goto start\n*else\n  *set friend comp2\n  *goto start\n\n*label start\nCHAPTER SIX - AN ENCOUNTER AT ESSCH\n\nOver the next two weeks, Captain Isan lays out a plan for the crew's next mission. It's not long before everyone's bouncing off the ship's corridors, eager to get started. The [i]Lady Luck[/i] is set on course for the planet Essch, a lush, tropical world inhabited by a primitive civilization known for its dogmatic religious beliefs and its numerous holy relics—which just happen to be considered priceless on the intergalactic black market. As Captain Isan explains, the crew's employers, a duo of Aviark archaeologists, are interested in examining several of these relics. Your job is to liberate them.\n\nBecause Cathella, the temple site housing the relics, is heavily guarded, it takes Isan longer than usual to come up with a plan. The crew grows more and more impatient, but two days out from Essch, the captain calls the entire crew into ${isan_his} office to go over the new strategy.\n*page_break\n*if rank = 1\n  Rallix retrieves you from your prison cell, giving you an electrical shock for good measure, and escorts you to the captain.\n  *goto intro_continued\n*elseif rank = 2\n  *if borion_died = true\n    An electrical jolt from your slave collar jerks you from a nap in your desolate quarters—even lonelier now that Borion's gone. As you writhe with pain, it takes you a minute to realize the captain's summoning you.\n    *goto intro_continued\n  *else\n    Borion shakes your shoulder, jerking you from a nap.  \"C-Captain Isan wants to s-see us right away,\" he whispers, the sound loud in your cramped quarters. \"Come on!\"\n    *goto intro_continued\n*elseif rank = 4\n  You're enjoying a quiet meal in the mess hall when a message sounds over the intercom: Captain Isan wants to see you.\n  *goto intro_continued\n*else\n  You're enjoying a filling meal in the mess hall with ${friend} when a message sounds over the intercom: Captain Isan wants to see you both.\n  *goto intro_continued\n*label intro_continued\n\nWhen you reach the captain's office, the rest of the crew's already there.  \"Nice of you to show up,\" comments Isan sarcastically.  \"Okay, crew, I know a lot of you are excited about this mission, so let's go over it.  As you already know, our goal is to obtain the holy relics located in the Cathella temple.  Unfortunately, we don't just have priests to worry about; there're also plenty of guards to keep us busy. Don't forget, these people might be primitive, but knives and spears can kill just as surely as a laser pistol.\"\n*choice\n  *selectable_if (duplicity_loyalty > 65) #\"I can't wait to get started, Captain!\" (LOYALTY)\n    *if garce_isan > 50\n      *set garce_isan %+10\n      *set harsh_kind %+10\n      *set cowardice_bravery %+10\n      *set duplicity_loyalty %+10\n      *set follower_leader %-10\n      Isan smiles.  \"I know you can't, ${name}.  And trust me—it'll be worth your while.\"\n      *goto the_plan\n    *else\n      *set garce_isan %-10\n      *set harsh_kind %+10\n      *set cowardice_bravery %+10\n      *set duplicity_loyalty %+10\n      *set follower_leader %-10\n      Isan frowns.  \"Please don't interrupt,\" ${isan_he} says firmly. It couldn't be clearer that Isan doesn't like you.\n      *goto the_plan\n  #\"This mission sounds like it might be a fun challenge.\"\n    *if cowardice_bravery \u003c 25\n      *set garce_isan %-10\n      *set rallix_shelou %+10\n      *set thisi_taloo %+10\n      *set harsh_kind %+10\n      *set cowardice_bravery %+10\n      *set duplicity_loyalty %+10\n      *set follower_leader %-10\n      \"Assuming you don't run away at the first sign of danger,\" mutters Rallix. You scowl. Several members of the crew laugh, but Isan doesn't appear amused.\n      *goto the_plan\n    *else\n      *set garce_isan %-10\n      *set rallix_shelou %-10\n      *set thisi_taloo %-10\n      *set harsh_kind %+10\n      *set cowardice_bravery %+10\n      *set duplicity_loyalty %+10\n      *set follower_leader %-10\n      \"Fun or not, we have to keep level heads,\" notes Isan, staring at you with narrowed eyes.  \"Remember, we're here for work, not pleasure.\"\n      *goto the_plan\n  #\"The mission sounds a bit too dangerous to me.\"\n    *if cowardice_bravery > 75\n      *set garce_isan %+10\n      *set rallix_shelou %-10\n      *set thisi_taloo %-10\n      *set harsh_kind %+10\n      *set cowardice_bravery %-10\n      *set duplicity_loyalty %-10\n      *set follower_leader %+10\n      Several members of the crew, including Captain Isan, laugh heartily. You grin. Everyone knows how you love to face danger head on.\n      *goto the_plan\n    *elseif cowardice_bravery \u003c 25\n      *set garce_isan %+10\n      *set rallix_shelou %-10\n      *set thisi_taloo %-10\n      *set harsh_kind %+10\n      *set cowardice_bravery %-10\n      *set duplicity_loyalty %-10\n      *set follower_leader %+10\n      Several members of the crew, including Captain Isan, shake their heads. You hang your head. Everyone knows what a coward you are.\n      *goto the_plan\n    *else\n      *set garce_isan %+10\n      *set rallix_shelou %-10\n      *set thisi_taloo %-10\n      *set harsh_kind %+10\n      *set cowardice_bravery %-10\n      *set duplicity_loyalty %-10\n      *set follower_leader %+10\n      Several members of the crew, including Captain Isan, look around in confusion. You guess they must be wondering when you started caring about the ship and its crew.\n      *goto the_plan\n  #\"Is there some way we could get the relics delivered to us instead of going inside the temple?\"\n      *if rank \u003c 3\n        *set garce_isan %-20\n        *set duplicity_loyalty %+10\n        *set follower_leader %+20\n        \"Coming up with the plan was my job,\" warns Isan.  \"Do not speak again unless spoken to.\"  ${isan_he} nods at Rallix, and a harsh electrical jolt from your collar sets your muscles spasming. You cry out.\n        *goto the_plan\n      *else\n        *set garce_isan %+20\n        *set duplicity_loyalty %+10\n        *set follower_leader %+20\n        \"An interesting idea,\" notes Isan.  \"What do you think, Shelou Vili?\"\n\n        The Aviark researcher clears his throat. \"The native people of Essch are quite the fundamentalists,\" he observes patronizingly.  \"I do not believe they could ever be coerced into handing over the relics.\"\n\n        \"Well, it was worth asking,\" says Isan, nodding at you.\n        *goto the_plan\n  *selectable_if (specialization = \"tactical\") #\"Why not just shoot everyone and take the relics?\" (TACTICAL)\n      *set garce_isan %-20\n      *set rallix_shelou %-20\n      *set thisi_taloo %+20\n      *set harsh_kind %-20\n      *set cowardice_bravery %-10\n      *set duplicity_loyalty %+10\n      *set follower_leader %+10\n      \"Now we're talking!\" roars Rallix in delight.  Captain Isan, however, frowns, and Thisi looks ill.\n      \n      \"We don't kill innocent people,\" says the captain firmly, wagging a finger at Rallix.  \"No matter what the cost. Understood?\"\n      *goto the_plan\n  *selectable_if (specialization = \"science\") #\"I might have a computer trick or two to distract the guards up my sleeve.\" (SCIENCE)\n      *set garce_isan %+10\n      *set rallix_shelou %+10\n      *set thisi_taloo %-10\n      *set harsh_kind %+10\n      *set duplicity_loyalty %+10\n      *set follower_leader %+10\n      \"It's a good idea,\" says Thisi, smiling hopefully at the captain.\n      \n      Shelou Vili, however, shakes his head.  \"The native people of Essch are quite the fundamentalists,\" he explains patronizingly. \"I do not believe the guards would fall for any sort of remote trickery.\"\n\n      \"Well, it was worth asking,\" says Isan, nodding at you.\n      *goto the_plan\n  *selectable_if (specialization = \"infiltration\") #\"We should just try to sneak in.\" (INFILTRATION)\n      *set garce_isan %+10\n      *set rallix_shelou %+10\n      *set thisi_taloo %+10\n      *set cowardice_bravery %-10\n      *set duplicity_loyalty %+10\n      *set follower_leader %+10\n      \"Not possible,\" says Rallix.  It shakes its forelegs as Captain Isan steps forward.\n      \n      \"The temple is surrounded by a large host of guards,\" the captain explains.  \"And they're not fools.  There's no way we'll get past everyone without being spotted.\"\n      *goto the_plan\n  *selectable_if (rank \u003c 3) #\"I refuse to take part in this mission.\" (SLAVE/PRISONER)\n      *set garce_isan %-10\n      *set rallix_shelou %+10\n      *set thisi_taloo %-10\n      *set cowardice_bravery %+10\n      *set duplicity_loyalty %-20\n      *set follower_leader %+10\n      Isan snarls at you, and Rallix laughs, shaking its head. A harsh electrical jolt from your collar sets your muscles spasming. You cry out. Nearby, Thisi winces.\n      \n      \"Your participation in this mission is mandatory,\" states Isan flatly. \"Enough of your mouth.\"\n      *goto the_plan\n  #Remain silent.\n      *set garce_isan %-10\n      *set cowardice_bravery %-10\n      *set duplicity_loyalty %-10\n      *set follower_leader %-10\n    \"Don't everyone speak at once,\" says Isan sardonically.\n    *goto the_plan\n*label the_plan\nCaptain Isan outlines ${isan_his} plan.  The crew will be split up into three teams for the mission.  Team A will consist of\n*if (specialization = \"infiltration\") and (rank > 3)\n  Taloo, Thisi, and you.  The three of you will sneak onto the temple grounds and clear a path for Team B, distracting the guards and working together to ensure that the path remains clear.\n  *goto team_b\n*else\n  Taloo and Thisi.  The two of them will sneak onto the temple grounds and clear a path for Team B by distracting the guards.\n  *goto team_b\n*label team_b\n\nTeam B will consist of\n*if rank \u003c 3\n  Shelou Vili, Rallix, and you.  The three of you will enter the temple, following the path cleared by Team A.  While you remain in Rallix's custody, Shelou Vili will catalog the worthwhile relics.  Once that's done, Rallix and you will carry the goods out of the temple.\n  *goto team_c\n*elseif specialization = \"tactical\"\n  *if rallix_shelou > 50\n    Shelou Vili, Rallix, and you.  The three of you will enter the temple, following the path cleared by Team A.  There, you'll stand guard while Shelou Vili catalogs the worthwhile relics.  Once that's done, Rallix will carry the goods out of the temple.\n    *goto team_c\n  *else\n    Shelou Vili, Rallix, and you.  The three of you will enter the temple, following the path cleared by Team A.  There, Rallix and you will stand guard while Shelou Vili catalogs the worthwhile relics.  Once that's done, you'll assist Rallix in carrying the goods out of the temple.\n    *goto team_c\n*else\n  Shelou Vili and Rallix.  The two of them will enter the temple, following the path cleared by Team A.  There, Rallix will stand guard While Shelou Vili catalogs the worthwhile relics.  Once that's done, they'll carry the goods out of the temple.\n  *goto team_c\n*label team_c\n\nThe entire time, Team C, consisting of\n*if (specialization = \"science\")\n  *if borion_died = true\n    Captain Isan and you, will be accessible via intercom, overseeing the operation from the [i]Lady Luck[/i]'s operations center and using your science skills to coordinate everything.\n    *goto plan_wrap_up\n  *else\n    Captain Isan, Borion, and you, will be accessible via intercom. While you remain with the captain, overseeing the operation from the [i]Lady Luck[/i]'s operations center and using your science skills to coordinate everything,  Borion will wait at the ship's entrance to aid any team members in need.\n    *goto plan_wrap_up\n*else\n  *if borion_died = true\n    Captain Isan, who will be accessible via intercom, overseeing the operation from the [i]Lady Luck[/i]'s operations center and coordinating everything.\n    *goto plan_wrap_up\n  *else\n    Captain Isan and Borion.  Isan will be accessible via intercom, overseeing the operation from the [i]Lady Luck[/i]'s operations center and coordinating everything.  Meanwhile, Borion will wait at the ship's entrance to aid any team members in need.\n    *goto plan_wrap_up\n*label plan_wrap_up\n\n\"It's a more complicated plan than I'd like,\" announces Isan, \"and any number of things can go wrong.  However, with dedication, hard work, and unity, I know we can make it work.  And just think—with the money these relics bring in, none of us will ever have to work again.\"  The crew cheers.  The captain claps ${isan_his} hands. \"Okay, then—let's get ready.  We can do this.\"\n*if told_isan_about_garce = true\n  *page_break\n  The next day, twenty-four hours out from Essch, Captain Isan meets with you in your\n  *if rank = 1\n    prison cell.\n    *goto garce_talk\n  *else\n    quarters.\n    *goto garce_talk\n  *label garce_talk\n  \"We need to talk,\" ${isan_he} says.  \"The last time we spoke alone, we discussed a certain law enforcement officer, Detective Ennin Garce.  You told me that you met with ${garce_him}.\n  *if planted_device = false\n    If you recall, I asked you to consider planting a tracking device on ${garce_him}.\n    *goto garce_talk_2\n  *label garce_talk_2\n  Since that conversation, we've been back on Tuskin.  Tell me, ${name}, did you meet with Garce again?\"\n  *label isan_question\n  *choice\n    *hide_reuse *if ((planted_device = false) or (has_second_device = true)) #Attempt to place the tracking device on Captain Isan.\n      *set cowardice_bravery %+20\n      *set duplicity_loyalty %-20\n      *if rank \u003c 3\n        You lean toward Captain Isan and try to plant the tracking device on ${isan_him}, but given your low rank, Isan clearly doesn't trust you. ${isan_he} wards you off with one arm.\n        *goto isan_question\n      *else\n        *if garce_isan \u003c 50\n          You lean toward Captain Isan and try to plant the tracking device on ${isan_him}, but given your hostile interactions, Isan clearly doesn't trust you. ${isan_he} wards you off with one arm.\n          *goto isan_question\n        *else\n          *if duplicity_loyalty \u003c 50\n            You lean toward Captain Isan and try to plant the tracking device on ${isan_him}, but ${isan_he} clearly doesn't trust you. ${isan_he} wards you off with one arm.\n            *goto isan_question\n          *else\n            You lean toward Captain Isan and try to plant the tracking device on ${isan_him}. Luckily, the captain stands within arm's reach.\n            *if cowardice_bravery \u003c 50\n              Unfortunately, you can't get past the fear of being caught, and you pull back, the device still in your hand.\n              *goto isan_question\n            *else\n              *set garce_isan %-20\n              *set planted_device true\n              You confidently reach forward and pat Isan on the arm, planting the device. Luckily, ${isan_he} doesn't notice.\n              *goto isan_question\n    *if (planted_device_garce = true) #\"I planted the device on Garce, just as you asked.\"\n      *set garce_isan %+20\n      *set cowardice_bravery %+10\n      *set duplicity_loyalty %+20\n      Captain Isan's eyes light up.  \"Wonderful!\" ${isan_he} exclaims.  \"Now we'll be able to track ${garce_his} movements.  You've done a me great service, ${name}, and I won't forget it.\"  Without another word, Captain Isan strides away.\n      *goto intro_end\n    *if (planted_device_garce = false) #\"I planted the device on Garce, just as you asked.\" (Lie.)\n      *set garce_isan %+20\n      *set cowardice_bravery %-10\n      *set duplicity_loyalty %-20\n      Captain Isan's eyes light up.  \"Wonderful!\" ${isan_he} exclaims.  \"Now we'll be able to track ${garce_his} movements.  You've done me a great service, ${name}, and I won't forget it.\"  Without another word, Captain Isan strides away.\n      *goto intro_end\n    #\"Yes, I did.\"\n      *set garce_isan %+10\n      *set cowardice_bravery %+10\n      *set duplicity_loyalty %+10\n      \"I know,\" says Isan quietly.  \"I kept an eye on you while you were on Tuskin, and I know that Garce hopes to turn you against me.  All I ask is that you trust me, ${name}.  Whatever you might think of me, please know that I have your best interests at heart.\"  Without another word, Captain Isan strides away.\n      *goto intro_end\n    *hide_reuse #\"That's none of your business.\"\n      *set garce_isan %-10\n      *set cowardice_bravery %-10\n      *set duplicity_loyalty %-10\n      \"Anything that happens to my crew is my business,\" says Isan hotly.  \"Now did you see Garce or not?\"\n      *goto isan_question\n    #\"No, I didn't.\" (Lie.)\n      *set garce_isan %-20\n      *set cowardice_bravery %-10\n      *set duplicity_loyalty %-10\n      Isan raises ${isan_his} eyebrows.  \"Very well,\" ${isan_he} finally says.  \"If you'll excuse me, I need to prepare for Essch.\"  Without another word, Captain Isan strides away.\n      *goto intro_end\n*else\n  *goto intro_end\n*label intro_end\n*page_break Continue.\n*if specialization = \"tactical\"\n  *goto_scene chapter_6b_tactical\n*elseif specialization = \"science\"\n  *goto_scene chapter_6b_science\n*else\n  *goto_scene chapter_6b_infiltration", "chapter_6b_infiltration": "*temp plan\n*set plan \"\"\n\nBefore you know it, the [i]Lady Luck[/i] lands on Essch. Through the windows, you catch your first glimpse of this lush, tropical world.  Beautiful and idyllic, it makes you nostalgic for Earth's Caribbean islands.\n\nPalm trees surround the ship's landing site, hiding its existence from the people of this world. Captain Isan quickly goes through the plan one more time, then directs the crew to split into individual teams. ${isan_he}'ll stay on the ship, directing the operation through the earpieces each person now sports.\n\nAs you set foot on the rich soil, Thisi and shape-shifting Taloo at your side, you feel…\n*choice\n  *selectable_if ((rank \u003c 3) or (cowardice_bravery \u003c 25)) #…apprehensive toward the crew.\n    *set duplicity_loyalty %-10\n    *set cowardice_bravery %-20\n    Even after all the time you've spent together, you still fear the crew and the mission that lies before you.\n    *goto walk_toward_temple\n  #…a sense of camaraderie toward the crew.\n    *set duplicity_loyalty %+10\n    Though you held back at first, the [i]Lady Luck[/i]'s become your home, the crew your new family.\n    *goto walk_toward_temple\n  #…indifferent toward the crew.\n    Even after all the time you've spent together, you still don't feel much for your shipmates.\n    *goto walk_toward_temple\n  #…scornful toward the crew.\n    *set duplicity_loyalty %-10\n    Even after everything they've done for you, you loathe your shipmates and can't wait to get away for good.\n    *goto walk_toward_temple\n\n*label walk_toward_temple\n\nThe three of you march toward the Temple of Cathella.  As you make your way through the wilderness, Thisi chats excitedly to Taloo. You can't believe how much their relationship has changed since you met.\n\n\"From what we know through our scans,\" says Thisi, \"the guards watching the temple don't have much to keep them busy. Distracting them with my pheromones should be easy enough.\" The Nyarri smiles wickedly.\n\nTaloo, however, shakes her head. Through a series of gestures, she stresses a better strategy would be for her to ape one of the guards and infiltrate the temple that way.\n\n\"What do you think, ${name}?\" asks Thisi.  \"Which is the better plan?\"\n*label better_plan\n*choice\n  *hide_reuse #\"I like both plans.\"\n    *set harsh_kind %+10\n    *set follower_leader %-10\n    Taloo rolls her eyes, and Thisi shakes ${thisi_his} head.  \"Uh-uh, you don't get to agree with us both,\" ${thisi_he} teases.  \"You're the infiltration expert.  Which plan is better for distracting the guards?  Be honest.\"\n    *goto better_plan\n  #\"Thisi's plan is better.\"\n    *set thisi_taloo %-30\n    *set plan \"Thisi\"\n    Thisi smirks mischievously, while Taloo lowers her head.  \"All right,\" says Thisi.  We'll do it my way.  As it should be!\"  Taloo frowns at Thisi, making you wonder if their new friendship will survive your decision.  \"Be ready, you two!\"\n    *goto temple_arrival\n  #\"Taloo's plan is better.\"\n    *set thisi_taloo %+30\n    *set plan \"Taloo\"\n    Taloo beams at you. Thisi sighs. \"Fine, we'll do it her way…even if it's a stupid idea.\"  Taloo frowns at Thisi, making you wonder if their new friendship will survive your decision.  \"Be ready, you two!\"\n    *goto temple_arrival\n  *hide_reuse #\"Neither plan.  I have a better idea.\"\n    *set harsh_kind %-10\n    *set follower_leader %+10\n    You begin to outline your own plan, in which you infiltrate the temple alone, when Thisi interrupts you.  \"${name}, Captain Isan was clear about our roles on this mission: no one goes off alone.  I'm sorry, but we have to stay together. Like it or not, it has to be one of our plans.\"\n    *goto better_plan\n\n*label temple_arrival\n\nSeveral minutes later, you arrive at the temple. The three of you squat behind a large bush and take turns peering over the top. Sturdy iron gates ring the temple, and guards stand at attention both near the entrance and at various points along the perimeter. Each guard carries a ceremonial spear. Through the temple entrance, you spot several people in flowing white robes. \"Priests,\" you whisper to the others.\n\nStatic bursts from your earpiece.  \"Team A, are you in position?\" asks Captain Isan.\n\n\"Affirmative, Captain,\" replies Thisi.\n\n\"Good.  Team B, what about you?\"\n\n\"In place and awaiting Team A's signal,\" growls Rallix over the earpiece.\n\n*if borion_died = false\n  \"What about you, Borion?\"\n  \n  The Vervoo slave speaks proudly.  \"Ready to r-run to anyone's aid if need b-be, ${Isan_sir}!\"\n  *goto teams_proceed_continue\n*label teams_proceed_continue\n\n\"All right,\" says Isan.  \"Whenever you're ready, Team A. The rest of us are standing by.\"\n*choice\n  #Take the initiative yourself.\n    *set follower_leader %+20\n    *set cowardice_bravery %+10\n    Whatever the captain says about staying together, you work alone. You jump up and head to the temple entrance. Protesting, Thisi and Taloo chase after you.\n    *goto temple_entrance\n  *if (plan = \"Thisi\") #Wait for Thisi to take the initiative.\n    *set follower_leader %-20\n    *set cowardice_bravery %-10\n    You gesture to Thisi. \"Your move.\" The Nyarri frowns but stands and heads toward the guards. Taloo and you wait a few seconds, then follow.\n    *goto temple_entrance\n  *if (plan = \"Taloo\") #Wait for Taloo to take the initiative.\n    *set follower_leader %-20\n    *set cowardice_bravery %-10\n    You gesture to Taloo. \"Your move.\" She frowns but stands up.  After changing her form to mimic one of the guards, she heads toward them. Thisi and you wait a few seconds, then follow.\n    *goto temple_entrance\n  *selectable_if (cowardice_bravery \u003c 30) #Convince your teammates to wait before moving in. (COWARDICE)\n    *set follower_leader %+10\n    *set cowardice_bravery %-10\n    *set duplicity_loyalty %+10\n    As ${plan} stands, instinct makes you pull your crewmate back.  You gesture wildly for them to stay put. Seconds later, a group of twenty spear-wielding guards passes right by your hiding spot.  You let out a huge sigh of relief. Taloo and Thisi smile shakily, and Thisi touches your arm in thanks.\n    \n    Once the path is clear, the three of you scamper toward the temple's entrance.\n    *goto temple_entrance\n*label temple_entrance\n\n\"We're approaching the guards now,\" whispers Thisi into ${thisi_his} earpiece.\n\n\"Acknowledged,\" says Isan.\n\nThe instant the guards notice you, they snap into a defensive position, spears at the ready.\n*if plan = \"Thisi\"\n  *goto guards_Thisi\n*else\n  *goto guards_Taloo\n\n\n\n*label guards_Thisi\nThat's when Thisi takes the lead, motioning for Taloo and you to stand still. Putting on ${thisi_his} best dazzling smile, ${thisi_he} confidently strides up to the guards.  \"Hey, boys and girls,\" ${thisi_he} purrs. \n\n*if ((preference = \"men\") or (preference = \"women\"))\n  Your own body responds as you inhale the familiar chlorophyll-based pheromones.  The guards must be just as susceptible, because they immediately drop their weapons and stare at Thisi with glazed eyes. The Nyarri turns to you and winks. Meanwhile, Taloo motions for you to follow her inside the temple.\n  *goto guards_Thisi_choice\n*elseif (preference = \"neither\")\n  You inhale the familiar chlorophyll-based pheromones, and you know that the guards must be doing the same, but with a much different effect: they immediately drop their weapons and stare at Thisi with glazed eyes. The Nyarri turns to you and winks. Meanwhile, Taloo motions for you to follow her inside the temple. \n  *goto guards_thisi_choice\n*label guards_Thisi_choice\n*choice\n  #Walk over to Thisi and the guards.\n    *set follower_leader %+10\n    *set duplicity_loyalty %-20\n    *set suspicion +10\n    *set essch_mistakes +1\n    You join Thisi and the guards.  As you come into view, the guards blink and rub their eyes. \"What—?\" \n\n    Thisi looks at you like you're crazy.  \"What are you doing?\" ${thisi_he} demands.  Before you can answer, ${thisi_he} turns back to the guards and sends out another wave of pheromones. While Taloo drags you to the temple entrance, Thisi sweetly asks the guards to please go fetch ${thisi_him} some food from the barracks. Eager to please, the guards hurry away, their duty forgotten. Glaring, Thisi rushes to catch up with you.\n    *page_break\n    *goto inside_temple\n  *selectable_if (cowardice_bravery > 60) #Pick up one of the fallen spears.\n    *set follower_leader %+10\n    *set cowardice_bravery %+10\n    *set duplicity_loyalty %-10\n    *set suspicion +5\n    *set essch_mistakes +1\n    You creep toward the guards' fallen spears, intent on grabbing one.  Taloo's eyes widen, and she gestures frantically for you to come back. You ignore her. What does she know?\n\n    When you get close, one of the guards blinks and rubs his eyes. \"What—?\"\n\n    Thisi looks at you like you're crazy.  \"What are you doing?\" ${thisi_he} demands. Before you can answer, ${thisi_he} turns back to the guards and sends out another wave of pheromones. While Taloo drags you to the temple entrance, Thisi sweetly asks the guards to please go fetch ${thisi_him} some food from the barracks. Eager to please, the guards hurry away, their duty forgotten. Glaring, Thisi rushes to catch up with you.\n    *page_break\n    *goto inside_temple\n  *selectable_if (follower_leader > 65) #Lead Taloo to the temple.\n    *set follower_leader %+10\n    *set duplicity_loyalty %+10\n    As Thisi flirts with the guards, you silently lead Taloo toward the temple's entrance.  Behind you, Thisi sweetly asks the guards to please go fetch ${thisi_him} some food from the barracks. Eager to please, the guards hurry away, their duty forgotten. Once they're out of sight, Thisi rushes to catch up with you.\n    *page_break\n    *goto inside_temple\n  *selectable_if (follower_leader \u003c 66) #Follow Taloo inside the temple.\n    *set follower_leader %-10\n    *set duplicity_loyalty %+10\n    As Thisi flirts with the guards, you silently follow Taloo toward the temple's entrance. Behind you, Thisi sweetly asks the guards to please go fetch ${thisi_him} some food from the barracks. Eager to please, the guards hurry away, their duty forgotten. Once they're out of sight, Thisi rushes to catch up with you.\n    *page_break\n    *goto inside_temple\n  *hide_reuse #Report to Captain Isan.\n    *set duplicity_loyalty %+10\n    *set garce_isan %+10\n    \"Thisi's managed to distract the guards,\" you report to Captain Isan.\n    \n    \"Good,\" says the captain.  \"Now move into the temple.\"\n    *goto guards_Thisi_choice\n  *selectable_if (cowardice_bravery \u003c 40) #Stay still.\n    *set follower_leader %-10\n    *set cowardice_bravery %-10\n    *set duplicity_loyalty %-10\n    *set suspicion +5\n    *set essch_mistakes +1\n    You freeze, continuing to watch Thisi as ${thisi_he} flirts with the guards. Taloo gestures wildly for you to hurry up.  Your delay causes Thisi to falter. One by one, the guards blink and rub their eyes. \"What—?\"\n\n    Thisi looks at you like you're crazy.  \"What are you doing?\" ${thisi_he} demands. \"Hurry up and get into the temple!\" Before you can answer, ${thisi_he} turns back to the guards and sends out another wave of pheromones. While Taloo drags you to the temple entrance, Thisi sweetly asks the guards to please go fetch ${thisi_him} some food from the barracks. Eager to please, the guards hurry away, their duty forgotten. Glaring, Thisi rushes to catch up with you.\n    *page_break\n    *goto inside_temple\n\n\n\n*label guards_Taloo\nThat's when Taloo takes the lead. With a \"pop,\" she morphs into a perfect copy of the nearest guard and strides right to the temple entrance. Using a variety of gestures and facial expressions, she urges the baffled guards to investigate a threat looming elsewhere.\n\nThisi leans close and whispers, \"The instant the guards leave, we need to make our move.  Go slowly—but not too slowly—and try not to stand out.\" You nod.\n\nTaloo successfully manages to lead the guards away from their positions.  As they walk off, you…\n*label guards_Taloo_choice\n*choice\n  #Walk over to Taloo and the guards.\n    *set follower_leader %+10\n    *set duplicity_loyalty %-20\n    *set suspicion +10\n    *set essch_mistakes +1\n    You join Taloo and the guards.  As you come into view, the guards raise their spears.  Taloo looks at you like you've lost your mind. She might as well be yelling, \"What're you doing here?\" Grabbing you firmly on the arm, as though she's taking you into custody, she jerks her chin in the direction she wants the guards to go. They hesitate, then hurry off. Once they're gone, Taloo drags you toward the temple entrance, and Thisi runs to catch up.\n    *page_break\n    *goto inside_temple\n  *selectable_if (cowardice_bravery > 60) #Attempt to knock the guards out.\n    *set follower_leader %+10\n    *set cowardice_bravery %+10\n    *set duplicity_loyalty %-10\n    *set suspicion +5\n    *set essch_mistakes +1\n    You know the guards won't stay away from their posts for long. It's amazing they fell for Taloo's trick in the first place. Time to take things into your own hands.\n\n    You sneak up behind the departing guards, ready to knock them out.  Taloo looks at you like you're crazy. Before any of the real guards notice, she firmly grabs your arm and drags you toward the temple entrance. Thisi rushes to catch up.\n    *page_break\n    *goto inside_temple\n  *selectable_if (follower_leader > 65) #Lead Thisi to the temple entrance.\n    *set follower_leader %+10\n    *set duplicity_loyalty %+10\n    As Taloo leads the guards away from their post, you guide Thisi toward the temple's entrance.  A few seconds later, Taloo rejoins you. Under the guise of prisoners and guard, the three of you slip into the temple.\n    *page_break\n    *goto inside_temple\n  *selectable_if (follower_leader \u003c 66) #Follow Thisi to the temple entrance.\n    *set follower_leader %-10\n    *set duplicity_loyalty %+10\n    As Taloo leads the guards away from their post, you follow Thisi to the temple's entrance.  A few seconds later, Taloo rejoins you. Under the guise of prisoners and guard, the three of you slip into the temple.\n    *page_break\n    *goto inside_temple\n  *hide_reuse #Report to Captain Isan.\n    *set duplicity_loyalty %+10\n    *set garce_isan %+10\n    \"Taloo's distracted the guards,\" you report to Captain Isan.\n    \n    \"Good,\" says the captain.  \"Now move into the temple.\"\n    *goto guards_Taloo_choice\n  *selectable_if (cowardice_bravery \u003c 40) #Stay still.\n    *set follower_leader %-10\n    *set cowardice_bravery %-10\n    *set duplicity_loyalty %-10\n    *set suspicion +5\n    *set essch_mistakes +1\n    You freeze. All you can do is watch Taloo as she distracts the guards. \"What are you waiting for?\" Thisi growls, shoving you. \"Go, go, go!\"  \n\n    Your delay causes Taloo to falter, and one of the guards breaks out of formation, spotting both you and Thisi.  Taloo looks at you like you've lost your mind. She might as well be yelling, \"What're you doing here?\" You don't know what to say.\n\n    Grabbing you firmly on the arm, as though she's taking you into custody, Taloo jerks her chin in the direction she wants the guards to go. They hesitate, then hurry off. Once they're gone, Taloo drags you toward the temple entrance, and Thisi runs to catch up.\n    *page_break\n    *goto inside_temple\n\n\n\n*label inside_temple\n\"We're in,\" Thisi announces into ${thisi_his} earpiece.\n\n\"Good,\" replies Isan.  \"Scanning the site now.\"  A few seconds later, ${isan_he} continues.  \"Okay, I'm detecting the relics approximately twenty meters from your location.  Team A, find some place to hide.  Team B, move in.\"\n\n\"Copy that,\" replies Rallix over the earpiece.  \"Team B, moving in.\"\n\n\"All right,\" Thisi says, looking at Taloo and you.  \"Let's hide and wait for the 'all clear' from the captain.\"\n\nThe three of you walk as quietly as you can, hoping to avoid the priests. It's not long before you find a small storage shed.  \"In here,\" says Thisi. \"Quickly.\"  As ${thisi_he} opens the door, however, an old woman in a white robe spots you.\n\n\"What are you doing in here?\" the woman says, clearly agitated.  \"You're not from this world. Get out!\"\n*choice\n  #Try to lie your way out of the situation.\n    *set follower_leader %+10\n    *set cowardice_bravery %+10\n    *set essch_mistakes +1\n    *if harsh_kind \u003c 35\n      You launch into an elaborate story about how the three of you were en route to Tuskin when your spaceship crashed nearby.  You came here seeking aid, you explain.\n\n      Thanks to your rough nature, you're used to getting people to believe whatever you force on them, and you're not surprised when the woman swallows your story.  \"You poor dears!\" she exclaims.  \"I'll go get you some water.\"  She scurries off.\n\n      \"Hurry,\" whispers Thisi.  \"Let's hide before she comes back!\"\n      *goto distraction\n    *else\n      You launch into an elaborate story about how the three of you were en route to Tuskin when your spaceship crashed nearby.  You came here seeking aid, you explain.\n\n      Unfortunately, thanks to your kind nature, you're a terrible liar.  Disbelief is written all over the woman's face.  \"Is that so? Tell me,\" she says, \"if your ship crashed, why don't you have a single mark on you?\"\n\n      Before you can think of what to say, Taloo hits her over the head.  She falls to the ground, unconscious.\n\n      \"Taloo!\" cries Thisi, ${Thisi_his} eyes wide with shock.  \"How could you?\" Thisi kneels to make sure the woman's okay, but Taloo shrugs and grabs one of the woman's arms.  You take the other, and the two of you drag the woman into the shed.\n\n      Thisi shakes ${thisi_his} head, then looks straight at you. \"This was completely unnecessary, ${name}. Next time, let us handle it.\"\n      *goto distraction\n  *selectable_if (cowardice_bravery \u003c 40) #Confess that you're here to steal the holy relics.\n    *set follower_leader %-10\n    *set cowardice_bravery %-20\n    *set essch_mistakes +1\n    *set duplicity_loyalty %-10\n    You've never been good under pressure. You break down and confess the entire plan to the woman.  She breaks out in a cross between a laugh and a sob, then screams, \"Guards!\"\n\n    Luckily, no one comes.  Before the woman can do anything else, Taloo hits her over the head.  She falls to the ground, unconscious.\n\n    \"Taloo!\" cries Thisi, ${Thisi_his} eyes wide with shock.  \"How could you?\" Thisi kneels to make sure the woman's okay, but Taloo shrugs and grabs one of the woman's arms.  You take the other, and the two of you drag the woman into the shed.\n\n    Thisi shakes ${thisi_his} head, then looks straight at you. \"You need to learn to handle pressure, ${name}. You could've cost us everything.\"\n    *goto distraction\n  *selectable_if (follower_leader \u003c 35) #Wait for Thisi and Taloo to handle it.\n    *set follower_leader %-20\n    *set cowardice_bravery %-10\n    *set duplicity_loyalty %+10\n    You freeze. You hadn't thought to come up with a good cover story. What now?\n\n    Luckily, the others are faster on their feet. Thisi releases a surge of pheromones, distracting the old woman. Meanwhile, Taloo morphs into a guard and approaches the woman.\n    \n    \"Oh, good!\" says the old woman.  \"These trespassers are defiling the temple.  Arrest them!\"\n    \n    Taloo nods and grabs Thisi and you by the arm.  Satisfied, the old woman turns and walks away. Taloo waits until she's gone, then releases your arm.\n    \n    \"Whew,\" says Thisi, fanning herself.  \"That was close!\"\n    *goto distraction\n  *selectable_if (cowardice_bravery > 60) #Knock out the old woman.\n    *set harsh_kind %-20\n    *set follower_leader %+10\n    *set cowardice_bravery %+20\n    *set duplicity_loyalty %+10\n    *if harsh_kind \u003c 30\n      *set thisi_taloo %+20\n      You walk up to the old woman and pound her over the head.  Thisi gasps as the woman falls to the ground, unconscious. You don't see what the big deal is; you did what you had to do. \"It had to be done,\" you say.\n\n      Taloo grabs one of the woman's arms, and you take the other. Together, you drag her into the shed.\n\n      Thisi shakes ${thisi_his} head, then looks straight at you. \"I don't like it, but done is done.\" ${thisi_he} admits. \"Let's go, ${name}.\"\n      *goto distraction\n    *else\n      *set essch_mistakes +1\n      You walk up to the old woman, planning to knock her out, but you hesitate. You've never voluntarily hurt anyone. Taking advantage of your hesitation, the old woman screams, \"Guards!\"\n      \n      Luckily, no one comes.  Before the woman can do anything else, Taloo hits her over the head.  She falls to the ground, unconscious.\n\n      \"Taloo!\" cries Thisi, ${thisi_his} eyes wide with shock.  \"How could you?\" Thisi kneels to make sure the woman's okay, but Taloo shrugs and grabs one of the woman's arms.  You take the other, and the two of you drag the woman into the shed.\n\n      Thisi shakes ${thisi_his} head, then looks straight at you. \"Next time, if you're going to knock someone out, ${name}, make sure you actually go through with it.\"\n      *goto distraction\n  #Run.\n    *set follower_leader %+10\n    *set cowardice_bravery %-20\n    *set duplicity_loyalty %-20\n    You didn't ask to be here, and your shipmates can take care of themselves. Without looking back, you take off.\n\n    \"${name}, wait!\" shouts Thisi.  As you run, you hear a loud thump. You stop in your tracks and spin around. The old woman lies unconscious, Taloo standing at her head.\n\n    \"Taloo!\" cries Thisi, ${thisi_his} eyes wide with shock.  \"How could you?\" Thisi kneels to make sure the woman's okay, but Taloo shrugs and grabs one of the woman's arms.  Still looking like ${thisi_he} might cry, Thisi grabs the other, and the two drag the woman into the shed. \"Hey, ${name}, nice of you to help,\" calls Thisi scornfully, glaring at you.\n    *goto distraction\n\n\n\n*label distraction\n\nThe three of you enter the shed and close the door behind you.  As you do, static crackles in your earpiece.\n\n\"Team B checking in,\" whispers Rallix.  \"We've located the relics and are beginning to—\"\n\nA loud animal roar interrupts the security officer. Your heart pounds.\n\n\"Quick!\" shouts Rallix.  \"We need a distraction!\"\n\n\"Team A,\" says Captain Isan calmly, \"see what you can do to assist Team B.\"\n\nThisi sighs. \"Looks like we're up again.\"\n*choice\n  #Sneak over to Team B to assist them directly.\n    *set follower_leader %+10\n    *if follower_leader > 75\n      *set duplicity_loyalty %+10\n      A natural-born leader, you tell Thisi and Taloo to stay put. Peeking through the open door, you make sure the coast is clear, then sneak out. You slowly make your way toward Rallix and Shelou Vili.  Along the way, you use your stealth skills to duck into the shadows each time you encounter a guard. At last you find Team B, cornered by two growling, doglike animals.\n\n      Thinking fast, you grab several large stones and throw them away from your teammates.  The dogs' ears perk up, and barking joyously, they chase after the stones. Rallix and Shelou Vili sigh heavily.\n\n      \"Thank you, ${name},\" says Shelou Vili.  \"You saved us.\"\n      \n      \"You should return to Team A,\" says Rallix.  \"Make sure all is well.\"\n\n      You nod and make your way back to Thisi and Taloo, who are still safely inside the shed.\n      *goto exit_temple\n    *else\n      *set essch_mistakes +1\n      *set duplicity_loyalty %-10\n      You may not be much of a leader, but someone has to take control of the situation.  You tell Thisi and Taloo to stay put. Peeking through the open door, you make sure the coast is clear, then sneak out.  You slowly head toward Rallix and Shelou. Along the way, you use your stealth skills to duck into the shadows each time you encounter a guard. Unfortunately, one spots you, forcing you to run away. Before you can make it all the way to Team B, Rallix speaks in your earpiece.\n\n      \"We're okay,\" it states.  \"We encountered some wild Vilas, but we managed to subdue them.\"\n\n      \"Acknowledged,\" replies Isan.\n      \n      You hurry back to Thisi and Taloo, still safely inside the shed where you left them.\n      *goto exit_temple\n  #Scream as loud as you can to get all the guards' attention.\n    *set duplicity_loyalty %-10\n    *set essch_mistakes +1\n    Knowing that Team B needs your help, you take a deep breath and scream at the tops of your lungs. Hopefully this will distract the guards from Team B. A second after you begin to scream, however, Thisi slaps a hand over your mouth.\n\n    \"Are you insane?\" ${Thisi_he} hisses, ${Thisi_his} face terrified.  \"That might help Team B, but what are you going to do when the guards come after [i]us[/i]?\"\n    \n    Sure enough, footsteps sound outside the shed. You wince. Taloo rushes outside, transforming into a fellow guard, and convinces the worried guard to go away.\n    \n    A few minutes later, Rallix speak in your earpiece.\n\n    \"We're okay,\" it states.  \"We encountered some wild Vilas, but we managed to subdue them.\"\n\n    \"Acknowledged,\" replies Isan.\n\n    You heave a sigh of relief when Taloo reenters the shed.\n    *goto exit_temple\n  #Tell Taloo to pretend to take Thisi and you captive to draw attention.\n    *set duplicity_loyalty %-10\n    *set thisi_taloo %+10\n    *set essch_mistakes +1\n    Taloo nods eagerly.  Thisi, however, looks wary.\n    \n    \"It's a good idea, ${name}, but I don't think it will work,\" Thisi says.  \"If we draw that much attention to ourselves, we might help Team B, but then we'd be the ones in the spotlight.\"\n    \n    You groan. Thisi's right, but before you can come up with an alternate plan, Rallix speaks in your earpiece.\n    \n    \"We're okay,\" it states.  \"We encountered some wild Vilas, but we managed to subdue them.\"\n\n    \"Acknowledged,\" replies Isan.\n\n    You heave a sigh of relief, knowing Team B is safe.\n    *goto exit_temple\n  #Tell Thisi to use ${thisi_his} pheromones to distract the guards.\n    *set duplicity_loyalty %-10\n    *set thisi_taloo %-10\n    *set essch_mistakes +1\n    \"It's a decent plan,\" says Thisi with a smirk.  \"I've never tried to draw so many to me at once, though.  But I can try.\"  Thisi breathes deeply, then closes ${thisi_his} eyes, ${thisi_his} face straining.\n\n    A few seconds later, Thisi's legs buckle, and Taloo catches ${thisi_him} just before the Nyarri collapses.  \"I couldn't do it,\" Thisi says regretfully.  \"There're just too many guards.\"\n\n    You groan. Thisi's right, but before you can come up with an alternate plan, Rallix speaks in your earpiece.\n\n    \"We're okay,\" it states.  \"We encountered some wild Vilas, but we managed to subdue them.\"\n\n    \"Acknowledged,\" replies Isan.\n\n    You heave a sigh of relief, knowing Team B is safe.\n    *goto exit_temple\n  #Burn down the shed.\n    *set duplicity_loyalty %+10\n    *set follower_leader %+10\n    *set cowardice_bravery %+10\n    *if harsh_kind \u003c 60\n      Now's the time for extreme action, you think, desperately looking around the shed for something to do.  Your eyes land on a box of ceremonial matches, and you snatch it up.  Without stopping to think, you light the shed on fire.\n\n      \"Are you insane?\" Thisi hisses. Taloo screams silently. The sheets of flame rise higher, and the three of you race out of the shed only seconds before the wooden building collapses. As the entire camp rushes toward the shed, it's almost a game to lead your teammates through the vacated compound.\n\n      Rallix babbles excitedly in your earpiece.  \"Someone set fire to a nearby building!  It distracted the wild Vilas that had us cornered.  We're clear now.  We owe someone our thanks!\"\n\n      \"That was us,\" replies Thisi.  \"${name}, to be specific.\" The Nyarri gives you a wry look. \"We knew you needed a distraction.\"\n\n      \"Good work, Team A,\" says Isan.  \"Proceed as planned.\"\n      *goto exit_temple\n    *else\n      *set essch_mistakes +1\n      Now's the time for extreme action, you think, desperately looking around the shed for something to do.  Your eyes land on a box of ceremonial matches, and you snatch it up.  Adrenaline racing through you, you pull a match from the box.\n\n      Unfortunately, because you're too kind to destroy someone's property, you can't make yourself light the match.  Sighing, you drop the matchbox.\n\n      Thisi smiles approvingly.  \"I'm glad you didn't do it,\" ${thisi_he} says. \"That would've been a huge mistake!\"\n\n      You groan. Thisi's right, but before you can come up with an alternate plan, Rallix speaks in your earpiece.\n\n      \"We're okay,\" it states.  \"We encountered some wild Vilas, but we managed to subdue them.\"\n\n      \"Acknowledged,\" replies Isan.\n\n      Good, you think. At least Team B is safe.\n      *goto exit_temple\n\n\n\n*label exit_temple\n*page_break\nYou can barely stand still as you wait for Team B to check in. Every minute feels like an hour. Finally, when you're ready to crawl the walls, your earpiece crackles to life.\n\n\"We have obtained all the relics,\" announces Shelou Vili.  \"We are now proceeding to the site's exit.\"\n\n\"All teams, evacuate the site,\" orders Isan.  \"Repeat: evacuate the site.\"\n\n\"That's our cue!\" cries Thisi.  The three of you sneak to the exit of the temple, taking care to avoid any guards. As you near the exit, you spot Team B heading toward you. As the teams intersect, you pass through the exit…\n*goto_scene chapter_6c_outro", "chapter_6b_science": "*temp know_about_vilas\n*set know_about_vilas false\n\nBefore you know it, the [i]Lady Luck[/i] lands on Essch. Through the windows, you catch your first glimpse of this lush, tropical world. Beautiful and idyllic, it makes you nostalgic for Earth's Caribbean islands.\n\nPalm trees surround the ship's landing site, hiding its existence from the people of this world. Captain Isan quickly goes through the plan one more time, then directs the crew to split into individual teams. Isan and you will remain on the ship, directing the operation through the earpieces each person now sports.\n\nAs you watch the others set foot on the rich soil while you stay behind with Captain Isan, you feel…\n*choice\n  *selectable_if ((rank \u003c 3) or (cowardice_bravery \u003c 25)) #…apprehensive toward the crew.\n    *set duplicity_loyalty %-10\n    *set cowardice_bravery %-20\n    Even after all the time you've spent together, you still fear the crew and the mission that lies before you.\n    *goto return_to_ops\n  #…a sense of camaraderie toward the crew.\n    *set duplicity_loyalty %+10\n    Though you held back at first, the [i]Lady Luck[/i]'s become your home, the crew your new family.\n    *goto return_to_ops\n  #…indifferent toward the crew.\n    Even after all the time you've spent together, you still don't feel much for your shipmates.\n    *goto return_to_ops\n  #…scornful toward the crew.\n    *set duplicity_loyalty %-10\n    Even after everything they've done for you, you loathe your shipmates and can't wait to get away for good.\n    *goto return_to_ops\n\n*label return_to_ops\n\nOnce Teams A and B depart the ship, you return to the operations center with Captain Isan. It's strange to be working at Thisi's computer in the science station, even stranger to have Captain Isan sitting nearby in the commander's chair. You wish ${isan_he} would say something. The awkward silence goes on for at least ten minutes, and you wonder if you should break it when Isan finally speaks.\n\n*if garce_isan > 75\n  \"What do you make of all this, ${name}?  The mission, I mean.  Do you approve of stealing these relics?  I like you, and I respect your opinions.  So tell me what you think.\"\n  *goto isan_opinion\n*elseif garce_isan \u003c 25\n  \"What do you make of all this, ${name}?  The mission, I mean.  Do you approve of stealing these relics?  We may not get along, you and I, but after what happened on Jeeq, I want to hear from every member of my team.  What do you think?\"\n  *goto isan_opinion\n*else\n  \"What do you make of all this, ${name}?  The mission, I mean.  Do you approve of stealing these relics?  An outsider's perspective would be useful, and you're the closest thing we've got. So what do you think?\"\n  *goto isan_opinion\n*label isan_opinion\n*choice\n  *selectable_if ((garce_isan > 65) or (duplicity_loyalty > 65)) #\"It doesn't matter to me.  I support you all the way, Captain!\" (ISAN/LOYALTY)\n    *set garce_isan %+20\n    *set duplicity_loyalty %+20\n    Captain Isan chuckles good-naturedly.  \"Now that's what I like to hear!\" ${isan_he} says.  \"I'm sure you're curious about my own motivations for carrying out this mission, though.  Well, you can probably guess the answer: for Thela.  With the money we earn from this mission, I'll finally be able to devote myself to the search for a cure.\"\n    *goto power_surge\n  #\"It's wrong to steal holy relics.\"\n    *set garce_isan %+20\n    *set harsh_kind %+20\n    Captain Isan sighs.  \"You know what, ${name}?  It is wrong.  You're probably wondering why I accepted the mission, then.  It's for Thela.  With the money we earn from this mission, I'll finally be able to devote myself to the search for a cure.\"\n    *goto power_surge\n  #\"Who cares?  This mission is going to earn us enough money to live the rest of our lives in luxury.\"\n    *set garce_isan %-10\n    *set harsh_kind %-10\n    Captain Isan looks disappointed.  \"Believe it or not, I care, ${name}.  This is exactly the immoral kind of job I said I'd never take.  Why am I doing it, then? For Thela. I'm doing it for Thela.  With the money we earn from this mission, I'll finally be able to devote myself to the search for a cure.\"\n    *goto power_surge\n  #\"I can't wait to see the look on their faces when they find out we stole their relics!\"\n    *set garce_isan %-20\n    *set harsh_kind %-20\n    Captain Isan glares at you.  \"What's wrong with you, ${name}? This is exactly the immoral kind of job I said I'd never take.  So why am I doing it? For Thela. I'm doing it for Thela. With the money we earn from this mission, I'll finally be able to devote myself to the search for a cure.\"\n    *goto power_surge\n  #\"I'd rather not steal from these people, but we're doing what we have to.\"\n    *set harsh_kind %+10\n    *set garce_isan %+10\n    Captain Isan looks at you carefully.  \"That's how I feel, too, ${name}.  This is exactly the immoral kind of job I said I'd never take.  So why am I doing it? For Thela. I'm doing it for Thela. With the money we earn from this mission, I'll finally be able to devote myself to the search for a cure.\"\n    *goto power_surge\n  *selectable_if ((garce_isan \u003c 35) or (duplicity_loyalty \u003c 35)) #\"I don't care what the plan is.  If it's something you want to do, then I'm against it.\" (GARCE/DUPLICITY)\n    *set garce_isan %-20\n    *set duplicity_loyalty %-20\n    Captain Isan glares at you.  \"You think I like what we're doing, ${name}?  This is exactly the immoral kind of job I said I'd never take.  So why am I doing it? For Thela. I'm doing it for Thela. With the money we earn from this mission, I'll finally be able to devote myself to the search for a cure.\"\n    *goto power_surge\n\n\n\n*label power_surge\n\nAs soon as Isan finishes speaking, the ship's lights blaze, then flicker before going out altogether.\n\nIsan frowns. \"Great, just what we need,\" ${isan_he} mumbles, turning to face you.  \"We sometimes have power surges like these.  It's a result of the immense power required to keep Thela connected to the engines. Anyway, I need you to switch us to backup power.  We can't risk any issues during the mission.  Please do that now.\"\n*label switch_choice\n*choice\n  *hide_reuse #Switch to backup power using a flashy technique that is impressive and fast but might not work.\n    *set essch_mistakes +1\n    *set follower_leader %+10\n    *set duplicity_loyalty %-10\n    *set garce_isan %-10\n    You tap a series of commands into the computer. While it's risky, if it works, it'll be highly impressive. Grinning, you press the submit button—but nothing happens. So much for your plan.\n\n    \"What's taking so long, ${name}?\" snaps Isan.  \"This is no time for games.  Switch to backup power now!\"\n    *goto switch_choice\n  *selectable_if (follower_leader \u003c 35) #Switch to backup power, following Isan's step-by-step instructions. (FOLLOWER)\n    *set follower_leader %-20\n    *set garce_isan %+20\n    *set duplicity_loyalty %+10\n    You always feel safer when someone tells you what to do, so you have Isan describe how to switch the ship to backup power. You tap in the commands ${isan_he} gives you, and the ship's lights instantly power up. You smile.\n    \n    \"Thank you, ${name},\" says Isan.  \"Now we can proceed.\"\n    *goto teams_proceed\n  #Switch to backup power using a standard technique that is reliable but takes some time.\n    *set follower_leader %-10\n    *set duplicity_loyalty %+10\n    You obey Isan's orders and switch to backup power.  Within a few seconds, the lights return to normal.\n\n    \"Thank you, ${name},\" says Isan.  \"Now we can proceed.\"\n    *goto teams_proceed\n  #Purposely neglect to switch to backup power in order to sabotage the mission.\n    *set essch_mistakes +1\n    *set follower_leader %+20\n    *set cowardice_bravery %+10\n    *set suspicion +10\n    *set garce_isan %-20\n    You purposely tap in a series of false commands. Why should you do what Isan orders you to do? As you tap the submit button, a few sparks fly across your panel.\n\n    \"What did you do, ${name}?\" shouts Isan, quickly tapping a series of commands onto ${isan_his} own panel.  A few seconds later, the lights return to normal.  Isan sighs.  \"You're supposed to be a science expert.  Start acting like one!\"\n    *goto teams_proceed\n  *selectable_if (duplicity_loyalty \u003c 35) #Ask the captain to switch the power on ${isan_his} own. (DUPLICITY)\n    *set essch_mistakes +1\n    *set garce_isan %-10\n    *set duplicity_loyalty %-10\n    *set cowardice_bravery %-10\n    You tell the captain that you believe it would be better if ${isan_he} switched to backup power rather than you.  After all, you're new and could make a mistake. Isan rolls ${isan_his} eyes and taps a series of commands onto ${isan_his} own panel.  A few seconds later, the lights flash back on.  Isan sighs.  \"You're supposed to be a science expert.  Start acting like one!\"\n    *goto teams_proceed\n\n\n\n*label teams_proceed\n\nIsan stares at you before speaking into a small microphone built into ${isan_his} station.  \"Team A, are you in position?\"\n\nA burst of static flares in your earpiece, followed by Thisi's voice.  \"We're here, Captain.\"\n\n\"Good.  Team B, what about you?\"\n\n\"In place and awaiting Team A's signal,\" growls Rallix.\n\n*if borion_died = false\n  \"What about you, Borion?\"\n  \n  The Vervoo slave speaks proudly.  \"Ready to r-run to anyone's aid if need b-be, ${Isan_sir}!\"\n  *goto teams_proceed_continue\n*label teams_proceed_continue\n\n\"All right,\" says Isan.  \"Whenever you're ready, Team A. The rest of us are standing by.\"\n\nA few tense seconds pass. You stare at your nails.  \"I'm sorry you're stuck with me on this mission, ${name},\" Isan says, surprising you. \"I know you'd rather be out there with ${friend}.\"\n\nYou don't know what to say, but luckily, your earpiece crackles to life once more. \"We're approaching the guards now,\" whispers Thisi.\n\n\"Acknowledged,\" responds Isan, smiling.  \"Nervous, ${name}?\"\n*fake_choice\n  #Extremely.\n  #A little.\n  #Not much.\n  #Not at all.\nIsan chuckles.  \"Same here.\"\n\nA moment later, Thisi checks in.  \"We've managed to distract the guards.\"\n\n\"Good,\" the captain replies.  \"Now move into the temple.\"\n\nIsan's eyes remain fixed on ${isan_his} console until Thisi says, \"We're in.\"\n\n\"Good,\" replies Isan.  \"Scanning the site now.\"  The captain turns to you.  \"${name}, scan the site for the relics.  The information should already be preprogrammed into your console.\"\n*label scan_choice\n*choice\n  *hide_reuse #Before running the scan, run a quick computer diagnostic test to ensure accuracy.\n    *set duplicity_loyalty %+10\n    You realize the switch to backup power might have affected the computer system, so you run a fast diagnostic test to ensure accuracy.\n    \n    *if garce_isan > 50\n      *set garce_isan %+10\n      *set essch_mistakes -1\n      \"Wait, ${name}, what are you doing?\" demands Isan.  You explain, and the captain nods in approval. You hope ${isan_he} can't hear your sigh of relief. \"Good thinking,\" ${isan_he} says.  \"Better to be safe than sorry.\"\n\n      The diagnostic test takes a couple minutes, but it's worth it: you find a small bug in the system. You inform the captain and fix the error.\n\n      \"Proceed,\" replies the captain.\n      *goto scan_choice\n    *else\n      *set garce_isan %-10\n      \"Wait, ${name}, what are you doing?\" asks Isan harshly.  You explain, but the captain's in no mood to listen.  \"You have a history of wasting this crew's time,\" ${isan_he} says.  \"And I'm sick of it.  Skip the diagnostic and start your scan.  Now.\"\n      *goto scan_choice\n  #Scan for the coordinates using the settings already programmed into the console.\n    *set garce_isan %+10\n    *set duplicity_loyalty %+10\n    *set follower_leader %-10\n    All you have to do is scan the site and dictate the location of the relics to Captain Isan.  The captain nods and activates the ship's communicator.\n    *goto site_located\n  *hide_reuse *selectable_if (duplicity_loyalty > 65) #Scan for the coordinates using your own customized settings designed for faster speed. (LOYALTY)\n    *set garce_isan %-10\n    *set follower_leader %+10\n    *set duplicity_loyalty %-10\n    *set essch_mistakes +1\n    You decide to use your own settings to scan for the coordinates rather than those already programmed into the system. If your settings work, you'll get results five times faster than with the standard scan.  Unfortunately, they don't work, costing the mission valuable seconds. Isan watches you impatiently.\n    *goto scan_choice\n  *selectable_if (duplicity_loyalty > 65) #Scan for the coordinates using your own customized settings designed for better reliability. (LOYALTY)\n    *set garce_isan %+10\n    *set follower_leader %+10\n    *set duplicity_loyalty %+10\n    You decide to use your own settings to scan for the coordinates rather than the ones already programmed into the system. If your settings work, you'll get results five times more accurate than with the standard scan.\n    \n    *if garce_isan > 50\n      Though the scan takes longer to run than the one that was preprogrammed into the console, Captain Isan approves of the delay.  Once you receive the results, you dictate the location of the relics.  The captain nods and activates the ship's communicator.\n      *goto site_located\n    *else\n      Though your scan works, Isan drums ${isan_his} fingers on ${isan_his} console the whole time.  You hunch your shoulders as you dictate the location of the relics to the captain, who then activates the ship's communicator.\n      *goto site_located\n  #Purposely report the wrong coordinate data into the console.\n    *set essch_mistakes +1\n    *set follower_leader %+20\n    *set cowardice_bravery %+10\n    *set suspicion +10\n    *set garce_isan %-20\n    You never wanted to be on this mission, and you're going to do what you can to make it fail. Smiling to yourself, you tap on several buttons at your console but purposely report the wrong coordinate data to Isan.  The captain passes this information along to Team B.\n\n    A few moments later, Rallix replies, \"There's nothing here but some trees.  Are you sure you gave us the right coordinates, Captain?\"\n\n    Isan sighs and taps at ${isan_his} own console.  \"I guess I have to do everything myself,\" ${isan_he} mutters under his breath, glaring at you.  Several seconds pass before Isan provides Rallix with the proper coordinates.\n    *goto site_located\n  *hide_reuse #Scan Team A's location first to make sure they're safe.\n    *set garce_isan %-10\n    *set duplicity_loyalty %-10\n    *set harsh_kind %-10\n    *set follower_leader %+10\n    You're worried about Team A. It couldn't hurt to make sure they're safe before you run the scan, could it? You quickly run a scan to check whether Team A is near any guards who could cause trouble.\n\n    Captain Isan glances over and and rolls ${isan_his} eyes.  \"Let Team A worry about the guards,\" ${isan_he} says.  \"They know how to take care of themselves.  Your focus should be on following orders.  Now scan the site!\"\n    *goto scan_choice\n\n\n\n*label site_located\n\"Okay, we're detecting the relics approximately twenty meters from your location, Team B.  Team A, find some place to hide.  Team B, move in.\"\n\n\"Copy that,\" replies Rallix excitedly.  \"Team B, moving in.\"\n\n*if essch_mistakes > 0\n  \"We're off to a rocky start here,\" whispers Isan.  \"And it's your fault, ${name}.  Shape up before this mission ends in disaster.\"\n  *goto team_b_check_in\n*else\n  \"We're off to a good start,\" whispers Isan.  \"Good work so far, ${name}.  If this keeps up, this mission will be a resounding success.\"\n  *goto team_b_check_in\n*label team_b_check_in\n\nA few moments later, Team B checks back in.  \"Team B here,\" whispers Rallix.  \"We've located the relics and are beginning to—\"\n\nA loud animal roar interrupts the security officer. Your heart pounds.\n\n\"Quick!\" shouts Rallix.  \"We need a distraction!\"\n\nIsan looks over to you calmly.  \"${name}, create a distraction for Team B.\"\n*label create_distraction\n*choice\n  #Use the computer's speakers to blast a loud alarm to Team B's earpieces.\n    *set essch_mistakes +1\n    *set duplicity_loyalty %-10\n    You blast a loud alarm through Team B's earpieces.  The sound's so loud, even you have to plug your ears.\n\n    \"Ow!\" cries Rallix.  Shelou Vili grunts in pain.  \"What was that supposed to accomplish besides deafen us?\"\n    \n    Isan glares at you. You have to admit this was a bad move; after all, the only people who heard the alarm were Rallix and Shelou Vili.\n\n    Before you can think of a better distraction, weapons fire in your earpiece. Your eyes widen. Seconds later, Rallix coughs.\n\n    \"We're all right,\" it says.  \"We encountered some wild Vilas, but we managed to subdue them.  Our laser fire may have drawn some attention, though.\"\n\n    \"Acknowledged,\" replies Isan.\n    *goto evacuate\n  #Use the ship's weapons to shoot several warning shots near the temple.\n    *set essch_mistakes +1\n    *set duplicity_loyalty %-20\n    You tap a series of commands into your console. Seconds later, the ship's weapons fire several warning shots into the air. That should distract any guards harassing Team B, you think.\n    \n    \"Are you insane?\" shouts Isan.  \"Those blasts could give away our position!  Do you want the entire guard regiment knocking down our door?\"\n    \n    Before you can think of a better distraction, weapons fire in your earpiece. Your eyes widen. Seconds later, Rallix coughs.\n\n    \"We're all right,\" it says.  \"We encountered some wild Vilas, but we managed to subdue them.  Our laser fire may have drawn some attention, though.\"\n\n    \"Acknowledged,\" replies Isan.\n    *goto evacuate\n  #Hack into the temple's doors, jamming them shut.\n    *set essch_mistakes +1\n    *set duplicity_loyalty %-10\n    You tap a series of commands into your console. You grin. Now you're deep into the temple's security system. You lock down the site, sealing all doors.\n    \n    Isan catches on to what you're doing. \"Stand by, Team B.  ${name}'s sealing all the temple doors.\"  A moment later, you finish your commands, and the temple doors slide shut and lock.\n\n    \"Great,\" mutters Rallix.  \"We're not in danger anymore, but now we're locked inside the temple.\"\n\n    \"Then try to find an alternate way out,\" Isan says irritably.\n\n    \"There is no other way out,\" growls Rallix.  \"We'll have to blast down the front door.  That may draw some unwanted attention from the guards, though.\"\n\n    Isan sighs, glaring at you.  \"Do what you have to do, Team B.\"\n    *goto evacuate\n  #Tap into the temple's security network and report false intruder data to divert any nearby guards.\n    *set duplicity_loyalty %+10\n    *set garce_isan %+10\n    With a few keystrokes, you hack into the temple's security network.  Once there, you log a false intruder alert report in an effort to drive all guards away from Team B.\n\n    Isan catches on to what you're doing.  \"Good thinking,\" ${isan_he} says. \"Team B, stand by.  ${name} is creating a distraction.  You should be safe in a few seconds.\"\n    \n    After another series of commands, you stare at the ship's scanners as the guards run to the rear of the temple, expecting to find intruders there.  You grin; Team B's wide open to escape.\n\n    Seconds later, Rallix announces, \"We're all right.  We encountered some wild Vilas, but they got distracted when the guards moved away from our location.  Thank you for the assistance, Team C.\"\n\n   \"Any time, Rallix,\" replies a smiling Isan.\n   *goto evacuate\n  *hide_reuse #Gather more information before taking action.\n    *set duplicity_loyalty %+10\n    *set follower_leader %+10\n    *set know_about_vilas true\n    There's no way you can act until you learn more about the situation.  Tapping a series of commands into the computer, you run a quick scan of the temple area. Rallix and Shelou Vili immediately show up on the ship's sensors.  A group of Vilas surround them, barking menacingly. The computer tells you Vilas are domesticated doglike creatures that attack when provoked.\n    \n    \"What are you waiting for?\" shouts Isan.  \"Stop running scans and help Team B!\"\n    *goto create_distraction\n  *selectable_if (know_about_vilas = true) #Research Vilas to find possible weaknesses.\n    *set duplicity_loyalty %-10\n    *set follower_leader %+10\n    *set garce_isan %-20\n    *set suspicion +5\n    *set essch_mistakes +1\n    You search desperately for possible weaknesses in the Vilas. Somehow you'll help Team B! As you run your search, the sounds of weapons fire blares out the ship's speakers. Your heart jumps into your throat. Seconds later, Rallix coughs.\n\n    \"We're all right,\" it states.  \"We encountered some wild Vilas, but we managed to subdue them.  Our laser fire may have drawn some attention, though.\"\n\n    \"Acknowledged,\" replies Isan, glaring at you.  The captain deactivates the speaker and screams, \"The next time I tell you to do something, you do it!  You wasted precious time researching when you should have been acting.  Team B was okay this time…but next time, we might not be so lucky.\"\n    *goto evacuate\n\n\n\n*label evacuate\n\nRallix announces that Team B's penetrated the temple and is now busy cataloguing the various relics.\n\nCaptain Isan and you sit in silence, waiting on tenterhooks for Team B's results. What if something happens? you think.\n\n\"We have obtained all of the relics,\" announces Shelou Vili at last.  \"We are now proceeding to the site's exit.\"\n\n\"All teams, evacuate the site,\" orders Isan.  \"Repeat: evacuate the site.\"  Isan turns to you.  \"Go meet them outside, ${name}, in case they need help.\"\n*page_break Proceed outside to meet Teams A and B.\nYou exit the ship and make your way to the entrance of the temple, per the captain's instructions. It's not long before you run into Teams A and B on their way back to the ship.  As you intersect with both teams, they pass through the exit…\n*goto_scene chapter_6c_outro", "chapter_6b_tactical": "*temp guard_captive\n*set guard_captive false\n\nBefore you know it, the [i]Lady Luck[/i] lands on Essch. Through the windows, you catch your first glimpse of this lush, tropical world. Beautiful and idyllic, it makes you nostalgic for Earth's Caribbean islands.\n\nPalm trees surround the ship's landing site, hiding its existence from the people of this world. Captain Isan quickly goes through the plan one more time, then directs the crew to split into individual teams. ${isan_he}'ll stay on the ship, directing the operation through the earpieces each person now sports.\n\nAs you set foot on the rich soil, Rallix and Shelou Vili at your side, you feel…\n*choice\n  *selectable_if ((rank \u003c 3) or (cowardice_bravery \u003c 25)) #…apprehensive toward the crew.\n    *set duplicity_loyalty %-10\n    *set cowardice_bravery %-20\n    Even after all the time you've spent together, you still fear the crew and the mission that lies before you.\n    *goto walk_toward_temple\n  #…a sense of camaraderie toward the crew.\n    *set duplicity_loyalty %+10\n    Though you held back at first, the [i]Lady Luck[/i]'s become your home, the crew your new family.\n    *goto walk_toward_temple\n  #…indifferent toward the crew.\n    Even after all the time you've spent together, you still don't feel much for your shipmates.\n    *goto walk_toward_temple\n  #…scornful toward the crew.\n    *set duplicity_loyalty %-10\n    Even after everything they've done for you, you loathe your shipmates and can't wait to get away for good.\n    *goto walk_toward_temple\n\n*label walk_toward_temple\n\nThe three of you march toward the Temple of Cathella. As you make your way through the wilderness, Rallix and Shelou bicker amicably. You can't believe how much their relationship has changed since you met.\n\nSoon you arrive at a shaded area ringed by tall bushes—the perfect hiding place. You settle in and turn to Rallix.\n\n\"Step one is to wait for Team A to distract the guards,\" it says.  \"We will stay here until the path is clear.\"\n\nAs the three of you wait for Team A to complete its objective, you study the temple exterior. Rallix particularly can't stop drinking it in.\n\n\"I've always liked primitive cultures,\" it growls.  \"They may not be part of the Great Hive, but at least they stand behind their beliefs, unlike some.\"\n\nShelou Vili scoffs.  \"Primitive beliefs from a primitive people.  They are not to be envied but pitied.\"\n\nRallix glares at Shelou Vili. \"And what do you say, ${name}?\"\n*label your_view\n*choice\n  #\"I agree with Rallix. You have to admire the strength of convictions like these.\"\n    *set rallix_shelou %-30\n    Rallix nods in a show of support.  \"The human is smart,\" it says.\n\n    \"The human is foolish,\" counters Shelou Vili, refusing to meet your eyes.\n    *goto temple_arrival\n  #\"I agree with Shelou Vili. This culture is primitive and doesn't deserve our attention.\"\n    *set rallix_shelou %+30\n    \"Do not be offended by the Nixian's perspective, human,\" says Shelou Vili.  \"It, too, holds primitive beliefs.\"\n\n    \"How dare you!\" growls Rallix. You sigh as the tentative friendship between your crewmates crumbles.  \"After I shared a drink with you, this is how you repay me?\"\n    *goto temple_arrival\n  #\"You're both right.  Primitive cultures can be fascinating, but at the end of the day, they're, well, primitive.\"\n    *set harsh_kind %+20\n    *set follower_leader %-10\n    Both Rallix and Shelou Vili nod.\n\n    \"Thank you, human,\" says Shelou Vili, \"for finding a way to accept both our perspectives.\"\n    \n    \"I admit to being a bit intolerant at times,\" admits Rallix, glancing at Shelou Vili.  \"Forgive me.\"\n\n    \"And I am too often self-deluded,\" says Shelou Vili humbly.  \"It is good to remember that my view is not the only one.\"\n    *goto temple_arrival\n  *selectable_if (rank > 3
