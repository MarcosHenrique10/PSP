<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Treasure Seekers of Lady Luck — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "treasureseekers", "title": "Treasure Seekers of Lady Luck", "scenes": {"chapter_1a_introduction": "*restart", "chapter_1b_brig": "You follow Borion into the dimly lit lab.  He stops in front of a tiny, unremarkable door and shakes his head regretfully. Your eyes narrow in suspicion. What could be waiting for you in there? Between the transport vessel exploding and the slave before you, you've had more than enough surprises for one day.\n\n\"Okay,\" says Borion, his voice soft. He doesn't meet your eyes.  \"Just g-go inside to get p-processed.  I'll wait here.\"\n*label come_in_choice\n*choice\n  *hide_reuse #\"Why?\"\n    Borion shudders.  \"Our chief w-weapons officer, Rallix?  A Nixian through and th-through.  They have t-terrible tempers.\"  His fingers brush his slave collar, and his voice falters.  \"And R-Rallix is the one who—who controls this.\"\n    *goto come_in_choice\n  #\"Good.  I want to handle this on my own.\"\n    *set cowardice_bravery %+10\n    \"That's the s-spirit,\" says Borion, grinning in relief.\n    *goto enter_brig\n  #\"I would rather you come with me, Borion.\"\n    *set cowardice_bravery %-10\n    \"Oh, but I c-couldn't,\" says Borion, his eyes wide. He backs away. \"You'll be fine, I p-promise.\"\n    *goto enter_brig\n  *hide_reuse #\"I won't be processed. By you or anyone else.\"\n    *set cowardice_bravery %+10\n    An electric current jolts through you, making your muscles spasm painfully. You grab for the slave collar fastened around your neck, and try to wrench it off.  In response, the collar sends another jolt of electricity through your body, and you fall to the ground in a fit.  \n\n    \"I'm really s-sorry, ${name},\" says Borion.  \"B-but you have to go inside.  C-Captain's orders!\" he says, hoping you can hear him over the chattering of your teeth.\n\n    When the spasming stops, he helps you up; after you've had a moment to catch your breath—a small mercy, you suppose—he pushes you towards the waiting door.\n    *goto come_in_choice\n\n*label enter_brig\nHe motions hesitantly at the door. \"Go on.\" You want to cry out, to punch him, to do anything but walk into that room. But until you know what you're up against, there's no other option. \n\n*if cowardice_bravery \u003c= 50\n  A slave being commanded by a slave, you think as you make your way toward the door, shoulders slumped. How did it come to this?\n*if cowardice_bravery > 50\n  You vow to yourself that you will find a way out of this collar.  You are slave to no one.\n*page_break Enter the brig alone.\nThe interior of the brig is as cramped and dismal as Borion's quarters. The bulk of the brig consists of two small cells, each outfitted with a barren bunk, a rusted toilet, and a stained sink. A large insectoid creature rests at a desk in front of the cells, its eyes closed.\n\nYou stare at the figure, which could easily be a praying mantis from Earth…if somebody had magnified one a thousand times.  Nothing openly marks it as either male or female, but the creature looks like it could bite off your head without breaking a sweat. Your wipe your sweaty palms on your clothes. You'll have to tread carefully here, you think.\n\nThe creature doesn't move as you approach. You wonder if it even knows you're here.\n*choice\n  #Greet the creature.\n    *set cowardice_bravery %+10\n    You greet the creature.  Its bulbous yellow eyes slowly open.  \"Ah, if it isn't our newest slave!\" The words sound smug, like a cat batting at a mouse.\n    *goto slave\n  #Remain silent.\n    \"I know you're there, human,\" announces the creature, its gravelly words startling you. Its lids pop open to reveal bulbous yellow eyes.\n    *goto slave\n  #Attempt to leave.\n    *set cowardice_bravery %-10\n    \"Stay where you are, human, or you'll regret it.\" Before you can fully register the gravelly words, the creature leaps to its feet. It stares at you with bulbous yellow eyes.\n    *goto slave\n*label slave\n\"I am Rallix, the ship's tactical officer.  You've come for processing, I assume?\"\n*label processing_choice\n*choice\n  *hide_reuse #\"What exactly [i]is[/i] processing?\"\n    \"Processing,\" begins Rallix, \"is the method by which I, chief of security, create a profile on you. As you might imagine, this profile would include information such as your name, species, height, weight, sex, and appearance.  Once fully processed, you will be added to the ship's official list of members. Your rank, of course, will be 'slave.'  Now are you ready to be processed?\"\n    *goto processing_choice\n  #\"Yup, at your service!\"\n    *set follower_leader %-10\n    Rallix chuckles deeply.  \"A sense of humor.  I like that.\" It comes around the desk and points to the floor. \"Step onto this scale.\" When you grudgingly comply, it mutters to itself, things like \"human\" and \"ungainly.\"\n\n    Rallix turns to its computer console, tapping several keys. It's clear the creature's inputting your information into a database.\n\n    As it types, Rallix's mouth turns up in a dangerous smile.  \"Tell me: do you worship The Great Hive and serve its Queen?\"\n    *goto question_1\n  #\"Fat chance. I'm nobody's slave.\"\n    *set cowardice_bravery %+10\n    Rallix chuckles loudly.  \"The collar around your neck tells me otherwise.\"  Your face flushes in humiliation. Damn that collar! \"Make no mistake, human: you may be the captain's guest for the moment, but make one mistake—just one—and you're mine.\"\n\n    It comes around the desk and points to the floor. \"Step on this scale.\" When you grudgingly comply, its mutters to itself, things like \"human\" and \"ungainly.\"\n\n    Rallix turns to its computer console, tapping several keys. It's clear the creature's inputting your information into a database.\n\n    As it types, Rallix's mouth turns up in a dangerous smile.  \"Tell me: do you worship The Great Hive and serve its Queen?\"\n    *goto question_1\n*label question_1\n*choice\n  *hide_reuse #\"The Great Hive?\"\n    \"Yes,\" says Rallix.  \"My people are the sacred Nixians, created by the Queen and Her Great Hive.  All other species are inferior to us, as we are the only ones destined to rule the galaxy by Her side.  Now do you worship Her?\"\n    *goto question_1\n  #\"Yes.\" (Lie.)\n    *set rallix_shelou %-10\n    Rallix visibly relaxes.  \"Ah,\" it says.  \"Then you and I are Blood Kindred.  What is your Role, human?\"\n    *choice\n      *if (origin = 1) #\"I hope to seek my fortune on the galactic frontier.\"\n        *goto mock\n      *if (origin = 2) #\"I need to pay off some debts.\"\n        *goto mock\n      *if (origin = 3) #\"I'm running from some people.\"\n        *goto mock\n      #Make something up.\n        *set rallix_shelou %-10\n        \"I am but an Initiate, Blood Brother,\" you offer, hoping Rallix won't press you for details.\n\n        Rallix gestures with its spiked foreleg.  \"Even the lowest of us will be among the Sacred in the end, Kindred.\"\n        *goto question_3a\n      #\"I am your slave, Rallix.\"\n        *goto mock\n      #\"Um…I'm a passenger on this ship?\"\n        *goto mock\n      #\"I am nothing more than a lowly human.\"\n        *goto mock\n  #\"No.\"\n    *set rallix_shelou %+10\n    Frowning, Rallix gestures at you with its spiked foreleg.  \"Then you are one of the damned,\" it declares.\n    *goto question_2\n*label mock\n*set rallix_shelou %+20\nRallix's bulbous eyes bulge out even more as it stares at you, aghast.  \"You dare to mock my faith, lesser creature?  You know nothing of The Great Hive!\"  A tense minute elapses, feeling like a century to you, before Rallix visibly calms.\n*label question_2\n\"So you do not believe. Would you at least bow before the Queen in all Her glory, were She to appear before you?\"\n*choice\n  #\"Yes, definitely.\"\n    *set cowardice_bravery %-10\n    *set rallix_shelou %-10\n    Rallix smiles once more.  \"And you would be wise to do so, slave.\"\n    *goto question_3b\n  #\"Only if I were in danger.\"\n    Rallix shakes its head.  \"Your sense of self-preservation disgusts me, petty human.  If you will not believe in the Truth, at least stand by your own beliefs.  The Great Hive can see through your fear and will reject you for it.\"\n    *goto question_3b\n  #\"I won't bow to another god. I have my own.\"\n    Rallix is quiet for a moment, then says grudgingly, \"Well. Your faith is not the Truth, but at least it does not waver.\"\n    *goto question_3b\n  #\"I bow before no one—not even a god.\"\n    *set cowardice_bravery %+10\n    *set rallix_shelou %+10\n    Rallix shakes its foreleg threateningly, forcing you to take a step back.  \"I guarantee you would bow to me with haste, were I to demand it.  A strong will is nothing compared to the might of the Hive, foolish human!\"\n    *goto question_3b\n*label question_3a\n\nRallix taps a button on the computer, and a bright blue laser shines down upon you, making you wince.  \"Stand still, human, while I conduct a scan.\"\n\nYou consider disobeying, but after one look at Rallix's spiked forelegs, you fall still. A moment later, the scan completes, and Rallix waggles its antennae.\n\n\"Kindred, you state that you are an Initiate, and so I must warn you: there are those among us who would mock our faith.  I speak of Shelou Vili, the ship's researcher.  He spends his free time investigating the philosophies and beliefs of others, yet it is pure sport for him. A mere hobby—he himself believes in nothing.  Worse, he considers his faithlessness superior to our piety!\"  Rallix shakes with anger.\n*choice\n  #\"He's wrong to mock us.  He must pay for his ignorance!\"\n    *set rallix_shelou %-20\n    Rallix's eyes light with an inner fire.  \"And so he will in the end, as will all nonbelievers.\"  It smiles once more, though with much less menace.  \"I was wrong about you, human.  You're not as weak willed as I initially believed.  Indeed, I've found our discussion to be most tolerable.\"\n    *goto goodbye\n  #\"I may not agree with him, but he's free to believe what he wants.\"\n    Rallix frowns.  \"Were you not Blood Kindred, I might interpret that the wrong way, human.  Given that you are an Initiate, however, I'll choose to overlook your unintentionally blasphemous suggestion.\"\n    *goto goodbye\n  #\"Actually, I agree with him…\"\n    *set rallix_shelou %+20\n    Rallix's antennae shoot up sharp as knives. \"'Blood Kindred'?\" it spits. \"You are nothing but a filthy pretender!\"\n    *goto goodbye\n*label question_3b\n\nRallix taps a button on the computer, and a bright blue laser suddenly shines down upon you.  \"Stand still, human, while I conduct a scan.\"\n\nYou consider disobeying, but after one look at Rallix's spiked forelegs, you fall still. A moment later, the scan completes, and Rallix resumes its interrogation.  \"If you will not bow before the Queen, would you at least claim to respect my people's beliefs, even as they differ from your own?\"\n*choice\n  #\"Of course.  The universe is a vast place, and I respect all beliefs.\"\n    *set harsh_kind %+10\n    *set rallix_shelou %-10\n    Rallix replies, \"That puts you above Shelou Vili, at least.  Our ship's researcher spends his free time investigating the philosophies and beliefs of others, yet he himself believes in nothing.  Worse, he thinks himself superior to those of us who believe.  It's rewarding to know that not everyone is as conceited as him.\n    *goto goodbye\n  #\"I don't know enough about your faith to judge.\"\n    *set harsh_kind %+10\n    Rallix narrows its eyes.  \"At least you are honest in your ignorance,\" it hisses.  \"The Great Hive is the One True Way.  Through the mercy of the Great Queen, we are all blessed.  But not all respect my people's faith.  Our ship's researcher, for example, spends his free time investigating the philosophies and beliefs of others, yet he himself believes nothing.  Worse, he thinks himself superior to those of us who believe.  It's both egocentric and shameful.\n    *goto goodbye\n  #\"Your religion is a disgrace.\"\n    *set harsh_kind %-10\n    *set rallix_shelou %+10\n    Rallix's antennae shoot up sharp as knives.  \"You are just as pathetic as the ship's researcher, Shelou Vili.  He spends his free time investigating the philosophies and beliefs of others, yet he himself believes nothing.  No, that's not so; rather, he believes himself better than those of us with faith.  You would be wise to learn from his mistakes instead of following his example, human.  I wouldn't want us to have a…misunderstanding.\n    *goto goodbye\n*label goodbye\n\n\"Now then…your processing is complete.  You are now an official passenger aboard this vessel.  Automated scans have recorded all the necessary details.  Am I right to assume that Borion Olmo is waiting for you in the hallway?\"  You open your mouth to answer, but Rallix barrels on. \"I suggest the two of you pay the captain a visit.  We will speak again later.\" It gives you an odd look, like it's laughing at you. \"Of that, I have little doubt.\"\n*page_break Leave the brig.\nYou exit the brig and find Borion waiting for you, his nervousness palpable.  \"W-well,\" he asks, \"how did it g-go?\"\n*choice\n  #\"You are right to fear Rallix.\"\n    *set kraska_borion %+20\n    *set harsh_kind %+10\n    Borion smiles proudly.  \"I t-told ya so, didn't I, ${name}?  B-Borion never l-lies to his friends!\"\n    *goto proceed_to_bridge\n  #\"I did what I had to do.\"\n    *set follower_leader %-10\n    Borion nods.  \"As we all m—must.\"\n    *goto proceed_to_bridge\n  #\"That's none of your business, Borion.  Stop being nosy.\"\n    *set kraska_borion %+10\n    *set harsh_kind %-10\n    Borion smiles sheepishly.  \"You're r-right…it's not my b-business at all.\"\n    *goto proceed_to_bridge\n  #\"Rallix and I got along great.  I don't know what you're so afraid of.\"\n    *set kraska_borion %+10\n    *set harsh_kind %-10\n    Borion sucks in a breath.  \"Really?!  Wow.\" He shakes his head. \"I g-guess what they say is true: It r-really does take all kinds.\"\n    *goto proceed_to_bridge\n*label proceed_to_bridge\n\nBorion starts back down the corridor toward the ship's bow.  As you follow, he speaks.  \"Now that you've been pr-processed, I'll take you to meet the c-captain.  Much nicer than Rallix, ${isan_he} is, I pr-promise you that!\"\n*finish Proceed to the operations center.", "chapter_1b_engine": "Borion and you quickly exit the science lab and jog down the small corridor until you arrive at a set of double doors fitted into the center of one wall.\n\n\"B-behold,\" Borion says, \"the engine room.\" When you move toward it, he holds up a hand. A rush of blood to his cheeks turns his bluish skin the purple of a bruise. \"Erm…if you don't mind, I'd l-like you to wait here while I g-go inside and t-take care of this.\"\n*fake_choice\n  #\"Wait…aren't we going inside?\"\n  #\"Somehow, I thought it'd be bigger…\"\n  #\"Go inside and take care of what, exactly, Borion?\"\n\"No t-time to explain!\" shouts Borion, running through the doors, which immediately close behind him.  You think you hear him say something about saving the ship.\n\nYour shock quickly turns to anger. Whatever game Borion's playing, you want no part of it.\n*choice\n  #Try to enter the engine room.\n    *set follower_leader %+10\n    Refusing to stand idly by, you step toward the engine room doors and wait for them to open. They remain shut. Groaning, you realize they must be configured to allow a select few crew members access.\n\n    *goto kraska_encounter\n  #Stay where you are.\n    *set follower_leader %-10\n    *goto kraska_encounter\n*label kraska_encounter\nAs annoyed as you are, you can't get through the doors without Borion's help, so you decide to stay put. Seconds later, you swear you see a large shadow dart across the bulkhead.  But when you look again, it's gone.\n\nWhen another minute passes without any strange apparitions, you convince yourself you were just seeing things. Then the shadow appears again, gliding along the wall in your direction.  Though your legs are primed to flee, you force yourself to inspect the black shape. It appears to belong to a humanoid with a long, pointed nose and spiky hair. You frown; there's no matching body.\n\n\"What are you doing here, human?\"  A raspy, snakelike voice echoes through the metal hall, sending shivers down your spine.\n*choice\n  #\"What are you?\" (Fearfully.)\n    *set cowardice_bravery %-20\n    *goto shadow_people\n  #\"I'm waiting for Borion to come out of the engine room.\"\n    The shadow laughs cruelly.  \"I care not!  Visitors such as yourself are not welcome here.\"\n    *fake_choice\n      #\"And who are you to make such a statement?\"\n      #\"Why should I listen to you, anonymous shadow?\"\n      #\"If you say so, whoever you are…\"\n    *goto shadow_people\n  #\"You don't scare me, whoever you are. Get out of here!\"\n    *set cowardice_bravery %+20\n    *goto shadow_people\n*label shadow_people\nThe shadow leaps upright. \"Surely you know who I am?\" it demands, appalled. \"I am none other than Kraska the Great, of the mighty Shadow Fiends, of course!  Do you truly not know how the entire galaxy fears us, and with good reason?\" It pauses. \"Consider this your warning, human: should you ever cross me, you will regret it.\"\n*set kraska_borion %+30\n\nYou shudder, disturbed, and the shadow rushes away, leaving you alone again.\n\nSoon Borion returns from the engine room, a triumphant smile stretching his skin over the bones.  \"I just s-spoke with Thisi,\" he says.  \"We passed through the w-web safe and sound.  C-crisis averted!\"  Then he catches sight of your expression.  \"${name}?  What is it?\"\n*page_break Tell Borion about Kraska.\n\"Oh…\" says Borion, his face purpling with worry.  \"So you saw him.\"\n*choice\n  #\"What is a foul creature like that doing on this ship?!\"\n    *set harsh_kind %+10\n    \"I d-don't kn-know,\" says Borion, stammering more than usual.  \"N-no one does.  He's the n-newest member of the c-crew.  He's only b-been here for a f-few weeks.  The c-captain says he was b-brought on board because w-we needed another scout on m-missions, b-but…he sc-scares me.\"\n    *goto move_on\n  #\"I did.  He tried to scare me, but it didn't work.\"\n    *set cowardice_bravery %+10\n    \"Oh,\" says Borion.  \"Good!  Most p-people are terrified of him, i-including me.  None of the crew knows why the captain let him on b-board.  We were told it's b-because we needed another scout on m-missions, but…\"\n    *goto move_on\n  #\"Yes.  He scared me!\"\n    *set cowardice_bravery %-10\n    Borion's eyes widen.  \"Really?  Me, too!  The crew d-doesn't even know why the captain let him on b-board.  We were told it's b-because we needed another scout on m-missions, but…\"\n    *goto move_on\n  #\"I kind of like him.\"\n    *set harsh_kind %-10\n    Borion's eyes widen.  \"Really?  He s-scares me.  The crew d-doesn't even know why the captain let him on b-board.  We were told it's b-because we needed another scout on m-missions, but…\"\n    *goto move_on\n*label move_on\nBorion's face suddenly brightens.  \"Anyway, let's go get you pr-processed, okay?  Then you can meet the c-captain.\"\n*choice\n  #\"Okay, how do I get processed?\"\n    \"I'll take you to R-Rallix down at the brig,\" says Borion.  \"He'll take c-care of everything.  It's easy, trust me!\"\n    *goto proceed_to_brig\n  #\"I don't want to get processed.\"\n    \"Look, ${name},\" says Borion sympathetically, \"you don't r-really have a choice here.  I want to b-be all friendly-like, but the c-captain gave me strict orders.\"\n    *goto proceed_to_brig\n*label proceed_to_brig\n*page_break Proceed to the brig.\nBorion leads you farther down the hall toward the brig.  A minute later, a new member of the crew appears in the opposite direction.  He is birdlike yet stands on two legs, a human-eagle hybrid with massive golden wings.\n\n\"Tobi Esha, Shelou,\" says Borion as the two of you approach the stranger. That must be some kind of formal greeting, you think.\n\n\"Tobi Esha, Borion,\" replies the stern-eyed figure.  In a deep, emotionless voice, he adds, \"Though you should know by now to refer to me only by my full name: Shelou Vili.\"  Shelou Vili pauses, clearly waiting for a proper introduction.\n*choice\n  #Introduce yourself.\n    *set follower_leader %+10\n    \"My name is ${name},\" you state, inclining your head.  \"It's a pleasure to meet you, Shelou.\"\n\n    Shelou frowns in disapproval.  \"As I just said, human, when speaking with one of my people, it is customary to refer to us by a combination of our personal name and tribe. In the future, please acknowledge me as Shelou Vili.\"\n\n    \"S-Shelou Vili is an Aviark,\" Borion explains.  \"He's the ship's r-research specialist.  W-where are you headed, Shelou Vili?\"\n\n    \"To assist Thisi,\" the bird man replies, \"for ${Thisi_his} investigation of the electrical web that destroyed the human's transport requires my encyclopedic knowledge of history.\"\n\n    Borion takes a step back, putting you face-to-face with Shelou Vili.\n    *goto shelou_question\n  #Wait for Borion to introduce you.\n    *set follower_leader %-10\n    You remain silent, waiting for Borion to speak.  After several seconds, the Vervoo slave catches on.  \"Oh, Sh-Shelou Vili, this is ${name}, the p-passenger we rescued from the wr-wreckage of the [i]Cheyenne[/i].  I'll b-be taking him to meet the c-captain soon.  ${name}, this is Sh-Shelou Vili, the ship's research s-specialist.\"\n\n    Shelou frowns in disapproval.  \"Is the human unable to address me directly, Borion?\" He turns his fierce gaze on you. \"Either way, we must speak quickly.  I am on my way to assist Thisi in ${thisi_his} investigation of the electrical web that destroyed your vessel.\"\n\n    Borion takes a step back, putting you face-to-face with Shelou Vili.\n    *goto shelou_question\n*label shelou_question\n\n\"${name}, while I am busy at the moment, I am most interested in learning more about you.  My people believe that the present is defined by the past, and such, the key to understanding a culture lies in knowing its history.  Would you consider speaking with me about the history of your species at a later time?\"\n*choice\n  #\"Yes, of course. I agree that a culture's history is important.\"\n    *set rallix_shelou %+20\n    Shelou bows his head in deference.  \"Then you are wiser than most sentient beings, human.\n    *goto leave_shelou\n  #\"No civilization or group of people should be judged by its history alone.\"\n    *set rallix_shelou %-20\n    \"Then I regret to say you are a fool,\" states Shelou coolly. He reminds you of an arrogant professor speaking to a struggling student. \"There is no greater insight into a people than its history.\n    *goto leave_shelou\n  #\"Talking to you about my history would be a waste of my time.\"\n    *set rallix_shelou %-30\n    Shelou blinks rapidly. A single squawk emerges from his open beak before he snaps it shut. It's clear you must have offended him deeply. \"Given that you are new here,\" he says at last, \"I will forgive your ignorance on this topic.\n    *goto leave_shelou\n*label leave_shelou\nNow if you will excuse me, I have duties to attend to.\"  Clicking his beak, Shelou Vili sweeps past Borion and you. You feel the dismissal as keenly as the wind generated by his flapping wings.\n\n\"Let's g-get to the brig,\" suggests Borion, sounding exhausted.\n*finish Proceed to the brig.", "chapter_1b_lab": "A slender figure hunches over the panel.  From this angle, you can't tell the person's gender, but you can see how the contrasting play of light and shadow accents their cheekbones and jawline. What a beautiful sight.\n\n\"Close the door, Borion,\" the person says good-naturedly, eyes never leaving the panel. \"I'm trying to concentrate here. We may have a problem.\" The slightly accented voice feels like silk in your ears.\n\nIs your heart pounding from fear? Or something else?\n\n*choice\n #The man at the computer reminds me of my first lover. There's something about the way he looks that matches what I've always found attractive - the angle of his cheekbones, the look in his eyes...\n    *set preference \"men\"\n    *set thisi_gender \"man\"\n    *set thisi_he \"he\"\n    *set thisi_his \"his\"\n    *set thisi_him \"him\"\n    His form-fitting jumpsuit clings to his broad shoulders, and the color complements his smooth green skin. A man? Didn't Borion call Thisi \"she\"?\n\n    Oh. His skin is green. He's a Nyarri -  that explains the sudden attraction. Nyarri are a plantlike species sought after as companions throughout the galaxy. Chlorophyll flows through their veins, lending their skin its pale green tinge. They're androgynous, but their complex pheromones trigger reactions in those around them to make them appear to be whatever gender the viewer finds attractive. For you, that means that Thisi looks like a man, but for Borion, Thisi must look like a woman.\n    *goto thisi_convo\n\n #The woman at the computer reminds me of my first lover. There's something about the way she looks that matches what I've always found attractive - the line of her jaw, the way her hands move over the keyboard...\n    *set preference \"women\"\n    *set thisi_gender \"woman\"\n    *set thisi_he \"she\"\n    *set thisi_his \"her\"\n    *set thisi_him \"her\"\n    Her form-fitting jumpsuit showcases her figure to its fullest, and the color complements her smooth green skin.\n\n    Oh. Her skin is green. She's a Nyarri - that explains the sudden attraction. Nyarri are a plantlike species sought after as companions throughout the galaxy. Chlorophyll flows through their veins, lending their skin its pale green tinge. They're androgynous, but their complex pheromones trigger reactions in those around them to make them appear to be whatever gender the viewer finds attractive. For you, that means that Thisi looks like a woman.\n    *goto thisi_convo\n\n #This is very confusing. I'm not usually attracted to anyone, but for some reason I want to keep looking at the person at the computer.\n    *set preference \"neither\"\n    *set thisi_gender \"neutral\"\n    *set thisi_he \"it\"\n    *set thisi_his \"its\"\n    *set thisi_him \"it\"\n    Thisi wears a form-fitting jumpsuit that highlights its long slender limbs and complements its smooth green skin. \n\n    Oh. Its skin is green. Thisi is a Nyarri - that explains the strange thoughts you had. Nyarri are a plantlike species sought after as companions throughout the galaxy. Chlorophyll flows through their veins, lending their skin its pale green tinge. They're androgynous, but their complex pheromones trigger reactions in those around them to make them appear to be whatever gender the viewer finds attractive. Few people can resist the pheromones, but you seem to have done it. To you Thisi appears to be neither male nor female, but if Borion is attracted to women, he'd see Thisi as female. That must be why he called Thisi \"she.\"\n    *goto thisi_convo\n\n #Fear. Definitely just fear.\n    *set preference \"neither\"\n    *set thisi_gender \"neutral\"\n    *set thisi_he \"it\"\n    *set thisi_his \"its\"\n    *set thisi_him \"it\"\n    Thisi wears a form-fitting jumpsuit that highlights its long slender limbs and complements its smooth green skin. \n\n    Oh. Its skin is green. Thisi is a Nyarri - that explains the strange thoughts you had. Nyarri are a plantlike species sought after as companions throughout the galaxy. Chlorophyll flows through their veins, lending their skin its pale green tinge. They're androgynous, but their complex pheromones trigger reactions in those around them to make them appear to be whatever gender the viewer finds attractive. Few people can resist the pheromones, but you seem to have done it. To you Thisi appears to be neither male nor female, but if Borion is attracted to women, he'd see Thisi as female. That must be why he called Thisi \"she.\"\n    *goto thisi_convo\n\n*label thisi_convo\n\n\"Greetings, human,\" Thisi says, in the same musical tone.  \"May I ask with whom I have the pleasure of speaking?\"\n\n*if ((preference = \"men\") or (preference = \"women\"))\n\n  Blushing furiously, you introduce yourself. You almost want to do whatever ${thisi_he} says just to keep ${thisi_him} talking.\n\n  \"It is my sincerest pleasure to meet you, ${name},\" ${thisi_he} replies, giving you a dazzling smile. \"I'm Thisi B'Artunt.  Welcome aboard the [i]Lady Luck[/i].\"  Thisi's attention returns to the computer panel.  \"I wish we had the time to get to know each other better, but as you may have already heard, we have a problem.\"\n\n  *goto whats_the_problem\n\n*else\n  You introduce yourself.  \n\n  \"It is my sincerest pleasure to meet you, ${name},\" ${thisi_he} replies, giving you a dazzling smile. . .that you don't return. Thisi's brow furrows slightly, but ${thisi_he} continues. \"I'm Thisi B'Artunt.  Welcome aboard the [i]Lady Luck[/i]. I wish we had the time to get to know each other better, but as you may have already heard, we have a problem.\"\n\n  *goto whats_the_problem\n\n*label whats_the_problem\n\n*choice\n  #\"What's the problem?\"\n    *set follower_leader %+10\n    \"[c/]\n    *goto the_problem\n  #\"Your problem's not my concern.\"\n    *set follower_leader %-10\n    \"In this case, I think it is,\" states Thisi. \"[c/]\n    *goto the_problem\n  #\"Good. I'm glad you have a problem.\"\n    *set harsh_kind %+10 \n    \"Given that this problem is threatening all our lives,\" says Thisi, sighing, \"I think you may want to reconsider the attitude.\n    *goto the_problem\n*label the_problem\nThe ship you were traveling on, the [i]Cheyenne[/i]?  At first we thought the crash may have been due to engine trouble.  But I've been doing some research, and it turns out the ship hit something, a kind of electrical web lined across this sector of space.\"  Thisi glances at you from beneath ${thisi_his} brow and smirks.  \"I know what you're thinking: ${thisi_he}'s got beauty [i]and[/i] brains.\"\n*label the_problem_choice\n*choice\n  *hide_reuse #\"You're clearly the whole package, Thisi!\"\n    *set thisi_taloo %-10\n    \"Glad you noticed,\" says Thisi, licking ${thisi_his} lips.  \"But we have more important issues to deal with right now, cutie.\"\n    *goto the_problem_choice\n  #\"So does that mean the transport ship was attacked?\"\n    *goto the_problem_continued\n  #\"Was the web designed by someone, or is it naturally occurring?\"\n    *goto the_problem_continued\n*label the_problem_continued\n\"I can only speculate so far,\" says Thisi.  \"But figuring out the web's purpose is of secondary importance right now.  Take a look.\"  Thisi taps on the computer display.  A gridlike red web appears on the screen, off to one side of a small vessel. You guess it's the [i]Lady Luck[/i].  \"The [i]Lady Luck[/i] is set to hit the web in less than five minutes.\"\n\n\"W-what happens if the w-web hits us?\" asks Borion.\n\nThisi's face turns grave.  \"If it does, we'll explode just like the [i]Cheyenne[/i].\"\n\nBorion yelps, and you frown at Thisi. The last thing you want to do is endure another explosion. \"Is there any way to avoid this?\"\n\n\"That depends on what we do now,\" says Thisi.  \"${name}, I could use an extra pair of hands.  Do you think you could help me out?\"\n*choice\n  #\"I'd love to.\"\n    *set thisi_taloo %-20\n    Thisi beams.  \"Great! I'll set everything up.\" The Nyarri gestures to an ajoining console. \"Watch the numbers on this display. They're the different frequencies I'm using to disrupt the web. If one of them works, the number will flash red. Let me know right away, okay?\"\n    *choice\n      #\"Sure!\"\n        *set thisi_taloo %-20\n        You hurry over to the computer screen.  A series of complex numbers start flashing by. You quickly realize each digit in every number is prime. Interesting.\n\n        After two minutes of intense focus, you see one number flash red: 977.353.\n        *choice\n          #\"Thisi, a number just turned red.\"\n            Thisi's face lights up.  \"Nice work, ${name}!  We may just survive this yet.\n            *goto what_to_do\n          #Remain silent.\n            *set suspicion +5\n            You didn't ask to be here, so why should you help the crew holding you captive? When a number—977.353—turns red, you keep your mouth shut.  Seconds later, Thisi frowns.\n\n            \"I think you missed something, ${name},\" ${thisi_he} says.  \"One number flashed red on my console.\n            *goto what_to_do\n      #\"On second thought, I'd rather not.\"\n        *set thisi_taloo %+20\n        *goto rather_not\n  #\"I'd rather not.\"\n    *label rather_not\n    *set thisi_taloo %+20\n    *if ((preference = \"men\") or (preference = \"women\"))\n      Embarrassment washes over you. Even though you know that your feelings are being caused by Thisi's pheromones, you still hate to turn ${thisi_him} down.\n\n      Thisi pouts. \"Well, you're just no fun at all, are you?\"  Thisi touches Borion's hand. \"Borion, why don't you help me instead?\"\n\n      Borion ducks his head, trying to avoid the tension in the air. \"W-well,\" he stammers, \"okay, s-sure.\"\n      *goto borion_helps\n    *else\n      Thisi pouts. \"Well, you're just no fun at all, are you?\"  Thisi touches Borion's hand. \"Borion, why don't you help me instead?\"\n\n     Borion ducks his head, trying to avoid the tension in the air. \"W-well,\" he stammers, \"okay, s-sure.\"\n     *goto borion_helps\n\n  #\"Maybe Borion wants to help instead.\"\n    *set thisi_taloo %+20\n    Borion's eyes widen hopefully.  \"C-can I?\"  Subtle disappointment darkens Thisi's face, but you have to admit ${thisi_he} masks it well.\n\n    \"Of course, Borion,\" ${thisi_he} says brightly.  \"I'd love for you to help.\"\n    *goto borion_helps\n\n*label borion_helps\nThisi gestures to an ajoining computer console.  \"Borion, watch the numbers on this display. They're the different frequencies I'm using to disrupt the web. If one of them works, the number will flash red. Let me know right away, okay?\"\n\n\"Okay,\" says Borion, walking over to the screen.\n\nAfter two minutes of silence, Borion exclaims, \"There! That one!\"\n\nThisi's face lights up.  \"Nice work!  We may just survive this yet.\n*label what_to_do\nBorion, run down to the engine room and set our engine's harmonics to match the frequency 977.353.  If we do that, the web should pass right by us. Hurry!\"\n\nBorion nods dutifully, puffing out his chest. \"You d-don't have to t-tell me twice!\" he proclaims.  \"Come on, ${name}.  L-let's go!\"\n*page_break Follow Borion to the engine room.\n\nAs you rush to exit the science lab, Thisi calls out, \"Hey, ${name}!  After we get all this sorted out, maybe you can come back here, get to know me a little better.  What do you say?\"\n*choice\n  #\"Of course, Thisi!\"\n    Thisi beams.  \"Wonderful!  I can tell that we're going to get along great, ${name}.  Maybe we can…experiment together. In my quarters. If you know what I mean.\"  The Nyarri's eyes dart mischievously to Borion.  \"Now get going!\"\n    *set thisi_taloo %-20\n    *finish Exit the science lab.\n  #\"This isn't the time!\"\n    Thisi laughs playfully.  \"Hon, if we don't get this situation resolved in the next few minutes, there won't be another time.  Now get going!\"\n    *finish Exit the science lab.\n  #\"I appreciate the offer, but I would rather not.\"\n    *set thisi_taloo %+10\n    Thisi pouts a little, and your attraction to ${thisi_him} wanes.  \"Well, if that's how you feel….  I believe they're waiting for you.\"\n    *finish Exit the science lab.\n  #\"Stay away from me.\"\n    Thisi's smile cracks, and your attraction to ${thisi_him} immediately dissolves.  \"Oh, all right, then. If that's how you feel, we'll keep things solely professional. Spoilsport. Now get going!\"\n    *set thisi_taloo %+20\n    *finish Exit the science lab.", "chapter_1b_ops": "Borion guides you to a set of double doors.  They don't budge until he presses his hand against a panel set into the wall. Your stomach drops; seeing that made you realize just much of a prisoner you really are. Even things as basic as your movement through the ship depend on the whims of others.\n\n\"W-welcome to the operations center,\" Borion says, his voice playful. \"You m-might, uh, be in a for a bit of a s-surprise.\"\n\nYou don't like his grin any more than the telltale purplish cast to his skin. What's he hiding?\n*choice\n  #\"Surprise? What do you mean?\"\n    Borion ignores your question. You glare helplessly at his retreating back. You hate that you have no choice but to indulge him in whatever game he's playing.\n    *page_break Follow Borion into ops.\n    *goto enter_ops\n  #\"Waking up to you was enough of a surprise, thanks.\"\n    \"Oh, but you'll l-like this,\" replies Borion, turning to beam at you.  \"I p-promise!\"\n    *page_break Follow Borion into ops.\n    *goto enter_ops\n  #Follow Borion into ops without comment.\n    *goto enter_ops\n\n*label enter_ops\nHolding your breath, you follow Borion into the operations center. Your eyes light on the sleek screen presiding over the front of the room, displaying a beautiful view of space—probably the sector the [i]Lady Luck[/i] currently occupies. Relief washes over you; there's no electrical web in sight.\n\nFeeling a bit safer, you glance around the chamber. Though smaller than the bridge of the destroyed [i]Cheyenne[/i], it's still an expansive space, and state-of-the-art computer panels line the walls. Curious, you take a closer look and realize they're divided by function: helm control, science, engineering, tactical, and operations.  \n\nBorion points to a chair nearly hidden behind the helm console. Well, you reason, whoever's in the chair must be the pilot. Bursting with questions, you hurry over, only to discover that the person sitting in the chair is—you.\n\nBorion bounces with delight.  \"See? See? I t-told you it would be a s-surprise!\"\n*fake_choice\n  #\"Who are you?\"\n  #\"What is this?\"\n  #\"What's going on?\"\nThe figure jumps at your question, clearly startled.  It turns wide eyes on you—your eyes, you think, dizzy—then seeks shelter behind a bulkhead in the far corner.\n\n\"It's okay, Taloo!\" calls Borion.  \"This is a f-friend!\"  Leaning toward you, he whispers, \"Taloo's a bit sh-shy.  Her full n-name is Taloo Dama.  She's an A'Morpha.  You m-might know them better as 'm-mimics.'  Her p-people are able to take the form of th-those nearest to them—in this c-case, you!\"\n*label about_taloo\n*choice\n  *hide_reuse #\"Taloo is a woman?\"\n    \"Well, technically sp-speaking, the A'Morpha are non-gender-s-specific,\" Borion explains.  \"But Taloo usually p-presents as feminine, so we refer to h-her as 'she.'  She doesn't s-seem to mind.\"\n    *goto about_taloo\n  #\"So she is a shape-shifter?\"\n    Borion shakes his head. \"Not quite. Taloo, like all m-mimics, can only take the f-form of someone n-nearby.  No one, not even the A-A'Morpha themselves, knows what they r-really look like.  Isn't that c-cool?\"\n    *goto about_taloo_B\n*label about_taloo_B\n\nTaloo peeks at you from behind the bulkhead, curiosity mixing with fear on her face.  Your face. You must look just like that right now. The thought makes you even dizzier, and you grip the chair she just vacated.\n\n\"She can't speak,\" explains Borion.  \"Not to m-mention, strangers make her n-nervous.  Don't take it p-personally.\"\n*choice\n  #Smile at Taloo kindly.\n    *set thisi_taloo %+20\n    Taloo's—or, rather, your—eyes light up, and she slowly inches forward.\n\n    \"I think she l-likes you,\" whispers Borion.\n\n    *goto proceed_to_bridge\n  #Laugh at Taloo's shyness.\n    *set thisi_taloo %-20\n    Taloo, clearly frightened, disappears behind her hiding place.\n\n    \"She's very s-self-conscious,\" whispers Borion.  \"She doesn't l-like it when p-people laugh at her.\"\n    *goto proceed_to_bridge\n  #Ignore Taloo completely.\n    *set thisi_taloo %-10\n    As weird as this mimicking business is, you don't have time for it. You turn to Borion and remind him that you should be getting to the captain's office.\n\n    \"Hmmm,\" he says, sounding disappointed.  \"You're p-probably right.\"\n    *goto proceed_to_bridge\n*label proceed_to_bridge\nBorion takes a few steps backward.  \"Anyway, the c-captain's office is right th-through this door.  S-see you later, Taloo.\"  He waves to the A'Morpha, who's still hidden behind the bulkhead, and leads you to a nondescript side door. Even with your stomach jangling with nerves, you can't help but wonder who Taloo will mimic next.\n*finish Enter the captain's office.", "chapter_1c_captain": "Borion's touch opens the door, and you both enter the office.\n\nInside, a ${isan_gender} glances up from ${isan_his} desk. ${isan_he} stands, ${isan_his} posture ramrod straight, and flashes you a friendly smile. \"Greetings,\" ${isan_he} says.  \"I'm Captain Isan Cehnta, and you must be our new guest.  Allow me to officially welcome you aboard the [i]Lady Luck[/i].\"\n\nThe first thing you notice about Captain Isan is ${isan_his} height.  Tall and lean, ${isan_he} resembles a human albino.  Unusual bones along ${isan_his} forehead ridge, however, tell you otherwise.  Sporting long white hair and a black robe, Isan looks to be in ${isan_his} forties, but ${isan_his} air belongs to someone much older and experienced.The welcoming expression on ${isan_his} face puts you at ease.\n\n\"I'm sorry to hear about the destruction of the [i]Cheyenne[/i],\" the captain continues. \"From what they say about that nasty electrical web, it's a miracle you survived.\" ${isan_he} looks at Borion. \"Please leave us now, Borion. ${name} and I have much to discuss.\"\n\nBorion bows reverentially and makes his exit.  You're glad to see his twitchy face go. Just how chatty can one person be?\n\nA minute passes, and Captain Isan cocks ${isan_his} head. Flushing, you realize ${isan_he}'s waiting for you to speak.\n*choice\n  #\"You know my name?\"\n    Captain Isan chuckles warmly.  \"I know a lot more about you than that, ${name}.  While you were unconscious, I did a little investigating. The scans Rallix took helped, too.\n    *goto pirates\n  #\"It's a pleasure to meet you, Captain.\"\n    *set harsh_kind %+10\n    \"Likewise,\" replies Isan.  \"I did some checking on you when you were still unconscious from the crash, ${name}.\n    *goto pirates\n  #\"Take me home at once!\"\n    *set harsh_kind %-10\n    Captain Isan frowns. \"I'm afraid I can't do that, ${name}. You see, we're far out from Earth and hurtling farther every minute. You can't expect me to abandon our current mission and inconvenience the entire crew just to take you home, can you?\"\n\n    Furious, you don't reply, and Isan's expression becomes gentler, kinder.  \"I might be able to do you one better, though.  You see, I ran a background check when you were still unconscious from the crash, thanks in part to the scans Rallix took while fitting you for that collar.\n*label pirates\n\n*if origin = 1\n  You've been busy these last few days, haven't you?  Off on a jaunt to the galactic frontier?  Sounds to me like you could use some excitement.\" Isan smirks. \"And if there's one thing the [i]Lady Luck[/i] does well, it's stirring up adventure.\n  *goto reason_for_being_here\n*elseif origin = 2\n  From what I've read, it looks like you've got a bit of a problem. Those debts your father left you with…I'd say you're in a pretty bad spot.\" Isan clicks ${isan_his} tongue. \"Luckily for you, now you've met me.\n  *goto reason_for_being_here\n*else\n  From what I've read, it sounds like you're in a pretty tough spot.  You broke the law, ${name}, and now you're on the lam.  Do you know what'll happen if they catch you?\" Isan clicks ${isan_his} tongue. \"Luckily for you, I found you first.\n  *goto reason_for_being_here\n*label reason_for_being_here\nDo you know what it is we do here on this ship, ${name}?\"\n*choice\n  #\"Yes.\" (Lie.)\n    \"Good,\" Isan says, raising an eyebrow in disbelief. \"Then I obviously don't need to tell you about our business of retrieving abandoned goods and selling them to interested parties, not when you already know everything. Tell me, how does our line of work sit with you?\"\n    *goto question_1\n  #\"No.\"\n    \"We're treasure seekers, ${name},\" explains Isan. \"We seek out valuable items in need of homes and auction them off to interested parties. How does our line of work sit with you?\"\n*label question_1\n*choice\n  *hide_reuse #\"So you're pirates?\"\n    Isan frowns.  \"I don't like that term, ${name}.  I would prefer it if you referred to us as treasure hunters or seekers from here on out.  We don't steal from anyone, only retrieve items that have been…left behind.\"\n\n    Sure, you think, crossing your arms over your chest. Because most people choose to leave their valuables behind. You lean back and wait to see where this goes.\n\n    $!{isan_his} frown melts into a smile.  \"So what do you think?\"\n    *goto question_1\n  #\"Sounds fun to me.\"\n    *set cowardice_bravery %+10\n    *set garce_isan %+10\n    Isan chuckles. \"You're darn right it is.  And what do you make of the crew?\"\n    *goto question_2\n  #\"It sounds illegal.\"\n    *set cowardice_bravery %-10\n    *set garce_isan %-10\n    Isan looks at you sternly. \"We may skirt the edge of the law from time to time, ${name}, but I assure you we've never done anything illegal.\" Isan looks down at ${isan_his} desk and sighs.  \"At least not in this sector,\" ${isan_he} adds softly.\n\n    You don't know what to think. They did save your life, and the offer's tempting, but…\n\n    Isan meets your gaze head on. \"Look, this might not be the kind of thing you write home about, but we're good people. On that note, what do you make of the crew?\"\n*label question_2\n*choice\n  #\"They're just my type!\"\n    *set harsh_kind %+10\n    *set garce_isan %+10\n    *goto crew_type\n  #\"They're an…interesting bunch.\"\n    *goto crew_type\n  #\"They're insane.\"\n    *set harsh_kind %-10\n    *set garce_isan %-10\n*label crew_type\nIsan gives you a knowing smile, and you can tell ${isan_he} sees right through you. \"They certainly are,\" ${isan_he} remarks. \"I'll bet it was overwhelming for you, meeting so many people in such a short span of time.\"\n*fake_choice\n  #\"It definitely was.\"\n  #\"Oh, it wasn't that hard.\"\n*temp answers_right\n*set answers_right 0\n\"Hmm,\" says Isan, eyeing you. You swallow nervously. \"Well, let's have a little fun, shall we? See how well you know everyone. Which crew member worships the Great Hive?\"\n*choice\n  #\"Shelou Vili.\"\n    \"Hmmm…\"\n    *goto quiz_2\n  #\"Rallix.\"\n    *set answers_right +1\n    \"Mm-hmm…\"\n    *goto quiz_2\n  #\"Kraska.\"\n    \"Hmm…\"\n*label quiz_2\nYour heart sinks as Captain Isan bites back a grin. \"Next question. Who belongs to the nightmarish band known as the 'Shadow Fiends'?\"\n*choice\n  #\"Rallix.\"\n    \"Hmm…\"\n    *goto quiz_3\n  #\"Borion Olmo.\"\n    \"Hmm…\"\n    *goto quiz_3\n  #\"Kraska.\"\n    *set answers_right +1\n    \"Mm-hmm…\"\n*label quiz_3\nIsan's smile finally gets the better of ${isan_him}. \"And who can change their physical form to match others'?\"\n*choice\n  #\"Thisi B'Artunt.\"\n    \"Hmm…\"\n    *goto end_of_quiz\n  #\"Taloo Dama.\"\n    *set answers_right +1\n    \"Mm-hmm…\"\n    *goto end_of_quiz\n  #\"Shelou Vili.\"\n    \"Hmm…\"\n*label end_of_quiz\n*if answers_right = 3\n  *set garce_isan %+10\n  Isan's smile widens. \"Three for three, ${name}. You clearly took your time getting to know the others, even accounting for the electrical web crisis. You've got a good head on your shoulders.\"\n  *goto question_3\n*else\n  *if answers_right = 0\n    *set garce_isan %-10\n    Isan shakes ${isan_his} head and sighs loudly. \"You didn't pay any attention at [i]all[/i], did you?\" ${isan_his} unexpected disapproval hits you like shrapnel from the exploding ship. \"I realize that the electrical web posed a threat, but I expect better from those onboard this vessel. Even the newcomers.\"\n    *goto question_3\n  *else\n    Isan runs a hand over ${isan_his} face.  \"Well, you got some of them right, at least. Given the threat the electrical web posed to us, I suppose that's acceptable.\" ${isan_his} eyes narrow. \"For now.\"\n    *goto question_3\n*label question_3\n\nIsan sits down and gestures for you to do the same. You drop into a chair, wondering what you've gotten yourself into. \"Now then,\" ${isan_he} says, \"let's get to the point. We're planning a run past Earth, but not for several weeks.  However, when we get there, you'll be free to go.\n*if origin > 1\n  *if origin = 2\n    Listen carefully: if you cooperate with us along the way, I might be able to do something about your money problem.\n    *goto isan_rank_talk\n  *else\n    Listen carefully: if you cooperate with us along the way, I might be able to do something about your legal problem.\n    *goto isan_rank_talk\n*label isan_rank_talk\n\n\"In the meantime, however, we're always looking to add to our ranks. ${name}, your record indicates that you have some skills that may be useful to us.\" Isan leans forward, ${isan_his} expression intent. \"What would you consider your particular area of expertise?\"\n*choice\n  #\"I have extensive tactical training.\"\n    *set specialization \"tactical\"\n    \"Ah, a fellow tactician!\" Isan exclaims. \"Two heads are better than one, I always say. Someone with your abilities can do well in this line of work.\"\n    *goto question_4\n  #\"I'm a trained scientist and proficient with technology.\"\n    *set specialization \"science\"\n    \"Thisi would certainly be happy for the company,\" jokes Isan.  \"It might surprise you, but scientists and engineers have come in handy on quite a few of our missions.\"\n    *goto question_4\n  #\"I can move around without being seen or heard.\"\n    *set specialization \"infiltration\"\n    \"Impressive!\" Isan claps ${isan_his} hands. \"And necessary. Those in our line of work can never have enough infiltrators.\"\n*label question_4\n\nIsan rests ${isan_his} elbows on the desk. \"Let's get right to it, shall we? Tell me, ${name}, how do you feel about joining our crew?\"\n*label question_4b\n*choice\n  #\"I'd love to!\"\n    *set garce_isan %+10\n    *goto wants_to_join\n  *hide_reuse #\"Honestly, I'd rather remain a passenger.\"\n    \"We're not a transport ship, ${name},\" states Isan firmly.  \"Either you'll join us, or you won't.\"\n    *goto question_4b\n  #\"No way.\"\n    *set garce_isan %-10\n    *goto says_no\n\n*label wants_to_join\n*if garce_isan \u003c51\n  *set rank 3\n  Isan sits back and runs a hand through ${isan_his} hair. You bite down on your lip, determined not to give ${isan_him} any reason to say no.\n\n  \"Well, I appreciate your enthusiasm,\" ${isan_he} says at last, \"but I must admit I'm a little troubled by some parts of our conversation.\"  Isan gestures abstractly.  \"I'm sure you understand, ${name}, that, given the nature of our line of work, we have to be extra careful about who we accept and trust.\"\n\n  Isan taps ${isan_his} fingers together, and you force yourself to wait. \"Tell you what. We're currently on our way to Tuskin to unload some of our wares.  Let's leave things as they are and see how that goes?  With any luck, you'll officially be a part of the crew in no time.\"\n\n  You recognize the name Tuskin. It's a famous trade port, one you never dreamed you'd visit. You consider the offer, then nod. Things could definitely be worse.\n\n  Isan gets to ${isan_his} feet and approaches you.  \"Allow me,\" ${isan_he} says gallantly, reaching for your neck. You freeze, hoping you didn't just leave yourself open to attack. Isan's hands encircle your neck, then gently removes the slave collar.  \"I don't think you'll be needing this anymore.  I'm sorry we had to put it on you in the first place, but we can't be too careful in our line of work.  I hope you understand.\"\n\n  You stare at the collar, relieved to have it removed. But something inside warns you to keep quiet, insisting this is yet another test to see how well you hold up under pressure. So instead of shouting like you really want to, you raise your head high and put on your best \"so what?\" expression.\n\n  Isan takes a few steps back and assesses you. \"Well,\" ${isan_he} says, \"it looks like you're going to need some quarters.  I'll have Borion set you up. There's an all-hands meeting scheduled for tomorrow morning at 0930 hours. I'll be expecting you.\" You nod and move to leave when Isan calls after you.  \"Oh, and ${name}?  Welcome onboard.  I hope things work out.\"\n  *finish\n*else\n  *set rank 4\n  Isan grins.  \"I knew you'd say that,\" ${isan_he} says.  \"You were born a treasure hunter.\"\n\n  Isan gets to ${isan_his} feet and approaches you.  \"Allow me,\" ${isan_he} says gallantly, reaching for your neck. You freeze, hoping you didn't just leave yourself open to attack. Isan's hands encircle your neck, then gently removes the slave collar.  \"I don't think you'll be needing this anymore.  I'm sorry we had to put it on you in the first place, but we can't be too careful in our line of work.  I hope you understand.\"\n\n  You stare at the collar, relieved. But something inside warns you to keep quiet, insisting this is yet another test to see how well you hold up under pressure. So instead of shouting like you really want to, you raise your head high and put on your best \"so what?\" expression.\n\n  Isan takes a few steps back and assesses you. \"Well,\" ${isan_he} says, \"it looks like you're going to need some quarters.  I'll have Borion set you up.  There's an all-hands meeting scheduled for tomorrow morning at 0930 hours. I'll be expecting you.  From this point forward, you may consider yourself a junior member of this crew.\"  You nod and move to leave when Isan calls after you. \"Oh, and ${name}?  Hope you're ready, because now the real fun begins!\"\n  *finish\n*label says_no\n*set rank 2\n\"I'm sorry to hear that, ${name}.\" Isan pulls a small golden device out of a desk drawer and presses a button. A jolt of electricity rushes through your body, setting your muscles spasming. Twitching, you cry out in pain and fall back into your chair.\n\nWhen Isan gestures at you, you shrink away, still trembling. \"I don't know if you realize it,\" the captain says, \"but you have a slave collar around your neck, ${name}. I was hoping you'd cooperate, so I could remove the collar and rely on your word as your bond. But since you won't, the collar will ensure your obedience one way or another. From this point forward, consider yourself my slave.  If you behave, you'll be treated well.  If not, you'll become my prisoner. It's your choice.\n\n\"We have an all-hands meeting tomorrow at 0930 hours.  You will be there.  You will also assist us on our visit to Tuskin.  Borion will see to your accommodations.\" Isan glares at you. \"Now get out of my sight.\"\n*finish", "chapter_2a_intro": "*advertisement 1200\n*temp lied\n*set lied false\nCHAPTER 2 - SHIP OF THE DEAD\n\n*if rank = 2\n  You'd imagined your trip going any number of ways, from fame and fortune to dying of starvation on a faraway star. None of them included being taken captive on a treasure-hunting vessel. The crew barely speaks to you, you subsist on low-quality, tasteless food, and your bed is little more than a mass of lumps. But, you remind yourself, at least they feed you, and even a terrible mattress is preferable to being thrown out into space.\n\n  Like your bunkmate Borion, you're forced to wear that horrible, demeaning slave collar at all times. If you dare to defy orders given by Captain Isan or any of the other crew members, your punishment is immediate—a violent electrical shock that leaves your entire body aching for hours.\n\n  At least you've only been shocked once since your first day among the crew. The others might not like you, but as long as you follow your orders, they leave you alone.\n\n  Every morning, you attend a short all-hands meeting in which Captain Isan goes over the day's agenda. There's not as much for you to do as you'd expected, since everyone's focus is getting the [i]Lady Luck[/i] to the trade port Tuskin as quickly as possible. You'd love to use your free time to explore, but as a slave, of course you can't do that. Instead, you while away the hours with Borion in your tiny cabin. He still annoys you, but if nothing else, he's someone to talk to.\n  *goto discover_ship\n*else\n  You'd imagined your trip going any number of ways, from fame and fortune to dying of starvation on a faraway star, but the next several days onboard the [i]Lady Luck[/i] are surprisingly quiet. Though the crew starts out suspicious, they quickly warm to you when you make it clear you're here to learn and help however you can.\n\n  Every morning, you attend a short all-hands meeting in which Captain Isan goes over the daily agenda. There's not as much for you to do as you'd expected, since everyone's focused on getting the [i]Lady Luck[/i] to the trade port Tuskin as quickly as possible. You'd love to use your free time to explore, but you don't want to get in the crew's way. Instead, you while away the hours in the tiny cabin you share with Borion. He still annoys you, but you have to admit it's nice to have someone who hangs on your every word.\n  *goto discover_ship\n*label discover_ship\n\nAnd so the days pass, blending into one another…until your eighth day on the ship. You're forty-eight hours away from Tuskin when Taloo Dama, the ship's pilot, summons the crew to the operations center. She's discovered something directly in the [i]Lady Luck[/i]'s path.\n*page_break\n\"What is it?\" Captain Isan asks. Surrounded by the crew, ${isan_he} stares out the viewport on the front bulkhead. You smother a laugh; Taloo's taken on Isan's authoritarian guise. Better Isan than you! Edging closer, you see the viewport currently displays a small, derelict freighter with a design you don't recognize.\n*choice\n  #Tell the others you recognize the ship's design. (Lie.)\n    *set lied true\n    *set suspicion +5\n    *set duplicity_loyalty %-10\n    \"Really?\" asks Isan.  \"What is it?\"\n    *fake_choice\n      #\"A human science ship.\"\n      #\"A GPF security vessel.\"\n      #\"An organic space creature.\"\n      #\"The mythical ISS [i]Leviathan[/i].\"\n    \"Hmmm,\" says Isan. \"Thisi, can you confirm this?\"\n    *goto discover_ship_continued\n  #Tell the others you don't recognize the ship's design.\n    *set duplicity_loyalty %+10\n    \"Thanks for your input.\" Captain Isan sarcastically salutes before looking to ${isan_his} science officer.  \"Thisi, what do you make of it?\"\n\n    *goto discover_ship_continued\n  #Stay quiet.\n    \"Thisi,\" orders Captain Isan, \"run a scan. What is that ship?\"\n    \n    *goto discover_ship_continued\n*label discover_ship_continued\nThisi B'Artunt moves over to the science station and runs a scan. \"The ship appears to be a Vervoo transport vessel, Captain,\" ${thisi_he} says.\n*if lied = true\n  *set garce_isan %-10\n  Captain Isan glares at you, clearly seeing through your lie.\n  *goto discover_ship_continued_2\n*label discover_ship_continued_2\n\"Our computers identify it as [i]Andax Theta[/i], scheduled to have arrived on Tuskin four days ago.  There are no signs of life onboard.\"\n\nAll eyes dart toward Borion, who picks at his fingernails. His people are typically sold as slaves; a ship owned and crewed by Vervoo is almost unheard of.  You wonder what he makes of that.\n\n\"Any other ships in range, Rallix?\" asks the captain.\n\nThe insectoid tactical officer bends over a display console. \"No, Captain.\"\n\n\"Well,\" says Isan, \"I suppose it wouldn't hurt for us to take a look. Are there any objections?\"\n\nAgain, everyone stares at Borion. You wince; the poor guy looks like he'd rather be anywhere else.\n*choice\n  #\"I think it's a great plan, Captain!\"\n    *set duplicity_loyalty %+10\n    *set garce_isan %+20\n    Captain Isan rubs ${isan_his} forehead. \"I appreciate the support, ${name},\" ${isan_he} says, trying not to laugh.\n\n    *goto the_plan\n  #\"I object.\"\n    *set cowardice_bravery %+10\n    *if rank = 2\n      *set garce_isan %-10\n      Captain Isan glares at you. \"I don't remember asking you, slave.\" A second later, a electrical jolt surges from your collar, sending all your muscles into spasm. You whimper and clutch your neck.\n\n      *goto the_plan\n    *else\n      Captain Isan smirks at you. \"Is that so?\" ${isan_he} asks. \"Given that you're new here, ${name}, I understand your concern. But trust me; this kind of situation is exactly what we're here for.\"\n\n      *goto the_plan\n  #\"I think that Borion might object.\"\n    *set harsh_kind %+10\n    *if rank = 2\n      *set garce_isan %-10\n      Captain Isan glares at you. A second later, a electrical jolt surges from your collar, sending all your muscles into spasm. You whimper and clutch your neck. \"I think that Borion is more than capable of speaking for himself,\" says the captain. \"Wouldn't you agree, Borion?\"\n\n      Borion, as bruise purple as you've ever seen him, glances at you, then away, stammering, \"I-I'm actually okay w-with us going o-onboard, C-Captain.\"\n      \n      Isan smiles cruelly, ${isan_his} eyes never breaking contact with yours. \"There, you see? Borion doesn't need a mouthpiece.\"\n      \n      *goto the_plan\n    *else\n      Captain Isan flashes you a warm smile. \"I appreciate the concern, ${name}, but Borion is more than capable of speaking for himself.\" ${isan_he} turns to Borion. \"Do you have a problem with this mission, Borion?\"\n\n      Borion, as bruise purple as you've ever seen him, glances at you, then away, stammering, \"I-I'm actually okay w-with us going o-onboard, C-Captain.\"\n\n      Isan nods, pleased. \"There, you see?  It's fine.\"\n\n      *goto the_plan\n  #Remain silent.\n    *goto the_plan\n*label the_plan\nIsan claps ${isan_his} hands.  \"Good, looks like it's settled, then.  We'll take our shuttle and dock on board the Vervoo ship.  Maybe we'll find some goods to unload on Tuskin, maybe not. Either way, why not have a look?\"\n\nEveryone but Borion nods. \"Let's do it!\" growls Rallix.\n\n\"A quick survey of the vessel shows a locked vault onboard,\" notes Shelou Vili.\n\n\"Well, that's encouraging,\" murmurs Thisi. \n\n*if ((preference = \"men\") or (preference = \"women\"))\n\n  A prickle shoots up your spine at the sound of Thisi's voice, and you bite your lip. \n\nNext to you, Taloo nods her agreement.\n\n\"As long as the vault contains riches rather than worthless artifacts, that is,\" counters Rallix, eyeing Shelou Vili with open hatred.\n\n\"I…I w-would like to find out h-how they d-died,\" Borion whispers, almost to himself. \"If—if that's okay.\"\n\n\"And so we will, Borion,\" says Isan with a dramatic flourish to the crew. \"Hmm…a real ship of the dead. I don't know about the rest of you, but I can't wait to get inside.\"\n*choice\n  #\"Me, neither, Captain!\"\n    *set duplicity_loyalty %+10\n    *set garce_isan %+10\n    *set follower_leader %-10\n    *set harsh_kind %+10\n    *set cowardice_bravery %+10\n    Captain Isan grins.  \"I like the enthusiasm, ${name}. Okay, crew, time to come up with a plan.\"\n    *goto the_plan_continued\n  #\"As long as there's treasure, it'll be worthwhile.\"\n    *set duplicity_loyalty %+10\n    *set garce_isan %+10\n    *set harsh_kind %-10\n    Captain Isan scrutinizes your face. \"Spoken like a true treasure seeker,\" ${isan_he} says finally. \"Okay, everyone. Time to come up with a plan.\"\n    *goto the_plan_continued\n  #\"If we can figure out what happened to the crew, it'll be worth it.\"\n    *set harsh_kind %+10\n    *set garce_isan %-10\n    *set kraska_borion %+20\n    *set follower_leader %+10\n    Captain Isan gives you a searching look, then tells Borion, \"We'll do everything we can.\"  Isan turns to the rest of the crew.  \"Okay, everyone.  Time to come up with a plan.\"\n    *goto the_plan_continued\n  #\"This is going to end in disaster.\"\n    *set duplicity_loyalty %-10\n    *set garce_isan %-10\n    *set follower_leader %+10\n    *set harsh_kind %-10\n    *set cowardice_bravery %-10\n    Captain Isan glares at you. \"Not another word out of you,\" ${isan_he} says firmly.  Isan turns to the rest of the crew. \"Okay, everyone. Time to come up with a plan.\"\n    *goto the_plan_continued\n  #I remain silent.\n    *set follower_leader %-10\n    *set cowardice_bravery %-10\n    *set garce_isan %-10\n    Captain Isan is frustrated by your silence.  Isan turns to the rest of the crew. \"Okay, everyone. Time to come up with a plan.\"\n    *goto the_plan_continued\n*label the_plan_continued\n*page_break\nOver the next fifteen minutes, Captain Isan and security chief Rallix hash out the strategy for the mission. Taloo will remain onboard the [i]Lady Luck[/i] while the rest of the crew boards the Vervoo ship via a small shuttle port.\n\nOnce inside, everyone will make their way toward the vault that Shelou Vili detected in the center of the ship. Thisi will take scans to determine what happened to the ship's crew.  Borion will join the mission, both to serve as packhorse and to see for himself what happened.\n\n*if rank = 2\n  While Captain Isan has made it clear that ${isan_he} wants you to gain mission experience, ${isan_he} also doesn't trust you. ${isan_he} coldly informs you that you'll remain in Rallix's custody for the duration of the mission. You grit your teeth but know better than to protest.\n  *goto the_plan_continued_2\n*else\n  Captain Isan is as excited as a new parent for your first mission with the crew. Your job, ${isan_he} stresses, is to follow orders. Your doubt must show on your face, because ${isan_he} assures you everything will go exactly as planned.\n  *goto the_plan_continued_2\n*label the_plan_continued_2\n\nAfter the crew breaks into the vault, Shelou Vili will be in charge of quickly determining if any of the contents are worth taking. At that point, the crew will split up into two teams. Team A, comprised of Rallix, Thisi, and you, will proceed on to the ship's bridge and try to discover what happened to its passengers. Meanwhile, Team B, made up of the remaining crew, will transfer the valuables to the shuttle.\n\nCaptain Isan estimates that the mission will take less than an hour, claiming the potential for valuables onboard will more than make up for the time you're about to invest.\n\nAfter the captain lays everything out, you think that it's…\n*choice\n  #…a good plan.\n    *set duplicity_loyalty %+10\n    *set follower_leader %-10\n    *goto proceed\n  #…an average plan.\n    *goto proceed\n  #…a terrible plan.\n    *set duplicity_loyalty %-10\n    *set follower_leader %+10\n    *goto proceed\n*label proceed\nThe crew hurries to the cargo bay, where a small shuttle waits. You wonder about the enigmatic Kraska, who's also chosen to stay behind with Taloo Dama, then shrug. He's not your problem.\n*if rank > 2\n  *if follower_leader > 60\n    Confident, you lead the way, side by side with Isan.\n    *goto proceed_continued\n  *else\n    Still getting your bearings, you keep to the rear of the group.\n    *goto proceed_continued\n*else\n  Escorted by a suspicious Rallix, you follow the group as Isan leads the way toward the shuttle.\n  *goto proceed_continued\n*label proceed_continued\nWhen you arrive at the shuttle, you're handed a small cloth sack for collecting valuables. Everyone but
