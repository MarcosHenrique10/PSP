buy something you can afford, or are you just wasting my time?\"\n          *goto interested\n        *else\n          *set credits -50\n          *set pistol_charges +3\n          \"There you go. Thank you for your patronage. Would you like to buy something else?\"\n          *goto interested\n      #Ask about something else.\n        \"That item not for you? Let's talk about something else, then.\"\n        *goto interested\n  #Ask about HRDs.\n    \"HDR stands for 'Hacking Resonator Device.' With one of these babies, you can gain access to computer systems without needing to hack them manually. 25 credits.\"\n    *choice\n      #Buy.\n        *if credits \u003c 25\n          \"Hey, you trying to scam me? You don't have enough credits. Now are you going to buy something you can afford, or are you just wasting my time?\"\n          *goto interested\n        *else\n          *set credits -25\n          *set hrds +1\n          \"There you go. Thank you for your patronage. Would you like to buy something else?\"\n          *goto interested\n      #Ask about something else.\n        \"That item not for you? Let's talk about something else, then.\"\n        *goto interested\n  #Ask about personal shield rechargers.\n    \"Personal shield rechargers will take a hit for you so you don't get injured. Each shield can take one hit before dissipating, so it's a one-time-use kind of thing. 50 credits.\"\n    *choice\n      #Buy.\n        *if credits \u003c 50\n          \"Hey, you trying to scam me? You don't have enough credits. Now are you going to buy something you can afford, or are you just wasting my time?\"\n          *goto interested\n        *else\n          *set credits -50\n          *set psrs +1\n          \"There you go. Thank you for your patronage. Would you like to buy something else?\"\n          *goto interested\n      #Ask about something else.\n        \"That item not for you? Let's talk about something else, then.\"\n        *goto interested\n  #Ask about sonic lockpicks.\n    \"Sonic lockpicks help you to break into locked areas you shouldn't be in. What you do with them is your own business—just don't tell me about it. 25 credits.\"\n    *choice\n      #Buy.\n        *if credits \u003c 25\n          \"Hey, you trying to scam me? You don't have enough credits. Now are you going to buy something you can afford, or are you just wasting my time?\"\n          *goto interested\n        *else\n          *set credits -25\n          *set lockpicks +1\n          \"There you go. Thank you for your patronage. Would you like to buy something else?\"\n          *goto interested\n      #Ask about something else.\n        \"That item not for you? Let's talk about something else, then.\"\n        *goto interested\n  #Finish buying items.\n    \"Thank you and come again!\"\n    *finish Continue exploring Tuskin.", "chapter_3c_outro": "Captain Isan leads you off the ship and back toward the crowded streets of Tuskin.\n*if rank \u003c 3\n  You walk several steps in front of Isan, who refuses to let you out of ${isan_his} sight. ${isan_his}'s not about to let you get lost a second time. Though ${isan_he} might've revealed a dark secret to you, it's obvious Isan still doesn't fully trust you.\n  *goto walk_continued\n*else\n  You walk side by side with Isan, chatting easily. Now that you know ${isan_his} dark secret, it almost feels like you're friends.\n  *goto walk_continued\n*label walk_continued\nSoon you enter the main streets and continue down the path toward a small tavern, probably the one most of the crew was headed to earlier. \"In here,\" says Isan, opening the door.  The two of you step inside.\n\nThe entire crew's crowded around a long bar, even the enigmatic Kraska. Borion is bruise purple and guffawing much too loudly. Thisi laughs with him, clearly enjoying the looks and attention the other patrons send ${thisi_his} way. Taloo's as flushed as Borion, but her body's tense, hunched defensively over her stool. Ignoring his crewmates, Shelou Vili has his head deep in a book, while Rallix sits at the end of the bar with a shot of something dark in its pincers.\n\n*if rank \u003c 3\n  Isan looks over at Rallix. \"I found something you lost.\"\n  \n  \"My fault, captain,\" Rallix growls. \"I got caught up in meeting an old friend.\" It glares at you. \"It won't happen again.\"\n  \n  *if has_stolen_treasure_ship = true\n    Isan frowns, and you can tell from ${isan_his} face that ${isan_his} mood's still in the gutter. \"I'll let it go this time, Rallix,\" ${isan_he} says, \"but don't make that mistake again.  Now gather around, everyone.  I have news.\"\n    *goto news\n  *elseif told_isan_about_garce = true\n    Isan frowns. \"I'll let it go this time, Rallix,\" he says, \"but don't make that mistake again. Now gather around, everyone. I have news.\"\n    *goto news\n  *else\n    Isan chuckles, and you can tell from ${isan_his} bright face that ${isan_he}'s in a great mood. \"I'll let it go this time, Rallix.  Now gather around, everyone.  I have news.\"\n    *goto news\n*else\n  Isan smiles at ${isan_his} crew. \"I found something you all lost,\" ${isan_he} says.\n\n  The crew looks over at you.\n  *if rallix_shelou \u003c 50\n    Rallix raises his drink to you in salute.\n    *goto thisi_taloo_reaction\n  *else\n    Shelou Vili bows his head toward you respectfully.\n    *goto thisi_taloo_reaction\n  *label thisi_taloo_reaction\n  *if thisi_taloo \u003c 50\n    Thisi winks at you playfully.\n    *goto borion_reaction\n  *else\n    Taloo's eyes light up, and she smiles nervously.\n    *goto borion_reaction\n  *label borion_reaction\n  Borion breaks into a huge smile. \"Hey, ${name}!\" he says. \"I th-thought we'd lost you!\"\n\n  Isan chuckles, and you can tell from ${isan_his} bright face that ${isan_he}'s in a great mood.  \"Next time, let's remember to keep an eye on our newest crew member, shall we?  In any case, gather around, everyone.  I have news.\"\n  *goto news\n*label news\n\nThe crew forms a circle around the captain.  You notice Kraska glides soundlessly to the wall behind Isan. Interesting, you think.\n\n\"All right,\" says the captain. \"First, I've managed to sell all of our goods, and for a better price than Shelou Vili estimated.\"  While the rest of the crew claps and cheers, the Aviark researcher nods humbly.\n\n\"Next,\" continues Isan once the noise has quieted down, \"I've found us a new mission.  Now I know some of you may have been skeptical about my appointment of Kraska to the crew…\"  Isan gestures toward the Shadow Fiend visible along the floor and wall.  \"…but now it'll all make sense. Kraska?\"\n\nThe Shadow Fiend slithers into a central position. You're sure you see a dark smile on his face. \"Thank you, esteemed captain,\" he rasps.  \"My fellow crew, you stand upon the brink of an irresistible new opportunity.  I, the great Kraska, will lead you to the abandoned planet Jeeq, former home of my people.\"\n\n\"An anonymous employer has hired us to retrieve an ancient crown said to be hidden there,\" clarifies Isan.\n\n\"It is a great honor,\" continues Kraska. \"Few not of my kind are ever…allowed…to step foot on the planet.  Once we find this crown, you will all be rewarded handsomely.\"  Kraska's smile deepens.  \"By your employer, of course.\"\n\n\"For most ships, Jeeq is a six-day journey.  For us,\" says Isan, glancing over at you cautiously, \"it's three. So live it up, my friends.  Tomorrow we'll prepare for this mission, but tonight, we celebrate.  So eat, drink, and be merry.\"\n\n\"Hear, hear!\" shouts Thisi. Delighted smiles on their lips, the crew members raise their glasses in celebration.\n\n*if rank \u003c 3\n  \"Hear, hear,\" replies Isan quietly, eyeing you suspiciously. You fold your arms across your chest and look away.\n  *goto wrap_up\n*else\n  \"Hear, hear,\" replies Isan quietly, giving you a nod of acknowledgment.\n  *goto wrap_up\n*label wrap_up\n\nYou spend the rest of the night…\n*choice\n  *selectable_if (rank > 2) #…socializing with the entire crew.\n    *set duplicity_loyalty %+20\n    The hours pass in a blink of eye and more drinks than you can count. You return to the ship on teetering legs and fall asleep before you hit the bed.\n    *finish\n  #…drinking alone.\n    *set duplicity_loyalty %-20\n    You grudgingly nurse a drink, wishing you could just turn your back on the crew. The hours pass slowly, and you're not allowed to return to the ship until after sunup. Once you finally reach your bed, you gratefully fall onto it.\n    *finish\n  #…catching up with Borion.\n    You spend the night talking and drinking with Borion. Intoxicated, the Vervoo slave stammers much less and comes off a lot more confident. You take that as a sign and encourage him to tell you more about his family and his past. Pleased, he churns out story after story in great detail. By the time the two of you return to the ship, all smiles and teetering legs, you definitely know your cabinmate much better.\n    *finish\n  *if (((thisi_taloo \u003c 50) and ((preference = \"men\") or (preference = \"women\"))) and (killed_rekelians))\n    #…spending some quiet time with Thisi, and getting rid of the tension in the relationship.\n      *set thisi_taloo %-20\n      You finally have the chance to spend time alone with Thisi, and you take it. It's a long night, full of complicated discussions, but by the end of it, you feel that you've worked through some of the tension that Thisi has been sending your way since you caused the Rekelians' deaths. By the end of the night, Thisi is telling you funny stories again, and before you know it, the sun is rising.\n      *finish\n  *if (((thisi_taloo \u003c 50) and ((preference = \"men\") or (preference = \"women\"))) and (killed_rekelians != true)) \n    #…spending some quiet time with Thisi.\n      *set thisi_taloo %-20\n      You finally have the chance to spend time alone with Thisi, and you take it. The Nyarri, you quickly learn, is full of insight and funny stories, and ${thisi_he}'s even smarter than you realized. Before you know it, the sun's rising, and the two of you reluctantly return to the ship and part ways.\n      *finish\n  *if (thisi_taloo > 49) #…spending some quiet time with Taloo.\n    *set thisi_taloo %+20\n    You finally have the chance to spend time alone with Taloo, and you take it. You're determined to find a way to chat with the shy A'Morpha—not an easy task, given that she can't talk back—and after fits and false starts, a connection blooms between the two of you. Taloo playfully changes her appearance every few minutes, and inspired, you challenge her to a drinking game based on how fast she can do it. Before you know it, the sun's rising, and the two of you reluctantly return to the ship on teetering legs.\n    *finish\n  *if (rallix_shelou \u003c 50) #…exchanging stories with Rallix.\n    *set rallix_shelou %-20\n    You decide now's as good as time as any to figure out what makes Rallix tick, so you invite it to tell you more about its home. The Nixian security officer is only too happy to share anecdotes of the Great Antiviron War, which was supposedly blessed by its Queen. To your surprise, Rallix is a gifted storyteller. In return for the entertainment, you buy a few rounds of drinks, and before you know it, the sun's rising. You return to the ship on teetering legs and fall asleep before you hit the bed.\n    *finish\n  *if (rallix_shelou > 49) #…exchanging stories with Shelou Vili.\n    *set rallix_shelou %+20\n    You decide to spend your time talking with Shelou Vili. The dignified Aviark takes pride in telling you about his tribe, people, and culture. It's much more interesting than you would've guessed, and the hours pass before you know it. You return to the ship on teetering legs and fall asleep before you hit the bed.\n    *finish\n  *if ((garce_isan > 49) and (rank > 2)) #…sitting quietly with Captain Isan in respect.\n    *set garce_isan %+20\n    After everything ${isan_he} told you earlier, you can't help but think about Thela, and ${thela_his} current predicament. You sit quietly with Isan, the two of you watching as the rest of the crew celebrates raucously. When the sun rises, you return to the ship, where you gratefully fall onto your bed.\n    *finish", "chapter_4a_intro": "*advertisement 1200\n*temp comp1\n*temp comp1_score\n*temp comp2\n*temp comp2_score\n*if thisi_taloo \u003c 50\n  *set comp1 \"Thisi\"\n  *set comp1_score 100 - thisi_taloo\n  *goto config_1\n*else\n  *set comp1 \"Taloo\"\n  *set comp1_score thisi_taloo\n  *goto config_1\n*label config_1\n*if rallix_shelou \u003c 50\n  *set comp2 \"Rallix\"\n  *set comp2_score 100 - rallix_shelou\n  *goto config_2\n*else\n  *set comp2 \"Shelou\"\n  *set comp2_score rallix_shelou\n  *goto config_2\n*label config_2\n*if comp1_score >= comp2_score\n  *set friend comp1\n  *goto start\n*else\n  *set friend comp2\n  *goto start\n\n*label start\nCHAPTER 4 - THE FIRES OF JEEQ\n\nThe [i]Lady Luck[/i] departs from Tuskin the next morning, at which time Captain Isan orders Taloo Dama to set course for Jeeq. As the ship gets underway, you remember Thela and the role ${thela_he} plays in the ship's daily operations. Strapped to a computer system while sleeping in a tank full of water, Thela's stuck between life and death. It makes you feel…\n*choice\n  #…sadness.\n    *set harsh_kind %+10\n    Thela's circumstances fill you with remorse. You hope that something can be done for ${thela_him}…if not to cure ${thela_him}, then at least to free ${thela_him} from ${thela_his} current captivity.\n    *goto intro\n  #…amusement.\n    *set harsh_kind %-20\n    You find Thela's situation funny. At least the [i]Lady Luck[/i] benefits, you think, traveling at that amazing speed.\n    *goto intro\n  #…gratitude.\n    *set harsh_kind %+10\n    You're grateful to Thela and proud of the sacrifice ${thela_he} made for the ship. Thanks to ${thela_him}, the [i]Lady Luck[/i]'s speed is unmatched.\n    *goto intro\n  #…indifference.\n    *set cowardice_bravery %-10\n    You don't care one way or another. You never knew Thela, and you barely know Captain Isan. It's sad, but it really isn't your business.\n    *goto intro\n  #…scorn.\n    *set harsh_kind %-10\n    You're angry, both at Thela's situation and Isan's part in it. In your opinion, there has to be a better way.\n    *goto intro\n\n*label intro\n*page_break\nThe journey to the former home of the Shadow Fiend Empire is quick and quiet.\n*if rank \u003c 3\n  You spend most of your time with Borion. He's the only member of the crew who doesn't mind being seen with you, given your current rank on the ship.\n  *goto intro_continued\n*else\n  You spend most of your time with ${friend}. The two of you quickly grow closer. Though it's hard to believe, you've made a friend!\n  *goto intro_continued\n*label intro_continued\nYou arrive at the planet shortly before dawn, local time.  Captain Isan gathers the entire crew into ops for the usual pre-mission briefing. The mood is tense, much more than before the Vervoo ship mission. All eyes are on Kraska, whose shadowy form stands next to the captain.\n\n\"Welcome to Jeeq,\" says Isan, making eye contact with every member of the crew. \"As you all know, an anonymous buyer has requested that we retrieve an artifact from this world, an ancient crown crafted by the Shadow Fiends. It's said to be hidden somewhere in the Caves of Pothkal, near our intended landing site. But first, I'd like all of you to learn a little more about what we'll be facing on the planet. Kraska?\"\n\nKraska's shadow glides forward.  \"Thank you, esteemed Captain,\" he says.  \"Fellow crew, welcome to my former home.  Jeeq is a volcanic world, filled with fire, ash, and rock.  Its volatile nature is what drove my people to leave, and Jeeq has remained abandoned ever since. Few souls are brave—or stupid enough—to enter. There is a complex system of underground caverns near the landing site I've chosen, which will lead us to the crown.\n\n\"But be warned. Many traps lie between us and our goal, the dangers of which are unknown even to me.\" Kraska glides closer to the crew.  \"We must tread carefully, my friends.\"\n\n\"Borion and Kraska will scout ahead,\" says Isan, picking up where Kraska left off. \"The rest of you, explore the planet carefully. We want to find the crown, but our safety comes first, always. Now, any questions or comments?\"\n*label questions\n*choice\n  *selectable_if (rank = 5) #Suggest a coordinated plan. (SENIOR CREW MEMBER.)\n    *set duplicity_loyalty %+20\n    *set follower_leader %+20\n    You propose a three-pronged method to cut down on search time while simultaneously increasing efficiency.  Isan already said that Borion and Kraska will be scouting ahead; you look at your four other companions, and consider with whom you'd like to be paired.  Between them, there are really only two that you can say you'd like to spend any time with.\n    *choice\n      #$!{comp1}.\n        *set teammate comp1\n        *goto senior_crew_teammate_choice_made\n      #$!{comp2}.\n        *set teammate comp2\n        *goto senior_crew_teammate_choice_made\n    *label senior_crew_teammate_choice_made\n    Yes, $!{teammate} would make an excellent companion.  Apparently, Isan agrees:  \"Well done, ${name},\" ${isan_he} says, impressed. You grin. \"It's a good plan. Let's go with it.\"\n    *goto start_mission\n  *hide_reuse #\"What should I do?\"\n    *if rank \u003c 3\n      Isan looks at you. \"You will work alongside Rallix. Obey all instructions to the letter. If you find the crown, report back to me. Resist and face the consequences.  Is there anything else?\"\n      *goto questions\n    *else\n      Isan looks at you. \"${friend} and you seem to work well together, so I want you to search for the crown as a team. Stay together. If you find the crown, report back to me. Is there anything else?\"\n      *goto questions\n  *hide_reuse #\"How do you know we can trust Kraska?\"\n    Kraska glides toward you forcefully.  \"Why, you ignorant, impudent wretch!  I should—\"\n\n    Isan holds up a hand, causing Kraska to back down. \"Kraska, will you wait outside?\"\n\n    Kraska glares at Isan for a moment before drifting away through the wall. Isan looks carefully at everyone in the room.  \"We need Kraska right now,\" ${isan_he} says, ${isan_his} voice low and calm. \"There's no way we'll survive our mission on Jeeq without him.\"  Isan sighs.  \"I knew this mission was coming,\" ${isan_he} explains.  \"It's why I welcomed Kraska onboard.  I know many of you don't trust him, but we can't do this without him.  So if you can't trust him, trust me.\"  Isan nods assuredly at you.  \"This will work out.  You'll see.  Now, is there anything else?\"\n    *goto questions\n  #Say nothing.\n    *set follower_leader %-10\n    *goto start_mission\n  *selectable_if (rank = 1) #Refuse to go along with the plan. (PRISONER.)\n    *set follower_leader %+20\n    *set duplicity_loyalty %-20\n    *set cowardice_bravery %+20\n    Rallix charges forward, but Isan holds up a hand, causing Rallix to freeze. The captain moves slowly, menacingly, toward you, and you take a step backward. \"Your cooperation is mandatory,\" ${isan_he} says through ${isan_his}  teeth. \"Refuse all you want. Your collar will ensure your obedience.\"\n    *goto start_mission\n\n*label start_mission\n\nIsan eyes the room carefully. \"All right,\" ${isan_he} finally says. \"I think it's about time we got started, don't you?  Let's find this crown and make ourselves some money.\"  The crew nods, and the meeting adjourns.\n*page_break\nEighteen minutes later, the [i]Lady Luck[/i] lands atop a large cliff. Though you knew the planet would be hot, the dry heat bombarding you as you depart the vessel almost brings you to your knees. A blazing sun, twice the size of Earth's, casts sharp, dark shadows across the planet. Somewhere, lava bubbles, and wind blows. The sounds make you shiver; combined, they could be whispers in the distance.\n\nOnce Kraska disembarks, he immediately glides away down the path, Borion trailing behind.\n\n*if rank \u003c 3\n  *set teammate \"Rallix\"\n  \"Okay, everyone,\" says Isan as the final crew member, Taloo, departs the ship. \"Let's get to work.\" The crew, save Rallix—who doesn't leave your side, eyeing you like you're a dog on a leash—head off to their designated positions.\n\n  \"Let the hunt begin,\" growls Rallix.\n  *finish Continue\n*elseif teammate != \"none\"\n  \"Okay, everyone,\" says Isan as the final crew member, Taloo, departs the ship.  \"Let's get to work.\"  The crew, save Rallix–who doesn't leave your side, eyeing you like you're a dog on a leash–head off to their designated positions.\n\n  \"Let the hunt begin,\" says $!{teammate}.\n  *finish Continue\n*else\n  *set teammate friend\n  \"Okay, everyone,\" says Isan as the final crew member, Taloo, departs the ship. \"Let's get to work.\" The crew, save Rallix—who doesn't leave your side, eyeing you like you're a dog on a leash—head off to their designated positions.\n\n  \"Let the hunt begin,\" says ${friend}.\n  *finish Continue", "chapter_4b_jeeq": "*temp found_machine\n*set found_machine false\n*temp found_bridge\n*set found_bridge false\n*temp lowered_bridge\n*set lowered_bridge false\n*temp found_plants\n*set found_plants false\n*temp found_body\n*set found_body false\n*temp found_cave_entrance\n*set found_cave_entrance false\n*temp found_dead_end\n*set found_dead_end false\n*temp mission_step\n*set mission_step 1\n*temp accessed_computer\n*set accessed_computer false\n*temp bridge_trap_hit\n*set bridge_trap_hit false\n*temp approached_kraska_stealth\n*set approached_kraska_stealth false\n*temp spotted_kraska\n*set spotted_kraska false\n*temp entered_cave\n*set entered_cave false\n*temp stepped_depression\n*set stepped_depression false\n*temp success_chance\n*set success_chance 0\n\n*temp tank\n*set tank 0\n*temp container\n*set container 0\n*temp saw_screen\n*set saw_screen false\n*temp solved_puzzle\n*set solved_puzzle false\n\n*temp taloo_adjust\n*set taloo_adjust false\n*temp thisi_adjust\n*set thisi_adjust false\n*temp shelou_adjust\n*set shelou_adjust false\n*temp rallix_adjust\n*set rallix_adjust false\n\n*temp glyph_1\n*temp glyph_2\n*temp glyph_3\n*set glyph_1 5\n*set glyph_2 1\n*set glyph_3 0\n\n\n\n*comment -----LANDING SITE-----\n\n*label landing_site\nTrying not to melt in the planet's immense heat, you inspect the [i]Lady Luck[/i]'s landing site amid a number of rocks as tall as hills. Massive fires crackle all around the rocks, leaping up from the lava flowing below. If only you could just reboard the familiar ship and bask in the cool air there, you think. All you'd have to do is run up the short ramp leading to the door.\n\n*if (teammate != \"Taloo\")\n  Taloo Dama stands a couple feet away, unable to tear her eyes from the bubbling streams of lava. Her face—currently Captain Isan's—is pinched in fear. You sympathize completely. No wonder the Shadow Fiend Empire left. \n\n  *goto landing_site_continued\n*label landing_site_continued\nA set of steps jut out of the southwest-facing rocks. You study the staircase but can't tell if it's a natural formation or handcrafted. To add to your confusion, you stand before a fork in the rocks, with paths leading both northwest and northeast.\n\n${teammate} glances at you, clearly waiting for you to decide what to do next.\n*label landing_site_choice\n*choice\n  *if (teammate != \"Taloo\") #Talk to Taloo.\n    You walk up to Taloo and greet her.\n    *if thisi_taloo \u003c 40\n      Taloo frowns and turns her back on you.\n      *goto taloo_talk\n    *elseif thisi_taloo > 60\n      Taloo smiles at you warmly. With a quick \"pop,\" she transforms into your double.\n      *goto taloo_talk\n    *else\n      Taloo nods indifferently.\n      *goto taloo_talk\n    *label taloo_talk\n    *choice\n      *hide_reuse #\"What are you doing here, Taloo? Shouldn't you be searching around?\"\n        Taloo gestures at the scenery, her meaning clear. She's taking in the sights and sounds of this fiery world.\n        *goto taloo_talk\n      *hide_reuse #\"Do you have any ideas where the crown might be?\"\n        Taloo shrugs.\n        *goto taloo_talk\n      *if ((thisi_taloo \u003c 40) and (taloo_adjust = false)) #\"I'm sorry I haven't been very nice to you, Taloo.\"\n        *set taloo_adjust true\n        *set thisi_taloo %+30\n        *set harsh_kind %+20\n        Taloo ducks her head, clearly embarrassed. A few seconds later, she smiles at your shoes. You wryly assume all is forgiven.\n        *goto taloo_talk\n      *if ((thisi_taloo > 60) and (taloo_adjust = false)) #\"You know, you're really starting to get on my nerves, Taloo.\"\n        *set taloo_adjust true\n        *set thisi_taloo %-30\n        *set harsh_kind %-20\n        Taloo's eyes widen in shock. Her arms cross protectively over her chest, and she turns her back on you.\n        *goto taloo_talk\n      #\"I'm going to continue exploring now, Taloo.\"\n        Taloo nods goodbye.\n        *goto landing_site_choice\n  #Go up the southwest-facing staircase.\n    *goto cliff\n  #Follow the path northwest.\n    *goto plants\n  #Follow the path northeast.\n    *goto machine\n  *hide_reuse #Talk to ${teammate}.\n    *if ((teammate = \"Thisi\") and ((preference = \"men\") or (preference = \"women\")))\n      *set thisi_taloo %-10\n      Thisi glances up at you with a sidelong smile that makes your heart skip a beat. \"It's nice to finally have some time alone, isn't it, ${name}?\" ${thisi_he} murmurs. \"What do you say we try to find this crown?\"\n      *goto landing_site_choice\n    *elseif ((teammate = \"Thisi\") and (preference = \"neither\"))\n      *set thisi_taloo %-10\n      Thisi glances up at you with a sidelong smile. \"Exciting place, isn't it? What do you say we try to find this crown?\"\n      *goto landing_site_choice\n    *elseif teammate = \"Taloo\"\n      *set thisi_taloo %+10\n      Taloo takes on your own form, gesturing at the world before you. You get her meaning loud and clear: she wants to explore.\n      *goto landing_site_choice\n    *elseif teammate = \"Shelou\"\n      *set rallix_shelou %+10\n      Shelou Vili inclines his head. \"A methodical sweep of this location would prove most efficient,\" he says. \"It is my honor to be working with you on this mission, ${name}.\"\n      *goto landing_site_choice\n    *else\n      *if rank \u003c 3\n        Rallix snorts. \"Stop wasting my time,\" it says, \"and start searching for the crown.\" To make its point, Rallix presses a small button in its hand. A jolt of electricity rushes through your body, setting your hair on end. You yelp in pain.\n        *goto landing_site_choice\n      *else\n        *set rallix_shelou %-10\n        Rallix clicks its mandibles. \"Now this is my kind of place,\" it says, holding up its forelegs to catch the broiling rays of sun. \"But we should find that crown, ${name}. Let's get moving.\"\n        *goto landing_site_choice\n  *hide_reuse #Board the [i]Lady Luck[/i].\n    *if teammate = \"Taloo\"\n      Taloo shakes her head furiously. She won't let you reboard the ship until you find the crown.\n      *goto landing_site_choice\n    *else\n      \"We can't board the ship yet, ${name},\" says ${teammate}. \"We have to find the crown first.\"\n      *goto landing_site_choice\n\n\n\n*comment -----CLIFF-----\n\n*label cliff\nYou climb the stairs and arrive on a small cliff overlooking a gargantuan volcano. Smoke rises threateningly from its mouth. There are no guardrails, and your head spins at how easy it would be to slip and fall into the magma below. Captain Isan stands at the edge of the cliff, hands folded as ${isan_he} gazes at the volcano.\n\nThe steps lead back down northeast toward the landing zone.\n\n${teammate} follows you up the steps.\n*label cliff_choice\n*choice\n  #Talk to Captain Isan.\n    Without turning to face you, Isan says, \"Yes, ${name}?\"\n    *label isan_choice\n    *choice\n      *hide_reuse *selectable_if (took_garce_offer = true) #Attempt to plant the tracking device on Captain Isan.\n        This is the perfect opportunity to plant Garce's device on the captain. You move close to ${isan_him} and wait. As soon as ${teammate} looks away, you pull out the small device.\n        *if cowardice_bravery > 75\n          *set planted_device true\n          *set duplicity_loyalty %-20\n          *set garce_isan %-20\n          *set follower_leader %+10\n          *set cowardice_bravery %+10\n          *set suspicion +5\n          A thrill rushes over you as you confidently press the device onto Isan's back, activating it. In a mock display of camaraderie, you let your hand linger on Isan's back. $!{isan_he} turns to face you but says nothing. Smiling, you step back.\n          *goto isan_choice\n        *elseif cowardice_bravery \u003c 25\n          *set duplicity_loyalty %-10\n          *set cowardice_bravery %+10\n          *set follower_leader %+10\n          You begin to shake as you near the captain. You can't do this, you think. A few seconds later, ${teammate} looks your way. Discouraged, you pretend to be captivated by the view.\n          *goto isan_choice\n        *else\n          *if follower_leader > 60\n            *set planted_device true\n            *set duplicity_loyalty %-20\n            *set garce_isan %-20\n            *set follower_leader %+10\n            *set cowardice_bravery %+10\n            *set suspicion +5\n            You may not be the bravest person, but you can do what needs to be done, and you're not about to pass up this opportunity. You confidently press the device onto Isan's back, activating it. In a mock display of camaraderie, you let your hand linger on Isan's back. $!{isan_he} turns to face you but says nothing. Smiling, you step back.\n            *goto isan_choice\n          *else\n            *set duplicity_loyalty %-10\n            *set cowardice_bravery %+10\n            *set follower_leader %+10\n            While you're no coward, you begin to shake as you near the captain. You can't do this, you think. A few seconds later, ${teammate} looks your way. Discouraged, you pretend to be captivated by the view.\n            *goto isan_choice\n      *hide_reuse *if (found_dead_end = true) #\"There's a dead end in a cave. I'm not sure where else to go.\"\n        \"Are you sure it's a dead end?\" asks Isan skeptically.\n        *goto isan_choice\n      *hide_reuse *if (found_body = true) #\"$!{Isan_sir}…Borion is dead.\"\n        \"What?!\" exclaims Isan, whirling around. You explain the details of your gruesome discovery. As you speak, Isan's eyes redden. The captain's reaction…\n        *choice\n          #…surprises you. Who'd have thought ${isan_he} actually cared about Borion?\n            *set garce_isan %-10\n            *goto isan_borion\n          #…comforts you. You always knew ${isan_he} cared about Borion.\n            *set garce_isan %+10\n            *set harsh_kind %+10\n            *goto isan_borion\n          #…disgusts you. A slave isn't worthy of this kind of emotion.\n            *set harsh_kind %-20\n            *goto isan_borion\n        *label isan_borion\n        When you finish telling Isan what happened, the captain looks down and asks, voice hoarse, \"And Kraska?  Did you see him?\"\n\n        *if teammate = \"Taloo\"\n          Taloo shakes her bowed head, saving you from having to answer. Tears roll down her face, which mimics yours.\n          *goto isan_borion_cont\n        *else\n          \"No,\" answers ${teammate}, saving you from having to answer. \"He disappeared into a cave. No one's seen him since.\"\n          *goto isan_borion_cont\n        *label isan_borion_cont\n\n        Isan appears stunned. \"I'm…I don't know what to say. I can't believe this happened. How—?\"  Isan nods, then shakes ${isan_his} head. You wish you knew what to say.\n\n        The captain looks out at the volcano once more. \"Thank you for telling me. Don't worry about informing the others; I'll do that.\" \n        *goto isan_choice\n      *hide_reuse *if ((lowered_bridge = true) and (mission_step \u003c 4)) #\"I've managed to lower the bridge.\"\n        \"Good,\" states Isan. \"But then why are you just standing here?  Go cross it and see what's on the other side.\"\n        *goto isan_choice\n      *hide_reuse *if ((found_bridge = true) and (lowered_bridge = false)) #\"There's a bridge connecting this side of the path to the other, but I can't figure out how to lower it.\"\n        \"You need to lower that bridge,\" insists Isan.  \"I've been in contact with Kraska. Borion and he managed to find another way across, but Kraska insists that the rest of us aren't agile enough to follow the same route. The only way to proceed is over the bridge. As to how to lower it, look around. There must be some sort of mechanism nearby.\"\n        *goto isan_choice\n      *hide_reuse *if ((found_machine = true) and (mission_step \u003c 3)) #\"There's a weird alien machine along one cliff.  I think it's operational.\"\n        *if teammate = \"Shelou\"\n          \"It appears to be a Shadow Fiend device, perhaps designed to operate bridge functionality,\" adds Shelou Vili in a calm, sure tone.\n\n          *goto isan_machine\n        *label isan_machine\n        \"Hmm,\" says Isan, closing ${isan_his} eyes in thought. \"Maybe we can use it to our advantage somehow.  Do you think you'll be able to figure out how to operate it?\"\n        *choice\n          *selectable_if (specialization = \"science\") #\"Yes, absolutely.\" (SCIENCE)\n            \"Wonderful!\" exclaims Isan. \"Then do it. Every step we take gets us one step closer to finding that crown.\"\n            *goto isan_choice\n          #\"Maybe. It couldn't hurt to try.\"\n            \"Please do,\" says Isan.  \"Every step we take gets us one step closer to finding that crown.\"\n            *goto isan_choice\n          #\"Probably not, ${Isan_sir}.\"\n            Isan's nostrils flare. \"We need to find this crown, ${name}. Use every skill at your disposal to do so.  Stretch your limits.\"\n            *goto isan_choice\n      *hide_reuse *if ((found_plants = true) and (mission_step \u003c 3)) #\"I've found some weird plants along the edge of the cliff.\"\n        *if teammate = \"Thisi\"\n          \"Yes,\" chirps Thisi, \"and they're amazing! I've never seen anything like them.\"\n\n          \"Maybe you should take a sample of them, then, for later analysis,\" suggests Captain Isan.\n\n          \"Already done,\" replies Thisi, smiling. \"I can't wait to research them once we return to the ship.\"\n\n          \"Do you think they're valuable?\"\n\n          Thisi frowns, surprised. \"Probably not, Captain.\"\n\n          \"Then research them on your own time,\" Isan snaps. Thisi pouts, and Isan turns back to you.\n          *goto isan_choice\n        *else\n          \"I'm sure Thisi is very happy about that,\" muses Isan. \"Do you think the plants are valuable?\"\n          *choice\n            #\"They might be.\"\n              \"I'll make sure to have Thisi collect some, then, to research later.\"\n              *goto isan_choice\n            #\"I'm not sure.\"\n              \"I'll make sure to have Thisi collect some, then, to research later and find out.\"\n              *goto isan_choice\n            #\"Probably not.\"\n              \"Then don't waste my time talking about them,\" Isan snaps. \"Focus on the mission at hand.\"\n              *goto isan_choice\n      *hide_reuse #\"What am I supposed to do again?\"\n        *set garce_isan %-10\n        Isan rolls ${isan_his} eyes. \"Find the hidden crown. It's somewhere on this rock, and it's priceless. An anonymous buyer is willing to pay handsomely for it.\"\n        *goto isan_choice\n      *hide_reuse #\"Tell me about the crown we're looking for.\"\n        The captain's eyes narrow.  \"According to Kraska, the crown's a relic sacred to his people, but it doesn't actually have a name. Beyond that, all I know is the thing's priceless. We find it, and we'll make more money than we've seen in years.\"\n        *goto isan_choice\n      *hide_reuse #\"Can you tell me anything else about this world?\"\n        \"Not much,\" replies Isan, \"beyond what Kraska already said. We've landed on the holy site of Tutara, near where the crown is said to be hidden. As you can tell, it's hot here, and to make it even more fun, the place is booby trapped. I'd like to get out of here as quickly as possible, so hurry up and find that crown.\"\n        *goto isan_choice\n      *hide_reuse #\"How's the search going for the others?\"\n        \"They've been checking in periodically,\" answers Isan. \"So far, no dice. Keep looking. Every second you spend here is one second longer we're stuck on this hunk of burning rock.\"\n        *goto isan_choice\n      #\"I haven't found the crown yet, but I'm going to keep searching.\"\n        Isan nods almost imperceptibly and returns to ${isan_his} thoughts.\n        *goto cliff_choice\n  #Take the southeast stairs back to the landing zone.\n    *goto landing_site\n\n\n\n*comment -----PLANTS-----\n\n*label plants\n*set found_plants true\nYou enter a small clearing off the stone path. Sparse yellow grass and green mold cover the burning ground. Several alien-looking plants cluster together, dark green and waving in the wind. You shy away when you realize their flowing stalks are actually long tendrils. Could they be dangerous?\n\n*if teammate != \"Thisi\"\n  Thisi bends over the plants, a dreamy smile on ${thisi_his} face and a scanner in ${thisi_his} small hand.\n\n  *goto plants_continued\n*label plants_continued\nThe path continues both to the northeast and southeast.\n\n${teammate} stands next to you, eyeing the plants suspiciously.\n*label plants_choice\n*choice\n  *if (teammate != \"Thisi\") #Talk to Thisi.\n    You greet Thisi.\n    *if thisi_taloo > 60\n      Thisi sniffs. \"Not exactly the person I'd hoped to see.\"\n      *goto thisi_talk\n    *elseif ((thisi_taloo \u003c 40) and (preference = \"neither\"))\n      \"These plants are amazing, ${name}!\" she exclaims. \"Don't you think?\"\n      *goto thisi_talk\n    *elseif ((preference = \"men\") or (preference = \"women\"))\n      \"Hey there, cutie,\" ${thisi_he} says, ${thisi_his} voice throaty.\n      *goto thisi_talk\n    *label thisi_talk\n    *choice\n      *hide_reuse #\"What do you know about these plants, Thisi?\"\n        *set thisi_taloo %-10\n        \"Not too much yet,\" Thisi says, eyes on ${thisi_his} scanner. \"They appear to be native to this world, which means they were grown by the Shadow Fiends.  I'm shocked anything can grow here, given the horrid climate and lack of water. Anyway, I might take a few samples for later. Who knows? Maybe they'll be useful somehow.\"\n        *goto thisi_talk\n      *hide_reuse #\"Have you found any signs of the crown we're looking for?\"\n        Thisi frowns, ${thisi_his} cheeks flushing a deep shade of green. \"I haven't been looking, to be honest,\" ${thisi_he} admits.  \"I've been too distracted by these plants. They're just fascinating!\"\n        *goto thisi_talk\n      *if (((thisi_taloo > 60) and (thisi_adjust = false)) and (preference != \"neither\")) #\"I'm sorry I haven't been very nice to you, Thisi.\"\n        *set thisi_adjust true\n        *set thisi_taloo %-30\n        *set harsh_kind %+20\n        Thisi's eyes grow a little brighter. \"Thanks. It's good to hear you say that.\" The Nyarri's green face turns towards you with one of those familiar grins, and you sense ${thisi_his} pheromones strengthening again. \"Let's see what we can do to make it up to each other?\" \n        *goto thisi_talk\n      *if (((thisi_taloo > 60) and (thisi_adjust = false)) and (preference = \"neither\")) #\"I'm sorry I haven't been very nice to you, Thisi.\" \n        *set thisi_adjust true\n        *set thisi_taloo %-30\n        *set harsh_kind %+20\n        Thisi's expression relaxes a bit. \"Thanks. It's good to hear you say that.\" You sense another wave of pheromones from the Nyarri, but you feel nothing but relief that you've eased the tension on the ship.  \n        *goto thisi_talk\n      *if ((thisi_taloo \u003c 40) and (thisi_adjust = false)) #\"You know, you're really starting to get on my nerves, Thisi.\"\n        *set thisi_adjust true\n        *set thisi_taloo %+30\n        *set harsh_kind %-20\n        Thisi's eyes widen, then narrow to slits. \"There's no need to be rude, ${name},\" ${thisi_he} says coldly. \"You've copped an attitude ever since we met, and I'm sick of it.\"\n        *goto thisi_talk\n      #\"I'm going to explore elesewhere, Thisi.\"\n        \"Okay, ${name}. I'll be here with the plants.\" Thisi squats, ${thisi_his} eyes already on the plants. \"Talk to you later.\"\n        *goto plants_choice\n  *hide_reuse #Try to pick some plants.\n    You step into the patch of plants and reach down to pick a few.\n\n    *if thisi_taloo \u003c 50\n      \"Careful,\" warns Thisi. \"We don't know anything about them. Are you sure you want to do this?\"\n      *choice\n        #\"Of course.\"\n          *set thisi_taloo %-10\n          *set follower_leader %+20\n          *set cowardice_bravery %+10\n          *goto pull_plants\n        #\"On second thought, never mind.\"\n          *set thisi_taloo %+10\n          *set follower_leader %-20\n          *set cowardice_bravery %-10\n          \"Smart thinking,\" says Thisi with a wink.\n          *goto plants_choice\n    *else\n      *set cowardice_bravery %+10\n      *label pull_plants\n      Thisi gives you a funny look but stays silent as you grab several of the exotic plants and yank them out of the ground. Something stings your hand, sharp and electric. You wince. It's clearly some form of natural protection, and it hurts!\n      *if psrs > 0\n        *set psrs -1\n        Your personal shield recharger absorbs the sting for you, protecting you from permanent harm. Thisi smirks. \"What'd I tell you?\"\n        *goto plants_choice\n      *else\n        *set health -10\n        You instinctively drop the plants and pull back, injured.\n        *if health \u003c 1\n          Blinding pain shoots through your weakened body, and you curl into a ball on the ground. Sweat pouring off you, you close your eyes and surrender to the darkness. You have time for one last thought before the end: Why, oh, why didn't you listen to Thisi?\n\n          GAME OVER.\n          *goto_scene ending\n        *else\n          Thisi smirks. \"What'd I tell you?\"\n          *goto plants_choice\n  #Walk northeast.\n    *goto summit\n  #Walk southeast.\n    *goto landing_site\n\n\n\n*comment -----MACHINE-----\n\n*label machine\n*set found_machine true\nSomething looms out at you alongside the stone path: a large, complex system of computers connected to a massive machine. A single digital display in the center of the machine blinks. You boggle. Could this ancient Shadow Field computer possibly still be functional?\n\n*if teammate != \"Shelou\"\n  Shelou Vili fiddles with the computer, his powerful wings spread wide.\n\n  *goto machine_continued\n*label machine_continued\nThe stone path continues northwest and southwest.\n\n${teammate} approaches the machine and examines it curiously.\n*label machine_choice\n*choice\n  *if (teammate != \"Shelou\") #Talk to Shelou Vili.\n    *if rallix_shelou \u003c 40\n      You greet Shelou, purposely neglecting to use his full name. He glares at you. \"Please address me by my full title, ${name},\" he says firmly. \"You should know that by now. Were the situation reversed, I would certainly pay you the same respect.\"\n      *goto shelou_talk\n    *elseif rallix_shelou > 60\n      You greet Selou in the proper Aviark manner. \"Tobi Esha, Shelou Vili.\" \n     \n      \"Tobi Ehsa,\" he replies with a low bow.\n      *goto shelou_talk\n    *else\n      \"Hello, Shelou Vili,\" you say. The Aviark researcher nods formally.\n      *goto shelou_talk\n    *label shelou_talk\n    *choice\n      *hide_reuse #\"Do you recognize this machine?\"\n        \"I'm afraid not,\" replies Shelou Vili. \"I will, however, continue to study it in an attempt to determine its purpose. I believe that this machine may be the key to our success on this mission.\"\n        *goto shelou_talk\n      *hide_reuse #\"Why aren't you searching for the crown?\"\n        \"This planet is enormous,\" states Shelou Vili, gesturing with one hand. \"To wander it aimlessly is a waste of our time and effort. Instead, I am studying our surroundings carefully to determine a logical course of action.\"\n        *goto shelou_talk\n      *if ((rallix_shelou \u003c 40) and (shelou_adjust = false)) #\"I'm sorry I haven't been very nice to you, Shelou Vili.\"\n        *set shelou_adjust true\n        *set rallix_shelou %+30\n        *set harsh_kind %+20\n        \"No apology is required, ${name},\" says the Aviark. \"What lies in the past remains there. But I do appreciate the sincerity of your words.\"\n        *goto shelou_talk\n      *if ((rallix_shelou > 60) and (shelou_adjust = false)) #\"You know, you're really starting to get on my nerves, Shelou.\"\n        *set shelou_adjust true\n        *set rallix_shelou %-30\n        *set harsh_kind %-20\n        \"Then I shall leave you in peace from now on,\" snaps Shelou Vili. You can feel the spite in his voice like a blow. \"Though I ask that you at least grant me the fundamental respect of referring to me by my full name.\"\n        *goto shelou_talk\n      #\"I'm going to explore elsewhere.\"\n        Shelou Vili gives you a quick nod before returning his attention to the inscrutable machine.\n        *goto machine_choice\n  #Examine the machine.\n    The machine is dark gray and covered in rust. It features a complex system of gears and pumps extending from the cliff you stand on into the lava. Maybe, you think, this machine somehow regulates the lava's flow. Given the alien nature of the engineering, you can't know for sure.\n    *goto machine_choice\n  #Attempt to access the computer.\n    You walk over to the computer panel, activating it. The main screen features two accessible submenus: \"Bridge Control\" and \"Lava Flow.\"\n    *label computer_choice\n    *choice\n      #Access the bridge controls.\n        *label bridge_controls\n        You access the bridge control system. The status of the bridge is currently listed as\n        *if lowered_bridge = false\n          up. Do you wish to lower the bridge?\n          *choice\n            #Yes.\n              *set lowered_bridge true\n              *if mission_step \u003c 3\n                *set mission_step 3\n                *goto lowered_bridge_cont\n              *label lowered_bridge_cont\n              The bridge has been lowered.\n              *choice\n                #Access the lava flow.\n                  *goto lava_flow\n                #Leave the computer terminal.\n                  *goto computer_leave\n            #No.\n              The bridge remains raised.\n              *choice\n                #Access the lava flow.\n                  *goto lava_flow\n                #Leave the computer terminal.\n                  *goto computer_leave\n        *else\n          down. Do you wish to raise the bridge?\n          *choice\n            #Yes.\n              *set lowered_bridge false\n              The bridge has been raised.\n              *choice\n                #Access the lava flow.\n                  *goto lava_flow\n                #Leave the computer terminal.\n                  *goto computer_leave\n            #No.    \n              The bridge remains lowered.\n              *choice\n                #Access the lava flow.\n                  *goto lava_flow\n                #Leave the computer terminal.\n                  *goto computer_leave\n      #Access the lava flow.\n        *label lava_flow\n        *if found_cave_entrance = true\n          The lava flow system appears to have crashed. The screen is scrambled, and you can't access the system.\n          *choice\n            #Access the bridge controls.\n              *goto bridge_controls\n            #Leave the computer terminal.\n              *goto computer_leave\n        *elseif solved_puzzle = true\n          The lava flow system appears to have crashed. The screen is scrambled, and you can't access the system.\n          *choice\n            #Access the bridge controls.\n              *goto bridge_controls\n            #Leave the computer terminal.\n              *goto computer_leave\n        *else\n          *if accessed_computer = true\n            *goto lava_flow_puzzle\n          *else\n            The lava flow system seems to be encrypted. The screen flickers, making you think the system's about to crash.\n            *label lava_flow_choice\n            *choice\n              *selectable_if (lockpicks > 0) #Hack into the system using a sonic lockpick.\n                *set lockpicks -1\n                *set accessed_computer true\n                You use one of your sonic lockpicks to hack into the lava flow system. Your heart races as the system's main screen appears.\n                *goto lava_flow_puzzle\n              *selectable_if (specialization = \"science\") #Bypass the encryption using your advanced training. (SCIENCE)\n                Using your specialized science training, you try to bypass the security encryption.\n\n                *rand success_chance 1 10\n                *if success_chance \u003c 7\n                  *set success_chance 0\n                  Unfortunately, you can't slip by the encryption. You think fast. Either you try again, or you figure out some other way of using the computer.\n                  *goto computer_choice\n                *else\n                  *set success_chance 0\n                  *set accessed_computer true\n                  Your tinkering quickly pays off: you find a loophole in the encryption routine you can manipulate to bypass the system. Your heart races as the system's main screen appears.\n                  *goto lava_flow_puzzle\n              *hide_reuse #Try to guess the password.\n                You try entering several randomized passwords. After several minutes, you give up. Even if you had a million years, you'd never guess the key correctly.\n                *goto lava_flow_choice\n              #Access the bridge controls.\n                *goto bridge_controls\n              #Leave the computer terminal.\n                *goto computer_leave\n      #Leave the computer terminal.\n        *label computer_leave\n        You turn off the panel and walk away from the computer.\n        *goto machine_choice\n  #Walk northwest.\n    *goto summit\n  #Walk southwest.\n    *goto landing_site\n\n*label lava_flow_puzzle\n*set saw_screen true\nThe top of the screen displays camera footage of a rock surrounded by flowing lava. Your eyes widen; there's Borion! And Kraska! The camera tracks them as they explore, and you wonder if the image is a live feed.\n\nUnderneath you see a graphical depiction of a tank divided into five vertical units. The bottom four units are colored green, while the fifth unit is red. To the right of this tank is a digital image of a small container divided into three vertical units. You puzzle at the diagrams. What could they mean?\n\nThen it hits you. You can transfer lava from outside into the holding tank and then into the digital container—which represents the physical tank embedded in the machine itself! What you can't figure out is why.\n\nThe graphical tank is filled to a height of ${tank} out of 5 units. The container is filled to a height of ${container} out of 3 units.\n*label puzzle_choice\n*if tank = 4\n  *goto puzzle_complete\n*choice\n  *if (saw_screen = false) #Look at the computer screen again.\n    *goto lava_flow_puzzle\n  #Fill the tank with lava from outside.\n    *set saw_screen false\n    *set tank 5\n    Lava flows from outside and fills the tank to the top. All 5 units are now filled. The container is filled to a height of ${container} out of 3 units.\n    *goto puzzle_choice\n  *selectable_if ((tank > 0) and (container \u003c 3)) #Fill the container with the tank's lava.\n    *set saw_screen false\n    *label container_fill\n    *if container \u003c 3\n      *if tank > 0\n        *set tank -1\n        *set container +1\n        *goto container_fill\n      *else\n        You pour lava from the tank into the container. The tank now holds ${tank} out of 5 units of lava. The container is filled to a height of ${container} out of 3 units.\n        *goto puzzle_choice\n    *else\n      You pour lava from the tank into the container. The tank now holds ${tank} out of 5 units of lava. The container is filled to a height of ${container} out of 3 units.\n      *goto puzzle_choice\n  *selectable_if ((tank \u003c 5) and (container > 0)) #Pour the container's lava into the tank.\n    *set saw_screen false\n    *label container_drain\n    *if tank \u003c 5\n      *if container > 0\n        *set tank +1\n        *set container -1\n        *goto container_drain\n      *else\n        Your pour lava from the container into the tank. The tank now holds ${tank} out of 5 units of lava. The container is filled to a height of ${container} out of 3 units.\n        *goto puzzle_choice\n    *else\n      Your pour lava from the container into the tank. The tank now holds ${tank} out of 5 units of lava. The container is filled to a height of ${container} out of 3 units.\n      *goto puzzle_choice\n  *selectable_if (tank > 0) #Completely drain the tank of lava.\n    *set saw_screen false\n    *set tank 0\n    You empty all the lava from the tank. It now holds ${tank} out of 5 units of lava. The small container is filled to a height of ${container} out of 3 units.\n    *goto puzzle_choice\n  *selectable_if (container > 0) #Completely drain the container of lava.\n    *set saw_screen false\n    *set container 0\n    You empty all the lava from the container. The tank now holds ${tank} out of 5 units of lava. The container is filled to a height of ${container} out of 3 units.\n    *goto puzzle_choice\n  #Leave the computer terminal.\n    *set saw_screen false\n    *goto computer_leave\n\n*label puzzle_complete\n*set solved_puzzle true\nAs soon as the main tank fills with lava to the fourth unit, you hear a chime. Your eyes dart to the video footage just in time to see Borion yelp. He dives away from a thick trail of lava flowing right at him. You cringe. Now cut off from Kraska, Borion will have to search for the crown alone.\n\nIt makes no sense, but the machine seems to have redirected the lava flow.\n\nA second later, the visuals on the screen scramble. The lava flow system has crashed. All you can do is fervently hope your actions have helped, rather than hindered, your team's progress.\n*choice\n  #Access the bridge controls.\n    *goto bridge_controls\n  #Leave the computer terminal.\n    *goto computer_leave\n\n\n\n*comment -----SUMMIT-----\n\n*label summit\n*set found_bridge true\n*if mission_step = 1\n  *set mission_step 2\n  *goto summit_cont\n*label summit_cont\nYou approach the summit of the rocky path. A large metal bridge, wide enough to hold two people side by side, rests at the edge. The bridge is currently\n*if lowered_bridge = true\n  down, permitting access to the other side of the path.\n  *goto summit_continued\n*else\n  up, blocking access to the other side of the path.\n  *goto summit_continued\n*label summit_continued\n\n*if teammate != \"Rallix\"\n  Rallix stands guard at the bridge, eyeing its surroundings suspiciously.\n\n  *goto summit_continued_2\n*label summit_continued_2\nThe stone path branches out to the southeast and southwest.\n*if lowered_bridge = true\n  The bridge provides a pathway to the north.\n  \n  ${teammate} walks to the edge of the summit and stares down at the lava far below.\n  *goto summit_choice\n\n${teammate} walks to the edge of the summit and stares down at the lava far below.\n*label summit_choice\n*choice\n  *if (teammate != \"Rallix\") #Talk to Rallix.\n    *if rallix_shelou > 60\n      You nod to Rallix in greeting. It clicks its mandibles in obvious distaste.\n      *goto rallix_talk\n    *elseif rallix_shelou \u003c 40\n      \"${name},\" calls Rallix, saluting you with its pincers. \"Come join me for a moment.\"\n      *goto rallix_talk\n    *else\n      You nod to Rallix in greeting. It nods back.\n      *goto rallix_talk\n    *label rallix_talk\n    *choice\n      *hide_reuse *if (lowered_bridge = false) #\"Any ideas how to lower the bridge?\"\n        \"No,\" growls Rallix. \"But we need to find a way across. Maybe there's an operating system somewhere that can help us.\"\n        *goto rallix_talk\n      *hide_reuse #\"Why would the Shadow Fiends need a bridge?\"\n        \"That's a good question,\" Rallix growls. \"They can glide around wherever they want, so what need do they have for physical objects? Unless they weren't always shadows…\"\n        *goto rallix_talk\n      *hide_reuse #\"Have you found the crown yet?\"\n        \"Does it look like I have?\" spits Rallix, its forelegs vibrating threateningly. \"Keep looking, and so will I!\"\n        *goto rallix_talk\n      *if ((rallix_shelou > 60) and (rallix_adjust = false)) #\"I haven't been very kind to you, Rallix. I apologize for that.\"\n        *set rallix_adjust true\n        *set rallix_shelou %-30\n        *set harsh_kind %+20\n        \"Save your apologies for someone who cares, human,\" says Rallix. But when it meets your gaze, it's with much less aggression than before.\n        *goto rallix_talk\n      *if ((rallix_shelou \u003c 40) and (rallix_adjust = false)) #\"You know, I really can't stand you, Rallix. Just leave me alone.\"\n        *set rallix_adjust true\n        *set rallix_shelou %+30\n        *set harsh_kind %-20\n        Rallix's yellow eyes bulge. \"If it weren't for Captain Isan's direct orders,\" it rasps, \"I would kill you where you stand and feed on your corpse!\"\n        *goto rallix_talk\n      #\"I'm going to keep searching.\"\n        Rallix rolls its eyes and resumes looking around.\n        *goto summit_choice\n  *if (lowered_bridge = false) #Examine the raised bridge.\n    The raised metal bridge is connected to a series of wire pulleys. You can't find any way to lower the bridge from here. You sigh. The controls must be elsewhere.\n    *goto summit_choice\n  *if (lowered_bridge = true) #Go north onto the bridge.\n    *goto bridge_1\n  #Walk southwest.\n    *goto plants\n  #Walk southeast.\n    *goto machine\n\n\n\n*comment -----BRIDGE 1-----\n\n*label bridge_1\n*if bridge_trap_hit = false\n  As you step onto the bridge, ${teammate} moves to overtake you.\n  *if follower_leader \u003c 35\n    *set bridge_trap_hit true\n    You fall back and let ${teammate} take the lead. An instant later, a huge wave of lava sweeps overhead, crashing down just decimeters from where the two of you stand. A few droplets splash ${teammate}, who shrieks. Your heart pounds madly. If you'd gone over the bridge first, you think, that would have been you.\n\n    \"I'm okay!\" ${teammate} cries. The two of you rush over the bridge. Once you're safely on the other side, you check and dress ${teammate}'s burns. At least they seem shallow.\n    *goto bridge_1_choice\n  *elseif follower_leader > 65\n    *set bridge_trap_hit true\n    You don't follow, you lead. Holding ${teammate} back, you step onto the bridge. An instant later, a huge wave of lava sweeps overhead just decimeters from where you stand. A few fiery droplets splash you, and you shriek.\n    *if psrs > 0\n      *set psrs -1\n      Your personal shield recharger absorbs the impact with a visible spark, taking the hit instead of you. The two of you rush across the bridge, and once you're safely on the other side, ${teammate} checks if you're okay.  Thanks to the PSR, the damage is minimal. You heave a sigh of relief.\n      *goto bridge_1_choice\n    *else\n      *set health -30\n      *if health \u003c 1\n        You scream as the lava eats through your clothes and into your skin, draining away the last ounce of your life. If only ${teammate} had gone over the bridge first!\n\n        GAME OVER.\n        *goto_scene ending\n      *else\n        You scream as the lava eats through your clothes and into your skin. If only ${teammate} had gone over the bridge first!\n\n        The two of you rush across the bridge. Once you're safely on the other side, ${teammate} checks your burns and quickly dresses them. At least they're shallow, you think. You'll survive.\n        *goto bridge_1_choice\n  *else\n    *set bridge_trap_hit true\n    You match ${teammate}'s tempo, and the two of you step onto the bridge side by side. An instant later, a huge wave of lava sweeps overhead just feet from where you stand. A few fiery droplets splash both of you, making you shriek.\n    *if psrs > 0\n      *set psrs -1\n      Your personal shield recharger absorbs the impact with a visible spark, taking the damage for you.  ${teammate}, however, winces in pain. Thanks to the PSR, you didn't sustain any lasting harm, and ${teammate} recovers quickly, so the two of you dash across the bridge. Once you're safely on the other side, you check and dress ${teammate}'s burns. At least they seem shallow.\n      *goto bridge_1_choice\n    *else\n      *set health -30\n      *if health \u003c 1\n        You scream as the lava eats through your clothes and into your skin, draining away the last ounce of your life. If only you hadn't stepped onto the bridge!\n\n        GAME OVER.\n        *goto_scene ending\n      *else\n        You both wince in pain as the lava eats through your clothes and into your skin. Luckily, burns aside, you didn't sustain any lasting harm, and ${teammate} recovers quickly, so the two of you dash across the bridge. Once you're safely on the other side, you check and dress your burns, then ${teammate}'s. At least they seem shallow.\n        *goto bridge_1_choice\n*else\n  You cross over the southern section of the metal bridge, ${teammate} at your side. Your boots clang loudly with with every step. The bridge continues north, and the summit lies to the south.\n*label bridge_1_choice\n*choice\n  #Continue north across the bridge.\n    *goto bridge_2\n  #Walk south onto the summit.\n    *goto summit\n\n\n\n*comment -----BRIDGE 2-----\n\n*label bridge_2\n*if spotted_kraska = false\n  You continue north across the bridge and spot a rocky clearing in the distance. As you get closer, you see the entrance to a large cave structure just behind the clearing. The two of you approach the cave, where you can make out Kraska's shadow. He doesn't see you.\n  *choice\n    *selectable_if (suits > 0) #Use a camo suit to sneak over to Kraska.\n      *set spotted_kraska true\n      *set approached_kraska_stealth true\n      *set suits -1\n      Telling ${teammate} to stay put, you stride off. A few steps from the cave entrance, you equip your camo suit, instantly rendering you invisible. Holding your breath, you tiptoe toward Kraska. But something must tip him off—he darts into the nearby cave entrance and vanishes.\n\n      Soon after, the camo suit's effects wear off, and you reappear. ${teammate} hurries over, asking if you saw anything useful. You shrug. Who can say if your stealth accomplished anything? But at least you know where Kraska is…\n      *if solved_puzzle = true\n        Now if only you could find Borion. You sigh. He must be still be out there alone, separated from Kraska, thanks to your earlier tampering with the alien computer.\n        *page_break\n        *goto cave_entrance\n      *else\n        But where is Borion?\n        *page_break\n        *goto cave_entrance\n    *selectable_if (specialization = \"infiltration\") #Stick to the shadows and sneak over to Kraska undetected. (INFILTRATION)\n      *set spotted_kraska true\n      *set approached_kraska_stealth true\n      Telling ${teammate} to stay put, you use your advanced infiltration training to slip from shadow to shadow, slowly making your way toward Kraska. But something must tip him off—he darts into the nearby cave entrance and vanishes.\n\n      Your target gone, you wave toward ${teammate}, who hurries over, asking if you saw anything useful. You shrug. Who can say if your stealth accomplished anything? But at least you know where Kraska is…\n      *if solved_puzzle = true\n        Now if only you could find Borion. You sigh. He must be still be out there alone, separated from Kraska, thanks to your earlier tampering with the alien computer.\n        *page_break\n        *goto cave_entrance\n      *else\n        But where is Borion?\n        *page_break\n        *goto cave_entrance\n    #Shout out to Kraska.\n      *set spotted_kraska true\n      Kraska inclines his head toward you, pauses, and then disappears inside the cave. You can't see any sign of him.\n      *goto bridge_2_choice\n    #Walk north to the cave entrance without greeting Kraska.\n      *set spotted_kraska true\n      Ignoring Kraska, you stride toward the cave entrance, ${teammate} in tow. Kraska's head jerks up at the clatter of your boot heels. He inclines his head toward you, pauses, and then darts inside the cave. By the time you get there, he's gone.\n      *goto cave_entrance\n    #Go back the way you came, south across the bridge toward the summit.\n      *goto bridge_1\n*else\n  You and ${teammate} pass along the northern section of the sturdy metal bridge and spot a rocky clearing in the distance. As you get closer, you see the entrance to a large cave structure just behind the clearing. The two of you approach the cave, where you can make out Kraska's shadow. He doesn't see you. The bridge continues south.\n  *label bridge_2_choice\n  *choice\n    #Walk north to the cave entrance.\n      *goto cave_entrance\n    #Continue south across the bridge.\n      *goto bridge_1\n\n\n\n*comment -----CAVE ENTRANCE-----\n\n*label cave_entrance\n*if found_cave_entrance = false\n  *set mission_step 4\n  *set found_cave_entrance true\n  *if ((solved_puzzle = true) and (approached_kraska_stealth = true))\n    You reach the entrance to the cave and peek inside. You see only darkness. To the south, past the clearing, the lowered metal bridge grants passage to the southern section of rocks.\n\n    A figure approaches on your right. It's Borion! \"H-hey,\" he says, waving.\n\n    You greet Borion…\n    *choice\n      #…kindly.\n        *set harsh_kind %+10\n        You greet Borion excitedly, happy he's okay. The Vervoo slave hurries over, clearly bursting to share his story.\n        *goto talk_to_borion\n      #…indifferently.\n        You greet Borion formally. The Vervoo slave hurries over, clearly bursting to share his story.\n        *goto talk_to_borion\n      #…harshly.\n        *set harsh_kind %-10\n        You mutter hello, making it clear you couldn't care less that he's here. Despite that, the Vervoo slave hurries over, clearly bursting to share his story.\n        *goto talk_to_borion\n    *label talk_to_borion\n    *choice\n      *hide_reuse #\"Where have you been?\"\n        \"Around,\" Borion says, gesturing left and right. \"H-here, there, everywhere. I've b-been following various trails, trying to s-scope out the area.\"\n        *goto talk_to_borion\n      *hide_reuse #\"Did you find the crown yet?\"\n        \"Nope,\" he replies. \"Not yet. I've been l-looking really h-hard, though! Unfortunately, it's a b-big planet.\"\n        *goto talk_to_borion\n      *hide_reuse #\"Why aren't you with Kraska?\"\n        Borion's eyes widen. \"I was at f-first,\" he explains. \"But then, we w-were walking down a path, and a s-stream of lava appeared out of n-nowhere between us! I b-barely got away in t-time. It was so s-scary!\"\n\n        You describe the machine you found earlier and how your tampering might be responsible for the redirected lava flow.\n\n        \"Oh, replies Borion, flushing purple with relief. \"That e-explains that!\"\n        *goto talk_to_borion\n      *hide_reuse #\"Did you encounter any traps?\"\n        \"Aside f-from a wave of lava trying to k-kill me, you mean?\" says Borion, a small smile on his lips. \"Nope, n-not a single t-trap!\"\n        *goto talk_to_borion\n      *hide_reuse #\"Do you want to join ${teammate} and me?\"\n        \"That's awfully k-kind of you, ${name},\" says Borion, \"but I th-think I can c-cover more ground on my own.  My p-people are really good at r-running quickly through rugged t-terrain.  Why d-don't we keep s-searching for the crown s-separately?\"\n        *goto talk_to_borion\n      #\"We need to keep exploring, Borion.\"\n        \"Yes,\" he says, \"we d-do!  Catch you l-later, ${name}. B-be careful!\"\n        \n        At that, Borion runs off past the clearing.\n        \n        *if teammate = \"Taloo\"\n          Taloo, mimicking Borion despite his distance, gestures to you, her intention clear:  all of you should keep searching for the crown.\n          *goto cave_entrance_choice\n        *else\n          ${teammate} looks at you. \"Now that we know Borion's okay, back to the hunt!\"\n          *goto cave_entrance_choice\n  *else\n    *set found_body true\n    *set borion_died true\n    You step into the cave and gasp; a body lies on the ground, covered in drying blood. You run over to the corpse, only to discover that it's Borion! The Vervoo slave is still, and a hole gapes in his chest. You bow your head, knowing you're too late.\n\n    *if teammate = \"Taloo\"\n      Taloo, her face mimicking yours, tears up and falls to her knees.\n      *goto death_reaction\n    *elseif teammate = \"Thisi\"\n      \"Oh, my goddess,\" whispers Thisi, tears streaming down ${thisi_his} face. \"Borion!\" \n      *if ((preference = \"men\") or (preference = \"women\"))\n        The Nyarri grabs you tightly and clings.\n        *goto death_reaction\n      *elseif teammate = \"Shelou\"\n        Shelou Vili bows his head in respect, eyes closed, whispering what you assume must be an Aviark prayer.\n        *goto death_reaction\n      *else\n        Rallix shakes its head. \"Borion, you fool,\" it mutters. \"What a waste.\"\n        *goto death_reaction\n    *label death_reaction\n\n    Kneeling by Borion's lifeless body, you feel…\n    *choice\n      #…sadness.\n        *set harsh_kind %+20\n        *set duplicity_loyalty %+10\n        Borion was a good, kind man, and your heart aches at the loss. What happened to him? Could Kraska have done this?  Or did Borion inadvertently set off a trap?  You won't find any answers here, so you force yourself to stand and move on.\n        *goto cave_entrance_choice\n      #…anger.\n        *set harsh_kind %-10\n        *set duplicity_loyalty %+10\n        How could someone do this to Borion? You tremble with anger and hate.  What happened to him?  Could Kraska have done this?  Or did Borion inadvertently set off a trap?  You won't find any answers here, so you force yourself to stand and move on, still shaking with rage.\n        *goto cave_entrance_choice\n      #…nothing.\n        The discovery of Borion's body has sucked all emotion from you.  You feel empty, confused. It doesn't feel real, this corpse lying before you. What happened to him?  Could Kraska have done this? Or did Borion inadvertently set off a trap?  Finally you admit you won't find any answers here, so you stand, still numb, and move on.\n        *goto cave_entrance_choice\n      #…relief.\n        *set harsh_kind %-10\n        *set duplicity_loyalty %-10\n        Borion may have been kind, but he could also be a burden. You can't help but feel lighter at his passing.  Maybe now, wherever he is, he'll finally be free. Rubbing your chin, you what happened to him.  Could Kraska have done this?  Or did Borion inadvertently set off a trap?  Knowing you won't find any answers here, you sigh and move on.\n        *goto cave_entrance_choice\n      #…joy.\n        *set harsh_kind %-20\n        *set duplicity_loyalty %-10\n        *set suspicion +5\n        Borion was annoying and clingy.  No matter what you said or did, he pushed himself on you.  Good riddance, you say, trying to hide your joy from ${teammate}. But something worries you; what if it was a murder? Could Kraska have done this?  Then you're all in danger. Or did Borion inadvertently set off a trap?  You suggest to ${teammate} that you won't find any answers here, and you should move on just in case.\n        *goto cave_entrance_choice\n*else\n  You reach the entrance to the cave and peek inside, ${teammate} at your side. You see only darkness. To the south, past the clearing, the lowered metal bridge grants passage to the southern section of rocks.\n\n  *if found_body = true\n\n    You gasp. Borion's body lies in a pool of his own drying blood. His still heart is perfectly, horribly visible through his translucent chest.\n    *goto cave_entrance_choice\n  *label cave_entrance_choice\n  *choice\n    #Walk into the cave to the east.\n      *if entered_cave = false\n        *if teammate = \"Thisi\"\n          \"Wait,\" says Thisi apprehensively.  \"Are you sure we should go inside?  Kraska went in there, and it looks dark and scary.\"\n          *choice\n            #Comfort Thisi and lead ${thisi_him} inside.\n              *set harsh_kind %+10\n              *set thisi_taloo %-20\n              *set follower_leader %+10\n              *set cowardice_bravery %+10\n              You put your arm around Thisi and whisper comforting words to ${thisi_him}.  The Nyarri calms down and lets you lead ${thisi_him} inside the cave.\n\n              *goto cave_interior\n            #Laugh good-naturedly at Thisi and walk in with ${thisi_him}.\n              *set harsh_kind %+10\n              *set thisi_taloo %-10\n              You laugh affectionately at Thisi's nervousness, and ${thisi_he} joins in a second later, the humor calming ${thisi_him} down. Together, you walk into the cave.\n              \n              *goto cave_interior\n            #Chastise Thisi and make ${thisi_him} go first.\n              *set harsh_kind %-10\n              *set thisi_taloo %+20\n              *set follower_leader %-10\n              *set cowardice_bravery %-10\n              You mock Thisi's worry and order ${thisi_him} to go into the cave first.  Though ${thisi_he}'s clearly terrified, ${thisi_he} does as you say.\n              \n              *goto cave_interior\n        *elseif teammate = \"Taloo\"\n          As you approach the cave, Taloo suddenly stops in her tracks and shakes her head vigorously. She really doesn't want to go inside.\n          *choice\n            #Comfort Taloo and lead her inside.\n              *set harsh_kind %+10\n              *set thisi_taloo %+20\n              *set follower_leader %+10\n              *set cowardice_bravery %+10\n              You put your arm around Taloo and whisper comforting words to her.  She calms down, her face the mirror image of yours, and lets you lead her inside the cave.\n              \n              *goto cave_interior\n            #Laugh good-naturedly at Taloo and walk in with her.\n              *set harsh_kind %+10\n              *set thisi_taloo %-10\n              You laugh affectinoately at Taloo's nervousness.  She smiles uncomfortably, dropping her eyes. But when you don't say anything else, she gives in, and the two of you walk into the cave.\n              \n              *goto cave_interior\n            #Chastise Taloo and make her go first.\n              *set harsh_kind %-10\n              *set thisi_taloo %-20\n              *set follower_leader %-10\n              *set cowardice_bravery %-10\n              You mock Taloo's worry and order her to go into the cave first. Though she's clearly terrified, she lowers her head and hesitantly leads the way into the cave.\n              \n              *goto cave_interior\n        *elseif teammate = \"Shelou\"\n          As you approach the cave, Shelou Vili appraises the entrance.  \"Are you sure it is wise for us to enter here?\" he asks. \"Let us not forget we were warned about booby traps.\"\n          *choice\n            #Reassure Shelou Vili and lead him inside.\n              *set harsh_kind %+10\n              *set rallix_shelou %+20\n              *set follower_leader %+10\n              *set cowardice_bravery %+10\n              You remind Shelou Vili that you need to find that crown.  \"Yes, ${name},\" he replies, nodding.  \"You are most wise.  Lead the way.\"\n\n              You enter the cave, Shelou Vili following behind.\n\n              *goto cave_interior\n            #Laugh good-naturedly at Shelou Vili's concern and walk in with him.\n              *set harsh_kind %+10\n              *set rallix_shelou %-20\n              You laugh affectionately at Shelou Vili's concern. \"This is no laughing matter,\" he admonishes.  \"Our lives are at stake, ${name}.  To laugh in the face of possible death is to be a fool.\"  But he stays by your side as you enter the cave.\n              \n              *goto cave_interior\n            #Chastise Shelou Vili and make him enter first.\n              *set harsh_kind %-10\n              *set rallix_shelou %+10\n              *set follower_leader %-10\n              *set cowardice_bravery %-10\n              You mock Shelou Vili's apprehension and demand that he enter the cave first. He bows his head. \"You are correct, ${name},\" he says, his voice low.  \"I am shamed by my earlier hesitation. Entering the cave is clearly our best course of action.\"  Without another word, Shelou Vili leads the way into the cave.\n              \n              *goto cave_interior\n        *else\n          As you approach the cave, Rallix squints up at the entrance, clearly suspicious.  \"Are you sure we should go inside?  It doesn't look safe.\"\n          *choice\n            #Reassure Rallix and lead it inside.\n              *set harsh_kind %+10\n              *set rallix_shelou %+20\n              *set follower_leader %+10\n              *set cowardice_bravery %+10\n              You remind Rallix that you need to find that crown. Surely it's not afraid?\n\n              \"Don't patronize me,\" Rallix shouts.  \"I fear nothing!\"  Angry, it marches into the cave, forcing you to trail behind.\n\n              *goto cave_interior\n            #Laugh good-naturedly at Rallix's concern and walk in with it.\n              *set harsh_kind %+10\n              *set rallix_shelou %-20\n              You laugh at Rallix's apprehension. \"Rallix,\" you tease, \"I thought you didn't know what fear was?\"\n\n              A second later, the Nixian joins in, roaring its amusement.  \"You're right, ${name},\" it says between heavy breaths.  \"There's nothing to fear, certainly not here.\"\n              \n              Rallix confidently walks into the cave next to you.\n              \n              *goto cave_interior\n            #Chastise Rallix and make it enter first.\n              *set harsh_kind %-10\n              *set rallix_shelou %-10\n              *set follower_leader %-10\n              *set cowardice_bravery %-10\n              You mock Rallix's concern and order it to enter the cave first. Rallix glares at you.  \"Consider yourself lucky, human,\" it growls.  \"Most people who talk to me like that don't walk away.\"  Despite its angry words, Rallix marches into the cave, forcing you to trail behind.\n              \n              *goto cave_interior\n      *else\n        *goto cave_interior\n    #Go south, onto the bridge.\n      *goto bridge_2\n\n\n\n*comment -----CAVE INTERIOR-----\n\n*label cave_interior\n\n*set entered_cave true\nInside the dark cave, a cool breeze blows across your face, d
