<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>It's Killing Time — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "killingtime", "title": "It's Killing Time", "scenes": {"beijing": "*set beijing true\n*page_break\nYou have no discernible sense of time or place.  The mission has consumed you.  Weariness burns every muscle.  Every ligament groans as you move.  Each sinew aches.  Still, crouching down as you prepare for your next move, you think about how much you've gone through to get here.\n\nThere was the kill in the Forbidden City to get someone on your payroll into a position with higher access.  And there was the sniper job in the hutongs to clear the way for another Syndicate plant to get into position.  Then, there was the struggle atop the Great Wall to obtain a keycard to get you into the restricted areas.  And now, the moment has finally arrived.\n\nThe fatigue hits you, though, your body near its breaking point after days of little rest and constant struggle.  You're on the rooftop of a giant Beijing conglomerate, near the massive, central atrium, and you pause for a moment.  Taking a glance over the side, you're immediately struck with a sense of vertigo.  It's sixty stories down to the ominously verdant garden on the ground floor.  \n\nYou're perched in the shadow of a massive air-conditioning unit in the wake of your stealth insertion.  This brief, still moment might be a good time to rest and recharge.  You decide to:\n\n*choice\n  #Tough it out and push through.\n    *set passion %-10\n    *goto break\n  #Take a small break.\n    *set passion %-5\n    *goto break\n  #Take a long break.\n    *set passion %+5\n    *goto break\n\n*label break\nBefore you can even take a breath, you hear footfalls no more than ten feet away.  You freeze, knowing you are not alone.  All of your muscles are tense, ready to respond however you need to, but your breath is steady, and you are absolutely silent.  The crunch of footfalls on the gravel roof gets closer and closer.\n\nWhoever is there will be upon you quickly, so you decide to:\n*choice\n  #Dive toward the source of the sound, utilizing the element of surprise.\n    Crouched like a jungle cat, you take a few furtive steps, then leap for the target.  As you'd anticipated, it's a guard on the roof, and a burly one at that.  She's large and strong, yet surprisingly quick.  You shoot for a quick, single leg takedown, but her speed is uncanny, the large adversary pressing her weight down on your back as she sprawls out.  With all of your strength, you push yourself up onto one knee.\n\n    Using a slick wrestling move, you explode upward and outward, quickly forcing your opponent into a turtle position.  You waste no time in flattening your enemy out and plunging into a rear naked choke.  She is out like a light in less than three seconds.  Tying up her body, you enter the building through the emergency exit.\n    *set strength +2\n    *goto exit\n\n  #Hang back and look for an opportunity to pick off my target.\n    The heavy steps are loud in your ears, and you hold your gun at the ready.  You stand like a deadly statue, unmoving.   \n\n    Seeing first a booted foot and then a large frame, you realize instantly that something is wrong.  The guard is in a firing stance and you slide out of the way just in time as two bullet holes rip through the spot where you were crouched.  You press your back against the ground and open fire.  Two slugs penetrate above the guard's bullet-proof vest and the woman falls to the ground, clutching at her neck.  \n\n    You pause long enough to make sure the target is no longer a threat, then enter the building through the emergency exit.\n    *set ranged_weapons +2\n    *goto exit  \n\n  #Throw some gravel to the side as a distraction, then blindside the newcomer.\n    You scoop up a handful of gravel and toss it.  As you'd predicted, the shadowy shape turns toward the sound.  You rush forward, your pistol already drawn.  You're able to plant three rounds in the back of the large female security guard before she can even turn around.\n\n    You pause long enough to make sure the target is no longer a threat, then enter the building through the emergency exit.\n    *set improvisation +2\n    *goto exit\n\n  #Emerge and give whoever is there a story about how I'm a repair person.\n    You come out with your hands up, shouting angrily in Mandarin that you're unable to get any work done with interruptions.  The woman you encounter seems to be unaccustomed to such bravado because she backs off with an apology.  You nod to her, then turn your back, showing a sign of visible disgust.\n\n    The woman bows deeply, apologizing profusely.  She makes her way to the emergency exit to continue her rounds, and you wait several minutes until you're sure she's gone.\n\n    Finally, when you're confident the coast is clear, you head toward the emergency exit.\n    *set improvisation +2\n    *goto exit\n\n*label exit\n\"Good work,\" comes Chuck's voice in your ear.  You smile a little as you wait in the stairwell.  \n\nChuck is safe at home, back after a difficult job in Central America, and he's the remote controller for this mission.  So far, he's been doing an excellent job.  \"Thanks buddy,\" you reply.  \"What's it look like before I get to the kill zone?\"\n\nChuck laughs, \"Well, thermal imaging basically suggests it's a death trap.  You'll have about twenty armed hostiles milling around your way down.  How's that sound for odds?\"\n\nYou answer:\n*fake_choice\n  #\"The stiffer the odds, the more I like it.\"\n  #\"Odds mean nothing.  The house always wins, and in this case, I'm the house.\"\n  #\"I don't like the odds, but it's not like I have a choice in the matter.\"\n  #\"Why'd you have to tell me that?\"\n\nChuck gives you another good-natured laughs.  \"Well, my friend, it seems like you're heading out of the furnace and into the fire.\"\n\n\"Okay,\" you say, \"so what happens next?\"\n\n\"Well,\" he replies, \"There are a few different ways of going about this.  We have good intel, so that's going to help.  And I tell you, my friend, you're going to need all the help you can get.\"  He pauses for a second, then says, \"I hope you're up for this.  I wouldn't want to see you get hurt.\"\n\n\"Yeah,\" you say, taking a deep breath.  \"Me either.  What are my options?\"\n\n\"Option one is a full-on frontal assault.  You go in with guns blazing.  Our contact has stashed two submachine guns with silencers in the fire extinguisher closet on the next floor down.  That's as far as this stairwell is going to take you.  Trust me, you're going to need all the extra firepower you can get.  You have to make it down to the 50th floor.  That's where you'll have a clean shot across the atrium into the target's office.\"  \n\n\"Okay, and option two?\"\n\n\"There's an alternate path down from this floor,\" Chuck says.  \"A janitor's entrance where you can access the air ducts.  The ones on this level don't lead directly down, so you'll probably have to get your hands dirty when you emerge and have to find the next duct.\"\n\n\"And the other options?\" you ask.\n\n\"Intel says there's a laundry room nearby,\" Chuck replies.  \"You can get a lab technician's coat, if you think you can swing the lingo, or go for a janitor's uniform if your improv is up to par.\"\n\nYou pause for a second, contemplating the options.  \"Thanks, Chuck, I appreciate the info.\"\n\n\"No sweat,\" he says.  \"Anything for a friend.\"\n\n\"My own personal concierge of death,\" you say with a grin.\n\n\"I aim to please,\" he replies.  You close the mic and decide your course of action.  In the end you opt for:\n\n*choice\n  #A frontal assault and shoot-out.\n    *set ranged_weapons +2\n    You reach the entrance to the 59th floor and find the fire extinguisher cabinet.  Opening it, you see two HK-MP5 submachine guns with silencers.  You grab the weapons and hold one in each hand.  Readying yourself, you:\n    *fake_choice \n      #Throw the door open and dive in.\n      #Throw the door open and run in.\n      #Slowly open the door and hope for the element of surprise.\n      #Open the door and wait for my enemies to come to me.\n    As you're about to make your move, the door is suddenly flung open.  You're confronted by a young, Chinese guard with an unlit cigarette dangling from his lips and a lighter in his hand.  You:\n    *fake_choice\n      #Open fire.\n      #Take him hostage.\n      #Tell him to not move.\n    The guard is faster than you could have ever imagined, raising a pistol with his free hand.  You're just a hair quicker, though, able to press down on the trigger before the guard can get so much as a round off.  Blood sprays, and you toss the guard aside, storming into the room.  There are two more guards but they don't stand a chance, the looks of surprise frozen on their faces as they fall to the ground, lifeless.\n\n    You mentally thank your contact for being able to get the silenced weapons into position, as you're able to catch the security personnel in the next room equally off guard.  Following Chuck's instructions in your ear, you make a hard right, and find another stairwell.\n    *page_break\n    The stairs take you to the 55th floor and you pause for a second to make sure you have enough ammo.  Replacing the half-spent magazines with spares, you say another silent thank you for the intel that prompted your contact to leave extra rounds.\n\n    Cocked and ready to roll, you slam the door open and find a group of guards standing at the ready.  They're all covering different corners of the large room but, as soon as they hear the commotion, they turn their eyes to you.\n\n    You dive, narrowly dodging a hail of bullets.  You return fire, and the guards on one side of the room fall in a heap.  Turning to the other threats, you fire steadily and accurately.  The remaining guards crash to the ground under the onslaught, and you quickly compose yourself, knowing danger you're not out of the woods yet.\n\n    Following Chuck's directions, you find the next stairwell, all the while remarking on how whoever designed the building had their attention set on security.  You know it would do little good in a fire, but the staggered walkways were making your job more difficult.  Opening the door, you just pray that none of the guards had the time to sound the alarm.\n    *page_break\n\n    The 50th floor door opens and immediately, you're grateful that your descent hasn't been reported.  There are ten guards, all big, all deadly looking.  Most have complex tattoos on every visible surface, including their necks and faces.  Thankfully, you still have the element of surprise; you open fire with a barrage of bullets and five are dead before you even make it out of the stairwell.\n\n    The guards are well-trained and lay down suppressive fire.  Caught in a hail of fire, you're forced to take cover.  You dive for:\n\n    *fake_choice\n      #An ornate desk made of thick wood sitting in the corner.\n      #A nearby desk with only a flat surface, thin metal legs, and a chair.\n      #A large podium toward the far side of the room.\n      #A presentation stand just to your side.\n    Your choice seems to be a good one, as the bullets can't reach your flesh.  \n\n    You have very little time to use the make-shift barricade, as the suppressive fire builds to a terrifying crescendo.  You fire at the ceiling and, as expected, there is a brief pause as the guards all look up, following your line of fire.\n\n    You seize the opportunity, laying down a hail of fire of your own.  The guards fall like bowling pins.  You waste no time in moving on, knowing the kill is near.\n    *goto hit \n\n  #A stealthy hand-to-hand assassin approach.\n    *set strength +2\n    You exit on the 60th floor, following Chuck's instructions.  You pass through two large conference rooms with stunning views before you hit your first obstacle.  There's a large, heavy-set guard reading a book as he sits beside the next door you need to pass through.  You:\n    *fake_choice\n      #Rush him and go for a tackle.\n      #Rush him and try to knock him out.\n      #Take a measured approach and then shoot for a takedown when the timing is right.\n      #Take a measured approach and then counterstrike.\n    As you're about to make your move, the guard looks up.  His eyes lock on you and he instantly reaches for his gun.  All of your plans fly out the window as you charge toward the guard.  He's taken aback by your sudden move and, before his shot can go off, you're able to get your hands on him.  A swift uppercut sends the guard crashing to the floor, and you bind his hands and feet with zip-ties, a staple of assassins worldwide.\n\n    Marching through the door, you find the air duct.  It's much smaller than you anticipated, or at least it feels that way once you hop in.\n    *page_break\n    The confines are suffocating.  It feels as if you are crawling through a narrow cave, the walls pressing in on each side.  You shimmy forward in an awkward crawl, the aluminum hindering your movement.  At points, you're forced to wiggle and twist, and, at each bend, there's a moment of panic as you feel you might get stuck.  Claustrophobia is threatening to take you hostage, but your experience and rationality allow you to navigate the ducts without succumbing to fear.\n\n    Feeling like a rat in a maze, you creep down, level after level, winding your way through the piping.  It's almost pitch-black, the only illumination coming from the grating where the air exits, and this only makes things worse.  Still, you tell yourself:\n    *fake_choice\n      #\"Anything for the mission.\"\n      #\"I've been in worse situations.\"\n      #\"It's only temporary.\"\n      #\"I'm not going to die, it's just unpleasant.\"\n    The admonition seems to give you more resolve, because the rest of the way down seems a little easier.  By the time you crawl through the exit on the 55th floor, you're beginning to feel okay.  That's when you see the guards.\n    *page_break\n    Taking a deep breath, you ready yourself.  You silently remove the grating and slip out.  Crouching from the drop, you see two guards, both large and intimidating.  Thankfully, neither is looking your way.  You:\n    *fake_choice\n      #Try to sneak around them to the door by my side.\n      #Grab the nearest guard and use a judo throw to fling her into the other guard.\n      #Apply a rear naked choke and take out one guard quickly before turning to the other.\n      #Try to take out the closest guard unaware with a power strike.\n    You take a step forward to implement your plan but, right at that moment, one of the guards turns.  You register the large snake tattoo on her neck a split second before you see the gun.  You dive forward, catching the woman in the stomach with your shoulder.  She makes a wheezing sound that indicates you've knocked the wind out of her.  \n\n    The other guard is quickly upon you and, digging into the recesses of your martial arts knowledge, you pull a move you haven't practiced in years.  Spinning around, you thrust your leg outward, hitting the guard in the gut with a back kick.  He goes down in a heap, and you quickly zip tie his wrists, as well as the wrists of the other guard who is just beginning to get her wind back.\n\n    Making your way to the next duct, you prepare yourself for another abysmal journey.\n    *page_break\n\n    You pause at the end of the duct work, looking down.  There are three guards intently playing cards.  It's the 50th floor, and you know you are close to your destination.  It looks like the guards will be here for a while, so waiting is out of the question.  There's a latched grate that will let you out almost directly on top of the makeshift game.  Knowing you can get the drop one of them, you decide to take out:\n    *fake_choice\n      #The petite woman with a walkie-talkie.\n      #A large woman with an AK-47 strapped to her back.\n      #The lithe man with two massive blades in his belt.\n    Your choice seems to be a good one.  You're able to take out the guard before anyone else can move.  The guard goes down in a heap, your elbow striking the base of the skull in a crushing blow as you descend.  \n\n    The other two are on you in an instant as you hit the ground.  You kick upward, hitting one in the face and sending the attacker down in a bloody heap.  The last guard is tenacious, clawing at your face with her long, sharp fingernails.  Thinking quickly, you move upward, biting down on her hand.  The guard cringes in agony and that is just enough time for you to strike.  The woman grasps at her throat and gurgles from your blow.\n\n    You make sure all the guards are neutralized, and then move on, knowing the kill is near.\n    *goto hit  \n  #Getting the tech coat and talking your way by security.\n    *set intelligence +2\n    You make your way to the laundry room on the 60th floor, following Chuck's instructions.  The room is massive, and you almost can't believe that the company would put their washing room so high up in such prime real estate.  However, seeing the massive machinery and the piping, you realize just how impractical it would be to have venting from the basement or a lower floor.  With Chuck's guidance in your ear, you make your way to the location of the disguise.  You're so caught up in the directions that you almost run headlong into a guard rounding one of the machines.\n\n    Seeing the stout man staring at you in shock, you decide to:\n    *fake_choice\n      #Attack him physically before he realizes what's going on.\n      #Pull out my gun and shoot him.\n      #Pull out my gun and threaten him.\n      #Talk him down with an excuse.\n    Before you're able to move a muscle, the guard has his gun in hand.  Abandoning all plans, you dive for his gun.  The steel is cold in your hand as you struggle for the weapon.  The guard circles around to your back and reaches out with his free hand, clawing for your face.\n\n    The guard's dagger-like fingernails dig into your flesh as he grasps you tightly.  Wasting no more time, you slam your head backward, and are rewarded with the sound of a sickening crunch.  The guard's hand instinctively releases the pistol and you seize the weapon.  Turning, you see the man clutching at his bloody nose and mouth, and you strike him in the temple with the butt of his own gun, knocking him out.  He goes down in a heap and you use a zip tie, the staple of assassins worldwide, to immobilize him.\n\n    Following Chuck's directions, you find the right tech uniform.  You put on the gear and head toward the elevator.\n    *page_break\n\n    Unlike the ducts or stairwells, the elevator goes straight to the 50th floor.  You take a deep breath as a faint chime lets you know you've reached your destination.\n\n    The door creaks open and, almost immediately, you see about ten pairs of eyes on you.  The guards are staring at you, wondering what to make of this intruder.  You:\n    *fake_choice\n      #Start spouting out angry curses in Mandarin.\n      #Start spouting out angry curses in English.\n      #Appear to be deep in thought as I walk forward confidently.\n      #Appear neurotic and nervous, as if I'm almost onto some life-altering breakthrough that I just can't quite grasp.\n    Your ruse seems to work and the guards turn away.  They seem to be more interested in their prior conversations than in the strange ways of a scientist.  You know that your disguise is the only reason you're able to make the charade so believable, and you're still well into your act as you exit the room into a second one, which is also full of guards.  \n    *page_break\n\n    These guards appear to be angry, their faces contorted into stern expressions.  You notice that many have myriad tattoos on every visible surface, including their necks and faces.  With these guards, you decide to:\n    *fake_choice\n      #Spout out displeasure loudly to myself in Mandarin.\n      #Spout out displeasure loudly to myself in English.\n      #Put my hand to my forehead and appear deep in thought.\n      #Put my hand to my mouth and appear anxious and hurried.\n    The guards give you little notice as you walk forward.  If anything, they treat you with a disinterested respect.  You make your way past them, knowing the kill is near.\n    *goto hit \n  #Getting the janitor's outfit and trying to blend into the background.\n    *set improvisation +2\n    You make your way to the laundry room on the 60th floor, following Chuck's instructions.  The room is gigantic, and you almost can't believe that the company would put their washing room so high up in such prime real estate.  However, seeing the massive machinery and the piping, you realize just how impractical it would be to have venting from the basement or a lower floor.  With Chuck's guidance in your ear, you make your way to the location of the disguise.  You're so caught up in the directions that you almost run headlong into a guard rounding one of the machines.\n\n    Seeing the stout man staring at you in shock you decide to:\n    *fake_choice\n      #Attack him physically before he realizes what's going on.\n      #Pull out my gun and shoot him.\n      #Pull out my gun and threaten him.\n      #Talk him down with an excuse.\n    Before you're able to move a muscle, the guard has his gun in hand.  Abandoning all plans, you dive for his gun.  The steel is cold in your hand as you struggle for the weapon.  The guard circles around to your back and reaches out with his free hand, clawing for your face.\n\n    The guard's dagger-like fingernails dig into your flesh as he grasps you tightly.  Wasting no more time, you slam your head backward, and are rewarded with the sound of a sickening crunch.  The guard's hand instinctively releases the pistol and you seize the weapon.  Turning, you see the man clutching at his bloody nose and mouth, and you strike him in the temple with the butt of his own gun, knocking him out.  He goes down in a heap and you use a zip tie, the staple of assassins worldwide, to immobilize him.\n\n    Following Chuck's directions, you find the janitor uniform.  You put on the gear and head toward the elevator.\n    *page_break\n\n    Unlike the ducts or stairwells, the elevator goes straight to the 50th floor.  You take a deep breath as a faint chime lets you know you've reached your destination.\n\n    The door creaks open, and almost immediately, you see about ten pairs of eyes on you.  The guards are staring at you, wondering what to make of this intruder.  You:\n    *fake_choice\n      #Walk forward confidently like I know exactly where I'm going.\n      #Look around as I move forward, as if I'm looking for anything out of place.\n      #Look around in confusion as I move forward, as if I'm looking for my misplaced mop and bucket.\n      #Look around with apprehension as if it's my first day on the job and I really, really don't want to screw up.\n    Your ruse seems to work and the guards turn away.  They seem to be more interested in their prior conversations than in the manners of a janitor.  You know that your disguise is the only reason you're able to make the charade so believable, and you're still well into your act as you exit the room into a second one, which is also full of guards.  \n    *page_break\n\n    These guards appear to be angry, their faces contorted into stern expressions.  You notice that many have myriad tattoos on every visible surface, including their necks and faces.  With these guards, you decide to:\n    *fake_choice\n      #Be confident, reasoning these are the kinds of guards who value confidence.\n      #Look superior as I walk in, as if I'm inspecting them for any flaws so I can report it to the boss.\n      #Look befuddled and flustered, like I have so much to do and so little time to do it.\n      #Look timid, like I don't want to make a mistake that will upset the boss.\n    The guards give you little notice as you walk forward, the group seeming to ignore you.  You make your way past them, knowing the kill is near.\n    *goto hit \n\n*label hit\nYou're breathing hard—aware of how close you just came to death—when you hear a friendly voice in your ear.  \"That was awesome, my friend, with a capital A.  To be honest, I didn't think you'd make it.\"\n\n\"Appreciate the vote of confidence,\" you reply.\n\n\"Hey,\" Chuck responds, \"you wouldn't like me as much if I wasn't honest.\"  You contemplate his words but he goes on.  \"You're in position now.  Our plant has made sure there's a parachute for you.  It should be to your left.\" \n\nYou follow Chuck's instructions, being careful not to move too fast or step too hard and set off the security alarms.  \"There's also the rifle you'll need,\" he says.  \"The walls are all solid glass, with the same kind of technology we have at our own place.  Once the target enters the room, the walls will go dark, but our techs have hacked the system.  Take the goggles our plant left for you.  With them, you'll have a clear, unobstructed view.\"\n\n\"Excellent,\" you tell him.  Retrieving the rifle and the parachute, you ready yourself.  \"Okay, Chuck, it's showtime.\"\n*page_break\n\nThe view is breath-taking.  Faint wisps of clouds seem to linger in the atrium between the walls of the building.  The effect makes the garden far below seem like it's in the middle of a rainforest.  There's a serene quality to the air, one you know is about to be shattered.  Perching your rifle on one of the desks, you set your sights on the opposing wall.  Then, you wait for your target to appear in the office on the other side of the atrium.\n\nAt first, things go as planned.  The lights flicker on and the windows change to black.  You flip on your counter-intelligence goggles and suddenly see everything with clarity.  [i]It's killing time[/i], you think to yourself.  \n\nThe man is slight, his skin flawless, his face handsome.  His clothing is immaculate, and you wonder to yourself why someone would want this young man dead.  You push those sentimental thoughts aside, knowing you have a job to do.\n\nAs expected, he heads toward the desk and computer at the center of the office.  [i]Workaholic[/i], you think to yourself, placing your finger on the trigger.\n\nHe is at the computer, his face squarely in your sights.  With the calm precision of a professional, you squeeze the trigger.\n*page_break\n\nAt that moment, several things happen at once.  Your finger clenches and the bullet flies free.  The door opens, and a beautiful Asian woman enters.  The target's face alights with happiness.  The glass in front of you shatters and the bullet screams across the courtyard.  There's a split second of sublime anticipation between the duo, a minute of infinite promise.  \n\nThen, the window on the other side of the atrium shatters and the back of the young man's head explodes.  A look of horror overtakes her face,\n*if psychotic_level >= 10\n  so filled with anguish that it tickles the cockles of your heart with delight.\n  *goto drop\n*elseif (righteousness \u003c 45)\n  so heart-wrenching that you want to avert your eyes, but you can't.\n  *goto drop\n*else\n  the sight of it so compelling you cannot glance away.\n  *goto drop\n\n*label drop\nThe woman rushes forward, tears in her eyes.  You cannot hear her scream from this distance, but you're able to read the agony on her face.  She cradles her lover in her arms, tears falling on the mangled ruin of his face.    \n\nFor a moment, you cannot even move.  You stare, transfixed, as the woman screams, her devastation racking her whole body.  Then, she passes her left hand, smeared with blood, across her lips.  She glances skyward, staggering toward the shattered window of the office.  She looks down for a moment, her face a mask of agony and hopelessness.  You feel a chill pass over your body as you realize what is about to happen.  \n*if righteousness \u003c 45\n  Instinctively, you reach out one hand toward her, though you are much too far away to help.  You can only look on in despair \n*if righteousness >= 45\n  From this distance, you can only watch in annoyance\nas the woman hurls herself from the building.\n*if righteousness >= 45\n  [i]She wasn't part of the job[/i], you think to yourself.\n*comment\n\nShe falls like a stone, showing no resistance.  Dressed in all white, she falls ever so elegantly, a hurtling snowflake rushing toward the unforgiving earth. \n\nHeart pounding, you turn away.  You run from the kill zone, toward the window where you're supposed to make your jump.  Unable to focus properly, you go into autopilot, shooting out the glass in front of you.  Leaping through the opening and into the cold air, your thoughts are with the beautiful, young couple, and the grievous leap of the heartbroken woman. \n\n*page_break\nThe rest is a blur: your parachute pulled at the last second, the jolt in your knees you hit the ground, the bribed extraction from a private airport.  None of it means much.  As your eyelids flutter in deep R.E.M. sleep, all you can see are the faces of those two, young lovers, their hopes and dreams shattered by a single bullet.\n*return", "choicescript_description": "Travel the world, meet interesting new people, and assassinate them for money!\n\n[i]It's Killing Time[/i] is an ultra-violent 140,000-word interactive novel by Eric Bonholtzer, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nEarn respect, reputation, and wealth as a hired assassin. You'll be dressed to kill, driving an exotic car with outlandish weapons in the trunk.\n\nBut in the glamorous, fast-paced world of murder-for-hire, you can never know who to trust and who's gunning to take you out. Who will betray you? Whom will you betray?\n\nWill you be a spiritual hitman or hitwoman, a ruthless assassin, a total psychopath, or a righteous killer? The choice is yours.\n", "choicescript_stats": "\nName: ${name}\n*line_break\nSobriquet: $!{the_nickname}\n*stat_chart\n  percent strength Strength/Hand-to-Hand\n  percent ranged_weapons Ranged Weapons\n  percent intelligence Intelligence\n  percent improvisation Improvisation\n  opposed_pair Righteousness \n    Ruthlessness \n  opposed_pair Loved\n    Feared\n  opposed_pair Passion\n    Discipline\n  percent psychotic_level Psychotic Level\n  text respect Respect\n  text money Money\n  text heat Heat\n  text extreme_kills Extreme Kills\n  text innocents_killed Innocents Killed\n  text wounds Wounds \n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game, including the thrilling conclusion!\n\n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n", "colombia": "*temp worker\nThe heat is unbearable but the wait is even worse.  Your clothing sticks to your skin.  Beads of sweat run down your forehead.  But that's not what's bothering you.  Something about this just feels wrong.  \n\nOutwardly, everything seems fine, which makes it all the more unnerving.  Standing in your homebase for this hit, a small, thatched hut deep in the heart of the Colombian rainforest, you can hear every sound around you: the crickets, the monkeys, the far-off streams.  From your hiding spot, no one could creep by without your knowing but there is a distinct feeling of being watched, compromised.  \n\n[i]It's because this is the second time Jones has called to say that the target has encountered a delay[/i], you think.  That was unusual, and unusual is usually bad.  Typically, the hits run smoothly and your orchestrator never has to call.  This is a very bad sign.\n\nGoing over to the glassless window, you check the sight of your sniper rifle again.  It's lined up with precision.  You're about to step back and wait when you see the target emerging from his compound.  You recognize General Julio Cortez immediately.  A squat, balding man in full military regalia, Cortez is a druglord who rules this part of the country with an iron fist.  Eyeing Cortez, a man who has built an empire upon the corpses of his enemies, how do you feel?\n*choice\n  #I can't wait to rid the world of a monster like him.\n    *set righteousness %+5\n    *set passion %+5\n    *goto preshot\n  #He's a paycheck and nothing more.\n    *set righteousness %-5\n    *set passion %-5\n    *goto preshot\n  #He's just the kind of person I aspire to be, and taking him out brings me one step closer to that goal.\n    *set righteousness %-10\n    *goto preshot\n  #Ridding the world of him is an unfortunate, but necessary, evil that will benefit many.\n    *set righteousness %+10\n    *goto preshot  \n\n*label preshot\nIt's almost time. You fix your aim, getting the general in your sights, and tense your finger on the trigger.  You're about to open fire when a young man in faded shorts and a fraying tank top steps between you and your target. From the dirt on his hands and the shabbiness of his clothing, you can tell he's not part of the general's crew.  More than likely, he's a local townsman hired to do some work around the compound.  It doesn't matter who he is; he's blocking your shot.  You can't get a clean bead on the target.  What do you do?\n\n*label shot\n*hide_reuse\n*choice\n  #Pull the trigger and shoot through him. He's collateral damage. \n    Your plans said nothing about a townsman, but you're reasonably confident the bullet from the high-powered rifle will go straight through him and into the target.\n\n    Preparing to squeeze the trigger, you know he's as good as dead.  Exhaling calmly, the crosshairs coming to a perfect stillness, you are ready.  \n    \n    The near-silent report of your rifle shot is masked by the cacophony of rainforest sounds, but you see the deadly effect clearly in your sights.  Blood splatters as the high-velocity shot sears though the man's back.  It enters just between the shoulder blades, slices easily through him, and continues into the target.  \n\n    In tandem, the duo falls to the ground, the entourage of guards dumbfounded.  From the looks on their faces, you can tell that they don't understand what's happening.  They scour the trees and the forest, but you are too far away for them to spot you.  Still, you know it's only a matter of time before they call in reinforcements to search the area and then nowhere in the jungle will be safe.  \n\n    Slipping the rifle back inside the hut, you pull a shade down over the window.  It would take an eagle eye to spot you, but the general's men know the region and use high-powered binoculars. You don't stay alive long in the hitman business by taking chances.  \n    *set righteousness %-5\n    *set psychotic_level %+10\n    *set innocents_killed +1\n    *set heat +1\n    *set worker \"killed\"\n    *goto hit_complete\n  #Wait to see if he moves. He could be an innocent victim, and I don't want to get any more blood on my hands than is absolutely necessary.\n\n    You know this might blow your chances at a clean shot, but it's a risk you're willing to take to spare someone's life.\n\n    It would be so easy to just pull the trigger and end them both with one bullet but that's not your style. Breathing slowly, you steady your hand and wait for any small opening.  The general seems to be explaining something to local man.  \n\n    You keep your aim, waiting for a clean shot that refuses to present itself.  Frustrated, you curse silently to yourself as you see the pair walk over to a heavily armored military truck, the man's body blocking your shot at each angle. \n\n    [i]Move dammit[/i], you order silently.  The general places one foot on the guardrail step as he prepares to climb aboard, the worker still obscuring your view.\n\n    Then you see it—a fleeting moment to strike.  The shot will be difficult and you have only one chance. Still, you don't have the luxury of waiting.  The general opens the door, the metal shielding his body as he begins to climb into the vehicle.  You see his head through the glass window but you steady your hand, aware that the partition is likely bulletproof. Then, for just a split second, his face becomes visible through the crack where the door meets the jamb and you take your shot.\n\n    The bullet rockets from the end of your barrel.  Your aim is true and the shot slams into General Cortez, knocking his lifeless body to the ground.  Pandemonium ensues as the general's shocked guards look in all directions.  Some of the overeager and most frightened fire off a few rounds into the jungle.  The worker looks confused but remains unharmed.  \n\n    Packing up your rifle, you quickly pull a small shade over the window of your hut.  You are far away, but it's always better not to take chances.  A sly smile spreads across your face as you congratulate yourself on another successful kill.\n    *set worker \"fine\"\n    *set righteousness %+5\n    *goto hit_complete\n  #Shoot him in the leg, then take out the target. I'm confident I can get the shots off quickly enough to take out the mark once the man falls out of the way wounded. \n\n    Yes, he'll be scarred for life and maybe he won't be able to work anymore, but it's better than killing him, and you can't risk the target escaping.\n\n    Inhaling, you tense your finger on the trigger, knowing he's about to descend into a world of pain.  Exhaling, you bring the cross hairs to perfect stillness.\n\n    The near-silent report of your rifle shot is masked by rainforest sounds, but you see the effect clearly in your sights.  Blood splatters as the high-velocity shot sears though the man's thigh.  He falls to the ground, writhing in pain.  The general looks around in shock, and this momentary hesitation is all you need.\n\n    With machine-like precision, you chamber another round. A second later, the general is on the ground, dispatched.  \n\n    The entourage of guards stands around dumbfounded.  They scour the trees and forest, but you are too far away for them to spot you.  Still, you know it's only a matter of time before they call in reinforcements, and then nowhere in the jungle will be safe.  Slipping the rifle back inside the hut, you pull a shade down over the window.  It would take an eagle eye to spot you, but you don't stay alive long in the hitman business by taking chances.  \n    *set righteousness %-5\n    *set worker \"injured\"\n    *goto hit_complete\n  #Call my controller for instructions. This is something unforeseen and I don't want to take him out if he's on the \"do not kill\" list. \n    You reach over for the phone before doing anything rash.  Each ring seems painfully long as you try to keep the target in your sights.  Hearing a crackle on the line, you realize just what a bad connection your phone has out here in the jungle. Seeing the target begin to move, you realize that you're going to have to handle this one on your own.  The man is still blocking your line of fire.  You decide to:\n    *goto shot\n\n*label hit_complete\n*achieve firstblood\n*set respect +5\n*page_break\n*if (worker = \"killed\")\n  As you call your controller, Jones, on the phone to schedule your pickup, you debate whether or not to tell him about the unforeseen obstacle.\n  *choice\n    #Tell him.  If I don't come clean with my boss Boris and he finds out, he's going to be a lot more upset.\n      *set respect +5\n      *set boris +5\n      *set passion %-5\n      You know word could get back to Boris, and he probably wouldn't be too happy about the extra heat your action might have generated.  Attracting too much heat gets the authorities on your tail. \n\n      After a few rings, Jones picks up the phone.  \"Wow, it sounds like a war zone out there,\" he says in his mellifluous Southern drawl.  \"We're picking up all kinds of radio chatter.\"\n\n      \"Yeah, well, taking out a general and one of the local townsfolk tends to have that effect.\"\n\n      \"I heard that over the radio.  You're hardcore.  Didn't want to miss an opportunity, huh?\"\n      \n      \"You can't in this line of work,\" you respond, glad that you didn't try lying to him.\n      *goto boss_unhappy\n    #Don't tell him.  What Boris doesn't know won't hurt him.  Besides, I'm given job discretion for a reason.\n      *set righteousness %-10\n      *set passion %+5\n      You know word might get back to Boris but then again, it might not. It's certainly not going to come from you.\n      \n      After a few rings, Jones picks up the phone.  \"Wow, it sounds like a war zone out there,\" he says in his mellifluous Southern drawl. \"We're picking up all kinds of radio chatter.\"\n\n      \"Yeah, well, taking out a general tends to have that effect.\"\n\n      \"And taking out one of the local townsfolk as well,\" he says, and instantly, your stomach sinks.  Almost as if he can read your mind he says, \"What, you didn't think we'd find out?\"  \n\n      For a few tense seconds, you expect some kind of reprimand but instead, Jones says, \"I know you did what you had to do under the circumstances, so I can't fault you there.  That's why you're on the front lines—you have to be ready to make those kinds of decisions.\"\n\n      \"Yup, it's split-second choices,\" you respond.\n      *label boss_unhappy\n      \n      \"The boss isn't going to be too happy because Interpol already has an eye on our team, but I'm sure he respects that you didn't want to risk blowing the hit.  In any event, I've got your ride about ten minutes out.  Just sit tight.  We want to let the bodyguards fan out before making any noise.  Don't worry, we won't forget about you.\"\n\n      Severing oting one of the local townsfolk in the leg tends to have that effect.\"\n\n      \"I heard that over the radio.  You're hardcore.  Didn't want to miss an opportunity, huh?\"\n\n      \"You can't in this line of work,\" you respond, glad that you didn't try lying to him.\n      *goto boss_unhappy\n    #Don't tell him.  What Boris doesn't know won't hurt him.  Besides, I'm given job discretion for a reason.\n      *set righteousness %-10\n      *set passion %+5\n      You know word might get back to Boris, but then again it might not. It's certainly not coming from you.\n      \n      After a few rings, Jones picks up the phone.  \"Wow, it sounds like a war zone out there,\" he says in his mellifluous Southern drawl. \"We're picking up all kinds of radio chatter.\"\n\n      \"Yeah, well, taking out a general tends to have that effect.\"\n\n      \"And planting a bullet in one of the local townsfolk's legs at the same time,\" he says, and instantly, your stomach sinks.  Almost as if he can read your mind he says, \"What, you didn't think we'd find out?\"\n\n      For a few tense seconds, you expect some kind of reprimand, but instead, Jones says, \"I know you did what you had to do under the circumstances, so I can't fault you there.  That's why you're on the front lines—you have to be ready to make those kinds of decisions.\"\n\n      \"Yup, it's split-second choices,\" you respond.\n      *goto boss_unhappy\n    #Make up a half-truth.  There's no rule that says that I have to reveal everything. In combat, things can get out of control.\n      *set improvisation +5\n      *set righteousness %-5\n      After a few rings, Jones picks up the phone.  \"Wow, it sounds like a war zone out there,\" he says in his mellifluous Southern drawl. \"We're picking up all kinds of radio chatter.\"\n\n      \"Yeah, well, it got pretty dicey out there.\"\n\n      \"And I'm sure planting a bullet in one of the local townsfolk certainly did nothing to calm the situation,\" he says, and instantly, your stomach sinks.  Almost as if he can read your mind he says, \"What, you didn't think we'd find out?\"  \n\n      For a few tense seconds you expect some kind of reprimand, but instead, Jones says, \"I know you did what you had to do under the circumstances, so I can't fault you there.  That's why you're on the front lines—you have to be ready to make those kinds of decisions.\"\n\n      \"Yup, it's split-second choices,\" you respond.\n      *goto boss_unhappy\n*else\n  *set respect +5\n  You call your controller, Jones, to schedule your pickup, knowing it's time to get out while the getting is good.  Tensing when Jones doesn't immediately pick up, you mutter a small prayer that your call goes through.\n\n  After what seems like an eternity, Jones picks up the phone.  \"Wow, it sounds like a war zone out there,\" he says in his mellifluous Southern drawl. \"We're picking up all kinds of radio chatter.\"\n\n  \"Yeah, well, taking out a general tends to have that effect.\"\n\n  \"Great job.  Very professional. From what I hear, they didn't know what hit them.\"\n\n  \"Exactly what I was going for,\" you respond.\n\n  \"I've got your ride about ten minutes out.  Just sit tight and he'll come to pick you up.  We want to let the bodyguards fan out before making any noise.  Don't worry, we won't forget about you.\"\n\n  Severing the connection, you stand up and walk over to the small bucket of water in the corner and the dirty, wood-framed mirror hanging above it.\n  *goto mirror\n\n*label mirror\n*page_break\nThe makeshift wash area is primitive—just a mirror fastened to the wall with fraying rope.  Regardless, the water feels refreshing as you splash it on your face, congratulating yourself on a job well done.  Looking into the mirror, you see the reflection of:\n\n*choice\n  #A dignified woman's face.\n    Looking more model than assassin, you love that people underestimate you and that you're the last person they'd suspect of being a hitman, or more aptly, hitwoman.\n    *gosub female\n    *goto hair\n  #An obstinate and ruthless woman's face.\n    Everything you've done in life is reflected in your features.  Your chiseled physique and extreme athleticism are a testament to the fact that you're always at the ready for trouble because it always seems to come your way.\n    *gosub female\n    *goto hair\n  #An otherwise nondescript, average woman's face.\n    Nothing about your appearance is particularly noteworthy which is just the way you like it. It can be a tremendous asset to blend in, so you've taken great pains to look like average, run-of-the-mill citizen.\n    *gosub female\n    *goto hair\n  #An elegant man's face.\n    Looking more model than assassin, you love that people underestimate you and that you'd be the last person they'd suspect of being a hitman.\n    *set gender \"male\"\n    *goto hair\n  #A craggy, harsh man's face.\n    Everything you've done in life is reflected in your features.  Your chiseled physique and extreme athleticism are a testament to the fact that you're always at the ready for trouble because it always seems to come your way.\n    *set gender \"male\"\n    *goto hair\n  #An otherwise nondescript, average man's face.\n    Nothing about your looks is particularly noteworthy which is just the way you like it. It can be a tremendous asset to blend in, so you've taken great pains to look like average, run-of-the-mill citizen.\n    *set gender \"male\"\n    *goto hair\n\n*label female\n*set gender \"female\"\n*set pc_he \"she\"\n*set pc_him \"her\"\n*set pc_his \"her\"\n*return\n\n*label hair\nYou also see:\n*fake_choice\n  #Piercing, blue eyes.\n  #Penetrating, brown eyes.\n  #Magnetic, hazel eyes.\n  #Cool, gray eyes.\n\nDipping your hands back under, the water you:\n*fake_choice\n  #Run my hands through my close-cropped hair.\n  #Run my hands through my long, flowing locks.\n  #Run my hands through my average-length hair.\n\nLooking into the mirror, you:\n*choice\n  #Continue to study my reflection.\n    *goto body_choice\n  #Turn away.\n    *goto gunfire\n\n*label body_choice\nLooking at your reflection, you see:\n*fake_choice\n  #A body that's fit and toned.\n  #An average body, nothing really setting my physique apart.\n  #A body that's incredibly thin.\n  #A hugely muscular frame.\n  #A plump, somewhat rotund body.\n    *set rotund true\n\nAs you stare at your body, you contemplate tattoos and think:\n*fake_choice\n  #I'm glad I've decorated my body so readily with art.\n    *set passion %+5\n  #I like ink in moderation; the few tattoos I have all represent memories for me.\n    *set passion %+5\n  #I'm glad I only have one tattoo because it makes it more special.\n    *set passion %+5\n  #I'm glad I've never gotten a tattoo because it could identify me.\n    *set passion %-5\n  #Tattoos aren't my thing right now. Maybe in the future.\n    *set passion %-5\n  #I don't think I'll ever get a tattoo.\n    *set passion %-5\n\n*page_break\n*label gunfire\nHearing a burst of gunfire and frantic calls in Spanish, you rush to the window, instinctively reaching for your rifle.  Gently pulling the shade open a sliver, you see only the tropical forest.  [i]Just an aural trick of the rainforest[/i], you think.  Still, the lush green landscape is now alive with the sounds of nature and man.  [i]Too close for comfort[/i], you warn yourself.\n\nWanting to be ready as soon as your pickup arrives, you disassemble the sniper rifle and put it back in your briefcase.  The case is genuine Italian leather, a present from Boris after your first hit with the Syndicate.  He even had it inscribed.  Running your fingers over the brass engraving, you read the name:\n*if (gender = \"male\")\n  *choice\n    #Jake.\n      *set name \"Jake\"\n      *goto post_name\n    #Salvador.\n      *set name \"Salvador\"\n      *goto post_name\n    #Remy.\n      *set name \"Remy\"\n      *goto post_name\n    #Logan.\n      *set name \"Logan\"\n      *goto post_name\n    #Uriah.\n      *set name \"Uriah\"\n      *goto post_name\n    #Conner.\n      *set name \"Conner\"\n      *goto post_name\n    #Hiro.\n      *set name \"Hiro\"\n      *goto post_name\n    #Drake.\n      *set name \"Drake\"\n      *goto post_name\n    #Javier.\n      *set name \"Javier\"\n      *goto post_name\n    #Tyrese.\n      *set name \"Tyrese\"\n      *goto post_name\n    *if not(choice_randomtest)\n      #Something else.\n        *goto different_name\n*else\n  *choice\n    #Sandy.\n      *set name \"Sandy\"\n      *goto post_name\n    #Eve.\n      *set name \"Eve\"\n      *goto post_name\n    #Angel.\n      *set name \"Angel\"\n      *goto post_name\n    #Victoria.\n      *set name \"Victoria\"\n      *goto post_name\n    #Rose.\n      *set name \"Rose\"\n      *goto post_name\n    #Jada.\n      *set name \"Jada\"\n      *goto post_name\n    #Kate.\n      *set name \"Kate\"\n      *goto post_name\n    #Carol.\n      *set name \"Carol\"\n      *goto post_name\n    #Lucia.\n      *set name \"Lucia\"\n      *goto post_name\n    #Mako.\n      *set name \"Mako\"\n      *goto post_name\n    *if not(choice_randomtest)\n      #Something else.\n        *goto different_name\n\n*label different_name\n*input_text name\n\nYour name is ${name}, correct?\n*allow_reuse\n*choice\n  #Yes.\n    *goto post_name\n  #No.\n    *goto different_name\n\n*label post_name\n*page_break\nYou smile to yourself, thinking of your boss, Boris, and his tongue-in-cheek humor, as you see your nickname etched into the inside of the briefcase.  It's written in beautiful calligraphy, but the perfect lettering is set atop a blood-red backdrop. Staring at the script, you relish the thought of your nickname:\n*choice\n  #The Hammer.\n    *set nickname \"Hammer\"\n    *set the_nickname \"the Hammer\"\n    *goto post_nickname\n  #The Viper.\n    *set nickname \"Viper\"\n    *set the_nickname \"the Viper\"\n    *goto post_nickname\n  #Ice.\n    *set nickname \"Ice\"\n    *set the_nickname nickname\n    *goto post_nickname\n  #Hardcore.\n    *set nickname \"Hardcore\"\n    *set the_nickname nickname\n    *goto post_nickname\n  #Quicksilver.\n    *set nickname \"Quicksilver\"\n    *set the_nickname nickname\n    *goto post_nickname\n  #The Beast.\n    *set nickname \"Beast\"\n    *set the_nickname \"the Beast\"\n    *goto post_nickname\n  #Raven.\n    *set nickname \"Raven\"\n    *set the_nickname \"the Raven\"\n    *goto post_nickname\n  #Fury.\n    *set nickname \"Fury\"\n    *set the_nickname nickname\n    *goto post_nickname\n  #The Wolf.\n    *set nickname \"Wolf\"\n    *set the_nickname \"the Wolf\"\n    *goto post_nickname\n  #The Shadow.\n    *set nickname \"Shadow\"\n    *set the_nickname \"the Shadow\"\n    *goto post_nickname\n  *if not(choice_randomtest)\n    #Something else\n      *goto different_nickname\n\n*label different_nickname\n*input_text nickname\n\nYour name is ${nickname}, correct?\n*allow_reuse\n*choice\n  #Yes.\n    *set the_nickname nickname\n    *goto post_nickname\n  #No.\n    *goto different_nickname\n\n*label post_nickname\nYou indulge in a moment of nostalgia as you remember when Boris first bestowed the handle lovingly upon you.  \"That was some impressive work,\" he'd told you, a broad grin on his face and an ever-present cigar dangling from the corner of his mouth.  You had just returned from a harrowing mission—one that had tested your limits from start to finish. You may have come out on the other side bruised and battered, but you came out nonetheless. Boris had been impressed.  \"I think after that display of skills, I'm going to call you '${the_nickname}'.\"\n\nIt was a proud moment, and you still take pride in remembering what you liked best about the mission:\n*choice\n  #The way my carefully crafted game plan was executed.\n    You smile as you recall dropping from the ventilation duct.  You spent hours shimmying up and then moving into position.  It was hot and sweaty work, and your clothes were soaked before you finally made it into the right spot.  \n\n    In the end, your knowledge of schematics and ability to short circuit the security enabled you to bypass the bulk of the security force.  You dropped down directly into the target's bedroom. The mark never knew what hit him—a quick and silent kill with no more force than necessary.\n\n    The smile on your face only grows broader as you remember the look on Boris's face when you told him how you'd done the job.  There was a gleam of pride in his eyes.  Recalling it now, you can almost hear the compliments on your intelligence as if Boris was standing next to you.  \n\n    You remember the other facets of the mission as well: the times when your hand-to-hand combat skills were required, the precise, long-ranged shots you fired off masterfully, and your ability to think quickly on your feet.  It was the whole operation, and the combination of your skills, that earned you the nickname \"${the_nickname}\".\n    *set intelligence +5\n    *goto skill2\n  #The way my quick thinking saved the day.\n    You almost chuckle as you think that even the best laid plans sometimes go awry.  While scouting for the back entrance to a drug kingpin's lair, you almost bumped headlong into two of his well-armed guards.  Even worse, they had radios.  Knowing that use of force could blow the mission, you quickly came up with a cover story.\n\n    Telling the duo you were scouting a set location for a new blockbuster feature film, you hinted that you were looking for people to play security guards.  Playing to their vanity had worked, and you took down both of their numbers before gliding past them. The two were still discussing their future stardom as you made your way into the building.\n\n    You smile to yourself as you remember the look on Boris's face when you'd told him about your quick thinking.  There was a gleam of pride in his eyes.  Recalling it now, you can almost hear the compliments on your quick thinking as if Boris was standing next to you.  \n\n    You remember the other facets of the mission as well: the times when your hand-to-hand skills were required, the precise, long-ranged shots you fired off masterfully, and your vast intelligence.  It was the whole operation, and the combination of your skills, that earned you the nickname \"${the_nickname}.\"\n    *set improvisation +5\n    *goto skill2\n  #The brawny way I overcame the odds, and a group of bodyguards, in the process.\n    A sly grin crosses your face as you remember getting the surprise of your life on a mission in Germany.  You entered a castle great room in the Bavarian Alps—it was the main keep where the target was staying—but after you threw the doors open, you ran into five burly, inebriated, German bodyguards.  \n\n    Seizing the element of surprise, you upended the table where they had been playing cards.  In one fell swoop, you knocked a guard senseless with his own pewter stein.  Then, you closed in on another guard, faking a takedown and landing a brutal head kick as he tried to sprawl out of the way.  \n\n    A spinning backfist knocked a third guard senseless.  Just as two more bodyguards made their way around the table, you hefted a chair at one before landing a beautifully timed counter left hook on the other.  Four down and one to go, it was straight jiu-jitsu from there as you executed a single leg takedown and immediately moved into mount position.  A head and arm choke was next as you parted the last guard from consciousness.\n\n    You can't help but remember the look on Boris's face when you'd told him about how you'd single-handedly taken out five large guards without suffering so much as a scratch in the process.  There was a gleam of pride in his eyes.  Recalling it now, you can almost hear the compliments on your strength and agility as if Boris was standing next to you.  \n\n    You remember the other facets of the mission as well: the times when quick thinking was required, the precise, long-ranged shots you fired off masterfully, and your intelligence.  It was the whole operation, and the combination of your skills, that earned you the nickname \"${the_nickname}.\"\n    *set strength +5\n    *goto skill2\n  #The way I smoked a group of gung-ho gunslingers with my quick trigger finger.\n    A warm sense of satisfaction slowly fills you as you recall a standoff that would make any cowboy or desperado proud.  After a wild car chase through the winding coastline roads of Monte Carlo, your vehicle had been forced off the path and into the woods.  At that point, you'd still been uncertain which hurt more—the impact from your head hitting the airbag or the fact that the brand new Lamborghini was wrapped around a tree.  \n\n    You were more than a little disorientated when you stumbled out of the car, only to be greeted by four mean-looking thugs with 9mm Glocks pointed in your direction.  As they screamed for you to drop your weapon, you made a purposeful attempt at looking defeated, your motions extra slow.  Then, without warning, you flung yourself to the ground.  Twisting smoothly into a side roll, you unleashed your wrath, spraying a hail of gunfire at your would-be attackers.  Two took gunshot wounds to the knees—their shots went wild as they discharged their firearms into the air.  Using the car door as a shield, you capitalized on your pinpoint accuracy, making short work of the other two threats.\n\n    Presently, there's a smile on your face that only grows broader as you remember the look on Boris's face when you'd told him about your feat of unbridled marksmanship.  There had been a gleam of pride in his eyes.  Recalling it now, you can almost hear the compliments on your ranged weapons skills.  \n\n    You remember the other facets of the mission as well, the times when your hand-to-hand skills were called upon, the precise, long-ranged shots from afar, and your intelligence.  It was the whole operation, and the combination of your skills, that earned you the nickname \"${the_nickname}.\"\n    *set ranged_weapons +5\n    *goto skill2\n\n*label skill2\n*page_break\nYou break away from your reverie, conscious of the present danger. Putting the rifle away and closing the case, you check your watch.  Five minutes to go.  [i]At least five minutes[/i], you think to yourself.  Jones assured you that your pickup was known for reliability but the backroads and jungles of Colombia weren't.  \n\nHearing the sounds of the search party in the distance, you ready yourself in case you need to make a break for it.  According to the files, General Cortez had this area monitored with radar and your so-called extraction team was forced to wait at a significant distance.  It had been hard enough to bribe a local to use his small hut; considering what the Syndicate had paid him in the end, though, you're certain he won't be coming back to the jungle anytime soon.  You shake the thought away and refocus on the problem at hand: they're closing in on you and your ride still isn't here.\n\nYou take another peek through the window and, seeing a flash of muzzle fire in the distance, you quickly drop down.  Your heart is racing but you masterfully steady your breath.  Hearing no shouts of alarm, you cautiously peer back out the window, ready to take action.  You see no one in the jungle, however, and realize it must just be another trigger-happy soldier.  Even if that is the case, the sight and sound are vivid reminders of the danger you're in, and you wish your driver would pick up the pace.  [i]Hurry up Hector[/i], you think.  \n\nKnowing that sitting around worrying will do you no good, you have to decide how to occupy your time until your pickup arrives.  When you have to spend time waiting, you normally: \n*choice\n  #Get a little exercise.\n    You drop to the ground and begin a quick set of pushups.  The tried and true regimen of classic calisthenics keeps you in shape and requires minimal space.  \n\n    Sit-ups are next, followed by lunges and squats.  By the time you're done, your muscles burn pleasantly. Enjoying the familiar release of calming endorphins, you're glad you took the opportunity to get in a quick workout.\n    *set strength +5\n    *goto pickup\n  #Practice my marksmanship. \n    You spend the next few minutes practicing your quick-draw.  You practice diving rolls while taking aim, as well as duck-and-cover maneuvers.  \n\n    You spend a little time practicing quick reloads and then give your gun a thorough cleaning.  The routine is the next best thing to a firing range, and you always find it soothing.\n    *set ranged_weapons +5\n    *goto pickup\n  #Read and study.\n    You pull a small paperback from your briefcase and sit down to immerse yourself in it.  The book is in Spanish—you find that reading books in other languages is a great way to keep your linguistic skills sharp.  \n\n    Time flies by as you read, and you feel good that you took the time to stimulate your mind.\n    *set intelligence +5\n    *goto pickup\n  #Meditate and get in touch with my surroundings.\n    You sit down on the ground and cross your legs into a half-lotus.  You focus on your breathing, concentrating on each inhalation and exhalation, not allowing your mind to wander.  \n\n    After a few moments, you feel a sense of peace and tranquility flow over you, the rapid-fire thoughts of your imagination stilled for the moment.  Savoring the sensation, you begin to run scenarios through your head, the distant state of a meditative mind helping you to focus on the dangerous situations you envision yourself in.  Releasing one last, deep exhalation, you're glad you took the time to clear your mind and gain focus.\n    *set improvisation +5\n    *goto pickup\n\n*label pickup\n*page_break\nThe sound of a vehicle outside draws your attention and you quickly grab your briefcase.  You take one last glance to be sure you've left nothing behind.  Satisfied that you've cleaned up any remnants of your visit, you hurry out the door, keeping a pistol in hand.  \n\nBefore running outside, you cautiously peer around the corner, making sure the new arrival is an ally and not an unexpected visitor looking to pump you full of lead.  You spy Hector in an open-air jeep—your ride has arrived.  Scanning the forest, you make sure there are no prying eyes and, more importantly, no guns pointed in your direction before you make a fast break for the jeep.\n\nGrabbing onto the roll cage, you don't even bother to open the small door before vaulting in.  Hector has a wide grin, running his tongue over a gold tooth.  \"Good to see you, my friend,\" he says.\n\nYou wonder what took him so long, when he knows full well each moment of delay puts your life in peril. Honestly, you feel like reaching over and strangling him.  Hector, on the other hand, seems genuinely happy to see you and unaware there's any problem with his timing.\n\nHe seems to be waiting for some kind of response, so you say:\n*choice\n  #\"Every second I was in that hut was a second the enemy got closer to finding me. The next time you do something to put my life in jeopardy, it's going to put your life in jeopardy, if you catch my drift.\"\n    Hector swallows uncomfortably, but nods, and you can see respect mixed with fear in his eyes.  Knowing that sometimes the situation calls for a hard line, you're pleased you let him know exactly how you feel.  Hector offers no response but you can tell the message has been received.\n\n    After letting the import of your threat sink in for a moment, you nod.  \"Let's go.\"\n\n    \"Sorry, the jeep's been giving me problems,\" he says at last, as if offering some sort of explanation.  You don't like the the sound of that one bit.\n\n    \"Just go,\" you tell him, pushing the jeep's condition from your mind.\n\n    Hector doesn't object as he slams down the accelerator, speeding you both into the jungle.\n    *set loved %-10\n    *goto barricade\n  #\"You take some time to go sightseeing?  That's not t ctor asks, and you nod.\n\n    Hector says nothing further but slams his foot on the accelerator, speeding off into the jungle.\n    *set loved %+10\n    *goto barricade\n\n*label barricade \n*page_break\n\nFrom inside the jeep, you try to enjoy the verdant rainforest as it whizzes by, but you can't shake the ever-present sense of danger.  You're reasonably sure Cortez's henchmen are probably still engaged in their fruitless search around the compound, but you also know from your research that the general's web is large, and his soldiers have a long reach.  \n\nYou pass a few cars going the opposite direction, and each time you see a military vehicle, you slink down in your seat.  You see intent looks on the faces of the occupants, but not one even bothers to glance in your direction.  Another wagon full of soldiers passes by without so much as a head turned in your direction, and you start to feel a little better.  That's when you see the roadblock up ahead. \n\nTwo jeeps and an old army truck block the dirt path to the airport, each with high-powered weaponry aimed in your direction.  You know that you're far enough off that they probably haven't gotten a good make on you yet.  Hector looks at you for direction.  You have only a split-second to decide what you want to do:\n\n*choice\n  #I lean over and press my foot on the gas.  Let's ram this barricade!\n    *if (strength > 5)\n      Pressing the pedal to the metal, your heart lurches as the jeep gains speed.  The weapons-laden barricade is coming up quickly but you don't let up.  Hector looks at you like you're crazy, but you hold strong.  \n\n      As you're almost upon the barricade, the soldiers blocking your path open fire.  You sense you're going to make it when, suddenly, you find Hector struggling with you.  He's lost his nerve and is panicking, fighting with you for control of the wheel.\n\n      You muscle Hector out of the way and he barely hangs on as you guide the jeep into the collision.  It's a ten
