plain fact of the matter is you don't know who [i]you're[/i] dealing with,\" you say, firing one shot into each kneecap.  Your weapon may be silenced but the man sure isn't.  Grabbing a nearby pillow, you shove it into the man's mouth.\n\n              The agent continues with muffled screams, and you let him agonize for a few moments longer before finishing him off.\n\n              The next hour consists of taking the agent's corpse to a funeral home that has a pre-arranged agreement with the Syndicate.  That's an hour you'll never get back.  You return home, exhausted.\n              *set psychotic_level %+5 \n              *set heat +1\n              *set money +1000\n              *goto apartment\n\n        *else\n          You rush toward the Interpol agent, diving for a double-leg takedown.  Unfortunately, you're out of practice, and the move isn't quick enough.  \n\n          You grab his legs, but the move is telegraphed and he's able to sprawl out, pressing his weight onto you.  You fall back on deeply honed jiu-jitsu, and are able to scramble into the guard position.  \n\n          Not hesitating, you kick off with your feet, planting them on his hips and pushing back.  You're able to get to your feet, but the agent opens fire.\n          *gosub_scene util health_check_regular\n\n          You feel searing pain in your leg, but you manage to wade forward anyway, grabbing the gun with one hand and deflecting it before he's able to get another shot off.  An elbow to the solar plexus is next, and he goes down, wheezing and grasping at his chest.\n\n          Pointing the gun at the Interpol agent, you say softly, \"You have two choices.  One, you get out of here and never come back, or two, I pull the trigger and you become a bloodstain on my floor.\"  \n\n          Pressing the cold steel against his flesh, you see the fear register in his eyes.  \"So what's it going to be?\" you ask.\n\n          He continues to wheeze, but after a minute he sputters, \"I'll leave.\"\n\n          You nod, conscious of the growing pool of blood on your clothing.  \"Okay, but there are terms.  First, you give me your wallet.  I want your ID so you know I can find you.  And I assure you, I'll have someone keeping a copy of your information in case you somehow get the drop on me.  Second, I want you to make sure my record stays clean, understood?\"\n\n          He nods and you let him up.  Taking his wallet and gun, you show him to the door.\n          *page_break  \n\n          Once he's gone, you breathe a sigh of relief. You even smile as you see he has $1,000 cash in his wallet.  Then, the sharp stab of pain in your leg draws you back to your wounds.\n          *goto wound_apt\n    #Fight.\n      *goto fight\n\n\n*else\n  You somehow stagger to the bed, and flop down on it unceremoniously.  Within seconds, you're asleep, fatigue washing over you and enveloping you like a blanket. \n  *goto morning\n\n*label wound_apt\nThe flow of blood is bad but, peeling back your clothes, you realize that it isn't quite as bad as you'd thought.  \n\nThe bullet went in and out cleanly.  You head to a cabinet to fetch your first aid materials and set to work.  You clean and dress the wound and, as soon as you're done, you feel the heavy onset of fatigue sweep over you.\n*goto apartment\n\n*label apartment\nYou somehow stagger to the bed, and flop down on it unceremoniously.  Within seconds you're asleep, fatigue washing over you and enveloping you like a blanket.\n*goto morning\n\n*label morning\n*page_break\nIt feels like déjà vu.  The beams of light are streaming through the blinds, and the display on your phone has numerous missed calls.  \n\nThis time, you didn't bother setting the alarm because there was nothing in particular you had to get up for.  Or so you thought.  Judging from all the missed calls, it seems like someone feels differently.  You look down and see the calls are from Boris's number, and you feel an icy panic in your stomach.  \n\nDespite all the missed calls, there's only one message.  You wince a little in anticipation as you hit the touchscreen and listen to the message.\n\n\"${name}, it's Boris. There's trouble and I need to tell you what's going on,\" he says, and the tremor in your gut only intensifies as you detect the edge of panic in your normally stoic and unflappable boss's voice. \"Chuck's body has been found in the LA River.\"  \n*page_break\nYou pause the message, gripping the phone tightly, picturing your friend's body lying out in the vast, concrete waterway of the LA River.  Due to the ongoing drought, the man-made structure is nearly bone dry; someone wanted Chuck's body to be found.  Rage overtakes your sorrow, and you realize that there will be time to grieve later.  Now, it's time for action.  \n\nPressing the button on your touchscreen, you let the message play on, \"I know it's terrible, and even more so because he was your friend, but the bad news doesn't stop there.  It's too early to know for certain, but no one can reach Marie, and you know how responsible she is.\"  \n\nYou press the button again, this time finding it hard to keep your hands from trembling.  Marie is known for her reliability; if she is missing, she is almost certainly dead.  If it were Dante, there would be a chance that he'd decided to go off on an alcohol-fueled bender and wound up in Vegas or some other den of sin, but Marie just wasn't that type.  \n\n[i]It's like these monsters know us inside and out[/i], you think to yourself. They knew Chuck was a loose cannon, so they made sure his body would be found, but they also knew that, with Marie, all they had to do was make sure she didn't call in to work.  The thought is more than troubling.  \n*if martinez \u003c= 50\n  The suspicious side of you also considers your teammate Miller, and that notion is even more disturbing.  There was no love lost between Chuck and Miller and the newest Syndicate member also knew all the intimate details of the team.  Pushing the idea aside for the moment, and adding\n*if martinez > 50\n  Adding \nMarie's death to your list of blood-debts, you once again push the button on your phone.\n\n\"I wish that was all the horrible news,\" you hear Boris say and your stomach sinks even further.  \"Dante also hasn't reported in.\"  \n*page_break\nYou shake your head slowly and sadly, hoping there is some other explanation but, with Marie also missing, you know the odds are slim.  \"I don't have to tell you this is not good,\" Boris's message continues. \"I'm putting the whole team on high alert.  It's very clear to me someone is after us and I think it might be the Fallen Angels.\n\n\"I'm going to order a mandatory training session tomorrow at 9AM sharp at our gym to go over some anti-terror counter-intelligence maneuvers for half of our crew, then 10AM for the other half,\" Boris goes on. \"After that, we're going to meet to discuss our options.  You're in the first group.  Today, though, I need to get some things checked out, so the office will be closed.  It's probably best if we avoid being all together until I get some more information anyway.  Tomorrow, 9AM…until then be safe, ${nickname}.\"\n\nThe message finishes, and you decide to call Boris and tell him:\n*fake_choice\n  #I think the best option is to go on the offensive.\n    *set passion %+10\n  #I think the best option is to search for Dante and Marie.\n    *set passion %+5\n  #I agree his plan is the best option.\n    *set passion %-10\n  #I think the best option is to start training hard immediately.\n    *set passion %-5\n\nGearing up to talk to your boss, you punch in the number.  The line goes straight to his voicemail and a message tells you that his mailbox is full.  Feeling frustrated and powerless, and not wanting to dwell on the loss of Chuck, and probably Marie and Dante, you decide that the only way you're going to take your mind off of the situation is to force your body into motion.  With that thought in mind, you decide to:\n\n*gosub_scene util downtime\n\n*if (righteousness > 65)\n  *set chris_rapport %+15\n*if (passion > 65)\n  *set ben_rapport %+15\n*if (loved > 65)\n  *set sam_rapport %+15\n\n*page_break\nIt's not even dusk yet, but your living room feels dark.  Even after all you've done today, you can't shake thoughts of your fallen teammates.  \n\nYou stare at a picture of you and Chuck for a moment before rising from the couch.  Dragging yourself to the kitchen, you open the pantry and pull out a bottle of Glenlivet.  The single malt scotch reminds you of a trip you took years ago with Chuck, to Edinburgh and Ireland.  Pouring a double shot neat, you stare at the amber, earthy liquid.\n\n*fake_choice\n  #Drink it.\n  #Leave the drink.\n  #Drink it quickly and pour myself another.\nYou are happy with the decision and leave the kitchen feeling a little better.  \n\nSinking down on your couch, you think of what you want to do for the rest of the night.  The night is young and it could be a nice distraction to go on a date.  You decide to:\n\n*choice \n  #Call ${ben} and ask ${bhim} out.\n    *set second_date 1\n    *set second_date_name ben\n    *set second_date_nick ben_nick\n    *if first_date = 1\n      *set ben_rapport %+5\n      *label invite_twice\n      After your last date with ${second_date_name}, you know there might be some kind of connection there, and you reach for your phone to give ${bhim} a call.  You're practicing what you'll say to ${second_date_name} when the sound of footsteps outside stops you cold.  \n\n      In your head, you picture your door being kicked open, a slew of Fallen Angels, tattoos covering their bodies, bursting in.  Then, the footfalls pass and you take a deep breath.  Shaking your head, you know you're just being jumpy and you try to focus on your call to take your mind off of everything going on.\n\n      You can hear a smile in ${second_date_name}'s voice when ${bhe} realizes it's you.  \"Hey, ${name}, you must be a mind-reader, I was just thinking about you.\"\n\n      As much as you try to fight it, you find yourself blushing.  \"Really?\"\n\n      \"Yes,\" ${bhe} replies, \"I had such a great time the other night.\"\n\n      \"I did, too,\" you say.  You pause, unable to continue for a minute.  \n      *label wrap\n      \"Listen,\" you go on at last, \"I don't want to sound paranoid, but what's going on worries me.  I mean, Chuck, now Dante and Marie…it's like our whole world is collapsing.  And I'd hate for anything to happen to you.\"\n\n      You pause for a second, expecting an awkward response, but instead, you find yourself surprised.  \"That means a lot to me,\" ${bhe} says, \"but I'm tough, it's going to take a whole lot to take me out.\"\n\n      You laugh, \"That's what I like to hear.  Still, I'd like to meet up.\"  You go on, \"I'm feeling really lost right now, and I'd like to spend some time with you.\"\n\n      \"Of course,\" ${bhe} says.\n\n      \"I know Boris said we're not supposed to be seen together,\" you start. \"But I feel like I really need to see you.\"\n\n      \"I want to see you, too,\" comes the reply.  Despite all the grave things going on, you feel your heart flutter.  \"Where do you want to go?\"\n\n      \"The pier,\" you say. \"Huntington Beach.  We should do burgers on the end of the dock, enjoy the waves.\"\n\n      In your head, you picture the warped wood of the dock, the salty spray of the ocean, the fresh scent of the breeze as it assaults your nostrils with its clean, pure smell.  \"It's a date,\" ${bhe} says with a smile in ${bhis} voice.\n      *goto dinner\n    *else\n      *set ben_rapport %+5\n      *label invite_first\n      You're gripping the phone in hand when the sound of footsteps outside stops you cold.  \n\n      In your head, you picture your door being kicked open, a slew of Fallen Angels, tattoos covering their bodies, bursting in.  Then, the footfalls pass and you take a deep breath.  Shaking your head, you know you're just being jumpy and you try to focus on your call to take your mind off of everything going on.\n\n      You can hear a smile in ${second_date_name}'s voice after realizing it's you calling.  \"Hey, ${name}, how's it going?\"\n\n      \"I guess as good as can be with everything going on,\" you reply.  The next few minutes are spent making small talk and hashing out theories of just who might be coming after your crew.  Finally, you begin to open up more.\n      *goto wrap\n  #Call ${sam} and ask ${shim} out.\n    *set second_date 3\n    *set second_date_name sam\n    *set second_date_nick sam_nick\n    *if first_date = 3\n      *set sam_rapport %+5\n      *goto invite_twice\n    *else\n      *set sam_rapport %+5\n      *goto invite_first\n  #Call ${chris} and ask ${chim} out.\n    *set second_date 2\n    *set second_date_name chris\n    *set second_date_nick chris_nick\n    *if first_date = 2\n      *set chris_rapport %+5\n      *goto invite_twice\n    *else\n      *set chris_rapport %+5\n      *goto invite_first\n\n  #Stay in for the night, relax, recharge, and try to forget about everything going on.\n    You don't really feel like seeing anyone tonight and decide to take it easy.  You throw on a comedy and it takes a little while, but eventually, you're able to smile.  After some time, you even begin to laugh.  You're not tired when the movie is done, and decide to watch a little standup on television.  The comedian is very funny, and after she's done, you begin to feel quite a bit better.  By the time her set is finished, you're exhausted from the emotional roller coaster, and decide to call it a night.\n\n    Making your way upstairs, you climb into your soaker tub, the routine you follow most nights when you stay in. You fill the water with your favorite medicinal salts and other solutions, top-of-the-line healing agents supplied by the Syndicate's doctor.  \n    *gosub_scene util heal\n    \n    It doesn't take long before the soreness from the day disappears.  Like always when you soak, old wounds seem to heal and close as you immerse yourself in the warm, refreshing water. Time seems to lose all meaning but, when you finally decide to get out, the skin on your fingers and toes is wrinkly from the healing liquid.  Stepping out and toweling yourself off, you feel recharged, the medicinal salts and healing solutions seeming to work their magic. You only wish it was as easy to heal emotional wounds.\n    \n    Taking several deep breaths, you head for bed.\n    \n    The sheets and pillows seem to engulf you, and it's not long before you're relaxed and sunk in.  You're so comfortable, it's impossible to comprehend that, when you wake up, you might be facing certain death.\n    *finish\n\n*label dinner\n*page_break\nThe wood creaks beneath your feet, and with ${second_date_name} encircled in your arms, for a moment you're almost able to forget about everything going on with your crew and the danger lurking around every corner.  \n\nDinner was amazing, simple fare; under the stars, with the crisp ocean air dancing over you, you can't imagine a more perfect night.  You don't know if it was the fact that your team is on pins and needles, or just the connection that seemed to come with ease between the two of you, but you found yourself sharing things with ${second_date_name} that you'd never shared with anyone before.  The feeling was reciprocal, ${second_date_name} opening up to you.  \n\nNow, standing on the almost deserted pier, holding ${second_date_name} close, you whisper, \"${second_date_name}, you are incredible.  I like you very much.\"\n\nThe words linger in the cool, night air; waiting for a response is almost unbearable.  ${second_date_name} stares into your eyes, mirroring your heartfelt gaze.  Then, after another moment, says, \"I like you, too…a lot.\"\n\nThe two of you hold each other close for a moment before walking back to your vehicle. You lean forward and brush your lips against ${second_date_name}'s.  The kiss is deep and passionate.  You hold each other close, sharing an exquisite moment you know both of you will remember fondly for a long time.  Sensing the opportune moment, you decide to:\n*choice\n  #Ask ${second_date_name} to stay the night with you.\n    *if (second_date = 1) and (ben_rapport > 60)\n      *label stay_over\n      \"You know,\" you say, \"I really don't want to be alone tonight.  And I really care about you…\"\n\n      *label night_wrap\n      ${second_date_name} hesitates for a moment before breaking out into a bright smile.  Your date presses you tight, and a broad smile crests your own face.  \"I'd love to spend the night with you, if that's what you're asking,\" ${second_date_name} purrs in your ear, nibbling on the lobe.  You feel yourself aroused in a way you never thought possible before, both your body and your mind seeming alight with energy.\n\n      *label night_wrap1\n      You kiss vigorously, your hands and your date's exploring each other's bodies.  In the end, you can barely remember how you made it back to your place, everything an impassioned blur.\n\n      *page_break\n      Night turns into early morning, and in those sleep-filled, dream-induced hours, you feel totally content.  You awaken with a groggy start, but it is only the feel of soft lips on your cheek.  \"Huh,\" you mutter, fumbling for the clock.  Daylight filters through, and you curse to yourself that the pleasant dreams are already over and it's time for training and reality.\n      \n      \"Go back to bed, ${name},\" ${second_date_name} says. \"You still have a little while longer to sleep.  I have to get back to my place to change and get ready for the training session.\"  \n\n      You manage to sputter an endearingly incomprehensible goodbye before your face hits the pillow once again.  Bliss encompassing you, dreams ensnaring you, it's impossible to comprehend that, when you wake up, you might be facing certain death.\n      *finish\n    *elseif (second_date = 1)\n      *label desperate\n      \"You know,\" you say, \"I really don't want to be alone tonight.  And I really care about you….\"\n\n      ${second_date_name} pauses to consider your proposal.  \"I like you,\" your date says at last, \"but to spend the night with you, if that's what you're asking…it's a little soon.\" The implication is clear, and you wish you'd spent a little more time courting ${second_date_name} before asking.  Still, you know there's a spark there, and perhaps with cultivation, it can grow into a full-fledged flame.\n\n      You lean forward and kiss ${second_date_name} tenderly, both of you letting your hands explore each other's bodies. You can feel yourself getting carried away and ${second_date_name} pulls away.  \"Not yet,\" your sweet date says softly.  \"I just can't yet.\"  You smile and nod to indicate that you understand. And that you're willing to wait.  \n\n      The two of you continue to hold each other for a moment before hopping into your vehicle.  You drop ${second_date_name} off and head home, giddy thoughts of the evening swirling in your mind and following you to your slumber.\n\n      *page_break\n      Night turns into early morning, and in those sleep-filled, dream-induced hours, your mind continues to turn toward your date.  You picture the best parts of the night over and over in your head.  Bliss encompassing you, dream and reality blending, it's impossible to comprehend that, when you wake up, you might be facing certain death.\n      *finish\n    *elseif (second_date = 3) and (sam_rapport > 60)\n      *goto stay_over\n    *elseif (second_date = 3)\n      *goto desperate\n    *elseif (second_date = 2) and (chris_rapport > 70)\n      *goto stay_over\n    *else\n      *goto desperate\n  #Tell ${second_date_name} I've had a great time and I can't wait to hang out again, then say goodnight.\n    *if (second_date = 2) and (ben_rapport > 60)\n      *label lonely\n      \"You know,\" you say, \"I had a great time tonight.\"\n\n      ${second_date_name} smiles, \"Me, too.\"  Before you can say another word, your date ventures, \"I really don't want to be alone tonight.  And I really care about you…\"\n\n      *goto night_wrap\n    *elseif (second_date = 2)\n      *label hug\n      \"You know,\" you say, \"I had a great time tonight.\"\n\n      ${second_date_name} smiles, \"Me, too.\"\n\n      \"I guess I should probably get you back,\" you respond, \"but I'll be looking forward to seeing you again.\"\n\n      \"So will I,\" comes the response, and the tone of ${second_date_name}'s voice makes it clear that you're scoring major points.  You find yourself grateful that you're taking your time impressing this special person, rather than trying to rush into bed.  There is obviously a spark here and, with careful cultivation, it can grow into a full-fledged flame.\n\n      *label kiss_vigor\n      You lean forward and kiss ${second_date_name} vigorously.  \"That was very special,\" your date responds.  You smile in agreement.  \n\n      The two of you continue to hold each other for a moment before hopping into your vehicle.  You drop ${second_date_name} off and head home, giddy thoughts of the evening swirling in your mind and following you to your slumber.\n\n      *page_break\n      Night turns into early morning, and in those sleep-filled, dream-induced hours, your mind continues to turn toward your date.  You picture the best parts of the night over and over in your head.  Bliss encompassing you, dream and reality blending, it's impossible to comprehend that, when you wake up, you might be facing certain death.\n      *finish\n\n    *elseif (second_date = 3) and (sam_rapport > 60)\n      *goto lonely\n    *elseif (second_date = 3)\n      *goto hug\n    *elseif (second_date = 2) and (chris_rapport > 70)\n      *goto lonely\n    *else\n      *goto hug\n\n  #Let ${second_date_name} take the initiative and see where the night ends up.\n    *if (second_date = 1) and (ben_rapport > 60)\n      *label them\n      \"You know,\" you say, \"I had a great time tonight.\"\n\n      ${second_date_name} smiles, \"Me, too.\"  Before you can say another word, your date ventures, \"I really don't want to be alone tonight.  And I really care about you…\"\n\n      ${second_date_name} hesitates for a moment before breaking out into an encouraging smile.  Your date presses you tight, and a broad smile crests your own face.  \"I'd love to spend the night with you, if that's what you're asking,\" you purr in your date's ear, nibbling on the lobe.  You feel yourself aroused in a way you never thought possible before, both your body and your mind seeming alight with energy.\n      *goto night_wrap1\n    *elseif (second_date = 1)\n      *label lame\n      \"You know, I had a great time tonight,\" you say, letting the words hang in the air.\n\n      ${second_date_name} smiles, \"Me, too.\"  Before you can say another word, your date continues, \"It's getting late, so you should probably get me back, but I'll be looking forward to seeing you again.\"\n\n      \"So will I,\" you respond.\n\n      \"Hopefully, it'll be sooner, rather than later,\" ${second_date_name} says in a tone that makes it clear you're scoring major points.  You find yourself grateful that you're taking your time impressing this special person, rather than trying to rush into bed.  There is obviously a spark here and, with careful cultivation, it can grow into a full-fledged flame.\n\n      *goto kiss_vigor\n    *elseif (second_date = 3) and (sam_rapport > 60)\n      *goto them\n    *elseif (second_date = 3)\n      *goto lame\n    *elseif (second_date = 2) and (chris_rapport > 65)\n      *goto them\n    *else\n      *goto lame", "la4": "*set chapter +1\n*temp saved_rapport 50\n*temp saved_name \"none\"\n*temp saved_nick \"none\"\n*temp saved_he \"he\"\n*temp saved_him \"him\"\n*temp saved_his \"his\"\n*set wounded_here false\nYou're barely awake, stuck in that space between sleep and wakefulness, when you hear it.  Dim rays of sunlight are filtering through your bedroom blinds, dancing on your eyelids, but your killer instinct picks it up immediately.  The sound is muffled but distinct.  A footstep.  \n\nQuickly springing up to a seated position, you listen closely, your intuition telling you this is no mailman dropping off a package.  Then you notice what piqued your interest in the first place, the attempt of caution.  A normal visitor doesn't try to hide their approach.  When you hear the sound again, you can tell that the intruder is already inside your place.  \n\nReacting quickly, you roll off the side of the bed, and not a moment too soon as the bedroom door is kicked open and a hail of bullets tears apart your bed.  Stuffing flies wildly from the mattress right where you were just resting peacefully.\n\nCrouched on the floor on the other side of the bed, you realize that the attacker hasn't seen you yet.  There's no use looking for your sidearm since you know where it is—where you always keep it at night—under your pillow, on the far side of the bed.  You eye an alarm clock close by that could be used as a distraction.  Hearing the intruder coming closer, you:\n\n*choice\n  #Heave the alarm clock at the attacker as a distraction, then dive for the gun.\n    You reach for the clock, suddenly and unexpectedly and, before the intruder knows what's going on, you have the device in your hand.  \n\n    You turn to throw it but are met with tension and the device refuses to fly free. You blame your forgetfulness on your fatigue as you are sharply reminded that the alarm clock is still plugged into the wall.  Worse still, the intruder, a masked man with a large automatic in hand, has noticed your move.\n    *page_break\n    *if (improvisation > 12)\n      Thinking fast, you dive forward in a roll, your body weight prying the clock from the wall, and you use the momentum to fling it at the intruder.  \n\n      Your aim is dead-on and it smashes into the masked attacker's face.  It's too light to do serious damage, but it takes him off balance, giving you time to grab for your gun.  One well-placed shot and he goes down.  \n\n      Your breath comes fast and your heart races, but you're alive.  Taking a minute to compose yourself, you make your way over to the masked man's body.\n      *goto attacker_down\n    *else\n      You wrench at the clock again and again, trying to pry the clock from the wall, and panic sets in as it doesn't come loose.  You feel searing pain lance though your side, but you don't have time to think about it as you jerk your body sharply to the right.  The clock comes free with the force of your body weight and, even though you register a spreading red stain on the sheets, you focus on heaving the clock.\n      *gosub_scene util health_check_mask\n\n      Your aim is dead-on and it smashes into the masked attacker's face.  It's too light to do serious damage, but it takes him off balance, giving you time to grab for your gun.  One well-placed shot and he goes down.  \n\n      Your breath comes fast and your heart races, but you're alive.  Taking a minute to compose yourself, you make your way over to the masked man's body.\n      *goto attacker_down\n  #Feign being asleep and wait until the intruder gets close enough to go for a tackle.\n    The intruder creeps forward slowly, and you wait for the right moment, listening to the footfalls.  They keep getting closer and closer.  One final creak alerts you that the intruder is at the edge of the bed. \n    *if (strength > 12)\n      Leaping from the bed, you catch the masked intruder by surprise.  Unfortunately, he's much bigger than expected, a mountain of a masked man with a gun, and he shakes off your attack.  All the time in training jiu-jitsu and wrestling has taught you how to deal with a bigger adversary, though, and you dart in for a double leg takedown, tackling the intruder.  \n\n      A second later, you've advanced to side control, your body atop your attacker's prone form.  He knows some ground fighting, too, but you're better and, as he tries to bridge out, using his hips and body in an explosive, upward thrust to heave you aside and regain position, you squash the move and hook your legs around his body, transitioning to taking his back.  \n\n      In an instant, you have him in a chokehold and you don't let up until long after he's lost consciousness.\n      *goto attacker_down\n    *else\n      Leaping from the bed, you catch the masked intruder by surprise.  Unfortunately, he's much bigger than expected, a mountain of a masked man with a gun, and he shakes off your attack.  You find yourself wishing you'd spent more time training in jiu-jitsu and wrestling to learn how deal with a bigger adversary.  \n\n      You rush forward, but he tosses you aside, firing a shot after he does.  You feel lancing pain in your side but, with adrenaline coursing through your veins, you're able to wrestle him to the ground on your next attempt.  A second later, you've advanced to side control, your body atop your attacker's prone form.  He knows some ground fighting but, as he tries to bridge out, using his hips and body in an explosive upward thrust to heave you aside and regain position, you squash the move and hook your legs around his body, transitioning to taking his back.  \n\n      In an instant, you have him in a choke hold and you don't let up until long after he's lost consciousness.\n      *gosub_scene util health_check_mask\n      *goto attacker_down\n\n  #Forget the alarm clock and dive for the gun.\n    The intruder creeps forward slowly, and you wait for the right moment, listening to the footfalls.  They keep getting closer and closer. One final creak alerts you that the intruder is at the edge of the bed. \n    *if (ranged_weapons > 12)\n      Diving forward, you move fluidly and quickly, reaching for the gun.  Seeing your quick motion has caught the intruder—a large, masked man—off guard.  You're able to wrap your hand around the cold steel of your weapon.  A second later, there are multiple bullet holes in the body of the assassin intruder.  \n\n      The attacker falls to the ground, and once you know he's not getting back up, you approach his still body.\n      *goto attacker_down\n    *else\n      Diving forward, you try to move fluidly and curse that you're out of practice.  Your arms tangle in covers as you try to reach for the gun.  \n\n      The element of surprise gone, the intruder, a large masked man, fires a shot before you're able to reach the cold steel of your weapon.  You feel lancing pain in your side, and to your horror, notice the patina of spreading blood flowing from your body.  \n      *gosub_scene util health_check_mask\n      The agony is excruciating, but you muster the strength to go for the gun. A second later, the body of the would-be assassin is thoroughly perforated.  \n\n      The attacker falls to the ground and, once you know he's not getting back up, you approach his still body, the pain in your side still searing.\n      *goto attacker_down\n\n\n*label attacker_down\n*page_break\n*if wounded_here\n  Checking to make sure there's no pulse, you turn from the body for the moment and head toward your bathroom medicine cabinet.  Withdrawing one of the special, high-tech med-kits issued to you by the Syndicate, you disinfect and then patch your wound.  Returning to the body of the intruder, you crouch down, \n*if wounded_here = false\n  Checking to make sure there's no pulse first, you\npull off the mask, and find…a man you've never seen before.  You would have bet anything that your attacker was a member of the Fallen Angels but this man, with his broad brow, narrow eyes, and sunken chin match none of the photos from your crew's database.  \n*set wounded_here false\n\nStripping the shirt and pants from the corpse, you see no distinctive Fallen Angel tattoos or regalia.  In fact, nothing seems remarkable about this random intruder at all.  [i]Except he was in my bedroom[/i], you think to yourself.  \n\nFrustrated and confused, you continue to search the body, determined to find some clue to the identity of this man.  Finally, you spot it: a small but unmistakable tattoo, discretely placed on the hip but below the waistline, the mark of the Fallen Angels.  You find no satisfaction in confirming your suspicions and are, in fact, thoroughly enraged.\n\nYour fingers involuntarily ball into fists as you stand there, thinking of Dante, Marie, and Chuck.  A part of you wants to lash out, to mutilate the body, but a far more rational part of you recognizes that the dead intruder is far beyond pain.  You curse to yourself, trying to think of the next step.\n\nYou pace through the room, thinking aloud to find some clarity.  \"Look for clues, then move from there,\" you coach yourself.  The fact that the attacker breached your home security clearly implies that he had inside help.  \"They're taking us out one by one.  And they know things they shouldn't.  The only explanation is that the Syndicate has a rat,\" you conclude.  The very idea makes you nauseated.  \n\nYou take a deep breath to steady yourself.  \n*if second_date > 0\n  [i]Could it be ${second_date_name}?[/i] You shake your head. \nAnyone could be the rat; it's too soon to jump to conclusions.  It's an overwhelmingly haunting thought that fills your head as you get dressed.  Unsuccessful attempts on your life are not acceptable excuses for missing training.  \n\nOn your way to the training center, you take care of the intruder's corpse, stopping by the team's go-to body disposal.  The funeral home director makes quick work of it, fulfilling his pre-arranged agreement with the Syndicate.  That task done, you ready yourself to exact vengeance.\n\n*page_break\n\nThe training room door is open.  The team's gym is state-of-the-art, but Boris's auspicious training center has always been more of an ideal than a plausible reality.  \n\nYou think of Sara with her many knives, a proficiency that seems almost inhuman, and Kara with her whip, a cat-of-nine-tails that she could use to take the feet out from any opponent.  You picture Lucas with his alarming ability with a club, and George's swiftness with a sword.  The practical ability to train each assassin's skill set as a group, or even accommodate training for the wildly divergent skill sets, is almost impossible.  That's why you normally favor your regular MMA training facility, even though the team's gym does have a cage.  \n\nPeering at the training floor and seeing all the gathered assassins inside, it's clear that Boris really did pull in everyone on the roster.\n\nYou're troubled to notice the absence of your most trusted comrades, though, but reason they must have been assigned to the later training session.  \n\n*if (second_date = 0)\n  *goto train\n*else\n  *if ((first_date = 1) and (second_date = 1)) or (((first_date = 2) and (second_date = 2)) or ((first_date = 3) and (second_date = 3)))\n    You wish you could see ${second_date_name}, but know that ${second_date_name} was assigned to the later training session.\n    *goto train\n  *else\n    You find yourself thinking of ${second_date_name} and wish you could see that sweet smile.  Still, you know that ${she} was assigned to the later training session.  You reflect on how, while your date with ${first_date_name} was interesting, the connection with ${second_date_name} is just so much stronger.\n    *goto train\n\n*label train\nYou have little time to think of it as you see Miller approach.  He smiles and waves at you.  Unsure of how to feel about him in the wake of the Fallen Angel assassin's attack, you:\n*choice\n  #Treat him coldly.\n    With so much uncertainty going on, you don't know who to trust, but you certainly don't trust Miller.  As he approaches, you avert your eyes.  \n\n    Even as Miller attempts to speak to you, your only response is a hurried grunt as you pass.  From the look on his face, you can tell that he noticed your cold shoulder, and registered your suspicion.  Ignoring him, you walk to the locker room and quickly get changed.\n    *set martinez %-5\n    *set passion %+5\n    *goto training\n  #Treat him warmly.\n    With so much uncertainty going on, it's always good to see a friendly face, and this is a time when you want as many people watching out for you as possible.  You also know that team solidarity is paramount when things go sideways.  Miller smiles wider as you nod at him and grip his outstretched hand.  \n\n    After a little small talk about the situation, you take the time to acknowledge how good it is that you have each other's back.  Miller claps you on the shoulder and assures you he's there for you, and you're feeling pretty good about the situation as you walk to the locker room to get changed.\n    *set martinez %+10\n    *set passion %-5\n    *goto training\n  #Treat him with guarded respect.\n    With so much uncertainty going on, it's always good to see a friendly face, but you're not quite sure where his loyalties lie.  You nod to Miller but show no physical affection.\n\n    You take the time to make a little small talk about the situation.  Finally, Miller claps you on the shoulder and tells you to watch your back.  Not quite certain what he means, you note that at least he's smiling.  Puzzled by the enigmatic remark, you walk to the locker room to get changed.\n    *set martinez %+5\n    *goto training\n\n*label training\nThe session is rigorous and grueling, but the majority of the gathered crew members only put in a half-hearted effort.  Even you find it difficult to focus, given everything that's going on.  It's only your firm discipline that allows you to focus on what the instructors have to say.  \n\nIn the end, you're grateful that you paid attention; you learned some fantastic counter-intelligence and anti-terrorism techniques.  One of the instructors is former SAS, the other ex-Mossad.  Together, they give you a fresh and thorough look at how to stay ready for attack under any circumstances.\n\nEnergized by the mandatory workout, you walk back to the front entry of the gym to get your bag. You're feeling a little better thanks to the exercise—a momentary and welcome distraction from all of the craziness that's been going on.  The little storage cubes where you all stow your things during workouts are open; you are teammates, after all.  As you reach for your bag, something catches your eye.\n*page_break \n\nBending down, you take a closer look at Miller's bag.  You see a few grenades, which otherwise would not give you pause, except for the fact that they are sitting on top of a very distinctive red and black bandana.  Cautiously, and with a fair amount of dread, you shift the grenades to get a better look.  Seeing the crimson wings emblazoned on the bandana, your worst fears are confirmed: it's the logo of the Fallen Angels.  \n\nWhat is Miller doing with that?  Faced with this potentially disastrous revelation, you:\n*choice\n  #Confront Miller immediately and firmly.  If there's a traitor in our midst, I need to get to the bottom of it immediately.  \n    Pulling your gun, you decide the best way to get an answer is to use a firm hand.\n    \n    You grab the bandana and wrap it around your hand.  As Miller approaches, he opens his mouth and says, \"Hey ${name}, that was some workout.  I really-\"  \n\n    Miller doesn't get the chance to finish as you grab him and slam him up against the wall.  Shoving the gun in his face, you wave the bandana in front of him.  \"You have two seconds to explain this before I blow your brains out,\" you growl, gritting your teeth.\n\n    It isn't what he says so much that surprises you, but the anger and hurt in his voice.  \"You still don't trust me,\" he says with what almost seems like regret.  \"I know I haven't liked to talk about my past, but now you know.  I was a Fallen Angel.  I left them a long time ago.  They were too sadistic.  It wasn't my thing.\"  He shakes his head, but you don't lower the gun.\n\n    \"Why do you still have the bandana?\" you demand.\n\n    \"When all this madness started going down, Boris came to me and asked me if I still had any of my old colors.  He said he was planning a hit on them and he might want me to be a Trojan horse or something like that.  He didn't fill in the details.\"  \n\n    You stare at Miller for a moment longer.  The pain you see in his eyes, and the anger, seem genuine.  You also know Miller's explanation sounds exactly like something Boris would do.\n    *set martinez %-10\n    *set passion %+5\n\n    Faced with the hard truth that maybe you were mistaken, you:\n    *choice\n      #Apologize, admitting I was wrong.\n        \"Look,\" you say, \"I'm sorry I jumped to conclusions, but with everything going on, I just can't take chances.  But really, I hope you'll accept my apology.\"\n\n        Miller straightens his clothing and steps away from the wall.  \"I understand,\" he says at last. \"I can only imagine what must have been going through your head when you saw Fallen Angels' colors. You were just looking out for the team.\"  He sticks out his hand, \"It's all good.\"\n\n        You shake his hand and return his bandana.  \"I appreciate that,\" you say.\n\n        Turning away, you grab your bag and walk to the door.\n        *set martinez %+10\n        *goto exit\n\n      #Tell Miller his story may check out, but I'm keeping an eye on him just the same.\n        \"Look,\" you say, \"I'm sorry I jumped to conclusions, but with everything going on, I just can't take any chances.  No matter what, I'm going to have to keep a close watch on you until this whole business is sorted out.\"\n\n        Miller straightens his clothing and steps away from the wall.  \"I guess all I've done so far hasn't convinced you,\" he says at last, and you shake your head.  \"Okay, then,\" he says, \"I see how it is.\"\n\n        Turning away, you grab your bag and walk to the exit.\n        *set martinez %-5\n        *set passion %+5\n        *goto exit\n\n      #Walk away without apologizing, not believing a word he says.\n        Turning your back on Miller, you say nothing.  You grab your bag, head for the door, and leave in a huff.\n        *set martinez %-10\n        *set passion %+10\n        *goto exit\n  #Ask Miller about it without accusing him of anything. \n    While you don't want to accuse him of anything, you still have your suspicions.  Deciding you'll get the best answer by not putting him on the defensive, you calmly go in search of Miller to ask him about what you found.\n    \n    You grab the bandana and wrap it around your hand.  As Miller approaches, he opens his mouth and says, \"Hey ${name}, that was some workout.  I really-\"  He stops short as he spots the bandana.\n\n    \"Don't get freaked out, I'm not jumping to any conclusions or accusing you of anything,\" you say, keeping your voice calm.  \"I just saw this and I wanted to ask you about it.\"  \n\n    \"I know I haven't liked to talk about my past, but now you know.  I was a Fallen Angel.  I left them a long time ago.  They were too sadistic.  It wasn't my thing.\"  He shakes his head.  \"You know, I really appreciate you not jumping to conclusions.  There are a lot of people who would have handled it differently.\"\n\n    \"Miller, I have to know, why do you still have the bandana?\" you ask.\n\n    \"When all this madness started going down, Boris came to me and asked me if I still had any of my old colors.  He said he was planning a hit on them and he might want me to be a Trojan horse or something like that.  He didn't fill in the details.\"  You know Miller's explanation sounds exactly like something Boris would do, but you can't be certain.\n\n    \"Thanks for telling me,\" you respond, not knowing what else to say at the moment.\n\n    \"I understand your concern,\" he says.  \"I also understand what must have been going through your head when you saw Fallen Angels' colors. You were just looking out for the team.\"  He sticks out his hand, \"It's all good.\"\n\n    You shake his hand and return his bandana.  \"I appreciate that,\" you say.\n\n    Turning away, you grab your bag and walk to the door.\n    *set martinez %+15\n    *goto exit\n  #Give him the benefit of the doubt and say nothing, not wanting to drive any further wedge between him and the rest of the team.  \n    With everything going on, you come to the conclusion that you don't need any more problems.  You realize that this must be the reason Miller never spoke about his past—he was a former Fallen Angel.  You figure if he really held some allegiance to his prior crew and was planning something nefarious, he wouldn't be stupid enough to bring his old colors to a training session, let alone leave them out for anyone to see. \n\n    Turning away, you grab your bag and walk to the door.\n    *set passion %-10\n    *goto exit \n\n*label exit\n*page_break\nYou make your way outside as several team members who are arriving for the second session begin to file in.  Your mind still hung up on everything going on, you barely register a warm wind sweeping in as you walk to your car.  It's a dry Santa Ana wind, common in LA this time of year, and you squint slightly as dust is blown into your face.  \n\nPausing to wipe your eyes, you're suddenly jolted forward by a massive, explosive force.  You fly through the air, landing rough and hard on the pavement.  Your hands burn from the abrasive landing, but overall, you're unharmed.  Immediately, you reach for your weapon.  Your gun is in your hand, but it nearly drops from limp fingers when you see the devastation.  \"Dear God…\" is all you're able to mutter.\n*page_break\n\nSitting in smoldering ruins is what remains of the training center.  For a minute, you can only stare at the rubble, the few pieces of concrete strong enough to stay standing engulfed in flames, the rebar bent and twisted.  It seems impossible but the training center is gone, blown away by explosives.  Your hands tremble with rage, sadness, and disbelief, and a part of you can only think of Miller and the grenades you saw in his bag.  \n\nHearing the sound of sirens, you force yourself to your feet.  Somehow, you're able to stagger to your car, and get it unlocked.  \n\n*if (second_date = 0)\n  You're driving on autopilot, thinking only of the training center turned graveyard, when you realize that your phone has been ringing non-stop.  Pressing it to your ear, you hear Boris's voice.\n  *goto car\n*else\n  You think of ${second_date_name} and quickly dig for your phone.  While you didn't see ${shim} entering as you finished up, you know ${she} could have arrived while you were still training.  You frantically search your recent call log for ${shis} number and press the call button.\n\n  Your heart pounds and every ring seems to last forever.  After what may as well have been the thousandth ring, you hear ${second_date_name} pick up.  \"${name}, oh God, I'm so glad you're okay,\" ${second_date_name} says, clearly relieved. \"Boris called and told me the news.  I'm on my way to headquarters right now.\"  The intrusive beep of call waiting lets you know someone else is trying to reach you.  Glancing at the screen, you see Boris's number.\n\n  \"I'm glad you're okay, ${second_date_nick}. I was really worried.\" you say.  \"Listen, Boris is on the other line, I have to see if he knows anything about this.  I'm sure he's going to order me to headquarters, so I'll see you there.\"\n\n  You can hear reluctance in ${second_date_name}'s voice, not wanting to hang up with you.  Still, you two hang up and you click over. \n  *goto car\n\n*label car\n*page_break\n\"I'm so glad you answered, ${name},\" Boris says, exasperation and terror in his voice.  \"I thought we'd lost you, too.\"  \n\nYou open your mouth and begin to ask the first of a million questions on your mind, when Boris cuts you off, \"No time for questions I can't answer.  Listen, ${name}, I'm still trying to find out who's alive, so I'm going to hang up now, but I want you to come to headquarters immediately.  I'm telling everyone to gather up there.  Safety in numbers.\"  A part of you thinks that it didn't do much good at the gym, but you say nothing, knowing that headquarters is as safe as it gets.  \n\n\"I'll meet you all there later,\" Boris continues.  \"I have some things I need to check out.  We have to get to the bottom of this.  I think this might be some kind of retaliation for what happened in Beijing. I'm not sure, but I have to find out.\"\n\nAn icy spike drops in your guts at Boris's words and, despite his admonition, you're about to ask questions when the line goes dead.  \n\nBeijing.  Shaking your head, feeling like you were drowning in a sea of confusion, thrown from a ship you don't remember boarding in the first place, you begin to realize that this was one of the biggest pitfalls of your career.  Moved into position to strike, honed to kill, you are given orders but rarely reasons.  For the first time in a very long time, you feel as if you might be in over your head.  \n\nYou drive to headquarters with your mind spinning in a thousand directions.  As clogged and polluted as the Beijing skyline, your mind overflows with questions.\n\n*page_break\nThe elevator door opens and you are greeted by familiar, but clearly worried faces.  What strikes you more is the people missing.  You know Chuck will not be there, but foolishly, you expect to see Marie and Dante, your friends, companions, somehow back from their unexplained absences.  But they are not.  Even more telling, Miller is not among the gathered assassins.  Part of you figures he died in the blast but another more cautious part remembers the grenades in his bag. \n\nWalking into the boardroom, you see the few remaining members of your crew who are verified alive.  Hector, a broad-shouldered and suave assassin, leans against one of the glass walls with his arms crossed and his face ashen.  Aram, a tough-as-nails hitman, holds a gun in his hand, clearly distressed.  Michelle, one of the toughest people you've ever known, holds a large Bowie knife in one hand, the other casually testing its sharpness.  She looks like a viper coiled to strike. \n\n*if (second_date = 0) and (first_date = 0)\n  *goto attack\n*elseif (second_date = 0) and (first_date != 0)\n  *goto date_present\n*else\n  *goto date_present1\n\n*label date_present\nNone of these assassins hold your attention, however, as you're only looking for one person.  \n\n*page_break\nSpying ${first_date_name}, a massive knot in your heart loosens.  You don't want to attract any attention to your relationship but you can't stop yourself from saying, \"${first_date_nick}, you can't believe what I was thinking when that explosion hit.  I just kept thinking about you and what if you were…\"  Your words trail off and, while you expect a verbal response, you're taken aback by the feel of arms wrapping around you.  \n\n${first_date_name} whispers in your ear, \"I almost was.  I'm always early, and I would have been there at the time of the explosion if my car hadn't broken down on me.  It was an electrical glitch.  The car just wouldn't start.\"\n\n${first_date_name} pauses for a second before going on, \"It's funny because I've never been a strong believer in the supernatural.  I've always heard things about ghosts being able to interact with this world because our bodies work on an electrical current, and when we die, we just move to another level of existence where we can still reach this world through electrical force, but I was never fully convinced.  Well, now I am.  I feel like someone was looking out for me, and that's why I was late.\"\n\n*fake_choice\n  #\"You must be right.  I'm sure it was a family member or friend who's passed on and came back to warn you.\"\n    ${first_date_name} smiles, grateful for your acceptance.  You know it was a big risk for ${she} to open up to you like that and you're thankful for the opportunity to show your support.\n    *set pious +1\n    *if first_date = 1\n      *set ben_rapport %+10\n      *goto attack\n    *if first_date = 2\n      *set chris_rapport %+10\n      *goto attack\n    *if first_date = 3\n      *set sam_rapport %+10\n      *goto attack\n  #\"I definitely think you had some sort of guardian angel on your side, maybe even a relative who's passed on.\"\n    ${first_date_name} smiles, and you're pleased about it.  You may not have been as committed to the idea as ${she} but you can tell your open-mindedness is appreciated.\n    *if first_date = 1\n      *set ben_rapport %+5\n      *goto attack\n    *if first_date = 2\n      *set chris_rapport %+5\n      *goto attack\n    *if first_date = 3\n      *set sam_rapport %+5\n      *goto attack\n  #\"I think you got lucky.  And that's why it's so important to be prepared because you can't always count on being lucky.\"\n    Your voice is flat, and ${first_date_name}'s eyes are hard.  As impressive as your dedication may be, ${she} seems pretty disappointed in your lack of faith.\n    *set passion %-10\n    *if first_date = 1\n      *set ben_rapport -10\n      *goto attack\n    *if first_date = 2\n      *set chris_rapport -10\n      *goto attack\n    *if first_date = 3\n      *set sam_rapport %-10\n      *goto attack\n\n*label date_present1\nNone of these assassins hold your attention, however, as you're only looking for one person.  \n\n*page_break\nSpying ${second_date_name}, a massive knot in your heart loosens.  You don't want to attract any attention to your relationship but you can't stop yourself from saying, \"${second_date_nick}, you can't believe what I was thinking when that explosion hit.  I just kept thinking about you and what if you were…\"  Your words trail off and, while you expect a verbal response, you're taken aback by the feel of arms wrapping around you.  \n\n${second_date_name} whispers in your ear, \"I almost was.  I'm always early, and I would have been there at the time of the explosion if my car hadn't broken down on me.  It was an electrical glitch.  The car just wouldn't start.\"\n\n${second_date_name} pauses for a second before going on, \"It's funny because I've never been a strong believer in the supernatural.  I've always heard things about ghosts being able to interact with this world because our bodies work on an electrical current, and when we die, we just move to another level of existence where we can still reach this world through electrical force, but I was never fully convinced.  Well, now I am.  I feel like someone was looking out for me, and that's why I was late.\"\n\nThinking it over, you respond:\n*fake_choice\n  #\"You must be right.  I'm sure it was a family member or friend who's passed on and came back to warn you.\"\n    ${second_date_name} smiles, grateful for your acceptance.  You know it was a big risk for ${she} to open up to you like that and you're thankful for the opportunity to show your support.\n    *set pious +1\n    *if second_date = 1\n      *set ben_rapport %+10\n    *if second_date = 2\n      *set chris_rapport %+10\n    *if second_date = 3\n      *set sam_rapport %+10\n  #\"I definitely think you had some sort of guardian angel on your side, maybe even a relative who's passed on.\"\n    ${second_date_name} smiles, and you're pleased about it.  You may not have been as committed to the idea as ${she} but you can tell your open-mindedness is appreciated.\n    *if second_date = 1\n      *set ben_rapport %+5\n    *if second_date = 2\n      *set chris_rapport %+5\n    *if second_date = 3\n      *set sam_rapport %+5\n  #\"I think you got lucky.  And that's why it's so important to be prepared because you can't always count on being lucky.\"\n    Your voice is flat, and ${first_date_name}'s eyes are hard.  As impressive as your dedication may be, ${she} seems pretty disappointed in your lack of faith.\n    *set passion %-10\n    *if second_date = 1\n      *set ben_rapport -10\n    *if second_date = 2\n      *set chris_rapport -10\n    *if second_date = 3\n      *set sam_rapport %-10\n*label attack\n\nTurning your attention to the gathered group, you feel a profound grief and heaviness noticing just how sparse your team has become.  All those gathered in the conference room look toward you, and you feel yourself wishing you had answers for the unasked questions written across the faces of each and every member of your crew.  Counting them off, you see only Hector, Aram, Michelle, ${ben}, ${sam}, and ${chris}.  \n\nExhaling deeply, you expect at any second to see more crew members walk through the door.  With each breath, though, your optimism fades.  Sara, Kara, Lucas, George, and Miller must have all died in the explosion. A grim silence hangs over the few remnants of the team as you try to think of something to say.\n\nFinally, figuring that silence was worse than speaking, and realizing that your team needs a leader for the moment, you start, \"I don't know what's going on, but I'm glad to see you all.\"  \n\nYou receive grunts that sound less than enthusiastic.  You're about to address the lingering question of when Boris was going to make his grand entrance when you hear the distinctive ding of the elevator.  Your breath catches in your throat, and the gathered crew turns toward the opening elevator doors.  \n\nThe collective glance is your last clear memory as you see the doors open and gun barrels aim in your direction.  A mass of masked assailants pours out, opening fire, their footfalls and gunshots ringing out as they rush into the boardroom.\n*page_break\n\nHector's chest is torn wide open, his arms never even having the chance to unfold.  Aram is luckier, dodging a hail of bullets as he dives to the side, returning fire as he does.  He's able to take out one attacker with a shot to the head, another with a wound in the stomach.  \n\nMichelle rushes into the thick of things, her blade slicing like a whirlwind of death.  Blood flies from a masked attacker's throat, another's gun falls to the floor as his wrist is severed.  Time seems to slow as you see a hail of bullets tear into Michelle's leg.  She's tough, though, and dives forward on her undamaged leg.  Grasping onto an assailant's knee, she presses her bodyweight against the captive limb and stabs upward with her free hand, her spare blade plunging into the femoral artery.  \n\nA gunshot from another assailant puts an end to Michelle's bravery as the mass of troops continues to pour forth from the elevator.  Aram is able to take down two more attackers before the rain of bullets shuts off the lights for good.\n\nYou fire at the intruders, and three attackers go down in a bloody heap.  You're about to rush forward to get a better angle on the other attackers when you see an RPG in the hands of an enormous Viking of a woman getting off of the elevator.  You fire as quickly as you can, but the attackers form a phalanx of protective cover.  Six go down under your precise shooting, but the massive woman readies her shot.  \n\nRealizing that the hard wood of the boardroom table legs will likely shield you from the worst of the blast, you decide to:\n\n*choice\n  #Dive for the table leg and abandon everyone else.\n    You decide that you are the most important person in the room and, while you might be able to save someone else, the unnecessary risk just doesn't justify it.  Besides, you rationalize that there will be no one to take revenge if everyone, including you, is dead.  \n\n    The rationalization doesn't do much to quiet the horror as the RPG impacts, the concussive force slamming into you.  You realize with shock that your sudden movement had drawn the woman's attention, and you'd barely made it to safety in time.  The impact is bad, but the hail of blood and body parts from the explosion is much, much worse.  A large portion of the wall is ripped away in the blast, and you're faced with the terrifying reality that all of your teammates are dead.\n\n    *if (second_date != 0)\n      The fact that ${second_date_name} is also gone hits you the hardest, knowing what the two of you shared.\n    *if (second_date = 0) and (first_date != 0)\n      The fact that ${first_date_name} is also gone hits you the hardest, knowing what the two of you shared.\n    *page_break  \n\n    Rage fills you, and you leap forward, firing.  The massive explosion seems to have even surprised the attackers, and you're able catch them off guard.  Their distraction, coupled with your skills, allow you to make short work of the attackers.  The giant woman goes down with a bullet in the throat, the three compatriots left standing following suit with well-placed headshots.\n\n    You walk over the bodies of the assailants, the grim stillness in the room seeming almost haunting after the melee. You try not to look at the gaping hole in the wall where your teammates were standing, the loss too fresh.  As you move forward, though, you notice through the rubble a safe which had been hidden behind a false wall.  The blast had knocked the door off its hinges, and burned money was everywhere.  However, there are plenty of wrapped stacks of cash left undamaged, and you realize that, without your sudden move, it was unlikely that this hidden treasure trove would have been discovered.\n\n    Rushing over to the safe, you stuff as much of the undamaged money as you can into your pockets.  You know you have little time.  No matter how secure and clandestine your headquarters once was, all of that vaporized with the RPG shell.  A gaping hole in a downtown building isn't going to go unnoticed for very long.  \n\n    Finishing up, you approach the pile of bodies and strip the shirt from the first assailant.  Spying the Fallen Angels' insignia tattooed across his shoulder, any doubt about who attacked you vanishes, and your vision goes red.  You're tempted to put another bullet in the head of the nearest Fallen Angel when you hear the ding of the elevator and the doors slowly slide open.\n    *set righteousness %-10\n    *set money +10000\n    *goto martinez\n\n  #Dive for ${ben} and try to keep ${bhim} safe.\n    *set righteousness %+10\n    *set saved_rapport ben_rapport\n    *set saved_name ben\n    *set saved_nick ben_nick\n    *gosub saved_var\n    *set saved 1\n    *label save_someone\n    You don't hesitate, leaping forward.  You know it's a risk, but you just can't stand the thought of protecting yourself and leaving ${saved_name} to die.  You encircle ${saved_his} waist with your arms and, with a half-carry, half-tackle, pull ${saved_him} to the ground.  \n\n    You hear ${saved_name} begin to protest, clearly not understanding what's going on, and you have no time to explain as the RPG impacts, the concussive force slamming into you.  The impact is bad, but the hail of blood and body parts from the explosion is much, much worse.  A large portion of the wall is ripped away in the blast, and you're faced with the terrifying reality that all of your teammates, except ${saved_name}, are dead.\n    *page_break\n\n    Rage fills you, and you leap forward, firing.  The massive explosion seems to have even surprised the attackers, and you're able catch them off guard.  Their distraction, coupled with your skills and ${saved_name}'s suppressive fire, allow you to make short work of the attackers.  The giant woman goes down with a bullet in the throat, the three compatriots left standing following suit with well-placed headshots.\n\n    You walk over the bodies of the assailants, the grim stillness in the room seeming almost haunting after the melee. You try not to look at the gaping hole in the wall where your teammates were standing, the loss too fresh.\n\n    Smoke fills the room and burns your eyes, but you trudge forward, your gun at your side.  With the intruders dead, ${saved_name} stands there stunned, seeming unable to comprehend what has just happened.  You call to ${saved_him}, telling ${saved_him} you have to go, knowing you have little time.  No matter how secure and clandestine your headquarters once was, all of that vaporized with the RPG shell.  A gaping hole in a downtown building isn't going to go unnoticed for very long.  \n\n    You approach the pile of bodies and strip the shirt from the first assailant.  Spying the Fallen Angels' insignia tattooed across his shoulder, any doubt about who attacked you vanishes, and your vision goes red.  You're tempted to put another bullet in the head of the nearest Fallen Angel when you hear the ding of the elevator and the doors begin to open.\n    *goto martinez\n  #Dive for ${sam} and try to keep ${shim} safe.\n    *set righteousness %+10\n    *set saved_rapport sam_rapport\n    *set saved_name sam\n    *set saved_nick sam_nick\n    *gosub saved_var\n    *set saved 3\n    *goto save_someone\n  #Dive for ${chris} and try to keep ${shim} safe.\n    *set righteousness %+10\n    *set saved_rapport chris_rapport\n    *set saved_name chris\n    *set saved_nick chris_nick\n    *set saved 2\n    *gosub saved_var\n    *goto save_someone\n\n*label saved_var\n*if preference = \"female\"\n  *set saved_he \"she\"\n  *set saved_him \"her\"\n  *set saved_his \"her\"\n*return\n\n*label martinez\n*if (saved != 0)\n  *set saved_rapport +10\n*page_break\nYou keep your gun at the ready and move to the side of the elevator door, just out of view.  You're so angry you can barely see straight as you stand there, waiting for the moment to strike.  \n\nThe doors slide open and a large figure walks through, a man wearing some kind of backpack.  You wait until the right moment, then leap forward.  The figure goes down in a heap as you slam the butt of your gun into a kidney.  You're rewarded by an agonized groan of pain, and you press the gun barrel into the back of the figure's skull.\n\n\"It'll be too fast if I fire here,\" you say, lowering the gun to the mid-back, almost at the point where the ribs end. \"If I fire here, your breath will come bloody and ragged, but you'll live, for a while anyway.\"  You're about to pull the trigger when you hear a familiar grunt.\n\n\"No, stop, ${name}, it's me…Miller,\" you hear the captive say, and in your rage, you barely recognize the voice.  You do recognize that he's a former Fallen Angel, though, and you have only a split second to decide what to do.  Miller tries to stand up, his backpack falling to the ground.\n\n*choice\n  #I let him up and apologize to him.  This is my teammate, and he's lucky to be alive.\n    \"Miller,\" you start, \"I'm so sorry, I didn't know it was you.\"  You back off and help him onto his feet, stowing your gun to help dust him off.  \"I'm really, really sorry, just after everything that happened, I thought you were one of the bad guys.\"\n\n    He looks at you critically for a second, then allows for a slight smile.  \"And I take it since you've put the gun away, you've come to the conclusion that I'm not?\"\n    *set martinez %+5\n\n    You nod.  \"I was just caught up in the moment, and I couldn't tell it was you.\"\n\n    \"It's okay,\" Miller says, \"but my kidney is still killing me.\"  He rubs his lower back, and you feel yourself flush a little with embarrassment.\n\n    \"Yeah, ugh,\" you sputter, but Miller shakes it off.\n\n    \"At least you weren't too itchy with your trigger finger,\" he says, \"that wouldn't heal after a few days.\"\n\n    You nod, then say, \"How come you're here?\"\n    *label martinez_answer\n\n    Miller's eyes narrow before he says, \"You mean, how come I'm late?  We're supposed to meet here, remember?\"  You pause for a second, dumbfounded how, in the span of a few moments, everything can turn upside-down.  Trying to play it off, you nod.\n\n    \"I was putting gear in my car when the blast went off.  I got a call from Boris earlier to head right over, but I figured with everything going on I should stop by my place.  My niece lives with me, and I wanted to make sure she was someplace safe before I came over.  I don't know what's going on, but I'll be damned if I'm going to let someone I love sit in harm's way if I can avoid it.\"\n\n    You know that the timing of his arrival is more than a little coincidental.  It could also be the case that he had arrived when he did to survey the damage and identify the bodies.  Mulling it over, you decide to:\n    *choice\n      #Believe him.  After all we've been through, Miller deserves the benefit of the doubt.\n        \"I'm just glad you're safe,\" is all you say, easing up a little, and Miller nods.  You turn to survey the wreckage, and Miller speaks up.\n\n        \"I'm grateful you trust me,\" he says, \"I know it can't be easy and all, what with my past.\"\n\n        You nod.  \"I judge people on the present, not the past,\" you say earnestly.\n        *set martinez %+10\n        *set passion %+5\n        *page_break\n        You pause for a second and consider asking Miller to join you in exacting revenge.\n        *label martinez_choice\n        *choice\n          #Ask him to join me.  I'm going to need all the help I can get.\n            *set passion %+5\n            Gathering the nerve, you speak up.  \"I'm not sure what's going on, Miller, but I do know that I'm not going to sit idly by while my team gets taken out one by one.  I'm going after these bastards, and I'm going to make them pay, or I'm going to die trying.\"  \n\n            You take a deep breath.  \"With so many of our teammates gone, I won't blame you if you want to cut ties and get out of town while the getting is good,\" you say, \"especially if you have loved ones counting on you.  So that's really it, it's your choice now, Miller.  Either way, I respect your decision.\"\n\n            Miller just stares at you for second and, for the first time in a long time, you can't even read a hint of what he might be thinking.\n            *if (martinez > 65)\n              \"I'm with you till the end,\" he says finally.  \"You've been a true friend to me when a lot of other people weren't, and what kind of friend would I be if I just left now?  I don't know what the future holds, but I'm going to be there facing it with you.\"\n\n              A wicked grin spreads over your face.  \"We'll make them pay,\" is all you say, \"even if we have to go to hell and back to do it.\"\n\n              \"Since I'm going with you, there are a few things I need to take care of to make sure my family is provided for, just in case I don't make it back,\" Miller says.  \"And of course, I need to say my goodbyes.  Call me when you're about to go, and I'll be ready,\" he says, picking up his backpack and heading to the elevator.\n\n              \"Sounds good,\" you curtly reply.\n              *set with_martinez true\n              *goto boris\n\n            *else\n              \"I'm sorry,\" he says finally.  \"We've had some ups and downs, and to be honest, my family is just more important than your quest for revenge.  I wish you the best of luck, I really do, but this is just something you're going to have to do without me.\"\n\n              You nod, grudgingly accepting his choice.  \"You'd better get out of here then, Miller.  The cops are going to be coming soon, and you're going to want all the head start you can get.\"\n\n              Miller walks to the elevator, then pauses for a second, hesitating, \"Good luck, ${name},\" he says at last.\n\n              \"Good luck to you, too, Miller,\" you say, feeling deep down inside that you will never see Miller again.\n              *goto martinez_backpack\n\n          #Part ways with Miller.  The road will be dangerous, and I don't want to trudge it with Miller having my back.\n            *set passion %-5\n            \"Look, Miller,\" you say, \"I'm going for revenge, and I'm going to make whoever did this pay.  This, though, is a journey best done solo.\"\n\n            He stares at you inquiringly for a second, and you tell him:\n            *choice\n              #\"It's going to be dangerous, and I don't want your blood on my hands.\"\n                Miller nods with a look of grateful understanding on his face and walks to the elevator.  He moves to press the button but pauses for a second, \"Good luck, ${name},\" he says at last.\n\n                \"Good luck to you, too, Miller,\" you say, feeling deep down inside that you will never see Miller again.\n                *set loved %+5\n                *goto martinez_backpack\n\n              #\"You have people who care about you, and you should be with them.  This isn't your battle.\"\n                Miller nods with a look of grateful understanding on his face and walks to the elevator.  He moves to press the button but pauses for a second, \"Good luck, ${name},\" he says at last.\n\n                \"Good luck to you, too, Miller,\" you say, feeling deep down inside that you will never see Miller again.\n                *set passion %+5\n                *goto martinez_backpack\n\n              #\"To be quite blunt, I just don't trust you.\"\n                Miller just stares at you for a second, and you find it impossible to read his expression.  The corner of his eye twitches and, for a tense second, you think he's about to reach for his gun.  \n\n                Then Miller's shoulders sag, and he simply turns away, walking to the elevator.  You watch the doors close behind him, having a feeling that you will never see Miller again.\n                *set loved %-5\n                *goto martinez_backpack\n\n              #\"I've never liked you, and I certainly don't want you having a gun at my back.\"\n                Miller just stares at you for a second, and you find it impossible to read his expression.  The corner of his eye twitches, then he reaches for his gun.  You're faster, though, and, in an instant, it's over.\n\n                Reaching down, you search his body.  While you don't find anything particularly incriminating, you do find a stack bills amounting to $10,000.  Smiling broadly, knowing it could be blood money and it'll do you more good than it will Miller, you pocket the cash. \n                *set martinez_killed true\n                *set righteousness %-10\n                *set money +10000\n                *goto martinez_search\n    \n      #Call him on it.  Ask him to give his niece a ring and confirm.\n        While you know your distrust might harm your friendship, you also know you don't want to take the chance that Miller is lying.  \"Call her.\"  Miller looks at you for a second, as if wondering who you mean, then it clicks.\n\n        \"Still don't trust me fully, huh?\" he says and then digs in his pocket for his cell phone.  \"Don't worry, I won't hold it against you too much.  I'd probably do the same thing if I was in your shoes.\"\n        \n        The phone rings and a little girl's voice answers.  Miller puts it on speaker and you're able to hear every word as his niece confirms his story.  Satisfied, you thank Miller, telling him that you just can't take any chances.\n        *set passion %-5\n        *set martinez %-5\n        *page_break\n        You pause for a second and think if you want to ask Miller to join you in exacting revenge.\n        *goto martinez_choice\n\n      #Shoot him.  The story is just another big question mark I have about Miller and, at a time like this, it's better to shoot first and ask questions later.\n        You've seen far too many red flags with Miller, and your pent up rage spills over.  In the end, you decide to close the book on Miller.  You aim your weapon and pull the trigger.  And like that, it's over. \n        \n        Reaching down, you search his body.  While you don't find anything particularly incriminating, you do find a stack of bills amounting to $10,000.  Smiling broadly, knowing it could be blood money and it'll do you more good than it will Miller, you pocket the cash.\n        *set passion %+5 \n        *set martinez_killed true\n        *set righteousness %-10\n        *set money +10000\n        *goto martinez_search\n\n  #I let him up, but keep my gun on him.\n    \"Miller,\" you start, \"I'm so sorry, I didn't know it was you.\"  You're off him in an instant, but let him pick himself up, keeping your gun trained.\n\n    He looks at you for a second, then smiles.  \"And I take it since you have your gun still on me, you're not sure where I stand?\"\n    *set passion %-5\n    *set martinez %-5\n\n    You nod.  \"Right now, I don't know where anyone stands, and that's what I have to find out.\"\n\n    \"It's okay,\" Miller says, \"I know this doesn't look good.\"\n\n    \"Yeah,\" you reply simply.\n\n    \"At least you weren't too itchy with your trigger finger,\" he says.  \"Otherwise, I might not get the chance to explain.\"\n\n    You nod, then say, \"How come you're here?\"\n    *goto martinez_answer\n\n  #I shoot him.  The story is just another big question mark I have about Miller, and at a time like this, it's better to shoot first and ask questions later.\n    You've seen far too many red flags with Miller, and your pent up rage spills over.  In the end, you decide to close the book on Miller.  You aim your weapon and pull the trigger.  And like that, it's over.\n\n    Reaching down, you search his body.  While you don't find anything particularly incriminating, you do find a stack of bills amounting to $10,000.  Smiling broadly, knowing it could be blood money and it'll do you more good than it will Miller, you pocket the cash.\n    *set passion %+5 \n    *set martinez_killed true\n    *set righteousness %-10\n    *set money +10000\n    *goto martinez_search\n\n  #I let him up, keeping my gun hidden but at the ready.\n    \"Miller,\" you start, \"I'm so sorry, I didn't know it was you.\"  You're off him in an instant, but let him pick himself up.\n\n    Miller looks at you for a second, then smiles.  \"Cut the act,\" he says.  \"Your hand is about two inches from your gun, I can tell.\"  He sighs. \"You're not sure where I stand, which is fine but it would be so much better if you just came out and admitted it.  You're making it worse by trying to hide the fact that you don't trust me.\"\n    *set passion %-5\n    *set martinez %-10\n\n    You nod.  \"Right now, I don't know where anyone stands, and that's what I have to find out.\"\n    *goto martinez_answer\n\n  #I kill Miller.  I'm not sure what's going on, but I'm not missing a chance to rid the world of him.\n    You've seen far too many red flags with Miller, and your pent up rage spills over.  In the end, you decide not to put a bullet in the lung, knowing that will just give him the opportunity to speak.  You press the barrel against the base of his skull and pull the trigger.  And like that, it's over.\n\n    Reaching down, you search his body.  While you don't find anything particularly incriminating, you do find a stack of bills amounting to $10,000.  Smiling broadly, knowing it could be blood money and it'll do you more good than it will Miller, you pocket the cash.\n    *set passion %+10 \n    *set martinez_killed true\n    *set righteousness %-10\n    *set money +10000\n    *goto martinez_search\n\n*label martinez_backpack\n\nYou're about to turn away when you notice Miller has left his bag.  Your heart beats fast in your chest as you gently open the top, needing to make sure there's no bomb or other unpleasant surprise inside.  At first, you see nothing but a few miscellaneous binders and a change of clothing.  Then, you notice the shiny, gold key peering out of the breast pocket of a flannel shirt.  It appears to be the key to a locker, the words \"Everglades National Park\" are engraved on it.  You know that the Everglades are located in Florida, close to Miami.\n\nYou:\n*choice\n  #Reach down and grab it eagerly, figuring it might be the key to something valuable I ca
