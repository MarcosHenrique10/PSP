e window frames, each roof lined with spectacular tiles building to impeccable points.\n\nAmid the buildings stand relic towers and ancient cathedrals, each lovingly carved and preserved in Gothic style, the brick hand-laid, dark stone standing in sharp counterpoint to the ever-present whitewashed walls and orange-red tile roofs.  Here and there, you see grey, stony accents dotting the white walls, the counterpoint of tones only making the city appear more magical.\n\nSitting in the Old Town Square of Prague, marveling at this jewel situated in the heart of the Czech Republic, you know the moment you've been dreaming about for the past six months is almost upon you.  Suddenly, a text message appears on your global phone, pulling you out of your reverie.\n\nGlancing down at the words on your cell, you smile.  It's Boris's itinerary for the day, sent by your source inside the Crew.  Gingerly folding the newspaper you'd been using to obscure your face, you leave three hundred Czech crowns to cover the check, and slowly walk to another part of town.\n*page_break\nYou lean back against a wall, trying to look like a casual tourist as people stroll by.  As you mull over what comes next, you take a moment to think back on how you'd gotten to this point, your target so close now, nearly within striking distance.  \n \nAfter leaving you high and dry, Boris had decided to start anew.  It had taken you some time, but you'd been able to locate the man who caused the destruction of the Syndicate.  When he'd heard about the Fallen Angels' failure, Boris had kept a low profile.  Still, he'd burned quite a few bridges over the years and, despite being a Russian ex-pat, he didn't have the Eastern Bloc ties he once did.  Boris had constructed a new assassin organization, known as the Crew, but you'd been able to get to one of the hitmen in his employ.  All it took was a well-timed bribe to get the guy out of gambling debt, and you now knew their workings inside and out.\n\n[i]It's time for payback[/i], you think to yourself.  The Crew was small, consisting of five members including your source.  Your inside man was slated to feign horrible stomach problems today, so he wasn't a factor.  That left four well-trained, behind-the-Iron-Curtain-type mercenaries to contend with.  From what your source told you, you know that Boris goes nowhere without them.  He also would, no doubt, be on the lookout for danger, which upped the stakes.  \n\nYou're running over the text and the list of options again, trying to decide the best avenue of attack, when you see a young boy approach.  He's limping, his clothes dirty and face stained with what looks like soot.  He shambles down the cobblestone street toward you and, when he gets close, he mutters in broken English, \"A few crowns please? So hungry…\"  His words trail off.  You know even ten crowns is only about half an American dollar.\n\nStaring at the boy you decide to:\n*choice\n  #Give him twenty crowns.\n    *set loved %+5\n    *set charity +1\n    *set money -1\n    You lean down next to the boy and pull out two 10-crown notes.  You press them into his hands and he smiles, revealing missing teeth.  \"Thank you,\" he says graciously.  He's about to walk off when a sudden whim strikes you.\n    *label urchin\n\n    \"What's your name, kid?\" you ask.\n\n    He looks up at you and smiles again, \"Boris.\"\n\n    You nod, and he walks off down the cobblestone street.  \n    *label urchin1\n    As he does, you look back and forth, furtively, trying to make sure you haven't been made.  After a few minutes, you're confident you haven't been, that it was just a coincidence.  \n    *if (charity > 1)\n      *achieve charitable\n      *goto plan_urchin\n    *elseif (charity = 0)\n      *achieve frugal\n      *goto plan_urchin\n    *else\n      *goto plan_urchin\n\n  #Give him a hundred crowns.\n    *set righteousness %+5\n    *set money -5\n    *set charity +1\n    You lean down next to the boy and pull out a 100-crown note.  You press it into his hands and he gives you a beaming smile, revealing missing teeth.  \"Thank you so much,\" he says graciously.  He's about to walk off when a sudden whim strikes you.\n    *goto urchin\n  #Give him a thousand crowns.\n    *set righteousness %+10\n    *set money -50\n    *set charity +1\n    You lean down next to the boy and pull out a 1,000-crown note.  You press it into his hands and he literally jumps as he sees the bill you've given him.  He flashes you a broad smile, revealing missing teeth.  \"God bless you,\" he says with elation.  He's about to walk off when a sudden whim strikes you.\n    *goto urchin \n\n  #Tell him you have nothing and encourage him to start honest work.\n    You pat your pockets and shrug your shoulders, holding your hands out in an \"I have no money\" gesture.  You apologize and tell the boy that you just don't have any cash on you and that he should look for real work.  You even point to another young boy who is working at a food stand.  He nods, seeming to understand you.  Making one final attempt he says, \"No crowns for Boris?\"  A bit startled by the boy's name, you shake you head and he moves on, walking farther down the street to talk to other people.\n\n    As he does, you look back and forth, furtively, trying to make sure you haven't been made.  After a few minutes, you're confident you haven't been, that his name was just a coincidence.\n    *set passion %+5\n    *goto urchin1\n\n  #Tell him to get lost, wanting to focus on your mission.\n    *set loved %-5\n    *set passion %-5\n    You don't so much as make a move for your pockets, telling the kid to scram.  Making one final attempt he says, \"No crowns for Boris?\"  A bit startled by the boy's name, you shake you head and he frowns then shakes his head, too, muttering something beneath his breath before walking farther down the street to talk to other people.\n\n    *goto urchin1\n  #Sneer at him to scare him off.\n    *set loved %-5\n    *set righteousness %-10\n    You lean forward menacingly with a fierce snarl on your face.  \"Beat it, kid,\" you growl.  \n\n    Making one final attempt he says, \"No crowns for Boris?\"  You raise one hand as if you might strike the boy, though inwardly, you are a bit startled at the boy's name.  The kid quickly hurries on without venturing a backward glance and you laugh a little to yourself.\n    *goto urchin1\n\n*label plan_urchin\n\nTurning back to your thoughts, still a little shocked by the urchin's name, you review Boris's plan for the day.  He's going to be taking lunch in a cafe off the square, meeting with a business acquaintance.  Being in the square yourself, you look around and realize that it's unlikely you'll be able to make a sniper shot due to the close proximity of the buildings near the cafe.  \n\nYou decide it's best to scope out the restaurant up close and, as you do, you see a network of alleyways leading to other areas of the city.  You figure Boris must want a clandestine meeting place because this part of the town is relatively secluded.  You realize it would be the perfect spot for a run-by shooting, the warren of alleys enabling you to disappear to another part of town after the deed was done.  Saving that as one option, you run down the list to see where else Boris will be going today.\n\nAfter lunch, Boris is slated to meet with a gambling kingpin in an upscale, historical hotel.  You know that you'll be able to get in with no problem, but reason that guns are going to have to be out because, even with a silenced weapon, with the old Czech construction, you're likely to put a bullet into another room and bring the police running.\n\nFinishing up the list, you realize there's another option if you wait until Boris has dinner.  He's scheduled to have his supper at a place called Golem Cafe.  The message says there's going to be a big event there tonight, so a direct attack of any kind isn't likely to be successful.  You figure that you can likely find a chef to bribe and try to poison Boris and his crew.\n*page_break\n\nThinking of the options, a you can't help but circle back to the beggar boy and his name.  Boris.  The same name of the man who sold you out, his betrayal made so much worse since he had been like a father to you.  \n\nYou know in your heart that you had been like a child to Boris, and you wonder if it would be even better revenge to sneak into Boris's home when he was gone, leaving a black lily on his pillow, the Russian symbol of death.  You contemplate the notion, knowing that Boris would not only forever be watching over his shoulder, wondering if you were going to strike, but he would also be confronted with the fact that you could have killed him and didn't.  You wonder if that's crueler, forcing Boris to live with his guilt for the rest of his days.\n\nContemplating it all, you also realize you have one other option.  You could let it go.  You recognize that you could forgive Boris for what he did and move on, even though it would be difficult.\n\nIn the end, you decide to:\n*choice\n  #Shoot Boris as he has lunch at the restaurant.\n    You decide that the run-by shooting seems like the best choice and you head out to prepare.\n    *goto shooting\n\n  #Take care of things hand-to-hand at the hotel.\n    You figure that taking care of things up close and personal is the only way to handle this.\n    *goto hotel_attack\n\n  #Opt for a sly poisoning at the Golem Cafe.\n    You reason that a little poison is the perfect recipe for revenge and head off to set things into motion.\n    *goto cafe\n\n  #Sneak into Boris's apartment and leave the black lily.\n    You decide that forcing Boris to live with what he has done is the best revenge, and you head to his place to implement your plan while he's out for the day.\n    *goto apartment\n\n  *selectable_if (pious > 0) #Forgive Boris.\n    In the end, you realize that you're better off letting the hatred go. \"A man's wisdom gives him patience; it is to his glory to overlook an offense.\" Taking a long and deep breath, you leisurely stroll down the cobblestone streets.  At first, it's difficult, thinking of all that Boris did to you and your teammates but, with each step, a little of the burden seems to fall away.\n\n    By the time you've walked three blocks, your head is clear and you feel lighter.  You survey the beautiful towers, the antique stone, and the glistening spires.  You walk to the river and cross the Charles Bridge.  You stroll up the path to Prague Castle and spend time taking in the sights.  When you finish, you feel relieved, cleansed, and ready to move forward, feeling a huge weight lifted from your shoulders.\n    *set pious +1\n    *achieve turntheothercheeck\n    *check_achievements pious\n    *if not (choice_achieved_pious) and (pious > 2)\n      *achieve pious\n    *set righteousness %+15\n    *goto end_scene\n\n*label shooting\n*page_break\nYou enter your hotel room and ready yourself to strike.  \n*if (miami_partner = \"none\")\n  You take a few deep breaths to steady yourself and then, tucking away two silenced pistols, make your way toward the final showdown.\n*if miami_partner != \"none\"\n  ${miami_partner} is eager to help and you smile broadly, not just grateful for the extra firepower, but also that your companion will be there when you exact revenge.\n\n  Tucking away two silenced pistols, ${miami_partner} doing likewise, you begin to make your way to the final showdown.\n*comment endif\n\nThe cafe is nearly empty, aside from a jazz duo playing a pleasant tune in the back of the place, and two grizzled old men enjoying mugs of beer.  The massive Tyn Church looms in the distance with its the ornate spires rising high into the air above the Gothic construction.  Surveying the side alley where the restaurant is located, you once mentally map out potential exit routes.\n\nBoris arrives a few minutes later with his four large bodyguards, two male, two female.  You know hard and seasoned bodyguards when you see them, and these four fit the bill, their stern faces and cold eyes darting around, looking for trouble.  They look like a stiff challenge, but you realize that now is the time to strike, before Boris's business acquaintance can arrive with more bodyguards in tow.\n*page_break\n\nStepping from the shadows, ${you} open fire. You catch the nearest bodyguard with two rounds to the chest, but she doesn't go down.  Cursing the small caliber weapon, knowing she might have a vest on, you aim for the head.  The woman is quick, though, ducking to the side.  Her breath is labored, and your shots seem to have done at least a little damage.\n\nYour element of surprise is now gone and, in an instant, the other three bodyguards have their guns out.  \n*if companion\n  Boris is also in the process of drawing his weapon.  You see one of the bodyguards go down in a heap, the handiwork of ${miami_partner}.  You press forward, firing at one of the other bodyguards.  He falls face forward onto the table from a well-placed shot between the eyes.\n*if companion = false\n  Boris is also in the process of drawing his weapon.  You're ready, though, and able to get off a shot at the nearest bodyguard.  He goes with a thud and you press forward, firing at one of the other bodyguards.  He falls face forward onto the table from a well-placed shot between the eyes.\n*comment endif\n\nYou vaguely notice that the jazz music has stopped, the duo's instruments on the ground.  Your shots, though silenced, ring out even more prominently, but the woman you'd initially shot finally goes down for good with a bullet to the side of the head.\n*if companion\n  ${miami_partner} is laying down suppressive fire but the lone remaining bodyguard flips the wooden table to the side and hides behind it with Boris.\n\n  Knowing your small caliber bullets aren't going to go through the makeshift barricade, you gesture to ${miami_partner} to go around one side while you go around the other.\n*if companion = false\n  You lay down heavy fire, but the lone remaining bodyguard flips the wooden table to the side and hides behind it with Boris.\n\n  Your small caliber bullets aren't going to go through the makeshift barricade, and you know you have to go around.\n*page_break\n*if companion = false\n  You rush forward at a frantic pace, but Boris is ready for you and has a large caliber pistol aimed right for your stomach as you make your way around.  Out of the corner of your eye, you see the last remaining bodyguard aiming for your head and instinctively, you pull the trigger, dropping him with the shot.\n\n  *if (ranged_weapons > 20)\n    Having only a split second to think, you dive toward Boris.  The move is unexpected, and Boris tries to pull away.\n    *goto land\n  *else\n    *label shooting_wound\n    Having only a split second to think, you dive to the side.  Boris anticipates the move, though, and fires.  You feel a lancing tug at your side, but have no time to worry about it, as you see Boris aiming the gun at your head.\n    *set wounded_here true\n\n    You dive forward, and this time the move is unexpected.  Boris tries to pull away.  \n    *label land\n    You land on top of Boris and slam the butt of your gun into his jaw.  Blood splatters, and Boris's head turns to the side as he cradles his mangled mouth.  You point the gun at the back of his head and say only, \"[i]Do svedanya, predatel[/i].\"  The bullet shatters the skull and leaves only a tiny hole to mark its fatal entrance.\n    *goto survey_wound\n*else\n  Hearing ${miami_partner}'s silenced shots, you rush forward.  Boris is ready for you, though, and has a large caliber pistol aimed right for your stomach as you make your way around.  Out of the corner of your eye, you see the last remaining bodyguard crumble in a bloody heap, but you know that, by the time ${miami_partner} is able to get a bead on Boris, it will be too late.\n\n  *if (ranged_weapons > 25)\n    Having only a split second to think, you dive forward.  The move is unexpected, and Boris tries to pull away.\n    *goto land\n  *else\n    *goto shooting_wound\n\n*label hotel_attack\n*page_break\n*if companion\n  You enter the hotel room and wait until the time is right.  Reasoning that Boris would be back at his hotel after his lunch meeting, you ready yourself to strike.  ${miami_partner} is eager to help and you smile broadly, not just grateful for the extra firepower, but also that your companion will be there when you exact revenge.\n\n  Tucking away two finely-honed blades, ${miami_partner} doing likewise, you begin to make your way toward the final showdown.\n*if companion = false\n  You enter your hotel room and wait until the time is right.  Reasoning that Boris would be back at his hotel after his lunch meeting, you ready yourself to strike.  You take a few deep breaths to steady yourself and then, tucking away two finely-honed blades, you begin to make your way to the final showdown.\n*page_break\nThe hotel is opulent.  Designed in traditional Czech style, there are rising spires, white-washed walls, and ornate decoration surrounding all of windows and doors.  You walk inside and see a spacious foyer with plush, red carpet.  You act like you belong here, heading straight to the elevator.  Filing in after a couple, you let them use their keycard so you can gain access to the room levels.\n\nThe couple exits and you wait until you reach the right floor.  The gambling kingpin Boris is meeting has a suite on the top floor.  You know this because your mole told you, but you find the tip unnecessary.  There are two burly guards seated in chairs at the far end of the hall.  They look bored, and are each trying to seem like they're reading the newspaper while casually keeping watch on the hall.\n\nYou pretend like you're lost, feigning going to one door after another.  When the only one left is the kingpin's, you turn and walk toward the two men, speaking loudly in English, \"Excuse me, but I can't seem to find my room and…\"\n\nBoth men groan as you perfectly play the role of obnoxious tourist in order to get close to them.  They are so taken with your performance that they don't see the blade you've pulled out.  Your movements are quick and precise, one slice in behind the larynx followed by a sharp thrust forward.  You hunch the two men over to make it seem as if they have passed out, but know the charade won't pass any strict scrutiny.  Still, you don't plan on being here long.\n\nMarching to the kingpin's door, you prepare to kick it in.\n*page_break\nThe old door bursts open with surprising ease, the frame splintering as it's kicked in. $!{you} rush in, wasting no time, and catch Boris and the rest of the gathered occupants by surprise.  \n\nA bodyguard is positioned on each side of the door, while Boris's other two bodyguards are sitting at a table on the far side of the room.  Boris and a nondescript middle-aged man, who you take to be the kingpin, sit on the bed with a briefcase filled with paperwork sitting between them.\n\nIn unison, the startled occupants reach for their weapons.  The two bodyguards closest to the door never have a chance.\n*if companion\n  You are lethal with your blades, slicing the gut and neck of one, while ${miami_partner} easily dispatches the other.\n*if companion = false\n  You are lethal with your blades, slicing the neck of one, and making short work of the other with a stab to the chest.  \nThe two bodyguards in the chairs, though, have their weapons nearly drawn, and you see both Boris and the kingpin reaching for their own weapons.\n\nYou rush toward the two bodyguards on the far side of the room, knowing you'll be a sitting duck if you don't take them out.  Out of the corner of your eye, you see the middle-aged kingpin rise with surprising speed.  \n\nThe two guards have risen by the time you get close enough to strike, but you duck and slide as you rush toward them, slicing upward as you do.  The knife severs the femoral artery of the closest guard, who collapses to the ground, a pool of blood quickly forming around her.\n*if companion\n  ${miami_partner} is right by your side and uses a wild, spinning slash to sink the blade deep into the neck just above the clavicle.\n*if companion = false\n  You're back on your feet in an instant and use a wild, spinning slash to sink the blade deep into the throat of the other.\n*comment endif\n\nYou turn back to Boris and the kingpin and find yourself looking down the barrels of two silenced weapons.\n*page_break\n\nYou rush forward as fast as you can, grabbing for the kingpin's weapon with one hand and brandishing a blade with the other.  Wrestling for control of the weapon, you use your knife to slice the kingpin's hamstring.  He screams in pain but, from the corner of your eye, you can see Boris has you in his sights.\n\n*if (miami_partner = \"none\")\n  You fling your blade at Boris and he dodges back.  It doesn't hit Boris but the distraction puts his aim off and his bullet hits the kingpin in the back.\n\n  *if (strength > 20)\n    The kingpin is dead weight and, try as you might to use his body as a shield, the angle is awkward and gives you no protection.  With several feet of distance still between you, you see Boris is already taking aim again.\n\n    Having only a split second to think, you dive forward.  The move is unexpected, and Boris instinctively tries to back away.\n    *goto hotel_end\n  *else\n    *label hotel_wound\n    *set wounded_here true\n    The kingpin is dead weight and, try as you might to use his body as a shield, the angle is awkward and gives you no protection.  With several feet of distance still between you, you see Boris is already taking aim again.\n\n    Having only a split second to think, you duck to the side.  Boris anticipates the move, though, and fires.  You feel a lancing tug at your side, but have no time to worry about it, as you see Boris aiming the gun at your head.\n\n    You dive forward, and this time the move is unexpected, and Boris instinctively tries to back away.  \n    *label hotel_end\n    You land on top of Boris and slam the knife into his side.  Blood spouts from the wound, and Boris rolls to his belly.  You pull on his chin, pressing the knife to his throat.  You growl, \"[i]do svedanya, predatel[/i],\" before slicing him from ear to ear.\n    *label survey_wound\n    *if wounded_here\n      *gosub_scene util health_check_regular\n\n      You survey your wound and realize that it's not as bad as you had feared.\n    *if companion\n      Gesturing to ${miami_partner}, you head out to the balcony and make your way down the fire escape.  \n    *if companion = false\n      You head out to the balcony and make your way down the fire escape.  \n    You hightail it back to the hotel, being careful to take a circuitous path to ensure there will be no way you can be traced back to the scene.  \n    \n    You feel confident that no one got a good enough glimpse to recognize you and, as you sit in your hotel room, reasoning you want to let any heat die down,\n    *if companion\n      ${miami_partner} asks you what you said to Boris in the end.  You smile, explaining that you said, \"Goodbye, traitor\" in Russian, knowing it was fitting for a man of few words to hear those as his last.\n    *if companion = false\n      you think back on what you said to Boris in the end.  You smile, remembering how you told him, \"Goodbye, traitor\" in Russian, knowing it was fitting for a man of few words to hear those as his last.\n    *comment endif\n\n    Then, you push it all from your mind as you sink into a restful slumber, knowing vengeance was yours.\n    *set wounded_here false\n    *goto end_scene\n*else\n  *if (strength > 25)\n    There's a flash of steel and a glint of light, and Boris ducks back.  In that instant, you realize that it's ${miami_partner}'s blade, thrown with full force. It doesn't hit Boris but the distraction puts his aim off and his bullet hits the kingpin in the back.\n\n    The kingpin is dead weight and, try as you might to use his body as a shield, the angle is awkward and gives you no protection.  With several feet of distance still between you, you see Boris is already taking aim.\n\n    Having only a split second to think, you dive forward.  The move is unexpected, and Boris instinctively tries to back away.  \n    *goto hotel_end\n  *else\n    There's a flash of steel and a glint of light, and Boris ducks back.  In that instant, you realize that it's ${miami_partner}'s blade, thrown with full force.  It doesn't hit Boris but the distraction takes his aim off and his bullet hits the kingpin in the back.\n\n    *goto hotel_wound\n\n*label cafe\n*page_break\n*if companion\n  You enter your hotel room and wait until the time is right.  The minutes and hours seem to tick by with interminable slowness, but at least you have ${miami_partner} to talk with and pass the time.  Finally, the sun begins to set and, seeing dusk beyond your window, you know that Boris is likely to be headed to the Golem Cafe soon.  Eager to set your plan into motion, you ready yourself for revenge.\n*if companion = false\n  You enter your hotel room and wait until the time is right.  The minutes and hours seem to tick by with interminable slowness but finally, the sun begins to set.  Seeing dusk beyond your window, you know that Boris is likely to be headed to the Golem Cafe soon.  Eager to set your plan into motion, you ready yourself for revenge.\n*page_break\nIt's called the Golem Cafe.  Situated away from both Charles Bridge and Prague Castle, two of the most famous attractions in the jewel of the Czech Republic, Golem Cafe has a charm of its own.  Named after the famed monster created for protection, the place is regarded for its super-human-sized Golem statue as well as the delicious borscht it serves.  It's the borscht, one of Boris's favorite dishes, that you're here for, knowing it will be the perfect vehicle for delivering the poison. \n\nSurreptitiously, you peek your head out of the kitchen and see that Boris and his bodyguards have not yet arrived.  The party mentioned by your source has already started, though—a group of boisterous revelers all hoisting steins of Czech Pilsner at a large table near the famed statue of the Golem.\n\n*if companion\n  \"Is Boris there?\" you hear ${miami_partner} ask from behind you in the kitchen.\n\n  \"Not yet,\" you say, closing the door.  \"I'm going to check on the final preparations.  Why don't you keep an eye on the back door so, in case things go haywire, at least we won't be caught by surprise.\"  ${miami_partner} nods, and heads toward the back of the kitchen, near the exit.\n\nYou head back to the cook to make sure the final preparations are in place.  The heavy, Czech chef nods, and you hand over a giant wad of crowns.  He turns his back and you slip a vial of clear liquid from your pocket.  \n\nYou pour a sizable amount into the five dishes of borscht sitting before you.  Backing away, you know all that's left is to wait.\n\n*page_break\nIt seems an interminably long time before the orders come in for Boris and his crew and you're just thankful that borscht is a dish that can be served warm or cold.  The waiter picks up two of the dishes and is about to depart when you stop him.  \"What are you doing?\" you ask, pointing to the other three bowls.  \n\nHe shrugs at you.  \"The party only ordered two.\"\n\n\"The head honcho,\" you say, \"did he order one?\"\n\nThe waiter seems to know exactly who you're talking about because he immediately shakes his head.  \"No, he's been on his phone since he got in, and he had someone else order for him.\"\n\n\"Damn!  Okay, I know him well and he's going to want the borscht.  It's one of his favorite dishes, so bring one for him, too.\"  The waiter sticks out his hand and you know what he's looking for.  You press a roll of bills into his hand, and he walks over to the remaining bowls.\n\nAs the waiter grabs one of the bowls, a thought strikes you—it might seem strange if the server only brings a bowl for Boris.  \"Hey,\" you say, \"take the remaining two also and just give one to everyone.\"\n\nThe waiter nods, and does as you bid him before disappearing out the door.  You wait for what again seems like an eternity until the waiter returns.  \"Take your time out there?\" you ask.\n\n\"I had to take another order,\" he says, a little annoyed.\n\nYou're barely listening, instead asking the key question, \"Did he have the soup?\"\n\nThe waiter shrugs dismissively.  \"Not yet, he was still on the phone.\"  \n\nYour stomach sinks. Your concern must be written on your face because the waiter says, \"Relax, he'll have it eventually.  His eyes lit up when he saw it.\"\n\nYou shake your head and rush forward, \"I'm not worried about that, I'm worried…just tell me, did any of the others at the table eat any of the soup yet?\"\n\n\"Well, two of them were deep in conversation but the other two they dove right in.\"\n\nAt those words, you turn immediately toward the door.  \n*page_break\n\nHearing the crash of plates and loud curses from the other room, your realize you have little time.  Racing toward the door, you pull your pistol from your waistband.  You hear the kitchen staff starting to flee and register the panicked look on the face of the waiter before he, too, starts running.  You have one hand on the door and the other on your gun when you're suddenly flung backward with violent force as the door is smashed open and Boris and two bodyguards storm into the room.\n\nYou land with a solid thud, your gun flying from your hand, your other hand bringing down a rack of cooking implements.  You barely have time to register Boris and his bodyguards—all with weapons drawn—before they mow down the fleeing kitchen staff and the waiter with a barrage of bullets.  The bodies fall to the floor, and Boris and his bodyguards turn their guns toward you. \n\n\"I should have known it was you,\" Boris says with a sneer.\n\nYou say:\n*fake_choice\n  #\"Who else would you think it was, the Tooth Fairy?\"\n  #\"Good to see you, too.\"\n  #\"You're dead, Boris.\"\n  #\"Miss me?\"\n\nBoris laughs.  \"Even as you're about to die, you never cease to amuse me ${name}.\"\n\nLooking around for something you could use for a distraction, you spy a bowl of flour sitting on the counter, the beginning of a massive pastry resting in stainless steel.  Knowing you have little choice but to take a risk, you ready yourself to leap for the counter. Hoping for a distraction, you say, \"Come on, Boris, let's put this behind us.  You have to admit, now we're even.  You tried to kill me and failed, I tried to kill you and failed, even-steven and all that…\"\n\nBoris laughs, and you use the opportunity to make your move.  The distance to the counter is short, but Boris and his remaining bodyguards already have their fingers on their triggers, and you're going to be riddled with bullet holes.  You need every advantage you can get, so you kick out at the upturned utensil stand.  It doesn't go far, but the clatter is enough to draw Boris's attention—and that of his bodyguard's—away for a moment.  That's all you need.\n\n*if ((improvisation > 25) or (intelligence > 25)) or (companion and ((improvisation > 20) or (intelligence > 20)))\n  Using your quick-thinking, you rush for the bowl and hurl it at the three of them, being sure to turn it as you do so the flour has the maximum effect.  The toss is perfect, sending a plume of flour into the faces of Boris and his bodyguards.  As they instinctively back away, you dive for the gun.\n  *if companion\n    Grasping the weapon in your hands, you take aim.  At the same time, ${miami_partner} rushes in and fires off three rounds in quick succession, two of the bullets hitting a bodyguard in the legs, and the third finishing him off as he drops to his knees.\n  *if companion = false\n    Grasping your weapon in your hands, you fire off three rounds in quick succession, two of the bullets hitting a bodyguard in the legs, and the third finishing him off as he drops to his knees.\n  *label cafe_end\n\n  You immediately turn to the second bodyguard and drop him with a head shot, the flour covering his face having blinded him to his last moments.  You turn your gun at Boris, but he's quicker, rushing forward.  The flour is still blurring his vision, but he's strong and able to knock you onto your back, his weight falling on you as he presses the gun into your flesh.\n  *page_break\n  Having only a split second to think, you thrust all your force up and to the side.\n  *if companion\n    The move is unexpected, and Boris winds up on his back but, in this position, you're blocking ${miami_partner}'s shot.  \n  *if companion = false\n    The move is unexpected, and Boris winds up on his back.  \n  Boris tries to roll out of it, but you force him to his belly.  Pressing the gun to the back of his skull, you growl, \"[i]Do svedanya, predatel[/i],\" before pulling the trigger.\n  *goto survey_wound\n*else\n  Thinking quickly, you rush for the bowl and hurl it at all three. It's a bad angle, though, and you don't get the maximum effect. A plume of flour flies into the faces of Boris and one of his bodyguards, but the other is unscathed.\n\n  Knowing you have no choice but to move, you dive for the gun.  Grasping the weapon in your hands, you feel a sharp pain in your side and realize you've been shot.  \n  *if companion\n    The bodyguard takes aim to deliver a kill shot but, at the same time, ${miami_partner} rushes in and fires off three rounds in quick succession, two of the bullets hitting the bodyguard in the legs, and the third finishing him off as he drops to his knees.\n  *if companion = false\n    You see the bodyguard taking aim for a kill shot.  With no time to think about it, you fire off three rounds in quick succession at the bodyguard who shot you.  Two of the bullets hit him in the legs, and the third finishes him off as he drops to his knees.\n  *goto cafe_end\n  \n*label apartment\nIt takes you hours to search for just the right lily, but you know from your source that Boris is expected to be out all day.  You find yourself in the central square with peddlers hawking their wares, gypsies offering to tell fortunes, and merchants with carts of roasted pork, fall-off-the-bone roasted beef, and roasted chicken on the spit.  None of these draw your attention, though.  You're looking for something else entirely.  \n\nYou stand in the shadow of the astronomical clock, one of the landmarks of Prague, and the oldest of its kind in the world that's still operational.  Each hour, the four figures flanking the clock are set in motion, each representing something despised at the time of the clock's making.  Vanity is represented by a figure admiring himself in the mirror, greed is represented by a miser holding a bag of gold, pleasure and entertainment illustrated by an historically inaccurate figure of a Turk.  You realize, looking at the first three, just how much they represent Boris's greed and vanity, the duo mixing for his pleasure and entertainment.\n\nStanding in the square, staring up at the clock, you realize that the fourth figure represents you in the most fitting way.  It is death, a skeleton that strikes the time upon the hour.  A broad smile spreads across your face and, almost on cue, you spy a florist on the far side of the square near the Gothic Tyn church, whose impressive spires rise above the old town center.\n\nThe woman who sells you the lily gives you a knowing look, and you smile at her, almost as if she has read the look on your face.  She is a stout and strong Eastern European,  and you surmise that she has probably sold many of these death flowers to people of your ilk: killers, assassins, vengeance seekers.  You nod to the woman and let her keep the change, keeping the single lily close to your chest.\n*page_break\n\nIt's almost too easy for you to break into Boris's apartment and, for a minute, you fear there's a trap.  You automatically tense into a fighting stance, ready for an ambush.  Finally, after several moments elapse and no one steps forward, you realize that Boris has just gotten sloppy.\n\nLooking around his apartment, and seeing relics from the former Syndicate, you become even more resolved in your decision.  Spying a picture of yourself, a small rosary hanging beside it, your knees almost buckle.  [i]Boris, how did you let it come to this…[/i]  It's not even a question.  It was destiny, and you're grateful that you decided against killing the man you'd once considered a father, no matter what he'd done.  His decision had been hard enough.\n\nYou walk toward his bed and place the lily down with a grave solemnity.  You scribble down a small note on a scrap piece of paper, writing:\n*choice\n  #\"I forgive you my friend, give me a call and let's move on.\"\n    It's hard.  There's no mistaking that.  After everything you've been through, there is no easier way to say it except that the first words you write are almost impossibly hard.  Still, deep down, you know that Boris had little choice.\n\n    In the end, you decide to bring him back into the fold.  Thinking of his small pseudo-shrine to you, some small voice inside of you says that this is what Boris wanted all this time.  Folding up the small note, you know it's only a matter of time until you get that call.  Confident in your decision, you turn away, walking with your head held high.\n    *set righteousness %+10\n    *goto end_scene\n  #\"I forgive you my friend, but this is the end.\"\n    It's hard.  There's no mistaking that.  After everything you've been through, there is no easier way to say it except that the first words you write are almost impossibly hard.  Still, you can recognize that Boris had little choice.\n\n    In the end, you decide to let the hate go.  Thinking of his small, pseudo-shrine to you, you know that you have to move one.  Confident in your decision, you turn away, walking with your head held high.\n    *set righteousness %+5\n    *set passion %+5\n    *goto end_scene\n  #\"I understand.\"\n    It's hard.  There's no mistaking that.  After everything you've been through, there is no easier way to say it except that the first words you write are almost impossibly hard.  Still, you can recognize that Boris had little choice.\n\n    Thinking of his small, pseudo-shrine to you, you know that this will only make his choices all that much more painful.  Folding up the small note, you are solemn as you exit the room, knowing this is likely the last you will ever communicate with Boris.\n    *set passion %+10\n    *goto end_scene\n  #\"I'll be watching you.\"\n    The words flow easily after everything you've been through, and you know that, once Boris reads them, he will never sleep well again.  You laugh a little to yourself, knowing that this is truly the best revenge, one that will make him suffer for the rest of his days for his betrayal of you and your crew.  You also know you will stay true to your word and keep Boris monitored.\n\n    Thinking of his small, pseudo-shrine to you, you know that this will only make his choices all that much more painful.  Folding up the small note, you smile a little to yourself as you exit the room, knowing Boris will forever be looking over his shoulder.\n    *set righteousness %-5\n    *set passion %-5\n    *goto end_scene\n  #\"Any day, any time, your life is mine.\"\n    The words flow easily after everything you've been through, and you know that, once Boris reads them, he will never sleep well again.  You laugh a little to yourself, knowing that this is truly the best revenge, one that will make him suffer for the rest of his days.\n\n    Thinking of his small, pseudo-shrine to you, a part of you knows that this will only make his choices all that much more painful.  Folding up the small note, you smile a little to yourself as you exit the room, knowing Boris will forever be looking over his shoulder, and you are grateful for it.\n    *set righteousness %-5\n    *set loved %-5\n    *goto end_scene\n\n*label end_scene\n*page_break\nThe cobblestone streets of Prague's Old City pass beneath your feet as you continue to marvel at, not only the City of a Hundred Spires, but how your life has taken so many twists and turns in the six months since your encounter with Phoenix.\n\n*if (respect > 55) and (money > 80000)\n  You're grateful that, because of the money you'd accumulated and the respect you'd garnered, you were able to construct the greatest hit-for-hire organization in history.  Your reach is without compare, your grasp flawless.  \n  *gosub org_name\n  \n  You'd been able to resurrect ${organization_name} from the ashes of the original Syndicate.  It was not easy, with so much of the formerly strong group shattered, dead, or destroyed, but you'd been dedicated.  The money helped you hire a new, small squad to start things off, though you know it was only because of the respect you'd garnered that your new, select few had agreed to work for a reduced rate, with deferred payment.  \n\n  Thinking back on it all, you know the biggest and greatest surprise, had come from the sudden and unexpected reappearance of Dante and Marie, who had gone into hiding when things had gone south.  They apologized for giving you a scare, and told you they had reached out to you, but hadn't been able to get a hold of you in time for your journey to Europe.  You'd accepted your friends back into the fold with open arms, and they had both agreed to work for contingency until things picked up, saying that was the least they could do.  \n\n  The rest of your money had gone to supplies and a new safe house.  However, once you'd set up shop, the money had come rolling in.  Now, you think of how ${organization_name} has grown to the most powerful assassin organization in the world.\n  *label rock_on\n  *page_break\n\n  *gosub sort_martinez\n  \n  *page_break\n  *gosub righteous_ruthless\n  *goto passion_respect_high\n\n*elseif (respect > 55) and ((money > 45000) and (money \u003c 85000))\n  You're grateful that, because of the respect you'd garnered and the money you had saved, you were able to get back on your feet.  While you didn't have enough money to truly resurrect the Syndicate, with so much of the formerly strong group shattered, dead, or destroyed, the money you had helped you form a smaller agency.  Once you'd gotten the momentum of the group going, you'd decided to name the crew:\n  *gosub org_name\n  \n  Thinking back on it all, the biggest and greatest surprise came from the sudden and unexpected reappearance of Dante and Marie, who had gone into hiding when things had gone south.  They apologized for giving you a scare and told you they had reached out to you, but hadn't been able to get a hold of you in time.  You'd accepted your friends back into the fold with open arms, and they had both agreed to work for contingency until things picked up, saying that was the least they could do.  \n\n  While you know it's unlikely that your agency will ever rival what the Syndicate was, or challenge the big players who have emerged in the wake of the collapse of the Syndicate and the Fallen Angels, you're content with the pace at which your company is growing.  In the black hole that emerged in the wake of the collapse of the two greatest agencies, everyone was throwing money around trying to bolster their crews.  While you certainly had respect in your favor, the funds it would have taken to create another mega-agency were just not within your grasp.  Still, you're pleased with the niche you've found, and you know you have a bright future ahead of you.\n  *goto rock_on\n*elseif ((respect > 35) and (respect \u003c 60)) and (money > 70000)\n  You're grateful that you had quite a bit of money saved and were able to get back on your feet.  As you quickly found out, while you had a decent amount of respect, other assassins weren't clamoring to join you as you attempted to form a new agency.  Your notoriety didn't reach the highest levels.  As a result, it cost a small fortune to get a starter crew together, and while you weren't able to truly resurrect the Syndicate, with so much of the formerly strong group shattered, dead, or destroyed, the money you had helped you form a small agency.\n\n  *gosub org_name\n  \n  Thinking back on it all, you know the biggest and greatest surprise, however, came from the sudden and unexpected reappearance of Dante and Marie, who had gone into hiding when things had gone south.  They apologized for giving you a scare and told you they had reached out to you, but hadn't been able to get a hold of you in time.  You'd accepted your friends back into the fold with open arms, and they had both agreed to work for contingency until things picked up, saying that that was the least they could do.  \n\n  While you know it's unlikely that your agency will ever rival what the Syndicate was, or challenge the big players who have emerged in the wake of the collapse of the Syndicate and the Fallen Angels, you're content with the pace at which your company is growing.  In the black hole that emerged in the wake of the collapse of the two greatest agencies, everyone was throwing money around trying to bolster their crews.  While you certainly had respect in your favor, the funds it would have taken to create another mega-agency were just not within your grasp.  Still, you're pleased with the niche you've found, and you know you have a bright future ahead of you.\n  *goto rock_on\n\n*elseif (respect > 55) and (money \u003c 50000)\n  You're grateful that, because of the respect you'd garnered, you'd been able to get back on your feet because you had little money to show for your assassin career.  While you didn't have money to try to resurrect the Syndicate, or even to get a small assassin crew together, your reputation preceded you.  \n\n  You smile as you reminisce on how team after team had reached out to you, trying to get you to join them in the power struggle that emerged after the collapse of the two biggest assassin groups in the business.  Eventually, you'd decided on a team which seemed like a good fit. \n\n  Several new, big players emerged in the wake of the collapse of the Syndicate and the Fallen Angels, but you were instrumental in helping your crew become the strongest and the best, gaining a massive foothold.  Now that team, with you as their lead assassin, is on top of the hitman game.  \n\n  *label explain_to_boss\n  You'd explained to your new bosses about the unfinished business with Boris, and they'd been all too happy to give you the chance to get your revenge.  Thinking of your team, you're pleased with the place you've found and the promise you have, knowing you have a bright future ahead of you.\n  *page_break\n\n  *gosub sort_martinez\n\n  *page_break\n\n  *gosub righteous_ruthless\n  *goto passion_respect_mid\n\n*elseif ((respect \u003c 60) and (respect > 35)) and (money \u003c 75000)\n  You're grateful you'd been able to get back on your feet in spite of having little money to show for your assassin career.  While you were respected, nothing you did really set you apart from other assassins.  Since you didn't have money to resurrect the Syndicate, or even to get a small crew together, you were forced to reach out to different teams to win them over in the power struggle that emerged after the collapse of the two biggest assassin groups in the business.  \n\n  Several new, big players emerged in the wake of the collapse of the Syndicate and the Fallen Angels and, like an eager job applicant, you reached out to them all.  While the biggest and the best weren't interested, you found your niche with a smaller agency that specialized in political hits.  \n\n  While your crew is never going to be a world power like some of the bigger agencies, you're happy with the people you work with and the jobs you do.\n  *goto explain_to_boss\n\n*elseif ((respect \u003c 40) and (money \u003c 75000)) and (righteousness > 50)\n  You're grateful you'd been able to survive because you had little money and little respect to show for your assassin career.  Since you didn't have money to try to resurrect the Syndicate, or even to get a small assassin crew together, you were forced to reach out to different teams to try to get them to take you on in the power struggle that emerged after the collapse of the two biggest assassin groups in the business.  \n\n  Several new, big players emerged in the wake of the collapse of the Syndicate and the Fallen Angels and, like an eager job applicant, you reached out to them all.  However, since nothing you'd done had really helped make a name for yourself, the biggest and the best weren't interested, and the smaller crews had equally fierce competition.  \n\n  In the end, you decided to leave the hitman business altogether, putting your talents to other use.  It took a while for you to find your niche, time spent bouncing around in frustration as you didn't know where your life's compass was pointing but, when you figured it out, you found yourself pleased with your decision.  \n\n  Taking out a small loan and investing what little proceeds you had made in the hitman racket, you started a Mixed Martial Arts school, imparting your wisdom on the next generation of warriors.  You reflect with pride on how the business has grown to the point where you even have a few fighters who are moving into world class organizations.  The money isn't bad, either, and you know it will only get better as your academy gains more prominence.\n\n  Smiling, you reflect on how your reputation for righteousness has helped you out, your students attracted to your positive attitude.   Also, former clients as well as casual associates send students interested in training your way so they can learn honor as they learned combat.\n  *page_break\n\n  *gosub sort_martinez\n  *set business \"dojo\"\n  \n  *gosub partner\n  *goto passion_respect_low\n\n*elseif ((respect \u003c 40) and (money \u003c 75000)) and (righteousness \u003c 55)\n  You're grateful you'd been able to survive because you had little money and little respect to show for your assassin career.  Since you didn't have money to resurrect the Syndicate, or even to get a small assassin crew together, you were forced to reach out to different teams to get them to take you on in the power struggle that emerged after the collapse of the two biggest assassin groups in the business.  \n\n  Several new, big players emerged in the wake of the collapse of the Syndicate and the Fallen Angels and, like an eager job applicant, you reached out to them all.  However, since nothing you'd done had really helped make a name for yourself, the biggest and the best weren't interested, and the smaller crews had equally fierce competition.  \n\n  In the end, you decided to leave the hitman business altogether, putting your talents to other use.  It took a while for you to find your niche, time spent bouncing around in frustration as you didn't know where your life's compass was pointing but, when you figured it out, you found yourself pleased with your decision.  \n\n  Taking out a small loan and investing what little proceeds you had made in the hitman racket, you'd started a bail bonds and bounty hunter company, a no-nonsense organization that was quickly gaining prominence due to your business policy: whatever it takes to get your man.  The money wasn't bad, either, as your company kept expanding to meet the demand.\n\n  Smiling, you reflect on how your reputation for ruthlessness has helped you out, your clients attracted to your aggressive attitude.  Teaching your team techniques you'd learned from years of hitman work, and imparting a ruthless mentality also helped make sure that they always got uitous opportunity because he knew you were someone he could trust, someone who wouldn't stab him in the back.\n\n    *set business \"retire\"\n    *gosub partner\n    *goto passion_respect_low\n\n  *else\n    Smiling, you reflect on how your reputation for ruthlessness has helped you out, your old contact reaching out to you and offering you such a fortuitous opportunity because he knew you were someone to be feared, and people would listen to if they knew was was good for them.\n\n    *set business \"bookmaker\"\n    *gosub partner\n    *goto passion_respect_low\n\n*label passion_respect_high\n*if (passion > 65)\n  *page_break\n  *if (miami_partner = \"none\")\n    Your life has been driven by passion and, while you've focused intently on the career aspects of your life, you've also found yourself seeking a creative outlet.  Surprisingly, that outlet came through painting.  \n\n    It was an odd thing at first.  Always an admirer of art, finding even beauty in the art of killing, you decided one day that you wanted to take a stab at putting a brush to canvas.  You quickly found that you had an aptitude for it, and you quite soon had a steady collection of abstract art.  With your connections, you'd even begun to make a small name for your self, albeit under a pseudonym.  \n\n    Trying your hand at representative art, you are now staring at the Charles Bridge.  Deep down, you feel this will be a masterpiece.\n    *achieve artist\n    *if (respect > 80) and (money > 110000)\n      *goto shen_choice\n    *else\n      *goto credits\n  *else\n    You lock hands with ${miami_partner} on the bridge and pause for a moment.  You've been thinking about this for a long time.  Passion has fueled your life and guided your decisions, and this is no different.  You touch the small, square bulge in your back pocket for what seems like the millionth time today.  \n\n    Butterflies flutter in your stomach.  You think it odd, how you've faced death numerous times only to come out but I know how dedicated you are and I know that you wouldn't want me to let this opportunity pass you by without telling you.\"\n\n  \"Not a problem,\" you respond.  \"What is it?\"\n\n  \"I'd say it's the opportunity of a lifetime, quite frankly.  We got a call from a very important official in a small island nation.  Beautiful place, off the mainstream radar.  I know it's been a goal to find a secluded spot where we can set up a safe haven and it looks like this will fit the bill nicely.  In two days, there will be an election,\" Marie goes on.  \"Neither candidate is very popular, but the official's side is clearly going to be on the losing end.  He says, if we funnel in some money and use the right mix of intimidation and persuasion on some of the influential party leaders, he's certain he can guarantee a win for his superiors.  He says we help them out and they'll be forever grateful.\"  You say nothing for a moment, letting it sink in.  Unable to contain her excitement, Marie says, \"So how's that sound, boss?  We do this and we'll have way more autonomy than we would in the States.  We'd basically have the government of an entire nation watching our backs.\"\n\n  You chuckle, thinking it's almost too good to be true.  \"Count me in,\" you say with a smile.\n\n  *if (miami_partner = \"none\")\n    Staring out from the Charles Bridge, grand ideas are already running through your head.\n    *label sort_passion\n    *if passion > 35\n      *goto island_respect_high\n    *else\n      *goto island_crew\n  *else\n    You turn to ${miami_partner}.  \"I'm sorry to do this, but we'll have to postpone the trip slightly.  This is an opportunity that's just too good to pass up.\"  At first, you see disappointment on ${miami_partner}'s face, but once you fill in the details, any hard feelings are gone and you see nothing but a broad, satisfied smile.\n    *goto sort_passion\n*else\n  *if (respect > 80) and (money > 110000)\n    *goto shen_choice\n  *else\n    *goto credits \n\n*label passion_respect_mid\n*if (passion > 65)\n  *goto passion_respect_high\n*elseif (passion \u003c 35)\n  *page_break\n  Standing on the bridge, you feel the vibration of the phone in your pocket.  Seeing a familiar number, you answer.  You hear one of your teammates voices on the other end of the line, and she sounds absolutely ebullient.\n\n  *goto not_marie\n*else\n  *goto credits\n\n*label island_respect_high\n*page_break\nIt would seem that the official's tip was right on the money.  It took a little more work than you had anticipated, but it was well worth the effort.  Thanks to you and your team's handiwork, the new government had swept into office, and now, their loyalty knew no bounds.  In the time that had passed, everyone on the island seemed to be pleased with their rule, practically ensuring your team a long tenure of safety.  With the influence you wield and the power you've gathered, you can guarantee that you'll be heavily insinuated in whatever government controls the island.  The place was always a paradise, but now it was your team's stronghold as well, and you couldn't be happier.  Your crew finally has a permanent home.\n\nSitting in your gorgeous mansion, a part of the massive, fortified compound housing your team, you stare off at the tropical sunset.  As the bright rays of orange and yellow cascade across the tranquil water and the white sand beaches, you realize that your dedication has really paid off.\n*achieve islandtime\n*if (miami_partner = \"none\")\n  *if (respect > 80) and (money > 110000)\n    *goto shen_choice\n  *else\n    *goto credits\n*else\n  You turn to ${miami_partner} and smile.  \"I think it's time for that vacation,\" you say with a grin.\n  *if (respect > 80) and (money > 110000)\n    *goto shen_choice\n  *else\n    *goto credits\n\n*label passion_respect_low\n*if (passion > 65)\n  *goto passion_respect_high\n*elseif (passion \u003c 35)\n  *page_break\n  You feel your phone vibrate in your pocket and look down to see a new text message.  It's an inquiry from a reporter who wants to do a news story on you to profile a dedicated entrepreneur.  You realize that this could really give your image a boost and you smile, feeling like this could be the start of good things to come.\n  *goto credits\n*else\n  *goto credits\n\n*label island_crew\n*page_break\nIt would seem that the official's tip was right on the money.  It took a little more work than you had anticipated, but it was well worth the effort.  Thanks to your team's handiwork, the new government had swept into office, and now, their loyalty knew no bounds.  In the time that had passed, everyone on the island seemed to be pleased with their rule, practically ensuring your team a long tenure of safety.  You realize  that, with the influence you wield and the power your team has gathered, it's practically a guarantee that your crew will be heavily insinuated in whatever government controls the island.  The place was always a paradise, but now it was your team's stronghold as well, and you couldn't be happier.  Your crew finally has a permanent home.\n\nSitting in your spacious home, a perk of your cushy side job with the new government, you stare off at the tropical sunset.  As the bright rays of orange and yellow cascade across the tranquil water and the white sand beaches, you realize that your dedication has really paid off.\n*achieve islandtime\n*if (miami_partner = \"none\")\n  *goto credits\n*else\n  You turn to ${miami_partner} and smile.  \"I think it's time for that vacation,\" you say with a grin. \n  *goto credits\n\n*label shen_choice\n*page_break\nThe moment is perfect, but a small sheet of paper in your pocket, burning like a beacon, commands your attention.  You'd almost forgotten about it, being so caught up in the moment, but now that you think on it, you realize you have a choice to make.  \n\nYou recall how your second-in-command had been so pleased to give it to you that morning, telling you that, because of the supreme respect you'd gathered, one of Jenkin Yoshinobu's own men had betrayed him.  Pulling out the piece of paper, you look down at the parchment.  \n\nWritten in simple text is an address, a sacred shrine in Kyoto, and the words \"before the New Year's celebration.\"  Staring at the paper, you think about taking out the man who started this all.  Reflecting, though, you realize that you don't have anything left to prove, and that the risk would be extraordinary.  As your second-in-command warned, there is no way you can get a crew there without alerting Yoshinobu, and this is something you would have to do on your own.  Based on what you know of Yoshinobu and the crew he always travels with, unless your skills are honed to perfection, it's likely you won't walk out of there alive.\n\nLooking at the paper you decide:\n*choice\n  #\"I must finish this.  I don't care about the danger—this is about principle.\"\n    You mind made up, you place the paper back into your pocket, knowing you need to make reservations for a flight to Japan.\n    *goto japan \n\n  #\"There's no need to walk into certain death.  Besides, if it wasn't for Yoshinobu, I wouldn't be where I am today.\"\n    Realizing that everything happens for a reason, and that you're completely content with what you've achieved, you crumple up the paper and throw it away.  You turn aside, smiling, eager to embrace each day in the world you've created for yourself.\n    *goto credits\n\n*label japan\n*achieve japan\n*set japan true\n\nThe shrine is beautiful, massive pillars running up to a sky-high ceiling.  Intricate, red, wood beams interlace overhead, giving the room an ancient feel.  What draws your attention, though, is the giant Buddha sitting in lotus in the center of the shrine.  At least thirty feet tall, the statue is beautiful, serene, but you have no time to relax and enjoy the sight.  It's time for vengeance.  \n\nJenkin Yoshinobu's security is top-notch and you would have expected nothing less.  Despite the intel from your second-in-command, you'd decided to bring a team with you.  However, each time you'd attempted to get close to the shrine with your team in tow, Yoshinobu had never showed.  You were well aware that the New Year's celebration in Japan stretches over several days, with celebrants not carousing or drinking heavily, but instead trying to clear out the bad spirits of the last year for a fresh, new year.  As a result, there was no specific time you could expect Yoshinobu, but your second-in-command had informed you that it was the mob boss's annual tradition to visit this shrine sometime during the New Year's celebration.  \n\nEach day since the New Year's festivities began, you'd hidden away behind one of the giant Buddha's legs, your team playing the role of tourists, but Yoshinobu had not arrived.  Now, on the final day of the celebration, you were running the mission solo.  You'd reasoned that Yoshinobu must have spotted something and held his ground each day prior.  Either that, or he was one who waited until the last minute but, in either case, you didn't want to chance anything possibly frightening him away.  \n\nCrouching behind one of the massive legs of the Buddha statue, seeing the fading daylight in the distance beyond the shrine, you know that time is running short. Soon, it will be midnight on New Year's Eve, and a string of celebrants will arrive to cleanse themselves of last year's baggage.  \n\nYou reason that, even if Yoshinobu did want to wait until the last minute, he would never make his presence known in the midst of a large crowd of people.  As a result, you ready yourself, knowing that he must arrive soon.  This is your one chance.  \n*page_break\nBreathing heavily, you tense and wait.  You clutch the small dagger, the only weapon you'd been able to procure in the short amount of time you'd spent in Kyoto, and prepare.  \n\nTime passes slowly.\n\nIt's almost midnight now, and you're beginning to fear Yoshinobu won't show up.  While Yoshinobu made it a habit to come to this particular shrine, one of the holiest in all of Japan, with the turmoil the Yakuza leader has been thrown into after the assassination of his son-in-law, and the failure of Boris and the Fallen Angels, you realize he might not turn up at all.  \n\n[i]No.  He must come.  He has to[/i], you think to yourself.  You're well aware that, even with the supreme resources of your crew, there would be no other opportunity to take out Yoshinobu; the mob boss has an iron-fisted stranglehold over the small village where he grew up and which still serves as the base of his operation.  Knowing he couldn't bear to go anywhere else, you wait for him to show up.\n*page_break  \n\nWhen Jenkin Yoshinobu finally does appear, you find yourself wishing you had brought your crew.  The mob boss is wearing a sleek suit and glasses, but you can see the Yakuza tattoos through his unbuttoned, silk Armani shirt.  He walks into the shrine, exuding an air of authority as he scours the room for threats.  \n\nCautiously, you retreat farther into the shadow of the Buddha, behind a small altar with incense ash and a ceremonial sword, waiting for your moment to strike.  You notice the two bodyguards standing alert just behind the target, large bulges in their suit jackets indicating they are packing heat.  Knowing you have only one chance to use the element of surprise, you:\n\n*choice\n  #Throw ash from the altar into the bodyguards' faces.\n    *if (ranged_weapons > 25)\n      You dig into a large mound of ash, remnants of years of meditation, and, as you do, you offer a silent apology.  Grabbing a mound of the ash in your hands, you fling it at the two bodyguards.  \n\n      The ash strikes both guards in the face, who immediately clutch at their eyes.  You waste no time leaping forward with your knife and slashing Yoshinobu's throat.  His blood flows forth in a ruby red spray, the sanguine substance staining the floor below the transcendent statue of the Buddha.  \n\n      Staring up at the forgiving, peaceful face, you speak to the two blinded guards.  \"You don't know me and you can't even begin to fathom what Jenkin did to me.\"  You pause for a moment, drinking in the image of the Buddha statue.\n\n      Turning to the guards, you decide to:\n      *choice\n        #Kill them both.\n          With your trusty blade, you make quick work of the two bodyguards as they continue to struggle with their vision.  You stare at the scene for just a moment longer, the three bodies heaped together, before you turn and walk away, knowing full-well that justice has been done.\n          *set righteousness %-5\n          *goto credits\n        #Spare them.\n          \"I'm going to let you go,\" you say.  Maybe it's the effect of the shrine, maybe it's the experiences of the past year, but you're feeling particularly spiritual as you look at your struggling and defenseless foes.  \n\n          \"Just put down the guns and you can get out of here alive,\" you say.  \"You have a choice.  But I warn you, my organization's eyes will be on you, and if you even think about coming after me, just think about what I did to Yoshinobu.\"  \n\n          You're satisfied when the two struggling enemies drop their weapons to the ground, mumbling apologies.  You do nothing further, turning and walking away, knowing full-well that justice has been done.\n          *set righteousness %+5\n          *goto credits\n\n    *else\n      You dig into a large mound of ash, remnants of years of meditation, and, as you do, you offer a silent apology.  Grabbing a mound of the ash in your hands, you fling it at the two bodyguards.  \n\n      Your aim is off, though, and the ash falls harmlessly to the ground, even as the two bodyguards shield their eyes in anticipation.  Your hand is still outstretched as you feel a bodyguard's blade enter your chest, too fast for you to react.\n      *goto_scene death_regular\n\n  #Use the ceremonial sword to take out the bodyguards.\n    *if (strength > 25)\n      You grab for the sword, knowing it will give you a better advantage than your knife.  You unsheathe the blade with great flourish, and run one of the bodyguards through before he knows what hit him.  \n\n      The second bodyguard is far more canny, though, ducking away and grabbing a ceremonial sword of his own before you can so much as withdraw your weapon from the killing blow.  The bodyguard is fast, faster than you've ever encountered, slicing down with a heavy attack.  \n\n      You're barely able to get your weapon up in time to block, your arm tingling with pain as the force of the attack travels down the metal of the blade.  You cringe from the impact of steel on steel and the bodyguard takes advantage of your momentary weakness, rushing forward, taking the dominant position, driving the blade down.  \n\n      You struggle through the fight and, in the end, you harness just enough strength to push the bodyguard off.  Wasting no time, you spin, swinging the blade around, the cyclone of a strike catching the bodyguard in the back of the legs.  He screams in agony as his hamstrings are severed, and you waste no more time, slicing his throat.  \n\n      Jenkin Yoshinobu has only a second to stare in astonishment before you decapitate him, his eyes still wide and staring.  You do nothing further, turning and walking away, knowing full-well that justice has been done.\n      *goto credits\n    *else\n      You grab for the sword, knowing it will give you a better advantage than your knife.  You unsheathe the blade with great flourish, and run one of the bodyguards through before he knows what hit him.  \n\n      The second bodyguard is far more canny, though, ducking away and grabbing a ceremonial sword of his own before you can so much as withdraw your weapon from the killing blow.  The bodyguard is fast, faster than you've ever encountered, slicing down with a heavy attack.  \n\n      You're barely able to get your weapon up in time to block, your arm tingling with pain as the force of the attack travels down the metal of the blade.  You cringe from the impact of steel on steel and the bodyguard takes advantage of your momentary weakness, rushing forward, taking the dominant position, driving the blade down.  \n\n      You struggle through the fight but, in the end, you are just not strong enough and you feel the blade enter your chest.\n      *goto_scene death_regular\n\n  #Try to sneak around the Buddha and attack the trio from behind.\n    *if (intelligence > 25) or (improvisation > 25)\n      The only way to deal with the odds is to be smarter and cleverer than your enemies.  Grabbing a small icon that's been left for atonement, you say a quick prayer for forgiveness, and then heave it towards the far wall.  Yoshinobu and his bodyguards all turn in unison.  \n\n      Drawing your blade, you quickly ram it into the kidney of the first bodyguard.  As the man turns to you in shock, you withdraw the blade and plunge it into his stomach.  The bodyguard sinks down, a look of shock still plastered on his face.  \n\n      Thankfully, the icon made a large enough distraction that you're able to catch the second bodyguard unaware.  Your knife goes high, into the side of the man's throat, and a fountain of blood erupts.  \n\n      Now, it's just you and Yoshinobu.  \n\n      Yoshinobu's hands are outstretched in a fighting stance, and you can see a tiny blade in one of his fists.  Still, you can tell Yoshinobu's far more used to being protected by hired bodyguards than getting his own hands dirty, as his defense is nothing against your finely honed offense.  \n\n      Your blade sinks deeply into Yoshinobu's neck after he tries a wild stab which you easily avoid.  The job done, you leave the knife firmly embedded in the underworld kingpin's windpipe.  You do nothing further, turning and walking away, knowing full-well that justice has been done.\n      *goto credits\n    *else\n      The only way to deal with the odds is to be smarter and cleverer than your enemies.  Grabbing a small icon that's been left for atonement, you say a quick prayer for forgiveness, and then heave it towards the far wall.  Yoshinobu and his bodyguards all turn in unison.  \n\n      Drawing your blade, you quickly ram it into the kidney of the first bodyguard.  As the man turns to you in shock, you withdraw the blade and plunge it into his stomach.  The bodyguard sinks down, a look of shock still plastered across his face.\n\n      Wasting little time, you lunge for the other bodyguard.  Unfortunately, the icon made for a very poor distraction, and you wish you could have thrown something more substantial.  The second bodyguard is ready and waiting for you and, even though your knife goes high, aiming for the side of the man's throat, he's able to block the attack.  Your hand is still outstretched as you feel a blade entering your chest.\n      *goto_scene death_regular\n\n*label credits\n*if (righteousness > 95)\n  *achieve righteouskiller\n*if (righteousness \u003c 5)\n  *achieve ruthlesskiller\n*if ((first_date = 1) and (second_date = 1)) and (miami_partner = ben)\n  *achieve faithful\n  *goto achieve_perfectskill\n*elseif ((first_date = 3) and (second_date = 3)) and (miami_partner = sam)\n  *achieve  faithful\n  *goto achieve_perfectskill \n*elseif ((first_date = 2) and (second_date = 2)) and (miami_partner = chris)\n  *achieve faithful\n  *goto achieve_perfectskill\n*else\n  *goto achieve_perfectskill\n\n*label achieve_perfectskill\n*if (tookawound = false)\n  *achieve perfectskill\n*if (money > 150000)\n  *achieve moneybags\n*if (money \u003c 20000)\n  *achieve moneydoesntmatter\n*if (psychotic_level > 95)\n  *achieve totalpsycho\n*if (passion \u003c 5)\n  *achieve dedicated\n*if (passion > 95)\n  *achieve passionate\n*if (improvisation > 30)\n  *achieve quickthinking\n*if (intelligence > 30)\n  *achieve genius\n*if (strength > 30)\n  *achieve supremestrength\n*if (ranged_weapons > 30)\n  *achieve gunslinger\n*if (martinez > 85)\n  *achieve benefitofthedoubt\n*if (martinez \u003c 15)\n  *achieve suspicious\n*if (neardead = \"true\")\n  *achieve deathdefying\n*if (extreme_kills > 3)\n  *achieve extremekiller\n*if (loved > 75)\n  *achieve loved\n  *goto credits1\n*elseif (loved \u003c 25)\n  *achieve feared\n  *goto credits1\n*else\n  *goto credits1\n\n*label credits1\n*page_break\nYou have completed the Killing Time with a final score of:\n*line_break\nRespect: ${respect}\n*line_break\nMoney: $${money}\n\nPlay again to try for the highest score!\n*page_break\nWe hope you've enjoyed playing [i]It's Killing Time.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n\n*page_break\nThank you for playing Killing Time.  It's been a pleasure to create the game and I hope you enjoyed playing it as much as I did writing it.  There are multiple variations of the game and endings, depending on how you play, whether you choose to be righteous, ruthless, passionate, dedicated, loved or feared.  I encourage you to play back through the game to uncover the secrets that may have eluded you on your first play through.  Have you played the game as a noble hero or heroine who is loved by all?  How about a blood-thirsty, take-no-prisoners, ruthless cut-throat?  Did you protect the innocent or leave ruin in your wake?  Have you cultivated a love interest?  And how do you feel about Miller?  Did you discover any extreme kills?  All these choices can lead to different paths throughout the game.  Your respect and money levels gauge how well you've played the game and influence the type of ending you will receive along with the other personality traits.  \n*if japan\n  Your high level of respect and money has opened up the bonus Japan ending because you have played the game exceedingly well.  Congratulations!  I encourage you to play again and take a different path to explore all of the options.\n*if japan = false\n  Try to achieve the highest level of respect and money possible for the best endings.  Also, a high level of respect and money will open up a \n  surprise if you play the game exceedingly well.\n*comment endif\n\nThanks again for playing!\n*ending\n\n*label org_name\nOnce you'd gotten the momentum of the group going, you'd decided to name the crew:\n*fake_choice\n  #The Firm.\n    *set organization_name \"The Firm\"\n  #The Rock.\n    *set organization_name \"The Rock\"\n  #The Giant.\n    *set organization_name \"The Giant\"\n  #The Power.\n    *set organization_name \"The Power\"\n  #Costa Nostra.\n    *set organization_name \"Costa Nostra\"\n  #Pain Incorporated.\n    *set organization_name \"Pain Incorporated\"\n  #The Syndicate.\n    You'd decided on the name as an homage to your old crew.\n    *set organization_name \"The Syndicate\"\n  *if not(choice_randomtest)\n    #Something else.\n      *input_text organization_name\n*return\n\n*label sort_martinez\n*if martinez_killed\n  Thinking back on Miller, and what you found out about him in Miami, you find yourself glad that you put an end to him. You have no need for someone like him in your organization.  And you have already found a host of people who have proven their loyalty to you beyond question.\n  *return\n*elseif with_martinez\n  You smile a little knowing that Miller has been a great asset to what you've achieved.  After his help in Miami, you learned that he was someone you could depend on, and he has proven that over and over, becoming a real leader in your organization.  Though he never opened up about why people were after him in Miami, you felt it best to let sleeping dogs lie.  Miller has proved his loyalty to you, and that's what's important.  His hard work ethic and unflagging devotion to your crew has helped it become what it is today.\n  *return\n*else\n  *if miller_heat = false\n    Thinking back on Miller, and what you found out about him in Miami, you find yourself glad that the two of you have parted ways.  There was never an official falling out, it was just that the phone calls or the reunion never happened once you returned from Miami.  For days, you had wondered if you should call, or if he would even pick up the phone, but, in the end, it never happened.  It's just as well.  You have no need for someone like him in your organization.  And you have already found a host of people who have proven their loyalty to you beyond question.\n    *return\n  *else\n    Thinking back on Miller, and what you found out about him in Miami, you find yourself glad that the two of you have parted ways.  Particularly because your actions with the mob boss and the incriminating photos would generate a significant amount of heat for Miller and you don't want to be around for it.  There was never an official falling out, but, in the end, you were left thinking good riddance.  You have no need for someone like him in your organization.  And you have already found a host of people who have proven their loyalty to you beyond question.\n    *return\n\n*label righteous_ruthless\n*if (righteousness > 50)\n  Smiling, you reflect on how your reputation for righteousness had influenced it all, keeping the other crews at bay as yours grew.  They had known you were one to trust, one who wouldn't stab them in the back.  Now they were referring hits to you and wanting to partner up for joint ventures.\n\n  You truly feel you've found your calling.  In your position, you're able to take the hits you want.  Because of that, you've been able to choose only the hits that rid the world of evil.  You look back proudly and realize that you've made a difference.  \n\n  In the last three months alone, there was a mining magnate in South Africa who wanted the a rival industrialist removed; you were more than happy to be paid in uncut diamonds.  There was also a young heiress in Taiwan who wanted her aging—if still powerful—father removed, so that she
