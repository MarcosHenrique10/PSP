little and you tell him to put the pedal to the metal, pleased with your actions, and five grand richer.  Still, you know you've got a date with the boss, and you're running late.\n*set loved %+5\n*set righteousness %+5\n*set money +7000\n*goto headquarters\n\n*label headquarters\n\nThe Syndicate headquarters is a breathtaking display of sleek and modern architecture, a marvel of design and evidence of man's industry and brilliance.  Even though you've seen it countless times, as it appears before you now, you cannot help but be impressed and almost humbled.\n\nTaking it in, you think to yourself that, while it might seem counter-intuitive for an assassin's hide out, Syndicate headquarters is actually a perfect sanctuary.  \n\nBoris's strategy fell in line with Poe's [i]The Purloined Letter[/i]—the best place to hide is in plain sight.  You smile at the large sign proclaiming Collins's Architecture, and think of just how detailed the facade is, with the bottom floor even having a ghost staff of secretaries adding to the charade.  \n\nYou indulge in a small smirk.  While Collins's Architecture had never actually built a thing in its faux, illustrious career, on paper it's had a hand in constructing some of the city's grandest designs.  There was even a website, though it proudly proclaimed that there were no solicitations, and designs were done solely on a referral basis.  \n\nBoris was no fool, and each secretary in Syndicate employ was told that, if anyone happened to stop by, let them know that the company was not currently accepting new business.  Likewise, the design which was supposed to look open and inviting was in reality anything but, the glass 100% reflective, without so much as a thermal imaging device being able to look through due to ultra high tech counter-intelligence. \n*page_break \n\nStaring at the building, you feel comfort knowing that Boris has spared no expense on the crew's safety.  \n\nNodding to the secretaries, who are paid well to keep quiet, you step into the elevator.  You run a personally coded fob key device over the door for access.  You smile a little to yourself as you think of the secretaries, who were fed the line that this place was the home of a billionaire Russian oil magnate who valued privacy above all else.  \n\nThe tale is partially true, Boris is rich and Russian, but his is an empire of blood, not oil.  \n\nYou run one finger over the cleverly disguised scanner which, to the casual observer, appears to be a button for the basement, and let the reader verify your DNA.  Clearing the scan, you press the button for the top floor, the home of the Syndicate, your assassin family.\n*page_break\n\nThe top floor is no less modern, though it is far more opulent, with touches of old-world class.  Crisp carrara marble floors stand in cool contrast to the enormous floor-to-ceiling windows, which invite the steadfast Southern California sun to bathe the Italian rock in its warmth.  \n\nThe glass walls that line each office are embedded with nanocrystals, giving one the ability to change the glass pitch black for privacy.  Your office is currently transparent, and you barely give it a second glance as you and Dante head to the meeting room.\n*page_break  \n\n*if (arrival = \"late\")\n  The boardroom glass is also transparent and, much to your chagrin, the meeting has clearly been going on for quite some time.  \"Well, we're definitely late,\" Dante says, as you both hurry forward.\n\n  The whole Syndicate crew is seated around a sleek, black, glass conference table.  All eyes are on you as you shuffle into the large, luminous room.  The worst of it is Boris—his cold, piercing stare seems to bore into you.\n\n  \"Nice of you to join us,\" he says with what you can't help but feel is a sinister tone. \"What took you so long?\"\n\n  *hide_reuse\n  *label excuse\n  *choice\n    #By telling the truth.  Better a little anger now than getting caught in a lie later.\n\n      \"Sorry, Boris, we had a small stop to make,\" you say candidly.  \n\n      Boris continues to fix you with an icy, penetrating stare, locking eyes with you.  Deep down, you begin to feel a little uncomfortable.  After a long minute, he nods.  \n\n      \"Well, at least you didn't try to lie to me about it.  I respect your honesty.  Still, I am displeased.  We couldn't wait forever, and now I must repeat myself,\" Boris says.  \"Take a seat,\" he finishes, gesturing to two empty chairs.  \n\n      Nothing more is said on the subject, and you're grateful Boris only has a small scowl on his face.  It could have been much worse.\n      *set boris -5\n      *set righteousness %+5\n      *set respect +5\n      *goto meeting\n\n    #By lying.  I'm confident I can talk my way out of this one.\n      *if (improvisation > 5)\n        \"We got delayed,\" you begin. \"Baggage claim lost my bag and it took me forever to get it back.  Lucky I checked with security when I did.  Turns out, it was already on another plane.  If I hadn't been so persistent, my luggage would have been halfway to Japan by now.\"\n        \n        Boris continues to fix you with his penetrating stare for a minute, as if weighing your words.  In the end, he gives you a deferent shrug. \"Well, I'm glad you got your luggage back.  That's important.  We don't want anything traceable back to us floating out there in the ether.  In any event, sit down, I'll get you up to speed on what we've been talking about.\"\n        *set improvisation +2\n        *set righteousness %-5\n        *goto meeting\n\n      *else\n        \"Sorry about that, boss,\" you say with all the fake contrition you can muster.  \"The flight was late and then there was traffic—you know how it goes in LA—and it was just a mess.\"  You shrug your shoulders as if the two of you share a bond of LA's notoriously unpredictable freeway system.\n\n        \"Can it,\" Boris says, anger flashing in his eyes.  \"I know you're lying.  I checked your flight to arrange this meeting around your schedule and I was coming from the same direction myself so I know exactly what the traffic was like.  For LA, it was unusually light.\"  \n\n        You cringe at being caught in the double untruths, but Boris seems dismissive.  \"I don't care what dumb errand you found more important than my meeting, but think about my schedule and the schedule of the rest of the Syndicate before you decide to make your own plans.\"\n\n        You nod, appropriately chastened, and sit down, wanting no further disapproval from Boris.  Thankfully, he says, \"Now listen up, while I get you up to speed.\"\n        *set intelligence +2\n        *set improvisation +2\n        *set boris -10\n        *set righteousness %-5\n        *goto meeting\n\n    #By sidestepping the question.\n      \"Good to be here,\" you say, making it a point to ignore the undertone of Boris's comment.  You move forward, trying to act nonchalant, but Boris's voice stops you in your tracks.  \n\n      \"Did you not hear my question?\" your boss demands.  Realizing you're going to have to give him an explanation, you decide to answer:\n      *set boris -5\n      *set passion %+5\n      *goto excuse\n\n*else\n  The glass of the boardroom is also transparent and you're happy to see the rest of your crew just beginning to file in.  \"Right on time,\" Dante says with an impish smile.\n\n  You nod to him, grateful for his lead foot on the gas pedal.  Walking in, you see the whole Syndicate crew taking their seats around a sleek, black, glass conference table and you follow suit.  \n\n  \"Glad you made it on time,\" Boris says, and you can tell he's obviously pleased.  \n\n  \"Ladies and gentlemen,\" Boris says suddenly and loudly, and all of the gathered crew turns toward you and Boris.  \"I just want to take the time to recognize how proud I am of ${name}.  Here you have an operative who just came back from Colombia, who went on an exceedingly difficult hit, and yet is still able to make it here on time.  This is the kind of assassin you should strive to be.\"  \n\n  You hear a collective round of applause and you smile a little, proud of your choice to make it on time.  You know that you've gained not only the respect of your boss, but also your peers.  Boris has a broad smile on his face and asks, \"So, how'd the trip go?\"\n\n  *set respect +10\n  *choice\n    #\"As well as can be expected. A few hiccups but nothing I couldn't handle.\"\n      Boris greets your response with a wide smile.  \"You're being modest,\" he says, \"I heard how bad it was.  There were some problems with the intel, but you handled yourself like a true professional.  And even better, you didn't come back here and complain about it.  I like that, ${name}, and that's why I'm giving you a bonus.\"\n\n      You nod graciously, pleased with the compliment and the extra money.  You can see the admiration in Boris's eyes.  \"Now, let's get down to business.\"\n      *set money +1000\n      *set passion %+5\n      *set boris +5\n      *goto meeting\n\n    #\"I know it wasn't your fault, but there were some issues with the intel.\"\n      Boris greets your response with a nod.  \"I appreciate you not blaming me, because the intel was horrible,\" he says.  \"I also appreciate you bringing it to my attention.  It shows dedication. \n\n      \"I heard how bad it was, and in the end, I'm the one who picked our sources so the buck stops with me,\" Boris continues.  \"Regardless of the problems with the intel, you handled yourself like a true professional.  And even better, you didn't come back here and complain about it.  I like that, ${name}, that's why I'm giving you a bonus.\"\n\n      You nod graciously, pleased with the compliment.  You can see the admiration in Boris's eyes.  \"Now, let's get down to business.\"\n      *set passion %-5\n      *set money +1000\n      *goto meeting\n\n    #\"I'll be honest with you, there were some intel problems.  We might need to re-evaluate the way we vet our intelligence.\"\n      Boris greets you with a grim face.  \"The accuracy of intel and who we use is my choice, not yours.  If the intel isn't perfect, you adapt to the situation.\"  \n\n      You can hear the disapproval in Boris's voice—he clearly doesn't appreciate your complaints.  \"In any event, you handled the problems and got the job done like you should, and I would expect nothing less. I also respect you bringing it to my attention.  That takes courage and it shows you're dedicated to helping the Syndicate be the best in the business.  Now, let's get down to brass tacks.\"\n      *set boris -5\n      *set respect +5\n      *set passion %-10\n      *goto meeting\n\n*label meeting\n\nYou sink down in the sleek, leather chair and prepare for Boris's briefing.  He surprises you, though, by saying, \"Actually, ${name}, before we start, I want to talk to you about the Beijing job since I have a feeling that it might be related to some of this new activity.  I know you're still reeling from Colombia, but Beijing just keeps nagging at me.\"  \n\nYou want to ask him about the new activity, still thinking about Dante's comments earlier, and Boris can sense your curiosity.  \"I see from the look on your face, ${name}, you have questions—\" he pauses to let his eyes bore into you just a little deeper, \"—I don't want to jump to conclusions just yet, and I don't have any answers, but we haven't had a chance to debrief and I need to know everything about about the mission in case it has something to do with what's happening.  What was the most unexpected part of the mission, the least anticipated obstacle you only overcame because of your skills?\"\n\nYou think about it and say:\n*choice\n  #Talking my way into the Forbidden City after it was closed so I could set up a small incendiary device to take out one of the targets.\n    \"Outsmarting the guards we didn't expect at the Forbidden City,\" you say at last, recounting in vivid detail how you'd quickly improvised a story about being a tourist who had left a bag inside the landmark. \n\n    The guard's English had been poor, and the great majority of the conversation was done in pantomime, but you feel an overwhelming sense of accomplishment recounting how you displayed just the right amount of indignation and urgency to be let in.  \n\n    You explain how, after that hurdle was cleared, you'd quickly planted explosive devices designed to look like fireworks.  When you'd tailed the target to the famous landmark the next day, it was all too easy to push the remote detonator when he got close.  \n\n    You finish your story by saying how it had looked to everyone, including the news, like someone had carelessly left fireworks lying around which had gone off by accident.  \n\n    Boris compliments you on your maneuver, and you see the rest of the Syndicate team nodding their heads with approval.\n    *page_break\n\n    \"That was fantastic work, for a very, very difficult mission,\" Boris says, \"I'd only heard second-hand about the trials you went through.  You're going to have to tell me more in detail later.  Now, let's get down to the business at hand.\"\n    *set improvisation +5\n    *goto meeting1\n\n  #The ingenious way I disguised an incendiary device as abandoned fireworks to take out one of the targets.\n    \"Definitely the bomb I planted at the Forbidden City,\" you say, recounting in vivid detail how you'd meticulously constructed the explosive device to look like fireworks.  You relate how the target wasn't where you'd originally expected him to be and how you'd had to use every strategic bone in your body to catch him off guard. \n\n    You explain how you'd tailed the target to the famous landmark the next day and it had been all too easy to push the remote detonator when he got close.  You finish your story by explaining how the move made it look to everyone, including the news, like someone had carelessly left fireworks lying around which had gone off by accident.  \n\n    Boris compliments you on your maneuver, and you see the rest of the Syndicate team nodding their heads with approval.\n    *page_break\n\n    \"That was fantastic work, for a very, very difficult mission,\" Boris says, \"I'd only heard second-hand about the trials you went through.  You're going to have to tell me more in detail later.  Now, let's get down to the business at hand.\"\n    *set intelligence +5\n    *goto meeting1\n\n  #The fistfight atop a remote section of the Great Wall where I sent one target plummeting from the World Wonder.\n    \"Definitely the battle at the Great Wall,\" you say, recounting in vivid detail how you'd tailed one of your targets to the remote Mutianyu section of the Great Wall, far removed from more touristy parts. \n\n    \"There were two guards, but the target was supposed to be alone,\" you say.  \"I can remember it clear as day.  The guards were big guys, armed with serious weaponry.  I pretended like I was a tourist, but one of them must have made me because, all of a sudden, I saw MP-5s in their hands.  I sprinted forward and smashed into one of them, knocking him over the edge.\"\n\n    \"The second was quick on the draw, but I was just a little quicker, using a Judo throw to send him tumbling over the edge,\" you recount with pleasure.  \"The target was easy pickings after that.\"\n\n    Boris compliments you on your maneuvers and you see the rest of the Syndicate team nodding their heads with approval.\n    *page_break\n\n    \"That was fantastic work, for a very, very difficult mission,\" Boris says, \"I'd only heard second-hand about the trials you went through.  You're going to have to tell me more in detail later.  Now, let's get down to the business at hand.\"\n    *set strength +5\n    *goto meeting1\n\n  #The unanticipated long-ranged sniper shot which took out a target as she was readying to meet with a contact.\n    \"Definitely the difficult shot I made,\" you say.  \"The target was supposed to be out in the open, but when I caught up to her, she was already in one of the hutongs.  Those are really narrow streets…more like alleys in the old courtyard neighborhoods in Beijing,\" you inform the crew.  \n\n    \"With the four walls blocking the courtyard to protect the mark, I knew I'd have to be clever.  Under the cover of darkness, I climbed up on a roof and set up my shot,\" you recount.  \"It took patience, but when the target emerged, it was like picking low-hanging fruit, easy as can be.\"  \n\n    You smile a little and Boris compliments you on your maneuver.  You see the rest of the Syndicate team nodding their heads with approval.\n    *page_break\n\n    \"That was fantastic work, for a very, very difficult mission,\" Boris says, \"I'd only heard second-hand about the trials you went through.  You're going to have to tell me more in detail later.  Now, let's get down to the business at hand.\"\n    *set ranged_weapons +5\n    *goto meeting1\n\n*label meeting1\n\n\"So, this isn't our typical, run-of-the-mill meeting,\" Boris says.  \"We have a problem on our hands.\"  There's a tremor of uncertainty in his tone and it sends a shiver up your spine.  Boris is a Cold War veteran, iron in his blood that runs as cold as a Siberian winter.  If he's shaken, that means the threat is very serious.   \n\n\"Dante was the first to spot it,\" Boris says, and the burly assassin nods grimly.  \"About four days ago, he spotted a tail, a slender man, dressed normally, but there was something off about him.  He was working a little too hard at being ignorable.  Each time Dante would catch his gaze, the guy would look away.  Dante wanted to investigate, but when he went over, the guy bolted.  Dante couldn't catch him.\n\n\"Then we have what happened to Chuck,\" Boris says, \"As you all know, he has a sister who's developmentally disabled.  Chuck was returning from visiting her when he caught sight of a car with a man and a woman who looked deep in discussion, only the car had no license plates, the windows were deeply tinted, and it had been there since he arrived.  Chuck's very protective of his sister, and he wanted to check it out.  When he got close, they took off in a hurry.\"  \n\n\"And now, I'm paying a security guard to stand watch at my sister's house just to make sure they don't come back,\" Chuck says angrily.\n*page_break\n\n\"It's all very unsettling to say the least,\" Boris continues.  \"Chuck and Dante didn't compare notes until yesterday, but when they brought it to my attention, I realized that I, too, had been noticing a few people lurking where they shouldn't.  I blame myself, I should be more alert, but when they filled me in, I started to realize that I had been under observation as well.  I contacted each member of our team, and sure enough, a lot of them had experienced similar scenarios.\"\n\n\"There was a car tailing me on my way here,\" Marie, a cool-as-ice assassin with a pixie-cut, chimes in.  \"I lost them, but they're no amateurs, that's for certain.\"\n\n\"That's saying something if they can stick with you, Marie,\" Boris says. \"You're one of the best evasive drivers I've ever met.  That means they're definitely pros, which is all the more reason we need to be careful.\"  Boris lets the import of the situation hang in the air for the moment, and your stomach churns.  This doesn't bode well.\n\nAs Boris's words sink in, you think:\n*fake_choice\n  #I don't care who's coming after us, they're as good as dead.\n    *set passion %+10\n  #This is going to be trouble, but we're tough.\n    *set passion %+5\n  #This is a lot of paranoia for no good reason, but we still need to be prepared.\n    *set passion %-5\n  #We better prepare, because this could be very bad.\n    *set passion %-10\n\n\"It's too early to know who's out there, but we have to be on the look out,\" Boris continues.\n\n\"It's probably one of Miller's old buddies,\" Chuck says loudly and ungraciously.  Boris falls silent and the tension in the room is thick enough to cut with a chainsaw.\n\nMiller shoots Chuck a stern look, and you think that if looks could kill, Chuck would be a dead man.  You shake your head, knowing that there has been nothing but animosity between most of your team and Miller since he joined the squad.  \n\nIt had been a surprise to you as well when Boris brought in the short and stocky explosives expert and told everyone that he would be joining the Syndicate.  It wasn't that your squad was scared of strangers, but the crew was a close-knit family, and that bred a distrust for outsiders.  All recruits had historically gone though a protracted period of shunning and distance, almost like a hazing, and Boris had practically shoved Miller down your throats.  \n\nYou feel:\n*choice\n  #The hazing is totally unnecessary and wrong, and that's why I've taken no part in it.\n    You don't agree with the process at all, and you don't understand how even in a profession where your trust in a teammate could mean life or death, people could be so cruel.  You take solace in the fact that you have taken no part in it, and have shown Miller courtesy.\n    *set righteousness %+5\n    *set martinez %+10\n    *goto haze\n\n  #There's a time and place for a bit of hazing. But with Miller, it's going too far and that's why I've backed off your involvement.\n    While you don't necessarily agree with the process, a part of you understands that, in a profession where your trust in a teammate could mean life or death, a thorough and tough vetting was a necessary evil.  But what was going on with Miller just seemed vindictive and you'd long ago stopped having any part of it.  The few assassins who are in Miller's corner, or at least on the borderline, have voiced their approval of your actions.\n    *set righteousness %+5\n    *set loved %+5\n    *goto haze\n\n  #Under the circumstances, Miller is getting the proper amount of hazing.  It guarantees loyalty to the Syndicate and that is paramount.   \n    Miller had been thrust upon you, and that was never good for trust.  You have no problem with the process, a part of you understanding that, in a profession where your trust in a teammate could mean life or death, a thorough and tough vetting was necessary.\n    *set passion %-10\n    *goto haze\n\n  #We should be even harder on Miller, and I look forward to the next opportunity to make things rough for him.\n    Miller had been thrust upon you, and that was never good for trust.  You have no problem with the process, and you have taken every opportunity to give Miller grief, with a passion that bordered on cruelty.  You knew that, in a profession where your trust in a teammate could mean life or death, a thorough and tough vetting was necessary, and part of it was fun.  The majority of the Syndicate assassins, who hold nothing but disdain for Miller, have been more than pleased by your actions.  Your treatment of Miller has also created a reputation that you are not one to be crossed.\n    *set loved %-5\n    *set righteousness %-5\n    *set martinez %-10\n    *goto haze\n\n*label haze\n\nNo matter your personal feelings about the hazing, you know that, after going through the process, each new member of the Syndicate was then accepted by the crew.  However, with Miller, that hadn't happened yet and it was starting to feel like it might never happen.  \n\nThe situation was made even worse by the fact that the brooding Miller never talked about himself or his past, leading to many rumors that he was a former gang member or maybe even a former member of a rival crew.  The idea of the latter was distinctly frightening and, as you watch Miller, you know full well that, if he had betrayed his former brethren, he could do it to your squad just as easily.\n\n*page_break\n\"This is because of you, huh?\" Chuck spits at Miller, clenching his fists.  Despite the vitriol, Miller sits silently, taking Chuck's abuse.  Still, the big man is relentless.  \"Isn't that true, Miller?\" Chuck shouts, \"You're a part of this?\"\n\n\"Screw you, Chuck,\" Miller replies venomously.\n\n\"Let's take this outside,\" Chuck says, his face flush with rage.\n\nIn that instant, you can feel a fight about to break out.  Miller, sitting across from you, glances in your direction, almost as if pleading for you to intervene.  Feeling as if you should do something, you say:\n\n*choice\n  #\"Chuck, ease up.  Miller hasn't done anything to deserve the way you're talking to him, and acting like this is going to drive our team apart.\"\n    The big man looks at you with a frown, but sits back down.  He's clearly upset, but you know that you and Chuck go back long enough that he'll get over it.  \n\n    Turning to Miller, you see what looks to be the start of a smile, and you know that's as close to a sign of approval as you're likely to get from the stern outsider.  Still, you know that you've not only kept the peace, but earned a friend.\n    *set martinez %+15\n    *set loved %+5\n    *set passion %-5\n    *goto meeting2\n\n  #\"Now let's just calm down. We're all on the same team.\"\n    Chuck turns his attention to you and, after a second, you see the tension in his face release.  The two of you go far enough back that you know he trusts your level-headed judgment.  \n\n    Grunting, Chuck sits down, somewhat mollified.  Miller looks at you gratefully, and you can tell you've scored a few points with the outsider.  Likewise, everyone in the room seems to look at you with approval for the way you handled the situation with tact and an appeal for solidarity.  You've clearly won some friends with your words.\n    *set martinez %+10\n    *set loved %+10\n    *goto meeting2\n\n  #\"What the hell are you looking at, Miller? Chuck's right.  We were doing just fine before you came along.\"\n    You stand up menacingly and glare at Miller.  Out of the corner of your eye, you can see Chuck smiling.  \n\n    \"You've caused nothing but discord since you got here, Miller,\" you say. You're about to say more when you see the look on Boris's face.  \n\n    Out of the corner of your eye, you can see approving looks on the faces of those assassins who share your sentiment.  A few of them look like they wish you'd gone farther.\n    *set martinez %-10\n    *set passion %+5\n    *set loved %-5\n    *goto meeting2\n\n  #\"Let's mess this guy up, Chuck!\"\n    Standing up, you slam your fist on the table.  \"You're a punk, Miller, and now you're going to pay for it,\" you say loudly and angrily.\n\n    You're about to jump over the table and plant your fist in Miller's face when you catch the disapproving look on Boris's face.  Fuming, you know you're going to have to wait to do any damage until a later date.  Judging from the hate-filled look in Miller's eyes, you know the feeling is mutual.  Still, you have enough respect for Boris to temper your rage, for the moment at least.  Out of the corner of your eye, you can see approving looks on the faces of those assassins who share your sentiment, and you know your actions have greatly risen your esteem in their eyes.  You also know that your reputation for toughness is going to get around.\n\n    After a moment, Boris says, \"I respect your passion, but Miller is not a threat.\"  A few of the assassins in the room scowl in disagreement but no one says a word.\n\n    Slightly cowed, you say, \"Just watch it, Miller, we all have our eyes on you.\"\n    *set martinez %-15\n    *set loved %-10\n    *set respect +5\n    *set passion %+10\n    *goto meeting2\n\n*label meeting2\n\n\"Enough of this,\" Boris says sternly.  \"I let this go on to see how you'd react in a crisis situation, and for the most part, I'm not very pleased with what I've seen. I disclosed this information so you could be vigilant, not so you can kill each other, do I make myself clear?  There's no need for panic.  I just want you to be careful.\n\n\"Now, it's time to dole out your next assignments,\" Boris continues.  One after another, your colleagues are given their next tasks. Then it's your turn.  \"Listen ${name}, I know you just got back, but I need to send you out again. No rest for the weary, right?\"  Boris adds with a sly grin.\n\n\"We got a hit scheduled I need you to take,\" he goes on.  \"It's in the City of Lights, grand old Paris.  Seems as if there's an ambassador named Andre who's been taking bribes and then backstabbing his benefactors. Obviously, they are not very happy about this.  He's corrupt beyond belief.\"\n\nYou think the best part of the mission will be:\n*fake_choice\n  #Ridding the world of a corrupt politician.\n    *set righteousness %+5\n  #Experiencing the grandeur and culture of exotic Paris.\n    *set passion %+5\n  #Getting to shed some blood.\n    *set psychotic_level %+5\n    *set righteousness %-10\n  #Having an opportunity to solidify the reputation of the Syndicate.\n    *set passion %-10\n  #Collecting my payday after the job's done.\n    *set righteousness %-5\n\nYou nod in acknowledgment and Boris rewards you with an approving look.  \"Now, it's going to be a tough job, so I'm not going to send you alone.  Dante, Chuck, and Marie don't have an assignment at the moment, so you can choose one of them to go along with you.  All of them are up for it.\"\n\nAs Boris finishes speaking, you glance around the table at your possible companions.  Each of the three flash you a grin or a wink, entreating you to pick them.  Looking from face to face, you weigh your options.  \n\nMarie is smart and always has a game plan.  She's good in a pinch and also just so happens to be the best driver in the business.  \n\nWhile Dante is big and burly, you know from experience that he can provide excellent cover fire or take the kill shot if necessary.  You know he's the right choice for some extra fire power.  \n\nChuck is a mountain of a man, and you value not only his almost superhuman strength and muscle, but also his ability to intimidate.  You know he's a perfect fit for any situation that involves necessary roughness.\n*page_break \n\nYou're about to decide when Marie speaks up.  \"Listen, boss,\" she starts. \"${name} has had a long day.  A tough hit with bad intel, and now you're pressing for an answer on yet another mission?\"  She lets the words linger, like Boris is the most irresponsible, uncaring person in the world.  \"We'd all been planning on taking ${name} out for drinks tonight.  We haven't had a good night out together in a while.\"  Boris cocks an eyebrow.  \"So I'm thinking, why not let ${pc_him} decide after we spend a little time catching up?\"\n  \nBoris shrugs.  \"Fine, your call.  It doesn't matter to me,\" Boris turns to you, \"just text me with your decision so I can plan out the other jobs.\"  You nod.  \"Intel will fill you in on the details once I get your selection,\" Boris says.  \"If there's nothing more, I think we'll conclude this meeting.\"  No one says a thing, and Boris stands to leave.  That's when you clear your throat.  \"Yes?\" he asks.\n\n\"There is the small matter of my payment,\" you say, after a second adding, \"for this job and for Beijing.\"\n\n*if (boris > 45)\n  \"Of course,\" Boris says with a small chuckle.  \"How careless of me to forget.  I'll have your payment instantly wired to your account.  Fifty grand, as we agreed.  And since you've done such a great job, I'm going to give you a ten thousand dollar bonus.\"\n\n  You voice your appreciation and Boris throws you a politely dismissive hand gesture—he likes playing the generous boss. \"And, ${name},\" he continues,\n  *set money +60000\n  *goto after_meeting\n\n*else\n  \"Of course,\" Boris says with a small chuckle.  \"How careless of me to forget.  I'll have your payment instantly wired to your account.  Fifty thousand, as we agreed.\"\n\n  You voice your appreciation and Boris nods, heading for the exit. \"Oh, ${name},\" he pauses,\n  *set money +50000\n  *goto after_meeting\n\n*label after_meeting\n\"before you go for drinks, I'm going to take you out to dinner.  It's been too long since we've talked.\"\n\nYou nod, smiling inwardly.  Boris has been something of a father figure to you for years.  \"Sounds good,\" you say.\n\n\"Ruth's Steakhouse, six o'clock, okay?\" he asks.\n\nYou agree, and Boris walks out.\n\n*page_break\nWith Boris gone, a few of the assassins begin to file out.  The rest chat among themselves, speculating about who might be stalking your crew.  \n\nYou sit in the boardroom, running down a mental checklist of what you need to do before heading out on your next job.  After a few moments, you find it difficult to concentrate—three hit${men} at the end of the table are looking in your direction.  ${ben}, ${sam}, and ${chris} are tough assassins whose skills make them all the more dangerous, and all three seem clearly interested in finding out more about your mission.\n\nLooking at the three of them, you can't help but notice once again how different they are from one another. ${chris_desc}. ${sam_desc}. \n\n${ben_desc}.\n\n${ben} gestures for you to come closer and you move toward the end of the table to take a seat.  As you do, ${bhe} immediately speaks up. \"We were just talking about you.  That was some pretty impressive work in Beijing,\" ${bhe} says, pleased with yourself that word of your handiwork has really gotten around.  \"I know you told Boris what the most impressive part of the job was.  But what was the best part?  What did you like the most?\"\n\nYou answer:\n*choice\n  #\"Definitely the fistfights.  I love getting my hands dirty.\"\n    \"At one point, I was surrounded by three guys,\" you tell ${bhim}.  \"I took out the first with a low-kick to the leg followed up by a left hook.  Dropped him like a sack of bricks, but the two others quickly converged on me.  I grabbed one, used a Judo throw, and hurled him into the other guy.  As they were both fumbling over one another like a couple of goons, I charged at them and smashed them through a plate glass window.  It's one way to make an exit, I can tell you that.\"  \n\n    ${ben} stares at you wide-eyed, the admiration written all over ${bhis} face.  \"I'd like to hear more about your exploits,\" ${bhe} says.  ${sam}, looking away, seems unimpressed.\n    *set ben_rapport %+10\n    *set sam_rapport %-10\n    *goto closing\n\n  #\"The gunfights were intense, but I used a little ingenuity to get the upper hand.\"\n    \"I was coming around a turn in a hallway when I ran smack dab into two heavily armed bodyguards,\" you tell ${bhim}.  \"I could feel the wind of the bullets whizzing by as I ducked back around the corner and tried to figure out what to do.  Naturally, my instincts kicked in and I crouched down, peered around the corner at knee height and shot them in the legs.  I tell you, they didn't know what hit them.\"\n\n    ${ben} gives you a wide smile, seeming to like your tale of heroism and ingenuity.  ${sam} seems equally impressed, and says, \"Quick thinking, I like that.\"  You can read admiration in ${shis} voice. \n    *set ben_rapport %+5\n    *set sam_rapport %+5\n    *goto closing\n\n  #\"Outsmarting the bodyguards was one of the best parts.  You should have seen the looks on their faces.\"\n    \"At one point, I had to get past a checkpoint in a hotel,\" you tell ${shim}. \"The guards were pretty heavily armed and I didn't want to risk it, so I went to the hotel kitchen and, lo and behold, I found a bellman's uniform.  I threw that on and the guards didn't even look at me twice.\"\n    \n    ${sam} stares at you wide-eyed, the admiration written all over ${shis} face.  \"I'd like to hear more about your exploits,\" ${she} says.  ${ben}, looking away, seems unimpressed.\n    *set ben_rapport -10\n    *set sam_rapport %+10\n    *goto closing\n\n  #\"As strange as it sounds, sparing one of the innocents.\"\n    \"At one point, things really got bad,\" you say, \"I was pinned down with heavy gunfire in a kitchen.  I'd made a small incendiary device out of a bottle of vodka, and I heaved it at the guys shooting at me.  It did the trick and set everything ablaze.\"  \n\n    \"The only problem was, there was a young busboy who got trapped in the midst of it all and, had I not acted, he would have burned to death,\" you say.  \"He was scared, caught like a deer in headlights, completely frozen with fear.  I jumped into the inferno and pulled him out.  Nearly got a bullet for my troubles, but seeing the relief on his face, and knowing I saved his life, made it worth it.\"\n\n    Both ${ben} and ${sam} look at you with interest, but it is ${chris} who is staring in wide-eyed wonder.  There is a broad smile on ${chis} face. \"That is impressive,\" ${che} says.\n    *set righteousness %+5\n    *set chris_rapport %+10\n    *goto closing\n\n*label closing\n\n\"So,\" you say, \"any of you have any exciting plans before heading out on your next mission?\"\n\n${ben} shrugs, \"I'm planning on putting in some time at the gym.\"\n\n${sam} chimes in, \"Just the same old, same old.  I'm going to curl up with a good book, maybe see if there's a romantic comedy on TV.\"\n\n${chris} smiles, \"Well, I have something out of the ordinary.  There's a band I love playing in town tonight, so I'm going to the concert with one of my friends.\"\n\n${ben} looks at ${chim}, \"I didn't think you were the concert type.\"\n\n${chris} shrugs, \"Just because I like volunteer work and going to church doesn't mean I don't enjoy concerts.  It depends on the band and the venue.  How about you, ${name}, you a big concert goer?\"\n\nYou answer:\n*fake_choice\n  #\"I absolutely love concerts.  It doesn't matter what band's in town, I just love the atmosphere.\"\n  #\"It depends on who's playing.  I go more for the music than the atmosphere, so it has to be someone I like.\"\n  #\"I'm not a big concert fan, but I'll go if it's a band I really love.\"\n  #\"I wouldn't be caught dead at a concert.  I don't care who's playing.\"\n\n${sam} seems about to chime in when you feel a hand on your shoulder.  Glancing up, you see Chuck peering down at you.  \"Just wanted to let you know Marie, Dante, and I are heading out.  The Falcon at eight, okay?\"  You nod.\n\nYou confirm you'll be there, and turn your attention back to the remaining trio.  Whatever ${sam} was about to say seems to be forgotten as the three assassins sit there silently. Since you have some time before meeting Boris, you consider using this opportunity to get to know these three assassins better.\n\nYou decide:\n*choice\n  #I'd like to get to know the other assassins. It's good to bond with your coworkers.\n    *goto discussion\n  #I think I might be attracted to one of them, so I continue the conversation to get a chance to talk with ${shim} a little more.\n    *goto discussion\n  #I have no interest in getting to know any of them at this point, so I bid them all goodbye.\n    You tell the trio that you're exhausted after a long mission and bow out gracefully.  You know you have a little time before dinner, so you decide to get some rest.\n    *page_break\n\n    Refreshed after a small nap at your place, you head out to dinner.\n    *goto dinner\n\n*label discussion\n*temp discussion 0\nAll three assassins are eyeing you.  You decide to ask:\n*hide_reuse\n*label discussion_hub\n*if discussion = 1\n  Seeing your audience staring at you with rapt attention you ask:\n*if discussion > 1\n  You're about to ask another question when you see the janitor walking in.  \"Well, it seems like we've overstayed our welcome,\" ${ben} says.\n  *goto janitor\n*choice\n  #\"Why did you decide to join the Syndicate?\"\n    *set discussion +1\n    ${ben} exhales deeply, \"It's hard for me to talk about. I had a long journey to get here.\"  $!{bhe} pauses for a second, then continues, \"But you're all like my family, so I don't have a problem sharing.\"\n\n    There is a hardness about ${bhis} face as ${bhe} speaks.  \"I was fifteen.  My father had been abusive to my mother for a long time.  I worked out hard, hitting the gym every day.  My family had no money, and my dad wouldn't have given me any even if he had.  So I worked odd jobs to pay for my gym membership.\n\n    \"The first gym I found was a martial arts studio,\" ${bhe} goes on.  \"I trained there every chance I got.  It didn't take long until I felt confident enough to confront my dad.  He was hitting my mom when I walked in.  I don't remember much about what happened, but I know my knuckles were bloody and raw after I left, and my father was in a heap.\"  ${ben} takes a deep breath.  \"The police came, and that's when they told me he was dead.\"\n\n    You're silent for a moment, not knowing what to say.  ${ben}'s eyes soften a little and ${bhe} says, \"It's okay, you don't have to look at me like that.  It's the past, and it's made me who I am.\"  \n\n    You open your mouth, but ${ben_nick} goes on, \"You asked me what made me join the Syndicate and that was it.  I wasn't charged with a crime, I saved my mom's life, but it ruined my relationship with her.  She always blamed me for killing him, as bad as he was.\"  $!{bhe} bites ${bhis} lip.  \"I moved out right after, and that was the road that led me to the Syndicate.\"\n\n    ${sam} puts ${shis} hand on ${ben_nick}'s back.  $!{bhe} is sitting upright, though, seemingly unfazed by the horror ${bhe} went through.  \"I'm sorry to hear that,\" ${sam_nick} says, and ${ben} smiles.  \"To be honest, ${name}, my story is a lot simpler.\"\n    *page_break\n\n    ${sam} locks eyes with you, \"I never stood out from the crowd growing up.  It wasn't that I was unpopular, but I loved my books and my computer, and that took a lot of my free time.  I didn't really pay too much attention to what was going on in school except for the learning.  Then one day, I heard about a kid in our neighborhood who'd been bullied so badly that he wasn't even able to leave the house, he was so afraid.  He was only ten.\n\n    \"I wasn't much older, only sixteen,\" ${she} says, \"but I knew that kind of thing had to be stopped.  I set up an elaborate trap.  I lured the bullies into an abandoned warehouse and locked them in for the night.  I jammed their cell phones so they couldn't call for help, then set up an elaborate strobe and sound-effects show.  They were running around like rats in a maze.  They had a few cuts and bruises by the end, but I'm sure the emotional scars were much worse.  I set up some masked robots and some traps, and to this day, I'm sure they don't go out on Halloween.\"\n\n    ${chris} smiles sadly, saying, \"My story is very similar. I was also standing up for someone.  There was a child in my neighborhood who had mental illness.  I can only imagine what his parents went through….\"  $!{che} breaks off for a second, tears welling in ${chis} eyes.  \n\n    \"Anyway, there were some very, very cruel kids,\" ${che} goes on. \"I swear, they were demons on Earth because of what they did.  That's why I don't really feel too bad for stealing their identities and making them wanted felons.\"  ${chris} gives you a broad smile.  \"One of them is still serving time for identity theft.  I love the irony of having used his identity to steal someone else's, but having done it poorly so that it was traced to him.\"\n\n    \"How about you?\" ${sam} asks. \"What brought you to the Syndicate?\" \n\n    You exhale deeply.  It's something you've shared with few others.\n\n    Finally, you say:\n    *choice\n      #\"It's a long and difficult story.  As much as I appreciate hearing your stories, it's just too personal for me.\" \n        You see frowns greeting you, except for ${chris}, who gives you a look of appreciation.  \n\n        \"It takes courage to stand by your convictions,\" ${che} says.  \"Maybe I'm being optimistic, but I think some day you'll open up.  For now, I respect you choosing to be the odd one out.\" \n\n        \"Even though ${name} asked the question?\" ${ben} asks, but ${chris} just shrugs.\n\n        \"Sometimes, we try to bring to light what we fear most, but when the light is shed on us, we turn away,\" ${chris} says.\n\n        \"Profound,\" ${ben} snorts.  After a second, ${bhe} adds, \"I guess I have to respect someone who holds such deep-seated beliefs.\" \n\n        From their looks, you can tell that there is going to be an air of secrecy and mystery that will hang about you long after the conversation is over.\n        *set ben_rapport -10\n        *set sam_rapport %-5\n        *set chris_rapport %+10\n        *set loved %-5\n        *set respect +5\n        *goto discussion_hub\n      #\"Okay, if you really want to know, I'll tell you.\" \n        After taking a deep breath, you explain that:\n        *choice\n          #\"I was a foster kid.  I never knew my parents.  When it came to choices, I made bad ones, until I finally saw the light.\"\n            All three assassins look at you with curious eyes. You have their attention.\n\n            \"It was tough growing up—even worse because I never really had a family,\" you say.  \"It seems cliche but the fights, the beatings, they're reality when you live in a group home. At least, they were in the group home I was a part of.\" \n\n            You pause for a second.  \"I was adopted when I was fifteen.  A nice family, kind.  It wasn't your typical evil stepdad or stepmom kind of deal.  But the impact of feeling unwanted for all those years before they adopted me, plus the horrors of living with people who have nothing to lose…those things aren't easy to put behind you.  I fell into a gang.  It was the first time I felt truly accepted.  I lived a hard life and always thought I'd die young.  Turns out, it was my adoptive parents who died young.  Car accident.  At least they didn't know what hit them.  After that, I went off the edge.\" \n\n            You pause again.  \"It was Boris who pulled me out of my downward spiral.  I had one foot in the grave when he found me.  Honestly, I owe him my life.\" \n\n            ${chris} reaches over and puts a hand on your shoulder.  ${ben} flashes you a sympathetic and comforting smile.  ${sam} looks as if ${she} cannot understand, though ${she} nods politely.  You swallow back hard feelings for a moment and then change the subject.\n            *set chris_rapport %+10\n            *set ben_rapport %+5\n            *goto discussion_hub\n\n          #\"I was a kid of privilege—born with a silver spoon in my mouth—but I wanted more.  I wanted some excitement in my life.\" \n            \"Truthfully, it's not that exciting a story.  I was born into an upper class family.  I wasn't neglected or anything, but I was born into the kind of family that believes that money is a substitute for time and attention.\" \n\n            You pause.  \"Well, that's a recipe for disaster, at least it was in my case,\" you say.  \"I got tired of country clubs and socialite events.  So the first time a friend suggested we do a little vigilante work, I was game.  There was this punk who always liked to throw rocks at the children who went to kindergarten near our gated complex.  It was the greatest rush in the world when we got revenge.  We beat him up pretty bad, using the same rocks he liked to throw at the little kids.  I was hooked.  I would have spiralled into a petty vigilante hell if Boris hadn't come into my life. He offered me the opportunity to take what I was doing to the next level.\" \n\n            ${sam} gives you a knowing look and flashes you a smile.  ${ben} and ${chris} seem not to understand your background, but give you a polite nod just the same.\n            *set sam_rapport %+10\n            *set passion %+5\n            *goto discussion_hub\n\n          #\"I was always someone who sought out danger.  There's something about me that loves the adrenaline rush.\" \n            As you talk, you get more and more passionate.  \"It didn't matter what it was; I loved the rush.  Mountain climbing, bungee jumping, scuba diving, I sought out anything and everything that got my heart racing.  When Boris came into my life and offered me a chance to bring the excitement to the next level, I leapt at the chance.\" \n\n            ${ben} grins broadly.  \"I know just what you mean,\" ${bhe} says, \"I'm an adrenaline junkie, too.\" \n\n            ${chris} and ${sam} nod politely, but neither one seem to feel the same way.  ${chris} jokes, \"I guess I'm a bore because all of my adrenaline rushes come from weights and cardio machines.\" \n\n            The four of you share a small laugh.\n            *set ben_rapport %+10\n            *set passion %+10\n            *goto discussion_hub\n\n          #\"I was always picked on when I was younger, and one day I decided to stand up for myself.\" \n            \"It's not quite as dramatic as ${ben}'s story,\" you start, \"but I went through some pretty rough times.  I was an ugly duckling, and puberty hit me late.  Kids can be very cruel.  It was only when I started finding confidence in myself that I realized my bullies were using their cruel behavior to mask their own insecurities.  I don't know when it was exactly, but there was a definite moment when I realized I didn't need to be afraid, and I certainly didn't need to care about what other people thought of me.\" \n\n            You pause for a second.  \"Boris came into my life much later, but that moment when my life changed was what readied me for the opportunity Boris gave me.\" \n\n            All three assassins nod, appreciative looks on their faces.\n            *set chris_rapport %+5\n            *set ben_rapport %+5\n            *set sam_rapport %+5\n            *goto discussion_hub\n\n          #\"I like getting to live outside of the law, inflicting pain and getting away with it.\" \n            Your voice rises as you describe the early days, growing more and more fervent.  \"I'd always idolized the anti-heroes, the Scarfaces, the mobsters, the Bonnies and Clydes, the people who looked at the law and said, there's no way this is holding me.  The feeling I got when I knew I'd totally dominated someone, that their life was in my hands…well, there's nothing that can match that.  To look someone in their eyes and know that you hold the key to life and death in your hands…\"  You trail off, savoring it.  \"Boris gave me the opportunity of a lifetime, and I'm never taking that for granted.  There's a thrill in dispensing death that makes me feel alive.\" \n\n            ${chris} frowns and ${sam} gives you a puzzled look, clearly not understanding.  ${ben} nods, seeming to get some of what you are saying, but you are unsure if ${bhe}'s on board with your bloodlust. \"Intense,\" is all ${bhe} says, but you can tell ${bhe}'s intrigued.\n            *set ben_rapport %+5\n            *set chris_rapport -10\n            *set sam_rapport %-5\n            *set righteousness %-10\n            *set loved %-5\n            *goto discussion_hub\n\n          #\"I like the discipline of living life by a strict code.\" \n            \"There was always something about the devoted method of martial arts that drew me,\" you say. \"Whether it was honing my skills to get the next belt when I was a kid, or just the fact that I dedicated my life to higher ideals, I don't know. But when Boris came knocking and offered me the opportunity of a lifetime, the chance to devote my life to a strict and controlled system, I jumped at it.\" \n\n            ${sam} nods, seeming to understand what you're saying.  ${chris} flashes you a broad grin, seeming impressed.  Only ${ben} stares at you with a little bit of confusion, not seeming to get your answer, though ${bhe} still gives you a pleasant nod.\n            *set passion %-10\n            *set chris_rapport %+10\n            *set sam_rapport %+5\n            *goto discussion_hub\n\n  #\"What do you like to do in your spare time?\"\n    *set discussion +1\n    ${chris} answers first, seeming eager to do so.  \"That's easy, I like to help others.  No matter whether it's volunteering at a soup kitchen or putting in time at the animal shelter.\"\n\n    ${sam} chimes in, \"I wish I had your dedication,\" ${she} says almost mournfully.  \"I spend some time doing volunteer work, but to be perfectly honest, most of my spare time is spent online, playing RPGs.  I feel very confident saying that I'm the most proficient MMORPG assassin in the world.\"  $!{she} laughs a little.  \"I do also love to read.\"\n\n    ${ben} looks at them both, then shrugs and laughs a little, \"I guess I'm not as noble or as smart as either of you.  I spend most of my free time outdoors.  I'm always trying to get back to nature, or if I can't do that, I'm spending time at the gym.  I have to be active or I'll go stir-crazy.  I love to go hiking up in the hills.  Sometimes, I'll go fishing or rock climbing.  For me, it's the perfect combination when I can exercise and be in the great outdoors.\"\n\n    ${ben} looks at you expectantly, \"How about you, ${name}, what do you like to do with your spare time?\"\n\n    You reply:\n    *choice\n      #\"I confess, I'm a gym addict.  I love to stay fit.\" \n        You can't stifle a smile.  \"I really have to say that my spare time is mostly spent in the gym, or at least exercising.  Something about that rush of endorphins after a good workout…there's very little that can make me happier.  I sleep better and feel better the next day.  It's an amazing thing.  I love the great outdoors, too, hiking, biking, that kind of thing, but it has to involve some physical activity.  I have a hard time sitting still.\" \n\n        Both ${ben} and ${chris} nod, clearly on the same page.  ${sam} says, \"I see,\" politely, but you can tell ${she} does not share the same enthusiasm.\n        *set ben_rapport %+5\n        *set chris_rapport %+5\n        *goto discussion_hub\n\n      #\"Honestly, I'm kind of a homebody.  I like to kick back, read, and relax.  It gives me a chance to clear my mind.\" \n        You explain how your favorite leisure activity consists of getting a little R&R.  \"You know, I really like curling up with a good book or just vegging out on the couch.  The pressures of work sometimes get to me and it's nice to take the time to really recharge the batteries.  It does wonders for me.\" \n\n        ${sam} nods vigorously.  \"I do the exact same thing,\" ${she} says.  \n\n        ${chris} chimes in, saying, \"It's so important to recharge the soul.\" \n\n        ${ben} is the only one who looks at you a little confused, as if ${bhe} can't understand the meaning of downtime.  Nevertheless, ${bhe} gives you a polite nod.\n        *set sam_rapport %+10\n        *set chris_rapport %+5\n        *goto discussion_hub\n\n      #\"In my downtime, I like to meditate and practice my spirituality.\" \n        You explain how you have a dedicated meditation space at your home.  \"I keep a small area reserved just for times when I need to clear my mind.  It's nothing fancy, but I have a yoga mat and a meditation cushion. I like to turn off my monkey brain and expand my awareness.  It really gives me a sense of peace.\" \n\n        ${chris} gives you a big grin.  \"That's one of my favorite things to do.  It nourishes the soul.\" \n\n        ${sam} nods in agreement.  \"It's really important to stay centered, especially in this line of work.\" \n\n        ${ben} shrugs, \"I guess I find my spirituality when I'm on the open road or getting back to nature.\" \n        *set chris_rapport %+10\n        *set sam_rapport %+5\n        *goto discussion_hub\n\n      #\"When I'm off work, I love to cut loose and slam a few back.  There's nothing like a good party.\" \n        ${ben} laughs, \"I'll second that.\" \n\n        You chuckle, saying, \"Yeah, I definitely think that the person who said 'work hard, play hard' really knew what they were talking about.\" \n\n        You and ${ben} exchange humorous, drunken tales while ${chris} and ${sam} try to look interested for the sake of being polite.  \"I never knew you were such a party animal,\" ${sam} says at one point while you're lost in reverie.  \"I enjoy a good drink as much as the next person but I can't say I have any stories that come anywhere near what you two are talking about.\" \n\n        At this, both you and ${ben} laugh.\n        *set ben_rapport %+5\n        *set passion %+10\n        *goto discussion_hub\n\n      #\"At the risk of sounding like a workaholic, my spare time is mostly spent training.\" \n        You explain how, even on your off hours, you're usually contemplating or getting ready for the next move.  \"I know that, in this business, we need to stay ahead of the curve,\" you say.  \"And that's not an easy feat.  That's why, whenever I have spare time, I study schematics, read up on tactics, and hone my craft.  You can never be too careful.  You never know when someone's life might be riding on a decision of yours.\" \n\n        ${chris} commends you.  \"That's really a great sentiment. We're all in this together.\" \n\n        ${ben} and ${sam} nod, but you can tell that they do not quite share your dedication.\n        *set passion %-10\n        *set chris_rapport %+5\n        *goto discussion_hub\n\n  #\"Who do you admire most in the world and why?\"\n    *set discussion +1\n    ${chris} chimes in first.  \"That's easy! If you're talking about human and not divine, then Gandhi.\"  $!{che} goes on, \"What he did for so many people, how he lived his message, was nothing short of revolutionary.  Then again, Mother Theresa is also high up there in my eyes.  Actually, on second thought, this is a very tough question.\"  $!{che} chuckles a little.\n\n    ${sam} smiles.  \"Well it's easy for me. I would say my father.  He was always a shining beacon of inspiration.  He taught me to look after myself and to never let anyone hold me down.  He also was a strong believer in standing up for others.\"\n\n    ${ben} snorts, then apologizes
