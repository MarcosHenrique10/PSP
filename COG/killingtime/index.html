n steal from Miller.\n    Reasoning that it's his foolishness for leaving something like this, and eager for the chance to pilfer any valuables you can, you snatch up the key.\n    *set righteousness %-10\n    *set martinez_key true\n    *goto boris\n\n  #Reach down and grab it reluctantly, wondering if it might come in handy as I take on the Fallen Angels in Miami, with plans to return it later.\n    Not knowing what the locker might hold, but knowing it might come in handy if you can find it, you pocket the key.  You vow you will return it later.\n    *set righteousness %+5\n    *set martinez_key true\n    *goto boris\n\n  #Leave the key and the bag alone, but leave Miller a note to let him know I didn't take anything, even though I could have.\n    You feel the need to let Miller know the kind of moral character you're made of and quickly jot down a little reminder that he left his bag, but that everything is safe and sound.  You know without a doubt that, when he reads it, he's going to respect you for your decision.\n    *set righteousness %+5\n    *set respect +15\n    *goto boris\n\n*label martinez_search\n\nYou're about to turn away from Miller's body when you notice his backpack.  Your heart beats fast in your chest as you gently open the top, needing to make sure there's no bomb or other unpleasant surprise inside.  At first, you see nothing but a few miscellaneous binders and a change of clothing.  Then, you notice the shiny, gold key peering out of the breast pocket of a flannel shirt.  It appears to be the key to a locker, the words \"Everglades National Park\" is engraved on it.  You know that the Everglades are located in Florida, close to Miami.\n\nKnowing Miller has no further use for the key, and it might come in handy as you go after the Fallen Angels, you pocket the key.\n*set martinez_key true\n*goto boris\n\n*label boris\n*page_break\n*if saved = 0\n  A subtle vibration draws your attention. It takes you a moment to realize that it's your phone, but as soon as you do, you glance down at the screen.  \n*if saved > 0\n  \"Your phone is ringing, ${name},\" ${saved_name} says. You suddenly realize that's it's been ringing for a while. You pull it out.\nSeeing an unfamiliar number, you're about to start interrogating the caller when an exasperated but familiar voice stays your tongue.\n\n\"${nickname}, I'm so glad you answered.\"  The words are said in a hushed, near-whispered tone, buy you'd recognize the voice anywhere.\n\n\"Boris?\" you ask, more questions in your head than answers.\n\n\"Yes, listen, this is a throwaway phone.  Something terrible has happened.  They're watching my every move.  I see two of them behind me now.  I'm walking down a busy street and need to put some space between us.  I must to try to lose them.\"\n\n\"Who?\" you ask. \"What is going on?\"  The words barely escape your lips, and you feel like you're sinking one step deeper into quicksand with each syllable you utter, each passing moment bringing you further and further down the rabbit hole.\n\n\"${nickname}, I've learned some things.\"\n\nTry as you might, you can't bite your tongue. \"Too bad you didn't call me ten minutes ago, there might be more of us left alive for your revelation,\" you say bitterly, and all you hear is silence from the other end of the line.  \n\nFor a moment, you think you might have gone too far, that Boris might have hung up the phone.  Then you hear his voice again, somehow sounding much, much older.  \"They've gotten to us.\"  It didn't seem like much of a question, but then again, you realize that your implication couldn't have been much clearer.\n\n\"Yes,\" you answer, \"headquarters is gone.  I'm going to have to get out of here soon, I'm certain the police are already on their way.\"\n\nBoris doesn't hesitate, his voice implacable and almost business-like.  \"Then what I have to tell you is even more important.\"\n*page_break\n\nYou can hear Boris take a deep breath on the other end of the line.  \"They're getting closer now, I don't have much time.  I think I discovered the reason they're after us.  Remember when you got back from Colombia, I told you there might have been a problem with Beijing?\"\n\n\"Yeah,\" is all you say.\n\n\"Well, I had no idea how deep the problem ran,\" Boris responds.  \"When I set up Beijing, it was a new contractor, a friend of mine had a friend of a friend who needed a favor.  I didn't question it because the money was good and the job was simple, or so I thought.\"  You picture it again in your mind.  The sniper rifle to your cheek.  The target in your sights.  The bullet flying free with precision.  The kill.  And then the woman.  Falling, always falling.  \"Well, now it looks like I should have done more research, because I found out the guy who came to me was a front….\"\n\n\"Spit it out,\" you growl, wanting to know, having to know.  \"A front for whom?\"\n\n\"Jenkin Yoshinobu.\"\n*page_break\n\nYou nearly slam down the phone in exasperation.  \"Jenkin Yoshinobu,\" is all your mouth can utter.  Jenkin Yoshinobu, the elusive and almost mythical leader of the Yakuza.  Jenkin Yoshinobu, who was rumored to have killed over one thousand men and women personally.  Jenkin Yoshinobu, whose patience and precision was known world wide, who was rumored to have once waited over a decade, until his target had a husband and child, before killing her, just to extract the maximum level of revenge, lulling the victim into a false sense of security.  If Jenkin Yoshinobu was involved, this went deeper than you ever imagined.\n\n\"Yoshinobu has hired the Fallen Angels to come after us,\" Boris says, a tremor in his voice.  \"And that's not all. It gets worse, much worse.\"\n\n\"How much worse?\"\n\n\"As bad as can be,\" Boris responds, \"The target you took out was a high ranking Triad, the Yakuza's sworn enemy, but he was also-\" Before he can say anything else, Boris's voice raises in panic, \"One of the Fallen Angels is in front of me, a woman, I can see her now.  She has a switchblade.\"  \n\nYou open your mouth, but Boris beats you to the punch.  \"You need to go to Miami, find the Fallen Angels' leader and take her out, that's the only way you're going to stop this.  There's an arms dealer there we've had our eye on.  His name is Carlos Diaz, and he sells weapons to the Fallen Angels.  He'll know where you can find one of the high ranking Fallen Angels who you can lean on to get information on their inner sanctum headquarters.  Diaz hangs out near Lincoln Street and South Beach at a bar called Rigalos.  You can get a photo of him from the database.  He-\"\n\nThe line suddenly goes dead.\n\nStanding in the rubble of the ruined headquarters, surrounded by the bodies of your fallen teammates, you think:\n*choice\n  #I am the harbinger of death and this is my legacy of blood.\n    You feel as if this was all a result of your actions, yet in some way, you believe that this was the way it was meant to be. A bloody pool of destruction was always destined to follow in your wake.  \n\n    You're an instrument of death, and you accept it.  You are the rock upon which others break themselves.  Standing tall, you realize that you are the bringer of death, and yet you're still here.\n    *set passion %+5\n    *set psychotic_level %+5\n    *set loved %-10\n    *goto end_scene\n\n  #I did what had to be done, and there's no way I could have known.\n    Regret washes over you, but it does not linger long.  You realize that there was no way you could have possibly foreseen where your actions would take you.  \n\n    It's bitter, but you recognize that you did the best you could in that instant, and no one, not even your dead comrades, would have asked you for more.\n    *set passion %+5\n    *set righteousness %+5\n    *goto end_scene\n\n  #I am still standing and, while there is breath in my lungs, I will not stop until I exact revenge.  That's what my team meant to me.\n    Regret doesn't even begin to cross your mind.  All you can think about is payback.  It burns in you, a fire that is unchecked and unrestrained.  \n\n    You vow that, even if you have to make the ultimate sacrifice, it will be worth it to avenge your teammates' deaths.\n    *set passion %-5\n    *set loved %+5\n    *goto end_scene\n\n  #If I could take it all back to bring my teammates back, I would. They were everything to me.\n    You kneel down and cradle your head in your hands.  \n    *if saved > 0\n      ${saved_nick} puts ${shis} arms around you.\n    You feel the tears coming, and they are almost like a purifying spring streaming down your face, taking away at least a little of the pain.  You wish you could go back, but know you cannot.  \n\n    Resolving to only move forward, you push your regrets to the back of your mind.\n    *set passion %-10\n    *set righteousness %+10\n    *goto end_scene\n\n  #I can't look back, only forward.\n    You try not to focus on the past, realizing that lamenting will accomplish nothing.  Resolving to only move forward, you push your regrets to the back of your mind.\n    *set passion %+10\n    *goto end_scene\n\n  #I am still here because I am strong and deserve to be.  If the others are not, that is because they were weak and are expendable.\n    You spit on the ground with contempt, both for the situation you're in, and for the fact that your teammates have abandoned you with their deaths.  \n\n    You're still here because you're as tough as they come.  You only wish the others could have been half as good as you are, knowing that if they were, then you would have better odds of striking back.  You are undeterred, though, well aware that you've made it this far fighting the world.\n    *set passion %+5\n    *set loved %-5\n    *set righteousness %-10\n    *goto end_scene \n\n*label end_scene\n*page_break\n*if (saved = 0)\n  You hear the sound of sirens, indicating the police are close.  You quickly print a picture of Diaz from the database computer, and press the button for the elevator.  Seeing the flash of red and blue lights outside the gaping hole in the building, you reconsider, rushing toward the stairs.  \n\n  The stairwell is empty and, taking one flight of stairs after another, you reach a long hallway at the bottom in a flash.  The sounds of the sirens are almost deafening now, but they are coming from the other side of the wall.  \n\n  The stairwell doesn't have a normal exit but rather, a carefully crafted bolt hole, made for easy escape.  You follow the twists and turns of the hallway and, when you emerge, it is from a small opening seamlessly tucked away behind two large dumpsters.  \n\n  You exit into an alleyway, and hurry away from the scene, wanting to put as much space between you and headquarters as possible until the heat dies down. \n  *goto second_thought\n*else\n  Finally, ${saved_name} breaks the silence.  \"Gone,\" ${saved_he} says sadly.  As ${saved_he} does, it's as if something passes between you, a shared understanding, and ${saved_he} abruptly changes course, as if that one word just needed to be expelled for ${saved_him} to come back to the subject.  \"You saved me, though.\"  There's a tremor in ${saved_his} voice. \"If you hadn't, I would have been gone, just like the rest.\"\n\n  \"I couldn't stand the thought of you…\" You find yourself unable to say the words and merely point to the wreck of the office.\n\n  \"I can't tell you how much that means to me,\" ${saved_he} says, walking over and taking your hand.  For a moment, the two of you just stand there, staring off at the outside world through what used to be the wall of your office.\n\n  \"I'm going after them,\" you say at last.  \"It's not right that I ask you to go with me, and I know what I'm asking might mean death for the both of us, but if I'm trudging into hell, there's no one I'd want by my side more than you.\"\n\n  ${saved_name} stares at you for a long moment.  \"You said it yourself, you know what you're asking.  This is probably certain death.\"\n\n  You nod.  \"I do.  And that's why I'm giving you the choice.  If you come with me, I can't promise we'll make it home safely. In fact, the odds are probably against us, but at least I'll know that I did my best.  If you don't feel the same way, I'll understand.  I'm asking a lot.\"\n  *page_break\n\n  ${saved_name} puts ${saved_his} hand on the side of your face tenderly, bowing ${saved_his} head, seemingly deep in thought.  After a moment, ${saved_he} meets your eyes.\n  *if (saved_rapport > 75) and (second_date = saved_name)\n    \"I'll be by your side no matter what, ${name}.  If that means we die in the process, at least we die together.\"\n\n    You smile and, for a moment, all the suffering you've endured fades to the background.  You clasp ${saved_name} tightly and kiss ${saved_him} deeply.  \"I love you, ${saved_name},\" you say as you break the embrace.\n\n    \"I love you, too,\" ${saved_name} replies.\n\n    *label flash\n    The shrill sound of sirens shatters the moment, and you know that the police are close.  Gesturing for ${saved_name} to follow, you quickly print the photo of Diaz from the database and press the button for the elevator.  Seeing the flash of red and blue lights outside the gaping hole in the building, you reconsider, and the two of you rush toward the stairs. \n\n    The stairwell is empty and, taking one flight of stairs after another, you reach a long hallway at the bottom in a flash.  The sounds of the sirens are almost deafening now, but they are coming from the other side of the wall.  \n\n    The stairwell doesn't have a normal exit but rather, a carefully crafted bolt hole, made for easy escape.  You follow the twists and turns of the hallway and, when you emerge, it is from a small opening seamlessly tucked away behind two large dumpsters.  \n\n    You exit into a small alleyway and hurry away from the scene, wanting to put as much space between you and headquarters as possible until the heat dies down.  \"I have to wait to get my vehicle,\" you tell ${saved_name}.  \"You should probably go and wrap up anything you need to take care of, then I'll call you when I'm ready to go to the airport.\"  ${saved_name} nods, taking the time to give you a deep kiss before hurrying off.\n    *set miami_partner saved_name\n    *set mp_nick saved_nick\n    *if preference = \"male\"\n      *set mp_he \"he\"\n      *set mp_his \"his\"\n      *set mp_him \"him\"\n    *finish\n  *elseif (saved_rapport > 65)\n    *if (second_date = saved_name)\n      \"You saved my life,\" ${saved_he} says.  \"And after our date last night…I'll be by your side no matter what.\"\n      *goto saved\n    *elseif (first_date = saved_name) and (second_date != saved_name)\n      \"You saved my life,\" ${saved_he} says.  \"And to be honest, ever since our date, I've been thinking about you.  I'll be by your side no matter what.\"\n      *goto saved\n    *else\n      \"You saved my life,\" ${saved_he} says.  \"And to be honest, I've always held a torch for you.  I'll be by your side no matter what.\"\n      *goto saved\n\n    *label saved\n    You smile and, for a moment, all the suffering you've endured fades to the background.  You clasp ${saved_name} tightly and kiss ${saved_him} deeply.\n\n    *goto flash\n  *else\n    \"I'm sorry, ${name},\" ${saved_name} says, \"I just can't.  I care about you, but what you're asking is too much.  I just don't feel like we're at the point where I can lay down everything—including my life—for you.\"  \n\n    ${saved_name} hugs you closely.  \"I wish you luck, I really do.  And I'll be here when you get back, but I just can't take that next step with you.\"\n\n    You nod sadly but you understand ${saved_name}'s refusal.\n\n    You hear the sound of sirens and know that the police are close.  Gesturing for ${saved_name} to follow, you quickly print the photo of Diaz from the database and press the button for the elevator. Seeing the flash of red and blue lights outside the gaping hole in the building, you reconsider, and the two of you rush toward the stairs. \n\n    The stairwell is empty and, taking one flight of stairs after another, you reach a long hallway at the bottom in a flash.  The sounds of the sirens are almost deafening now, but they are coming from the other side of the wall.  \n\n    The stairwell is no ordinary exit, but instead, a carefully crafted bolt hole, made for easy escape.  You follow the twists and turns of the hallway and, when you emerge, it is from a small opening seamlessly tucked away behind two large dumpsters.  \n\n    You exit into a small alleyway. There, you and ${saved_name} say your brief goodbyes.  You hurry away from the scene in opposite directions, wanting to put as much space between you and headquarters as possible until the heat dies down.\n    *finish\n\n*label second_thought\nThe night is cold, or it just seems that way, staring up at the hollow shell that used to be the Syndicate headquarters.  The hours after the attack on HQ were some of the longest of your life, waiting for the news crews and police to depart so you could retrieve your vehicle.  Now, even the lookie-loos have departed, the building a hollow husk, devoid of life.  You're just grateful the lot is semi-remote and not tied to the site of what the news crews were calling a clear terror attack.\n\nChecking one more time to make sure there are no lingering authorities, you hop in your ride and fire up the engine.  You're about to head to the airport when you pause for a second.  You know that once you head to Miami, there will be no turning back. \n\nYou:\n*choice\n  #Decide to head straight to the airport.  I can't get vengeance soon enough.\n    You push the pedal, revenge the only thing on your mind.\n    *set passion %+10\n    *finish\n  #Head to church to say a quick prayer for my fallen teammates before going to the airport.\n    The tears fall as you kneel at the pew but, after a few moments, a comforting warmth seems to sweep over you, and you can almost envision the spirits of your fallen friends letting you know they're in a better place.\n\n    Heading out, you feel a little bit of solace.  You return to your car and fire up the engine, readying yourself for for vengeance.  \n    *set righteousness %+5\n    *finish\n  #Change plans and wait for the Fallen Angels to come to me.\n    After thinking it over, you realize it might be better to wait for your enemies to come to you, where you'll have the home court advantage.  You also know this is the more disciplined approach.  Your apartment has been compromised, but you have secret relatives living in the city and figure that you can lay low there while you ready yourself for the coming storm.\n    *page_break\n\n    You crest the hill and see the house up ahead.  It's a winding road, deep in the suburbs of LA, but you figure it's the best place to regroup.  You're about to turn into the driveway when you see the headlights behind you.  You've seen the vehicle before, several times.  At first, you believed it was a coincidence, someone taking a similar path, but here, in a more remote part of town, in light of everything going on, you realize it's not happenstance.\n\n    You circle around the block and, sure enough, the car dips back, but makes the turns after you.  Recognizing it's a tail, you drive past your original destination, driving deeper into the hills.\n\n    It takes you a little while, but finally, you come to a winding stretch of road next to a sheer cliff side.  All the other cars are gone now, leaving just you and the tail.  Pressing the pedal to the metal, you accelerate wildly and, as expected, the vehicle behind follows suit.\n\n    You take one twist and turn after another, finally cornering a hairpin curve where you drop off speed suddenly, abruptly coming to a slow idle.  The tail rounds the bend in a flash and your foot is instantly on the accelerator, whipping the wheel sideways and slamming your vehicle into the car.  Clearly taken off guard, you hear the screech of tires and the grinding of metal as you force the vehicle over the embankment.\n\n    You think you hear screams as the car careens into the ravine below, but you're unsure, already leaving the site in the dust.  Taking a deep breath, you know that your plan isn't going to work.  You can't stay.  Doing so is only going to put those you care about in danger.   \n\n    Making the next turn, you head toward the airport, toward vengeance.\n    *set passion %-5\n    *finish\n\n", "miami": "*temp companion true\n*temp lord \"Lord\"\n*temp reveal_martinez_killed false\n*temp adrian_kill false\n*if phoenix_male = false\n  *set lord \"Lady\"\n*if (miami_partner = \"none\") and (with_martinez = false)\n  *set companion false\n*temp arrest_phoenix false\n*temp lion \"tiger\"\n*if gender = \"female\"\n  *set lion \"lioness\"\n*if preference = \"male\"\n  *set mp_he \"he\"\n  *set mp_his \"his\"\n  *set mp_him \"him\"\n*set wounded_here false\nThe subtropical Miami heat makes you sweat through your shirt as you stare at the entrance of Rigalos, looking for the man matching Carlos Diaz's photo.  Seeing the tough crowd hanging around the building, you wish you had a gun.\n\nWith Boris gone and headquarters destroyed, there was no one to set you up with a firearm.  The TSA's strict regulations had made it impossible to get a gun on the plane, and watching the rowdy bunch, you think of just how grateful you'd be to have a piece right now.  But, that isn't an option.  Without a connection in Miami, that left gun stores and they took too long and kept records.  Shaking the notion off, you know you'll just have to rely on your hand-to-hand skills, at least until you can take out a Fallen Angel and commandeer a pistol.\n\nThe sun is blistering overhead, even though it is close to 5pm.  You try to keep yourself cool by using a menu to fan yourself, but it does little good.  From your perch in the small bar across the way from Rigalos, you continue your vigil.\n*if (miami_partner = \"none\")\n  *goto martinez\n*else\n  Turning to your right, you venture a little smile to ${mp_nick}, despite the gravity of the situation.  You know the great sacrifice ${mp_he} is making, risking it all to be by your side.\n  *goto martinez \n\n*label martinez\n*if (with_martinez = false)\n  *goto carlos\n*else\n  Turning to your left, you're grateful to see Miller there with you, knowing his strength and skills will come in handy, as well as his unique insight into the Fallen Angels.\n  *goto carlos \n\n*label carlos\n*page_break\nYou wait for what seems like an eternity before a man matching the photograph shows up at Rigalos.  He is short and stocky, a large belly protruding beneath a white, linen button-up shirt.  He's wearing a straw fedora and has an unlit cigar pressed between his teeth.  He looks like he's straight from Havana, and it's undeniably Diaz.\n\n*if (with_martinez = false) and (miami_partner = \"none\") \n  *goto psycho_diaz\n*elseif (with_martinez) and (miami_partner = \"none\")\n  You tell Miller to follow you, but explain the plan is for him hang back a little and only jump in if it looks like things are getting dicey.\n  *goto psycho_diaz\n*elseif (with_martinez = false) and (miami_partner != \"none\")\n  You tell ${miami_partner} to follow you, but make it clear that you'll take point.  \"I want you to hang back and only jump in if it looks like things are getting dicey,\" you explain and ${mp_he} nods in understanding.\n  *goto psycho_diaz\n*else\n  You tell Miller and ${miami_partner} to follow you, but explain the plan is for them to hang back a little and only jump in if it looks like things are getting dicey.\n  *goto psycho_diaz\n\n*label psycho_diaz\n*if (psychotic_level > 25)\n  *set loved %-5\n  *set psychotic_level %+5\n  *set respect +10\n  *set adrian_kill true\n  You stand up, not even waiting for the bill.  There is a sanguine rage in your eyes.  Diaz is the key to getting to the Fallen Angels, and you're not taking any chances in letting him get away.  \n\n  You grab a steak knife off the table before storming across the street.  The psychotic streak in you comes to the fore and all you can think of is how much you've lost. The faces of people who had essentially been your only family float through your mind, people who are gone forever.  The people you will honor with your mighty vengeance.\n\n  You're methodical, circling Diaz like a starving ${lion}.  The crowd is thick on the street; you come up behind him and tap him on the shoulder with one hand.  As Diaz looks over his shoulder, you clasp a hand over his mouth and force him into a side alley.  Seeing no prying eyes, you pull out your knife and plunge it into his kidney.\n  *page_break  \n\n  You smile as Diaz registers a look of shock.  If you had been more cautious, Diaz might have had a chance to escape or to blackmail you for his information.  Now, with the look of ashen fear on his face, you know he's going to tell you everything or die in the process.  \n\n  Reaching forward, you embrace Diaz, leaving the knife in his lower back and slamming him against the wall as you hug him close.  \n\n  \"Listen and listen closely,\" you whisper. \"Your death can be quick or slow, it's your choice.  I need to know where the Fallen Angels headquarters is, and you're going to tell me.\"  \n\n  Pulling the knife from his kidney, you press the blood-soaked blade against his crotch.  \"I told you that you have a choice, and this is it.  Tell me where the location of the Fallen Angels headquarters is, and I won't castrate you.\"\n\n  Diaz mumbles and you strike him hard in the groin with the handle of the blade.  \"Last chance,\" you spit, as he coughs and tries to save face.  \"Give it up, or it's the sharp end next time.\"\n\n  You see tears form in Diaz's eyes.  \"I don't know where the Fallen Angels headquarters is.\"\n\n  Diaz's eyes are welling, and you know he's telling the truth.  \"Okay,\" you say.  \"You might not know where it is, but I'm sure you know someone who does know.\"\n\n  Diaz hesitates, and you increase the pressure of the blade on his family jewels.  He whimpers and says, \"I'll tell you what you want to know.  There's a man named Adrian.  I don't know his last name, \n  *label addict\n  but he's a big cocaine addict.  He's known as 'Blanco Loco' to us Cubans because the white powder makes him seem insane, but he gets the job done…at least from what I've heard.\"\n\n  \"And where can I find him?\" you prod.\n\n  \"The Colony Hotel, right on the beach,\" he says, \"Adrian always has a room there, top floor.  He keeps it filled with hookers and yayo.\"\n\n  You nod, knowing the place.  An iconic landmark swallowed by neon blue at night, it reminds you of scenes from [i]Scarface[/i].\n  *page_break\n\n  \"Will he be there now?\" you ask.\n\n  \"Your guess is as good as mine, but as a betting man, I'd say yes,\" Diaz replies. \"He just picked up a shipment from me, and I got paid, so that means it was delivered.  He's probably out celebrating, coked out of his mind.\"\n\n  *if adrian_kill = false\n    You thank Diaz for his cooperation as you take your leave and ponder his words.  If Adrian is likely to be hopped up on drugs, you're going need to be ready to deal with it.  An idea formulates in your head, and you make a quick stop near the pharmacy on your way to the hotel.\n    *goto colony\n\n  *else\n    You nod and then silence Diaz once and for all.  He gasps for a second and then goes still, and you nod to yourself, knowing that you'd kept your word, granting him a quick and clean death.  \n\n    Slowly, you lower the body to the floor, making as if you were helping a friend sit down who'd had a few too many.  No one nearby even seems to notice, and your mind is already on the next step in finding Fallen Angels headquarters.  If Adrian is likely to be hopped up on drugs, you're going to need to be ready to deal with it.  An idea formulates in your head, and you make a quick stop near the pharmacy on your way to the hotel.\n    *goto colony\n*else\n  You wait for Diaz to enter before getting up, leaving money on the table for the bill.  \n\n  Crossing the street you enter Rigalos without hesitation, knowing that, with Boris probably held and tortured in a basement somewhere, time is of the essence.\n\n  It takes a moment for your eyes to adjust as you enter the dark and dingy room.  When they do, you spy Diaz at a far off table, sitting by himself with what looks like a Cuba Libre in front of him.  You head straight for your target and take a seat at his booth.\n\n  You decide to:\n  *fake_choice\n    #Be threatening in my approach.\n      \"Mr. Diaz,\" you say, trying your best to ooze threat. \"I'm not one for small talk and, in light of the circumstances, I think you know why I'm here.\"\n    #Be cool and business-like in my approach.\n      \"Mr. Diaz,\" you say calmly, trying to keep things professional.  \"I'm not one for small talk and, in light of the circumstances, I think you know why I'm here.\"\n    #Be direct and firm, but not over-threatening.\n      \"Mr. Diaz,\" you say, keeping your voice even and getting directly to the point. \"I'm not one for small talk and, in light of the circumstances, I think you know why I'm here.\"\n  *comment endif\n\n  \"I don't know who you are or what you want,\" he sputters and you realize you have no choice but to get physical.  \n\n  You drop your hand to his knee, pressing down on a pressure point, and he cringes.  \"Don't play dumb,\" you say coldly, \"you'd have to be living under a rock not to know what happened to our crew.\"\n\n  Diaz seems about to feign ignorance again when the look in your eye apparently makes him think twice about it.  He says, \"I don't live under a rock, but I'm not stupid, either.  You have a target on your back, all you Syndicate members do.\"  He pauses for a second before adding, \"Those n her short, blonde hair.  The third looks like she came straight out of a biker bar, tattoos and piercings all over.  She's short and walks with a swagger that indicates she's the leader of the group. \n\n\"Hey you,\" yells Shorty, the neon lights glinting off a gold ring in her nose.  \"We saw you going upstairs with Adrian.  You friends with him?\"\n\n*fake_choice\n  #I shake my head.\n  #I try to ignore them.\n  #I rush them.\n\n\"Don't move,\" Shorty says, pulling out a pistol, and you freeze in place, knowing she has the drop on you.  \"If you move so much as a finger, I'm going to shoot.\"\n\n*if (with_martinez = false)\n  *if (martinez_killed = true)\n    \"Okay,\" you say, \"you have my attention.  You're looking for Miller, right?\"  \n\n    Shorty looks at you puzzled for a moment.  \"How'd you know that?\"\n  \n    \"Adrian told me,\" you say.\n\n    \"So where is Miller?\"\n\n    \"Dead.  I killed him,\" you say with a smile.  \"From what Adrian told me, it seems like I was doing you a favor.\"\n\n    The woman exhales but lowers the gun.  \"I'm very, very impressed.  Miller was no slouch.  Maybe you did do us a favor.  Then again, maybe not,\" she says, scratching her temple.  \"To be honest with you, I'm really not sure at this point.  It depends on if he told anyone or not.\"\n\n    \"Told anyone what?\"\n\n    \"Where the key to the locker is,\" she replies.\n\n    \"What's in the locker?\" you ask.\n\n    \"I guess if he's dead, there's no harm in telling you now,\" she says.  \"Back when Miller was working for the Fallen Angels, he was on a job that crossed paths with our boss, Artin Maghanian, one of the higher-ups in the Armenian mob.  Miller worked his way into a spot where he was able to get compromising photos of Maghanian with his mistress.  Our boss loves his wife and six kids, and there was no way he was going to let Miller ruin his family.  A couple of days ago, Miller reached out to try to get some hush money, and our boss gave us the green light to go scorched earth until we found him.  Seems no one had seen hide nor hair of him since he broke off from the Fallen Angels.\"\n\n    \"And the locker has the photos,\" you say, realizing that Miller had been doing side work this whole time.\n\n    \"Yup,\" she says.  \"I tell you, my boss would pay a pretty penny to get those photos back.\" She gestures to her compatriots.  \"Well, I guess they're as safe now as they're ever going to be.  We got to get out of here to report back.  If you try to follow us, we'll kill you.\"\n    *set respect +15\n    *set reveal_martinez_killed true\n    *goto key_choice_martinez\n  *else\n    \"Okay,\" you say, \"you have my attention.  You're looking for Miller right?\"  \n\n    Shorty looks puzzled for a moment.  \"How'd you know that?\"\n  \n    \"Adrian told me,\" you say.\n\n    \"So where is Miller?\"\n\n    \"He's not in Florida, I can tell you that much,\" you say.  \"The Fallen Angels destroyed our headquarters and shattered our team.  He knew we were coming for the Fallen Angels for revenge, but he's not with us.  Where he is, though, is anyone's guess.  With what happened to our team, I wouldn't be surprised if he's in the wind.\"\n\n    Shorty exhales but lowers the gun.  \"Well I guess that leaves us in the same situation we've been in for the past few days, not a clue where he is,\" she says, scratching her temple.\n\n    \"Why are you looking for Miller?\" you ask.\n\n    \"I suppose there's no harm in telling you,\" she says.  \"Maybe if I do, and you cross paths with him you'll let me know and we can split the reward.\"  You look at her expectantly until she goes on.  \"Back when Miller was working for the Fallen Angels, he was on a job that crossed paths with our boss, Artin Maghanian, one of the higher-ups in the Armenian mob.  Miller worked his way into a spot where he was able to get compromising photos of Maghanian with his mistress.  Our boss loves his wife and six kids, and there was no way he was going to let Miller ruin his family.  A couple of days ago, Miller reached out to try to get some hush money, and our boss gave us the green light to go scorched earth until we found him.  Seems no one had seen hide nor hair of him since he broke off from the Fallen Angels.  I guess from what you're telling me, he was running with another crew, but since that's done now, I don't think we're any closer to finding him.  We have to find him and that damn locker of his.\"\n\n    \"Locker?\" you ask, realizing that Miller has been doing side work this whole time.\n\n    \"Yup,\" she says.  \"Miller said the only copy of the photos are kept in a locker here in Florida.  I tell you, my boss would pay a pretty penny to get those photos back.\" She gestures to her compatriots.  \"Well, I guess we're back on the manhunt.  If you do run across Miller, you can reach me at the JW on Brickwell.  Just leave a message for Lucy and the receptionist will be sure I get it.  We got to get out of here to report back.  If you try to follow us, we'll kill you.\"\n    *if (martinez_key = true)\n      *goto key_choice_martinez\n    *else\n      *goto club\n*else\n  Before you can say anything, you see Miller walking in from the front door.  \"How'd it go?\" he starts to ask before immediately trailing off as he sees the trio. \n\n  \"Well, look at who we have here,\" Shorty says with a broad grin, and immediately, the other two go for their weapons.\n\n  Miller rushes forward in a blur, but Pink already has a .45 caliber out, pointed in his direction.  A split-second, later you hear what sounds like a cannon exploding as the gun goes off.  Miller barely ducks out of the way in time, rolling to the side.  He's back on his feet in a hurry, but the gunshot will bring the cops running, and you know you have to move quickly.  Still, \n  Shorty has the drop on you, so you have to think fast.\n\n  You:\n  *choice\n    #Dive straight for Shorty.\n      Not hesitating, you dive forward, shooting _with\n\n*label key_choice_martinez\nNow knowing what's in the locker, you:\n*choice\n  #Tell her I have the key and try to parlay it for some money.\n    \"Wait,\" you say, gesturing to Shorty to stop.  \"I have the locker key.  I didn't know what it was for, but I figured it might come in handy.  Seems it has.  I suppose I could let you have it in exchange for, say, all of the reward money.\"\n\n    \"And what's to stop us from just taking it from you?\" she says, raising the gun.\n    \n    You take a step forward.  \"I can see from the look in your eyes, you know who I am,\" you say menacingly.  \"You might get a shot off before I get to you, but if you do, you better make damn sure you kill me because I'm going to keep coming.  And if I get my hands on you, you're going to regret every single decision you've made in your life that led you to this moment.\"\n    \n    *if (loved \u003c 40) or (improvisation > 18)\n      Shorty's face goes ashen.  \"Alright, I know who you are…and what you're capable of.\" She shivers a little.  \"You can't blame me for wanting to keep the reward for myself.\"\n\n      You say nothing, knowing that silence is sometimes the most powerful weapon.  Shorty and her cohorts appear even more frightened and she quickly digs into a satchel held by her the Ichabod.  She draws out all the money she has in the bag and tosses it to you.  Stacks of neatly wrapped hundreds fall at your feet and you smile.  \"You can go now,\" is all you say, and the trio turns and marches toward the exit in fear.\n\n      Picking up the cash, you find yourself fifteen grand richer.\n\n      Observing the departing the trio, you:\n      *choice\n        #Let the group go because they've honored their word.\n          You wait until the three of them are gone and then head out to the club.\n          *set righteousness %+5\n          *set money +15000\n          *goto club\n        #Let the group go because I don't want to cause any problems that might jeopardize the mission.\n          You wait until the three of them are gone and then head out to the club.\n          *set passion %-5\n          *set money +15000\n          *goto club\n        #Chase after the group and kill them in the alley.\n          You watch the three of them exit, then rush over toward the fire alarm.  It's an older version, the kind with an ax inside.  You break the glass and, a second later, the weapon is in your hand.  \n\n          Running after the trio, you slam the ax into the back Shorty.  As you do, her gun goes off twice in quick succession, the reverberations echoing fiercely in the alley. \n\n          You barely have time to register the gunshots as you're tossed to the side by the Ichabod.  His blows come quickly and ferociously, the ax flying from your hand, but you're able to block a few of them, finally landing a good counter punch.  Pushing him away, you dive for the ax.   As you do, you can already hear sirens, and you know the cops must have been in the area and are going to be there any minute.\n\n          Realizing your time is short, you swing the blade with a fearsome effort, the sharp edge catching the man in the neck.  Pink, finding herself alone, trains her gun on you, and you don't hesitate to fling the ax at her.  The blade thuds into her skull and she falls in a heap.  You're already rushing to grab a weapon when you see the bright glare of a blue and red strobe.  Knowing the cops will close in at any second, you abandon any thought of a weapon.  Ducking out of the alleyway, you make your escape without a second to spare.\n          *set psychotic_level %+15\n          *set money +15000\n          *goto club\n    *else\n      Shorty sneers.  \"I know who you are,\" she says, \"and I know you're not one who takes the hard line, so I'm willing to take my chances if you do get a hold of me.  But since I'm holding the gun on you, I consider that extremely unlikely, which means I'll get to keep the reward all to myself.\"\n\n      You have no firearm, so you weigh your options and decide to:\n      *choice\n        #Bluff to try to outsmart them.\n          \"Look, do you really think I'd be so stupid as to tell you I had the key if I had it on my person?\" you ask, gingerly walking forward.  \"I have it, as in I know where it is, I don't have it on me.  And if you shoot me, you'll never find out where the key is.\"\n\n          Shorty stares at you for a second, then says, \"Well, then, it looks like I'm going to have to pay you after all.\" She puts her gun away and reaches into the satchel, withdrawing large stacks of bills.  She tosses them to you and you look at the money appreciatively.  \"It's fifteen large,\" she says.  \"Now where's the key?\"\n          \n          *if (intelligence > 10)\n            *set intelligence +2\n            *set money +15000\n            \"I'll lead one of you to it,\" you say, and gesture to the Ichabod, \"him.\" The man grunts and shuffles forward slowly, and immediately, you know you've selected wisely.  The goon looks like he's been up for days and appears listless and bored.  \"You two stay here, and we'll be back in less than half an hour.\"\n\n            Shorty nods, and you walk toward the exit.\n            *if (miami_partner = \"none\")\n              As you reach the door, you exit first, slipping your hand surreptitiously into your pocket.  Your fingers come in contact with the key and, just as the Ichabod is about to exit the door, you toss the key in his face.  \"Catch,\" you yell, and take off running.  You don't stop until you're well out of the area.  Smiling to yourself, you realize that you're now fifteen grand richer.\n              *goto club\n            *else\n              As you walk, you lean toward ${miami_partner} and whisper, \"When I say 'go,' start running.\" ${miami_partner} nods silently as you make your way to the street.\n\n              As you reach the door, you let ${miami_partner} exit first.  You quickly fo t with the key and, just as Pink is about to exit the door, you toss the key in her face.  \"Go,\" you yell, and you and ${miami_partner} take off running.  Pink is quick, though, and a second later, you hear the report of a pistol and feel hot pain in your shoulder.   ${miami_partner} looks at you with horror, but you push forward.  You don't stop until you're well out of the area.\n              \n              Out on the street, you examine your shoulder.\n              *gosub_scene util health_check_regular\n              The wound is painful, but you've had much worse.\n              *goto club\n        #Dive for the gun and handle this face-to-face.\n          *goto dive_shorty\n        #Try to distract them.\n          *goto distract_shorty\n\n  #Dive for the gun and handle this face-to-face.\n    *label dive_shorty\n    *if (strength > 10)\n      *set strength +2\n      Not hesitating, you dive forward, shooting for a low, single leg takedown.  You're far away, but you're able to grasp Shorty's leg above the ankle and drive your shoulder in deep, just below the knee.  She buckles and falls, even as you hear the report of a gunshot as she fires wildly, her shots going into the ceiling.  You're on her a second later, taking her to the ground, the gun flying away in the scuffle.  \"Bad move,\" you say, your hand to her throat.  \"You misjudged me.  Never mistake kindness for weakness.\"\n      *label hasty_exit\n\n      Gesturing to her teammates, you motion for the cash.  The Ichabod hands over a satchel, and you grab it quickly.  Knowing that they outnumber you, you use the momentary distraction and their fear to hightail it out of there.  Only when you're outside do you realize that you've left the pistol inside.  Knowing that one of them probably has it by now and is none-too-happy with your display, you make a hasty exit.\n      *set money +15000\n      *if wounded_here\n        Out on the street, you examine your shoulder.  \n        *gosub_scene util hea hite-hot pain in your shoulder.  Knowing that you have to move quickly, you abandon your plans and rush forward.  You're on her a second later, taking her to the ground, the gun flying away in the scuffle.  \"Bad move,\" you say, your hand to her throat.  \"You misjudged me.  Never mistake kindness for weakness.\"\n      *goto hasty_exit\n  #Tell her I have the key and hand it over.  I don't want to destroy a family.\n    \"Wait,\" you say, gesturing to the woman to stop.  \"I have the locker key.  I didn't know what it was for but I figured it might come in handy.  Seems it has.  I'll give it to you so that your boss's family doesn't suffer.\"\n\n    \"That's really noble of you,\" she says, and her compatriots nod in agreement.  \"In light of your show of respect, I'm going to give you a reward.  I'm sure my boss would want that.\"\n\n    She reaches into a satchel that her tall, male companion is carrying and, for a second, you fear she's going for a weapon.  Your fears are allayed when she withdraws three stacks of money.  \"It's $7500,\" the woman says. \"Not bad considering you were going to take nothing.\"\n\n    You catch the money as she tosses it to you.  The trio quickly departs and you do likewise, wanting to get to the Fallen Angels headquarters as fast as possible.\n    *set righteousness %+10\n    *set respect +5\n    *set money +7500\n    *goto club\n\n  #Don't tell her I have the key.  I'd rather blackmail their boss myself.\n    You say nothing, watching the trio depart.  As soon as they are gone, you hightail it to an internet cafe and use your computer knowledge to log into an encrypted account.\n\n    *if reveal_martinez_killed = false\n      Using your hacking skills, it doesn't take long for you to find the boss's information and make contact.  After a little back and forth, he agrees to wire $20,000 to a secure account immediately.  You know that, with the routing you've set up, it will be untraceable, and the mob boss is going to believe that it was Miller doing the deal.  You smile a little, realizing that you're now $20,000 richer and that someone else is going to get the blame.\n      *set righteousness %-15\n      *set loved %-10\n      *set miller_heat true\n      *set money +20000\n      *goto club\n\n    *else\n      Using your hacking skills, it doesn't take long for you to find the boss's information and make contact.  After a little back and forth, he agrees to wire $20,000 to a secure account immediately.  You know that, with the routing you've set up, it won't be traceable to you, and the electronic trail will lead to some unsuspecting chump.  You smile a little, realizing that you're now $20,000 richer and that someone else is going to get the blame.\n      *set righteousness %-15\n      *set loved %-10\n      *set money +20000\n      *goto club\n\n*label club\n*page_break\nThe moon glows brilliantly in the humid Miami night air, and you stare at the overwhelmingly packed club.  The line wraps around the corner of one of the busiest streets in town.  \n\n*if (with_martinez = false) and (miami_partner = \"none\")\n  After leaving the Colony Hotel, the exhaustion and jetlag had begun to take their toll, and you'd returned to your hotel for a quick nap.  Even after the brief respite, you feel the faint tug of fatigue pulling at you, but you shake it off, keeping your guard up, taking everything in. \n  *goto line\n*elseif (with_martinez) and (miami_partner = \"none\")\n  After leaving the Colony Hotel, the exhaustion and jetlag had begun to take their toll, and you and Miller had returned to your hotel for a quick nap.  Even after the brief respite, you feel the faint tug of fatigue pulling at you, but you shake it off, keeping your guard up, taking everything in.\n\n  You turn toward Miller.  \"This is it,\" you say with with resolution.\n  *goto line\n*elseif (with_martinez = false) and (miami_partner != \"none\")\n  After leaving the Colony Hotel, the exhaustion and jetlag had begun to take their toll, and you and ${miami_partner} had returned to your hotel for a quick nap.  Even after the brief respite, you feel the faint tug of fatigue pulling at you, but you shake it off, keeping your guard up, taking everything in.\n\n  You turn toward ${miami_partner}.  \"This is it,\" you say with resolution.\n  *goto line\n*else\n  After leaving the Colony Hotel, the exhaustion and jetlag had begun to take their toll, and you, ${miami_partner}, and Miller had returned to your hotel for a quick nap.  Even with the brief respite, you feel the faint tug of fatigue pulling at you, but you shake it off, keeping your guard up, taking everything in.\n\n  You turn toward ${mp_nick} and Miller.  \"This is it,\" you say with resolution.\n  *goto line\n\n*label line\nThere's a velvet rope and a group of people clamoring to get in.  A burly bouncer wearing dark sunglasses and a tight-fitted, black T-shirt surveys the crowd, handpicking who gets in with an arrogant nod and wave of the hand.  There doesn't appear to be another way in, so a direct approach is the only way to go.\n\nIn preparation, you think back on all of your favorite, most successful hits.  This adds an air of abundant swagger to your already well-established mystique so the bouncer has no problem letting you in.\n*if (miami_partner = \"none\") and (with_martinez = false)\n  You stride forward confidently, like you own the joint.  Grateful you've crossed that hurdle, you make your way into the club.\n  *goto club_interior\n*elseif (with_martinez)\n  You stride forward confidently and you're about to make it through with another group when you feel a hand on your chest.  \n\n  \"Hold on,\" the bouncer says, his gaze flickering over Miller.  \"He's not dressed right.  It's $2,000 if you want in,\" he says sternly.  \"That's the price of a table.\"  \n\n  You're about to tell him that you don't need a table, but he's already back to surveying the crowd.  Knowing you either have to pay the fee or get out of line and try something else, you decide to:\n  *choice\n    #Pay up.\n      As much as it kills you, you decide revenge is worth a little extra dough, and you fork over the extra two large.  The bouncer nods and lets you pass unimpeded.\n      *set money -2000\n      *goto club_interior\n    #Try to negotiate.\n      Realizing that you don't want to spend unnecessary money, particularly not two grand, you try to haggle, but the bouncer is steadfast.  \n\n      \"Listen, the only way you're getting in tonight is if you fork over money for a table, and that's $2,000,\" he says firmly.  Seeing the steel in his eyes, you nod and hand over the dough.  He raises the velvet rope and you make your way inside.\n      *set money -2000\n      *goto club_interior\n    #Decline and mingle with the crowd, trying to get in with a group near the front of the line.\n      *if (improvisation > 15)\n        You're a talker and able to mingle quite well.  You fire up a long conversation with a group of very attractive model types and, when the velvet rope opens again a few minutes later, you're able to get in without so much as a second glance.  \n\n        Smiling, you extricate yourself from your newfound friends.\n        *goto club_interior\n      *else\n        You try to schmooze with the groups closest to the front of the line, but no one seems to pay you much attention, and you can't help but feel like an outcast among the crowd.  So it is with little surprise, that you find the same bouncer shaking you down for the $2,000 table fee.  \n\n        Realizing you have little choice, you fork over the two large.  The bouncer smiles at you and raises the velvet rope so you can make your way inside.\n        *set money -2000\n        *goto club_interior\n\n*label club_interior\n*page_break\nThe speakers are thumping a techno beat that practically shakes the room.  The place is packed, though not as crowded as the line outside would suggest.  There are giant fliers lining the wall, and or_approach  \n\n*label door_approach\nYou don't see anyone looking in your direction or paying you any attention, but you nevertheless try to move to the music as you make your way over to the door.\n*page_break\n\nYou reach the door without incident, but survey the room one more time to make sure you haven't attracted any unwanted attention.  Everyone seems entranced with either the music or the beautiful people, and you turn back to the door.  \n\nAt first, the door seems to be locked.  You try the knob again when the door cracks a bit, and you hear a voice from behind it.\n\n\"Password.\" It's a harsh challenge, the speaker clearly female and clearly ready to fight if you answer incorrectly.\n\n*if (with_martinez)\n  You glance at Miller.  He looks back at you and shrugs.  You nod, knowing he has a better shot at it than you do.  \"Phoenix rises,\" he says, and your gut clenches for an instant before you hear the reply from the other side of the door.\n\n  \"That's the old password,\" the gruff female voice says.  \"Didn't you get the memo?\"\n\n  \"No,\" Miller answers.  \"I've been on a long deep cover mission.\"  He feigns anger.  \"This really pisses me off!  We need better communication.  This isn't the first time it's happened.\"\n\n  \"Tell me about it,\" the woman says, pulling open the door.  \"That happened to me not that long ago-\"\n\n  Her sentence is cut short as you barrel through, slamming into her.  Miller quickly flings the door shut behind you as the force of your impact knocks the strapping woman down.  \n\n  Turning, you see a man standing to the side of the door with a blade in his hand.  He's caught off guard, though, and you're able to use his own weapon against him before he can recover, plunging it into his heart.  You turn back to the female guard, but she's already on her feet, gun in hand.  \n\n  Wrenching the knife from the dead guard's stomach, you fling it.  The blade catches the woman in the throat, and she goes down with a bloody gurgle.  You approach the body and help yourself to her weapon, a Glock 9mm.  \n\n  Eyeing the staircase at the end of the room, you prepare yourself to enter the hornet's nest.  Readying your weapon, you approach the stairs.\n  *set respect +10\n  *goto club_upstairs\n*else\n  *goto password_choice\n\n*label password_choice\nYou decide to:\n*choice\n  #Kick the door open.\n    No way you're guessing the password, and you know you might as well capitalize on the element of surprise.  Pretending like you're going to answer, you spring to attack instead.  \n\n    *label str_check\n    *if (strength > 15)\n      The power of your kick is like an explosion, flinging the door wide open, and the woman is knocked down by the force of your blow.  You rush into the room, slamming the door shut behind you.  \n\n      Turning, you see a male guard standing to the side of the door with a blade in his hand.  He's caught off guard, though, and you're able to use his own weapon against him before he can recover, plunging it into his heart.  \n\n      You turn back to the female guard, but she's already on her feet, gun in hand.  Wrenching the knife from the dead guard's thorax, you fling it.  The blade catches the woman in the throat, and she goes down with a bloody gurgle.  You approach the body and help yourself to her weapon, a Glock 9mm.  \n\n      Eyeing the staircase at the end of the room, you prepare yourself to enter the hornet's nest.  Readying your weapon, you approach the stairs.\n      *set respect +5\n      *goto club_upstairs\n    *else\n      You kick out and are rewarded by a grunt of pain as the woman is knocked back and the door flings open.  You rush into the room, slamming the door shut behind you.  \n\n      Turning, you see a male guard standing to the side of the door with a blade in his hand.  He's taken off guard, but not completely surprised, and he lunges forward with the knife.  \n\n      You're quick, but not strong enough to stop his blow.  You catch his wrist, but are unable turn his own weapon against him.  The knife slashes across your forearm, and the resulting pain brings you a strength you didn't know you possessed.  You force the blade backward into his chest and he goes down in a heap.  \n\n      You turn back to the female guard, who is already taking aim.  Wrenching the knife from the dead guard's chest, you fling it.  The blade catches the woman in the throat, and she goes down with a bloody gurgle.  You approach the body and help yourself to her weapon, a Glock 9mm.  \n\n      Eyeing the staircase at the end of the room, you prepare yourself to enter the hornet's nest.  Readying your weapon, you approach the stairs.\n      *gosub_scene util health_check_regular\n      *goto club_upstairs \n  #Try to bribe the guard.\n    \"Listen,\" you say, \"this is not your fight. I'm here to settle a score with the higher ups.  If you open this door, I'll wire 50K to a bank account of your choosing and-\"\n\n    You hear the creak of the door and, just before it's about to be slammed into your face, you kick it open.\n    *goto str_check\n  #Improvise a story.\n    *if (improvisation > 15)\n      \"Listen, I only have the old password.  I've been on a long deep cover mission.  The doorman told me that it's outdated.\"  You feign anger.  \"This really pisses me off! We need better communication.  This isn't the first time it's happened.\"\n\n      \"Tell me about it,\" the woman says, pulling open the door.  \"That happened to me not that long ago-\"\n\n      Her sentence is cut off as you barrel through, slamming into her.  The force of your impact knocks the strapping woman down and you quickly fling the door shut behind you.  \n\n      Turning, you see a male guard standing to the side of the door with a blade in his hand.  He's caught off guard, though, and you're able to use his own weapon against him before he can recover, plunging it into his gut.  You turn back to the female guard, but she's already on hem appear very cautious, and you know your reputation has proceeded you.  \n\n      Both guards slink past, but before they do, you hold out your hand. \"Weapons.\"  You're disappointed that all they provide you with is a knife and a Glock 9mm.  Still, it's better than nothing.  \n\n      You enter the room and close the door behind you.  Staring at the stairs at the far end, you prepare yourself to enter the hornet's nest.  Readying your weapon, you approach the stairs.\n      *set respect +5\n      *set loved %-5\n      *goto club_upstairs\n\n    *else\n      \"Listen to me, and listen well.  I am ${the_nickname} from the Syndicate.  I know you've heard of me.  I'm going to give you one chance to open the door and get out of here alive.  If you do, I won't come after you.  If you don't, you're dead.\"\n\n      \"I'm not afraid of you,\" the gruff woman says, and you realize that your reputation isn't as fearsome as you'd thought. You hear the creak of the door and, just before it's about to be slammed into your face, you kick it open.\n\n      *goto str_check\n\n*label club_upstairs\n*if (with_martinez = false) and (miami_partner = \"none\")\n  *goto stairs\n*elseif (with_martinez) and (miami_partner = \"none\")\n  \"Hey,\" Miller says, \"wait a sec, I know you're all gung-ho, but let me see if I can find a piece for myself.\"  You nod, muttering an apology.  This close to the inner sanctum of the Fallen Angels, all you can think about is revenge.  \n\n  Miller searches around, but comes up empty.  He seems about to give up when he spies a small cabinet that contains two Glock 9mms.  He tucks one into his waistband and holds the other at the ready. \"Now, let's roll,\" he says, heading to the stairs.\n  *goto stairs\n*elseif (with_martinez = false) and (miami_partner != \"none\")\n  \"Hey,\" ${miami_partner} says, \"wait a sec, I know you're all gung-ho, but let me see if I can find a piece for myself.\"  You nod, muttering an apology.  This close to the inner sanctum of the Fallen Angels, all you can think about is revenge.  \n\n  ${mp_nick} searches around, but comes up empty.  $!{mp_he} seems about to give up when ${mp_he} spies a small cabinet that contains two Glock 9mms.  $!{mp_he} tucks one into ${mp_his} waistband and holds the other at the ready. \"Now, let's roll,\" ${mp_he} says, heading to the stairs.\n  *goto stairs\n*else\n  \"Hey,\" Miller says, \"wait a sec, I know you two are all gung-ho, but let me see if I can find a piece for myself.\"  You nod, muttering an apology.  This close to the inner sanctum of the Fallen Angels, all you can think about is revenge.  \n\n  Miller searches around, but comes up empty.  He seems about to give up when he spies a small cabinet contains two Glock 9mms.  He tosses one to ${mp_nick} and holds the other at the ready. \"Now, let's roll,\" he says, heading to the stairs.\n  *goto stairs\n\n*label stairs\n*page_break\nThe clank of each metallic footfall sounds ominous. With the high ceilings of the club, the stairs double back into a second flight before reaching the next floor.  You keep your gun trained and reach a solid metal door at the top of the stairs. Testing it, you are pleasantly surprised to find it unlocked.\n\nPlacing your hand on the large metal handle, you press it slowly and softly. The door doesn't go easy, though, screeching fiercely.  Realizing that your attempt at stealth will be futile, you slam the door open and charge inside.  What you see makes your mouth drop.\n\nThe room is large and white, with expensive, marble columns lining the walls.  A giant saltwater aquarium sits at the far end, exotic and highly poisonous-looking fish swimming about.  What strikes you most, however, is that the fish are swimming around the body of a decomposing corpse sitting amid the coral.  In that moment, you know the rumors about the Fire ${lord} and ${shis} penchant for feeding ${shis} enemies to the fishes is really true.  \n\nBefore the massive tank, seated in a plush , \"you would absolutely die to hear this story.\"\n\nKnowing you have to buy time, you say:\n*fake_choice\n  #\"Okay, I'm listening.\"\n  #\"I'm all ears.\"\n  #\"Spill it, I'm curious to hear what you have to say.\"\n  #\"I am dying to hear it.\"\n  #\"I guess I don't have much of a choice.  I'm a captive audience.\"\n\n\"I know you are,\" ${she} replies with a self-indulgent smirk.  $!{she} is like a spider, toying with a dying fly in ${shis} web.  \"Now then, ${nickname}, I'm sure you remember a little mission you went on in Beijing.  I believe Boris has mentioned what a huge mistake it was.\" \n\nYou remember your last conversation with Boris, and his words about the Fallen Angels closing in on him.  They had been following and listening.  \"He's dead, isn't he?\" you ask.\n\nPhoenix laughs, \"Didn't anyone tell you it's rude to interrupt?  Especially when your host has so many guns pointed at you.\"  You say nothing further and ${she} continues in ${shis} own time. \"Now, where was I?  Oh that's right, Beijing.  That was where you killed Jenkin Yoshinobu's future son-in-law.  Of course, that was part of the plan.  Yoshinobu hired Boris for that explicit purpose.  He didn't approve of his daughter dating someone from a Triad.\"\n\nAt ${shis} words, you feel as though you've been kicked in the gut.  [i]His daughter…[/i]  Your hands tremble as the pieces come together in your head.  [i]Jenkin Yoshinobu's daughter…[/i]  \n\nYou replay it over in your mind.  The shattered glass.  The dress so white and so pure.  The hollow eyes, red-rimmed with tears.  The woman standing at the precipice, her lover's blood on her hands.  The sorrow on her face.  The leap into the atrium.  The plummet, unflinching, unfailing.  The leaden snowflake hurtling toward the earth.\n*page_break\n\n\"That was her,\" you say, barely able to speak the words.  \"The woman who was there that night in Beijing, that was Yoshinobu's daughter.\" \n\n\"Precisely,\" Phoenix says, the smile on ${shis} an't be,\" thinking of all of your fallen comrades.\n\n\"It can be, and it is,\" Phoenix corrects you.  \"Yoshinobu didn't blame Boris, no one could have known, but a death is a death to Yoshinobu, and it had to be avenged.  Especially this one. So, he hired Boris to destroy his own crew.\"  \n\n*if companion = false\n  Hearing the words, you feel like you've been stabbed.  An icy pain shoots through your stomach.  \n  *goto money\n*if (with_martinez) and (miami_partner = \"none\")\n  Hearing the words, you feel like you've been stabbed.  An icy pain shoots through your stomach.  There is a look of profound shock and hurt on Miller's face at the revelation as well.\n  *goto money\n*elseif (with_martinez = false) and (miami_partner != \"none\")\n  Hearing the words, you feel like you've been stabbed.  An icy pain shoots through your stomach.  There is a look of profound shock and hurt on ${miami_partner}'s face at the revelation as well.\n  *goto money\n*else\n  Hearing the words, you feel like you've been stabbed.  An icy pain shoots through your stomach.  There is a look of profound shock and hurt on the faces of Miller and ${miami_partner} at the revelation as well.\n  *goto money\n\n*label money\n\"And he accepted,\" you say, your voice barely a croak.\n\n\"Of course! The sum he was offered was quite sizable.  I just don't see how he could have refused.  And he knew very well that the Syndicate going against Yoshinobu would be a death sentence.\"\n\nYour knees shake, thinking of the man you'd considered a second father for so many years.  Your throat tightens, your hands unable to stay still.\n\n*fake_choice\n  #\"This just can't be happening.\"\n  #\"I just can't believe it.\"\n  #\"I thought something was going on with Boris.\"\n\n\"Boris decided it was time for a fresh start, time to wipe the slate clean, as it were,\" Phoenix goes on.  \"He planned it to look like the Fallen Angels were making a power play.  Believe me, pet, it was quite a sight, seeing my arch-nemesis coming to me and hiring me to do what I had wanted to do for so long, yet hadn't been able to.  But with Boris's passwords, his codes, and his plans, killing you all was like taking candy from a baby.\"\n\nSickness roils in your stomach, realizing that was how the Fallen Angels had been able to wipe out your crew, how they were able to breach headquarters' security.  Boris had given them everyone on a silver platter.  \"And Boris?\"\n\n\"I would imagine he's starting a new crew right now.  That was part of the deal, you see.  The Fallen Angels wipe out the Syndicate and take over your team's domain\", Phoenix ticks off on ${shis} fingers, \"and Boris moves to the EU and makes that his new dominion.\"\n\nYou almost can't believe this is happening, as if any second you're going to wake up from this awful nightmare.  \"So you're Boris's hit team?\" you sputter.\n\n\"Bingo,\" ${she} replies, the truth sinking in.  Your gut twists in knots, and you realize with grim resignation that this is no dream, that someone you've known for years, who you've trusted and cared for, has betrayed you.  \"And now, my pet, I'm very sorry to say, though it must come as no surprise, I must kill you,\" Phoenix says.\n\n*if companion = false\n  You see the masked figures tighten their grips on the triggers of their guns. It's time to think fast.\n  *goto triggerfinger\n*if (with_martinez) and (miami_partner = \"none\")\n  You see the masked figures tighten their grips on the triggers of their guns, and you and Miller do the same.  It's time to think fast.\n  *goto triggerfinger\n*elseif (with_martinez = false) and (miami_partner != \"none\")\n  You see the masked figures tighten their grips on the triggers of their guns, and you and ${miami_partner} do the same.  It's time to think fast.\n  *goto triggerfinger\n*else\n  You see the masked figures tighten their grips on the triggers of their guns, and you, Miller, and ${miami_partner} do the same.  It's time to think fast.\n  *got
