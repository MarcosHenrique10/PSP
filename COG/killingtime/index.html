ng to do what you're going to do.  That draws me.\" \n\n        ${ben} nods.  \"Me, too,\" ${bhe} says.\n\n        ${chris} and ${sam} both nod but do not share ${ben}'s enthusiasm.  You even see ${chris} slide away from the table slightly.\n        *set chris_rapport -5\n        *set ben_rapport %+5\n        *set righteousness %-10\n        *set loved %-5\n        *goto discussion_hub\n\n      #\"Myself.\"\n        All three assassins look at you in shock, but you continue.  \"It may sound cocky, but I'm proud of the struggle it took to get me where I am today.\" \n\n        For a second, all three stare at you before ${ben} bursts out laughing.\n\n        \"I never really thought of it that way,\" ${ben} says, \"but now that I do, I'm pretty pleased with myself, too.  And I love the confidence.\" \n\n        ${sam} says, \"There's nothing wrong with feeling good about your own accomplishments.\"\n\n        ${chris} looks on, seeming to hold entirely different beliefs.  Finally, ${che} says, \"I have a problem with hubris getting in the way of true spirituality, so I'm not going to be idolizing myself anytime soon.\" \n        *set ben_rapport %+10\n        *set chris_rapport -10\n        *set sam_rapport %-5\n        *set passion %+10\n        *goto discussion_hub\n\n      #\"Albert Einstein, Thomas Jefferson, Amelia Earhart, the list of people who have changed the world through invention and innovation goes on and on.\"\n        As you speak, you see ${sam} hanging on every word.  From the ancient inventors to Steve Jobs, you explain how you have always admired those on the forefront of innovation.  \"There's just no way to narrow it down,\" you say, \"we owe a lot to these people, and many of them had to overcome great adversity for what they believed in.\" \n\n        ${sam} smiles when you finish.  It's clear you've won some points with ${shim}.  ${chris} also gives you a grin, saying, \"I like that you admire those people who chose to make a difference.  That's what I strive to do.\" \n        *set sam_rapport %+10\n        *set chris_rapport %+5\n        *set passion %-5\n        *goto discussion_hub\n\n      #\"Dr. Martin Luther King, Jr., Rosa Parks, Cesar Chavez, the people who have fought for equality and civil rights are the ones I admire.\" \n        ${chris} smiles broadly, as does ${sam}.  \"I admire that you admire them,\" ${chris} says.\n\n        \"Yeah,\" you say, \"I believe that everyone deserves the same rights and respect because we're all human beings.  It doesn't always work out that way, but where there's oppression, there are always voices of hope.  Those are the people I look up to because it takes a tremendous amount of courage to stand up for the rights of others.\" \n\n        ${chris} really connects with your answer, while ${sam} seems politely interested, and ${ben} seems indifferent.\n        *set chris_rapport %+10\n        *set passion %+5\n        *set righteousness %+5\n        *goto discussion_hub\n\n      #\"Da Vinci and Michelangelo would have to be my top picks.\" \n        You explain to the trio of assassins how you've always been an admirer of art.  \"Sure, there are other great artists, both before and after.  Dali, Miró, Frida, Rembrandt, Pollack, Basquiet, I love them all.  Still, there's just something so iconic, something so magical about seeing [i]David[/i] or [i]la Pietà[/i] or the [i]Mona Lisa[/i] that just cannot be encapsulated in words.  And when you think about the history of these great artists…\"  You trail off contemplatively.\n\n        ${sam} nods in appreciation as does ${chris}.  ${ben_nick} seems indifferent, though ${bhe} says, \"Well, I have to say, you are passionate about the subject.\" \n        *set passion %+10\n        *set chris_rapport %+5\n        *set sam_rapport %+5\n        *goto discussion_hub\n\n      #\"Pope Francis.\"\n        All three assassins look at you thoughtfully.  \"It isn't just his penchant for helping the poor and the homeless,\" you say.  \"It's his stance on tolerance that truly makes me admire him.  I try to live by what he says, 'who am I to judge?'.\" \n\n        ${chris} looks at you with a broad grin.  Both ${ben} and ${sam} seem to respect your response, though neither seems as adamant as you are.\n        *set chris_rapport %+10\n        *set loved %+5\n        *set righteousness %+5\n        *goto discussion_hub\n\n      #\"I can't name one among many, but I would have to say one of the feudal samurai, either that or William Wallace or Joan of Arc.\" \n        You explain to the group just why you have such admiration for these iconic figures.  \"Not many people live by a code of honor anymore.  Sure, we all give it lip service, but, at the end of the day, there are few people who are willing to lay their lives down for an idea, for what they believe in.  The samurai, well, they epitomized the ideal.  They died for honor.  That's the ultimate in dedication.  William Wallace and Joan of Arc died for what they believed in, too.  In my opinion, there's nothing nobler or more admirable.\" \n\n        ${ben} and ${chris} both nod, though ${sam} seems less sure.  However, there is little doubt that all three recognize your dedication.\n        *set ben_rapport %+5\n        *set chris_rapport %+5\n        *set passion %-10\n        *goto discussion_hub\n\n      #Decline to say.\n        The trio looks underwhelmed.  Finally, ${ben} speaks up.  \"Come on, we told you ours, now you tell us yours.\"  \n\n        \"Nah,\" ${chris} cuts in. \"We only open up when we have to.  I respect the fact that ${name} isn't succumbing to peer pressure.  Just because a question is asked doesn't mean reciprocity is required.\" \n\n        ${ben} grunts and eventually concedes, \"I guess there's a reason to respect those who play life close to the vest, though I can't say I like it.\" \n\n        *set ben_rapport -5\n        *set sam_rapport %-5\n        *set chris_rapport %+5\n        *set loved %-5\n        *set respect +5\n        *goto discussion_hub\n\n*label janitor\n\nBefore you can say anything else, the janitor shuffles in with his cart of cleaning equipment and you and the three other assassins get up to leave.  You bid the three of them goodbye and head out of the Syndicate headquarters.\n\n*page_break\nYou reach your place and immediately head for the couch.  Seated, you take a few deep breaths, trying to relax a little.  It's only after you've sunk into the cushions that you truly feel an intense weariness wash over you.  It's been a long time since you've had a chance to relax.  \n\nTaking a moment, you soak in your surroundings.  Your place is functional but humble—you prefer to save your money in order to reach the next level of success.  Still, you've decorated it a little to match your personal style.  You see:\n*fake_choice\n  #A minimalist living space, no clutter, no fuss.\n    *set passion %-5\n    You glance around at the cleanliness of the place and know it's a reflection of the order you keep in your own mind.  Just looking at it gives you a sense of peace.\n  #An ultra-modern living space with clean lines, stark contrast, and sleekness everywhere you turn.\n    *set passion %-5\n    A huge fan of next-generation styling, you can't help but think that what you've done with the place makes it look like something from the future.  There is nothing but cutting-edge design and you love every inch of it.\n  #A homey, cozy living space with sentimental knick-knacks and keepsakes everywhere.\n    *set passion %+5\n    *set loved %+5\n    With each turn of the head, you see a different kind of ornamentation.  One wall is covered in photos of you and your travels, another with artwork you've collected from afar.  There are bookshelves filled with souvenirs and books you've read.  Your place is a monument to the life you've lived, and each individual piece you've collected takes you to a certain place or time in your mind.\n  #A modern home with some souvenirs from your travels.\n    *set loved %+5\n    You're a fan of next-generation styling, but you also love seeing reminders of your travels everywhere you turn.  There is cutting-edge design, and you love every inch of it, but you're reminded of pleasant memories when your gaze passes over the things you've collected.\n  #A rustic living space.\n    *set loved %-5\n    Looking more cabin than anything else, your place makes you feel like you're in the great outdoors.  There are hunting trophies and mounted fish.  You even have a large, cowskin throw rug and a table with elk antlers for legs.\n  #Antique styling with a Victorian flair.\n    *set passion %+5\n    A fan of history and of times long since past, you've decorated your house to look like the interior of a manor or castle in England or the Celtic highlands.  Every picture you have is framed ornately, and you've devoted a significant part of the wall space to antique oil paintings.  The colors are dark but, to you, they feel homey.  A braided tapestry hangs from one wall, a plush, velvet fainting sofa sits in front of another.\n  #A retro, rockabilly abode.\n    *set passion %+10\n    Your collection of 1950s memorabilia is second to none.  You have pictures of the old rebels adorning each wall, a collection of leather jackets hanging from a cast-iron rack, and even a working jukebox in the corner.  Taking a look around, you find yourself longing for the good old days of rock and roll.\n  #Something that cannot even be described because of its eclectic nature.\n    *set loved %-5\n    Your living space is not one style, but several mixed together.  There are influences from across the globe all contained within your walls.  Despite the mishmash, it feels like home to you.\n*comment endif\n\nYou linger a moment longer before forcing yourself to get up and dress for dinner.  You don some nice clothes for your dinner with Boris and then head out.  The last thing you want to do is keep him waiting.\n*goto dinner\n\n*label dinner\n*page_break\nBoris is sitting at a corner table of the tastefully designed steakhouse.  A starched, white tablecloth and a gently glowing candle add to the ambiance. The boss is sitting with a bottle of fancy French Bordeaux in front of him.  It has been opened and decanted, and you see that Boris already has already enjoyed a few indulgent sips.\n\n\"Am I late?\" you ask, and Boris laughs.\n\n\"You're right on time.  I'm just early.\"  He flashes you a smile.  His teeth still have the behind-the-Iron-Curtain kind of hygiene—gold fillings and a slightly yellow tinge.  \"I like to arrive early so I can get a head start.\"  He lets out a bellowing laugh.\n\nYou smile back at Boris.  For as long as you've known him, you've never understood his humor fully, and this is one of those moments.  Still, you've always liked how Boris was strictly business when the time called for it, but when he was off, the clock he really cut loose.  \"Don't worry, my friend,\" Boris says, \"you haven't missed a thing.\"\n\nHe pours you a very large glass.  Sitting down, you:\n*fake_choice\n  #Down the wine and pour myself another.\n    Boris looks at you with appreciation.  He takes the time to pour himself another drink, as well.\n    *set passion %+10\n    *set boris +5\n  #Sip my wine politely and slowly, wanting to stay sharp.\n    Boris watches you sip your drink, then grabs the bottle and tops off his own glass, downing it quickly.\n    *set passion %-10\n    *set boris +5\n  #Take one sip and then try to get down to business.\n    Boris watches you sip your drink, then grabs the bottle and tops off his own glass, downing it quickly.\n    *set passion %-5\n  #Refuse the drink.\n    \"Impolite, my friend,\" Boris says, \"when a Russian pours you a drink, you drink.\"  He shakes his head.  Reaching over, he grabs your glass and downs it.\n    *set boris -5\n  #Tell him I'm not drinking right now.\n    \"I understand and respect that,\" he says.  After a second, Boris reaches over and grabs your drink.  \"Don't want it to go to waste, though,\" he says with a small grin.\n    *set boris +5\n    *set passion %-5\n  #Tell him I'm on the wagon.\n    \"I understand and respect that,\" he says.  After a second, Boris reaches over and grabs your drink.  \"Don't want it to go to waste, though, or torment you with the smell,\" he says with a small grin, taking a large sip out of your glass.\n    *set boris +5\n    *set passion %-10\n*comment endif\n\nYou and Boris spend the next hour catching up and reminiscing.  The appetizers are fantastic, as are the entrées.  Boris finishes the remainder of the bottle of Bordeaux, then orders another.  He is becoming visibly intoxicated, and he reaches out to you with one hand, placing it atop yours.  \"Listen, ${name}, I've always thought of you as my own ${son},\" he pauses for a moment.  \"I'm worried about what's going on and I just…\"  He swallows hard, and it takes him a moment to regain his composure.  \"I know everything will be okay, but right now is a very difficult time, and I need you to be on your guard.\"\n\nYou tell him that you always are, a part of you taken aback by the sudden show of emotion.  Boris wasn't the type to share his feelings no matter how close your relationship was.  You realize for him to be so open, something serious must be going on.  \"Don't worry about me, Boris,\" you say, \"you taught me well, I can take care of myself.\"\n\nBoris nods dismissively, almost as if he hasn't heard you.  \"That's good,\" is all he says in acknowledgment.  He pauses a moment before asking, \"What is it about this business that drives you, that brings you back each time?\"\n\nYou consider the question for a second and then answer:\n*fake_choice\n  #\"It's simple, the money.\"\n    *set righteousness %-5\n  #\"The chance to step outside of social boundaries and get justice.\"\n    *set righteousness %+10\n  #\"It's the only life I've ever known.\"\n    *set passion %-5\n  #\"I love the thrill.\"\n    *set passion %+5\n  #\"It's the kill, always the kill.\"\n    *set righteousness %-10\n    *set psychotic_level %+5\n  #\"It's getting to make a difference in this life.\"\n    *set passion %+5\n    *set righteousness %+5\n  #\"You wouldn't understand even if I told you.\"\n\nBoris seems to contemplate your answer for a moment.  After mulling it over, he shrugs.  \"To each their own,\" he says.  \"I guess we all have our reasons.\"  \n\nHe takes a deep breath. As you look at the man across from you, you feel a strange sense of fear creeping in.  For the first time you've ever seen, Boris looks shaken.  As if he can read your thoughts, Boris says, \"I know what you're thinking, but it's okay.  I can admit, I'm a little out of sorts with everything going on.\"  You raise one eyebrow quizzically.  \"I am human, ${name},\" Boris chides. \"As much as I may give the impression otherwise.\"  He laughs, and from the flush of his face you can tell that he's very much intoxicated.\n\nThe laughter dies off and silence hangs between the two of you.  In that instant, you can't help but think Boris looks vulnerable.  The mere notion sends a shiver up your spine.  \"Knock it off, ${name},\" Boris says, as always seeming to be able to peer deep into your soul.  \"I'm not giving up. If anything, now is the time to fight.  I'm just telling you, there is real turmoil forming, and I want you to be careful.  I don't mean to play favorites but, well…I just don't want to see you hurt.\"\n\nYou almost don't know what to say.  Finally, you utter:\n*fake_choice\n  #\"That means a lot to me.\"\n    *set passion %+5\n  #\"I don't want to see you hurt, either.\"\n    *set passion %+5\n  #\"I'm not the kind who gets hurt.  I hurt others.\"\n    *set righteousness %-5\n  #\"You don't need to worry about me. I can take care of myself.\"\n    *set passion %-5\n  #\"Our whole crew is important.  I'm no better than anyone else.\"\n    *set righteousness %+5\n    \nBoris exhales deeply.  \"You're still young, and there's a whole lot more for you to learn.\"  His air is introspective, his words seeming more for his own sake than for yours.  After a wistful moment, he pulls himself together and manages a little smile. \"Listen to me! I've become a babbling old man.  Don't pay attention to what I'm saying.  You're a strong fighter, ${name}.  After all, that's why I named you ${the_nickname}.\"  Boris stares at you deeply.  \"Maybe I've had too much to drink.  I just thought…I thought it was time for us to sit down and talk.  It's been too long since we've done that.\"\n\nYou thank Boris and tell him how much you appreciate him taking you to dinner.  Boris squeezes your hand tightly.  \"Keep your eyes about you, ${nickname}.  I don't know what's going on, but my gut tells me it's bad.\"\n\nGlancing around the restaurant, you see danger in every corner.  Still, you keep a brave face.  \"Thanks for taking the time to warn me individually,\" you say, \"It means a lot.\"  Boris gives you a stoic smile and nods.  You shake his hand and take your leave.\n\n*label drinks_choice\n\nStepping out of the restaurant and walking toward the bar to meet your crew, you feel the stiffness in your muscles.  It's been a long, long day.  Thinking about your plans for the night, you decide to:\n*choice\n  #Head to the bar.\n    You know you can't blow off your teammates.  Tapping your inner reserves, you head to the bar.\n    *set passion %-10\n    *set tired false\n    *goto drinks\n  #Blow off my teammates and head home for rest.\n    *achieve lonewolf\n    *set passion %+5\n    You know your teammates are waiting on you, but you also know that your sleep is essential to being sharp and—in this business—staying alive.  \n\n    Still, you know you have to decide on who you're going to take with you to Paris.  There is Chuck, the muscle man, Dante with his sharpshooting prowess, or Marie with her quick thinking and excellent driving skills. \n\n    In the end you choose:\n    *choice\n      #Chuck.\n        *set paris_partner \"Chuck\"\n        *set strength +10\n        *goto no_bar_choice\n      #Dante.\n        *set paris_partner \"Dante\"\n        *set ranged_weapons +10\n        *goto no_bar_choice\n      #Marie.\n        *set paris_partner \"Marie\"\n        *set improvisation +5\n        *set intelligence +5\n        *goto no_bar_choice\n  #Head out to the bar, but plan to cut the night short.\n    You know you can't blow off your teammates.  Tapping your inner reserves, you head to the bar, planning on making it a short night.\n    *set tired true\n    *set passion %-5\n    *goto drinks\n\n*label no_bar_choice\nYou send a quick text to Chuck, Dante, and Marie, letting them know who you've chosen as a partner, and that you won't be joining them for drinks.  You also send a text to Boris, informing him  of your choice.  That done, you head home.\n*goto home_end\n\n*label drinks\n*achieve social\nThe bar is dingy and dark, but there's a certain low-key ambiance about the place that makes it a favorite of many of the Syndicate crew.  It's a place where you can nurse a three-dollar beer in peace and not have to worry about a waiter hassling you to buy another round.  Two pool tables with fraying felt sit in the corner, one unused, the other circled by a trio of bikers who are enjoying their night.  It may be seedy, but you know your crew is the roughest and toughest in the joint and you have nothing to worry about.\n\nDante nods to you and waves you over as you enter.  As you approach your teammates, you notice there are already three or four empty glasses in front of each of your friends.\n\n\"Feels like I'm late to the party,\" you say with a smile.\n\n\"Nah,\" Marie says, smiling, \"things are just getting warmed up.\"\n*page_break\nYou take a seat, and Dante rises to get you a beer.  \"So,\" you say, \"I guess Chuck had his say over which bar to pick.\"\n\nMarie laughs, and Chuck just grins.  \"You could say that,\" Marie answers. \"If it had been Dante's or my choice, then we'd be at one of the hotter spots on the Sunset Strip, not in this armpit.\"\n\nChuck shrugs, \"What can I say, I'm a simple man at heart.  I don't need glitz and glam.\"\n\nMarie chuckles, \"Or stall doors, apparently.\"\n\nChuck laughs it off.  \"I'm a biker by hobby, my dear; privacy is a luxury, not a necessity.\"\n\nThey both laugh, and you can tell they have the heady joy of intoxication about them.  After a moment, Dante returns with a drink for you.\n\n*if (tired = true)\n  When he arrives, you tell him that you're exhausted and you're going to have to make it an early night.\n\n  It's Marie, however, who chimes in, \"Come on, ${name}, don't be such a baby, it's celebration time.\"\n  *goto drinks2\n*else\n  You take the beer and sip it.  Even with the good humor around you, you can't quite get into the spirit. Part of your attention is focused on all of the strangeness going on, people trailing your teammates, outsiders lurking in the shadows.  \"I'm sorry,\" you say, \"I guess I'm not really in a cheery kind of mood.\"\n\n  \"Relax,\" Marie says, \"we're celebrating.\"\n  *goto drinks2\n\n*label drinks2\n\n\"I don't like to sound like a killjoy,\" you say, \"but there's really very little reason to celebrate.\"\n\n\"Yeah right,\" Chuck says, slugging back the remnants of his glass, \"You kicked some major ass down in Colombia.  Personally, I didn't do too bad with my job in Belize.  That's all reason to celebrate.  Did you know they accept the dollar down in Belize?\"\n\nYou nod, \"Yes, I did,\" you say.  \"And I'm sorry to be a wet blanket, but don't you think what's going on is serious?\"\n\nChuck pipes up, flexing his biceps.  \"I do, and that's why I think these puppies are going to come in handy.\"  He laughs along with Marie and Dante.  \n\nYou say:\n*temp joke false\n*fake_choice\n  #\"Chuck, if that's all we've got, we're in serious trouble.\"\n    *set joke true\n    *set loved %+10\n    Your face is deadpan as you deliver the line and there's a moment of silence before the table roars. \n\n    It take a moment for the mirth to subside and for Marie to return everyone to the subject at hand.\n  #\"I know we're all tough, but I think we need to be careful.  I don't want to see anyone get hurt.\"\n    *set loved %+5\n  #\"I can't wait to get my hands on whoever is stalking us.  I'm going to make them pay, and I'll enjoy every second of it.\"\n    *set righteousness %-10\n  #\"I think they will too, but we're all going to need to be on our guard.  We don't want to make any mistakes and falsely accuse anyone.\"\n    *set righteousness %+5\n  #\"We're the best of the best and we need to show it.\"\n    *set loved %-5\n  #\"We need to make whoever is behind this pay for thinking they can mess with us.\"\n    *set righteousness %-5\n*if joke = false\n  \"Exactly,\" Marie replies.  \n\"I got into this racket to make a difference, and now some creeps are trying to take us out?\"  She shakes her head.  \"We'll just see about that.\"\n\nDante speaks up, \"Hey, ${name}, I know we've got a lot on our plates with the whole stalking deal, but have you given any thought to your Paris mission?  Because I'm the first to tell you, I'd love the chance to sack a corrupt politician.  I've heard a lot of stuff about this guy.  I hear he takes special pleasure in putting families on the street so that the rich can redevelop.\"\n\nMarie chimes in, \"I think people in power who take advantage of those who are powerless are the lowest scum on this earth.  I'd love to squash him beneath my boot.\"\n\nYou contemplate this for a moment,\n*if loved > 60\n  then notice Chuck has fallen silent.  \"What is it, big man?\" you ask.\n\n  For the first time since you've known him, your friend remains silent.  After a big sigh, he downs the rest of his glass.  \"It's not easy for me to talk about.\"  He gives himself a moment to arrange his thoughts.  \"As you know, my sister has special needs, and some of my hate comes from people who've tried to take advantage of her situation to get money from the state.  I hate corruption.\"  His breath comes hard, and all eyes are resting on the large assassin.\n  *page_break\n\n  Chuck reaches over and grabs your half-finished drink, seeming to need to quell his anger.  \"There was a man in my mother's life who professed his love to her day and night.  My mom is a strong woman who cared for two kids as a single mom after our dad ran out on us.  But even so, she fell for his charm and married him.  Well, it turned out he was a con man.\"  Chuck breaks off.  \"He had no interest in her.\"  There is another awkward pause.  \n\n  \"I never told anyone,\" Chuck says.  \"He was just doing it for the social security benefits because of my sister's disability.  He wanted a free ride from the government.  When my mom caught wise, she threw him out, but she was heartbroken.  Years later, when I was bigger, I tracked the guy down.  He'd had a stroke by that time.  I figured maybe God had punished him for what he did.  I saw terror in his eyes when he saw me, but to tell you the truth, I don't even know if he remembered what he had done,\" Chuck says.  \"He didn't even recognize me.\"  \n\n  Chuck goes silent for a moment.  \"When I was ten, I was powerless to stop people from taking advantage of others.  And I can tell you, if there's any way I can protect people who are powerless now, I would give my own life to do it.  I'm not trying to put pressure on you, ${name}, but I'd be honored if you'd pick me to be your partner.\"  It takes Chuck a moment to compose himself.\n*if loved \u003c= 55\n  then turn to Chuck. \"What about you?\"\n\n  \"You know me. When all you have is a hammer, everything begins to look like a nail.\"\n\n  You struggle for a moment to ascertain who exactly is the hammer in Chuck's metaphor, but after turning his words inside out several times in your head, you shrug and dismiss the conundrum.\n*comment endif\n\nYou weigh each offer of assistance. In the end, you decide to choose:\n*fake_choice\n  #Chuck.\n    *set paris_partner \"Chuck\"\n    *set strength +10\n    \"Thanks, pal,\" Chuck replies.  \"It means a lot to me and you won't be sorry.  Now let's go crack some heads.\"  Dante and Marie both look a little disappointed but seem to recognize that you're in good hands.\n  #Dante.\n    *set paris_partner \"Dante\"\n    *set ranged_weapons +10\n    \"Excellent choice, my friend,\" Dante replies.  \"This is going to be fun.\"  Chuck and Marie both look a little disappointed but seem to recognize that you're in good hands.\n  #Marie.\n    *set paris_partner \"Marie\"\n    *set improvisation +5\n    *set intelligence +5\n    \"I'm looking forward to it,\" Marie replies.  \"I already have some ideas we can run over.\"  Dante and Chuck both look a little disappointed but seem to recognize that you're in good hands.\n*comment endif \n\nYou stay for one more round, shooting the breeze and making small talk before finally calling it a night.\n\n*label home_end\nYou arrive home exhausted, at the end of your figurative rope, and you head straight for bed.  As you lie down, despite how tired you are, you're still thinking over the conversations you had earlier with ${ben_nick}, ${sam_nick}, and ${chris_nick}.  You think of the dangers of the Paris mission, and the importance of seizing the moment, something you picked up from Boris when first joining the assassin racket.  Thinking back on the conversation from that afternoon, you wonder if some kind of connection might have been formed.  You'd found yourself thinking of it in spare moments throughout the day and a part of you can't help but feel as if there was an interest there.\n\nRealizing this, you:\n*choice\n  #Pick up the phone and call ${ben}.\n    *set ben_rapport %+5\n    The phone rings several times before ${ben_nick} picks up.  \"Hello, ${name},\" ${bhe} says and you can hear a smile in ${bhis} tone.  \n\n    \"Hey, ${ben_nick}, how's your night going?\"\n\n    \"Good so far.  I've been doing a little bonsai pruning,\" ${bhe} says.  \"I keep a little garden at my place.  It helps me keep my sanity when everything goes crazy.\"\n\n    You laugh, \"Maybe I need to look into that idea, particularly with everything going on.\"\n\n    \"Yeah,\" ${bhe} says, \"if it gets any wilder, I'm going to have a whole forest at my place.\"\n\n    \"Well, at least it helps calm your nerves.\"\n\n    \"It does. Speaking of which, your nerves keeping you up?  Don't you have a mission tomorrow?  It's kinda late,\" ${bhe} says.\n\n    \"I do, and that's part of the reason I'm calling,\" you say.  \n    *label call_end\n    \"I'm a big believer in [i]carpe diem[/i], and I had a great time talking with you earlier.  I know I'm heading out on a mission, but I was thinking, when I get back, I'd like to get to know you a little better,\" you say, leaving your invitation in the air.\n \n    \"I'd like that,\" ${bhe} says.  \"Just give me a ring and we'll set something up.\"\n\n    \"Sounds good,\" you reply and bid ${bhim} goodnight.\n\n    Hanging up the phone, you feel ready to rest.\n    *goto bed\n  #Pick up the phone and call ${sam}.\n    *set sam_rapport %+5\n    The phone rings twice before ${sam} picks up.  \"Hey, ${name},\" ${she} says.  \"Didn't expect you to be calling at this hour.\"\n\n    \"Sorry it's late, I know…\" you start, but ${sam_nick} chimes in.\n\n    \"Don't worry about it,\" ${she} says.  \"I'm actually watching a comedy right now.  It's one of those immature, irreverent, but hopelessly funny, kind of films.  The humor is very juvenile, trust me.\" \n\n    You joke, \"So laughing alone is your thing then, huh?\"\n\n    \"Who says I'm alone?\" ${sam} counters, and you feel ice wash over your good mood.  Seeming to pick up on your silence, ${she} bursts out laughing.  \"Gotcha!  Silly, do you think I'd be flirting with you if I was involved with someone?\"  You know any response you could come up with would be awkward, so you join in the laughter.  \"I'm sure you didn't just call to check up on me, so what's up?\" ${sam} asks when the chuckles die down.\n\n    \"I have a mission tomorrow, and that's part of the reason I'm calling,\" you say.\n    *goto call_end\n  #Pick up the phone and call ${chris}. \n    *set chris_rapport %+5\n    ${chris} picks up on the first ring.  \"Hello, ${name},\" ${che} says and you can hear surprise in ${chis} tone, though it's warm just the same.  \n\n    \"Hey, ${chris_nick}, how's your night going?\"\n\n    \"Nice,\" ${che} says.  \"Quiet.  I was just doing a little reading.\"\n\n    \"Which book?\" you ask.\n\n    \"A couple of them actually,\" ${che} says.  \"I'm kind of neurotic like that.  Short attention span, I guess.  I'm reading a book on art history, a mystery about an elusive serial killer in Los Angeles who only kills bad people, and then of course, I have my Bible.\"\n\n    \"That's quite a wide variety,\" you say with appreciation.\n\n    \"It is, but I like to stay cultured and spiritually centered, and I also crave some action and suspense,\" ${che} responds.   \n\n    \"How do you read three books at once?\" you ask.\n\n    \"A page at a time,\" ${che} says with a laugh.  \"Seriously, though, I usually read a chapter or two and then make a switch.  But I'm sure you didn't call me to check out my reading list.  So what's up?\"\n\n    \"As you know, I have a mission tomorrow, and that's part of the reason I'm calling,\" you say.  \n    *goto call_end\n  #Call no one at the moment.\n    *goto bed\n\n*label bed\nYou sink down in bed, but sleep is a long time coming.  Thoughts of everything going on with your crew circle in your mind.  A part of you knows that the suspicious activity has to be tied to your mission in the Far East.  Finally, when fatigue pulls you to sleep, you find yourself dreaming about China…about your mission in Beijing….\n\nYou:\n*choice\n  #Fight the dream.  I need to be well rested to deal with any dangers.\n    You struggle restlessly, trying to evade your thoughts.  You awake in a cold sweat, seeing enemies on all sides.  The visions fade but, when you lay your head back down on the pillow, troubled thoughts continue to haunt you.  Finally, you're able to sink back into dreamless slumber, but it is a long time in coming.\n    *set passion %-5\n    *finish\n  #Sink into the dream to see if there's anything I can learn.\n    *set passion %-5\n    You let the dream drag you down.\n    *label technically\n    Somehow, you always knew it would come to this; any hope that you could escape China was futile.\n    *gosub_scene beijing\n    *finish\n  #Try to think of pleasant things and shape the dream to my desires.\n    At first, you try to think of pleasant things, of exotic locales and good times, but soon, things turn dark. The memories bend and twist.  Each place warps, melting away.  In the end, you find yourself in a place you cannot escape.  You realize you've been dragged back to China.\n    *set passion %+5\n    *gosub_scene beijing\n    *finish\n  #Lie and wait to see if the dream passes or if it drags me down.\n    You lie restless, waiting to see where your mind takes you.  You do not fight the dream when it comes.\n    *goto technically\n", "la2": "*set wounded_here false\nThe plane arrives late and you bid ${paris_partner} goodbye as your towncar picks you up from the airport.  \n\nWhen sleep finally overtook you during the flight, it was restless.  As a result, you can barely keep your eyes open as the driver takes you to your residence.  \n\nYou turn the key to your place and head straight to bed.  There's a message on the machine and, almost in a daze, you suffer through the recording.  It's Boris telling you there's a team meeting in the morning.  9AM sharp.  You glance down and find a text message to the same effect on your phone.  In the far reaches of your memory, you note the meeting before flopping down on the mattress.  This time, sleep is fast in coming, and for once, it's blissfully dreamless.\n*page_break\n*if (paris_partner = \"Chuck\")\n  *set strength -10\n  *goto morning\n*elseif (paris_partner = \"Dante\")\n  *set ranged_weapons -10\n  *goto morning\n*else\n  *set improvisation -5\n  *set intelligence -5\n  *goto morning\n\n*label morning\nYou awake as light filters through the blinds, dust motes flicking lazily through the beams of sunshine.  Grunting, you turn over and look at the alarm clock. 10AM.  \n\nHaving overslept, you curse aloud and shake yourself awake.  On your phone, you see fourteen missed calls, all from the office.  That's not a good sign. You hoist yourself into a seated position so you can sound at least halfway awake when you call in.  \n\nThe number of calls disturbs you.  If it was simply a matter of you being late, or missing the meeting, it would be one call or maybe two.  This was something more.  In the pit of your stomach, you feel that it has to do with the people stalking your crew.\n\nYou press the button to return the call.\n*page_break \n\n\"Where the hell have you been?\" Boris barks when he finally picks up the line.\n\nTrying to keep the grogginess out of your voice, you say, \"Sorry, the alarm didn't go off and I'm still jet-lagged.\"\n\nBoris seems to understand because he says, \"I know you just got back and I've been running you ragged lately, but as I tried to make clear at the meeting last time you were in town, this is a very trying time.\" You grunt and apologize, thinking that's probably the best approach.  \"Well, I appreciate your contrition, but I'm telling you, I don't think you realize the gravity of the circumstances,\" Boris says.  \"Turn on FaceTime, I like to see who I'm talking to.\"  Cursing to yourself, wishing you were better prepared, you realize you have little choice.  \n\n\"Okay, boss,\" you say, staring into Boris's penetrating eyes.  \"Where's the fire?\"  \n\nYou're about to prod him more when he cuts you off, \"Chuck is missing.  He didn't come in this morning.\"\n\n\"What?\" you ask, fear and confusion in your voice.  \n\n\"Yeah,\" Boris says gravely, \"and we fear the worst.  I had an earlier meeting scheduled for him, before the rest of the group, to go over some issues on a new job I had for him, and he didn't show for that.  I wasn't particularly concerned since it was early, but then he didn't show for the regular meeting, either.\"\n*page_break\n\n*if (paris_partner = \"Chuck\")\n  \"How's that possible? I was just with him last night when we got back from Paris!\" you say.\n  *goto missing\n*else\n  \"What do you think's going on?\" you ask.\n  *goto missing\n\n*label missing\n\n\"Whoever's stalking us is taking it a step further.  They're striking,\" Boris says, and an icy knot grips your stomach.\n\n\"How do you know he just didn't oversleep like me?\" you ask, but you can see the stressed grinding of Boris's teeth on the screen of your phone.\n\n\"We know he didn't oversleep because I sent someone over to his place and the door was unlocked.\"  You nod to yourself, piecing it together before Boris even has to tell you.  \"As you know, that would never have happened if there weren't foul play involved.\"\n\n\"Dammit,\" you curse.\n\n\"There's nothing conclusive yet, so don't give up hope, but it doesn't look good.\" You cradle your head in your hands, hoping that Chuck had just decided to take an impromptu roadtrip on his hawg.  It wasn't out of character for the roguish Chuck, but something about it didn't seem right. \"Look,\" Boris continues, \"there's no use worrying about it; I'm just telling you so you'll be careful.\"\n\n\"Thanks, boss,\" you say, unable to find any other words.\n\n\"I had a team heading over to your place to check on you, but I'm going to call them off now that I know you're okay.  Forget about the meeting, I was just warning everyone about the suspicious activity we've been encountering, but it seems that I was too late.\"  Boris's voice is thick and grave revealing the sadness you know he must feel. \"Listen,\" Boris says after a moment, \"I was debating sending you out again so soon, but with Chuck gone, we have a hit in the South Seas that needs to be taken care of.  Chuck was supposed to do it.\"  \n\nYou curse to yourself again, knowing that, while Chuck was a loose cannon sometimes, he would have never missed a hit.  \n\nYou tell Boris:\n*choice\n  #\"I know something bad's happened to him and I think we should be preparing for the worst.\"\n    \"I understand your concern, ${name}, but this job has to be done.  I owe the woman calling in the hit a big favor, and this might be the only opportunity we'll have to get this guy.  And in case you forgot, I'm still your boss.\"\n\n    Shaking your head, you say finally, \"Alright, but I don't like it.  What's the mission?\"\n    *set passion %+5\n    *goto mission\n\n  #\"I know something bad's happened to him and I'm going after him.\"\n    \"I understand your concern, ${name}, but we don't have the first clue where he might be.  Besides, this job has to be done and I'm counting on you.  I owe the woman calling in the hit a big favor, and this might be the only opportunity we have to get this guy.  And in case you forgot, I'm still your boss.\"\n\n    Shaking your head, you say finally, \"Alright, but I don't like it.  What's the mission?\"\n    *set passion %+10\n    *goto mission\n\n  #\"I'm hoping for the best with Chuck, but if whoever's been after us is making a move, we need to stay and fight.\"\n    \"I understand your concern, ${name}, and we're taking precautions, but this is a job that has to be done.  I owe the woman calling in the hit a big favor, and this might be the only opportunity we have to get this guy.  And in case you forgot, I'm still your boss.\"\n\n    Shaking your head, you say finally, \"Alright, but I don't like it.  What's the mission?\"\n    *set passion %-5\n    *goto mission\n\n  #\"Whatever you think, boss.  I follow your directions.\"\n    \"That's right, and I'm glad you recognize that.  This job has to be done, and I'm counting on you.  I owe the woman calling in the hit a big favor, and this might be the only opportunity we have to get this guy.  So here's the deal.\n    *set passion %-10\n    *goto mission\n\n*label mission\n\n\"There's a very powerful drug kingpin taking his vacation in Tahiti—Bora Bora to be specific.  He needs to be taken care of.  He killed the son of the woman I owe the favor to.  Not directly, mind you, but being a supplier in the pipeline, he might as well have injected the hot dose of heroin himself.  I want to tell you, ${name}, I appreciate you stepping up to the plate.\"  For the next ten minutes, Boris fills you in on the details of the hit, including the flight you're now scheduled on for the following day.\n\nWhen he's done, you decide to speak up, \"Boss, I know how important this is to you, but do you really think this is a good idea?  I mean, with Chuck gone, and all the suspicious activity and all, having one less member of our team around means we're that much more vulnerable.\"\"\n\n\"Your concern is duly noted,\" Boris retorts. After a moment of silence on your end, he continues, \"Look at it this way: if you and a few of the other members of our team are out of the country on jobs, they can't get us all at once.\"\n\nYou grudgingly agree, and Boris quickly changes gears.  \"Okay, now that we're on the same page, I want to talk to you about the Paris job.\"\n*page_break\n*if (paris_mission = \"success\")\n  \"Okay.\"\n  \n  \"I'm very impressed,\" Boris continues.  \"Not only because you completed the job, but because of the way you handled it.  Very nice.  I'm not going to sugarcoat it—that was a tough assignment and you came through with flying colors.\"\n  \n  You blush on your end of the line.  Compliments from Boris are rare and full of meaning, so you take the opportunity to savor it.  \"I appreciate the kind words,\" you respond.\n  \n  \"The money has already been wired to your account.  $25,000.  Again, job well done.\"\n  \n  You thank him and hang up.\n  *set boris +5\n  *set money +25000\n  *goto LA_morning\n*else\n  \"Okay,\" you say, hesitantly wondering what your boss is going to say.\n  \n  \"I must say, ${name}, I am disappointed.  I know it was a tough mission, though, so it's not the end of the world.\" \n\n  You're thankful that Boris's tone isn't too reproachful, and you know you'll have opportunities in the future to make it up to him.  \n\n  \"We already have another assassin on the job,\" Boris continues. \"Her task will be a little more difficult because the ambassador is on guard, but it's okay, these things happen.  Plus, you have a new mission through which to redeem yourself.\"\n  \n  You thank Boris for his understanding and hang up.\n  *goto LA_morning\n\n*label LA_morning\nYour conversation over, you get up and walk to the kitchen.\n*page_break  \n\nWanting a pick-me-up, you brew a double espresso and a pot of tea.  Five minutes later, feeling no less tired, you jump into the shower in a last-ditch effort to perk up.\n\nThe splash of cool water on your skin does a better job of waking you and washing away the jet-lag than the two shots of espresso and cup of hot tea.  As you turn off the taps and reach for a towel, you finally feel like yourself again.\n\nDressing, you realize that you have less than 24 hours before heading out again.  There are several things you want to do before then.\n\nAfter the very positive encounter with your teammates after the last meeting, you realize that you could definitely pursue things further with one of them if you wanted.  Actually, now that you think about it, you don't need to limit your flirtations to only one person.  Still, you have far more pressing matters to attend to before you'd even consider asking anyone for a date.  With your minimal spare time, you decide you're going to:\n\n*gosub_scene util downtime\n*page_break\n\nFeeling better now that you've had some time to yourself, you decide that you better make a phone call to a potential date if you want to go out.  You also realize that you could just turn in early and get some good rest for the next mission.\n\nYou think back on your past interactions and your skill sets, wondering which assassins might be a good match for you.  \n\nIn the end, you decide to:\n*hide_reuse\n*label date_choice\n*choice \n  #Call ${ben}. $!{bhis} confident personality and cool vibe are intriguing.\n    *if (strength > 15) or (ranged_weapons > 15)\n      *set ben_rapport %+5\n    *set first_date 1\n    *set first_date_name ben\n    *set first_date_nick ben_nick\n    *label call_for_date\n    Hearing the voice on the other end of the line, you feel the scintillating tingle of butterflies in your stomach.  After a few seconds of idle chatter, you get to the point, asking ${first_date_nick} out on a date.  \n\n    $!{bhe} seems flattered and tells you ${bhe}'d love to go out on a date.  You discuss the details and set a pickup time.  \n\n    You notice a little spring in your step after hanging up the phone.  Glancing at the time, you think that the evening can't come soon enough.\n    \n    *goto dinner\n  #Call ${chris}.  $!{chis} spirituality and devotion to ${chis} faith make me want to spend more time with ${chim}.\n    *if (righteousness > 50)\n      *set chris_rapport %+5\n    *set first_date 2\n    *set first_date_name chris\n    *set first_date_nick chris_nick\n    *goto call_for_date\n  *if (preference = \"female\") #Call Marie, her toughness and drive intrigue me.\n    You dial the number and wait a while before she finally picks up.  You explain that you'd like to take her out, that you feel something more for her than just mere friendship.\n\n    \"${name},\" she says, \"you're very sweet and, to tell you the truth, I'm incredibly flattered.  I never knew you had those kinds of feelings for me.\"\n\n    You smile, saying, \"Yeah, I've had them for a while.\"\n\n    \"Well,\" Marie responds, \"I wish you would have acted on them earlier because I'm actually seeing someone.\"\n\n    \"What?\" you respond, startled.\n\n    \"Yeah,\" she says, \"it's been hush-hush since it's another member of our crew, but I can tell you I'm really starting to care about her.\"\n\n    You tell Marie that you understand, and explain that, like everything, it's all about timing.  Marie seems genuinely grateful for your interest, and you hang up the phone knowing that your relationship will be that much stronger, even if it isn't a romantic one.\n    *goto date_choice\n  \n  #Call ${sam}. $!{shis} penchant for technology and learning makes me want to get to know ${shim} better.\n    *if (improvisation > 15) or (intelligence > 15)\n      *set sam_rapport %+5\n    *set first_date 3\n    *set first_date_name sam\n    *set first_date_nick sam_nick\n    *goto call_for_date\n  *if (preference = \"male\") #Call Boris, his aura of unflagging certainty and leadership enthralls me.\n    You pick up the phone and are about to dial when realization washes over you.  No matter what you feel for Boris, you know this phone call will put you in a precarious situation.  Boris has been like a father to you for ages and, despite his good looks and charm, you know if you try to make a move and get rejected it's going to put a solid wedge in your relationship.  \n\n    You also realize that, with the trouble going on, his love life is likely to be last thing on Boris's mind.  The Syndicate is closer to him than his own family.  Putting down the phone, you realize that a call at this time would be a mistake.\n    *goto date_choice\n\n  *if (preference = \"male\")  #Call Dante, his charisma and style are appealing to me.\n    You dial the number and wait for him to pick up.  You explain that you'd like to take him out, that you feel something more for him than just mere friendship.\n\n    \"${name},\" he say, \"you're very nice, and to tell you the truth, I'm incredibly flattered.  I never knew you had those kinds of feelings for me.\"\n\n    You smile, saying, \"Yeah, I've had them for a while.\"\n\n    \"Well,\" Dante responds, \"I wish you would have acted on them earlier because I'm actually seeing someone.\"\n\n    \"What?\" you respond, startled.\n\n    \"Yeah,\" he says, \"it's been hush-hush since it's another member of our crew, but I can tell you I'm really starting to care about him.\"\n\n    You tell Dante that you understand, and explain that, like everything, it's all about timing.  Dante seems genuinely grateful for your interest, and you hang up the phone knowing that your relationship will be that much stronger, even if it isn't a romantic one.\n    *goto date_choice\n  #Now is not the time for a date; I hone my skills further.\n    Resolving that you'd better take the opportunity to hone a skill while you have the chance, you decide to work on:\n    *fake_choice\n      #My strength.\n        You spend a few more hours working on building your strength, doing physical exercises and working on your hand-to-hand skills.\n        *set strength +5\n      #My ranged weapons skills.\n        You spend a few more hours working on your ranged weapons skills, practicing your quickdraw and evasive maneuvers.\n        *set ranged_weapons +5\n      #My intelligence.\n        You spend a few more hours working on sharpening your intelligence, honing your memory skills, and reading as much as you can.\n        *set intelligence +5\n      #My improvisation skills.\n        You spend a few more hours working on your improvisation skills, focusing your sensory awareness and working on your social perception acumen.\n        *set improvisation +5\n    Once you're done, you decide that turning in early is the best option.  Making some time for a little R&R, you watch some news and then some leisure television.\n\n    Your eyelids begin to droop as you watch your favorite sitcom and you reason that it was a good choice to just stay in and unwind.\n\n    Now that you're pleasantly sleepy, you head upstairs to sink into your soaker tub. You pour in some medicinal salts and other solutions you received the last time you went to the team's underground clinic.  The doc there assured you they were top of the line healing agents.\n    *gosub_scene util heal\n      \n    You feel your aches and pains begin to disappear.  Old wounds seem to heal and close as you sink down into the calming bath.  Time seems to blur but, in the end, you think that you've spent a good hour in the healing liquid.  Stepping out and toweling yourself off, you feel refreshed, far more than you would after a normal bath.\n\n    Taking several deep breaths, you head for bed, feeling revived but undeniably tired.\n\n    The sheets and pillows seem to engulf you, but they are unable to block out the visions of your next mission filtering through your head.  You know that tomorrow you'll be on a plane, chasing another adventure.  But for now, you train your thoughts on seizing a few moments' rest.\n    *if (beijing = true)\n      With a deep exhalation, you mind slips far, far away….\n      *finish\n    *else\n      *goto dream\n\n*label dinner\n*page_break\n*if first_date = 1\n  The date had gotten off to a good start.  An avid fan of the outdoors, ${ben_nick} had suggested taking a nice walk before dinner.  While it was nothing too strenuous, the fresh air was invigorating, and you had gotten to know ${bhim} a little better after your languid stroll.  $!{bhe}'d selected a nearby arboretum, and you'd had the chance to take in the sunset together.\n\n  Now, the two of you are sitting down to dinner, looking forward to more intimate and revealing conversation.\n  *goto dinner_0\n*elseif first_date = 3\n  The date had started off with an unexpected bit of fun.  ${sam_nick} had suggested you swing by a local arcade which had some of the hottest new games.  Soon enough, you were cashing in dollars for quarters and playing everything from fighting games to shooters.  You found yourself enchanted by ${sam}'s ability to be fiercely competitive and lighthearted at the same time. $!{she} was also no stranger to a little good-hearted trash talk, though ${she} made certain to be sure you were enjoying yourself with each game.\n\n  Now, the two of you are sitting down to dinner, looking forward to more intimate and revealing conversation.\n  *goto dinner_0\n*else\n  The date had started off at a jazz lounge, where the two of you spent time relaxing and taking in a live band.  It was the kind of place that had large sofas where guests could really sink in and enjoy the music.  ${chris} had explained that ${che} was a big fan of jazz, swing, and classical music, though ${che} had a soft spot for some contemporary bands, some of the selections surprising you.  What you found most interesting was that you both share a love of:\n  *fake_choice\n    #Hip-hop.\n    #Hard rock.\n    #Heavy metal.\n    #Country.\n    #Blue Grass.\n    #R&B.\n    #Punk rock.\n    #Irish Music.\n\n  It didn't seem like ${chris_nick} was the type, but ${che} assured you that ${che} was full of fun surprises.  \n\n  Now, the two of you are sitting down to dinner, looking forward to more intimate and revealing conversation.\n  *goto dinner_0\n\n*label dinner_0\nThe restaurant is elegant, a prime steakhouse with great seafood options.  While your mouth would normally be watering at the menu, it's your date who currently occupies all of your attention.  ${first_date_name} looks stunning.  \n\nWhile you've only seen ${first_date_nick} at work and on the occasional night out with the crew, this is the first time you've really had the opportunity to get really decked out and dressed to the nines together.  \n\n${first_date_nick}'s outfit is eye-catching, and you find it very hard to focus on anything else.  Your date, though, doesn't seem to mind at all, if anything seeming to enjoy the attention.  From your profession, you've learned a lot about body language and subconscious clues. Right now, your date is facing you square-on, eyes fixed on you while you talk. These are definitely good signs.\n\nYou take a seat and order a bottle of vintage red.  The conversation flows along with the wine.  \n\nPerusing the menu, you see all kinds of gourmet dishes.  To your epicurean delight, each item seems immaculately prepared.  Singling out three that seem to whet your appetite, you decide on:\n\n*fake_choice\n  #A filet mignon in a cabernet peppercorn demi-glace.\n  #A poached salmon with pink grapefruit and basil sauce.\n  #Polenta pizza, a gourmet vegan entrée.\n\nYou and your date order and then return to your conversation.  The topics range large and small, from trivial and fun to deep and serious.  \n\nYou both share things about yourselves you never thought you would.  You discuss your upbringings and how you both wound up becoming assassins.  You also reflect on the tribulations of your mutual vocation.\n\n*if first_date = 1\n  \"You know, I love the action of being an assassin.  To be honest, I don't think there's any greater rush than when I'm on a hit.  The adrenaline coursing through my veins, the danger at every turn.  Frankly, I love it.  I never feel so alive as I do when I'm on a mission.\"\n  *goto dinner_1\n*elseif first_date = 3\n  \"You know, sometimes it's tough being an assassin.  I'm not going to lie to you.  What I typically consider a good day, most people consider boring since it usually consists of lounging on the couch with my cat and watching sitcoms.\"  ${sam} laughs. \"I like what I do because it's a chance to make a difference.  Don't get me wrong, I don't enjoy killing people, but I look at it as if we're serving the greater good.\"\n  *goto dinner_1\n*else\n  \"You know, it's funny.  While we deal with death, we also preserve life.  I had a lot of trouble with the concept at first,\" ${chris} says.  \"Still, to this day, I don't like getting my hands dirty, which is why I'm always in the background.  But there's a strange sense of peace I get when I wipe some great evil from the face of the planet.\"\n  *goto dinner_1\n\n*label dinner_1\n\nYou open up about your own reasons and can't help but feel closer to ${first_date_name} when you're done.  Judging from the smile you're receiving, you get a good idea that the feeling is mutual.\n\nThere's a brief lull in the conversation, and ${first_date_name} takes a sip of wine. Exhaling deeply, your date says, \"This whole thing going on, these people following us, stalking us, it's…it's so unsettling.  And now, with Chuck missing, I just can't believe it.\"\n\n*if first_date = 1\n  *choice  \n    #\"Don't worry, we're smarter than they are.  I don't care what happens, we'll think of something.\"\n      ${ben} stares at you and flashes a grim smile.  You can tell ${bhe} isn't all that convinced.  \"I like your enthusiasm, but I really think we need action.\"  \n\n      $!{bhe} exhales deeply again and reaches out with one hand. \"It's okay, if things really go down, I'll be standing there right next to you.\"\n\n      You grip ${bhis} hand firmly and, in that moment, something passes between the two of you, something you would very much like to experience more often.\n      *set ben_rapport %+5\n      *goto conversation1\n    #\"I tell you what, the second I see one of those punks, I'm coming out, guns blazing or fists flying.  Like I always say, 'strike fast and strike hard'.\"\n      ${ben} stares at you in admiration, smiling broadly.  You can tell ${bhe}'s impressed.  \"You and I are on the exact same page,\" ${bhe} says.  ${ben} exhales deeply again and reaches out with one hand. \"If things really go down, you're the first one I want by my side.\"\n\n      You grip ${bhis} hand firmly and say, \"And I'll be there.\"  In that moment, something passes between the two of you, something you would very much like to experience more often.\n      *set ben_rapport %+10\n      *set passion %+5\n      *goto conversation1\n    #\"Until we know what they stand for, we shouldn't judge them.  The timing of Chuck's disappearance is troubling, but it could just be a coincidence.\"\n      ${ben} stares at you and shakes ${bhis} head a little.  You can tell ${bhe}'s disappointed.  \"I expected…well, honestly, I don't know what I expected, but I thought you'd be a little more proactive.  Something is going on, I'm sure of it,\" ${bhe} says, and you hear the passion in ${bhis} voice.  \"I think we need to take action.\"\n      *set ben_rapport -5\n      *set passion %-10\n      *goto conversation1\n*elseif first_date = 3\n  *choice  \n    #\"Don't worry, we're smarter than they are.  I don't care what happens, we'll think of something.\"\n      ${sam} stares at you in admiration, smiling broadly.  You can tell ${she}'s impressed.  \"You and I are on the exact same page,\" ${she} says.  ${sam} exhales deeply again and reaches out with one hand. \"If things really go down, you're the first one I want by my side.\"\n\n      You grip ${shis} hand firmly and say, \"And I'll be there.\"  In that moment, something passes between the two of you, something you would very much like to experience more often.\n      *set sam_rapport %+10\n      *goto conversation1\n    #\"I tell you what, the second I see one of those punks, I'm coming out, guns blazing or fists flying.  Like I always say, 'strike fast and strike hard'.\"\n      ${sam} stares at you and flashes a grim smile.  You can tell ${she} isn't all that convinced.  \"I like your enthusiasm, but I really think we need to outsmart them.\"  \n\n      $!{she} exhales deeply again and reaches out with one hand. \"It's okay, if things really go down, I'll be standing there right next to you.\"\n\n      You grip ${shis} hand firmly, and in that moment, something passes between the two of you, something you would very much like to experience more often.\n      *set sam_rapport %+5\n      *set passion %+5\n      *goto conversation1\n    #\"Until we know what they stand for, we shouldn't judge them.  Timing of Chuck's disappearance is troubling, but it could just be a coincidence.\"\n      ${sam} stares at you and shakes ${shis} head a little.  You can tell ${she}'s disappointed.  \"I expected…well, honestly, I don't know what I expected, but I thought you'd be a little more proactive.  Something is going on, I'm sure of it,\" ${she} says, and you hear the passion in ${shis} voice.  \"I think we need to take action.\"\n      *set sam_rapport %-5\n      *set passion %-10\n      *goto conversation1\n*else\n  *choice  \n    #\"Don't worry, we're smarter than they are.  I don't care what happens, we'll think of something.\"\n      ${chris} stares at you and flashes a grim smile.  You can tell ${che} isn't all that convinced.  \"I like your enthusiasm, but I really think we shouldn't be planning anything until we know for certain that they're hostile. It's okay to be frightened, but we shouldn't jump to any conclusions. Judge not, lest ye be judged,\" ${che} says.  \n\n      $!{che} exhales deeply again and reaches out with one hand. \"I appreciate you trying to comfort me, though. If they are hostile…and if things really do go down…I want you to know I'll be standing there right next to you.\"\n\n      You grip ${chis} hand firmly and, in that moment, something passes between the two of you, something you would very much like to experience again.\n      *set chris_rapport %+5\n      *goto conversation1\n    #\"I tell you what, the second I see one of those punks, I'm coming out, guns blazing or fists flying.  Like I always say, 'strike fast and strike hard'.\"\n      ${chris} stares at you grimly.  You can tell ${che} isn't happy with your answer.  \"I wouldn't plan anything until we know that they're hostile.  It's okay to be frightened, but we shouldn't jump to any conclusions. Judge not, lest ye be judged,\" ${che} says.  \"And I certainly wouldn't attack them finitely could be a part of this.\"\n    *set martinez %-5\n    *if first_date = 2\n      *set chris_rapport %+5\n      \"As much as it pains me to say it, I think you're right,\" ${chris} says.  \"I hate judging others without any actual proof, but it really opens my eyes that we're on the same page.\n      *goto conversation2\n    *else\n      *if first_date = 1\n        *set ben_rapport %+5\n      *if first_date = 3\n        *set sam_rapport %+5\n      \"I agree,\" ${first_date_name} says.  \"It really opens my eyes that we're on the same page.\n      *goto conversation2\n  #\"I think he's involved a hundred percent. Don't turn your back on him.\"\n    *set martinez %-10\n    *if first_date = 2\n      *set chris_rapport %+10\n      \"As much as it pains me to say it, I think you're right,\" ${chris} says.  \"I hate judging others without any actual proof, but it really opens my eyes that you're on the same page.\n      *goto conversation2\n    *else\n      *if first_date = 1\n        *set ben_rapport %+10\n      *if first_date = 3\n        *set sam_rapport %+10\n      \"I agree,\" ${first_date_name} says.  \"It really opens my eyes that we're on the same page.\n      *goto conversation2\n  #\"I think it's just a coincidence and he has nothing to do with this.\"\n    *set martinez %+5\n    \"Thanks for sharing with me,\" ${first_date_name} says.  \"It really opens my eyes.\n    *goto conversation2\n  #\"I actually think he's a great guy and he's on our side.  I trust him.\"\n    *set martinez %+10\n    \"Thanks for sharing with me,\" ${first_date_name} says.  \"It really opens my eyes.\n    *goto conversation2\n\n*label conversation2\nThis whole thing with Miller has been a gray area for me.  More accurately, it's been like a storm cloud hanging over my head. Now, at least I know what course I should take.\"\n\nYou nod and are grateful when the conversation turns back to less upsetting subjects.\n\nThe rest of dinner is wonderful and you find yourself getting more , signifying your interest.  ${sam} does likewise and your lips lock.    \n\n        The kiss is hesitant at first, but then your connection quickly becomes electric.  In short order, your tongues are exploring deeper, your bodies pressing closer.  It takes almost all of your restraint to pull back, but you don't want to be too aggressive. You can tell from the gleam in ${shis} eyes that something magical was shared between the two of you.\n        *set sam_rapport %+5\n        *goto endla2\n      *else\n        You lean forward slightly, signifying your interest.  ${sam} does likewise, but when you go for the kiss, ${she} turns ${shis} head at the last moment and you catch her on the cheek instead. $!{she} smiles bashfully and says, \"Not yet.  It's a little too fast.  I don't know what to feel yet.\"  \n\n        You nod, and the two of you hug tightly, saying good night.\n        *goto endla2\n    *else\n      *if (chris_rapport > 60)\n        You lean forward slightly, signifying your interest.  ${chris} does likewise and your lips lock.\n\n        The kiss is hesitant at first, but then your connection quickly becomes electric.  In short order, your tongues are exploring deeper, your bodies pressing closer.  It takes almost all of your restraint to pull back, but you don't want to be too aggressive. You can tell from the gleam in ${shis} eyes that something magical was shared between the two of you.\n        *set chris_rapport %+5\n        *goto endla2\n      *else\n        You lean forward slightly, signifying your interest.  ${chris} does likewise, but when you go for the kiss, ${che} turns ${chis} head at the last moment and you catch ${chim} on the cheek instead. $!{che} smiles bashfully and says, \"Not yet.  It's a little too fast.  I don't know what to feel yet.\"  \n\n        You nod, and the two of you hug tightly, saying good night.\n        *goto endla2\n\n  #No.\n    You give a broad smile and reach out to embrace ${first_date_name}.  The hug is warm and you're both a little reluctant to let go.  Your hands linger on one another for a few blissfully tense moments before finally saying good night.\n    *set passion %-5\n    *goto endla2\n\n*label endla2\nGoing to bed, visions of your date flash through your head.  You know that tomorrow, you'll be on a plane, chasing another adventure.  But for the moment, all you can think of is tonight.\n*if beijing\n  These are the thoughts that carry you into slumber.\n  *finish\n*else\n  *goto dream\n\n*label dream\n\nAs you lie in bed, you find sleep as elusive as ever.  Thoughts of the threat to your crew swirl in your mind.  Some part of you knows it has to be tied to your mission in the Far East.  When fatigue finally overtakes you, you find yourself being pulled back to China…back to Beijing….\n\n*choice\n  #I fight the dream.  I need to be well rested to deal with any dangers.\n    You struggle restlessly, trying to evade your thoughts, but the troubled visions continue to haunt you.  In the end, you find yourself in a place you cannot escape.  You realize you've been dragged back to China.\n    *set passion %-5\n    *gosub_scene beijing\n    *finish\n  #I sink into the dream, wanting to see if there's anything you can learn.\n    You do not fight the dream, letting it drag you down.  Nevertheless, you toss and turn as the turmoil of the mission assails you.  Somehow, you knew it would always come to this, that you could never escape what happened in China.\n    *set passion %-5\n    *gosub_scene beijing\n    *finish\n  #I try to think of pleasant things and shape the dream to my desires.\n    At first, you try to think of pleasant things, of exotic locales and good times, but soon, things turn dark. The memories bend and twist.  Each place warps, melting away.  In the end, you find yourself in a place you cannot escape.  You realize you've been dragged back to China.\n    *set passion %+5\n    *gosub_scene beijing\n    *finish\n  #I lie still and wait to see if the dream passes or if it drags me down.\n    You are restless, waiting to see where your mind takes you.  You do not fight the dream when it comes, letting it drag you down.  Nevertheless, you toss and turn as the turmoil of the mission assails you.  Somehow, you knew it would always come to this, that you could never escape what happened in China.\n    *gosub_scene beijing\n    *finish", "la3": "*set chapter +1\n*set wounded_here false\nThe plane ride back is boring.  You watch three movies and find it difficult to sleep, even in first class accommodations.  You know you're heading back into danger, and your mind keeps circling around Chuck's disappearance and everything that's been happening with your crew.  \n\nThe jolt of the airplane tires hitting the tarmac jerks you from your thoughts.  Stretching tired muscles, you grab your carry-on and head to customs and immigration.  \n\nYou go through the standard routine and are thoroughly exhausted by the time you're done.  You barely remember the drive back; the town car driver is gracious and lets you sit in silence.  The only thing you remember with any clarity is the text from Boris about your mission.\n*if (tahiti_mission = \"success\") and (paris_mission = \"success\")\n  The praise is nice, but more exciting is the part where he mentions $30,000 has been wired to your account for such a fine job.\n  *set money +30000\n  *goto door\n*elseif (tahiti_mission = \"success\") and (paris_mission = \"failure\")\n  The congratulations and the message that you'd redeemed yourself for the Paris debacle is nice, but more exciting is the part where he mentions $30,000 has been wired to your account for such a fine job.\n  *set money +30000\n  *goto door\n*else\n  The message isn't as bad as you expected, Boris acknowledging the difficulty of the mission and, in a very uncharacteristic gesture, telling you that he had $5,000 wired to your account for your attempt.\n  *if (paris_mission = \"failure\")\n    Still, there was also a comment on your failure in Paris, and the sting of both botched missions digs deep into your psyche, so you resolve to make sure the failures never happen again.\n  *set money +5000\n  *goto door\n\n*label door\n*page_break\nSlipping your key into the lock, you let yourself inside your apartment.  \n*if (heat > 1)\n  You immediately notice something is wrong.  You reach for your gun but realize that, since you're returning from the airport, you don't have one.  Cursing, you sink into a fighting stance.  You can't put your finger on exactly what's amiss, but the apartment seems off.  A lamp out of place, a drawer open, you notice the details and realize that someone has been here.  \n\n  Creeping forward slowly, you see a shadow out of the corner of your eye and, before you have a chance to say a word, you hear a deep, raspy voice say, \"Don't.\"\n\n  The implication is clear and you freeze.  \"Who are you?\" you ask, but the man only chuckles.\n\n  \"Are you the one who's been taking out our team members?\" you follow up, but the man steps from the shadows shaking his head.\n\n  \"I don't know anything about what's going on with your crew, but I do know you've been a bad, bad person,\" he says.  With the light now hitting his face, you can see black eyes peering out from beneath bushy, gray eyebrows.  A wrinkled and weathered face that looks like Father Time himself gazes in your direction.\n\n  \"What are you talking about?\" you ask, and notice the sleek sidearm in the man's hand.\n\n  \"The news went out on the wire.  You're a stone cold assassin, not caring who you step on, leaving a path of destruction in your wake,\" he says.\n\n  \"Who are you?\" you ask.\n\n  \"Interpol,\" he says, \"though you're just going to have to take my word on that.\"\n  *page_break\n  All at once, everything becomes clear and you laugh.  \"I get it.  You're an Interpol agent, but you're looking for a good score so you don't have to retire on a government pension, that's why you're here isn't it?  Otherwise, you wouldn't be alone.\"\n\n  He smiles and you see dazzling, white teeth.  \"Exactly. You're one smart cookie.\"\n\n  \"And my disregard for bystanders got me on Interpol's radar,\" you say.  \"But you're an entrepreneur, and you realized that you could profit by blackmailing me, right?\"\n\n  His smile grows even brighter.  \"I underestimated you,\" he says.\n\n  \"And I know what else that means,\" you continue.  \"It means you kept everything about me off of Interpol's system because it wouldn't be good business if I paid you off just to have me pinched by honest Interpol agents.\"\n\n  The man nods.  \"You're getting the picture,\" he says.  \"So if you pay my price, your record is clean.  If you don't, well, let's not go there,\" he says, gesturing with the gun.\n\n  \"Okay,\" you say, \"what do you want?\"\n\n  \"What does anyone want?\" he asks.  \"Money, and lots of it.\"\n\n  \"How much?\" you ask.\n\n  \"I have a lot of these shakedowns lined up and, while you're bloodthirsty, I know you're not a millionaire, so how's about I get out of your life for twenty grand?  Let's just call it a clean slate fee.\"  \n\n  You exhale, considering the steep price.  You decide to:\n  *choice\n    #Try to negotiate.\n      *if (improvisation > 15)\n        \"Like you said, I'm not a millionaire,\" you say.  \"And I know that, even though you have a gun on me, you fear me.  Otherwise, the price would be higher.\"\n\n        The man looks at you with a keen eye.  \"Supposing you're right,\" he says, \"what are you going to pay me?\"\n\n        \"Five grand, cash, no questions asked,\" you say.  He looks at you and, after a moment, you say, \"you can take that or leave it.\"\n\n        He pauses, then nods his head.  \"Okay, pony up.\"\n\n        You walk over to a Dali painting you've had for many years, [i]Swans Reflecting Elephants[/i], and remove the painting, opening the safe behind it.  You return with a stack of money and hand it to the rogue Interpol agent.\n\n        He smiles, satisfied, and takes his leave.  While you're unhappy with forking over the money, you realize it could have been far worse.  And the best part is knowing you now have a clean slate to tarnish if you so choose.\n        *set money -5000\n        *set heat 0\n        *goto apartment\n      *else\n        \"Look, if I pay you, then I'm going to have to pay every punk who comes in here with a gun.  And who's to say you don't come back looking for another score?\"\n\n        \"That's just a risk you're going to have to take,\" he says calmly.\n\n        \"Five grand, cash, no questions asked,\" you say.  He looks at you and, after a moment, you say, \"You can take that or leave it.\"\n\n        He pauses, then shakes his head.  \"No deal.  You either pay or die.\"\n\n        You decide to:\n        *choice\n          #Pay him the full price.\n            *goto pay\n          #Tell him five grand or nothing.\n            *set passion %+5\n            You stick to your guns and say, \"I'll take door number three and that's giving you five grand.  Like I said, take it or leave it.\"\n\n            \"Well, in that case you've made your decision,\" he says, \"prepare to die.\"\n            *goto fight\n          #Fight.\n            *goto fight\n    #Pay the man.\n      *label pay\n      *if (money > 20000)\n        \"So $20,000 and my record is wiped clean?\" you ask.\n\n        He nods his head.  \"It'll be like you never did anything wrong.  Now pony up,\" he says.\n\n        You walk over to a Dali painting you've had for many years, [i]Swans Reflecting Elephants[/i], and remove the painting, opening the safe behind it.  You return with a stack of money and hand it to the rogue Interpol agent.\n\n        He smiles and departs.  While you're unhappy with forking over the money, you realize it could have been far worse.  And the best part is knowing you now have a clean slate to tarnish if you so choose.\n        *set money -20000\n        *set heat 0\n        *goto apartment\n\n      *else\n        You walk over to a Dali painting you've had for many years, [i]Swans Reflecting Elephants[/i], and remove the painting, opening the safe behind it.  You stare at the empty space and shake your head.  \"See,\" you say, turning to the Interpol agent, \"I'm tapped out.  I can't pay your fee.\"\n\n        \"Liar,\" he says, stepping forward.\n\n        \"No it's true,\" you say, \"I don't have the money.\"\n\n        \"I don't believe you,\" he says, and you can see the rage in his eyes.  Knowing that kind of look, having seen it on the face of many enemies, you realize that he's going to attack.\n\n        Trying to get the jump on him, you spring forward.\n        *label fight\n        *if (strength > 15)\n          You rush toward the Interpol agent, diving for a double-leg takedown.  He's taken off guard and you get him to the ground with ease.  \n\n          Quickly, you move to the mount position and seize control of the firearm, wrenching it from his grasp.\n\n          Pointing the gun at the Interpol agent, you:\n          *choice\n            #Threaten him, in hopes of letting him go.\n              Pointing the gun at the Interpol agent, you say softly, \"You have two choices.  One, you get out of here and never come back, or two, I pull the trigger and you become a bloodstain on my floor.\"  \n\n              Pressing the cold steel against his flesh, you see the fear register in his eyes.  \"I really don't like stains on my floor, but the choice is yours.  So what's it going to be?\" you ask.\n\n              Shaking, he sputters, \"I'll leave.\"\n\n              You nod.  \"Okay, but there are terms.  First, you give me your wallet.  I want your ID so you know that I can find you.  And I assure you, I'll have someone keeping a copy of your information in case you somehow get the drop on me.  Second, I want you to make sure my record stays clean, understood?\"\n\n              He nods and you let him up.  Taking his wallet and gun, you show him to the door.\n              *page_break  \n\n              Once he's gone, you breathe a sigh of relief.  You even smile as you see he has $1,000 cash in his wallet.  Well…had.\n              *set heat 0\n              *set righteousness %+5\n              *set money +1000\n              *goto apartment\n\n            #Threaten him, thinking that it's all just business.\n              Pointing the gun at the Interpol agent, you say softly, \"You have two choices.  One, you get out of here and never come back, or two, I pull the trigger and you become a bloodstain on my floor.\"  \n\n              Pressing the cold steel against his flesh, you see the fear register in his eyes.  \"So what's it going to be?\" you ask.\n\n              Shaking, he sputters, \"I'll leave.\"\n\n              You nod.  \"Okay, but there are terms.  First, you give me your wallet.  I want your ID so you know that I can find you.  And I assure you, I'll have someone keeping a copy of your information in case you somehow get the drop on me.  Second, I want you to make sure my record stays clean, understood?\"\n\n              He nods and you let him up.  Taking his wallet and gun, you show him to the door.\n              *page_break  \n\n              Once he's gone, you breathe a sigh of relief.  You even smile as you see he has $1,000 cash in his wallet.  Well…had.\n              *set heat 0\n              *set passion %-5\n              *set money +1000\n              *goto apartment\n\n            #Shoot him in the knees and then kill him.\n              \"You made a huge mistake,\" you say, knowing his transgressions are beyond reproach.  This man hunted you, stalked you, and even worse, attacked you in your own home.  The outrage drives you up the wall.  \"All I can say is bad move.\"  Your lips are tightly drawn as you speak.\n\n              \"You don't know who you're dealing with,\" the man threatens.\n\n              \"The
