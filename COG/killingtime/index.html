could take over the family business.  Thinking back on it, you realize how one person can make such a profound difference, for good or evil, and realize that while you are operating outside of the law, what you are doing is for the cause of justice.  Reflecting on it, you feel great knowing that you will continue to make a difference in the future.\n  *gosub heat\n  *return\n*else\n  Smiling, you reflect on how your reputation for ruthlessness has influenced it all, keeping the other crews at bay as yours grew, your potential rivals knowing you weren't one they should mess with if they knew what was good for them.  Now they were referring hits to you and paying protection money as you enforced your rule with an iron fist.\n\n  Your time has been sheer carnage and you couldn't love it more.  In your position, you're able to take the hits you want, and you've found that this is truly the job for you, one that allows you to quench your bloodlust while getting paid.  You look back and smile at the grisly swath that you've cut.  \n\n  In the last three months alone, you've crushed a group of political reformers in an Eastern European country, silencing them for a wealthy oligarch who paid you handsomely for your effort.  You also helped save a kingpin of the underground fight trade—the kind where only one person walks away—when the police were getting ready to take her out.  You smile, thinking of how you have a reserved front row seat to the gladiator-type matches any time you want.  You realize that operating outside of the law is what you were always meant to do, making your own rules.  Reflecting on it, you feel great at the power you wield.\n  *gosub heat\n  *return\n\n*label heat\n\n*if (heat = 1)\n  The heat you'd generated throughout your assassin career had not made your life easy at first, but lately, you've found that the authorities seem to be looking for more flagrant and flashy offenders.  That had proved to be a breath of fresh air, as having big brother looking over your shoulder at every turn was something that had made your life exceedingly difficult.\n  *gosub partner\n  *return\n*elseif (heat = 2) or (heat = 3)\n  The heat you'd generated throughout your assassin career had not made your life easy, and, to this day, you still find yourself looking over your shoulder for the authorities.  Bribes, courting favor, and intimidation only go so far, and you are well aware that you'll have to stay on your toes, at least until someone infamous takes your spot.  It's not a pleasant feeling, but you know it's something that happens when playing a violent game, particularly when you play it the way you do.\n  *gosub partner\n  *return\n*elseif (heat > 3)\n  The heat you'd generated throughout your assassin career had made your life a constant battle, and, to this day, you still find yourself looking over your shoulder constantly.  Bribes, courting favor, and intimidation could not erase the deeds you've done, and you are fully aware that you'll have to be constantly vigilant, at least for the foreseeable future.  That means untraceable phones never used for more than a few days, never staying in the same place for more than a few nights, and making sure to keep a low profile in public to avoid attention.  At times, it makes you feel like a bit of a nomad, but that was the price you paid for being one of the world's most wanted.  In the end, you know that your choices are what put you in the position you are in now, but you have no regrets.  You know the future is unwritten and you'll shape it however you choose.\n  *gosub partner\n  *return\n*else\n  *gosub partner\n  *return\n\n*label partner\n*page_break\n*if (miami_partner != \"none\")\n  Bringing your mind back to the present, you take a turn down one of the cobblestone streets, finding yourself nearing the beautiful Vltava River and the Charles Bridge across it on the path to Prague Castle.  \n\n  The tranquil waters of the Vltava flow by your side and, as you reach Charles Bridge, \n  *if business = \"dojo\"\n    you think of what a sublime pleasure it's been having ${miami_partner} by your side as you started your dojo.  While you know it was a huge sacrifice for ${mp_him} to leave the assassin world, it was a testament to ${mp_his} love for you, that ${mp_he}'d given it all up so you two could start a life together.  The one thing you couldn't let go was the unfinished business with Boris, but now that chapter is behind you, and you truly feel you can move on.\n  *if business = \"firm\"\n    you truly feel this is how things are supposed to be.\n  *if (business = \"retire\") or (business = \"bookmaker\")\n    you truly feel this is how things are supposed to be.  You think of what a sublime pleasure it's been having ${miami_partner} by your side as you started your early retirement.  While you know it was a huge sacrifice for ${mp_him} to leave the assassin world, it was a testament to ${mp_his} love for you, that ${mp_he}'d given it all up so you two could start a life together.  The one thing you couldn't let go was the unfinished business with Boris, but now that chapter is behind you, and you truly feel you can move on.\n  *if business = \"bailbonds\"\n    you think of what a sublime pleasure it's been having ${miami_partner} by your side as you started your bail bonds and bounty hunter company.  While you know it was a huge sacrifice for ${mp_him} to leave the assassin world, it was a testament to ${mp_his} love for you, that ${mp_he}'d given it all up so you two could start a life together.  The one thing you couldn't let go was the unfinished business with Boris, but now that chapter is behind you, and you truly feel you can move on.\n  *comment endif\n  \n  Watching the water cascade smoothly by your side, you feel a sense of calm.  Setting foot on the immaculately laid cobblestones of the bridge, you spy your love admiring a painting in a merchant's stand on the beginning arch of the river crossing.  You move close and wrap your arms around ${miami_partner}.\n\n  At first, ${mp_he} tenses but, seeing your face, begins to laugh.  \"${name}, you scared the hell out of me.  I thought you were the enemy.\"\n\n  You laugh.  \"Old habits die hard.\"\n\n  $!{mp_he} stares at you, ${mp_his} face beaming with a wide smile.  \"They do.  But now it's time to stop and smell the roses.\"\n\n  You return ${mp_his} glowing smile.  \n  *if miami_partner = \"Phoenix\"\n    Even though you two haven't been together for very long, you find yourself amazed each and every day by the multitude of things you adore about ${mp_him}.  ${miami_partner} is fearless, but with a soft side you never would have expected.  \n  \"We're in one of the most beautiful places on Earth, and I'm with the love of my life.  I'd say I'm already stopping and smelling the roses.\"\n\n  ${miami_partner} holds you in ${mp_his} arms.  \"I love you,\" ${mp_he} says.\n\n  *if business = \"dojo\"\n    In that moment, you truly feel that great things lie ahead.  Smiling to yourself, gazing out onto the city of Prague, the perfect orange rooftops, the ornate and beautiful spires, you're content with your choices and the track you're on.  A part of you regrets no longer being in the assassin world, but you know that your choices have gotten you to this point, and, no matter what, you have forward momentum.  Sometimes, that's all you need.  You tuck those thoughts away, wanting to enjoy the moment, feeling confident about the future and even better about the present.\n    *achieve dojo\n  *if business = \"firm\"\n    You embrace ${miami_partner} and kiss ${mp_him} deeply.  \"I love you, too,\" you say.  In that moment, you realize that you've reached your dream, that you've become the best assassin there could be, with an empire at your command, and the world at your feet.  Even more, you stand with your love in your arms.  With the power you wield, where life and death are yours to decide, you realize that truly, the world is yours.\n  *if business = \"bailbonds\"\n    You embrace ${miami_partner} and kiss ${mp_him} deeply.  \"I love you, too,\" you say.  In that moment, you truly feel great things lie ahead.  Smiling to yourself, gazing out onto the city of Prague, the perfect orange rooftops, the ornate and beautiful spires, you're content with your choices and the track you're on.  A part of you regrets no longer being in the assassin world, but you know that your choices have gotten you to this point, and, no matter what, you have forward momentum.  Sometimes, that's all you need.  You tuck those thoughts away, wanting to enjoy the moment, feeling confident about the future and even better about the present.\n    *achieve bailbonds\n  *if business = \"retire\"\n    You embrace ${miami_partner} and kiss ${mp_him} deeply.  \"I love you, too,\" you say.  In that moment, you truly feel great things lie ahead, content with your choices and the track you're on.  [i]Early retirement always had a nice ring to it[/i], you think to yourself. \n\n    A part of you regrets no longer being in the assassin world, but you know that your choices have gotten you to this point, and life is so much safer this way.  It was an odd thing, you reflect, that, the more you had, the more afraid you were to lose it.  You know that you could venture back into the assassin world with the money you have, but strangely, you feel a certain trepidation, a softness from living the good life, that holds you back, and you know you'll probably just have to content yourself with living a life less adventurous.  \n\n    You could take up philanthropy, spread the wealth around and help others.  That could be an adventure in and of itself. This idea resonates well and fills you with a renewed sense of purpose. Making a mental note to look into it when the trip is over, you tuck those thoughts away for now, wanting to enjoy the moment, feeling confident about the future and even better about the present.\n    *achieve philanthropist\n  *if business = \"bookmaker\"\n    You embrace ${miami_partner} and kiss ${mp_him} deeply.  \"I love you, too,\" you say.  In that moment, you truly feel great things lie ahead, content with your choices and the track you're on.  [i]Early retirement always had a great ring to it[/i], you think to yourself. \n\n    A part of you regrets no longer being in the assassin world, but you know that your choices have gotten you to this point, and life is so much safer this way.  It was an odd thing, you reflect, that, the more you had, the more afraid you were to lose it.  You know that you could venture back into the assassin world with the money you have, but strangely, you feel a certain trepidation, a softness from living the good life, that holds you back, and you know you'll probably just have to content yourself with living a life less adventurous.  Still, a part of you misses the excitement. \n\n    You can always do some bookmaking and backroom gambling, make a little profit off of others.  That'll be an adventure in and of itself. This idea resonates well and fills you with a renewed sense of purpose. Making a mental note to look into it when the trip is over, you tuck those thoughts away for now, wanting to enjoy the moment, feeling confident about the future and even better about the present.\n    *achieve bookmaker\n  *page_break\n\n  ${miami_partner} smiles at you for a moment, then reaches into a bag ${mp_he}'s carrying.  $!{mp_he} withdraws a small envelope and presses it into your hand.  \"What's this?\" you ask, and ${mp_he} laughs a little.\n\n  \"It's a gift,\" ${mp_he} says.  \"You've been in the assassin business too long.  Not everything is a secret clue for a mission.\"\n\n  Now it's your turn to laugh.  You think back on how many of those same moments of kindness you'd experienced with ${mp_nick} over the last several months.  \n  *if miami_partner = ben\n    Even now, you find yourself surprised by ${mp_his} tenderness.  There's something about ${miami_partner} that just exudes confidence, coolness, and toughness, and you were more than pleasantly surprised when you discovered the large heart ${mp_he} had beneath ${mp_his} rough exterior.\n\n    Like any relationship, there were transitions at first.  You remark on just how headstrong and opinionated ${miami_partner} is.  While at first it caused friction, now you find yourself respecting these traits and find it a chance for you to grow as well.  \n\n    ${mp_nick} also opened your mind to many things that you never thought you'd enjoy.  You two had done your first bungee jump together and took your first multi-state motorcycle ride.  You'd stood back-to-back in a barroom brawl at a biker bar and gazed up at the stars under the wide expanse of a clearing in the prairies of Wyoming.  You think of all the ways ${mp_he}'s helped you grow and you find yourself exceedingly grateful to have ${mp_him} in your life.\n  *if miami_partner = chris\n    Throughout your life, you haven't found anyone who's more giving than ${chris}.  $!{mp_he}'s fun, outgoing, and witty.  But what's more impressive is ${mp_his} selflessness.  \n\n    Still, like any relationship, there were transitions at first.  You remark on how ${chris} is so giving that ${mp_he} sometimes neglects to voice opinions on what ${mp_he} wants to do, always being more concerned about others.  At first, it caused friction, because you always felt like you were taking charge.  But now, you find yourself respecting these traits and find it a chance for you to grow as well.  ${chris} is always one who is thinking of others and that has rubbed off on you, allowing you to better consider other people's wishes.  \n\n    ${chris} also opened your mind to many things that you never had thought you'd enjoy.  You two have volunteered at soup kitchens and given your time to animal shelters.  But it wasn't all charitable endeavors.  You'd also gotten back to nature together, taking long hikes and exploring, as well as spending some relaxing time at the beach.  ${chris} was also quite encouraging about you exploring your creative side, and you'd taken up playing guitar and piano as well as getting into art history.  You think of all the ways ${mp_he}'s helped you grow and you find yourself exceedingly grateful to have ${mp_him} in your life.\n  *if miami_partner = sam\n    Throughout your life, you haven't found anyone who seems to have a bigger heart than ${mp_nick}. $!{mp_he}'s cultured and well-traveled, but still retains a humility that shines through in all the small things ${mp_he} does for others.\n\n    Still, like any relationship, there were transitions at first.  You remark on how ${mp_nick} loves to over-think and analyze things, and while at first it caused friction, now you find yourself respecting these traits and find it a chance for you to grow.  $!{mp_he} is never one to rush into rash action and that caution had rubbed off a little on you.\n\n    ${mp_nick} also opened your mind to many things that you never had thought you'd enjoy.  You two have toured art galleries and museums together and also attended ballets and operas.  But it wasn't all culture and class, ${mp_he}'d also opened your eyes to the world of online gaming and you two had used your superb assassin skills to triumph at first person shooters.  You think of all the ways ${mp_he}'s helped you grow and you find yourself exceedingly grateful to have ${mp_him} in your life.\n  *if miami_partner = \"Phoenix\"\n\n    Over the last few months, you learned that Phoenix was full of surprises.  While there was no doubt that Phoenix was tough, exuding the swagger that could be expected from heading one of the greatest hitman organizations in the world, ${mp_he} also had a soft side, one that included a love for animals, romantic films, and sentimentality.  Even now, you can't help but grin when taking selfies with Phoenix, knowing that ${mp_he} was once the head of one of the most feared assassin squads ever.  \n\n    Like any relationship, there were transitions at first.  You remark on just how stubborn and determined Phoenix is.  While at first it caused friction, now you find yourself respecting these traits and find it a chance for you to grow.  \n\n    Phoenix also opened your mind to many things that you never thought you'd enjoy.  You two had gone dirt bike riding and attended a rodeo.  An avid adventurer, ${mp_he} had gotten you into horseback riding as well as scuba diving.  You'd done some rock climbing on mountains you were certain you were going to fall off of, and surfed waves you were sure were going to swallow you whole.  But it wasn't all exploration and adventure.  You'd learned that Phoenix was a huge history buff, and ${mp_he}'d gotten you into reading more non-fiction.  You think of all the ways ${mp_he}'s helped you grow and you find yourself exceedingly grateful to have ${mp_him} in your life.\n  *comment endif\n\n  Glancing back down at the present, you tear it open like a kid on Christmas.  \"I hope you like it,\" ${mp_he} says, winking.  \"I have a feeling you will.\"\n\n  Inside the envelope is a folded piece of paper, which you quickly open and two airline tickets fall into your hand.  You look at the paper and see the words, \"To my love, ${name}.  Are you ready for the vacation of our dreams?\"  Under the text is a collage of travel pictures.  \n\n  *if miami_partner = ben\n    The pictures are of a place you and ${mp_nick} have talked about for so long:  Brazil.  The photos show the beautiful beaches of Copacabana and Ipanema, the lush hillsides of Corcovado mountain with the majestic figure of Christ the Redeemer overlooking the city, Sugar Loaf Mountain, and the impressive harbor of Rio.  \"It's all booked,\" ${mp_he} says with a smile.  \"We'll get to hike through the Amazon, catch a soccer match, train some jiu-jitsu, and of course, relax on the beach.\"\n\n    You grin broadly, thinking that the trip sounds like paradise.\n  *if miami_partner = chris\n    The pictures are of a place you and ${chris_nick} have talked about for so long:  Italy.  The photos show the canals of Venice and the giant Colosseum in Rome.  There are the ruins of the ancient Forum, and pictures of the pristine waters off of Naples, as well as the impressive Vatican city.  \"It's all booked,\" ${mp_he} says with a smile. \"We'll get to see the historic sights, dine at quaint cafes, check out all the historic statues and sculptures, and take in the museums and art.  I'm particularly excited to go to St. Peter's Basilica and see the Sistine Chapel.\"\n\n    You grin broadly, thinking that the trip sounds perfect.\n  *if miami_partner = sam\n    The pictures are of a place you and ${sam_nick} have talked about for so long:  Japan.  The photos show the fantastic skyline of Tokyo, Japan's version of the Eiffel Tower, the Tokyo Tower, lit in all its glory, the Park Hyatt Hotel from [i]Lost in Translation[/i], and many serene temples.  \"It's all booked,\" ${mp_he} says with a smile.  \"We'll get to see the shrines, maybe catch an MMA match, ride the bullet train, check out the giant tuna, and have the freshest sushi in the world at the Tsukiji Fish Market.  And of course, we'll check out all the new technology.  They have an entire district for it there.\"\n\n    You grin broadly, thinking that the trip sounds like a lot of fun.\n  *if miami_partner = \"Phoenix\"\n    The pictures are of a place you and Phoenix have talked about for so long:  Egypt.  The photos show the towering Pyramids of Giza, the majestic Sphinx, the Nile River flowing through Cairo, the vast desert, and the impressive harbor of Alexandria.  \"It's all booked,\" Phoenix says with a smile.  \"We'll get to explore the Pyramids, catch up on some reading in the new library of Alexandria, and of course, ride some camels.\"\n\n    You grin broadly, thinking that the trip sounds amazing.\n  *return\n*else\n  *if business = \"dojo\"\n    The tranquil waters of the Vltava flow by your side, and, as you reach Charles Bridge, you feel confident about the way things are going. You sigh, thinking this would be the perfect stroll for you to share with someone special.  [i]Who knows?  The one I've been looking for might be here in town[/i], you think as you see one stunning Eastern European after another pass by.  You know that, with everything going for you, a good business that's on its way up, and a positive attitude, you won't be single for long.  Still, it would have been nice to have someone by your side while you embarked on your journey with the new dojo.\n\n    Pushing those thoughts aside, you smile to yourself, gazing out onto the city of Prague, the perfect orange rooftops, the ornate and beautiful spires.  In that moment, you truly feel that all possibilities lie before you, and you're content with your choices.  You somewhat regret leaving the assassin world, but you know that your choices have gotten you to this point, and no matter what, you have forward momentum.  Sometimes, that's all you need.  You tuck those thoughts away, wanting to enjoy the moment, feeling confident about the future and even better about the present.\n    *achieve dojo\n  *if business = \"firm\"\n    Bringing your mind back to the present, you take a turn down one of the cobblestone streets, finding yourself nearing the beautiful Vltava River and the Charles Bridge across it on the path to Prague Castle.  \n\n    The tranquil waters of the Vltava flow by your side, and, as you reach Charles Bridge, you truly feel this is how things are supposed to be.  You sigh, thinking that this would be the perfect stroll for you to share with someone special.  [i]Who knows?  The one I've been looking for might just be here in town[/i], you think as you see one stunning Eastern European after another pass by.  \n\n    Smiling to yourself, gazing out onto the city of Prague, the perfect orange rooftops, the ornate and beautiful spires, you feel that all possibilities lie before you.  In that moment, you realize that you've reached your dream, that you're the best assassin there could be, with an empire at your command, and the world at your feet.  With the power you wield, where life and death are yours to decide, you realize that, truly, the world is yours.\n  *if business = \"bailbonds\"\n    Bringing your mind back to the present, you take a turn down one of the cobblestone streets, finding yourself nearing the beautiful Vltava River and the Charles Bridge across it on the path to Prague Castle.  \n\n    The tranquil waters of the Vltava flow by your side, and as you reach Charles Bridge, you feel confident about the way things are going. You sigh, thinking this would be the perfect stroll for you to share with someone special.  [i]Who knows?  The one I've been looking for might be here in town[/i], you think as you see one stunning Eastern European after another pass by.  You know that, with everything going for you, a good business that's on its way up, and a positive attitude, you won't be single for long.  Still, you know it would have been nice to have someone by your side while you embarked on your journey with your bail bonds and bounty hunter company.\n\n    Pushing those thoughts aside, you smile to yourself, gazing out onto the city of Prague, the perfect orange rooftops, the ornate and beautiful spires.  In that moment, you truly feel that all possibilities lie before you, and you're content with your choices.  You somewhat regret leaving the assassin world, but you know that your choices have gotten you to this point, and no matter what, you have forward momentum.  Sometimes, that's all you need.  You tuck those thoughts away, wanting to enjoy the moment, feeling confident about the future and even better about the present.\n    *achieve bailbonds\n  *if (business = \"retire\") or (business = \"bookmaker\")\n    Bringing your mind back to the present, you take a turn down one of the cobblestone streets, finding yourself nearing the beautiful Vltava River and the Charles Bridge across it on the path to Prague Castle.  \n\n    The tranquil waters of the Vltava flow by your side, and, as you reach Charles Bridge, you truly feel this is how things are supposed to be.  You sigh, thinking this would be the perfect stroll for you to share with someone special.  [i]Who knows?  The one I've been looking for might be here in town[/i], you think as you see one stunning Eastern European after another pass by. \n\n    Smiling to yourself, gazing out onto the city of Prague, the perfect orange rooftops, the ornate and beautiful spires, you truly feel that all possibilities lie before you, and you're content with your choices.  [i]Early retirement always had a great ring to it[/i], you think to yourself. \n\n    You somewhat regret leaving the assassin world, but you know that your choices have gotten you to this point, and life is so much safer this way.  It was an odd thing, you reflect, that, the more you had, the more afraid you were to lose it.  You know that you could venture back into the assassin world with the money you have, but strangely, you feel a certain trepidation, a softness from living the good life, that holds you back, and you know you'll probably just have to content yourself with living a life less adventurous.  \n\n    *if business = \"retire\"\n      You could take up philanthropy, spread the wealth around and help others.  That could be an adventure in and of itself. This idea resonates well and fills you with a renewed sense of purpose. Making a mental note to look into it when the trip is over, you tuck those thoughts away for now, wanting to enjoy the moment, feeling confident about the future and even better about the present.\n      *achieve philanthropist\n    *if business = \"bookmaker\"\n      You can always do some bookmaking and backroom gambling, make a little profit off of others.  That'll be an adventure in and of itself. This idea resonates well and fills you with a renewed sense of purpose. Making a mental note to look into it when the trip is over, you tuck those thoughts away for now, wanting to enjoy the moment, feeling confident about the future and even better about the present.\n      *achieve bookmaker\n  *return\n\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set name \"Jake\"\n*set nickname \"The Wolf\"\n*set strength 5 \n*set ranged_weapons 5\n*set intelligence 5\n*set improvisation 5\n*set righteousness 50 \n*set loved 50\n*set passion 50\n*set respect 10\n*set money 1000\n*set wounds \"uninjured\"\n\nIt's almost time. You fix your aim, getting the general in your sights, and tense your finger on the trigger.  You're about to open fire when a young man in faded shorts and a fraying tank top steps between you and your target. From the dirt on his hands and the shabbiness of his clothing, you can tell he's not part of the general's crew.  More than likely, he's a local townsman hired to do some work around the compound.  It doesn't matter who he is; he's blocking your shot.  You can't get a clean bead on the target.  What do you do?\n\n*fake_choice\n  #Pull the trigger and shoot through him. He's collateral damage.\n  #Wait to see if he moves. He could be an innocent victim, and I don't want to get any more blood on my hands than is absolutely necessary.\n  #Shoot him in the leg, then take out the target. I'm confident I can get the shots off quickly enough to take out the mark once the man falls out of the way wounded. \n  #Call my controller for instructions. This is something unforeseen and I don't want to take him out if he's on the \"do not kill\" list. \n\n*script changeBackgroundColor(\"black\")\n*set name \"Victoria\"\n*set nickname \"Ice\"\n*set strength 15 \n*set ranged_weapons 12\n*set intelligence 5\n*set improvisation 10\n*set righteousness 65\n*set loved 40\n*set passion 35\n*set respect 50\n*set money 40000\n*set heat 15\n*set psychotic_level 10\n*set extreme_kills 1\n*set innocents_killed 2\n*set wounds \"minor\"\n\nReasoning the risk is worth the reward, you decide to plant a bomb. Your choice seems like a good one as you spot a trashcan near the leg of the Eiffel Tower where you see your target, Andre, and his entourage, descending.  \n\nYou mosey over to a small coffee stand in the shadow of the massive, metal landmark where Marie is waiting.  Ordering a cup of French roast, you wait for the target to get in range.\n\nYour heart skips a beat, though, when you see two teenage boys smoking cigarettes stop just beside the trash receptacle.  Judging from the ashtray attached to it, they aren't going anywhere soon.  You…\n\n*fake_choice\n  #Change nothing.  They are collateral damage.  Besides, smoking would have killed them, anyway…eventually.\n  #Pretend I'm a cop, march over to the boys, and tell them I'm going bust them for smoking unless they leave.\n  #Change tactics.  You don't want to kill innocent people if it can be helped, and thankfully, you have your trusty, steel blade with you.  \n  #Go to the hotel I have a reservation for and take the sniper shot.  \n\n*script changeBackgroundColor(\"sepia\")\n*set name \"Logan\"\n*set nickname \"The Hammer\"\n*set strength 15 \n*set ranged_weapons 15\n*set intelligence 25\n*set improvisation 30\n*set righteousness 75\n*set loved 45\n*set passion 70\n*set respect 65\n*set money 55000\n*set heat 25\n*set psychotic_level 0\n*set extreme_kills 1\n*set innocents_killed 0\n*set wounds \"uninjured\"\n\nIt takes a moment before the door is flung open, a pot-bellied man with a thick coat of white hair on his chest staring back at you.  Dressed in only a bathing suit, he stands in sharp contrast to the three fit, Hawaiian shirt-clad bodyguards inside.  \nYou inform him that you're from the hotel and you're here to take him on a boat ride around the bay.  Looking you up and down with suspicion, he says, \"You're not from here.\"  It's not a question, and you realize he must have picked up on your lack of an island accent.  \n\nRemembering your boss's admonishment that the target would be suspicious that someone from America would be tracking him after double-crossing his business partners, you say:\n\n*fake_choice\n  #\"I'm an ex-pat.  Moved here a while ago because, well, this place is paradise.  Trust me, though, I know these waters as well as any native.\"\n  #\"Born and raised on Bora Bora.  I live on the other side of the island, so I can show you some of the best spots that few of the other guides know about.\"\n  #\"To be honest with you, I'm new to this island, but not to the business.  I was a boat captain in Canada for years before deciding to move to a warmer climate.\"\n\n*set name \"Mako\"\n*set nickname \"The Viper\"\n*set strength 25 \n*set ranged_weapons 10\n*set intelligence 15\n*set improvisation 20\n*set righteousness 35\n*set loved 65\n*set passion 30\n*set respect 50\n*set money 75000\n*set heat 15\n*set psychotic_level 15\n*set extreme_kills 2\n*set innocents_killed 3\n*set wounds \"serious\"\n\n\"You made a mistake,\" you say. \n\nThe man looks at you for the moment, then says, \"And what's that?\"\n\nYou grin.  \"You messed with me.\" \n\nThe man only has time to mutter a confused, \"Huh?\" before you're on top of him. He struggles with you over possession of the weapon.  You lash out with a savage knee to the groin, followed by a short elbow to the gut.  The would-be robber goes down in a heap and you're able to wrest the harpoon gun away by force.\n\nHe quickly gets up off the sand and turns to run.  You:\n\n*fake_choice\n  #Let him go.\n  #Shoot him.\n  #Tackle him and choke him out.\n  #Threaten him with violence until he follows me into the water, then shoot him in the leg and watch him drown.\n", "startup": "*title It's Killing Time\n*author Eric Bonholtzer\n*scene_list\n\tstartup\n\tcolombia\n\tla1\n\tparis\n\t$ la2\n\t$ tahiti\n\t$ la3\n\t$ la4\n\t$ miami\n\t$ prague\t\n\t\n*create name \"unknown\"\n*create nickname \"unknown\"\n*create the_nickname \"unknown\"\n*create pc_he \"he\"\n*create pc_him \"him\"\n*create pc_his \"his\"\n*create strength 5\n*create ranged_weapons 5\n*create intelligence 5\n*create improvisation 5\n*create righteousness 50\n*create loved 50\n*create psychotic_level 1\n*create innocents_killed 0\n*create extreme_kills 0\n*create heat 0\n*create money 5000\n*create respect 10\n*create gender \"unknown\"\n*create wounds \"uninjured\"\n*create passion 50\n*create rotund false\n*create ben_rapport 50\n*create ben \"Benjamin\"\n*create ben_nick \"Ben\"\n*create bhe \"he\"\n*create bhim \"him\"\n*create bhis \"his\"\n*create chris \"Christian\"\n*create chris_nick \"Chris\"\n*create chris_rapport 50\n*create che \"he\"\n*create chim \"him\"\n*create chis \"his\"\n*create sam_rapport 50\n*create sam \"Francisco\"\n*create sam_nick \"Paco\"\n*create she \"he\"\n*create shim \"him\"\n*create shis \"his\"\n*create man \"man\"\n*create men \"men\"\n*create martinez 50\n*create boris 50\n*create clinic 0\n*create paris_partner \"unknown\"\n*create paris_mission \"unknown\"\n*create tahiti_mission \"unknown\"\n*create preference \"male\"\n*create first_date 0\n*create first_date_name \"none\"\n*create first_date_nick \"none\"\n*create second_date 0\n*create second_date_name \"none\"\n*create second_date_nick \"none\"\n*create saved 0\n*create miami_partner \"none\"\n*create mp_he \"she\"\n*create mp_his \"her\"\n*create mp_him \"her\"\n*create mp_nick \"none\"\n*create with_martinez false\n*create beijing false\n*create organization_name \"unknown\"\n*create martinez_killed false\n*create martinez_key false\n*create casino_win 0\n*create tookawound false\n*create neardead false\n*create pious 0\n*create charity 0\n*create chapter 0\n*create miller_heat false\n*create phoenix_male true\n*create wounded_here false\n\n*achievement righteouskiller visible 30 Righteous Killer\n\tFinish the game with righteousness meter full\n\tFinished the game with righteousness meter full\n*achievement ruthlesskiller visible 30 Ruthless Killer\n\tFinish the game with ruthlessness meter full\n\tFinished the game with ruthlessness meter full\n*achievement faithful visible 25 Faithful\n\tHidden\n\tFinished the game while always keeping the same love interest, despite Phoenix's temptation\n*achievement happilyeverafter visible 10 Happily Ever After\n\tHidden\n\tGot engaged at the end of the game\n*achievement islandtime visible 10 Island Time\n\tHidden\n\tControlled an island at the end of the game\n*achievement perfectskill visible 50 Perfect Skill\n\tHidden\n\tCompleted the game without ever being wounded\n*achievement moneybags visible 25 Moneybags\n\tFinish the game with over $150,000\n\tFinished the game with over $150,000\t\n*achievement moneydoesntmatter visible 25 Money Doesn't Matter\n\tFinish the game with less than $20,000\n\tFinished the game with less than $20,000\n*achievement professionalgambler visible 15 Professional Gambler\n\tHidden\n\tWon the maximum money from the casino\n*achievement totalpsycho visible 75 Total Psycho\n\tFind and select all psychotic choices\n\tFound and selected all psychotic choices\n*achievement dedicated visible 20 Dedicated\n\tFinish the game with dedication meter full\n\tFinished the game with dedication meter full\n*achievement passionate visible 20 Passionate\n\tFinish the game with passion meter full\n\tFinished the game with passion meter full\n*achievement quickthinking visible 20 Quick Thinking\n\tFinish the game with greater than 30 improvisation skill level\n\tFinished the game with greater than 30 improvisation skill level\n*achievement genius visible 20 Genius\n\tFinish the game with greater than 30 intelligence skill level\n\tFinished the game with greater than 30 intelligence skill level\t\n*achievement supremestrength visible 20 Supreme Strength\n\tFinish the game with greater than 30 strength skill level\n\tFinished the game with greater than 30 strength skill level\n*achievement gunslinger visible 20 Gunslinger\n\tFinish the game with greater than 30 ranged weapons skill\n\tFinished the game with greater than 30 ranged weapons skill\t\n*achievement benefitofthedoubt visible 15 Trusting\n\tHidden\n\tFinished the game with a high level of trust for Martinez\n*achievement suspicious visible 15 Suspicious\n\tHidden\n\tFinished the game with a low level of trust for Martinez\n*achievement pious visible 15 Pious\n\tHidden\n\tFinished the game selecting all the religious options\t\n*achievement deathdefying visible 10 Death Defying\n\tHidden\n\tWas nearly dead from wounds but finished the game\n*achievement extremekiller visible 75 Extreme Killer\n\tPerform all the extreme kills\n\tPerformed all the extreme kills\n*achievement philanthropist visible 20 Philanthropist\n\tHidden\n\tFound philanthropist ending\n*achievement bookmaker visible 20 Bookmaker\n\tHidden\n\tFound bookmaker ending\n*achievement dojo visible 20 Welcome to the dojo\n\tHidden\n\tFound dojo owner ending\n*achievement bailbonds visible 20 Bailbonds\n\tHidden\n\tFound bailbonds owner ending\n*achievement snazzydresser visible 10 Snazzy Dresser\n\tHidden\n\tYou became a fashionable assassin\n*achievement flyride visible 10 Fly Ride\n\tHidden\n\tYou picked up a hot set of wheels\n*achievement firstblood visible 5 First Blood\n\tHidden\n\tMade first kill of the game\n*achievement social visible 5 Social\n\tHidden\n\tYou chose to go to the bar with your teammates\n*achievement lonewolf visible 5 Lone Wolf\n\tHidden\n\tYou chose to go home instead of going out with your teammates\n*achievement charitable visible 5 Charitable\n\tHidden\n\tYou chose to give to the less fortunate\n*achievement frugal visible 5 Frugal\n\tHidden\n\tYou chose to ignore the less fortunate\n*achievement loved visible 15 Loved\n\tFinish the game with loved meter full\n\tFinished the game with loved meter full\n*achievement feared visible 15 Feared\n\tFinish the game with feared meter full\n\tFinished the game with feared meter full\n*achievement japan visible 10 Japan\n\tVisit the land of the rising sun\n\tVisited the land of the rising sun\n*achievement discoverextremekill visible 5 Discovered an Extreme Kill\n\tFind an extreme kill\n\tYou found an extreme kill\n*achievement artist visible 5 Artist\n\tHidden\n\tYou became a famous artist\n*achievement turntheothercheeck visible 5 Turn the other cheek\n\tHidden\n\tYou chose to forgive Boris\n\n*temp discount_ends \"Jul 4\"\n*temp time_stamp timestamp(\"${discount_ends}, 2015\")\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tTravel the world, meet interesting new people, and assassinate them for money!\n\n\t[i]It's Killing Time[/i] is an ultra-violent 140,000-word interactive novel by Eric Bonholtzer, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\tEarn respect, reputation, and wealth as a hired assassin. You'll be dressed to kill, driving an exotic car with outlandish weapons in the trunk.\n\n\tBut in the glamorous, fast-paced world of murder-for-hire, you can never know who to trust and who's gunning to take you out. Who will betray you? Whom will you betray?\n\n\tWill you be a spiritual hitman or hitwoman, a ruthless assassin, a total psychopath, or a righteous killer? The choice is yours.\n\n\t[i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\t*comment endif\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n\t*label page_break\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\n*goto_scene colombia\n", "tahiti": "*temp loc \"\"\n*set wounded_here false\n[i]It's beautiful[/i], you think to yourself, glancing down at the pristine, blue water. \n\nThe small plane jolts with a bit of turbulence, and you jostle in your seat.  Looking at the tiny prop aircraft, you wish there was some other practical way to get to this tropical paradise hideaway.  The only other option is by boat, and that's far too slow for your needs.  You're well aware that the limited methods of ingress and egress means there are going to be serious problems if this hit goes south. \n\n*if (paris_mission = \"success\")\n  You reflect back on your Paris mission and think that you want to keep your success streak going.\n  *goto tahiti1\n*else\n  You reflect back on your Paris mission and think that you can't fail Boris again.\n  *goto tahiti1\n\n*label tahiti1\nPushing the past from your mind, you focus on the present.  Glancing down at the dossier, you run through the mission in your head.  \n\nSal Carmone is going to have a team of his favorite muscle along for the vacation  There's another hurdle as well—the dossier states that Carmone just had a falling out over a business deal, and he's likely to be suspicious of any Americans, fearing his old partners might be coming for him.  \n\nBoris has arranged a knife, rifle, and pistol to be stashed for you at a pre-designated place on the main island of Bora Bora.  On such a small resort island, those are likely going to be your only means of dealing death.  \n\nThe dossier also states that the hotel concierge has been paid off to feed you any info you need and to assist you if you need help setting up the hit.  A $3,000 trip allowance is also included in the expensive Italian leather binder.\n*set money +3000\n*page_break\n\nThe island only gets more beautiful as you approach, the water placid and tranquil, the waves lazily lapping at the shores.  \n\nThe airport is a small, narrow stretch on one of the outlying motus, little islands made of coral and other materials from the sea.  The central island of Bora Bora is surrounded by a ring of them.  \n\nAfter a bumpy landing, you depart the plane.  There are no fancy airport connectors to a terminal, only a stairway ladder leading to the open-air landing strip.  \n\nStepping down, you're immediately struck by the intoxicating, wild magnificence of the island.  The slight, cool breeze caresses your body under the blazingly bright Tahitian sun.  A few birds chirp in the distance but, other than that, there is only the rhythmic sound of the waves' ebb and flow.  \n\nWalking under the thatched roof of the airport arrival hut, you smile at the intricately carved Tiki greeting you.  Ceiling fans with faux palm fronds blow down, and you follow the few other travelers to a boat dock.  While you wait for the ferry to the mainland, you spy a vending machine and, feeling thirsty, you opt for:\n\n*fake_choice\n  #A soda.\n    Standing on the dock, you pop the top and savor the fizz.  \n  #A diet soda.\n    Standing on the dock, you pop the top and savor the fizz.  \n  #Juice.\n    Standing on the dock, you unscrew the top and savor the cranberry juice's sweet tang.  \n  #Water.\n    Standing on the dock, you unscrew the top and let the water cool your throat.\nThe natural ring of motus surrounding the main island causes the water to be calm and peaceful.  As you board the boat when it arrives, you can see the strands of porous coral, and scores of multi-colored tropical fish darting about in the crystalline water below.  \n\nAs the boat speeds forward, you see that the clarity of the water goes deeper than you've ever seen in the ocean, the natural breakwaters of the motus keeping sediment and debris from entering the inner lagoon.\n\nTaking a deep breath, you remind yourself to be vigilant.  Just because it's paradise doesn't mean there isn't danger.  And you know you're heading right for it.\n\n*page_break\nAfter dropping off all of the other guests at various luxury hotels on the island, the driver tells you he will be back for you in an hour.  You nod and tip him, even though you know Boris has already lined his pockets. As you walk down the dock, you see dive shops and bars, but your attention is elsewhere.  There's a cache of weapons at the drop point on the far side of the island.  \n\nYou ignore calls from the shop owners as you stride by, determined to get to the weapons drop.  It takes you less than fifteen minutes to get to the other side of the motu.  The waves crash against the sandy, rocky beaches, and you find it remarkable how different the water looks on this side.  Still blue and pure, the water is more tumultuous, the wind fiercer.  \n\nSpying a narrow outcropping of rocks, you recognize the drop spot from the photo in the dossier.  There is something else, though, that you didn't see in the picture.  In between you and the location where you're to pick up your weapons is a small hut.  [i]The dossier said nothing about a hut[/i], you think to yourself.\n\nYou creep closer to try to determine if there is anyone inside, but the only windows face the ocean, so you're unable to get a look inside.  Staring at the obstacle between you and your weapons, you realize you have a few options.\n\n*choice\n  #Try to sneak by.  I want to get on with my mission as quickly as possible.\n    You figure the best bet is to try to creep by stealthily.  It's a tourist destination, and you reason you can pretend to be one.  \n\n    While you know there aren't too many sightseers on this remote portion of the island, you figure it's a well known fact that it's easy to get lost, or to just amble out on a lark.\n    *set passion %-5 \n    *goto islander\n\n  #Check to see if anyone is there.  I'm curious to see if there's anything interesting inside.\n    You reason that, if someone is there, you can pretend to be a lost tourist or a vacationer out for a little adventure.  You figure it will look a lot better if you display the natural sense of ease and friendliness that people taking a trip to an island often have.  There's already a broad smile plastered on your face as you begin to walk forward.\n    *set passion %+5\n    *goto islander\n\n  #Walk past nonchalantly.  I don't want to commit to any course of action at this point.\n    You figure the best bet would be to try to play it cool and not draw attention to yourself.  There are numerous tourists, and you know you can easily pretend to be one of them.  While there aren't too many sightseers on this remote portion of the island, you reason it's a well-known fact that it's easy to get lost, or to just amble out on a lark. \n    *goto islander\n\n\n*label islander\n\nYou get about five feet from the hut, the sandy rocks crunching beneath your feet, when you hear the voice.  \n\n\"I knew someone would come.\"  It's a deep, throaty growl, one borne of too many cigarettes, the sound like gravel falling down a mineshaft.  You pause in your step, instantly on guard.  The owner of the voice laughs, stepping out from the hut.  \"Don't even think about it. I got you in my sights.\"\n\nYou don't let your guard down, though you make no threatening moves.  In this tense moment of uncertainty, you take in the appearance of the new arrival.  His skin is dark and leathery, every exposed surface tanned so deeply, it looks almost charred, his teeth—yellowed as they are, and sunken in raw, red gums—look brilliantly bright by comparison.  His hair is curly and a whitish-gray: the man either in his late 50s or has aged badly.  There is a distinct layer of ropey muscle, though, with veins and tendons that seem to burst from his skin. \n\nThe most obvious and threatening aspect of this man's appearance is the harpoon gun pointed right at your stomach.  It's a weapon known for spearing sharks, and you have an unpleasant thought of what the barbed tip would do to your entrails.\n\n\"What are you doing?\"\n\nThe man merely laughs again.  \"You think I'm stupid?\" he counters, and for a second you wonder if he's insane, thinking that perhaps that's why he lives so far removed from the rest of the island inhabitants.  As if in answer, he says, \"I'm not some looney who doesn't know what's what.  I saw that ship come in and drop off a satchel.  Saw it right out my window.  It was near dark.  No one pulls up to the outcropping that late, drops something off, and heads back.  So I knew it had to be something good.  Sure enough, I went out there, and what did I find?  Weapons.  And plenty of them.\"\n\nYou cringe a little, knowing this man now presents a serious problem.\n*page_break  \n\n\"I can tell from the look on your face you know where I'm goin',\" he chuckles.  \"Well, you can thank me because I saved you a trip.  I grabbed the guns and have them in my hut.\"  \n\nYou exhale deeply, almost certain of what's coming next.  \"Now,\" he says gesturing with the harpoon gun, \"the way I see it is this.  You're up to something on this island.  I don't know what, and I don't care. But whatever it is, you gotta pay a price to keep it quiet.  I'll give you your guns, but it's gonna cost you.\"\n\nYou take one step forward, and he shakes his head.  \"Don't try nothing funny.  I got the drop on you.  I'm a man who's grateful when opportunities fall in his lap, and I'm not gonna let this one pass me by.  I could just kill you and take all your money, but then I gotta dispose of your body, and the harpoon is likely gonna get stuck in your guts and I'll have to go to the mainland to get another one,\" he says.\n\n\"So I reckon you got two options,\" he continues with a leer.  \"You pay me all you got on you and take your weapons and go, or you die and I take your money anyway.  The choice is yours.\"  He chuckles again, that same, horrid coal dropping-down-a-mineshaft cackle.\n\nYou nod but figure you actually have more than just the two options.  Pondering what you're going to do, you decide:\n\n*choice\n  #Give him my money.  I have quite a bit on me but I came here for a reason.\n    While the idea repulses you, you also are pragmatic, and realize that there's no real reason to risk getting a harpoon in the gut. You can always get more money later.\n    *set righteousness %+5\n    *goto pay\n\n  #Try to bluff him into taking less.\n    *if (intelligence > 12)\n      \"Listen,\" you say, \"I get it, and if I was in the same situation, I'd probably do the same thing.  And to be honest with you, it isn't my money, so I don't really care.\"\n\n      The man smiles at you and extends one hand.  \"That's what I like to hear,\" he says.  \"Very smart. That'd be my choice if it was my boss's money.\"  He laughs, and you take advantage of his mirth to shave a few bills off of the roll you have in your pocket.  Rolling the rest into a new wad, you pull it out.  Handing it over, the man fans it.  \"Looks a little light.  This all you got?\"\n\n      Shrugging, you say, \"Why do you think I'm happy to give you all I have?  My boss is cheap.  I can't remember the last time he gave me a bonus, and he pays me next to nothing.  You really think he's going to give me a huge expense account?\"\n\n      The man stares at you, sizing you up for a second.  You quickly add, \"And I'll tell you another thing, if I don't get the weapons from you, that's going to come out of my salary, too.\"\n\n      The man continues to stare at you for a minute longer, as if trying to determine if you're telling the truth, and then laughs.  \"I sure wouldn't want to have your job,\" he says good-naturedly.  He goes into his hut and returns a minute later with a duffel bag.  \n\n      You thank him but he simply responds with a, \"Bah!\", a few unintelligible grumbles, and a dismissive hand gesture before returning to his home.  Only after you've stepped away do you begin to smile.  It's only when you reach the other side of the island that you begin to laugh.\n      *set intelligence +2\n      *set money -500\n      *goto boat\n    *else\n      \"Listen,\" you say, \"I get it, and if I was in the same situation, I'd probably do the same thing.  And to be honest with you, it isn't my money, so I don't really care.\"\n\n      The man smiles at you and extends one hand.  \"That's what I like to hear.  Very smart. That'd be my choice if it was my boss's money.\"  He laughs and you wait for his mirth to die down before speaking.\n\n      \"The thing is,\" you say, \"I already spent my expense allowance.  I wasn't given much to begin with, but it's gone now.\"\n\n      The smile fades from the man's face, and he jabs forward with the harpoon.  It's not meant to hit you, but clearly meant to intimidate.  \"Don't lie to me,\" the man says, \"you still got a job to do—whatever it is—and I know you wouldn't have been stupid enough to spend all your money before even picking up your gear.\"\n\n      The man leers at you.  \"So, I'm going to ask you one last time for your money, then it's your guts on the ground.\"\n      *set intelligence +2\n      *goto pay\n\n  #Distract him then pounce.\n    *if (improvisation > 12)\n      *set improvisation +2\n      \"Listen,\" you say, \"I get it, and if I was in the same situation, I'd probably do the same thing.  And to be honest with you, it isn't my money, so I don't really care.\"\n\n      The man smiles at you and extends one hand.  \"That's what I like to hear. That'd be my choice if it were my boss's money.\"  He laughs, and you wait for his mirth to die down before speaking.\n\n      You reach into your pocket as if you are going to grab your wallet, but instead, dig your foot into the sand.  \n\n      With no hesitation, you kick at the man, spraying a hail of sand into his face.  The distraction works, and you see him grasping at his eyes.  You dart forward instantly, wresting away the harpoon gun by force.\n\n      He turns to run.  You:\n      *label islander_choice\n      *choice\n        #Let him go.\n          You don't want to shoot a fleeing man in the back, even a would-be robber.  \n\n          Watching the man take off into the forest, you know he's not likely to speak about his humiliation—not to mention his attempt at extortion—to anyone.  \n\n          After he's gone, you go into the small hut and retrieve your satchel. Having what you came for, you head for the boat, being sure to dispose of the harpoon gun after wiping it clean of prints.\n          *set righteousness %+5\n          *goto boat\n        #Shoot him.\n          You let loose with the harpoon gun and the spear catches the man in the back.  \n\n          The would-be robber goes catapulting forward, smashing face-first into the sand.  He twitches—once, twice—and then lays still.  \n\n          You look at the man's corpse. On this remote section of the island, no one is likely to find the body for days, if not weeks.\n\n          Walking into the small hut, you retrieve your satchel.  That done, you turn back and head for the boat, being sure to dispose of the harpoon gun after wiping it clean of prints. \n          *set righteousness %-5\n          *goto boat\n        #Tackle him and choke him out.\n          You dive for the robber and catch his leg as he tries to flee.  The would-be robber goes sprawling, smashing face-first into the sand.  A minute later, you have him in a choke hold.  \n\n          Staring at the unconscious man, you know he's not likely to speak to anyone about his humiliation and attempt at extortion when he wakes up.  \n\n          Walking into the small hut, you retrieve your satchel.  Having what you came for, you head for the boat, being sure to dispose of the harpoon gun after wiping it clean of prints.\n          *goto boat\n        #Threaten him with violence until he follows me into the water, then shoot him in the leg and watch him drown.\n          You point the gun at the man's back.  \"Stop or you're going to wind up face first in the sand,\" you say.  The man hesitates for a second and then turns back to you.  Like a deadly spider, you relish the moment your little fly gets caught in your web.  \"Now it's time to have some fun,\" you say with a gruesome smile.  \n\n          \"What are you talking about?\" the man asks.\n\n          \"Get in the water. Now,\" you say, gesturing with the harpoon gun.\n\n          Slowly and reluctantly, the man begins the long march.  You lead him into the deep waters until his thighs are barely visible over the waves.  \"Good luck swimming,\" you say with a grin.\n\n          \"I'm a great swimmer-\" he starts but, before he can finish, your harpoon slams into the inside of his thigh, near the groin.\n\n          As you planned, your shot severs his femoral artery.  Pain registers on the man's face.  He desperately tries to plug the wound even as his blood begins to pool in the water.  You think of what would happen in Australia where a great white shark might immediately hone in on the scent of the blood.  The man flounders, trying to stop the incessant gushing of blood from the gaping hole in his leg.  \n\n          Small waves crash over the man.  You watch as he sucks in his first breath of saltwater.  Another comes, and another.  Finally, the man goes under.  Turning away, you chuckle a little to yourself, thinking, [i]Guess you weren't a good swimmer after all[/i].\n\n          Walking into the small hut, you retrieve your satchel.  That done, you turn back and head for the boat, being sure to dispose of the harpoon gun after wiping it clean of prints.\n          *set psychotic_level %+10\n          *set heat +1\n          *goto boat\n    *else\n      *set improvisation +2\n      \"Listen,\" you say, \"I get it, and if I was in the same situation, I'd probably do the same thing.  And to be honest with you, it isn't my money, so I don't really care.\"\n\n      The man smiles at you and extends one hand.  \"That's what I like to hear.  Very smart. That'd be my choice if it was my boss's money.\"  He laughs, and you wait for his mirth to die down before speaking.\n\n      You reach for your pocket as if you are going to grab your wallet but, at the last minute, dive for a rock.  \n\n      The man seems to pick up on what you're doing because he steps forward, his finger on the trigger of the harpoon gun.  \n\n      You heave the rock and it grazes the side of the man's head.  There's no serious damage, but he's distracted momentarily.  You rush forward as the man lashes out with the harpoon gun and the barbed edge slices your arm.\n      *gosub_scene util health_check_regular\n\n      The wound is painful, but you press on, knowing your life hangs in the balance.  You kick out and feel your foot connect with his groin.  The man doubles over in pain, and you quickly wrest away the harpoon gun by force.\n\n      Seeing the gun in your hand, he turns to run.  You:\n      *choice\n        #Let him go.\n          You don't want to shoot a fleeing man in the back, even a would-be robber.  \n\n          Watching the man take off into the forest, you know he's not likely to speak about his humiliation—not to mention his attempt at extortion—to anyone.  \n\n          After he's gone, you go into the small hut and retrieve your satchel. Having what you came for, you head for the boat, being sure to dispose of the harpoon gun after wiping it clean of prints.\n          *set righteousness %+5\n          *goto boat\n        #Shoot him.\n          You let loose with the harpoon gun and the spear catches the man in the back.  \n\n          The man goes catapulting forward, smashing face-first into the sand.  He twitches—once, twice—and then lays still.  \n\n          You look at the man's corpse. On this remote section of the island, no one is likely to find the body for days, if not weeks.\n\n          Walking to the small hut, you retrieve your satchel.  That done, you turn back and head for the boat, being sure to dispose of the harpoon gun after wiping it clean of prints. \n          *set righteousness %-5\n          *goto boat\n        #Tackle him and choke him out.\n          You dive for the robber and catch his leg as he tries to flee.  The would-be robber goes sprawling, smashing face-first into the sand.  A minute later, you have him in a choke hold.  \n\n          Staring at the unconscious man, you know he's not likely to speak to anyone about his humiliation and attempt at extortion when he wakes up.  \n\n          Walking into the small hut, you retrieve your satchel.  Having what you came for, you head for the boat, being sure to dispose of the harpoon gun after wiping it clean of prints.\n          *goto boat\n\n  #Attack him directly.  There's no way I'm parting with the money without a fight.\n    *if (strength > 12)\n      *set strength +2\n      \"You made a mistake,\" you say. \n\n      The man looks at you for the moment, then says, \"And what's that?\"\n\n      You grin.  \"You messed with me.\" \n\n      The man only has time to mutter a confused, \"Huh?\" before you're on top of him.  \n\n      The man struggles with you over possession of the weapon.  You lash out with a savage knee to the groin, followed by a short elbow to the gut.  The would-be robber goes down in a heap and you're able to wrest the harpoon gun away by force.\n\n      He quickly gets up off the sand and turns to run.  You:\n      *goto islander_choice\n    *else\n      *set strength +2\n      \"You made a mistake,\" you say. \n\n      The man looks at you for the moment, then says, \"What's that?\"\n\n      You grin.  \"You messed with me.\" \n\n      The man only has time to mutter a confused, \"Huh?\" before you're on top of him.    \n\n      The man struggles with you over possession of the weapon.  He's stronger than you expect and able to twist the harpoon gun at what seems like an impossible angle, the barbed edge slicing your arm.\n\n      The wound is painful, but you don't let it distract you, knowing your life hangs in the balance.  Kicking out, you feel your foot connect with his groin and, as he doubles over in pain, you're able to wrest away the harpoon gun by force.\n\n      Seeing the gun in your hand, he turns to run.  You:\n      *goto islander_choice\n\n\n*label pay\n\nAs much as it pains you, you reach into your pocket and withdraw the wad of cash.  You try to think that what you're doing is no different than any other kind of bribe and reason that it's not your money so it doesn't matter.  A part of you thinks that Boris has never asked for any of your travel allowance back, so it technically is your money, but you push those thoughts aside.  \n\nYou place the thick wad of dough into the man's gnarled palm and he flashes you a broad smile.\n\n\"Pleasure doin' business with you,\" he chuckles with his throaty growl.  \"Wait here.\"\n\nThe man walks into his hut and a few minutes elapse.  You begin to think that he's ripped you off, and you're already formulating plans on how to storm the hut, when the man returns, your satchel dangling from one hand.  You notice that he is still holding the harpoon gun.  \n\nThe man grins, seeming to follow your gaze.  \"All sales final, no returns, no exchanges, no receipts,\" he says.  \"That's the return policy.\"  He aims the harpoon gun at you but, with the other hand, he tosses you the satchel.  \n\nThe bag lands at your feet and, without taking your eyes off the man, you bend down to pick it up.  He watches you as you retrieve it and walk away.  Even when you reach the jungle, he's watching you, and you are certain he's still looking long after you've disappeared into the foliage.\n*set money -3000\n*goto boat\n\n*label boat\n*page_break\nAs you return to the beach from the tropical jungle, satchel in hand, you indulge in another moment of admiration at the pristine waters.  [i]Just so beautiful[/i], you think to yourself, as you wait for the approaching boat.  \n\nFew words are exchanged between you and the boat captain as you head to the mainland, trying your best to remain as ignorable as possible.\n\nThe boat ride is smooth, which is to be expected with the placid waters and, as the boat ties up, you quickly depart.  \n\nYou consider a taxi but, not seeing any nearby, you decide to walk to the hotel instead.  As you hit the road, a gorgeous beach on one side, the lush, vegetative jungle on the other, you have no regrets about this decision.  When you see the pack of dogs approaching, though, you begin to reconsider.  \n\n[i]Dammit[/i], you think to yourself, recalling the in-flight magazine about Bora Bora's large canine population, left free to roam.  The three that are rapidly approaching don't look domesticated, however, and are all baring their teeth.  The largest is some kind of mix that looks like a cross between a German Shepard and a Pit Bull.  Remembering the article's warning that there's no hospital on Bora Bora, it occurs to you that it would be best to avoid getting bitten.\n\nThe dogs are getting closer now, issuing low growls.  You decide to:\n*choice\n  #Run.\n    Figuring it to be the easiest option, you back-pedal quickly and, after about five paces, turn and full-on run.  You hear the loud barking of the dogs behind you, giving chase.  \n\n    Glancing over your shoulder, they appear far closer than you'd like, and you step it up a pace.  A good runner, you're able to cover ground quickly, but the dogs are persistent.  The rhythmic \"thromp, thromp\" of their feet on the ground sounds like a ticking time-bomb in your ear, but you do not give up.\n\n    Rounding another bend, you smile when you see the boat dock and, more importantly, the people there.  Almost immediately, you hear the dogs begin to slow and then finally stop.  \n\n    Looking over your shoulder again, winded but unharmed, you see the pack of three dogs now jumping over one another excitedly in what to you looks a little like laughing triumph.  It's as if they're saying, \"Look at the scare we gave the tourist!\"  \n\n    The small crowd gathered on the dock seems to notice as well, and you hear some chuckles coming from the crowd.  Shaking your head, you see a taxi approaching from the distance.  The driver pulls up, and even he seems to be in on the joke.  \n\n    \"Some of the locals aren't as friendly as me,\" he says as you hop in.  You say nothing in return, but resolve not to give him any tip.  You sit in stoic silence for the rest of the ride.\n    *set respect -5\n    *goto hotel\n\n  #Grab one of the sticks from the road and swing it at the dogs.\n    *if (strength > 12)\n      *set strength +2\n      The dogs continue to bare their teeth, but you stand unafraid.  Moving slowly but authoritatively, you take a few steps toward a pile of dried branches.\n\n      The dogs, unimpressed by your actions, move even closer.  Abandoning any attempt at composure, you quickly grab for the largest stick you can find.  The dogs are almost upon you now, the biggest one, no more than an arm's length away.  \n\n      Swinging the stick, attempting to scare the animal away, you find that the close distance makes it impossible not to hit the dog.  The blow is not hard, but it takes the dog in the flank, and you can tell instantly the animal doesn't like it.  \n\n      The dog leaps for you, its mouth open, and you're barely able to get out of the way.  You take a backward step, and that's when you see the second dog, growling ferociously, coming right for you from an angle.  \n\n      You're able to scare this one away without much trouble.  The third dog goes for your leg, but the hours you put in at the gym pay off, and you're able to dodge out of the way, narrowly missing teeth sinking into your flesh.  \n\n      You swing at the dog, and it immediately retreats.  You flail the stick in wide arcs, quickly, and all three dogs now seem to be reconsidering.  The largest one stares at you, with what you can almost read as a remorseful gaze, as if to say, \"we were just trying to see who the visitor was and you attacked us.\"  The other two follow its lead, vanishing into the jungle.\n      *goto hotel\n\n    *else\n      *set strength +2\n      The dogs continue to bare their teeth, but you stand unafraid.  Moving slowly but authoritatively, you take a few steps toward a pile of dried branches.\n\n      The dogs, unimpressed by your actions, move even closer.  Abandoning any attempt at composure, you quickly grab for the largest stick you can find.  The dogs are almost upon you now, the biggest one, no more than an arm's length away.  \n\n      Swinging the stick, attempting to scare the animal away, you find that the close distance makes it impossible not to hit the dog.  The blow is not hard, but it takes the dog in the flank, and you can tell instantly the animal doesn't like it.  \n\n      The dog leaps for you, its mouth open, and you're barely able to get out of the way.  You take a backward step, and that's when you see the second dog, growling ferociously, coming right for you from an angle.  \n\n      You're able to scare this one away without much trouble.  That's when you feel searing pain in your leg.  Looking down, you see the third dog, who'd been lost in the tumult, with its teeth clenched firmly on your leg.\n      *gosub_scene util health_check_regular\n\n      You swing at the dog, and it immediately retreats.  You flail the stick in wide arcs, quickly, and all three dogs now seem to be reconsidering.  The largest one stares at you with what you read as a remorseful gaze, as if to say, \"We were just trying to see who the visitor was and you attacked us.\" The other two follow its lead, vanishing into the jungle.\n      \n      Cursing, you take a look at your leg.  The wound isn't as bad as you'd expected, but you can see the teeth have ripped the skin.  \n\n      You dig into the satchel, hoping for a first aid kit.  Spying a plastic, white box with a red cross, you relax a little.  But upon opening it, you find the kit to be about as basic as they come.  \n\n      Making do with what you have, you clean and dress the wound.  It stings a little, and you hope you don't get an infection. Daubing alcohol onto the punctures, you make a mental note to see a proper doctor when you get back to the States.  Replacing the kit, you continue walking to the hotel, brandishing your new stick for good measure.\n      *goto hotel\n\n  #Check my pack for something edible to throw at them, and prepare to fight if I come up empty-handed.  \n    The dogs approach you, licking their chops expectantly.  Slowly, you reach into your pack, trying to appear innocuous.\n\n    You search blindly, and panic begins to creep over you as you find nothing that seems promising.  Finally, your fingers touch a crinkled, plastic bag, and you pull out the packet of jerky you had used to curb your appetite in transit.  \n\n    The dogs immediately perk up, and their gazes follow your hand.  You laugh a little to yourself, thinking that this must have been what drew the dogs to you in the first place.  \n\n    Opening the bag, you grab some pieces and toss them to the dogs. \n\n    The dogs chomp away until the jerky is gone, then give a few grateful barks before heading back into the forest.  Tucking the empty jerky container into your satchel, you make your way to the hotel.\n    *set righteousness %+5\n    *goto hotel\n\n*label hotel\n*page_break\nThe hotel looks like something from a postcard.  On one side of the road, there's an alfresco restaurant with a few patrons taking their meals and lounging in the shade.  A raised wooden pathway leads to an open-air check-in counter along with a concierge desk off to the side.  \n\nThere are some rooms behind the lobby, but Carmone isn't staying in any of those.  Turning to the other side of the road, you see where your target is lodging.  \n\nExtending from the perfect sandy beaches is a large, wooden dock that curves as it extends into the water.  From both sides, smaller walkways branch off, leading to elevated bungalows.  Designed like traditional huts, the quaint cottages are suspended above the water by massive pylons, and bear thatched roofs and wooden walls.  Each bungalow has a small sunning deck at sea level, and you note that as one potential avenue of attack.  \n\nTurning from the exotic sight, you head over to the concierge.\n*page_break\n\n\"Hello,\" you begin. \"The heat in the South Seas is up there—a lot for an American to handle.  Lucky I brought my sunscreen, since I plan to fish,\" you say, finishing up the predetermined code.\n\n\"Ah, yes, hot and getting hotter,\" the young woman responds, providing her part of the code.\n\n\"Now, I'd like some info on the island,\" you tell her.\n\nIn response, the girl produces a map from behind the desk.  \"Why don't we talk over by the road so I can point out some of the best fishing spots from the map.\"\n\nYou nod, and let her lead the way.  Neither the employees of the hotel nor the patrons so much as give you a second glance.\n\nReaching the road, you smile at the concierge.  \"Nice way to get us off on our own.\"\n\n\"That's what I'm paid for,\" she says with a sly grin.  She even holds up the map to add to the illusion.\n\n\"Now, your guy brought three bodyguards along, all male.  I tried to get them to stay in separate rooms, but he was insistent that they stay together.\"\n\nYou nod, taking it in.  That made four potentially dangerous men to contend with.\n*page_break\n\n\"I took the liberty of calling his room to let him know a few of our local tour guides would likely be coming by to offer him some activities,\" the concierge continues. \"He sounded interested in two of them.  I told him we have a great boat captain who could take him on a tour of the island and he seemed inclined to want to check out Bora Bora by sea.\"  \n\nThe woman looks you up and down as if measuring you with her eyes.  \"The boats that can be used on the inside of the island are typically small, so I told him our boats can only hold two people at a time.\"\n\n\"Good thinking,\" you say, liking the idea that it'd just be you and the target if you went with that option.\n\n\"The only thing is, you're obviously not from here and he might pick up on that, so you'd have to be careful not to tip him off.\"  You nod, ideas already running through your head.  \n\n\"The other tour he said he'd be interested in is taking an outback jeep into the jungle,\" she goes on. \"There's some old artillery from when this used to be a military base in World War II.  It's way up the hill,\" she says, pointing to the giant mountain which forms the center of the island.\n\n\"Up there?\" you ask in exasperation.  \"That's thousands of feet high!\"\n\nThe girl laughs.  \"No, not the mountain itself, but up in the hills surrounding it.\"\n\n\"Oh,\" you say, relieved at how this might be a viable option.  You know you could either send the jeep off a cliff while you duck out or take them to a remote location and shoot it out.  \"How many people does the jeep hold?\"\n\n\"Six,\" she answers.  \"It's standard on the island.\"\n\nYou nod and thank her for her time.  \"The way I see it,\" she says, \"you have two pretty good options.\"  She walks away as though that were a satisfying summary, but the way you see it, you have three pretty good options.  The sea-level deck makes for a good landing where you could sneak in and take out the targets.  The only problem is, it's likely to be close quarters, which means your guns are going to be less effective and you will probably encounter some hand-to-hand combat.  Weighing your options, you decide to:\n\n*choice\n  #Take them on the jeep tour.\n    You reason that it's easier to get them all in the jeep and then worry about dealing with them later.  Heading off to the lot where the vehicles are parked, you already begin formulating plans.\n    *goto jeep\n  #Try to convince Carmone to take the boat tour.\n    You reason it's better to get the target alone for an easier kill, even if it might take a little quick thinking.\n    *goto boat_tour\n  #Sneak in via the deck.\n    You reason that the deck will provide easy access, and you can use the element of surprise to take everyone out in close quarters.\n    *goto deck\n\n*label jeep\n\nWith the keys in your pocket, you wait for Carmone and his crew to arrive.  It's warm, but a pleasant breeze slakes the heat a little, and for that you're thankful.  Carmone is the cautious type, and if he sees you sweating too much, he might mistake it for nervous sweat.  \n\nYou spy the group as they approach the wooden deck connecting the bungalows.  Carmone is a large man with a huge pot belly that protrudes from an unbuttoned Hawaiian shirt.  His bodyguards also don the same island wear, though they're far fitter.  The festive shirts stand in stark contrast to the serious weathered faces that look like they've seen the worst the world has to offer.  Dark hair, dark looks, and beady eyes are fixtures of each of the three bodyguards, and you can tell instantly that they are professional guns.\n\n\"Hi you guys, I'll be your guide today and taking you around the beautiful island of Bora Bora,\" you say, doing your best to sound like a cheery tour guide operator.\n\nCarmone nods to you, and extends his hand, \"Sal,\" he says, \"looking forward to this.\" The hired guns nod politely, but from the looks on their faces, you can tell that they do not share their boss's enthusiasm.  They do, however, file in after Carmone, and you notice the distinctive bulge of a gun in a shoulder holster as you gesture for each man to take a seat.\n\nWhen the jeep is fully loaded, you turn the key and the vehicle rumbles to life.  \"Buckle up,\" you say, and pray that the evasive driving courses you've taken over the years will assist you in this.  \n\nThe jeep is far more cumbersome than it appears and, while the suspension is geared for all-terrain driving, you find that the extra give makes it difficult to maneuver.  \n\nCarmone doesn't seem to take notice, though, as he appears enthralled with the flora and fauna of the island, giant leafy palms on either side of the road providing both shade and entertainment.  You have to admit, while your mind is on your task, it's difficult not to be amazed by the tropical atmosphere.\n*page_break\n\nThe road gets higher and higher, and you point out various kinds of trees, using your limited knowledge of botany as well as what you've read on the in-flight magazines to seem more guide-like.  You find yourself very thankful that Carmone and his crew are not the talkative type, saving you from having to field any questions you might not be able to answer.\n\nThe road continues to rise and, from your study of the map, you know that up ahead will be the spot to make a move if you're thinking of sending the jeep flying over the embankment.  From the height you've ascended, the plummet would be fatal.  It's a switchback turn and, from the large caution signs you saw on the map, you know it's exactly what you would be looking for.\n\nOutwardly, you are telling Carmone about the mating rituals of a particular indigenous bird but, in your head, you are weighing the substantial risks of your plan.  \n\nBesides requiring precision timing to make sure you're able to tuck and roll and get away, the more imminent problem is Carmone's considerable size.  Once he discovers what you have planned, Carmone will probably try to wrestle the wheel away from you.  Even if you are able to get away clean, Carmone also might be able to regain control before the car goes hurtling over the cliff.  Realizing these risks, and seeing the road up ahead jut off suddenly into a vast expanse of sky, you realize that it's now or never. What do you do?\n\n*choice\n  #I decide the risk is worth the reward, and prepare
