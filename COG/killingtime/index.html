he country.\n      *set strength +2\n      *goto breakdown\n\n  #Shoot my way through.  I have the guns and ammo.  It's time to use them.\n    *if (ranged_weapons > 5)\n      You tell Hector to slam on the brakes and turn the vehicle to the side, so you can meet them head-on with a wide range of fire.\n\n      Grabbing an AK-47 from the back, you stand up and use the roll cage of the open-air jeep for stability and let loose a barrage of bullets.  You see bodies torn asunder and vehicles riddled with holes as you continue the onslaught.  Catching them off guard, you're able to mow down almost half of the soldiers before they even begin to return fire.  Now the pressure is really on as you try to avoid being hit while taking them out.\n\n      While the soldiers might have the superior firepower, they are undisciplined and their aim can't hold a candle to yours.  Quickly, but methodically, you take out one soldier after another until none remain.  Checking yourself for bullet holes, you find yourself apparently unscathed. You relax back into your seat in the jeep.  Hector leisurely passes by the wrecking ground that was the barricade. You may have a second to breathe easy now, but your mind quickly turns to how you're going to get out of the country. You're not out of the proverbial woods yet.\n      *set respect +5\n      *set ranged_weapons +2\n      *goto breakdown\n    *else\n      You tell Hector to slam on the brakes and turn the vehicle to the side, so you can meet them head-on with a wide range of fire.  \n\n      Grabbing an AK-47 from the back, you stand up and use the roll cage of the open-air jeep for stability and let loose a barrage of bullets.  You see bodies torn asunder and vehicles riddled with holes as you continue the onslaught.  Catching them off guard, you're able to mow down almost half of the soldiers before they even begin to return fire.  Now the pressure is really on as you try to avoid being hit while taking them out.\n\n      The soldiers teousness %+5\n    *set loved %+5\n    *set respect -5\n    *goto breakdown\n\n*label breakdown\n*page_break\nSinking back in your seat, you're happy to have cleared the obstruction. From the look on Hector's face, you can tell he is as well.  You know that the majority of the search party will be focused on the compound, within the barricade perimeter.  That helps you breathe a little easier but just for a moment.\n\nThere are still miles of road to go to the airport, and word will definitely have spread about Cortez's death by the time you get there.  People on the general's payroll will be suspicious of visitors leaving, but it's better to leave during the chaos and slip out amid the confusion.  Once the general's troops get a firm grip on airport control, escaping under the guise of being a tourist won't be an option.  You just hope that hasn't happened yet.  \n\nPushing that dilemma aside for the moment, hoping your fake papers will hold up when you get there, you concentrate on surveying the jungle for any sign of danger.\n\n*if (worker = \"killed\")\n  The sound of the radio crackling wrests you from your thoughts.  You know it must be your controller because he's the only one with this frequency. You also know that if he's calling you unscheduled, it's not good news. Glancing down, you spot the handset and pick it up.  \n  *page_break\n  \n  \"Hey,\" you say, doing your best impression of a casual tone.  \"What's up?\"\n\n  You take pains to hide the irritation in your voice, but Jones sees right through it.  \"Not happy to hear your friendly neighborhood controller's voice?\"\n\n  \"It's not that, it's just that I know you're not calling me to tell me what a good job I did,\" you say flatly.  \"If you're calling, then something's wrong.\"\n\n  Jones seems to sense your irritation because he says, \"I'm going to get right to the point.  The man you decided to whack, to get the shot…well, it turns out the guy who hired us is none too happy about it.\"  You st f panic, clutches at the wheel.  Without hesitation, you leap back into your own vehicle.  \n\n        As the passenger struggles to regain control, you see the other jeep just behind. You smile as the driverless jeep suddenly lurches out of control and smashes into the other vehicle.  \n\n        The crash is loud, and in that instant, you know you've rid yourself of your pursuers.  As you sit back in your seat, you take time to tend to your wound with a first aid kit.  It's a nasty gash but you've had worse.  Dressing the wound, you turn your mind to the next task: getting out of the country in one piece.\n        *set strength +2\n        *goto airport\n\n*elseif (worker = \"injured\")\n  The sound of the radio crackling pulls you from your thoughts.  Glancing down, you spot the handset and pick it up, wanting to know what your controller wants.  You know it has to be him because he's the only one with this frequency, and you also know that if he's making an unscheduled call, it has to be something bad.\n  *page_break\n  \n  \"Hey,\" you say, pressing down the button on the handset.  \"What's up?\"\n\n  You take pains to hide the irritation in your voice, but Jones picks up on it.  \"Not happy to hear your friendly neighborhood controller's voice?\"\n\n  \"It's not that. It's just that I know you're not calling me to tell me what a good job I did,\" you say flatly.  \"If you're calling, then something's wrong.\"\n\n  Jones seems to sense your irritation because he says, \"I'm going to get right to the point.  The man you decided to shoot in order to get the shot…well, it turns out the guy who hired us is none too happy about it.\"  You start to respond but Jones continues, \"Don't worry, though, he paid in advance, so you'll get your money.\"\n\n  \"That wasn't what I was going to say,\" you respond.  \"Why isn't he happy?\"\n\n  \"Yeah, well, he commissioned the hit because the general had a stranglehold on the local townsfolk and was collecting protection money.  He wants to take over the general's position, and shooting the people he's going to collect from doesn't do him any favors.\"\n\n  \"Would have been nice to know beforehand,\" you say, trying to keep the exasperation out of your voice.  After a second you add, \"Well, it's not like I killed the guy.\"\n\n  \"Yeah, well, he's still pretty pissed you planted a bullet in him.  It's not your fault,\" he says, \"the intel was bad.  The client didn't let us know until after the fact.\"\n  *goto why_not_tell\n*else\n  A jolt shakes you from your thoughts, and immediately you can tell something is wrong with the jeep.  As Hector starts to pull the vehicle to the side of the road, you see a plume of what you hope is just steam rising from beneath the hood. \n\n  Hector curses in Spanish as he gets out of the car to examine the engine.  You grab a pistol from the car and keep it at the ready, just in case it's an ambush.\n\n  Hector fiddles with the engine for a minute before slamming his fist on the side of the jeep.  \"This is no good,\" he says in English, and you hop down from your seat and walk over to examine the problem.  \n\n  Even with your rudimentary knowledge, you can tell that the engine has simply overheated. Knowing the steam from the engine block is sure to attract attention, you act quickly.\n\n  You search the jeep for extra coolant and, finding none, add some water to the coolant reservoir, using a towel to protect your hand from the heat. Inside the vehicle, Hector turns on the heater and waits a few minutes.  After the engine seems sufficiently cooled, steam no longer pluming into the jungle air, you turn to go back to your seat, ready to go.  That's when you see the snake.  \n\n  It's near the rear tire, slithering toward the step to your seat. The creature's beady eyes stare at you from a diamond-shaped head covered with yellow and red scales.  You decide to:\n  *choice\n    #Open fire on it.  I'm a confident enough shot to take it out.\n      *if (ranged_weapons > 5)\n        You pull out your piece and begin blasting.  Bullets ring out in the jungle air, and the snake nearly disintegrates under the hail of fire.  \n\n        What is left is just a pulpy mass.  As you casually stride back to your seat in the jeep, Hector throws you a look of admiration.  \"Impressive, my friend,\" he says, and the two of you continue on your way.\n        *set ranged_weapons +2\n        *set respect +5\n        *goto airport\n      *else\n        You reach for your piece but the snake is faster.  Cursing in pain, you feel fangs sinking into the flesh of your calf.  Reaching out with one hand, you grab the snake just below the head and yank the creature away.  Tossing the snake to the ground, you pump it full of lead, adding a few extra shots for good measure.\n        *gosub_scene util health_check_regular\n\n        Hobbling over to the jeep, Hector takes a long and hard look at your leg, which has already begun to swell.  Then he smiles a little, \"Not that venomous,\" he says after a minute, and you ask him how he can tell.  \n\n        Hector smiles wider, \"Because if it was, you'd be dead already.\"  He laughs and withdraws a snake kit that contains anti-venom.  You sit still, taking deep breaths to slow your heartbeat but the wound still stings.  Shaking your head at the encounter, you know it could have been a lot worse.\n        *set ranged_weapons +2\n        *goto airport\n    #Grab something from the jeep to throw on top of it.  I'm close enough to cover and disorient the sucker.\n      *if (improvisation > 5)\n        Being careful to give the snake a wide berth, you reach into the jeep.  You quickly discount the first thing your fingers come across, an old, leather fedora, as too light and continue your swift search.  \n\n        Your fingers come in contact with a heavy camo jacket and you waste no time heaving it at the snake.  That seems to do the trick as the snake seems to have a difficult time trying to extricate itself from the thick material.\n\n        Slowly and calmly, you climb back into the jeep.  Hector throws you a look of admiration.  \"Impressive, my friend,\" he says before the two of you continue on your way. \"But that was my favorite jacket.\"\n        *set improvisation +2\n        *set respect +5\n        *goto airport\n      *else\n        Reaching into the jeep, you grab the first thing your fingers touch, an old, leather fedora.  You fling the hat at the snake, and your heart sinks as you see the creature quickly dart around the object.\n\n        You don't have time to react and, in an instant, the reptile is upon you.  Cursing in pain, you feel fangs sinking into the flesh of your calf.  \n\n        Reaching out with one hand, you grab the snake just below the head and yank the creature away.  Tossing the snake to the ground, you grab your gun and pump it full of lead, adding a few extra shots for good measure.\n        *gosub_scene util health_check_regular\n\n        Hobbling over to the jeep, Hector takes a long, hard look at your leg, which has already begun to swell.  Then he smiles a little, \"Not that venomous,\" he says after a minute, and you ask him how he can tell.  \n\n        Hector smiles wider, \"Because if it was, you'd be dead already.\"  He laughs and withdraws a snake kit that contains anti-venom.  You sit still, taking deep breaths to slow your heartbeat but the wound still stings.  Shaking your head at the encounter, you know it could have been a lot worse.\n        *goto airport\n    #Scream at it and pretend I'm a larger predator.  I'm reasonably sure that I read about this kind of snake in a book and it's terrified of loud noises.\n      *if (intelligence > 5)\n        Staring the snake dead in the eyes, you raise your hands above your head like some giant bird of prey and begin yelling.  Out of the corner of your eye, you can see Hector gaping at you, bewildered.  The snake, though, slowly starts to slither away and Hector's look changes to one of admiration.\n\n        \"A little knowledge,\" you say after the snake has completely disappeared into the jungle, \"goes a long way.\"\n\n        Slowly and calmly, you climb back into the jeep.  \"Impressive, my friend,\" Hector says before the two of you continue on your way, \"Maybe I need to read a little more.  I'm being put to shame by a foreigner.\"  There is a broad grin on his face.\n        *set intelligence +2\n        *set respect +5\n        *goto airport\n      *else\n        You avert your eyes from the snake and raise your hands above your head like some giant, harmless bird and begin cawing.  Out of the corner of your eye, you can see Hector looking at you in bewilderment and then abject fear.  \n\n        You must have remembered reading about a different kind of snake, because this one just seems more enthralled. Suddenly, the reptile lashes out, leaving you no time to react.\n\n        Cursing in pain, you feel fangs sinking into the flesh of your calf.  Reaching out with one hand, you grab the snake just below the head and yank the creature away.  Tossing it to the ground, you pull out your gun and pump it full of lead, adding a few extra shots for good measure.\n        *gosub_scene util health_check_regular\n\n        Hobbling over to the jeep, Hector takes a long, hard look at your leg, which has already begun to swell.  Then he smiles a little, \"Not that venomous,\" he says after a minute, and you ask him how he can tell.  \n\n        Hector smiles wider, \"Because if it was you'd be dead already.\"  He laughs and withdraws a snake kit that contains anti-venom.  You sit still, taking deep breaths to slow your heartbeat but the wound still stings.  Shaking your head at the encounter, you know it could have been a lot worse.\n        *set intelligence +2\n        *goto airport\n\n*label airport\n*page_break\nThe airport is busy and you're thankful for that.  You know the papers Boris gave you are good, but you also know that sometimes the authorities in these backwater towns pull people aside for questioning with little to no provocation.  And it doesn't help that they're all on the payroll of a maniac like General Cortez.  \n\n[i]Formerly on the payroll of General Cortez[/i], you think to yourself. Even so, you're aware that, because of the assassination, they will likely be even more on guard.  Still, waiting is not an option.\n\nAs if reading the concern on your face, Hector speaks up. \"Listen, my friend, I know this isn't part of the plan, but I have a friend, Angelo, who works at the airport as a porter,\" he says.  \"He can get you through security without them so much as looking at your passport, if you want to talk to him.\"\n\n\"I'm listening,\" you say nonchalantly.\n\n\"Well, airport security is probably on high alert. If you aren't comfortable with your Spanish or your…people skills, you might want to talk to him.\"\n\nYou know where this is going.  \"How much would it cost me?\"\n\n\"For you, my friend,\" he says, \"$1,000.\"\n\n\"That's steep,\" you reply.\n\n\"Not as steep as what the police are going to charge you if they detain you,\" Hector says, adding, \"that is, if they'll let you out at all…\"\n\n*if (wounds = \"uninjured\")\n  *goto airport_choice\n*else\n  \"Okay, give me a second to think,\" you say, signaling to Hector to pull over.  After a few minutes of work, you're able to wipe away any traces that you'd ever been injured.  Feeling a little more confident, you realize that you're going to have to figure out how you want to handle the airport.\n  *goto airport_choice \n\n*label airport_choice\nThinking about Hector's offer you decide to:\n*choice\n  #Talk to Hector's friend.  I'm not sure if my skills will carry me through if things get hairy.\n    After you agree to meet Hector's friend, your companion parks the jeep in the lot.  As you hop out of the jeep, you ask Hector about the arrangements to ship your briefcase with your sniper rifle back to you.  He only laughs.  \"My friend, if you pay off Angelo, you can bring it with you.\"\n\n    You are a little skeptical of Hector's bold proclamation, but still, you don't want to leave your favorite rifle behind if you can avoid it.  Staring at the gun, you decide to take it with you, figuring you can always return it to the car if things don't go smoothly with Hector's buddy.  In the sweltering heat, even the short walk to the terminal gets your clothing slick with sweat.\n\n    You spy a man giving Hector a discreet wave and figure you're looking at Angelo.  The man is middle-aged and thin, his face chiseled and undeniably handsome.  You notice distinct gray in his short-cropped hair, but it seems to complement his tanned skin.  You get the impression from his easy walk that he is quite self-assured.  \n\n    You relax a little since this man seems like he can live up to Hector's promise.  While he is wearing the same drab security uniform as several of the other guards you can see—all of them seeming far too alert for your comfort—his outfit has two small, blue stripes embroidered above his shirt pocket.  It obviously signifies some kind of rank, though you're not sure which one. \n\n    As he gets close, you notice large and somewhat gaudy gold bracelets on both of his wrists.  The jewelry seems to indicate that he's doing something more than just security work.\n\n    With a small hand wave, he signals for you to follow.  You and Hector fall into step behind him.  He leads you to a small recess between terminals where you duck into the shadows.\n    *page_break\n\n    \"Not much time to talk,\" he says.  \"If you're one of Hector's friends, I'm thinking you want to get out of the country without the usual—how should I say—process?\"\n\n    \"Something like that,\" you say, getting right to the point.\n\n    \"Fifteen hundred,\" he says flatly.\n\n    Your eyes immediately gravitate toward Hector.  \"He said a thousand.\"\n\n    \"Sorry,\" he says, \"security is tight today.  Seems the general's been shot.  If you ask me, he had it coming, but the airport is on high alert.\"\n\n    His look seems to say [i]\"and I know you might have had something to do with that.\"[/i] But he politely says nothing on the matter, allowing you to make up your mind.\n    *label angelo\n    *hide_reuse\n    *choice\n      #Pay the man.\n        \"Wise move,\" he says with a smile.  \"You wouldn't want to try to go through the checkpoint right now.\"\n\n        Following Angelo, you bid a quick farewell to Hector, heading for the terminal.  \n\n        *page_break\n        Large fans blow in an effort to circulate the air, but it's still sweltering.  Even though you've paid for protection, you still can't help but sweat a little as guard after guard gives you an icy stare as you pass.  \n\n        Angelo, on the other hand, looks at ease, as if he is strolling down a sandy beach rather than escorting a paid assassin with a briefcase holding a sniper rifle.\n\n        Approaching three long lines leading to the metal detectors, your heart nearly skips a beat.  Angelo flashes you a smile, though, and the two of you keep walking.  Seeing a door that you're sure is for employees only, judging from the large outline of a hand with a giant 'X' through it and the guard standing before it, you realize with abject horror that's just where you're headed.  \n\n        [i]I've been sold out[/i], you think, as you watch your guide shake hands with the guard.  Only when you see the faint glimpse of a bill being pressed into the guard's palm do you relax a little.  A few seconds later, you're walking down a large corridor, bypassing all security.\n\n        As you reach the end of the corridor, passing several closed doors along the way, Angelo beckons you forward, holding open one of two large, industrial-looking doors.  Stepping through, you find yourself on the tarmac.  [i]Can't get more express than this[/i], you think to yourself, but you don't have much time to ponder it as your guide escorts you across one of the runways to your plane.\n\n        Climbing the portable stairs, you can't help but think that you're getting V.I.P. treatment.\n         \n        Angelo does one last currency exchange with the head stewardess, and a second later, you are sitting comfortably, waiting for your flight.  You smile, knowing that you're soon to be flying the friendly skies and bidding Colombia [i]adios[/i].\n        *set money -1500\n        *finish\n\n      #Try to negotiate.\n        *if (improvisation > 5)\n          You begin an elaborate and completely fabricated story about how you'd be happy to pay him anything he asked but all the money you have in your pocket belongs to your boss.  You tell him that if you come back too light of funds, you're going to be in a world of pain.  \n\n          Angelo seems to empathize, obviously accustomed to the kinds of bosses who will take a pound of flesh if the money isn't right.  Finally, he agrees to take you through for five hundred.\n          *set improvisation +2\n\n          *label 500\n          *hide_reuse\n          You decide to:\n          *choice\n            #Thank him and hand over the money.\n              \"Wise move,\" he says with a smile.  \"You wouldn't want to try to go through the checkpoint right now.\"\n\n              Following Angelo, you bid a quick farewell to Hector, heading for the terminal.  \n\n              *page_break\n              Large fans blow in an effort to circulate the air, but it's still sweltering.  Even though you've paid for protection, you still can't help but sweat a little as guard after guard gives you an icy stare as you pass.  \n\n              Angelo, on the other hand, looks at ease, as if he is strolling down a sandy beach rather than escorting a paid assassin with a briefcase holding a sniper rifle.\n\n              Approaching three long lines leading to the metal detectors, your heart nearly skips a beat.  Angelo flashes you a smile, though, and the two of you keep walking.  Seeing a door that you're sure is for employees only, judging from the large outline of a hand with a giant 'X' through it and the guard standing before it, you realize with abject horror that's just where you're headed.  \n\n              [i]I've been sold out[/i], you think, as you watch your guide shake hands with the guard.  Only when you see the faint glimpse of a bill being pressed into the guard's palm do you relax a little.  A few seconds later, you're walking down a large corridor, bypassing all security.\n\n              As you reach the end of the corridor, passing several closed doors along the way, Angelo beckons you forward, holding open one of two large, industrial-looking doors.  Stepping through, you find yourself on the tarmac.  [i]Can't get more express than this[/i], you think to yourself, but you don't have much time to ponder it as your guide escorts you across one of the runways to your plane.\n\n              Climbing the portable stairs, you can't help but think that you're getting V.I.P. treatment.\n              *set money -500\n              *finish\n\n            #Tell him to forget it. I'm going to try my luck with security.\n              *label pass\n              You thank Angelo for his time and head off.  Realizing that you have to do something about your briefcase with the sniper rifle in it, you pause for a moment.\n\n              Do you:\n              *choice\n                #Give the gun to Hector.\n                  \"Listen,\" you tell Hector, \"my papers may be good, but there's no way I'm getting this rifle on board a plane with them.\"  \n\n                  Hector nods, seeming eager to know where this is going.  \"I want you to take this,\" you say. \"I've loved this gun for a long time and I'm entrusting it to you.  You got me here safely and maybe it can protect you and your family.\"\n\n                  Hector smiles broadly, then thanks you with great sincerity.  \"I appreciate that, my friend.  I will not let you down.\"  You hand over the weapon and feel assured that your prized gun is in good hands.\n\n                  Heading to the airport, it occurs to you that you're putting your life in the hands of the forgery artist who created your fake documents.\n                  *set loved %+5\n                  *set righteousness %+5\n                  *goto security\n\n                #Have him smuggle it out of the country on the Syndicate's tab and hope Boris follows through with payment.\n                  \"Listen,\" you tell Hector, \"my papers may be good, but there's no way I'm getting this rifle on board a plane with them.\"  Hector nods, seeming eager to know where this is going.  \"I want you to take this briefcase to a man in Bogota named Vero who runs a gun shop called 'Pistolas.'  It's not hard to find.  You get it there and he'll do the rest to get it back to me in the States.\n\n                  \"I know Boris is paying you to do whatever I tell you, and I'm sure you know what the penalty will be for failure,\" you continue, letting the off-hand threat sink in, \"but if you get it there safely, I'll make sure Boris gives you an extra $300 for your heightened vigilance.\"\n\n                  Hector smiles broadly, and you can tell your idea is well-received.  Knowing that the added incentive will make it far less likely that Hector claims he got robbed on the way or that the gun somehow got confiscated, you feel assured that your prized gun is in good hands.  You also feel good knowing that, while Boris might not be happy with you giving away his money, he will still give you a small bonus for returning with your weapon intact.\n\n                  Heading to the airport, you realize that you're putting your life in the hands of the forgery artist who created your fake documents.\n                  *set money +500\n                  *set boris -5\n                  *set passion %+5\n                  *goto security\n\n            #Try to negotiate him further down.\n              Haggle as you might, Angelo stands firm.  \"I'm sorry,\" he says, \"but I'm not a charity.  I have children to feed.  The price is the price.\"\n\n              You know you're going to have to take it or leave it.\n              *goto 500\n        *else\n          You begin a short, fabricated story about how you'd be happy to pay him, but you really need to hold onto the money for rent.  \n\n          Angelo nods along with your explanation, but tells you that he has his children and his own rent to think of.  You go back and forth with sob stories, but in the end, he says, \"Sorry, my friend, the price is the price.  You take it or leave it.\"\n          *set improvisation +2\n          *goto angelo\n      #Tell him \"forget it\" and try my luck going through alone.\n        Confident in your skills and not wanting to part with your hard-earned money, you decline the offer.\n        *goto pass\n  #Take my chances and pass on the meeting.  I know I'm smart and can think on my feet.\n    After telling Hector that you don't have an interest in meeting his friend, and are willing to rely on your own skills and your carefully prepared papers, his mood seems to darken a bit.  \n\n    [i]Probably was going to get a cut[/i], you think to yourself.\n\n    Hector parks the jeep and you climb out, already eyeing the airport security.  There seem to be armed and alert guards at every entrance scanning for visitors.  Knowing that you have to do something about your briefcase with the sniper rifle in it, you realize that you have a chance to brighten Hector's mood a little.\n\n    Do you:\n    *choice\n      #Give the gun to Hector.\n        \"Listen,\" you tell Hector, \"my papers may be good, but there's no way I'm getting this rifle on board a plane with them.\"  \n\n        Hector nods, seeming eager to know where this is going.  \"I want you to take this,\" you say, \"I've loved this gun for a long time and I'm entrusting it to you.  You got me here safely and maybe it can protect you and your family.\"\n\n        Hector smiles broadly, then thanks you with great sincerity.  \"I appreciate that, my friend.  I will not let you down.\"  You hand over the weapon and feel assured that your prized gun is in good hands.\n\n        Heading to the airport, you realize that you're betting that you're putting your life in the hands of the forgery artist who created your fake documents.\n        *set loved %+5\n        *set righteousness %+5\n        *goto security\n\n      #Have him smuggle it out of the country on the Syndicate's tab and hope Boris follows through with payment.\n        \"Listen,\" you tell Hector, \"my papers may be good, but there's no way I'm getting this rifle on board a plane with them.\"  Hector nods, seeming eager to know where this is going.  \"I want you to take this briefcase to a man in Bogota named Vero who runs a gun shop called 'Pistolas.'  It's not hard to find.  You get it there and he'll do the rest to get it back to me in the States.\"\n\n        \"I know Boris is paying you to do whatever I tell you to do, and I'm sure you know what the penalty will be for failure,\" you continue, letting the off-hand threat sink in, \"but if you get it there safely, I'll make sure Boris gives you an extra $300 for your heightened vigilance.\"\n\n        Hector smiles broadly, and you can tell your idea is well-received.  Knowing that the added incentive will make it far less likely that Hector claims he got robbed on the way or that the gun somehow got confiscated, you feel assured that your prized gun is in good hands.  You also feel good knowing that while Boris might not be happy with you giving away his money, he will still give you a small bonus for returning with your weapon intact.\n\n        Heading to the airport, you realize that you're putting your life in the hands of the forgery artist who created your fake documents.\n        *set money +500\n        *set boris -5\n        *set passion %+5\n        *goto security\n\n      #Have him smuggle it out of the country on my account.  Three hundred bucks upfront is a small price to pay to be almost certain my gun is kept safe.\n        \"Listen,\" you tell Hector, \"my papers may be good, but there's no way I'm getting this rifle on board a plane with them.\"  Hector nods, seeming eager to know where this is going.  \"I want you to take this briefcase to a man in Bogota named Vero who runs a gun shop called 'Pistolas.'  It's not hard to find.  You get it there and he'll do the rest to get it back to me in the States.  \n\n        \"I know Boris is paying you to do whatever I tell you, and I'm sure you know what the penalty will be for failure,\" you say, letting the off-hand threat sink in, \"but I'm going to give you this $300 for your heightened vigilance.\"\n\n        Hector smiles broadly and assures you that your prized gun is in good hands.  You feel relieved knowing that Boris will give you a small bonus for returning with your weapon intact and that he'll be happy you didn't spend his money doing so. \n\n        Heading to the airport, you realize that you're putting your life in the hands of the forgery artist who created your fake documents.\n        *set money +200\n        *set boris +5\n        *set passion %-5\n        *goto security\n\n*label security\n*if (wounds != \"uninjured\")\n  You pause a second and double-check that there's no blood or any other evidence of a wound.  Thankfully, you look presentable.  [i]Here goes nothing[/i], you think to yourself.\n*page_break\nLarge air conditioners struggle in vain against the humidity, and you find the inside of the airport to be just as sweaty and oppressive as the outside.  Seeing armed guards everywhere, you try to act cool as you make your way to the line for the security checkpoint.\n\nThe serpentine queue seems to take forever, but eventually you make it to the metal detector.  You know that that part is easy; the device raises no alarm because you have no weapons on you.  Getting through immigration control and customs, though, is a different story.  That's where the tension will come in.  Pushing these thoughts aside, you collect your small items from a tray to put back in your pocket, and walk on.\n\n\"[i]Hola[/i],\" the customs control officer says, barely flicking his eyes up at you.\n\n\"Hello,\" you say, wanting to seem like a tourist.\n\nYou hand over your paperwork, trying to look bored rather than nervous.  The man in uniform seems to be scrutinizing each word, each letter.  Finally, he hands you back your passport and immigration form.  The man asks you a few routine questions, which you answer with ease, and you are waived through.  \n\nRelief courses through your body as you take a few steps toward the waiting area for the flight.  \"One moment,\" the customs agent says, looking down at his computer screen.  \"I'm looking at your flight.  It says here you were in Colombia for three days.\"\n\n\"Yes,\" you respond.  \"It was only a brief trip.  A little getaway.\"\n\n\"Uh-huh,\" he says, pausing for what seems like an eternity.  \"Can you step over here, please?\"  Immediately, two armed guards seem to close in on you, and you have no choice but to follow the customs agent to a small holding room.  \n\nAs you enter, you note that there are no windows in the room, which has been painted with an austere, white finish.  It looks more like a cell than a holding area.\n\n\"I was just wondering,\" the agent begins, \"since we're having such turmoil with General Cortez being shot, and since you were here for as you call it, a brief trip, why do you have no luggage?\"  Thankfully, your face betrays nothing at the mention of Cortez.  \n\nYou realize that not packing a suitcase was an oversight on Boris's part, but who could have anticipated that word of the general's death would spread so quickly?  [i]He must have been better connected than we thought[/i], you reason, though the notion does you little good in your present plight.  Knowing something must be done, you:\n*choice\n  #Create a cover story.  I know how to think on my feet and I'm smart. I'll think of something.\n    *if (intelligence > 5) or (improvisation > 7)\n      \"It's a little embarrassing, but to tell you frankly, I was robbed.  This is such a beautiful country and I've had such a great time, I didn't really want to mess up my good memories by focusing on how my bags were stolen right after I got here,\" you say.  \n\n      The words come with ease, and as you speak, you feel more and more confident in your story. It helps to recall several you've heard just like it—tourists taken advantage of in all corners of the world by unscrupulous predators.  \n\n      \"It was a taxi,\" you go on, \"I can even remember the driver, big guy, very hairy, but if he was put in a lineup I probably wouldn't be able to pick him out, he always kept his head down.  He was smoking a cigar, too. I remember hating the smell.\n\n      \"Well, when I got to the hotel he said he would get the bags out for me and give them to the bellman while I checked in,\" you go on.  \"I thanked him, paid him, and then he thanked me by taking off with my bags.\"  \n\n      You quickly remember a hole in the tale and add, \"Thankfully, I had my money and my papers on me or I'd be a resident of Colombia a whole lot longer.\"  You pause for dramatic effect, \"Not that that would be a bad thing, though! I do love it here.  I just might be in hot water with the boss when I get back for extending my trip.\"\n      *page_break\n\n      The customs official almost seems to blush.  \"I'm sorry you had that experience in our country,\" he says, with sincerity.  \"People like that ruin it for all of us.  I'm terribly sorry to have delayed you, but I'm sure you can understand.  A very prominent official was just killed, and security is heightened.\"\n\n      You assure him it's no problem at all and he bids you farewell.  You turn and unhurriedly make your way to the waiting area, knowing that you'll soon be relaxing on a plane, another mission completed successfully.\n      *set intelligence +2\n      *set improvisation +2\n      *finish\n\n    *else\n      \"I was robbed,\" you say.  You search the recesses of your mind for details to fill in the story, but you draw a blank.  You don't know if it's just the pressure or what, but for the life of you, you're unable to think of anything further to add.\n\n      As if reading your mind, and the lack of detail, the customs official gives you a questioning look, \"And…?\"\n\n      Not wanting to seem foolish, you say, \"That's it, I was robbed.\"\n\n      The customs official fixes you with a suspicious stare.  \"And you didn't file a police report or try to get you things back?\"\n\n      All you can do is shake your head.  Part of you wants to look to the exit, but you gauge your chance of getting out of the airport alive at absolute zero.  \n\n      Sweat pours down your brow and you feel as if the customs official's eyes are boring into you.  \"Tsk, tsk, tsk,\" he says in a low and sinister voice.  \"Somehow, I just don't believe your story.  Something doesn't seem right.\"\n\n      \"That's the truth,\" you say flatly.\n\n      The customs official seems to ponder it for a moment and you're sure the jig is up.  You're already contemplating taking your very poor chances with the heavily armed security forces, when he says, \"Put your wallet on the table.\"\n      *page_break\n\n      Questions fill your head but in the end you do what he says.  Opening the wallet, he sees your bankroll of $5,000 and says, \"I don't know who you are, nor why you have no luggage, but it seems as if you have no shortage of money.\"  \n\n      The customs agent thinks for a second. \"I guess I can let you off with the suspicion tax,\" he says at last, and in one motion takes the stash and puts it in his pocket.\n\n      He tosses the now-light wallet back to you. You catch it and return it to your pocket.  \"You're free to go,\" he says at last.  \n      *page_break\n\n      Walking toward the terminal, you can't help but smile a little to yourself, realizing that the whole security bit wasn't about Cortez at all.  It was a good old fashioned shakedown.  The official was just using the general as an excuse.  \n\n      You almost chuckle a little, but then remember you're down $5,000.  Oh well. You're going to get paid much more for the mission and your hit was a success.  With those pleasant thoughts in your head, you wait for your plane to arrive so you can bid [i]adios[/i] to Colombia.\n      *set improvisation +2\n      *set intelligence +2\n      *set money -5000\n      *finish\n\n  #Try to bribe the official.\n    \"Listen,\" you tell the customs official, \"I really need to catch my flight so I'm going to make this easy on you.\"  Full of bluster, knowing that money talks, you say, \"I'm rich. The reason I don't have any luggage is because when I go somewhere, I buy what I need, wear it, and then give it away or throw it away.  That way I'm not inconvenienced by having to haul luggage around.\"\n\n    The official looks at you dumbfounded, as if you're some kind of celebrity, the likes of whom he's only read about.  You also see the look you want to see in his eyes: greed.\n\n    \"I'm in a hurry, so why don't I give you a little something for your trouble and we'll call it a day,\" you continue.  The official is beaming as you hand over $500.  He seems to look at you as if that is not enough, so you add another $200 to the bribe.  \"Good,\" you say, a statement not a question.\n    *page_break\n\n    The official looks at you, trying to decide if he should hold out for more.  Finally, he nods.  \"Okay,\" he says, gesturing you toward the exit.  Making your way to the terminal,  you take comfort in knowing it was still cheaper than bribing Hector's friend.  Congratulating yourself on another successful mission, you plop down on one of the terminal chairs and wait for your flight to board.\n    *set money -700\n    *finish\n\n  #Tell him that I must have forgotten it in my taxi. Then rush over to the drop off area appear concerned about my missing luggage.\n    *if (improvisation > 5)\n      \"Thank you so much for telling me!\" you exclaim.  \"I don't know where my mind was.  I need my bag.\"  \n\n      You explain that, in your hurry, you must have left the bag in the loading area.  Trying to look alarmed, you rush out to the taxi drop off.  \n\n      You can sense the official's eyes on you the whole time.  You feign a frantic search and, in the end, you turn back, your shoulders slumped, looking as dejected as possible.\n\n      \"I think the taxi driver must have taken off with it,\" you say, shaking your head.  \"I had a lot of valuables in there.\"\n\n      The customs official almost seems to blush.  \"I'm sorry you had that experience in our country,\" he says, with sincerity.  \"The taxi drivers here are not always the most honest people and one of them probably tried to take your attention away to steal your bag.  I'm terribly sorry to have delayed you, but I'm sure you can understand.  A very prominent official was just killed, and security is heightened.\"\n\n      You assure him it's no problem at all, and he bids you farewell.  You turn and unhurriedly make your way to the waiting area, knowing that you'll soon be relaxing on a plane, another mission completed successfully.\n      *set improvisation +2\n      *finish\n\n    *else\n      \"Thank you so much for telling me!\" you exclaim.  \"I don't know where my mind was.  I need my bag.\"  \n\n      You explain that, in your hurry, you must have left the bag in the loading area.  Trying to look alarmed, you rush out to the taxi drop off.  \n\n      You can sense the official's eyes on you the whole time.  Still, your mind is more on your flight than your cover story, and even you wouldn't buy your performance.  Returning to the official, you hope your little show was enough.\n\n      As if reading your lack of confidence, the customs official gives you a questioning look, \"Well…?\"\n\n      \"It's gone,\" is all you're able to muster.\n      *page_break\n\n      The customs official fixes you with a disbelieving stare.  \"And you're not concerned enough about it to want me to write a report?\"\n\n      All you can do is shake your head.  Part of you wants to look to the exit, but you gauge your chance of getting out of the airport alive at absolute zero.  Sweat pours down your brow and you feel as if the customs official's eyes are boring into you.  \"Tsk, tsk, tsk,\" he says in a low and sinister voice.  \"Somehow, I just don't believe your story.  Something doesn't seem right.\"\n\n      \"That's the truth,\" you say flatly.\n\n      The customs official seems to ponder it for a moment and you're sure the jig is up.  You're already contemplating taking your very poor chances with the heavily armed security forces, when he says, \"Put your wallet on the table.\"\n      *page_break\n\n      Questions fill your head but in the end, you do what he says.  Opening the wallet, he sees your bankroll of $5,000 and says, \"I don't know who you are, nor why you don't have luggage, but it seems as if you have no shortage of money.\"  \n\n      The customs agent thinks for a second. \"I guess I can let you off with the suspicion tax,\" he says at last, and in one motion takes the stash and puts it in his pocket.\n\n      He tosses the now-light wallet back to you. You catch it and return it to your pocket.  \"You're free to go,\" he says at last.  \n      *page_break\n\n      Walking toward the terminal, you can't help but smile a little to yourself, realizing that the whole security bit wasn't about Cortez at all.  It was a good old fashioned shakedown.  The official was just using the general as an excuse.  \n\n      You almost chuckle a little, but then remember you're down $5,000.  Oh well. You're going to get paid much more for the mission and your hit was a success.  With those pleasant thoughts in your head, you wait for your plane to arrive so you can bid [i]adios[/i] to Colombia.\n      *set improvisation +2\n      *set money -5000\n      *finish\n", "death_mask": "*page_break\nHovering over the body of the attacker you slowly lean down, ever aware of the blood streaming from your wound.  The pain seems incredible, but you force your way forward.  Leaning down, ever conscious of the spreading blood, you feel the need to see who has attacked you, broken into your home, your sanctum.  Your fingers touch the cotton mask, and pulling it back, you recoil in horror.  [i]That's not possible,[/i] you think to yourself.  Blinking, though, the image does not go away.  Staring down at the exposed face, you see...yourself. [i]No,[/i] you think, [i] how is this possible?[/i]  But the face staring back at you is your own.\n*page_break\nThe horror filling your mind, pain lancing though your body, you fall backward.  The impact is jarring, but it is nothing compared to the terror you feel.  [i]This just can't be real,[/i] is the last thought you have.\n*page_break\nYour breath comes hard and ragged.  Something far way hurts, but that no longer seems to matter.  You can hear noises, but they all seem far away and don't seem to matter either.  In that moment, you realize the face you saw was nothing more than a delusion from blood loss. Thoughts filter through your mind now, real not imagined, but suddenly they seem less and less important as a warm light seems to envelop you.  In that instant, you realize that you are dying, but a strange sense of calm and peace replaces the pain.  As you realize that this journey is over, and many more await you in the future, you feel a sense of acceptance, and then you move onward into the light.\n*ending", "death_mask2": "*page_break\nHovering over the body of the masked assailant, time seems to slow.  You lean down, ever aware of the blood streaming from your wound.  The pain seems incredible, but you force your way forward.  Leaning down, ever conscious of the spreading blood, you feel the need to see who's caused you such pain.  Your fingers touch the cotton mask, and pulling it back, you recoil in horror.  [i]That's not possible,[/i] you think to yourself.  Blinking, though, the image does not go away.  Staring down at the exposed face, you see...yourself. [i]No,[/i] you think, [i] how is this possible?[/i]  But the face staring back at you is your own.\n*page_break\nThe horror filling your mind, pain lancing through your body, you fall backward.  The impact is jarring, but it is nothing compared to the terror you feel.  [i]This just can't be real,[/i] is the last thought you have.\n*page_break\nYour breath comes hard and ragged.  Something far way hurts, but that no longer seems to matter.  You can hear noises, but they all seem far away and don't seem to matter either.  In that moment, you realize the face you saw was nothing more than a delusion from blood loss. Thoughts filter through your mind now, real not imagined, but suddenly they seem less and less important as a warm light seems to envelop you.  In that instant, you realize that you are dying, but a strange sense of calm and peace replaces the pain.  As you realize that this journey is over, and many more await you in the future, you feel a sense of acceptance, and then you move onward.\n*finish", "death_regular": "*page_break\nThe pain is all over, but you try to fight through it.  Your breath comes hard and your vision blurs.  You grab at the empty air as if it can somehow help you move, then the strength leaves you.  You can hear noises, but they all seem far away.  Thoughts filter through your mind, but suddenly they seem less and less important as a warm light seems to envelop you.  In that moment, you realize that you are dying, but a strange sense of calm and peace replaces the pain.  As you realize that this journey is over, and many more await you in the future, you feel a sense of acceptance, and then you move onward.\n*ending", "la1": "*temp arrival\n*temp tired\n*temp son \"son\"\n*if gender = \"female\"\n  *set son \"daughter\"\n*temp chris_desc \"Christian's muscles bulge beneath a form-fitting shirt.  From his toned body and perfectly coiffed, dark hair to his sleek clothing, it's obvious he likes to give off a clean-cut and stylish look\"\n*temp ben_desc \"On the other hand, Benjamin's frayed jeans and white T-shirt demonstrate a confidence that says he isn't concerned with what others think.  He has the hearty look of an outdoorsman, and his shaggy hair only adds to the image.  He flashes you a warm and inviting smile and you see dimples in his cheeks\"\n*temp sam_desc \"Francisco is more aloof, though you see him watching you as he leans back in his chair, feet on the table.  His face is rugged with stubble, his long locks of raven hair pulled back into a neat ponytail, accentuating his smooth, olive complexion.  His leather biker jacket and metal-studded boots give off an undeniable air of coolness\"\n\nThe plane touches down on the tarmac and the jolt of impact wakes you from your sleep.  It's early in the morning, but in your plush first class seat, it feels like the dead of night.  Adjusting yourself in your seat, you long to just sink back into slumber.\n\nThe flight was turbulent, or so you'd heard from a stewardess who had awakened you in mid-flight to remind you to buckle your seat belt.  That's really all you remember of it as you succumbed to sleep's powerful embrace.  [i]Well-deserved rest after a tough job[/i], you think to yourself, still groggy as the gentleman sitting in the seat beside yours decides to pull up the window shade.\n\nHalf-awake, you reflect on the pleasant dreams you had while resting.  It was one of those rare dreams—so perfect that the afterglow lasted long after.  It was a sublime moment of love, a meeting with a twin soul, the perfect mate.  When you think back on it, you recall only the faintest details.  Still, as you close your eyes briefly, in your mind you relive it all:\n\n*fake_choice\n  #I see his body, toned like a statue, his face radiant, his arms strong.  I remember his smell, fresh and earthy, like a forest spring in a lush glade.  \n    You run your fingers through his hair, holding him close.  He is everything you've dreamed of. And in that moment, all that matters is you and him, together, inseparable for that one moment in time.\n    *set preference \"male\"\n  #I remember her touch is soft, sweet.  I see her hair fluttering in a breeze, her beaming face looking at me kindly as she stands on a beach.  \n    You hold her close.  Her skin is supple, perfect.  Her curves are the way you'd always imagined, her eyes seeming to see only you.  She smells of the spring as she presses her lips to yours, and your arms cannot hold her close enough.  In that moment, you feel a perfection that you've always dreamed of, the kind of love that's only found in fiction and poetry.\n    *set preference \"female\"\n    *set man \"woman\"\n    *set men \"women\"\n    *set ben \"Barbara\"\n    *set ben_nick \"Barb\"\n    *set bhe \"she\"\n    *set bhim \"her\"\n    *set bhis \"her\"\n    *set ben_desc \"${ben}, on the other hand, is more curvaceous.  Her skin is tanned with a few freckles across the bridge of her nose.  She flashes you a warm and inviting smile as she tucks a lock from her stylish bob behind one ear\"\n    *set chris \"Christina\"\n    *set chris_nick \"Chris\"\n    *set che \"she\"\n    *set chim \"her\"\n    *set chis \"her\"\n    *set chris_desc \"${chris}, leaning back in her chair, exudes confidence. Her hair is tied back in a ponytail and her toned arms and sculpted physique are a testament to long hours put in at the gym\"\n    *set sam \"Dolores\"\n    *set sam_desc \"${sam} is more aloof, though you see her watching you from beneath long lashes.  Her large, languid eyes drink you in, and her raven hair and smooth, olive complexion accentuate her statuesque features.  She's wearing a leather jacket and has an undeniably cool edge\"\n    *set sam_nick \"Lola\"\n    *set she \"she\"\n    *set shim \"her\"\n    *set shis \"her\"\n    *set phoenix_male false\n*comment endif\n\nThe streaming rays of early morning sunlight hit your eyes and you squint.  Wishing for your bed, you force yourself to take one deep breath after another.  Your assassin skills kick in quickly, and in short order, you are awake and alert.  \n\nAfter a few moments, you're feeling pretty good.  An overwhelming sense of relaxation flows through you like it always does when you return to the United States.  That sensation seems to exude from your body as the customs officials and immigration officers barely give your paperwork a second glance and wave you through.\n\nAs you make your way through the terminal, you wonder if maybe it's time to indulge a little.  Spying a small airport cafe, you:\n\n*choice\n  #Decide to get a sweet treat.\n    The tantalizing smell of freshly baked pastries fills you with an almost euphoric bliss. After the job you just did, you deserve a little indulgence.  Glancing over the display, you decide on:\n    *fake_choice\n      #A gooey cinnamon roll dripping with white frosting.\n      #A glazed bear claw, flaky and delicious.\n      #A plump doughnut with myriad sprinkles.\n      #An elegant fruit tart with strawberries and cream.\n\n    *if rotund\n      It's a ritual of yours to treat yourself after a job well done, and you're glad you did. Licking the last morsel from your fingertips, you head towards the pickup area.\n      *goto pickup\n    *else\n      [i]Back to my diet tomorrow[/i], you think to yourself, biting into the exquisitely forbidden delicacy.  A strict adherence to an austere diet and plenty of exercise has earned you your well-toned body, but it's a customary ritual of yours after a job well done to loosen the reins a little.  Licking the last remaining morsel from your fingers, you head to the pickup area.\n      *goto pickup\n\n  #Decide to get some coffee but no treat.\n    *set passion %-5\n    The sweet smell of freshly baked pastries fills you with an almost euphoric bliss, but your resolve is firm and order only a cup of joe.  You sip your coffee slowly as you wander away from the cafe. The caffeine does its job and you feel sharper as you head to the pickup area.\n    *goto pickup\n\n  #Decide to forego a treat and keep walking.\n    *set passion %-10\n    You know that dedication is paramount in your profession and you treat your body like a temple.  The smell of freshly baked pastries tempts you, but your resolve is strong and you continue on.\n    *goto pickup\n\n*label pickup\n\nWalking out to the pickup area, you smile as you see the hulking figure of Dante holding a sign that says \"${name}.\" Thinking back on all the good times you've had with Dante, missions completed and beers hoisted, you find yourself overwhelmingly happy to see a familiar face.  Still, a part of you wonders why Boris didn't hire a driver and instead decided to send a teammate to pick you up.\n\nMaking your way over to him, though, you can't help but laugh.  \"Thought I wouldn't recognize you?\" you ask, pointing to the sign.\n\nDante shrugs, returning the smile.  \"I was thinking of donning a monkey suit, but figured that would be over the top.\"\n\nLooking at the T-shirt that is clearly a size too small for Dante's bulging muscles, and the ultra-LA jeans with rhinestones and contrast stitched embroidery, you say, \"Yeah, good thinking.\"  There's a touch of mock sarcasm in your voice because the giant figure of Dante, with his faux-tanned skin and long, black ponytail, would draw attention no matter what he wore.  \n\nBoth of you laugh as if sharing some inside joke.  You give old friend the standard kind of greeting the two of you always share.  You:\n*choice\n  #Crack a few jokes and reminisce.\n    *set passion %+5\n    *goto dante\n  #Discuss the highlights of the latest missions we've both been on.\n    *set passion %-5\n    *goto dante\n  #Give him a warm hug.\n    *set loved %+5\n    *goto dante\n  #Lose ourselves in sarcastic banter.\n    *set loved %-5\n    *goto dante\n  #Have a deep conversation about how much I appreciate his friendship.\n    *set loved %+5\n    *set passion %+5\n    *goto dante\n\n*label dante\nThere's a smile on Dante's face after you finish, and he gives you a solid pat on the back.  \"I'm glad you made it okay,\" he says, flashing his pearly whites.\n\nAs the two of you head to the exit, you make small talk, not wanting to reveal anything about the mission in public.  There will be time enough for that later.  Still, a part of you has to ask, \"As grateful as I am to see you, Dante, I have to know…why did Boris send you?  There are car services you know.\"\n\nDante frowns, but you can tell it's not because of what you said.  \"Let's talk about that later.  Boris wants to meet with all of us right away, and he asked if I could pick you up so we can go straight there.\"\n\nYou find this vaguely unsettling but drop the subject for now.\n*page_break\n\nWalking forward, you find you're barely stiff or sore from the flight.  [i]Just another reason to love first class[/i], you think to yourself with a grin, grateful that Boris decided to spring for the extra fare.  As you near the exit, Dante rushes to open the door for you and nods as if to say \"you've worked hard, let me get this one.\"  You quietly acquiesce, and a tired but comfortable silence hangs between the two of you as you make your way to the car.\n\nThere's no stretch limo; just Dante's Italian sports car, an older, yet still eminently enviable, red Ferrari.  Hopping in the front seat, and hearing the purr of the engine as Dante guns the throttle, you think to yourself:\n*choice\n  #That's it, I'm saving up for a sports car.  \n    Seeing the impressed looks on bystanders' faces as you pull out of the airport parking garage, you redouble your resolve to get one.  You tell yourself that Dante has been in the game a lot longer than you have, and has accomplished far more hits, but a little bit of jealousy is still there.\n    *set passion %+10 \n    *goto car\n  #This should be my car; I should be driving.\n    Seeing the impressed looks on bystanders' faces as you pull out of the airport parking garage, you redouble your resolve to get one.  You tell yourself that Dante has been in the game a lot longer than you have, and has accomplished far more hits, but a little bit of jealousy is still there.\n    *set passion %+5\n    *goto car\n  #This car is a waste of money, only suited for showoffs.\n    Seeing the impressed looks on bystanders' faces as you pull out of the airport parking garage, you can only shake your head.\n    *set passion %-5\n    *goto car\n  #I'm happy for Dante's success, but I can't wait until I reach his level.\n    You tell yourself that Dante has been in the game a lot longer than you have, and has accomplished far more hits, but a little bit of jealousy is still there.\n    *set passion %+5\n    *goto car\n  #I'm proud of my friend, but when I reach his level I'm going to spend my money on other things.\n    Seeing the impressed looks on bystanders' faces as you pull out of the airport parking garage, you actually feel a little awkward.  You tell yourself that when you've been in the game as long as Dante, and have his kind of dough, you're going to spend it on something more worthwhile than a sports car.\n    *set passion %-10\n    *goto car\n\n*label car\n\nTurning your mind from the car, you focus on the other notion that's been crawling around in the back of your head since spotting Dante. \"So, as happy as I am to see you, I have to ask, what's up?\"\n\nAt this, the ever-present grin that's been on Dante's face creases into a frown.  \ ho want to encroach, but Boris seems to think there's something more.  He hasn't said a word about his suspicions, though.  I think he's been waiting until he knows something more concrete.\"\n\nYou nod, running it all over in your mind.  \n*if (wounds = \"uninjured\")\n  As if to dispel the gloomy atmosphere hanging between you, Dante asks, \"Hey, I know Boris said to bring you to HQ ASAP, but he doesn't know what time your flight gets in and there's always traffic in LA, so I was wondering if you want to help me make a few bucks.\"\n  *page_break\n\n  \"What's the deal?\" you ask, wanting to know more before you commit to anything.\n\n  \"There are a couple of guys in Chinatown who owe me for a small side job I did for them.\"  \n\n  You stare at your friend with a stern look of disapproval.  Dante holds his hands up defensively, \"I didn't kill anyone if that's what you're thinking.  Even I know better than that.\"  \n\n  You relax a little at those words.  The last thing you'd want is for Dante to be going rogue.  He's too good a friend and, due to the missteps of Lance, the young, off-the-cuff member of your crew, you've seen the consequences of taking hits on the side.  \n\n  Lance had been with the company for a little less than six months before he decided it was in his best interest to do some freelancing.  While you hadn't had to drop the hammer on him, you'd heard all about it from Chuck, one of your closest friends in the crew.  It was…less than pleasant.  Sinking back in your seat, you ask, \"Okay, so what did you do?\"\n\n  \"Simple muscle job.  These guys run an underground gambling racket.  Guy didn't pay, so I strong armed him, shook him up a little.  Only thing is, now they're trying to strong arm me!  Their guy paid up, but they never gave me my cut.\"\n\n  \"And you need me to do what, exactly?\"\n\n  \"Simple. We go in, you pick your approach, and we get what's mine.  I give you a cut and everyone is happy.  Simple, little detour.  No more than u, \"Don't let her get away! We might need a hostage.\"\n\nWeighing your options you:\n*choice\n  #Grab the girl when she gets close.\n    Reaching out with your free hand, it's a simple matter of snaking your arm around the panicked girl and pulling her close.  \n\n    You expect some kind of fear response from the girl but instead, she stares at you with a steely look of hatred.  You barely have time to register the defiant look before Chan shouts something in Chinese, and the two men raise their hands in surrender.  \"Okay,\" he shouts in English.  \"I'll give you your money. Just don't hurt her.\"\n\n    You say nothing, but simply nod and Chan reaches into his pocket and removes a large wad of bills.  He doesn't even take the time to count it out as he tosses the bundle to Dante.  \n\n    In one quick move, Dante snatches up the money and pockets it.  He nods to you, and you release the hostage.  \n\n    \"Pleasure doing business with you,\" Dante says, and the two of you make a hasty exit.\n\n    Back in the car, Dante pulls out the wad of cash and peels off one one hundred dollar bill after another.  He doesn't stop at the $5,000 he promised, stacking more bills until he's given you another grand.  \n\n    \"Think nothing of it,\" Dante says with a broad smile on his face.  \"That was one cool move, taking the girl hostage,\" he continues.  \"I didn't think you were that ruthless.  Chan was so scared, he gave me way more than he owed.  Bonus for us.\"\n    *page_break\n\n    You smile, pleased with the efficiency and result of the little errand.  \"Now let's get to headquarters, before Boris decides to never give me another bonus in my life,\" you say, and are grateful when Dante steps on the accelerator.\n    *set righteousness %-5\n    *set loved %-10\n    *set money +6000\n    *goto headquarters\n\n  #Point my gun at the girl and tell her to stop or I'll kill her.\n    You train your weapon on the girl, and say, \"Take one more step and you're dead.\" \n\n
