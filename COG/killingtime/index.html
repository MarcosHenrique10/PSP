air.  The bridge divides at the center and retracts inward, cutting off all avenues of escape.  \"Now there's no turning back,\" ${she} says with a devilish twinkle in ${shis} eye.\n  *goto phoenix3\n*else\n  \"Kick all the weapons into the pit, now,\" Phoenix says.  Knowing you have little choice but to comply, you nod, giving permission for the surrender of the firearms.  The weapons slide across the floor and over the edge.  Luckily, your submachine gun bounces to the far side of the pit from the strength of your kick.  You quickly lock eyes with Phoenix, not wanting to tip ${shim} off to the potential accessibility of your weapon. $!{she} seems not to notice, because all ${she} says is, \"Isn't that better?\"\n\n  \"Now you, and you alone, cross the bridge,\" ${she} commands.  Slowly and hesitantly, you do as you're asked and, as soon as you reach the far side, Phoenix presses a button on ${shis} chair.  The bridge divides at the center and retracts inward, cutting off all avenues of escape.  \"Now there's no turning back,\" ${she} says with a devilish twinkle in ${shis} eye.\n  *goto phoenix3\n\n*label phoenix3\n\n\"You're probably wondering why I didn't kill you,\" Phoenix says.\n\nYou respond:\n*fake_choice\n  #\"That thought had crossed my mind.\"\n  #\"Are you going to stand there blathering all day or are you going to tell me?\"\n  #\"Not really.\"\n  #By staying silent.\n\n\"Well, I'll tell you,\" ${she} says.  \"I rose through the ranks from nothing.  I was an orphan and had to fight every day of my life.  I fought for survival at the beginning, in foster homes to keep from being bullied.  Later, I fought for money and profit, and realized I was quite good at it.  But in all this time, I've never met a warrior who I thought might be my equal.  In you, I see a real potential rival.  But I have to find out.  We need to settle this hand-to-hand.  What do you say, shall we see who's best?\"\n\nYou tell Phoenix:\n*fake_choice\n  #\"You're crazy.\"\n  #\"I've been looking forward to this.\"\n  #\"I'd have it no other way.\"\n  #\"Bring it on.\"\n  #\"Seems like I don't have any other choice, now do I?\"\n  #Nothing.\n\n\"Nothing more needs to be said, then; it's time to test our mettle.\"  Phoenix rushes forward, and you note that, even though ${she} professes to want to know who is the better fighter, ${she} doesn't drop the blade in ${shis} hand. $!{shis} strong legs make for long strides, and you know ${she}'ll be on you in a second.  You decide the best way to approach this very dangerous foe is:\n\n*fake_choice\n  #Adopting a counter-puncher approach.\n  #Adopting an aggressor approach.\n  #Mixing it up, and constantly varying your approach.\n  #Getting into a stance where you can quickly try to dive for something to use as a distraction.\n\nPhoenix comes fast, and you're barely able to get into a fighting stance. $!{shis} knife blade swishes toward you, and you narrowly duck out of the way.  You strike with a right cross, but Phoenix slips the blow, ducking under your arm and firing back with an uppercut with the hand not holding the blade.  You're able to bring your arm back in time and block the blow by pressing your elbows together and covering up.  Phoenix fires ${shis} own cross, this one more of a slash with the blade in hand.  \n\nYou're barely able to sidestep the blow, taking a few backward paces.  Spying a freestanding lamp to the side, and knowing you're in need of a distraction, you dive for it, waiting until Phoenix gets close before tipping it toward ${shim}.  The luminous bulb shatters, spilling glass all over the leader of the Fallen Angels.  \n\nYou grab for your weapon resting atop the glass shards but, before you can take aim, you feel a sharp pain as Phoenix's boot lashes across your jaw.  You suck up the pain and get Phoenix in your sights, but ${she} follows up with a quick kick, sending the weapon flying out of your hands.  From your intense training, you're quick enough to duck away from the spinning crescent kick that comes next, the blow seeming hard enough to take your head off.\n\nHaving dodged the strike, you're able to regain your composure.  Phoenix is relentless, though, pressing forward. $!{she} lashes out with ${shis} blade.\n\n*if (miami_partner = \"none\")\n  *goto duck\n*else\n  You hear ${miami_partner} screaming for you to duck.\n  *goto duck\n\n*label duck\n*page_break\nYou're able to duck the blow much in the same manner as Phoenix did before, a classic boxing slip, and from the smile on ${shis} face, you can tell ${she}'s enjoying this.  The smile dies on ${shis} face, however, as you don't counter with an uppercut, but instead improvise and go to the body, catching ${shim} with a left hook to the gut. $!{she} bends slightly as your blow catches ${shim} unaware, and you follow up with a low right kick which buckles ${shis} leg and takes ${shis} foot out from under ${shim}.  \n\nPhoenix drops to the ground, and you follow ${shim} down, hoping to mount an attack. $!{she} regains ${shis} composure almost immediately, though, jutting ${shis} legs into a butterfly guard position, ${shis} shins on the inside of your thighs.  You're unable to get enough pressure to get into ${shis} guard, and ${she}'s able to hoist you off balance.\n\n*fake_choice\n  #I try to press my body weight down.\n  #I try to twist my body to get in ${shis} guard.\n  #I grab for ${shis} wrists.\n  #I get prepared to be thrown off.\n\nPhoenix's jiu-jitsu is extraordinary, and ${she}'s stronger than you would have expected.  Rotating to ${shis} side, while kicking upward with ${shis} left leg, ${she} attempts to sweep you and flip you onto your back.  You see where the move is going and, not wanting to wind up with ${shim} on top of you in the mount position, you break ${shis} grip and free yourself, letting the momentum carry you to the side.  \n\nYou still wind up on your back, but without Phoenix and ${shis} blade atop you.  Out of the corner of your eye, you spy the fish tank, with all its exotic and deadly sea life, and an idea strikes you.  Seeking to lure Phoenix closer, you scramble to your feet and take a few backward steps.  Trying to buy time, you say:\n\n*fake_choice\n  #\"You're good.\"\n  #\"I'm impressed.\"\n  #\"I'm not impressed.\"\n  #\"Bring it.\"\n\nPhoenix only smiles, ${shis} blade flashing in ${shis} hand.  You take step after step backwards, doing your best to feign fear.  Phoenix's cruelly beautiful eyes flash as ${she} takes measured steps, stalking you.  \n\nYour feet touch the base of the tank and you stop, digging into a fighting stance. \"Nowhere to run now,\" Phoenix says, taking a moment to enjoy the situation before lunging forward. Instead of ducking or being defensive, you move toward the blow.  It's only when you see the look of confusion in Phoenix's eyes, that you know you have ${shim}.  \n\nPhoenix wasn't expecting your unconventional move and you're able to grab ${shis} forearm with your left hand, gripping it tightly and sliding your grasp down to control ${shis} wrist to further limit ${shis} options.  \n\nYou see a look of uncertainty—maybe even fear—in Phoenix's eyes as you move close to ${shim}, yanking ${shis} arm toward you, pulling ${shim} off balance.  From this very small distance, you turn your hip to the side and slam it into ${shis} abdomen.  Using ${shis} own body against ${shim}, you pivot, your body like a fulcrum, and heave Phoenix forward in a powerful hip toss.  Caught off guard and off balance, the Fire ${lord} goes flying.\n\nYou cringe a little as ${shis} body impacts with the glass, spidery tendrils marring the surface.  The crash is ominously loud, and Phoenix falls to the ground at the base of the tank.  The fine webs in the glass crawl farther and farther, like the crackle of ice breaking on a frozen lake.  Anticipating disaster, you decide to put some space between yourself and the tank. The water begins to seep out, slowly at first, and then, as the pressure becomes too great, the entire tank shatters.\n*page_break  \n\nGallon upon gallon of salty water gush over Phoenix and you hear ${shim} gasp for breath. $!{she} struggles against the onslaught as an ocean of captive water engulfs ${shim}.  The pour is steady and strong, and you watch as Phoenix gulps for air.  After what seems like an eternity, the entire room soaked, you see the leader of the Fallen Angels barely breathing, ${shis} body covered with flopping fish.  One in particular looks exceptionally venomous, a giant stinger at the end of its tail just inches from Phoenix's neck.  \n\nThe leader of the Fallen Angels sputters, \"I guess we found out who was best,\" ${she} says. $!{shis} eyes lock on the fish and you know ${she}'s thinking the same thing you are, with the fish out of it's habitat, drowning in the fresh air, it won't be long before it panics and puts an end to Phoenix.  \n\nRealizing you hold ${shis} life in your hands, you choose to:\n\n*choice\n  #Save ${shim} and let ${shim} go.\n    *set righteousness %+5\n    *set passion %+5\n    *label phoenix_joins\n    Stepping forward, you quickly kick the fish away, being careful not to get stung in the process.  \n\n    Phoenix's chest heaves, and you realize that ${she} had been holding ${shis} breath. $!{she} smiles up at you and you can see the admiration in ${shis} eyes.  After a moment, Phoenix whispers, \"Thank you.\"  \n\n    Slowly, as if ${she}'s awakening from a dream, or somehow still believes ${she}'s in one, Phoenix lifts ${shim}self to ${shis} feet. $!{she} gestures, almost as if ${she}'s going to hug you, and you can see the glint of welling tears.  \"I don't know what to say,\" ${she} utters.  \"You saved me.  Even after I tried to kill you.\"\n\n    You nod, pleased with your choice.  \"I did,\" you say.\n\n    *if arrest_phoenix\n      \"I don't know how to thank you,\" ${she} says.  \"You know, you really are someone special.\"  Precious as the moment is, you tell Phoenix, \"I'm going to have to turn you in.\"\n\n      $!{she} looks at you sadly, the heartbreaking expression contorting ${shis} gorgeous face.\n    *if arrest_phoenix = false\n      \"I don't know how to thank you,\" ${she} says.  \"You know, you really are someone special.\"  A moment hangs between you and, for the first time in a long time, you don't know what to say.  In the end, it's Phoenix who nods to you, gracefully, almost a bow.  With that, ${she} turns, walking toward an exit behind ${shis} massive chair.  You stand there for a moment in silence, thinking.\n    *page_break\n    *if (loved > 45)\n      You stay quiet, unsure of your emotions.  \"You feel it too, don't you?\" Phoenix asks, and you turn, seeing ${shis} perfect features as ${she} smiles at you.  For the first time in a long time, you have no idea what to say.  \"It's like we shared something, ${name}.  For quite some time, I've heard heartwarming stories about you, how you are so well-loved.  You can see how that would be intriguing in this line of work.  But meeting you now, seeing you here, I understand.  Our personal histories don't matter, what you and I shared just now was unique and incredibly special.\"\n\n      You find yourself nodding.  \"It's as close to death as one can possible be,\" Phoenix says.  \"And we danced that intoxicating tango of mortality together, but both lived to tell the tale.\"  As ${she} speaks, you know what Phoenix says is true.  \"Our world is violence and exists on the very cusp of death; and no one can truly understand that unless they've experienced it themselves.  I feel like I've known you forever.  We share a bond now.  Through this ugly, primeval, exquisite, enthralling experience, we became linked together.\n\n      \"You can't turn me in,\" Phoenix continues.  \"It's in your eyes.  Not after that.  I want to be with you, ${name}, and not just as a partner in crime but as a partner in life, in love.  You're the best assassin I've ever known, and together, we could make this world ours.\"  $!{shis} beautiful eyes imploring, Phoenix waits for your answer.\n      *if (miami_partner = \"none\")\n        You stare at Phoenix for a moment, ${shis} beauty almost heartbreaking, your respect for ${shis} skill and what ${she} has done with ${shis} life unparalleled.  You decide to say:\n        *choice\n          #\"I feel the same way.  I want you, too.\"\n            Instantly smitten, like a lost soul who, at long last, has found a worthy mate, Phoenix approaches. $!{she} throws ${shis} arms around you, and the two of you embrace, your heart racing in your chest.  \n\n            $!{shis} kiss is salty with sweat and seawater, but sweet all the same, and you realize that this is what you wanted all along. You realize, however, that you have one last piece of unfinished business: Boris.\n            *set miami_partner \"Phoenix\"\n            *set mp_nick \"Phoenix\"\n            *finish\n          *if arrest_phoenix\n            #\"What we shared was something special, I'll admit, but I just don't feel that way about you.\"\n              Phoenix stares at you for a moment before replying.  \"If that's the way you feel…\" ${she} says in an icy, detached tone.  Phoenix walks out slowly, and you can hear ${shis} footfalls as they recede.  Your mind is elsewhere, though, knowing you have one last piece of unfinished business: Boris.\n              *finish\n          *else\n            #\"What we shared was something special, I'll admit, but I have to turn you in.\"\n              *goto resigned\n      *else\n        You stare at Phoenix for a moment, ${shis} beauty almost heartbreaking, your respect for ${shis} skill and what ${she} has done with ${shis} life unparalleled.  \n\n        \"You can't be taking ${shim} seriously, ${name},\" ${miami_partner} says.\n\n        You look Phoenix in the eyes and say:\n        *choice\n          #\"I feel the same way.  I want you, too.\"\n            Instantly smitten, like a lost soul who, at long last, has found a worthy mate, Phoenix approaches. $!{she} throws ${shis} arms around you, and the two of you embrace, your heart racing in your chest. \n\n            $!{shis} kiss is salty with sweat and seawater, but sweet all the same, and you realize that this is what you wanted all along. \n\n            You hear sobbing as ${miami_partner} screams, \"How can you do this to me?  After all we've been though?\"  You're in another world, though, enamored with Phoenix, and you hardly even register ${miami_partner} running out the door.  \n\n            You can't bear to let each other go but, even as you caress in rapturous joy, you realize that you have one last piece of unfinished business: Boris.\n            *set miami_partner \"Phoenix\"\n            *set mp_nick \"Phoenix\"\n            *finish\n          *if arrest_phoenix\n            #\"What we shared was something special, I'll admit, but I'm with ${miami_partner}, and I just don't feel that way about you.\"\n              Phoenix stares at you for a second before answering.  \"If that's the way you feel…\"  ${she} says in an icy, detached tone.  Phoenix walks out slowly, and you can hear ${shis} footfalls as they recede.  \n\n              Once Phoenix is gone, you walk over to ${shis} chair and press the button to reconnect the bridge over the man-made moat.  As soon as it connects, ${miami_partner} races up to you and embraces you tightly.  \n\n              Joy fills your heart, but even as you revel in holding ${miami_partner} close, you can't indulge fully in the moment, knowing you have one last piece of unfinished business: Boris.\n              *finish\n          *else\n            #\"What we shared was something special, I'll admit, but I have to turn you in.\"\n              Phoenix nods, seeming resigned to ${shis} fate.  You're able to find a short length of rope and you tie ${shim} to her chair.  Once that is done, you press the button to reconnect the bridge over the man-made moat.  As soon as it connects, ${miami_partner} races up to you and embraces you tightly.  \n\n              Joy fills your heart, but even as you revel in holding ${miami_partner} close, you can't indulge fully in the moment, knowing you have one last piece of unfinished business: Boris.\n              *finish\n    *else\n      *if arrest_phoenix\n        *label resigned\n        Phoenix nods, seeming resigned to ${shis} fate.  You're able to find a short length of rope and you tie ${shim} to the bridge, knowing ${she} won't be going anywhere anytime soon.  That done, you turn away, your mind already elsewhere, knowing you have one last piece of unfinished business: Boris.\n        *finish\n      *else\n        Phoenix walks out slowly, but your mind is already elsewhere, knowing you have one last piece of unfinished business: Boris.\n        *finish\n\n  #Save ${shim}, but tie ${shim} up and turn ${shim} into the authorities.\n    *set righteousness %+5\n    *set passion %-5\n    *set arrest_phoenix true\n    *goto phoenix_joins\n  #Let ${shim} die.\n    *set righteousness %-5\n    *set passion %-5\n    \"Goodbye, Phoenix,\" you say, and ${she} sighs, seeming to have expected it to go this way.  It doesn't take long until the thrashing begins.  Phoenix tries to get the fish away from ${shim}, but ${she} is not in a good position, and ${shis} sudden movement only makes the fish strike faster.  The spiny tail digs into Phoenix's neck and the reaction is almost instantaneous.  \n\n    Phoenix's flesh turns purplish as the venom spreads up ${shis} neck and face.  The Fire ${lord} sputters, unable to breathe, and ${shis} death, as excruciating as it looks, is mercifully short and quick.\n\n    [i]Cut off the head and the body will die[/i], you think to yourself, knowing that the Fallen Angels are no more.  Now, there's one last piece of unfinished business: Boris.\n    *finish", "paris": "*temp choice\n*set wounded_here false\n\nSitting in the back of the black sedan you concentrate on s a botched attempt on the Saudi Arabian royalty.  \n\nA part of you knows that it will likely be easier to kill everyone involved, including the royals, \n*if psychotic_level > 12\n  even if you're not getting paid for the extra carnage.\n*if psychotic_level \u003c= 12\n  but the thought tugs at your conscience.  \nEither way, it's not a decision you have to make right now.  Judging from the dossier, it's clear that the plan is for Andre to take the royals on a tour of the Eiffel Tower and then treat them to a nice meal along the Champs Élysées.  The file indicates there will be multiple ways to take out the target at each location.\n\nFrom the looks of things, if you opt for the Eiffel Tower, you could plant a bomb to eradicate the target from afar, or get a good shot from a neighboring hotel. Thoughtfully, a room has been booked at the hotel that overlooks the landmark if you preferred a sniper-shot.\n\nOn the other hand, the staff at the Parisian café on the Champs Élysées have all been paid off.  It would be the perfect location to whip up some poison or to plant a small bomb.  Judging from what you're seeing out the window, a well-placed shot would be out of the question because of the hubbub on the street.  In the end, you choose:\n*choice\n  #The Eiffel Tower.\n    The Eiffel Tower seems like the perfect location to take out the target, and you feel confident in your choice.\n    *set choice \"tower\"\n    *goto contact\n  \n  #The café on the Champs Élysées.\n    The café seems like the perfect location to take out the target, and you feel confident in your choice.\n    *set choice \"cafe\"\n    *goto contact\n\n*label contact\n\n\"Okay, I've decided,\" you tell your companion, explaining where the hit will take place.  You lean back in your seat.  Already, scenarios begin to run through your mind of how you're going to accomplish the task.\n\n\"We'll take a turn here and swing by the contact point to pick up our gear,\" ${paris_partner} informs you.\n\nAfter a few minutes of riding in silence, ${paris_partner} speaks up, seeming to not like the quiet.  \"You know, I feel like, in this profession, we get to do a lot of good.  Sure, we're killing people, but most often they're people who deserve to be killed.  Like this guy.\"\n\nYou respond:\n*choice\n  #\"I don't care who I kill, it's just a paycheck to me.\"\n    *set righteousness %-5\n    *if (paris_partner = \"Marie\")\n      ${paris_partner} is silent for a moment and then speaks up.  \"I guess everyone has their own reasons, but for me, I like that we're on the side of good.\"\n      *goto paycheck_response\n    *elseif (paris_partner = \"Chuck\")\n      ${paris_partner} laughs.  \"I'm with you there, but I still think there's some good in what we do.\"\n      *goto paycheck_response\n    *else\n      \"Not quite sure I share your view on that one,\" ${paris_partner} says.  \"We do provide a lot of justice with what we do.\"\n      *goto paycheck_response\n\n    *label paycheck_response\n    \n    You respond:\n    *choice\n      #\"Just keep telling yourself that.\"\n        *set loved %-5\n        ${paris_partner} frowns and says, \"I will, because I believe it.\"\n\n        After the exchange, you both fall silent, lost in thought.\n        *goto car\n      #\"I don't think there's good or evil, it's just what you do or don't do.\"\n        *set passion %-5\n        ${paris_partner} shrugs and says, \"Like I said, everyone has their own reasons.  And own motivations, I guess.\"\n\n        After the exchange, you both fall silent, lost in thought.\n        *goto car\n      #\"I don't quite share that view, but I respect it.\"\n        *set loved %+5\n        ${paris_partner} smiles and says, \"I appreciate that.  Like I said, everyone has their own reasons.  And own motivations, I guess.\"\n\n        After the exchange, you both fall silent, lost in thought.\n        *goto car\n      #\"I can see how you look at it that way.\"\n        *set passion %+5\n        ${paris_partner} smiles and says, \"I like that you keep an open mind.  I think everyone has their own reasons, and their own motivations, but it takes something special to be able to see another person's point of view.\"\n\n        After the exchange, you both fall silent, lost in thought.\n        *goto car\n      #\"There is some joy in that as well.\"\n        *set righteousness %+5\n        ${paris_partner} smiles and says, \"See, you're coming around.\"\n\n        After the exchange, you both fall silent, lost in thought.\n        *goto car\n        \n  #\"I like the killing, no matter who it is.\"\n    *set loved %-5\n    *set righteousness %-5\n    *set psychotic_level %+5\n    *if (paris_partner = \"Marie\")\n      ${paris_partner} is silent for a moment and then speaks up.  \"I guess everyone has their own reasons, but for me, I like that we're on the side of good.\"\n      *goto paycheck_response\n    *elseif (paris_partner = \"Chuck\")\n      ${paris_partner} laughs.  \"I'm with you there, I love the killing.  But I still think there's some good in what we do.\"\n      *goto paycheck_response\n    *else\n      \"Not quite sure I share your view on that one,\" ${paris_partner} says. \"I enjoy it when it's a righteous kill.  What keeps me going is that we provide a lot of justice with what we do.\"\n      *goto paycheck_response\n\n  #\"No one deserves to die. Sometimes, it's just a necessity.\"\n    *set righteousness %+5\n    *if (paris_partner = \"Marie\")\n      ${paris_partner} is silent for a moment and then speaks up.  \"I guess everyone has their own reasons for what they do. For me, I like that we're on the side of good. We're taking out bad people.\"\n      *goto paycheck_response\n    *elseif (paris_partner = \"Chuck\")\n      ${paris_partner} laughs.  \"I think there are a lot of people who deserve to die and we just make it happen.  Still, I think there's some good in what we do.\"\n      *goto paycheck_response\n    *else\n      \"I agree,\" ${paris_partner} says.  \"But I do think that we do provide a lot of justice with what we do.\"\n      *goto paycheck_response\n      \n  #\"I like being the justice that the law sometimes can't provide.\"\n    *set righteousness %+5\n    *set loved %+5\n    *if (paris_partner = \"Marie\")\n      ${paris_partner} is silent for a moment and then speaks up.  \"That's exactly how I feel.  It's like we're righteous assassins, bringing the justice to the world.\"\n\n      After the exchange, you both fall silent, lost in thought.\n      *goto car\n    *elseif (paris_partner = \"Chuck\")\n      ${paris_partner} chuckles.  \"I'm with you on that one.  But I also love the thrill of the kill.\"\n      *goto car\n    *else\n      ${paris_partner} is silent for a moment and then speaks up.  \"That's exactly how I feel.  It's like we're vigilantes, bringing justice to the world.\"\n\n      After the exchange, you both fall silent, lost in thought.\n      *goto car\n\n  #\"I'd do this for free if it meant ridding the world of monsters.\"\n    *set righteousness %+5\n    *set passion %+5\n    *if (paris_partner = \"Marie\")\n      ${paris_partner} is silent for a moment and then speaks up.  \"That's exactly how I feel.  It's like we're righteous assassins, bringing justice to the world.\"\n\n      After the exchange, you both fall silent, lost in thought.\n      *goto car\n\n    *elseif (paris_partner = \"Chuck\")\n      ${paris_partner} chuckles.  \"I'm with you on that one.  But I also love the thrill of the kill.\"\n      *goto car\n\n    *else\n      ${paris_partner} is silent for a moment and then speaks up.  \"That's exactly how I feel.  It's like we're vigilantes, bringing justice to the world.\"\n\n      After the exchange, you both fall silent, lost in thought.\n      *goto car\n\n*label car\n\nA few minutes later, you find yourself in the massive square before Notre Dame, the sinuous, blue Seine river running alongside.  ${paris_partner} parks the car and you both step out, crossing the courtyard to the famed cathedral.  \n\n\"She's going to meet us right around here with our gear,\" ${paris_partner} informs you. \"The woman is new to the city, but has already established quite a network.\" \n\nYou eye the crowd looking for someone to give you a signal.  Knowing Paris has strict security, you and Boris had thought it best not to try to smuggle any firearms aboard.  From all accounts, this connection was well-supplied and would give you not only guns and ammo, but materials to make explosives.\n\nSeeing a disheveled woman catch your attention, you think you may have found your connection.  \n\nWalking forward, you say, \"Good to be an American in Paris,\" using the predetermined code words.  The woman just stares at you and then extends one hand, saying, \"[i]Aidez-moi, s'il vous plaît[/i]?\"  Cursing to yourself, you realize that she's no contact, she's just a beggar asking for help.\n\nYou decide to:\n*choice\n  #Give her a small amount of money.\n    You dig deep into your wallet, pulling out a few euro and giving them to the woman.  She flashes you a bright smile, and while it might have cost you a few bucks, the gratitude she expresses makes it well worth it.  You can also see ${paris_partner} giving you a look of approval.  \n\n    Gesturing, you signal to your partner that it's time to find the real connection.  \n    *set money -5\n    *set righteousness %+5\n    *set charity +1\n    *goto connection\n\n  #Tell her to get lost.\n    Irritated, you say a few choice words to the woman.  She flashes you a look of disgust, but the one on your face clearly trumps hers.\n\n    \"Beggars,\" you grunt to your partner.  You can also see ${paris_partner} giving you a blank look that is not altogether approving of your actions but not quite condemning.  Brushing it aside, you gesture and signal that it's time to find the real connection.\n    *set righteousness %-5\n    *goto connection\n\n  #Push her away physically.\n    Irate at the woman and her audacity, you strong-arm her back.  \"Stay away, beggar,\" you say, as she staggers back from the force of your push.  \n\n    You chuckle to yourself, having underestimated your strength.  The beggar gives you the evil eye but you just laugh it off. Turning to your partner, you can see ${paris_partner} giving you a disgusted look.  Shrugging it off, you gesture and signal that it's time to find the real connection.\n    *set righteousness %-10\n    *set loved %-5\n    *goto connection\n\n*label connection\n\nSpying a svelte woman wearing all black and reading Machiavelli's [i]The Prince[/i] at a table at a nearby café, you figure that she must be the connection.  When she looks up and locks eyes with you, you know you're correct.\n\n\"Good to be an American in Paris,\" you say confidently.\n\n\"Friends of Boris are friends of mine,\" she replies.\n\n\"And friends of Boris are friends indeed,\" you say, completing the code.\n\nThe slim and unusually pale woman, who somehow strikes you as an artist sans the beret, looks at you questioningly.  \"I was just about to introduce myself,\" she says, \"What made you think I was the connection?\"\n\nYou point to the book.  \"Your book's in English,\" you respond. \"I was told that you were new to the city and still learning French.  If you were a tourist, you'd be more interested in the cathedral than an old text on manipulation, so I put two and two together.\"  The woman nods, clearly impressed.\n\n\"Well,\" she says, \"since you spotted me so easily, I guess I'm going to have to learn how to read French better.\"\n\n\"No,\" you reply, \"Not necessarily.  We knew what we were looking for.\"\n\nShe seems relieved and gestures for you to sit down.  You shake your head.  \"I appreciate the thought, but I'd just as soon get what we came for and be on our way.  It's safer for you that way.\"\n\nThe woman smiles and says, \"I insist.\"\n*page_break\nShrugging, you and ${paris_partner} sit down.  Before you can say anything, a waiter approaches and says a few words in French to your connection.  She replies, and the waiter sets a bag down at her feet.  \n\n\"[i]Merci[/i],\" your connection responds and, after the waiter leaves, she says to you, \"Well, I know you have to run, but this place is to die for, so I saved you some leftovers to assist you in your business.\"\n\nTaking the hint, you thank her and pick up the bag.  From the weight, you can tell it's full.  There are three, large Styrofoam containers inside, and once you get back to the car you pop them all open.  Inside, you find a disassembled sniper rifle, bomb parts, and a handgun.  \n\nThe corners of your mouth perk up in a grin and you tell ${paris_partner}, \"We're in business.\"\n*page_break\n*if (choice = \"tower\")\n  *goto eiffel\n*else\n  *goto cafe\n\n*label eiffel\nYour car slows to a halt near the large park surrounding the Eiffel Tower.  Taking in the scene, you survey the giant, metal icon: latticework at once delicate and strong provides the structure, tourists gather around, taking turns having their photo taken, massive rivets and bolts hold viewing platforms in place as people swarm up steel steps.  \n\nAs you stare at the landmark, you try to decide how you're going to approach the hit.  Through your binoculars, you can see the ambassador, Andre, and his guests ascending the stairs in one of the legs of the Eiffel Tower.  They will soon be at the first observation platform. \n\nYou ponder the pros and cons of opting for a bomb.  It's probably the easiest option, provided you can place it undetected by security, but you know there's a strong likelihood of taking out innocent people.  And you know it will certainly take out the royals, no matter how lucky you get.\n\nYou also consider going to the pre-arranged room and taking a sniper shot.  While there's little risk of a firefight ensuing, you realize it might be a difficult hit to accomplish since your target will not only be moving but moving between the metal framework of the tower.  Plus, you're likely to only get one try.  \n\nThere's a third option.  You've been to the Eiffel Tower before and remember that, while there are extensive guardrails to keep people from falling, their protection is far from absolute.  \n\nIf you time it right, you can probably send the ambassador hurdling to his demise, but it'll take some muscle to hoist him over the guardrails and get away clean. However, you also know that having ${paris_partner} along for help will make things a lot easier.\n*label eiffel_choice\nPondering your options you choose to:\n\n*hide_reuse\n*choice\n  #Plant a small bomb in a trashcan near the base of the tower.\n    *gosub end_trial\n    Reasoning the risk is worth the reward, you decide to plant the bomb. Your choice seems like a good one as you spot a trashcan near the leg of the Eiffel Tower where you see your target, Andre, and his entourage, descending.  \n\n    You congratulate yourself on your quick action.  You'd originally thought that Andre might take the royals up to the very top, something that could take at least an hour, if not more. \n\n    [i]Maybe one of the royals is scared of heights[/i], you think to yourself, not really caring because you know they will be in range shortly.  The charge is large enough to take out a five foot radius without any problem, and you know that the royals will be toast as well as your target.\n\n    You mosey over to a small coffee stand in the shadow of the massive, metal landmark where ${paris_partner} is waiting.  Ordering a cup of French roast, you wait for the target to get in range.  \n\n    Your heart skips a beat, though, when you see two teenage boys smoking cigarettes stop just beside the trash receptacle.  Judging from the ashtray attached to it, they aren't going anywhere soon.  You…\n\n    *hide_reuse\n    *label bomb_choice\n    *choice\n      #Change nothing.  They are collateral damage.  Besides, smoking would have killed them, anyway…eventually.\n        You sit back and sip your coffee.  \n\n        Andre descends one metal stair after another, all the while the boys say put, enjoying their cigarettes, never even realizing that it's soon to be their last.  \n\n        As Andre and his bodyguard exit the tower and pass the trashcan, you coldly and calculatingly press the detonator.\n        *page_break  \n\n        The sight of the explosion is marvelous to behold, a magnificent, cleansing fireball. It may not be the most sophisticated method, but explosives certainly are tidy in their own way.  \n\n        Gathering your belongings, you leisurely stroll back to your car, signaling ${paris_partner} that it's time to go as you congratulate yourself on a job well done, even as onlookers uselessly rush to help.\n        *set psychotic_level %+15\n        *set heat +1\n        *set righteousness %-10\n        *set innocents_killed +4\n        *set paris_mission \"success\"\n        *set respect +10\n        *goto paris_complete\n\n      #Pretend I'm a cop, march over to the boys, and tell them I'm going bust them for smoking unless they leave.\n        *if (intelligence > 12) or (improvisation > 12)\n          Taking a deep breath and remembering the French you've studied over the years, you approach the two boys with their cigarettes.  You pull out your wallet and shout a few angry words in French toward them, pointing and gesticulating.  Both boys stare at you.  Out of the corner of your eye, you are glad to see that neither Andre nor the descending royals seem to take notice.  \n\n          You don't know if it's your attitude or what you're saying, or perhaps because they just think you're crazy, but whatever it is, it works, and the two boys trash their smokes and walk away. Seeing Andre near the exit, you bid a hasty departure as well, pressing the detonator button as you go.  \n\n          The sound of the explosion is music to your ears, made ever more sweet by the knowledge that it was a targeted hit with minimal innocent blood on your hands.\n          *set intelligence +2\n          *set improvisation +2\n          *set righteousness %+5\n          *set innocents_killed +2\n          *set paris_mission \"success\"\n          *set respect +10\n          *goto paris_complete\n\n        *else\n          You walk over to the boys and try to remember those French classes you took in high school.  Unfortunately, you must have been daydreaming through them or your confidence in your memory was overblown, because all that you are able to string together are a few words that you butcher.  \n\n          To the boys, it must sound like insane gibberish because they merely stare at you and start laughing.  Walking away, your cheeks reddened with embarrassment, you realize they're not going anywhere and you're going to have to make a tough decision about what to do with the bomb.\n          *goto bomb_choice\n\n      #Change tactics.  You don't want to kill innocent people if it can be helped, and thankfully, you have your trusty, steel blade with you.  \n        You realize it's risky, but it's time to get your hands dirty.  \n\n        You move forward nonchalantly, all the while your heart racing as you see the target descending farther and farther down the stairs.  In a minute, he'll be out and your window of opportunity closed.\n\n        Hastening your step, you try to stay inconspicuous, blending with the Parisians and tourists gathered beneath the massive tower.  You reach the exit just in time to see Andre stepping out, his bodyguards and entourage of royalty close behind.\n        *set righteousness %+10\n        *label attack\n        *if (strength > 10)\n          Walking up close and using the element of surprise, you thrust your knife into the throat of one bodyguard, then the other.  As their blood gushes, they both collapse, grasping at their necks in pain and shock.  Without hesitation, you turn your knife on Andre.  Your strikes are precise, sliding between the ribs and finding the vulnerable organs hidden therein.  He wheezes blood as he sinks to his knees.  \n          \n          You decide there's no reason to prolong his suffering and quickly finish the job.  The royals stare at you in horror, then take off running.  Turning away, you hightail it to the car, signaling to ${paris_partner} as you do.  In a flash, the engine is up and running and you're away from the scene, the mission a success.\n          *set strength +2\n          *set paris_mission \"success\"\n          *set respect +10\n          *goto paris_complete\n        *else\n          You draw the knife and move in for the kill, but one of Andre's bodyguards catches a glint of sunlight reflected off of your blade.  \n\n          His arm flashes up to block your strike, and a second later you're doubled over in pain, his fist having slammed into the side of your chest.  You feel something crack and your breath comes ragged as your realize that one or more of your ribs are probably broken.\n          *gosub_scene util health_check_regular\n\n          Reversing the direction of the blade and twisting it, you're greeted by a satisfying grunt of pain as the knife slices your adversary's arm wide open.  Following up, you bring the blade across his throat, and continue the move into a swing at Andre.  Andre is quicker, though, and leaps out of harm's way.  The royals look on in horror, their mouths agape as they watch Andre flee. \n\n          Out of the corner of your eye, you see ${paris_partner} rushing over, but you know it's too late. Spying Andre's other bodyguard reaching into his coat for what you can only assume is a gun, you rush toward ${paris_partner}, signaling that you have to go.  You hear the sound of gunshots in the distance behind you, but with the gathered crowd, the bodyguard is unable to get a clean shot.  \n\n          Out of breath and crestfallen, you make it to the car and, in an instant, ${paris_partner} has the engine fired up.  Cursing, you realize that, while you've failed to take out Andre, at least you're alive.  \n\n          Knowing there will always be other opportunities for other assassinations, your main regret is the money and respect it will cost you.  Still, you realize that there are other hits and you'll be around to do them.\n          *set paris_mission \"failure\"\n          *set strength +2\n          *goto paris_complete          \n\n  #Go to the hotel I have a reservation for and take the shot.\n    *gosub end_trial\n    Thinking the benefits far outweigh the difficulties, you decide to head to the hotel.\n    *if (intelligence > 10)\n      You're about to make your way to the hotel when a thought crosses your mind.  Reasonably certain that the information in the dossier is correct, you nevertheless account for human error. Leaning forward toward ${paris_partner}, you voice your concern and instantly, your partner is on the phone. \n\n      A few minutes and a few exchanged phrases later, ${paris_partner} explains, \"Good call.  I checked with the hotel and they had given away your reservation because they're over-sold.  I expressed just enough anger to get them to reinstate it.\"  You congratulate yourself on your foresight, and tell ${paris_partner} to step on it.\n      *set intelligence +2\n      *goto eiffel_hotel_res\n    *else\n      *goto eiffel_hotel_nores\n\n  #Take care of things face-to-face.\n    *gosub end_trial\n    Deciding on the old heave-ho, you purposefully head toward the Eiffel Tower with ${paris_partner} in tow.  As you get closer, though, you realize that Andre and his entourage are already descending.  \n\n    You curse to yourself and realize that you're going to have to re-evaluate things.  You'd originally thought that Andre might take the royals up to the very top, something that could take at least an hour, if not more, all the while affording plenty of spots where you might be able to ambush the ambassadors. \n\n    [i]Maybe one of the royals is scared of heights[/i], you think to yourself, then push that thought aside.  It doesn't really matter what the reason is, your window of opportunity is quickly closing. \n\n    You move forward nonchalantly, formulating a different attack strategy, all the while seeing the target descending farther and farther down.  In a minute, he'll be out and your chances for a clean attack will be blown.\n\n    You hasten your step, all the while trying to stay inconspicuous, blending in with the Parisians and tourists gathered beneath the massive tower.  \n    You reach the exit just in time to see Andre stepping out, his bodyguards and entourage of royalty close behind.\n    *goto attack\n\n*label eiffel_hotel_res\n*page_break\nThe hotel is opulent, with vaulted ceilings, marble floors and gold decor.  Making your way to the counter, you quickly collect your key and head up to your room.\n*page_break\n\nThe room is lavish, but you take little time to admire it, spreading the weapons cache on the bed and quickly setting about the task of putting together your rifle.  Firearm in hand, you head to the window.  \n\nSetting your eye to the sight, you survey the scene, preparing to fire.  You're in one of the closest hotels to the Eiffel Tower but, even so, it's a tough shot.  There's not only the distance to contend with, but the giant, metal bars holding the tower together.  \n\nFifteen minutes tick by with no clear shot.  Each time you line up the ambassador in your sights, he somehow finds cover.  Then, you see your chance.  \n\nThe ambassador is in the open and you don't hesitate.  The bullet flies through the air and you watch as the ambassador drops, the shot clean.  A small crowd begins to gather, realizing something is wrong.  You pay them no mind, already disassembling your weapon under ${paris_partner}'s impressed gaze.  \n\nWhen you finish, you give the room a parting glance, wishing you had more time to stay in the luxurious place.\n*set paris_mission \"success\"\n*set respect +10\n*goto paris_complete\n\n*label eiffel_hotel_nores\nThe hotel is opulent, with vaulted ceilings, marble floors, and gold decor.  Making your way to the counter, you begin planning how you're going to take out Andre, visualizing the shot in your mind.  \n\nThe conversation with the clerk seems like a formality until you hear the words, \"I'm sorry, but we don't have a reservation under that name.\" \n\nIncredulous, you ask the young woman peering across the counter from you to check again.  She looks back at her computer and shakes her head.  \"I am very sorry, sir, but we have no reservation under that name.\"\n\nCursing to yourself, you blame the hotel.  Wishing you'd had the foresight to have call and verify the reservation, you craft a new plan.  \n\nAs the wheels spin in your mind, you say, \"Okay, I know there's no reservation for me, but is the room I'm supposed to be in available?\"\n*page_break\n\nThe woman looks back at the computer screen.  \"Well, it is empty,\" she says, and as soon as your hopes begin to rise, she dashes them by stating, \"but someone has booked it for tonight.  That room is very popular because of the view of the Eiffel Tower.\"\n\nYour stomach sinks, and the irony is not lost on you.  You pause for a second, trying to think of how you're going to convince this young hotel staff member to give you the room.\n*if (improvisation > 10)\n  \"Listen,\" you say, leaning forward conspiratorially, trying your best to impart an air of grave secrecy.  \"I'm not supposed to be telling you this,\" you continue, \"but that room is reserved for the Prime Minister himself.\"\n\n  From the look on the young woman's face, you can tell this is by far the most important situation she's ever encountered.  \"The Prime Minister?\" she asks, clearly pleased to be a part of something so grand.\n\n  \"Yes,\" you say, \"I'm his head of security.  And this is a strictly off-the-record rendezvous, if you catch my drift.  He has someone very important he wants to impress, and that is his usual room when he stays here.\"\n\n  The woman looks at you, and you can tell your story is working.  She seems eager to please.  Thanking your improvisational skills, you continue, \"So if you want to be of service, I suggest one of two things.  You can either move the people who've booked the room to another room or—and this is just between you and me—you can delay their check-in by a few hours.  The Prime Minister won't be using the room all night.\"\n\n  The woman behind the counter blushes, clearly understanding your insinuation, and her fingers fly over the keyboard. Moments later, she hands you a key card.  \"Please tell the Prime Minister we appreciate his business.\"  She also points out a side entrance that the Prime Minister can use to enter discreetly.  You thank her for her time, and head toward the elevators.\n\n  *page_break\n  The room is lavish, but you take little time to admire it, spreading the weapons cache on the bed and quickly setting about the task of putting together your rifle.  Firearm in hand, you head to the window.  \n\n  Setting your eye to the sight, you survey the scene, preparing to fire.  You're in one of the closest hotels to the Eiffel Tower but, even so, it's a tough shot.  There's not only the distance to contend with, but the giant metal bars holding the tower together.  \n\n  Fifteen minutes tick by with no clear shot.  Each time you line up the ambassador in your sights, he tacks unexpectedly, leaving you scrambling to maintain your bead.  [i]Could he know?[/i] you wonder. [i]No, it's impossible[/i]. Then, you see your chance.  \n\n  The ambassador is in the open and you don't hesitate.  The bullet flies through the air and you watch as the ambassador drops, the shot clean.   A small crowd begins to gather, realizing something is wrong.  You pay them no mind, already disassembling your weapon under ${paris_partner}'s impressed gaze.  \n\n  When you finish, you give the room a parting glance, wishing you had more time to stay in the luxurious place.\n  *set paris_mission \"success\"\n  *set improvisation +2\n  *set respect +10\n  *goto paris_complete\n\n*elseif (improvisation > 8)\n  \"Listen,\" you say, leaning forward conspiratorially, trying your best to impart an air of grave secrecy.  \"I'm not supposed to be telling you this,\" you continue, \"but that room is reserved for a very famous celebrity.\"\n\n  From the look on the young woman's face, you can tell this is by far the most important situation she's ever encountered.  \"Really? Who?\" she asks, clearly pleased to be a part of something so grand.\n\n  Not having thought things out that far, you say only, \"I can't tell you. But I can tell you that I'm his head of security, and that's why I booked the room.\"\n\n  The woman looks at you. You can tell that she wants to believe your story but is skeptical.  Still, she seems eager to please.  Thanking your improvisational skills, you continue, \"So if you want to be of service, I suggest you move the people who've booked this room to a different one.\"\n\n  The woman behind the counter frowns, \"I can't do that.\"  Then an idea seems to light up her face.  Her fingers fly over the keyboard and a second later she hands you a key card.  \"It's not the best view of the Eiffel Tower, but it's pretty close.\"  You thank her for her time, and head toward the elevators.\n\n  *page_break\n  The room is lavish, but you take little time to admire it, spreading the weapons cache on the bed and quickly setting about the task of putting together your rifle.  Firearm in hand, you head to the window.  \n\n  Setting your eye to the sight, you survey the scene, preparing to fire.  The view is not ideal, and you know it's going to be a tough shot.  There's not only the distance to contend with, but the giant metal bars holding the tower together.  \n\n  Fifteen minutes tick by with no clear shot.  Each time you line up the ambassador in your sights, he tacks unexpectedly, leaving you scrambling to maintain your bead.  [i]Could he know?[/i] you wonder. [i]No, it's impossible[/i]. Then, you see your chance.\n  *if (ranged_weapons > 10)\n    The ambassador is in the open but the shot is difficult.  Still, you don't hesitate.  The bullet flies through the air and you watch as the ambassador drops, the shot clean, the hours spent in practice clearly paying off.  A small crowd begins to gather, realizing something is wrong.  You pay them no mind, already disassembling your weapon under ${paris_partner}'s impressed gaze.  \n\n    When you finish, you give the room a parting glance, wishing you had more time to stay in the luxurious place.\n    *set paris_mission \"success\"\n    *set ranged_weapons +2\n    *set respect +10\n    *goto paris_complete\n\n  *else\n    The ambassador is in the open, but the shot is difficult.  Still, you don't hesitate.  The bullet flies through the air and you watch as the ambassador looks around frantically; his bodyguards draw their weapons instinctively.  You missed.  \n\n    You line up for another shot but it's too late; the ambassador has ducked behind cover.  You continue to search for him, longing for another opportunity.  Several minutes pass with no sight of him.\n\n    The sound of sirens fills the air and you realize that the police must have figured out that the sniper shot came from your hotel.  You rush out and head to the lobby, seeing police already swarming in.  \n\n    You force yourself to look like a bewildered, slightly concerned tourist, and make it to the car without incident, where ${paris_partner} is waiting with the engine fired up.  Cursing, you realize that while you've failed to take out Andre, at least you're alive.  \n\n    Knowing there will always be other opportunities for other assassinations, your main regret is the money and respect it will cost you.  Still, there are other hits and you'll be around to do them.\n    *set paris_mission \"failure\"\n    *set ranged_weapons +2\n    *goto paris_complete\n*else\n  Unable to improvise and think of a plan, you start to get angry, knowing from experience that sometimes rage gets results, especially in the hospitality industry.  \n\n  \"That's my room,\" you say angrily.  \"I made the reservation myself, are you calling me a liar?\"  \n\n  The woman looks very uncomfortable, and for a second you think that you're getting somewhere.  That's when you see the rather large manager walking over with a security guard who stays at a respectful distance.  \n\n  Knowing that you could obviously take them both out without breaking a sweat, you also know full-well that you would get nowhere by doing so, certainly not into the room you need to get into.  \n\n  \"Okay,\" you say, well aware of when to pick your battles. \"I get it.  See if I ever stay here again,\" you say, at least taking a little bit of solace in making the empty threat to show your contempt.  \n\n  Frustrated, you tell ${paris_partner} that you two need to head back to the Eiffel Tower ASAP.  ${paris_partner} nods and you head to the car.\n\n  Making your way back to where you started from, you think of what you're going to do next.  \n  *goto eiffel_choice\n\n\n*label cafe\nThe stores run the gamut along the Champs Élysées. There are small boutiques sitting alongside high-end chains. The common denominator is price, as there aren't many bargains to be found along the extravagant stretch of road that always seems crowded.  \n\n${paris_partner} slows the car as you scope out the café, and immediately, your gut suspicion about a ranged attack is confirmed.  There is no way you could get a shot off cleanly.  Between the crowds of people leisurely strolling by and the large, outdoor patio, it would be next to impossible to get a bead on the ambassador.  \n\nTelling ${paris_partner} to find a place to park, you think about what the dossier said about everyone in the café being paid off.  It gives you options.  While the guns are out, you think of two very safe and efficient ways of getting the job done.  The first is poison.  \n\nThe file says Andre's favorite dish is a thick, cream-based Parisian delicacy and that's the perfect vehicle for poison.  A dash of some of the toxic substance you picked up from the connection will blend right in.  \n\nThe second method would be to plant a bomb.  Having unfettered access to the café means this is probably the easiest option.  You know that all you'll have to do is speak with the host and tell him where to seat the party.  Then it'll be a simple matter of planting a small explosive under the table.  However, you know full-well that there is a strong likelihood of taking out not just the members of the Saudi royal family, but also more innocent people if you are not extremely lucky.\n\nWeighing the options you decide to:\n*choice\n  #Go with the poison.  \n    *gosub end_trial\n    *goto poison\n  #Plant a bomb.\n    *gosub end_trial\n    Reasoning that the risk is worth the reward, you decide to plant the bomb. \n\n    Your choice to plant a bomb seems like a good one as you speak with the host.  He has no problem with seating the ambassador's party where you direct, no questions asked.  You think to yourself as you walk over to the table that, if the host knew you were planning on blowing up an explosive device in his restaurant, he might have a different opinion.  \n\n    Being discreet, you make your way through the café, feigning interest in looking at the windows, as if you plan on taking a shot through the glass.  Actually, you'll be outside looking in, timing the detonation just right from a safe distance.  \n\n    Once you see the host turn away, you duck under the target table.  Working quickly, you place a small amount of plastic explosive on the underside of the table and fasten a detonator.  \n\n    Finishing your work, you bid adieu to the host, and head back to the car.  ${paris_partner} pulls the vehicle into location and you sit back, waiting.\n\n    *page_break\n    You spot the problem immediately.  Andre gets out of a limo with his bodyguards, the royals, and two individuals you don't recognize. Judging from their age and dress, they seem to be interns or assistants.  \n\n    Your stomach turns in knots as you realize the multitude of problems this new twist presents.  The first concern is the table.  You wait with bated breath as the party enters, knowing that the table you picked isn't set for that many people.  The host greets the party with appropriate deference and you feel some relief when you see the host leading the party to the preselected table by the window.  \n\n    While you can't hear what the host is saying, he seems to be trying to convince the ambassador that this is one of the best seats in the house even as Andre gestures to one of the larger tables.  In the end, you breathe a sign of relief as you see the party take their seats at the appropriate table, the host bringing another two chairs for the extra guests.  \n\n    As the group settles down for dinner, you realize that, while your first fear has been allayed, the unexpected presence of the two young men poses a new problem.  Whatever your feeling for taking out the royals might be, this new wrinkle means that, if you press the detonator, you're going to kill what seem to be two totally innocent young men whose only sin is being in the wrong place at the wrong time.  Holding the detonator, you weigh your options.\n\n    *hide_reuse\n    *label bomb_choice_cafe\n    *choice\n      #Change nothing.  The phrase, \"and they shall be judged by the company they keep\" readily comes to mind.\n        You sit back and put your finger on the remote trigger.  \n\n        ${paris_partner} stares at you incredulously, as though asking if you are really going to do this.  You nod, pressing down on the detonator. \n\n        The blast is ferocious, a bright, fiery ball of flame setting the interior of the café ablaze. The sight of it is marvelous to behold, a flash of brilliant light that, from afar could be mistaken for a celebratory fireworks display. If not for the bits of brain matter flying all over the place.  \n\n        As the smoke settles, you can see that, while the blast was large, the whole table and its occupants vaporized, the explosion was at least limited to the people sitting at the table due to the concentration and delicate placement of the bomb.  \n\n        Taking a little solace in your precision, you tell ${paris_partner} it's time to hit the road.  The last thing you see through the window is onlookers futilely rushing to help.\n        *set psychotic_level %+15\n        *set heat +1\n        *set righteousness %-10\n        *set innocents_killed +6\n        *set paris_mission \"success\"\n        *set respect +10\n        *goto paris_complete\n\n      #Impersonate an owner of the café and find a way to get the guys away long enough to trigger the bomb.\n        *if (intelligence > 12) or (improvisation > 12)\n          Taking a deep breath and remembering the French you've studied over the years, you exit the car and enter the restaurant.\n\n          Making a beeline for the table, you humbly introduce yourself to the ambassador and his party.  You explain that you are a silent partner from the States who's in Paris for the season and heard an esteemed party was coming to dine at your establishment.  \n\n          You inform the group that you'd like to give each of them a tour of the wine cellar in small groups.  Feigning an off-handed choice, you gesture to the two young interns and suggest that they go first.\n\n          The ambassador seems confused, obviously having been to the restaurant many times and this being the first he's ever heard of a silent partner from the States.  Still, his sense of polite diplomacy, coupled with your confidence, cause him to graciously tell the two young men what an honor they are receiving.\n          *page_break\n\n          You lead the two young men toward a descending staircase in the back of the restaurant and, as you do, your suspicions are confirmed.  Through a little bit of conversation, you learn that the young men are interns.  \n\n          Upon arriving in the wine cellar, you point out one expensive bottle of Bordeaux after another, gently depressing the remote detonator.  Even below ground, the blast shakes the whole cellar and the three of you rush upstairs.  \n\n          The table is now a smoking crater, but you note that, thankfully, no one else was injured due to the concentration and delicate placement of the bomb.  \n\n          In the confusion, you quickly exit the café, walking at a brisk pace—nearly a run—to the waiting car.  Signaling to ${paris_partner} to drive, you congratulate yourself on a job well done with minimal collateral damage.\n          *set intelligence +2\n          *set improvisation +2\n          *set righteousness %+5\n          *set innocents_killed +2\n          *set paris_mission \"success\"\n          *set respect +10\n          *goto paris_complete\n\n        *else\n          Taking a deep breath, you try to remember the French you learned in high school as you exit the car and enter the restaurant.  \n\n          Making a beeline for the table, you humbly introduce yourself to the ambassador and his party.  You explain that you are a silent partner from the States who's in Paris for the season and heard an esteemed party was coming to dine at your establishment.  \n\n          You inform the group that you'd like to give each of them a tour of the wine cellar in small groups.  Feigning an off-handed choice, you gesture to the two young interns and suggest that they go first.\n\n          The ambassador seems confused, obviously having been to the restaurant many times and this being the first he's ever heard of a silent partner from the States.  You realize when he begins speaking to you in English that your French is not nearly what you thought it was. \n\n          \"I didn't know there was a silent partner, let alone an American,\" Andre says in perfect English. \"Regardless, I think my interns will decline your invitation to show them the ladies' restroom.\"  \n\n          Embarrassed, realizing you must have used the wrong word, and knowing that Andre must think you either a pervert or insane, you apologize, spouting a quick story about new fixtures being put in. Andre glares at you with the bored bravado of the privileged until you slink off to formulate another plan.  \n\n          Walking back to the car, you ponder your options, knowing that getting the young men to move so you can detonate the bomb is off the table.  Fingering the detonator, you decide you will:\n          *goto bomb_choice_cafe\n\n      #Change tactics.  I don't want to kill the young men or the royals if it can be helped, and I always have my trusty blade with me.  \n        You realize it's risky, but it's time to get your hands dirty.\n\n        You move nonchalantly toward the restroom area.  Making sure no one is paying any attention to you, you duck into the men's restroom and lock yourself in a stall.  \n\n        Looking through the small sliver of a crack between the door and the stall, you realize that you actually have quite a decent view of the restroom through the mirror.  Now, all you have to do is wait.\n\n        *page_break\n        *label andre_bathroom\n        It seems to take forever, but Andre finally enters, his two bodyguards in tow.  The opportunity is upon you.\n        \n        *if (strength > 10)\n          Bursting from the stall, and using the element of surprise, you slash your knife across the throat of one bodyguard and then the other.  \n\n          As their blood gushes, they both collapse, grasping at their necks in pain shock.  Without hesitation, you turn your knife on Andre.  Your strikes are precise, sliding between his ribs and finding the vulnerable organs hidden therein.  He wheezes blood as he sinks to his knees.  \n          \n          You decide there's no reason to prolong his suffering and quickly finish the job.  You debate whether or not to drag the bodies into a stall, but realize from the pool of blood on the floor that doing so will not fool anyone, and will only be a waste of time.  \n\n          Turning from the scene, you hightail it out of the restroom and make your way back to the car.  You dive in, signaling to ${paris_partner} as you do.  \n\n          In a flash, the engine is up and running and you're speeding away from the scene, the mission a success.\n          *set paris_mission \"success\"\n          *set strength +2\n          *set righteousness %+10\n          *set respect +10\n          *goto paris_complete\n        *else\n          You draw your knife and burst from the stall, looking for the kill.  \n\n          One of Andre's bodyguards catches a glimpse of you through the mirror as you make your move, and his arm flashes up to block your strike. A second later, you're doubled over in pain, his fist having slammed into the side of your chest.  You feel something crack and your breath comes ragged as your realize that one or more of your ribs are probably broken.\n          *gosub_scene util health_check_regular\n\n          You have to do something drastic.  Reversing the direction of your blade and twisting it, you're greeted by a satisfying grunt of pain as the knife slices your adversary's arm wide open.  \n\n          In one grand, smooth motion, you slash the blade across your adversary's throat and swing at Andre.  Andre is quicker, though, and dodges out of the way, already running from the restroom.  \n\n          You follow but realize your opportunity has been ruined.  The commotion has drawn a lot of attention and you don't have much time to lick your wounds.  \n\n          Hightailing it toward the front of the restaurant, you see the other bodyguard emerge from the restroom.  Seeing him reaching into his coat for what you can only assume is a gun, you plow through the door, rushing toward ${paris_partner} and the parked car, signaling that you have to bolt.  \n\n          You hear the sound of gunshots in the distance behind you, but with the crowd on the street, the bodyguard is unable to get a clean shot.  \n\n          Out of breath and crestfallen, you make it to the car and, in an instant, ${paris_partner} has the engine fired up.  Cursing, you realize that, while you've failed to take out Andre, at least you're alive.  \n\n          Knowing there will always be other opportunities for other assassinations, your main regret is the money and respect it will cost you.  Still, you realize that there are other hits and you'll be around to do them.\n          *set paris_mission \"failure\"\n          *set righteousness %+10\n          *set strength +2\n          *goto paris_complete\n\n  #Get physical.  Wait until the target has to use the restroom then follow him in and get your hands dirty.\n    *gosub end_trial\n    It takes longer than you expect, and for a little while you fear that Andre might not head to the powder room at all, but in the end, you observe your mark moving toward the restroom.  \n\n    You rush forward as nonchalantly as possible to the restroom area.  Making sure no one is paying any attention to you, you duck into the men's restroom and lock yourself in a stall.  \n\n    Looking through a small sliver of a crack between the door and the stall, you can actually get quite a decent view of the restroom through the mirror.  Now, all you have to do is wait.\n    *page_break\n    *goto andre_bathroom\n\n*label poison\nYou lie in wait until Andre and his party arrive.  A black stretch limo slows in front of the restaurant, holding up traffic in the process.  You watch as a bodyguard, then Andre, then his other bodyguard, and the two royals file out.  \n\nTo your surprise, you also see two young men who, from their age and dress, you take to be some kind of interns, hop out of the car.  In that instant, you think to yourself that it was a good call not to opt for a bomb, knowing that there would be a lot of innocent blood on your hands if you had.  \n\nThat seems to have worked out perfectly, so you wait until the group makes their way into the café and then follow, veering off toward the kitchen.\n*page_break\n\nThe kitchen is loud and large, and you see the staff purposefully not looking in your direction.  \n\nWalking over to the head chef, you say only, \"Which one?\"  He nods to a bowl of steaming hot, cream-based soup that is sitting apart from a line of similarly situated bowls.  \n\nYou casually walk over and uncork the small vial you received from your connection, dropping the contents into the soup.  You watch as the liquid slowly swirls around, then disappears completely into the soup.  Now, you wait.\n\nAfter several long minutes, a waiter enters.  Instead of moving toward the dish, though, he quickly approaches you, \"There is a problem,\" he says in English.\n\n\"What?\" you ask.\n\n\"The ambassador ordered a salad,\" the waiter says and cringes, as if expecting you to lash out at him.\n*page_break\n\n\"He chooses now to go on a diet?\" you ask sarcastically to no one.  \n\nGesturing to the soup, you tell the waiter, \"Take this to him anyway.  Tell him the chef made it special when he heard he had such an esteemed guest.  I'm sure once Andre has it in front of him, the temptation will be too hard to resist.\"\n\nThe waiter grins and seems thankful you didn't get angry.  Grabbing the bowl, he heads out the door toward the main dining room.\n*page_break\n\nYou wait.  After a few moments, you figure your hunch has paid off.  Then you notice the waiter returning, the bowl of soup in hand.  Again, he comes straight up to you.  \"I'm so sorry,\" he sputters, \"no matter what I said, the ambassador didn't want it.\"\n\n\"Did he give you any reason?\" you ask, suddenly suspicious that maybe Andre was tipped off.\n\n\"You were right,\" the waiter says, \"the ambassador said he's on a diet and doesn't want anything too heavy.\"\n\nYou curse Andre's determination and willpower.  \"Okay,\" you tell the waiter, \"just throw it away.  I'm going to have to think of something else.\"\n\nSince the poisoning plan is out the window, you decided to:\n\n*hide_reuse\n*label poison_choice\n*choice\n  #Impersonate an owner in an attempt to lure Andre down to the wine cellar and kill him away from his bodyguards.  \n    You know it'll be an easier job if you can ambush the ambassador, but you also know it might be difficult to convince him to follow you.  Still, you realize it's a good option, and head out to try to trick Andre.\n    *goto impersonate\n  #Wait until the party leaves and then gun the target down on the Champs Élysées.\n    You know it will be a difficult task to shoot Andre on one of the most famous streets in Paris, but you know it can be done.\n\n    You call ${paris_partner} and explain the situation.  Most importantly, you stress that you're going to need a lot of firepower from your contact in a major hurry.  You get a confirmation that that's possible and, just as Andre and his party are about to leave, you finally have the necessary weaponry in hand.  \n\n    Like a gangster from a 1920s film, you spring from the car and open fire on the group as they emerge from the restaurant.\n    *if (ranged_weapons > 10)\n      You lay waste to Andre and his crew before they ever have a chance to react.\n\n      Your shots are precise and quick, and you watch as the rest of the group stares in shocked horror, unable to believe what is happening. Turning from the scene, you jump back into the car, signaling ${paris_partner} to drive.  \n\n      In a flash, you're burning rubber and away from the scene, the mission a success.\n      *set paris_mission \"success\"\n      *set ranged_weapons +2\n      *set righteousness %+10\n      *set respect +10\n      *goto paris_complete\n\n    *else\n      The timing is off and your skill is not good enough to get the drop on Andre and his crew.  \n\n      While you're able to take out one bodyguard with ease, the second is much too quick, dodging to the side and pulling Andre in her wake.  She returns fire and you feel a lancing pain in your leg.\n      *gosub_scene util health_check_regular\n\n      Cursing, you let loose a hail of bullets, but none find their mark.  The bodyguard continues trading fire as she rushes Andre away and, hearing the sound of sirens, you realize that you have to get away.  \n\n      Out of breath and crestfallen, you make it to the car and, in an instant, ${paris_partner} has the engine fired up.  Cursing, you realize that, while you've failed to take out Andre, at least you're alive.  \n\n      Knowing there will always be other opportunities for other assassinations, your main regret is the money and respect it will cost you.  Still, you realize that there are other hits and you'll be around to do them.\n      *set paris_mission \"failure\"\n      *set ranged_weapons +2\n      *set righteousness %+10\n      *goto paris_complete\n\n  #Hide in the bathroom and take Andre out when he comes in.\n    You move forward nonchalantly toward the restroom area.  Making sure no one is paying any attention to you, you duck into the men's restroom and lock yourself in a stall.  \n\n    Looking through a small sliver of a crack between the door and the stall, you actually have quite a decent view of the restroom in the mirror.  Now, all you have to do is wait.\n    *page_break\n    *goto andre_bathroom\n\n*label impersonate\n*if (intelligence > 12) or (improvisation > 12)\n  Taking a deep breath and remembering the French you've studied over the years, you exit the kitchen and enter the dining room.  \n\n  Making a beeline for the table, you humbly introduce yourself to the ambassador and party.  You explain that you are a silent partner from the States who's in Paris for the season and heard an esteemed party was coming to dine at your establishment.  \n\n  You inform the group that you'd like to give the ambassador a tour of the newly revamped wine cellar so he can pick an expensive bottle for the table, on the house.  \n\n  The ambassador seems confused, obviously having been to the restaurant many times and never hearing of a silent partner from the States.  Still, his sense of polite diplomacy, coupled with your confidence, cause him to graciously tell his party what an honor they are receiving.\n\n  He rises and his two bodyguards follow suit. You politely, but sternly, shake your head.  \"I'm sorry,\" you say, \"but there is only enough room for two down there.  Fire regulations.\"  A troubled look crosses Andre's face, but apparently not wanting to upset the table and figuring his bodyguards will be right upstairs, he tells them to remain at the table.\n\n  You gesture for Andre to follow, mumbling to him about your grievances with the fire inspectors, and hinting in an offhanded way that you'd be grateful if the ambassador could possibly do something to remedy the situation.  \n\n  Andre nods, politely saying he will look into it as you follow him toward the cellar.  You're reminded of Poe's [i]The Cask of Amontillado[/i] as you graciously insist that he go first.  \n\n  When you get to the bottom, you pull a bottle of Chateau La Tour 1985 and uncork it, pouring two glasses.  Andre sniffs it and lifts the glass to his lips, savoring both the aroma and the taste.  You can tell he's a connoisseur, and you tell him that the bottle is gratis.  Andre smiles widely.\n\n  You inform the ambassador that you have an even rarer vintage that you'd be happy to give him for a discount price if he would like.  Pointing out an exquisite Lafite Rothchild 1982, you invite Andre to lean closer to check out the vintage wine.  He does, and in an instant, you pull a bottle from the rack and swing it like a club.  The glass connects with the back of Andre's skull knocking him to the ground, blood pooling beneath him.  \n\n  Wiping the bottle clean of prints, you casually walk out of the wine cellar and the café, pleased with your extreme kill.  This will be one for the books and bragging rights.\n\n  Hopping in the car, you tell ${paris_partner} about your exploits as the car begins a leisurely drive to the airport.  You congratulate yourself on a job well done with no collateral damage.\n  *set intelligence +2\n  *set improvisation +2\n  *set righteousness %+5\n  *set extreme_kills +1\n  *check_achievements discoverextremekill\n  *if not(choice_achieved_discoverextremekill)\n    *achieve discoverextremekill\n  *set paris_mission \"success\"\n  *set respect +10\n  *goto paris_complete\n*else\n  Taking a deep breath and trying to remember the French classes you took in school, you exit the kitchen and enter the dining room.  \n\n  Making a beeline for the table, you humbly introduce yourself to the ambassador and party.  You explain that you are a silent partner from the States who's in Paris for the season and heard an esteemed party was coming to dine at your establishment.  \n\n  You inform the group that you'd like to give the ambassador a tour of the newly revamped wine cellar so he can pick an expensive bottle for the table, on the house.  \n\n  The ambassador seems confused, obviously having been to the restaurant many times and never hearing of a silent partner from the States.  He also seems taken aback by your clumsy French, and fixes you with a narrow gaze.  \"For someone who seasons in Paris, your French is not very good,\" Andre says in perfect English. \"Let's speak your native tongue.\"  His sense of polite diplomacy seems to be too well-ingrained for him to call you a liar outright, but the subtext is clearly there as he declines your invitation.  \"I appreciate the thought,\" he says, \"but I wouldn't want there to be any appearance of impropriety.\"\n\n  Realizing your plan isn't going to work, you nod and take your leave, knowing you're going to have to think of something else.\n  *goto poison_choice\n\n*label paris_complete\n*page_break\nYou stare at the planes taking off, one after another, marveling at their precision and beauty.  \n\nPart of you yearns to stay longer in Paris, and you make a mental note that the next time you have some time off, you're going to return to the marvelous \"City of Lights.\"  \n\nYou turn your mind back to the present, and the very real concern of who's been stalking your crew.  It's an unsettling thought and one with no real answer, at least not yet.  \n\nWhen you finally board the plane and sink down into your first class seat, the notion follows you. And despite the luxury airfare and amenities, you find sleep elusive. \n*finish\n\n*label end_trial\n*temp discount_ends \"Jul 4\"\n*temp time_stamp timestamp(\"${discount_ends}, 2015\")\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *label purchased\n  *return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n*abort\n\n", "prague": "*if (wounds = \"near death\")\n  *set wounds \"serious\"\n  *goto prague\n*elseif (wounds = \"serious\")\n  *set wounds \"minor\"\n  *goto prague\n*elseif (wounds = \"minor\")\n  *set wounds \"uninjured\"\n  *goto prague\n*else\n  *goto prague\n*label prague\n*set wounded_here false\n*temp you \"you\"\n*temp companion false\n*temp wounded_here false\n*if miami_partner != \"none\"\n  *set companion true\n  *set you \"you and ${miami_partner}\"\n*temp business \"firm\"\n*temp japan false\n\nThe City of a Hundred Spires is astonishing, a piece of European art brought to life. Each residence and shop is a masterpiece, ornately carved facades adorning th
