 myself for some deft maneuvering.\n    *set passion %+5\n    *goto cliff\n  #I decide that it's too risky, and I'm better off trying to get the drop on them at the WWII outpost.\n    *set passion %-5\n    *goto outpost\n\n*label cliff\n*page_break\nThe jeep hurdles forward as you press your foot on the gas and the cliff looms across the horizon.  It takes a minute for Carmone to notice, but when he does, he screams at you, \"What are you doing?! Are you crazy?!\"\n\nYou don't answer, keeping the wheel in your hands in a death grip.  [i]Patience[/i], you tell yourself.  \n\nThe precipice is less than a hundred feet away now and you can see the scared look on Carmone's face.  \n\nFrom behind you, you hear screaming and the unmistakable sound of a gun being drawn.  You know—and from the look on Carmone's face, he knows it too—that shooting you isn't going to save anyone.  \n\n\"Stop the car, you psycho,\" Carmone screams and reaches over to grab the wheel.  He's as strong as you figured he was, and the two of you wrestle for control of the wheel.\n\n*if (strength > 10) and (improvisation > 10)\n  You fight with him, lashing out with one arm and catching him in the face with an elbow.  It takes every ounce of your strength, but you're able to hold the wheel steady with your other arm.  \n\n  The screams are louder now and you realize that you're just a few feet from the edge.  Unbuckling yourself, you dive from the jeep.  The impact on the ground is painful, but you've braced yourself well and don't take any serious damage.  \n\n  You see Carmone, blood streaming down his face, grabbing for the wheel.  He almost looks as if he's going to be able to make the turn, and you act quickly.  \n\n  Drawing your gun, you fire once at Carmone and your bullet hits him in the arm.  Taking no chances, the jeep now careening on two wheels, you fire again and again at the gas tank, emptying your clip.  \n\n  The rounds fly true and the resulting explosion is deafening.  You have just enough time to watch the entire jeep go up in flames before the fiery wreck hurdles over the edge, a metallic fireball plummeting to the ground.\n\n  You smile to yourself, knowing that your mission has been completed successfully.  [i]With bonus points for style[/i] you think to yourself, remarking on the extreme kill.  \n\n  After a few moments of basking in the afterglow, you stand up and prepare for the long walk back to the town.\n  *set strength +2\n  *set improvisation +2\n  *set respect +10\n  *set extreme_kills +1\n  *check_achievements discoverextremekill\n  *if not(choice_achieved_discoverextremekill)\n    *achieve discoverextremekill\n  *set tahiti_mission \"success\"\n  *finish\n\n*else\n  *set strength +2\n  *set improvisation +2\n  You fight with him, lashing out with one arm and catching him in the face with an elbow.  Carmone is bloodied, but he continues to struggle with you.  You use every ounce of your strength to try to hold the wheel steady with your other arm but, in the end, it is too much.  \n\n  The screams are louder now, and you realize that you're just a few feet from the edge.  Despite all attempts to keep the wheel under control, it bucks out of your hand and, as you desperately fumble with the seatbelt, the jeep careens on two wheels, then topples over.  \n\n  The impact is jarring and, as the jeep rolls over, you hear a snap and can only hope you haven't broken a rib.  Your head smashes into the roll cage and you see stars.\n  *gosub_scene util health_check_regular\n\n  The jeep eventually comes to rest on its side several feet from the edge.  What's worse, though, is Carmone is very much alive, as are his men, and your piece is nowhere in sight.  You figure it must have flown out in the crash.  Carmone and his men seem as disorientated as you are, but you notice with growing horror that they, unlike you, have their weapons still intact. \n\n  You unbuckle hastily and drop to the ground.  There's searing pain in your side, but you don't have time to think about it.  In a flash, you're up and running toward the forest.  You nearly make it when you feel lancing pain in your arm.  \n\n  Glancing down, you see blood, but you keep moving forward.  Ducking into a cluster of the tropical palms you'd remarked upon earlier, you hear the resounding thud of bullets impacting the forest.  Thankfully, you take no more damage as you flee into the woods.\n  *goto wood_wound\n\n*label wood_wound\nCursing, you rip off a piece of your shirt and tie it around the wound.  Checking yourself over, you realize you're pretty banged up, but thankfully, you're alive.  \n\nThe mission may have been a failure, but you take solace in knowing there will always be more ahead.  Taking some small comfort in that thought, you begin to make the long trek back to the airport.  \n*set tahiti_mission \"failure\"\n*set respect -5\n*finish\n\n*label outpost\nThe ride is rickety, but you can tell that Carmone and his crew are thoroughly entertained.  You're just grateful to have made it in one piece.  [i]With these roads, I'm lucky to be alive[/i], you think to yourself, finding a newfound respect for the real tour operators.\n\nComing around the last bend, you see the ruins of the old WWII outpost.  The structures are overgrown with foliage, but one particularly large and imposing cannon points to the sky like a beacon.\n\nKilling the engine, you tell Carmone and his crew they have some free time to explore.  Thankfully, they seem caught up in the moment, and somewhat relaxed.  Unfortunately, they've dispersed around the outpost as they've been taking it in.  It's now or never.\n*page_break\n*if (ranged_weapons > 12)\n  *set ranged_weapons +2\n  Acting quickly, you pull out two 9mm pistols from the satchel you've hidden in the jeep.  \n\n  Going full-bore, you pump round after round into the nearest bodyguard until he's no longer standing.  Knowing the element of surprise is now gone, you rush toward the other nearest guard and curse his reflexes as you see a large .45 caliber bearing down on you.  He is obviously well-trained.  \n\n  Diving forward and spinning in a move that looks like it's straight from a movie, you swirl in a cyclone of violence, spewing forth a slew of hot lead.  Flashy, but nevertheless effective.  You're glad you've spend so much time on target practice as your bullets hit the second bodyguard in the chest, dropping him.  \n\n  You land on your back and your weapon is already trained on the third guard.  He runs behind the jeep for cover but, from your angle, you're able to get a bead on his legs and you fire.  The distance and the bodyguard's quick movements, though, mean that your shots miss, and you curse double when you see Carmone pulling out a piece that looks like the cannon he's taking cover next to.\n\n  Knowing your clips are running low, and you have no time to reload, you force your way to your feet.  Carmone and the bodyguard are almost aligned, Carmone near the WWII artifact, the bodyguard behind the jeep, and you have an idea.  \n\n  With no clear shot from your vantage point, you run as fast as you can. Extending one arm to each side, as soon as you pass the front of the jeep and the side of the cannon you begin firing.  Bullets whiz by and as, you take another leaping step, you hear the terrifying sound of the firing pin hitting metal.  You're out of bullets.  Luckily for you, though, your haphazard plan worked. When you turn around, you see both the bodyguard and Carmone lying on the ground, lifeless.\n\n  You smile to yourself, knowing that your mission has been completed successfully.  \n\n  After a few moments of basking in the afterglow of your accomplishment, you stand up and hop into the jeep, preparing for the drive back to the town.\n  *set respect +20\n  *set tahiti_mission \"success\"\n  *finish\n*else\n  *set ranged_weapons +2\n  Acting quickly, you pull out two 9mm pistols from the satchel you've hidden in the jeep.\n\n  Going full-bore, you pump round after round into the nearest bodyguard until he's no longer standing.  Knowing the element of surprise is now gone, you rush toward the other nearest guard and curse his reflexes as you see a large .45 caliber bearing down on you.  He is obviously well-trained.  \n\n  Diving forward and spinning in a move that looks like it's straight from a movie, you swirl in a cyclone of violence, spewing forth a slew of hot lead.  Flashy, but nevertheless effective. You're glad you've spend so much time on target practice as your bullets hit the second bodyguard in the chest, dropping him.   \n\n  You land on your back, and your weapon is already trained on the third guard.  He runs behind the jeep for cover but, from your angle, you're able to get a bead on his legs and you fire.  The distance and the bodyguard's quick movements, though, mean that your shots miss, and you curse double when you see Carmone pulling out a piece that looks like the cannon he's taking cover next to.\n\n  Knowing your clips are running low and you have no time to reload, you force your way to your feet.  Carmone and the bodyguard are almost aligned, Carmone near the WWII artifact, the bodyguard behind the jeep, and you have an idea.  \n\n  With no clear shot from your vantage point, you run as fast as you can. Extending one arm to each side, as soon as you pass the front of the jeep and the side of the cannon you begin firing.  Bullets whiz by and, as you take another leaping step, you hear the terrifying sound of the firing pin hitting metal.  You're out of bullets.  What's worse, though, is Carmone is very much alive, as is his bodyguard.  \n\n  You charge again, this time without any thought of offense, just hoping to make it out alive.\n\n  The sound of gunfire is accompanied by searing pain in your side.  You don't have time to think about it as you continue running toward the forest.  \n\n  You nearly make it when a lancing pain strikes your arm.  \n  *gosub_scene util health_check_regular\n  Glancing down, you see blood.  You duck into a cluster of beautiful tropical palms and hear the continued pop of bullets being fired.  Thankfully, you take no more damage as you flee into the woods.\n  *goto wood_wound\n\n*label boat_tour\nThe deck is sandwiched between bungalows and, strolling slowly enough to fully take in the scene, you feel like you're walking into a postcard.  There are rhythmic waves splashing below the wooden planks and, to your right, a pair of what you assume to be honeymooners canoodle on their private deck. You turn your head so they can't get a good glimpse of you, even though they seem more focused on each other.\n\nKnocking on the wooden door of Carmone's hut, you try your best to adopt an island attitude of relaxation, but find it difficult to do knowing there are three armed guards inside.  \n\nIt takes a moment before the door is flung open, a pot-bellied man with a thick coat of white hair on his chest staring back at you.  Dressed in only a bathing suit, he stands in sharp contrast to the three fit, Hawaiian shirt-clad bodyguards inside.  \n\nThe curious and cautious look he is giving you would suggest he was expecting someone else.  You inform him that you're from the hotel and you're here to take him on a boat ride around the bay.  Looking you up and down with suspicion, he says, \"You're not from here.\"  It's not a question, and you realize he must have picked up on your lack of an island accent.  \n\nRemembering Boris's admonishment that the target would be suspicious that someone from America would be tracking him after screwing over his business partners, you say:\n\n*choice\n  #\"I'm an ex-pat.  Moved here a while ago because, well, this place is paradise.  Trust me, though, I know these waters as well as any native.\"\n    *if (improvisation > 12)\n      *set improvisation +2\n      \"Really,\" he fires back, and you can see the skepticism in his eyes.  \"Where from?\"\n\n      \"Canada,\" you reply without hesitation.  \"Betcha now you know why I wanted to move here.  Not a day of snow a year.  Can't beat that, eh?\"\n\n      He stares at you for a long moment, then eases a little.  \"I'd do the same thing if I was up there.  Hate the cold.  Alright, give me a sec.\"  He closes the door in your face and, after a few minutes pass, you begin to worry.\n      *label carmone_alone\n\n      Then the door suddenly opens and Carmone steps out, alone.  You smile inwardly and say, \"Ready to go?\"\n\n      \"All set,\" he says.\n\n      \"Then follow me,\" you reply, grateful Carmone is at your back, as he is unable to see the grin you're having a hard time stifling.\n\n      *page_break\n      The water is placid, and Carmone comments on the tranquility of the lagoon.  You acknowledge him politely, as you continue to steer the small watercraft farther and farther away from other people.  \n\n      You cheerily remark on the different types of fish you can see in the turquoise, nearly transparent water as you steer the boat to a more remote location.  Carmone, completely enthralled with the aquatic creatures, never catches wise to your scheme.  \n\n      As you round another bend and find yourself in a deserted portion of the lagoon, you point out a school of multi-colored, vibrant fish swimming by.  You hand Carmone an underwater camera and suggest he snap a few shots which you'd be happy to put on a flash drive for him.  Taking your cue, Carmone leans over the side of the boat to get a closer look and to snap some photos.\n\n      Carefully, you retrieve a silenced 9mm from the satchel you've hidden below the steering wheel of the small boat.  Carmone is so enamored with the fish, he doesn't notice you pointing the gun at him.  [i]Glad you enjoy them[/i], you think to yourself, [i]because now you're going to be sleeping with them[/i].  \n\n      You pull the trigger.  The shot is precise, and Carmone slumps to the deck, halfway in and halfway out of the boat.  You throw the anchor and drag his body back in, tossing a blanket over Carmone.  Next, you wipe the boat of your prints, and jump into the crystal-clear water to retrieve the camera. \n\n      You pause for a second in the water, pleased with your success.  The swim back to the main island isn't even a problem, as the water is pristine, pure, and feels like success itself washing over you with each stroke.  You know you'll have to dispose of the pistol before you fly home, but that will be an easy task compared to what you've just accomplished, and you congratulate yourself on a job well done.\n      *set respect +20\n      *set tahiti_mission \"success\"\n      *finish\n    *else\n      *set improvisation +2\n      \"Really,\" he fires back, and you can see the skepticism in his eyes.  \"Where from?\"\n    \n      \"London,\" you reply without hesitation, and then curse yourself for saying it.\n      \n      Carmone sneers at you, his disbelief apparent. \"You don't have an English accent,\" he says flatly, and you can already see the three body guards inside getting antsy.\n\n      \"Not everyone in the U.K. has an accent,\" you start before realizing that, no matter what you say, it's not going to make a difference.  The three guards are already reaching for their weapons.\n\n      You quickly push Carmone back and draw your gun, rushing forward into the high-rise bungalow.\n      *goto bungalow\n\n  #\"Born and raised on Bora Bora.  I live on the other side of the island, so I can show you some of the best spots that few of the other guides know about.\"\n    *if (strength > 12)\n      *set strength +2\n      \"You don't talk like the other islanders,\" he says flatly. Carmone sneers at you with obvious suspicion. \"You have no accent,\" he says, and you can already see the three body guards inside getting antsy.  Looking you over, he says, \"But you do have the strength of someone who has lived their life on a boat, so you must be legit.\"\n\n      He stares at you for a long moment and then claps his hands together, having made up his mind.  \"Alright, give me a sec.\"  He closes the door in your face and, after a few minutes pass, you begin to worry.  \n      *goto carmone_alone\n    *else\n      *set strength +2\n      \"You don't talk like the other islanders,\" he says flatly. Carmone sneers at you with obvious suspicion. \"You have no accent,\" he says, and you can already see the three body guards inside getting antsy.  Looking you over, he says, \"And you don't have that build of someone who lives their life on the water.\"\n\n      \"Not everyone from here has an accent and not every guide is super strong,\" you start before realizing that, no matter what you say, it's not going to make a difference.  The three guards are already reaching for their weapons.\n\n      You quickly push Carmone back and draw your gun, rushing forward into the high-rise bungalow.\n      *goto bungalow\n\n  #\"To be honest with you, I'm new to this island, but not to the business.  I was a boat captain in Canada for years before deciding to move to a warmer climate.\"\n    *if (intelligence > 12)\n      *set intelligence +2\n      \"I haven't been here long,\" you continue, \"but don't worry. I've conferred with a lot of other captains so I know some great spots.\"\n\n      \"Really,\" he fires back, and you can see the skepticism in his eyes.  \"What part of Canada?\"\n\n      \"Western Canada,\" you reply without hesitation.  \"British Columbia.  Betcha now you know why I wanted to move here.  Not a day of snow a year.  Can't beat that, eh?\"\n\n      He stares at you for a long moment, then eases a little.  \"I'd do the same thing if I was up there.  Hate the cold.  Alright, give me a sec.\"  He closes the door in your face and, after a few minutes pass, you begin to worry.\n      *goto carmone_alone\n    *else\n      *set intelligence +2\n      \"Really,\" he fires back, and you can see the skepticism in his eyes.  \"Where from?\"\n    \n      \"Ummmm,\" you reply unable to think of a city quickly.  Finally you sputter, \"Montreal.\"\n      \n      Carmone sneers at you, his disbelief apparent. \"You don't have a French accent, and that's a French-Canadian territory,\" he says flatly, and you can already see the three body guards inside getting antsy.\n\n      \"Not everyone from Montreal has an accent,\" you start before realizing that, no matter what you say, it's not going to make a difference.  The three guards are already reaching for their weapons.\n\n      You quickly push Carmone back and draw your gun, rushing forward into the elevated bungalow.\n      *goto bungalow\n\n*label bungalow\n*page_break\nTime seems to slow as you burst into the room.  Each detail of the bungalow is vivid in your mind: the thatched walls, the plush bed, the faux palm frond fans high in the ceiling, the rich, hardwood floors.  You even notice the reinforced glass cutout on the floor enabling you to see the crystal-clear water and the sea life swimming below.  More importantly, you notice the position of the bodyguards.\n\nThe first bodyguard is rising from the couch he had been lying on.  There's a cannon of a pistol in his hand, and he's taking aim in your direction.  The second and the third guards are in wooden chairs, but they, too, are getting up, a silenced MP-5 automatic in each of their grasps.  \n\nYou react with lightning speed, and the man with the cannon goes down with a well-placed shot from your silenced pistol.  A hail of gunfire erupts from the remaining bodyguards' weapons, and you duck out of the way as the shots pepper the walls around you.\n\n*if (ranged_weapons > 12)\n  *set ranged_weapons +2\n  You lunge forward, pulling a move that looks like it's straight from a movie.  Spinning wildly, with arms outstretched, you squeeze the trigger again and again.  Bullets fly forth from your tornado of fire, and you're grateful when one of the bodyguards goes down in a heap.  \n\n  You crash to the hardwood floor and feel pain in your side, but thankfully, sustain no serious damage.  You're in prime position now, and you fire twice, the shots taking the bodyguard first in the stomach, then in the head.\n\n  Leaping up to your feet, you see Carmone reaching for a weapon of his own.  The mob boss fumbles for a revolver, but you're faster and able to get a round off before he can even aim in your direction.  The shot is precise and Carmone slumps to the ground.\n\n  You waste no time, heading out to the small, attached dock.  In the tranquil oasis that is Bora Bora, you know that the sound of gunfire, even silenced gunfire, is likely to draw attention.  Diving off the dock, you high-tail it out of the area.\n\n  It's almost a half hour before you stop swimming, letting the gentle waves carry you to the shore of another resort.  Acting like a tourist, you head to the towel hut to dry yourself off.  The gun is long gone, buried deep in the white sands of paradise.  You head to the lobby and phone your connection for a boat pickup.  That arranged, you smile, content in a job well done.\n  *set respect +20\n  *set tahiti_mission \"success\"\n  *finish\n*else\n  *set ranged_weapons +2\n  You lunge forward, pulling a move that looks like it's straight from a movie.  Spinning wildly, with arms outstretched, you squeeze the trigger again and again.  Bullets fly forth from your tornado of fire, but you curse as you see neither of the bodyguards go down.  \n\n  You crash to the hardwood floor and feel pain in your side, but even worse is the lancing pain in your arm. You've been shot.  You return fire, but the guards' hail of automatic bullets is too much.  \n  *gosub_scene util health_check_regular\n  You duck behind a small vanity, which is quickly ripped to shreds by gunfire.\n  *page_break\n\n  You realize that you're out-gunned, and the stabbing pain in your arm makes it difficult to aim.  You narrowly escape another blast of gunfire as one of the bodyguards rushes forward, and you're able to dive out of the way just in the nick of time.  \n\n  Hearing the small clink of metal striking metal, you realize the bodyguard is out of ammo.  You're about to take advantage of this when what sounds like a massive explosion rings out in the room.  Turning toward the noise, you see Carmone with a large caliber revolver in hand, taking aim for another shot.  \n\n  Knowing that the odds are not in your favor, and you're going to be caught in a shooting gallery soon, you rush for the door.  Your arm burns with searing pain, but somehow you're able to make your way out the door and onto the dock.\n  *goto wound_dock\n\n*label wound_dock\n\nRunning down the wooden dock, you think you hear the sounds of footfalls behind you, signaling the approach of Carmone's men.  Thankfully, though, when you turn to see if they are following, all you see is an empty stretch of boards and the ever-present lapping waves.  \n\nRealizing that their first task is ensuring Carmone's safety, you take a little comfort in knowing that at least you're not going to have to shoot it out at the hotel.  Nevertheless, you hightail it, the process made difficult by the pain wracking your body.  You find yourself able to make it off the beaten path, giving you time to regroup.  After you're sure that the coast is clear, you head back to your hotel.  You check the wound and use your field training to stem the flow of blood.  Eventually, when you're bandaged and presentable, you contemplate your next move.  \n\nWhile you know you've failed your mission, you rationalize that it was an incredibly dangerous one, and there will always be more targets on the horizon.  Somewhat comforted by that thought, you wait for the right time to make your escape from the beautiful island of Bora Bora.\n*set tahiti_mission \"failure\"\n*set respect -5\n*finish\n\n\n*label deck\nPretending you're just out for a leisurely swim, you slowly make your way toward Carmone's bungalow.  Your silenced weapons are concealed in a watertight bag and, as long as no one gets close, it will just look like you're carrying a professional camera.\n\nThe blistering Tahitian sun beats down, but the ocean is cool.  A dual kayak floats by in the distance and the male and female occupants tip their oars in your direction.  You give a wave, turning your face away as you do, trying to appear as nondescript as possible.  You tread water, letting the couple move farther out into the crystal lagoon.\n\nYou make your way toward the bungalow as nonchalantly as possible.\nAs you swim on, you notice a man relaxing on an inflatable cushion.  He's just off the dock of a high-rise bungalow, but unfortunately, it's the one right next to Carmone's. The man is clearly drunk, flailing his arms to keep afloat as he tries to keep the beer resting on his belly from spilling.  You also notice he's talking to himself.  The man's back is to you, and you know you have a few options.  You:\n*choice\n  #Swim by him quickly. Even if he does notice me, he won't remember what he sees.\n    You swim swiftly, but are careful not to jeopardize your tourist persona, trying to look like an athletic traveler out for an early morning swim.  When one of the waves you generate finally makes it over to the man, he is far more concerned about his beer than seeing what caused the commotion.  As a result, the man never even looks your way and you continue on.\n    *goto under_hut\n\n  #Swim slowly and continue the façade of being a tourist.\n    You make your way languidly toward the bungalow.  Each kick of the legs and each stroke of the arms create a mini tsunami but, amazingly, the man never moves except to take another sip of his beer.  His position never changes and you slowly but surely continue on.\n    *goto under_hut\n\n  #Slip behind the man and drown him.\n    You don't know whether the man will turn around or not, but you take no chances.  Besides, he's easy prey, and you know you can take him out with no problem.\n\n    Your forearm slips around his throat before the man can so much as mouth a word.  In an instant, he's off the flotation device and into the water.  Your forearm cuts off the blood supply to his brain and, after his face is submerged, you release the hold so he can breathe.  All the man can inhale, though, is saltwater, and you force his head down as he frantically tries to figure out what's going on.  Eventually, the man stops struggling and you direct his body back under his own bungalow.  \n\n    Swimming away, you continue toward your target.\n    *page_break\n    *set innocents_killed +1\n    *set psychotic_level %+10\n    *set heat +1\n    *goto under_hut\n\n*label under_hut\n\nMaking your way beyond the pylons, you move to the underside of Carmone's bungalow.  There is a clear slab of glass molded into the floor of the hut, a perk for occupants to survey the water below, and you figure you might be able to use it to your advantage.  \n\nYou circle under the hut and gaze up into Carmone's bungalow from different angles.  You catch different glimpses of feet and legs and, after a little while, you're able to visualize where the three bodyguards are sitting.  Knowing it will give you an advantage, you swim toward the deck.  Staying low, you take a deep breath and run your strategy through your mind.\n\nWithdrawing your guns from the waterproof bag, you slide onto the lounging deck.  It's recessed from the main level, so you're able to stay out of sight for the moment.  Rising to a low crouch, you make your way up to the main deck.  There's no cover on this level, so you quickly rush toward the large sliding glass door of the hut.  One bullet shatters the glass into a million glistening pieces and, in the next moment, you're in your element.  It's time for someone to die.\n*goto bungalow", "util": "*label health_check_regular\n*set wounded_here true\n*if (wounds = \"uninjured\")\n  *set wounds \"minor\"\n  *set tookawound \"true\"\n  *return\n*elseif (wounds = \"minor\")\n  *set wounds \"serious\"\n  *return\n*elseif (wounds = \"serious\")\n  *set wounds \"near death\"\n  *set neardead \"true\"\n  *return\n*else\n  *goto_scene death_regular\n\n*label health_check_mask\n*set wounded_here true\n*if (wounds = \"uninjured\")\n  *set wounds \"minor\"\n  *set tookawound true\n  *return\n*elseif (wounds = \"minor\")\n  *set wounds \"serious\"\n  *return\n*elseif (wounds = \"serious\")\n  *set wounds \"near death\"\n  *set neardead \"true\"\n  *return\n*else\n  *goto_scene death_mask\n\n*label health_check_mask2\n*set wounded_here true\n*if (wounds = \"uninjured\")\n  *set wounds \"minor\"\n  *set tookawound \"true\"\n  *return\n*elseif (wounds = \"minor\")\n  *set wounds \"serious\"\n  *return\n*elseif (wounds = \"serious\")\n  *set wounds \"near death\"\n  *set neardead \"true\"\n  *return\n*else\n  *goto_scene death_mask\n\n*label clinic\n*if (clinic > 0)\n  *set clinic +1\n  You pull up in front of the shabby, run-down, red brick building you've been to many times before.\n  \n  You walk up the steps to the thick, oak door and enter a bright and modern clinic.  Like a regular, you tell the intake nurse about the damages you've sustained and lingering old injuries before she leads you back to see the doctor.  \n\n  As always, the big warrior M.D. gives you a quick once over and then tends to your wounds with vigor.  He pokes and prods, injects with syringes, and pumps you full of vitamins, cortisone, and a bunch of other stuff that is highly top secret.  \n\n  After a series of injections, physical manipulation, and minor micro-sutures, you can almost feel your tissues healing at superhuman speed.  He gives you some follow-up medication which he says will speed the healing process.  You bid him a fond farewell, impressed, as always, feeling miraculously healed by the doc.  You only wish curing the pain you feel from the loss of your friends and coworkers had an injectable remedy.\n  *if (wounds = \"near death\")\n    *set wounds \"serious\"\n    *return\n  *elseif (wounds = \"serious\")\n    *set wounds \"minor\"\n    *return\n  *else\n    *set wounds \"uninjured\"\n    *return\n*else\n  *label clinic_first\n  *set clinic +1\n  The sign, protruding from the stone above the entryway, is one typically found in hospitals and pharmacies in Europe.\n\n  You've been here before and know the drill.  It's a place where money is paramount and there are no questions asked.\n\n  You walk up the steps and pull open the thick, oak door, entering an entirely different world.  The interior is bright and modern, standing in stark contrast to the exterior.  The clinic doctor, an ex-Cold War KGB surgeon, has spared no expense in making sure the facility has all of the latest in medical technologies.  Being a private doctor for an assassin squad and other top-secret personnel necessitates state-of-the-art equipment.\n\n  The intake nurse listens to your laundry list of newly sustained damage as well as old injuries, then leads you to the doctor, who looks more like a soldier than a doctor.  He's buff and bald with an eye-patch and a jagged scar running from his forehead down the length of his cheek.  Still, you know his skills are top notch, and you lean forward slightly, letting the doctor go to work.  \n\n  Antibiotics are administered, as well as experimental, top secret pharmaceuticals.  The doctor assures you they're safe, even though there have been no formal human trials.  You have to admit, after a series of injections, you can almost feel your tissues healing.  \n\n  The cleaning and suturing of wounds is next, followed by some corrective physical therapy on a machine that looks like a futuristic torture device.  \n\n  In the end, you feel a world better, and thank the doctor for his time.  He gives you some follow-up medication which he says will speed the healing process, and sends you on your way. You bid him a fond farewell, impressed, as always, feeling miraculously healed by the doc. [i]Guess that's what happens when you're not bound by FDA rules and you have high security clearance[/i], you think to yourself.  \n  *if (chapter > 1)\n    You only wish curing the pain you feel from the loss of your friends and coworkers was just as easy.\n  *if (wounds = \"near death\")\n    *set wounds \"serious\"\n    *return\n  *elseif (wounds = \"serious\")\n    *set wounds \"minor\"\n    *return\n  *else\n    *set wounds \"uninjured\"\n    *return\n\n*label heal\n*if (wounds = \"near death\")\n  *set wounds \"serious\"\n  *return\n*elseif (wounds = \"serious\")\n  *set wounds \"minor\"\n  *return\n*elseif (wounds = \"minor\")\n  *set wounds \"uninjured\"\n  *return\n*else\n  *return\n\n*label downtime\n*temp events 0\n*hide_reuse\n*label hub_choice\n*if events = 1\n  Checking your watch, you realize you still have some daylight left.  With the extra time, you decide you want to:\n*if events > 1\n  *return\n*set events +1\n*choice\n  *if (wounds != \"uninjured\") #Get patched up at the clinic.\n    You decide that getting your wounds tended to is one of the best uses of your time because, not only will it keep your mind off of your problems, at least temporarily, it will heal your body.  With those thoughts in mind, you set out for the team's doctor.\n    *page_break\n    *gosub clinic\n    *goto hub_choice\n  #Build my strength at the gym.\n    *set strength +5\n    You decide that you can always be quicker, stronger, deadlier.  Honing these skills will be the best way for you to exact your revenge.\n    \n    There's nothing like the rush of endorphins from a good workout to help you kill the pain, and you decide your time is best spent in training.\n    \n    You shift into your fitness gear and make the short drive to your local workout spot.\n    *page_break\n    At the hybrid Mixed Martial Arts, Muay Thai, and weightlifting facility, you have the ability to work out all aspects of your body.  Some vigorous strength training is first, after some dynamic stretching, and your muscles burn from pumping iron.  \n    \n    Next, you practice some pad work and sparring, honing your punching and kicking techniques.  With each strike, you picture the unknown faces of the people stalking your crew, your real-life sparring partners growing alarmed by your increasing ferocity.\n    \n    MMA follows and, as you step into the cage, you transform into a warrior, using wrestling, jiu-jitsu, and strikes to really sharpen your reflexes.  \n    \n    The obligatory sauna is next to rest your muscles.  As you finish your routine, you feel yourself becoming an even more lethal killing machine.    \n    *goto hub_choice\n  #Hit the firing range and work on my shooting skills.\n    *set ranged_weapons +5\n    *if (chapter = 0)\n      Feeling the firepower of a gun in hand strikes you as the best way to spend your day.  After a little downtime, you pack up your favorite weapons and head to the firing range.\n      *page_break\n      The range is large and crowded, but you feel right at home.  The rhythmic thud of gunfire is music to your ears as you savor the smell of cordite.  You pay for some shells and plop your briefcase full of armaments down on the counter.\n      \n      Down the range is a silhouette outline of a human, and, by the time you're done pumping it full of lead, it looks like a shredded husk, the paper blown to bits.  You repeat this twice more, your aim getting even sharper, before you're out of bullets.  Smiling at a job well done, you decide that's enough for one day.  \n      \n      Leaving the range, you feel highly confident in your marksmanship. \n      *goto hub_choice\n    *else\n      You decide that, if you need to locate and kill someone to get revenge, you'd better be at the top of your shooting game.  And that means some quality time at the range.\n      \n      Besides, feeling the firepower of a gun in hand strikes you as the best way to spend your day and drown your sorrows, so you pack up your favorite weapons and head to the firing range.\n      \n      As always, the range is crowded, but you feel right at home.  The rhythmic thud of gunfire is music to your ears as you savor the smell of cordite and try your best to put the outside world aside for the moment.  You pay for some shells and plop your briefcase full of armaments down on the counter.  \n      \n      Down the range is a silhouette outline of a human, and, by the time you're done pumping it full of lead, it looks like a shredded husk, the paper blown to bits.  You repeat this twice more, your aim getting even sharper, before you're out of bullets.  Your skills honed, you decide that's enough for one day.  \n      \n      Leaving the range, you feel highly confident in your marksmanship.\n      *goto hub_choice\n  #Read up on some martial and tactical philosophy.\n    *set intelligence +5\n    *if (chapter = 0)\n      The mind is a terrible thing to waste, and you have no intention of letting that happen.\n      \n      Just reclining on the sofa is enough to relax you.  You pick up your well-worn copy of Sun Tzu's [i]The Art of War[/i] and flip over to where you'd last left off.  The ancient Chinese military treatise does not simply discuss tactics, but rather the philosophy behind them. The text gives you some ideas about what to do the next time you find yourself stuck in a tricky situation.\n      \n      Next on your reading list is a few chapters from [i]The Prince[/i] by Machiavelli, the text on intrigue and manipulation giving you food for thought on how to inspire fear and command respect from your peers.\n      *goto hub_choice\n    *else\n      You know that your intelligence can easily mean the difference between life and death and, on your path to revenge, you'll need every advantage you can get. You'll need to be on top of your game, and that means being prepared to outsmart your enemies.  \n    \n      Picking up your well-worn copy of Sun Tzu's [i]The Art of War[/i], you read a portion of the ancient Chinese military treatise as you prepare to go to war against whoever is stalking your crew.  You are already forming ideas in your head of what to do to get revenge.\n      *goto hub_choice\n  #Reflect and meditate to help me stay calm in stressful situations, and to increase my improvisational skills.\n    *set improvisation +5\n    *if (chapter = 0)\n      You bow to your cushion and then arrange yourself in a half-lotus, your hands resting in dhyana mudra, inviting wisdom and clarity.  \n      \n      You let your breath come deep and even, focusing on the slow, rhythmic pattern of inhalation and exhalation, finding peace and calm within yourself.  \n      \n      Relaxation flows over you and, by the time you're finished mediating, you feel mindful and more centered.\n      *goto hub_choice\n    *else\n      You decide that, even though your mind is awash with terrible images and doubt, the best way to deal with it will be to focus on the here and now and increase your improvisational skills in the process.\n    \n      You bow to your cushion and then arrange yourself in a half-lotus, your hands resting in dhyana mudra, inviting wisdom and clarity.  You let your breath come deep and even, focusing on the slow, rhythmic pattern of inhalation and exhalation.  \n    \n      It takes a long time, longer than ever before, as your mind keeps circling around the people stalking your crew, but finally, you are able to find some peace and calm within yourself.  \n    \n      You never really reach the state of relaxation you normally feel, the faces of your fallen comrades continuing to filter through your thoughts.  Still, you're able to calm your mind a little, and know that will enable you to think fast when you need to.    \n      *goto hub_choice\n  #Go to church.\n    While there are a multitude of things you could be doing with your time, you know that you will find solace in prayer, mourning the loss of your friends.  Grabbing a rosary from the table
