harles clears his throat dramatically. \"Okay, WE brainstormed a few things we need in a partner here. It's a demanding job, and there's a lot you should improve. Thing number one: We need to get your body, face…yup, hair needs work, too. We need to get everything camera-ready before you can do your own workout series.\n\n\t\t\"Thing number two: You need to really study your stuff and start developing specific workout plans for us. I still plan them now, and…well, it shouldn't really be in my job description anymore. I have a lot of other things to worry about. But you have to be smart. And we could really sell you as an expert, give you a nickname to reflect that you're a really smart baseball pitcher, like, um, Dr. Arms. Oh God, that's awful. Sounds like a supervillain. Charles, better name please.\"\n\n\t\t\"The Professor.\"\n\n\t\t\"Um, I don't know, fine,\" Julie says. \"We'll think about that later. Thing number three: We need an ab model. I am 100% serious about this, and it is so vital to everything we're doing. We just need someone in absolutely fearsome shape we can use to promote the videos, someone with abs that look like a tray of glazed dinner rolls. I am getting extorted by the models I've talked to so far, and I'm sick of it. So…we need all of that to make one mega-awesome fitness professional partner person. Do you need to improve at any of that stuff?\"\n\t\t*if sizeissues\n\n\t\t\tJulie thinks silently for a second then adds, \"And don't worry, we'll work on tailoring some outfits that fit you. It got around to me that your teammates made fun of you for the, uh, issue before. Not that it's an issue. You're fine. Normal. Better than normal! A great athlete. Oh God. You get it. I'll stop talking now. So yeah, is there anything you need to improve before we get started?\"\n\t\t*choice\n\t\t\t#Get yourself camera-ready.\n\t\t\t\t*set fame %+20\n\t\t\t\tAfter a long afternoon talking to image professional after image professional, you leave the studio with a new haircut and a huge, long list of things to do every morning and night to keep your face clear and clean. They even gave you some kind of spray that's supposed to prevent hat hair.\n\n\t\t\t\tIt's not exactly a prized trait within baseball to look good on television, but that just means putting in even a little bit of effort will make you stand out on the diamond. You're down an interesting road now.\n\t\t\t\t*goto rehabchoiceyear7\n\t\t\t#Study up on fitness training.\n\t\t\t\t*set analytical %+20\n\t\t\t\tJulie Cheng shows you a shelf full of books and a few binders of her own material, and you push them all into a big box and take them home to read. You study them for weeks and come out the other end with a better sense of what specific workout techniques do, but not much experience or idea how to actually design a workout yourself. That will have to be the next step, and hopefully it will involve less reading.\n\t\t\t\t*goto rehabchoiceyear7\n\t\t\t#Start baking those dinner roll abs.\n\t\t\t\t*set fitness %+20\n\t\t\t\t*check_achievements\n\t\t\t\t*if fitness > 60\n\t\t\t\t\t*if not(choice_achieved_ripped)\n\t\t\t\t\t\t*achieve ripped\n\t\t\t\tJulie gives you a workout to do three times a day, and she recommends that you start eating a lot of fish every day to balance your calories. Her workout is an ass-kicker, as they say in the business, and though it's focused on building showy abdominal muscles, there are plenty of other routines in there to balance out the rest of your body too. You're exhausted at the end of every day, but you're starting to see improvement, especially on those sweet, sweet dinner rolls.\n\t\t\t\t*goto rehabchoiceyear7\n\t#Rasheed Taylor.\n\t\t*set mentor \"Rasheed\"\n\t\t*set career \"distributive justice\"\n\t\tYou take out Rasheed's business card and call the number. \"Good afternoon?\" he says, and you immediately remember how weird the guy's speech patterns were last time when he was trying to talk to your teammates.\n\n\t\t\"Hi. I'm ${givenname} ${surname}, a pitcher for the ${nextteam}. I was wondering if I could help with your campaign to pay minor leaguers a living wage.\"\n\n\t\t\"Ah, yes. I could certainly use a frère d'armes for the troubling times ahead. There are times in our lives when—\"\n\n\t\tYou cut him off before he can take that thought any further. \"Yes, I'm interested in helping. What could I do to help your cause?\"\n\n\t\t\"There are a few things I'm clearly lacking at the present time,\" he says. \"My diction would perhaps be better suited to a more erudite audience. You, however, could speak to the players and fans at a level they could more easily comprehend. It would be helpful to have a good spokesman.\"\n\n\t\t\"Speaking frankly, I have no extant relationship with either the major league athletes who may be most hurt by an increase in payroll for minor leaguers, nor the fans who may lobby publicly for distributive justice. If your reputation is strong with either group, I'd be ever thankful for your cooperation.\"\n\n\t\tHe's not as bad as he was in that parking lot the other day, but you still have to process his words for a moment to make sure you know what he's talking about. \"So, you want me to talk to the players or the fans about paying minor leaguers a salary above the poverty line, right? Is that all?\"\n\n\t\t\"Precisely,\" Rasheed says. \"Or, if you don't mind my asking, are you a well-compensated veteran player?\" Without knowing his definition of \"well-compensated,\" you don't know how to answer, so you don't say anything. \"If you happen to be unusually wealthy, perhaps a grand gesture of generosity for your penurious colleagues in the minor leagues could be beneficial. You could personally redistribute your own salary and show just how many mouths could be fed by one year of your earnings. Of course, it is an extreme measure, and I would never require that you do such a thing with money you have earned.\"\n\n\t\tSo, either you could take advantage of a strong relationship with the fans or your teammates, or literally give a bunch of your money away? What should you do?\n\t\t*choice\n\t\t\t#I'll reach out to my teammates about Rasheed's cause.\n\t\t\t\t*set rebellious %+20\n\t\t\t\tYou start talking to your teammates to gather support. It will take more than one major leaguer to change things, and you don't know how your teammates will feel yet. It quickly becomes clear that at least half of them have no interest in fighting for minor leaguers. It's not a lack of empathy, exactly, because they all used to be in the tough money situation you're describing (except for the big prospects, who lived off of their draft signing bonus). They just can't afford to focus on something besides playing the game. Doing anything that could fracture the team is anathema to a lot of athletes.\n\n\t\t\t\t*if clubhouse_rep >= 55\n\t\t\t\t\tBut you have a good reputation in the clubhouse, so you get several players to listen who wouldn't have otherwise. They all remember slogging through Low-A baseball, trying to decide between extra time in the cage and getting a part-time job. The idea is out there now, and players are starting to wonder what they should do with the players association to improve life for minor league athletes.\n\n\t\t\t\t\tBut word filters up to team ownership that you're trying to rouse the rabble. There may be conflict ahead.\n\t\t\t\t\t*goto rehabchoiceyear7\n\t\t\t\t*else\n\t\t\t\t\tUnfortunately, you don't have a good enough reputation in the clubhouse to get much of anyone to listen. Even the players who had to struggle for money in their minor league days carry those memories with pride now. They were tough enough to do a hard job without much to eat, and that strength took them where they are today. But, wouldn't it be better to not force others through that? And wouldn't players be even better if they could afford good nutrition?\n\n\t\t\t\t\tIt will take something braver and bolder to start the conversation. But word still filters up to team ownership that you're starting to rouse the rabble. They certainly won't appreciate that.\n\t\t\t\t\t*goto rehabchoiceyear7\n\t\t\t\t*goto rehabchoiceyear7\n\t\t\t#I'll reach out to fans about Rasheed's cause.\n\t\t\t\t*set rebellious %+20\n\t\t\t\tIt's a bit awkward to reach out to fans directly on something you know the team won't approve of, but social media makes it possible. You start to advocate publicly for better pay for minor league athletes, telling stories about how hard it can be to live that lifestyle unless you got a big signing bonus on draft day. You ask fans to step up and ask more of their teams, and that's the specific part that you're afraid might get you into a conflict with the owner of the ${nextteam}. But you've emboldened yourself to be brave and fight for what's right.\n\n\t\t\t\t*if public_rep >= 55\n\t\t\t\t\tThe fans love you, and so they innately trust your word and start to think about the issues that you and Rasheed have been talking about. It doesn't take long for articles to start sprouting up on baseball websites, asking why minor leaguers are seemingly exempt from minimum wage laws. The conversation has begun, and all it took was one major leaguer pointing out the problem.\n\t\t\t\t\t*goto rehabchoiceyear7\n\t\t\t\t*else\n\t\t\t\t\tYou don't have a stellar reputation with fans, so the call for help, as seemingly well-intentioned as it is, doesn't get any traction right away. It will take something more creative, or brave, or bold to get the issue in front of the fans. But that doesn't mean your team didn't notice you trying to rouse the rabble and change baseball.\n\t\t\t\t\t*goto rehabchoiceyear7\n\t\t\t\t*goto rehabchoiceyear7\n\t\t\t#I'll give a lot of my money away to start a conversation.\n\t\t\t\t*set wealth %-20\n\t\t\t\t*set fame %+20\n\t\t\t\tAfter thinking through the process and working out some legal details, you give away 90% of your salary from this year. Rasheed Taylor researches minor leaguers around the country and finds 500 players that have no other support system beyond their baseball money. Even spread across those 500 players, your money still goes a long way: Each of those players gets $3,600.\n\n\t\t\t\tThe process of actually giving those players the money ends up being arduous and complicated, but as soon as your strange initiative is announced, you become famous overnight. Seemingly every reporter has texted you or called your agent asking for a comment. You use the platform to make Rasheed's point for him. Most minor league athletes aren't paid enough to get by on that money alone. They need to stay with host families, or borrow from their parents, or eat nothing but ramen and peanut butter sandwiches (maybe when they get to AA they can afford jelly). Baseball can be a fun job, and playing well enough in the minors will eventually earn you incredible riches in the majors, but no one in any industry should work every day and get paid like this. You're just in a position to do something about the baseball players.\n\n\t\t\t\tRasheed thanks you for your effort and your generosity, but the job isn't done yet. He says he'll call you again when there's a new opportunity to help the cause.\n\t\t\t\t*goto rehabchoiceyear7\n\t#Wilson Virdon.\n\t\t*set mentor \"Wilson\"\n\t\t*if agent = \"Virdon\"\n\t\t\tYou decide to call your agent and make it clear that you're looking to get experience in some non-baseball work. You give him a call.\n\t\t\t*goto virdonagentcheckdone\n\t\t*else\n\t\t\tSeveral years ago, you were introduced to a celebrity agent named Wilson Virdon, though you didn't end up signing with him. You figure he specializes in finding non-baseball work for baseball players, so you give him a call.\n\t\t\t*goto virdonagentcheckdone\n\t\t*label virdonagentcheckdone\n\n\t\t\"Sure, there's a lot of work I could get you,\" Virdon starts by saying. \"It will always help if your name carries a little weight, but any major league athlete is doing pretty good on that front already. But the more famous you are, the more people start calling me with work, instead of me having to call them.\n\n\t\t\"First off, I know people in Hollywood and could get you into a few minor roles,\" he says. \"It takes a lot of work to make it in that world, but you're used to competition, aren't you? You just have to make sure you're in good shape and show some style, you know what I mean?\n\n\t\t\"Or, if you'd prefer, you could go into endorsing products full-time. You've done some of that before, and it's much less work than acting. But you have to be able to say the same stupid thing over and over without spitting, you know what I mean? Can't be too good to say the same cliche a hundred times or the job will start to eat at you. I've seen it happen.\n\n\t\t\"Or, I could get you an in at NSN,\" he continues. \"They're always hiring baseball players to do pregame shows and interviews and stuff. They like to pit one analytical guy against a guy who goes from the gut, and let 'em fight it out on TV every week. So I'd suggest you pick a side and go for it just to play into character.\" What are you interested in?\n\t\t*choice\n\t\t\t#Hollywood Actor.\n\t\t\t\t*set career \"actor\"\n\t\t\t\t\"All right, I'll make some calls around Hollywood and get back to you,\" Virdon says. \"In the meantime, it wouldn't hurt if you did something that might accidentally raise your profile among regular people. Household name-type thing. Just go out there and win playoff games. No problem, right? I'll catch you later.\"\n\t\t\t\t*goto rehabchoiceyear7\n\t\t\t#Endorser.\n\t\t\t\t*set career \"endorser\"\n\t\t\t\t\"All right, I'll make some calls with some advertisement folks and get back to you,\" Virdon says. \"In the meantime, it wouldn't hurt if you did something that might accidentally raise your profile among regular people. Household name-type thing. Just go out there and win playoff games. No problem, right? I'll catch you later.\"\n\t\t\t\t*goto rehabchoiceyear7\n\t\t\t#NSN Analyst.\n\t\t\t\t*set career \"pre-game\"\n\t\t\t\t\"All right, I'll make some calls with NSN and get back to you,\" Virdon says. \"In the meantime, it wouldn't hurt if you did something that might accidentally raise your profile among regular people. Household name-type thing. Just go out there and win playoff games. No problem, right? I'll catch you later.\"\n\t\t\t\t*goto rehabchoiceyear7\n\t\t*goto rehabchoiceyear7\n\t#Prakash Bhavsar.\n\t\t*set mentor \"Prakash\"\n\t\t*set career \"guinea pig\"\n\t\tYou think about calling Prakash, but decide he's a young guy, and busy, so he'd probably prefer to text. \"Hi, this is ${givenname} ${surname}. I was wondering if I could try out your computer system arm thing some time soon. And I was wondering if you had any ideas for tweaks that could improve my pitching somehow. I'll be returning from an injury, so now's a good time to make a change, even a dramatic one. Thanks.\"\n\n\t\tLess than a minute later, Prakash sends a long and detailed reply. He describes a number of ideas, clearly personalized to your particular pitching style. Did the ${nextteam} give him more data than just what he was collecting that time you met him? Regardless, you agree to meet him and try a few things when the doctors clear you to start warming up, which will hopefully be in just a few days.\n\t\t*page_break A Month Later\n\t\tYour arm is recovering slowly, making you even more worried about your future. But you show up at Prakash's sketchy warehouse testing center with full clearance to throw full effort pitches, so now's the time to make a change if anything will help.\n\n\t\tInstead of saying hi, Prakash gets right to the point: \"Take whatever time you need to warm up, then show me your windup and throw at game speed. Okay? Thanks, the computer will tell me what we need to know.\"\n\n\t\tAfter you do as he says, Prakash stands silently behind his laptop for several minutes, eyes flicking back and forth across the screen. \"Your team doesn't want me to tell you this,\" Prakash begins, \"but I think I've figured out how to teach spin rate. Your pitches spin in the air, obviously, right? And the more a fastball spins, the more it defies gravity and stays up. The less it spins, the faster it drops, which is also good, especially for a changeup. Breaking balls are the opposite: the more they spin, the more they drop. Some spin is good, some's bad, but anyway, this is getting too complicated. The point is, I can help you change your spin rates. But let's go one thing at a time, because otherwise, trust me, your arm will fall off. So, what should we work on first?\"\n\t\t*fake_choice\n\t\t\t#More spin on the fastball, which will make it seem faster.\n\t\t\t\t*set velocity %+20\n\t\t\t\t*check_achievements\n\t\t\t\t*if not(choice_achieved_purevelocity)\n\t\t\t\t\t*if velocity >= 70\n\t\t\t\t\t\t*achieve purevelocity\n\t\t\t#Less spin on my changeup, which will make it drop harder.\n\t\t\t\t*set changeup %+20\n\t\t\t#More spin on the curve, which will make it break harder.\n\t\t\t\t*set curveball %+20\n\t\t\"Fantastic,\" Prakash says. \"I'm going to give you a few tweaks to your grip and arm motion, and I'm going to involve your core a little bit more too. Bear with me, there's a lot to change, but your arm will probably be okay when it's all done with. 98% sure.\"\n\n\t\tAfter just a few hours of training, you start to see results. Or rather, Prakash does, in the spin rate graphs on his computer. Because of your injury, your pitches don't look like they used to, but a normal rehab should fix that, hopefully. Anyway, Prakash really does know how to improve and shape your pitching, and his computer system is able to see every step of the process, from your leg lift to the moment your fingertips leave the ball. This is exciting, but Prakash seems to think he can take things even further. Maybe you could be the first pitcher in a data revolution, and throw harder and better than anybody else in baseball.\n\t\t*goto rehabchoiceyear7\n*label rehabchoiceyear7\n*page_break A Few Weeks Later\nPaychecks keep coming into your account even though you've been injured and unable to play. It feels a little wrong to make money for sitting at home waiting for your arm to recover, but former generations of players had to fight for that right to a guaranteed salary. Speaking of money, you've got a lot of it to spend. Now that you've got time and money to spend, is there anything you'd like to spend it on?\n\nYou could always give to charity, of course. The fans will respect you for being generous, and you have enough to be a huge help to any cause you can think of. The world needs people with your masses of discretionary income to give to charity.\n\nOr, if you're laser-focused on this whole baseball thing, you can buy workout time at the best fitness centers in the country. You wouldn't get much use out of a fitness center in your current state, but you can reserve space ahead of time for this offseason. Your team's fitness facilities are great and all, but the pitching coach isn't exactly going to be at your beck and call in middle of December. Coming back from your injury, you could use a professional's guidance to get your control and mechanics back where they should be.\n\nYou could pander to your teammates by offering to pay for some lavish dinners while the team's at home. Athletes burn a lot of calories, so they tend to consume a lot too. And while you're in the majors, you may as well make those calories the nicest, most expensive calories available. You'll endear yourself to the clubhouse by offering to pay for multiple full-team dinners. And if leadership can be bought, why not buy it?\n\nA few weeks ago an acquaintance told you a NASCAR racing team was up for sale. You couldn't drive one of the cars, obviously, or at least not unless you wanted to invalidate your contract (the people who write those contracts frown upon life-endangering hobbies). And it would be a completely hands-off kind of thing where you provide the money and get to go hang out in the pits during the races, but that could be really fun. And your name would end up in a few headlines for buying it too. Maybe it'd make you a little more famous.\n\nOr, of course, you could just save the money for the future. You won't always be young and able to throw hard enough to strike hitters out. What will you do?\n*fake_choice\n\t#Give generously to charity.\n\t\t*set public_rep %+20\n\t\tYou choose the perfect charity and give them a large portion of the salary you've earned while on the disabled list. You get a call from the director of the non-profit to thank you. He tries to come up with something to name after you, but that feels weird, so you decline. You've given to charity a few times before, but something about this one feels really great. You've got enough money to feel like you're really making a difference.\n\t#Buy offseason time at a professional fitness center.\n\t\t*set control %+20\n\t\tYou schedule time with a top-notch physical trainer in the best fitness center in the country, ready to go in December. The fitness center is way up in the Rocky Mountains in Colorado, where the thin air is enough to give many people a cardio workout. They say that there's an expert for every muscle in the human body at this center, which you assume isn't literally true, but who knows? That time will keep your mechanics clean and your pitches going where you want them to.\n\t#Treat my teammates to some lavish meals.\n\t\t*set clubhouse_rep %+20\n\t\tYou take your teammates out multiple times during a long homestand. By the end of the first night's dinner, a lot of them move their belts out a notch. By the end of the second night, a few teammates unbutton their pants to get more room for food. By the end of the third night's dinner, a few teammates have sworn off eating food ever again. By the fourth night, those same teammates are asleep in their chairs in the restaurant, peaceful and happy with yet another amazing meal. And when Friday night comes around, your manager steps in and tells you to stop feeding the team so much food before team fitness becomes an issue. So the week of fine eating has to come to an end, but your teammates will never forget the best food week of their lives.\n\t#Buy a NASCAR racing team.\n\t\t*set fame %+20\n\t\tAs the new official owner of, well, you guess now it's called ${surname} Motorsports, you've officially planted your personal banner in NASCAR. Wipe the sweat off your forehead and get a whiff of that burning rubber smell. It just feels right.\n\t#Save my money.\n\t\t*set wealth +5\n\t\tYou've heard stories about other athletes getting rich and spending like they'll never be too old to play the sport. You're too cautious to fall for a trap like that. Every other week, you transfer your paycheck into a long-term savings account, and, wow, it feels great. In fact, maybe that's all this is. You check your account every other week and you enjoy seeing that little dollar number on your phone or computer screen go up and up. Maybe that's more fun to you than the regular old stuff other people buy. The numbers go up! It's so cool!\n\n\t\tAnd who wants to waste your money on teammates? They all get big paychecks too, they can buy their own steak and lobster. It's not worth it being a veteran player. Sure, rookies have to carry all the stuff out to the bullpen, but veterans are expected to buy everyone dinner? You'd rather carry the bags and buckets. And of course you're expected to lead the team too. Too much responsibility. But anyway. You're keeping your money, and no one can take it from you. That's the way it ought to be.\n*comment Rehab choice. Decide which attribute to save, and the others all go down a little.\n*page_break Time to Rehab\nYou begin your rehab throwing program in what a few of your teammates have taken to calling the \"hangover room,\" a dimly-lit set of indoor batting cages where players warm up in the mornings. Loud pop sounds reverberate around the room's concrete walls as your pitches hit the green tarp lining the cages.\n\n*if friendswithsimon\n\tA silhouette steps into the cage door behind you. He has his arms tucked into the front pocket of a hoodie, and he wiggles his mustache when you notice him. Is that really Simon? \"Did you lose weight?\" you ask.\n\n\t\"Being out of a job has made me tighten the belt a little, I suppose,\" Simon says as he walks forward and puts an arm on your shoulder. \"Been a while.\"\n\n\t\"Why are you here?\" you ask.\n\n\t\"The ${nextteam} heard your former pitching coach was out of work, so they hired me to come help with your rehab. So let me ask, how's the arm feeling?\"\n\t*goto backtothenormal\n*else\n\tA dark figure enters the cage behind you. All you can see is his silhouette: Baseball cap, hands tucked into the front pocket of his hoodie, and a bristling mustache. Simon. \"What are you doing here?\" you ask.\n\n\t\"The ${nextteam} heard that your former pitching coach was out of work, so they hired me to come help with your rehab,\" he says. \"I guess I decided not to tell 'em we didn't get along so great.\"\n\n\t\"So teams aren't interested in hiring a holistic pitching coach? That's a shocker.\"\n\n\t\"Not anymore they ain't. They'll hardly hire anyone who doesn't know computer programming these days. Well, I've got to eat, so whether you like it or not you'll be working with me for your rehab. How's the arm feeling?\"\n\t*goto backtothenormal\n*label backtothenormal\n\n\"It's back to the normal level of constant discomfort,\" you say, laughing. \"But I'm not liking how the pitches are coming out of my hand right now. I'm all over the place, and they're clearly not as fast as they were before the injury.\"\n\n\"That'll happen with an injury like yours, unfortunately,\" Simon says. \"You're not gonna like hearing this, but my main question for you is, what part of your pitching would you want to prioritize? Velocity? Control? Movement on the breaking balls? Or just keeping your body fit? We're gonna pick one of those and focus on it, all right? What do you think?\"\n*choice\n\t#Keep my velocity up.\n\t\t*set fitness %-10\n\t\t*set control %-10\n\t\t*if curveball > 0\n\t\t\t*set curveball %-10\n\t\t*if slider > 0\n\t\t\t*set slider %-10\n\t\t*if changeup > 0\n\t\t\t*set changeup %-10\n\t\tSimon gives you a detailed workout plan for getting your fastball velocity back to pre-injury levels. He gives detailed advice and he's clearly engaged, working one-on-one with you down to the tiniest detail. He was never like this as your real pitching coach. Maybe he's trying to work in a normal way, and maybe find a major league job again.\n\n\t\tAfter working with Simon, your velocity is back to normal, but your breaking balls have clearly lost some movement, and your added effort has hurt your command and fatigues you more than usual after a day's work on the training mound.\n\t\t*goto afterrehabchoice\n\t#Work on my control.\n\t\t*set velocity %-10\n\t\t*set fitness %-10\n\t\t*if curveball > 0\n\t\t\t*set curveball %-10\n\t\t*if slider > 0\n\t\t\t*set slider %-10\n\t\t*if changeup > 0\n\t\t\t*set changeup %-10\n\t\tSimon designs a detailed workout program to get your control back to where it was before the injury. He spots tiny mechanical adjustments and gives great advice in a way he never did back when he was your real pitching coach. This must be how he used to work before he got into the unusual meditation stuff. Maybe he's trying to change his ways to get back into a baseball job somewhere.\n\n\t\tYou're back to spotting the ball like you used to, but every other part of your game is deteriorating. Your breaking balls don't move like they used to, and your fastball isn't as fast, and you're unusually tired after a bullpen session.\n\t\t*goto afterrehabchoice\n\t#Keep my off-speed pitches sharp.\n\t\t*set velocity %-10\n\t\t*set control %-10\n\t\t*set fitness %-10\n\t\tSimon designs a set of workouts to get your breaking pitches back to where they were before the injury. He shows a surprising attention to detail, and he's clearly engaged in working one-on-one with you, and he knows how to give slight adjustments to get you back on track. This must be how he used to work before he got into the unusual meditation stuff. Just like a regular pitching coach. Very strange.\n\n\t\tYour breaking balls are back to moving like they used to, but your fastball has lost a few ticks, and you're having trouble hitting the corners when you want to. Not to mention you feel exhausted after a regular bullpen session.\n\t\t*goto afterrehabchoice\n\t#Stay fit.\n\t\t*set velocity %-10\n\t\t*set control %-10\n\t\t*if curveball > 0\n\t\t\t*set curveball %-10\n\t\t*if slider > 0\n\t\t\t*set slider %-10\n\t\t*if changeup > 0\n\t\t\t*set changeup %-10\n\t\tWith a surprising attention for detail, Simon takes you through a fitness program to get your body back the way it was before your injury. He seems engaged, detail-oriented, and like he knows his stuff. This must be what his coaching was like before he got into the unusual meditation stuff. If he could always be like this, he could easily be a pitching coach again.\n\n\t\tYou get back to your normal fitness level again, but unfortunately that hasn't helped your pitches look any better. You've lost some velocity on your fastball, and your control and breaking balls have clearly lost some sharpness.\n\t\t*goto afterrehabchoice\n*label afterrehabchoice\nIt's alarming, but you don't get the sense there's anything Simon could have done to improve the situation. This is just what the injury has done to your arm.\n\nAfter a few weeks of working with Simon, he takes his leave. \"That's all I've got for you,\" he says. \"If you hear about any teams looking for a pitching coach and they don't mind them being a little unorthodox, you tell them I'm available. I'll be out fishing somewhere, waiting for the call. If baseball will have me.\"\n\nYou can't imagine any major league teams will hire him, but you can't believe he hasn't found a new job in the years and years since he left the Bulls. He must really want to work in baseball. And it can't be fun knowing your lifelong career is over.\n*page_break A Few Weeks Later\n*if nextteam = \"Bulls\"\n\tYou make your return to the Bulls dugout in late August, though you aren't nearly ready to pitch yet. You gingerly rest your throwing arm on the dugout railing and settle in to watch the game unfold.\n\n\t*if connorjumpstep\n\t\tConnor has taken very well to Portia's jump-step idea, making his already unorthodox sidearm delivery even stranger by basically hopping towards the plate as he's making each pitch. His ERA is sitting at 2.49 this far into the season, and if he can keep up this pace, he might win an award or two at year's end.\n\t\t*goto jumpstepcheckdone\n\t*else\n\t\tAfter your injury, Connor slowly came around to Portia's jump-step idea, taking it and making his already unorthodox sidearm delivery even stranger by basically hopping towards the plate as he's making each pitch. His ERA is sitting at 3.02 this far into the season, winning enough games to keep the team in the playoff race despite your absence.\n\t\t*goto jumpstepcheckdone\n\t*label jumpstepcheckdone\n\n\tHowever, you seem to have brought some bad luck with you on your first day in the dugout. Today, every time Connor does the jump-step, the first base umpire calls a balk. After the second balk call, he talks it over with the umpiring crew to figure out what they want him to change, but even after slightly tweaking the delivery, the umpire calls another balk, which scores the runner from third. Connor is furious, as he's used this jump-step all year without any calls going against him, and now is so used to it that he probably couldn't pitch normally again without practicing for a week or two.\n\n\tAfter the run-scoring balk call, Connor runs up to the first base umpire and gets in his face, yelling some unkind Aussie slang that's supposed to offend the umpire, but only confuses him. The Bulls bench empties to stop Connor from doing something stupid, and the opponents' bench empties mostly just because they wanted to be included on any drama. Your arm is still recovering, but you feel compelled to protect your friend. What do you do?\n\t*choice\n\t\t#Go yell at the umpire myself to show support to Connor and the team.\n\t\t\t*set clubhouse_rep %+15\n\t\t\tYou jump over the dugout railing among the crowd of other baseball players, but while the rest are mostly trying to separate Connor from the umpire, you let the umpire hear about what a stupid moron he is, and how he's trying to make the game all about himself by making these unprecedented calls.\n\n\t\t\tIt's a small thing, but Connor notices, and your teammates notice, that you were willing to stand up for a teammate in an important moment. It remains to be seen whether Connor will get to use the jump-step again, but at least he knows he has a good teammate.\n\t\t\t*goto year7playoffs\n\t\t#Stand between Connor and the umpire to break up the fight.\n\t\t\t*set fame %+20\n\t\t\tYou drag your injured arm onto the field and rush in-between Connor and the umpire, determined not to let Connor do something stupid like spit at him or throw a punch. Several of your teammates immediately move their attention to you, afraid you're going to re-injure your arm by getting in the middle of a pointless tussle in some random game in August.\n\n\t\t\tThe media also notices you put your career on the line to break up the fight, and a beautiful photograph of you, Connor, and the umpire poised against one another makes the top of NSN.com the next day. It becomes a famous moment, and several people who don't watch baseball very often start to recognize you as \"the player who broke up that big fight with an injured arm.\"\n\t\t\t*goto year7playoffs\n\t\t#Go out there and just whisper something in Connor's ear to get him to stop.\n\t\t\t*set anecdotes +1\n\t\t\t*check_achievements\n\t\t\t*if not(choice_achieved_memoirmaterial)\n\t\t\t\t*achieve memoirmaterial\n\t\t\tYou know just what to say to end this fight. You rush onto the field and grab Connor and cup your hand over his ear. As gently as you can, you whisper, \"You look like a knob, mate,\" in Connor's ear. His body language immediately changes, as if he were a robot designed to shut down when he hears that phrase. \"You're right,\" he says, and apologizes to the umpire before wading through the crowd of baseball players to head for the dugout, ejecting himself from the game.\n\n\t\t\tYour whispering is caught on camera, of course, and there's a lot of media speculation over what exactly you said to calm Connor down, but you aren't telling. A fun story like this needs to be saved for a rainy day.\n\t\t\t*goto year7playoffs\n*elseif nextteam = \"Barons\"\n\tAndres Del Rosario has returned to the Barons lineup, and though he never really admitted he was taking steroids or any performance-enhancing drug, there's an uneasy tension around the team and fans with letting a cheater return to the team, even after serving a long suspension, as if nothing had happened. You're still rehabbing and not traveling with the team, but you decide to go to Rosario's house on an off-day and talk to him.\n\n\tHe answers the door in a silk shirt, business socks, and cotton boxers. That's Rosario, all right. He welcomes you in and pulls on some athletic shorts, which somehow makes him look even more ridiculous, then sits down in front of his TV, running a loop of sports news on NSN. Eventually the small talk dies down, and you have to address the elephant in the room somehow. What do you say?\n\t*choice\n\t\t#Avoid the steroids talk and just chat about normal friend stuff.\n\t\t\t*set rosario_rel %+20\n\t\t\tIt takes some willpower, but you decide to have a normal conversation with Rosario and implicitly forgive him for using PEDs. He's a long-time friend and a teammate, and cheating hurts him far more than it hurts you. Better just to let it go.\n\n\t\t\tThe two of you order some barbecue and talk, catching up on the months you've spent apart due to injury and suspension. Slowly, the tension goes away, and you both feel comfortable without addressing the incident that almost tore the team apart.\n\t\t\t*goto year7playoffs\n\t\t#Ask him if he actually knew Lisa Janga was using PEDs or just had a theory.\n\t\t\tRosario freezes for a moment, caught a little off guard by the question. After a few seconds, he notices how tense he looks, and decides to get a drink just to have something to do with his hands. He says nothing as he goes through the process, deciding to let the room fill with an awkward air, constricting both throats.\n\n\t\t\tHe quickly finishes his drink then sits down in a dark blue recliner that looks out of place in his otherwise monochromatic, upscale abode. He must have liked the chair too much to leave it behind when he leaped head-first into the upper class.\n\n\t\t\t\"I was never suspicious of Lisa,\" he says, finally. \"I was suspicious of you. You kept getting better and better every year, throwing harder and sharper and getting better results. I only brought up suspicion about Lisa to start a conversation and maybe you'd trust me enough to tell me you were on PEDs. Otherwise I didn't know how to explain the way you kept improving every year. I mean, I know I'm a little older than you, but how did you do it otherwise?\"\n\n\t\t\tYou're shocked to have the suspicion tables turned on you like this. Of course you haven't used PEDs. Is he just saying this as a tactic to get you to lay off of him? What do you say?\n\t\t\t*choice\n\t\t\t\t#\"You know this isn't about me, it's about you. Why did you use PEDs?\"\n\t\t\t\t\t*set rosario_rel %-20\n\t\t\t\t\tRosario's eyebrows arch for just a moment before reverting back to normal. \"Don't you understand?\" he says. \"I couldn't quit, ${givenname}. I don't need to beat everybody, but I couldn't quit. One day, I'll have to, but I've always been willing to do whatever it took to keep going. If you don't have that somewhere in you, then you're going to drop out of high school when the asshole pitcher from the rival school tries to hit you in the mouth with the ball. I'm sure you have that too. You wouldn't get this far without having that thing within you, for good and bad.\"\n\n\t\t\t\t\tYou suppose that's the closest thing you're going to get to an admission of guilt. The two of you talk about other stuff going on in your lives to ease the tension, but after a little while, you say you have to go. Hopefully your friendship can survive the PED stuff, but it's on fragile ground right now.\n\t\t\t\t\t*goto year7playoffs\n\t\t\t\t#\"Pitching isn't like hitting. It takes more than the muscles a PED can give you.\"\n\t\t\t\t\t*set anecdotes +1\n\t\t\t\t\t*check_achievements\n\t\t\t\t\t*if not(choice_achieved_memoirmaterial)\n\t\t\t\t\t\t*achieve memoirmaterial\n\t\t\t\t\t\"PEDs aren't about big muscles,\" Rosario replies. \"They're about recovering from injury. They help your body heal. Any baseball player wants to stay on the field above all else. That's what I needed, because I couldn't just quit. I'm sorry, but I've never been able to quit. It's a strength of mine, and a weakness.\"\n\n\t\t\t\t\tYou're not sure he meant to, but Rosario just admitted he used PEDs. No need to push things further than that. You spend half an hour or so talking about other things, trying to ease the tension, before saying you have to go. Hopefully the next time you meet, you can resume your regular friendship.\n\t\t\t\t\t*goto year7playoffs\n\t\t\t\t#\"You have to apologize to Lisa, whether she knows what you did or not. Rumors like that can ruin a career.\"\n\t\t\t\t\t*set clubhouse_rep %+20\n\t\t\t\t\t\"I guess you're right,\" Rosario says. \"I'll tell her I'm sorry for putting her name out there like that. I don't think it got out to the public but that's a terrible thing to do to someone.\" He slumps in his chair, and it kills you to see fun-loving Rosario this dejected.\n\n\t\t\t\t\tThe two of you get off of the serious topic, though you notice he never actually admitted to using PEDs. He might have to deal with it better than that if he wants the team to accept him again.\n\t\t\t\t\t*goto year7playoffs\n\t\t#Ask Rosario if he really used PEDs, and if so, why?\n\t\t\t*set anecdotes +1\n\t\t\t*check_achievements\n\t\t\t*if not(choice_achieved_memoirmaterial)\n\t\t\t\t*achieve memoirmaterial\n\t\t\tRosario freezes in place, exposed. He clearly didn't think you would broach the topic, which is kind of incredible. How could you talk about anything else until this gets cleared up? After a few seconds, he notices how tense he looks, and decides to get a drink just to have something to do with his hands. He says nothing as he goes through the process, deciding to let the room fill with an awkward air, constricting both throats.\n\n\t\t\tHe quickly finishes his drink then sits down in a dark blue recliner that looks out of place in his otherwise monochromatic, upscale abode. He must have liked the chair too much to leave it behind when he leaped head-first into the upper class.\n\n\t\t\t\"Look,\" he finally says. And for most of a minute, that's all he says, grabbing at his face in more and more complicated ways to show he's thinking, and he's uncomfortable.\n\n\t\t\t\"I've had a lot of time to think during the suspension,\" he finally says. \"I think I figured myself out a little bit. You know, in high school I used to always see a bunch of new kids try out every year, and they'd come for one or two practices then I'd never see them again. Maybe they'd suck at throwing the ball, or they'd hit a pitch with the handle and the bat would hurt their hands, or they'd run around in the outfield for an hour or two and throw up because it was a little hot that day, and they ate something bad for lunch. They'd quit.\n\n\t\t\t\"I could never understand those kids,\" Rosario says. \"I could never quit. That's why I'm still here. I'm not saying that like it's a good thing. I just didn't know how to quit, or what I would do if I quit. I kept going, doing the same thing for my whole life. And then, two years ago, my knees quit. I wanted to keep catching, but the crouch hurt my knees so bad, and I sucked. So I had to play first base, or designated hitter, and that meant I didn't play every day. My body was forcing me to quit, and I couldn't take it. So that's why it all happened.\"\n\t\t\t*choice\n\t\t\t\t#\"So that's why you took PEDs? Just to keep playing? And it [i]just so happened[/i] to make you hit better too?\"\n\t\t\t\t\t*set rosario_rel %-20\n\t\t\t\t\tRosario's eyebrows arch for just a moment before reverting back to normal. \"Don't you understand?\" he says. \"I couldn't quit, ${givenname}. I don't need to beat everybody, but I couldn't quit. One day, I'll have to, but I've always been willing to do whatever it took to keep going. If you don't have that somewhere in you, then you're going to drop out of high school when the asshole pitcher from the rival school tries to hit you in the mouth with the ball. I'm sure you have that too. You wouldn't get this far without having that thing within you, for good and bad.\"\n\n\t\t\t\t\tYou suppose that's the closest thing you're going to get to an admission of guilt. The two of you talk about other stuff going on in your lives to ease the tension, but after a little while, you say you have to go. Hopefully your friendship can survive the PED stuff, but it's on fragile ground right now.\n\t\t\t\t\t*goto year7playoffs\n\t\t\t\t#\"Say no more. I understand now.\"\n\t\t\t\t\t*set rosario_rel %+10\n\t\t\t\t\t\"Thank you,\" he says, clearly relieved. He must really not want to come right out and admit what he did. The room stands still for half a minute or so, then you say you ought to get going. Next time, the air will finally be clear enough for you to be normal friends again.\n\t\t\t\t\t*goto year7playoffs\n\t\t\t\t#\"Why what happened, Rosario?\"\n\t\t\t\t\t\"You know what happened,\" he says. \"I don't need to tell you.\"\n\n\t\t\t\t\tIt sounds like that's as far as he's willing to go. He's come right to the edge of admitting he took PEDs, but no further. You suppose that's good enough. The two of you talk for a little while to ease the tension, but eventually you say you have to go. Hopefully next time you meet, this will all be behind you.\n\t\t\t\t\t*goto year7playoffs\n*else\n\tDuring a game in late August, Ama Mendis takes the mound, throws twenty pitches, and fails to throw a single strike. She throws five straight walks then is pulled from the game. She walks, hunkered and embarrassed, straight into the locker room, where you hear the sound of things being thrown into the walls.\n\n\tYou watch all this unfold while resting your throwing arm as gingerly as you can on the dugout railing. After the noises die down, you follow her into the locker room. You know it and she knows it, but no one dares say the silly, childish word that represents a very real threat to her baseball career: \"yips.\" Some mental or physical block has developed that prevents her from throwing the way she always has. Unless she can conquer that strange affliction, she's done for.\n\n\t\"You made it, Ama,\" you say. \"You're a major league pitcher. You were one of the best cricket bowlers on the planet, and now you're one of the best baseball pitchers, out of the millions of people around the world who've played the game. Can't you take a step back and appreciate how great you are instead of being miserable that you're not the absolute best?\"\n\n\t\"For twenty years, I've been filled with pride and envy. For Catholics, pride and envy are deadly sins, and for Buddhists, they're two of the ten fetters. But for an athlete, they are hammer and nail. I was proud of my athletic ability, and I was envious of those who performed even better than I did, and that fueled a competitive drive to overcome any obstacle.\n\n\t\"But now, I've reached my physical limit, and pride and envy are accelerating my downfall,\" Ama says. \"These personal qualities that made me triumph over more talented pitchers are not virtues. They are vices. And now I have to pay for that.\"\n\n\tYou're worried about Ama's fatalistic tone, and just when you're about to say something, she interrupts you.\n\t*if mendis_rel >= 55\n\t\t\"You've been very kind to me, even when you were the target of my envy,\" Ama says. \"You've made me realize that you can still be successful in this line of work without all the pride and envy. It's going to take some time, but I'm going to try to accept who I am. I will try to be happy with being merely a great pitcher, but not the greatest. Maybe when that happens, I will be able to throw strikes again.\"\n\n\t\tYou begin to say, \"Ama, I—\" but she cuts you off again.\n\n\t\t\"Please, don't say anything else,\" she says. \"Though it might not look like it right now, I'm in a good place. I'm going to take some time off from baseball, but I'll be back. You are an inspiration, and I will see you next year.\"\n\n\t\tYou make your way back to the dugout to watch the rest of the game. At the post-game press conference, your manager announces that Mendis has been transferred to the 60-day disabled list and won't be returning this season.\n\t\t*goto year7playoffs\n\t*else\n\t\t*set mendis_rel 0\n\t\t\"Because of my sins, or fetters, or personality defects, whatever you want to call them, I will never throw another pitch. I've accepted it, just now, in this locker room. I will be a happier and better person after I've removed sports from my life. Thank you for being concerned about me and coming in here, but please don't tell anyone about my decision.\"\n\n\t\tYou begin to say, \"Ama, I—\" but she cuts you off again.\n\n\t\t\"Please, don't say anything else,\" she says. \"My decision is final, and it's a relief. I don't have to struggle anymore. I don't have to try to be the best anymore. I can be normal, and happy. Good luck to you, and to the whole team.\"\n\n\t\tYou make your way back to the dugout to watch the rest of the game. At the post-game press conference, your manager announces that Mendis has been transferred to the 60-day disabled list and won't be returning this season. Or, likely, ever.\n\t\t*goto year7playoffs\n\n*label year7playoffs\n*page_break\nPlaying without you, the ${nextteam} still manage to make it to the playoffs, and they sweep the Vancouver Foresters in the first round, advancing to the championship series. Your rehab isn't going \"well,\" exactly, but your arm is as good as it's going to get, so the manager puts you on the championship series roster, ready to come in if needed.\n\nYou sit in the bullpen for the first time in years, trying to fit in with the relief corps, often the weirdest players on any baseball team. Being banished to the pen will bring out the eccentricities in any player. Two of your teammates constantly play Mario Kart against one another until they get called into the game. Another reliever casually nibbles at a stick of butter he keeps in a mini-fridge during the game. It's a weird group of athletes and a strange way to experience a championship series.\n\nThe first game ends in a rout, with the ${nextteam} beating your opponents, the Milwaukee Hoppers, by a score of 9-0. That's followed by a series of three close losses, as you pace around the bullpen begging to be let into a game. The ${nextteam} then win two close and terrifying games to even the series 3-3, setting up a deciding game seven. You're still apparently considered too unreliable to bring into a game after your injury.\n*page_break The Playoffs Continue\n*gosub_scene 2ndYear resetgame\n*set runnersecond true\n*set runnerthird true\n*set outs 1\nYour moment finally comes. As the bullpen gates open and you stride onto the field, the crowd cheers. You're making your return now, in the key moment of the championship series. Every other pitcher has been used in a long slog of a game. The ${nextteam} are ahead by one run. It's the eighth inning, and there are runners on second and third with one out. Almost any hit will lose the lead. And even a deep fly ball will tie the game. Your team needs a strikeout now, and so, even though your arm still doesn't feel right, they've called on their star pitcher. What do you throw?\n\n*gosub_scene 2ndYear situationtext\n\n*gosub_scene 2ndYear resetatbat\n\n*set batterability 3\n*set batterpower 3\n*set batterhand \"right\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 7thyearchampgameatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 7thyearchampgameatbatloop\n\n*label 7thyearchampgameatbatloop\n*if atbatresult = \"single\"\n\t*set userruns +2\n\tA line drive veers past you and over the second baseman's head for a single, scoring both runs, and losing the lead. Not the return to action you were hoping for, there, but what was your manager expecting? You're going to use a pitcher who hasn't thrown in six months at the most important moment of your season? It does seem crazy, in retrospect, now that it didn't work out so well.\n\t*goto 7thyearlosers\n*elseif ((atbatresult = \"double\") or (atbatresult = \"triple\"))\n\t*set userruns +2\n\tThe batter cracks a ${atbatresult} to left-center field, and that will score both runs, and lose the lead. You're coming out of the game now, having done nothing but come in and lose it. You would appreciate at least getting a rehab start or two next time before they bring you back from a half-year of injury and throw you into the most important moment of the team's season.\n\t*goto 7thyearlosers\n*elseif atbatresult = \"home run\"\n\t*set userruns +3\n\tThe batter hits a long drive to left-center field, and it's gone. Three-run homer, and the game and championship series are likely lost. The baseball writers will absolutely light into your manager for bringing in an injured pitcher at the most important moment of the season, but you can't help but feel mostly responsible.\n\t*goto 7thyearlosers\n*elseif ((atbatresult = \"groundout\") or (atbatresult = \"lineout\"))\n\t*set outs +1\n\t*set runnerthird true\n\t*set runnerfirst true\n\t*set runnersecond false\n\tThe ball comes off the bat and bounces hard off the infield grass, coming back up towards your face. You dodge your head out of the way and make a grab at it with your glove, but miss. Your heart sinks, but you turn around to see your shortstop has the ball and is throwing towards home to get the runner.\n\n\tThe catcher snatches the ball out of the air and turns with both hands in the glove to tag the runner, forcefully pushing against her to keep her away from the plate. Dirt kicks up in the air, obscuring the action, but above the dirt cloud you can see the umpire pump his right fist. Out.\n\n\tThe crowd cheers but you're still on alert. The runner from second is at third now. Is the batter going to try to take second? No. It's fine. That was the second out. You're doing okay.\n\t*goto continue7thyeargame\n*elseif atbatresult = \"flyout\"\n\tThe ball soars off the bat into the air, but it's hit too high to leave the park. Your center fielder backs up, ready to charge towards the ball to get a better throw at home plate. The ball stays in the air for so long that everyone has plenty of time to gauge the odds of the runner scoring on a sacrifice fly. The third base coach has a full conversation with the runner on third, and a moment later, you see the result: he's going to try and score the tying run.\n\n\tThe center fielder catches, running forward with a crow hop to fling the ball as hard as possible toward home. It bounces once in front of the plate but is perfectly on-line with the catcher, who snags the ball, turns and tags the runner with both hands. Dirt kicks up in the air, obscuring the action, but above the dirt cloud you can see the umpire pump his right fist. Out. The inning is over. The crowd goes absolutely insane, and the ${nextteam} now only need three more outs to win a championship.\n\t*goto 7thyearchamps\n*elseif atbatresult = \"walk\"\n\t*set runnerfirst true\n\tThe umpire tells the batter to take his base, and the batter flips his bat demonstratively, pleased to load the bases. There was a base open, and now there's the possibility of a double play, but now there's no room for error at all.\n\t*goto continue7thyeargame\n*elseif atbatresult = \"strikeout\"\n\t*set userstrikeouts +1\n\t*set outs +1\n\tThe hitter flings his bat into the ground after the strikeout. He knows that was the last thing his team could afford, when any contact might have tied the game. The crowd is giddy from the batter's reaction and the relieved tension, but there's still one more out to get.\n\t*goto continue7thyeargame\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 7thyearchampgameatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 7thyearchampgameatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 7thyearchampgameatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 7thyearchampgameatbatloop\n\t*if (knuckleball > 0) #Knuckleball.\n\t\t*set pitchthrown \"knuckleball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 7thyearchampgameatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 7thyearchampgameatbatloop\n\n*label continue7thyeargame\n\n*gosub_scene 2ndYear situationtext\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 4\n*set batterpower 2\n*set batterhand \"left\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 7thyearchampgame2ndatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 7thyearchampgame2ndatbatloop\n\n*label 7thyearchampgame2ndatbatloop\n*if atbatresult = \"single\"\n\t*set userruns +2\n\tA line drive veers past you and over the second baseman's head for a single, scoring both runs, and losing the lead. Not the return to action you were hoping for, there, but what was your manager expecting? You're going to use a pitcher who hasn't thrown in six months at the most important moment of your season? It does seem crazy, in retrospect, now that it didn't work out so well.\n\t*goto 7thyearlosers\n*elseif atbatresult = \"double\"\n\t*set userruns +2\n\tThe batter cracks a double to right field, and that will score two runs and lose your team the lead. You're coming out of the game now, having done nothing but come in and lose it. You would appreciate at least getting a rehab start or two next time before they bring you back from a half-year of injury and throw you into the most important moment of the team's season.\n\t*goto 7thyearlosers\n*elseif atbatresult = \"triple\"\n\t*set userruns +3\n\tThe batter cracks a triple to right field, and that will lose your team the lead. You're coming out of the game now, having done nothing but come in and lose it. You would appreciate at least getting a rehab start or two next time before they bring you back from a half-year of injury and throw you into the most important moment of the team's season.\n\t*goto 7thyearlosers\n*elseif atbatresult = \"home run\"\n\t*if runnerfirst = true\n\t\t*set userruns +4\n\t\t*goto donecheckingrunners1\n\t*else\n\t\t*set userruns +3\n\t\t*goto donecheckingrunners1\n\t*label donecheckingrunners1\n\tThe batter hits a long drive to left-center field, and it's gone. That's a home run, and the game and championship series are likely lost. The baseball writers will absolutely light into your manager for bringing in an injured pitcher at the most important moment of the season, but you can't help but feel mostly responsible.\n\t*goto 7thyearlosers\n*elseif ((atbatresult = \"groundout\") or (atbatresult = \"lineout\"))\n\t*if runnerfirst = true\n\t\tGround ball! To second! The second baseman has it! Flipped to the shortstop, then on to first! Double play! That ball was hit hard but right to your fielder, so you're out of the inning unscathed, and for the moment, you're the hero. The team just has to get three more outs to bring home a championship.\n\t\t*goto 7thyearchamps\n\t*else\n\t\tThe hitter smacks a low line drive, but with fantastic reflexes, your first baseman takes a little hop and pulls the ball out of the air. The inning is over, and you're the comeback kid. The ${nextteam} still cling to a one-run lead and only need three more outs to seal a championship victory.\n\t\t*goto 7thyearchamps\n\t*goto 7thyearchamps\n*elseif atbatresult = \"flyout\"\n\t*if runnerfirst = true\n\t\tThe ball soars off the bat into the air, but it's hit too high to leave the park. Your center fielder backs up, ready to charge towards the ball to get a better throw at home plate. The ball stays in the air for so long that everyone has plenty of time to gauge the odds of the runner scoring on a sacrifice fly. The third base coach has a full conversation with the runner on third, and a moment later, you see the result: He's going to try and score the tying run.\n\n\t\tThe center fielder catches, running forward with a crow hop to fling the ball as hard as possible toward home. It bounces once in front of the plate but is perfectly on-line with the catcher, who snags the ball, turns and tags the runner with both hands. Dirt kicks up in the air, obscuring the action, but above the dirt cloud you can see the umpire pump his right fist. Out. The inning is over. The crowd goes absolutely insane, and the ${nextteam} now only needs three more outs to win a championship.\n\t\t*goto 7thyearchamps\n\t*else\n\t\tThe batter hits a pop-up on the infield, and though it's a little distracting to see the runners jogging around the bases, and usually they discourage pitchers from catching pop-ups by themselves, you camp under it and will it into your glove. That's the end of the inning, and the ${nextteam} only need three outs to win a championship. Your job is done, and it's up to the closer now to bring it all home.\n\t\t*goto 7thyearchamps\n\t*goto 7thyearchamps\n*elseif atbatresult = \"walk\"\n\t*if runnerfirst = true\n\t\t*set userruns +1\n\t\tThe batter casually discards their bat and trots to first, and the tying run scores on a walk. There's a strange kind of not-good, ugly feeling in your abdominal area, and the manager walks out to pull you from the game. You knew your arm wasn't really up to the task yet, but it still hurts to fail at the most important moment of the season.\n\n\t\tA reliever comes in and loses the game. In the record books, the winning run is charged to you.\n\t\t*goto 7thyearlosers\n\t*else\n\t\tYou walk the batter to load the bases, and that's all your manager is willing to see tonight. You get a round of applause from the fans, but you don't feel good about it. The job remains unfinished, and you'll have to watch from the dugout to see if your team can close out the win without you.\n\n\t\tThankfully, they do. The reliever strikes out the next hitter, and the ${nextteam} are going into the ninth inning with a one-run lead. The championship feels so close now.\n\t\t*goto 7thyearchamps\n\t*goto 7thyearlosers\n*elseif atbatresult = \"strikeout\"\n\t*set userstrikeouts +1\n\t*if runnerfirst = false\n\t\tStrike three, and you swagger off the mound as the crowd pops. Even with a raggedy, broken arm you can strike them out when it matters. The ${nextteam} will go into the ninth clinging to a one-run lead, just three outs away from a championship.\n\t\t*goto 7thyearchamps\n\t*else\n\t\tThe crowd lights up as the umpire signals strike three, and you've got the second out. But even after only two batters, you're visibly tired on the mound, and the manager is coming to take you out of the game. You did your job well enough, but a new reliever will have to come in and close out the eighth inning with the bases loaded.\n\n\t\tThankfully, she does. The reliever strikes out the next hitter, and the ${nextteam} are going into the ninth inning with a one-run lead. The championship feels so close now.\n\t\t*goto 7thyearchamps\n\t*goto 7thyearchamps\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 7thyearchampgame2ndatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 7thyearchampgame2ndatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 7thyearchampgame2ndatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 7thyearchampgame2ndatbatloop\n\t*if (knuckleball > 0) #Knuckleball.\n\t\t*set pitchthrown \"knuckleball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 7thyearchampgame2ndatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 7thyearchampgame2ndatbatloop\n\n*label 7thyearlosers\n*page_break\nYou're standing on a practice mound, against the wishes of your coaching staff, throwing pitch after pitch into a net at the team practice facility. The season is over, but it ended too soon for your liking. You just got back from injury, and your return in the championship series didn't go well, so your only way to work out the frustration is to practice again and again and again, until the next season starts and you get another chance.\n\nThe frightening thing is, you know your arm still isn't really better. After every practice session, it takes longer and longer for the pain to go away, until eventually your arm never really stops hurting. But you don't know what else to do but work. That's always been the deal: work harder than anybody else, and it will show on the baseball field. Hopefully next year that will be the case.\n*finish\n*label 7thyearchamps\n*page_break A Few Months Later\n*set fame %+20\n*set championships +1\n*set anecdotes +1\n*if championships = 1\n\t*achieve champ1\n*if championships = 2\n\t*achieve champ2\n*check_achievements\n*if not(choice_achieved_memoirmaterial)\n\t*achieve memoirmaterial\nYou're sitting at home examining your new championship ring. It's covered with a frankly impractical and gaudy number of diamonds. The year 2024 is etched into the top, with the words \"World Champions\" ostentatiously spread around the outside, and a giant, brightly-colored ${nextteam} logo in the middle. It's a ridiculous thing to have, and yet a huge source of pride. There's no higher prize in your profession.\n\nYou're very glad you could pitch a little before the whole year ended, but there's still a lingering worry that you might be near the end. You can feel that your arm takes longer to feel normal again after every time you throw, and it's not like anybody's calling you a \"young up-and-coming pitcher\" anymore. So it's good to have this ring, and know that even if it's all over, you did what you came to do. You won your team a championship, and you can't really ask for more than that.\n*finish\n", "8thyear": "*temp baseera ((earnedruns / (totalouts / 3)) * 9)\n*temp baseeradecimals ((baseera modulo 1) * 100)\n*temp erawholenumber (baseera - (baseera modulo 1))\n*temp erafirstdecimal ((baseeradecimals / 10) - ((baseeradecimals modulo 10) / 10))\n*temp eraseconddecimal ((baseeradecimals - (erafirstdecimal * 10)) - (baseeradecimals modulo 1))\n*temp disperawholenumber (round(erawholenumber))\n*temp disperafirstdecimal (round(erafirstdecimal))\n*temp disperaseconddecimal (round(eraseconddecimal))\n*set year7era \"${disperawholenumber}.${disperafirstdecimal}${disperaseconddecimal}\"\n*set year7wins wins\n*set year7losses losses\n*set year7strikeouts strikeouts\n*set currentyear 8\n*set earnedruns 0\n*set totalouts 1\n*set wins 0\n*set losses 0\n*set strikeouts 0\n*temp justiceserved false\n*temp perfectmoongame true\n*if nextteam = \"Capers\"\n\t*set year8team \"FLC\"\n\t*goto startchapter8\n*elseif nextteam = \"Bulls\"\n\t*set year8team \"SAB\"\n\t*goto startchapter8\n*elseif nextteam = \"Barons\"\n\t*set year8team \"NYB\"\n\t*goto startchapter8\n*else\n\t*bug\n*label startchapter8\n*text_image chap_8.png center Year 8: Rounding Third and Headed for Home\n\nFor the whole offseason, you made sure not to use your @{lefty left|right} arm. You got used to eating with your @{lefty right|left} arm. You drove with just one arm on the steering wheel. You did everything you could to let your throwing arm rest for a few months.\n\nAnd yet, here you are at spring training once again, and the stupid arm still hurts. You have to throw through the pain, hoping that something in that arm will click back into place and make it feel okay again.\n\nFor someone whose value is based entirely on the health of one arm, it's a horrible thing to endure. That's why you need an exit strategy. You have to find some new job before you're out of baseball and become nothing more than an old baseball card and the answer to a trivia question.\n\nAfter spring training mercifully ends, your mind turns to your next career. It's time to see what you can do outside of baseball.\n*page_break Let's Get to Work\n*if career = \"guinea pig\"\n\tWhen you arrive at Prakash Bhavsar's lab for a training session, he asks you an important question. \"There are a lot of things we could try to improve here,\" he says, \"but I want to know what you want most. If you could have any kind of pitch, what would it be? Let's start there and figure out what to do.\" Well, what would you want to throw more than anything?\n\t*choice\n\t\t#Throw harder than anyone ever has before.\n\t\t\t*set velocity %+25\n\t\t\t*check_achievements\n\t\t\t*if not(choice_achieved_purevelocity)\n\t\t\t\t*if velocity >= 70\n\t\t\t\t\t*achieve purevelocity\n\t\t\tEvery pitcher has something inefficient in their deliveries. Theoretically you want all the force from your stride to come up through the body into your arm to really fling the baseball. But not every pitcher has a computer system like Prakash's, which can tell you where you're wasting your energy.\n\n\t\t\tThrough weeks of work in Prakash's lab, you find those inefficiencies and sand them off one by one. Now you're a perfectly efficient pitching machine, throwing much harder than you ever have before. It's a miracle, really, and you're just glad to be the first beneficiary. Hopefully your arm will hold together long enough to take advantage of it.\n\t\t\t*goto relationshipchoice\n\t\t#Throw the hardest-moving breaking ball of all time.\n\t\t\t*if curveball > 0\n\t\t\t\t*set curveball %+25\n\t\t\t\tAfter weeks of work in Prakash's lab, you find it. Your curveball is now deeper, sharper, and harder than it ever was before, and it looks just like a fastball until the last second. Hitters can't help but dive out of the way when they see the ball going towards their head, only for it to break so hard that it ends up a strike on the low outside corner. Your control isn't always perfect, but this curveball is a secret weapon that will work wonders this year, though it does kind of make your arm feel like it's going to fall off.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*elseif slider > 0\n\t\t\t\t*set slider %+25\n\t\t\t\tAfter weeks of work in Prakash's lab, you find it. Your slider is now sharper and harder than it ever was before, and it looks just like a fastball until the last second. Hitters swing, swing, swing but can never adjust to the incredible horizontal movement of your new slider. Your control isn't always perfect, but this slider is a secret weapon that will work wonders this year, though it does kind of make your arm feel like it's going to fall off.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*else\n\t\t\t\t*set curveball 65\n\t\t\t\tYou never even bothered with a true breaking ball before, but after weeks of tinkering in Prakash's lab, now you have one of the best of all time. Your curveball looks like a fastball then dives at the last second. You're going to toy with hitters this year, though throwing this beast of a curveball does kind of make your arm feel like it's going to fall off.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*goto relationshipchoice\n\t\t#Develop a new kind of knuckleball, one nobody's ever seen before.\n\t\t\t*set knuckleball 80\n\t\t\t*achieve knucksie\n\t\t\tKnuckleballs move unpredictably because they're thrown with no spin at all, leaving the path of the ball up to the random interactions between the air and the baseball's seams. But the problem is it usually has to be thrown slowly. Fast knuckleballs are basically just bad fastballs. But after a lot of time in the lab, you and Prakash have developed something really special: Held in a certain way and thrown with an irregular arm motion, you can throw a 90 MPH knuckleball that bends sharply. You should probably come up with a new name for this pitch, but \"knuckleball\" will do for now, because the pitch is thrown without spin and moves irregularly. It's a totally new invention, and you're excited to try it out on the mound.\n\t\t\t*goto relationshipchoice\n\t*goto relationshipchoice\n*elseif career = \"broadcaster\"\n\tInés Cruz sets you up with a producer at NSN. After some back-and-forth, she assigns you to be a guest commentator for an independent league game in a few weeks. A former star is playing for one of the teams, so NSN is broadcasting the game online and hadn't assigned a color commentator yet. It's a little nerve-wracking to have to do your first-ever commentary on a real live broadcast, but you have to give it a shot.\n\n\tAfter the game, you get a few comments from the producer about your style of analysis.\n\t*if analytical >= 55\n\t\tThe producer thinks you used too many acronyms and big numbers, following the \"analyst\" job title a little too literally. You're really just there to talk about the players and maybe provide some insight from your playing days. He wants you to go lighter on the statistics next time.\n\t\t*goto broadcasterchoice\n\t*elseif analytical \u003c= 45\n\t\tThe producer thinks you were a little too loosey-goosey with the analysis, talking too much about \"clutch hitting\" and \"playing the game the right way.\" You need to really think about what goes into each play, and what each hitter or pitcher is doing that makes them succeed or fail. And it wouldn't hurt to throw a few more stats in there as well. Baseball is a good game for numbers, and some fans like that.\n\t\t*goto broadcasterchoice\n\t*else\n\t\tThe producer thinks your analysis struck a good balance between instinctive insights about the game and the more numerical side of the game.\n\t\t*if eloquent >= 55\n\t\t\tHe did say, however, that you could stand to dumb down your vocabulary a little. No reason to use so many big words for something simple like baseball commentary.\n\t\t\t*goto broadcasterchoice\n\t\t*else\n\t\t\tHe did say, however, that you were a little cliché-heavy and need to practice describing the same event in multiple different ways. Over the course of a long season, fans will get tired of hearing you say the same thing over and over, so you need to keep a somewhat large baseball vocabulary just to keep things fresh.\n\t\t\t*goto broadcasterchoice\n\t*label broadcasterchoice\n\n\tYou did a decent job in your first shot at color commentary and they're willing to give you another shot. But you have time to tinker with your commentary style before then, so what would you like to improve?\n\t*choice\n\t\t#Bone up on the latest baseball statistics and what they mean.\n\t\t\t*set analytical %+15\n\t\t\tYou've tackled advanced baseball stats with a combination of confusion and disdain in the past, but if you're going to be a good analyst, you need to gain a basic understanding of them. Wins Above Replacement is the popular choice, so you start by reading about that one. But you immediately hit a wall when you hear there are three slightly different Wins Above Replacement stats kept by competing websites: bWAR, fWAR, and WARP. Why can't it be easy, like Earned Run Average? Though, now that you think about it, ERA has always been really complicated too. This could take some time.\n\t\t\t*goto relationshipchoice\n\t\t#Learn how to describe players without resorting to their statistics.\n\t\t\t*set analytical %-15\n\t\t\tWhen you have so many descriptive numbers right in front of you, it's tempting to use them all to fill up space. But to be a good analyst, you have to actually watch the players play and say what you see. Maybe a pitcher is shortening his arm up too much and shot-putting the ball. Maybe a hitter has a high average but doesn't have the bat speed to catch up to hit high fastballs. Those kinds of things aren't obvious from the stats, and you need to use your baseball intuition and recognize them for the audience. You just have to learn how to do that from up in the press box instead of standing on a mound.\n\t\t\t*goto relationshipchoice\n\t\t#Put some effort into expanding my vocabulary.\n\t\t\t*set eloquent %+15\n\t\t\t*check_achievements\n\t\t\t*if eloquent > 60\n\t\t\t\t*if not(choice_achieved_mellifluous)\n\t\t\t\t\t*achieve mellifluous\n\t\t\tWhen you're talking over 150 baseball games a year, you have to talk about the same kinds of situations over and over. But if you use the same words each time, it gets old fast for viewers who watch every game. So you have to put some effort into building out your vocabulary, especially when it comes to baseball terms. Home runs aren't just home runs; they're dingers, jacks, knocks, big flies, blasts, bullets, moon shots, shots, slams, taters, longballs, and so on.\n\t\t\t*goto relationshipchoice\n\t\t#Work on simplifying my language for a wider audience.\n\t\t\t*set eloquent %-15\n\t\t\t*check_achievements\n\t\t\t*if eloquent \u003c 40\n\t\t\t\t*if not(choice_achieved_dayatatime)\n\t\t\t\t\t*achieve dayatatime\n\t\t\tThe producers noticed in your first game that your vocabulary was a little complex for a mass audience. Leave the big words for those pretentious English soccer commentators (How can a goal be \"magisterial\" and what does that mean?), baseball doesn't need them. A producer prints out a transcript of your first try at commentating and circles several words to avoid. You put in some practice to dumb down your diction.\n\t\t\t*goto relationshipchoice\n*elseif career = \"memoir\"\n\tAfter a fantastic game where you throw eight scoreless innings, you do a TV interview with a reporter. Out of the corner of your eye, you see your teammates picking up the sports drink cooler and getting ready to pour it over your head to celebrate the win. You think about what Cruz told you last year about writing a memoir, and decide this would be a good time to do something interesting. The world is watching, and doing something novel here could make you famous. What do you do?\n\t*choice\n\t\t#Recite an original poem about my victory while drenched in blue liquid.\n\t\t\t*if eloquent >= 55\n\t\t\t\t*set fame %+25\n\t\t\t\tIn what is definitely the most ridiculous moment of your life, you recite an original poem about the game while your teammates pour sports drink on you and hit you with a rosin bag and sunflower seeds. By the end of your performance, no part of your skin is still visible through all the baseball team accessories you're covered in, and nobody can really tell what you were saying for the second and third stanzas, but it still made an impression.\n\n\t\t\t\tThe incident gets popular enough that you start writing a poem in the description field of Instagram posts after each ${nextteam} win. Now everyone knows you as the baseball poet, and it's a fun gimmick that will play nicely when you're promoting a memoir some day.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*else\n\t\t\t\t*set fame %+10\n\t\t\t\tYou get one line into your poem but you're hit with sports drink, rosin, and sunflower seeds before you can think of a word that rhymes with \"strikeout.\" Maybe free verse would have been easier. A clip of the celebration plays on NSN, but it's really more interesting for the actions of your teammates and not your abortive try at live improvisational poetry.\n\t\t\t\t*goto relationshipchoice\n\t\t#Strip off my shirt right before my teammates soak me, letting the world appreciate my glistening abs.\n\t\t\t*if fitness >= 55\n\t\t\t\t*set fame %+25\n\t\t\t\tButtons be damned, you rip your jersey off. You forgot, unfortunately, that you were still wearing an undershirt below that, and there's no getting that off now that it's covered in sweet blue sports drink, but the definition of your abs shines through regardless. Stupid, loose-fitting baseball garments can't show the world what a physical specimen you are, so this will have to do.\n\n\t\t\t\tThe results are clear: You get several requests through your agent within a few days, all to promote some fitness product or another. Now people will know who you are when they see that memoir on the shelves one day.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*else\n\t\t\t\t*set fame %+10\n\t\t\t\tYou try to rip your shirt off and get just a few
