hort right field to take the relay throw myself, attempting to throw out the runner.\n\t\t\t*if (control > 55) and (velocity > 55)\n\t\t\t\t*set highlights +1\n\t\t\t\t*set totalouts +1\n\t\t\t\t*set wins +1\n\t\t\t\tYou sprint out to short right field to take the throw from the right fielder, standing just beside the collapsed second baseman. You turn and throw to third, a specific kind angle of throw you've never had to make in your life, but your instincts work perfectly and the throw comes right to the third baseman's glove, low enough to tag the runner out and win the game.\n\n\t\t\t\tThe run still scored at home, so you lost your shutout, but your fantastic and unusual play was a highlight on TV that night. No one expected that level of quick decision-making and such a fantastic catch and throw from a non-infielder.\n\t\t\t\t*goto endof3rdyear2ndgame\n\t\t\t*else\n\t\t\t\t*set userruns +1\n\t\t\t\t*set earnedruns +1\n\t\t\t\t*set rebellious %+5\n\t\t\t\tYou sprint out to short right field to take the throw from the right fielder. You catch his throw, turn, and fire toward third, but by the time it comes out of your hand, you realize you've made a mistake. As a pitcher, you're not exactly used to making a throw like this, at this angle, without a windup, and in a high-pressure situation. The ball sails over the third baseman's head, right to the spot you would normally be playing, backing up the third baseman so that the runner doesn't…Oh right. That missed throw means the second run scores, and the game is tied. Hmm.\n\n\t\t\t\tKingston comes out of the dugout, says something about just staying calm and doing what you're supposed to, and sends you back to the dugout. The Bulls win in the 13th inning, but you lost your shutout and your win with one bad throw on an unusual play. Maybe making such a bold move wasn't a good idea this time around.\n\t\t\t\t*goto endof3rdyear2ndgame\n*elseif ((atbatresult = \"groundout\") or (atbatresult = \"lineout\")) or (atbatresult = \"flyout\")\n\t*set totalouts +1\n\t*set wins +1\n\n\tYou see Piedmont hit the ball into the air with his arms fully extended, and a millisecond later you hear the loud crack of his bat. You don't even turn around to watch it soar through the air. As you walk off the field to your dugout, something strange happens: After initial excitement, the crowd gives a collective sigh of disappointment. You turn to see your center fielder has caught the ball, standing up against the wall with her glove in the air. It was just a long, loud flyout, and the game has ended with a Bulls win and your first ever shutout.\n\n\tRosario laughs now that the pressure is gone, and jogs to the mound to give you a celebration hug. You high five gloves with your teammates one by one and receive their congratulations.\n\t*goto endof3rdyear2ndgame\n*elseif atbatresult = \"walk\"\n\t*set userruns +2\n\t*set earnedruns +2\n\tThat walk loads the bases. You're taken out of the game for a reliever just one out short of your first ever complete game shutout. Ama Mendis comes into the game and gives up a single that ties the game, charging two more runs to your ERA. The Bulls get the win in the 13th inning, but you were so close to celebrating a bigger milestone for yourself.\n\t*goto endof3rdyear2ndgame\n*elseif atbatresult = \"strikeout\"\n\t*set outs +1\n\t*set totalouts +1\n\t*set userstrikeouts +1\n\t*set strikeouts +1\n\t*set wins +1\n\n\tThe batter watches your pitch go by, and the umpire rings him up for a called strike three to end the game. Rosario stands up and walks towards you for a high five, celebrating your first ever shutout. \"This whole 'professional pitching' thing might work out for you after all,\" Rosario says, and your other teammates congratulate you one by one before heading into the dugout to celebrate the win.\n\t*goto endof3rdyear2ndgame\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 3rdyear2ndgameatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 3rdyear2ndgameatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 3rdyear2ndgameatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 3rdyear2ndgameatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 3rdyear2ndgameatbatloop\n\n*label endof3rdyear2ndgame\n*page_break The Season Trudges On\n*label cruzreportpublished\n*set totalouts +354\n*if userruns \u003c= 2\n\t*set earnedruns +36\n\t*goto endruncheckyear3\n*else\n\t*set earnedruns +49\n\t*goto endruncheckyear3\n*label endruncheckyear3\n*if userstrikeouts >= 2\n\t*set strikeouts +112\n\t*goto endstrikeoutcheckyear3\n*else\n\t*set strikeouts +94\n\t*goto endstrikeoutcheckyear3\n*label endstrikeoutcheckyear3\n*set wins +7\n*set losses +9\nOne morning in early September, you come upon an article on southtexasjournal.com written by one Inés Cruz with the headline \"Bulls Pitching Coach in Hot Water.\" You begin to read:\n\n\"San Antonio's Bulls have slumped to another losing season, and many fingers have been pointed at the team's poor pitching staff. The 2019 season hasn't been kind to promising young starters Frieri, Thompson,\n*if userruns >= 3\n\tor ${surname}.\n\t*goto continuecruzreport\n*elseif (userruns \u003c 3) and (userruns >= 1)\n\tor Minter, with the average performance of ${surname} being the lone bright spot.\n\t*goto continuecruzreport\n*else\n\tor Minter, with the fantastic performance of ${surname} being the lone bright spot.\n\t*goto continuecruzreport\n*label continuecruzreport\nBut several sources in and around the team confirm that frustration is mounting with the coaching style of Peter Simon, Bulls pitching coach.\n\n\"One staff member confirms that Simon has a 'hands-off' approach that works well for some players but is disastrous for others.\n*if simonsecretout\n\tOne starting pitcher on the team expressed frustration about this approach in an interview. 'I watch video of myself to prepare for games, because I know Simon won't help,' the player said, wanting to remain anonymous. 'This pitching staff needs a coach, not just some former player who wants to wear a uniform and do nothing all day.'\"\n\n\tStrange, you don't remember saying anything like that at all. Cruz misquoted you to bump up the drama on the story. And she identified you as a \"starting pitcher\" which means the team will know one of five players talked to a reporter and gave her this ugly quote. This could be bad news.\n\nThe article concludes: \"A relief pitcher on the team claims that Simon has a unique style that is difficult to explain: 'Every pitching coach has their own way of working, but Simon's is admittedly unique in a way that can't be put into words. It works for me, but I know that many others on the team are frustrated, especially the younger players. I think that with more time they will get used to working with Simon.\"\n*page_break Head to Work\nWhen you get to the clubhouse, Kingston grabs you by the shoulders and lightly steers you toward her office. She won't tell you what's happening, but when you enter her office, it becomes clear. Simon's sitting in a chair in front of her desk, and there's another chair next to him for you to sit in.\n\n\"Nobody's in trouble, and nothing's wrong, but you two are gonna figure out how to play nice within the next hour or so,\" Kingston says. \"I'll leave you both to it. See you later.\" She closes the door, leaving you in the room with Simon. He pulls off his cap and scratches his head. What do you do?\n\n*fake_choice\n\t#I take a blunt approach and ask Simon why he treated me the way he did.\n\t\t\"Simon,\" you say, looking exasperated. \"Why do you avoid me and only coach Mendis and the other vets? Did I rub you the wrong way somehow? Do I strike you as a prima donna or something? Just tell me so we can get on with our lives.\"\n\n\t\t\"That's why I'm here,\" Simon says. \"I'm fixin' to explain everything if you'll let me. Just keep an open mind if you can.\"\n\t#I shove things off the office desk and turn over my chair to express my frustration with him.\n\t\t*set stuffontheground true\n\t\tYou push a pile of papers off the desk dramatically. You pick up a pen and toss it into the corner, furious. You see a baseball in a glass case that has some signature that's hard to make out, and you…decide to leave it alone. That might be valuable, and it belongs to Kingston anyway, not this jerk. It turns out there aren't many things on a baseball manager's desk to fling around, unfortunately, but you think you got your point across.\n\n\t\tSimon just sits and watches your tirade, mustache bristling occasionally. Once you seem to have settled down, he starts talking. \"I'm sorry I made you feel that way, ${surname}. Let me explain why it happened and hopefully that'll make you feel better, though it may well not.\"\n\t#I try to set a friendly tone by getting to know Simon better.\n\t\tYou ask Simon where he's from and what his background in baseball is just to try and start the conversation on a friendly note.\n\n\t\t\"Well, I'm from right around these parts basically, but more specifically East Texas, born in a place called Nacogdoches.\" Simon looks wistfully up at the popcorn ceiling. \"I played back before you were probably born, a pitcher for the Barons mostly, but when it came time for me to retire I decided to take a coaching job as close to home as I could get. This fit the bill. But look, you're not here to learn about me. You're here to learn about my actions. Let me explain everything to you.\"\n\t#I don't like confrontation, so I'm going to open the door and get out of here.\n\t\tYou give a quick \"Bye\" to Simon, whirl around, and try the doorknob. It doesn't budge. You turn the little interior switch to unlock the door, but still the doorknob won't move. What's going on?\n\n\t\t\"Don't you try it!\" you can hear Kingston say, muffled through the door. \"I'm holding this door closed and you are not getting out of there until you resolve whatever's up between you two!\"\n\n\t\tSimon looks embarrassed. \"Just sit down and I'll explain,\" he says, and you see no alternative.\n\t#I apologize for causing any trouble and say I just want to be coached.\n\t\t\"I'm sorry, Simon,\" you say to start off. \"It seems like after the article and everything there's a lot of pressure on you, and I might have had something to do with that. But really I just want to be coached, like any other young player would. I need somebody to tell me what I'm doing wrong.\"\n\n\t\tSimon grunts and looks around for a place to spit, but doesn't find one. \"I understand. I swear I do,\" he says. \"Let me explain.\"\n\nSimon sighs and takes a moment to gather his thoughts. \"I really apologize for not explaining this to you by now,\" he says. \"I've just had too many young pitchers come up to the majors, do pretty well, and decide they can't listen to what I have to say. They think they've got too much to lose to change anything now. And the way I coach, well, for some of 'em it's a pretty dramatic change.\"\n\n\"What's so weird about your coaching style?\" you ask.\n\n\"A wise man once said that the dumber a pitcher is, the better,\" he says, rubbing his mustache with two fingers. \"To put it a little more clearly, and more kindly: The more you think about pitching, the worse you pitch. I used to spend a lot of time thinking of ways to coach my players into thinking less. A lot of coaches will tell you to do something like 'throw from on top of the baseball' or 'step through the ground with your motion.' It doesn't make any kind of literal sense, but it gets you thinking about doing something besides the actual pitching, so it works wonders for some kids.\n\n\"But I went a step further,\" he continues. \"I stumbled onto a unique meditative practice. It's not a religious thing, or at least not for me it ain't. I take my pitchers through it and they learn to empty their thoughts on the mound. They let their body do the pitching for them, and it always works better than trying to think about all thousand different things you've got to do at once just to throw a pissant little 83 mile-an-hour fastball, let alone a slider or change.\"\n\nSimon doesn't exactly strike you as the meditative type. What do you say?\n*fake_choice\n\t#I ask him if this is some kind of prank.\n\t\t\"All right, where's the hidden camera? I know what this is,\" you say, but Simon shakes his head.\n\n\t\t\"I know, it doesn't seem like the type of thing I'd do,\" he says. \"I'm no hippie, but I found the method and it works. The less pitchers think about what they're doing, the better they pitch.\"\n\n\t#I express interest in the technique and ask how it works.\n\t\t\"That sounds interesting, but I'm curious how it works. What about meditation makes you stop thinking about your pitching?\" you ask.\n\n\t\t\"The actual hows and whys are beyond me, I'm afraid,\" Simon says, rubbing his hands together. \"The meditation makes you calmer and that helps my pitchers throw more consistently on the mound. That's all I know.\"\n\n\t#I ask why he never brought this technique up before.\n\"But why have you waited so long to tell me about this?\" you ask.\n\n\"Like I said, in the minors the pitchers would do anything to take that last step up to the majors,\" he says. \"Since I became the big league Bulls pitching coach, no one will listen to me. It's an unusual technique, and they have too much to lose now that they're making the real money. My ideas got rejected too many times by too many young pitchers. So I spend my time working with the few people who have always believed in me.\n\n\"You have to understand,\" Simon continues, \"I can't tell you to tweak this part of your wind-up or make sure you step to this certain spot every time or any of that nonsense. I don't believe in it. Now that you're this far into your career, you need to think less about your mechanics, not more. So, from my perspective, it's better for me to leave you to it than to get you twisted up in knots thinking about tiny things for your whole career. Do you understand?\"\n\nWhat do you say?\n*choice\n\t#\"That sounds perfect! When can I start meditating?\"\n\t\t*set analytical %-15\n\t\t*set friendswithsimon true\n\t\tYou express your interest in the meditation technique,\n\t\t*goto madeupwithsimon\n\t#\"I understand, and I'm willing to give your way a shot.\"\n\t\t*set analytical %-5\n\t\t*set friendswithsimon true\n\t\tYou're a little reserved, but you say you're willing to try the meditation,\n\t\t*goto madeupwithsimon\n\t#\"Now I understand, but I would rather stick to my methods.\"\n\t\t*set analytical %+5\n\t\t*set friendswithsimon true\n\t\tYou don't want to follow Simon's weird ideas, but you seem to understand him enough to at least co-exist,\n\t\t*goto madeupwithsimon\n\t#\"This is a load of nonsense. If I'm doing something wrong with my wind-up, I need someone to tell me what it is.\"\n\t\t*set analytical %+15\n\t\t*set friendswithsimon false\n\t\t*goto stillagainstsimon\n*label madeupwithsimon\nand before Simon can even say anything, Kingston comes back into the room. \"Great, now get the hell out of my office,\" she says, pushing you out. \"Glad we could resolve this little spat finally. Simon, you've got about six more to talk to this morning, so let's hurry up and get to it. ${surname}, if you don't mind, could you go get Frieri for me? Thanks.\"\n*if stuffontheground\n\n\tKingston looks around at the floor, covered in papers and, well, mostly just a few papers that were on her desk before you pushed them off. \"What did you two do to my precious paperwork? How am I supposed to look like I'm busy when the GM walks by? Simon, this was all caused by you being too shy to talk to people, so you're picking it up. ${surname}, I'm going to fine you, oh, about five bucks. Just leave it on my desk later. Ready, break!\"\n\nThe season ends, and the Bulls miss the playoffs again. But maybe more importantly, you worked things out with Simon, and he's going to remain the pitching coach. Hopefully, with all these conflicts out of the way, the Bulls can make a postseason push next year.\n*finish\n*label stillagainstsimon\n\"That won't work for a major league team,\" you say. \"We still need somebody who will tell us when something's wrong and what to do about it. 'Mindfulness' doesn't help us get to the playoffs.\"\n\nSimon looks downcast but says nothing, and Kingston bursts back into the room. \"Okay, so we can't get along after all,\" the manager says, strutting around to her normal side of the desk. \"I'll talk to the GM today and see if we can work out a solution for everybody. Now get out of my office, both of you.\" You worry for a week or two that Kingston's conversation with the GM could mean you'd be traded to another team in the offseason.\n\nThe Bulls miss the playoffs, and you're forced to wait nervously, watching other players perform on the largest stage in the postseason, unsure where your life's next chapter will take you.\n\nThe day after the postseason ends, you finally learn the result: Peter Simon will now be the bullpen coach, working with Mendis and a few of his other \"disciples\" in the relief corps. The team will be hiring a new, more conventional pitching coach. Either Kingston and Simon didn't get along well, or you have more pull on this team than you realize. Either way, with all these distractions gone, hopefully the team can make a postseason push next year.\n*finish\n", "4thyear": "*temp baseera ((earnedruns / (totalouts / 3)) * 9)\n*temp baseeradecimals ((baseera modulo 1) * 100)\n*temp erawholenumber (baseera - (baseera modulo 1))\n*temp erafirstdecimal ((baseeradecimals / 10) - ((baseeradecimals modulo 10) / 10))\n*temp eraseconddecimal ((baseeradecimals - (erafirstdecimal * 10)) - (baseeradecimals modulo 1))\n*temp disperawholenumber (round(erawholenumber))\n*temp disperafirstdecimal (round(erafirstdecimal))\n*temp disperaseconddecimal (round(eraseconddecimal))\n*set year3era \"${disperawholenumber}.${disperafirstdecimal}${disperaseconddecimal}\"\n*set year3wins wins\n*set year3losses losses\n*set year3strikeouts strikeouts\n*set currentyear 4\n*set year4team \"SAB\"\n*set earnedruns 0\n*set totalouts 1\n*set wins 0\n*set losses 0\n*set strikeouts 0\n*temp wonplayoffgame false\n*text_image chap_4.png center Year 4: The Unrelenting Indignity of Suckitude\n\n\"You need a new agent,\" Ama Mendis tells you as she wrenches open a mangosteen and plucks out a white segment of the fruit to eat. \"Youpf gepf morpf money nexpf year,\" she says before swallowing.\n\n\"What's wrong with the agent I have?\" you ask, holding out a hand to silently ask for a slice of fruit.\n\n\"Your agent hasn't had to do anything since you first signed with the Bulls. This offseason, you start salary arbitration. You've played enough years that the Bulls have to give you some kind of raise, but you have to negotiate what your salary will be. If you can't agree with the team on a number, then arbitrators choose which number is more reasonable, yours or the team's. It's a very tricky process.\"\n\nYou think about her advice and chew and think and chew. You've proven you can stick in the major leagues, so maybe it is time to get a better agent. But where do you find an agent?\n\nMendis says, \"You can call my agent, Anna Dukas. The teams hate her because she's so good at her job. Somehow she always gets more money for her clients than anybody else. But she's getting older and she's picky about who she represents. Give her a call sometime.\"\n*page_break Give Dukas a Call\nAfter a light day of work in spring training, you call the number Mendis gave you for her agent. A receptionist picks up and you explain to him that you're looking for new representation. The receptionist says, \"Sorry, but Ms. Dukas is not taking any new clients. She has left me with phone numbers for the following agents who Ms. Dukas holds in high regard: Wilson Virdon with Star Player Sports Management and Nolan Campbell of Bannister Group. Give them a try, and if they're not the kind of agents you're looking for, please call this number again.\"\n\nYou write down numbers for the other agents, but the whole process is strange. Why would an agent recommend her competitors, even if she couldn't handle any more clients?\n\nYou call and arrange a meeting with Wilson Virdon, who seems to have researched your career extensively and devised a full plan before you've even met. He promises to make you famous so you can get endorsements and maybe even cross over into an acting career one day. It's a dazzling presentation, and he certainly seems interested in signing you to his agency.\n\nNolan Campbell strikes a completely different tone, stressing that he used to pitch in the majors himself and still maintains close friendships with every team's front office. He has close relationships with several teams and signing with him means you'll focus on baseball above all else, which the fans, coaches, and front offices like to see.\n\nAfter taking those meetings, you have to decide which agent to sign with. But something still bothers you about your call to Mendis's agent, Anna Dukas. Maybe you should give her office a call one more time? What do you do?\n*choice\n\t#Sign with Wilson Virdon, the \"star-maker.\"\n\t\t*label signwithvirdon\n\t\t*set agent \"Virdon\"\n\t\t*set fame %+10\n\t\tYou call Virdon's number and he answers after half a ring. \"It's fantastic to have you on board,\" he says, and you hear what sounds like a champagne bottle popping in the background. \"Now if we're going to work together well, you gotta do a few things for me: If a reporter asks you a question, give them an interesting answer. None of that 'Trying to take it one day at a time and do what's best for the team' nonsense. You need to be quoted in every game story from now on.\n\n\t\t\"And if it's at all possible,\" he continues, \"Do whatever it takes to get on the highlight reels. It's not easy for a pitcher, I know, but make a crazy play in the field or get yourself into a funny situation. Might not be what's best for the team, but it gets you on national TV, you feel me? That's how I'm going to make you a star.\"\n\n\t\tVirdon says he'll talk to you more at the end of the season for your salary negotiations with the Bulls and hangs up after a long and detailed phone call. He continues to seem especially interested in working with you. Maybe you do have what it takes to be a star?\n\t\t*goto 4thyear1stgame\n\t#Sign with Nolan Campbell, the \"inside baseball man.\"\n\t\t*label signwithcampbell\n\t\t*set agent \"Campbell\"\n\t\t*set manager_rel %+10\n\t\tYou call up Campbell and tell him you're signing him as your agent. \"Good to hear that, ${givenname},\" he says. \"There are a lot of hard feelings around salary arbitration so it's good to have an agent like me who the teams know and trust. Some teams won't even keep a player who's signed with Anna Dukas because she's so determined to bleed the teams out of every penny.\n\n\t\t\"You're a baseball player,\" Campbell continues. \"I'll make sure you can play with whatever team you want whenever you want, first and foremost, top of the list. Happiness is more important than fighting over a 1% raise. It's an honor to represent you.\"\n\n\t\tCampbell says he'll talk to you more at the end of the season for your salary negotiations with the Bulls. You feel secure in your future, certain that you'll get to play wherever you want, if maybe for not quite so much money as the other players. No reason to be jealous, right?\n\t\t*goto 4thyear1stgame\n\t#Try calling Anna Dukas one more time.\n\t\tYou call Dukas's office again and this time a woman answers the phone. \"Anna Dukas speaking, go ahead,\" she says in a young-sounding, energetic voice. Didn't Mendis say Anna Dukas was \"getting older\"? \"Go ahead,\" she says one more time as you're silent on the phone, trying to work out what's going on. What do you say?\n\t\t*choice\n\t\t\t#Something's not right, but I show my loyalty by pledging to sign with Dukas right away.\n\t\t\t\t*if rebellious \u003c 45\n\t\t\t\t\t*set agent \"Dukas the Greater\"\n\t\t\t\t\tPutting aside your doubts about her voice on the phone, you boldly declare \"I'd like to sign with your agency, if you'll have me.\"\n\n\t\t\t\t\tThe voice that responds is different from before, an older woman with a slight foreign accent. \"My apologies,\" the voice says. \"I'm the real Anna Dukas. I only have time to handle a few very elite clients myself. The rest must work with my 'stunt doubles' as I call them. I value loyal, straightforward athletes such as yourself and would love to represent you. Next time you call, just give the code word 'Colossus' and you'll be forwarded straight to me, okay?\"\n\n\t\t\t\t\tIt's a weird situation, but you can't help feeling accomplished for signing with the best agent in baseball. But you have to wonder, is Ama Mendis working with Dukas herself or one of her \"stunt doubles?\"\n\t\t\t\t\t*goto 4thyear1stgame\n\t\t\t\t*else\n\t\t\t\t\t*set agent \"Dukas the Lesser\"\n\t\t\t\t\tYou try to sound like you're along for the ride, but you don't sound totally convinced when you say \"Let me sign with your agency.\"\n\n\t\t\t\t\tThe young woman's voice replies \"Excellent. We've reviewed your case since the last time you called and we, I mean, I am very interested in representing you. I'm sure we'll get better acquainted around salary arbitration time at the end of the season.\"\n\n\t\t\t\t\tYou're excited to sign with such a famous agent, but something strange is going on. You make a mental note to ask Mendis later why her agency is so odd.\n\t\t\t\t\t*goto 4thyear1stgame\n\t\t\t#I feel like I'm being messed with, but who cares? I just relax and ask to sign her as my agent.\n\t\t\t\t*if intimidating \u003c 45\n\t\t\t\t\t*set agent \"Dukas the Greater\"\n\t\t\t\t\tSomething's definitely off, but what does it matter? Anna Dukas has the best reputation in the business. \"I'd like to sign with your agency, if you'll have me,\" you say.\n\n\t\t\t\t\tThe voice that responds is different from before, an older woman with a slight foreign accent. \"My apologies,\" the voice says. \"I'm the real Anna Dukas. I only have time to handle a few very elite clients myself. The rest must work with my 'stunt doubles' as I call them. I value calm, emotionally gathered athletes such as yourself and would love to represent you. Next time you call, just give the code word 'Colossus' and you'll be forwarded straight to me, okay?\"\n\n\t\t\t\t\tIt's a weird situation, but you can't help feeling accomplished for signing with the best agent in baseball. But you have to wonder, is Ama Mendis working with Dukas herself or one of her \"stunt doubles?\"\n\t\t\t\t\t*goto 4thyear1stgame\n\t\t\t\t*else\n\t\t\t\t\t*set agent \"Dukas the Lesser\"\n\t\t\t\t\tYou try to relax and go through with it, but the general weirdness surrounding this phone call makes you sound a little aggressive when you say \"Let me sign with your agency.\"\n\n\t\t\t\t\tThe young woman's voice replies \"Excellent. We've reviewed your case since the last time you called and we, I mean, I am very interested in representing you. I'm sure we'll get better acquainted around salary arbitration time at the end of the season.\"\n\n\t\t\t\t\tYou're excited to sign with such a famous agent, but something strange is going on. You make a mental note to ask Mendis later why her agency is so odd.\n\t\t\t\t\t*goto 4thyear1stgame\n\t\t\t#Ask probing questions based on your research into Anna Dukas.\n\t\t\t\t*if analytical > 55\n\t\t\t\t\t*set agent \"Dukas the Greater\"\n\t\t\t\t\t\"I did some research before this phone call,\" you say, \"and it was my understanding that you were born in Greece and have lived in Washington D.C. for thirty years now. But it sounds like you have a slight Appalachian accent and you're around my age. What is your background?\"\n\n\t\t\t\t\tA new, older woman with the slightest touch of a Greek accent answers you. \"My apologies. I only have time to handle a few very elite clients myself. The rest must work with my 'stunt doubles' as I call them. I value tough, intelligent athletes such as yourself and would love to represent you. Next time you call, just give the code word 'Colossus' and you'll be forwarded straight to me, okay?\"\n\n\t\t\t\t\tIt's a weird situation, but you can't help feeling accomplished for signing with the best agent in baseball. But you have to wonder, is Ama Mendis working with Dukas herself or one of her \"stunt doubles?\"\n\t\t\t\t\t*goto 4thyear1stgame\n\t\t\t\t*else\n\t\t\t\t\t*set agent \"Dukas the Lesser\"\n\t\t\t\t\t\"You sound like you're around my age,\" you say, hoping to continue with some better points but you can't think of any. You read one or two newspaper articles about Dukas before making this call, but didn't really learn anything. \"Is Anna Dukas really that young?\"\n\n\t\t\t\t\t\"I only sound young on the phone,\" she says. \"Since the last time you called, we've reviewed your case and we, I mean, I am very interested in representing you. Would you like to sign?\"\n\n\t\t\t\t\tYou feel like something strange is going on, but Dukas has a reputation as the world's greatest baseball agent. You sign with her agency and make a mental note to ask Mendis later why her agency is so odd.\n\t\t\t\t\t*goto 4thyear1stgame\n\t\t\t#I'm weirded out, so I will thank her for introducing me to my new agent, Virdon.\n\t\t\t\t\"I just wanted to thank your office for pointing me toward Wilson Virdon. I'm signing with him today,\" you say. \"I haven't heard of agents recommending their competitors before, and I just wanted to express my thanks.\"\n\n\t\t\t\t\"No problem at all,\" Dukas, or whoever this is, says. \"We, uh, I feel confident in my reputation and can't represent every player out there. Thank you for calling and have a nice day.\"\n\n\t\t\t\t*goto signwithvirdon\n\t\t\t#Something's not right here, I hang up and sign with Campbell.\n\t\t\t\t\"I just wanted to thank your office for pointing me toward Nolan Campbell. I'm signing with him today,\" you say. \"I haven't heard of agents recommending their competitors before, and I just wanted to express my thanks.\"\n\n\t\t\t\t\"No problem at all,\" Dukas, or whoever this is, says. \"We, uh, I feel confident in my reputation and can't represent every player out there. Thank you for calling and have a nice day.\"\n\n\t\t\t\t*goto signwithcampbell\n\n*label 4thyear1stgame\n*page_break The Season Begins\nThe very beginning of a season is always full of hope and promise. Every pitcher's ERA is 0.00. None of the fielders have made a single error. By simply being on a baseball team, everyone has the same chance at the start of the season to win the pennant or break a record or bloom into something they weren't before. For the Bulls, it's a great feeling to start a fresh, new year of baseball.\n*page_break A Few Weeks Later\n*gosub_scene 2ndYear resetgame\n*set totalouts 30\n*set earnedruns 9\n*set losses 3\n*set runnerfirst true\n*set runnersecond true\n*set runnerthird true\n*set outs 2\nThe start of the season has been cruel to the Bulls. You've pitched well in three starts but lost all of them, and the team hasn't done much better in any of the games you didn't pitch in. Rosario seems to have forgotten how to hit for power. Mendis has blown four saves already. Kingston has tried to keep the mood in the clubhouse light by playing music, handing out inside joke T-shirts, and starting goofy pregame rituals, but the team is losing so much that the old tricks aren't working anymore.\n\nYou're in the fourth inning of your fourth start, down four runs, and about to face the Los Angeles Longsocks' cleanup hitter. The bases are loaded but there are two outs in the inning. It's a tough situation in what's been a tough season, and you have to do your best to prevent the Bulls from definitely losing yet another game. What do you throw?\n\n*gosub_scene 2ndYear situationtext\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 3\n*set batterpower 6\n*set batterhand \"left\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 4thyear1stgameatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 4thyear1stgameatbatloop\n\n*label 4thyear1stgameatbatloop\n*if atbatresult = \"single\"\n\t*set earnedruns +2\n\t*set userruns +2\n\t*set losses +1\n\tYour second baseman dives but can't come up with the hitter's low line drive into right field. Two runs come around to score, and it's a 6-0 lead for the Longsocks. Kingston comes out to pull you from the game, and it's another miserable loss in a miserable season.\n\n\t*gosub toughdaybutkeepyourhead\n\t*goto endof4thyear1stgame\n*elseif atbatresult = \"double\"\n\t*set earnedruns +2\n\t*set userruns +2\n\t*set losses +1\n\tThe ball sails over the head of your right fielder for a double, scoring two runs. It's a 6-0 lead for the Longsocks and another miserable loss in a miserable season.\n\n\t*gosub toughdaybutkeepyourhead\n\t*goto endof4thyear1stgame\n*elseif atbatresult = \"triple\"\n\t*set earnedruns +3\n\t*set userruns +3\n\t*set losses +1\n\tThe ball soars past the first baseman and rolls around in the right field corner, allowing the hitter to go all the way to third, scoring three runs. It's a 7-0 lead now for the Longsocks and another miserable loss in a miserable season.\n\n\t*gosub toughdaybutkeepyourhead\n\t*goto endof4thyear1stgame\n*elseif atbatresult = \"home run\"\n\t*set earnedruns +4\n\t*set userruns +4\n\t*set losses +1\n\tYou leave your pitch up in the zone and the batter crushes it out to straightaway center field for a grand slam. That's an 8-0 lead now for the Longsocks, and another miserable loss in a miserable season.\n\n\t*gosub toughdaybutkeepyourhead\n\t*goto endof4thyear1stgame\n*elseif ((atbatresult = \"groundout\") or (atbatresult = \"lineout\")) or (atbatresult = \"flyout\")\n\tYou catch the batter looking for something else, and he check-swings the ball right to your glove. You throw it to first base for the final out of the inning, keeping your team in the game but ending a short and difficult start. The team battles back to tie the game only to lose in the ninth in walk-off fashion, capping another miserable loss in a miserable season.\n\n\tKingston tells a few of the players individually to keep their heads up, but she's clearly not getting across to them. The mood in the clubhouse is apocalyptic, and no one has any hope for the remainder of the season.\n\t*goto endof4thyear1stgame\n*elseif atbatresult = \"walk\"\n\t*set earnedruns +1\n\t*set userruns +1\n\t*set losses +1\n\tYou throw ball four, walking in another run, and that's a 5-0 lead for the Longsocks. Kingston comes to take you out of the game, and you've virtually guaranteed another miserable loss in this miserable season.\n\n\t*gosub toughdaybutkeepyourhead\n\t*goto endof4thyear1stgame\n*elseif atbatresult = \"strikeout\"\n\t*set outs +1\n\t*set totalouts +1\n\t*set strikeouts +1\n\t*set userstrikeouts +1\n\tYou strike out the hitter, who calmly starts to take off his batting gloves, feeling self-assured from his team's large lead. He knows his team is playing so well, there's no pressure on him. He can relax and let his teammates do the work for him. Is that what it's like to play on a good team?\n\n\tThe Bulls battle back to tie the game, only to lose in the ninth in walk-off fashion, capping another miserable loss in a miserable season. Kingston tells a few of the players individually to keep their heads up, but she's clearly not getting across to them. The mood in the clubhouse is apocalyptic, and no one has any hope for the remainder of the season.\n\t*goto endof4thyear1stgame\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 4thyear1stgameatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 4thyear1stgameatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 4thyear1stgameatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 4thyear1stgameatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 4thyear1stgameatbatloop\n\n*label endof4thyear1stgame\n*page_break The Season Continues\n*set totalouts +270\n*if userruns >= 4\n\t*set earnedruns +50\n\t*goto allstarruncheckyear4\n*elseif ((userruns \u003c 4) and (userruns >= 2))\n\t*set earnedruns +40\n\t*goto allstarruncheckyear4\n*else\n\t*set earnedruns +32\n\t*goto allstarruncheckyear4\n*label allstarruncheckyear4\n*set strikeouts +82\n*set wins +4\n*set losses +7\nJust before the All-Star break that marks the midpoint of the season, the team is still losing games in bundles, and manager Sandy Kingston feels compelled to give a speech in the clubhouse.\n\n\"Aren't you tired of it?\" she says. \"Don't you all have any drive? I can't stand the feeling I get at the end of every game. The shame sticks to my clothes. Maybe some of you can't smell it, but that shame is stuck to you too. It doesn't wash out between games.\"\n\nKingston rocks forward with her face in her hands then looks up at the ceiling like she's saying an angry prayer. \"Just,\" she says, cutting off quickly to gather herself and think about what to say. \"It's the unrelenting indignity of suckitude. Don't you all feel it too? Aren't you ashamed? Don't you care? I know you care. I can't even imagine someone working so hard for so long to make it to the major leagues without caring. Show me, tomorrow and the next week and the next month and the rest of the season. Show me you care. That's it.\" She pauses to gauge the reactions of everyone around her, then punctuates her speech: \"Take some time to think about what really motivates you to play this game. No warmups tomorrow. Just show up in time for on-field batting practice. I'll see [i]all of you[/i] tomorrow.\"\n\nShe steps out of the room, leaving everyone present to silently stand together, looking straight at the ground out of fear that someone might be accusing them with their eyes. Shame fills the room.\n*page_break Show Up For BP\nThere was something strange about the way she said \"I'll see [i]all of you[/i] tomorrow,\" and today you know what she meant. For every hitter at batting practice, Kingston is standing right outside the cage, yelling out what she thinks the results of each batted ball would be. \"Flyout! Groundout! Groundout! Bloop single! Come on, you can do better!\" When one hitter smacks a ball into the right field bleachers, Kingston remains unimpressed. \"You're lucky there's a short porch out there in right, because that pissant little wall-scraper would have been the third out in any reasonable park! Is that the best you can do with a 70 MPH fastball lobbed down the heart of the plate?\"\n\nCameras perch behind the manager, filming every moment. You can't tell whether she's trying to embarrass the hitters or motivate them. Rosario, who likes to relax as much as possible before the game then go full-effort when the swings really count, is next to take his turn at BP, leisurely hitting soft line drives through the infield. Kingston's motivational yelling kicks into another gear. \"Double play! Double play! Double play! I've never seen a player give less of a crap since, oh, maybe when you didn't even try to throw that runner out last night, Andres! Come on!\"\n\nRosario drops his bat. The coach throwing BP lobs one more in without realizing, and Rosario just snatches it out of the air with his big right paw. Your stomach sinks as you realize what is about to happen. With cameras rolling and fans settling into their seats, Kingston and Rosario are about to start screaming at one another. There's no time to think. You have to act. What do you do?\n*choice\n\t#Take Rosario aside and calm him down with a friendly inside joke.\n\t\t*if rosario_rel > 55\n\t\t\t*set clubhouse_rep %+10\n\t\t\tYou swoop in and grab Rosario, taking him on a little walk around foul territory. \"Don't worry about her, she's just being a Tyler,\" you tell him. A few months ago Rosario noticed how many Tylers there are in baseball now, so he calls everyone he doesn't know \"Tyler.\" For unclear reasons, the definition of Tyler between you two has slowly changed from \"stranger\" to \"hyper-competitive jerk.\" Kingston is just the latest in a long line of Tylers.\n\n\t\t\tYou start to get a reputation as a good player to have in the clubhouse, a calming and friendly influence. Rosario is glad you stopped him from doing something stupid like screaming at his manager out in the public eye.\n\t\t\t*goto enoughofthatfightnow\n\t\t*else\n\t\t\t*set clubhouse_rep %-5\n\t\t\tYou swoop in and grab Rosario, trying to pry him away from Kingston, but he's not interested in talking to you. You're friends, but not close enough for him to pass up a good fight. He brushes past you and goes chin to chin with Kingston, and they yell unintelligible things at one another for a minute or two. The fight becomes a talking point on sports radio, and Rosario gets benched for a few days as punishment. Maybe you're not as friendly with your teammates as you thought.\n\t\t\t*goto enoughofthatfightnow\n\t#Intimidate Rosario into backing down.\n\t\t*if intimidating > 60\n\t\t\t*set rebellious %-10\n\t\t\tYou square up in front of Kingston and tell Rosario to back down. Your famously intimidating mound presence serves you well, and Rosario just spits on the ground and walks away. It was a tense moment, and Kingston seems not to have noticed what was happening, but you showed your loyalty to the team.\n\t\t\t*goto enoughofthatfightnow\n\t\t*else\n\t\t\t*set rosario_rel %-10\n\t\t\tYou stand in front of Kingston and tell Rosario to back down. But he's not scared of you, so he just brushes by you to go chin to chin with Kingston right in front of cameras. Sports radio debates Rosario's right to treat his manager like that, and Rosario gets benched for a few days as punishment.\n\n\t\t\tIt feels like a slight rift has developed between you and Rosario, and now you know that you're not quite as intimidating as you thought.\n\t\t\t*goto enoughofthatfightnow\n\t#Distract the cameras by giving an impromptu interview.\n\t\tWorking quickly, you get the attention of the field reporter and start making up trade rumors about your fellow players.\n\t\t*if eloquent > 60\n\t\t\t*set anecdotes +1\n\t\t\t*check_achievements\n\t\t\t*if not(choice_achieved_memoirmaterial)\n\t\t\t\t*achieve memoirmaterial\n\t\t\t\"I heard that several teams have called on Minter,\" you say, naming the first teammate you can think of. \"Likely to be flipped for a prospect I guess. But I hate it. This team needs a player like Minter if we're ever going to make the playoffs, and…\" Out of the corner of your eye you see Rosario and Kingston yelling at one another in the batting cage, so you drift slightly to your right so the camera won't be pointing at them. \"He's such a presence in the clubhouse and I wouldn't give him up for any prospect in any team's farm system.\"\n\n\t\t\tThe screaming match between Kingston and Rosario cools down, and you managed to keep it off the news by distracting the reporters. This should make a good story to tell one day, years from now.\n\t\t\t*goto enoughofthatfightnow\n\t\t*else\n\t\t\t*set clubhouse_rep %-5\n\t\t\t\"I heard we might trade Minter,\" you say, naming the first teammate that comes to mind. \"That would be, uh, crazy,\" you say, hearing Rosario and Kingston start to jaw with each other behind you. You can't think of anything else to say, and so a producer on the field points out toward the developing batting cage brouhaha. You did your best, but couldn't think of enough to say to keep the reporters distracted.\n\n\t\t\tRosario and Kingston's fight becomes a talking point on sports radio, and Minter's not happy with you for starting a rumor that he might get traded.\n\t\t\t*goto enoughofthatfightnow\n\t#Grab hold of Rosario and subtly restrain him.\n\t\tYou scurry in front of Rosario and press up to him, using all your strength to hold him in what looks to the cameras like an awkward hug.\n\t\t*if fitness > 55\n\t\t\t*set rosario_rel %+10\n\t\t\tYou must be doing some good work in the gym these days, because you're strong enough to hold Rosario away from Kingston, and only a few fans in the front rows notice that something strange was happening.\n\n\t\t\tAfter the game starts, Rosario thanks you for holding him back. \"I don't know what I was going to do, but it was gonna be really stupid,\" he says. \"You might have saved my starting job, or even my career.\"\n\t\t\t*goto enoughofthatfightnow\n\t\t*else\n\t\t\t*set intimidating %-10\n\t\t\t*check_achievements\n\t\t\t*if intimidating \u003c 40\n\t\t\t\t*if not(choice_achieved_islandtime)\n\t\t\t\t\t*achieve islandtime\n\t\t\tUnfortunately, Rosario's a power-hitting catcher with a low center of gravity and you're just some pitcher. A simple chest-bump knocks you flat on your back. As you're getting up and brushing clumps of dirt off your uniform, you see that Rosario and Kingston are in a chin-to-chin shouting match in full view of the entire baseball-watching world.\n\n\t\t\tRosario gets benched for the next three games. He makes it up to Kingston over time and doesn't lose his job on the team. However, your failed attempt to restrain Rosario gets on TV, and now opposing players won't be so intimidated by your presence on the mound.\n\t\t\t*goto enoughofthatfightnow\n*label enoughofthatfightnow\n*page_break The Season Continues\n*set totalouts +216\n*if userruns >= 4\n\t*set earnedruns +33\n\t*goto endruncheckyear4\n*else\n\t*set earnedruns +25\n\t*goto endruncheckyear4\n*label endruncheckyear4\n*if userstrikeouts >= 2\n\t*set strikeouts +73\n\t*goto endstrikeoutcheckyear4\n*else\n\t*set strikeouts +60\n\t*goto endstrikeoutcheckyear4\n*label endstrikeoutcheckyear4\n*set wins +8\n*set losses +2\nOver time it becomes clear that Kingston has changed. For the entire time you've known her up until the All-Star break, she was the friendliest manager you'd ever had. She was loud, but always encouraging, trying to motivate her players with jokes and kind words. Now she's developed a habit of chewing out players in the dugout, searing painful criticism into them after a low-effort play or a stupid decision.\n\nThe thing is, it's working. Since the All-Star break the Bulls have gone 42-24, launching them from the bottom of the division up to a tie for first place with the New York Barons. The league always sets up big division rivals to play one another on the final days of the season to schedule a potential dramatic final week, and this time it's worked. On the last day of the season, the Bulls and Barons are playing one another. A win cements a playoff spot for the Bulls, but a loss would spoil an inspiring second half of the season. It's a nervy moment for the team, having to play such an important game when usually everyone would be making plans to see their families in October.\n\n*page_break Check In With Mendis\nTo take your mind off the important game coming up, you head over to the bullpen to have a conversation with Ama Mendis.\n*if agent = \"Dukas the Greater\"\n\t\"I signed with your agent,\" you begin, not sure how to ask if she's represented by the real Anna Dukas or not. \"I talked to two different women on the phone who presented themselves as Anna Dukas. Have you had a similar experience?\"\n\t*goto mendisforgottotellyou\n*elseif agent = \"Dukas the Lesser\"\n\t\"I signed with your agent,\" you begin, not sure how to continue. You have a suspicion that you weren't talking to the \"real\" Anna Dukas. \"I've only talked to her on the phone so far, but is Anna Dukas unusually young? She sounded like she just got out of school.\"\n\t*goto mendisforgottotellyou\n*else\n\t\"I called your agent but the receptionist said they weren't taking any new clients, but he recommended another agent to me and I signed with him,\" you say. \"I thought that was nice of them to recommend a competitor, very unusual.\"\n\n\t\"Oh, unusual doesn't begin to describe Dukas,\" Mendis says. \"She recommends a competitor on the first call so she has time to research a potential client. Her reputation is so strong that she assumes most athletes will call back if they're really interested in being represented by her. She plays hard to get.\n\n\t\"But what's even more unusual,\" she continues, \"Is there are at least a dozen women who go by Anna Dukas in her organization. It's not exactly a secret, but she, or maybe I should say they, aren't very forthcoming about it. I've only ever worked with one woman, but I have no idea if she's the original. I should have told you!\"\n\t*goto talkingdukaswithmendis\n\n*label mendisforgottotellyou\n\n\"Oh! I forgot to tell you!\" Mendis says. \"Every agent in her organization goes by the name Anna Dukas. It's not exactly a secret, but she, or maybe I should say they, aren't very forthcoming about it. I've only ever worked with one woman, but I have no idea if she's the original. I should have told you!\"\n*label talkingdukaswithmendis\n\nWhat do you say?\n*fake_choice\n\t#\"That seems…illegal? Right?\"\n\t\t\"If I know that's how the Dukas agency works, I'm guessing the general managers know too,\" Mendis says. \"And as long as they know, there's no misrepresentation going on. I don't know. I am not a lawyer, obviously.\n\t#\"Is that the whole secret to her success? Multiple Annas?\"\n\t\t\"Maybe,\" Mendis says. \"But she also seems to have great relationships with the team owners. That allows her to go above the general manager when necessary to get a deal done. That way she has double the options of most other agents. She's very good with the owner of the Bulls especially.\n\t#\"Don't the teams notice they're talking to multiple Anna Dukases?\"\n\t\t\"No, it works the same for the teams,\" Mendis says. \"There's only one Anna Dukas assigned to each team. I often see this stunning black woman going into meetings with our GM, and I have a suspicion she's our Dukas. Anyway, I'm sure that if I know how the Dukas agency works, then the general managers must know too. Probably.\n\t#\"Can I hire someone to do post-game interviews as me?\"\n\t\tYou joke about hiring your own body double to do interviews, adding, \"If I could never have a reporter ask me 'What went wrong out there' again, that would be so wonderful.\"\n\n\t\t\"Better than being a closer,\" Mendis says. \"If I give up one stupid run and blow a save then the whole internet will tweet at me saying things like 'Women can't be closers' or 'Go back to India.' I am not even from India! I think I will hire a new me and claim she was the one pitching whenever I blew a save. 'Sorry guys, it was the other Ama Mendis today.' And I will make sure she's from India so they can tell her the correct place to go back to. What were we talking about again? Oh, right, Dukas.\n\n\"Plenty of successful people present themselves as one person but work with a whole team,\" Mendis says. \"The big movie composers sketch a few themes then let their assistants write out the rest of the score. And have you ever read a James Patterson book?\"\n*label 4thyearplayoffgame\n*page_break The Season Continues\n*gosub_scene 2ndYear resetgame\n*set outs 2\n*set runnerfirst true\n*set runnersecond true\nThe whole story of the season comes down to October 1st, a game against the New York Barons. The Barons and Bulls are tied, and they play each other on the final day of the regular season. The starting pitcher for the Barons is Connor Harris, a talented Australian sidearmer (the commentators love to say he throws from \"down under\" but that's an exaggeration). The starting pitcher for the Bulls is somebody by the name of ${givenname} ${surname}.\n\nIt's without a doubt the biggest game of your career. Time crawls and nerves jangle for the twenty-four hours before your start, but suddenly you find yourself walking around a mound in New York City, then stomping your cleats clean as you catch a glimpse of the George Washington Bridge just over the center field scoreboard.\n\nSpeaking of the scoreboard, what does it say there? It's the ninth inning already? The Bulls are ahead 1-0? There are two outs? There are runners on first and second base? Why can't you remember the other eight and two thirds innings so far? Who is this hitter you're up against? What's happening? What do you throw?\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 4\n*set batterpower 4\n*set batterhand \"right\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 4thyearplayoffgameatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 4thyearplayoffgameatbatloop\n\n*label 4thyearplayoffgameatbatloop\n*if atbatresult = \"single\"\n\t*set wonplayoffgame true\n\t*set earnedruns +1\n\t*set userruns +1\n\tIt's a ground ball through the middle for a single. Okay. That's fine. What's the score now? Oh, it's 1-1. That's…bad? You think? Hard to remember. Here comes Kingston to replace you with a reliever. \"Great game, don't worry about it. Mendis will stop 'em here then we'll win it in extras for you. Heck of a job, ${givenname}.\"\n\n\tSure enough, Mendis struck out the next hitter and then Rosario hit a home run in the tenth. Then Mendis closed the game out in the tenth, and now the Bulls win. Why is everyone leaping over the dugout railing onto the field? Why is everyone jumping up and down and hugging and two players are even carrying the big orange water cooler thing? Why are they pouring all the water over your head? What is this new feeling?\n\t*goto endof4thyearplayoffgame\n*elseif ((atbatresult = \"double\") or (atbatresult = \"triple\"))\n\t*set earnedruns +2\n\t*set userruns +2\n\t*set losses +1\n\tIt's a hard line drive to the power alley in left. The ball bounces off the outfield fence at an odd angle, and the center fielder chases it around, allowing both runners to score. That's a shame, but you can still get the next hitter, right? Wait, why are the Barons all out on the field? You hold out your glove for someone to throw you the ball, unaware that the game is over. That was a walk-off double. The Bulls aren't going to the playoffs.\n\t*goto endof4thyearplayoffgame\n*elseif atbatresult = \"home run\"\n\t*set earnedruns +3\n\t*set userruns +3\n\t*set losses +1\n\tWhoever she is, this batter has some power, and she hits a long fly ball to left field. The fans seem to be awfully convinced it's a home run, judging by the sound of things, and wouldn't you know it, they're right. Three runs come home, but you hold out your glove to get a new ball from Rosario and soldier on through this lineup.\n\n\tBut wait, Rosario is walking off the field. And all the Barons players are in a circle around home plate, rhythmically swaying in some kind of choreographed celebration routine. Is the game over? Yes, that would explain it. The game's over. That was a walk-off home run. Oh right, and that means the season is over too. And the Bulls didn't make it to the playoffs. Well. That's no good.\n\t*goto endof4thyearplayoffgame\n*elseif atbatresult = \"groundout\"\n\t*set wonplayoffgame true\n\tYou hear the softest little wooden \"click,\" and the ball bounces into your chest. A second later, you discover a baseball in your glove. \"One! One! One!\" someone is yelling. Sounds like Rosario. Why is he yelling?\n\n\tGears start turning somewhere in the back of your mind. Baseball. In the glove. Game. One. Throw to first! You chuck the ball in the general direction of first base and nearly throw up on the mound from nerves. The batter is out by half a step. The game's over. Rosario lifts you up into a bear hug. The Bulls dugout and bullpen empty, spilling bodies into a huge pile in the middle of the field. The Bulls are going to the playoffs.\n\t*goto endof4thyearplayoffgame\n*elseif atbatresult = \"lineout\"\n\t*set wonplayoffgame true\n\tThe ball whizzes past your ear. You see the fans behind home plate leap to their feet. Then a second later some of them slump their shoulders, others cradle their heads in their hand, and others lift their arms out in frustration.\n\n\tYour second baseman caught the line drive for an out. The third out. Of the ninth inning. The game's over. Rosario lifts you up into a bear hug. The Bulls dugout and bullpen empty, spilling bodies into a huge pile in the middle of the field. The Bulls are going to the playoffs.\n\t*goto endof4thyearplayoffgame\n*elseif atbatresult = \"flyout\"\n\t*set wonplayoffgame true\n\tYou hear Rosario curse. The ball is hit deep to left field and the crowd makes a noise you've never heard before. It sounds like a tidal wave has crested over your head and is about to crash down.\n\n\tUnfortunately for the crowd, the ball was hit hard but with topspin instead of backspin, so it doesn't carry like you'd expect. The left fielder camps under it and catches it, then lifts an imaginary dumbbell over his head. Oh right, the game's over. Rosario lifts you up into a bear hug. The Bulls dugout and bullpen empty, spilling bodies into a huge pile in the middle of the field. The Bulls are going to the playoffs.\n\t*goto endof4thyearplayoffgame\n*elseif atbatresult = \"walk\"\n\t*set wonplayoffgame true\n\tYou lob another pitch in and notice for the first time that you're tired. A pitch count on the scoreboard reads 118. You can't remember any of the 117 other pitches before that one. The umpire instructs the batter to take her base, and now the bases are loaded. Here comes Kingston to take you out of the game. \"Fantastic start,\" she says. \"Don't worry, Mendis will close out the win for you.\"\n\n\tSure enough, Mendis struck out the next hitter. The Bulls win. What does that mean again? Why is everyone leaping over the dugout railing onto the field? Why is everyone jumping up and down and hugging and two players are even carrying the big orange water cooler thing? Why are they pouring all the water over your head? What is this new feeling?\n\t*goto endof4thyearplayoffgame\n*elseif atbatresult = \"strikeout\"\n\t*set wonplayoffgame true\n\t*set outs +1\n\t*set totalouts +1\n\t*set anecdotes +1\n\t*set strikeouts +1\n\t*set userstrikeouts +1\n\t*check_achievements\n\t*if not(choice_achieved_memoirmaterial)\n\t\t*achieve memoirmaterial\n\tYou throw your pitch with the last ounce of your energy and collapse on the grass just in front of the mound. Looking up at the speckled gray sky, you hear the umpire say something about a third strike. A moment later, you're smothered beneath every player on the Bulls roster.\n\n\tThat strikeout sealed a trip to the playoffs for the Bulls, capping one of the great playoff runs in baseball history. Your collapse off the mound after the game-winning strikeout becomes the iconic video highlight of the season, and is something writers and broadcasters will ask you about for the rest of your life. Unfortunately for them, you can't remember what it was like. You were so torn up with nerves for the entire game that you hardly knew what was happening. But the moment happened anyway, and you can appreciate it from a third-person perspective over and over and over again.\n\t*goto endof4thyearplayoffgame\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 4thyearplayoffgameatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 4thyearplayoffgameatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 4thyearplayoffgameatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 4thyearplayoffgameatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 4thyearplayoffgameatbatloop\n\n*label endof4thyearplayoffgame\n*if wonplayoffgame\n\t*page_break We're Going to the Playoffs\n\tPitching on the final day of the regular season has one big drawback: You're forced to rest through the first round of the playoffs. And despite the playoff buzz around the clubhouse and the great story of the second half of the Bulls' season, the Los Angeles Longsocks sweep the Bulls out of the playoffs in three games.\n\n\tStill, it was incredible to win a division title for what not so long ago felt like a hopeless team. And it's good the Bulls won when they did, because there's a growing sense around the team that many of the players will be leaving this off-season. Rosario is about to become a free agent, Mendis keeps getting mentioned in trade rumors online, and Kingston's personality changed so dramatically at midseason that she seems like a different person already.\n\t*goto arbitrationdemands\n*else\n\t*page_break For You, the Season is Over\n\tIt was a fantastic second half of the season, but missing out on the playoffs has ruined it. Rosario is about to become a free agent, and he's unlikely to rejoin the Bulls. The internet is buzzing with trade rumors, assuming that the Bulls will want to flip all their valuable players like Mendis for younger, cheaper ones, reloading to try and reach the playoffs two or three years from now. And it's all but certain that Kingston will be fired, as player complaints about her new abusive coaching style have started to surface in the media. It looks like the Bulls are going to be very different next year.\n\t*goto arbitrationdemands\n*label arbitrationdemands\n*page_break Check In With My Agent\n\n*if agent = \"Virdon\"\n\tYour agent, Virdon, has a plan that will shake things up even more. \"Basically, the Bulls control you for two more years,\" he begins. \"The salary arbitration process will force them to pay you more than the league minimum, but not what you would get if you were free to sign with any team. So there's a way around this. You don't have to do it, and I completely understand if you don't. But hear me out. Tell the Bulls you're signing with a team in the Japanese league and ask for your release.\"\n\n\tJapan? But you're already a starting pitcher in the best baseball league on Earth. Only crappy players with no shot at a starting job ask to go to Japan. \"I can see your face right now and I know that's not a good face,\" Virdon says, talking to you in his high-rise office overlooking downtown San Antonio. \"But here's why: if you get your release then go play in Japan for a year, you can then come back to the States next year as a free agent. You can sign with any major league team for however much money you're worth, instead of just what the Bulls will give you. The power of the free market, you know what I mean?\n\n\t\"And in the meanwhile, you'll be a star in Japan, big and famous and able to do all the coffee endorsements you could ever ask for. Good lord, do they advertise a lot of coffee drinks over there, let me tell you.\" It's kind of a crazy plan, but maybe it would be fun to travel to a new place, and you would definitely make more money. Very interesting.\n\t*goto arbitrationchoice\n*elseif agent = \"Campbell\"\n\tYour agent, Campbell, used to play on the same team as the Bulls GM, and so he's worked out a provisional deal that will keep you with the team at a reasonable (but not excellent) salary for the next three years. That way you won't have to deal with this messy arbitration stuff anymore.\n\n\t\"Signing this contract extension will let you focus on baseball like you've always wanted,\" Campbell says. \"No annual dispute over your salary. You'll have more money than you'll ever need if you suddenly got hurt and couldn't play anymore. It's security. You've earned it with the way you've played, so it's time to cash in.\"\n\n\tIt would be nice to stop worrying about the money, and the contract extension would definitely be worth a lot of money, or at least more than the team is offering you to play next year. But it still doesn't pay you what you're worth, and what if you get better over the next two years? You could make much more money going year by year. You'll have to decide if you'd rather not worry about money ever again or get paid what you're worth.\n\t*goto arbitrationchoice\n*elseif agent = \"Dukas the Greater\"\n\tAnna Dukas, or at least a woman in her fifties with a Greek accent who claims to be Anna Dukas, meets you in an office in downtown San Antonio. She says not to worry about anything, and that she'll negotiate a fantastic deal for you.\n\n\t\"The general manager pinches pennies and doesn't want to pay what you're worth,\" she says. \"But I have a direct line to the owner, and he's much more amenable. It's just like in a store. If the employee you're talking to isn't giving you the right answers, just go to his boss.\"\n\n\tIt certainly sounds like she's going to get you good money to stay with the Bulls. More money does mean more pressure, but you can't turn it down, right? And who cares if the general manager is unhappy? What's he going to do, trade you because he doesn't like your salary? The owner's on your side, so you're safe, right? For some reason, just thinking about that new salary Dukas is negotiating makes you feel guilty and nervous.\n\t*goto arbitrationchoice\n*elseif agent = \"Dukas the Lesser\"\n\tAnna Dukas, or at least a young woman who claims to be Anna Dukas, meets you in an office in downtown San Antonio. She says that the arbitration process doesn't give you a lot of choice. You can either take the salary the team offers you, which is ridiculously low and barely above league minimum salary, or you can demand a reasonable number and hope the arbitrators think your number is more reasonable than the team's.\n\n\t\"Or,\" Dukas says, looking around the room nervously, \"You can name an even bigger number and threaten to sit out the season if you don't get it. Obviously you won't actually sit out for a whole season without playing. But, you know, you could make the team call your bluff. It's worked for other players before.\"\n\n\tDukas doesn't sound totally confident in this strategy. The team could just release you, forcing you to find somewhere else to sign. And if you haven't pitched well enough to earn the big money, the fans might not like hearing you're demanding so much, whether the team wants to give it to you or not. But the fact is, it's the only way to get paid what you're worth. Maybe it's worth a shot?\n\t*goto arbitrationchoice\n*else\n\t*bug\n*label arbitrationchoice\n*page_break It's Time to Make a Big Decision\nA few days before the arbitration deadline, the Bulls send you their offer: $550,000. If you were anything but a professional baseball player or a hedge fund manager, this would be an impressive and humbling amount of money. But it's only $50,000 above the league minimum that the Bulls are required to pay you. And you've become a reliable starter in their rotation, worth a lot more than what they're offering.\n\nYou can take the team's offer and keep playing with the Bulls next season. Or you can demand a reasonable middle number, $700,000 perhaps, and go to salary arbitration, where a panel of experts decide which salary is more reasonable, yours or the team's. And if the team decides they don't want you at that price, maybe they'll decide to trade you somewhere else. What do you do?\n*choice\n\t#Accept the team's offer.\n\t\t*set wealth 40\n\t\tYou know you're worth more than the team is offering, but there's no reason to fight about it. Even the league minimum is more money than you need, and it's better to play without the pressure of a big salary hanging over every performance. You sign a new contract for next year, avoiding arbitration.\n\t\t*goto stickingwiththebulls\n\t#Demand $700,000 and let the arbitrators decide what I'm worth.\n\t\t*goto arbitrationcalculation\n\t*if (agent != \"Virdon\") #I'm fed up with San Antonio. I'll play in Japan for a year, even if it doesn't pay well.\n\t\t*set wealth 40\n\t\tThe Bulls have full control over your contract unless you leave the country and go play in a different league. You're ready for a change of pace, so you tell your agent to ask around with the world's second best pro baseball league, over in Japan.\n\t\t*goto goingtojapan\n\t*if (agent = \"Virdon\") #Follow Virdon's plan and sign with a Japanese team.\n\t\t*set wealth 50\n\t\tThis is what you hired an agent for, to come up with an unexpectedly brilliant plan like this one. Just spend one year making a good salary in Japan and you can come back with unlimited earning potential, getting around the backwards salary rules of the major leagues. Virdon tells the team you won't be back next year, and they grant your release to pursue a contract with a Japanese team. Virdon has already talked to teams and has a contract from the highest bidder ready to sign that afternoon.\n\t\t*goto goingtojapan\n\t*if (agent = \"Campbell\") #Sign a long-term contract extension with the Bulls.\n\t\t*set wealth 45\n\t\t*set longtermcontract true\n\t\tIt's not for a ton of money, but Campbell has successfully negotiated a three-year contract extension with the Bulls. And it's a great solution for you. Now you can buy a home in the area, confident that you'll be here long enough to settle in. Without the money distractions, you can just focus on baseball. What a relief.\n\t\t*goto stickingwiththebulls\n\t*if (agent = \"Dukas the Greater\") #Have Dukas negotiate a significant raise for next season.\n\t\t*set wealth 55\n\t\tAnna Dukas works her magic and suddenly you find yourself signing a one-year contract for a flat $1,000,000. No one expected a number like that, but there it is. She must really be the best agent in baseball. Hopefully that big number won't put you under too much pressure to perform.\n\t\t*goto stickingwiththebulls\n\t*if (agent = \"Dukas the Lesser\") #Threaten to sit out the next season if I don't get a significant raise.\n\t\tIt's a decision that makes your stomach fold over with nerves, but you give the go-ahead to Dukas. You'll threaten to sit out next year if you don't get paid what you deserve, and submit a high salary demand to the arbitrators. The team immediately rejects your offer, so the case goes to arbitration.\n\t\t*goto bigdemand\n\n*label arbitrationcalculation\nIn a room somewhere, your agent and the Bulls present their cases about your salary, but all you do is work out and watch TV, trying to relax while your future is being decided by the salary arbitrators, basically just a bunch of strangers.\n\n*if (userruns > 3) and (userstrikeouts \u003c= 2)\n\t*set wealth 40\n\tThe arbitrators come back with their result, and it's bad news: They've ruled in favor of the team. Your pitching to this point hasn't quite earned you the raise you wanted. It's a disappointment, but an extra couple hundred thousand wouldn't have radically changed your lifestyle. You're still in your early career, and the big paydays don't come until free agency.\n\t*goto stickingwiththebulls\n*else\n\t*set wealth 50\n\tThe arbitrators rule in your favor, so the team has to give you a decent raise. It's only for one year, so you probably shouldn't go buying houses for anybody you ever knew, but it's still a good sign that you're one of the best young pitchers in the game. Free agency should be a very exciting time for you later on.\n\t*goto stickingwiththebulls\n*label bigdemand\n*if (userruns > 3) and (userstrikeouts \u003c= 2)\n\t*set wealth 45\n\t*set public_rep %-15\n\tThe arbitrators come back with their result, and it's not good news: You have to take the team's offer, barely above minimum salary. And when the press gets wind of your salary demand, your name gets dragged through the mud for a few weeks, and the public is shocked at how much money you asked for.\n\n\tSo, when you tell the Bulls that you will indeed sit out the season, they release you. You're suddenly an unemployed, unpopular pitcher, and unsure if you did the right thing. But after a few conversations with your agent, the way forward becomes clear: You'll pitch in Japan for a year, rebuild your reputation, then come back to the major leagues the next season as a free agent.\n\t*goto goingtojapan\n*else\n\t*set wealth 55\n\tAfter a terrifying few weeks of waiting, the arbitrators come back with their results. They decide in your favor, and you're going to get a significant raise. The team isn't thrilled about it, but the arbitrators, the fans, and the nationals sports media agree that you've earned it with your great pitching to this point in your career. You're going to stay with the Bulls, making good money, and it's such a huge relief.\n\t*goto stickingwiththebulls\n\n*label goingtojapan\n*set nextteam \"Japan\"\n*achieve tourist\n\nInes Cruz tweets the news out the next morning: ${givenname} ${surname} signs a one-year contract with the Tsuru Tokyo Cranes. You're sitting in your hotel room when your phone starts to buzz non-stop with texts from teammates and family members.\n\n*if mendis_rel > 55\n\t\"Very sad to see you go,\" Mendis texts you. \"Out of all the people on this team or any other, you're the only one I consider a close friend. Hopefully we'll meet again when you strike out everyone in Japan then come right back to this country.\" She closes the text with that weird emoji that looks like a Polaroid photo of Japan taken from outer space.\n\t*goto rosariogoodbyetext\n*else\n\t\"Best of luck in Japan,\" reads a text from Ama Mendis, who may get a rotation spot now that you won't be on the same team. You wait for another text from her, but that's all you get. You can't blame her for being excited about a potential promotion to starter.\n*label rosariogoodbyetext\n\n*if rosario_rel > 55\n\t\"Will miss you in Japan,\" Rosario tells you via text. \"Would have been fun to sock a dinger off you in the All-Star Game next year. Seriously, how have you not made an All-Star team yet? Crazy. Anyway, work hard and I'll see you at that All-Star Game two years from now, if my legs are still working! Peace.\" He garnishes the text with four muscle arm emojis.\n\t*goto kingstongoodbyetext\n*else\n\t\"Have a great time in Japan,\" Rosario texts you. \"All they do is bunt over there, so limber up and get some good fielding practice! Don't make your catcher do all the work!\" He sends a peace sign hand and a muscle arm emoji.\n*label kingstongoodbyetext\n\nYour (former) manager, Sandy Kingston, sends you a text too. She's never texted you before, so her throwback text-speech and slightly poor spelling make you laugh a little. \"Ur better than Japan league but I respect ur dicision,\" she writes. \"GL in Tokyo and hope we get u back in San Antonio next yr.\"\n\nYou spend a nervy offseason waiting and worrying about playing in a whole new country next year. Will you be able to get around without knowing the language? Will it launch your career or sink it? Will you even be able to come back to the U.S. after this? Will you be a star player in Japan or will you have to earn your way into the rotation all over again? There's a lot of uncertainty ahead, and it's hard to know how to feel just yet.\n*finish\n*label stickingwiththebulls\n*set nextteam \"Bulls\"\n\nThough the contract negotiations have left a few hurt feelings scattered around, you're sticking with San Antonio. The day after your contract renewal is announced, you run into Kingston in the clubhouse. She nods at you with a weary smile, then, after thinking about it for just a moment, comes in with a hug.\n\nWith no words exchanged, she goes on to her office and you to your locker. You'll be back next year. If the rumors online are correct, Kingston won't be. Hopefully she can leave the stress of managing a baseball team behind and get back to being her old, lovable self.\n*finish\n\n*label toughdaybutkeepyourhead\n\"Tough day but keep your head up, all right?\" Kingston says, but her continued optimism has started to grate on you. You walk straight to the locker room without saying anything.\n*return\n", "5thyear": "*temp baseera ((earnedruns / (totalouts / 3)) * 9)\n*temp baseeradecimals ((baseera modulo 1) * 100)\n*temp erawholenumber (baseera - (baseera modulo 1))\n*temp erafirstdecimal ((baseeradecimals / 10) - ((baseeradecimals modulo 10) / 10))\n*temp eraseconddecimal ((baseeradecimals - (erafirstdecimal * 10)) - (baseeradecimals modulo 1))\n*temp disperawholenumber (round(erawholenumber))\n*temp disperafirstdecimal (round(erafirstdecimal))\n*temp disperaseconddecimal (round(eraseconddecimal))\n*set year4era \"${disperawholenumber}.${disperafirstdecimal}${disperaseconddecimal}\"\n*set year4wins wins\n*set year4losses losses\n*set year4strikeouts strikeouts\n*set currentyear 5\n*set earnedruns 0\n*set totalouts 1\n*set wins 0\n*set losses 0\n*set strikeouts 0\n*set pitchingcoach_rel 50\n*set manager_rel 50\n*temp betrayedogawa false\n*temp pitchingaround 0\n*temp supportportia false\n*text_image chap_5.png center Year 5: One Runner Stranded\n\n*if nextteam = \"Japan\"\n\t*set year5team \"TSU\"\n\t*set clubhouse_rep 50\n\t*goto startjapan\n*else\n\t*set year5team \"SAB\"\n\t*goto startamerica\n*label startjapan\nYou thought you were used to taking planes everywhere by now, but the thirteen-hour flight from Texas to Tokyo is something else. You wake up holding a portable game console in your hands, having apparently dozed off playing a level of Sphere Psychosis. You land at Narita Airport and navigate your way out to your driver, ready to ride into a new chapter of your life.\n\nThankfully you signed with one of the Tokyo teams, so you can travel around a city that has English on most public signs and a lot of English-speaking people as well. You're sure the team will do its best to ease your transition.\n\nThough you would never say it out loud, it will be kind of nice to be the star player on your team for the first time since you were in the minors. You were overshadowed by Rosario back with the Bulls, never really a fan favorite. But most players that come to Japan from somewhere else are major league washouts. You've been a legitimately good player in the major leagues, so the Cranes will probably treat you like a minor deity. Probably.\n\n*if japanese\n\tIt's been twenty years since you left Japan, coming to the U.S. with your parents. Your parents always spoke English at home, so you're faced with the quandary of looking Japanese without being able to speak Japanese. Occasionally people approach you and ask you things (Directions, maybe? Are they asking for money? Maybe they can just sense that you're lost?) and you have to awkwardly wave your hands and sound out the words \"Watashi wa nihongo o hanasemasen,\" which Google Translate has told you
