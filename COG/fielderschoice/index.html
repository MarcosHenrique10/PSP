<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Fielder's Choice — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "fielderschoice", "title": "The Fielder's Choice", "scenes": {"1styear": "*text_image chap_1.png center Year One: Within Arm's Reach\n\nYou were too young to remember this, but the first time you threw a ball, the air around it whispered a little. Like so many spectators, coaches, scouts, and ballplayers to follow, the air had to gossip about the unexpected talent hidden within your arm.\n\nIt was a little stuffed white ball with fake red stitches pasted onto it. You reached down, picked it up, and chucked it across your living room, even though you could barely walk. Which arm did you throw with?\n\n*fake_choice\n\t#My right arm.\n\t\t*set lefty false\n\t\t*set throwingarm \"right\"\n\t#My left arm.\n\t\t*set lefty true\n\t\t*set throwingarm \"left\"\n\nLess than ten years later, TV cameras showed your arm to the world. Your Little League team rode your arm to the world championship in South Williamsport, Pennsylvania. And though the viewers at home could see your pitches and read the velocity in the on-screen graphic, they couldn't hear it. The balls you threw hissed like a snake, winding toward the plate with menace and making the poor 12-year-olds who stood in against you flinch and dodge every strike on the inner half of the plate.\n\nWhich team did you play for in the Little League world championship?\n*temp canadian false\n*fake_choice\n\t#My home state in the USA.\n\t\t*set homecountry \"United States of America\"\n\t\t*goto draftorigin\n\t#Aruba.\n\t\t*set homecountry \"Aruba\"\n\t\t*goto intlorigin\n\t#Australia.\n\t\t*set homecountry \"Australia\"\n\t\t*goto intlorigin\n\t#Brazil.\n\t\t*set homecountry \"Brazil\"\n\t\t*goto intlorigin\n\t#Canada.\n\t\t*set homecountry \"Canada\"\n\t\t*set canadian true\n\t\t*goto draftorigin\n\t#China.\n\t\t*set homecountry \"China\"\n\t\t*goto intlorigin\n\t#Colombia.\n\t\t*set homecountry \"Colombia\"\n\t\t*goto intlorigin\n\t#Costa Rica.\n\t\t*set homecountry \"Costa Rica\"\n\t\t*goto intlorigin\n\t#I played for an American team, but I'm from Cuba.\n\t\t*set homecountry \"Cuba\"\n\t\t*goto cubaorigin\n\t#Curacao.\n\t\t*set homecountry \"Curacao\"\n\t\t*goto intlorigin\n\t#Dominican Republic.\n\t\t*set homecountry \"Dominican Republic\"\n\t\t*goto intlorigin\n\t#France.\n\t\t*set homecountry \"France\"\n\t\t*goto intlorigin\n\t#Germany.\n\t\t*set homecountry \"Germany\"\n\t\t*goto intlorigin\n\t#India.\n\t\t*set homecountry \"India\"\n\t\t*goto intlorigin\n\t#Italy.\n\t\t*set homecountry \"Italy\"\n\t\t*goto intlorigin\n\t#Jamaica.\n\t\t*set homecountry \"Jamaica\"\n\t\t*goto intlorigin\n\t#I played for an American team, but I'm from Japan.\n\t\t*set homecountry \"Japan\"\n\t\t*set japanese true\n\t\t*goto intlorigin\n\t#Mexico.\n\t\t*set homecountry \"Mexico\"\n\t\t*goto intlorigin\n\t#Netherlands.\n\t\t*set homecountry \"Netherlands\"\n\t\t*goto intlorigin\n\t#Nicaragua.\n\t\t*set homecountry \"Nicaragua\"\n\t\t*goto intlorigin\n\t#Philippines.\n\t\t*set homecountry \"Philippines\"\n\t\t*goto intlorigin\n\t#Puerto Rico.\n\t\t*set homecountry \"Puerto Rico\"\n\t\t*goto draftorigin\n\t#South Korea.\n\t\t*set homecountry \"South Korea\"\n\t\t*goto intlorigin\n\t#Sri Lanka.\n\t\t*set homecountry \"Sri Lanka\"\n\t\t*goto intlorigin\n\t#Taiwan.\n\t\t*set homecountry \"Taiwan\"\n\t\t*goto intlorigin\n\t#United Kingdom.\n\t\t*set homecountry \"United Kingdom\"\n\t\t*goto intlorigin\n\t#Venezuela.\n\t\t*set homecountry \"Venezuela\"\n\t\t*goto intlorigin\n\n*label draftorigin\nMen wearing polo shirts and flashy watches came to all your starts in high school, aiming a radar gun at the ball as it left your hand, now fizzing through the air like a firework before exploding into the catcher's mitt for strike after strike. College coaches made house calls throughout the year, but when the San Antonio Bulls, a relatively new major league team, drafted you early and offered you a million dollars as a signing bonus, you and your parents agreed that you could always go to college later in life if you wanted. You had to test your arm in professional ball.\n*goto commonorigintext\n*label intlorigin\nAfter you hit a growth spurt in your early teenage years, you started to notice men wearing polo shirts and flashy watches closely observing you, even when you weren't on the mound. You'd hear them say odd things to each other like \"projectable frame\" and \"high pitchability\" but you tried not to let it affect your performance. One of your coaches agreed to negotiate a professional deal for you, and the year you turned sixteen, you signed with the San Antonio Bulls. After putting in a few years of work in a training complex and various small winter and summer leagues, you were promoted to the minor leagues.\n*goto commonorigintext\n*label cubaorigin\nThrough mechanisms that were beyond your understanding at the time, your family left Cuba for the United States when you were just learning how to read. The politics of the situation are simpler now than they were then, but all that mattered for you was getting to play the game you love, and that's all worked out to this point.\n\nMen wearing polo shirts and flashy watches came to all your starts in high school, aiming a radar gun at the ball as it left your hand, now fizzing through the air like a firework before exploding into the catcher's mitt for strike after strike. College coaches made house calls throughout the year, but when the San Antonio Bulls, a relatively new major league team, drafted you early and offered you a million dollars as a signing bonus, you and your parents agreed that you could always go to college later in life if you wanted. You had to test your arm in professional ball.\n*goto commonorigintext\n*label commonorigintext\n\nYou can remember your first minor league jersey, playing for the Low-A Greenville Grasshoppers. The team asked you exactly what name you would like to have printed on your jersey, typed into media guides, stamped on baseball cards, and lit up on every scoreboard you would play in front of for the rest of your career.\n\nWhat's your name?\n*choice\n\t#Sam Witten.\n\t\t*set givenname \"Sam\"\n\t\t*set surname \"Witten\"\n\t\t*goto minorleaguejersey\n\t#Alejandra Ochoa.\n\t\t*set givenname \"Alejandra\"\n\t\t*set surname \"Ochoa\"\n\t\t*goto minorleaguejersey\n\t#Michelle Madritsch.\n\t\t*set givenname \"Michelle\"\n\t\t*set surname \"Madritsch\"\n\t\t*goto minorleaguejersey\n\t#Oscar Angeles.\n\t\t*set givenname \"Oscar\"\n\t\t*set surname \"Angeles\"\n\t\t*goto minorleaguejersey\n\t#Skyler Hibbert.\n\t\t*set givenname \"Skyler\"\n\t\t*set surname \"Hibbert\"\n\t\t*goto minorleaguejersey\n\t#Jesse Amaturo.\n\t\t*set givenname \"Jesse\"\n\t\t*set surname \"Amaturo\"\n\t\t*goto minorleaguejersey\n\t#I'd like to choose my own name.\n\t\t*goto makeupaname\n*label makeupaname\nWhat's your first name?\n\n*input_text givenname\n\nAnd what's your last name?\n\n*input_text surname\n*label minorleaguejersey\nYou wore that minor league jersey just a couple of years ago, and now here you are. You're playing in the big city of San Antonio, wearing the home whites for the San Antonio Bulls, and it's your major league debut.\n\nOne of the Bulls pitchers is out with \"arm fatigue,\" a somewhat vague and uncomfortable reason for a trip to the disabled list (don't all pitchers have arm fatigue?), so you were rushed over from the AAA team in Corpus Christi to replace him. You briefly shake hands with your coaches and a few teammates but they mostly go about their business and leave you to fend for yourself in the clubhouse.\n\nYou stand on the dugout rail before the game for a brief ceremony. Oh, right, it's June 23rd. Over the stadium speakers, the PA announcer says \"On this day in 1972, Title IX became law, an important step in ending gender-based discrimination in education, and particularly in sports. After years of discussion and debate, university athletics organizations decided to unify baseball and softball to comply with Title IX. Since that day, women and non-binary athletes have joined men to play America's national pastime at the highest level. Today, we honor those athletes.\"\n\nWhat pronouns represent you?\n\n*choice\n\t#He, him, his.\n\t\t*set heshe \"he\"\n\t\t*set heistheyare \"he is\"\n\t\t*set himher \"him\"\n\t\t*set hisher \"his\"\n\t\t*goto firstgame\n\t#She, her, her.\n\t\t*set heshe \"she\"\n\t\t*set heistheyare \"she is\"\n\t\t*set himher \"her\"\n\t\t*set hisher \"her\"\n\t\t*goto firstgame\n\t#They, them, their.\n\t\t*goto firstgame\n\t#I would like to enter my own pronouns.\n\t\t*goto pronounchoice\n\n*label pronounchoice\nWhat is your pronoun for he, she, or they?\n\n*input_text heshe\n*set heistheyare \"${heshe} is\"\n\nWhat is your pronoun for him, her, or them?\n\n*input_text himher\n\nWhat is your pronoun for his, her, or their?\n\n*input_text hisher\n\n*label firstgame\nYou've mostly started games in the minors, but at this level, for now, you're in the bullpen. You maintain your post at the dugout rail and watch the game unfold around you. By the fifth inning it's clearly not working out for your team's starter today, so your manager says, \"${givenname}, get working!\" You walk out of the dugout into the foul territory bullpen and start throwing.\n\nA double to the wall scores another run for your opponents, the New York Barons, and now the Bulls are down 6 - 1. The manager walks out toward the mound, and your heart starts beating three times as fast. You're about to debut in the major leagues.\n\n*page_break Head to the Mound\n*set runnersecond true\n*set outs 2\nPresumably, your name was announced, and presumably, some people applauded, but you didn't notice. You just focused on your walk to the mound, head down, making sure not to step on the foul line because everyone knows that incurs the wrath of the baseball gods. You throw a few more warm-up tosses off the mound to your catcher, and then the batter steps in.\n\n*gosub_scene 2ndYear situationtext\nThe count is ${balls} - ${strikes}.\n\nYou decide to start your career in the majors by throwing your best pitch. What is your best pitch?\n\n*temp hitfirstbatter false\n*fake_choice\n\t#I overpower hitters with my fastball.\n\t\tThe hitter just lets his bat lean on his shoulder as he watches the pitch go by, observing closely so he can recognize it next time. It nails the catcher's mitt for strike one. Now that the batter has seen the fastball once, he's more likely to recognize it early and hit it hard next time.\n\t\t*set velocity 55\n\t\t*set strikes +1\n\t#I put hitters off balance swinging at my slider.\n\t\tThe hitter just lets his bat lean on his shoulder as he watches the pitch go by, observing closely so he can recognize it next time. The slider bends down and away from the hitter but stays in the strike zone, and that's strike one. Now that the batter has seen the slider once, he's more likely to recognize it early and hit it hard next time.\n\t\t*set slider 50\n\t\t*set strikes +1\n\t#I get hitters to swing over my curveball.\n\t\tThe hitter just lets his bat lean on his shoulder as he watches the pitch go by, observing closely so he can recognize it next time. The curveball loops up then down and away from the hitter, slowly falling into the catcher's mitt. The umpire signals strike one. Now that the batter has seen the curveball once, he's more likely to recognize it early and hit it hard next time.\n\t\t*set curveball 50\n\t\t*set strikes +1\n\t#I like to make them afraid to stand in against me, so I hit the batter with my pitch.\n\t\tThe hitter jerks back but the ball hits him right on the shoulder. He tosses his bat away and jogs to first but the other team is furious, jumping halfway over the dugout railing and yelling at you. The umpire says nothing and the game continues. You've established your reputation after just one pitch.\n\n\t\tYou can see your pitching coach shaking his head as he walks out to the mound. \"What the hell was that?\" he says, then waits for a moment as if you're supposed to respond. Everyone in the majors knows there could be some expert lip readers watching on TV so you cover your mouth with your glove to respond, but he cuts you off. \"I know you hit him on purpose, and so does everybody. Don't do it again or you're headed to the bush leagues where that nonsense belongs.\"\n\n\t\tYou nod your head and get back to work. Your coach doesn't seem to value the importance of intimidating the hitters. Oh well. On to the next batter.\n\t\t*set runnerfirst true\n\t\t*set intimidating %+20\n\t\t*set hitfirstbatter true\n\t\t*check_achievements\n\t\t*if intimidating > 60\n\t\t\t*if not(choice_achieved_looming)\n\t\t\t\t*achieve looming\n*page_break Come Set\nYou take a moment on the mound to gather yourself. You imagine your throwing motion, going through every step.\n\nThere are runners on base, so you have to throw from the stretch. Instead of taking your time to pivot and lift your front leg for the windup, you simply have to take a strong step toward the plate and throw. Thinking about this motion you make hundreds of times a week feels very strange. What angle is your arm when you throw, again?\n\nSome pitchers throw completely overhand to let gravity help add some velocity to the pitch, but it's a difficult motion to consistently control.\n\nMost pitchers throw at a three quarters angle, coming from a little bit off to the side.\n\nSome pitchers throw sidearm. This makes things harder for batters who swing from your arm side, but opposite-handed batters will get a better look at the pitch as it comes in. This is called your \"platoon split.\" Platoon split is how much better a right-handed pitcher performs against right-handed batters, and the same with lefties against lefties.\n\nYou can also throw submarine, slinging the ball from just above dirt level, which will make you stand out from almost every other pitcher in the big leagues, but you won't be able to throw especially hard.\n\nThe catcher signals for a fastball outside. What arm slot do you throw from?\n\n*fake_choice\n\t#Overhand.\n\t\t*set velocity %+15\n\t\t*set control %-10\n\t\t*check_achievements\n\t\t*if not(choice_achieved_purevelocity)\n\t\t\t*if velocity >= 70\n\t\t\t\t*achieve purevelocity\n\t#Three quarters.\n\t\t*set velocity %+5\n\t\t*check_achievements\n\t\t*if not(choice_achieved_purevelocity)\n\t\t\t*if velocity >= 70\n\t\t\t\t*achieve purevelocity\n\t#Sidearm.\n\t\t*set platoonsplit 50\n\t#Submarine.\n\t\t*set velocity %-5\n\t\t*set serious %-20\n\t\t*check_achievements\n\t\t*if serious \u003c 40\n\t\t\t*if not(choice_achieved_styleicon)\n\t\t\t\t*achieve styleicon\n\nYour glove arm levers up, then down, a natural movement that adds even more force to your stride and maintains your balance throughout the motion. Your front foot strides into the dirt, stomping and staying completely still as your body's momentum moves through it and over it. The toes of your back foot drag lightly forward from the pitching rubber, like a dance move, tugging specks of dirt along with it. At the moment your front foot touches the ground, your hips turn and successfully transfer all the force generated by your stride into your upper body and, most importantly, your throwing arm.\n\nYour arm reaches back and catapults the ball forward, using everything else you have in your body. Like a technically skilled heavy metal drummer, your body has to balance four different rhythms at once to complete the motion, a unison achieved only through thousands and thousands of hours of practice.\n\nUnfortunately, something, somewhere, was slightly off rhythm. The ball bounces in the grass and the catcher corrals it. You drop to one knee and grab your ${throwingarm} arm. You've never felt this before, but you know what it is anyway. Your elbow's quit on you. You're not going to throw again this year.\n*page_break\nA coach you've barely met whose name you can't remember escorts you into the clubhouse, and calls are made and travel arranged. They're going to take you somewhere to get an MRI of your arm, but you and everyone else already knows what it will say. Torn ulnar collateral ligament or UCL, which means Tommy John surgery, which means twelve to eighteen months of no baseball.\n\nLater on, back in your hotel room, the dream of baseball intolerably delayed, you feel a buzz. At first you think it might be a strange new pain in your elbow, but it's the phone in your pocket. You gingerly pull the phone out with your @{lefty right|left} hand and briefly see \"Unknown - San Antonio, Texas\" flash on the screen before you accidentally fumble the phone and hit accept.\n\nA female voice comes through the speaker: \"Hello, is this ${givenname} ${surname}? Sorry to bother you, but I didn't get to introduce myself today. I'm Inés Cruz from [i]The South Texas Journal[/i]. Do you have time right now to tell me about your injury?\" She's the primary beat writer for your team. You can't just blow her off. What do you say?\n\n*choice\n\t#I tell her I'd prefer to focus on the positives and talk about my major league debut.\n\t\t\"Okay,\" she says. \"Let's talk about your debut, then. What did you throw, two pitches? The last one didn't go too far, so maybe call it one and a half?\" Oh good, she's got jokes. What do you say?\n\t\t*choice\n\t\t\t*if (hitfirstbatter) #I explain how I sent a message to the league when I hit that batter.\n\t\t\t\t*set serious %+10\n\t\t\t\t*set intimidating %+20\n\t\t\t\t*set rebellious %+10\n\t\t\t\t*set cruz_rel %-20\n\t\t\t\t*check_achievements\n\t\t\t\t*if serious > 60\n\t\t\t\t\t*if not(choice_achieved_nofun)\n\t\t\t\t\t\t*achieve nofun\n\t\t\t\t*if intimidating > 60\n\t\t\t\t\t*if not(choice_achieved_looming)\n\t\t\t\t\t\t*achieve looming\n\t\t\t\t\"Oh lord,\" she says. \"So that was on purpose? I had figured it was just jitters from your debut. Okay then…\"\n\t\t\t\t*goto followupquestion\n\t\t\t#I play along with a joke at my expense.\n\t\t\t\t*set eloquent %+10\n\t\t\t\t*set intimidating %-10\n\t\t\t\t*set cruz_rel %+10\n\t\t\t\t*check_achievements\n\t\t\t\t*if eloquent > 60\n\t\t\t\t\t*if not(choice_achieved_mellifluous)\n\t\t\t\t\t\t*achieve mellifluous\n\t\t\t\t*if intimidating \u003c 40\n\t\t\t\t\t*if not(choice_achieved_islandtime)\n\t\t\t\t\t\t*achieve islandtime\n\t\t\t\t\"I'll be sure to throw my next pitch all the way to the backstop,\" you say, \"so that'll count as another one and a half pitches and get me up to an even three. Makes it simple for the scorekeepers.\"\n\n\t\t\t\t\"Oh lord,\" she says, laughing. \"I'm sure it was a proud moment to finally fulfill your lifelong dream of pitching…in the…oh lord.\" She can't finish her sentence without laughing again. She's clearly not too worried about your injury.\n\t\t\t\t*goto followupquestion\n\t\t\t#I respond seriously about the dream of making it to the majors.\n\t\t\t\t*set eloquent %-10\n\t\t\t\t*set serious %+20\n\t\t\t\t*check_achievements\n\t\t\t\t*if serious > 60\n\t\t\t\t\t*if not(choice_achieved_nofun)\n\t\t\t\t\t\t*achieve nofun\n\t\t\t\t*if eloquent \u003c 40\n\t\t\t\t\t*if not(choice_achieved_dayatatime)\n\t\t\t\t\t\t*achieve dayatatime\n\t\t\t\t\"It may not have gone the way I wanted,\" you say, \"but it's been a lifelong dream of mine to pitch in the major leagues and now I've done it. Now the next goal is to come back healthier and stronger and to help my teammates win a championship in 2018.\"\n\n\t\t\t\t\"Great, that's awesome,\" she says, sounding a touch bored. She must get that kind of answer to her interviews a lot.\n\t\t\t\t*goto followupquestion\n\t\t\t#I talk about how comfortable it was to pitch without really thinking about what was happening.\n\t\t\t\t*set eloquent %+5\n\t\t\t\t*set intimidating %-10\n\t\t\t\t*set analytical %-15\n\t\t\t\t*check_achievements\n\t\t\t\t*if eloquent > 60\n\t\t\t\t\t*if not(choice_achieved_mellifluous)\n\t\t\t\t\t\t*achieve mellifluous\n\t\t\t\t*if intimidating \u003c 40\n\t\t\t\t\t*if not(choice_achieved_islandtime)\n\t\t\t\t\t\t*achieve islandtime\n\t\t\t\t\"It should have been a stressful and exciting moment, but for me it was the same as every other time I've pitched,\" you say. \"I just go up there and let mechanics do the work without really thinking about the situation or the batter or anything that might psych me out. It's still the same game it's always been, and that's good to know now for sure.\"\n\n\t\t\t\t\"That's good to hear,\" she says. \"Hopefully you can bring that calmness to a Bulls playoff run next year.\"\n\t\t\t\t*goto followupquestion\n\t#I fib slightly and say the team isn't allowing me to discuss the injury at this time.\n\t\t*set rebellious %-10\n\t\t*set serious %+10\n\t\t*set cruz_rel %-10\n\t\t*check_achievements\n\t\t*if serious > 60\n\t\t\t*if not(choice_achieved_nofun)\n\t\t\t\t*achieve nofun\n\t\t\"Sorry but I can't talk about the injury right now,\" you say. \"It's still up in the air and the team is going to make an announcement when we know for sure.\"\n\n\t\t\"Okay, that's fine,\" she says. \"Just one more question.\"\n\t\t*goto followupquestion\n\t#I keep my answer short and simple, only telling her what happened.\n\t\t*set eloquent %-10\n\t\t*set serious %+10\n\t\t*set rebellious %-10\n\t\t*check_achievements\n\t\t*if serious > 60\n\t\t\t*if not(choice_achieved_nofun)\n\t\t\t\t*achieve nofun\n\t\t*if eloquent \u003c 40\n\t\t\t*if not(choice_achieved_dayatatime)\n\t\t\t\t*achieve dayatatime\n\t\t\"Well I felt a lot of pain in my elbow after my second pitch,\" you say, \"And now we're going to get an MRI and figure it all out from there.\"\n\n\t\t\"Okay, simple as that,\" she says. \"Just one more question.\"\n\t\t*goto followupquestion\n\t#Well, she asked, so I describe the surgery to her in gory detail.\n\t\t*set eloquent %+10\n\t\t*set analytical %+10\n\t\t*set cruz_rel %+10\n\t\t*check_achievements\n\t\t*if eloquent > 60\n\t\t\t*if not(choice_achieved_mellifluous)\n\t\t\t\t*achieve mellifluous\n\t\tYou've read all about how the surgery works, so you tell her. \"So basically what they're going to do is first create an incision in my forearm and look for this specific tendon,\" you start. \"If they can't find it then they'll open up my knee, or my hamstring, or somewhere in my toes, all looking for a tendon to replace the one in my elbow that doesn't work anymore. Then they drill holes in the bones around my elbow so they can thread this new tendon in there. That's all happening to me some time this week.\"\n\n\t\t\"Very informative,\" she says, chuckling. \"That's a great way of saying you're getting Tommy John surgery. It has to be devastating for you, but I guess it's good to have a dark sense of humor about it.\" You weren't really joking, but hey, whatever works.\n\t\t*goto followupquestion\n\n*label followupquestion\n\nCruz continues, \"I know you will probably be out of action for a while, but this was your debut and I ask all the rookies this question when they come up: What is your main goal for your career in the majors? What one thing do you want to accomplish no matter what? Think big with this one.\"\n\nWhat do you say?\n\n*fake_choice\n\t#I want to help the Bulls win a world championship.\n\t\t*set rebellious %-20\n\t\t*set eloquent %-10\n\t\t*check_achievements\n\t\t*if eloquent \u003c 40\n\t\t\t*if not(choice_achieved_dayatatime)\n\t\t\t\t*achieve dayatatime\n\t\t\"I've loved coming up with this team and I hope I can win the city of San Antonio a title,\" you answer.\n\n\t\t\"Great! That's all I've got for you,\" Cruz says. \"Good luck with your recovery and I'm sure I'll see a lot more of you next year.\"\n\t#I want to learn all I can and discover the secret of pitching.\n\t\t*set analytical %+20\n\t\t*set eloquent %+10\n\t\t*check_achievements\n\t\t*if eloquent > 60\n\t\t\t*if not(choice_achieved_mellifluous)\n\t\t\t\t*achieve mellifluous\n\t\t\"You can ask my minor league coaches and they'll tell you, I'm a real student of the game,\" you say. \"I find pitching fascinating as a mental exercise as much as a physical one and I hope one day to find a new way to pitch that works better than anything that's ever been done before.\"\n\n\t\tCruz sounds curious. \"Never heard an answer quite like that one before. Well I better let you go. Good luck with your recovery, and I'm sure I'll see a lot more of you next year.\"\n\t#I want to express my personal style on the world stage.\n\t\t*set serious %-20\n\t\t*set intimidating %-5\n\t\t*set eloquent %+5\n\t\t*check_achievements\n\t\t*if eloquent > 60\n\t\t\t*if not(choice_achieved_mellifluous)\n\t\t\t\t*achieve mellifluous\n\t\t*if serious > 60\n\t\t\t*if not(choice_achieved_styleicon)\n\t\t\t\t*achieve styleicon\n\t\t\"Everyone knows that baseball is a little stuck up and stoic these days,\" you say. \"I want to win, but more than that I want to play with style and show everyone how fun it is to play this game for a living. Changing that culture and showing my personality is my main goal for my career.\"\n\n\t\t\"Very cool!\" Cruz says. \"That's a very novel answer. Thanks so much for your time and good luck with your recovery. I'm sure I'll see a lot more of you next year.\"\n\t#I want to make the league fear my name.\n\t\t*set intimidating %+20\n\t\t*set eloquent %+10\n\t\t*check_achievements\n\t\t*if intimidating > 60\n\t\t\t*if not(choice_achieved_looming)\n\t\t\t\t*achieve looming\n\t\t*if eloquent > 60\n\t\t\t*if not(choice_achieved_mellifluous)\n\t\t\t\t*achieve mellifluous\n\t\t\"I want everyone to fear my name and my arm,\" you say. \"No one will want to stand in against me, and I don't care what I have to do to make that happen.\"\n\n\t\t\"Oookay,\" Cruz responds. \"Well, thank you for your time and good luck with your recovery.\"\n*page_break A Week Later\nYour ${throwingarm} arm is in a brace, the elbow set at a right angle. Your Tommy John surgery was a success, but you'll be out of action and rebuilding your elbow for at least ten months. You're sitting upright in what must be the world's stiffest chair, in a small room with Carolina blue walls. You're here to meet your assigned physical therapist, but first you have to wait in this room.\n\n*if canadian\n\tThere's a signed Philippe Lagrange hockey jersey on the wall, so this place has clearly dealt with some big name professional athletes before. Quietly, some of your anxiety oozes away.\n\t*goto chengarrives\n*else\n\tThere's a signed hockey jersey on the wall for somebody named Lagrange. You've never heard of him. Maybe a local minor league athlete? One part of your brain thinks that your team has cheaped out on your physical therapy. Do they really think so little of your potential? Another part of your brain slaps that part for being silly and insecure. You're a major leaguer now. Technically.\n\t*goto chengarrives\n*label chengarrives\n\nJust as you are about to cave into boredom and flip through an issue of [i]Personal Fitness[/i], your physical therapist arrives. \"A million apologies,\" she says while hunched over, cradling an oversize stack of papers and trying to gently close the door. She succeeds in only dropping one sheet, which somehow manages to float back under the closed door, forcing her to reopen the door, grab the paper off the floor, then scuttle back in. She hurriedly ties her already short hair up into a barely-existent ponytail. \"My name's Julie Cheng, and I'm afraid I've got some homework for you.\" She grabs about a third of the huge stack of papers she brought in and holds them in your direction. \"These are for your first month or so.\"\n\n*page_break Take Your Homework\n\"You're going to come into the office here a bunch,\" Cheng says, \"but you have to do these exercises at home as well. So your recovery is on me, but it's on you too. Get impatient and do things too fast and you'll end up back here again in two years.\"\n\nYou start to flip through the sheets of paper. They describe grip exercises, dumbbell workouts, and new ways to stretch. Pitching always came naturally to you, so you've never really put this much thought into ways to work out and improve your arm. \"I know it's a lot of stuff all at once,\" she continues. \"It will be good for you in the long run. Lots of pitchers think elbow surgery makes them throw harder, but here's the truth: all that surgery rehab makes them pay attention to fitness in a way they never have before. Do this right and you'll come out of this a better pitcher.\"\n\nAfter a few lectures, some stretching exercises, and another set of lectures, you head back home. There's not much you can do with your ${throwingarm} arm, but you can work out some other way while you've got nothing to do. What do you do?\n\n*fake_choice\n\t#I start taking long walks every day. I need to keep my fitness up as best I can.\n\t\t*set fitness %+10\n\t\t*check_achievements\n\t\t*if fitness > 60\n\t\t\t*if not(choice_achieved_ripped)\n\t\t\t\t*achieve ripped\n\t#I focus on my grip exercises. With a strong grip I can improve my changeup.\n\t\t*set changeup 50\n\t#I work on shoulder exercises. Shoulder strength will improve my fastball velocity.\n\t\t*set velocity %+10\n\t\t*check_achievements\n\t\t*if not(choice_achieved_purevelocity)\n\t\t\t*if velocity >= 70\n\t\t\t\t*achieve purevelocity\n\nThe exercises are slow, repetitive, and boring, but hopefully the results will show when you're allowed to throw again. Meanwhile, you get to catch up on all those TV shows you weren't watching back when you were throwing baseballs every day. What are people watching these days, anyway?\n\n*page_break\nA few months in, and the elbow pain is barely noticeable compared to what it once was. You're allowed to move your arm freely and even do some light athletic activities. What do you focus on for the next few months of rehab?\n\n*fake_choice\n\t#I work hard on light dumbbell exercises. More strength means faster pitches.\n\t\t*set velocity %+15\n\t\t*check_achievements\n\t\t*if not(choice_achieved_purevelocity)\n\t\t\t*if velocity >= 70\n\t\t\t\t*achieve purevelocity\n\t#I can't really throw, but I'm allowed to simulate my throwing motion. That will help my control.\n\t\t*set control %+15\n\t\t*check_achievements\n\t\t*if not(choice_achieved_pinpoint)\n\t\t\t*if control >= 60\n\t\t\t\t*achieve pinpoint\n\t#Cheng says I can play golf now, so why not? Cross-training will slightly improve several aspects of my game.\n\t\t*set control +3\n\t\t*set velocity +3\n\t\t*set fitness +3\n\t\tAfter cross-training with golf and a few other light sports, your control, velocity, and fitness all improve slightly.\n\t\t*check_achievements\n\t\t*if fitness > 60\n\t\t\t*if not(choice_achieved_ripped)\n\t\t\t\t*achieve ripped\n\t\t*if not(choice_achieved_pinpoint)\n\t\t\t*if control >= 60\n\t\t\t\t*achieve pinpoint\n\t\t*if not(choice_achieved_purevelocity)\n\t\t\t*if velocity >= 70\n\t\t\t\t*achieve purevelocity\n\nSeven months in, and you're finally allowed to throw whatever you want, so long as it's not on a pitching mound. You may never get another chance to add a curveball or slider to your repertoire, so now is a good time to do that if you haven't already. How do you train for the last few months of your rehab?\n\n*choice\n\t#I'm going to stick to long toss. Work on it hard enough and I'll improve my velocity.\n\t\t*set velocity %+10\n\t\t*check_achievements\n\t\t*if not(choice_achieved_purevelocity)\n\t\t\t*if velocity >= 70\n\t\t\t\t*achieve purevelocity\n\t\tDuring your time off, you focus on building strength, strength, and more strength. Not just in your arm but in your core and legs, building muscle with every throw you make. You try to throw not just to your target but through it, throwing straight bullets ten, twenty, fifty feet away. After a few weeks of this, you're throwing harder than ever before.\n\t\t*goto checkvelocity\n\t#I go with the weighted ball routine. Throwing with different weights teaches better control.\n\t\t*set control %+10\n\t\t*check_achievements\n\t\t*if not(choice_achieved_pinpoint)\n\t\t\t*if control >= 60\n\t\t\t\t*achieve pinpoint\n\t\tYou bring home a set of weighted balls from the clubhouse to practice with. Just like hitters who take practice swings with a weighted donut on the barrel, you throw differently weighted baseballs, making sure your mechanics are sound enough to throw strikes no matter how light or heavy the ball is. This subconsciously teaches you good balance, and when you go back to throwing regular baseballs, you're throwing the ball where you want every time.\n\t\t*goto checkvelocity\n\t*if (curveball > 0) #I should take this time to improve my curveball.\n\t\t*set curveball +5\n\t\tYour curve isn't sharp enough to throw even while behind in the count, so you spend the time off working on it. After spending weeks trying and failing to tweak your curveball grip for a little more break, you decide to throw it the way you always did. To your surprise, the curveball is mysteriously better than ever now that you're throwing it the old way. Now you can rely on the curveball a little bit more in games. Pitching is weird like that sometimes.\n\t\t*goto checkvelocity\n\t*if (curveball = 0) #I should take this time to develop a curveball.\n\t\t*set curveball 50\n\t\tYou've never really thought of yourself as a curveball pitcher, but with the time off you decide to give it a shot. After just a few tries, you throw a good looping curveball, but it takes weeks of practice to get it to break every time you throw. Now that it breaks consistently, you feel good about bringing it into a game.\n\t\t*goto checkvelocity\n\t*if (slider > 0) #Maybe now I can work on my slider.\n\t\t*set slider +5\n\t\tYou have some confidence in your slider, but it's not exactly a weapon you can go to in any count. You spend the time off developing the pitch, making tiny tweaks to get it to break harder without changing your arm action in a way that would tip off the hitters to what you're throwing. After weeks of work, the slider has clearly gained more horizontal movement, and hopefully that'll get hitters to swing and miss.\n\t\t*goto checkvelocity\n\t*if (slider = 0) #Maybe now I can develop a slider.\n\t\t*set slider 50\n\t\tAn old high school teammate taught you a slider grip years ago so you've always toyed around with that in practice. But with this extended time off, you throw it over and over until you're comfortable using it in a game.\n\t\t*goto checkvelocity\n\n*label checkvelocity\nThe baseball season ends and winter sets in. Mind-numbing as it sometimes was, you just about feel back to normal.\n\n*if velocity >= 50\n\tThere's no doubt your velocity is a little livelier than it was last year. When you're all the way ready for game action, the radar guns might be a welcome surprise for the coaches and fans.\n*if velocity \u003c 50\n\tJulie Cheng said your velocity might even improve with the added attention to fitness, but so far, that hasn't been the case. You suppose it's okay so long as the elbow holds together.\n\n*if control >= 50\n\tIt feels like you're spotting the ball better in the exercises than you ever did in the minors. Hard to tell without a real hitter to face, but you could almost swear your mechanics have become rock-solid.\n*if control \u003c 50\n\tYou're having a little trouble staying consistent with your mechanics, but that's to be expected after so many months without being able to throw.\n\n*if fitness >= 40\n\tOne thing's for sure, you're in better shape than you were before. Pitching demands a lot of your arm, but the rest of your body can get a little loose if you don't watch it. Being more fit will mean you will play better defense and throw better deep into games than before.\n*if fitness \u003c 40\n\tJulie Cheng said that working more on cardio and personal fitness could help, but you haven't done that just yet. Improving your fitness could help your defense and help you pitch better in long appearances if you want to be a great starting pitcher.\n*page_break\n\nYou're thrilled when March finally comes around. Pitchers and catchers report, and your arm is in good shape, slightly ahead of schedule. The waiting and hard work is over. It's time to be a big league pitcher.\n*finish\n", "2ndyear": "*set year2team \"SAB\"\n*set currentyear 2\n*temp betmade false\n*temp wonbet false\n*text_image chap_2.png center Year 2: Comeback Kid\n\n\"Alright, who's it gonna be this year?\" your manager, Sandy Kingston, says as she walks out onto your Spring Training field in Surprise, Arizona, waving a 31-ounce bat in front of her like she's clearing jungle brush. She stops briefly and brings the bat to her ear, as if it were whispering something to her. Her eyes scan the crowd of pitchers and catchers in the outfield throwing long toss.\n\nApparently the bat finished whatever it was saying to her, so Kingston starts marching forward, straight towards you. She squares up with you then places her bat on the ground like a cane and leans on it, staring up at you just below the brim of her hat as if to intimidate.\n\n\"Looks like it's you this year, ${givenname},\" says your catcher, Andres del Rosario, as everyone stops throwing and closes in to watch the spectacle. His face becomes suddenly serious, though he keeps chewing gum behind his thin, meticulously groomed beard and lantern jaw. \"Every year one of the rookies has to pitch to the boss. And since you only threw, what, less than an inning last year, I'm afraid you're still a rookie.\"\n\nWhat do you say?\n*choice\n\t#\"Bring it. This should be fun.\"\n\t\t\"There's a catch that might make this little tradition not so fun for you,\" Rosario says. \"Mendis, tell ${himher}.\"\n\n\t\tOne of the other pitchers, a 5-foot-10-inch lefty named Ama Mendis, pushes her curly black hair back over her shoulder and chips in. \"If she gets a solid hit off you, you go straight down to minor league camp. It happened to me two years ago.\" The manager says nothing as she continues to stare you down.\n\t\t*goto mendistellher\n\t#\"I can't do that, are you serious? What if I hit her by accident?\"\n\t\t*if control \u003c 50\n\t\t\t\"From catching you so far this spring, that seems like a real possibility,\" Rosario says. \"But the boss can take a fastball to the hip with the best of 'em. She basically specialized in getting hit by pitches. Doesn't show up on the baseball card, but it helps the team if you can subtly stick your butt out and trade a bruise for a base. Anyway, don't worry about it, the boss will be fine. But there's a catch. Mendis, tell ${himher}.\"\n\n\t\t\tOne of the other pitchers, a 5-foot-10-inch lefty named Ama Mendis, pushes her curly black hair back over her shoulder and chips in. \"If she gets a solid hit off you, you go straight down to minor league camp. It happened to me two years ago.\" The manager says nothing as she continues to stare you down.\n\t\t\t*goto mendistellher\n\t\t*else\n\t\t\t\"You can spot the ball pretty well,\" Rosario says. \"Don't think that'll happen. But the boss can take a fastball to the hip with the best of 'em. She specialized in getting hit by pitches back in the day. Doesn't show up on the baseball card, but it helps the team if you can subtly stick your butt out and trade a bruise for a base. Anyway, don't worry about it, the boss will be fine. But there's a catch. Mendis, tell ${himher}.\"\n\n\t\t\tOne of the other pitchers, a 5-foot-10-inch lefty named Ama Mendis, pushes her curly black hair back over her shoulder and chips in. \"If she gets a solid hit off you, you go straight down to minor league camp. It happened to me two years ago.\" The manager says nothing as she continues to stare you down.\n\t\t\t*goto mendistellher\n\t#\"Why me and not one of the other rookies?\"\n\t\t\"Her bat chose you,\" Rosario says. \"That thing's like a dowsing rod. It knows exactly which rookie needs to show ${hisher} stuff.\" Rosario scratches his chin for a second, then looks up toward the sun. \"But there's a catch. Mendis, tell ${himher}.\"\n\n\t\tOne of the other pitchers, a 5-foot-10-inch lefty named Ama Mendis, pushes her curly black hair back over her shoulder and chips in. \"If she gets a solid hit off you, you go straight down to minor league camp. It happened to me two years ago.\" The manager says nothing as she continues to stare you down.\n\t\t*goto mendistellher\n\t#\"If I don't strike her out, I owe somebody ten bucks.\"\n\t\t*temp betmade true\n\t\t\"I'll take you up on that,\" says one of the other pitchers, a 5-foot-10 lefty named Ama Mendis. \"She knows how to put the bat on the ball. I'll pay you ten if you manage to strike her out. But that won't be the only thing you're wagering. We have a tradition. If she gets a solid hit off you, you go straight down to minor league camp. It happened to me two years ago.\" The manager says nothing as she continues to stare you down.\n\t\t*goto mendistellher\n*label mendistellher\n\n\"But she was a weird case,\" Rosario says. \"Mendis had just come from playing cricket in Sri Lanka her whole life. At least you know you're not supposed to bounce the ball off the ground every time like she did. And Boss's playing days have been over a long time. Even when she did play, her career batting average was what, about .198 or something?\"\n\nKingston cracks a smile. \"I hit .204, asshole,\" she says. \"And I threw more runners out than you will if you play thirty years, Rosey. All right, enough talk. Let's do this. You're catching, Rosey. And somebody get over here and call balls and strikes.\"\n\n*page_break Head to the Mound\nIt's been a year since you've actually stood on a mound. You paw at the dirt in front of the pitching rubber with one cleat as you go through the pitching process in your mind.\n\nYou choose which pitches to throw to hitters. Depending on your abilities, each pitch will have a certain chance of being a strike, a ball, or hit into play. A ball hit into play could be anything from a groundout to a home run, depending on your attributes as a pitcher.\n\nThe more you throw the same pitch in a single at-bat, the more the batter gets a feel for the timing of that pitch, making them more likely to hit it. So vary your pitches to keep the hitter off-balance.\n\nIf you're ahead in the count, try throwing a \"waste pitch.\" A waste pitch is intentionally thrown well out of the strike zone, where the hitter should have little chance of making contact. If you get two early strikes, use a waste pitch or two, because it has a chance of getting the hitter out without risking hard contact.\n\n*label pitchtomanager\n*page_break\n*gosub resetgame\n*comment This scene is sort of a tutorial for the pitching sim system.\n*comment Batterability and batterpower adjust the results of pitching for how good the hitter is, with the average player being 0 in both stats. In this case, it's your manager, a former player, so the numbers are negative. Batterability increases the odds of the ball being put in play, and batterpower significantly increases the odds of a home run.\n*set batterability 0\n*set batterpower 0\n*set batterhand \"right\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto atbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto atbatloop\n*label atbatloop\n*if atbatresult = \"single\"\n\n\tKingston smacks your pitch the other way with excellent technique in what everyone agrees would have been a solid base hit. She's still got it.\n\t*goto notgettingsentdown\n*elseif atbatresult = \"double\"\n\n\tKingston gets a hold of your pitch and sends a line drive searing into the corner. \"Third baseman might have snagged that,\" Rosario says to rib her a little, but she clearly can still hit.\n\t*goto notgettingsentdown\n*elseif atbatresult = \"triple\"\n\n\tKingston hits a towering fly ball and flips her bat in celebration, but when it finally lands it hits the wall and stays in the park. \"I'm calling that a triple,\" she says and slowly lopes around the bases to third. With her current footspeed it's hard to imagine her getting to third without two errors and an act of God, but she certainly hit the ball a long way.\n\t*goto notgettingsentdown\n*elseif atbatresult = \"home run\"\n\n\tYour pitch drifts into Kingston's wheelhouse and she rips it over the left field wall, flips her bat dramatically, then begins to jog around the bases with her arms in the air. \"Coach, you might want to talk to the front office. We could use a right-handed bench bat,\" Rosario says, admiring the trajectory of the ball as it soars away.\n\t*goto notgettingsentdown\n*elseif atbatresult = \"groundout\"\n\n\tKingston grunts as she swings but tops the ball down into the ground, where it lightly bounces up toward you. You snag it and mime to throw to first, where no one is standing. \"Well, at least I made contact,\" Kingston says as she high-fives Rosario and starts to think about what to do next.\n\t*goto pitchtomanagerover\n*elseif atbatresult = \"lineout\"\n\n\tYou hear the crack of Kingston's bat, and the ball seems to hang in place but grow larger. You learned a long time ago that this confusing optical illusion means a line drive right back at your head, and you calmly put your glove in front of your face and snag the ball out of the air. \"You hit it hard but right back at ${himher},\" Rosario says. Kingston's body language suggests she considers it a small victory.\n\t*goto pitchtomanagerover\n*elseif atbatresult = \"flyout\"\n\n\tKingston's bat connects with the bottom of the ball and pops your pitch right up in the air. Rosario flips off his mask, settles under it, and makes the catch. Kingston sarcastically says \"Dang, just missed knocking that one out of here,\" then pats Rosario on the butt to indicate you're done here.\n\t*goto pitchtomanagerover\n*elseif atbatresult = \"walk\"\n\n\t\"Oh come on, you've got to give me something I can hit,\" Kingston says. \"Come on, let's do it again.\"\n\t*goto pitchtomanager\n*elseif atbatresult = \"strikeout\"\n\n\t\"Welp,\" Kingston says, \"Good thing I'm not playing for a job this spring. Looks like I'm all rust. Come on, let's go do something a little less embarrassing for me.\"\n\t*goto pitchtomanagerover\n*gosub getpitchodds\n*comment We need two dice to avoid the Choicescript thing where going to the stat screen resets a random variable. The first die determines if it's a \"strike/ball/in play\" and then the second gives the specific result for \"strike\" or \"in play.\"\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub pitchresults\n\t\t*goto atbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub pitchresults\n\t\t*goto atbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub pitchresults\n\t\t*goto atbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub pitchresults\n\t\t*goto atbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub pitchresults\n\t\t*goto atbatloop\n*label notgettingsentdown\n\nYou crouch on the mound and cringe, but Rosario reassures you. \"Don't worry, you're not going down to minor league camp. We made that part up.\"\n\n\"So you didn't get sent down two years ago?\" you say to Mendis.\n\n\"Oh no, they totally sent me down,\" Ama Mendis says, laughing. \"I still had no idea how to play this weird game! I was so bad! Eventually Peter Simon taught me everything. He was the pitching coach at AAA then, but he taught me so well that now he coaches here with the major league team.\"\n\n*label pitchtomanagerover\n*if (betmade = true) and (atbatresult = \"strikeout\")\n\t*set serious %-5\n\t*set mendis_rel %+5\n\t*set wonbet true\n\t*check_achievements\n\t*if serious \u003c 40\n\t\t*if not(choice_achieved_styleicon)\n\t\t\t*achieve styleicon\n\t*achieve betwinner\n\n\tYou tell Ama to pay up on your bet. \"You sure called your shot. But I don't just carry my wallet out on the field,\" she says. \"I'll have to buy your dinner someday. And this is the last time I bet on the hitting abilities of a former major league backup catcher.\"\n\n\t\"I'm going to put you in the bullpen if you don't watch it,\" Kingston jokes. \"Even Hall of Famers strike out sometimes. Give me another fifty at-bats or so and I'd probably eat that rookie for lunch.\"\n*if (betmade = true) and (atbatresult != \"strikeout\")\n\t*set mendis_rel %+5\n\t*set wonbet false\n\n\t\"She didn't strike out. You gotta pay up,\" Ama says. \"You gotta buy me some Tex-Mex.\"\n\n\tYou elaborately mime opening up your wallet then turning it upside down and finding it's empty. \"I'll pay you when I get my first check,\" you say, then promptly forget all about it.\n\n\tKingston says, \"Now don't you two start betting on real baseball. They make movies about the guys that do that. They'll have John Cusack reenact this moment on screen and the whole audience will know it was the beginning of the end for you two.\"\n*page_break A Month Later\nA gaggle of ushers hang bunting at Bulls Park and team preview articles sit on the floor of every hotel hallway in America. It's Opening Day.\n\nAma Mendis gets the start on Opening Day this year, which, given her roughly average 4.08 ERA last year, might be a bad sign for the Bulls' championship odds this year. But today the Bulls will get to face a recent expansion team with no history or superstar players, the Florida Capers. It should be an easy first series.\n\nYou settle into the dugout to watch the game without a clear idea of your role on the team. You're a reliever, but unlike a closer or setup man, you have to stay mentally ready because you could be called into the game at any time. This uncertainty and the full crowd flip your stomach over a few times, but there's nothing you can do but chew sunflower seeds and wait for your name to be called.\n\nIn the fifth inning, just like last year, you hear the magic words.\n*page_break \"${givenname}, get working!\"\n*gosub resetgame\n*set outs 1\nYou glance up at the scoreboard. The Capers are up 4 - 1. There's a runner on first. This all seems familiar. You start throwing on the mound in foul territory.\n\nThe current batter has noticeably broad shoulders, but they're not quite broad enough to fit his whole last name, \"Camporese,\" without bending the letters up and down in a slight frown on his back. Ama Mendis pitches from the stretch and grunts, a few strands of hair escaping her ponytail with the force of her throw. The batter silently whips his bat down and around the ball, propelling it into the outfield stands. 6 - 1. The same score as last year. The boss walks to the mound, grabs the ball from Mendis, then points at you.\n\nOkay. Forget about last year. The injury, the year of baseball it stole from you, the uncertainty you would ever come back. Doesn't matter. What's the game plan? How do you get these hitters out?\n*choice\n\t#I studied their weaknesses last night. Know your enemy.\n\t\t*set analytical %+15\n\t\tBy watching tape and reading a few stat charts, you know the exact sectors of the strike zone where these Capers hitters can't put a good swing on the ball. Just hit your spots and you've got them.\n\t\t*goto firstcapersatbat\n\t#I've been pitching my whole life. All I have to do is trust my gut and I'll be fine.\n\t\t*set analytical %-15\n\t\tIf you're thinking about too many numbers and scouting reports while you're doing your job, it won't go well. You have to trust your intuition, and pitch by the gut. Everything comes easy if you can get into that flow.\n\t\t*goto firstcapersatbat\n\t#I'll throw a fastball near the first batter to brush him off the plate and intimidate him.\n\t\t*set intimidating %+15\n\t\t*check_achievements\n\t\t*if intimidating > 60\n\t\t\t*if not(choice_achieved_looming)\n\t\t\t\t*achieve looming\n\t\tThe batter comes to the plate and stands right up on it, trying to claim it all as his. You throw a high fastball near his chin, but he turns sharply away from it. When he comes back ready to hit, he's standing noticeably farther off the plate. That should make it harder for him. The count is now 1 - 0.\n\t\t*set balls 1\n\t\t*goto firstcapersatbat\n\t#I just have to stay relaxed in front of the big crowd and do what I do.\n\t\t*set intimidating %-15\n\t\tYou've pitched a million times before and it's never been scary to you. Having 40,000 people in attendance doesn't change a thing about it. There's nowhere more comfortable for you to be than here on the mound, so you're relaxed and ready as the batter steps to the plate.\n\t\t*goto firstcapersatbat\n\n*label firstcapersatbat\n\n*set batterability (2 + batterabilitybonus)\n*set batterpower 0\n*set batterhand \"right\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto firstcapersatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto firstcapersatbatloop\n*label firstcapersatbatloop\n*if atbatresult = \"single\"\n\t*set runnerfirst true\n\n\tThe batter bloops the ball over the shortstop's head and it lands safely for a single. Hopefully you can get the next batter to ground into a double play.\n\t*goto secondcapersatbat\n*elseif atbatresult = \"double\"\n\t*set runnersecond true\n\n\tThe batter strokes the ball into the right field gap and cruises into second for a double. You'll have to pitch carefully to the next hitter.\n\t*goto secondcapersatbat\n*elseif atbatresult = \"triple\"\n\t*set runnerthird true\n\n\tThe batter strokes the ball into the right field corner and runs hard out of the box. The ball gets wedged slightly underneath the wall padding and when he finally gets the ball back into the infield, the batter is safe at third base, registering a triple. You'll have to be very careful with the next hitter.\n\t*goto secondcapersatbat\n*elseif atbatresult = \"home run\"\n\t*set userruns +1\n\t*set earnedruns +1\n\n\tA loud crack reverberates off the bricks behind home plate and you know without looking that the ball is gone. The crowd, numb from seeing their team get whipped, hardly makes a sound. You'll just have to get the next guy.\n\t*goto secondcapersatbat\n*elseif atbatresult = \"groundout\"\n\t*set outs +1\n\t*set totalouts +1\n\n\tThe batter shoots the ball along the ground on your left, and the second baseman gathers it up and throws to first for out number two.\n\t*goto secondcapersatbat\n*elseif atbatresult = \"lineout\"\n\t*set outs +1\n\t*set totalouts +1\n\n\tThe ball cracks hard off the bat and flies past you on your left, but the second baseman snags it out of the air. That's out number two.\n\t*goto secondcapersatbat\n*elseif atbatresult = \"flyout\"\n\t*set outs +1\n\t*set totalouts +1\n\n\tThe crowd groans a little, thinking this might be a home run, but you know from the sound off the bat that it won't be. But then you see your right fielder start running back toward the wall. Is the ball carrying? Is it windy today? She goes out further. At the warning track. And she's caught it. Just a long out. Scared you for a second there, but that's out number two.\n\t*goto secondcapersatbat\n*elseif atbatresult = \"walk\"\n\t*set runnerfirst true\n\n\tMaybe a little rusty still to start the season. Hopefully that'll just make it more impressive when you get the next batter to ground into a double play.\n\t*goto secondcapersatbat\n*elseif atbatresult = \"strikeout\"\n\t*set outs +1\n\t*set totalouts +1\n\t*set userstrikeouts +1\n\t*set strikeouts +1\n\n\tGot him. Not sure what was wrong with Mendis, because that was one of the Capers' better hitters you just struck out. Just have to get the next batter and then we're done here.\n\t*goto secondcapersatbat\n*gosub getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub pitchresults\n\t\t*goto firstcapersatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub pitchresults\n\t\t*goto firstcapersatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub pitchresults\n\t\t*goto firstcapersatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub pitchresults\n\t\t*goto firstcapersatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub pitchresults\n\t\t*goto firstcapersatbatloop\n\n*label secondcapersatbat\n*page_break Next Batter\nYou've heard of the next batter, Jane Podorowsky. She has a strange habit of licking her bat after every time she makes contact with a pitch. You're going to have to ignore that. What do you throw?\n\n*gosub situationtext\n\n*gosub resetatbat\n*set batterability (2 + batterabilitybonus)\n*set batterpower 2\n*set batterhand \"left\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto secondcapersatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto secondcapersatbatloop\n*label secondcapersatbatloop\n*if atbatresult = \"single\"\n\t*if (runnersecond = true) or (runnerthird = true)\n\t\t*set userruns +1\n\t\t*set earnedruns +1\n\t\tPodorowsky hits a line drive over the shortstop's head and into left field. The runner scores, making it a 7 - 1 lead for the Capers, as Podorowsky stays at first for a single. Kingston comes out to replace you with a new reliever. \"Sorry ${givenname}, but we've got a very specific idea about how to pitch to this next batter,\" she says. \"I'll try to let you finish your inning next time.\"\n\n\t\t*gosub armdidnotmeltshorter\n\t\t*goto endoffirstgame\n\t*else\n\t\t*set runnerfirst true\n\t\tPodorowsky hits a line drive over the shortstop's head and into left field. She stays at first for a single. Kingston comes out to replace you with a new reliever. \"Sorry ${givenname}, but we've got a very specific idea about how to pitch to this next batter,\" she says. \"I'll try to let you finish your inning next time.\"\n\n\t\t*gosub armdidnotmeltshorter\n\t*goto endoffirstgame\n*elseif atbatresult = \"double\"\n\t*if (runnersecond = true) or (runnerthird = true)\n\t\t*set userruns +1\n\t\t*set earnedruns +1\n\t\t*set runnersecond true\n\t\tPodorowsky hits a sharp line drive into the right field gap and though the center fielder manages to cut it off, he can't throw it back in before Podorowsky has made it to second. The runner scores, and now it's a 7 - 1 lead for the Capers. Kingston comes out to replace you with a new reliever. \"Sorry ${givenname}, but we've got a very specific idea about how to pitch to this next batter,\" she says. \"I'll try to let you finish your inning next time.\"\n\n\t\t*gosub armdidnotmeltshorter\n\t\t*goto endoffirstgame\n\t*else\n\t\t*set runnersecond true\n\t\tPodorowsky hits a sharp line drive into the right field gap and though the center fielder manages to cut it off, he can't throw it back in before Podorowsky has made it to second. Kingston comes out to replace you with a new reliever. \"Sorry ${givenname}, but we've got a very specific idea about how to pitch to this next batter,\" she says. \"I'll try to let you finish your inning next time.\"\n\n\t\t*gosub armdidnotmeltshorter\n\t*goto endoffirstgame\n*elseif atbatresult = \"triple\"\n\t*if ((runnerfirst = true) or (runnersecond = true)) or (runnerthird = true)\n\t\t*set userruns +1\n\t\t*set earnedruns +1\n\t\t*set runnerthird true\n\t\tPodorowsky hits the ball into the right field gap and she runs pretty well, making it all the way around to third for a triple. The runner scores, making it a 7 - 1 lead for the Capers, and here comes Kingston to take you out of the game. \"Sorry ${givenname}, but we've got a very specific idea about how to pitch to this next guy,\" she says. \"I'll try to let you finish your inning next time.\"\n\n\t\t*gosub armdidnotmeltshorter\n\t\t*goto endoffirstgame\n\t*else\n\t\t*set runnerthird true\n\t\tPodorowsky hits the ball into the right field gap and she runs pretty well, making it all the way around to third for a triple. Kingston comes out to replace you with a new reliever. \"Sorry ${givenname}, but we've got a very specific idea about how to pitch to this next guy,\" she says. \"I'll try to let you finish your inning next time.\"\n\n\t\t*gosub armdidnotmeltshorter\n\t\t*goto endoffirstgame\n*elseif atbatresult = \"home run\"\n\t*if ((runnerfirst = true) or (runnersecond = true)) or (runnerthird = true)\n\t\t*set userruns +2\n\t\t*set earnedruns +2\n\t\t*set runnerfirst false\n\t\t*set runnersecond false\n\t\t*set runnerthird false\n\t\tPodorowsky gets a hold of your pitch and sends it flying over the right field fence for a home run. As she jogs out of the batter's box, she licks her bat, tasting the heat from the impact of bat on ball. The runner scores, and now it's an 8 - 1 lead for the Capers. Kingston comes out of the dugout, and that's all the chance you'll get to pitch today. \"Go get 'em next time, champ,\" Kingston says as you hand the ball to her and walk into the dugout.\n\n\t\t*gosub armdidnotmeltshorter\n\t\t*goto endoffirstgame\n\t*else\n\t\t*set userruns +1\n\t\t*set earnedruns +1\n\t\tPodorowsky gets a hold of your pitch and sends it flying over the right field fence for a home run. As she jogs out of the batter's box, she licks her bat, tasting the heat from the impact of bat on ball. Now it's a 7 - 1 lead for the Capers, and here comes Kingston to take you out of the game. \"Forget that bat-licking weirdo\" is all Kingston says as she takes the ball and calls in the next reliever.\n\n\t\t*gosub armdidnotmeltshorter\n\t\t*goto endoffirstgame\n*elseif atbatresult = \"groundout\"\n\t*if runnerfirst = true\n\t\t*set outs +2\n\t\t*set totalouts +2\n\t\tPodorowsky hits the ball along the ground and starts sprinting toward first. The shortstop gathers the ball in and throws to second to get the lead runner out. The second baseman then takes it and throws it on toward first for a double play.\n\n\t\t*gosub armdidnotmeltshorter\n\t\t*goto endoffirstgame\n\t*elseif runnersecond = true\n\t\t*set runnerthird true\n\t\t*set runnersecond false\n\t\t*set outs +1\n\t\t*set totalouts +1\n\t\tPodorowsky grounds out, advancing the runner to third. Your manager comes out of the dugout to replace you with a new reliever. \"Sorry to take you out so soon,\" Kingston says. \"We've got a very specific idea about how to pitch to this next batter. Not your fault, you did a good job out here.\"\n\n\t\t*gosub armdidnotmeltshorter\n\t\t*goto endoffirstgame\n\t*elseif runnerthird = true\n\t\t*set runnerthird false\n\t\t*set userruns +1\n\t\t*set earnedruns +1\n\t\t*set outs +1\n\t\t*set totalouts +1\n\t\tPodorowsky hits a soft ground ball toward the third baseman, so soft that the runner from third is able to score before the third baseman can get to it. The third baseman throws hard to first and gets Podorowsky out, but concedes the run. Your manager comes out of the dugout to replace you with a new reliever. \"Sorry to take you out with the bases empty,\" Kingston says. \"You did fine, but we have a very specific idea about how to pitch to this next batter.\"\n\n\t\t*gosub armdidnotmeltshorter\n\t\t*goto endoffirstgame\n\t*else\n\t\t*set outs +1\n\t\t*set totalouts +1\n\t\tPodorowsky grounds out to the shortstop, an easy play. After she comes back to home plate to collect her bat, you notice she sniffs her bat, but doesn't lick it. The inning is over and that's the end of your day.\n\n\t\t*gosub armdidnotmelt\n\t\t*goto endoffirstgame\n*elseif atbatresult = \"lineout\"\n\t*if ((runnerfirst = true) or (runnersecond = true)) or (runnerthird = true)\n\t\t*set outs +2\n\t\t*set totalouts +2\n\t\tPodorowsky hits the ball hard, but the shortstop catches it out of the air. Then your shortstop pivots and finds the runner, throwing to his base and picking off the runner for a double play. That's the end of the inning, and your first successful day in the big leagues is done.\n\n\t\t*gosub armdidnotmelt\n\t\t*goto endoffirstgame\n\t*elseif outs = 2\n\t\t*set outs +1\n\t\t*set totalouts +1\n\t\tPodorowsky hits the ball hard, but the shortstop catches it out of the air. That's the end of the inning, and your first successful day in the big leagues is done.\n\n\t\t*gosub armdidnotmelt\n\t\t*goto endoffirstgame\n\t*else\n\t\t*set outs +1\n\t\t*set totalouts +1\n\t\tPodorowsky hits the ball hard, but the shortstop catches it out of the air. That's two outs, and now Kingston is coming out to get a new reliever. \"Sorry ${givenname}, but we've got a very specific idea about how to pitch to this next guy,\" she says. \"I'll try to let you finish your inning next time.\"\n\n\t\t*gosub armdidnotmeltshorter\n\t\t*goto endoffirstgame\n*elseif atbatresult = \"flyout\"\n\t*set outs +1\n\t*set totalouts +1\n\t*if runnerthird = true\n\t\t*set userruns +1\n\t\t*set earnedruns +1\n\t\tPodorowsky lifts a fly ball into deep center field, licking her bat triumphantly, knowing that will get the runner home from third. The runner scores on a sacrifice fly, and here comes Kingston to get a new reliever in the game. \"Sorry ${givenname}, but we've got a very specific idea about how to pitch to this next guy,\" she says. \"I'll try to let you finish your inning next time.\"\n\n\t\t*gosub armdidnotmeltshorter\n\t\t*goto endoffirstgame\n\t*elseif outs = 3\n\t\tPodorowsky lifts a fly ball into deep center field, but it's caught for the third out. You've just finished your first successful day in the big leagues.\n\n\t\t*gosub armdidnotmelt\n\t\t*goto endoffirstgame\n\t*else\n\t\tPodorowsky lifts a fly ball into deep center field, but it's caught for the second out. Here comes Kingston to get a new reliever. \"Sorry ${givenname}, but we've got a very specific idea about how to pitch to this next guy,\" she says. \"I'll try to let you finish your inning next time.\"\n\n\t\t*gosub armdidnotmeltshorter\n\t\t*goto endoffirstgame\n*elseif atbatresult = \"walk\"\n\t*set runnerfirst true\n\tPodorowsky flips her bat toward the dugout and walks to first. Here comes Kingston to take you out of the game. \"Sorry ${givenname}, but we've got a very specific idea about how to pitch to this next guy,\" she says. \"I'll try to let you finish your inning next time.\"\n\n\t*gosub armdidnotmeltshorter\n\t*goto endoffirstgame\n*elseif atbatresult = \"strikeout\"\n\t*set outs +1\n\t*set totalouts +1\n\t*set userstrikeouts +1\n\t*set strikeouts +1\n\t*if outs = 3\n\t\tYou struck her out and that will end the inning. In the dugout, Kingston congratulates you on your first successful day in the big leagues.\n\n\t\t*gosub armdidnotmelt\n\t\t*goto endoffirstgame\n\t*else\n\t\tYou struck her out, and now there are two outs. Kingston comes out to get a new reliever. \"Sorry to take you out so soon,\" Kingston says. \"We've got a very specific idea about how to pitch to this next guy. Not your fault, you did a good job out here.\"\n\n\t\t*gosub armdidnotmelt\n\t\t*goto endoffirstgame\n*label podorowskypitch\n*gosub getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub pitchresults\n\t\t*goto secondcapersatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub pitchresults\n\t\t*goto secondcapersatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub pitchresults\n\t\t*goto secondcapersatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub pitchresults\n\t\t*goto secondcapersatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub pitchresults\n\t\t*goto secondca
