ball down and throw it back in. By that time, Giulio has reached second with a double and Shimoda has come around from first to score.\n\n\tYou chalk that run up to bad luck and get the next two hitters out on a ground ball and a high pop fly, escaping first inning trouble.\n\t*goto endofmoongame\n*elseif atbatresult = \"triple\"\n\t*bug\n\t*goto endofmoongame\n*elseif atbatresult = \"home run\"\n\t*set userruns +2\n\t*set perfectmoongame false\n\tYou point at the ball in the air, theoretically to help your outfielders find it, but it becomes clear pretty quickly that this ball can't be caught. It's soaring high, high into the air and it just refuses to ever come down. The ball carries all the way out to the back wall of this dome stadium, bouncing off of a Zhenghe advertisement and now caroming back into play. The outfielder catches it and throws it back in as if it weren't a home run, but the umpires make it clear that Camporese and Shimoda should circle the bases, scoring two runs.\n\n\tOn Earth, that's probably hit too high to ever be a home run. But you have to adjust for these things, you suppose. You get the next two hitters out on a ground ball and a high pop out to end the inning. Maybe an 18.00 ERA on the Moon is actually above average. Who knows?\n\t*goto endofmoongame\n*elseif atbatresult = \"groundout\"\n\tGiulio hits what looks like a normal ground ball to second base, and maybe a double play. But the ball bounces hard off the turf and almost gets by Lisa Janga at second base. She dives and stops the ball in short right field and has to throw to first, settling for one out. You get the sense that every bounce will be a bad bounce today, so strikeouts will be very valuable.\n\n\tYou don't strike out the next hitter, but you get a high pop out to end a scoreless first inning of work. So far, so good.\n\t*goto endofmoongame\n*elseif atbatresult = \"lineout\"\n\tGiulio hits a line drive that looks like it's going to land in short right field, but it stays up, up, up, and eventually your right fielder has to leap to catch the ball. He makes the catch and throws to the infield, and there are now two outs.\n\n\tYou get the next batter to hit a high pop fly on the infield to get out of the inning. It's an All-Star Game, so you'll probably only get one more inning, so you better make it count.\n\t*goto endofmoongame\n*elseif atbatresult = \"flyout\"\n\tGiulio hits a fly ball up into the air, and the right fielder dances around trying to calibrate where it will land. He has to make one last shift at the last second, reaching up on his toes to make the catch. He throws it back in toward the infield, but throws with too much backspin, and the ball tails up into the air like one of your riseballs. The runner advances to second as the throw floats through the air. Good luck to the official scorer in determining if that's a sacrifice fly or a throwing error.\n\n\tYou get the next hitter to pop out on the infield to end the inning. You'll probably only get one more inning, since this is an All-Star Game and your team has a lot of pitchers to go through, so better make your time on the Moon count.\n\t*goto endofmoongame\n*elseif atbatresult = \"walk\"\n\t*set perfectmoongame false\n\tIt turns out that pitching on the Moon is hard. Giulio takes first base, and there are now two on with one out in the inning. This being an All-Star Game, you're not sure how much time you'll get to really calibrate your pitches, so you better not walk too many more.\n\n\tThankfully, the next two batters ground out and pop out, escaping first inning trouble. As long as these batters decide to swing at everything, you'll do okay.\n\t*goto endofmoongame\n*elseif atbatresult = \"strikeout\"\n\t*set userstrikeouts +1\n\tGiulio swung under your pitch, perhaps not used to the way the Moon gravity has changed the ball's flight path. That's the first ever strikeout recorded on the Moon, and so the catcher throws your ball into the dugout, to be placed in the Hall of Fame one day.\n\n\tYou get the next batter to hit a pop fly in the infield, getting the third out and finishing with a clean inning. You would think the Moon would help the hitters, but that hasn't been the case so far.\n\t*goto endofmoongame\n*gosub getpitchoddsmoon\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Riseball.\n\t\t*set pitchthrown \"riseball\"\n\t\t*gosub pitchresultsmoon\n\t\t*goto moongameatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub pitchresultsmoon\n\t\t*goto moongameatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub pitchresultsmoon\n\t\t*goto moongameatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub pitchresultsmoon\n\t\t*goto moongameatbatloop\n\t*if (knuckleball > 0) #Knuckleball.\n\t\t*set pitchthrown \"knuckleball\"\n\t\t*gosub pitchresultsmoon\n\t\t*goto moongameatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub pitchresultsmoon\n\t\t*goto moongameatbatloop\n*label endofmoongame\n*label moongame2ndatbat\n*page_break The Next Inning\n*set runnersecond true\n*set runnerthird true\n*set outs 1\nYour control fails you again to start the second inning, as you start off with back-to-back walks. The third batter rescues you from your control problems, swinging at three pitches out of the zone, including one that flies over everybody into the backstop, allowing the runners to advance a base.\n\nThe next batter is Jane Podorowsky, a bat-licking weirdo you've had to pitch to once or twice a year. She steps into the left-handed batter's box. Anyone is a power threat on the Moon, and your walks would make this home run really hurt. And who knows if your fielders will be able to catch anything that's put in play anyway? Now would be a great time for a strikeout.\n*gosub_scene 2ndYear situationtext\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 3\n*set batterpower 4\n*set batterhand \"left\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto moongameatbat2loop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto moongameatbat2loop\n\n*label moongameatbat2loop\n*if atbatresult = \"single\"\n\t*set userruns +2\n\t*set perfectmoongame false\n\tIt's a ground ball through the middle, past the diving shortstop, and both runners score. The center fielder is so afraid of throwing the ball over everyone that she literally rolls the ball through the turf toward second base.\n\n\tThe manager comes in to take you out of the game. It's an All-Star Game, so getting to throw more than an inning was a privilege, but it still hurts to leave after giving up runs. So wait, but that means…yes, that was the last pitch you'll ever throw as a professional. A ${pitchthrown}. On the Moon. Huh. You feel a tear or two escape and roll down your face, but you wipe them away and try to focus on the rest of the game. One stage of your life is over, and another begins.\n\t*goto endofmoongame2\n*elseif atbatresult = \"double\"\n\t*set userruns +2\n\t*set perfectmoongame false\n\tIt's a ground ball along the first base line. From your angle it looks just barely foul, but the umpire calls it fair, and that will go for a double, scoring both runs. The right fielder throws the ball as low as he can back into the infield.\n\n\tThe manager comes in to take you out of the game. It's an All-Star Game, so getting to throw more than an inning was a privilege, but it still hurts to leave after giving up runs. So wait, but that means…yes, that was the last pitch you'll ever throw as a professional. A ${pitchthrown}. On the Moon. Huh. You feel a tear or two escape and roll down your face, but you wipe them away and try to focus on the rest of the game. One stage of your life is over, and another begins.\n\t*goto endofmoongame2\n*elseif atbatresult = \"triple\"\n\t*bug\n\t*goto endofmoongame2\n*elseif atbatresult = \"home run\"\n\t*set userruns +3\n\t*set perfectmoongame false\n\tJane takes a small lick of her bat in triumph, then flips the bat demonstratively behind her, getting it tangled in a square of netting behind the on-deck circle. The ball flies up and out of here, deep to center field, and three runs score on the homer.\n\n\tThe manager comes in to take you out of the game. It's an All-Star Game, so getting to throw more than an inning was a privilege, but it still hurts to leave after giving up runs. So wait, but that means…yes, that was the last pitch you'll ever throw as a professional. A ${pitchthrown}. On the Moon. Huh. You feel a tear or two escape and roll down your face, but you wipe them away and try to focus on the rest of the game. One stage of your life is over, and another begins.\n\t*goto endofmoongame2\n*elseif atbatresult = \"groundout\"\n\tIt's a ground ball to the third baseman, and, strangely, the runner from third breaks for home on contact. She's thrown out at the plate, because throws on the infield aren't nearly as hard as perfecting the low, leaping gait you need to run fast on the Moon.\n\n\tThe manager comes out to replace you with one of the million other pitchers that want a chance to throw a few pitches on the Moon in this All-Star Game. It was a privilege for you to go more than an inning, so you don't feel too bad about leaving. That is, until it hits you: That was the last time you'll ever throw a professional pitch. You feel a tear or two escape and roll down your face, but you wipe them away and try to focus on the rest of the game. One stage of your life is over, and another begins.\n\t*goto endofmoongame2\n*elseif atbatresult = \"lineout\"\n\tIt's a low line drive to the center fielder, hanging in the air right at shoulder level for an easy catch. The runner from third is a little caught off guard by how the ball traveled, and finds herself a little off the third base bag, not in position to score on a sacrifice. So nobody advances, and there are now two outs.\n\n\tThe manager comes out to replace you with one of the million other pitchers that want a chance to throw a few pitches on the Moon in this All-Star Game. It was a privilege for you to go more than an inning, so you don't feel too bad about leaving. That is, until it hits you: That was the last time you'll ever throw a professional pitch. You feel a tear or two escape and roll down your face, but you wipe them away and try to focus on the rest of the game. One stage of your life is over, and another begins.\n\t*goto endofmoongame2\n*elseif atbatresult = \"flyout\"\n\tIt's a high fly ball to the center fielder, who camps under it and makes a nice crow hop and throw, trying to throw out the runner from third. The ball lands just past the mound and bounces up a little high, but the catcher pulls it down and tags the runner, who still hasn't figured out how to run without bouncing too high into the air with each step. It's a double play, and the inning is over.\n\n\tThe manager replaces you next inning with one of the million other pitchers that want a chance to throw a few pitches on the Moon in this All-Star Game. It was a privilege for you to go two innings. But then, it hits you: That was the last time you'll ever throw a professional pitch. You feel a tear or two escape and roll down your face, but you wipe them away and try to focus on the rest of the game. One stage of your life is over, and another begins.\n\t*goto endofmoongame2\n*elseif atbatresult = \"walk\"\n\t*set perfectmoongame false\n\tAnother walk loads the bases, but it's not like anyone can really blame you. No one's ever had to throw real pitches on the Moon before. Why should you have any idea how to throw a strike in a completely different gravity?\n\n\tThe manager comes in to take you out of the game. It's an All-Star Game, so getting to throw more than an inning was a privilege, but it still hurts to leave after a walk to load the bases. So wait, but that means…yes, that was the last pitch you'll ever throw as a professional. A ${pitchthrown}. On the Moon. Huh. You feel a tear or two escape and roll down your face, but you wipe them away and try to focus on the rest of the game. One stage of your life is over, and another begins.\n\t*goto endofmoongame2\n*elseif atbatresult = \"strikeout\"\n\t*set userstrikeouts +1\n\tJane watches the pitch go for a called strike three, betrayed by decades of intuition built up around what will and what will not be a strike. Moon strikeouts are fun.\n\n\tThe manager comes out to replace you with one of the million other pitchers that want a chance to throw a few pitches on the Moon in this All-Star Game. It was a privilege for you to go more than an inning, so you don't feel too bad about leaving. That is, until it hits you: That was the last time you'll ever throw a professional pitch. You feel a tear or two escape and roll down your face, but you wipe them away and try to focus on the rest of the game. One stage of your life is over, and another begins.\n\t*goto endofmoongame2\n*gosub getpitchoddsmoon\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Riseball.\n\t\t*set pitchthrown \"riseball\"\n\t\t*gosub pitchresultsmoon\n\t\t*goto moongameatbat2loop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub pitchresultsmoon\n\t\t*goto moongameatbat2loop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub pitchresultsmoon\n\t\t*goto moongameatbat2loop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub pitchresultsmoon\n\t\t*goto moongameatbat2loop\n\t*if (knuckleball > 0) #Knuckleball.\n\t\t*set pitchthrown \"knuckleball\"\n\t\t*gosub pitchresultsmoon\n\t\t*goto moongameatbat2loop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub pitchresultsmoon\n\t\t*goto moongameatbat2loop\n*label endofmoongame2\n*if perfectmoongame\n\t*achieve riseballexpert\n*label baseballlegacy\n*page_break\n*if userruns = 0\n\t*achieve perfecto\n*if junkballerinprogress\n\t*achieve junkballer\n*if ((year5team = \"SAB\") and (year7team = \"SAB\"))\n\t*achieve bullforlife\n*if championships = 3\n\tIt's a little ostentatious, sure, but it just feels good to wear three championship rings at once. Not many players get to do that nowadays, and it's a reminder that nobody can say you didn't help your teams win. \"Scoreboard,\" you imagine saying, and showing off all three rings. If your arm didn't feel like a nest of fire ants, you probably could have helped them win a few more.\n\t*goto userstrikeoutsending\n*elseif championships = 2\n\tLots of players never get to win one ring, but you won two. On bad days, you can look at those rings and know you're a ${nextteam} icon. And if you ever face a really bad day, hey, there are a lot of diamonds in these bad boys. You could sell one of these in an emergency and still have a ring to spare. You had a blessed career, and thanks to the rings, you'll never forget that.\n\t*goto userstrikeoutsending\n*elseif championships = 1\n\tYou twirl your championship ring around in your fingers, counting the diamonds and reading the inscriptions. It takes skill, and it takes savvy, and, if you're being honest, it takes luck to get one of these things, and you did it. You'll always be remembered in your ${nextteam} uniform, celebrating on the field after a championship win. Nobody can take that away from you, not even on your hardest day.\n\t*goto userstrikeoutsending\n*elseif championships = 0\n\tIf you have one regret from your career, it's that you never got to win a championship. Many years you played for a team that wasn't a championship contender, and the arm cut your career a little short, so it's not your fault but it still hurts your pride just a little. Still, you played very well, and not everyone gets to enjoy the highest accomplishment in the sport.\n\t*goto userstrikeoutsending\n*else\n\t*bug\n\n*label userstrikeoutsending\n\n*if userstrikeouts >= 6\n\tYou definitely had a reputation as a dominant pitcher, one who you could count on for big strikeout numbers year after year. Your teammates playing the field behind you would get bored sometimes, just standing out there and knowing they barely had to pay attention. The hitters could barely put the ball in play sometimes. When they're that helpless against your stuff, pitching is fun.\n\t*goto userrunsending\n*else\n\tYou weren't a big strikeout machine, but you got the hitters out anyway with grit and guile. After all, it's more efficient if you can get everybody to hit a soft groundout every time up, and throw fewer pitches than trying to chase the strikeout. As long as you get the same results, that's the best way to pitch.\n\t*goto userrunsending\n\n*label userrunsending\n\n*if userruns \u003c= 8\n\tYou can sit back in retirement and relax, knowing you've likely earned your way into the Hall of Fame. You didn't have the longest career, but you had a long peak as the best pitcher in the game. And you had a magical ability to never give up runs in the close, important moments of the biggest games. Statistical analysts claim it was just luck, but the other fans know you had something else inside you. You had the ability to play up to the moment, and that's a valuable skill.\n\t*goto mentorending\n*else\n\tYou can sit back in retirement and know that you were considered one of the best pitchers in the game. You didn't win all the awards and dominate every game, but you made the most of your abilities. When you reach the highest level of your sport, you can't ask for more than that.\n\t*goto mentorending\n\n*label mentorending\n*page_break After Retirement\n*if career = \"guinea pig\"\n\t*if velocity >= 65\n\t\t*set wealth %+20\n\t\tAfter you show off your new, vastly improved fastball on the big stage, every pitcher wants to know how you suddenly threw harder than ever before. When you mention Prakash and his computer system, he suddenly has so many pitchers asking to get the same help you did that he's swamped. He starts to charge huge amounts of money just to limit the number of potential clients, and he sends you a large portion of the proceeds for helping promote this new business of his.\n\n\t\tPart of you worries that maximizing an arm like this might have injury ramifications down the road, especially for younger pitchers, but for now you get to enjoy your role as a trend-setter. You were willing to risk everything to start a new era of pitching, and it worked. And you're enjoying the financial benefits.\n\t\t*goto relationshipending\n\t*elseif curveball >= 65\n\t\t*set wealth %+20\n\t\tAfter you show off your new curveball on the big stage, every pitcher wants to know how you suddenly developed such a vital breaking ball. When you mention Prakash and his computer system, he suddenly has so many pitchers asking to get the same help you did that he's swamped. He starts to charge huge amounts of money just to limit the number of potential clients, and he sends you a large portion of the proceeds for helping promote this new business of his.\n\n\t\tPart of you worries that maximizing an arm like this might have injury ramifications down the road, especially for younger pitchers, but for now you get to enjoy your role as a trend-setter. You were willing to risk everything to start a new era of pitching, and it worked. And you're enjoying the financial benefits.\n\t\t*goto relationshipending\n\t*elseif slider >= 65\n\t\t*set wealth %+20\n\t\tAfter you show off your new slider on the big stage, every pitcher wants to know how you suddenly developed such a vital breaking ball. When you mention Prakash and his computer system, he suddenly has so many pitchers asking to get the same help you did that he's swamped. He starts to charge huge amounts of money just to limit the number of potential clients, and he sends you a large portion of the proceeds for helping promote this new business of his.\n\n\t\tPart of you worries that maximizing an arm like this might have injury ramifications down the road, especially for younger pitchers, but for now you get to enjoy your role as a trend-setter. You were willing to risk everything to start a new era of pitching, and it worked. And you're enjoying the financial benefits.\n\t\t*goto relationshipending\n\t*elseif knuckleball >= 65\n\t\t*set wealth %+20\n\t\tAfter you show off your new \"knuckleball\" on the big stage, every pitcher wants to know how this magic pitch works and where you learned it. When you mention Prakash and his computer system, he suddenly has so many pitchers asking to get the same help you did that he's swamped. He starts to charge huge amounts of money just to limit the number of potential clients, and he sends you a large portion of the proceeds for helping promote this new business of his.\n\n\t\tPart of you worries that throwing such a strange pitch might have injury ramifications down the road, especially for younger pitchers, but for now you get to enjoy your role as a trend-setter. You were willing to risk everything to start a new era of pitching, and it worked. And you're enjoying the financial benefits.\n\t\t*goto relationshipending\n\t*else\n\t\tYou improved in your last season, but not enough for many people to notice. You try to tell people about Prakash's computer system, but most pitchers you talk to don't trust a computer to tell them how to pitch. It's so risky to change anything about the way you work and risk losing your whole career. You weren't enough of an advertisement to make Prakash's work seem as important as you think it could be.\n\t\t*goto relationshipending\n*elseif career = \"broadcaster\"\n\t*if ((eloquent >= 40) and (eloquent \u003c= 60))\n\t\tThe NSN producers like your style and decide to hire you as a national color commentator. You work on Sunday nights, covering the biggest game each week and providing your insights on the big stage.\n\n\t\t*if ((analytical >= 45) and (analytical \u003c= 55))\n\t\t\t*set wealth %+25\n\t\t\tSports fans love to complain about national commentators, but they can't find anything to fault with your style. You blend perspectives well in a way that pleases the stat-heads and the old-school baseball fans alike. Before long, NSN is bringing you on for their panel shows, throwing money at you to be on screen as much as possible whenever baseball is discussed. You've found a natural home in broadcasting, and this whole second career thing couldn't have gone much better.\n\t\t\t*goto relationshipending\n\t\t*elseif analytical > 55\n\t\t\t*set wealth %+10\n\t\t\tYou make a good living as a broadcaster, but a certain section of viewers never warms up to you. You're too into the latest stats, and you love to spit out acronyms they don't understand. When you got into xBABIP on one broadcast, the network actually stepped in and let you know to scale the stats back a little bit. But you can't change who you really are, and the network doesn't want you to. You're playing the role of the stat-head athlete, and there's nothing wrong with that.\n\t\t\t*goto relationshipending\n\t\t*else\n\t\t\t*set wealth %+10\n\t\t\tYou make a good living as a broadcaster, but a certain section of viewers never warms up to you. Constant tweets make fun of your apparently backwards, old-fashioned view of the game, and they don't like how often you talk about things like \"instinctual ballplayers\" and \"momentum\" and \"clutch hitters,\" things that sound totally normal to you or anyone who's ever played the sport. To them, that's all nonsense, and numbers are the only real thing. The network doesn't care that you irritate a few people, but it still makes your online existence annoying, as every time you look up your name thirty more people are calling for you to get fired just because you don't use the stats they like. Oh well.\n\t\t\t*goto relationshipending\n\t*else\n\t\tYou cover a few more games here and there for NSN, sometimes as a third commentator, or sometimes on a special streaming-only event. But your style never coalesces in a way they'd like, and they decide not to hire you for a regular gig. You continue to refine your speaking voice and analysis style, but you'll have to find somebody besides NSN to work for someday.\n\t\t*goto relationshipending\n*elseif career = \"memoir\"\n\tAfter retirement, you put together a memoir and get it published.\n\t*if fame >= 60\n\t\t*set wealth %+20\n\t\tThe publisher gets behind your book, advertising it all over because they know you're famous enough to justify it. The book sells well at release, and when it even turns out to be pretty well-written and word of mouth is good, the book gets a paperback printing soon after. You're a success, though now you have to figure out what to write about next. Is it possible to write a sequel to a memoir?\n\t\t*goto relationshipending\n\t*else\n\t\t*set wealth %+10\n\t\tUnfortunately, baseball players in general aren't that famous anymore, and you were no exception. The book is written well and it sells okay, but the publisher has low expectations and doesn't advertise it as much as you might like. Plus you now run into a new problem: How do you write a sequel to a memoir? What do you do now? The post-baseball world can be cruel sometimes.\n\t\t*goto relationshipending\n*elseif career = \"tell-all\"\n\tWithin a year after retirement, you publish your tell-all book about the inside world of baseball, and fill it with every story you have from your playing days.\n\t*if anecdotes >= 4\n\t\t*set wealth %+20\n\t\tIt's not 1970 anymore, so nobody's shocked to read that baseball players sometimes take drugs or tell dirty jokes, but your personal stories shine through and make the book a must-read for baseball fans. The book sells well enough for you to get an advance from the publishing company to write another book in the future. The question is, now that you've told the entire story of your career in baseball and funny stories about your teammates, what can you write about now? Maybe you can write a tell-all about the dirty underground of the publishing industry. Just as soon as you discover any evidence of there being a dirty underground of the publishing industry.\n\t\t*goto relationshipending\n\t*else\n\t\tUnfortunately, it's not 1970 anymore, and nobody is shocked to read that baseball players drink and tell dirty jokes and occasionally have compulsive disorders. With a few more great personal stories it could have done well, but it turns out that your story isn't worth what you thought it was. The book under-sells projections, and you end up with boxes full of copies of the book sitting in your basement.\n\t\t*goto relationshipending\n*elseif career = \"fitness\"\n\t*if (((fitness >= 60) and (analytical >= 55)) and (fame >= 55))\n\t\t*set wealth %+25\n\t\tThe Cheng and ${surname} fitness empire takes over the world. Your fame, analytical savvy, and fitness marketability combine to turn Julie Cheng's already well-established workout video business into an all-consuming success bonfire. It's constant hard work, especially because you've transcended the fitness industry to become general celebrities who go on a crowded talk show circuit every year, but the financial rewards are immense.\n\t\t*goto relationshipending\n\t*else\n\t\t*set wealth %+15\n\t\tJulie Cheng calls you every morning with a detailed work schedule, and so you don't get much rest time during your \"retirement,\" but you're glad to be along for the ride that she and her producer Charles take you on. You're busy but the money is pretty good, and you don't have to worry about falling out of shape. There's just a little nagging idea in the back of your head that if you had applied yourself to the task just a little harder, you could have conquered the fitness world.\n\t\t*goto relationshipending\n*elseif career = \"distributive justice\"\n\t*if justiceserved\n\t\tThe season after your retirement, the ${nextteam} finally decide to pay their minor leaguers a living wage. Now as long as it doesn't bankrupt them, or lead to significantly lower major league salaries, or lead to lazy and entitled minor leaguers, this could catch on. In the meantime, you continue to work with Rasheed Taylor in his law office, gathering information on other crusades to take on and causes to trumpet.\n\t\t*goto relationshipending\n\t*else\n\t\tAs of the year after your retirement, no team has decided to pay their minor leaguers a living wage, but it hasn't been long since you got the idea out there in the first place. In the meantime, you continue to work in Rasheed Taylor's law office, crusading for minor leaguers and looking around for other causes to trumpet.\n\t\t*goto relationshipending\n*elseif career = \"actor\"\n\t*if ((serious \u003c= 45) and (fitness >= 55))\n\t\t*set wealth %+25\n\t\tAfter your first couple roles, Hollywood decides you have what it takes. You get to be the star of a mid-size film about a marathon runner who works for the French Resistance during World War II. After that film turns a good profit, the floodgates open: You're sent scripts for a series of blockbuster action films, and get to choose which to accept and which to turn down. Should you play the astronaut who finds zombies living on the dark side of the Moon (the first film ever shot on location on the Moon). Or maybe you should play the role of Failsafe, the cult favorite supervillain who robs banks by throwing small bombs at ${hisher} enemies. The roles keep piling in, and so does the money.\n\t\t*goto relationshipending\n\t*else\n\t\t*set wealth %+15\n\t\tWilson Virdon sends you scripts to read every few weeks, and you get plenty of roles. It's a little irritating that most of the roles have you play yourself, or a baseball player, or some tiny role where the whole point is basically \"hey, look, ${givenname} ${surname} is in this thing!\" but that's fine. You make a decent living, and it's not a hard job. It's not like you have many lines to memorize for the role of \"athlete fleeing dinosaur #2.\"\n\t\t*goto relationshipending\n*elseif career = \"endorser\"\n\t*if eloquent \u003c= 40\n\t\t*set wealth %+25\n\t\tYou're a wildly successful endorser, and Wilson Virdon fields calls every day asking to give you money to say their product is good. Or actually, nowadays, you don't even have to say anything. They'll pay you just to take a picture of yourself and put it on Instagram with their product label visible somewhere in the shot. It's not exactly fulfilling work, but what is? You have more money coming in than you can even think to spend, and hey, some of these free products aren't terrible either.\n\t\t*goto relationshipending\n\t*else\n\t\t*set wealth %+10\n\t\tAfter just over a year on the job, you can't live the product endorsement lifestyle anymore. You've copied too many mindless Instagram hashtags and had to watch yourself say dumb lines on TV ads too many times. You wish you could stomach the work, but you can't, so you'll have to find yet another way to live your life in the near future. For now, though, it's time to rest and enjoy this thing they call \"retirement.\"\n\t\t*goto relationshipending\n*elseif career = \"pre-game\"\n\tYou make a living doing pregame work for NSN, and it's a blast. The more you argue, the more the producers love it, and arguing can be fun when nobody's feelings get hurt.\n\t*if analytical \u003c= 40\n\t\t*set wealth %+25\n\t\tEvery day, you come into work and talk about the important stuff in baseball: Hard work, grit, clutch hitting, and playing the game the right way. After a long argument one day about the value of the sacrifice bunt, you start selling \"I Heart Bunts\" T-shirts, and baseball fans constantly come up to you and show you they're wearing your shirt. It's a fun job, and you fit so neatly into one side of every argument that the producers put you in front of the camera constantly. All you have to do is be yourself on camera, and you're rewarded handsomely.\n\t\t*goto relationshipending\n\t*elseif analytical >= 60\n\t\t*set wealth %+25\n\t\tEvery day, you come in to work and tell your coworkers that they're ignorant simpletons, playing up your book-smarts personality to the point of being obnoxious for the camera. You always end up with the best prediction record on the staff, even while you say \"Definitive predictions are for idiots. We can calculate the exact probabilities, so why not go with that?\" It's a fun job, and you play the role of stat snob so well that the producers put you in front of the camera whenever they can, and pay you handsomely.\n\t\t*goto relationshipending\n\t*else\n\t\t*set wealth %+15\n\t\tYou are a little too middle-of-the-road for the producers' taste, though. You tend to have a balanced opinion, sometimes falling on the side that thinks stats are the lifeblood of the game, and sometimes talking about the importance of grit and the right attitude in building a winning ballplayer. They would rather you fall into one bucket or another, so you can tell they give you a little less work than some of the other pregame guys. But who wants more work? You've got a comfortable living and a fun job, and you get to be yourself.\n\t\t*goto relationshipending\n*else\n\t*bug\n\n*label relationshipending\n\n*if partner = \"Cruz\"\n\tInés Cruz moves in with you after your retirement, but continues to be an on-field reporter and article writer for NSN, and write the occasional book as well.\n\n\tMost notably, the year after your retirement, Cruz writes a tell-all book called [i]Confessions of a Baseball WAG[/i] which draws from her brief experience watching games in the family section during yoru relationship. She made sure to talk to all the ballplayer wives, husbands, girlfriends, and boyfriends, and now, whether they like it or not, their stories have made the book into a best-seller.\n\t*goto theend\n*elseif partner = \"Taylor\"\n\tYour partner, Rasheed Taylor, happy with his progress in the world of baseball labor relations, has moved on to the issue of student loan debt. He's simultaneously campaigning for a wide range of fixes to the problem, including student loan forgiveness programs, new regulations on for-profit colleges, and even free college tuition. It's a big change away from sports labor relations, but in a way it's a similar cause: He's still fighting for young poor people who haven't found their footing in a real career yet.\n\t*goto theend\n*elseif partner = \"Cheng\"\n\tJulie Cheng moved in with you after your retirement, but she's still always within arm's reach of her producer, Charles (you still don't know what his last name is, and at this point it would be too embarrassing to ask). You'd rather not have Charles in your house all the time, but he clearly knows what he's doing with Julie's workout video business, and her success only grew after your relationship went public.\n\t*goto theend\n*elseif partner = \"Bhavsar\"\n\tPrakash Bhavsar has turned down a number of employment opportunities in Silicon Valley to continue his work with the ${nextteam} as a data analyst and \"computer-aided scout,\" which is the term he prefers. This allows him to bounce between your place and his, staying the night occasionally as your relationship continues to grow.\n\n\tHe's recently started on a new ambitious long-term project: Manufacturing a robot arm that can perfectly replicate any pitcher's motion and grip, with a few added pistons to replicate the force of the lower body as well. This would give a better sense of where the arm might come under stress after repeated pitches, and it would give batters a more realistic game-speed form of batting practice without wearing out a real human arm. He claims there are lots of issues to work out before it will be possible, but he's dedicated to the work.\n\t*goto theend\n*elseif partner = \"Virdon\"\n\tAfter you retire, Wilson Virdon moves in with you. Virdon continues to be an intersection point between Hollywood, the New York advertising industry, and the major leagues. But he's also scaled back his work schedule significantly since your relationship started, finally finding another reason to exist outside of making deals.\n\t*goto theend\n*elseif partner = \"Rosario\"\n\tWhen you retire, Rosario decides to do the same, and you get to tackle your post-baseball lives together. After a few months of sitting around the house and resting his aching knees, Rosario gets a job as a Low-A minor league hitting instructor. He doesn't have to travel with the team, so he gets to stay at home with you and indulge his lifelong passion for stay-at-home dance parties.\n\t*goto theend\n*elseif partner = \"Mendis\"\n\tMendis retires at the same time you do, shocking the baseball world. She gets a few offers from cricket teams to go back to her original sport, but she declines.\n\n\tShe escapes the non-stop competition of sports by getting into painting, which is, at first, a calming experience for her. But after about a year of painting, when her work starts to get more recognition, she starts to meet other local artists and develop deep grudges with them. She wants to be recognized as the best artist, the wealthiest and the most respected by critics. Her painting style evolves quickly from delicate landscapes to abstract, visceral, energetic pieces done in dark reds, yellows, and blacks.\n\n\tOne day, she sees one of her first paintings side-by-side with one of her latest ones, and realizes that she's gotten too competitive all over again. She decides to ditch painting and move onto knitting, which still lets her use her hands, and she can sell what she makes online. You just have to hope she never discovers the very real and very dangerous world of competitive knitting.\n\t*goto theend\n*elseif partner = \"Roberts\"\n\tPortia moved in with you after the season, though she's still got a few more years left in her baseball career and spends a lot of time playing road games. Living together has been interesting, because now instead of getting the polished, final version of Portia's \"brilliant ideas,\" you get to hear all the rough drafts.\n\n\tFor instance, she proposed putting a small fan in your sleeve or under your hat to push the ball forward and throw harder. Not a good idea. Then she thought of hiring a pilot to fly just behind the batter's eye over center field, preferably carrying a banner that says \"Barons suck!\" or some similar message. Then she asked why team owners don't install handles at the top of the outfield walls to help players climb them and make spectacular catches, which, you know, doesn't sound like a horrible idea.\n\t*goto theend\n*elseif partner = \"Connor\"\n\tA few months after your retirement, you visit Australia with Connor Harris to meet his parents and put a clinic or two for the Australian Baseball League. The sun is unbearable in the December summer, but it's a bright and happy place that's only a little bit overrun with scorpions.\n\n\tWhen the Bulls decide not to offer Connor a new contract just before the next season, he says the hell with it and retires alongside you. When you get time off of your side gig, the two of you spend your time traveling the world, seeing all the places that a career in baseball won't take you. Though in a way, none of them can beat the Moon, can they?\n\t*goto theend\n*elseif partner = \"Camporese\"\n\tGiulio decides to call it a career at the same time you do. The Florida Capers aren't happy at all about losing their best pitcher and their best position player, but oh well. Every day that your arm pain gets less pronounced, the better you feel about retirement.\n\n\tGiulio gets hired by NSN right after retirement to do a sports-themed prank show, but the ratings are apocalyptically low, and the show is canceled after just half a season. So while he's sort of adrift and looking around for his next career, the two of you decide to take a trip to his hometown just outside of Milan in Italy.\n\n\tWhile the food ends up being a little different from what you expect (\"Where are the tomatoes? Why is there no olive oil?\" you ask him at one point during the trip, and he just laughs as he spoons more polenta and risotto into his mouth), his family is incredibly kind and generous. And also, it turns out, rich. With no help at all from Camporese's major league salary, his family owns a house near Lago di Como, and let you and Giulio stay there for a week. This is a lifestyle you could get used to.\n\t*goto theend\n*elseif partner = \"Janga\"\n\tLisa Janga continues her career as a high-average, stellar-defense second baseman for the New York Barons. Suddenly you're the partner sitting in the family section, talking with the other wives, girlfriends, husbands, and boyfriends of the athletes. As part of this unique social circle, life becomes a constant stream of places to be, starting with baseball games and extending out into weddings, baby showers, and a wide variety of low-key adult parties.\n\n\tThe constant pain in your arm is finally starting to go away, so you're glad to be retired. But it's very strange to play the role of spectator to your girlfriend's life. She continues to play baseball and excel, and now you're the significant other in the crowd, occasionally appearing on camera, and working on your side gig. By the time you're used to this lifestyle, Lisa will probably retire and you'll have to adjust again to actual co-habitation. Baseball does weird things to relationships.\n\t*goto theend\n*elseif partner = \"none\"\n\tYou didn't find a partner within baseball, but your life isn't about baseball anymore. You've boldly entered the next phase of your life, and there was no reason to drag an old friend from baseball with you. You'll find success and love outside of the game, in another story, in your new life.\n\t*goto theend\n*else\n\t*bug\n\n*label theend\n*page_break A Few Years Later\n*if wealth >= 70\n\tYour transition away from baseball has gone flawlessly, and you have what they call \"generational wealth,\" enough to support great-grandchildren if you're so inclined. At some point, it felt parsimonious [i]not[/i] to own a private island, so you bought one.\n\n\tIn the evenings, when you're out standing on your beach, feeling your sand, hearing your waves, smelling your own coastal breeze, you look out at the setting sun and wonder if it's possible to buy a chunk of that big thing. You're sure you could afford it.\n\n\tSometimes, when the arm is feeling all right, you pick up a shell and chuck it into the ocean. You can hear that whisper, that hiss, that fizz as the shell displaces the air around it then plunks into the ocean. You can hear the air gossip about that arm.\n\t*goto wealthchecked\n*elseif ((wealth \u003c 70) and (wealth >= 60))\n\tYou've lived comfortably coming out of baseball, with enough wealth to never really [i]have[/i] to work again. You own a nice beach house you like to go to, and you wave to your neighbors on one side, who were lucky enough to work at Facebook before the IPO, and your neighbors on the other side, who openly tell you that their money comes from a scam where they charge hospitals for bogus lab tests. You meet all kinds out here.\n\n\tYou like to wade in to knee level and listen to the ocean. Doesn't it sound just like those playoff crowds? Sometimes, when the arm is feeling all right, you pick up a shell and chuck it into the ocean. You can hear that whisper, that hiss, that fizz as the shell displaces the air around it then plunks into the ocean. You can hear the air gossip about that arm.\n\t*goto wealthchecked\n*else\n\tYou've been a little lost since your baseball career ended. You're just another person, living paycheck to paycheck and thinking back on your unusual backstory. The savings from your baseball days are all gone, but that's all right. You'll float ashore somewhere.\n\n\tWhen you need a moment away from the everyday, you like to rent this little beach house and go down to the water. You wade in to knee level and listen to the ocean. Doesn't it sound just like those playoff crowds? Sometimes, when the arm is feeling all right, you pick up a shell and chuck it into the ocean. You can hear that whisper, that hiss, that fizz as the shell displaces the air around it then plunks into the ocean. You can hear the air gossip about that arm.\n\t*goto wealthchecked\n*label wealthchecked\n*page_break End\nWe hope you've enjoyed playing [i]The Fielder's Choice.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n\n\n\n\n*comment Below this point is a slightly modified pitching system for the moon game. I've replaced the fastball with a \"riseball\" because fastball backspin now makes the ball rise significantly. You can't really just throw a straight full-speed pitch, according to what I've read, anyway. Most of the other pitches are more likely to be balls as well, and breaking balls are more likely to be hit because they have less movement on the moon (due to lower gravity).\n*label getpitchoddsmoon\n*set riseballballodds 38 - (control / 10)\n*set riseballinplayodds 21 - ((velocity / 10) - ((riseballsthrown * 3) + batterability))\n*set riseballstrikeodds 100 - (riseballballodds + riseballinplayodds)\n*set wasteinplayodds 10 - ((control / 10) - batterability)\n*set wastestrikeodds 0 + (velocity / 10)\n*set wasteballodds 100 - (wastestrikeodds + wasteinplayodds)\n*set curveballballodds 50 - ((control / 20) + (curveball / 20))\n*set curveballinplayodds 27 - (((curveball / 15) + (velocity / 25)) - ((curveballsthrown * 3) + batterability))\n*set curveballstrikeodds 100 - (curveballballodds + curveballinplayodds)\n*set sliderballodds 46 - ((control / 20) + (slider / 20))\n*set sliderinplayodds 25 - (((slider / 15) + (velocity / 25)) - ((slidersthrown * 3) + batterability))\n*set sliderstrikeodds 100 - (sliderballodds + sliderinplayodds)\n*set changeupballodds 45 - ((control / 20) + (changeup / 20))\n*set changeupinplayodds 18 - (((changeup / 15) + (velocity / 25)) - ((changeupsthrown * 3) + batterability))\n*set changeupstrikeodds 100 - (changeupballodds + changeupinplayodds)\n*set knucklerballodds 50 - ((control / 20) + (knuckleball / 20))\n*set knucklerinplayodds 19 - ((knuckleball / 10) - batterability)\n*set knucklerstrikeodds 100 - (knucklerballodds + knucklerinplayodds)\nRiseball: ${round(riseballstrikeodds)}% Strike, ${round(riseballballodds)}% Ball, ${round(riseballinplayodds)}% In Play\n*if (curveball > 0)\n\t*line_break\n\tCurveball: ${round(curveballstrikeodds)}% Strike, ${round(curveballballodds)}% Ball, ${round(curveballinplayodds)}% In Play\n*if (slider > 0)\n\t*line_break\n\tSlider: ${round(sliderstrikeodds)}% Strike, ${round(sliderballodds)}% Ball, ${round(sliderinplayodds)}% In Play\n*if (changeup > 0)\n\t*line_break\n\tChangeup: ${round(changeupstrikeodds)}% Strike, ${round(changeupballodds)}% Ball, ${round(changeupinplayodds)}% In Play\n*if (knuckleball > 0)\n\t*line_break\n\tKnuckleball: ${round(knucklerstrikeodds)}% Strike, ${round(knucklerballodds)}% Ball, ${round(knucklerinplayodds)}% In Play\n*line_break\nWaste Pitch: ${round(wastestrikeodds)}% Strike, ${round(wasteballodds)}% Ball, ${round(wasteinplayodds)}% In Play\n*return\n\n*label pitchresultsmoon\n*if pitchthrown = \"fastball\"\n\t*set fastballsthrown + 1\n\tYou throw a fastball.\n\t*if dieroll \u003c= fastballballodds\n\t\t*set balls + 1\n\t\tIt lands out of the zone for a ball.\n\t\t*if balls = 4\n\t\t\tThat's a walk.\n\t\t\t*set atbatresult \"walk\"\n\t\t\t*return\n\t\tThe count is now ${balls} - ${strikes}.\n\n\t\t*return\n\t*elseif (dieroll > fastballballodds) and (dieroll \u003c= (fastballballodds + fastballinplayodds))\n\t\tThe batter makes contact and puts the ball in t driven athletes on the planet. Do you have the massive dedication to succeed in the big leagues, or will you resort to a little bit of cheating? Will you be baseball’s biggest stat geek or the master of hustle and grit? Will you develop an on-field persona that terrifies hitters or a cuddly exterior that lulls them to sleep? Will you go down in history as a Hall of Fame ace or a live arm that fizzled on the big stage? When your lifelong baseball dreams come true, someone else may have to lose everything they’ve ever worked toward.\n\n• Play as male, female, or non-binary; gay or straight[n/]\n• Play as left- or right-handed[n/]\n• Choose your pitching style and develop the perfect repertoire to rack up strikeouts[n/]\n• Perfect a fastball, slider, or curveball [n/]\n• Find friends, foes, or potential lifelong partners among your teammates[n/]\n• Pitch in the United States, Japan, or unlock the opportunity to explore a new frontier for baseball[n/]\n• Use statistical analysis to perfect your game, or #RiseAndGrind to out-hustle your opponents[n/]\n• Discover the quirky secret behind baseball’s most successful agent\n\nWhat pitch will you throw when the game is on the line? In that moment, it's the Fielder's Choice.\n\n", "choicescript_stats": "*temp fullname \"${givenname} ${surname}\"\n*temp baseera ((earnedruns / (totalouts / 3)) * 9)\n*temp baseeradecimals ((baseera modulo 1) * 100)\n*temp erawholenumber (baseera - (baseera modulo 1))\n*temp erafirstdecimal ((baseeradecimals / 10) - ((baseeradecimals modulo 10) / 10))\n*temp eraseconddecimal ((baseeradecimals - (erafirstdecimal * 10)) - (baseeradecimals modulo 1))\n*temp disperawholenumber (round(erawholenumber))\n*temp disperafirstdecimal (round(erafirstdecimal))\n*temp disperaseconddecimal (round(eraseconddecimal))\n*temp currentyearstats \"${wins} - ${losses} | ${disperawholenumber}.${disperafirstdecimal}${disperaseconddecimal} | ${strikeouts}\"\n*temp year1stats \"${year1team} | ${year1wins} - ${year1losses} options have her licking the bat after a fly ball/run.\nYear 2, line 379: Shouldn't the shortstop be throwing the ball to second to get the lead runner out, then the second baseman throws towards first?\nYear 2, line 594: \"If you stick your neck out, somebody might chop it off, you know?\" Mixed metaphor. Stick your HEAD out?\nYear 3, line 94: \"She swipes loudly on her tablet a few times,\" can one swipe loudly? Maybe \"noticeably\"?\nYear 3, line 622: I think Transcendental Meditation might be trademarked? https://en.wikipedia.org/wiki/Transcendental_Meditation It might be better to make it more generic, like \"I stumbled onto a unique meditation practice.\"\nYear 4, line 33: I struck \"competing\" from Anna Dukas's receptionist's spiel. From my experience working for a law firm, it's not unusual to refer clients to other firms when you're very busy, especially if another firm would make a better fit for the client. Maybe other fields are more competitive, and it makes sense that a pro athlete would find a lack of competitiveness strange. But I don't think a firm that refers out would make a big deal about it.\nYear 6, line 696: I changed \"online picture ad\" to \"online ad.\" It just sounded more natural to me, and I believe \"picture\" is implied well enough.\nYear 8, line 136: \"Strip off my shirt right before my teammates soak me, letting the world appreciate my glistening abs.\" This might be a little weird with a female PC, but I think a sports bra is implied well enough.\nYear 8, line 1322: \"After a couple first roles,\" do you mean \"After your first couple roles,\"?\nYear 8, multiple lines: \"pregame\" not \"pre-game\" according to my style guide. I think I caught them all in the copy, but I left \"pre-game\" in the coded sections to avoid any code errors.\n\n\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set lefty true\n*set givenname \"Oscar\"\n*set surname \"Angeles\"\n*set velocity 62\n*set control 45\n*set slider 0\n*set curveball 50\n*set changeup 57\n*set platoonsplit 50\n*set fitness 54\n*set serious 41\n*set intimidating 46\n*set rebellious 38\n*set analytical 65\n*set eloquent 43\n*set public_rep 44\n*set clubhouse_rep 67\n*set wealth 45\n*set fame 40\n*set anecdotes 3\nThe whole story of the season comes down to October 1st, a game against the New York Barons. It's without a doubt the biggest game of your career. Time crawls and nerves jangle for the twenty-four hours before your start, but suddenly you find yourself walking around a mound in New York City, then stomping your cleats clean as you catch a glimpse of the George Washington Bridge just over the center field scoreboard.\n\nYou look up at that scoreboard and your heart drops. There's just one out left to get, and your team is up 1-0. You've been in high-pressure situations before, but nothing like this. What do you throw?\n\nFastball Odds: 56% Strike, 26% Ball, 18% In Play\n*line_break\nCurveball Odds: 50% Strike, 45% Ball, 5% In Play\n*line_break\nChangeup Odds: 55% Strike, 37% Ball, 8% In Play\n*line_break\nWaste Pitch Odds: 7% Strike, 93% Ball, 0% In Play\n*fake_choice\n\t#Fastball.\n\t#Curveball.\n\t#Changeup.\n\t#Waste Pitch.\n\n*script changeBackgroundColor(\"black\")\n*set lefty false\n*set givenname \"Sam\"\n*set surname \"Witten\"\n*set velocity 45\n*set control 57\n*set slider 56\n*set curveball 0\n*set changeup 0\n*set platoonsplit 20\n*set fitness 45\n*set serious 61\n*set intimidating 55\n*set rebellious 54\n*set analytical 41\n*set eloquent 45\n*set public_rep 61\n*set clubhouse_rep 55\n*set wealth 20\n*set fame 50\n*set anecdotes 1\n\"Here's a question I try to ask every rookie after their first game,\" says Inés Cruz, a writer for [i]The South Texas Journal[/i]. \"What is your main goal for your career in the majors? What one thing do you want to accomplish no matter what? Think big with this one.\"\n\nWhat do you say?\n*fake_choice\n\t#I want to help the Bulls win a world championship.\n\t#I want to learn all I can and discover the secret of pitching.\n\t#I want to express my personal style on the world stage.\n\t#I want to make the league fear my name.\n\n*script changeBackgroundColor(\"sepia\")\n*set lefty true\n*set givenname \"Michelle\"\n*set surname \"Madritsch\"\n*set velocity 56\n*set control 41\n*set slider 55\n*set curveball 55\n*set changeup 0\n*set platoonsplit 20\n*set fitness 65\n*set serious 38\n*set intimidating 57\n*set rebellious 62\n*set analytical 40\n*set eloquent 62\n*set public_rep 66\n*set clubhouse_rep 55\n*set wealth 55\n*set fame 20\n*set anecdotes 4\n\"I'm sure this has been a rough day for you, ${givenname},\" the reporter says. \"Your best friend on the team was just suspended for failing a drug test. Anything you can tell us from the closed-door meeting you just had?\"\n\nYou bristle a little at \"closed-door meeting,\" the kind of phrase writers use that doesn't mean anything but sounds scandalous. You have to think carefully before you speak. What do you do?\n*fake_choice\n\t#I'm the most famous player on the team, so I'm expected to say something. I'll defend my teammates.\n\t#I have a good reputation with the fans, so I'll address their concerns through this reporter.\n\t#The other players trust me, so I can speak frankly about the scandal without being seen as a traitor.\n\t#I'm not saying anything yet, not without knowing more about what happened.\n\n*set lefty true\n*set givenname \"Skyler\"\n*set surname \"Hibbert\"\n*set velocity 65\n*set control 54\n*set slider 50\n*set curveball 0\n*set changeup 56\n*set platoonsplit 50\n*set fitness 45\n*set serious 55\n*set intimidating 36\n*set rebellious 56\n*set analytical 60\n*set eloquent 40\n*set public_rep 45\n*set clubhouse_rep 55\n*set wealth 30\n*set fame 20\n*set anecdotes 1\nThe pitching coach gives her speech in Japanese, unsure whether to look at you or your interpreter or somewhere off in the distance between the two of you. When she stops, your translator looks nervous. \"What's wrong?\" you ask him.\n\n\"She wants you to throw a 'sutoreto.' Pretty sure it's the English word 'straight' she's saying, but I don't know what that means in a baseball context.\"\n\nWhat would it mean to throw a straight? If only your interpreter were a baseball fan. You have to find out what your pitching coach wants somehow. What do you do?\n*fake_choice\n\t#I mime the path of the pitch with my arm to try to figure out what she wants me to do.\n\t#I nod seriously and pretend I know what she wants.\n\t#I force my interpreter to ask what a \"straight\" is, even if it embarrasses him.\n\t#Who cares what she's asking for? I tell them both I'll throw what I want.\n\n*set lefty false\n*set givenname \"Jesse\"\n*set surname \"Amaturo\"\n*set velocity 54\n*set control 55\n*set slider 0\n*set curveball 0\n*set changeup 65\n*set platoonsplit 20\n*set fitness 62\n*set serious 64\n*set intimidating 46\n*set rebellious 67\n*set analytical 54\n*set eloquent 56\n*set public_rep 55\n*set clubhouse_rep 50\n*set wealth 40\n*set fame 30\n*set anecdotes 2\nThe batter bunts the ball hard to the right, and you sprint over and pick it up off the ground. The runner from third went on contact and is already close to home plate. The runner from first is halfway to second, and it will take an athletic spin and throw to get him and potentially start a double play. Where do you throw the ball?\n*fake_choice\n\t#I throw to first for the easy out, conceding a run.\n\t#I throw home to get the lead runner, but with no chance of a double play.\n\t#I go for the highlight reel, making a running throw to second to start a double play.\n", "startup": "*title The Fielder's Choice\n*author Nathaniel Edwards\n\n*scene_list\n\tstartup\n\t1stYear\n\t2ndYear\n\t$ 3rdYear\n\t$ 4thYear\n\t$ 5thYear\n\t$ 6thYear\n\t$ 7thYear\n\t$ 8thYear\n*comment Skill Stats\n*create velocity 50\n*create control 50\n*create slider 0\n*create curveball 0\n No-hitter\n\tThrow a no-hitter.\n\n*achievement pinpoint visible 10 Pinpoint Control\n\tHave a control rating over 60.\n\n*achievement ripped visible 25 Ripped\n\tHave a fitness rating over 60.\n\n*achievement mellifluous visible 25 Mellifluous Interlocutor\n\tHave an eloquent rating over 60.\n\n*achievement dayatatime visible 25 Just Taking it a Day at a Time\n\tHave a cliched rating over 60.\n\n*achievement nofun visible 25 No Fun League\n\tHave a serious rating over 60.\n\n*achievement styleicon visible 25 Style Icon\n\tHave a stylish rating over 60.\n\n*achievement looming visible 25 Looming Presence\n\tHave an intimidating rating over 60.\n\n*achievement islandtime visible 25 I'm on Island Time\n\tHave a relaxed rating over 60.\n\n*achievement knucksie visible 25 Knucksie\n\tLearn to throw a knuckleball.\n\n*achievement purevelocity visible 25 Pure Velocity\n\tThrow a ball over 100 MPH.\n\n*achievement tourist visible 25 Tourist\n\tSign with a Japanese team.\n\n*achievement journeyman visible 25 Journeyman\n\tPlay for three different teams in your career.\n\n*achievement riseballexpert visible 25 Riseball Expert\n\tDon't give up any hits or walks in the 2025 All-Star Game.\n\n*achievement champ1 visible 50 World Champion\n\tWin 1 championship.\n\n*achievement champ2 visible 50 Core of a Dynasty\n\tWin 2 championships.\n\n*achievement champ3 visible 100 Lord of the Rings\n\tWin 3 championships.\n\n*achievement bullforlife visible 50 Bull for Life\n\tPlay for the San Antonio Bulls for your entire career.\n\n*achievement junkballer visible 100 Junkballer\n\tGo your entire career without throwing a fastball.\n\n*achievement perfecto visible 100 Perfecto\n\tNever give up a run while in control of the action over your whole career.\n\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tGrab a glove and pitch your way to the top of the major leagues! Baseball season is back and you’re on the mound. Starting your career as a rookie pitcher, you'll develop your repertoire and navigate clubhouse politics in the big leagues. Over eight seasons, you’ll use your talent and charisma to win on--and off--the field.\n\n\t[i]The Fielder’s Choice[/i] is a 115,000-word interactive baseball novel by Nathaniel Edwards. It’s entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination. \n\n\tYour talented arm will take you places you’ve never seen, and introduce you to some of the most driven athletes on the planet. Do you have the massive dedication to succeed in the big leagues, or will you resort to a little bit of cheating? Will you be baseball’s biggest stat geek or the master of hustle and grit? Will you develop an on-field persona that terrifies hitters or a cuddly exterior that lulls them to sleep? Will you go down in history as a Hall of Fame ace or a live arm that fizzled on the big stage? When your lifelong baseball dreams come true, someone else may have to lose everything they’ve ever worked toward. \n\n\t• Play as male, female, or non-binary; gay or straight[n/]\n\t• Play as left- or right-handed[n/]\n\t• Choose your pitching style and develop the perfect repertoire to rack up strikeouts[n/]\n\t• Perfect a fastball, slider, or curveball [n/]\n\t• Find friends, foes, or potential lifelong partners among your teammates[n/]\n\t• Pitch in the United States, Japan, or unlock the opportunity to explore a new frontier for baseball[n/]\n\t• Use statistical analysis to perfect your game, or #RiseAndGrind to out-hustle your opponents[n/]\n\t• Discover the quirky secret behind baseball’s most successful agent\n\n\tWhat pitch will you throw when the game is on the line? In that moment, it's the Fielder's Choice.  \n\n\n\t*if choice_prerelease\n\t\t[i]You can play the first two chapters in the game for
