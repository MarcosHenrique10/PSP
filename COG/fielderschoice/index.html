persatbatloop\n\n*label endoffirstgame\n*page_break\nYou sit down on the dugout bench and feel time slow back down to its normal pace. The game crawls along for another inning without you, descending into a morass of ugly defensive misplays and hanging breaking balls hit screaming into the outfield.\n\nIn the eighth inning, you notice your pitching coach, Peter Simon, arguing about something with your manager, but you can't hear what it is. Simon's kicking paper cups along the ground as he talks, and his trembling jaw bristles his dark brown mustache, which you imagine would have looked more normal in a baseball dugout some time long ago, perhaps the 1890s.\n\nSimon makes a clear effort to calm himself down, lifting his cap and brushing his hair back before setting it back down. He walks over toward you and says, matter-of-factly, \"Mendis is hurt. You're getting her next start. Don't suck.\" And off he goes back to the other end of the dugout.\n\nCome to think of it, Simon has never come to you with any advice on pitching whatsoever. He's always working on something with Mendis and a few other starters, but he's completely left you to your own devices. You butt-scooch over towards Rosario, who came out of the game along with you in a double switch, and decide to ask him something. What do you say?\n\n*fake_choice\n\t#Ask him why the pitching coach won't, you know, coach me.\n\t\t*set rebellious %+10\n\t\t\"Why doesn't Simon ever actually coach me?\" you ask. \"Seems like he coaches some of the older players.\"\n\n\t\tRosario looks surprised for a split second then nods. \"Yeah, Petey only likes to work with the players he used to coach back in AAA, before he got promoted to the big league team last year. I think he takes a long time to warm up to people, especially if they're young. He thinks young players don't work as hard or care about 'playing the game the right way' or whatever. Just show him you care and he'll work with you.\"\n\t#Ask him to go over the hitters in the next series with me.\n\t\t*set analytical %+10\n\t\t\"Can you go over the California Bears players with me?\" you ask Rosario. \"I need to be ready for next week.\"\n\n\t\tRosario gives you an incredulous look. \"Come on, that's for next week. I just got out of the game and my knees ache.\"\n\n\t\tYou explain that you just got promoted to the rotation for next week, and Rosario loosens up a little. \"That's awesome,\" he says. \"But I'm still not gonna go over the players with you until the day before your start.\" He pulls his cap over his face and leans back into the bench, pretending to nap.\n\t#Ask him to celebrate my promotion with me after the game.\n\t\t*set intimidating %-5\n\t\t*set rosario_rel %+15\n\t\t*check_achievements\n\t\t*if intimidating \u003c 40\n\t\t\t*if not(choice_achieved_islandtime)\n\t\t\t\t*achieve islandtime\n\t\t\"Let's get steaks after this, I'm buying,\" you say.\n\n\t\tRosario squints at you. \"Do they pay rookies before the vets now? I gotta tell the union about this.\"\n\n\t\t\"Nope, but Simon just told me I'm a starter now, so we've got to celebrate, and I've got to pay. And I just assumed your favorite food is steak, because that's every baseball player's favorite food.\"\n\n\t\tRosario strokes his chin for a second, trying to poke a hole in your logic somewhere. \"Nah, who am I kidding, steak's my favorite food too. Congrats on the promotion, that's incredible!\"\n\t#Joke around and ask him what \"getting a start\" means.\n\t\t*set eloquent %+5\n\t\t*set rosario_rel %+15\n\t\t*check_achievements\n\t\t*if eloquent > 60\n\t\t\t*if not(choice_achieved_mellifluous)\n\t\t\t\t*achieve mellifluous\n\t\t\"Hey buddy,\" you begin, putting on a dumb face, \"I feel like I keep hearing people say this kind of thing around here, but what does it mean if Simon says I'm 'getting a start?' What the heck's a start?\"\n\n\t\tRosario refuses to play along with your faux ignorance, instead choosing to throw his hands up in the air in excitement. \"No way, that's great!\" he says, and he stands up and performs an, um, interesting celebratory booty dance. The dance, in GIF form, would go on to thrill the internet and achieve eternal life as the third Google result for \"Andres del Rosario.\"\n*page_break A Few Months Later\n*comment Adjusting current ERA as if a few months had passed in the rotation.\n*set totalouts +183\n*if userruns >= 1\n\t*set earnedruns 28\n\t*goto endruncheckyear2\n*else\n\t*set earnedruns 23\n\t*goto endruncheckyear2\n*label endruncheckyear2\n*set wins +2\n*set losses +4\n*if userstrikeouts >= 1\n\t*set strikeouts 53\n\t*goto endstrikeoutcheckyear2\n*else\n\t*set strikeouts 40\n\t*goto endstrikeoutcheckyear2\n*label endstrikeoutcheckyear2\nYou're sitting in the clubhouse with headphones on when Rosario taps you then holds his hands like claws over both his ears. You think at first he's trying to draw attention to his new, sort of avant-garde fade haircut, but it quickly becomes clear he wants you to take your headphones off.\n\n\"Number one, I want to know what you were listening to,\" Rosario says. \"I could only kind of hear the bass part, but it sounded cool. Number two, and more importantly, listen to what they're saying in the boss's office.\"\n\nYou crane your head in that direction and hear the manager and pitching coach arguing again, this time loud enough for anyone to hear. \"I don't understand what's so difficult about this. Mendis is healthy again, so start her!\" Simon says.\n\nUsually, when Simon says something, people dare not disobey. Kingston, however, wouldn't have this job if she were weak-willed. She says \"We have five starters pitching well right now, and Ama could use a lighter workload until we know her elbow is 100%. She should work in long relief for the time being.\"\n\n\"Who cares how they're pitching,\" Simon replies. \"Move the rookie, ${surname}, to the bullpen or AAA. $!{heshe} will be fine with a demotion. How could ${heshe} complain when ${heshe} basically just got here?\"\n\nMaybe you should go in and make your voice heard before they start yelling even louder about your future on the team. What do you do?\n*choice\n\t#Bring Rosario in to confront Simon about his bias.\n\t\t*gosub trial_end\n\t\t\"Come on, Andres, let's go in there and end Simon's crap. He hasn't coached me for a second and now he's trying to take my job on the team away. You with me?\" you say, looking determined.\n\n\t\t*if rosario_rel > 55\n\t\t\t*set rebellious %+10\n\t\t\t*set anecdotes +1\n\t\t\t*achieve memoirmaterial\n\t\t\t\"Sounds risky, but sure, it's time somebody talked to him,\" Rosario says, getting up to go with you into the manager's office.\n\n\t\t\tThe two of you deliver an impromptu speech on Simon's refusal to coach anyone but his few favorite veteran players. Rosario, himself in good standing as a veteran with the team, provides some much-needed backup and lends weight to your account of events.\n\n\t\t\tOnce you're done talking, Kingston waits a moment then quietly thanks you and leads you out of the office, closing her door to continue talking to Simon. You have no idea if that went well or not, but it felt like something that had to be said.\n\t\t\t*goto afterargument\n\t\t*else\n\t\t\t*set rebellious %+10\n\t\t\t*set pitchingcoach_rel %-10\n\t\t\t*set manager_rel %-5\n\t\t\tRosario cringes and shakes his head. \"He's the pitching coach, so it doesn't affect me. You gotta be careful. If you stick your head out, somebody might chop it off, you know?\"\n\n\t\t\tSo you walk in there by yourself and give Simon a sermon about treating young players with respect.\n\n\t\t\tTo say the least, he doesn't seem convinced. He tells you, \"Let the adults talk now,\" and then pushes you out and closes the door.\n\t\t\t*goto afterargument\n\t#Offer to go back to the bullpen voluntarily for Mendis to get her spot back.\n\t\t*gosub trial_end\n\t\t*set mendis_rel %+20\n\t\tYou walk into the manager's office and offer to give up your rotation spot to resolve the dispute.\n\t\t*if rebellious > 50\n\t\t\t*set pitchingcoach_rel %-10\n\t\t\tSimon, eyeing you, surmises that you must have some other motive. \"You've never done anything else that put the team before yourself,\" he says. \"Are you too afraid to start in the big leagues? Is that what this is?\"\n\n\t\t\tYou shake your head and try to explain that you're trying to be generous, but Kingston cuts you off. \"Thank you, ${givenname}, but we'll handle this ourselves. Please close the door on your way out.\" Why is it so hard to do a nice thing?\n\t\t\t*goto afterargument\n\t\t*else\n\t\t\t*set pitchingcoach_rel %+10\n\t\t\tThe pitching coach looks at you for a moment then says, \"What a fantastic idea. Boss, here's a player looking to put the team first. How could you deny ${himher} that?\"\n\n\t\t\t\"Easily,\" she says. \"I decide whether you start or relieve, ${givenname}. Thank you for trying to do the right thing. It is appreciated, but please, get out of here and close the door on your way out.\"\n\t\t\t*goto afterargument\n\t#Use statistics to prove to Simon that I deserve to stay in the rotation.\n\t\t*gosub trial_end\n\t\tYou walk into the manager's office and start talking. \"Coach,\" you say, addressing Kingston. \"Other coach,\" you say, a little less deferentially, addressing Simon. \"Listen to me. If you put me back in the bullpen then this team will lose more games.\n\t\t*if (analytical > 50) and (earnedruns \u003c 25)\n\t\t\t*set rebellious %+10\n\t\t\t*set pitchingcoach_rel %-5\n\t\t\tMy ERA is okay, but it goes deeper than that. My WAR is leading all rookie pitchers this season. My xFIP is the lowest in our division. And just look at the exit velocities I'm allowing. Virtually every hit has been a weak seeing-eye ground ball.\"\n\n\t\t\t\"What the hell are you even talking about?\" says Simon, who is not exactly an advanced stats guru.\n\n\t\t\t\"Thank you for your input, but we have a whole staff of professionals who tell me numbers like that already,\" Kingston says. \"The most relevant fact here: I decide if you start or relieve. Now get out of here and let me mollify Mr. Whiny Coach myself, okay? Please, close the door on your way out.\"\n\t\t\t*goto afterargument\n\t\t*elseif (analytical > 50) and (earnedruns >= 25)\n\t\t\t*set rebellious %+10\n\t\t\t*set pitchingcoach_rel %-5\n\t\t\tMy ERA may not be so good, but check the numbers behind that. On my fastballs, hitters only have a 10% line drive rate against me, which is good. And, well, I'm working hard on improving the other stuff.\" You realize this is not a winning argument.\n\n\t\t\t\"What the hell are you trying to say, exactly?\" says Simon, who is not exactly an advanced stats guru.\n\n\t\t\t\"I think maybe the line drive rate on fastballs isn't your biggest problem,\" Kingston says. \"Could be a small sample size there. But that doesn't matter. I decide if you start or relieve. Now get out of here so I can talk to your pitching coach for a moment, please. And close the door on your way out.\"\n\t\t\t*goto afterargument\n\t\t*elseif (analytical \u003c= 50) and (earnedruns \u003c 25)\n\t\t\t*set rebellious %+10\n\t\t\tDid you see me strike out the side last night? I'm pitching great right now and going to the pen could mess with what I've got going. Please keep me in the rotation.\"\n\n\t\t\tSimon laughs a little at your bravado, but Kingston remains serious. \"Great stuff there, ${givenname}, but you don't decide who starts,\" she says. \"I do. So get out of here and leave us alone for another few minutes, please.\"\n\t\t\t*goto afterargument\n\t\t*else\n\t\t\t*set rebellious %+10\n\t\t\tI haven't been killing it out there but my arm feels great. I know I'm just going to keep pitching better, so please, keep me in the rotation.\"\n\n\t\t\tSimon laughs at your honestly kind of pathetic argument for yourself, but Kingston remains serious. \"Thank you for your input, ${givenname} but you don't decide who starts,\" she says. \"I do. So get out of here and leave us alone for another few minutes, please.\"\n\t\t\t*goto afterargument\n\t#Tell Rosario to leave me out of it. I'll pitch wherever they tell me to pitch.\n\t\t*gosub trial_end\n\t\t*set rebellious %-15\n\t\t\"Thanks for letting me know, but I'm still technically a rookie, and I shouldn't be standing up to my own manager and pitching coach,\" you say. \"Fair or not, it's up to them what my job is. I'll just put my headphones back on so I don't have to hear it.\"\n\n\t\t*if rosario_rel > 55\n\t\t\t*set anecdotes +1\n\t\t\t*achieve memoirmaterial\n\t\t\t\"Fine, you stay here,\" Rosario says before walking purposefully off towards Kingston's office. He's going to lobby for you to stay in the rotation. You start to say something to stop him, but he's gone. You slip on your headphones and tune out the ensuing argument.\n\n\t\t\tMaybe three or four minutes later, Rosario comes back and sits down next to you. \"Well, what happened?\" you ask.\n\n\t\t\t\"Kingston said I must be taking too many foul tips to the head if I thought I was the one running the team now and not her,\" Rosario says. \"She said if she wanted my input, she'd ask for it. And then she told Simon to dump a bag of sunflower seeds over my head.\"\n\n\t\t\t\"What? Did he do it?\"\n\n\t\t\t\"He was reluctant at first, and we both kind of stood there and stared at her, like, really, are you going to make him do this? But eventually he did it. He slowly opened up a bag of sunflower seeds and quietly poured them over my head. I caught a few in my mouth, I'm still chewing 'em. It was the strangest moment of my life. I think Kingston just had to make it clear who was boss.\"\n\n\t\t\tYou now notice a few seeds are still caught in his hair, so you brush them off. Kingston has a unique way of settling dugout arguments, you suppose.\n\t\t\t*goto afterargument\n\t\t*else\n\t\t\tRosario thinks for a moment, letting his eyes go up into his head, then shrugs. \"Okay, well, hope you don't get banished to the pen,\" he says and walks off.\n\n\t\t\tYou hesitate to put your headphones back on, both curious to hear what Simon and Kingston are saying about you and dreading hearing anything too critical. But eventually you get back to your music, trying to calm the upset stomach feeling of not knowing what your role on the team will be tomorrow.\n\t\t\t*goto afterargument\n\n*label afterargument\n\nThe next day, Kingston announces her decision: You will start. Mendis is moved to the bullpen.\n*page_break A Few Months Later\n*set totalouts +250\n*if userruns \u003c 1\n\t*set earnedruns +26\n\t*goto secondruncheckyear2\n*else\n\t*set earnedruns +33\n\t*goto secondruncheckyear2\n*label secondruncheckyear2\n*set strikeouts +75\n*set wins +4\n*set losses +3\nThe season chugs along into late September, and the Bulls are clearly out of playoff contention. You've pitched well, and after a brutal August full of bullpen meltdowns and injuries, Ama Mendis is now closing out games for the team as the top bullpen arm. Her power curveball suddenly seems made for the bullpen, and her ERA for the year is an incredible 1.71.\n\nYou haven't had a chance to talk to her much since she got moved to the bullpen, but today, on one of the last games of the season, you enter the team's fitness room and find her there.\n\nSince you basically took her job, you're not sure what she thinks of you now. It would probably be good to clear things up before the offseason. What do you do?\n*choice\n\t*if (betmade) #Maybe I should finally settle our bet.\n\t\t*if wonbet\n\t\t\t*set mendis_rel %+10\n\t\t\t*set rebellious %-5\n\t\t\t\"I think I owe you one for taking your job and all,\" you say. \"But, you still owe me for striking out Kingston back in spring. So how about we call it even? Probably both worth around ten bucks.\"\n\n\t\t\tMendis springs up from her workout and pretends to be angry. \"Ten bucks? Going from staff ace to merely the bullpen ace? I owe you ten, but you owe me, let's see…About $400,000? So let's call it $399,990, how about that?\"\n\n\t\t\t\"Okay, well I don't quite have that much on me,\" you say, laughing. \"I'll get back to you when I hit free agency.\" Then you slip out the door and away from your new creditor.\n\t\t\t*goto endof2ndyear\n\t\t*else\n\t\t\t*set mendis_rel %+10\n\t\t\t*set rebellious %-10\n\t\t\t\"I think I owe you something,\" you say. \"I know a lot happened this year, and I took your spot in the rotation. So, to make it all up to you, here is a crisp new ten-dollar bill to pay you back for our bet back in spring.\"\n\n\t\t\t\"That's it?\" She says, laughing. \"Okay, I will accept your ten dollars. And thankfully for you, I landed on my feet and got the closer job. Just pitch well and you'll get wins and I'll get saves, and we'll be all good.\"\n\t\t\t*goto endof2ndyear\n\t#Tell her I offered to give back her spot in the rotation.\n\t\t*if mendis_rel > 55\n\t\t\t*set clubhouse_rep %+10\n\t\t\t\"I told the coach I wanted to go back to the bullpen when you came back from your injury,\" you say. \"But she said it wasn't up to me.\"\n\n\t\t\tMendis stops her workout and looks at you. \"I know,\" she says. \"That was a nice thing to do, although of course it wouldn't change her mind. It doesn't matter. The change worked out for both of us anyway.\" She smiles then gets back to her routine.\n\t\t\t*goto endof2ndyear\n\t\t*else\n\t\t\t*set clubhouse_rep %-10\n\t\t\t\"I told the coach I wanted to go back to the bullpen when you came back from your injury,\" you say, which isn't strictly true.\n\n\t\t\tMendis stops her workout but doesn't look at you. \"That's not what I heard,\" she says. \"But, thank you. The manager wouldn't have let you tell her what to do anyway.\"\n\n\t\t\tShe gets back to her routine and you awkwardly slump out.\n\t\t\t*goto endof2ndyear\n\t#Without saying anything, subtly start a competition to see who can work out harder.\n\t\t*if fitness > 50\n\t\t\t*set serious %-5\n\t\t\t*set mendis_rel %-5\n\t\t\t*check_achievements\n\t\t\t*if serious \u003c 40\n\t\t\t\t*if not(choice_achieved_styleicon)\n\t\t\t\t\t*achieve styleicon\n\t\t\tYou walk into the workout room and start to mimic Mendis's workout routine. She notices but doesn't say a thing. You both do forward lunges, medicine ball throws, weighted bear crawls, 90/90 hip stretches, Bulgarian squats, rows, deadlifts, and something you've never done before that you later learn are called flamingoes.\n\n\t\t\tMendis finally decides to stop, but you continue to pile up reps. \"You are so competitive,\" Ama says, gasping for air. Maybe not the best way to build your relationship back with her, but you did get to show off for a minute.\n\t\t\t*goto endof2ndyear\n\t\t*else\n\t\t\t*set mendis_rel %+5\n\t\t\tYou walk into the workout room and start to mimic Mendis's workout routine. She notices but doesn't say a thing. You both do forward lunges, medicine ball throws, weighted bear crawls, 90/90 hip stretches, Bulgarian squats, something you've never done before that you later learn are called flamingoes, and, and…\n\n\t\t\tAnd you collapse. Mendis laughs in a staggered, exhausted way, still doing reps. \"I guess this is my way of saying I'm sorry for what happened this year,\" you say, splayed out on the cushioned ground.\n\n\t\t\t\"Thanks,\" Ama says. \"We're cool. It worked out for both of us.\"\n\t\t\t*goto endof2ndyear\n\t#Sincerely apologize for taking her role on the team.\n\t\t*if serious > 50\n\t\t\t*set mendis_rel %+10\n\t\t\t\"Hey Ama,\" you start, feeling awkward. \"I'm sorry for taking your spot in the rotation. It was out of my control. I'm glad you ended up being a really great closer for us.\"\n\n\t\t\t\"Thanks,\" she says, still doing a series of rapid stretches. \"It worked out for both of us. Just keep pitching well and you'll get wins and I'll get saves, and we'll be cool.\"\n\t\t\t*goto endof2ndyear\n\t\t*else\n\t\t\t*set mendis_rel %+5\n\t\t\t\"Hey Ama,\" you start, feeling awkward. \"I'm sorry for taking your spot in the rotation. It was out of my control. I mean, I guess I could have sucked on purpose. That would have done it. But that would be…anyway, so yeah, sorry.\"\n\n\t\t\t\"First of all, great apology,\" Ama says sarcastically. Then shifting sincere, \"Second, we're good. It worked out for both of us. Just keep pitching well and you'll get wins and I'll get saves and we'll both be happy.\"\n\t\t\t*goto endof2ndyear\n\n*label endof2ndyear\n*finish\n\n*label armdidnotmelt\nYou take a glance at your throwing arm just to make sure it's really there and hasn't melted or crumbled or snapped. Nope, it's all still there. What a relief. And what's more, you pitched well! Last year, your arm was a weight holding you in place. This year, you and your arm are buddy cops, and you're locking up hitters. Your arm may be a loose cannon, but keep it in check and you'll be a perfect duo.\n*return\n*label armdidnotmeltshorter\nYou take a glance at your throwing arm just to make sure it's really there and hasn't melted or crumbled or snapped. Nope, it's all still there. What a relief.\n*return\n\n*comment Below here it's all subroutines which will be used throughout the game for the pitching sim.\n*label resetgame\n*set outs 0\n*set balls 0\n*set strikes 0\n*set fastballsthrown 0\n*set curveballsthrown 0\n*set riseballsthrown 0\n*set slidersthrown 0\n*set changeupsthrown 0\n*set runnerfirst false\n*set runnersecond false\n*set runnerthird false\n*set atbatresult \"\"\n*set batterabilitybonus 0\n*set batterpowerbonus 0\n*return\n\n*label resetatbat\n*set balls 0\n*set strikes 0\n*set fastballsthrown 0\n*set riseballsthrown 0\n*set curveballsthrown 0\n*set slidersthrown 0\n*set changeupsthrown 0\n*set atbatresult \"\"\n*set batterability 0\n*set batterpower 0\n*set batterabilitybonus 0\n*set batterpowerbonus 0\n*return\n\n*label getpitchodds\n*comment Here are the guts of the pitching sim. I took the real-life odds of pitch outcomes from the following article and then exaggerated them a little bit to make the pitches feel different and to make it easier to see the strategy of when to throw which pitch: (http://www.hardballtimes.com/fastball-slider-changeup-curveball-an-analysis/).\n*set fastballballodds ((31 - easybonus) - (control / 10))\n*set fastballinplayodds ((27 - easybonus) - ((velocity / 10) - ((fastballsthrown * 3) + batterability)))\n*set fastballstrikeodds 100 - (fastballballodds + fastballinplayodds)\n*set wasteinplayodds 5 - ((control / 10) - batterability)\n*if wasteinplayodds \u003c 0\n\t*set wasteinplayodds 0\n*set wastestrikeodds easybonus + (velocity / 10)\n*set wasteballodds 100 - (wastestrikeodds + wasteinplayodds)\n*set curveballballodds ((50 - easybonus) - ((control / 20) + (curveball / 20)))\n*set curveballinplayodds ((13 - easybonus) - (((curveball / 15) + (velocity / 25)) - ((curveballsthrown * 5) + batterability)))\n*if curveballinplayodds \u003c 0\n\t*set curveballinplayodds 1\n*set curveballstrikeodds 100 - (curveballballodds + curveballinplayodds)\n*set sliderballodds ((46 - easybonus) - ((control / 20) + (slider / 20)))\n*set sliderinplayodds ((17 - easybonus) - (((slider / 15) + (velocity / 25)) - ((slidersthrown * 5) + batterability)))\n*if sliderinplayodds \u003c 0\n\t*set sliderinplayodds 1\n*set sliderstrikeodds 100 - (sliderballodds + sliderinplayodds)\n*set changeupballodds ((45 - easybonus) - ((control / 20) + (changeup / 20)))\n*set changeupinplayodds ((13 - easybonus) - (((changeup / 15) + (velocity / 25)) - ((changeupsthrown * 5) + batterability)))\n*if changeupinplayodds \u003c 0\n\t*set changeupinplayodds 1\n*set changeupstrikeodds 100 - (changeupballodds + changeupinplayodds)\n*set knucklerballodds ((50 - easybonus) - ((control / 20) + (knuckleball / 20)))\n*set knucklerinplayodds ((10 - easybonus) - ((knuckleball / 10) - batterability))\n*if knucklerinplayodds \u003c 0\n\t*set knucklerinplayodds 1\n*set knucklerstrikeodds 100 - (knucklerballodds + knucklerinplayodds)\nFastball: ${round(fastballstrikeodds)}% Strike, ${round(fastballballodds)}% Ball, ${round(fastballinplayodds)}% In Play\n*if (curveball > 0)\n\t*line_break\n\tCurveball: ${round(curveballstrikeodds)}% Strike, ${round(curveballballodds)}% Ball, ${round(curveballinplayodds)}% In Play\n*if (slider > 0)\n\t*line_break\n\tSlider: ${round(sliderstrikeodds)}% Strike, ${round(sliderballodds)}% Ball, ${round(sliderinplayodds)}% In Play\n*if (changeup > 0)\n\t*line_break\n\tChangeup: ${round(changeupstrikeodds)}% Strike, ${round(changeupballodds)}% Ball, ${round(changeupinplayodds)}% In Play\n*if (knuckleball > 0)\n\t*line_break\n\tKnuckleball: ${round(knucklerstrikeodds)}% Strike, ${round(knucklerballodds)}% Ball, ${round(knucklerinplayodds)}% In Play\n*line_break\nWaste Pitch: ${round(wastestrikeodds)}% Strike, ${round(wasteballodds)}% Ball, ${round(wasteinplayodds)}% In Play\n*return\n\n*label pitchresults\n*comment Now that we have odds for each result, we use our 1-100 die roll with those odds to get the result and tell the player about it. Currently using real percentages for the moment from this article (http://www.hardballtimes.com/fastball-slider-changeup-curveball-an-analysis/) to determine results, which should produce real strategy for choosing pitches, because fastballs generally get the best results but they are easy to foul off, so players will want to switch to another pitch to get the third strike. Currently the difference between odds of foul ball strikes and swinging third strikes isn't surfaced to the player, so we might have to do that, or at least let a pitching coach character explain that you're more likely to get a strikeout from a non-fastball.\n*if pitchthrown = \"fastball\"\n\t*set junkballerinprogress false\n\t*set fastballsthrown + 1\n\tYou throw a fastball.\n\t*if dieroll \u003c= fastballballodds\n\t\t*set balls + 1\n\t\tIt lands out of the zone for a ball.\n\t\t*if balls = 4\n\t\t\tThat's a walk.\n\n\t\t\t*set atbatresult \"walk\"\n\t\t\t*return\n\t\tThe count is now ${balls} - ${strikes}.\n\n\t\t*return\n\t*elseif (dieroll > fastballballodds) and (dieroll \u003c= (fastballballodds + fastballinplayodds))\n\t\tThe batter makes contact and puts the ball in play.\n\n\t\t*gosub ballinplay\n\t\t*return\n\t*else\n\t\t*if dieroll2 \u003c= 25\n\t\t\t*set strikes + 1\n\t\t\tThe batter swings and misses.\n\t\t\t*if strikes = 3\n\t\t\t\tAnd that's strike three, it's a strikeout.\n\n\t\t\t\t*set atbatresult \"strikeout\"\n\t\t\t\t*return\n\t\t*if (dieroll2 > 25) and (dieroll2 \u003c= 76)\n\t\t\t*set strikes + 1\n\t\t\tThat's in there for a called strike.\n\t\t\t*if strikes = 3\n\t\t\t\tAnd that's a strikeout.\n\n\t\t\t\t*set atbatresult \"strikeout\"\n\t\t\t\t*return\n\t\t*if dieroll2 > 76\n\t\t\tThe batter fouls it off.\n\t\t\t*if strikes = 2\n\t\t\t\tThe count remains ${balls} - ${strikes}.\n\n\t\t\t\t*return\n\t\t\t*else\n\t\t\t\t*set strikes + 1\n\t\tThe count is now ${balls} - ${strikes}.\n\n\t\t*return\n*elseif pitchthrown = \"curveball\"\n\t*set curveballsthrown + 1\n\tYou throw a curveball.\n\t*if dieroll \u003c= curveballballodds\n\t\t*set balls + 1\n\t\tIt lands out of the zone for a ball.\n\t\t*if balls = 4\n\t\t\tThat's a walk.\n\n\t\t\t*set atbatresult \"walk\"\n\t\t\t*return\n\t\tThe count is now ${balls} - ${strikes}.\n\n\t\t*return\n\t*elseif (dieroll > curveballballodds) and (dieroll \u003c= (curveballballodds + curveballinplayodds))\n\t\tThe batter makes contact and puts the ball in play.\n\n\t\t*gosub ballinplay\n\t\t*return\n\t*else\n\t\t*if dieroll2 \u003c= 30\n\t\t\t*set strikes + 1\n\t\t\tThe batter swings and misses.\n\t\t\t*if strikes = 3\n\t\t\t\tAnd that's strike three, it's a strikeout.\n\n\t\t\t\t*set atbatresult \"strikeout\"\n\t\t\t\t*return\n\t\t*if (dieroll2 > 30) and (dieroll2 \u003c= 60)\n\t\t\t*set strikes + 1\n\t\t\tThat's in there for a called strike.\n\t\t\t*if strikes = 3\n\t\t\t\tAnd that's a strikeout.\n\n\t\t\t\t*set atbatresult \"strikeout\"\n\t\t\t\t*return\n\t\t*if dieroll2 > 60\n\t\t\tThe batter fouls it off.\n\t\t\t*if strikes = 2\n\t\t\t\tThe count remains ${balls} - ${strikes}.\n\n\t\t\t\t*return\n\t\t\t*else\n\t\t\t\t*set strikes + 1\n\t\tThe count is now ${balls} - ${strikes}.\n\n\t\t*return\n*elseif pitchthrown = \"slider\"\n\t*set slidersthrown + 1\n\tYou throw a slider.\n\t*if dieroll \u003c= sliderballodds\n\t\t*set balls + 1\n\t\tIt lands out of the zone for a ball.\n\t\t*if balls = 4\n\t\t\tThat's a walk.\n\n\t\t\t*set atbatresult \"walk\"\n\t\t\t*return\n\t\tThe count is now ${balls} - ${strikes}.\n\n\t\t*return\n\t*elseif (dieroll > sliderballodds) and (dieroll \u003c= (sliderballodds + sliderinplayodds))\n\t\tThe batter makes contact and puts the ball in play.\n\n\t\t*gosub ballinplay\n\t\t*return\n\t*else\n\t\t*if dieroll2 \u003c= 30\n\t\t\t*set strikes + 1\n\t\t\tThe batter swings and misses.\n\t\t\t*if strikes = 3\n\t\t\t\tAnd that's strike three, it's a strikeout.\n\n\t\t\t\t*set atbatresult \"strikeout\"\n\t\t\t\t*return\n\t\t*if (dieroll2 > 30) and (dieroll2 \u003c= 61)\n\t\t\t*set strikes + 1\n\t\t\tThat's in there for a called strike.\n\t\t\t*if strikes = 3\n\t\t\t\tAnd that's a strikeout.\n\n\t\t\t\t*set atbatresult \"strikeout\"\n\t\t\t\t*return\n\t\t*if dieroll2 > 61\n\t\t\tThe batter fouls it off.\n\t\t\t*if strikes = 2\n\t\t\t\tThe count remains ${balls} - ${strikes}.\n\n\t\t\t\t*return\n\t\t\t*else\n\t\t\t\t*set strikes + 1\n\t\tThe count is now ${balls} - ${strikes}.\n\n\t\t*return\n*elseif pitchthrown = \"changeup\"\n\t*set changeupsthrown + 1\n\tYou throw a changeup.\n\t*if dieroll \u003c= changeupballodds\n\t\t*set balls + 1\n\t\tIt lands out of the zone for a ball.\n\t\t*if balls = 4\n\t\t\tThat's a walk.\n\n\t\t\t*set atbatresult \"walk\"\n\t\t\t*return\n\t\tThe count is now ${balls} - ${strikes}.\n\n\t\t*return\n\t*elseif (dieroll > changeupballodds) and (dieroll \u003c= (changeupballodds + changeupinplayodds))\n\t\tThe batter makes contact and puts the ball in play.\n\n\t\t*gosub ballinplay\n\t\t*return\n\t*else\n\t\t*if dieroll2 \u003c= 34\n\t\t\t*set strikes + 1\n\t\t\tThe batter swings and misses.\n\t\t\t*if strikes = 3\n\t\t\t\tAnd that's strike three, it's a strikeout.\n\n\t\t\t\t*set atbatresult \"strikeout\"\n\t\t\t\t*return\n\t\t*if (dieroll2 > 34) and (dieroll2 \u003c= 63)\n\t\t\t*set strikes + 1\n\t\t\tThat's in there for a called strike.\n\t\t\t*if strikes = 3\n\t\t\t\tAnd that's a strikeout.\n\n\t\t\t\t*set atbatresult \"strikeout\"\n\t\t\t\t*return\n\t\t*if dieroll2 > 63\n\t\t\tThe batter fouls it off.\n\t\t\t*if strikes = 2\n\t\t\t\tThe count remains ${balls} - ${strikes}.\n\n\t\t\t\t*return\n\t\t\t*else\n\t\t\t\t*set strikes + 1\n\t\tThe count is now ${balls} - ${strikes}.\n\n\t\t*return\n*elseif pitchthrown = \"knuckleball\"\n\tYou throw a knuckleball.\n\t*if dieroll \u003c= knucklerballodds\n\t\t*set balls + 1\n\t\tIt lands out of the zone for a ball.\n\t\t*if balls = 4\n\t\t\tThat's a walk.\n\n\t\t\t*set atbatresult \"walk\"\n\t\t\t*return\n\t\tThe count is now ${balls} - ${strikes}.\n\n\t\t*return\n\t*elseif (dieroll > knucklerballodds) and (dieroll \u003c= (knucklerballodds + knucklerinplayodds))\n\t\tThe batter makes contact and puts the ball in play.\n\n\t\t*gosub ballinplay\n\t\t*return\n\t*else\n\t\t*if dieroll2 \u003c= 30\n\t\t\t*set strikes + 1\n\t\t\tThe batter swings and misses.\n\t\t\t*if strikes = 3\n\t\t\t\tAnd that's strike three, it's a strikeout.\n\n\t\t\t\t*set atbatresult \"strikeout\"\n\t\t\t\t*return\n\t\t*if (dieroll2 > 30) and (dieroll2 \u003c= 60)\n\t\t\t*set strikes + 1\n\t\t\tThat's in there for a called strike.\n\t\t\t*if strikes = 3\n\t\t\t\tAnd that's a strikeout.\n\n\t\t\t\t*set atbatresult \"strikeout\"\n\t\t\t\t*return\n\t\t*if dieroll2 > 60\n\t\t\tThe batter fouls it off.\n\t\t\t*if strikes = 2\n\t\t\t\tThe count remains ${balls} - ${strikes}.\n\n\t\t\t\t*return\n\t\t\t*else\n\t\t\t\t*set strikes + 1\n\t\tThe count is now ${balls} - ${strikes}.\n\n\t\t*return\n*elseif pitchthrown = \"waste\"\n\tYou throw a waste pitch.\n\t*if dieroll \u003c= wasteballodds\n\t\t*set balls + 1\n\t\tThe batter doesn't chase, and that's a ball.\n\t\t*if balls = 4\n\t\t\tThe batter takes first base on ball four.\n\n\t\t\t*set atbatresult \"walk\"\n\t\t\t*return\n\t\tThe count is now ${balls} - ${strikes}.\n\n\t\t*return\n\t*elseif (dieroll > wasteballodds) and (dieroll \u003c= (wasteballodds + wasteinplayodds))\n\t\tThe batter reaches and makes contact, putting the ball in play.\n\n\t\t*gosub ballinplay\n\t\t*return\n\t*else\n\t\t*if dieroll2 \u003c= 33\n\t\t\t*set strikes + 1\n\t\t\tThe batter swings but has no chance to reach the ball, that's a strike.\n\t\t\t*if strikes = 3\n\t\t\t\tAnd that's strike three, it's a strikeout.\n\n\t\t\t\t*set atbatresult \"strikeout\"\n\t\t\t\t*check_achievements\n\t\t\t\t*if not(choice_achieved_nochance)\n\t\t\t\t\t*achieve nochance\n\t\t\t\t*return\n\t\t\t*goto givethecount\n\t\t*if (dieroll2 > 33) and (dieroll2 \u003c= 38)\n\t\t\t*set strikes + 1\n\t\t\tYou mistakenly leave the pitch in the strike zone, but the batter stands frozen, so it's a called strike.\n\t\t\t*if strikes = 3\n\t\t\t\tAnd that's a strikeout.\n\n\t\t\t\t*set atbatresult \"strikeout\"\n\t\t\t\t*check_achievements\n\t\t\t\t*if not(choice_achieved_nochance)\n\t\t\t\t\t*achieve nochance\n\t\t\t\t*return\n\t\t\t*goto givethecount\n\t\t*if dieroll2 > 38\n\t\t\tThe batter foolishly swings but manages to foul the pitch off.\n\t\t\t*if strikes = 2\n\t\t\t\tThe count remains ${balls} - ${strikes}.\n\n\t\t\t\t*return\n\t\t\t*else\n\t\t\t\t*set strikes + 1\n\t\t\t*goto givethecount\n\t\t*else\n\t\t\t*bug\n\t\t\t*goto givethecount\n\t\t*label givethecount\n\t\tThe count is now ${balls} - ${strikes}.\n\n\t\t*return\n\n*label ballinplay\n*comment Now, finally, to determine what happens if the hitter makes contact. Usually he's still out, but that's down to your team's defense, not your pitching. Trying to keep this as simple as possible while factoring in the batter power stats. Returns a result to the original loop so we can change the result text or add special choice events later on, like \"The batter grounds out. Do you throw to 2nd base to go for the double play or take the easy out at first?\"\n*if dieroll2 \u003c= 30\n\t*comment The result is some kind of hit. This extra if is necessary to increase the likelihood of home runs if the batter has a high batterpower stat.\n\t*if (dieroll2 + batterpower) \u003c= 18\n\t\t*set atbatresult \"single\"\n\t\t*return\n\t*elseif ((dieroll2 + batterpower) > 18) and ((dieroll2 + batterpower) \u003c= 26)\n\t\t*set atbatresult \"double\"\n\t\t*return\n\t*elseif (dieroll2 + batterpower) = 27\n\t\t*set atbatresult \"triple\"\n\t\t*return\n\t*else\n\t\t*set atbatresult \"home run\"\n\t\t*return\n*elseif (dieroll2 \u003c 30) and (dieroll2 \u003c= 69)\n\t*set atbatresult \"groundout\"\n\t*return\n*elseif (dieroll2 > 69) and (dieroll2 \u003c= 93)\n\t*set atbatresult \"flyout\"\n\t*return\n*else\n\t*set atbatresult \"lineout\"\n\t*return\n\n*label situationtext\n*if ((runnerfirst = false) and (runnersecond = false)) and (runnerthird = false)\n\t*set describerunners \"The bases are empty.\"\n\t*goto checkouts\n*elseif ((runnerfirst = true) and (runnersecond = false)) and (runnerthird = false)\n\t*set describerunners \"There is a runner on first.\"\n\t*goto checkouts\n*elseif ((runnerfirst = false) and (runnersecond = true)) and (runnerthird = false)\n\t*set describerunners \"There is a runner on second.\"\n\t*goto checkouts\n*elseif ((runnerfirst = false) and (runnersecond = false)) and (runnerthird = true)\n\t*set describerunners \"There is a runner on third.\"\n\t*goto checkouts\n*elseif ((runnerfirst = true) and (runnersecond = true)) and (runnerthird = false)\n\t*set describerunners \"There are runners on first and second.\"\n\t*goto checkouts\n*elseif ((runnerfirst = true) and (runnersecond = false)) and (runnerthird = true)\n\t*set describerunners \"There are runners on first and third.\"\n\t*goto checkouts\n*elseif ((runnerfirst = false) and (runnersecond = true)) and (runnerthird = true)\n\t*set describerunners \"There are runners on second and third.\"\n\t*goto checkouts\n*elseif ((runnerfirst = true) and (runnersecond = true)) and (runnerthird = true)\n\t*set describerunners \"The bases are loaded.\"\n\t*goto checkouts\n*else\n\t*set describerunners \"Whoops! Something went wrong here. 1st: ${runnerfirst} 2nd: ${runnersecond} 3rd: ${runnerthird}\"\n\t*bug\n\t*goto checkouts\n*label checkouts\n*if outs = 0\n\t*set describeouts \"There are no outs.\"\n\t*goto endcheckouts\n*elseif outs = 1\n\t*set describeouts \"There is one out.\"\n\t*goto endcheckouts\n*elseif outs = 2\n\t*set describeouts \"There are two outs.\"\n\t*goto endcheckouts\n*else\n\t*set describeouts \"Whoops, that's not supposed to happen. Outs: ${outs}\"\n\t*bug\n\t*goto endcheckouts\n*label endcheckouts\n${describerunners} ${describeouts}\n*return\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n*abort\n", "3rdyear": "*temp baseera ((earnedruns / (totalouts / 3)) * 9)\n*temp baseeradecimals ((baseera modulo 1) * 100)\n*temp erawholenumber (baseera - (baseera modulo 1))\n*temp erafirstdecimal ((baseeradecimals / 10) - ((baseeradecimals modulo 10) / 10))\n*temp eraseconddecimal ((baseeradecimals - (erafirstdecimal * 10)) - (baseeradecimals modulo 1))\n*temp disperawholenumber (round(erawholenumber))\n*temp disperafirstdecimal (round(erafirstdecimal))\n*temp disperaseconddecimal (round(eraseconddecimal))\n*set year2era \"${disperawholenumber}.${disperafirstdecimal}${disperaseconddecimal}\"\n*set year2wins wins\n*set year2losses losses\n*set year2strikeouts strikeouts\n*set currentyear 3\n*set year3team \"SAB\"\n*set earnedruns 0\n*set totalouts 1\n*set wins 0\n*set losses 0\n*set strikeouts 0\n*temp simonsecretout false\n*temp stuffontheground false\n*text_image chap_3.png center Year 3: Simon Says\n\n\"Okay, now let's do a message for Mother's Day,\" the interviewer commands as she looks down at her tablet, swiping around with one finger. The cameraman adjusts focus subtly until he can compare and contrast each stubbly hair on Rosario's face.\n\n\"Happy Mother's Day to all the mothers out there,\" Rosario says into the camera, his face numb and blank. \"I couldn't have been here without my mom. Thanks, Mom.\"\n\n\"Great,\" the interviewer says, now tapping instead of swiping. \"Father's Day.\"\n\nRosario gathers himself for a second, mulling over all that Father's Day means to him. He takes a long, sincere blink, then speaks. \"Happy Father's Day to all the fathers out there. I couldn't have been here without my dad. Thanks, Dad.\"\n\n\"That's it, you're done,\" says the interviewer, still buried in her tablet. \"Next up, come on in.\"\n\nIt's your turn next, but as Rosario's walking past you, you ask him what they do with these interviews.\n\n\"These people are from the team's TV network. They play these clips during the season, I think,\" he says. \"Just go in there and be as boring as you can while still answering the questions. Be interested, focused, and professional, but say nothing of interest at all. Trust me. That's what the team wants.\"\n\nHe leaves, and you sit down in front of the interview green screen. You're immediately uncomfortable from the glare and heat of the studio lights. You can't even see the interviewer, but you know she's sitting somewhere in the dark behind the studio equipment.\n\n\"Hi, ${surname}, nice to meet you. First question, what was it like pitching your first full season in the major leagues?\"\n\n*fake_choice\n\t#Be as boring as I can while still answering the question.\n\t\t\"It's such an honor to contribute to this Bulls team,\" you say, trying your hardest to keep your eyes focused as you repeat all the clichés you can think of. \"If they keep sending me out there, I'll do my best to keep contributing. After all, the season is a marathon, not a sprint, so you just have to take it one day at a time.\"\n\t\t*if eloquent \u003c 50\n\t\t\t*set clubhouse_rep %+10\n\t\t\tYou cut off your answer there and await the interviewer's response.\n\n\t\t\t\"Great, that's one down,\" she says as if checking off a list. Maybe that's what she's doing on the tablet. Sounds like you've learned how to talk your way through these interviews already. The team will be glad you're good enough (and boring enough) to take questions after games.\n\t\t\t*goto 3rdyeartraining\n\t\t*else\n\t\t\t*set clubhouse_rep %+5\n\t\t\tYou finish the last word and involuntarily roll your eyes at your own clichés. It just hurt too much to say.\n\n\t\t\t\"All right, got it,\" the interviewer says. Hopefully she didn't notice the eye roll. Just need a little more practice at being boring before the team will want you to pull your own weight in the post-game press conferences.\n\t\t\t*goto 3rdyeartraining\n\t#Speak sincerely about how much I love the fans.\n\t\t*if serious > 50\n\t\t\t*set public_rep %+10\n\t\t\t\"I had a great year, and I have to give all the credit in the world to Bulls fans,\" you say. \"They had my back before, during, and after my injury, and without that, trust me, it's a lot harder for a pitcher. I just hope I can keep performing well to reward them for how great they've been.\"\n\n\t\t\t\"Excellent,\" the interviewer says, and you think you can see the camera lens changing shape slightly, adjusting the focus on your face.\n\t\t\t*goto 3rdyeartraining\n\t\t*else\n\t\t\t*set public_rep %+5\n\t\t\t\"Last year was good, but mostly I want to thank the fans,\" you say. \"There's always a huge crowd of them asking for my autograph before my starts, and it feels great to sign things for them without even charging money. Back in high school I used to charge my friends money for autographs. They didn't like it at the time, but it turns out that was a good investment for them, right? Now they could flip those signed hats and baseballs for probably ten times what they paid me.\" You feel like you got off track somewhere in there. Maybe that story's not as endearing as it sounded in your head.\n\n\t\t\t\"Mm-hmm,\" is all the interviewer says, and she seems ready to move on to the next item of business.\n\t\t\t*goto 3rdyeartraining\n\t#Ignore the question and show off my new strikeout celebrations.\n\t\t*if serious \u003c 40\n\t\t\t*set fame %+10\n\t\t\t\"Last year was good, but this year I have to step up my celebration moves,\" you say. \"I've been thinking about throwing this one down after a big strikeout with the bases loaded.\" You hold your hands up like a boxer and jab the air a few times, setting up a big uppercut punch for the knockout. \"Or maybe if I strike them out with a pitch in the dirt, I give 'em this one.\" You pinch your nose in disgust at the batter's horrible swing. \"Or if I'm just breezing through the lineup, I do this,\" you say, pretending to file your nails in a casual and derisive manner.\n\n\t\t\tThe interviewer, still cloaked in darkness behind the lights, sounds pleased. \"The fans are going to love these. You're going to become famous if you don't watch it.\"\n\t\t\t*goto 3rdyeartraining\n\t\t*else\n\t\t\t*set fame %+5\n\t\t\t\"I had a great year, but I'm hoping I can show a little style in my celebration moves,\" you say. \"I thought I might do a little fist pump after a big third strike. Or I could yell 'Yes!' after one. I'm thinking about stuff like that.\"\n\n\t\t\t\"That's fun,\" the interviewer says, sounding distracted. Maybe you're a little too serious to come up with good celebration moves.\n\t\t\t*goto 3rdyeartraining\n\t#Use this opportunity to talk about my issues with Peter Simon.\n\t\t*set simonsecretout true\n\t\t*if eloquent > 60\n\t\t\t*set clubhouse_rep %-5\n\t\t\t\"On the field, it was a great year,\" you say. \"I joined the rotation, and I pitched pretty well for my first full year.\" You fidget nervously on your chair. \"But behind the scenes, it was a strange year. I hardly had a chance to speak to my pitching coach. I hope this spring he has some time to tutor me so I can pitch even better than last year.\"\n\t\t\t*goto issuescommontext\n\t\t*else\n\t\t\t*set clubhouse_rep %-10\n\t\t\t\"I feel like my good performance was kind of overshadowed by the fact that my pitching coach, Peter Simon, wouldn't even speak to me,\" you say. \"And what's worse, he tried to prevent me from getting a rotation spot. He's got something against me, and I'm getting tired of it.\"\n\t\t*label issuescommontext\n\n\t\tThe room goes silent. After a few moments, the interviewer says \"I'm sorry to hear that.\" She swipes and taps loudly on her tablet, and you hear whispers in the darkness. These aren't journalists, so this isn't going straight into the [i]Journal[/i] or anything, but hopefully word will get around to the owner, or the GM, or anybody who can resolve the situation.\n\t\t*goto 3rdyeartraining\n*label 3rdyeartraining\n\nNine questions and about fifty promo lines later (\"Repeat these phrases after me: This is Bulls territory. Like a Bull in a china shop. Bull's-eye. The Bulls are back in town.\"), you're finally done with the interview. You stumble out, mentally exhausted, and dive back into the calming, familiar blue sky of spring training in Arizona.\n*page_break Back to What I Do Best\nThe offseason hasn't magically solved your issues with the pitching coach, Peter Simon. In fact, he seems to be avoiding you more than he did last year, giving advice and tweaking mechanics only for his favorite players, the ones he used to coach in the minor leagues.\n\nIt's still spring training, though, and you can't let Simon's weirdness ruin your development as a pitcher. What are you going to focus on improving this spring?\n*fake_choice\n\t#I should add some velocity.\n\t\t*set velocity %+10\n\t\t*check_achievements\n\t\t*if not(choice_achieved_purevelocity)\n\t\t\t*if velocity >= 70\n\t\t\t\t*achieve purevelocity\n\t\tHarder. Better. Faster. Stronger. When you're pitching on television, they better have the little pitch velocity flame animation ready, because they'll have to use it every time you throw a fastball.\n\t#I have to refine my control.\n\t\t*set control %+10\n\t\t*check_achievements\n\t\t*if not(choice_achieved_pinpoint)\n\t\t\t*if control >= 60\n\t\t\t\t*achieve pinpoint\n\t\tYou've had too many terrifying moments where you had to throw a strike and just couldn't. It's time to fix that.\n\t#I want to develop my curveball.\n\t\t*if curveball = 0\n\t\t\t*set curveball 50\n\t\t\tYou've toyed around with a curveball in practice before, but you always had to slow your arm down to throw it, so hitters would have recognized it before you even released the ball. Now your arm action looks identical to your fastball, so it's ready to bring into a game.\n\t\t\t*goto checksimonsecret\n\t\t*else\n\t\t\t*set curveball %+10\n\t\t\tThrough constant repetition and a little experimentation with alternate grips, your curveball breaks even harder than it did before.\n\t\t\t*goto checksimonsecret\n\t#I want to develop my slider.\n\t\t*if slider = 0\n\t\t\t*set slider 50\n\t\t\tYou've toyed around with a slider in practice before, but too often you'd hang it and throw essentially a slower, droopier fastball. Now it breaks consistently enough that you feel safe bringing it into a game.\n\t\t\t*goto checksimonsecret\n\t\t*else\n\t\t\t*set slider %+10\n\t\t\tThrough constant repetition and a little experimentation with alternate grips, your slider breaks even harder than it did before.\n\t\t\t*goto checksimonsecret\n\t#I want to develop my changeup.\n\t\t*if changeup = 0\n\t\t\t*set changeup 50\n\t\t\tYou've toyed around with a changeup in practice before, but you always had to slow your arm down to throw it, so hitters would have recognized it before you even released the ball. Now your arm action looks identical to your fastball, so it's ready to bring into a game.\n\t\t\t*goto checksimonsecret\n\t\t*else\n\t\t\t*set changeup %+10\n\t\t\tThrough constant repetition and a little experimentation with alternate grips, your changeup drops a little more than last year, and it still looks like a fastball coming out of your hand.\n\t\t\t*goto checksimonsecret\n\t#I need to improve my fitness.\n\t\t*set fitness %+10\n\t\t*check_achievements\n\t\t*if fitness > 60\n\t\t\t*if not(choice_achieved_ripped)\n\t\t\t\t*achieve ripped\n\t\tReporters love to say an athlete is in \"the best shape of their life\" whether they really did any work in the offseason or not, but in your case, it's true. Now you play better defense and look good doing it.\n*label checksimonsecret\n*if simonsecretout\n\n\tWhen you get back to your gear bag, there's a voicemail on your phone. \"Hi, it's Inés Cruz from [i]The South Texas Journal[/i],\" it says. \"Call me at this number when you get a chance.\" Just what you need, another interview. You're too exhausted to even think about calling her. Whatever story she needs you for, it couldn't be too important in spring training.\n\nSpring passes and you're assigned to the starting rotation to begin the season. The Bulls yet again aren't expected to compete for a playoff spot, but you still have to prove last year wasn't a fluke, and you really are meant to be a starter in the big leagues.\n*page_break The Season Begins\n*label 3rdyear1stgame\nThe slick-hitting Chicago Hogs have come to San Antonio, and you start the game wild, walking the leadoff man. That leadoff man is Roland Boyle, 33 years old, and no longer young by baseball standards. He's trying his hardest to break the league's career stolen bases record, but every year he gets caught more and more often, so this year he's trying something new. While taking a lead off of first base, and yes, in the corner of your eye you can see him doing it right now, Boyle is constantly in motion. He's taking steps one way or the other, back and forth, so it almost looks like he's tap dancing in the dirt.\n\nApparently the idea is to force the pitcher to either make a bad pickoff throw or to ignore his constant movement and not realize when he breaks for second base. It seems like a lot of wasted energy to you, but after you've seen enough dancing in your peripheral vision, you call Rosario to the mound for a quick strategy talk.\n\n\"Don't worry about Happy Feet over there at first,\" Rosario says. \"Check out this hitter. After every pitch, she immediately steps out of the left-handed batter's box to adjust her gloves. Just throw me one pitch and I'll try to pick off Boyle at first base, but, here's the thing, I'll intentionally run into the batter and make a big show of how she got in the way of my throw. She's out of the box, so that's batter's interference, so Boyle will be called out. Great plan, right?\"\n\nThis is either a clever plan or it's cheating. Rosario's going to pretend to be obstructed by the batter to get a call. Are you cool with that?\n*choice\n\t#Doesn't bother me, I'll let Rosario do what he wants to help the team win.\n\t\t*set intimidating %-15\n\t\t*set totalouts +3\n\t\tYou shrug and tell Rosario to have at it. Anything to help the team win. And besides, if the umpire makes the call, it's not really cheating, right?\n\n\t\tOn your very first pitch, the batter takes a strike and Rosario springs up to throw to first to pick off Boyle. The batter steps backward out of the box as expected and Rosario budges into her as he makes his throw, managing to toss the ball weakly to the first baseman. The umpire thinks for a half second then points out at first and makes a an upward fist, signaling out. Boyle stands for a few seconds on first base, confused, then sadly trots back to his dugout. The trick worked perfectly. But something about watching Boyle go back to his dugout, punished for doing nothing wrong (and even his batter didn't really do anything wrong), puts a little twinge of guilt in your chest. Oh well. Game on.\n\t\t*goto fewinningslater3rdyear\n\t#No, we shouldn't cheat against a respected veteran player like Boyle.\n\t\t*set serious %+15\n\t\t*set earnedruns +1\n\t\t*set totalouts +3\n\t\tYou decide not to use the word \"cheat\" precisely, but you make sure Rosario knows you don't want to get a respected veteran like Boyle out on some kind of shameful trickery. Plus, who's to say the umpire wouldn't sniff out what you were trying to do anyway? Rosario puts his mask back on and heads back behind the plate.\n\n\t\tOn your second pitch of the at-bat, Boyle steals second and inches closer to the stolen base record. And after a pitiful groundout and sac fly, he scores the game's first run. You can feel Rosario glaring at you, but there's nothing wrong with playing the game the right way. The more important thing is not to walk the leadoff man next time.\n\t\t*goto fewinningslater3rdyear\n\t#Bad idea. If we're always trying to think of clever tricks, we'll forget to do the normal things that win games.\n\t\t*set analytical %-15\n\t\t*set earnedruns +1\n\t\t*set totalouts +3\n\t\tYou shake your head and tell Rosario to take it easy. Baseball's too hard. It doesn't pay to think of new ways to try and cheat the system. Better to get in the zone and do the job right.\n\n\t\tOn your second pitch of the at-bat, Boyle steals second and inches closer to the stolen base record. And after a pitiful groundout and sac fly, he scores the game's first run. It wasn't a positive result this time, but over the fullness of a game, a season, or a career, it's better to focus on yourself than to think of ways to get artificial edges beyond your talent and ability.\n\t\t*goto fewinningslater3rdyear\n\t#No way, I'll get that tap dancing idiot out myself.\n\t\t*set intimidating %+15\n\t\t*set totalouts +3\n\t\t*check_achievements\n\t\t*if intimidating > 60\n\t\t\t*if not(choice_achieved_looming)\n\t\t\t\t*achieve looming\n\t\tYou shoo off Rosario's plan in favor of your own: Just pick that jerk off. You come set for the first pitch, peek over at Boyle, look back at home plate, then with one fluid movement, make a snap throw to first. Safe. The old man is still agile enough to dive back into first.\n\n\t\tYou come set again, let Boyle start his dance routine again, look at home plate again, then throw a bullet right at the first base bag. Boyle dives back toward first base. Your first baseman scoops the ball and applies the tag. Boyle is out. You pound your fist into your glove in celebration and look right at Rosario as if to say, \"See, no cheating required.\" That should scare off the next runner who takes a lead off of first against you.\n\t\t*goto fewinningslater3rdyear\n*label fewinningslater3rdyear\n*page_break A Few Innings Later\n*gosub_scene 2ndYear resetgame\n*set totalouts 10\n*set earnedruns 2\n*set runnerfirst true\n*set runnersecond true\n*set runnerthird true\nThe game moves along to the fifth inning, and your shoulder is already throbbing in your first start of the year. You've allowed two runs at this point, and now you've worked yourself into trouble this inning, loading the bases on a line drive single and two walks.\n\nThe second baseman for the Hogs, Mai Shimoda, comes to bat. She's an unusual player, a recent import from the Japanese professional league. She can drop the ball virtually wherever she wants in the infield with a perfect bunt, then zip to first base before the defense can make a play. If you can't strike her out, she's likely to get a bunt down and at least avoid the double play, scoring a run. You'll have to pitch carefully.\n\n*gosub_scene 2ndYear situationtext\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 7\n*set batterpower 0\n*set batterhand \"left\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 3rdyear1stgameatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 3rdyear1stgameatbatloop\n\n*label 3rdyear1stgameatbatloop\n*if atbatresult = \"single\"\n\t*set userruns +1\n\t*set earnedruns +1\n\t*set losses +1\n\tShimoda gets the bunt down, and you can immediately tell it's a good one. The ball follows her heels down the baseline like a well-trained dog going for a run, staying just barely in fair territory. You know you can't get to the ball before she reaches first, so you stand over it, praying that it will roll foul. It never does.\n\n\tA run scores. You scoop the ball off the ground with your glove, and Kingston leaves the dugout to take it from you and ritually hand it over to the relief pitcher. There's nothing more frustrating than being beaten by a bunt.\n\t*goto endof3rdyear1stgame\n*elseif atbatresult = \"double\"\n\t*set userruns +2\n\t*set earnedruns +2\n\t*set losses +1\n\tShimoda bunts the ball hard to the left side of the infield, and your third baseman dives to her left. But she can't come up with it. The ball rolls into the outfield and your shortstop picks it up, turns, and throws to first, for some reason. Shimoda is easily safe, but now the ball is trickling slowly across the infield grass in no man's land between you, the second baseman, the first baseman, and the catcher.\n\n\tTwo runners score in the chaos, but the official scorer decides not to give the shortstop an error for his poor throw and poor decision-making. Bad luck, but Kingston is walking up the dugout steps, which means that's it for you today.\n\t*goto endof3rdyear1stgame\n*elseif atbatresult = \"triple\"\n\t*set userruns +3\n\t*set earnedruns +3\n\t*set losses +1\n\tShimoda peeks over at the first baseman and sees him straying just a bit too close to try and field the bunt, so at the last second she pulls her bat back and swings, slapping the ball over his head into the right field corner. All three runners score, and Shimoda ends up with a triple on the play.\n\n\tKingston comes out of the dugout to get a reliever, and after the embarrassment of giving up a triple to a bunt specialist, you're happy to get out of the spotlight for a while.\n\t*goto endof3rdyear1stgame\n*elseif atbatresult = \"home run\"\n\t*set userruns +4\n\t*set earnedruns +4\n\t*set losses +1\n\tShimoda peeks over at the first baseman and sees him straying just a bit too close to try and field the bunt, so at the last second she pulls her bat back and swings, slapping the ball over his head into the right field corner. The ball gets wedged in the corner under the wall padding and the right fielder has trouble picking it up, so Shimoda comes all the way around to score on an inside-the-park home run.\n\n\tKingston comes out of the dugout to get a reliever, and after the embarrassment of giving up a home run to a bunt specialist, you're happy to get out of the spotlight for a while.\n\t*goto endof3rdyear1stgame\n*elseif ((atbatresult = \"groundout\") or (atbatresult = \"lineout\")) or (atbatresult = \"flyout\")\n\tShimoda bunts the ball hard to the right, and you catch up to it just behind your mound, running out towards where the second baseman would usually play. In this split second, you have to decide where to throw.\n\n\tYou can throw to first to get Shimoda out, keeping things as simple as possible to try and get one out while conceding the run.\n\n\tOr you can spin around and throw home to get the lead runner, preventing a run, but it will be a tricky maneuver to make, going against your momentum, requiring some athleticism and fitness.\n\n\tOr you can throw to second to try and get a double play, which will both prevent the run and get you out of the fifth inning, but will require you to both display peak physical fitness to get the footwork in place to make the throw, then will require you to make a hard and accurate throw to second base.\n\n\tWhere do you throw?\n\n\t*choice\n\t\t#I throw to first for the easy out, conceding a run.\n\t\t\t*if fitness > 45\n\t\t\t\t*set totalouts +1\n\t\t\t\t*set userruns +1\n\t\t\t\t*set earnedruns +1\n\t\t\t\t*set losses +1\n\t\t\t\tYou run to the ball, scoop it up with your glove, transfer to your other hand then lightly toss to first to get the out. The runner from third scores, but you've avoided disaster so far. Unfortunately, Kingston's going to take you out of the game now for a reliever. Besides Mendis, the bullpen has been a mess for weeks now, and the relievers live up to their usual standard today, giving up four more runs over the next couple of innings and losing the game.\n\t\t\t\t*goto endof3rdyear1stgame\n\t\t\t*else\n\t\t\t\t*set userruns +1\n\t\t\t\t*set earnedruns +1\n\t\t\t\t*set losses +1\n\t\t\t\tYou chug towards the ball and pick it up, but your momentum coming off the mound forces you over, rolling onto the ground as you impulsively throw the ball somewhere in the direction of first base. Once you get up, you see Shimoda standing safely at first, and the run scored. You might want to work on your fitness to avoid any future embarrassment like this. Kingston takes you out of the game for a reliever, so that's where your day ends. Besides Mendis, the bullpen has been a mess for weeks now, and the relievers live up to their usual standard today, giving up four more runs over the next couple of innings and losing the game.\n\t\t\t\t*goto endof3rdyear1stgame\n\t\t#I spin and throw home to get the lead runner, but no chance at a double play.\n\t\t\t*if fitness > 50\n\t\t\t\t*set totalouts +1\n\t\t\t\tYou spring off the mound, pick up the ball, turn and throw to Rosario at home plate. He gets the forceout at home, but Shimoda is too fast for him to even attempt a double play at first. The run didn't score, so you made a good play, but Kingston is going to take you out of the game now for a reliever. Besides Mendis, the bullpen has been a mess for weeks now, and the relievers live up to their usual standard today, giving up four more runs over the next couple of innings and losing the game.\n\t\t\t\t*goto endof3rdyear1stgame\n\t\t\t*else\n\t\t\t\t*set userruns +1\n\t\t\t\t*set earnedruns +1\n\t\t\t\t*set losses +1\n\t\t\t\tYou hurtle off the mound, grab the ball, turn one eighty towards home plate and fling the ball in that general direction. Your body keeps moving after the throw, so it takes you a few seconds to realize Rosario got pulled off home plate by the throw and did not record the out, so everyone is safe and a run has scored. Kingston's coming out of the game to replace you with a reliever now. Besides Mendis, the bullpen has been a mess for weeks now, and the relievers live up to their usual standard today, giving up four more runs over the next couple of innings and losing the game.\n\t\t\t\t*goto endof3rdyear1stgame\n\t\t#I go for the highlight reel, making a running throw to second to start a double play.\n\t\t\t*if ((fitness > 50) and (control > 50)) and (velocity > 55)\n\t\t\t\t*set totalouts +2\n\t\t\t\t*set wins +1\n\t\t\t\t*set highlights +1\n\t\t\t\tYou spring off the mound, scoop up the ball with your glove, and, with fantastic athleticism and poise, throw the ball straight from your glove hand directly to the shortstop at second base, allowing him to throw to first and complete the double play. If you had even taken the time to transfer the ball from glove to hand, you wouldn't have gotten the double play, but that fantastic, instinctual play worked perfectly. You're at 105 pitches, so that ends your day on the mound, but you got through the fifth inning and come out with a win.\n\n\t\t\t\tThat ends the inning, and your diving scoop-throw play makes it onto the TV highlight shows. It took great fitness and fantastic balance and arm strength to complete the play. You're replaced with a reliever, and the bullpen closes out the game successfully, earning a rare win in this rough second half of the season.\n\t\t\t\t*goto endof3rdyear1stgame\n\t\t\t*elseif (fitness > 50) and ((control \u003c= 51) or (velocity \u003c= 55))\n\t\t\t\t*set totalouts +1\n\t\t\t\t*set userruns +1\n\t\t\t\t*set earnedruns +1\n\t\t\t\t*set losses +1\n\t\t\t\tYou spring off the mound, scoop up the ball with your glove, and transfer to your throwing hand to throw to second. The shortstop makes the catch and gets a forceout at second base, but his throw to first isn't in time. The run scores, but you got the second out, so it's still a good play on your part. If you were just a little stronger or had better balance, maybe you could have done a scoop-throw with your glove instead of changing hands, but that would have been a remarkable play.\n\n\t\t\t\tYou did what you could with the situation, but Kingston comes out to replace you with a reliever. Besides Mendis, the bullpen has been a mess for weeks now, and the relievers live up to their usual standard today, giving up four more runs over the next couple of innings and losing the game.\n\t\t\t\t*goto endof3rdyear1stgame\n\t\t\t*else\n\t\t\t\t*set userruns +1\n\t\t\t\t*set earnedruns +1\n\t\t\t\t*set losses +1\n\t\t\t\tYou hurtle off the mound, dive for the ball on the ground, and grab it but can't get back up in time to make the throw to second. All hands are safe and a run scores. A lot of things have to go right if you're going to make an outstanding defensive play like that. Kingston comes out of the dugout to replace you with a reliever, and that's the end of your day. Besides Mendis, the bullpen has been a mess for weeks now, and the relievers live up to their usual standard today, giving up four more runs over the next couple of innings and losing the game.\n\t\t\t\t*goto endof3rdyear1stgame\n*elseif atbatresult = \"walk\"\n\t*set userruns +1\n\t*set earnedruns +1\n\t*set losses +1\n\tShimoda pulls the bat back from her bunting position to take ball four, walking in a run. Kingston comes up to replace you with a reliever. You would be mad, but your arm is so tired at this point after 107 pitches that you're ready to get out of here. The bullpen gives up a handful more runs, and it's yet another loss in this rough second half of the season.\n\t*goto endof3rdyear1stgame\n*elseif atbatresult = \"strikeout\"\n\t*set outs +1\n\t*set totalouts +1\n\t*set userstrikeouts +1\n\t*set strikeouts +1\n\tShimoda stands awkwardly, squared around to bunt but with the ball safely in the catcher's glove. She only strikes out a handful of times every year, so she looks shocked as she heads back to her dugout.\n\n\tThat's only the second out of the inning, but you've thrown 105 pitches, so Kingston comes out to get a reliever. The bullpen closes out the game successfully, earning a rare win in this rough second half of the season.\n\t*goto endof3rdyear1stgame\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 3rdyear1stgameatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 3rdyear1stgameatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 3rdyear1stgameatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 3rdyear1stgameatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 3rdyear1stgameatbatloop\n\n*label endof3rdyear1stgame\n*page_break A Few Weeks Later\n*set wins +1\n*set losses +2\n*set totalouts +36\n*set earnedruns +5\n*set strikeouts +10\nOne night after a hard-fought away game against the Oklahoma City Ranchers, you relax in the hotel bathtub, soaking your sore muscles in a frothy mix of soap, water, and hair products. Your phone softly buzzes through the pocket of your jeans against the tile floor, so you grab it and answer.\n\n\"Hello, this is Inés Cruz from the [i]The South Texas Journal[/i],\" you hear over the phone. Cruz's voice has a flowing, warm, wooden tone, a strong asset for someone who has to bother people all day with questions. The team should hire her to narrate the scouting report for your next start, just put it on a CD and send it to you. \"The third baseman has a slow bat that can't keep up with high heat,\" her deep voice would inform you, enunciating every syllable, maybe edited over a bed of ambient music. \"Their number eight hitter tends to take the first pitch, but he will ambush anything left middle-in.\" It all sounds so good in your imagination that you realize you didn't hear whatever she just said to you in the real world.\n\n\"I'm sorry, I uh, forgot to put the phone on speaker,\" you lie. \"Could you say that one more time?\"\n\n\"I have a source that says there's some kind of clubhouse brouhaha surrounding your pitching coach, Peter Simon. Is there anything you can add on this?\"\n*choice\n\t#Tell her everything I know and get the story out there.\n\t\t*set rebellious %+10\n\t\t*set simonsecretout true\n\t\t\"That's right,\" you say. \"Simon only helps the players he used to coach in the minor leagues. Any new arrivals to the team have to figure their problems out for themselves. I watch video of myself or ask some of the other folks to try and figure out where my throwing mechanics are getting fouled up, but it's not easy. This team needs a coach.\"\n\n\t\tThe line stays silent for a moment. \"Interesting,\" Cruz says. \"Sorry, I'm just typing some notes. Why would he only coach players from his minor league days? Is he just uncomfortable with new people? You can't play favorites so much that you won't even work with the other pitchers, right?\"\n\n\t\tYou talk back and forth about the issue for another twenty minutes or so, long enough that your fingers and toes prune up and the bath water gets cold, but you don't have a good answer for many of her questions. She's right, you don't know for sure why Simon is so resistant to working with new pitchers.\n\n\t\t\"Thanks for the talk,\" Cruz says, wrapping up the conversation. \"I don't have enough to write about this yet, but I'll let you know if I get to that point. And I'll keep you anonymous in the story.\" You hang up and towel off, suddenly nervous that the team might learn you leaked the information to Cruz. But you will do whatever it takes to resolve this issue for your pitching staff.\n\t\t*goto 3rdyear2ndgame\n\t#Show loyalty to the team by lying, saying Simon has been incredibly supportive.\n\t\t*set rebellious %-10\n\t\t*set simonsecretout false\n\t\t\"I don't know about that, but Simon has been a huge help for me both on and off the field,\" you hear yourself lie. \"I'm still a young player getting my feet wet in the big leagues, and I don't know what I'd do without his guidance.\"\n\n\t\t\"Hmm. Okay,\" Cruz says, flustered. You wonder who might have told her about the conflict, and if she knows for absolute certain that you're lying. \"Well, that's all I had to ask you. I hope everything's going well for you, and give me a call if you learn anything.\" She hangs up. You settle in to study scouting reports for tomorrow's start against the Ranchers.\n\t\t*goto 3rdyear2ndgame\n\t#Subtly acknowledge the story is true but make light of it.\n\t\t*set eloquent %+5\n\t\t*set cruz_rel %+5\n\t\t*set simonsecretout false\n\t\t*check_achievements\n\t\t*if eloquent > 60\n\t\t\t*if not(choice_achieved_mellifluous)\n\t\t\t\t*achieve mellifluous\n\t\t\"Well, there are little scraps here and there about his coaching style,\" you say. \"But honestly, I've probably seen more fights about his hairstyle. He claims his mustache just 'naturally' curls that way, but that can't be true, can it? He probably spends all night messing with it until he thinks it's perfect. Every time one of us isn't looking, he's probably combing it in the dugout. Rosario and I should start a petition to get him to shave it if we get into another losing streak.\"\n\n\t\tCruz makes a series of light coughing noises as you talk, trying not to laugh. \"That's why I call you, to get this kind of inside scoop,\" she says, barely getting the words out. \"I'll let you know if I'm going to write a story about Simon, whether or not I include anything about his grooming habits, all right? Bye for now.\" She hangs up, and you're left to study up for tomorrow's start against the Ranchers.\n\t\t*goto 3rdyear2ndgame\n*label 3rdyear2ndgame\n*page_break On to the Game\n*gosub_scene 2ndYear resetgame\n*set runnerfirst true\n*set runnerthird true\nIt's your turn to face the Ranchers today, and you're an out away from a complete game shutout. The Bulls are leading 2-0 in the bottom of the ninth, but you've given up a walk and a single, so there are now runners at first and third threatening to ruin your almost flawless start. The Ranchers' left fielder, Joey Piedmont, loosely waves through the air with a few practice swings then comes to the plate. He's right-handed and bulky, a real power hitter. You have to decide what to throw him.\n\n*gosub_scene 2ndYear situationtext\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 3\n*set batterpower 5\n*set batterhand \"right\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 3rdyear2ndgameatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 3rdyear2ndgameatbatloop\n\n*label 3rdyear2ndgameatbatloop\n*if (((atbatresult = \"single\") or (atbatresult = \"double\")) or (atbatresult = \"triple\")) or (atbatresult = \"home run\")\n\t*set userruns +1\n\t*set earnedruns +1\n\tPiedmont smacks a hard line drive to the right side of the infield, but as the second baseman scoots over to try and snag it, she tweaks something and crumples to the ground. The ball shoots out into right field. The runner from third scores and the runner from first is about to round second and run to third.\n\n\tBecause the second baseman is out of commission, there's no one to take the relay throw from the right fielder and throw out the runner from third. Normally, your assigned task would be to back up third base to make sure the relay throw doesn't go wild and allow the runner to score. But the player running to third is not exactly burning around the basepaths, so you or the shortstop could go out for the relay throw to get him out and end the game. Or maybe you should check on the second baseman and make sure that she's okay. That might be more important than the result of this one little play in a regular season game.\n\t*choice\n\t\t#I do what I'm supposed to: Sprint over and back up third base in case the throw gets by him.\n\t\t\t*set wins +1\n\t\t\t*if fitness > 45\n\t\t\t\t*set rebellious %-10\n\t\t\t\tYou hustle to back up third base, following standard procedure. Because the second baseman collapsed, the right fielder throws the ball to the shortstop who is lazily covering second base, preventing either runner from advancing further. The Bulls still lead 2-1 but you're coming out of the game.\n\n\t\t\t\tMendis comes in and locks down the one-out save by striking out the next batter. Thanks to your calm adherence to the regular procedure during a tense and unusual situation, the Bulls came away with the win, though you didn't manage to get your first ever shutout.\n\t\t\t\t*goto endof3rdyear2ndgame\n\t\t\t*else\n\t\t\t\t*set rebellious %-5\n\t\t\t\tYou hustle toward third base but don't manage to get there before the ball is already at second base, preventing either runner from advancing further. Everything ends up the way it would have, but your coaches probably noticed you were too out of shape to even back up third in time for the throw. You may need to work on that in the future. For now, Kingston's going to bring in the closer to attempt to finish your game.\n\n\t\t\t\tMendis comes in and locks down the one-out save by striking out the next batter. Thanks to your calm adherence to the regular procedure during a tense and unusual situation, the Bulls came away with the win, though you didn't manage to get your first ever shutout.\n\t\t\t\t*goto endof3rdyear2ndgame\n\t\t#I cover second base and yell at the shortstop to go out for the relay throw.\n\t\t\t*set wins +1\n\t\t\t*if intimidating > 55\n\t\t\t\t*set totalouts +1\n\t\t\t\t*set clubhouse_rep %+10\n\t\t\t\tAs you run to second base, you scream at the shortstop to go out for the relay throw. Thanks to your commanding tone, all he has to do is nod and do as you commanded, jogging out into short right field, catching the throw from the right fielder, and relaying it on towards third base. It's a close play at the bag, and the umpire hesitates to make a call. After what feels like a minute and a half, he demonstratively pumps his arm and yells \"Out!\"\n\n\t\t\t\tThe game is over, and though you lost the shutout, you more than earned your win. It's a big moment, and it took more than just your pitching ability to get it done. Thankfully, you've got an authoritative, intimidating voice to go along with knowing what to do in a moment of crisis.\n\t\t\t\t*goto endof3rdyear2ndgame\n\t\t\t*else\n\t\t\t\t*set clubhouse_rep %-10\n\t\t\t\tAs you run to second base, you scream at the shortstop to go out for the relay throw. But your voice doesn't carry the intimidating authority one needs to get an order across like that with the crowd roaring and a lot of confusing movement all around the field. The shortstop shrugs his shoulders in confusion, unsure what you're asking him to do, and you end up both covering second base at the same time.\n\n\t\t\t\tKingston comes out to replace you with Mendis to close out the game. \"What are you doing covering second on that play?\" she asks you rhetorically as you walk off the field, and there's no reason to try and explain what happened to her. Thankfully, Mendis strikes out the last batter and you and the Bulls get the win anyway.\n\t\t\t\t*goto endof3rdyear2ndgame\n\t\t#I check on the second baseman to see if she's okay.\n\t\t\t*set wins +1\n\t\t\tYou run out toward the second baseman to check on her. She has no idea what happened, just that she collapsed and didn't make the play. A photograph of you tending to your hurt teammate gets some play on sports TV and websites as an example of kindness under fire. The runner advances to third, so there's still one more out to get, but that doesn't matter as much as making sure your teammate is all right.\n\t\t\t*if rebellious > 50\n\t\t\t\t*set fame %+10\n\n\t\t\t\t\"What the hell are you doing?\" Kingston yells as she exits the dugout. \"She'll be fine, just do your job!\" You've noticed the manager getting increasingly fed up with you, maybe out of a sense that you don't put the team first. She's generally a kind person, but she prizes loyalty and that's just not something you value very highly in yourself. If it helps you or someone else, who cares about the team? Kingston chews you out and takes you out of the game for Mendis, who strikes out the last batter to win the game.\n\t\t\t\t*goto endof3rdyear2ndgame\n\t\t\t*else\n\t\t\t\t*set clubhouse_rep %+10\n\n\t\t\t\tKingston comes out of the dugout to take you out of the game. \"I know you care about the team,\" she says, \"but next time, please just finish out the play. Let the coaching staff worry about the injury, it's not like you're a field nurse out here or anything. Now hit the bench, Mendis will finish this game out for us.\" Indeed, Mendis comes into the game and strikes out the next batter, winning the game. And you can tell the team appreciates your kindness for another player.\n\t\t\t\t*goto endof3rdyear2ndgame\n\t\t#I go to s
