s against the next three hitters and keep a clean inning. Canham is stranded at second. That's the way to focus up.\n\t\t\t*goto afewinningslateryear5\n*label afewinningslateryear5\n*page_break A Few Innings Later\n*set totalouts +15\n*set strikeouts +5\n*set outs 2\nEverything's coming out of your hand great today. You've gone eight and two thirds innings and you've only given up a walk and an error. You try not to think about it, but it's unavoidable: You're an out away from a no-hitter. The pressure is unbearable, and your arm feels like it's going to fall off. But it's just one more hitter. You can do this.\n\n*label resetpointfor2ndatbat\n\n*gosub_scene 2ndYear situationtext\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 3\n*set batterpower 2\n*set batterhand \"right\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 5thyear2ndgameatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 5thyear2ndgameatbatloop\n\n*label 5thyear2ndgameatbatloop\n*if atbatresult = \"single\"\n\t*set wins +1\n\tThe batter hits a sharp ground ball to the right side of the infield. The first baseman instinctively goes to the bag to take the throw, but maybe he should have tried to stop the ball instead. The second baseman ranges as far as she can and dives for the ball, but it trickles into the outfield. The no-hitter is gone, and you're going to come out of the game now before your arm really does fall off. Tough ending to a great start.\n\t*goto endof5thyear2ndgame\n*elseif atbatresult = \"double\"\n\t*set wins +1\n\tThe batter hits a sharp line drive over the first baseman's head, and it earns him a double. So much for the no-hitter, but a reliever will replace you now to try and finish the win. Disappointing to miss out on the no-hitter, but you had a great game.\n\t*goto endof5thyear2ndgame\n*elseif atbatresult = \"triple\"\n\t*set wins +1\n\tThe batter hits a deep fly ball that bounces off the outfield wall and gets by the center fielder, rolling around long enough for the batter to reach third base. The no-hitter is gone, and the manager comes out to point to the bullpen and take you out. It'll be a miracle if your elbow is intact after throwing 120+ pitches out there.\n\t*goto endof5thyear2ndgame\n*elseif atbatresult = \"home run\"\n\t*set earnedruns +1\n\t*set userruns +1\n\t*set wins +1\n\tYour pitch strayed a little further over the plate than you meant, but it wasn't a bad one. Unfortunately, the hitter guessed correctly and smacked it over the left field fence for a home run. Your team's still ahead by one, but the no-hitter is gone and you'll be replaced by a reliever now. Losing the no-hitter and the shutout is tough, but it was a great start.\n\t*goto endof5thyear2ndgame\n*elseif ((atbatresult = \"groundout\") or (atbatresult = \"lineout\")) or (atbatresult = \"flyout\")\n\t*set totalouts +1\n\t*set anecdotes +1\n\t*set wins +1\n\t*achieve nohitter\n\t*check_achievements\n\t*if not(choice_achieved_memoirmaterial)\n\t\t*achieve memoirmaterial\n\tYou left a pitch a little too high and the batter hits a scorching line drive to the outfield. You don't even look, just crouching in frustration on the mound for losing the no-hitter with only one out left to get.\n\n\tBut when you hear the home crowd roar and applaud, you look up. Your right fielder caught it, making a desperate dive to scoop it at the final instant before the ball touched the ground. It's a no-hitter! Roberts rushes the mound and lifts you up in the air, celebrating the high point of your season, and maybe your entire career.\n\t*goto endof5thyear2ndgame\n*elseif atbatresult = \"walk\"\n\t*if (runnerfirst = false)\n\t\t*set runnerfirst true\n\t\tThe batter takes his base. The tying run comes to the plate, but your no-hitter is still intact. You catch a glimpse of your manager struggling, wondering whether to take you out of the game, but nope, it's all yours. You're exhausted, but all you have to do is get this next hitter out and it'll all be over.\n\t\t*goto resetpointfor2ndatbat\n\t*else\n\t\tBack-to-back walks, and now you're at 125 pitches and visibly exhausted on the mound. Your manager has seen enough, and leaves the dugout to take you out of the game. The no-hitter isn't worth risking an injury, you suppose, but it's still a heart-breaking moment. And it only gets worse when your reliever gives up a walk-off home run to the next batter, and even after all that the Bulls still manage to lose. Unbelievable.\n\t\t*goto endof5thyear2ndgame\n*elseif atbatresult = \"strikeout\"\n\t*set outs +1\n\t*set totalouts +1\n\t*set strikeouts +1\n\t*set userstrikeouts +1\n\t*set wins +1\n\t*set anecdotes +1\n\t*achieve nohitter\n\t*check_achievements\n\t*if not(choice_achieved_memoirmaterial)\n\t\t*achieve memoirmaterial\n\tStrike three, the umpire signals, and Portia Roberts flips off her mask to run up and hug you. You finished the no-hitter with style, and now your name and today's date will be in the record books forever. It's been a rough season, but a highlight like this makes you forget about all that, at least for a little while.\n\t*goto endof5thyear2ndgame\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyear2ndgameatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyear2ndgameatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyear2ndgameatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyear2ndgameatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyear2ndgameatbatloop\n\n*label endof5thyear2ndgame\n*page_break A Few Weeks Later\n*set totalouts +18\n*set wins +1\n*set earnedruns +3\n*set strikeouts +4\nIn the final game of the season, you're watching from the dugout, casually dodging sunflower seeds being tossed at you by Connor Harris. The Bulls are ahead by one run in the eighth inning. Portia Roberts is out in left field for only the second time this year, left in the game in case the current catcher gets hurt.\n\nYou come upon a tactic to get Connor to stop throwing seeds at you: ask him if Roberts will try her ball juggling strategy she mentioned back in spring training. Just as the words are starting to leave your mouth, the visiting team's batter triples, putting her in exactly the right situation to test out her strategy. You reach over the dugout railing and raise your arms out toward her. She points two fingers at her eyes, then at you. She knows and you know, this could be the moment. All you need is for one of the next two hitters to hit a fly ball out toward her.\n\nConnor gets up next to you on the railing to watch, riveted. The next hitter strikes out, making you and Connor pound the railing in frustration. Hopefully no one saw you root against your team for a moment there. There's now one out, and on the fourth pitch of the at-bat, the ball slips past the catcher, and you put your head in your hands. But when you look back up, the runner got cold feet and didn't try to score on the wild pitch. The ball juggle scenario is still in play.\n*page_break Please Hit a Fly Ball to Left Field\nTwo pitches later, it happens: A fly ball is hit deep to left field. Too deep? Is it a home run? Over her head? Portia stumbles backwards, trying to keep pace with the ball in flight. She reaches out at the last second, glove closed, and…doesn't catch the ball. She punches it up in the air, glove closed, juggling it above her repeatedly as she jogs in toward the outfield, bringing the ball with her in bounces above her head.\n\nConnor starts to celebrate, but you hold his arm down. You look towards the runner. He's frozen between third and home, and you can hear the third base coach yelling: \"Go home! Home! Wait? Come back, come back, come back! No? What's she doing?\" The runner panics halfway between third and home, unsure what he's supposed to do. Eventually he decides to sprint back toward the base at third, and Roberts, now almost all the way to the infield dirt, throws to the third baseman. He catches, reaches down, and tags the runner. He's out! It worked! The dumb idea worked!\n\nConnor is…yes, he's actually crying. You're hopping up and down. It's the dumb moment this season was made for, the culmination of all the pointless losing baseball you've played all year. When she comes back to the dugout, Portia gets a mixture of high fives and confused looks from her Bulls teammates. When she gets to you, she says\n*if supportportia\n\t\"You always believed in me, didn't you? Come here,\" and gives you one of those big, forceful-slap-on-the-back baseball hugs. What a stupid, beautiful game this is.\n\t*goto wheretonextyeartraded\n*else\n\t\"And you didn't think it was possible, huh? I thought you said it would never work? What was it you said again?\" You just laugh and high five her, rather than be a jerk and point out that it wouldn't have worked if the runner didn't panic. The rules allow the runner to leave third base as soon as the fielder touches the ball, whether she catches it or not. But there's always been a little room for diversion tactics in baseball. It's no better than the hidden ball trick.\n\t*goto wheretonextyeartraded\n*label wheretonextyeartraded\n*page_break The Season Ends\nShortly after the season, the general manager of the San Antonio Bulls reaches out to ask you if you are happy with the team as it is. If you're unhappy playing for a young, losing team like this one, he says he'd be willing to include you in offseason trade discussions.\n\n*if longtermcontract\n\tIn a twist of fate, that three-year contract you signed to keep you with the Bulls is having the opposite effect. Now that they have the certainty of knowing how much you'll cost for the foreseeable future, other teams are lining up to trade for you. The New York Barons and Florida Capers in particular have made strong trade offers to the Bulls, but the GM insists that it's up to you if you want to leave the team or not.\n\t*goto rebuildingornot\n*else\n\tIn fact, two teams have already reached out to him asking about your availability: The New York Barons and the Florida Capers. But he says it's totally up to you whether you leave the Bulls or not.\n\t*goto rebuildingornot\n\n*label rebuildingornot\n\nYou can always stick with the San Antonio Bulls and be the big fish in a small pond. But as you know, the team is going through \"a rebuilding stage,\" meaning they aren't very good right now. And there's not much hope that they'll get better any time soon. It can get tough playing for a team that has no hope of winning it all, even though it would feel good to reward the fans by staying loyal to one team for your whole career.\n\nThe New York Barons don't really need more pitchers right now, but they can always spend resources to add more players anyway, so they're interested in acquiring the Bulls' best player: you. The Barons are a venerable, highly respected team, and whether they'll say it or not, every baseball player wants to play for them someday. But their sports media is famously vicious, pushing and prying into players' psyches and personal lives in a desperate competition for stories. You'll have to be eloquent and even-keeled to deal with the New York media.\n\nSurprisingly, the team offering the most for your services is the Florida Capers, who were always a good team when you faced them, but never a playoff team. They seem to be trading prospects and spending money to make a run at a championship before their star player, Giulio Camporese, leaves as a free agent in a couple of years. It's not a team with a history of winning, but they seem to be going all-out for it now. Maybe it would be exciting to play for a team on the rise.\n*fake_choice\n\t#Stick with the rebuilding San Antonio Bulls.\n\t\t*set nextteam \"Bulls\"\n\t\tYou're tired of all the rumors that \"${surname} wants to flee the sinking Bulls ship,\" and \"${surname} thinks ${heistheyare} better than the Bulls.\" You tell the GM that you want to stay, and your teammates, especially Roberts and Connor, text you, excited to hear the news that you don't want to leave them after all. Sure, it's not a good team, but it's what you know and where you want to stay. And hey, maybe if you keep pitching well, they'll build a statue of you here before it's all over, you think. Then you wonder if it's a little conceited to imagine a statue of yourself. But then you can't help but wonder what pose your statue would be in. Mid-windup? Mid-delivery? Celebrating after some theoretical future championship win?\n\t#Play under the spotlight with the New York Barons.\n\t\t*set nextteam \"Barons\"\n\t\tYou give the GM your decision in October, and during the GM Winter Meetings about two months later, the news finally comes out: ${surname} traded to the New York Barons for two prospects you've never heard of. No one is surprised to see the Bulls trade another of their established players, and debate rages online about whether the trade was good for the Bulls or not, with no one except those in the innermost baseball circles knowing that you requested the trade yourself.\n\n\t\tYou thought reaching the major leagues would represent the peak of your career, but you can't deny that New York feels like yet another step up the ladder. Now the world is watching you, and that's thrilling, and terrifying, and it will feel good to pitch meaningful innings again for a team that might win a championship.\n\t#Go for a championship with the Florida Capers.\n\t\t*set nextteam \"Capers\"\n\t\tYou give the GM your decision in October, and during the GM Winter Meetings about two months later, the news finally comes out: ${surname} traded to the Florida Capers for three prospects you've never heard of. No one is surprised to see the Bulls trade another of their established players, and debate rages online about whether the trade was good for the Bulls or not, with no one except those in the innermost baseball circles knowing that you requested the trade yourself.\n\n\t\tYou don't know anything about minor league prospects, but the GM says the Capers went all-out to acquire you, offering more and better players than any other team. Something feels kind of good about being part of this hastily assembled, big-money team that wants to win it all right now. Every player on your new team will feel like a mercenary, brought in from somewhere else to do some important dirty work and getting paid handsomely for their efforts. If they don't get along, maybe it'll be a disaster, but for now, it sounds fun.\n*finish\n", "6thyear": "*temp baseera ((earnedruns / (totalouts / 3)) * 9)\n*temp baseeradecimals ((baseera modulo 1) * 100)\n*temp erawholenumber (baseera - (baseera modulo 1))\n*temp erafirstdecimal ((baseeradecimals / 10) - ((baseeradecimals modulo 10) / 10))\n*temp eraseconddecimal ((baseeradecimals - (erafirstdecimal * 10)) - (baseeradecimals modulo 1))\n*temp disperawholenumber (round(erawholenumber))\n*temp disperafirstdecimal (round(erafirstdecimal))\n*temp disperaseconddecimal (round(eraseconddecimal))\n*temp endorser \"none\"\n*set year5era \"${disperawholenumber}.${disperafirstdecimal}${disperaseconddecimal}\"\n*set year5wins wins\n*set year5losses losses\n*set year5strikeouts strikeouts\n*set currentyear 6\n*set earnedruns 0\n*set totalouts 1\n*set wins 0\n*set losses 0\n*set strikeouts 0\n*if nextteam = \"Capers\"\n\t*set year6team \"FLC\"\n\t*if year5team = \"TSU\"\n\t\t*achieve journeyman\n\t*goto startchapter6\n*elseif nextteam = \"Bulls\"\n\t*set year6team \"SAB\"\n\t*goto startchapter6\n*elseif nextteam = \"Barons\"\n\t*set year6team \"NYB\"\n\t*if year5team = \"TSU\"\n\t\t*achieve journeyman\n\t*goto startchapter6\n*else\n\t*bug\n*label startchapter6\n*text_image chap_6.png center Year 6: Out of the Park\n\nYou wake up and scroll past headlines on your phone. The Baltimore Blue Crabs won the American Football Championship. A game developer called Cosine had a disastrous IPO, with shares dropping 40% in just the first day. A company called Zhenghe plans to open a lunar base for tourism by 2025. Oh, and you have one voicemail.\n\nThe voicemail says, \"Hi, it's Inés Cruz. I'm with NSN.com now. Call me back and let's set up a time for an in-person interview.\" She didn't even phrase it as a question. With the authority of the National Sports Network at her back, Cruz doesn't have to ask for an interview, she can demand it. Because of the huge TV contract between the league and NSN, it's not really your choice if someone at NSN wants to talk to you.\n\n*if year6team = \"SAB\"\n\tYou meet up with Cruz in downtown San Antonio for an interview. \"Thanks for coming,\n\t*if year5team = \"TSU\"\n\t\tand welcome back to the States,\n\t\" she says. \"For about ten reasons, it'll be good for me to start with a player I know from my time with [i]The South Texas Journal[/i]. And, if you don't mind my saying, I'd love to know what it's like to be a veteran star on a young and rudderless team. What's it like to make friends among your teammates then be broken up by trades and free agency? Does the game feel cruel to you now? Most baseball stories are about triumph, or defeat, or dealing with the weight of history. But your story is about something else. Please, tell me all you can about your feelings, how you've felt for these past few years.\"\n\t*goto cruznsnintv\n*elseif year6team = \"FLC\"\n\tYou meet up with Cruz in downtown Miami for an interview. \"It's great to see you again,\" she says. \"I've got this big national job now, and so I'm going to have to develop a rapport with, well, every baseball player now. But I already know you, and I'd like to do my first piece on you. You've had an interesting career already, and now that you're coming into this out-of-nowhere superteam, it feels like you're starting a new chapter. What's it like to go from being just another player to suddenly being recognized as an elite and desirable athlete, someone worth trading for, or someone who's worth a huge salary? Do you have any 'imposter syndrome' now? I know I can relate now that NSN have hired me.\"\n\t*goto cruznsnintv\n*elseif year6team = \"NYB\"\n\tYou meet up with Cruz a short drive away in the NSN headquarters in Stamford, Connecticut. \"It's been so long since I've seen you,\" she says. \"When you signed with the Barons I knew I had to do my first piece on you. You're so nearby, and you've had an interesting career trajectory so far. Basically this piece is about what it's like to come to a team with so much history and prestige as the Barons. Is this every player's dream? Is this a new peak to your career, getting to play under the big lights in New York?\"\n\t*goto cruznsnintv\n*else\n\t*bug\n*label cruznsnintv\n*choice\n\t*if (anecdotes >= 2) #Unload everything. Tell her every interesting detail of my career so far.\n\t\t*set anecdotes 0\n\t\t*set fame %+30\n\t\tYou decide to give this interview everything you've got. You may never be written up in a national publication again, so now's the time to tell your story. You tell her about every interesting thing that's happened to you on the field or behind the scenes. You want to make it the best interview possible, because that will make you more famous and give Cruz a good first impression at NSN.\n\t\t*goto cruzinterviewwrapup\n\t*selectable_if (anecdotes >= 1) #Drop an anecdote from my career, but don't give away everything for one interview.\n\t\t*set anecdotes - 1\n\t\t*set fame %+20\n\t\tNational feature stories don't come around every day, so you decide to drop an interesting anecdote from your career to spice up the article. It'll make you more famous, and make Cruz's story better, so there's no reason to keep a good story to yourself.\n\t\t*goto cruzinterviewwrapup\n\t#Answer her questions as they're asked, but don't give away any good stories I've got saved up.\n\t\t*set fame %+10\n\t\tYou take a defensive stance for the interview, answering Cruz's questions but keeping all your best stories in your back pocket. She pays close attention to everything. It looks like her mind is racing, trying to think of a way to write this all up and make it interesting. You're not giving her much help in that task, but it's always been her job to take the boring, predictable quotes from baseball players and find the storylines within what they're saying.\n\t\t*goto cruzinterviewwrapup\n\t#Be a boring interviewee. In baseball, it's not a good look to like getting media attention.\n\t\t*set eloquent %-15\n\t\t*set clubhouse_rep %+10\n\t\t*check_achievements\n\t\t*if eloquent \u003c 40\n\t\t\t*if not(choice_achieved_dayatatime)\n\t\t\t\t*achieve dayatatime\n\t\tLike Rosario told you several years ago, it's your job as a baseball player to make for a boring interview. Your teammates and coaches will appreciate it if you don't bask in the media spotlight or let them in on any inside information. So you just parrot out answers that Cruz must have heard a thousand times before from every major league player. Like every baseball player, you're \"just trying to take things one day at a time.\"\n\t\t*goto cruzinterviewwrapup\n\n*label cruzinterviewwrapup\n\n\"One last thing before you have to go,\" Cruz says. \"I'm going to give you a notebook to take into the locker room. It would be a huge help to me if you could write down anything interesting that you see, any good inside information about what a major league clubhouse is like. Eventually I'll take the notebook back and if there's anything worth reporting, it would change my career. You do this for me, and I'll make sure you have a good career after your playing days are over. I could co-write books with you, or I could get you a job with NSN doing broadcast work. I appreciate any help you can give me, and I'll owe you everything. Okay?\"\n\nYou take the notebook without saying a word. Now that you're older than lots of players around you, you've started to think about what you'll do after your arm doesn't pay the bills anymore. This could be a great opportunity at a life-long career. But your team certainly won't like having their secrets talked about on NSN every day. Are you willing to effectively spy on your own teammates and become an anonymous media source?\n*page_break Pitchers and Catchers Report\n*if nextteam = \"Bulls\"\n\t*if year5team = \"TSU\"\n\t\tSure enough, the Bulls of old are all gone. Mendis starts games for the Florida Capers, and Rosario bats fifth and mans first base in the stacked New York Barons lineup. In spring training, you quickly make friends with catcher Portia Roberts, who throws the ball back to the mound so hard that your glove is starting to wear out, and Connor Harris, a submarine lefty starter from Australia (\"Yes, I'm from down under and I throw down under,\" he says as though he's heard the joke a thousand times.)\n\n\tDuring spring training, Portia, squinting to watch Connor throw warm-up pitches to another catcher, notices something. \"${givenname}, come here. Look close at Connor's mouth as he's going into the windup,\" she says.\n\n\tYou watch carefully, and though you can't hear a word, it doesn't take a professional lip reader to know what he's saying to himself. Every time he raises his arms to start his windup, he drops a cannonade of F-bombs, shelling the air every single time he throws.\n\n\tWhen he's done throwing, you and Portia come over and ask him about this new habit. \"It's a little something new I've sprinkled in this year,\" Connor says, laughing. \"I say the F word precisely eight times, in rhythm, each time I throw. It's for my timing. I always come set at four, I step at seven, throw at eight. As long as everything happens at the right time, I throw the ball where I want.\"\n\n\t\"That's fine, but why that word in particular?\" Portia asks.\n\n\t\"Just gets the adrenaline going better than counting the numbers out. And if it makes the batters think I'm mental, even better.\" You and Portia cast a glance at one another, then laugh. \"Look, I've always been willing to do the unorthodox in order to succeed,\" Connor continues. \"How do you think I started throwing submarine? If you're not thinking of new ways to win every year, you're falling behind. Laugh all you want.\" And you did.\n\t*goto 6thyear1stgame\n*elseif nextteam = \"Capers\"\n\tThe very first face you see on arriving for spring training is Giulio Camporese, the star outfielder for the Capers. \"Thought it was just supposed to be pitchers and catchers today,\" you say, adjusting your gear bag over your shoulder.\n\n\t\"And coaches. Today, I am a coach,\" Camporese says in a slight accent. He came to the United States at 18, becoming only the second ever major league player to have been born and raised in Italy. That said, he is definitely not a coach. Inside baseball, he has a reputation for being a clubhouse comedian and prankster, so you stay on guard.\n\n\t\"Nice to meet you, Giulio, but I've got to go meet the pitching coach and figure out where to go after that.\"\n\n\t\"Yes, me, I'm the pitching coach,\" he says. \"I'm going to show you how to throw. Please, throw just like this.\" He squats, rubs his throwing hand in his glove for some reason, then comes set. Then he lifts his left leg up as far as he can, really impressively high actually, then with an exaggerated groan throws the ball like a shot put up into the air, only for it to land a foot in front of him. \"Perfect technique. Please, copy after me.\"\n\n\tYou do as he says, copying his silly motion and making a big effort to throw the ball just barely past your front foot. \"Happy?\" you ask.\n\n\t\"Perfect, perfect,\" he says. \"Now I expect to see you throw like that in the game. Don't fall back into old habits, okay? Thank you, you can go now.\" Camporese moves on to the next pitcher to do the exact same shtick. The man is clearly dedicated to his craft.\n\t*goto 6thyear1stgame\n*elseif nextteam = \"Barons\"\n\tAs you arrive to spring training, back in Surprise, Arizona once again, Andres del Rosario makes sure he's the first to welcome you. \"It's been a while,\" he says. \"They made me shave the beard. I hope you can still recognize me.\"\n\n\tSomething's wrong with his tone. \"It's good to see you again, but what's wrong?\" you say. \"You sound upset and it's only the first day of spring training!\"\n\n\t\"I don't know, last year was weird. They saw something weird in my knees, so they don't let me catch more than a few games here and there. I play first base mostly now. And I don't know, it's just the culture here is pretty uptight. For the first time ever, I was happy to get some time off this year. I work hard and I try to win, but here it's like it's life or death. You have to win or else, you know?\"\n\n\tTwo seconds into your time with the Barons and Rosario is already trying to temper your excitement. Maybe he didn't know what he was getting into, but you signed here because you wanted to play on the big stage. You need to do something to cheer him up. \"Come on, Andres, you can catch me. Maybe if they see you moving around pretty well in your crouch then they'll change their mind and let you catch more. All right?\"\n\n\t\"That sounds good,\" he says, but his body language doesn't improve. You've never seen Rosario like this. It's unsettling.\n\t*goto 6thyear1stgame\n*else\n\t*bug\n*label 6thyear1stgame\n*if nextteam = \"Barons\"\n\t*goto 6thyearbaronsgame\n*else\n\t*goto 6thyearnonbaronsgame\n*label 6thyearbaronsgame\n*page_break The Season Begins\n*gosub_scene 2ndYear resetgame\n*set totalouts 19\n*set earnedruns 1\n*set strikeouts 5\n*set runnerfirst true\n*set runnerthird true\n*set outs 1\nIt's the seventh inning of your first start for the New York Barons, and so far you've been making a good first impression. The crowd has roared for each of your strikeouts, making a sound like you've never heard before. It's a sold out stadium, but there's something about the acoustics or the attitude of the fans that makes their cheers sound like something else. It's like a beam of sound that fills your ears up and overwhelms them, not just the gentle crashing waves of a normal stadium full of baseball fans. What do you throw?\n\n*gosub_scene 2ndYear situationtext\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 4\n*set batterpower 3\n*set batterhand \"right\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 6thyearbaronsgameatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 6thyearbaronsgameatbatloop\n\n*label 6thyearbaronsgameatbatloop\n*if atbatresult = \"single\"\n\t*set earnedruns +1\n\t*set userruns +1\n\t*set totalouts +1\n\t*set wins +1\n\tThe batter smacks a ground ball to the shortstop, who tosses to second for one out, but can't complete the double play. The runner from third scores on a fielder's choice, and you can't feel too bad about that outcome. The New York fans can be hard to please, but you've shown your value today.\n\t*goto endof6thyearbaronsgame\n*elseif ((atbatresult = \"double\") or (atbatresult = \"triple\"))\n\t*set earnedruns +2\n\t*set userruns +2\n\tThe batter hits a long fly ball over the center fielder's head, and that's going to land for a double. Both runners score, and now the game is tied. Still, this was a decent start for your new team. You can feel a little bit of pressure come off your shoulders.\n\t*goto endof6thyearbaronsgame\n*elseif atbatresult = \"home run\"\n\t*set earnedruns +3\n\t*set userruns +3\n\t*set losses +1\n\tThe batter gets into one and hits it into the left field stands for a home run. The Barons are behind now, and your good day has turned into a disappointing one. You've been worrying about justifying your spot on such a big, successful team, and that's not going to go away today.\n\t*goto endof6thyearbaronsgame\n*elseif ((atbatresult = \"groundout\") or (atbatresult = \"lineout\")) or (atbatresult = \"flyout\")\n\t*set totalouts +2\n\t*set wins +1\n\tThe batter hits a ground ball right to the shortstop, and that's an easy 6-4-3 double play to get you out of the inning. Seven innings of one-run ball makes for a great start to the year. Hopefully that'll keep the fans and the media off your back for a while.\n\t*goto endof6thyearbaronsgame\n*elseif atbatresult = \"walk\"\n\t*set earnedruns +2\n\tYou walk the batter, and that loads the bases. You're pulled from the game for a reliever, who coughs up two of those runs and the lead, but the Barons win the game in the end regardless. Not a perfect start to the year, but you've shown enough to not get criticized by the New York media just yet.\n\t*goto endof6thyearbaronsgame\n*elseif atbatresult = \"strikeout\"\n\t*set outs +1\n\t*set totalouts +1\n\t*set strikeouts +1\n\t*set userstrikeouts +1\n\t*set wins +1\n\tThe batter just watches your pitch sail by, and the umpire rings her up, strike three. The crowd makes that all-encompassing sound again, roaring like you've just won them the World Series. What a strange thing. You had a great first start for the team, and you've started to endear yourself to the fans with the highest standards in baseball.\n\t*goto endof6thyearbaronsgame\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyearbaronsgameatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyearbaronsgameatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyearbaronsgameatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyearbaronsgameatbatloop\n\t*if (knuckleball > 0) #Knuckleball.\n\t\t*set pitchthrown \"knuckleball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyearbaronsgameatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyearbaronsgameatbatloop\n*label endof6thyearbaronsgame\n*goto meetprakash\n\n*label 6thyearnonbaronsgame\n*page_break The Season Begins\n*gosub_scene 2ndYear resetgame\n*set totalouts 23\n*set earnedruns 3\n*set strikeouts 8\n*set wins 1\n*set runnersecond true\n*set outs 2\nThe New York Barons have come to town, and with them is Andres del Rosario, your old catcher and friend. You stand and talk with him behind the batting practice backstop before the game, with every fourth word punctuated by the loud crack of bat on ball. \"I hope you still recognize me. Last year was weird,\" Andres says, with a strange dull look in his eyes. \"Pretty much right after I signed, they decided I couldn't catch anymore. They saw something bad in my knees. So I've been playing first base, but the fans, the media get all over me because I can't catch anymore. It wasn't my choice, you know?\"\n\nAndres looks off at nothing in particular in center field. \"Plus, I mean, it's no big deal or anything, but the Barons made me shave the beard. I still don't feel like myself. Maybe the beard contained all my powers. Or it contained my knee health, I guess.\"\n\nYou don't know what to say, but you do your best to cheer up your old teammate and friend. Andres was always the happiest, most carefree player back with the Bulls. Maybe playing on the big stage in New York isn't so fun after all.\n*page_break Take the Mound\nIn the second inning, you face Andres del Rosario as an opponent for the first time. He gives you a little nod of acknowledgment as an ex-teammate, then raises his bat behind him, set in a powerful stance. Something in the seriousness in his face tells you he needs this hit. He needs to drive in the runner on second and get the Barons on the board, so that he doesn't have to hear or read anyone say he's washed up anymore. He's at the stage of his career where each at-bat can feel like life or death, and you're the one in the way. What do you throw?\n\n*gosub_scene 2ndYear situationtext\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 3\n*set batterpower 6\n*set batterhand \"left\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 6thyearnonbaronsgameatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 6thyearnonbaronsgameatbatloop\n\n*label 6thyearnonbaronsgameatbatloop\n*if atbatresult = \"single\"\n\t*set earnedruns +1\n\t*set userruns +1\n\tRosario cracks a single into short center field and the runner from second scores. He rounds first, clapping, then makes eye contact with you for a split second before turning and pointing to someone in his dugout. Good for him, you think, while making a mental note never to throw him that particular pitch again.\n\t*goto endof6thyearnonbaronsgame\n*elseif atbatresult = \"double\"\n\t*set earnedruns +1\n\t*set userruns +1\n\tRosario slaps the ball over the third baseman's head into the left field corner. The runner scores, and Rosario replaces him at second base with a double. He points to someone in his dugout then makes eye contact with you for a split second before looking down to take his batting gloves off. Good for him, you think, while making a mental note never to throw him that particular pitch again.\n\t*goto endof6thyearnonbaronsgame\n*elseif atbatresult = \"triple\"\n\t*set earnedruns +1\n\t*set userruns +1\n\tRosario hits a laser line drive into the power alley in right field, and the runner from second scores. The ball takes a bad bounce off the wall and it takes what feels like ten minutes for your center fielder to finally pick it up, but as Rosario is rounding second to head toward third, he grabs the back of his leg and stops, cringing. He hobbles back in toward second, claiming his double, but the trainer is out to look at him.\n\n\tHe comes out of the game as a precaution. Poor guy got the hit he needed, but the websites will still say he's damaged goods and the team needs to dump him.\n\t*goto endof6thyearnonbaronsgame\n*elseif atbatresult = \"home run\"\n\t*set earnedruns +2\n\t*set userruns +2\n\tYour pitch floats into the dead middle of the strike zone, and Rosario whips the bat around it and deposits the ball in the right field bleachers. Well, that should certainly get the media off his back for a game or two. He slowly, and I mean slowly, rounds the bases, probably to avoid putting too much stress on his knees. Or maybe he's really afraid he won't last much longer and he's trying to savor one of his last trips around the bases.\n\t*goto endof6thyearnonbaronsgame\n*elseif ((atbatresult = \"groundout\") or (atbatresult = \"lineout\")) or (atbatresult = \"flyout\")\n\t*set totalouts +1\n\t*set outs +1\n\tRosario's eyes light up, recognizing a hittable pitch. He kicks his leg and takes a home run swing. But he gets a groundout result. The bat hit the very top of your pitch, tapping it lightly into the ground. You pick up the ball and throw to first for the out and Rosario doesn't even bother to jog to first. That's probably not going to endear him to the media.\n\t*goto endof6thyearnonbaronsgame\n*elseif atbatresult = \"walk\"\n\tRosario tenses up, kicks his leg up in the air, then lets the pitch go by him for ball four. The knees don't have to be in great shape to walk to first, you suppose.\n\t*goto endof6thyearnonbaronsgame\n*elseif atbatresult = \"strikeout\"\n\t*set outs +1\n\t*set totalouts +1\n\t*set strikeouts +1\n\t*set userstrikeouts +1\n\tRosario kicks his front leg up in the air, tenses up, and swings as hard as he can. But his bat carves the air just under the ball, coming up empty for strike three. That won't endear him to the New York media, you're sure, but you can't go around letting people get hits off you just to be friendly.\n\t*goto endof6thyearnonbaronsgame\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyearnonbaronsgameatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyearnonbaronsgameatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyearnonbaronsgameatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyearnonbaronsgameatbatloop\n\t*if (knuckleball > 0) #Knuckleball.\n\t\t*set pitchthrown \"knuckleball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyearnonbaronsgameatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyearnonbaronsgameatbatloop\n*label endof6thyearnonbaronsgame\n*page_break The Season Continues\nYou're sitting in the dugout during a game when\n*if nextteam = \"Bulls\"\n\tPortia\n\t*goto cluesyou\n*elseif nextteam = \"Capers\"\n\tGiulio\n\t*goto cluesyou\n*else\n\tRosario\n\t*goto cluesyou\n*label cluesyou\nclues you in to a new trick the ${nextteam} coaching staff has cooked up. The team's replay coordinator, tasked with watching for potential plays to challenge via replay review, is watching the game's TV feed on a tablet in the dugout. He's watching the opposing team's catcher as he signals for the pitch. When no one's on base, the signals are simple: One finger for a fastball, two fingers for the pitcher's best breaking ball, all four fingers for a changeup. The replay coordinator tells the bench coach next to him what the signal is.\n\nThe bench coach sits at the top step of the dugout and yells out encouragement to the hitter. \"Come on!\" \"Focus!\" \"Keep your hands inside the ball!\" But, unbeknownst to the other team, these words are actually a signal. If the coach yells something, that means the next pitch is going to be a changeup or breaking ball. If the coach says nothing, the next pitch is a fastball. It's not a ton of information, but it's all the hitter needs to get a huge advantage.\n\nYou're shocked by the simplicity of the plan. And given that the ${nextteam} have ten hits already in the fifth inning, clearly it's working. But as a pitcher yourself, you'd hate to have other teams do this to you. And it sure feels a lot more like cheating than the old-fashioned form of sign stealing where a runner on second has to decode a harder set of hand signals on the fly and somehow tip off the hitter. You realize your notebook is sitting right behind you. The team won't like you revealing that they're cheating, but maybe you should write this down?\n*choice\n\t#Write down the sign stealing strategy in full detail and reveal it to Inés Cruz right after the game.\n\t\t*set helpedcruz true\n\t\t*set clubhouse_rep %-20\n\t\t*set anecdotes +2\n\t\tYou scoot over to a spot on the bench away from your teammates and write down everything you know about the sign stealing. It could cause some scandal, but this is exactly the kind of juicy info that Cruz was looking for.\n\n\t\tTwo days later, an article goes up on NSN.com. The ${nextteam} are accused of stealing signs using tablets in the dugout. Players and coaches around the team are confused and upset, wondering if the other team sniffed out the plan or if someone leaked the information. A few teammates know you're close friends with the post's author, Cruz, and cast some suspicion on you, but nothing is proven. It doesn't feel great to sell out your team, but they were cheating, and this should give you an opportunity for a job after your playing days are over.\n\t\t*goto meetprakash\n\t#Write down the strategy but wait until after the season to tell Cruz about it.\n\t\t*set helpedcruz true\n\t\t*set clubhouse_rep %-10\n\t\t*set anecdotes +1\n\t\tYou scoot over to a spot on the bench away from your teammates and write down everything you know about the sign stealing. You then hide the notebook in your locker and resolve to tell Cruz everything after the season's over. By that time, either everyone in the league will probably have copied this strategy, or maybe the league will realize what's happening and ban it. So it won't be as useful to Cruz, but she'll appreciate the help nonetheless. And maybe that'll give you the job opportunity you need after your playing days are done.\n\t\t*goto meetprakash\n\t#Leave the notebook empty and stay loyal to your team.\n\t\t*set rebellious %-20\n\t\tYou can't sell out your team like that, even if they are cheating, and even if a strategy like this might make all the pitchers in the league look suddenly ineffectual. You put the notebook away in your locker for good, resolving not to use it to rat out your team, even if it would provide you a career opportunity in the future.\n\t\t*goto meetprakash\n*label meetprakash\n*set totalouts +54\n*set earnedruns +4\n*set strikeouts +13\n*set wins +1\n*set losses +1\n*page_break\nOne morning, on a Monday without a game to play, the team makes you get up early and report to the park for a \"pitchers only\" practice session. When you drive up to the players' parking lot, your other teammates are filing onto a bus. You're taking a field trip?\n\nYou ride the bus about twenty minutes away and come to an unmarked warehouse in a former industrial district of the city. You and the other pitchers enter to the familiar sound of ball hitting mitt reverberating off the concrete walls and ceiling. Three strange black cylinders sit atop tripods around your pitching coach, who is throwing batting practice at a padded net against one wall. Dozens of cables wind their way around the room, converging on a laptop sitting on a fold-out table.\n\n\"Welcome, everyone,\" the pitching coach says, perhaps not realizing how creepy that sounds when you're crowded into what looks like the set from a [i]Saw[/i] movie. \"I'd like you to meet Prakash Bhavsar.\" Prakash, his face lit up blue by the laptop, raises his hand without looking away from the screen. \"He goes to school with my son, but that's not important. He knows computers, and we're going to have you all throw for us so we can measure a few things, okay?\"\n\nOne of your teammates says, \"Do we have to wear the weird skin-tight suit with the ping pong balls on it?\"\n\n\"Only if it makes you feel beautiful,\" Prakash says, peeking up from the computer. \"Otherwise no, my system here can see you fine without the ping pong balls. ${surname}, you're first up.\"\n\nThis is a pretty weird environment, and maybe you don't want the team to know everything about you. What if they pick up on some potential injury and decide to suddenly trade you? They'll end up knowing more about your arm than you do. Or maybe they really will help you find a way to get even better. What do you do?\n*choice\n\t#Refuse to go through the testing. I'm not going to let an amateur tinker with the way I throw.\n\t\t*set analytical %-20\n\t\t*set prakashtested false\n\t\t\"Sorry, not for me, guys. I'll catch you all back on the bus,\" you say, and take your leave. You're pitching well, and you could only mess things up by getting computers involved. There's no one perfect way to throw anyway.\n\t\t*goto juliereunion\n\t#Agree to go through the testing so my team can get the data it wants.\n\t\t*set prakashtested true\n\t\t*set rebellious %-10\n\t\t*set velocity %+10\n\t\t*check_achievements\n\t\t*if not(choice_achieved_purevelocity)\n\t\t\t*if velocity >= 70\n\t\t\t\t*achieve purevelocity\n\t\tYou go up in front of the sensors and throw, warming up and working your way up to full velocity. Your pitching coach and Prakash say things to each other out of earshot behind the computer, which is troublesome. After a few full effort fastballs, your pitching coach says, \"It's so subtle that I can barely see it, but according to this there's a slight hitch as you're just starting to come down with your front foot. Is that a timing thing? Do you know you're doing that?\"\n\n\t\tPrakash says, \"You could bring more energy from your legs into your arm if you smooth out that hitch and just go straight forward from the wind-up. Could give you a little more velocity.\"\n\n\t\tYou don't really know what hitch they're talking about, but after a week of thinking about it and trying different things on the mound, you find you are, in fact, throwing harder than you've ever thrown before. That computer system added a few ticks to your fastball. That's incredible. Maybe they could find other things to improve with a little more testing?\n\t\t*goto juliereunion\n\t#Ask all about Prakash's computer system and the software he's using so I can rebuild this in my own house.\n\t\t*set prakashtested true\n\t\t*set analytical %+10\n\t\t*set velocity %+10\n\t\t*check_achievements\n\t\t*if not(choice_achieved_purevelocity)\n\t\t\t*if velocity >= 70\n\t\t\t\t*achieve purevelocity\n\t\tYou agree to go through the testing, but only if Prakash agrees to show you how to set one of these systems up for yourself. He seems to hesitate, but the pitching coach nudges him and he finally agrees to show you.\n\n\t\tFor now, you have to use his system, so you go up in front of the sensors and throw, warming up and working your way up to full velocity. Your pitching coach and Prakash say things to each other out of earshot behind the computer, which is troublesome. After a few full effort fastballs, your pitching coach says \"It's so subtle that I can barely see it, but according to this there's a slight hitch as you're just starting to come down with your front foot. Is that a timing thing? Do you know you're doing that?\"\n\n\t\tPrakash says \"You could bring more energy from your legs into your arm if you smooth out that hitch and just go straight forward from the wind-up. Could give you a little more velocity.\"\n\n\t\tYou don't really know what hitch they're talking about, but after a week of thinking about it and trying different things on the mound, you find you are, in fact, throwing harder than you've ever thrown before. That computer system added a few ticks to your fastball. That's incredible. Maybe you can fix even more by using this system yourself?\n\t\t*goto juliereunion\n\n*label juliereunion\n*page_break A Few Weeks Later\n*set totalouts +36\n*set earnedruns +4\n*set strikeouts +8\n*set wins +2\nOne day your agent forwards you an email from a professional trainer who wants you to endorse her series of workout videos. The name of the trainer sounds familiar: Julie Cheng. Who was Julie Cheng again?\n\nRegardless, your agent says it's a good chance to earn some extra money, but you have to decide how exactly you want to help. You could just appear in one of the videos, but if you're not in great shape that might not be a great idea. If you have some ability to turn a phrase, you can provide a testimonial quote (even though you haven't used her workout videos, of course). Or you could analyze her videos closely to give an intelligent-sounding testimonial explaining why her videos work better than all the others.\n*choice\n\t#Show my stuff by guesting in one of her videos.\n\t\tWhen you meet Julie Cheng to appear in a workout video, you immediately recognize her. She was your physical therapist when you got hurt in your first season. It's been five years since she gave you a workout plan to get your arm back to full strength after Tommy John surgery.\n\n\t\t*gosub itsbeennuts\n\n\t\tHer eyes dart over you for a split second. \"You're looking good, by the way,\" she says, \"But we definitely can't have you in those sweatpants. Anything even a little baggy looks like a hot air balloon on camera, believe me. Wardrobe? What do you think for this one, shorts? Yoga pants?\"\n\n\t\t*if fitness > 50\n\t\t\t*set wealth %+10\n\t\t\tIn the changing room, you somehow manage to squeeze into some tight clothes and make your way back out to do the workout video. You stand behind Cheng, performing the routine flawlessly and lending some major league credibility to her video.\n\n\t\t\t\"Fantastic work,\" Cheng says once filming is over. \"I'll have to drag you back here in the offseason to do some more. Maybe I could do a whole video that's baseball-themed? Would that work? Hey, Charles?\" She drifts away to talk to her producer, completely forgetting you're there.\n\t\t\t*goto interstitialwiththeteam\n\t\t*else\n\t\t\t*set clubhouse_rep %-10\n\t\t\t*set sizeissues true\n\t\t\tAfter half an hour spent in the changing room, you have to throw in the towel. You can't fit into anything they give you to wear. When you walk sadly in your sweatpants back out to Julie, she's quick to apologize. \"I'm so sorry, it's just, you're a real athlete, so of course you're bigger and more built than us. And the producer doesn't like to have the backup people, even the guys, look bigger than me, it's just an aesthetic thing. I'm so sorry we don't have anything you can fit in, that's awful. But please, come back some time and let's catch up later, okay?\" Less than a minute later, filming starts and you have nothing to do but make your way home.\n\n\t\t\tThe story gets out to your teammates that you were too big to fit in anything, and your \"size issues\" become a running joke in the clubhouse, more out of irony than anything. You're a good athlete and a major league pitcher, just not wire-thin and tiny enough to fit their stupid wardrobe.\n\t\t\t*goto interstitialwiththeteam\n\t#Give a nicely-worded testimonial quote about how her videos helped me.\n\t\t*gosub hopovertojulie\n\n\t\t*if eloquent > 55\n\t\t\t*set wealth %+10\n\t\t\tYou stand up straight and begin to speak. \"Julie Cheng gave me the perfect workout plan in my recovery from Tommy John surgery, and since then my arm has thrown thousands and thousands of pitches at the very highest level without breaking down. Whether you're a major league pitcher or a stay-at-home parent, you should work out with Julie because she knows how to get results.\"\n\n\t\t\tThe studio stays quiet for a few seconds. \"Great job,\" Julie says. \"Have you done acting? Public speaking? You delivered that so naturally. Thanks for stopping by, and let's work together again sometime, okay? Charles! Where are you, Charles?\" She wanders off to find her producer and move on with her busy schedule.\n\t\t\t*goto interstitialwiththeteam\n\t\t*else\n\t\t\t*set public_rep %-10\n\t\t\t*set wealth %+10\n\t\t\tYou clear your throat and start to talk. \"No one works hard to find the perfect workout routine like Julie Cheng. I have to give credit where credit is due: When I was sidelined with Tommy John surgery, Julie got me to go the extra mile to feel the burn and pull my own weight. And you can too.\"\n\n\t\t\tThe studio stays quiet for a few seconds. \"Okay, great,\" Julie says. \"We can probably get something out of that. I want to thank you so much for coming,\" she says, reaching out to almost shake your hand before her mind turned to other business. \"Charles? Do we have the mats for this afternoon? You know the mats I mean?\" And she wanders off.\n\n\t\t\tYour full testimonial runs, unedited, in Julie Cheng's TV infomercials. Eventually, someone captures a video of your cliché-filled performance and puts it on Twitter, where approximately 10,000 people make different jokes about your use of mixed metaphor. \"I'm starting to think ${surname} might be a few cards short of being the sharpest knife in the light bulb,\" reads one particularly brutal tweet. Laugh all you want, internet, but you still got paid.\n\t\t\t*goto interstitialwiththeteam\n\t#Analyze to see why her videos would help people then give a quote about that.\n\t\t*gosub hopovertojulie\n\n\t\t*if analytical > 55\n\t\t\t*set wealth %+10\n\t\t\tYou stand up straight and begin to speak. \"Five years ago, Julie gave me the perfect workout plan to rehabilitate my arm after surgery. Now she's developing plans for everybody, not just athletes, and it's amazing to see her work. As an athlete, I know what it takes to get in great shape without unbalancing your body in a way that might lead to injury down the road. Julie does it all in her videos.\"\n\n\t\t\tThe studio stays quiet for a few seconds. \"Great job,\" Julie says. \"Very well said. Thanks for stopping by, and let's work together again sometime, okay? Charles! Where are you, Charles?\" She wanders off to find her producer and move on with her busy schedule.\n\t\t\t*goto interstitialwiththeteam\n\t\t*else\n\t\t\t*set public_rep %-10\n\t\t\t*set wealth %+10\n\t\t\tYou clear your throat and start to talk. \"Julie Cheng's workouts are vital to me as a professional athlete. I find the way she works several muscles at a time is highly, uh, smart. And, what's more, she knows how to build workouts that focus on multiple parts of your body at once.\" Something felt wrong about that. Did you repeat yourself?\n\n\t\t\tThe studio stays quiet for a few seconds. \"Okay, great,\" Julie says. \"We can probably get something out of that. I want to thank you so much for coming,\" she says, reaching out to almost shake your hand before her mind turned to other business. \"Charles? Do we have the mats for this afternoon? You know the mats I mean?\" And she wanders off.\n\n\t\t\tYour full testimonial runs, unedited, in Julie Cheng's TV infomercials. Eventually, someone captures a video of your gobbledygook and puts it on Twitter, where approximately 10,000 people make different jokes at your expense. \"I'm starting to think playing baseball all ${hisher} life made ${surname} a little uneducated, and what's more, uh, ${heshe} didn't learn much in school,\" reads one particularly brutal tweet. Laugh all you want, internet, but you still got paid.\n\t\t\t*goto interstitialwiththeteam\n\n*label interstitialwiththeteam\n*page_break The Season Continues\n*if nextteam = \"Bulls\"\n\tYou, Portia, and Connor are all sitting in the dugout during a rain delay, trying to figure out something to talk about. Portia proposes a topic: \"Y'all heard they're gonna land people on the Moon again, right? What do you think it'd be like to play baseball up there? Would everything be a home run, pretty much? You hit the ball off the end of your bat and it still goes pssh, straight out into orbit like it's nothing?\"\n\n\tConnor considers the problem for a moment. \"You couldn't throw a breaking ball,\" he says. \"No air resistance to make it spin.\"\n\n\t\"Okay, but like, we have to breathe too,\" Portia says. \"No one would want to play in a big dumb suit, so we'd probably do it in a big dome thing with air in it. So you could still throw a curveball, I think. I don't know how that works, honestly.\"\n\n\t*if analytical > 50\n\t\tWhile they're talking, you do some quick research on your phone. \"A curveball wouldn't drop as much because there's less gravity, so that's no good,\" you say. \"However, this article says that if you threw a fastball with enough backspin, it would actually curve up. A [i]real[/i] rising fastball.\"\n\n\t\t\"Whoa,\" Portia says. The three of you sit in silence for a moment as the rain thwacks non-stop against the dugout roof. Portia says \"Okay, let's make it happen then. Let's get to the Moon and try this out.\"\n\n\t\t\"Sure thing, mate,\" Connor says. \"I wanted to build a shuttle anyhow. Can't be too difficult. I know some woodworking.\"\n\n\t\t\"At least it wouldn't rain on the Moon,\" you add, and everyone agrees.\n\t\t*goto 6thyear2ndgame\n\t*else\n\t\t\"I feel like the fastball would seem faster,\" you say, thinking about it. \"With less gravity, the ball wouldn't drop, so it'd just be a laser straight fastball. I guess that would make the curveball worse, though. It wouldn't drop as much. Whatever, as long as they put the fences about 800 feet out, I'd be game to try it.\n\n\t\t\"At least it wouldn't rain on the Moon,\" you add, and everyone agrees.\n\t\t*goto 6thyear2ndgame\n\t*goto 6thyear2ndgame\n*elseif nextteam = \"Barons\"\n\tYou're standing around chatting with Andres del Rosario during batting practice one day, when your conversation is interrupted by a short, compact woman named Lisa Janga, your second baseman. \"You have to give me more ground balls,\" she says, as if it were an obvious point to make.\n\n\t\"I get plenty of ground balls,\" you say, reflexively. \"What's the issue?\"\n\n\t\"I get bored,\" she says. \"My hand starts to twitch in my glove in anticipation. Look over at me next time you're pitching, you'll see me opening and closing my glove over and over. It starts to hurt my wrist a little. Just get more ground balls and we'll be fine.\"\n\n\tJanga walks away, and Rosario starts to whisper something to you. \"We're starting to think Janga is taking some kind of performance enhancers. She's hit 15 home runs already this year, and look how tiny she is! If I were five-foot-six, I wouldn't even try to hit anything more than singles. Just takes too much strength. And she's got so much nervous energy, it's weird. Don't tell anybody, obviously, but it's something to keep an eye on.\" You nod and examine Janga as she starts to take batting practice, as if you'll know exactly what a steroid user would swing like, look like, act like. But you have no clue.\n\t*goto 6thyear2ndgame\n*elseif nextteam = \"Capers\"\n\tYour emergence as a starter displaced Ama Mendis from the Bulls rotation four years ago, but the Capers believed she could still start games and were willing to trade for her and give it a shot. Unfortunately for everyone involved, in her first start two years ago, something felt wrong in her elbow, and she had to go through surgery.\n\n\tToday, she's back from surgery and in the dugout alongside you, and the very first thing she says to you, after years apart, is, \"I hope you're ready to lose your job, ${givenname}.\"\n\n\t\"Ama!\" you say as you throw open your arms to go in for a hug, but she stops you.\n\n\t\"We can be friends, but we can't be friendly,\" she says, her face deadly serious. \"We are teammates, but we're also competitors. You've done very well for yourself, but my job might depend on proving I'm better than you. So we are competitors. And I'm going to outpitch you until they make you team mascot and make me Queen of the United States of America. Got it?\" She spits on the ground near your feet, and walks over to sit at the opposite end of the dugout.\n\t*goto 6thyear2ndgame\n*label 6thyear2ndgame\n*page_break Time to Pitch\n*gosub_scene 2ndYear resetgame\n*set totalouts +120\n*if userruns \u003c= 3\n\t*set earnedruns +30\n\t*goto endruncheckyear6\n*else\n\t*set earnedruns +40\n\t*goto endruncheckyear6\n*label endruncheckyear6\n*if userstrikeouts >= 3\n\t*set strikeouts +40\n\t*goto endstrikeoutcheck6\n*else\n\t*set strikeouts +29\n\t*goto endstrikeoutcheck6\n*label endstrikeoutcheck6\n*set wins +7\n*set losses +2\n*set runnerthird true\n*set outs 1\n\nYou stand at the mound with a runner on third and one out, but more importantly for everyone watching here and at home, the batter, Virgilio Vargas, is one home run away from hitting 600 in his career. He can't have many left in him, as he's batting .204 with only four home runs so far this year, but he hit his 599th home run against one of your teammates yesterday, and the crowd is excited to see him hit his 600th off of you right now.\n\nFor a number of reasons, you don't want to give up this home run. It would lose the game, it would let your team down, but maybe worst of all, for the rest of time you'll have to see your dumb face on Vargas's highlight reels, either looking down in disgust or whipping around to watch a fly ball soar off into the distance. He's got some real power, so you had better strike him out just to be safe.\n\n*gosub_scene 2ndYear situationtext\n\n*gosub_scene 2ndYear resetatbat\n*set batterability 4\n*set batterpower 6\n*set batterhand \"left\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 6thyear2ndgameatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 6thyear2ndgameatbatloop\n\n*label 6thyear2ndgameatbatloop\n*if atbatresult = \"single\"\n\t*set earnedruns +1\n\t*set userruns +1\n\tVargas bloops a single into right field, and the runner comes around from second to score. It's probably something like his 1,887th career RBI, but as long as it's not a nice round number that the crowd can get all excited about, you're happy to give up a single instead of home run number 600. If you're not the hero of the story, you'd rather avoid ending up in the baseball history books.\n\n\t*goto endof6thyear2ndgame\n*elseif atbatresult = \"double\"\n\t*set earnedruns +1\n\t*set userruns +1\n\tVargas hits a laser line drive to the gap, and he comes around to second for a double, and the runner from second scores. The crowd cheers but is audibly a little disappointed it wasn't home run number 600. You grumpily hold up your glove as the ball is thrown back in toward the infield. Maybe you can embarrass a beloved but aging superstar next time.\n\n\t*goto endof6thyear2ndgame\n*elseif atbatresult = \"triple\"\n\t*set earnedruns +1\n\t*set userruns +1\n\tThe ball flies through the air, hit hard but too high, you think. The crowd is at first excited, then tentative, waiting what feels like hours to see if the ball will get over the wall or not. Your center fielder reaches the wall, looks up, leaps at the last second, and snow cones the ball in her glove.\n\n\tBut her jump carries her into the wall, and the collision knocks the ball out of her glove. It flops out of the glove and onto the ground, and your center fielder looks hurt. She's not getting up, and the left fielder has to sprint to get to the ball instead and throw it back in. Vargas thought briefly about going for an inside-the-park home run, but he pulls up at third for a long triple. He just missed hitting number 600 of his career, but the crowd is more than satisfied with a rare triple for the aging superstar.\n\n\t*goto endof6thyear2ndgame\n*elseif atbatresult = \"home run\"\n\t*set earnedruns +2\n\t*set userruns +2\n\t*set anecdotes +1\n\t*set losses +1\n\t*check_achievements\n\t*if not(choice_achieved_memoirmaterial)\n\t\t*achieve memoirmaterial\n\tThe crowd all come to their feet. The ball sizzles off the bat and over your head. You're very conscious that whatever you do is going to be caught on camera, so you cover your mouth with your glove preemptively, in case your subconscious should decide to let a few words of anger fly out. Vargas slowly circles the bases and the crowd is literally hopping, making the cameras shake with their excitement that they got to see home run number 600 of Vargas' major league career. You mess around with the rosin bag for a minute while you let the park calm down. At least this will make for an interesting anecdote one day.\n\n\t*goto endof6thyear2ndgame\n*elseif ((atbatresult = \"groundout\") or (atbatresult = \"lineout\")) or (atbatresult = \"flyout\")\n\t*set totalouts +1\n\tThe batter rolls over your pitch and grounds out softly to second. Your second baseman looks the runner back at third then delivers on to first to get the easy out, without letting the run score. Too easy.\n\n\t*goto endof6thyear2ndgame\n*elseif atbatresult = \"walk\"\n\tVirgilio Vargas works a walk. Better that than giving up a milestone home run, you say to yourself, but you're a little ashamed you couldn't do better against a washed up superstar like him. But it's a hot summer afternoon, and sometimes slogging is the best you can do.\n\n\t*goto endof6thyear2ndgame\n*elseif atbatresult = \"strikeout\"\n\t*set outs +1\n\t*set totalouts +1\n\t*set strikeouts +1\n\t*set userstrikeouts +1\n\tStrike three, and your pitch punctures a hole in the crowd, letting all the air out of the stadium. They won't get to see any milestone home runs today. You get the ball back from the catcher and get ready to work to the next hitter, but you also take a moment to enjoy your life right now. You just struck out one of the most famous hitters on the planet. And got paid a lot of money for the privilege. Pitching is fun!\n\n\t*goto endof6thyear2ndgame\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear2ndgameatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear2ndgameatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear2ndgameatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear2ndgameatbatloop\n\t*if (knuckleball > 0) #Knuckleball.\n\t\t*set pitchthrown \"knuckleball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear2ndgameatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear2ndgameatbatloop\n\n*label endof6thyear2ndgame\n*page_break After the Game\nYou work your way through the rest of the lineup and are pulled after the seventh inning. The ${nextteam} win the game in the end, and you head to your hotel room to relax until the next game.\n\n*if agent = \"Virdon\"\n\t*set wealth +10\n\tJust as your head hits the pillow and you're about to relax, your cell phone rings. It's your agent, Wilson Virdon. You've been a little disappointed with him for failing to find you a single endorsement deal last year, but maybe he'll have good news this time.\n\n\t\"I've been working hard for you,\" Virdon says, \"and I've pushed away a bunch of lowball offers that didn't respect what your name and brand are worth. And now all that work and patience is finally coming around to a good place. I've got three different sporting goods brands in a bidding war, but you don't have to make your choice only based on money. Let me know what you think here and we'll get a deal wrapped up quick.\" Virdon offers you to choose between three brands to work with, which could lead to acting in an advertisement at some point down the line.\n\n\tThe first is Go Juice, a company that started in the \"fitness drink\" business and has expanded out from there to include a national chain of fitness centers and a line of sportswear. They want you to appear in their fitness centers as your team goes around the country, which sounds exhausting but will improve your fitness.\n\n\tThe second is Grit, sort of a new, up-and-coming athletic wear brand with a talented team of fashion designers. You'll be a more stylish person just by association with their brand, and the clothes are so flattering and photogenic that you'll wish you could Photoshop yourself into these clothes in all your old online photos.\n\n\tAnd finally, there's Deporte, originally a Mexican company but now so thoroughly Americanized that the official pronunciation of the company name is \"duh-port.\" They've been the number one company in all athletic goods for a century and a half, and signing with them would lend a certain gravitas to your brand. Only serious, mature professionals represent Deporte, and it's an honor to be given the opportunity. Who do you choose?\n\t*choice\n\t\t#Go Juice, for the fitness benefits.\n\t\t\t*set fitness %+15\n\t\t\t*set endorser \"Go Juice\"\n\t\t\t*check_achievements\n\t\t\t*if fitness > 60\n\t\t\t\t*if not(choice_achieved_ripped)\n\t\t\t\t\t*achieve ripped\n\t\t\t*goto endorserscene\n\t\t#Grit, to be stylish.\n\t\t\t*set serious %-15\n\t\t\t*set endorser \"Grit\"\n\t\t\t*check_achievements\n\t\t\t*if serious \u003c 40\n\t\t\t\t*if not(choice_achieved_styleicon)\n\t\t\t\t\t*achieve styleicon\n\t\t\t*goto endorserscene\n\t\t#Deporte, to be a serious competitor.\n\t\t\t*set serious %+15\n\t\t\t*set endorser \"Deporte\"\n\t\t\t*check_achievements\n\t\t\t*if serious > 60\n\t\t\t\t*if not(choice_achieved_nofun)\n\t\t\t\t\t*achieve nofun\n\t\t\t*goto endorserscene\n\t\t#Actually, I'd rather not endorse any corporate products. They can keep the money.\n\t\t\t*set wealth -10\n\t\t\t*set endorser \"none\"\n\t\t\t\"I appreciate the help, but I'd rather be known for my pitching than my endorsing,\" you say. \"Everybody in the league made fun of Virgilio Vargas for years when he did that ad for NSN, you remember the one? The one where he's doing fake exercises on the field, and it's got that 'Put Me In, Coach' song playing. So embarrassing.\"\n\n\t\t\t\"Oh, okay,\" Virdon says, feeling a little bit useless. \"So I'll just tell them all no, then. So let me know if there's something I can do for you.\"\n\t\t\t*goto teamhijinks\n*else\n\tYou exhale as your head hits the pillow. You turn on the TV, clicking past the sports highlight shows until you get to a home shopping channel. For some reason, it's calming to hear pitch after pitch for allegedly high-quality, luxury knives. Why are there so many kinds of knives? Do they do different things? Just as the shopping channel moves on from knives to cookware, you drift asleep.\n\t*goto teamhijinks\n*label endorserscene\nOn your off-day the next week, you visit a studio space in the city to meet with ${endorser}. A woman in all-gray business attire with turquoise glasses is here representing the brand, and a photographer is browsing her phone on the other side of the room, waiting to take a picture of you. \"Here at ${endorser}, we want to help athletes develop their personal brand,\" the woman in the glasses says. \"That's why we've drawn up a few different designs for an online ad, and we want you to pick the one that best suits you and how you want to present yourself. Look at these mock-ups and let us know which you'd prefer.\"\n\nYou try not to think about everyone having to scroll past your face to read an article online, and start going through the mock-ups. Each mock-up ad is on a laminated sheet of paper, spliced into a fake article. The article's headline is \"${endorser} Stock Soars After Q3 Earnings Report,\" which is, well, probably not the kind of article you'd choose to read.\n\nThe first mock-up uses a game photo of you in your windup with the caption, \"Don't think. Grind.\" You can hear the statheads making fun of that ad already, but there's no avoiding their snarkiness.\n\nThe second mock-up has spliced a photo of your face smiling onto a different photo of someone working out, and the caption is \"Everyday Greatness.\" \"I know, it looks silly,\" the woman in the glasses says. \"The idea is for you to be doing chin-ups or something but look totally relaxed, like it comes easy to you. We'll make it look not-ridiculous, I promise.\"\n\nThe third mock-up has you holding your cap, pulling it down slightly and showing the ${nextteam} logo prominently. The caption, in huge letters, is \"Represent.\" This would certainly tie your name and image to your team. Which one would you choose?\n*fake_choice\n\t#\"Don't think. Grind.\"\n\t\t*set analytical %-15\n\t\t*set fame %+10\n\t\tYou take a few photos in the studio, and within a few weeks, the ad is showing up online. Now, whether they're baseball fans or not, everyone starts to recognize your name and face. And sure, the big baseball nerd websites make fun of the ad slogan, but they never liked your style anyway, and they've never played the game themselves.\n\t#\"Everyday Greatness.\"\n\t\t*set intimidating %-15\n\t\t*set fame %+10\n\t\tYou take a few photos in the studio, and within a few weeks, the ad is showing up online. Now, whether they're baseball fans or not, everyone starts to recognize your name and face. Despite the ${endorser} representative's best assurances, you still look a little silly in the ad, grinning so big right at the camera while you're working out. It gives the public the sense that you're a pretty chill athlete, and you know what, they're right.\n\t#\"Represent.\"\n\t\t*set rebellious %-15\n\t\t*set fame %+10\n\t\tYou take a few photos in the studio, and within a few weeks, the ad is showing up online. Now, whether they're baseball fans or not, everyone starts to recognize your name and face. ${nextteam} fans love the ad, of course, and they get the sense that you're no mercenary athlete about to switch teams when someone comes along with a bigger paycheck.\n\t#These all feel silly, I think I'm out.\n\t\t*set wealth -10\n\t\tThe feeling of handing your public image over to ${endorser} gets too strong, and you decide to cancel the deal. You lose their money, of course, and Virdon has to put out a few fires with them over the phone, but at least you won't be made to look ridiculous in an online ad.\n*label teamhijinks\n*if nextteam = \"Capers\"\n\t*page_break A Week Later\n\tAs the bus rolls into downtown Milwaukee for a series against the Hoppers, Giulio Camporese groans. \"No, they can't do this to me again. I lodged a complaint with the team last time. If the bus is taking this turn, there's only one place we could be going. The Royal Weimaraner.\"\n\n\tYou recognize the name of Milwaukee's fancy Victorian downtown hotel. You've stayed there half a dozen times in your career already. Given that every other hotel you stay at looks like it came off of an assembly line at some big hotel factory, The Royal Weimaraner's gilded walls and historic furniture have always made for a nice change of pace. \"What's so bad about the Weimaraner?\" you ask.\n\n\tAll your teammates within earshot on the bus look at you like you asked what's so bad about being burned at the stake. \"It's the only place where I leave and pay for my own hotel down the street,\" one of your teammates says. \"I don't think I've slept for even a second in there,\" says another.\n\n\tGiulio, his eyes completely sincere for the first time since you've met him, says, \"$!{givenname}, please, think of the least haunted place you've ever been. A public pool, maybe, or a busy parking lot. Perhaps your local Olive Garden. Now, think of the complete opposite of that. The Weimaraner is [i]that[/i] haunted.\"\n\n\tYou start to laugh, but everyone around you is completely serious. They're terrified of this beautiful, historic hotel. Which is strange, because you've never noticed anything even a little ghosty there. This will require some investigation.\n\t*page_break Enter the Weimaraner\n\tYour teammates all trudge up to their assigned rooms, dreading the sleepless night ahead of them. A few discuss strategies for calming ghosts, like leaving an offering of food out on the dresser or having a quick friendly chat with them right when you enter your room. If there's a single skeptic on the team, they're not making themselves known.\n\n\tThe Capers' heroic clubhouse leader, Giulio, is too overwhelmed to even stay at the hotel. He stays just long enough to do his official duty as team captain and hands everyone their keys before departing for the Budget Accommodations, a hotel chain not too far away. He's paying out of his own pocket to get a down-market but decidedly un-haunted hotel experience.\n\n\tAs you settle in and get comfortable in your room, you decide to come up with a ghost strategy of your own. If everyone's convinced the hotel is haunted, something or someone might try to mess with you tonight, supernatural or not. What will you do?\n\t*choice\n\t\t#Intimidate any ghosts that interrupt your sleep.\n\t\t\tYou devise your plan and fall asleep. At some ungodly hour, you slowly awake to a light scratching sound. A scraping noise travels from one side of the hotel bedroom to the other, slowly getting louder.\n\n\t\t\tThen you hear, quietly at first, what sounds like a man speaking over an old radio, reading numbers. \"One, seven, three, nine,\" he says, then a few more numbers are obscured by radio fuzz. Then the voice comes back, saying, \"Nine, three, eight, seven.\" The radio slowly gets quieter and then disappears. After waiting a few seconds in silence, you finally start your plan.\n\n\t\t\t*if intimidating >= 55\n\t\t\t\t*set clubhouse_rep %+20\n\t\t\t\t*set anecdotes +1\n\t\t\t\tLittle does the ghost know, you were actually sleeping with your head on the bathroom floor rug. You know, like a crazy person. This unorthodox maneuver has given you the crucial element of surprise, allowing you to cut off the presence in your room, who you can sense is standing somewhere between your bed and your dresser.\n\n\t\t\t\tWhen you spring out from the bathroom and yell with your arms outstretched, a figure in the darkness yells \"Cazzo!\" and drops something. You turn on the light to find Giulio Camporese hunched over a bag of creepy doodads. \"My apologies, friend,\" he says, reaching one hand out in apology and grinning. You take a picture to show your teammates in the morning who is really haunting this hotel.\n\n\t\t\t\tYour teammates greatly appreciate you solving the mystery of The Royal Weimaraner. The hotel had handed out two copies of each key, and Giulio kept the second one for himself so he could go around scaring everyone. With their sleep schedules
