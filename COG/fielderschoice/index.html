 buttons in before the sports drink has already drenched you and your teammates are jumping all over you in celebration. Plus, you forgot you're still wearing an undershirt beneath the jersey. This could have gone a little smoother.\n\n\t\t\t\tStill, the raw emotion of the celebration oozes through the camera lens, and it's still a popular clip online. You're a little more famous, but not exactly as a perfect physical specimen.\n\t\t\t\t*goto relationshipchoice\n\t\t#Perform a flawless disco dance while dripping with blue sports drink.\n\t\t\t*if serious \u003c= 45\n\t\t\t\t*set fame %+25\n\t\t\t\tAt the precise moment the blue sports drink hits your hair, you make the flawless transition from serious baseball player to disco dance machine. Your hands and hips perfectly synchronize, sending droplets of blue carbs and electrolytes flying everywhere. This is professional-grade disco dancing you've got here, and it's got every single fan, player, reporter, cameraman, everybody doubled over laughing.\n\n\t\t\t\tYou've produced the world's premier celebratory reaction GIF, and that's a powerful thing in today's society.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*else\n\t\t\t\t*set fame %+10\n\t\t\t\tJust as your teammates arrive, you start dancing, rolling your hands over one another and doing that [i]Saturday Night Fever[/i] pointing thing. And it's…I mean, it's good, but you can tell your heart's not in it. The complete lack of hip movement is a dead giveaway.\n\n\t\t\t\tBut it's funny because it's unlike you, and the clip of your dance gets played over and over on TV and the internet. It's just that, with a little more technique, it could have been so much more.\n\t\t\t\t*goto relationshipchoice\n*elseif career = \"tell-all\"\n\tYou carry your notebook into the clubhouse one day and a teammate immediately tells you that the left and center fielder are both out today. They've been sent home. The manager told the public that both players are out with \"flu-like symptoms\" but all the players and most of the fans assume something else went down. For the sake of your tell-all book about clubhouse life, you want to figure out what happened. How do you plan on doing that?\n\t*choice\n\t\t#Text the teammates in question and ask what happened. I have a great reputation with them, so they have no reason to hide anything from me.\n\t\t\t*if clubhouse_rep >= 60\n\t\t\t\t*set anecdotes +2\n\t\t\t\t*check_achievements\n\t\t\t\t*if not(choice_achieved_memoirmaterial)\n\t\t\t\t\t*achieve memoirmaterial\n\t\t\t\tYou text the left and center fielders asking what happened, figuring they just stayed out too late drinking last night. Instead, they give you two wildly varying stories about what happened, with the common element being some kind of fight between the two teammates before batting practice. You use this information to ask around with a few other teammates until you think you know what really happened.\n\n\t\t\t\tThe full story turns out to be silly: The left fielder said he could run faster than the center fielder, so they had a race. When the left fielder lost, he got angry and said \"Well, I can still hit harder,\" then landed a punch on his teammate. He meant it to be a soft punch, but it wasn't, so that one punch meant as a joke turned into a full fistfight. Those morons. It's perfect material for your book, so you write it all down.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*else\n\t\t\t\t*set rebellious %+20\n\t\t\t\tYou text the left and center fielders asking what happened, but they're too suspicious of your intentions to give a real answer. Why would you need to know anyway? Eventually, word gets back around to the manager, and he's curious why you're snooping around asking too many questions about your teammates. Welp.\n\t\t\t\t*goto relationshipchoice\n\t\t#Talk to the manager like I already know what happened and see if he will give it away. I'm a smooth enough talker to make this work.\n\t\t\t*if eloquent >= 60\n\t\t\t\t*set anecdotes +2\n\t\t\t\t*check_achievements\n\t\t\t\t*if not(choice_achieved_memoirmaterial)\n\t\t\t\t\t*achieve memoirmaterial\n\t\t\t\t\"I'm glad you finally stopped letting the outfielders do what they want all the time,\" you say to your manager, trying to joke around and imply you know what happened. \"Just because you played the outfield doesn't mean you can take it easy on them. How long ago were you still playing? Two, three years?\" You know he last played at least fifteen years ago.\n\n\t\t\t\t\"Hey, I've never had any tolerance for two teammates wanting to punch each other. Stupid kids,\" he says. You figured they were just out drinking too late and didn't want to play with a hangover. But throwing punches? You spend the rest of the day talking to more teammates and coaches, using the information you get to get more and more until you know the whole story.\n\n\t\t\t\tThe full story turns out to be silly: The left fielder said he could run faster than the center fielder, so they had a race. When the left fielder lost, he got angry and said \"Well, I can still hit harder,\" then landed a punch on his teammate. He meant it to be a soft punch, but it wasn't, so that one punch meant as a joke turned into a full fistfight. Those morons. It's perfect material for your book, so you write it all down.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*else\n\t\t\t\t*set rebellious %+20\n\t\t\t\t\"Boy, those outfielders of ours need to learn the value of a full night's sleep,\" you say, trying to imply you know what happened to them. They were probably out drinking too late and woke up with a hangover, right?\n\n\t\t\t\tYour manager asks you something along the lines of \"what the hell are you talking about?\" and you realize your theory missed the mark.\n\n\t\t\t\t\"No no, I just mean about whatever gave two of my outfielders those 'flu-like symptoms,'\" you say, which doesn't help. Also, since when are they \"your\" outfielders? You're stumbling over your words a little.\n\n\t\t\t\tThe manager eventually figures out you're trying to snoop and figure out what happened to the two players. You get no information, and you've lost some trust with the manager. Whoops.\n\t\t\t\t*goto relationshipchoice\n\t\t#Ask the bench coach to tell me what happened. She knows I'm a loyal soldier and wouldn't tell anybody.\n\t\t\t*if rebellious \u003c= 40\n\t\t\t\t*set anecdotes +2\n\t\t\t\t*check_achievements\n\t\t\t\t*if not(choice_achieved_memoirmaterial)\n\t\t\t\t\t*achieve memoirmaterial\n\t\t\t\tYou directly ask your bench coach what happened, and she trusts you enough to answer. The full story turns out to be silly: The left fielder said he could run faster than the center fielder, so they had a race. When the left fielder lost, he got angry and said \"Well, I can still hit harder,\" then landed a punch on his teammate. He meant it to be a soft punch, but it wasn't, so that one punch meant as a joke turned into a full fistfight. Those morons. It's perfect material for your book, so you write it all down.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*else\n\t\t\t\t*set clubhouse_rep %-20\n\t\t\t\tYou directly ask your bench coach what happened, but she sticks to the company line: \"flu-like symptoms.\" Why wouldn't they just call it a flu? So you have no information, and when your teammates return to the team, they look askance at you like they know you asked about them. It's harder to find secrets than you thought.\n\t\t\t\t*goto relationshipchoice\n\t*goto relationshipchoice\n*elseif career = \"fitness\"\n\tJulie calls you over to the studio one day and hands you a stack of paper. \"I need to make totally, completely 100% sure you can handle the workload of this job,\" she says. \"Now don't get me wrong, you'll never have to work out this hard as a partner here, but I want to see if you can handle this plan. Read through the papers and follow exactly what they say for the next week, then come back and let me know how you did. You're going to have to psych yourself up for this. I trust you already have all the equipment at home.\" You don't, of course. Why would you? You're not a fitness professional yet. You'll have to either buy a bunch of stuff or hit the gym and work until you're exhausted every day. What do you do?\n\t*choice\n\t\t#Get serious and spend all week working out with no time for showers, nice clothes, or looking like a normal, sane person.\n\t\t\t*if serious >= 55\n\t\t\t\t*set fitness %+20\n\t\t\t\t*check_achievements\n\t\t\t\t*if fitness > 60\n\t\t\t\t\t*if not(choice_achieved_ripped)\n\t\t\t\t\t\t*achieve ripped\n\t\t\t\tYou know how to put away the pointless stuff when it matters and go all out to reach your goals. There's no time in your life for anything but fitness, and whether it's diet or exercise or just looking like a soggy, exhausted person in compression shorts, you do what it takes.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*else\n\t\t\t\t*set fitness %+10\n\t\t\t\t*check_achievements\n\t\t\t\t*if fitness > 60\n\t\t\t\t\t*if not(choice_achieved_ripped)\n\t\t\t\t\t\t*achieve ripped\n\t\t\t\tYou make an initial effort to work out hard every day, but when you see that haunted, overworked person in the mirror on day two, you can't go all in. You take a shower and get yourself looking respectable again, and at that point, it would just be a shame to work out and mess up all your everything again. You get into slightly better shape, but maybe not the level of work that Julie was asking for.\n\t\t\t\t*goto relationshipchoice\n\t\t#Look in the mirror and tell myself to do this work exactly as it's written, all week.\n\t\t\t*if intimidating >= 55\n\t\t\t\t*set fitness %+20\n\t\t\t\t*check_achievements\n\t\t\t\t*if fitness > 60\n\t\t\t\t\t*if not(choice_achieved_ripped)\n\t\t\t\t\t\t*achieve ripped\n\t\t\t\tYou look in the mirror and see tiny, nearly imperceptible pockets of cheek and neck fat and you say, \"Never again, ${givenname}! That cheek fat is going to turn into cheek muscle!\" For a week straight, you eat, sleep, and breathe fitness, until your body is burning and spent. And, what do you know, the results are totally there. You're noticeably more toned and muscular, and ready to run the fitness world.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*else\n\t\t\t\t*set fitness %+10\n\t\t\t\t*check_achievements\n\t\t\t\t*if fitness > 60\n\t\t\t\t\t*if not(choice_achieved_ripped)\n\t\t\t\t\t\t*achieve ripped\n\t\t\t\tYou can't help but laugh looking at yourself in the mirror trying to be intimidating. It's just not you. You'll work out, sure, but you're too laid back to get all intense about it. Hopefully it's enough for Julie, but if not, what can you do? No reason to hurt yourself.\n\t\t\t\t*goto relationshipchoice\n\t\t#Buy the absolute top of the line fitness equipment to help me train.\n\t\t\t*if wealth >= 60\n\t\t\t\t*set wealth -10\n\t\t\t\t*set fitness %+20\n\t\t\t\t*check_achievements\n\t\t\t\t*if fitness > 60\n\t\t\t\t\t*if not(choice_achieved_ripped)\n\t\t\t\t\t\t*achieve ripped\n\t\t\t\tBaseball has made you wealthy, and it's time to invest that money. If you're going to get serious about fitness, you'll need all the best fitness junk, so suddenly that one room in your big house that was kind of a permanent \"unfurnished guest room\" is now full of weights, medicine balls, aerobic steps, and multiple treadmills (you couldn't pick just one). It's so fun to toy around with all the different stuff that you do nothing but work out for the whole week, without even realizing you were doing hard work. Money well spent.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*else\n\t\t\t\t*set wealth -5\n\t\t\t\t*set fitness %+10\n\t\t\t\t*check_achievements\n\t\t\t\t*if fitness > 60\n\t\t\t\t\t*if not(choice_achieved_ripped)\n\t\t\t\t\t\t*achieve ripped\n\t\t\t\tYou've made some money off baseball, but not [i]real[/i] money, so you can't waste too much on fitness equipment. Plus, your house only has room for a treadmill, a set of weights, and, yeah, that's about it. You spend a reasonable amount on the equipment and work out, but you're tired three days in to this insane Julie Cheng routine. Maybe she needs a separate plan for \"fitness on a budget.\"\n\t\t\t\t*goto relationshipchoice\n*elseif career = \"distributive justice\"\n\tYou visit Rasheed Taylor at his law office one afternoon to go over plans for the coming season. \"We only require one squadron to properly compensate players,\" he says. \"Then, all others will follow their example, because their players will find success at a noticeably higher rate.\"\n\n\tAfter a little further probing into Rasheed's idea, you understand that his theory is based around the \"hierarchy of needs.\" He thinks that minor league athletes would perform better if they didn't have to constantly worry about money. If they have easy access to all the food and shelter they need, they will have more time to spend thinking about how to improve at baseball. Good nutrition alone would serve them much better than spending as little as possible on PB&J sandwiches and fast food burgers.\n\n\tSo you need to find a way to convince one team that this will help their minor league prospects turn into stars. How do you do that?\n\t*choice\n\t\t#Propose the idea to my team's GM.\n\t\t\t*if rebellious \u003c= 45\n\t\t\t\t*set justiceserved true\n\t\t\t\tYou have a direct meeting with the ${nextteam} GM and propose your idea, that paying minor leaguers better might help them turn into better major leaguers down the road. It's a radical thing for a player to propose to a general manager, but you've proven your loyalty to the team over time, so he takes the meeting and promises to talk to the team owner about this proposal. Time will tell if they actually do anything, but signs are good.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*else\n\t\t\t\tYou ask for a meeting with the GM, but you're turned down. Team ownership is very skeptical of what they are calling your \"redistribution campaign\" and while they have no problem keeping you on the team, they don't want to encourage any ideas about increasing pay for minor leaguers. That's discouraging.\n\t\t\t\t*goto relationshipchoice\n\t\t#Put the idea out there with the public and see if it catches on with someone.\n\t\t\t*if public_rep >= 60\n\t\t\t\t*set justiceserved true\n\t\t\t\tYou propose the idea in an interview that paying minor leaguers more money might make them develop into better players. To say some fans are skeptical puts it mildly, but you only have to convince one owner to make the idea stick. Time will tell if any teams decide to try out your idea, but you've done your job by making it public and starting a conversation.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*else\n\t\t\t\tYou propose the idea in an interview, but you don't really have the reputation to back it up. Many people assume you have some ulterior motive, and some think you're advocating Rasheed Taylor's ideas because he's paying you something. The fact that he's not paying you at all doesn't matter. The skepticism is out there, so no team owners feel pressured to give your strategy a try. Maybe there's another way.\n\t\t\t\t*goto relationshipchoice\n\t\t#Give my money away to a specific minor league team's players and see how they perform.\n\t\t\t*if wealth > 50\n\t\t\t\t*set wealth %-20\n\t\t\t\t*set justiceserved true\n\t\t\t\tYou're always willing to use your own resources to make a plan come to life, so you give away a large amount of your salary to a minor league team that's not affiliated with the major leagues. Hopefully you'll be able to see their stats improve, or maybe even see a few turn into big league stars. But that will take time, and so you'll have to wait to find out if it works.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*else\n\t\t\t\t*set wealth %-20\n\t\t\t\tThe awkward thing is, you're already light on money. But you still pick a minor league team that's unaffiliated with the major leagues and give some cash away to their players, so you can see if any of their stats improve or if they develop into big league stars. It will take some time to see a change, so you're forced to wait for now. And in the meantime, you'll need to think about moving into a cheaper house.\n\t\t\t\t*goto relationshipchoice\n*elseif career = \"actor\"\n\tWilson Virdon starts to mention your name around Hollywood, but he's worried you're not ready for the job yet. \"I'm serious now, you need to have great style and a fit body to get a job in Hollywood these days,\" he says. \"I can let you know about some people if you want to get more of a Hollywood look to you, you know? Or if you think you're close to ready, I can put you in some TV shows and let you get some experience at the job.\" What do you want to do?\n\t*choice\n\t\t#Visit a professional stylist to improve your look.\n\t\t\t*set serious %-20\n\t\t\t*check_achievements\n\t\t\t*if serious \u003c 40\n\t\t\t\t*if not(choice_achieved_styleicon)\n\t\t\t\t\t*achieve styleicon\n\t\t\tVirdon sends you to a stylist, who, three seconds after you walk in the door, has already picked out a new haircut for you to try. She says it fits your face shape better, whatever that means, and though it takes some getting used to, she's clearly right. You suppose these kind of details will be important with your acting, even if it's just a subconscious thing.\n\t\t\t*goto relationshipchoice\n\t\t#Get your body in perfect shape.\n\t\t\t*set fitness %+20\n\t\t\t*check_achievements\n\t\t\t*if fitness > 60\n\t\t\t\t*if not(choice_achieved_ripped)\n\t\t\t\t\t*achieve ripped\n\t\t\tYou put all your effort into exercise, building out your muscles so you can make it as an action star one day. It takes more energy than you should really spend while the baseball season is going on, but you start to see results after a few weeks, and you're starting to feel more confident about getting into a Hollywood film.\n\t\t\t*goto relationshipchoice\n\t\t#Act in a few small TV shows to get used to the lifestyle.\n\t\t\t*set wealth +5\n\t\t\t*set serious %-10\n\t\t\t*set fitness %+10\n\t\t\t*check_achievements\n\t\t\t*if serious \u003c 40\n\t\t\t\t*if not(choice_achieved_styleicon)\n\t\t\t\t\t*achieve styleicon\n\t\t\tVirdon gets you a role in [i]Po-Po[/i], a new police sitcom that nobody expects to get good ratings, so it's a low-pressure first job for you. You play a police sergeant who's missing an arm, a sort of ironic acknowledgement of your real-world career. You're not great at delivering funny lines, but the work still gets you in slightly better shape, and a makeup artist on the show gives you a few tips to improve your style when you go into a big Hollywood audition.\n\t\t\t*goto relationshipchoice\n*elseif career = \"endorser\"\n\tWilson Virdon warns you in a call one day that to do endorsement work, you need to be willing to say bad marketing lines about products you don't really know or care about. There are a few different paths to make that work, and he suggests three: \"Either you get all Zen and stop thinking about what you're saying, just going along for the ride, or you get so loyal to the people who pay you that you'd say anything for them with no questions asked, or you have so much style that nobody really cares if you look like you actually use the product or not. Just having your name attached to it will give the advertisers all they need.\" Which strategy are you going to go for?\n\t*choice\n\t\t#Just relax and stop thinking about what you're saying when you endorse a product.\n\t\t\t*if intimidating \u003c= 40\n\t\t\t\t*set eloquent %-20\n\t\t\t\t*check_achievements\n\t\t\t\t*if eloquent \u003c 40\n\t\t\t\t\t*if not(choice_achieved_dayatatime)\n\t\t\t\t\t\t*achieve dayatatime\n\t\t\t\tWith your personality, you don't let anything bother you. If you were more high-strung, maybe the endorsement job would eat away at you over time, but hey, you're getting paid and you're getting free stuff, so why worry? Sometimes knowing how to just relax can be a valuable skill.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*else\n\t\t\t\t*set eloquent %-10\n\t\t\t\t*check_achievements\n\t\t\t\t*if eloquent \u003c 40\n\t\t\t\t\t*if not(choice_achieved_dayatatime)\n\t\t\t\t\t\t*achieve dayatatime\n\t\t\t\tYou try as hard as you can to get into the mindset, but you're not really a person who can relax their brain for long. Maybe sometimes when you're listening to music, or sitting out on the beach or something, but not when you're shoved in front of cameras and told to eat the same bite of yogurt thirty times then say \"Mmm!\" on cue.\n\t\t\t\t*goto relationshipchoice\n\t\t#Turn your baseball loyalty into brand loyalty. And you'd do anything for your (corporate) team.\n\t\t\t*if rebellious \u003c= 40\n\t\t\t\t*set eloquent %-20\n\t\t\t\t*check_achievements\n\t\t\t\t*if eloquent \u003c 40\n\t\t\t\t\t*if not(choice_achieved_dayatatime)\n\t\t\t\t\t\t*achieve dayatatime\n\t\t\t\tYou've always been a loyal soldier, and when you're working for a brand instead of a baseball team, that won't change. If somebody trusts you enough to pay you, you're there to help and nothing else will stand in the way. Even if you have to pretend to really like the smell of Reaper Body Spray.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*else\n\t\t\t\t*set eloquent %-10\n\t\t\t\t*check_achievements\n\t\t\t\t*if eloquent \u003c 40\n\t\t\t\t\t*if not(choice_achieved_dayatatime)\n\t\t\t\t\t\t*achieve dayatatime\n\t\t\t\tWell, you haven't always followed whatever the team has told you, so you can't be so sure that will work with advertisers either. You can just imagine being told to take a swig of energy drink then give a thumbs up one too many times, so you flip the camera off instead and leave the studio in a huff. This could be difficult.\n\t\t\t\t*goto relationshipchoice\n\t\t#Be so stylish and cool that your name alone is enough to sell a product.\n\t\t\t*if serious \u003c= 40\n\t\t\t\t*set eloquent %-20\n\t\t\t\t*check_achievements\n\t\t\t\t*if eloquent \u003c 40\n\t\t\t\t\t*if not(choice_achieved_dayatatime)\n\t\t\t\t\t\t*achieve dayatatime\n\t\t\t\tThe way you dress, the way you look, the way you act, it's all enough for advertisers to want you already. You don't need to pretend to actually [i]like[/i] their products. In fact, you definitely shouldn't. Just be yourself, and put the right hashtags in your tweets, and the money will come rolling in. It's a good place to be.\n\t\t\t\t*goto relationshipchoice\n\t\t\t*else\n\t\t\t\t*set eloquent %-10\n\t\t\t\t*check_achievements\n\t\t\t\t*if eloquent \u003c 40\n\t\t\t\t\t*if not(choice_achieved_dayatatime)\n\t\t\t\t\t\t*achieve dayatatime\n\t\t\t\tSure, you're more stylish than the average baseball player, but the average baseball player forgot how to dress outside of a uniform ten years ago. You're a long way from \"too cool to care\" status, and that could be a problem for advertisers. We'll have to see.\n\t\t\t\t*goto relationshipchoice\n*elseif career = \"pre-game\"\n\tWilson Virdon knows you can get a job doing pregame work, but he wants you to understand something about the job first. \"To do pregame, you need to play a role. You're either the obnoxious stat nerd who thinks he's too smart to ever be wrong, or you're the old ballplayer who knows the game is played through emotional strength, and numbers are for sissies anyway. I can't stress this enough: Don't just ride the fence on this. If you play one of those roles, you'll make a lot of money in this business.\" What do you do?\n\t*choice\n\t\t#Bone up on the latest baseball statistics and what they mean.\n\t\t\t*set analytical %+15\n\t\t\tYou've tackled advanced baseball stats with a combination of confusion and disdain in the past, but if you're going to fit your role in the pregame shows, you need to gain a basic understanding of them. Wins Above Replacement is the popular choice, so you start by reading about that one. But you immediately hit a wall when you hear there are three slightly different Wins Above Replacement stats kept by competing websites: bWAR, fWAR, and WARP. Why can't it be easy, like Earned Run Average? Though, now that you think about it, ERA has always been really complicated too. This could take some time.\n\t\t\t*goto relationshipchoice\n\t\t#Learn how to describe players without resorting to their statistics.\n\t\t\t*set analytical %-15\n\t\t\tYou've been a little too familiar with statistical analysis in the past, and to fit your role in the pregame show, you need to learn how to talk without using those pesky numbers. Plus, it helps if you can find things a player needs to change that don't show up in the stats. Maybe a pitcher is shortening his arm up too much and shotputting the ball. Maybe a hitter has a high average but doesn't have the bat speed to catch up to hit high fastballs. Those kinds of things aren't obvious from the stats, and you need to use your baseball intuition and recognize them for the audience.\n\t\t\t*goto relationshipchoice\n\t\t#Start doing some pregame work for the local radio station to get some work in.\n\t\t\t*set wealth +5\n\t\t\tYou think you're ready for the job as you are, so you start doing pregame work for independent league baseball at the local radio station. You learn how to argue points and get loud and generally have a great time talking baseball for the audience to listen to as they drive home from work.\n\t\t\t*goto relationshipchoice\n*else\n\t*bug\n\n*label relationshipchoice\n*page_break\nWith all this time thinking about what life will be like after baseball, you realize there's one more piece missing. You've been too focused on your work to think about the dating world at all. You could always meet someone after you've retired, but is there anyone you've worked with so far who you'd be interested in dating?\n*label relationshiploop\n*choice\n\t*hide_reuse #Inés Cruz, the journalist.\n\t\tYou invite Cruz out for dinner and she accepts right away. Is she interested in you, or is she looking to get information for her reporting? Hmm…\n\n\t\t*if intimidating \u003c 45\n\t\t\t*set partner \"Cruz\"\n\t\t\tYou play conversational tug-of-war throughout dinner. You want her to talk about Inés, and she wants you to talk about %{givenname}. You share life stories for a long dinner, plus some dessert, plus actually, wouldn't coffee be nice?\n\n\t\t\tSomehow, the conversation never touched baseball. She didn't want to write about you, she just wanted to get to know you. Before dinner is even over, you've scheduled another dinner. Then that dinner leads to a movie. Then that movie leads to a day just walking around the city, stopping in at various places. Neither of you dare to call it \"dating,\" but that's what it's become. You're in a relationship, and it seems to be going very well.\n\t\t\t*goto moongameannouncement\n\t\t*else\n\t\t\tYou play conversational tug-of-war throughout dinner. You want her to talk about Inés, and she wants you to talk about baseball. Eventually, in a moment of weakness, you make your aims clear. You ask if she'd be interested in going on more dates with you, using the vital word there, \"date.\"\n\n\t\t\t\"This is probably bad for me to say, but I've thought about what we'd be like as a couple,\" Cruz says. \"We've talked plenty of times, and we get along pretty well. But at some point I decided that you're too…intense, maybe, for me. You're very focused, and you strike an intimidating presence, right? It would probably be better for me in journalism if I could focus and hunt down a source or whatever, but I'm a laid back kind of person. So please, don't be offended, but I don't think we would mesh well in that kind of relationship, okay?\"\n\n\t\t\tWell, that could have gone better. Is there anyone else you'd be interested in?\n\t\t\t*goto relationshiploop\n\t*hide_reuse #Rasheed Taylor, the labor activist.\n\t\tYou give Rasheed a call to see what he's up to. \"To whom do I have the pleasure of speaking?\" he says as he answers the phone. You always forget how strangely he talks until you're talking to him.\n\n\t\t*if eloquent > 55\n\t\t\t*set partner \"Taylor\"\n\t\t\t\"Would you object to having dinner with me tonight?\" you ask, trying to go a middle road between his diction and something more normal.\n\n\t\t\tHe thinks for a moment, then agrees. He suggests an incredibly fancy restaurant, and you pay a fortune for maybe the tiniest plate of food you've ever eaten. But the wine is good, and you get along well with Taylor.\n\n\t\t\tJust a few weeks later, you visit his \"cheateau\" (really just a regular house just outside the city). He has a huge home library, highlighted by what he claims is a \"functionally complete\" collection of Alexandre Dumas novels. He lets you borrow \"a base translation\" of [i]The Three Musketeers[/i] and the two of you seem to be in a relationship.\n\t\t\t*goto moongameannouncement\n\t\t*else\n\t\t\t\"Any chance we could go see a movie together?\" you ask.\n\n\t\t\t\"I haven't visited a theater in the past ten years. Ah, but that's not true. I viewed a live projection of [i]La Traviata[/i]. The room was pungent and the acoustics non-existent. I deemed it an unacceptable way to partake in opera. So, no, apologies, but I won't be going to any theater.\"\n\n\t\t\t\"Well, how about dinner?\" you ask.\n\n\t\t\t\"I think not. I sense that we are quite different people. But I appreciate your calling me, and I thank you. Goodbye.\"\n\n\t\t\tWell, that could have gone better. Is there anyone else you'd be interested in?\n\t\t\t*goto relationshiploop\n\t*hide_reuse #Julie Cheng, the fitness expert.\n\t\tJulie's gym/studio is nearby, so you walk over and say hello. She quickly makes it clear that she's short on time and you should get to the point, so you do just that. You ask her out to dinner.\n\n\t\t\"Hmm…\" Cheng says, looking you up and down. Eventually her eyes stop at yours, her look serious and calculated.\n\t\t*if fitness > 55\n\t\t\t*set partner \"Cheng\"\n\t\t\t\"Okay, that's a good angle, actually,\" she finally says. \"We could be a power fitness couple. You look the part, I look the part. Charles, what do you think?\"\n\n\t\t\tCharles, her producer, doesn't appreciate being looped into what sounds like a personal conversation, so he just shakes his hands in apology and disappears into another room. \"See?\" Cheng says, as if he agreed. \"I think this sounds great. Unfortunately, I don't have time for dinner or anything. I'll call you, though. We can 'date' some time. Totally. Right, Charles? Where'd you go?\" She disappears after him. Well, um…You're in a relationship now, theoretically.\n\t\t\t*goto moongameannouncement\n\t\t*else\n\t\t\t\"I just don't see how it's going to work,\" she finally says. \"I have a lot of work on my plate constantly, so if we were going to be romantic partners, we'd also have to be business partners. Otherwise I'm not sure what the point would be. I'd never see you. And you're just not fit enough to be in my videos, right Charles?\"\n\n\t\t\tCharles, her producer, doesn't appreciate being looped into what sounds like a personal conversation, so he just shakes his hands in apology and disappears into another room. \"See?\" Cheng says, as if he agreed. \"In another life, perhaps. Charles? Where'd you go?\" She leaves after him.\n\n\t\t\tWell, that could have gone better. Is there anyone else you'd be interested in?\n\t\t\t*goto relationshiploop\n\t*hide_reuse #Prakash Bhavsar, the computer whiz.\n\t\tPrakash struck you as a smart, confident guy in your few interactions to this point, so you give him a call. He suddenly gets awkward and shy on the phone. That awkwardness only gets worse when you ask him out to dinner.\n\n\t\t*if analytical > 55\n\t\t\t*set partner \"Bhavsar\"\n\t\t\t\"I'm just not really good with people,\" he says. \"I don't know how to do small talk and stuff.\"\n\n\t\t\t\"So how about we do big talk? Tell me about the stuff you're studying, and we can work from there. It involves pitching, so I'll have plenty to ask about it.\"\n\n\t\t\t\"Oh, well, sure. You want to talk about that now?\" he says.\n\n\t\t\t\"No, let's get dinner somewhere. Just to talk, no pressure.\" The two of you have dinner, and you nerd out about the mechanics of pitching for a few hours. The conversation goes well, and then these dinners become a regular thing. Over time, you start to feel comfortable talking about little everyday stuff, and then what do you know, it's a relationship.\n\t\t\t*goto moongameannouncement\n\t\t*else\n\t\t\t\"I don't, it's just,\" he starts to say. \"You wouldn't like me that much. Working with data, and baseball stuff, I do great, but in any kind of dating context, I'm a big neurotic mess. After my last breakup I decided to go it alone on that front, you know, and just try to be myself for a bit. So I have to say no, but just realize that it has nothing to do with you specifically, okay? Sorry.\"\n\n\t\t\tWell, that could have gone better. Is there anyone else you'd be interested in?\n\t\t\t*goto relationshiploop\n\t*hide_reuse #Wilson Virdon, the celebrity agent.\n\t\tYou call up Wilson Virdon and he starts pitching you ideas before you can say anything. \"Are you looking for ad work? I found this milk company that's looking for athletes, but they say you have to be okay with being completely drenched in milk for the couple hours you'll be filming. Just a constant stream of the stuff. I thought it was weird, but I thought I may as well ask you if you're interested.\"\n\n\t\tYou do your best to ignore the weird milk thing and ask Virdon out to dinner.\n\t\t*if serious \u003c 45\n\t\t\t*set partner \"Virdon\"\n\t\t\t\"Take me out to dinner? No, I'll take you out to dinner,\" he says. \"I know all the best places. You only live here half the time anyway, so you don't know the good stuff.\" He starts on a long description of some great restaurant that you admittedly haven't heard of. Then, predictably, it ends with him saying \"Of course, the owner at that restaurant did say she was looking for a celebrity to act in an advertisement for her. But hey, we can discuss that after our dinner.\"\n\n\t\t\tDespite constant interruptions to discuss small acting opportunities, you and Virdon have a nice time out, and you very slowly start to build a real relationship. He stops talking to you like you're a client of his and starts talking to you like a person. And it takes a lot to get him to stop thinking about work.\n\t\t\t*goto moongameannouncement\n\t\t*else\n\t\t\t\"I'm sorry, but I'm not sure we would fit together that well,\" he replies. \"I guess I'm kind of a flashy guy, and I like to have a flashy partner by my side. Plus, I don't know, maybe my other clients wouldn't like it if I were dating a baseball player. They might think I'd pay more attention to you than them, right? I hope that's all right.\"\n\n\t\t\tWell, that could have gone better. Is there anyone else you'd be interested in?\n\t\t\t*goto relationshiploop\n\t#Andres del Rosario, the catcher.\n\t\t*set partner \"Rosario\"\n\t\t*if nextteam = \"Barons\"\n\t\t\tYou feel closer to Rosario after your friendship lasted through the PED controversy, and at some point, the friendship becomes something else. It happens slowly over time, without either of you saying anything about it. You spend every day together, whether there's a baseball game to play or not.\n\n\t\t\tEventually, a noteworthy blogger publishes an article about how inseparable the two of you seem to be, sort of jokingly implying that you're a couple. During a post-game press conference, another reporter decides to ask if you saw the article, and asks if you really are close friends with Rosario.\n\n\t\t\tThankfully, you discussed this moment with Andres before, and he agreed that if anyone asks, you should just come forward with the truth. So you tell the reporter you're in a relationship. You're not just friends, but baseball's first ever teammate couple.\n\n\t\t\tThis sets off a small firestorm of questions and articles and speculation about your relationship. But eventually, everything settles down, and nobody can find a real reason to be upset about your relationship. There's no conflict of interest, and it doesn't really change the clubhouse dynamic. You're just two coworkers who slowly fell in love, like any other workplace couple in any other job in the world.\n\t\t\t*goto moongameannouncement\n\t\t*else\n\t\t\tYou've kept in touch with Rosario since he went to the New York Barons a few years ago. When he happens to be in town for a series, you text him to invite him over to your house after the game, and he agrees.\n\n\t\t\tOver the course of the series, you quickly realize you both have feelings for one another. You've known each other for a long time, but it never occurred to you how well you got along until that day you invited him over.\n\n\t\t\tIt's hard to get much face-to-face time with your different travel schedules, but you text and video chat whenever you get a chance. It's a strange kind of long-distance relationship during the season, but it helps to talk to another baseball player who knows exactly what you're going through. After so many years of long and lonely travel schedules, now you have someone to talk to every evening, even if it's just over the phone.\n\n\t\t\tAfter you share some perhaps too-close pregame hugs with Rosario in one game, rumors start to spring up that you're in a relationship. Eventually, just to get ahead of things, you let NSN know through Inés Cruz that you are in fact in a relationship with Andres del Rosario. A few stories are written about the \"implications\" of your relationship if you ended up pitching against Rosario in an important game. But that's not too likely to happen, right?\n\t\t\t*goto moongameannouncement\n\t*hide_reuse #Ama Mendis, the pitcher.\n\t\t*if nextteam = \"Capers\"\n\t\t\t*if mendis_rel > 0\n\t\t\t\t*set partner \"Mendis\"\n\t\t\t\tAma Mendis has had complex feelings towards you over the years, but ever since things were resolved between you toward the end of last season, you've started to drift together. Now that she doesn't see you as a competitor trying to take her livelihood, she's started to see you as a teammate, then a close friend, then something more than that.\n\n\t\t\t\tEventually, a noteworthy blogger publishes an article about how inseparable the two of you seem to be, sort of jokingly implying that you're a couple. During a post-game press conference, another reporter decides to ask if you saw the article, and asks if you really are close friends with Ama Mendis.\n\n\t\t\t\tThankfully, you discussed this moment with Ama before, and she agreed that if anyone asks, you should just come forward with the truth. So you tell the reporter you're in a relationship. You're not just friends, but baseball's first ever teammate couple.\n\n\t\t\t\tThis sets off a small firestorm of questions and articles and speculation about your relationship. But eventually, everything settles down, and nobody can find a real reason to be upset about your relationship. There's no conflict of interest, and it doesn't really change the clubhouse dynamic. You're just two coworkers who slowly fell in love, like any other workplace couple in any other job in the world.\n\t\t\t\t*goto moongameannouncement\n\t\t\t*else\n\t\t\t\tMendis left baseball last year and hasn't returned. At this point you don't even know how you would try to contact her. And given that she left the game because she felt overshadowed by you, she probably wouldn't be interested in a relationship in any case.\n\n\t\t\t\tSo, is there anyone else you'd be interested in?\n\t\t\t\t*goto relationshiploop\n\t\t*else\n\t\t\t*set partner \"Mendis\"\n\t\t\tAma is a star pitcher with the Florida Capers now, but you've stayed in touch occasionally over the years. When she happens to be in town for a series, you text her and ask to hang out at your place after the game, and she agrees.\n\n\t\t\tOver the course of the series, you quickly realize you both have feelings for one another. You've known each other for a long time, but it never occurred to you how well you got along until that day you invited her over.\n\n\t\t\tIt's hard to get much face-to-face time with your different travel schedules, but you text and video chat whenever you get a chance. It's a strange kind of long-distance relationship during the season, but it helps to talk to another baseball player who knows exactly what you're going through. After so many years of long and lonely travel schedules, now you have someone to talk to every evening, even if it's just over the phone.\n\n\t\t\tAfter you share some perhaps too-close pregame hugs with Mendis in one game, rumors start to spring up that you're in a relationship. Eventually, just to get ahead of things, you let NSN know through Inés Cruz that you are in fact in a relationship with Ama Mendis. A few stories are written about the \"implications\" of your relationship if you two ended up pitching against one another in an important game. But that's not too likely to happen, right?\n\t\t\t*goto moongameannouncement\n\t*if (nextteam = \"Bulls\") #Portia Roberts, your teammate.\n\t\t*set partner \"Roberts\"\n\t\tYou bump into Portia in the locker room before a game, and decide to go for it. \"Hey, Portia,\" you start, which is just a killer way to start, good job. \"Feel free to say no, absolutely, but I was wondering if you'd like to get dinner together or something, maybe.\"\n\n\t\t\"Wait, wait, wait,\" she says forcefully, making your chest sink a little. \"Let's pretend you never said that. Okay? Leave the room, come back, then say something else to me, just some normal stuff.\"\n\n\t\tYou dutifully leave the locker room, embarrassed, then walk back in. \"Hi Portia, um, how are you?\"\n\n\t\t\"Hey, ${givenname}. Do you want to get a late dinner after the game with me? I've been thinking about asking you for a while.\"\n\n\t\t\"Of course,\" you say, taking this twist in stride as well as you can.\n\n\t\t\"Great. And remember, I'm the one who comes up with the brilliant ideas around here. Don't you start trying to come up with brilliant ideas all of a sudden. My role. I'll see you at dinner later.\" You're not sure that necessitated the emotional rollercoaster, but all's well that ends well.\n\n\t\tEventually, a noteworthy blogger publishes an article about how inseparable the two of you seem to be, sort of jokingly implying that you're a couple. During a post-game press conference, another reporter decides to ask if you saw the article, and asks if you really are close friends with Portia Roberts.\n\n\t\tThankfully, you discussed this moment with Portia before, and she agreed that if anyone asks, you should just come forward with the truth. So you tell the reporter you're in a relationship. You're not just friends, but baseball's first ever teammate couple.\n\n\t\tThis sets off a small firestorm of questions and articles and speculation about your relationship. But eventually, everything settles down, and nobody can find a real reason to be upset about your relationship. There's no conflict of interest, and it doesn't really change the clubhouse dynamic. You're just two coworkers who slowly fell in love, like any other workplace couple in any other job in the world.\n\t\t*goto moongameannouncement\n\t*if (nextteam = \"Bulls\") #Connor Harris, your teammate.\n\t\t*set partner \"Connor\"\n\t\tYou meet Connor in the locker room before a game and decide to be straightforward. \"Any chance I could take you out for dinner after the game?\"\n\n\t\t\"All right, but get ready to be bored. I'm the shy, retiring sort, don't you know,\" he says sarcastically.\n\n\t\tConnor talks your ear off for the whole dinner about everything, including baseball, his opinions on every barbecue restaurant he's ever been to, and a long digression on the physics of airplanes (\"People always say it's Bernoulli's Principle, but flight is really about the air pushed under the wing, not the air over it.\").\n\n\t\tOver the course of weeks spent talking to Connor in the dugout, you learn to decipher the layers of sarcasm he spreads over everything he says. You get on his wavelength, and you two slowly change from close friends into something more than that.\n\n\t\tEventually, a noteworthy blogger publishes an article about how inseparable the two of you seem to be, sort of jokingly implying that you're a couple. During a post-game press conference, another reporter decides to ask if you saw the article, and asks if you really are close friends with Connor Harris.\n\n\t\tThankfully, you discussed this moment with Connor before, and he agreed that if anyone asks, you should just come forward with the truth. So you tell the reporter you're in a relationship. You're not just friends, but baseball's first ever teammate couple.\n\n\t\tThis sets off a small firestorm of questions and articles and speculation about your relationship. But eventually, everything settles down, and nobody can find a real reason to be upset about your relationship. There's no conflict of interest, and it doesn't really change the clubhouse dynamic. You're just two coworkers who slowly fell in love, like any other workplace couple in any other job in the world.\n\t\t*goto moongameannouncement\n\t*if (nextteam = \"Capers\") #Giulio Camporese, your teammate.\n\t\t*set partner \"Camporese\"\n\t\tYou start to hang out more with Giulio Camporese in the dugout while your team is batting, getting to know him, or, more specifically, getting to know his sense of humor. He's always coming up with a new routine, like imitating the stance of his teammates while they bat, or trying to throw sunflower seeds into someone else's water cup, or trying to wear as many hats at once as possible, on his head, nose, knees, shoulders, etc. You start to become an accomplice to his dugout antics, and slowly you go from being teammates, to close friends, to something more.\n\n\t\tEventually, a noteworthy blogger publishes an article about how inseparable the two of you seem to be, sort of jokingly implying that you're a couple. During a post-game press conference, another reporter decides to ask if you saw the article, and asks if you really are close friends with Camporese.\n\n\t\tThankfully, you discussed this moment with Giulio before, and he agreed that if anyone asks, you should just come forward with the truth. So you tell the reporter you're in a relationship. You're not just friends, but baseball's first ever teammate couple.\n\n\t\tThis sets off a small firestorm of questions and articles and speculation about your relationship. But eventually, everything settles down, and nobody can find a real reason to be upset about your relationship. There's no conflict of interest, and it doesn't really change the clubhouse dynamic. You're just two coworkers who slowly fell in love, like any other workplace couple in any other job in the world.\n\t\t*goto moongameannouncement\n\t*if (nextteam = \"Barons\") #Lisa Janga, your teammate.\n\t\t*set partner \"Janga\"\n\t\tYou start to hang out more with Lisa Janga in the dugout while your team is batting, getting to know her. You learn she's from Curaçao, and like many baseball players from that Caribbean island, she speaks four languages: English, Spanish, Dutch, and Papiamento. You learn that she's a serious and dedicated worker who takes fielding practice before each game off of a ground ball machine her parents built her many years ago. Slowly, you go from being teammates, to being close friends, to being something more.\n\n\t\tEventually, a noteworthy blogger publishes an article about how inseparable the two of you seem to be, sort of jokingly implying that you're a couple. During a post-game press conference, another reporter decides to ask if you saw the article, and asks if you really are close friends with Lisa Janga.\n\n\t\tThankfully, you discussed this moment with Lisa before, and she agreed that if anyone asks, you should just come forward with the truth. So you tell the reporter you're in a relationship. You're not just friends, but baseball's first ever teammate couple.\n\n\t\tThis sets off a small firestorm of questions and articles and speculation about your relationship. But eventually, everything settles down, and nobody can find a real reason to be upset about your relationship. There's no conflict of interest, and it doesn't really change the clubhouse dynamic. You're just two coworkers who slowly fell in love, like any other workplace couple in any other job in the world.\n\t\t*goto moongameannouncement\n\t#No thanks, I'll go it alone.\n\t\t*set partner \"none\"\n\t\tOkay, no time for a partner now. Moving right along…\n\n*label moongameannouncement\n*set totalouts 125\n*if userruns >= 10\n\t*set earnedruns 25\n\t*goto year8runcheck\n*else\n\t*set earnedruns 20\n\t*goto year8runcheck\n*label year8runcheck\n*if userstrikeouts >= 5\n\t*set strikeouts 35\n\t*goto year8strikeoutcheck\n*else\n\t*set strikeouts 28\n\t*goto year8strikeoutcheck\n*label year8strikeoutcheck\n*set wins +8\n*set losses +2\n*page_break\nOn a meaningless mid-May Monday, the league commissioner makes a special announcement: The league is delaying the All-Star Game to November, after the season is over, in order to do something special. \"With help from new All-Star Game main sponsor Zhenghe, the industry leader in technological solutions for everyday life and the pioneers of the new era of space exploration, the 2025 All-Star Game will be held in Zhenghe's Lunar Base. Fan All-Star voting will remain open throughout the season, and more information will be announced at a later time. Until then, the league would like all its players to play their hardest this year and 'shoot for the moon.'\"\n*if nextteam = \"Bulls\"\n\n\tYou're in the clubhouse with Connor and Portia when the news comes out. You all sit there, shocked. Yet again, Portia has willed one of her ideas into coming true. \"How do you do this?\" Connor says to her.\n\n\tPortia just stares at the TV for a minute, thinking. Eventually, she says, \"Shoot, I guess they figured out a way to make me play hard. I have to be an all-star so I can go to the Moon!\"\n\n\t\"You weren't playing hard before?\" you ask. \"Don't you care about helping your teammates win?\"\n\n\t\"Of course I care about y'all,\" Portia says. \"But like…okay, look, there's no easy way to say this. I love this team, I love y'all, but if my house was burning down and I had the San Antonio Bulls all packed up into one easy-to-carry box in one corner and I had a moon ticket in the other, I'm taking that moon ticket and running.\"\n*page_break Several Months Later\n*set totalouts +235\n*if userruns >= 9\n\t*set earnedruns +32\n\t*goto year8runcheck2\n*else\n\t*set earnedruns +22\n\t*goto year8runcheck2\n*label year8runcheck2\n*if userstrikeouts >= 6\n\t*set strikeouts +78\n\t*goto year8strikeoutcheck2\n*else\n\t*set strikeouts +61\n\t*goto year8strikeoutcheck2\n*label year8strikeoutcheck2\n*set wins +10\n*set losses +5\n\nThe ${nextteam} are coasting into the playoffs, and as the regular season comes to an end, you can look back at your stats and see that you've had a great year. But your arm never stops hurting. It's strange, because the pain goes away when you're pitching, but comes back after you're out of the game and stays until you throw again.\n\nYou keep your pain a secret. You just have to get through these playoffs, then you can retire and start your new career. You just have to hold on through the pain for one more month. And if you can leave as a champion, all the better.\n*page_break The Playoffs Begin\n*gosub_scene 2ndYear resetgame\n*set runnerfirst true\n*set runnerthird true\n*set outs 1\n*if nextteam = \"Barons\"\n\t*if partner = \"Mendis\"\n\t\tIt's an unprecedented situation for baseball: The opposing starting pitchers in this playoff game between the Barons and the Capers are dating. In the media, on social media, and just around the clubhouse, you hear every possible take on this situation.\n\n\t\tDoes this create a bad precedent for the game? Maybe one of them has decided who should win already, based on their relationship dynamic or by calculating who would benefit the most financially from a playoff victory? Or does this actually give ${surname} and Mendis reason to be more competitive than usual?\n\n\t\tAll the talk about your relationship is funny at first, then awkward, then irritating, then funny again. You're going to play the same way as every other game. Let people talk.\n\t\t*goto camporesebatter\n\t*else\n\t\tYou're up against the Florida Capers in your first playoff start, and the opposing starter is your former teammate Ama Mendis, the Sri Lankan cricket star who converted to baseball. You share a few words with her before the game, but not much more than a hello, good to see you again. It's a big moment for both of you, and there's not much time between games to hang out even if you wanted to. These are the playoffs, and what happens in this next game will change everything.\n\t\t*goto camporesebatter\n\t*label camporesebatter\n\n\tIn the first inning, you give up two singles and have runners standing at first and third with one out. Up to the plate comes Giulio Camporese, a big power hitter, and this feels like a vital moment in the game and the playoff series. What do you throw?\n\t*goto checkedifbaronsyear8\n*else\n\t*if partner = \"Rosario\"\n\t\tIt's an unprecedented situation for baseball: Two opposing players in this playoff series between the ${nextteam} and the Barons happen to be dating. In the media, on social media, and just around the clubhouse, you hear every possible take on this situation.\n\n\t\tDoes this create a bad incentive for the game? Maybe one of them has decided who should win already, based on their relationship dynamic or by calculating who would benefit the most financially from a playoff victory? Or does this actually give ${surname} and Rosario reason to be more competitive than usual?\n\n\t\tAll the talk about your relationship is funny at first, then awkward, then irritating, then funny again. You're going to play the same way as every other game. Let people talk.\n\n\t\tIn the first inning, the moment everyone was waiting for happens: with runners on first and third and one out, you have to pitch to Rosario. You think maybe he'll acknowledge you with a hat tip, like former teammates often do, but nope. He betrays no emotion at all, coming into his stance and staring into the empty space next to your head, where you will release the ball in just a moment. Here you go.\n\t\t*goto checkedifbaronsyear8\n\t*else\n\t\tYou're up against the New York Barons in your first playoff start. They're a big team with a lot of star players, but your old friend Andres del Rosario is playing first base for them, batting cleanup. You chat with him before the game, but there's not a lot of time to catch up. Once they get started, the playoffs are all-consuming.\n\n\t\tIn the first inning, there are runners on first and third with one out, and you have to pitch to Rosario. He gives you a subtle hat tip as he steps into the box and goes into his stance. Just a few pitches in and this already feels like the most important moment of the game. What do you throw?\n\t\t*goto checkedifbaronsyear8\n*label checkedifbaronsyear8\n\n*gosub_scene 2ndYear resetatbat\n*set batterability 5\n*set batterpower 5\n*set batterhand \"left\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 8thyearchampgameatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 8thyearchampgameatbatloop\n\n*label 8thyearchampgameatbatloop\n*if atbatresult = \"single\"\n\t*set userruns +1\n\t*if nextteam = \"Barons\"\n\t\tCamporese hits a line drive single into right field, and picks up an RBI. When he gets to first base he turns to the crowd and blows kisses to someone. The dugout? The crowd? Everyone? Who knows? Your team is behind already, and you still have trouble to work out of.\n\t\t*goto 8thyearlosers\n\t*else\n\t\tRosario hits a hard liner into the outfield to score a run, and the ${nextteam} are behind already, with just one out in the first inning. Rosario is a tough out, and the Barons are a tough team. You just have to limit the damage.\n\t\t*goto 8thyearlosers\n*elseif atbatresult = \"double\"\n\t*set userruns +2\n\t*if nextteam = \"Barons\"\n\t\tCamporese hits a double into the gap to score two runs. He stands on second and does a series of weird gestures to his dugout, presumably some kind of inside joke. Great. Well, the Barons are behind now, and you can taste the media making you eat this loss for the whole offseason.\n\t\t*goto 8thyearlosers\n\t*else\n\t\tRosario hits a long double over the right fielder's head, and that will score two runs. He stands on second and pointedly does not celebrate, trying to remain respectful to you, an old teammate and friend. You appreciate it, but you'd appreciate it more if he didn't hit a big game-changing double off of you. Now the ${nextteam} are in a big hole early in this vital playoff game.\n\t\t*goto 8thyearlosers\n*elseif atbatresult = \"triple\"\n\t*set userruns +2\n\t*if nextteam = \"Barons\"\n\t\tCamporese hits a sharp bouncer over the first base bag, and somehow you can immediately tell he's going for three bases. His stride looks quick and excited, and he runs a perfect route around the bases and slides into third, safe. Two runs score, and this game is already getting out of hand.\n\t\t*goto 8thyearlosers\n\t*else\n\t\tRosario hits the ball into the right field corner, and the right fielder kicks it around so much that Rosario gets to third base standing up. Two runs score, and this game is starting to look like a disaster. You hope Rosario appreciates the gift you gave him.\n\t\t*goto 8thyearlosers\n*elseif atbatresult = \"home run\"\n\t*set userruns +3\n\t*if nextteam = \"Barons\"\n\t\tCamporese hits the ball with authority and lets his bat drop from shoulder level, admiring his booming homer. Three runs score, and the Barons are in a big hole early in the game. You can see Mendis celebrating in the Capers dugout, ready to protect the lead.\n\t\t*goto 8thyearlosers\n\t*else\n\t\tRosario whips his bat around the ball and pulls your pitch into the air. It flies and flies and ends up ten rows back in the right field bleachers. Immediately after hitting the pitch, Rosario puts his head down and jogs around the bases in non-celebration, which is unlike him. He didn't want to show you up.\n\t\t*goto 8thyearlosers\n*elseif ((atbatresult = \"groundout\") or (atbatresult = \"lineout\"))\n\t*if nextteam = \"Barons\"\n\t\tCamporese hits a sharp ground ball up the middle, but Lisa Janga dives and has it. She flips the ball to the shortstop and it's thrown on to first for a double play. You point to Janga, giving her credit for stopping a hard-hit ball and preventing a real first inning mess.\n\t\t*goto continue8thyear\n\t*else\n\t\tRosario hits a sharp ground ball up the middle, but the second baseman dives and gets it, flipping to the shortstop who throws to first for a double play. You're not sure how much credit you can take for that, given how hard the ball was hit, but all that matters is you're out of the inning without giving up a run.\n\t\t*goto continue8thyear\n*elseif atbatresult = \"flyout\"\n\t*if nextteam = \"Barons\"\n\t\tCamporese hits the ball up in the air, as he tends to do, but it's short of the outfield fence. Your left fielder catches it and flings the ball toward the infield, but the runner decided not to try and score. Two outs now, and there's a real chance of getting out of this inning without any damage.\n\t\t*goto continue8thyear\n\t*else\n\t\tRosario hits the ball hard to the opposite field, but your left fielder gets under it and makes the catch. She throws the ball back in, and the runner decides not to try and score. That's two outs now, and you're likely to get out of this inning without giving up a run.\n\t\t*goto continue8thyear\n*elseif atbatresult = \"walk\"\n\t*if nextteam = \"Barons\"\n\t\tCamporese walks to load the bases. The next batter after him isn't so tough, so in a way that's not horrible news. But still, have to get your pitches under control to keep going in this all-important game.\n\t\t*goto continue8thyear\n\t*else\n\t\tRosario takes first on the walk to load the bases. At least he didn't hit a home run off of you, but still, you have two outs to get and the bags are full. This is an important game, and you have to throw strikes to somebody.\n\t\t*goto continue8thyear\n*elseif atbatresult = \"strikeout\"\n\t*set userstrikeouts +1\n\t*set outs +1\n\t*if nextteam = \"Barons\"\n\t\tStrike three, the umpire calls on a pitch that caught the outside edge of the zone. Camporese thinks about saying something to the umpire, but instead, simply shrugs. That's a big out in the inning, and suddenly it looks very possible to get out of it without giving up a run.\n\t\t*goto continue8thyear\n\t*else\n\t\tStrike three, and Rosario hovers over the strike zone for a moment without saying anything, then turns and goes to his dugout. That's a big out in the inning, and suddenly it looks very possible to get out of it without giving up a run.\n\t\t*goto continue8thyear\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 8thyearchampgameatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 8thyearchampgameatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 8thyearchampgameatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 8thyearchampgameatbatloop\n\t*if (knuckleball > 0) #Knuckleball.\n\t\t*set pitchthrown \"knuckleball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 8thyearchampgameatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 8thyearchampgameatbatloop\n\n*label continue8thyear\n\nHours and hours later, you finish out the game with a win, giving up two runs on six innings pitched. The ${nextteam} go on to win the series, and you've made it to the final round, the championship series.\n*page_break The Playoffs Continue\n*gosub_scene 2ndYear resetgame\n*set runnerthird true\n*set outs 2\nYou've never played against your next opponent, the Mexico City Diablos. You've heard it's very difficult to pitch in Mexico City because of the altitude, which subtly wears you out and makes the ball fly further through the thin air.\n\nYou make a fantastic start in games one and four of the series, leaving everything on the field. Your arm feels like a hornet's nest, but you get the call to make one last appearance in the series: You're going to come on in relief in game seven. The regular bullpen has been overused throughout the series, and there's no one left but you to close out the game.\n\nYou come in for the ninth inning. Your last reliever allowed a double and a stolen base in-between two strikeouts. But now it's your turn to close out the game. The ${nextteam} are ahead by one run. Get this one out and it's all over, the championship is yours. What do you throw?\n*gosub_scene 2ndYear situationtext\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 3\n*set batterpower 6\n*set batterhand \"left\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 8thyearchampgameatbatloop2\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 8thyearchampgameatbatloop2\n\n*label 8thyearchampgameatbatloop2\n*if atbatresult = \"single\"\n\t*set userruns +1\n\tTie game. He hit a ground ball to deep short and beat the throw to first. That's all it takes, it turns out. Can't really say that was your fault. Just bad luck.\n\n\tThe game goes into extra innings. Eventually you're replaced with yesterday's starting pitcher, who obviously doesn't have a lot left in the tank. He gets one clean inning but gives up the winning run in the bottom of the fifteenth.\n\t*goto 8thyearlosers\n*elseif atbatresult = \"double\"\n\t*set userruns +1\n\tIt's a long fly ball to center field, and your outfielders, panicking and unable to hear one another with the noisy crowd, run into one another and the ball falls. Tie game.\n\n\tThe game goes into extra innings. Eventually you're replaced with yesterday's starting pitcher, who obviously doesn't have a lot left in the tank. He gets one clean inning but gives up the winning run in the bottom of the fifteenth.\n\t*goto 8thyearlosers\n*elseif atbatresult = \"triple\"\n\t*set userruns +1\n\tThe crowd lights up as the ball flies just over the third baseman's glove and gets into the corner. The game is tied, and now the batter is on third base. Not ideal. You calmly ask for a new ball and get ready to attack the next hitter. Would help get out some frustration to throw a few really hard fastballs.\n\n\tThe game goes into extra innings. Eventually you're replaced with yesterday's starting pitcher, who obviously doesn't have a lot left in the tank. He gets one clean inning but gives up the winning run in the bottom of the fifteenth.\n\t*goto 8thyearlosers\n*elseif atbatresult = \"home run\"\n\t*set userruns +2\n\tYou're hit with the sudden impulse to throw up. You manage to keep everything in your mouth and swallow it back down, going to one knee and turning your head to watch the ball. Yup, it's gone. Walk-off, championship-winning home run. Stupid high altitude. Should be illegal to play baseball in a place this far from sea level.\n\t*goto 8thyearlosers\n*elseif ((atbatresult = \"groundout\") or (atbatresult = \"lineout\"))\n\tIt's a line drive to right field and it's…caught? Your right fielder sprinted forward and dove to catch the ball in the webbing of her glove, making an incredible championship-winning catch. It's over. The whole thing is over. The ${nextteam} are champions, and you were there for the last second of it.\n\t*goto 8thyearchamps\n*elseif atbatresult = \"flyout\"\n\tIt's a long fly ball to right. The crowd jumps with excitement, expecting anything hit in this stupid high-altitude ballpark to get over the fence. But not this time. The air comes out of the crowd as the ball rests safely in your right fielder's glove. She proudly shows the right field umpire the ball, then you see six other gloves get thrown up in the air. It's over. The ${nextteam} are champions.\n\t*goto 8thyearchamps\n*elseif atbatresult = \"walk\"\n\tThe batter takes first base, and the crowd smells blood. Your control is failing you at the worst time. You know it, the crowd knows it, the hitters know it. All they have to do is look for a fastball right down the middle and take anything else.\n\n\tSo that's just what they do. Two batters later, with the bases loaded, the hitter sees a fastball on a 3-1 count and serves it into right field. She gets a walk-off, championship-winning hit. Hey, most players are never good enough to be trusted to pitch the last innings of a championship series, right? Glass quarter full.\n\t*goto 8thyearlosers\n*elseif atbatresult = \"strikeout\"\n\t*set userstrikeouts +1\n\tThe umpire says nothing for a full ten heartbeats, and the crowd cheers. He must have called a ball. But, wait, no, he pushes one arm back and the other forward, yelling a deafening \"steeerike\" in the batter's ears, and it's all over. He just wanted to savor the moment.\n\t*goto 8thyearchamps\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 8thyearchampgameatbatloop2\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 8thyearchampgameatbatloop2\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 8thyearchampgameatbatloop2\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 8thyearchampgameatbatloop2\n\t*if (knuckleball > 0) #Knuckleball.\n\t\t*set pitchthrown \"knuckleball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 8thyearchampgameatbatloop2\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 8thyearchampgameatbatloop2\n\n*label 8thyearlosers\n\nThe ${nextteam} end up losing the series and crashing out of the playoffs. Not many players get to end their career with a playoff win, but you had high hopes with such a good team behind you. But the feeling in your arm leaves you with no doubt. You'll never throw another pitch.\n\nIt only takes about a week to change your mind on that last point. You've been invited to the 2025 All-Star Game, which is being held, of course, on the Moon. It's too much to pass up, and you may as well get one more chance to go out with a strikeout, or a win, or something that stinks a little less than that playoff series.\n*goto wehaveliftoff\n*label 8thyearchamps\n*set championships +1\n*set anecdotes +1\n*if championships = 1\n\t*achieve champ1\n*if championships = 2\n\t*achieve champ2\n*if championships = 3\n\t*achieve champ3\n*check_achievements\n*if not(choice_achieved_memoirmaterial)\n\t*achieve memoirmaterial\nYou're going out on top.\n\nYou come back to the locker room, dizzy from spinning around like an idiot with all your teammates on the field. Tarps have been hung from the ceiling and a couple dozen reporters and camera operators are wearing rain jackets and waiting for the world's most meticulously planned wild party to begin. Champagne bottles are lined up in rank and file, ready to be popped open and sprayed in faces and poured on heads.\n\nYou're handed a pair of goggles to protect your eyes from all the alcohol flying around, but Inés Cruz from National Sports Network flags you down for a post-game interview, so you leave the goggles off for the moment.\n\n\"What were you thinking as you threw that last pitch?\" she asks.\n*if eloquent >= 50\n\t*fake_choice\n\t\t#\"I thought about what this city has done for me, and I wanted to return the favor.\"\n\t\t\t\"Well, I thought about what this city has\n\t\t#\"When you're in a situation like that, you're not really thinking. It's all instinct. I don't know how to explain it.\"\n\t\t\t\"When you're in a situation like that, you're not really thinking. It's all\n\t\t#\"I just felt so self-actualized, my soul was on fire. You play this game your whole life but never expect to throw such an important pitch, it's incredible.\"\n\t\t\t\"I just felt so self-actualized, it was like my soul was on fire. You play this\n\t\t#\"I was thinking about the fans. I couldn't let them down. So I put every last inch of effort I had into that pitch.\"\n\t\t\t\"I was thinking about the fans, you know? I couldn't just let them down, so I put\n\t\t#\"Honestly, I was thinking about getting some pizza. I still haven't had dinner, if you can believe that.\"\n\t\t\t\"Honestly, I was thinking about getting some pizza. I still haven't had dinner, if you\n\t*goto burningeyes\n*else\n\t*fake_choice\n\t\t#\"I was thinking about keeping the pitch down and not giving the batter something good to hit.\"\n\t\t\t\"I was really just thinking about keeping that pitch down and not giving the batter,\n\t\t#\"Baseball is a team sport, and thankfully today we were the better team.\"\n\t\t\t\"Baseball is a team sport, Inés, and thankfully today,\n\t\t#\"You take this sport one game at a time, and these are the kind of things that can happen.\"\n\t\t\t\"You take this sport one game at a time, Inés, and these,\n\t\t#\"Winning a championship is every player's first goal, and tonight, we did it.\"\n\t\t\t\"Well, like I always say, winning a championship is,\n\t\t#\"I had a good game, but I want to thank my whole team for getting the win and making this special.\"\n\t\t\t\"I had a good game, I guess, but I want to just take a moment to thank,\n\t*goto burningeyes\n*label burningeyes\nagh!\" You're interrupted when some champagne splashes directly into your eyes.\n\n\"Oh, sorry, sorry!\" somebody says to you as you cover your burning, watery eyes. By the time you get your eyes cleared up, the cameraman is shooting all the other players jumping up and down and celebrating, but Inés sticks with you, making sure you're okay.\n\n\"Sorry for that. Should have let you put the goggles on before I said anything,\" Inés says.\n\n\"It's all right,\" you say. \"I was going to end up crying on camera anyway. That was my last game. I'm retiring.\"\n\nInés explodes with laughter. \"Couldn't you have said that on camera? If I bring the camera back over here, can you say that again?\"\n*fake_choice\n\t#\"Sure, I'll announce my retirement on camera.\"\n\t\tCruz pulls the cameraman back over and you get to act out what you just said for the country. \"My eyes hurt from the champagne,\" you say. \"But I was going to end up crying on camera anyway. That was my last game. I'm retiring.\"\n\n\t\tCruz starts to ask a follow-up, but you drift out of the locker room. Nothing more needs to be said than that. Goodbye, locker room. Goodbye, baseball.\n\t#\"No, I think I'll go celebrate with the team right now.\"\n\t\tYou strap on the goggles and jump into the middle of the locker room, surrounded by your teammates. You jump and embrace and yell with the rest of the ${nextteam}, completely unburdened. We're here, and we're the best, we did it together, and there's no unwritten rule to stop us from celebrating now.\n\t#\"No, I'm going to go sit somewhere on my own for a bit.\"\n\t\tCruz looks a little worried as you walk out of the locker room and back out to the now-empty dugout. While you listen to the whoops and hollers of your teammates, you sit and watch the groundskeepers do their work out on the field.\n\t*selectable_if (partner = \"Cruz\") #\"No, come on Inés, let's get out of here and get dinner.\"\n\t\tCruz laughs uncontrollably as you pick her up and carry her out of the locker room. Goodbye, locker room. Goodbye, baseball.\n\nLess than a week later, you find out you'll be pitching again after all. You've been invited to the 2025 All-Star Game, which is being held, of course, on the Moon. It's too much to pass up, and you may as well take advantage of one last chance to throw the baseball before you let your arm rest forever.\n*label wehaveliftoff\n*page_break We Have Liftoff\nThe shuttle you're taking to the Moon feels similar to the regular airplanes you've taken constantly for the last eight years. The seatbelt is a little more complicated, and the view is certainly different, but it's not too foreign of an experience.\n\nThings get weird when you land, and have to relearn how to walk. They tried to teach you in the week beforehand how to move around on the Moon, but in practice it takes hours to get really used to it. After another full day spent getting used to breathing artificial air and two nights of failing to sleep, you start warming up in a makeshift bullpen. The baseball feels lighter in your hands, but you've taken dozens of warm-up throws over the last few days and it's clear by now that that doesn't mean you can throw your pitches harder. But the gravity has changed several things about your pitches.\n\nFirst of all, your fastball is now literally a rising fastball. \"Rising fastball\" is a common expression but not a real thing on Earth; a good fastball seems to rise because it doesn't drop as quickly as the hitter expects due to good backspin and/or velocity. But on the moon, the backspin is more than enough to make the ball's trajectory go up before it gets to the catcher. So you've decided to call that a riseball instead of a fastball.\n\nSecond, all your breaking pitches have less vertical break. A curveball or slider depends on gravity to lend a little extra movement, and that's not happening here. So curveballs in particular are more like \"spinners,\" just spinning in place and begging to be hit. They won't be as effective on the moon.\n*page_break Take the Moon\n*gosub_scene 2ndYear resetgame\n*set runnerfirst true\n*set outs 1\nYou take the mound, to the gentle applause of only about 1,000 fans, mostly people who work on the lunar base. It's like pitching for a high school crowd again, except now you can jump ten feet in the air.\n\nBetween warm-up throws, you see the all-star infield behind you intentionally making bounce throws to one another to get used to both the Moon's gravity and the turf. The second baseman, Lisa Janga, has a theory that bounce throws will be better anyway because you're less likely to throw the ball into the seats, but they're still working that one out.\n\nThe leadoff hitter, your longtime opponent \"The Possum\" Joe van Rossum, takes an unusual number of practice swings, then steps into the box. For the first ever official baseball pitch on the moon, you throw a riseball, and Van Rossum looks stunned by the pitch's upward movement. The ball starts out low and ends up high in the strike zone, and he hits the bottom of the baseball, popping the pitch up in the air. The catcher,\n*if nextteam = \"Bulls\"\n\tyour longtime Bulls teammate\nPortia Roberts, circles under it and makes the catch for out number one. \"I'm on the freakin' Moon!\" she yells, then airmails the ball over your head trying to throw it back to the mound.\n\nTo the next batter, the opposing all-star team's second baseman Mai Shimoda, you throw four riseballs in a row, but she's a little wiser than the last hitter. She's taking every pitch, trying to get a feel for the movement while you're trying to get a feel for control. All four riseballs end up either above or below the strike zone, and Shimoda takes first base with a walk.\n\nNow you're facing\n*if nextteam = \"Capers\"\n\tyour old Capers teammate\nGiulio Camporese, a big power hitter, and you're not totally confident in any of your pitches yet. What do you throw?\n*gosub_scene 2ndYear situationtext\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 2\n*set batterpower 5\n*set batterhand \"left\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto moongameatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto moongameatbatloop\n\n*label moongameatbatloop\n*if atbatresult = \"single\"\n\t*set perfectmoongame false\n\tGiulio surprises you by hitting an old-fashioned \"Baltimore chop,\" hitting the ball straight into the ground, bouncing high into the air. And, this being the Moon, the ball hangs in the air for a long time, letting Giulio reach first easily. The runner from first makes it to second, and probably could have had third, but it's just too unusual to take two bases on a short ground ball, so she doesn't realize the opportunity before it's passed.\n\n\tAfter that at-bat, you get the next two hitters out on a ground ball and an extremely high pop fly to escape first inning trouble.\n\t*goto endofmoongame\n*elseif atbatresult = \"double\"\n\t*set userruns +1\n\t*set perfectmoongame false\n\tGiulio smacks a ground ball into the turf, bouncing over the third baseman's head. Unfortunately, your left fielder hasn't really figured out how to run on the Moon yet, so she takes a long time to track the
