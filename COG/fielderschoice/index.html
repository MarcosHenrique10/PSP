back to normal, maybe the team will finally win a few games against the Hoppers. And you suspect this will make a great anecdote to tell one day, the way you ended Giulio's most ambitious, years-spanning prank by out-scaring him. And he would have gotten away with it too if you weren't for you, some meddling pitcher.\n\t\t\t\t*goto meetrasheed\n\t\t\t*else\n\t\t\t\t*set public_rep %+15\n\t\t\t\tYou spring out of bed and yell in an attempt to scare the ghost, or non-ghost, or whatever is making those sounds. In a way, this plan works. The sounds stop, and when you get up and turn on the light, nothing is in your room. But you're no closer to finding out what haunts this place, and that might be spookier than the sounds were. You slowly fall back into a nervous sleep.\n\n\t\t\t\tThe next morning, most of your other teammates have their own stories of ghosts keeping them up all night, reporting wildly different experiences. Word gets out to reporters about the haunted hotel, and so you get asked about it after the game the next day. Your story about the noises you heard and your semi-successful attempt to scare the ghost makes for a great quote online the next day, and now you're that much closer to being a fan favorite.\n\t\t\t\t*goto meetrasheed\n\t\t#Relax and let the ghosts do their thing. Don't let it bother you.\n\t\t\t*if intimidating \u003c= 45\n\t\t\t\t*set clubhouse_rep %+20\n\t\t\t\t*set anecdotes +1\n\t\t\t\tYou decide to curl up and let the ghosts do what they will, falling sound asleep after just a few minutes. You briefly wake up to hear a scratching noise beneath your feet, but you fall back asleep. Then you wake up to hear someone saying random numbers, \"One, seven, three, nine,\" but he may as well be counting sheep. You fall asleep. You wake up yet again as the lights in your room flick on and off. The ghosts are getting persistent. You don't let it bother you.\n\n\t\t\t\tWhen you wake up once more, your bed is shaking. You look up and see a shadowy figure at the foot of your bed. You flick on the bedside light but it doesn't turn on. So you turn on your phone flashlight and point it down there to see, is that, yes, it's Giulio Camporese. \"I have never dealt with such a heavy sleeper in my life,\" he says, out of breath from physically shaking your bed frame to try and scare you. You snap a picture with your phone flash to show your teammates who's really haunting this hotel.\n\n\t\t\t\tYour teammates greatly appreciate you solving the mystery of The Royal Weimaraner. The hotel had handed out two copies of each key, and Giulio kept the second one for himself so he could go around scaring everyone. With their sleep schedules back intact, maybe the team will finally win a few games against the Hoppers. And you suspect this will make a great anecdote to tell one day, the way you ended Giulio's most ambitious, years-spanning prank by simply ignoring him. And he would have gotten away with it too if it weren't for you, some meddling pitcher.\n\t\t\t\t*goto meetrasheed\n\t\t\t*else\n\t\t\t\t*set public_rep %+15\n\t\t\t\tYou decide to steel yourself and let the ghosts do what they will, but you hardly get any sleep all night. You're on edge constantly, thinking any slight noise might be a ghost starting to mess with you.\n\n\t\t\t\tYou eventually hear a soft scratching sound along the foot of your bed, and though you try to ignore it, every nerve in your body is on end. Then a voice sounding like it's coming through an old radio starts reading out a random sequence of numbers, \"One, seven, three, nine,\" just like that. At this point, you get up and flick on your bedside light. But it doesn't turn on. The lights don't work. You scramble to get your phone to turn on a flashlight and see what kind of ghost you're dealing with, but by the time you get it out, the sound has stopped. You look around your room with your flashlight, terrified, but find nothing. Maybe this hotel really is haunted.\n\n\t\t\t\tMost of your other teammates have their own stories of ghosts keeping them up all night, with wildly different experiences. Word gets out to reporters about the haunted hotel, and so you get asked about it after the game the next day. Your story about the strange sounds you heard makes for a great quote online the next day, and now you're that much closer to being a fan favorite.\n\t\t\t\t*goto meetrasheed\n\t\t#Stay awake and ready to throw something at anyone who comes in your door.\n\t\t\tYou get the sense that maybe this ghost isn't so supernatural. It takes a lot of effort to stay awake, but you sit awake in a chair, gripping a room service Toblerone, ready to fling it at anything or anyone who invades your room.\n\n\t\t\tAfter four hours of mind-numbing nothing, your door clicks and slides silently open. You let the door swing open then throw as hard as you can.\n\t\t\t*if velocity >= 55\n\t\t\t\t*set clubhouse_rep %+20\n\t\t\t\t*set anecdotes +1\n\t\t\t\t\"Cazzo!\" a man says as the Toblerone thwacks against something in the dark. This is followed by several more bumping sounds and curse words you don't understand. You run over and turn on the light to find Giulio Camporese trying desperately to find his way out of your room. After he got hit by a chocolate bar in the dark, he got a belt loop tangled on the doorknob and got too disoriented to get away before being caught. You take a picture of the hapless prankster to show to your teammates, proving who's really haunting this hotel.\n\n\t\t\t\tYour teammates greatly appreciate you solving the mystery of The Royal Weimaraner. The hotel had handed out two copies of each key, and Giulio kept the second one for himself so he could go around scaring everyone. With their sleep schedules back intact, maybe the team will finally win a few games against the Hoppers. And you suspect this will make a great anecdote to tell one day, the way you ended Giulio's most ambitious, years-spanning prank by chucking a fastball at him. And he would have gotten away with it too if you weren't for you, some meddling pitcher.\n\t\t\t\t*goto meetrasheed\n\t\t\t*else\n\t\t\t\t*set public_rep %+15\n\t\t\t\tThe Toblerone flies through the air and lands softly on the carpet, but you hear a scurrying noise followed by your door slamming closed. You run to the door to see who's running away from your room, but no one is in the hallway. You settle back in to sleep through the rest of the night, unsure what exactly you were dealing with.\n\n\t\t\t\tMost of your other teammates have their own stories of ghosts keeping them up all night, with wildly different experiences. Word gets out to reporters about the haunted hotel, and so you get asked about it after the game the next day. Your story about flinging a Toblerone at a ghost makes for a great quote online the next day, and now you're that much closer to being a fan favorite.\n\t\t\t\t*goto meetrasheed\n\t\t#Devise a trap that will catch any \"ghosts\" who come into your room.\n\t\t\t*if analytical >= 55\n\t\t\t\t*set clubhouse_rep %+20\n\t\t\t\t*set anecdotes +1\n\t\t\t\tYou head back out to the team bus to pick up some pine tar and bring it back up to your room. With apologies to the workers at this fine hotel, you spread some pine tar on the carpet in front of your door, hoping to catch somebody with tar on their shoes in the morning.\n\n\t\t\t\tYou wake up around 4:00 a.m. as a man shouts \"Cazzo!\" in your room doorway. You hop out of bed and find Giulio Camporese with one bare foot stuck to the floor of your room. It turns out that he's been the one haunting this hotel all along, and he likes to come in barefoot so he doesn't make as much sound. You take a picture of him, grinning sheepishly, to show to your teammates.\n\n\t\t\t\tYour teammates greatly appreciate you solving the mystery of The Royal Weimaraner. The hotel had handed out two copies of each key, and Giulio kept the second one for himself so he could go around scaring everyone. With their sleep schedules back intact, maybe the team will finally win a few games against the Hoppers. And you suspect this will make a great anecdote to tell one day, the way you ended Giulio's most ambitious, years-spanning prank. And he would have gotten away with it too if you weren't for you, some meddling pitcher.\n\t\t\t\t*goto meetrasheed\n\t\t\t*else\n\t\t\t\t*set public_rep %+15\n\t\t\t\tYou spend a while thinking of a way to trap any intruders in your room, but your brain is tired from the bus ride and the best you can come up with is to put a bunch of open water bottles in front of the door to your room. That way anyone coming in will knock those over, and at least you'll know that these \"ghosts\" still have to come in through the door like any normal person.\n\n\t\t\t\tYou sleep through the whole night without interruption. As you get up and look at the door, you see a puddle of water on the ground. Either the water bottles all fell over on their own, or someone did come in last night and you didn't hear a thing. Intriguing.\n\n\t\t\t\tMost of your other teammates have their own stories of ghosts keeping them up all night, with wildly different experiences. Word gets out to reporters about the haunted hotel, and so you get asked about it after the game the next day. Your bizarre water bottle plan makes for a great quote online the next day, and now you're that much closer to being a fan favorite.\n\t\t\t\t*goto meetrasheed\n*label meetrasheed\n*page_break Several Weeks Later\nAfter a hard-fought win in September, you're walking out to your car when you spot an over-dressed man in a pumpkin-colored suit talking to three rookies on your team. When you drift close enough to them, you hear him say a few words like \"redistribution\" and \"antitrust\" and \"inequity,\" which, no offense to your teammates, are probably not words they use very often. You stop in to listen because you're curious what this conversation could be about.\n\nWhen he sees you drift in, the man in the pumpkin-colored suit introduces himself to you as \"Rasheed Taylor, professional sporting labor activist,\" which strikes you as an odd turn of phrase. He continues to explain to the rookies that their salaries, and particularly those of their old minor league teammates who haven't made the major leagues and never will, are unfairly suppressed. Many minor leaguers would make twice as much money if they were \"convenience eating restaurant professionals\" which you take to mean flipping burgers. When Taylor starts talking about a \"collective bargaining agreement,\" you can tell that the other players aren't following.\n\nYou could try to help him explain in simpler language, but then again, you're a veteran major league player now. He's campaigning to take money away from you and put it in the hands of minor leaguers who don't have the skills to reach the big leagues. What should you do?\n*choice\n\t#Try to explain his point in simpler language.\n\t\tYou take a crack at explaining Taylor's point in simpler language.\n\t\t*set taylor_rel 70\n\t\t*if analytical \u003c= 55\n\t\t\t*set clubhouse_rep %+15\n\t\t\t\"What he means is, even though we need minor leaguers to make the whole system work, those players only make about $15,000 a year. It's hard to live on that kind of salary. They're talented players too, but they're forced to make money that would be illegal in any other business. A long time ago, the government decided a lot of rules don't apply to baseball, so they're allowed to do this for now.\n\n\t\t\t\"In the end, the money minor leaguers should be making for a living wage will come out of the team owners' pockets, which means they'll either make less money off of baseball or pay less for free agents like me. I make more than I'll ever need, so it's not a big deal to me either way. Does that make sense?\" The rookies silently agree, and take Rasheed Taylor's business card before heading home.\n\n\t\t\tTaylor is impressed you were able to get his ideas across. \"I've been in search of a veteran major league athlete like yourself to vouch for my ideas for a long time,\" he says. \"And that you were able to communicate my proposals with a baser diction than my own could also be, perversely, an asset to the cause. Please, correspond with me in future.\" After a few seconds of trying to parse what he's saying, you accept his business card and move along.\n\t\t\t*goto playoffschapter6\n\t\t*else\n\t\t\t*set clubhouse_rep %+10\n\t\t\t\"What Mr. Taylor means is that some minor leaguers are earning below the poverty line despite providing a vital service to the institution of baseball. Although they aren't as skilled or talented as major leaguers, the income distribution is clearly out of line with the value added to the game. By the math implied by salary differences today, a starting major leaguer after free agency is worth almost seven hundred times as much as a normal minor leaguer.\n\n\t\t\t\"Consider another idea: Let's imagine a theoretical top-producing minor leaguer who is somehow not good enough to make the major leagues. By proportion, his—\" You look around to realize the rookies have already left. Maybe you're a little too analytical for the tastes of most baseball players.\n\n\t\t\tNonetheless, Rasheed Taylor is impressed, and hands you his business card. \"Please correspond with me on further endeavors in this field,\" he says as though he were playing a verbal game of Scrabble and had to get as many letters out there as possible. His strange way of speaking aside, maybe you could help him make life better for minor league players someday.\n\t\t\t*goto playoffschapter6\n\t#Kick Taylor out of here for making the rookies think about money instead of tomorrow's game.\n\t\t*set taylor_rel 20\n\t\t*if intimidating >= 55\n\t\t\t*set clubhouse_rep %+15\n\t\t\t\"Hey, this is team property you're on,\" you say to Taylor. \"I don't know how you got back here, but we've got a game tomorrow to worry about. Leave the money talk for the offseason and I'm sure they'll get back to you.\"\n\n\t\t\tRasheed Taylor starts to hand a business card to one of the rookies but thinks better of it, dropping it on the ground before wheeling around to leave. Your teammates appreciate your leadership, and it's probably good that you stepped in before Taylor could make the whole team get obsessed with comparing salaries. You pick up Taylor's business card off the sidewalk and put it in your pocket in case further action needs to be taken against this rabble-rouser.\n\t\t\t*goto playoffschapter6\n\t\t*else\n\t\t\t*set clubhouse_rep %+10\n\t\t\t\"Hey, bud,\" you start, then flinch a little bit, thinking maybe \"bud\" wasn't the most intimidating thing you could have called him. \"We've got a game tomorrow, so skedaddle.\" Another weird choice of words on your part. You need to work on this whole \"intimidating presence\" thing.\n\n\t\t\t\"If you don't mind, I'd like to educate your peers on the salary disputes within your sport which are at the heart of my work these days,\" Taylor says, in a sentence you thought would never end. He's really not good at talking. He hands over his business card to the rookies, and you decide to let that slide. Hopefully they don't call him and start obsessing over comparing salaries now. Isn't every baseball player making enough to be happy? Strange.\n\t\t\t*goto playoffschapter6\n\t#Tell the rookies that Taylor is probably trying to redistribute some of their salary too.\n\t\t*set taylor_rel 40\n\t\tYou tell the rookies that Rasheed's plan would take money from their major league minimum salaries too, not just the big veteran contracts. You don't know if that's true, really, but you've got a hunch.\n\n\t\t*if rebellious \u003c= 50\n\t\t\t*set clubhouse_rep %+15\n\t\t\tThe rookies know you always put the team before yourself, so they nod and listen to every word you say. When you tell them that Taylor's plan won't be in their self-interest either, they head for their cars and drive home.\n\n\t\t\t\"I hope you know that is not how I would structure the pay scale,\" Taylor says. \"I suspect the major league minimum would remain totally stationary, or continue to increase. The oversized free agent contracts for veterans, however, would likely shrink in scale to the increases for minor leaguers.\" Taylor's tortured language grates against your ears, but you get the point. He would like people like yourself to make less money so minor leaguers didn't have to eat instant ramen every day. Taylor hands you a business card, and tells you to give him a call if you'd like to help him in the future.\n\t\t\t*goto playoffschapter6\n\t\t*else\n\t\t\t*set clubhouse_rep %-15\n\t\t\tBut you have a reputation for being disloyal to teams in the past, and these rookies know about it. They know you make a lot more than they do, and they don't trust you to have their best interests at heart any more than Taylor. One rookie says, diplomatically, \"Thanks for the help, but we're going to hear this guy out.\"\n\n\t\t\tAnother rookie whispers to her teammate, \"Weird how the players with big mansion money always assume everybody's just as rich as they are.\"\n\n\t\t\tThoroughly rebuffed, you leave to get in your car and head home. You just hope the rookies don't get distracted by money and forget how to play the game.\n\t\t\t*goto playoffschapter6\n\n*label playoffschapter6\n*set totalouts +90\n*set earnedruns +7\n*set strikeouts +25\n*set wins +4\n*set losses +1\n*page_break\n*if nextteam = \"Bulls\"\n\tAt some point, in late, late September, you look at the standings and realize the Bulls are somehow going to end up in the playoffs. These Bulls, with all the young players and the new coaching staff and zero expectations. It seems impossible, but it's really happening, and you get a long rest on the final week of the season to prepare to start game one of the best-of-five league series.\n\t*goto checkedteamyear6\n*else\n\tAs expected, the ${nextteam} easily make the playoffs. It's the bare minimum the fans expect. You've got a best-of-five series against the Los Angeles Longsocks up first, and winning that will take you to the best-of-seven against the best team from the other league. You get a nice rest on the last week of the season to prepare you to start game one. The fans have pinned their hopes on you.\n\t*goto checkedteamyear6\n*label checkedteamyear6\n*page_break Take the Mound\n*gosub_scene 2ndYear resetgame\n*set runnerfirst true\n*set runnersecond true\n*set runnerthird true\n*set outs 2\n\"Can't they score one run?\" you think over and over to yourself. \"Just one run and we'd be coasting right now. I wouldn't have to worry so much about all this crap.\" It's the seventh inning and the ${nextteam} haven't scored a single stupid run. They've had all of one runner reach second base. You've labored through the game, letting runners on base constantly but still carrying a shutout to this point.\n\nBut now there are two outs, and the bases are loaded. You're either going to slip through yet another tough situation, and hopefully inspire your good-for-nothing teammates to score one measly run and grab a win, or you're going to effectively lose the game right here.\n\nThe batter you'll face is \"The Possum,\" Joe van Rossum. Needless to say, you don't want to end your season giving up a game-winning hit to somebody nicknamed \"The Possum.\" Let's go.\n\n*gosub_scene 2ndYear situationtext\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 2\n*set batterpower 2\n*set batterhand \"right\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 6thyear3rdgameatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 6thyear3rdgameatbatloop\n\n*label 6thyear3rdgameatbatloop\n*if atbatresult = \"single\"\n\t*set userruns +2\n\t\"Yeah!\" a woman yells somewhere, as your pitch is still traveling through the air. Who was that? Did she see into the future? Or did her yell come before you let go of the ball, and did it make you leave the pitch up in the zone? It all happens so fast, and it's hard to piece together the sequence of events afterwards. You look up at the scoreboard, and the Longsocks are up 2-0 on the ${nextteam}, which, now that you think about it, is the team you play for, isn't it? That sucks.\n\n\t*goto endof6thyear\n*elseif atbatresult = \"double\"\n\t*set userruns +2\n\t\"Nope,\" you say, as soon as the ball leaves your hand. You left the pitch in a bad place, and the stupid Possum doesn't even manage to hit it that hard. But, alas, it goes right over the third base bag, staying just barely fair. And in this unfair, stupid sport, that's a double, and in this case the double scores two runs and loses you the game.\n\n\t*goto endof6thyear\n*elseif atbatresult = \"triple\"\n\t*set userruns +3\n\t\"Christ,\" you hear your third baseman say just after the ball flies over his head, into the left field corner. Three runs will score, and the Possum scampers around to third base, not that it matters. That's almost certainly going to decide the game.\n\n\t*goto endof6thyear\n*elseif atbatresult = \"home run\"\n\t*set userruns +4\n\t\"Salami,\" one fan yells, as in grand salami, as in grand slam, in the bizarre parlance of this stupid game. The rest of the crowd goes just silent enough for you to hear him. The Possum hits a no-doubter home run to left field, and all four runs score, effectively ending this game. Fun, fun.\n\n\t*goto endof6thyear\n*elseif ((atbatresult = \"groundout\") or (atbatresult = \"lineout\")) or (atbatresult = \"flyout\")\n\t\"Mine!\" your shortstop yells after the Possum gets under one and pops up in the infield. The shortstop weaves back and forth under it, reaches up, and puts it away for out number three. You're through seven scoreless innings, and all the pressure is off. It's up to your team to hit now and finish off the win.\n\n\t*goto ontothe4thgame\n*elseif atbatresult = \"walk\"\n\t*set userruns +1\n\t\"Outside,\" the umpire says, and the Possum takes his base. The bases were loaded, so a run scores, and the ${nextteam} are behind. The manager takes you out of the game, fearing that you don't have the energy left to throw good strikes anymore, and maybe you don't. You're reduced to a spectator for the rest of the game, hoping you'll get another chance to pitch before the playoffs are over.\n\n\t*goto endof6thyear\n*elseif atbatresult = \"strikeout\"\n\t*set userstrikeouts +1\n\t\"Time!\" the Possum yells, trying to pause the action and redo his batting gloves, but it's too late. The umpire doesn't move an inch, and your pitch barrels right into the strike zone. \"Strike three!\" the umpire lets everybody know with a bellowing voice and what looks like some kind of kung fu move.\n\n\tThe Possum is incensed that he wasn't granted timeout, but the umpire won't even look at him. The fans behind home plate have gotten all the cheering out of their system and are now rudely and giddily reminding the Possum what his nickname is, and telling him to go here and put this there and what-have-you. It's a beautiful scene to watch as you return to your dugout.\n\n\t*goto ontothe4thgame\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear3rdgameatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear3rdgameatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear3rdgameatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear3rdgameatbatloop\n\t*if (knuckleball > 0) #Knuckleball.\n\t\t*set pitchthrown \"knuckleball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear3rdgameatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear3rdgameatbatloop\n\n*label endof6thyear\n\nThere's nothing more cruel than a short playoff series after a long season, but there are no excuses. The ${nextteam} lose the next two games straight, and you're out of the playoffs. It all feels so random, and that's only because it is. There's a reason they say, \"better luck next time.\"\n\n*if nextteam = \"Bulls\"\n\tDespite the playoff loss, the Bulls locker room remains chipper and excitable. No one expected the team to be this good this soon after losing so many great players.\n\n\t\"See you next year, eh?\" Connor says. \"This year, the playoffs. But next year? The freaking Moon, right?\"\n\n\t\"Hell yeah,\" Portia says and high fives him. Their conversation about playing baseball on the Moon has slowly developed from a wistful conversation into a delusional fantasy. You're starting to think they're serious about traveling to the Moon somehow.\n\n\tBut after this miracle season with the Bulls, it feels like anything can happen. Or at least, it could within a year or two, when everyone has a little more experience, ability, and drive to do whatever it takes.\n\t*finish\n*elseif nextteam = \"Capers\"\n\tA few weeks after the season ends, you get a text message. \"I'm thinking about leaving the team,\" Mendis texts you. \"I can't pitch better than you, so there's no point in me staying here. Goodbye.\"\n\n\tYou sit there stunned, trying to figure out what to say. She pitched great all year as the number four starter. Admittedly they didn't let her start a playoff game, but she came up big out of the bullpen twice in the series.\n\n\tAs soon as you start to type a response, you get a call from the manager. \"${givenname}, please don't say anything to Mendis until I say otherwise. I'm just learning that you two have some kind of rivalry, but we're going to work it out.\" You try to interrupt and explain that it's a one-way rivalry, but he cuts you off. \"No need to explain. Hopefully by spring we'll have it all worked out. Great job this year, and enjoy your offseason.\"\n\t*finish\n*else\n\tAs you're cleaning out your locker at the end of the season, Andres del Rosario comes up to you. \"I think I'm okay with quitting now,\" Rosario says. \"It drove me crazy at the start of the season, being considered too old and stiff to play the position I've been at my whole life. But now, if they want to keep me, fine, I'll play first base and take it easy, hit the ball every now and then. And if they want to cut me, that's fine too. I can go out on top.\"\n\n\t\"Didn't you hit thirty home runs this season?\" you ask. \"Of course they're still going to want you.\"\n\n\t\"We'll see,\" he says. \"I can feel my body wearing down. Maybe it'll all fall apart next year. There are no guarantees in this game.\" You see no reason for him to worry based on his season stat line. Losing in the playoffs can be hard, but this level of negativity is really strange.\n\t*finish\n*finish\n\n*label ontothe4thgame\n\nThrough a series of bunts and errors, your poor team manages to push across a single run, and even though it takes years off of your life, the relief corps pitches a clean two innings and the game is won. By the end, you're happy but not sure you ever want to sit through a baseball game again. Too close, too long, and too many heartbeats.\n*page_break The Playoffs Continue\n*gosub_scene 2ndYear resetgame\n*set runnerfirst true\n*set runnerthird true\n*set outs 1\nA week and a half later, the ${nextteam} are in the national championship series against the Charlotte Guards, the champions of the other league. You're starting game two of the series, in Charlotte. You're starting to get used to pitching in pressure-filled games, but the hours before the game starts are still stomach-churning. Usually, once the game starts, it's not so big a deal. Hopefully this one's no different.\n\nIn the fifth inning, runners are at first and third with one out, and the ${nextteam} are leading 3-2. A groundball double play would be excellent, but can you really afford to pitch to contact? It's a situation you've faced dozens, maybe hundreds of times already in your career, but it feels different now. And the crowd is on top of you, but you can't afford to pay attention to that. What will you throw?\n\n*gosub_scene 2ndYear situationtext\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 4\n*set batterpower 4\n*set batterhand \"left\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 6thyear4thgameatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 6thyear4thgameatbatloop\n\n*label 6thyear4thgameatbatloop\n*if atbatresult = \"single\"\n\tThe ball comes off the bat, and it's a ground ball right at you. You don't think, you just react, flicking your glove at the ball and…\n\t*if fitness > 50\n\t\tYou snag it. Struggling a little with the irregular shape of the front of the mound, you turn and look at the runner at third base. He's sprinting home, going on contact. You fling the ball back home, and the runner is out. The run is saved. You can feel adrenaline coursing through you, and you have to be glad it didn't make you overthrow the catcher. For the moment, you've saved the game.\n\t\t*goto 6thyearchamps\n\t*else\n\t\t*set userruns +1\n\t\tThe ball flicks through the webbing of your glove, bouncing past you and dying in the infield grass. By the time your second baseman gets to it, the batter is safe at first and a run has scored. Coaches always tell you to leave the ball for an infielder if you're not sure you can get it yourself, but try telling your subconscious that. That ties the game, and it looks like the manager is coming to pull you for a reliever. You never want to leave a game to the cheers of the opposing fans, but you pitched okay. The championship series isn't supposed to be easy.\n\t\t*goto 6thyearlosers\n*elseif atbatresult = \"double\"\n\t*set userruns +1\n\tThe batter hits a double into the gap, scoring one of the runners. It's a tie game and there are now runners on second and third with one out, and that'll be the end of your day. No one can say you never pitched on the biggest stage, and you exit the game with only a little regret that you didn't pitch better. Time to become a spectator.\n\t*goto 6thyearlosers\n*elseif atbatresult = \"triple\"\n\t*set userruns +2\n\tThe batter hits a triple to clear the bases, and now the ${nextteam} are behind 3-4. You'll come out of the game now, having likely lost it with your last pitch. All you can do now is hope for some offense, and hope that you get another chance to pitch in a championship series some other year.\n\t*goto 6thyearlosers\n*elseif atbatresult = \"home run\"\n\t*set userruns +3\n\tThe ball soars off the bat and into the stands. The Charlotte crowd goes absolutely nuts, jumping and high fiving and hugging each other. The ${nextteam} are now down 3-5, and the game is probably lost. Might take a while for this particular wound to heal.\n\t*goto 6thyearlosers\n*elseif ((atbatresult = \"groundout\") or (atbatresult = \"lineout\")) or (atbatresult = \"flyout\")\n\tYou see the ball come off the bat and something in your subconscious thinks \"Perfect.\" It's going right to the shortstop for a double play. But when you turn around, the shortstop stumbles and falls at the worst possible moment.\n\n\tBut the second baseman sprints across to pick up the ground ball, turn, step on second base, and throw as quickly and accurately as possible to first for a double play. As the ball pops into the back of the first baseman's glove, you think \"Oh no, it's a tie.\"\n\n\tThe umpire disagrees. He pumps his fist to signal out, and the Charlotte crowd who boos him like he's stealing Christmas presents from children and giving them to IRS officials. But all that matters is you got the double play, and you're safely out of the inning.\n\t*goto 6thyearchamps\n*elseif atbatresult = \"walk\"\n\tThat walk will load the bases, and as you see the manager coming up the dugout steps, you turn around to pretend you're not being taken out of this incredibly important game at this incredibly important moment. But that's it. You lost the manager's trust with that walk, so you're coming out of the game. Very frustrating.\n\n\tIt gets even more frustrating when the reliever coughs up two of those runs before closing out the inning. You probably could have prevented that. Maybe you could have still won, despite your wildness in that last at-bat.\n\t*goto 6thyearlosers\n*elseif atbatresult = \"strikeout\"\n\t*set userstrikeouts +1\n\tThe batter takes a check swing, and the umpire rings him up for strike three. The batter is incensed, asking why the umpire couldn't at least appeal to one of the other officials for the check swing call, but his word is final. The crowd boos the umpire as if he'd interrupted the game to perform some amateur rap rock, but it doesn't matter. It's a strikeout, and you've inched that much closer to winning a championship.\n\t*goto 6thyearchamps\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear4thgameatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear4thgameatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear4thgameatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear4thgameatbatloop\n\t*if (knuckleball > 0) #Knuckleball.\n\t\t*set pitchthrown \"knuckleball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear4thgameatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 6thyear4thgameatbatloop\n\n*label 6thyearlosers\n\nUnfortunately, the ${nextteam} lost the game, and went on to lose the series. The Charlotte Guards are the national champions. It's a disappointment not to win it all, but you couldn't have gotten much closer, and there's plenty of hope for next year.\n\n*if nextteam = \"Bulls\"\n\tDespite the playoff loss, the Bulls locker room remains chipper and excitable. No one expected the team to be this good this soon after losing so many great players.\n\n\t\"See you next year, eh?\" Connor says. \"This year, the playoffs. But next year? The freaking Moon, right?\"\n\n\t\"Hell yeah,\" Portia says and high fives him. Their conversation about playing baseball on the Moon has slowly developed from a wistful conversation into a delusional fantasy. You're starting to think they're serious about traveling to the Moon somehow.\n\n\tBut after this miracle season with the Bulls, it feels like anything can happen. Or at least, it could within a year or two, when everyone has a little more experience, ability, and drive to do whatever it takes.\n\t*finish\n*elseif nextteam = \"Capers\"\n\tA few weeks after the season ends, you get a text message. \"I'm leaving the team,\" Mendis texts you. \"I couldn't pitch better than you, so I know my time is limited. They'll cut me next spring training anyway, so I better get out ahead of it and find a team in some other league.\"\n\n\tYou sit there stunned, trying to figure out what to say. She pitched great all year as the number four starter. Admittedly they didn't let her start any playoff games, but she came up big out of the bullpen at several key moments.\n\n\tAs soon as you start to type a response, you get a call from the manager. \"${givenname}, please don't say anything to Mendis until I say otherwise. I'm just learning that you two have some kind of rivalry, but we're going to work it out.\" You try to interrupt and explain that it's a one-way rivalry, but he cuts you off. \"No need to explain. Hopefully by spring we'll have it all worked out. Great job this year, and enjoy your offseason.\"\n\t*finish\n*else\n\tAs you're cleaning out your locker at the end of the season, Andres del Rosario comes up to you. \"I think I'm okay with quitting now,\" Rosario says. \"It drove me crazy at the start of the season, being considered too old and stiff to play the position I've been at my whole life. But now, if they want to keep me, fine, I'll play first base and take it easy, hit the ball every now and then. And if they want to cut me, that's fine too. I can go out on top.\"\n\n\t\"Didn't you hit thirty home runs this season?\" you ask. \"Of course they're still going to want you.\"\n\n\t\"We'll see,\" he says. \"I can feel my body wearing down. Maybe it'll all fall apart next year. There are no guarantees in this game.\" You see no reason for him to worry based on his season stat line. Losing a championship can be hard, but this level of negativity is really strange.\n\t*finish\n\n*label 6thyearchamps\n*set championships +1\n*set anecdotes +1\n*set fame %+20\n*achieve champ1\n*check_achievements\n*if not(choice_achieved_memoirmaterial)\n\t*achieve memoirmaterial\n\n*if nextteam = \"Bulls\"\n\tThe Bulls finish off the win in game two, and then a series of bizarre circumstances propel the team to three more wins after that. Connor Harris pitches a gem in game five, and Portia Roberts even gets the last RBI double to seal the last win. The San Antonio Bulls are national champions.\n\n\tLife has stopped making sense. You're supposed to suck. But game by game, everything worked out perfectly, and nothing feels better than being the \"team of destiny.\" You're the star veteran player from one of the best underdog stories in sports, so you have no time to celebrate, instead being whisked from interview to interview and suddenly becoming more famous than you ever imagined.\n\n\tIn a brief moment away from the cameras, you read a group text between you, Connor, and Portia. \"We can probably go to the Moon now, right? Can't be too expensive,\" Portia texts.\n\n\tConnor says \"No offense to the great country you've got here, but if I had a choice between visiting the White House and visiting the Moon, I know I'd pick the hostile, lifeless environment with no breathable air.\"\n\n\t*goto thataboutwrapsitupforchaptersixdontyouthinkfolks\n*elseif nextteam = \"Capers\"\n\tThe Capers close out your win in game two, and after that, everything goes according to plan. With a 3-1 lead in the series going into game 5, Giulio Camporese hits an eighth inning home run that wins the series. The Florida Capers are national champions.\n\n\tThe next few weeks are all champagne, palm trees, and teal and pink confetti. It takes a shock to the system, in the form of a text message, to wake you up out of the celebratory daze. \"I'm leaving the team,\" Mendis texts you. \"I couldn't pitch better than you, so I know my time is limited. They'll cut me next spring training anyway, so I better get out ahead of it and find a team in some other league.\"\n\n\tYou sit there stunned, trying to figure out what to say. She pitched great all year as the number four starter. Admittedly they didn't let her start any playoff games, but she came up big out of the bullpen at several key moments.\n\n\tAs soon as you start to type a response, you get a call from the manager. \"${givenname}, please don't say anything to Mendis until I say otherwise. I'm just learning that you two have some kind of rivalry, but we're going to work it out.\" You try to interrupt and explain that it's a one-way rivalry, but he cuts you off. \"No need to explain. Hopefully by spring we'll have it all worked out. Great job this year, and enjoy your offseason.\"\n\n\t*goto thataboutwrapsitupforchaptersixdontyouthinkfolks\n*else\n\tThe relief corps closes out your win in game two, and then, all things considered, the rest goes pretty smoothly. Andres del Rosario and Lisa Janga are the unexpected stars of the series, combining to hit for 21 for 42 with four home runs and twelve RBIs. The Barons are national champions.\n\n\tThrough the champagne, ticker tape, and long rides down wide avenues, you get a fleeting chance to talk to Rosario. \"I think I'm okay with quitting now,\" Rosario says. \"It drove me crazy at the start of the season, being considered too old and stiff to play the position I've been at my whole life. But now, if they want to keep me, fine, I'll play first base and take it easy, hit the ball every now and then. And if they want to cut me, that's fine too. I can go out on top.\"\n\n\t\"You just hit like .500 in the championship series,\" you say. \"Of course they're still going to want you.\"\n\n\t\"We'll see,\" he says. \"I can feel my body wearing down. Maybe it'll all fall apart next year. There are no guarantees in this game.\" You see no reason for him to worry based on his season stat line. But if he's going to be negative even when he's just won a championship, you can't stop him.\n\n\t*goto thataboutwrapsitupforchaptersixdontyouthinkfolks\n*label thataboutwrapsitupforchaptersixdontyouthinkfolks\n\nYou've hit the peak. For most athletes, it never happens, but you did it. But it's not in your DNA, nor that of any other successful athlete, to stop now. There has to be a way to get even better. Maybe you could throw even harder, or use this success to start a new career, or use your status to help the less fortunate. It all seems possible now. What can't you do? It's time to find out.\n*finish\n\n*label itsbeennuts\n\"It's been nuts,\" she says when you ask how she got into this line of work. \"I was helping a producer guy from LA who fell off a diving board in his backyard and broke a couple or three bones, and he decided I had 'the look.' I don't know what 'the look' is, given how much time I have to spend in makeup before they let me appear on camera to do a freaking workout video, where the makeup has to look like no makeup, but, you know, I'm totally wearing makeup.\"\n*return\n\n*label hopovertojulie\nYou hop over to Julie Cheng's studio to record a testimonial, and you recognize her as soon as you see her. She was your physical therapist when you got hurt in your first season. It's been five years since she gave you a workout plan to get your arm back to full strength after Tommy John surgery.\n\n*gosub itsbeennuts\n\nShe pauses for a moment, maybe realizing she's drifted from the topic at hand. \"So, I hear you have a testimonial for me? Your agent said you watched a few of my videos and had a good point about the sort of mechanics of the workouts for you as a professional athlete. So, we're rolling, right Charles?\" A producer nods. \"Okay, you can go at any time, say whatever you want.\"\n*return\n", "7thyear": "*temp baseera ((earnedruns / (totalouts / 3)) * 9)\n*temp baseeradecimals ((baseera modulo 1) * 100)\n*temp erawholenumber (baseera - (baseera modulo 1))\n*temp erafirstdecimal ((baseeradecimals / 10) - ((baseeradecimals modulo 10) / 10))\n*temp eraseconddecimal ((baseeradecimals - (erafirstdecimal * 10)) - (baseeradecimals modulo 1))\n*temp disperawholenumber (round(erawholenumber))\n*temp disperafirstdecimal (round(erafirstdecimal))\n*temp disperaseconddecimal (round(eraseconddecimal))\n*temp cruzavailable true\n*set year6era \"${disperawholenumber}.${disperafirstdecimal}${disperaseconddecimal}\"\n*set year6wins wins\n*set year6losses losses\n*set year6strikeouts strikeouts\n*set currentyear 7\n*set earnedruns 0\n*set totalouts 1\n*set wins 0\n*set losses 0\n*set strikeouts 0\n*temp connorjumpstep false\n*if nextteam = \"Capers\"\n\t*set year7team \"FLC\"\n\t*goto startchapter7\n*elseif nextteam = \"Bulls\"\n\t*set year7team \"SAB\"\n\t*goto startchapter7\n*elseif nextteam = \"Barons\"\n\t*set year7team \"NYB\"\n\t*goto startchapter7\n*else\n\t*bug\n*label startchapter7\n*text_image chap_7.png center Year 7: The Exit Strategy\n\n*if nextteam = \"Bulls\"\n\t\"It's time again for Portia's Brilliant Ideas, TM, a registered trademark of Portia Roberts, Incorporated,\" your catcher says early in spring training. \"Wait until y'all hear this.\"\n\n\t*if year5team = \"TSU\"\n\t\t\"Oh brother,\" Connor Harris says. \"I lost all faith in your ideas after you said we should play with five infielders and two outfielders in that exhibition game. Sure, we won the game, but we were playing against a college team.\"\n\t\t*goto portiasays\n\t*else\n\t\t\"I'm not sure your last idea technically worked,\" Connor Harris says. \"Didn't we decide that the runner could have left third and scored at any time, whether you juggled the ball in the air or not?\"\n\t\t*goto portiasays\n\t*label portiasays\n\n\tPortia says, \"You can have the process, Connor. I'm here to get results. And for this one, I'm going to need a volunteer from the audience. Preferably someone who can pitch. Do I see a hand?\" Nobody raises their hand, but Portia grabs you and pulls you up to a training mound anyway. \"Now, you're supposed to keep your back foot on the pitching rubber, right? But wait, hold on, none of y'all actually do that at all. You all drag that foot like twenty inches forward before you let go of the ball. So this was my idea: How can we drag that foot even further?\n\n\t\"I thought about it a while and came to this,\" Portia says. \"If you can hop forward [i]while[/i] dragging your back foot, you can legally pitch from closer to the plate. Gives the hitter less time to react, right? I'm sure it's not easy, but one of you should try it. Take a hop forward off the rubber but don't let that back foot get up in the air, or that's a balk. Come on, give it a shot.\"\n\n\tYou give it a few dozen awkward attempts, and eventually you've got it down. It's hard to control, and feels like it'll lead to an ankle injury down the road, but it works. You can throw from closer to the plate by doing a weird jump-step while dragging your back foot. \"There we go, ${givenname},\" Portia says, delighted. \"Now all that's left is to try it in a game, then give me 10% of your earnings. Just kidding on the money part, but seriously, you should try this.\" Should you try it in a real game? The umpires or fans might think you're trying to cheat somehow, but it seems legal and it really works.\n\t*choice\n\t\t#Sure, I'll try the jump-step in my next game. I'm not that famous, so no one will notice anyway.\n\t\t\t*if fame \u003c= 55\n\t\t\t\t*set velocity %+15\n\t\t\t\t*check_achievements\n\t\t\t\t*if not(choice_achieved_purevelocity)\n\t\t\t\t\t*if velocity >= 70\n\t\t\t\t\t\t*achieve purevelocity\n\t\t\t\tEven though the jump-step looks a little odd, only a few online articles notice you're doing something different. The league doesn't see it as worth paying any attention to, and so it looks like you're going to get away with it. With the jump-step, your pitches now seem even faster than before, and it's such a huge advantage that you're a little afraid everyone is going to copy Portia's idea eventually. But for now, this advantage is yours and yours alone.\n\t\t\t\t*goto teamstoryintermission\n\t\t\t*else\n\t\t\t\t*set public_rep %-15\n\t\t\t\tUnfortunately, you are that famous. Fans, umpires, the league, everyone immediately noticed you were doing something different with your delivery. You got through one game throwing the jump-step, but by the next one the league had already announced that umpires were to interpret this delivery as a balk or illegal pitch next time around. So the plan is busted, and the fans think a little less of you for trying to cheat. Though you're not sure you agree that Portia's idea is really strictly against the rules.\n\t\t\t\t*goto teamstoryintermission\n\t\t#Connor should try the jump-step. If anybody thinks it's unfair, I'll say I told him to tweak his delivery.\n\t\t\t\"I'm comfortable with my delivery,\" you say. \"But Connor should definitely try it. He's already got such a…distinct delivery, and this would only add to his deception. It'd be perfect. And if anybody gets on you about cheating, just tell them it was my idea, a tweak I suggested. No one's going to believe you if you say the catcher came up with a brilliant new idea for pitching.\"\n\n\t\t\t\"Your honor, I object,\" Portia says. \"Catchers are the smartest and most mentally involved players in the field. I should probably be a pitching coach one day.\"\n\n\t\t\t\"$!{heistheyare} only going to take the fall if it's considered a cheaty idea,\" Connor says. \"If it works, I'll give full credit to you, and recommend you for that pitching coach job one day if you'd like.\"\n\n\t\t\t\"Okay, deal,\" Portia says.\n\n\t\t\t*if clubhouse_rep >= 55\n\t\t\t\t\"Well, it'll be your loss when I steal all the awards from you this year,\" Connor says. \"I'll give it a go.\"\n\n\t\t\t\tWhen Connor tries the delivery in his next game, it works flawlessly. He's confident and smooth, and the umpires don't see any reason to call a balk. Connor pitches a clean seven innings with eight strikeouts, and you're starting to think maybe you should have kept this idea for yourself.\n\t\t\t\t*set connorjumpstep true\n\t\t\t\t*goto teamstoryintermission\n\t\t\t*else\n\t\t\t\t*set public_rep %-15\n\t\t\t\t\"That being said,\" Connor continues, \"I'm suspicious of you. Seems like you think it'll lead to an injury, and by God it looks like it would, doesn't it? I'll try it once, but that's it.\"\n\n\t\t\t\tWhen Connor tries the delivery in his next game, he's clearly unnerved by the idea that it might hurt him. He looks all out of sorts, and it's so awkward that an umpire calls him for a balk instinctively, without knowing what exactly he did differently. After the game, Connor says it was a tweak you suggested, and the fans now think you're the kind of player who'd scheme to come up with a new way to break the rules. That could have gone better.\n\t\t\t\t*goto teamstoryintermission\n\t\t#I'll explain the idea in my next interview. Then if the league doesn't say it's cheating, I'll try it next time.\n\t\t\t*if public_rep >= 55\n\t\t\t\tThe league never releases a statement or anything, so you decide to go ahead with the plan. In your next start, starting in the third inning, you start throwing pitches with the jump-step, or as you're calling it now to make it sound a little more legal, drag-step. Every pitcher drags their back foot, after all. This is just, well, an extremely prominent foot drag.\n\n\t\t\t\tAs a result, you're effectively throwing from closer to the plate than before by about a half-foot. This means your pitches both faster, because they're facing slightly less drag in the air, and seem faster to the hitter, because the ball takes less time to get from your hand to the plate. Portia's idea was brilliant, just so long as nobody decides it's cheating, in which case you'll just pitch normal again.\n\t\t\t\t*set velocity %+15\n\t\t\t\t*check_achievements\n\t\t\t\t*if not(choice_achieved_purevelocity)\n\t\t\t\t\t*if velocity >= 70\n\t\t\t\t\t\t*achieve purevelocity\n\t\t\t\t*goto teamstoryintermission\n\t\t\t*else\n\t\t\t\tThe day after your interview, the league releases a message: \"According to rule 5.07, no pitcher may take a second step toward home or reset his pivot foot in his delivery of the pitch. Any attempt to circumvent this rule will be called a balk if there are runners on base, or an illegal pitch if there are not.\"\n\n\t\t\t\tYou're not certain that rule actually disallows the motion you talked about, but now you know they'll be looking for a violation. Sounds like the plan is off. Portia is a little irritated about the result. \"I think they just didn't trust you to do the right thing,\" she says. \"If somebody with a good reputation had brought it up, I bet they would have allowed it. Now it's busted for everybody. Now I gotta come up with a new brilliant idea somehow.\"\n\t\t\t\t*set clubhouse_rep %-15\n\t\t\t\t*goto teamstoryintermission\n*elseif nextteam = \"Capers\"\n\tComing into spring training, you're trying to figure out a way to bring Ama Mendis back to the team. Almost every major league player is a little hyper-competitive and crazy, but for the sake of the Capers and your conscience, you need to dull Mendis's competitive spirit a little. And you know just the person to talk to about lightening someone's mood.\n\n\tWhen you find the man you're looking for, Giulio Camporese is literally wearing a clown costume. He has dressed himself and all the team's rookies up in clown costumes and is doing a variation on his favorite routine: pretending to be an extremely bad coach. He's teaching them how to fall over while they swing, and how to slide butt-first into a base, and how to airmail a throw from third base into the stands.\n\n\tA couple of rookies look into it, but the rest are clearly exhausted by the endless comedy routine Camporese is putting them through. Just when you're starting to rethink asking Camporese for help, here he comes towards you, and that's it, you have to go through with this now. \"To what do I owe the pleasure, ${givenname}?\" he asks, while readjusting his clown nose and kicking dirt out of his oversized shoes.\n\t*choice\n\t\t#\"Let's organize a fan event in honor of Ama Mendis.\"\n\t\t\t\"Giulio, you have a skill for, um, being theatrical,\" you say.\n\n\t\t\t\"What do you mean by that?\" Camporese says, scratching his head just under his clown wig.\n\n\t\t\t\"Could you organize some kind of fan event in honor of Ama Mendis? We have some fans here in town to see us, and she's having a hard time right now. She could use something to make her feel appreciated.\"\n\n\t\t\t\"So what's the joke?\"\n\n\t\t\t\"What? No joke. Just a nice thing for a friend,\" you say.\n\n\t\t\t\"Okay, fine. I know how to do this. Say you will give autographs, and fans will come. But we will make it about applauding and appreciating Mendis. Not really my style, but we can do this.\"\n\n\t\t\tCamporese schedules the event for a few days later around the team's spring training facility in Florida.\n\t\t\t*if fame >= 55\n\t\t\t\t*set mendis_rel %+25\n\t\t\t\tBig crowds funnel in to get autographs from you, Camporese, and Mendis. They don't really seem to understand why the event is in honor of the team's fourth starter, but it's a success regardless. Mendis feels appreciated and more at home with the Capers than before, and hopefully she won't have to compete against you so hard this year.\n\t\t\t\t*goto teamstoryintermission\n\t\t\t*else\n\t\t\t\t*set mendis_rel %+15\n\t\t\t\tYou're not really famous enough to draw a huge crowd, but enough people come to get Camporese's autograph that the event is still a success. The fans arrive, and although they don't really seem to understand why the team is in the honor of the team's fourth starter, they enjoy it anyway. And Mendis feels a little more welcome with the Capers and their fans, which is the important thing.\n\t\t\t\t*goto teamstoryintermission\n\t\t#\"Let's get the team together to throw some kind of party for Mendis.\"\n\t\t\t\"I see you're organizing the rookies very well right now,\" you say.\n\n\t\t\t\"Yes, thank you,\" Camporese says as he reaches under his clown wig to scratch his head.\n\n\t\t\t\"Could you get the team together to do a party or something for Ama Mendis? She's frustrated right now and needs something to turn things around.\"\n\n\t\t\t\"A party…\" Camporese says, and you can see the wheels turning in his head.\n\n\t\t\t\"Just a nice surprise party. Not a prank. Just to show she's appreciated.\"\n\n\t\t\t\"Oh, fine. I will organize a party. This weekend. No jokes.\"\n\n\t\t\t*if clubhouse_rep >= 55\n\t\t\t\t*set mendis_rel %+25\n\t\t\t\tThat weekend, the whole Spring Training roster gathers just outside the locker room for a Mendis appreciation party. Camporese somehow managed to find a bunch of Sinhalese pastries in the Miami area, and the entire team samples from a wide selection of aluwa, kevum, kokis, and roti laid out on folding tables. Hopefully that will make Mendis feel a little more at home with the team, even if she can't have the lowest ERA. Hopefully.\n\t\t\t\t*goto teamstoryintermission\n\t\t\t*else\n\t\t\t\t*set mendis_rel %+15\n\t\t\t\tThat weekend, a few of your closer friends on the team gather just outside the locker room for a Mendis appreciation party. Apparently you haven't made enough friends around the clubhouse to get a bigger crowd. Camporese somehow managed to find a bunch of Sinhalese pastries in the Miami area, and the entire team samples from a wide selection of aluwa, kevum, kokis, and roti laid out on folding tables. Hopefully that will make Mendis feel a little more at home with the team, even if she can't have the lowest ERA. Hopefully.\n\t\t\t\t*goto teamstoryintermission\n\t\t#\"What do you think it would cost to fly in Mendis's parents for a weekend?\"\n\t\t\t\"Well, for my parents flying out of Malpensa it is free, or rather, only the cost of fuel for my jet,\" Giulio starts to say, in what sounds like an unhelpful line of thought. \"If they were commoners, not related to a fantastic baseball player like myself, then two tickets, round-trip, I think somewhere in the region of $2,000. Sri Lanka is what, twice as far? I will guess it is $4,000.\"\n\n\t\t\tBy the time he finishes his crude dollar estimate, you've already looked it up on your phone. You find tickets for $2,000, but it's a 27-hour flight with stops at Abu Dhabi and, oddly, Malpensa in Milan, where Giulio is from. Where he keeps his private jet. \"Giulio,\" you begin, still working out a plan in your head. \"If it would really mean a lot to Mendis, and thereby possibly save the team this year, would you use your private jet to fly Mendis's parents to Miami for a few days?\"\n\n\t\t\t\"Well, I apologize but the jet fuel is expensive in the extreme,\" he says. \"I will require some recompense, if that is the word. A large amount of cash, you understand.\"\n\t\t\t*if wealth >= 55\n\t\t\t\t*set mendis_rel %+25\n\t\t\t\tTo you, a large amount of cash is a small amount of cash. You can thank your last contract for that. You pay Giulio a semi-ridiculous amount of money to fly Mendis's parents to Miami on a private jet for a weekend, spending some rare time together with their daughter. Hopefully, having a good weekend with her parents will ground Mendis a little bit, and help her see there's more to life than competition with a teammate. Hopefully.\n\t\t\t\t*goto teamstoryintermission\n\t\t\t*else\n\t\t\t\t*set mendis_rel %+15\n\t\t\t\tUnfortunately, your salary doesn't really support giving out large amounts of cash, and far more than the $2,000 it would cost to fly coach. So, after a long and complicated process of global communication and planning, you fly Mendis's parents to Miami via Etihad Airways and American Airlines, like a \"commoner.\"\n\n\t\t\t\tDue to the 27-hour flight, they don't end up with much time to actually talk to Mendis when they get to Miami, but she's clearly very thankful. You're not there for the meeting, but hopefully talking to her parents grounded her a little bit, and reminded her that life isn't all about competition. Hopefully.\n\t\t\t\t*goto teamstoryintermission\n*else\n\tOn your first day of spring training, you notice an unusual number of reporters drifting around. They're not taking photos of the workouts, they're not taking videos of your pitching, and they're not talking to anybody. Just standing around, like they're waiting for something else to happen. The whole atmosphere is strange, and it only gets stranger when your manager calls a meeting.\n\n\tAll the pitchers and catchers shuffle into an Arizona locker room that smells like gym class. \"I've got two things to say, and I need everyone to listen carefully,\" your manager says. \"First, Andres del Rosario won't be here this spring. I'm sorry to say he's been busted under the league's drug protocol. Steroids, or I don't know what they got him for exactly, but it's basically steroids. He's been suspended for eighty games, so he's out until after the All-Star break.\n\n\t\"I'm sad for him and we can all be sad for him but here's the important thing,\" your manager continues. \"I played back in the '90s. I saw how teammates talked to each other and swapped trainers around to get the performance enhancers they needed. This will not happen in my clubhouse. I'll leave it at this: If you're cheating, you better hope the league catches you before I do. Anyone I see with PEDs will never play for this or any other team I manage ever again. Hear me? That's all.\"\n\n\tEveryone files out of the locker room right into the lion's den. Reporters, beat writers, bloggers, and a few confused autograph seekers are all lined up outside, ready to catch anybody they can for an interview. You spot a familiar face, Inés Cruz, and head straight to her.\n\t*page_break Interview Time\n\t\"I'm sure it's a rough day for you, ${givenname},\" Cruz says. \"You've known Rosario for a long time, and we've just heard about his suspension. Anything you can tell us from the closed-door meeting you just had?\"\n\n\tYou bristle a little at \"closed-door meeting,\" the kind of phrase they use in articles that doesn't mean anything but sounds scandalous. But you can't fault her for using the language of her profession. You're still shocked by this terrible news about your closest friend on the team. But the fans will expect you to speak out against cheating, and if you're seen as the team leader, your teammates will appreciate you saying you don't think anyone else is responsible.\n\n\tAlthough wait, didn't Rosario say he thought Lisa Janga was on PEDs last year? Was that just a guess or did he know? You'll have to worry about that later. What do you do?\n\t*choice\n\t\t#I'm the most famous player on the Barons, so I'm expected to say something. I'll speak for the whole team.\n\t\t\t*set cruz_rel %+20\n\t\t\t\"As the leader of this team, I feel I need to speak on record about this,\" you say. \"I've never seen or even heard rumors of any of my teammates using performance-enhancing drugs. Baseball won't support a cheater, and neither will the Barons. Rosario's been a close friend to me throughout my career, so I hope this is all a misunderstanding.\"\n\n\t\t\t*if fame >= 55\n\t\t\t\t*set clubhouse_rep %+15\n\t\t\t\tThe fans and players agree, you are the team leader, and it's appropriate that you gave a few words to pacify the press and fans in this trying time. And while it's not exactly true that you've never heard rumors that your teammates might be on PEDs, it doesn't help anybody to have external pressure on the clubhouse.\n\t\t\t\t*goto teamstoryintermission\n\t\t\t*else\n\t\t\t\t*set clubhouse_rep %-15\n\t\t\t\tWhen your comments go up on NSN.com the next day, your teammates grumble privately about your claim that you're the leader of the team. It's a big-money team with a lot of great players, and you're just one of them. It's nothing compared to the steroids scandal, but your reputation within the clubhouse suffers a little because you sort of claimed you're a cut above the rest of your teammates.\n\t\t\t\t*goto teamstoryintermission\n\t\t#I have a good reputation with the fans, so I can speak out and Barons fans will trust what I say.\n\t\t\t*set cruz_rel %+20\n\t\t\t\"Barons fans need to know this is not a team-wide phenomenon,\" you say. \"I don't even know if it's a Rosario-wide phenomenon until I get more information, but I'm in that clubhouse every day and I've never seen or heard about any PEDs.\"\n\n\t\t\tWhen your comments are published the next day on NSN.com,\n\t\t\t*if public_rep >= 55\n\t\t\t\tit calms the storm noticeably. The fans trust you to tell the truth. Your teammates are thankful that you stepped up to clear their names, because rumors were going around about every single Barons player. But, for what it's worth, you don't really have a clue at this point whether your teammates are juicing or not. That's something you'll have to find out.\n\t\t\t\t*set clubhouse_rep %+15\n\t\t\t\t*goto teamstoryintermission\n\t\t\t*else\n\t\t\t\tthey're mostly ignored. The fans don't trust you enough, so it just sounds like the usual self-interested deflection of blame. When your attempt to calm the waters fails, your teammates are a little upset that you talked to a reporter at all when the team needed to close ranks.\n\t\t\t\t*set clubhouse_rep %-15\n\t\t\t\t*goto teamstoryintermission\n\t\t#The other players trust me, so I can speak frankly about the scandal without being seen as a traitor.\n\t\t\t\"Normally I wouldn't talk to you when I don't really know anything yet, but I think it's important to clear the air,\" you say. \"I consider myself a leader on this team, and I think I can speak for all of us: I've never heard a word about juicing in this clubhouse. I'm holding out hope that this thing with Rosario is a misunderstanding, because I know and he knows that Barons don't cheat.\"\n\n\t\t\tYour comments go up on NSN.com the next day, and\n\t\t\t*set cruz_rel %+20\n\t\t\t*if clubhouse_rep >= 55\n\t\t\t\t*set public_rep %+15\n\t\t\t\tyou've built up enough trust within the team that they appreciate you took the lead on this issue and tried to clear their names. Whether you were seen as a leader before or not, the fans think you are a clubhouse leader now, and your reputation with them improves. However, you're not actually sure if any of your teammates are juicing or not. Maybe you should do something to find that out.\n\t\t\t\t*goto teamstoryintermission\n\t\t\t*else\n\t\t\t\tword filters out over the next few days that your teammates don't really see you as a leader, and are a little upset that you talked to a reporter so soon. A few of them think you're more loyal to Cruz than you are to your team. Paradoxically, your teammates make this known by talking to more reporters, who now are writing stories about whether or not you betrayed your team by talking to a reporter. You've managed to work your way into a ridiculous situation, but the fans eventually seem to side with your teammates, and your reputation with the fans suffers. What a week.\n\t\t\t\t*set public_rep %-15\n\t\t\t\t*goto teamstoryintermission\n\t\t#I'm not saying anything yet, not without knowing more about what happened.\n\t\t\t*set clubhouse_rep %+10\n\t\t\t*set cruz_rel %-20\n\t\t\t*set public_rep %-15\n\t\t\t\"I'm sorry, Inés, but I can't talk on record about this yet,\" you say. \"I don't know any more than you do, and that's not enough to talk to the press and potentially break the trust of my teammates or Rosario.\"\n\n\t\t\t\"Shoot,\" Cruz says. \"Well, I need to find somebody who's willing to talk. I'll see you later.\"\n\n\t\t\tEveryone knows you're close with Rosario, so more than a few articles pointedly mention your unwillingness to talk, leading to speculation in the comments that you could be the next one caught with PEDs. But your teammates are glad you didn't break ranks to talk to a reporter before it's clear what exactly happened. Is Rosario really a cheater? Is anybody else?\n\t\t\t*goto teamstoryintermission\n*label teamstoryintermission\n*page_break Time to Pitch\n*set totalouts 36\n*set earnedruns 6\n*set strikeouts 12\n*set wins 1\n*set losses 2\n*gosub_scene 2ndYear resetgame\n*set runnerfirst true\n*set outs 2\nThe ${nextteam} are facing the Vancouver Foresters today, and you're on the mound. It's your third start of the season, and your last two weren't up to your usual standard, so you're hoping to bounce back today.\n\nIn the fourth inning, a runner is on first and there are two outs. Not an especially high-pressure situation, but your last two games both fell apart because of strings of two-out hits and walks. You have to show you've conquered that problem now. What do you throw?\n\n*gosub_scene 2ndYear situationtext\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 5\n*set batterpower 3\n*set batterhand \"right\"\n*gosub_scene 2ndYear getpitchodds\n*comment Truly fake choices. Player supposed to get the same message no matter what pitch they pick here, ending with an arm injury after the second pitch.\n*choice\n\t#Fastball.\n\t\t*goto meatball1\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*goto meatball1\n\t*selectable_if (slider > 0) #Slider.\n\t\t*goto meatball1\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*goto meatball1\n\t*if (knuckleball > 0) #Knuckleball.\n\t\t*goto meatball1\n\t#Waste Pitch.\n\t\t*goto meatball1\n*label meatball1\nYou throw a meatball. That's in there for a called strike. The count is now 0 - 1.\n\n*gosub_scene 2ndYear getpitchodds\n*choice\n\t#Fastball.\n\t\t*goto meatball2\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*goto meatball2\n\t*selectable_if (slider > 0) #Slider.\n\t\t*goto meatball2\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*goto meatball2\n\t*if (knuckleball > 0) #Knuckleball.\n\t\t*goto meatball2\n\t#Waste Pitch.\n\t\t*goto meatball2\n*label meatball2\n*set earnedruns +2\nYou throw a hanger. The batter makes contact and puts the ball in play.\n\nOh no. The arm. The batter hits a home run, but that's a mile from your mind. Something feels wrong in your arm. Not this. Not again. The trainer comes out to the mound and says something to you, but you don't know what. So you just nod and walk off the field.\n*page_break Living on the DL\nSitting at home, recovering from your injury, you have no choice but to think. What if this is it? What if the arm never heals, or it never feels right again, or you develop the yips? What would you do with your life? You've been playing baseball as long as you can remember. You take out a pen and paper and write in big letters at the top, \"Rest of My Life,\" and underline it. You sit there thinking of everyone you know who could get you a new job, or at least a new reason to keep working after you can't play baseball anymore.\n\n*label whoyougonnacall\nAfter fifteen minutes of thinking, you come up with only five names, not much more than acquaintances. Those names are Inés Cruz, Julie Cheng, Rasheed Taylor, Wilson Virdon, and Prakash Bhavsar.\n\nInés works for National Sports Network, and she's a writer, so maybe she would be interested in writing a book with you. Would anyone read a book about your life?\n\nJulie Cheng is a rising star in the fitness world, and could probably find something for a famous athlete to do, at least one who's in good shape. Are you in good enough shape to sell a fitness program?\n\nYou ran into Rasheed Taylor last year, and you know he's trying to earn a living wage for minor league baseball players. He could probably use a trustworthy major league name to lead his cause. Do you have a good enough reputation within baseball to have any pull like that?\n\n*if agent = \"Virdon\"\n\tWilson Virdon is your agent, and he's turned a few athletes into Hollywood stars. Maybe you should give him a call.\n\t*goto talkaboutprakashnow\n*else\n\tWilson Virdon is a talent agent that Anna Dukas recommended to you years ago, and he's successfully turned a few athletes into Hollywood stars over the years. Do you have the raw charisma to make that work?\n*label talkaboutprakashnow\n\nPrakash Bhavsar is just a college kid, but his technical skill with computers was clearly giving him an inside look at the mechanics of pitching. Even if your arm doesn't work anymore, you're sure he'd appreciate a guinea pig to test his theories, and maybe improve the way players pitch forever. But do you have the stuff to push the mechanics of pitching to the edge of what's possible?\n\nOne of your acquaintances must know something you can do after your career is over. Who do you call?\n*choice\n\t*selectable_if (cruzavailable) #Inés Cruz.\n\t\tYou call up Inés, knowing that she'll always answer your call. \"Hey, ${givenname}, how are you?\" she says.\n\n\t\t\"I'm sorry to ask for help like this, but something's bothering me right now and I could use your help to get over it. I just hurt my arm again, as you might have heard, and I was wondering if you knew a job I could do on the small chance my pitching career is totally over.\"\n\n\t\t*if (helpedcruz = false)\n\t\t\t*set cruzavailable false\n\t\t\t\"Well,\" Cruz says, pausing for a second. \"The deal was that you'd give me a scoop for NSN and then I'd help you find a career. You haven't really given me anything, and as far as I know you've hardly so much as touched that notebook I gave you. I understand that you wouldn't want to give away private inside baseball stuff, but I can't help you with your career if you won't help me with mine. I'm sorry.\"\n\n\t\t\tYou try to think of something else to say, but that about wraps up the conversation. You're not willing to give out secret information to help her, so that's final. You politely end the call and think about who to call next.\n\t\t\t*goto whoyougonnacall\n\t\t*else\n\t\t\t*set mentor \"Ines\"\n\t\t\t\"Oh, come on,\" she says, laughing. \"You'll be fine. But hey, you helped me out with that sign stealing story, so if it will help you sleep a little easier, let me brainstorm a few things for you. You could become a broadcaster for NSN, I bet. Do you think you can spit out baseball clichés for four hours on end?\"\n\n\t\t\t\"I'm no professional, but I could give that a shot,\" you say.\n\n\t\t\t\"You could just keep doing what you're doing with that notebook,\" she says. \"Write down anything interesting you hear in the clubhouse. And this time, don't forward information on to me, just keep it for yourself and maybe you'll get enough together to write a book one day. You could write a memoir, or an anonymous 'tell-all' kind of thing about what goes on in the clubhouse. That would be immensely valuable.\"\n\n\t\t\t\"Okay, sure, I could keep writing stuff down,\" you say. \"But won't that get me in big trouble with the team eventually? When I write about secret stuff?\"\n\n\t\t\t\"Well, I don't know. I wouldn't be surprised if it did. But you could write anonymously. Or just write down things about yourself and your own life, without giving too much away about what other players are doing. So, just, you know, get yourself into interesting situations, I guess.\"\n\n\t\t\tThose are all pretty good ideas. You could work towards being a broadcaster, or you could think about writing a memoir, or, maybe a little more controversially, a book about what your teammates do away from the TV cameras. What will you work towards?\n\t\t\t*choice\n\t\t\t\t#Broadcasting.\n\t\t\t\t\t*set career \"broadcaster\"\n\t\t\t\t\t\"Broadcasting takes a very specific skill set,\" Cruz says. \"You have to talk and talk for hours, constantly, preferably without sounding stupid. It would be a nightmare for me. Sometimes it takes me five hours to write a story that's a thousand words long, and they probably say a thousand words a minute.\n\n\t\t\t\t\t\"Since you're a player, they'll probably want you to be the analyst rather than play-by-play, which means you'd talk slightly less but have to say things that are actually interesting and insightful sometimes,\" Cruz continues. \"But you still have to present that information as simply as possible, so warm up those clichés. And you don't want to be too analytical and talk about advanced stats all the time, or go straight from the gut and never say anything based in real baseball. Going too far in either direction would alienate a lot of the people watching. It's complicated, but I'll get you in touch with the appropriate person at NSN and they'll work with you on it. Good luck, I'm rooting for you.\"\n\t\t\t\t\t*goto rehabchoiceyear7\n\t\t\t\t#A memoir.\n\t\t\t\t\t*set career \"memoir\"\n\t\t\t\t\t\"Well, I've never written a memoir,\" Cruz says, \"But I imagine the most important advice I could give is to one, be as famous as possible, and two, get yourself into interesting situations so you can give killer anecdotes in every chapter. And then, of course, don't tell your interesting anecdotes to any journalists like me who will print it and spoil your memoir. But I guess being a famous person is the most important thing. I don't really know how to do that, but you're well on your way.\"\n\n\t\t\t\t\tCruz laughs with a tinge of nostalgia, like she's thinking of some old memory. \"I remember when nobody would have heard of either of us, back when you were a rookie and I was at the [i]South Texas Journal[/i]. It takes something special to think you can write a book about your life and get people to read it, but you are special, aren't you? Anyway. Good luck, and call me if you run into any problems. I'm rooting for you.\"\n\t\t\t\t\t*goto rehabchoiceyear7\n\t\t\t\t#A tell-all book.\n\t\t\t\t\t*set career \"tell-all\"\n\t\t\t\t\t\"All right then, welcome to my world,\" Cruz says. \"Your job now relies upon snooping into other people's business as nicely and professionally as you can. Thankfully that's always come naturally to me. But it's a tricky thing to get the information you need without eroding trust, especially on something like a baseball team where everybody is supposed to be really working together.\n\n\t\t\t\t\tCruz laughs with a tinge of nostalgia, like she's thinking of some old memory. \"Anyway, do what you can to figure out what your teammates are doing and why,\" she continues. \"If you can understand them and get their side of the story, your book will be a must-read. Come talk to me again if you need help, or just to check in on your progress. I'm rooting for you.\"\n\t\t\t\t\t*goto rehabchoiceyear7\n\t#Julie Cheng.\n\t\t*set mentor \"Julie\"\n\t\t*set career \"fitness\"\n\t\tYou give Julie a call. \"And hold, two, three, four. Hello?\" she says, apparently in the middle of something.\n\n\t\t\"I'm sorry, I can call back later,\" you say.\n\n\t\t\"No no, don't worry about it. I'm trying yoga. Somebody told my producer, Charles, that I should try it, and would you believe I've never done yoga before? I'm trying it out right now. So I can talk.\"\n\n\t\t\"Aren't you supposed to relax when you're doing yoga?\"\n\n\t\t\"Do you get anxious on the phone? Not me. I'm very relaxed. Go ahead and talk, I have to put the phone down to do this next pose.\"\n\n\t\t\"Okay, well I was wondering if you'd know someplace I could get a job. Maybe I could help with your workout videos, or do my own even?\" The line stays uncomfortably silent for a minute.\n\n\t\t\"Sorry, moved on to Warrior II pose now,\" Julie yells distantly over the phone. \"So I can talk to you, but my hand's all the way out in front of me, so it might be hard to hear. That sounds great! You should come over when you get an off day.\"\n\n\t\t\"My arm's hurt, so every day's an off day. How about tomorrow?\"\n\n\t\t\"Even better. Come over here tomorrow, you know where the studio is. Okay, time for chair pose. Oh crap!\" The phone clatters to the ground, making a series of loud noises in your ear. \"Bye!\" Julie yells at the phone as it's lying on the ground.\n\t\t*page_break The Next Day\n\t\tYou arrive at the studio, which they've renovated since last year. Most of the loft-like room is a mess of cables and equipment thrown across a concrete floor, but the small area in front of the cameras is transformed into a minimalistic modern architecture living room, with wood floors, sort of uncomfortable-looking furniture with lots of square angles, and a huge fireplace that you think is fake but aren't totally sure. \"Hi again, let me introduce you to my producer, Charles,\" Julie says.\n\n\t\t\"Hello, and,\" Charles starts to say before Julie cuts him off.\n\n\t\t\"Don't bother ${himher},\" Julie says. \"Okay, so thank you for coming over. I brainstormed a few—\" C
