 means \"I don't speak Japanese.\" Hopefully that's enough to get by between calls to your parents to ask for specific phrases.\n\n*page_break Enter the Clubhouse\nAs you enter the locker room, a tiny twig of a man twirls out from behind the door as you open it, startling you. \"Are you ${surname}?\" he asks, in a neutral American accent. You nod. \"I'm David Ogawa, your interpreter. Call me Dave, or David. Or Ogawa. I don't care. I was really hoping you'd come in this way. Wouldn't want you to be lost with no way of talking to anybody. You're going to be seeing a lot of me while you're with the Cranes, but let me just tell you right now that I don't work for non-baseball stuff. Too many foreigners have dragged me to too many weird places in my previous translation work, and that's not going to happen to me this time. Got it?\"\n\nIt's not the nicest introduction you've ever heard. You were told this country is big on manners. \"Hi Dave, or David, or Ogawa,\" you say with a little sarcasm. \"Um, how are you doing?\"\n\n\"Dandy,\" Ogawa says, with an unexplained sour look on his face. \"Hey, any quick questions you've got for me before we head in and meet everybody?\"\n*label translatorconversationloop\n*choice\n\t*hide_reuse #\"How do you like your job? Do you like working in baseball?\"\n\t\tYou try to build a rapport with this person who's going to shadow you for the next year.\n\n\t\tOgawa shakes his head in exasperation. \"Obviously this is not an insult to you or what you do or anything, but I hate baseball,\" he says. \"Watching a full game is so boring, it's mindless. Not to mention the games are four hours long now, at least in the U.S. Here at least they don't let games go past twelve innings.\"\n\n\t\t\"They only go twelve innings here? What even happens, do they finish the rest the next day?\" This information is totally new to you.\n\n\t\t\"It's a tie after twelve innings. Oh yeah, they have ties here.\"\n\n\t\t\"Wait, how can you do this job without liking baseball?\" you ask.\n\n\t\t\"Easy. I just translate the words. This is just the job I got, I don't know what to tell you.\" Ogawa looks around for a moment. \"And obviously, don't tell my boss I'm not a baseball fan. I mean, not that you could tell him. If you told him, I'd just translate what you said as something else. So, yeah. Do you have any other questions? Preferably not something personal to me, if you don't mind.\"\n\t\t*goto translatorconversationloop\n\t*hide_reuse #\"How did the Cranes do the last few years? Are they good?\"\n\t\tAs you start to ask the question, Ogawa is already groaning for some reason.\n\n\t\t\"Look,\" Ogawa says, then pauses. \"I just got hired like a month ago. I don't think the Cranes have won the Japan Series recently but I don't really follow that stuff.\"\n\n\t\t\"What do you mean by 'that stuff?'\" you ask.\n\n\t\t\"Baseball. I don't really follow the uh, standings and stuff. I'll figure out how the team did the last few years and get back to you on that, don't worry about it. In the meantime, any other questions for me?\"\n\t\t*goto translatorconversationloop\n\t*hide_reuse #\"Do the Cranes have any other foreign players?\"\n\t\t\"Uh, well, there's Romilly. She's the center fielder. I think she's French, maybe? Don't know if she speaks English, sorry. I just got hired, and I think I'm the only Japanese-English interpreter on staff. So you'll be talking to me a lot, or through me to other people. Hope that's okay. Anything else you wanted to ask me?\"\n\t\t*goto translatorconversationloop\n\t*hide_reuse #\"So where is Tsuru? Is it a district of Tokyo?\n\t\tOgawa laughs a little. \"No, Tsuru is an electronics company. And they make pianos. And motorcycles, I think. Probably some other stuff. All the teams in Japan are owned by other companies, and they put the company name in front of the city. I guess that's a little foreign to you. And a fun fact for you: 'Tsuru' is Japanese for 'crane.' Before Tsuru bought the team, they were the Ducks. I guess it would have been weird if they were called the 'Crane Ducks' so they changed the name. Anything else you want to ask?\"\n\t\t*goto translatorconversationloop\n\t#\"Nope, think that's all I've got.\"\n\t\t\"Wonderful,\" Ogawa says, maybe a little too curtly. \"Time for you to meet the coaching staff. Follow me this way.\"\n\t\t*goto escapethetranslatorloop\n*label escapethetranslatorloop\n*page_break Follow Him\nYou follow Ogawa into a small room almost overflowing with messy stacks of books. \"This is your new manager, Nabeshima Shigeo. Just step over the books. Nabeshima likes to study the tactics of baseball, but honestly I don't think the game is really complicated enough to need much study. You either steal a base or you don't steal, right? Don't worry, he doesn't understand what I'm saying to you.\" Ogawa and the manager then shoot handfuls of rapid-fire syllables back and forth for a minute, then without saying anything else to you, Ogawa pulls you out of the office.\n\n\"He's busy,\" Ogawa says. \"He said for me to tell you the starting rotation is six men in Japan, and also that the baseball is a little smaller and less slippery over here. I don't know what you're supposed to do with that information, don't ask me. Let's meet your pitching coach now.\"\n\nYou step through the standard gray concrete non-architecture of the clubhouse into the pitching coach's office and it's like you warped back a few centuries. She sits on her knees on a pillow on the floor in front of a low table, sitting symmetrically in the center of a traditional Japanese room made of wood and paper. It seems impossible that this room could exist in the same space as the rest of the stadium.\n\nAs you gawk at her office, Ogawa introduces you in Japanese to the pitching coach. Then he turns to you and says, \"This is your coach, Tanaka Kasahara. Her performances in the national high school tournament, Koshien, made her famous a long time ago. She was a knuckleballer back before women could join professional teams, so she threw in exhibition games around the country. Anyway, all she really said is she wants to know what your philosophy of pitching is.\"\n\nYou're not sure he's translated her question correctly. \"A philosophy of pitching?\" you ask.\n\n\"Yeah, I dunno what she means,\" Ogawa says. \"Is that a thing pitchers have? A philosophy? I guess you better say something kind of poetic-sounding about the way you chuck baseballs.\" What do you say?\n*choice\n\t#\"I visualize myself throwing so hard that my pitches go through the opponent's bat.\"\n\t\tYou leave it up to Ogawa to translate that in a way that sounds profound, hopefully. He pauses to breathe in then rattles off a long string of words to the pitching coach.\n\t\t*if velocity >= 55\n\t\t\t*goto thatringstrue\n\t\t*else\n\t\t\t*goto notsotrue\n\t#\"I throw pitches that dance in front of the hitter. Any pitch that doesn't move is a failed pitch.\"\n\t\tHopefully Ogawa can translate that in a way that sounds profound. He pauses to breathe in then rattles off a long string of words to the pitching coach.\n\t\t*if ((curveball >= 55) or (slider >= 55))\n\t\t\t*goto thatringstrue\n\t\t*else\n\t\t\t*goto notsotrue\n\t#\"If I cannot control where I throw, then the batter is the one in control.\"\n\t\tYou say your piece, hoping that the words for \"pitching control\" and \"being in control\" are one and the same in Japanese. Hopefully Ogawa can translate that in a way that sounds profound. He pauses to breathe in then rattles off a long string of words to the pitching coach.\n\t\t*if control >= 55\n\t\t\t*goto thatringstrue\n\t\t*else\n\t\t\t*goto notsotrue\n\t#\"Like any great starter, I must balance every facet of pitching to succeed.\"\n\t\tYou give a short speech, wrapping it up by saying \"Velocity is key. Control is key. And changing pace is also key. Neglecting any part of pitching is like making a stool with two legs.\" Ogawa rolls his eyes almost imperceptibly, but hopefully he can translate that in a way that sounds profound. He pauses to breathe in then rattles off a long string of words to the pitching coach.\n\t\t*if ((velocity > 50) and ((control > 50) and (changeup > 50)))\n\t\t\t*goto thatringstrue\n\t\t*else\n\t\t\t*goto notsotrue\n*label thatringstrue\n*set pitchingcoach_rel %+20\n\nTanaka remains seated, but looks up at you from under the bill of her Cranes cap. She must have always worn her hat low like this over her eyes when she pitched, to intimidate the hitters. Darting her eyes between you and Ogawa, she says something that Ogawa translates as \"I've watched video of your pitching in the major leagues. That philosophy matches your pitching style well. I will be glad to work with someone who understands what they are doing on the mound, which isn't too common these days.\"\n\nYou leave her office to get started with practice, but feel like you made a small connection already with your pitching coach. Maybe talking through a translator won't be so tough after all.\n*goto nagekomi\n*label notsotrue\n*set pitchingcoach_rel %-10\n\nTanaka remains seated, looking directly down at her low table, her face hidden behind a Cranes cap. After Ogawa translates your answer, you sense some added tension in the room. \"Hmm,\" Tanaka grunts, then quickly spurts out something that Ogawa translates as \"If that is your philosophy, then the video I have seen of you pitching in the majors must have been misleading. Perhaps when I see you pitch in person, I will understand what you mean. Or perhaps you need to examine yourself more closely.\"\n\nYou exit the room feeling like you know less about Tanaka than when you entered it. And she didn't seem impressed by your \"philosophy,\" but what does that mean anyway? You're just trying to get hitters out however you can. What does it matter to her what your philosophy is?\n*label nagekomi\n*page_break Time to Practice\nOn an off-day early in the season, you're throwing your regular bullpen session, keeping your arm warm between starts as your interpreter rests his head on one hand and scrolls through his phone. Nabeshima, the manager, steps in to watch you, silently standing behind you with his arms folded. After a few more throws, Nabeshima speaks up, saying something that Ogawa translates to \"How many pitches have you thrown so far today?\"\n\n\"About thirty. I'm just wrapping up here,\" you say, expecting the manager to need you to work on something else.\n\n\"Mr. Nabeshima says you should be throwing much more than that,\" Ogawa reports. \"You're in a six-man rotation now, so you have to work harder like they do here. He also added that Japanese pitchers don't get hurt as often as pitchers in America even though they throw more. Is that true? I don't know anything about that.\"\n\n\"How many more pitches does he want me to throw, then?\" you ask, a little worried. If he changes your workload and gets you injured somehow, American teams might decide you're too injury-prone to sign next year.\n\n\"Mr. Nabeshima says throw 150 pitches in your weekly bullpen sessions. Is that a lot?\"\n\nIt is a lot. Are you going to let him tell you to change the way you've worked for your whole life? At the risk of your health and livelihood? Nabeshima does seem like a believer in hard work. He might be really disappointed if you don't do what he says. What do you do?\n*choice\n\t#Sure, I can throw as many as he needs. I'm physically fit and ready to do anything.\n\t\t*if fitness > 60\n\t\t\t*set manager_rel %+15\n\t\t\t*set rebellious %-10\n\t\t\tYou've been waiting for a chance to show your new coach just how athletic you are, and this is a good one. You throw fifty, a hundred, 150 pitches, full strength, into the catcher's mitt as Nabeshima looks on. By the end, you're sweating all over, and your arm will probably feel sore tomorrow, but it was worth it to make a good impression. Maybe you will fit in better in a clubhouse where hard work and peak fitness is valued.\n\t\t\t*goto 5thyearjapan1stgame\n\t\t*else\n\t\t\t*set manager_rel %+10\n\t\t\t*set rebellious %-10\n\t\t\t*set fitness %-10\n\t\t\tYou jump at the chance to show your manager how fit you are, but this is really too much to ask. You throw and throw and throw, and eventually get through a hundred pitches before you can go no further. With hands on knees, sweating pounds and pounds of water into your uniform, you've managed to impress Nabeshima. But from that day on, there's a weird part of your shoulder that's always felt different, and you don't move quite the way you used to. Maybe that wasn't a great idea.\n\t\t\t*goto 5thyearjapan1stgame\n\t#I'll throw a lot of pitches, but not at my usual velocity. If I take it easy, I won't get hurt.\n\t\t*if fitness > 50\n\t\t\t*set manager_rel %+10\n\t\t\tYou decide to follow the manager's instructions but throw at about eighty-percent strength so you won't hurt yourself going through this crazy routine. Nabeshima notices that you're not going full strength, but once you've thrown 150 pitches in front of him, maintaining your mechanics well for each one, he's impressed. You've heard people say \"I work smart, not hard\" before, but this was a case where you had to do both.\n\t\t\t*goto 5thyearjapan1stgame\n\t\t*else\n\t\t\t*set manager_rel %-10\n\t\t\tEven working as slowly and throwing as softly as you can, you get too tired to continue past a hundred pitches. Nabeshima clearly saw you weren't throwing at full strength, and he's not impressed with your work ethic or fitness level. It feels like there's no time these days to work on staying fit instead of practicing baseball, but maybe it's something you need to improve soon.\n\t\t\t*goto 5thyearjapan1stgame\n\t#Show him how hard I throw. That way he'll know I should be an exception to the work schedule.\n\t\t\"Let me show you this instead,\" you say, then gather yourself to throw the hardest pitch you possibly can. You air it out, and the bullpen velocity display lights up\n\t\t*if velocity > 60\n\t\t\t*set manager_rel %+10\n\t\t\t*set fame %+10\n\t\t\t\"160.\" It takes your breath away for a moment, but then you remember that's in kilometers per hour. But still, that's about 100 miles per hour! You haven't thrown that hard in games because it would shred your arm, but it's good to know you've got that potential in there.\n\n\t\t\tNabeshima says nothing, but shakes your hand and walks out of the bullpen, apparently satisfied. And word gets around that you threw 100 (or 160) in a bullpen session, making fans of the Japanese league very excited to see you in action for the first time.\n\t\t\t*goto 5thyearjapan1stgame\n\t\t*else\n\t\t\t*set manager_rel %-10\n\t\t\t*set rebellious %+10\n\t\t\t\"147.\" You're shocked, scanning your brain for an answer before you realize, oh, that's in kilometers per hour. It turns out you threw a 91 MPH fastball, nothing really to write home about. Nabeshima doesn't understand why you stopped after just one pitch, but that's it, you're done. No reason to ruin your arm to please his unreasonable standards. If that means he thinks you're lazy and unwilling to listen to him just because you don't want to reinjure your arm, fine.\n\t\t\t*goto 5thyearjapan1stgame\n\n*label 5thyearjapan1stgame\n*page_break Time to Play Baseball\n*gosub_scene 2ndYear resetgame\n*set totalouts 4\n*set earnedruns 0\n*set runnerfirst true\n*set outs 1\nYou're on the mound in your first start in Japan, an away game against the Penguins. There's one out in the second inning, and you've already noticed a lot of differences from the major leagues. First of all, after the first batter singled against you to start the game, the second batter sacrifice bunted him over to second. No manager in the United States would be so conservative that they would bunt the leadoff batter over in the first inning.\n\nSecond, the crowd sings a unique song for each of their hitters in unison. Not everyone, of course, but lots of fans stand and sing, somehow knowing the lyrics to all these different chants. Then when the Cranes hitters come up to bat, the crowd sits quietly and watches. A little section of Cranes fans out in the left field bleachers sings their hitters' songs then. It's totally unlike anything you ever saw in the U.S., and it takes you a little while to tune out this new noise profile while you pitch.\n\nBut all the stuff that matters is exactly the same. It's the same game with the same rules, and there's a runner on first and one out. This next hitter is right-handed, and she comes set to hit with a fearsome and unique crouch, her bat high in the air behind her as her left foot fidgets near the front of the batter's box.\n*gosub_scene 2ndYear situationtext\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 6\n*set batterpower 2\n*set batterhand \"right\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 5thyearjapan1stgameatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 5thyearjapan1stgameatbatloop\n\n*label 5thyearjapan1stgameatbatloop\n*if atbatresult = \"single\"\n\tThe batter strokes a clean base hit into center field. The runner from first moves around to third, and the crowd switches into a new melody that they use whenever one of their players is in scoring position. The chant is too short and gets monotonous fast, but there's nothing you can do about it besides get out of this inning.\n\t*goto endof5thyearjapan1stgame\n*elseif atbatresult = \"double\"\n\t*set earnedruns +1\n\t*set userruns +1\n\tThe batter dumps the ball over the third baseman's head, where it rolls all the way to the corner. The runner from first comes around to score, the first run you've given up in Japan. The crowd switches into a new melody that they use whenever one of their players is in scoring position. The chant is too short and gets monotonous fast, but there's nothing you can do about it besides get out of this inning.\n\t*goto endof5thyearjapan1stgame\n*elseif atbatresult = \"triple\"\n\t*set earnedruns +1\n\t*set userruns +1\n\tThe batter hits a long fly ball that bounces off the wall, getting past the center fielder who has to chase it around the outfield. The runner from first scores, and the batter gets all the way to third before the ball comes back to the infield, hitting a triple. The crowd switches into a new melody that they use whenever one of their players is in scoring position. The chant is too short and gets monotonous fast, but there's nothing you can do about it besides get out of this inning.\n\t*goto endof5thyearjapan1stgame\n*elseif atbatresult = \"home run\"\n\t*set earnedruns +2\n\t*set userruns +2\n\t*set losses +1\n\tThe batter hits a towering fly ball that looks like an easy out, but the wind keeps pushing it and pushing it until it flies into the left field bleachers, where a devoted Cranes fan catches it, a little unsure whether to be sad or excited. Those are the first two runs you've given up in Japan, and a slightly rough start to your time with the Cranes.\n\t*goto endof5thyearjapan1stgame\n*elseif ((atbatresult = \"groundout\") or (atbatresult = \"lineout\")) or (atbatresult = \"flyout\")\n\tA nice little wooden \"tick\" sound hits your ear, and the batter hits a soft grounder to the right side of the infield. You scoop it up and heave the ball toward second base, but the batter is too fast to get doubled up. That's a fielder's choice out, and you're starting to cruise through the inning.\n\t*goto endof5thyearjapan1stgame\n*elseif atbatresult = \"walk\"\n\tThe batter takes her base, pushing the runner that was on first to second. The crowd switches into a new melody that they use whenever one of their players is in scoring position. The chant is too short and gets monotonous fast, but there's nothing you can do about it besides get out of this inning.\n\t*goto endof5thyearjapan1stgame\n*elseif atbatresult = \"strikeout\"\n\t*set outs +1\n\t*set totalouts +1\n\t*set strikeouts +1\n\t*set userstrikeouts +1\n\tThe batter tosses her bat a few feet in the air then clenches it with her other hand, storming back to the bench. Pitching just comes easy to you.\n\t*goto endof5thyearjapan1stgame\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyearjapan1stgameatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyearjapan1stgameatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyearjapan1stgameatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyearjapan1stgameatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyearjapan1stgameatbatloop\n\n*label endof5thyearjapan1stgame\n\nTanaka comes to the mound with your interpreter, presumably to talk strategy for this next hitter. Pitching in the majors, you had slowly learned every hitter's strengths and weaknesses, but here you don't know anyone yet, so the occasional visit from the pitching coach can be very helpful.\n\nTanaka gives her speech in Japanese, unsure whether to look at you or your interpreter or somewhere off in the distance between the two of you. When she stops, Ogawa looks nervous. \"What is it?\" you ask him, covering your mouth with your glove instinctively even though no one in either dugout will be able to read your English-speaking lips.\n\n\"She wants you to throw a 'sutoreto.' Pretty sure it's the English word 'straight' she's saying, but hell if I know what that means in a baseball context.\" You now wish Ogawa had a glove to cover his mouth with.\n\nWhat would it mean to throw a straight? Is that a kind of pitch? You're never [i]trying[/i] to throw straight as a professional pitcher. Even a fastball is supposed to have some movement or it'll be too hittable. If only your interpreter were a baseball fan. You have to find out what your pitching coach wants somehow. What do you do?\n*choice\n\t#I mime the path of the pitch with my arm to try to figure out what she wants me to do.\n\t\t*set anecdotes +1\n\t\t*set serious %-10\n\t\t*check_achievements\n\t\t*if serious \u003c 40\n\t\t\t*if not(choice_achieved_styleicon)\n\t\t\t\t*achieve styleicon\n\t\t*if not(choice_achieved_memoirmaterial)\n\t\t\t*achieve memoirmaterial\n\t\tScrew decorum. You need to know what the pitching coach wants, so you mime the path of the ball with your arm, first delivering a sharp imaginary fastball, then bending and dropping your arm to represent the other pitches. Once you get back around to the \"fastball\" one, Tanaka nods and points. She and Ogawa leave the mound, their message delivered thanks to the ultimate [i]lingua franca[/i]: mime.\n\n\t\tFor better or worse, your over-the-top miming looks funny on video, and plays as a highlight (lowlight?) on sports shows back in the States. Good to remind them you still exist, anyway. And this should make a good anecdote for an interview someday.\n\t\t*goto aloneinjapan\n\t#I nod seriously and pretend I know what she wants.\n\t\t*set pitchingcoach_rel %-10\n\t\t*set serious %+10\n\t\t*check_achievements\n\t\t*if serious > 60\n\t\t\t*if not(choice_achieved_nofun)\n\t\t\t\t*achieve nofun\n\t\t\"Got it, A-okay, no problemo,\" you say while making the A-okay circle sign with your hand, accidentally making the Japanese gesture for \"money.\" Translation issues resolved (or ignored, really), you strike out the next hitter on five pitches. But Tanaka comes to you again between innings and asks why you threw a few off-speed pitches when she asked you not to. Your interpreter crafts an apology for you, and apologizes himself for not knowing that in Japan, \"straight\" means \"fastball,\" apparently. Even though no one ever wants to throw a perfectly straight fastball. Strange.\n\t\t*goto aloneinjapan\n\t#I force my interpreter to ask what a \"straight\" is, even if it embarrasses him.\n\t\t*set betrayedogawa true\n\t\t*set intimidating %+10\n\t\t*check_achievements\n\t\t*if intimidating > 60\n\t\t\t*if not(choice_achieved_looming)\n\t\t\t\t*achieve looming\n\t\t\"We can't afford to get this wrong,\" you say to Ogawa. \"You have to ask her what 'sutoreto' means, now.\"\n\n\t\tOgawa squirms, but there's no getting around that this dilemma is his fault for not studying up on baseball terminology. He asks Tanaka for clarification, and her shocked face betrays how completely simple the term was. \"It means fastball,\" Ogawa says, embarrassed. \"This next hitter can't hit fastballs. Throw him nothing but fastballs.\"\n\n\t\tThe meeting concluded, you strike out the hitter. But back in the dugout, you can sense some tension between you and your interpreter. You embarrassed him in front of the coach, though you have to say, if he doesn't even know the word for fastball, what is he doing being a baseball player's interpreter? Very strange.\n\t\t*goto aloneinjapan\n\t#Who cares what she's asking for? I tell them I'll throw what I want.\n\t\t*set rebellious %+15\n\t\t*set pitchingcoach_rel %-15\n\t\t\"That's great and all, but I throw what I want to throw,\" you say to Ogawa. \"Skedaddle. My mound.\" Enjoying your heel turn, you talk a walk around the mound, signaling for Tanaka and Ogawa to leave. Ignoring their advice, you strike out the next hitter, throwing your usual mix of pitches.\n\n\t\tAfter the inning is over, Ogawa talks to you on the bench. \"One, why do you have to be a jerk? We're all just trying to help.\" he says. \"Two, it turns out 'straight' means 'fastball.' I'm sorry I didn't know such a basic term. I'll study everything I can tonight so this doesn't happen again.\" Tanaka says nothing to you, but you know she's not happy about your blatant disregard for her help. And Ogawa feels only a little better. But you got results, and maybe your attitude is a part of those results. Who knows?\n\t\t*goto aloneinjapan\n*label aloneinjapan\n*page_break Time to Take a Break\n*set totalouts +54\n*set earnedruns +6\n*set strikeouts +13\n*set wins +2\n*set losses +1\nThe first few weeks in Japan are new and exciting, but with no other teammates you can feasibly talk to, it gets lonely fast. Streaming video services are your sole companions before and after games, and it's actually a relief when your manager forces the team to practice on off-days. Without teammates you can be friendly with, the days start to lose shape and blend into one another.\n\nOne night, when you've seen the Netflix logo one too many times, you decide it's time to break out of the sad, lonely routine. Your interpreter told you not to call him for any non-baseball work, but you can't help it. You have to talk to somebody.\n\nYou give him a call and awkwardly find a way to ask him to hang out.\n*if betrayedogawa\n\t\"I already told you,\" Ogawa says, \"I don't do any non-baseball work. Now if you'll excuse me, I have to study this glossary of baseball terminology I found online. Probably should have done this before I started the job, right? Goodnight.\" He hangs up. You don't think he's happy with you after you embarrassed him in front of the coach the other day.\n\n\tRebuffed, you settle in for another night of room service and Netflix. Japan would be completely fine if there were anyone to talk to.\n\t*goto 5thyearjapan2ndgame\n*else\n\tAfter some negotiation and a vague promise of bonus pay, he agrees, and he promises to meet you at your apartment.\n*page_break Heading Out\nDavid Ogawa takes you first to Japan's oldest temple, called Senso-ji, which is lit up attractively in the night as you walk around the various shrines and shops, drifting between the sparse crowds without saying much. Finally you speak up and say, \"You haven't told me yet why your name is David, and how you have such a natural American accent. Are you from the U.S.?\"\n\n\"I guess so,\" Ogawa says. \"My father is from Nagoya, and my mother is from just outside of Seattle. I grew up in Washington, then moved to Tokyo after college because I never really felt like I fit in in the States. I never made any close friends.\"\n\nOgawa puts his hands in his pockets and stands between you and the temple, looking like nothing but a silhouette of red light emanating off the ornate building. \"Unfortunately I don't fit in here either,\" he says. \"Everyone can tell I'm not full Japanese, and I didn't grow up here, so I don't know all the etiquette or whatever. I speak the language, but I don't know how to talk to people.\n\n\"I like to hang out around here because it's a little more down to earth than most parts of Tokyo,\" Ogawa says. \"I know that's hard to believe with the fancy temple right here, but let's walk down the street. I'll take you to an izakaya. It's a tavern kind of place, and it's very casual.\"\n\nCasual is right. You and Ogawa sit on beer crates the izakaya set up just outside their building as chairs, with small plastic tables scattered around. The izakaya itself looks like it's made of a few layers of sheet metal tacked onto a tiny boxy building, but you're staying outside on the street, with a great view of the temple. The place is busy, filled with what seem to be blue-collar locals. What's your plan for the night?\n*choice\n\t#I'll drink silently and do some people-watching.\n\t\t*set serious %+10\n\t\t*check_achievements\n\t\t*if serious > 60\n\t\t\t*if not(choice_achieved_nofun)\n\t\t\t\t*achieve nofun\n\t\tYou sit quietly outside and watch everyone drink and eat as strange but delicious-looking dishes are carried past you one by one. You and Ogawa don't say much, but you enjoy having company for the first time in a while. It's good to sit here and know that even if you can't talk to most people, this country doesn't have to be a lonely place.\n\t\t*goto 5thyearjapan2ndgame\n\t#I'll strike up a conversation with a random izakaya patron.\n\t\t*set analytical %-10\n\t\t\"Hey, can you translate for me?\" you ask Ogawa. \"I'm going to close my eyes and turn around, and whoever I'm looking at when I open my eyes, I'm going to go over and talk to them.\"\n\n\t\tOgawa turns red immediately. \"I don't know if that's a good idea,\" he says. \"I wouldn't want to bother anybody.\"\n\n\t\t\"Come on, maybe they'll be a baseball fan,\" you say, and then you find your target: A young man wearing glasses sitting on a beer crate next to you, sitting with a few friends. You force Ogawa to come along with you and facilitate your conversation.\n\n\t\tTalking through an interpreter is an awkward and cumbersome process, but you do come away with the knowledge that the young man is A, not a baseball fan; B, here with work friends; and C, the owner of a blog that reviews okonomiyaki, which is apparently a kind of Japanese pancake. You come away satisfied with your second-hand social skills, and happy to have talked to someone for the first time in weeks. It's a successful night, even if Ogawa isn't completely happy that you made him talk to a stranger for you.\n\t\t*goto 5thyearjapan2ndgame\n\t#It's been a while since I got [i]really[/i] drunk. I should get [i]really[/i] drunk.\n\t\t*set intimidating %-10\n\t\t*check_achievements\n\t\t*if intimidating \u003c 40\n\t\t\t*if not(choice_achieved_islandtime)\n\t\t\t\t*achieve islandtime\n\t\tYou announce to Ogawa your plan to get [i]really[/i] drunk, and he approves, and tells you that it's possible to place an \"all-you-can-drink\" order for a few hours. You do just that, and sample various beers and sake drinks until you relax and forget what loneliness ever felt like.\n\n\t\tUnfortunately you forgot that the Cranes had a day game the next day, so you're noticeably sluggish in pregame practice, but it's not your turn to pitch, so there are no obvious consequences to your actions. Hooray for no consequences!\n\t\t*goto 5thyearjapan2ndgame\n\t*selectable_if (wealth >= 50) #I'll flash my big salary and buy a beer for everyone in the izakaya.\n\t\t*set serious %-15\n\t\t*set anecdotes +1\n\t\t*check_achievements\n\t\t*if serious \u003c 40\n\t\t\t*if not(choice_achieved_styleicon)\n\t\t\t\t*achieve styleicon\n\t\t*if not(choice_achieved_memoirmaterial)\n\t\t\t*achieve memoirmaterial\n\t\t\"I'm buying a beer for everyone in here,\" you say, happy to finally spend a night outside of your lonely apartment.\n\n\t\t\"I don't think that's how the billing works here…\" Ogawa says, then sees that you look disappointed. Ogawa thinks for a second. \"I'll talk to the guy at the counter, maybe I can make that work.\" He goes into the izakaya, out of sight, for a few minutes. When he comes back he says \"I figured it out. They're giving everyone an extra beer and they'll bill us for it. Or you, I mean, they'll bill you. I can't afford that, obviously.\"\n\n\t\tA few minutes later, the owner of the izakaya makes an announcement and starts handing out beers. A scrunched-up old man at the table next to yours turns to you and says \"Thank you very much,\" in slow, careful English, then lifts up his beer to salute you. It's a great memory, and a huge improvement over another night spent inside scrolling through Netflix.\n\t\t*goto 5thyearjapan2ndgame\n*label 5thyearjapan2ndgame\n*page_break The Season Continues\n*gosub_scene 2ndYear resetgame\n*set totalouts 351\n*if userruns >= 5\n\t*set earnedruns 55\n\t*goto endruncheckjapan\n*else\n\t*set earnedruns 45\n\t*goto endruncheckjapan\n*label endruncheckjapan\n*if userstrikeouts >= 2\n\t*set strikeouts 100\n\t*goto endstrikeoutcheckjapan\n*else\n\t*set strikeouts 89\n\t*goto endstrikeoutcheckjapan\n*label endstrikeoutcheckjapan\n*set wins 11\n*set losses 5\n*set outs 0\nLate in the season, Nabeshima comes to you before a start with a stern directive: Do what you have to do to make sure that Warren Valentine does not get a hit. If he gets even a single hit in your next start, Nabeshima says you will never pitch for him again. Giving no further detail, the manager leaves. You ask your translator for a little clarification on why this Valentine guy is being specifically targeted, but all Ogawa can do is shrug.\n\nYou drag Ogawa along to ask the pitching coach about this strange threat. All you have to do is mention the name Valentine before she shakes her head sadly. \"Valentine is ten hits away from breaking the single season record in our league,\" she says. \"Nabeshima has likely told you not to throw anything he can hit. Valentine is American, and some older players and coaches think it would be a blow to our 'national pride' if a foreigner broke such an important record in our league. It's happened many times, I'm afraid, that a foreign player was close to breaking the hits record or home runs record, only to be walked over and over in the last few weeks of the season to prevent him from doing so.\"\n\n\"So what should I do?\" you have Ogawa ask her.\n\n\"Pitch to Valentine like you would anyone else. Strike him out, preferably. Don't give in to the shameful pride of Nabeshima and others like him. Better to be benched for doing the right thing than to be praised for doing the wrong thing.\"\n*page_break Valentine Comes to the Plate\nThe game begins, and today Valentine is batting leadoff. You were hoping to at least get through a few batters before you had to make a potentially career-ending moral decision.\n\nYou don't want to disappoint your manager and who knows how many fellow players or even fans by letting Valentine get a hit. And Valentine is such a great hitter that even throwing nothing but waste pitches might not be enough. He's gotten good at reaching out and poking the ball the other way for a hit because pitchers are so hesitant to throw strikes to him. You could just hit him with a pitch. That would certainly work, but Valentine might not take it well.\n\nBut Tanaka is right, it would be shameful to not let Valentine break the record if he can. And as a competitor, it wouldn't feel right to give up when you could probably get him out anyway by throwing your normal pitches.\n\nValentine strides to the plate, taps his shoes with his bat, then gets into his crouch, twirling his bat in a small circle in the air, ready for your pitch. What do you throw?\n*gosub_scene 2ndYear situationtext\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 3\n*set batterpower 2\n*set batterhand \"left\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 5thyearjapan2ndgameatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 5thyearjapan2ndgameatbatloop\n\n*label 5thyearjapan2ndgameatbatloop\n*if atbatresult = \"single\"\n\tValentine hits a sharp ground ball that sneaks up the middle and into the outfield for a hit. He's now only eight hits away from tying the single season hits record and nine from breaking it. Your manager must be furious, but his face shows nothing. He knows the cameras are on him at all times. This may be your last game in a Cranes uniform.\n\t*goto pitchingcoachpleased\n*elseif atbatresult = \"double\"\n\tValentine hits a long line drive over the right fielder's head, racing around to second for a double. He's now only eight hits away from tying the single season hits record and nine from breaking it. Your manager must be furious, but his face shows nothing. He knows the cameras are on him at all times. This may be your last game in a Cranes uniform.\n\t*goto pitchingcoachpleased\n*elseif atbatresult = \"triple\"\n\tValentine hits a sharp ground ball that sneaks up the middle and into the outfield for a hit. He's now only eight hits away from tying the single season hits record and nine from breaking it. Your manager must be furious, but his face shows nothing. He knows the cameras are on him at all times. This may be your last game in a Cranes uniform.\n\t*goto pitchingcoachpleased\n*elseif atbatresult = \"home run\"\n\t*set earnedruns +1\n\t*set userruns +1\n\tValentine smacks the ball into the air, and the right fielder doesn't even turn to chase it. It's a long home run. He's now only eight hits away from tying the single season hits record and nine from breaking it. Your manager must be furious, but his face shows nothing. He knows the cameras are on him at all times. This may be your last game in a Cranes uniform.\n\t*goto pitchingcoachpleased\n*elseif ((atbatresult = \"groundout\") or (atbatresult = \"lineout\")) or (atbatresult = \"flyout\")\n\t*set totalouts +1\n\t*set outs +1\n\tValentine manages to hit the ball, which your manager won't be happy about, but he just taps it barely in front of home plate, allowing the catcher to scoop it up and fire toward first for the out. No hit for Valentine, but he had a chance.\n\n\tYou face Valentine one more time in the game, getting him to line out to the second baseman, and immediately after that your manager pulls you from the game. It's only the fourth inning, but he's decided not to give you another chance to give up a hit to Valentine. It's almost the end of the season, and you walk off the field knowing you'll never play on it again. And that's okay.\n\t*goto pitchingcoachpleased\n*elseif atbatresult = \"walk\"\n\t*set earnedruns +3\n\t*set userruns +3\n\t*set losses +1\n\tValentine stands in the batter's box for a moment after ball four, showing his frustration at being pitched around by yet another opponent. But he has no choice but to flip his bat toward his dugout and jog toward first. You glance toward Nabeshima and see that he's betraying no emotion at all, but you know he's glad you did what he wanted.\n\n\t*if pitchingaround > 2\n\t\tYou do the exact same thing to Valentine twice more during the game, pitching around him, as close to an intentional walk as you can come without explicitly signaling one. Valentine doesn't get a hit, so your job is complete, even though Valentine came around to score all three times. It's a loss in your official stats, but to your manager, it's a big win.\n\t\t*goto managerpleased\n\t*else\n\t\tYou weren't really trying to walk Valentine, but your control failed you anyway. Now you're caught in an awkward spot: Your manager thinks you did what he told you, and your pitching coach is disappointed in you, despite your best efforts to do the honorable thing. No reason to irritate everyone, so you decide to more intentionally walk Valentine every time you face him for the rest of the game. It's not what you meant to do, but you can't go back on it now.\n\t\t*goto managerpleased\n\t*goto managerpleased\n*elseif atbatresult = \"strikeout\"\n\t*set outs +1\n\t*set totalouts +1\n\t*set strikeouts +1\n\t*set userstrikeouts +1\n\tValentine strikes out, then gives you an almost imperceptible bow. He knows you didn't have to give him a chance to hit, but you did. It's a touching moment between competitors, but you know that your manager must be furious. He doesn't show it on his face, because he knows the cameras are always watching him, but you know now that this will be your last ever appearance for the Tsuru Tokyo Cranes.\n\n\tYou get one more shot at Valentine in the fourth inning, and he grounds out to first. You managed to prevent him from getting a hit, but your manager immediately comes out to pull you from the game early anyway. He grabs your arm and examines it for a moment, making a show for the cameras of pretending you're injured, and then removes you from the game. You've never been prouder to be removed from a game before.\n\t*goto pitchingcoachpleased\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyearjapan2ndgameatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyearjapan2ndgameatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyearjapan2ndgameatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyearjapan2ndgameatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*set pitchingaround +1\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyearjapan2ndgameatbatloop\n\t#Hit Valentine with a pitch.\n\t\t*set intimidating %+10\n\t\t*check_achievements\n\t\t*if intimidating > 60\n\t\t\t*if not(choice_achieved_looming)\n\t\t\t\t*achieve looming\n\t\tThis is too important to leave up to chance. You chuck a slow fastball aimed right at Valentine's hip bone, and though he wildly contorts to try and avoid it, the pitch hits him. The umpire signals for Valentine to take his base, but he's not interested in that. He flips his bat on the ground in your direction, then, deciding that wasn't a violent enough gesture to get his frustration out, he sprints toward you, screaming and cursing and attempting (and failing) to throw his helmet at you.\n\n\t\tBy the time the fight is over, roughly fifty baseball players are pressed up against each other on the field like they're trying to press their way onto the Tokyo subway, and somehow Valentine's helmet has ended up back in the batter's box, directly behind where he threw it from. It turns out that it's very difficult to throw a helmet. The brim is just too short to get a good handle on it.\n\n\t\tValentine is ejected from the game for his outburst, and both benches are warned that any other hit batsman will result in an immediate ejection. But you still get to pitch, emerging from the fight completely unscathed thanks to your catcher. He sprang up and got in front of Valentine before he could do anything, and then every player from both teams had time to start a light shoving match on the field. Couldn't have gone better, as far as your manager is concerned.\n\t\t*goto managerpleased\n*label managerpleased\n*set manager_rel %+20\n*set pitchingcoach_rel %-20\n\nIn the dugout, Tanaka shakes her head without looking at you. Your manager, conscious of his duty to look serious and attentive on television, continues to stare out onto the field. You know that he'll be happy you defended the hits record. You're here to do what the boss wants, and that's all there is to it.\n*goto endjapanseason\n*label pitchingcoachpleased\n*set manager_rel %-20\n*set pitchingcoach_rel %+20\nIn the dugout, Nabeshima continues to stare out onto the field, knowing the cameras will be watching his every move, but he's clearly fuming. By even giving the hitter a chance, you've disobeyed a direct order and you won't pitch again for him this season. But you and Tanaka both know that you did the right thing, and the honorable thing. That's what matters in anything, not just stupid baseball.\n*label endjapanseason\n*page_break The Season Comes to an End\nThe Tsuru Tokyo Cranes finish the season just a few games out of the playoffs, a success by their standards. It's a building block season for them, but you won't be returning next year. You've gotten what you needed out of this league, and you've pitched well enough to prove you can come back to the majors, so it's time to go back home.\n\n*if pitchingcoach_rel >= 55\n\t*set knuckleball 60\n\t*achieve knucksie\n\tAs you're cleaning out your locker at the end of the season, Ogawa calls you into the pitching coach's office. She motions for you to sit on the mat across the table from her, and after some awkward leg-folding (you haven't sat \"criss-cross applesauce\" since first grade), you look almost respectable.\n\n\tFor the first time, she speaks to you in English, taking her time to carefully pronounce the words. \"Thank you for playing with our team,\" she says, then nods inquisitively as if to make sure she's saying the right thing. After you give a tiny nod, she continues. \"I will miss you. As a going-away gift, today in my final coaching session I will teach you the knuckleball.\"\n\n\tYou're a pitcher, so of course you've fooled around with throwing a knuckleball before. All you do is grip the ball tightly with your fingertips or fingernails (a long time ago, pitchers used to use their knuckles instead, hence the name) then throw it with a tiny amount of spin, which makes the ball tumble and move unpredictably in the air on the way to the plate. But your knucklers have never moved enough or been fast enough to use in a real game, so you're skeptical that Tanaka will be able to teach you to throw a good one in an afternoon.\n\n\tTo your surprise, every tip she gives you vastly and immediately improves your knuckleball. She's studied the pitch her whole life, and is incredibly skilled at identifying what you need to change with each throw. By the end of the afternoon, you're throwing a major league-quality knuckleball, and that's an exciting thing. Hitters don't know where a knuckleball is going to end up, so they can never anticipate one like they do a slider or a fastball. You can throw knucklers over and over within an at-bat and they'll never get less effective.\n\n\tYou don't know for certain that you'll use it in the major leagues, but it's a great arrow to have in the quiver. You thank Tanaka for her help and say your last goodbye. You look around for Ogawa as well, but he's nowhere to be found on your last day in the clubhouse. Maybe he already quit this job to find a new one. Strange.\n\t*goto wheretonextyearjapan\n*elseif ((pitchingcoach_rel \u003c= 60) and (manager_rel >= 55))\n\tAs you're cleaning out your locker at the end of the season, Nabeshima comes over to you and tries to show his appreciation for your work. Unfortunately, Ogawa has disappeared. Maybe he already quit to find a new job. As a result, you're left with your manager, an uneducated man with no real English-speaking ability, gesticulating in front of you at your locker. Eventually he thinks to clasp your hand between both of his, shaking it.\n\t*goto wheretonextyearjapan\n*else\n\tYou clean out your locker as the season comes to a close. Ogawa is gone, oddly. Maybe he already quit to find a new job that wouldn't require so much knowledge of baseball terminology. Your manager, Nabeshima, and your pitching coach, Tanaka, are both busy with other things, without saying goodbye or thanking you for your work this season. Your year getting to know Japan is over, and it's a mutual break-up.\n\t*goto wheretonextyearjapan\n*label wheretonextyearjapan\n*page_break Time to Sign a New Contract\n*if (agent = \"Virdon\")\n\tWilson Virdon's plan to get your endorsement career started never panned out. You expected to be welcomed as a hero into the Japanese league, but to them you were just another foreign player until it was too late. It makes you wonder a little bit if your agent knew what he was talking about, but he got one thing right: Now you're a free agent.\n\nNow you can come back to the U.S. and sign with whomever you want for more money than you would have gotten by staying with the Bulls. You have offers on the table from three different teams for varying amounts of money.\n\nYour former team, the San Antonio Bulls, are offering the lowest amount, hoping that you'll come back at a hometown discount. But your old friends Mendis, Rosario, and even Kingston are all gone, having signed elsewhere or been traded away as the Bulls go through \"a rebuilding stage,\" meaning they aren't very good right now.\n\nThe New York Barons have offered more than the Bulls, even though they don't really need more pitchers right now, because they can always afford to bring on a few more good players. The Barons are a venerable, highly respected team, and whether they'll say it or not, every baseball player wants to play for them someday. But their sports media is famously vicious, pushing and prying into players' psyches and personal lives in a desperate competition for stories. You'll have to be eloquent and even-keeled to deal with the New York media.\n\nBut surprisingly, the biggest offer you've gotten comes from the Florida Capers, who were always a good team when you faced them, but never a playoff team. They seem to be spending all they can to make a run at a championship before their star player, Giulio Camporese, leaves as a free agent in a couple of years. It's not a team with a history of winning, but they seem to be going all-out for it now. Maybe it would be exciting to play for a team on the rise.\n*fake_choice\n\t#Come back home to the San Antonio Bulls.\n\t\t*set wealth 55\n\t\t*set nextteam \"Bulls\"\n\t\tYou sign a contract with the San Antonio Bulls. You always knew you were good enough to come back to the major leagues, but it's still a relief to make it official. After going through something as alienating and strange as pitching in Japan, it'll feel good to live where you're never more than ten minutes away from good barbecue if you want it. You may not know any players there now, but you can't wait to come back home.\n\t#Hit the big time with the New York Barons.\n\t\t*set wealth 60\n\t\t*set nextteam \"Barons\"\n\t\tYou sign a contract with the New York Barons. You always knew you were good enough to come back to the major leagues, but it's still a relief to make it official. You thought you had hit the heights of your career back in San Antonio, but you can't deny that New York will make those old days feel like the minor leagues. Now the world is watching you, and that's thrilling, and terrifying, and it will feel good to pitch meaningful innings again.\n\t#Make lots of money playing for the Florida Capers.\n\t\t*set wealth 65\n\t\t*set nextteam \"Capers\"\n\t\tYou sign a contract with the Florida Capers. You always knew you were good enough to come back to the major leagues, but it's still a relief to make it official. You're finally going to get paid what you're worth playing for Florida, and you could end up with a championship ring or two as well before it's over. And something feels kind of good about being part of this hastily assembled, big-money team. Every player will feel like a mercenary, brought in from somewhere else to do some important dirty work and getting paid handsomely for their efforts. If they don't get along, maybe it'll be a disaster, but for now, it sounds fun.\n*finish\n\n*label startamerica\nIt's a good thing you play for a team that puts names on jerseys. Otherwise you'd have no idea who any of these people are at spring training. Over the winter, the Bulls went into a rebuild, replacing the whole coaching staff and trading away every veteran player for minor league prospects. Somehow, after playing only three full seasons in the big leagues, you're now the team's most experienced player.\n\nAndres del Rosario signed with the New York Barons, where he'll be calling games for their talented pitching staff. Ama Mendis was traded to the Florida Capers, the only team who thought she could still be a starter and were willing to give it a try. Sandy Kingston resigned to take a year or two off, away from the stress of running a clubhouse.\n\nA sea of unfamiliar pitchers and catchers stand out on the field in Surprise, Arizona, and it's time for you to dive in. You walk over to a black woman wearing catcher's gear and a surprisingly short pitcher with light skin and even lighter hair.\n*page_break Time to Introduce Myself\n\"Hi, I'm—\" you begin to say, holding out a hand before you're cut off.\n\n\"Okay, thank you, this is great,\" the woman says. \"We need an independent voice here. I have a fantastic idea but this joker doesn't think it'll work.\"\n\n\"It won't work. You're going to laugh when you hear it,\" the man says, in an Australian accent.\n\n\"Shut it,\" the woman says, pointing at the Australian. \"Okay, so back in Double-A when they wanted to give me a rest from catching, I'd play left field, right? It's easy. Kind of. But I always feel helpless on a sacrifice fly hit deep to the outfield where I've got to go back on it. One where I have no chance to throw the runner out at home. But here's my idea.\"\n\nThe Australian cringes and looks away. The woman gives him a light shove. \"Quit making faces!\" she says. \"You're going to change ${hisher} mind before I get to say my thing! Okay, so the runner can't leave third base until you catch the ball, right? So what if, instead of catching the ball, you hit it up in the air with your glove? Keep your glove closed and just keep punching the ball in the air, keeping it up without catching it like a soccer player doing keepie uppie. Have you ever played keepie uppie? Anyway. So you bounce the ball as you run in towards the infield, getting close enough to where you could throw the runner out easily. Or he leaves before you catch it, so you just tag third base and he's out. Ta-da! Right? Why wouldn't that work?\"\n\nWhat do you say?\n*fake_choice\n\t#\"I don't think that's how the catch rule works.\"\n\t\tYou whip a copy of the official rules out of your back pocket, sending both the man and the woman into hysterics. You look around for a second like you don't know what the joke was then flip to page 40, clearing your throat. \"Rule 5.09(a), Catch Comment: 'A catch is legal if the ball is finally held by any fielder, even though juggled, or held by another fielder before it touches the ground.' Here's the vital part: 'Runners may leave their bases the instant the first fielder touches the ball.' So they could be running home while you're doing all this juggling, even if it makes an out.\"\n\n\t\t\"Good God,\" the woman says, laughing. \"What are you?\"\n\t#\"Wouldn't you break your hand trying to punch a hard fly ball up in the air?\"\n\t\t\"If you worry about the little things, you'll never wear the big rings,\" she replies matter-of-factly as if this were a common aphorism. She pretends to admire the championship rings on her finger. \"To whom do I have the pleasure of speaking?\" she asks, feigning nobility.\n\t#\"You know what? I think it's brilliant.\"\n\t\t*set supportportia true\n\t\tYou express support for the woman's idea. \"I have no idea who's playing outfield for us this year or I would tell them myself,\" you add.\n\n\t\t\"I have no clue either, but I'm new,\" the woman says. \"I'm afraid I didn't catch your name, by the way.\"\n\t#\"Is it even possible to keep the ball up like that more than about twice? You try it.\"\n\t\tYou express doubt that a player could pull this off in the first place and decide to challenge the woman. \"Do you have an outfielder's glove on you? No? Well try it with the catcher's mitt. Not even on a fly ball, I'll just throw it to you. You try and bounce the ball on your glove while walking forward in a straight line.\"\n\n\t\t\"Bring it on,\" the woman says, and puts on her mitt. You toss the ball on a high arc towards her, and she punches it up in the air with the back of her mitt. She does this again and again, all while walking forward, and even throwing in a 360 spin between punches. It's an impressive display of hand-eye coordination.\n\n\t\t\"Okay, so clearly you've already practiced this,\" you say.\n\n\t\t\"Nuh-uh. First try. And I'm gonna make this work in a game, you just wait,\" she says. \"I'll tell you at the end of the season how wrong you were, you, uh, what's your name again?\"\n\t#\"I think you could get away with that once before they change the rule, sure.\"\n\t\t*set supportportia true\n\t\tYou express tepid support for the woman's idea but she takes it as a full endorsement.\n\n\t\t\"See?\" the woman says, looking at the man. \"It's about time somebody showed some support for a creative and brilliant thinker like myself. I'm so tired of all the critics. If it weren't for the encouragement I get from people like…hold on, what's your name?\"\n\nYou introduce yourself, and the woman tells you her name is Portia Roberts. You've played against the man before, an Australian sidearmer named Connor Harris. Roberts is competing to be the team's starting catcher, and Connor is likely to be in the starting rotation alongside you.\n*if homecountry = \"Australia\"\n\tConnor's thrilled to have a fellow Australian on the team, though he's not sure whether that will stop teammates from telling Australia jokes or make them tell those jokes twice as much. \"You won't believe the number of people who've told me the same joke,\" he says. \"Yes, I'm from down under and I throw down under. It's sort of a funny coincidence. Got it.\"\n\t*goto donecheckingaussie\n*else\n\tHe's a submarine-throwing righty (\"Yes, I'm from Australia and I throw from down under,\" he says before anyone can tell him that joke again,) and wears glasses on the mound, which is a little unusual in the age of contact lenses and laser eye surgery.\n\t*goto donecheckingaussie\n*label donecheckingaussie\n\nThey're the first two players you meet on this almost entirely new team, and the two you'll be hanging out with for the whole year. It's a relief to have clung onto someone new to talk to so quickly, even if they call you \"elder statesman\" and things like that, when you're only three years older than them. It's a strange dynamic in spring training to be seen as the de facto leader, being asked where to eat, and being asked to pay for each group dinner when, by baseball player standards, you're not really rich yet. It's very strange to be the best player on a bad baseball team.\n*label 5thyear1stgame\n*page_break Time to Play Baseball\n*gosub_scene 2ndYear resetgame\n*set totalouts 19\n*set earnedruns 0\n*set runnerfirst true\n*set runnersecond true\n*set runnerthird true\n*set outs 1\nThe bases are loaded with one out in the seventh inning on Opening Day. As your team's most experienced player and best starting pitcher, you got the opening day start, and it's gone well until now. But the Bulls haven't hit, so giving up any runs here would likely mean a tough-luck loss. You'd like to get the hitter to ground into a double play, but a strikeout would do just fine as well. What are you going to throw?\n\n*gosub_scene 2ndYear situationtext\n*line_break\n*gosub_scene 2ndYear resetatbat\n*set batterability 5\n*set batterpower 4\n*set batterhand \"left\"\n*if throwingarm = batterhand\n\t*set batterability -(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 5thyear1stgameatbatloop\n*else\n\t*set batterability +(platoonsplit / 10)\n\t*set batterpower -(platoonsplit / 10)\n\t*goto 5thyear1stgameatbatloop\n\n*label 5thyear1stgameatbatloop\n*if atbatresult = \"single\"\n\t*set earnedruns +2\n\t*set userruns +2\n\t*set losses +1\n\tThe ball is dumped into left field for a single, scoring two runs. The Bulls could theoretically still win, but probably not with so many rookies in the lineup. Eventually, some of them will learn how to hit major league pitching, and the rest will go back down to Triple-A. For now, we have to give them a shot to figure out which are good and which aren't, and lose a bunch of games along the way. Regardless, that's the end of your day, and probably another loss, though not a terrible start.\n\t*goto endof5thyear1stgame\n*elseif atbatresult = \"double\"\n\t*set earnedruns +3\n\t*set userruns +3\n\t*set losses +1\n\tThe ball is hit hard over the right fielder's head, and that clears the bases for a three-run double. Not a great way to end your day. You hand the ball over to the manager and it's time to awkwardly sulk in the dugout while the TV cameras cut to you every now and then.\n\t*goto endof5thyear1stgame\n*elseif atbatresult = \"triple\"\n\t*set earnedruns +3\n\t*set userruns +3\n\t*set losses +1\n\tThe batter hits the ball hard into the right field corner, and it isn't long before three runs have scored and the batter is standing on third. Not ideal. The manager takes you out of the game, and you've got to stew on that one in the dugout for the next hour or two.\n\t*goto endof5thyear1stgame\n*elseif atbatresult = \"home run\"\n\t*set earnedruns +4\n\t*set userruns +4\n\t*set losses +1\n\tOops. That particular sound of bat hitting ball makes your stomach flip. It's a grand slam. Four runs. You don't even wait for the manager before you start walking to the dugout, replaced by a reliever. It was all going so well.\n\t*goto endof5thyear1stgame\n*elseif ((atbatresult = \"groundout\") or (atbatresult = \"lineout\")) or (atbatresult = \"flyout\")\n\t*set totalouts +2\n\t*set wins +1\n\tIt's a ground ball hit hard but not too hard, right at the second baseman. She flips to the shortstop, who flings it to first for the double play, escaping the inning. You pump your fist, and the crowd applauds. You know, somewhere deep down, that with worse luck that would have been a two-run ground ball single, or your shortstop could have thrown it into the stands and ruined everything, but you can't let that bother you. That double play ground ball was all you. All skill. What a feeling.\n\t*goto endof5thyear1stgame\n*elseif atbatresult = \"walk\"\n\t*set earnedruns +1\n\t*set userruns +1\n\tBall four, the umpire says quietly, as if he doesn't want to embarrass you. That bases-loaded walk scores a run, and that's the last pitch you'll throw today. When people watch on TV, they think it's so easy to just throw a strike when you have to, any strike, but if they stood on the mound and tried it even once, they'd know that's not the case. Sometimes when you're bowling, you get a gutterball. It happens.\n\t*goto endof5thyear1stgame\n*elseif atbatresult = \"strikeout\"\n\t*set outs +1\n\t*set totalouts +1\n\t*set strikeouts +1\n\t*set userstrikeouts +1\n\t*set wins +1\n\tThe umpire dramatically pumps his arms, signaling for strikeout, and you're excited right up until you see your manager coming out to replace you. You look up at the board behind you and see that you've thrown 108 pitches already, which is a little high, you suppose. Still, you can't help but seethe a little that you're not allowed to escape this jam by yourself. You haven't worked with this manager for long, so maybe next time you will have earned his trust a little more.\n\t*goto endof5thyear1stgame\n*gosub_scene 2ndYear getpitchodds\n*rand dieroll 1 100\n*rand dieroll2 1 100\n*choice\n\t#Fastball.\n\t\t*set pitchthrown \"fastball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyear1stgameatbatloop\n\t*selectable_if (curveball > 0) #Curveball.\n\t\t*set pitchthrown \"curveball\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyear1stgameatbatloop\n\t*selectable_if (slider > 0) #Slider.\n\t\t*set pitchthrown \"slider\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyear1stgameatbatloop\n\t*selectable_if (changeup > 0) #Changeup.\n\t\t*set pitchthrown \"changeup\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyear1stgameatbatloop\n\t#Waste Pitch.\n\t\t*set pitchthrown \"waste\"\n\t\t*gosub_scene 2ndYear pitchresults\n\t\t*goto 5thyear1stgameatbatloop\n\n*label endof5thyear1stgame\n*page_break The Season Continues\n*set totalouts +255\n*if userruns >= 4\n\t*set earnedruns +40\n\t*goto endruncheckbulls5\n*else\n\t*set earnedruns +31\n\t*goto endruncheckbulls5\n*label endruncheckbulls5\n*if userstrikeouts >= 3\n\t*set strikeouts +88\n\t*goto endstrikeoutcheckbulls5\n*else\n\t*set strikeouts +65\n\t*goto endstrikeoutcheckbulls5\n*label endstrikeoutcheckbulls5\n*set wins +7\n*set losses +3\nThe greatest test of your leadership abilities comes in the top of the 15th inning of a pointless game between the Bulls and another team that's had no luck this season: The Vancouver Foresters. The clock strikes midnight, with the score still tied 3-3, and a ridiculous game gets stranger when Connor Harris, one of your fellow starting pitchers, is going to pinch hit.\n\nYou've never hit in the big leagues because of the designated hitter rule, but Connor has been in the manager's ear all year asking for a chance to hit. He played shortstop and pitcher back in high school, and he claims he used to be a fantastic hitter. That was in Australia though, so who knows how he'll do? The few times he's gotten to take batting practice, he's been able to hit it hard, but who knows what he'd do with live pitching?\n\nWell, now everybody knows: he can really hit. On the third pitch of his first major league at-bat, Connor hits a towering fly ball into the center field bleachers, scoring the go-ahead run. But now, as the de facto clubhouse leader, you have to make a choice fast. Teams often prank a rookie who's hit his first home run, giving him the \"silent treatment\" or even disappearing into the clubhouse completely, instead of celebrating with him. But maybe that's not how you think it should be done. Or do you have a completely new idea that you can communicate to your teammates in the forty seconds before Connor is back in the dugout?\n*choice\n\t#Relax and let them celebrate normally. They don't need me leading them.\n\t\t*if intimidating \u003c= 50\n\t\t\t*set clubhouse_rep %+15\n\t\t\tThough you've barely ever talked to them, all the players in the dugout know your vibe. They know that you won't tell them to do anything in particular, so they go to the dugout step to high-five Connor as he comes back into the dugout. You're not so much a leader as an encouraging background figure, a calming presence, and lots of people appreciate that.\n\n\t\t\tYou stay seated on the dugout bench, and Connor comes up to you for one last high five. You smile and hold up your hand, only to take it away with the childish \"too slow\" trick, the lightest possible prank. There's something unexpected and hilarious about playing the celebration completely straight until this last possible moment, and it gets Connor laughing. Somehow, this tiny gesture in an unexpected moment brightens the season, and it's not so bad being a Bull.\n\t\t\t*goto 5thyear2ndgame\n\t\t*else\n\t\t\t*set clubhouse_rep %-15\n\t\t\tThough you've barely ever talked to them, all the players in the dugout know what you're like. And so they look to you, waiting for you to tell them how to react to this, the most unlikely of rookie home runs. You're an intimidating pitcher, so they don't want to break rank and spoil whatever you're going to tell them to do.\n\n\t\t\tBut all you do is sit there and stare back at them. This breakdown in communication results in a weird hodge-podge of celebrations and non-celebrations. Some players in the dugout give Connor the silent treatment, pretending to pick at their gloves or get water without looking at him. Others are at the dugout step, high-fiving and yelling \"attaboys.\" It's a tepid half-response that makes everyone feel a little odd. It looks like the Bulls need another leader, one that is actually interested in leading.\n\t\t\t*goto 5thyear2ndgame\n\t#Give Connor the classic \"silent treatment,\" where the whole team ignores him.\n\t\tYou quickly tell the players to give Connor the silent treatment, and they listen, staying frozen in place as if nothing interesting had happened as Connor comes back into the dugout.\n\n\t\tIt's the oldest, most clichéd gimmick in baseball to ignore a rookie after his first home run, but you can immediately tell by looking at his face that Connor is either an amazing actor or he actually has never seen the silent treatment before. He looks stunned, taking his helmet off and putting it back on its shelf, walking to the bench and sitting down next to you. \"Did you see my home run?\" he asks, full of innocence.\n\n\t\tYou don't know how long to keep this up. He looks hurt. \"Yeah, we all saw it,\" you say, breaking the act. \"It's the silent treatment. Have you never seen that before?\" Everyone in the dugout collapses in on Connor and starts slapping him on the head and back, finally celebrating.\n\t\t*if clubhouse_rep >= 51\n\t\t\t*set connor_rel %+15\n\t\t\tSlowly, Connor comes around. He knows you're a good person, and it wasn't a malicious prank. You never expected to meet such a sensitive baseball professional, but now that you're the leader you have to account for things like that. In the end, it makes your relationship with Connor stronger, now that you know more about one another.\n\t\t\t*goto 5thyear2ndgame\n\t\t*else\n\t\t\t*set connor_rel %-15\n\t\t\tBut he still looks shocked. You don't have the best reputation in the clubhouse, so he thinks it's some cruel new ritual you've come up with and forced on him. No matter how much you try to explain, you can tell that this completely common prank hurt his feelings. You'd never have expected to meet such a sensitive baseball professional, but it's happened, and now you'll have to make it up to him somehow.\n\t\t\t*goto 5thyear2ndgame\n\t#Have the whole team give Connor a sunflower seed bath.\n\t\tYou share your plan with the rest of the team and everyone grabs a bag of sunflower seeds, ready to pour them over Connor as soon as he gets in the dugout.\n\n\t\t*if serious \u003c= 49\n\t\t\t*set clubhouse_rep %+15\n\t\t\tYou pre-emptively pour two bags of sunflower seeds into your hat for a better initial dump. The slow-motion footage of sunflower seeds pouring over Connor's head make for a great highlight on TV, and no one can say you didn't lead your clubhouse, even if it's a silly thing like this. It's interesting to see your personality slowly imparted on the clubhouse, and that's how leadership is supposed to work.\n\t\t\t*goto 5thyear2ndgame\n\t\t*else\n\t\t\t*set clubhouse_rep %-15\n\t\t\tYou want to go all-in but you can't help it, you're a little too self-conscious. Look at how much litter you're leaving on the ground! It doesn't feel right to make some janitor clean that up when they already have so much horrible trash to clean off the dugout floors. And you're a little afraid of getting a seed in Connor's eyes or something.\n\n\t\t\tThe team notices you're reluctant and not joining in on the fun. It shouldn't be a big deal, but you honestly look a little lame by not participating in this team activity that you've encouraged. You were a little too serious to have fun like this, so you're setting a weird example for the clubhouse.\n\t\t\t*goto 5thyear2ndgame\n\t#Command the team to celebrate lightly so as not to embarrass the opposing pitcher.\n\t\tYou believe in playing with honor and keeping your emotions constrained, and a lot of baseball players feel the same. The sport requires a lot of discipline, and a celebration today could lead to one of your players getting beaned by a pitch in retaliation tomorrow. The smart thing here is to not celebrate too wildly, especially when it could embarrass the opposing pitcher who just gave up an extremely unlikely home run.\n\n\t\t*if intimidating >= 55\n\t\t\t*set serious %+15\n\t\t\t*check_achievements\n\t\t\t*if serious > 60\n\t\t\t\t*if not(choice_achieved_nofun)\n\t\t\t\t\t*achieve nofun\n\t\t\tYou explain this philosophy to the other players in the dugout, and you have such a commanding presence  the clubhouse comes around and only gives Connor a few high fives. He doesn't see it as anything unusual, and everyone gets to enjoy the moment internally just the same.\n\t\t\t*goto 5thyear2ndgame\n\t\t*else\n\t\t\t*set clubhouse_rep %-15\n\t\t\tWhen you tell the team not to celebrate too hard, they don't take it well. You're not an intimidating enough presence to get them to listen to a direct command, and it's just not in these young players' nature to act normal when something amazing like this happens. They hoot and holler and high five one another, and for the time being, you haven't been able to lead the team. You'll have to work on ways to better communicate to the young players next time.\n\t\t\t*goto 5thyear2ndgame\n\n*label 5thyear2ndgame\n*page_break A Few Months Later\n*gosub_scene 2ndYear resetgame\n*set totalouts +195\n*set earnedruns +28\n*set strikeouts +63\n*set wins +4\n*set losses +6\nIt's late in the season. The wind has gotten tired of lifting baseballs out of the stadium and has started blowing them down into outfielders' gloves instead. Baseball, entrusted all summer with keeping kids busy, has now been forced to pass that responsibility to the American school system, so weekday games are sparsely attended. Worst of all, the market for mini helmet ice cream has crashed.\n\nPennant races are supposed to make up for these little disappointments of September baseball, but the Bulls don't get to enjoy that this year. But while a less motivated teammate of yours might slow down and enjoy his major league paycheck, you've still got work to do. You still have to prove what you can do. And for that, every game counts.\n\nYou cruise through the first three innings, but lose your control in the fourth inning and walk Alex Canham, a fast runner. As they take a lead off of first, you think you have a shot to pick them off. What will you do?\n*choice\n\t#I'll keep this simple and throw to first base as fast as I can to get the out.\n\t\t*if velocity >= 55\n\t\t\t*set intimidating %+10\n\t\t\t*check_achievements\n\t\t\t*if intimidating > 60\n\t\t\t\t*if not(choice_achieved_looming)\n\t\t\t\t\t*achieve looming\n\t\t\tNo need to overcomplicate things when you can throw as hard as you do. Canham takes two or three steps off of first and that's all the room you need. You spin and fire to first and the tag is made just in time. They're out. Nothing intimidates the opponent like a pitcher who can pick runners off, and you've shown that ability today.\n\t\t\t*goto afewinningslateryear5\n\t\t*else\n\t\t\tNo need to overcomplicate things, you tell yourself. Canham takes two or three steps off of the bag. You spin and fire to first and the tag is made, but Canham is safe. They slid in with time to spare. Maybe you don't throw quite as hard as you thought. You wipe the surprised look off your face and decide to focus back on your pitching.\n\t\t\t*goto afewinningslateryear5\n\t#I'll aim my pick-off throw to land perfectly on the bag and get them out.\n\t\t*if control >= 55\n\t\t\t*set intimidating %+10\n\t\t\t*check_achievements\n\t\t\t*if intimidating > 60\n\t\t\t\t*if not(choice_achieved_looming)\n\t\t\t\t\t*achieve looming\n\t\t\tIt's risky to throw right at the bag because your throw might bounce and get away from the first baseman, letting the runner advance. But you know you won't miss. When Canham takes a few steps off of first base, you turn and throw. You throw a homing missile right at the first base bag and the first baseman catches it and applies the tag without having to move. Canham is out. That should intimidate the next runner who thinks they can steal while you're on the mound.\n\t\t\t*goto afewinningslateryear5\n\t\t*else\n\t\t\tYou notice Canham taking a few steps off the bag and decide to turn and throw, aiming right for the base. The problem is, when you aim low to get the easiest tag, if you happen to throw a little too low, that's a problem. Your throw bounces just in front of the base and gets by the first baseman, and Canham takes second easily. But you're pitching so well today, that shouldn't matter. They can't hit what you're throwing anyway.\n\t\t\t*goto afewinningslateryear5\n\t#I'll use my intuitive grasp of timing to pick them off.\n\t\t*if analytical \u003c= 50\n\t\t\t*set intimidating %+10\n\t\t\t*check_achievements\n\t\t\t*if intimidating > 60\n\t\t\t\t*if not(choice_achieved_looming)\n\t\t\t\t\t*achieve looming\n\t\t\tYou've been playing baseball so long, you don't have to think about the timing to throw over. It just comes to you. You come to a set position, let Canham take their lead off of first, and then, just when their weight is shifted the wrong way, you throw. Canham barely manages to slide back toward first, and is tagged out easily. It looks like magic to someone who doesn't know how it works, but the timing is the same for virtually every runner. It's an intimidating thing for a runner to know you're in their head that way. Maybe next time they won't think about trying to steal on you.\n\t\t\t*goto afewinningslateryear5\n\t\t*else\n\t\t\tYou notice Canham creeping off of first base, and you try to think of the right time to throw. You need to either go as quickly as possible after they take their lead, so their momentum is going the wrong way, or throw just when they think you're about to pitch. You think hard about how to get the right timing, standing at the set position. Then the batter calls time. You waited too long, and the batter called time to reset because you were obviously stalling. Or, in your case, thinking a little too hard about a pickoff. Your catcher comes to the mound during the timeout and tells you to focus on the hitter, because now the runner will expect a throw to first. It's all very complicated. Well, at least that means Canham won't be trying to steal second.\n\t\t\t*goto afewinningslateryear5\n\t#I'll focus on my pitching and let the runner do what they want.\n\t\t*if intimidating >= 50\n\t\t\t*set batterabilitybonus 2\n\t\t\tYou decide to ignore Canham and focus on your pitching, but that's easier said than done. In your peripheral vision you notice Canham take one step too many off of first, and you can't help but step off the mound to make them go back. You succeed in stopping Canham from stealing second, but your focus is all over the place. Maybe you can get back in the zone for the next inning.\n\t\t\t*goto afewinningslateryear5\n\t\t*else\n\t\t\t*set batterabilitybonus -2\n\t\t\tYou decide to ignore Canham and focus on your pitching. On your second pitch to the next batter, Canham steals second easily. Doesn't matter. These batters can't hit the ball out of the infield against you. You throw nothing but perfect strike
