e to do if you're going to move on,\" she rattles off. \"Just like Loa Shift said, you have to start taking this more seriously and—\"\n\n\"I will do my best for you, JK!\" you snap, throwing an absurd purple onesie back down onto the pile. \"I just need a break for a second, okay?\" \n\n*page_break\n\nThe moment the words leave your lips you regret them, especially as JK freezes in place, clutching her empty cup of SlugGlug. You sigh and shake your head, giving JK just enough time to spin her chair away from you.\n\n\"You know I'd do this for myself if I could,\" JK says, her voice suddenly sounding small. \"And you know it means everything to me, you doing it for me.\"\n\n\"I know,\" you say, feeling terrible. \"JK, I'm sorry, I didn't meant to—\"\n\n\"I'm just trying to focus on the things we can control,\" JK says, turning back to face you with mounting anger. Now here's the JK you're used to—though you know this also means you're about to be in for a mouthful. \"I don't want to believe what Loa Shift said about StarSoar either, but so far all of her calls have been right on the money. Still, we can figure that out later; that's not the point right now.\"\n\n\"JK, really, I know, I just—\"\n\n\"Let me finish,\" JK says, holding up one jellyfinger. \"As thankful as I am for what you're doing, you really need to find a reason to do this whole Hero Project thing for yourself, too. If you'd bothered to pay any attention, you'd know that in The Hero Project Finals you'll start fighting missions against actual public threats. That's a chance for you to do some real good. Not to mention you could become a Disembodied and Ani-Powered hero in the public eye, the kind of representative and role model both communities desperately need.\n\n\"This can be about so much more than my treatments, if you let it be,\" JK sighs, finally seeming to wind down. \"I don't know whether to believe if Loa Shift is more kingpin or high priestess, but I know this much: she has put you in The Hero Project for her own reasons. And I have you there for my reasons. But what are your reasons?\"\n\n*page_break\n\nAs JK's words sink in, you begin to realize that she's right, of course. After JK's Powered change, your whole life became about taking care of her. You never really got to think much about what you wanted to do, but now that you’ve been given this rare opportunity, shouldn't you be taking advantage of it? Sure, you might have been set up in the beginning, but that doesn't mean you didn't earn your spot in the Final Selection against all the odds.\n\nYou did that on your own.\n\nYou allow yourself to consider the potential upsides: The chance to make new, Powerful friends like StarSoar. Having a focused purpose and career that might make you some real money. The opportunity to become famous and gain a platform for Underrepresented Powereds. Maybe this is your chance to speak out and try to change some things—or, at the very least, to make a better life and have access to better medical care for you and JK.\n\nFor someone who has no choice but to work a dead-end minimum-wage job, you'd be crazy not to let this opportunity change your life somehow. Sure, you want to cure JK, but could you decide to get something else from this experience at the same time? \n\n*choice\n\t#I need to use this platform while I have it, to raise awareness about Underrepresented Powered issues.\n\t\t*set societal %+20\n\n\t\tWhile your and JK's personal well-being is obviously of great importance, you really feel that your societal duty is just as important—and that ultimately the two are inextricably linked.\n\t\t*if (societal > 56)\n\t\t\t*set legended +3\n\t\t\t*set respected %+10\n\t\t\t*set rlshp_jk %+15\n\t\t\t*set traditional %+10\n\t\t\t*goto scrutiny\n\t\t*else\n\t\t\t*set legended +1\n\t\t\t*set respected %+5\n\t\t\t*set rlshp_jk %+5\n\t\t\t*set traditional %+5\n\t\t\tYou haven't always thought this way before now, but you realize that you might need to start doing so more and more.\n\t\t\t*goto scrutiny\n\t#I think this reality 3V slugger is beneath me, but if I'm forced to play the game, I'm going to make sure to invent my own rules to start changing minds about the Underrepresented.\n\t\t*set societal %+20\n\n\t\tAs much as reality 3V feels cheap or fake, it's still an incredible platform—one you plan to use to create radical change.\n\t\t*if (societal > 56)\n\t\t\t*set legended +3\n\t\t\t*set rlshp_jk %+15\n\t\t\t*set respected %-10\n\t\t\t*set traditional %-10\n\t\t\t*goto scrutiny\n\t\t*else\n\t\t\t*set legended +1\n\t\t\t*set rlshp_jk %+5\n\t\t\t*set respected %-5\n\t\t\t*set traditional %-5\n\t\t\tYou haven't always thought this way before now, but you realize that you might need to start doing so more and more.\n\t\t\t*goto scrutiny\n\t#I'm going to do my absolute best in The Hero Project so that I can build a better life for JK and me in every way.\n\t\t*set societal %-20\n\n\t\tMore than anything, this is your shot at money, influence, and stability. You believe in Underrepresented Powered issues, but JK's well-being is your responsibility and must always come first.\n\t\t*if (societal \u003c 44)\n\t\t\t*set legended +3\n\t\t\t*set rlshp_jk %+10\n\t\t\t*set respected %+10\n\t\t\t*set traditional %+10\n\t\t\t*goto scrutiny\n\t\t*else\n\t\t\t*set legended +1\n\t\t\t*set rlshp_jk %+5\n\t\t\t*set respected %+5\n\t\t\t*set traditional %+5\n\t\t\tYou realize now that you need to start prioritizing your and JK's life over any potential societal responsibilities.\n\t\t\t*goto scrutiny\n\t#What still matters most is getting JK's next two treatments. And I'm willing to tear down anything and anyone standing in the way of that.\n\t\t*set societal %-20\n\n\t\tJK's well-being is your responsibility and must always come first. There's nothing you won't do to save her or to make the world a better place for her. If that requires some destruction and mayhem, then so be it.\n\t\t*if (societal \u003c 44)\n\t\t\t*set legended +3\n\t\t\t*set rlshp_jk %-5\n\t\t\t*set respected %-10\n\t\t\t*set traditional %-10\n\t\t\t*goto scrutiny\n\t\t*else\n\t\t\t*set legended +1\n\t\t\t*set rlshp_jk %-15\n\t\t\t*set respected %-5\n\t\t\t*set traditional %-5\n\t\t\tYou realize now that you need to start prioritizing JK's well-being over any potential societal responsibilities.\n\t\t\t*goto scrutiny\n\n*label scrutiny\n*if (traditional > 50) and (societal > 50)\n\t*achieve traditionalsocietalthree\n\t*set emergingadvocate true\n\t*goto threehpcheck \n*elseif (traditional > 50) and (societal \u003c 50)\n\t*achieve traditionalspersonalthree\n\t*set emergingstriver true\n\t*goto threehpcheck \n*elseif (traditional \u003c 50) and (societal > 50)\n\t*achieve radicalsocietalthree\n\t*set emergingrevolutionary true\n\t*goto threehpcheck \n*else\n\t*achieve radicalpersonalthree\n\t*set emerginganarchist true\n\t*goto threehpcheck\n\n*label threehpcheck\n\nWhatever your motivations, you suppose the question you really need to ask right now is: Are you ready for the public scrutiny you're about to face by starring on a reality 3V show? Now that the Semi-Finals have taped, the debut episodes of the second season of The Hero Project will be hitting the airwaves over the next two months—episodes you are sure to be featured in, one way or another.\n\n\"I was going to save this for when you had to film the next episode,\" JK says, interrupting your thoughts as she digs into one of her wheelchair pouches. \"I didn't have a chance to wrap it, but I think you could use it today.\"\n\nJK holds up a thin blue chain, and the first thing you notice is that its color matches the bluish tint of her translucent skin perfectly. The second thing you notice is that attached to the chain hangs a pale blue locket…\n\n*page_break\n\nOne that opens to reveal a picture of you and JK nestled inside. You immediately recognize the picture, which was taken not too long ago on a day when you woke up as a squid-hybrid. It was the closest Morpho-transformation to JK's jellyfish form you'd ever had, and it gave you a whole new understanding of her condition. Instead of wallowing in the squishiness and fishiness of it all, you took off work to spend the day at the beach with JK.\n\nYou both agree this was perhaps your favorite day ever, and this is without a doubt your favorite picture you've ever taken with JK, looking like true siblings at the beach. Seeing it right now nearly makes you cry.\n\n\"I got it to remind you when you're away that you're not in this alone,\" JK says, trying to hold her emotions in check. \"You know, a reminder that I'm always fighting beside you, in my own way.\"\n\nIgnoring MeChip Prodigal as she appears blubbering with a box of tissues, you take the locket from JK and put it around your neck. Then you lean down to hug JK, because she is right: you'll always keep this locket on, to remember all of the things you're fighting for.\n\n*page_break\n\n\"All right, enough of the mushy stuff,\" JK says, pulling out of your hug and rolling away. \"Once we've got your costume sorted, JK's Official Hero Project Boot Camp begins! And don't worry, I'll use all of my Disspace connections to see if we can confirm this stuff about StarSoar, too. Luckily he won't be back from his 'mission,' whatever that is, until the next taping, so that gives us plenty of time.\"\n\nJK shudders at this thought for a moment, clearly not wanting to dwell on it. \"Now let's find you a costume and choose you a good codename.\"\n\n\"Oh, we don't need to talk about my codename,\" you say. \"Because I've already decided on…\"\n\n*choice\n\t#The Daily.\n\t\t*set codenamed \"The Daily\"\n\t\t*goto braidwrk\n\t#AniBody.\n\t\t*set codenamed \"AniBody\"\n\t\t*goto braidwrk\n\t#The Docker Bomber.\n\t\t*set codenamed \"The Docker Bomber\"\n\t\t*goto braidwrk\n\t#Docker Bae.\n\t\t*set codenamed \"Docker Bae\"\n\t\t*goto braidwrk\n\t#Jel.\n\t\t*set codenamed \"Jel\"\n\t\t*goto braidwrk\n\t#AniMorpho.\n\t\t*set codenamed \"AniMorpho\"\n\t\t*goto braidwrk\n\t#The UnderRep.\n\t\t*set codenamed \"The UnderRep\"\n\t\t*goto braidwrk\n\t#Dismorphani.\n\t\t*set codenamed \"Dismorphani\"\n\t\t*goto braidwrk\n\t#Amorphous.\n\t\t*set codenamed \"Amorphous\"\n\t\t*goto braidwrk\n\t#Choose my own codename.\n\t\tYour codename name will be:\n\t\t*input_text codenamed\n\t\t*goto braidwrk\n\n*label braidwrk\n\n\"${codenamed},\" JK repeats, tilting her head to the side in consideration before singing, \"I don't think they can handle it.\"\n\n\"Because my body's too Ani-licious for you baby!\" you sing back, throwing some of the more hideous costume choices at JK.\n\n\"Oh, that lyric is so going on the poster,\" JK shouts, tossing her jellybraids from side to side. As JK whips her hair back and forth, you pause to think:\n\n[i]${codenamed}[/i].\n\nIt may be a small step, but it's also a big sign that you're finally taking this Hero Project experience seriously—and perhaps even embracing all of the possibilities that lie ahead.\n\n*finish NEXT CHAPTER: STAR-POWERED\n", "rs_two": "*comment é x\n\n*image chap2.png center Chapter Two: Ready for this Jelly\n\n*set power 100\n*set health 100\n\nYour eyes flutter open and you're flooded with a rush of anxiety. Why are you here? Why do you want to do this? Who do you want to be? All eyes are on you, waiting for your answer, counting on you to….\n\nThis anxiety subsides, however, as your brain blurs from sleep into reality. Unfortunately, it is only replaced with a different wave of anxiety as you feel the feathers covering your skin and the squishy comb hanging across your forehead.\n\nYou roll over to face the standing mirror beside your bed, the one you use every morning to see what new form you've woken up in. The first thing you see is the beak, which surprises you. Usually you can feel those coming in, so you must have been sleeping particularly soundly this morning—which makes sense, given your Semi-Finals experience yesterday.\n\nYou take in the rest of yourself to find that your human body is covered with feathers and you've acquired the head of a chicken. You lift your arms to push your covers down further and realize that you've also grown chicken wings. Slugging great, that will make things difficult today.\n\nYou stare into the mirror, completely unable to recognize yourself.\n\n*choice\n\t#Is it any wonder I have identity issues, waking up as a different Ani-hybrid every day? \n\t\t*set image %+15\n\n\t\tYou feel like a stranger in your own body.\n\t\t*goto birdstreak\n\t#I appreciate the changes. Good or bad, these transformations make me unique, and I don't care what anyone else thinks.\n\t\t*set image %-15\n\n\t\tYou find your Ani-transformations exciting, since no two days are ever quite the same. Still, you're not sure you'll ever get used to feeling like a stranger in your own body.\n\t\t*goto birdstreak\n\t#I'm proud of who I am and my Powers, but that doesn't make my life easy.\n\t\t*set image %-15\n\n\t\tYour Ani-transformations make you who you are, and you're not ashamed of them, but you're not sure you'll ever get used to feeling like a stranger in your own body.\n\t\t*goto birdstreak\n\t#Some days I love it; other days I hate it. Mostly, I really just wish I were normal.\n\t\t*set image %+15\n\n\t\tYou feel like a stranger in your own body—a stranger that doesn't even feel human most of the time.\n\t\t*goto birdstreak\n\n*label birdstreak\nLately you seem to have been on a bird streak, which tends to happen every so often with varying animal types.\n\nWhile you looked intimidating and mostly human yesterday, today you look especially ridiculous. Your chicken feathers are speckled black and white and you sport a halo of long feathers around your face, which is mostly covered with chunky red comb formations.\n\n\"Chicken, you're a chicken!\"\n\nYou nearly jump out of your speckled skin, because you're still adjusting to your new MeChip assistant as well. After realizing what you were missing yesterday, you decided to spend what little money you had saved to upgrade your MeChip. You couldn't afford one of the custom MeChip personalities, so you had to go with one of the generic free options, which is based on some crazed villain-turned-martyr named… \n\n*set moneyed -500\n*if newreader\n\tProdigal.\n\t*page_break\n\t*goto fancymott\n*else\n\t*page_break\n\tProdigal.\n\t*goto fancymott\n\n*label fancymott\n\n\"And a fancy Mottled Houdan chicken, to boot!\" MeChip Prodigal coos, clapping her hands as she bounces in miniaturized holographic form before you.\n\nYou didn't really follow her story, but apparently this Prodigal person died in a tragic display earlier this year. She had some kind of tech-based Powers, so she was somehow able to upload her personality to the MeChip servers posthumously. So far, you've found MeChip Prodigal to be rather…eccentric, though you suppose everything about this MeChip experience is going to take some getting used to.\n\n\"Trust me, the last thing I feel at the moment is fancy,\" you cluck-speak, feeling even more absurd.\n\n\"Nonsense! Chickens are the finest creatures ever to strut their stuff across this green earth!\" MeChip Prodigal shouts, flapping her own faux chicken wings. This appears particularly out-of-character, since MeChip Prodigal wears a black bodysuit with a red stripe running up the middle, continuing to cover her face as a kind of partial mask. She looks more like a killer assassin than a great lover of chickens, honestly.\n\n\"Now, I've got a full rundown on all the mottled mightiness and Houdan hijinks you could possibly stomach,\" MeChip Prodigal continues, presenting you with several holo-report options. \"However, you need to upgrade to have access to that compilation.\"\n\n\"MeChip Prodigal, you can see my bank account,\" you sigh, standing to find that your feet are webbed into scratchy chicken prongs. \"You know I can't afford any new upgrades, even the basic ones.\"\n\n*page_break\n\n\"Welcome to the twenty-second century, where tablet functionality determines class status,\" MeChip Prodigal monologues, holding her hands behind her back. \"Lucky for you, I made the grand gesture of sharing my sparkling personality with the world, positively free of charge!\"\n\nDespite MeChip Prodigal's generosity, you think of all the upgrades you could buy for your MeChip if you had the money. You have your MeChip to thank for your Powers in the first place—when humans integrated with tablet technology decades ago, these tablets began to cover many basic functions like memory and navigation. Once fully adjusted to this technological enhancement, the human body was able to evolve and unlock new potential in the form of superhuman Powers.\n\n*if trilogyreader\n\tMost of these Powereds now flock to your home, Millennia City, to become famous heroes—but you haven't had much time to think about being a hero.\n*if newreader\n\tAs a result, one out of every three people today are born with Powered abilities and most of them seem to want to become famous heroes in Millennia City, the Powered capital of the world. Nestled between Los Angeles and San Francisco, MC is also the city you've called home your entire life.\n\t\n\tHowever, you haven't had much time to think about being a hero. \nSlugger, you didn't even wear any special costume for your appearance on The Hero Project, just jeans and a black t-shirt that highlighted your hawk features. You didn't choose a codename either, instead going with your real name:\n\n*choice\n\t#Blake.\n\t\t*set named \"Blake\"\n\t\t*goto anyhoo\n\t#Taylor.\n\t\t*set named \"Taylor\"\n\t\t*goto anyhoo\n\t#Alex.\n\t\t*set named \"Alex\"\n\t\t*goto anyhoo\n\t#Sam.\n\t\t*set named \"Sam\"\n\t\t*goto anyhoo\n\t#Jesse.\n\t\t*set named \"Jesse\"\n\t\t*goto anyhoo\n\t#Jamie.\n\t\t*set named \"Jamie\"\n\t\t*goto anyhoo\n\t#Drew.\n\t\t*set named \"Drew\"\n\t\t*goto anyhoo\n\t#Leslie.\n\t\t*set named \"Leslie\"\n\t\t*goto anyhoo\n\t#Choose my own name.\n\t\tYour first name is:\n\t\t*input_text named\n\t\t*goto anyhoo\n\n*label anyhoo\n*set meetjk true\n\n\"Anyhoo, that's all folks,\" MeChip Prodigal says. \"Till next time, chicken-${named}!\"\n\nAs MeChip Prodigal fades from sight, you try to retract your bedroom screen with your chicken wing, nearly knocking it over in the process. Once you finally manage to exit, you find your little sister in her usual spot in the loft, settled in front of the 3V and sipping an extra large SlugGlug.\n\n\"How many hours have you been awake and watching 3V already?\" you ask, trying and failing to open your beak wide enough for a yawn. \n\n\"Hey Judgy McJudgerson, you do know it's noon, right?\" JK says, looking over at you. \"Did you have a good roost?\"\n\n\"How long have you been plotting chicken puns?\" you sigh.\n\n\"Ever since you started clucking in your sleep around 7am. Once I checked that you weren't dying, I got to work. So, how do you feel about eggs for breakfast?\"\n\n*page_break\n\n\"Very funny,\" you cluck, waddling into the space you and JK have designated as the living room. \"Sounds like you were up early. Have trouble sleeping?\"\n\n\"I had another episode,\" JK sighs. \"This one was better than the last, but still—not fun.\"\n\nYou look over JK's body and don't notice any visible changes, but then again, you were told there wouldn't be any. She's still the same Jelly Kelly, with her jellified, translucent skin and amber-clear tendrils. \n\n\"Could you pinpoint this one?\" you ask. \"Was it in your main body or jellyfish stem?\"\n\n\"I know I'm supposed to be able to tell, but I still can't,\" JK answers. \"Is there any discoloration? I couldn't find any in the mirrors.\"\n\n*page_break\n\nYou waddle closer to JK, spinning her wheelchair sideways. You begin your inspection at the top of JK's conical head, where her pinkish jelly-tendril hair is gathered into two braids. No neon spotting there. Your eyes then travel down JK's clear jellyfish-shaped head, through the bundled nerve-net coils that connect to her main body through her neck. No discoloration there, either—just the normal amber-clear translucence.\n\nFinally you look over the bluish jellified skin on JK's human body, or at least the parts not covered by her sweatpants and hoodie. You'd ask her to take them off, but you know how difficult that is—JK still has the use of her arms, but she lost the use of her legs when her spine partially jellified. Ani-Powered hybridizations are supposed to enhance the individual seamlessly, but you know better than anyone that sometimes the transformations can be less than ideal. This has been JK's reality ever since her Ani-Powers manifested on her thirteenth birthday.\n\n\"I don't see any problem areas, but that could just mean you haven't been getting enough calcium,\" you say, looking over the four cups of SlugGlug strewn across the floor.\n\n*choice\n\t#\"I know you think it helps with the pain, but no more energy soda today,\" you say, ever the stern older sibling.\n\t\t*set rlshp_jk %-5\n\t\t*set traditional %+5\n\n\t\t*label jksorry\n\t\t\"I'm sorry, but studies show that SlugGlug is beneficial for any growing jellygirl,\" JK answers.\n\n\t\t*goto jkresponse\n\t#\"Why didn't you save one for me?\" you say. \"You know the best part of waking up is SlugGlug in my cup!\"\n\t\t*set rlshp_jk %+5\n\t\t*set traditional %-5\n\t\t*goto jksorry\n\t#\"Did you drink all my SlugGlug, too?\" you whine, always the annoyed older sibling. \"How could you even stomach that much?\"\n\t\t*set rlshp_jk %-5\n\t\t*set traditional %-5\n\n\t\t*label jkstudies\n\t\t\"It's not exactly like I have to worry about keeping my trim figure,\" JK laughs, rolling her jellybelly. \"Besides, you know that one study says the patented SlugGlug sugar-caffeine-taurine combination helps soothe my chronic nerve-net pain.\"\n\t\t*goto jkresponse\n\t#\"Nothing is going to save you if you keep drinking that sugary garbage,\" you say, ever the overprotective older sibling.\n\t\t*set rlshp_jk %+5\n\t\t*set traditional %+5\n\t\t*goto jkstudies\n\n*label jkresponse\n\n\"That study was done by the only other living jellyfish Ani-Powered, who also happens to be your best friend,\" you reply. \n\n\"The power of the worldwide MeWeb, bringing jellyladies together one forum at a time,\" JK proclaims. \"But I can't have a best friend that lives all the way in China, that'd be a very depressing assessment of my social life. You know that you're my real best friend.\"\n\nJK clasps her hands and bats her luminescent eyelashes at you, but you know her far too well to fall for this display.\n\n\"Aw, thanks JK,\" you start, turning back towards your room. \"But no amount of flattery will get you out of going to your treatment today. Turn off the boob tube and start getting ready.\"\n\n*page_break\n\n\"Come on, how else am I going to get through the first season of The Hero Project before Ms. Rosado realizes that I hacked her MeFlix account?\" JK whines. \"I just got to the episode where Scoundrel the turkey-girl gets eliminated. Hey, do you find her superhot all of a sudden?\"\n\n\"Still not funny,\" you answer, glancing over the wall you use to separate the living room from the kitchen. It's made entirely of fish tanks filled with every kind of sea creature you and JK can responsibly get your hands on. The fish are mostly for JK—you're not a huge fan of having pets around, given how they tend to respond to your various Ani-states.\n\n\"Did you feed the fish?\" you ask.\n\n\"Every last one,\" JK calls. \"And you'll be thrilled to know I took an extra-long salt bath this morning. See, look at me, handling all of my responsibilities. Now, when are you going to handle yours and watch some of The Hero Project? You know, now that you're actually on the show.\"\n\n\"We both know I'm only there for you,\" you say. \"I'm not sure I'll even stay once your treatment is over.\"\n\n\"Well, that makes sense, since these opportunities just fall out of the sky for people like us all the time,\" JK snarks.\n\n*page_break \n\nJK has a point there—you both have a difficult time finding jobs. JK can't really leave the apartment for long stretches of time, but she was lucky enough to find a steady gig as a copy editor, taking advantage of her biggest Ani-Powered talent: multiple jellyfish eyes. \n\nYou, on the other hand, never know what Animalistic skill set you'll have each day—nor do you know how you'll look. This combination makes it nearly impossible to find regular employment, but you've managed to scrape by working as a security guard at the Millennial Mews, a gated community for rich and famous Powereds. You got the job thanks to your martial-arts expertise, but they still stick you on lookout duty alone most of the time. You were hoping to maybe someday get promoted to the Powered Security Team to get off minimum wage, but your promotion seems to have been delayed indefinitely. \n\nJust another day in the life of an Ani-Powered in America…\n\n*page_break\n\nAnd another reason to start seriously considering what this potential Hero Project experience might mean to you. You weren't lying when you said you did it just for JK, but that doesn't mean it has to be the only reason you stay in the competition…right?\n\n\"Whatever, it doesn't matter if you watch, because I'm becoming an expert on your behalf,\" JK continues. \"The first season is actually pretty epic. There's this whole—\"\n\n\"You can tell me all about it on the way to the Shiftsite Clinic!\" you shout, heading back towards your room to get dressed, though you have no idea what you're going to wear that doesn't clash with these speckled feathers. You figure your best bet will be to just throw on your favorite t-shirt,\n\n*choice\n\t#Which reads, \"Equality For All.\"\n\t\t*goto nogobro\n\t#Which reads, \"Please don't feed the animals.\"\n\t\t*goto nogobro\n\t#Which depicts the logo of your favorite video game, [i]Creatures of Crests & Quests[/i].\n\t\t*goto nogobro\n\t#Which has the verses to your favorite song.\n\t\tThe lyrics are:\n\t\t*input_text favlyric\n\t\t*goto nogobro\n\t#Which has your personal symbol…\n\t\tA triple-edged symbol representing the triple elements of your identity, in the shape of:\n\t\t*input_text triquetra\n\t\t*goto nogobro\n\n*label nogobro\n\n\"I don't think we should go, ${named},\" JK calls after you. \"We would have been called in for the next treatment if it was ready. Besides, the deal was that you make it to the Final 14. I've been doing some research on the MeBlogs and I don't think you've actually made it yet. There's all this chatter about some twist that will—\"\n\n\"JK,\" you say, sticking your head out past your screen to face her. \"I know you hate leaving the apartment almost as much as you hate those treatments, but—\"\n\n\"Hey, you try rolling this mess through the streets,\" JK fires back, pointing at herself. \"I basically have a dong for a forehead.\"\n\n\"And I have the face of a constantly surprised chicken,\" you cluck-speak, pointing at your own mug. \"That should divert enough attention for today.\"\n\nJK smiles, but you can tell that she's still afraid, which rattles you more than you'd like to admit. You're used to the fearless JK—she has refused to let this disruptive Ani-manifestation be anything other than positive for her. \n\nIn fact, the first thing Kelly did after the change was rename herself Jelly Kelly, or JK for short. The second thing she did was buy an ancient paper poster of her favorite vintage girl-group, Destiny's Child. The chorus of their song \"Bootylicious\" immediately became JK's personal anthem: \"I don't think you're ready for this jelly.\" \n\n*page_break\n\nDespite JK's indomitable attitude, you both know that she faces more than daily pain and physical struggle: JK's Powered condition has cut her life expectancy devastatingly short. Local Herologists discovered that JK's body can't maintain itself in this degenerative form for more than a few years, and they've been useless in finding a way to treat her—not that you could afford any expensive experimental treatments or access to top specialists who might actually be able to help.\n\nWhich is precisely why you've entered The Hero Project, as part of your unconventional plan to get underground treatments for JK. You are both thankful for this glimmer of hope that might just save her life, but it doesn't make the treatments any less painful—or less frightening.\n\nSo you waddle up to JK, synchronizing your wings and mentally commanding MeChip Prodigal to start playing Bootylicious from your MeChip.\n\n\"All the chicken-heads, be quiet,\" MeChip Prodigal shouts, appearing to jump up and down with DJ headphones pressed against her ears. \"All the chicken-heads, make noise!\"\n\n\"Kelly, can you handle this?\" you sing as the song starts, bobbing your chicken-head back and forth with surprising swagger.\n\nJK sighs for a moment, but then she can't help but smile. \"I don't think they can handle this,\" JK sings back, raising her jellyfingers in the air to join your little dance party.\n\n*page_break ONE DANCEOFF LATER\n\nYou wait outside your building, feeling the ocean breeze funnel through the concrete wind tunnel and rustle your feathers. You pull your coat across your chest, not because you're cold, but because you're molting—and mortified. You should know better: Süper cars never actually arrive when they say they will. \n\nStill, they're your only option, since cabs never come to this mostly industrial area. Dockerbay may feel like a ghost town and reek of fish from the abandoned market, but it's the only place where you could afford a view of the ocean. JK absolutely loves it, even though the water is as grimy as the activity that happens on the actual docks. \n\nThankfully, a budding and tight-knit community of artists and young families has begun to form as more warehouse spaces have been converted to loft apartments. You and JK have grown to love Dockerbay, with its cobblestone streets and salty air and graffiti-laden brick walls. Though there has been a major downside recently—one of the re-formed Ani-gangs has been trying to take up residency in Dockerbay ever since the Eastern Fringes began to\n*if trilogyreader\n\t*if (power_town) or (kill_town)\n\t\tgentrify, after the redevelopment from Prodigal's Death Wave.\n\t\t*goto epxlainwhy\n\t*else\n\t\tgentrify.\n\t\t*goto epxlainwhy\n*else\n\tgentrify. \n\t*goto epxlainwhy\n\n*label epxlainwhy\n\nWhich actually might explain why, when the Süper driver finally pulls up, he immediately locks his doors and cracks his window.\n\n*page_break\n\n\"My wheelchair access is broken,\" the driver shouts through the cracked window. \"You should have specified a wheelchair passenger in your request.\"\n\n\"I did,\" you cluck, trying to keep your voice even.\n\n\"That's right, you most certainly did,\" MeChip Prodigal says, appearing with a holo-record of your Süper request. \"I bet he just thinks you're a member of The Fouls, that Ani-gang sullying the name of fine fowls everywhere.\"\n\n\"Yes, MeChip Prodigal, I know,\" you say out loud, realizing that you must seem insane, since these days most users master the art of mental communication with their MeChip assistants. \n\nBefore you can get another word in, the Süper driver peels off, leaving you and JK stranded on the curb. You wish you could say this is an unusual occurrence, but you're painfully accustomed to this kind of treatment as an Ani-Powered.\n\n*page_break\n\nWhat you can't stand is anyone using JK's condition as an excuse. As if this Ani-discrimination wasn't bad enough, you both have to deal with the stigma of being \"Disembodied Powereds.\" This is a relatively new term for the small percentage of Powereds whose abilities don't manifest seamlessly, leading them to develop a potentially dissociative relationship with their own bodies.\n*if trilogyreader\n\tWhile the nation has largely responded to the Infini Crisis, because Infini Powereds possess the means to become famous and successful, Disembodied Powereds are mostly hidden underneath the surface of society and given no voice, swept under the rug or written off as \"defects.\"\n\t*goto thusforce\n*else\n\tDisembodied Powereds are mostly hidden underneath the surface of society with no voice, swept under the rug or written off as \"defects.\"\n\t*goto thusforce\n\n*label thusforce\n\nAs a result, Disembodied Powereds like you and JK have been forced to cope with your issues on your own. JK does so by running the premier Disembodied online community, The Disspace. It's a safe place for Disembodied Powereds to connect, share their stories, and raise awareness. It also happens to be where JK publishes her somewhat-popular space-travel fan-fiction. JK has been obsessed with space since she was little, but ever since her Powered change, she copes with her situation more and more by escaping into galactic fantasies.\n\nFor you, martial arts has helped you feel like you have some level of control over your Disembodied Ani-transformations. Your primary martial-arts focus remains in the practice of Chinese Kung Fu, specifically the Southern Shaolin Boxing style. This style further divides into the Five Animal specialties, which you selected because of your obvious talent for animal mimicry. Plus, the internal and external practices apply nicely to your shifting Intangible and Physical Power sets. \n\nYou've diversified your study as much as possible, but have also trained hard to become an expert in one unique specialty: \n\n*choice\n\t#The Crane, an internal specialty that focuses on keeping an opponent at a distance using limb length and well-balanced circular evasion movements.\n\t\t*set kungfucrane true\n\t\t*set kungfuspecialty \"Crane-Style Shaolin Boxing\"\n\t\t*set physical %-15\n\n\t\tThis Intangible\n\t\t*goto secondmma\n\t#The Tiger, an external specialty that focuses on charging and attacking an opponent directly with brute force.\n\t\t*set kungfutiger true\n\t\t*set kungfuspecialty \"Tiger-Style Shaolin Boxing\"\n\t\t*set physical %+15\n\n\t\tThis Physical\n\t\t*goto secondmma\n\t#The Leopard, an external specialty that focuses on quick strikes to inflict pain on the soft-tissue vital areas of opponents.\n\t\t*set kungfuleopard true\n\t\t*set kungfuspecialty \"Leopard-Style Shaolin Boxing\"\n\t\t*set physical %+15\n\n\t\tThis Physical\n\t\t*goto secondmma\n\t#The Snake, an internal specialty that focuses on enhancing awareness and balance in order to enact delicate coiling motions and locking techniques.\n\t\t*set kungfusnake true\n\t\t*set kungfuspecialty \"Snake-Style Shaolin Boxing\"\n\t\t*set physical %-15\n\n\t\tThis Intangible\n\t\t*goto secondmma\n\t#The Dragon, an external specialty that focuses on full fist strikes and dragon-tail kicks to take down opponents directly.\n\t\t*set kungfudragon true\n\t\t*set kungfuspecialty \"Dragon-Style Shaolin Boxing\"\n\t\t*set physical %+15\n\n\t\tThis Physical\n\t\t*goto secondmma\n\n*label secondmma\nanimal specialty has definitely helped you learn how to begin harmonizing the human and Animalistic elements of your identity.\n\nOnce you mastered this technique, you decided to spend time developing a second martial-arts skill, in order to stay fresh and sharp.\n\nThis secondary skill set has helped to hone and diversify your existing abilities, allowing you to blend them into an individual fighting style that remains completely unique to you.\n\n*choice\n\t#My secondary skill is judo, a primarily defensive Japanese style that focuses on pins and takedowns. \n\t\t*set majudo true\n\t\t*set maspecialty \"Judo\"\n\t\t*set defensive %+15\n\t\t*goto findthephsy\n\t#My secondary skill is capoeira, a primarily offensive Brazilian style that focuses on highly mobile striking techniques.\n\t\t*set macapoeira true\n\t\t*set maspecialty \"Capoeira\"\n\t\t*set defensive %-15\n\t\t*goto findthephsy\n\t#My secondary skill is karate, a primarily offensive Japanese style that focuses on the art of striking with one's hands. \n\t\t*set makarate true\n\t\t*set maspecialty \"Karate\"\n\t\t*set defensive %-15\n\t\t*goto findthephsy\n\t#My secondary skill is jujitsu, a primarily defensive Japanese style that focuses on using an opponent's force against them. \n\t\t*set majujitsu true\n\t\t*set maspecialty \"Jujitsu\"\n\t\t*set defensive %+15\n\t\t*goto findthephsy\n\t#My secondary skill is taekwondo, a primarily offensive Korean style that focuses on striking with kicks. \n\t\t*set mataekwondo true\n\t\t*set maspecialty \"Taekwondo\"\n\t\t*set defensive %-15\n\t\t*goto findthephsy\n\t#My secondary skill is Krav Maga, a primarily defensive Israeli style that focuses on avoiding confrontation and using targeted blows to end fights swiftly. \n\t\t*set makravmaga true\n\t\t*set maspecialty \"Krav Maga\"\n\t\t*set defensive %+15\n\t\t*goto findthephsy\n\t\t\n*label findthephsy\n\nYou find that the physicality of both practices helps you deal with your Disembodiment better than talking about it, but then again, you're a less typical Disembodied type than most. Your physical condition isn't constant—on some days your Powers make you feel strong and healthy, while on others they make you feel helpless and tortured.\n\nThis shifting facet of your Powers places you in yet another wonderful group: the Morpho-Powered. Powered culture has been built entirely around the creation of narrow ability categories: the energy wielders and the psychics, the telepaths and the fliers—the divisions and subdivisions are endless. Naturally, some Power types are considered better or fancier than others, and any Powered person that doesn't fit into a neat category is usually dubbed a \"Gene Hazard.\"\n\nAni-Powers are considered the worst kind of Power set by far, usually producing hybridizations that are considered ugly or less than human—hence your difficulty finding a decent job. Ani-Powereds also have the double negative of being hyper-stratified: Rodent-Powereds hate Avian-Powereds, Fish-Powereds hate Feline-Powereds, and all of these \"instinctual\" conflicts tend to lead to violence within the Ani-community.\n\nSo not only are you ostracized from the larger Powered community by being both Morpho- and Ani-Powered, but the fact that your Ani-Powers defy traditional categorization makes you even more of an outcast within the smaller Ani-community.\n\n*page_break   \n\nYou've met other Ani-Powereds, Disembodied Powereds, and Morpho-Powereds, but you've never met anyone else who checks all three boxes. In that way, you're the only person you know who embodies the entire spectrum of Underrepresented Powereds. \n\nWhich also means you have the distinct pleasure of experiencing a complex web of intersecting discriminations, a web you’ve never been sure you’ll be able to escape. You've always felt lucky to at least have JK at your side, but even she fits into Powered culture more neatly than you do as a more traditional Disembodied and Ani-Powered.\n\nIn many ways, you've always felt alone against the world, so you have a lot to say about society and Underrepresented Powered rights. Your hope has always been to someday:\n\n*choice\n\t#Fight for rights within our existing society and raise awareness for Underrepresented Powered issues.\n\t\t*set traditional %+20\n\t\t*set societal %+20\n\n\t\tYou believe the only way things will get better for you, JK, and all those like you is if you act in the best interest of the entire Underrepresented umbrella. Much more can be done if these currently separate communities work together and unite under a single cause to raise awareness and change the culture.\n\t\t*goto thonestly\n\t#Take advantage of the existing system to make the best life for JK and myself that I possibly can.\n\t\t*set traditional %+20\n\t\t*set societal %-20\n\n\t\tSince you don't have faith that change is coming any time soon, you know it's much smarter to get what you can, while you can. It may sound harsh, but America was built on a foundation of capitalism and favors those who find ways to work the system. The wheel of inequality will always exist—you know that breaking it is impossible, so you just want to find your way from the bottom to the top.\n\t\t*goto thonestly\n\t#Drastically change the current societal norms to make the world a better place for everyone, especially for Underrepresented Powered communities.\n\t\t*set traditional %-20\n\t\t*set societal %+20\n\n\t\tYou know that the only path to true change is to oppose the kind of normative standards and categories that cause divisions: the haves and the have-nots, the normals and the abnormals, the ins and the outs. Not too long ago, American society divided itself by race and gender and sexual preference, and although culture has tried to evolve beyond those biases, they seem to have simply been replaced by Powered categories. You know the only way to end this cycle is to break the wheel of inequality altogether, instead of just gaining equality for the minority group of the moment.\n\t\t*goto thonestly\n\t#Find a way to eradicate the societal systems that discriminate against us and create a new order where JK and I can be on top.\n\t\t*set traditional %-20\n\t\t*set societal %-20\n\n\t\tSociety is already broken beyond repair, so you know someone needs to smash it altogether and build a new system—one that will favor people like you and JK.\n\t\t*goto thonestly\n\t#Just keep my head down and try to live as normal a life as possible.\n\t\t*set traditional %+20\n\t\t*set societal %-20\n\n\t\tYou just want to work hard and build a good life for you and JK. You've been so focused on scraping by and protecting JK, you haven't had time to consider any loftier goals than getting through the day in front of you. \n\t\t*goto currentmood\n\n*label thonestly\n\nHonestly, you've been so focused on scraping by and protecting JK, you haven't had time to consider any loftier goals than getting through the day in front of you. \n*label currentmood\nWhich currently involves finding a way to get JK over to the Shiftsite Clinic.\n\n\"Maybe we can borrow Madge's van again?\" JK offers, looking up and down the empty block.\n\n\"I could try to fly us there,\" you say, doubtful your chicken wings could handle anything remotely as useful as that.\n\n\"Even if you could, we can't risk the illegal flying ticket,\" JK says. \"You know how the police are cracking down on Ani-Powered public displays these days.\"\n\nYou don't even want to think about that—and luckily you don't have to, as you suddenly hear a familiar thrust rushing above you. \n\n*page_break\n\nLooking up, you're stunned to find none other than StarSoar dropping out of the sky in an evaporating cloud of blue flame. But you shouldn't be that surprised—Dockerbay is StarSoar's home, too.\n\n\"Sweet spacey slugger,\" JK whispers, her jellyjaw hanging open in awe. \"Who is that?\"\n\n\"${named}, I was hoping to catch you!\" StarSoar says as he touches down on the sidewalk. \"Just my luck that you happened to be here on my way out.\"\n\n\"You know him?\" JK asks you, stars in her eyes as she gazes up at StarSoar.\n\n\"I was going to tell you after your treatment, as a surprise,\" you answer. \"JK, meet StarSoar, my partner in The Hero Project Semi-Finals and a fellow Dockerbay Bomber.\"\n\n*page_break\n\nStarSoar reaches out to initiate the Dockerbay Bomb handshake with you, which proves rather difficult to perform with your chicken-winged claw-hand. After fumbling through, StarSoar retracts his helmet visor and turns to JK.\n\n\"You must be the infamous Jelly Kelly,\" StarSoar says. \"It is most excellent that you were here, otherwise I might not have recognized ${named} here in chicken form.\"\n\nStarSoar shakes JK's jellyhand and you can tell that she's struggling to keep her cool. You knew JK would like StarSoar, but you didn't anticipate quite this level of a reaction….\n\n\"Uh, if you're from Dockerbay, how have we never met before?\" JK asks. \"Because I am just about the biggest—\"\n\n\"The biggest space nerd ever?\" StarSoar interrupts. \"${named} already informed me. I actually visited The Disspace this morning, and let me say, it is rather impressive. I might even have some secret space tips for you, but only if you admit to being the second-biggest space nerd ever.\"\n\nJK stares up at StarSoar, completely speechless—a phenomenon you rarely ever remember witnessing.\n\n*page_break\n\n\"As for your question, we have never met before because I have been enrolled in the NASA Powered Cadet program since you two moved to Dockerbay,\" StarSoar continues. \"You actually know my mother though, Mrs. Hill. I have been visiting her while I am in town for The Hero Project Semi-Finals, but sadly I am not back for long. I am currently on my way to one last mandatory NASA mission, before the next Hero Project episode films. Which is precisely why I wanted to find you two: I watched that Süper car leave you here; could I offer you a ride somewhere?\"\n\nYou suddenly freeze, because while StarSoar clearly knows about JK's condition, he doesn't know the true nature of the treatments you've signed her up for. No one does, besides you and JK—it was a requirement of your involvement in the regimen. \n\nThen again, you already think of StarSoar as a friend, which is rare for you—it's very difficult to make friends given your ever-revolving Ani-Powers. JK is really your only friend, a thought that further reminds you of the importance of protecting her treatments.\n\nKnowing you most definitely need StarSoar to give you a ride, how are you going to respond?\n\n*choice\n\t#Be honest with StarSoar. I will need to trust him fully, both inside and outside the competition.\n\t\t*set ssknowsclinic true\n\t\t*set rlshp_starsoar %+20\n\t\t*set societal %+10\n\n\t\t\"We actually do need a ride,\" you answer. \"To the Shiftsite Clinic.\"\n\n\t\tStarSoar takes a moment to process this, then nods at you knowingly. He must understand the need for secrecy, because he just steps forward without inquiring further.\n\t\t*goto ssriding\n\t#Tell StarSoar I need a ride, but have him drop us off a few blocks from the clinic to keep him in the dark.\t\n\t\t*set rlshp_starsoar %-10\n\t\t*set societal %-10\n\n\t\t\"We actually do need a ride,\" you answer. \"To the corner of Breaker and Burns, for a…uh, group meeting.\"\n\n\t\tStarSoar nods and smiles, clearly not thinking it necessary to question you further.\n\t\t*goto ssriding\n\t#Just tell StarSoar the corner where we need to go—if he cares enough to figure out what it is, at least I won't have told him directly and broken my vow of silence.\n\t\t*set ssknowsclinic true\n\t\t*set rlshp_starsoar %+10\n\n\t\t\"We actually do need a ride,\" you answer. \"To the corner of Black and Bay.\"\n\n\t\tStarSoar takes a moment to process this, then nods at you knowingly—he must recognize this generally abandoned spot as the Shiftsite Clinic. He must also understand the need for secrecy, because he just steps forward without inquiring further.\n\n\t\t*if (societal > 50)\n\t\t\t*set societal %+5\n\t\t\t*goto ssriding\n\t\t*else\n\t\t\t*set societal %-5\n\t\t\t*goto ssriding\n\n*label ssriding\n\n\"Then off we go, into the wild blue ether,\" StarSoar says, striking a cheesy spaceflight pose. \"JK, have you ever flown before?\"\n\n\"Uh, that would definitely be a no,\" JK answers, practically vibrating with excitement. \"But it's only, like, my number-one dream of all time.\"\n\n\"Well then, Houston,\" StarSoar says, finding a sturdy spot to grip JK's wheelchair. \"Prepare for liftoff.\"\n\n*finish NEXT CHAPTER: SHIFTS\n", "save_herofall": "*comment Do we need to do anything special here? x\n*set trilogyreader true\n*goto_scene rs_one", "save_heroproject": "*comment x\nThis save was created at the end of [i]Heroes Rise: The Hero Project[/i], the second game in the [i]Heroes Rise[/i] series. You can use it to resume playing in [i]Heroes Rise: HeroFall[/i], but you can't use it here in [i]The Hero Project: Redemption Season[/i].\n*restore_game cancel=continue\n*label continue\n*restart", "save_redemptionseason": "*comment x\nThat save was created at the end of this game, [i]The Heroes Project: Redemption Season[/i]. You can only use it to resume playing in the next season of [i]The Hero Project[/i].\n\n*restore_game cancel=continue\n*label continue\n*restart", "screenshots": "screenshots!\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set defensive 50\n*set physical 50\n*set fighting 50\n*set kungfuspecialty \"Kung Fu Specialty\"\n*set maspecialty \"Secondary Martial Art\"\n*set power 100\n*set health 100\n*set traditional 50\n*set societal 50\t\n*set moneyed 1500\n*set public 50\n*set respected 50\n*set upa 5\n*set legended 0\n\nAs the host finishes, a fleet of floating camera orbs descends to film the proceedings. One of the melon-sized orbs hovers between you and StarSoar, serving as a potent reminder that this is all for America's number one reality show. What you do will soon be seen by millions of viewers—if you're lucky, that is. You know that part of your success here will depend on being somehow worthy of attention.\n\nFortunately, you look pretty slugging awesome today, though you know all too well that it's not always like this. You have the unique ability to wake up every day with a different Animalistic Power set, but these transformations are not under your control. Some days your Power manifestations can be useless or jarring or downright ridiculous, but today you find yourself in half-hawk mode. Currently, your favorite change is:\n\n*fake_choice\n\t#The set of impressive wings that crease my back.\n\t#My eyes, which are now speckled amber with multi-spectrum vision.\n\t#The talons hidden underneath my fingernails, ready to unsheathe when I need them.\n\t#The fact that these were the only changes today, so I look completely human otherwise.\n\n*script changeBackgroundColor(\"black\")\n\n*set defensive 78\n*set physical 30\n*set fighting 51\n*set kungfuspecialty \"Crane-Style Shaolin Boxing\"\n*set maspecialty \"Judo\"\n*set power 100\n*set health 100\n*set traditional 80\n*set societal 76\t\n*set moneyed 4000\n*set public 40\n*set respected 55\n*set upa 20\n*set legended 40\n*set rlshp_jk 90\n*set rlshp_shift 40\n*set rlshp_eps 60\n*set rlshp_weaver 50\n\nWeaver sewed your own golden THP emblem onto the outer shoulders of the new costume he created for you, which was a much more high-quality version of your thrift-store wetsuit. Of course, this new costume had to be let out yesterday to fit your bloated bee butt, so now Weaver is taking it back in for your regular body.\n\nEven beyond Weaver's incredible talent, you find yourself drawn to him—and you've been trying to pinpoint exactly why.\n\n*fake_choice\n\t#Weaver is always very well dressed, not to mention very cute—but those aren't the only reasons I have a crush on him. \n\t#I don't feel self-conscious around Weaver because my visual Ani-changes don't matter to him as a visually impaired person.\n\t#I like Weaver because he is friendly, smart, hard-working, and a bit unexpected, all at once.\n\t#As my handler, Weaver feels like my truest ally, since his fate is tied to mine. \n\t#I need to remember that Weaver is still a producer and not necessarily my friend.\n\n*script changeBackgroundColor(\"sepia\")\n\n*set defensive 48\n*set physical 70\n*set fighting 49\n*set kungfuspecialty \"Tiger-Style Shaolin Boxing\"\n*set maspecialty \"Capoeira\"\n*set power 90\n*set health 100\n*set traditional 30\n*set societal 46\t\n*set moneyed 1000\n*set public 80\n*set respected 65\n*set upa 10\n*set legended 20\n*set rlshp_jk 90\n*set rlshp_shift 70\n*set rlshp_eps 45\n\nYou've already realized that, for a non-Ani-Powered, Smyther certainly does keep a small army of Ani-Powereds at his disposal. Since his rise as an Ani-gang boss, some Ani-Powereds have seen Smyther as an advocate empowering the community, while others view him as a criminal exploiting your societal disadvantages.\n\nYou've barely had time to process your position on Smyther or the InfraCircle, but so far:\n\n*fake_choice\n\t#I feel like I'm on the wrong side of this battle. Honestly, I agree with what I've heard of the InfraCircle's agenda and methods.\n\t#I believe that no cause justifies criminal activity. Plus, I've seen the negative effects of the re-formed Ani-gangs in Dockerbay firsthand.\n\t#I don't want to be seen fighting other Ani-Powereds; that just feeds into divisive Ani-stereotypes. I'm also intrigued by the InfraCircle's ideas, if not their criminal methods.\n\t#I'm happy to be shutting down Ani-cells that give the rest of us Ani-Powereds a bad name. I want to be a symbol that strikes fear into the heart of Ani-idiots like these.\n\n*set defensive 58\n*set physical 64\n*set fighting 50\n*set kungfuspecialty \"Leopard-Style Shaolin Boxing\"\n*set maspecialty \"Jujitsu\"\n*set power 100\n*set health 100\n*set traditional 52\n*set societal 66\t\n*set moneyed 1500\n*set public 60\n*set respected 35\n*set upa 5\n*set legended 5\n\nMartial arts has helped you feel like you have some level of control over your Disembodied Ani-transformations. Your primary martial-arts focus remains in the practice of Chinese Kung Fu, specifically the Southern Shaolin Boxing style. This style further divides into the Five Animal specialties, which you selected because of your obvious talent for animal mimicry. Plus, the internal and external practices apply nicely to your shifting intangible and physical Power sets. \n\nYou've diversified your study as much as possible, but have also trained hard to become an expert in one unique specialty: \n\n*fake_choice\n\t#The Crane, an internal specialty that focuses on keeping an opponent at a distance using limb length and well-balanced circular evasion movements.\n\t#The Tiger, an external specialty that focuses on charging and attacking an opponent directly with brute force.\n\t#The Leopard, an external specialty that focuses on quick strikes to inflict pain on the soft-tissue vital areas of opponents.\n\t#The Snake, an internal specialty that focuses on enhancing awareness and balance in order to enact delicate coiling motions and locking techniques.\n\t#The Dragon, an external specialty that focuses on full-fist strikes and dragon-tail kicks to take down opponents directly.\n\n*set defensive 38\n*set physical 44\n*set fighting 55\n*set kungfuspecialty \"Snake-Style Shaolin Boxing\"\n*set maspecialty \"Krav Maga\"\n*set power 100\n*set health 100\n*set traditional 62\n*set societal 68\t\n*set moneyed 1500\n*set public 40\n*set respected 55\n*set upa 0\n*set legended 0\n\nEspecially since, with your current chicken-body, trying on costumes is just about the last thing you want to do. You feel bloated and ugly, and you have no idea how you are going to pick a costume that suits your daily transformations beyond this unfortunate chicken form.\n\nLooking at your nearly naked body in the distorted mirror, you are at least comforted that your gender identity remains consistent through the changes.\n\n*fake_choice\n\t#I'm female.\n\t#I'm male.\n\t#I was assigned as male at birth, but am truly female.\n\t#I was assigned as female at birth, but am truly male.\n\t#I was born with intersex characteristics.\n\t#I don't subscribe to any gender categories.\n\n", "sitting_sun": "*comment x\nThis save was created at the end of [i]Heroes Rise: The Prodigy[/i], the first game in the [i]Heroes Rise[/i] series. You can use it to resume playing in [i]Heroes Rise: The Hero Project[/i], but you can't use it here in [i]The Hero Project: Redemption Season[/i].\n*restore_game cancel=continue\n*label continue\n*restart", "startup": "*comment x\n*title The Hero Project: Redemption Season\n*author Zachary Sergi\n\n*scene_list\n\tstartup\n\tgameload\n\trs_one\n\trs_two\n\trs_three\n\trs_four\t\n\t$
