s. Between her rapid aging, her cryptic mandates, and her enforced solitude, you wouldn't be surprised if there's a large piece of the Loa Shift puzzle that you're still missing.\n\t\t*goto revelloa\n\n*label revelloa\n\nYou may not know the truth about Loa Shift's potential connection to Miss Boss, her potential desire for revenge, or the true nature of her Powers and influence—and you may never know. However, having JK healed and being released from your debt to The Great Loa is more than enough, for now.\n\nEspecially since, in the days that followed, JK only seemed to get stronger and stronger, as promised. Krystal did communicate that JK would need time and physical therapy to fully normalize, but soon enough she should be able to live her life as a completely healthy Powered girl. Which means you did it.\n\nYou saved JK's life.\n\nIn that one way, everything that has happened has been worth it.\n\n*page_break\n\nYou haven't been able to fully enjoy JK's impending recovery, though, because she still doesn't know what \n*if (trytosavemb) and (missbossdead)\n\treally happened in that cave. Even though you tried to save Miss Boss in the end, you haven't told JK what Loa Shift's final mandate was and you're not sure you intend to—JK might never forgive you for letting it get as far as it did in the first place. \n\t*goto despitegoodnews\n*elseif trytosavemb\n\twas supposed to happen in that cave. You may have done all you could to save Miss Boss in the end, but you're afraid that if you tell JK about Loa Shift's final mandate, she'll never forgive you for letting it get as far as it did in the first place.\n\t*goto despitegoodnews \n*else\n\treally happened in that cave. You haven't told JK what Loa Shift's final mandate was and you're not sure if you intend to. Even though JK knows this mandate must have had something to do with your Voiceless cave mission, given the timing, you're worried that she'll never forgive you if she learns the whole truth.\n\t*goto despitegoodnews\n\n*label despitegoodnews\n\nSo, despite the good news about her healing, you still feel distant from JK—you've done more to avoid her than spend time with her since the cave mission.\n\nActually, you've done as much as you can to avoid everyone, really. \n\nThe thought of talking about what happened in those caves, about reliving \"The Slaughtering\" you witnessed, is more than you can bear. Every time you even start to think about The Voiceless or Scoundrel's Strike Squad, the piles of broken bodies or the smell of burnt skin, the vacant look in Less's eyes or Outlet trying to roast you alive…it's all just too horrible, too much.\n\nEspecially since everyone now seems to think of you as some supreme hero, after you saved the life of that frog-boy and rescued \n*if (mazeright = false)\n\tScoundrel,\n*if mazeright\n\tSoundrel and Foxwing,\nalong with the scattered Ani-Powereds who were still hidden or playing dead inside their violated shelter. Everyone wants to see you as someone brave, someone who survived against the deadliest of foes and fought against these Ani-cides without hesitation.\n\nThis may be what everyone else sees, but all you can think about is Miss Boss.\n\n*choice\n\t*if (trytosavemb) #I tried my best to save Miss Boss in a horrible situation: that much is true.\n\t\t*if missbossdead\n\t\t\tYou had been driven by more personal motivations up until this point, prioritizing JK's treatments over all else. However, this was a line you simply weren't willing to cross—and you're proud of that change.\n\t\t\t*goto revealtrucons\n\t\t*else\n\t\t\tAnd there is still hope Miss Boss may wake up—that's all that really matters, moving forward.\n\t\t\t*goto revealtrucons\n\t*if (trytosavemb) #I feel so guilty for even letting Miss Boss get that far into The Falls with me to begin with.\n\t\t*if eggedonmb\n\t\t\tEven though you couldn't control being placed on the same team, you did encourage Miss Boss to follow you deeper into The Falls when you had the chance to try and stop her. There's no way you could have known the horrors you'd face then, but still, you knew something bad was going to happen. Should you have tried harder to stop it?\n\t\t\t*goto revealtrucons\n\t\t*else\n\t\t\tStill, you're not sure what more you could have done to stop it: Miss Boss was placed on your team and insisted on going deeper into The Falls with you, even when you asked her not to. Then once everything went to hell, you were given no time to think in the face of all that murder and mayhem.\n\t\t\t*goto revealtrucons\n\t*if (missbossdead) #Above all else, I just want to mourn Miss Boss. Losing her in this way is terrible.\n\t\tMiss Boss revealed herself to be a true hero in the end, inside and out.\n\t\t*goto revealtrucons\n\t*if ((crushmissboss) or (missbossromancescene)) #I still have feelings for Miss Boss.\n\t\t*if missbossdead\n\t\t\tMiss Boss revealed herself to be a true hero in the end, inside and out. And now you'll never get the chance to see what she could have been, or what you could have been together.\n\t\t\t*goto revealtrucons\n\t\t*else\n\t\t\tMiss Boss revealed herself to be a true hero, more than you ever could have expected. All you can hope now is that you all find a way to bring her back, so that you get the chance to see the kind of hero she can become once her dreams come true…\n\n\t\t\tAnd maybe even the kind of heroes you can become together.\n\t\t\t*goto revealtrucons\n\t#I didn't do enough to save Miss Boss. Period.\n\t\t*goto revealtrucons\n\t#I did what I had to do to save JK, as I've always done.\n\t\tAt least this makes Miss Boss's sacrifice worth it, on some level.\n\t\t*goto revealtrucons\n\t*if (missbossdead) #There was nothing more I could have done to save Miss Boss or stop her fall.\n\t\tMiss Boss was placed on your team and insisted on going deeper into The Falls with you. Then once everything went to hell, you were given no time to think in the face of all that murder and mayhem. What else could you possibly have done to stop something that seemed so meant to be?\n\t\t*goto revealtrucons\n\t*if (bondwithmrv) #I'm proud of the Underrepresented Awareness and change achieved by Miss Boss's fall, as well as the chance I created to get through to The Voiceless.\n\t\tTo you, this makes Miss Boss's sacrifice worth it.\n\t\t*goto revealtrucons\n\t#The Voice ultimately targeted Miss Boss because of the way she embarrassed him in the Semi-Finals and treated him in The Falls. I'm not taking the blame for her actions.\n\t\tWhatever else you and Loa Shift might have known, The Voiceless were always going to have it out for Miss Boss. She may have revealed a more thoughtful agenda underneath the surface, but Miss Boss certainly didn't act on those beliefs in the Semi-Finals. You're not sure there's anything you ever could have done to truly protect Miss Boss from the consequences of her actions. \n\t\t*goto revealtrucons\n\n*label revealtrucons\n\nThis thought has raised another fairly important consideration, one that has begun to drown out all of the others: now that JK has been healed and you are released from Loa Shift's obligations, you have a lot to consider regarding your future on The Hero Project. \n\nAfter all you have witnessed and experienced, what do you want to do next? What should you do? Do you really belong here? Do you want to continue? Do you even want to win the competition and join The American Protectorate?\n\nUnfortunately, right now you don't seem to have the perspective, energy, or insight to answer these very important questions. All you currently feel is…uncertain.\n\n*page_break\n\n\"${named}, how are you?\" Weaver asks, sitting next to you in The Hero Project transport. Weaver has been trying to respect your space, since these are the first words ${weaverze} has said to you since The Falls. Unfortunately, you still have no idea how to answer that question.\n\nEspecially because several camera orbs currently film you both, having been set to capture the producers as well. This unprecedented coverage is part of a push for \"complete transparency\" during the upcoming ceremony for Miss Boss, which is getting its own special episode. You're not sure you have anything to say privately yet, let alone publicly in front of the whole nation.\n\n\"It's okay, you don't have to talk about anything,\" Weaver sighs. \"I just wanted you to know that I'm here if you need me.\"\n\n*choice\n\t*if (crushweaver) #Today is a potent reminder that life can be short. So tell Weaver I have feelings for ${weaverhir}.\n\t\t*set rlshp_weaver %+20\n\t\t*set weaverfeelingsattempt true\n\n\t\t\"I'm glad you're here, Weaver,\" you begin, feeling a sudden rush of nerves coursing through your entire body. \"Really glad. Because I think I might be…that is, I really like…you.\"\n\n\t\tYou say the words and are horrified to find that Weaver sits in silence for a few beats, instead of immediately answering that ${weaverze} feels the same.\n\n\t\t\"Slugger, I'm sorry, I didn't mean to…\" you start, fumbling over your words. \"If you don't—\"\n\n\t\t\"It's not that,\" Weaver interrupts, suddenly placing ${weaverhis} hand on yours.\n\t\t*goto leterdownup\n\t*if ((weaverromanceattempt) and (asexual = false)) #Kiss Weaver like I meant to the other night, cameras or no cameras, while I still have the chance.\n\t\t*set rlshp_weaver %+20\n\t\t*set weaverfeelingsattempt true\n\n\t\tYou lean over to kiss Weaver… \n\n\t\tAnd are mortified as ${weaverze} pulls away from you, sensing that you have come closer.\n\n\t\t\"Oh, ${named},\" Weaver says, startled.\n\n\t\t\"Slugger, I'm sorry, I didn't mean to…\" you start, fumbling over yourself. \"If you don't want to—\"\n\n\t\t\"It's not that,\" Weaver interrupts, placing ${weaverhis} hand on yours. \n\n\t\t*label leterdownup\n\t\t*page_break\n\n\t\t\"I do. It's just, not today, not with…\"\n\n\t\tYou can tell Weaver wants to say \"not until I know you're okay,\" but ${weaverze} catches ${weaverhir}self and says instead:\n\n\t\t\"I'm still your handler. I signed a contract, which means that while we're on the show, we can't…\" Weaver sighs, struggling to find the right words. \"I'm not saying I don't want to. Just that we shouldn't, at least if I want to keep my job.\"\n\n\t\tFeeling a little stunned, you nod at Weaver before you realize that ${weaverze} can't see that. Instead, you simply say, \"Okay.\"\n\n\t\tYou're not sure if Weaver really means what ${weaverze} just said or if ${weaverze} is using that as an excuse to let you down easy. Unfortunately, neither notion does much to make you feel better.\n\n\t\t*page_break\n\n\t\t\"Cameras off.\"\n\n\t\tYou hear Weaver say the words before ${weaverze} turns to you. Even though you know ${weaverze} can't actually see you, you still somehow feel that ${weaverze} is capable of seeing you better than anyone else.\n\n\t\t\"${named}, you're literally the best person I have ever met,\" Weaver begins, struggling to keep ${weaverhis} voice even. \"I didn't expect this, not in a million years. I just need some more time, especially given our situation. But I don't want you to think…\"\n\n\t\tWeaver pauses, taking a moment to swallow and clear ${weaverhis} throat before saying, \"I don't want you to think it means I don't feel the same way. Okay?\"\n\n\t\t\"Okay,\" you say again, but this time in a very different tone, and with a very different expression on your face.\n\n\t\tThe giddy feeling may not last terribly long after that, especially as you continue your ride in silence, but that doesn't matter. However small it may be in the face of everything you've gone through, this is a glimmer of hope you plan to hold on to, for however long it takes.\n\t\t*goto arrival\n\t#I have nothing to say.\n\t\t*set rlshp_weaver %-10\n\t\tYou nod at Weaver before you realize that ${weaverze} can't see that. \n\n\t\tInstead, you simply say, \"Okay.\"\n\n\t\tThen you're free to return to your thoughts as you continue your ride in silence.\n\t\t*goto arrival\n\t#\"Thank you for the support, but let's just focus on Miss Boss today, okay?\"\n\t\t*set rlshp_weaver %+10\n\n\t\t\"Of course,\" Weaver answers, a bit awkwardly. \n\t\t*goto justhelike\n\t#\"There will be time later to make this right, for all Underrepresented Powereds.\"\n\t\t*set rlshp_weaver %+10\n\n\t\t\"Yes, there will,\" Weaver answers, a bit awkwardly. \n\t\t*label justhelike\n\t\tJust like everyone else, ${weaverze} is walking on eggshells around you, not sure what to do or say.\n\n\t\tSo you figure it's best to keep saying nothing. \n\n\t\tAt least then you'll be free to return to your thoughts as you continue your ride in silence.\n\t\t*goto arrival\n\n*label arrival\n*page_break AFTER THE CEREMONY\n\nThe last thing you feel like doing right now is going to the post-ceremony reception, but you know you at least have to make an appearance. This will be your last mandatory Hero Project event before the newly scheduled hiatus, so you've resolved to show your face and make the best of it. At least for now, until you have some time to decide what your place in The Hero Project will be moving forward, if any.\n\nWeaver dropped you off at the Finalist lounge, since the show still needs to keep you as separate as possible from the outside world to maintain the integrity of the competition. The lounge overlooks the rest of the reception, where you spot several familiar faces including Lyra, GG, The Diva, The Crush, The American Protectorate, and many others, including Reigna and Exile. \n\nReigna cries loudly into Exile's shoulder while camera orbs film them from every angle. \n*if (public > 50)\n\tWhether or not this display is particularly tasteful, you have to \n*if (public \u003c= 50)\n\tThe overly dramatic sight threatens to turn your stomach, but then you\nremind yourself how you might have had the same reaction to Miss Boss before you got to know her. Besides, this kind of attention is something Miss Boss would probably want for Reigna, anyway.\n\nDirecting your attention back inside the Finalist lounge, you take a deep breath and try to see this as an opportunity to get to know some of the Veterans, who are now gathered together with the Rookies. Weaver told you not to worry about this at all yet, but apparently, with the absence of Miss Boss and Little Jagged, the Final 10 Rookies and Veterans will be merged into one group once the competition resumes.\n\n*page_break\n*achieve finalten\n\nWeaver was very careful to remind you that whether you have the energy to start building new relationships today is entirely up to you, since there will be plenty of time for that later.\n\nBefore you decide anything, however,\n*if transfergone\n\tyou spot Griffin talking to Fumble near the glass wall overlooking the general reception below. Griffin turns to look at you, and once you lock eyes, his gaze is so intense that you actually feel yourself start to sweat.\n\n\tWanting to break the tension, you raise your hand to wave at Griffin, but he just takes a breath and turns back to Fumble. Griffin says something you can't hear and then turns to walk towards the bathroom with Fumble. \n\n\tAs they go, Fumble turns to you and smiles warmly, but Griffin ignores you entirely.\n\n\tWhat the slugger?\n\n\t*choice\n\t\t*if ((griffinromancescene) and (asexual = false)) #Did the other night mean nothing to Griffin?\n\t\t\tYou've been wanting to see Griffin after the hours you shared in that shower, so why would he brush you off like this? Griffin was so warm before and so kind to Fumble just now, but so cold to you. \n\n\t\t\tIs it possible you've been left behind? Or is there another explanation? There has to be another explanation…right? Thinking these thoughts, you can't help the pang of hurt that pulses across your chest.\n\n\t\t\t*label whateverprob\n\t\t\tWhatever Griffin's problem is, you decide instantly that you're not going to follow him into the bathroom or make a scene at this reception to find out. Especially not when he should be the one seeking you out, after all you've been through.\n\n\t\t\tYou'll have to add Griffin's reaction to your ever-growing list of questions to answer later, because you're sure of one thing: you can't endure any additional emotional stress today.\n\t\t\t*goto vetming\n\t\t*if ((griffinromancescene) and (asexual)) #Is Griffin still upset I didn't come into his room the other night?\n\t\t\tAfter everything that has happened since then, could Griffin really be that petty? If that's the case, you're not sure you care anymore.\n\n\t\t\tStill, you can't help but think that Griffin was so warm before and so kind to Fumble just now, but so cold to you. Is it possible you've been left behind somehow? Or is there another explanation? There has to be another explanation…right?\n\n\t\t\t*goto whateverprob\n\t\t*if (tarsierohate) #Could Griffin still be upset about my vote?\n\t\t\tAfter everything that has happened since then, could Griffin really be that petty?\n\n\t\t\t*goto whateverprob\n\t\t#Is Griffin just upset about Miss Boss? Is it possible he blames me somehow?\n\t\t\tWhat other possible explanation could there be for his sudden coldness?\n\n\t\t\t*goto whateverprob\n\t\t#Now that he doesn't need my vote, does Griffin just not need to be nice to me either?\n\t\t\t*set rlshp_griffin %-10\n\t\t\tAfter everything that has happened since then, could Griffin really be that petty?\n\n\t\t\t*goto whateverprob\n\t\t#Slugger him.\n\t\t\t*set rlshp_griffin %-10\n\t\t\tWhatever Griffin's problem is, you don't really care. Not anymore. You'll have to add Griffin's reaction to your ever-growing list of questions to answer later…if at all.\n\t\t\t*goto vetming\n*else\n\tTransfer appears beside you holding two tumblers full of amber liquid and immediately hands one to you. Transfer is also in human form today, though hir costume remains ripped and torn in many places, probably thanks to hir last werewolf transformation. Weaver has been so busy with you that ${weaverze} must not have had time yet to mend it yet…\n\n\t\"We're probably not supposed to drink, but today I feel like breaking some rules,\" Transfer sighs. \"Care to join me?\"\n\n\tYou offer Transfer as much of a smile as you can and accept the glass, but don't take a sip. Your stomach feels too fragile to hold anything at the moment.\n\n\t\"I know you must be tired of hearing this question, but how are you?\" Transfer asks.\n\n\t\"Well, I'm here,\" you answer. \"That counts for something, right?\"\n\n\t*page_break\n\n\tTransfer nods sympathetically, but you can feel hir eyes traveling over you. Everyone's eyes seem to have been on you all day. It's starting to feel more overwhelming than usual, today of all days.\n\n\t\"I'm sorry, I don't mean to stare,\" Transfer says. \"I get enough of that myself, I should know better. It's just…you look amazing today. Like one of those spandex supergods.\" \n\n\tYou lock eyes with Transfer and recognize the pain in hir eyes when ze says what ze does next:\n\n\t\"What's it like?\"\n\n\t*choice\n\t\t*if ((transferromancescene) and (asexual = false)) #Kiss Transfer, to remind hir how it feels to be wanted.\n\t\t\t*set rlshp_transfer %+30\n\t\t\t*set transferintimatelounge true\n\n\t\t\tYou can feel even more eyes turning on you as you kiss Transfer, but you couldn't care less. All that matters in this moment is you and Transfer and protecting this thing you've started to build between you—something tells you it may be the only thing to hold on to here anymore.\n\n\t\t\tTransfer, however, seems to be slightly more concerned with your public display of affection as ze pulls out of your kiss. You almost feel offended, until ze closes hir eyes and says: \"If we start that, I won't stop.\"\n\n\t\t\tOpening hir eyes and staring back at you, ze then says: \"Still, thank you for that.\"\n\n\t\t\t\"You're welcome,\" you say, surprised to find a smile creeping onto your lips. It feels foreign, but not entirely unwanted.\n\n\t\t\t*label needusethankful\n\t\t\t*page_break\n\n\t\t\t\"Well, I need to use the little Morphos' room,\" Transfer says, holding up hir empty glass. \"Too many of these. But come find me if you need anything?\"\n\n\t\t\tYou nod at Transfer, trying to enjoy the feeling of being near hir before it inevitably slips away. You just have to hope that, in the middle of all the chaos and mess, this might be the start of something right and real.\n\t\t\t*goto vetming\n\t\t*if (crushtransfer) #\"You're the beautiful one here—you're real. Looking the way I do today doesn't feel real to me.\"\n\t\t\t*set rlshp_transfer %+30\n\t\t\t*set transferintimatelounge true\n\n\t\t\tTransfer starts to blush, looking instantly uncomfortable. It appears ze isn't quite used to fielding compliments like this.\n\n\t\t\t\"Well, I've been thinking a lot lately about what feels real,\" Transfer answers. \"And if I'm being honest, my feelings for you are very real.\"\n\n\t\t\tNow it seems like it's your turn to be uncomfortable fielding compliments. Instead, you step forward and pull Transfer into a hug.\n\n\t\t\t\"Thank you for that,\" you say, surprised to find a smile creeping onto your lips. It feels foreign, but not entirely unwanted. \"I feel the same way. And I'm so glad you're still here.\"\n\n\t\t\t\"Me too,\" Transfer says, stepping back and taking a brief look around. Suddenly you both become aware of all the other people and cameras in this room—not exactly the best environment for intimacy.\n\t\t\t*goto needusethankful\n\t\t*if (crushtransfer = false) #\"You're the beautiful one here—you're real. Looking the way I do today doesn't feel real to me.\"\n\t\t\t*set rlshp_transfer %+20\n\n\t\t\tTransfer starts to blush, looking instantly uncomfortable. Like you, it appears ze isn't quite used to fielding compliments like this.\n\n\t\t\t\"You're right,\" Transfer says. \"About what feels real, I mean.\"\n\n\t\t\t\"Glad we agree,\" you say, surprised to find a smile creeping onto your lips. It feels foreign, but not entirely unwanted.\n\n\t\t\t\"Well, I don't want to take up too much of your time. Plus I need to use the little Morphos' room,\" Transfer says, holding up hir empty glass. \"Too many of these. But come find me if you need anything?\"\n\t\t\t*page_break\n\t\t\t*goto empmom\n\t\t#\"I could do without the attention, today.\"\n\t\t\t*set rlshp_transfer %-10\n\n\t\t\t\"I understand, I'll give you some space,\" Transfer says, instantly blushing and looking uncomfortable. Ze suddenly holds up her glass. \"I need to use the little Morphos' room anyway, too many of these. But come find me if you need anything?\"\n\n\t\t\t*label empmom\n\t\t\tYou nod at Transfer as ze goes, thankful at least for the attempt at empathy. You're having trouble feeling anything other than numb at the moment, but you try to remind yourself that Transfer is one of the only ones who understands what it's like to be you.\n\n\t\t\tWhen it comes to today, though, you're afraid no one could possibly understand what it's like to be you.\n\t\t\t*goto vetming\n\t\t#\"I hate to admit it, but it feels good. It's like looking this way makes everything feel easier.\"\n\t\t\t*set rlshp_transfer %-10\n\n\t\t\t\"That must be nice,\" Transfer says, looking empathetic but uncomfortable.\n\t\t\t*label morphoroom\n\t\t\tZe suddenly holds up her glass. \"Well, I need to use the little Morphos' room anyway, too many of these. But come find me if you need anything?\"\n\n\t\t\tYou nod at Transfer as ze goes, attempting to muster a smile. You're having trouble feeling anything other than numb at the moment, but you try to remind yourself that Transfer is one of the only ones who understands what it's like to be you.\n\n\t\t\tWhen it comes to today, though, you're afraid no one could possibly understand what it's like to be you.\n\t\t\t*goto vetming\n\t\t#\"It feels like I'm able to know Miss Boss better now, somehow.\"\n\t\t\t*set rlshp_transfer %+10\n\n\t\t\t\"That must be nice,\" Transfer says, looking empathetic but uncomfortable.\n\t\t\t*goto morphoroom\n\n*label vetming\n\nWanting another distraction, you scan the party to see how the other Finalists are doing. You're not necessarily surprised to see the rest of the Final 10 gathered in select pairs. Looking them over, you quickly decide to:\n\n*comment The Veterans Relationship coding appears in the Stats Screen, but the individual character relationships will remain invisible until Book 2. I'll use these levels to keep track of who you met in this scene at first. I didn't include The Bear purposely, given the plan for him in Book 2.\n*choice\n\t#Say hello to Crystalline and introduce myself to Mach Girl.\n\t\t*if griffingone\n\t\t\t*set rlshp_veterans %+15\n\t\t\t*set rlshp_machgirl %+15\n\n\t\t\t\"${codenamed}, it's so good to see you,\" Crystalline says, pulling you into an immediate hug. \"You have to meet Mach Girl—she is the absolute best.\"\n\n\t\t\tYou shake Mach Girl's hand, surprised to find that she seems to be the one struck by your presence—which feels bizarre, since she is technically the famous one here. You then realize that you and Crystalline might be famous now too, once you reenter the real world. Still, that doesn't seem to be what this is about—even Crystalline seems to look at you with different eyes today.\n\t\t\t*if (crystallineromanceattempt)\n\t\t\t\t*set rlshp_crystalline %+25\n\t\t\t\tCould that mean there's still hope for your crush?\n\n\t\t\t\t\"Did you see Ignite down in the crowd?\" Crystalline then says, craning her neck to get another glimpse of him. \"Weaver let me sneak a minute with him when we got here! I couldn't believe it.\"\n\n\t\t\t\tCystalline keeps scanning the crowd, and you force a smile, hiding the fact that your heart just dropped into your stomach. So much for that thought.\n\t\t\t\t*goto mgcomp\n\t\t\t*else\n\t\t\t\t*set rlshp_crystalline %+15\n\n\t\t\t\t\"Did you see Ignite down in the crowd?\" Crystalline then says, craning her neck to get another glimpse of him. \"Weaver let me sneak a minute with him when we got here!\"\n\n\t\t\t\tCystalline then seems to get lost scanning for Ignite again, so you turn to Mach Girl as she speaks.\n\n\t\t\t\t*label mgcomp\n\t\t\t\t*page_break\n\t\t\t\t\"I thought you performed so bravely and honorably in the last mission, at least in the parts they let us see,\" Mach Girl says. \"I only wish the rest of us could have arrived sooner to help.\"\n\n\t\t\t\tYou nod at Mach Girl, thankful for these words. Despite her age, you already get the feeling that she is an old soul. \n\n\t\t\t\t\"Slugger, I'm such a moron,\" Crystalline gasps, turning back to you. \"I just got overwhelmed, but how are you? I mean, I didn't get to spend much time with Miss Boss, but I know you did. Are you okay?\"\n\n\t\t\t\tYou have many answers to these questions, but none you actually feel like talking about. At least not yet.\n\t\t\t\t*page_break\n\t\t\t\t*goto tarsierointerrupt\n\t\t*else\n\t\t\t*set rlshp_crystalline %-15\n\t\t\t*set rlshp_veterans %-15\n\t\t\t*set rlshp_machgirl %-15\n\n\t\t\tAs you approach, Crystalline immediately looks uncomfortable. At her side, Mach Girl seems to follow suit, crossing her arms. Obviously Crystalline must still be upset about your vote that sent Transfer home.\n\n\t\t\t\"Hey, I just wanted to say I'm sorry about the vote,\" you say, trying to mean it. \"Though after everything, all that seems silly now, huh?\"\n\n\t\t\tCrystalline looks back at you, forcing a tight smile. \"Not really. Not to me, anyway.\"\n\n\t\t\tCrystalline then turns away and Mach Girl tries to smile at you awkwardly, remaining silent. \n\n\t\t\tWow, none of the Rookies seems to want to talk to you today. Though really, they should be the ones asking if you're okay, not the other way around. As you think this, anger starts to rise up through your tightening chest.\n\t\t\t*page_break\n\t\t\t*goto tarsierointerrupt\n\t#Introduce myself to Galexa and Di.\n\t\t*set rlshp_veterans %+15\n\t\t*set rlshp_galexa %+15\n\t\t*set rlshp_di %+15\n\n\t\tYou approach these two women and find yourself pulling your shoulders back a bit, feeling the presence that surrounds them. Di is the former First Lady, for slugger's sake, and Galexa is a decorated and well-connected Washington, DC hero. It's no surprise this duo has paired up, since the combined Power and influence between them is staggering.\n\n\t\tEveryone was asked to wear their costumes today to honor Miss Boss's heroism, and these two wear theirs proudly—Di even seems to have added a diamond necklace of her own creation, one that spells the letters \"MB.\" \n\n\t\tNext to her, Galexa's holo-visor is retracted, so you can see her take a visible, sharp breath as you approach. This reaction feels different than the usual impression you make—this one feels like a reaction to your muscled and chiseled appearance. You're not sure you'll ever get used to that.\n\n\t\t\"${codenamed},\" Di says first, drawing your attention. \"I was hoping to meet you today. The bravery you displayed in this last mission was beyond admirable. You're a true national treasure.\"\n\n\t\t*page_break\n\n\t\tAlso not quite accustomed to fielding compliments of this caliber, you smile at Di and turn towards Galexa, whose cheeks suddenly flush. \n\n\t\t\"It will be an honor to fight alongside you when the competition resumes,\" Galexa says, rather stiffly. It doesn't feel cold, though—her stiffness feels like it comes from someone who is pained by social niceties.\n\n\t\t\"I can't imagine how you must be feeling,\" Di says, drawing your attention once again by taking your hand. \"Is there anything at all I can help with? I know some superb grief counselors from my time in the White House, though I'm sure The Hero Project and the DRPR have provided excellent specialists as well.\"\n\n\t\tYou smile and try to think of a response for Di, but don't know where to begin. She obviously wants you to open up about what happened in those caves, but you aren't ready to talk to anyone about that yet, let alone someone you've just met.\n\t\t*page_break\n\t\t*goto tarsierointerrupt\n\t#Introduce myself to The Bear and Tarana Rain.\n\t\t*set rlshp_veterans %+15\n\t\t*set rlshp_taranarain %+15\n\n\t\tYou approach the lively duo and are surprised to find Tarana Rain's jaw dropping as you do. At first you feel self-conscious, but then you realize it's because Tarana Rain is attracted to your leopard-self. This is quite different from the usual impression you make on people, especially compared to your recent tardigrade day.\n\n\t\tNext to Tarana Rain, The Bear stands in his own normal-human form and wears a leather Hero Project jacket over his wrestling leotard. He gives you an elevator stare from head to toe, judging your entire appearance at a glance.\n\t\t*if (maled) or (genderneut)\n\t\t\tThen he locks eyes with you and doesn't look away, indicating very clearly and instantaneously that he is interested, too.\n\t\t*comment endif\n\n\t\t\"${codenamed}, you look unreal today,\" The Bear says, pulling you into a hug the moment you're close enough.\n\t\t*if (attractmen) and ((maled) or (genderneut))\n\t\t\tYou can feel every one of his muscles through your own fitted costume as his smooth skin rubs against yours. The Bear lingers in the hug a few seconds longer than usual, then sets his deep blue eyes on you.\n\t\t\t*if (attractwomen)\n\n\t\t\t\tAlmost blushing, you turn to Tarana Rain and find that she winks at you, rolling her eyes as if to say: [i]You should be into me, not him.[/i]\n\t\t\t\t*goto leopdjam\n\t\t\t*else\n\t\t\t\t*goto leopdjam\n\t\t*elseif (attractwomen)\n\t\t\tAs he does, you swivel to face Tarana Rain and find that she winks at you, rolling her eyes as if to say: [i]You should be into me, not him.[/i]\n\t\t\t*goto leopdjam\n\t\t*else\n\t\t\t*label leopdjam\n\n\t\t\t\"Leopard is my jam, NaNa,\" Tarana says to you. \"Tell me, where are you hiding your spots?\"\n\n\t\t\t*page_break\n\n\t\t\tYou're used to people not seeing beyond the way you look in this way, but usually those are negative reactions—you're not sure if you should let yourself enjoy this positive reaction. Even though The Bear and Tarana Rain may be focusing on the wrong thing, they also seem like fun, too. And they haven't asked about the caves or how you feel yet, which is more than you can say for almost everyone else you've encountered today. \n\n\t\t\tSo you roll up your pant leg and show off the leopard spots on your calf.\n\n\t\t\t\"That's so slugging cool,\" The Bear says. \"Here, it'll look great with this.\"\n\n\t\t\tThe Bear slides his jacket off and onto your shoulders, revealing a perfectly smooth chest under his leotard, along with the tightest six-pack you've ever seen. \n\n\t\t\t\"Tarana, take a MePic,\" The Bear says with a loud pop, suddenly transforming into his Powered form. The next thing you know, The Bear is about twice as tall, with doubly broad shoulders, bulging biceps, a hairy chest, and a short beard.\n\n\t\t\t*if (attractmen) and ((maled) or (genderneut))\n\t\t\t\t\"Try to keep it in your pants, you two,\" Tarana Rain says with a smirk as The Bear puts his arm around you, pressing his body against yours for the picture.\n\t\t\t\t*page_break\n\t\t\t\t*goto tarsierointerrupt\n\t\t\t*elseif (attractwomen)\n\t\t\t\t\"Fine, but I get my turn next,\" Tarana Rain says with a smirk as The Bear poses next you for the picture.\n\t\t\t\t*page_break\n\t\t\t\t*goto tarsierointerrupt\n\t\t\t*else\n\t\t\t\t\"I need to be in the next one!\" Tarana Rain shouts as The Bear poses next you for the picture.\n\t\t\t\t*page_break\n\t\t\t\t*goto tarsierointerrupt\n\t#Keep to myself. I'm not ready or willing to meet anyone new just yet.\n\t\t*set rlshp_veterans %-15\n\t\t*goto tarsierointerrupt\n\n*label tarsierointerrupt\n\n\"${codenamed}, may I talk to you for a moment?\" a new voice suddenly asks, one you realize belongs to Tarsiero. \"It's very, very important.\"\n\nYou nod at Tarsiero, not sure what else to do. You figure you'll have more time to spend with the Veterans once the competition resumes anyway, whether you like it or not. Besides, you're still very undecided on where you belong, so breaking away might not be the worst thing right now. \n\nThough you're not sure you want to do so with Tarsiero, who for some reason still seems to put all of your senses on edge. Still, you definitely don't want to feed into any stereotypes about Ani-Powereds being naturally divisive, especially not today, so you let Tarsiero lead you into the nearest corner.\n\n\"I know you've been through a lot, so I won't take up too much of your time,\" Tarsiero begins. \"But I was just wondering, do you not like me?\"\n\nThe question is so direct that it catches you off guard. You're not quite sure what to say to that at all.\n\n*page_break\n\n\"It's just, you seem to avoid me or to be on edge when you're around\n*if tarsierohate\n\tme. And then you voted for me,\"\n*if (tarsierohate = false)\n\tme,\"\nTarsiero adds, when you don't respond. \"I'm not mad or anything, I just want to know if I've done anything wrong. You know, because I'd like for us to be friends. These Ani-cides and that Smyther Manor mission have had me pretty shaken up. And then being in that cave….\"\n\nTarsiero goes silent for a moment, his massive eyes looking teary and haunted. \"Crystalline and ${thirteenstay} were so supportive on our own #Rookies squad, but I don't think they really understood what it was like, not being Ani-Powered all the time, like us.\"\n\nSlugger. You've been so wrapped up in your own struggles that it hadn't even occurred to you that Tarsiero might be feeling the very same things you are. Immediately, you respond:\n\n\"You've done nothing wrong, Tarsiero. I've just been preoccupied and overwhelmed, but that's no excuse. You're right, there's probably a lot else we have in common.\"\n\n*page_break\n\nHearing this, Tarsiero lights up once again. \n\n\"#Ani-friends!\" he shouts, seemingly unable to contain himself. \"Sorry, I've been trying to cut down on the hashtag-speak—I want to bring it back because I think hashtags are super fetch, but I'm not sure it's working. Anyway, I'm so glad to hear you say that; I've been nervous about talking to you all day. But after seeing how brave you were in the caves…I don't know if I could have done what you did.\"\n\n\"What did you see in there?\" you ask, hoping to avoid the topic of your own experience.\n\n\"Well, our cave entrance was a dead end, but it took us too long to realize that,\" Tarsiero sighs. \"We rushed back, but by the time we got to the main cave clearing, Little Jagged and that frog-boy were some of the only survivors. There was so much blood everywhere…and then we found that the entrance to the second clearing had caved in. When I saw that, I could only imagine what you and Miss Boss were facing in there. We tried our best to clear the collapsed tunnel….\"\n\n*page_break\n\nTarsiero stops himself then, no doubt catching the look on your face.\n\n\"Anyway, I have something else I wanted to ask you, if you don't mind,\" Tarsiero says, switching gears. \"It must have been even harder for you in those caves, since you're not just Ani-Powered. You're also Disembodied and Morpho-Powered too, right? Facing The Voiceless like you did, did you feel pressured to connect to one part of your identity over the others? Or do you always feel pressure to identify one way or another?\"\n\nTarsiero's question catches you off guard, because oddly, you've never really thought of it exactly that way before. You have to take a few moments to consider your answer before you say:\n\n*choice\n\t#\"I guess I identify first and foremost as Ani-Powered.\"\n\t\t\"But I don't really fit in with any of the Ani-cliques because of the way I change.\"\n\n\t\t\"Me neither, really,\" Tarsiero sighs. \"Being less hybridized and less human-looking tends to make other Ani-Powereds uncomfortable, for some reason. I actually thought at first that might be why you didn't want to get in on some #TarsieroTime. Still, I wouldn't change being different for anything, even if it isn't the easiest.\"\n\t\t*goto tmglater\n\t#\"I guess I identify first and foremost as Morpho-Powered.\"\n\t\t\"But that takes me out of most traditional Powered categories,\" you add. \"I guess Morpho is its own category, but there don't seem to be all that many of us, and we all vary so much.\"\n\n\t\t\"I know how you feel,\" Tarsiero sighs. \"Being less hybridized and less human-looking tends to make other Powereds uncomfortable, even other Ani-Powereds. I actually thought at first that might be why you didn't want to get in on some #TarsieroTime. Still, I wouldn't change being different for anything, even if it isn't the easiest.\"\n\t\t*goto tmglater\n\t#\"I guess I identify first and foremost as a Disembodied Powered.\"\n\t\t\"It was so hard to see The Voiceless that way,\" you say. \"But I empathize with their struggle. Everything is just harder for us, and there's no one who seems to want to help.\"\n\n\t\t\"I know how you feel,\" Tarsiero sighs. \"My being less hybridized and less human-looking tends to make other Powereds uncomfortable, even other Ani-Powereds. Plus, the upkeep on this fur is crazy. I actually thought at first that might be why you didn't want to get in on some #TarsieroTime.\"\n\t\t*goto tmglater\n\t#\"Honestly, all three facets of my identity are equally important to me.\"\n\t\t\"I'm so much more than any one thing,\" you add. \"None of these Powers defines me, and yet all of them do, I think. It's the combination that makes me who I am, that makes me unique. I'd never want to be put in just one box.\"\n\n\t\t\"I know how you feel,\" Tarsiero sighs. \"Being less hybridized and less human-looking tends to make other Powereds uncomfortable, even other Ani-Powereds. I actually thought at first that might be why you didn't want to get in on some #TarsieroTime. Still, I wouldn't change being different for anything, even if it isn't the easiest.\"\n\t\t*goto tmglater\n\t#I don't have an answer for that, especially not for Tarsiero.\n\t\t*set rlshp_tarsiero %-10\n\n\t\tLuckily your conversation is cut short once again as the crowd downstairs begins to stir for an announcement.\n\t\t*goto tallydownbelw\n\n*label tmglater\n*set rlshp_tarsiero %+20\n\n*if (image > 50)\n\t*achieve embraceyou\n*if (image \u003c= 50)\n\t*achieve walldown\n\nYou smile at Tarsiero, wondering why it took you so long to connect like this. You're about to ask Tarsiero more about his experience with other Animalistic Powereds when the crowd downstairs begins to stir for an announcement, cutting your conversation short once again.\n\n*page_break\n*label tallydownbelw\n\nDown below, the crowd hushes as a holo-projection of the entire current roster of The Millennial Group appears on a small stage. You're surprised, since the Group's slated spots to be Guest Mentors and Judges were paused last mission as the Infinitum threat apparently became more grave. However, the Group must still have wanted to make some appearance at these services.\n\nAs a matter of fact, you've heard The Millennial Group has been largely absent from the public eye during their mysterious battle with Infinitum—and you can't quite decide if you find that refreshing or troubling. At any rate, you've heard the Group is also gearing up for its fortieth anniversary next year, complete with the release of a tell-all Roster Report holo-novel that chronicles the long history of its rotating members.\n\nThanks again to JK, you know that just in the last few years, the Group's roster has undergone some drastic changes. Right on cue, MeChip Prodigal appears, fanning herself with the heroic history holo-flashcards JK prepared for you.\n\n*label rosterrundownmg\n*choice\n\t*disable_reuse #Access flashcard: [b]Rebellion End Era.[/b]\n\t\t[b]Rebellion End[/b] [i]2111--2112[/i]\n\t\t*line_break \n\t\t[i]Roster: Rebellion, Processor, The Diva, Monk, Fistfull, Black Magic[/i] \n\t\t*line_break\n\t\t*if (guard_reserve) or (newreader)\n\t\t\t[i](Reserve: Jury, ${codename})[/i]\n\n\t\t\tAfter a long tenure as leader, Rebellion left The Millennial Group, along with Black Magic and reserve members Jury and ${codename}, to be involved in The Hero Project (and later, for Rebellion and Jury, to join the founding roster of The American Protectorate).\n\t\t\t*goto rosterrundownmg\n\t\t*else\n\t\t\t[i](Reserve: Jury)[/i]\n\n\t\t\tAfter a long tenure as leader, Rebellion left The Millennial Group, along with Black Magic and reserve member Jury, to be involved in The Hero Project (and later, for Rebellion and Jury, to join the founding roster of the The American Protectorate).\n\t\t\t*goto rosterrundownmg\n\t*disable_reuse #Access flashcard: [b]Diva Devoid Era.[/b]\n\t\t[b]Diva Devoid[/b] [i]2112--2113[/i]\n\t\t*line_break\n\t\t[i]Roster: The Diva, Processor, Monk, Fistfull, Static, Heela (Later: Lucky)[/i]\n\n\t\tWith Rebellion's departure, long-standing member The Diva stepped up to lead The Millennial Group with new members Static and Heela, then later with The Hero Project first season alumnus, Lucky. \n\n\t\tThis incarnation of the Group actually became bitter rivals and eventual enemies of The American Protectorate, clashing on more than one occasion during the now-infamous Devoid War.\n\t\t*goto rosterrundownmg\n\t*disable_reuse #Access flashcard: [b]Current Roster.[/b]\n\t\t*goto currentrosternow\n\t*disable_reuse #[b]The Origins.[/b]\n\t\tReading these flashcard snippets, you actually find yourself excited for the forthcoming 40th anniversary Roster Report, which chronicles the evolution of the Group from its founding roster in 2074 and its subsequent influence on Powered culture over the ensuing decades.\n\n\t\tYou even heard The Group once had a little-known Ani-Powered member, so you already plan to pick up a copy of the Report when it's released next year.\n\t\t*goto rosterrundownmg\n\t#Seeing the Millennial Group now…\n\t\t*goto themglineup\n\n*label currentrosternow\n*if (newreader) or (mgleader)\n\t[b]${codename} Reboot[/b] [i]2113--Present[/i]\n\t*line_break\n\t[i]Roster: ${codename}, Processor, Monk, Fistfull, Bright Magic,[/i] \n\t*if (jennydead)\n\t\t[i]Lucky[/i]\n\t\t*goto rebootcode\n\t*else\n\t\t[i]Lucky, Null[/i]\n\t\t*goto rebootcode\n*else\n\t[b]Lucky Reboot[/b] [i]2113--Present[/i]\n\t*line_break\n\t[i]Roster: Lucky, Processor, Monk, Fistfull,[i]  \n\t*if (jennydead)\n\t\t[i]Bright Magic[/i]\n\t\t*line_break\n\t\t[i](Reserve Consultant: ${codename})[/i]\n\t\t*goto rebootcode\n\t*else\n\t\t[i]Bright Magic, Null[/i]\n\t\t*line_break\n\t\t[i](Reserve Consultant: ${codename})[/i]\n\t\t*goto rebootcode\n\n*label rebootcode\n\nAfter the end of the Devoid War, The Diva left the Group to go on an Infini Advocacy tour alongside The Crush and Black Magic. This tour ended once The Diva and The Crush agreed to sign on as Judges for The Hero Project. Then, with Static and Heela leaving The Group to get married and launch a joint independent career, Black Magic decided to rejoin The Millennial Group…\n\nHowever, after the Infini-related breakdown Black Magic \n*if bmdepower\n\tsuffered and the subsequent loss of ${bmhis} Powers, Black Magic decided to rebrand ${bmhir}self as a new heroic entity: Bright Magic. Now utilizing advance-release YouPower upgrades, Bright Magic has a range of new white-energy abilities and weapons and\n*if (bmdepower = false)\n\tsuffered, ${bmze} decided to rebrand ${bmhir}self as a new heroic entity: Bright Magic. This new identity focuses on the use of ${bmhis} light and energy based Powers only, leaving behind ${bmhis} reality-warping and life-force-sourcing abilities. Now utilizing purely ${bmhis} own life force as a source, Bright Magic's Powers are much more limited in scope, but ${bmze} knows that accessing these deeper Powers acts as a dangerous gateway drug for ${bmhir}. To match this change, Bright Magic now\nsports an all-white version of ${bmhis} famous zip-up bodysuit, with yellow accents.\n\nThis all-star roster has come to represent a new wave of Golden Age heroics in Millennia City, after a period of considerable darkness.\n*goto rosterrundownmg\n\n*label themglineup\n\nLooking down at the current roster of The Millennial Group gathered below, you see\nMonk, Fistfull,\n*if (jennydead)\n\tand Processor\n*if (jennydead = false)\n\tProcessor, and Null \nstanding in a row behind\n*if (newreader) or (mgleader)\n\tLucky\n\t*goto prdpreferred\n*else\n\tleader Lucky\n\t*goto prdpreferred\n\n*label prdpreferred\nand Bright Magic.\n\n\"If you ask me, I far preferred this 'Bright Magic' when ${bmze} went by Black Magic,\" MeChip Prodigal interjects. \"Sure, ${bmze} was much deadlier and vampiristic and unhinged, but that's truly my kind of love!\"\n\nIgnoring MeChip Prodigal, you see that in the very front stands\n*if (newreader) or (mgleader)\n\tThe Millennial Group's newest leader.\n\t*goto omgpr\n*elseif mchotrp\n\t${codename}, the first official Millennia City Hero of Tomorrow Resident Protector.\n\t*goto curserv\n*elseif champoffringes\n\t${codename}, the undisputed Champion of the Eastern Fringes—and also the one primarily responsible for the migration of Ani-gang activity to Dockerbay and New Fringe.\n\t*goto curserv\n*else\n\t${codename}, a wildly successful corporate-sponsored hero. \n\t*label curserv\n\tApparently ${codename} is serving as a temporary Millennial Group Consulting Member against their new Infini Powered enemy, Infinitum.\n\t*goto omgpr\n\n*label omgpr\n*if jennygirlfriend\n\tAs ${codename} steps up to speak, you notice ${youze} wears a wedding ring that matches the one on Null's finger.\n\t*goto shushpop\n*elseif (luckycomaspouse) or (luckyromancefinale)\n\tAs ${codename} steps up to speak, you notice ${youze} wears an engagement ring that matches the one on Lucky's finger.\n\t*goto shushpop\n*elseif (bmcomaspouse) or (bmfinaleromance)\n\tAs ${codename} steps up to speak, you notice ${youze} wears an engagement ring that matches the one on Bright Magic's finger.\n\t*goto shushpop\n*elseif juryboyfriend\n\tAs ${codename} steps up to speak, you notice a loaded glance pass between ${youhir} and Jury in the crowd. You had heard that these two were a couple once—and it looks like there's still some very unfinished business between them.\n\t*goto shushpop\n*else\n\tAs ${codename} steps up to speak, MeChip Prodigal looks like she might explode with excitement.\n\t*goto shushpop\n\n*label shushpop\n\n\"Holy honkers, it's my dearest ${codename}, the original chickenator!\" MeChip Prodigal shouts, feasting on a bag of holo-popcorn as her eyes nearly bust out of her skull. \"Shush up, the show is about to start!\"\n\n*page_break\n\n\"I speak for the entire Millennial Group when I say we wanted to be here to honor Miss Boss's noble sacrifice,\" ${codename} begins. \"However, given the severity of the Infinitum threat we face up north, we had to settle for this holo-appearance. We are incredibly thankful for The Hero Project stepping up to protect Millennia City during our necessary absence.\"\n\nAs ${codename} finishes,\n*if (newreader) or (bmeleventh)\n\tLucky\n\t*goto stepsthespe\n*else\n\tBright Magic\n\t*goto stepsthespe\n\n*label stepsthespe\nsteps up to speak next. \"As someone who fell into a coma while fighting on The Hero Project, I understand what it means to sacrifice for the greater heroic good.\n*if missbossdead\n\tUnfortunately, Miss Boss ended up making the ultimate sacrifice.\"\n*if (missbossdead = false)\n\tWe can only hope that Miss Boss will soon recover, just like I was able to.\"\n*comment endif\n\n\"We also wanted to remind Millennia City and The Hero Project's national audience that the kind of violence and bigotry perpetuated by The Voiceless will never be tolerated,\" ${codename} adds. \"The Millennial Group and The DRPR stand with The Hero Project as a united front against such injustices. However, we are also sensitive to the complicated issues and tensions that spawned the Ani-cides and the violence against Miss Boss in the first place.\"\n\n\"For this reason, we'd like to introduce the person who raised Miss Boss, to speak some vitally important words,\" Bright Magic concludes, turning ${bmhis} attention across the stage.\n\n*page_break\n\nA short but sturdy woman in a black pantsuit takes the stage next, her eyes still red from crying. Despite this, she also manages to look fiercely determined.\n\n\"My name is Camilla Espinoza, but those of you who know Miss Boss well probably know me as her Tía Camilla. Those of you who know Miss Boss well also know it has always been her dream to become a respected hero. She sacrificed so much in the pursuit of this dream…it seems her journey was always meant to be one of sacrifice.\"\n\nCamilla takes a moment, looking as if she may cry again. However, she composes herself quickly and carries on. \"But it didn't have to be. If Miss Boss were able to speak for herself right now, she'd tell you that she believed in changing heroic culture to be much more inclusive and much less rigidly defined.\"\n\n*page_break\n\n\"For those of you who do not know Miss Boss well, or who only know her from her appearances on The Hero Project so far, you might have a certain impression of her and her priorities. Perhaps that she only cared about how she looked, or about chasing fame, or that she didn't care about her fellow heroes. This couldn't be further from the core of who Miss Boss really is. In fact, Miss Boss became a hero to try and combat exactly these kinds of surface-level judgments.\n\n\"In the episodes that continue to air, my hope is that you will get to see this true Miss Boss, the one who believed in breaking down the arbitrary Powered categories that currently divide the heroic community, that shut out so many deserving hopefuls. Miss Boss believed that these Powered labels, good or bad, hurt everyone.\"\n\nHearing Miss Boss's words through Camilla now, you can't help but think:\n\n*choice\n\t#I'm happy these issues are finally being discussed, but it is not lost on me that it took the fall of Miss Boss, a traditional Powered and rising celebrity, to get here.\n\t\tWhere was all of this, the speeches and the services, for the other victims of the Ani-cides? This kind of outcome actually goes against all the things Miss Boss really stood for.\n\t\t*goto womaraise\n\t#It's a shame the public has only seen the guarded hero Miss Boss felt she had to be at first to gain this platform, the silent bombshell who took down Imager.\n\t\tCamilla is clearly committed to showing Miss Boss's true mission—you just hope the rest of The Hero Project is on board, too. The things that Miss Boss believed are too important to be edited out.\n\t\t*goto womaraise\n\t#What happened to Miss Boss could just as easily have happened to me. I could have been the one to fall that day.\n\t\tAnd what would people have thought about you, had that happened? This is a potent reminder that you've now been given a second chance, so how are you going to use it?\n\t\t*goto womaraise\n\t#Lessening Powered divides is important, but someone still needs to be part of the dialogue that will speak up for the interests of the Underrepresented. \n\t\tAs much as Camilla clearly means well, you're not yet sure she fits that bill.\n\t\t*goto womaraise\n\n*label womaraise\n\nAs you think this, suddenly it feels like time stops, because a realization smashes into you with striking clarity.\n\nBeing here on The Hero Project, seeing how the other half lives, it has become clearer than ever to you how intersectional oppression has held you back. It's not just your lack of access to jobs or medical care, it's also the perception of your role and possibility in the world as an Ani, Morpho, and Disembodied Powered. Until now, you've had no positive role models to aspire to in popular culture, no representation in government or Powered culture or any of the circles that broker power. Now that you've seen how networks of wealth and influence work, you've been able to see how much the system has been built to lock people like you out.\n\nHistory is full of examples of categories being erected to divide and conquer—gender, sexuality, race, religion, nationality—the list goes on and on, but the current cultural divide is built around Powers. You realize now that gaining equality for just one of these Powered groups you belong to won't cut it—if you focused only on Ani-rights, then who would advocate for Morpho-Powereds or the Disembodied, or for those deemed superficial like Miss Boss, or useless like The Voice? Focusing on elevating just one Powered group would simply leave the next minority group to take the fall in an endless cycle of oppression.\n\n*page_break\n\nNo, what really needs to happen is a change in the system itself, just like Miss Boss suggested. The only way to end this intersectional oppression and turn it into actual equality is for everyone to stop categorizing and subcategorizing one another.\n\nUnderrepresented Powered groups in particular shouldn't be at odds, made to feel they can only advance if another falls behind. This is yet another reason that The Voiceless are wrong for going after Ani-Powereds, for trying to get attention by taking it from another Powered minority group. The reality is that, if you all united, you'd be impossible to ignore.\n\nThroughout this entire experience, you've had no choice but to wonder: Why you? Beyond Loa Shift's agenda and JK's treatments, why were you the one put in this position, the one given this platform? Now you feel like you finally know. \n\nYou have to be the one to show everyone how to break down Powered category barriers, because you are the living embodiment of Underrepresented groups coming together as one.\n\n*page_break\n\nYou've sometimes thought of your multiple Powered identities as a disadvantage, sometimes as a burden, or sometimes as a strength—but always as something that set you apart from the rest of the Powered community. However, now you see it so clearly: this uniqueness is what makes you valuable and powerful beyond belief.\n\nRealizing this, you feel calm, like everything that has been clouding your vision suddenly clears, like a burden you didn't even know was there just lifts off your shoulders. Things snap into focus, as if everything you've been through has been adding up to this moment of epiphany. \n\nYou've been chasing ideas of who you think you want to be and who everyone else wants you to be, but for this moment, you feel centered. You feel confident in the unshakable knowledge of who you are meant to be and what your purpose in all of this craziness must be.\n\nYou know that this kind of clarity can't possibly last, so you try to latch on to it while it's here. Now that you've had this realization, now that you know your mission, you must decide how best to achieve this goal.\n\n*choice\n\t#I need to use this platform to speak out about breaking down categories, to show The Voiceless the error of their ways and become a living embodiment of true activism.\n\t\t*set traditional %+30\n\t\t*set moneyed +3500\n\n\t\tIt would be so easy to use all the anger and passion you have inside to lash out, to strike back and become violent. However, you know you must use your anger as fuel to spread empathy, compassion, and change. Harnessing your anger this way is a fine line to walk, but it's the only way you can become the change you want to see in the world.\n\n\t\tYou're a born advocate, so it's time to show the world what that means.\n\n\t\t*if (traditional > 70)\n\t\t\t*achieve traditionalhighfinal\n\t\t\t*set legended +3\n\t\t\t*set societal %+30\n\t\t\t*goto tradsocmon\n\t\t*else\n\t\t\t*set societal %+15\n\t\t\t*label tradsocmon\n\n\t\t\tAnd now that you have some real income, you're going to start by putting your money where your mouth is. You're going to donate immediately to The Slaughtering Ani-shelter relief fund, to begin setting the right kind of example.\n\t\t\t*goto youokayjk\n\t#I'm going to unite The InfraCircle and The Voiceless, to flip the traditional structures of Power. And I'm going to do it as a mole inside The Hero Project, until I can proudly join this united Underrepresented front.\n\t\t*set traditional %-30\n\t\t*set moneyed +3500\n\n\t\tThey say you need to be the change you want to see in the world—and you know that joining and uniting the Disembodied Voiceless and the Ani-Powered InfraCircle will be exactly that. This kind of radical action may label you many things in this modern world, but you're done caring about labels.\n\n\t\t*if (traditional \u003c 30)\n\t\t\t*achieve radicalhighfinal\n\t\t\t*set legended +3\n\t\t\t*set societal %+30\n\t\t\t*goto radsocmon\n\t\t*else\n\t\t\t*set societal %+15\n\t\t\t*label radsocmon\n\n\t\t\tAnd now that you have some real income, you're going to start by putting your money where your mouth is.\n\n\t\t\tYou're going to begin secretly funneling money to The InfraCircle, now that the group is in need of a new funding source.\n\t\t\t*goto youokayjk\n\t#This experience has made me famous, and I'm going to use that fame to make myself as wealthy, powerful, and influential as possible. Then we'll see what kind of change happens.\n\t\t*set traditional %-30\n\t\t*set moneyed +3500\n\n\t\tThey say the best revenge is living well, so you're going to become the ultimate example of that. It's time to show the world that Underrepresented Powereds deserve to live lives of privilege and power as well—after all, having money is history's truest equalizer.\n\n\t\tYour first responsibility is to yourself—and once you've taken all that you can get, you'll see about using these resources to change things. In the meantime, you're going to tear down any obstacles in your way, just as you've always done.\n\n\t\t*if (traditional \u003c 30)\n\t\t\t*achieve radicalhighfinal\n\t\t\t*set legended +3\n\t\t\t*set societal %-30\n\t\t\t*goto radpersmon\n\t\t*else\n\t\t\t*set societal %-15\n\t\t\t*label radpersmon\n\n\t\t\tAnd now that you have some real income, you're going to start by putting your money where your mouth is. You need money to make money, so it's time to start looking into some private investments that will help your riches get richer. \n\t\t\t*goto youokayjk\n\t#I'm going to do my job, and I'm going to do it well, to build the best life possible for JK and I. The fact that this job involves winning The Hero Project, stopping The Voiceless, and setting an example for Underrepresented Powereds everywhere is a very welcome bonus.\n\t\t*set traditional %+30\n\t\t*set moneyed +3500\n\n\t\tFirst and foremost, you need to lead by example and show that Powereds like you and JK are capable of living good, healthy lives. Taking care of JK will always be your first priority.\n\n\t\tHowever, this doesn't mean that you won't still take a stand for all the things you've come to believe in. As best you can, you're going to be the change you want to see in the world. You just feel so lucky to have found a calling that allows you to make all of these dreams come true, in one package.\n\n\t\t*if (traditional > 70)\n\t\t\t*achieve traditionalhighfinal\n\t\t\t*set legended +3\n\t\t\t*set societal %-30\n\t\t\t*goto tradpersmon\n\t\t*else\n\t\t\t*set societal %-15\n\t\t\t*label tradpersmon\n\n\t\t\tAnd now that you have some real income, you're going to start by putting your money where your mouth is. You're going to start saving and investing, to build a better world starting at home, with you and JK.\n\t\t\t*goto youokayjk\n\n*label youokayjk\n*page_break\n\n*if (traditional > 70) and (societal > 70)\n\t*achieve tradsocfinal\n*if (traditional > 70) and (societal \u003c 30)\n\t*achieve tradpersfinal\n*if (traditional \u003c 30) and (societal > 70)\n\t*achieve radsocfinal\n*if (traditional \u003c 30) and (societal \u003c 30)\n\t*achieve radpersfinal\n\nAs you decide upon this important resolution, Camilla's eyes suddenly flash with greenish energy, drawing your attention back to the conclusion of her speech.\n\n\"As a Powered woman myself, one who has never chosen to live my life as a hero or in the spotlight, I have decided to use this terrible platform Miss Boss's sacrifice has provided to become an advocate for change. In the months to come, you should be seeing much more of me, as I use my voice to speak where Miss Boss was silenced. And I sincerely hope that you'll join me in this mission.\"\n\nHearing this call to action, you also now know what you must do to complete the mission you've set for yourself: you need to stay on The Hero Project. No, not just stay…\n\nYou need to win The Hero Project and earn a place on The American Protectorate. Doing so will be the surest way to earn the platform, resources, and influence necessary to break down Powered barriers.\n\nAs Camilla leaves the stage and the lights go down, you can already tell this reception will soon come to an end. Which is actually fine by you, because in so many ways…\n\nThis is just the beginning.\n\n*page_break LATER THAT NIGHT\n\nYou run through a martial-arts routine in silence, with no cameras or other people around for the first time in slugger knows how long. You're just beginning to feel centered when, of course, the door swings open. You turn to look and are at least relieved to find it's just JK.\n\n\"Don't stop because of me,\" JK says as she rolls into the room. \"I was consulting at a DRPR briefing and I have another meeting with Lyra soon.\"\n\n\"No, it's been too long since we've had a chance to talk,\" you say, sitting on the bed and taking a breath. \"Are you sure you're okay with all of this? I mean, you didn't exactly ask to become an official DRPR Disembodied Advisor.\"\n\n\"I want to do anything I can to help,\" JK says, rolling directly over to her computer holo-screen. \"Though I'm not sure how much more helpful I'll be, now. I still can't find any trace of StarSoar and I've lost all contact with Outlet—I think he was trying to secretly recruit me to The Voiceless before, but that ship has sailed. Oh, I also have an appointment with the Herologist to see if my new nerve blasts work on the same principles as Less's. If they do, the Herologist thinks I might be able to reconnect what Less disconnected in The Voiceless's minds.\"\n\nJK speaks all of this almost as if in one sentence, having gone into full tunnel-vision ramble mode. You can also tell that she's about to dive into the full tunnel-vision Disspace mode too, so you make sure to speak up before she can. \"This is all good, JK, but shouldn't you be focusing on your physical therapy? Now that you're healed, with enough practice you should be able to walk and unlock all kinds of latent Powers.\"\n\n\"You don't think I know that? It can wait. These are our people, ${named},\" JK says, turning to face you with an edge in her voice. \"Someone has to stand up for us.\"\n\n*page_break\n\n\"You say that like it's an accusation,\" you return, taken aback by the force behind JK's words.\n\n\"I'm willing to sacrifice whatever it takes to make things better for Underrepresented Powereds, so that no one else has to go through what we've gone through,\" JK says, looking like she is suddenly letting loose a flood of pent-up emotion. \"I just cannot understand why you don't feel the same way.\"\n\nHearing this, you find yourself speechless. How on earth can JK say these things after all you've sacrificed to make her better, after all you've accomplished being on The Hero Project?\n\n*page_break\n\n*comment The comments below are for my internal use to keep track of this complicated coding, I have an excel spreadsheet that explains the 8 outcome combos without having to retrace the logic.\n*if ((ssprove) and (griffingone)) and (trytosavemb)\n\t*comment excel achieve 1\n\n\t\"I know that whatever happened in that cave with Miss Boss had something to do with Loa Shift!\" JK nearly shouts. \"Why won't you tell me what she asked you to do?\"\n\n\tYou look back at JK, wishing she could understand.\n\t*if missbossdead\n\t\tYou tried to save Miss Boss in the end, but it just wasn't enough. What would JK say if she knew what you were supposed to do in those caves? Would she even believe that you tried your best to save Miss Boss?\n\n\t\tStill,\n\t\t*goto risksyoutook\n\t*else\n\t\tYou did all you could to save Miss Boss, when most others would have just let her die. Not only that,\n\t\t*label risksyoutook\n\t\tyou risked so much to protect StarSoar and keep Transfer in the competition, to stand up for your fellow Underrepresented Powereds and be a positive figure while doing all you could to ensure JK received her treatments. What more does JK want from you? You've accomplished the seemingly impossible.\n\n\t\t\"I told you, I'm not ready to talk about what happened in those caves,\" you say, already suppressing flash images of broken bones and caved-in walls. \"But you have to know that everything I've done has not just been for you, it's also been for the things we both believe in. Nothing has been easy about juggling both.\"\n\n\t\t*page_break\n\t\t*achieve didallyoucould\n\t\t*goto jkturnstearful\n*elseif ((ssprove = false) and (transfergone)) and (missbossdead)\n\t*comment excel achieve 2\n\n\t*if sswarn\n\t\t\"Sure you tried to warn StarSoar, but were you really trying to help him, or just get him to quit?\n\t*if (ssblackmail) or (sspublic)\n\t\t\"I would never have done what you did to StarSoar, no matter what.\n\tThen you sent Transfer home when there was no actual risk to you making the Final 12. And I know that what happened to Miss Boss had something to do with Loa Shift, even though you won't tell me. But I bet what I'm imagining can't be worse than the reality, given all you've already done!\"\n\n\tJK's words cut you, but she doesn't seem to care as she rolls on.\n\n\t*page_break\n\n\t\"And the worst part is that you won't even listen or talk to me about any of it. If you had stopped for a second, I would have asked whether you're just using me as an excuse to do all of these horrible things to get ahead, things you'd want to do anyway.\"\n\n\tHearing this last stab, you immediately flash with anger. How can JK say all of these terrible things? Is this what she really thinks of you? These decisions you've had to make are so much more complicated than JK is making them out to be.\n\n\tBefore you strike back at JK, however, you listen to the tiny part of you that knows you must be feeling this rage because JK has hit a nerve. The truth is, you climbed over a lot of other heroes to ensure JK's treatments. Was there really no other way, or did you just let yourself believe that?\n\n\t*page_break\n\t*achieve sacrificeditall\n\t*goto easytosay\n*elseif (ssprove = false)\n\t*if sswarn\n\t\t\"You may have warned StarSoar instead of selling him out, but were you really trying to help him, or just get him to quit?\n\t*if (ssblackmail) or (sspublic)\n\t\t\"I would never have done what you did to StarSoar, no matter what.\n\t*if transfergone\n\t\tThen you sent Transfer home when there was no risk to you making the Final 12. And I know that whatever happened in that cave with Miss Boss had something to do with Loa Shift. Why won't you tell me what she asked you to do? I have to say, what I'm imagining can't be worse than the reality, with all you've already done!\"\n\n\t\tHearing this last stab, you immediately flash with anger. How can JK say all of these terrible things? Is this what she really thinks of you? These decisions you've had to make are so much more complicated than JK is making them out to be.\n\n\t\tBefore you strike back at JK, however, you listen to the tiny part of you that knows you must be feeling this rage because JK has hit a nerve. The truth is, you climbed over some other heroes to ensure JK's treatments. Was there really no other way, or did you just let yourself believe that?\n\n\t\tYou look back at JK, wishing she could understand how difficult this has all been for you. Whatever else happened, you did all you could to save Miss Boss, when most would have just let her die. You might have let StarSoar and Transfer fail out of the competition, but when actual lives were on the line, you fought to do the right thing.\n\n\t\t*comment excel category 3 (trytosavemb & cryptocoma automatic routed here, missbossdead routed above)\n\t\t*page_break\n\t\t*goto easytosay\n\t*else\n\t\tAnd I know that whatever happened in that cave with Miss Boss had something to do with Loa Shift. Why won't you tell me what she asked you to do? What I'm imagining can't be worse than the reality.\"\n\n\t\tHearing this last stab, you immediately flash with anger. How can JK say all of these terrible things? Is this what she really thinks of you? These decisions you've had to make are so much more complicated than JK is making them out to be. And does she not care about the risk you took to protect Transfer?\n\n\t\t*if trytosavemb\n\t\t\tNot to mention the fact that you tried to save Miss Boss, when push came to actual shove. Clearly, you've done nothing but try to make up for what happened with StarSoar, ever since.\n\n\t\t\t*comment excel category 4 (Miss Boss could be dead or in crypto coma, but language here doesn't need to be specific)\n\t\t\t*page_break\n\t\t\t*goto easytosay\n\t\t*else\n\t\t\tBefore you strike back at JK, however, you listen to the tiny part of you that knows you must be feeling this rage because JK has hit a nerve.\n\n\t\t\tThe truth is, you did climb over some heroes to ensure JK's treatments. Was there really no other way, or did you just let yourself believe that?\n\n\t\t\t*comment excel category 5 & 7\n\t\t\t*page_break\n\t\t\t*goto easytosay\n*else\n\t*if transfergone\n\t\t\"You may have protected StarSoar, but why couldn't you try to do the same for Transfer, especially when there was no actual risk of you making the Final 12? And I know that whatever happened in that cave with Miss Boss had something to do with Loa Shift. Why won't you tell me what she asked you to do?\"\n\n\t\tHearing this last stab, you immediately flash with anger. These decisions you've had to make are so much more complicated than JK is making them out to be. \n\t\t*if trytosavemb\n\t\t\tNot to mention the fact that you tried to save Miss Boss, when push came to actual shove. Voting out Transfer may have been your only slip, and it certainly wasn't so black and white, given all the things Transfer said and did.\n\n\t\t\t*comment excel category 6 (Miss Boss could be dead or in crypto coma, but language here doesn't need to be specific)\n\t\t\t*page_break\n\t\t\t*goto easytosay\n\t\t*else\n\t\t\tBefore you strike back at JK, however, you listen to the tiny part of you that knows you must be feeling this rage because JK has hit a nerve.\n\n\t\t\tThe truth is, despite protectig StarSoar, you did climb over some heroes to ensure JK's treatments. Was there really no other way, or did you just let yourself believe that?\n\n\t\t\t*comment excel category 7\n\t\t\t*page_break\n\t\t\t*goto easytosay\n\t*else\n\t\t\"I know Miss Boss's death had something to do with Loa Shift,\" JK nearly shouts. \"Why won't you tell me what she asked you to do in that cave?\"\n\n\t\t[i]Because I'm afraid you'll never forgive me if I do![/i] you scream back in your own head.\n\n\t\tYou risked so much to protect StarSoar and keep Transfer in the competition, to stand up for your fellow Underrepresented Powereds and be a positive figure while doing all you could to ensure that JK recieved her treatments…but that same protection didn't extend to Miss Boss when actual lives were on the line.\n\n\t\tWas there really no way to stop Miss Boss from getting so far into The Falls, or did you just let yourself believe that?\n\n\t\t*comment excel category 8 (This ends up being ssprove, griffingone and directly letting missbossdead, since trytosave is alredy accounted for)\n\t\t*page_break\n\t\t*goto easytosay\n\n*label easytosay\n\n\"Those are easy words for you to say!\" you shout back, unable to contain yourself anymore. \"You didn't actually have to make those choices, but I did. If the roles were reversed, if it were my life at stake, tell me you wouldn't have done the same things! How can you insinuate that I'm selfish or thoughtless when all I've done is make these sacrifices for you?!\"\n\n*label jkturnstearful\nHearing your response, JK's anger very suddenly gives way to a flood of tears welling from behind her eyes. \n\n\"I know,\" she whispers, barely audible. \"Why do you think I'm trying so hard to make up for it? I just feel so…helpless.\"\n\nSuddenly your own anger fades and you see JK for what she is: a scared teenager. It's so easy to forget that JK has been thrust into this new situation just as much as you have, with so much less experience. As strong and smart as she is, JK has barely been able to leave the apartment since her Powered transformation. \n\nAnd now she has been placed in this very public spotlight beside you, with cameras and producers and all this pressure. Perhaps even more pressure, given her Disspace connections. Is it any wonder she's emotional? Remembering this, you think:\n\n*choice\n\t#JK is right. I need to do more. And now I can.\n\t\t*set rlshp_jk %+30\n\n\t\tSo you make sure to say exactly that.\n\n\t\tJK nods back at you, but then she has to turn her head away, because she doesn't want you to see her cry.\n\t\t*goto jkrols\n\t#No matter her age, JK should know better. She should be more grateful. Period.\n\t\t*set rlshp_jk %-15\n\n\t\tSo you make sure to say exactly that.\n\n\t\tJK bites her lip and then turns her head away, because she doesn't want you to see her cry.\n\t\t*goto jkrols\n\t#I'm not just JK's older sibling—I'm like a parent to her. It's my job to protect her, whether or not she likes it or understands it.\n\t\t*set rlshp_jk %+15\n\n\t\tIt's up to you to keep protecting JK while she learns how to operate in the real world and in her new body. You have to teach JK that as much as it is important to help your community, you can't help anyone if neither of you is healthy enough to do so in the first place.\n\n\t\t\"I'm sorry, JK,\" you say. \"I know we're both just trying to do our best here, but I'm not perfect. I wish I was. But you're not perfect either, and you won't be able to help anyone if you don't focus on your recovery as well as your responsibility.\"\n\n\t\tJK nods back at you, but then she has to turn her head away, because she doesn't want you to see her cry.\n\t\t*goto jkrols\n\t#JK is just being a moody teenager. \n\t\t*set rlshp_jk %-30\n\n\t\tSo you make sure to say exactly that.\n\n\t\t\"You always do that! You just write me off!\" JK screams, now full-out. \"When are you going to start realizing that what I want matters too!\"\n\t\t*goto jkrols\n\n*label jkrols\n\nWithout another word, JK rolls into the bathroom to be alone. She closes the door and, despite yourself, you let her. Because you need a moment to gather yourself as well.\n\n\"Teenagers, am I right?\" MeChip Prodigal suddenly appears to commiserate, but you're too preoccupied to respond.\n\nYou and JK have always done your fair share of sibling bickering, but this feels different, somehow. Is this just the stress of everything you've been through recently, manifesting itself? A normal reaction to the intense changes swirling in your lives? \n\n*if (rlshp_jk \u003c 50)\n\t*achieve jkrift\n*if (rlshp_jk \u003c 70)\n\tOr is this the first warning sign of some deeper shift, some cracks forming in the foundation of your relationship? Could a rift be forming as you and JK begin growing into different people? \n*if (rlshp_jk >= 70)\n\t*achieve jkcloserever\n\tIt has to be, you think. Nothing could ever break you and JK apart, not even an experience as insane as this one…right? \nYou find yourself fingering your locket as this dark thought crosses your mind, because it is not one you've ever had to consider…nor ever want to consider.\n\nYou're thinking about going up to the roof again to clear your head when the bathroom door unexpectedly reopens. You turn and your jaw drops, because you find JK…\n\n*page_break\n\n…standing on her own two feet, her wheelchair left empty in the bathroom behind her.\n\n\"I'm sorry,\" JK says, still standing on her own strength. \"I know we don't always agree, but I know you're trying your best. I wouldn't be here if it weren't for all that you've done.\"\n\nIt takes you a few moments to process this sight and JK's words, but once you do, you run to JK and pull her into the tightest hug. Seeing JK stand like this washes every other thought away. Because it makes everything feel worth it.\n\n\"I didn't mean to take it out on you,\" JK says, pressing her face into your shoulder. \"It's just, this new body, the things I can do now…I know these changes needed to happen to save my life, but my Powered Disembodiment made me who I am. Part of me is afraid that if I leave that behind, I'm going to lose myself. Does that sound totally crazy?\"\n\n\"Not even a little bit, JK,\" you say, pulling her even closer. \"Trust me, I understand that feeling more than you know.\"\n\n*page_break\n\n\"We just have to be better,\" JK whispers into your ear, still hugging you. \"I know it isn't fair, but we have this opportunity. We can't waste it by not being strong, right?\"\n\n\"I know. Which is why I've already decided that I'm staying in The Hero Project and trying my best to win. You don't have to worry about convincing me,\" you answer, taking a deep breath and stepping back to look at JK standing once again. \"So I guess this is what our life looks like now?\"\n\n\"Oh, you don't even know the half of it,\" JK says, finally cracking a smile. \"I won't tell you much because I don't want to get Weaver in trouble, but the way the public is reacting to you, ${named}, the kind of…\" \n\nJK then pauses, consid
