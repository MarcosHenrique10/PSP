ice\n\tTop Secret\n\tMade the Ultimate Sacrifice for Societal Views\n*achievement turnaraound visible 15 Personal Evolution\n\tTop Secret\n\tDisregarded Personal Motivations to Selflessly Protect Miss Boss\n*achievement respectedfinal visible 10 Like A Dark Horse\n\tRespected Hero\n\tThe Respected Dark Horse Hero\n*achievement fearedfinal visible 10 Like A Dark Upstart\n\tFeared Hero\n\tThe Feared Dark Upstart\n*achievement mbdead visible 10 The Fallen\n\tThe Fate of a Hero\n\tMiss Boss Dies\n*achievement mbalive visible 10 The Falls\n\tThe Fate of a Hero\n\tMiss Boss Lives\t\n*achievement finalten visible 10 The Final Ten\n\tMake Final Ten: Survive The Falls\n\tMade Final Ten: Survived The Falls\n*achievement lyrapersp visible 10 Interlude Character Two\n\tTop Secret\n\tUnlocked New Character Perspective: Lyra\n*achievement embraceyou visible 15 Embracing the New You\n\tImage Lesson Learned\n\tLearning to Wear Your Identities with Pride\n*achievement walldown visible 15 Letting Your Walls Down\n\tSeparatist Lesson Learned\n\tLearning to Let Others In\n*achievement publicfinal visible 15 Stand in the Spotlight\n\tPublic Figure\n\tFinal Public Stat High\n*achievement privatefinal visible 15 Lead By Example\n\tPrivate Role Model\n\tFinal Private Stat High\n*achievement upafinal visible 10 Making An Impact\n\tRaising Underrepresented Powered Awareness\n\tFinal UPA Stat High\n*achievement didallyoucould visible 20 Uncompromising Moral Compass\n\tTop Secret\n\tFound a Way to Protect Everyone and Everything You Care About\n*achievement sacrificeditall visible 20 Made Necessary Sacrifices\n\tTop Secret\n\tSacrficed What You Must\n*achievement jkrift visible 10 I Don't Think You're Ready\n\tGrowing Apart from JK\n\tDeveloping Rift in Relationship with JK?\n*achievement jkcloserever visible 10 For This Jelly\n\tGrowing Closer to JK\n\tCloser Than Ever to JK\n*achievement traditionalhighfinal visible 15 Tradition!\n\tAiming to Improve Existing Society\n\tFinal Traditional Stat High\n*achievement radicalhighfinal visible 15 To The Extreme\n\tAiming to Replace Existing Society\n\tFinal Radical Stat High\n*achievement tradsocfinal visible 20 The Advocate\n\tTraditional Societal Main Character \n\tMeant to Be a Heroic Advocate\n*achievement tradpersfinal visible 20 The Striver\n\tTraditional Personal Main Character \n\tMeant to Continue to Strive for More\n*achievement radsocfinal visible 20 The Revolutionary\n\tRadical Societal Main Character \n\tMeant To Be A Revolutionary…And Maybe Even An Extremist?\n*achievement radpersfinal visible 20 The Anarchist\n\tRadical Personal Main Character \n\tMeant to Be an Anarchist, Always Protecting Your Inner Circle\n*achievement loaclueone visible 15 The First Clue\n\tTop Secret\n\tUnlocked the First Loa Shift Clue\n*achievement loacluetwo visible 15 The Second Clue\n\tTop Secret\n\tUnlocked the Second Loa Shift Clue\n*achievement legendcatone visible 15 Legend Level: Civilian (0-15)\n\tOfficial DRPR Powered Civilian \n*achievement legendcattwo visible 15 Legend Level: Trainee (16-40)\n\tOfficial DRPR Powered Trainee\n*achievement legendcatthree visible 15 Legend Level: Amateur (41-60)\n\tOfficial DRPR Powered Amateur\n*achievement legendcatfour visible 15 Legend Level: Professional (61-80)\n\tOfficial DRPR Powered Professional\n*achievement achievethewar visible 15 MeChip Warning System\n\tUnlock MeChip Warning System\n\tUnlocked MeChip Warning System\n\n*product warningsysnine\n*product youpower\n\n*comment skip_description in gameload; this comment satisfies the tester\n\n*goto_scene gameload\n", "youpower": "*comment x\n[b]THE YOUPOWER PROJECT[/b]\n\nAtmos burned as he fell. The graphene arcs of the tower's gyro-scoping counterweight system split the harsh flicker of blue flames into a thousand shards of piercing light. A handful of melon-sized camera orbs trailed the falling Hero like a school of parasitic fish diving after a sinking host. \n\nHe tore at his arms and legs, desperately trying to free the burning sub-dermal YouPower components that cooked him from the inside. The faster he fell, the more the rushing air fed the flames. With a sickening scream, Atmos ripped a component loose, taking a sizable portion of his forearm with it. He flung it aside and the smoking mass of flesh and melting electronics smashed against a spinning graphene arc and exploded in a shower of sparks and ash.\n\nTwo other Heroes rose from the darkness below, ignoring the burning man tumbling past them as they continued their race to the top of the tower. They dodged the spinning arcs of graphene, creating a vortex behind them that pulled the rising smoke from the plummeting Hero into a tiny cyclone that rose in their wake. Atmos was now nothing more than a blur of indigo light lost in a death spiral. He flailed, spinning and grasping and screaming. One of his legs lashed out and the world suddenly turned to static.  \n\nKendrick looked away from the screen. His hands began to shake, nearly causing him to drop the cardboard tray of coffee cups he was holding. Atmos had kicked one of the camera orbs so violently that its lens had dislodged. But it had continued to record audio. Though Kendrick could no longer see the man's burning descent into the bowels of Olympus Tower, he could still hear his howls of agony piped through the speakers. His screams were so loud, so powerful, they had ruptured the orb's surround sensor, so that his agonizing wails were only coming through in mono.  \n\nAtmos's screams filled the darkened screening room like water, making it difficult for Kendrick to catch his breath. He needed the video to come back, to see the horror creating such terrible sounds. Without it, his mind painted the picture for him. A picture he didn't want to see. \n\nA picture he didn't want to remember. \n\nLyra stood with her arms folded, eyes focused on the pixels swirling before her. The glow of light from the screen reflected off a single bead of sweat tracing its way down the hollow of her cheek. She pulled at the neck of her black turtleneck and said, \"It comes back in a second.\" Then she noticed Kendrick. \"Oh, thank God. Coffee.\"\t\n\nKendrick offered a weak smile as he offered the tray, but Lyra didn't notice his distress. Neither did Bastion or Cora as they took their own drinks from the tray. \"Did they say what happened to his tech?\" Bastion asked.\n\nCora's eyes flicked back and forth as she read the retinal holo-display of her MeChip embedded in her wrist and said, \"YouPower said it was Atmos's sub-dermal mods that made it react that way to the graphene in the tower's counterweights. This, folks,\" she indicated Atmos's screams with a delicate finger, \"is exactly why you never void your warranty.\"\nBastion licked the last remnants of a jelly donut from his fingers. \"Who won the Olympic Tower Run, anyway?\" \n\n\"Force Ray, I think,\" said Cora. \n\nLyra pulled the lid off her coffee and blew, sending wisps of steam to mingle with the static. \"No, she got the panel's honorable mention. Ten-Blade Annie won.\"\n\n\"Oh, yeah.\"\n\nThey talked over Atmos's screams like they were trying to be heard over the din of a raucous dinner party. Kendrick felt a terrible urge to grab Cora's coffee and scald every square inch of her perfect face with it. He was furious with her, with all of them, though he didn't know why. Atmos survived his fall. Everyone knew that. It even afforded him a bit of added celebrity following the race. So why did their ambivalence to Crosswind's suffering gall him so badly? \n\nNo, Atmos. Atmos's suffering. It was Atmos screaming, not Crosswind. Kendrick told himself over and over again that it was Atmos, as if that would somehow lessen the horror of listening to someone else's impossible agony. But no matter how much he tried to convince himself, there was no escaping the memory those screams pulled to the surface. Crosswind's blackened skin, his perfect mouth frozen in a rictus sneer, the smell, good God, the smell….And his three colleagues were more concerned with who won a silly race to the top of the world's first spacescraper.   \n\nKendrick needed to sit down. His anger wasn't fair and he knew it. Cora was a sweetheart and Bastion was, well, Bastion. As for Lyra, she was as kind as a person with her drive could be, he supposed. Kendrick hadn't been her assistant for very long, but he already understood that When Lyra decided something, reality followed. It had taken Kendrick a couple weeks to convince Lyra that his name wasn't actually Rick, and that no, he hadn't recently changed it.  \n\n\"Okay, here we go,\" Lyra said as the snowy pixels on the screen finally coalesced back into video. \n\nAtmos was there; now the open flames were gone, but embers still glowed as they drank in the rushing air. His howls of pain merged into a single ghostly moan. \n\n\"Now, watch this,\" Lyra said.\n\nThe light around Atmos bent in a strange way. The air beneath him rippled as it compressed, slowing his descent. One of the camera orbs circled above Atmos, showing the black abyss yawning below. A light emerged from the darkness. Within just a few seconds, a man rose into view and caught Atmos in his arms. Though he was wearing a nearly full suit of YouPower equipment, Kendrick could easily see a bright red caduceus on his arm, indicating that he was an EMT. \n\n\"I got you, buddy.\"\n\nAtmos only moaned in response. The EMT carried Atmos to an exposed girder and lay him down. There was another ripple as the EMT moved his hand over Atmos's body, only instead of compressing the air, he created a vacuum that extinguished the smoldering embers. He then pulled a syringe from a pouch at his hip and plunged it into Atmos's arm. Atmos let out a long breath and his eyes fluttered closed.\n\n\"I've got him. Bringing him down now,\" the EMT said into the microphone patch at his throat. \n\nLyra sipped her coffee then said, \"I get chills every time I see it. Most people use the Atmonipulator to breathe underwater, fly above ten thousand feet, the usual kind of thing. But this guy…\"\n\nBastion slurped his latte then said, \"Gotta admit, it's impressive. But why are you showing us B-roll from a race a few weeks ago?\"\n\nLyra touched the wall and the overhead lights came on. \"This is why we don't usually let tech support sit in on casting, Bastion. You know we're doing a spin-off. And not just a Hero Project clone. Something different, something grittier, more street-level. Something documentary style instead of the bright lights of the main competition. Think about it. YouPower is the preferred toy of the Haves and the Have Mores. But with their new line of affordable tech coming out, everyone will have access to Power. It's going to shake up the world in a way we haven't seen since natural Powers first emerged. I want to explore that. Powered, unPowered, YouPowereds, living together right here in the heart of Triton. Experienced YouPowereds aren't exactly easy to find yet, so I want to cast people like [i]him[/i].\" She pointed at the screen where the EMT had Atmos cradled in his arms, the two of them slowly sinking into the darkness below. \n\n\"Hey, techies know stuff, too. Like, doesn't the network usually sit in on casting?\" Bastion asked.\n\n\"I already have all the DRPR approvals we need, and the network is giving me a long leash on this. They just want a sizzle reel finished by the end of the week. Quick, dirty, to the point.\"\n\n\"Is GG joining us?\" Cora asked.\n\n\"He's busy staying on top of The Hero Project follow-up special on The American Protectorate. I left Weaver behind to keep an eye on him. Part of how I got the network to sign off on this little passion project was the promise of a razor-thin budget, so it's just going to be us in this room. Can we do it?\"\n\nBastion nodded. \"If Cora can stop being a perfectionist for once in her life, should be easy.\"\n\nCora pulled a curl of thick black hair away from her eyes and said, \"Being a perfectionist is the very reason Lyra hired me. But yes, it should be easy.\"\n\n\"Good.\" Lyra turned to Kendrick and said, \"Get us set up with a studio in the Tonaka district and…Kendrick, are you feeling okay? You look terrible.\"\n\n\"What? Oh, I, uh…didn't eat any breakfast,\" Kendrick lied.\n\n\"Bastion, give him a donut.\"\n\n\"Thanks, but I don't want a donut.\"\n\n\"Eat a slugging donut before you pass out. Let's get moving, people. We've got a lot of work to do.\"\n\nBastion tossed a stale donut at Kendrick. He begrudgingly shoved the flavorless dough into his mouth and waited for his hands to stop shaking before he searched for available studios on his MeChip.\n\n\n\n*page_break\n\nThe island city of Triton glimmered outside the hotel's vacuum-tempered windows. Its three spacescrapers rose up from the waters of the Pacific Ocean like the great trident of the city's namesake. The city was the brainchild of YouPower's CEO, who had designed every square inch of the fabricated island and the urban utopia which sat upon it with a single goal in mind: to celebrate the technical wonders of YouPower. The intricate details of the spacescrapers, the meandering yet efficient sidewalk system that catered to city's core pedestrian population, the elegant skyline of the smaller buildings (still impressively tall in their own right), and the chaotic dance of YouPowered people moving about a landscape designed for three-dimensional travel all worked to make the city a showcase of how grand it could be for someone living a YouPowered life.     \n\nKendrick noticed a few Powered people milling about below, using their natural gifts to move about the city. The rest, however, relied on YouPower technology. Half a dozen teenagers geared up with bespoke YouPower ion drives flanked a jet approaching for landing and waved at the people inside before a woman decked in the standard YouPower truncheon suit all Triton law enforcement wore chased them away.\n\nKendrick had always thought his hometown, Millennia City, was the shiniest beacon of twenty-second century progress, but his first visit in Triton was forcing him to reconsider that notion. Triton might only be a few hours away from MC, but Kendrick couldn't help but feel worlds away in this brand-new, tech-laced utopia. He could feel the city humming underneath him and something about it just felt like home—and that scared Kendrick more than he'd have liked to admit.\n\nThe rush to prepare for the show had kept Kendrick's mind from dwelling too much on the events of the morning. Seeing Atmos burn had brought up too many painful memories and it had taken Kendrick the better part of an hour just to stop his hands from shaking. He was grateful for the distraction the job provided and the calming effect the stellar view of Triton below had on him. \t\n\nBastion tapped Kendrick on the shoulder. \"Jason asked about you again.\"\n\nKendrick knew he was lying. He was sure it was Bastion's wife, Tyressa, who had really asked about him. She had cornered Kendrick at a wrap party and somehow convinced him to meet with her brother, Jason. He was pleasant enough, but had confided early in their date that he was only there to get Tyressa off his back. Jason was actually dating someone else whom Tyressa simply could not stand and the only way to keep the peace in the family was to claim he was single. Which meant pretending to date. Jason had then launched into an evening-long monologue regaling Kendrick with tales about the wonder that was his boyfriend, all while MeMessaging said wonder under the table throughout dinner. So Kendrick had spent that time politely smiling and using his own MeChip to silently compose his Yelp review on the restaurant's website. He hadn't spoken to Jason since.\n\n\"Oh? What did he say?\"\n\n\"Just wanted to know how you were doing, what you've been up to. You know, if you're seeing anyone.\"\n\n[i]Your studio reservation has been confirmed[/i], Kendrick's MeChip personality, Butler Julian, intoned inside his head. [i]Would you like me to give you the details or shall we see if you've developed any telepathic abilities since breakfast?[/i] \n\nKendrick held up his MeChipped wrist toward Bastion and said, \"I'm a bit busy dating my work right now.\" Which wasn't a lie. But he had to admit it was an excuse. Dating was never his strong suit, and having a busy work schedule seemed like an easy way to explain why. \n\n\"Yeah, that's what I told her.\"\n\n\"Her?\"\n\n\"My wife. She was asking for Jason.\"\n\nAnd there it was.\n\n\"Oh, hey, also…\" Bastion leaned in close and lowered his voice. \"When we get set up, you mind giving me a hand with the i/o interface? The anti-aliasing isn't lining up right.\"\n\nKendrick nodded. \"Yeah, sure.\" Bastion was Lyra's tech support. He operated every piece of technical equipment they needed to run a show, from camera orbs to the MeChip mixing interface to the final sub-corneal editing suite. It was a poorly kept secret, though, that Bastion had Kendrick fix the trickier technological hiccups he encountered. He didn't want Lyra thinking he wasn't up to doing his job, but Kendrick just had a knack for fixing electronics. Quickly. And in this business, time was very much money. \n\nLyra sauntered up and asked, \"How we doing, Kendrick?\"\n\n\"Studio's confirmed. B-1 at the Conclave. Right off Tonaka Square.\"\n\n\"Don't forget we'll need accommodations for Jury and Summit when they get here next week. They have a short window to act as Mentors between American Protectorate missions, so we'll have to make the best use of their time.\" \n\nKendrick had MeChip Julian make a note for him to book Jury's room close to Lyra's, since Kendrick had been one of the select few to discover that Lyra had also been making the most of Jury's time after hours, as of late.\n\nCora leaned her head over the back of her chair on the far side of the room and said, \"I've booked a few possibilities for tomorrow. Core Chaser, HammerCleave9000—\" Cora raised her hand, stopping Lyra before she could speak. \"Don't worry, if we cast her I'll get her to change the name. And I also lined up that EMT from the Olympus Tower Run. He calls himself Emergent.\"\n\n\"Oooh, then see if you can get Atmos to come in for some B-roll. We can use him for added human interest. Emergent, a Hero's Hero.\"\n\n\"I'll have him booked by the time room service arrives,\" Cora said, disappearing back into her chair.\n\nTen seconds later, there was a knock at the door.\n\nEleven seconds later, Cora held up her wrist and said, \"Done.\" \n\n\"Show-off,\" Kendrick said.\n\nA picture of an animated Kawaii doll with a glittering smile flashed into Kendrick's MeChip from Cora's account. A tiny saccharine voice squeaked, \"すごい！\" inside his head.\n\nKendrick couldn't help but smile too. \n\n\n\n*page_break\n\nMorning sunlight poured through the vaulted windows of Studio B-1. The naked brick walls and walnut flooring reflected the light so well that it was perfect for shooting video. Lyra and Cora stood in the corner of the studio chatting on their MeChips with a couple of faceless studio execs while Bastion programmed the camera orbs for the upcoming interviews with a small LED console he held on his lap.\n\nKendrick prepared a small station of coffee, tea, and an assortment of fruit and vegan pastries for everyone. He was already on his third cup of coffee, since he hadn't slept very well the night before. Sleeping in a strange bed always made for a difficult night's sleep, but he had been plagued by bad dreams as well. More so than usual. Seeing the footage of Atmos had unlocked memories that Kendrick had spent years trying to suppress. At least he'd be able to blame his jittery hands on the excess amount of coffee.\n\nBastion peered over at Lyra and Cora to make sure they were busy. \"Hey, Kendrick, got a sec?\"\n\nKendrick swallowed another mouthful of bitter coffee before trundling over. \"This what you wanted me to look at?\" he asked. \n\n\"It's not syncing up with my MeChip and I don't have time to recode the interface,\" Bastion said.\nKendrick took the console from Bastion and began to examine it. \"Did you reboot it?\"\n\n\"What am I, a slugging idiot?\"\n\n\"That's why I asked.\"\n\n\"Yeah, funny. Of course I did.\"\n\nKendrick synced his own MeChip and scrolled through the interface. \"Looks like there's some junk code from a previous software version that's hanging it up. I'll have it fixed in a minute.\"\n\n\"Thanks. Tech genius to the rescue,\" Bastion said as he walked over to pour himself a cup of coffee. \n\nKendrick didn't like it when Bastion called him a tech genius. It made him feel guilty, and he already had more than enough guilt for one lifetime. Yes, he could fix their gear any time Bastion was in over his head, but it wasn't because Kendrick was a genius, tech or otherwise. \n\nIt was because he was Powered.\n\nKendrick waited until Bastion was in mid-pour before letting a small trickle of energy drain from the tip of his finger into the console. He felt the familiar thrum of electricity, read the minuscule whir of data coursing over synthetic veins like braille, he could even taste the myriad colors of the programming. Once the console was functioning properly, he quickly handed it off to Bastion.\n\n\"All done.\"\n\n\"Damn, that was quick.\"\n\nKendrick only smiled and walked off. He hated how good it felt to use his Power. There was a part of him that wanted nothing more than to bask in his abilities, to run with them and see just how far his Power could take him. But he couldn't. He wouldn't. His Power was dangerous. It could bring destruction. It could bring pain. Most of all, it could bring fire. \n\n\"Kendrick!\"\n\nHe turned at Lyra's voice and saw her waving him over.\n\n\"Permits?\" she asked.\n\n\"Filed and approved before we even got on the plane,\" he said.\n\n\"Damn, Kendrick. You're almost as good as Cora.\"\n\nCora, still chatting on her MeChip, held her fingers close together and mouthed the word [i]Almost[/i]. \n\n[i]Kendrick[/i], MeChip Julian intoned inside his head, [i]Your nine o'clock has arrived. Thirty-eight seconds late, I might add. I can have security escort him from the building for his blatant disregard of your carefully crafted schedule.[/i]\n\n\"Yes, do that. And when you're done, update my resume, since Lyra's going to fire me. Or you could just send him up to Studio B-1.\" \n\n[i]Oh, very well. Sending him up now.[/i]\n\nKendrick looked at Lyra and said, \"Emergent is here.\"\n\n\n*page_break\n\nEmergent shook hands with Lyra and smiled. The heroic EMT was easily seven feet tall and had the most perfect smile Kendrick had ever seen. The man's YouPower body suit followed the contours of his swimmer's build while the thin halo of YouPower tech that encircled his bald head projected a matrix of orange hexagons that moved across his espresso skin with the slow undulating rhythm of seaweed in a gentle current. It was hypnotizing just to look at him. \n\n\"Please, have a seat,\" Lyra said, motioning to a small stool in the center of the studio. As Emergent sat, several paneled light diffusers angled down from the ceiling while a handful of camera orbs quietly floated into place around him. Bastion studied the layout and tweaked a few parameters on his MeChip while Cora was furiously taking notes. Kendrick found a shadow in the far corner and waited for Lyra to tell him if she needed anything. \n\n\"Thank you so much for coming in,\" she said. \"Can I have Kendrick get you anything? Water, coffee…\"\n\n\"No, thank you.\" He glanced at Kendrick in the shadows and gave him a polite nod of recognition.  \n\n\"How long have you lived here in Triton?\"\n\n\"I moved in not long after the Starlance spacescraper went up. So, about three weeks after they opened the city to the public.\"\n\nLyra kept the conversation simple, asking him easy, personal questions. Kendrick knew that it was an approach she often used when dealing with Heroes on a show. It not only helped to relax the Heroes, but it also gave her a good indication of how they would perform on the show. Lyra wanted people who could make the mundane interesting. Any Hero could perform for the camera and make it mildly entertaining. But Lyra wanted more. She wanted Heroes who could talk about their laundry and make it compelling. And the way Emergent presented himself—even getting a genuine laugh from Lyra and Cora both—Kendrick had no doubt that he had what she was looking for. \n\nAs Kendrick watched Emergent charm his way onto Lyra's show, he saw Bastion out of the corner of his eye, motioning for Kendrick to come over. \n\n\"This guy is great,\" Kendrick whispered when he reached him. \n\n\"Fantastic, yeah. Look at this.\" Bastion tapped his wrist and a small hologram of the console's data feed hovered before them. \n\n\"Incoming feed looks a bit slow,\" Kendrick said, \"but that's normal with that kind of digital cross-traffic.\" \n\n\"That's just it. Where's the cross-traffic coming from?\"\n\nKendrick squinted, pretending to get a better look at Bastion's holo-display. As his eyes narrowed, he reached out with his Power, feeling the tendrils of this digital city wash over him. It was exhilarating, almost overwhelming. But there was something about the flow of electrical impulses inside the studio that wasn't quite right. It was a strange sensation, one Kendrick had never experienced before. He hesitated to probe further for fear of what his Power might do, but curiosity got the better of him. For Kendrick, it felt like flowers of energy blooming from inside all of the electrical components around him, but when he focused on Emergent and his YouPower suit, he felt those energy blooms being pulled back every time they grew, over and over again, reshaping them, warping them. \n\n\"What made you think of using the Atmonipulator that way during the Olympus Tower Run?\" Lyra asked.\n\n\"It was just something I played with while training for the Olympic swim team. You always have to find your limits if you want to get past them. I felt the same way about my YouPowered abilities. I needed to know how far I could push them, how I could use them in ways other people haven't. It's what gives me an edge.\"\n\nKendrick stepped forward. The pulsing battle radiating from Emergent made him feel queasy, unsteady on his feet. Lyra opened her mouth to ask another question but froze when Emergent's matrix of light flickered for just a moment before returning to its slow wave.   \n\n\"Everything all right?\" Emergent asked.\n\n\"I was about to ask you. Your light web winked out for a second there. Does that happen often?\"\n\nEmergent looked at his outstretched hand, where the light danced over his exposed fingers. Orange hexagons continued to slowly move over his skin. \"Hmm. I don't think so. This is a brand-new suit. I'm still learning about all that it can do. It's top-of-the-line, so there shouldn't be any problems with it.\"\n\n\"It looks great.\"\n\n\"Thank you. The sub-filament exoskeleton gives me the strength of an AniPowered gorilla without adding any bulk to—\"\n\nKendrick was hit with another wave of nausea just as the light flickered again. This time, Emergent saw it as well.\n\n\"Huh,\" he said. \"That [i]is[/i] a little odd.\"\n\n\"I hope you kept the receipt,\" Lyra said through a chuckle, but it was cut short when Emergent stood up faster than Kendrick could visually track him and pulled Lyra tight to his chest.\n\n\"Hey! What are you doing?\" she shouted.\n\n\"I…I don't know.\" Emergent's face twisted in confusion. He pulled Lyra close with his left arm while he tried to wrench her free with his right. \"It's the suit. The suit is—\" Suddenly, his right arm wrapped around Lyra's broad shoulders. He was now crushing her in a YouPowered bear hug.\n\nBastion ran past Kendrick and tried to pry Emergent's arms open. \"Let her go!\"\n\n\"I'm trying! I'm trying!\" \n\nThe fear in Emergent's eyes mirrored the fear that Kendrick felt. Something was terribly wrong. The energy from his suit wasn't simply being corrupted. It was being manipulated.\n\nEmergent let go with one arm and backhanded Bastion across the room. He careened into Cora and the two of them fell to the floor in an awkward slump. Neither one got up.\n\nLyra tried to speak but Emergent was squeezing so hard she wasn't able to breathe. \n\n\"Oh God I'm sorry I'm so sorry please I don't know what's happening!\"\n\nKendrick knew he needed to do something, to help in some way, but he was frozen. He didn't have the physical strength to free Lyra. All he had was his Power….\n\nNo, he couldn't. Using his Power to fix a misfiring data line or to feel the flow of energy from a faulty camera orb was one thing. This was another. This would require him to fully embrace his Power, to use it in a way that had once cost a man his life. Kendrick wasn't going to be responsible for another death. But if he didn't do something, Lyra was going to die anyway.\n\nLyra's head rolled back, her blue lips silently opening and then puckering like a fish out of water. Kendrick ran forward as if he was watching himself from outside his own body. He didn't know what he was doing—he was simply reacting. The vast reserve of Power he kept locked away inside burst open. He let it surge through him, channeled it into his fingertips. He slammed the palm of his hand to the base of Emergent's skull and unleashed a stream of energy into the halo around the man's head. Kendrick could feel the suit's programming struggle to overcome the malicious puppet strings that pulled at it. But whatever—[i]whoever[/i]—was pulling the strings had complete control over the suit.\n\nKendrick could sense Emergent about to hit him the same way he had hit Bastion, but Kendrick was able to interfere with the signal and slow the incoming blow enough that even he could dodge it.\n\n\"What are you doing?\" Emergent's silky voice was now strained to the point of breaking. \"She's passing out!\"\n\n\"I'm trying to cut your halo's primary interface link! If I can—\"\n\nEmergent spun, pulling Lyra and Kendrick with him. Kendrick wrapped his arm around the man's neck to keep himself from being thrown across the room. Emergent extended a hand and the light along the length of his arm distorted as the air rolled and compressed. Kendrick felt the air being pulled from his lungs and into the sphere of compressed air roiling at Emergent's fingertips. The air shot out and shattered the windows. Wind coming in from the sea below instantly chilled the room. Emergent dove out the window, taking Lyra and Kendrick with him.\n\nInstead of falling, the Hero's suit used its ion pulse to propel them all straight up alongside the building. Kendrick's heart sank and his stomach twisted into a knot when he saw the sprawling island city of Triton hundreds of feet below. He quickly wrapped both arms around Emergent's neck, wedging one hand deep between the Hero's chest and arm to keep from slipping off. Faster and faster they rose, until only the three spacescrapers still towered above them.\n\n\"Why is it doing this?\" Emergent squealed. \n\nKendrick didn't bother with an answer. He pressed his forehead to the back of Emergent's neck and searched with his mind, let his Power flow through the YouPower suit to find a way to bring back control. Something cold and dark wormed its way through the YouPower system. Every time the suit's native defense software isolated the foreign energy, three more corrupted nodes took its place. \n\nThey raced higher up the outside of the spacescraper. Triton was now just a small glow under the clouds beneath them. The air was frigid, the biting winds faster, and Kendrick was struggling to breathe in the thinning atmosphere. Lyra was already passed out and even Emergent was struggling to remain conscious. \n\nKendrick's thoughts jumbled incoherently. He wasn't getting enough oxygen. He and Lyra would die if he didn't do something now. But even with his Power, he couldn't wrest control of the suit from the thing that hijacked it. There was only one thing left to do. The last time he had done it, Crosswind had burned to death. Yet if he didn't do something, they all would die now. \n\nHis vision blackened around the edges; the roar of the wind deafened him. His grip loosened around Emergent's neck. Kendrick worked his fingers up to Emergent's halo and sent a burst of energy coursing through its entire system. With one final push of his Power, he unleashed every ounce of his abilities to overload the system. Blue light crackled and sparked over them and tiny bolts of lighting flashed between the suit and the spacescraper.\n\nThe YouPower suit shut down. The fierce grip it had on Lyra relaxed. They all drifted upward for another few seconds before slowing. They then hovered for moment in front of one of the spacescraper's many observation decks, to the bewilderment of a gathered throng of people inside, before tumbling back toward earth.\n\nKendrick was momentarily relieved. The suit didn't explode or burst into flames as he had feared. But now they were falling to certain death. Both Emergent and Lyra were unconscious and, without anyone controlling the suit, they began to drift apart. Kendrick carefully reached back in with his Power. Emergent's suit flickered to life, but Kendrick didn't feel any of the malignant energy from before. Probably because most of the suit's systems had been fried.\n\nAs brilliant blue light crept from Kendrick's fingertips and snaked around Emergent's halo, he was able to coerce the suit to gently grab Lyra and safely pull her close once again. Kendrick then used the suit's Atmonipulator to compress a small sphere of air around them, giving them a needed rush of oxygen to breathe as well as control their descent. It took all of his concentration to manipulate the damaged suit, but by the time he had them all safely back in the studio, color was returning to Lyra's face and Emergent was coming to.\n\nKendrick had used his Power as a Hero, something he told himself he would never do again. But by doing so, he saved them. So why wasn't he happy? Why did he still feel guilty? Ashamed? Because he had succeeded where he had once failed?\n\nHe came out of his thoughts when he heard Emergent's halo clatter across the floor. The man was pulling off his suit as if it were on fire, a thought that turned Kendrick's stomach. Emergent tossed the suit to the far side of the studio, where it sat in a harmless pile. He then collapsed to the floor and covered his eyes with the back of his arm. \n\nKendrick called ambulatory services on his MeChip.   \n\n\n\n\n*page_break\n\nA nurse was taking Lyra's blood pressure when Kendrick stepped into the hospital room. His boss smiled at him in a way he had never seen before. Like she was smiling at a friend. An [i]equal[/i].\n\nKendrick had to admit it was a bit unsettling.\n\n\"How are you feeling?\" he asked.\n\n\"Bruised ribs, but other than that, all right, considering. What about Cora and Bastion?\"\n\n\"Concussions. They'll be here overnight, but back to work tomorrow morning, I suspect.\"\n\nLyra quietly nodded and waited for the nurse to finish. Once he had left the room, she asked, \"How about you, Kendrick?\"\n\nHe shrugged his shoulders and sat down on the small stool nearby. \"Doctor gave me a clean bill of health.\"\n\n\"I'm glad.\" There was that smile again. \"And Emergent?\"\n\n\"I think his pride is more wounded than anything,\" Kendrick said. \"We're not using him on the show, are we?\"\n\nLyra snorted a laugh. \"Hell no.\" She sat quietly for a moment, her stern, confident gaze slowly dissolving into one of confusion. \n\n\"Kendrick,\" she said. \"What exactly happened up there?\"\n\nKendrick stared at his hands. He didn't know what to say or how much he should tell her. But now, here in this room, he felt like he needed to tell someone something. So he gave her the quick version of how he had stopped Emergent, hoping she wouldn't think too much about the casual mention of his Powers.\n\n\"You're [i]Powered[/i]? Slugging hell, Kendrick, why didn't you tell me? Why aren't you out there playing the Hero yourself instead of fetching me coffee every morning?\"\n\n\"I'm not a Hero,\" he murmured. [i]I'm a killer[/i].\n\nBut how could he explain that to Lyra? He could barely explain it to himself. The confusion, the conflict, the utter disgust for the joy he felt whenever he used his Power. It was the thing that made him feel whole, feel alive. But it was the very thing that had killed his Mentor.\n\nNo, Crosswind had been more than just a Mentor. He had been a friend.\n\nHe had been…incredible. The real deal. Crosswind didn't want to be noticed or appreciated. He genuinely wanted to help people. Kendrick most of all. He saw something in him that no one else ever did: potential. So he took Kendrick under his wing and showed him what it was like to be a true Hero. Together, they made their city safer.\n\nBut for every Hero, there's a villain. And for them, it was Maphestos. She ran an extortion racket on some of the local businesses and wasn't afraid to break legs to make them pay. \n\nThey had chased her for months until they had finally trapped her inside an old city bunker the government had built during the Cold War. Its doors were thick enough to stop even her, so Kendrick thought to use his Power to overload the system and automatically close the blast doors, trapping her inside.\n\nBut Crosswind insisted on bringing her in to face justice for the crimes she had committed. He had gone inside the bunker to bring her out, but Maphestos had gotten the better of him. When Kendrick overloaded the system to bring the doors down, she slipped past and escaped.\n\nIt was Crosswind Kendrick had trapped instead. \n\nIt should have been nothing more than an unfortunate setback, but Kendrick's Powers had started an electrical fire that swept through the bunker as quickly as Atmos had tumbled down Olympus Tower. No matter how hard he tried, Kendrick couldn't get the doors back open. He could hear Crosswind screaming. Even through those thick, impenetrable doors, he could still hear him burning inside. \n\nNow, every time he closed his eyes, he saw the charred husk of his friend. Every time the world grew quiet, Crosswind's screams came to fill the void. \n\nLyra stood up and said, \"Well, whether you think you're a Hero or not, I can't have you as an assistant any more. Not after you risked your life to save mine.\"\n\nIt took a moment for Kendrick to come back from his dark thoughts. \"You're firing me?\" he asked.\n\n\"I'm promoting you. Assistant producer.\"\n\n\"Is that even a real thing?\"\n\n\"It is if I say it is.\" Lyra sat back down on the bed. \"You'll get a raise, be able to contribute directly to the show, and I get to have someone around who can sense whenever YouPower tech about to go haywire.\"  \n\nKendrick nodded. \"It wasn't a faulty suit, Lyra.\"\n\n\"What do you mean?\"\n\n\"The suit was hacked. Someone else was controlling it.\"\n\n\"YouPower gear can't be hacked.\" Lyra leaned back, her smile now gone. \"Can it? Wouldn't we have heard of something by now?\"\n\n\"I think we already have. Atmos. I don't buy the story about his sub-dermal tech reacting to the graphene in the tower. I think it was the hacker's first attempt at controlling someone else's YouPower, and it failed. Emergent was his next, and unfortunately, more successful test.\" \n\nLyra sat forward, her voice barely loud enough for Kendrick to hear. \n\n\"If that's true, we need to keep that between us, Kendrick. YouPower built this city. Hell, they own half the network. If we come out and say they're being hacked, we'll be out of a job. Or worse.\"\n\n\"You want to just forget about it?\"\n\n\"Of course not. The whole point of this spin-off show, as far as I'm concerned, is to examine the truth about how YouPower might affect us all, ugly or beautiful. If we're being honest here, I haven't decided where I fall on that issue yet. But if there is something ugly to uncover, I don't want to paint a bull's-eye on our backs by telegraphing it. For now, let's just keep our eyes and ears open and not give YouPower a reason to come after us. At least not yet.\" \n\nKendrick knew the truth of it. YouPower was not a company to trifle with. He stood and patted Lyra's shoulder. \"I'm glad you're all right.\"\n\n\"Where are you going?\"\n\n\"To the hotel. I'm exhausted.\"\n\n\"Bring me a coffee before you go.\"\n\n\"I'm not your assistant anymore.\" \n\n\"Bring it to me as a colleague, then.\"\n\n\"See you in the morning, Lyra.\"\n\n\"Hey, Kendrick?\" Kendrick stopped in the doorway. \"You may not see yourself as a Hero, but I do. And if this hacker is just getting started, you very well may be the kind of Hero this city will need.\"\n\nHe knew Lyra was trying to motivate him, but Kendrick could only picture himself standing atop a pile of smoking rubble. \"For Triton's sake, let's hope not.\"\n\nWithout another word, he turned and walked away.\n\n\n*page_break\n\n*text_image serial-box.png right\n\n[i]The YouPower Project[/i] was originally developed in partnership with Serial Box. Serial Box brings everything that's awesome about TV (easily digestible episodes, team written, new content every week) to what was already cool about books (well-crafted stories, talented authors, enjoyable anywhere).\n\n*link_button https://www.serialbox.com/ Check Out Serial Box\n\n*if named = \"Undecided\"\n\t[i]A note from the author of The Hero Project:[/i]\n\n\tHero Risers, here we go again!\n\n\tFor all you returning readers, thanks so much for sticking with us on this new Heroes Rise journey. And for all you new readers, welcome to the club! I'm so thrilled to be able to explore a new corner of the Heroes Rise universe with you, one that means a great deal to me given all the challenges we face in the world today.\n\n\tThis new Heroes Rise series exists for one reason and one reason only: because all you Hero Risers out there read the novels and spread the word. Seriously, we've got no marketing machine here at Heroes Rise—just a few interactive novels and some seriously awesome fans.\n\n\tIf you want to keep adventuring in Millennia City, keep doing what you're doing: read, leave those good reviews, tell your friends, post, share, like, tweet, and keep on supporting Heroes Rise. Our projects rely almost entirely on word of mouth and the support of our fans, so five-star reviews mean everything!\n\n\t*link_button https://www.facebook.com/HeroesRise Heroes Rise Facebook\n\t*link_button https://twitter.com/TheHeroesRise Heroes Rise Twitter\n\t*page_break Restart The Game\n\t*restart\n*goto_scene rs_nine youpowerskip"}};
