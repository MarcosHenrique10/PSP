ns of viewers. You have no idea if your answer was good enough, but you know at least one thing: it was honest.\n\n*label wellputeav\n\"Very well put,\" Weaver says, looking visibly moved by your words. \"I promise I will do my best to make sure that this makes it on the actual show, but just so you know, it's not always up to me. Still, I think many people will want to hear your opinion, given your experiences both off and on this show.\n\n\"Now there are still some standard questions I need to get out of the way, so we have enough footage for the episode,\" Weaver moves on, looking like ${weaverze} may want to do this even less than you. Still, you take another deep breath and try to roll with the ever-shifting gears of The Hero Project engine.\n\n\"So, first off, what do you think of Miss Boss?\" Weaver asks, much more tentatively than usual.\n\n*if crushmissboss\n\tYou almost blush—Weaver must have seen your interaction earlier. Could it have been that obvious you might have a crush on Miss Boss? You thought for sure you were being more subtle than that.\n\n\t\"I haven't had much time to get to know her,\" you say, trying to play it cool.\n\t*goto notmuchtime\n*else\n\t\"I haven't had much time to get to know her,\" you say, wondering why Weaver is singling Miss Boss out in particular.\n\t*goto notmuchtime\n\n*label notmuchtime\n\"Though I guess one thing I have noticed is that she seems to be holding back around Griffin and Tarsiero.\"\n\n\"Well, that might have something to do with her past,\" Weaver answers, suddenly looking even more uneasy than before. Straining your senses a bit harder, your owl ears pick up a voice speaking into a hidden earpiece in Weaver's ear. You can't make out the actual words, but you think you recognize Lyra's voice.\n\n*page_break \n\n\"So I'm not really supposed to be telling you this, but apparently Miss Boss was the love child of an illicit affair,\" Weaver says, ${weaverhis} words sounding oddly rehearsed—and forced. \"Miss Boss's father ended up leaving his wife to be with Miss Boss's mother, but they both died in a freak car accident abruptly after. Miss Boss was then adopted by her aunt, Camilla, and—\"\n\n\"Wait, why are you telling me all of this?\" you ask, interrupting Weaver—and not liking where this little detour is headed. At all.\n\n\"I just wanted you to know there's more to Miss Boss, if you want to connect with her on a deeper level,\" Weaver answers, fighting a grimace as Lyra's voice continues to buzz indistinguishably in ${weaverhis} ear. \"You know, since you have things in common when it comes to….\"\n\nWeaver seems to choke on the next words, unable to speak them—perhaps because ${weaverze} can now sense the discomfort beginning to radiate out of you.\n\n\"When it comes to what?\" you try, the words racing through your mind: [i]My parents[/i].\n\n*page_break \n\nYou don't speak these words, however, because you are still seated in front of a wall of camera orbs. Instead, you stand and walk out of the confessional room without another word.\n\nNext thing you know, you're halfway back to your room, emotion still clouding your perception. All you want to do is be alone to process what just happened, and you think for a moment that Weaver might even let you do that, but it isn't long before you hear ${weaverhir} calling after you.\n\n\"${named}, wait!\" Weaver shouts, trying ${weaverhis} best to catch up to you. \"I'm sorry. Lyra insisted that—\"\n\n*choice\n\t#\"I don't care what Lyra insists!\" you shout back, stopping and unintentionally spinning your neck around without your body. \n\t\tEmotion flashes across your mind in red bursts, and you feel your pulse racing so fast that it nearly blurs your vision. \"You know, I actually thought you cared about JK and me, that you were our friend. But back there, doing that? Trying to manipulate me into…\"\n\n\t\tYou pause to reorient your body with your neck and try to take a breath, your words practically running together. \"Don't ever try to blindside me like that again,\" you say finally, turning around and storming back towards your room.\n\n\t\tDesperately trying to regain some control, you push open the door and hope that Weaver won't follow, so that you can have a few minutes to cool down.\n\t\t*goto jkasyenter\n\t#JK and I promised to never talk about that subject again. Ever. And Weaver knows that.\n\t\tSo you just continue back towards your room and hope that Weaver won't follow, so that you can have a few minutes to gather your thoughts.\n\n\t\tYou don't want to lash out at Weaver, but you also really don't like what ${weaverze} just pulled back there, whether ${weaverze} was forced into it or not.\n\t\t*goto jkasyenter\n\t#Part of me really wants to talk about this, but I need time to decide—and consult with JK—about whether this is the right time or place. But it's not Weaver's fault—${weaverze} was just doing ${weaverhis} job.\n\t\t\"It's okay, Weaver,\" you try to say without hooting unintentionally. \"I just need a minute, please.\"\n\n\t\tStill looking straight ahead, you continue back towards your room and hope that Weaver will grant your request.\n\t\t*goto jkasyenter\n\n*label jkasyenter\n\nAs soon as you enter your room, however, every thought in your head shatters at what you see inside.\n\n*page_break\n\nJK lies on the floor, rolling back and forth in a puddle of spilled SlugGlug. Both of her arms grip her stomach, and her cheeks are stained with tears. JK looks like she wants to cry out, but can't find the breath to do so.\n\nYou rush to JK's side and kneel beside her, fighting the panic creeping into your chest. You immediately grab one of JK's hands and she squeezes it as she rolls onto her side, visibly shaking from the pain. You're about to call out to Weaver for help, but when you tilt your head up you are beyond relieved to find ${weaverhir} kneeling on the other side of JK.\n\n\"I've already called the medic team and the Herologist,\" Weaver says, placing a hand on JK's shoulder. \"But this sounds like one of JK's nerve-pain flashes. It should pass…right?\"\n\n*page_break\n\nWeaver's question hangs in the air, echoing the frantic thoughts running through your own mind. Knowing there's nothing you can do for JK except sit here and hold her, you hope desperately that you won't need the assistance of the medics. Thank slugger Weaver was stubborn enough to follow you in here…\n\nThough when you look up at ${weaverhir} again, you also notice a set of camera orbs hovering in the room behind ${weaverhir}, filming JK as she writhes on the floor. \n\nWithout thinking, your first instinct is to:\n\n*choice\n\t#Let the cameras film. It will send a potent message to the public and raise awareness about the reality of living with Disembodied Powers, if this makes it on the show.\n\t\t*set public %+20\n\n\t\t*label publicjkepisode\n\t\tWeaver suddenly stands up and steps out of the view of the cameras. It's almost as if ${weaverze} is reading your mind, knowing that if a producer is in the shot, this footage will be less likely to air.\n\n\t\tYou hope Weaver is doing this for you and JK, and not for the sake of the show. You hate that you even have to question that now.\n\n\t\t*if (public > 65)\n\t\t\t*set legended +3\n\t\t\t*set rlshp_jk %+15 \n\t\t\t*set rlshp_eps %+20\n\t\t\t*set rlshp_weaver %+10\n\t\t\t*set upa +10\n\t\t\t*achieve publicmove \n\t\t\tWeaver does know that letting the cameras film falls in line with your mission of transparency here on the show, so you want to give ${weaverhir} the benefit of the doubt.\n\t\t\t\n\t\t\t*label resptest\n\t\t\t*if (respected > 50)\n\t\t\t\t*set respected %+20\n\t\t\t\t*goto oncedone\n\t\t\t*else\n\t\t\t\t*set respected %+20\n\t\t\t\t*goto oncedone\n\t\t*else\n\t\t\t*set legended +1\n\t\t\t*set rlshp_jk %+5 \n\t\t\t*set rlshp_eps %-20\n\t\t\t*set rlshp_weaver %-10\n\t\t\t*set upa +5\n\t\t\tLetting the cameras film goes against your usually private ways, so you have a hard time thinking Weaver is doing this for your benefit, especially after what ${weaverze} just pulled.\n\t\t\t*goto resptest\n\t#Smash the cameras in the room to protect JK's privacy. No one needs to see this.\n\t\t*set public %-20\n\t\t*set respected %-20\n\n\t\tOnce you smash the first camera with your fists, you find that Weaver is immediately on ${weaverhis} feet beside you, shooting strands of fabric from ${weaverhis} fingertips.\n\t\t*label privatejkepisode\n\t\tThe fabric wraps around the camera lenses to block their view completely.\n\n\t\t\"Stay with JK, I'll take care of the cameras,\" Weaver says. \n\n\t\tAs you kneel back down beside JK, you feel better about Weaver respecting your wishes. \n\t\t*if (public \u003c 35)\n\t\t\t*set legended +3\n\t\t\t*set rlshp_jk %+15 \n\t\t\t*set rlshp_eps %+20\n\t\t\t*set rlshp_weaver %+10\n\t\t\t*set upa +10\n\t\t\t*achieve privatemove\n\t\t\t$!{Weaverze} knows how much maintaining a level of privacy means to you while on this show, especially when it comes to JK.\n\t\t\t*goto oncedone\n\t\t*else\n\t\t\t*set legended +1\n\t\t\t*set rlshp_jk %+5\n\t\t\t*set rlshp_eps %-20\n\t\t\t*set rlshp_weaver %-10\n\t\t\t*set upa +5\n\t\t\tYou hope Weaver is doing this for you and JK, at least, and not just because ${weaverze} doesn't want to be responsible for you destroying more expensive equipment. You hate that you even have to question that, but it seems like you have to after what ${weaverze} just pulled.\n\t\t\t*goto oncedone\n\t#Demand calmly that the cameras not film this private moment. Don't give in to anger.\n\t\t*set public %-20\n\t\t*set respected %+20\n\n\t\t\"JK has not agreed to appear on the show. Remove these cameras now,\" you say as evenly as you can manage. To your instant horror, the cameras don't budge a single inch…and something inside of you snaps.\n\n\t\tBefore you can do anything, Weaver is already on ${weaverhis} feet, shooting strands of fabric from ${weaverhis} fingertips.\n\t\t*goto privatejkepisode\n\n*label oncedone\n*page_break\n\nReturning your focus where it belongs, you find JK squeezing your hand even more tightly as another wave of pain seems to overtake her. You can't help but worry that this episode is somehow different than the others, that this is a sign that something has gone horribly wrong, that maybe The Great Loa's healing isn't all it's cracked up to be…\n\nWhen suddenly JK lets out a weak scream and finally gasps for air. As terrible as it is to witness, you know these are the signs that JK's nerve episode has passed. Sure enough, JK then loosens her vise grip on your hand and lies flat on the floor for a few seconds, sucking in breath through her still-clenched teeth. \n\nYou allow yourself to sigh a breath of relief too, feeling your pulse still racing. You're about to ask if JK is really okay, but you are distracted when you notice that her hands have started to glow in a halo of pink light.\n\n\"Woof, okay, that was a rough one,\" JK sighs, wiping the sweat off of her luminescent forehead. \"Sorry about—what is it? What are you…whoa. Cool.\"\n\nAs JK props herself up by her elbows and examines her glowing fingertips, you look to Weaver for answers and remember ${weaverze} probably can't see what's going on in the first place.\n\n\"Hey, you know, it kind of feels like I should…\" JK starts, before her eyes grow wide. \"Sweet spacey slugger!!\"\n\nJK screams, and you jump out of the way just in time…\n\n*page_break\n\n…as two blasts of pink energy shoot from JK's open palms. The energy smashes into the wall continuously until JK closes her fists, causing the halo effect to cease. The wall smokes and cracks in the two dents where JK's energy hit, but all any of you can do is stare.\n\n\"Did you just—\" you try to say.\n\n\"Fire jellyfish stinger blasts from my hands?\" JK finishes for you, her voice about an octave higher than usual. \"Slugger, yes I did!\"\n\nYou stare at JK in awe—Loa Shift said that once JK's jellyfish nerve net harmonized with her human nervous system, she might develop latent expressions of her Powers. Could it really be that JK can now turn her nerve-pain episodes outward in these stinger blasts? \n\nYou have a million questions for JK, but you catch her eye and both of you know you can't talk about her treatments here.\n\n*page_break\n\n\"Did your Herologist at home say anything about this being possible?\" Weaver asks, sounding equally stunned by this development.\n\n\"What Herologist?\" JK scoffs. \"Our insurance barely covers the crappy doctor in our neighborhood, let alone any Powered specialists. Besides, most of those don't have any experience dealing with Disembodied patients like me anyway.\"\n\nWeaver swallows hard, hearing this. \"Well, you're here now, and our Herologist is going to do another full workup. We're not taking any chances.\"\n\n\"No, it's okay, really,\" JK says, sounding almost giddy. \"It was just a nerve-pain flash. And I think it might have even been my last one…ever.\"\n\nJK sounds serious, but she says this with a huge smile on her face—a smile you can't help but match. Your first thought is: \n\n*choice\n\t#Before, JK and I just had to wing it on our own. Now we've got a team of top-level specialists to help look after JK. \n\t\tEven if they can't cure her, at least they can make sure she stays healthy until her final treatment from Loa Shift.\n\n\t\tFor the moment, you force yourself not to dwell on the fact that your life suddenly looks completely different now that you have some earned money and privilege. Instead, you focus on the fact that JK's treatments are actually working.\n\t\t*goto thoughifthisis \n\t#JK is actually getting better.\n\t\tLoa Shift's treatments are really working. This is concrete proof.\n\t\t*goto thoughifthisis\n\t#Now more than ever, I have to do whatever it takes to make sure JK gets her final treatment. \n\t\tLoa Shift's treatments are really working. This is concrete proof.\n\t\t*goto thoughifthisis\n\n*label thoughifthisis\n\nBut if this kind of episode is what JK looks like getting better, you don't ever want to imagine her getting worse.\n\nAs JK smirks at you, you know you should feel nothing but relief and happiness—but you also start to feel a familiar pressure squeezing those emotions from either end, because you know what this means. You have to survive tonight's vote and make the Final 12. \n\nIf you do, you'll be one step closer to curing JK for the rest of her life.\n\n*page_break INTO THE NIGHT\n\n\"Here's what we know about the latest Ani-cide.\"\n\nThe voice belongs to Processor, who you've just learned is the world's most advanced android and the longest-running member of The Millennial Group in history. She stands center stage, her chrome body shining impressively in the flood of lights.\n\n*if jennydead\n\tShe was brought in as this week's Guest Mentor on the Judges Panel,\n\t*goto nodecide\n*else\n\tBeside her stands the newest Millennial Group member: Null, a DRPR-agent-turned-bionic-hero and a Finalist from The Hero Project's first season. Null wears an all-black tech bodysuit coursing with neon-blue coolant and covered in deadly weapons. She stands silently beside Processor, her faceless black helmet making her by far the more intimidating of these two tech-heroines. \n\n\tBoth were brought in as this week's Guest Mentors on the Judges Panel,\n\t*goto nodecide\n\n*label nodecide\nsince the Judges don't technically decide who will be eliminated in thirteenth place—the impending Rookie vote will. Given Processor's longtime role as The Millennial Group's intelligence and strategy specialist, she is currently debriefing you on the Smyther Manor Ani-cide mission that you've been eagerly awaiting.\n\n\"The unknown assailant was able to teleport in and out of the subbasement bunker of Smyther's Manor completely undetected and wipe all of the security cameras clean before the arrival of The Hero Project Veteran squad. The types of wounds inflicted remain consistent with previous ht to The Hero Project, having fought Smyther and The Splice Circle before,\" Processor continues, interrupting your thoughts. \"The Millennial Group has\n*if (jennydead = false)\n\t\"We took a brief hiatus from handling the Infinitum situation to come here and offer some insight to The Hero Project, having fought Smyther's Splice Circle and Culic's InfraOrder before,\" Null says, her voice filtered through a creepy distortion effect. \"As someone who has sat in those very seats you're sitting in now, I have\none important piece of advice for you Finalists: The InfraCircle's criminal methods may be misguided, but its mission isn't. The leaders of The InfraCircle believe that they are doing the right thing for Ani-Powereds, who remain a seriously marginalized community. \n\n\"The InfraCircle's call for equality is both political and personal, especially now that its members are being hunted in these heinous Ani-cides. Unfortunately, this will also make The InfraCircle more dangerous than ever. So remember, Hero Project Finalists: while it is indeed your responsibility to stop The InfraCircle's criminal activity, it is also now your responsibility to protect its members.\"\n\nAbsorbing these words, you must admit you are surprised to hear them spoken by a non-Ani-Powered hero, especially one who serves as a prominent member of The Millennial Group. In response, all you can think is:\n\n*choice\n\t#This is exactly how I feel: I must shut down The InfraCircle while also ensuring its members' survival.\n\t\t*set traditional %+20\n\t\t*set societal %+20\n\n\t\tIt is your responsibility as a hero to stop criminal activity, and your responsibility as an Ani-activist to put an end to damaging Ani-behavior. That being said, it is also your responsibility to protect Underrepresented Powereds when they come under fire, like in these Ani-cides. Ultimately, you know your goal must not just be to save The InfraCircle from continued violence, but also to hopefully show its members the error of their ways and to lead by example.\n\n\t\t*if (traditional > 70) and (societal > 70)\n\t\t\t*set legended +3\n\t\t\t*goto griffans\n\t\t*else\n\t\t\t*set legended +1\n\t\t\t*goto griffans\n\t#I completely disagree. My responsibility is not to stop The InfraCircle—my responsibility is to join The InfraCircle someday.\n\t\t*set traditional %-20\n\t\t*set societal %+20\n\n\t\tYour politics align far more with The InfraCircle than they do with organizations that represent the traditional heroic machine, like The Hero Project or The Millennial Group. You're only here to make your voice heard and to procure treatments for JK; once those tasks are taken care of, all bets on your loyalty to The Hero Project are off.\n\n\t\t*if (traditional \u003c 30) and (societal > 70)\n\t\t\t*set legended +3\n\t\t\t*goto griffans\n\t\t*else\n\t\t\t*set legended +1\n\t\t\t*goto griffans\n\t#Everything about The InfraCircle and these Ani-cides is disgusting, and I want to avoid putting too large a target on my own back.\n\t\t*set traditional %-20\n\t\t*set societal %-20\n\n\t\tYou're here to secure JK's treatments, cash your checks, and get the slugger out. Especially because you know that nothing you could say or do here would change anything anyway. The only thing that will change anything is dismantling the existing societal system entirely, so as far as you're concerned, standing by and letting The Hero Project and The InfraCircle destroy each other sounds like a great idea.\n\n\t\t*if (traditional \u003c 30) and (societal \u003c 30)\n\t\t\t*set legended +3\n\t\t\t*goto griffans\n\t\t*else\n\t\t\t*set legended +1\n\t\t\t*goto griffans\n\t#My job here is to carry out missions as I'm instructed. Thankfully these missions also hit close to home, so I hope they will allow me to make a difference for Ani-Powereds everywhere.\n\t\t*set traditional %+20\n\t\t*set societal %-20\n\n\t\tYou know your top priority here: to carve out a stable and safe life for you and JK. However, you also feel lucky that this personal priority happens to coincide with the chance to help other Underrepresented and Ani-Powereds by fighting against The Infracircle and these Ani-cides.\n\n\t\t*if (traditional > 70) and (societal \u003c 30)\n\t\t\t*set legended +3\n\t\t\t*goto griffans\n\t\t*else\n\t\t\t*set legended +1\n\t\t\t*goto griffans\n\n*label griffans\n\nYou can feel many eyes turning to you on the soundstage as this pro-Ani-Powered sentiment is expressed, since you're also sitting beside Tarsiero and Transfer. However, before any of you can decide whether you should say anything, you hear Griffin speaking up a few seats down.\n\n\"You're so right,\" Griffin calls out, nodding his head. \"Politics shouldn't matter to us heroes, at least not as much as knowing the difference between right and wrong.\"\n\nGriffin looks pleased with himself as he finishes, but you have trouble finding any meaning in his words. It sounds more like some nonsense rhetoric spouted to grab attention than anything else, but you can immediately tell that for Transfer, this statement is like bait hanging on a hook.\n\n\"I'm sorry, but you're out of control, Griffin,\" Transfer suddenly projects. \"You've been bossing everyone around and deciding who belongs here and what we should believe. Now I'd say you're just like every other stereotypical wealthy white man blinded by privilege, but that's not even the case anymore, is it? Why don't you use that dominating voice of yours to tell the truth…\"\n\n*page_break\n\n\"You've been let go from your South Carolina State Hero post because you're slowly losing your Powers.\"\n\nTransfer lets that statement land with a thud, going silent as the audience reacts with shocked gasps and whispers. You have to admit, you're just as shocked—not necessarily by Transfer's \"revelation\" about Griffin, but that ze exposed it in the first place. You guess you don't know Transfer all that well yet, but this still seems so unlike hir from what you have seen ready know this, my dear chicken.\"  \n\t\t*goto firstvotetime \n\t*elseif officialloyalgmbt\n\t\t\"You've already vowed to be a member of the '#RookiesUnited' alliance, as I've heard it dubbed though the MeVine. So you know the drill, my dear chicken: it's smartest for you to keep your word to Griffin, Miss Boss, and Tarsiero and vote out Transfer. If you do anything else, I can't guarantee the target won't fall on you.\" \n\t\t*goto firstvotetime\n\t*elseif officialloyalcit\n\t\t*if officialsolostar\n\t\t\t\"I don't know if Griffin really trusted you, given your actions earlier. My gut tells me you should vote against Griffin and risk the public tiebreaker, since Transfer and Crystalline trust you more. If you do anything else, I can't guarantee the target won't fall on you. But then again, I'm just a MeChip, what do I know?\" \n\t\t\t*goto firstvotetime\n\t\t*else\n\t\t\t\"You've already vowed to be a member of the 'Ignition' alliance, as I've heard it dubbed though the MeVine. So you know the drill, my dear chicken: it's smartest for you to keep your word, vote out Griffin, and risk the public tiebreaker. If you do anything else, I can't guarantee the target won't fall on you.\"\n\t\t\t*goto firstvotetime\n\t*elseif officialtruehero\n\t\t\"This is a true choose-your-own-adventure, my dear chicken! There are pluses and minuses to both sides: keeping Griffin means you're sure to see more divisive politics splinter the Rookies, but you also will be keeping a member with lots of field experience who pairs seamlessly with Miss Boss. Keeping Transfer would be a move for team unity, since Miss Boss and Tarsiero might actually be able to bond with Crystalline and Transfer if Griffin goes. Which you would have to hope happens, since Miss Boss would need a new energy sourcing partner in the form of Crystalline.\n\n\t\t\"One last monkey-wrench option! You could always vote Tarsiero, too. Transfer will most likely still go home with three votes, but voting for Tarsiero will send a message that you're truly neutral and not engaging in politics, voting the way you believe and ignoring party lines.\"\n\t\t*goto firstvotetime\n\t*else\n\t\t\"Given your actions today, I think you had better throw a monkey wrench in the whole system and vote for Tarsiero. It might not change the outcome of the vote, but it will show that you play by no one else's rules and that you'll always do what you want, voting outside party lines. \n\n\t\t\"Naturally, no one will be particularly happy about this vote, but they might at least respect or fear you more for it. If you do vote another way, I can't guarantee the target won't fall on you, especially if you decide to cross Griffin after the way you acted today. But then again, I'm just a MeChip, what do I know?\"\n\t\t*goto firstvotetime\n*else\n\tWeaver made it clear that ${weaverze} wants you to force a tie against Griffin, in order to stand up for Transfer and no doubt create even more suspense at the voting ceremony. However, will the exchange that just occurred tip the scales of public opinion against Transfer if it comes to a tie? Are you better off aligning with Griffin and Miss Boss, who are willing to do anything to go the distance? Or is it better to side with fellow Underrepresented Powered Transfer, a big risk that has a potentially big reward? \n\n\tAfter all that has happened, you have to remind yourself that perhaps the most important consideration is to maintain the strongest team of Rookies who can stay and fight the current missions against the Ani-cides. \n\t\n\tWhatever you decide, you need to make it your priority to reflect who you are—or at least the version of yourself you've been able to portray. \n\t*goto firstvotetime\n\n*label firstvotetime\n\n\"${codenamed}.\" \n\nYou hear Colton call your name and know what he's about to say next: \"It's time to cast your vote. Best of luck.\"\n\nAs Colton says the words, you feel your legs standing and walking into the voting booth. As you do, you swivel your owl neck to take one last look at the Rookies, knowing this will be the last time you see one of them in the competition.\n\n*choice\n\t#Vote out Transfer.\n\t\tYou stand in the voting booth, knowing what you have to do.\n\n\t\tWithout hesitation, you scan the holo-board and find Transfer's name.\n\n\t\tThen you push the button you know will send hir home.\n\n\t\t*page_break IN THE AFTERMATH\n\n\t\t*if youblindsidetransfer\n\t\t\t*goto yourblindsided\n\t\t*else\n\t\t\tAfter what feels like forever, you finally find yourself walking through the Contestant Mansion back towards your own room—a path that of course takes you right by Transfer's room.\n\n\t\t\tBut you know that ze won't be returning tonight, that hir bed will remain empty for the remainder of the competition.\n\n\t\t\tBecause with your added vote, Transfer was sent home by a majority of four to two, as expected.\n\n\t\t\t*page_break\n\t\t\t*set transfergone true\n\t\t\t*achieve transferthirteenth\n\t\t\t\n\t\t\t*if (officialloyalcit) or (officialsolostar)\n\t\t\t\t*set legended +4\n\t\t\t\t*set upa -5\n\t\t\t\t*set rlshp_transfer %-30\n\t\t\t\t*set rlshp_griffin %+10\n\t\t\t\t*set rlshp_missboss %+10\n\t\t\t\t*set rlshp_tarsiero %+10\n\t\t\t\t*set rlshp_weaver %-15\n\t\t\t\t*set rlshp_jk %-30\n\n\t\t\t\tGriffin, Miss Boss, and Tarsiero were very pleased with you—though they didn't necessarily expect you to vote this way, so you can tell that they're still not sure exactly where you stand just yet.\n\n\t\t\t\t*if officialloyalcit\n\t\t\t\t\t*set rlshp_crystalline %-50\n\t\t\t\t\tOn the other hand, Crystalline was quite clear that she knows exactly where you stand: against her, since you blatantly went back on your word to the alliance.\n\t\t\t\t\t*goto crushhallway\n\t\t\t\t*else\n\t\t\t\t\t*set rlshp_crystalline %-30\n\t\t\t\t\tOn the other hand, Crystalline was clear that she knows exactly where you stand. She is going to be sleeping alone tonight, without her boyfriend or her roommate, and she will probably blame you directly for that, whether it's fair or not.\n\t\t\t\t\t*goto crushhallway\n\t\t\t*else\n\t\t\t\t*achieve perfectvote\n\t\t\t\t*set legended +6\n\t\t\t\t*set upa +5\n\t\t\t\t*set rlshp_transfer %-15\n\t\t\t\t*set rlshp_crystalline %-30\n\t\t\t\t*set rlshp_weaver %-15\n\t\t\t\t*set rlshp_jk %-20\n\n\t\t\t\tCrystalline is going to be sleeping totally alone tonight, without her boyfriend and now without her roommate. Whether it's fair or not, she will probably blame you directly, since she never even tried to work with Griffin's side—only with you.\n\n\t\t\t\tThat has to be okay with you, especially since\n\t\t\t\t*if (officialloyalgmbt)\n\t\t\t\t\t*set rlshp_griffin %+30\n\t\t\t\t\t*set rlshp_missboss %+30\n\t\t\t\t\t*set rlshp_tarsiero %+30\n\t\t\t\t\tGriffin, Miss Boss, and Tarsiero were very pleased with your decision. As far as they're concerned, your vote cemented your loyalty as a member of their #RookiesUnited alliance. \n\t\t\t\t\t*goto crushhallway\n\t\t\t\t*else\n\t\t\t\t\t*set rlshp_griffin %+20\n\t\t\t\t\t*set rlshp_missboss %+20\n\t\t\t\t\t*set rlshp_tarsiero %+20\n\t\t\t\t\tGriffin, Miss Boss, and Tarsiero were very pleased with your vote. Which means you should be able to count on them in the future, hopefully.\n\t\t\t\t\t*goto crushhallway\n\t#Vote out Griffin.\n\t\tYou stand in the voting booth, knowing what you have to do.\n\n\t\tWithout hesitation, you scan the holo-board and find Griffin's name.\n\n\t\tThen you push the button you hope will send him home.\n\n\t\t*page_break IN THE AFTERMATH\n\n\t\t*if youblindsidegriffin\n\t\t\t*goto yourblindsided\n\t\t*else\n\t\t\tAfter what feels like forever, you finally find yourself walking through the Contestant Mansion back towards your own room—a path that takes you right by Transfer and Griffin's respective rooms…one of which you know will hold an empty bed tonight.\n\n\t\t\tWith your vote for Griffin, the expected tie was cast: three votes for Griffin and three votes for Transfer. \n\n\t\t\tThis of course left the thirteenth-place elimination up to a live public tiebreaker by popularity—whoever ended up having the most instant save votes in a live social-media vote was going to stay.\n\n\t\t\tYou held your breath on stage, knowing that your potential future in the competition was on the line, alongside Transfer and Griffin's. When the results finally came in…\n\n\t\t\t*page_break\n\t\t\t*achieve griffinthirteenth\n\t\t\t*set griffingone true\n\n\t\t\tThe public voted to save Transfer by the slimmest of margins—and Griffin was sent packing.\n\n\t\t\tThis shocked everyone, given all that had happened on stage and Griffin's general popularity entering the Live Finals. No one was more stunned than Griffin, of course, who was visibly furious. After the news was delivered, he refused to even look in your direction as he went through the elimination motions.\n\n\t\t\tThe same proved true for Miss Boss, though she made sure to seem more sad than angry, since she probably knows she must now build relationships with the new Rookie majority. Tarsiero, on the other hand, just looked genuinely sad and surprised to see Griffin go home.\n\n\t\t\t*page_break \n\t\n\t\t\t*if (officialloyalcit) or (officialtruehero)\n\t\t\t\t*achieve perfectvote\n\t\t\t\t*set legended +6\n\t\t\t\t*set upa +5\n\t\t\t\t*set rlshp_griffin %-30\n\t\t\t\t*set rlshp_missboss %-30\n\t\t\t\t*set rlshp_tarsiero %-15\n\t\t\t\t*set rlshp_weaver %+15\n\t\t\t\t*set rlshp_jk %+30\n\n\t\t\t\t*if officialloyalcit\n\t\t\t\t\t*set rlshp_transfer %+30\n\t\t\t\t\t*set rlshp_crystalline %+30\n\n\t\t\t\t\tOf course, Crystalline and Transfer were very pleased with you. They both made sure to pull you aside to thank you personally after the ceremony ended. As far as they're concerned, your vote cemented your loyalty as a member of their Ignition alliance.\n\n\t\t\t\t\tTransfer quickly headed for hir room afterwards, though—ze must feel terrible about what ze decided to do at this ceremony, or at least that's how it seemed to you.\n\t\t\t\t\t*goto crushhallway\n\t\t\t\t*else\n\t\t\t\t\t*set rlshp_transfer %+20\n\t\t\t\t\t*set rlshp_crystalline %+20\n\n\t\t\t\t\tOn the other hand, Crystalline and Transfer were very pleased with your decision. They both made sure to pull you aside to thank you personally after the ceremony ended. \n\n\t\t\t\t\tTransfer quickly headed for hir room to be alone after that, though. Ze seemed pretty shaken about everything that had just happened at the ceremony, or at least that's how it seemed to you.\n\t\t\t\t\t*goto crushhallway\n\t\t\t*else\n\t\t\t\t*set legended +4\n\t\t\t\t*set upa -5\n\t\t\t\t*set rlshp_transfer %+15\n\t\t\t\t*set rlshp_crystalline %+15\n\t\t\t\t*set rlshp_griffin %-50\n\t\t\t\t*set rlshp_missboss %-40\n\t\t\t\t*set rlshp_tarsiero %-20\n\t\t\t\t*set rlshp_weaver %+5\n\t\t\t\t*set rlshp_jk %+20\n\n\t\t\t\tThis vote was a big risk for you, one that luckily ended up paying off. Crystalline and Transfer didn't necessarily expect you to do this, but they were very happy about the stand you took in their favor. \n\n\t\t\t\tThey both made sure to pull you aside to thank you personally after the ceremony ended, though Transfer quickly headed for hir room to be alone afterwards. Ze seemed pretty shaken about everything that had just happened at the ceremony, or at least that's how it seemed to you.\n\t\t\t\t*goto crushhallway\n\t#Vote out Tarsiero. \n\t\tYou stand in the voting booth, knowing what you have to do.\n\n\t\tWithout hesitation, you scan the holo-board and find Tarsiero.\n\n\t\tAnd you push the button next to his name.\n\n\t\t*page_break IN THE AFTERMATH\n\n\t\t*if youblindsidetarsiero\n\t\t\t*goto yourblindsided\n\t\t*else\n\t\t\t*set transfergone true\n\t\t\t*set tarsierohate true\n\n\t\t\tAfter what feels like forever, you finally find yourself walking through the Contestant Mansion back towards your own room—a path that of course takes you right by Transfer's room.\n\n\t\t\tBut you know that ze won't be returning tonight, that hir bed will remain empty for the remainder of the competition.\n\n\t\t\tWith your vote thrown to Tarsiero, Transfer was sent home in a majority of three to two against Griffin, as expected.\n\n\t\t\t*page_break\n\t\t\t*achieve transferthirteenth\n\n\t\t\tCrystalline is also going to be sleeping alone tonight, without her boyfriend or her roommate. Whether it's fair or not, she will probably blame you directly, since she never even tried to work with Griffin's side—only with you. \n\t\n\t\t\t*if (officialsolostar)\n\t\t\t\t*achieve perfectvote\n\t\t\t\t*set legended +6\n\t\t\t\t*set upa -5\n\t\t\t\t*set rlshp_transfer %-30\n\t\t\t\t*set rlshp_crystalline %-30\n\t\t\t\t*set rlshp_griffin %-30\n\t\t\t\t*set rlshp_missboss %-30\n\t\t\t\t*set rlshp_tarsiero %-20\n\t\t\t\t*set rlshp_weaver %-5\n\t\t\t\t*set rlshp_jk %-20\n\n\t\t\t\tAnd while the vote ultimately worked out in their favor, Griffin, Miss Boss, and especially Tarsiero weren't thrilled with the vote you cast against their alliance. Tarsiero in particular looked hurt and surprised by your vote, which only seemed to make Miss Boss and Griffin more protective. So right now you're pretty universally disliked by the Rookies. \n\n\t\t\t\tWhich is exactly the way you wanted it.\n\t\t\t\t*goto crushhallway\n\t\t\t*elseif officialtruehero\n\t\t\t\t*achieve perfectvote\n\t\t\t\t*set legended +6\n\t\t\t\t*set upa +5\n\t\t\t\t*set rlshp_transfer %-15\n\t\t\t\t*set rlshp_crystalline %-15\n\t\t\t\t*set rlshp_griffin %-10\n\t\t\t\t*set rlshp_missboss %-10\n\t\t\t\t*set rlshp_tarsiero %-20\n\t\t\t\t*set rlshp_weaver %+5\n\t\t\t\t*set rlshp_jk %-5\n\n\t\t\t\tThough even Crystalline seemed to understand on a certain level that your vote sent a clear message: you're not engaging in politics and you're going to do what you think is best for the team overall. Whether or not it worked in their favor, all of the Rookies seemed to at least respect that independent move. \n\t\t\t\t*goto crushhallway\n\t\t\t*else\n\t\t\t\t*set legended +4\n\t\t\t\t*set upa -5\n\t\t\t\t*set rlshp_transfer %-30\n\t\t\t\t*set rlshp_crystalline %-30\n\t\t\t\t*set rlshp_griffin %-30\n\t\t\t\t*set rlshp_missboss %-30\n\t\t\t\t*set rlshp_tarsiero %-20\n\t\t\t\t*set rlshp_weaver %-15\n\t\t\t\t*set rlshp_jk %-30\n\t\t\t\t\n\t\t\t\tAnd while the voting ultimately worked in their favor, Griffin, Miss Boss, and especially Tarsiero weren't thrilled with the vote you cast against their alliance. Tarsiero in particular looked hurt and surprised by your vote, which only seemed to make Miss Boss and Griffin more protective. So right now you're pretty universally disliked by the Rookies. \n\n\t\t\t\tIf you cast this vote to try to remain neutral, it backfired in a big way. Instead, now no one trusts you.\n\t\t\t\t*goto crushhallway\n\t\t\t\n*label yourblindsided\n\nAfter what feels like forever, you finally find yourself walking through the residence hallways…\n\nOf the Sequester House for eliminated contestants.\n\nEvery single one of the other Rookies cast a vote against you tonight.\n\nYou were totally blindsided by a unanimous vote.\n\n*page_break\n*achieve blindsidethirteenth\n\nIt was all a blur of sights and sounds from there, but from what you were able to gather, after your visit to Griffin, he was unsettled by what you said and what you didn't say. So unsettled that apparently he went directly to speak with Transfer and Crystalline and, comparing stories about your visits, they decided that you deserved to be the one to go home.\n\nObviously you got way too comfortable thinking you were safe in the middle, and you didn't play your political cards right at all. \n\nNow you've been eliminated from The Hero Project in thirteenth place, as a result.\n\nWhich means you've not only failed yourself, but that you've failed JK by not making the Final 12. Without Loa Shift's final treatment…\n\nHow could you have let this happen?\n\n*choice\n\t#Return to the voting ceremony again to see if I can avoid being blindsided. (Legend Cost 20)\n\t\tYou won't have the opportunity to play your politics over again, just an opportunity to cast your vote differently.\n\n\t\tDid you do enough that voting a different way will actually be sufficient to save you from this blindside?\n\n\t\tYou're about to find out.\n\n\t\t*set legended -20\n\t\t*page_break\n\t\t*goto firstvotetime\n\t#Restart The Hero Project over from the beginning to see if I can make this outcome work a different way.\n\t\tYou're going to find a way to make this vote work, no matter how many times it takes you.\n\n\t\tBetter luck next time, ${codenamed}!\n\t\t*ending\n\n*label crushhallway\n*set parttwofinrlshp false\n\n*if transfergone\n\t*set showtransfer false\n\t*set partthreefinrlshptgone true\n\n\tUnfortunately, you know that Weaver and JK probably won't be thrilled that Transfer was eliminated because of you, whether ze really wanted to be here or not. So you make your way back towards your room very slowly. In fact, you're not sure if you want to head there at all right now…\n\t*goto crushchoice\n*else\n\t*set showgriffin false\n\t*set partthreefinrlshpggone true\n\t*set thirteenstay \"Transfer\"\n\n\tPerhaps most importantly, you know that both Weaver and JK are going to be thrilled with your vote tonight, since you used your newfound influence to stand up for a fellow Underrepresented Powered.\t\n\t*goto crushchoice\n\n*label crushchoice\n*page_break\n*achieve finaltwelve\n*set moneyed +2500\n*set lb 0\n\nStill, you try to remind yourself that all that really matters in this moment is that you've advanced to the Final 12. You don't know what The Great Loa's final request will be now that you've made it here, but that's one worry that can wait for tomorrow.\n\nRight now, you feel like you should reward yourself…perhaps even with someone you've come to care about.\n\nIt's already pretty late, though, so you know that knocking on anyone's door at this hour is certainly going to be taken as a somewhat…romantic gesture. Anyone you just want to be better friends with, you can see tomorrow at breakfast instead of the middle of the night.  \n\nIt may be a bit fast to be making a move like this, but who knows when you might get this chance again, given the lack of free time and the rate that Rookies are getting sent home. If you want a potential relationship to progress, now is the time to decide which one it will be, if any.\n*if asexual\n\tThough you also know that, even if you pursue a romantic relationship tonight, you won't be looking for any physical connection. \n*comment endif\n\n*choice\t\n\t*if (crushmissboss) #Visit Miss Boss.\n\t\t*set missbossromancescene true\n\t\t*set crushweaver false\n\t\t*set crushtransfer false\n\t\t*set crushgriffin false\n\n\t\tYou're curious to learn more about Miss Boss, especially after what Weaver told you about her earlier. No matter what Weaver's intentions may have been, it could still really be a way for you and Miss Boss to connect on a deeper level.\n\n\t\t*if griffingone\n\t\t\tBut after voting out Griffin tonight, you can't help but wonder whether Miss Boss will still seem as interested as she did earlier today. Or will she only flirt harder now that she needs to keep herself safe? Does she actually really like you, outside of all the silly game politics?\n\n\t\t\tAs you walk towards Miss Boss's room, you suppose you're about to find out. \n\t\t\t*goto missbossromancescene\n\t\t*else\n\t\t\tBut you also can't help but wonder: Will Miss Boss still be interested in you now that she doesn't need your vote as badly? Or does she actually really like you, outside of all the silly game politics?\n\n\t\t\tAs you walk towards Miss Boss's room, you suppose you're about to find out.\n\t\t\t*goto missbossromancescene\n\t*if ((transfergone) and (crushgriffin)) #Visit Griffin.\n\t\t*set griffinromancescene true\n\t\t*set crushweaver false\n\t\t*set crushtransfer false\n\t\t*set crushmissboss false\n\t\t\n\t\tYou're curious to learn more about Griffin, especially after what Transfer revealed during the voting ceremony.\n\t\n\t\tBut you also can't help but wonder: will Griffin still be interested in you now that he doesn't need your vote as badly? Or does he actually really like you, outside of all the silly game politics?\n\n\t\tAs you walk towards Griffin's room, you suppose you're about to find out.\n\t\t*goto griffinromancescene\n\t*if ((griffingone) and (crushtransfer)) #Visit Transfer.\n\t\t*set transferromancescene true\n\t\t*set crushweaver false\n\t\t*set crushgriffin false\n\t\t*set crushmissboss false\n\n\t\tYou have to admit, you're also curious to see Transfer so that you can learn more about why ze revealed what ze did about Griffin during the voting ceremony.\n\n\t\tAnd you suppose now that you've successfully kept hir safe, it's time to find out if ze has started to feel the same way about you that you feel about hir.\n\n\t\tAs you walk towards Transfer's room, you try to hope for the best, on both fronts.\n\t\t*goto transferromancescene\n\t*if (crushcrystalline) #Visit Crystalline.\n\t\t*set crystallineromanceattempt true\n\n\t\t*if transfergone\n\t\t\tYou want to apologize to Crystalline and explain your vote, hoping that you can patch things up somehow. Just because you had a hand in sending Transfer home doesn't mean you want Crystalline as an enemy.\n\n\t\t\tThough she might not feel the same way at all.\n\t\t\t*goto interuptus\n\t\t*else\n\t\t\tNow that you've successfully kept Transfer safe, you want to celebrate with Crystalline…and see if she might be over Ignite. Though even if she is, you have to wonder: Could she ever really have feelings for you?\n\n\t\t\tAs you walk towards Crystalline's room, you suppose you're about to find out.\n\t\t\t*goto interuptus\n\t#Visit Weaver, because I definitely have the biggest crush on ${weaverhir}.\n\t\t*set crushweaver true\n\t\t*set weaverromanceattempt true\n\t\t*set crushgriffin false\n\t\t*set crushtransfer false\n\t\t*set crushmissboss false\n\n\t\t*if griffingone\n\t\t\tNow that you've successfully kept Transfer safe, you want to celebrate with Weaver…and maybe find out if ${weaverze} possibly feels the same way you do.\n\n\t\t\tAs you walk towards Weaver's room, you suppose you're about to find out.\n\t\t\t*goto interuptus\n\t\t*else\n\t\t\tYou want to apologize to Weaver about your vote, though hopefully ${weaverze} understands why you voted the way you did, like ${weaverze} promised ${weaverze} would. And maybe in the process you can find out if ${weaverze} feels the same way you do.\n\n\t\t\tAs you walk towards Weaver's room, you suppose you're about to find out.\n\t\t\t*goto interuptus\n\t#Visit Weaver tonight, but just as my friend and handler. There's too much to talk about that can't wait until the morning.\n\t\t*if griffingone\n\t\t\tNow that you've successfully kept Transfer safe, you want to celebrate with Weaver…and maybe find out what happened earlier, both with you and with Transfer.\n\n\t\t\tAs you walk towards Weaver's room, you suppose you're about to find out.\n\t\t\t*goto interuptus\n\t\t*else\n\t\t\tYou want to apologize to Weaver about your vote, though hopefully ${weaverze} understands why you voted the way you did, like ${weaverze} promised ${weaverze} would. And maybe in the process you can find out what might have happened earlier, both with you and with Transfer.\n\n\t\t\tAs you walk towards Weaver's room, you suppose you're about to find out.\n\t\t\t*goto interuptus\n\t#I just want to go back to my room and check that JK is still feeling better.\n\t\t*if griffingone\n\t\t\tNow that you've successfully kept Transfer safe, you want to celebrate with JK, who will no doubt be happy about the stand you took.\n\n\t\t\tSo you double your pace back towards your room.\n\t\t\t*goto interuptus\n\t\t*else\n\t\t\tYou want to explain your vote to JK, since she inevitably won't be happy about you sending another Underrepresented Powered like Transfer home…especially after what happened to StarSoar.\n\n\t\t\tSo you take a deep breath and continue heading back towards your room.\n\t\t\t*goto interuptus\n\t#I'm actually dying for a moment alone, so I might head to one of the courtyard gardens by myself.\n\t\t*goto interuptus\n\n*label griffinromancescene\n*page_break\n\nYou knock on Griffin's door and try to stop your heart from pounding out of your chest. Thank slugger you at least look mostly human today—you try to let that build your confidence a bit, but it doesn't end up helping much. You attempt to string some words together while you wait to explain your presence here, but all of your thoughts freeze and shatter once Griffin opens his door…\n\nWearing only a towel, water dripping down his exposed skin from the shower he must have just taken. You try to speak, but find that you can only focus on the droplets of water running down Griffin's broad, hairy chest and through the ripples in his stomach muscles.\n\nGriffin catches your wandering eye and you snap your head back up to his face, just in time to find a killer smile working its way there. Griffin then glances behind you, up at the camera orb that followed you to his door. With a flick of his wrist, he sends a wave of concussive energy up at the orb that knocks the camera back into the wall.\n\n\"Lucky for me, I learned how to do the same to all the hidden cameras in my bathroom,\" Griffin says. \n\n*if asexual\n\t*page_break\n\tSuddenly realizing that Griffin will be interested in only one thing, you take a step back.\n\n\t\"I didn't mean to interrupt,\" you manage to say. \"Just wanted to check that you were okay. See you tomorrow!\"\n\n\tBefore Griffin can object, you turn on your heels and head down the hallway. You're looking for a purely emotional connection and you definitely know now that you should be looking for it with someone else.\n\n\tWhich, for tonight, is enough.\n\n\t*page_break\n\n\tStill feeling a little disappointed, you creep your way back towards your room, hoping that no one will see you walking through the mansion halls this late.\n\t*goto interuptus\n*else\n\t\"Why is that lucky?\" you manage to ask, forcing your voice to remain even.\n\t*goto luckybcs\n\n*label luckybcs\n*page_break\n\n\"Because I hate taking showers in front of an audience,\" Griffin starts, turning around and walking back inside his room. \"But I also hate taking showers alone.\" \n\nGriffin then drops the towel from his waist just as he reenters his bathroom, where you can still hear the water running inside. \n\nA superfamous, superwealthy, and superhandsome hero just invited you to…you can't even process what you might get to do if you follow Griffin into that bathroom. Your first instinct is to turn and walk away—this is all way too much, way too fast.\n\nInstead, you end up listening to your second instinct:\n\nTo walk inside, close the door behind you, and see what waits for you inside that steam-filled bathroom.\n\n*page_break A FEW HOURS LATER\n*set rlshp_griffin %+40\n\nStill feeling light-headed, you creep your way back towards your room, hoping that no one will see you walk-of-shaming it through the mansion halls.\n*goto interuptus\n\n*label missbossromancescene\n*page_break\n\nYou knock on Miss Boss's door and try to stop your heart from pounding out of your chest. Thank slugger you at least look mostly human today—you try to let that build your confidence a bit, but it doesn't end up helping much. You attempt to string some words together while you wait to explain your presence here, but all of your thoughts freeze and shatter once Miss Boss opens her door…\n\nWearing perhaps the most unflattering pajama onesie you'e ever seen. It's about three sizes too big, covered in food stains, and colored in a pale green that reminds you of vomit. Miss Boss's hair is up in a messy bun and half of her makeup has been washed off. Seeing you standing there, she looks immediately mortified.\n\n\"Oh my god, I thought you were…\" Miss Boss trails off, closing the door to cover herself.\n\nYou can't help but smile and suppress a chuckle, as you try not to think about who else Miss Boss was expecting this late. Instead, you say: \"I think you look great.\"\n\nAnd you really mean it.\n\n*page_break\n\nMiss Boss keeps her eyes on the floor, but you can tell she blushes and fights a smile.\n*if (tarsierohate) or (griffingone)\n\tHowever, you then see Miss Boss correct herself, growing stern. She must still be upset about the way you voted tonight.\n\n\t\"Listen, sorry to interrupt, I just came here to apologize for my vote,\" you say. \"I want you to know it had nothing to do with you. And that I'd never vote for you.\"\n\n\tMiss Boss looks up and must see the earnest expression on your face, because she nods.\n\n\t\"I was hoping we could get to know each other better, you know, outside of the game,\" you say. \"Especially now that I've seen you in your jammies.\"\n\n\tAt that, Miss Boss laughs out loud.\n\n\t*page_break\n\n\t\"Listen, I'm exhausted now and honestly, I just need some time to process everything,\" Miss Boss sighs. \"But I'd like that. Really.\"\n\n\tYou smile at Miss Boss and she smiles back—and you have to admit, it's the prettiest you've ever seen her look.\n\n\t\"Good night, ${named},\" Miss Boss says, biting her lip as she closes her door.\n\n\t\"Good night, Daniela,\" you say, trying to hear yourself over the sound of your heart thundering in your chest.\n\n\t*set rlshp_missboss %+20\n\t*goto leavingmb\n*else\n\t*goto hookuptimemb\n\n*label hookuptimemb\n\n\"Sorry to interrupt,\" you say. \"I just wanted to make sure you're okay. It's been an intense day.\"\n\n\"Aw, thanks. And thank you for voting with us tonight,\" Miss Boss says. \"It really means a lot. More than you know, actually.\"\n\nYou and Miss Boss lock eyes, and you feel like your heart may explode in your chest.\n\n*page_break\n\n\"Well, I was hoping we could get to know each other better, you know, outside of the game,\" you say, trying to fill the silence. \"Especially now that I've seen you in your jammies.\"\n\nAt that, Miss Boss laughs out loud.\n\n*if asexual\n\tOnce Miss Boss stops laughing, she steps back and smiles at you.\n\n\t\"Thanks for checking on me,\" Miss Boss says. \"I'm a bit of a hot mess at the moment, but maybe we'll get to spend more time together soon. I'd…really like that.\"\n\n\t\"I would too,\" you say, trying to keep your cheeks from blushing too much.\n\n\t\"Good night, ${named}\" Miss Boss follows up, closing her door.\n\t*page_break\n\t*set rlshp_missboss %+40\n\t*goto missbossgoodnight\n*else\n\t*goto mbnotexpec\n\n*label mbnotexpec\nOnce she stops laughing, though, Miss Boss does something you're not expecting at all—she opens the door fully and pulls you into a kiss.\n\nA completely amazing one.\n\n*page_break\n*set rlshp_missboss %+40\n*set missbosskiss true\n\nYou're not sure if seconds or hours go by, but once Miss Boss pulls away, you feel like a completely different person.\n\n\"I'd like to get to know you better too. A lot,\" Miss Boss says, biting her lip as she closes the door. \"Good night, ${named}.\"\n\n*label missbossgoodnight\n\"Good night, Daniela,\" you manage to say just before the door closes. \n\nYou stand there for a few seconds, thinking nothing can pull you out of this living daydream—until the sound of a camera orb shifing focus behind you wakes you back up.\n\nWell, that's bound to get some attention, whether you want it or not. \n\n*label leavingmb\n*page_break\n\nStill feeling light-headed, you creep your way back towards your room, trying to keep from shouting out loud from sheer giddiness.\n*goto interuptus\n\n*label transferromancescene\n*page_break\n\nYou knock on Transfer's door and try to stop your heart from pounding out of your chest. Thank slugger you at least look mostly human today—you try to let that build your confidence a bit, but it doesn't end up helping much. You attempt to string some words together while you wait to explain your presence here, but all of your thoughts freeze and shatter once Transfer opens hir door…\n\nLooking like ze has just been crying. \n\n\"Oh. ${codenamed},\" Transfer says, wiping hir cheeks a few extra times. \"I thought you were room service with the gallon of coconut ice cream I ordered. But hey, thank you so much again for your vote tonight. Slugger knows I needed the support, after what I did.\"\n\nYou smile at Transfer, feeling the question you want to ask bubble up in your throat: [i]Why did you do what you did?[/i]\n\n\"Listen, if it's okay, I don't want to talk about it yet. It's been a long night, and I'm exhausted, and quite frankly stunned to still be here,\" Transfer says, sounding as exhausted as ze claims. \"But let's just say I got handled by a producer tonight, and that is a mistake I will make sure not to repeat, now that I've been given this second chance.\"\n\nYou nod at Transfer, knowing this is all you need to hear. And hoping, very desperately, that the producer Transfer is referring to isn't Weaver.\n\n*page_break\n\nTransfer then turns away, looking like ze might cry again for a moment. Knowing how easy it is to feel overwhelmed by all this, you don't think twice before stepping forward and pulling Transfer into a tight hug. \n\n*if asexual\n\tTransfer starts weeping again in your arms, then steps back and smiles at you.\n\n\t\"Thanks for checking on me,\" Transfer says, wiping hir eyes. \"I'm a bit of a mess right now, but hopefully we'll get to spend more time together soon. I'd…really like that.\"\n\n\t\"I would too,\" you say, trying to keep your cheeks from blushing too much.\n\n\t\"Awesome,\" Transfer follows up, seeming to fight a blush of hir own.\n\t*goto transfergoodnight\n*else\n\t*goto huggconin\n\n*label huggconin\nAt first ze is caught off guard and tenses up, but it isn't long before you can feel hir body relaxing into yours. \n\nThen ze does something you aren't expecing at all—ze steps back and pulls you into a kiss.\n\nAnd you don't think you've ever felt anything better.\n\n*page_break\n\nYou're not sure how long you've been kissing Transfer, but you feel like you could let it happen forever. You're also thinking this kiss might turn into something more if it goes on much longer, until you hear a camera orb shifting focus somewhere behind you. \n\nSuddenly remembering you're on a reality show, both you and Transfer immediately separate.\n\n\"That was…\"\n\n\"Something we need to do again,\" Transfer finishes for you. \"Though maybe when there are less of those slugging orbs around?\"\n\nYou both laugh and smile underneath your respective blushing cheeks, until Transfer says:\n*label transfergoodnight\n\"Good night, ${named}.\"\n\n\"Good night, Iita,\" you say as Transfer closes hir door slowly in front of you. Once ze does, you turn to go, trying to hear anything over the sound of your heart thundering in your chest.\n\n*page_break\n*set rlshp_transfer %+40\n\nStill feeling light-headed, you creep your way back towards your room, trying to keep from shouting out loud from sheer giddiness.\n*goto interuptus\n\t\n*label interuptus\n\nHowever, before you can take another step, you hear a distant voice echo in your ear.\n\n\"Go to the roof.\" \n\nYou stop in your tracks, because you'd recognize that ancient voice anywhere.\n\nAnd when Loa Shift calls, you know you had better answer.\n*if crystallineromanceattempt\n\tUnfortunately, this means that your late-night visit to Crystalline will have to wait—which, on second thought, might be just as well.\n*if weaverromanceattempt\n\tUnfortunately, this means that your late-night visit to Weaver will have to wait—which, on second thought, might be just as well.\n\n*page_break ON THE ROOF\n\nStanding on the roof, you can tell why Loa Shift told you to come here—it is completely deserted, barring various elevator shafts and air-conditioning units. There are no camera orbs in sight, which is definitely something that will be good to know in the future.\n\nWhat you still don't know is how Loa Shift spoke in your ear the way she just did, or how she has managed to appear in front of you now as a floating apparition, her face dripping away like melting candle wax. Perhaps it's some kind of built-in timer, but whatever it is, it's infinitely creepy.\n\n\"Now that you have made the Final 12, you have one remaining task to complete,\" The Great Loa whispers, her purple lips obscured as they melt from her leathery face. Seeing this bubbling apparition, you're not sure if any cameras could capture it even if they were here to begin with…\n\n\"Your final task has been communicated from beyond. It will not only ensure JK's well-being, but the well-being of the Underrepresented Powered community at large, as greater awareness will spread,\" Loa Shift whispers, pausing momentarily as her bottom lip drips away with the rest of her jaw. \"Your final task is simple…\"\n\n*page_break \n\n\"When the time comes, you must let Miss Boss fall.\"\n\nAs Loa Shift's nose bleeds off and her eyes run down her cheeks like tears, her entire apparition suddenly melts into a puddle, then disappears entirely. \n\nAlone on the cold roof, you are left with only one searing thought:\n\n[i]What the slugger does that mean?[/i]\n\n*finish NEXT CHAPTER: BOSS LEVEL\n", "rs_six": "*comment é x\n\n*text_image chap6.png center Chapter Six: Real Talk\n\n*set showignite false\n*set crystallineignitenameon false\n*set crystallinenameon true\n\n*if phtwenty\n\t*set power 120\n\t*set health 120\n\t*goto startchap\n*elseif phten\n\t*set power 110\n\t*set health 110\n\t*goto startchap\n*else\n\t*set power 100\n\t*set health 100\n\t*goto startchap\n\n*label startchap\n\n\"I…I just…this isn't how my story is supposed to go.\"\n\nHe can't bear to say more than that, but he doesn't have to. The disappointment shows on Ignite's face like an open wound—one you can tell will leave a scar. Since Ignite seems to have nothing more to say, the show cuts to footage highlighting his time on The Hero Project, leading up to his fourteenth-place elimination. \n\nAs if the Ani-cide bloodbath you stumbled upon weren't awful enough, the Rookies then had to endure a Leaderboard elimination ceremony directly after. You found it hard to care about the game at that moment, but given your leadership role and the presence of Fistfull and Monk on the Judges panel, you knew your place in the competition was suddenly at stake. \n\nSo you forced yourself to care.\n\n*page_break\n\n*if (lb > 75)\n\t*set legended +10\n\t*achieve fivelbhigh\n\n\tLuckily the Judges, even Monk and Fistfull, seemed to think you did an admirable job in the mission. While they didn't exactly sing your praises at the elimination ceremony, they did at least commend your efforts to successfully coordinate the takedown of The Primals.\n\n\tAs a result, your Leaderboard score of ${lb} tied you in first place with Crystalline, placing you both in the running for Immunity. But the top honor ended up going to Crystalline, for her role in capturing Lolli and saving Ignite.\n\n\tThe Judges were less forgiving when it came to the rest of the Rookies. Claiming to want to push you all to do your best, they gave Griffin, Miss Boss, and Transfer mere passing scores. Then, when it came down to the low-score elimination, the bottom two spots were occupied by Tarsiero and Ignite. \n\n\tWhile Tarsiero seemed oddly calm and content about this, Ignite looked like he might vomit.\n\t*goto thattiem\n*else\n\t*set legended +5\n\t*achieve fivelblow\n\n\tUnfortunately, none of the Judges seemed impressed by your mission performance. They immediately gave Crystalline the high-Leaderboard Immunity for her role in capturing Lolli and saving Ignite, praising her as the clear MVP.\n\n\tThe Judges were less forgiving when it came to the rest of the Rookies. Claiming to want to push you all to do your best, they gave Griffin, Miss Boss, and Transfer mere passing scores for their takedowns of The Primals. Then, when it came down to the low-score elimination, the bottom two spots were occupied by you and Ignite, tied with a Leaderboard score of ${lb}. \n\n\tThe Judges singled you out because of your visible leadership role, holding you responsible for the overall loss, while they singled out Ignite for his mishandling of the Lolli situation. \n\n\tStanding on stage next to Ignite in the bottom two, you were so nervous that you thought you might vomit. Sadly, Ignite looked exactly the same way. \n\t*goto thattiem\n\n*label thattiem\n*page_break\n\nUltimately, the Judges thought Ignite's inexperienced blunder handling Lolli showed a lack of field experience and instinct, so they sent him packing. \n*if (lb \u003c= 75)\n\tWhile you experienced a surge of pure relief to have been spared, you couldn't help but feel bad for Ignite.\nThe elimination came as a serious blow to the young prodigy, who obviously seems very used to succeeding. Apparently viewers were equally surprised when the mission episode aired last night, given Ignite's former frontrunner status and showmance with Crystalline—his fans definitely thought he'd last much longer.\n\nThough no one was more upset about this elimination than Crystalline. At the ceremony, you saw firsthand how she went from elation over her Immunity win to complete devastation in a matter of minutes. Even now, Crystalline has tears in her eyes as you sit beside her watching the production-approved snippets of the mission episode—apparently, from now on, you'll only be allowed to see certain edited portions of each episode, to \"maintain the integrity of the game.\"\n\n\"It's just not fair,\" Crystalline says, watching herself on the 3V as she says goodbye to a stoic Ignite on stage. \"He didn't deserve to go home at all.\"\n\n*page_break\n*achieve finalthirteen\n\nAs sad as it is to see someone as passionate and dedicated as Ignite go home, you think that this string of serial Ani-cide hate crimes is what's really unfair—and disturbing. You're itching to find out more about what Lyra and the DRPR have learned about these murders, especially now that Lolli has been captured successfully. So far you've been kept in the dark, told only that you'll get a full debrief at tonight's live voting ceremony. \n\nWhich means that right now, whether you like it or not, your priority has to be surviving this upcoming Rookie vote. \n*if trilogyreader\n\tApparently this vote will operate differently from last season:\nTonight, the remaining six Rookies will each have to cast a single vote to eliminate another of your own in thirteenth place. The only Rookie safe from this vote is Crystalline, given her Leaderboard Immunity, so you currently face a one-in-five chance of being voted out alongside Transfer, Tarsiero, Miss Boss, and Griffin.\n\nYou must survive this vote if you are to make it to the Final 12 and perform your last pending task from Loa Shift.\n*if (societal > 50)\n\tYou now also find yourself wanting to survive so that you can continue fighting against these Ani-cides and put a stop to them.\nWhich of course means that your relationships with the other Rookies matter now more than ever. So with Crystalline crying silently next to you and the camera orbs circling, what will you say?\n\n*choice\n\t#\"You're right, it really isn't fair. Someone else should have gone home.\"\n\t\t*set loyalcit +1\n\t\t*set floating +1\n\t\t*set rlshp_crystalline %+20\n\n\t\t\"I know,\" Crystalline sighs. \"Ignite may be a perfectionist and overthink things, but anyone could have been fooled by Lolli's trick. Besides, Ignite was the only one to spot that she was alive in the first place! He has more training than any of us.\"\n\t\t*goto crysbeat\n\t#\"Ignite will have to learn this lesson sooner or later: being an adult means not coming in first place all of the time.\"\n\t\t*set solostar +1\n\t\t*set rlshp_crystalline %-20\n\t\n\t\t\"He just wanted to do so well, for his family. And to make his school proud as their first Infini graduate. Everyone looks up to him so much,\" Crystalline sighs. \n\t\t*label crysdefense\n\t\t\"He put so much pressure on himself—maybe that's why he overthought things with Lolli. Still, Ignite was the only one to spot that she was alive in the first place! He has more training than any of us.\"\n\t\t*goto crysbeat\n\t#\"Tarsiero should have been the one eliminated, in my opinion.\"\n\t\t*set loyalcit +1\n\t\t*set manipulater +1\n\t\t*set rlshp_crystalline %+20\n\n\t\t\"He really should have,\" Crystalline says. \"Neither of them has much field experience, but at least Ignite had extensive training. That's more than anyone can say about Tarsiero.\"\n\t\t*goto crysbeat\n\t#\"Someone had to go and, unfortunately, Ignite made the worst mistake of the mission.\"\n\t\t*set loyalgmbt +1\n\t\t*set solostar +1\n\t\t*set rlshp_crystalline %-20\n\n\t\t\"That's not fair,\" Crystalline returns. \"Ignite may be a perfectionist and overthink things, but anyone could have been fooled by Lolli's trick. Besides, Ignite was the only one to spot that she was alive in the first place! He has more training than anyone.\"\n\t\t*goto crysbeat\n\t#\"I think you're right—but this is a great bunch of heroes, so whoever goes home from now on won't truly deserve it.\"\n\t\t*set truehero +1\n\t\t*set rlshp_crystalline %+20\n\n\t\t\"I just feel so bad for Ignite,\" Crystalline sighs. \n\t\t*goto crysdefense\n\t#\"Crystalline, how are you holding up?\"\n\t\t*set floating +1\n\t\t*set truehero +1\n\t\t*set rlshp_crystalline %+20\n\n\t\t\"I just feel so bad for Ignite,\" Crystalline sighs. \n\t\t*goto crysdefense\n\n*label crysbeat\n\nAs Crystalline finishes speaking, you can hear her heartbeat picking up its pace and see moisture welling up in her tear ducts. This is all thanks to your newly acquired owl senses, which increase your hearing and vision to extremely fine levels. Luckily today your Ani-Morpho transformation has left you looking mostly human: your eyes and ears have morphed to take owl form, but the rest of your body remains unchanged. Well, mostly—since your enhanced owl eyes now remain fixed straight-forward in your head, your neck can swivel nearly two hundred and seventy degrees.\n\n\"I just wish I could talk to him,\" Crystalline sniffles before you can snap out of your owl adjustments enough to respond. \"You know, make sure he's okay. It's so unfair that they won't let us see each other. I don't know how I'm going to do this alone.\"\n\n\"You started this thing on your own, and that's how you'll finish it, Crys,\" Transfer suddenly says, breaking hir silence. You had almost forgotten ze was in the room, since ze has been sitting on hir bed, watching quietly. \n\nTransfer offers a sympathetic look, but Crystalline doesn't seem interested in any comforts at the moment. Swiveling your entire head to fix your owl eyes on Transfer, you realize that it's much easier to read hir expressions today, since ze is in human form. You also can't help but notice the seams of Transfer's black-cloak costume stretching and straining, since ze turns out to actually be very full-figured and stocky in hir human form, as opposed to hir muscled and lean vampire form.\n\n\"We both worked so hard to be here, to deserve this shot,\" Crystalline goes on. \"We deserve to be here. Together.\"\n\n*page_break\n\n\"Everyone has earned their spots here, Crys. Everyone deserves to be here,\" Transfer sighs. \"I know this isn't what you want to hear, but real life isn't about winning the first time out. It's about how often you can get up after being knocked down. It's not like school, with defined rules and tests to pass and constant congratulations. Real life is messy and complicated and unpredictable. Ignite's not trained for that, but he's a fast learner. He'll figure that out like the rest of us.\"\n\nTransfer says the words and registers immediately that Crystalline just isn't ready to hear them. Realizing this, Transfer then adds: \"Ignite may have taken a tumble, but you can still win this thing yourself. The last thing he'd want is for you to give up because of him. Don't forget why you're here—this is your one shot to prove to your parents you can make it as a hero.\"\n\nKeeping your owl-eyes on Crystalline, you can tell that these words finally seem to get through to her. But before she can answer, the door opens and one of the Rookies' production handlers, Kevin, pushes a cart of lunch trays inside. You swivel your neck to face him and ignore the little startle he gives seeing your head turned entirely over your shoulder.\n\n\"Sorry to interrupt,\" Kevin says, \"but why don't you three go have lunch outside in the crystal garden? The light out there is perfect right now.\"\n\nKevin isn't actually your handler, but you figure you should follow his suggestion anyway, since your own handler, Weaver, was the one who recommended you pay this visit to Crystalline and Transfer in the first place. A little lunch date might be just the setting necessary to do what you came here to do.\n\n*page_break INTO THE GARDEN\n*set meetweaver true\n\nYou have to admit, the handlers were very astute in choosing this lunch spot—it's a gorgeous place to film. \n\nNow seated in the leaf-lined courtyard beneath Crystalline and Transfer's room, you find yourself surrounded by clusters and constellations of vibrant crystals. Each one glitters a different color in the afternoon sunlight, creating a shimmering ocean of reflections and refractions. The crystals also happen to be nestled between grand strands of orchids, which to your complete surprise seem to be singing some familiar aria. You were told not to touch these operatic orchids, though, since apparently they stain your fingertips.\n\nYou do feel tempted to touch one of the crystals instead. You think about how much JK would love a pink crystal, since it's her favorite color. She isn't usually into super girly stuff, claiming instead that her attraction to pink is more of a jellyfish thing. Whatever the reason, you also resist the urge to pick a pink crystal, since you know those are quite explosive.\n\nDuring the last mission you learned that Crystalline color-codes all of her creations by usage category, so you focus on your own favorite:\n\n*fake_choice\n\t#Pink, just like JK.\n\t#Blue, for heat.\n\t#Red, for cold.\n\t#Clear, for force.\n\t#Black, for healing.\n\t#Green, for teleporting.\n\t#Purple, for strengthening.\n\t#White, for dehydration.\n\t#Yellow, for shielding.\n\nYou know there are also subtle variations in color for subcategory crystal types, plus Crystalline rotates categories a few times a year so that her potential foes can't predict her moves. Apparently Crystalline is vulnerable to her own crystal creations, since they can be activated and utilized by others—yet another reason you resist the urge to pluck a crystal and ask a question instead.\n\n\"Crystalline, these are all so incredible,\" you begin. \"Do you always have to pre-grow your crystals like this?\" \n\n\"I can generate crystals on the go, but those tend to be pretty weak,\" Crystalline explains, her eyes falling across her creations. \"The longer I let the crystals grow, the stronger they become. I have a huge crystal garden at my parents' house, but the production team let me grow some important crystals here, to bring into missions.\"\n\n\"Can you really make crystals that do anything?\" you ask, noticing that Crystalline is currently forming an icy red crystal in her palm, probably to cool her down in this sunny courtyard.\n\n\"Well, up until now I was focused mostly on making traditional battle crystals, but then I figured out how to design crystals that enhance human physiology temporarily. Those are trickier compositions though, so I still need time and focus and rest to make them,\" Crystalline explains. \"I thought that was the limit, but Ignite was teaching me how to make natural-resource crystals, too. He's the first Infini Powered I've ever met….\"\n\n*page_break\n\nFor a moment there Crystalline seemed excited and engaged, but she then slumps back down at the mention of Ignite. \n\n\"Hey, if the limit to your crystal creation really is your imagination,\" Transfer jumps in, \"you might actually be Infini Powered yourself.\"\n\n\"That's what Ignite said,\" Crystalline sighs. \"I haven't tested at that Power Level yet, but he thought that if I kept practicing, I could someday create any crystal I want at any strength level instantly, instead of taking so much time. Ignite even thought I might be able to combine multiple functions in single crystals, someday. He said if I learned to do that, I'd be virtually unstoppable.\"\n\nCrystalline seems to gain a bit of optimism at this thought, but you can't help but repress a shudder. That thought is a bit more discomforting than exciting to you, given all you've experienced with intense Power sets affecting human physiology and psychology. What could that level of Power and influence do to a person?\n\n\"Still, before I do any of that I need to find a way to make the crystals only work for me,\" Crystalline adds, perhaps catching the look of unease on your face. \"Until then I need to be extra careful—I'd never want my crystals to fall into the wrong hands or be used for anything other than good.\"\n\n*page_break\n\n\"Infinite power, infinite responsibility,\" Transfer says, hir eyes fixed on a spot beyond Crystalline. Ze keeps hir eyes focused there for a few more seconds before seeming to snap out of it. \"Wow, sorry, I get really spacey when I'm hungry. Mind if we start eating?\"\n\nBefore you or Crystalline can so much as nod, Transfer uncovers hir tray to reveal a plate of roasted vegetables and a dressed bean salad. This most definitely was not what you were expecting, given Transfer's usual rotating daily diet of brains, blood, and red meat.\n\n\"On my human days I try to eat vegan and gluten-free, to get some clean eating in,\" Transfer says, obviously noticing your surprised stare. \"I was actually a vegetarian before I got my Powers, so the food adjustment has always been…jarring. My diet on the other days is all fairly, uh….\"\n\nTransfer doesn't finish the sentence, clearly embarrassed by hir less than usual dietary requirements. But you understand unusual Ani-cravings better than just about anyone, so instead of responding, you uncover your own plate to reveal:\n\n*choice\n\t#Rabbit risotto. My owl-self was craving rodents and insects today, but I was too embarrassed to actually ask for that.\n\t\t*set image %+25\n\t\t*goto cravingsa\n\t#Insect stew. I don't care what anyone else thinks—in fact, I like freaking everyone else out by eating Ani-delicacies.\n\t\t*set image %-25\n\t\t*goto cravingsa\n\t#Trout. This seemed like the most palatable option—while my tastes seem to change with my daily transformations, my actual digestive system doesn't. \n\t\t*if (image > 50)\n\t\t\t*set image %+15\n\t\t\t*goto cravingsa\n\t\t*else\n\t\t\t*set image %-15\n\t\t\t*goto cravingsa\n\n*label cravingsa\n\n\"My cravings change everyday, I totally get it,\" you say, smirking at Transfer.\n\nAs you do, you suddenly hear hir heart pick up its pace, as ze stares back at you. When you return the look with your owl eyes, the intensity makes you so uncomfortable that you have to shift your eyes down. Which of course means shifting your entire head down, rather obviously.\n\nThat's when you notice the tattoo on Transfer's neck, which must only be visible in hir human form. It matches the enamel symbol sewn into the front of hir costume-cloak: a perfectly symmetrical letter T. You immediately realize this must not just stand for hir name, Transfer, but also for hir three Morpho-Powered forms. It looks like you're not the only one who has taken a kind of triquetra as your personal symbol…\n\n\"Well, I guess my food thing doesn't really compare,\" Crystalline says, breaking the silence before you can mention Transfer's tattoo. You have no idea how long you and Transfer were staring in silence, but it must have been a while, given Crystalline's awkward tone. \"But I have a super sensitive stomach, hence the plain white rice and chicken.\"\n\n\"Look at that!\" Transfer says as ze starts eating. \"Little Miss Perfect is human after all.\"\n\n*page_break\n\n\"What makes you think I'm perfect?\" Crystalline asks, suddenly frowning.\n\n\"Oh, I'm sorry, I didn't mean to be rude,\" Transfer says, looking from you back to Crystalline. \"It's just, I mean, come on! Not only do I quite literally look like a monster most of the time, but my Morpho-transformations give me pretty severe chronic pain. Do you know what it's like to regrow claws and fangs every few days, not to mention dropping and gaining thirty pounds every time I switch in and out of human form? My life, by its very design, is difficult all of the time—and we're not even talking about how most people tend to treat someone like me, including my own parents, once upon a time.\n\n\"While you, Crystalline, are a beautiful girl from a loving, wealthy family and possess near-limitless, smiled-upon Power. People look at you and see something desirable,\" Transfer continues, seemingly unable to stop hirself now that ze is on a roll. \"I know you appreciate all you have and you've worked hard to become a hero, but you have to understand that to me, you don't have all that much to complain about. I mean, if an occasional case of the runs and a new boyfriend getting cut were all I had to worry about, I'd be dancing a motherslugging jig on this table right now.\"\n\nYou can tell Transfer didn't mean to be harsh when ze started, but as ze takes a deep breath and finishes, Transfer suddenly seems keenly aware of the camera orb hovering just behind hir shoulder. Meanwhile, Crystalline sits silently across the table, her face a mask of seriousness. You almost expect her to burst into tears, but instead, a look of compassion comes over her.\n\n*page_b
