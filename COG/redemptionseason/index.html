come\n\t\t*else\n\t\t\tYou break forward to strike mercilessly with your extra tardigrade fists, purposefully not engaging in your secondary martial-arts specialty, in case Less might see that coming.\n\n\t\t\t*label deftheoutcome\n\t\t\t*if (defensive > 60)\n\t\t\t\t*achieve deffinalhigh\n\t\t\t\t*set power -10\n\t\t\t\t\n\t\t\t\tAs you approach, you see Less begin to move into a defensive blocking pattern and you realize she must have some martial-arts training as well. Recalibrating your attack, you spin around Less's block and successfully land a different, less direct attack combo. \n\n\t\t\t\tYou then watch as Less is sent reeling to the floor from your new attack.\n\t\t\t\t*goto phtester\n\t\t\t*else\n\t\t\t\t*set power -20\n\t\t\t\t*set health -15\n\n\t\t\t\tAs you approach, you see Less begin to move into a defensive blocking pattern and realize she must have some martial-arts training as well. Unfortnately, she hits you with another unexpected pain blast that knocks off your concentration enough for Less to spin into a counter-maneuver and slam her palm into your throat. You gag and choke and fall to the floor.\n\n\t\t\t\tIgnoring the pain and breathlessness and popping to your feet with unexpected speed, you recalibrate your attack and manage to spin around Less to successfully land a different indirect attack combo. Now Less is the one sent reeling to the floor.\n\t\t\t\t*goto phtester\n\t#Dehydrate and knock out Less with a Powerful cryptobiotic blast. (Power Cost 10-20)\n\t\t*set fighting %-15\n\n\t\tBefore you can move, Less raises her hands and lets loose a blast of red energy that slams into your chest. The pain on contact is excruciating, but your tardigrade body doesn't adjust to shield you—which must mean that Less can generate some kind of pain blast that doesn't actually cause any harm. Despite how incredibly distracting her Powers might be, you can now retaliate with your own blast.\n\n\t\tInvisible Animalistic force crackles behind your fingertips, so you lift your palms and drain the cryptobiotic energy from your body. This invisible cryptoblast stuns Less immediately and causes her to drop to the floor, shriveling and gasping for air.\n\n\t\t*if (fighting > 38)\n\t\t\t*achieve powersfinalhigh\n\t\t\t*set power -10\n\t\t\tThe blast also fires without a hitch, thanks to your Powered balancing expertise.\n\t\t\t*goto phtester\n\t\t*else\n\t\t\t*set power -20\n\t\t\t*set health -15\n\t\t\tThankfully the blast fires without a hitch, but you can feel it drain your Power and Health more than usual, since you're not as experienced balancing such Powered moves.\n\t\t\t*goto phtester\n\n*label phtester\n*page_break\n*if (power = 60) or (health = 50)\n\t*set lb +10\n\t*goto phtestover\n*else\n\t*set lb +20\t\n\t*goto phtestover\n\n*label phtestover\n\nFrom the ground, Less then surprises you by generating a new, yellow blast—but as this one hits your chest, you find yourself tingling with pleasure. With no time to figure out the intricacies of Less's nerve-related blasts, you kneel down and knock her out with a quick jab to her jaw. This may be brutal, but you don't have time to play around with these deadly Ani-cide murderers.\n\nYou look back across the cave to find that Miss Boss has taken out all of the Reduct brutes and has apparently burned through Outlet, since he lies in a sizzling electric heap beside a puddle of brute bodies. She now faces The Voice, her plasma cannon drawn and pointed directly at his face.\n\n\"I took you down once before in the Semi-Finals, don't make me do it again,\" Miss Boss says, her voice trembling. \"Whatever pathetic excuse you've conjured up to justify these murders doesn't matter anymore. Today, The Hero Project will prove you once again to be what you truly are: useless.\"\n\nThe words may sound a bit harsh, but you remind yourself that The Voice has already led this group to murder dozens of Ani-Powereds. And he is using his embarrassment at Miss Boss's hands on The Hero Project as at least a partial motivation, which is something Miss Boss obviously must not like at all.\n\nIt also becomes clear that The Voice doesn't like Miss Boss's words, either.\n\n[b]I am the voice of The Voiceless, you shallow monster![/b] The words appear above The Voice as his face turns red with a rush of unbridled anger. [b]AND I AM NOT USELESS![/b]\n\n*page_break\n\nMiss Boss shakes her head and pulls the trigger on her plasma cannon before you can get a word in. For a moment, all you can think is: it's over. The danger has passed; the murders have been stopped. You can even hear the rumble of distant blasts through the rubble blocking the tunnel entrance, indicating the arrival of the other Finalist teams. Miss Boss's plasma blast rockets forward at The Voice and he winces, holding his hands up in front of his face…\n\nWhere a hard-light shield suddenly appears to block Miss Boss's blast. As the blast ricochets off of the shield and into one of the cave walls, you're not sure who looks more surprised: you, Miss Boss, or The Voice. His eyes bulge at the shield, which appears to be made of the same light as his projected images. \n\nAs he stares at the hard-light shield, The Voice's emotions begin to play across his face. First his anger fades to confusion, and then, as he moves his hands and manipulates the shield in front of him, his confusion turns to wonder. Before you can even register what is happening, The Voice's wonder splashes back to cold rage.\n\nNot letting this stop her, Miss Boss raises her right hand to collect the ricocheted energy telekinetically while firing another plasma blast from the cannon with her left hand. The Voice expects this, however, blocking with his hard-light shield once again. Then suddenly the shield turns into a giant hand, one that swats away Miss Boss's second telekinetic plasma strike. \n\nThe hard-light hand then rockets forward and scoops up Miss Boss in one swift motion.\n\n*page_break\n\nYou run forward automatically, but everything plays out in front of you as if in slow motion. The Voice's face contorts into a soundless scream, spittle spewing from his mouth as he manipulates this massive hard-light fist extension in a blind rage. Something must have snapped in him, something that caused this new Power application to manifest.\n\nThe Voice sweeps his hard-light fist over the cliff's edge, ready to drop Miss Boss into the dark abyss below. As you watch, Loa Shift's words echo in your ears with a deafening resonance in the otherwise silent cave:\n\n[i]When the time comes, you must let Miss Boss fall.[/i]\n\nAs you run forward towards the cliff's edge, you realize the dreaded time has finally come. Everything you hold dear hangs in the balance as the hard-light fingers holding Miss Boss's torso begin to open. \n\nThe facts collate in your mind like boulders falling into place: Miss Boss will die if she falls, that much is clear as you reach the gaping drop-off. If you can somehow save her, will Loa Shift not cure JK? But if you let her fall, will you be able to live with yourself? You are alone in here with no cameras or witnesses, save for The Voice. With your word against his, would anyone ever know if you let her fall? \n\nAnd if you don't turn and attack The Voice right away, will you simply be the next one over the edge?\n\n*page_break\n\nHow could Loa Shift have known this would happen?! How could she have known?!? Will she somehow be able to see whatever you do in here, too?\n\nCould you really risk JK's life to save Miss Boss's, or vice versa? Do you believe in Loa Shift's visions? Do you trust her intentions? Will you allow her potential revenge plot to be carried out?\n\nThen the hard-light fingers release Miss Boss, and the sound of her scream is all that fills your head as she plummets into the depths below.\n\nYou react, almost purely instinctively. \n\n*choice\n\t#I need to let Miss Boss fall, for JK's sake. There's nothing I could do to save her now, anyway.\n\t\t*set societal %-20\n\t\t*label personalpivot\n\t\t\n\t\tYou pivot on the cliff's edge and launch yourself at The Voice, striking him with a swift punch to the jaw that knocks him clean out.\n\n\t\tAs you land crouched beside The Voice's thudding body, you close your eyes and listen to Miss Boss's shrill scream growing more distant…\n\n\t\tUntil you can't hear it anymore.\n\n\t\t*if (societal \u003c 20)\n\t\t\t*achieve personalfinal\n\t\t\t*goto screamsgone\n\t\t*else\n\t\t\t*goto screamsgone\n\t#I need to focus on saving myself. If I don't, The Voice will just push me over next and then we'll both be dead. Miss Boss is already gone.\n\t\t*set societal %-30\n\t\t*goto personalpivot\n\t#As Miss Boss falls to her death, I turn to The Voice and tell him he has done the right thing. Because one way or another, I want The Voiceless on my side.\n\t\t*set bondwithmrv true\n\n\t\tYour responsibility, as always, remains to the Underrepresented Powereds. Letting Miss Boss fall was always a foregone conclusion for you, whether you wanted to believe it or not.\n\n\t\tWhether to rehabilitate or infiltrate their ranks, it's more important you build a bridge to The Voiceless before the other Rookies arrive.\n\n\t\t\"I don't think you are useless,\" you say to The Voice. \"But everyone thinks the same about me. I'm Disembodied, but I'm also Ani-Powered. Does that mean I deserve to die, too?\"\n\n\t\tThe Voice stares at you, his eyes filling with tears behind his goggles. The only sound you hear is Miss Boss's shrill scream growing more and more distant in the background.\n\n\t\t*page_break\n\n\t\tYou can't tell whether your words resonate with The Voice or not, but he doesn't push you off the cliff behind Miss Boss. \n\n\t\tInstead, as Outlet slowly reanimates into crackling form beside him, The Voice writes one image:\n\n\t\t[b]Outlet, take us home.[/b]\n\n\t\tAnd with one bright flash of teleportation energy, The Voiceless disappear the way they must have come.\n\n\t\t*if (societal > 50)\n\t\t\t*set societal %+20\n\t\t\t*goto teleportedout\n\t\t*else\n\t\t\t*set societal %-20\n\t\t\t*goto teleportedout\n\t#Jump in after Miss Boss and hope that if I can reach her, my tardigrade body will somehow break both of our falls.\n\t\t*set societal %+30\n\t\t*set trytosavemb true\n\n\t\tScrew Loa Shift, you're not letting Miss Boss fall.\n\t\t\n\t\tYou leap off the cliff after Miss Boss, reaching your hands out in hopes of grabbing onto her. You don't know if either of you will survive this fall, but you know you couldn't live with yourself if you didn't at least try. \n\n\t\tIf you die, at least you will have died doing the right thing.\n\n\t\t*page_break\n\n\t\tThen you feel invisible fingers wrapping themselves around your body, and your blood runs cold. \n\n\t\t[i]No.[/i] \n\n\t\tThe Voice has just suspended you with his hard-light hand, making sure you can't save Miss Boss. \n\n\t\t[i]Slugger, no.[/i]\n\n\t\t*page_break\n\n\t\tHanging in midair with your hands dangling, you do the only you can think of with the precious few seconds at your disposal: you generate the strongest, most protective reverse-cryptobiosis blast you can possibly muster.\n\n\t\tThe blast rockets down from your fingertips and you peer into the void below to see your blast connect with Miss Boss. You have no way to know if it has worked, but you also have no time to wait and find out.\n\n\t\tYou just have to believe it will save her.\n\n\t\t*page_break\n\n\t\tNext thing you know, The Voice opens the hard-light hand and drops you into the void after Miss Boss.\n\n\t\tReacting instantly, you reach out and just manage to grab onto the cliff's edge. Not pausing to think about how close of a call this is, you pull yourself up with your enhanced tardigrade muscles and roll across the cave floor.\n\n\t\tYou then launch yourself at The Voice, striking him with a swift punch to the jaw that knocks him clean out.\n\t\t*goto asyoulandsave\n\t#Zap Miss Boss with a protective reverse-cryptobiosis blast in the hopes it will protect her enough to survive the fall. \n\t\t*set societal %+20\n\t\t*set trytosavemb true\n\n\t\tPointing your hands down at Miss Boss, you generate the strongest, most protective reverse-cryptobiosis blast you can possibly muster.\n\n\t\tAs the blast rockets out from your fingertips, you can only hope this will be the best of all worlds, one that allows Miss Boss to fall but not to die. You just have to make sure you pull this off before The Voice can try to stop you.\n\n\t\tPeering into the void below, you see your blast connect with Miss Boss. You have no way to know if it has worked, but you also have no time to wait and find out.\n\n\t\t*page_break\n\n\t\tInstead, you pivot on the cliff's edge and launch yourself at The Voice, striking him with a swift punch to the jaw that knocks him clean out.\n\n\t\t*label asyoulandsave\n\n\t\tAs you land crouched beside The Voice's thudding body, you close your eyes and listen to Miss Boss's shrill scream growing more distant…\n\n\t\tUntil you can't hear it anymore.\n\t\t\n\t\t*if (societal > 80)\n\t\t\t*achieve societalfinal\n\t\t\t*set missbossdead false\n\t\t\t*goto screamsgone\n\t\t*else\n\t\t\t*achieve turnaraound\n\t\t\t*goto screamsgone\n\n*label screamsgone\n*page_break\n\nPanting and crouched, you are barely even able to register the fact that Outlet is beginning to reanimate into crackling form beside you. \n\nYou're so spent that you don't know how to react, half expecting Outlet to try to roast you alive again. You're not so sure that would be the worst thing, anymore….\n\nHowever, Outlet flashes with one bright burst of teleportation energy and pulls The Voiceless away the way they must have come. As they disappear, you're not sure if you should be relieved or devastated.\n\nAll you can feel is tired. And afraid…\n\nFor Miss Boss.\n \n*label teleportedout\n*page_break\n\nNothing will ever be the same.\n\nYou stand frozen, inhaling the scent of blood, trying to understand how you got here. Nothing seems to make sense: the parts don't add up, the pieces don't fit. It's like someone has ripped up the game board, torn apart the seams of your reality.\n\nAfter this, nothing can ever be the same. \n\nYou won't let it be.\n\nBecause today, the death is on you.\n\n*finish INTERLUDE TWO: LYRICAL\n", "rs_five": "*comment é x\n\n*image chap5.png center Chapter Five: Animaul\n\nYou are one. You are all. You are the hivemind. You are in charge, and your team is depending on you.\n\nAs the Rookies rush away from your command position, you close your eyes and feel your thoughts touch theirs, connecting in a circular honeycomb woven together. Your bloated bee body, with its flimsy wings and fatal stinger, has sidelined you from this fight. Luckily you have a different role to fill in this mission: leader. \n\nThe role is a perfect fit for you today, thanks to your newly acquired eusocial hivemind connection and your experience with Ani-abilities. You pay attention as the impending battle unfolds in your hivemind like a tabletop game, a mental chessboard with shifting pawns. As you survey the scene, MeChip Prodigal also springs into coordinated action.\n\n\"Honeybee baby, best of luck! Remember, if you need extra help, you can always activate my Warning System functions.\"\n\nMeChip Prodigal has been trying to talk you into one of the most valuable MeChip upgrades, the MeChip Warning System 9.0, which will enable MeChip Prodigal to inform you of strategic advantages, help you make efficient and consistent decisions, and warn you if you're about to make a decision with a high level of risk. You knew it would come in handy keeping you alive in dangerous situations just like this one, so you decided to…\n\n*check_purchase warningsysnine\n*if choice_purchase_supported\n\t*if choice_purchased_warningsysnine\n\t\t[i]You've paid to unlock Prodigal's MeChip Warning System with an in-app purchase.[/i]\n\t\t*choice\n\t\t\t#Unlock Prodigal's MeChip Warning System again, at no additional charge.\n\t\t\t\t*label purchased\n\t\t\t\t*set warningsysnine true\n\t\t\t\t*achieve achievethewar\n\n\t\t\t\t\"You won't regret it, chicken!\" MeChip Prodigal says, turning her hands into mini-canons while she performs a deadly chicken dance.\n\t\t\t\t*goto primalprayer\n\t\t\t#Hold off for now.\n\t\t\t\t*label noWarningSys\n\t\t\t\t\"Cluckedy-cluck, chicken, I understand,\" MeChip Prodigal sighs. \"The option to upgrade will remain in your Home Menu though, so go there to activate at any time if you're feeling frisky!\"\n\t\t\t\t*goto primalprayer\n\t*else\n\t\t[i]Prodigal's MeChip warning system is available as an in-app purchase.[/i]\n\n\t\t*purchase warningsysnine $0.99 purchased\n\t\t*page_break No, Thanks\n\t\t*goto noWarningSys\n*else\n\t[i]Prodigal's MeChip warning system is available as an in-app purchase.[/i]\n\n\t*choice\n\t\t*selectable_if (false) #Purchase Prodigal's MeChip Warning System.\n\t\t\t*bug\n\t\t#Hold off for now.\n\t\t\t*goto noWarningSys\n\n*label primalprayer\n\nIgnite and Crystalline are the first Rookies to come up against their designated foe, commanding your initial attention. You've been sequestered at The Hero Project compound for a week, since the Final Selection Ceremony, and have had limited time to interact with the other Rookies. However, everyone still knows that Crystalline and Ignite have become an official showmance couple, which is why they've also been paired together for this mission. They currently face The Prayer, a praying mantis Ani-hybrid who is wicked fast—so fast that she is on Ignite and Crystalline before anyone can get their bearings, including you.\n\nThankfully these two heroes are trained to react quickly: Crystalline pulls a precharged shield crystal out of her silver utility belt and throws it to the ground, generating a hard-light force field that blocks The Prayer's spiked raptorial foreleg jabs. Behind the yellowish field, Ignite waves his orange-gloved hands at the ground and causes a localized earthquake, which knocks The Prayer back on her hind legs.\n\nWhile this budding couple is clearly quite capable, it's your job to inform them how to take down The Prayer as quickly and efficiently as possible.\n\n*page_break\n\nYour primary concern during this mission is to act as a superb leader to accrue Leaderboard points. While you don't have to worry about group politics and dynamics fully yet, you do know that you also have to start deciding how you want to play this game. Your advice and commands to the Rookies should be tempered by whatever goal you're trying to achieve in the long run, as always. \n\nSo do you want to make sure you remain allies with everyone? Or do you want to favor certain Rookies and distance yourself from others to build stronger bonds? Do you want to instill fear and respect in everyone as a solo threat? Or should you genuinely focus on what's best for the mission, as a hero?\n\n*if warningsysnine\n\t\"The Prayer is a fast, deadly fighter,\" MeChip Prodigal chimes in, operating on her newly activated Warning System protocols. \"She has compound vision to see moves coming, camouflage wings to shift in and out of sight, agility-hopping, and indestructible armor plating. So Crystalline and Ignite should most definitely not engage hand to hand.\"\n\t*goto prayertime\n*else\n\tThe Prayer is a fast, deadly fighter aided by her praying-mantis abilities: she has compound vision to see moves coming, camouflage wings to shift in and out of sight, agility-hopping, and indestructible armor plating. No matter how good Crystalline and Ignite are, you know they probably shouldn't engage The Prayer in close-range hand-to-hand combat.\n\n\tYou deduce this all yourself from your Ani-experience, but you wonder if MeChip Prodigal's Warning System would pick up extra things you've missed. It doesn't matter this time, anyway, because you'll have to do without for now.\n\t*goto prayertime\n\n*label prayertime\n\nCrystalline and Ignite are about to engage in a close-range fight, which you know won't work in their favor. So how do you advise them?\n\n*set lb +15\n*set power -5\n*choice\n\t#Let the duo engage in a close-range fight for a second, then advise them to pull back and fight long-range. This will make me look great and dent their Leaderboard scores.\n\t\t*set rlshp_crystalline %-25\n\t\t*set loyalgmbt +1\n\t\t*set solostar +1\n\n\t\tOnce Crystalline's shield dissipates, Ignite tumbles forward to engage The Prayer. But before he can even roll to his feet, The Prayer bats him away with her raptorial legs and in one fluid motion rounds on Crystalline with a leaping kick.\n\n\t\t\"Fall back immediately!\" you hive-scream. \"Do not fight directly, I repeat, fall back for long-range attacks!\"\n\n\t\tOn command, Crystalline detonates a flash-bang crystal to disorient The Prayer and jumps back to join Ignite. Your eusocial connection lets you feel their frustration over this delayed order from you, but you choose to ignore it.\n\t\t*goto fallbackci\n\t#Order the duo to fall back immediately and fight long-range, to make sure the outcome is most positive for everyone. \n\t\t*set rlshp_crystalline %+15\n\t\t*set truehero +1\n\t\t*set manipulater +1\n\n\t\t\"Fall back immediately!\" you hive-scream. \"Do not fight directly, I repeat, fall back for long-range attacks!\"\n\n\t\t\"Affirmative,\" Ignite responds, as Crystalline immediately detonates a flash-bang crystal to disorient The Prayer. As they prepare to fall back, you can feel their thankful compliance through your eusocial connection.\n\t\t*goto fallbackci\n\t#Recommend that the duo fall back, but don't buzz orders. You want to indicate that you trust them to fight intelligently with your assistance.\n\t\t*set rlshp_crystalline %+25\n\t\t*set floating +1\n\t\t*set loyalcit +1\n\n\t\t\"The Prayer is incredibly fast,\" you hive-scream. \"I think you'd do best falling back for long-range attacks, what do you think?\"\n\n\t\t\"Affirmative,\" Ignite responds, while Crystalline detonates a flash-bang crystal to disorient The Prayer. As they prepare to fall back, you can feel their trust through your eusocial connection.\n\t\t*goto fallbackci\n\n*label fallbackci\nTo gain some further distance, Crystalline backflips away in an impressive gymnastic display, while Ignite rumbles the earth into a rocky platform to ride after her.\n\nOnce they've gained enough distance, you recall your own experience as a praying-mantis-hybrid. Your armor was pretty thick, but you remained vulnerable in the separations between your plates, where your human parts were exposed. Knowing this, how should you advise Crystalline and Ignite to attack?\n\n*if warningsysnine\n\t\"Oh waspy one, you have high rates of success no matter which option you choose here,\" MeChip Prodigal kicks in, operating once again on her Warning System protocols. \"Though if I were you, I'd keep your Offensive & Defensive and Physical & Intangible prowess in mind when advising.\"\n\n*set power -5\n*choice\n\t#Have Crystalline and Ignite double down with crystal energy bombs and plasma fire-blast attacks.\n\t\t*set defensive %-20\n\t\t*set physical %-20\n\n\t\tGoing on the offensive, Crystalline and Ignite utilize their Intangible Powers in tandem, launching a barrage. Suddenly The Prayer is engulfed in a storm of exploding pink crystals skillfully thrown by Crystalline, while the rest of her armor is scorched by blasts of fire shot from Ignite's fists. The combined effect fries the skin between the plates of The Prayer's hard shell, instantly knocking her out.\n\t\t*goto prayerdown\n\t#Have Crystalline and Ignite double down with dagger crystals and seismic-punch attacks.\n\t\t*set defensive %-20\n\t\t*set physical %+20\n\n\t\tGoing on the offensive, Crystalline and Ignite utilize their Physical Powers in tandem, launching a barrage at The Prayer. Crystalline's skillfully thrown clear dagger crystals pierce the soft spots between the plates of The Prayer's armor, rendering her immobile. Then, while he has the chance, Ignite smashes his fists into the ground and sends a devastating ripple of seismic aftershocks at The Prayer. The combined effect is more than enough to stun The Prayer into submission.\n\t\t*goto prayerdown\n\t#Have Crystalline run a diversion with flash crystals so that Ignite can strike with long-range magma-fountain bursts.\n\t\t*set defensive %+20\n\t\t*set physical %-20\n\t\t\n\t\tKeeping a defensive distance, Crystalline and Ignite utilize their Intangible Powers in tandem to set The Prayer up and knock her down. Crystalline distracts The Prayer by tossing several strobe-light exploding crystals into the air, allowing Ignite to wave his hands and cause several magma fountains to erupt around The Prayer. The fiery magma scorches The Prayer's armor and fries the skin between the plates of her shell, instantly knocking her out.\n\t\t*goto prayerdown\n\t#Have Ignite run a diversion by erupting a rock wall so that Crystalline can slam The Prayer into it with concussive-force crystals.\n\t\t*set defensive %+20\n\t\t*set physical %+20\n\n\t\tKeeping a defensive distance, Crystalline and Ignite utilize their Physical Powers in tandem to set The Prayer up and knock her down. Ignite distracts The Prayer by raising a massive, jagged rock wall into the air behind her with a simple wave of his hand. This then allows Crystalline to skillfully throw several clear concussive crystals. The Prayer is fast enough to dodge the direct hits, but the concussive-force explosions of the near-miss crystals still send The Prayer reeling into the hard rock wall, knocking her out.\n\t\t*goto prayerdown\n\n*label prayerdown\n*set lb +5\n\nYou're not sure which impresses you more, the seemingly limitless applications of Crystalline's crystal constructs, or the earth-shattering levels of Power at Ignite's command. Once The Prayer is down, Crystalline and Ignite high-five to celebrate, posing for the camera orbs.\n\n\"You're on fire, Iggy,\" Crystalline jokes.\n\n\"That's crystal clear, Crys,\" Ignite forces out through his teeth—Crystalline must have put him up to that little exchange earlier. Standing side by side, this couple couldn't look more different: their costume colors, height, and skin colors are all at odds as opposites, but somehow they still look like they belong together.\n\n*page_break\n\nBefore you can congratulate Crystalline and Ignite, you hear Lyra speaking in your ear through the comm channel from mission control, a sound that is much louder and more intrusive than your hivemind connection.\n\n\"Well done, ${codenamed},\" Lyra says. \"The others are about to come up against the rest of The Primals—are you sure you can handle coordinating their fights simultaneously?\"\n\n\"Not if you keep distracting me,\" you buzz-speak, refocusing as you close your eyes and try to drown out the burst of noise. You don't mean to be short with Lyra, but this mission has you on edge, for many reasons….\n\nReason number one is that this is your very first Hero Project Live Finals mission in the real world. Which means it's also your first heroic mission, period. Reason number two is that you're fighting against a deadly gathering of Ani-gang Generals, which is not only terrifying, but also poses quite a few ethical questions for you as an Ani-Powered. \n\n*page_break\n*set smytherstructure true\n\nLyra briefed you on The InfraCircle, and you've reviewed the overall structure in your Stats Screen. Unfortunately, The DRPR has no leads on Scoundrel's Strike Squad or Culic's base hidden in the Big Sur wasteland (which Mechip Prodigal was very quick to remind you she created, back in her more villainous days). However, a DRPR undercover agent was able to learn the details of an Ani-gang summit arranged by Smyther, so your briefing focused mostly on that.\n\nSmyther has been able to finance the InfraCircle's entire operation by re-forming his infamous Ani-gangs in New Fringe, an area of MC just north of the Eastern Fringes and east of Dockerbay. Smyther decided to simplify the organization, so he is gathering his key generals at his newly acquired Smyther Manor. \n\nDetails on this new organization have been loaded to your Stats Screen if you're interested, but all you need to know is this: there's heavy security in place for this summit, after none other than Prodigal crashed Smyther's last summit and wiped out most of his original Generals. The security forces for this summit include not just a deadly gathering of Ani-Generals, but also Smyther's elite Ani-Powered defense unit, the Primals, whom the Rookies have been tasked with taking down. \n\nYou've already realized that for a non-Ani-Powered, Smyther certainly does keep a small army of Ani-Powereds at his disposal. Since his rise as an Ani-gang boss, some Ani-Powereds see Smyther as an advocate empowering the community, while others view him as a criminal exploiting your societal disadvantages.\n\nYou've barely had time to process your position on Smyther or the InfraCircle, but so far:\n\n*choice\n\t#I feel like I'm on the wrong side of this battle. Honestly, I agree with what I've heard of the InfraCircle's agenda and methods.\n\t\t*set traditional %-15\n\t\t*set respected %-15\n\n\t\tUnderrepresented Powereds like the Animalistic need a voice and a space in society. You believe you're only going to get it if you take it by force, like the InfraCircle mean to. Unfortunately, today you don't have much of a choice in this matter—but you hope that will change sometime very soon.\n\t\t*goto thirdreas\n\t#I believe that no cause justifies criminal activity. Plus, I've seen the negative effects of the re-formed Ani-gangs in Dockerbay firsthand.\n\t\t*set traditional %+15\n\t\t*set respected %+15\n\n\t\tUnderrepresented Powereds like the Animalistic need a voice and a space in society, but not in ways that make the world worse for everyone else.\n\t\t*goto thirdreas\n\t#I don't want to be seen fighting other Ani-Powereds; that just feeds into divisive Ani-stereotypes. I'm also intrigued by the InfraCircle's ideas, if not their criminal methods.\n\t\t*set traditional %-15\n\t\t*set respected %+15\n\n\t\tUnderrepresented Powereds like the Animalistic need a voice and a space in society, but you believe you're only going to get it if you stand united. You want to represent that unity, not pit yourself against other Underrepresented Powereds. Unfortunately, today you don't have much of a choice in this matter, but you hope that might change sometime very soon.\n\t\t*goto thirdreas\n\t#I'm happy to be shutting down Ani-cells that give the rest of us Ani-Powereds a bad name. I want to be a symbol that strikes fear into the heart of Ani-idiots like these.\n\t\t*set traditional %+15\n\t\t*set respected %-15\n\n\t\tUnderrepresented Powereds like the Animalistic need a voice and a space in society, but not in ways that make the world worse for everyone else. You've got a zero-tolerance policy when it comes to illegal Ani-activity.\n\t\t*goto thirdreas\n\n*label thirdreas\n\nThis brings you to the third and final reason to be nervous: you're the sole leader of the Rookie squad storming the rear entrance to Smyther Manor, racing against the still-secret Veteran squad. Being assigned this leadership role means you're in a high-risk, high-reward, and politically precarious situation with a group of Rookies you've only just met.\n\nYou know you can gain allies or make enemies based on how you behave, just as you're doing with Ignite and Crystalline. You may have successfully navigated their matchup, but now you need to handle three more Rookie battles coming up against The Primals. These battles will happen simultaneously, but you can handle them all thanks to your split hivemind focus.\n\n\"Queen Bee, full Rookie rundowns will be loaded to your Stats Screen as they come across your battle-plate,\" MeChip Prodigal reminds you. \"You should pay special attention to the Powers sections in order to best advise each Rookie when the time comes!\"\n\nWhich fight to handle in what order is up to you, but you know that success in these upcoming battles will determine your own Leaderboard score for this mission. Your life in the competition—and, as always, JK's life—depends on how you perform here. You take a second to touch your locket pocket to remember this, before the chaos continues.\n\n*label battleops\n*choice\n\t*disable_reuse #Battle A.\n\t\t*goto battleone\n\t*disable_reuse #Battle B.\n\t\t*goto battletwo\n\t*disable_reuse #Battle C.\n\t\t*goto battlethree\n\t*selectable_if (((showtransfer) and (showgriffin)) and (showtarsiero)) #Move on from the initial Primal Battles.\n\t\t*goto moveonprimal\n\n*label battleone\n*set showtransfer true\n*set transfernameon true\n\nYou shift part of your split focus to Battle A, where you find none other than…\n\nTransfer, awaiting your orders in full vampire form.\n\nTransfer advancing meant that hir partner Nitewerq was cut, an outcome that didn't seem to bother the surly drag queen. Instead, Transfer was the one who seemed shocked to be advancing, given hir relatively minimal show edit. Perhaps this is also why you barely got to see hir in the Sequester House. \n\n*if (sspublic) or (ssblackmail)\n\tHowever, you're pretty sure Transfer was trying to keep hir distance from you after seeing what you did to StarSoar in the Final Selection. This incident became the central focus of the episode when it aired last week, at least the parts you were allowed to watch. Transfer wasn't the only one who seemed wary of you—so did Ignite and Crystalline, and you don't even want to think about how upset JK still is with you.\n\n\tYou already know you're going to have to start deciding now if you care about doing damage control, or if you're going to let this intimidating portrayal stand.\n\t*goto adivsci\n*elseif sswarn\n\tHowever, you're pretty sure Transfer was trying to keep hir distance from you after seeing what happened with StarSoar in the Final Selection. This incident became the central focus of the episode when it aired last week, at least the parts you were allowed to watch. It wasn't made clear at all that you attempted to have this conversation with StarSoar in private, unfortunately. As a result, Transfer seemed wary of you and ze wasn't the only one—so did Ignite and Crystalline. But no one is as upset about what happened to StarSoar as JK.\n\n\tYou already know you're going to have to start deciding now if you care about doing damage control, or if you're going to let this intimidating portrayal stand.\n\t*goto adivsci\n*else\n\t*goto adivsci\n\n*label adivsci\n*page_break\n\nHowever, your first priority is to make sure that Transfer beats hir Primal opponent, Pumala. You watch as Pumala leaps around Transfer with his catlike reflexes, toying with hir like prey. Transfer stands hir ground in response, hir pale fists clenched and hir gleaming fangs bared. Pumala may be fast, strong, and possess deadly claws, but Transfer matches all those strengths pretty evenly in hir vampire form.\n\nWhich means this is going to be a straight-up brawl.\n*if warningsysnine\n\n\t\"Bee-bop, make sure to focus on the balance between Powers and Fighting in this matchup,\" MeChip Prodigal advises. \"Keep in mind this is the only Battle Stat that's best kept as close to the middle as possible. Make sure to constantly switch between Powers and Fighting, to keep both sharp. You don't want to favor one too much, unlike the other Stats, which work better the stronger you make them. Mmm'kay I say?\"\n\t*goto pumalalala\n*else\n\tYou should probably focus on balancing Fighting & Powers, keeping the Stat steady in the middle to keep both sets of skills sharp.\n\t*goto pumalalala\n\n*label pumalalala\n\nWhile Pumala prances, he notices the nearest camera orb and pauses to say: \"When you're ready come and get it.\" He then performs a graceful backflip before adding a pseudo-seductive meowing roar.\n\n\"Oh, please just shut up,\" Transfer sighs, just before ze lurches at Pumala unexpectedly.\n\n*set power -5\n*choice\n\t#Order Transfer to use hir hypnotizing Powers to immobilize Pumala and then use hir vampire bite to drain him into submission.\n\t\t*set rlshp_transfer %-15\n\t\t*set fighting %-15\n\n\t\tTransfer doesn't say anything in response to your order, but you can tell via your eusocial connection that ze is not necessarily appreciative of your commanding tone. Still, Transfer twists to execute your order as ze soars through the air.\n\n\t\t*label hypnopower\n\t\t*if (fighting > 39) and (fighting \u003c 61)\n\t\t\t*set lb +20\n\t\t\t*set legended +1\n\t\t\t*achieve fourfightpowerbal\n\n\t\t\tTransfer lands in front of Pumala with one leg outstretched and one hand on the ground. Pumala is ready to pounce, but before he can, he catches the intense red glare in Transfer's eyes. Pumala suddenly sways on his feet, caught in Transfer's hypnotizing gaze.\n\n\t\t\t*label imeedhyp\n\n\t\t\tTransfer then tumbles forward and rolls behind Pumala. Just as the hypno-stare seems to wear off, Transfer wraps hir arms around Pumala's chest and plunges hir fangs deep into his neck. Pumala struggles against Transfer's firm vampire grip, but it's only a matter of seconds before Pumala's eyes roll into the back of his head.\n\n\t\t\tOnce Pumala drops to the ground, Transfer turns away from the nearest camera orb and wipes hir face, smearing red across the black sleeve of hir costume. Feeling a bit queasy at the grisly sight, you send Transfer a quick congratulations before turning your attention back to the battlefield.\n\t\t\t*goto battleops\n\t\t*else\n\t\t\t*set lb +10\n\t\t\t\n\t\t\tTransfer lands in front of Pumala with one leg outstretched and one hand on the ground. Transfer then raises hir glowing red eyes to meet Pumala's, only to find he has pounced more quickly than Transfer anticipated. Transfer dodges with incredible speed, but Pumala still manages to catch Transfer with a claw-swipe that rips open hir upper arm.\n\n\t\t\tDiving away, Transfer gains some distance and turns back towards Pumala with such ferocity in hir eyes that Pumala can't help but match hir gaze. Before Pumala can move another inch, he suddenly sways on his feet, caught in Transfer's hypnotizing stare.\n\t\t\t*goto imeedhyp\n\t#Order Transfer to utilize hir enhanced speed and strength to fight Pumala hand to hand.\n\t\t*set rlshp_transfer %-15\n\t\t*set fighting %+15\n\n\t\tTransfer doesn't say anything in response to your order, but you can tell via your eusocial connection that ze is not necessarily appreciative of your commanding tone. Still, Transfer twists to execute your order as ze soars through the air.\n\n\t\t*label sspeedpower\n\t\t*if (fighting > 39) and (fighting \u003c 61)\n\t\t\t*set lb +20\n\t\t\t*set legended +1\n\t\t\t*achieve fourfightpowerbal\n\n\t\t\tTransfer lands in front of Pumala with one leg outstretched and one hand on the ground. Pumala pounces at Transfer the moment ze does, but Transfer is ready for that. \n\t\t\t*label speefist\n\t\t\tZe spins around to avoid a deadly claw-swipe and swings hir clenched fist into the back of Pumala's skull. As Pumala is sent reeling forward, Transfer spins back impossibly fast and kicks hir boot up into Pumala's falling chin.\n\n\t\t\tThe sound of Pumala's jaw cracking echoes across the lawn before he crumbles to the grass in a thudding heap. Feeling a bit queasy at the grisly sight, you send Transfer a quick congratulations before turning your attention back to the battlefield.\n\t\t\t*goto battleops\n\t\t*else\n\t\t\t*set lb +10\n\n\t\t\tTransfer lands in front of Pumala with one leg outstretched and one hand on the ground. Pumala pounces at Transfer the moment ze does, more quickly than Transfer must have anticipated. Transfer dodges with incredible speed, but Pumala still manages to catch Transfer with a clawed kick that rips open hir upper arm.\n\n\t\t\tPumala then goes for another deadly clawed paw-swipe, but Transfer is ready for it.\n\t\t\t*goto speefist\n\t#Advise Transfer to use hir hypnotizing Powers to immobilize Pumala and then use hir vampire bite to drain him into submission.\n\t\t*set rlshp_transfer %+15\n\t\t*set fighting %-15\n\n\t\tTransfer doesn't say anything in response to your advice, but you can tell via your eusocial connection that ze is appreciative you didn't just bark orders at hir. Contented, Transfer twists to execute the advised maneuver as ze soars through the air.\n\t\t*goto hypnopower\n\t#Advise Transfer to utilize hir enhanced speed and strength to fight Pumala hand to hand.\n\t\t*set rlshp_transfer %+15\n\t\t*set fighting %+15\n\n\t\tTransfer doesn't say anything in response to your advice, but you can tell via your eusocial connection that ze is appreciative you didn't just bark orders at hir. Contented, Transfer twists to execute the advised maneuver as ze soars through the air.\n\t\t*goto sspeedpower\n\n*label battletwo\n*set griffinnameon true\n*set showgriffin true\n*set missbossnameon true\n*set showmissboss true\n\nYou shift your focus to Battle B, where you find none other than…\n\nGriffin and Miss Boss, posing together in all their spandex-and-leather-wrapped glory.\n\nThese two were the only \"New Populars\" to advance, which meant that Exile, Reigna, and O'Connell were eliminated. While there was tons of drama surrounding the split-up of best friends and heroic partners Miss Boss and Reigna, the real focus ended up falling on Exile, who claims he was eliminated because of some dispute between his corporate sponsor, YouPower Inc., and the MeChip Corporation. Naturally, The Hero Project has denied these allegations, but you've heard that Exile has managed to make a meal of his elimination in a tour of national exit interviews, nonetheless.\n\nDespite these disruptions, Griffin and Miss Boss have stuck together like glue in the Sequester House. Everyone knows this is because Miss Boss's energy telekinesis requires a Power source, and without access to her usual partner Reigna's cascading energy, Griffin became the next best option.\n\nEveryone also expected a potential romance to evolve between these two, but actually, both Griffin and Miss Boss seemed very flirty with you in your limited interactions, an experience you definitely are not accustomed to. \n*if (sspublic) or (ssblackmail)\n\tApparently these two really loved your StarSoar move, claiming that they were happy to see someone \"take a stand and play the game.\" \n\t*goto alignwith\n*elseif (sswarn)\n\tApparently these two really loved your StarSoar move—they seemed to believe that you knew there would be cameras in the bathroom all along and that you made some brilliant game move to gain attention, despite your attempts to convince them otherwise.\n\t*goto alignwith\n*else\n\tYou can't tell if this flirtation is at all genuine, however, because you can tell that Miss Boss and Griffin both seem to be very eager to play this game hard. \n\t*goto alignwith\n\n*label alignwith\n\nThey've already indicated interest in aligning with you in the potential votes to come, but you haven't made a decision yet. You still have to discern if their enthusiasm for strategy and game-playing coincides with your own agenda.\n\n*page_break\n\nIt appears this is a decision you'll have to make sooner than later, since Griffin was particularly miffed that you were \"handed\" the leadership role in this mission. Apparently Griffin felt entitled to this honor, given his \"heroic seniority,\" as he passive-aggressively mentioned in the transport. You suppose that if you care at all, it will be best to tread carefully around his ego here.\n\nGriffin and Miss Boss are now squaring off against their Primal opponent, an ostrich-hybrid Ani-Powered named Ostro. He fans his tailfeathers in an aggressive standoff display against Griffin, who charges blue energy blasts around his fists, and Miss Boss, who poses in a dramatic fighting stance.\n\n\"Your goose is about to be cooked,\" Griffin says, flashing a winning smile. Miss Boss seems to fight a grimace beside him, but she doesn't actually say anything. Instead, you can feel her straining to connect with Griffin's energy source for some telekinetic manipulation.\n\nYou know these two will stand there forever posturing for the camera orbs unless you say something, so you quickly strategize about how they should engage Ostro—who is both light on his feet and heavy on his wing-strength.\n\n*if specialhint\n\t\"${codenamed}, you've earned a special hint as a reward here,\" Lyra's voice suddenly rings through your comms.\n\t*if (rlshp_missboss > 50)\n\t\t\"Let Griffin take the lead here; it'll be best for the mission and for both of your Leaderboard scores. Trust me on this one.\"\n\n\t\t*label notabsolutey\n\n\t\tYou're not absolutely sure if you should trust Lyra, but she did say this was the special Viewer Reward you unlocked, so her advice has to be good. Plus, she has given you no reason not to trust her, yet.\n\t\t*goto alignwithout\n\t*else\n\t\t\"Make sure you issue a firm direct order here; that'll be best for the mission and for both of your Leaderboard scores in the long run. Trust me on this one.\"\n\t\t*goto notabsolutey\n*elseif warningsysnine\n\t\"Focus on striking the right tone with these two,\" MeChip Prodigal advises. \"They'll ignore you if you don't play this right and that'll just make everyone look bad. If you're on good terms, ease up. Otherwise, make sure they listen to you!\"\n\t*goto alignwithout\n*else\n\tSo you should probably focus on making sure Griffin and Miss Boss respond well to your orders.\n\t*goto alignwithout\n\n*label alignwithout\n*set power -5\n*choice\n\t#I need to earn their respect and make them listen to me, so I give Griffin and Miss Boss a direct order.\n\t\t\"Your best strategy is to fake Ostro out, given his superspeed,\" you project in your most authoritative voice. \"Griffin, fire a concussive-force blast directly at Ostro that'll get him dodging. Then Miss Boss, use your TK to redirect the blast to hit Ostro from behind. He won't see that coming.\"\n\n\t\t*if (rlshp_missboss \u003c 50)\n\t\t\t*set lb +20\n\t\t\t*set legended +1\n\t\t\t*set rlshp_griffin %-15\n\t\t\t*set rlshp_missboss %-15\n\n\t\t\t\"Perfect plan, ${codenamed},\" Griffin responds. \"I was just thinking that myself.\"\n\n\t\t\tWith that slightly annoying comment cleared, Griffin raises his fists and fires off two near-clear beams of concussive force. The blasts rocket forward on a direct crash course with Ostro, and he prepares to dodge, until the blasts suddenly slow their progression and one sputters out entirely.\n\n\t\t\tStraining that chiseled face of his, Griffin pushes harder and re-speeds the remaining blast—but way too slowly to even come close to hitting Ostro, as he dodges with ease. The blast shoots by him in a wavy streak, which you know is fine, because that's when Miss Boss steps in. Twisting her fingers, Miss Boss redirects Griffin's concussive blast so that it suddenly curves and redoubles back towards Ostro.\n\n\t\t\t*page_break\n\n\t\t\tAs Ostro leaps forward to attack Griffin with his girthy body, the blast connects with Ostro's back and sends him smashing into the ground in a heap of feathers and stringy limbs. \n\n\t\t\t*label goodthinkinggrif\n\n\t\t\t\"Nice work, faking Ostro out by making that blast lose Power,\" Miss Boss says, running beside Griffin. Griffin flashes her a big smile, but you can feel waves of relief radiating off of him. Maybe no one else can tell, but you know something just malfunctioned with his Powers—and that Miss Boss just covered for him.\n\n\t\t\tThat's a consideration for another time, however, you think as you refocus on the other unfolding lawn battles.\n\t\t\t*goto battleops\n\t\t*else\n\t\t\t*set lb +10\n\t\t\t*set rlshp_griffin %-10\n\t\t\t*set rlshp_missboss %-10\n\t\t\t\n\t\t\t\"I've got an even better plan to fake him out,\" Griffin responds, rolling forward towards Ostro. Instead of blasting him long-range the way you commanded, Griffin charges rings of concussive force around his fists. He then moves to fight Ostro at close range, swinging his encircled fists like bricks. You realize that he must want to show he can use his Powers in unexpected ways, to steal the spotlight.\n\n\t\t\tUnfortunately for Griffin, Ostro is far too fast and weaves around his blow with ease. Ostro takes off towards Miss Boss instead, hoping to catch her off guard—which he does.\n\n\t\t\tThis is unfortunate for you too, since their defying your orders like this is bound to ding all three of your Leaderboard scores. Before you can intervene, however, Griffin finally follows some of your order and fires the concussive force energy in two strong beams—past Ostro and directly at Miss Boss.\n\n\t\t\t*label luckilymbses\n\t\t\t*page_break\n\n\t\t\tLuckily Miss Boss sees the blasts coming and prepares to redirect the energy into Ostro before he can reach her. The blasts rocket forward on a direct crash course, until they suddenly slow their progression and one sputters out entirely.\n\n\t\t\tStraining that chiseled face of his, Griffin pushes harder and re-speeds the remaining blast, which reaches a worried-looking Miss Boss just in time. As Ostro leaps forward to attack Miss Boss with his girthy body, the blast connects with Ostro's back and sends him smashing into the ground in a heap of feathers and stringy limbs.\n\t\t\t*goto goodthinkinggrif\n\t#Let Griffin and Miss Boss act on their own; tell them I trust them the most and need to focus my attention elsewhere.\n\t\t\"I have a lot of battles on my plate right now, can I trust you two to handle Ostro on your own?\"\n\n\t\t*if (rlshp_missboss > 50)\n\t\t\t*set lb +20\n\t\t\t*set legended +1\n\t\t\t*set rlshp_griffin %+15\n\t\t\t*set rlshp_missboss %+15\n\t\t\t\n\t\t\t\"Of course you can!\" Griffin responds cheerily. \"Happy to do our part and take charge. I was just formulating a plan myself!\"\n\n\t\t\tGriffin then rolls forward towards Ostro without hesitation, charging rings of concussive force around his fists. \n\t\t\t*label brickfists\n\t\t\tGriffin then fights Ostro at close range, swinging his encircled fists like bricks. He must want to show he can use his Powers in unexpected ways, to steal the spotlight—and rack up Leaderboard points for himself.\n\n\t\t\tUnfortunately for him, Ostro is far too fast and weaves around Griffin's blows with ease. Ostro then takes off towards Miss Boss instead, hoping to catch her off guard—which he does.\n\n\t\t\tBut that seems to be part of Griffin's plan, as he calmly fires the concussive force in two strong beams—past Ostro and directly at Miss Boss.\n\t\t\t*goto luckilymbses\n\t\t*else\n\t\t\t*set lb +10\n\t\t\t*set rlshp_griffin %+10\n\t\t\t*set rlshp_missboss %+10\n\t\t\t\"Don't worry, ${codenamed}, I used to get overwhelmed when I first started leading, too,\" Griffin responds. \"Happy to do our part and take charge. I was just formulating a plan myself!\"\n\n\t\t\tGriffin then rolls forward towards Ostro without hesitation and you force yourself not to respond to his belittling comment. Instead, you watch as Griffin pops to his feet and charges rings of concussive force around his fists.\n\t\t\t*goto brickfists\n\t#Advise Griffin and Miss Boss on their strategic options, but let them decide the best course of action instead of ordering it.\n\t\t*set lb +10\n\t\t*set rlshp_griffin %+10\n\t\t*set rlshp_missboss %+10\n\n\t\t\"Your best strategy is to fake out Ostro, given his superspeed,\" you start. \"Griffin, what do you think about engaging Ostro with an energy beam near-miss, one that Miss Boss can redirect unexpectedly? What kind of energy and maneuvering do you think will work best?\"\n\n\t\t\"I'm very glad you asked,\" Griffin responds cheerily. \"Happy to do our part and take charge. I was just formulating a plan myself!\"\n\n\t\tGriffin then rolls forward towards Ostro without hesitation, charging rings of concussive force around his fists. \n\t\t*goto brickfists\n\n\n*label battlethree\n*set tarsieronameon true\n*set showtarsiero true\n\nYou shift your focus to Battle C, where you find none other than…\n\nTarsiero, his wide eyes staring down his opponent with an almost creepy intensity.\n\nTarsiero advancing was quite the shocking twist, especially because it came at the cost of the much-beloved Velocityl. Splint was also unfortunately eliminated, but rumor has it that the two ousted contestants have become a close pair on the exit-interview circuit, even drumming up talk of an official heroic partnership. Their time on The Hero Project may be over, but you have a feeling this isn't the last you'll see of Splint and Velocityl.\n\nDespite Tarsiero's consistent attempts to engage in \"#TarsieroTime\" and \"#AniBonding\" with you in the Sequester House, you mostly tried to avoid him. Just because you're both Ani-Powered, everyone expects you to instantly get along. \n*if (minglemisfits = false)\n\tHowever, the only thing more jarring than Tarsiero's weird hashtag speak is the sour smell that always comes from his matted fur—something about the damp, unwashed smell makes you both queasy and uneasy. You know you should probably connect with other Ani-Powereds like Tarsiero more easily, but really you've always had trouble feeling comfortable around them—it just reminds you that you just don't fit in anywhere, especially in the one community that's supposed to be a source of support.\n\n\t*goto stilrelei\n*else\n\t*goto stilrelei\n\n*label stilrelei\nYou were a bit relieved to find you weren't the only one uncomfortable with Tarsiero's awkward interactions and dated attempts at catchphrases—the other Rookies seemed to steer clear of him as well.\n\nAt any rate, you felt slightly guilty about avoiding Tarsiero, since he was the only one who \n*if ((ssprove) or (ssmorestory)) or (sswarn)\n\tseemed uninterested in judging you or engaging in politics—he just seems genuinely happy to be here.\n\t*goto notinter\n*else\n\tseemed not to care about everything that happened with StarSoar. He doesn't seem interested in judging you or engaging in politics—he just seems genuinely happy to be here. \n\t*goto notinter\n\n*label notinter\nWhich makes sense, since no one would ever have predicted he would make it this far.\n\n*page_break\n\nRight now you understand why he has, though, because you're watching Tarsiero face off fearlessly against BoaCon, an enormous boa-constrictor-hybrid Ani-Powered. Other furry prey Ani-Powereds would usually cower before BoaCon's might, but Tarsiero stands his ground. In fact, it's the first time since you've met Tarsiero that he doesn't seem anxious.\n\nYou know that BoaCon not only possesses incredible brute strength in her coiled torso and writhing limbs, but that she also has a wide array of Intangible Powers, including a flicking tongue that can smell prey and heat sensors that identify movement. All of this makes BoaCon a heavyweight brawler and an acutely aware fighter at the same time.\n\n*if warningsysnine\n\t\"Sweethornet, Tarsiero is going to have quite the time taking down BoaCon. Luckily his tarsier Powers match up against BoaCon's, though who'd a thunk it?\" MeChip Prodigal muses. \"Anyway, focus on utilizing your Defensive & Offensive prowess to make sure Tarsiero wins out against this particular predator.\"\n*comment endif\n\nTarsiero's eyes remain fixed on BoaCon as she slithers through the grass, then follow her upwards as she stretches her long torso into a fully intimidating ten-foot height. \"You look deliciousssssss,\" BoaCon hisses, looking eager to strike.\n\n\"And you look famished. Prepare to stay that way!\" Tarsiero attempts to quip back, adding a feeble \"#TarsieroTime\" shout at the end.\n\n*set power -5\n*choice\n\t#Have Tarsiero climb the nearest tree with his clinging paws, high enough that when BoaCon follows, he can use his leaping ankles to make her fall to her doom.\n\t\t*set defensive %+15\n\n\t\tTarsiero seems to register your command, and within the blink of an eye he is scrambling up the nearest tree with his gripping paws. \n\n\t\t*if (defensive > 60)\n\t\t\t*set lb +20\n\t\t\t*set legended +1\n\t\t\t*set physical %+15\n\t\t\t*set rlshp_tarsiero %+10\n\t\t\t*achieve fourdefensivehigh\n\t\t\t*goto triumphtarsi\n\t\t*else\n\t\t\t*set lb +10\n\t\t\t*set physical %+5\n\t\t\t*set rlshp_tarsiero %-10\n\t\t\t*goto triumphtarsi\n\t#Have Tarsiero strike mercilessly with his superlong tail, wrapping it around BoaCon's human throat to strangle her into submission.\n\t\t*set defensive %-15\n\n\t\tTarsiero seems to register your command, and within the blink of an eye he is spinning to strike with his ten-foot tail.\n\n\t\t*if (defensive \u003c 40)\n\t\t\t*set lb +20\n\t\t\t*set legended +1\n\t\t\t*set physical %+15\n\t\t\t*set rlshp_tarsiero %+10\n\t\t\t*achieve fouroffensivehigh\n\t\t\t*goto triumphtarsi\n\t\t*else\n\t\t\t*set lb +10\n\t\t\t*set physical %+5\n\t\t\t*set rlshp_tarsiero %-10\n\t\t\t*goto triumphtarsi\n\t#Have Tarsiero use his enhanced hearing to predict BoaCon's movements and maneuver her into striking a tree trunk.\n\t\t*set defensive %+15\n\n\t\tTarsiero seems to register your command, and within the blink of an eye he is flipping backwards towards the nearest tree, his round ears twitching madly.\n\n\t\t*if (defensive > 60)\n\t\t\t*set lb +20\n\t\t\t*set legended +1\n\t\t\t*set physical %-15\n\t\t\t*set rlshp_tarsiero %+10\n\t\t\t*achieve fourdefensivehigh\n\t\t\t*goto triumphtarsi\n\t\t*else\n\t\t\t*set lb +10\n\t\t\t*set physical %-5\n\t\t\t*set rlshp_tarsiero %-10\n\t\t\t*goto triumphtarsi\n\t#Have Tarsiero use his enhanced eyesight to pinpoint weak spots in BoaCon's body, then have him strike at them directly.\n\t\t*set defensive %-15\n\n\t\tTarsiero seems to register your command, and within the blink of an eye he is dilating his pupils to see as sharply as possible.\n\n\t\t*if (defensive \u003c 40)\n\t\t\t*set lb +20\n\t\t\t*set legended +1\n\t\t\t*set physical %-15\n\t\t\t*set rlshp_tarsiero %+10\n\t\t\t*achieve fouroffensivehigh\n\t\t\t*goto triumphtarsi\n\t\t*else\n\t\t\t*set lb +10\n\t\t\t*set physical %-5\n\t\t\t*set rlshp_tarsiero %-10\n\t\t\t*goto triumphtarsi\n\n*label triumphtarsi\n\nAs he does, a wave of screeching feedback suddenly floods your senses, causing you to scream out in a buzzing cry. The pain of the feedback is so intense that it takes several seconds for the sharpness to recede into enough of a dull ache for you to reengage your eusocial hivemind connection to Tarsiero.\n\nWhen you finally do, you find that Tarsiero is standing with his hands on his hips and his long tail waving defiantly behind him, striking a pose of heroic triumph. Below him lies BoaCon's limp, unconscious body.\n\n*page_break\n\n\"${codenamed}, we did it! #AniPower! #TarsieroTime!\" Tarsiero cries, tears of relief and pride brimming in his oversized eyes. \n\nYou have no idea how Tarsiero managed to down BoaCon so quickly, but you are highly impressed that he did. \n\nYou're also not sure why Tarsiero's fighting suddenly distorted your hivemind connection, but there are lots of things about your ever-changing Ani-Powers that don't always add up. You're used to them reacting oddly to certain Powered combinations, so you brush off this incident, along with Tarsiero's outdated hashtag-speak, knowing you have plenty of battle still left to fight.\n*goto battleops\n\n*label moveonprimal\n\nWith The Primals now fully downed, you temporarily disengage your hivemind connection just as Lyra begins to speak over the collective Rookie comms.\n\n\"That was incredibly fast! Well done, Rookies. You're cleared to enter the Manor, stat.\"\n\nHearing this, you roll forward from your command position in a fast-moving wheelchair—your bloated bee body and puny wings make it pretty impossible for you to move on your own. This isn't your first foray into debilitating Ani-Powers, but every time you have some, it serves as a potent reminder of what JK has to deal with every single day.\n\nJoining the other Rookies, you all rush ahead as fast as you can move, because each one of you knows this isn't just a fight—it's a race, too. The still-secret Veteran team was tasked with clearing and entering through the front of the Manor, while you Rookies are to storm the back entrance. The overall objective is to detain the generals for arrest, and the first team to enter the Manor gets to engage the generals directly—racking up additional Leaderboard points, no doubt. The second team to enter will be tasked with guard duty and will most likely lose the mission.\n\nYou all know the stakes: the losing team will face a fourteenth-place Leaderboard elimination and a thirteenth-place Finalist vote, while the winning team will advance straight to the Final 12 mission. Everyone wants that assured safety, but as usual, the stakes feel even higher for you.\n\n*page_break\n\nAfter Loa Shift administered JK's second treatment successfully, she set your next goal: make it to the Final 12, where you will be given one last task to secure JK's third and final treatment. Complete this last, mysterious task and then your debt will be paid, so JK can be fully \"healed and harmonized.\" However, if you get cut before the Final 12, JK will receive no further treatments and regress backwards over time, as if the healing had never even happened.\n\nObviously this is enough incentive for you to win this mission and advance directly to the Final 12, but you also don't want to consider the possibility of facing the Leaderboard elimination because this week's guest Judges happen to be Fistfull and Monk, the Millennial Group members you eliminated from the competition in the Semi-Finals. You're sure they won't be looking to do you any favors, so you have to be perfect. Right now your Leaderboard is ${lb},\n*if (lb > 69)\n\twhich means that so far you've been as close to perfect as you can manage.\n\t*goto catchape\n*else\n\twhich means that you have some serious catching up to do.\n\t*goto catchape\n\n*label catchape\n\nHowever, as you climb the Manor's back porch and run into the kitchen, you find a massive rhinoceros-hybrid knocked unconscious, his giant wrinkled chest heaving in shallow breaths. You immediately recognize him as Noc, The Primal's Infini-Class leader, who was guarding the front entrance with a hoard of Ani-gang minions. If Noc is laid out here, that must mean that the Veterans have already entered the Manor.\n\nSlugger.\n\n*page_break\n\nYour first thought is: Did the Veterans only had to defeat one Primal? Noc may be their Infini Powered, heavy-hitting leader, but that still doesn't seem fair compared to the full team of Primals the Rookies had to battle in the backyard. Shelving your frustration for now, you focus on Lyra's voice as she delivers an update through the comms.\n\n\"Rookies, the Veterans have already engaged Smyther and his generals in the subbasement bunker below, but that doesn't mean you're out of this yet,\" Lyra says, not pausing for the series of groans and curses that come from the Rookies. \"See that door in the corner of the kitchen? That's the subbasement bunker exit and we need you to guard it. If any generals attempt to escape, or if the Veterans fail for some reason, you're the final line of defense.\" \n\nThe Rookies all eye each other warily—seven heroes placed on guard duty doesn't sound particularly action-packed—or Leaderboard-worthy. Griffin looks particularly annoyed and is about to speak up when Lyra issues another order.\n\n\"${codenamed}, we also need you to send a small group out to the front lawn to do recon,\" Lyra says. \"Choose now.\"\n\n[i]Slugger[/i], you think, as you realize what Lyra must be doing. \n\n*page_break\n\nYou're sure that whoever you send out on this recon mission will be likely to miss any potential action here and will be at a Leaderboard disadvantage should you face an elimination. Lyra must need some drama to air for the Rookies, and forcing you to choose favorites will only add fuel to whatever political fires might currently be burning. You're not sure whether Lyra's efforts will be enough to save the Rookies from losing, but you have to do your part to coordinate this next phase.\n\nBefore you can make a decision, Griffin steps in front of the group of Rookies. Then, before he can even speak, he is interrupted by Ignite, who steps forward ahead of him.\n\n\"I'll volunteer to perform the recon,\" Ignite says, his face set with a look of determination.\n\nYou're not sure whether Ignite is stepping up to be a martyr or to steal the spotlight, but either way, you can tell Griffin is clearly not pleased about it.  \n\nStill, as team leader, you get to make the decision. So who are you going to send out, potentially to their doom?\n\n*choice\n\t#Choose to keep the most experienced heroes here with me and send out the heroes with enhanced senses, because that's what's best for the mission.\n\t\t*set lb +10\n\t\t*set rlshp_griffin %+20\n\t\t*set rlshp_missboss %+20\n\t\t*set rlshp_tarsiero %-5\n\t\t*set rlshp_crystalline %+20\n\t\t*set rlshp_transfer %-20\n\t\t*set solostar +1\n\t\t*set truehero +1\n\n\t\t\"Thanks for the offer, Ignite,\" you say. \"However, I believe Transfer and Tarsiero are best suited for recon, given their enhanced senses. Ignite, Crystalline, Griffin, and Miss Boss, stay here with me to guard the exit.\"\n\n\t\tIf Transfer or Tarsiero know they've been assigned cleanup duty, they don't show it as they take off through the kitchen towards the front of the house. Tarsiero even does a jaunty little flip as he swings out of the room.\n\t\t*goto lawntime\n\t#Keep Ignite, Crystalline, and Transfer here with me on guard duty, to favor them and widen subtle cracks already splitting the group.\n\t\t*set lb +10\n\t\t*set rlshp_griffin %-20\n\t\t*set rlshp_missboss %-20\n\t\t*set rlshp_tarsiero %-5\n\t\t*set rlshp_crystalline %+20\n\t\t*set rlshp_transfer %+20\n\t\t*set loyalcit +1\n\t\t*set manipulater +1\n\n\t\t\"Thanks for the offer, Ignite,\" you say. \"However, I believe Tarsiero is best suited for recon, given his enhanced senses. Griffin and Miss Boss, go with him as backup. Ignite, Crystalline, and Transfer will stay here with me to guard the exit.\"\n\n\t\tIf Tarsiero knows he has been assigned cleanup duty, he doesn't show it as he takes off through the kitchen towards the front of the house, performing a jaunty little flip as he swings out of the room. Griffin and Miss Boss, on the other hand, are sure to send you looks of pure contempt before they turn to follow Tarsiero.\n\n\t\tThey've clearly clocked the line you just drew in the sand, but once they've gone, you notice the smiles now showing up on Crystalline and Transfer's faces. Ignite, as usual, looks too serious and focused for any other emotions.\n\t\t*goto lawntime\n\t#Keep Griffin, Miss Boss, and Tarsiero here with me on guard duty, to favor them and widen subtle cracks already splitting the group.\n\t\t*set lb +10\n\t\t*set rlshp_griffin %+20\n\t\t*set rlshp_missboss %+20\n\t\t*set rlshp_tarsiero %+20\n\t\t*set rlshp_crystalline %-20\n\t\t*set rlshp_transfer %-20\n\t\t*set loyalgmbt +1\n\t\t*set manipulater +1\n\n\t\t\"Thanks for the offer, Ignite,\" you say. \"Crystalline will join you, along with Transfer, given hir enhanced senses. Griffin, Miss Boss, and Tarsiero will stay here with me to guard the exit.\"\n\n\t\tIgnite follows your order immediately, turning on his heels and running through the kitchen towards the front of the house. Crystalline and Transfer, on the other hand, are sure to send you looks of unhappiness before they turn to follow Ignite.\n\n\t\tThey've clearly clocked the line you just drew in the sand, but once they've gone, you notice the smiles now showing up on Griffin and Miss Boss's faces. Tarsiero doesn't quite seem to understand what's going on, but he waves his tail happily nonetheless.\n\t\t*goto lawntime\n\t#Send Ignite and Griffin out on recon duty together to make the fewest disruptions for the team.\n\t\t*set lb +5\n\t\t*set rlshp_griffin %+15\n\t\t*set rlshp_missboss %+15\n\t\t*set rlshp_tarsiero %+15\n\t\t*set rlshp_crystalline %+15\n\t\t*set rlshp_transfer %+15\n\t\t*set floating +1\n\t\t*comment Floater has lower leaderboard, but is benefited balanced with generally stronger relationships across the board. These relationships/compromise comes at a price. The Private Stat is also lower Leaderboard generally, should have a benefit somewhere as well.\n\n\t\t\"Thanks for the offer, Ignite,\" you say. \"Griffin will join you for backup, since I think he was about to say the same thing. Transfer, Crystalline, Miss Boss, and Tarsiero will stay here with me to guard the exit.\"\n\n\t\tIgnite follows your order immediately, turning on his heels and running through the kitchen towards the front of the house. Griffin, happy to be singled out, also seems to ignore the potential negative consequences and smiles as he follows. Knowing Griffin, you're sure he'll find a way to steal the spotlight anyway, despite any potential disadvantage.\n\n\t\tOnce they've gone, you also notice the faint traces of smiles on the rest of the Rookies' faces. Tarsiero doesn't seem to understand quite what's going on, but he waves his tail happily nonetheless. You've managed to make everyone happy, which means you also avoided any drama…though this may not be great for your Leaderboard score. You'll just have to wait and see.\n\t\t*goto lawntime\n\n*label lawntime\n*page_break\n*set power -5\n\nNow that the lawn squad has split off, you reestablish a hivemind connection among all of the Rookies. Once that's done, you turn to physically check the subbasement bunker entrance—and that's when you realize that the door has been pushed slightly ajar. \n\nYou roll your wheelchair forward towards the door, finding it odd that you hear no sounds of battle raging from below. Could it somehow be soundproof down there? Or have the Veterans already finished taking down Smyther and all his generals? Could they really be that good?\n\nBut as you open the door wider and lean forward to peer down the staircase, your whole body freezes and the breath catches in your throat. \n\n*page_break\n\nSplayed across the upper steps is the alligator-hybrid Ani-Powered general, Ali, lying in a pool of her own greenish-red blood. On the steps surrounding her are brittle shards of scales, which have somehow been scraped off of her skin in large swaths. She lies perfectly still while cradling something between her limp arms…\n\n…and you nearly vomit when you realize it's her own severed tail.\n\nA wave of panic and disgust courses through you as you realize there is no way the Veterans could have done this. Which means something terrible must be going on down there in the subbasement bunker.\n\n\"Lyra?\" you speak out loud into your comm, trying desperately to find a way to regain your breath.\n\n\"Oh my…\" Lyra whispers. \"Hold. Everyone freeze.\" Lyra tries to sound commanding, but she can't help but follow up with: \n\n\"Oh god…they're all…\"\n\n*page_break\n\nEach second feels like an hour as you sit at the top of the stairs, unable to take your eyes off of the slaughtered Ani-Powered general. Your pounding heart sounds like thunder in your ears as you await Lyra's next words. You're sure they'll only confirm what you already fear: The Hero Project has just unwittingly stumbled upon the latest of these horrific Ani-cide hate-crime murders.\n\n\"Rookies, I have an update for you,\" Lyra speaks through the comms, her voice now sounding slightly more composed. \"The Veterans are accounted for and have secured the subbasement bunker. However, all of Smyther's Ani-Generals have been found dead. Smyther himself remains at large, as well as whoever may have done this. So please remain on high alert.\"\n\nIf the sole survivor of this attack was Smyther, the only non-Ani-Powered down there, then this only confirms your suspicions about this being another Ani-cide murder—unless Smyther did this himself, which seems unlikely, given that these are his most trusted allies. You hope there could be another reason, but your stomach turns and your skin crawls all the same. Who could hate your kind so much that they're systematically murdering you? Even though the targets still remain Ani-criminals, the message is clear:\n\nSomeone has decided Ani-Powered criminals deserve death over due process. \n\n*page_break\n\nThe Ani-Generals here may not be innocents, but you know all too well how easy it is for lost Ani-Powereds to fall through the cracks of society and into organizations like Smyther's. You think of someone butchering more lost Ani-Powereds, or even JK, and you nearly cry out loud. You force that thought from your mind, however, because it's too much to bear. \n\nWhoever this Ani-cide serial killer is, they're obviously incredibly resourceful and Powerful, if they were able to secretly penetrate The Hero Project and The DRPR's combined security perimeter, not to mention Smyther's own considerable defenses. Whoever you're dealing with, they're a formidable enemy.\n\nAnd they just made this fight very personal.\n\nAs these thoughts race across your mind, you realize that several new camera orbs have arrived to capture your reaction to these murders. Feeling increasingly sick, you turn to the nearest orb and fight the urge to scream.\n\n*choice\n\t#\"Get out of my face. This is disgusting.\"\n\t\t*set public %-15\n\n\t\t\"${codenamed}, I'm sorry, there was some static interference,\" The Hero Project's director of photography suddenly says over the comms in your ear. \"Can you repeat that for the cameras?\"\n\n\t\tRage pours through your mind in a cold waterfall, washing all reason away. The world flashes red, and next thing you know, all of the camera orbs that were surrounding you now lie smashed around your wheelchair.\n\n\t\t\"Did you get that?\" you whisper, unclenching your fists at your sides. \n\n\t\t*if (public \u003c 45)\n\t\t\t*set lb +10\n\t\t\t*set legended +2\n\t\t\t*set rlshp_eps %+15\n\t\t\t*set respected %-15\n\t\t\t*goto ignitefail\n\t\t*else\n\t\t\t*set lb +5\n\t\t\t*set rlshp_eps %-15\n\t\t\t*set respected %-5\n\t\t\t*goto ignitefail\n\t#\"We're going to find who did this. And we're going to stop them.\"\n\t\t*set public %+15\n\n\t\t*if (public > 65)\n\t\t\t*set lb +10\n\t\t\t*set legended +2\n\t\t\t*set rlshp_eps %+15\n\t\t\t*set traditional %+15\n\t\t\t*goto sorrystaticrage\n\t\t*else\n\t\t\t*set lb +5\n\t\t\t*set rlshp_eps %-15\n\t\t\t*set traditional %+5\n\n\t\t\t*label sorrystaticrage\n\t\t\t\"${codenamed}, I'm sorry, there was some static interference,\" The Hero Project's director of photography suddenly says over the comms in your ear. \"Can you repeat that for the cameras?\"\n\n\t\t\tRage pours through your mind in a cold waterfall, but you force yourself to keep your composure. Instead of smashing all of the cameras surrounding you, you manage to repeat your words as evenly as possible.\n\n\t\t\t\"Did you get that?\" you then whisper, clenching your fists at your side. \n\t\t\t*goto ignitefail\n\t#\"Take a good look. This is how Ani-Powereds are treated.\"\n\t\t*set public %+15\n\n\t\t*if (public > 65)\n\t\t\t*set lb +10\n\t\t\t*set legended +2\n\t\t\t*set rlshp_eps %+15\n\t\t\t*set traditional %-15\n\t\t\t*goto sorrystaticrage\n\t\t*else\n\t\t\t*set lb +5\n\t\t\t*set rlshp_eps %-15\n\t\t\t*set traditional %-5\n\t\t\t*goto sorrystaticrage\n\t#Don't say anything. This situation requires the respect of silence.\n\t\t*set public %-15\n\n\t\t\"${codenamed}, can you tell us what you're seeing?\" The Hero Project's director of photography suddenly says over the comms in your ear.\n\n\t\tRage pours through your mind in a cold waterfall, washing all reason away. The world flashes red, and next thing you know, all of the camera orbs that were surrounding you now lie smashed around your wheelchair.\n\n\t\t\"You're seeing nothing,\" you whisper, unclenching your fists at your side. \n\n\t\t*if (public \u003c 45)\n\t\t\t*set lb +10\n\t\t\t*set legended +2\n\t\t\t*set rlshp_eps %+15\n\t\t\t*set respected %+15\n\t\t\t*goto ignitefail\n\t\t*else\n\t\t\t*set lb +5\n\t\t\t*set rlshp_eps %-15\n\t\t\t*set respected %+5\n\t\t\t*goto ignitefail\n\n\n*label ignitefail\n*page_break\n\n\"I've got a live one!\"\n\nIgnite's voice sounding over your hivemind connection suddenly snaps you back into reality. You spin your chair around and look through the kitchen to find Ignite kneeling in the living room. You have no idea how he got in there or why he's alone, but you roll forward immediately.\n\n\"It's the Ani-General, Lolli,\" Ignite says into his comms. \"One of her shoulder antlers is broken, but she's still alive. She must have played dead to…\"\n\nIgnite seems to lose his words then, looking frozen as he kneels over Lolli's bruised body. Just like you, Ignite has never been in the field before, so perhaps he is now realizing that this is no simulation—there are real lives on the line here.\n\nWhile Ignite might be at a loss for words, you find that dozens are scrambling for attention in your own mind—unconscious or not, Lolli is rumored to be the most heartless and sadistic Ani-general of all time. Ignite should be securing her safely, just in case she really is still playing dead.\n\n\"Wait, Ignite, fall back,\" you shout through your hivemind connection. \"You need to restrain Lolli before—\"\n\n*page_break\n\nYour command is interrupted, however, as Lolli suddenly jerks upwards. \n\nYou watch in helpless horror as her remaining rhinestone-encrusted shoulder-antler slashes at Ignite. Luckily he is fast enough to dodge away, but the antler still manages to catch his arm, cutting his costume open. His tough skin remains unpenetrated, but Ignite is caught off guard, enough for Lolli to kick him away with a heel to his gut.\n\nJumping to her feet, Lolli then makes a break for the front door as best she can, limping as she attempts to run. You push your wheelchair forward and prepare to contact the Rookies, but before you can, a yellowish crystal explodes at Lolli's feet.\n\n*page_break\n\nAs an energy containment field suddenly appears to trap Lolli, Crystalline runs past her creation and across the living room to make sure Ignite is okay. Luckily, the only thing that seems bruised is Ignite's ego, from the the look on his face. But that call was still way too close for comfort.\n\nYou breathe a sigh of temporary relief and hear Lyra's voice crackle over the comms once again.\n\n\"That's a wrap, Rookies,\" she says, the heaviness in her voice unhidden. \"Please return to the transport for debrief.\"\n\nYou have no idea how to feel about this mission being over, other than completely exhausted and overwhelmingly anxious. Looking around at the other Rookies, it would appear they all feel the same way.\n\nBecause you all know that after what just happened, there's going to be hell to pay.\n\n*finish NEXT CHAPTER: REAL TALK\n", "rs_four": "*comment é x\n\n*text_image chap4.png center Chapter Four: Star-Powered\n\n\"My dashing dachshund, you simply could not be any later!\"\n\nYou're barely out of the limo when this voice assaults you, housed in the body of an enormous bejeweled man coming at you in a hot-pink people mover. His jowls shake and shimmy as he approaches, adding to his general air of cheeriness. \n\n\"You're the last of the Final Select to arrive,\" the man says, reaching out to pull you forward. \"Come along with me, come along and you'll see!\"\n\nThe man pulls you away with surprising speed, through the guest entrance of The Hero Project's soundstage. A million different smells assault your newly grown dog snout, but the most overwhelming by far is the night-jasmine perfume coming off of—\n\n\"And GG was his name-O,\" MeChip Prodigal suddenly appears and informs you, responding to your lat
