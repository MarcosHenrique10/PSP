reak\n\n\"I would never compare my situation or my troubles to yours, of course not,\" Crystalline says calmly. \"And I get that maybe, to you, my Powers and my life might look easy. Still, you say you've been judged by the way you look or where you come from, but don't you see that's exactly what you just did to me?\"\n\nHearing this, Transfer looks thoughtful. Ze certainly didn't expect that to be Crystalline's reaction, and you have to admit, neither did you. You look between Crystalline and Transfer, having much to say but knowing this is probably something these two have to settle themselves.\n\n\"You're right. I guess it's easy to be defensive when I have to be all the time, but you've been nothing but kind and supportive. So I am sorry,\" Transfer begins. \"But listen, you also have to understand, Powereds like me, and if I may, like ${codenamed}—we have to face a million little indignities and disadvantages every day that you probably can't even begin to imagine. The world opens up for Powereds like you, Crystalline, and you don't even know it. That's why I came on this show in the first place, to show the world that your problems quite often aren't exactly the same as ours, as the Underrepresented.\n\n\"Still, I didn't mean to jump down your throat,\" Transfer sighs. \"Honestly, I think being on this show is making me a bit nutty…\"\n\n*page_break\n\n\"My number-one guilty pleasure is reality 3V, and the first season of The Hero Project is my favorite show of all time, but I never thought someone like me could be a Finalist.\n*if trilogyreader\n\tEspecially not after what Scoundrel pulled last season, which just reinforced all the negative stereotypes about Ani-Powereds.\nWhen my best friend dared me to try out I never thought I'd make it past the front door, but now here I am.\n\n\"At first I hoped this would be good for me, you know, to break me out of the San Francisco bubble,\" Transfer continues, the words now seeming to tumble out of hir mouth. \"But being here is so different than I thought it would be, and I considered myself an expert going in. I forgot that I tend to get lost in big groups, and I'm learning now that I'm a much more private person than I thought. I wanted to be here to represent my community, but I'm not sure I'm the right person for the job. I'm…not sure I really belong here, anymore.\"\n\nTaking a moment to breathe, Transfer appears momentarily at ease. Ze seemed to have forgotten all about the cameras, but once a hovering orb repositions itself beside the table, Transfer looks tense once again.\n\n\"Jeez, get it together, Transy,\" ze says to hirself. \"Sorry, I also just tend to get like this on human mornings. It's hard to explain, but it's like a rush of emotions return all at once after the vampire days. I don't mean to take it out on you two. Besides, I share a bathroom with you, Crystalline, and you're right—your stomach must be very sensitive.\"\n\nAt this, everyone at the table bursts out laughing, including you. You might have a lot you want to say on this subject, but this is Transfer's moment—you know you'll get your own very soon. Besides, all you can really think is that:\n\n*choice\n\t#I have a crush on Transfer. A big one.\n\t\t*set crushtransfer true\n\t\t*set rlshp_transfer %+20\n\n\t\tYou must have settled your owl eyes on Transfer as you think this, because you now find hir staring back at you. You're not sure if it's just your imagination, but you swear you can feel invisible energy crackling between the two of you. It's almost as if you can say it without saying it… \n\n\t\t[i]I know what you've been through.[/i]\n\n\t\tRight here at a table in front of Crystalline and the camera orbs and an entire production crew is not the time to say it, though, especially given all that Transfer just confessed. For now, you just have to hope that Transfer is feeling all of the things you're feeling, too.\n\n\t\t*if (bisex) or (pansex)\n\t\t\t*page_break\n\t\t\t*goto votecittalk\n\t\t*else\n\t\t\tFeelings that are new for you, in fact. You didn't necessarily expect to be attracted to someone with a non-binary gender, but you should be proud of yourself for being open enough to expand your horizons.\n\t\t\t*page_break\n\t\t\t*goto votecittalk\n\t*if (attractwomen) #Actually, I have a crush on Crystalline.\n\t\t*set crushcrystalline true\n\t\t*set rlshp_crystalline %+20\n\n\t\t*if pansex\n\t\t\tWhich is new for you, since you're not usually attracted to binary gender identities. However, you've always promised yourself to remain open to falling for people without restrictions, so this isn't all that unusual in that sense. \n\t\t*comment endif\n\n\t\tCrystalline seems pretty smitten by Ignite at the moment, however. Besides, even if her situation were different, you're not sure if she would ever return your feelings.\n\t\t*if maled\n\t\t\tYou realize that will be a thought for another time, however, as Crystalline finally stops laughing long enough to respond.\n\t\t\t*goto votecittalk\n\t\t*else\n\t\t\tYou think she seems to be attracted mostly to men, unfortunately. You suppose you'll just have to find a way to figure that out later, if you really care enough.\n\t\t\t*goto votecittalk\n\t#It's too soon and I have too much else on my mind to focus on crushes, but I don't necessarily want to rule out the possibility for the future, based on my first impressions.\n\t\t*if bisex\n\t\t\t*set crushtransfer true\n\t\t\t*set rlshp_transfer %+10\n\t\t\t*set crushcrystalline true\n\t\t\t*set rlshp_crystalline %+10\n\n\t\t\tYou don't want to rush into anything, but you also want to keep an open mind, because you are potentially intrigued by Transfer and Crystalline. Whether that means being friends or more with either, you're not sure—you'll just have to see if you last here on The Hero Project long enough to find out.\n\t\t\t*goto votecittalk\n\t\t*elseif pansex\n\t\t\t*set crushtransfer true\n\t\t\t*set rlshp_transfer %+10\n\n\t\t\tYou don't want to rush into anything, but you also want to keep an open mind, because you are potentially intrigued by Transfer. Whether that means being friends or more, you're not sure—you'll just have to see if you last here on The Hero Project long enough to find out.\n\t\t\t*goto votecittalk\n\t\t*elseif attractwomen\n\t\t\t*set crushcrystalline true\n\t\t\t*set rlshp_crystalline %+10\n\n\t\t\tYou don't want to rush into anything, but you also want to keep an open mind, because you are potentially intrigued by Transfer and Crystalline. Whether that means being friends or more with either, you're not sure—you'll just have to see if you last here on The Hero Project long enough to find out.\n\t\t\t*goto votecittalk\n\t\t*else\n\t\t\tYou don't want to rush into anything, but you also want to keep an open mind, because you are potentially intrigued by Transfer. You didn't necessarily expect to be attracted to someone with a non-binary gender, but you should be proud of yourself for being open enough to expand your horizons.\n\n\t\t\tWhether this ultimately means being friends or more, you're not sure—you'll just have to see if you last long enough here on The Hero Project to find out.\n\t\t\t*goto votecittalk\n\t#I definitely want to get to know Transfer and Crystalline better, but just as friends.\n\t\t*set rlshp_crystalline %+10\n\t\t*set rlshp_transfer %+10\n\n\t\tSo you know that continuing to listen is probably the best way to do that.\n\t\t*goto votecittalk\n\t#Honestly, I'm not sure I like these two at all.\n\t\t*set rlshp_crystalline %-20\n\t\t*set rlshp_transfer %-20\n\n\t\tThough they don't need to know that until you want them to—it's probably best to keep these feelings to yourself, until the right time comes.\n\t\t*goto votecittalk\n\n*label votecittalk\n\n\"Transfer, I think that you being on this show is brave for so many reasons,\" Crystalline says, raising her water glass for a toast. \"And I'm very glad that you're my roommate, so I can continue to learn about you and your experience. But I have to say, you're wrong about one thing: you do belong here. And I'm sure ${codenamed} agrees with me.\"\n\nAs you clink your own glass against Crystalline and Transfer's, you smile and remain silent, wondering if Crystalline is proposing what you think she is. \n\n\"Speaking of, what are you all thinking about the vote tonight?\" Kevin abruptly says from his spot beside a cluster of camera orbs, pushing the conversation fully into the territory you thought it was heading.\n\nAs this question is posed, however, you are suddenly very aware of the sound of Crystalline, Transfer, and yourself chewing in silence. As uncomfortable as this subject might be, you know it's actually the reason that your own handler, Weaver, sent you here in the first place. Weaver has left you to figure out the politics for yourself mostly, but ${weaverze} did give you one major tip….\n\n*page_break\n*set loyaltotal ((loyalcit) + (loyalgmbt))\n\nWeaver explained that there are several standard strategy archetypes in reality 3V that you could be aiming to fill, to clarify your position in the competition and bolster your overall status—with so many heroes still remaining, it's going to be important to try to define yourself and stand out to viewers. You're not sure how you feel about this, since the line between \"archetype\" and \"stereotype\" feels very thin to you. Still, Weaver took the liberty of analyzing the decisions you've made since you reached the Final 14 and came up with the following tally:\n\n[b]True Hero:[/b] ${truehero}\n*line_break\n[b]Solo Star:[/b] ${solostar}\n*line_break\n[b]Game Manipulator:[/b] ${manipulater}\n*line_break\n[b]Floater:[/b] ${floating}\n*line_break\n[b]Alliance Loyalist:[/b] ${loyaltotal}\n\nBased on this list, you can see where you've been focusing your attention so far even if you weren't necessarily aware of it. Weaver didn't recommend that you change anything, just that since you may already be leaning in some directions naturally, you should try to stick to the type you're most comfortable with whenever possible. You're still not sure you love the idea of being boiled down to a reality punchline, but then again, you figure that you can at least try to find one that feels like an expression of your personality.\n\nEspecially since your spot in the Final 12 depends on navigating this next vote successfully.\n\n*page_break\n\nSome natural friendships have formed among the Rookies since the Semi-Finals, but so far everyone has been getting along pretty well. Knowing that Weaver scheduled you to visit the other half of the Rookies after this lunch, you suppose the question for you now is: Should you try to keep the peace, or start drawing some political lines in the sand yourself? \n\nAs Crystalline and Transfer continue holding their tongues, it's clear that it's going to be up to you to get the conversation started.\n\n*if warningsysnine\n\t\"Hooty hoo, look at you!\" MeChip Prodigal suddenly hoots in your ear, operating on her MeChip Warning System protocols. \"I know you've got a lot on your plate, both literally and figuratively, so let me offer some advice. Definitely try to build off of whatever political game you were playing last mission, intentionally or not. \n\n\t\"If you want to float or manipulate, be as subtle as possible. If you want to play the hero, go for team strength. If you want to fly solo or flock with the other Rookies, don't give away your intentions. And of course, if you fancy this fanciful pair, commit to them right here and now. Hoo, I'm as winded as an owl after all that, so Prodigal out!\"\n\t*goto thefirstcitchoice\n*else\n\tWhatever you do next, you know it will only further solidify your \"type,\" whether you want it to or not.\n\t*goto thefirstcitchoice\n\n*label thefirstcitchoice\n*choice\n\t#Subtly place the target on the other Rookies, since this might keep you safe in the middle and leave your options open as a generally liked swing vote.\n\t\t*set officialmanipulater true\n\t\t*set officialfloating true\n\t\t*set manipulater +2\n\t\t*set floating +2\n\n\t\t\"I have to say, I really like spending time with you both,\" you say. \"Still, I'm not sure what I should do about tonight yet. I guess I was thinking maybe Griffin or Miss Boss should be in consideration for the vote.\" \n\n\t\tYou say this knowing that Griffin and Miss Boss are the other pair that has formed among the Rookies besides Crystalline and Transfer. Naming them will be sure to split the group down the middle, instead of allowing for the possibility of those two pairs to team up and form the majority.\n\n\t\t\"Don't even get me started on that bully Griffin,\" Crystalline practically spits, surprising you with the force of her words. She's so angry that she can't seem to keep speaking, so Transfer jumps in for her.\n\n\t\t*if (manipulater > 2) or (floating > 2)\n\t\t\t*set legended +1\n\t\t\t*set respected %-15\n\t\t\t*set rlshp_crystalline %+20\n\t\t\t*set rlshp_transfer %+20\n\t\t\t*goto thereactiona\n\t\t*else\n\t\t\t*set rlshp_crystalline %+10\n\t\t\t*set rlshp_transfer %+10\n\t\t\t*goto thereactiona\n\t#Make an official alliance with Crystalline and Transfer right here and now—one that I plan to remain loyal to.\n\t\t*set officialloyalcit true\n\t\t*set loyalcit +2\n\n\t\t\"Well, I don't know about you two, but I think the three of us should officially stick together,\" you say, smiling from Crystalline to Transfer. \n\n\t\tTo your relief, both of them immediately return your smile, seeming to agree completely.\n\n\t\t\"We can come up with an alliance name and everything, which I'm betting will be Transfer's specialty as our resident reality expert,\" you add, for good measure. \"Though I guess this also means we have to vote for Griffin, Miss Boss, or Tarsiero tonight, huh?\"\n\n\t\t\"Don't even get me started on that bully Griffin,\" Crystalline practically spits, surprising you with the force of her words. She's so angry that she can't even seem to keep speaking, so Transfer jumps in for her.\n\n\t\t*if (loyalcit > 2)\n\t\t\t*set legended +1\n\t\t\t*set respected %+15\n\t\t\t*set rlshp_crystalline %+30\n\t\t\t*set rlshp_transfer %+30\n\t\t\t*goto thereactiona\n\t\t*else\n\t\t\t*set respected %+5\n\t\t\t*set rlshp_crystalline %+15\n\t\t\t*set rlshp_transfer %+15\n\t\t\t*goto thereactiona\n\t#I'm not sure who I want to side with yet or if I'd rather just play solo, so I'll try to find out how Crystalline and Transfer plan on voting without specifying my own intentions.\n\t\t*set officialloyalgmbt true\n\t\t*set officialsolostar true\n\t\t*set loyalgmbt +2\n\t\t*set solostar +2\n\n\t\t\"I'm not sure what I want to do yet,\" you say. \"I just want us to be the five strongest Rookies possible so we can defeat the Veterans next mission.\"\n\n\t\t\"You sound like that bully Griffin,\" Crystalline practically spits, surprising you with the force of her words. She's so angry that she can't seem to keep speaking, so Transfer jumps in for her.\n\t\t\n\t\t*if (loyalgmbt > 2) or (solostar > 2)\n\t\t\t*set legended +1\n\t\t\t*set respected %-15\n\t\t\t*set rlshp_crystalline %-10\n\t\t\t*set rlshp_transfer %-10\n\t\t\t*goto thereactiona\n\t\t*else\n\t\t\t*set respected %-5\n\t\t\t*set rlshp_crystalline %-20\n\t\t\t*set rlshp_transfer %-20\n\t\t\t*goto thereactiona\n\t#Make it known I want to keep the Rookies as strong as possible and protect our team unity, so I'll be voting privately to keep heroes here who feel the same.\n\t\t*set officialtruehero true\n\t\t*set truehero +2\n\t\t\n\t\t\"I'm not going to discuss my vote, I don't want us to start turning on each other,\" you say. \"I just want us to be five best Rookies possible so we can defeat the Veterans next mission. I'm going to vote to keep the team as strong and unified as possible.\"\n\n\t\tThankfully, it would seem Crystalline and Transfer don't want to discuss their votes either, since they match your statement with quiet nods. \n\n\t\tOr at least, you hope that's what their gesture means.\n\n\t\t*if (truehero > 2)\n\t\t\t*set legended +1\n\t\t\t*set respected %+15\n\t\t\t*set rlshp_crystalline %+10\n\t\t\t*set rlshp_transfer %+10\n\t\t\t*goto thereactionend\n\t\t*else\n\t\t\t*set respected %+5\n\t\t\t*set rlshp_crystalline %-10\n\t\t\t*set rlshp_transfer %-10\n\t\t\t*goto thereactionend\n\n*label thereactiona\n\n\"Griffin has already decided he wants to vote me out tonight,\" Transfer explains. \"He thinks I should go next because I 'don't want to be here as much as everyone else' and honestly, he's not totally wrong. I told Crystalline not to be mad at him for that.\"\n\n*page_break\n\n\"It's not just the fact that he wants to vote you out,\" Crystalline explains. \"It's more the way he went about it. He just came up to me and told me it's what I should do if I wanted to be smart, and that he wouldn't be able to 'protect' me if I didn't vote his way. \n\n\"As if I need his protection,\" Crystalline scoffs. \"Besides, I don't trust Griffin one bit—I don't think he's in this for anything other than himself, and he already seems to have Miss Boss and Tarsiero in his pocket. He's been keeping them so close, I haven't even had a chance to talk to either of them.\"\n\n\"Yeah, I thought I could bond with Tarsiero, but honestly I found him to be a bit…\" Transfer begins, immediately looking wary of what ze was about to say. You nod at Transfer, knowing how ze feels, but not wanting to voice that kind of divisive Ani-sentiment either.\n\n*if officialloyalcit\n\t\"Well then, the three of us should team up and give Griffin a dose of his own medicine,\" you say matter-of-factly.\n\n\t\"Yeah, but if we vote for Griffin, we'll be forcing a tie,\" Crystalline explains. \"There's no way Miss Boss or Tarsiero will stray from him, so it'll be up to the public vote to decide who stays between Transfer and Griffin.\"\n\n\t*page_break\n\n\t\"Then we have to just hope the viewers see Transfer and Griffin the way that we do,\" you say, smiling at Transfer. \n\n\tYou mean these words, but you also can't help but feel nervous—if the public tiebreaker doesn't end up favoring Transfer, that could leave you and Crystalline at a serious disadvantage as a pair against the three-person Rookie majority. Then again, you haven't even decided what you really want from the competition past making the Final 12 to secure JK's final treatment. Do you even care about staying or winning beyond that?\n\n\tWhatever you decide, fighting for Transfer now feels worth the risk. You just hope you still feel that way as the competition continues to unfold….\n\t*goto thereactionend\n*else\n\t*page_break\n\n\t\"Well, I'm supposed to see the other Rookies after this lunch,\" you say. \"Let me see what I can find out.\"\n\n\tYou smile at Crystalline and Transfer, knowing that what you say is true—but also that if what Crystalline claims is really true as well about Miss Boss and Transfer's loyalties, you might have to side with Griffin to stay safe in the majority. You suppose it's a good thing you left your options open and didn't make any promises yet.\n\t*goto thereactionend\n\n*label thereactionend\n\nThe table settles into silence once again, save for the whir of the camera orbs, and you sigh, knowing you only have until tonight to figure out what to do.\n\n*page_break LATER, ACROSS THE CONTESTANT MANSION\n\nThe sun feels good on your skin, but you're pretty sure it doesn't look as good on you as it does falling on the lean, muscled bodies of Griffin and Miss Boss. They both lounge beside the pool in their bathing suits, looking like a fashion holo-spread come to life.\n\n\"You did all of the right things during the mission,\" Griffin says, his deep blue eyes focused intensely on you.\n*if (lb > 75)\n\t\"And I think you deserved to win that Immunity, too. Crystalline shows promise, but she\n\t*goto theprom\n*else\n\t\"If you had gone home instead of Ignite, that would've been such a tragedy. He shows promise, but he\n\t*goto theprom\n\n*label theprom\nstill has a lot to learn. There are just some things that can't be taught in a classroom, am I right?\"\n\nGriffin flashes you a dazzling white smile,\n*if attractmen\n\tcreasing the skin around his eyes in just the right way. You smile back at him, trying not to tilt your entire head to stare at the curve of his well-defined chest or the line of fine hair that trails down the ridges of his tan stomach muscles.\n\t*goto wonderyou\n*else\n\tso you try to return the gesture and keep your eyes level to avoid tilting your entire head down to look at his shockingly short swimsuit.\n\t*goto wonderyou\n\n*label wonderyou\nYou wonder if part of his Power is maintaining a perfect, fatless body at age 49.\n\n\"It's too bad about Ignite, though,\" Griffin continues monologuing. \"He wouldn't necessarily have been my choice to go home at fourteenth, but I still see why the Judges chose him. He just doesn't have the ease of experience yet. Real heroing doesn't come with an instruction manual. He'll learn to loosen up and lighten up, to not overthink everything. I remember having to learn the same thing as a young hero.\"\n\n*page_break\n\n\"Are you sure you don't want to come in for a swim?\" a floating Miss Boss asks from her spot across the pool, interrupting Griffin. Your owl eyes can make out every droplet of water resting on her caramel-colored\n*if attractwomen\n\tskin, especially the ones on her ample cleavage.\n\t*goto nahcode\n*else\n\tskin, so you try not to stare.\n\t*goto nahcode\n\n*label nahcode\n\n\"Nah, ${codenamed} likes it up here on dry land with me,\" Griffin says, placing a hand on your knee and blinding you once again with his smile.\n\nSwiveling from Griffin to Miss Boss, you can't help but wonder how the slugger you ended up here. You feel like you're getting to sit at the popular table, and against expectations, they're actually being nice to you—they haven't even said anything about your owl head rotations. You wouldn't necessarily have thought you'd belong with this pair, but do you find it at all tempting to be considered one of them? \n\n*choice\n\t*if (attractwomen) #Get in the pool with Miss Boss to keep flirting, because I have a major crush on her.\n\t\t*set crushmissboss true\n\t\t*set rlshp_missboss %+25\n\t\t*set rlshp_griffin %-10\n\n\t\t*if pansex\n\t\t\tWhich is new for you, since you're not usually attracted to binary gender identities. However, you've always promised yourself to remain open to falling for people without restrictions, so this isn't all that unusual in that sense. \n\t\t*comment endif\n\n\t\tYou make your way down into the pool, thankful that your body is mostly human today and not furry or feathery. As you wade closer to Miss Boss, she smiles at you and your heart starts pounding—but you are distracted by the disappointed sigh that Griffin lets out, evidently from being left behind.\n\t\t*goto betthsy\n\t*if (attractmen) #Stay close to Griffin to flirt with him, because I have a thing for him.\n\t\t*set crushgriffin true\n\t\t*set rlshp_griffin %+25\n\n\t\t*if pansex\n\t\t\tWhich is new for you, since you're not usually attracted to binary gender identities. However, you've always promised yourself to remain open to falling for people without restrictions, so this isn't all that unusual in that sense. \n\t\t*comment endif\n\n\t\tYou stay seated behind Griffin and try to match the wattage of his smile. Your heart nearly skips a beat as he smiles back—he has the kind of eyes that make you feel like the only person in the world. You wonder how frequently he uses them…or whether you really even care, as long as they stay focused on you.\n\t\t*goto betthsy\n\t#I don't know anyone well enough to develop any real feelings, but I'm open to the possibility of a crush once we get to know each other better, based on my initial impressions.\n\t\t*if (bisex) or (pansex)\n\t\t\t*set crushgriffin true\n\t\t\t*set crushmissboss true\n\t\t\t*set rlshp_missboss %+10\n\t\t\t*set rlshp_griffin %+10\n\t\t\t*if pansex\n\t\t\t\tWhich is new for you, since you're not usually attracted to binary gender identities. However, you've always promised yourself to remain open to falling for people without restrictions, so this isn't all that unusual in that sense. \n\t\t\t*goto netutmbg\n\t\t*elseif (attractmen)\n\t\t\t*set crushgriffin true\n\t\t\t*set rlshp_griffin %+10\n\t\t\t*goto griffriend\n\t\t*else\n\t\t\t*set crushmissboss true\n\t\t\t*set rlshp_missboss %+10\n\n\t\t\t*label netutmbg\n\t\t\t\n\t\t\tYou make sure to smile at Miss Boss, but stay seated beside Griffin as he speaks up once again.\n\t\t\t*goto betthsy\n\t#Stay where I am—and stay friendly. There's no harm in getting to know these two better, but I don't want to start anything.\n\t\t*set rlshp_griffin %+15\n\t\t*set rlshp_missboss %+15\n\n\t\t*label griffriend\n\t\tYou stay seated behind Griffin and try to match the wattage of his smile. You find yourself disarmed by his lingering stare—he has the kind of eyes that make you feel like the only person in the room. Though you can't help but wonder how frequently he uses this particular charm….\n\t\t*goto betthsy\n\t#Stand up and step back, because I don't like the idea of being associated with either of these two yet.\n\t\t*set rlshp_griffin %-15\n\t\t*set rlshp_missboss %-15\n\n\t\tYou stand up and take a few steps back, keeping your face even against the wattage of Griffin's lingering stare. He has the kind of eyes that make you feel like the only person in the room, but you have a feeling he uses them all the time to get what he wants….\n\t\t*goto betthsy\n\n*label betthsy\n\n\"So I'm guessing your handler showed you the same parts of last night's episode that Kevin showed us, right?\" Griffin asks. \"I don't really understand why we can't see more. It's very weird being kept this much in the dark, so late in my career.\"\n\n\"Yep,\" you say, trying to relate. \"I'm still curious to know who the Veterans are.\"\n\n\"I'd do anything to have unrestricted MeChip access again,\" Miss Boss adds. \"I feel like an unplugged heathen back in the twentieth century, missing out on national news and what's going on in the world.\"\n\n\"Ah, you'll get access to all your gossip and fashion holo-zines once the show is over,\" Griffin says, winking at Miss Boss. \"Hey, you'll probably even get to be on the cover of one, if we win this thing.\"\n\nMiss Boss manages a smile for Griffin, but her eyes betray the gesture. You know Miss Boss thinks she needs Griffin's energy source for her telekinetic Powers in missions, but you wonder what she's really thinking underneath that strained smile of hers….\n\n*page_break\n\n\"I remember my first holo-zine cover story, back when I won Charleston's Hero of the Year for the first time,\" Griffin says wistfully, setting his blue eyes on the cloudless sky. \"I had just defeated the unbeatable Uncivil. Of course, it was much easier to recover from those battles when I was in my twenties.\"\n\nYou catch a momentary shadow of doubt crossing Griffin's face, and your mind immediately flashes back to his energy blast sputtering out at Smyther's Manor. You've always heard that Powers are like a muscle or a talent, that they need proper care and cultivation to last—and if you abuse them, they start to strain as you age. Thinking this, you wonder if perhaps Griffin needs Miss Boss much more than he is letting on, too.\n\n\"I envy you beginner heroes, really,\" Griffin goes on. \"You have your whole career to learn the lessons I've learned. That's what I love about you two and Crystalline and Tarsiero and even poor Ignite. You're all so willing and eager to learn and grow from this experience.\"\n\nYou notice that Griffin has rather glaringly left Transfer off of his list. Still, you promised yourself you'd try to get to know these two a bit more before talking game, if only for the sake of the cameras, so you try to change the subject.\n\n\"Miss Boss, do you miss Reigna?\" you try, settling your owl eyes on the fabric headband Miss Boss now wears in her hair, no doubt in honor of her eliminated best friend.\n\n*page_break\n\nMiss Boss flinches, and you can make out the threat of tears in her eyes with your owl vision, but she quickly covers these up. \"Very much, thanks for asking,\" she says. \"Reigna isn't just my best friend, she's my heroic partner. Still, I'm grateful to be able to work with Griffin, since our Powers are so complementary. I'm learning a lot from him.\"\n\n\"It's my pleasure, missy,\" Griffin answers before turning to you. \"${codenamed}, did you know StarSoar very well? It's such a shame what happened to him. It's so sad when people can't control their Powers properly. They can really get the best of you if you let them.\"\n\nYou feel a flash of anger, hearing Griffin's words—but then you realize this anger may be fueled by guilt, given the fact you essentially took StarSoar's spot here. Wherever the anger comes from, you can't help but think: Who says whatever StarSoar potentially suffers from is a sign of weakness, some matter of control or willpower? You can feel words of protest bubbling up uncontrollably in your throat when suddenly Miss Boss speaks first.\n\n\"I'm just so thankful for the paycheck,\" Miss Boss jumps in, sending you a cautious side-glance. \"I've been heroing for years, but this is the first time I'm really getting to make a full living off of it.\"\n\n\"It's so gratifying, isn't it?\" Griffin says, seemingly unaware of whatever emotions you were just feeling. \"I remember my first heroic paycheck; it was the best day of my career. Of course, I'm giving all my earnings from The Hero Project to charity, to support Powered youth programs.\"\n\n*page_break\n\nYou keep your eyes on Miss Boss through Griffin's latest soliloquy and watch as she visibly grinds her teeth together. Once he's done speaking, however, Miss Boss twists her lips into another smile before responding to Griffin.\n\n\"If I make it to the Final 12, I think I can finally afford to rent an apartment up here in Millennia City,\" Miss Boss says, looking truly excited for the first time since you've met her. \"Reigna and I have been trying to move to MC for years. Let me tell you, living in my Tía Camilla's house in the valley back in LA is getting really, really old.\"\n\n\"Well, I wouldn't worry about that, we'll all be living in this mansion as American Protectorate members if I have things my way,\" Griffin says. \"What about you, ${codenamed}? Any plans for your income yet?\"\n\nGriffin asks you this question nonchalantly, as if you haven't already memorized every penny you'll be receiving for being here on The Hero Project. \n\n*page_break\n*set moneyed +3000\n\nSALARY RUNDOWN\n*line_break\n[b]Finalist Participation Through Finale:[/b] $10,000 (Received at Finale)\n*line_break\n[b]Final 14:[/b] $2,500 ($12,500 Total)\n*line_break\n[b]Final 13:[/b] +$500 ($13,000 Total)\n*line_break\n[b]Final 12:[/b] +$2,500 ($15,500 Total)\n*line_break\n[b]Final 11:[/b] +$500 ($16,000 Total)\n*line_break\n[b]Final 10:[/b] +$3,000 ($19,000 Total)\n*line_break\n[b]Final 9:[/b] +$2,000 ($21,000 Total)\n*line_break\n[b]Final 8:[/b] +$3,000 ($24,000 Total)\n*line_break\n[b]Final 7:[/b] +$2,000 ($26,000 Total)\n*line_break\n[b]Final 6:[/b] +$4,000 ($30,000 Total)\n*line_break\n[b]Winner:[/b] +$70,000 ($100,000 Total)\n*line_break\n[b]Winner:[/b] A One-Year Contract with The American Protectorate\n\nIf you make it just a couple more weeks, you'll have earned the equivalent of nearly eight months' worth of shifts at the Millennial Mews. It's stunning to you how just a few months ago you could barely get an interview for even the lowest-paying jobs—and any interviews you did manage to get went very poorly anyway, once they saw that you were Ani-Powered. \n\nYou never thought you'd be in a position to make this much money this quickly, ever.\n\nSo despite yourself, you've already thought about how you'll start spending this money. Which means you are also very ready to answer Griffin's question:\n\n*choice\n\t#\"I'm going to use it to make a better life for my sister and me,\" I say, purposely remaining non-specific. It's my business how I'll spend this money.\n\t\t*set societal %-15\n\t\t*set public %-15\n\t\t*goto allgoodstuff\n\t#\"I would love to use it to move my sister JK and me into a bigger apartment and get better health insurance.\"\n\t\t*set societal %-15\n\t\t*set public %+15\n\t\t*goto allgoodstuff\n\t#\"I'd like to donate some of it to create an Underrepresented support program, to benefit other Disembodied, Ani, and Morpho-Powereds.\"\n\t\t*set societal %+15\n\t\t*set public %+15\n\t\t*goto allgoodstuff\n\t#\"I want to use the money to make a difference,\" I say, purposely remaining non-specific. It's my business how I'll spend this money.\n\t\t*set societal %+15\n\t\t*set public %-15\n\t\t*goto allgoodstuff\n\n*label allgoodstuff\n\n\"I'm using my moneys to buy more honeys!\" a new voice suddenly shouts, just as soon as you finish speaking.\n\nYou turn and spot Tarsiero leaping off of the nearest balcony, his tarsier body curled into a tight cannonball. Before anyone can react, Tarsiero slams into the pool, sending great splashes of water cascading over everyone. Miss Boss catches the brunt of the soaking and looks pissed as hell about it at first, but by the time Tarsiero resurfaces, she is once again all smiles.\n\n\"Am I right, Boss lady?\" Tarsiero asks, his wet fur waving in the water. \"So what is everyone discussing? What did I miss? Oh hello, ${codenamed}, I didn't see you there! Neato eyes today, they look just like mine! #AniTwins!\"\n\nYou nod at Tarsiero, shaking off your half-soaked costume. Before you can say anything to your newly arrived \"AniTwin,\" Griffin speaks up once again—for better or worse.\n\n\"I'm glad you're here, Tarsy,\" Griffin says, his biceps flexing as he runs his fingers through his now-damp hair. \"Especially because if we all want that final cash prize, we should probably talk about tonight's vote.\"\n\n*page_break\n\nMiss Boss and Tarsiero nod at Griffin, who seems to be preparing for another speech. You settle in to listen, figuring you had to get down to business sooner or later.\n\n\"We've all worked extremely hard to get to this point and we all want to stay here,\" Griffin begins. \"So I think it would be crazy for us not to work together to make that happen. Especially since there's one Rookie who doesn't seem to want this as badly as the rest of us. Who doesn't even seem happy to be here in the first place.\"\n\nGriffin knows he doesn't have to say Transfer's name—since ze and Crystalline are the only Rookies not currently present and Crystalline has Immunity, Transfer is the obvious remaining target. \n*if (officialtruehero = false)\n\tBesides, this just confirms what you were already told by Crystalline and Transfer earlier.\n*comment endif\n\n\"${codenamed}, we wanted Crystalline to join us too, but she's in too much of a funk from Ignite's elimination to think clearly,\" Griffin continues. \"Miss Boss, Tarsiero, and I have already made up our minds, which means we just need one more vote to hold the majority.\"\n\n\"I see,\" you say, not playing into Griffin's hands just yet. Instead, you turn to Miss Boss and Tarsiero in the pool. \"And you both are already set on this plan, too?\"\n\n*page_break\n\nMiss Boss and Tarsiero both nod at you, but don't speak. Which makes it clear who is running the show here, if it wasn't abundantly clear already.\n\n\"If you vote with us, you're solid and safe. But without us…\" Griffin starts, his face growing uncharacteristically stern. \"Well, why risk making enemies when we can just make this easy for everyone?\"\n\nIt isn't exactly a threat, but Griffin certainly does let the idea hang in the air by going silent afterwards.\n\n\"Yeah, #RookiesUnited!\" Tarsiero shouts with his fist in the air, oblivious to any potential tension. Beside him, Miss Boss just floats along and scratches Tarsiero behind the ear, causing him to smile and rub against her hand adoringly. \n\n*choice\n\t#The sight threatens to turn my stomach. [i]You're human, not an animal[/i], I want to scream at Tarsiero.\n\t\tYou're thankfully distracted from this internal tirade as Miss Boss catches your eye. She smiles up at you with a loaded look in her eyes—almost as if she's trying to tell you to trust her and join up despite these other two.\n\t\t*if crushmissboss\n\t\t\tAnd you can't help but secretly hope this look might mean more, given your potential feelings about Miss Boss.\n\n\t\t\tThe look may be reassuring, but unlike Tarsiero, you are no one's pet.\n\t\t\t*goto mbcrushtest\n\t\t*else\n\t\t\tThe look may be reassuring, but unlike Tarsiero, you are no one's pet.\n\t\t\t*goto mbcrushtest\n\t#As annoying as Tarsiero might be, I don't want to judge him too harshly. I'd much rather have the opportunity to talk to him and learn more about why he acts the way he does.\n\t\tHowever, Griffin doesn't seem to want to give you the chance to have any side conversations here.\n\n\t\t*label loadedsmilemb\n\t\tYou're interrupted from this thought, thankfully, as Miss Boss catches your eye. She smiles up at you with a loaded look in her eyes—almost as if she's trying to tell you to trust her and join up despite these other two.\n\t\t*if crushmissboss\n\t\t\tAnd you can't help but secretly hope this look might mean more, given your potential feelings about Miss Boss.\n\n\t\t\tThe look may be reassuring, but it's going to be up to you to decide whether to be a leader or a follower like these two.\n\t\t\t*goto mbcrushtest\n\t\t*else\n\t\t\tThe look may be reassuring, but it's up to you to decide whether to be a leader or a follower like these two.\n\t\t\t*goto mbcrushtest\n\t#I don't want to feel annoyed by Tarsiero at all. That's a potential Ani-based instinct I'm perfectly happy to suppress.\n\t\t*goto loadedsmilemb\n\n*label mbcrushtest\n\nThat said, you also have to face up to the reality of the situation: Miss Boss and Griffin need each other whether they like it or not, so they'll clearly be sticking together. And they seem to have locked in Tarsiero by accepting his antics, so these three can't be separated—at least not in the next few hours, since you're sure Griffin won't be leaving them alone for a single second.\n\n*if (officialloyalcit = false)\n\tWhich means that if you want to stay in the majority, you need to vote with them and send Transfer home. Otherwise, if you vote with Crystalline and Transfer and force a tie against Griffin, it will be a major risk. If the public decides to eliminate Griffin in the tiebreaker, you'll be safe in the majority with Crystalline and Transfer, and Miss Boss and Tarsiero will be freed to connect with you all. However, if it doesn't go your way and Transfer is eliminated, you'll be left a sitting duck in the minority alongside Crystalline.\n\n\t*page_break\n\n\tThen again, you haven't really decided what you want from the competition past making the Final 12 to secure JK's final treatment. Do you care about staying or winning beyond that? Even if you don't, Loa Shift still has one task left for you to fulfill in the Final 12—who knows what resources or relationships you'll need to pull it off?\n*comment endif\n\n\"So what do you think, ${codenamed}?\" Griffin asks, causing everyone to settle their gazes on you.\n\nYou know that the real decision will come later tonight when you actually cast your vote, but you also know that you have to say something now, both for the Rookies and for the cameras.\n\n*page_break\n\n*if warningsysnine\n\t\"Tally ho, owl below!\" MeChip Prodigal chimes in once again.\n\t*if (officialloyalcit)\n\t\t\"Just remember, you told Crystalline and Transfer that you're in an alliance with them. It's in your best interest to stick to your word, so don't go chasing waterfalls unless you feel that you absolutely have to!\n\t\t*goto thefirstgmbtchoiceprod\n\t*elseif (officialmanipulater) or (officialfloating)\n\t\t\"Just remember, you told Crystalline and Transfer that you were considering targeting Griffin's gang. Do you mean to honor that or were you just playing the field? Whatever you really feel, it's probably best to leave your options open and continue to not make any concrete promises. Don't go chasing waterfalls unless you feel that you absolutely have to!\n\t\t*goto thefirstgmbtchoiceprod\n\t*elseif (officialtruehero)\n\t\t\"Luckily you left things ambiguous with Crystalline and Transfer, so you're free to do what you want here without breaking your word. However, remember that you promised to vote to keep the team unified and strong, so don't go changing that tune unless you feel you absolutely have to!\n\t\t*goto thefirstgmbtchoiceprod\n\t*else\n\t\t\"Luckily you left things ambiguous with Crystalline and Transfer, so you're free to do what you want here without breaking your word. Just remember, you'll probably be held accountable later for whatever you decide to say here!\n\t\t*goto thefirstgmbtchoiceprod\n*else\n\t\"Tally ho, owl below!\" MeChip Prodigal chimes in, obviously feeling the need to weigh in here. \"If my Warning System were activated, I could be of much more assistance in deciding what to do here. Still, it doesn't take a sophisticated program to tell you to follow through on what you said earlier to Crystalline and Transfer.\n\t*goto thefirstgmbtchoiceprod\n\n*label thefirstgmbtchoiceprod\n\n\"Whatever you do decide, you'll be setting expectations that will have major consequences when you cast your vote later tonight. Remember, you don't want to say the wrong thing and end up on the chopping block yourself!\"\n\nHearing these last words from Prodigal sends a jolt of nerves through your body—you hadn't even considered the possibility that the target might turn on you if you make the wrong move. So, taking a deep breath, you hope you're about to make the right move…\n\n bout Transfer. Ze might have had some trouble adjusting at first, but Transfer still really belongs here.\"\n\n\t\tYou finish speaking and swivel to cast your owl eyes over everyone, seeing immediately that they are as surprised as they are disappointed to hear your words. Griffin just looks straight-up angry, but he also doesn't want to make things worse by lashing out at you.\n\n\t\t*if officialloyalcit\n\t\t\t*set legended +2\n\t\t\t*set rlshp_griffin %-20\n\t\t\t*set rlshp_missboss %-20\n\t\t\t*set rlshp_tarsiero %-20\n\t\t\t*set rlshp_crystalline %+10\n\t\t\t*set rlshp_transfer %+10\n\n\t\t\t\"Perfectly played, chicken,\" MeChip Prodigal suddenly says, appearing with a gold star of energy in her hands and a matching halo around her head. \"Say no more!\"\n\t\t\t*goto pasummon\n\t\t*elseif officialtruehero\n\t\t\t*set rlshp_griffin %-20\n\t\t\t*set rlshp_missboss %-20\n\t\t\t*set rlshp_tarsiero %-20\n\n\t\t\t\"Escándalo!\" MeChip Prodigal suddenly cries, appearing with a red pitchfork and an opposing golden halo around her head. \"Does this mean you've decided where you stand on the vote, my true hero?\"\n\t\t\t*goto pasummon\n\t\t*else\n\t\t\t*set legended -2\n\t\t\t*set rlshp_griffin %-30\n\t\t\t*set rlshp_missboss %-30\n\t\t\t*set rlshp_tarsiero %-30\n\t\t\t*set officialsolostar true\n\t\t\t*set officialloyalcit true\n\t\t\t*set officialfloating false\n\t\t\t*set officialmanipulater false\n\t\t\t*set officialloyalgmbt false\n\t\t\t*set youblindsidetransfer true\n\t\t\t*set youblindsidetarsiero true\n\n\t\t\t\"Escándalo!\" MeChip Prodigal suddenly cries, appearing with a red pitchfork and matching devil ears. \"If your goal was to please these Rookie heroes, this was not the right tune to sing! You just flipped the archetypal script, and you're now going to be seen as more of a soloist unless you want to officially align with Crystalline and Transfer. Whatever you decide, you had better stick to one story, chicken, for you reap what you sow!\"\n\t\t\t*goto pasummon\n\t#\"I definitely want to stick with you three, which means we have the official majority alliance.\"\n\t\t*set loyalgmbt +3\n\n\t\tYou swivel your owl eyes and can tell that everyone is pleased with your words, thankfully. You turn to Griffin and find his smile beaming even brighter than usual.\n\n\t\t*if officialloyalgmbt\n\t\t\t*set legended +2\n\t\t\t*set rlshp_griffin %+30\n\t\t\t*set rlshp_missboss %+30\n\t\t\t*set rlshp_tarsiero %+30\n\t\t\t*set officialsolostar false\n\n\t\t\t\"Perfectly played, chicken,\" MeChip Prodigal suddenly says, appearing with a gold star of energy in her hands and a matching halo around her head. \"You just joined an alliance! You'll be expected to vote with them now, so I hope that's what you plan to do.\"\n\t\t\t*goto pasummon\n\t\t*elseif officialloyalcit\n\t\t\t*set legended -2\n\t\t\t*set rlshp_griffin %+15\n\t\t\t*set rlshp_missboss %+15\n\t\t\t*set rlshp_tarsiero %+15\n\t\t\t*set rlshp_crystalline %-20\n\t\t\t*set rlshp_transfer %-20\n\t\t\t*set officialmanipulater true\n\t\t\t*set officialfloating true\n\t\t\t*set officialloyalcit false\n\t\t\t*set youblindsidegriffin true\n\t\t\t*set youblindsidetarsiero true\n\n\t\t\t\"Escándalo!\" MeChip Prodigal suddenly cries, appearing with a red pitchfork and matching devil ears. \"Playing both sides, chicken? I hope you're goal wasn't to seem loyal, because joining both alliances makes you seem like more of a manipulator or floater than a loyalist! You'd better stick to that story from now on. You reap what you sow!\"\n\t\t\t*goto pasummon\n\t\t*else\n\t\t\t*set rlshp_griffin %+30\n\t\t\t*set rlshp_missboss %+30\n\t\t\t*set rlshp_tarsiero %+30\n\t\t\t*set officialloyalgmbt true\n\t\t\t*set officialmanipulater false\n\t\t\t*set officialfloating false\n\t\t\t*set officialtruehero false\n\n\t\t\t\"Escándalo!\" MeChip Prodigal suddenly cries, appearing with a red pitchfork and an opposing golden halo around her head. \"You just joined an alliance! You'll be expected to vote with them now, so I hope that's what you plan to do!\"\n\t\t\t*goto pasummon\n\t*if (officialtruehero) #\"I want to keep the Rookies as strong as possible and protect our team unity, so I'll be voting privately to keep heroes here who feel the same,\" I repeat once again.\n\n\t\tYou finish speaking and swivel to cast your owl eyes over everyone, seeing immediately that they are as surprised as they are disappointed to hear your words. Griffin just looks straight-up angry that you haven't blindly followed his lead, but he also doesn't want to make things worse by lashing out at you.\n\t\t*goto trueheroreroute\n\t#I don't say anything, because I now know what I need to do—and these three don't necessarily need to, yet.\n\t\t\n\t\tThe three Rookies await your response anxiously, but your owl eyes just watch them all squirm uncomfortably through your silence. \n\n\t\t*label trueheroreroute\n\t\t*if (officialtruehero) or (officialsolostar)\n\t\t\t*set legended +2\n\t\t\t*set rlshp_griffin %-5\n\t\t\t*set rlshp_missboss %-5\n\t\t\t*set rlshp_tarsiero %-5\n\t\t\t*set officialloyalgmbt false\n\n\t\t\t\"Perfectly played, chicken,\" MeChip Prodigal suddenly says, appearing with a gold star of energy in her hands and a matching halo around her head.\n\t\t\t*if officialsolostar\n\t\t\t\t*set youblindsidegriffin true\n\t\t\t\t*goto pasummon\n\t\t\t*else\n\t\t\t\t*goto pasummon\n\t\t*elseif (officialloyalcit)\n\t\t\t*set rlshp_griffin %-15\n\t\t\t*set rlshp_missboss %-15\n\t\t\t*set rlshp_tarsiero %-15\n\n\t\t\t\"Perfectly played, chicken,\" MeChip Prodigal suddenly says, appearing with a gold star of energy in her hands and a matching halo around her head. \"As Mama Artillery always said, if you don't have anything nice to say, don't say anything at all!\"\n\t\t\t*goto pasummon\n\t\t*else\n\t\t\t*set rlshp_griffin %-10\n\t\t\t*set rlshp_missboss %-10\n\t\t\t*set rlshp_tarsiero %-10\n\t\t\t*set youblindsidetarsiero true\t\t\n\n\t\t\t\"Escándalo!\" MeChip Prodigal suddenly cries, appearing with a red pitchfork and an opposing golden halo around her head. \"You won't make many friends this way, but at least you're keeping your options open by not making any promises. I just hope you have a plan in place, chickadee!\"\n\t\t\t*goto pasummon\n\n*label pasummon\n\nBefore you can even process what MeChip Prodigal just said, a production assistant suddenly appears poolside beside you.\n\n*page_break\n\n\"${codenamed}, Weaver needs to see you,\" the PA says. \"Right away?\"\n\nGiven the urgency of this message, you know Weaver must want to get you out of this situation quickly. Which is just as well, since it gives you the opportunity to leave things exactly where they are.\n\nAs you make your way away from the pool, you know that you might not have gotten to hear their spoken reactions, but luckily your owl eyes have told you all you need to know about Griffin, Miss Boss, and Tarsiero's feelings.\n\n\"See you all later,\" you say, waving as you follow the PA. \"I'm sure it's going to be quite the night.\"\n\n*finish NEXT CHAPTER: REAL FEEL\n", "rs_three": "*comment é x\n\n*image chap3.png center Chapter Three: Shifts\n\nYou can't remember the last time you saw JK this enthralled—seeing her this happy makes that stupid Süper experience almost worth it. Unfortunately, as StarSoar rockets off to his next destination and you make your way across the street to the clinic, JK's excitement from this first flight with her newest crush is already beginning to fade.\n\nIf you ever feel like you and JK drew a rotten lot in life, coming to the Shiftsite Clinic always makes you feel a bit luckier. There's the usual desperate Disembodied crowd assembled outside, some even camping out in a mini-tent city in the hopes of procuring treatment. Modern medicine has largely ignored Disembodied health issues, so many Powereds have nowhere to turn but here. \n\nThose gathered at the front of today's crowd are particularly grim: a man with a massively oversized head propped up by steel bars, a teenager lit permanently on fire, and an ethereal ghost girl tethered to the ground by a vibrating anchor. You used to be one of these beggars yourself, camping outside the Clinic and hoping to access treatment for JK from the infamous Loa Shift, healer of the Disembodied.\n\nNow you and JK are among the chosen, which is why you feel guilty as you push through to the front of the crowd with her. You approach the ornate front doors carved with dragons and flower blossoms, which are oddly juxtaposed with the abandoned warehouses and shipping containers lining this part of the oceanfront. Two metallic bouncers stand outside the front doors—former clients of Loa Shift herself, majestic examples of the good work she does.\n\n*page_break\n\n\"Hey Travis, Kyle,\" you say as you step up to the twin bouncers. \"We're here for JK's next treatment.\"\n\n\"You don't have an appointment,\" says Travis, the copper twin. \"Sorry.\"\n\n\"But I completed the terms that—\"\n\n\"No one sees The Great Loa without being summoned,\" Kyle the bronze twin adds, crossing his arms.\n\n\"Why did the chicken cross the road?\" JK mutters by your side. \"To get a big, fat 'I told you so.'\"\n\nIgnoring JK, you step up to the metal twins, attempting to stand your ground. Really, though, you have absolutely no idea what threat you'd pose to these two in your current frail chicken body. \n\n*page_break\n\nLuckily, before things can get ugly, the heavy wooden doors behind the twins open inward and a woman made entirely of clear glass appears, wearing her usual blue cloak-dress. \n\n[i]\"Krystal!\"[/i] \n*line_break\n[i]\"—please, we have to see—\"[/i]\n*line_break\n[i]\"—been waiting here for—\"[/i]\n\nKrystal ignores the calls from the crowd, instead whispering something to the metal twins. Whatever she says, it causes both of them to step aside and indicate that you may enter. Feeling a flush of relief, you nod a silent \"thank you\" at the twins.\n\n\"Always a pleasure, gents,\" JK says as she rolls inside behind Krystal. \"See you on the other side.\"\n\n*page_break\n\nYou follow Krystal and JK through the succulent front garden, thinking of all the time you spent outside wondering what it might look like inside this place. You were convinced for a long time that you and JK would never be deemed worthy of seeing The Great Loa, since she only takes on a few cases a year.\n\nHowever, several months ago JK's condition grew sharply worse—she had a particularly traumatic nerve-net episode and lost the use of her arms. The lingering pain from the episode was so severe that the only thing she could do for it was to stay in an epsom-salt bath all day and night. You were terrified that JK was declining into something she wouldn't recover from, and you had no idea where to turn, so you did the only thing you could: you camped outside of the Shiftsite Clinic until The Great Loa finally deemed you worthy of selection.\n\nIt seemed like a miracle, especially since Loa Shift agreed to come to your Dockerbay loft to administer the first treatment immediately. You weren't allowed to witness what happened in your bathroom that day; you were forced instead to endure JK's screams while you waited outside with Krystal. The experience was nearly unbearable, but the results were undeniable. Once Loa Shift was done, JK's nerve-net pain receded, she regained the use of her arms, and she was able to live once again outside of the salt bath.\n\nAs overjoyed as you were about this reversal, you were also consumed with anxiety. You had always heard that Loa Shift's miraculous treatments came with unusually demanding and bizarre costs. However, never in your wildest dreams could you have anticipated what Loa Shift would ask in return for JK's continued treatment.\n\n*page_break\n\nLoa Shift declared that she could do more than just restore JK to her pre-episode Disembodied state—over the course of two increasingly strenuous treatments, Loa could harmonize JK's Ani-Powers so that she could become a fully healthy Ani-Powered. It was the best news you had ever heard—until, that is, Loa Shift delivered the incredibly weird price. \n\nThe Great Loa would only administer JK's next treatment in the event that you, ${named}, made it to the Final 14 of The Hero Project's second season.\n\nWhen you asked why you had to complete this highly specific and wildly difficult task, Loa Shift claimed not to know herself, that she \"was simply an instrument for a higher order.\" There have always been rumors that The Great Loa's transformative Powers include some kind of prescient element, though no one has ever figured out whether this extra element is truly mythic or purely manipulative.\n\nWhatever the case, Loa Shift was quick to remind you that if you wanted your sister to live, the reasons for your task didn't matter. JK would soon spiral back into her former condition if left untreated, and since this was the designated cost of her cure, what choice did you have? Once you agreed, Loa Shift was able to acquire a Department for the Regulation of Powered Resources (DRPR) Hero License for you and arrange for your spot in The Hero Project general auditions. She was quite clear that the rest would be up to you. \n\nYou didn't realize what a truly insane task this was until you arrived for your audition interview. Out of thousands of heroic applicants, you had to somehow be worthy of selection as one of only one hundred Semi-Finalists. Knowing you were also under strict orders from Loa Shift not to reveal the real reason you were competing, you decided quickly how to spin your interview.\n\n*choice\n\t#I went with as much honesty as I could, sharing my personal story about bettering my little sister's life.\n\t\t*set traditional %+15\n\t\t*set public %+20\n\t\t*set usejkstory true\n\n\t\t*if (traditional > 55)\n\t\t\t*set legended +2\n\t\t\t*set rlshp_jk %+10\n\t\t\tLuckily JK's story really seemed to resonate, since you knew how to make it as relatable as possible. \n\t\t\t*goto workeditout\n\t\t*else\n\t\t\t*set rlshp_jk %+5\n\t\t\tYou struggled at first to make JK's story seem relatable to the general public, since you're not used to buying into traditional, mainstream culture. Luckily, you got the hang of it quickly.\n\t\t\t*goto workeditout\n\t#I communicated my desire to use this platform to raise awareness about Underrepresented Powereds, but I revealed as little about my personal life as possible.\n\t\t*set traditional %+15\n\t\t*set public %-20\n\n\t\t*if (traditional > 55)\n\t\t\t*set legended +2\n\t\t\t*set rlshp_jk %+20\n\t\t\tLuckily, you're used to making these issues seem relatable, so the producers really seemed to respond well. \n\t\t\t*goto workeditout\n\t\t*else\n\t\t\t*set rlshp_jk %+10\n\t\t\tYou had to force yourself to make these issues seem relatable to the producers and the general public, since you're not used to buying into traditional, mainstream culture. Luckily, you got the hang of it quickly.\n\t\t\t*goto workeditout\n\t#I don't buy into the idea that reality shows have anything to do with actual reality, so I made it clear what reality is really like for JK and me.\n\t\t*set traditional %-15\n\t\t*set public %+20\n\t\t*set usejkstory true\n\n\t\t*if (traditional \u003c 45)\n\t\t\t*set legended +2\n\t\t\t*set rlshp_jk %-10\n\t\t\tLuckily, as a proud and genuine counterculture radical, you're used to making these issues resonate.\n\t\t\t*goto workeditout\n\t\t*else\n\t\t\t*set rlshp_jk %-20\n\t\t\tYou struggled at first with how to make this story resonate with the producers, given your usual countercultural persona.\n\t\t\t*goto workeditout\n\t#I played the mystery card, revealing as little about myself as possible. I tried to seem above the entire competition, as if I were only in it to further an important secret agenda.\n\t\t*set traditional %-15\n\t\t*set public %-20\n\n\t\tYou're a private person, so you decided you'd have to use that privacy to your advantage.\n\t\t*if (traditional \u003c 45)\n\t\t\t*set legended +2\n\t\t\t*set rlshp_jk %+10\n\t\t\tLuckily, this mystery played right into your identity as counter-cultural radical.\n\t\t\t*goto workeditout\n\t\t*else\n\t\t\t*set rlshp_jk %+5\n\t\t\tThis more radical persona felt a bit forced to you at first, however.\n\t\t\t*goto workeditout\n\n*label workeditout\nWhatever you said must have ultimately been effective, because you were selected as one of the one hundred heroes to compete in the Semi-Finals. Knowing JK's future was on the line, you then obviously did what it took to fight your way into the Final 14 alongside StarSoar.\n\nNow you find yourself approaching Loa Shift's inner sanctum once again, wondering what she might ask you to do next to earn JK's third and final treatment. Krystal walks ahead of you, her glassy footsteps ringing like chimes with every step she takes. JK rolls along beside you, taking in her surroundings.\n\n\"I think our dear Loa might be confused,\" JK whispers to you, tugging on your sleeve. \"Her name is vodou-inspired, but this lair is dripping with straight-up Japanese mysticism. I mean, is this supposed to be a Haitian Hounfour or a Shinto shrine? I swear I saw a Mambo altar back there behind that—\"\n\nJK snaps into silence, however, as Krystal suddenly turns to face you, her clear limbs reflecting the light of a dozen paper lanterns. Her face is all sharp angles, making it impossible to read her expression. You had almost forgotten that this is JK's first time inside the Shiftsite Clinic—the last time you were here, you had been so distracted and panicked that you didn't notice any of the things that JK already has. That's JK for you: she is incredibly well read, and nothing gets past her, especially not with her multiple jellyfish eyes.\n\n\"The Great Loa will see you now,\" Krystal says, her voice echoing internally through her own glass body. She turns to open a pair of sliding doors, stepping aside as she motions for you to enter. \n\n*page_break\n*set meetshift true\n\nAs you and JK step into the expansive office, Krystal stays outside and pulls the doors shut tightly behind you. You are immediately hit with the smell of burning incense and you squint against the sunlight pouring through a roof that's mostly glass. Loa Shift stands in her usual spot behind her enormous oak desk, with her back turned to you.\n\nThe Great Loa wears her lavender hair tied into a bun, and when she turns to face you, two long bangs frame her leathery, purple face. The many amethyst necklaces she wears clang together as she turns, serving as the only distinguishable feature among her all-black robes. You are surprised to find that Loa Shift's face looks even more creased with age than the last time you saw her and you are struck with a thought: could the treatments she offers somehow sap her of her own youth and vitality? If that's true, it would explain why she's so selective with her cases….\n\nForcing yourself to focus, you stand a bit taller beside JK, trying to stop your heart from thundering in your chest. Since there are no chairs to sit in, you must stand before The Great Loa to once again plead your case.\n\n\"Great Loa,\" you start, attempting to pitch your scratchy chicken voice as low as it can go. \"Thank you so much for agreeing to see—\"\n\n\"Kelly,\" Loa Shift interrupts, setting her pearl eyes directly on JK. \"You will not receive your second treatment today.\"\n\n*page_break\n\n\"But I did what you asked,\" you sputter, without thinking. \"I made it to the Final 14 of The Hero Project.\"\n\n\"You have not,\" Loa Shift says, turning her piercing gaze on you. Her thin lips purse together, barely moving as she speaks. \"There soon will be what they call a 'twist' in The Hero Project. Seven 'Veteran' Finalists will return to compete against seven 'Rookie' Finalists. You are now one of the Final 14 Rookies. You must advance one round further to fulfill the terms of our agreement.\"\n\n\"Told you so,\" JK snickers at your side, though her tone betrays her attempt at humor. You know that she is probably as frustrated and disappointed to hear this as you are.\n\n\"Great Loa, forgive me, but the next Hero Project episode doesn't film for another two months,\" you try. \"JK has been experiencing nerve-net episodes again, she won't—\"\n\n\"These are the terms. You must honor them,\" Loa Shift proclaims, her chin tilted up and her hands pulled behind her back—the stance of a woman who is not used to being questioned. \"Kelly will be fine until then. I guarantee it.\"\n\nYour mind spins, trying to keep up with Loa Shift's newest declarations. Your stomach also drops—you thought you were in the clear, at least for a little while. Will JK really be okay waiting for another two months? And what are you going to have to do to make sure you survive the next elimination in The Hero Project? Most importantly, what the slugger will you do if you don't?\n\n*page_break\n\n\"Okay, so I clear the next round to make it to the real Final 14, then you administer JK's second treatment,\" you say, not even bothering to consider any alternatives. \"What will I have to do after that, to earn the third treatment?\"\n\n\"This I do not yet know,\" Loa Shift says. \"The terms will reveal themselves to me when the time comes.\"\n\nYou stare back at Loa Shift, forcing your expression to remain even. Inside, though, you can't stop your mind from racing, because this is where the lines start to get blurry. What do you make of Loa Shift's alleged precognitive Powers?\n\n*choice \n\t#I have seen proof of Loa Shift's transformative healing Powers, so why should I doubt this second set of prescient abilities? \n\t\t*set rlshp_shift %+10\n\t\t*set loabeliever true\n\n\t\tMany Powereds have sets of multiple abilities—and what sets could be more consonant than this mystic combination?\n\t\t*goto knowlook\n\t#I believe in The Great Loa as a spiritual figure, so I must also believe that she works in mysterious ways.\n\t\t*set rlshp_shift %+20\n\t\t*set loabeliever true\n\t\tMany Powereds have sets of multiple abilities, and what set could be more consonant than this mystic combination?\n\t\t*goto knowlook\n\t#Honestly, I think it's all a load of slugger.\n\t\t*set rlshp_shift %-20\n\t\t*set loaskeptic true\n\n\t\tInstead of offering her healing Powers freely, Loa Shift uses them to exploit people in need, and then she uses this pseudo-psychic nonsense as a front to further hide her true intentions. You think she is more of a mob boss than a true spiritual guru.\n\t\t*goto knowlook\n\t#I don't necessarily believe Loa Shift is truly precognitive, but I do believe she has mysterious reasons for wanting me in The Hero Project.\n\t\t*set rlshp_shift %-10\n\t\t*set loaskeptic true\n\n\t\tOtherwise, why wouldn't she just ask for money or personal service, like many of her other rumored clients?\n\t\t*goto knowlook\n\t#It doesn't matter what I believe: I'm going to do what Loa Shift wants, no matter who she truly is underneath all the mystery.\n\t\t*set rlshp_shift %+10\n\t\t*set loaskeptic true\n\n\t\tWhether her prescient abilities are real or fake is of no consequence to you, at least for now.\n\t\t*goto knowlook\n\t#JK and I will need to do some digging before I make a decision either way, to see if we can find any prior proof of Loa's Power.\n\t\t*set rlshp_shift %-10\n\t\t*set loaskeptic true\n\n\t\tDespite her considerable Disspace connections, so far JK has had trouble finding anyone who has met Loa Shift before—or at least anyone willing to admit they have. That doesn't mean you'll give up trying just yet, however.\n\t\t*goto knowlook\n\n*label knowlook\n\nEven though you make no visible sign of this judgment, Loa Shift gazes back at you with a knowing look. Could she possibly be able to sense your thoughts? Just how far do her abilities really reach? Or is she just very good at reading people?\n\n\"Why did you agree to see us, then?\" JK says, breaking the silence. \"No offense, but I assume you can send a messenger for this kind of thing.\"\n\nLoa Shift looks back at JK, her thin lips almost curving into the impression of a smirk. She obviously respects directness, and JK possesses no shortage of that.\n\n\"I have gleaned a valuable piece of information, one that is too important to communicate secondhand,\" Loa Shift says. \"Of course, I also knew that you would come here today.\"\n\nOnce again, you find yourself wondering whether Loa Shift knew this because she foresaw it, or because she's smart enough to know you and JK would come here the day after you thought you made the Final 14. You suppose you're going to have to get used to Loa Shift's blurred lines, for the time being….\n\n\"${named}, I cannot help you advance to this next stage; you must accomplish this task on your own once again,\" Loa Shift resumes. \"However, I have learned something that will help you achieve this goal. When the time comes, either you or your partner StarSoar will be chosen for the Final 14…\n\n*page_break\n\n\"The other must be eliminated.\"\n\nYour mind reels once again—is this another of Loa Shift's visions? Or does she have some kind of insider knowledge on The Hero Project? How could she possibly know this, otherwise?\n\n\"Why are you telling me this?\" you decide to ask instead.\n\n\"To advise you as best I can,\" Loa Shift answers. \"The elimination will inevitably come down to you or StarSoar, and since this is the reality, I have also uncovered the means to secure your position against him. For it appears StarSoar is not who he claims to be.\"\n\n\"Excuse me?\" you and JK say at the same time.\n\n*page_break\n\n\"StarSoar did not leave the Powered Cadet Program; he was forcibly expelled,\" Loa Shift announces, as if this were the most mundane of facts. \"StarSoar suffers from paranoid delusions. He believes that an alien invasion has befallen the earth. This is why he joined NASA in the first place, to investigate this alleged invasion, but when the truth of his delusions were revealed, he was expelled.\"\n\n\"How could he have possibly kept that secret from The Hero Project?\" you sputter, trying desperately to make sense of this supposed revelation.\n\n\"You underestimate what people are capable of hiding,\" Loa Shift says, raising her eyebrows at your own ability to keep your motivations secret in The Hero Project, no doubt. \"Mental health records are kept private as a rule, but more importantly, it is not in NASA's interest for this story to become public. StarSoar advanced rather deeply into their most elite program.\n\n\"Now StarSoar hopes to do the same in The Hero Project as he did in the Powered Cadet Program: to gain a platform to continue his doomed investigation,\" Loa Shift continues. \"His Powers are quite the gift, but it would appear they also beleaguer him with the curse of his paranoia. Of course, if The Hero Project were to learn of StarSoar's history, he would assuredly be eliminated…thus guaranteeing your own position.\"\n\n*page_break\n\nSuddenly it becomes crystal clear what Loa Shift is suggesting: she wants you to use this information against StarSoar so you can advance in his place. \n\nYou immediately think of StarSoar, your loyal partner and new friend, and can't imagine that any of this is true. Though if it somehow is, it's yet another example of someone's Powered condition putting them in a tough situation. Could you really exploit that for your own gain?\n\nOn the other hand, could you ever live with yourself if you didn't do whatever it takes to save JK?\n\nYou suppose that before any of these considerations come into play, it's most important to decide whether you even believe Loa Shift's newest tip.\n\n*choice\n\t#I don't believe this story about StarSoar. It can't be true.\n\t\t*set rlshp_shift %-10\n\t\t*set rlshp_starsoar %+10\n\n\t\tStill, what angle could Loa Shift possibly be playing by making something like this up? Could there be some element of truth to her claims, some piece that might be part of some larger puzzle? Or is it all a load of slugger?\n\t\t*goto prepra\n\t#First I must corroborate whether the rest of Loa Shift's intel is correct, especially the part about only me or StarSoar being able to advance.\n\t\t*set rlshp_shift %+5\n\t\t*set rlshp_starsoar %+5\n\n\t\tOne way or another, once you learn more you'll be able to make an informed decision about whether the rest of Loa Shift's tips are truths or fabrications.\n\t\t*goto prepra\n\t#I believe Loa Shift, as much as I might not want to.\n\t\t*set rlshp_shift %+10\n\t\t*set rlshp_starsoar %-10\n\n\t\tYou've seen firsthand how Powers can change a person, or change the way a person sees the world. Unfortunately, these changes aren't always for the best.\n\t\t*goto prepra\n\t#If this is true, then StarSoar is a danger to everyone and deserves to be removed from the competition.\n\t\t*set rlshp_shift %+10\n\t\t*set rlshp_starsoar %-10\n\n\t\tWhat is your responsibility as a fellow Underrepresented Powered? To protect StarSoar from public scrutiny? To protect the public from StarSoar's potentially harmful delusions? To protect the Underrepresented community from a potentially negative representation? There's no clear-cut answer, obviously…at least not yet.\n\t\t*goto prepra\n\t#I honestly don't know what to think.\n\t\t*set rlshp_shift %-5\n\t\t*set rlshp_starsoar %-5\n\n\t\tHopefully, once you have more information, you'll be able to make an informed decision about whether the rest of Loa Shift's tips are truths or fabrications.\n\t\t*goto prepra\n\n*label prepra\n\n\"Clearly, you have much to consider,\" Loa Shift says, passing her cloudy eyes from you to JK. \"I have much to attend to as well. However, before you go, may I offer one last insight?\"\n\nYou're not sure you can stand many more of The Great Loa's insights, but you nod your head anyway.\n\n\"If you are to succeed in your task, you must start preparing yourself for this 'reality' experience,\" Loa Shift advises. \"Preparing for the public's response as the audition episodes begin to air. For the politics you are sure to face. For the diverse cast of Powereds you must meet and overcome. Making it this far was quite a feat, I must admit, but you will need a different set of skills if you are to continue advancing.\"\n\nYou keep your eyes fixed on Loa Shift as she speaks, because you know if the situation weren't this heavy, JK would undoubtedly be singing \"I told you so\" at your side.\n\n*page_break\n\n\"In short, you must choose who you want to be, and choose wisely,\" Loa Shift concludes. \"If I were you, I would start crafting this heroic persona rather carefully…starting with a codename. And perhaps a costume.\"\n\nYou think you almost see Loa Shift smile after this, but the twitch fades almost as soon as it appears. Are you really getting PR and fashion advice from a faux-ancient mystical healer? \n\nWhatever the source, the message comes through loud and clear: you need to start taking this Hero Project experience more seriously if you're going to get what you need out of it. After all, you now realize that half of the Final 14 Rookies will be going home in the next cut to make room for the incoming Veterans. \n\n\"Don't worry, Great Loa,\" JK says, already turning her wheelchair towards the door. \"This is the part where I make myself useful. Thank you for your time.\"\n\nWith that, JK wheels herself towards the door, looking even more pained by all of this than you.\n\n*page_break TOO SOON AFTER\n\nYou stand in the dressing room of a thrift store, thankful that the mirror in here is both small and scratchy. JK insisted that you go shopping to find a costume directly after your meeting with Loa Shift. Aside from this, neither of you has said a word so far, especially not about all of the things that Loa Shift revealed.\n\nYou're supposed to be trying costume items on, but all you can do is stand still and feel frustrated—frustrated that JK didn't get her second treatment. Frustrated that you still haven't made the Final 14. Frustrated that you learned this potentially troubling news about StarSoar. Frustrated that you have so much to worry about. Frustrated that you're even in this situation in the first place…\n\nEspecially since, in your current fowl form, trying on costumes is just about the last thing you want to do. You feel bloated and ugly, plus you have no idea how to pick a costume that suits your daily transformations beyond this unfortunate chicken shape.\n\nLooking at your nearly naked body in the distorted mirror, you are at least comforted that your gender identity remains consistent through the changes.\n\n*choice\n\t#I'm female.\n\t\t*set femaled true\n\t\t*set youdze \"she\"\n\t\t*set youdhir \"her\"\n\t\t*set youdhis \"her\"\n\t\t*goto boardingtimehp\n\t#I'm male.\n\t\t*set maled true\n\t\t*goto boardingtimehp\n\t#I was assigned as male at birth, but am truly female.\n\t\t*set femaled true\n\t\t*set mtftg true\n\t\t*set youdze \"she\"\n\t\t*set youdhir \"her\"\n\t\t*set youdhis \"her\"\n\n\t\tYou've already undergone the gender confirmations (if any) you felt were necessary to become the woman you were always meant to be. Thankfully such transitions are no longer considered taboo, because slugger knows your Ani-Morpho changes give you enough normative grief. \n\t\t*goto boardingtimehp\n\t#I was assigned as female at birth, but am truly male.\n\t\t*set maled true\n\t\t*set ftmtg true\n\n\t\tYou've already undergone the gender confirmations (if any) you felt were necessary to become the man you were always meant to be. Thankfully such transitions are no longer considered taboo, because slugger knows your Ani-Morpho changes give you enough normative grief. \n\t\t*goto boardingtimehp\n\t#I was born with intersex characteristics.\n\t\t*set intersex true\n\n\t\tThankfully such characteristics are no longer considered taboo, because slugger knows your Ani-Morpho changes give you enough normative grief.\n\n\t\tPersonally, you are at ease with this element of your identity and you consider yourself to be:\n\n\t\t*choice\n\t\t\t#Male.\n\t\t\t\t*set maled true\n\t\t\t\t*goto boardingtimehp\n\t\t\t#Female.\n\t\t\t\t*set femaled true\n\t\t\t\t*set youdze \"she\"\n\t\t\t\t*set youdhir \"her\"\n\t\t\t\t*set youdhis \"her\"\n\t\t\t\t*goto boardingtimehp\n\t\t\t#Intersex.\n\t\t\t\t*goto pronounchoice\n\t\t\t#I don't identify with binary gender categories.\n\t\t\t\t*goto pronounchoice\n\t\t\t#None of these options suit me, so I'd like to enter my own vocabulary.\n\t\t\t\t*goto inyouowngenrs\n\t#I don't identify with binary gender categories.\n\t\t*label pronounchoice\n\t\t*set genderneut true\n\n\t\tGender is a spectrum with many identities--potentially as many identities as there are people. Language is imperfect thus far at naming these identities, but you try your best to find one that fits day to day.\n\n\t\tThankfully, this kind of thinking also makes it easier to cope with your ever-changing Ani-Morpho manifestations.\n\n\t\tYou've also chosen to identify with these pronouns:\n\n\t\t*choice\n\t\t\t#Ze and hir.\n\t\t\t\t*set youdze \"ze\"\n\t\t\t\t*set youdhir \"hir\"\n\t\t\t\t*set youdhis \"hir\"\n\t\t\t\t*goto boardingtimehp\n\t\t\t#They, them, and their.\n\t\t\t\t*set youdze \"they\"\n\t\t\t\t*set youdhir \"them\"\n\t\t\t\t*set youdhis \"their\"\n\t\t\t\t*set youdzedo \"do\"\n\t\t\t\t*set youdzes \"\"\n\t\t\t\t*set youdzehas \"have\"\n\t\t\t\t*set youdzeis \"are\"\n\t\t\t\t*set youdzewas \"were\"\n\t\t\t\t*goto boardingtimehp\n\t\t\t#Zhe, zhim, and zhir.\n\t\t\t\t*set youdze \"zhe\"\n\t\t\t\t*set youdhir \"zhim\"\n\t\t\t\t*set youdhis \"zhir\"\n\t\t\t\t*goto boardingtimehp\n\t\t\t#I'm still comfortable using she and her.\n\t\t\t\t*set youdze \"she\"\n\t\t\t\t*set youdhir \"her\"\n\t\t\t\t*set youdhis \"her\"\n\t\t\t\t*goto boardingtimehp\n\t\t\t#I'm still comfortable using he, him, and his.\n\t\t\t\t*goto boardingtimehp\n\t\t\t#I'd like to input my own pronouns.\n\t\t\t\tInstead of he, she, or they, I prefer:\n\n\t\t\t\t*input_text youdze\n\n\t\t\t\tInstead of him, her, or them, I prefer:\n\n\t\t\t\t*input_text youdhir\n\n\t\t\t\tInstead of his, her, or their, I prefer:\n\n\t\t\t\t*input_text youdhis\n\t\t\t\t*goto boardingtimehp\n\t#None of these options suit me, so I'd like to enter my own vocabulary.\n\t\t*label inyouowngenrs\n\t\tYou identify as:\n\t\t*input_text genderinputrs\n\t\t*goto pronounchoice\n\n*label boardingtimehp\n\nYou're pulled from your mirrored daze, however, as JK returns with another pile of clothes. You're barely able to throw on some pants before JK pulls back the curtain and starts chattering through slips of a SlugGlug she must have had stashed somewhere in her wheelchair.\n\n\"Here are some more options. This place has way more than I thought it would, not that I'm any great fashionista. Anyway, I already scoured The Hero Project MeBlogs while I was browsing, and it looks like Loa Shift is right about this whole Veterans twist. I found tons of shadow posts about it once I knew where to look. We can't be sure how or why Loa Shift knows this, but it does seem to be true.\"\n\nAs this grim thought settles, all you can think is: What else might Loa Shift be right about?\n\n*page_break\n\n\"So after you pick your costume, I think we should go back and start watching the first season of The Hero Project together from the beginning. That way we can start to flag who these potential Veterans might be and cross-reference them against the shadow post rumors. Plus, you said you saw the other twelve Rookies besides you and StarSoar who advanced to the Final Selection, right? I know you signed a stack of nondisclosure agreements taller than me, but we should still try to figure out who your competition will be, in secret, between the two of us.\"\n\nJK talks a mile a minute, throwing even more ridiculous neon clothing onto your pile as she downs the SlugGlug in another wild gulp.\n\n\"This is all stuff we'll hav
