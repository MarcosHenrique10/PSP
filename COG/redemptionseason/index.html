ering how to say this without breaking any rules. Instead, she holds up her MeChip and activates holo-projection mode, showing you a stack of MeMessage fan mail and a series of pictures—all featuring different Disembodied, Ani, and Morpho-Powereds displaying different versions of the same tattoo:\n\nYour ${triquetra} symbol.\n\n\"Let's just say you're right about not being able to go back to our old lives,\" JK says. \"Because The Hero Project has made you very, very famous.\"\n\n*page_break\n\nYou struggle at first to understand JK's words alongside these images. You've been locked in such a bubble here on The Hero Project, closed off from the outside world and focusing on Loa Shift's missions, that you hadn't really given much thought to the public's reaction to the show. The idea that you and these Finalists you've met are all now celebrities is…mind-blowing.\n\nIt also explains why JK is so hung up on the impact of your actions. If you really have become famous, you may be the only positive Ani-Powered figure in popular culture—and certainly the only visible Disembodied and Morpho-Powered figure. You think back to when you were growing up, how if you had someone in the public eye to look up to, it might have changed your entire perception of what was possible for you. Could you really be that person for others? Do you even want to be?\n\nThen it occurs to you: more than any pop culture force you've ever seen, The Hero Project has stood for bringing together Powereds of all different backgrounds to fight for a common cause. There may still be a lot wrong with the show that needs fixing, and the bad may ultimately outweigh the good, but everyone here seems to at least be committed to making the right kind of changes. \n\nSo, perhaps for the first time, you find yourself proud to be a part of The Hero Project, at least in this moment.\n\n*page_break\n\n\"${named}, what are we going to do about The Voiceless?\" JK then asks, the desperateness in her voice snapping you back into reality—and making you wonder if these kinds of mood swings are going to be the new norm for JK. \"I know I should hate The Voiceless, especially as an Ani-Powered, but I just can't. The Disembodied in me knows how they must have felt, what they must have gone through. And their methods might be awful, but I understand how they were pushed that far. All they wanted was respect. And so much of what they believe about how society needs to change…slugger help me, I agree with them.\"\n\nJK looks pained, like she hasn't had a chance to talk about this off the record with anyone she can trust. Suddenly you realize that you feel the same exact way.\n\n\"But how do we stop them without making things so much worse for Disembodied and Ani-Powereds too?\" JK asks, looking genuinely lost. \"Who are we supposed to side with in all of this?\"\n\nYou hear JK's last question and immediately think: this is yet another reminder why your new mission is so important. So you set your eyes on JK's once again, knowing exactly what to say.\n\n\"We shouldn't have to decide who to side with, because there should be no sides to begin with. That's what the rest of my time on The Hero Project has to be about.\"\n\nAnd given how famous you seem to be now, how you represent yourself is going to be equally important. You decide here and now, in order to achieve your ultimate goal:\n\n*choice\n\t#I need to remain as transparent and honest about my personal life as possible moving forward. \n\t\t*set public %+30\n\n\t\t\"In that case, consider me your official MeChip microphone, chicken!\" MeChip Prodigal appears to congratulate you, holding a giant megaphone. \"Prodigal here, ready to help with all your broadcasting needs!\"\n\n\t\t*if (public > 70)\n\t\t\t*set legended +2\n\t\t\t*set upa +25\n\t\t\t*achieve publicfinal\n\t\t\t*goto upafinaltime\n\t\t*else\n\t\t\t*set upa +15\n\t\t\t*goto upafinaltime\n\t#I need to stand for the issues first and not let any representations of my personal life, true or false, cloud this message.\n\t\t*set public %-30\n\n\t\t\"In that case, consider me your official MeChip mask, chicken!\" MeChip Prodigal appears to congratulate you, covering her face. \"Prodigal here, ready to help with all your iconic privacy needs!\"\n\n\t\t*if (public \u003c 30)\n\t\t\t*set legended +2\n\t\t\t*set upa +25\n\t\t\t*achieve privatefinal\n\t\t\t*goto upafinaltime\n\t\t*else\n\t\t\t*set upa +15\n\t\t\t*goto upafinaltime\n\t#I need to make sure the truths behind everyone's stories are told: Miss Boss, Transfer, StarSoar, The InfraCircle's Ani-victims, and even The Voiceless themselves.\n\t\tAnd potentially every other Powered who has struggled and shouldn't have to struggle anymore.\n\n\t\t\"In that case, consider me your official MeChip microphone, chicken!\" MeChip Prodigal appears to congratulate you, holding a giant megaphone. \"Prodigal here, ready to help with all your broadcasting needs!\"\n\n\t\t*set legended +1\n\t\t*set upa +15\n\t\t*if (public > 50)\n\t\t\t*set public %+15\n\t\t\t*goto upafinaltime\n\t\t*else\n\t\t\t*set public %-15\n\t\t\t*goto upafinaltime\n\n*label upafinaltime\n*if (upa > 50)\n\t*achieve upafinal\n\n[i]Thanks, MeChip Prodigal[/i], you think, finally seeming to get the hang of this mental command function—and very happy to have an ally like MeChip Prodigal on your team.\n\n\"Are you okay?\" JK then asks, looking curious as she remains standing on her own two feet before you. \"You look…different.\"\n\n\"Look who's talking,\" you answer, knowing that JK doesn't really mean your current leopard spots—you must be wearing this decision plainly on your face. \"I'm more than okay, because we're going to make things right.\" \n\nSince The Slaughtering, you had been dreading all of the things to come. But now? You suddenly find yourself energized by all there is left to do: winning The Hero Project, strengthening your bonds with the Rookie Finalists, building new bonds with the Veteran Finalists, carrying out your new mission statement, avenging Miss Boss's sacrifice, dealing with The Voiceless, encountering the InfraCircle…\n*if weaverfeelingsattempt\n\tand getting closer to Weaver.\n*if transferintimatelounge\n\tand getting closer to Transfer.\n*if griffinromancescene\n\tand learning what's up with Griffin.\n*comment endif\n\nThinking of all you have left to do, you only have one response left for JK, one you deliver with a wide smile on your face:\n\n\"They are so not ready for this, Jelly.\"\n\n*page_break EPILOGUE: THE NIGHT SHIFT\n\n*image epilogue.png center Epilogue: The Night Shift\n\n\"They are coming.\"\n\nAt first you think the voice is from your dreams. Then you realize it belongs to Loa Shift and you open your eyes to find JK already sitting up in her bed…\n\nStaring at another apparition of Loa Shift floating in the middle of the room, wax dripping off her translucent body once again like a living, melting candle.\n\n*if (rlshp_shift > 50)\n\tSeeing Loa Shift again, you feel an odd combination of excitement and trepidation. The Great Loa may have delivered on all of her promises, but you know by now that these promises always come at a cost. What could she possibly want from you now? \n*if (rlshp_shift \u003c= 50)\n\tSeeing Loa Shift again, you feel like screaming. Your debt has been paid, your obligation is fulfilled. Loa has wreaked enough havoc in your life—what more could she possibly want!?\n\n*page_break\n\n\"I was blinded before, but now I see,\" Loa Shift continues speaking, her voice sounding unusually leaden. \"The true reason I was told to place you in The Hero Project has finally been revealed to me. \n\n\"As the nation's first line of defense, The American Protectorate will soon face an overwhelming and devastating foreign threat. \n\n\"And now I see that if you, ${codenamed}, are not there to aid The American Protectorate against this threat, if you do not win this season of The Hero Project… \n\n*page_break\n\n\"The world as we know it will end.\"\n\n[i]What the slugger?[/i]\n\nAll the usual questions flood your mind about Loa Shift's mandates, but you ignore them to focus on one solid truth: whatever her motivations or abilities or deceptions, Loa Shift's \"predictions\" have never been wrong, no matter how seemingly dramatic or outlandish.\n\nIf this \"devastating foreign threat\" is real, does it have to do with The Voiceless or The InfraCircle, or this Infinitum enemy The Millennial Group faces? Or will it be something else, something truly…foreign?\n\nThis immediately makes you think of StarSoar and your stomach drops into your feet. Considering his own \"delusional\" warning about one particular foreign threat, you are suddenly filled with an inescapable fear—one that makes you nauseous to your core. \n\n*page_break\n\n\"The American Protectorate will find itself at the center of this ominous threat,\" Loa Shift says, her face melting away with the dripping wax. \"And if we are all to survive, you, ${codenamed}, must find yourself at the center of The American Protectorate.\n*if (rlshp_shift > 50)\n\t*achieve loaclueone\n\tBut beware, for someone inside The Hero Project will do all they can to stop you from rising.\"\n*if (rlshp_shift \u003c= 50)\n\t*achieve loacluetwo\n\tThe voices from beyond revealed only this to me.\"\n*comment endif\n\nAs Loa Shift finally drips into a puddle of human wax, she once again leaves far more questions than answers quaking in her wake.\n\n*choice\n\t*if (rlshp_shift > 50) #Wait, who in The Hero Project could want to take me down? \n\t\t*goto didnneetan\n\t*if (rlshp_shift \u003c= 50) #Hearing voices? Wait, like the voices StarSoar claimed to hear?\n\t\tCould this be how The Great Loa knew about StarSoar to begin with? If that's true, what makes him delusional and not her? \n\t\t*goto ssapolog\n\t#I have to believe Loa Shift. What other choice do I have?\n\t\t*goto didnneetan\n\t#I will dismiss this warning as nothing but further manipulation—Loa Shift just wants a famous hero in her pocket.\n\t\t*goto didnneetan\n\t#I just want to speak to StarSoar, after all this.\n\t\t*label ssapolog\n\n\t\tIf there is even the slightest chance StarSoar might not suffer from delusions, you need to find him, for so many reasons.\n\t\t*if (ssprove = false)\n\t\t\tThough the most important one would be to apologize for what you've done.\n\t\t*goto didnneetan\n\n*label didnneetan\n\nYou didn't necessarily need another reason to stay in The Hero Project and win your spot on The American Protectorate, but whether you like it or not, The Great Loa may have once again added a reason to your list. You felt so grounded before—should you really let Loa Shift shake you once again?\n\nAll of your questions quickly boil down to one realization, especially as you lock eyes with JK.\n\nLoa Shift can't shake you, because you plan to win The Hero Project anyway, no matter what.\n\nIn the face of any lingering uncertainty, all you can think is: [i]Bring it on.[/i]\n\nYou're ready to win The Hero Project. \n\n*page_break FAR FROM THE END\n\nMake sure to save your game below! You'll need your saved game to continue where you left off in the next episode.\n\n*save_game save_redemptionseason\n\n*check_achievements\n*if (legended > 60)\n\t*achieve legendcatfour\n\t[i]Congratulations, ${codenamed}—for achieving an exceptional Legend Level of ${legended}, you have permanently unlocked a Legend Guide, which lists the decisions necessary to achieve a perfect Legend score.[/i]\n\t*goto legendguide\n*elseif (legended > 45) or (choice_achieved_legendcatfour)\n\t[i]Congratulations, ${codenamed}—for @{(legended > 45) achieving an above-average Legend Level of ${legended}|having previously achieved an exceptional Legend Level}, you have unlocked a Legend Guide, which lists the decisions necessary to achieve a perfect Legend score.[/i]\n\t*goto legendguide\n*else\n\t*goto authornote\n\n*label legendguide\n\n[i]Use this information wisely![/i]\n\n*page_break LEGEND GUIDE\n\n[b]THE HERO PROJECT:[/b] [i]REDEMPTION SEASON[/i] \n*line_break\nPERFECT LEGEND GUIDE\n\n[b]General Tip:[/b] In Heroes Rise, you are rewarded for sticking to your ideals. If trying to earn a high Legend Level, make sure to remain consistent once you decide what kind of hero you want to be.\n\n[b]General Tip:[/b] The MeChip Warning System is designed to alert you to which Stat will be most important in each choice. Purchase (or unlocking in-game) is recommended for best outcomes.\n\n[b]Chapter One:[/b] Automatic Legend bump for entrance into The Hero Project. [i](Legend High: 5)[/i]\n*line_break\n[b]Chapter One:[/b] When fighting the rabbit/rat duo, make sure to take note of whether your choice uses Physical & Intangible Powers and/or Offensive & Defensive. Then, when fighting Fistfull, be sure to choose an attack style that is consistent (each choice indicates one Stat strength). [i](Legend High: 7)[/i]\n*line_break\n[b]Chapter One:[/b] When deciphering the pod puzzle, be sure to use your hawk-eyes to solve the puzzle if high Intangible, or to fly with your wings if high Physical. [i](Legend High: 10)[/i]\n\n[b]Chapter Three:[/b] When explaining your audition interview strategy, choose an option to buy into the process if Traditional or play against the process if Radical. [i](Legend High: 12)[/i]\n*line_break\n[b]Chapter Three:[/b] When deciding what The Hero Project means to you, match your Societal or Personal Stats. [i](Legend High: 15)[/i]\n\n[b]Chapter Four:[/b] Automatic boost for exposure on The Hero Project [i](Legend High: 20)[/i]\n*line_break\n[b]Chapter Four:[/b] When choosing your costume, go dark if Private and bright if Public. [i](Legend High: 21)[/i]\n*line_break\n[b]Chapter Four:[/b] When mingling with the Rookies, be sure to be nice if you're Respected and intimidating if you're Feared. [i](Legend High: 22)[/i]\n*line_break\n[b]Chapter Four:[/b] When deciding what to do about StarSoar, go public or blackmail if you have Personal priorities, or warn in secret if you have Societal priorities. [i](Legend High: 25)[/i]\n*line_break\n[b]Chapter Four:[/b] If you navigate the Semi-Finals and the StarSoar choice in Chapter One correctly, according to your Statistic strengths, you will have a Leaderboard score high enough to be called as the fourth Rookie Finalist. [i](Legend High: 30)[/i]\n\n[b]Interlude One:[/b] Choosing the Leaderboard viewer reward will help guarantee more Legend later.\n*line_break\n[b]General Tip:[/b] If you have a strong relationship with the Producers (by following your Public & Private Stat strengths), you will have the opportunity to add a few potential missing Legend points or adjust one Stat to a more desired level, if not there already.\n\n[b]Chapter Five:[/b] In the trio of simultaneous battles, one Legend point awarded for playing to each Statistical strength. The MeChip Warning System alerts which Stats matter throughout: Transfer focuses on the balance between Fighting & Powers, Griffin and Miss Boss focuses on playing to your existing relationship level, and Tarsiero focuses on Defensive & Offensive strengths. [i](Legend High: 33)[/i]\n*line_break\n[b]Chapter Five:[/b] When reacting to the camera orbs after discovering the Ani-cides, be sure to rely on your Public & Private Stat strengths. [i](Legend High: 35)[/i]\n\n[b]Chapter Six:[/b] Make sure to get a Leaderboard score higher than 75 in Chapter Five to tie for high-score Immunity and gain the most Legend. Following the Guide and the MeChip Warning Tips should help you to achieve this. [i](Legend High: 45)[/i]\n*line_break\n[b]Chapter Six:[/b] When talking about the vote with Crystalline and Transfer, make sure to choose a response that builds upon a political type with at least 1 existing point. MeChip Prodigal's Warning System helps with the specific pathways. [i](Legend High: 46)[/i]\n*line_break\n[b]Chapter Six:[/b] When responding to Griffin, make sure to follow through on the political agenda you set with Crystalline and Transfer. MeChip Prodigal's Warning System helps with the specific pathways. [i](Legend High: 48)[/i]\n\n[b]Chapter Seven:[/b] When choosing whether to let the cameras film JK, make a decision in line with your Public & Private Stat. [i](Legend High: 51)[/i]\n*line_break\n[b]Chapter Seven:[/b] When reacting to the InfraCircle, choose the option that best represnts the intersection of your Societal & Personal and Traditional & Radical Stats. [i](Legend High: 54)[/i]\n*line_break\n[b]Chapter Seven:[/b] Cast your vote based on whatever political agenda you set in Chapter Six. MeChip Prodigal's Warning System helps with the specific pathways. [i](Legend High: 60)[/i]\n\n[b]Chapter Eight:[/b] When deciding how you feel about your game-changer title, match your Feared & Respected Stat perception. [i](Legend High: 61)[/i]\n*line_break\n[b]Chapter Eight:[/b] Achieve a perfect Leaderboard score in Chapter Eight for the highest Legend bump in Interlude Two. Keep track of the Animal Scrawls to solve the maze, and play to your Statistical strengths in battle scenarios. As always, MeChip Prodigal's Warning System helps with this. Also, be sure to choose a Miss Boss outcome that matches your Personal or Societal motivations.\n\n[b]Interlude Two:[/b] Automatic Legend gain based on Leaderboard score (5 Legend) and decrease based on public perception (10 Legend). [i](Legend High: 56)[/i]\n*line_break\n[b]General Tip:[/b] If you have a strong relationship with the producers (by following your public Stat strengths), you have the opportunity to add a few potential missing Legend points or adjust one Stat to a more desired level, if not there already.\n\n[b]Chapter Nine:[/b] Automatic Legend boost based on matching Miss Boss choice to Societal or Personal motivations. [i](Legend High: 60)[/i]\n*line_break\n[b]Chapter Nine:[/b] When choosing your motivations for winning The Hero Project, choose based on your Public & Private Stat strengths. [i](Legend High: 62)[/i]\n*line_break\n[b]Chapter Nine:[/b] When setting your final goal concerning The InfraCircle and The Voiceless, choose the option that matches the intersection of your Traditional & Radical Stats (Societal & Personal are also important for final Achievement Status). [i](Final Legend High: 65)[/i]\n\n*page_break \n*goto authornote\n\n*label authornote\n\nWe hope you've enjoyed playing [i]The Hero Project: Redemption Season.[/i]\n\n*feedback\n\n[i]A note from the author of The Hero Project:[/i]\n\nHero Risers, here we go again!\n\nFor all you returning readers, thanks so much for sticking with us on this new Heroes Rise journey. And for all you new readers, welcome to the club! I'm so thrilled to be able to explore a new corner of the Heroes Rise universe with you, one that means a great deal to me given all the challenges we face in the world today.\n\nThis new Heroes Rise series exists for one reason and one reason only: because all you Hero Risers out there read the novels and spread the word. Seriously, we've got no marketing machine here at Heroes Rise—just a few interactive novels and some seriously awesome fans.\n\nIf you want to keep adventuring in Millennia City, keep doing what you're doing: read, leave those good reviews, tell your friends, post, share, like, tweet, and keep on supporting Heroes Rise. Our projects rely almost entirely on word of mouth and the support of our fans, so five-star reviews mean everything! \n\nAlso make sure to get in touch with us via email and the Heroes Rise social-media pages, which can be found in the ABOUT tab on your homescreen or by visiting: \n\n*link_button https://www.facebook.com/HeroesRise Heroes Rise Facebook\n*link_button https://twitter.com/TheHeroesRise Hearoes Rise Twitter\n\nWe've got all kinds of cool stuff posted there, including Bonus Strategy Guides, News and Stories from Millennia City, incredible Fan Art, Discussion Threads, Contests, and much, much more.\n\n*check_purchase youpower\n*if choice_purchased_youpower\n\tFinally, you've already purchased [i]The YouPower Project[/i] by Michael Alan Nelson, also set in the Heroes Rise universe. You can read it now, or you can return to the game.\n\t*choice\n\t\t#Skip it this time.\n\t\t\t*goto youpowerskip\n\t\t#Read it now.\n\t\t\t*goto_scene youpower\n\n*page_break\n*label youpowerskip\n\nWith your continued support, the next book in The Hero Project series should be out early next year. In the meantime, make sure to check out my other Choice of Games series, VERSUS (and look out for Book 2, VERSUS: The Elite Trials, coming later this year).\n\n*link https://www.choiceofgames.com/versus-the-lost-ones/ VERSUS: The Lost Ones\n*line_break\n[b]By Zachary Sergi[/b]\n*line_break\n[i]After being exiled to a sacred intergalactic prison planet, you must survive the deadly VERSUS competition in order to find the legendary lost warrior capable of saving your home planet[/i].\n\nThanks so much again and hope to see you all again next time, Hero Risers!\n\nAll Best,\n*line_break\n*link https://twitter.com/zacharysergi Zachary Sergi\n*line_break\n[i](Codename: Intersect)[/i]\n\n*ending\n", "rs_one": "*comment é x\n\n*text_image chap1.png center Chapter One: Deep Throw\n\nYou have no idea what to expect next, but that's nothing new for you. Instead, you focus on the immediate things: the morning dew sloshing on the grass underneath your boots, the sun shifting into position above you, the gleam reflecting off of the enormous Ferris wheel in the distance. You bet that's going to be your first challenge: beating out the dozens of Powered heroes who have gathered here to gain access to that behemoth. Who knows what they'll want you to do once you get inside…if you get inside.\n\nBut you quickly erase any trace of \"if\" from your mind—there can be no doubt for you, not today. You have to win. You don't have any other option.\n\nSo you look to your left, where a row of contestants stretches across the open field, a sea of flexing supermuscles, whining turbines, and crackling energy. To your right is more of the same: the nation's boldest and brightest, assembled to tear each other apart for their one big shot.\n\nYou're not here for that, though—at least not like everyone else. You're here because your little sister's life depends on it. Fail today and she will die, plain and simple.\n\nWhich is why you're going to win.\n\n*page_break\n\n\"There are one hundred of you gathered here today, selected as the best of the best from our national auditions,\" a smooth voice suddenly announces. \n\nYou crane your neck up to find a holographic image hovering in front of you, duplicated several times down the row of contestants. The holo-image depicts a handsome man wearing a suit, his face animated as much as its altered plasticity will allow.\n\n\"By the end of today's Semi-Finals, only fourteen of you will remain,\" the host announces, his voice filled with manufactured suspense. \"As you know, you've all been paired into teams of two and will partake in an astonishing race. Each round, the slowest teams will be eliminated, until only seven teams are left standing.\"\n\nYou look to your right, where your own partner stands. His face is mostly obscured by his sleek astronaut helmet, but you can still see that he nods at you, as if to say, \"we've got this.\" You nod back—you may have only recently met this StarSoar guy, but luckily you've already become fast friends.\n\n*page_break\n\n\"In Round One, your task is simple,\" the host continues, commanding your attention. \"Race across this open field to the newly constructed MillenniWheel. There are twenty available pods that will hold two teams each, which means that the last ten teams to arrive will be eliminated. So you'd better make sure you get there by. Any. Means. Necessary.\"\n\nAs the host finishes, a fleet of floating camera orbs descends to film the proceedings. One of the melon-sized orbs hovers between you and StarSoar, serving as a potent reminder that this is all for America's number-one reality show. What you do will soon be seen by millions of viewers—if you're lucky, that is. You know that part of your success here will depend on being somehow worthy of attention.\n\nFortunately, you look pretty slugging awesome today, though you know all too well that it's not always like this. You have the unique ability to wake up every day with a different Animalistic Power set, but these transformations are not under your control. Some days your Power manifestations can be useless or jarring or downright ridiculous, but today you find yourself in half-hawk mode. Currently, your favorite change is:\n\n*fake_choice\n\t#The set of impressive wings that crease my back.\n\t\tThe wings hurt like hell coming in\n\t\t*goto likehellcom\n\t#My eyes, which are now speckled amber with multispectral vision.\n\t\tThe eyes burned like hell as they developed\n\t\t*goto likehellcom\n\t#The talons hidden underneath my fingernails, ready to unsheathe when I need them.\n\t\tThe talons hurt like hell coming in\n\t\t*goto likehellcom\n\t#The fact that these were the only changes today, so I look completely human otherwise.\n\t\tThe wings hurt like hell coming in\n\t\t*goto likehellcom\n\n*label likehellcom\nearlier this morning, but at least you didn't grow a beak this time—those are twice as painful and always end up obscuring your face. You never know what your Powers will bring on a daily basis, but today they did you justice. \n\nWhich means that you and StarSoar are going to crush this. \n\n\"You're all about to enter this nation's most prestigious competition, The Hero Project,\" the host continues, clearly gearing up for the end of his speech—and causing your muscles to strain from your pent-up adrenaline. \"Now only one question remains…\n\n\"How high will you rise?\"\n\n*set legended +5\n*page_break\n\nApparently understanding that this somehow means \"Go,\" StarSoar bursts forward in an explosion of blue thrust, instantly living up to his name. You flap your wings and shoot forward with surprising speed, your avian eyes protected under transparent eyelids as you keep pace with StarSoar. \n\nYou break in front of the pack and follow StarSoar's lead as he climbs high into the sky, obviously hoping to soar above the fray. Despite your speed, you can already see that you're going to be targeted—directly below you, a pair of rabbit and rat Ani-Powered human hybrids leap and scramble forward. Knowing what comes next, you try to flap faster to outfly the furry duo, but you watch as the rat-man latches onto the back of the rabbit-woman. She then pumps her rabbit legs, and the pair leap into the sky towards you, their teeth and claws bared.\n\nUnfortunately, you're all too used to this kind of Ani-discrimination. On your bird days, rodent and reptile Ani-Powereds always end up harassing you. Ani-order rivalries run deep, especially where you're from. That's okay, though, because today…\n\nYou're the predator.\n\n*choice\n\t#Once the duo get close enough, strike them with my talon-hands. (Power Cost 10)\n\t\t*set defensive %-10\n\t\t*set physical %+10\n\n\t\tYou pretend not to see the approaching attackers until the last second, when you flick your human fingers forward and unsheathe hooked talons. \n\n\t\tJerking left, you spin around and use your momentum to slash at the duo. Their rodent reflexes make them fast enough to dodge your swipe, but this still forces them to uncouple and lose their momentum.\n\t\t*goto afterfurry\n\t#Knock them out of the sky with a sonic screech. (Power Cost 10)\n\t\t*set defensive %-10\n\t\t*set physical %-10\n\n\t\tOnce the duo have leaped close enough, you jerk left and spin around to face them. Opening your mouth wide, you scream at the top of your lungs, unleashing an invisible beam of sonic screeching force.\n\n\t\tYour vocal blast lands directly in the spot where the rat-man clings to the rabbit-woman's back, forcing them to uncouple and lose their momentum.\n\t\t*goto afterfurry\n\t#Grab the duo and fly them higher, then drop them to the ground helplessly. (Power Cost 10)\n\t\t*set defensive %+10\n\t\t*set physical %+10\n\n\t\tYou pretend not to see the approaching attackers until the last second, when you flick your human fingers forward and unsheathe hooked talons. \n\n\t\tJerking left, you spin around and reach out to hook into both opponents. Catching them off guard, you flap your wings fiercely upward, pulling the rabbit-woman and rat-man with you. Then, before either of them can react enough to fight back, you let go.\n\t\t*goto afterfurry\n\t#Stare them down with my hawk intimidation. (Power Cost 10)\n\t\t*set defensive %+10\n\t\t*set physical %-10\n\n\t\tYou jerk left and spin around to face the duo, narrowing your hawk-eyes with a look of pure intensity. The duo can't help but meet your gaze, and you see it immediately: a primal fear sparks their animal instincts.\n\n\t\tThis intimidation distracts the duo just long enough for them to lose their focus, which in turn causes them to lose the momentum of their airborne attack.\n\t\t*goto afterfurry\n\n*label afterfurry\n*set power -10\n\nYou watch for a moment as the rabbit-woman and rat-man tumble helplessly back towards the earth, fighting your own animal urge to swoop down for their broken bodies. Instead, you swivel back to resume your flight pattern.\n\n\"Alert. You have used 10 Power. You have raised your \n*if (defensive \u003c 50)\n\tOffensive\n\t*goto physinttest\n*else\n\tDefensive\n\t*goto physinttest\n\n*label physinttest\n*if (physical > 50)\n\tand Physical Power Use\n\t*goto physinttestend\n*else\n\tand Intangible Power Use\n\t*goto physinttestend\n\n*label physinttestend\nStats,\" an automated voice sounds in your head. You know that this voice belongs to your MeChip assistant, or at least the temporary one assigned to you for the Semi-Finals. \n\n*if newreader\n\tWhile mostly everyone these days has a MeChip—tablet technology embedded in the underside of their wrists—not everyone can afford full functionality. You're sure the other contestants are used to more dynamic personalities and advanced features, but today the playing field has been leveled because everyone has been provided with the same MeChip Warning System generic personality. Since you aren't used to this guided tutorial function, you plan to listen to all of the insights and advice offered by the nonvisual assistant.\n*if trilogyreader\n\tYou're sure the other contestants are used to more dynamic personalities and advanced features, but today the playing field has been leveled because everyone has been provided with the same generic, nonvisual personality in their MeChip Warning System.\n*comment endif \n\n*page_break\n\nRefocusing on the task at hand, you resume flight beside StarSoar, who has just plowed through a team of contestants who were trying to rise above the race in a lightweight, neon bubble. You're happy to have a partner as impressive as StarSoar—he is basically a human comet, hurtling forward in a streak of howling contrail. He also told you that his sleek white-and-blue astronaut exoskeleton keeps him protected from harm, so he can use his body like a living asteroid. Apparently NASA made the suit for him before he left the Powered Cadet program to pursue his heroic dreams. \n\nThat's the level of talent you're up against in The Hero Project—people who thought being a slugging astronaut wasn't challenging enough. Meanwhile, you're a nobody, forced into being here to save your sister. What chance could you possibly stand?\n\nThen you remind yourself that your Powers are currently allowing you to keep up with StarSoar, pushing you to the front lines in this first round. So maybe you actually do stand a chance at this, despite the odds?\n\n*page_break\n\nThough you're reminded of these odds once again as two twenty-something heroines suddenly ride to the front of the pack on a wave of pink energy, trailed by no less than five camera orbs. You're very used to the world paying attention to traditional-looking Powereds like them instead of Ani-Powereds like you, so you suddenly find yourself wondering: is that what the producers are really looking for here? \n\nOne of the heroines wearing a pink fabric headband generates the wave of energy effortlessly, an easy smile on her face. Her partner, a dark beauty wrapped in a black-and-maroon spandex bodysuit, pulls off streams of the wave energy and balls it between her palms.\n\nThe heroines catch up to another team across the field—a short, skinny guy in oversized goggles riding on the back of a triple-wide set of conjoined triplets who leap in great, unison bounds. The goggled guy spots the oncoming heroines and projects an image from his lenses overhead: a white flag waving above a peace sign. He nods at the duo excitedly as they race alongside, sending them a thumbs-up.\n\nWithout hesitating, the spandex heroine tears loose a stream of energy from her partner's wave and pummels the triplet-man with pink force. He and the goggle-guy are immediately sent reeling, tumbling so awkwardly that the conjoined triplets separate, bouncing off of each other like human ping-pong balls. Helpless, the goggle guy face-plants hard before being trampled underfoot by the surge of racing contestants. The heroines then speed forward over the fallen team without a second glance and you can't help but wince—that was a seriously humiliating wipeout.\n\n*fake_choice\n\t#I usually identify as one of those less cool-looking heroes, so I wish I could swoop down and help them.\n\t#Given the fact that my appearance today makes me look more like one of those shining idols, I suppose I should withhold judgment on any other heroes.\n\t#I'm going to do whatever it takes to win today, so I'd better get used to ruthlessness and attention-seeking. \n\t#I just shake this sight off and redouble my focus on flying.\n\nNo matter what, you can't afford for a wipeout like that to happen to you, so you divebomb a bit lower to kick up your speed. Veering underneath StarSoar, you figure that you must be going at least seventy miles per hour—certainly fast enough to outrun the grisly scene below.\n\nAs the Ferris wheel finally veers into focus, you start to pull upwards and slow down for your approach. Looking up, you see that StarSoar is beginning to flame out above you. He seems to have only one speed setting: full throttle. Nodding at him, you drift until the last sparks of sapphire thrust die out and StarSoar drops down onto your winged back.\n\n\"Excellent observation, friend!\" StarSoar shouts down at you, patting you on the shoulder. \"I believe it might benefit us to aim for one of the pods at the apex of the wheel, to grant us the best vantage point.\" \n\n\"On it,\" you shout back up at StarSoar, your voice coming out with an unintended squawk. Ignoring this, you aim towards a pod at the very top of the wheel, realizing that the height will further separate you from the rest of the Semi-Finalists, since most of them seem to be aiming for the lower pods.\n\n*page_break\n*set lb +20\n\nYou glide into the highest pod without any further interruption, setting StarSoar down next to you. Inside, you see that the pod's bottom half is made of smooth, seamless silver that gives way to an entirely glass top half, which provides spectacular 360-degree views of Millennia City. The egg-shaped pod is bigger than you expected, too—it could probably fit about twenty people, so you wonder why only two teams are allowed per pod….\n\nYou're distracted from this thought as StarSoar holds out his hand, a grin stretching underneath his slate-colored helmet visor. You reach out your own hand and initiate the Dockerbay Bomb, a secret handshake known only to residents of the six-block radius where you live. In fact, from this high up, you can make out the tops of the enormous container cranes that line Dockerbay's shores, just north of Millennia City's gleaming towers.\n\nYou and StarSoar assumed that this shared background was exactly why you two were paired up, given the fact that it's pretty rare to live in the unglamorous Dockerbay area. It certainly makes you both underdogs heading into this competition, despite StarSoar's astronomical accomplishments. \n\nAs you finish the handshake and turn to look outwards, you wonder what commonalities might connect the rest of the teams. You try to make out some of the other pairs scrambling into the remaining pods, but StarSoar gasps as a second team lands inside your own pod.\n\nYou can immediately tell that this other team must be famous from the way they carry themselves and StarSoar's reaction, but admittedly, you don't know much about the hero world.\n\n*choice\n\t#I'm fascinated by heroes, but can't really afford the 3V cable service or MeChip news content I would need to follow them.\n\t\t*set traditional %+10\n\t\t*goto sssplain\n\t#I'm not interested in mainstream heroic propaganda. Period.\n\t\t*set traditional %-10\n\t\t*goto sssplain\n\t#I'm too busy working and taking care of my sister to care about anything else.\n\t\t*set societal %-15\n\t\t*goto sssplain\n\t#I don't know any heroes who represent my own story and background as an Ani-Powered, so I don't follow many.\n\t\t*set societal %+15\n\t\t*goto sssplain\n\n*label sssplain\n\nYou informed StarSoar about your relative lack of heroic knowledge, and luckily he turned out to be the biggest hero nerd you've ever met—he even showed you his expansive holo-card collection on his MeChip. Noting your lack of a reaction now, StarSoar tries to whisper as quietly as his helmet microphone will allow:\n\n\"That's Fistfull and Monk, from The Millennial Group.\"\n\nYou may not know much about professional heroics, but you do know that The Millennial Group is one of the most prestigious Powered teams in the world. In fact, they're rivaled only by The American Protectorate—and the only way onto that national franchise is to win this very show, The Hero Project.\n\nYou look over Fistfull's towering, ten-foot body, and your hawk-eyes focus on the orange spray-tanned muscles bulging underneath his tank top—judging from those, you figure he must be superstrong and superdurable. You also notice that he sports an impressive wedding band on his sausage-like ring finger, which matches the one on Monk's hand. Monk floats in midair beside Fistfull, hir ivory robes brushing the pod's floor. From hir meditative pose, you figure that Monk must have some serious fighting skill to accompany whatever telekinetic Powers currently keep hir afloat.  \n\n\"I truly hope that we have to work with these two and not against them,\" StarSoar gulps, taking in the sight of this intimidating supercouple.\n\n*page_break\n\nBefore Monk or Fistfull can say anything, the host's holographic image appears once again, directly between you. \n\n\"All forty of our Semi-Finalist teams have been checked in for Round Two,\" the host announces, just as you hear the pod doors close and lock shut ominously. \"Each team will remain locked in their pods until they knock out the other team—or are knocked out themselves. The faster you defeat the opposing team, the faster you'll be able to race to the final location. \n\n\"Two teams have entered each pod, but only one team will leave,\" the host finishes, his holo-image beginning to fade. \"Good luck, Semi-Finalists! You'll need it.\"\n\nAs the host disappears, you're not sure if it's your heightened hawk senses or your imagination, but you swear you can feel the fear radiating out of StarSoar's exo-suit.\n\nSlugger, you're both screwed.\n\n*page_break\n\nYou allow yourself a moment of unbridled panic, but then you force yourself to dig deep. So what if those two are famous and you two are nobodies? You'll have to turn that particular strength into their biggest weakness. \n\nNo one here knows what you can do, especially not the fact that you've been studying martial arts your entire life. You may not be a seasoned hero, but no Ani-Powered survives in a modern city without learning ways to keep protected.\n\n\"StarSoar, let's do that thing we talked about,\" you whisper, falling back as Monk and Fistfull confer quietly in their own corner. \"You know, the element of surprise.\" \n\nHearing this, you see StarSoar shake his helmet, trying to snap himself out of his stupor. He turns to you and nods—suddenly you're very thankful that StarSoar insisted that you spend some time this morning talking strategy. Being a hero nerd has its advantages, apparently.\n\n[i]So does being desperate[/i], you tell yourself as Fistfull and Monk turn to you. It's now or never, make it or break it, the moment of truth—and every other cliché you can muster.\n\nReady or not, here you come.\n\n*choice\n\t#Utilize my Physical Powers, including my wings and talons. (Power Cost 5-10)\n\t\t*if (physical > 50)\n\t\t\t*set lb +15\n\t\t\t*set power -5\n\t\t\t*set legended +2\n\n\t\t\tYou may be a master fighter, but you figure you should take full advantage of your hawk Powers while you have them. Besides, using your Physical Powers worked seamlessly on the rodent duo earlier.\n\n\t\t\t*label physstand\n\t\t\t*set physical %+15\n\t\t\t*set fighting %-15\n\t\t\t\n\t\t\tConventional wisdom would match StarSoar's brute force up against Fistfull's girthy durability, pitting you against the more graceful Monk—so you're going to do exactly the opposite. \n\n\t\t\tTaking the lead for StarSoar to follow, you roll at Fistfull, catching him off guard with a deadly swipe as you unsheathe hooked talon-claws from your fingertips. Fistfull manages to dodge the blow at the last second, but this only pivots him into the path of your wing, which you slam into his chest full-force.\n\t\t\t*goto ffullfight\n\t\t*else\n\t\t\t*set lb +10\n\t\t\t*set power -10\n\n\t\t\tYou may be a master fighter, but you figure you should take full advantage of your hawk Powers while you have them. You're going to try out your Physical Powers this time, instead of the Intangible Powers you used on the rodent duo.\n\t\t\t*goto physstand\n\t#Utilize my Intangible Powers, including my sonic screech and flight. (Power Cost 5-10)\n\t\t*if (physical \u003c 50)\n\t\t\t*set lb +15\n\t\t\t*set power -5\n\t\t\t*set legended +2\n\n\t\t\tYou may be a master fighter, but you figure you should take full advantage of your hawk Powers while you have them. Besides, using your Intangible Powers worked seamlessly on the rodent duo earlier.\n\n\t\t\t*label intanstand\n\t\t\t*set physical %-15\n\t\t\t*set fighting %-15\n\n\t\t\tConventional wisdom would match StarSoar's brute force up against Fistfull's girthy durability, pitting you against the more graceful Monk—so you're going to do exactly the opposite.\n\n\t\t\tTaking the lead for StarSoar to follow, you roll at Fistfull, catching him off guard by spreading your wings wide as you untuck. Fistfull expects you to strike with your wings, but instead you let a sonic screech rip from your lips. The force of the vocal blast knocks Fistfull backwards as it slams into his chest and he grips his ears in pain.\n\t\t\t*goto ffullfight\n\t\t*else\n\t\t\t*set lb +10\n\t\t\t*set power -10\n\n\t\t\tYou may be a master fighter, but you figure you should take full advantage of your hawk Powers while you have them. You're going to try out your Intangible Powers this time though, instead of the Physical Powers you used on the rodent duo.\n\t\t\t*goto intanstand\n\t#Launch a surprise offensive attack with my fighting ability. (Health Cost 5-10)\n\t\tWhy waste Power when you can rely on your master fighting skills, which Fistfull and Monk won't see coming? \n\t\t*if (defensive \u003c 50)\n\t\t\t*set lb +15\n\t\t\t*set health -5\n\t\t\t*set legended +2\n\t\t\tYou fought offensively against the rodent duo with success, so you figure that you should rely on that strength once again.\n\n\t\t\t*label offstand\n\t\t\t*set defensive %-15\n\t\t\t*set fighting %+15\n\n\t\t\tConventional wisdom would match StarSoar's brute force up against Fistfull's girthy durability, pitting you against the more graceful Monk—so you're going to do exactly the opposite.\n\n\t\t\tTaking the lead for StarSoar to follow, you roll at Fistfull, catching him off guard with a sloppy right hook thrown at his face. Fistfull dodges around the punch easily, but that was your hope. As Fistfull jumps away, you swing seamlessly into a roundhouse kick with your left leg. Your foot slaps across Fistfull's face, catching him off guard, then you plant your feet and pivot your open palm into his throat. Your own blows sting as they fall against Fistfull's tough skin, but they're effective.\n\t\t\t*goto ffullfight\n\t\t*else\n\t\t\t*set lb +10\n\t\t\t*set health -10\n\t\t\tYou fought defensively against the rodent duo before, so you're going to switch it up with an offensive attack this time.\n\t\t\t*goto offstand\n\t#Maneuver into a surprise defensive attack with my fighting ability. (Health Cost 5-10)\n\t\tWhy waste Power when you can rely on your master fighting skills, which Fistfull and Monk won't see coming? \n\t\t*if (defensive > 50)\n\t\t\t*set lb +15\n\t\t\t*set health -5\n\t\t\t*set legended +2\n\t\t\tYou fought defensively against the rodent duo with success, so you figure that you should rely on that strength once again.\n\n\t\t\t*label defstand\n\t\t\t*set defensive %+15\n\t\t\t*set fighting %+15\n\n\t\t\tConventional wisdom would match StarSoar's brute force up against Fistfull's girthy durability, pitting you against the more graceful Monk—so you're going to do exactly the opposite.\n\n\t\t\tTaking the lead for StarSoar to follow, you roll at Fistfull, catching him off guard with a feign. Fistfull takes your bait and throws a punch, which you're prepared for. You spin around the deadly blow and use Fistfull's momentum against him, flipping his heavy body faceup on the floor with a crashing thud. The effort of doing so is tremendously strenuous, but the maneuver is effective.\n\t\t\t*goto ffullfight\n\t\t*else\n\t\t\t*set lb +10\n\t\t\t*set health -10\n\t\t\tYou fought offensively against the rodent duo before, so you're going to switch it up with a defensive attack this time.\n\t\t\t*goto defstand\n\t\t\n*label ffullfight\n*set health -15\n\nYou can tell that you hurt Fistfull from his screams, but he is apparently tough enough to react through the pain. You don't expect him to recover so rapidly—or to have such fast reflexes—so Fistfull manages to wrap his enormous hand around your right wing. He squeezes hard, and you squawk in pain as the wingbones nearly crack. Then Fistfull tosses you clear across the pod.\n\nYou are sent reeling, but stop your momentum by crashing into the ground. This may hurt and you might seem uncoordinated as you pop back onto your feet, but this actually all plays perfectly into your plan….\n\n*page_break\n*set power -20\n\n\"Now!\" you scream, signaling StarSoar to switch opponents. Still facing Fistfull, you hear StarSoar's fiery blue thrust ignite behind you and you immediately fly upwards. As you curve over into a graceful backflip, you look down at StarSoar streaking underneath you and think: you must look pretty slugging cool right now.\n\nEven cooler as you twist the flip in midair and unsheathe your talons from your fingertips. You spot Monk preparing to stop your attack telekinetically, but you know ze isn't counting on your next move. You fire the talon-nails from your fingers, pinning Monk to the silver metal of the pod wall.\n\nThen, before Monk can use hir telekinesis to dislodge hirself, you unleash a full sonic screech. The vocal blast rips across the pod and slams Monk into its reinforced glass with crushing force. Once the blast clears, Monk hangs limply against the wall, propped up only by your talon-posts.\n\nYou then spin around to check on StarSoar and see him landing beside you, having left Fistfull imprinted in the glass on the opposite side of the pod. StarSoar leans over with his hands on his knees, looking like he needs a moment to recover—you really hope he doesn't vomit inside his helmet.\n\n\"It's a very good thing we had a plan worked out,\" you say, taking a second to catch your own breath. \"That'll teach anyone to underestimate us, huh?\"\n\n*page_break\n\n\"Alert,\" the MeChip assistant suddenly echoes in your head. \n*if (lb = 35)\n\t\"You executed both of your attacks with consistency, which grants higher efficiency outcomes. \n\t*goto finishalert\n*else\n\t\"You executed both of your attacks with different focuses. While this split concentration is occasionally advantageous, it is more favorable to attack with consistency, which grants higher efficiency outcomes. \n\t*goto finishalert\n\n*label finishalert\nReminder: your Health and Power Levels were lowered from this combat situation. You must maintain Levels above 0 to survive. Please refer to the Show Stats screen section for other statistical changes.\"\n\nTaking this all in, you realize that when it comes to Offensive and Defensive attacks and Physical and Intangible Power uses, it's best to remain consistent. That's an interesting way to frame battle choices that you never—\n\n\"Stars above, I cannot believe we just won that fight,\" StarSoar says, pulling you back to reality. \"Besting those two is going to be a huge upset. We are most certainly going to receive some attention for that.\"\n\nSure enough, as StarSoar finishes speaking, the door to the pod unlatches and two more camera orbs enter to film you and StarSoar—followed by a pair of clearance drones to remove Monk and Fistfull. Even though that's undoubtedly a good sign, it also means the pressure is on. There were no expectations before, but now you've got to keep up your momentum as front-runners.\n\n*page_break\n\n\"Oh, there is Colton Quick again,\" StarSoar says, turning towards the holo-image of the host reappearing inside the pod. So that must be his name—actually, you now recognize him as the former host of [i]Quickies[/i], your favorite daytime talk show as a kid. You and your sister used to watch that nonsense for hours…. The thought of her snaps you back into focus, reminding you what you're here to do. And what's at stake.\n\n\"Welcome to Round Three, Semi-Finalists,\" Colton announces, laying the dramatics on even thicker than before. \"Your next task is to race along a guided route to The Hero Project compound just outside of downtown MC. You have two options in front of you: solve a puzzle to unlock a faster transportation method, or travel to the compound on your own.\n\n\"Choose wisely, because only the first twelve teams to arrive will advance to the final round…which means another eight teams will be eliminated.\"\n\nAs Colton's holo-image cuts out, a floating puzzle image is left in his place—a miniaturized version of the half-glass egg-pod. Behind it, you see that two ripped heroes have already exited the neighboring pod and are racing towards the predetermined marathon path on their own, their oiled biceps gleaming through their sleeveless costumes. An older, white-bread actor-type in a classic cape jumps down next to a younger, Middle-Eastern model-type, who suddenly produces a hover platform from his gadget-filled costume. It folds out in impressive chunks as the striking pair careen away from the MillenniWheel.\n\nSlugging great, another two famous-looking hero-types trying to outpace you. Though all this really reminds you is that you have no time to waste.\n\n*choice\n\t#Decipher the puzzle with my heightened hawk-eyes. (Power Cost 5-10)\n\t\t*if (physical \u003c 50)\n\t\t\t*set lb +20\n\t\t\t*set rlshp_starsoar %+15\n\t\t\t*set power -5\n\t\t\t*set physical %-15\n\t\t\t*set legended +3\n\n\t\t\tYou focus your eyes on the mini-pod puzzle and hope to uncover something unseen with your activated hawk vision, which can pick up magnetic and ultraviolet spectra. As you focus on the puzzle, you make out extra waves radiating from a small section of the mini-pod.\n\n\t\t\tTurning to this matching spot in the actual pod, you bypass the puzzle and press against the wall. Your hand pushes into a hidden panel located there, causing a control station and steering wheel to unfold from the wall.\n\n\t\t\t\"I do not know how you managed that, but color me impressed,\" StarSoar says. \"I would have had us flying there on our own already. Do you think you can drive this vehicle?\"\n\n\t\t\t\"You're the NASA-trained pilot,\" you say, stepping aside. \"I think you should do the honors.\"\n\n\t\t\t\"Alert,\" your MeChip sounds once again as StarSoar approaches the mini cockpit. \"You utilized your Intangible Power statistical strengths and were awarded maximum Leaderboard points.\n\t\t\t*goto bulletpod\n\t\t*else\n\t\t\t*set lb +10\n\t\t\t*set rlshp_starsoar %+5\n\t\t\t*set power -10\n\t\t\t*set physical %-15\n\t\t\t*set legended +1\n\t\t\t\n\t\t\tYou focus your eyes on the mini-pod puzzle and hope to uncover something unseen with your activated hawk vision, which can pick up magnetic and ultraviolet spectra. Walking around the puzzle, however, you can't make anything out.\n\n\t\t\t\"I think we should fly there on our own,\" StarSoar interrupts. \"We must be one of the fastest teams here, given our respective Power sets.\"\n\n\t\t\tJust as you're about to give up and agree with StarSoar, you make out extra waves radiating from a small section of the mini-pod. Turning to this matching spot in the actual pod, you bypass the puzzle and press against the wall. Your hand pushes into a hidden panel located there, causing a control station and steering wheel to unfold from the wall.\n\n\t\t\t\"Sorry that took a little longer,\" you say. \"Think you can make up the time now, Mr. NASA-Trained-Pilot?\"\n\n\t\t\t\"Alert,\" your MeChip sounds once again as StarSoar approaches the mini cockpit. \"You did not utilize your Physical Power statistical strengths. Points deducted from your Leaderboard score.\n\t\t\t*goto bulletpod\n\t#Forget the puzzle and fly with StarSoar using my wings. (Power Cost 5-10)\n\t\t\"We have to be one of the fastest teams here,\" you say, seeing that StarSoar is already thinking the same thing. He nods at you and jumps out of the pod door within seconds, lighting up and shooting off into the sky in another blue explosion.\n\n\t\t*if (physical > 50)\n\t\t\t*set lb +20\n\t\t\t*set rlshp_starsoar %+15\n\t\t\t*set power -5\n\t\t\t*set physical %+15\n\t\t\t*set legended +3\n\n\t\t\tYou immediately follow, spreading and flexing your wings to see just how fast you can really fly. No matter what, you're going to keep up with StarSoar and be one of those twelve advancing teams.\n\n\t\t\t\"Alert,\" your MeChip sounds once again as you fly. \"You utilized your Physical Power statistical strengths and were awarded maximum Leaderboard points.\n\t\t\t*goto flythere\n\t\t*else\n\t\t\t*set lb +10\n\t\t\t*set rlshp_starsoar %+5\n\t\t\t*set power -10\n\t\t\t*set physical %+15\n\t\t\t*set legended +1\n\n\t\t\tYou immediately follow, spreading and flexing your wings to see just how fast you can really fly. You can already tell it's going to be quite a strain to keep up with StarSoar—hopefully you can fight through the pain to be one of those twelve advancing teams.\n\n\t\t\t\"Alert,\" your MeChip sounds once again as you fly. \"You did not utilize your Intangible Power statistical strengths. Points deducted from your Leaderboard score.\n\t\t\t*goto flythere\n\t#I'm not playing by the rules. I'm going to invent my own option by looking for extra clues inside the pod. (Power Cost 5-10)\n\t\t*set lb +10\n\t\t*set rlshp_starsoar %+15\n\t\t*set power -10\n\t\t*set legended +2\n\n\t\tYou focus your eyes and hope to uncover something unseen inside the pod with your activated hawk vision, which can pick up magnetic and ultraviolet spectra.\n\n\t\t\"I think we should fly there on our own,\" StarSoar interrupts. \"We must be one of the fastest teams here, given our respective Power sets.\"\n\n\t\tIgnoring StarSoar, you make out some extra waves radiating from a hidden panel in the silver wall of the pod. Bypassing the puzzle, you run over and press against the panel, which causes a control station and steering wheel to unfold from the wall.\n\n\t\t\"I do not know how you managed that, but color me impressed,\" StarSoar says. \"Do you think you can drive this vehicle?\"\n\n\t\t\"You're the NASA-trained pilot,\" you say, stepping aside. \"I think you should do the honors.\"\n\n\t\t\"Alert,\" your MeChip sounds once again as StarSoar approaches the mini cockpit. \"You did not focus on utilizing your Intangible or Physical Power statistical strengths. However, you relied on your instincts and were awarded maximum Leaderboard points.\n\t\t*if (physical > 50)\n\t\t\t*set physical %+10\n\t\t\t*goto bulletpod\n\t\t*else\n\t\t\t*set physical %-10\n\t\t\t*goto bulletpod\n\n*label bulletpod\nLeaderboard points are accumulated during challenges and help determine future eliminations. You currently have ${lb} out of a possible 60 Leaderboard points.\"\n\n[i]Good to know[/i], you think, as StarSoar studies the newly emerged dashboard.\n\n*if (physical \u003c 40)\n\t*achieve intangibleone \n\t*goto metalweehl\n*else\n\t*goto metalweehl\n\n*label metalweehl\n*page_break\n\nOnce StarSoar figures out the controls, the pod unlatches from the metal wheel frame and turns on its side. You imagine once the real MillenniWheel opens, the pods won't be capable of detaching like this—especially since, as the wheel shifts and the glass half of your pod becomes the true cockpit, you realize that the pod isn't shaped like an egg—it's shaped like a bullet. Who on earth would think of something like this? \n\nStarSoar begins to steer the speeding hoverpod along a newly lit \"marathon\" route and you look below you to find a gathered audience cheering you along-though you can tell instantly that this audience is in fact holographic. You wonder if they will appear to be real in the actual show, once it airs? That thought is overwritten, however, as another racing team comes into sight, keeping pace below your hoverpod. \n*goto finalspot\n\n*label flythere\nLeaderboard points are accumulated during challenges and help determine future eliminations. You currently have ${lb} out of a possible 60 Leaderboard points.\"\n\n*if (physical > 60)\n\t*achieve physicalone \n\t*goto flytherute\n*else\n\t*goto flytherute\n\n*label flytherute\n*page_break\n*set power -10\n\n[i]Good to know,[/i] you think as you fly along a newly lit marathon route, panting heavily and trying to keep up. You look below you to find a gathered audience cheering you along, though you can tell instantly that this audience is in fact holographic. You wonder: will they appear to be real in the actual show, once it airs?\n\nThat thought is overwritten, however, as another racing team comes into sight, keeping pace below you and StarSoar.\n*goto finalspot\n\n*label finalspot\n\nThe first thing you see are the sweeping pterodactyl wings, which must span at least twenty feet. They're attached to the body of a man, who also appears to have the head and legs of a velociraptor. You've never seen a dinosaur human hybrid before, since they are tremendously rare—they're actually the result of illegal gene splicing, since Dino-Power sets don't occur naturally.\n\nPerhaps equally breathtaking is the sight of the Ani-Powered that rides on the dino-hybrid's back, in the form of a giant tarsier. This is particularly remarkable because Ani-Powereds usually take on some kind of hybridized human form, but this guy is full-on animal, except for the fact that he's sized more like a human than a tarsier. His bulging eyes take up most of his furry face and remain fixed in position, so that he has to turn his entire head to check the perimeter for threats. As he does, he also swings his ten-foot tail in a defensive sweeping pattern.\n\nAs refreshing as it is to see other less traditional, Ani-Powered heroes included in the competition, you realize that you should probably focus on your own progress instead.\n\n*page_break MERE MINUTES LATER\n\nBefore you know it, you and StarSoar are approaching your final destination: a sprawling compound of several massive structures, including a full stadium, a headquarters tower, and an enormous mansion. A giant holographic emblem floats above the center of the compound, reading [b]T H P[/b] in gold-lit letters, which clearly stands for The Hero Project.\n\nDespite yourself, you feel a little rush, taking in the epic sight. For a moment, the gravity of what you're doing settles in—this is a very, very big deal. But as soon as this feeling takes hold, it seems to flutter away. Which is just as well, you think, as you see the end of the arrow-lit marathon route you've been following, because you don't need any more pressure placed on you right now.\n\nThe arrows lead to the back of the stadium, towards what appears to be some kind of shipping entrance. There's an elaborate set of scaffolding built there, one that clearly has twelve numbered entry spots. Your stomach drops as you see this, not necessarily because of its size, but because eleven of the spots have already been taken by other teams.\n\nLooking around, you see that there's only one other team in proximity—a pair of molten ladies running down the route with impossible speed. They seem to be using some form of lava-like propulsion to push them forward, fast enough that they very well could overtake you.\n\n\"StarSoar, incoming,\" you shout, but StarSoar waves you off.\n\n\"Affirmative,\" he shouts back. \"You might want to hang on.\"\n\nFollowing StarSoar's advice, you grab hold of his arm just as he slams the speed on, rocketing you both forward in a crash of color and sound. The warp blurs your vision, which is actually fine, since you don't need to see how fast you must be approaching that scaffolded spot…all you need to know is that you outpaced those molten ladies.\n\n*page_break\n\nWithin seconds, StarSoar cuts the speed entirely and you find yourself tumbling across a metal floor, bracing for the worst as you use your wings to skid to a halt. Once you gain your bearings enough to sit up and open your eyes, you look around to find…\n\nYou occupy the twelfth entrance spot in the scaffolding structure, looking out on the glow of the eliminated molten ladies below. \n\n\"We did it!\" StarSoar shouts. \"We are among the Final 24 heroes! That is bonkers.\"\n\n\"Not as bonkers as the fact that we're about to be in the Final 14,\" you say as the two doors in front of you open, evidently leading into the stadium. \n\nOr so you thought, until you and StarSoar step forward into a small confessional booth lined with soundproof walls. Straight ahead stands a wall of stacked camera orbs, and all you can think is: What the slugger do they have in store for you next?\n\n*page_break\n\n\"Congratulations on making it to the Final Round of the Semi-Finals,\" Colton says, somehow still holographically appearing inside the relatively small confessional booth. \"You've proven your ability to react to your surroundings, think fast, fend off opponents, fight in close quarters, make sound split-second decisions, and complete assigned missions. You're all clearly capable of acting in the field as professional heroes. However, if you are to take one of the Finalist Spots, we want to know what truly motivates you.\n\n\"In order to advance in this last round of the Semi-Finals, you must answer one question. Then, based on your answers, our panel of prestigious secret judges will select the fourteen heroes they feel are most worthy of advancing.\n\n\"So, are you ready to hear the question?\" Colton asks, as if you would respond with anything other than yes. \"The question is… \n\n\"Why do you want to be on The Hero Project?\"\n\nAlthough this seems like a relatively straightforward inquiry, you still experience a wave of dread. You have a feeling that \"I was forced into being here to save my sister's life\" probably isn't going to be a worthy response—nor is it a particularly smart one, for you. Unfortunately, you haven't really sorted out yet whether you're here for any other reason.\n\nYou know your continued success depends upon delivering a heartfelt answer—audiences tend to see through phoniness on these shows. Feeling panicked, you turn to StarSoar and say, \"You go first,\" hoping this will buy you a few moments to think. \n\n*page_break\n\nStarSoar pulls off his helmet, shaking loose a mop of short reddish hair that is currently matted down with sweat. With the freckles scattered across the bridge of his nose, the wisps of facial hair growing in unevenly across his jaw, and the acne scarring on his forehead, he looks much younger than you expected. Still, there's something entirely endearing about his face, which grows emotional as he looks directly into the nearest camera orb.\n\n\"Ever since I was a child, I have dreamed of pushing the frontiers of humanity forward with my Powered talents,\" StarSoar begins, placing his helmet over his heart as if he is taking some kind of oath. \"I thought the best way to achieve this goal was to become an astronaut, so I devoted many years of my life to this important endeavor.\n\n\"However, I recently realized that becoming a Powered hero would be the surest way to protect, serve, and inspire the human race. I now believe that the truest way to push humanity's frontiers forward is to enter The Hero Project, in the hope of winning a spot on The American Protectorate.\"\n\nAs StarSoar finishes, actual tears appear to well in his eyes. Whatever else you think of his answer, you have to admit it was pretty slugging stellar. Which means that your answer is going to have to be equally inspirational.\n\nThe problem is, you were so wrapped up in listening to StarSoar that you still don't have one. Your whole life has been about protecting your sister and dealing with your ever-changing Ani-Powers. You haven't had a spare second to consider loftier hopes and dreams.\n\nAs the camera orbs swivel to you, you realize that you'd better think of something fast.\n\n*choice\n\t#\"I like the idea of being a hero; I just never thought that would be in the cards for me. I'm here to prove to myself that it's possible, I guess.\"\n\t\t*set traditional %+10\n\t\t*set public %-15\n\t\t*goto fallsflat\n\t#\"I'm not here to be a hero; I'm here because I have a lot to say about the world. And how it should be changed.\"\n\t\t*set traditional %-10\n\t\t*set public %+15\n\t\t*goto fallsflat\n\t#\"You don't need to know why I'm here. All you need to know is that I'll get the job done.\"\n\t\t*set traditional %-10\n\t\t*set public %-15\n\t\t*goto fallsflat\n\t#\"I guess I just want to show that heroes can come in lots of different packages, even ones that don't fit the norm.\"\n\t\t*set traditional %+10\n\t\t*set public %+15\n\t\t*goto fallsflat\n\n*label fallsflat\n*set lb +30\n\nStarSoar turns to you, obviously expecting more, but you don't have anything else to say. You wanted to keep it short and sweet, but now you second-guess yourself as StarSoar's eyes urge you to go on. \n\nHowever, before either of you can say any more, your MeChip assistant speaks once again: \"Final Leaderboard score set. Good luck.\" \n\nWith that, you can feel the MeChip assistant go offline, leaving a hollow shadow in your mind where its presence once was. Slugger, you can already tell that you're hooked on this thing. You're probably going to want to upgrade your own MeChip as soon as possible to feature—\n\n\"Thank you for your answers, Semi-Finalists,\" Colton's voice interrupts, as his holo-image reappears in front of you. \"The confessional doors will soon open for the seven teams selected for the Final 14. Best of luck and congratulations on making it this far!\"\n\nHearing this, you can only wonder if you've done enough to secure your place—this experience has whipped by in an instant. You certainly did kick butt, but compared to the other heroes who seemed to be advancing, you definitely feel like a bit of a misfit. Your hawk-self may look cool today, but wait until everyone sees you as a mollusk or a poodle or any number of the embarrassing Ani-hybrid forms you're prone to waking up as. Against these muscled beauties and heroic icons, how do you fit in? \n\nYou realize you're going to have a lot of thinking to do if you move on…and even more if you don't.\n\n*page_break\n\n\"We did our best,\" StarSoar says, placing a hand on your shoulder. \"No matter what happens now, we know we will both be featured on the Semi-Final episodes. We took down Fistfull and Monk, for slugger's sake!\"\n\nStarSoar covers his mouth after this, as if cursing is the worst thing he possibly could have done. As you laugh and nod at StarSoar, he decides to put his helmet back on, taking a deep breath. You take one too, because your heart is pounding away in your chest as you wait to see if your door will open.\n\nHave you done enough to make it to the Final 14?  Will it be enough to save your sister?\n\nYou get your answer more quickly than you expected.\n\n*page_break\n*if (lb > 76)\n\t*achieve lbonehigh\n\t*goto podunl\n*else\n\t*achieve lbonemid\n\t*goto podunl\n\n*label podunl\nYour confessional door swings open, releasing the wall of camera orbs as they rise like balloons into a massive soundstage. You look to StarSoar, your chest melting into a puddle of relief.\n\nYou did it.\n\nYou step forward, walking out onstage before a roaring crowd. Confetti showers down in front of blinding stage lights. It's completely overwhelming, though once your hawk-eyes adjust, you realize that this crowd is all holographic once again. Somehow it doesn't take away from the effect on the stage—it's singularly exhilarating.\n\n*page_break\n*achieve fsfourteen\n\nYou've made it into the Final 14, beating out eighty-six of the nation's best Powered heroes. This automatically makes you think of the ten other heroes still stuck in their confessional booths behind you, having made it all the way here only to be forced to listen to the celebration going on right outside. You realize how easily that could have been you, but thankfully the combination of StarSoar's eloquent answer and your succinct one pulled you both through.\n\nWhich means that your sister is going to be okay. You can finally breathe again.\n\nYou look over the thirteen other heroes advancing alongside you, already spotting a few you recognize: the pink energy heroines, the ripped hero dudes, and the dino-tarsier duo all appear to have made it to the finish line as well. Celebrating beside them you see everything from teenage prodigies to drag queen deities to goth vampires. Taking in this vivid and improbable sight, all you can think is:\n\nWhat the slugger did you just get yourself into?\n\n*finish NEXT CHAPTER: READY FOR THIS JELLY\n", "rs_pvone": "\n*comment é x\n\n*image interlude1.png center Interlude One: Weaving\n([i]New Character Perspective[/i])\n\n*page_break\n*achieve weaverpersp\n\n\"This is exactly the kind of juvenile nonsense that derailed the first season.\"\n\n\"That's rather dreary, dearie. And dramatic. The only reason that first season wasn't a complete disaster was that the producers knew how to do their jobs.\"\n\n\"It actually was a complete disaster, let's be clear on that. It just happened to get ratings as a result. We're supposed to be doing things differently this season. Hiring back that producer who pushed Black Magic over the edge and manipulated Wintry into switching sides is absolutely—\"\n\n\"Necessary. Mara is going to help us get the show we need, especially given our little ratings decline. Want to know what won't? Hiring your ${weaverne} to do a job ${weaverze} can't possibly—\"\n\n\"Finish that sentence. I dare you.\"\n\nThey don't know you can hear them through the door and down the hall, that you can practically feel the righteousness charging Aunt Lyra's words and the animosity dripping off of GG's. Not that this is anything new for you—you're used to people talking about you as if you're not really there. Just because you're visually impaired, people tend to assume you can't hear them, either.\n\n*page_break\n\n\"I was going to say, my anxious apple, that your ${weaverne} has no production experience,\" GG answers. \"I'd never dream of discriminating otherwise.\"\n\n\"You were singing a very different tune when I first showed you Weaver's costume sketches,\" Aunt Lyra fires back. \"What did you call them, 'divine designs?'\"\n\n\"Divine they remain, which is only further proof of the fact that design is also where Weaver ${weaverhir}self should remain. $!{Weaverze} will make a scrumptious stylist! It's certainly enough to be handed that position on a silver platter, why must ${weaverze} also take the place of a production handler?\"\n\nHearing GG's question, you have to admit it's a potentially valid one.\n\n*choice\n\t#After all, I want to be a famous costume designer, not a producer.\n\t\tYou're still not sure you'd be any good at producing, since it's not exactly something you ever wanted to do.\n\t\t*goto manyathang\n\t#This is my first job out of design school, so Aunt Lyra is giving me quite a bit of responsibility.\n\t\tIf Aunt Lyra thinks being a producer is also a good thing, you're not about to question her decision. You'll do anything to get this first opportunity in design.\n\t\t*goto manyathang\n\t#Whatever I'm doing, I know the most important thing here is gaining experience and getting the heroes here to like my costume designs.\n\t\tProducer, stylist, both, or neither—your goal here is to make as many heroic friends as possible to launch your costume-designer career.\n\t\t*goto manyathang\n\t#I want to prove GG wrong. Just because I was born blind doesn't mean I can't do both jobs.\n\t\tMost people assume you're not able to do the things they take for granted.\n\t\t*goto manyathang\n\n*label manyathang\n\nMany things about this experience are bound to be new to you, but one thing you're quite used to is people underestimating you. Even with all the advancements made by MeChip technology to aid the visually impaired, you still don't see the world the way everyone else does. However, you've always known that's actually your greatest strength, especially as a designer. Your costume designs aren't influenced by anyone, since they are singularly inspired by the visions in your own mind.\n\nThese visions are also fueled by your unique Power to generate fabrics of all kinds—you can spin anything from cashmere to cotton to brand-new inventions, like your favorite carbon-fiber bulletproof crossbreeds. You were quite literally born to be a costume designer, and Aunt Lyra has always been one of the few people who truly values the fact that you \"see\" the world differently from everyone else. Which is why you trust her, even if you don't always agree with her.\n\n*page_break\n\n\"If you knew Weaver, you wouldn't be questioning ${weaverhis} ability,\" Aunt Lyra counters. \"Give ${weaverhir} one week and ${weaverhis} assigned Finalists will trust ${weaverhir} completely.\"\n\n\"I can say the same of the ever-experienced Mara,\" GG counters. \"Tit for tat. See, the art of compromise? I handle the Veterans with my team and you handle the Rookies with yours, as we agreed. All is as it should be.\"\n\nGG's words sound innocent enough, but you know a dig when you hear one. So does Aunt Lyra: her current stretch of silence must be building to something.\n\n\"Look at all the natural drama we have in this high-pressure situation, with egos clashing and different personality types having to work together,\" Aunt Lyra says calmly. \"We will get what we need with nudges and inspiration, not manipulation and brainwashing.\"\n\n\"You think there wasn't a time I believed that too?\" GG almost laughs. \"It's an inspiring speech, my peach, but one spoken like a true amateur.\"\n\n*page_break\n\n[i]Oh no[/i], you think—Aunt Lyra isn't going to like that. She isn't going to like that at all.\n\n\"Let me remind you that I am the youngest and most successful PR director for the Department for the Regulation of Powered Resources,\" Aunt Lyra begins. \"I am also the only reason your dysfunctional American Protectorate survived the operational transition under the DRPR's jurisdiction. I am now this show's official liaison to the DRPR, which also makes me your completely equal co-executive Producer. I am many things, but an amateur is not one of them. And don't ever slugging forget it.\"\n\nYou don't hear any response for several seconds, save for the sound of GG rolling towards the door, his people mover straining against the wooden floorboards as he moves.\n\n\"The proof, as they say, shall be in the producer pudding,\" GG finally sighs. \"Since we're unlikely to agree any time soon, why don't we embrace the spirit of competition we inspire among the production handlers? I will take charge of the Veterans production and you will take charge of the Rookies production. Until the merge, may the best producer win.\"\n\n\"All I care about is The Hero Project and the future American Protectorate winning,\" Aunt Lyra responds. \"So I will ensure that they survive your antiquated antics.\"\n\n\"She catches on quickly, this one,\" GG laughs, opening the door so his voice booms even louder. \"There may be hope for you yet, little Lyra. Enjoy your handler meetings—I know I will enjoy mine.\"\n\n*page_break\n\nAs you listen to GG rolling down the hall away from you, you figure that's probably your cue. You pocket the strand of silk you were spinning between your fingers, then straighten your bionic glasses and stand. Stepping forward, the hallway suddenly vibrates into focus, showing you the outlines and shapes of everything in front of you.\n\nYou can only make out the impressions of things in grayscale, but whatever you might miss is more than covered by the sonar stabilizer and MeGuide companion loaded into your MeChip. There are some visually impaired individuals who opt for full 3D holographic renderings, but you prefer to see the world as it is, not as it is digitally represented—even if that means maintaining certain limitations.\n\nAs you step into the conference room where Aunt Lyra sits, your MeGuide, Seamstress Seamanda, appears holographically in your peripheral mind-vision wearing the classic carbon-fiber costume you designed for her—one of your first designer creations ever. MeChip Seamanda offers to verbally communicate Lyra's identity, but you dismiss the option, instead making your way towards the nearest chair.\n\n*page_break\n\n\"I assume you heard all of that from down the hall?\" Aunt Lyra says, apparently typing furiously on the holo-keyboard glowing on the table before her. \"Just another reason you're going to be an invaluable asset.\" \n\nAunt Lyra mutters this last part to herself as she wraps up whatever she is typing. You sit down, causing the grayscale projections to cease—you find them to be pretty exhausting, so you usually only use them when you're moving. Besides, you can still tell that Aunt Lyra raises her head to face you from the sonar stabilizer and the whiff of her post-swim lotion wafting your way.\n\nYou take this gesture as your opportunity to speak up.\n\n*choice\n\t#\"GG will come around once he sees the results we'll get doing it your way.\"\n\t\t\"I agree, but you just leave GG to me,\" Aunt Lyra says. \n\t\t*goto alreadytold\n\t#\"I don't want you to use precious political capital sticking up for me, Aunt Lyra.\"\n\t\t\"You leave GG to me,\" Aunt Lyra says. \n\t\t*goto alreadytold\n\t#\"Let's get to work and prove GG wrong.\"\n\t\t\"You leave GG to me,\" Aunt Lyra says. \n\t\t*goto alreadytold\n\t#\"I'm fine just being the costume designer. That's more than enough for me; you know that.\"\n\t\t\"I know that,\" Aunt Lyra says. \n\t\t*goto alreadytold\n\n*label alreadytold\n\"And I've a
