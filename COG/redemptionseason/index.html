g aspirations. \"I mean, this is all pretty surreal for me. How are you doing with it?\"\n\nOnce Transfer's question is posed, everyone turns to you, along with a set of camera orbs that have been filming since your arrival. Their presence reminds you that your answer here is going to have layers of consequences, so you pause to think a moment before you speak.\n*goto minglechoice\n\n*label mnmisfits\n\n\"Hey, mind if I join you?\" you say as you approach the group. \"It's ${named}, by the way, though I guess I'm going by ${codenamed} now.\"\n\n\"Season's greetings!\" Tarsiero says first, his voice purring as he speaks. \"I'm so glad you decided to join with us. #AnimalUnity #FriendsForever #TarsieroTime!\"\n\nTarsiero smiles up at you from his crouched position and you have no idea how to respond. No one has used hashtags like that since social media was invented back in the early twenty-first century. Even then, no one spoke them aloud like this. Maybe Tarsiero is trying to make this his thing on the show?\n\n\"Are you okay? You seem pained?\" Tarsiero asks, looking immediately skittish. You must have been making a face, since the only thing more jarring than Tarsiero's hashtag-speak is the sour smell coming from his matted fur. Something about the damp, unwashed smell makes you both queasy and uneasy. \n\n\"Have you been trained to shake hands yet? #JustKidding #LOL #TarsieroTime!\" Tarsiero jokes nervously.\n\n*page_break\n\n\"Everything okay with you?\" Splint asks, stepping in front of Tarsiero protectively. That's when you realize that you've bared your teeth and have started to growl in a low, guttural rumble. You force yourself to stop, mortified to have exhibited any instinctually aggressive Ani-behavior on camera.\n\n\"Yes, sorry,\" you say, forcing a smile. \"I'm just a bit overwhelmed, with these new dog-senses and all. My apologies. Really.\"\n\nSplint nods, wafting over a distinct mix of unwashed hair and sweat. It's not unpleasant, it's just not altered by anything, like most of the other people you've encountered. It's a wild experience having these canine senses, to most easily identify people by smell instead of sight.\n\nSplint then steps back and starts to scratch Tarsiero behind the ears, causing him to smile and rub against her leg adoringly. The sight threatens to turn your stomach. [i]You're human, damn it,[/i] you want to scream at Tarsiero.\n\nYou know you should connect with other Ani-Powereds most easily, but truth be told, you've always had trouble feeling comfortable with them. Something about being around other Ani-Powereds always reminds you that you just don't fit in anywhere, especially in the one community that's supposed to be a source of support. You try to give Tarsiero the benefit of the doubt, but he's making it hard, pandering like a mascot and acting like a human pet.\n\n*page_break\n\nYou force yourself to focus on something else, so you study Splint's thin, five-foot frame and pale blue eyes, which seem to be altered with colored contacts. Right now those eyes tick back and forth underneath her glasses, which you then realize are part of the MeChip GamerComm headset, equipped with state-of-the-art gamer holo-glasses.\n\n\"Sorry, I'm just trying to clear one last level in CCQ,\" Splint says, her eyes still not quite focused on you. \"I patched into an unblocked MeSignal. I, uh…hate parties like this.\"\n\n\"You play [i]Creatures of Crests & Quests[/i]?\" you blurt out. \"I'm a Level 16 Dragicorn! Sorry, I've never met another CCQ'er in real life. I've also never seen a mobile console headset like that—it's absolutely incredible.\"\n\nYou try to stop yourself from drooling from your dog jaw as you look over the sleek headset, especially as Splint focuses her eyes excitedly on you for the first time.\n\n\"I'm a Level 50 Needlebeast,\" she says, proudly gloating over the look of jealousy and shock on your face. \"But Level 16 is great, it's so hard to level up past that. I've had to play pretty nonstop to get this high.\"\n\n*page_break\n\n\"I should like learn such game,\" Velocityl suddenly says, causing you to nearly jump and bark. His voice sounds almost prehistoric, deep and gravelly, even through his thick Korean accent. In all your Ani-discomfort and gamer excitement, you totally forgot the dino-hybrid was standing there too—which is insane, given his imposing presence. Though you notice Velocityl is fairly scentless, which might have helped you forget about him momentarily.\n\nYou turn to him now and marvel at the rough, reptilian skin that cuts into his much softer human flesh. Massive pinkish-red wings crease his back, looming even taller than his own eight-foot height. Taking in Velocityl's impressive stature, you realize that he must also know what it's like to be treated as something less-than-human. Though as you focus on the places where his dinosaur limbs cut into his human flesh in raw, sewn-together seams, you realize that Velocityl must feel even worse, because nature didn't make him this way—other people did.\n\nStrangely, all of these minor details you now notice come into sharper focus than the entire impression of each person, no doubt thanks again to your altered dog-senses. Between the details and the smells, it's all you can do to focus on behaving like a normal, social person. Which is probably why you stare up at Velocityl, forgetting to speak. Luckily, that seems to be the trend in this group. None of them seem bothered by your silence except for Tarsiero, who pipes up again to say:\n\n\"How are you feeling to be here, fellow Ani-friend? #TheFeels #Reality3DTV #TarsieroTime!\"\n\nEveryone then turns to you, along with a set of camera orbs that have been filming since your arrival. Their presence reminds you that your answer here is going to have layers of consequences, so you pause to think a moment before you speak.\n*goto minglechoice\n\n*label mnpopulars\n\n\"Hey, mind if I join you?\" you say as you approach the group. \"It's ${named}, by the way, though I guess I'm going by ${codenamed} now.\"\n\n\"Who?\" Reigna asks, staring at you with blank eyes. You are immediately hit with the smell of makeup and perfume, which makes sense, since Reigna has perfectly shiny jet-black hair and flawless brown skin. \n\n\"Babe, ${youdze} ${youdzewas} the hawk-hybrid in the Semi-Finals,\" Miss Boss says, reaching out her hand to shake your paw—though you're more distracted by the strong scent of leather coming from her jacket and the body oil coming from her tan skin. It's a wild experience having canine senses, to most easily identify people by smell instead of sight.\n\n\"Don't mind Reigna, she's a regular space cadet,\" Miss Boss adds, looking a bit freaked out by your twitching dog-nose.\n\n\"Oh slugger, my bad, I'm so sorry,\" Reigna gushes, looking wary of shaking your clawed paws. \"There are still so many of us left, I get confused.\"\n\nYou know you should say something, but you're too busy taking in the details of Reigna's manicured nails and Miss Boss's red…brown…wait, maybe maroon-trimmed bodysuit. Strangely, all of these minor details seem to come into sharper focus than the entire impression of each person, no doubt thanks again to your altered dog-senses. Between the details and the smells, it's all you can do to focus on behaving like a normal, social person.\n\n*page_break\n\n\"You must get that a lot, huh?\" Exile says, patting you on the back and flashing you a killer smile. He reeks of musky cologne and aftershave, which mingles unpleasantly with the sterilized metallic upgrades covering his tech-costume. \"I can't imagine how it must be to look different every day; that must be so jarring.\" \n\nYou nod at Exile, thinking that underneath that flimsy mask covering his high cheekbones, he must be very used to everyone responding well to his movie-star good looks. His buzzed hair, angular jaw, and dark-ringed eyes light up with the glow of someone quite used to attention. He must feel right at home here on The Hero Project.\n\n\"It keeps me on my toes,\" you say, figuring you should speak up. \"Well, on my paws, today.\" \n\nYou offer a little laugh at your own joke, but only O'Connell seems amused by it, drawing your attention to his towering seven-foot stature and baby powder-covered scent.\n\n\"Ha, yeah,\" he says, smiling so that his laugh lines and forehead wrinkles crease. \"Hey, one of my daughters just found out she's Ani-Powered. It's…a lot to adjust to, isn't it?\" \n\nO'Connell says this while holding his smile, but his blue eyes betray his words. You can tell that he hasn't exactly worked through what having an Ani-Powered child means to him just yet, since most people consider it something to be ashamed of. Sadly, you're used to this kind of reaction, so you just nod at O'Connell, offering as much of a smile as your dog snout will allow.\n\n*page_break\n\n\"Well, the more the merrier,\" Griffin jumps in, giving you a handshake that threatens to crack your paw. It's almost as overwhelming as the scent of bronzer wafting off of his strong jaw, or the sight of the biceps bulging through his very retro cape-and-spandex costume. \"We're all pretty hopeful about making the Final 14, given all of our airtime. You should be too!\"\n\n\"We certainly deserve it,\" Reigna says. \"I mean, I can't imagine coming this far only to get cut.\"\n\n\"I doubt you'll have to worry about that,\" Exile says, sliding his hand around Reigna's waist and causing her to giggle and lean into him.\n\nMiss Boss seems to have to force herself from rolling her eyes at this display, instead sighing and saying: \"I don't know what else we could have possibly done to qualify. Anyway, ${codenamed}, how are you feeling about everything?\"\n\nOnce Miss Boss asks this, everyone turns to you, along with a duo of camera orbs that have been filming since your arrival. Their presence reminds you that your answer here is going to have layers of consequences, so you pause to think a moment before you speak.\n*goto minglechoice\n\n*label minglechoice\n*set meetrookies true\n\n*choice\n\t#\"I'm happy to meet you all. Everyone here just seems so awesome.\"\n\t\t*label lovedroute\n\t\t*set respected %+20\n\n\t\t*if (respected > 55)\n\t\t\t*set legended +1\n\t\t\t*set lb +5\n\t\t\t*set rlshp_rookies %+25\n\n\t\t\tEveryone smiles hearing you say this, and from what you can tell, the smiles all seem entirely genuine.\n\t\t\t*goto ssinterrupt\n\t\t*else\n\t\t\t*set rlshp_rookies %+15\n\n\t\t\tEveryone smiles hearing you say this, but you can tell not all of them are genuine—everyone is still trying to figure you out.\n\t\t\t*goto ssinterrupt\n\t#\"Honestly, I just hope that all of the other Rookies besides us get cut. We're the most deserving, without a doubt.\"\n\t\t*label hatedroute\n\t\t*set respected %-20\n\n\t\t*if (respected \u003c 45)\n\t\t\t*set legended +1\n\t\t\t*set lb +5\n\t\t\t*set rlshp_rookies %+25\n\n\t\t\tEveryone smiles hearing you say this, and from what you can tell, the smiles all seem entirely genuine.\n\t\t\t*goto ssinterrupt\n\t\t*else\n\t\t\t*set rlshp_rookies %+15\n\n\t\t\tEveryone smiles hearing you say this, but you can tell not all of the smiles are genuine—everyone is still trying to figure you out. And trying to determine if you really mean what you say.\n\t\t\t*goto ssinterrupt\n\t#\"I just want to get this experience over with.\"\n\t\t*set rlshp_rookies %-25\n\t\t*set lb +5\n\n\t\tHearing this, no one really knows how to react. Instead, you're met with lots of awkward nods and half-smiles.\n\n\t\t*if (respected > 50)\n\t\t\t*set respected %+10\n\t\t\t*goto ssinterrupt\n\t\t*else\n\t\t\t*set respected %-10\n\t\t\t*goto ssinterrupt\n\t#\"I really feel confident about my own chances, so I don't feel any need to be nervous.\"\n\t\t*goto hatedroute\n\t#\"I'm so nervous. I have no idea what I'm even doing here!\"\n\t\t*goto lovedroute\n\t#\"I'm so happy to be here, especially since everyone seems so unique and interesting.\"\n\t\t*goto lovedroute\n\n*label ssinterrupt\n\n*if mingleprodigies\n\t*set rlshp_crystalline rlshp_rookies\n\t*set rlshp_transfer rlshp_rookies\n\t*goto ssinterruptreal\n*elseif minglemisfits \n\t*set rlshp_tarsiero rlshp_rookies\n\t*goto ssinterruptreal\n*else\n\t*set rlshp_griffin rlshp_rookies\n\t*set rlshp_missboss rlshp_rookies\n\t*goto ssinterruptreal\n\n*label ssinterruptreal\n\n\"${named}, there you are!\"\n\nBefore you can further gauge the Rookies' reaction, you spin to find StarSoar approaching—though really, you catch the scent of jet fuel before you even see him.\n\n\"Apologies for the interruption, everyone. I have been waiting for ${named} to arrive,\" StarSoar says to the Rookies before turning to face you. \"Do you mind if we have a moment alone? You know, to discuss important partner business?\"\n\nStarSoar smiles at you and you try to smile back, despite the fact that your heart starts thundering in your chest. Even with the past two months to think it over, you're still not entirely sure what to do about Loa Shift's \"advice\" on StarSoar's secret. The Great Loa ended up being right about the Veteran twist, but could she be right about the elimination coming down to either you or StarSoar? More importantly, could she be right about StarSoar's expulsion from NASA's Powered Cadet Program? \n\nJK did some of her best hacker digging, but still couldn't find anyone willing to talk about any experiences with Loa Shift. And while she couldn't corroborate StarSoar's expulsion, JK couldn't find any record of StarSoar's current enrollment, either. Both were very troubling discoveries, mostly because neither proves anything definitively one way or the other.\n\n*page_break\n\nWhatever the truth might be, JK implored you not to publicly ruin StarSoar's reputation. Her budding crush aside, JK believes that nothing is worth the price of selling out another Powered afflicted with a potential ability-related burden, not even her own health. JK also pointed out how betraying StarSoar would make you look, ruining your credibility as a potential positive Underrepresented Powered figure.\n\nStill, you know the decision is yours alone to make—it's your job to take care of JK, whether she approves of your methods or not. But right now, standing across from StarSoar in person, you feel even more undecided than you did before.\n*if ssknowsclinic\n\tEspecially since StarSoar knows about your visit to the Shiftsite Clinic. Whatever you do, you cannot allow him to reveal this information. You don't think he'd be capable of doing that, but then, there might be a side to StarSoar you don't know anything about. Besides, he probably wouldn't think you're capable of doing what you're currently considering, either.\n*comment endif\n\n\"Uh, hey,\" you say after you make your way back over to the bar with StarSoar. \"How was your mission?\"\n\n\"I am afraid those details are classified, but I can say that it went quite well. Thank you for asking,\" StarSoar answers, retracting his helmet visor to reveal his freckled face. \"Why did you not come talk to me when you got here? I have been very excited to see you. Is something wrong?\"\n\n\"Oh no, I'm just, uh…really nervous,\" you say, knowing this is not untrue and trying to buy some time to finally make up your mind.\n\n*page_break\n\n\"Oh, good,\" StarSoar sighs. \"I tried to mingle, but that is not my greatest talent. The group of picture-perfect heroes did not want anything to do with me, but Ignite and Crystalline seemed really nice.\"\n\n\"So for this mission, were you off-planet?\" you ask, hoping to glean some new shred of information before making this terrible decision. \"I mean, what required your attention for a whole two months?\"\n\n\"I am sorry, but I am not at liberty to inform you. Like I said, it is classified,\" StarSoar says, eyeing you with some mild suspicion. \"Anyway, how is JK doing?\"\n\nStarSoar waits for you to respond and you take a deep breath, knowing that you can't stall anymore. You're going to have to get into this now, while you still have the chance. You have to decide whether you believe Loa Shift's information and what you're going to do about it…\n\nEspecially because hearing JK's name is all the motivation you need to snap things into focus.\n\n*comment The stats for this choice have been moved into the writing chunks, to affect Stats after the event happens, not before. Also, the Rookie relationship is just for show (and an achievement), individual relationships are affected once the episode airs in Chapter Four (or really, the end of the Production Vignette).\n\n*choice\n\t#Reveal StarSoar's secret publicly in front of the cameras right now, in order to ensure my own safety.\n\t\t*gosub trial_end\n\t\t*set sspublic true\n\n\t\tYou need to do this to discredit StarSoar and bolster your own status in the Final Selection. It's the only way to guarantee everything happens the way you need it to tonight. JK definitely won't like it, but you'd rather her be angry and healthy than content and…you won't even allow yourself to consider that alternative.\n\t\t*goto revealpublic\n\t#Blackmail StarSoar off-camera; tell him that I'll reveal the truth about him if he doesn't quit the competition immediately.\n\t\t*gosub trial_end\n\t\t*set ssblackmail true\n\t\t\n\t\tUnfortunately, you know this is the only way to do what you need to do for Loa Shift and JK without totally ruining StarSoar's reputation.\n\t\t*goto blackmailss\n\t#Warn StarSoar in advance off-camera, to give him a chance to do the right thing and quit before this all inevitably comes out as a scandal and ruins his reputation.\n\t\t*gosub trial_end\n\t\t*set sswarn true\n\n\t\tThis may be the best way to get StarSoar help, if he indeed needs it. You know a secret like this will eventually come out, so you want to try to spare StarSoar that ordeal in a way that can also benefit JK.\n\t\t*goto blackmailss\n\t*selectable_if (elimthree = false) #I believe there must be more to StarSoar's potential expulsion than Loa Shift suggests, so I won't risk sabotaging him with potentially faulty information.\n\t\t*gosub trial_end\n\t\t*set ssmorestory true\n\t\t*set ssprove true\n\n\t\tYou're not willing to bet your values on the whims of Loa Shift. Besides, even if she is right about everything, you won't compromise your ideals unless you have absolutely no choice—and maybe not even then. You may be taking a risk, but you believe there's always another way, even if you have to invent one out of thin air.\n\t\t*goto provecoding\n\t*selectable_if (elimthree = false) #Prove to Loa Shift that you and StarSoar can advance together—or, at the very least, that you can advance on your own merit without sabotaging StarSoar.\n\t\t*gosub trial_end\n\t\t*set ssprove true\n\n\t\tYou won't compromise your ideals unless you have absolutely no choice—and maybe not even then. You believe there's always another way, even if you have to invent one out of thin air.\n\n\t\t*label provecoding\n\t\t*set societal %+30\n\t\t*set rlshp_jk %+30\n\t\t*set rlshp_starsoar %+30\n\t\t*set rlshp_shift %-30\n\t\t*set upa +10\n\t\t*set lb -10\n\t\t\n\t\t*if (societal > 70)\n\t\t\t*set legended +3\n\t\t\t*set respected %+20\n\t\t\t*set rlshp_eps %+15\n\t\t\t*set rlshp_rookies %+15\n\t\t\t*if (public > 50)\n\t\t\t\t*set public %+20\n\t\t\t\t*goto provess\n\t\t\t*else\n\t\t\t\t*set public %-20\n\t\t\t\t*goto provess\n\t\t*else\n\t\t\t*set legended +1\n\t\t\t*set respected %+10\n\t\t\t*set rlshp_eps %-15\n\t\t\t*set rlshp_rookies %+10\n\t\t\t*if (public > 50)\n\t\t\t\t*set public %+10\n\t\t\t\t*goto provess\n\t\t\t*else\n\t\t\t\t*set public %-10\n\t\t\t\t*goto provess\n\n*label revealpublic\n\n\"StarSoar, why are you lying to me about this supposed NASA mission?\" you ask, realizing that you have bared your teeth and started to growl a bit. You force yourself to stop and hold it together.\n\n\"I do not know what you mean,\" StarSoar answers, but you can smell the sweat and fear starting to drip off of him. It almost turns your stomach as you realize the ugly truth.\n\n\"You're lying,\" you say. \"As your partner, I feel betrayed. I didn't want it to come out this way, but I feel it's my responsibility to the competition and the public.\"\n\nAs you speak, a few more camera orbs show up to film, like automated moths to a drama-fueled flame. StarSoar's eyes grow wide—he's not sure how to react to your seemingly spontaneous speech.\n\n\"StarSoar, you were forcibly discharged from NASA's Powered Cadet Program, weren't you?\"\n\nYou say the words and the room goes silent. You must have been bark-speaking more loudly than you realized. Oh well, they're all going to find out one way or another now, you suppose.\n\n*page_break\n\nStarSoar turns a whiter shade of pale underneath his helmet, beads of sweat collecting on his forehead.\n\n\"How do you know that?\" he whispers. \"It's supposed to be—\"\n\n\"Classified?\" you say. \"StarSoar, it would be wrong to keep hiding the truth about why you were discharged.\"\n\n\"No, you're supposed to be my friend,\" StarSoar tries, his eyes wide with panic. \"You don't understand.\"\n\n\"You're right, I don't,\" you interrupt again. \"You can't really believe that we're being secretly invaded by aliens, can you? Because StarSoar, you have to know that sounds—\"\n\n\"No, it wasn't supposed to happen like this, not again,\" StarSoar chokes, placing his hands on your shoulders and locking his eyes on yours. \"I am not crazy, ${named}. You have to believe me. But there are these voices from space, warnings from the galaxy beyond. I do not know how, but my Powers let me hear them. It is a frequency that they have not yet discovered I have access to. I know that sounds—\"\n\n\"Do you have any proof of these claims? Recordings of these voices?\" you ask, feeling increasingly sick about the way this is turning out. Luckily, StarSoar falls silent at this question, giving you all the answer you need. So you keep talking, removing yourself from his grip. \n\n\"Is that why you tried out for The Hero Project, to get a platform where people might listen to you?\n\n*page_break\n\n\"You can't do that, StarSoar. It's not fair to cause that kind of panic, to spread your delusions that way,\" you say, on a roll. \"I think your Powers have altered your judgment and you need—\"\n\n\"No, my Powers let me hear and see things that no one else can!\" StarSoar cries. \"You could not possibly understand!\"\n\n\"I understand what it's like to have Powers that cloud your perception of the world,\" you say, trying to remain calm as StarSoar appears increasingly frantic. \"But you cannot let them control you. I think you need help, StarSoar. I know that's hard to hear, but as your former partner and your friend, I feel it's my responsibility to—\"\n\n\"You are no friend of mine!\" StarSoar shouts, slamming his fist down on the bar. \"I do not know who put you up to this, but do not dare pretend this is some selfless gesture.\"\n\nWhatever else you believe, that comment stings, because you know it's partially true. You wish you could tell StarSoar the real reason you're doing this, that it's all for JK—that on some level you are trying to be selfless. But you know that you can't do that, not without jeopardizing everything.\n*if ssknowsclinic\n\tWhich reminds you—StarSoar knows about JK's visit to the Shiftsite clinic, so you need to shut this down before he starts putting those pieces together. \n*page_break\n\n*set societal %-30\n*set rlshp_jk %-30\n*set rlshp_starsoar %-50\n\n*if (societal \u003c 40)\n\t*set legended +3\n\t*set lb +5\n\t*set public %+20\n\t*set upa +10\n\t*set rlshp_shift %+20\n\t*set rlshp_eps %+15\n\t*set rlshp_rookies %-10\n\t*if (respected > 50)\n\t\t*set respected %+20\n\t\t*goto iamwhoreal\n\t*else\n\t\t*set respected %-20\n\t\t*goto iamwhoreal\n*else\n\t*set legended +1\n\t*set public %+10\n\t*set upa -10\n\t*set rlshp_shift %+10\n\t*set rlshp_eps %-15\n\t*set rlshp_rookies %-15\n\t*if (respected > 50)\n\t\t*set respected %+10\n\t\t*goto iamwhoreal\n\t*else\n\t\t*set respected %-10\n\t\t*goto iamwhoreal\n\n*label iamwhoreal\n\n\"I know what is real! I am not crazy! They are coming and we have to stop them!\" StarSoar begins to scream, sweat now pouring down his face as blue thrust starts to charge around his body. \"Wait, did they get to you? Is that why you did this to me? Are you the one they put here?\"\n\nBy now, the whole room is gawking at StarSoar, and six more camera orbs have arrived to film. Slugger, you didn't know what to expect, but you didn't expect StarSoar to seem so…desperate. Or afraid. \n*if trilogyreader\n\tYou can't help but think that you just added to the long list of heroes The Hero Project has ruined. \nIs that really what you want your legacy to be? Discrediting other Powereds for struggling to cope with the issues their Powers can present?\n\nAs soon as this thought forms, however, it is replaced by another: The only legacy that matters is JK's.\n\n\"Oh, StarSoar,\" you say, taking a few steps back. \"We'll get you the help that you need. I promise.\"\n\nStarSoar then sets his gaze on you, looking just about ready to explode. You have to force a defensive growl from creeping into your throat as the standoff continues…until StarSoar abruptly turns and storms away.\n\nYou allow yourself to breathe again, though as you do, you are suddenly aware that you are not  alone—all eyes in the room fall on you now that StarSoar is gone. Noticing the weight of their collective gaze, all you can feel is:\n\n*label feelsschoice\n*choice\n\t#Absolutely horrible.\n\t\t*set respected %+10\n\t\t*label hypo\n\n\t\tYou feel like a complete hypocrite for what you've just done: using another Powered individual's issues against them for personal gain—especially a Powered individual who trusted you as a friend.\n\n\t\tYou just fed into the culture of oppression, further stigmatizing Underrepresented Powereds and those with mental health issues as unstable, second-class citizens. You might have had a good reason, but do any ends really justify these kinds of means?\n\n\t\tYou suppose, for better or worse, that the answer for you today was yes.\n\t\t*page_break\n\t\t*goto bigsplashe\n\t#Satisfied to have pulled that conversation off and to have made such a moment of it, whether I meant to or not.\n\t\t*set respected %-10\n\t\t*label nagging\n\n\t\tAdvancing in the competition has to be your priority, to save JK's life, and you just did everything you needed to ensure that will happen. Still, you can't help the nagging feeling that you just fed into the culture of oppression, further stigmatizing Underrepresented Powereds and those with mental health issues as unstable, second-class citizens. \n\n\t\tAs soon as this thought forms, however, you remind yourself that in this case, the ends justify any means necessary. And that's something you can live with.\n\t\t*page_break\n\t\t*goto bigsplashe\n\t#Courageous, oddly. I am now convinced that StarSoar really does need help. Maybe I just did him a favor, in the long run?\n\t\t*set upa +5\n\n\t\tYou want to tell yourself that, but what if you're somehow wrong about this? Or even if you're totally right about StarSoar, was that really the way to help him, given that Underrepresented Powereds and those with mental health issues are stigmatized as unstable, second-class citizens? \n\n\t\tYou can't help but have your doubts, but at least in this moment, you feel you tried to do the right thing. \n\t\t*goto bigsplashe\n\t#Numb. That just set Underrepresented Powereds back quite a bit, I'm sure.\n\t\t*set societal %+10\n\t\t*goto hypo\n\t#Like I did what I needed to do for JK. Period.\n\t\t*set societal %-10\n\n\t\tAdvancing to save JK's life has to be your priority, and you just did everything you needed to ensure that will happen. Still, you can't help the nagging feeling that you just fed into the culture of oppression, further stigmatizing Underrepresented Powereds and those with mental health issues as unstable, second-class citizens. \n\n\t\tAs soon as this thought forms, however, you remind yourself that in this case, making sure JK lives a happy and healthy life must remain your priority. To you, nothing else can be more important.\n\t\t*goto bigsplashe\n\t#Loa Shift seems to have been right about StarSoar's expulsion, but what if she and everyone else is wrong about the true nature of his Powers?\n\t\tStarSoar certainly seems to think these voices and this threat are both real, but you can't really imagine that either could be—at least until StarSoar shows some kind of concrete proof.\n\n\t\tStill, what if you're somehow wrong about all of this? And even if you're not, you can't help but feel that you just fed into the culture of oppression, further stigmatizing Underrepresented Powereds and those with mental health issues as unstable, second class-citizens. You might have had a good reason, but do any ends really justify these kinds of means?\n\n\t\tYou suppose, for better or worse, that the answer for you today was yes. You just hope this decision doesn't come back to haunt you, somehow.\n\t\t*if (societal > 50)\n\t\t\t*set societal %+5\n\t\t\t*goto bigsplashe\n\t\t*else\n\t\t\t*set societal %-5\n\t\t\t*goto bigsplashe\n\t*if (ssknowsclinic) #Worried. I just hope StarSoar doesn't decide to use his knowledge of JK's Shiftsite treatments against me now. \n\t\t*set societal %+10\n\t\tThough now that StarSoar is discredited, you suppose no one will believe anything else he has to say, anyway. \n\n\t\tRealizing this, you can't help but feel that you just fed into the culture of oppression, further stigmatizing Underrepresented Powereds and those with mental health issues as unstable, second-class citizens. You might have had a good reason, but do any ends really justify these kinds of means?\n\n\t\tAs soon as this thought forms, however, you remind yourself that in this case, making sure JK lives a happy and healthy life must remain your priority. To you, nothing else can be more important.\n\t\t*goto bigsplashe\n\n*label bigsplashe\n\nNo matter what, this scene is going to make a big splash and get you lots of attention on the show, if the producers decide to feature it. And really, how can they not? Whatever your intentions, you can be sure that this decision, along with your first Rookie mingle, will be the next major impression defining who you are on The Hero Project—assuming you advance through the Final Selection, of course.\n\n*if sspublic\n\tKnowing this, you're about to say something to the crowds of partygoers staring at you when all eyes shift to a spotlight on the stage erected on the other side of the great room. Colton Quick stands there, holding a microphone. \n\n\t\"Sorry to interrupt the festivities everyone, but the time for the Final Selection Ceremony has come.\"\n\n\t[i]Saved by the bell[/i], you think, as everyone starts to chatter again. Which is just as well—you could use a few moments to yourself to process what you've just done, not to mention a good distraction.\n\t*goto finalselection\n*else\n\tKnowing this, you're about to say something to the hidden cameras when Colton Quick's voice starts to boom over a set of loudspeakers.\n\n\t\"Sorry to interrupt the festivities everyone, but the time for the Final Selection Ceremony has come.\"\n\n\t[i]Saved by the bell[/i], you think, as the announcement ends. Which is just as well—you could use a few moments to yourself to process what you've just done, not to mention a good distraction.\n\t*goto finalselection\n\n*label blackmailss\n\n\"Hey, I have to go to the bathroom,\" you say. \"Mind coming with me to block the door? You know, dog issues.\"\n\n\"Um, okay,\" StarSoar says, looking too polite to admit this makes him uncomfortable. That's fine though, because you know you don't actually have to go to the bathroom. JK made sure to tell you before coming here that the only place you can hope to be free of cameras is the restroom, so you know this is your only chance at privacy.\n\nOne short walk later, you quickly pull StarSoar inside one of the private bathrooms and lock the door before any camera orbs can follow.\n\n\"Hey, what are you—\" StarSoar starts, but you cut to the chase before he can finish.\n\n\"StarSoar, I know about your expulsion from the Powered Cadet Program,\" you say, point-blank.\n\n*page_break\n\n\"That…that is not true,\" StarSoar tries, but you can smell the sweat and fear starting to drip off of him. It almost turns your stomach as you realize the ugly truth. \n\nStarSoar sees your nose twitching and must realize there will be no lying his way out of this, because he then asks: \"How did you find out?\"\n\nSlugger.\n\n\"It doesn't matter how I know. All that matters is that I'm not going to tell anyone,\" you say.\n*if ssblackmail\n\t\"At least, I won't tell anyone if you drop out of the competition now, before the Final Selection Ceremony.\"\n\n\tHearing this, StarSoar turns a whiter shade of pale underneath his helmet, beads of sweat collecting on his forehead.\n\n\t\"Why are you doing this?\" he whispers. \n\n\t\"Believe it or not, because I'm your friend. I think you need to quit, before this secret inevitably comes out and ruins your reputation.\"\n\t*goto moreconvo\n*else\n\t\"But as your friend, StarSoar, I need you to listen to me. You have to know that if you stay on the show, someone else is going to find out too, sooner or later. I think you need to quit, before this publicly ruins your reputation.\"\n\t*goto moreconvo\n\n*label moreconvo\n*page_break\n\n\"No, you don't understand,\" StarSoar tries, his eyes suddenly growing wide with panic.\n\n\"You're right, I don't,\" you answer before StarSoar can continue. \"You can't really believe that we're being secretly invaded by aliens, can you? Because you have to know that sounds—\"\n\n\"No, it wasn't supposed to happen like this, not again,\" StarSoar chokes, placing his hands on your shoulders and locking his eyes on yours. \"I am not crazy, ${named}. You have to believe me. But there are these voices from space, warnings from the galaxy beyond. I do not know how, but my Powers let me hear them. It is a frequency that they have not yet discovered I have access to. I know that sounds—\"\n\n\"Do you have any proof of these claims? Recordings of these voices?\" you ask, feeling increasingly sick about the way this is turning out. StarSoar falls silent at this question, giving you all the answer you need. \n\n*page_break\n\n\"Is that why you tried out for The Hero Project, to get a platform where people might listen to you?\" you ask. \"StarSoar, I think your Powers have altered your judgment and your perception of reality. I've seen this happen before, it—\"\n\n\"No, my Powers let me hear and see things that no one else can!\" StarSoar cries. \"You could not possibly understand!\"\n\n\"I understand what it's like to have Powers that cloud your perception of the world,\" you say, trying to remain calm as StarSoar grows increasingly frantic. \"But you cannot let your Powers control you. I think you need help, StarSoar.\"\n\nYou say the words and wonder if you're trying to convince StarSoar or yourself. You realize that you don't know the answer—but either way, it's too late now.\n\n*if ssblackmail\n\t\"And you think the best way to help me is to blackmail me into quitting?\" StarSoar asks, looking shattered. \"If that is your true goal here, please do not mask it with some false selfless agenda.\"\n\n\tWhatever else you believe, that comment really stings, because you know it's partially true. You wish you could tell StarSoar the real reason you're doing this, that it's all for JK—that on some level you are trying to be selfless. But you know that you can't do that, not without jeopardizing everything.\n\t*if ssknowsclinic\n\t\tWhich reminds you—StarSoar knows about JK's visit to the Shiftsite clinic, so you need to shut this down before he starts putting those pieces together. \n\t*goto moreconvotwo\n*else\n\t\"I don't understand. Did someone put you up to this?\" StarSoar asks, looking stricken. \n\n\tYou wish you could tell StarSoar the real reason you're doing this, that it's all for JK, that on some level you are trying to be selfless. But you know that you can't do that, not without jeopardizing everything.\n\t*if ssknowsclinic\n\t\tActually, hearing this reminds you that StarSoar knows about JK's visit to the Shiftsite clinic, so you need to shut this down before he starts putting the pieces together. \n\t*goto moreconvotwo\n\n*label moreconvotwo\n*page_break\n\n\"StarSoar, my motivations don't really matter, do they?\" you say. \"All that matters is that I know this is the best thing for you.\"\n\n\"I know what is real! I am not crazy! They are coming and we have to stop them!\" StarSoar begins to scream, sweat now pouring down his face as blue thrust starts to charge around his body. \"Wait, did they get to you? Is that why you did this to me? Are you the one they put here?\"\n\nSlugger. You didn't know what to expect, but you didn't expect StarSoar to seem so…desperate. Or afraid. Or potentially…dangerous?\n\n\"Oh, StarSoar,\" you say, taking a few steps away to put some distance between you and him. As you do, suddenly your dog-ears pick up an almost-imperceptible whir. And you freeze. \n\n[i]Slugger. No.[/i]\n\nYou turn to look at the mirror and realize with a burst of pure dread that it's tinted one-way glass. Which means that behind that mirror, a wall of camera orbs must be taping this entire conversation.\n\n*page_break\n\n\"Oh no,\" you whimper, causing StarSoar to turn towards the mirror. He immediately arrives at the same conclusion and matches your look of horror. All you can think is that you should have known, that you were warned everything you said and did would be up for grabs. Still, hidden cameras in the bathrooms? That feels like such a…violation.\n\n*if ssblackmail\n\tOnce the initial shock fades, all you can think is that trying to blackmail StarSoar off-camera like this is going to make you look horrible. Though as soon as the thought forms, your next one is of how this show is already changing you.\n\n\t*set societal %-15\n\t*set rlshp_jk %-30\n\t*set rlshp_starsoar %-30\n\t*set upa -10\n\n\t*if (societal \u003c 50)\n\t\t*set legended +3\n\t\t*set lb +5\n\t\t*set public %-20\n\t\t*set rlshp_shift %+20\n\t\t*set rlshp_eps %+15\n\t\t*set rlshp_rookies %-10\n\t\t*set respected %-20\n\t\t*goto sinkit\n\t*else\n\t\t*set legended +1\n\t\t*set public %-10\n\t\t*set rlshp_shift %+10\n\t\t*set rlshp_eps %-15\n\t\t*set rlshp_rookies %-15\n\t\t*set respected %-10\n\t\t*goto sinkit\n*else\n\tOnce the initial shock fades, all you can think is that, at the very least, you're probably going to come off looking good by choosing to try and help StarSoar like this off-camera. Though as soon as the thought forms, your next one is of how this show is already changing you.\n\n\t*set societal %+15\n\t*set rlshp_jk %+15\n\t*set rlshp_starsoar %-15\n\t*set upa +10\n\n\t*if (societal > 50)\n\t\t*set legended +3\n\t\t*set lb +5\n\t\t*set public %-20\n\t\t*set rlshp_shift %+10\n\t\t*set rlshp_eps %+15\n\t\t*set rlshp_rookies %+15\n\t\t*set respected %+20\n\t\t*goto sinkit\n\t*else\n\t\t*set legended +1\n\t\t*set public %-10\n\t\t*set rlshp_shift %+5\n\t\t*set rlshp_eps %-15\n\t\t*set rlshp_rookies %+10\n\t\t*set respected %+10\n\t\t*goto sinkit\n\n*label sinkit\n\n*if trilogyreader\n\tAs this realization sinks in, you can't help but think that you just added to the long list of heroes The Hero Project has ruined. \nIs this really what you want your legacy to be? Discrediting other Powereds for struggling to cope with the issues their Powers can present? As soon as this thought forms, however, it is replaced by another: the only legacy that matters is JK's.\n\nStarSoar then sets his gaze back on you, looking just about ready to explode. You have to force a defensive growl from creeping into your throat when you see the pained look that warps StarSoar's face. \n\nThat is, until StarSoar abruptly turns and storms out of the bathroom. You allow yourself to breathe again, though as you do, you are suddenly aware that you are not alone—a dozen hidden cameras are probably focusing solely on you, now that StarSoar is gone. Noticing the weight of their collective gaze, all you can feel is:\n*goto feelsschoice\n\n*label provess\n\n\"So, what do you think we should do here to push up our Leaderboard scores?\" you ask.\n\n\"Well, I don't know about that, but I do have something to tell you,\" StarSoar says, keeping his eyes on the floor. \"I have been trying to build up the courage to do so ever since I saw you back home in Dockerbay.\"\n\nYou freeze—could StarSoar be about to tell you the secret you might already know? In front of all these cameras? You just nod and stay silent, not sure what else to do.\n\n\"I am terrible at these kinds of things, but my mom told me to just come out and say it. So that is precisely what I am going to do,\" StarSoar says, taking a deep breath in. You realize you've been holding your own breath, waiting for StarSoar's announcement, so you exhale cautiously.\n\nStarSoar raises his eyes to meet yours, and then he says…\n\n*page_break\n\n\"I believe I have a crush on you, ${named}.\"\n\nAs StarSoar says the words, suddenly a rush of camera orbs flood into the space around you, like automated moths to a drama-fueled flame.\n\n\"Oh,\" you say, having no idea how to respond. Mostly because you're very unaccustomed to anyone professing any feelings for you. Actually, you don't know if you can recall that happening…ever?\n\n\"Well, maybe this dog day is not my favorite,\" StarSoar laughs, trying to break the silence left in the wake of your shock. \"But none of that Ani-stuff really matters to me. All that matters is that I like the person underneath.\"\n\n*page_break\n\nAs StarSoar speaks, all you can think is how horrible it would have been if you had chosen to expose him or sell him out, now that you know he feels this way about you. Though your next thought, rather unfortunately, is of whether StarSoar could just be doing this for the sake of the cameras and your Leaderboard scores. \n\nA quick canine read of StarSoar's flop sweat and thundering heartbeat tells you otherwise, but that momentary comfort fades as you have another thought: poor JK will be very disappointed by this, given her own crush on StarSoar.\n\nYour next thought is that you should probably say something. Anything.\n\n*page_break\n\nBefore you can respond, however, all eyes shift to a spotlight on the stage erected on the other side of the great room. Colton Quick stands there, holding a microphone. \n\n\"Sorry to interrupt the festivities everyone, but the time for the Final Selection Ceremony has come.\"\n\n[i]Saved by the bell[/i], you think—because you need to consider very carefully how you respond to StarSoar. However you really feel, you also realize that leaving the question of your feelings open-ended may help push you and StarSoar both through to the Final Selection together, if the producers think they might get a showmance out of it. And really, you need all the help you can get now, since you've gone directly against Loa Shift's advice.\n\nYou realize that you still have no way to know whether Loa Shift's claims about StarSoar's delusion-based expulsion are true, but you also know that it isn't your place to decide whether that information is revealed or not.\n\n\"We'll talk about this when we both make the Live Finals—how about that?\" you say, hoping this vague response will be enough to push you and StarSoar through together. You can be sure that answering this question, along with your first Rookie mingle, will be the next major impression defining who you are on The Hero Project—assuming you manage to advance, of course.\n*goto finalselection\n\n*label finalselection\n*page_break THE CEREMONY BEGINS\n\n*if elimthree\n\tNext thing you know, you find yourself on The Hero Project soundstage, sitting in a hooded chair and awaiting the Final Selection results. Your only thought is of what will happen next.\n\n\t*goto suspenstime\n*else\n\t*goto sitonthestage\n\n*label sitonthestage\n\nYou sit onstage, bright lights shining down and burning spots in your vision. You're seated among the other Rookies, each of you next to your partners—though StarSoar currently refuses to look in your direction. Instead, you both stare down at your plastic chairs, which are rigged with some intricate mechanics and blinking lights. You figure these will help reveal the results somehow during the ceremony, which is now being filmed in front of an actual live audience. You can't see them beyond the stage lights, but you can certainly smell them—and hear them.\n\nEspecially since they're all currently cheering the newly revealed panel of Judges sitting at a glass table facing the stage. You have trouble processing the reality of this sight: everything feels so surreal, like someone has placed a plastic film over your eyes and you're watching this on 3V. And yet every time you remind yourself that this is actually real, you're flooded with a fresh surge of nerves.\n\nSurveying the Judges, you see that The Hero Project has cleaned house from the first season and replaced the original Judges with an entirely new panel. Which makes sense, since two of the original Judges are either shamed or in jail after last season's controversy.\n*if newreader\n\tTo make a trilogy-worthy story short, JK explained to you during her Hero Project Boot Camp that a secret cabal of powerful figures created the The Hero Project as a vehicle to gain enough popularity to begin dePowering Infini-Class Powereds, who are gifted with near limitless levels of Power. This cabal and the winners of the first season came close to doing just that with their de-Powering Infinity Regulator weaponized technology. \n*comment endif\n\nConsidering what JK explained to you during her Hero Project Boot Camp, it's shocking this show got a second season after all of the failures of the first season. Apparently The Hero Project was just too big of a cultural juggernaut and ratings smash to not warrant this second season.\n\n*page_break\n\nFor you, the main takeaway from this first season was actually the existence of this de-Powering Infinity Regulator and how it might be helpful in treating Disembodied Powereds like JK. You understand why such technology has since been destroyed and banned—it sets a very dangerous precedent. Besides, you're not sure that JK would ever really want to be de-Powered. Her Powers, for better or worse, are an important part of who she is.\n\nBut the sensational first season made you realize that being a part of The Hero Project could eventually grant you access to better health care and Herologist resources, or the financial ability to explore new experimental options for JK outside of what Loa Shift can offer. You've never had access to any kind of wealth or influence, so you're curious what even a taste of both might afford you. \n\nHowever, you were also quick to remind yourself that none of these options will exist if you get eliminated tonight. Which is why you force yourself to refocus on the ceremony now, especially the pair of new Judges that you have to impress. You recognize both as heroic icons who stood against last season's corruption, but you wait for MeChip Prodigal to fill you in on the exact details.\n\n*page_break\n\n\"The decadent Diva redefines herself yet again!\" MeChip Prodigal proclaims, right on cue, as you focus on the first Judge. \"From cardiothoracic surgeon to Millennial Group leader to Infini advocate to The Hero Project Judge, The Diva's mega-sonic vocals, couture costumes, and legendary heroics have made her one of the world's foremost Infini icons—aside from yours truly, of course.\"\n\nYou look down at The Diva, who wears a striking white jumpsuit with golden metal seams, topped off with an attached white cape featuring a neon-pink interior. Her jet-black hair falls down to her waist, streaked with slivers of grey that pop against her flawless caramel skin. Instantly, you can tell why she's an icon—she radiates presence.\n\n\"I am absolutely thrilled to be here,\" The Diva says without need for a microphone, her voice sounding smooth and sophisticated at once. \"I have dedicated my life to leading and mentoring emerging heroes, so I am looking forward to grooming and selecting the next generation. I also feel it is my responsibility to right the wrongs perpetrated by this Judges Panel in the past.\"\n\n*if trilogyreader\n\t\"Ooh, sounds like someone isn't quite over her rivalry with the once-great Rebellion,\" MeChip Prodigal whispers, as if she's dishing some grade-A gossip. \"Can you really blame her?\"\n*if newreader\n\tThe Diva pauses, allowing her silence to punctuate the seriousness of her statement.\n*comment endif\n\n\"Of course, you can be sure that I will remain brutally honest, as always,\" The Diva finishes, lifting a frosted martini glass and turning towards the audience. \"Let us now raise a toast to the future of our heroes and the future of The Hero Project!\"\n\n*page_break\n\nOnce the crowd's roaring applause dies down, all attention turns to the second Judge, who sits bolt-straight beside The Diva.\n\n\"Sluggedy-cluck, The Crush gives even me the willies—and some would call me a viably vile villain,\" MeChip Prodigal shivers. \"The Crush is an equally iconic Infini figure, but for a very different set of reasons: he is a former cult leader turned hero, having triumphed over last season's efforts to vilify him. I'd be happy to see him here if I wasn't so positively frightened!\"\n\nYou look over at The Crush and can see why MeChip Prodigal feels intimidated—he seems to course with calm power and influence.\n\n\"As you all know, I come to The Hero Project as a living symbol of the power of redemption,\" The Crush begins. \"The Diva and I chose to pause our Infini Advocacy campaign and return to The Hero Project because we truly believe it can be a force for monumental positivity. This show has already proven it is capable of changing the world, but we are here to ensure that this season will be about changing it for the better.\"\n\nThe Crush and The Diva both seem to be in their sixties, but project different auras of wisdom and experience. The Crush seems almost ancient, with his curly white hair, amber eyes, and creased brown skin, while The Diva feels elegantly timeless. They both happen to be equally imposing, however.\n\n*choice\n\t#I can learn much from these two about public heroics and Powered advocacy.\n\t\t*set traditional %+15\n\n\t\tInfini Powereds recently stood at the forefront of Anti-Powered Sentiment, but you know that now it is time to shed light on the less fortunate Underrepresented Powered classifications that you inhabit.\n\t\t*if ((ssprove) or (sswarn)) or (ssmorestory)\n\t\t\t*goto thprs\n\t\t*else\n\t\t\tAfter the way you handled things with StarSoar, though, you're not necessarily doing the best job so far.\n\t\t\t*goto thprs\n\t#How am I ever going to impress these two?\n\t\tThen you remind yourself that you already have in some way, getting this far. The Diva and The Crush know firsthand what it's like to be misunderstood and feared because of their Power. You hope they can find a way to see how much more difficult this experience is for those Powereds with fewer resources at their disposal, or for those who don't look the way traditional heroes are \"supposed\" to look.\n\t\t\n\t\t*if (traditional > 50)\n\t\t\t*set traditional %+10\n\t\t\t*goto thprs\n\t\t*else\n\t\t\t*set traditional %-10\n\t\t\t*goto thprs\n\t#These Judges don't impress me all that much.\n\t\t*set traditional %-15\n\n\t\tYou've never been one to fall at the feet of Powered heroes and you're not going to start now. Still, The Diva and The Crush know firsthand what it's like to be misunderstood and feared because of their Powers. If they're smart, perhaps they'll see how much more difficult this experience is for those Powereds with fewer resources at their disposal, or for those who don't look the way traditional heroes are \"supposed\" to look.\n\t\t*goto thprs\n\n*label thprs\n\n\"For this reason,\" The Crush continues, \"we have decided to name this The Hero Project: Redemption Season. This year is all about second chances and renewed hope, not just for our show, but also for The American Protectorate, the national Powered team our winners will join.\"\n\n\"In keeping with this mission statement, we decided to further shake up the Judges Panel,\" The Diva adds. \"As you've probably noticed, there are only two of us, leaving one seat empty. This seat will be filled by a rotating series of guest Judges and Mentors from the heroic community that our show hopes to emulate. I've arranged for many of these guest stars to come from my very own heroic home, The Millennial Group, especially since many of the first season's more successful alumni ended up there.\"\n\n*if trilogyreader\n\t\"Ouch!\" MeChip Prodigal laughs. \"Note that no one has mentioned the winners on the current roster of The American Protectorate. The Producers must be hiding them away for now, what with their role in all of last year's controversy. I wonder when our giggling GG will allow them to show their fraudulent faces!\"\n*comment endif\n\n\"Most importantly, this season will be a second chance for our Veterans!\" Colton Quick suddenly shouts as he runs out on stage, causing the audience to go crazy with cheers and applause. \"Well, we are going to find out who those Veterans are very soon! However, we have a twist for you all, one that actually involves our rising Rookies…\"\n\n*page_break\n\n\"For the early part of the Live Finals, we're going to keep the Rookie and Veteran rosters secret from each other, so that neither will know who they're really up against until they finally face off!\"\n\nHearing this, you figure it's just as well to wait—as much as you might want to learn which Veterans you'll be up against this season, you know it's much more important to see whether you'll even advance to this next stage in the first place—and, of course, to learn which Rookies you'll be fighting alongside if you do. \n\nThough you wonder if you'll even get to learn that as your chair suddenly begins to hum and whine. Within seconds, a dark hood unfolds from the back of the chair like a hardtop convertible, beginning to cover you inside its shell.\n\n\"So for the time being, we're going to tuck our Rookies away,\" Colton announces, waving goodbye from across the stage. \"We'll be seeing you again later…if you're lucky!\"\n\nAs Colton says this, the hood fully descends above you and its interior lights gradually brighten. Your focus remains on a holo-screen in front of you, which reads [i]Hold For Results[/i]. You quickly realize that you're probably going to have to wait in here until your results come, left to stew in your own nerves for slugger knows how long.\n\n*page_break\n\nLuckily, MeChip Prodigal must sense your nerves, because she appears immediately to keep you company.\n\n\"Oh me oh my,\" MeChip Prodigal sing-speaks. \"I simply must know, now that it's just us: Do you fancy anyone so far? You do know how audiences love their little showmances!\"\n\nAlmost laughing at Prodigal, you realize that you haven't given that particular question much thought at all. But now that Prodigal mentions it, you do know this:\n\n*choice\n\t#I am only attracted to men.\n\t\t*set attractmen true\n\n\t\tThankfully, American culture has evolved to a place where most sexual and gender identities have been generally accepted, so you've had some freedom to explore any curiosity you may have had. In the end, you found that while others may have more fluid attractions, you are most consistently attracted to men.\n\n\t\tYou just wish this spirit of freedom and equality extended to the categories that currently divide the culture of American Powereds.\n\n\t\t\"Ah, well in that case, you'll have plenty of potential showmances to choose from,\" MeChip Prodigal teases, holding up a set of hero holo-cards and plucking them like rose petals. \"Shall you initiate ignition with Ignite? Get lost with Exile? Attempt to tame the mighty Griffin? Oh, silly me, I suppose your answer will depend entirely on who makes it through the Final Selection in the first place….\"\n\n\t\t*if ssprove\n\t\t\t*goto sstest\n\t\t*else\n\t\t\t*page_break\n\t\t\tBefore you can respond to MeChip Prodigal,\n\t\t\t*goto lbtime\n\t#I am only attracted to women.\n\t\t*set attractwomen true\n\t\t*set weaverze \"she\"\n\t\t*set weaverhir \"her\"\n\t\t*set weaverhis \"her\"\n\t\t*set weaverne \"niece\"\n\n\t\tThankfully, American culture has evolved to a place where most sexual and gender identities have been generally accepted, so you've had some freedom to explore any curiosity you may have had. In the end, you found that while others may have more fluid attractions, you are most consistently attracted to women.\n\n\t\tYou just wish this spirit of freedom and equality extended to the categories that currently divide the culture of American Powereds.\n\n\t\t\"Ah, well in that case, you'll have plenty of potential showmances to choose from,\" MeChip Prodigal teases, holding up a set of heroic holo-cards and plucking them like rose petals. \"Shall you be trying to make it Reigna? Attempting to crystallize Crystalline? Taking orders from Miss Boss? Oh, silly me, I suppose your answer will depend entirely on who makes it through the Final Selection in the first place….\"\n\n\t\t*if ssprove\n\t\t\tHonestly, you're more concerned with how you're going to let StarSoar down easy, when the time comes. He doesn't know yet that you aren't into guys, unfortunately.\n\t\t\t\n\t\t\t*page_break\n\n\t\t\tBefore you can respond to MeChip Prodigal,\n\t\t\t*goto lbtime\n\t\t*else\n\t\t\t*page_break\n\t\t\tBefore you can respond to MeChip Prodigal,\n\t\t\t*goto lbtime\n\t#I don't see gender, I see people. My attractions aren't limited by gender.\n\t\t*set bisex true\n\t\t*set attractmen true\n\t\t*set attractwomen true\n\n\t\tThankfully, American culture has evolved to a place where most sexual and gender identities have been generally accepted, so you've had the freedom to explore any curiosity you've had.\n\n\t\tYou just wish this spirit of freedom and equality extended to the categories that currently divide the culture of American Powereds.\n\n\t\tAt any rate, usually you just let your attractions be your guide, but if you had to guess, you've been feeling lately like you next might be interested in:\n\n\t\t*choice\n\t\t\t#Someone male.\n\t\t\t\t*goto bisexafter\n\t\t\t#Someone female.\n\t\t\t\t*set weaverze \"she\"\n\t\t\t\t*set weaverhir \"her\"\n\t\t\t\t*set weaverhis \"her\"\n\t\t\t\t*set weaverne \"niece\"\n\t\t\t\t*goto bisexafter\n\t\t\t#Someone with a non-binary gender identity.\n\t\t\t\t*set weaverze \"ze\"\n\t\t\t\t*set weaverhir \"hir\"\n\t\t\t\t*set weaverhis \"hir\"\n\t\t\t\t*set weaverne \"niephew\"\n\n\t\t\t\t*label bisexafter\n\t\t\t\tHowever, you know that any expectations you've had like these in the past are usually overridden by who you meet. You know it's best for you to remain as open-minded as possible. You've been attracted to all kinds of people and you value having the freedom to be attracted to whomever you want, without any restrictions.\n\n\t\t\t\t\"Ah, well in that case, you'll have plenty of potential showmances to choose from,\" MeChip Prodigal teases, holding up a set of heroic holo-cards and plucking them like rose petals. \"Shall you crossbreed with Tarsiero? Make it Reigna? Get lost with Exile? Oh, silly me, I suppose your answer will depend entirely on who makes it through the Final Selection in the first place….\"\n\ u're getting punished for that? It's slugging crap.\n\n\t\tUnfortunately, doing the right thing isn't always easy—sometimes it requires you to be better and stronger than everyone else. Maybe if you had a higher Leaderboard score or had a more societal focus, deciding to go against Loa Shift's explicit advice would have worked out more favorably…\n\n\t\tAs this horrible reality settles, all you can think is: If you could go back and do it all again, would you do things differently?\n\n\t\tWould you take the chance to do so, if you could?\n\n\t\t*choice\n\t\t\t#Return to the beginning of the evening to see if I can save myself. (Legend Cost 20)\n\t\t\t\tFaced with this fate, you realize you'd do anything to save JK—perhaps even the unthinkable?\n\n\t\t\t\tYou know now that you have to do something different to reveal the truth about StarSoar, otherwise you'll just end up right back here. So how will you handle the StarSoar situation differently, given this second chance? \n\n\t\t\t\tYou're about to find out.\n\n\t\t\t\t*set elimthree true\n\t\t\t\t*set legended -20\n\t\t\t\t*set ssprove false\n\t\t\t\t*set ssmorestory false\n\t\t\t\t*set sscrush false\n\t\t\t\t*set societal %-30\n\t\t\t\t*set rlshp_jk %-30\n\t\t\t\t*set rlshp_starsoar %-30\n\t\t\t\t*set rlshp_shift %+30\n\t\t\t\t*set upa -10\n\t\t\t\t*set lb +10\n\t\t\t\t*set legended -3\n\t\t\t\t*set respected %-20\n\t\t\t\t*set rlshp_eps %-15\n\t\t\t\t*set rlshp_rookies %-15\n\t\t\t\t*set public 50\n\t\t\t\t*page_break\n\t\t\t\t*goto ssinterruptreal\n\t\t\t#Restart The Hero Project from the beginning. I know if I achieve a higher Semi-Finals Leaderboard score or have a more societal focus, I can protect StarSoar and survive the elimination, too.\n\t\t\t\tYou're going to find a way, no matter how many times it takes you.\n\n\t\t\t\tBetter luck next time, ${codenamed}!\n\t\t\t\t*ending\n*else\n\tThese questions are answered immediately, however, as your chair fully opens and you emerge to thunderous applause and cheering from the audience. That paired with a blinding white smile from Colton tells you all you need to know:\n\n\tYou're the last Rookie to advance to the Live Finals.\n\n\tThank slugger, JK is going to get her second treatment from Loa Shift. You did it. You made the Final 14.\n\n\tThough this bleeds immediately into your second thought: StarSoar has been eliminated. \n\n\t\"While we wish to offer you congratulations, ${codenamed},\" The Diva's voice suddenly rings out, piercing through your thoughts, \"we also wish to offer you some advice. This final spot was indeed down to you and StarSoar, and to be truthful, it was meant to go to StarSoar. However, what you revealed tonight about him turned the tables.\"\n\n\t*page_break\n\t*set legended +1\n\t*achieve lowlbthree\n\n\tHearing The Diva's words, you have no idea whether to feel great or terrible about them.\n\n\t\"We cannot have StarSoar featured in the Live Finals, knowing what we do now,\" The Diva continues. \"Your actions shifted the Leaderboard in your favor tonight, ${codenamed}. But just barely. In the future, we expect you to earn your spot more…honorably.\"\n\n\tThe Diva's deep, dark eyes seem to cut you to ribbons from across the stage. Something tells you that if this decision were The Diva's alone, you wouldn't be standing here right now.\n\n\tBut you can't find it in you to feel anything other than relieved, at the moment. No matter what anyone thinks, you took your fate into your own hands tonight and changed the outcome in your favor. You shudder to think about what would have happened tonight if Loa Shift had not armed you with the truth.\n\n\tYou look across the stage and see StarSoar's still-hooded chair retreating backstage automatically. You can only imagine the message of failure displayed across his screen inside that dreaded chair. Thinking about it makes your stomach flip uncomfortably.\n\t*goto endofceremony\n\n*label endofceremony\n*page_break\n\nOnce StarSoar's chair disappears backstage, you wonder when you'll get to see him again. Then you remember that you won't be allowed any contact with him while you're on The Hero Project—once someone is eliminated, they're gone for good… \n\nAt least until you're eliminated as well.\n\nYou consider saying something onstage here and now to address StarSoar's elimination, but Colton seems to want to usher you backstage already. Besides, \n*if (sspublic) or (ssblackmail)\n\teven if you could say something, only the absolute truth about JK and Loa Shift would change anything. Since you cannot reveal that particular truth, StarSoar is going to leave the show hating you anyway, so why insult him further with empty words that will only serve to make yourself feel better?\n\n\tYou only hope that you have the chance to make it up to StarSoar someday.\n\n\t*page_break\n\t*achieve ssendhate\n\t*goto threeeend\n*elseif sswarn\n\teven if you could say something, only the absolute truth about JK and Loa Shift would change anything. StarSoar will leave the show feeling terrible about how you confronted him, even if you never meant to reveal his secret. Why insult him further with empty words that will only serve to make yourself feel better?\n\n\tYou only hope that you have the chance to make it up to StarSoar someday.\n\n\t*page_break\n\t*achieve ssendhate\n\t*goto threeeend\n*elseif sscrush\n\tprofessing any potential feelings for StarSoar this way would only cheapen them and seem like some kind of attention grab. When you tell StarSoar about any feelings you may or may not have, you want to make sure it's reality—not reality show.\n\n\tYou wish you could say something about the way The Hero Project just outed StarSoar, but until you know all the facts of how it went down, you had better keep quiet. The last thing you'd want to do is reveal something the Judges somehow didn't. \n\n\tYou only hope that you have the chance to make it up to StarSoar someday.\n\n\t*page_break\n\t*achieve ssendhappy\n\t*goto threeeend\n*else\n\tuntil you know all the facts of how it went down, you had better keep quiet. The last thing you'd want to do is reveal something the Judges somehow didn't. \n\n\tYou only hope that you have the chance to make it up to StarSoar someday. At the very least, you know he left the show on good terms with you—and you avoided having to tell him, at least for a little while, that you don't return his feelings.\n\n\t*page_break\n\t*achieve ssendhappy\n\t*goto threeeend\n\n*label threeeend\n*set lb 0\n\nAs you turn to walk backstage, the reality sets in: now that you've made it, your whole life is about to change. Which also means that you're about to spend all of your time secluded and scheduled, interacting with only the production team and six other Rookies: \n\nIgnite, Crystalline, and the four others who will advance alongside you.\n\nYou wonder who those other four might be. You certainly know who you'd like them to be, and the Rookie who currently tops your wish list is:\n\n*choice\n\t#Transfer.\n\t\tWhich means that Nitewerq\n\t\t*goto findoutseeonenough\n\t#Nitewerq.\n\t\tWhich means that Transfer\n\t\t*goto findoutseeonenough\n\t#Tarsiero.\n\t\tWhich means that Velocityl\n\t\t*goto findoutseeonenough\n\t#Velocityl.\n\t\tWhich means that Tarsiero\n\t\t*goto findoutseeonenough\n\t#Splint.\n\t\tWhich means that O'Connell\n\t\t*goto findoutseeonenough\n\t#O'Connell.\n\t\tWhich means that Splint\n\t\t*goto findoutseeonenough\n\t#Griffin.\n\t\tWhich means that Exile\n\t\t*goto findoutseeonenough\n\t#Exile.\n\t\tWhich means that Griffin\n\t\t*goto findoutseeonenough\n\t#Miss Boss.\n\t\tWhich means that her best friend and heroic partner, Reigna,\n\t\t*goto findoutseeonenough\n\t#Reigna.\n\t\tWhich means that her best friend and heroic partner, Miss Boss,\n\t\t*goto findoutseeonenough\n\n*label findoutseeonenough\nwould be eliminated. You suppose it's useless to guess at this, though, since you'll find out soon enough.\n\nBesides, in all the craziness now swirling around you backstage, one consideration seems to dominate all of the others:\n\nWhat the slugger did you just get yourself into?\n\n*achieve lvfourteen\n*finish INTERLUDE ONE: WEAVING\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first four chapters are available for free? This is the end of the free content.\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n*abort\n", "rs_nine": "*comment é x\n\n*image chap9.png center Chapter Nine: Redemption Codes\n\n*set showlittlejagged false\n*set showmissboss false\n\nYou stare at your reflection in the limo-transport window, assessing your own human face. Today you woke up as a leopard-hybrid, but the only noticeable changes have been a set of sharpened nail-claws, some spotting on your legs, and a few specks of yellow in your eyes. Actually, today's leopard hybridization has mostly enhanced your normal human body, making you taller and leaner and far more muscular than usual. Your face looks contoured and chiseled so that your best features shine, like you've been photoshopped in real life.\n\nThe irony is not lost on you: on the day you attend Miss Boss's \n*if missbossdead\n\tfuneral,\n*if (missbossdead = false)\n\thonoree ceremony,\nyou look like a slugging supermodel.\n\nYou stare at yourself, and even though it is your own face reflected back at you today, you're not sure you actually recognize anything. Everything about The Hero Project has changed your life. Completely.\n\n*fake_choice\n\t#I'm tired of struggling, tired of being forced into hard choices and being shut out and fighting for everything all the time.\n\t\t*label nostill\n\t\tIn chasing this opportunity,\n\t\t*goto cntquest\n\t#I'm tired of feeling like my life is being decided for me by others.\n\t\t*goto nostill\n\t#Now is the time I need to stay strong and remember what matters.\n\t\tStill, in chasing this opportunity,\n\t\t*goto cntquest\n\t#I don't care anymore. I can't.\n\t\t*goto nostill\n\t#I've done my best. For better or worse, that's all I can do.\n\t\tStill, in chasing this opportunity,\n\t\t*goto cntquest\n\n*label cntquest\nyou can't help but question if you've somehow lost yourself without even realizing it. The way your days look now, the things you've been through—you feel so different, like the person you were before this experience is a total stranger. \n\nThen again, could all this just mean that you've finally found yourself, instead? When change like this happens, how can you tell the difference between losing yourself and evolving? Or is it that real growth simply requires both: losing parts of yourself in order to shape something new? \n\nIf that's really the case, it's a terrifying thought—how does anyone ever know what to hold on to?\n\n*page_break\n\nThese are the kinds of thoughts that have been filling your head the past couple of days. Especially since you know they come on the heels of all the choices you've had to make, the choices you now have to live with.\n\n*if (trytosavemb) and (missbossdead = false)\n\t*achieve mbalive\n\t*set rlshp_shift %-20\n\t*set legended +4\n\n\tLike right now, when you find yourself on the way to a special ceremony to honor and rally support for Miss Boss, knowing very well you could have been on your way to her funeral instead. Miss Boss may be stuck in a cryptobiotic coma that no Herologist can figure out how to wake her up from, but she is still alive. There is still hope she may someday wake up, and that hope is a direct result of your bold decision to save her.\n\n\tJust like the fact that JK has received her third and final treatment, thanks to you. When The Great Loa appeared that terrible night and once again called you to the roof, you didn't know what to expect, especially since you saved Miss Boss's life—you may have allowed her to fall, but perhaps this is not what Loa Shift intended at all.\n\n\tHowever, when you and JK made it to the roof, there was no conversation to be had, no questions to be answered or further truths to be revealed. There was only Krystal, standing beside a tent shrouded in purple light. \n\n\t*page_break\n\t*goto toughtreat\n*elseif (trytosavemb) and (missbossdead)\n\t*achieve mbdead\n\t*set rlshp_shift %-30\n\t*set legended +3\n\n\tLike right now, when you find yourself on the way to Miss Boss's funeral, despite your attempts to save her.\n\n\tAttempts that almost cost JK her third and final treatment from Loa Shift. \n\n\tWhen The Great Loa appeared that terrible night and once again called you to the roof, you didn't know what to expect, especially since you tried to save Miss Boss's life—she might have fallen, but certainly not because you allowed it. \n\n\tYou had no way to know if Loa Shift could learn this, or if it would affect your agreement if she somehow could. You only knew you had many questions for Loa Shift about everything she has had you do.\n\n\t*page_break\n\n\tHowever, when you and JK made it to the roof, there was no conversation to be had, no questions to be answered or further truths to be revealed. There was only Krystal, standing beside a tent shrouded in purple light. And she had one message to deliver to you.\n\n\t\"The Great Loa knows all. She will honor the terms of your agreement, even though you did not. She offers this generosity for JK's sake, but you would do well to remember that Loa Shift sees all.\"\n\t*goto toughtreat\n*else\n\t*achieve mbdead\n\t*set rlshp_shift %+30\n\n\t*if bondwithmrv\t\n\t\t*set traditional %-30\n\t\tLike right now, when you find yourself on the way to Miss Boss's funeral because you allowed her to fall while you attempted to connect with The Voice.\n\n\t\t*label deadtreatment\n\t\tA decision that has in turn allowed JK to receive her third and final treatment. \n\n\t\tWhen The Great Loa appeared that terrible night and once again called you to the roof, you didn't know what to expect—except for her to uphold her end of the agreement, since you very clearly upheld yours. You also hoped that you might be able to shed some kind of light on the darkness still surrounding Loa Shift's final mandate.\n\n\t\tHowever, when you and JK made it to the roof, there was no conversation to be had, no questions to be answered or further truths to be revealed. There was only Krystal, standing beside a tent shrouded in purple light. \n\t\t\n\t\t*page_break\n\t\t*goto toughtreat\n\t*else\n\t\tLike right now, when you find yourself on the way to Miss Boss's funeral because you allowed her to fall.\n\n\t\t*if (societal \u003c 20)\n\t\t\t*set legended +4\n\t\t\t*goto deadtreatment\n\t\t*else\n\t\t\t*goto deadtreatment\n\n*label toughtreat\t\n\nKrystal then instructed JK to enter the tent, which she claimed was \"mystically\" soundproofed and camera-proofed so that The Great Loa could perform her third treatment. As usual, this only multiplied the list of questions you already had for Loa Shift, not just about Miss Boss and your shadowy mandate, but now about how this tent had been arranged despite The Hero Project's considerable compound security.\n\nYou soon realized that none of your questions would be answered, however, as only JK was allowed to enter the tent. You hesitated to allow JK to be left alone with Loa Shift after everything that had happened, but if The Great Loa has proven anything, it is at least that she remains a woman of her word.\n\nSo you stood beside Krystal in silence for hours in the early morning darkness, left alone to listen to JK's muffled screams and your own thoughts rattling around your brain. \n\n*page_break\n\nAs Loa Shift predicted, in order to fully harmonize JK's jellyfish hybridization with her bones and her spine, this third treatment had to be the toughest, longest, and most painful. You didn't leave the side of that tent for a single second while it all happened—your body even morphed into a new Ani-form as the sun crept over the tips of the mountains to the east. \n\nWhen it was all finally over, JK was so weak that Krystal had to carry her out to you. As you took JK into your arms, you were able to catch a glimpse of Loa Shift through the closing flaps of the tent…\n\nAnd she looked ragged, older, and more shriveled than anyone you have ever seen in your life.\n\nIn that moment, you could only feel bad for Loa Shift, despite everything. That vision of her, of that sad and spent shell of a woman, remains burned in your brain today. All you could think then, in the wake of what happened to Miss Boss, was:\n\n*choice\n\t#I trust Loa Shift now more than ever. Miss Boss's fall, while terrible, has pivoted the national conversation towards Underrepresented Awareness exactly the way The Great Loa predicted. \n\t\t*set rlshp_shift %+20\n\n\t\tWhether or not you agree with her motivations or methods, The Great Loa has delivered on everything she promised. Ultimately, she seems to be a great friend to the Underrepresented Powered community.\n\t\t*goto revelloa\n\t#This is Loa Shift's fault, not mine. I blame her for what happened and I need to find a way to shut her down so that she can't ever do this to anyone else.\n\t\t*set rlshp_shift %-20\n\n\t\tHowever, Krystal was quite determined to make one thing clear while you waited for JK to be healed in that tent. In fact, these were the only words she uttered to you during those long, tortured hours:\n\n\t\t\"If you have any intentions of revealing Loa Shift's involvement here once this is over, do think twice. The Great Loa has the means to protect herself and destroy you, should you move against her.\"\n\n\t\tKrystal didn't elaborate further, but you could put the pieces together for yourself. If you were ever to speak out against Loa Shift, you'd have no actual proof to back up your seemingly far-fetched claims, save for JK's word. Not only that, but admitting any involvement in this debacle would also ruin your own reputation—and possibly even send you to \n\t\t*if missbossdead\n\t\t\tjail, given what happened to Miss Boss. \n\t\t*if (missbossdead = false)\n\t\t\tjail, if Miss Boss doesn't ever wake up.\n\t\tYou have a feeling that if you ever made a move against Loa Shift, you'd find yourself suffering the same fate as StarSoar or Miss Boss.\n\n\t\tNot to mention that revealing what Loa Shift had you do would destroy all of the positive discussion that has emerged surrounding The Slaughtering and Underrepresented Powered Awareness. Whether she is truly a parasite or a savior to your community, if she were taken down, Loa Shift would no longer be able to provide her treatments to the other Disembodied Powereds who so desperately need her.  \n\n\t\tStill, while you might not have the resources to shut down Loa Shift now, you hope that someday you'll find the crack in her armor you need to lessen her considerably strong position.\n\n\t\t*page_break \n\t\t*goto revelloa\n\t#I just want to be done with Loa Shift forever.\n\t\t*set rlshp_shift %-10\n\n\t\tYou want to move on with JK and forget this ever happened. You have no interest in believing in Loa Shift or in tearing her down—not that you even necessarily could, if you wanted to. You have no evidence of her involvement in any of this, and besides, you have a feeling that if you ever made a move against Loa Shift, you'd suffer the same fate as StarSoar or Miss Boss.\n\n\t\tSo you just plan to leave this all behind you as quickly as possible.\n\t\t*goto revelloa\n\t#Whatever else I think, I can't help but feel compassion for Loa Shift—I have to wonder what kind of larger game she herself might be forced into playing.\n\t\t*set rlshp_shift %+10\n\n\t\tWhether or not you agree with her motivations or methods, The Great Loa seems to work in mysterious ways—so mysterious that you have to wonder if there's some higher power pulling her strings, the way she has tried to pull your
