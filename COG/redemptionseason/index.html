 team player…\"\n\nGalexa walks out first, seeming rigidly all business in her sleek white-and-gold costume. Underneath Galexa's glossy black hair, you spot two THP emblems on the ears of her red holo-visor headphones. She barely has time to take her seat before Colton announces her Final Selection counterpart:\n\n\"And Tarana Rain, the drama queen!\"\n\nUnlike Galexa, Tarana bursts on stage and sashays in with a model's walk, blowing kisses at the crowd—which gives her a very mixed reception. Tarana Rain's rainbow-colored braids swing back and forth as she poses onstage, displaying a golden tiara adorned with the THP emblem.\n\n*page_break\n*set showdi true\n*set showlittlejagged true\n\n\"Last but certainly not least, we have two Veterans who are actually not former contestants, but who both played pivotal roles in The Hero Project's first season,\" Colton resumes, as if he's about to say something terribly controversial.\n\n\"Di, the former First Lady, and Little Jagged, the former InfraOrder member!\"\n\nAs this duo steps out, the other Rookies beside you look flat-out stunned—and the audience doesn't seem particularly thrilled, either. That doesn't stop Di from waving to the crowd like a proper politician, dripping with poise. Di's hair is styled in a fashion-forward asymmetrical lavender-grey bob, and she wears a conservative jumpsuit clasped by an elegant diamond-crafted THP buckle.\n\nDi seems even more radiant striding next to Little Jagged, whose mirror-skin glitters in the stage lights. The golden THP bracelets Little Jagged wears sparkle too, making her look like some kind of human disco ball.\n\n\"There you have it, The Final 12 of The Hero Project: Redemption Season!\" Colton then finishes, eliciting another explosion of applause from the audience. Looking over this gathering of impressive, diverse, and famous Veterans, you can't help but think: and then there's you, a normal person thrust into an arena with celebrities, icons, former villains, legends, and even a fallen First Lady.\n\nWhat slugging chance do you stand?\n\n*page_break BACK TO THE FUTURE\n\nNow, back in the dark cave, you walk behind Little Jagged's reflective body and try to make yourself feel differently. \n\nAs overwhelming as this experience can seem, you have to remind yourself that you're not \"normal\" and, for better or worse, you never have been. You're not sure you believe there's really such a thing as normal—or if there even should be. \n\nYou may not be famous coming into this competition, but so what? You're equally valuable and unique in all the identities you represent, especially today.\n\nThat said, you still think the Veterans are fairly impressive. You already know that you're most excited to work with:\n\n*choice\n\t#Mach Girl.\n\t\t*set rlshp_veterans %+10\n\n\t\tMach Girl was your favorite to watch during JK's boot camp by far,\n\t\t*label thegossip\n\t\tso after the ceremony Weaver was sure to give you a bit of Veteran gossip: apparently Mach Girl, The Bear, and Fumble teamed up as fellow returning Finalists and decided to pull in Tarana Rain to form a majority. Though this early alliance is supposedly already strained, since it turns out that Tarana Rain and Mach Girl can't stand each other. \n\t\t*goto thenrealized\n\t#Fumble.\n\t\t*set rlshp_veterans %+10\n\n\t\tFumble was your favorite to watch during JK's boot camp by far,\n\t\t*goto thegossip\n\t#The Bear.\n\t\t*set rlshp_veterans %+10\n\n\t\tThe Bear was your favorite to watch during JK's boot camp by far,\n\t\t*goto thegossip\n\t#Galexa.\n\t\t*set rlshp_veterans %+10\n\n\t\tYou remember hoping during JK's boot camp that Galexa would make it through the Final Selection, so after the ceremony Weaver was sure to give you a bit of Veteran gossip: apparently Galexa and Di feel a bit left out of the younger-skewing Veteran squad and have bonded closely as a result. However, Galexa's outstanding leadership in the first mission has begun to build her some stronger ties with the majority alliance of Fumble, The Bear, Mach Girl, and Tarana Rain.\n\t\t*goto thenrealized\n\t#Di.\n\t\t*set rlshp_veterans %+10\n\n\t\tWhen else will you ever have the chance to rub elbows with a former First Lady? Seeing how excited you were about this, Weaver was sure to give you a bit of Veteran gossip after the ceremony: apparently Galexa and Di feel a bit left out of the younger-skewing Veteran squad and have bonded closely as a result. However, Di has also tried to act as a mentor to the hot-headed Tarana Rain, perhaps even in the hopes of disrupting the majority alliance of Fumble, The Bear, Mach Girl, and Tarana Rain.\n\t\t*goto thenrealized\n\t#Tarana Rain.\n\t\t*set rlshp_veterans %+10\n\n\t\tYou remember hoping during JK's boot camp that Tarana Rain would make it through the Final Selection,\n\t\t*goto thegossip\n\t#Little Jagged.\n\t\t*set rlshp_veterans %+10 \n\t\t*goto thenrealized\n\t#None, I'm team Rookies all the way.\n\t\t*set rlshp_veterans %-10\n\n\t\tIf everything goes according to plan, two of these Veterans will be eliminated this week instead of two more Rookies.\n\t\t*goto thenrealized\n\t#No one at all.\n\t\t*set rlshp_veterans %-10\n\n\t\tYour only focus here is doing what you have to do to ensure that JK gets her final treatment. These Veterans, however glamorous, don't matter in comparison.\n\t\t*goto thenrealized\n\n*label thenrealized\n\nAt first everyone thought the Veterans and the Rookies were revealed to each other this morning to announce a potential merge, but Colton teased that wasn't happening just yet. Instead, it turns out the ceremony was held to announce that one Veteran was going to switch to the Rookie team, to even out each side with six Finalists. The Judges then chose Little Jagged for this honor, which is how you ended up on a squad with her for today's mission.\n\nYou have to admit, you were curious what insight Little Jagged might have into the experiences of the other infamous Ani-Powereds she has met as a member of the InfraOrder. Not to mention that Little Jagged's mirrored epidermis probably qualifies her as Disembodied—this transformation has actually only made her slim body seem more gorgeous, but you remind yourself that there's much more to the Disembodied experience than how you look.\n\nEspecially because Weaver also ended up filling you in on the real reason for this unexpected switch. Apparently Little Jagged immediately didn't fit in with the already insular Veterans, and this isolation quickly spun her into exposing her struggles with alcoholism and eating disorders. Weaver said that one of the Veteran handlers, Mara, was exploiting Little Jagged's breakdown, so Lyra orchestrated Little Jagged's switch to the Rookies, hoping she'd make some positive connections there. \n\nWhich is supposedly why you were placed on a squad for this next mission with Little Jagged…and Miss Boss. \n\n*page_break\n\nLooking from Little Jagged to Miss Boss in this increasingly narrow cave, you can't seem to swallow the stone of dread that has wedged its way into your throat. Could being this close to Miss Boss for this mission mean that The Great Loa's prediction has come true, or could Loa Shift have simply known or arranged this somehow, using an unknown production source?\n\nIgnoring this dread, you try to focus instead on the importance of the mission before you. You've been sent to a secret Ani-shelter community on the ocean-side south of Millennia City, set in a cavernous clearing kept hidden by a mazelike labyrinth of entrance caves. It's so secret that even you as an Ani-Powered have never heard of it—the only reason The Hero Project learned of it was from Lolli's DRPR interrogation. \n\nLolli revealed that Scoundrel's Strike Squad regularly brings supplies to this hidden shelter and also attempts to convince potential new recruits to return with them to the much more secure and guarded InfraCity. Lolli claimed only to be revealing the time of the next scheduled drop because she was worried the shelter and the Squad would be the next targets for Ani-cide. \n\nThe Final 12 were split into four different teams to cover four different entry points, and you were made captain of your team once again, thanks to your Ani-instincts. Now all the teams are tasked with finding the cavernous shelter within the twisting tunnels, and the first team to arrive will have the best shot at capturing Scoundrel's Strike Squad. You want that to be your team for so many reasons: to avoid another Leaderboard elimination and team vote, to stop any further potential Ani-cides, and to handle your mandate from Loa Shift.\n\nYou're not sure you'll be able to juggle all of these goals, but thankfully they all currently require one thing: for you to focus on navigating the cave tunnels before you. \n\n*page_break\n\nAs you come across another juncture, you see a crude Ani-image scrawled into the wall. Lyra informed the Rookie captains that these symbols change, so she told you to follow the freshest sets, which happen to be\n*rand cavesequence 1 3\n*if (cavesequence = 1)\n\tswamp-themed today.\n*if (cavesequence = 2)\n\tsavannah-themed today.\n*if (cavesequence = 3)\n\tjungle-themed today.\nFighting the feeling of claustrophobia as you creep deeper into the cave tunnels past the \n*if (cavesequence = 1)\n\tmosquito\n*if (cavesequence = 2)\n\tgazelle\n*if (cavesequence = 3)\n\tsloth\nscrawl, you force yourself to think open thoughts. Is it just your imagination, or are the rocky ceilings getting lower as you continue further? And shouldn't your tardigrade-self be able to find a way to enjoy cramped spaces, anyway?\n\nIt doesn't help that you've been left to your own navigational devices as Little Jagged and Miss Boss chat endlessly about living in LA. You were hoping you'd be able to bond with Little Jagged, but so far all she has cared about is her best new friend, Miss Boss. \n\n\"Are you sure this is the right way to go?\" Miss Boss suddenly asks you, taking note of your latest turn and interrupting Little Jagged's monologue about Hollywood's most exclusive brunch spots.\n\n*if missbossromancescene\n\tAt first you have no idea what to say, since this is the first time Miss Boss has acknowledged your presence today. \n\t*if (tarsierohate) or (griffingone)\n\t\tYou found her silence towards you strange, but you told yourself this was Miss Boss's way of telling you that she still needs some time to \"process\" everything.\n\n\t\tHowever, you now see the look in Miss Boss's eye and get a sick feeling in your stomach, because you realize that this has nothing to do with your vote or earning her trust.\n\n\t\tHer avoidance of you has everything to do with the way you look today.\n\t\t*goto whatyoulookin\n\t*else\n\t\tGiven what happened last night, you found her silence towards you to be particularly strange—and jarring—but you told yourself it must just be because neither you nor Miss Boss want to make a showmantic move in front of the other Finalists yet. You felt good about it at first, actually, since it seemed to prove Miss Boss wasn't with you just for the showmance of it all.\n\n\t\tHowever, you now see the look in Miss Boss's eye and get a sick feeling in your stomach, because you realize that this has nothing to do with the cameras.\n\n\t\tHer avoidance of you has everything to do with the way you look today.\n\t\t*goto whatyoulookin\n*elseif tarsierohate\n\t*if officialtruehero\n\t\t*goto mbfine\n\t*else\n\t\t*goto mbpissed\n*elseif griffingone\n\t*label mbpissed\n\tYou turn to face Miss Boss and you can tell from her drawn lips that she is still angry about what happened with your vote last night. Slugger forbid she jeopardize her future in the competition by actually saying anything directly—instead, you bet she'll be passive-aggressively neutral towards you, no matter how she really feels.\n\n\t*if crushmissboss\n\t\tStill, any trace of attraction she had for you yesterday, real or otherwise, doesn't seem to be there today. Did you ruin your chances with Miss Boss by voting the way you did, or was she always just using you? \n\n\t\t*label wayyoulookton\n\t\tThen you see the look in Miss Boss's eye and get a sick feeling in your stomach, because you realize that her coldness has nothing to do with your vote.\n\n\t\tIt's about the way you look today.\n\t\t*goto whatyoulookin\n\t*else\n\t\t*goto wayyoulookton\n*else\n\t*label mbfine\n\tMiss Boss has been particularly distant during this mission, which you found odd, considering how happy she seemed with your vote last night. Shouldn't you two be all buddy-buddy, just like yesterday? Or does Miss Boss not need to charm you anymore, now that she doesn't need your vote?\n\n\t*goto wayyoulookton\n\n*label whatyoulookin\n\nAs if reading your thoughts, Miss Boss then snaps her eyes away from you. But it's too late. You saw what you saw.\n\n*page_break\n\n\"Can you not even stand to look at me?\" you say before you realize the words are coming out of your mouth—this lack of sleep and the pressure must really be messing with your impulse control.\n\nYou're not sure who might look more surprised by your words, you or Miss Boss, but either way she swallows hard and walks in silence for a few steps. Miss Boss's shadow flickers ominously against the narrow cave walls, cast from the camera orbs currently filming her from every angle. She takes a moment to process her response, no doubt keenly aware of the spotlight on her.\n\n\"When I was a little girl, I always thought my Tía Camilla had the prettiest, longest hair,\" Miss Boss begins in a slow, measured tone. \"Then one day she came home with her hair cut really short without any warning. When I saw her for the first time, I couldn't stop crying. She didn't look like the tía I had known my entire life—she looked like a total stranger. It took a few hours, but once I realized she was still the same Tía Camilla, everything was fine.\" \n\nMiss Boss then pauses, making sure to lock her eyes directly on yours for the first time today. \"It might not be ideal, but sometimes it just takes us more time than we'd like to adjust to new things.\"\n\nYou look back at Miss Boss, at her own flawless appearance, and try to measure your own response.\n\n*choice\n\t#\"If you think it's jarring for you, how do you think it feels for me?\"\n\t\t*set image %-20\n\t\t*set rlshp_missboss %+10\n\n\t\t\"I can't imagine how it feels, but I'm interested to learn,\" Miss Boss answers. \"I know it's not fair, but you might have to learn to separate a need to adjust from a lack of acceptance.\"\n\n\t\t\"I'm sorry, but that's easy for you to say,\" you respond, trying not to be caught off guard by Miss Boss's sudden directness. \"What would you know about not being accepted? You're everything the world thinks is perfect, while I'm all of the things it likes to pretend don't exist.\"\n\t\t*goto thefemconvo\n\t#\"I know I look horrific. I'm sorry,\" I say, my eyes planted on the ground.\n\t\t*set image %+20\n\t\t*set rlshp_missboss %-10\n\n\t\t\"You should never apologize for who you are,\" Miss Boss says. \"I know it's not fair, but you might have to learn to separate a need to adjust from a lack of acceptance.\"\n\n\t\t\"Maybe you're right,\" you say, trying not to be caught off guard by Miss Boss's sudden directness. \"But you don't know what it's like not to be accepted anywhere. You're everything the world thinks is perfect, while I'm all of the things it likes to pretend don't exist.\" \n\n\t\tThe last words may come out as a whisper, but you still manage to say them.\n\t\t*page_break\n\t\t*goto thefemconvo\n\t#\"The difference is that I can't control the way I look,\" I say calmly. \"Accepting me means being open to the fact that I can't make myself gorgeous like you can.\"\n\t\t*set image %+20\n\t\t*set rlshp_missboss %+10\n\t\t*goto thefemconvo\n\t#\"What would you know about looking different? You buy into all of the typical stereotypes of beauty.\"\n\t\t*set image %-20\n\t\t*set rlshp_missboss %-10\n\t\t\"You're everything our society thinks is perfect,\" you follow up. \"While I'm all of the things it likes to pretend don't exist.\" \n\t\t*goto thefemconvo\n\t#\"You're right—it's jarring for everyone, especally me. These transformations aren't just cosmetic, they're really painful, too. But I do really appreciate your honesty.\"\n\t\t*set image %-20\n\t\t*set rlshp_missboss %+10\n\n\t\t\"And I appreciate yours,\" Miss Boss says. \"I can't imagine what that must be like.\"\n\n\t\t\"I know, most people can't,\" you sigh. \"And I can't imagine what it must be like to look like you. You're everything the world thinks is perfect, while I'm all of the things it likes to pretend don't exist.\" \n\t\t*goto thefemconvo\n\n*label thefemconvo\n\n\"We need to keep moving,\" Miss Boss responds, picking up her pace behind Little Jagged's refracted body. \n\n*if missbosskiss\n\tYou're about to call Miss Boss out for being evasive yet again, especially since you probably find yourself being extra-sensitive after what happened last night. However, right now you're too distracted by Little Jagged. \n*if (missbosskiss = false)\n\tYou're about to call Miss Boss out for being evasive yet again, but you're too distracted by Little Jagged. \nShe has not only fallen completely silent, but the ends of all of her limbs have started to turn invisible. You know this is a part of her Power set, but why is she—\n\n\"Do you know what my codename stands for?\" Miss Boss asks before you can speak to Little Jagged. Whether or not you have wondered about Miss Boss's codename, it's clear she's about to tell you anyway, so you turn towards her to listen.\n\n\"It's a play on words, a throwback to the old-school feminist movement of the twenty-first century,\" Miss Boss begins. \"'Boss' reclaims the idea that a woman in power is negatively 'bossy,' while 'Miss' repurposes the old-fashioned term labeling unmarried women. Really, Miss Boss is the perfect codename for me, because it represents my experience as an aspiring heroine: being labeled and underestimated.\"\n\n*page_break\n\nYou stare back at Miss Boss as you continue to lead the way through the winding cave corridor. You knew she was holding something back all this time, but you have to admit, you weren't expecting that kind of response from her…or were you?\n\n\"Most people hear my codename and think it's silly and shallow. Just like when they see my appearance, my tight costume, and my energy Powers, they think I'm a certain type of hero,\" Miss Boss continues, her voice gaining more edge as she walks alongside you. \"People think because I'm 'traditionally beautiful' that I don't know what it's like to feel judged? All I ever am is judged by that appearance. \n\n\"That's why my mission as a hero is not just to do good by combating villains, it's also to combat the idea that heroes should all be judged by our Powers and our appearances, positively or negatively. I want to be judged by my achievements alone, but it's been very hard to achieve anything because of what people expect from me.\"\n\nHearing these words, you have so many reactions—but the first and strongest must play visibly across your face, because Miss Boss then says:\n\n\"I know what you're thinking: If that's my mission, why is this the first you're hearing about it? And why did I choose to team up with Griffin and stay silent while he took the lead so vocally? Trust me, these are things I've thought a lot about myself.\"\n\n*page_break\n\n\"The bottom line is this,\" Miss Boss sighs. \"I have so much I want to say and so much I want to do as a heroine, but I can't accomplish any of it if I'm eliminated. When Reigna was cut, it was a reminder how vulnerable I am in this competition without an energy source for my Powers or without allies to protect me.\n\n\"I know Crystalline and Ignite both have energy elements to their Powers, but they became a couple and prioritized each other so quickly that they didn't even bother getting to know me. I already knew Griffin and I also knew he needed me as much as I needed him, which would keep him loyal. So I decided to pair myself with him and let him take charge, because I knew he wouldn't have it any other way.\n\n\"Besides, I figured that if I played into everyone's shallow expectations at first, if I made myself seem less formidable, if a vote came down to me or Griffin, he'd make himself the bigger target. I may not be proud of that, but it got me here today, didn't it?\"\n\n*if griffingone\n\tHearing this, you immediately think that with Griffin gone now as the bigger target, you suppose you can't argue with Miss Boss on that point. \t\n*if transfergone\n\tHearing this, you can't help but think: given the fact that Transfer and Griffin were the names on the chopping block yesterday, something about what Miss Boss did obviously worked.\nStill, whether or not this was all for the game, did Miss Boss really need to completely silence herself beside Griffin to advance?\n\n*page_break\n\n\"Trust me, I hate that I sold out and changed myself to get ahead. I know that makes me part of the problem,\" Miss Boss continues, growing increasingly passionate. \"But do you have any idea how impossible it is to make it as a hero in LA? I've been at this for seven years and I still live in my Tía Camilla's basement in the Valley, waiting tables on the side to pay my bills. \n\n\"The Hero Project is the biggest opportunity I've ever had, the first real chance to make my dreams come true. I know all the good I can do if I gain a position of power and, in an ideal world, I wouldn't have to sell out to get that kind of platform. But I learned a long time ago that we don't live in an ideal world—we live in the real world.\n\n\"So if I have to swallow my pride and let Griffin mansplain about the old Powered order for a few days, or let everyone here think that I'm a pretty prop and not a threat, in order to make it, that's what I'll do.\" \n\nAs Miss Boss finishes speaking, tears well in her eyes. You have to admit, this sounds hauntingly familiar—being locked out of society's revolving door of privilege because of who you are and where you're from. You suppose you never really considered that someone who looked like Miss Boss could face any of those same challenges. \n\nYou want to say it was wrong for Miss Boss to feel the need to diminish herself, to play a certain role to get ahead, but then you think of your own actions here on The Hero Project…\n\n*choice\n\t*if ((sspublic) or (ssblackmail)) #I sold out StarSoar, a fellow struggling Powered, to advance myself. No matter how \"selfless\" my motivations were, how is it different from what Miss Boss has done?\n\t\t*label soldoutssroute\n\t\t*if transfergone\n\t\t\tThen, \n\t\t\t*label transferoutedration\n\t\t\twhen it came to Transfer, you allowed hir to be voted out instead of Griffin, sending another advocate for Underrepresented Powereds home to guarantee your own safety.\n\n\t\t\t*label sureyoumighttran\n\t\t\tSure, you might have believed Griffin didn't deserve to be put out to pasture while Transfer was doubting hir desire to stay in the competition—especially after what Transfer did to Griffin at the voting ceremony. Still, could it be possible you were just using that as an excuse? Or were you really and truly focused on what was best for the Rookies and who deserved to stay here most?\n\n\t\t\tWhatever the answer, these are the kind of decisions you've had to face—and it sounds like they're the same kind of decisions Miss Boss has been forced to confront, as well. \n\t\t\t*goto thatstheworld\n\t\t*else\n\t\t\tAt least you took the risk to protect Transfer, a fellow Underrepresented Powered activist, despite hir doubts and hir own mistaken attempt to sell out Griffin publicly. Still, does that make up for what Loa Shift convinced you to do to StarSoar? \n\n\t\t\tWhether it does or not, you can relate to Miss Boss having to wait and earn the opportunity to do what she felt was right, rather than risk losing everything.\n\t\t\t*goto thatstheworld\n\t*if (transfergone) #It's not like I stood up against Griffin and the expected Powered pecking order either—I chose to vote out Transfer instead.\n\t\t*goto sureyoumighttran\n\t*if (sswarn) #I did attempt to warn StarSoar instead of just straight-up selling him out. Even if that didn't turn out the way I had hoped, I did at least try.\n\t\t*goto protectssroute\n\t*if (ssprove) #Actually, I was strong enough to stand up for StarSoar and not sell him out, despite the risks.\n\t\t*label protectssroute\n\t\t*if transfergone\n\t\t\tHowever,\n\t\t\t*goto transferoutedration\n\t\t*elseif (officialtruehero) or (officialloyalcit)\n\t\t\tThen you kept your word to Transfer and protected a fellow Underrepresented Powered activist, despite hir doubts and hir own mistaken attempt to sell out Griffin publicly.\n\n\t\t\t*label keepingitright\n\t\t\tYou've not bent to the will of this game, instead remaining true to the ideals you entered with. That's been incredibly difficult and risky, but it has paid off.\n\n\t\t\tYou're willing to make the hard sacrifices required to force the real world to become the ideal world. So perhaps it's time to help inspire Miss Boss to start taking some of the same risks alongside you.\n\n\t\t\t*achieve uncompromiser\n\t\t\t*set uncompromising true\n\t\t\t*goto speakingupnow\n\t\t*else\n\t\t\tThen you took the risk to protect Transfer, a fellow Underrepresented Powered activist, despite hir doubts and hir own mistaken attempt to sell out Griffin publicly.\n\n\t\t\t*label stereosound\n\t\t\tYou've been fairly proud of your actions so far, but then you think about how you've also gotten caught up in the game to a certain extent, allowing the producers to coerce you into filling a reality stereotype. That stereotype may be a reflection of who you really are, but it's also a kind of compromise, much like the one Miss Boss felt forced to make.\n\n\t\t\tSo you have to wonder: Is there anything else you've compromised about yourself along the way to fit in here, without even knowing it?\n\t\t\t*goto thatstheworld\n\t*if (image >= 50) #I've sometimes attempted to downplay my Animalistic Morpho-Powers since being on this show, instead of wearing them as proudly as possible.\n\t\t*set image %+20\n\n\t\tYou can't really criticize Miss Boss for hiding behind her appearance when you've been downplaying your own Powered identity, can you? \n\t\t*goto thatstheworld\n\t*if (image \u003c 50) #At least I've been sure to feature my Animalistic Morpho Powers as proudly and as prominently as possible.\n\t\t*set image %-20\n\n\t\t*if (ssprove) or (sswarn)\n\t\t\tYou also risked your own safety to protect StarSoar, a fellow struggling Powered, whether it ultimately worked out or not.\n\t\t\t*goto protectssroute\n\t\t*else\n\t\t\tHowever, you did chose to sell out StarSoar, a fellow struggling Powered, to get ahead.\n\t\t\t*goto soldoutssroute\n\t*if (griffingone) #At least I stood up to Griffin and the symbols of traditional Power he seems to stand for by voting him out.\n\t\tWhatever you did or didn't say to Griffin while he was still here, you sent him packing in favor of Transfer, a fellow Underrepresented Powered.\n\n\t\t*if ssprove\n\t\t\tYou also risked your own safety to protect StarSoar, another Powered struggling with the reality of his condition.\n\t\t\t*if (officialtruehero) or (officialloyalcit)\n\t\t\t\t*goto keepingitright\n\t\t\t*else\n\t\t\t\t*goto stereosound\n\t\t*else\n\t\t\tThat said, you did choose to sell out StarSoar at first, a fellow struggling Powered, to advance yourself. You can't exactly criticize Miss Boss for remaining silent, after you took down StarSoar in this way.\n\n\t\t\tIf anything, you can relate to Miss Boss having to wait and earn the opportunity to do what she felt was right, rather than risk losing everything.\n\t\t\t*goto thatstheworld\n\n*label thatstheworld\n*achieve compromiser\n*set rlshp_missboss %+15\n\nUnfortunately for you and Miss Boss both, you don't live in an ideal world. You live in a world where for the have-nots, sacrifices like this are sometimes all-too-necessary to get where you need to be. Though the most important lesson for you, and perhaps the most surprising one, is that these Powered labels hurt everyone—even those you might have once assumed benefit the most from them.\n\n*goto speakingupnow\n\n*label speakingupnow\n*page_break\n\n\"Besides, I'm speaking up about it now, aren't I?\" Miss Boss says, interrupting your moment of self-reflection. You look up and see as Miss Boss nods over at the nearest hovering camera orb. \"I've already said all this in my confessional interviews, but I'd be shocked if any of it actually ended up airing on the show, including this conversation. This isn't exactly the best behavior for the resident 'bombshell heroine,' is it now?\"\n\nMiss Boss winks at the camera, as if issuing a direct challenge to Lyra and the rest of the producers. \"And I'm so glad to have met you, ${codenamed}, because I hope you can help me become an Underrepresented Powered activist, too. If we're going to get anywhere breaking down Powered barriers, we all have to start by supporting one another, right?\"\n\n\"Right,\" you say, somewhat dumbfounded.\n*if (missbossromancescene) or (crushmissboss)\n\tBecause in this moment, you couldn't be more attracted to Miss Boss.\n\n\tThen suddenly, you're hit with a crashing wave of dread—how can you possibly let anything bad happen to Miss Boss today, after all this? You didn't want her to \"fall\" before, but now…\n\n\t*label chancetospeak\n\tIs this your chance to truly choose action over words, to stand up to Loa Shift and never climb over another Powered, no matter what the risk?\n\n\tThe very next instant after this thought settles, however, you can't help but think of JK, who is getting stronger and stronger with every treatment. You then force yourself to wonder: Is this really your risk to take? What do you do when someone is going to be hurt no matter what you choose?\n\t*goto ljspeak\n*else\n\tWhether you agree with her about everything or not, you at least have to respect Miss Boss in this moment.\n\n\t*if (rlshp_missboss > 50)\n\t\tThen suddenly, you're hit with a crashing wave of dread—are you willing to let anything bad happen to Miss Boss today, after all this? You didn't necessarily want her to \"fall\" before, but now…\n\t\t*goto chancetospeak\n\t*else\n\t\tThen suddenly, you're hit with a crashing wave of doubt—are you willing to let anything bad happen to Miss Boss today? You haven't necessarily had the strongest relationship with her before this, but does that mean you're going to be okay with letting her \"fall\"?\n\t\t*goto chancetospeak\n\n*label ljspeak\n*page_break\n\n\"Well, you can come live with me in my Millennia City condo anytime,\" Little Jagged says, clearly wanting to change the subject. \"I can show you all the best party places!\" \n\nLittle Jagged flips her hand, causing the cave walls to dance in refracted light. You completely forgot she was even here, despite the fact that her limbs have now returned to full visibility. Your first instinct is to ask how Little Jagged has held on to such a seemingly glamorous life in LA, given the fact that she's only allowed to be out on The Hero Project as a condition of her parole. However, you can already tell that questions like this make Little Jagged extremely uncomfortable, since she has been quite literally invisible during your candid conversation with Miss Boss.\n\nYou suppose a change of subject is just as well, as you come to yet another fork in the tunnel. You were so absorbed by talking with Miss Boss that you hadn't been paying attention to how deep you've descended. The cave ceiling now threatens to scrape the top of your tardigrade head and the air suddenly smells damp, like there might be water nearby.\n\nFeeling like the air pulling into your lungs is getting thinner and thinner, you focus instead on the next set of scrawls at the forked paths. You know it's up to you to decide the next tunnel to take, so you walk into:\n\n*fake_choice\n\t#The wildebeest-scrawl tunnel.\n\t\t*if (cavesequence = 2)\n\t\t\t*set mazeright true\n\t#The frog-scrawl tunnel.\n\t\t*if (cavesequence = 1)\n\t\t\t*set mazeright true\n\t#The toucan-scrawl tunnel.\n\t\t*if (cavesequence = 3)\n\t\t\t*set mazeright true\n\nYou make the turn and travel deeper into the tunnel with confidence, not wanting Little Jagged or Miss Boss to doubt you for a moment. Which proves easy, as they lapse back into their own casual conversation.\n\n\"I've always wanted to live in Millennia City, but I never had enough money to move here,\" Miss Boss says. \"But I did hear that the heroic competition is much more intense here than in LA, if that's even possible. Plus, my dad's ex-wife is from just outside MC proper. Years after my dad left her for my mom, she wrote me this awful MeMessage saying she'd ruin me if I ever set foot in her city. I was only ten at the time.\"\n\n\"That's so intense,\" Little Jagged says, pouting a little. \"People can be so mean, can't they?\"\n\n\"She seemed like kind of a sad lady, to be honest,\" Miss Boss answers. \"Apparently she wanted kids more than anything in the world, but my dad always said he didn't want any. Then he had an affair with my mom and got her pregnant and left that poor woman to raise me, his only child, with his mistress. It's like something out of a telenovela. I guess I'd be pissed too.\"\n\n\"Yeah, but why write to you?\" Little Jagged adds. \"Her beef should be with your parents.\"\n\n\"Well, pretty soon after I was born they both died in a car accident moving from MC to LA,\" Miss Boss says, almost matter-of-factly. \"They had left me back in LA with my Tía Camilla, otherwise I probably would have been killed in the crash, too.\"\n\n*page_break\n\nMiss Boss looks intense for a moment, so you glance at a now-silent Little Jagged, wondering if either of you should say something. This certainly helps you understand why Miss Boss has felt the need to fight and struggle—and reminds you once again that you can never judge what someone has been through, no matter how they appear on the surface of things.\n\nThough this thought evaporates as you see a new set of words written on the cave wall up ahead: [i]The Falls[/i], with an arrow pointing \n*if mazeright\n\tstraight ahead.\n*if (mazeright = false)\n\taround a long curve in the cave tunnel.\n*comment endif\n\nA chill runs up your tardigrade spine. Does this latest scrawl mean The Falls are your final destination in these caves? If it does, how could this not have something to do with your Miss Boss mandate? Is it what Loa Shift saw in her vision, or could she have somehow known about this Ani-shelter destination all along? Whatever the answer, seeing these words written on the wall is more ominous than you'd like to admit….\n\n\"That's totally crazy,\" Little Jagged says, pulling your attention back into the cave. \"Are you worried she might try something now? I mean, you didn't just move to Millennia City quietly: you came here to be on the world's biggest 3V show, right?\"\n\n\"Nothing has happened since I got here,\" Miss Boss shrugs. \"It was just an empty threat made by an angry woman to a child. Besides, even if she did try something, I can take care of myself, and we're pretty insulated here on The Hero Project. How could she hope to get to me? I hear she's just some crazy old voodoo crone who lives in a hut by the docks, anyway.\"\n\nAt this, Miss Boss and Little Jagged both start to laugh. However, you stop dead in your tracks, because the realization hits you like a bolt of lightning.\n\n*page_break\n\nLoa Shift must be the ex-wife of Miss Boss's father, the one who swore revenge on Miss Boss if she ever set foot in Millennia City.\n\nWaves of shock radiate through your body, and you try your best to make some kind of sense of this. Could this be the real reason Loa Shift put you in The Hero Project? To ruin the illegitimate daughter she must believe destroyed her own life?\n\nYour mind reels at this possibility, immediately trying to disprove it. Even if Miss Boss's story is all true, and even if Loa Shift wants to ruin her, why on earth would Loa Shift have you jump through all these hoops instead of just attacking Miss Boss directly? Could this really be some long play to ruin Miss Boss when it hurts most, at the moment her dreams of heroic stardom are about to come true?\n\nThinking it through, you realize that the logistics of orchestrating something like this would be insanely elaborate. Loa Shift would have had to know months in advance not only that you and Miss Boss would make it to the Live Finals, but that you'd eventually be on this secluded, dangerous mission together. That would require one of two things: actual precognitive Power, or complete control over someone making decisions at The Hero Project.\n\nLoa Shift must have known you'd learn this eventually—is that why she filled your head with the idea that letting Miss Boss fall would be for the greater good, that it's part of some larger cosmic plan she is only partially tapped into? It would be too big a coincidence for there not to be some connection…but at the same time, this connection seems too elaborate to be planned by Loa Shift. If the goal was to hurt Miss Boss, why not just take her out with an assassin or something?\n\nUnless you are the assassin, you realize with another pang of dread.\n\n*page_break\n\nStill, out of all of Loa Shift's many loyal followers, why the slugger would she choose you for this? \n\nThat answer presents itself pretty quickly, however: given your current vow of silence, the connections that might trace your actions back to Loa Shift are too complicated to follow. And even if you were to blow the whistle now, where is your proof? None of your conversations with The Great Loa have been recorded, so it would just be your word against hers. And since this entire situation is so bizarre, who would believe you?\n\nIs that what this has been about from the very start, Loa Shift getting revenge on Miss Boss for coming to her city? Or is the less likely scenario possible: that Loa Shift is really a benevolent precognitive, guiding you to somehow sacrifice Miss Boss for the greater Underrepresented good? Could Loa Shift's potential personal connection to Miss Boss really be purely coincidental?\n\nAs this inescapable dilemma settles in your mind, you just wish you could find a way to get out from under Loa Shift's thumb, to somehow force her hand or find a way to not need her treatments. But you have no leverage and no resources, no way to save JK on your own, and no time to think of any alternatives. At this very moment you're about to arrive at a dark, dangerous place called The Falls, where you're supposed to let Miss Boss do just that. \n\n*choice\n\t#Knowing what I know now, can I possibly go through with this final task when it must mean something terrible for Miss Boss? \n\t\tOr does knowing more not even matter, considering the fact that Loa Shift seems to have you trapped?\n\t\t*goto wquickrea\n\t#What about the cameras? If I let Miss Boss fall somehow, will I in turn have to \"fall\" just as far?\n\t\t*goto wquickrea\n\t#No matter what, I won't put anyone's safety in danger, even to save JK.\n\t\tLetting other heroes get eliminated from this competition is one thing, but causing actual harm to another hero is simply out of the question. If it really comes down to that, you will just have to find another way to save JK… though what could that way possibly be?\n\t\t*goto wquickreadtwo\n\t*if (loabeliever) #I believe in Loa Shift's visions, but this new information is impossible to ignore. Is my faith in Loa Shift strong enough for me to do what must be done?\n\t\tDoes your faith in Loa Shift even matter, given the fact that she has you trapped in this situation anyway?\n\t\t*goto wquickrea\n\t*if (loaskeptic) #I've always believed Loa Shift was a thug. This just proves it.\n\t\tStill, does that change the fact that she has you trapped in this situation?\n\t\t*goto wquickrea\n\n*label wquickrea\n\nYou quickly realize that out of all of these questions piling up, only one really matters. It's the only question that has ever mattered, really: \n\nWho and how much are you willing to sacrifice to save JK?\n\n*label wquickreadtwo\n\n\"You look like you've seen a ghost,\" Miss Boss says to you, snapping you back into the cave with devastating clarity. You must look horrified, but you realize there's a new reason for that…\n\nBecause, despite your currently swirling thoughts, you really do see a ghost.\n\n*page_break \n\nUp ahead, the narrow tunnel finally opens up into a vast clearing, but about halfway there you spot the indistinct, buzzing outline of a person-shaped entity that's holding a winged Ani-victim by the neck. You can smell the burning flesh of the entity's translucent grip from here. Could this be the Ani-cide serial murderer?\n\nIt doesn't matter. You react immediately, on instinct.\n\nYour bulky tardigrade body is made for defense, but you know that this also makes you the perfect human shield—or the perfect human projectile. You fling your body forward as fast as you\n*if mazeright\n\tcan and catch the murderous energy entity off guard. It reacts defensively, dropping its Ani-victim to the ground and zapping through the tunnel into the clearing beyond.\n\n\t*page_break\n\n\tYou don't know where the ghostly energy entity has gone, but for now you throw yourself beside its fallen victim. Looking down, you find a giant foxbat Ani-hybrid lying unconscious—but thankfully still breathing. If you had arrived one second later, this Ani-Powered might have been killed.\n\n\tYou turn around and see a second entrance to this tunnel, one that is a sloping curve instead of the direct path you took. You shudder to think that if you had somehow made a wrong turn, it might have cost this Ani-Powered's life. Your whole body pulses with the reality of this situation—the slightest misstep could be the difference between life and death.\n\n\tSwallowing your fear, you check yourself: if these are the stakes you're facing, then you have to be perfect. You promise yourself here and now: no mistakes. Period.\n\n\tNo more Ani-Powereds are going to die on your watch.\t\n\t*set lb +30\n\t*goto foxbattime\n*else\n\tcan, but before your feet even leave the ground, the murderous energy entity closes its fist and burns its fingers through the victim's neck. It then zaps through the tunnel into the clearing beyond, leaving the smoking Ani-body to slump to the floor.\n\n\t*page_break\n\n\tYou don't know where the ghostly energy entity has gone, but for now you throw yourself beside its fallen victim. Looking down, you find a giant foxbat Ani-hybrid lying unconscious…and not breathing. If you had arrived one second earlier, maybe you could have saved this Ani-Powered. \n\n\tYou turn around and your heart sinks as you see a second entrance to this tunnel, one that is a direct line instead of the sloping curve you took. You must have made a wrong turn somewhere, and that mistake came at the cost of this Ani-Powered's life. Your whole body pulses with the sting of this miscalculation—how could one misstep be the difference between life and death?\n\n\tSwallowing the pain, you check yourself: if these are the stakes you're facing, then you have to be perfect. You promise yourself here and now: no more mistakes. Period.\n\n\tNo other Ani-Powereds are dying on your watch.\n\t*set lb +15\n\t*goto foxbattime\n\n*label foxbattime \n*page_break\n\nThat's when you realize this victim's gnarled bat-face and giant wingspan belong to Foxwing, a member of Scoundrel's Strike Squad. Looking across the remainder of the tunnel that leads to the clearing, you find it is lined with the broken and burned bodies of the rest of the Squad. You fight the urge to vomit as the sights and sounds of the scene hit your senses.\n\nInstead, you turn to Miss Boss and find that she looks paler than you've ever seen her, frozen in place. Behind her Little Jagged begins to sob, tears reflecting off her glass cheeks so that their shadows run down the dark cave walls. With the smell of freshly spilled blood in your nostrils, it almost looks like the cave walls themselves are bleeding. The camera orbs swivel silently to capture the scene and you resist the urge to smash them, instead turning away. \n\nWhen you do, you spot one of the victims just before the entrance of the clearing suddenly twitch. Hoping it isn't some horrible death spasm, you rush forward as fast as your lumbering tardigrade body will go, your heart pounding mercilessly in your chest. Miss Boss rushes past you and gets there first, kneeling beside the body on the ground. As you approach, you see that it's Scoundrel, the turkey-human leader of the Strike Squad. Her wings are broken and her feathers are badly singed, but she's still alive.\n\n\"I…\" Scoundrel whispers in a scratchy voice. \"I played dead. How could I…I couldn't….\"\n\nScoundrel's beady eyes dart back and forth, and you think she must be in shock—which makes sense, since she lies nestled between the lifeless bodies of her longtime teammates, The Hound and Sheathe. You know from your briefing that all three of these Strike Squad members are vicious and skilled fighters, which means that whoever took them down must be hard-core. You don't even want to think what kind of horror could have spooked someone as dangerous as Scoundrel enough to play dead like this….\n\n*page_break\n\nA nauseating wave of fear suddenly seizes your entire body, because whoever is killing all of these Ani-Powereds is obviously still here. You can't decide what terrifies you more: the fact that you're very visibly Ani-Powered yourself today, or that this killer has been turned loose in a shelter filled with innocent Ani-Powereds. As this thought pierces your mind, suddenly you hear the sound of fighting—or butchering—coming from the drop into the clearing beyond.\n\nIn one searing instant, all of your fear is quickly burned away by a flash of rage. Someone is killing your people. And you have a chance to stop them, right here and now.\n\n\"Lyra, are you seeing this?\" Miss Boss speaks into her comm, trying hard to keep her voice from breaking. \"Send medical evac immediately. What are our orders? I think we're the first team to arrive here.\"\n\n\"Rookies, hold,\" Lyra's voice suddenly says over the comms. But you can quickly tell that the connection isn't strong this far into the caves, since static breaks up most of Lyra's following orders: \"…wait…reentering…backup…\"\n\nFor you, Lyra's voice fades into the static with everything else, because you already know what must be done.\n\n*page_break\n\n\"Little Jagged, stay here and defend any survivors,\" you say, ignoring Lyra's fractured order to wait. \"Can you do that?\"\n\nLittle Jagged has stood in the same place sobbing since you arrived here, but your words seem to snap her into some sort of reality. Nodding at you, Little Jagged breaks off two of the largest glass skin shards from her upper thighs and holds them ready. This display would be more convincing if Little Jagged wasn't shaking so visibly, but you figure she should at least be able to handle this task until the other Finalists arrive. \n\nEspecially since you have something far more grim planned for yourself.\n\n\"${codenamed}…retreat…\" Lyra's voice tries to speak over the comms, but you continue ignoring her.\n\n\"Miss Boss, I'm going into that clearing below to stop this,\" you begin, knowing what you say next is very, very important. \n\n*choice\n\t*if (missbosskiss) #\"Daniela, listen to me: I can't have you risking your life by defying orders. I'm begging you, please stay here and protect Little Jagged.\"\n\t\t*set societal %+15\n\t\t*set rlshp_shift %-15\n\t\t*set rlshp_missboss %+20\n\n\t\tYou think about the moment you shared with Miss Boss last night, about how amazing it was. The thought of that being the last one you ever get scares you more than you can even admit. \n\n\t\t\"After what happened last night, you must be insane to think I'd let you go in there alone,\" Miss Boss says, mustering the courage to wink at you. \"Whatever is happening in there, we will face it together. Besides, I already told you: I'm not holding back anymore.\"\n\n\t\tMiss Boss slides her hand into yours and squeezes it tight, causing your heart to nearly explode with gratitude and terror at the same time.\t\t\n\n\t\t*page_break\n\t\t*goto starebackattheboss\n\t#\"You need to stay here with Little Jagged to protect the entrance and wait for backup, like Lyra is commanding.\"\n\t\t*set societal %+15\n\t\t*set rlshp_missboss %+10\n\t\t*set rlshp_shift %-15\n\n\t\t*label nocomewith\n\t\t\"No, I'm coming with you,\" Miss Boss responds without hesitation. \"I told you, I'm not holding back anymore.\"\n\n\t\t*label starebackattheboss\n\t\tYou stare back at Miss Boss, wishing you could tell her the whole story without risking everything. You know you don't want Miss Boss to get anywhere near The Falls, but you also don't have time to discuss this with her while more potential lives hang in the balance.\n\n\t\tPart of you wants to knock Miss Boss out right here on the spot to keep her safe, but you're worried that leaving her defenseless will only make things worse—especially if you do so in front of these cameras and Little Jagged. Plus, the truth is that you're probably going to need all the help you can get against this unknown, deadly foe.\n\n\t\tSo despite your reservations, you nod at Miss Boss and try to hope for the best, even though you know you're about to walk into a potential death trap together. Could Loa Shift possibly have known it would turn out this way? You wish everything wasn't happening so fast, that you just had more time to stop and think….\n\n\t\tInstead of focusing on these doubts, you force yourself to touch the locket resting against your chest. Feeling it between your fingers, you try desperately to remind yourself: What would JK want you to do?\n\n\t\tDo everything you still can to protect Miss Boss moving forward, no matter the potential cost, that's what.\n\t\t*goto intheclear\n\t#\"You don't have to come with me, you can obey Lyra's orders.\"\n\t\t*set rlshp_shift %-15\n\t\t*if (societal > 50)\n\t\t\t*set societal %+10\n\t\t\t*goto nocomewith\n\t\t*else\n\t\t\t*set societal %-10\n\t\t\t*goto nocomewith\n\t#\"Are you coming with me?\"\n\t\t*set societal %-15\n\t\t*set rlshp_shift %+15\n\t\t*set eggedonmb true\n\n\t\t\"Of course I'm coming with you,\" Miss Boss responds without hesitation. \"I told you, I'm not holding back anymore.\"\n\n\t\tYou nod at Miss Boss, feeling a pang of guilt in your chest. The truth is that you're going to need all the help you can get against this deadly foe—but is that your real motivation here? You're walking alone into a death trap near \"The Falls\" with Miss Boss and you just encouraged her to come with you, instead of trying to stop her. \n\n\t\tCould Loa Shift possibly have known this would happen, or are you forcing it to turn out this way because of her influence? \n\n\t\tInstead of focusing on these doubts, you force yourself to touch the locket resting against your chest. Feeling it between your fingers, you try to picture way JK will look once Loa Shift completes her final treatment.\n\n\t\tAnd that's all the motivation you need.\n\t\t*goto intheclear\n\t#\"Please don't come with me. I can't explain it, but I have a very bad feeling about you going in there.\"\n\t\t*set societal %+15\n\t\t*set rlshp_shift %-15\n\t\t*set rlshp_missboss %+10\n\t\t*goto nocomewith\n\n*label intheclear\n*page_break\n\nYou lumber-run beside Miss Boss towards the mouth of the tunnel clearing, thankful that The Hero Project allowed her to bring her energy-source weapons belt on this mission, since she isn't paired with an energy Powered. She currently holds a sleek plasma hand cannon in her grip, but two more plasma guns and several energy grenades also hang from her belt. Despite the horror of this situation, you are at least happy to have someone as capable as Miss Boss by your side.\n\nOnce you reach the tunnel's edge and overlook the drop into the cave opening, you realize that you're going to need all of the energy help Miss Boss can provide. The cavernous clearing is set up as a makeshift campsite, strewn with sleeping bags and tents. A wall of generators powers scattered hot plates and 3V screens and appliances—these Ani-Powereds must have been living here this way for a while. Is this what it has come to for them to feel safe, to live outside of society like this? The sight threatens to break your heart.\n\nThough not as much as the sight of a dozen or so Ani-Powered bodies littering the ground, all as battered and bloody as the Strike Squad. You almost cry out, but silence yourself as you spot something moving in the corner of the cave. \n\nThe first thing you notice is its hairless skin, colored an odd fleshy pink and speckled red…with what you realize must be blood splatters. The brute is short, barely five feet tall, but its stocky body ripples with muscles, and it has massively oversized hands. One of these hands currently holds the entire torso of a sobbing frog-hybrid Ani-Powered.\n\nThe brute looks up as you stand at the tunnel's edge, setting its milky yellow eyes on you and Miss Boss. Its gruesome face has no lips, just a few square teeth that stick out of its exposed gums. Registering you and Miss Boss, the brute slowly steps back and winds up to throw the frog-boy at you.\n\n*page_break\n\nYou have no idea where that ghostly energy entity went, but obviously you have to deal with this brute first. Trying to ignore the fact that there seem to be multiple murderous threats here, you turn to Miss Boss.\n\n\"I'll get the frog-boy—you blast that thing into oblivion,\" you whisper, just as the brute lets the frog-boy fly in your direction.\n\nReacting quickly, you dive off the cliff towards the screaming frog-boy as Miss Boss leaps forward beside you, tucking into a midair tumble. She fans out in the opposite direction while you open your arms to grab the frog-boy. He crashes into your chest with a thud that instantly knocks him out, but you know this is better than his hitting your armored back, which you use to break your fall onto the cave ground below.\n\nIt takes a few seconds for you to lay the frog-boy down safely and get back on your feet, but once you do, you find Miss Boss striding towards the brute, firing blasts of plasma-cannon energy at it. The brute takes the blasts point-blank, grunting with each hit and moving forward as the plasma energy burns nasty holes in its pinkish flesh.\n\nSeeing this, you realize it's time to get your hands dirty.\n\n*if warningsysnine\t\n\t*if (fighting > 60)\n\t\t\"Don't use your Kung Fu Fighting specialty,\" MeChip Prodigal suddenly advises you, strangely devoid of her usual quips. Even she must recognize the gravity of this situation \"It's better to balance your Power use here based on your Physical or Intangible strengths.\"\n\t\t*goto tardibattleone\n\t*elseif (fighting \u003c 40)\n\t\t\"Since you've been pushing your Powers, it's better to focus on balancing with Fighting,\" MeChip Prodigal suddenly advises you, strangely devoid of her usual quips. Even she must recognize the gravity of this situation. \"I'd use your Kung Fu specialty here.\"\n\t\t*goto tardibattleone\n\t*else\n\t\t\"Make sure to honor your Physical or Intangible strengths if you use your Powers here,\" MeChip Prodigal suddenly advises you, strangely devoid of her usual quips. Even she must recognize the gravity of this situation. \"Since you've been balancing your Powers and Fighting, though, you could also utilize your Kung Fu speciality.\"\n\t\t*goto tardibattleone\n*else\n\t*goto tardibattleone\n\n*label tardibattleone\n*choice\n\t#I hurl my invulnerable tardigrade body at the brute like a human battering ram. (Power Cost 10-20)\n\t\t*set physical %+20\n\t\t*set fighting %-15\n\n\t\tTaking off at full force, you hurl yourself forward and slam your armored body into the brute before it has the chance to react—luckily it proves to be fairly slow anyway.\n\n\t\t*if (physical > 65)\n\t\t\t*achieve physhighfinal\n\n\t\t\tIt feels like hitting a brick wall, but the brute is sent reeling backwards.\n\t\t\t*label goodoutcomeone \n\t\t\t*set lb +30\n\t\t\t*set power -10\n\t\t\t*goto mbblaster\n\t\t*else\n\t\t\tIt feels like hitting a brick wall, knocking the wind out of you, but the brute is sent reeling backwards.\n\t\t\t*label lessoutcomeone\n\t\t\t*set lb +15\n\t\t\t*set power -20\n\t\t\t*set health -15\n\t\t\t*goto mbblaster\n\t#I feel a well of invisible Power tingling in my hands, so I access that. (Power Cost 10-20)\n\t\t*set physical %-20\n\t\t*set fighting %-15\n\n\t\tInvisible Animalistic force crackles just behind your fingertips, and you know there's something there to access. Lifting your hands towards the brute, you feel crytobiotic force surge into your palms and drain from your body. You didn't know you could do that, but discovering new Powers has become a very regular part of your daily experience. \n\n\t\tThis invisible cryptoblast slams into the brute, shriveling and dehydrating its muscles at the point of contact.\n\t\t*if (physical \u003c 35)\n\t\t\t*achieve intanhighfinal\n\t\t\tThis is a very slugging cool display, especially because the blast fires without a hitch, thanks to your Intangible expertise.\n\t\t\t*goto goodoutcomeone\n\t\t*else\n\t\t\tThis is a slugging cool display, but you can feel it drain your Power and Health more than usual, since you're not experienced accessing such a strong Intangible move.\n\t\t\t*goto lessoutcomeone\n\t#Take this brute down with my ${kungfuspecialty} prowess, not my Powers. (Health Cost 10-20)\n\t\t*set fighting %+15\n\n\t\t*if kungfucrane\n\t\t\tTaking a moment to focus your qi, you prepare to engage, knowing your goal is to strike with the length of your limbs to keep your opponent at maximum distance. Breaking into as much of a run as your tardigrade body will allow, you sweep into a circular pattern around the brute.\n\n\t\t\tThen, without warning, you focus your qi into one strike, shaping your fingers into a crane-beak that jabs into the brute's neck.\n\t\t\t*label kungfuoutcomes\n\t\t\t*if (fighting \u003c 60)\n\t\t\t\tIt feels like hitting a brick wall, but the brute is sent reeling backwards as you tumble a safe distance away.\n\n\t\t\t\t*achieve fightinghighfinal\n\t\t\t\t*set lb +30\n\t\t\t\t*set health -10\n\t\t\t\t*goto mbblaster\n\t\t\t*else\n\t\t\t\tIt feels like hitting a brick wall, and you can immediately tell that this blow has cost you extra Health, but the brute is sent reeling backwards as you tumble a safe distance away.\n\n\t\t\t\t*set lb +15\n\t\t\t\t*set health -35\n\t\t\t\t*goto mbblaster\t\n\t\t*elseif kungfusnake\n\t\t\tTaking a moment to balance your qi, you prepare to engage. Breaking into as much of a run as your tardigrade body will allow, you sweep into a display of coiled positions around the brute, distracting him.\n\n\t\t\tThen, without warning, you snap into a series of darting strikes, dealing rapid-fire blows with your finger bite-strikes and open-palm snake-head blows.\n\t\t\t*goto kungfuoutcomes\n\t\t*elseif kungfutiger\n\t\t\tNot wasting a moment, you charge at the brute and attack directly, first catching it off guard with a series of low kicks. Then you form a tiger claw, slightly bending your thumb and fingers, and strike your open palm into the brute's face.\n\t\t\t*goto kungfuoutcomes\n\t\t*elseif kungfuleopard\n\t\t\tNot wasting a moment, you charge at the brute and attack directly, first catching it off guard with strikes to inflict pain in soft-tissue vital areas. Then you form a leopard paw, a half-fist ridge of knuckles, and strike it into the brute's face.\n\t\t\t*goto kungfuoutcomes\n\t\t*else\n\t\t\tNot wasting a moment, you charge at the brute and attack directly, first catching it off guard with full-fist strikes to its body. Then you seamlessly spin into a dragon-tail kick that lands squarely in the brute's chest.\n\t\t\t*goto kungfuoutcomes\n\n*label mbblaster\nThe brute sways on its feet, and you can't believe that blow didn't knock it clean out, but you can tell it is at least completely disoriented. Which will leave it vulnerable to a finishing strike. \n\nRight on cue, Miss Boss lobs one of her plasma grenades to cover you. The grenade explodes at the brute's feet in a blue blast of heat energy, melting the brute into a putrid pink puddle. As this happens, you hear a scream in the distance and turn to find a second cavernous clearing, accessed by another short tunnel from this first clearing.\n\nYou're distracted from this scream, however, when Miss Boss swings her hands upwards and pulls the excess plasma energy into a cloud above her, then compresses it into a supercharged ball between her palms. The ball hovers behind Miss Boss like a camera orb, ready to be used later. \n\nBefore you can comment on how slugging cool that was, you hear another loud zapping sound, followed by the shattering of glass.\n\n*page_break\n\nYou spin to find Little Jagged careening off of the tunnel ledge above, followed by an electric blur that streaks its way across this cave clearing and into the second one. You rush forward to catch Little Jagged, wondering when that energy entity might be back to strike again—and what other horrors await you in the second clearing it just escaped to. \n\nYou catch Little Jagged easily and lay her down on the ground as carefully as you can manage. Her glass skin is shattered in places and actually smoking, but that's not as grim as the sight of her right leg, which is broken at an odd angle. She's badly banged up, but thankfully still alive and awake.\n\n\"That energy thing caught me off guard, but I saved \n*if mazeright \n\tScoundrel and Foxwing,\"\n*if (mazeright = false)\n\tScoundrel,\"\nLittle Jagged croaks, looking up at you and Miss Boss. \n\n\"You did good,\" you say, grabbing Little Jagged's hand. \"Do you need—\"\n\n\"Don't worry about me, I regenerate pretty quickly,\" Little Jagged interrupts. \"Worry about that thing coming back. Did you hear Lyra's update?\"\n\nYou and Miss Boss shake your heads—you must not get comm reception this deep in the cave. \n\n*page_break\n\n\"It sounds like the other three teams entered through decoy tunnels, so they're re-exiting and rounding on our location,\" Little Jagged says through sputtering coughs. \"But it may take them a bit longer. Lyra and mission control want you to wait before engaging any further.\"\n\n\"We don't have time to wait—there are lives at stake,\" you say, glancing over at the frog-boy you just saved, as a reminder. \"Will you be all right if we leave you here until the others arrive? Can you do your refractive invisibility thing?\"\n\nLittle Jagged nods, causing the lights in the cavern to dance on her skin until she starts to disappear, almost as if she is teleporting away. And not a second too soon, as Miss Boss suddenly shouts: \n\n\"Incoming!\"\n\n*page_break\n\nYou spin to find the energy entity zapping back into the cave like a crackling bolt of lightning—straight at you. You have no time to move, but that's fine, because you instinctively find your tardigrade self entering cryptobiosis. Thank slugger it does, because you suddenly feel your entire body being fried by hundreds of volts of electricity. The pain is excruciating, and you scream out involuntarily, but you can tell there's no actual damage being done.\n\nThe energy entity must register this, because it suddenly shifts from electric to heat energy in an attempt to roast you alive. The temperature escalates so quickly that you feel as if you are being cooked by a nuclear blast. Thankfully, despite the searing pain, your body holds against the assault.\n\nStill, it is abundantly clear that this thing is not playing games here—it is trying its best to kill you.\n\nThrough the blaze, you manage to see Miss Boss slam her hand forward, causing the excess energy ball to connect with the heat radiating around you. You hear an electric scream and the energy entity removes itself from you, shorted out by the plasma ball. For a moment the entity reforms into a vaguely human shape across the cave, then it rockets back into the second clearing in a burst of living flame.\n\n*page_break\n\n\"Thanks,\" you croak at Miss Boss, regaining your bearings as your body exits its cryptobiotic state. You feel significantly lighter and very, very thirsty, but other than that, you're completely unharmed. \"I'm pretty durable in this form, fortunately.\"\n\n\"You picked a very slugging good day to be invulnerable,\" Miss Boss says, laughing nervously. \"And whatever that thing is, it picked a very slugging bad day to be made of energy. Now that I've got its signature mapped, I'm going to be its worst nightmare.\"\n\n\"Then let's go end this,\" you say, rising to your feet and looking towards the narrow tunnel leading to the second cavernous clearing—which you now see is clearly marked with another scrawl:\n\n[i]The Falls.[/i]\n\n*choice\n\t#Before I even have a moment to process where we're headed, I find myself following Miss Boss as she runs forward.\n\t\t*set rlshp_missboss %-5\n\t\t*goto secoalerai\n\t#I want to stop Miss Boss, but I still can't see a way to do it without risking everything.\n\t\t*set rlshp_missboss %+5\n\t\t*goto secoalerai\n\t#I want to stop Miss Boss, but after these preliminary fights, I know there's no way I'll survive this experience without her help.\n\t\t*goto secoalerai\n\t#We may be moving forward, but I will not let anything happen to Miss Boss. I will protect her at all costs. \n\t\t*set rlshp_missboss %+10\n\t\t*goto secoalerai\n\t#I lead the way into The Falls, knowing Miss Boss will follow.\n\t\t*set rlshp_missboss %-10\n\t\t*goto secoalerai\n\n*label secoalerai\n\nYou enter the second cave clearing to find another makeshift campsite, except this one has a group of limp Ani-teen bodies strewn over a broken pool table. \n\nAcross from them you see a small group gathered together, posing dramatically as if they are awaiting your arrival. Scanning them, you see a slim and short ballerina, the buzzing outline of the energy entity, and five more identical copies of those stunted brutes. Seeing their numbers makes your stomach drop—it took both you and Miss Boss to take down just one of those brutes…\n\nThen you see that the smaller brutes all surround a taller, seemingly more intelligent version. Could the small brutes all be copies of this original? Looking him over, you find that he seems familiar somehow, but you can't quite place him. Especially because you're more focused on the vast blackness that looms behind this gathering, one that seems to mark the steep, sharp drop-off of a cliff. Seeing it sends a chill up your spine, and you have to stop yourself from shaking.\n\nMiss Boss gasps beside you and you think it's because of this deep internal cliffside until you see him too: the goggle-guy from The Hero Project Semi-Finals, the one Miss Boss and Reigna knocked out in that infamous viral video. Recognizing him, you are instantly able to place the brutes. too—they look like the set of conjoined triplets partnered with the goggle-guy during the Semi-Finals.\n\nWhat the slugger are they doing here?\n\n*page_break\n\nThe energy entity slips forward to strike again as you and Miss Boss try to process everything, but the goggle-guy puts his arm out to stop the thing. His lenses begin to glow, and an image projects itself above his head, several fiery letters that spell: [b]Allow us to introduce ourselves.[/b]\n\nThe energy entity holds in place, which means the goggle-guy must be their leader. You can feel Miss Boss thumbing her plasma hand cannon at your side, but you both hold off. You need to know what's going on here before you attack rashly.\n\n[b]We've been waiting for your cameras to catch up to us. We thought they never would.[/b] The image above the goggle-guy's head shifts into a dark black font—obviously he must have some kind of illusionist projection Powers, but why is he using these images instead of speaking?\n\n[b]Now that you have found us, you will hear us. All we ever wanted was the chance to be heroes, to be accepted, to be given the same opportunities as everyone else. But we were struck down, mocked, shut out, ignored. We were made a laughingstock, degraded as less than human because of the way we look.[/b]\n\n[b]Our society is broken and corrupt, and the heroes who defend it are morally bankrupt: plastic automatons vying for camera flashes and bloated paychecks, praying that any villains bold enough to define them will run free in the streets. Those of us who don't fit the mold are cast out, left to rot as living punchlines.[/b]\n\n*page_break\n\n[b]This is the experience of the Disembodied: we are unheard, unrepresented, and unwanted. But that all changes with us. We will be the heroes the world deserves.[/b]\n\nReading these last, blood-red words, you feel dizzy and heavy at the same time. Your whole body goes numb.\n\nYou always assumed the Ani-cide killers would be some kind of backward bigots, not….\n\nYou look over this gathering, the energy entity and the brutish clan and the goggle-illusionist, and you realize they are your people. \n\nThey are Disembodied Powereds, just as they say.\n\n*choice\n\t#\"How can you think that killing people makes you heroes?\" I cry out, without thinking.\n\t\t*set traditional %+15\n\t\t*set respected %+15\n\n\t\t*label desptimes\n\t\t[b]Desperate times call for desperate measures,[/b] the goggle-guy answers you in metallic gold text imagery. [b]The times call for the elimination of all Animalistic terrorists, even those in this recruitment camp.[/b] \n\t\t*goto theworstofit\n\t#\"I agree with everything you are saying, about society and the Disembodied experience,\" I find myself saying, almost on instinct. \"But how can murdering other Underrepresented Powereds help change anything?\"\n\t\t*set traditional %-15\n\t\t*set respected %-15\n\t\t*goto desptimes\n\t#\"The Ani-Powereds in this shelter are innocents,\" I try to say, my voice shaking uncontrollably. \"Going after the InfraCircle is one thing, but these others have done nothing wrong; they're outcasts too.\"\n\t\t*set traditional %-15\n\t\t*set respected %+15\n\n\t\t[b]Innocents?[/b] the goggle-guy answers you in metallic gold text imagery. [b]This is a recruitment camp, a training ground for Animalistic terrorists.[/b] \n\t\t*goto theworstofit\n\t#There's nothing I can say. These people are warped versions of everything I believe in. They simply need to be taken down.\n\t\t*set traditional %+15\n\t\t*set respected %-15\n\t\t*goto desptimes\n\n*label theworstofit\n\n[b]We will finally capture the world's attention. And we will do it by ridding the world of the villains that our so-called heroes will not, the criminal Animalistic stain on the name of Underrepresented Powereds everywhere.[/b] \n\nThe goggle-guy then takes a step forward, a lifeless smile forming on his lips.\n\n[b]And isn't it perfect that you both would find us, the two worst offenders of the most corrupt heroic establishment on the planet? The Hero Project represents all that is wrong with Powered culture: degrading dreams, championing greed, and allowing Animalistic villains to run wild, only to ensure it has an enemy to fight.[/b]\n\n[b]We are the true heroes, the heroes who refuse to compromise. We will destroy The Hero Project and we will destroy the Animalistic villains who allow it to exist.[/b]\n\nReading these words, you try to sort through the mess in your own head, to distinguish the rational from the insane—to find the place where your own beliefs end and theirs begin. That's also when you hear the sound of the other Finalists arriving in the first cavernous clearing. Which means that any chance at talking this through is about to end abruptly—and violently.\n\nThen, right on cue, the goggle-guy flashes: [b]Outlet, you are unleashed.[/b]\n\n*page_break\n\nYour mind races to catch up, but you can't help but feel like the name Outlet sounds so familiar. Then another wave of dread hits you like a ton of bricks. JK's words from yesterday start flooding back to you: \n\n[i]I've got my Disembodied friend Outlet to keep me company…I'm trying to talk him out of joining this Disembodied group.[/i]\n\nYour stomach drops. Before you even know it, you realize that you're calling out once again, hoping to put an end to this madness before it can get any worse.\n\n\"Outlet, I'm related to JK, I—\"\n\nHowever, another one of goggle-guy's images cuts you off: [b]Outlet has no ears to hear you with. He can only understand the meaning of my images from thermal scanning.[/b]\n\n[b]Outlet cannot speak, either. None of us can: not Reduct the multiplier, not Less the feeler, not even I, The Voice. We may truly be The Voiceless…[/b] \n\n[b]But we are far from Powerless.[/b]\n\n*page_break\n\nAt that moment, Outlet zaps across the cave and in the blink of an eye fries his way through all of the camera orbs that followed you in here. Before you or Miss Boss can even register what has happened, Outlet then balloons into a ball of explosive energy and detonates near the tunnel entrance to this second clearing. Within seconds, the horrible reality emerges…\n\nYou're completely cut off from the other Finalists, your comm connections, and all cameras, trapped on a cavernous cliff with four deadly Ani-haters who want both you and Miss Boss to pay for the embarrassment they have suffered at the hands of The Hero Project. And they're all Disembodied Powereds, operating on many of the principles you may even believe in yourself.\n\nAs if that wasn't enough, you're supposed to let Miss Boss somehow fall in here, to save JK's life. Given the dire nature of your situation, how can that mean anything other than letting Miss Boss die?\n\nThough all of these thoughts are still less pressing than the immediate reality: you have very little chance of surviving this experience yourself.\n\n*page_break\n\nThe time to reflect ends instantly as all hell breaks loose. Miss Boss reaches her hand toward Outlet and twists her fingers, forcing his entire energy form to freeze. In one fluid motion, she sweeps her hands and causes Outlet's fiery energy form to burn through the two nearest Reduct brutes. Another one of the brutes launches at Miss Boss, but she swings around, frying the duplicate with Outlet's telekinetically controlled energy. It's like watching her direct a terrible, cascading orchestra.\n\nYou're forced to leave Miss Boss to handle Outlet and Reduct as the \"feeler\" named Less sets her sights on you. She sizes you up silently, but there is something about the look in her eyes that seems somehow…vacant? \n\nLess's hair is tied in a bun, and her face has no makeup, save for an oxblood-painted lip. She wears a plain black shift dress over her small frame and black lace-up ballet flats on her even smaller feet. She hardly looks dangerous, but there's something about the absent look in her eyes that rattles you.\n\n*if warningsysnine\n\t\"${named}, I have no idea what this Less can do or if she is even Powered, so I have to advise you to do the opposite of whatever you chose last time, to keep her off balance.\" MeChip Prodigal jumps in, the severity of her tone once again spooking you. \"If you used your Kung Fu Fighting last time, use your Powers here. Or if you used your Powers, focus on Fighting with your Defensive or Offensive specialty strengths.\"\n\t*goto ladvbatt\n*else\n\tYou have no idea what this Less can do or if she is even Powered, but you're not about to wait and find out.\n\t*goto ladvbatt\n\n*label ladvbatt\n*choice\n\t#Use my disk-claws and mouth stylets as weapons to fight Less directly. (Power Cost 10-20)\n\t\t*set defensive %-20\n\t\t*set fighting %+15\n\n\t\t*if macapoeira \n\t\t\tYou break forward and launch a complex capoeira move, spinning into a disk-claw kick that should land across Less's face. \n\t\t\t*goto offtheoutcome\t\t\t\n\t\t*elseif makarate \n\t\t\tYou break forward and launch a fluid karate move, spinning into a combination of knee and elbow strikes that should leave Less open to a stylet slap.\n\t\t\t*goto offtheoutcome\t\n\t\t*elseif mataekwondo \n\t\t\tYou break forward and launch a complex taekwondo move, spinning into a disk-claw high kick that should land across Less's face. \n\t\t\t*goto offtheoutcome\n\t\t*else\n\t\t\tYou break forward to strike mercilessly with your disk-claws, purposefully not engaging in your secondary martial-arts specialty, in case Less might see that coming.\n\n\t\t\t*label offtheoutcome\n\t\t\t*if (defensive \u003c 40)\n\t\t\t\t*achieve offfinalhigh\n\t\t\t\t*set power -10\n\n\t\t\t\tYou're in midair when Less lets loose a blast of red energy that slams into your chest. The pain on contact is excruciating, but your tardigrade body doesn't adjust to shield you. Which must mean that Less can generate some kind of pain blast that doesn't actually cause any harm.\n\n\t\t\t\tIgnoring the pain, you see Less begin to move into a defensive blocking pattern and you register that she must have some martial-arts training as well.\n\n\t\t\t\tRecalibrating your attack pattern mid-move, you manage to land your blow with stunning precision and watch as Less is sent reeling to the floor from your new attack combo.\n\t\t\t\t*goto phtester\n\t\t\t*else\n\t\t\t\t*set power -20\n\t\t\t\t*set health -15\n\n\t\t\t\tYou're in midair when Less lets loose a blast of red energy that slams into your chest. The pain on contact is excruciating, but your tardigrade body doesn't adjust to shield you. Which must mean that Less can generate some kind of pain blast that doesn't actually cause any harm.\n\n\t\t\t\tUnfortunately the blast clouds your concentration enough for Less to spin into a counter-maneuver and slam her palm into your throat. As you gag and choke and fall to the floor, you realize Less must have some martial-arts training as well.\n\n\t\t\t\tIgnoring the pain and breathlessness and popping to your feet with unexpected speed, you recalibrate your attack and manage to land a spinning kick with stunning precision. You watch as Less is sent reeling to the floor from your new attack combo.\n\t\t\t\t*goto phtester\n\t#Let Less tire herself attacking me first so that I can assess her abilities, then take her down. (Power Cost 10-20)\n\t\t*set defensive %+20\n\t\t*set fighting %+15\n\n\t\tBefore you can move, Less raises her hands and lets loose a blast of red energy that slams into your chest. The pain on contact is excruciating, but your tardigrade body doesn't adjust to shield you—which must mean that Less can generate some kind of pain blast that doesn't actually cause any harm. Which also means that, while her blasts may be incredibly distracting, you can now attack without threat of harm.\n\n\t\tIgnoring the pain,\n\t\t*if majudo\n\t\t\tyou break forward and spin into a fluid judo move, planning to pin Less in a joint lock and throw her into a takedown.\n\t\t\t*goto deftheoutcome\t\t\t\n\t\t*elseif majujitsu\n\t\t\tyou break forward and spin into a jujitsu countermove, planning to coax Less into throwing a punch and then to dodge and grab her fist so you can use her own momentum to throw her into a takedown. \n\t\t\t*goto deftheoutcome\t\n\t\t*elseif makravmaga\n\t\t\tyou break forward and spin into a Krav Maga countermove, planning to coax Less into reacting, then to take her down with an unexpected punch to the head.\n\t\t\t*goto deftheout
