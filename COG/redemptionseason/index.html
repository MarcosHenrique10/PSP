est thought. \"Executive Producer extraordinaire and perhaps the most gorgeous goliath I've ever had the personal pleasure of meeting! Do be sure to say hello for me, won't you?\"\n\n[i]So this is the Executive Producer of The Hero Project,[/i] you think, as GG leads you down a narrow hallway. Time to get your game face on—though today, your face happens to be that of a:\n\n*choice\n\t#Poodle.\n\t\t*goto firstall\n\t#Pit bull.\n\t\t*goto firstall\n\t#Greyhound.\n\t\t*goto firstall\n\t#Rottweiler.\n\t\t*goto firstall\n\t#Pug.\n\t\t*goto firstall\n\t#Beagle.\n\t\t*goto firstall\n\t#Dachshund.\n\t\t*goto firstall\n\t#Golden retriever.\n\t\t*goto firstall\n\t#Black Lab.\n\t\t*goto firstall\n\t#Another dog type.\n\t\tToday my face happens to be that of a:\n\t\t*input_text dogtype\n\t\t*goto firstall\n\n*label firstall\n*set meetproducers true\n\n\"First of all, let me just say that I'm loving your look, it's very canine chic,\" GG announces. \"I'm also told you're now going by the moniker ${codenamed}, is that correct? Fabulous choice. Now, have you ever walked a Step & Repeat before?\"\n\n\"Uh, what's a Step & Repeat?\" you ask, trying to keep your voice from barking too much as you speak.\n\n\"It's a red carpet with a holo-logo banner, where you pose, interview, step and repeat,\" a new voice says. You smell her chlorine-soaked, lotion-covered skin before you see her.\n\nYou spin to find a tall athletic woman striding down the hall, holding a clipboard and wearing a headset. Her braided black hair is tied into a thick side ponytail, and she wears an expensive-looking white pantsuit draped over broad swimmer's shoulders. Her dark green eyes settle on GG with intimidating intensity.\n\n\"I thought we agreed that the last Finalist was mine to handle,\" she says. \n\n\"I'm afraid you were nowhere to be found, darling dumpling,\" GG says, a subtle chill entering his voice. \"Whatever was I supposed to do?\"\n\n*page_break\n\nIgnoring GG, this new woman takes you by the arm and begins to lead you down the soundstage corridor, her heels clacking along the concrete as you walk.\n\n\"That's Lyra Vite, The Hero Project's new Co-Executive Producer,\" MeChip Prodigal chimes in. \"She has been tasked with rebranding the show's second season, though it appears that there might be some trouble in producer paradise.\"\n\nYou find it strange that no one has felt the need to introduce themselves to you and that you don't have to introduce yourself to them, but you suppose that must be considered terribly old-fashioned now that everyone has MeChips to take care of introductions.\n\n\"I'm supposed to give you a big speech, but you're late,\" Lyra says, walking briskly beside you. \"Do you have any questions?\"\n\nOnly about a million, but you know that everything you say and do is going to matter for your success here, especially when it comes to the Executive Producers in charge of the entire operation.\n\n\"Sorry for being late, grooming issue,\" you say, hoping for a laugh from Lyra. When you don't get one, you instead say:\n\n*choice\n\t#\"I'm ready to put on whatever show you want me to.\"\n\t\t*set public %+15\n\t\t*set respected %-10\n\n\t\t\"Right now I just need you to play catch-up,\" Lyra responds,\n\t\t*if (public > 50)\n\t\t\t*set rlshp_eps %+15\n\t\t\ta hint of a smile on her face.\n\t\t\t*goto lyrareact\n\t\t*else\n\t\t\ta hint of a frown on her face.\n\t\t\t*set rlshp_eps %-5\n\t\t\t*goto lyrareact \n\t#\"I'm ready to show the world who I am and what I stand for.\"\n\t\t*set public %+15\n\t\t*set respected %+10\n\n\t\t\"That's the spirit,\" Lyra responds,\n\t\t*if (public > 50)\n\t\t\t*set rlshp_eps %+15\n\t\t\ta hint of a smile on her face.\n\t\t\t*goto lyrareact\n\t\t*else\n\t\t\ta hint of a frown on her face.\n\t\t\t*set rlshp_eps %-5\n\t\t\t*goto lyrareact \n\t#\"I'm just going to keep my head down and focus on the win.\"\n\t\t*set public %-15\n\t\t*set respected %+10\n\n\t\t\"Good for you,\" Lyra responds,\n\t\t*if (public \u003c 50)\n\t\t\t*set rlshp_eps %+15\n\t\t\ta hint of a smile on her face.\n\t\t\t*goto lyrareact\n\t\t*else\n\t\t\ta hint of a frown on her face.\n\t\t\t*set rlshp_eps %-5\n\t\t\t*goto lyrareact \n\t#\"Mostly I just want to get this over with.\"\n\t\t*set public %-15\n\t\t*set respected %-10\n\t\t\n\t\t\"Right,\" Lyra responds,\n\t\t*if (public \u003c 50)\n\t\t\t*set rlshp_eps %+15\n\t\t\ta hint of a smile on her face.\n\t\t\t*goto lyrareact\n\t\t*else\n\t\t\ta hint of a frown on her face.\n\t\t\t*set rlshp_eps %-5\n\t\t\t*goto lyrareact \n\n*label lyrareact\nShe then steps in front of a narrow red door and turns to you, remaining all business. \n\n\"After the Step & Repeat, there will be a short cocktail party with the other contestants, before the Final Selection ceremony. Your mingling at this party will affect your Semi-Finals Leaderboard score, which will then determine which seven Rookies will advance through Final Selection. So whatever you do in there, make it count.\"\n\nLyra fires off the words and you try your best to keep up. Hearing this, you know you should probably focus on something else, like who to talk to or how to portray yourself, but all you can think is: this party will be your chance to handle the StarSoar situation, one way or another.\n\n\"When you step through this door, the show is on,\" Lyra continues. \"Camera orbs will follow your every move: showmance cams, cry cams, fight cams, heroic cams, personal cams—the list goes on. Everything you say and do will potentially be seen and judged by tens of millions of people, but how long that ends up lasting depends entirely on your performance tonight.\"\n\n*page_break\n*set upa +15\n\nThis is something you've already come to know all too well, strangely. In the last two months, seven episodes of The Hero Project's second season have aired, featuring the Auditions and Semi-Finals. The ratings apparently went down from the first season, but the show still remains massively popular. To say it has been surreal to see yourself on 3V is an understatement—obviously you haven't been in every episode, but you have been given a nice chunk of airtime. \n\nIn the interview auditions, you were portrayed as a somewhat\n*if (respected > 50)\n\tnoble and\n*if (respected \u003c= 50)\n\tominous and\n*if (public > 50)\n\toutspoken figure. \n*if (public \u003c= 50)\n\tmysterious figure.\n\nThis was then reinforced in the Semi-Finals, where your hawk-self came across as graceful, strong, and badass. Of course, your takedown of Fistfull and Monk marked you and StarSoar as early standouts to watch.\n\nAside from this general buzz, you decided not to expose yourself to the public reaction too much. You haven't gone anywhere besides Dockerbay and your job at the Millennial Mews, and it's very easy not to get recognized by strangers, given your daily Ani-transformations. Other than that, you refused to look at any online commentary and you blocked MeChip Prodigal from trolling the MeBlogs. You only allowed JK to summarize the general reaction as each episode aired. \n\n*if newreader\n\tJK did convince you, however, to let her add Public Meters to your Show Stats screen. She then made it a point to tell you that your Public Stats are best kept at extremes—the higher or lower the levels the better, since being in the middle indicates that you're having lesser impact with viewers as a potentially unreadable figure.\n\n*page_break\n*set legended +5\n\nThankfully, just by appearing on the show, you've already begun to raise the general level of Underrepresented Powered Awareness. The only other thing you did allow JK to share with you is the scattered fan MeMessages from Disembodied, Ani, and Morpho-Powered viewers thanking you for appearing on the show. You can't believe anyone cares enough to write you messages specifically, but they serve as a potent reminder of the potential impact you can have by making it on this show.\n\nPerhaps the most notable change so far has been to your Legend Level, which you've learned is the ultimate gauge of your heroic rise. Your Legend is an aggregation of public perception, personal achievements, and your place in the heroic landscape. Just from your brief time on the show, your Legend has already jumped from 0 to ${legended}, \n*if (legended > 15)\n\t*achieve legendcatone \n\t*achieve legendcattwo\n\t*set legendleveltwo true\n\tadvancing you from the \"Civilian\" Category to the \"Trainee\" Category.\n\t*goto onepos\n*else\n\t*achieve legendcatone\n\twhich still places you in the \"Civilian\" Category. You're hoping to rack up a few more points to get past 15, which will place you in the \"Trainee\" Category with the rest of the Final Selectants.\n\t*goto onepos\n\n*label onepos\n\nYou quickly realized, however, that none of this public momentum will matter if no one can recognize you. Usually you don't mind the anonymity your Ani-transformations can provide, but it's not exactly ideal for building a 3V persona. Thanks to that brief birdy streak, the audience now identifies you mostly as an avian Ani-Powered, since you were a sparrow-hybrid for the interviews and a hawk-hybrid for the Semi-Finals.\n\nWhich of course means that today you look entirely unrecognizable in your dog form. This is why you decided to follow JK's advice and pick out one costume to wear, so viewers can clearly identify you through your evolving Ani-Morpho changes. \n\n*choice\n\t#I went with a bright, bold costume to stand out and show off my rotating Ani-features proudly.\n\t\t*set public %+20\n\t\t*set image %-20\n\n\t\tYou and JK found a short-sleeve wetsuit in another thrift store, which looks like tight, bright spandex and leaves your head and limbs exposed. By leaving your face and your Ani-Powers bold and open, you hope to make a statement, primarily about your presence here, but also potentially about Underrepresented Powered issues. \n\t\t*if (public > 55)\n\t\t\t*set legended +1\n\t\t\t*set rlshp_eps %+10\n\t\t\t*goto lockettime\n\t\t*else\n\t\t\t*set rlshp_eps %-5\n\t\t\t*goto lockettime\n\t#I went with a dark, intimidating head-to-toe costume topped off with a mask, to guard my identity and Ani-changes. \n\t\t*set public %-20\n\t\t*set image %+20\n\n\t\tYou and JK found a black wetsuit in another thrift store, one that gives you full coverage, then you topped it with a solid black bandana wrapped around your face, with eyeholes cut out so you can see. \n\t\t*if (public \u003c 45)\n\t\t\t*set legended +1\n\t\t\t*set rlshp_eps %+10\n\t\t\t*goto lockettime\n\t\t*else\n\t\t\t*set rlshp_eps %-5\n\t\t\t*goto lockettime\n\t#I went with a dark, masked costume to obscure my identity and highlight my Ani-transformations as much as possible.\n\t\t*set public %-20\n\t\t*set image %-20\n\n\t\tYou and JK found a short-sleeve black wetsuit in another thrift store, which looks like spandex and leaves your head and limbs exposed. You then topped it with a solid black bandana wrapped around your face, with eyeholes cut out so you can see. By leaving your face obscured and your Ani-Powers exposed, you hope to make a bold statement about Underrepresented Powered issues. \n\t\t*if (public \u003c 45)\n\t\t\t*set legended +1\n\t\t\t*set rlshp_eps %+10\n\t\t\t*goto lockettime\n\t\t*else\n\t\t\t*set rlshp_eps %-5\n\t\t\t*goto lockettime\n\t#I went with a brightly colored, full-coverage costume and old-school mask. I want to stand out without highlighting my Ani-transformations.\n\t\t*set public %+20\n\t\t*set image %+20\n\n\t\tYou and JK found a bright wetsuit in another thrift store, one that gives you full coverage, then you topped it with a matching bandana wrapped around your face, with eye holes cut out so you can see. You know you stand the best chance of surviving in this competition by blending in as much as possible, at least at first.\n\t\t*if (public > 55)\n\t\t\t*set legended +1\n\t\t\t*set rlshp_eps %+10\n\t\t\t*goto lockettime\n\t\t*else\n\t\t\t*set rlshp_eps %-5\n\t\t\t*goto lockettime\n\t\t\n*label lockettime\n\nThis wetsuit style may not be a heroic costume from a fancy designer, but the price was right, and it still looks pretty slugging official. You and JK also managed to cut a little pocket in the front of the wetsuit to hold your locket, \n*if usejkstory\n\tto serve as a visible reminder of JK's story and your personal motivation.\n\t*goto costplash\n*else\n\teven though no one aside from you and JK knows what this locket pocket contains.\n\t*goto costplash\n\n*label costplash\nFor final effect, you and JK painted a ${triquetra} on the front, to symbolize the triple elements of your Underrepresented identity.\n\nLuckily, this costume seems to make a splash as you walk onto the Step & Repeat red carpet for the first time. As you do, holo-flash bulbs begin to spot up your already-dimmed dog vision, and your ears are assaulted with \"${codenamed}\" and \"${named}\" calls.\n\n[i]Here we go[/i], you think as you step forward.\n\n*page_break A FEW REPEATS LATER\n\nFresh from a round of mind-numbing press interviews, you enter the great room of the Contestant Mansion only to be hit with another wall of sounds and smells, thanks to your enhanced dog senses. Through the sensory haze, you still manage to marvel at the impressive room. It looks like the lobby of some ultra-fancy hotel, all heavy carpets and chandeliers and polished wood—quite the departure from your thrown-together, discount-furnished loft. You can't believe this could actually be your home if you make it into the Live Finals of the show.\n\nClosing your eyes, you force yourself to take a breath and focus through the overwhelming stimuli, because you are prepared for this. Again that's thanks to JK, since her Hero Project Boot Camp has educated you on the first season of the show. Most importantly, JK prepped you on the identities of your fellow Final Selection Rookies and MeChip Prodigal has been loaded with an arsenal of mental flash cards, ready to fire when you need them. \n\nOpening your eyes and scanning the party, you realize that you're going to need MeChip Prodigal's assistance right away. You easily pinpoint the other Rookies in the crowd of heroic glitterati, seeing that they've already broken into cliques.\n\n\"Fret not, my canine companion,\" MeChip Prodigal says, appearing in your peripheral vision—you keep forgetting that she can respond to your thoughts. \"I'm here to keep track of all the daunting details for you. No matter who you come across, I'll inform you of the relevant information in the moment, then I'll load anything else you need to remember in the Show Stats screen. So remember, if it's not yet there, don't give it much care! Just soak in the experience and let me worry about keeping track of the important information. Deal?\"\n\n\"Deal,\" you think at MeChip Prodigal, realizing why people are addicted to these things. You're comforted to know that MeChip Prodigal will handle remembering what you need to know, since you're sure to be inundated with loads of new people and information tonight. \n\n*page_break\n\nYou focus on the first group of Rookies standing near one of the balconies and recognize all of them from the Semi-Final finale stage: a seven-foot tall drag queen dressed like a Greek goddess, and a black-clad goth vampire, who today actually appears to be a…werewolf? They are standing with a pair of college-aged heroes, a sandy-haired brunette in a silver and navy costume and a tall, dark, and handsome guy in a white bodysuit with orange metallic plating. At least you think those are the colors, since you've gone just a tad color-blind thanks to your dog-eyes.\n\n\"All right chicken-dawg, here we go,\" MeChip Prodigal says. \"Those are two Semi-Final pairings. The young duo are Crystalline and Ignite, partnered for their prodigal ambition, pun intended! Crystalline is on a one-year deadline from her parents to pursue heroics before going to college, and Ignite just graduated as the valedictorian of Melite Powered University. As you've already seen, they both were portrayed in the aired episodes as promising front-runners who may or may not be falling for each other. Oh, to be young and in love….\n\n\"The other pair are Nitewerq and Transfer, paired for their LGBTQIAPZ+ identities. Nitewerq is an underground NYC hero and drag queen—and get this, she actually believes that she is a goddess whose Powers run on the belief force of her fans. Fancy that! Her partner, Transfer, is a Morpho-Powered and gender activist who has the Power to rotate between zombie, werewolf, vampire, and human form cyclically every four days. Unfortunately, these two weren't featured much at all in the aired episodes compared to other Semi-Finalists, which is entirely frustrating, if you ask me. That Nitewerq is painted for the gods!\"\n\nAs MeChip Prodigal finishes filling you in, you can't help but think that, as interesting as these other heroes might seem, Transfer must know exactly what you go through as a Disembodied, Morpho, and Animalistic Powered. You've never met anyone else who checks all three of these boxes too, so your first instinct is to… \n\n*choice\n\t#Eventually connect over this set of shared Powered identities.\n\t\t*set image %-15\n\t\tYou definitely want to get to know Transfer, but you figure you should finish learning about the rest of the Rookies before you make a choice about who to mingle with.\n\t\t*goto nexttwoshoul\n\t#Attempt to separate myself from Transfer. I don't want to be painted as a stereotype too early.\n\t\t*set image %+15\n\t\tThe last thing you want is to be pigeonholed as a certain narrow type. Besides, there are a whole list of other different and diverse Rookies you still have to learn about before deciding who to meet first.\n\t\t*goto nexttwoshoul \n\t#Hold off on making a decision for now.\n\t\tYou suppose you'll have to start deciding things like this once MeChip Prodigal finishes your little rundown…\n\n\t\t*if (image > 50)\n\t\t\t*set image %+10\n\t\t\t*goto nexttwoshoul\n\t\t*else\n\t\t\t*set image %-10\n\t\t\t*goto nexttwoshoul\n\n*label nexttwoshoul\n\n\"Okay, these next two you should recognize from the Semi-Finals marathon route,\" MeChip Prodigal continues, forcing you to move on to the next group standing near a table of catered food. You recognize the velociraptor-pterodactyl dino-hybrid and the tarsier Animalistic Powered immediately.\n\n\"Tarsiero earned his spot in the Semi-Finals by winning The Hero Project Experience at the UniHero theme park where he worked. Since he is a fully unhybridized Ani-Powered, he was partnered with fellow Mutate-Powered contestant Velocityl, who is a recently escaped Korean refugee and the subject of illegal dino-human genetic experimentation. Given this pair's lack of heroic experience and training, they weren't expected to make it all the way to the Final Selection, but they've quickly become fan favorites. I already ordered myself a virtual Velocityl plush toy—that dino dynamo is simply irresistible, don't you think?\"\n\nYou're not quite sure how to answer MeChip Prodigal, especially because you're all too used to people treating Animalistic Powereds like mascots or pets instead of real people….\n\n\"Whatever, not everyone can master the fine art of dino-appreciation,\" MeChip Prodigal says, seeming to ignore your latest thought. \"Moving on, these two adorable Rookies are joined by Splint, a sixteen-year-old adopted child who separated from her Semi-Finals partner and gravitated towards these other quote-unquote 'misfits,' though I'm already going on record against that description.\"\n\nYou were so focused on Velocityl and Tarsiero that you barely even noticed the third Rookie who has joined them. Splint looks even younger than sixteen, with her flushed, round face and reinforced hero-glasses. It doesn't help that the broadsword hilt strapped to her back seems just about as big as her entire body, threatening to tip her over at any given moment.\n\n*page_break\n\nThankful that you have MeChip Prodigal to help you keep this all clear, you move on to the final group standing together in the center of the room, basking in the glow of many camera orbs. Among them are the two heroines you saw riding the pink energy wave, the two male hotshots leaving the MillenniWheel pods, and a handsome new silver fox.\n\n\"These five have already deemed themselves 'The New Populars,' slugger save them,\" MeChip Prodigal sighs. \"Reigna and Miss Boss are twenty-something best friends from Los Angeles looking for their big break. Much to their delight, they've been the breakout stars of this season so far, thanks to that mega-viral clip of them wiping out that goggle-conjoined team in the Semi-Finals.\"\n\nYou remember that particular wipeout vividly—as if it wasn't brutal enough, the clip aired on The Hero Project and found its way onto MeTube to become a massive viral hit. Someone even recorded an auto-tuned song to accompany the goggle-guy's awkward whelps and tumbles, named the Goggle Bobble.\n\n\"These two are rather unsurprisingly joined by Exile, a corporate-sponsored unPowered hero who was allegedly exiled from Saudi Arabia for his party-boy ways. Key word: allegedly. His partner is Griffin, South Carolina's official state hero, who is apparently looking to take his career national. Griffin then pulled in the fifth Rookie, O'Connell, since they are closest in age. O'Connell is a contractor and father of five looking for a better life for his family. These last two dudes scream midlife crisis if you ask me, but this entire pack has been deemed the show's heartthrobs, each of them getting a good chunk of airtime.\"\n\nMeChip Prodigal is right—these five have dominated the airtime since the show premiered. You wonder if you're going to be forced to choose between these \"popular\" heroes and the other groups, or if you'll be able to find a way to break down this antiquated system \n*if trilogyreader\n\tfrom the first season and bring everyone together.\n*if newreader\n\tand bring everyone together.\n\n*page_break\n\nThis isn't the only choice you'll have to make, you realize as you spot the final Rookie, your own partner StarSoar, at the bar. He chats with the bored-looking bartender, probably waiting for you to arrive. Seeing him makes your stomach drop, since you still don't know exactly what to say to him yet, given all that Loa Shift told you. So you figure you should stall a bit and mingle first, before StarSoar eventually spots you.\n\n\"Remember poochy-poo, your relationships matter for your future success on the show, both in terms of alliances and Leaderboard points,\" MeChip Prodigal jumps in, sounding eerily like JK on this matter. \"You must ask yourself who you want on your side, knowing that the public and the producers will judge you based on who you choose to identify with. How are you going to treat them? Are you out to make friends or enemies, allies or pawns? \n\n\"While you consider your options, rest assured that I will post bios of whoever you choose to talk to in the Stats Screen, for your reference. Now it's time for you to make a move, so who's it going to be? The suspense is positively murdering me!\"\n\nAs you scan the other Rookies, it is not lost on you that they have mostly gathered in groups that fall along traditional Powered lines—earth- and nature-based Powers, unique transformative Powers, and the good old-fashioned glamorous energy and strength Powers. You wish you could say these Powered dividing lines were unusual, but you at least do your best to ignore them by deciding to:\n\n*choice\n\t#Mingle with Ignite, Crystalline, Transfer, and Nitewerq.\n\t\t*set finalselectionmingle true\n\t\t*set mingleprodigies true\n\t\t*set showcrystalline true\n\t\t*set showignite true\n\t\t*set showtransfer true\n\t\t*set shownitewerq true\n\t\t*goto mnprodigies\n\t#Mingle with Velocityl, Tarsiero, and Splint.\n\t\t*set finalselectionmingle true\n\t\t*set minglemisfits true\n\t\t*set showvelocityl true\n\t\t*set showtarsiero true\n\t\t*set showsplint true\n\t\t*goto mnmisfits\n\t#Mingle with \"The New Populars.\"\n\t\t*set finalselectionmingle true\n\t\t*set minglepopulars true\n\t\t*set showmissboss true\n\t\t*set showreigna true\n\t\t*set showgriffin true\n\t\t*set showexile true\n\t\t*set showoconnell true\n\t\t*goto mnpopulars\n\n*label mnprodigies\n\n\"Hey, mind if I join you?\" you say as you approach the group. \"It's ${named}, by the way, though I guess I'm going by ${codenamed} now.\"\n\n\"I thought that was you,\" Crystalline says, reaching out to shake your paw and smiling a row of perfect white teeth underneath her freckled cheeks. \"You and StarSoar killed it in the Semi-Finals. Watching you take down Monk and Fistfull was so epic.\"\n\n\"I agree,\" Ignite adds, resting his serious, almost-black eyes on you. You try to focus on Ignite's words, but are overwhelmed by the smell of scorched soil buried underneath a layer of deodorant and sweat. \"I'd love to talk to you about your ${maspecialty} technique, if we get the chance.\"\n\n\"Don't mind Ignite—he thinks he's still in school competing for grades,\" Crystalline jokes, nudging Ignite. In contrast, Crystalline has almost no scent, nor do the rows of crystals that poke out of her silver belt holster-slots. You only get the faintest whiff of shampoo as she moves her shoulder-length sandy-brown hair. It's a wild experience having these canine senses, to most easily identify people by smell instead of sight.\n\n\"This is just another test for you to ace, right?\" Crystalline adds, causing Ignite's cheeks to turn the same orange as his metallic mask and costume accents. Crystalline stares back dreamily at Ignite and you can practically smell the pheromones raging between these two….\n\nStrangely, all of these minor details seem to come into sharper focus than the entire impression of each person, no doubt thanks again to your altered dog-senses. Between the details and the smells, it's all
