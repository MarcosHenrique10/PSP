<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Hero Project: Redemption Season — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "redemptionseason", "title": "The Hero Project: Redemption Season", "scenes": {"choicescript_description": "America's #1 reality show for heroes is back for another season! Harness your superpowers to steal the spotlight, win votes, and save your sister!\n\n[b]The Hero Project:[/b] [i]Redemption Season[/i] is the first installment in a new series of interactive novels by Zachary Sergi set in the \"Heroes Rise\" universe. Your choices control the story. It's entirely text-based--129,000 words, without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\nIn a contest where everyone has superpowers, your opponents can cause earthquakes and explosions, but you're an average Ani-Powered who wakes up with different animal attributes every day. Will your hawk eyes or canine claws take you far enough in the competition to satisfy the only person who can help your sister? And what happens if winning isn't enough?\n\nAs you advance, the decisions you make will transform viewers' ideas of what it means to be a hero. Will you fight for your own goals, or make sacrifices for the good of society? Strive for what you believe is right by following the rules, or take down the whole system with more radical methods? Would you take wealth and fame over changing the world?\n\nChoose wisely. It's Redemption Season.", "choicescript_stats": "*comment x\n*if meetjk\n\t*set jkstatname \"Jelly Kelly\"\n\n*if meetshift\n\t*set shiftstatname \"Loa Shift\"\n\n*if meetproducers\n\t*set producerstatname \"Producers\"\n\n*if meetrookies\n\t*set rookiesstatname \"Rookies\"\n\n*if meetweaver\n\t*set weaverstatname \"Weaver\"\n\n*if crystallineignitenameon \n\t*set crystallinestatname \"Crystalline & Ignite\"\n\n*if crystallinenameon \n\t*set crystallinestatname \"Crystalline\"\n\n*if transfernameon\n\t*set transferstatname  \"Transfer\"\n\n*if tarsieronameon\n\t*set tarsierostatname  \"Tarsiero\"\n\n*if griffinnameon\n\t*set griffinstatname  \"Griffin\"\n\n*if missbossnameon\n\t*set missbossstatname  \"Miss Boss\"\n\n*if meetveterans\n\t*set veteransstatname \"Veterans\"\t\n\n*label officialstatchart\n*text_image stat_title.png center The Hero Project: Redemption Season\n\n*text_image battle_stats.png center Battle Stats\n*stat_chart\n\topposed_pair Defensive\n\t\tOffensive\n\topposed_pair Physical\t\n\t\tIntangible\n\topposed_pair Fighting\n\t\tPowers\n\ttext kungfuspecialty Kung Fu Specialty\n\ttext maspecialty Secondary Martial Art\n\ttext Power\n\ttext Health\n*comment endif\n\n*text_image char_stats.png center Character Stats\n*stat_chart\n\topposed_pair Traditional\n\t\tRadical\n\topposed_pair Societal\t\n\t\tPersonal\n\ttext moneyed Money\n*comment endif\n\n*text_image pub_stats.png center Publice Stats\n*stat_chart\n\topposed_pair Public\n\t\tPrivate\n\topposed_pair Respected\t\n\t\tFeared\n\tpercent upa Underrepresented Powered Awareness\n\ttext legended Legend\n*comment endif\n\n*text_image relationships.png center Relationships\n*stat_chart\n\tpercent rlshp_jk ${jkstatname}\n\tpercent rlshp_shift ${shiftstatname}\n\tpercent rlshp_eps ${producerstatname}\n\tpercent rlshp_weaver ${weaverstatname}\n*comment endif\n\n*text_image final_relationships.png center Finalist Relationships\n*if partonefinrlshp\n\t*stat_chart\n\t\tpercent rlshp_starsoar StarSoar\n\t\tpercent rlshp_rookies ${rookiesstatname}\n\t*comment endif\n\n*if parttwofinrlshp\n\t*stat_chart\n\t\tpercent rlshp_crystalline ${crystallinestatname}\n\t\tpercent rlshp_transfer ${transferstatname}\n\t\tpercent rlshp_tarsiero ${tarsierostatname}\n\t\tpercent rlshp_griffin ${griffinstatname}\n\t\tpercent rlshp_missboss ${missbossstatname}\n\t*comment endif\n\n*if partthreefinrlshptgone\n\t*stat_chart\n\t\tpercent rlshp_crystalline ${crystallinestatname}\n\t\tpercent rlshp_tarsiero ${tarsierostatname}\n\t\tpercent rlshp_griffin ${griffinstatname}\n\t\tpercent rlshp_missboss ${missbossstatname}\n\t\tpercent rlshp_veterans ${veteransstatname}\n\t*comment endif\n\n*if partthreefinrlshpggone\n\t*stat_chart\n\t\tpercent rlshp_crystalline ${crystallinestatname}\n\t\tpercent rlshp_transfer ${transferstatname}\n\t\tpercent rlshp_tarsiero ${tarsierostatname}\n\t\tpercent rlshp_missboss ${missbossstatname}\n\t\tpercent rlshp_veterans ${veteransstatname}\n\t*comment endif\n\n*check_achievements\n*if finalselectionmingle\n\t*goto openchoice\n*else\n\t*if (choice_achieved_legendcatfour)\n\t\t*page_break Perfect Legend Guide\n\t\t*goto legendguide\n\t*finish\n\n*label openchoice\n\n[i]The Hero Project Additional Information[/i]\n\n*check_achievements\n*choice\n\t*if (choice_achieved_legendcatfour) #Perfect Legend Guide.\n\t\t*label legendguide\n\t\t[b]THE HERO PROJECT:[/b] [i]REDEMPTION SEASON[/i] \n\t\t*line_break\n\t\tPERFECT LEGEND GUIDE\n\n\t\t[b]General Tip:[/b] In Heroes Rise, you are rewarded for sticking to your ideals. If trying to earn a high Legend Level, make sure to remain consistent once you decide what kind of hero you want to be.\n\n\t\t[b]General Tip:[/b] The MeChip Warning System is designed to alert you to which Stat will be most important in each choice. Purchase (or unlocking in-game) is recommended for best outcomes.\n\n\t\t[b]Chapter One:[/b] Automatic Legend bump for entrance into The Hero Project. [i](Legend High: 5)[/i]\n\t\t*line_break\n\t\t[b]Chapter One:[/b] When fighting the rabbit/rat duo, make sure to take note of whether your choice uses Physical & Intangible Powers and/or Offensive & Defensive. Then, when fighting Fistfull, be sure to choose an attack style that is consistent (each choice indicates one Stat strength). [i](Legend High: 7)[/i]\n\t\t*line_break\n\t\t[b]Chapter One:[/b] When deciphering the pod puzzle, be sure to use your hawk-eyes to solve the puzzle if high Intangible, or to fly with your wings if high Physical. [i](Legend High: 10)[/i]\n\n\t\t[b]Chapter Three:[/b] When explaining your audition interview strategy, choose an option to buy into the process if Traditional or play against the process if Radical. [i](Legend High: 12)[/i]\n\t\t*line_break\n\t\t[b]Chapter Three:[/b] When deciding what The Hero Project means to you, match your Societal or Personal Stats. [i](Legend High: 15)[/i]\n\n\t\t[b]Chapter Four:[/b] Automatic boost for exposure on The Hero Project [i](Legend High: 20)[/i]\n\t\t*line_break\n\t\t[b]Chapter Four:[/b] When choosing your costume, go dark if Private and bright if Public. [i](Legend High: 21)[/i]\n\t\t*line_break\n\t\t[b]Chapter Four:[/b] When mingling with the Rookies, be sure to be nice if you're Respected and intimidating if you're Feared. [i](Legend High: 22)[/i]\n\t\t*line_break\n\t\t[b]Chapter Four:[/b] When deciding what to do about StarSoar, go public or blackmail if you have Personal priorities, or warn in secret if you have Societal priorities. [i](Legend High: 25)[/i]\n\t\t*line_break\n\t\t[b]Chapter Four:[/b] If you navigate the Semi-Finals and the StarSoar choice in Chapter One correctly, according to your Statistic strengths, you will have a Leaderboard score high enough to be called as the fourth Rookie Finalist. [i](Legend High: 30)[/i]\n\n\t\t[b]Interlude One:[/b] Choosing the Leaderboard viewer reward will help guarantee more Legend later.\n\t\t*line_break\n\t\t[b]General Tip:[/b] If you have a strong relationship with the Producers (by following your Public & Private Stat strengths), you will have the opportunity to add a few potential missing Legend points or adjust one Stat to a more desired level, if not there already.\n\n\t\t[b]Chapter Five:[/b] In the trio of simultaneous battles, one Legend point awarded for playing to each Statistical strength. The MeChip Warning System alerts which Stats matter throughout: Transfer focuses on the balance between Fighting & Powers, Griffin and Miss Boss focuses on playing to your existing relationship level, and Tarsiero focuses on Defensive & Offensive strengths. [i](Legend High: 33)[/i]\n\t\t*line_break\n\t\t[b]Chapter Five:[/b] When reacting to the camera orbs after discovering the Ani-cides, be sure to rely on your Public & Private Stat strengths. [i](Legend High: 35)[/i]\n\n\t\t[b]Chapter Six:[/b] Make sure to get a Leaderboard score higher than 75 in Chapter Five to tie for high-score Immunity and gain the most Legend. Following the Guide and the MeChip Warning Tips should help you to achieve this. [i](Legend High: 45)[/i]\n\t\t*line_break\n\t\t[b]Chapter Six:[/b] When talking about the vote with Crystalline and Transfer, make sure to choose a response that builds upon a political type with at least 1 existing point. MeChip Prodigal's Warning System helps with the specific pathways. [i](Legend High: 46)[/i]\n\t\t*line_break\n\t\t[b]Chapter Six:[/b] When responding to Griffin, make sure to follow through on the political agenda you set with Crystalline and Transfer. MeChip Prodigal's Warning System helps with the specific pathways. [i](Legend High: 48)[/i]\n\n\t\t[b]Chapter Seven:[/b] When choosing whether to let the cameras film JK, make a decision in line with your Public & Private Stat. [i](Legend High: 51)[/i]\n\t\t*line_break\n\t\t[b]Chapter Seven:[/b] When reacting to the InfraCircle, choose the option that best represnts the intersection of your Societal & Personal and Traditional & Radical Stats. [i](Legend High: 54)[/i]\n\t\t*line_break\n\t\t[b]Chapter Seven:[/b] Cast your vote based on whatever political agenda you set in Chapter Six. MeChip Prodigal's Warning System helps with the specific pathways. [i](Legend High: 60)[/i]\n\n\t\t[b]Chapter Eight:[/b] When deciding how you feel about your game-changer title, match your Feared & Respected Stat perception. [i](Legend High: 61)[/i]\n\t\t*line_break\n\t\t[b]Chapter Eight:[/b] Achieve a perfect Leaderboard score in Chapter Eight for the highest Legend bump in Interlude Two. Keep track of the Animal Scrawls to solve the maze, and play to your Statistical strengths in battle scenarios. As always, MeChip Prodigal's Warning System helps with this. Also, be sure to choose a Miss Boss outcome that matches your Personal or Societal motivations.\n\n\t\t[b]Interlude Two:[/b] Automatic Legend gain based on Leaderboard score (5 Legend) and decrease based on public perception (10 Legend). [i](Legend High: 56)[/i]\n\t\t*line_break\n\t\t[b]General Tip:[/b] If you have a strong relationship with the producers (by following your public Stat strengths), you have the opportunity to add a few potential missing Legend points or adjust one Stat to a more desired level, if not there already.\n\n\t\t[b]Chapter Nine:[/b] Automatic Legend boost based on matching Miss Boss choice to Societal or Personal motivations. [i](Legend High: 60)[/i]\n\t\t*line_break\n\t\t[b]Chapter Nine:[/b] When choosing your motivations for winning The Hero Project, choose based on your Public & Private Stat strengths. [i](Legend High: 62)[/i]\n\t\t*line_break\n\t\t[b]Chapter Nine:[/b] When setting your final goal concerning The InfraCircle and The Voiceless, choose the option that matches the intersection of your Traditional & Radical Stats (Societal & Personal are also important for final Achievement Status). [i](Final Legend High: 65)[/i]\n\n\t\t*page_break\n\t\t*goto officialstatchart\n\t*if (finalselectionmingle) #Rookie Finalists.\n\t\t*goto hprookiefinalists\n\t*if (meetveterans) #Veteran Finalists.\n\t\t*goto hpvetfinalists\n\t*if (infracirclepicto) #The InfraCircle.\n\t\t*goto infracircletime\n\t*if (smytherstructure) #Smyther's Ani-Gang Structure.\n\t\t*goto smythertime\n\t#Achievement Structure.\n\t\tOnce you have unlocked every Achievement, you have fully experienced every variation of [b]The Hero Project:[/b] [i]Redemption Season[/i]. \n\n\t\t[i]Tip:[/i] this will require multiple readthroughs.\n\n\t\t*page_break\n\t\t*goto officialstatchart\n\n*label infracircletime\n\nAfter a mass breakout at The Devoid prison complex for Powereds, many former members of Smyther's Splice Circle and Culic's InfraOrder formed this new organization of Ani-activists. Their goal is to create a sovereign space for Ani-Powereds to live free of oppression and American law, police brutality, and hate-crime sprees like the Ani-cides. These radicals decided to create a hidden base in the Big Sur wasteland east of Millennia City that was created by the late Prodigal.\n\nThe InfraCircle haven is hidden in a secret location in the quarantined Big Sur wasteland. It is led by Ani-terrorist Culic, camouflaged by tech-Powered fugitive Splicina, and apparently kept running by a newly united group of Natural-Resource Powereds. Meanwhile Scoundrel, the turkey-Powered mole from the first season of The Hero Project, runs their elite Recruit & Strike Squad. Perhaps worst of all, The InfraCircle funds this entire endeavor through Millennia City's re-formed Ani-gang network, run by the infamous crime boss Smyther.\n\n*text_image infracircle.png center The InfraCircle\n*line_break\n[b]Big Sur Haven[/b]: CULIC\n*line_break\n[b]Strike Team Recruitment[/b]: SCOUNDREL\n*line_break\n[b]Ani-Gang Funding[/b]: SMYTHER\n\n*label icirclestatchoic\n*choice\n\t#Smyther.\n\t\t[b]ALIAS:[/b] Smyther\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Jackson Smyther\n\t\t*line_break\n\t\t[b]AGE:[/b] 39\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (African Descent)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Millennia City, CA\n\t\t\t\n\t\t[b]BACKGROUND:[/b] Once known as the infamous crime lord of Millennia City's Splice Circle, Smyther was thought to be dead after an attack by the villain known as Prodigal, as part of her elaborate scheme involving the Powered hero, ${codename}. Smyther returned to Millennia City (badly burned, but healed) to murder his Splice Circle replacement, Madame Vice, after she was defeated by The Millennial Group. Smyther then went on to join Culic's infamous InfraOrder, which was shut down by the Finalists from the first season of The Hero Project. Smyther recently escaped The Devoid to create the new InfraCircle alongside Culic and Scoundrel.\n\t\t\t\n\t\t[b]POWERS:[/b] Smyther possesses the ability to elicit a truthful response from any person of whom he asks a direct question. He is also an accomplished bodybuilder and marksman, and is known to inject short-range teleportation fluid into his veins. Other gene-splicing abilities suspected.\n\t\t\t\n\t\t[b]COSTUME:[/b] None.\n\t\t\n\t\t*goto icirclestatchoic\n\t#Scoundrel.\n\t\t[b]HERO ALIAS:[/b] Scoundrel\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Amanda Brown\n\t\t*line_break\n\t\t[b]AGE:[/b] 19\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (Costa Rican Descent)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Millennia City, CA \n\n\t\t[b]BACKGROUND:[/b] Originally from Millennia City's Eastern Fringes, Scoundrel is an infamous Ani-activist whose mission is to change the public image of poor, Ani-Powered individuals without many opportunities offered to them. Scoundrel served as a mole for Culic's InfraOrder in the first season of The Hero Project until her fourteenth-place elimination. To escape a prison sentence, Scoundrel agreed to be drafted into Rexford Schiller's covert wetwork squad, The Infinite Elite. After facing defeat at The Devoid War, Scoundrel then escaped police custody to found the new InfraCircle alongside Culic and Smyther.\n\n\t\t[b]POWERS:[/b] A human-turkey hybrid, Scoundrel possesses a razor-sharp beak and claws, as well as heightened speed and strength. It's also rumored that Scoundrel possesses the ability to put others to sleep, but that might be a tidbit of Thanksgiving-related humor….\n\n\t\t[b]COSTUME:[/b] None. \n\n\t\t*goto icirclestatchoic\n\t#Culic.\n\t\t[b]ALIAS:[/b] Culic\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Unknown\n\t\t*line_break\n\t\t[b]AGE:[/b] Unknown\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] Unknown\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Millennia City, CA\n\t\t\t\n\t\t[b]BACKGROUND:[/b] Culic was once a member of an Eastern Fringes Ani-gang called The Primals, until the Ani-gangs and The Splice Circle were shut down by ${codename} and The Millennial Group. After Smyther's reported death, Culic was inspired to fill the leadership vacuum of his then-idol by forming The InfraOrder, a terrorist group responsible for hundreds of deaths in Millennia City and New York City. The InfraOrder was eventually shut down by Finalists from the first season of The Hero Project. For these crimes, Culic served a sentence in The Devoid alongside Smyther, until they both escaped and teamed with Scoundrel to form the new InfraCircle. \n\t\t\t\n\t\t[b]POWERS:[/b] Culic possesses the body of a human and the head and wings of a mosquito, granting him all the abilities of a typical mosquito: blood-sucking via proboscis, flight, enhanced smell via antennae, and compound eyesight. It is also speculated that Culic's gender might be more complicated than simply male, considering that typically only female mosquitos are capable of sucking blood.\n\t\t\t\n\t\t[b]COSTUME:[/b] Culic is known to wear an all-black, military-style reinforced bodysuit.\n\t\t\n\t\t*goto icirclestatchoic\n\t#Return to information on The InfraCircle.\n\t\t*goto infracircletime\n\t#Return to Stats Screen.\n\t\t*goto officialstatchart\n\n\n*label smythertime\n\nSmyther has been able to finance the InfraCircle's entire operation by re-forming his infamous Ani-gangs in New Fringe, an area of MC just north of the Eastern Fringes and east of Dockerbay. Smyther decided to simplify the organization as follows: \n\nTRUSTED ADVISORS\n*line_break\n[b]Underboss:[/b] Lolli\n*line_break\n[b]Shed Strip Clubs Chain (Corporate Front):[/b] Juanda W\n\nANI-GANG AREAS & GENERALS\n*line_break\n[b]Shipments:[/b] The Fouls (Squawk)\n*line_break\n[b]Drug Distribution:[/b] The Scales (Ali)\n*line_break\n[b]Weapons Distribution:[/b] The Buzz (The Roach)\n*line_break\n[b]Security:[/b] The Primals (Noc)\n\nTHE PRIMALS\n*line_break\n[b]Members:[/b] Noc (Leader), Ostro (The Fouls), BoaCon (The Scales), The Prayer (The Buzz), Pumala (Shed Clubs)\n\n*page_break\n*goto officialstatchart\n\n\n*label hprookiefinalists\n*text_image rookie.png center Rookie Finalists\n*choice\n\t*if (showcrystalline) #Crystalline.\n\t\t[b]HERO ALIAS:[/b] Crystalline\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Ariel Kolson\n\t\t*line_break\n\t\t[b]AGE:[/b] 18\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (British and Irish Descent)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Westport, Connecticut\n\t\t\t\n\t\t[b]BACKGROUND:[/b] While Crystalline has dreamed of a professional heroic career since she was a little girl, her parents forced her to finish high school first. Now that she has graduated, they have allowed her to defer admission into the Ivy League school she has been admitted to, in order to pursue her dream. After one year, she must support herself as a hero or go to college. After a summer spent training in martial arts and gymnastics, acquiring her hero license, and street-heroing in Hartford, Crystalline tried out for The Hero Project and earned a Semi-Finals spot.\n\t\t\t\n\t\t[b]POWERS:[/b] Crystalline can generate crystals that possess many different, nearly limitless applications. Known applications include offense and defense (energy explosions, shields, etc), transportation (teleportation, speed, etc), natural resources (fire, ice, etc), and human enhancement (healing, etc). Crystalline can make these crystals on the spot, but her crystals only tend to be as strong/effective as their germination period. Crystalline thus keeps a crystal garden and carries a utility belt with pre-grown crystals for battle scenarios.\n\t\t\t\n\t\t[b]COSTUME:[/b] Crystalline wears a sleek navy bodysuit accented with elongated silver diamonds, meant to represent her crystals. She wears a silver utility belt filled with crystals, each color-coded for its purpose. She also wears a silver-clear visor, meant to protect her eyes from some crystals, as Crystalline is vulnerable to her own creations.\n\t\t*goto hprookiefinalists\n\t*if (showignite) #Ignite.\n\t\t[b]HERO ALIAS:[/b] Ignite\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Shane Alleyne\n\t\t*line_break\n\t\t[b]AGE:[/b] 20\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (Trinidadian: African, Indian, and French Descent)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Millennia City, CA\n\t\t\t\n\t\t[b]BACKGROUND:[/b] Ignite is a recent graduate from Melite Powered University, America's foremost two-year Powered college program. Attending on a full honors scholarship and graduating as valedictorian, Ignite was also the first reported Infini student to attend Melite University. Ignite's only field experience prior to The Hero Project was leading Melite's A-Squad on supervised training missions.\n\t\t\t\n\t\t[b]POWERS:[/b] Ignite is a registered Infini Powered with a range of earthquake Powers: localized tremors, earth manipulation, fire control, magma access, seismic blasts, and many more applications. Ignite is also extremely durable as an Infini Powered and is an exceptional hand-to-hand combatant and field strategist.\n\t\t\t\n\t\t[b]COSTUME:[/b] Ignite wears a white bodysuit made of flameproof fabric, accented with orange stripes and metallic accessories: shoulder pads, mask, belt, boots, and gloves.\n\t\t*goto hprookiefinalists\n\t*if (showtransfer) #Transfer.\n\t\t[b]HERO ALIAS:[/b] Transfer\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Iita Alakopsa\n\t\t*line_break\n\t\t[b]AGE:[/b] 26\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (Finnish Descent)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Oakland, CA\n\t\t\t\n\t\t[b]BACKGROUND:[/b] Transfer is a rising progressive gender advocate and Underrepresented Powered figure in the San Francisco area, where ze has gained a sizable following. Transfer tried out for The Hero Project on a dare, but since making it into the Semi-Finals has decided to try to expand hir horizons by taking advantage of this mainstream public platform. \n\t\t\t\n\t\t[b]POWERS:[/b] Transfer is a Morpho-Powered who rotates between zombie, werewolf, vampire, and human form cyclically every four days. This cycle is unalterable, and Transfer is unable to control these changes. Each form possesses typical abilities: zombie invincibility and regeneration; vampire strength, fangs, stealth, hypnotism, etc.; werewolf speed, senses, claws, etc. Oddly, Transfer's human days are unPowered.\n\t\t\t\n\t\t[b]COSTUME:[/b] Transfer wears an indistinct black bodysuit and cloak throughout her daily changes, marked only by a white, enamel \"T\" emblem sewn into the upper chest, representing the trifecta and Trans elements of hir identity.\n\n\t\t*goto hprookiefinalists\n\t*if (shownitewerq) #Nitewerq.\n\t\t[b]HERO ALIAS:[/b] Nitewerq\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Secret\n\t\t*line_break\n\t\t[b]AGE:[/b] Secret (Suspected 40s, Possibly Immortal)\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (Haitian Descent)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] New York City, NY\n\t\t\t\n\t\t[b]BACKGROUND:[/b] Nitewerq is a long-standing underground Manhattan hero and drag queen. She has become an icon in gay male and black female cultural circles, famously starting the \"Dueling Queens\" movement meant to to unite these previously at-odds minority circles (who once erroneously blamed each other for cultural misappropriation). Nitewerq also keeps her identity a secret underneath a full face mask, and her face remains further obscured by full drag makeup. \n\n\t\t[b]POWERS:[/b] Nitewerq claims to be an actual goddess whose Powers are fueled by the belief and adoration of her fans, though it is unclear whether she takes this claim seriously. Self-professed \"Goddess of the Climb\" Nitewerq's Powers include strength, flight, durability, and endless rope creation/manipulation. The Power Levels of each ability do seem to fluctuate wildly, though the origin of this fluctuation remains uncomfirmed.\n\t\t\t\n\t\t[b]COSTUME:[/b] Always appearing in full drag in the public eye, Nitewerq wears a Greek-goddess-inspired costume: gladiator sandals and a flowing white jumpsuit, all tied together with thick ropes. Nitewerq also sports many rope accessories: bracelets, armbands, leg bands, hair ties, and a fully braided rope cape. \n\n\t\t*goto hprookiefinalists\n\t*if (showtarsiero) #Tarsiero.\n\t\t[b]HERO ALIAS:[/b] Tarsiero\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Terry Romer\n\t\t*line_break\n\t\t[b]AGE:[/b] Unknown\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] Unknown\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Universal City, Florida\n\t\t\t\n\t\t[b]BACKGROUND:[/b] Tarsiero earned his spot in the Semi-Finals by winning The Hero Project Experience at the UniHero theme park where he worked. Little else is known about Tarsiero's life before this employment, as there is no previous record of any public heroics. Like the actual animal tarsiers, Tarsiero is prone to shyness and nervousness, and so has publicly said that trying out for The Hero Project has been a huge step for him.\n\t\t\n\t\t[b]POWERS:[/b] Tarsiero is a unique Animalistic Powered who appears to be an enlarged version of the animal, though he is technically still a tarsier-human hybrid. This grants him the typical physical traits and abilities of a tarsier: enhanced hearing that predicts movement, increased agility, ankles made for leaping, hands and feet made for climbing and clinging, and a tail twice his body length. Tarsiero's most notable enhancement are his eyes, which take up most of his face. These eyes are unable to move, but Tarsiero's neck allows for 180-degree swiveling, and his eyesight is incredibly far-reaching and precise, even at night or in harsh light.\n\t\t\t\n\t\t[b]COSTUME:[/b] None.\n\n\t\t*goto hprookiefinalists\n\t*if (showvelocityl) #Velocityl.\n\t\t[b]HERO ALIAS:[/b] Velocityl\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Kang-Dae Whan\n\t\t*line_break\n\t\t[b]AGE:[/b] 32\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] Naturalized American Citizen (North Korean Refugee)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Millennia City, CA\n\t\t\t\n\t\t[b]BACKGROUND:[/b] Velocityl is a recently escaped North Korean refugee, the subject of illegal dino-human genetic experimentation. Little is known about Velocityl's life before his recent arrival in America, where he decided to put his unwanted abilities to public use as a hero. There are several reports of successful street-level heroic work done by Velocityl before he tried out for The Hero Project.\n\t\t \t\n\t\t[b]POWERS:[/b] While technically unPowered, Velocityl was implanted illegally with dinosaur genetics that give him the wings of a pterodactyl and the head and legs of a velociraptor. As such, Velocityl can fly and run at great speeds, possesses a deadly jaw and teeth, and is extremely durable.\n\t\t\t\n\t\t[b]COSTUME:[/b] Velocityl wears no shirt because of his wings and no shoes because of his velociraptor feet. He usually appears in a pair of basic jeans.\n\n\t\t*goto hprookiefinalists\n\t*if (showsplint) #Splint.\n\t\t[b]HERO ALIAS:[/b] Splint\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Adrienne Mak\n\t\t*line_break\n\t\t[b]AGE:[/b] 16\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (Chinese Descent) \n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Chula Vista, CA\n\t\t\t\n\t\t[b]BACKGROUND:[/b] Adopted by an American family soon after her birth, Splint grew up in San Diego as an artist and a gamer, winning competitions and awards at both. According to her adoptive parents, Splint never expressed any desire to become a Powered hero before trying out for The Hero Project, which she did in secret.\n\t\t\t\n\t\t[b]POWERS:[/b] Splint is in complete control of a massive self-generated energy broadsword. Although she claims to have no prior training or heroic experience, her fierceness and proficiency in battle suggest otherwise.\n\t\t\t\n\t\t[b]COSTUME:[/b] Splint wears a lightweight, loose-fitting, martial-arts-inspired black slip, tied at the waist with slate-blue fabric. This color matches her massive broadsword, which she wears attached to her back by a harness. Over this, Splint wears thin metallic fencing-inspired armor plates to cover her most vulnerable parts, as well as the MeChip GamerComm headset, equipped with state-of-the-art gamer holo-glasses.\n\t\t\n\t\t*goto hprookiefinalists\n\t*if (showmissboss) #Miss Boss.\n\t\t[b]HERO ALIAS:[/b] Miss Boss\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Daniela Estela\n\t\t*line_break\n\t\t[b]AGE:[/b] 25\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (Puerto Rican Descent)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Los Angeles, CA\n\t\t\t\n\t\t[b]BACKGROUND:[/b] Miss Boss is an aspiring hero from Los Angeles looking to take her amateur career to the professional level. Miss Boss and her best friend/heroic partner Reigna were members of several unsuccessful heroic team ventures before making it onto The Hero Project. To be on the show, they left their current posts as members of the San Fernando Valley Venturas, a group of heroes comprised of members collected from local talent searches.\n\n\t\t[b]POWERS:[/b] Miss Boss is an energy telekinetic, meaning she can manipulate any energy source near her. She cannot generate any energy herself, however, which is why she partnered with her childhood best friend, Reigna, as an energy source. Knowing she cannot fully rely on her Powers, Miss Boss is also an exceptionally trained gymnast, markswoman, and martial artist.  \n\t\t\t\n\t\t[b]COSTUME:[/b] Miss Boss wears a skintight, spandex, black-and-maroon costume, topped with a matching leather motorcycle jacket and half-gloves. The maroon jacket zips from the top collar down, so Miss Boss leaves the bottom half undone to create a triangle effect that matches her maroon patterning. Miss Boss also wears a utility belt with exotic energy weapons, slung diagonally across her hips.\n\n\t\t*goto hprookiefinalists\n\t*if (showreigna) #Reigna.\n\t\t[b]HERO ALIAS:[/b] Reigna\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Philicia Moonwad\n\t\t*line_break\n\t\t[b]AGE:[/b] 25\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (Indian Descent)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Los Angeles, CA\n\t\t\t\n\t\t[b]BACKGROUND:[/b] Reigna is an aspiring hero from Los Angeles looking to take her amateur career to the professional level. She and her best friend/heroic partner Miss Boss were members of several unsuccessful heroic team ventures before making it onto The Hero Project. To be on the show, they left their current posts as members of the San Fernando Valley Venturas, a group of heroes comprised of members collected from local talent searches.\n\t\t\t\n\t\t[b]POWERS:[/b] Reigna has the Power to generate cascades of water-like pink energy. She seems to rely heavily on Miss Boss to control this energy for her, however, and has no other heroic skills beyond this energy generation.\n\t\t\t\n\t\t[b]COSTUME:[/b] Reigna currently wears a pink crop top and matching white-striped, high-waisted leggings, accented with white boots and gloves. Reigna is known to change her costume often, but always wears a signature pink fabric headband in her long black hair.\n\n\t\t*goto hprookiefinalists\n\t*if (showgriffin) #Griffin.\n\t\t[b]HERO ALIAS:[/b] Griffin\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Dax Gillian\n\t\t*line_break\n\t\t[b]AGE:[/b] 49\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (British Descent)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Charleston, SC\n\t\t\t\n\t\t[b]BACKGROUND:[/b] Griffin is South Carolina's premier state-sponsored hero and has been Charleston's Hero of the Year for ten years running. Hailing from a wealthy, historic Southern family, Griffin has dedicated his life to heroic and charitable work. Rumor currently has it that he entered The Hero Project to take his state-level career national. \n\t\t\t\n\t\t[b]POWERS:[/b] Griffin can generate blasts of multiple energy signatures: concussive, energy, heat, decay, and healing restoration. \n\n\t\t[b]COSTUME:[/b] Griffin wears a classic costume in his state colors: an indigo-blue bodysuit and white cape, all tight enough to highlight his muscular figure. Griffin also wears the symbols of the South Carolina state flag on his chest: a white palmetto tree and crescent moon.\n\n\t\t*goto hprookiefinalists\n\t*if (showexile) #Exile.\n\t\t[b]HERO ALIAS:[/b] Exile\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Nathan Mubasher\n\t\t*line_break\n\t\t[b]AGE:[/b] 28\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] Naturalized American Citizen (Saudi Arabian Immigrant)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Millennia City, CA\n\t\t\t\n\t\t[b]BACKGROUND:[/b] Exile is a notorious playboy who claims to have been exiled from his royal family in Saudi Arabia for being \"too good-looking\" and \"setting a bad example.\" While these claims remain unproven, Exile has continued to be a partying playboy in Millennia City, turning his career as a successful model into a post as the spokesperson for YouPower Inc., which competes with the MeChip Corp to provide ability upgrades for the unPowered. The competition in this sector is becoming fierce, since it is rumored to soon be the fastest-growing retail market. \n\t\t\t\n\t\t[b]POWERS:[/b] Exile is unPowered, but wears a bodysuit sponsored by YouPower Inc. that sports dozens of technological gadgets and wonders.\n\t\t\t\n\t\t[b]COSTUME:[/b] Exile wears a simple grey bodysuit with the YouPower corporate logo on his chest and is covered in dozens of metallic tech upgrades.\n\n\t\t*goto hprookiefinalists\n\t*if (showoconnell) #O'Connell\n\t\t[b]HERO ALIAS:[/b] O'Connell\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Micky O'Connell\n\t\t*line_break\n\t\t[b]AGE:[/b] 45\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (Irish Descent)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Wichita, Kansas\n\t\t\t\n\t\t[b]BACKGROUND:[/b] A longtime contractor and father of five who is looking for a better life for his family by becoming a famous hero, O'Connell tried his hand at heroics when he was younger, but ultimately gave up that dream to start a family. Some find his return to heroics inspiring, while others feel it might be a midlife-crisis move.\n\n\t\t[b]POWERS:[/b] O'Connell's primary Power is massive superstrength, but he also possesses the Power to boost and enhance the abilities of any targeted Powered around him. This secondary Power requires specific and intricate knowledge of the targeted Powered's abilities, which requires O'Connell to be an expert on identifying and sensing Power sets.\n\t\t\t\n\t\t[b]COSTUME:[/b] O'Connell wears a basic construction uniform in green and white: a hard hat, cargo pants, utility belt, and boots. His t-shirt bears the crest of his Irish family: a trippant stag surrounded by counterbalanced trefoils, set in a shield of green and white and presided over by a knight. The crest also bears the O'Connell Gaelic motto, \"Ciall Agus Neart,\" which translates roughly to \"Sense and Strength.\"\n\n\t\t*goto hprookiefinalists\n\t#Return to Stats Screen.\n\t\t*goto officialstatchart\n\n*label hpvetfinalists\n\n*text_image veterans.png center Veteran Finalists\n*choice\n\t*if (showmachgirl) #Mach Girl.\n\t\t[b]HERO ALIAS:[/b] Mach Girl\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Caroline Yilmaz\n\t\t*line_break\n\t\t[b]AGE:[/b] 17\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (Turkish Descent)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Katy, TX / Millennia City, CA\n\n\t\t[b]BACKGROUND:[/b] Entering the first season of The Hero Project as an amateur hero, Mach Girl survived against all odds to the initial rounds of the Live Finals before her elimination. Since then, she has finished her high-school education early in order to launch a full heroic career. Although she has occasionally been seen heroing in support of ${codename} alongside fellow former Underdog contestant The Bear, The Hero Project: Redemption Season marks Mach Girl's official return to heroics. \n\n\t\t[b]POWERS:[/b] Mach Girl can fly at supersonic speeds and becomes invulnerable when flying.\n\n\t\t[b]COSTUME:[/b] Mach Girl wears a classic pink flight suit and flight goggles, but has added an aerodynamic head scarf built into her goggles. Mach Girl has also removed the white stars from her costume that she formerly identified as \"Confederate.\"\n\n\t\t[b]REDEMPTION:[/b] Feeling she wasn't ready her first time around, Mach Girl wants redemption now that she knows who she wants to be: an A-List hero and role model for young Muslim-Americans. \n\t\t*goto hpvetfinalists\n\t*if (showfumble) #Fumble.\n\t\t[b]HERO ALIAS:[/b] Fumble\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Stefan Agnes\n\t\t*line_break\n\t\t[b]AGE:[/b] 32\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] Naturalized American Citizen (Greek Immigrant)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Millennia City, CA\n\t\t\t\n\t\t[b]BACKGROUND:[/b] Entering the first season of The Hero Project as a reality star famous for marrying the hero-socialite Stage Show, Fumble was shockingly cut in the early rounds of the Live Finals. Although Stage Show filed for divorce after winning the first season of The Hero Project, the divorce was never finalized. Rumor has it that the couple will reunite if Fumble is able to win Redemption Season and join Stage Show on The American Protectorate.\n\t\t\t\n\t\t[b]POWERS:[/b] Fumble has top-level athletic Powers that he has focused into Legendary supertackles, his signature move. Fumble also has two prosthetic legs that enable mega-leaping.\n\t\t\t\n\t\t[b]COSTUME:[/b] Fumble wears a black-and-white, football-inspired costume topped with shoulders-pads primed for tackling.\n\n\t\t[b]REDEMPTION:[/b] Perceived as nothing more than a reality star or a husband, Fumble wants redemption to prove he is a worthy hero all on his own.  \n\t\t*goto hpvetfinalists\n\t*if (showthebear) #The Bear.\n\t\t[b]HERO ALIAS:[/b] The Bear\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Dean Reece\n\t\t*line_break\n\t\t[b]AGE:[/b] 27\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (European Descent)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Los Angeles, CA / Millennia City, CA\n\n\t\t[b]BACKGROUND:[/b] A prominent Los Angeles hero and social figure, The Bear also doubles as a gay cultural icon, having appeared in many reality shows and a slew of clandestine adult holo-tapes. He's notorious for his penchant for partying and his promiscuous dating life. The Bear's interpretation of his Powers is also the source of great controversy—many claim he represents two of the most regressive gay stereotypes: the raging pretty-boy party-boys and the bulkier, hairy men known as \"bears.\" The Bear claims he is working to \"reclaim\" both stereotypes, but many believe he's simply exploiting them. \n\n\t\tThese themes were explored during The Bear's time on the first season of The Hero Project, where he finished in tenth place during a Leaderboard elimination. Since then, The Bear has continued his heroic career in Los Angeles and has occasionally been seen heroing in support of ${codename}, alongside fellow former Underdog contestant Mach Girl.\n\n\t\t[b]POWERS:[/b] The Bear transforms from his slight, waifish frame into a massive, hairy, hulking behemoth. Once transformed, The Bear possesses incredible strength and surprisingly nimble reflexes.\n\n\t\t[b]COSTUME:[/b] The Bear wears a revealing pink wrestling leotard.\n\n\t\t[b]REDEMPTION:[/b] Feeling that his first run portrayed him as a mid-pack hero, The Bear wants redemption, to prove he can advance further than tenth place.\n\t\t*goto hpvetfinalists\n\t*if (showgalexa) #Galexa.\n\t\t[b]HERO ALIAS:[/b] Galexa\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Jacqui Kimura\n\t\t*line_break\n\t\t[b]AGE:[/b] 34\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (Japanese Descent)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Washington, DC\n\n\t\t[b]BACKGROUND:[/b] Galexa was widely considered one of the nation's most underrated and potentially Powerful heroes, building her entire career in Washington DC. She eventually became the leader of The Power Branch, the government-sponsored Powered team that reported directly to the Vice President. After her elimination in the Final Selection during the first season of The Hero Project and the dissolution of The Power Branch, Galexa attempted to launch a solo career while balancing her role as a prominent single mother supporting her adopted child. However, there have been unconfirmed rumors swirling around Galexa of legal trouble and a revoked license.\n\n\t\t[b]POWERS:[/b] Galexa is an Infini-Class Powered able to harness and wield the Power of stars, which she focuses into \"star fists\" that grant invulnerability, flight, heat blasts, and density-packed punches. Galexa is also one of the few Powered individuals capable of temporary, unaided space travel. \n\n\t\t[b]COSTUME:[/b] Galexa wears a sleek white bodysuit with golden hard-metal boots and gloves that match her yellow leather flight jacket. Galexa's costume is topped by red headphones that house a retractable holo-energy visor.\t\n\n\t\t[b]REDEMPTION:[/b] Galexa aims to prove once and for all that she's a hero worthy of the big league A-List, a status that has eluded her the entirety of her decorated career.\n\t\t*goto hpvetfinalists\n\t*if (showtaranarain) #Tarana Rain.\n\t\t[b]HERO ALIAS:[/b] Tarana Rain\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Tarana McNeal\n\t\t*line_break\n\t\t[b]AGE:[/b] 17\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (African Descent)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Millennia City, CA\n\n\t\t[b]BACKGROUND:[/b] Tarana was a student of MC's ritzy Powered private school in Rein Hill, Rein Prep, funded by her wealthy parents (who own MC's best-selling newsblog, the [i]Millennial Orbit[/i]). However, after finding out about Tarana Rain's secret heroing career from her appearance on the first season of The Hero Project, her parents forbid her from engaging in heroics. Ignoring their requests, Tarana Rain has since been disinherited and hopes to find her own way by entering Redemption Season.\n\n\t\t[b]POWERS:[/b] Tarana Rain has the Power to generate and manipulate water.\n\n\t\t[b]COSTUME:[/b] Tarana Rain used to wear a white costume encrusted with diamonds and expensive hair extensions, but has since gone for a simpler look: a navy-and-white wetsuit to protect her from the constant moisture associated with her Powers. The wetsuit also has a built-in hood, which protects her ever-changing, multi-colored hair from her water Powers. \n\n\t\t[b]REDEMPTION:[/b] Tarana Rain hopes to take advantage of this second chance to make it on her own and regain the luxe life she once had.\n\t\t*goto hpvetfinalists\n\t*if (showdi) #Di.\n\t\t[b]ALIAS:[/b] Di\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Drea Victon-Taylor\n\t\t*line_break\n\t\t[b]AGE:[/b] 42\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (African & Italian Descent)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] Washington, DC\n\t\t\t\n\t\t[b]BACKGROUND:[/b] Di recently stood as the First Lady of the United States for the brief tenure of her then-husband, President Victon. Di revealed herself to be a Powered individual in the infamously televised Devoid War, quarreling with her stepson (and current American Protectorate member), Jury. Connected to The Hero Project through her former family, Di hopes to redefine herself and step into the spotlight as a hero, though it remains to be seen whether she has any ability to operate in the field.\n\n\t\t[b]POWERS:[/b] Di can create diamonds that can be used for many applications, including concussive blasts or as boxing glove fist-covers. Di's diamonds dissolve after a few hours.\n\n\t\t[b]COSTUME:[/b] Di wears a jumpsuit with a military-style diamond-button front, an off-the-shoulder collar, and a half-draped detachable cape. Di's asymmetrical bob is dyed a shade of pale lavender.\n\t\t\n\t\t[b]REDEMPTION:[/b] Di is ready to prove that she is most certainly not her ex-husband, the corrupt former President Victon.\n\t\t*goto hpvetfinalists\n\t*if (showlittlejagged) #Little Jagged.\n\t\t[b]ALIAS:[/b] Little Jagged\n\t\t*line_break\n\t\t[b]IDENTITY:[/b] Littany Loane\n\t\t*line_break\n\t\t[b]AGE:[/b] 26\n\t\t*line_break\n\t\t[b]ETHNICITY:[/b] American (African & Japanese Descent)\n\t\t*line_break\n\t\t[b]CITY OF OPERATION:[/b] New York City, NY\n\t\t\t\n\t\t[b]BACKGROUND:[/b] Formerly a well-known model and society it-girl, Littany experienced a public fall from grace during her battle with cocaine and alcohol addiction. After several unsuccessful stints in rehab, Littany became unemployable for insurance reasons. She was then recruited by the infamous Ani-villain Culic, becoming a member of his terrorist group, The InfraCircle, which was taken down by the Finalists of the first season of The Hero Project. Little Jagged's prison sentence was abbreviated after she provided intelligence on Culic and promised to continue to use her knowledge to aid The Hero Project.\n\t\t\t\n\t\t[b]POWERS:[/b] Little Jagged's skin is made entirely of cracked glass, giving it an appearance often described as \"broken mirrors.\" She can crack off these glass fragments and use them as deadly weapons, which she throws with pinpoint accuracy. Little Jagged can also turn herself and others invisible by refracting light.\n\t\t\t\n\t\t[b]COSTUME:[/b] None.\n\n\t\t[b]REDEMPTION:[/b] Little Jagged claims to have been led astray by Culic and is here to prove she isn't a villain. She is seeking rehabilitation on The Hero Project, much like The Crush.\n\t\t*goto hpvetfinalists\n\t#Return to Stats Screen.\n\t\t*goto officialstatchart\n", "choicescript_upgrade": "*comment x\n*label start\n*check_purchase adfree warningsysnine youpower\n\n*if not(choice_purchased_adfree)\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of \"The Hero Project: Redemption Season.\"\n\n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 start\n\n*if not(choice_purchased_warningsysnine)\n  [b]MeChip Warning System[/b]\n\n  It's one of the most valuable MeChip updates: the Warning System will enable your MeChip to alert you if your Power or Health Levels drop dangerously low (without having to go through the Show Stats screen on your MeChip). It will also enable your MeChip to inform you of strategic possibilities and warn you if you're about to make a decision with a high level of risk. Of course, you can always choose to ignore the Warning System, but it might come in handy keeping you alive in dangerous situations.\n\n  *purchase warningsysnine $0.99 start\n\n*if not(choice_purchased_youpower)\n  [b]The YouPower Project[/b]\n\n  [i]The YouPower Project[/i] is a short story developed by Zachary Sergi and written by Michael Alan Nelson, set in the months following [i]The Hero Project: Redemption Season.[/i] It was originally developed in partnership with Serial Box.\n\n  *purchase youpower $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of \"The Hero Project: Redemption Season.\"\n\n*if choice_purchased_warningsysnine\n  [b]MeChip Warning System[/b]\n\n  You've paid to unlock the MeChip Warning System update: the Warning System will enable your MeChip to alert you if your Power or Health Levels drop dangerously low (without having to go through the Show Stats screen on your MeChip). It will also enable your MeChip to inform you of strategic possibilities and warn you if you're about to make a decision with a high level of risk. Of course, you can always choose to ignore the Warning System, but it might come in handy keeping you alive in dangerous situations.\n\n*if choice_purchased_youpower\n  [b]The YouPower Project[/b]\n\n  You've paid to unlock [i]The YouPower Project[/i], a short story developed by Zachary Sergi and written by Michael Alan Nelson. It can be read from either the start or the end of [i]The Hero Project: Redemption Season.[/i]\n", "gameload": "*comment é x\n*temp first_page true\n*temp youpower_force_appear false\n*label restart\n*label startmenu\n[i]Heroes Rise Presents:[/i]\n\n*text_image stat_title.png center The Hero Project: Redemption Season\n\nBy\n*line_break\n*link https://twitter.com/zacharysergi Zachary Sergi\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\t\t*advertisement\n\t\t*goto youpower_purchase\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tAmerica's #1 reality show for heroes is back for another season! Harness your superpowers to steal the spotlight, win votes, and save your sister!\n\n\t[b]The Hero Project:[/b] [i]Redemption Season[/i] is the first installment in a new series of interactive novels by Zachary Sergi set in the \"Heroes Rise\" universe. Your choices control the story. It's entirely text-based--129,000 words, without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\n\tIn a contest where everyone has superpowers, your opponents can cause earthquakes and explosions, but you're an average Ani-Powered who wakes up with different animal attributes every day. Will your hawk eyes or canine claws take you far enough in the competition to satisfy the only person who can help your sister? And what happens if winning isn't enough?\n\n\tAs you advance, the decisions you make will transform viewers' ideas of what it means to be a hero. Will you fight for your own goals, or make sacrifices for the good of society? Strive for what you believe is right by following the rules, or take down the whole system with more radical methods? Would you take wealth and fame over changing the world?\n\n\tChoose wisely. It's Redemption Season.\n\n\t[i]You can play the first four chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\t*comment endif\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n\t*page_break Play Now for Free\n\n*label youpower_purchase\n*check_purchase adfree youpower\n*check_achievements\n*if (((choice_purchase_supported) and not(choice_purchased_youpower)) and ((((choice_achieved_fsfourteen) or (not(choice_purchased_adfree))) or ((choice_is_ios_app))) or youpower_force_appear))\n\t[i]The YouPower Project[/i] is a short story developed by Zachary Sergi and written by Michael Alan Nelson. It's set in the months following [i]The Hero Project: Redemption Season,[/i] but contains no spoilers for [i]The Hero Project.[/i]\n\n\t*purchase youpower $0.99 purchased\n\t*page_break Play Redemption Season\n*advertisement\n\n*label purchased\n\n*page_break\n\n[b]The Hero Project:[/b] [i]Redemption Season[/i] is the first novel in a stand-alone series that takes place in the Heroes Rise universe, focusing on a brand new main character. New to Heroes Rise? Great, you can get started right away without any prior reading!\n\nThough if you have read [b]The Heroes Rise Trilogy[/b], you can load your [b]Heroes Rise:[/b] [i]HeroFall[/i] saved games below for historical accuracy and some special surprises.\n\n*check_purchase youpower\n*check_achievements\n*choice\n\t#I'm a new reader.\n\t\t*set first_page false\n\t\t*set newreader true\n\n\t\tIf you want more Heroes Rise, check out [b]The Heroes Rise Trilogy[/b]:\n\n\t\t*link https://www.choiceofgames.com/heroes-rise/redirect.php?src=hr4 Heroes Rise: The Prodigy (Book One)\n\t\t*line_break\n\t\t*link https://www.choiceofgames.com/heroes-rise-2-hero-project/redirect.php?src=hr4 Heroes Rise: The Hero Project (Book Two)\n\t\t*line_break\n\t\t*link https://www.choiceofgames.com/heroes-rise-3-herofall/redirect.php?src=hr4 Heroes Rise: HeroFall (Book Three)\n\n\t\tYou don't have to read these to enjoy [i]Redemption Season[/i] though, so get ready to dive right in, Hero Riser!\n\n\t\t*goto readytostart\n\t#I'd like to load my saved game from [b]Heroes Rise:[/b] [i]HeroFall[/i].\n\t\t*set first_page false\n\t\tPlease note, you must load a game from [i]HeroFall[/i] for [i]Redemption Season[/i] to work properly. \n\n\t\tGames loaded from [i]The Prodigy[/i] or [i]The Hero Project[/i] WILL NOT work.\n\n\t\t*choice\n\t\t\t#Yes. Load my saved game from [b]Heroes Rise:[/b] [i]HeroFall[/i].\n\t\t\t\t*comment Need to load code in a way that it re-writes the relevant code in startup.\n\t\t\t\t*restore_game cancel=restart\n\t\t\t\t*goto readytostart\n\t\t\t#Never mind, I want to start as a new reader.\n\t\t\t\t*set newreader true\n\t\t\t\t*goto readytostart\n\t*if (choice_purchased_youpower) #I want to read [i]The YouPower Project.[/i]\n\t\t*goto_scene youpower\n\t*if (not(choice_purchased_youpower)) #I'd like to purchase [i]The YouPower Project[/i] side story.\n\t\t*set youpower_force_appear true\n\t\t*goto youpower_purchase\n\t\n*label readytostart\n\n*finish REDEMPTION SEASON\n", "rs_eight": "*comment é x\n\n*image chap8.png center Chapter Eight: Boss Level\n\nNothing will ever be the same.\n\nYou stand frozen, inhaling the scent of blood, trying to understand how you got here. Nothing seems to make sense: the parts don't add up, the pieces don't fit. It's like someone has ripped up the game board, torn apart the seams of your reality.\n\nAfter this, nothing can ever be the same. \n\nYou won't let it be.\n\nBecause today, the death is on you.\n\n*page_break NOT MUCH EARLIER\n\nLight from the camera orbs reflects off of her sharded skin, refracting onto the cave walls in a kaleidoscope of shapes. The effect is so entrancing that you don't even realize you've been staring until your brand new teammate, Little Jagged, turns to you.\n\n\"Uh, are you okay?\" she says, a look of concern playing across her broken-glass face.\n*if newreader\n\tYou've just met Little Jagged, but you recognized her from the first season of The Hero Project—as a member of the original InfraOrder fighting against the Finalists.\n*if trilogyreader\n\tYou've just met Little Jagged, but you recognized her from the first season of The Hero Project.\nThe reason she's fighting alongside you today is a long story, one that gets lost as you marvel at Little Jagged's skin, which is made entirely of mirrored glass shards.\n\n\"Yes, sorry,\" you say. Though now that Little Jagged has looked your way, you can tell that she's having a tough time taking her eyes off of you, too. You can understand why as you catch a glimpse of yourself in her skin.\n\nToday you find yourself in the form of a tardigrade-hybrid and even you have to admit that you look particularly bizarre. Your knowledge of animals has grown fairly extensive over the years, but you still had to ask MeChip Prodigal to execute a search to figure out exactly what you are. \n\n\"So, my mysterious chicken, it looks like you've taken the form of a tardigrade, otherwise known as waterbears, slow steppers, or moss piglets. Gosh darn, do I like the sound of that last one!\" MeChip Prodigal began explaining. \"They're usually only .05 inches at their largest size, so it's safe to say you might be the largest tardi ever to arrive at a party!\"\n\n*page_break\n\n[i]And perhaps the ugliest,[/i] you think. Apparently tardigrades have rough-plated brownish exteriors covered with sensory bristles, which currently populate your transformed skin. Despite retaining your human body shape, you've also grown two extra pairs of stubby legs on your torso, tipped with disk-claws. Perhaps worst of all, your mouth has turned outward to form a tube jutting from your face, complete with piercing stylets.\n\nAs MeChip Prodigal continued explaining, you learned that this jarring new state at least has a few major upsides:\n\n\"Here's the good news, piglet. Tardigrades are found all over the world because they've been known to survive in extreme conditions. These slow steppers can withstand absolute zero, boiling temperatures, radioactive conditions, intense high pressure, and even the extreme low pressure of space. As if that isn't mind-blowing enough, my wacky waterbear, Tardigrades are able to engage in a state called cryptobiosis, or 'hidden life.' In this state tardigrades become nearly invincible, able to survive in a dehydrated state without food or water for up to a decade.\"\n\nLuckily you just have to survive this day in front of you, so all of these impressive capabilities will no doubt help you do that. You've already decided which you think will be most useful:\n\n*choice\n\t#My disk-claws and tubular piercing stylets.\n\t\t*set physical %+5\n\t\t*set defensive %-5\n\t\t*goto nowallwobb\n\t#My ability to survive extreme temperatures and pressures.\n\t\t*set physical %-5\n\t\t*set defensive %+5\n\t\t*goto nowallwobb\n\t#My ability to enter cryptobiosis.\n\t\t*set physical %-5\n\t\t*if (defensive \u003c 50)\n\t\t\t*set defensive %+5\n\t\t\t*goto nowallwobb\n\t\t*else\n\t\t\t*set defensive %-5\n\t\t\t*goto nowallwobb\n\t#My tough skin and extra sensory bristles. \n\t\t*set physical %+5\n\t\t*set defensive %+5\n\t\t*goto nowallwobb\n\t\n*label nowallwobb\nHowever, right now all you can think about is the way you walk like a wobbly bear on your disk-clawed human legs. You wish you looked more like yourself, especially today… \n\nSince the Rookies and the Veterans were finally revealed to each other this morning. \n\nVery early, before today's second Live Finals mission, you and the four other remaining Rookies were brought to the arena backstage….\n\n*page_break EVEN EARLIER STILL\n\nStanding backstage, you try not to notice as the other Rookies react to your new tardigrade body, either gaping at you or avoiding looking entirely. Luckily you have plenty of distractions of your own—you had a very hard time falling asleep last night after The Great Loa's unexpected visit. Then once you did manage to drift off, the pounding ache from the growth of your tubular mouth woke you up again. Still feeling extremely groggy, you struggle to understand what is happening as the other Rookies start getting called out on stage one by one.\n\n\"Tarsiero, the team spirit!\" Colton shouts, causing Tarsiero to walk out from backstage, looking confused-but-contented as always.\n\n\"Miss Boss, the bombshell heroine!\" Colton calls next, prompting Miss Boss to run out. Seeing her immediately makes your throat go dry, given Loa Shift's latest cryptic mandate.\n\nYou waited on the roof alone last night for some sort of further explanation from The Great Loa, but none came. You still have no idea what \"letting Miss Boss fall\" means, nor how it could possibly help spread awareness about the Underrepresented Powered issues.\n*if loabeliever\n\tYou want to trust in Loa Shift's visions, but you have to ask yourself: how can you make something happen that you don't fully understand? \n\t*goto spentallnight\n*elseif loaskeptic\n\tYou don't believe in this vision for a second—you know Loa Shift must be pushing some agenda, especially given this final convenient \"awareness\" detail to make you inclined to comply. However, you have zero ways to understand what this agenda might be and no time to figure it out while on The Hero Project.\n\t*goto spentallnight\n*else\n\tHowever, you decided quickly that whether Loa shift is communicating a real vision or pushing some agenda is irrelevant to you. The only relevant thing is fulfilling her final wish, so you can cure JK once and for all.\n\t*goto spentallnight\n\n*label spentallnight\n\nPutting that consideration aside, you then couldn't stop wondering what \"let Miss Boss fall\" might possibly mean. Letting her fail in the mission? Ensuring she is cut in the next Leaderboard elimination? Ruining her reputation somehow? Or does it mean you're supposed to literally let her fall down? You didn't want to even let yourself consider the worst possibility—that letting her fall might mean something far more…deadly.\n\n*page_break\n\nYou are so wrapped up in retreading these thoughts that you barely even notice as Weaver rushes up beside you, completely out of breath. \n\n\"Sorry, my blasted alarm didn't go off,\" Weaver gasps, looking about twice as exhausted as you currently feel. You know this production schedule is grueling for everyone, but especially for Weaver, as ${weaverze} doubles up on stylist and handler duties.\n*if weaverromanceattempt\n\tGiven how tired ${weaverze} looks, you figure now it's probably good you didn't go to visit ${weaverhir} late last night after all. Though you find yourself still wanting to make that visit happen, especially as your stomach does a little flip seeing Weaver now.\n*comment endif\n\n\"The Rookies and the Veterans are meeting for the first time,\" Weaver explains, not reacting at all to your tardigrade appearance as ${weaverze} \"looks\" up at you. $!{Weaverze} obviously hasn't bothered to turn on ${weaverhis} bionic glasses, so ${weaverze} hasn't reacted with shock the way the rest of the Rookies did. Seeing Weaver now, you feel an immediate impulse to tell ${weaverhir} about this whole Loa Shift mess, but you force that impulse away—you know it would only make things worse.\n\nWhich is exactly why you didn't tell JK about this final task, either. You know what her reaction would be—she'd just tell you not to harm another Powered for her sake. So as usual, all of the pressure in deciding what to do is going to fall on you.\n\n\"Crystalline, the teen prodigy!\" Colton calls next from the stage, causing Crystalline to run out with a forced smile on her face. \n\n\"See now why I pushed you about your reality persona? I knew everyone would inevitably get boiled down like this,\" Weaver mutters. \"Anyway, I hope you like yours. I went with ${codenamed}, the game changer.\"\n\n*choice\n\t#Considering how I look today, hopefully this title will just intimidate the Veterans.\n\t\t*set respected %-20\n\t\t*set image %-30\n\n\t\t*if (respected \u003c 30)\n\t\t\t*set legended +1\n\t\t\t*set lb +20\n\n\t\t\tThis reaction perfectly suits your already feared persona, so you make sure to look extra grim as Colton calls:\n\t\t\t*goto coltcallsyou\n\t\t*else\n\t\t\t*set lb +10\n\n\t\t\tSo you make sure to look extra grim as Colton calls:\n\t\t\t*goto coltcallsyou\n\t#I want to intimidate the Veterans, but I'd rather do that based on my reputation and actions, not the way I look.\n\t\t*set respected %-20\n\t\t*set image %+30\n\n\t\tKnowing this, you try to seem as calm and collected as possible once Colton calls:\n\t\t*if (respected \u003c 30)\n\t\t\t*set legended +1\n\t\t\t*set lb +20\n\t\t\t*goto coltcallsyou\n\t\t*else\n\t\t\t*set lb +10\n\t\t\t*goto coltcallsyou\n\t#I hope this title will earn me the respect of the Veterans, despite my ridiculous appearance today.\n\t\t*set respected %+20\n\t\t*set image %+30\n\n\t\t*if (respected > 70)\n\t\t\t*label resptrue\n\t\t\t*set legended +1\n\t\t\t*set lb +20\n\n\t\t\tThis reaction perfectly suits your already respected persona, so you make sure to stand up straight and hold your head high as Colton calls:\n\t\t\t*goto coltcallsyou\n\t\t*else\n\t\t\t*label respfalse\n\t\t\t*set lb +10\n\n\t\t\tSo you make sure to stand up straight and hold your head high as Colton calls:\n\t\t\t*goto coltcallsyou\n\t#Looking like a true Ani-, Disembodied, and Morpho-Powered should only gain me more respect as a game changer.\n\t\t*set respected %+20\n\t\t*set image %-30\n\n\t\t*if (respected > 70)\n\t\t\t*goto resptrue\n\t\t*else\n\t\t\t*goto respfalse\n\n*label coltcallsyou\n\"${codenamed}, the game changer!\"\n\nYou walk out on stage and feel the bright lights across your tough tardigrade skin. You hear an audible gasp from the crowd as you appear, but you force yourself not to react as you settle into your seat beside the other Rookies.\n\n*if transfergone\n\t\"Last but not least, we have Griffin, the experienced leader!\" Colton announces. Griffin comes out onto the stage with his usual puffed-up chest. He avoids looking in your direction at all, which you try very hard not to take\n\t*if griffinromancescene\n\t\tpersonally, given what happened last night. \n\t\t*if asexual\n\t\t\t*goto yourturn\n\t\t*else\n\t\t\tYou tell yourself it must just be because neither you nor Griffin want to make a showmantic move on camera. Actually, maybe this really proves that Griffin wasn't with you just for the showmance of it all.\n\t\t\t*goto yourturn\n\t*else\n\t\tpersonally.\n\t\t*goto yourturn\n*else\n\t\"Last but not least, we have Transfer, the scrappy underdog!\" Colton announces, perhaps word-playing on Transfer's werewolf persona. Though there is nothing remotely canine about Transfer today as ze appears on stage in grunting zombie form. You try to make eye contact with hir\n\t*if transferromancescene\n\t\tafter what happened last night, but Transfer's eyes don't seem able to focus on anything in particular. It looks like you're not the only one to wake up in a potentially jarring state today…\n\t\t*goto yourturn\n\t*else\n\t\tto see if ze is happy to have been saved last night, but Transfer's eyes don't seem able to focus on anything in particular. It looks like you're not the only one to wake up in a potentially jarring state today…\n\t\t*goto yourturn\n\n*label yourturn\n\n\"All right Rookies, are you ready to finally learn who your esteemed Veteran counterparts are?\" Colton asks, already turning towards the other end of the stage. You suddenly find yourself holding your breath—you're more anxious to learn who these Veterans are than you would have expected.\n\n*page_break\n\n\"First up we have last season's tenth-place finisher: The Bear, the gay icon!\"\n\nThe Bear stomps out on stage, towering tall in a signature pink wrestling leotard that reveals his hairy chest and broad shoulders—and you can't help but notice that Weaver has placed his THP emblem rather conspicuously, just below the exposed ab muscles of his belly button. You recognize The Bear immediately, thanks again to JK's Hero Project Boot Camp. Still, MeChip Prodigal appears to say:\n\n\"If you want to know more about the Veterans, I'll upload rundowns to the Stat Screen as they appear. But fret not, my mossy piglet, you won't have to worry about knowing any of these details until you actually interact with the Veterans later. And even then, only if you care!\"\n\nThankful as always for MeChip Prodigal's assistance, you return your focus to the stage as Colton rolls right along to the next Veteran…\n\n*set meetveterans true\n*set showthebear true\n*page_break\n*set showfumble true\n*set showmachgirl true\n\n\"Last season's twelfth- and thirteenth-place finishers: Mach Girl, America's sweetheart, and Fumble, the husband heartthrob!\"\n\nThe audience goes nuts for both of these heroes as they appear on stage. Mach Girl wears her classic pink flight suit over her tall and lean frame, already looking much older than she did on the first season, despite the fact that it happened just last year. \n*if trilogyreader\n\tThe other noticeable and rather political differences are that Mach Girl has added an aerodynamic head scarf built into her goggles and has replaced all of the white \"Confederate\" stars that used to run up and down her costume with golden THP emblems.\n*comment endif\n\nBeside her, Fumble sports his usual football-inspired shoulder-pad costume, now adorned with two THP emblems on his collarbone tackle pads. \n*if trilogyreader\n\tHowever, your eyes are immeidately drawn to the wedding ring now returned to Fumble's finger—does this mean he is back with Stage Show?\n*comment endif\n\nBefore you can even absorb the fact that three of The Hero Project's most popular first-season Finalists have returned to compete, Colton moves on to the next Veteran reveal…\n\n*page_break\n*set showtaranarain true\n*set showgalexa true\n\n\"Next we have two Veterans eliminated before their time in last season's Final Selection,\" Colton booms. \"Galexa, the
