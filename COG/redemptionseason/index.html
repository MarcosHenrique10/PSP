lready told you, hiring you isn't some grand selfless gesture. I need someone I can trust in the trenches, because GG is right about one thing: everyone is going to see me as the newbie amateur until I prove myself otherwise.\n\n\"So you're going to be my hidden set of ears around here—people feel free to talk in front of you, and you can hear things no one else can. And given all the time you're going to be spending with the Finalists to design their customized costumes for the finale, you're going to be seen as a trusted designer first and foremost. The fact that you're my little producer secret weapon is going to be invaluable.\"\n\nYou fight the urge to smirk at Aunt Lyra—she has such a finely tuned moral compass and sense of justice that it's very easy to forget how cunning and calculating she can be. Most people assume these qualities are mutually exclusive, which always works to her advantage.\n\n\"What?\" Aunt Lyra says, clearly reading your expression. \"I believe in building a better show and writing new rules on how that's done, but that doesn't mean we're immune to the politics here. But enough, I've got a million things to do, so let's get through this. I just sent you the full background files on your assigned Finalists.\"\n\n*page_break\n\nOn cue, MeChip Seamanda arrives with your MeMail from Aunt Lyra. You mentally activate dictation as Aunt Lyra speaks—you've gotten very good at listening to multiple voices at once.\n\n\"So I'm assigning you three Rookies and giving four to my other production handler,\" Aunt Lyra begins. \"You'll meet Kevin later, because you two are going to be working closely together. We want the Rookies to feel like a unified team as much as we can, like we're all in this together against the Veterans. And really, we are, because as you know your paycheck depends on how far your three Rookies make it in the show. To ensure their success, priority number one will be getting them prepared to do their heroic job. Priority number two is getting them to open up to you and the cameras. \n\n\"All right, let's start with ${codenamed},\" Aunt Lyra rolls on. \"Battle Stats place ${youdhir} as \n*if (defensive > 50)\n\ta defensive\n*if (defensive \u003c= 50)\n\tan offensive\nfighter who prefers using ${youdhis}\n*if (fighting > 50)\n\t${kungfuspecialty} Kung Fu and ${maspecialty} martial-arts specialties\n*if (fighting \u003c= 50)\n\tAni-Powers\nin battle scenarios. When ${youdze} ${youdzedo} utilize ${youdhis} Ani-Powers, ${youdze} tend${youdzes} to favor more\n*if (physical > 50)\n\tphysical\n*if (physical \u003c= 50)\n\tintangible\napplications. This is all important to remember for missions, though that will be more my responsibility as DRPR liaison. You should really focus on ${codenamed}'s character profile.\n\n\"So far, ${youdze} seem${youdzes} to be in the competition for\n*if (societal > 50)\n\tsocially responsible, societal motivations, to spread awareness about Underrepresented Powered issues. On these issues,\n*if (societal \u003c= 50)\n\tpersonally responsible, individual motivations, to make a better life for ${youdhir} and ${youdhis} sister. On Underrepresented Powered issues,\n${youdze} tend${youdzes} to fall more on the \n*if (traditional > 50)\n\ttraditional spectrum.\n*if (traditional \u003c= 50)\n\tradical spectrum.\nUnderstanding and remembering this will help you bond well with ${codenamed}. Most importantly for our purposes, viewers seem to\n*if (respected > 50)\n\treally respect\n*if (respected \u003c= 50)\n\tbe fearful of\n${codenamed} so far, thanks largely in part to ${youdhis} tendency to be\n*if (public > 50)\n\topen to public transparency.\"\n*if (public \u003c 50)\n\tless showy and more private.\"\n\n*page_break\n\n*if (legended \u003c 30)\n\t*set legended +1\n*if legendleveltwo\n\t*goto nexttime\n*else\n\t*achieve legendcattwo\n\t*set legendleveltwo true\n\t*goto nexttime\n\n*label nexttime\n\n\"All of this has added up to a Legend Level of ${legended}, which is indicative of ${codenamed}'s overall impact with viewers. \n*if (legended > 15)\n\tIt also places ${youdhir} firmly in the DRPR Legend Trainee category.\n\n*if (rlshp_eps > 50)\n\t\"${codenamed} has impressed me and the rest of the producers thus far, so we're committed to doing any image therapy that might seem prudent. Are there any areas that need improving?\" Aunt Lyra asks, evidently leaning back in her chair from the sound of leather stretching.\n\n\tYour MeReport lets you hear all of these metrics that Aunt Lyra just summarized, which is good, since you can tell this is a mini test of how closely you've been paying attention. Knowing that right now ${codenamed}'s Public & Private and Legend Stats matter most, you decide:\n\t*goto improvestatstime\n*else\n\t\"So what do you think?\" Aunt Lyra asks, evidently leaning back in her chair from the sound of leather stretching. \n\n\t\"I think I need to work on strengthening ${codenamed}'s relationship with the producers in general,\" you say. \"I know if that relationship improves, ${codenamed} will receive more support and attention in meetings like this that will help ${youdhir} advance.\"  \n\n\t\"Great,\" Aunt Lyra responds, seeming pleased with your logic.\n\t\n\t*page_break\n\t*goto skipmoveon\n\n*label improvestatstime\n*choice\n\t*selectable_if (defensive \u003c 60) #\"I'm going to boost ${youdhis} Defensive Stat.\"\n\t\t*set defensive %+20\n\t\t*goto pvlabel\n\t*selectable_if (defensive > 40) #\"I'm going to boost ${youdhis} Offensive Stat.\"\n\t\t*set defensive %-20\n\t\t*goto pvlabel\n\t*selectable_if (physical \u003c 66) #\"I'm going to boost ${youdhis} Physical Stat.\"\n\t\t*set physical %+20\n\t\t*goto pvlabel\n\t*selectable_if (physical > 34) #\"I'm going to boost ${youdhis} Intangible Stat.\"\n\t\t*set physical %-20\n\t\t*goto pvlabel\n\t*selectable_if (traditional \u003c 76) #\"I'm going to boost ${youdhis} Traditional Stat.\"\n\t\t*set traditional %+20\n\t\t*goto pvlabel\n\t*selectable_if (traditional > 24) #\"I'm going to boost ${youdhis} Radical Stat.\"\n\t\t*set traditional %-20\n\t\t*goto pvlabel\n\t*selectable_if (societal \u003c 81) #\"I'm going to boost ${youdhis} Societal Stat.\"\n\t\t*set societal %+20\n\t\t*goto pvlabel\n\t*selectable_if (societal > 19) #\"I'm going to boost ${youdhis} Personal Stat.\"\n\t\t*set societal %-20\n\t\t*goto pvlabel\n\t*selectable_if (public \u003c 77) #\"I'm going to boost ${youdhis} Public Stat.\"\n\t\t*set public %+20\n\t\t*goto pvlabel\n\t*selectable_if (public > 23) #\"I'm going to boost ${youdhis} Private Stat.\"\n\t\t*set public %-20\n\t\t*goto pvlabel\n\t*selectable_if (respected \u003c 77) #\"I'm going to boost ${youdhis} Respected Stat.\"\n\t\t*set respected %+20\n\t\t*goto pvlabel\n\t*selectable_if (respected > 23) #\"I'm going to boost ${youdhis} Feared Stat.\"\n\t\t*set respected %-20\n\t\t*goto pvlabel\n\t*if (legended = 29) #\"I'm going to boost ${youdhis} Legend to 30.\"\n\t\t*set legended +1\n\t\t*goto pvlabel\n\t*if (legended = 28) #\"I'm going to boost ${youdhis} Legend to 30.\"\n\t\t*set legended +2\n\t\t*goto pvlabel\n\t*if (legended \u003c 28) #\"I'm going to boost ${youdhis} Legend by 3.\"\n\t\t*set legended +3\n\t\t*goto pvlabel\n\t#\"$!{Youdhis} Stat Levels are looking great right now, so I don't need to boost any of the available options,\" I say, knowing that passing up a boost now will give me the potential to unlock a free MeChip Warning System upgrade later, after the Rookie-Veteran merge, if ${codenamed} advances that far.\n\t\t*set freewsone true\n\t\t*goto pvlabel\n\n*label pvlabel\n\n\"Great,\" Aunt Lyra responds, seeming pleased with your choice. \n*label skipmoveon\n\"Moving on, I don't want to assign any strict storylines or personas to the Finalists just yet, but based on ${youdhis} behavior so far, we can begin to think of ${codenamed} for now as our resident\n*if (public > 50)\n\tOutspoken Role Model.\n\t*achieve outspokenactivist\n\t*goto batrung\n*else\n\tMysterious Wildcard.\n\t*achieve mysteriouswildcard\n\t*goto batrung\n\n*label batrung\nYour goal now is to nudge ${youdhir} in that direction, as long as ${youdze} seem${youdzes} amenable. \n\n\"Also, you've been given the history file on ${codenamed}'s background. So far ${youdze} ${youdzehas} been \n*if usejkstory\n\topen about ${youdhis} little sister, JK. Viewers seem to love her and love ${codenamed} as a protective older sibling figure, so make sure ${youdze} keep${youdzes} that up.\n\t*goto subparents\n*else\n\trelatively quiet about ${youdhis} little sister, JK. I have a feeling viewers would love her and love ${codenamed} even more as a protective older sibling figure, so see if you can get ${codenamed} to open up about JK slowly, if ${youdze} seem${youdzes} comfortable with it.\n\t*goto subparents\n\n*label subparents\nIt turns out JK will be living in ${codenamed}'s room in The Hero Project mansion, since ${youdze} ${youdzeis} JK's sole guardian, so that might help us out on this front.\n\n\"The subject of their parents, however, is extremely touchy,\" Aunt Lyra sighs. \"${codenamed} doesn't seem willing to talk about it, but I think viewers will respond well if ${youdze} ${youdzedo}. Though this will only benefit ${codenamed} if ${youdze} really want${youdzes} to open up about it, so don't try to push it too hard. Just make sure ${codenamed} knows all of what I'm telling you now, in rosier terms.\n\n\"Which brings me to my final point: never force any of your Finalists to go beyond what they seem comfortable sharing with the world. Your first priority is protecting them, and your second priority is ensuring they succeed on the show. If you can get them to a place where they can better connect with viewers, go for it. Just never try to turn these heroes into anything they aren't already. Our goal is to enhance and magnify what is already there.\n\n\"And that, my dear ${weaverne}, is how we're going to beat GG at his own game.\"\n\n*page_break\n\nTaking this all in, you have to admit that you think Lyra's strategy sounds much better than what you saw on the first season of The Hero Project, where the Finalists seemed to warp into extreme versions of themselves under the glare of the spotlight. If you can help protect the new Rookie heroes from falling into this trap, then Aunt Lyra is right—you most certainly do belong here.\n\nAfter all, your mission as a costume designer has always been to enhance what makes each hero unique and make them look their absolute best. So why can't that be your mission as a production handler and friend to the hero-stars, as well?\n\n\"All right,\" Aunt Lyra resumes, pulling your attention back into the room. \"Before we move on to your next Finalist, there's one last piece of ${codenamed} business to tend to. We're instituting a new feature this season, Viewer Rewards. Based on each Finalist's Legend Level, the viewers can vote for which Finalists they'd like to reward with extra advantages.\n\n\"This first Viewer Reward will assign extra Leaderboard points or Power & Health booster packs for the upcoming Live Finals Mission. ${codenamed} has earned one Reward from the viewers already, so what do you think ${youdze} would prefer?\"\n\nMulling this over a bit, you definitely think ${codenamed} will be most excited about:\n\n*choice\n\t#\"Extra Leaderboard points.\"\n\t\t*if (legended > 22)\n\t\t\t*set lb +10\n\t\t\t\"Great, that earns ${codenamed} 10 extra Leaderboard points at the start of the next mission,\"\n\t\t\t*goto otherangle\n\t\t*else\n\t\t\t*set lb +5\n\t\t\t\"Great, that earns ${codenamed} 5 extra Leaderboard points at the start of the next mission,\"\n\t\t\t*goto otherangle\n\t#\"A Power & Health booster pack.\"\n\t\t*if (legended > 22)\n\t\t\t*set phtwenty true\n\t\t\t*set power 120\n\t\t\t*set health 120\n\t\t\t\"Great, that earns ${codenamed} a starting level of 120 Power & Health for the next mission,\"\n\t\t\t*goto otherangle\n\t\t*else\n\t\t\t*set phten true\n\t\t\t*set power 110\n\t\t\t*set health 110\n\t\t\t\"Great, that earns ${codenamed} a starting level of 110 Power & Health for the next mission,\"\n\t\t\t*goto otherangle\n\t#\"A special hint in the next mission.\"\n\t\t*set specialhint true\n\t\t\"Great, that earns ${codenamed} a secret special hint, which will come in handy in the next mission,\"\n\t\t*goto otherangle\n\n*label otherangle\nAunt Lyra says. \"I almost forgot, there is one last angle I want you to work with ${codenamed}: Ani-rights. Especially since the focus of this season's missions will be a fight to shut down The InfraCircle.\"\n\n\"Wait, weren't we supposed to be looking into the Ani-cides for the official missions?\" you ask. You've been following this deadly string of Animalistic hate-crime murders, dubbed the Ani-cides, which has targeted Ani-gang members and Ani-villains specifically. Given that these targets are all Ani-criminals, no one knows if these serial murders are the work of some new vigilante or an outright geneist, but they have been deemed hate crimes nonetheless. Which surprises you—usually Ani-Powereds don't receive the same protection or attention from the police or the media as other Powered groups. It's unfortunate that it took a crime spree of such heinous magnitude to change that.\n\n\"We are still looking into the Ani-cides, but the DRPR just doesn't have enough hard intel to form a full mission yet, let alone an entire season worth of live missions,\" Aunt Lyra sighs. \"Though we're hoping we might come across some leads on the Ani-cides by going after InfraCircle.\n\n\"Unfortunately, in selecting a mission target, we've witnessed an unexpected power struggle among Millennia City's villainous community, with many of them vying for enough prominence to be featured as the villains of The Hero Project's Live Finals,\" Aunt Lyra continues. \"Thankfully most have not been threatening enough, save for the InfraCircle. Thematically, they actually serve as a perfect target enemy, since they grew out of the first season's Ani-terrorist villains, The InfraOrder.\"\n\n*page_break\n*set infracirclepicto true\n\n\"We'll be briefing the Finalists soon, so you'll receive more comprehensive information later, but what you need to know to get started is that\n*if trilogyreader\n\tafter a mass breakout at The Devoid, many former members of Smyther's Splice Circle and Culic's InfraOrder have formed this new organization of Ani-activists. \n*if newreader\n\tmany former members of dissolved Ani-activist criminal organizations escaped from The Devoid prison complex for Powereds during a mass breakout earlier this year. They have united these two groups, The Splice Circle and The InfraOrder, to form this new Ani-group: The InfraCircle.\n*comment endif\n\n\"Their goal is to create a sovereign space for Ani-Powereds to live free of oppression and American law, police brutality, and hate-crime sprees like these Ani-cides. These radicals have decided to create a hidden base in the Big Sur wasteland east of Millennia \n*if trilogyreader\n\tCity. \n*if newreader\n\tCity created by the late Prodigal, before she became a MeChip personality template. \nThere's more information on all of this loaded in to the Stats Screen, but here are the bare-bones basics, for now,\" Aunt Lyra says, just as MeChip Seamanda appears in your mind. \n\n[b]THE INFRACIRCLE[/b]\n*line_break\n[b]Big Sur Haven[/b]: CULIC\n*line_break\n[b]Strike Team Recruitment[/b]: SCOUNDREL\n*line_break\n[b]Ani-Gang Funding[/b]: SMYTHER\n\n\"We can go after The InfraCircle not just because their leaders are all fugitives that top the DRPR Ten Most Wanted List, but also because their entire operation is illegal,\" Aunt Lyra explains. \"The InfraCircle haven is hidden in a secret location in the quarantined Big Sur Wasteland, led by Ani-terrorist Culic, camouflaged by tech-Powered fugitive Splicina, and apparently kept running by a newly united group of Natural-Resource Powereds.\n\n\"Meanwhile Scoundrel, the turkey-Powered mole from the first season of The Hero Project, runs their elite Recruitment & Strike Squad. Perhaps worst of all, The InfraCircle funds this entire endeavor through Millennia City's reformed Ani-gang network, run by the infamous crime boss Smyther.\" \n\n*page_break\n\n\"What about ${codename} and The Millennial Group?\" you ask, always eager to hear anything about your favorite heroes of all time. The idea that you might get to design for The Diva, the most epic Millennial Group member ever, as a new Hero Project Judge is almost too much. The honor of dressing her is definitely considered the ultimate heroic costume designer achievement—though you haven't even worked up the courage to ask Aunt Lyra if you can meet The Diva, let alone design a costume for her at some point.\n\n\"Isn't The InfraCircle usually their territory?\" you ask, forcing yourself to stay on topic. \"And if not The Millennial Group, what about The American Protectorate?\"\n\n*if (newreader) or (mgleader)\n\t\"The Millennial Group is dealing with a crisis of its own right now,\n\t*goto riserleader\n*else\n\t\"${codename} has teamed with The Millennial Group as a consulting member to deal with a new crisis,\n\t*goto riserleader\n\n*label riserleader\nsome new Infini despot named Infinitum who is wreaking havoc up near the Canadian border,\" Aunt Lyra explains. \"Since they have their hands full, The Hero Project has been given primary jurisdiction over The InfraCircle, thanks to my internal DRPR connections. But ${codename} and many Millennial Group members will be helping out as guest Judges and Mentors this season, so we'll get advice and intel about the InfraCircle from them as they rotate through.\n\n\"As for The American Protectorate, they're a complete mess. When they're not threatening to tear each other's heads off, they're simply not Powerful enough to face any credible threat. They're currently a PR nightmare, so we're keeping them sequestered here until we can team them up with the future group of merged Finalists later in the competition. \n*if trilogyreader\n\tNone of them are happy—Jury has thrown near-daily fits—but as far as I'm concerned, this is the bed they made for themselves.\n*comment endif\n\n\"But enough about them,\" Aunt Lyra sighs. \"For the very first Live Finals mission, we're going after Smyther's Ani-gang generals, in hopes of cutting off the InfraCircle's funding. So before we move on to your next Finalist, I wanted your insight—what do you think ${codenamed} will think of this mission?\"\n\n*choice\n\t#\"I don't think ${youdze} ${youdzeis} going to like it. $!{Youdhis} politics fall more in line with The InfraCircle's than against them.\"\n\t\t*set traditional %-15\n\t\t*set societal %+10\n\n\t\tYou know this is going to be a very loaded mission for ${codenamed}, so you're going to have to do your best to get ${youdhir} comfortable with it and make sure ${youdhis} opinions on these matters are heard.\n\t\t*goto weavend\n\t#\"I think ${youdze} will want to stand up as a positive force against potentially negative Ani-stereotypes.\"\n\t\t*set traditional %+15\n\t\t*set societal %+10\n\n\t\tYou figure this is the exact reason ${codenamed} signed up for The Hero Project in the first place, to combat existing negative Ani-Powered stereotypes.\n\t\t*goto weavend\n\t#\"No matter how ${youdze} feel${youdzes}, ${youdze} will serve as a great asset in the mission, given ${youdhis} breadth of Ani-knowledge. \n\t\t*set traditional %+15\n\t\t*set societal %-10\n\t\t \n\t\tYou're not going to put words in ${codenamed}'s mouth; you'll have to wait to see how ${youdze} feels about this mission. You're also going to have to do you best to get ${youdhir} comfortable with it and make sure ${youdhis} opinions on the matter are heard.\n\t\t*goto weavend\n\t#\"I'm not sure ${codenamed} will care, since ${youdze} seem${youdzes} to be here for very personal reasons.\n\t\t*set traditional %-15\n\t\t*set societal %-10\n\t\t \n\t\t${codenamed} gives off the impression that ${youdze} ${youdzeis} here for some deeper personal reason, one that doesn't seem as important as Ani-politics. You suppose you'll find out what it is soon enough, if you do your job right.\n\t\t*goto weavend\n\n*label weavend\n\n\"Whatever ${codenamed} ends up thinking, I'm very excited to meet ${youdhir},\" you say. \"I've already got some ideas for a flexible and easily adjustable costume that complements ${youdhis} Ani-Morpho transformations. It'll be breathable or insulated depending on the changes that—\"\n\n\"I'm sure it's going to be as exceptional as all of your other costume designs,\" Aunt Lyra interrupts. \"But time is short. Let's move on to your next Rookie Finalist assignment.\"\n\nYou nod at Aunt Lyra, knowing she is probably right. Still, as she keeps talking, you start penciling a mental sketch of the costume for ${codenamed} in your mind, aided by MeChip Seamanda, of course.\n\n*comment Ignite is accounted for in Crystalline stat, Tarsiero only affected by how you treat him (doesn't care about others and gossip and rumors).\n*if ssprove\n\t*set rlshp_crystalline %+15\n\t*set rlshp_transfer %+15\n\t*set rlshp_griffin %-15\n\t*set rlshp_missboss %-15\n\t*goto movealonge\n*else\n\t*set rlshp_crystalline %-15\n\t*set rlshp_transfer %-15\n\t*set rlshp_griffin %+15\n\t*set rlshp_missboss %+15\n\t*goto movealonge\n\n*label movealonge\n*set partonefinrlshp false\n*set parttwofinrlshp true\n\n*comment Finalist Rlshps Stats Screen should read Crystalline & Ignite, then four unnamed Rookie bars (StarSoar and Rookies should disappear)\n\n*finish NEXT CHAPTER: ANIMAUL\n", "rs_pvtwo": "*comment é x\n\n*text_image interlude2.png center Interlude Two: Lyrical\n([i]New Character Perspective[/i])\n\n*set power 100\n*set health 100\n*page_break\n*achieve lyrapersp\n\nYour eyes blink open, and for a moment you forget what has happened. For a moment, all you feel is the California king mattress underneath you, the down comforter and Egyptian cotton sheets above you, the cool central air conditioning on your face. For a moment you feel how lucky you are, until you remember. Then a wave of dread grips you as your mind latches on to reality. \n\nYou slip out of the plush bed and into your equally plush robe, then cross the room to the kitchenette to start the coffee pot. Once it's percolating, you do the same thing you do every morning: you stand in front of the balcony doors and take in the view you've worked so hard to earn.\n\nThe first thing you see is your own ghostly reflection in the glass, your dark-brown skin against the white robe and your braided hair peeking out underneath your scarf wrap. Looking through yourself, you cast your eyes over the now-quiet Hero Project compound and out to the skyline of Millennia City, where you see the usual early morning Powereds taking flight. The sun is just peeking over the mountains to the east, the same way it does every day.\n\nTaking it all in, you ask yourself: If everything looks the same, why does nothing feel the same?\n\n*page_break\n\n\"Lyra, you okay, babe?\"\n\nYou turn to find Aaron stretching across his side of the bed, his pale skin rippling over his stomach muscles as the covers fall away. Immediately you think: [i]dating someone way younger: PRO.[/i]\n\n\"Just have a lot on my mind this morning,\" you say, forcing your eyes back out the window and off of Aaron's flat stomach. You wonder what would happen if you ignored the world out there, if you just stayed in this luxurious room with your gorgeous man-boy and ordered room service until none of this nightmare mattered anymore.\n\nNext thing you know, Aaron is handing you a cup of coffee, hugging you from behind, and resting his chin on your shoulder. [i]Staying here forever: PRO[/i], you think. Then Aaron speaks.\n\n\"You know, if you took The American Protectorate off the bench, we could help get justice for Miss Boss.\"\n\n[i]Dating someone younger than you and staying here forever: CONS.[/i]\n\n*page_break\n\n\"This season is all about redemption, and who needs that more than us?\" Aaron continues, oblivious to your mounting discomfort. \"Who needs it more than me, the world's least-liked former First Son?\"\n\n\"Not today, Aaron,\" you say, stepping out of his arms. You never know exactly when it's going to happen, but kind and fun Aaron always inevitably transforms into his self-centered and egotistical alter ego, Jury.\n\n\"You say that every day,\" Aaron sighs. \"I just don't understand why The American Protectorate needs to be kept so secluded. We're the grand-prize winners of the first season, but no one even remembers we exist.\"\n\nAnd you know that's exactly the way it needs to stay, with the focus on the franchise's future promise instead of its troubled past. Whether its members had a choice or not, The American Protectorate was aligned with \n*if trilogyreader\n\tthe corrupt Victon regime—and no one more so than Aaron\n\t*if jennydead\n\t\tVicton, who was also just recently acquitted of the murder charges brought against him for the death of Jenny Yu.\n\t\t*goto ifthebf\n\t*else\n\t\tVicton.\n\t\t*label ifthebf\n\t\t*page_break\n\n\t\t*if juryboyfriend\n\t\t\tIt also doesn't help that Aaron recently went through a very public, holo-tabloid-splashed breakup with ${codename}. Apparently, with ${codename}'s career hitting its highest peak yet and Jury's hitting an all-time low, ${codename} just didn't have the time that Jury increasingly demanded of ${youdhir}. Though as much as Aaron claims it's over now, you have a feeling that he'd go back to ${codename} in an instant if ${youze} asked.\n\t\t\t*goto verdictisout\n\t\t*else\n\t\t\t*label verdictisout\n\n\t\t\t\"Plus you know how hard I've been training, working with my new tech Powers and combat skills to live up to the new codename I picked out for my rebranding,\" Aaron makes sure to add. \"I just want to know when I can say goodbye to Jury and let the world finally meet the new me: Verdict.\"\n\t\t\t*goto gotaplan\n*else\n\tthe corrupt regime of now-impeached President Victon—and no one more so than Aaron Victon. He may have stood up against his father in the end, but that was only after a long tenure of compliance.\n\t*goto gotaplan\n\n*label gotaplan\n\nYou and GG have always had a plan to reintroduce the four remaining American Protectorate members in the final missions of this Hero Project season, but that feels so insignificant in the face of what has now happened. So you turn to look at Aaron, struggling to keep your cool.\n\n*choice\n\t#\"You really want to press this issue two days after what happened to Miss Boss?\"\n\t\t\"I'm sorry,\" Aaron says, immediately looking embarrassed. \"You're right. It's just, I'm going crazy cooped up in the residence. All four of us are. Wintry's ice-sculpture garden is going to need a new wing pretty soon.\"\n\n\t\tYou smile at Jury and run your fingers across the line of his jaw. Slugger, he can be so handsome when he's not taking himself too seriously.\n\t\t*goto gottagoemer\n\t#\"We've been through this. The American Protectorate will be a part of the finale mission…assuming we even get to have a finale, now.\"\n\t\t\"We will,\" Aaron says immediately. \"I know you, you're going to bounce back from this. We all will. For Miss Boss.\"\n\n\t\tYou smile at Jury and run your fingers across the line of his jaw. Slugger, he can be so handsome when he behaves like an actual hero. [i]PRO.[/i]\n\t\t*goto gottagoemer\n\t#\"Acting this way, what makes you think you're ready for a shot at redemption?\"\n\t\t\"I'm sorry,\" Aaron says, his eyes hitting the floor. \"I just hate feeling like there's nothing I can do to help.\"\n\n\t\tYou nod at Jury, not feeling particularly bad for him, given what happened to Miss Boss and the day you have ahead of you.\n\t\t*goto gottagoemer\n\n*label gottagoemer\n\n\"I have to run an emergency production meeting soon,\" you say. \"So everyone on this floor will be up soon.\"\n\n\"Translation: I need to sneak back up to my apartment, where no one can see me,\" Aaron sighs. \"Ever again.\"\n\n\"That's the verdict, Mr. Invisible,\" you say, causing Aaron to pout and cross his arms across his muscled chest.\n\nAttempting to ignore how good Aaron looks, you give him a goodbye kiss and ruffle his blonde hair. Then you turn and hope you have enough time to get in a morning swim, to clear your head before this dreaded meeting.\n\n*page_break ONE SHORT SWIM LATER\n\nYou're a pretty formidable woman and you know it, but something about walking next to The Diva still makes you feel like a little girl. Descending the stairs beside her in your now-daily morning walk, you always force yourself to stand a little taller than usual.\n\n\"I saw your boy toy creeping back through the hero residence halls earlier,\" The Diva says, her voice as smooth and commanding as ever. \"You two lovebirds should really be more careful.\"\n\n\"First of all, you know we are most definitely not lovebirds,\" you return. \"Second of all, you're just jealous.\"\n\n\"Darling, please,\" The Diva laughs. \"I've never found toddlers to be particularly appealing.\"\n\n\"Ordinarily I'd argue with you there,\" you sigh. \"But he wouldn't stop whining about the American Protectorate seclusion, today of all days.\"\n\n\"That's the thing about toddlers,\" The Diva starts, \"they throw tantrums.\"\n\nThough perhaps prone to exaggeration, The Diva is probably right. What started as one drunken rebound fling has turned into a recurring event, one you've had to keep secret given the fact that you're technically Jury's boss.\n\n*page_break\n\n\"Aaron can be a real hero, you've seen that yourself,\" you say, trying to convince yourself as much as The Diva. \"He just needs another chance to show it.\"\n\n\"Another chance and another decade of maturation, if you ask me,\" The Diva answers. \"But if he is taking some stress off your plate, I'm all for it, darling. You had just better make sure that shrew Di doesn't find out. She'd be like a dog with a bone, and a rabid one at that.\"\n\nAnother [i]CON[/i] of flinging with Aaron: his ex-stepmother, the nation's former First Lady, is one of your Finalists on The Hero Project—and one of your more ruthless Finalists, at that. The Diva is right—if Di were to find out about you and Jury, there's no doubt she'd find a way to leverage this information into a win for her, one way or another.\n\n\"Unfortunately, that's the least of my problems today,\" you say. \"I still can't believe we let this happen to Miss Boss.\"\n\nYou say the words and feel the now-familiar tightness in your chest harden its grip, because you can't help but feel that you've failed at protecting your heroes. Little Jagged and ${codenamed} managed to make it out of that hellhole alive, but Little Jagged quit the show the moment she emerged, checking herself directly in for another stay in rehab.\n\n${codenamed} has decided to stay on the show, thankfully, but ${youdze} still ${youdzehas}n't been able to speak a word about what happened in that second clearing after the cameras stopped recording.\n\n*page_break\n\n*if (trytosavemb) and (missbossdead)\n\tWhatever did happen in there, it appears that ${codenamed} tried to save Miss Boss from a deadly fall using ${youdhis} cryptobiotic Powers. The search for Miss Boss off that cavernous cliff went on for hours after the mission ended: she fell a great distance, into some internal river. Everyone held out hope as best they could.\n\n\tHowever, when they finally did find Miss Boss, you all learned that ${codenamed}'s efforts weren't enough to save her from the impact of her fall.\n*if missbossdead\n\tWhatever did happen in there, it cost Miss Boss her life.\n\n\tTo make everything infinitely worse, the murderer was a former Hero Project Semi-Finalist, the very one that Miss Boss and the show went out of their way to humiliate.\n*if (missbossdead = false)\n\tWhatever did happen in there, it appears that ${codenamed} tried to save Miss Boss from a deadly fall using ${youdhis} cryptobiotic Powers. The search for Miss Boss off that cavernous cliff went on for nearly a day after the mission ended: she fell a great distance, into some internal river. Everyone held out hope as best they could.\n\n\tWhen they did finally find Miss Boss, you were all relieved to learn that she was indeed still alive. The only problem? \n\n\tNo one knows how to wake Miss Boss up from this cryptobiotic stasis she has been placed in, especially since ${codenamed}'s Powers had already transformed by the time Miss Boss was found.\n*comment endif\n\n\"Sadly, most people tend to forget the dangers of becoming a hero these days,\" The Diva says, frowning beside you. \"So many young heroes I meet seem to be in it for the wrong reasons: for money, fame, and influence. They don't realize these shouldn't be the end goals of becoming a hero, but rather the perks of working hard, training, honing their talent, and wanting to make the world a better place. Given all of the nonsensical reasons people try to become heroes these days, we should consider ourselves fortunate that this kind of tragedy doesn't happen more often.\n\n\"That said, what matters now is \n*if (missbossdead = false)\n\tensuring justice is served for Miss Boss.\" \n*if missbossdead\n\thonoring Miss Boss's legacy and ensuring justice is served in her name.\"\n\n*choice\n\t#\"I'm going to start by making sure all of the footage of Miss Boss talking about who she really is and what she believes in finally airs,\" I say in response.\n\t\t\"Yes, that's certainly the least we can do,\" The Diva says. \"Let's just hope it won't be too little, too late.\"\n\t\t*goto divamother\n\t#\"We're going to tear down The Voiceless and everything they stand for,\" I say with fierce determination.\n\t\t\"Yes, we are,\" The Diva says with audible force. \"I might even consider vacating my Judge's chair to aid in that particular effort.\"\n\t\t*goto divamother\n\t#\"I just want to make sure The Hero Project survives this blow,\" I say, my voice full of doubt.\n\t\t\"Are you kidding?\" The Diva almost laughs, bitterly. \"If anything, this awfulness will only mean a ratings surge. The only thing the public loves more than a Cinderella story is a fall from grace.\"\n\t\t*goto divamother\n\t*if ((missbosskiss) and (asexual = false)) #\"Absolutely. And I'm going to ask ${codenamed}'s permission before we air the footage of ${youdhis} kiss with Miss Boss. I want to respect ${youdhis} wishes on this.\"\n\t\t\"Yes, that's a very good idea,\" The Diva says. \"Let's just hope GG agrees with that sentiment.\"\n\t\t*goto divamother\n\n*label divamother\n\nThe Diva shakes her head as you reach the bottom of the stairwell, turning to face you. \"Though whatever happens in this meeting, know that I will have your back one hundred percent. Together, we will make this right.\"\n\nYou match The Diva's intense stare and wonder how you've been lucky enough to end up at her side. Sometimes she feels like your best friend and other times like a mother figure. One thing she manages to be all of the time, however, is inspiring. You may start off feeling small next to her, but she always leaves you standing tall.\n\n\"Yes, we will,\" you respond, actually starting to feel it may be true.\n\n*page_break AT THE PRODUCTION MEETING\n\nYou've had the moment of silence. You've given the speech you prepared about Miss Boss and the future of The Hero Project. Which means that now comes the part you've been dreading: the DRPR briefing on the revealed face of the Ani-cide murders, The Voiceless.\n\n\"We're going to start with the holo-video that The Voiceless posted when their MeSite went public yesterday,\" you say, turning towards the holo-screen. \"The information in this video has been corroborated with DRPR intelligence and appears to be true, as far as we can tell.\"\n\nYou've already watched this video about a hundred times, but still, seeing its opening words again you feel your stomach tighten and your breath run short. The entire holo-video features The Voice's textual representations punctuated by the occasional image, all with absolutely no sound—which only enhances the eeriness of the presentation.\n*if trytosavemb\n\tThe fact that The Voice is a former Hero Project Semi-Finalist, the very one that Miss Boss and the show went out of their way to humiliate, makes everything infinitely creepier.\n*comment endif\n\n[b]We may be The Voiceless, but we are not Powerless.[/b]\n\n[b]We are here to reinvent what it means to be a modern Powered hero. To establish a new world order of heroes who don't compromise, who represent the Underrepresented. Too long have we been cast aside and misunderstood, but now The Voiceless demand to be heard.[/b]\n\n[b]But who are The Voiceless?[/b]\n\n*label whoaretv\n*choice\n\t*disable_reuse #[b]We are Less.[/b]\n\t\tA candid picture of Less appears, showing her sitting in a corner clad in her ballerina inspired attire. A deep, introspective look of sadness settles on her plain face, which can't be much older than twenty.\n\n\t\t[b]Before she became Less, Sybil Vance was a quiet girl who dreamed of being a prima ballerina, until her Powered manifestation externalized her nerve endings. Left without the ability to speak or feel physical sensation, Sybil lost the two things most imortant to her: her home and her fine-tuned ability to dance.[/b] \n\n\t\t[b]Disembodied and disinherited, Sybil was taken in by the infamous MC underworld figure Madame Vice and forced to become Synn Vice to survive, trained to use her pain and pleasure Powers to protect herself—and to serve others.[/b]\n\n\t\t[b]After Madame Vice was murdered as a victim of Ani-gang and Powered hero violence, Synn found herself homeless once again. With no voice to speak and a life spent discarded and used as a tool for others, it wasn't until Synn found a fellow voiceless Powered that she found herself.[/b]\n\t\t*goto whoaretv\n\t*disable_reuse #[b]We are The Voice.[/b]\n\t\tA professional headshot of The Voice appears, featuring him in his standard costume: a blue bodysuit with silver stripes to match his chrome projection goggles. Here he looks much younger and more hopeful than in the footage of him from the Ani-shelter caves.\n\n\t\t[b]Formerly known as the aspiring hero Imager, Hector Vaughan's Power to project images from his mind also rendered him physically speechless. Although able to project literally any image and studied in dozens of languages, Imager faced scorn from the traditional Powered hero community, who scoffed at his \"harmless\" or \"useless\" Power, always overlooking or ostracizing him.[/b]\n\n\t\t[b]From the moment Sybil and Hector met, they understood and valued each other in ways no one else ever had. After quickly getting married, they opened up Hector's inherited Northern Fringes townhouse to another fellow Disembodied Powered, Imager's best friend.[/b]\n\t\t*goto whoaretv\n\t*disable_reuse #[b]We are Reduct.[/b]\n\t\tAn image of Reduct appears, standing with crossed arms in a bold red-and-gold costume and flanked by several smaller, brutish copies of himself.\n\n\t\t[b]An aspiring Powered hero with the ability to duplicate himself, Reduct worked tirelessly to break into the competitive Millennia City hero scene alongside Imager—so tirelessly that Reduct pushed his duplicative Powers too far on his very first professional team job, after being pressured by his heroic peers.[/b] \n\n\t\t[b]Since Reduct splinters his mental faculties slightly with the creation of each duplicate, when he splintered himself too many times to meet the demands of his mission, the original Reduct found his mind so simplistic and fractured that he lost the ability to function.[/b] \n\n\t\t[b]Hector and Sybil were the only ones willing to take Reduct in and they rehabilitated him to the extent they could, given their limited resources.[/b]\n\t\t*goto whoaretv\n\t*disable_reuse #[b]We are Nancy.[/b]\n\t\tA picture of a young girl wearing overalls appears, her skin made entirely of tree bark. Her big blue eyes stare into the camera lovingly, a giant smile on her scratchy face.\n\t\t\n\t\t[b]Next to join the growing Voiceless family was their neighbor in the Northern Fringes, Nancy. Nancy was a thirteen-year-old girl whose Power transformed her skin into tree bark. Not sure how to handle this Disembodied Power set, Nancy's loving and supportive parents sent Nancy to spend time with neighbors Hector and Sybil after school, so she could learn from other Powereds like her.[/b] \n\n\t\t[b]Nancy, who still possessed the use of her voice, was instrumental in bringing Reduct out of a vegetative state and back to a place where he could respond to commands. Nancy also introduced her new friends to The Disspace, an online community for Disembodied Powereds.[/b] \n\t\t*goto whoaretv\n\t*disable_reuse #[b]We are Outlet.[/b]\n\t\tIn place of a image of Outlet, three pictures appear showing masses of different kinds of energy: fire, lightning, and light.\n\t\t\n\t\t[b]The expanding Voiceless family then met their final member on The Disspace: Outlet, a vastly powerful Infini being who can transform himself into various energy signatures, but has no corporeal body. This lack of a body is extremely traumatizing for Outlet, so he had spent the majority of his life in one of the few existing Disembodied Clinics on the East Coast of America, trying to learn to rehabilitate himself.[/b]\n\n\t\t[b]However, when this clinic was shut down from a lack of funding, Outlet was put out on the streets—or rather, systems of electrical wires and battery cells, until he found a home living mostly on the MeWeb and frequenting The Disspace.[/b] \n\n\t\t[b]Outlet had decided to become a Disembodied anarchist long before meeting his new surrogate family, and his beliefs spread among them like wildfire.[/b]\n\t\t*goto whoaretv\n\t#I'm finished meeting The Voiceless.\n\t\t*goto brokenopen\n\n*label brokenopen\n\n[b]The Voiceless family had formed, but would soon be broken apart.[/b]\n\n[b]After years of trying and failing to break into the mainstream Powered hero industry, Imager and Reduct were beyond thrilled to be selected as Semi-Finalists for The Hero Project. However, Outlet warned them that they'd only find ridicule and failure on The Hero Project, and he was absolutely right.[/b] \n\n[b]Imager and Reduct were reduced to little more than human punchlines on The Hero Project, at the hands of Reigna, Miss Boss, and an army of heartless producers.[/b]\n\nHere, an image from the infamous Goggle Bobble video appears, showing The Voice and Reduct wiping out in the Semi-Finals.\n\n[b]On the heels of this devastating rejection, the unthinkable then happened: Nancy was killed at a nearby playground, the victim of Ani-gang violence that had now reestablished itself in the Northern Fringes.[/b] \n\nThe most chilling image in the video appears then: the lifeless body of Nancy, lying limp on a playground slide in a pool of her own blood, splinters of her bark-skin scattered all around. Littered amongst the bark shards are several uprooted shark fangs, left behind like bullet casings.\n\n[b]Finally heeding Outlet's call, Imager (now The Voice), Sybil (now Less), and Reduct decided to form The Voiceless, to avenge Nancy's thoughtless death at the hands of unchecked Ani-criminals and remedy all they saw was wrong with Powered society, by any means necessary.[/b]\n\n*page_break THE VOICELESS MISSION STATEMENT\n\n[b]The Voiceless will shine a spotlight on Disembodied Powereds. We will avenge the victims of Ani-violence. And we will reclaim the fame and respect awarded to lesser heroes.[/b]\n\t\n[b]We will tear down everything that stigmatizes our community, starting with The Hero Project: the epicenter of all of these corrupt structures.[/b]\n\n[b]Who are The Voiceless? We are you.[/b] \n\n[b]So join us.[/b]\n\n*page_break\n\nThe holo-screen goes black and you take a deep breath, knowing it's now up to you to fill in the blanks left unexplained by this video. \n\n\"This partially explains what led The Voiceless to commit the Ani-cide hate crimes, including their most recent attack on the Ani-shelter cave, which is being dubbed The Slaughtering,\" you begin. \"The rest of the story has been related to the DRPR by our only inside source on The Voiceless: JK, ${codenamed}'s little sister and the founder of The Disspace. She was unwittingly in contact with Outlet through The Disspace and was able to learn the following before communication with Outlet was cut off.\n\n\"After Nancy's death and Imager and Reduct's embarrassing viral elimination from The Hero Project, Less felt her surrogate family going through too much pain. Thinking it her duty as the mother of The Voiceless, Less visited Reduct and Imager in the middle of the night and used her externalized empathetic Powers to disconnect their emotional pain centers, along with her own.\n\n\"Less only meant to give her family relief for a day, but as Outlet has reported to JK, Less has since been unwilling or unable to reconnect these emotional centers. As a result, we suspect that not only has The Voiceless's capacity to feel emotional pain been numbed, but that their capacity for compassion, morality, and rationality has also been numbed. \n\n\"To ease her family's pain, Less accidentally turned The Voiceless into textbook sociopaths.\" \n\n*page_break\n\nThis news settles over the gathered production team and causes a heavy silence to fall across the room. You take one final breath, adding your conclusion to this disturbing tale.\n\n\"Outlet was the only member not to undergo this treatment, given his lack of a physical body. However, it is Outlet's anarchist beliefs that have been amplified within The Voiceless, who now wholeheartedly believe they are doing the right thing by murdering violent Ani-Powereds and attacking The Hero Project.\"\n\nYou expect it will take everyone a moment to process this grim reality, but are surprised instead to see Kevin, one of your Rookie handlers, raising his hand. You nod at him, so he stands.\n\n\"I'm sorry, I don't mean to speak out of turn, but I have to ask,\" Kevin begins, looking both overwhelmed and frightened. \"I can't be the only one thinking that we've somehow made all of this worse by doing this show. I mean, after all, we did capitalize on Imager's embarrassment and validate all their beliefs about mainstream hero culture. So I'm sorry, but I have to ask… \n\n\"Are we creating worse villains by giving them this platform, by featuring them on The Hero Project?\"\n\n*page_break\n\nThe question pierces you like a bullet—and you can immediately tell it has the same effect on the rest of the production staff. Unfortunately, it's a question you've already had to give much thought to, and you can see by the reaction in the room that you're not the only one. \n\nEveryone has been doubting their place on The Hero Project since The Slaughtering—and this question has only given voice to that doubt.\n\nAnd now it's your job to answer this question.\n\n*choice\n\t#\"Yes, The Hero Project, or at the very least the Powered fame culture that The Hero Project reinforces, created the conditions that allowed The Voiceless to rise.\"\n\t\t*goto continuespeech\n\t#\"I've seen firsthand how the popularity of this show has made so-called villains clamor to become our targeted enemy, to gain a national platform for their various beliefs or exploits.\" \n\t\t\"The creation of this platform has escalated the heinous nature of these villains' crimes, as they compete with each other to stand out and move to the front of the target line—almost like a reverse reality competition for these criminals.\n\t\t*goto continuespeech\n\t#\"We now need to focus on what we can do to stop this trend, on our biggest responsibility moving forward: to raise Underrepresented Powered Awareness and create a support system for these underserved communities.\"\n\t\t*goto continuespeech\n\n*label continuespeech\n\n\"The Voiceless may be terribly misguided in their methods, but that doesn't mean they are wrong about the flaws in our heroic Powered culture—a culture The Hero Project has embraced. We're just giving the public what they want, right? Bigger, better heroes to fight against bigger, badder villains. But Kevin's question is a valid one: in trying to create brighter heroes, are we inadvertently creating more terrible villains?\"\n\nYou pause, letting that notion sink in before you move on to the part of your speech you hope will matter most.\n\n\"Whatever the answer is, it's not as important as the fact that we now have a responsibility to be better, to carefully examine what created The Voiceless and do our part to change the conversation. There is a blatant lack of support infrastructure for Underrepresented Powered communities like Disembodieds and Ani-Powereds. The Voiceless turned to each other for support when no other existed, just like those poor souls in the Ani-shelter did. So it is our job to start calling for the kind of support that these communities need.\n\n\"There is also a media system in place that sensationalizes acts of violence, which in turn brings fame to those who commit these acts of violence. The Voiceless were following the same basic human instinct we all follow: people simply want recognition, to be heard. Here on The Hero Project, we are guilty of denying The Voiceless an opportunity to be heard, at least until they resorted to acts of terrible violence, which we were all too willing to broadcast to the world.\"\n\n*page_break\n\n\"The solutions to these problems are clearly more complicated and difficult than any one person, or any one organization, can solve single-handedly. However, I know this much: action follows attitude. And if 3V has proved anything throughout history, it's that it has the potential to shape the attitudes of its audience. In that way, we have immense power here—and instead of feeding into stigma, we can use The Slaughtering to pivot the national attitude towards awareness and acceptance.\n\n\"The last season of this show, for all its flaws, successfully brought attention to the Infini Powered issue with The Crush, The Diva, Black Magic, and ${codename}. This season, we have the tools to do the same with Underrepresented Powereds. Not just the tools, but living, breathing examples of true heroism in Finalists like\n*if griffingone\n\tTarsiero, Transfer, and ${codenamed}.\n*if transfergone\n\tTarsiero and ${codenamed}.\n*comment endif\n\n\"It is now our job to right any wrongs we have perpetuated. We will stop the Ani-cides. We will shut down The InfraCircle. We will shine the spotlight on our own Underrepresented Powereds. We will be the change The Voiceless want to see. And when this season is over, we will find a way to run this show so nothing like this ever happens again.\n\n\"I understand if any of you need to walk out right now, if you still feel The Hero Project is a bigger part of the problem than the solution. But to the rest of you, those of you who believe we can effect some change here, I only have one question:\n\n\"Who is with me?\"\n\n*page_break\n\nYou finish speaking and find that the room of producers is staring back at you silently, unmoving. Feeling sick to your stomach, you have no idea what the reaction to your speech will be…is everyone about to walk out on you?\n\nYour fear washes away as The Diva rises to her feet and begins to applaud you, a mix of conviction and pride on her face.\n\nIt isn't long before the entire gathered production staff, including GG, are clapping too, rallying around the mission statement you've just laid before them.\n\nAnd in this moment, despite all the wrong that has happened, you actually believe that you will find a way to make this right, together.\n\n*page_break ONCE THE OTHERS HAVE GONE\n\nYou sit alone in the conference room with GG, unsure which part of your body aches the most. You ignore all of the different cramps and pains, however, taking another sip of your now-cold coffee. You and GG have far too much to do today for you to be tired.\n\n\"Obviously we want our final mission to be about shutting down The Voiceless,\" you say, suppressing a yawn. \"The DRPR is working all angles, but The Voiceless have made themselves pretty untraceable so far, thanks to Outlet's unique teleportation frequency and evidence-scrubbing energy washes. The Voiceless MeSite has also remained impossible to take down because of Outlet's unprecedented MeNet access—we don't even want to begin imagining the kind of damage he could do there if he really wanted.\n\n\"Anyway, The Voiceless remain in hiding, thanks most likely to The Voice's upgraded illusion-imagery Powers. We're working to see if we can send a mole into their secret location, but this is all to say: the DRPR needs more time.\"\n\n\"Then time they shall have,\" GG says, an uncharacteristically somber look on his face. You already know there will be no nonsense from GG today—actually, he has been nothing but remarkably cooperative since The Slaughtering, following your lead in the aftermath.\n\n\"As we discussed, we're pausing the competition and focusing all of our resources on\n*if missbossdead\n\tthe funeral services for Miss Boss tomorrow,\"\n*if (missbossdead = false)\n\ta service dedicated to honoring Miss Boss tomorrow, which we'll use to frame a special awareness episode,\"\nGG continues. \"We're going to do this as tastefully as possible, and of course, The Hero Project will be paying for everything. I've already been in touch with the aunt who raised Miss Boss, Camilla.\n\n\"Then after these services we'll give the Finalists a brief hiatus—we'll say it's for Thanksgiving, but really it will be a chance for the Finalists to catch their breath and meet with grief and PTSD counselors.\n\n*page_break\n\n\"Speaking of, do you think this would be a good time to discuss ${codenamed}?\"\n\n*if (lb = 100)\n\t*set legended +5\n\t*goto godtimeany\n*elseif (lb > 75)\n\t*set legended +3\n\t*goto godtimeany\n*else\n\t*set legended +1\n\t*goto godtimeany\n\n*label godtimeany\n\"As good a time as any, I suppose,\" you say, your heart hurting for ${codenamed}. In so many ways, this experience must be much more than ${youdze} bargained for. Given ${youdhis} unique position as both a Disembodied and Ani-Powered individual, ${youdhis} experience with Miss Boss at The Slaughtering, and JK's unexpected connection to Outlet, ${codenamed} is going to play a crucial role in the conversations to come, whether ${youdze} want${youdzes} to or not.\n\nWhich means it's going to be up to you, Weaver, and GG to protect and prepare ${codenamed} as best you can.\n \n*if (rlshp_eps > 50)\n\tIn service of this goal, you've told Weaver to remain completely focused on taking care of ${codenamed} and JK in person. This makes it your job to adjust ${codenamed}'s Statistics, knowing ${youdhis} Respected & Feared Levels are sure to be most important in the days to come. \n\t*goto stattweak\n*else\n\t*goto pvlabelext\n\n*label stattweak\n*choice\n\t*selectable_if (defensive \u003c 72) #I boost ${youdhis} Defensive Stat.\n\t\t*set defensive %+20\n\t\t*goto pvlabelext\n\t*selectable_if (defensive > 28) #I boost  ${youdhis} Offensive Stat.\n\t\t*set defensive %-20\n\t\t*goto pvlabelext\n\t*selectable_if (physical \u003c 80) #I boost ${youdhis} Physical Stat.\n\t\t*set physical %+20\n\t\t*goto pvlabelext\n\t*selectable_if (physical > 20) #I boost ${youdhis} Intangible Stat.\n\t\t*set physical %-20\n\t\t*goto pvlabelext\n\t*selectable_if (traditional \u003c 87) #I boost ${youdhis} Traditional Stat.\n\t\t*set traditional %+20\n\t\t*goto pvlabelext\n\t*selectable_if (traditional > 13) #I boost ${youdhis} Radical Stat.\n\t\t*set traditional %-20\n\t\t*goto pvlabelext\n\t*selectable_if (societal \u003c 90) #I boost ${youdhis} Societal Stat.\n\t\t*set societal %+20\n\t\t*goto pvlabelext\n\t*selectable_if (societal > 10) #I boost ${youdhis} Personal Stat.\n\t\t*set societal %-20\n\t\t*goto pvlabelext\n\t*selectable_if (public \u003c 86) #I boost ${youdhis} Public Stat.\n\t\t*set public %+20\n\t\t*goto pvlabelext\n\t*selectable_if (public > 14) #I boost ${youdhis} Private Stat.\n\t\t*set public %-20\n\t\t*goto pvlabelext\n\t*selectable_if (respected \u003c 87) #I boost ${youdhis} Respected Stat.\n\t\t*set respected %+20\n\t\t*goto pvlabelext\n\t*selectable_if (respected > 13) #I boost ${youdhis} Feared Stat.\n\t\t*set respected %-20\n\t\t*goto pvlabelext\n\t*if (legended = 65) #I boost  ${youdhis} Legend to 66.\n\t\t*set legended +1\n\t\t*goto pvlabelext\n\t*if (legended = 64) #I boost ${youdhis} Legend to 66.\n\t\t*set legended +2\n\t\t*goto pvlabelext\n\t*if (legended \u003c 64) #I boost ${youdhis} Legend by 3.\n\t\t*set legended +3\n\t\t*goto pvlabelext\n\t*if ((freewsone) and (warningsysnine = false))  #I unlock a free MeChip Warning System for ${codenamed}, courtesy of the MeChip Corp.\n\t\t*set warningsysnine true\n\t\t*achieve achievethewar\n\n\t\tThe MeChip Warning System 9.0 has been automatically loaded onto ${codenamed}'s MeChip and will activate when ${youdze} need${youdzes} it next.\n\t\t*goto pvlabelext\n\t#I decide that ${codenamed}'s Stat Levels are already in their ideal ranges, so I don't boost any of the available options.\n\t\t*goto pvlabelext\n\n*label pvlabelext\n\n\"Market research indicates,\" GG begins, his eyes scanning a holo-report, \"that after this horrific Slaughtering event, the majority of the audience sees ${codenamed} as incredibly brave, not backing down in the face of impossible odds. As a result, most viewers currently think of our dear ${codenamed} as\n*if (respected > 50)\n\tthe Dark Horse of our competition, the unexpected hero who has come from behind to now have the greatest chance of winning a spot on The American Protectorate.\"\n\t*if (respected > 70)\n\t\t*achieve respectedfinal\n\t\t*set extravote true\n\t*goto lbump\n*else\n\tthe Dark Upstart of our competition, a hero who stands poised to effect great change, especially since most odds are now in ${youdhis} favor to win a spot on The American Protectorate.\"\n\t*if (respected \u003c 30)\n\t\t*achieve fearedfinal\n\t\t*set extravote true\n\t*goto lbump\n\n*label lbump\n\nHearing this, you think it sounds right on point—and hopefully in line with what ${codenamed} would want, too.\n\n*if (rlshp_eps \u003c= 50)\n\t*page_break\n\n*set legended -10\n\n\"As expected, however, all of our Finalist heroes took a small Legend hit after news of what happened broke to the public. I fully expect this will be remedied once our own episode coverage airs, but in the meantime this deduction has \n*if (legended \u003c 16)\n\tstuck ${codenamed} at the Civilian Legend Level.\n\t*goto legendsecover\n*elseif (legendleveltwo = false)\n\t*achieve legendcattwo\n\t*set legendleveltwo true\n\t*goto legendtests\n*else\n\t*goto legendtests\n\n*label legendtests\n*if (legended >= 56)\n\tstill left ${codenamed} with the best Legend we could expect, upgrading ${youdhir} to the Amateur Legend Level.\n\t*goto legrewards\n*elseif (legended > 40)\n\tstill left ${codenamed} with a respectable Legend, upgrading ${youdhir} to the Amateur Legend Level.\n\n\t*label legrewards\n\t*achieve legendcatthree\n\t*set legendlevelthree true\n\t*set hiddenimmunitychance true\n\t*goto legendsecover\n*else\n\tleft ${codenamed} positioned at the Trainee Legend Level.\n\t*goto legendsecover\n\n*label legendsecover\n\n\"Now, perhaps most importantly, my team and I have been trying to track all of the Finalists' backgrounds, choices, and character profiles in the hopes of pinpointing some key lessons they might be able to learn during their time on the show.\"\n\n*if (rlshp_eps > 50)\n\t*page_break\n\nYou're stunned to hear GG say these words—this isn't something you'd expect from the drama-master, at all. This sentiment must express itself on your face, because GG smirks at you as he continues.\n\n\"We can go over the entire list later if you'd like, but for ${codenamed}, we've been silently tracking how ${youdze} decide${youdzes} to cope with ${youdhis} Ani-Morpho-transformations. If we want to help ${codenamed} evolve even further into an Underrepresented representative, we should try to help ${youdhir} realize that \n*if (image > 50)\n\t${youdze} should never be self-conscious about ${youdhis} Ani-Morphs, since ${youdze} occasionally can be.\n*if (image \u003c= 50)\n\tsometimes ${youdze} use${youdzes} ${youdhis} Ani-Morphs as a self-defense mechanism to separate ${youdhir}self from others, especially when ${youdze} ${youdzeis} afraid of how ${youdze} might be judged for them. \n*comment endif\n\n\"${codenamed} has already started to change this behavior, but if we can continue to push ${youdhir} to use ${youdhis} unique individuality to connect instead of divide, it would be incredibly powerful. Do you think we'll still be able to help ${codenamed} do that, after all that has happened?\"\n\nListening to this insight, you fight your urge to seem continually surprised and answer GG's question instead.\n\n*fake_choice\n\t#\"I certainly hope so.\"\n\t#\"It's our job to make sure we do, isn't it?\"\n\t#\"I don't think ${codenamed} is going to agree with that assessment at all.\"\n\n\"Well, I can always send Mara in to—\"\n\n\"That monster is never getting near any of my Rookies ever again,\" you interrupt forcefully. \"Especially not after that nonsense she pulled with Transfer at the voting ceremony.\"\n\n\"Suit yourself,\" GG sighs, crossing his arms across his massive chest.\n\n\"Why do you insist on doing things that way, on using people like Mara?\" you can't help but ask, feeling like all the progress you've just made with GG is about to be washed away.\n\n\"My dear, I think you're starting to learn that this business has some very necessary evils,\" GG says, his eyes set directly on yours. \"So, my luscious Lyra, don't you see? I do these things so that you don't have to.\"\n\n*page_break\n\nYou look back at GG and suddenly, something clicks: Could it actually be that GG doesn't underestimate you at all? That really, all this time, GG has been looking out for you? \n\nFor a moment you see it in GG's face—maybe there's even something about you that he admires, something that he wants to…protect?\n\nWhether that's true or just in your head, it then becomes clear that for you and GG, only one thing matters.\n\nYou're a team.\n\nWhich is good to finally know, because there is so much work still left to do.\n\n*finish NEXT CHAPTER: REDEMPTION CODES\n", "rs_seven": "*comment é x\n\n*image chap7.png center Chapter Seven: Reel Feel\n\n\"Sorry to interrupt the end of your meet and greet there,\" Weaver says as you enter your room. \"How did it go?\"\n\n\"Oh, now you're going to pretend you haven't made me listen to the live camera feeds all day?\" JK calls from her spot at the desk, her eyes glued to the holo-screen as she types. \"News flash, ${named}: Weaver knows exactly how it went, because ${weaverze} has been listening in.\"\n\n\"Still, it's polite to ask, isn't it?\" Weaver sighs, tossing an extra pincushion over ${weaverhis} shoulder in JK's general direction. It bounces off of her translucent jellyskin with a soft thud.\n\n\"Oh, you're so going to regret that,\" JK calls back, still not taking her eyes off the holo-screen, even as she reaches for her massive cup of SlugGlug.\n\n\"No, that would require you to tear yourself away from your Disspace chat room for more than two seconds,\" Weaver answers. \"Besides, you wouldn't want me telling anyone about your hacked MeNet connection here, now would you?\"\n\n\"You wouldn't dare,\" JK shouts in a voice of faux drama. \"Because then you'd have to entertain me all day, just like during the sequester.\"\n\n\"Now, now children,\" you say as you plop onto one of the queen-sized beds in your room. \"Don't make me separate you two.\"\n\n*page_break\n\nEver since moving into The Hero Project mansion, JK and Weaver have been practically inseparable. You arranged for a special exception so that JK could be your roommate, and since Weaver is your official production handler, they've been forced to spend a lot of time together.\n\nAt first Weaver was spending the extra time with you because ${weaverze} had to work overtime on ${weaverhis} stylist duties to alter your costumes every day, but now you think Weaver just finds excuses to hang with you and JK because ${weaverze} likes JK so much. Weaver even found the time to make JK a hoodie that reads \"I don't think you're ready for this jelly,\" which you don't think she'll ever take off.\n\nThis developing friendship has been more than fine by you, since Weaver and JK have proven to be a much-needed dose of sanity in an otherwise insane experience. The Hero Project production schedule has been so grueling since you made the Live Finals that you've barely had time to sleep, let alone get in any of the martial-arts meditation that usually keeps you sharp and grounded. Luckily you're fairly used to rigorous and nontraditional work schedules, but you can certainly see why anyone could feel overwhelmed by this process. All of the pressure isn't exactly designed to bring out the best in people.\n\nThen again, perhaps that's exactly what it's designed for—to bring out the best, or expose the worst. Weaver has actually been the one to constantly remind you that it's up to you which effect The Hero Project has on you.\n\n*page_break\n\n\"Aren't Transfer and Tarsiero jealous you've been spending so much time with us and neglecting them?\" you ask, stretching out your legs. \"Not that I'm complaining.\"\n\n\"I'm off to see Transfer next, actually,\" Weaver answers. \"Believe it or not, ze requires just as many costume alterations as you. Hir wereself seems to detest wearing clothes, but I think I've finally developed a durable polymer strand that will be tear-proof.\"\n \nYou swivel to watch Weaver spin ${weaverhis} magic, and it still takes your breath away. $!{Weaverze} keeps ${weaverhis} head level as ${weaverze} works, ${weaverhis} bionic glasses sitting evenly across ${weaverhis} face. You know Weaver keeps the glasses turned off when ${weaverze} designs to avoid any distractions, spinning fabric from ${weaverhis} calloused fingers like a human silkworm. \n\nAll of the Rookies got to keep their original costumes for the Live Finals, but Weaver was tasked with finding unique places to display The Hero Project \"T H P\" emblem on each Finalist: Griffin's cape, Miss Boss's chest, Transfer's back, Crystalline's belt pouches, Ignite's metallic gloves, and as a necklace for the costume-less Tarsiero. \n\nWeaver sewed your own golden THP emblem onto the outer shoulders of the new costume ${weaverze} created for you, which was a much more high-quality version of your thrift-store wetsuit. Of course, this new costume had to be let out yesterday to fit your bloated bee butt, so now Weaver is taking it back in for your regular body.\n\nEven beyond Weaver's incredible talent, you find yourself drawn to ${weaverhir}—and you've been tying to pinpoint exactly why.\n\n*choice\n\t#Weaver is always very well dressed, not to mention very cute—but those aren't the only reasons I have a crush on ${weaverhir}. \n\t\t*set crushweaver true\n\t\t*set rlshp_weaver %+30\n\n\t\tWeaver is so smart, sensitive, and attentive that you haven't been able to help the crush fluttering around in your stomach. However, you have been sure to keep your relationship professional so far. You rarely have feelings like this, but when you do, you tend to suppress them—you always figure, what normal person would be attracted to you in all of your Ani-Morpho forms?\n\n\t\tThen again, with Weaver, the way you look doesn't matter at all. As freeing as that thought is, you find it equally terrifying—if Weaver were to reject you, it would really be because of who you are on the inside.\n\n\t\tThat's not a rejection you're ready to face just yet, so you've tried your best to play it cool.\n\t\t*page_break\n\t\t*goto quickconfess\n\t#I don't feel self-conscious around Weaver because my visual Ani-changes don't matter to ${weaverhir} as a visually impaired person.\n\t\t*goto weavfriend\n\t#I like Weaver because ${weaverze} is friendly, smart, hard-working, and a bit unexpected, all at once.\n\t\t*goto weavfriend\n\t#As my handler, Weaver feels like my truest ally, since ${weaverhis} fate is tied to mine . \n\t\t*label weavfriend\n\t\t*set rlshp_weaver %+15\n\n\t\tPlus, you love that Weaver seems to like JK so much. Weaver may be a producer, but you know you can still trust ${weaverhir} to have your best interests at heart. \n\t\t*goto quickconfess\n\t#I need to remember that Weaver is still a producer and not necessarily my friend.\n\t\t*set rlshp_weaver %-15\n\n\t\tAt the end of the day, Weaver is paid to be here and has a job to do, whether ${weaverze} thinks of you as a friend or not. Knowing this, you try to remain wary and keep your distance, but it has proven difficult so far.\n\t\t*goto quickconfess\n\n*label quickconfess\n\n\"${named}, before I go, we do need to get an interview in,\" Weaver says, finishing up the last seam on your costume. \"JK, will you be okay if we go into the confessional room for a few minutes?\"\n\n\"Duh. I've got my Disembodied friend Outlet to keep me company,\" JK answers, remaining focused on the holo-screen. \"It's so fascinating: he's actually made of different types of energy, so he basically lives online in electric form most of the time, since he has no real physical body. I think it's so slugging cool, but he is pretty angry about the fact that he can't live normally. I'm trying to talk him out of joining this Disembodied group that—\"\n\n\"I think Weaver meant are you feeling okay?\" you jump in, knowing that JK can go on endlessly talking about her Disspace friends if you let her.\n\n\"Yes, I'm feeling good today,\" JK answers, actually turning to face you this time—and looking like she really means it. \n\nBefore you moved into the mansion together for making the Final 14, you returned JK to the Shiftsite Clinic for her second treatment with Loa Shift, which was meant to harmonize her jellyfish nerve net to her human nervous system. To your great relief, the treatment went well, and JK seems to be getting even stronger and more stable. The only major downside has been that JK sill experiences pretty intense lingering nerve flashes as the harmonization settles, but she insists these are still a million times better than the dull and constant chronic pain she used to live with.\n\n*page_break\n\n\"You two go do your thing,\" JK says, turning back to her holo-screen. \"Besides, I want ${codenamed} to make it to the merge already so we can finally hang with the Veterans.\"\n\nHearing this, Weaver turns ${weaverhis} head towards JK. You both know that JK is not supposed to tell you or the other Rookies any outside information, given your strict MeChip restrictions. JK had to sign a stack of nondisclosure contracts saying so before she could move into the mansion, which makes the shadow MeNet connection Weaver allows her to have very risky.\n\n\"Don't worry, my jellylips are sealed,\" JK says. \"Chatting with Outlet aside, I've been spending most of my online time looking for any signs of StarSoar. Actually, maybe Outlet can help with the search, come to think of it. If anyone knows how to surf the MeNet, it's someone who lives there.\"\n\nJK returns to typing furiously on her holo-keyboard, causing you to feel a pang of guilt. StarSoar's elimination has been a \n*if (ssblackmail) or (sspublic)\n\tvery sore subject between you and JK, given her vehement disapproval of what you did at the Final Selection party.\n\t*goto makeworse\n*else\n\tvery sore subject for JK, since she took it quite personally.\n\t*goto makeworse\n\n*label makeworse\nTo make matters worse, StarSoar has completely disappeared since his elimination, especially as his alien invasion delusions were only met with intense public ridicule. The Hero Project producers claim to be worried about StarSoar too, but JK is the only one who has been putting in any real effort to find him.\n\nThat's the reason Weaver let JK set up the hacked MeNet connection in the first place—JK has been working all of her Disspace, Disembodied, and space fan-fiction contacts to try to find StarSoar. It was the only thing that seemed to pull JK out of the considerable funk she was in during the sequester week, after enduring the one-two punch of her second strenuous treatment and StarSoar's disappearance.\n\n\"Well then, we'll leave you to it,\" Weaver says, \n*if (ssprove) or (sswarn)\n\trealizing that JK has already checked out of actual reality and into virtual reality.\n\t*goto hollaback\n*else\n\tno doubt sensing the tension still lingering in the silence between you and JK.\n\t*goto hollaback\n\n*label hollaback\n*page_break IN THE CONFESSIONAL BOOTH\n\nSitting against a holo-greenscreen backdrop, you face a wall of camera orbs and try your best to look natural as Weaver collects ${weaverhis} thoughts. \n\n\"Okay, I'm not doing any of this producer handling nonsense,\" Weaver says, settling into a chair next to the camera orbs. \"I'm going to tell you what I think, then you tell me what you think. Sound good?\"\n\n\"I won't hold back,\" you say, having already been trained that in these confessional sessions, a simple nod of approval won't do—you're always supposed to sound like you're talking to the camera in complete thoughts, not to Weaver.\n\n\"Listen, the vote is pretty straightforward, as far as I'm concerned,\" Weaver begins. \"My priority is obviously making sure you, Transfer, and Tarsiero make it as far as possible, not just because you're my meal ticket here, but because just like you, people tend to assign all kinds of boundaries to what I can do. I'm not interested in their boxes, so I'm happy to represent Powereds on this show who are equally unconcerned with labels or limitations.\n\n\"Obviously I want Transfer to survive this vote, but listen, this is still a reality competition, so do what your gut tells you will get you the furthest. If that means taking a stand for Transfer, great. But if that means sticking with the heroes who clearly know how to play the game and keep you safe after the merge, I'm fine with that too. As far as I'm concerned, we have far more important things to discuss here today.\"\n\n*page_break\n\nAs Weaver says this, a sneaky smile spreads its way across ${weaverhis} face. \"What I really want is to give you an opportunity to discuss some of the issues raised by these terrible Ani-cides. I think that's way more important, don't you?\"\n\nYou can't help but smile back at Weaver, because you were most definitely not expecting that to be the topic of discussion in your confessional, given the impending vote. Weaver is actually the first person on The Hero Project to ask your opinion on these Ani-cides, which means a lot to you.\n\nIt also means you now need to gather your thoughts as quickly as possible. You have a lot of experience with Ani-issues and now you finally have a chance to speak on them—so you had better make sure you get it right.\n\n\"So, ${codenamed}, what do you think is the most pressing issue facing Ani-Powereds in light of these Ani-cides?\" Weaver asks.\n\nTaking a deep breath, you compose yourself and look straight into the wall of camera orbs to answer Weaver's question.\n\n*choice\n\t#\"The biggest problem is that Ani-Powereds are thought of as somehow subhuman or inherently criminal, that our supposedly pack-oriented nature breeds a culture of aggression.\"\n\t\t\"It's not something flawed in our nature that has made us this way—it is a reaction to a society that has already deemed us unworthy,\" you continue. \"As an Ani-Powered myself, it has been extremely difficult for me to even get a basic job, let alone attain any greater opportunities. \n\n\t\t\"With nowhere else to turn, the Ani-community has ended up creating nuclear support groups, turning to those who we can relate to most. Everyone does that. Period. But Ani-Powereds are stigmatized as inherently divisive for doing so, to keep us at the bottom of the Powered food chain.\n\t\t*goto thisstigma\n\t#\"The biggest problem is that Ani-issues are ignored. Ani-Powereds have virtually no positive representation in popular or heroic culture.\"\n\t\t\"There are no balanced or positive representations of Ani-Powereds in our popular culture—I'm one of the few Ani-Powereds to be featured on national 3V as a hero,\" you continue. \"If Ani-Powereds are shown at all, they are usually depicted as villains or gang members. This isn't our fault, either—it's impossible for most of us to get normal jobs, let alone climb the insanely steep ladder to become a hero or public figure.\n\n\t\t\"Unfortunately it has now taken a series of high-profile murders for the media to pay our community any real attention, but the truth is that society has not been protecting us for a long time. We're thought of as the enemy first and citizens second, if at all.\n\t\t*goto thisstigma\n\t#\"To focus solely on the issues of Ani-Powereds wouldn't be good enough—many of the issues that Ani-Powereds face are the same as those that other Underrepresented Powered groups face as well.\"\n\t\t\"Many of us, myself and my sister included, develop Ani-Powers that are difficult to cope with and become Disembodied Powereds,\" you continue. \"For those of you who don't know, this means we have a difficult time inhabiting our own bodies, either because of chronic pain issues or foreign transformations.\n\n\t\t\"Not all Disembodied Powereds are Ani-Powered and vice versa, but the point remains the same: both groups have been systematically ignored and shut out of society. By and large there are no doctors who pay attention to our health issues. There are no employers who are willing to give us a chance. And there is no one out there to represent us, at least not until now.\n\t\t*goto thisstigma\n\t#\"I don't know about the issues, all I know is what I have experienced. I've seen a lot of wrong done to Ani-Powereds, but seeing Ali Croc murdered on those steps has been the worst by far.\"\n\t\t\"I don't even know where to begin explaining the stigma that surrounds Ani-Powereds,\" you continue. \"All I can say is that it exists and that it has gone unaddressed for far too long.\n\t\t*goto thisstigma\n\t#\"My actions will always speak much louder than words.\"\n\t\t\"So keep watching,\" you add. \"Closely.\"\n\n\t\tWith that, you fold your hands in your lap and stare into the wall of camera orbs with as much intensity as you can manage. These may not be the most eloquent words on the planet, but they are the most honest and direct ones you can think of. And hopefully the most provocative.\n\n\t\t*goto wellputeav\n\n*label thisstigma\n\n\"This stigma has created a culture where the oppression of Ani-Powereds is accepted, and now a culture where we are being outright murdered. Whoever is carrying out these hate crimes is hiding behind the veil of targeting Ani-criminals, using some self-prescribed code of morality to justify their actions. Unfortunately, this line of thinking is just an extreme extension of the way society already views us. \n\n\"But I'm here to say that we deserve the same opportunities, the same place in society, the same protection and due process as everyone else. I'm also here to say that I will do everything in my Power to stop these Ani-cides and change the culture that allowed them to happen in the first place.\"\n\n*page_break\n\nYou finish talking and are suddenly unaware of what you've even just said—you tend to black out when you speak publicly. This booth may not exactly be public, but you know that what you just said may still be seen by millio
