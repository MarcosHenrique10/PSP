orests of southern Colombia, you find yourself here, crouching down above an open coca field, binoculars in hand.\n    *goto clear_space\n\n*else\n    Having secured your grant, survived the carnies of Ildefonso, and crossed over into the forests of southern Colombia, you find yourself here, crouching down above an open coca field, binoculars in hand.\n    *goto clear_space\n\n*label clear_space\n\nIt hits you that this is the first cleared space you've seen in many miles. Happy at first to be freed of grasping lianas and prickly underbrush, you know this field spells trouble.\n\nIn every village you put between here and the border, you've heard that the FARC are still very much entrenched in the [i]fincas[/i], the field, and the highlands, strengthening their position against potential government crackdowns. So far, you haven't encountered them firsthand. You've been lucky.\n\nThe field is sure to be guarded by the FARC, but you can't see the guards from your present position.\n\nYou slap a mosquito on the back of your neck and decide to…\n*choice\n    #…army-crawl around the edge of the field, keeping low to the ground to avoid any patrols that might be lurking down there.\n        Right. You strap on your knee and elbow pads and strike off down the hillside until you fall flush against the cliff face, where it drops off into the river gorge far below. You're so high that you cannot hear the pounding torrent of its flow, but if you could see down to the bottom, you know you'd see the river in full tilt, turbid and brown from snowmelt, with acres of topsoil erupting white around the rocks.\n        *if fortune_and_glory > 70\n            You're already imagining how you'll tell this story to [i]National Geographic[/i] as a thrilling behind-the-scenes look into your search for the City of the Clouds!\n            *set risk_taker %+15\n            *set intelligence %+10\n            *set ruthlessness %+5\n            *page_break\n            *goto startled_capture\n        *else\n\n            You try not to think too much about it.\n            *set risk_taker %+10\n            *set intelligence %+10\n            *set ruthlessness %-5\n            *page_break\n            *goto startled_capture\n    #…walk straight through the field. No guts, no glory.\n        You reason that announcing your presence and avoiding a surprise encounter is the best way not to get shot.\n        \n        Your heart hammers in your chest as you begin to walk as softly as possible through the swish of the coca leaves in the dim light of early morning.\n\n        *if ruggedness > 70\n            Every fiber of your body is ready to spring into action.\n\n            By the time you walk halfway through the field without incident, however, you begin to relax a bit.\n            *set risk_taker %+15\n            *set ruggedness %+10\n            *page_break\n            *goto obvi_capture\n        *else\n            You try not to think too hard about the gunmen lurking around you in this field. Just put one foot in front of the other. Deep breaths.…\n            *set risk_taker %+10\t\n            *set ruggedness %-5\n            *page_break\n            *goto obvi_capture\n    #…skirt the edge of the slope before entering the field. I hope to learn the enemy's position before descending.\n        *if risk_taker \u003c 55\n            You don't want to expose yourself to any unnecessary risk. Tension hums taut as a wire in this region, and you don't want to end up as another statistic.\n            *set risk_taker %-15\n            *set intelligence %+10\n            *set ruthlessness %-5\n            *page_break\n            *goto startled_capture\n        *else\n            If you see that the field is guarded by only one or two men, you might decide to jump them and take their supplies for yourself. Most of these men have little or no training, after all. Many are little more than boys.\n            *set risk_taker %+10\n            *set intelligence %-5\n            *set ruthlessness %+5\n            *page_break\n            *goto startled_capture\n\n*label startled_capture\nBefore long, some instinct stops you dead in your tracks. Off to the right, you hear a branch snap.\n\nYou hold still and hold your breath. Three men melt out of the leaves just ahead of you. The first thing you see are the barrels of their guns.\n\nNext, you see their faces. They do not appear friendly.\n*choice\n        #I duck down low to the ground. Perhaps they missed me.\n            No such luck. Your movement draws their eyes. Both men point their guns directly at your crouching form.\n\n            The soldiers speak in a rapid staccato, and you are so flustered all you can gather is that they want you to come with them.\n\n            \"[i]Ven[/i]!\" they say. Come.\n        \n            It isn't a request. One of them pulls you roughly to your feet, where you stagger under the weight of your backpack.\n            *set risk_taker %-15\n            *page_break\n            *goto capture\n        #I hold my ground and demand, \"[i]Quien es[/i]?\" Who are you?\n            You speak as forcefully as you can muster, given your voice has caught in your throat. For a long moment, they stare at you. You can hear your own breath and the sound of your feet shifting restlessly in place in the mud. \n\n            You think you recognize their faces from the last village, but it's impossible to be sure. The FARC draws its soldiers from local farming families, and you could be looking at your last host's brother or son.  They look you up and down, ascertain that you're not a threat, and then one turns and walks off. The others stare at you and beckon. They turn halfway to go, then pause to wait for you to follow.\n            *set risk_taker %+5\n            *page_break\n            *goto capture\n\n*label obvi_capture\n\nThen, without warning, the branches ahead of you begin to rustle.\n*choice\n    #I hold my ground and demand, \"[i]Quien es[/i]?\" Who are you?\n        You speak as forcefully as you can muster, given that your voice has caught in your throat. For a long moment, you hear nothing but your own breath and the sound of your feet shifting restlessly in place in the mud. Then, two men move noiselessly, melting through the leaves in front of you. The first thing you see are the barrels of their guns. Next, you see their faces, dark and malignant.\n\n        They look you up and down, ascertain that you're not a threat, and then one turns and walk off. The second stares at you and beckons.\n        *set risk_taker %+10\n        *page_break\n        *goto capture\n    #I duck down low to the ground. Perhaps nobody has seen me.\n        No such luck. Two men melt out of the leaves in front of you. Both have their guns pointed directly at your crouching form. The soldiers speak in a rapid staccato, and you are so flustered all you can gather is that they want you to come with them.\n\n        \"[i]Ven[/i]!\" they say. Come.\n\n        It isn't a request. One of them pulls you roughly to your feet, where you stagger under the weight of your backpack.\n        *set risk_taker %-10\n        *page_break\n        *goto capture\n    #I back away slowly in the opposite direction of the sound, then turn and make a run for it.\n        As your feet get tangled up in a thicket of roots, you feel the weight of your backpack pitch you over and forward with great momentum to the ground.\n\n        Instinctively, you raise your hands to protect your face. You feel the impact and the shock of it shields you from the pain. You lie there for a few seconds.\n\n        You lift your face just as one of your pursuers slams the butt of his gun down across your forehead.\n\n        All goes black.…\n\n        The next thing you know, you wake up with a splitting headache in a darkened hut. The guards who captured you have you supported under each arm between them.\n    \n        *set risk_taker %-10\n        *set health %-15\n        *set alias \"archaeologist\"\n        *page_break\n        *goto inside_hut\n\n*label capture\n\nNo question that you're in a tight spot. American academics have a long history of spying for foreign interests in Latin America, and the locals here, militant and civilian, have grown skeptical of foreign university researchers.\n\nThis skepticism, for rebel militia, could easily transform into violence. If you say the wrong thing or say the right thing unconvincingly, they might shoot you just to be on the safe side, and nobody would ever find your body.\n\nIt might not be a bad idea to come up with some kind of alias. You think fast. You will tell them you are:\n*choice\n    #A German goldsmith studying local craft.\n        *if intelligence > 70\n            [i]Ja[/i]. Happily, you picked up quite a bit of German two years ago while supervising a dig in the Neandertal near Düsseldorf.\n            *set intelligence %+5\n            *set fortune_and_glory %+5\n            *set alias \"goldsmith\"\n            *page_break \n            *goto leader\n        *else\n            In your head, you try to imagine a German accent and can only channel Arnold Schwarzenegger.… If only you hadn't copped out of your language exams in Latin and ancient Greek!\n            *set intelligence %-5\n            *set risk_taker %+5\n            *set fortune_and_glory %-5\n            *set alias \"goldsmith\"\n            *page_break\n            *goto leader\n    #A lost adventure-tourist.\n        *if blood_alcohol_level > 75\n            Heck, you've met several intrepid but foolhardy tourists so far on the road. You think you can probably pull this thing off.\n            *set risk_taker %+5\n            *set luck %+5\n            *set alias \"tourist\"\n            *set blood_alcohol_level %+5\n            *page_break\n            *goto leader\n        *else\n            Heck, you've met several intrepid but foolhardy tourists so far on the road. They come by the dozen to experience the \"real\" Colombia off the beaten path, and you can't imagine you'd be the first one these FARC have intercepted for questioning.\n            *set intelligence %+10\n            *set alias \"tourist\"\n            *page_break\n            *goto leader\n    #Exactly what you are: an archaeologist.\n        *if moral_compass > 85\n            It pains you to tell a lie. Also, there's the fact that you have a pack full of archaeological gear.\n            *set risk_taker %-10\n            *set ruthlessness %-10\n            *set alias \"archaeologist\"\n            *page_break\n            *goto leader\n        *else\n            Well, for one thing, you're a terrible liar. It would go far worse for you if they saw through an underdeveloped alias. Also, there's the fact that everything in your pack screams archaeologist.\n            *set intelligence %-10\n            *set alias \"archaeologist\"\n            *page_break\n            *goto leader\n\n*label leader\nFor all your worries, your captors do not seem to give a hoot about your back story. They remain stonily silent as you march on.\n\nUp ahead, you see a small hut. Its walls are made from roughly hewn wooden planks and the roof consists of a woven thatch of brush. This is your destination. One of the men in front of you raises an arm in greeting, and a figure standing to one side of the door of the hut raises his in return.\n\nYou have this one last chance to make a break for it, if you dare. The river gorge lies somewhere off to your left. If you could only break free, you might have a chance of melting away into the forest.\n\nWithout your backpack, you could move quickly, but could you move quickly enough?\n*choice\n    *if risk_taker > 85\n        #Panic rising, I make a break for it! I can totally survive in the forest without my gear…right?\n            You don't make it more than a few yards before somebody tackles you to the ground. When the gun stock hits your temple, the world fades to black.\n        \n            When you open your eyes again, you find yourself supported between two men who seem to be waiting for something.\n            *set health %-10\n            *set fortune_and_glory %+5\n            *set risk_taker %+10\n            *page_break\n            *goto inside_hut\n    *else\n        #Panic rising, I make a break for it! I can survive in the forest without my gear…right?\n            You don't make it more than a few yards before somebody tackles you to the ground. When the gun stock hits your temple, the world fades to black.\n        \n            When you open your eyes again, you find yourself supported between two men who seem to be waiting for something.\n            *set health %-10\n            *set fortune_and_glory %+5\n            *set risk_taker %+10\n            *page_break\n            *goto inside_hut\n        #I shake my head and continue towards the hut, trusting that I can talk my way out of this mess.\n            Even if you made it past their bullets, you know you wouldn't survive long without your supplies.\n            *set health %+10\n            *set fortune_and_glory %+5\n            *set risk_taker %-10\n            *page_break\n            *goto inside_hut\n\n\n*label inside_hut\nInside the smoky interior of the hut, you have trouble seeing anything at all at first. As your eyes adjust, you can make out a big man sitting back against the far wall, his face in the shadows. Weak light shed from the embers of an old fire in the center of the floor illuminates his black combat boots. You notice they are caked in red mud. He uncrosses his hands from his chest, sets his hands on his knees, and lazily leans forward into the light.\n\nHe has a broad-boned face and light eyes. A thick, black mustache arches over his lip and droops somberly down towards his chin. He does not smile. His eyes regard you coldly, and you can't help but notice the automatic weapon strapped around his chest. He begins to speak to you in Spanish.\n\n\"You are far from home, I think. I am sorry I do not have a chair to offer you. You may sit on the floor.\" Your guard shoves you roughly towards the floor in response to the [i]jefe[/i]'s gesture. After a moment, he spoke again. \"Do you know,\" he asked, \"why you have been brought to me?\"\n*choice\n    #I play dumb. \"Have I trespassed somehow on your property?\"\n        *if risk_taker \u003c 60\n            \"I apologize most sincerely if this is the case.\"\n\n            \"Yes,\" he says. \"Yes, you have come upon a place you ought not to have seen, and your apology means nothing. Tell me why I shouldn't kill you now.\"\n            *set luck %-10\n            *page_break\n            *goto alias_attempt\n        *else \n            \"You should really put some signs up or something.\"\n\n            This appeared to amuse him. \"You have a strong spirit, and I do not think I will break it just yet. Now tell me who you are and what you are doing here.\"\n            *set luck %+10\n            *page_break\n            *goto alias_attempt\n    #I act righteous and hope this man respects my pluck.\n        \"I have done nothing wrong. Have your men release me at once.\"\n\n        He smiles, and you wonder whether you have gambled correctly. \"Well, I don't think we will release you just yet. Tell me, what am I to do with you in the meantime?\"\n        *set risk_taker %+5\n        *set luck %+10\n        *page_break\n        *goto alias_attempt\n    #I spit at his feet.\n        His face grows darker, and you sense that your window for speaking your piece is rapidly closing shut.\n        *set risk_taker %+15\n        *set luck %-10\n        *set health %-10    \n        *page_break\n        *goto smackdown\n\n*label smackdown\n\nYou see him nod to your left, and you feel a searing pain in your lower back where a boot connects just beneath your rib cage. After you recover enough to push to your knees, the man asks you who you think you are.\n\n\"Do not make the mistake of lying,\" he said. \"I can smell lies.\"\n\nHe raised his head then, as if to breathe in the air of your response.\n*goto alias_attempt\n\n*label alias_attempt\n*if alias = \"goldsmith\"\n    \"I…I am but a German goldsmith,\" you say, \"come here to learn from your people the ancient arts of working gold leaf. Why is it you have abducted me?\"\n\n    *if (hair = \"blond\") or (hair = \"red\")\n        \"You do look German,\" he says, gesturing to your ${hair} hair, \"but how can I trust you are who you say you are?\"\n        *goto convince_goldsmith\n    *else\n        \"You do not look German,\" he says, gesturing to your ${hair} hair, \"so how can I trust you are who you say you are?\"\n\n        You feel your stomach tying itself into knots.\n        *goto convince_goldsmith\n\n*elseif alias = \"tourist\"\n        \"Hey,\" you say, \"look, I'm just trying to see the sights out here. If I missed a sign or a fence or something, just set me on the straight path.\"\n\n        \"Well and good, but how do I know you are who you say you are, and that you will keep your mouth shut once you leave?\"\n        *goto convince_tourist\n\n*else\n        \"I'm an archaeologist out on survey,\" you say. \"I'm doing your people a favor by bringing their rich past to life.\"\n\n        \"How do I know,\" he says, \"that I can trust you are what you say you are—that you are not a government agent?\"\n        *goto convince_archaeologist\n\n\n*label convince_goldsmith\n\nEff. You had kind of hoped he would just accept your story.\n*choice\n    #I admit my true identity as an academic archaeologist.\n        \"Ah,\" he says. \"That has more of the ring of truth. You…eh, what is your name?\"\n    \n        Just in case they put a long-distance hit on you later, you lie. \"My name is ${first_name} Jones.\"\n    \n        \"Right. Well, ${mister} Jones, I hope you will find our meeting as serendipitous as I do. You will be working for us now. We have begun to expand our business interests into the antiquities market these days, and what we lack is a certified expert. Tell me, have you heard of the City of the Clouds?\"\n        \n        You feel your pulse racing. \"The City of the Clouds?\" you ask innocently. \"But that's only a myth.\"\n\n        He gestures to a guard, who kicks you hard in the ribs.\n    \n        \"I think you might be lying to us, Jones. It is no myth. Now, ${first_name}, you are mine. One of my top men, Nestor Ladera, will guide you to the site, and you will help us to identify the most valuable artifacts for sale to the highest bidders abroad.\"\n\n        *if ring = true\n\n            Your ears prick up at the name Nestor Ladera, and you finger the ring in your pocket. Would fate really put you into the hands of Esteban's brother?\n            *goto he_goes_on\n\n        *else\n            *goto he_goes_on\n\n\n    #I stick to my goldsmith guns.\n        The [i]jefe[/i] gestures for one of his goons to bring your backpack. Going through it, he pulls out your various survey supplies and your field notebook. Luckily, they don't seem to understand the contents.\n\n        \"You…eh, tell me, what is your name?\"\n        \n        Just in case they put a long-distance hit on you later, you lie. \"My name is ${first_name} Heidelberg.\"\n        *goto effigy_in_pack\n\n*label he_goes_on\n\nThe [i]jefe[/i] has stopped speaking to pick at his teeth with the tip of a machete. After a moment, he went on.\n\n\"You will spend the night under guard, Jones, and to ensure that you will not trouble my men by running away prematurely, Nestor will keep control of your GPS unit. Now get some rest. You leave early tomorrow.\"\n\n*set health %-5\n*set gps false\n*set intelligence %+10\n*set alias \"archaeologist\"\n*goto chicken_query\n\n*label effigy_in_pack\n\n*if (effigy = true) or (illicit_artifact = true)\n\n    \"Well then, ${mister} Heidelberg, perhaps you can explain this?\" He pulls out the illicit artifact you acquired back in Mexico City. You think fast.\n    *choice\n        #I modify my story and tell him that I'm actually a smuggler of illegal antiquities.\n            \"Ah,\" he says. \"That has more of the ring of truth. This land overflows in profit for business-minded individuals like you and me. Now, what is your real name?\"\n\n            You say the first name that pops into your head. \"My name is Jones.\"\n        \n            You reach into your pocket and pull out the ${artifact}. You hold it out to him. \"As proof that I am who I say I am. You may keep it as a gift, if you like.\"\n\n            He did like. He took it, inspected it, and placed it in his pocket. \"Right,\" he said. \"Well, ${mister} Jones, I hope you will find our meeting as serendipitous as I do. You will be working for us now. We have begun to expand our business interests into other areas of the black market these days. Areas you may be able to help us with. Tell me, have you heard of the City of the Clouds?\"\n\n            You feel your pulse racing. How could he know? \"The City of the Clouds?\" you ask innocently. \"But that's only a myth.\"\n\n            \"It is no myth. Now, ${first_name}, you are mine. One of my top men, Nestor Ladera, will guide you to the site, and you will help us to identify the most valuable artifacts for sale to the highest bidders abroad.\"\n\n            *if ring = true\n                Your ears prick up at the name Nestor Ladera. You finger the ring in your pocket thoughtfully. Would fate really put you into the hands of Esteban's brother?\n                *set GPS false\n                *set alias \"smuggler\"\n                *set intelligence %+10\n                *goto chicken_query\n\n            *else\n                *set GPS false\n                *set alias \"smuggler\"\n                *set intelligence %+10\n                *goto chicken_query\n\n        #I say that I picked those up from a vendor in the Cuzco marketplace.\n\n            \"Do you think it's real?\" you ask. \"I don't know much about ancient art other than my own craft, you know.\"\n\n            The [i]jefe[/i] looks annoyed. \"Of course, ${mister} Heidelberg, why would you? Well then,\" he says, \"looking you over again, I do not suppose you could be much use to us or to anyone else out here in the jungle. Maybe you will not be a help even to yourself. The forest has a way of swallowing people up. I will let you go free, but if any of my men run into you again, I will give them the order to shoot.\"\n\n            \"I thank you, sir,\" you say, \"for your generosity. Let me go my way, and you will never see me again.\"\n            *choice\n                *if (ruggedness > 70) and (pomposity > 70)\n                    #If I could, I would punch this condescending douchebag in the face.\n                        But…you can't if you want to live. You suck it up and keep a poker face, your fists at your side.\n                        *set pomposity %+10\n                        *set intelligence %+10  \n                        *goto free_follow\n                #I feel genuine gratitude towards this man for letting me go.\n                    Ew! Stockholm Syndrome! Next thing, you'll be wanting to cozy up next to him in bed!\n                    *set intelligence %-10\n                    *set pomposity %-15\n                    *goto free_follow\n                #I feign all the gratitude I think he wants to see.\n                    He dismisses you with a wave of his hand and ceases to acknowledge your presence.\n                    *set intelligence %+10\n                    *set pomposity %+5\n                    *goto free_follow\n            \t\n\n*else\n\n    \"Well, ${mister} Heidelberg, this is your lucky day. I am feeling particularly generous, and as a man of strong nationalistic pride, I would hate to halt any attempts to bring artistic recognition to the glories of our culture. I will let you go free on the condition that you leave this region and say nothing of where we are. If we encounter you again, we will shoot you.\"\n\n    \"I thank you, sir,\" you say, \"for your generosity. Let me go my way, and you will never see me again.\"\n    *choice\n        *if (ruggedness \u003c 70) and (pomposity \u003c 70)\n            #I feel genuine gratitude towards this man for letting me go.\n                Ew! Stockholm Syndrome! Next thing, you'll be wanting to cozy up next to him in bed!\n                *set intelligence %-10\n                *set pomposity %-15\n                *goto free_follow\n        #I feign all the gratitude I think he wants to see.\n            He dismisses you with a wave of his hand and ceases to acknowledge your presence.\n            *set intelligence %+10\n            *set pomposity %+5\n            *goto free_follow\n        #If I could, I would punch this condescending douchebag in the face.\n            But…you can't if you want to live. You suck it up and keep a poker face, your fists at your side.\n            *set pomposity %+10\n            *set intelligence %+10  \n            *goto free_follow\n\t   \n\n\n*label convince_tourist\n\nEff. You had kind of hoped he would just accept your story.\n*choice\n    #I admit my true identity as an academic archaeologist.\n        \"Ah,\" he says. \"That has more of the ring of truth. You…eh, what is your name?\"\n    \n        Just in case they put a long-distance hit on you later, you lie. \"My name is ${first_name} Jones.\" \n    \n        \"Right. Well, ${mister} Jones, I hope you will find our meeting as serendipitous as I do. You will be working for us now. We have begun to expand our business interests into other areas of the black market these days. Areas you may be able to help us with. Tell me, have you heard of the City of the Clouds?\"\n        \n        You feel your pulse racing. \"The City of the Clouds?\" you ask innocently. \"But that's only a myth.\"\n\n        H ch into your pocket and pull out the ${artifact}. You hold it out to him. \"As proof that I am who I say I am. You may keep it as a gift, if you like.\"\n\n                    He did like. He took it, inspected it, and placed it in his pocket.\n\n                    \"Right,\" he said. \"Well, ${mister} Jones, I hope you will find our meeting as serendipitous as I do. You will be working for us now. We have begun to expand our business interests into other areas of the black market these days. Areas you may be able to help us with. Tell me, have you heard of the City of the Clouds?\"\n\n                    You feel your pulse racing. \"The City of the Clouds?\" you ask innocently. \"But that's only a myth.\"\n\n                    \"It is no myth. One of my top men, Nestor Ladera, will guide you to the site. You are mine now, ${first_name}, and Nestor will keep your GPS unit until you get that through your head. Without your wayfinding technology, you will have no prayer of surviving the deep forest. If you work well for me, however, you will keep your life and receive fair compensation for your finds. Now get some rest. You leave early tomorrow.\"\n\n                    *if ring = true\n\n                        Your ears prick up at the name Nestor Ladera. You finger the ring in your pocket thoughtfully. Would fate put you into the hands of Esteban's brother?\n                        *set intelligence %+10\n                        *set GPS false\n                        *goto chicken_query\n    \n                    *else\n                        *set intelligence %+10\n                        *set GPS false\n                        *goto chicken_query\n\n                #I say that I picked it up from a vendor in the Cuzco marketplace.\n                    \"Do you think it's real?\" you ask.\n\n                    The [i]jefe[/i] looks annoyed. \"Well then,\" he says, \"looking you over again, I do not suppose you could be much use to us or to anyone else out here in the jungle. Maybe you will not be a help even to yourself. The forest has a way of swallowing people up. I will let you go free, but if any of my men run into you again, I will give them the order to shoot.\"\n                    \n                    \"I thank you, sir,\" you say, \"for your generosity. Let me go my way, and you will never see me again.\"\n                    *choice\n                        #I feel genuine gratitude towards this man for letting me go.\n                            Ew! Stockholm Syndrome! Next thing, you'll be wanting to cozy up next to him in bed!\n                            *set intelligence %-10\n                            *set pomposity %-15\n                            *goto free_follow\n                        #I feign all the gratitude I think he wants to see.\n                            He dismisses you with a wave of his hand and ceases to acknowledge your presence.\n                            *set intelligence %+10\n                            *set pomposity %+5\n                            *goto free_follow\n                        #If I could, I would punch this condescending douchebag in the face.\n                            But…you can't if you want to live. You suck it up and keep a poker face, your fists at your side.\n                            *set pomposity %+10\n                            *set intelligence %+10  \n                            *goto free_follow                    \n\n        *else\n\n            \"Well, ${mister} Leakey, this is your lucky day. I am feeling particularly generous, and I will let you go free on the condition that you say nothing of where we are. And if we encounter you again, if you trespass on what is mine again, well then it is simple. We will shoot you.\"\n                \n            \"I thank you, sir,\" you say, \"for your generosity. Let me go my way, and you will never see me again.\"\n\n            *choice\n                #I feel genuine gratitude towards this man for letting me go.\n                    Ew! Stockholm Syndrome! Next thing, you'll be wanting to cozy up next to him in bed!\n                    *set intelligence %-10\n                    *set pomposity %-15\n                    *goto free_follow\n                #I feign all the gratitude I think he wants to see.\n                    He dismisses you with a wave of his hand and ceases to acknowledge your presence.\n                    *set intelligence %+10\n                    *set pomposity %+5\n                    *goto free_follow\n                #If I could, I would punch this condescending douchebag in the face.\n                    But…you can't if you want to live. You suck it up and keep a poker face, your fists at your side.\n                    *set pomposity %+10\n                    *set intelligence %+10  \n                    *goto free_follow \n\n\n\n*label convince_archaeologist\n\nYou assure him that you are an archaeologist from an American university, but instead of revealing that you're bound for the City of the Clouds, you tell him that you're attempting to map the old Incan roads.\n\nAfter rifling through your bag, pulling out your field notebook and such, he nods.\n\n\"Perhaps you tell the truth, ${mister}…eh, what's your name?\"\n\nIn case they decide to put an international hit on you later, you tell them the first name that pops into your head. \"Jones. It's ${mister} ${first_name} Jones.\"\n\n\"Ah, yes, ${mister} Jones. How would you feel about working for me as an expert smuggler? You will find I pay well.\"\n\n*choice\n    *if (moral_compass > 40) or (pomposity \u003c 50)\n        #I accept. I would certainly welcome that kind of money…it's a shame I don't trust him to keep his word.\n\n            \"So,\" you ask, \"when can I start?\"\n\n            \"My man, Nestor Ladera, will guide you to a site called [i]La Ciudad de las Nubes[/i] tomorrow morning. He will keep your GPS device to ensure that you do not do anything foolish, like trying to escape. If you work well for me, you will keep your life and receive fair compensation for your finds. Now get some rest, for you leave early tomorrow.\"\n            *if ring = true\n\n                Your ears pricked up at the name Nestor Ladera, and at the mention of the City of the Clouds, the hair on the back of your neck stood on end. You finger the ring in your pocket thoughtfully. Would fate really put you into the hands of Esteban's brother?\n                *set risk_taker %+10\n                *set moral_compass %-15\n                *page_break\n                *goto chicken_query\n            *else\n                At the mention of the City of the Clouds, the hair on the back of your neck stood on end.\n                *set risk_taker %+10\n                *set moral_compass %-15\n                *page_break\n                *goto chicken_query\n\n\n    #I decline. That goes against every ethical bone in my archaeologist body.\n\n        \"I'm sorry you feel that way, Jones, but you have no choice in the matter. You will work for me or you will die.\"\n    \n        Hmm. That changes matters.\n\n        \"Well, okay then,\" you say. \"In that case, when do we start?\"\n\n        \"I thought you might see it my way. Tomorrow morning, Nestor Ladera will guide you to the site known as [i]La Ciudad de las Nubes[/i]. Nestor will keep your GPS unit to ensure you do not try anything foolish. Know that without your wayfinding technology, a [i]gringo[/i] like you will have no prayer of surviving the deep forest. If you work well for me, however, you will keep your life and receive fair compensation for your finds. Now get some rest. You leave early tomorrow.\"\n\n        *if ring = true\n            Your ears pricked up at the name Nestor Ladera, and at the mention of the City of the Clouds, all of your hair stood on end. You finger the ring in your pocket thoughtfully. Would fate really put you into the hands of Esteban's brother?\n\n            *set moral_compass %+10\n            *set risk_taker %+10\n            *set intelligence %-10\n            *goto chicken_query\n\n        *else\n            At the mention of the City of the Clouds, all of your hair stood on end.\n            *set moral_compass %+10\n            *set risk_taker %+10\n            *set intelligence %-10\n            *goto chicken_query\n\n    #I accept out of self-preservation, but plan to defect at the earliest opportunity.\n\n        \"Yes, it would be good to join forces, to share knowledge. When do we start?\"\n\n        \"Tomorrow morning, Nestor Ladera will guide you to the site known as [i]La Ciudad de las Nubes[/i]. He will keep your GPS unit to ensure you do not try anything foolish. Know that without your wayfinder you will have no prayer of surviving the deep forest. If you work well for me, however, you will keep your life and receive fair compensation for your finds. Now get some rest. You leave early tomorrow.\"\n\t\n        *if ring = true\n            Your ears pricked up when you heard the name Nestor Ladera, and at the mention of the City of the Clouds, all of your hair stood on end. You finger the ring in your pocket thoughtfully. Would fate really put you into the hands of Esteban's brother?\n\n            *set risk_taker %+5\n            *set intelligence %+10\n            *goto chicken_query\n\n        *else\n            At the mention of the City of the Clouds, all of your hair stood on end.\n            *set risk_taker %+5\n            *set intelligence %+10\n            *goto chicken_query\n\n*label chicken_query\n*if chicken = true\n\n    \"Hey,\" the [i]jefe[/i] says as you turn to go, his brow furrowed. \"What's with this chicken?\"\n     \n    *choice\n        #\"Chickens make good eating,\" I say as matter of factly as possible.\n            The [i]jefe[/i] doesn't need to know everything.\n            *set ruggedness %+10\n            *set fortune_and_glory %+5\n            *goto morning_time_to_go\n        #\"He's my service animal. He keeps my anxiety down.\"\n            You could tell by his face that this does not translate well into Spanish. He waves you away.\n            *set fortune_and_glory %+5\n            *set ruggedness %-10\n            *goto morning_time_to_go\n        #\"Funny story. He was gifted to me by the Incan Genie who drove my taxi from Quito.\"\n            The [i]jefe[/i] frowns deeper, perhaps concerned for your sanity, but says nothing else.\n            *set fortune_and_glory %+5\n            *goto morning_time_to_go\n        #\"Good question. How about you keep him? I've had enough clucks and mutters at night.\"\n            You leave the troublesome bird with your captor and walk off into the night.\n            *set chicken false\n            *set fortune_and_glory %-10\n            *goto morning_time_to_go\n\n*else\n    *goto morning_time_to_go\n\n*label morning_time_to_go\n\n*if ring = \"true\"\n    You hold onto the ring like a talisman. Karma, it seems, may help you get out of this mess.\n\n    Certainly, things are looking up in a cloudy sort of way—if this Nestor knows what he's about, you should arrive at the City of the Clouds itself in a few days, and with a little luck you'll live to tell the tale.\n    *goto sleep_hut\n\n*else\n    *goto sleep_hut\n\n*label sleep_hut\nYou settle down for the night, under guard in your little holding hut, and have a heck of a time falling asleep for fear of…\n*choice\n    #Death.\n        *if ruggedness \u003c 60\n            The more you think about dying here in Colombia, the more you regret not having taken that archaeology post in Bermuda.\n\n            Sure, the archaeology there isn't terribly exciting, but then again, you would be in Bermuda right now drinking rum and not stuck in some damp and smelly hut awaiting a bullet.\n            *set fortune_and_glory %-5\n            *set ruggedness %-5\n            *set ruthlessness %-5    \n            *page_break\n            *goto guards_talk\n        *else\n            You don't want to die in here like a dog…it isn't so much death that you fear, it's more a fear of dying without honor, without a weapon in your hand.\n            *set ruggedness %+5\n            *set ruthlessness %+5\n            *page_break\n            *goto guards_talk\n    #The death of my professional ambitions should things go sour tomorrow.\n        *if ruthlessness > 60\n            You've worked too dang hard for the FARC to foul this up. You must find a way to escape and to carry out your mission! Whatever it takes. Failure is not an option.\n            *set fortune_and_glory %+10\n            *set ruggedness %+10\n            *page_break\n            *goto guards_talk\n        *else\n            You've worked so long and hard to get here…it pains you to think it may all come to nothing. You can feel your hope ebbing away in the damp of the hut.\n            *set ruthlessness %-5\n            *set fortune_and_glory %-10\n            *set ruggedness %-10\n            *page_break\n            *goto guards_talk\n    #Creepy-crawlies on the floor.\n        *if ruggedness \u003c 60\n            Spiders, scorpions, disease-bearing rodents…you can hear things skittering about, but for better or worse, you can't see anything at all. You grit your teeth, ball up in a corner, and try to think happy thoughts.\n            *set fortune_and_glory %-10\n            *page_break\n            *goto guards_talk\n        *else\n            Spiders, scorpions, disease-bearing rodents…you can hear things skittering about, and you amuse yourself by tossing a small penknife you concealed in your pocket at the larger varmints. You manage to hit two out of five. Not such bad odds in total darkness.\n            *set ruthlessness %+10\n            *page_break\n            *goto guards_talk\n    #Bedbugs in your straw pallet.\n        You pull a match from your pocket, and with its pale light you inspect your pallet. Its surface appears to seethe as hundreds of tiny black bedbugs come out to feed.\n\n        Maybe it's a good thing they took your pack after all—at least these little blood-sucking bastards can't hitch a ride in there back home with you. Backpacks are next to impossible to de-bug—too many seams.\n        *set fortune_and_glory %-10\n        *set ruggedness %-10\n        *page_break\n        *goto guards_talk\n\n*label guards_talk\n\nThe men sitting guard outside your door are talking about the City of the Clouds. Their voices sound hushed and fearful.\n*choice\n    #I attempt to engage them, trying to glean as much information as possible.\n        \"What is it you're saying out there?\" you ask. \"I think I missed the last thing.\"\n        \n        The voices stop.\n\n        One says, \"So what if he hears us talking? We will all meet our ends in [i]la Ciudad de las Nubes[/i]. The [i]jefe[/i] wants to rob the grave goods, but you see he will not go himself.\"\n\n        \"Yes,\" the second says, \"if we go, we die, and if we refuse to go, we die.\"\n\n        \"Right,\" says the first voice. He knocks on the door. \"You too had better prepare yourself for death, [i]americano[/i]. Make your peace with God before we enter the cursed city.\"\n\n        In spite of your entreaties, they will say nothing more.\n\n        What, you wonder, are they so afraid of?\n        *set intelligence %+10\n        *set social_networking %+10\n        *page_break    \n        *goto morning_walk \n    #I cup my hand around my ear and listen against the door.\n\n        One man says, \"Have you known anyone to get into [i]la Ciudad de las Nubes[/i] and come out alive again?\"\n        \n        \"No,\" says the other, \"but there was the case of Hernando.…\"\n        \n        \"Ah, yes. Hernando, the madman. Carved out his own eyes with thorns from the Christ Plant.\"\n            \n        \"[i]Ay, Dios[/i].\"\n    \n        You pull away from the door. Not exactly a rosy portrayal of the City of the Clouds.…\n        *set intelligence %+10\n        *set social_networking %+5\n        *page_break\n        *goto morning_walk\n    #I roll over crabbily on my straw pallet and continue trying to sleep.\n\n        I mean, seriously. You have a long walk ahead of you tomorrow, and you desire proper rest. Is that too much to ask? Apparently.\n    \n        You brush a bedbug from your cheek and shut your eyes determinedly.\n        *set intelligence %-10\n        *set social_networking %-10\n        *page_break\n        *goto morning_walk\n\n*label morning_walk\n\nYou start out on the trail early that morning and fall into line in the middle of a rag-tag group of FARC militia. Their faces are all pictures of gloom.\n\nNestor surveys his men with dark, flinty eyes.\n\n\"[i]¡Vamanos![/i]\" he says as he waves the group forward. You see that he carries your GPS unit on his belt.\n\nYou follow your captors along a narrow track down the forested side of a mountain, the trees pressing down thickly around you into a deep valley. On the second day, you ascend from the valley up into the lower reaches of the mountains. The forest here feels primeval and is wrapped in clouds.\n\nA hush falls over the group.\n\n*page_break\n\nThen a shout breaks the silence.\n\nThe man in front of you had stepped off the trail and disturbed a pit viper hidden beneath the leaf litter. He falls to the ground holding his foot, which has begun to swell in its sandal.\n\nHe begs somebody to put him out of his misery.\n*choice\n    #I ignore his pleas, take a machete from his belt, and chop off his foot at the ankle.\n        These things call for quick action. The less thinking, the less emotion, the better.\n\n        Nestor walks calmly up beside you and shoves you aside as you try to apply pressure to the man's stump. He lifts his gun, aims, and shoots the man point-blank in the head.\n\n        Shocked, you stare up at him.\n\n        \"We cannot afford to carry an injured man, [i]gringo[/i],\" he says. \"You should have let him die a whole man.\"\n        *set ruggedness %+15\n        *set intelligence %+5\n        *set moral_compass %+10\n        *page_break\n        *goto break_time\n\n    #I cringe and step backward, unable to watch.\n        Out of the corner of your eye, you see Nestor walk calmly up beside him. You close your eyes, but you still hear the three shots that open the man's skull and end his life.\n        *set ruggedness %-15\n        *set moral_compass %-10\n        *page_break\n        *goto break_time\n\n\n    #I cradle his head, offering him a sip of water.\n        One of his compatriots pushes you aside, aims a gun, and erases the man's pain.\n        *set moral_compass %+15\n        *set ruggedness %+10\n        *page_break\n        *goto break_time\n\n*label break_time\n\nAfter that, spirits fall to a new low. Nestor announces that you'll be stopping to rest before moving on. The line shifts around, and you notice Nestor reclining a little bit away from the group against the trunk of an old tree, his eyes half-closed.\n\n*if ring = true\n    You approach and ask if the two of you can talk. You hand him the ring, and his eyebrows jump in surprise.\n\n    \"Well,\" he asks slowly, his eyes boring into yours, \"how did you get that ring?\"\n    *choice\n        *if ruthlessness \u003c 70\n\n            #I tell him that his brother is well and that he asked me to give him this ring as proof if luck should have our paths cross.\n\n                \"We met in Mexico City and talked for a while; I told him I planned to travel through this region of his country.\"\n    \n                He nods. \"Clearly, my brother trusted you. Is there anything I can do for you in return?\"\n    \n                You request your GPS and that he secure you a safe release. He purses his lips for a moment, then agrees.\n    \n                \"It is unlikely that any of us will return from the City of the Clouds anyway.\"\n        \n                \"Why?\" you ask. \"Booby traps?\"\n    \n                \"And worse.\"\n\n                He unclips your GPS unit from his belt and hands it back to you.\n                *set moral_compass %+15\n                *set risk_taker %-5\n                *set social_networking %+10\n                *set GPS true\n                *page_break\n                *set ring false\n                *goto first_person_cloud_gates \n\n        #I tell him I won't give any more information until he guarantees my safe release and the return of my GPS unit.\n\n            He looks stern for a moment, then nods. \"You will have what you ask if you can tell me what I want to hear about my brother.\"\n    \n            You tell him that his brother has safely made it through Mexico City without getting caught or suffering health consequences from carrying cocaine in his gut.\n        \n            \"I thank you for this.\"\n\n            He unclips the GPS unit from his belt and hands it to you.\n            *set risk_taker %+5\n            *set social_networking %+10\n            *set ring false\n            *page_break\n            *set GPS true        \n            *goto first_person_cloud_gates\n\n        #I tell him I won't give any more information unless he furnishes me with a gun and my GPS unit.\n            His face darkens. After a moment, he nods slowly. \"You will have what you ask if you can tell me what I want to hear about my brother. Know that you walk a thin line here.\"\n    \n            You tell him that his brother has safely made it through Mexico City without getting caught or suffering health consequences from carrying cocaine in his gut. Nestor nods slowly.\n\n            \"You will have to pretend to force my gun from me,\" Nestor says. \"Do it now.\"\n    \n            He doesn't need to tell you twice! You lunge for his AK-47 and feel him release it evenly into your hands. You relieve him of your GPS unit. When you break away into the underbrush, you feel your heart in your chest as the shouting and shooting begins. After a minute, you realize that the firing has ceased and that you have no pursuers.\n\n            You trail them from a safe distance.\n            *set risk_taker %+15\n            *set luck %+10\n            *set gun true\n            *page_break\n            *set ring false\n            *set GPS true\n            *set social_networking %-5\n            *goto distant_cloud_gates\n\n\n\n\n*else\n    *choice\n        *if (libido > 75) and (risk_taker > 75)\n            #Fully aware of my own sexual prowess as an archaeologist, I attempt to seduce him.\n\n                Hey, desperate times call for desperate measures!\n\n                You toss a pebble his way, and when he glares at you, you muster up a deep, sultry look. His gaze softens with understanding, and the two of you retreat into the woods.\n            \n                Afterward, spooning under the trees, you ask if he wouldn't mind slipping you your GPS unit, and you mention that you would appreciate not getting shot in the back if you maybe tried to slip away in the City of the Clouds.\n    \n                He laughs. \"Oh,\" he says, \"you may have it back in camp, but I don't know that any of us will escape [i]la Ciudad de las Nubes[/i]. I have cheated death once by seeing only its gates. The [i]jefe[/i] found out that I know the way and said he will shoot me if I do not go there and return with loot enough to suit him. So you see, I am doubly a dead man.\"\n            \n                \"And…what is it that has everyone so frightened?\"\n\n                \"Nobody I know has returned to say. Nobody whole in body or mind, that is.\"\n            \n                \"Booby traps?\"\n    \n                \"And worse.\"\n\n                *set libido %+10\n                *set GPS true\n                *set moral_compass %-5\n                *set social_networking %+10\n                *set risk_taker %+10\n                *page_break\n                *goto first_person_cloud_gates\n\n\n        #I edge over next to him and attempt to strike up a conversation.\n            You'd read somewhere that the best thing you can do as a captive is to make yourself seem human.\n\n            \"So,\" you begin, \"I don't know if we've been properly introduced. Name's ${first_name}.\"\n\n            He does not respond. You begin again. \"So, uh, have you ever actually been to the City of the Clouds?\"\n    \n            He cracks an eye. \"I have only seen its gates. The [i]jefe[/i] found out that I know the way, and said he will shoot me if I do not go there for him and return with loot enough to make a fortune. So you see, I am a dead man.\"\n            \n            \"And…what is it that everyone here is so frightened of in this place?\"\n\n            \"Nobody I know has returned to say. Nobody whole in body or mind, that is.\"\n            \n            \"Booby traps?\"\n    \n            \"And worse.\"\n           \n            *set intelligence %+5\n            *set social_networking %+10\n            *set GPS false\n            *page_break\n            *goto first_person_cloud_gates\n\n        #I make a lunge for the AK-47 he has let slip down to the ground as his hand loosened in a doze.\n            *if ruggedness > 60\n                Success! You heft the barrel as he pushes to his feet, his hands in the air as you aim the gun squarely at his chest. Slowly, you back away into the jungle. Nobody follows you, and after some time has passed, you begin to tail them, staying just off the trail and out of view.\n                *set risk_taker %+15\n                *set gun true\n                *set luck %+10\n                *set social_networking %-10\n                *page_break\n                *goto distant_cloud_gates\n            *else \n                He snaps it up again before you can reach it and marches you back in line at gunpoint.\n                *set risk_taker %+15\n                *set luck %-10\n                *set social_networking %-10\n                *page_break\n                *goto first_person_cloud_gates\n\n\n*label first_person_cloud_gates\n\nLate morning on the third day, the stone walls of the City of the Clouds appear, seeming to melt out of the forest, taking everybody by surprise.\n\nIts ancient builders had chiseled anthropomorphic figures and geometric patterns into the gray stone of their gate. On the lintel stone some twenty feet above you, two large eyes carved in bas-relief stare down upon you, watching. Low-hanging clouds make it difficult to see much of anything that lies beyond the gate.\n\nNestor makes a motion, and you begin to pass through the gate, everyone moving slowly through the mist. The temperature drops.\n\nLooking down at the ground like a good archaeologist, you see that your shoe has come untied. As you bend down to tie it, you hear a sibilant burst split the air above you, then screaming as men fall around you, their bodies riddled with arrows.\n\nYou hear Nestor fighting to keep order.\n\n\"Stay together!\" he shouts, but in the mayhem of frightened and undisciplined men, you're able to slip away into the ruins.\n*page_break\n\nYou lean back against a wall to catch your breath.\n\nWhen your heart stops pounding…\n*choice\n    #…a slow, self-satisfied smile spreads across my face.\n        You've made it! You stand within the walls of the City of the Clouds.\n        *set pomposity %+10\n        *goto finish\n    #…I think about the dead bodies again, and my heart redoubles its pounding.\n        Turns out you're more comfortable with dead bodies once they've aged a century or two.\n        *set ruggedness %-10\n        *goto finish \n    #…I can't help but marvel at the Inca technology of war.\n        Happily, their booby traps don't have a 100% kill-rate. You've escaped…for the moment.\n        *set cultural_fetishism %+10\n        *set intelligence %+5\n        *goto finish\n \n*label free_follow\n\nOn your way out of the hut, a small man with an air of command comes in and asks whether the expedition to [i]la Ciudad de las Nubes[/i] will require guns.\n\nYour ears prick up.\n\n\"[i]Si[/i], Nestor,\" the [i]jefe[/i] said, nodding distractedly. \"Of course. Take what guns you think you may need, but hear me Ladera: carry the spoils with care.\"\n\nThe guards hustle you out before you can hear more.\n\n*page_break\n\n*if ring = true\n    The name Nestor rang a bell…of course! Nestor Ladera! That man looks the spitting image of Esteban, the drug mule back in Mexico City. You have no way to reveal yourself to him now, but if the opportunity arises, you'll do your duty and give him the ring.\n    *goto outside_camp\n\n*else\n    *goto outside_camp\n\n*label outside_camp\nCocaine and the black market in illegal antiquities have married here in Colombia.\n\nGood news for you!\n\nThis looting expedition will lead you directly to the City of the Clouds. At this point, with supplies running low, you're in no condition to continue wandering around the countryside much longer on your own. You decide to follow them.\n\nAll night, you hunker down in the damp underbrush near camp, sleeping fitfully until you hear the men begin to stir at dawn. The looting expedition gathers together in the middle of camp, outfitted with assault rifles.\n\nYou wait and watch for the group to leave the compound, and then move to follow…\n\n*choice\n    #…far behind them on the main trail, just out of earshot.\n        More afraid of snakes and getting lost out there than you are of taking a bullet, you move along as quickly as you can to keep pace. At a fork in the trail, you stop and stare blankly ahead.\n\n        For a moment you worry that you're lost, but then you notice a smoldering cigarette butt just up the trail to the left. You travel at a slow jog until you catch the sound of them again.\n\n        After this, you follow more closely behind the group.\n        *set luck %+10\n        *set intelligence %-10\n        *set health %+5\n        *set ruggedness %-5\n        *goto distant_cloud_gates\n\n    #…just off the main trail, in the rough before the tangle of forest.\n        You don't want to risk getting seen and shot so close to your goal, but neither do you want to step on a fer-de-lance. Visibility is marginal, and you manage to scratch up one arm in a bramble of thorny lianas.\n\n        In spite of such discomforts, you're able to travel fast enough and close enough to keep pace with the group.\n        *set health %-5\n        *set luck %-5\n        *set ruggedness %+5\n        *goto distant_cloud_gates\n\n    #…in the thick of the woods.\n        The going is a little slower, but hey, at least there's no chance anyone will see you in this kind of rough terrain. As you step through the leaf litter, your feet plunge unexpectedly into a pool of stagnant water. It creeps over and into your boots before you can jump backward.\n\n        *if secret_weapon = \"moisture wicking socks\"\n            Thank the archaeology gods you have an extra pair of moisture-wicking socks! Dry and fuzzy bliss!\n\n            The joy wears off soon enough, though. You have to keep an exhausting pace to keep up with the group, moving back and forth between the deep thickets and thinning brush near the trail to make sure you stay on track.\n            *set health %+5\n            *set luck %-10\n            *set ruggedness %+10\n            *goto distant_cloud_gates\n\t    \n        *else\n            Great. Now you have to worry about foot rot.\n\n            You have to keep an exhausting pace to keep up with the group, moving back and forth between the deep thickets and thinning brush near the trail to make sure you stay on track.\n            *set health %-15\n            *set luck %-10\n            *set ruggedness %+10\n            *goto distant_cloud_gates\n\n*label distant_cloud_gates\n\nYou travel for two days. You trek down, down, down into the vegetation-choked forest of a valley and then up the far wall and into the clouds.\n\nThe next time you get a good look at the backs of the FARC men on the morning of the third day, they're approaching the gates of what appears to be a ruined city.\n\nThe gray stone walls of its gate seem to have melted out of the mist, and you blink several times to convince yourself of their reality.\n\nYou squint into the mist and watch as they file through the gates.\n\nA few moments later, you begin to hear their screams.\n\n*page_break\n\nOne or two of the FARC fly out of the gate as if possessed. Their ashen faces pass you without a glance on their way down the mountain.\n\nShards!\n\nYou approach the gate with trepidation. As you pass through, you must step over the bodies of several men you recognize from the FARC camp. All are dead or dying from arrow wounds—poisoned arrows, judging by the death rate of those pierced.\n\nYou duck down immediately to protect yourself against any un-triggered traps and crawl forward until you can stand up within the city.\n\nIt takes a moment for reality to sink in.\n\nWhen your heart stops pounding…\n*choice\n    #…a slow, self-satisfied smile spreads across my face.\n        Give yourself a pat on the back—you've made it! You stand within the walls of the City of the Clouds!\n        *set pomposity %+10\n        *goto finish\n    #…I think about the dead bodies again, and my heart redoubles its pounding.\n        Turns out you like dead bodies better once they've aged a century or two.\n        *set ruggedness %-10\n        *goto finish \n    #…I begin to wonder how those bone darts have escaped decay over the centuries of exposure to this mist.\n        Anaerobic or dry climates really work best for preserving organics like wood and bone. Not so much cloud forests. You sense something strange is afoot in this place.…\n        *set cultural_fetishism %+10\n        *set intelligence %+15\n        *goto finish\n\n*label finish\n*finish\n\n", "gathering_supplies_two": "*set character_defined true\nYour mind wanders back to last summer's archaeology conference in Atlanta, Georgia. It was there that this Colombia idea began to grow in your brain.…\n \nSomeone sitting behind you in the Andeanist Forum had accidentally kicked your chair, jolting you out of a light doze in time to hear the speaker say that Colombia was one of the last untapped archaeological frontiers; only a fraction of a percent of Colombian land had ever been surveyed by professional archaeologists.\n\nVirtually anything, he surmised, could lie choked in the undergrowth of this, the northernmost Andean region. Historical accounts from the time of the Spanish conquest hint at a lost city somewhere in the mountains, but nobody has ever managed to confirm or deny its existence. The Spanish texts refer to the place as [i]La Ciudad de Las Nubes[/i], The City of the Clouds.\n\n\"Now, the mountains of Colombia,\" the speaker had warned, \"are home to as many deadly dangers as potential archaeological finds. I must advise any would-be researchers to exercise extreme caution while out on survey.\"\n\nHe lifted his arm and displayed a stump fit with a metal claw; a casualty, he said, to the necrotic bite of a local pit viper.\n\n*page_break\n\nAs he spoke, you felt a slow fire beginning to spark to life in your adventurer heart of hearts. Now this was archaeology with a capital A! The fortune and glory guaranteed upon discovering a lost cloud city in the Colombian jungle might well be worth the loss of an appendage or two.\n\nAdmittedly, though, some of those slides sent a thrill of fear up your spine. Especially the descriptions of…\n*choice\n    #…Chagas Disease.\n        Truly shudder-worthy. Kissing bugs run across your face at night, deposit their parasite-ridden poop near an orifice, and then ten or twenty years later you die of sudden heart failure from the millions of insidious parasites in your bloodstream. You wouldn't fall asleep in the jungle without a netted bug hat cinched tightly at the neck.\n        *set nasty \"kissing bugs\"\n        *set gross \"creepy-crawly\"\n        *page_break\n        *goto conference_bar \n    #…botflies.\n        Oh, parasites…in a feat of evil evolutionary genius, equatorial botflies regularly outsource the bulk of their reproductive labor to mosquitoes. Those bloodsucking Colombian vectors can pick up botfly eggs and deposit them along with their bite into the skin of mammalian hosts (that would be you).\n        \n        Got a mosquito bite? Maybe you'll come down with deadly night sweats or break-bone fever, or maybe you'll hatch a botfly from your head a few weeks down the line.\n        *set nasty \"botflies\"\n        *set gross \"egg-laying\"\n        *page_break\n        *goto conference_bar \n    #…the FARC.\n        Kidnappings, Kalashnikovs, and Killers, oh my!\n\n        Forged in the civil wars of the early twentieth century, the communist FARC forces have made the south of the country their bastion against paramilitary assault since 1964.\n\n        Politics aside, your main concern would be staying out of the crossfire.\n        *set nasty \"FARC\"\n        *set gross \"gun-toting\"\n        *page_break\n        *goto conference_bar \n    #…pit vipers.\n        Speckled Forest pit viper, Andean Forest pit viper, Chocoan lancehead? Um, yeah. You'd better buy an extra-sharp machete and a whetstone to keep its edge—sustain a bite out there in the middle of nowhere, and you'll need it to whack off your envenomed extremity in a hurry.\n        *set nasty \"pit-vipers\"\n        *set gross \"slithering\"\n        *page_break\n        *goto conference_bar\n\n\n*label conference_bar\nAfter the talk, you retired to the bar where you sat alone for hours, staring deep into your drink. From your perch on the hotel barstool that night, liquored up and far from any ${gross} ${nasty}, a field season in Colombia sounded like an adventure that just might jump-start your budding career. It would, moreover, offer a chance to stretch your legs and get your blood flowing again.\n\nLately, the caprices of university funding have bogged you down with a series of inglorious tasks. The previous year, you'd helped out with the excavation of Powhatan postholes near campus; then you found yourself mired in the salvage excavation of a historic fraternity house slated for demolition. Hardly cutting-edge stuff.\n\nTo your right at the bar, an adjacent group of Andeanists were congratulating themselves on their sexy work at sites like Machu Picchu and the floating islands of Lake Titicaca. You grew increasingly irritable. You might as well have been selling aluminum siding for all the interest anyone took in your latest projects.\n\nOne of the Andeanists looked over at you.\n\n\"Hey, ${last_name},\" ${heckler} said, \"how do you like working with ephemeral architecture up in North America? I don't think I've analyzed a posthole since I made tenure.\"\n\nYou decided ${heckler} was baiting you.\n\t\n*choice\n    #I quipped that identifying the microscopic signatures of ephemeral building materials required more intellectual prowess than counting stone blocks in a temple wall.\n        *if fortune_and_glory > 65\n\n            You reminded them that your research on postholes was getting published the following month in the [i]Journal of Archaeological Science[/i]. You couldn't remember seeing any of their names in print lately.…\n\n            Nobody had much to say after that, and you retired to your room early.\n            *set pomposity %+10\n            *set moral_compass %-5\n            *page_break\n            *goto fuck_it\n        *elseif pomposity > 65\n            They shifted uneasily in their chairs. \"When,\" you asked them, \"do you expect to see your next article in print?\"\n\n            Someone mentioned the [i]Lima Quarterly[/i].\n\n            \"Oh,\" you said, laughing, \"no, I'm sorry. I meant peer-reviewed journals. I'm afraid that regional journals and department newsletters don't count for much.\" Unable to resist another puff to your ego, you added that your article on postholes had been solicited by the [i]Journal of Archaeological Science[/i].\n\n            They looked suitably cowed, and you took your leave.\n            *set moral_compass %-10\n            *set fortune_and_glory %+10\n            *set social_networking %-5\n            *page_break\n            *goto fuck_it\n        *else\n            Having insulted your fellows and thus worn out your welcome, you retired shortly thereafter.\n            *set pomposity %+10\n            *set moral_compass %-5\n            *page_break\n            *goto fuck_it\n\t    \n    #I kept the moral high ground and lied, saying that I very much enjoyed working with ephemeral architecture. What could I say? I have a real passion for soil residue and phytoliths.\n        *if fortune_and_glory >75\n            Though admittedly not the stuff of Indiana Jones, your studies of postholes have been raising you slowly, ever so slowly, up in the academy. After all, the [i]Journal of Archaeological Research[/i] has just picked up your latest article on carbonized wood.\n\n            Always ready to up your name recognition, you plucked paper copies of your upcoming article from your bag and passed them around.\n\n            *set intelligence %+10\n            *set networking_skills %+10\n            *page_break\n            *goto fuck_it\n        *else\n            They shrugged and smiled, noting that somebody had to do that sort of work, after all. The conversation subsequently died, and you retired early, stung by their condescension.\n            *set moral_compass %+15\n            *set pomposity %+10\n            *set networking_skills %-10\n            *goto fuck_it\n    #I told ${heck} to shove it. Then I ordered another drink or five.\n        Sometime around 2 AM, the bartender told you to take your drunken self upstairs so that he could close up shop.\n        *set moral_compass %-10\n        *set blood_alcohol_level %+15\n        *set networking_skills %-20\n        *set health %-10\n        *page_break\n        *goto fuck_it\n    #I masked my insecurity behind a smile, said something witty, and bedded ${heck} later that night.\n        *if (libido > 80) or (extras = \"sex_addiction\")\n            Your prowess is legendary—you spent a long and active night in bed.\n            *set libido %+15\n            *set networking_skills %+10\n            *set risk_taker %+10\n            *set luck %+15\n            *goto fuck_it\n        *elseif cultural_fetishism > 60\n            In protest of contemporary Western cultural norms, you had stopped pruning long ago and allowed your naturally abundant body hair to grow wild and free. Turns out ${heckler} wasn't so into the shag carpet ${body_hair}, but you shrugged it off.\n\n            Hey, you can't please everyone.\n            *set cultural_fetishism %+5\n            *set networking_skills %+5\n            *set risk_taker %+15\n            *set luck %-5\n            *page_break\n            *goto fuck_it\n        *elseif fortune_and_glory > 65\n            You may not be the most charismatic person in the world, but at least your academic pedigree is enough to get you laid.\n            Though ${heckler} didn't exactly deliver the best sex of your life, you felt good about the night. When it comes to professional networking, it's all about who you know and how you know them.\n            *set libido %+10\n            *set networking_skills %+15\n            *set luck %+15\n            *set risk_taker %+15\n            *page_break\n            *goto fuck_it\n        *else\n            Once the beer goggles came off in the morning, you regretted your actions.… I mean, ${heckler}'s not even a tenured professor. You wouldn't usually stoop so low.\n            *set moral_compass %+10\n            *set social_networking %+5\n            *set risk_taker %+15\n            *set luck %-20\n            *page_break\n            *goto fuck_it\n\t     \n\t    \n\n*label fuck_it\n\nFuck it, you thought the next morning, you would beat them at their own prestige game—if a lost city of the Incas did exist in Colombia, you would find it and outshine them all!\n\nBack on campus, you threw yourself into the archives as if possessed. You searched ravenously through the online journals for every reference you could find to the City of the Clouds of Colombia. Once you'd gathered enough data to make a case, you began to write a grant proposal. For hours, you sat laboring…\n*choice\n    #On the corner barstool of the campus pub, throwing back shots of whiskey and pecking away at my laptop from the time they opened their doors until last call. My \"colleagues\" saw me sitting there each night and clapped me on the back, shaking their heads as they reveled in the evening.\n        *set blood_alcohol_level %+20\n        *set health %-10\n        *set networking_skills %+15\n        *goto grant\n    #At the local coffee shop. There, I lived on black coffee and cold turkey wraps, taking occasional breaks to refocus my bloodshot eyes on a spot thirty feet away, as my eye doctor recommended. Grant writing is hell on my vision.\n        *set blood_alcohol_level %-15\n        *set health %+10\n        *goto grant\n    #At my desk. I sat surrounded by two comforting walls of thick books on the history of civilization and the arcane cultural practices of tribal peoples and chiefdoms across the world. With a cup of tea by my side and an instant hot-water pot for quick refills, I contentedly burned the midnight oil.\n        *set blood_alcohol_level %-20\n        *set funding %+10\n        *set health %+15\n        *goto grant\n\n*label grant\nWhen you received the news that your proposal to locate the City of the Clouds had been accepted, you felt elated. You remember that day well. You checked your e-mail compulsively, and when your alarm went off at 6 AM, you reached over to silence it and then pulled your laptop over from the nightstand into your lap to stare blearily at the screen.\n\nThere it was in your inbox, subject heading \"Congratulations!\"\nBolting up in bed, you read:\n\n[i]Dear ${mister} ${last_name},[/i]\n\n[i]We are pleased to inform you that your grant proposal has been accepted and will be awarded to you in full for ten thousand dollars for summer research. The board looks forward to reading of your progress in the coming year.[/i]\n\nA happy awakening, indeed!\n\nThe letter went on, but you stopped reading it closely somewhere after the first sentence. With ten thousand dollars and a vote of confidence from the National Science Foundation, you didn't stop to read the details. The funding body would, of course, require evidence of timely progress towards publication, but that mundane concern felt a world away then.\n\nBy the way, ${first_name}, was there anyone lying with you in bed to help you celebrate the news?\n*if preference = \"women\"\n    *choice\n        #Yes, my wife.\n            *set partner \"wife\"\n            *set taken true\n            *goto partner_in_bed\n        #Yes, my girlfriend.\n            *set partner \"girlfriend\"\n            *set taken true\n            *goto partner_in_bed\n        #Yes, my mistress.\n            So that's how it is, ${first_name}, you sly dog you!\n            *set partner \"mistress\"\n            *set taken true\n            *goto partner_in_bed\n        #Yes, my domestic partner.\n            *set partner \"partner\"\n            *set taken true\n            *goto partner_in_bed\n        #Nope. Single, thanks for asking.\n            *goto supplies_needed\n*elseif preference = \"men\"\n    *choice\n        #Yes, my husband.\n            *set partner \"husband\"\n            *goto partner_in_bed\n        #Yes, my boyfriend.\n            *set partner \"boyfriend\"\n            *goto partner_in_bed\n        #Yes, my illicit lover.\n            So that's how it is, ${first_name}, you sly dog you!\n            *set partner \"lover\"\n            *goto partner_in_bed\n        #Yes, my domestic partner.\n            *set partner \"partner\"\n            *goto partner_in_bed\n        #Nope. Single, thanks for asking.\n            *set partner \"single\"\n            *goto supplies_needed\n*else\n    *choice\n        #Yes, my husband.\n            *set partner \"husband\"\n            *goto partner_in_bed\n        #Yes, my wife.\n            *set partner \"wife\"\n            *goto partner_in_bed\n        #Yes, my boyfriend.\n            *set partner \"boyfriend\"\n            *goto partner_in_bed\n        #Yes, my girlfriend.\n            *set partner \"girlfriend\"\n            *goto partner_in_bed\n        #Yes, my illicit lover.\n            So that's how it is, ${first_name}, you sly dog you!\n            *set partner \"lover\"\n            *goto partner_in_bed\n        #Yes, my domestic partner.\n            *set partner \"partner\"\n            *goto partner_in_bed\n        #Nope. Single, thanks for asking.\n            *set partner \"single\"\n            *goto supplies_needed\n\n*label partner_in_bed\nAs always, your ${partner} seemed full of mixed emotions at the prospect of your leaving for so long but didn't want to show it during your moment of glory. Instead, you earned a quickie before heading to campus.\n\nA promising start to the day!\n*page_break\n*goto supplies_needed\n\n*label supplies_needed\nOn your drive to the university, you began to tick off all of the supplies you'd need to acquire before setting off on your journey. You certainly wouldn't leave home without…\n\n*choice\n    #…my whip.\n        *if (libido > 75) or (extras = \"sex addiction\")\n            The whip has multiple uses. Sado-masochistic lovers? Jungle cats? You've got it covered.\n            *set libido %+20\n            *set ruggedness %+10\n            *set luck %+15\n            *set risk_taker %+10\n            *set secret_weapon \"whip\"\n            *page_break\n            *goto jacket\n        *elseif ruthlessness > 75\n            You purchase a cat o' nine tails. One never knows when the occasion will arise for you to mete out a good old-fashioned flogging.\n            *set ruggedness %+10\n            *set moral_compass %-10\n            *set risk_taker %+10\n            *set luck %+15\n            *set secret_weapon \"whip\"\n            *page_break\n            *goto jacket\n        *else\n            You never know when you'll need to fight off a jungle cat or swing yourself across a chasm. It's best to prepare for every eventuality.\n            *set ruggedness %+10\n            *set risk_taker %+10\n            *set luck %+15\n            *set secret_weapon \"whip\"\n            *page_break\n            *goto jacket\n    #…ten or twenty nips of single malt scotch.\n        *if blood_alcohol_level > 80\n            Good luck making that last the first week.…\n            *set blood_alcohol_level %+15\n            *set secret_weapon \"scotch\"\n            *set luck %+5\n            *set health %-10\n            *set networking_skills %-10\n            *page_break\n            *goto jacket\n        *else  \n            Employable as prestigious gifts to locals and as an emotional balm at the end of a tough field day—indispensable supplies for sure.\n            *set networking_skills %+10\n            *set blood_alcohol_level %+10\n            *set health %+10\n            *set luck %+10\n            *set secret_weapon \"scotch\"\n            *goto jacket\n    #…my moisture-wicking socks.\n        *if (libido > 75) or (extras = \"sex addiction\")\n            Who says technical socks can't be sexy? Black with silk ribbing at the ankle—yes please!\n            *set ruggedness %-15\n            *set risk_taker %-20\n            *set health %+10\n            *set luck %+10\n            *set secret_weapon \"moisture wicking socks\"\n            *page_break\n            *goto jacket\n        *else\n            Foot rot? Not happening.\n            *set ruggedness %-10\n            *set risk_taker %-20\n            *set luck %+10\n            *set secret_weapon \"moisture wicking socks\"\n            *page_break\n            *goto jacket\n\t\n*label jacket\nYes, you have your priorities in order and the field necessities secured.\n\nFor once in your life, ${first_name}, you will go to the field fully equipped and loaded up with the little extras. Among other things, you can finally afford to buy that new weatherproof jacket you've been coveting—a crucial piece for those damp nights in the forest.\n\nGear-head that you are, you've been wistfully shopping at outdoor adventure stores for weeks, searching for the perfect shell. You found one, but it comes with a formidable price tag. \n\nOf all the available colors, you've chosen one in…\n\n*choice\n    #…dusty pink.\n        A good choice. The shabby-chic vintage look will blend as [i]au courant[/i] among rural Colombians. You saw this same color at the flea market in Mexico City last year. With kidnappings on the rise these days, you want to blend in, and that means looking like you walked out of 1972.\n\n        Indeed, no detail is trivial when one prepares for an expedition of this sort. Besides, given the vagaries of archaeological funding, there's no telling when you'll have this much disposable income again.\n        *set color \"dusty pink\"\n        *set risk_taker %-5\n        *set ruggedness %-15\n        *set luck %+5\n        *set funding %-15\n        *set health %+10\n        *page_break\n        *goto gear\n    #…army green.\n        You have chosen wisely. This will help you blend in with the forest—important if you hope to escape the notice of FARC patrols.\n\n        Indeed, no detail is trivial when one prepares for an expedition of this sort. Once you leave civilization behind, there's no second-guessing your choices, no vendors selling excess techie gear on
