ct another publication from you? You know how it is: publish or perish and lose all funding.\"\n    *choice\n        #Deep breaths. So what if I have nothing to publish this year? Next year I'll go out again, and I will achieve greatness!\n            *if gold_mask\n                You go home and stare wistfully at the golden mask. Regretfully, you know that without maps and photographs, the mask proves nothing. With no documentation to support your claims, your critics would argue that you bought the mask off the black market.\n                *goto final_misfortune\n            *else\n                *goto final_misfortune\n        #A heavy wave of resentment washes over me. I've hit a breaking point; me and academia are through! I could make bank as a seller on the black market.\n            Seriously. Why write these papers for the Ivory Tower when all you want to do is get back out in the field?\n\n            *if gold_mask\n                You go home and stare wistfully at the golden mask. Regretfully, you know that without maps and photographs, the mask proves nothing. With no documentation to support your claims, your critics would argue that you bought the mask from some illicit antiquities dealer.\n                *set moral_compass %-20 \n                *goto looting_ending\n            *else\n                *set moral_compass %-20 \n                *goto looting_ending\n        #Well then. New project. Maybe something closer to home—excavating the old frat house down the way?\n            The world needs a few mysteries, after all, and with your funding cut, it seems the City of the Clouds is going to remain one for a while.\n\n            *if gold_mask\n                You go home and stare wistfully at the golden mask. Regretfully, you know that without maps and photographs to support your claims, the mask proves nothing. With no documentation, your critics would argue that you bought the mask off the black market.\n                *goto final_misfortune_mysteries\n            *else\n                *goto final_misfortune_mysteries\n\n*label final_fortune\nWithin a week, your name has been splashed across the [i]New York Times[/i] science page. \n\nYour phone rings off the hook with messages from hopeful collaborators, members of the press corps, and family and friends.\n\nThe whole world, it seems, has come together to praise your fortitude and bright academic future!\n\n*if taken = true\n    Your ${partner} meets the news of your success with a passionate embrace.\n    *goto Spielberg\n*else \n    *goto Spielberg\n\n*label Spielberg\n\n*if gold_mask = true\n    *label gold_mask\n    Tragically, within a year your health begins to fail. The doctors can't explain it.\n\n    \"Cut down at the pinnacle of a promising archaeological career,\" your colleagues say, shaking their heads sadly.\n\n    As you lie on your deathbed, you find yourself haunted by the image of that golden mask you had ashamedly hidden away at the top of your closet. \n\n    As the weeks stretch on, you find yourself unable to stay awake for more than a few hours at a time, and your sleep comes plagued by nightmares. \n\n    In your dreams you cannot move a muscle. Before you, the face of the mummy from the City of the Clouds looms, larger than life, exposed and eyeless without its golden death mask. You feel the thing's hands on your skin, dry and light as moths, running up and down your arms, over your back and neck, and you realize with mounting horror that it has begun to wrap you in its cerements, so that you may join it in a living death.\n\n    Slowly but surely, you slip into a coma, and high levels of brain activity convinces your doctors to place you on life support indefinitely. The nightmare plays on and on and on…\n\n    *page_break\n\n    Well, ${first_name}, it sure looks like you've fallen victim to a mummy's curse, but there's no shame in joining the Howard Carter Club. Soon, you'll have an eternity to reflect upon the choices that have led you here today…\n\n    Bon Voyage, ${first_name} ${last_name}. Bon Voyage.\n    *goto ending\n*else\n    Now and then you imagine that golden mask hanging on the wall above your desk, but ultimately you feel relieved to have escaped with a free conscience. \n\n    Indeed, ${first_name}, you have pulled off your mission and have done so without incurring the wrath of the archaeology gods! In fact, it appears you have their blessings. \n\n    Within the year, Steven Spielberg decides to make a movie of your trip. \n\n    John Krakauer signs on to chronicle your journey as his latest book.\n\n    Who needs an illicitly acquired golden mask when you can score royalties on a Hollywood blockbuster? It's not long before the money starts flowing in. You purchase a vacation home off the Dalmatian Coast where you can enjoy your sabbaticals by the sea. ${Men_Women} and archaeology enthusiasts throw themselves at you until you're too old to catch them.\n\n    ${first_name} ${last_name}, you have surpassed your wildest career ambitions and have won at life. May your name linger on the tongues of aspiring graduate students for years to come!\n    *goto ending \n\n*label final_fortune_mysteries\n\nI mean, here's the thing. You could publish, get famous and maybe even become fabulously wealthy, but at what cost? You sense that this fame would make you a different person, a softer and potentially less independent person. You will not sell your soul—even if it furthers science.\n\n*if taken = true\n    Your ${partner} meets the news of your refusal to publish by electing to move out of your apartment.\n    *goto burn_notes\n*else\n    *goto burn_notes\n\n*label burn_notes    \n\nYou go back to your lab and burn your field notes in a trash can.\n\nFeeling strangely relieved, you return to your desk, sit down, and begin to read the latest academic articles in search of a new research question—one that won't require the desecration of a sacred and long-lost city.\n\n*if gold_mask = true\n    *goto gold_mask\n*else\n\n    Who are you kidding? I mean, if you don't have what it takes to publish on the Cloud City, then you probably don't have what it takes to cut it in academia. \n\n    You decide to get out of the game. You clean out your lab space on campus and hop a flight back to Ecuador three weeks later, intending to give back to the people there in a real and personal way. Once on the ground, you find work in a local orphanage and never look back.\n\n    Twenty years later you begin to feel faint while playing hide-and-go-seek with the children. They find you there dead hours later, tucked into a clawfoot bathtub, the victim of sudden heart failure. Upon autopsy, they find evidence of the insidious parasite, [i]Trypanosoma cruzi[/i] in your blood and organ tissue. Another victim of tropical disease.\n\n    Well, ${first_name} ${last_name}, though your path did not lead to fortune and glory in academia, your death, that of a saintly expat, commanded enough media attention that an anonymous donor paid for the medical testing and treatment of all the children in the institution. \n\n    May karma repay you in your next life!\n    *goto ending\n\n\n*label final_fortune_almost_mysteries\n\nI mean, here's the thing. You could work hard and scrape together enough to go back another summer, publish, get famous and maybe even get rich, but at what cost?\n\nYour many brushes with death have taught you a deeper sense of self.\n\nMoney and fame would make you a different person, a softer and potentially less independent person.\n\nYou will not sell your soul—even if it furthers science.\n\n*if taken = true\n    Your ${partner} meets the news of your refusal to publish by electing to move out of your apartment.\n    *goto burn_notes2\n*else\n    *goto burn_notes2\n\n*label burn_notes2\n\nYou go back to your lab and burn your field notes in a trash can.\n\nFeeling strangely relieved, you return to your desk, sit down, and begin to read the latest academic articles in search of a new research question—one that won't require the desecration of a sacred and long-lost city.\n\n*if gold_mask = true\n    *goto gold_mask\n*else\n\n    Who are you kidding? I mean, if you don't have what it takes to publish on the Cloud City, then you probably don't have what it takes to cut it in academia. \n\n    You decide to get out of the game. You clean out your lab space on campus and hop a flight back to Ecuador three weeks later, intending to give back to the people there in a real and personal way. Once on the ground, you find work in a local orphanage and never look back.\n\n    Twenty years later you begin to feel faint while playing hide-and-go-seek with the children. They find you there dead hours later, tucked into a clawfoot bathtub, the victim of sudden heart failure. Upon autopsy, they find evidence of the insidious parasite, [i]Trypanosoma cruzi[/i] in your blood and organ tissue. Another victim of tropical disease.\n\n    Well, ${first_name} ${last_name}, though your path did not lead to fortune and glory in academia, your death, that of a saintly expat, commanded enough media attention that an anonymous donor paid for the medical testing and treatment of all the children in the institution. \n\n    May karma repay you in your next life!\n    *goto ending\n\n\n*label final_fortune_almost\n\nYou call the [i]New York Times[/i], but you lack sufficient evidence to get them hooked on the story. The National Geographic Society is similarly unimpressed.\n\n*if taken = true\n    Your ${partner}, however, is impressed enough that you get it on every day for weeks. Score!\n    *goto local_paper\n*else\n    *goto local_paper\n\n*label local_paper\n\nOne afternoon, while sitting in your office mulling over the problem of convincing the world of your discoveries, you get a call from the local paper wanting to publish your story as a human interest feature. For a year or so, you become a local celebrity, but in the end this isn't enough to satisfy your ambitions.\n\n*if gold_mask = true\n    *goto gold_mask\n*else\n\n    Driven by your desire for success, you feverishly set about writing new grant proposals, and after ten months you find yourself once again standing in line at the airport with a ticket to Quito, gateway to the mountains of southern Colombia.\n\n    May the adventure begin again!\n    *goto ending\n\n\n*label final_misfortune\n\nSo what if there's no evidence! You know what you saw!\n\n*if taken = true\n    Your ${partner}, however, believes your tale and is impressed enough that you get it on every day for weeks. Score!\n    *goto local_paper_two\n*else\n    *goto local_paper_two\n\n*label local_paper_two\n\nOne afternoon, while sitting in your office mulling over the problem of funding, you get a call from the local paper wanting to publish your story as a human interest feature. For a year or so, you become a local celebrity, but in the end this isn't enough to satisfy your career ambitions.\n\n*if gold_mask = true\n    *goto gold_mask\n*else \n\n    Driven by your desire for success, you feverishly set about writing new grant proposals, and after ten months you find yourself once again standing in line at the airport with a ticket to Quito, gateway to the mountains of southern Colombia.\n\n    May the adventure begin again!\n    *goto ending\n\n*label final_misfortune_mysteries\n\nSo what if there's no evidence! You know what you saw, and that's enough for you. I mean, here's the thing: you could work hard and scrape together enough to go back another summer, publish, get famous and maybe even get rich, but at what cost? You sense that this money would make you a different person, a softer and potentially less independent person. You will not sell your soul—even if it furthers science.\n\n*if taken = true\n\n    Your ${partner} meets the news of your refusal to publish by electing to move out of your apartment.\n    *goto burn_notes_two\n*else\n    *goto burn_notes_two\n\n*label burn_notes_two\n\nYou go back to your lab and burn your field notes in a trash can until the ashes stir up in the gentle rush of the air conditioning.\n\nYou return to your desk, sit down, and begin to read the latest academic articles in search of a new research question—one that won't require the desecration of a sacred and long-lost city.\n\n*if gold_mask = true\n    *goto gold_mask\n*else\n\n    Who are you kidding? I mean, if you don't have what it takes to publish on the Cloud City, then you probably don't have what it takes to cut it in academia. \n\n    You decide to get out of the game. You clean out your lab space on campus and hop a flight back to Ecuador three weeks later, intending to give back to the people there in a real and personal way. Once on the ground, you find work in a local orphanage and never look back.\n\n    Twenty years later you begin to feel faint while playing hide-and-go-seek with the children. They find you there dead hours later, tucked into a clawfoot bathtub, the victim of sudden heart failure. Upon autopsy, they find evidence of the insidious parasite, [i]Trypanosoma cruzi[/i] in your blood and organ tissue. Another victim of tropical disease.\n\n    Well, ${first_name} ${last_name}, though your path did not lead to fortune and glory in academia, your death, that of a saintly expat, commanded enough media attention that an anonymous donor paid for the medical testing and treatment of all the children in the institution. \n\n    May karma repay you in your next life!\n    *goto ending\n\n\n*label looting_ending\n\nYou clean out your office by the end of the day. With money from the sale of your lab equipment, you purchase a small prop plane and begin to plan your route from a small airstrip to small airstrip across Mexico, through Panama, and into South America.\n\nCutting through the rainforest with your machete, seeking out new civilizations…this is the life for you!\n\n*page_break\n*if taken = true\n    Your ${partner} meets the news of your having quit your job by electing to move out of your apartment and out of your life.\n    *goto loot_end\n*else\n    *goto loot_end\n\n*label loot_end\n\n*if gold_mask = true\n    *goto gold_mask\n*else\n    Within a month, you find yourself again surveying the thick forests of the northern Andean Cordillera, searching for and pocketing archaeological treasures to sell on the black market. Your academic expertise and reputation for care and delicacy earns you a loyal and wealthy clientele in Lima and Mexico City. They know you only as [i]El Arqueólogo[/i].\n\n    Within a few years, you retire to a large, colonial-era hacienda outside of La Paz, where you live out the rest of your days growing fat while raising horses and cultivating quinoa to feed the burgeoning health food market in the United States.\n    *goto ending\n\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]To the City of the Clouds.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "ecuador_three": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    Come back in a few minutes to play the next part of [i]To the City of the Clouds[/i]!\n\n    Or, you can buy the game now to skip the wait.\n\n    *purchase_discount adfree 2020-04-29 $4.99 $2.99 delay_purchased\n    *delay_break 1200\n\n*label delay_purchased\n\nAh, Quito, the last homely house before heading into the mountains. You stepped from the baggage claim out onto the cobblestone streets. Taxis blew by you, their rusted-out hulls coughing black puffs of exhaust. You smiled, pleased that you wouldn't see any more of this \"civilization\" for weeks.\n\nQuito seemed to hang in limbo between old and new. Elegant colonial facades from the seventeenth century contrasted with rough, Soviet-looking cement construction, from which steel cables stretched up like the stalks of dead flowers above unfinished second and third stories.\n\nIn the street you passed an old man coughing hard into his sleeve, and it occurred to you that you still hadn't purchased any anti-malarial medication. No problem. Any local [i]farmacia[/i] in Quito should have some in stock, and at prices far lower than you could get stateside.\n*choice\n        #Better to cover my medical bases. I decided to find a [i]farmacia[/i] to pick up some pills.\n                *set health %+20    \n                *goto farmacia\n        #Anti-malarials and their side effects kind of freak me out. I bypassed the [i]farmacia[/i].\n                *set health %-20\n                *goto chicha_woman\n*label farmacia\nUnfortunately, it's Sunday and most of the shops are closed. After what seemed like forever, you located an open [i]farmacia[/i]. Their anti-malarials sat out on a shelf next to the Valium. No prescriptions needed, apparently, in Quito.\n\nYou picked up the only bottle left and inspected the label: mefloquine. The label noted that one in four people may experience intense nightmares or waking hallucinations while on the drug.\n\nHmm. Not ideal.\n*choice\n        #Then again, I'd rather risk bad dreams than get malaria out in the boonies. I bought the meds.\n                You popped the bottle and dry-swallowed a chalky white tablet as you walked out the door. The thought crossed your mind to ask about the effects of mixing alcohol with mefloquine, but you'd already wandered ten blocks through the winding streets and couldn't retrace your steps. Oh well.\n                *set funding %-5\n                *set health %+15\n                *set anti_malarials true\n                *goto chicha_woman\n        #I decided not to take the pills—I'd heard some really bad stories about mefloquine-induced hallucinatons.\n                You'd rather take your chances with 100% Deet and a mosquito net.\n                *set health %-15\n                *goto chicha_woman\n\n*label chicha_woman\nContinuing on your way, you peered into shopfront after narrow shopfront crammed full of rainbow-colored packaged goods: gum, cookies, and soda, interspersed here and there with fresh fruit.\n\nTo your right, down a quiet side street, a tiny old woman sat in her doorway hawking homemade [i]chicha[/i], an alcoholic brew made from fermented quinoa. You walked over to her and saw that she served her brew in one of two rusty tomato cans.\n\nTraditionally, the [i]chincheros[/i] used their own saliva as an agent in [i]chicha[/i] fermentation.\n\n*choice\n        #Cool! I'm always up for trying new things.\n                *gosub trial_end\n                You handed her some money and she grinned a gap-toothed grin as she scooped a canful from her vat. Sediment floated on the surface of the brew. You sniffed its heady scent and touched your lips to the rim of the can, cutting through the foam, and gulped down the sweetness of the drink. Head-rush. You gave her back the can and headed off, slightly unsteady.\n                *set blood_alcohol_level %+20\n                *set ruggedness %+10\n                *set health %-5\n                *set risk_taker %+10\n                *set intelligence %+10\n                *page_break\n                *goto internet_cafe\n        #Ugh…fermented with human saliva?! No thanks.\n                *gosub trial_end\n                You smiled, nodded at her, and continued on your way. Somehow you doubted that any safety inspector had tested the bacterial levels in her brew.\n                *set blood_alcohol_level %-15\n                *set cultural_fetishism %-15\n                *set risk_taker %-15\n                *set ruggedness %-15\n                *set health %+10\n                *set intelligence %-10\n                *page_break\n                *goto internet_cafe\n        #Maybe if she poured some into my Nalgene, I could pretend it was sanitary.\n                *gosub trial_end\n                You handed her some money and she grinned a gap-toothed grin as she took your proffered bottle and dipped in into her vat. Sediment floated on the surface of the brew. You sniffed its heady scent and touched your lips to the plastic rim of your Nalgene, cutting through the foam, and gulped down the sweetness of the drink. Head-rush. You grinned and headed off slightly unsteadily on your way.\n                *set blood_alcohol_level %+15\n                *set risk_taker %+10\n                *set ruggedness %-15\n                *set health %-5\n                *set intelligence %+10\n                *page_break\n                *goto internet_cafe\n        #Wow, a real, live [i]chicha[/i] brewer! You would love to talk to her about her cultural understandings and the embodiment of her womanhood in the making of this traditional drink!\n                *gosub trial_end\n                You asked her whether she learned to make [i]chicha[/i] from her mother or grandmother.\n        \n                \"I brew the beer,\" she said, pointing to the vat.\n\n                This did not answer your question about intergenerational transmission of cultural knowledge, but you nodded to be polite. She filled the tomato can with the foamy brew and handed it to you, holding out her other hand expectantly for payment. You gave her a coin and drank up in awkward silence before shoving off again down the street.\n                *set cultural_fetishism %+20\n                *set blood_alcohol_level %+15\n                *set health %-5\n                *set intelligence %+10\t\n                *set health %-5\n                *page_break\n                *goto internet_cafe\n\n*label internet_cafe\nAfter a few minutes more of leisurely wandering about, you came upon an internet cafe and couldn't resist one last check of your e-mail.\n \nTo your surprise, you found a message from Dr. Dan Pitts-Rivers and his Ecuadorian field school.\n\nIt was anybody's guess how that drunken son of a bitch got some university to trust him running a field school in South America. Dan ranked high on the sketch-o-meter, even for an archaeologist. It was widely rumored that he propositioned a new student every season and came to lecture buzzed.\n\n*choice\n        #I disapprove of such behavior.\n                *if moral_compass > 75\n                        He fulfills all the stereotypes of the boozing, indecorous archaeologist—simply intolerable!\n                        *set moral_compass %+10\n                        *set risk_taker %-10\n                        *set networking_skills %-10\n                        *set ruthlessness %-10   \n                        *page_break\n                        *goto dan_decision\n                *elseif networking_skills > 70\n                        He kind of grosses you out, but you learned long ago to smile and nod in public—indecorous or no, he is well-published, and you're not into burning bridges.\n                        *set moral_compass %+5\n                        *set risk_taker %-5\n                        *set ruthlessness %-5\n                        *page_break\n                        *goto dan_decision\n                *else \n                        The thing about Dan is that he behaves badly and gets caught. Archaeologists have to at least maintain the appearance of decorum.\n                        *set moral_compass %+5\n                        *set risk_taker %-5\n                        *set ruthlessness %-10\n                        *page_break\n                        *goto dan_decision\n        #Hey, whatever. That's the way things work.\n                *if (libido > 75) or (extras = \"sex_addiction\")\n                        I mean, who hasn't lusted after one or two of their students? The only thing that sets Dan apart from every other archaeologist is his lack of discretion.\n                        *set moral_compass %-10\n                        *set ruthlessness %+10\n                        *page_break\n                        *goto dan_decision\n                *elseif blood_alcohol_level > 85\n                        I mean, who hasn't occasionally blacked out around the campfire and come to the site still drunk from the night before? The only thing that sets Dan apart from every other archaeologist is his lack of discretion.\n                        *set moral_compass %-10\n                        *set ruthlessness %+10\n                        *page_break\n                        *goto dan_decision\n                *else\n                        The only thing that sets Dan apart from every other archaeologist is his lack of discretion.\n                        *set moral_compass %-5\n                        *set ruthlessness %+10\n                        *page_break\n                        *goto dan_decision\n        #I admire what he can get away with.\n                *if intelligence > 70\n                        You have an uncanny knack for hiding the skeletons in your own closet. A quick brain lets you push the boundaries of decorum more than most.\n                        *set moral_compass %-15\n                        *set risk_taker %+10\n                        *set ruthlessness %+10\n                        *page_break\n                        *goto dan_decision\n                *else\n                        The man has balls, anyway. And apparently he knows how to take care of them.\n                        *set moral_compass %-10\n                        *set risk_taker %+10\n                        *set ruthlessness %+10\n                        *page_break\n                        *goto dan_decision\n\n*label dan_decision\nYou read on: hearing you were in the area, he suggested you stop by for a visit to his site on your way north. Stop by the town of Cui on market day, and he would carry you on up to the site. He promised free food, booze, and the finest sun shower on the equator.\n\nMarket day was today.\n\nHmm.\n \nYou had originally planned to travel directly from Quito to Colombia on the main road, and once there, to trek from the border into the uncharted mountains.\n\nYou consulted your GPS unit to get your bearings. Technically, it looked like Dan was on the way north, about a half-day's ride off the main road.\n\nWas this worth the delay?\n\n*choice\n        #Duh. I accepted his offer—he had me at sun shower and booze.\n                *if ruggedness \u003c 50\n                        You hated to admit it, but you'd already started to miss some of the finer points of the USA. Namely, potable hot water at your fingertips. One more warm shower, and then you'd go off it cold turkey.\n                        *set ruggedness %-10\n                        *set blood_alcohol_level %+10\n                        *set dan_site true\n                        *set networking_skills %+15\n                        *set risk_taker %+10\n                        *page_break    \n                        *goto trip_to_dans\n                *else\n                        Not that you really need any of these creature comforts, of course, but who are you to refuse such an offer?\n                        *set ruggedness %-5\n                        *set blood_alcohol_level %+5\n                        *set networking_skills %+20\n                        *set dan_site true\n                        *set risk_taker %+5\n                        *page_break\n                        *goto trip_to_dans \n        #I heard he's publishing in next month's [i]Journal of American Antiquity[/i]. Academic politics dictate that I accept his invitation.\n                *if (fortune_and_glory > 75) or (ruthlessness > 70)\n                        Though it galled you slightly that the likes of Pitt-Rivers was earning his place in the sun, you had to hand it to him—he went it alone, carved out his field site, and was now reaping the rewards for his labor. You might learn something valuable from the man.\n                        *set pomposity %+10\n                        *set networking_skills %+15\n                        *set risk_taker %+15\n                        *set dan_site true\n                        *goto trip_to_dans\n                *else \n                        Pitts-River stood above you on the academic ladder; you'd have to make an appearance to keep from ruffling his pride.\n                        *set pomposity %+5\n                        *set networking_skills %+15\n                        *set risk_taker %+5\n                        *set dan_site true\n                        *page_break\n                        *goto trip_to_dans\n\n        #No way. I didn't want to get distracted by the likes of Dan Pitts-Rivers. I stuck with my original plan to get over the border on the main road.\n                As alluring as the sun shower sounded, you had more important things to do than respond to his siren song.\n                *set blood_alcohol_level %-10\n                *set networking_skills %-15\n                *set risk_taker %-15\n                *set visit false\n                *goto trip_to_Colombia\n\n*label trip_to_dans\n\nYour decision made, you bought yourself an Inka Cola and sipped its sweet yellow nectar down as you wound your way through the streets towards the bus station.\n\nIt wasn't much to look at once you found it: a squat cement building with no staff in the ticket window. Minibuses and taxis lined the street and the back lot adjacent to the station. Young men and boys stood with one foot on the running board of the minibus, calling out to recruit riders.\n\n*choice\n        #I went straight up to a minibus filled with a seething mass of humanity and chickens—cheapest ride in town.\n                \"Where to?\" you asked the recruiter.\n                *set ruggedness %+10\n                *set risk_taker %+10\n                *goto mini_bus\n        #I found myself an official yellow cab and commissioned a private ride north.\n                The fare struck you as pricey, but reasonable enough, anyway, to secure your safety and comfort.\n                *set ruggedness %-10\n                *set funding %-15\n                *set risk_taker %-10\n                *goto taxi\n\n*label mini_bus\n\nWhat luck! The bus was heading to the village of Cui.\n\nYou boarded and situated yourself amongst an odiferous crowd of human bodies, barnyard fowl, and bagged pigs, and kept your backpack in front of you where you could keep watch over it.\n\nWith you inside, the bus had met capacity and it took off, jostling on an ancient pair of shocks down the rocky road out of town. You had standing room only, but the density of bodies was such that nobody fell farther than an inch or two in any direction when the minibus lurched and tossed its human cargo about.\n\nA few miles from your destination, the minibus overheated and came to a halt.\n\nShards!\n\nIt could take as little as half an hour or as long as four hours before the bus cooled down enough to drive on. A stoop-shouldered old man and his skinny goat began to walk along the road towards town.\n*choice\n        #I decided to wait it out with the minibus. We were getting close to Colombia, and roads along the border can be rough.\n                *set intelligence %+10 \n                *set risk_taker %-20\n                *goto wait\n        #I decided to walk along the road. If that grandpa could make the journey, how rough could it be?\n                *set intelligence %-10\n                *set risk_taker %+20\n                *goto walk\n\n*label wait\nYou got lucky. Thirty minutes later, the bus puttered back to life and you coasted the rest of the way into Cui.\n*set luck %+15\n*page_break\n*goto Cui\n\n*label walk\nA mile or so after you passed the old man and his goat, two farmboys-turned-bandits with handguns jumped out of the ditch running along the road. They couldn't have been more than fourteen.\n\nThough young, the two certainly appeared threatening, their faces worked into hard masks of malintent.\n*if camera = false\n        They demanded your money.\n        *choice\n                *if style = \"pockets\"\n                        #I reached into one of my many pockets and offered them a bag full of glass trade beads instead.\n                                After a moment of confusion, they rejected your trade bead offer, slapping the bag down to the ground where it spilled open, sending beads rolling across the road in all directions.\n\t\n                                One of them shoved his face into yours, held the gun to your head, and patted you down until he found a wad of cash (one of the many you had stashed around your body). He took it—two hundred dollars American—and the two were so pleased and bemused by your first offer of beads that they let you go on your way unharmed.\n                                *set cultural_fetishism %+15\n                                *set intelligence %-15\n                                *set pomposity %+20\n                                *goto Cui\n                #I gave them the money I had in my pockets, happy that my neck pouch remained hidden from view beneath my shirt.\n                        They took your money and shot the ground at your feet, a not-so-subtle sign for you to make your exit. You trotted off down the road, sweating bullets, and hoping your backpack was thick enough to stop any actual bullets aimed at your back.\n                        *set intelligence %+15\n                        *set risk_taker %-10\n                        *set luck %+10\n                        *goto Cui\n                #I pointed over their shoulders, and when they looked, I attempted to run away.\n                        Somewhat predictably, your plan failed. Your backpack made running too unwieldy. They tackled you almost immediately, took your pocket money, and took the money and credit card in your neck pouch, which had come loose from your shirt in the tussle. They let you go with your life, and you hurried off down the road toward Cui, somewhat short on dignity.\n                        *set risk_taker %+20\n                        *set intelligence %-20\n                        *goto Cui\n                #You lied and told them you were already robbed on the minibus. \"[i]Lo siento[/i],\" you shrugged. \"[i]No tengo ni dinero[/i].…\"\n                        Perhaps unsurprisingly, they didn't buy it. They patted you down and discovered the wad of cash you kept in your pocket as a diversion from the big bills and credit cards locked away in your neck pouch. With your money in hand, they waved you distractedly away, and you obliged them, darting off down the road.\n                        *set risk_taker %+10\n                        *set luck %+10\n                        *goto Cui\n\n*else\n        The thugs demanded your camera. You started to deny owning one before you realized it still hung in full view around your neck.\n\n        Whoops.\n        *choice\n                *if style = \"pockets\"\n                        #I reached into one of my many pockets and offered them a bag full of glass trade beads instead.\n\n                                They rejected your trade bead offer out of hand, slapping the bag down to the ground where it spilled open, its gem-like beads rolling across the road.\n\n                                One of them shoved his sour-breathed face up into yours, held the gun to your head, and lifted the camera from around your neck.\n\n                                Confident they had earned a month's wages each with that camera and undoubtedly bemused by your first offer of trade beads—thankfully they hadn't read enough post-colonial theory to feel insulted by your offer—they sent you on your way unharmed.\n                                *set cultural_fetishism %+15\n                                *set intelligence %-15\n                                *set pomposity %+20\n                                *set camera false\n                                *page_break\t\n                                *goto Cui\n\n                #I handed them a wad of cash from my pocket in an attempt to buy them off.\n                        They took your cash and your camera.\n    \n                        Well, that was maybe not your most inspired idea. Content with your valuables, they didn't shoot you, and that was something, anyway. You trotted away as fast as you thought prudent down the road and out of sight, in case they changed their minds.\n                        *set intelligence %-15\n                        *set camera false\n                        *page_break\n                        *goto Cui\n                #I dropped down to the ground, hugging my knees to my head in a protective, undignified ball around my camera.\n\n                        You heard a pregnant pause above you, and took that moment to reach into your pants pocket and hand them a fat wad of cash—two hundred American dollars—while keeping your head down to the ground.\n\n                        One of them swiped the cash from your outstretched hand with sweaty fingers.\n\n                        You listened to them discuss for a tense moment up above you, and then heard their footsteps scuff off the dirt road and into the fields beyond. You waited another moment, then got to your feet and went off down the road just as the grandpa crested the hill behind you with his goat.\n                        *set luck %+30\n                        *set risk_taker %+10\n                        *page_break\n                        *goto Cui\n                #I handed them the camera.\n                        There was no point in resisting. One man with sour breath and a blackened front tooth moved forward and lifted the camera off your neck. He backed up and inspected it with his partner in crime. They looked at you and laughed, lifting your camera in the air.\n        \n                        \"¡[i]Gracias, amigo[/i]!\" one said as they moved off into the field.\n\n                        You muttered darkly under your breath and headed down the road toward Cui, one camera lighter.\n                        *set risk_taker %-10\n                        *set camera false\n                        *page_break\t\n                        *goto Cui\n\n*label taxi\nYou swatted away all of the unsolicited offers for rides in unmarked cars as you loaded your bag into the trunk of your cab and slid onto the back seat.\n\nThe driver pulled out of the crowd pugnaciously, with much honking of his horn and shaking of his fist. Finally, the taxi pulled free of the station area and onto the main street out of town.\n\nThe front dash of the cab had a shrine to the Virgin Mary, and the back of the cab smelled like cheap cigars. You tried to unroll the window via the crank on the side door, but the crank broke off in your hand.\n\nDang it.\n*choice\n        #I hid the crank and said nothing to the driver about property damage.\n                When he heard the crack, his eyes flicked questioningly in the front-view mirror, and you smiled reassuringly at him. Nothing the matter back here…nothing at all.\n                *set moral_compass %-5\n                *goto bodies\n        #I tried to set it back into place…maybe if I just twisted it on counter-clockwise.…            \n                It barely hung on, cocked at a tell-tale angle. Maybe he wouldn't notice.\n                *set moral_compass %-5\n                *goto bodies\n        #I abashedly admitted that I had broken the crank and apologized.\n                The driver said nothing for a long time, but you could feel him seething in the front seat. You offered to have him charge you extra for the cost of repairs, and he barked that he would not do otherwise.\n\n                \"We must all pay for our mistakes!\"\n\n                That struck you as a bit dramatic…apparently the guy had a temper and seemed really attached to his window crank. Duly noted.\n\n                You reflected it would be best to mind your P's and Q's for the rest of the ride.\n                *set moral_compass %+10\n                *goto bodies\n\n*label bodies\nJudging from the sound of his hands gripping and un-gripping the steering wheel, the taxi driver had his feathers ruffled. After a bit, his eyes appeared again in the mirror, fixing you with their gaze.\n\n\"Hey,\" he said, \"you say you're an archaeologist? Do you find bodies when you dig?\"\n\nA potentially loaded question.\n*choice\n        *if (moral_compass \u003c 60) and (cultural_fetishism \u003c 50)\n                #Why censor myself? I told him about the time I accidentally put a pickaxe through a human skull.\n                        It happened that summer you spent in Turkey working at Çatalhöyük.\n\n                        *if intelligence > 70\n                                You sometimes find it exhausting to discuss the technical details of your work with the educationally disadvantaged, and so to avoid any long-winded explanations, you kept it simple: there was an axe, it collided with a skull. \"And that,\" you said, deadpan, \"was the last time anyone let me break ground at Çatalhöyük.\"\n                                *set social_networking %-15\n                                *set moral_compass %-5\n                                *page_break\n                                *goto bad_relations\n                        *else\n                                Hey, how were you supposed to know anyone was buried beneath the house floor?\n                                *set social_networking %-10\n                                *set moral_compass %-5\n                                *page_break\n                                *goto bad_relations\n                #I lied through my teeth. \"Nope. Never dug up any human bodies…exhumation always seemed so, um, disrespectful.\"\n                        Disrespectful, maybe, but also full of the goodies.\n                        *set intelligence %+10\n                        *set social_networking %+10\n                        *set moral_compass %-10\n                        *set fortune_and_glory %+10\n                        *set ruthlessness %-5\n                        *page_break    \n                        *goto ok_relations\n        *else \n                #\"Well, yes, I've encountered human remains in the past, but I've always made sure to return them respectfully to the ground. I also make sure to invite all the descendants I can locate to participate in the reburial.\"\n                        Yes, the Native American Graves Protection and Repatriation Act is very clear on its expectations for archaeologists digging in the United States, and you have followed those stipulations to a tee.\n                        *set moral_compass %+10\n                        *page_break\n                        *goto good_relations\n\n                #\"Well, no. I would never want to disturb anyone's last resting place.\"\n                        Tombstones are marked R.I.P. for a good reason. You've seen [i]Poltergeist[/i], and you definitely don't need any vengeful spirits hanging around your head!\n                        *set moral_compass %+10\n                        *set fortune_and_glory %-10\n                        *page_break\n                        *goto good_relations\n\n*label bad_relations\nLuckily, you were coming up on the outskirts of Cui, because the cab driver didn't find your story amusing in the slightest. He swerved to the side of the road in a vertical spray of dust, jumped out and ripped open your door, ordering you out of his taxi.\n\nMental note: never tell the pickaxe story to another stranger.…\n*if (blood_alcohol_level > 80) or (anti_malarials = true)\n        As you watched from the backseat, stunned, a dust devil blowing off the road engulfed your taxi driver where he stood.\n\n        When it dissipated, the man had transformed into a fearful apparition wearing an Incan tunic and a feathered headdress. He held a war club in one hand and a chicken under the crook of his arm. His body flickered as if lines of static were racing up and down through an old projection.\n\n        \"Mortal!\" he boomed in a deep baritone. \"You have no respect for the dead. Know this: if you do not change your attitude, dark things will befall you. Dark things, ${first_name} ${last_name}, dark things…\"\n\n        Though rather flummoxed by the whole apparition thing, your scientist core remained inquisitive. You asked:\n        *choice\n                #\"What about it? How do I find the City of the Clouds?\"\n                        Ever-focused on your mission of discovery. It did no good here. You received no answer.\n                        *set fortune_and_glory %+10\n                        *set intelligence %+10\n                        *goto apparition_blows_away\n                #\"Wait a second…how the hell did you do that?\"\n                        From childhood you have remained deeply skeptical of magicians. \n                        To your annoyance, you did not get an answer.\n                        *set fortune_and_glory %-10\n                        *goto apparition_blows_away\n                #\"Hey, does this mean I don't have to pay you?\"\n                        You received no answer.\n                        *set fortune_and_glory %+10\n                        *goto apparition_blows_away\n\n*else\n        \"No respect for the dead,\" he was shouting. \"Get out of my car, gravedigger! Out!\" He paused as you pushed yourself awkwardly past him, planting your feet on the dirt road. Once you had exited the cab, he lowered his voice.\n\n        \"You will not go, however,\" he said, \"before paying me what you owe in cab fare.\"\n\n        Mostly wanting to get away from this crazy, you pulled out the amount agreed upon, never mind the fact that he'd stopped well short of your destination. You asked him to open the trunk so that you could collect your backpack. He counted your money, then looked at you with a half-smile.\n\n        \"The fee to open the trunk is fifty U.S. dollars.\"\n        *choice\n                #I paid him the money from my neck pouch and let it go. I didn't want any trouble.\n                        Payment complete, you resentfully reclaimed your backpack and started on the path that led down the valley and into Cui.\n\n                        As you walked away, you heard him saying something about you walking blindly towards your doom.\n\n                        You ignored him. I mean, what a jerk!\n\n                        *set funding %-15\n                        *set risk_taker %-15\n                        *goto Cui\n                #Extortion? Not on my watch! I attacked him.\n                        Instinct kicked in. You rushed at him, and with the element of surprise you were able to knock him down and steal his keys. You popped the trunk and grabbed your bag before he'd fully recovered. You walked quickly down the road toward Cui as he cursed your name, half-expecting to take a bullet in the back.\n                        *set risk_taker %+15\n                        *goto Cui\n                #I paid him what he asked, but I also wrote down his taxi number when he turned his back so that I could lodge a complaint later with the Ecuadorian police.\n                        Satisfied that you would have the last laugh, you strolled down the valley into Cui.\n                        *set funding %-15\n                        *set risk_taker %-15\n                        *goto Cui\t\n\n*label apparition_blows_away\n\nInstead, a dust cloud rose up from the earth and both the Incan Genie and the taxi cab evaporated into thin air. You found yourself deposited on your ass in the middle of the dirt road with your backpack lying two feet behind you.…\n\nShards! That was some crazy shit. There to your left lay the broken-off arm of the window crank, which didn't make you feel any more sane as you walked toward town.\n*set premonition true\n*page_break\n*goto Cui\n\n*label ok_relations\n\nHe pulled over just on the edge of what you took to be Cui. Before you got out of the car, he turned around and leveled a finger in your face.\n*if (blood_alcohol_level >80) or (anti_malarials = true)\n\n        About that time, reality sprung a leak.\n\n        You blinked, trying to clear your vision of the impossibility unfolding before you. Your erstwhile taxi driver seemed to flicker a little bit before your eyes as he waggled his finger, as if his body were a projection afflicted by static interference. On his head perched an Incan-style headdress, exploding with the feathers of tropical birds.\n\n        \"You lie, ${first_name} ${last_name},\" the apparition pronounced. \"You have plundered many a grave and analyzed many a human femur in the name of your science. I tell you now: whatever depredations you have inflicted upon the indigenous peoples of the world, do not rob graves from this place, or dark things will befall you. Dark things…\"\n\n        Though rather flummoxed by the whole apparition thing, your scientist core remained inquisitive. You asked:\n        *choice\n                #\"What about it? How do I find the City of the Clouds?\"\n                        Ever-focused on your mission of discovery. It did no good here. You received no answer.\n                        \n                        Instead of addressing your query, it tossed the chicken in your direction, calling, \"Take this chicken—it will help you in your quest. Take it, mortal, and go!\"\n                        *set fortune_and_glory %+10\n                        *set intelligence %+10\n                        *goto apparition_blows_away_two\n                #\"Wait a second…how the hell did you do that?\"\n                        From childhood you have remained deeply skeptical of magicians. In your opinion, it's all a lot of flim-flam.\n\n                        Instead of answering your question, it tossed the chicken in your direction, calling, \"Take this chicken—it will help you in your quest. Take it, mortal, and go!\"\n                        *set fortune_and_glory %-10\n                        *goto apparition_blows_away_two\n                #\"Hey, does this mean I don't have to pay you?\"\n                        Instead of answering your question, it tossed the chicken in your direction, calling, \"Take this chicken—it will help you in your quest. Take it, mortal, and go!\"\n                        *set fortune_and_glory %+10\n                        *goto apparition_blows_away_two\n\n*else\n        The driver hauled over to the side of the road and started flipping out.\n\n        \"No respect for the dead,\" he was shouting. \"Get out of my car, gravedigger! Out!\"\n\n        He paused as you pushed yourself awkwardly past him, planting your feet on the dirt road. Once you had exited the cab, he lowered his voice.\n\n        \"You will not go, however,\" he said, \"before paying me what you owe in cab fare.\"\n\n        Mostly wanting to get away from this crazy, you pulled out the amount agreed upon, never mind the fact that he'd stopped well short of your destination. You asked him to open the trunk so that you could collect your backpack. He counted your money, then looked at you with a half-smile.\n\n        \"The fee to open the trunk is fifty U.S. dollars.\"\n        *choice\n                *if ruggedness > 75\n\n                        #Extortion? Not on my watch. I attacked him. \n                            Instinct kicked in. You rushed at him, and with the element of surprise you were able to knock him down and steal his keys. You popped the trunk and grabbed your bag before he'd fully recovered. You walked quickly down the road toward Cui while he cursed your name, half-expecting to take a bullet in the back.\n                            *set risk_taker %+15\n                            *page_break\n                            *goto Cui\n                #I paid him the money from my neck pouch and let it go. I didn't want any trouble.\n                        Payment complete, you resentfully reclaimed your backpack and started on the path that led down the valley and into Cui.\n\n                        As you walked away, you heard him saying something about you walking blindly towards your doom.\n\n                        You ignored him. I mean, what a jerk!\n \n                        *set funding %-10\n                        *set risk_taker %-15\n                        *page_break\n                        *goto Cui\n                #I paid him what he asked, but I also wrote down his taxi number when he turned his back so that I could lodge a complaint later with the Ecuadorian police.\n                        Satisfied that you would have the last laugh, you strolled down the valley into Cui.\n                        *set funding %-10\n                        *set risk_taker %-15\n                        *page_break\n                        *goto Cui\t\n\n*label apparition_blows_away_two\nWith that, the driver and the taxi cab both evaporated into thin air, and you found yourself deposited on your ass in the middle of the dirt road with your backpack lying two feet behind you. There to your left lay the broken-off arm of the window crank and a chicken, scratching dazedly around in the dust.\n\nAs you dithered in the road, the chicken darted away into the fallow field to your right.\n\n*if extras = \"birds\"\n        You let it go. Hopefully, that bird won't prove to be very important down the road. Birds freak you the hell out.\n\n        You pushed to your feet and walked dazedly down the road toward town.\n        *set premonition true\n        *page_break\n        *goto Cui        \n*else\n        Well, you thought, as anti-malarially induced psychotic episodes go, it could have been worse. That chicken probably witnessed the entire freak-out. No wonder it bolted.\n\n        You pushed to your feet, caught the chicken, roped it with a bit of peacord around its neck, and walked with it dazedly down the road toward town.\n        *set chicken true\n        *set premonition true\n        *page_break\n        *goto Cui\n\n*label good_relations  \n\nHe pulled over at the edge of what you took to be Cui.\n*if (blood_alcohol_level > 80) or (anti_malarials = true)\n\n        He gripped the back of the passenger seat, anchoring his body as he twisted around to complete your transaction. You blinked in surprise. Seemingly out of nowhere he wore a…\n\n        Was that an Incan headdress?!\n\n        His body seemed to flicker in and out before you, as if lines of static were coursing up and down from his head to his feet. Beneath his left arm he held a chicken, a scraggly bird that squirmed and kicked, looking at least as alarmed as you felt.\n\n        \"Hear me, ${first_name} ${last_name},\" he said. \"Your science is not all there is to the laws of the universe! Your true fate may be made known to you in time, but I tell you this now—you MUST NOT STEAL from the dead of the City of the Clouds or dark things will befall you!\"\n\n        Though rather flummoxed by the whole apparition thing, your scientist core remained inquisitive. You asked:\n        *choice\n                #\"What about it? How do I find the City of the Clouds?\"\n\n                        \"You will find what you seek in the heart of FARC territory,\" it replied. \"Now take this chicken. It will aid you on your quest. Take it and go!\"\n\n                        *set fortune_and_glory %+10\n                        *set intelligence %+10\n                        *goto apparition_blows_away_three\n                #\"Wait a second…how the hell did you do that?\"\n                        From childhood you have remained deeply skeptical of magicians. In your opinion, it's all a lot of flim-flam.\n\n                        The apparition did not address your query. Instead it said, \"Now take this chicken. It will aid you on your quest. Take it and go!\"\n\n                        *set fortune_and_glory %-10\n                        *goto apparition_blows_away_three\n                #\"Hey, does this mean I don't have to pay you?\"\n                        Sweet. Mo' money in your pocket.\n\n                        The apparition did not address your query. Instead it said, \"Now take this chicken. It will aid you on your quest. Take it and go!\"\n\n                        *set fortune_and_glory %+10\n                        *goto apparition_blows_away_three\n\n*else\n\n        You paid the discussed fee and asked him to open the trunk so that you could collect your backpack. He counted your money then looked at you with a half-smile. \n\n        \"The fee to open the trunk is fifty U.S. dollars.\"\n        *choice\n                *if ruggedness > 75\n                        #Hell, no. I decided to attack him.\n                                Instinct kicked in. You rushed at him, and with the element of surprise you were able to knock him down and steal his keys. You popped the trunk and grabbed your bag before he'd fully recovered. You walked quickly down the road toward Cui while he cursed your name, half-expecting to take a bullet in the back.\n                                *set risk_taker %+15\n                                *page_break\n                                *goto Cui\n\n                #I paid him the money from my neck pouch and let it go. I didn't want any trouble.\n                        Payment complete, you resentfully reclaimed your backpack and started on the path that led down the valley and into Cui. \n\n                        As you walked away, you heard him saying something about you walking blindly towards your doom. \n\n                        You ignored him. I mean, what a jerk!\n    \n                        *set funding %-10\n                        *set risk_taker %-15\n                        *page_break\n                        *goto Cui\n                #I paid him what he asked, but decided to lodge a complaint later with the Ecuadorian police.\n                        When he turned his back, you jotted down his taxi license number on the back of your hand. Satisfied that you would have the last laugh, you strolled down the valley into Cui.\n                        *set funding %-10\n                        *set risk_taker %-15\n                        *page_break\n                        *goto Cui\n \n*label apparition_blows_away_three\nWith that, the driver and the taxi cab both evaporated into thin air, and you found yourself deposited on your ass in the middle of the dirt road with your backpack lying two feet behind you. There to your left lay the broken-off arm of the window crank and a chicken, scratching dazedly around in the dust.\n\nWhile you dithered in the road, the chicken darted away into the fallow field to your right.\n\n*if extras = \"birds\"\n        You let it go. Hopefully, that bird won't prove to be very important down the road. Birds freak you the hell out. You pushed to your feet and walked dazedly down the road toward town.\n        *set premonition true\n        *page_break\n        *goto Cui        \n*else\n        Well, you thought, as anti-malarially induced psychotic episodes go, it could have been worse. That chicken probably witnessed the entire freak-out. No wonder it bolted.\n\n        You pushed to your feet, caught the chicken, roped it with a bit of peacord around its neck, and walked with it dazedly down the road toward town.\n\n        *set chicken true\n        *set premonition true\n        *page_break\n        *goto Cui\n\n\n*label Cui\n\nIn the village of Cui, market day was in full swing upon your arrival. Villagers from the surrounding mountains and valleys had all gathered into the square to sell their grains, pulses, potatoes, wool, and meat, and the whole place buzzed with color and rich, earthy smells.\n\nPigs screamed as they got stuffed into burlap sacks, and sheep followed their masters blindly to the slaughter pen where a man waited to slit their throats.\n\nYou spotted Dan at the market, haggling over a bag of potatoes. You watched as he stood up, his stringbean body unfolding to a height comical in comparison to the native Ecuadorians around him. He flapped his skinny arms about and staged the obligatory \"walk away,\" no doubt intending to go back again to bargain further, but instead he saw you, and a big grin stretched across his face.\n*choice\n        #I smiled back at him, genuinely happy to see a fellow archaeologist.\n                *set moral_compass %+5\n                *set intelligence %-10\n                *set ruggedness %-5\n                *set social_networking %+10\n                *goto greeting\n        #I forced a smile back while silently judging him.\n                *set moral_compass %-5\n                *set intelligence %+10\n                *set ruggedness %+5\n                *set social_networking %+10\n                *goto greeting\n        #Smiling too much is a sign of weakness; I wore a poker face.\n                *set moral_compass %-5\n                *set intelligence %-5\n                *set ruggedness %+10\n                *set social_networking %-10\n                *goto greeting\n\n*label greeting\n\"Why, ${last_name},\" he said, \"welcome to Cui, gateway to the soon-to-be-famous Pitts-River archaeology project.\" He closed the distance between you, clapped both hands down on your shoulders, and gave you a stiff hug, something like a push-up on your chest.\n\n\"Come on, then,\" he continued. He spoke as he walked down the dirt road, with you trailing behind. \"I'm just about done here today. You just made it for the ride in. We're all packed up le white lie to save face? \"I mean, don't get me wrong—you're hot and all,\" you said, \"but my anti-malarials have crushed my sex drive to [i]nada[/i].\"\n\n                        Colin looked disappointed but empathetic. \"Yeah,\" he said, \"I've heard that can happen. Too freakin' bad.\"\n\n                        The two of you went your separate ways for the evening, and you retired feeling proud of your resolve.\n                        *set libido %-10\n                        *set moral_compass %+10\n                        *page_break\n                        *goto morning_after\n                #I hemmed and hawed, wanting to stay in the moment for as long as possible.\n\n                        \"Look, Colin,\" you said regretfully, \"I'm not going to lie—I would love to take you back to my tent, but, uh, I don't know if it's such a good idea…you know?\"\n\n                        Sensing your weak resolve, he grabbed you by the hood of your coat and pulled you in forcefully for a kiss. Your walls crumbled on contact, and you headed back to your tent for a night of sweet love.\n                        *set libido %+15\n                        *set sweet_loving true\n                        *set moral_compass %-10\n                        *page_break\n                        *goto morning_after\n                #I stepped up onto my moral high horse, rejecting his advances in no uncertain terms.\n\n                        \"Here's the thing,\" you said. \"I don't think it's a good idea to get involved with a subordinate. It's just not professional behavior.\"\n\n                        \"Yeah, sure,\" he said with obvious irritation in his voice. \"No problem.\" After sulking for a moment in silence, he walked off.\n                        *set moral_compass %+15\n                        *set libido %-20\n                        *page_break\n                        *goto morning_after\n\n*label campfire\n*if minx_name = \"Lourdes\"\n        Her dark hair swirled around her lovely face in the wind rushing off the valleys of the northern Andes.\n\n        \"${first_name},\" she said, \"it's cold.\"\n\n        She looked at you plaintively with dark eyes, and that was all the invitation you needed. You suggested that the two of you head over to your tent and warm up under a blanket. Wrapping your arm around her slim waist and feeling the soft warmth of her hips, you led her back to your tent and steamed up the canvas all night long.\n        *set sweet_loving true\n        *page_break\n        *goto morning_after\n*elseif minx_name = \"Yooni\"\n        She put a familiar hand on your knee and asked you to explain the finer details of identifying phytolith remains recovered from ancient hearths under a scanning electron microscope.\n\n        You could see her breath come faster, puffing small, excited clouds in the cold air of the Ecuadorian night as she listened to you spout sweet, sweet science in her ear.\n\n        It didn't take long before the two of you started pawing at buttons and zippers, retiring to your tent to have your way with each other.\n        *page_break\n        *set sweet_loving true\n        *goto morning_after\n*elseif minx_name = \"Zoë\"\n        Her red hair glowed in the firelight. She twirled a strand of it around a finger and confided to you that Dan was making them all haul rocks every day like slaves.\n\n        She playfully flexed her slim bicep, and you squeezed it accommodatingly.\n\n        \"Like slaves?\" you asked, hoping to sound suggestive.\n\n        She took the bait.\n\n        \"Yup,\" she said, grinning. \"I'm used to taking commands from my superiors.\"\n\n        You ordered her back to your tent and demanded that she have her way with you all night long. Dutifully, she complied.\n\n        *set sweet_loving true\n        *page_break\n        *goto morning_after\n*elseif minx_name = \"Pontus\"\n        Pontus came up to the fire carrying a cherimoya fruit he had bought that day in the marketplace. The two of you sat for a moment in silence as he peeled the fruit with a penknife.\n\n        He asked if you'd ever had a bite of cherimoya before, and you told him no, you hadn't.\n\n        He took a bite of its white flesh, the juice running down his chin. He smiled with those dimples of his.\n\n        \"It's sweet,\" he said. A heartbeat later, you were on him, making out for a hot minute before retreating to your tent to have your way with one another in private.\n        *set sweet_loving true\n        *page_break\n        *goto morning_after\n*elseif minx_name = \"Josh\"\n        He nearly flipped you to the ground when he dropped his considerable muscle weight on the corner of the rock where you sat.\n\n        \"Whoops!\" he said, \"Sorry—sometimes I forget my size. I've bulked up quite a bit hauling rocks all over the site for Dan these last few weeks.\"\n        \n        He stood up and gave you a demonstration of his strength, lifting the boulder next to you up above his head as if it weighed next to nothing.\n \n        \"Mmm,\" you said. \"What else can you do with those arms of yours?\" He grinned, catching your meaning, and a second later you found yourself slung over his shoulders like a sack of hot potatoes. He took you to your tent and demonstrated his considerable stamina all night long.\n        *set sweet_loving true\n        *page_break \n        *goto morning_after\n*else\n\n        He placed his hand on your knee familiarly.\n\n        \"I'm surprised to see you still awake,\" he said, then smiled and added quickly, \"but I'm glad you are. We still haven't talked science.\"\n\n        As you began to regale him with the details of residue analysis techniques and new ways to identify traces of amino acids on ceramic vessels, you felt his hand move slowly up from your knee towards your thigh.\n\n        \"Wow,\" he said admiringly, \"your research is really hot right now. I bet the [i]Journal of American Antiquity[/i] is dying to publish one of your manuscripts.\"\n\n        You felt your body respond to the mention of the [i]Journal of American Antiquity[/i] almost as strongly as to the warmth of his hand on your thigh, and shortly thereafter you led your young acolyte to the confines of your tent, where you ravished him until dawn.\n        *set sweet_loving true \n        *page_break\n        *goto morning_after\n\n*label morning_after\nMorning came early.\n*choice\n        #Happily, I am a morning person.\n                *if fortune_and_glory > 65\n                        This is why you're destined for academic stardom. Not a morning passes without you writing notes or dashing off a paper abstract or two. You spent the early morning scribbling away in your notebook.\n        \n                        Unlike you, however, Dan is decidedly not a morning person.\n                        *set health %+5\n                        *set intelligence %+10\n                        *set ruggedness %+5\n                        *goto Dan_wakes_up\n                *else\n                        In the morning, you rose early and partook in your daily meditation. Reflecting upon where you've come from and where you're going helps to keep you centered.\n\n                        Unlike you, Dan is decidedly not a morning person.\n                        *set ruggedness %-5\n                        *set health %+5\n                        *goto Dan_wakes_up\n        #Unfortunately, I loathe mornings.\n                *if fortune_and_glory > 65\n                        Yes, you're nearly always up at ungodly hours with your head full of research ideas and academic papers in progress. That night, as soon as you'd closed your eyes, the ideas came flooding in.\n    \n                        Coffee sometimes helps to soften the blow the next day. You emerged in search of it, and found Dan in a similarly sorry state.\n                        *set ruggedness %+5\n                        *set intelligence %+10\n                        *set health %-5\n                        *goto Dan_wakes_up\n                *else\n                        It seems no matter what time you go to bed, you wake up exhuasted the next morning.\n\n                        Coffee sometimes helps to soften the blow the next day. You emerged in search of it and sympathized with Dan's sorry state when you saw him.\n                        *set ruggedness %+5\n                        *set health %-5\n                        *goto Dan_wakes_up\n\n*label Dan_wakes_up\nHe sat outside his shack with red-rimmed, hung-over eyes, holding a mug of coffee in both hands to ward off the chill. He hailed you.\n\n\"Hey, ${last_name},\" he said. \"You have a good time last night?\"\n\n*if sweet_loving = true\n        You studied his face before responding…just how loud were you last night?\n\n        In the end…\n        *choice\n                #…I ignored his intimations. \"Yes,\" I said, \"${minx_name} is an excellent conversationalist. A bright student, for sure!\"\n                        He grinned. \"Uh-huh,\" he said, \"sure.\" He pointed at the kitchen tent. \"Whatever, hotpants. Go get some breakfast. We start work in half an hour. Right after I puke my guts out.\"\n                        *set moral_compass %+5\n                        *set networking_skills %+5\n                        *goto excavation_work\n                #…I winked and elbowed him in the ribs. Nothing I wouldn't know about myself out here, eh?\n  \n                        He grinned back. \"Here's the thing, ${last_name}: consider this first one a freebie. No more student action for you until you find me some gold today in Unit 1. I'm getting bored with all of this utilitarian crap we keep pulling out.\"\n\n                        \"Uh, deal.\"\n\n                        \"Gold for booty, fair enough, eh?\" He pointed at the kitchen tent. \"Now go get some breakfast. We start work in half an hour. Right after I puke my guts out.\"\n                        *set moral_compass %-5\n                        *set networking_skills %+5\n                        *goto excavation_work\n\n*else\n        \"Yeah, sure. Dinner was great. Your students were all very, um, hospitable.\"\n \n        \"They are that,\" he said, winking. \"Now go get some breakfast. We start work in half an hour. Right after I puke my guts out.\"\n\n        *goto excavation_work\n\n*label excavation_work\n\nAt the excavation, Dan stood up on a rock and shouted at students and native workers to haul their buckets full of rocks off-site faster.\n\nOne of the students lay, bundled up against the wind, on the lee side of Dan's shouting rock.\n\n\"What's wrong with her?\" you asked.\n\n\"Oh,\" Dan said, \"that one might have cholera, but I don't want to waste gas on a trip to Quito until we know for sure. This project's not made of money, you know, and sometimes these kids make it out as worse than it is to get out of heavy lifting.\"\n\nThat morning…\n*choice\n        #…I kicked one of the undergraduates out of their unit and dug around all day in their place.\n                *if ruthlessness > 65\n                        Obnoxiously, you managed to find more artifacts in one day than the students had found all week. You made sure to write your initials by each find in the log book to ensure credit would go where credit was due.\n                        *set moral_compass %-10\n                        *set intelligence %+5\n                        *set fortune_and_glory %+15\n                        *page_break\n                        *goto sun_shower\n                *elseif pomposity > 65\n                        Hey, you're an expert! They probably learned a lot from watching you work.\n                        *set moral_compass %-10\n                        *set fortune_and_glory %+5\n                        *page_break\n                        *goto sun_shower\n                *else\n                        You kept your shirt tucked in to avoid the infamous \"archaeologist's crack.\" At this altitude, the sun can burn your delicate cheeks to a crisp in no time!\n                        *set health %+5\n                        *set moral_compass %-5\n                        *set ruggedness %-5\n                        *set risk_taker %-5\n                        *page_break\n                        *goto sun_shower\n\t\t \n        #…I helped the students with their heavy burdens hauling rocks.\n                *if ruggedness > 70\n                        You stripped down to a tank top and took two rock buckets at a time, while the students watched your bare shoulders in appreciative awe.\n\n                        In particular, you noticed that ${minx_name} was looking at you with undisguised admiration.\n                        *set health %-5\n                        *set risk_taker %+5\n                        *page_break\n                        *goto sun_shower\n                *else \n                        I mean, some of the students looked like Death eating a cracker. You felt compelled to lend a hand.\n                        *set moral_compass %+10\n                        *set fortune_and_glory %-5\n                        *page_break\n                        *goto sun_shower\n        #…I irritated Dan by driving the sick student to the primitive clinic in Cui.\n                You paid for the gas out of your own pocket. Diagnosis? Cholera. The clinic was prepared, as the disease is endemic this time of year. You picked up a three-day supply of doxycycline and two gallons of electrolyte-enriched water to combat dehydration, and had the student back to camp by late afternoon.\n                *set moral_compass %+15\n                *set funding %-10\n                *set social_networking %-10\n                *page_break\n                *goto sun_shower\n        #…I perused the landscape, discovering a new feature up on the next rise.\n                Dan claimed he already knew about it, but you could tell by his face he had no idea.\n\n                You rallied the students and took a vote to name it after you: The ${last_name} Site.\n\n                Has a nice ring to it.\n                *set fortune_and_glory %+15\n                *set luck %+15    \n                *page_break\n                *goto sun_shower\n\n*label sun_shower\nThat evening, you hung your sun-warmed sun shower up over a tree, draped a curtain over a branch and basked in the warm water that came raining down over your head and shoulders.\n*if sweet_loving = true\n\n        Suddenly you saw bare feet on the other side of the curtain. The curtain parted and ${minx_name} joined you for an illicit rendezvous away from camp. You enjoyed one another for the last time.\n\n        In the end…\n\n        *choice\n                #…I felt pretty good about my Ecuadorian tryst.\n                        *if risk_taker > 70\n                                The thought did cross your mind that ${minx_name} might gossip to the detriment of your reputation, but you've decided to cross that bridge when you come to it…if you come to it. As far as you're concerned, what happens in the field stays in the field.\n                                *set ruthlessness %-10\n                                *set pomposity %+5\n                                *set intelligence %-5\n                                *set moral_compass %-5\n                                *goto leave_taking\n                        *else\n                                You made sure before you left to confront ${minx_name} about keeping quiet. \"It's imperative,\" you said, \"that what happens in the field stays in the field.\"\n                                *set moral_compass %-10\n                                *set ruthlessness %+10\n                                *set intelligence %+10\n                                *goto leave_taking\n                #…I felt a twinge of regret at having taken advantage of ${minx_name}.\n                        *if pomposity > 70\n                                But then again…the opportunity to shag you was quite an honor. Once you're famous, ${minx_name} will treasure memories of your one-time intimacy. By that time, you'll be too far elevated in the academy to get taken down by rumors of past indiscretions.\n                                *set moral_compass %-5\n                                *set ruthlessness %+10\n                                *goto leave_taking\n                        *else\n                                You know it should never have happened, but it did, and it was glorious.\n                                *set moral_compass %+5\n                                *set ruthlessness %+10\n                                *goto leave_taking\n                #…I couldn't help but feel like a serious dirtbag after the fact.…\n                        *if pomposity > 70\n                                …but not for long. Your ego doesn't get too bound up in the nets of morality.\n                                *set moral_compass %-5\n                                *set ruthlessness %+10\n                                *page_break\n                                *goto leave_taking\n                        *else\n                                Regret sucks. Hopefully, what happens in the field, stays in the field, so that regret doesn't turn into shame.\n                                *set moral_compass %+5\n                                *set ruthlessness %-5\n                                *page_break\n                                *goto leave_taking \n*else \n        *goto leave_taking\n\n*label leave_taking\n\nWhen you left camp early the next morning, Dan didn't have too much to say. Frankly, you were impressed he got up to see you off at all, after all that booze he'd put away the night before!\n\n*if ego_stroking = true\n        \"Real good to have you here, ${
