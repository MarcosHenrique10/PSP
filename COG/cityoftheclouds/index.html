<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>To the City of the Clouds — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

equipment & \"a jacket\"\n\t*if color != \"empty\"\n\t\t*set equipment & \"a ${color} jacket\"\n\t*set comma true\n*if effigy\n\t*if comma\n\t\t*set equipment &\", and a\"\n\t*set equipment &\"${artifact}\"\n\t*set comma true\n*if illicit_artifact\n\t*if comma\n\t\t*set equipment &\", and a\"\n\t*set equipment &\"${artifact}\"\n\t*set comma true\n\n\n\n*comment endif\nYour Name: $!{first_name} $!{last_name}\n*line_break\nYour Gender:\n*if male\n\tMale\n*if male = false\n\tFemale\n*if hair != \"empty\"\n\t*line_break\n\tYour Hair Color: $!{hair}\n*if spirit_animal != \"empty\"\n\t*line_break\n\tYour Spirit Animal: $!{spirit_animal}\n*if nasty != \"empty\"\n\t*line_break\n\tYour Secret Fear: $!{nasty}\n*if secret_weapon!= \"empty\"\n\t*line_break\n\tYour Secret Weapon: $!{secret_weapon}\n*comment endif\n\n*if character_defined\n\tBlood Alcohol Content:\n\t*if blood_alcohol_level \u003c 25\n\t\tStone-Cold Sober\n\t\t*goto cf\n\t*elseif blood_alcohol_level \u003c= 45\n\t\tTipsy\n\t\t*goto cf\n\t*elseif blood_alcohol_level \u003c= 55\n\t\tModerately Buzzed\n\t\t*goto cf\n\t*elseif blood_alcohol_level \u003c= 75\n\t\tIntoxicated\n\t\t*goto cf\n\t*else\n\t\tBlack-Out Drunk\n\t\t*goto cf\n*else\n\t*goto equip\n\n*label cf\n*line_break\nCultural Fetishism:\n*if cultural_fetishism \u003c 25\n\tXenophobic\n\t*goto fag\n*elseif cultural_fetishism \u003c= 45\n\tEthnocentric\n\t*goto fag\n*elseif cultural_fetishism \u003c= 55\n\tCulturally Curious\n\t*goto fag\n*elseif cultural_fetishism \u003c= 75\n\tCultural Relativist\n\t*goto fag\n*else\n\tGone Native!\n\t*goto fag\n\n*label fag\n*line_break\nFortune & Glory:\n*if fortune_and_glory \u003c= 25\n\tAnonymous\n\t*goto health\n*elseif fortune_and_glory \u003c= 45\n\tPublished\n\t*goto health\n*elseif fortune_and_glory \u003c= 55\n\tWidely-Read\n\t*goto health\n*elseif fortune_and_glory \u003c= 75\n\tCanonized\n\t*goto health\n*else\n\tLiving Legend\n\t*goto health\n\t\n*label health\n*line_break\nHealth: \n*if health \u003c 25\n\tAt Death's Door\n\t*goto intelligence\n*elseif health \u003c= 45\n\tLimping Along\n\t*goto intelligence\n*elseif health \u003c= 55\n\tSound Constitution\n\t*goto intelligence\n*elseif health \u003c= 75\n\tHale and Hearty\n\t*goto intelligence\n*else\n\tRock Solid\n\t*goto intelligence\n\n*label intelligence\n*line_break\nIntelligence:\n*if intelligence \u003c= 25\n\tVillage Idiot\n\t*goto libido\n*elseif intelligence \u003c= 45\n\tAverage IQ\n\t*goto libido\n*elseif intelligence \u003c= 55\n\tKeen Intellect\n\t*goto libido\n*elseif intelligence \u003c= 75\n\tSharp As Knives\n\t*goto libido\n*else\n\tOff the Charts\n\t*goto libido\n\n*label libido\n*line_break\nLibido:\n*if libido \u003c= 25\n\tNo Pulse\n\t*goto luck\n*elseif libido \u003c= 45\n\tChaste\n\t*goto luck\n*elsif libido \u003c= 55\n\tRepressed\n\t*goto luck\n*elseif libido \u003c= 75\n\tAroused\n\t*goto luck\n*else\n\tHot and Heavy\n\t*goto luck\n\n*label luck\n*line_break\nLuck: \n*if luck \u003c= 25\n\tSnakebit\n\t*goto pomp\n*elseif luck \u003c= 45\n\tUnfortunate\n\t*goto pomp\n*elseif luck \u003c= 55\n\tBreaking Even\n\t*goto pomp\n*elseif luck \u003c 70\n\tHolding Aces\n\t*goto pomp\n*else\n\tSeredipity's Child\n\t*goto pomp\n\t\n*label pomp\n*line_break\nPomposity:\n*if pomposity \u003c= 25\n\tSubservient\n\t*goto risk\n*elseif pomposity \u003c= 45\n\tModest\n\t*goto risk\n*elseif pomposity \u003c= 55\n\tSmug\n\t*goto risk\n*elseif pomposity \u003c= 75\n\tPretentious\n\t*goto risk\n*else\n\tBraggart \n\t*goto risk\n\n*label risk\n*line_break\nRisk-Taking:\n*if risk_taker \u003c= 25\n\tPansy\n\t*goto rugged\n*elseif risk_taker \u003c= 45\n\tRisk-Averse\n\t*goto rugged\n*elseif risk_taker \u003c= 55\n\tRisk-Prone\n\t*goto rugged\n*elseif risk_taker \u003c= 75\n\tTempting Fate\n\t*goto rugged\n*else\n\tLiving on the Edge\n\t*goto rugged\n\n*label rugged\n*line_break\nRuggedness:\n*if ruggedness \u003c= 25\n\tDiva\n\t*goto ruth\n*elseif ruggedness \u003c= 45\n\tHigh Maintenance\n\t*goto ruth\n*elseif ruggedness \u003c= 55\n\tUnrefined\n\t*goto ruth\n*elseif ruggedness \u003c= 75\n\tGrizzled\n\t*goto ruth\n*else\n\tClint Eastwood\n\t*goto ruth\n\t\n*label ruth\n*line_break\nRuthlessness:\n*if ruthlessness \u003c= 25\n\tSelfless\n\t*goto sn\n*elseif ruthlessness \u003c= 45\n\tEmpathetic\n\t*goto sn\n*elseif ruthlessness \u003c= 55\n\tCooperative\n\t*goto sn\n*elseif ruthlessness \u003c= 75\n\tExploitative\n\t*goto sn\n*else\n\tCutthroat\n\t*goto sn\n\n*label sn\n*line_break\nSocial Networking:\n*if networking_skills \u003c= 25\n\tHermit\n\t*goto equip\n*elseif networking_skills \u003c= 45\n\tWallflower\n\t*goto equip\n*elseif networking_skills \u003c= 55\n\tPersonable\n\t*goto equip\n*elseif networking_skills \u003c= 75\n\tSocial Butterfly\n\t*goto equip\n*else\n\tBorn to Shmooze\n\t*goto equip\n\n*label equip\n*comment endif\n\nEquipment: $!{equipment}.", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  *if choice_is_omnibus_app or choice_is_web\n    [b]Remove Advertising and Delays[/b]\n\n    Permanently remove all ads and delays from the game.\n  *if (choice_is_omnibus_app = false) and (choice_is_web = false)\n    [b]Rest of the Game[/b]\n\n    Unlock the rest of the game, including the thrilling conclusion!\n  *purchase_discount adfree 2020-04-29 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n", "cloud_city_five": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    Come back in a few minutes to play the next part of [i]To the City of the Clouds[/i]!\n\n    Or, you can buy the game now to skip the wait.\n\n    *purchase_discount adfree 2020-04-29 $4.99 $2.99 purchased\n    *delay_break 1200\n\n*label purchased\n\nYour adrenaline pumping, you lean back against one of the damp stone walls. You need to clear your head. At this moment, your primary concern is…\n\n*choice\n    #…escaping vengeful Incan ghosts.\n        I mean, clearly spooky things are afoot in this mist. Your researcher's brain doesn't believe in ghosts, but the hair on the back of your neck sure does.\n        *set fortune_and_glory %-5\n        *set ruggedness %-10\n        *set intelligence %-10\n        *page_break\n        *goto higher_ground\n    #…avoiding booby traps.\n        With any luck, the FARC will run straight into them and set them off before you do.\n        *set fortune_and_glory %-5\n        *set ruggedness %-5\n        *page_break\n        *goto higher_ground\n    #…avoiding the FARC.\n        Whether or not they care about doing you in, they'll certainly be trigger-happy after their first encounter with death at the entrance.\n\n        You'd best steer clear.…\n        *set fortune_and_glory %-5\n        *set ruggedness %-5\n        *set intelligence %+5\n        *page_break\n        *goto higher_ground\n    #…identifying and documenting important sites.\n        Your first priority as an archaeologist is to go forth and record what you find for the sake of world heritage—bullets, booby traps, and ghosts notwithstanding.\n        *set fortune_and_glory %+10\n        *set ruggedness %+10\n        *set intelligence %+15\n        *page_break\n        *goto higher_ground\n\n\n*label higher_ground\n\nFirst things first; you can't see anything down here in the low-lying mist. Neither can the FARC, all of whom have scattered throughout the city, blind and terrified. In order to get your bearings and make a plan, you decide to climb up to higher ground. Carefully, you grope your way along the wall until it breaks at a corner. Turning into it, you find yourself on an upward-slanting road.\n\nThe road winds up and around until it ends on a brushy hillside. The occasional report of panicked gunfire and shouting from the FARC fades away below, and you keep moving upward on the dirt path. When it becomes too steep, you use the vines on either side of the trail to pull yourself ever higher towards the summit.\n\nAbruptly, you feel your hands close over the top of a stone step, and you pull yourself up and out of the damp of the clouds into a small temple bathed in sunlight.\n\nIt sits on a platform of sorts, on a mound of earth leveled out by ancient hands. On the edges of the stone steps, there are faces carved in serpentine lines. Sharp teeth jut fiercely upward over generous lips.\n\n*if camera = true\n\n    You take a few pictures of the stone faces lining the stairs and of the temple as a whole, documenting notable finds in your field journal. Then…\n    *choice\n        #…I warily step into the temple.\n            *set inside_temple true\n            *set fortune_and_glory %+15\n            *set ruggedness %+5\n            *page_break\n            *goto inside_the_temple\n\n        #…I walk around the temple, admiring its carvings and making further notes in my journal.\n            The Inca left no written language or glyphs, so you must use these carvings to tell their story.\n            *set fortune_and_glory %+5\n            *set ruggedness %-5\n            *page_break\n            *goto outside_the_temple\n\n        #…I sit down on the damp earth, exhausted, and take in the view.\n            It doesn't take long until the warm sunlight has worked its magic. Before you know it, you've reclined, and the only view you're taking in is the back of your eyelids.\n            *set fortune_and_glory %-10\n            *set ruggedness %-10\n            *page_break\n            *goto rest_outside_temple\n\n*else\n\n    You wish you still had possession of your camera.\n\n    *choice\n        #I construct a makeshift torch and step inside the temple; no guts, no glory!\n            *set inside_temple true\n            *set fortune_and_glory %+15\n            *set ruggedness %+5    \n            *page_break\n            *goto inside_the_temple\n\n        #I walk around the temple, admiring its carvings and making notes in my journal.\n            As the Inca had no written language or glyphs like the Maya, their art must speak for itself.\n            *set fortune_and_glory %+5\n            *set ruggedness %-5\n            *page_break\n            *goto outside_the_temple\n\n        #I sit down on the damp earth, exhausted, and take in the view.\n            It doesn't take long until the warm sun has worked its magic. Before you know it, you've reclined, and the only view you're taking in is the sunshine from behind your eyelids.\n            *set fortune_and_glory %-10\n            *set ruggedness %-10\n            *page_break\n            *goto rest_outside_temple\n\n*label inside_the_temple\n\nGood thing you always carry a petroleum-soaked rag in your pocket fire-starter kit! You strike up a torch.\n\nBy its flickering light, you can see that the paintings on the wall chronicle the demise of Incan civilization. You can make out men on horses wearing Spanish-style helmets. A ship with a cross on the mainsail cruises up the far wall by an altar; the conquistadors who brought down the capitol at Cusco and chased the remnants of leadership right here, to the very tip of their empire.\n\n*if chicken = true\n    You see a small cage carved from gray stone on the altar. At the bottom of the cage rest several desiccated kernels of corn. Carved in bas-relief on the wall behind it is what can only be described as a large, rangy bird.…\n\n    A chicken? Could this be what the taxi driver had in mind? You look down at your feathered friend on its peacord leash, who had covered so much ground and alerted you more than once to the presence of tarantulas and Andean vipers.\n\n    This cage is clearly for sacrifice.\n    *choice\n        #I place the bird in the cage.\n            *set moral_compass %-10\n            *set chicken false\n            *goto claimed_compass\n        #I decide to keep the bird with me.\n            You step back outside.\n            *set moral_compass %+10\n            *goto outside_the_temple\n\n*else \n    Fascinating. You linger for a few minutes to take it in before stepping outside again.\n    *page_break\n    *goto outside_the_temple\n\n*label claimed_compass\nThe chicken disappears with a strangled [i]bacaww[/i] as the cage drops down into the pedestal. A trap door behind the stone petroglyph of a chicken drops forward, revealing a silver object, round like a watch. You pick it up and see that it's an antique compass. In your expert opinion, it dates back to the sixteenth century.\n\n*if GPS = true \n\n    \"Neat,\" you think, but you're rather underwhelmed by the exchange…not very useful. I guess that Incan spirit hadn't gotten the memo on twenty-first century GPS.\n\n    A shame, really, to have sacrificed your chicken for this.\n\n    Outside, you take a moment to record a few GPS coordinates so that you can verify your location on satellite maps once you get back to civilization.\n    *set fortune_and_glory %+10\n    *set luck %+5\n    *page_break\n    *goto trek_down\n*else\n\n    Thank the gods! With no GPS, this compass could be a life-saver. You take it outside and test it against the sun. It works! You quickly triangulate your location from the mountain peaks on the horizon until you have a verifiable location for the City of the Clouds which you can plug into a satellite map back home. Who needs a GPS when you have the original way-finder?\n    *set compass true\n    *set fortune_and_glory %+15 \n    *set luck %+10\n    *page_break\n    *goto trek_down\n\n\n*label outside_the_temple\n\nThe view from the temple is quite spectacular. From this perch, you can see the Andean Cordillera stretching away to the south, its peaks bright in the sun. All sits silent.\n\nDown below, you can see only a handful of higher shrines and the tops of walls peeking out through the mist.\n\nThe thing is…\n\n*choice\n    #…I've never been very good with heights.\n        *if pomposity > 70\n            Hey, everybody has an Achilles heel, right?\n\n            True enough, ${first_name}, but you'd better pull yourself together! You need a mental map of the city, and you need it now.\n            *set ruggedness %-5\n            *page_break\n            *goto mapper\n        *else\n            Well, be that as it may, height is now your friend for the purposes of navigation. This is the best spot you could hope for to construct a mental map of the city.\n            *set ruggedness %-10\n            *set intelligence %+5\n            *page_break\n            *goto mapper\n    #…I don't much care for views, unless I have a romantic partner to share them with.\n        *if libido > 60\n            Such a hopeless romantic! Best pull yourself together, ${first_name}; you need a mental map of the city, and you need it now.\n            *set libido %+5\n            *set ruggedness %-5\n            *set ruthlessness %-5\n            *page_break\n            *goto mapper\n        *else \n            Haven't gotten lucky enough lately? Now's not the time to go all moony—pull yourself together! You need a mental map of the city, and you need it now.\n            *set libido %+10\n            *set ruggedness %-5\n            *set ruthlessness %-5\n            *page_break\n            *goto mapper\n    #…I feel like I could conquer the world up here.\n        *if libido > 75\n            Also, this would be a really hot place to get it on. You've heard that doing it at high altitudes will improve the speed and ease of, uh, reaching your \"summit.\"\n\n            As enticing as that sounds, ${first_name}, best to pull yourself together! You need a mental map of the city, and you need it now.\n            *set libido %+10\n            *set risk_taker %+5\n            *set ruggedness %+5\n            *page_break\n            *goto mapper\n        *else\n            Nothing like a difficult ascent to make you feel alive! Reminds you of the second time you summited Everest.…\n\n            Best pull your head out of the clouds, ${first_name}—you need a mental map of the city, and you need it now.\n            *set ruggedness %+10\n            *set pomposity %+15\n            *page_break\n            *goto mapper\n\n*label mapper\n\nSurveying the lay of the land, you suspect that the outlying forested areas will yield archaeological evidence of a village sprawl far beyond the city walls. The laborers who built this place would have made their humble living in the shadows of their ritual city.\n\nIt's hard to contain yourself. The excavation potential here could fill hundreds of dissertations and thousands of peer-reviewed articles.\n\nCongratulations, ${first_name}, it looks like you've hit the research jackpot!\n\n*if GPS = true\n\n    You're pleased to discover that you enjoy excellent satellite reception this high up. You take out your GPS and record a few coordinates so that you can verify your location once you return to civilization.\n    *set fortune_and_glory %+10\n    *page_break\n    *goto trek_down\n\n*else\n    You attempt with tenuous success to memorize the placement of the mountains around you, so that you can find this place later on a satellite map. If only you hadn't lost your GPS unit.… \n\n    Next season, you plan to stash it down your pants for safekeeping.\n    *set fortune_and_glory %-10\n    *page_break\n    *goto trek_down\n\n*label rest_outside_temple\n\nYou soak in the sunlight like a lizard for an hour or so.\n\nWhen you sit up, refreshed, you look out on the horizon. To the south stretches the Andean Cordillera, protruding up through a cloud bank. Down below, you can see only a handful of higher shrines and the tops of walls peeking out through the mist. All sits silent.\n\n*if GPS = true\n    The satellite reception up here should be second to none. You take out your GPS and record a few coordinates so that you can verify your location on your satellite maps once you return to civilization.\n    *set fortune_and_glory %+10\n    *set health %+10\n    *page_break\n    *goto trek_down\n\n*else\n\n    You attempt with minimal success to memorize the placement of the mountains around you, so that you can find this place later on a satellite map. If only you hadn't lost your GPS unit.…\n\n    Next season, you plan to stash it down your pants for safekeeping.\n    *set fortune_and_glory %-10\n    *set health %+10\n    *page_break\n    *goto trek_down\n \n\n*label trek_down\nAs the afternoon wanes, the mist parts for a few precious minutes. You can see that the city below follows the standard radial Incan pattern, its streets leading out like the spokes of a wheel around the center plaza.\n\nIn the center of the plaza lies the main temple, and you know that within those walls you will find the bones of Incan royalty.\n\nThis is where you're headed.\n\nYou pick your way back down the roadway as quickly as you can. When you feel the road flatten out beneath your feet, you slow down. Almost immediately, you bump into a startled group of three FARC soldiers.\n\nFor a moment, you just stare at one another.\n\n*if gun = true\n    So, ${first_name}, have you ever killed anybody before?\n    *choice\n        #Only when warranted…\n            *if (ruggedness \u003c 65) and (risk_taker \u003c 65)\n                And by warranted, you mean during [i]World of Warcraft[/i].\n                *set ruggedness %-5\n                *goto temple\n            *else\n                *set ruggedness %+5\n                *goto gun_violence\n        #One? I've killed at least five…\n            *if (ruggedness \u003c 65) and (risk_taker \u003c 65)\n                …on [i]World of Warcraft[/i].\n                *set ruggedness %-5\n                *goto temple\n            *else\n                *set moral_compass %-10\n                *set ruggedness %+5\n                *goto gun_violence\n        #Do you mean, like, killed them in bed?\n            Heck, yes—you incapacitate your lovers every time!\n\n            Right now, though, your skills don't seem particularly relevant—you bolt for the temple!\n            *set libido %+15\n            *goto temple\n        #No…and I'm not about to start now.\n            You bolt for the temple!\n            *set ruggedness %-10\n            *set moral_compass %+10\n            *goto temple \n\n*else \n    Nobody moves, and then…\n    *choice\n        #…I bolt towards the temple.\n            *if luck > 65\n                Hey, everyone loses their nerve sometimes. No biggie.\n\n                Nobody follows you. Unsurprisingly, they're less interested in your capture than in getting the heck out of this death trap of a city in which they've lost their way and many of their compatriots.\n                *set luck %+10\n                *set ruggedness %-10\n                *goto temple\n            *else\n                As you move away, you hear the sharp report of gunfire and feel a sting in your left shoulder. Grazed by a bullet! You run faster than you ever have before towards the shelter of the temple, but they don't waste any more ammo on the likes of you.\n                *set health %-15\n                *set luck %-10\n                *set intelligence %-5\n                *goto temple\n\n        #…I attempt to trade information for my safety.\n            *if ring = true\n                You see Nestor standing among the men. You take Esteban's ring from your pocket and toss it to him.\n\n                \"This,\" you say quickly, \"is from your brother. I befriended him in Mexico City, and he asked that I find you to let you know that he's alive and well. He also said that you would help me if I was in need of helping.\"\n\n                Nestor motions for everyone to lower their weapons. He stares at the ring and then back at you.\n\n                \"[i]Gringo[/i],\" he sayss slowly, \"[i]vaya con Díos[/i].\"\n\n                You point them south towards the gate, and they turn and move to leave.\n                *set health %+10\n                *set luck %+10\n                *set social_networking %+10\n                *goto temple\n\n            *else\n                *if luck > 65\n  \n                    \"Hey,\" you say, hands in the air, \"don't shoot! I can tell you how to get out of here. You will find the exit due south. Take the south road out.\"\n\n                    After a moment of silence, the FARC relax and lower their guns.\n\n                    \"I believe that you tell the truth,\" Nestor says. \"We will perhaps meet in the next life.\"\n                    *set social_networking %+10\n                    *set intelligence %+10\n                    *set luck %+5\n                    *page_break\n                    *goto temple\n\n                *else\n        \n                    \"Hey,\" you say, hands in the air, \"don't shoot! I can tell you how to get out of here. You will find the exit due south. Take the south out.\"\n\n                    \"I am sorry,\" Nestor says, raising his gun, \"but you had your chance to escape. If [i]el jefe[/i] discovers I have let you live, I am a dead man.\"\n\n                    Shocked that he would betray your good will, you turn and make a break for it into the mist. A bullet whines past your shoulder, but Nestor doesn't waste more than one or two bullets on the likes of you.\n\n                    You reach the temple unscathed.\n                    *set social_networking %-10\n                    *set luck %-10\n                    *page_break\n                    *goto temple\n\n        #…I wave casually and continue on my way.\n            *if luck > 65\n                Amazing! They just let you go. Your luck holds, ${first_name}, your luck holds.\n                *set luck %+10\n                *set intelligence %-5\n                *goto temple\n            *else\n                As you move away, you hear the sharp report of gunfire and feel a sting in your left shoulder. Grazed by a bullet! You run faster than you ever have before towards the shelter of the temple, but they don't waste any more ammo on the likes of you.\n                *set health %-15\n                *set luck %-10\n                *set intelligence %-5\n                *goto temple\n  \n\n\n*label gun_violence\nYou level your gun at the ragged-looking group and they surrender immediately, holding up their hands and retreating back into the mist. All except Nestor. He keeps moving towards you.\n\nHe doesn't think you have the guts.\n\n*choice\n    #He's right. I don't. I drop the AK-47 and bolt for the temple.\n        Hey, everyone loses their nerve sometimes. No biggie.\n        *set moral_compass %+5\n        *set ruggedness %-10\n        *goto temple\n    #I fire a warning shot into the air.\n        He stops at the sound and shakes his head as if clearing it of sleep.\n\n        The two of you lock eyes. Seeing your resolve, he backs away slowly, and you wonder whether you've seen the last of him.\n        *set moral_compass %+5\n        *set ruggedness %+10\n        *goto temple\n    #I bluff, sighting my AK-47 on his head.\n        He calls your bluff and keeps marching forward, drawing a knife.\n\n        You don't know if your finger slipped or if you really pulled the trigger.\n\n        Part of you supposes it doesn't matter.\n\n        His body crumples to the ground, and you hear the sound of the gun for days afterward.\n        *set moral_compass %-5\n        *set ruggedness %+5\n        *goto temple\n    #I am deadly serious. I sight my AK-47 between his eyes and dare him to come closer.\n        He keeps coming. You shoot him at point-blank range.\n\n        Without a blink, you tuck the gun under your arm and trot off towards the temple.\n        \n        The others will have heard the shot. No one else is likely to get in your way.\n        *set moral_compass %-10\n        *set ruggedness %+15\n        *goto temple\n*label temple\n\nYou climb several low steps and enter the temple through a narrow doorway into the darkness beyond.\n\nIt takes a moment for your eyes to adjust to the dim light. One man, whom you recognize from the day's march, lays prone and dead next to a mummy, still wrapped in its cerements, curled and dry beside him in a fetal position.\n*choice\n    #I shake my head. Amateur. He fell for the old poison dart trap!\n        Just as quickly as you think it, your instincts tell you to duck!\n        *if luck \u003c 40\n            You feel it hiss past you, skimming your shoulder lightly. You can feel the burn of the poison where it scraped your skin. You begin to feel a bit light-headed, but you know that such a small amount won't be enough to kill you…only enough to dull your brain.\n            *set intelligence %-20\n            *set pomposity %-20\n            *set health %-20\n            *goto tombapproach\n        *else\n            Just in time—you hear the dart whine through the air above you.\n\n            Whew! That was close.\n            *set pomposity %+15\n            *set fortune_and_glory %+10\n            *set moral_compass %-10\n            *set ruggedness %+10\n            *goto tombapproach\n    #Clearly, desecrating graves is a risky occupation, and right now I can't remember why exactly I chose this way to make a living.\n        *set fortune_and_glory %-10\n        *set ruggedness %-10\n        *goto tombapproach\n    #All of this death and desecration business makes me feel somehow dirty and desperate. Armchair archaeology sounds pretty good right about now.\n        *set ruggedness %-15\n        *set moral_compass %+10\n        *set fortune_and_glory %-10\n        *goto tombapproach\n\n*label tombapproach\n*page_break\n\nThe dead man lies not far from a narrow chamber cut into a side wall—the entrance to a tomb. To enter, you must crawl through the low doorway on your knees.\n*if camera = true\n\n    Before entering the tomb, you document the scene before you, taking photographs of the burial chamber, the mummy, and its ransacker.\n    *goto mummy_decision\n\n*else \n\n    Before entering the tomb, you indulge in a moment of self-pity.\n\n    Alas, you have no camera to document all of this for your funding body.\n\n    A photo of a dead looter would have really spiced up a slideshow presentation of your summer fieldwork.…\n    *goto mummy_decision\n\n*label mummy_decision\n*page_break\n\nYour first thought when you inspect the mummy lying on the ground next to the dead man is:\n*choice\n    *if moral_compass > 75\n        #Shards! So much data lost! Still, though, this looter might have had a family to feed.\n\n            Right and wrong so often slide into shades of gray.…\n\n            You wring your hands and stand in place for a moment, contemplating how, once disturbed, the archaeological context of this mummy cannot be recovered any more than this man can be brought back to life.\n\n            On your hands and knees and with tears in your eyes over the many wrongs of this world, you crawl into the tomb.\n            *set fortune_and_glory %+5\n            *set moral_compass %+20\n            *set ruggedness %-10\n            *page_break\n            *goto tomb\n        #Ugh. What disrespect shown to the Incan dead!\n            Though tempted, you would never be reduced to grave-robbing for profit—at least, not without proper archaeological documentation.\n\n            Snatching that mummy from its grave has silenced some of its story forever.\n            *set fortune_and_glory %+5\n            *set moral_compass %+10\n            *page_break\n            *goto tomb\n    *else\n        #Shards! So much data lost! Still, though, this man might have had a family to feed back home.\n\n            Right and wrong so often slide into shades of gray.…\n\n            You wring your hands and stand in place for a moment, contemplating how, once disturbed, the archaeological context of this mummy cannot be recovered any more than this man can be brought back to life. On your hands and knees and with tears in your eyes over the many wrongs of this world, you crawl into the tomb.\n            *set fortune_and_glory %+5\n            *set moral_compass %+15\n            *set ruggedness %-10\n            *page_break\n            *goto tomb\n        #Ugh! What disrespect shown to the Incan dead!\n            Though tempted, you would never be reduced to grave-robbing with the intention of profit—at least, not without proper archaeological documentation.\n\n            Snatching this body from its grave has silenced some of its story forever.\n            *set fortune_and_glory %+5\n            *set moral_compass %+10\n            *page_break\n            *goto tomb\n\n        #Sweet! A few X-rays and MRIs of this, the first royally entombed mummy ever discovered, will secure my place on the world archaeological stage.\n            Indeed. Thanks to the conquistadors having burned every single royal mummy they could get their hands on, archaeologists have heretofore only had access to the unintentionally mummified remains of commoners: naturally freeze-dried sacrifices plucked from their high-altitude shrines.\n            *set fortune_and_glory %+15\n            *set moral_compass %+5\n            *page_break\n            *goto tomb\n        #This isn't safe. I shouldn't be here. I think I need to leave now. I'm going to leave now.\n            Seeing men killed for the sin of disturbing the dead has put you on edge as an archaeologist—booby traps don't split hairs over intentions.\n\n            You don't waste any time before backing out of the tomb.\n\n            The place reeks of death.\n            *set fortune_and_glory %-20\n            *set health %+15\n            *page_break\n            *goto get_out_of_here\n\n\n*label tomb\n\nInside the tomb, you find a wall with three alcoves dug out of the stone. Two contain mummies.\n\nIn the semi-darkness, you find more dead FARC with your feet. Lighting a match, you see that one of the dead men holds a mask of thinly hammered gold, wide-cheeked and smiling.\n\nYou pull it gently from his dead fingers and hold it up to catch the light.\n*choice\n  #I wonder how this would look on my wall at home.\n    Oh, really? Wondering is one thing, ${first_name}, but what do you do?\n    *choice\n      #I decide to take it, of course.\n        You realize that maintaining the facade of professional ethics will prevent you from revealing this mask to anyone for personal prestige or professional gain. Taking this mask is tantamount to looting…and haven't you earned a little loot? A little golden souvenir? Damn straight.\n        *set moral_compass %-15\n        *set luck %-20\n        *set pomposity %+15\n        *set gold_mask true\n        *goto vision \n      #However good it might look, I cannot in good conscience take it.\n        A surge of relief washes over you when you replace the mask in one of the wall niches and step away.\n        *set moral_compass %+15\n        *set pomposity %-15\n        *set luck %+20\n        *goto vision\n  #I imagine how this would look under museum glass with my name on a plaque beside it.\n    Imagining is one thing, ${first_name}, but what do you do?\n    *choice\n      #To keep this mask out of the hands of looters, I slip it into my shirt.\n        Unfortunately, UNESCO's World Heritage guidelines forbid unprovenanced acquisitions these days, and no respected institution would accept this artifact without a paper trail for authentication.\n\n        Maintaining the facade of professional ethics these days will prevent you from revealing this mask to anyone for personal prestige or professional gain. Taking this mask is tantamount to looting…and haven't you earned a little loot? A little golden souvenir? Damn straight.\n        *set moral_compass %+5\n        *set pomposity %+10\n        *set luck %-20\n        *set gold_mask true\n        *page_break\n        *goto vision\n      #I look around the tomb and replace the mask over the face of one of the mummies in a wall niche.\n        A surge of relief washes over you when you replace the mask and step away. Even if you had taken it, and even if you had managed to smuggle it out of the country without a permit, you would have broken countless codes of archaeological ethics in the process. Rather than show it off, you would have had to hide that mask away forever or risk tarnishing your professional reputation.\n        *set moral_compass %+10\n        *set pomposity %-10\n        *set luck %+20\n        *page_break\n        *goto vision\n\n*label vision\n\n*if (anti_malarials = true) \n\n    All at once, the room begins to spin, and you receive a vision:\n\n    It is a festival day in ancient times, and all the Inca people of this city have come to watch the mummified bodies of their dead kings paraded around the plaza on the shoulders of their descendents.\n\n    As you watch, one of the mummies wearing a brightly colored feathered headdress comes to life. The men carrying him don't seem to notice the new weight that presses down harder and harder on their shoulders as mummy becomes man.\n\n    The King levels his hand towards you.\n\n    Drums around the plaza keep pace with your own heartbeat. \"Hear me, ${first_name} ${last_name},\" he says in a booming voice. \"You must not disturb the dead here. Do so, and you will face what consequences our spirits can rain down upon your head.\"\n    *page_break\n\n    You come to with a start.\n\n    What in the name of Flinders Petrie was that?!\n    *goto get_out_of_here \n           \n\n*else\n    *goto get_out_of_here\n\n*label get_out_of_here  \n\nA long shiver travels up your spine. You can feel it's time to jet. You had envisioned spending another day or three or four exploring the mysteries of the City of the Clouds, but then you hadn't counted on sharing the place with FARC soldiers, booby traps, and vengeful Inca spirits.\n\nStepping over the dead bodies of the FARC, you reflect that one can only cheat Death for so long. Moreover, you'll be back again next season, trowel in hand!\n\n*if camera = true\n\n    Once you make it out of the temple, you can't resist taking one last photograph of its facade, but in the gathering mist it's nearly impossible to get a clear image.\n    *goto leaving_city\n\n*else \n    *goto leaving_city\n\n*label leaving_city\n\nBoth your nerves and your growling stomach urge you to get a move on.\n\nKeeping as straight as you can, you make a direct line for the south gate through which you entered.\n\n*if gold_mask = true\n\n    You hear a low rumbling emanating from the city walls as you approach the ancient gate, and you note with alarm that its megalithic architecture has begun to shake, rocking on its foundations.\n\n    What is this? An Indiana Jones flick?\n    \n    Fearful that you're about to be locked in forever, you…\n    *choice\n        #…ditch the mask as I run for my life.\n            You make it out, but just barely. The stone blocks crash down behind you. Getting back in, if you ever make it back here, will certainly present a challenge for your excavation team.\n            *set risk_taker %-10\n            *set gold_mask false\n            *goto out_to_freedom\n        #…keep the mask and run for my life.\n            *if ((luck \u003c 50) and (ruggedness \u003c 50)) or ((health \u003c 50) and (ruggedness \u003c 50))\n                In your haste, you forget to look down as you run.\n\n                The ground drops out from under you.\n\n                As you fall down into the darkness, time slows down. You hold the golden mask in your hands and wonder whether you're paying the ultimate price for your greed. You have your answer a moment later when a shaft of light from up above you reflects off the mask and illuminates the rapidly approaching thicket of spikes below.\n\n                Ah well, you think. It's been a good ride.\n                *goto_scene denouement_six ending\n            *else \n                You barely make it out before the stone blocks of the gate crash down behind you. In your head, you hear a voice issuing a curse upon you and your family for seven generations.\n                *if anti_malarials = true\n\n                    Whatever. You chalk it up to your anti-malarials.\n                    *goto real_curse\n                *else\n                    *goto real_curse\n*else \n    *goto out_to_freedom\n\n*label real_curse\n\nThe real curse is going to be getting through all this rubble and back into the city with an excavation team next year!\n\nYou place a hand on the back of your head, and it comes away bloody. With all that adrenaline, you didn't even feel the stone that clipped you!\n  \nYou run on.\n*set risk_taker %+10\n*set health %-10\n*goto out_to_freedom\n\n*label out_to_freedom\n\n*finish\n", "denouement_six": "You may have escaped the City of the Clouds, but instinct tells you to keep moving into the thicket of forest beyond. You run for a long time before your legs buckle, and you fall to your knees in exhaustion.\n\n*if (GPS = true) or ((camera = true) or (compass = true))\n\n    Though tired, you feel exhilarated at having gathered evidence of this mythical Incan site, complete with documentation to prove it. Now you must survive long enough to bring your data back home and secure your name a place in the archaeological canon.\n    *goto calm_woods\n\n*else\n    Though exhilarated at having proved to yourself the existence of the City of the Clouds, not to mention having set foot inside the silent halls of its temples and streets, you have no strong evidence for having done so without your GPS or camera. Your career hangs in the balance of your memory, your powers of persuasion, and your ability to secure funding for another year's project.\n\n    You run over and over the details of the city's location and layout in your mind, but it seems to slip in and out of focus.\n    *goto where_to\n\n*label calm_woods\n\nThe calm of the woods wraps you in its folds, and you begin to feel…\n*choice\n    #…edgy. The silence might well be hiding something. Like a jaguar.\n        Your eyes dart across the sun-dappled foliage, tracking for movement.\n        *if secret_weapon = \"whip\"\n            In your peripheral vision, you see a jaguar uncoil from its crouch in the branches above you.\n\n            *if ruggedness > 65\n                Fast as lightning, you grasp the whip at your belt and crack it above your head.\n\n                The beast leaps past you and whomps to the ground. One more crack from your whip sends the big cat flying off into the trees.\n\n                Nice work!\n                *set intelligence %+10\n                *set ruggedness %+10\n                *goto where_to\n  \n            *else\n                You know that you should use your whip to fight the beast off, but you cannot seem to move under the weight of its yellow eyes. At the last second, you duck and remember to crack the whip behind you.\n\n                Stung on the nose, the big cat regards you grumpily for a moment before padding off.\n                *set ruggedness %-10\n                *page_break\n                *goto where_to\n \n        *else\n            Everything stays still…almost too still. You shake your head as if to rid yourself of unease.\n            *set intelligence %+10\n            *set ruggedness %-5\n            *goto where_to\n    #…sleepy. Evening is upon me anyhow. A little extra sleep isn't going to hurt anything.\n        *if nasty = \"kissing bugs\"\n            You cinch your netted hat tightly about your head to keep out any parasite-laden bugs and fall into a deeply restful sleep.\n            *set health %+15\n            *set intelligence %+10\n            *goto where_to\n        *else\n            You lie down for some period of time before waking up to something crawling on your face.\n\n            Gah! You brush it off with a shudder and look closely at its brown body.\n            \n            A kissing bug! Shards! It may have already infected you with Chagas Disease, placing you at risk for sudden heart failure in a decade or two.\n\n            Hopefully, you remembered to pay your health insurance bill before you left home.…\n            *set intelligence %-10\n            *set health %-10\n            *goto where_to\n    #…relaxed and confident. In this silence, I can collect my thoughts and plot my way out of this place and back to modern civilization.\n        *set intelligence %+10\n        *set ruggedness %+5\n        *goto where_to\n\n*label where_to\n\nThe next morning, you wake with the sun.\n\nNow the race against time begins: you have only three granola bars and one beer left at the bottom of your pack. You'll have to be smart to stave off starvation and dehydration.\n*choice\n    #I decide to eat a granola bar immediately.\n        You're confident that you'll make it back to civilization sooner rather than later. It's best to start out strong.\n        *set intelligence %+5\n        *set health %+10\n        *set risk_taker %+10\n        *goto compass_query\n    #I decide to drink the beer immediately.\n        *if blood_alcohol_level > 75\n            Well, you can certainly hold your liquor…let's see if you can hold your water in after a diuretic.\n            *set health %-10\n            *set blood_alcohol_level %+10\n            *set intelligence %-10\n            *page_break\n            *goto compass_query\n        *else\n            Hell, you've had quite an ordeal, after all. Who can blame you for needing a drink? Dehydration? Meh.\n            *set blood_alcohol_level %+10\n            *set health %-10\n            *set intelligence %-10\n            *page_break\n            *goto compass_query\n    #I decide to ration. I limit myself to half a granola bar. The beer I'll drink at the end of the road.\n        *set intelligence %+10\n        *set health %+5\n        *set risk_taker %-10\n        *goto compass_query\n    #I decide to save my food and bevvie for later—first, I intend to try my luck at scavenging for native food sources.\n        *if cultural_fetishism > 60\n            You quickly look around and discover a host of oily-fruits rich in anti-oxidants and amino acids. You bless the native gods of the wood for their assistance, as is customary, and then you gorge until you can't eat any more.\n            *set intelligence %+10\n            *set health %+20\n            *set cultural_fetishism %+15\n            *set risk_taker %+10\n            *goto compass_query\n        *else\n            You wander around for a few minutes, but you can't properly identify anything edible, and all you get for your troubles is a fistful of thorns. Disheartened, you sit down and drink your beer.\n            *set blood_alcohol_level %+10\n            *set intelligence %-10\n            *set health %-10\n            *set cultural_fetishism %+5\n            *set risk_taker %+10\n            *page_break\n            *goto compass_query\n\n\n*label compass_query\n\n*if GPS = true \n    Your next order of business is way-finding. You take out your GPS device and begin to look for a signal. Satellite pickup is weak down beneath the canopy, but after a moment it locks on to three, enough to roughly triangulate your position. Traveling west will put you on the coast, which looks to be your fastest shot at reaching civilization.\n\n    Although the rough terrain will slow your travel time, you think you should be able to make it there within three days if you push hard enough.\n    *set luck %+5\n    *set direction \"west\"\n    *page_break\n    *goto compass_west\n\n*elseif compass = true\n    Your next order of business is way-finding. To use your compass, you're going to have to shimmy up one of these trees and pick some points on the horizon. You find a thick-trunked tree pocked and lined with deep wrinkles and begin to move up its body towards the sky.\n\n    You startle several monkeys, who disperse into the greenery around you with a hoot and a curl of tail. By the time you poke your head through the canopy, you're able to find your way by identifying several points on the horizon where the Andes mountains climb up higher than the surrounding area. You can't tell which distance is closer—the coast or the southern border of Colombia into Ecuador. With limited food and drink left in your pack, your decision could mean life or death.\n    *choice\n        #I decide to move south.\n            *set direction \"south\"\n            *goto compass_south\n        #I decide to move west towards the coast.\n            *set direction \"west\"\n            *goto compass_west\n*else\n    Your next order of business is way-finding. In the absence of your GPS unit, you have only the sun to chart your course. You find a thick-trunked tree pocked and lined with deep wrinkles and begin to move up its body towards the sky.\n\n    You startle several monkeys, who disperse into the greenery around you with hoots of alarm. Once up top, you locate the direction of the late afternoon sun. You cannot tell which distance is closer—the coast or the southern border of Colombia into Ecuador. Given your low supply levels, you understand that this decision could mean life or death.\n    *choice\n        #I decide to move south.\n            *set direction \"south\"\n            *set health %-5\n            *goto compass_south\n        #I decide to move west.\n            *set direction \"west\"\n            *set health %-5\n            *goto compass_west\n\n*label compass_west\n\nAfter a full day of travel on very little food and what water you can suck from the pools and crannies in lianas and palms, you begin to feel a bit unsteady on your feet. You find yourself stopping to rest more and more often.\n\n*if (health \u003c 30) or (anti_malarials = false)\n\n    Well, it was bound to happen with you running yourself ragged. You feel a fever coming on.\n\n    Your forehead beads with sweat, and you have to stop early for the day.\n\n    As you shrug off your pack and lean against it, you hope this isn't the onset of malaria, but you suspect that your luck may have just run out.\n\n    After a fitful night of sweats and passing delirium, you feel slightly better in the morning. Then you remember that your food and water have run dangerously low.\n\n    You must gamble with your life yet again—do you push yourself on, and if so, how?\n    *choice\n        #I push to my feet and press on through the low country, unable to muster the strength to ascend to higher ground.\n\n            You trust you'll be able to keep your course fixed in a westerly direction.\n    \n            Your fever may have clouded your judgement, but it seems better to pick a direction and try to escape this thicket than stay where you are with no hope of rescue.\n\n            You cross and uncross your fingers for luck as you walk.\n\n            By mid-afternoon, your fever has returned full throttle and you stop in a clearing to rest. As you lie there, it occurs to you that you haven't eaten all day and aren't in the least bit hungry.\n    \n            You don't know how much time has passed—hours, days?—when a figure appears in the trees. You can barely see. It appears to be…\n            *choice\n                #…an old native woman.\n                    She approaches you noiselessly, and you don't feel afraid. You understand somehow that she is a shaman, a guide to the spirit world. As you watch, she vomits into her hand.\n                    *set hand \"hand\"\n                    *set luck %-99\n                    *set health %-99\n                    *goto vomit\n                #…an old native man.\n                    He approaches you noiselessly, and you don't feel afraid. You understand somehow that he is a shaman, a guide to the spirit world. As you watch, he vomits into his hand.\n                    *set hand \"hand\"\n                    *set luck %-99\n                    *set health %-99\n                    *goto vomit\n                #…a replica of yourself.\n                    Whoa…this is getting meta.\n\n                    You see yourself approaching noiselessly, and you don't feel afraid. You understand somehow that this is a shaman, a guide to the spirit world. As you watch, the apparition vomits into one hand.\n                    *set hand \"hand\"\n                    *set luck %-99\n                    *set health %-99\n                    *goto vomit\n                #…an anthropomorphic creature, half-human, half-jaguar.\n                    Whoa.\n\n                    The creature approaches you noiselessly, and you don't feel afraid. You understand somehow that this is a shaman, a guide to the spirit world. As you watch, it vomits into one paw.\n                    *set hand \"paw\"\n                    *set health %-99\n                    *set luck %-99\n                    *set cultural_fetishism %+15\n                    *goto vomit\n\n        #I push to my feet and make a beeline for the nearest hill. What I need is altitude and a view before I begin.\n            You clench your jaw and keep moving upward. By the time you reach the top of the hill, you've wiped out all remnants of strength. You sit down heavily beside a dead clump of brush and catch your breath. From this vantage, it appears that the forest goes on in a sea of green with no end in sight. Your heart sinks like a stone.\n\n            Surely you'll die from fever, or if not from the illness directly, then from its slowing you down, from dehydration and from hunger.\n            *choice\n                #I lie down and hope that my strength will return.\n                    As you lie back, staring up at the cloudy sky, a sound that had been tickling the edges of your consciousness grows louder…rotors!\n\n                    A helicopter!\n            \n                    You feel adrenaline pumping energy back through your muscles. You stand up and wave like a crazy person.\n\n                    *if (luck > 60) or (color = \"electric_blue\")\n\n                        The helicopter shifts directions, banks, and lands beside you. Almost delirious with joy, you realize the helicopter reads \"DEA\" across the side.\n\n                        Spotted by Americans!\n\n                        *if color = \"electric_blue\"\n\n                            \"Well,\" the pilot says as they get you into the cockpit, \"boy, are you lucky you have that blue jacket on! Hardly anything is blue in nature—set off in my eye like a beacon!\"\n\n                            *choice\n                                #As we take off, I lapse happily into unconsciousness, dreaming of archaeological fame.…\n                                    *set fortune_and_glory %+10\n                                    *goto border_bribe\n\n                                #As we take off, I chatter inanely to anyone and everyone in the helicopter, unable to contain my joy at the company of my compatriots.\n                                    They smile and nod politely, and eventually exhaustion overtakes your mind. To everyone's relief, you fall fast asleep.\n                                    *set ruggedness %-10\n                                    *goto border_bribe\n\n                                #As we take off, I feel pensive. Would my American compatriots have picked up a local man or woman in distress, or would they have passed them by?\n                                    Truly, your American passport gives you a life of luck and privilege unavailable to most of the world. As you drift off to sleep, you think of ways you might be able to give back to the local indigenous communities upon your return.\n                                    *set moral_compass %+10\n                                    *goto border_bribe\n                                   \n\n                        *else\n                            The pilot cocks his head to the side as you get loaded in. \"Boy, are you lucky I spotted you! One in a million chance with that ${color} jacket on! Doesn't exactly pop against the forest like a bright blue or orange would, but then, you wouldn't have wanted a FARC 'copter to find you, either!\"\n\n                            *choice\n                                #As we take off, I lapse happily into unconsciousness, dreaming of archaeological fame.…\n                                    *set fortune_and_glory %+10\n                                    *goto border_bribe\n\n                                #As we take off, I chatter inanely to anyone and everyone in the helicopter, unable to contain my joy at the company of my compatriots.\n                                    They smile and nod politely, and eventually exhaustion overtakes your mind. To everyone's relief, you fall fast asleep.\n                                    *set ruggedness %-10\n                                    *goto border_bribe\n\n                                #As we take off, I feel pensive. Would my American compatriots have picked up a local man or woman in distress, or would they have passed them by?\n                                    Truly, your American passport gives you a life of luck and privilege unavailable to most of the world. As you drift off to sleep, you think of ways you might be able to give back to the local indigenous communities. \n                                    *set moral_compass %+10\n                                    *goto border_bribe\n                                  \n                    *else \n                        The helicopter keeps moving on. They don't see you.\n\n                        You fall back in despair.\n    \n                        You don't know how much time has passed—hours, days?—when a figure appears in the trees. You can barely see. It appears to be…\n\n                        *choice\n                            #…an old native woman.\n                                She approaches you noiselessly, and you don't feel afraid. You understand somehow that she is a shaman, a guide to the spirit world. As you watch, she vomits into her hand.\n                                *set hand \"hand\"\n                                *set health %-99\n                                *set luck %-99\n                                *goto vomit_two\n                            #…an old native man.\n                                He approaches you noiselessly, and you don't feel afraid. You understand somehow that he is a shaman, a guide to the spirit world. As you watch, he vomits into his hand.\n                                *set hand \"hand\"\n                                *set luck %-99\n                                *set health %-99\n                                *goto vomit_two\n                            #…a replica of yourself.\n                                Whoa. This is getting meta. \n\n                                You see yourself approaching noiselessly, and you don't feel afraid. You understand somehow that this is a shaman, a guide to the spirit world. As you watch, the apparition vomits into one hand.\n                                *set hand \"hand\"\n                                *set health %-99\n                                *set luck %-99\n                                *goto vomit_two\n                            #…an anthropomorphic creature, half-human, half-jaguar.\n                                Whoa.\n\n                                The creature approaches you noiselessly, and you don't feel afraid. You understand somehow that this is a shaman, a guide to the spirit world. As you watch, it vomits into one paw.\n                                *set hand \"paw\"\n                                *set health %-99\n                                *set luck %-99\n                                *set cultural_fetishism %+10\n                                *goto vomit_two\n\n                #I decide to lift my spirits and dispel the damp with a fire.\n                    You strike up your waterproof matches and catch the dead bush on fire. As you lay back, staring up at the cloudy sky and basking in the warmth of your fire, a sound that had been tickling the edges of your consciousness grows louder…rotors!\n\n                    A helicopter!\n\n                    You feel adrenaline pumping energy back through your tired muscles. You stand up and wave like a crazy person.\n    \n                    The helicopter shifts directions, banks, and lands beside you. Almost delirious with joy, you realize the helicopter reads 'DEA' across the side.\n\n                    Spotted by Americans!\n\n                    \"Smart move starting a fire,\" the pilot says over his shoulder as you stagger into the seat behind him. \"You're sure lucky that we found you and not a FARC 'copter! Get comfortable, now. It's a long flight back to the nearest hospital.\"\n                    *choice\n                        #As we take off, I lapse happily into unconsciousness, dreaming of archaeological fame.…\n                            *set fortune_and_glory %+10\n                            *goto border_bribe\n\n                        #As we take off, I chatter inanely to anyone and everyone in the helicopter, unable to contain my joy at the company of my compatriots.\n                            They smile and nod politely, and eventually exhaustion overtakes your mind. To everyone's relief, you fall fast asleep.\n                            *set ruggedness %-10\n                            *goto border_bribe\n\n                        #As we take off, I feel pensive. Would my American compatriots have picked up a local man or woman in distress, or would they have passed them by?\n                            Truly, your American passport gives you a life of luck and privilege unavailable to most of the world. As you drift off to sleep, you think of ways you might be able to give back to the local indigenous communities.\n                            *set moral_compass %+10\n                            *goto border_bribe\n                #I lie right where I am and fantasize about a bottle of whiskey to take the edge off. I'll get up. Just not quite yet.…\n                    You don't know how much time has passed—hours, days?—when a figure appears in the trees. You can barely see. It appears to be…\n                    *choice\n                        #…an old native woman.\n                            She approaches you noiselessly, and you don't feel afraid. You understand somehow that she is a shaman, a guide to the spirit world. As you watch, she vomits into her hand.\n                            *set hand \"hand\"\n                            *set health %-99\n                            *set luck %-99\n                            *goto vomit_two\n                        #…an old native man.\n                            He approaches you noiselessly, and you don't feel afraid. You understand somehow that he is a shaman, a guide to the spirit world. As you watch, he vomits into his hand.\n                            *set hand \"hand\"\n                            *set health %-99\n                            *set luck %-99\n                            *goto vomit_two\n                        #…a replica of yourself.\n                            Whoa. This is getting meta.\n\n                            You see yourself approaching noiselessly, and you don't feel afraid. You understand somehow that this is a shaman, a guide to the spirit world. As you watch, the apparition vomits into one hand.\n                            *set hand \"hand\"\n                            *set luck %-99\n                            *set health %-99\n                            *goto vomit_two\n                        #…an anthropomorphic creature, half-human, half-jaguar.\n                            Whoa.\n\n                            The creature approaches you noiselessly, and you don't feel afraid. You understand somehow that this is a shaman, a guide to the spirit world. As you watch, it vomits into one paw.\n                            *set hand \"paw\"\n                            *set luck %-99\n                            *set health %-99\n                            *set cultural_fetishism %+15\n                            *goto vomit_two\n*else\n    You press on by sheer force of will.\n\n    After two days of moving as quickly as you can through the forest, the trees begin to change. The underbrush thins and you smell a fetid, salty odor in the air. You have entered an estuary, so you know you can't be far from the coast. Up ahead, you pick up the sounds of voices and the mechanical thrumming of a large engine.\n\n    Staying low to the ground, you creep up and catch a bizarre sight: a smallish, rickety-looking submarine lying half-submerged in a long finger of water which runs out to sea.\n\n    Its hull was hand-painted in green and blue camouflage. Before leaving for the field, you'd heard something about this.… \n\n    This must be one of those narco-subs. Manufactured from spare parts in secret beneath the canopy of Colombian estuaries, these subs take thousands of pounds of cocaine up and down the coast each year.\n    *choice\n        #I decide to stay undercover and skirt the coast to the south until I find non-FARC help.\n            Good idea. The last encounter with paramilitaries didn't exactly go so well.\n            *if GPS = true\n                You take a few coordinates to pass along to the DEA before moving along.\n                *set moral_compass %+10\n                *set intelligence %+10\n                *goto down_coast\n            *else\n                *set moral_compass %+10\n                *set intelligence %+10\n                *goto down_coast\n        #I decide to befriend them and ask for a ride.\n            \"[i]Hola, amigos[/i],\" you say. They eye you warily, all of them ready to shoot a potential spy.\n            *set risk_taker %+10\n            *set moral_compass %-20\n            *goto sub_ride\n        #I attempt to sabotage their submarine.\n            Drug traffickers making bank with impunity? Not on your watch!\n            *set moral_compass %+20\n            *set risk_taker %+20\n            *goto sabotage_sub\n\n*label border_bribe\n\n*if (customs_bribe = true) or (ambassador_rage = false)\n\n    Thankfully, you have no problem crossing back through customs.\n    *goto back_on_campus \n\n*else\n  \n    While passing through customs, it comes out that you'd failed to get your passport stamped when crossing the border into Colombia. The agent says he probably wouldn't have noticed, but your name came up on a watch list from the Colombian Embassy.\n\n    Your mind flits back to your spat with the Colombian ambassador last spring…it looks like you're literally paying the price for failing her son!\n\n    \"[i]Señor[/i],\" the customs agent says, \"are you listening? You face a fine of two thousand dollars.\"\n\n    Shards!\n\n    *choice\n        #I lie and tell him I didn't realize when I had passed over from Ecuador into Colombia while on archaeological survey. The forest looks the same on either side of the border.\n\n            He doesn't buy it, but in the end they can't hold you forever, given that several American DEA agents are waiting to escort you home.\n  \n            \"Go ahead, then,\" he tells you, \"but until you pay the fine, you will never be able to enter Colombia again.\"\n            *set risk_taker %+10\n            *set pomposity %+15\n            *set luck %-20\n            *set moral_compass %-10\n            *goto back_on_campus \n\n        #I play up my exhaustion, acting delirious.\n            Not wishing to have you pass out in front of his kiosk, he ultimately waives the fee and lets you pass.\n            *set risk_taker %+15\n            *set moral_compass %-10\n            *set luck %+20\n            *goto back_on_campus\n        #I know when to pick my battles; I pay the fine and move on.\n            *set moral_compass %+10\n            *set luck %-20\n            *set funding %-35\n            *goto back_on_campus \n\n\n*label down_coast\nYou gradually pick your way down the coast, plowing through clouds of mosquitoes and flies until you happen upon a small fishing village.\n\nThere, you find a young ${peace_corps} helping a passel of native children to caulk a boat with tar. ${his_peace_corps} light skin and hair marks ${him_peace_corps} as a foreigner like yourself.\n\n\"Ahoy!\" you call out. \"Do you speak English?\"\n\nNot only have you found an English speaker—you've found an American! By and by, you learn that ${he_peace_corps} came to Colombia one year ago via the Peace Corps. You grin ear to tired ear, relieved at your good fortune in having stumbled upon an American volunteer out here in the middle of nowhere.\n\nSeeing your state and hearing your plight, ${he_peace_corps} offers you food, shelter, and a ferry ride to a small airstrip just off the coast.\n*choice\n    #That night, I show my appreciation by ravishing ${him_peace_corps} in bed.\n        The next morning, you ferry over to the island airstrip and charter a flight to Quito with what little cash you have left. As the morning wears on, your crotch begins to itch and you find yourself crossing and uncrossing your legs. A quick inspection upon landing reveals an undesirable souvenir: crabs. \n\n        Ah well, you think, modern medicine awaits! Soon enough, you'll be back at the university medical center.\n        *set health %-10\n        *set libido %+15\n        *goto customs_bribery\n    #I thank ${him_peace_corps} profusely and promise to send ${him_peace_corps} monthly care packages for the duration
