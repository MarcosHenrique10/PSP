ess \u003c 50))\n                You fall into a drug-induced sleep and wake up to the sound of gunshots. After two days at sea, your FARC shipmates have grown bored. Somebody propped you up and decided to use you for target practice.\n\n                \"Wait!\" you say upon waking. \"I thought we had a deal!\"\n  \n                \"Yes,\" one of them says, \"we had a deal, but then we decided to shoot you.\"\n\n                One by one, they take shots aiming to wound, not to kill, as they cannot surface to dispose of your body. You lie there leaking blood from several wounds for three days. By the time the sub rises to the surface and one of the FARC sinks the killing shot between your eyes, infection has set in and you're more than ready to check out of this life.\n                *page_break\n                Well, ${first_name}, you came close, painfully close indeed. Perhaps in another life, you'll make different choices. Another path may lead you to a happier end.…\n                *goto ending\n            *else\n                You don't remember most of what transpired after the first night.… \n\n                The next thing you know, you find yourself staring up at the Tijuana sky next to a [i]burro[/i], reeking of tequila and unsure of the day and the time. To your amazement, your belongings remain intact.\n\n                You squint your eyes against your headache and hitch a ride north on the freeway. Soon enough, you find yourself across the border and on your way back to reality.\n\n                *set moral_compass %-10\n                *set blood_alcohol_level %+20\n                *set risk_taker %+10\n                *page_break\n                *goto back_on_campus\n        #…decide you are unwilling to part with any artifacts to these lawless men, turn tail, and beat it back into the trees.\n            You gradually pick your way down the coast, plowing through clouds of mosquitoes and flies and dodging vipers, until you happen upon a n an island just off the coast.\n            *choice\n                #That night, I show my appreciation by ravishing ${him_peace_corps} in bed.\n                    The next morning, you ferry over to the island airstrip and charter a flight to Quito with what little cash you have left. As the morning wears on, your crotch begins to itch and you find yourself crossing and uncrossing your legs. A quick inspection upon landing reveals an undesirable souvenir: crabs. \n\n                    Ah well, you think, modern medicine awaits! Soon enough, you'll be back at the university medical center.\n                    *set health %-10\n                    *set libido %+15\n                    *goto back_on_campus\n                #I thank ${him_peace_corps} profusely and promise to send ${him_peace_corps} monthly care packages of the finest non-perishable food products for the duration of ${his_his_peace_corps} stay.\n                    The next morning, you ferry over to the island airstrip and charter a flight to Quito with what little cash you have left. From there, you'll be bound for home!\n\n                    *set moral_compass %+10\n                    *set libido %-15\n                    *goto back_on_campus\n                #I smile, thank ${him_peace_corps}, and then excuse myself to bathe in the ocean.\n\n                    The water feels delicious, and you emerge refreshed.\n\n                    The next morning, you ferry over to the island airstrip and charter a flight to Quito with what little cash you have left. From there, you'll be bound for home!\n\n                    *set libido %-15\n                    *set ruggedness %-15\n                    *goto back_on_campus\n*else\n  \n    You realize you have nothing but the piddly remainder of your cash to give them.\n    *choice\n        #I offer them a dirty joke.\n            \"What's the difference,\" you ask, \"between a pregnant woman and a light bulb?\"\n\n            \"[i]¿Qué?[/i]\"\n\n            \"You can unscrew a light bulb!\"\n\n            You mime a drum set, [i]ba-dum-tshhh[/i]! and worry at first that nobody is smiling.\n\n            Perhaps that didn't translate well into Spanish.\n\n            Perhaps they'll shoot you for telling a bad joke.\n\n            (Your students would love that after all the jokes you've cracked over their heads.)\n\n            But then one began to smile slowly and the others followed, and the next thing you know, you have a noseful of coke and a place on the submarine en route to Baja! From there, you need only hitch a ride over the border to get back to reality.\n  \n            *set pomposity %-20\n            *set luck %+20\n            *goto back_on_campus\n        #I take my knife and slice my hand open, offering a blood oath.\n            One of the men steps forward and offers you his hand in kind. You notice that he barely draws his own blood, and you can't help but feel superior. You shake, and he offers you a place on the sub.\n\n            Once en route, everyone takes a snort of coke to remain [i]despierto[/i], awake, and given your state of exhaustion at the end of your ordeal on survey, the drugs hit you hard.\n\n            *if ((health \u003c 50) and (ruggedness \u003c 50)) or ((luck \u003c 50) and (ruggedness \u003c 50))\n                You fall into a drug-induced sleep and wake up to the sound of gunshots. After two days at sea, your FARC shipmates have grown bored. Somebody propped you up and decided to use you for target practice.\n\n                \"Wait!\" you say upon waking. \"I thought we had a deal!\"\n  \n                \"Yes,\" one of them says, \"we had a deal, but then we decided to shoot you.\"\n\n                One by one, they take shots aiming to wound, not to kill, as they cannot surface to dispose of your body. You lie there leaking blood from several wounds for three days. By the time the sub rises to the surface and one of the FARC sinks the killing shot between your eyes, infection has set in and you're more than ready to check out of this life.\n                *page_break\n                Well, ${first_name}, you came close, painfully close indeed. Perhaps in another life, you'll make different choices. Another path may lead you to a happier end.…\n                *goto ending\n            *else\n                You don't remember most of what transpired after the first night. Next thing you know, you find yourself staring at the sky outside of Tijuana next to a [i]burro[/i], smelling of tequila and unsure of the day and the time. To your amazement, your belongings remain intact.\n\n                You squint your eyes against your headache and hitch a ride north. Soon enough, you find yourself across the border and on your way back to reality.\n                *set ruggedness %+20\n                *set blood_alcohol_level %+20\n                *set risk_taker %+10\n                *goto back_on_campus\n        #I offer to be their sex slave.\n            They look you up and down appreciatively, and you feel relieved knowing that you still have a hundred-pack of condoms left in your backpack.\n\n            One or two of these fellas even looked vaguely appealing if you were into that kind of thuggish brute sort of thing.\n\n            But then…you do what you must in the name of archaeology, right? Right!\n\n            Your discoveries in Colombia must reach the Ivory Tower, whatever the cost. By the time you pass Tijuana, however, you're getting a bit saddle sore. Enough is enough, you decide, and you disembark.\n\n            From Tijuana, you hitch a ride north and head across the border and into California.\n\n            Back to reality…\n            *set libido %+10\n            *set risk_taker %+20\n            *page_break\n            *goto back_on_campus\n        #I offer them the wad of cash and give a helpless shrug when they count it out. For men who deal in millions, my money is as good as pocket change.\n            They refuse you passage and decide as they pull away that they shouldn't leave you as a witness to their work. One man pops up from the hatch with an assault rifle and releases a barrage of bullets before you can get away. Shock shields you from the pain as you feel yourself hit the ground. You lie on your back and look up at the slow, hazy light filtering down from the forest canopy-your last view of the waking world.\n            *page_break\n\n            Well, ${first_name}, you came close, painfully close indeed. Perhaps in another life, you'll make different choices. Another path may lead you to a happier end.…\n            *goto ending\n\n*label sabotage_sub\n\nLucky thing your father did a stint in the army as a nuclear submarine technician… \n\nYou wait until all of the men leave to take a smoking break before stealing aboard.\n\nOnce inside, it occurs to you that you're alone in the control room with several thousand pounds of coke and enough food for a week's ocean voyage for one.\n\nHmmm…there's really only one thing to do: you close the hatch and submerge in order to navigate into open water before anyone can stop you.\n*choice\n    #I decide to drive this baby into U.S. waters and heroically surrender its contents to the DEA.\n        *if (fortune_and_glory > 70) and (luck > 55)\n            You can see the headlines now: Archaeology ${hierarchy} discovers the mythical City of the Clouds and escapes the FARC, single-handedly delivering millions of dollars in illicit drugs safely into the hands of the DEA… \n\n            The Ivy Leagues will engage in epic bidding wars to offer you tenure!\n\n            You set a course for the port of Los Angeles, radioing the coast guard once you enter U.S. waters.\n\n            You arrive to great aplomb, and after a number of interviews and talk show appearances in L.A., you finally make it home again, considerably more famous than when you left.\n            *set fortune_and_glory %+30\n            *set social_networking %+20\n            *set ruthlessness %+10\n            *set intelligence %+20\n            *set moral_compass %+10\n            *page_break\n            *goto back_on_campus\n        *else\n            You imagine the headlines: Archaeology ${hierarchy} discovers the mythical City of the Clouds and escapes the FARC, single-handedly delivering millions of dollars in illicit drugs safely into the hands of the DEA.…\n\n            Unfortunately, when you enter the port, the DEA finds your story suspicious and more than a little incredible, and the United States government detains you for several uncomfortable weeks of questioning before you're allowed to go free. They release you, and you discover that the media has had a field day with your story.\n\n            It is under a pall of controversy that you return home to your department.\n            *set fortune_and_glory %-20\n            *set social_networking %-20\n            *set ruthlessness %+10\n            *set intelligence %-20\n            *set moral_compass %+10\n            *page_break \n            *goto back_on_campus\n    #I decide to drive this baby into Mexican waters and unload some of the coke there in order to rebuild my grant funding.\n        *if ruthlessness > 70\n            Nothing much…just enough to fund a season or ten of field work.\n\n            While looking around the narco-sub, you find a list of coordinates that will take you to the Zeta Cartel on an isolated inlet north of Acapulco.\n\n            You dock, and once they see that you have the merchandise, they ask no questions. You exchange the drugs for money and continue on your way.\n\n            Somewhere off the coast of Baja California, you ditch the sub and hitch a ride north on the coastal highway.\n    \n            You cross the border illegally in the rough terrain north of Tecate, California in order to avoid questions regarding your pack full of drug money.\n\n            *set fortune_and_glory %+20\n            *set social_networking %+10\n            *set funding %+99\n            *set intelligence %+20\n            *set ruggedness %+20\n            *set risk_taker %+30\n            *page_break\n            *goto back_on_campus\n        *else\n            As you navigate miles of ocean, you decide to donate half of your earnings to build schools in rural Colombian villages. It's about time archaeologists gave something back to these descendant communities!\n  \n            Onboard the narco-sub, you find a list of coordinates that will take you to the Zeta Cartel on an isolated inlet north of Acapulco.\n\n            You dock, and once they see that you have the merchandise, they ask no questions. You exchange the drugs for money and continue on your way.\n        \n            Somewhere off the coast of Baja California, you ditch the sub and hitch a ride north on the coastal highway.\n    \n            You cross the border illegally in the rough terrain north of Tecate, California in order to avoid questions regarding your pack full of drug money.\n\n            *set fortune_and_glory %+20\n            *set social_networking %+10\n            *set funding %+99\n            *set intelligence %+20\n            *set ruggedness %+20\n            *set risk_taker %+30\n            *page_break\n            *goto back_on_campus\n \n*label vomit_two\n\nAs you know, shamans in southern Colombia are often depicted holding a stream of ritual vomit, symbolic of the hallucinogenic ayahuasca ceremony.\n\nThis vomit represents all of the knowledge they have drawn out of the universe.\n\nThe shaman holds out its ${hand}, and you dip your finger and bring it to your mouth.\n\n*if spirit_animal = \"golden retriever\"\n    Instantly, you feel the world fall away from you—your human hopes and fears, your archaeological ambition, the forest, everything…\n\n    Somebody begins to scratch behind your ears, and the sensation immediately sets your hind leg to thumping against the soft grass of a well-tended backyard.\n\n    \"Buddy,\" someone says, \"go fetch.\"\n\n    And with a joy you have never known, you bound away through the grass and under the sun after a squirrel-shaped fuzzy toy.\n\n    *if libido > 65\n        You catch the toy and hump it enthusiastically. As you can no longer remember any other way, you feel fully at ease in your new dog body. Life is good.\n        *goto explanation_for_animal\n\n    *else\n        You catch the toy and proceed to rip all the stuffing out, shaking it into the air. As you can no longer remember any other way, you feel fully at ease in your new dog body. Reincarnated life is good.\n        *goto explanation_for_animal\n\n*elseif spirit_animal = \"three-toed sloth\"\n    Instantly, you feel the world fall away from you—your human hopes and fears, your ambition, the forest, everything…\n\n    You can feel your arms hooked around the rough bark of a tree limb. With slow—one might even say slothful—movements, you reach around with one set of claws and strip a section of delicious leaves.\n\n    Mmmm. Cellulose.\n    \n    Up above you, you see a harpy eagle! On instinct, you drop, plummeting fifty feet into a river, from which you extract yourself and slowly, slowly pull yourself up again into the high safety of the canopy.\n\n    Along the way, you take frequent breaks to slowly eat and digest foliage.\n\n    You can no longer recall any life other than this one, and you feel fully at ease in your new sloth body here in the present, slow-moving moment.\n    *goto explanation_for_animal\n\n*elseif spirit_animal = \"owl\"\n\n    Instantly, you feel the world fall away from you—your human hopes and fears, your ambition, the forest, everything…\n    \n    When your vision clears, you find yourself looking out from a great height across a nighttime forest. Even in the dark of night, you can see everything clearly thanks to your owl eyes.\n    \n    Two hundred yards off and forty feet down below you, you you enjoy an afternoon of bodily pleasure before returning to the forest to feed on sweet young leaves.\n\n    As you can no longer remember any other way, you feel fully at ease in your new bonobo body and at one with their culture. It is a decidedly friendly one!\n    *goto explanation_for_animal\n\n\n*label compass_south\n\n\nAfter a full day of travel on very little food and what water you can suck from the pools and crannies in lianas and palms, you begin to feel a bit unsteady on your feet. You find yourself stopping to rest more and more often.\n\n*if (health \u003c 40) or (anti_malarials = false)\n\n    Well, it was bound to happen with your running yourself ragged. You feel a fever coming on, your forehead beading with sweat. You have to stop early for the day.\n\n    As you shrug off your pack and lean against it, you hope this is not the onset of malaria, but you suspect that your luck may have just run out.\n\n    After a fitful night, you feel slightly better in the morning. You remember, then, that your food and water have run dangerously low.\n\n    You must gamble with your life yet again.\n\n    *choice\n        #I push to my feet and press on through the low country, unable to muster the strength to ascend to higher ground.\n\n            You trust you'll be able to keep your course fixed in a southerly direction.\n            \n            Your fever may have clouded your judgment, but it seems to you better to pick a direction and try to escape this thicket than stay where you are with no hope of rescue.\n\n            You cross and uncross your fingers for luck as you walk.\n\n            By mid-afternoon, your fever has returned full throttle and you stop in a clearing to rest. As you lie there, it occurs to you that you haven't eaten all day and aren't in the least bit hungry.\n    \n            You don't know how much time has passed—hours, days?—when a figure appears in the trees. You can barely see. It appears to be…\n            *choice\n ving upward. By the time you reach the top of the hill, you've wiped out all remnants of strength. You sit down heavily beside a dead clump of brush and catch your breath. From this vantage, it appears that the forest goes on in a sea of green with no end in sight. Your heart sinks like a stone.\n\n            Surely you'll die from fever, or if not from the illness directly, then from its slowing you down, from dehydration and from hunger.\n\n            *choice\n                #I lie down and hope that my strength will return.\n                    As you lie back, staring up at the cloudy sky, a sound that had been tickling the edges of your consciousness grows louder…rotors!\n\n                    A helicopter!\n            \n                    You feel adrenaline pumping energy back through your muscles. You stand up and wave like a crazy person.\n\n                    *if (luck > 60) or (color = \"electric_blue\")\n\n                        The helicopter shifts directions, banks, and lands beside you. Almost delirious with joy, you realize the helicopter reads \"DEA\" across the side.\n\n                        Spotted by Americans!\n\n                        *if color = \"electric_blue\"\n\n                            \"Well,\" the pilot says as they get you into the cockpit, \"boy, are you lucky you have that blue jacket on! Hardly anything is blue in nature—set off in my eye like a beacon!\"\n\n                            *choice\n                                #As we take off, I lapse happily into unconsciousness, dreaming of archaeological fame…\n                                    *set fortune_and_glory %+10\n                                    *goto back_on_campus\n\n                                #As we take off, I chatter inanely to anyone and everyone in the helicopter, unable to contain my joy at the company of my compatriots.\n                                    They smile and nod politely, and eventually exhaustion overtakes your mind. To everyone's relief, you fall fast asleep.\n                                    *set ruggedness %-10\n                                    *goto back_on_campus\n\n                                #As we take off, I feel pensive. Would my American compatriots have picked up a local man or woman in distress, or would they have passed them by?\n                                    Truly, your American passport gives you a life of luck and privilege unavailable to most of the world. As you drift off to sleep, you think of ways you might be able to give back to the local indigenous communities.\n                                    *set moral_compass %+10\n                                    *goto back_on_campus\n                        *else\n                            The pilot cocks his head to the side as you get loaded in. \"Boy, are you lucky I spotted you! One in a million chance with that ${color} jacket on! Doesn't exactly pop against the forest like a bright blue or an orange, but then, you wouldn't have wanted a FARC 'copter to find you either!\"\n\n                            *choice\n                                #As we take off, I lapse happily into unconsciousness, dreaming of archaeological fame.…\n                                    *set fortune_and_glory %+10\n                                    *goto back_on_campus\n\n                                #As we take off, you chatter inanely to anyone and everyone in the helicopter, unable to contain my joy at the company of my compatriots.\n                                    They smile and nod politely, and eventually exhaustion overtakes your mind. To everyone's relief, you fall fast asleep.\n                                    *set ruggedness %-10\n                                    *goto back_on_campus\n\n                                #As we take off, I feel pensive. Would my American compatriots have picked up a local man or woman in distress, or would they have passed them by?\n \"\n                                *set health %-99\n                                *set luck %-99\n                                *goto vomit_two\n                            #…an anthropomorphic creature, half-human, half-jaguar.\n                                Whoa.\n\n                                The creature approaches you noiselessly, and you don't feel afraid. You understand somehow that this is a shaman, a guide to the spirit world. As you watch, it vomits into one paw.\n                                *set hand \"paw\"\n                                *set health %-99\n                                *set luck %-99\n                                *set cultural_fetishism %+10\n                                *goto vomit_two\n\n                #I decide to lift my spirits and dispel the damp with a fire.\n                    You strike up your waterproof matches and catch the dead bush on fire. As you lie back, staring up at the cloudy sky and basking in the warmth of your fire, a sound that had been tickling the edges of your consciousness grows louder…rotors!\n\n                    A helicopter!\n\n                    You feel adrenaline pumping energy back through your tired muscles. You stand up and wave like a crazy person.\n    \n                    The helicopter shifts directions, banks, and lands beside you. Almost delirious with joy, you realize the helicopter reads 'DEA' across the side.\n\n                    Spotted by Americans!\n\n                    \"Smart move starting a fire,\" the pilot says over his shoulder as you stagger into the seat behind him. \"You're sure lucky that we found you and not a FARC 'copter! Get comfortable, now. It's a long flight back to the nearest hospital.\"\n                    *choice\n                        #As we take off, I lapse happily into unconsciousness, dreaming of archaeological fame.…\n                            *set fortune_and_glory %+10\n                            *goto back_on_campus\n\n ealth %-99\n                            *set luck %-99\n                            *goto vomit_three\n                        #…a replica of yourself.\n                            Whoa. This is getting meta.\n\n                            You see yourself approaching noiselessly, and you don't feel afraid. You understand somehow that this is a shaman, a guide to the spirit world. As you watch, the apparition vomits into one hand.\n                            *set hand \"hand\"\n                            *set health %-99\n                            *set luck %-99\n                            *goto vomit_three\n                        #…an anthropomorphic creature, half-human, half-jaguar.\n                            Whoa. The creature approaches you noiselessly, and you don't feel afraid. You understand somehow that this is a shaman, a guide to the spirit world. As you watch, it vomits into one paw.\n                            *set hand \"paw\"\n                            *set luck %-99\n                            *set health %-99\n                            *set cultural_fetishism %+15\n                            *goto vomit_three\n*else\n\n    You press on by sheer force of will. After two days of moving as quickly as you can through the forest, you smell the unmistakable aroma of human habitation: woodsmoke from many campfires.\n    *choice\n        #I move slowly and silently forward, hoping to do some reconnaissance before revealing myself to strangers.\n            You can't be too careful. Many tribes, such as the Shuar of southern Ecuador, value their privacy and have been known to greet outsiders with arrows instead of a place at their fire.\n\n            As you dart from tree to tree, you catch something in your peripheral vision and see that two native men in traditionally minimal clothing are all but guiding you into their village.\n            *set ruggedness %+5\n            *set intelligence %+5\n            *page_break\n            *goto inner_camp\n        #I shrug and continue forward at the same pace.\n            Whoever lives in this village is no doubt already well aware of your presence, so there's no need.\n\n            Sure enough, you catch something in your peripheral vision and see that two native men in traditionally minimal clothing are all but guiding you into their village.\n            *set ruggedness %+10\n            *set intelligence %+10\n            *page_break\n            *goto inner_camp\n        #I rush forward, guided by my empty belly.\n            Seriously. You haven't eaten a proper meal in days, and where there's fire, there's likely a roasted monkey or tapir or something.\n            *set ruggedness %-10\n            *set intelligence %-10\n            *page_break\n            *goto inner_camp\n\n*label inner_camp\n\nInside the camp, you immediately get a welcoming committee of village children following you and grasping at your clothing as you move through the central village space. To your surprise, in one of the huts you see the pale face of another non-native visitor.\n\n*if youth_gender = \"man\"\n\n    He wears a long, shaggy beard that rides fully down his skinny chest. From his accent, you gauge that he hails from France.\n\n    A cultural anthropologist, he had come there to observe something about the tribe's warlike status and, upon careful study, had determined that 83.8% of their warmongering went on over women.\n\n    \"But,\" you ask, \"how did you come up with that statistic?\"\n    \n    \"I have observed as much,\" he says with a sniff. \"Ever since I have come here to camp, the people have complained of nothing so much as unfaithful women breaking up their happy homes.\"\n\n    You can see behind him into his hut. Three (very) young half-naked women are lying inside on his bed.\n\n    He zips up his fly.\n    *goto impression\n*else\n    She wears a nearly androgynous khaki combination, matching in slouchy tops and bottoms, yet something in the pout of her lips and her French accent, smooth as honey, draws you closer.\n\n    She says that she had come there to observe something about the tribe's warlike status and, upon careful study, had determined that 83.8% of their warmongering went on over unfaithful men and angry families.\n\n    \"But,\" you ask, \"how did you come up with that statistic?\"\n    \n    \"I have observed as much,\" she says with a sniff. \"Ever since I have come here to camp, the people have complained of nothing so much as philandering men breaking up their happy homes.\"\n\n    You can see behind her into her hut. Two (very) young men lounge on the bed inside.\n\n    She looks down at her pants and quickly zips up her fly.\n    *goto impression\n\n*label impression\n\nYou cock an eyebrow. You know well enough that tribes in this region often solve their disputes with violence, and it seems ${the_youth} is playing a dangerous game. Until you know what people here think of this cocksure anthropologist in their midst, it would be best to distance yourself…\n*choice\n    *if (libido > 75)\n        #My lizard brain says otherwise. I find ${youth} overpoweringly sexy in a debauched, Heart of Darkness kind of way and fall into effortless flirtation.\n            *set intelligence %-10\n            *set libido %+15\n            *set moral_compass %-10\n            *set social_networking %+10\n            *goto bastard_sex\n        #With some effort, I pull my mind out of the gutter. \"It would behoove you,\" I say, \"to keep in mind participant bias, lest you become too, uh, close to your research.\"\n            \"Sure,\" ${the_youth} says. \"Whatever.\"\n            *set intelligence %+20\n            *set libido %-15\n            *set moral_compass %-5\n            *set social_networking %-5\n            *goto bastard_distance\n    *else\n        #My lizard brain says otherwise. I find ${youth} overpoweringly sexy in a debauched, Heart of Darkness kind of way and fall into effortless flirta orgy. Your first!\n\n    At the end of what grew into several hours of fun, you have dirt and bits of dried grass in your hair and body paint smeared across your chest.\n\n    Though you don't really want to move, Nature is calling and you stand up to go pop a squat out in the woods.\n    *page_break\n    *set luck %-99\n    *goto consequences_for_you_both\n\n*label consequences_for_you_both\n\nYou emerge from the hut and walk several feet into the trees. Beneath the canopy, the light around you grows dim.\n\nYou never see the stone axe that clubs you over the head.…\n\n*page_break\n\nWhen you come to, you realize with horrified fascination that you're watching the comeuppance of the French anthropologist.\n\nAlready dead, they're removing the skinned head of your brief and recent lover from a boiling pot. They've turned it inside out and scraped away the muscle.\n\nYou watch as they fill it full of hot stones.\n\nSo this is how you'll go? A shrunken head? An end befitting an anthropological archaeologist, you suppose, but a pity. You'll die so young—all of your ambition and all of your discoveries will die with you.\n\nOnce that head has been left to dry in the sun, a shadow falls over your body.\n\nThe face of your killer, striped with red and black paint, ${first_name} ${last_name}, is the last thing you ever see.\n\nWell, you think, it's been a good ride, and then the lights go out for good.\n*goto ending\n\n*label bastard_distance\n\nYou excuse yourself and go in search of the chief. You find him sitting in a hammock beneath a widely domed roof of woven palm and young vines. You introduce yourself and offer him your jacket as a gift.\n\nTo your surprise, he speaks English.\n\n\"Thank you,\" he says. \"The first academic in our village arrived from Oxford in my youth. The French one, whom you see over there lazing about, has done nothing but take advantage of our hospitality. It is not certain how much longer ${the_youth} will be with us.\"\n \nHe paused, looking thoughtful.\n\n\"But anyway, I digress. You say you are hungry and tired, that you wish to get back home? If that is so, we will be happy to escort you to the nearest forest runway so that you may charter a plane. One anthropologist at a time is quite enough.\"\n\n*page_break\n\nThe chief organizes a guiding party to take you through the forest to the closest airstrip, located just across the border in Ecuador. From there, you charter a plane bound for Quito.\n\nOnce en route, you begin to relax and plan a triumphant lecture of discovery.\n*set jacket false\n*goto chair\n\n*label vomit_three\nYou know from your anthropology courses that shamans in southern Colombia are often depicted in stone carvings holding a stream of ritual vomit, symbolic of the hallucinogenic ayahuasca ceremony.\n\nThey would give this vomit to apprentices to taste, as it represented all of the knowledge they had drawn out of the universe.\n\nThe shaman holds out its ${hand}, and you dip your finger and bring it to your mouth.\n\n*if spirit_animal = \"golden retriever\"\n    Instantly, you feel the world fall away from you—your human hopes and fears, your archaeological ambitions, the forest, everything.…\n\n    Somebody begins to scratch behind your ears, and the sensation immediately sets your hind leg to thumping against the soft grass of a well-tended backyard.\n\n    \"Buddy,\" someone says, \"go fetch.\"\n\n    And with a joy you have never known, you bound away through the grass and under the sun after a squirrel-shaped fuzzy toy.\n\n    *if libido > 65\n        You catch the toy and hump it enthusiastically. As you can no longer remember any other way, you feel fully at ease in your new dog body. Life is good.\n        *goto explanation_for_animal\n\n    *else\n        You catch the toy and proceed to rip all the stuffing out, shaking it into the air. As you can no longer remember any other way, you feel fully at ease in your new dog body. Reincarnated life is good.\n        *goto explanation_for_animal\n*elseif spirit_animal = \"three-toed sloth\"\n    Instantly, you feel the world fall away from you—your human hopes and fears, your ambition, the forest, everything.…\n\n    You can feel your arms hooked around the rough bark of a tree limb. With slow—one might even say slothful—movements, you reach around with one set of claws and strip a section of delicious leaves.\n\n    Mmmm. Cellulose.\n    \n    Up above you, you see a harpy eagle! On instinct, you drop, plummeting fifty feet into a river, from which you extract yourself and slowly, slowly pull yourself up again into the high safety of the canopy.\n\n    Along the way, you take frequent breaks to slowly eat and digest foliage.\n\n    You can no longer recall any life other than this one, and you feel fully at ease in your new sloth body here in the present, slow-moving moment.\n    *goto explanation_for_animal\n*elseif spirit_animal = \"owl\"\n    Instantly, you feel the world fall away from you—your human hopes and fears, your ambition, the forest, everything.…\n    \n    When your vision clears, you find yourself looking out from a great height across a nighttime forest. Even in the dark of night, you can see everything clearly thanks to your owl eyes.\n\n    Two hundred yards off and forty feet down below you, you catch the movement of a rodent.\n\n    You take flight, spreading your wings and coasting smoothly down from the tree. In one deft motion, you clutch the hapless mouse in your talons.\n\n    Back on your perch, you devour the thing and sit blinking contentedly.\n\n    You can no longer recall any life other than this one, and you feel fully at ease in your new feathered body as you digest a warm, fuzzy dinner.\n    *goto explanation_for_animal\n*elseif spirit_animal = \"cheetah\"\n    Instantly, you feel the world fall away from you—your human hopes and fears, your ambition, the forest, everything.…\n\n    When your senses return, you find yourself sitting on your haunches in an open stretch of grassland.\n    \n    Ahead of you, an ibex springs to life across the plain and your legs spring into action, picking up speed until you overtake the creature and sink your teeth delightedly into its left haunch.\n\n    You can no longer remember any way beyond this raw, simple life, and you feel fully at ease in your new cheetah body.\n    *goto explanation_for_animal\n*else\n    Instantly, you feel the world fall away from you—your human hopes and fears, your ambition, the forest, everything.…\n\n    When your senses return, you find yourself sitting beside two female bonobos. One of them approaches and moves to pat your rear and fondle your nether region. You reciprocate and also offer your services to the second one. Between the three of you, you enjoy an afternoon of bodily pleasure before returning to the forest to feed on sweet young leaves.\n        \n    As you can no longer remember any other way, you feel fully at ease in your new bonobo body and at one with their culture. It is a decidedly friendly one!\n    *set libido %+20\n    *goto explanation_for_animal\n\n*label explanation_for_animal\n\nIs this reincarnation?\n\nA fever dream to carry you into the abyss of death?\n\nEither way, friend, I'm afraid malarial fever has brought you to the end of your archaeological road, and your knowledge goes with you.\n\nBack on campus, everyone wonders what became of you. Your name finds permanence as oral tradition at your university—a cautionary tale to young archaeologists dreaming of temples and gold.\n\nFor now, the City of the Clouds remains asleep, as yet undiscovered by the seeking eyes of the modern world…perhaps this is for the best.\n*goto ending\n\n*label back_on_campus\n\nYou can't help but feel out of sync for weeks after your return home.\n\nPotable water from every tap? No shirt, no shoes, no service? Civilization does seem a bit high-maintenance.\n*choice\n    #Hey, it's all relative. I'll readjust to luxury soon enough.\n
