last_name}.\" He paused a moment and grew serious. \"Look,\" he said, \"I've heard from the locals that if the City of the Clouds exists anywhere this side of fantasy, it's in the heart of FARC territory, and I would think about it very carefully before you throw your life away on this thing.\"\n\n        *if (fortune_and_glory > 70) and (ruthlessness > 70)\n\n                \"Well,\" you said with a broad smile, \"Thanks for the warning, but I guess I'll take my chances.\"\n\n                You couldn't help but wonder whether Dan harbored ulterior motives for discouraging you in your quest to locate the City of the Clouds—a discovery that would certainly cast a shadow over his own fame.…\n                *goto wave\n        *else\n\n                \"Thanks for the warning, Dan,\" you said, smiling with more confidence than you felt.\n                *goto wave\n       \n*else\n        He waved you on dismissively.\n\t \n        \"Thanks for stopping by,\" he said. \"If you don't die, I'll probably see you at the Andeanist conference up in Berkeley this fall.\"\n        *if chicken = true\n                You turned to go, but Dan stopped you.\n\n                \"One question,\" he said. \"What's with the chicken on a leash?\"\n\n                You thought for a moment of your ghostly visitation on the road, shrugged, and with all the normalcy you could muster, you told him that chicken makes for good eating on the trail.\n\n                You waved and went on your way, cutting across the fields and crossing the Colombian border somewhere in the green thickets of the hills ahead.\n                *set border_stamp false\n                *finish\n        *else\n\n                You waved and went on your way, cutting across the fields and crossing the Colombian border somewhere in the green thickets of the hills ahead.\n                *set border_stamp false\n                *finish\n\n*label wave\n*if chicken = true\n        You waved and turned to go, but Dan stopped you.\n\n        \"One question,\" he said. \"What's with the chicken?\"\n\n        You shrugged. \"Chicken makes for good eating on the trail.\"\n\n        You waved and went on your way, cutting across the fields and crossing the Colombian border somewhere in the green thickets of the hills ahead.\n        *set border_stamp false\n        *finish\n*else\n\n        You waved and went on your way, cutting across the fields and crossing the Colombian border somewhere in the green thickets of the hills ahead.\n        *set border_stamp false\n        *finish\n\n*label trip_to_Colombia\n\nYour decision made, you bought yourself an Inka Cola and sipped its sweet yellow nectar down as you wound your way through the streets to the bus station.\n\nIt wasn't much to look at: a squat cement building, in front of which a number of long tour buses, minibuses, and taxis all crammed in along the street and the adjacent back lot.\n\nIn the ticket office, you saw that there were regular departures on the main tour buses to the border with Colombia. Bus tickets cost the equivalent of fifteen American dollars, pretty steep as these things go.\n*choice\n        #I dropped the money—a small price to pay for a climate-controlled ride across the border.\n                *set funding %-15\n                *set risk_taker %-10\n                *goto bus\n        #I wanted to price my other options first. I'm no tourist.\n                *set risk_taker %+10\n                *goto pricing_options\n\n*label bus\nYou paid your ticket and found your bus waiting to depart out back. The driver said he planned to depart in about an hour and walked off to browse in a massive open market, its tents just visible over the low wall of the bus station.\n\nIt sounded like things over there were buzzing, and your anthropologist fingers started twitching in response, thinking of possible folk art doodads you might acquire and add to your office shelves.\n\nHere's the rub: Ecuadorian buses don't exactly run like trains. The timetable could go under or over, and if you wandered off, you risked missing your ride.…\n*choice\n        #I decided to chance it and wander through the marketplace.\n                *set risk_taker %+10\n                *set cultural_fetishism %+5\n                *goto marketplace\n        #Meh. I decided to stay where I was; by the bus, with my bag and waiting for the driver to return.\n                High time for a nap, anyway. You lay down atop your backpack and fell asleep in two scrapes of a trowel.\n                *set risk_taker %-10\n                *set cultural_fetishism %-5\n                *set health %+10\n                *goto nap\n\n*label marketplace\n*if style = \"native\"\n        At the market, you found yourself haggling for a brightly patterned shirt woven from cochineal-dyed red wool.\n\n        \"I'll give you three dollars for that tunic,\" you said, attempting to look disinterested.\n        \n        \"That?\" the woman said. \"That is worth at least twenty dollars.\"\n        *choice\n                #I coughed up the twenty dollars.\n                        *if moral_compass > 70\n                                Hey, she probably needed it more than you.\n                                \n                                She smiled and you made the exchange, carefully tucking your latest textile in your backpack.\n\n                                Sated, you walked on.\n                                *set funding %-10\n                                *set risk_taker %-10\n                                *set luck %-10\n                                *set cultural_fetishism %-5\n                                *set moral_compass %+10\n                                *page_break\n                                *goto cuy_vendor\n                        *else\n                                It irritated you to pay full price, but you didn't have any smaller bills.\n                                *set funding %-10\n                                *set risk_taker %-10\n                                *set luck %-10\n                                *set cultural_fetishism %+5\n                                *set moral_compass %+5\n                                *page_break\n                                *goto cuy_vendor\n                #I snorted and walked away.\n                        *if cultural_fetishism > 50\n                                After a moment, she began calling you back, and you smiled for a moment before putting on your poker face and returning to haggle down to a fair price.\n                                *set risk_taker %+10\n                                *set cultural_fetishism %+10\n                                *set funding %-5\n                                *set luck %+10\n                                *page_break\n                                *goto cuy_vendor\n                        *else\n                                She was clearly going to take you for a ride. You shook your head and walked away.\n                                *set risk_taker %-10\n                                *set cultural_fetishism %-10\n                                *set luck %+10\n                                *page_break\n                                *goto cuy_vendor\n                #I countered with eight dollars.\n                        The woman regarded you for a long moment, and then nodded, taking your eight dollars and handing you the shirt.\n\t\t\n                        Sated, you walk on.\n                        *set cultural_fetishism %+5\n                        *set luck %+10\n                        *set funding %-5\n                        *page_break\n                        *goto cuy_vendor\n\n*else\n        *goto cuy_vendor\n\n*label cuy_vendor\nOver to your right, you saw a food vendor selling [i]cuy del horno[/i], and you moved closer, guided by the smell of fire-crisped flesh. Before you lay a dozen guinea pigs, each arranged on a spit with its little claws and teeth bared, its hair burned clean away in the fire.\n\nSo long as they're cooked through, they should be safe to eat.\n*choice\n        #When in Rome…I paid for a guinea pig on a stick and gnawed away.\n\n                Delicious! Savory, salty meat somewhere in between rabbit and chicken. This meal should carry you through the afternoon on the bus.\n\n                All at once, you looked down at your watch, and your eyebrows shot up in shock. You had exactly five minutes until the scheduled departure.\n                You beat it back to the bus in record time.\n                *set cuy_del_horno true\n                *set luck %-10\n                *set health %-15\n                *set risk_taker %+10\n                *set cultural_fetishism %+10\n                *page_break\n                *goto back_to_bus\n        #No way. I passed on roast [i]cuy[/i]. Who knows how they cooked it?\n\n                Besides, you don't necessarily like to be reminded that your meat once had a little fuzzy face before stuck and popped over a fire.\n\n                All at once, you looked down at your watch, and your eyebrows shot up in shock. You had exactly five minutes until the scheduled departure. You beat it back to the bus in record time.\n                *set risk_taker %-10\n                *set health %+15\n                *set luck %+10\n                *set cultural_fetishism %-10\n                *page_break\n                *goto back_to_bus\n        #I asked the vendor how he could bear slaughtering such cute little critters for food.\n\n                He laughed and said they made good eating, that's why. You turned away disgusted, thinking of your childhood pet guinea pig, Humphrey, his rodent chatter echoing across the years.\n            \n                All at once, you looked down at your watch, and your eyebrows shot up: five minutes until departure! You beat it back to the bus with your heart in your chest.\n                *set risk_taker %-5\n                *set luck %+10\n                *set health %+15\n                *set cultural_fetishism %-10\t\n                *page_break\n                *goto back_to_bus\n\n*label nap\nYou awakened from your nap to the [i]ca-chunk[/i] of the bus engine. You had been dreaming about…\n*choice\n        #…all of the accolades I hoped to receive upon my return with knowledge of the City of the Clouds.\n                *if pomposity > 65\n                        That's right! It's about time somebody recognized your genius!\n                        *set fortune_and_glory %+5\n                        *set ruthlessness %+10\n                        *page_break\n                        *goto onto_bus \n                *else\n                        Stay focused, and with a little luck, fortune and glory will be yours!\n                        *set fortune_and_glory %+10\n                        *set ruthlessness %+10\n                        *page_break\n                        *goto onto_bus\n\n        #…pizza.\n                *if ruggedness > 70\n                        Not that you miss pizza or anything. You would much prefer to eat a hunk of half-cooked guinea pig while in the field. Adapt to your surroundings, go local, and succeed!\n                        *set ruthlessness %+10\n                        *set cultural_fetishism %+10\n                        *page_break\n                        *goto onto_bus\n                *else\n                        Yup. Since coming to South America, you would have given your right arm for a calzone. Delicious, melty, inaccessible mozzarella.\n                        *set ruthlessness %-10\n                        *set cultural_fetishism %-10\n                        *goto onto_bus\n        #…getting some sweet loving on a jaguar-skin rug.\n                Seriously. It's been, what, like three or four days since you've gotten any action? You're going crazy here!\n                *set libido %+15\n                *goto onto_bus\n\n*label onto_bus\n\nStill a bit foggy, you moved too slowly, and a wizened old Andean woman stomped on your hand with her boot on her way to the door.\n\nShards! That hurt!\n\nYou scurried in behind her, and the door shut right behind you.\n*goto back_to_bus\n\n*label back_to_bus\nWhew! You took the last window seat next to a wizened old woman just as the driver started up the engine. Trundling through the countryside, you leaned back and gazed out at the fields rolling across the foothills of the Andes. Up above and in the distance, their snowy peaks glinted in the afternoon sunlight.\n\nWith your free time, you decided to…\n\n*if effigy = true\n        *choice\n                #…zone out and file my fingernails while gazing at the scenery.\n                        Preventative measures. Nothing's worse than breaking a nail.\n                        *set health %+5\n                        *set fortune_and_glory %-10\n                        *set ruggedness %-20\n                        *goto border_guards\n                #…attempt to converse with the old woman sitting next to me. You never know where you'll find some good advice.\n                        \"[i]Buenas tardes[/i],\" you said, smiling.\n\n                        She remained silent for a long moment, until you thought she would not respond. Then, seemingly out of nowhere, she spoke up. You jumped at the sound of her voice, low and soft, beside you.\n\n                        \"[i]La Ciudad de las Nubes[/i],\" she said, \"is what you seek. You will find it when the FARC finds you.\"\n\n                        \"What?\" you asked, startled, wondering how she knew so much about your journey.\n\n                        No answer.\n\t\n                        \"What do you mean? What do you know of the City of the Clouds?\"\n\n                        A moment later, she replied, \"Nobody much goes in and nobody ever comes out. The FARC, they cannot set foot there.\" After that, you could not prevail upon her to say another word. She sat immobile and silent as the grave. You looked out the window for a while, lost in thought, and when you turned back around she had disappeared.\n\t\t\n                        Hmm…passing strange.\n\n                        *set networking_skills %+20\n                        *set luck %+5\n                        *set fortune_and_glory %+5\n                        *page_break\n                        *goto border_guards\n                #…study my GPS unit in order to chart the clearest route forward into the mountains.\n                        You are ever on top of your game. It pays to know the lay of the land.\n                        *set fortune_and_glory %+5\n                        *goto border_guards\n                #…take out my illicit artifact and inspect it again.\n                        Beset by fears that it might break at the bottom of your pack, you found yourself checking and rechecking to make sure it remained intact. It must stay hidden, though, well hidden, or all may be lost.\n                        *set luck %-5\n                        *goto border_guards\n*else\n        *choice\n\n                #…zone out and file my fingernails while gazing at the scenery.\n                        Preventative measures. Nothing is worse than breaking a nail.\n                        *set health %+5\n                        *set fortune_and_glory %-10\n                        *set luck %-5\n                        *set ruggedness %-20\n                        *goto border_guards\n                #…attempt to converse with the wizened old woman sitting next to me. You never know where you'll find some good advice.\n                        *if (anti_malarials = true) or (blood_alcohol_level > 80)\n                                \"[i]Buenas tardes[/i],\" you said, smiling. She regarded you with some suspicion but eventually warmed up, offering some unsettlingly prescient advice. Her voice came low and soft beside you.\n\n                                \"[i]La Ciudad de las Nubias[/i],\" she said, \"you will find when the FARC finds you.\"\n\n                                \"What?\" you asked, startled that she could know so much about your journey. \"Wait, what do you mean? What do you know of the City of the Clouds?\"\n\n                                \"Nobody much goes in and nobody ever comes out. The FARC, they cannot set foot there.\" After that, you could not prevail upon her to say another word. She sat immobile and silent as the grave. You looked out the window for a while, lost in thought, and when you turned back around she had disappeared.\n\n                                Hmm…passing strange.\n                                *set networking_skills %+10\n                                *set fortune_and_glory %+5\n                                *set luck %+5\n                                *goto border_guards\n                        *else\n                                \"[i]Buenas tardes[/i],\" you said, smiling. She stared resolutely down at her hands and said nothing.\n\n                                Well, you thought, it was worth a shot anyway.\n                                *set networking_skills %+5\n                                *set luck %-5\n                                *goto border_guards\n                #…study my GPS unit to chart the clearest route forward into the mountains.\n                        You are on top of your game. It pays to know the lay of the land.\n                        *set fortune_and_glory %+5\n                        *set luck %+5\n                        *goto border_guards \n\n*label border_guards\n\nAt the border of Colombia, your bus got waved aside for a search.\n*if ambassador_rage = true\n\n        A burly customs agent boarded the coach. He took one look at your passport, frowned, and gestured curtly for you to come follow him. In the customs office, they stood over you, questioning your story. You told them repeatedly that you were a ${professor} of archaeology out on survey.\n\n        They didn't seem to believe you.\n        *if effigy = true\n                You felt yourself shrinking inside as another steely-eyed customs agent searched your backpack. Your stolen artifact lay at the bottom of your bag, wrapped in an old T-shirt.\n \n                Don't find it, don't find it, don't find it—the refrain ran through your head.\n\n                A moment later, they found it. He pulled out your artifact, held it up, and demanded aggressively to know what you'd been planning to smuggle across the international border.\n\n                You tried to think fast.\n                *choice\n                        #\"It's a, um, a clever replica of my favorite artifact. I carry it with me for luck.\"\n                                The guard looked down at you from a great height.\n\n                                \"Did not bring you very good luck today, did it?\"\n\n                                They confiscated your ${artifact} and told you to return to your bus. You watched one of them slip it into his pocket, no doubt to sell on the black market. Shards! Why on Earth, you wondered, had they flagged your passport?\n         \n                                Before you crossed the threshold of the examining room, you had your answer. The customs officer caught you by the shoulder and whispered in your ear:\n\n                                \"Next time you'd better treat the ambassador's kid with a little more respect, eh, [i]gringo[/i]?\"\n        \n                                Of course! That vindictive, long-armed, nepotistic ambassador set you up at the border! You took solace in the knowledge that her spawn had failed Archaeology 101 on your watch.\n                                *choice\n                                        #I held my tongue and left without a word.\n                                                *set risk_taker %-10\n                                                *set luck %+5\n                                                *goto bus_leaves_Ecuador\n                                        #I attempted to bribe the customs officials so as to prevent further snafus.\n                                                \"Here's a hundred American dollars for your trouble, sir.\"\n\n                                                \"A pleasure doing business with you, ${last_name},\" he said, pocketing the cash. \"I trust this will be the last time.\"\n                                                *set funding %-10\n                                                *set risk_taker %+10\n                                                *set luck %-5\n                                                *set customs_bribe true\n                                                *goto bus_leaves_Ecuador\n\t\t\t\t\n                        #\"Oh, that? It's a looted artifact I recovered from a thief in Quito. I am returning it to Colombia.\"\n                                \"Well, in that case,\" the customs official said, \"you will not mind if we take it off your hands to deliver it ourselves, will you?\"\n\n                                \"Uh, um, no,\" you said. \"You should see that it gets back to its proper owners. I thank you for taking this albatross off my neck.\"\n\n                                He didn't appear to understand your reference. He pocketed your illicit artifact and sent you on your way, no doubt planning to sell it on the black market. Before you crossed the threshold of the examining room, the customs officer caught you by the shoulder and whispered in your ear:\n\n                                \"Next time you'd better treat the ambassador's kid with a little more respect, eh, [i]gringo[/i]?\"\n\n                                Of course! That vindictive, long-armed, nepotistic ambassador set you up at the border! You took solace in the knowledge that her spawn had failed Archaeology 101 on your watch.\n                                *choice\n                                        #I held my tongue and left without a word.\n                                                *set risk_taker %-10\n                                                *set luck %+5\n                                                *goto bus_leaves_Ecuador\n                                        #I attempted to bribe the customs officials so as to prevent further snafus.\n                                                \"Here's a hundred American dollars for your trouble, sir.\"\n\n                                                \"A pleasure doing business with you, ${last_name},\" he said, pocketing the cash. \"I trust this will be the last time.\"\n                                                *set funding %-15\n                                                *set risk_taker %+10\n                                                *set luck %+15\n                                                *set customs_bribe true\n                                                *goto bus_leaves_Ecuador\n\t\t\n                        #\"What? Huh. Who put that there? Fellas, your guess is as good as mine.\"\n                                Okay, so thinking fast has not always been your forte.\n\n                                The customs agent looked at you, a predatory smile creeping over his face. He dismissed the others from the room and closes the door, turning to you. \"You stole this, did you not?\" he said. \"Do not insult my intelligence with an answer. I will let you go, but only if you pay me an appropriate price for your transgressions. Also, you will leave this ${artifact} here with me.\"\n\n                                You didn't really have another option here. You left the customs office without the $100 from your neck pouch and your illicit prize. Shards! Why, you wondered, had they flagged your passport? Before you crossed the threshold of the examining room, you had your answer. The customs officer caught you by the shoulder and whispered in your ear:\n\n                                \"Next time you'd better treat the ambassador's kid with a little more respect, eh, [i]gringo[/i]?\"\n\n                                Of course! That vindictive, long-armed, nepotistic ambassador set you up at the border! You took solace in the knowledge that her spawn had failed Archaeology 101 on your watch.\n                                *choice\n                                        #I held my tongue and left without a word.\n                                                *set risk_taker %-15\n                                                *set luck %+5\n                                                *goto bus_leaves_Ecuador\n                                        #I attempted to bribe the customs officials a second time so as to prevent any further snafus.\n                                                \"Here's another hundred American dollars for your trouble, sir.\"\n\n                                                \"A pleasure doing business with you once again, ${last_name},\" he said, pocketing the cash. \"I trust this will be the last time.\"\n                                                *set funding %-15\n                                                *set risk_taker %+10\n                                                *set luck %+15\n                                                *set customs_bribe true\n                                                *goto bus_leaves_Ecuador\n        *else\n                They questioned you for a full hour.\n                *choice\n                        #I endured with great forbearance and repeated myself as many times as they wanted to hear it. Fighting would have only dug my hole deeper.\n\n                                After a time, without explanation, they let you go free. Pleased but puzzled, you wondered what in the hell had made them flag you in the first place.\n\n                                Before you crossed the threshold of the examining room, you had your answer. The customs officer caught you by the shoulder and whispered in your ear:\n\n                                \"Next time you'd better treat the ambassador's boy with a little more respect, eh, [i]gringo[/i]?\"\n\n                                Of course! That vindictive, long-armed, nepotistic ambassador woman set you up at the border! You took solace in the knowledge that her spawn had failed Archaeology 101 on your watch.\n                                *choice\n                                        #I held my tongue and left without a word.\n                                                *set risk_taker %-10\n                                                *set luck %+5\n                                                *goto bus_leaves_Ecuador\n                                        #I attempted to bribe the customs officials so as to prevent further snafus.\n                                                \"Here's a hundred American dollars for your trouble, sir.\"\n\n                                                \"A pleasure doing business with you, ${last_name},\" he said, pocketing the cash. \"I trust this will be the last time.\"\n                                                *set funding %-15\n                                                *set risk_taker %+10\n                                                *set luck %+15\n                                                *set customs_bribe true\n                                                *goto bus_leaves_Ecuador\n\n                        #I grew sullen and stopped responding to their questions.\n                                Before you left nearly an hour later, one of the officials caught you by the shoulder and whispered in your ear:\n\n                                \"Next time you'd better treat the ambassador's kid with a little more respect, eh, [i]gringo[/i]?\"\n\n                                Of course! That vindictive, long-armed, nepotistic ambassador set you up at the border! You took solace in the knowledge that her spawn had failed Archaeology 101 on your watch.\n                                *choice\n                                        #I held my tongue and left without a word.\n                                                *set risk_taker %-10\n                                                *set luck %+5\n                                                *goto bus_leaves_Ecuador\n                                        #I attempted to bribe the customs officials so as to prevent further snafus.\n                                                \"Here's a hundred American dollars for your trouble, sir.\"\n                        \n                                                \"A pleasure doing business with you, ${last_name},\" he said, pocketing the cash. \"I trust this will be the last time.\"\n                                                *set funding %-15\n                                                *set risk_taker %+10\n                                                *set luck %-15\n                                                *set customs_bribe true\n                                                *goto bus_leaves_Ecuador\n                        #I answered, \"Heck if I can remember…how about you clue me in?\"\n                                The officer punched you in the head, hard enough that your chair clattered to the ground, taking you with it.\n\n                                Wow. Did you really just talk back to a Colombian official wearing fatigues? You basted in your own worry for another twenty minutes when they left you alone in the room, and then, without explanation, they set you free.\n\n                                On your way out, the officer who struck you caught you by the shoulder and whispered in your ear:\n\n                                \"Next time you'd better treat the ambassador's kid with a little more respect, eh, [i]gringo[/i]?\"\n\n                                Of course! That vindictive, long-armed, nepotistic ambassador woman set you up at the border! You took solace in the knowledge that her spawn had failed Archaeology 101 on your watch.\n                                *choice\n                                        #I held my tongue and left without a word.\n                                                *set risk_taker %-10\n                                                *set luck %+5\n                                                *goto bus_leaves_Ecuador\n                                        #I attempted to bribe the customs officials so as to prevent further snafus.\n                                                \"Here's a hundred American dollars for your trouble, sir.\"\n\n                                                \"A pleasure doing business with you, ${last_name},\" he said, pocketing the cash. \"I trust this will be the last time.\"\n                                                *set funding %-10\n                                                *set risk_taker %+10\n                                                *set luck %+15\n                                                *set customs_bribe true\n                                                *goto bus_leaves_Ecuador\n\n*else\n        The customs agents looked over your passport and handed it back to you. You breathed a huge sigh of relief.\n\n        *if effigy = true\n                All you could do while they held your passport was visualize the illicit ${artifact} you kept stashed at the bottom of your bag. You did not relish seeing the inside of a Colombian prison.\n                *goto bus_continues_to_Colombia\n        *else\n                *goto bus_continues_to_Colombia\n\n*label bus_continues_to_Colombia\n\nThe customs officials, all of whom wore fatigues, ended up escorting a frightened-looking man off the bus. As they passed the driver, they whispered something in his ear. Once the officals and their detainee had exited the bus, the driver started up the engine and rolled away, leaving the hapless passenger behind.\n\nDang. You imagined the man felt pretty desolate. You hadn't felt that low since the time…\n*choice\n        #…I got caught smuggling drugs across the Mexican-Guatamalan border.\n                Those were dark days in prison. You fell into a funk just thinking about it as you stared out the window at the passing wall of trees.\n                *set ruggedness %+15\n                *set risk_taker %+15\n                *set luck %-15\n                *goto ongoing_journey\n        #…I got caught eating a bag of chips I hadn't yet paid for in the aisles of my neighborhood grocer.\n                You fell into a funk just thinking about it as you stared out the window at the passing wall of trees.\n                *set ruggedness %-15\n                *set luck %-15\n                *set risk_taker %+5\n                *goto ongoing_journey\n        #…I mourned the death of Lewis Binford, famed processual archaeological theorist, RIP.\n                With him gone, who will hold back the waves of post-modernist drivel? You fell into a funk just thinking about it as you stared out the window at the passing wall of trees.\n\n                *set ruggedness %-10\n                *set intelligence %+10\n                *set risk_taker %-10\n                *goto ongoing_journey\n        #…my most recent student-crush rejected my sexual advances.\n                They don't call them crushes for nothing. You fell into a funk just thinking about it as you stared out the window at the passing wall of trees.\n                *set libido %+10\n                *set luck %-10\n                *set moral_compass %-15\n                *set risk_taker %+10\n                *goto ongoing_journey\n\t\n\t\n*label bus_leaves_Ecuador\nRelieved to find your bus still idling outside, you re-boarded. The passengers all glared at you suspiciously, angered that you held them up for some unknown offense. As you took your seat, the bus jerked forward into Colombia.\n*goto ongoing_journey\n\n*label ongoing_journey\n*if cuy_del_horno = true\n        As the bus rumbled up towards the first mountain village across the border, your stomach began to talk, and it wasn't saying anything nice. The unwelcome taste of [i]cuy del horno[/i] manifested again in your mouth, and you knew things were about to head south.\n        *choice\n                #I beat a quick retreat for the bus bathroom.\n                        After an indeterminate amount of time spent in stenchful misery, you felt the bus roll to a stop, and upon exiting the bathroom and stepping off the bus, you found yourself standing on shaky legs in the town of Ildefonso, Colombia.\n\n                        Apparently a mudslide had blocked the road beyond the town, and it's a good thing or you might have hurled your way to Bogotá!\n                        *set ruggedness %-10\n                        *page_break\n                        *goto Ildefonso\n                #I sat in my seat and hurled into a plastic bag.\n                        Hey, at least you had more space. All the seats around, behind, and in front of you cleared. You stretched out and caught a few nauseated winks of shut-eye before you felt the bus roll to a stop. Exiting the bus, you found yourself standing on shaky legs in the town of Ildefonso, Colombia.\n\n                        Apparently a mudslide had blocked the road beyond the town, and it's a good thing or you might have slept your way to Bogotá!\n                        *set ruggedness %+10\n                        *page_break\n                        *goto Ildefonso\n*else\n        After a moment, you laid your backpack down on the empty seat beside you and laid yourself down on top of it, ensuring the safety of your material posessions while you took a nap. You woke up again, feeling refreshed, as the bus rolled to a stop in the town of Ildefonso, Colombia.\n\n        Apparently a mudslide had blocked the road up ahead in the mountains, and the bus would wait in town until morning when officials could clear the debris.\n        *page_break\n        *goto Ildefonso\n\t\t\n*label pricing_options\n\nMinibuses and taxis lined the street and the back lot adjacent to the station building. Young men and boys stood with one foot on the running boards of the minibuses, calling out to recruit riders.\n*choice\n        #I went straight up to a minibus filled with a seething mass of humanity and chickens—the cheapest ride in town.\n                \"Where to?\" you ask the recruiter.\n                *set ruggedness %+10\n                *set risk_taker %+10\n                *goto mini_bus_again\n        #I found myself an official yellow cab and commissioned a private ride north.\n                The price struck you as a bit steep, but you were willing to pay in order to secure your safety and comfort.\n                *set ruggedness %-10\n                *set funding %-15\n                *set risk_taker %-10\n                *goto taxi_cab\n\n*label mini_bus_again\n\nWhat luck! The bus was heading just across the border to the town of Ildefonso, Colombia. From there, it would be only a few miles into the highlands and the unknown lands beyond.\n\nYou boarded and situated yourself amongst the odiferous crowd of human bodies, barnyard fowl, and bagged pigs. With you inside, the bus met capacity and took off, jostling on an ancient pair of shocks down the rocky road out of town. You had standing room only, but the density of bodies ensured that nobody fell farther than an inch or two in any direction when the minibus lurched and tossed its human cargo about.\n\nAt the border, the driver of the minibus appeared to pay a bribe to the customs agent leaning in the window, and he waved you through.\n\nThen, approximately four miles from your destination, the minibus overheated and stopped on the side of the road.\n\nShards!\n\nIt could be as little as half an hour or as long as four hours before it cooled enough to drive on.\n*choice\n        #I decided to wait it out with the minibus. We were still close to the border of Colombia, and the roads could prove sketchy for travelers.\n            *set intelligence %+10\n            *set risk_taker %-20\n            *set luck %+15\n            *goto wait_time\n        #I decided to walk along the road. A few of the passengers were disembarking, including an old grandpa with his goat. How rough could it be?\n            *set intelligence %-10\n            *set risk_taker %+20\t\n            *set luck %-15\n            *goto walking\n\n*label wait_time\nYour luck held steady: thirty minutes later, the bus sputtered back to life and you coasted the rest of the way into Ildefonso.\n*set luck %+10\n*goto Ildefonso\n\n*label walking\nA mile or so after you passed the old man and his goat, two farmboys-turned-bandits with handguns jumped out of the ditch running along the road. They couldn't have been more than fourteen.\n\nThough young, they certainly appeared threatening, their faces worked into hard masks of malintent.\n\n*if camera = false\n        They demanded your money.\n        *choice\n\n            *if style = \"pockets\"\n                #I reached into one of my many pockets and offered them a bag full of glass trade beads instead.\n                    After a moment of confusion, they rejected your trade bead offer, slapping the bag down to the ground where it spilled open, sending beads rolling across the road in all directions.\n\n                    One of them shoved his sour-breathed face up into yours, held the gun to your head, and patted you down until he found a wad of cash (one of the many you had stashed around your body). He took it—two hundred dollars American—and the two were so pleased and bemused by your first offer of beads that they let you go on your way unharmed.\n                    *set cultural_fetishism %+15\n                    *set intelligence %-15\n                    *set pomposity %+20\n                    *goto Ildefonso\n\n            #I gave them the money I had in my pockets, happy that my neck pouch remained hidden from view beneath my shirt.\n                They took your money and shot the ground at your feet, a not-so-subtle sign for you to make your exit. You trotted off down the road, sweating bullets and hoping your backpack was thick enough to stop any actual bullets aimed at your back.\n                *set intelligence %+15\n                *set risk_taker %-10\n                *set luck %+10\n                *goto Ildefonso\n            #I pointed over their shoulders, and when they looked, I attempted to run away.\n                Somewhat predictably, your plan failed. Your backpack made running too unwieldy. They tackled you almost immediately, took your pocket money and took the money and credit card in your neck pouch, which had come loose from your shirt in the tussle. They let you go with your life, and you hurried off down the road toward Ildefonso, somewhat short on dignity.\n                *set risk_taker %+20\n                *set intelligence %-20\n                *goto Ildefonso\n            #I lied and told them I was already robbed on the minibus. \"[i]Lo siento[/i],\" you shrugged. \"[i]No tengo ni dinero[/i].…\"\n                Perhaps unsurprisingly, they didn't buy it. They patted you down and discovered the wad of cash you kept in your pocket as a diversion from the big bills and credit cards locked away in your neck pouch. With your money in hand, they waved you distractedly away, and you obliged them, darting off down the road.\n                *set risk_taker %+10\n                *set luck %+10\n                *goto Ildefonso\n\t\n*else\n        The thugs demanded your camera. You started to deny owning one, but then you noticed it hung in full view around your neck.\n\n        Whoops.\n        *choice\n            *if style = \"pockets\"\n                #I reached into one of my many pockets and offered them a bag full of glass trade beads instead.\n                    They rejected your trade bead offer out of hand, slapping the bag down to the ground where it spilled open, its gem-like beads rolling across the road.\n\n                    One of them shoved his sour-breathed face up into yours, held the gun to your head, and lifted the camera from around your neck.\n\n                    Confident they had earned a month's wages each with that camera and undoubtedly bemused by your first offer of trade beads—thankfully they hadn't read enough post-colonial theory to feel insulted by your offer—they sent you on your way unharmed.\n                    *set cultural_fetishism %+15\n                    *set intelligence %-15\n                    *set pomposity %+20\n                    *set camera false\t\n                    *goto Ildefonso\n            #I handed them a wad of cash from my pocket in an attempt to buy them off.\n                They took your cash and your camera.\n\n                Well, that was maybe not your most inspired idea. Content with your valuables, they did not shoot you, and that was something, anyway. You trotted away as fast as you thought prudent down the road and out of sight in case they changed their minds.\n                *set intelligence %-15\n                *set camera false\n                *goto Ildefonso\n            #I dropped down to the ground, hugging my knees to my head in a protective, undignified ball around my camera.\n\n                You heard a pregnant pause above you, and you took that moment to reach into your pants pocket and hand them a fat wad of cash—two hundred American dollars—while keeping your head down to the ground.\n\n                One of them swiped the cash from your outstretched hand with sweaty fingers.\n\n                You listened to them discuss for a tense moment up above you, and then heard their footsteps scuff off the dirt road and into the fields beyond. You waited another moment, then got to your feet and went off down the road just as the grandpa crested the hill behind you.\n                *set luck %+30\n                *set risk_taker %+10\n                *goto Ildefonso\n\n            #I handed them the camera.\n                There was no point in resisting. One man with sour breath and a blackened front tooth moved forward and lifted the camera off your neck. He backed up and inspected it with his partner in crime. They looked at you and laughed, lifting your camera in the air.\n    \n                \"¡[i]Gracias, amigo[/i]!\" one said, as they moved off into the field.\n\n                You muttered darkly under your breath and headed down the road toward Ildefonso, one camera lighter.\n                *set risk_taker %-10\n                *set camera false\t\n                *goto Ildefonso\n\n*label taxi_cab\nYou swatted away several unsolicited offers for rides in unmarked cars, loaded your bag into the trunk of the cab, and slid onto the back seat. The driver pulled pugnaciously out of the crowd, but only with much honking of his horn and shaking of his fist. You felt relief as the taxi pulled free of the crowd and onto the main street out of town.\n\nThe front dash of the taxi was a shrine to the Virgin Mary, and the back of the cab smelled like cheap cigars.\n\nYou tried to unroll the window via the crank on the side door, but the crank broke off in your hand.\n \n*choice\n        #I hid the crank and said nothing to the driver about property damage.\n                When he heard the crack, his eyes flicked questioningly in the front-view mirror, and you smiled back your most innocent smile.\n\n                Nothing the matter back here…nothing at all.\n                *set moral_compass %-5\n                *goto bodies_again\n        #I tried to set it back into place…maybe if I just twisted it back on counter-clockwise…\n                It hung on, but just barely, cocked awkwardly at a tell-tale angle.\n\n                Maybe he wouldn't notice.\n                *set moral_compass %-5\n                *goto bodies_again\n        #I abashedly admitted that I broke the crank and apologized.\n                The driver said nothing for a long time, but you could feel him seething in the front seat. You offered to have him charge you extra for the cost of repairs, and he barked that he would not do otherwise.\n\n                \"We must all pay for our mistakes!\"\n\n                Okay, that sounded ominous…so the guy had a temper and seemed really attached to his window crank. Duly noted. You'd best mind your P's and Q's for the rest of the ride.\n                *set moral_compass %+10\n                *goto bodies_again\n\n*label bodies_again\nThe ride turned tense. Judging from the sound of his hands gripping and un-gripping the steering wheel, something about you had ruffled the taxi driver's feathers.\n\nAt the border crossing, he blew through without slowing down, but nobody seemed to notice. That seemed odd. You considered commenting but thought better of it. After a bit, his eyes appeared again in the mirror, staring you down.\n\n\"Hey,\" he said, \"you say you're an archaeologist? Do you find bodies when you dig?\"\n\nA loaded question if you'd ever heard one.\n*choice\n        *if (moral_compass \u003c 60) and (cultural_fetishism \u003c 50)\n                #Why censor myself? I told him about the time I accidentally put a pickaxe through a human skull.\n                        It happened that summer you spent in Turkey working at Çatalhöyük.\n                        *if intelligence > 70\n                                You sometimes find it exhausting to discuss the technical details of your work with the educationally disadvantaged, and so to avoid any long-winded explanations, you kept it simple: there was an axe, it collided with a skull. \"And that,\" you said, deadpan, \"was the last time anyone let me break ground at Çatalhöyük.\"\n                                *set social_networking %-15\n                                *set moral_compass %-5\n                                *page_break\n                                *goto bad_relations_again\n                        *else\n                                Hey, how were you supposed to know he was buried beneath the house floor?\n\n                                *set social_networking %-10\n                                *set moral_compass %-5\n                                *page_break\n                                *goto bad_relations_again\n\n        #I lied through my teeth. \"Nope. Never dug up any human bodies…exhumation always seemed so, um, disrespectful.\"\n\n                *set intelligence %+10\n                *set social_networking %+10\n                *set moral_compass %-10\n                *page_break\n                *goto ok_relations_again \n        #\"Well, yes, I've encountered human remains in the past, but I've always made sure to return them respectfully to the ground. I also make sure to invite all the descendants I can locate to participate in the reburial.\"\n\n                *set moral_compass %+10\n                *page_break\n                *goto good_relations_again\n\n*label bad_relations_again\nLuckily, you were coming up on the outskirts of a town, because the cab driver didn't find your story amusing in the slightest. He swerved to the side of the road in a vertical spray of dust, jumped out and ripped open your door, ordering you out of his taxi.\n\nMental note: never tell the pickaxe story to another stranger.…\n*if (blood_alcohol_level > 70) or (anti_malarials = true)\n        As you watched from the back seat, stunned, a dust devil blowing off the road engulfed your taxi driver where he stood.\n\n        When it dissipated, the man had transformed into a fearful apparition wearing an Incan tunic and a feathered headress, holding a war club in one hand and a chicken under the crook of his arm. His body flickered as if lines of static were racing up and down through an old projection.\n\n        \"Mortal!\" he boomed in a deep baritone. \"You have no respect for the dead. Know this: if you do not change your attitude, dark things will befall you. Dark things, ${first_name} ${last_name}, dark things…\"\n\n        Though rather flummoxed by the whole apparition thing, your scientist core remained inquisitive. You asked:\n        *choice\n                #\"What about it? How do I find the City of the Clouds?\"\n                        Ever-focused on your mission of discovery. It did no good here. You received no answer.\n                        *set fortune_and_glory %+10\n                        *set intelligence %+10\n                        *goto apparition_blows_away_away\n                #\"Wait a second…how the hell did you do that?\"\n\n                        The apparition made no reply.\n                        *set fortune_and_glory %-10\n                        *goto apparition_blows_away_away\n                #\"Hey! Does this mean I don't have to pay you?\"\n                        You received no answer.\n                        *set fortune_and_glory %+10\n                        *goto apparition_blows_away_away\n\n*else\n        \"No respect for the dead,\" he was shouting. \"Get out of my car, gravedigger! Out!\" He paused as you pushed yourself awkwardly past him, planting your feet on the dirt road. Once you had exited the cab, he lowered his voice.\n\n        \"You will not go, however,\" he said, \"before paying me what you owe in cab fare.\"\n\n        Mostly wanting to get away from this crazy, you pulled out the amount agreed upon, never mind the fact that he'd stopped well short of your destination. You asked him to open the trunk so that you could collect your backpack. He counted your money, then looked at you with a half-smile.\n        \n        \"The fee to open the trunk is fifty U.S. dollars.\"\n        *choice\n                *if ruggedness > 75\n                    #Extortion? Not on my watch. I attacked him.\n                        Instinct kicked in. You rushed at him, and with the element of surprise you were able to knock him down and steal his keys. You popped the trunk and grabbed your bag before he'd fully recovered. You walked quickly down the road toward Cui while he cursed your name, half-expecting to take a bullet in the back.\n                        *set risk_taker %+15\n                        *page_break\n                        *goto Ildefonso\n                #I paid him the money from my neck pouch and let it go. I didn't want any trouble.\n                        Payment complete, you resentfully reclaimed your backpack and started on the path that led down the valley and into Cui.\n\n                        As you walked away, you heard him saying something about you walking blindly towards your doom.\n\n                        You ignored him. I mean, what a jerk!\n                        *set funding %-10\n                        *set risk_taker %-15\n                        *goto Ildefonso\n                #I paid him what he asked, but I also wrote down his taxi number when he turned his back, so that I could lodge a complaint later with the Ecuadorian police.\n                        Satisfied that you would have the last laugh, you strolled down the valley into Cui.\n                        *set funding %-10\n                        *set risk_taker %-15\n                        *goto Ildefonso\t\n\n*label apparition_blows_away_away\n\nWithout another word from the Incan Genie, a dust devil rose up from the earth and both the apparition and the taxicab evaporated into thin air. You found yourself deposited on your ass in the middle of the dirt road with your backpack lying two feet behind you.\n\nShards! That was some crazy shit. There to your left lay the broken-off arm of the window crank, which didn't make you feel any more sane as you walked toward town.\n*set premonition true\n*page_break\n*goto Ildefonso\n\n*label ok_relations_again\n\nHe pulled over just on the edge of what you took to be Ildefonso. Before you got out of the car, he turned around and leveled a finger in your face.\n*if (blood_alcohol_level >75) or (anti_malarials = true)\n\n        About that time, reality sprung a leak.\n\t\n        You blinked, trying to clear your vision of the impossibility unfolding before you. Your erstwhile taxi driver seemed to flicker a little bit before your eyes as he waggled his finger, as if his body were a projection afflicted by static interference. On his head perched an Incan-style headdress, exploding with the feathers of tropical birds.\n\n        \"You lie, ${first_name} ${last_name},\" the apparition pronounced. \"You have plundered many a grave and analyzed many a human femur in the name of your science. I tell you now: whatever depredations you have inflicted upon the indigenous peoples of the world, do not rob graves from this place, or dark things will befall you. Dark things…\"\n\t\n        Though rather flummoxed by the whole apparition thing, your scientist core remained inquisitive. You asked:\n        *choice\n                #\"What about it? How do I find the City of the Clouds?\"\n                        Ever-focused on your mission of discovery. It did no good here. You received no answer.\n\n                        Instead of addressing your query, the Incan tossed the chicken in your direction, calling, \"Take this chicken—it will help you in your quest. Take it, mortal, and go!\"\n                        *set fortune_and_glory %+10\n                        *set intelligence %+10\n                        *goto apparition_blows_away_two_two\n                #\"Wait a second…how the hell did you do that?\"\n                        From childhood you have remained deeply skeptical of magicians. In your opinion, it's all a lot of flim-flam.\n\n                        Instead of addressing your query, the Incan tossed the chicken in your direction, calling, \"Take this chicken—it will help you in your quest. Take it, mortal, and go!\"\n                        *set fortune_and_glory %-10\n                        *goto apparition_blows_away_two_two\n                #\"Hey, does this mean I don't have to pay you?\"\n                        Instead of addressing your query, it tossed the chicken in your direction, calling, \"Take this chicken—it will help you in your quest. Take it, mortal, and go!\"\n                        *set fortune_and_glory %+10\n                        *goto apparition_blows_away_two_two\n*else\n        The driver hauled over to the side of the road and started flipping out.\n\n        \"No respect for the dead,\" he was shouting. \"Get out of my car, gravedigger! Out!\"\n\n        He paused as you pushed yourself awkwardly past him, planting your feet on the dirt road. Once you had exited the cab, he lowered his voice.\n\n        \"You will not go, however,\" he said, \"before paying me what you owe in cab fare.\"\n        \n        Mostly wanting to get away from this crazy, you pulled out the amount agreed upon, never mind the fact that he'd stopped well short of your destination. You asked him to open the trunk so that you could collect your backpack. He counted your money, then looked at you with a half-smile.\n\n        \"The fee to open the trunk is fifty U.S. dollars.\"\n        *choice\n                #I paid him the money from my neck pouch and let it go. I didn't want any trouble.\n                        Payment complete, you resentfully reclaimed your backpack and started on the path that led down the valley and into Ildefonso.\n\n                        As you walked away, you heard him saying something about you walking blindly towards your doom.\n\n                        You ignored him. I mean, what a jerk!\n                        *set funding %-10\n                        *set risk_taker %-15\n                        *goto Ildefonso\n                #Extortion? Not on my watch. I attacked him.\n                        Instinct kicked in. You rushed at him, and with the element of surprise you were able to knock him down and steal his keys. You popped the trunk and grabbed your bag before he'd fully recovered. You walked quickly down the road toward Cui while he cursed your name, half-expecting to take a bullet in the back.\n                        *set risk_taker %+15\n                        *goto Ildefonso\n                #I paid him what he asked, but I also wrote down his taxi number when he turned his back, so that I could lodge a complaint later with the Ecuadorian police.\n                        Satisfied that you would have the last laugh, you strolled down the valley into Ildefonso.\n                        *set funding %-10\n                        *set risk_taker %-15\n                        *goto Ildefonso\t\n\n*label apparition_blows_away_two_two\nWith that, the driver and the taxicab both evaporated into thin air, and you found yourself deposited on your ass in the middle of the dirt road with your backpack lying two feet behind you. There to your left lay the broken-off arm of the window crank and a chicken, scratching dazedly around in the dust.\n\nWhile you dithered in the road, the chicken darted away into the fallow field to your right.\n\n*if extras = \"birds\"\n        You let it go. Hopefully, that bird won't prove to be very important down the road. Birds freak you the hell out. You pushed to your feet and walked dazedly down the road toward town.\n        *set premonition true\n        *page_break\n        *goto Ildefonso        \n*else\n        Well, you thought, as anti-malarially induced psychotic episodes go, it could have been worse. You pushed to your feet, caught the chicken, roped it with a bit of peacord around its neck, and walked with it dazedly down the road toward town.\n        *set chicken true\n        *set premonition true\n        *page_break\n        *goto Ildefonso\n\n*label good_relations_again\n\nHe pulled over just on the edge of what you took to be Ildefonso.\n*if (blood_alcohol_level > 75) or (anti_malarials = true)\n        He gripped the back of the passenger seat, anchoring his body as he twisted around to complete your transaction. You blinked in surprise. Seemingly out of nowhere he wore a…was that an Incan headdress?! Holy Grail!\n\n        His body seemed to flicker before you, as if lines of static coursed up and down from his head to his feet. Beneath his left arm he held a chicken, a scraggly bird that squirmed and kicked, looking at least as alarmed as you felt.\n\n        \"Hear me, ${first_name} ${last_name}: Your science is not all there is to the laws of the universe! Your true fate may be made known to you in time, but I tell you this now—you MUST NOT STEAL from the dead of the City of the Clouds or dark things will befall you!\"\n\n        Though rather flummoxed by the whole apparition thing, your scientist core remained inquisitive. You asked:\n        *choice\n                #\"What about it? How do I find the City of the Clouds?\"\n                        \"You will find what you seek when the FARC find you,\" it replied. \"Now take this chicken. It will aid you on your quest. Take it and go!\"\n\n                        *set fortune_and_glory %+10\n                        *set intelligence %+10\n                        *goto apparition_blows_away_three_three\n                #\"Wait a second…how the hell did you do that?\"\n                        From childhood you have remained deeply skeptical of magicians. In your opinion, it's all a lot of flim-flam.\n\n                        The apparition did not address your query. Instead the Incan said, \"Now take this chicken. It will aid you on your quest. Take it and go!\"\n\n                        *set fortune_and_glory %-10\n                        *goto apparition_blows_away_three_three\n                #\"Hey, does this mean I don't have to pay you?\"\n                        Sweet. Mo' money in your pocket.\n\n                        The apparition did not address your query. Instead, the Incan said, \"Now take this chicken. It will aid you on your quest. Take it and go!\"\n                        *set fortune_and_glory %+10\n                        *goto apparition_blows_away_three_three\n*else\n        You paid the discussed fee and asked for your backpack.\n\n        \"No respect for the dead,\" he was shouting. \"Get out of my car, gravedigger! Out!\" He paused as you pushed yourself awkwardly past him, planting your feet on the dirt road. Once you had exited the cab, he lowered his voice. \"You will not go, however,\" he said, \"before paying me what you owe in cab fare.\"\n\n        Mostly wanting to get away from this crazy, you pulled out the amount agreed upon, never mind the fact that he'd stopped well short of your destination. You asked him to open the trunk so that you could collect your backpack. He counted your money, then looked at you with a half-smile.\n\n        \"The fee to open the trunk is fifty U.S. dollars.\"\n        *choice\n                *if ruggedness > 75\n                        #Hell, no. I decided to attack him.\n\n                                Instinct kicked in. You rushed at him, and with the element of surprise you were able to knock him down and steal his keys. You popped the trunk and grabbed your bag before he'd fully recovered. You walked quickly down the road toward Ildefonso while he cursed your name, half-expecting to take a bullet in the back.\n                                *set risk_taker %+15\n                                *page_break\n                                *goto Ildefonso\n                #I paid him the money from my neck pouch and let it go. I didn't want any trouble.\n                        Payment complete, you resentfully reclaimed your backpack and started on the path that led down the valley and into Ildefonso.\n\n                        As you walked away, you heard him saying something about you walking blindly towards your doom. \n\n                        You ignored him. I mean, what a jerk!\n                        *set funding %-10\n                        *set risk_taker %-15\n                        *page_break\n                        *goto Ildefonso\n                #I paid him what he asked, but decided to lodge a complaint later with the Ecuadorian police.\n                        When he turned his back, you jotted down his taxi license number on the back of your hand. Satisfied that you would have the last laugh, you strolled down the valley into Ildefonso.\n                        *set funding %-10\n                        *set risk_taker %-15\n                        *page_break\n                        *goto Ildefonso\t\n \n*label apparition_blows_away_three_three\nWith that, the driver and the taxicab both evaporated into thin air, and you found yourself deposited on your ass in the middle of the dirt road with your backpack lying two feet behind you. There to your left lay the broken-off arm of the window crank and a chicken, scratching dazedly around in the dust.\n\nWhile you dithered in the road, the chicken darted away into the fallow field to your right.\n\n*if extras = \"birds\"\n        You let it go. Hopefully, that bird won't prove to be very important down the road. Birds freak you the hell out. You pushed to your feet and walked dazedly down the road toward town.\n        *set premonition true\n        *page_break\n        *goto Ildefonso        \n*else\n        Well, you thought, as anti-malarially induced psychotic episodes go, it could have been worse. You pushed to your feet, caught the chicken, roped it with a bit of peacord around its neck, and walked with it dazedly down the road toward town.\n        *set chicken true\n        *set premonition true\n        *page_break\n        *goto Ildefonso\n\n*label Ildefonso\n\nThe shadows had lengthened as afternoon slid on towards evening. A quick read on your GPS suggested the town could be an excellent jumping-off point for your journey on foot. You decided to stay the night and start off in the morning.\n\nThe modest settlement consisted of a few paltry-sized shacks built of mud plaster and capped with corrugated tin roofs. Two sad-looking [i]tiendas[/i], general stores, appeared towards the edge of town.\n\nNext to the stores sat the bar. A low, long building, the bar contained a handful of Colombians from the road with a few [i]centavos[/i] to spend, and another handful of pale-faced foreigners.\n\nYou went inside, sat down at a table and ordered a beer. It came to you warm.\n*goto bar_beer\n\n*label bar_beer\nSniffing the bottle, you caught the faint whisper of weak hops, lightly skunked.\n*choice\n        #My stomach is strong. I downed it anyway and asked for another.\n                Experience has taught you that by the bottom of the third beer, quickly consumed, taste no longer matters.\n                *set blood_alcohol_level %+10\n                *set health %-15\n                *page_break\n                *goto expats\n        #I nursed it slowly, saving money and brain cells.\n                *set blood_alcohol_level %-10\n                *set health %+15\n                *page_break\n                *goto expats\n        #I rejected the beer. I'm not going to drink for the sake of drinking.\n                *set blood_alcohol_level %-20\n                *set health %+15\n                *page_break\n                *goto expats\n\n*label expats\n\nThe bar was crowded due to the mudslide.\n\nA table of youngish-looking expats in the corner caught your attention.\n\nThey had the hodgepodge look of travelers who had met up at different parts of the journey, each one glomming onto the group in Honduras or Ecuador or wherever else they had just come from. The dreadlock ratio among them sat at one in three.\n*if (extras = \"sex_addiction\") or (libido > 75)\n        You felt yourself starting to get turned on at the prospect of getting some anonymous action this evening.\n        *if preference = \"women\"\n                One dreadlocked woman actually winked at you from across the room. Who does that anymore? Maybe she's European.\n                *choice \n                        #I winked right back.\n                                *set risk_taker %+10\n                                *set ruggedness %-10\n                                *set social_networking %+10\n                                *set the_stud \"her\"\n                                *set she_stud \"she\"\n                                *set hippie_wink true\n                                *goto go_on_over\n                        #I caught her eye and held it for a moment before looking away.\n                                *set risk_taker %+5\n                                *set ruggedness %+10\n                                *set social_networking %+10\n                                *set the_stud \"her\"\n                                *set she_stud \"she\"\n                                *set hippie_wink true\n                                *goto go_on_over\n                        #I turned away quickly. I was in no mood for complications.\n                                *set risk_taker %-10\n                                *set ruggedness %+5\n                                *set social_networking %-10\n                                *set the_stud \"her\"\n                                *set she_stud \"she\"\n                                *set hippie_wink true\n                                *goto go_on_over\n        *else\n                Did your eyes deceive you or did that dreadlocked stud wink at you from across the room? I mean, who does that anymore? Maybe he's European.\n                *choice\n                        #I winked right back.\n                                *set risk_taker %+10\n                                *set ruggedness %-10\n                                *set social_networking %+10\n                                *set the_stud \"him\"\n                                *set she_stud \"he\"\n                                *set hippie_wink true\n                                *goto go_on_over\n                        #I caught his eye and held it for a moment before looking away.\n                                *set risk_taker %+5\n                                *set ruggedness %+10\n                                *set social_networking %+10\n                                *set the_stud \"him\"\n                                *set she_stud \"he\"\n                                *set hippie_wink true\n                                *goto go_on_over\n                        #I turned away quickly. I was in no mood for complications.\n                                *set risk_taker %-10\n                                *set ruggedness %+5\n                                *set social_networking %-10\n                                *set the_stud \"him\"\n                                *set she_stud \"he\"\n                                *set hippie_wink true\n                                *goto go_on_over\n*else\n        You wondered if they would accept a stranger into their midst.\n        *goto go_on_over\n\n*label go_on_over\nAfter a moment, you walked across the room and introduced yourself to the group.\n\n\"Hey, I'm ${first_name}.\"\n\nThey went around in a circle, saying their names. One, the apparent leader of the group, introduced himself as Barry. He had a heavy brow and a smarmy look.\n\nYou disliked him immediately.\n\t\n\"Well, ${first_name},\" Barry said, turning his back to you, \"we'd ask you to sit down with us, but as you can see, we're a bit tight on chair space. Sorry.\"\n\n\"Uh, no problem,\" you replied.\n\nClearly, Barry didn't want you to stick around. You held your ground.\n\n\"I'll just stand up for a while, if it's all the same to you.\"\n\nIt felt a bit awkward just standing there, and after a beat you decided to break the ice Barry had frozen solid.\n*choice\n        *if social_networking > 65\n                #I channeled Indiana Jones, telling them winningly about my search for a lost city in the jungle.\n                        They all seemed suitably impressed. Raised eyebrows and nods of approval all around.\n                        *if (beer_in_pack = true) or (secret_weapon = \"scotch\") \n                                *goto alcohol_offer\n                        *else \n                                *goto hippie_story\n\n        #I channeled the weatherman. \"So, uh, how about this rainy season?\"\n\n                Shrugs all around.\n\n                You're not exactly selling yourself here.…\n                *if (beer_in_pack = true) or (secret_weapon = \"scotch\") \n                        *goto alcohol_offer\n                *else \n                        *goto hippie_story\n\n        #I told them a stupid joke.\n                \"Hey,\" you asked, \"did you hear about that circus fire?\"\n    \n                \"No,\" Barry said. \"Where, in Colombia?\"\n\n                \"I don't remember exactly where,\" you replied, \"but I heard it was 'in-tents'!\"\n\n                They all stared at you.\n\n                Barry informed you that they were a roving band of acrobats.\n\n                \"Listen,\" he said, \"circus fires are no laughing matter.\"\n                *if (beer_in_pack = true) or (secret_weapon = \"scotch\") \n                    *goto alcohol_offer\n                *else \n                    *goto hippie_story\t\n\n*label alcohol_offer\n*if beer_in_pack = true\n        It was then that you remembered the gourmet bottle of stout you had stashed in your backpack. Reflecting that appreciative palates might not come along again (and that your back hurt like heck from all the beer weight), you pulled it out, popped it, and passed it around under the table so as to avoid pissing off the bartender. The carnies drank it all and lightened up after that.\n\n        \"Hey,\" Barry said, obviously pleased, \"you're all right! I haven't had any beer fit to drink in months.\"\n        *set beer_in_pack false\n        *goto hippie_story\n\n*elseif secret_weapon = \"scotch\"\n        It was then that you remembered the nips of scotch you had stashed in your backpack. Reflecting that appreciative palates might not come along again (and that your back hurt like heck already), you decided to lighten your load and pulled a few out, passing them around under the table so as to avoid pissing off the bartender. The carnies all lightened up immediately.\n\n        \"Hey,\" Barry said, \"you're all right.\"\n        *goto hippie_story\n\n*label hippie_story\n\nShortly, you learned that they had also come from Quito earlier that day by minibus. The group had worked for six weeks in a local circus just outside of the city and got stuck in Ildefonso due to the landslide blocking the road to Bogota. They had hoped to make it there in time to join up with a traveling carnival, but now things didn't look good, and they were short on cash and patience.\n*if chicken = true\n        Barry noticed your leashed chicken and pointed.\n\n        \"Uh, what's with the bird?\"\n\n        Not wanting to tell him about your Inca vision, you said, \"It's, uh, in case I get hungry down the road. I'm not much of a hunter.\"\n\n        He gave you an odd look and didn't inquire further.\n        *goto beer_total\n\n*else\n        *goto beer_total\n\n*label beer_total\nAs you leaned against the wall chatting it up for the next few hours, several people offered to buy you beers. In the end, you consumed a grand total of…\n*choice\n        #…no beers. I flat-out refuse to drink skunked beer.\n                *set social_networking %-10\n                *set blood_alcohol_level %-25\n                *goto safe_sleep\n        #…two skunked beers.\n                *set social_networking %+15\n                *set health %+5\n                *set blood_alcohol_level %+5\n                *goto safe_sleep\n        #…five skunked beers.\n                *set health %-5\n                *set social_networking %+15\n                *set blood_alcohol_level %+10\n                *goto stay_up\n        #…seven or eight skunked beers. Who knows? I lost count.\n                *set health %-10\n                *set social_networking %+10\n                *set blood_alcohol_level %+25\n                *goto stay_up\n\n*label safe_sleep\n\nAfter a while, you felt yourself overcome with the need to sleep and decided your best bet was to curl up in a ball on the floor of the tavern to await morning travel. After all, the roads were uncertain at best in those parts. Thieves, you reasoned, would be less likely to act in the lighted presence of a bar.\n\nYou excused yourself, flopped down over your backpack, and conked out straightaway.\n\nIn the morning you awoke, creaking but refreshed, and hit the road.\n*set health %+10\n*finish\n\n*label stay_up\nAfter all of those beers, you got pretty jazzed up.\n*if hippie_wink = true\n\n        Flush on alcohol, you fixated on the dreadlocked hippy of the group who had given you such come-hither looks earlier in the evening, and you propositioned a walk outside. After accepting your offer, the two of you left together, your arm wrapped tightly about ${the_stud}.\n        *if (beer_in_pack = true) or (secret_weapon = \"scotch\")\n                You woke up the next morning alone in the bracken with your pants in a nearby bush. You pulled on your pants, shouldered your pack and slapped through the underbrush back to the road to start your journey on foot.\n                *set health %-10\n                *set social_networking %+10\n                *finish\n        *else\n                You never saw who hit you, but when you came to the next morning, all of your money was gone and you had a painful knot on your head the size of a Puebloan seed pot.\n \n                Robbed!\n\n                An unfortunate loss, certainly, but then, money won't be much use from here on out anyhow.\n\n                Thankful that they took only your money and nothing else of real importance from your pack, you shouldered your load unsteadily and headed on down the road.\n                *set health %-10\n                *set intelligence %-10\n                *set funding %-20\n                *finish\n\n*else \n        You partied with the group all night and headed out bright and early, sleepless and still a little bit drunk.\n        *set health %-10\n        *set social_networking %+10\n        *set intelligence %-10\n        *finish\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n        *label purchased\n        *return\n*temp should_trial_end false\n*if choice_is_steam\n        *set should_trial_end true\n*if choice_prerelease\n        *set should_trial_end true\n*if choice_randomtest\n        *set should_trial_end true\n\n*if not(should_trial_end)\n        *return\n        \nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n        *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2020-04-29 $4.99 $2.99 purchased\n*abort\n", "farc_four": "And so, ${first_name} ${last_name}, here you are: back where our story began.\n\n*if dan_site = true\n    Having secured your grant, navigated your way through Dan's den of iniquity, and crossed over into the f
