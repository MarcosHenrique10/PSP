 the mountainside. Besides, given the vagaries of archaeological funding, there's no telling when you'll have this much disposable income again.\n        *set color \"green\"\n        *set risk_taker %-5\n        *set pomposity %+15\n        *set ruggedness %+5\n        *set luck %+5\n        *set funding %-15\n        *set health %+10\n        *page_break\n        *goto gear\n    #…electric blue.\n        Excellent choice. Hardly anything in nature is blue. This will help you to stand out against the earth tones of the countryside. That way, if things go bad, you can get rescued from above.\n\n        Indeed, no detail is trivial when one prepares for an expedition of this sort. Once you leave civilization behind, there's no second-guessing your choices, no vendors selling excess techie gear on the mountainside. Besides, given the vagaries of archaeological funding, there's no telling when you'll have this much disposable income again.\n        *set color \"blue\"\n        *set risk_taker %-5\n        *set funding %-15\n        *set luck %+20\n        *set health %+10\n        *page_break\n        *goto gear\n    #…black.\n        Johnny Cash knew best. Black never goes out of style.\n\n        Indeed, no detail is trivial when one prepares for an expedition of this sort. Once you leave civilization behind, there's no second-guessing your choices, no vendors selling excess techie gear on the mountainside. Besides, given the vagaries of archaeological funding, there's no telling when you'll have this much disposable income again.\n        *set color \"black\"\n        *set ruggedness %+5\n        *set funding %-15\n        *set health %+10\n        *set luck %+5\n        *page_break\n        *goto gear\n    #…red, but funding or no funding, my penny-pinching heart couldn't pay the price. I left it on its hanger and walked away.\n\n        You convinced yourself to be satisfied with your old, not-so-waterproof red windbreaker at home.\n\t\n        Cheap? You prefer the word \"frugal.\"\n        *set ruggedness %+15\n        *set health %-15\n        *set luck %-5\n        *set color \"red\"\n        *page_break\n        *goto gear\n\n*label gear\n\nYou took out a pen and paper, jotted down the other necessities, and with the promise of imminent reimbursement you sallied forth and began to accumulate your small mountain of extremely compressible field gear. All this must fit on your back where you're going, far, far away from civilization. You'd always heard that the load on a packer's back should not exceed thirty percent of their body weight.\n\n*choice\n    #It's a good thing I've bulked up lately at the gym. I could easily afford to strap on a folding chair and stash a twelve-pack of beer in my bedroll!\n        After years of archaeological field schools, you, like all of your colleagues, have undergone Pavlovian conditioning to expect a brew at the end of a long day of survey, and let's face it, Colombia is not known for their IPAs. The only question is: how many six-packs can you take with you into another country without violating some kind of international trade law?\n        *set blood_alcohol_level %+15\n        *set ruggedness %+10\n        *set beer_in_pack true\n        *page_break\n        *goto packing\n    #Unfortunately, my once quite serviceable muscles have atrophied thanks to long hours in the basement lab and the archives. Guess I'll have to do without my French press.\n        Life without ground coffee will indeed be dismal in any circumstances, and to suffer that fate in the heart of coffee country…well, suffice it to say, the irony leaves a bitter taste in your mouth.\n\n        French press or no, it's highly unlikely that villagers in the highlands will have any coffee themselves. As a student of structural Marxism, you know that commodities in the capitalist system funnel away from the producers and into the hands of the bourgeoisie in the cities. In short, you have been condemned by the evils of market capitalism to imbibe Folger's Flavor Crystals.\n        *set ruggedness %-10\n        *set moral_compass %+20\n        *page_break\n        *goto packing\n    #I rarely follow directions, and I'm pretty sure that I can handle more than thirty percent. I'll just be sure to add a couple of Ace bandages to wrap my knees if necessary (not that I'll need to).\n        You'd bet those weight ratios were aimed at the lowest common denominator, and that is most definitely not you!\n        *set risk_taker %+20\n        *set pomposity %+10\n        *page_break\n        *goto packing\n    #I've filled out a little bit this year and doubt that belly fat factors into that percentage. Oh well. I'm still not leaving home without my sixteen-piece set of nesting non-stick cookware.\n        What is camping without a little bit of gourmet action? Archaeologists, like armies, march on their stomachs. With all the traditional recipes you'll gather and the fresh local ingredients at country markets, you would be a fool not to come prepared with the right equipment. You're a firm believer that to experience regional cuisine is to get to the heart of its culture.\n        *set ruggedness %-15\n        *set cultural_fetishism %+10\n        *page_break\n        *goto packing\n\n*label packing\n\nAfter a full day of packing and unpacking, and doing it all again, you'd finally hit upon the right weight and balance on your back. You stood, ready to go…a full month before your scheduled departure.\n\nOh, how you longed to escape the spring semester…why did you ever agree to serve as chair for all of the ${meetings} meetings?\n\nWorst of all, between you and your flight south, you still faced two hundred student papers to grade. Their abominable writing and deplorable scientific arguments haunt your dreams to this day.\n\nDid those cretins hear nothing you said in class?\n\nAll things considered, you graded them…\n*choice\n    #…mercifully.\n        *if moral_compass > 70\n            You're a softy at heart (and are loath to raise the ire of the department head by failing the bunch of half-wits). As bad as they were, you're not there to crush any spirits. You want them to take away a positive feeling from the first, and for most of them, only archaeology class they'll ever take. By the looks of their intellects, they aren't bound for academia anyhow. \n            *set moral_compass %+15\n            *set ruthlessness %-15\n            *set pomposity %-5\n            *set luck %+15\n            *page_break\n            *goto Mexico\n        *else\n            You're nothing if not magnanimous. Not everyone, after all, can expect to be as brilliant as you. Plus, you're loath to raise the ire of the department head by failing the sorry bunch of Neanderthals.\n            *set moral_compass %+5\n            *set ruthlessness %-10\n            *set pomposity %+5 \n            *set luck %+15\n            *page_break\n            *goto Mexico  \n    #…lazily.\n        *if moral_compass \u003c 70\n            After a while, you stopped trying to read their brain mush and started skimming for grammar as a proxy for quality work. Those who displayed one coherent sentence per paragraph earned a decent mark.\n            *set moral_compass %-15\n            *set pomposity %+10    \n            *set luck %+15\n            *page_break\n            *goto Mexico\n\n        *else\n            You felt pretty guilty for short-changing the highest-achieving students as you skimmed over their work along with the rest of the Neanderthals in class, but the fact was, you didn't have time to split hairs—you had a research expedition to organize!\n            *set moral_compass %-5\n            *set pomposity %+5\n            *set luck %+15\n            *page_break\n            *goto Mexico\n    #…wrathfully.\n        *if (extras = \"sex addict\") or (libido > 70)\n            Nobody did the reading. Nobody participated in class. Office hours were long and lonely. In your head, a refrain: none shall pass…except maybe for the student you slept with for the second half of the semester.…\n            *set moral_compass %-15\n            *set ruthlessness %+10\n            *set libido %+5\n            *set luck %-15\n            *page_break\n            *goto ambassador\n        *else\n            Nobody did the reading. Nobody participated in class. Office hours were long and lonely. In your head, a refrain: none shall pass.…\n            *set moral_compass %-5\n            *set ruthlessness %+15\n            *set luck %-15\n            *page_break\n            *goto ambassador\n\n*label ambassador\nLaying down the law felt good until you discovered that the son of the Colombian ambassador had taken your class this semester. And failed.\n\nSeriously?\n\nThis you came to find out when the dunce's eminent mother called and demanded that you raise her son's grade. She asked whether you would be applying for a visa into her country, and you could not help but perceive a threat.\n*choice\n    #\"Look, Madame Ambassador,\" I said, \"you touch my visa and I'll accuse your son of cheating and leave a scarlet letter on his permanent record that even your influence will fail to expunge!\"\n        How dare she try to push you around? You have your own power, and now she knows it.\n        *set pomposity %+10\n        *set ruthlessness %+20\n        *set moral_compass %-15\n        *set luck %-10\n        *set ambassador_rage true\n        *goto Mexico\n    #Ugh. Meddling parents. This is why I'll never teach high school. With my ego stinging, I followed the path of least resistance and gave momma's little boy a C+.\n        *set ruthlessness %-20\n        *set pomposity %-10\n        *set moral_compass %-20\n        *set luck %+5\n        *goto Mexico\n    #I tried my best to talk her down, informing her that her son's fraternity events had taken precedence over his academics, and that I felt he must learn that actions produce consequences.\n        You hope you got through to her. You feel a little bit like Dr. Phil here (and this makes you feel dirty), but clearly somebody had to stage an intervention.\n        *set moral_compass %+15\n        *set luck luck %+5\n        *goto Mexico\n    #I told her to fuck off.\n        Not exactly politic, but you do know how to make a point.\n        *set ambassador_rage true\n        *set ruthlessness %+20\n        *set pomposity %+20\n        *set luck %-10\n        *goto Mexico\n\n*label Mexico\n\nAfter clawing your way out of grading hell, you could literally taste freedom…it tasted a lot like whiskey. Sipping glass in hand, you ran over your checklist, loaded all your gear into your backpack, and headed off to the airport to catch your flight.\n\n*page_break\n\nYou were to begin your journey in Quito, Ecuador: gateway to the southern mountains of Colombia.\n\nUnable to secure a direct flight, however, you resigned yourself to a stopover in Mexico City.\n*choice\n    #I gave myself an eighteen-hour layover in Mexico City—just enough time to see the Museum of Anthropology and catch an early flight out in the morning.\n        *set layover true\n        *set funding %-10\n        *set risk_taker %+15\n        *goto Mexico_City\n    #The risk of missing my flight made me nervous, and I didn't want to spend my grant money on a hotel room. I scheduled a short layover and waited it out in the airport before continuing on to Ecuador.\n        *set funding %+10\n        *set risk_taker %-15\n        *goto aeropuerto\n\n*label Mexico_City\nYou paid for an airport locker to store your big pack, transferring your necessities for the evening into a side-slung satchel. Walking around with your pack would paint a target on your back in urban areas, and you'd hate to get mugged so early in the trip. Once you'd sorted out your day bag, you headed out to the street to pick up a taxi. Ignoring the barrage of offers for rides from unmarked cars along the curb, you hailed a cab with a city-listed number printed along the side.\n\n\"[i]¿Dónde?[/i]\" he asked. \"Where to?\"\n\n\"[i]El Museo de Antropología y Cultura, por favor.[/i]\"\n\nHe nodded, and after an hour of weaving in and out of traffic, he dropped you off in front of your Mecca: the National Museum of Anthropology. The architect designed the museum using high twentieth-century Modernism. Its walls displayed geometric carvings inspired by the Aztec and Mayan civilizations. You were enamored with the architecture.\n*choice\n    #I walked along the building's perimeter, trying to catch the best photographs of the carvings as the light and shadows shifted in the late afternoon slant of the sun.\n        *goto theft\n    #I took a few moments to appreciate the museum exterior and then walked inside to view the treasures housed within.\n        *set luck %+15 \n        *goto inside\n\n*label theft\nBefore you knew what was happening, some wayward street urchin in your peripheral vision launched himself up into the air, snatching your camera and hitting the ground running like greased lightning down the street.\n*choice\t\n    #That camera cost nearly five hundred dollars of my hard-earned grant money—I ran after the little butthead!\n        *if ruthlessness > 70\n            \"Hey,\" you shouted as you ran, shaking your fist. \"You'd better run real fast, thief!\"\n            *set risk_taker %+10\n            *goto pursuit\n        *else\n            \"Hey,\" you shouted as you ran, arms pumping hard at your sides. \"Relinquish my property this instant!\"\n            *set risk_taker %+5\n            *goto pursuit\n    #I berated myself for sinking into complacency so near a tourist attraction, but I kept a cool head and did not pursue the thief.\n        *set risk_taker %-10\n        *set pomposity %-20\n        *set camera false\n        *goto inside\n    #I shrugged, figuring he needed it more than I did anyhow. Urban poverty is a tragedy. Who can blame him for evening out some of the wealth?\n        *set moral_compass %+10\n        *set risk_taker %-10\n        *set camera false\n        *goto inside\n\n*label pursuit\n*set ruggedness %+10\n\nYou followed him down a side street, past makeshift awnings beneath which stoop-shouldered women sold ears of corn. On wires strung up between each booth, odds and ends hung on display: women's bloomers and knock-off DVDs waving in the breeze like Tibetan prayer flags. He dodged down a narrow alley, and you pursued him, closing the gap. There at the end of the alleyway, he stopped in front of a makeshift lean-to fashioned of cardboard and plywood. Inside, you heard somebody coughing.\n*choice\n    #I told him matter-of-factly that if he didn't give me back my camera, I would wring his scrawny neck.\n        *set ruthlessness %+15\n        *goto cough\n    #I told him the game was up, and asked him as calmly as I could through my heavy breathing to hand over my property.\n        *set ruthlessness %+5\n        *goto cough\n    #I took pity on his plight—living in such conditions—and decided to let him have it after all.\n        You tossed him another ten dollars from your neck pouch, and told him to stop stealing from strangers who might not always be so generous as you. He looked stunned at the money on the ground until you backed away, then he snatched it from the ground. You bought an ear of roasted corn on your way back to the museum and finished it by the time you got to the entrance. You felt energized, full of good karma and corn.\n        *set ruthlessness %-15\n        *set moral_compass %+15\n        *set camera false\n        *page_break\n        *goto inside\n\n*label cough\nBefore you could act, the boy's heaving chest collapsed into a wet cough like the sounds emanating from inside the cardboard shack. His eyes looked bright, though with fever or excitement you couldn't tell.\n*choice\n    #His coughing gave me the window I needed to snatch the camera out of his hands. Good thing I brought plenty of hand sanitizer!\n        The boy ducked back inside the hut and flung a few choice curse words in your direction. To prove to yourself you're not totally heartless, you left a peace offering of a dollar or two in unwanted peso coinage outside his hut. You wound your way back through the streets to the museum, where you put the whole episode behind you.\n        *set health %-15\n        *set luck %-5\n        *page_break\n        *goto inside\n    #I recoiled. Suddenly the camera didn't seem so desirable. I backed away quickly, telling him he could keep the thing.\n        Damn straight. You can see straight enough to dodge the swine flu bullet! You got out of there and headed back to the museum to get your archaeology geek on, [i]sans[/i] antibiotic-resistant who-knows-what.\n        *set luck %+5\n        *set health %+5\n        *set camera false\n        *page_break\n        *goto inside\t\n\t\n*label inside\n\t\nOnce inside the Museum of Anthropology, you were practically purring as you basked in the presence of some of the most famous archaeological hits of the Americas.\n\nThere's nothing quite like gazing upon a piece of the past. Indeed, tens of thousands of tourists pay good money to come to this museum every day.\n\nLooting and private collecting, however, represent the flip side of this desire, and let's be honest: professional shame aside, you wouldn't exactly mind possessing an ancient…\n*choice\n    #…sacrificial obsidian knife.\n        Sharper than steel, this blade has opened up the chests of potentially thousands of Aztec prisoners of war. If you had one like that, you would tack it up above the desk where you hold student office hours. It's good for them to know your power over the life and death of their GPAs.\n        *set artifact \"carved obsidian blade\"\n        *set artifact_one \"blade\"\n        *set ruthlessness %+20\n        *set pomposity %+15\n        *goto opportunity\n    #…carved spindle whorl.\n        Back in the day, people took time and care in forming and decorating their utilitarian items.…\n\n        Nowadays, our homes are clogged with mass-produced, throw-away crap.  \n        *set artifact \"spindle whorl of etched bone\"\n        *set artifact_one \"spindle whorl\"\n        *set moral_compass %+10\n        *goto opportunity\n    #…stingray spine used for ceremonial penile bloodletting.\n        Kinky. You've always wanted to try blood play in bed.\n        *set artifact \"carved stingray spine\"\n        *set artifact_one \"spine\"\n        *set libido %+15\n        *goto opportunity\n    #…stone temple, reconstructed in my backyard.\n        Um, you're not an understated sort of person. Go big or go home! You're pretty sure that any papers you wrote in a Mayan temple (you would convert it to a study, of course) would get published immediately in the [i]Journal of Latin American Antiquity[/i].\n        *set artifact \"small carving from the Temple of the Sun\"\n        *set artifact_one \"carving\"\n        *set fortune_and_glory %+15\n        *goto opportunity\n\n*label opportunity\n\nBy coincidence, an assistant curator walked up beside you, opened a case, removed a ${artifact}, and set it down on a rolling cart for inspection.\n\nSuddenly, all the lights cut out. A rolling brown-out had hit Mexico City, a regular occurrence in the summertime as people in the endless slums tap the lines to fire up their televisions and generators and air conditioners, thereby overdrawing the city's supply. The curator dashed off in answer to an alarm in the next room, leaving you alone with the ${artifact}. You glanced up at the cameras. Powered off. You looked back at the ${artifact_one}, and…\n*choice\n    #…I opened my bag and ever so carefully tipped it into the open pouch.\n        Score! Nobody had seen you make your move. You would tell the Mexican security agents at the airport that you were carrying a reproduction and flash your Register of Professional Archaeologists identification card for additional credibility. Your pack slung back over your shoulder, you strolled off, confident that nobody would be the wiser until you were long gone.\n        *set moral_compass %-30\n        *set luck %+15\n        *set risk_taker %+15\n        *set funding %+5\n        *set illicit_artifact true\n        *goto exit\n    #…I looked at it longingly and backed slowly away.\n        As an upstanding member of the international archaeological community, it would be a breach of trust to carry off any piece of Mexico's cultural patrimony. You blush for having entertained such a notion.\n        *set moral_compass %+15\n        *set risk_taker %-10\n        *goto exit\n    #…I stood guard against any potential looters.\n        Your menacing frown warded off a Japanese tour group that wandered too close for comfort. Finally, the curator returned in a huff for having left the exhibits unlocked and unguarded. She eyed you suspiciously but noted with relief that everything had remained in its place.\n        *set moral_compass %+20\n        *set risk_taker %-10\n        *goto exit\n\n*label exit\n\nAfter a few more minutes, the lights flickered back to life. The entire episode couldn't have lasted more than five minutes, but most of the museum-goers had cleared out in confusion. You enjoyed browsing a few more exhibits free of the crowds, got your picture taken next to a megalithic carving of an Olmec head in the round, and then called up a taxi. At that point, you hadn't slept in nearly twenty-four hours.\n*choice\n    #I decided to budget for the night and find a cheap hostel.\n        The journey was still young, and you thought it wise to conserve your funds.\n\t\n        \"[i]Hostel Americano, por favor[/i]!\"\n\n        You passed an uneventful night in a single economy room and woke up crawling with bedbugs. Those little black specks had poured out of your mattress under cover of darkness, and you're pretty sure they hitched a ride in your suitcase. \"Well,\" you think stoically, \"it was bound to happen sometime,\" and in the morning you return to the airport and catch your flight to Quito, trying not to scratch yourself too frequently in public.\n        *set ruggedness %+10\n        *set pomposity %-5\n        *set luck %-10\n        *set funding %-5\n        *set health %-10\n        *finish\n    #With a fat grant in my pocket, I decided to live large for the night and find a luxury hotel.\n        Dropping your Spanish, you said, \"To the Grande Suites Hotel and Spa, my good man!\" The driver rolled his eyes at your American arrogance, but desirous of a tip, he nodded and drove on, depositing you in the lap of luxury. You passed a lovely evening in a plush king-size bed, complete with a white-linen goose down duvet. Before you retired, you requested a complimentary massage in your room. Well-rested and limber after the first leg of air travel, you returned by taxi to the airport and caught your flight out to Quito.\n        *set ruggedness %-20\n        *set pomposity %+5\n        *set luck %+10\n        *set funding %-15\n        *set health %+15\n        *finish\n\n*label aeropuerto\nUnfortunately, there's no such thing as a really short layover en route to South America. With five hours to kill in the Mexico City Airport, you decided to go to sleep on top of your luggage to protect its contents from sticky fingers.\n\nYou arranged your backpack so that it stood up in front of your chair and leaned forward, propping your head atop your arms.\n\nYou began to drift off and were only vaguely aware when somebody took a seat next to you an hour later. Your state of unawareness only lasted a moment or two before they started coughing their lungs out.\n\nFan-fucking-tastic, you thought as you felt the spray of spittle dampen your face.\n*choice\n    #Gawd! Does nobody cover their mouth in this country? I tried not to look as horrified as I felt.\n        *if moral_compass >70\n            Your mother taught you to be compassionate, but you decided in this case to act compassionate from afar. I mean, for all you knew, you'd just contracted antibiotic-resistant TB or something else equally unfortunate.\n            *set moral_compass %+5\n            *set health %-10\n            *set luck %-10\n            *page_break\n            *goto bar\n        *else\n            Maybe, you thought, if he'd bathe once in a while he wouldn't come down with such afflictions. For all you knew, you'd just contracted antibiotic-resistant TB or something else equally unfortunate.\n            *set moral_compass %-5\n            *set health %-10 \n            *set luck %-10\n            *page_break \n            *goto bar\n    #Man. He sounded miserable. I offered him a tissue and a decongestant.\n        *if risk_taker > 70\n            You allowed him to take the tissue from your hand so that he wouldn't feel as disgusting as he looked. Hell, you'd need all the good karma you can get where you're going!\n            *set moral_compass %+15\n            *set health %-15\n            *set luck %-10\n            *page_break\n            *goto bar\n        *else\n            You tried not to touch his hand. Instead, you left your offering on the bench and took your leave.\n            *set moral_compass %+10\n            *set health %-10\n            *set luck %-10\n            *page_break\n            *goto bar\n    #I shot the fellow a withering look, gathered up my things, and stalked off.\n        If he hadn't been so damn old and miserable, you would have given him a real piece of your mind.\n        *set moral_compass %-10\n        *set luck %-10\n        *set health %-15\n        *goto bar\n\n*label bar\nWith your pack strapped firmly to your back, you struck a path for the airport bar. Your mood had soured considerably after getting hacked on. Alcohol's a disinfectant of sorts, right? In any case, you could use a stiff drink after hours in transit.\n*page_break\n\nThe bar was packed full of passengers passing the time with a beer or drugging themselves insensible to the pain of international layovers and long flights crammed into economy-class seats.\n\nAs you entered, a space opened up at the far corner of the bar. You moved quickly and claimed the space, setting your belongings in front of your feet. The room felt small, close, and dark. The lights that hung down from the ceiling cast a yellowed light on the drinkers. The man to your right sat on the far seat of the bar, leaning against the wall. He appeared to be staring at you. He looked to be…\n*choice\n    #…a well-to-do Latino businessman; he wore a suit and had his black hair shellacked in place with a liberal dose of pomade.\n        *goto looter\n    #…a native man; he had the look of one only recently injected into the modern world beyond his village.\n        *goto Esteban\n\n*label looter\nYou met his gaze. He smiled, revealing two gold teeth set in place of his canines. The sides of his mustache opened and rose on either side of his grin like the parting of curtains on a stage. He greeted you, and asked what it is you planned to go digging for in Latin America.\n\nYou felt startled. \"How did you know I'm an archaeologist?\"\n\nHe laughed and pointed to your shirt, which read: \"My Life Is in Ruins.\"\n\nYes, of course, you thought, shaking your head. That T-shirt is a dead giveaway for anyone with enough English to translate a bad pun.\n\nHe seemed to consider a moment and then continued. \"Since you're a trained archaeologist, would you mind taking a look at my newest acquisitions from Colombia?\"\n\nHe pulled out a small bag and tipped its contents onto his lap. The bag contained four soapstone effigies. They looked to be Incan-era carvings—all looted, no doubt. You knew what came next: he would want your assurance of authenticity, an endorsement from an archaeologist that would raise the value of his merchandise on the black market.\n\nYou could tell in a glance that they were real. He offered to give you one of the effigies to keep in exchange for your signature on the paperwork he'd mocked up for each object.\n*if professor = false\n    *choice\n        #As a graduate student, I felt flattered to be asked for my expert opinion, and his offer was mighty tempting. I agreed to help him.\n            *set pomposity %+20\n            *set networking_skills %+10\n            *goto acceptance\n        #I hesitated. I felt ethically queasy over the looted artifacts, but desired to find out more about his looting operation in Colombia. I kept him talking.\n            *goto business_card\n        #I agreed to authenticate these finds. Disassociated from their provenience data, they were little more than artistically rendered trinkets.\n            *set networking_skills %+5\n            *goto acceptance\n        #I held out. If he wanted my services, he'd better have something else to offer me.\n            *set ruthlessness %+10\n            *set moral_compass %-15\n            *goto business_card\n        #I called him out on trafficking in illegal goods, and signaled the bartender to bring my tab so that I could get out of an increasingly uncomfortable situation.\n            *set networking_skills %-10\n            *set moral_compass %+15\n            *goto rejection\n*else\n    *choice\n        #I hesitated. I felt ethically queasy over the looted artifacts, but desired to find out more about his looting operation in Colombia. I kept him talking.\n            *set networking_skills %+10\n            *set moral_compass %+10\n            *goto business_card\n        #I agreed to authenticate these finds. Disassociated from their provenience data, they were little more than artistically rendered trinkets.\n            *set networking_skills %+5\n            *set moral_compass %-5\n            *goto acceptance\n        #I held out. If he wanted my services, he'd better have something else to offer me.\n            *set ruthlessness %+10\n            *set moral_compass %-15\n            *goto business_card\n        #I called him out on trafficking in illegal goods, and signaled the bartender to bring my tab so that I could get out of an increasingly uncomfortable situation.\n            *set networking_skills %-10\n            *set moral_compass %+15\n            *goto rejection\n\n*label business_card\nYou hedged. \"I don't know…who are you working with to find such valuable artifacts? I should think there were a lot more where these came from.…\"\n\n\"Let us not play games,\" he responded. \"I can see that you know the worth of these objects. If you sign, you may keep one of them as my gift to you. It is my best and only offer.\"\n*choice\n    #This deal seemed too good to turn down. I agreed to his terms and authenticated his finds.\n        *if ruthlessness > 60\n            \"I will take you up on your offer and give you my expert opinion here,\" you said. \"However, I must ask that you under no condition cite my name in your fabricated paper trail. Do that, sir, and I will hunt you down and blacken your name twice over.\"\n\n            \"Fair enough, archaeologist. What name should I give for my authentication records?\"\n\n            You thought for a moment, and then smiled slowly…you gave him the name of an Andeanist who snubbed you at the last conference.\n            *set moral_compass %-20\n            *set networking_skills %+10\n            *set effigy true\t\n            *set artifact \"stone effigy\"\n            *goto acceptance\n        *else\n            \"I will take you up on your offer and give you my expert opinion here,\" you said. \"Please don't be surprised if I deny involvement, however, should word get around that you have invoked my name in the black market.\"\n\n            \"But of course.\"\n            *set moral_compass %-15\n            *set networking_skills %+10\n            *set effigy true\n            *set artifact \"stone effigy\"\n            *goto acceptance\n\n    #My conscience kicked in, and I refused to help him. Delving into the black market seemed unwise at best in an international airport.\n        *if pomposity > 75\n            \"No,\" you said. \"I'm sorry, but I can't help you. Though I am extremely knowledgeable about the region, I cannot afford to blacken my name by dipping it into the black market. That will be all.\"\n\n            With that, you turned away from him and back to the bar.\n            *set moral_compass %+15\n            *set networking_skills %-15\n            *finish\n\n        *else\n            You shook your head, feigning ignorance of the artifacts' origin. After downing your drink, you excused yourself politely and headed to your departure gate.\n\n            No use in causing a scene here.\n            *set moral_compass %+20\n            *set networking_skills %-10\n            *finish\n\n*label acceptance\n\nReally this situation is win-win for the both of you. You could sign any name to his authentication documents, avoid professional censure, and score an ancient effigy in the bargain. You assuaged any guilt by telling yourself that the damage had already been done the minute those effigies were removed from archaeological context. The scientific community could learn nothing more from them at this point.\n\nYou finished your drink and left with the effigy stuffed in your pocket.\n*set effigy true\n*set artifact \"stone effigy\"\n*finish\n\n*label rejection\nHe regarded you mildly as you strapped on your backpack. \"[i]Buena suerte[/i],\" he said softly and turned back to his drink.\n\nThe way he said it sounded like an omen of dark things ahead. You started to get the feeling that you might be in for more than you bargained for.\n*finish\n\n*label Esteban\nYou met his gaze. He looked nervous as he sat there without a drink. Maybe, you thought, he can't afford to pay. His clothing didn't quite fit him—his New York Giants T-shirt too big, his red polyester shorts too small. If it got any more humid in the bar, the glued-on soles of his sneakers might have peeled straight off and fallen to the floor. From his wide cheekbones and dark skin, you knew that he came from somewhere in the tropics, but you couldn't be sure of his country of origin. You introduced yourself and offered to buy him a drink, which he accepted by nodding. You began to wonder if he could speak Spanish at all or only his native tongue.\n*choice\n    #I tried to strike up a conversation.\n        *set networking_skills %+15\n        *set luck %+10\n        *goto native_story\n    #I stayed silent and enjoyed my drink in peace.\n        *set networking_skills %-15\n        *set luck %-10\n        *goto no_convo\n\n*label no_convo\nYou weren't exactly in a chatty mood, and by the looks of him, conversation would have been a chore anyhow. You felt tired and stressed, and wanted to pass the time before the next leg of your journey in peace. After a couple of whiskeys, you gathered your bag back up and headed to the gate to catch your next flight.\n\nWhile waiting at the gate, you saw the native man being accosted by police.\n*temp senor\n*if male\n    *set senor \"Señor\"\n    *goto police\n*else\n    *set senor \"Señora\"\n*label police\n*choice\n    #I stepped in and asked what crime the man had committed.\n        *if moral_compass > 70\n            \"[i]${Senor}[/i],\" the police said, \"this man, he is a drug mule. He has broken the law and his life is in danger. We are taking him for his own good.\"\n\n            They started to take him away, but the man recognized you from the bar and struggled against their grip.  \n\n            \"Wait,\" he said to the police, \"I want this ${woman} to take something.\" To you, he said, \"I see from your ticket that you are going to Quito. Please, I beg you to get word to my brother, Nestor Ladera, in Colombia.\" He removed a ring from his finger and tossed it your way. \"If you find him, give him this and let him know where I am. He will make you welcome.\"\n\n            You agreed to help if it fell within your power to do so. He left with the police, and you boarded the plane, turning Esteban's ring over in your hands. \n            *set moral_compass %+10\n            *set risk_taker %+10\n            *set luck %+35\n            *set ring true\n            *set luck %+10\n            *set networking_skills %+10 \n            *finish\n        *else\n            \"[i]${Senor}[/i],\" the police said, \"this man, he is a drug mule. He has broken the law and his life is in danger. We are taking him for his own good.\"\n\n            They started to take him away, but the man recognized you from the bar and struggled against their grip.  \n\n            \"Wait,\" he said to the police, \"I want this ${woman} to take something.\" To you, he said, \"I saw from your ticket that you are going to Quito. Please, I beg you to get word to my brother, Nestor Ladera, in Colombia. If you find him, let him know where I am, and he will make you welcome.\"\n\n            He plucked a ring from his finger and tossed it your way. \"For proof,\" he said.\n\n            Under the scrutiny of airport police, you reluctantly agreed to help if you had the chance, but you could promise him nothing. He left with the police, and you boarded the plane, hoping the police didn't put you down on some Do-Not-Fly list.\n            *set moral_compass %+5\n            *set risk_taker %+10\n            *set ring true\n            *set luck %+35\n            *set networking_skills %+10\n            *finish\n    #I looked the other way.\n        You got out of there quickly and headed over to your gate to await your flight into Quito.\n        *set moral_compass %-10\n        *set risk_taker %-10\n        *set luck %-25\n        *set networking_skills %-10\t\n        *finish\n\n*label native_story\nYou told him you were traveling to southern Colombia on an archaeological survey mission, and he brightened. He said he came from a small village in southern Colombia, a beautiful place in the mountains that had recently come under the control of FARC rebels. The FARC, he said, did nothing for the villagers, only robbing them of their land and their revenue on coca fields. Many of the villagers, he said ruefully, felt they had no other options and joined the FARC.\n\nYou asked him how he came to afford an airplane ticket, and he looked at you for a long moment before lifting his T-shirt to reveal the recent incision made in his side, the sutures still visible against his raw skin. You understood instantly—he carried a load of cocaine inside his body—a risky proposition both legally and medically.\n*choice\n    #I felt compassion and asked if there was anything I could do for him or his family if I happened upon his village.\n        *set moral_compass %+20\n        *set networking_skills %+15\n        *set ring true\n        *set luck %+35\n        *goto grateful\n    #I offered him the two hundred dollars I had in my neck pouch to turn himself in and go to an official medical doctor to seek help.\n        *set networking_skills %+10\n        *set moral_compass %+20\n        *set ring true\n        *set luck %+35\n        *set funding %-10\n        *goto grateful\n    #I wasn't interested in his personal problems. I ignored his startling admission and pressed him for more details about the FARC.\n        *set pomposity %+15\n        *set luck %-25\n        *set networking_skills %-5\n        *goto reluctant_details\n    #I couldn't hide my discomfort and disapproval. The conversation trailed off as we both finished our drinks.\n        *set networking_skills %-20\n        *set luck %-25\n        *goto convo_killer\n\n*label grateful\nHe smiled gratefully and thanked you for your kindness. He had already accepted your drink, and did not wish to be a burden. He asked you, if you did happen upon the mountain village of Madera, Colombia, to tell his family that he was well and that he loved them all.\n\n\"Look,\" he said, taking your hand, \"my little brother has joined the FARC. If you get captured, take this ring and ask to speak to Nestor Ladera. My name is Esteban, Esteban Ladera. I wish you a safe journey into my country. [i]Vaya con Díos[/i].\"\n\nYou took his ring and thanked him, wished him good luck, and walked to your next gate. As you waited for takeoff, you fingered the ring in your pocket. It weighed heavily on your mind as if it had been dropped from the hand of Fate. You hoped you wouldn't have to use that particular talisman.\n\nNext stop, Ecuador!\n*set ring true\n*finish\n\n*label reluctant_details\n\"Whoa, whoa, whoa—back up! You say you're from a village in southern Colombia? I want you to tell me as much as you can about what things are like on the ground.\"\n\nHe clammed up the minute you started questioning him. He told you only that the FARC are thick in the woods around his village, a place called Madera, and that you should proceed with caution. Getting more details from the man proved as difficult as pulling teeth.\n\n\"It is not a safe place for people like you,\" he said finally. \"The FARC, they are always looking out for spies and do not treat them kindly if they catch them. You will do your research somewhere else if you are wise.\" \n\nHe went tight-lipped after that, and you gave up. Feeling more than a little trepidation about your proposed survey route, you finished your drink and headed to the gate to wait for your next flight.\n*finish\n\n*label convo_killer\nYou muttered something that conveyed your sympathy for his condition, but you didn't sound especially convincing. Mostly, you wanted to get away from this ticking time bomb. You feared mistaken association with an international criminal. Should that happen, police interrogation and detainment would follow, and you wanted to steer far, far away from that kind of heavy shit.\n\nYou got out of there quickly and headed over to your gate to await your flight into Quito.\n*finish", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set first_name \"Steph\"\n*set last_name \"Silverado\"\n*set anti_malarials false\n*set hair \"Chestnut\"\n*set spirit_animal \"Bonobo\"\n*set nasty \"Botflies\"\n*set secret_weapon \"Scotch\"\n*set blood_alcohol_level 89\n*set cultural_fetishism 55\n*set fortune_and_glory 66\n*set health 35\n*set intelligence 70\n*set libido 88\n*set luck 45\n*set pomposity 65\n*set risk_taker 70\n*set ruggedness 15\n*set ruthlessness 53\n*set social_networking 42\n\n\nTheir anti-malarials sat out on a shelf next to the Valium. No prescriptions needed, apparently, in Quito.\n\nYou picked up the only bottle left and inspected the label: mefloquine. The label noted that one in four people may experience intense nightmares or waking hallucinations while on the drug. \n\nHm. Not ideal. \n*fake_choice\n\t#Then again, I'd rather risk bad dreams than get malaria out in the boonies. I bought the meds.\n\t#I decided not to take the pills—I'd heard some really bad stories about mefloquine-induced hallucinations.\n\n*script changeBackgroundColor(\"black\")\n\n*set first_name \"Raj\"\n*set last_name \"Vanderhoot\"\n*set anti_malarials false\n*set hair \"Bleached Blond\"\n*set spirit_animal \"Owl\"\n*set nasty \"Vipers\"\n*set secret_weapon \"Moisture-Wicking Socks\"\n*set blood_alcohol_level 68\n*set cultural_fetishism 60\n*set fortune_and_glory 79\n*set health 20\n*set intelligence 88\n*set libido 70\n*set luck 52\n*set pomposity 79\n*set risk_taker 65\n*set ruggedness 78\n*set ruthlessness 76\n*set social_networking 88\n\nYou level your gun at the ragged-looking group and they surrender immediately, holding up their hands and retreating back into the mist. All except Nestor. He keeps moving towards you.\n\nHe doesn't think you have the guts.\n\n*fake_choice\n\t#He's right. I don't. I drop the AK-47 and bolt for the temple.\n\t#I fire a warning shot into the air.\n\t#I bluff, sighting my AK-47 on his head.\n\t#I am deadly serious. I sight my AK-47 between his eyes and dare him to come closer.\n\n*script changeBackgroundColor(\"sepia\")\n\n*set first_name \"Deanna\"\n*set last_name \"Denali\"\n*set anti_malarials false\n*set hair \"Chestnut\"\n*set spirit_animal \"Bonobo\"\n*set nasty \"Vipers\"\n*set secret_weapon \"Scotch\"\n*set blood_alcohol_level 66\n*set cultural_fetishism 64\n*set fortune_and_glory 80\n*set health 43\n*set intelligence 65\n*set libido 70\n*set luck 73\n*set pomposity 69\n*set risk_taker 15\n*set ruggedness 45\n*set ruthlessness 70\n*set social_networking 68\n\nThe thugs demanded your camera. You started to deny owning one before you realized it still hung in full view around your neck.\n\nWhoops.\n*fake_choice\n\t#I reached into one of my many pockets and offered them a bag full of glass trade beads instead.\n\t#I handed them a wad of cash from my pocket in an attempt to buy them off.\n\t#I dropped down to the ground, hugging my knees to my head in a protective, undignified ball around my camera.\n\t#I handed them the camera.\n\n*set first_name \"Catherine\"\n*set last_name \"Hodder\"\n*set anti_malarials true\n*set hair \"Black\"\n*set spirit_animal \"Three-toed Sloth\"\n*set nasty \"FARC\"\n*set secret_weapon \"Moisture-wicking Socks\"\n*set blood_alcohol_level 75\n*set cultural_fetishism 80\n*set fortune_and_glory 54\n*set health 65\n*set intelligence 85\n*set libido 28\n*set luck 70\n*set pomposity 32\n*set risk_taker 69\n*set ruggedness 74\n*set ruthlessness 45\n*set social_networking 56\n*set camera true\n*set jacket true\n*set gps false\n\n\nThe man in front of you had stepped off the trail and disturbed a pit viper hidden beneath the leaf litter. He falls to the ground holding his foot, which has begun to swell in its sandal.\n\nHe begs somebody to put him out of his misery.\n*fake_choice\n\t#I ignore his pleas, take a machete from his belt, and chop off his foot at the ankle.\n\t#I cringe and step backward, unable to watch.\n\t#I cradle his head, offering him a sip of water.\n\n*if choice_is_ios_app\n\t*finish\n\n*set first_name \"Michael\" \n*set last_name \"Schiffer\"\n*set anti_malarials true\n*set hair \"Red\"\n*set spirit_animal \"Cheetah\"\n*set nasty \"Chagas Disease\"\n*set secret_weapon \"Whip\"\n*set blood_alcohol_level 88\n*set cultural_fetishism 20\n*set fortune_and_glory 77\n*set health 83\n*set intelligence 65\n*set libido 72\n*set luck 68\n*set pomposity 42\n*set risk_taker 35\n*set ruggedness 24\n*set ruthlessness 80\n*set social_networking 88\n*set camera true\n*set jacket true\n*set gps false\n\nThis must be one of those narco-subs. Manufactured from spare parts in secret beneath the canopy of Colombian estuaries, these subs take thousands of pounds of cocaine up and down the coast each year.\n\n*fake_choice\n\t#I decide to stay undercover and skirt the coast to the south until I find non-FARC help.\n\t#I decide to befriend them and ask for a ride.\n\t#I attempt to sabotage their submarine.\n      \n\n\n\n     \n      \n\n\n\n\n\n\n", "setting_the_stage_one": "You are following an ancient Incan road, though no layperson would know it. As a trained archaeologist, you see what others cannot. Equipped with an aerial map and a hand-held GPS device, you have picked your way slowly through the thick greenery of the Colombian countryside for the better part of two weeks now, chopping with your machete and recording features and sites as you go.\n\nFive hundred years after the fall of the Incan Empire, the foliage still remains thin on the surface of the long-defunct thoroughfare. You can just perceive its outline if you take in the view from the corner of your eye. It extends from where you perch on the rise, switch-backing for miles down into the river gorge.\n\nNow, archaeologists, as a rule, tend to love or hate going out on survey. In your opinion, surveying is:\n*choice\n\t#A necessary evil in terra incognita.\n\t\tFunny thing when you go tramping blindly through unmarked fields in rural areas the world over: you run the risk of getting shot. Whether stumbling upon California pot or Colombian coca, so goes the fate of the ambulatory archaeologist. You'd take a trowel over hiking boots any day.\n\t\t*set risk_taker %-20\n\t\tTake that one time you went out on survey in…\n\t\t*choice\n\t\t\t#…Eastern Europe.\n\t\t\t\tYou had expected the good life: indoor plumbing, a local chef, and free local liquor. It seemed like a great gig at first, but things fell apart by week two when you embarked upon a survey across miles of Hungarian pastureland.\n\n\t\t\t\tEveryone on your crew inhaled airborne particles of desiccated sheep turds and came down with nasty cases of anthrax poisoning.\n\n\t\t\t\tThree weeks in a Hungarian hospital is something nobody should have to experience!\n\n\t\t\t\tWith that kind of luck in Europe, who knows what manner of unpleasantries Colombia may foist upon you.\n\n\t\t\t\tTruly, anything can happen out in the field. It's always best to keep on your guard to watch for the good, the bad, and the ugly.\n\t\t\t\t*set ruggedness %-20\n\t\t\t\t*set fortune_and_glory %-15\n\t\t\t\t*set risk_taker %-10\n\t\t\t\t*set luck %-25\n\t\t\t\t*set blood_alcohol_level %-10\n\t\t\t\t*set health %-10\n\t\t\t\t*page_break\n\t\t\t\t*goto coca\n\t\t\t#…New Mexico.\n\t\t\t\tYou grew up camping in the desert, and roughing it out in the southwest seemed like a great way to spend a field season.\n\t\t\t\t\n\t\t\t\tUnfortunately, the same isolation that made the borderland desert an excellent place to conduct archaeological reconnaissance also attracted a flotilla of R.V. meth labs.\n\n\t\t\t\tAfter a crew member witnessed an execution-style killing out in the rocks, the project came to an abrupt end.\n\n\t\t\t\tYou ended up stuck in a basement for the rest of the summer, directing undergraduate volunteers as they washed, bagged, and tagged backlogged boxes of potsherds for the campus museum.\n\n\t\t\t\tMeanwhile, your time-sensitive summer research grant melted away like so much Aeolian silt in the washbasin.\n\n\t\t\t\tTruly, anything can happen out in the field. It's always best to keep on your guard to watch for the good, the bad, and the ugly.\n\t\t\t\t*set ruggedness %+20\n\t\t\t\t*set risk_taker %+5\n\t\t\t\t*set fortune_and_glory %-20\n\t\t\t\t*set luck %-20\n\t\t\t\t*set health %+10\n\t\t\t\t*set blood_alcohol_level %-10\n\t\t\t\t*page_break\n\t\t\t\t*goto coca\n\t#Exhilarating!\n\t\tYou have a good eye for identifying new sites and find it a welcome change to spend the summer on your feet instead of hunched over in a one-by-one meter hole in the ground.\n\n\t\tAs long as you keep your wits about you, you have faith in your ability to emerge unscathed from anything the field might throw at you.\n\n\t\t*set risk_taker %+20\n\t\t*page_break\n\n\t\tDamn straight. You remember how you tackled that hairy episode in…\n\t\t*choice\n\t\t\t#…the Louisiana swamp: a fever-dream of a place staffed with crawdads, moonshine, local crazies.\n\t\t\t\tThings went great in the swamp until some bearded old goat held you up with the twin barrels of his shotgun. You talked him down, though, and back at his shack he broke out the moonshine for an all-night gab session. You tried your best to dissuade him from his pot-hunting ways, and you might have made a breakthrough around midnight. The thing is, you can't exactly remember that night. Would that every field encounter ended in moonshine.…\n\n\t\t\t\tTruly, anything can happen out in the field. It's always best to keep on your guard to watch for the good, the bad, and the ugly.\n\t\t\t\t*set ruggedness %+20\n\t\t\t\t*set risk_taker %+15\n\t\t\t\t*set fortune_and_glory %+10\n\t\t\t\t*set luck %+20\n\t\t\t\t*set health %-10\n\t\t\t\t*set blood_alcohol_level %+10\n\t\t\t\t*page_break\n\t\t\t\t*goto coca\n\t\t\t#…the Irish countryside: avoid falling over cliffs or into bogs, and a warm pub awaits you at the end of every soggy day.\n\n\t\t\t\tYou might have been sipping on a wee nip of local whiskey when you fell into that bog.\n\t\t\t\t\n\t\t\t\tAs you sank into the muck, something scraped up against your submerged thighs.\n\n\t\t\t\t\"What the…\" you thought. With one hand you roped a boulder set in solid ground, and with the other you fished around to get a grip on a leathery branch of what turned out to be an anaerobically preserved human arm.\n\n\t\t\t\tBog man! Score!\n\n\t\t\t\tYou pulled him out with you and called the crew over to check out your find.\n\n\t\t\t\tWith that kind of luck, perhaps fortune may smile on you again here in Colombia.\n\n\t\t\t\tTruly, anything can happen out in the field. It's always best to keep on your guard to watch for the good, the bad, and the ugly.\n\t\t\t\t*set ruggedness %-20\t\n\t\t\t\t*set risk_taker %-15\n\t\t\t\t*set fortune_and_glory %+25\n\t\t\t\t*set blood_alcohol_level %+10\n\t\t\t\t*set luck %+35\n\t\t\t\t*page_break\n\t\t\t\t*goto coca\n\n*label coca\n\nYou take out your binoculars now and peer down at the crops below. In the gathering light you can see that, sure enough, the lush green fields ahead of you are flush with coca plants. You catch some movement along the edge of the flats, and you move slowly off the trail and into the undergrowth, staying very still.\n\nAs you sit there, scanning the edges of the field, you can feel your heart hammering around in your chest. As you know, FARC soldiers have a tendency to shoot first and ask questions later.\n\nSo far, you've been lucky in avoiding any close encounters.… What on earth could have possessed you to trek off on foot to survey a war zone?!\n\nWell, here's the thing: you're a…\n\n*choice\n\t#…graduate student of archaeology.\n\t\tAs a fledgling archaeologist in the throes of graduate school, you're desperate for publication. You hope that conducting an independent survey on the untouched highlands of Colombia will earn you a spot in a top journal and give you a vital edge in a job market already flooded with Ph.D.s.\n\t\t*set colleagues \"students\"\n\t\t*set professors \"TAs\"\n\t\t*set meetings \"graduate student\"\n\t\t*set hierarchy \"graduate student\"\n\t\t*set chair \"advisor\"\n\t\t*set libido %+10\n\t\t*set pomposity %+5\n\t\t*set fortune_and_glory %-20\n\t\t*page_break\n\t\t*goto identity\n\t#…professor of archaeology.\n\t\tYou got into this mess with both eyes open. You proposed the project as a junior faculty member working at a top university where the pressure to publish or perish is extreme. You're up for tenure next year, and the success of this endeavor into the unsurveyed wilderness of the Colombian Andes will make or break your future career.\n\t\t*set professor true\n\t\t*set professors \"professors\"\n\t\t*set hierarchy \"professor\"\n\t\t*set meetings \"faculty\"\n\t\t*set chair \"department chair\"\n\t\t*set pomposity %+15\n\t\t*set colleagues \"faculty\"\n\t\t*set libido %+35\n\t\t*set fortune_and_glory %+20\n\t\t*page_break\n\t\t*goto identity\n\n*label identity\n\nYou're playing the academic game, and clearly you're playing to win. That's good, because those set up in the Ivory Tower can play politics down and dirty.\n\nWho are you, and what skills do you bring onto the court?\n\n*choice\n\t*if professor = false\n\t\t#For a young woman of twenty-five, I'm already the epitome of the absent-minded professor.\n\t\t\tYou can hardly remember your drive to and from campus every day. Your mind is spinning a mile a minute, and you often neglect your body's physical needs, forgetting to eat or drink for hours.\n\n\t\t\tYour hair looks disheveled most of the time. Your only vanity is perfecting the clear, concise scientific prose that has already earned you a reputation amongst your peers and colleagues. You are driven to achieve fame in your chosen field, and you will do whatever it takes to ensure that your academic star is on the rise.\n\t\t\t*set personality \"nerd\"\n\t\t\t*set mister \"Ms.\"\n\t\t\t*set woman \"woman\"\n\t\t\t*set pomposity %-5\n\t\t\t*set ruthlessness %+20\n\t\t\t*set male false\n\t\t\t*set libido %-10\n\t\t\t*set body_hair \"down below\"\n\t\t\t*set blood_alcohol_level %-15\t\n\t\t\t*set minx \"undergraduates\"\n\t\t\t*page_break\n\t\t\t*goto hair\n\t*if professor = false\n\t\t#I am a dashing young man, two years out of college, brimming with self-confidence.\n\t\t\tIn the image of your legendary advisor, you've taken to wearing your Oxford button-downs undone three from the top to reveal a tuft of manly chest hair. You got into archaeology for the adventure and consider MacGyver part of your professional grooming as a field scientist. You're especially proud of your ability to start a campfire with little more than Doritos, matches, and damp kindling.\n\t\t\t*set personality \"macho\"\n\t\t\t*set mister \"Mr.\"\n\t\t\t*set libido %+20\n\t\t\t*set woman \"man\"\n\t\t\t*set pomposity %+5\n\t\t\t*set body_hair \"on your back\"\n\t\t\t*set risk_taker %+10\n\t\t\t*set blood_alcohol_level %+20\n\t\t\t*set ruggedness %+20\n\t\t\t*set minx \"undergraduates\"\n\t\t\t*page_break\n\t\t\t*goto hair\n\t*if professor = false\n\t\t#I am a buxom belle from Alabama, a deadly mix of beauty and brains.\n\t\t\tYou have a charming southern drawl and a passion for World Heritage Sites. You also have an old-fashioned hourglass figure and know how to use it. When you started an on-campus action group to raise money for the return of Iraqi antiquities after the fall of Saddam Hussein, more than three quarters of the attendees were male. Many of them were your students from the previous year's discussion section. Hmm? Mission accomplished!\n\t\t\t*set personality \"vixen\"\n\t\t\t*set mister \"Ms.\"\n\t\t\t*set male false\n\t\t\t*set woman \"woman\"\n\t\t\t*set libido %+20\n\t\t\t*set pomposity %-5\n\t\t\t*set body_hair \"down below\"\n\t\t\t*set moral_compass %+15\n\t\t\t*set blood_alcohol_level %+20\n\t\t\t*set minx \"undergraduates\"\n\t\t\t*page_break\n\t\t\t*goto hair\n\n\t*if professor = false\n\t\t#I am the free-spirited son of hippies. Archaeology is the one career that affords me the opportunity to continue with my vagabond summers in perpetuity.\n\t\t\tYou have thick spectacles, which you wear ironically. The hair at your temples is shot with early gray, despite the fact that you're not yet thirty. You play a dobro in the anthropology department band. You've been living in the same pair of off-brand sneakers since your junior year of college. Before coming to graduate school, you spent three years backpacking around the world. You're independent, fancy yourself a risk-taker, and are savvy enough for those risks to pay off.\n\t\t\t*set personality \"emo\"\n\t\t\t*set mister \"Mr.\"\n\t\t\t*set woman \"man\"\n\t\t\t*set libido %+10\n\t\t\t*set body_hair \"on your back\"\n\t\t\t*set pomposity %-5\n\t\t\t*set ruthlessness %-15\n\t\t\t*set blood_alcohol_level %+10\n\t\t\t*set minx \"undergraduates\"\n\t\t\t*page_break\n\t\t\t*goto hair\n\n\t*if professor\n\t\t#Nicknamed Victoria for my prim and proper demeanor in the department, I let loose in the field, trading in my peep-toe pumps for a pickaxe.\n\t\t\tYour knee-length pencil skirts and form-fitting blouses strike a distinctive silhouette in a department of turtle-necked and suspendered colleagues.\n\n\t\t\tIn the field, however, the dirty hippy inside you comes out to play. You have been known to go for weeks without bathing and seem to gather power from the crust of sweat and earth that builds on your skin.\n\n\t\t\tYou completed your dissertation work in the Yucatán, but Mayanists are a dime a dozen these days, and you can't abide a crowd. Colombia will set you apart from the rest.\n\n\t\t\tThis is as it should be.\n\t\t\t*set personality \"Victorian\"\n\t\t\t*set mister \"Dr.\"\n\t\t\t*set woman \"woman\"\n\t\t\t*set male false\n\t\t\t*set body_hair \"down below\"\n\t\t\t*set ruggedness %+15\n\t\t\t*set libido %+15\n\t\t\t*set pomposity %+5\n\t\t\t*set blood_alcohol_level %+10\n\t\t\t*set minx \"T.A.s\"\n\t\t\t*page_break\n\t\t\t*goto hair\n\t*if professor\n\t\t#As a young man nearing the end of my Ph.D., I failed to publish in a top journal, panicked, seduced my advisor, and earned myself a free ride on the back of a powerhouse spousal hire.\n\t\t\tHey, she had nice legs and a C.V. a mile long! So what if she's twenty years your senior? You have broad shoulders and a square jaw, and you often wear indie T-shirts that have begun to grip at your love handles. These are growing larger in direct proportion to the success of your side project brewing artisanal ales from ancient recipes.\n\n\t\t\tThough you've nearly perfected your recipe for mead, your publication record is lacking. You lost your contacts in Africa after the last coup, and you need to get your shit together pronto before the tenure committee meets.\n\t\t\t*set personality \"easy_rider\"\n\t\t\t*set mister \"Dr.\"\n\t\t\t*set libido %+20\n\t\t\t*set woman \"man\"\n\t\t\t*set ruthlessness %+5\n\t\t\t*set body_hair \"on your back\"\n\t\t\t*set pomposity  %+5\n\t\t\t*set moral_compass %-15\n\t\t\t*set blood_alcohol_level %+20\n\t\t\t*set fortune_and_glory %-20\n\t\t\t*set minx \"T.A.s\"\n\t\t\t*page_break\n\t\t\t*goto hair\n\t*if professor \n\t\t#I am a petite firebrand of a woman, and even with my trademark red lipstick, I don't look old enough to claim a doctorate.\n\t\t\tAt barely five feet, you do not strike an intimidating figure, so you have to make up for it in attitude. You always work in a good scare on the first day of class, but those who stick with it always end up raving about your brilliant lectures and helpful study sessions before exams. Last time you checked ratemyprofessor.com, you had a chili pepper and an even mix of adoration and fear from reviewers.\n\n\t\t\tJust the way you like it.\n\n\t\t\tEcuador is the current hot topic in archaeology. Colombia will be hotter yet.… Hopefully, you won't get burned.\n\t\t\t*set personality \"firebrand\"\n\t\t\t*set pomposity %-10\n\t\t\t*set mister \"Dr.\"\n\t\t\t*set woman \"woman\"\n\t\t\t*set male false\n\t\t\t*set libido %+10\n\t\t\t*set body_hair \"down below\"\n\t\t\t*set blood_alcohol_level %+10\t\n\t\t\t*set minx \"T.A.s\"\n\t\t\t*page_break\n\t\t\t*goto hair\n\t*if professor \n\t\t#My manly charisma and light-hearted stage presence make me a favorite of my students—especially the ladies. They do not suspect my darker side.\n\t\t\tYou have a winning smile and an easy way with people. You teach popular classes on maritime archaeology, replete with lectures on pirates, rum, and sunken treasure. You look forward every year to taking a new T.A. into the field, where socially relative norms and inhibitions break down with a little help from the local spirits.\n\n\t\t\tBack in graduate school, you funded your radiocarbon dating by running drugs between mainland Belize and the coastal islands. Lately, you've begun to pine for the lack of supervision afforded by the jungle.\n\t\t\t*set personality \"sketchy\"\n\t\t\t*set mister \"Dr.\"\n\t\t\t*set woman \"man\"\n\t\t\t*set libido %+25\n\t\t\t*set moral_compass %-25\n\t\t\t*set pomposity %+15\n\t\t\t*set body_hair \"on your back\"\n\t\t\t*set blood_alcohol_level %+25\n\t\t\t*set minx \"T.A.s\"\n\t\t\t*page_break\n\t\t\t*goto hair\n\n*label hair\n\nAll right, here's where we get a better look at you.\n*choice\n\t#No thanks. I don't have time for this. Let's move on.\n\t\tNo problem. Moving right along…\n\t\t*set hair \"dark\"\n\t\t*goto name\n\t#Who wouldn't want a better look at me?\n\t\t*goto hairchoice\n\n*label hairchoice\n\nWhat color is your hair?\n*choice\n\t#Bleached blond from long hours in the sun.\n\t\t*set hair \"blond\"\n\t\t*if male\n\t\t\t*goto male_style\n\t\t*else\n\t\t\t*goto female_style\n\t#Black; I dyed it for the field to help blend in.\n\t\t*set hair \"black\"\n\t\t*set risk_taker %-10\n\t\t*if male\n\t\t\t*goto male_style\n\t\t*else\n\t\t\t*goto female_style\n\t#Red, an honest signal attesting to your passionate disposition.\n\t\t*set hair \"red\"\n\t\t*if male\n\t\t\t*goto male_style\n\t\t*else\n\t\t\t*goto female_style\n\t#Brown, though you would call it chestnut.\n\t\t*set hair \"chestnut\"\n\t\t*set pomposity %+10\n\t\t*if male\n\t\t\t*goto male_style\n\t\t*else\n\t\t\t*goto female_style\n\n \n*label male_style\nHow do you keep your hair styled in the field?\n*choice\n\t#Buzzed off, military style. No muss, no fuss.\n\t\t*set ruggedness %+10\n\t\t*goto facial_hair \n\t#In a loose shag.\n\t\t*set libido %+10\n\t\t*goto facial_hair \n\t#Long. Tied back with a piece of deer sinew. I like the old ways.\n\t\t*set ruggedness %+5\n\t\t*set cultural_fetishism %+10\n\t\t*goto facial_hair \n\t#I have a Cary Grant thing going on, and I manage to pull off debonair even in the archaeological trenches.\n\t\t*set ruggedness %-10\n\t\t*set pomposity %+10\n\t\t*goto facial_hair\n\n*label female_style\nHow do you keep your hair styled in the field?\n*choice\n\t#Au naturel: curly and loose.\n\t\t*set libido %+10\n\t\t*goto style\n\t#In a long rope of a braid that just grazes the top of my butt.\n\t\t*set libido %+10\n\t\t*goto style\n\t#In dreads. No shower, no problem.\n\t\t*set pomposity %-5\n\t\t*set ruggedness %+10\n\t\t*goto style\n\t#I keep it cropped short.\n\t\t*set ruggedness %+10\n\t\t*goto style\n\n*label facial_hair\nDescribe the state of your facial hair.\n*choice\n\t#Robust: I'm growing a sizable beard.\n\t\t*set ruggedness %+15\n\t\t*goto style\n\t#Culturally relative: this summer, I'm cultivating the Latino male mustache.\n\t\t*set cultural_fetishism %+10\n\t\t*goto style \n\t#Non-existent: I remain clean shaven even in the field.\n\t\t*set ruggedness %-15\n\t\t*set pomposity %+10\n\t\t*goto style \n\t#Non-committal: I give my scruff free rein most days.\n\t\t*set ruggedness %+10\n\t\t*goto style \n\n*label style\nTell me, what is your go-to style in the field?\n*choice\n\t#In the tropics, anyway, I wear as little as possible. Saves on pack weight.\n\n\t\tOkay, I can see you a little bit clearer now.\n\t\t*set libido %+20\n\t\t*set style \"skin\"\n\t\t*goto name \n\t#I dress in head-to-toe khaki with as many pockets as possible for comestibles, knives, and trinkets for the natives. Now if only I could remember where I put that chocolate bar before it melts all over my pants.…\n\t\tOkay, I can see you a little bit clearer now.\n\t\t*set ruggedness %+10\n\t\t*set cultural_fetishism %+10\n\t\t*set style \"pockets\"\n\t\t*goto name \n\t#I tend to go native, picking up brightly colored local textiles as I travel.\n\n\t\tOkay, I can see you a little bit clearer now.\n\t\t*set cultural_fetishism %+30\n\t\t*set ruggedness %-10\n\t\t*set style \"native\"\n\t\t*goto name \n\t#High-tech fabrics: waterproof, moisture-wicking, sun-proof, bug-proof, wind-proof, tear-resistant.\n\n\t\tOkay, I can see you a little bit clearer now.\n\t\t*set ruggedness %-10\n\t\t*set risk_taker %-10\n\t\t*set style \"proof\"\n\t\t*goto name\t \t\n\n*label name\n\nDo you have a name?\n*if male = false\n\t*choice\n\t\t#Deanna Denali.\n\t\t\t*set first_name \"Deanna\"\n\t\t\t*set last_name \"Denali\"\n\t\t\t*goto swing\n\t\t#Jesse Gunlock.\n\t\t\t*set first_name \"Jesse\"\n\t\t\t*set last_name \"Gunlock\"\n\t\t\t*goto swing\n\t\t#Catherine Hodder.\n\t\t\t*set first_name \"Catherine\"\n\t\t\t*set last_name \"Hodder\"\n\t\t\t*goto swing\n\t\t#Steph Silverado.\n\t\t\t*set first_name \"Steph\"\n\t\t\t*set last_name \"Silverado\"\n\t\t\t*goto swing\n\t\t#Are you kidding me? My name is way cooler than any of those!\n\t\t\t*goto none_of_the_above\n\n*else\n\t*choice\n\t\t#Luc Perrault.\n\t\t\t*set first_name \"Luc\"\n\t\t\t*set last_name \"Perrault\"\n\t\t\t*goto swing\n\t\t#Karl Schiffer.\n\t\t\t*set first_name \"Karl\"\n\t\t\t*set last_name \"Schiffer\"\n\t\t\t*goto swing\n\t\t#Raj Vanderhoot.\n\t\t\t*set first_name \"Raj\"\n\t\t\t*set last_name \"Vanderhoot\"\n\t\t\t*goto swing\n\t\t#Benjamin Pearson.\n\t\t\t*set first_name \"Benjamin\"\n\t\t\t*set last_name \"Pearson\"\n\t\t\t*goto swing\n\t\t#Are you kidding me? My name is way cooler than any of those!\n\t\t\t*goto none_of_the_above\n\n*label none_of_the_above\n\nIs that so? What, then, is your first name?\n\n*input_text first_name\n\n*page_break\n\nAnd how about your last name?\n\n*input_text last_name\n*page_break\n*goto swing \n\n\n\n*label swing\nAn excellent name for academic citations. May it appear many times in print! If I may be so bold as to ask, ${first_name}, how do you, er, swing?\n*choice\n\t#I like men.\n\t\t*set heckler \"he\"\n\t\t*set heck \"him\"\n\t\t*set youth \"him\"\n\t\t*set youth_his \"his\"\n\t\t*set youth_gender \"man\"\n\t\t*set the_youth \"he\"\n\t\t*set his \"His\"\n\t\t*set preference \"men\"\n\t\t*set peace_corps \"man\"\n\t\t*set his_peace_corps \"His\"\n\t\t*set his_his_peace_corps \"his\"\n\t\t*set he_peace_corps \"he\"\n\t\t*set him_peace_corps \"him\"\n\t\t*set Men_Women \"Men\"\n\t\t*goto anything_else\n\t#I prefer the ladies.\n\t\t*set heckler \"she\"\n\t\t*set heck \"her\"\n\t\t*set youth \"her\"\n\t\t*set youth_his \"her\"\n\t\t*set youth_gender \"woman\"\n\t\t*set his \"Her\"\n\t\t*set the_youth \"she\"\n\t\t*set his_peace_corps \"Her\"\n\t\t*set his_his_peace_corps \"her\"\n\t\t*set he_peace_corps \"she\"\n\t\t*set him_peace_corps \"her\"\n\t\t*set preference \"women\"\n\t\t*set peace_corps \"woman\"\n\t\t*set Men_Women \"Women\"\n\t\t*goto anything_else\n\t#Man, woman, berdache? I'm wide open!\n\t\t*set heckler \"he\"\n\t\t*set heck \"him\"\n\t\t*set youth \"her\"\n\t\t*set youth_gender \"woman\"\n\t\t*set youth_his \"her\"\n\t\t*set his \"Her\"\n\t\t*set the_youth \"she\"\n\t\t*set his_peace_corps \"His\"\n\t\t*set his_his_peace_corps \"his\"\n\t\t*set he_peace_corps \"he\"\n\t\t*set him_peace_corps \"him\"\n\t\t*set preference \"bi\"\n\t\t*set peace_corps \"man\"\n\t\t*set Men_Women \"Men and women\"\n\t\t*goto anything_else\n*label anything_else\nIs there anything else I should know about you?\n\n*choice\n\t#I have a sex-addiction problem.\n\t\t*set libido %+40\n\t\t*set extras \"sex addict\"\n\t\t*goto question \n\t#I've been making pretty good money on the side selling artifacts on eBay.\n\t\t*set moral_compass %-40\n\t\t*set extras \"looter\"\n\t\t*goto question \n\t#If my data don't say what I want them to, I feel free to doctor my Excel tables.\n\t\t*set moral_compass %-40\n\t\t*set extras \"cheater\"\n\t\t*goto question \n\t#I'm really into lip plugs.\n\t\t*set extras \"lip plugs\"\n\t\t*set cultural_fetishism %+20\n\t\t*goto question \n\t#I'm afraid of most birds.\n\t\t*set risk_taker %-20 \n\t\t*set extras \"birds\"\n\t\t*goto question\n\t#No. Nothing. Nothing at all.\n\t\t*set extras \"nothing\"\n\t\t*goto question\n\n*label question\nOne last thing, ${first_name}: what would you claim as your spirit animal?\n*choice\n\t#Three-toed sloth.\n\t\tWith a top speed of .15 mph, you will grow algae before you let anyone rush you. Algae are good. You prefer to blend into the canopy.\n\t\t*set fortune_and_glory %-10\n\t\t*set risk_taker %-10\n\t\t*set ruthlessness %-10\n\t\t*set libido %-10\n\t\t*set spirit_animal \"three-toed sloth\"\n\t\t*page_break\n\t\t*goto conference\n\t#Bonobo.\n\t\tYou possess an advanced intelligence and solve your problems through sexual play.\n\t\t*set libido %+15\n\t\t*set moral_compass %+15\n\t\t*set ruthlessness %-15\n\t\t*set spirit_animal \"bonobo\"\n\t\t*page_break\n\t\t*goto conference\n\t#Owl.\n\t\tYou are highly intelligent and a touch macabre. Most nights find you perched on a lab stool surrounded by bones.\n\n\t\t*set ruthlessness %+15\n\t\t*set spirit_animal \"owl\"\n\t\t*page_break\n\t\t*goto conference\n\t#Golden retriever.\n\t\tYou're not always so quick on the uptake, but you can be trained. You've got a knack for digging up bones. In moments of unbridled excitement, you've been known to hump legs and your fuzzy toys.\n\t\t*set libido %+5\n\t\t*set ruthlessness %-10\n\t\t*set spirit_animal \"golden retriever\"\n\t\t*page_break\n\t\t*goto conference\n\t#Cheetah.\n\t\tYou are swift, fierce, and fashion-forward. You feed mostly on the slow and infirm, thriving on the thrill of the chase as much as the kill.\n\t\t*set ruthlessness %+15\n\t\t*set fortune_and_glory %+15\n\t\t*set pomposity %+5\n\t\t*set spirit_animal \"cheetah\"\n\t\t*page_break\n\t\t*goto conference\n\n*label conference\n\t\nYup, sounds about right. Well, ${Mister} ${last_name}, you've come this far in your academic career, you clearly know how to play at department politics, and the fact that you have the [i]cojones[/i] to come alone to Colombia speaks to the powerful spark of your ambition. You're no armchair archaeologist! However difficult this Colombian survey becomes, you must stay focused. After all, much is at stake here. This trip has been a year in the making.\n\nAs you crouch in the brush, you cast your thoughts back in time, looking to gather resolve from everything you have overcome thus far.…\n*finish\n", "startup": "*title To the City of the Clouds\n*author Catherine Bailey\n*scene_list\n  startup\n  setting_the_stage_one\n  gathering_supplies_two\n  ecuador_three\n  farc_four\n  cloud_city_five\n  denouement_six\n\n\n\n*create character_defined false\n*create male true\n*create first_name \"j\"\n*create last_name \"doe\"\n*create personality \"empty\"\n*create mister \"empty\"\n*create sex_with_ta false\n*create professor false\n*create professors \"empty\"\n*create woman \"empty\"\n*create colleagues \"colleagues\"\n*create moral_compass 50\n*create funding 50\n*create health 50\n*create blood_alcohol_level 50\n*create libido 50\n*create risk_taker 50\n*create cultural_fetishism 50\n*create ruggedness 50\n*create ruthlessness 50\n*create pomposity 50\n*create fortune_and_glory 50\n*create hair \"empty\"\n*create body_hair \"empty\"\n*create meetings \"empty\"\n*create his_peace_corps \"empty\"\n*create he_peace_corps \"empty\"\n*create him_peace_corps \"empty\"\n*create his_his_peace_corps \"empty\"\n*create heckler \"empty\"\n*create heck \"empty\"\
