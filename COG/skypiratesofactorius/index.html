 drop another shelf on it, smashing it into the ground. By the time it wiggles free, someone has heard your @{used_revolver shouting and the gunshots|shouting}.\n\t\t\t*goto marine_door\n\t\t*elseif ( power + command ) > ( krayl_attack - 1 )\n\t\t\tjust as you drop another shelf on it, but it bursts through the scattered magazines and leaps for you!\n\t\t\t*if wounded\n\t\t\t\tJust as the door bangs open, the Deep Tech spider knocks you to the ground. You struggle to throw it off, but your ${injury} @{injury_plural ache|aches}, sapping your strength.\n\t\t\t\t*label marines_charge\n\t\t\t\tMarines charge into the room, but they are too late; the spider's claws go up, then come down on your head.\n\t\t\t\t*choice\n\t\t\t\t\t#Try this day again.\n\t\t\t\t\t\t*load_checkpoint\n\t\t\t\t\t#Restart the game.\n\t\t\t\t\t\t*goto restart\n\t\t\t*else\n\t\t\t\t*set wounded true\n\t\t\t\t*set injury \"scratched arm\"\n\t\t\t\tThe spider slashes your arm with its razor claws, but you shout again, grab its body in both hands, and hurl it against the far wall, snapping off at least two legs.\n\t\t\t\t*goto marine_door\n\t\t*else\n\t\t\tas you try to throw another shelf on it, but the shelf won't budge! The spider knocks you to the ground.\n\t\t\t*goto marines_charge\n\t#I hide.\n\t\tYou throw yourself into the wreckage of the broken furniture\n\t\t*if ( intellect + espionage ) > krayl_attack\n\t\t\tand hide. The Deep Tech spider pulls free of your ${pet}, then looks around for you, its glass eyes swiveling in every direction. It spots you just as your ${pet} slams into it again with enough force to crack one of those eyes. The spider falls to the ground, stunned.\n\t\t\t*goto marine_door\n\t\t*elseif ( intellect + espionage ) > ( krayl_attack - 1 )\n\t\t\tand try to hide in the shadows. The spider tears free of your ${pet}\n\t\t\t*if wounded\n\t\t\t\tand hears you when your ${injury} @{injury_plural make|makes} you gasp in pain. It leaps,\n\t\t\t\t*label hooks\n\t\t\t\thooks your leg with one claw, and drags you out just as the door bangs open.\n\t\t\t\t*goto marines_charge\n\t\t\t*else\n\t\t\t\t*set wounded true\n\t\t\t\t*set injury \"scratched legs\"\n\t\t\t\t*set injury_plural true\n\t\t\t\tand scurries over the broken furniture until it spots you. It tries to drag you out from beneath the splintered desk, slashing your legs as it struggles to dig you out, but then your ${pet} slams into it with enough force to crack one of its glass eyes.\n\t\t\t\t*goto marine_door\n\t\t*else\n\t\t\tand try to hide in the shadows. But The Deep Tech spider pulls free of your ${pet} and finds you easily. It\n\t\t\t*goto hooks\n\n*label crew_attacks\n*set crew 30\n*set crew_previous 30\n*set crew_attacked true\n*page_break\nSky piracy is much more civilized than old-fashioned sea piracy, and Captain Krayl insists his crew members take regular baths. You're just getting dressed in the wood-paneled changing room when a dozen scruffy crew members enter. You realize their intent even before they pull knives and wrenches from beneath their clothes. You have finally pushed the crew too far, and they have chosen the perfect time to strike, while you are without your ${pet} or your @{has_revolver weapons|${weapon}}.\n\nAs they close in, you see three ways you might survive this. You could reason with them, scramble out the window and hope you don't fall to your death, or beat the first one so severely the rest back off.\n*temp crew_attack 2\n*choice\n\t#I try to negotiate.\n\t\tYou raise your hands\n\t\t*if ( intellect + command ) > (crew_attack-1)\n\t\t\t*set crew 20\n\t\t\t*set crew_previous 20\n\t\t\tin such a commanding gesture that the crew stops. Never letting your eyes off the ones up front, you apologize while deflecting blame onto Captain Krayl, whose increasing isolation has started to anger the crew. You keep talking until more people arrive, and your would-be assassins reluctantly back off. You have managed a stay of execution.\n\t\t\t*page_break\n\t\t\t*return\n\t\t*else\n\t\t\tand prepare to justify your actions, but the crew wastes no time. One engineer steps forward and strikes you across the head with his wrench,\n\t\t\t*label close_in\n\t\t\tthen the rest close in, stabbing and pummeling. You don't have a chance.\n\t\t\t*choice\n\t\t\t\t#Try this day again.\n\t\t\t\t\t*load_checkpoint\n\t\t\t\t#Restart the game.\n\t\t\t\t\t*goto restart\n\t#I flee.\n\t\t*if wounded\n\t\t\t*set crew_attack 3\n\t\tYou pop the window and scramble outside into the cold air. Someone grabs your bare foot, but you kick her away and crawl onto the outer hull of the [i]Falling Angel[/i].\n\t\t*if ( finesse + espionage ) > crew_attack\n\t\t\tMoving fast, you scramble up the wooden planks until you reach the rigging, then drop onto the main deck near Midian. The crew has followed you, but they shrink away when they see the first mate. It looks like you have managed to elude them for now, at the price of a good pair of boots.\n\t\t\t*page_break\n\t\t\t*return\n\t\t*else\n\t\t\tYou scramble up the wooden planks, but the air is freezing, and you are still wet from your bath. Your hands slip, and you scream as you fall off the hull and plunge down to the ${ground}.\n\t\t\t*choice\n\t\t\t\t#Try this day again.\n\t\t\t\t\t*load_checkpoint\n\t\t\t\t#Restart the game.\n\t\t\t\t\t*goto restart\n\t#I knock the first attacker down and hope that dissuades the rest.\n\t\t*if wounded\n\t\t\t*set crew_attack 3\n\t\tYou can't fight them all, but\n\t\t*if ( power + fighting ) > crew_attack\n\t\t\tyou can fight the first one to reach you, a big engineer armed with a wrench. You duck his swing, hammer him in the ribs, and grab his wrist—and then his wrench is your wrench. You crack him across the head, then break the knuckles of an aero mechanic, who stumbles back into the crowd.\n\n\t\t\tWhen you clobber a few more, they turn and flee. Soon the crew is dragging their wounded out of the changing room.\n\t\t\t*page_break\n\t\t\t*return\n\t\t*else\n\t\t\tyou try to maneuver so you're only fighting one at a time. It doesn't work. They swarm you like hungry jackals and drag you to the ground. Someone smashes the back of your skull with a wrench,\n\t\t\t*goto close_in\n\n*label shop\n*choice\n\t#Yes. Let's see what I can buy.\n\t\t*if squid_shop\n\t\t\t*set krayl -10\n\t\t\tYou slip away while Midian haggles for a new landing hook. Hopefully your departure won't raise the first mate's suspicions—and the captain's. After a few minutes of wandering, you locate a dirty alley where shifty merchants sell illegal weapons and stolen supplies. Anything here will probably set you back about a hundred capons in initial payment and subsequent bribes. Right now you have ${wealth} capons.\n\t\t*else\n\t\t\t*set mogra_known true\n\t\t\tCombine Spire is lovely, but not the sort of place you can buy illegal weapons and Deep Tech salvage. You return to ${cafe}, rendezvous with an arms dealer nominally on the AAG's payroll, and secure an audience with a scarred old woman named Mogra, who claims to have everything you might want. She slides you a ledger with a list of items.\n\t\t\t*if buyables = 1\n\t\t\t\tThere's only one thing that strikes your interest:\n\t\t\t\t*if has_aero_upgrade = false\n\t\t\t\t\tan aero upgrade kit.\n\t\t\t\t*if has_better_weapon = false\n\t\t\t\t\ta better ${weapon}.\n\t\t\t\t*if has_revolver = false\n\t\t\t\t\ta revolver.\n\t\t\t\t*if has_motivator = false\n\t\t\t\t\ta Deep Tech motivator.\n\t\t\t\tDo you want to look at it?\n\t\t\t\t*choice\n\t\t\t\t\t#Yes.\n\t\t\t\t\t\t*if has_aero_upgrade = false\n\t\t\t\t\t\t\t*goto upgrade\n\t\t\t\t\t\t*if has_better_weapon = false\n\t\t\t\t\t\t\t*goto better_weapon\n\t\t\t\t\t\t*if has_revolver = false\n\t\t\t\t\t\t\t*goto revolver\n\t\t\t\t\t\t*if has_motivator = false\n\t\t\t\t\t\t\t*goto motivator\n\t\t\t\t\t#No.\n\t\t\t\t\t\t*goto pack_up\n\t\t\t*else\n\t\t\t\tEverything here will set you back about a hundred capons. You have ${wealth} capons right now.\n\n\t\t\t\tYou read the list, ignoring everything you don't need or already have:\n\t\t\t\t*if has_better_weapon = false\n\t\t\t\t\ta better ${weapon}.\n\t\t\t\t*if has_revolver = false\n\t\t\t\t\ta revolver.\n\t\t\t\t*if has_motivator = false\n\t\t\t\t\ta Deep Tech motivator.\n\t\t\t\t*if has_aero_upgrade = false\n\t\t\t\t\tan aero upgrade kit.\n\t\t\t\t*goto look_at\n\n\t\t*label look_at\n\t\t*choice\n\t\t\t*if has_better_weapon = false\n\t\t\t\t#I'm interested in a better ${weapon}.\n\t\t\t\t\t*label better_weapon\n\t\t\t\t\tYou have serviceable munitions-grade ${weapon}, but\n\t\t\t\t\t*if squid_shop\n\t\t\t\t\t\ta one-eyed Quon Bexi with a tattoo across his forehead that reads CANNIBAL is selling a blade of desert steel. He seems trustworthy.\n\t\t\t\t\t*else\n\t\t\t\t\t\tMogra is selling a Scothic Arms blade of high-quality carbon steel. She boasts about how many city guards this weapon murdered. At least twenty, and the city guards often wear heavy armor. It must be good.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I buy the ${weapon}.\n\t\t\t\t\t\t\t*set wealth -100\n\t\t\t\t\t\t\t*set has_better_weapon true\n\t\t\t\t\t\t\t*set buyables -1\n\t\t\t\t\t\t\tAfter selling your old blade and strapping on your new ${weapon}, @{(wealth = 0) you have no money left|you have ${wealth} capons remaining}.\n\t\t\t\t\t\t\t*label keep_shopping_after_purchase\n\t\t\t\t\t\t\t*if ( wealth >= 100 ) and ( buyables > 0 )\n\t\t\t\t\t\t\t\tDo you want to keep shopping?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Yes.\n\t\t\t\t\t\t\t\t\t\t*goto look_at\n\t\t\t\t\t\t\t\t\t#No.\n\t\t\t\t\t\t\t\t\t\t*if squid_shop\n\t\t\t\t\t\t\t\t\t\t\tYou run into Midian at the entrance to the gray market.\n\t\t\t\t\t\t\t\t\t\t\t*goto there\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\tYou return to Combine Spire.\n\t\t\t\t\t\t\t\t\t\t\t*return\n\t\t\t\t\t\t\t*elseif buyables = 0\n\t\t\t\t\t\t\t\t*label out\n\t\t\t\t\t\t\t\tYou're out of things to buy, so\n\t\t\t\t\t\t\t\t*label which_shop\n\t\t\t\t\t\t\t\t*if squid_shop\n\t\t\t\t\t\t\t\t\tit's convenient when you spot Midian shoving her way through the crowd toward you.\n\t\t\t\t\t\t\t\t\t*label there\n\n\t\t\t\t\t\t\t\t\tShe rubs a bandage on her arm (it looks like she got a new tattoo) and says, \"There you are. Come with me.\"\n\t\t\t\t\t\t\t\t\t*return\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*label pack_up\n\t\t\t\t\t\t\t\t\tMogra packs up shop, and you return to Combine Spire.\n\t\t\t\t\t\t\t\t\t*return\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tSince you can't afford anything else,\n\t\t\t\t\t\t\t\t*goto which_shop\n\t\t\t\t\t\t#I don't want it.\n\t\t\t\t\t\t\t*label keep_shopping_no_purchase\n\t\t\t\t\t\t\t*if buyables = 0\n\t\t\t\t\t\t\t\t*goto out\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tDo you want to keep shopping?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Yes.\n\t\t\t\t\t\t\t\t\t\t*goto look_at\n\t\t\t\t\t\t\t\t\t#No.\n\t\t\t\t\t\t\t\t\t\t*if squid_shop\n\t\t\t\t\t\t\t\t\t\t\t*label return_to_midian\n\t\t\t\t\t\t\t\t\t\t\t*set krayl +10\n\t\t\t\t\t\t\t\t\t\t\tYou hurry back to Midian before you're missed.\n\t\t\t\t\t\t\t\t\t\t\t*goto clue_hunt\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*goto pack_up\n\t\t\t*if has_revolver = false\n\t\t\t\t#Let's look at the revolver.\n\t\t\t\t\t*label revolver\n\t\t\t\t\tCaptain Krayl won't hand out firearms except during actual combat, since pirates use them to open bottles and scare away pigeons. @{squid_shop But a blind Outer Islands grandmother keeps trying to sell you a three-shot pocket revolver. It's a well-crafted weapon, and more important, you can hide it|But Mogra is offering a battered, stained, ugly little revolver that is nonetheless in perfect working order. It's small enough to hide} in your coat pocket.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I buy the revolver.\n\t\t\t\t\t\t\t*set wealth -100\n\t\t\t\t\t\t\t*set has_revolver true\n\t\t\t\t\t\t\t*set buyables -1\n\t\t\t\t\t\t\tAfter buying the revolver and ammunition, @{(wealth = 0) you're out of money|you have ${wealth} capons remaining}. You tuck the weapon away.\n\t\t\t\t\t\t\t*goto keep_shopping_after_purchase\n\t\t\t\t\t\t#I don't want it.\n\t\t\t\t\t\t\t*goto keep_shopping_no_purchase\n\t\t\t*if has_motivator = false\n\t\t\t\t#What's the Deep Tech motivator?\n\t\t\t\t\t*label motivator\n\t\t\t\t\t*if squid_shop\n\t\t\t\t\t\t@{(engineering = 0) Though you're not an engineer, you|You} recognize the irregularly shaped Deep Tech device sitting on a shelf among the broken radios and tiny ceramic unicorn figurines. It looks a bit like a heart, and since the machines of the Deep Tech are alive, it sort of is; give that motivator to your ${metal} ${pet}, and you will increase its potency.\n\t\t\t\t\t*else\n\t\t\t\t\t\t@{(engineering = 0) Though you're not an engineer, you|You} recognize the metallic spiral when Mogra shows it to you. No larger than your thumb, it is fresh from the Deep Tech and contains enough power to enhance your ${pet}'s strength and agility.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I buy the motivator.\n\t\t\t\t\t\t\t*set wealth -100\n\t\t\t\t\t\t\t*set has_motivator true\n\t\t\t\t\t\t\t*set buyables -1\n\t\t\t\t\t\t\t@{(wealth = 0) That's it for your cash|You have ${wealth} capons remaining}.\n\n\t\t\t\t\t\t\tYou can feed the motivator to your ${pet} when you get back to the [i]Falling Angel[/i].\n\t\t\t\t\t\t\t*goto keep_shopping_after_purchase\n\t\t\t\t\t\t#I don't want it.\n\t\t\t\t\t\t\t*goto keep_shopping_no_purchase\n\t\t\t*if has_aero_upgrade = false\n\t\t\t\t#I want specs on the aero upgrade kit.\n\t\t\t\t\t*label upgrade\n\t\t\t\t\tThe J-20 is an older aero with known aerodynamic problems. In other words, it is slow, clumsy, and honestly pretty ugly from every angle. This standard-issue upgrade kit fits in a single heavy crate and fixes the first two problems.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I buy the aero kit.\n\t\t\t\t\t\t\t*set wealth -100\n\t\t\t\t\t\t\t*set has_aero_upgrade true\n\t\t\t\t\t\t\t*set buyables -1\n\t\t\t\t\t\t\t@{(wealth = 0) That's it for your cash|You have ${wealth} capons remaining}.\n\n\t\t\t\t\t\t\tYou can @{(engineering = 0) have the hangar mechanics install the upgrade|install the upgrade yourself} once you get back to the [i]Falling Angel[/i].\n\t\t\t\t\t\t\t*goto keep_shopping_after_purchase\n\t\t\t\t\t\t#I don't want it.\n\t\t\t\t\t\t\t*goto keep_shopping_no_purchase\n\t\t\t#I don't want anything. I leave.\n\t\t\t\t*goto return_to_midian\n\t#No, I stick close and keep earning Captain Krayl's trust.\n\t\t*if squid_shop\n\t\t\t*set krayl +10\n\t\t\tYou stay close by Midian while she buys cannon ammo and gets a new tattoo, talking about your work in a way that—you hope—will help ingratiate you to the captain and the other officers.\n\t\t*else\n\t\t\tYou leave Mogra in her shadowy corner and return to Combine Spire.\n\t\t*return\n\n*label infirmary\n*set wealth -100\n*set wounded false\n\n*if visited_infirmary\n\tYou return to the infirmary and hand over a hundred capons so Dr. Blackroot can heal your ${injury}.\n*else\n\t*set visited_infirmary true\n\tYou head to the infirmary to pay for the privilege of medical treatment.\n\t*if after_battle\n\t\tYou wait as the nurses attend to the seriously injured first.\n\t@{blackroot_known Dr. Blackroot accepts|The physician, Dr. Blackroot, accepts} your hundred capons so he will heal your ${injury}.\n\t*set blackroot_known true\n*set injury_plural false\n*set injury \"undetermined\"\n*return\n\n*label blow_up_angel\n*set angel false\n*check_achievements\n*if choice_achieved_problem_solver = false\n\t*achieve problem_solver\n*set midian_alive false\n*return\n\n*label day_declare_check\n*if day_declare\n\tDay ${day}:\n*set day_declare false\n*return\n\n*label restart\n*if choice_randomtest\n\t*temp avoid_restart 0\n\t*rand avoid_restart 0 10\n\t*if (avoid_restart > 0)\n\t\t*load_checkpoint\n\t*restart\n\n*label bad_ending\n*delay_ending 1200 $4.99\n\n*label good_ending\n*page_break End\nWe hope you've enjoyed playing [i]Sky Pirates of Actorius.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99\n\n*label trial_end\n*check_purchase adfree\n*if not((choice_is_steam or choice_prerelease) or choice_randomtest) or (choice_purchased_adfree or not(choice_purchase_supported))\n\t*label purchased\n\t*return\nRemember earlier how we told you that some of the game's content is available for free? This is the end of the free content.\n\n*if choice_prerelease\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining content.[/i]\n\n*purchase_discount adfree 2020-01-30 $4.99 $2.99 purchased\n*abort\n", "choicescript_description": "Infiltrate a pirate airship and foil the captain's plans! Can you survive the greedy crew and ruthless officers and disrupt their schemes in time? You'll hunt merchant vessels, and seek lost treasure while undercover as a sky pirate! \n\nEscape to the skies above the world of [i]Empyrean[/i] and command a brutal crew of pirates in search of plunder, glory, and high-tech booty! \n\n[i]Sky Pirates of Actorius[/i] is a 37,000-word interactive adventure story by Kyle Marquis, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nNo one on land, sea, or air can stop Captain Krayl as he plunders the great city of Actorius—no one except you. Trained by the Actorian Air Guard, with a clockwork animal companion that not even your commanding officer knows about, you must infiltrate the crew of the pirate airship [i]Falling Angel[/i]. Your orders: learn Captain Krayl’s true plans and stop him at any cost.\n\nBut far from your commanding officer and surrounded by treasure and opportunity, you will have to decide where your true loyalties lie. If you can deflect Captain Krayl’s suspicions, please your handlers back home, and keep the crew from turning against you, glory awaits you: promotion back in Actorius, fame and riches as a sky pirate, or even the [i]Falling Angel[/i] itself. But step carefully: everyone wants something, and everyone here will kill to get it.\n\n• Play as male, female, or nonbinary.\n• Fly aeros in deadly dogfights against merchant vessels and enemy pirates.\n• Stay loyal to the Actorian Air Guard or betray them for glory, treasure, or friendship.\n• Outwit spies and rival agents in shady ports of call.\n• Command your clockwork animal companion to help you fight, fly, and spy.\n• Use cunning and misdirection to balance the conflicting demands of captain, crew, and your secret mission.\n• Hunt for buried treasure in the metal jungles of the Deep Tech.\n", "choicescript_stats": "*comment SKY PIRATES OF ACTORIUS: DOSSIER\n\n*label main_stat_page\n\n*label dossier\n*if dossier\n\t*comment *text_image dossier.png center ACTORIAN AIR GUARD SPECIAL ASSIGNMENT DOSSIER\n\tACTORIAN AIR GUARD SPECIAL ASSIGNMENT DOSSIER\n\t*line_break\n\tAgent ${a1}${a2}${a3}${a4}\n\t*line_break\n\tAMID 26-JTW-921-CC-12\n\t*line_break\n\tAssignment Codename: ${name}\n\t*line_break\n\tGender: $!{gender}\n\t*line_break\n\t*line_break\n\tSpecialized training in aero @{(high_skill_2 = \"undetermined\") piloting and ${high_skill_1}|piloting, ${high_skill_1}, and ${high_skill_2}}.\n\t*line_break\n\t*line_break\n\tSuperior ${high_stat} and spatial awareness. Limited ${low_stat}.\n\t*line_break\n\n\tCurrent wealth: ${wealth} capons\n\n\t*if joined_crew\n\t\tStatus Assessment (decrypted using AX/${a1}${a2}${a3}${a4} Standard)\n\n\t\tCaptain Krayl @{(krayl = krayl_previous) still|}\n\t\t*if krayl > 90\n\t\t\t*if krayl_high_warning\n\t\t\t\ttrusts and admires you.\n\t\t\t*else\n\t\t\t\t*set krayl_high_warning true\n\t\t\t\ttrusts you so much that the AAG brass might fear you've betrayed them.\n\t\t*elseif krayl > 70\n\t\t\ttrusts and respects you.\n\t\t*elseif krayl > 50\n\t\t\ttrusts you.\n\t\t*elseif krayl > 20\n\t\t\tdistrusts you.\n\t\t*else\n\t\t\tdoes not trust you at all.\n\t\t\t*if krayl_low_warning = false\n\t\t\t\t*set krayl_low_warning true\n\t\t\t\tIf he grows any more suspicious, he may have you killed.\n\n\t\tLieutenant Ryonet is @{(ryonet = ryonet_previous) still|}\n\t\t*if ryonet > 90\n\t\t\t*if ryonet_high_warning\n\t\t\t\timpressed.\n\t\t\t*else\n\t\t\t\t*set ryonet_high_warning true\n\t\t\t\tso impressed that you fear Captain Krayl may start doubting your loyalty.\n\t\t*elseif ryonet > 70\n\t\t\timpressed.\n\t\t*elseif ryonet > 50\n\t\t\tpleased.\n\t\t*elseif ryonet > 20\n\t\t\tdissatisfied.\n\t\t*else\n\t\t\tcompletely dissatisfied.\n\t\t\t*if ryonet_low_warning = false\n\t\t\t\t*set ryonet_low_warning true\n\t\t\t\tHer superiors are probably considering ending this mission, with immediate and fatal results to you.\n\n\t\tThe crew @{(crew = crew_previous) still|}\n\t\t*if crew > 90\n\t\t\t*if crew_high_warning\n\t\t\t\tloves and admires you.\n\t\t\t*else\n\t\t\t\t*set crew_high_warning true\n\t\t\t\tloves and admires you so much Captain Krayl and Lieutenant Ryonet may both fear you are plotting a mutiny.\n\t\t*elseif crew > 70\n\t\t\trespects and admires you.\n\t\t*elseif crew > 50\n\t\t\trespects you.\n\t\t*elseif crew > 20\n\t\t\tdoesn't like you.\n\t\t*else\n\t\t\tdespises you.\n\t\t\t*if crew_low_warning\n\t\t\t\thates you so much they may try to kill you.\n*else\n\tYou do not have a dossier yet.\n*finish\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 12[/b]\n  \n  Unlock chapters 4 through 12, including the thrilling conclusion!\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 12[/b]\n  \n  You've paid to unlock chapters 4 through 12.\n", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "screenshots": "*set dossier true\n*set joined_crew true\n\n*comment SCREENSHOT 1\n\n*set a1 6\n*set a2 7\n*set a3 8\n*set a4 3\n\n*set name \"Aura\"\n*set gender \"female\"\n\n*set high_skill_1 \"combat skills\"\n*set high_skill_2 \"social skills\"\n*set high_stat \"coordination\"\n*set low_stat \"education\"\n\n*set wealth 100\n\n*set krayl 45\n*set ryonet 80\n*set crew 36\n\nYou start the engine just as the hooks release, dropping your aero out of the [i]Falling Angel[/i]'s hangar bay two thousand feet above the Tangled Sea.\n\nThe prize ship, a huge merchant galleon held aloft by an asymmetrical arrangement of air bladders, tries to flee as you level out and accelerate. Its big guns swivel toward you and your wingmen.\n\n*fake_choice\n\t#The prize is mine! I go in first, guns blazing.\n\t\t\n\t#I rush in, then dodge so the merchant galleon shoots at me, giving my wingmen time to attack.\n\t\t\n\t#I swirl around the airship, luring it toward the [i]Falling Angel[/i] so we can launch a boarding action.\n\n*comment SCREENSHOT 2\n\n*set a1 4\n*set a2 5\n*set a3 6\n*set a4 2\n\n*set name \"Zorric\"\n*set gender \"male\"\n\n*set high_skill_1 \"mechanical skills\"\n*set high_skill_2 \"combat skills\"\n*set high_stat \"education\"\n*set low_stat \"physical strength\"\n\n*set wealth 450\n\n*set krayl 95\n*set ryonet 30\n*set crew 60\n\nWhen you return to the [i]Falling Angel[/i], Captain Krayl has finally emerged from his cabin. There are dark circles under his eyes and his nails are stained with oil, though his silk necktie is immaculate as ever.\n\nPassing you, he says, \"You didn't leave. Good. Too many people left because I made them rich. Now I need to find more.\"\n\nProspective crew members are lining up outside the [i]Angel[/i] for the captain's inspection. With the officers busy, you can answer questions that have vexed you since you joined this ill-fated expedition: how did your fellow secret agents die? And what, exactly, is Captain Krayl doing in his cabin?\n\n*fake_choice\n\t#I talk to the ship's doctor about the wounds on the dead agents.\n\t\t\t\n\t#I describe the wounds on the agents to the knife-fighters in the cantina outside. Maybe they can figure out what happened.\n\t\t\n\t#I convince my clockwork monkey to sneak into Krayl's cabin.\n\t\t\n\t#I check the shipping manifests to figure out what Krayl has been sneaking into his cabin.\n\n*comment SCREENSHOT 3\n\n*set a1 0\n*set a2 8\n*set a3 4\n*set a4 1\n\n*set name \"Tyole\"\n*set gender \"female\"\n\n*set high_skill_1 \"social skills\"\n*set high_skill_2 \"espionage skills\"\n*set high_stat \"education\"\n*set low_stat \"physical strength\"\n\n*set wealth 900\n\n*set krayl 30\n*set ryonet 80\n*set crew 22\n\t\n\"Let's move,\" First Mate Midian says. \"The cave mouth faces west, so we'll have a few hours of light once the sun starts to set, but we can't be out in the open when darkness falls, not here in the Deep Tech. The machines here make Tyole's silver wolf look like a pet bunny.\"\n\nThe metal jungle rises up all around you. Lantern-yellow eyes watch you from the shadows of steel trees.\n*fake_choice\n\t#I use my map and flashlight to help Midian navigate the jungle.\n\t\t\t\n\t#I make sure my sword is ready. If these metal beasts attack, I plan to fight.\n\n\t#I coordinate with my silver wolf to scout for threats.\n\n*comment SCREENSHOT 4\n\n*set a1 5\n*set a2 0\n*set a3 7\n*set a4 8\n\n*set name \"Leshway\"\n*set gender \"nonbinary\"\n\n*set high_skill_1 \"espionage skills\"\n*set high_skill_2 \"mechanical skills\"\n*set high_stat \"physical strength\"\n*set low_stat \"education\"\n\n*set wealth 0\n\n*set krayl 33\n*set ryonet 52\n*set crew 91\n\nDoctor Blackroot rushes into the hidden stable and tries to justify himself, arguing that he pays for his horse out of his own pocket, that the horse balances out some heavy equipment on the other side of the airship, and that no one is using this room anyway. But, as First Mate Midian points out, it's a horse. It's a whole entire horse.\n\n*fake_choice\n\t#I shake Doctor Blackroot down for a bribe. If he can afford a secret horse, he can afford to buy my silence.\n\t\t\n\t#I report the secret horse to Captain Krayl.\n\t\t\n\t#I cannot come between a man and his secret horse. \"Midian, we should go.\"\n\t\t\n*comment SCREENSHOT 5\n\n*set a1 7\n*set a2 4\n*set a3 8\n*set a4 9\n\n*set name \"Ferro\"\n*set gender \"male\"\n\n*set high_skill_1 \"combat skills\"\n*set high_skill_2 \"social skills\"\n*set high_stat \"coordination\"\n*set low_stat \"education\"\n\n*set wealth 200\n\n*set krayl 50\n*set ryonet 26\n*set crew 5\n\nSky piracy is much more civilized than old-fashioned sea piracy, and Captain Krayl insists his crew members take regular baths. You're just getting dressed in the wood-paneled changing room when a dozen scruffy crew members enter. You realize their intent even before they pull knives and wrenches from beneath their clothes. You have finally pushed the crew too far, and they have chosen the perfect time to strike, while you are without your clockwork serpent.\n\n*fake_choice\n\t#I back away while trying to calm them down.\n\t\t\n\t#I flee out the window!\n\t\t\n\t#I knock the teeth out of the first attacker and hope that dissuades the rest.\n\t\t", "startup": "*comment SKY PIRATES OF ACTORIUS by KYLE MARQUIS\n\n*title Sky Pirates of Actorius\n*author Kyle Marquis\n\n*scene_list\n\tstartup\n\t1_game\n\n*create implicit_control_flow true\n\n*comment PRIMARY VARIABLES\n\n*create finesse 2\n*create intellect 2\n*create power 2\n\n*create command 0\n*create engineering 0\n*create espionage 0\n*create fighting 0\n\n*create high_skill_1 \"undetermined\"\n*create high_skill_2 \"undetermined\"\n*create high_stat \"undetermined\"\n*create low_stat \"undetermined\"\n\n*comment SECONDARY VARIABLES\n*create krayl 50\n*create ryonet 50\n*create crew 50\n*create wealth 0\n*create wounded false\n*create injury \"undetermined\"\n*create injury_plural false\n\n*comment OTHER VARIABLES\n*create name \"undetermined\"\n*create gender \"undetermined\"\n*create pet \"undetermined\"\n*create job \"undetermined\"\n*create dossier false\n\n*create a1 0\n*create a2 0\n*create a3 0\n*create a4 0\n*comment Agent number\n\n*comment RELATIONSHIP VARIABLES\n\n*create crew_previous 0\n*create krayl_previous 0\n*create ryonet_previous 0\n*comment Adds the word \"still\" if someone's mood hasn't changed from the last time it was checked.\n\n*create joined_crew false\n\n*create crew_high_warning false\n*create crew_low_warning false\n*create krayl_high_warning false\n*create krayl_low_warning false\n*create ryonet_high_warning false\n*create ryonet_low_warning false\n*comment Warns you about the danger of high or low scores\n\n*create crew_attacked false\n*create krayl_attacked false\n*comment If crew or krayl drop below 20, they attack you once, then kill you outright the second time. Ryonet just kills you outright.\n\n*comment Achievements\n\n*achievement agent visible 25 Special Agent\n\tBecome a special agent of the Actorian Air Guard\n\n*achievement captain visible 50 Pirate Captain\n\tBecome a pirate captain\n\n*achievement commander visible 50 Special Commander\n\tBecome a special commander of the Actorian Air Guard\n\n*achievement commodore visible 100 Pirate Commodore\n\tCommand a fleet of pirate ships\n\n*achievement first_mate visible 25 First Mate\n\tBecome first mate of the pirate airship\n\n*achievement mediator visible 50 Mediator\n\tMediate among captain, crew, and the AAG without rousing anyone's ire\n\n*achievement problem_solver visible 50 Problem Solver\n\tBlow up the pirate ship\n\n*if choice_is_omnibus_app\n\t*comment skip description\n\n\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tInfiltrate a pirate airship and foil the captain's plans! Can you survive the greedy crew and ruthless officers and disrupt their schemes in time? You'll hunt merchant vessels, and seek lost treasure while undercover as a sky pirate! \n\n\tEscape to the skies above the world of [i]Empyrean[/i] and command a brutal crew of pirates in search of plunder, glory, and high-tech booty! \n\n\t[i]Sky Pirates of Actorius[/i] is a 37,000-word interactive adventure story by Kyle Marquis, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\tNo one on land, sea, or air can stop Captain Krayl as he plunders the great city of Actorius—no one except you. Trained by the Actorian Air Guard, with a clockwork animal companion that not even your commanding officer knows about it, you must infiltrate the crew of the pirate airship [i]Falling Angel[/i]. Your orders: learn Captain Krayl’s true plans and stop him at any cost.\n\n\tBut far from your commanding officer and surrounded by treasure and opportunity, you will have to decide where your true loyalties lie. If you can deflect Captain Krayl’s suspicions, please your handlers back home, and keep the crew from turning against you, glory awaits you: promotion back in Actorius, fame and riches as a sky pirate, or even the [i]Falling Angel[/i] itself. But step carefully: everyone wants something, and everyone here will kill to get it.\n\n\t• Play as male, female, or nonbinary.\n\t• Fly aeros in deadly dogfights against merchant vessels and enemy pirates.\n\t• Stay loyal to the Actorian Air Guard or betray them for glory, treasure, or friendship.\n\t• Outwit spies and rival agents in shady ports of call.\n\t• Command your clockwork animal companion to help you fight, fly, and spy.\n\t• Use cunning and misdirection to balance the conflicting demands of captain, crew, and your secret mission.\n\t• Hunt for buried treasure in the metal jungles of the Deep Tech.\n\n\n\t*if choice_prerelease\n\t\t[i]You can play the first portion game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t*choice\n\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t*restart\n\t\t\t#Play the first portion of the game now for free.\n\t\t\t\t*goto purchased\n\n\t*elseif choice_is_steam\n\t\t[i]You can play the first portion of the game for free. Purchase the rest of the game below.[/i]\n\t\t*if choice_is_advertising_supported\n\t\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t\t*purchase_discount adfree 2020-01-30 $4.99 $2.99 purchased\n\t\t*if choice_is_advertising_supported\n\t\t\t*page_break_advertisement\n\t\t*if not(choice_is_advertising_supported)\n\t\t\t*page_break Play Now for Free\n\n\t\t*goto purchased\n\t*else\n\t\t*if choice_is_advertising_supported\n\t\t\t[i]Sky Pirates of Actorius[/i] is supported by advertisements, but you can buy the unlimited version\n\t\t\tto turn off ads forever.\n\n\t\t\t*purchase_discount adfree 2020-01-30 $4.99 $2.99 purchased\n\t\t\t*page_break_advertisement\n\n\t\t\t*goto purchased\n\t\t*else\n\t\t\t[i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n\t\t\t*purchase_discount adfree 2020-01-30 $4.99 $2.99 purchased\n\t\t\t*page_break Play Now for Free\n\n*label purchased\n\n*finish PLAY SKY PIRATES OF ACTORIUS\n"}};
