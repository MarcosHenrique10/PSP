<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sky Pirates of Actorius — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "skypiratesofactorius", "title": "Sky Pirates of Actorius", "scenes": {"1_game": "*comment Generate random agent number\n\n*script Scene.validCommands.set_checkpoint = 1; Scene.prototype.set_checkpoint = function() {this.stats.checkpoint = {stats:{}, temps:{}}; for (var i in this.nav.startingStats) { this.stats.checkpoint.stats[i] = this.stats[i]; } for (var i in this.temps) { this.stats.checkpoint.temps[i] = this.temps[i]; } this.stats.checkpoint.choice_lineNum = this.lineNum; }\n\n*script Scene.validCommands.load_checkpoint = 1; Scene.prototype.load_checkpoint = function () { for (var i in this.nav.startingStats) { this.stats[i] = this.stats.checkpoint.stats[i]; } for (var i in this.stats.checkpoint.temps) { this.temps[i] = this.stats.checkpoint.temps[i]; } this.lineNum = stats.checkpoint.choice_lineNum; }\n\n*set_checkpoint\n\n*rand a1 0 9\n*rand a2 0 9\n*rand a3 0 9\n*rand a4 0 9\n\n*comment DECISION VARIABLES\n\n*temp dec 0\n*temp dec_simple true\n*comment Simple decisions just modify SVs; complex decisions involve a test\n*temp dec_1_used false\n*temp dec_2_used false\n*temp dec_3_used false\n*temp dec_4_used false\n*temp dec_5_used false\n*temp dec_6_used false\n*temp dec_7_used false\n*temp dec_8_used false\n*temp dec_9_used false\n*temp dec_10_used false\n*temp dec_11_used false\n*temp dec_12_used false\n*temp dec_13_used false\n*temp dec_14_used false\n*temp dec_15_used false\n*temp dec_16_used false\n*temp dec_17_used false\n*temp dec_18_used false\n*temp dec_19_used false\n*temp dec_20_used false\n*temp dec_21_used false\n*comment Each decision happens only once\n\n*comment Day Randomizers\n\n*temp day_inc_1 0\n*rand day_inc_1 4 6\n\n*temp day_inc_2 0\n*rand day_inc_2 2 3\n\n*temp day_inc_3\n*rand day_inc_3 2 6\n\n*temp day_8_10 0\n*rand day_8_10 8 10\n\n*temp day_12_15 0\n*rand day_12_15 12 15\n\n*temp day_17_20 0\n*rand day_17_20 17 20\n\n*temp extra_days 0\n*rand extra_days 0 2\n*comment You make 4-6 decisions in this section.\n\n*temp day_22_23 0\n*rand day_22_23 22 23\n\n*temp day_25_26 0\n*rand day_25_26 25 26\n\n*temp quick_random 0\n*rand quick_random 1 6\n\n*temp day_43_45 0\n*rand day_43_45 43 45\n\n*temp day_52_55 0\n*rand day_52_55 52 55\n\n*temp day_56_58 0\n*rand day_56_58 56 58\n\n*temp day_59_62 0\n*rand day_59_62 59 62\n\n*temp day_64_70 0\n*rand day_64_70 64 70\n\n*temp day_71_73 0\n*rand day_71_73 71 73\n\n*temp day_75_76 0\n*rand day_75_76 75 76\n\n*temp extra_days_2 0\n*rand extra_days 0 2\n\n*temp before_contact true\n*comment Becomes false when you first contact Ryonet\n\n*comment NPC VARIABLES\n\n*temp angel true\n*temp chax_alive false\n*temp cloudy_alive true\n*temp midian_alive true\n*temp krayl_alive true\n*temp helper_alive true\n\n*temp gaxlin_alive true\n*temp landau_alive true\n\n*temp landau_known false\n*temp blackroot_known false\n*temp mogra_known false\n\n*comment EQUIPMENT VARIABLES\n*temp weapon \"undetermined\"\n*temp has_weapon true\n*temp has_better_weapon false\n*temp has_revolver false\n*temp has_aero_upgrade false\n*temp has_motivator false\n\n*temp used_rifle false\n*temp used_weapon false\n*temp used_revolver false\n\n*comment MISC\n\n*temp map_stolen false\n*temp seen_krayl_sword false\n*temp print_stopped false\n*temp spider_known false\n*temp visited_infirmary false\n*temp missing \"undetermined\"\n*temp after_battle false\n*temp ground \"Tangled Sea\"\n*temp buyables 4\n\n*comment ENDGAME\n*temp is_captain false\n*temp is_elite false\n*temp krayl_takes_pet false\n\nSKY PIRATES OF ACTORIUS\n*comment *text_image sky_pirates_of_actorius.png center SKY PIRATES OF ACTORIUS\n\n\"Who are these bold pirates who strike at the very heart of Actorius, greatest city of the Unclaimed Lands? No one has seen them crossing our skies, but they have already plundered three steamships, two airships, and a payroll train. What will their next target be, and why can the Actorian Air Guard not stop them?\"\n\nYour commanding officer, Lieutenant Ryonet, turns off the radio before the announcer says more about the competence of the Actorian Air Guard.\n\nShe orders you to sit down and says, \"You know why you are here, Cadet. We intend to infiltrate the crew of this new pirate ship. You are exactly what we need because you are no one. No family, no connections. You might as well not exist. But you are well trained.\"\n\nLieutenant Ryonet opens your dossier and says, \"We have had to deal with impostors lately, so please answer the following questions correctly.\"\n\nOutside the office, you hear the sound of a pistol's safety being switched off.\n\n\"What was your specialty at the Actorian Air Guard Flight Academy?\" Lieutenant Ryonet says.\n\n*temp a_job \"undetermined\"\n*temp job_type \"undetermined\"\n*temp helper \"undetermined\"\n*temp helper_desc \"undetermined\"\n*temp head_job \"undetermined\"\n*temp helper_he_she \"undetermined\"\n*temp helper_his_her \"undetermined\"\n*temp helper_man_woman \"undetermined\"\n\n*fake_choice\n\t#\"Engineering.\" I was supposed to be just a mechanic, not a pilot.\n\t\t*set engineering +1\n\t\t*set high_skill_1 \"mechanical skills\"\n\t\t*set job \"engineer\"\n\t\t*set a_job \"an engineer\"\n\t\t*set job_type \"technical education\"\n\t\t*set helper \"Lookout\"\n\t\t*set helper_desc \"old engineer\"\n\t\t*set head_job \"chief engineer\"\n\t\t*set helper_he_she \"she\"\n\t\t*set helper_his_her \"her\"\n\t\t*set helper_man_woman \"woman\"\n\t\t\"How a nobody like you aced the mechanical tests is a mystery,\" the lieutenant says. \"But you know how to fix aeros as well as fly them.\n\t#\"Combat.\" I'm trained in pistol, rifle, and a variety of close-combat weapons.\n\t\t*set fighting +1\n\t\t*set high_skill_1 \"combat skills\"\n\t\t*set job \"marine\"\n\t\t*set a_job \"a marine\"\n\t\t*set job_type \"combat training\"\n\t\t*set helper \"Rune\"\n\t\t*set helper_desc \"bearded marine\"\n\t\t*set head_job \"marine captain\"\n\t\t*set helper_he_she \"he\"\n\t\t*set helper_his_her \"his\"\n\t\t*set helper_man_woman \"man\"\n\t\t\"Your fencing and marksmanship ratings are almost as good as your pilot ranking,\" the lieutenant says. \"You're a born killer.\n\t#\"Espionage.\" It's not actually called [i]espionage[/i] on the dossier, but we all know what [i]nonspecific countermeasures[/i] means.\n\t\t*set espionage +1\n\t\t*set high_skill_1 \"espionage skills\"\n\t\t*set job \"bursar\"\n\t\t*set a_job \"a bursar\"\n\t\t*set job_type \"knowledge of security systems\"\n\t\t*set helper_desc \"well-dressed accountant\"\n\t\t*set helper \"Pennybender\"\n\t\t*set head_job \"quartermaster\"\n\t\t*set helper_he_she \"she\"\n\t\t*set helper_his_her \"her\"\n\t\t*set helper_man_woman \"woman\"\n\t\t\"Security and infiltration,\" the lieutenant says. \"What vulgar skills for an AAG cadet. But useful.\n\t#\"Command.\" My class consisted of seven scions of Actorius's wealthiest families…and me.\n\t\t*set command +1\n\t\t*set high_skill_1 \"social skills\"\n\t\t*set job \"officer\"\n\t\t*set a_job \"a junior officer\"\n\t\t*set job_type \"operational expertise\"\n\t\t*set helper \"Cutter\"\n\t\t*set head_job \"second mate\"\n\t\t*set helper_desc \"scarred warrior\"\n\t\t*set helper_he_she \"he\"\n\t\t*set helper_his_her \"his\"\n\t\t*set helper_man_woman \"man\"\n\t\t\"I don't know why a nobody like you was allowed into command school,\" the lieutenant says, \"but your ratings are excellent.\nStill, you do have one unsuitable mark here. Please answer truthfully as to what it was, and why.\"\n\nYou can hear the guard moving around outside.\n\n*temp bad_trait \"undetermined\"\n\n*fake_choice\n\t#\"Physical weakness.\" I couldn't carry a human-size weight on my back, which is a liability.\n\t\t*set bad_trait \"frailty\"\n\t\t*set low_stat \"physical strength\"\n\t\t*set power -1\n\t\t\"You were probably malnourished as a child,\" Lieutenant Ryonet says without a trace of sympathy.\n\t#\"Acrobatics.\" I'm a bit clumsy.\n\t\t*set bad_trait \"lack of grace\"\n\t\t*set low_stat \"agility\"\n\t\t*set finesse -1\n\t\t\"Outside of an aero cockpit, you were less than graceful,\" Lieutenant Ryonet says. \"No dance lessons as a child, I suppose.\"\n\t#\"Academics.\" I know my way around an engine but not a history book.\n\t\t*set bad_trait \"lack of formal education\"\n\t\t*set low_stat \"education\"\n\t\t*set intellect -1\n\t\t\"I suppose that you lacked the formal education the Flight Academy expects,\" Lieutenant Ryonet says.\n\nYou rub your hands, feeling the dirt under your fingernails.\n\n\"The Academy would have thrown you out, but you took night courses to compensate for your ${bad_trait},\" the lieutenant says. \"Illicit night courses.\n*if ( power = 1 ) or ( finesse = 1 )\n\tTell me about them.\"\n\t*fake_choice\n\t\t#\"It was athletic training to improve my physical abilities.\"\n\t\t\t*if power = 1\n\t\t\t\t*set finesse +1\n\t\t\t\t*set high_stat \"coordination\"\n\t\t\t\t\"I suppose you can run away from all those threats that you can't just smash,\"\n\t\t\t*if finesse = 1\n\t\t\t\t*set power +1\n\t\t\t\t*set high_stat \"physical strength\"\n\t\t\t\t\"Just what the AAG needs—a big clumsy goon,\"\n\t\t\tRyonet says.\n\t\t#\"I took extra science and mathematics classes.\"\n\t\t\t*set intellect +1\n\t\t\t*set high_stat \"education\"\n\t\t\t\"I suppose a robust education can make up for physical deficiencies,\" Ryonet says.\n*if intellect = 1\n\tTell me about your physical regimen.\"\n\t*fake_choice\n\t\t#\"I lifted weights.\"\n\t\t\t*set power +1\n\t\t\t*set high_stat \"physical strength\"\n\t\t\t\"Just what the AAG needs—a dumb goon,\" Ryonet says.\n\t\t#\"I took up dance, not for its own sake but to improve my coordination.\"\n\t\t\t*set finesse +1\n\t\t\t*set high_stat \"coordination\"\n\t\t\t\"I suppose that if you don't understand something, you at least know how to run away from it,\" Ryonet says.\n\nRather than insult you further, Lieutenant Ryonet uses a brass-keyed calculator to compare your answers to the notes in her dossier. She takes long enough that you start to doubt that you know who you are. Finally she says, \"Stand down,\" and the armed agents outside holster their sidearms.\n\n*page_break\n\nCHAPTER 1: THE MISSION\n*comment *text_image the_mission.png center THE MISSION\n\n\"We know more about the sky pirates than that fool on the radio,\" Lieutenant Ryonet says.\n\nShe walks to her office window. Outside, Actorian Air Guard aeros patrol, weaving around the city's skyscrapers, occasionally docking with the airships that drift below the clouds.\n\n\"You are the most junior of seven AAG agents assigned to stop the crimes of Captain Krayl and his pirate airship, the [i]Falling Angel[/i],\" Ryonet says. \"Your preliminary mission is to infiltrate the [i]Falling Angel[/i]'s crew by any means you see fit. After that, you will meet the other agents at a designated warehouse at dawn seven days from now and receive the rest of your instructions.\"\n\n*fake_choice\n\t#\"Who is Captain Krayl?\" I remember hearing the name on the radio.\n\t\t\"He is the [i]Falling Angel[/i]'s second captain,\" Ryonet says. \"I killed the first. But Krayl is no common thief—he's been seen trying to access the Deep Tech below our city.\"\n\t#\"Tell me about the [i]Falling Angel[/i].\" I've only been on the training airship.\n\t\t\"A rigid-structure corvette,\" Ryonet says. \"Crew of seventy. Two J-20 aeros for combat support. Our agents report that it may have modifications pulled from the Deep Tech below the city.\"\n\t#\"What should I know about the other agents?\"\n\t\t\"They're my best,\" Ryonet says. \"Unlike you. Skilled pilots, infiltrators, and engineers, trained in both conventional technology and the intricacies of the Deep Tech.\"\n\nBefore you can ask more questions, Ryonet's telephone rings, and she waves you out of her office. It's time to put your infiltration training to work and join Krayl's crew.\n\nBut where to start? The docks are popular with a rough crowd of ex-soldiers and unemployed engineers. Midtown's criminals are more subtle: con artists, agitators, and pickpockets.\n\nYour best chance is to pick a hangout that matches your skill set.\n*temp cafe \"Café the Universe\"\n*temp fake_job \"dockhand\"\n*temp recruiter \"Midian\"\n*temp sandwich \"sandwich\"\n*choice\n\t#I head for the docks.\n\t\t*set cafe \"the Spoon Under Water\"\n\t\tYou take a tram to the docks and enter the Spoon Under Water, a café tucked beneath an abandoned bridge, which is in turn tucked beneath a damaged sewer bypass. You make sure you're not wearing any visible handkerchiefs or bandannas; in places like the Spoon, that's how you signal that you're looking for less-than-honest work. At least that's what you were told…\n\n\t\t*if ( power + fighting ) > 2\n\t\t\tWhen a scarred dockhand orders you to leave his favorite table, you stand up and crack your knuckles. He backs off.\n\n\t\t\tA few minutes later,\n\t\t\t*label hard_eyed\n\t\t\ta hard-eyed young woman in a tattered army jacket sits down beside you. Through rips in the jacket, you see tattoos that cover criminal brands. Over the course of four cinnamon coffees and two egg sandwiches, she interrogates you under the guise of employing you as a ${fake_job}. The cover identity you practiced holds up, because the tattooed woman leaves a piece of paper with an address on your table.\n\t\t\t*goto infiltration\n\t\t*elseif ( power + engineering ) > 2\n\t\t\t*set fake_job \"mechanic\"\n\t\t\tWhen an argument erupts about aero engine design, you join in, proving yourself one of the better-informed engineers there, and also one of the loudest. A short time later,\n\t\t\t*goto hard_eyed\n\t\t*else\n\t\t\t*set ryonet -10\n\t\t\t*set fake_job \"clerk\"\n\t\t\tThe locals are rowdy and argumentative, and you stick out like a clean thumb. But you keep your head down and later that evening,\n\t\t\t*goto hard_eyed\n\t#I go to Midtown.\n\t\tYou take a tram downtown and enter a bar called Café the Universe. Once a writer's haunt famous for its ceiling strewn with light bulbs in the shape of constellations, it has become a den of swindlers, radical poets, and would-be revolutionaries. You make sure you're not wearing any visible handkerchiefs or bandannas; in places like Café the Universe, that's how you signal that you're looking for less-than-honest work. At least that's what you were told…\n\n\t\t*if ( finesse + espionage ) > 2\n\t\t\t*set fake_job \"file clerk\"\n\t\t\tYou fit right in, and a few minutes after your arrival,\n\t\t\t*label krayl_appears\n\t\t\t*set recruiter \"Krayl\"\n\t\t\t*set sandwich \"crackers\"\n\t\t\ta tall handsome man dressed in the tattered finery of a fallen aristocrat sits across from you. Under the guise of employing you as a ${fake_job}, he interrogates you as you both drink watery coffee and eat moon-shaped crackers. The cover identity you practiced holds up, because the elegant man leaves a piece of paper with an address on your table.\n\t\t\t*goto infiltration\n\t\t*elseif ( finesse + command ) > 2\n\t\t\t*set fake_job \"traveling bookseller\"\n\t\t\t*goto krayl_appears\n\t\t*else\n\t\t\t*set fake_job \"dockhand\"\n\t\t\tYou don't fit in with these radicals, and they shun you. But later that evening,\n\t\t\t*goto hard_eyed\n\n*label infiltration\nYou could head to the address right away, which would impress Ryonet, but you might also look suspiciously eager to the pirates. Wiping away the last crumbs from the ${sandwich}, you consider what to do.\n*choice\n\t#I go now. I need to impress the higher-ups at the Actorian Air Guard.\n\t\t*set krayl -10\n\t\t*set ryonet +10\n\t\tYou hop a late-night train to an address in\n\t\t*label brickyard\n\t\tthe Brickyard, the city's decaying industrial zone. The owner of the illicit gambling den there gives you another address, which takes you to a den of vice in the slum everyone calls the Weeds. From there you're sent to the Night Market. Your cover identity survives interrogations at each location. You mention your ${job_type} a few times.\n\n\t\tIn the Night Market, the @{(recruiter = \"Midian\") tattooed woman|elegant man} you met earlier brushes past you and whispers, \"Airdock 17, tomorrow at 8:00 a.m. The [i]Falling Angel[/i] needs another ${job}.\" Then @{(recruiter = \"Midian\") she|he} vanishes into the crowd.\n\t\t*goto warehouse\n\t#I wait a while. I don't want the pirates to become suspicious.\n\t\t*set krayl +10\n\t\t*set ryonet -10\n\t\tYou return to your cover identity's flophouse for the night and set out the next afternoon, taking a train to\n\t\t*goto brickyard\n\n*label warehouse\n\nYou've made it this far. You return to your flophouse, expecting some kind of debriefing or contact, but there's no one there. That means you have only one thing left to do; you open the envelope containing your cover identity, carefully fill your pen with ink, and start filling out details.\n\nFirst, a name—each letter to be written in a little box on a grid.\n*choice\n\t#\"Ferro.\"\n\t\t*set name \"Ferro\"\n\t#\"Aura.\"\n\t\t*set name \"Aura\"\n\t#\"Leshway.\"\n\t\t*set name \"Leshway\"\n\t#\"Tyole.\"\n\t\t*set name \"Tyole\"\n\t*if choice_randomtest = false\n\t\t#Those names aren't bad, but I want something unique.\n\t\t\tYou take a chance on something uncommon.\n\t\t\t*label input_name\n\t\t\t*input_text name\n\t\t\t*comment check capitalization\n\t\t\t*comment (This code adapted from Choice of the Dragon)\n\t\t\t*if (\"${name}\" != \"$!{name}\")\n\t\t\t\tDo you mean $!{name}?\n\t\t\t\t*choice\n\t\t\t\t\t#Yes.\n\t\t\t\t\t\t*set name \"$!{name}\"\n\t\t\t\t\t\t*goto gender\n\t\t\t\t\t#No, ${name}.\n\t\t\t\t\t\t*goto gender\n\t\t\t\t\t#Start again.\n\t\t\t\t\t\t*goto input_name\n\t\t\t*else\n\t\t\t\t*set name \"${name}\"\n\n*label gender\nYou meticulously fill out each square, then move through basic physical details, like height and weight. Finally, gender, and you'll be done.\n*choice\n\t#Male.\n\t\t*set gender \"male\"\n\t#Female.\n\t\t*set gender \"female\"\n\t#Nonbinary.\n\t\t*set gender \"nonbinary\"\n\t\tThis is the old form, so there's no NB-448-Revised; you'll have to accept [i]they/them[/i] pronouns if the subject comes up.\n\nYou scan your documents one last time, checking them in the light of the dingy overhead lamp. The black-and-white photo looks like you, and the AMID (the Actorian Metropolitan IDentification code) you've been assigned is mathematically possible for someone of your age and gender. The identity document looks flawless—just the way you were taught to make them.\n\nYou hope it will be enough.\n\n*page_break\n\nYou wake up early and spend an hour train-hopping to elude tails, then enter a tin-roofed warehouse to meet your fellow agents before boarding the [i]Falling Angel[/i]. They're all there. Unfortunately, they are all dead. Someone cut them to pieces. Only one drew his pistol in time; the bloody weapon lies at your feet.\n\nBefore you can investigate the bodies, you hear banging on the nearby door. Someone is coming!\n\n*fake_choice\n\t#I hide.\n\t\tYou @{((finesse+espionage) > 2) dart into the shadows just as|are still looking for a place to hide when} the door opens, revealing not the killer, but the mechanical creature you took out of the Deep Tech when you were young.\n\t\t*if (finesse+espionage) > 2\n\t\t\tYou wave it over, and it joins you in the darkness.\n\t#I grab that pistol and get ready to fight.\n\t\tYou kneel to pick up the pistol just as the door opens, revealing not the killer, but the mechanical creature you took out of the Deep Tech when you were young.\n\nAs a child, you found this creature at the edge of Actorius's Great Chasm. That was before the Combines—the companies that rule Actorius—fenced it all off and started hoarding the Deep Tech for themselves.\n\nStunned by the deaths of your fellow agents, your mind retreats to that long-ago exploration of the Chasm. You saw trees and animals of living metal, but the most remarkable thing you saw followed you home. It's still with you today…\n\n*temp metal \"undetermined\"\n*temp pet_noise \"undetermined\"\n*temp pet_noise_2 \"undetermined\"\n*temp pet_carry_rope \"undetermined\"\n\n*fake_choice\n\t*if fighting = 0\n\t\t#A silver wolf that taught me how to fight and survive.\n\t\t\t*set pet \"wolf\"\n\t\t\t*set metal \"silver\"\n\t\t\t*set fighting +1\n\t\t\t*set high_skill_2 \"combat\"\n\t\t\t*set pet_noise \"howls\"\n\t\t\t*set pet_noise_2 \"growl\"\n\t\t\t*set pet_carry_rope \"hold onto one of those dangling ropes with its jaws, anchoring it for you\"\n\t\t\tIt is not really a wolf, of course. But it has a body of silver metal, four legs, and jaws that can crush stone. And your wolf taught you how to fight on the cruel streets of Actorius. Ryonet's dossier mentions how deadly you are in a fight, but says nothing of the silver wolf that follows you from the shadows.\n\t*if engineering = 0\n\t\t#An iron monkey that taught me how to fix things everyone else threw away.\n\t\t\t*set pet \"monkey\"\n\t\t\t*set metal \"iron\"\n\t\t\t*set engineering +1\n\t\t\t*set high_skill_2 \"mechanics\"\n\t\t\t*set pet_noise \"hoots\"\n\t\t\t*set pet_noise_2 \"high-pitched whoop\"\n\t\t\t*set pet_carry_rope \"hold onto one of those dangling ropes, anchoring it for you\"\n\t\t\tIt is not really a monkey, of course. But it has a long-limbed body, and it likes to perch on your shoulder. And it taught you how to scavenge and make repairs in the machine-ghettos of Actorius. Ryonet's dossier mentions your technical acumen, but not the iron monkey that taught you its secrets.\n\t*if espionage = 0\n\t\t#A cobalt snake that taught me how to hide from my enemies and outwit them.\n\t\t\t*set pet \"snake\"\n\t\t\t*set metal \"cobalt\"\n\t\t\t*set espionage +1\n\t\t\t*set high_skill_2 \"espionage\"\n\t\t\t*set pet_noise \"hisses\"\n\t\t\t*set pet_noise_2 \"low hiss\"\n\t\t\t*set pet_carry_rope \"wrap itself around one of those dangling ropes, anchoring it for you\"\n\t\t\tIt is not really a snake, of course–more of a segmented blue-gray tube with two shining glass eyes on one end. But the strange machine taught you how to survive the cruel streets of Actorius: through stealth, cunning, and patience. Ryonet's dossier makes mention of your training in espionage and theft, but not of the metal snake that helped you survive.\n\t*if command = 0\n\t\t#A golden hawk that gave me the courage to lead people into danger.\n\t\t\t*set pet \"hawk\"\n\t\t\t*set metal \"golden\"\n\t\t\t*set command +1\n\t\t\t*set high_skill_2 \"command\"\n\t\t\t*set pet_noise \"screeches\"\n\t\t\t*set pet_noise_2 \"sudden screech\"\n\t\t\t*set pet_carry_rope \"use its talons to fly a rope up to the airship and get someone to anchor it for you\"\n\t\t\tIt is not really a hawk, of course, though it has two gleaming metal wings. Not only is your hawk useful, it taught you something few Actorian slum-dwellers learn: how to command, to lead, and to inspire. Ryonet's dossier mentions the bearing and pride that your hawk taught you, but not the creature itself.\nThe ${metal} ${pet} might be the only secret you've kept from the AAG.\n\n*set dossier true\n\nBut back to all these corpses. Ryonet will want to know what happened to your fellow agents. You start to examine the bodies, but then you hear an engine noise overhead and a crack like gunfire. You and your ${pet} could examine the corpses or climb the stairs and see what is making the noise.\n*temp upstairs false\n*fake_choice\n\t#I check the corpses, looking for clues that might help the AAG.\n\t\t*set ryonet +10\n\t\tYou can follow some of the footprints. You count six sliced-up corpses and six sets of prints, so it seems like no more than one attacker could have done this. Or could multiple killers have attacked from the ceiling? They could have shot down from the ceiling with guns, but these agents were killed with a blade.\n\n\t\tYou look up at the ceiling just as the engine noise grows louder. And louder.\n\t#That sound might be the pirates—I get away from the corpses and check on the noise.\n\t\t*set krayl +10\n\t\t*set upstairs true\n\t\tYou're sure you're hearing gunshots as @{(pet = \"hawk\") your hawk flies up just ahead of you|you run up the steps just ahead of your ${pet}}. The noise grows louder. And louder.\n\n\t\tSomething is wrong outside. Hearing shouts and booted feet near the door where you entered, you hide in the stairwell.\n\nAnd then something rips an elephant-size hole in the tin roof.\n\nIt's a ship. In fact, it's your ship: the [i]Falling Angel[/i]. And it just crashed into the warehouse.\n\n*page_break\n\n@{(recruiter = \"Krayl\") The man you recognize from ${cafe} is aboard. He spots you and says, \"There's our new ${job}! Climb aboard and do not tarry!\"|The woman you recognize from ${cafe} is aboard. She spots you and says, \"There's our new ${job}. Stop wasting time and get up here.\"}\n*if upstairs = false\n\n\tYou don't know if @{(recruiter = \"Krayl\") he|she} can see all the corpses. You hope not.\n\nThen everyone aboard ducks as an unseen aero strafes the [i]Falling Angel[/i]. Black-clad city guards rush into the warehouse armed with sabers. Some see the lines dangling from the airship and try to climb. Others see you and close in. One draws a pistol and shoots a pirate @{upstairs who falls at your feet|who tumbles off the airship and lands on a platform above you}.\n\n*temp pet_tried false\n*temp crew_tried false\n*temp gun_tried false\n\n*label reconsider\nYou could tell your ${pet} to ${pet_carry_rope}, and haul yourself up the line. Or you could order the airship's crew to lower a rope and tell them where they can anchor it.\n*temp gun \"pistol\"\n*if upstairs\n\t*set gun \"rifle\"\n\tOr you could grab that dead pirate's rifle and shoot at the guards.\n*else\n\tOr you could grab that fallen pistol and shoot at the guards.\n*choice\n\t#My ${pet} can help me get up onto the [i]Falling Angel[/i].\n\t\t*if pet_tried = false\n\t\t\tIt will take engineering skill to convince your ${pet} to help, and raw strength to climb.\n\t\t\t*choice\n\t\t\t\t#Yes, I signal my ${pet}.\n\t\t\t\t\t*label pet_roll\n\t\t\t\t\t*if ( power + engineering ) > 2\n\t\t\t\t\t\t*set crew +10\n\t\t\t\t\t\tYour ${pet} immediately understands what you need. City guards charge you with their sabers, but their blades miss as you pull yourself up the rope.\n\t\t\t\t\t\t*goto strong_arms\n\t\t\t\t\t*else\n\t\t\t\t\t\t*set crew -10\n\t\t\t\t\t\tYour ${pet} does as you bid it, but not as quickly as you would like. City guards charge you with their sabers, and you scramble up the rope,\n\t\t\t\t\t\t*label guard_grab\n\t\t\t\t\t\tbut one of the guards grabs your ankle. Bullets fly as a pirate shoots the guard holding you, and is shot in turn. You kick free and scramble up the rope.\n\t\t\t\t\t\t*goto strong_arms\n\t\t\t\t#I do something else.\n\t\t\t\t\tYou reconsider your options.\n\t\t\t\t\t*goto reconsider\n\t\t*else\n\t\t\t*goto pet_roll\n\t#I shout for the pirate crew to lower a rope.\n\t\t*if crew_tried = false\n\t\t\tIt will take a keen intellect to figure out where to anchor the rope, and then you will have to command a crew you do not know. Is that what you want to do?\n\t\t\t*choice\n\t\t\t\t#Yes, I shout up to the crew.\n\t\t\t\t\t*label crew_roll\n\t\t\t\t\tAs the city guards charge you with their sabers, you shout for the airship's\n\t\t\t\t\t*if ( intellect + command ) > 2\n\t\t\t\t\t\t*set crew +10\n\t\t\t\t\t\tcrew and point out a broken ceiling beam where they can anchor the line. They tie a knot and throw you the rope, then haul you up seconds before the guards reach you.\n\t\t\t\t\t\t*goto strong_arms\n\t\t\t\t\t*else\n\t\t\t\t\t\t*set crew -10\n\t\t\t\t\t\tcrew. They look confused as you point to one of their ropes. Finally someone understands and throws you a line,\n\t\t\t\t\t\t*goto guard_grab\n\t\t\t\t#I do something else.\n\t\t\t\t\tYou reconsider your options.\n\t\t\t\t\t*goto reconsider\n\t\t*else\n\t\t\t*goto crew_roll\n\t#I grab the ${gun}.\n\t\t*if gun_tried = false\n\t\t\tShooting at city guards will anger Lieutenant Ryonet and the Actorian Air Guard brass but will allay any suspicions the pirates have about your loyalties. Is that what you want to do?\n\t\t\t*choice\n\t\t\t\t#Yes, I take a shot.\n\t\t\t\t\t*label gun_roll\n\t\t\t\t\t*if ( finesse + fighting ) > 2\n\t\t\t\t\t\t*set crew +10\n\t\t\t\t\t\t*if gun = \"pistol\"\n\t\t\t\t\t\t\tYou grab the bloody pistol and aim it at a city guard with a rifle.\n\t\t\t\t\t\t\t*label leg\n\t\t\t\t\t\t\tYou hit him in the leg, and the other guards dive for cover. When a rope ladder drops out of the airship, you climb before they can regroup.\n\t\t\t\t\t\t\t*goto strong_arms\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub rifle\n\t\t\t\t\t\t\t*goto leg\n\t\t\t\t\t*else\n\t\t\t\t\t\t*set crew -10\n\t\t\t\t\t\t*if gun = \"pistol\"\n\t\t\t\t\t\t\tYou grab the pistol and unload it in the direction of the city guards, but in the darkness and chaos, you don't hit anything. The guards charge you with their sabers. Someone on the airship throws you a rope, and you grab it,\n\t\t\t\t\t\t\t*goto guard_grab\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub rifle\n\t\t\t\t\t\t\tBut in the darkness your shots go wide, and you can't find a good angle as the city guards charge up the stairs for you. When ammo runs out, you throw the rifle at the guards and find that someone on the airship lowered a rope for you. You grab the rope,\n\t\t\t\t\t\t\t*goto guard_grab\n\t\t\t\t#I do something else.\n\t\t\t\t\tYou reconsider your options.\n\t\t\t\t\t*goto reconsider\n\t\t*else\n\t\t\t*goto gun_roll\n\n*label rifle\nYou grab the rifle–an unbranded frontier weapon older than you are–and aim it at the city guard who shot its previous owner.\n*return\n\n*label strong_arms\n\nStrong arms haul you over the railing.\n*if recruiter = \"Krayl\"\n\tThe man you met at ${cafe} examines your ${pet}, and for the first time, the ${metal} animal permits someone else to touch it.\n\n\t\"I'm Captain Krayl,\" he says. \"The lady with the fancy tattoos that cover her criminal brands is Midian, my first mate. Midian, should I make plans to die here, or can we escape?\"\n\n\tIn answer, Midian shouts down to the engine room,\n*else\n\tThe woman you met at ${cafe} studies you, then narrows her eyes at your ${pet}, then just shakes her head.\n\n\t\"Welcome aboard,\" she says. \"I'm First Mate Midian. That fancy guy is Captain Krayl. You belong to him now.\"\n\n\tShe points to a tall, elegant man in a knee-length evening jacket who is shouting orders to the engine room. Finally they answer him,\nand with a hideous scream of metal punctuated by the crackle of gunfire and the roar of aero engines overhead, the [i]Falling Angel[/i] rips free of the warehouse roof and takes to the skies above Actorius.\n\nIt looks like you're a pirate now.\n\n*page_break\n\n*comment *text_image a_pirates_life.png center A PIRATE'S LIFE\nCHAPTER 2: A PIRATE'S LIFE\n\nWith the Actorian Air Guard attacking the [i]Falling Angel[/i] from every direction, no one cares about the false identity you so carefully prepared. Captain Krayl orders you\n*if job = \"engineer\"\n\tdown into the airship's smoking engine room, and you spend the next hour wrist-deep in oil-stained machinery trying to keep the [i]Angel[/i] flying.\n*if job = \"marine\"\n\tto join the rest of his marines, and you spend the next hour dragging the wounded belowdecks to surgery.\n*if job = \"bursar\"\n\tup to the lookout post. You spend the next hour running headings down to First Mate Midian as she steers the wounded airship out of the city.\n*if job = \"officer\"\n\tto grab a spyglass. You spend the next hour shouting out the locations of aeros to First Mate Midian as she steers the wounded airship out of the city.\n\nAt last the [i]Falling Angel[/i] escapes its pursuers. Casualties are heavy, but the survivors rejoice. Soon you learn why: Captain Krayl just robbed the First Bank of Actorius.\n\nThat evening the captain invites you and your ${pet} into his office, which is directly under the bridge. He stands behind an aluminum desk heaped with bank notes and gold bullion, dressed as if to meet a Combine executive, not a new ${job}. Behind him is a huge oil portrait of a pale, haunted-looking woman. You finally have your chance to present your documents.\n\nThe captain scans them indifferently, then says, \"You'll receive a junior officer's weighted share, which is 1 percent of any haul.\"\n\nYou could ask for more, though it may annoy the crew.\n*temp share 1\n*fake_choice\n\t#\"I think I'm worth a little more than that.\" I point to the qualifications on my documents.\n\t\t*set share 2\n\t\t*set wealth +200\n\t\t*set crew -10\n\t\tCaptain Krayl is a savvy negotiator, but it's hard to plead poverty when you're arguing over a mountain of cash, and you finally settle on a 2 percent share. You receive an advance of 200 capons.\n\t#I remain silent.\n\t\t*set wealth +150\n\t\t*set crew +10\n\t\tA 1 percent share is a good deal, especially for a spy who isn't even supposed to be here, so you accept it and receive an advance of 100 capons.\n\nSomeone else enters the room and says, \"You wanted to see me, Captain?\"\n\nYou turn to see a\n*if job = \"engineer\"\n\twiry old woman with a shaved head and heavy goggles.\n*if job = \"marine\"\n\tgiant, massively bearded man with an antique two-handed sword.\n*if job = \"bursar\"\n\tyoung woman in a pencil skirt and a beehive hairdo, who looks wildly out of place among these rogues.\n*if job = \"officer\"\n\ttall, smartly dressed man with ritual scars on his cheeks.\n\nThe captain tells you, \"This is ${helper}. You and ${helper_he_she} are new here and not tangled up in the plots of the crew, so you have a special job—First Mate Midian and I have enough to do without resolving disputes about someone stealing a toothbrush. You two will be our troubleshooters. Do you understand?\"\n*choice\n\t#\"Yes, sir.\"\n\t\t$!{helper} says, \"We're ready to help, Captain.\"\n\t#\"What will I be doing, exactly?\"\n\t\t\"The crew will come to you with problems,\" the captain says. \"Most of them will be obnoxious. Deal with them without annoying me or wasting my time.\"\n\n*if job = \"engineer\"\n\tThe wiry old woman salutes the captain, then adjusts her goggles and examines your ${pet}.\n*if job = \"marine\"\n\tThe bearded old man salutes the captain, then cautiously taps your ${pet} with his sheathed sword.\n*if job = \"bursar\"\n\tThe young woman with the beehive hairdo nods to the captain while inspecting your ${pet} and taking notes on its measurements.\n*if job = \"officer\"\n\tThe scarred man nods to the captain, then bows grandly to your ${pet}.\nThen ${helper_he_she} leads you onto the deck and says, \"Captain Krayl is a dangerous and obsessed man, and he has given us an important job. Do you understand what that means?\"\n\n*choice\n\t#I nod.\n\t\t*goto nod\n\t#\"I'm not actually sure what's expected of me here. I thought I was just ${a_job}.\"\n\t\t\"The captain expects you not to embarrass him, the crew, or the [i]Falling Angel[/i],\" ${helper} says,\n\t\t*if job = \"engineer\"\n\t\t\tstopping to monitor a fluctuating valve on the wall.\n\t\t*if job = \"marine\"\n\t\t\tadjusting his huge sword.\n\t\t*if job = \"bursar\"\n\t\t\tstepping gracefully around a pool of oil on the floor.\n\t\t*if job = \"officer\"\n\t\t\tgesturing in an elegant manner you don't quite understand.\n\t\t\"Earn the crew's respect, don't anger Captain Krayl, and you'll be fine, ${name}.\"\n\n\t\t*label nod\n\t\tYou nod, but there's one problem the ${helper_desc} doesn't know about: if the crew takes a disliking to you, they'll kill you. If Captain Krayl suspects you, or you disappoint him, he'll kill you. That's just the pirate's life. But you also need to impress Lieutenant Ryonet and convince her that you're making progress toward stopping Krayl. If you don't, she'll kill you.\n\n\t\t$!{helper} says, \"I'm glad you understand.\n\t\t*goto assign_cabin\n\n*label assign_cabin\nDo you have a cabin yet?\"\n\nThere are two cabins for junior officers. The starboard cabin is closer to the radio room, which would let you sneak inside more often to contact Ryonet. The port cabin is closer to the crew.\n*temp port_starboard \"port\"\n*choice\n\t#Port. I want to stick close to the crew.\n\t\t*set crew +10\n\t\t*set ryonet -10\n\t\tYou claim a bunk in the officer's cabin closest to the crew quarters,\n\t#Starboard. I want as much access to the radio as I can get.\n\t\t*set port_starboard \"starboard\"\n\t\t*set ryonet +10\n\t\t*set crew -10\n\t\tYou claim a bunk in the officer's cabin near the radio room,\nthen ${helper} leads you\n*if job = \"engineer\"\n\tdown into the engine room\n*if job = \"marine\"\n\tto the marine barracks\n*if job = \"bursar\"\n\tto the quartermaster's office\n*if job = \"officer\"\n\tup to the bridge\nand helps you set up a small desk for dealing with the crew's problems. \"Stay away from the captain,\" ${helper_he_she} says. \"And whatever you do, don't ask him about his wife.\"\n\nYou remember the oil painting.\n\nYour first crisis arises the day after you board the [i]Falling Angel[/i], as the airship drifts high over Paleen Bay.\n\n*temp day 0\n*temp day_declare false\n\n*gosub dec_sorter\n\n*page_break\n\n*set joined_crew true\n\nYou alternate between\n*if job = \"engineer\"\n\tworking in the engine room\n*if job = \"bursar\"\n\tmanaging the ship's accounts\n*if job = \"marine\"\n\tpatrolling the ship's decks with ${helper}\n*if job = \"officer\"\n\tworking on the bridge under First Mate Midian\nand solving minor problems while the [i]Falling Angel[/i] steers for a safe port where she can unload her plunder. With so much leeway and the crew so diminished after the battle, you are able to slip away to the radio room one night and conduct your real work.\n\nYou lock the door and switch the radio on. Your ${pet} vibrates for a moment, then hisses a staccato burst into the radio. The tubes glow in a way they never should. Then your ${pet}'s mouth opens impossibly wide, and Ryonet's voice comes out of it.\n\n\"Agent ${a1}${a2}${a3}${a4}, is that you?\" she says. \"How were you able to secure the radio? Never mind. Have you joined the [i]Falling Angel[/i]'s crew?\"\n*fake_choice\n\t#\"Yes, Lieutenant.\"\n\t\t\"Excellent,\"\n\t#\"Not exactly.\"\n\t\t\"You mean you managed to become an officer? Krayl must be desperate,\"\nRyonet @{(job = \"officer\") says, misunderstanding you|says}. She talks over you as you try to provide more details, \"We are aware of the casualties suffered in the warehouse, but since you can access the radio, we will continue the mission. You must provide constant activity updates. You will contact me at least every thirty-six hours with updates, Agent ${a1}${a2}${a3}${a4}. Failure to stay in contact or to perform your duties as an agent of the Actorian Air Guard will result in my superiors terminating this mission. Do you understand?\"\n*fake_choice\n\t#\"Yes, Lieutenant.\"\n\t\t\"Good,\" Ryonet says. \"Ryonet out.\"\n\t#\"Could you be more specific, Lieutenant?\"\n\t\t\"It means that if you disappoint us, we will blow that airship out of the sky,\" Ryonet says. \"Your work is not that important, Agent ${a1}${a2}${a3}${a4}, and neither are you. Ryonet out.\"\n\nYour ${pet}'s mouth closes. It worked! Your Deep Tech companion has given you an untraceable line back to AAG headquarters. You cover your tracks and return to\n*if job = \"engineer\"\n\tthe engineering deck. The mechanics\n*if job = \"bursar\"\n\tyour desk. The other accountants\n*if job = \"marine\"\n\tthe marine barracks to get your next assignment. The other marines\n*if job = \"officer\"\n\tthe bridge. The other officers\nmarvel at your Deep Tech ${pet}, but you try to act like an ordinary member of the crew and hope that your companion will not draw too much attention.\n\n*page_break\n\n*set day +day_inc_1\n*if ( finesse = 3 ) and ( intellect = 1 )\n\t*set weapon \"long knife\"\n*if ( finesse = 3 ) and ( power = 1 )\n\t*set weapon \"rapier\"\n*if ( intellect = 3 ) and ( finesse = 1 )\n\t*set weapon \"longsword\"\n*if ( intellect = 3 ) and ( power = 1 )\n\t*set weapon \"cutlass\"\n*if ( power = 3 ) and ( finesse = 1 )\n\t*set weapon \"machete\"\n*if ( power = 3 ) and ( intellect = 1 )\n\t*set weapon \"saber\"\n\nDay ${day}: you are issued a ${weapon} to wear @{(job = \"marine\") as part of your guard duties|when you are off the ship or during an engagement}.\n\n*gosub dec_sorter\n\n*page_break\n\n*set day day_8_10\n\nDay ${day}: Captain Krayl has disappeared into his cabin and rarely leaves. Strange mechanical noises issue from it. Your ${pet} refuses to approach.\n\n*gosub dec_sorter\n\n*page_break\n\n*set day day_12_15\n\nDay ${day}: the [i]Falling Angel[/i] changes course. You're heading for the main base of Big Squid, the largest pirate gang of the Tangled Sea.\n*gosub dec_sorter\n\n*page_break\n\n*set day day_17_20\n\nDay ${day}: Lieutenant Ryonet wants to know what Captain Krayl is doing in his office, but he has sealed it with Deep Tech locks that @{ ( ( engineering+espionage ) > 4 ) ) not even you can|you cannot} open.\n\n*gosub dec_sorter\n\n*if extra_days > 0\n\t*set day_declare true\n\t*set day day_22_23\n\t*gosub dec_sorter\n\t*page_break\n\n*if extra_days = 2\n\t*set day_declare true\n\t*set day day_25_26\n\t*gosub dec_sorter\n\t*page_break\n\n*if wounded and ( wealth >= 100 )\n\t*gosub infirmary\n\t*page_break\n\nDay 27: the [i]Falling Angel[/i] has made a few minor stops and midair exchanges to transfer its hottest cargo, but only a true pirate haven can absorb the wealth Captain Krayl stole from the First Bank of Actorius. Finally you reach [i]Big Squid[/i], the huge, floating, squid-shaped, metal submersible ruled by the pirate gang of the same name. The [i]Falling Angel[/i] docks at Tentacle 3.\n\nFirst Mate Midian stomps down the gangplank as you and ${helper}\n*if job = \"engineer\"\n\tcheck the [i]Angel[/i]'s landing struts.\n*if job = \"bursar\"\n\torganize a procurement list.\n*if job = \"marine\"\n\tguard the crates.\n*if job = \"officer\"\n\tcheck a list of crew member names to see who is allowed shore leave.\nShe orders the ${helper_desc} away so she can speak to you privately and drops her voice, absently massaging the tattooed-over criminal brands on the back of one hand.\n\n\"We have a problem,\" she says. \"The [i]Falling Angel[/i] has two aeros—J-20s that are both ready to fall out of the sky. Your documents said you can fly. Can you handle a fighter-bomber?\"\n\nSaying yes would give you access to more of the [i]Falling Angel[/i], but Midian will want to know where you learned, and you'll have to lie carefully.\n*choice\n\t#\"I can manage it, yes.\"\n\t\t*set ryonet +10\n\t\t\"Really?\" she says. \"Where did you learn?\"\n\n\t\tYou and Lieutenant Ryonet worked on multiple cover stories,\n\t\t*if ( finesse + espionage ) > 2\n\t\t\t*set krayl +10\n\t\t\tand you are ready: you tell Midian that you trained to join the Kazri Combine's personal Air Guard, but they picked some rich kid instead of you.\n\n\t\t\t\"Damn those arrogant Combines,\" the first mate says. \"But maybe I can use you. Come with me. We're\n\t\t\t*goto squid_choice\n\t\t*else\n\t\t\t*set krayl -10\n\t\t\tand you tell her that you trained to join the Palace Guard Air Corps before it was disbanded.\n\n\t\t\tBut Midian laughs and says, \"You, a palace guard? Don't lie to me. But if you can fly, come with me. We're\n\t\t\t*goto squid_choice\n\t#\"A real aero? No, not me, sorry.\"\n\t\t*set krayl +10\n\t\t*set ryonet -10\n\t\t\"Blast,\" she says. \"Still, you know something about aeros. And you're sober. So we're\n\t\t*goto squid_choice\n\n*label squid_choice\ngoing shopping.\"\n\nMidian describes all the problems with the J-20s as you head into [i]Big Squid[/i]'s central market. @{(engineering = 0) You aren't a mechanic, but you are|You're both a trained mechanic and} a skilled pilot, and you help the [i]Falling Angel[/i]'s first mate shop for equipment.\n\nBut as you wander the warehouses and garages of [i]Big Squid[/i], you remember that you have some money of your own. You could buy all sorts of illicit weapons and gear by stepping away from Midian for a moment, though vanishing in this kind of place might make the captain suspicious. Do you go shopping?\n\n*temp squid_shop true\n*gosub shop\n\n*label clue_hunt\n\nMidian signals the crew to pick up the new supplies and says, \"That should keep our J-20s in the air for a few more missions. Let's get back before the [i]Squid[/i] submerges and we all drown.\"\n\n*page_break\n\nWhen you return to the [i]Angel[/i], Captain Krayl has finally emerged from his cabin. There are dark circles under his eyes, and his nails are stained with oil, though his silk necktie is immaculate as ever.\n\nPassing you, he says, \"You didn't leave. Good. Too many people left because I made them rich. Now I need to find more.\"\n\nProspective crew members are lining up outside the [i]Angel[/i] for the captain's inspection. With Krayl and Midian busy, you can answer questions that have vexed you and Lieutenant Ryonet: How did your fellow agents die? @{spider_known Was it simply that Deep Tech spider?|} And what is Captain Krayl doing in his cabin? But you don't have much time.\n\n*temp clue_1 \"undetermined\"\n\n*choice\n\t#I want to learn more about the dead Actorian Air Guard agents.\n\t\tYou will never forget the gruesome cuts on those agents. A physician could tell you more about the wounds. You could speak to @{blackroot_known Blackroot, though you would have to impress the physician|the ship's physician, Blackroot, though you would have to impress him} with your intelligence and bearing. Or you could ask Cloudy, the [i]Falling Angel[/i]'s other aero pilot. He knows his way around a blade. Cloudy is currently drinking with the crew, and you would have to drink with him and stay sober enough not to reveal too much.\n\t\t*choice\n\t\t\t#I talk to Blackroot.\n\t\t\t\t*set blackroot_known true\n\t\t\t\tBlackroot is a pompous old charlatan,\n\t\t\t\t*if ( intellect + command ) > 2\n\t\t\t\t\t*set ryonet +10\n\t\t\t\t\t*set clue_1 \"animal\"\n\t\t\t\t\tbut you charm him into helping you. After you explain the wounds you saw, claiming that they were on dead vagrants, Blackroot says, \"Those close-set wounds do not sound like a knife or saber. It sounds like an animal attack. But what kind of animal could have killed so many? Maybe the City Defense Corps is releasing tigers on vagrants now, the villains. Or maybe your ${pet} has an older brother!\"\n\t\t\t\t\t*goto first_prize\n\t\t\t\t*else\n\t\t\t\t\t*set krayl -10\n\t\t\t\t\tand he refuses to help unless you tell him where you saw the bodies. Realizing that he wants you to reveal too much, you leave the infirmary before you say anything that will get you killed.\n\t\t\t\t\t*goto first_prize\n\t\t\t#I talk to Cloudy.\n\t\t\t\tThe other pilot is in the aero hangar, telling the engineers about his last knife fight. Everyone is drunk and happy for you to join them.\n\n\t\t\t\tSomewhere around your seventh drink,\n\t\t\t\t*if ( power + espionage ) > 2\n\t\t\t\t\t*set ryonet +10\n\t\t\t\t\t*set crew +10\n\t\t\t\t\t*set clue_1 \"animal\"\n\t\t\t\t\tyou describe the wounds you saw, claiming they were on vagrants.\n\n\t\t\t\t\tCloudy finishes another bottle and says, \"Well, I didn't do it. Sounds like a damn wild animal. Do you have another one of these monsters?\"\n\n\t\t\t\t\tHe scratches your ${pet} under its chin, too drunk to worry about losing fingers. Your ${pet} slinks back, annoyed, but Cloudy has a point. There are few wild animals in Actorius, but there is always the Deep Tech. You leave before you're too drunk to stand.\n\t\t\t\t\t*goto first_prize\n\t\t\t\t*else\n\t\t\t\t\t*set krayl -10\n\t\t\t\t\t*set crew -10\n\t\t\t\t\tyou remember to talk about the dead men, but you're not sure how much you should reveal. Cloudy–also drunk–is suspicious of the kinds of questions you're asking.\n\n\t\t\t\t\t\"I didn't kill anyone in Actorius!\" he says. \"Well, not when we were robbing the bank.\" And then you have another drink and forget about your questions.\n\t\t\t\t\t*goto first_prize\n\t\t\t#Instead, I'll investigate the captain's cabin.\n\t\t\t\t*goto krayl_office\n\t#I want to see if I can look inside the captain's cabin.\n\t\t*label krayl_office\n\t\tDeep Tech locks seal every door and window around the captain's inner sanctum. You see two ways to learn what Krayl is up to. Though your ${pet} fears the room, you could browbeat the Deep Tech creature into peeking inside. Or you could check Krayl's purchases. Records in @{(job = \"bursar\") your|the quartermaster's} office might offer some clue, though you would have to be quick and stealthy.\n\t\t*choice\n\t\t\t#I convince my ${pet} to enter Krayl's cabin.\n\t\t\t\t*temp cabin 2\n\t\t\t\t*if has_motivator\n\t\t\t\t\t*set cabin 1\n\t\t\t\t*if ( power + engineering ) > cabin\n\t\t\t\t\t*set clue_1 \"voice\"\n\t\t\t\t\tYour Deep Tech companion\n\t\t\t\t\t*set ryonet +10\n\t\t\t\t\t*if pet = \"wolf\"\n\t\t\t\t\t\tgrowls and whines like a living wolf, but you are adamant, and it reluctantly squirms through a grate outside the cabin.\n\t\t\t\t\t*if pet = \"hawk\"\n\t\t\t\t\t\tflaps and puffs itself up like a living bird, but you are adamant, so it circles outside to the sealed window.\n\t\t\t\t\t*if pet = \"snake\"\n\t\t\t\t\t\ttries to wiggle away, but you are adamant, so it reluctantly squeezes into a pipe outside the cabin.\n\t\t\t\t\t*if pet = \"monkey\"\n\t\t\t\t\t\thoots miserably, but you are adamant, so it reluctantly climbs into the ventilation shaft above the cabin.\n\t\t\t\t\tThe ${metal} ${pet} returns while you are alone\n\t\t\t\t\t*if job = \"engineer\"\n\t\t\t\t\t\tin the engine room.\n\t\t\t\t\t*if job = \"bursar\"\n\t\t\t\t\t\tin your shared office.\n\t\t\t\t\t*if job = \"marine\"\n\t\t\t\t\t\tin the lookout tower.\n\t\t\t\t\t*if job = \"officer\"\n\t\t\t\t\t\ton the bridge.\n\t\t\t\t\tIt opens its mouth like it does when you contact Lieutenant Ryonet and plays a recording. The sound starts as a mechanical hum, but then you hear a recording. It sounds like a woman's voice giving the sort of commands an airship captain would give. Could it be a recording of Krayl's dead wife, and previous captain of the [i]Falling Angel[/i]? @{spider_known Soon a familiar|Then an unpleasant} mechanical scuttling drowns out the voice, and your ${pet} closes its mouth.\n\t\t\t\t\t*goto first_prize\n\t\t\t\t*else\n\t\t\t\t\t*set krayl -10\n\t\t\t\t\tYou order your ${pet} to investigate, but it adamantly @{has_motivator refuses even though you just fed it that motivator|refuses no matter what you try}. When you raise your voice, @{(job = \"marine\") you hear Rune's heavy boots coming your way|you hear guards} coming your way and retreat with your\n\t\t\t\t\t*if pet = \"wolf\"\n\t\t\t\t\t\twhining\n\t\t\t\t\t*if pet = \"hawk\"\n\t\t\t\t\t\tsquawking\n\t\t\t\t\t*if pet = \"snake\"\n\t\t\t\t\t\thissing\n\t\t\t\t\t*if pet = \"monkey\"\n\t\t\t\t\t\tshrieking\n\t\t\t\t\tcompanion before you raise even more suspicion.\n\t\t\t\t\t*goto first_prize\n\t\t\t#I check records at the quartermaster's office.\n\t\t\t\t@{(job = \"bursar\") Since this is your office, you have no trouble getting inside. You wait until Pennybender|You slip quietly into the quartermaster's office and wait until everyone} leaves.\n\t\t\t\t*if ( finesse + espionage ) > 2\n\t\t\t\t\t*set ryonet +10\n\t\t\t\t\t*set clue_1 \"records\"\n\t\t\t\t\tThen you flip through the files until you find the captain's purchases.\n\n\t\t\t\t\tThe [i]Falling Angel[/i]'s quartermaster uses the standard Actorian notation for Deep Tech salvage, and it's all over the captain's requisitions. He's bought tons of active Deep Tech, as well as texts on computation and psychology.\n\n\t\t\t\t\tHearing footsteps outside, you put the files back as you found them and leave.\n\t\t\t\t\t*goto first_prize\n\t\t\t\t*else\n\t\t\t\t\t*set krayl -10\n\t\t\t\t\tThen you start flipping through files, looking for anything useful. But soon you hear footsteps outside: @{(job = \"bursar\") ${helper} returning from getting her hair set|One of the accountants is coming back early}! You hurry out of the office, hoping you have not raised anyone's suspicions.\n\t\t\t\t\t*goto first_prize\n\n*label first_prize\n\n*page_break\n\nThe [i]Falling Angel[/i] is airborne less than twenty-four hours after docking at [i]Big Squid[/i], with an expanded crew, repaired aeros, and upgraded lateral turbines. The captain once again retreats to his cabin. That night in the radio room, Lieutenant Ryonet\n*if clue_1 = \"animal\"\n\tconfirms what you suspect about the slain agents: one man with a knife could not have done that kind of damage.\n*elseif clue_1 = \"voice\"\n\tis fascinated by the recordings your ${pet} made of Krayl's office. She mentions that AAG records indicate that Captain Krayl is indiscriminately buying up Deep Tech.\n*elseif clue_1 = \"records\"\n\tconfirms the records you found in the quartermaster's office: Krayl is indiscriminately buying up Deep Tech machinery. But she does not understand why he wants psychology textbooks.\n*else\n\tvoices her frustration with your lack of progress, though you have done everything you can without getting discovered and killed.\n\n*page_break\n*set day 42\n\nDay 42: the new crew settles into the routine, all except two, who hassle the [i]Angel[/i]'s other aero pilot, Cloudy, for being drunk on duty. Cloudy kills them in the resulting knife fight and throws their corpses into the Tangled Sea.\n*set dec_simple false\n*comment From here on out there can be both simple and complex decisions.\n*gosub dec_sorter\n\n*set day day_43_45\n\n*page_break\n\nDay ${day}: an alarm jars you out of your bunk! The [i]Falling Angel[/i] has sighted a prize ship over the islands of Shomar. The Actorian sky-sloop tries to flee, but Midian and Cloudy launch in their J-20 aeros.\n*if job = \"engineer\"\n\tYou don't see anything since you and ${helper} are in the engine room,\n*if job = \"bursar\"\n\tYou and ${helper} are handed rifles and line up on the deck in case of boarders,\n*if job = \"marine\"\n\tYou arm yourself with ${weapon} and rifle and join ${helper} on deck,\n*if job = \"officer\"\n\tYou grab your ${weapon} and watch the action from the bridge,\nbut the [i]Angel[/i]'s aeros force a quick surrender. That night, Captain Krayl hosts the sloop's captain for dinner. Everyone is insured, so it is all strangely civilized. Your share comes to\n*if share = 1\n\t*set wealth +100\n\t100\n*else\n\t*set wealth +150\n\t150\ncapons.\n\n*page_break\n\n*if quick_random = 1\n\tDay 46.\n*if quick_random = 2\n\tDay 47.\n*if quick_random = 3\n\tDay 48.\n*if quick_random \u003c 4\n\t*gosub dec_sorter\n\t*page_break\n\n*if wounded and ( wealth >= 100 )\n\t*gosub infirmary\n\t*page_break\n\n*if ( krayl_attacked = false ) and ( crew_attacked = false )\n\t*check_achievements\n\t*if choice_achieved_mediator = false\n\t\t*achieve mediator\n\nDay 49: one morning you are\n*if job = \"engineer\"\n\tstress-testing the improved turbines with a new mechanic\n*if job = \"bursar\"\n\texplaining payroll to a new crew member\n*if job = \"marine\"\n\texplaining the guard rotation to new marines\n*if job = \"officer\"\n\torganizing crew rotations with ${helper}\nwhen the alarm sounds and the lights turn red; it's time to be a pirate. Everyone runs to their action stations, but Midian intercepts you before you reach the @{(job = \"officer\") bridge|armory}.\n\n\"I know you can fly, and Cloudy is drunk again,\" she says. \"Come with me.\"\n\nBut where is your ${pet}? You have time to track down @{has_revolver your ${weapon}, your revolver,|your ${weapon}} or your ${pet}.\n*temp cockpit_item \"undetermined\"\n*choice\n\t#I grab my ${weapon}.\n\t\t*set cockpit_item \"weapon\"\n\t\tYou sprint for the armory and grab your ${weapon}, then head for the hangar.\n\t*if has_revolver\n\t\t#I get my revolver.\n\t\t\t*set cockpit_item \"revolver\"\n\t\t\tYou run back to your room and grab your revolver, which you've hidden under your bunk, then head for the hangar.\n\t#I track down my ${pet}.\n\t\t*set cockpit_item \"pet\"\n\t\tYou call for your ${pet}, and the creature answers, then the two of you head for the hangar.\n\nCloudy's J-20 is fueled and waiting on its hooks. The hangar crew barely hesitates when they see you. They give you a pilot's jacket and gloves and get you into the cockpit.\n\n\"Our target is an independent galleon full of Outer Island silks,\" Midian says, tying her silk scarf. \"Do you know about the J-20?\"\n*fake_choice\n\t#\"I know enough, yes.\"\n\t\t\"Good, then you'll know not to let anyone get behind you, even with your tailgunner,\" she says. \"And remember—shoot the merchant galleon until it surrenders, not until it explodes.\"\n\t#\"Barely anything!\"\n\t\t\"It's an old multipurpose biplane,\" she says. \"Ours are configured as strike-bombers. Lots of firepower up front but only a tailgun behind, so don't let anyone get on your six.\"\n\nThen ${helper} hops aboard,\n*if job = \"engineer\"\n\twearing massive prescription goggles,\n*if job = \"bursar\"\n\tchecks her makeup in your instrument cluster,\n*if job = \"marine\"\n\tmakes room for his huge two-handed sword,\n*if job = \"officer\"\n\tgives you @{(cockpit_item = \"pet\") and your ${pet}|} another of his formal bows,\nand swivels the tailgun to its ready position.\n\nYou start the engine just as the hooks release, dropping the J-20s out of the [i]Falling Angel[/i] two thousand feet above the Tangled Sea.\n\n*page_break\n\nThe prize ship, a huge merchant galleon held aloft by an asymmetrical arrangement of air bladders, is in full flight as you accelerate. Its big guns swivel your way.\n\nAs you get used to the controls, you consider how to attack the merchant ship. You could go first, attacking ferociously. Or you could dodge around the galleon, letting them waste ammo on you as Midian hammers them. Or you could encourage Midian to circle, which would let you coordinate a three-way attack with her and the [i]Falling Angel[/i].\n*choice\n\t#I strike first, guns blazing.\n\t\tYou open up the throttle and try to hold on. This modified J-20 is fast in a straight line, and you scream past Midian, right into the galleon's cannon range.\n\t\t*if power > 2\n\t\t\t*set crew +10\n\t\t\t*set krayl +10\n\t\t\tBut you open fire before the merchant airship can train its guns on you, blowing away a port deck gun, then swirling around to starboard. $!{helper} picks off another cannon, and then Midian strafes them before easily eluding their return fire.\n\n\t\t\t*label finished\n\n\t\t\t$!{helper} shouts, \"They're finished!\"\n\n\t\t\tBut though their guns are almost all gone, the crew is still shooting with rifles, even as the [i]Falling Angel[/i] gets into range. They're doomed, but they won't surrender.\n\t\t\t*goto fly_2\n\t\t*else\n\t\t\t*set wounded true\n\t\t\t*set injury \"cut shoulder\"\n\t\t\tBut when the merchant airship opens fire, you're forced to bank off as bullets whizz around your J-20 and pepper its hull. A fragment of wood hits your shoulder, ripping into the jacket, and you\n\t\t\t*label almost_crash\n\t\t\talmost crash into the galleon before you dive under it. You look back as ${helper} blasts a deck gun and Midian strafes their port side.\n\t\t\t*goto finished\n\t#I rush in, then start dodging so they shoot at me, giving Midian time to attack.\n\t\tYou open up the throttle. This modified J-20 is fast in a straight line, and you fly past Midian and make yourself an obvious target. The merchant airship's guns open fire, chasing you across the sky.\n\t\t*if finesse > 2\n\t\t\t*set crew +10\n\t\t\t*set krayl +10\n\t\t\tBut as you dodge and corkscrew through the air, Midian hits their port side, blasting their guns to pieces. Flames spread across the airship's lower decks. A lucky shot from ${helper} blows up another cannon.\n\t\t\t*goto finished\n\t\t*else\n\t\t\t*set wounded true\n\t\t\t*set injury \"cut shoulder\"\n\t\t\tYou dodge and corkscrew around the hail of bullets, but the J-20 isn't built for these kinds of stunts.\n\t\t\t*label volley_smash\n\t\t\tA volley smashes through your cockpit, shattering your altimeter and flinging a wooden shard into your shoulder, ripping your jacket. You\n\t\t\t*goto almost_crash\n\t#I swirl around the airship, setting up a clever three-way attack.\n\t\tThe J-20 doesn't have a radio, but you wobble your wings to get Midian's attention. Fortunately she isn't fixated on her target. A few gestures explain your plan…you hope.\n\n\t\tThe two of you get into cannon range, then break hard in opposite directions.\n\t\t*if intellect > 2\n\t\t\t*set crew +10\n\t\t\t*set krayl +10\n\t\t\tYou go right, Midian goes left, and cannon shells rip through the air behind you. You rejoin Midian on the galleon's far side just as the [i]Falling Angel[/i]'s big guns get their range.\n\n\t\t\tThe resulting three-way strafing run almost blows the airship out of the sky. Fires break out on the merchant ship's lower decks as you blow its cannons off the hull.\n\t\t\t*goto finished\n\t\t*else\n\t\t\t*set crew -10\n\t\t\t*set wounded true\n\t\t\tYou go right, and Midian goes left, but you have not practiced this maneuver with her, and you lag behind. Bullets from the merchant airship rip through your aero.\n\t\t\t*goto volley_smash\n\n*label fly_2\n\n*set_checkpoint\n\n*page_break\n\nThe [i]Falling Angel[/i] practically drops onto the much larger merchant ship. Grappling hooks fly. Then a sniper's bullet rips through your engine. The galleon crew is firing on you! You have to land, now, and your damaged ship can't reach the [i]Angel[/i].\n\n*if job = \"engineer\"\n\t\"We're losing oil!\" ${helper} says. \"We're gonna burn up unless we set her down. There!\" She\n*if job = \"marine\"\n\t\"Devils of heaven, we'll finish this on our feet, ${name}!\" ${helper} roars. He checks his sword, then\n*if job = \"bursar\"\n\t\"Perhaps a landing is in order,\" ${helper} says, her voice a little shaky. She\n*if job = \"officer\"\n\t\"By the Overlord,\" ${helper} says, \"we're finished unless you can wrestle her down.\" He checks his swords, then\npoints at the galleon's fire-blackened deck. But your aero is dying, and you'll need some edge or trick to manage a safe landing. You could shoot your way in, order ${helper} to lay down protective fire, or nurse the engine for as long as you can.\n\n*choice\n\t#I blast away, relying on my fighting skills.\n\t\tYou swing the burning J-20 toward the merchant ship and empty its four cannons into the deck.\n\t\t*if fighting > 0\n\t\t\tFiring wildly, you drop the landing gear and skid to a burning, smoking halt.\n\t\t\t*label helper_jump\n\t\t\t$!{helper} jumps out of the doomed\n\t\t\t*if ( job = \"engineer\" ) or ( job = \"bursar\" )\n\t\t\t\tJ-20 and shoots the first guard she sees.\n\t\t\t*if job = \"marine\"\n\t\t\t\tJ-20, draws his huge two-handed sword, and cuts the first guard he sees in half.\n\t\t\t*if job = \"officer\"\n\t\t\t\tJ-20, draws his swords, and tears apart the first guard he sees.\n\t\t*else\n\t\t\tBut though you shoot wildly, more sniper fire thumps into your J-20.\n\t\t\t*if wounded\n\t\t\t\tAlready wounded, you struggle to control the ship as blood pours down your hands, but when another bullet shatters your windshield, you lose control and crash into the deck.\n\t\t\t\t*label flames\n\t\t\t\tYou try to escape the burning cockpit, but flames wash over you.\n\t\t\t\t*choice\n\t\t\t\t\t#Try that choice again.\n\t\t\t\t\t\t*load_checkpoint\n\t\t\t\t\t#Restart the game.\n\t\t\t\t\t\t*goto restart\n\t\t\t*else\n\t\t\t\t*label bullets_miss\n\t\t\t\t*set wounded true\n\t\t\t\t*set injury \"bruises\"\n\t\t\t\t*set injury_plural true\n\t\t\t\tThe bullets miss, but you slam into the deck with stunning force. Bruised and out of breath, you and ${helper} crawl out of the burning aero.\n\t\t\t\t*goto fly_3\n\t#I order ${helper} to clear us a landing space.\n\t\t*if command > 0\n\t\t\tYou match speed and course with the galleon, giving ${helper} the chance to strafes the deck. The ${helper_desc} obliterates a company of snipers. As bullets zip through your aero's wooden frame, you yank the control stick, then pull up at the last second.\n\t\t\t*label down_hard\n\t\t\tThe J-20 comes down hard, stunning you for a moment, but you soon realize you're @{wounded no worse off than before|uninjured}. As you kick the ruined windshield away to escape,\n\t\t\t*goto helper_jump\n\t\t*else\n\t\t\tYou try to twist the aero around so your tailgunner can shoot, but ${helper_he_she} can't manage anything except a bit of panicked fire. With no choice, you grit your teeth and yank the control stick until you're heading for the deck.\n\t\t\t*if wounded\n\t\t\t\tAlready wounded, you try to yank up on the stick to slow down, but slippery blood runs down your fingers. Bullets rip through your windshield, and you crash into the deck.\n\t\t\t\t*goto flames\n\t\t\t*else\n\t\t\t\t*label more_sniper\n\t\t\t\tMore sniper fires tears into your J-20 as you pull up on the stick with all your strength.\n\t\t\t\t*goto bullets_miss\n\t#I nurse the engine until we can land.\n\t\t*if engineering > 0\n\t\t\tOil splatters the windshield as you adjust the throttle and squeeze every yard of altitude from the smoking engine. Fires spreading through the galleon give you much-needed buoyancy, and even as more bullets zip through your wooden cockpit, you grip the control stick with both hands and steer toward the deck. You pull up before you crash.\n\t\t\t*goto down_hard\n\t\t*else\n\t\t\tYou try to nurse the dying engine as it sputters and as oil splatters the windshield, but the J-20 is doomed. You grab as much altitude as you can, then the motor seizes, and you plunge toward the deck.\n\t\t\t*if wounded\n\t\t\t\tAlready wounded, you try to yank up on the stick, but slippery blood runs down your fingers. You realize too late that you just don't have enough altitude. And then your J-20 slams into the port side of the merchant galleon and explodes in a ball of fire.\n\t\t\t\t*choice\n\t\t\t\t\t#Try that choice again.\n\t\t\t\t\t\t*load_checkpoint\n\t\t\t\t\t#Restart the game.\n\t\t\t\t\t\t*goto restart\n\t\t\t*else\n\t\t\t\t*goto more_sniper\n\n*label fly_3\n\n*set_checkpoint\n\n*page_break\n\nThe next few minutes are a blur of gunfire and swordplay as the merchant crew still won't give up. $!{helper} shouts, \"Aren't they insured?\" A masked guard rushes ${helper}, and you recognize the distinctive metal mask of a Quon Bexi Tech raider. These are no common merchants.\n\nCaptain Krayl strikes the masked guard down with @{seen_krayl_sword his electric broadsword|a broadsword wreathed in crackling electricity}. Then he rushes belowdecks, killing masked guards with great sweeps of his Deep Tech weapon. The obvious loot is in the galleon's aft, but Krayl does not seem to care.\n\n*set seen_krayl_sword true\n\nYou @{(cockpit_item = \"pet\") and your ${pet}|} might be able to track down a radio room and contact Ryonet to tell her what's happening. Or you could try sneaking after the captain. Finally, you could\n*if cockpit_item = \"weapon\"\n\tdraw your ${weapon} and join the battle.\n*elseif cockpit_item = \"revolver\"\n\tdraw your revolver and join the battle.\n*else\n\tlook for a weapon and join the battle.\nThe crew looks like it needs help taking the bridge.\n\n*temp saw_tech_box false\n\n*choice\n\t#I hunt down a radio room and contact Lieutenant Ryonet and the AAG.\n\t\t*set crew -10\n\t\t*temp radio 3\n\t\t*if cockpit_item = \"pet\"\n\t\t\t*set radio -1\n\t\t\t*if has_motivator\n\t\t\t\t*set radio -1\n\t\t@{(cockpit_item = \"pet\") Your ${pet} takes the lead as you|You} race downstairs through burning\n\t\t*if ( intellect + engineering ) > radio\n\t\t\t*set ryonet +10\n\t\t\thallways until you find the radio room. You contact the AAG on a secure frequency and tell them about the
