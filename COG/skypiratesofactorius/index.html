m the revolutionaries' train. Sizzling with green light, it gains speed faster than any aero you've ever seen. You @{((crew > 70) and (helper_alive)) and ${helper}|} struggle to keep up as the train, the mole machine, and the mystery aero race away into the darkness of the Deep Tech.\n\n\t\t\tWhat is going on down here? There's only one way to find out; you follow the train.\n\t\t\t*goto good_ending\n\t\t#\"The wealth of Actorius is in its Deep Tech, and people keep stealing it. I want a way to secure it from looters.\"\n\t\t\t@{is_elite You have almost a hundred people in your department, from elite pilot-agents to common clerks. They all get to work organizing|Your crew of pilot-agents scatter through the city to learn} everything Actorius knows about the Deep Tech.\n\n\t\t\tThey uncover evidence that a revolutionary movement in the city has been fighting Quon Bexi Tech raiders for unlicensed access to the Deep Tech. A mysterious train full of revolutionaries has even (some say) created or stolen an entire Deep Tech aero.\n\n\t\t\tYou've heard those rumors, but your people can't learn any more on their own. @{((crew > 70) and (helper_alive)) You, ${helper}, and one of your best pilots|You and a wingman} climb into AAG Guardian triplanes and dive into the Deep Tech vaults beneath the city, looking for signs of illegal Deep Tech looting or this strange aero.\n\t\t\t*goto floodlights\n\t\t#\"If Quon Bex wants a war, we need to be ready. Let's find their allies and hiding places in the city.\"\n\t\t\t@{is_elite You have almost a hundred people in your department, from elite pilot-agents to common clerks. They all get to work organizing everything Actorius knows|Your crew of pilot-agents scatter through the city to learn everything they can} about the threat of Quon Bex.\n\n\t\t\tEverything points to a mole in Actorius—not in the Actorian Air Guard, but in one of the Combines that run the city: the Kazris. You can't get an audience with their patriarch, Dominicar Kazri, but you finagle a meeting with a psychiatrist who works in Kazri Tower named Dr. Hasp. She offers you several leads, including one that leads to an extended foot journey into the Deep Tech below the city.\n\n\t\t\tAfter a savage firefight, your team is able to arrest several Quon Bexi Tech raiders illegally squatting in an already excavated part of the metal jungle—a coup for your @{is_elite division|little team}.\n\n\t\t\tBut you know that Quon Bex's infiltration of Actorius consists of more than a few trashcan-divers under the city. Rumors keep circulating about the Kazri Combine: illegal experiments, secret midnight flights, strange contacts with foreign emissaries. When the Kazris all head to Combine Spire for a convocation with the other heads of the city, you @{((crew > 70) and (helper_alive)) and ${helper}|} slip into Kazri Tower.\n\n\t\t\tYou don't find any evidence of Quon Bexi contact. When you visit Dr. Hasp's office, though, it's been completely stripped. You check the storage closet and find something unusual. This unusual thing is electronic, and blinking.\n\n\t\t\tIt's a targeting transceiver for a Quon Bexi rocket bomb.\n\n\t\t\t*page_break\n\n\t\t\t@{((crew > 70) and (helper_alive)) \"Destroy it!\" ${helper} shouts.|}\n\n\t\t\tYou don't waste time; you drop it on the ground and slam your booted foot down onto it. Then you run to the nearest window and watch a rocket bomb veer off course, missing Kazri Tower by a few yards and crashing down into a nearby garage, disarmed and ineffectual. You did it.\n\n\t\t\tThen an explosion blasts you off your feet as a nearby building goes up in a hurricane of fire. And another. And a third. The window shatters. @{((crew > 70) and (helper_alive)) $!{helper} pulls you to your feet. You|You regain your feet and} cover your face as waves of heat wash over you. The city is ablaze. Quon Bex has begun its war.\n\n\t\t\tAnd you have work to do.\n\t\t\t*goto good_ending\n*elseif ryonet > 50\n\t*check_achievements\n\t*if choice_achieved_agent = false\n\t\t*achieve agent\n\tBut you have impressed Lieutenant Ryonet's superiors. Everyone agrees that war is coming to Actorius, whether from within or without, and the Actorian Air Guard knows that it needs agents like you to protect it in the years to come.\n\n\tThey offer you your own Guardian triplane and an open-ended mission: you and a small squad of pilot-agents will deal with any threats to the city, on your own time, in your own way. Already rumors are swirling about revolutionaries, Tech raiders, pirates, and worse. Your small team awaits your orders.\n\t*goto agent_choice\n*elseif ryonet > 20\n\tYou think that's what lets Lieutenant Ryonet order your immediate discharge. When you head to work one morning, City Defense Corps agents pick you up, interrogate you with savage efficiency, and inform you that Actorius no longer needs your services.\n\t*if ( crew > 70 ) and ( helper_alive )\n\t\tThey also make it clear that ${helper} will not be there to help you, as ${helper_he_she} is dead.\n\tThen they hand you a bag of broken metal: all that remains of your ${pet}.\n\n\t*page_break\n\n\tYou retreat to ${cafe} to nurse your wounds and try to figure out what to do next. That's when\n\t*if mogra_known\n\t\tthe black market trader you met a few weeks ago, Mogra, appears at your side.\n\n\t\t\"This\n\t\t*label eats\n\t\tcity eats its own,\" she says. \"If you stay here, they're gonna kill you. If you wanna fly again, if you wanna see the Deep Tech again, come with me.\"\n\n\t\tYou get up and follow Mogra out the door.\n\t\t*goto good_ending\n\t*else\n\t\tan old, scarred woman you dimly recall seeing in ${cafe} appears at your side.\n\n\t\t\"I'm Mogra, and I already know who you are. This\n\t\t*goto eats\n*else\n\tWhen you head to work one morning, a dozen City Defense Corps agents are waiting for you in an alley within sight of Combine Spire.\n\n\t\"Don't make it hard,\" one says.\n\n\tYour ${pet} charges. It perishes in a hail of gunfire. One round clips you, and you fall to your knees. When you look up, you see Ryonet behind them, her AAG uniform replaced by the numbered black armor of the City Defense Corps.\n\n\t\"You made it hard, Agent ${a1}${a2}${a3}${a4},\" she says. And then she shoots you.\n\t*goto bad_ending\n\n*label angel_final\n\n*page_break\n\nThere's a deafening explosion overhead as the [i]Falling Angel[/i]'s cannons shoot past the AAG airship, at the metal roof of the cavern. You fear the gunners have lost their range…but then a skyscraper-size pile of iron and stone tears free of the ceiling and crushes the AAG airship. The surviving triplanes try to regroup, but you @{midian_alive and Midian|} hunt them down before returning to the [i]Falling Angel[/i].\n\n*if loyalty = \"Krayl\"\n\tYou find Captain Krayl on the bridge, bloody but triumphant. He regards his Deep Tech spider with shining eyes as the Radiant Egg opens, and the spider steps inside. A few seconds later, a woman emerges.\n\n\t\"God's devils, it actually worked!\" Midian cries. \"Captain, I thought you were mad! I thought–\"\n\n\tAnd then green fire washes over the woman, and then over the Green Egg. The unnatural flames start to eat through the deck.\n\n\t*page_break\n\n\t\"Get it off! Get it off!\" Midian shouts. The crew springs into action with barge poles. You and ${helper} lever the Egg off the side of the ship. It tumbles into the metal jungle and rolls away, burning. The captain screams in despair as the woman leaps off the side of the [i]Falling Angel[/i]. You rush to the edge and look down. She's standing there unhurt in a circle of green flame, looking up at the airship with radiant green eyes. Then she, too, vanishes into the jungle.\n\n\t*page_break\n\n\t*if krayl > 70\n\t\t*check_achievements\n\t\t*set is_captain true\n\t\t*if choice_achieved_captain = false\n\t\t\t*achieve captain\n\t\t*gosub cannot_leave\n\t\tYou are my successor. Take the [i]Falling Angel[/i], my friend. I must…I\n\t\t*gosub must_stay\n\t\tWhat are your orders, Captain?\"\n\t\t*goto pirate_choice\n\t*elseif krayl > 50\n\t\t*check_achievements\n\t\t*if choice_achieved_first_mate = false\n\t\t\t*achieve first_mate\n\t\t*gosub cannot_leave\n\t\tMidian, take the captain's chair. Take the [i]Falling Angel[/i]. Your new first mate will serve you well, especially with access to the Deep Tech in my cabin.\"\n\n\t\tMidian nods to you, as if daring you to challenge her for the captain's chair. But Krayl has spoken. Your ${pet} ${pet_noise}. Midian asks Krayl, \"What will you do?\"\n\n\t\tThe captain says, \"I\n\t\t*gosub must_stay\n\t\tWhere are we going?\"\n\n\t\t*label pirate_choice\n\n\t\tThe crew looks to you.\n\n\t\t*choice\n\t\t\t#\"We hunt the fat merchant ships of the Tangled Sea!\"\n\t\t\t\tThe crew howls with delight at your proclamation. Airships, with their high-value cargo, offer greater rewards, but they are elusive and dangerous. The steamships of the Tangled Sea are fat and soft. @{is_captain |Captain Midian seems eager to put your plan into action.}\n\n\t\t\t\tAnd so, just weeks after your adventure with the Green Egg, the [i]Falling Angel[/i] is so heavy with stolen cargo that she can barely float. You head inland until you can dock at an independent service station just within sight of Actorius and the gleaming needle of Combine Spire. As @{is_captain |Captain} Midian organizes the crew to unload the airship, you stand on the forecastle and watch the city.\n\n\t\t\t\tThat's when Combine Spire explodes.\n\n\t\t\t\tThe [i]Falling Angel[/i]'s electrical systems light up as emergency broadcasts blare over every radio. @{is_captain |Captain} Midian sprints up to you, taking the stairs two at a time.\n\n\t\t\t\t\"@{is_captain Captain|$!{name}}!\" she shouts. \"It's war! Quon Bex has hit Actorius with rocket bombs. War!\"\n\n\t\t\t\tWar, you think as Quon Bexi aeros streak overhead, toward the city. What an opportunity for a pirate.\n\t\t\t\t*goto good_ending\n\t\t\t#\"Actorius has grown cruel…and weak. We strike at the very heart of the city!\"\n\t\t\t\tThe crew howls with delight at your proclamation. Captain Krayl made his fortune robbing the First Bank of Actorius, but you can do better, and @{is_captain Midian already has a list of targets prepared|Captain Midian seems eager to put your plan into action.}\n\n\t\t\t\tAnd so, just weeks after your adventure with the Green Egg, you're slipping the [i]Falling Angel[/i] in utter silence through the empty streets of Actorius's sparsely inhabited financial district. Combine Spire gleams above you, intermittently visible above the skyline.\n\t\t\t\t*if krayl_takes_pet = false\n\t\t\t\t\tYour ${pet} @{(pet = \"hawk\") flies overhead|races along rooftops ahead of the [i]Angel[/i]}, guiding you between buildings that are so close you can reach out and touch them.\n\n\t\t\t\t\"Steady,\" @{is_captain |Captain} Midian whispers as the [i]Falling Angel[/i] approaches your target: the Luon-Lubastis Gallery, home to the greatest works of art on the continent. Or at least the most expensive ones. At your gesture, the [i]Angel[/i] drifts to a stop, and the crew prepares to lower ropes.\n\n\t\t\t\t\"Perfect,\" @{is_captain |Captain} Midian says. \"No one knows we're here. We'll be in and out in less than—\"\n\n\t\t\t\tThat's when Combine Spire explodes.\n\n\t\t\t\tThe [i]Falling Angel[/i]'s electrical systems light up as emergency broadcasts blare over every radio. Midian waves for the crew to cut off the signal, but the emergency broadcast is going out over every radio within a hundred miles, including the gallery's public speaker. You listen for only a second before realizing you have to abort the mission.\n\n\t\t\t\t\"War,\" @{is_captain |Captain} Midian says. And as if to punctuate her words, Quon Bexi aeros streak overhead, chased by AAG Guardians.\n\n\t\t\t\tWar, you think as the aerial battle spreads. What an opportunity for a pirate.\n\t\t\t\t*goto good_ending\n\t\t\t#\"The only treasure that matters is the Deep Tech. We seek out the Deep Tech raiders of Quon Bex and steal what they've stolen!\"\n\t\t\t\tThe crew howls with delight at your proclamation.The Green Egg almost destroyed them, but any fool could see its value. The future is in the Deep Tech—and in reaching its treasures before Quon Bex and the Combines of Actorius.\n\n\t\t\t\tThat night, you and @{is_captain |Captain} Midian go over every single one of Krayl's maps and artifacts, and soon you have a list of contacts, known Irruptions of the Deep Tech, people to steal from, and people to avoid.\n\n\t\t\t\tAnd so, just weeks after your adventure with the Green Egg, you're on the [i]Falling Angel[/i]'s forecastle deck gun (because most of your gunners are dead), blasting away at Quon Bexi aeros. You're less than ten miles from Actorius, with a hold full of stolen Deep Tech—stuff no one has ever seen before.\n\n\t\t\t\t\"They're really mad at us!\" @{is_captain |Captain} Midian shouts, laughing as the spreading flames illuminate her tattoos. Indeed, these Tech raiders have chased you for days after your brazen theft of the treasures they stole. They must be furious if they're willing to attack you within sight of Actorius. You glance toward the city.\n\n\t\t\t\tStrange. The AAG should have seen what's happening by now and launched aeros.\n\n\t\t\t\tNo matter; your crew is skilled, and there are only three—a white-hot explosion—two Quon Bexi aeros left. You give yourself better than average odds.\n\n\t\t\t\tThen the aeros veer off. You grab a spyglass and scan the skies for AAG airships or triplanes, but no one is coming your way.\n\n\t\t\t\t\"Is the AAG getting sloppy?\" @{is_captain |Captain} Midian asks.\n\n\t\t\t\tThat's when Combine Spire explodes.\n\n\t\t\t\tThe [i]Falling Angel[/i]'s electrical systems light up as emergency broadcasts blare over every radio. @{is_captain |Captain} Midian runs for the nearest radio and grabs a headset.\n\n\t\t\t\t\"@{is_captain Captain|$!{name}}!\" she shouts. \"It's war! Quon Bex has hit Actorius with rocket bombs. War!\"\n\n\t\t\t\tWar, you think as the Quon Bexi aeros circle around the [i]Falling Angel[/i], then streak toward the city. What an opportunity for a pirate.\n\t\t\t\t*goto good_ending\n\t*elseif krayl > 20\n\t\t*set krayl_takes_pet true\n\t\tMidian, take the captain's chair. Take the [i]Falling Angel[/i].\" He reaches out with his hand, and your ${pet}\n\t\t*if pet = \"hawk\"\n\t\t\tflies from your shoulder to Krayl's.\n\t\t*elseif pet = \"monkey\"\n\t\t\tleaps from your shoulder to Krayl's.\n\t\t*else\n\t\t\tlooks from you to Krayl, then joins the pirate captain.\n\n\t\tMidian asks him, \"What will you do?\"\n\n\t\tThe captain says,\n\t\t*gosub must_stay\n\t\tBut after that…where to?\"\n\t\t*goto pirate_choice\n\t*else\n\t\tThere is only one more thing I must do. It concerns you, Agent ${a1}${a2}${a3}${a4}.\"\n\n\t\tThen Captain Krayl turns, ignites his electrical broadsword, and plunges it through your heart.\n\t\t*goto bad_ending\n*else\n\tThe [i]Falling Angel[/i] is in chaos without Krayl. It takes you a moment to realize what's so wrong: the Radiant Egg has started to burn. Green fire is eating into the deck.\n\n\t\"Get it off!\" Midian shouts. The crew springs into action with barge poles. You and ${helper} lever the Egg off the side of the ship. It tumbles into the metal jungle and rolls away. And then you turn to confront the crew.\n\t*page_break\n\t*if crew > 70\n\t\t*check_achievements\n\t\t*if choice_achieved_captain = false\n\t\t\t*achieve captain\n\t\tMidian steps forward, smiles, and says, \"What are your orders, Captain?\"\n\t\t*label final_wealth\n\n\t\tThe first thing you do after escaping the cave is enter Krayl's quarters. There you find a library of Deep Tech wonders.\n\t\t*if wealth > 400\n\t\t\t*check_achievements\n\t\t\t*if choice_achieved_commodore = false\n\t\t\t\t*achieve commodore\n\t\t\tAdded to your own considerable personal wealth, you know you will have no problem repairing the [i]Falling Angel[/i] and even improving it, possibly with Deep Tech upgrades. You could even consider purchasing another airship. Forget [i]pirate captain[/i]; in a few years you could be a pirate admiral, loved and feared across the Tangled Sea! You know war is coming to Actorius, and you know that in that war, you will do very\n\t\t\t*label do_well\n\t\t\twell for yourself and for the crew of the [i]Falling Angel[/i].\n\t\t\t*goto pirate_choice\n\t\t*elseif wealth > 300\n\t\t\tAdded to your own modest personal wealth, you will have no problem repairing the [i]Falling Angel[/i]. You know war is coming to Actorius, but with the Deep Tech at your disposal and the respect and admiration you command, you suspect that you will be able to do\n\t\t\t*goto do_well\n\t\t*elseif wealth > 200\n\t\t\tThese treasures might be enough to pay for repairs. Your crew loves you, but the greatest challenge lies ahead. You must fix the [i]Falling Angel[/i] and strike hard at the merchant fleets over the Tangled Sea to secure your position. But despite your lack of wealth now, you just might be able to do\n\t\t\t*goto do_well\n\t\t*else\n\t\t\tEven with these treasures, you have no idea how you will pay for repairs. But with your crew's respect and admiration, you might be able to work something out. You head for the bridge as the [i]Falling Angel[/i] leaves the cave and turns east toward the merchant airships that ply the Tangled Sea.\n\t\t\t*goto good_ending\n\t*elseif crew > 50\n\t\t*set wealth -100\n\t\t*check_achievements\n\t\t*if choice_achieved_captain = false\n\t\t\t*achieve captain\n\t\tMidian looks from you to the crew, weighing her chances at seizing the captain's chair. But at last she nods and says, \"What are your orders, Captain?\"\n\t\t*goto final_wealth\n\t*elseif crew > 30\n\t\tMidian looks from you to the crew, then smiles and says, \"So good of you to free up the captain's chair for me.\"\n\n\t\tThe crew surrounds her protectively, and you know you cannot persuade them to fight for you. But Midian points to your battered J-20 and says, \"Despite everything, you saved my ship. You can go with your life and your ${pet}.\"\n\n\t\t*page_break\n\n\t\tYou run for the aero and hop aboard. The engine sputters, then catches, and you fly out of the cave. So you won't be a pirate captain, at least not yet. But you have a ship, a Deep Tech ${pet}, and enough fuel to reach Quon Bex or [i]Big Squid[/i]. A dozen pirate crews would pay handsomely for your services. And you intend to make them pay.\n\t\t*goto good_ending\n\t*else\n\t\tMidian looks from you to the crew, then smiles and says, \"So good of you to free up the captain's chair for me.\"\n\n\t\tThe crew surrounds you, and Midian says, \"I would spare you, but really, no ship can have two captains. Goodbye, ${name}.\" She turns away as the crew swarms you and cuts you to pieces with their knives and cutlasses.\n\t\t*goto bad_ending\n\n*label cannot_leave\nThe captain's hand claps over your shoulder, and he says, \"Once, I had different dreams. I wanted to be a pirate admiral, to create a fleet that would rival Big Squid. You and Midian would have been my captains. But this place has touched me. I cannot leave it.\n*return\n\n*label must_stay\nmust stay in this place. I must find her again.\"\n\nWithout another word, Captain Krayl limps to your J-20, climbs aboard, and starts the engine. You lose sight of the aero as it vanishes into the blackess of the Deep Tech.\n\nThen Midian says, \"We need to leave before the ceiling collapses.\n*return\n\n*comment BEGIN SUBROUTINE SECTION\n\n*label dec_sorter\n\n*if dec_simple\n\t*rand dec 1 10\n*else\n\t*rand dec 1 20\n\n*page_break\n*set_checkpoint\n\n*if dec = 1\n\t*if dec_1_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_1_used true\n\t\t*gosub dec_1\n*if dec = 2\n\t*if dec_2_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_2_used true\n\t\t*gosub dec_2\n*if dec = 3\n\t*if dec_3_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_3_used true\n\t\t*gosub dec_3\n*if dec = 4\n\t*if dec_4_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_4_used true\n\t\t*gosub dec_4\n*if dec = 5\n\t*if dec_5_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_5_used true\n\t\t*gosub dec_5\n*if dec = 6\n\t*if dec_6_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_6_used true\n\t\t*gosub dec_6\n*if dec = 7\n\t*if dec_7_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_7_used true\n\t\t*gosub dec_7\n*if dec = 8\n\t*if dec_8_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_8_used true\n\t\t*gosub dec_8\n*if dec = 9\n\t*if dec_9_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_9_used true\n\t\t*gosub dec_9\n*if dec = 10\n\t*if dec_10_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_10_used true\n\t\t*gosub dec_10\n*if dec = 11\n\t*if dec_11_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_11_used true\n\t\t*gosub dec_11\n*if dec = 12\n\t*if dec_12_used\n\t\t*goto dec_sorter\n\t*elseif wounded\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_12_used true\n\t\t*gosub dec_12\n*if dec = 13\n\t*if dec_13_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_13_used true\n\t\t*gosub dec_13\n*if dec = 14\n\t*if dec_14_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_14_used true\n\t\t*gosub dec_14\n*if dec = 15\n\t*if dec_15_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_15_used true\n\t\t*gosub dec_15\n*if dec = 16\n\t*if dec_16_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_16_used true\n\t\t*gosub dec_16\n*if dec = 17\n\t*if dec_17_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_17_used true\n\t\t*gosub dec_17\n*if dec = 18\n\t*if dec_18_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_18_used true\n\t\t*gosub dec_18\n*if dec = 19\n\t*if dec_19_used\n\t\t*goto dec_sorter\n\t*elseif ( landau_alive = false ) and ( chax_alive = false )\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_19_used true\n\t\t*gosub dec_19\n*if dec = 20\n\t*if dec_20_used\n\t\t*goto dec_sorter\n\t*else\n\t\t*set dec_20_used true\n\t\t*gosub dec_20\n*return\n\n*comment Simple decisions. These decisions don't require a skill check.\n\n*label dec_1\n*gosub day_declare_check\nAn artillerist says she saw an Actorian Air Guard aero spying on the [i]Falling Angel[/i]. The crew wants to investigate. Do you set a watch?\n*fake_choice\n\t#Yes.\n\t\t*set crew +10\n\t\t*set ryonet -10\n\t\tSure enough, an AAG scout aero is hiding in the clouds nearby. It retreats when spotted. Ryonet won't be happy, but First Mate Midian celebrates the alertness of the guards by getting them all matching eyeball tattoos on their necks. You are afforded no such honor, but the crew appreciates your help.\n\t#No.\n\t\t*set ryonet +10\n\t\t*set crew -10\n\t\tYou dismiss the artillerist's concerns, implying that she should pay closer attention to her work and stop staring off into the clouds. You have concealed Ryonet's bungling pilot, but the crew is unhappy with your dismissive tone.\n*gosub adjustments\n*return\n\n*label dec_2\n*gosub day_declare_check\nMarines report hearing someone outside the radio room for the past two nights. You don't want anyone paying attention to the room you use to send Lieutenant Ryonet coded transmissions, but Captain Krayl might suspect something if you ignore the problem. Do you set a guard outside the radio room?\n*fake_choice\n\t#Yes.\n\t\t*set krayl +10\n\t\t*set ryonet -10\n\t\tIt takes only a few days of observation to discover a @{(ground = \"Tangled Sea\") chef trying to radio a girl in one of the towns below by yodeling to her in the traditional manner of the Inner Islands. Krayl fines the chef, criticizes his yodeling technique|mechanic with a shopping addiction trying to radio mail-order a furniture set from a wholesaler in Actorius. Krayl fines the mechanic, cancels the order}, sticks him on latrine duty armed with only a toothpick and spoon, and compliments your diligence. But you miss several calls to Ryonet.\n\t#No.\n\t\t*set krayl -10\n\t\t*set ryonet +10\n\t\tYou ignore the problem, and soon it resolves itself. Gossip suggests that @{(ground = \"Tangled Sea\") a chef was only trying to woo a girl from a nearby island by yodeling to her. The attempted seduction failed, and the chef returned to his pastry-making|a mechanic was trying to radio mail-order a furniture set from a wholesaler in Actorius, but the order did not go through}. Though the captain may wonder why you ignored these allegations, you retain easy access to the radio room.\n*gosub adjustments\n*return\n\n*label dec_3\n*gosub day_declare_check\nOne morning at breakfast a fight breaks out in the mess hall between two engineers when one accuses the other of receiving 15 percent more pistachios on her cake. The captain does not tolerate fights on his ship, but both of the engineers are skilled and well respected, and the proscribed punishment is demotion to low-level labor. Do you punish the engineers?\n*fake_choice\n\t#Yes.\n\t\t*set krayl +10\n\t\t*set crew -10\n\t\tYou order the engineers down into the engine room to toil in the smoke and soot for a month or so. Their skills will be missed, but you cannot tolerate any kind of pistachio ruckus on your watch, and Captain Krayl respects your decision.\n\t#No.\n\t\t*set crew +10\n\t\t*set krayl -10\n\t\tYou fine the engineers a small sum and change their shifts so there won't be another breakfast-time pistachio fracas. @{(job = \"engineer\") Your fellow|The} engineers are happy not to lose two experienced workers, though Captain Krayl grumbles about his bottom line after several more cake-related arguments.\n*gosub adjustments\n*return\n\n*label dec_4\n*gosub day_declare_check\nSomeone is printing and circulating seditious pamphlets among the crew, trying to turn pirates into revolutionaries willing to fight the Combines that run Actorius. Your ${pet} would have no problem finding an illicit printing press. Do you shut the press down?\n*fake_choice\n\t#Yes.\n\t\t*set ryonet +10\n\t\t*set crew -10\n\t\t*set print_stopped true\n\t\tYour trusty ${pet}\n\t\t*if pet = \"wolf\"\n\t\t\tlopes down the [i]Falling Angel[/i]'s interior hallways until it reaches the door to Storage Room 26 and starts scratching.\n\t\t*if pet = \"monkey\"\n\t\t\tvanishes into the guts of the [i]Falling Angel[/i]. You wait for a few minutes, then follow the sounds of metallic hooting to Storage Room 26.\n\t\t*if pet = \"snake\"\n\t\t\tslithers into a pipe and vanishes. You follow the sounds of crew members screaming and yelling because there's a huge metal snake in the pipes until you reach Storage Room 26.\n\t\t*if pet = \"hawk\"\n\t\t\tcircles the [i]Falling Angel[/i] a few times, then lands on the hull and starts screeching at a tiny porthole. You know the ship's layout by now and head downstairs to Storage Room 26.\n\n\t\tYou open the door to reveal tins of sardines, boxes of powdered milk and Big Dorbo's Wafer Squares, and burlap sacks full of coffee beans. Behind them you find a rickety old press, all set to print its latest issue. Though the crew will miss the crude pornographic descriptions of famous politicians, Lieutenant Ryonet will be pleased to know you have stopped this, um, threat to the dignity of Actorius.\n\t\t*gosub adjustments\n\t\t*return\n\t#No.\n\t\t*set crew +10\n\t\t*set ryonet -10\n\t\tThe issues keep coming every few days, and while a few pirates might be considering radicalism–enough to frighten Lieutenant Ryonet–the crew seems to enjoy the salacious accusations and crudely pornographic drawings that cover the one-page sheets in between the revolutionary propaganda.\n\t\t*gosub adjustments\n\t\t*return\n\n*label dec_5\n*gosub day_declare_check\nDue to a miscalculation at the previous port of call, rations of Little Snuggy's Wafer Balls are running dangerously low. The crew has already eaten all of the Original flavor and will soon deplete Extra Zesty. If they're forced to break into the unpopular Lime flavor, or worse, if the Little Snuggy's Wafer Balls run out entirely, they may grow angry, but Captain Krayl refuses to admit that he miscalculated and buy more at the next stop. Do you try to convince him to restock?\n*choice\n\t#Yes.\n\t\t*set crew +10\n\t\t*set krayl -10\n\t\tCaptain Krayl is a strict partisan of Big Dorbo's Wafer Squares and despises every product in the Little Snuggy's line. Nonetheless, that evening you speak to him about the low supplies. He relents and agrees to get more Wafer Balls, but he wants to know where to buy them: from a merchant airship or from @{(ground = \"Tangled Sea\") an island|an Actorian} depot. If you landed, you could communicate with Lieutenant Ryonet and maybe even establish a contact or drop location back to the Actorian Air Guard, but it would take longer and annoy Krayl even more.\n\t\t*choice\n\t\t\t#We'll just trade from an airship.\n\t\t\t\tThe [i]Falling Angel[/i] flags down a lumbering but well-guarded merchant carrack to make a quick aerial exchange. Captain Krayl and First Mate Midian watch the big ship with hungry eyes, but its defenses are too strong, so they just chat on the deck while the deck crew sings the Little Snuggy's Wafer Balls song, complete with the rarely heard fourth stanza.\n\t\t\t\t*gosub adjustments\n\t\t\t\t*return\n\t\t\t#Let's land at a ground depot.\n\t\t\t\t*set crew +10\n\t\t\t\t*set krayl -10\n\t\t\t\tCaptain Krayl refuses to dock the [i]Falling Angel[/i] in order to restock Little Snuggy Wafer Balls, but the next evening, he sends @{cloudy_alive his first mate out in her aero to make a supply run. You join Midian in the gunner's seat|you and Midian out in your J-20s to make a supply run}.\n\n\t\t\t\tWhile Midian negotiates with a wholesaler, you @{(ground = \"Tangled Sea\") visit the consular office|contact an AAG agent} and send an envelope full of coded letters to Lieutenant Ryonet.\n\n\t\t\t\tThe crew rejoices when you return and sings the Little Snuggy's Wafer Balls song, complete with the rarely heard fourth stanza.\n\t\t\t\t*gosub adjustments\n\t\t\t\t*return\n\t#No.\n\t\t*set krayl +10\n\t\t*set crew -10\n\t\tThough the crew whines as the Little Snuggy's Wafer Ball supplies dwindle, Captain Krayl is a strict partisan of Big Dorbo's Wafer Squares and offers his people no sympathy. They will be able to resupply at the next major port of call, but not before.\n\t\t*gosub adjustments\n\t\t*return\n\n*label dec_6\n*gosub day_declare_check\nConvinced that he is picking up transmissions from a vulnerable waystation, Captain Krayl has been circling the same @{(ground = \"Tangled Sea\") small island|Actorian suburb} while the radio room works double-shifts to decipher the code. This means you cannot contact Lieutenant Ryonet. Midian wants to tell Krayl he is wasting time with a ghost transmission. Do you support her and encourage Krayl to move along?\n*fake_choice\n\t#Yes.\n\t\t*set ryonet +10\n\t\t*set krayl -10\n\t\tCaptain Krayl is prone to these obsessions, and it's Midian's job to make him stop. Bolstered by your presence, she convinces the captain to stop circling. The radio operators are happy, and Ryonet will be, too, though Krayl remains convinced there's something out there.\n\t#No.\n\t\t*set krayl +10\n\t\t*set ryonet -10\n\t\tYou avoid the looming confrontation and instead listen to Krayl and Midian shout at one another on the bridge while you\n\t\t*if job = \"engineer\"\n\t\t\trepair a broken valve\n\t\t*if job = \"bursar\"\n\t\t\twait for one of them to sign an order form\n\t\t*if job = \"marine\"\n\t\t\tguard the stairs\n\t\t*if job = \"officer\"\n\t\t\tsort through the maps\n\t\tand try to look like you're not paying attention. The [i]Falling Angel[/i] circles the ghost transmission for two days, meaning you cannot contact Ryonet until the captain finally gives up.\n*gosub adjustments\n*return\n\n*label dec_7\n*gosub day_declare_check\nFirst Mate Midian is in a foul mood after a character dies on her favorite radio drama, [i]The Muscular Horsemen of Quon Bex[/i], and has taken to\n*if job = \"engineer\"\n\tbelittling the aero mechanics.\n*if job = \"bursar\"\n\tyelling at the ship's record keepers.\n*if job = \"marine\"\n\tinsulting the ship's guard complement.\n*if job = \"officer\"\n\tscreaming at the junior officers.\nNeither you nor ${helper} can stop this rampage. Do you tell Captain Krayl about his first mate's behavior?\n*fake_choice\n\t#Yes.\n\t\t*set crew +10\n\t\t*set krayl -10\n\t\tThe captain hates dealing with Midian's bad moods, but per your request, he orders her into his office and reassures her that even though Prince Cordo appears to have died in that stampede, Midian also thought he died when he drowned rescuing that puppy from the flooding river, and the show brought him back after a few months.\n\t#No.\n\t\t*set krayl +10\n\t\t*set crew -10\n\t\tThe captain hates dealing with Midian's bad moods. So does the crew, but they will just have to deal with it, at least until Prince Cordo suddenly reappears on [i]The Muscular Horsemen of Quon Bex[/i], just like he always does after his apparent death.\n*gosub adjustments\n*return\n\n*label dec_8\n*gosub day_declare_check\nOne evening, @{(job = \"engineer\") |an engineer nicknamed} Lookout confronts you as you slip out of the radio room. For a moment, you fear you've been caught, but Lookout just wants you to read the novel she has written, a fantasy romance called [i]Castle Green Heart[/i]. She is quite insistent and wants to know if she should show it to the captain. Rather than raise her suspicion, you take the handwritten document.\n\nIt is the worst thing you have ever read, and after a misfiling at AAG headquarters you once read your own death sentence. If Krayl sees this, he might plow the [i]Falling Angel[/i] right into @{(ground = \"Tangled Sea\") the ocean|a mountain}. But Lookout maintains the radio you use to contact Ryonet.\n\nThe next day Lookout wants to know what you think. Do you tell her the truth about her book?\n*fake_choice\n\t#Yes.\n\t\t*set krayl +10\n\t\t*set ryonet -10\n\t\tYou lead Lookout to a quiet corner and tell her that all copies of [i]Castle Green Heart[/i] must be destroyed before God turns His face from His creation in shame. Lookout leaves in a huff, but she won't inflict her prose on the captain.\n\t\t*return\n\t#No.\n\t\t*set ryonet +10\n\t\t*set krayl -10\n\t\tYou praise Lookout's complex characterization, since [i]Castle Green Heart[/i] includes over four hundred characters despite being only one hundred pages long, and describe the middle section as action-packed, though you could not tell if it was a battle scene or an orgy. Lookout is delighted and rushes off to show the captain.\n*gosub adjustments\n*return\n\n*label dec_9\n*gosub day_declare_check\nCaptain Krayl wants you and First Mate Midian to devise a better method of avoiding Actorian Air Guard patrols. Midian is too busy dealing with a messy divorce between two cooks to help and turns the work over to you.\n\nYour pilot training taught you a great deal about AAG patrols. You could create a hard-to-track flight pattern for the [i]Falling Angel[/i]…or you could sabotage the plan so Lieutenant Ryonet can follow you more easily. Do you sabotage the plan?\n*fake_choice\n\t#Yes.\n\t\t*set ryonet +10\n\t\t*set krayl -10\n\t\tAfter a few hours of work, you present Captain Krayl and First Mate Midian with a flight pattern that moves the [i]Falling Angel[/i] around the ${ground} in a way that seems random and hard to predict, but that any first-year AAG pilot will recognize as a trainee patrol pattern. Midian is pleased. Captain Krayl adopts the plan, but he seems suspicious.\n\t#No.\n\t\t*set krayl +10\n\t\t*set ryonet -10\n\t\tThis sort of work is everything you have trained for. You produce a flight pattern that will prevent anyone from guessing the [i]Falling Angel[/i]'s movements.\n\n\t\tLieutenant Ryonet can follow your movements through the radio, but other AAG agents will have a much harder time finding the [i]Falling Angel[/i].\n*gosub adjustments\n*return\n\n*label dec_10\n*gosub day_declare_check\nRumors swirl that one of the [i]Falling Angel[/i]'s nurses used to work for the City Defense Corps in Actorius. Your research reveals that's technically true: Nurse Gaxlin served a brief internship with the CDC before they arrested her parents for nonpayment of loans. She may still have contacts in the CDC and Actorian Air Guard, making her a security risk. Do you tell the captain about Nurse Gaxlin?\n*fake_choice\n\t#Yes.\n\t\t*set gaxlin_alive false\n\t\t*set krayl +10\n\t\t*set ryonet -10\n\t\tAnnoyed that this detail slipped through his security screening, Captain Krayl thanks you for bringing the rumor to his attention and makes plans to drop the nurse off at the next stop. He is not wrathful, so she doesn't go over the railing, but the risk is too great.\n\t#No.\n\t\t*set ryonet +10\n\t\t*set krayl -10\n\t\tAs far as the crew is concerned, the rumors are only rumors. Captain Krayl hears the stories, but if he wonders why neither you nor Midian brought them to his attention, he says nothing.\n*gosub adjustments\n*return\n\n*comment Complex decisions. These require a skill check.\n\n*label dec_11\n*gosub day_declare_check\nWhen\n*if job = \"engineer\"\n\t*set missing \"tools\"\n\ttools go missing from the workshop,\n*if job = \"bursar\"\n\t*set missing \"supplies\"\n\ta crate of tea turns up empty,\n*if job = \"marine\"\n\t*set missing \"ammunition\"\n\tammo goes missing from the armory,\n*if job = \"officer\"\n\t*set missing \"silverware\"\n\tsilverware goes missing from the officer's table,\n*temp thief \"Landau\"\n*if landau_alive = false\n\t*set thief \"Chax\"\nyou suspect @{landau_alive a new yeomen|an accountant} named ${thief} has turned to theft. $!{thief} has covered his tracks well, but you could catch him by figuring out which locker he's using to hold stolen goods and then opening the lock. Do you try to catch the thief?\n*choice\n\t#Yes.\n\t\t*if ( intellect + espionage ) > 2\n\t\t\t*if thief = \"Landau\"\n\t\t\t\t*set landau_known true\n\t\t\t$!{thief} uses multiple lockers for his drops, which he uses to run an illicit store, selling items to the poorest members of the crew. You track his movements until you find little marks of red ink dabbed on the walls that he uses to indicate drop-off points. Following them back, you pop the lock on one locker and find the missing ${missing}. What do you do with ${thief}? Do you turn him in, rob him, or let him go?\n\t\t\t*choice\n\t\t\t\t#Turn him in.\n\t\t\t\t\t*if thief = \"Landau\"\n\t\t\t\t\t\t*set landau_alive false\n\t\t\t\t\t*if thief = \"Chax\"\n\t\t\t\t\t\t*set chax_alive false\n\t\t\t\t\t*set krayl +10\n\t\t\t\t\t*set crew -10\n\t\t\t\t\tCaptain Krayl is pleased with your work and to have someone to vent his frustrations on. $!{thief} goes over the railing, and Midian closes down the illicit store.\n\t\t\t\t\t*gosub adjustments\n\t\t\t\t\t*return\n\t\t\t\t#Rob him.\n\t\t\t\t\t*set wealth +100\n\t\t\t\t\t*set krayl -10\n\t\t\t\t\tYou take over ${thief}'s contacts for a few days and make around a hundred capons before you start to worry that Captain Krayl suspects something. Then you shut the whole operation down.\n\t\t\t\t\t*gosub adjustments\n\t\t\t\t\t*return\n\t\t\t\t#Let him go.\n\t\t\t\t\t*set crew +10\n\t\t\t\t\tYou leave evidence of your presence, enough to encourage ${thief} to stop his thievery. One day in the corridors, ${thief} gives you a single, grateful nod.\n\t\t\t\t\t*gosub adjustments\n\t\t\t\t\t*return\n\t\t*else\n\t\t\t*set crew -10\n\t\t\tYour attempts to expose ${thief} only put the crew on edge.\n\t\t\t*if wealth > 100\n\t\t\t\t*set wealth -100\n\t\t\t\tYou give up when you return from one of your investigations to find that someone has gone through your things and stolen at least a hundred capons worth of your hard-earned money.\n\t\t\t\t*gosub adjustments\n\t\t\t\t*return\n\t\t\t*else\n\t\t\t\t*set krayl -10\n\t\t\t\tYou give up when the captain himself tells you to stop antagonizing the crew. They did not become pirates, he insists, to have a police officer hunting them through the corridors of their own ship.\n\t\t\t\t*gosub adjustments\n\t\t\t\t*return\n\t#No.\n\t\tYou let the petty thefts slide. Either they stop or ${thief} becomes more subtle in his thefts, because you no longer notice missing ${missing}.\n\t\t*gosub adjustments\n\t\t*return\n\n*label dec_12\n*gosub day_declare_check\nThe lower deck laborers have set up an impromptu boxing ring to blow off steam. There is a cash prize for the toughest fighter, which is currently\n*if cloudy_alive\n\tthe pilot Cloudy.\n*else\n\t@{(job = \"marine\") a marine named Rune|your fellow marine, Rune}.\nDo you throw your hat in the ring?\n*choice\n\t#Yes.\n\t\t*if ( power + fighting ) > 2\n\t\t\t*set wealth +100\n\t\t\t*set crew +10\n\t\t\t*gosub brawler\n\t\t\tbut he can't match your ferocity and martial training. You knock him down three times, and the third time, he stays down. You collect your winnings and enjoy the roaring crowd as @{gaxlin_alive Nurse Gaxlin|the new nurse} makes sure you're not seriously injured.\n\t\t\t*gosub adjustments\n\t\t\t*return\n\t\t*else\n\t\t\t*set wounded true\n\t\t\t*set injury \"bruised ribs\"\n\t\t\t*set injury_plural true\n\t\t\t*gosub brawler\n\t\t\tand though you know your way around a sparring ring, this is nothing like AAG training. He hammers your ribs until they feel like they're going to crack, and when a left hook catches you across the jaw, you have the sense not to get up. @{cloudy_alive Cloudy|Rune} shouts in triumph as @{gaxlin_alive Nurse Gaxlin|the new nurse} checks your bruised ribs.\n\t\t\t*gosub adjustments\n\t\t\t*return\n\t#No.\n\t\tYou have better things to do than let @{cloudy_alive some drunken pilot|a pirate marine} beat you unconscious, but you show up to watch the fights.\n\t\t*gosub adjustments\n\t\t*return\n\n*label brawler\n*if cloudy_alive\n\tCloudy fights like a drunken maniac, which he is,\n*else\n\t@{(job = \"marine\") Rune is huge and ferocious|Rune is a huge bearded marine with ham-hock fists},\n*return\n\n*label dec_13\n*gosub day_declare_check\nIn order to save Deck 4, which the crew uses as a recreation area, from redevelopment as a secondary armory, several crew members, led by @{(job = \"bursar\") |an accountant named} Pennybender, have decided to put on a show! Do you help?\n*choice\n\t#Yes.\n\t\tPennybender claps with delight. She needs dancers, a lighting technician, and an assistant director. Do you want to dance, direct, or control the lights?\n\t\t*choice\n\t\t\t#I've always wanted to dance!\n\t\t\t\t*gosub always_knew\n\t\t\t\t*if finesse > 2\n\t\t\t\t\tFortunately, you are a nimble and graceful dancer, even in the flamingo costume you have to wear, and halfway\n\t\t\t\t\t*label applaud\n\t\t\t\t\tthrough the show even Krayl is applauding.\n\t\t\t\t\t*label save_4\n\t\t\t\t\t*set krayl +10\n\t\t\t\t\t*set crew +10\n\t\t\t\t\tThe captain reluctantly agrees to maintain Deck 4 as a recreational zone, and everyone celebrates with more dancing.\n\t\t\t\t\t*gosub adjustments\n\t\t\t\t\t*return\n\t\t\t\t*else\n\t\t\t\t\tUnfortunately, you prove to be a clumsy dancer, especially in the flamingo costume you have to wear, and\n\t\t\t\t\t*label shut_down\n\t\t\t\t\t*set crew -10\n\t\t\t\t\t*set krayl -10\n\t\t\t\t\tKrayl orders the show shut down halfway through. The crew despairs.\n\t\t\t\t\t*gosub adjustments\n\t\t\t\t\t*return\n\t\t\t#As a visionary, I belong in the director's chair.\n\t\t\t\t*gosub always_knew\n\t\t\t\t*if command > 0\n\t\t\t\t\tFortunately, you prove an able secondary director. You make sure that all the dancers are dressed like flamingos and all the ukulele players are wearing their pineapple costumes. Halfway\n\t\t\t\t\t*goto applaud\n\t\t\t\t*else\n\t\t\t\t\tUnfortunately, you prove an inadequate director. After a mix-up in the prop room, the flamingo dancers end up wearing pineapple costumes and rolling all over the stage.\n\t\t\t\t\t*goto shut_down\n\t\t\t#I'm the only one here who can operate the lights without starting a fire.\n\t\t\t\t*gosub always_knew\n\t\t\t\t*if engineering > 0\n\t\t\t\t\tFortunately, you know your way around electrical systems. You perfectly frame the flamingo dancers and ukulele players, and halfway\n\t\t\t\t\t*goto applaud\n\t\t\t\t*else\n\t\t\t\t\tUnfortunately, your skills prove unequal to the task, and after the third electrical fire,\n\t\t\t\t\t*goto shut_down\n\t#No.\n\t\t*set crew -10\n\t\tThe plan is charming but hopeless, and Pennybender cannot get enough people to sign on. She blames you, but Captain Krayl is right that the [i]Falling Angel[/i] should use that wasted space.\n\t\t*gosub adjustments\n\t\t*return\n\n*label always_knew\nWhen you signed on to infiltrate a pirate crew, you somehow always knew that you would end up in a stage play called [i]Miss Pennybender's Fun-Time Save the Rec Deck All-Singing and Dancing Revue[/i].\n*return\n\n*label dec_14\n*gosub day_declare_check\nIn one of her coded transmissions, Lieutenant Ryonet identifies an aero engineer, a crew member nicknamed Spikey, as a person of interest in the theft of fifty thousand chicken drumsticks from a Combine farm outside Actorius. The [i]Falling Angel[/i] is scheduled to dock at @{(ground = \"Tangled Sea\") a Big Squid sky fortress|an independent supply depot} tomorrow, and Ryonet wants Spikey arrested by Actorian agents.\n*if job = \"engineer\"\n\tAs an engineering officer, you could order Spikey to pick up some equipment, letting Ryonet's agents\n*if job = \"bursar\"\n\tYou could change some paperwork to make sure Spikey is allowed off the ship, and then Ryonet's agents could\n*if job = \"marine\"\n\tCrew members are always excited for any kind of shore leave, and since you're a guard you could \"accidentally\" let Spikey off the ship so Ryonet's agents can\n*if job = \"officer\"\n\tAs a junior officer, you could order Spikey to pick up some equipment, which would let Ryonet's agents\nscoop him up. Do you?\n*fake_choice\n\t#Yes.\n\t\t*set ryonet +10\n\t\t*set krayl -10\n\t\tCaptain Krayl wanted to remain at this @{(ground = \"Tangled Sea\") airbase|depot} for less than an hour, but when Spikey disappears, he stays for most of the day until eventually abandoning the search, worried and irritated.\n\t#No.\n\t\t*set krayl +10\n\t\t*set ryonet -10\n\t\tYou're not going to expose yourself to Captain Krayl's suspicions just so Ryonet can arrest a chicken thief. You ignore the coded transmission; if she complains, you can pretend that you never received the order.\n*gosub adjustments\n*return\n\n*label dec_15\n*gosub day_declare_check\nOne morning, you notice ${helper}'s eyes on your ${metal} ${pet} during breakfast. The ${helper_desc} says, \"Midian wants to expand the [i]Falling Angel[/i]'s communication tubes. Do you think you could use your ${pet} to carry comm lines?\"\n\nYour ${pet} could do that. It would mean lots of maintenance for your ${pet} and late, exhausting nights for you, but if you can stay awake, it would improve your access to the radio room. Do you offer your ${pet}'s help?\n*choice\n\t#Yes.\n\t\t*temp wiring 2\n\t\t*if has_motivator\n\t\t\t*set wiring -1\n\t\tYou pour yourself some coffee and get to work with Midian and ${helper}, studying diagrams of the [i]Falling Angel[/i].\n\t\t*if ( power + engineering ) > wiring\n\t\t\t*set ryonet +10\n\t\t\tIt's a long, exhausting night of guiding your ${pet} between the decks. By morning, you're the only one left awake, but you've expanded the [i]Angel[/i]'s communication tubes, and you've managed to add a crawlspace for your ${pet} right outside of the radio room, which will make contacting Ryonet that much easier.\n\t\t\t*gosub adjustments\n\t\t\t*return\n\t\t*else\n\t\t\t*set krayl -10\n\t\t\tBut the work is exhausting, and soon you're the only one left awake. You think you're doing well until your ${pet} suddenly punches through the wall of the radio room. Krayl himself comes out of his cabin, dressed only in his nightgown and curly-toed slippers, to berate you.\n\t\t\t*gosub adjustments\n\t\t\t*return\n\t#No.\n\t\t*set crew -10\n\t\t$!{helper} and Midian are disappointed as you explain to them the risks and complexities involved, but they accept your excuses.\n\t\t*gosub adjustments\n\t\t*return\n\n*label dec_16\n*gosub day_declare_check\n$!{helper} is convinced that someone has smuggled a pet aboard. The captain forbids living animals because fur sticks to his fancy coats, but investigating may antagonize the crew. Do you and ${helper} investigate the case of the hidden pet?\n*choice\n\t#Yes.\n\t\t*set krayl +10\n\t\t*set crew -10\n\t\t*set blackroot_known true\n\t\tAfter tossing a few bunks, you and ${helper} find some unfamiliar hairs in the jacket of the [i]Falling Angel[/i]'s physician, Blackroot. He refuses to speak with you, but when your Deep Tech ${pet} picks up a trail, you follow it to @{print_stopped Storage Room 26, neglected since you stopped that printing press|a locked storage berth between Decks 6 and 7}.\n\n\t\tAnd there you find a full-size horse.\n\n\t\t*page_break\n\n\t\tDr. Blackroot rushes in after you and tries to justify himself, arguing that he pays for his horse out of his own pocket, that the horse balances out some heavy equipment on the other side of the [i]Falling Angel[/i], and that no one is using this room anyway. But, as ${helper} points out, it's a horse. It's a whole entire horse.\n\n\t\tYou could slyly hint that a bribe would make this problem disappear. You could report this to the captain and hope to out-argue the doctor. Or you could let it go.\n\t\t*choice\n\t\t\t#I shake Dr. Blackroot down for a bribe.\n\t\t\t\t*if ( finesse + command ) > 2\n\t\t\t\t\t*set wealth +100\n\t\t\t\t\tYou imply that everyone has a price, and so do secret airship horses. After some haggling, Dr. Blackroot hands you both a hundred-capon bill, and the matter is settled.\n\t\t\t\t\t*gosub adjustments\n\t\t\t\t\t*return\n\t\t\t\t*else\n\t\t\t\t\t*set krayl -10\n\t\t\t\t\tDr. Blackroot scowls and refuses to cooperate. $!{helper} tries to calm him down, but the physician shouts that if you report his horse, he'll report your clumsy bribery attempt.\n\n\t\t\t\t\t\"I think he has us,\" $!{helper} tells you. \"But, Doctor, get rid of the horse the next time we land.\"\n\t\t\t\t\t*gosub adjustments\n\t\t\t\t\t*return\n\t\t\t#I report the secret horse to the captain.\n\t\t\t\tYou and ${helper} drag a protesting Dr. Blackroot to captain's office, beneath the ominous portrait of his dead wife.\n\t\t\t\t*if ( intellect + command ) > 2\n\t\t\t\t\t*set krayl +10\n\t\t\t\t\tCaptain Krayl listens to both sides of the argument, thinks for a long time, and says, \"A literal horse? This isn't some kind of metaphor?\"\n\n\t\t\t\t\tWhen you assure him it's an actual horse, the captain turns to Blackroot and says, \"We drop it off at the next stop. And you're lucky I don't drop both of you @{(ground = \"Tangled Sea\") into the ocean|onto the rocks}.\"\n\n\t\t\t\t\tWhen Blackroot retreats, relieved that the captain isn't just going to shoot the horse, Krayl says, \"Good work, you two. Now never bring me anything this stupid again.\"\n\t\t\t\t\t*gosub adjustments\n\t\t\t\t\t*return\n\t\t\t\t*else\n\t\t\t\t\t*set krayl -10\n\t\t\t\t\tCaptain Krayl listens to both sides of the argument, then says, \"This is the stupidest thing I have ever heard. Tell Midian to go downstairs and shoot that horse.\"\n\n\t\t\t\t\tDr. Blackroot protests, but in a few minutes the crew is throwing the carcass overboard. The captain turns to you and says, \"You are all ridiculous. Get out of my office.\"\n\t\t\t\t\t*gosub adjustments\n\t\t\t\t\t*return\n\t\t\t#I'm going to let this problem go.\n\t\t\t\tDr. Blackroot embraces you, kisses both your cheeks, and says, \"I know I can't keep this beautiful creature for much longer. The next time we land, I'll make sure he has a new home.\"\n\n\t\t\t\tBack\n\t\t\t\t*if job = \"engineer\"\n\t\t\t\t\tin the engine room, you ask Lookout how much horse smuggling happens on pirate airships, and the old engineer just laughs.\n\t\t\t\t*if job = \"bursar\"\n\t\t\t\t\tin the office, you ask Pennybender how much horse smuggling happens on pirate airships. She chooses to ignore you while fixing her makeup.\n\t\t\t\t*if job = \"marine\"\n\t\t\t\t\ton patrol, you ask Rune how much horse smuggling happens on pirate airships. The bearded warrior just laughs.\n\t\t\t\t*if job = \"officer\"\n\t\t\t\t\ton the lower deck, you ask Cutter how much horse smuggling happens on pirate airships. He pretends not to hear you.\n\t\t\t\t*gosub adjustments\n\t\t\t\t*return\n\t#No.\n\t\t*set krayl -10\n\t\t*set crew +10\n\t\tThe captain might grumble about cat hair, but until he gives you explicit orders, you're not going to turn everyone's locker inside out looking for a flying squirrel.\n\t\t*gosub adjustments\n\t\t*return\n\n*label dec_17\n*gosub day_declare_check\n*temp lizard 2\nThe [i]Falling Angel[/i] has a cloud lizard infestation! Almost immune to poison and too cunning for most traps, the little monsters are reproducing at an alarming rate and eating the ship's stores, including the precious reserves of Little Snuggy's Wafer Balls.\n\nThere are a few ways to get rid of them. You could wiggle through the grates with @{has_better_weapon your ${weapon}|a knife}. You could show your ${pet} a map of the [i]Falling Angel[/i] and send it in. Finally you could coordinate ${helper} and several other ${job}s, working in shifts throughout the night. Whatever you do, Captain Krayl wants this problem solved.\n*choice\n\t#I'll wiggle into the pipes with my @{has_better_weapon ${weapon}|knife}.\n\t\tYou slither into the pipes, followed by ${helper}, Midian, and your ${pet}. Armed with @{has_better_weapon your high-quality blade|a heavy knife},\n\t\t*if ( finesse + fighting ) > lizard\n\t\t\t*if has_better_weapon\n\t\t\t\t*set lizard -1\n\t\t\t*set krayl +10\n\t\t\t*set crew +10\n\t\t\tyou slice up the lizards, then reach the nests. The close-quarters fighting requires speed and coordination, but your group soon destroys every last egg. You and your ${pet} get the lizard blood hosed off you behind a screen while Captain Krayl leads a grateful crew in shouting your praises.\n\t\t\t*gosub adjustments\n\t\t\t*return\n\t\t*else\n\t\t\t*if wounded\n\t\t\t\tyou find yourself outmatched by the vicious\n\t\t\t\t*set crew -10\n\t\t\t\t*set krayl -10\n\t\t\t\tcreatures, especially since your wounds have not fully healed. Midian drags you out of the tunnels, and you lie there in a daze, aching from your wounds as Captain Krayl himself crawls in to finish the work. Several crew members get bit, and the captain loses his favorite silk shirt, the magenta one.\n\t\t\t\t*gosub adjustments\n\t\t\t\t*return\n\t\t\t*else\n\t\t\t\t*set wounded true\n\t\t\t\t*set injury \"lizard bites\"\n\t\t\t\t*set injury_plural true\n\t\t\t\tyou find yourself outmatched by the vicious creatures. You suffer multiple bites, but with help from your ${pet} and the rest of the crew, you finally destroy the last of their nests. Everyone crawls back out onto the deck, covered in lizard and human blood.\n\t\t\t\t*gosub adjustments\n\t\t\t\t*return\n\t#My Deep Tech ${pet} can tear through the cloud lizard population.\n\t\t*if has_motivator\n\t\t\t*set lizard -1\n\t\tYou and ${helper} explain the situation to your ${pet}.\n\t\t*if ( intellect + engineering ) > lizard\n\t\t\t*set crew +10\n\t\t\t*set krayl +10\n\t\t\tYour knowledge of its alien intellect helps. The ${metal} ${pet} disappears into the pipes, followed by Midian and ${helper}. You track its movements from the corridors. Soon your ${pet} emerges from a hatch, covered in lizard blood and\n\t\t\t*if pet = \"monkey\"\n\t\t\t\thooting\n\t\t\t*if pet = \"hawk\"\n\t\t\t\tscreeching\n\t\t\t*if pet = \"wolf\"\n\t\t\t\thowling\n\t\t\t*if pet = \"snake\"\n\t\t\t\thissing\n\t\t\ttriumphantly. $!{helper} and Midian follow a moment later, also messy and also pleased; the cloud lizard threat is eradicated.\n\t\t\t*gosub adjustments\n\t\t\t*return\n\t\t*else\n\t\t\tBut you struggle to convey your needs to the ${pet}, and as you track its movement from the corridors, you realize that it does not understand what you want.\n\t\t\t*label frustrated\n\t\t\t*set crew -10\n\t\t\t*set krayl -10\n\t\t\tFrustrated, the captain himself crawls into the pipes to help Midian and ${helper}. They return several hours later, covered in blood and not at all happy, though they have destroyed the cloud lizards.\n\t\t\t*gosub adjustments\n\t\t\t*return\n\t#$!{helper} and I spend a long night working with the crew to solve the problem.\n\t\tIt's going to be a long night, so you unroll some maps, make sure everyone has a good knife, and get to work.\n\t\t*if ( power + command ) > lizard\n\t\t\t*set krayl +10\n\t\t\t*set crew +10\n\t\t\tYour leadership skills prove invaluable as several crew members, alongside ${helper} and Midian, hunt down the lizard nests. By morning it's done, and while you are tired and the crew is covered in blood, they are happy and victorious.\n\t\t\t*gosub adjustments\n\t\t\t*return\n\t\t*else\n\t\t\tBut the work is exhausting, and coordination across so many decks proves all but impossible.\n\t\t\t*goto frustrated\n\n*label dec_18\n*gosub day_declare_check\nYou're dealing with a minor lunchtime dispute over the best way to cut a sandwich when an explosion @{(job = \"engineer\") knocks you off your seat|rocks the lower decks}. At first you think you're under attack, but you soon learn that a steam pipe just blew out near the main boiler.\n\nSeveral mechanics are badly injured. Worse, @{gaxlin_alive Nurse Gaxlin|the new head nurse} struck her head in the fall, and Dr. @{blackroot_known Blackroot|Blackroot, the ship's doctor,} needs someone to organize the nurses and help them physically carry the wounded to the infirmary. You could pass this task onto Midian, who is strong as an ox and a competent leader, but taking charge yourself could earn the captain's respect.\n*choice\n\t#I help the doctor myself.\n\t\t*if ( power + command ) > 2\n\t\t\t*set krayl +10\n\t\t\t*set crew +10\n\t\t\tYou grab the first wounded mechanic, and the nurses move to help you just as Dr. Blackroot starts issuing commands. You hold down screaming workers, carry the wounded to cots, relay supply orders, and haul boxes of medical supplies from the store rooms. After several exhausting hours, your work has helped Dr. Blackroot and his nurses keep injuries to a minimum. There are no fatalities. @{gaxlin_alive Gaxlin|The new head nurse} is back on duty by evening.\n\t\t\t*gosub adjustments\n\t\t\t*return\n\t\t*else\n\t\t\t*set krayl -10\n\t\t\t*set crew -10\n\t\t\tYou try to organize the nurses while hauling the wounded to cots, but the work is exhausting and overwhelming. Several mechanics die or suffer permanent injuries. Fortunately, @{gaxlin_alive Gaxlin|the new head nurse} is back on duty by evening.\n\t\t\t*gosub adjustments\n\t\t\t*return\n\t#I encourage Midian to help the doctor.\n\t\t*set crew -10\n\t\tYou encourage First Mate Midian to organize the nurses while you spend the afternoon running supplies to the infirmary. With her help, injuries are kept to a minimum, and there are no fatalities. @{gaxlin_alive Gaxlin|The head nurse} is back on duty by evening.\n\t\t*gosub adjustments\n\t\t*return\n\n*label dec_19\n*gosub day_declare_check\n*set map_stolen true\nThough Deep Tech rifts are sometimes found outside Actorius, the only true Deep Tech biome is beneath the city. And now one of Captain Krayl's Deep Tech maps has disappeared. It is an older one, showing a part of the Deep Tech chasm stripmined by the Combines years ago, but it is still valuable.\n*choice\n\t#I organize a search to find the map.\n\t\t*temp map_thief \"Landau\"\n\t\tYou investigate the dining room where the captain's Deep Tech map\n\t\t*if ( intellect + espionage ) > 2\n\t\t\t*set krayl +10\n\t\t\thung and find\n\t\t\t*if landau_alive = false\n\t\t\t\t*set map_thief \"Chax\"\n\t\t\t\ta bit of red ink on the wall. You recognize that red ink from the time Landau spent stealing ${missing}; it must be one of his fellow thieves. With that clue, you hit Landau's old drop locations until you find the storage locker being used by this new thief, a custodian named Chax.\n\t\t\t\t*goto next_question\n\t\t\t*elseif landau_known\n\t\t\t\ta bit of red ink on the wall. You recognize that red ink from the time Landau spent stealing ${missing}, and you realize there is no saving him now. It takes you only a few minutes to track down the storage locker he's using to hold the map, pending a sale.\n\n\t\t\t\t*label next_question\n\t\t\t\tYour next question is whether to copy the map for Lieutenant Ryonet or immediately return it to Captain Krayl.\n\t\t\t\t*choice\n\t\t\t\t\t#I first copy the map for the AAG.\n\t\t\t\t\t\t*set ryonet +10\n\t\t\t\t\t\tYou take the time to copy the Deep Tech map. Even pirate ships receive mail, and you can send the rough copy to AAG Headquarters the next time the [i]Falling Angel[/i] stops. Once your copying is done, you return the original map to the captain. If he is suspicious of the time you took, he says nothing. Instead he\n\t\t\t\t\t\t*label thank\n\t\t\t\t\t\tthanks you, orders the map put back on the wall, and\n\t\t\t\t\t\t*if seen_krayl_sword\n\t\t\t\t\t\t\telectrocutes the thief with his Deep Tech broadsword.\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tretrieves his broadsword. The thief screams as Krayl ignites the Deep Tech weapon, and lightning wreathes its blade. A single blow kills ${map_thief}.\n\n\t\t\t\t\t\t\"Is he bored of using the railing?\" ${helper} asks. \"No, wait, there he goes.\"\n\n\t\t\t\t\t\tTwo of Krayl's guards throw the thief's blackened corpse over the side.\n\t\t\t\t\t\t*set seen_krayl_sword true\n\t\t\t\t\t\t*gosub adjustments\n\t\t\t\t\t\t*return\n\t\t\t\t\t#I return the map immediately.\n\t\t\t\t\t\t*set krayl +10\n\t\t\t\t\t\tNot wanting to raise the captain's suspicions, you immediately return the map. He claps you on the back,\n\t\t\t\t\t\t*goto thank\n\t\t\t*else\n\t\t\t\ta bit of red ink on the wall. You ask @{(job = \"bursar\") Pennybender|a clerk in the quartermaster's office} whether she recognizes the red ink, and she immediately identifies a yeoman named Landau, who uses that ink for record keeping. You find notes written in cipher under Landau's bunk. Once you break the simple encryption, the notes lead you to a disused storage locker, and that's where you find the map, along with other stolen supplies.\n\t\t\t\t*goto next_question\n\t\t*else\n\t\t\t*set crew -10\n\t\t\t*set krayl -10\n\t\t\tis hung, but you can't find any clues. You and ${helper} start tossing crew bunks, looking for the map or anything that might lead you to it, but the thief covered their tracks well. An irritated Midian orders you to stop before you antagonize the crew so much that Captain Krayl has to involve himself.\n\t\t\t*gosub adjustments\n\t\t\t*return\n\t#I keep my head down.\n\t\tNeither the captain nor the crew would be happy if you failed in your search. Already busy as a pirate and a spy, you have the sense not to get involved as an investigator.\n\t\t*gosub adjustments\n\t\t*return\n\n*label dec_20\n*gosub day_declare_check\n@{map_stolen After the theft of the Deep Tech map, rumors|Rumors} swirl that ${helper} is secretly a Quon Bexi spy. The Tech raiders of Quon Bex are famous for their determination to steal any Deep Tech they can find, and while at first the rumors seem unlikely, ${helper} keeps disappearing into the radio room–your radio room. Do you sneak into the radio room closet to spy on ${helper}?\n*choice\n\t#Yes.\n\t\t*if ( finesse + espionage ) > 2\n\t\t\t*set ryonet +10\n\t\t\tYour spying soon turns up the truth: ${helper} is not spying for Quon Bex; ${helper_he_she} is using sightings of merchant airships to\n\t\t\t*if ground = \"Tangled Sea\"\n\t\t\t\tspot vulnerable targets that are nonetheless too ill-provisioned to be worth the [i]Falling Angel[/i]'s time. $!{helper_he_she} is then radioing lesser minor pirate gangs, and collecting a share of the plunder. You inform Lieutenant Ryonet that ${helper} is not a Quon Bexi spy and give her enough information to crush a few minor pirate gangs. $!{helper} might wonder what happened, but it's not like ${helper_he_she} can file a complaint.\n\t\t\t\t*gosub adjustments\n\t\t\t\t*return\n\t\t\t*else\n\t\t\t\tpredict the markets back in Actorius, then radioing one of the Combines there. You inform Lieutenant Ryonet of this clever manipulation of the markets and assure her that ${helper} is not a Quon Bexi spy. $!{helper} has to stop soon anyway as more Combines back in Actorius start using the same trick.\n\t\t\t\t*gosub adjustments\n\t\t\t\t*return\n\t\t*else\n\t\t\t*set ryonet -10\n\t\t\tYou try to spy on ${helper}, but one of the marines notices you moving around outside the radio room. You're forced to retreat, and First Mate Midian sets extra guards around the radio room for a few days, preventing you from contacting Ryonet. At least ${helper} stops whatever ${helper_he_she} was doing.\n\t\t\t*gosub adjustments\n\t\t\t*return\n\t#No.\n\t\tSoon the visits to the radio room stop, and the [i]Falling Angel[/i]'s rumor mill stops claiming that ${helper} is a Quon Bexi spy and starts claiming that Midian is a werewolf. Problem solved.\n\t\t*gosub adjustments\n\t\t*return\n\n*label adjustments\n*if before_contact\n\t*set before_contact false\n\t*if krayl > 90\n\t\t*set krayl 90\n\t*if krayl \u003c 20\n\t\t*set krayl 20\n\t*if crew > 90\n\t\t*set crew 90\n\t*if crew \u003c 20\n\t\t*set crew 20\n\t*if ryonet > 90\n\t\t*set ryonet 90\n\t*if ryonet \u003c 20\n\t\t*set ryonet 20\n\t*return\n*else\n\t*goto summary\n\n*label summary\n\n*if krayl > 80\n\t*set ryonet -10\n*if ryonet > 80\n\t*set krayl -10\n*if crew > 80\n\t*set krayl -10\n\t*set ryonet -10\n\n*if crew \u003c 0\n\t*set crew 0\n*if crew > 100\n\t*set crew 100\n*if krayl \u003c 0\n\t*set krayl 0\n*if krayl > 100\n\t*set krayl 100\n*if ryonet \u003c 0\n\t*set ryonet 0\n*if ryonet > 100\n\t*set ryonet 100\n\n*set crew_previous crew\n*set krayl_previous krayl\n*set ryonet_previous ryonet\n\n*page_break\n\n*if ( krayl \u003c 20 ) and ( krayl_attacked )\n\tYou enter your ${port_starboard}-side cabin one night to find it dark and empty, as everyone else is working. As you reach for an overhead light, a crackling electric glow illuminates the cabin, and you see Captain Krayl standing with @{seen_krayl_sword a Deep Tech broadsword sizzling with electricity|his electric broadsword}.\n\n\tHe says, \"I will do it right this time,\" and charges. You pull on the door, but it's held fast from the outside, and before you can reach for your ${weapon}, the captain's broadsword smashes you to the ground in a shower of sparks.\n\n\tYou do not see the killing blow.\n\t*choice\n\t\t#Try this day again.\n\t\t\t*load_checkpoint\n\t\t#Restart the game.\n\t\t\t*goto restart\n*elseif krayl \u003c 20\n\t*gosub krayl_attacks\n\t*return\n*elseif ryonet \u003c 20\n\tYou're on the bridge with Midian when the lookout above you shouts. You turn to port just as a half dozen Actorian bombers drop out of the clouds. Their rocket bombs streak toward the [i]Falling Angel[/i]. There is no time to maneuver or even to raise an alarm.\n\n\tAs the impacts blow the pirate airship out of the sky, you realize that this is the price of failing the Actorian Air Guard.\n\t*choice\n\t\t#Try this day again.\n\t\t\t*load_checkpoint\n\t\t#Restart the game.\n\t\t\t*goto restart\n*elseif ( crew \u003c 20 ) and ( crew_attacked )\n\tThe crew's eyes follow you suspiciously one morning as you eat breakfast, but after the last attack you've kept your ${weapon} and ${pet} close at all times. You finish breakfast, but when you try to stand up, your legs give out.\n\n\t@{blackroot_known The ship's physician, Dr. Blackroot|Dr. Blackroot} kneels beside you as your vision turns gray, and says, \"It appears to be a case of poisoning. How sad. But there is nothing we can do except throw the body overboard.\"\n\n\tYou struggle feebly as the crew grabs your arms and legs, carries you up the steps, and throws you over the railing.\n\t*choice\n\t\t#Try this day again.\n\t\t\t*load_checkpoint\n\t\t#Restart the game.\n\t\t\t*goto restart\n*elseif crew \u003c 20\n\t*gosub crew_attacks\n\t*return\n*else\n\t*return\n\n*label krayl_attacks\n*set krayl 30\n*set krayl_previous 30\n*set krayl_attacked true\n*set spider_known true\n\nIt is after midnight, and your ${port_starboard}-side cabin is empty except for you. Even your ${pet} is away. You doze until an unfamiliar metallic sound disturbs you. Your ${pet} returning?\n\nNo, you realize…though maybe someone else's. The Deep Tech creature running along the wall toward you is a tangle of sharp metal legs. Before you can get out of bed, it leaps!\n\n*temp krayl_attack 2\n*choice\n\t#I grab my ${weapon} and cut through the Deep Tech monster.\n\t\t*set used_weapon true\n\t\t*if has_better_weapon\n\t\t\t*set krayl -1\n\t\tYou lunge for your sheathed ${weapon} just as the metal spider leaps. Its claws rip through your cot as you grab the hilt and rip the blade free of its scabbard. The Deep Tech spider leaps again, impossibly fast,\n\t\t*if ( power + fighting ) > krayl_attack\n\t\t\tbut you manage to get your ${weapon}'s edge between your face and its claws. You shove it away.\n\t\t*elseif ( power + fighting ) > ( krayl_attack - 1 )\n\t\t\t*if wounded\n\t\t\t\tand though you fight with all your strength, your ${injury} @{injury_plural slow|slows} you down.\n\t\t\t\t*label no_eyes\n\t\t\t\tThe Deep Tech spider raises its metal claws one last time, then drives them down into your eyes. The last thing you hear is Captain Krayl's boots outside your cabin door.\n\t\t\t\t*choice\n\t\t\t\t\t#Try this day again.\n\t\t\t\t\t\t*load_checkpoint\n\t\t\t\t\t#Restart the game.\n\t\t\t\t\t\t*goto restart\n\t\t\t*else\n\t\t\t\t*set wounded true\n\t\t\t\t*set injury \"scratched arms\"\n\t\t\t\t*set injury_plural true\n\t\t\t\tand though you manage to get your ${weapon}'s edge between your face and its claws, its flailing limbs scratch your arms bloody before you can hurl it away from you.\n\t\t\t\t*goto krayl_attacks_2\n\t\t*else\n\t\t\tand though you fight with all your strength, the beast-machine is just too ferocious. It slams you to the ground, and your ${weapon} slips out of reach.\n\t\t\t*goto no_eyes\n\t#I quickly throw the blanket over the spider's head.\n\t\tYou grab the heavy blanket just as the metal spider leaps. Its claws rip through your\n\t\t*if ( finesse + espionage ) > krayl_attack\n\t\t\tcot, but you wrap the blanket around the Deep Tech spider, roll backward to avoid a claw that pierces the fabric, and kick it with both feet, knocking it against the far wall as the blanket falls in tatters around it.\n\t\t\t*goto krayl_attacks_2\n\t\t*elseif ( finesse + espionage ) > ( krayl_attack - 1 )\n\t\t\tcot as you wrap the blanket around the Deep Tech spider. But before you can cover it completely, a metal spike rips through the blanket and slashes your\n\t\t\t*if wounded\n\t\t\t\tpalm. Already injured,\n\t\t\t\t*label fall_backward\n\t\t\t\tyou fall backward off the cot. Before you can rise, the spider jumps on you.\n\t\t\t\t*goto no_eyes\n\t\t\t*else\n\t\t\t\t*set wounded true\n\t\t\t\t*set injury \"scratched arm\"\n\t\t\t\tarm. The spider hurls itself on you, knocking you off the cot, but it is still half covered in the blanket. You roll and kick it backward into the far door, then regain your feet.\n\t\t\t\t*goto krayl_attacks_2\n\t\t*else\n\t\t\tcot as you wrap the blanket around the Deep Tech spider. But before you can cover it completely, a metal spike rips through the blanket and slashes your hand open. Stunned by the pain,\n\t\t\t*goto fall_backward\n\t#I call my ${pet}.\n\t\t*if has_motivator\n\t\t\t*set krayl_attack -1\n\t\tYou throw yourself off the cot just as the metal spider leaps and rips it to pieces. Calling with words and thoughts,\n\t\t*if ( engineering + command ) > krayl_attack\n\t\t\tyou make contact with your ${pet} and hear its frantic\n\t\t\t*if ( pet = \"monkey\" ) or ( pet = \"wolf \")\n\t\t\t\thowl\n\t\t\t*if pet = \"snake\"\n\t\t\t\thissing\n\t\t\t*if pet = \"hawk\"\n\t\t\t\tcry\n\t\t\tas it races for you. It cannot reach you in time, and as the Deep Tech Spider spins around, you think you are doomed, but the spider stumbles as if confused. Your mental call has influenced it, too—but only for a moment.\n\t\t\t*goto krayl_attacks_2\n\t\t*elseif ( engineering + command ) > ( krayl_attack - 1 )\n\t\t\tand it races for you. But it cannot reach you in time.\n\t\t\t*if wounded\n\t\t\t\tYou try to get away from the Deep Tech spider and give your ${pet} the time it needs, but your ${injury} @{injury_plural ache|aches}, and you falter as you run for the door. The Deep Tech spider slams you to the ground. Then you feel its claws rip through your back.\n\t\t\t\t*choice\n\t\t\t\t\t#Try this day again.\n\t\t\t\t\t\t*load_checkpoint\n\t\t\t\t\t#Restart the game.\n\t\t\t\t\t\t*goto restart\n\t\t\t*else\n\t\t\t\t*set wounded true\n\t\t\t\t*set injury \"scratched shoulder\"\n\t\t\t\tYou retreat, trying to buy your ${pet} the seconds it needs, but the Deep Tech spider is impossibly fast. It hits you from behind, slashing your shoulder and clinging to your back, but you slam into the wall and knock it to the ground.\n\t\t\t\t*goto krayl_attacks_2\n\t\t*else\n\t\t\tand it races for you. But it cannot reach you in time. You try to get away from the Deep Tech spider and give your ${pet} the time it needs, but the spider is impossibly fast. It hits you from behind, slashing your shoulder and clinging to your back. You go down and before you can escape, it slams its front claws through your back.\n\t\t\t*choice\n\t\t\t\t#Try this day again.\n\t\t\t\t\t*load_checkpoint\n\t\t\t\t#Restart the game.\n\t\t\t\t\t*goto restart\n\t*if has_revolver\n\t\t#I grab my revolver and open fire.\n\t\t\t*set used_revolver true\n\t\t\tYou keep your revolver under your bunk in case of drunken mayhem or sudden boarding, not Deep Tech spiders.\n\t\t\t*if ( finesse + fighting ) > 2\n\t\t\t\tBut you fire every round you have into the horrible thing, then throw yourself to the ground as it leaps onto your cot and rips it to pieces. You shot off a leg, but it's still coming.\n\t\t\t\t*label at_least\n\t\t\t\tAt least everyone heard the gunshots.\n\t\t\t\t*goto krayl_attacks_2\n\t\t\t*elseif ( finesse + fighting ) > 1\n\t\t\t\tYou fire every round you have into the horrible thing,\n\t\t\t\t*if wounded\n\t\t\t\t\tbut it flings itself at you, and you're still not healed from your ${injury}.\n\t\t\t\t\t*label throw\n\t\t\t\t\tYou throw yourself to one side, but too slowly, and it slashes your hands and chest as you desperately struggle to escape.\n\t\t\t\t\t*goto no_eyes\n\t\t\t\t*else\n\t\t\t\t\t*set wounded true\n\t\t\t\t\t*set injury \"scratched leg\"\n\t\t\t\t\tbut it flings itself onto the bed. You roll off the side and wince as its metal claws slash your legs, but the wound is not deep, and the Deep Tech spider is missing a limb.\n\t\t\t\t\t*goto at_least\n\t\t\t*else\n\t\t\t\tYou squeeze the trigger, but you can't tell if you hit anything. Then the Deep Tech spider hurls itself on you.\n\t\t\t\t*goto throw\n\n*label krayl_attacks_2\n*set krayl_attack 3\n\nThen your ${pet}\n*if pet = \"monkey\"\n\topens the cabin door\n*if pet = \"wolf\"\n\tsmashes the door down\n*if pet = \"snake\"\n\tdrops out of a ceiling grate\n*if pet = \"hawk\"\n\tcrashes through the porthole window\nand throws itself at the spider. They fly through a table and another cot, forming a blur of metal in the near-darkness of the cabin, but the spider might still tear free.\n\n@{used_weapon Your ${weapon} has served you well so far|You could grab your ${weapon}}, but you would need exceptional speed to strike at the spider amid the ball of steel. Though you can't reach the door, you can reach the shelves; you could tear one down and yell for help until the guards arrive. Or you could hide among the smashed furniture and hope the spider cannot see in the dark.\n*if ( has_revolver ) and ( used_revolver = false )\n\tAnd your revolver is on the floor nearby.\n*temp grip \"grip\"\n*if pet = \"wolf\"\n\t*set grip \"jaws\"\n*if pet = \"snake\"\n\t*set grip \"coils\"\n*if pet = \"hawk\"\n\t*set grip \"talons\"\n*choice\n\t#I strike quickly to destroy the Deep Tech spider with my ${weapon}.\n\t\t*if has_better_weapon\n\t\t\t*set krayl_attack -1\n\t\t*if ( finesse + fighting ) > krayl_attack\n\t\t\tYou wait for the perfect moment, then lunge with your ${weapon} just as the Deep Tech spider escapes your ${pet}'s ${grip}.\n\n\t\t\tYour ${weapon} knocks the spider into the broken table. It rises shakily.\n\t\t\t*label marine_door\n\t\t\tThen @{(job = \"marine\") ${helper}|a marine} throws your door open. Too battered to continue its attack, the spider races between his legs and disappears into a pipe.\n\n\t\t\tMidian follows the marines in, looks around your ruined cabin, and says, \"Search the whole ship for that thing.\"\n\n\t\t\t*page_break\n\n\t\t\tBut the marines find nothing. The next morning you catch the captain looking at you with a cold, suspicious expression, and realize that he sent the Deep Tech spider to kill you–as he almost certainly sent it to kill your fellow agents back at the warehouse. If you disappoint him again, he will not leave room for mistakes.\n\t\t\t*set used_revolver false\n\t\t\t*set used_weapon false\n\t\t\t*page_break\n\t\t\t*return\n\t\t*elseif ( finesse + fighting ) > ( krayl_attack - 1 )\n\t\t\tYour strike knocks the spider back, but it tears free of your ${pet}'s ${grip}, losing two legs in the process, and hurls itself at you.\n\t\t\t*if wounded\n\t\t\t\t*label try_save\n\t\t\t\tYour ${pet} tries to save you, but it is too late; one of the spider's metal claws slams through your heart.\n\t\t\t\t*choice\n\t\t\t\t\t#Try this day again.\n\t\t\t\t\t\t*load_checkpoint\n\t\t\t\t\t#Restart the game.\n\t\t\t\t\t\t*goto restart\n\t\t\t*else\n\t\t\t\t*set wounded true\n\t\t\t\t*set injury \"scratched arm\"\n\t\t\t\tYou parry, knocking aside three legs, but a fourth slashes your arm. But the spider is hurt, and you and your ${pet} force it into a corner.\n\t\t\t\t*goto marine_door\n\t\t*else\n\t\t\tYour strike misses by inches. The spider seizes the opportunity to tear free of your ${pet}'s ${grip} and hurl itself at you. Its speed is tremendous, and you never have a chance; it instantly bears you to the ground.\n\t\t\t*goto try_save\n\t*if ( has_revolver ) and ( used_revolver = false )\n\t\t#I grab my revolver and shoot the spider.\n\t\t\tYou wait until the spider and the ${pet} separate, if only for a moment, and squeeze off a single\n\t\t\t*if ( finesse + fighting ) > 2\n\t\t\t\tround that shatters one of the monster's many glass eyes. It flies back against the wall and staggers. You unload the revolver, hitting it at least once more.\n\t\t\t\t*goto marine_door\n\t\t\t*elseif ( finesse + fighting ) > 1\n\t\t\t\tround that breaks off one of the spider's arms. But it shoves your ${pet} away and hurls itself onto you, knocking you to the ground as you unload your revolver.\n\t\t\t\t*if wounded\n\t\t\t\t\t*goto try_save\n\t\t\t\t*else\n\t\t\t\t\t*set wounded true\n\t\t\t\t\t*set injury \"scratched arm\"\n\t\t\t\t\tIts claws slash your arm, but your ${pet} slams into it from behind, hurling it with stunning force into a storage trunk.\n\t\t\t\t\t*goto marine_door\n\t\t\t*else\n\t\t\t\tround. But it clips your ${pet}, not the Deep Tech spider, and the spider hurls itself onto you, knocking you to the ground as you unload your revolver.\n\t\t\t\t*goto try_save\n\t#I drag the bookshelf down, then yell for help.\n\t\t*if used_revolver\n\t\t\t*set krayl_attack -1\n\t\tYou rip a bookshelf down, spilling books over the floor, and shout. The Deep Tech spider finally escapes your ${pet}'s ${grip}. It leaps for you\n\t\t*if ( power + command ) > krayl_attack\n\t\t\tjust as you
