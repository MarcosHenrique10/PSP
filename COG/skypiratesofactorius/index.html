Quon Bexi Tech raiders, describing everything you've seen. Ryonet doesn't respond for a moment, she's so stunned by the idea of Quon Bexi soldiers aboard the airship. Finally she orders you to blend back in with the crew and await further instructions. When you head back onto the deck, the battle is over.\n\t\t\t*goto fly_4\n\t\t*else\n\t\t\thallways, looking for the radio room. But the galleon is a maze, and you find only merchant marines who want to fight to the death. As the flames spread, you're forced to retreat up the steps. When you get back onto the deck, the battle is over.\n\t\t\t*goto fly_4\n\t#I help the [i]Falling Angel[/i]'s crew take the bridge.\n\t\t*temp temp_weapon weapon\n\t\t*temp swordfight 3\n\t\tThe [i]Falling Angel[/i]'s crew has blown a hole in the bridge door, but the stairs that lead up to the bridge itself have turned into a bloodbath.\n\t\t*if injury = \"cut shoulder\"\n\t\t\tTying a scarf around your bloody shoulder, you\n\t\t*elseif injury = \"bruises\"\n\t\t\tIgnoring your bruises, you\n\t\t*else\n\t\t\tYou\n\t\t*if cockpit_item = \"revolver\"\n\t\t\tdraw your revolver. A single huge Tech raider with a boarding ax in each hand is holding the [i]Falling Angel[/i]'s crew at bay.\n\t\t\t*if ( finesse + fighting ) > 2\n\t\t\t\t*set crew +10\n\t\t\t\t*set krayl +10\n\t\t\t\tYou unload your revolver into him, and he topples down the steps. The crew surges up into the bridge, and by\n\t\t\t\t*label take_bridge\n\t\t\t\tthe time you push your way inside, they've taken it. The bridge crew is all dead.\n\t\t\t\t*goto fly_4\n\t\t\t*else\n\t\t\t\tYou unload your revolver, hitting him at least once, but he keeps fighting, and then he surges down the steps, killing as he goes!\n\t\t\t\t*if wounded\n\t\t\t\t\tYou try to get away, but @{(injury = \"bruises\") your bruises slow you down|you have lost a lot of blood}. You raise your revolver as the big guard charges you, but it's empty.\n\n\t\t\t\t\tAnd then he brings an ax down on your head.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Try that choice again.\n\t\t\t\t\t\t\t*load_checkpoint\n\t\t\t\t\t\t#Restart the game.\n\t\t\t\t\t\t\t*goto restart\n\t\t\t\t*else\n\t\t\t\t\t*set injury \"cut knuckles\"\n\t\t\t\t\t*set injury_plural true\n\t\t\t\t\t*set has_revolver false\n\t\t\t\t\t*set buyables +1\n\t\t\t\t\tWhen he reaches you, his ax smashes the revolver from your hands and cuts your knuckles. You dodge a decapitating swipe and step back, but then the big guard wobbles on his feet. He looks down at the hole you put in his chest. Then two of the [i]Falling Angel[/i]'s marines cut him down from behind. The rest swarm onto the bridge. By\n\t\t\t\t\t*goto take_bridge\n\t\t*elseif cockpit_item = \"weapon\"\n\t\t\t*set swordfight -1\n\t\t\t*if has_better_weapon\n\t\t\t\t*set swordfight -1\n\t\t\tdraw your ${weapon}. A single huge Tech raider with a boarding ax in each hand is holding the [i]Falling Angel[/i]'s crew at bay.\n\t\t\t*label duel_guard\n\t\t\t*if ( power + fighting ) > swordfight\n\t\t\t\tYou duck a headhunting swing and stab him in the guts. He falls, and you push your way onto the bridge with the [i]Angel[/i]'s crew behind you. The bridge crew accepts no quarter, fighting to the death.\n\t\t\t\t*if injury = \"bruises\"\n\t\t\t\t\tYou're gasping for breath\n\t\t\t\t*elseif injury = \"cut shoulder\"\n\t\t\t\t\tYour hurt shoulder is aching\n\t\t\t\t*else\n\t\t\t\t\tYou're covered in blood\n\t\t\t\tby the time the last officer falls, transfixed by your blade.\n\t\t\t\t*goto fly_4\n\t\t\t*else\n\t\t\t\tYou rush into the fray, but the guard's strength is incredible.\n\t\t\t\t*if wounded\n\t\t\t\t\tAlready @{(injury = \"bruises\") bruised|bleeding}, you are no match for his ferocity. He strikes the ${temp_weapon} from your hand with one ax, then brings the other down on your head.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Try that choice again.\n\t\t\t\t\t\t\t*load_checkpoint\n\t\t\t\t\t\t#Restart the game.\n\t\t\t\t\t\t\t*goto restart\n\t\t\t\t*else\n\t\t\t\t\t*set wounded true\n\t\t\t\t\t*set injury \"cut knuckles\"\n\t\t\t\t\t*set injury_plural true\n\t\t\t\t\tYou duck a decapitating swing and slash him across the knee. He retaliates with a blow that cuts your knuckles and strikes your ${temp_weapon} from your hands. But he's hurt, and the [i]Falling Angel[/i]'s crew swarms over him, chopping and slicing. They surge up into the bridge, and by the time you push your way inside, they've taken it. The bridge crew is all dead.\n\t\t\t\t\t*goto fly_4\n\t\t*else\n\t\t\tretrieve a dead crew member's cutlass.\n\t\t\t*if cockpit_item = \"pet\"\n\t\t\t\t*if pet = \"wolf\"\n\t\t\t\t\tYour silver wolf springs upon a merchant marine and tears into him\n\t\t\t\t*if pet = \"monkey\"\n\t\t\t\t\tYour iron monkey hurls itself into the face of a merchant marine\n\t\t\t\t*if pet = \"hawk\"\n\t\t\t\t\tYour golden hawk plunges down on a merchant marine's face, going for his eyes,\n\t\t\t\t*if pet = \"snake\"\n\t\t\t\t\tYour cobalt snake springs and coils around a merchant marine\n\t\t\t\tas you\n\t\t\t*else\n\t\t\t\tYou\n\t\t\tapproach the steps to the bridge, where a single huge guard with a boarding ax in each hand is holding the [i]Falling Angel[/i]'s crew at bay.\n\t\t\t*goto duel_guard\n\t#I sneak after Captain Krayl.\n\t\t*set crew -10\n\t\tYou @{(cockpit_item = \"pet\") and your ${pet}|} dodge brawling marines and run down the stairs after the captain. The lightning-scorched corpses make him easy to follow. You hear him shouting, \"There! Pick it up!\"\n\n\t\t*if ( finesse + espionage ) > 2\n\t\t\t*set ryonet +10\n\t\t\t*set saw_tech_box true\n\t\t\tYou peek around the corner and spot two @{(job = \"marine\") of your|} marines ignoring heaps of silk to lift a wooden crate.\n\t\t\t*if cockpit_item = \"pet\"\n\t\t\t\t*if pet = \"monkey\"\n\t\t\t\t\tYour monkey clings to your @{(injury = \"cut shoulder\") uninjured|} shoulder and chatters,\n\t\t\t\t*if pet = \"wolf\"\n\t\t\t\t\tYour wolf growls, showing silvery teeth,\n\t\t\t\t*if pet = \"snake\"\n\t\t\t\t\tYour snake coils around your leg and hisses,\n\t\t\t\t*if pet = \"hawk\"\n\t\t\t\t\tYour hawk clings to your @{(injury = \"cut shoulder\") uninjured|} shoulder and hisses,\n\t\t\t\tand you know why:\n\t\t\t*else\n\t\t\t\tYou know from the way it shifts around what's in it:\n\t\t\tthat box is full of Deep Tech, and not just fragments of machinery. There might be a whole living jungle in there.\n\n\t\t\tLieutenant Ryonet will want to hear about this, but as fires spread belowdecks, you run back upstairs before you're trapped. When you reach the main deck, the fighting is over.\n\t\t\t*goto fly_4\n\t\t*else\n\t\t\t*set krayl -10\n\t\t\tBut before you can spy on the captain, he comes around the corner and almost collides with you. Then he almost cuts your head off, but his sizzling broadsword stops an inch from your neck.\n\n\t\t\t\"Dammit, you should be trying to take the bridge!\" he snaps. Then he grabs your collar and hurls you down the hallway. When you get back upstairs, the fighting is over.\n\t\t\t*goto fly_4\n\n*label fly_4\n\n*page_break\n\nMost of the galleon's crew is dead, as are all the masked guards, since it seems that even sky pirates fear Quon Bexi Tech raiders. As Captain Krayl reaches the deck, an explosion rips through the galleon and throws him to the ground. @{saw_tech_box The chest full of Deep Tech vanishes in a ball of flame along with|A heavy wooden chest behind Krayl vanishes in a ball of flame, and so do} the two marines carrying it. For a moment the captain only stares in stunned horror at the loss of whatever was in the chest.\n\nThe crew drags the last merchants before Captain Krayl.\n\n\"Why?\" Krayl shouts into the senior merchant's face. When he receives no answer, Krayl shoves his electrified broadsword through the merchant's heart, then turns to the others as the flames spread.\n\n$!{helper} grabs your arm and says, \"Stop him! We're here for silk and gold, not blood and secrets!\"\n\n*temp galleon_crew_alive false\n*fake_choice\n\t#\"Captain, stop! Spare them.\"\n\t\t*set crew +10\n\t\t*set krayl -10\n\t\t*set galleon_crew_alive true\n\t\tYou step forward as Krayl raises his sword. You don't speak, but Krayl sees you. After a moment he shouts, \"Grab everything you can. Get these swine on the [i]Falling Angel[/i].\"\n\t#I remain silent.\n\t\t*set krayl +10\n\t\t*set crew -10\n\t\tCaptain Krayl tears into the merchants like a man possessed. The horrified crew run for the safety of the [i]Falling Angel[/i], grabbing what loot they can.\n\nYou are one of the last to evacuate, barely escaping before the [i]Angel[/i]'s crew cuts the galleon free. It explodes over the ocean.\n\n*page_break\n\n*set cloudy_alive false\n\nAn hour later, First Mate Midian joins you on the deck and says, \"Krayl just threw Cloudy over the railing for being drunk again. You're our new pilot, once we replace your J-20.\"\n\nFor a moment neither of you say anything as the [i]Angel[/i] climbs above the clouds. Then she says, \"Those merchants did everything they could to keep that chest away from the captain. Do you know what he was after?\"\n\n*fake_choice\n\t#\"Yes.\"\n\t\t\"Then keep it to yourself for now,\" Midian says. \"And be\n\t#\"No idea.\"\n\t\tMidian nods and says, \"Be\ncareful. I don't trust half the new crew, and I don't even trust the captain anymore. He's obsessed. I think he wants revenge for what the AAG did to his wife. Or…maybe that's too simple. He has a brain like a jigsaw. Be careful around @{galleon_crew_alive him. He won't forget the way you stood up to him on the deck of that galleon|him, or you'll end up like the crew of that galleon}.\"\n\n*if wounded and ( wealth >= 100 )\n\t*set after_battle true\n\t*gosub infirmary\n\t*set after_battle false\n\n*page_break\n*gosub trial_end\n\n*check_purchase adfree\n*if not(choice_prerelease or choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Sky Pirates of Actorius[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2020-01-30 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label delay_purchased\n\n*comment *text_image the_deep_tech.png center THE DEEP TECH\nCHAPTER 3: THE DEEP TECH\n*set ground \"Actorian wastelands\"\n\nSay one thing for Captain Krayl: he is fearless. To make repairs, the [i]Falling Angel[/i] runs up a false flag and docks right on Combine Spire, in the middle of Actorius. But Krayl chose this dock wisely; @{galleon_crew_alive he can promise to let the galleon's surviving crew off when the [i]Angel[/i] leaves, and|} most of his pirates cannot mutiny without risking immediate identification and arrest.\n*if ( wealth >= 100 ) and ( buyables > 0 )\n\tWhile Midian tracks down a new J-20 @{has_aero_upgrade and upgrade kit|}, you have time to shop for\n\t*if has_better_weapon and has_revolver\n\t\ttechnical upgrades.\n\t*elseif has_better_weapon or has_revolver\n\t\tweapons and technical upgrades.\n\t*else\n\t\tweapons.\n\tAnd unlike at [i]Big Squid[/i], no one should worry about you wandering around. Do you explore the shops?\n\t*choice\n\t\t#Yes, I want to see what Combine Spire has to offer.\n\t\t\t*set squid_shop false\n\t\t\t*gosub shop\n\t\t\t*page_break\n\t\t\t*goto raid\n\t\t#No, I stay put.\n\t\t\t*goto raid\n\n*label raid\n\nThat night you slip into the radio room with your ${pet}.\n\n\"Agent ${a1}${a2}${a3}${a4},\" Lieutenant Ryonet says, \"we have cross-referenced your @{saw_tech_box detailed information on|sighting of} the Deep Tech on the galleon with @{spider_known the Deep Tech spider and|}\n*if clue_1 = \"animal\"\n\tyour contention that our agents were attacked by some kind of Deep Tech predator,\n*elseif clue_1 = \"voice\"\n\tyour description of a mechanical voice in Krayl's cabin,\n*elseif clue_1 = \"records\"\n\tyour notes on the Deep Tech salvage Captain Krayl has acquired,\n*else\n\trecords in our database,\nand we think we understand Krayl's plan—he is looking for a Deep Tech artifact the Combines have code-named the [i]Radiant Egg[/i]. We think he plans to revenge himself on Actorius for the death of his wife, Zindi, the original captain of the [i]Falling Angel[/i]. Remain as a member of his crew and signal the AAG when he is close to the Radiant Egg, at which point we will capture the [i]Falling Angel[/i] and claim the artifact. Ryonet out.\"\n\n*page_break\n\nThe [i]Falling Angel[/i] launches, though it retains its cover identity and false flag. Captain Krayl must know the AAG is hunting him, but he remains close to Actorius as if looking for something. The crew is growing restless.\n\n*set day 50\n\n*page_break\n\nDay 50: Captain Krayl has not left his quarters in days. Strange machine noises emanate from within.\n*gosub dec_sorter\n\n*page_break\n\n*set day day_52_55\n\nDay ${day}: @{(job = \"engineer\") You oversee|First Mate Midian oversees} the installation of electrical junction boxes throughout the ship. The power regulators are necessary for whatever Krayl is doing in his cabin. The lights keep flickering even after the power regulators are installed. Pirates are a superstitious and cowardly lot, and they mutter about omens whenever the power fluctuates.\n\n*gosub dec_sorter\n\n*page_break\n\n*set day day_56_58\n\nDay ${day}: a disconsolate crew shouts with joy when the lookout spots an Actorian merchant caravel. You and Midian launch, but the captain does not appear, leaving @{(job = \"officer\") Scar|Scar, the second mate,} to command the ship. The caravel surrenders when Midian shoots out their main gun.\n\nIt's quite a haul, despite its meager size, with a hold full of military-grade industrial tools. The crew celebrates, but you feel their loyalties shifting away from Krayl, toward @{(crew \u003c 50) |you and} Midian. Your share comes to\n*if share = 1\n\t*set wealth +200\n\t200\n*else\n\t*set wealth +300\n\t300\ncapons.\n*if wounded and ( wealth >= 100 )\n\t*gosub infirmary\n\n*gosub dec_sorter\n\n*page_break\n\n*set day day_59_62\n\nDay ${day}: you overhear ${helper} openly plotting with First Mate Midian to deal with those crew members still loyal to Captain Krayl. But they cannot agree on a timeline of action. Lieutenant Ryonet is silent that night.\n\n*gosub dec_sorter\n\n*page_break\n\n*set day day_64_70\n\nDay ${day}: Captain Krayl appears on the bridge in the middle of the night, while you are sleeping, and orders a sudden course change. The [i]Falling Angel[/i] is heading back to Actorius.\n\n*gosub dec_sorter\n\n*if extra_days_2 > 0\n\t*page_break\n\t*set day day_71_73\n\t*set day_declare true\n\t*gosub dec_sorter\n\n*if extra_days_2 = 2\n\t*page_break\n\t*set day day_75_76\n\t*set day_declare true\n\t*gosub dec_sorter\n\n*if wounded and ( wealth >= 100 )\n\t*gosub infirmary\n\n*page_break\n\nDay 80: Lieutenant Ryonet has been silent for days. Captain Krayl orders the J-20s' tailguns replaced with grapple cannons and runs you and Midian through drills. Perhaps he is planning a boarding operation. The [i]Falling Angel[/i] dodges Actorian patrols until one night you are within sight of the city.\n\nThe captain lurches onto the main deck and says, \"Midian, prepare to launch aeros.\"\n\nFirst Mate Midian does not move. Instead she just glares. Captain Krayl hates being questioned, but the crew wants answers.\n*temp plan_known false\n*choice\n\t#\"Captain, the crew wants to know what your plan is.\"\n\t\t*set crew +10\n\t\t*set krayl -10\n\t\t*set plan_known true\n\t\tYou've seen this crew charge merchant marine gun emplacements and Quon Bexi Tech raiders, but they slink back as you step forward and speak.\n\n\t\tKrayl turns to his personal guards and says, \"Bring the three of them inside.\" The guards surround you, Midian, and ${helper} and hustle you into the captain's office. It's dark inside, with various strangely shaped objects covered in luxurious curtains. A projector shows maps of the Deep Tech beneath Actorius with a red X marking a large, deep cavern.\n\n\t\t\"I've worked for years and finally located a fortune in Deep Tech not even the Combines know about,\" the captain says. \"This is our main target—the Radiant Egg. It's the treasure Actorius and Quon Bex have dreamed about since we discovered the Deep Tech, an interface between machine and organic life. Your job will be to widen this cavern entrance enough that the [i]Falling Angel[/i] can retrieve the Egg. We get it aboard, and everyone on this ship can buy their own city. Now get to work.\"\n\t#I stay silent.\n\t\t*set krayl +10\n\t\t*set crew -10\n\t\tThe crew backs down.\n\n\t\t\"Get to the hangar,\" Krayl tells you. \"Your sealed orders are waiting for you.\"\n\n*page_break\n\nAs the mechanics check the grappling cannon on your J-20, you have time to contact Ryonet one final time. Do you?\n*choice\n\t#Yes.\n\t\t*set ryonet +10\n\t\t*set krayl -10\n\t\tYou run for the radio room and activate your ${pet}. Though you describe what you've learned, only static greets you.\n\t#No.\n\t\t*set krayl +10\n\t\t*set ryonet -10\n\t\tYou stay where you are rather than risk exposure. The AAG must have seen the pirate ship's approach.\n\n*page_break\n\nYou're flying heavy, with ${helper}, your ${pet}, a mechanic, and your usual equipment, but you have a bit of space left over.\n*temp has_rifle false\n*temp has_flashlight false\n*temp has_medical_kit false\n*choice\n\t#I stow a rifle.\n\t\t*set has_rifle true\n\t\tYou throw the Virello bolt-action in beside your ${weapon}, wondering if you'll need it, and\n\t#I make sure we have a flashlight.\n\t\t*set has_flashlight true\n\t\tYou throw the heavy flashlight in beside your ${weapon}, confident you'll need it, and\n\t#I bring a medical kit.\n\t\t*set has_medical_kit true\n\t\tYou throw the tin case in beside your ${weapon}, hoping you won't need it, and\nlaunch into blinding midday sunlight.\n\nThen you level out and open your sealed flight plan. @{plan_known As the captain said, you|You} and Midian will enter a previously unknown cave of Deep Tech wilderness and use grapples to clear the way for the [i]Falling Angel[/i].\n*if plan_known = false\n\tHe doesn't describe the object of this mission in detail, but from what you've already learned, it's clear that Krayl has uncovered the location of the Radiant Egg.\n\nYou follow the flight plan to the cave entrance. The entrance is barely wide enough for the [i]Angel[/i], and right now the airship would never fit. You're only a few miles from Actorius, but it doesn't look like the Combines have been here before; it looks like vines—organic ones, green and pulpy—used to cover the entrance, and they've only recently been cut away.\n\nAs you dodge around an organic vine and enter the cave itself, Midian turns on her J-20's floodlight. Deep Tech spreads all around you, a forest of metal trees stalked by animals with shining glass eyes. Your ${pet} ${pet_noise} in excitement as you and Midian circle back to the huge coppery vines that prevent an airship from entering. You'll have to get them out of the way.\n\n*page_break\n\nMidian's tailgunner's grapple is on target, but the hook does not catch. And as you peer past the screen of organic vines to the sky outside, you realize the [i]Falling Angel[/i] is coming, heedless of the danger!\n\n$!{helper} takes aim and says, \"I can make the shot, but I'm not sure the hook will stay. Krayl, you madman, slow down!\"\n\nYou could just hold on tight and make sure the hook stays in place.\n*if pet != \"wolf\"\n\tOr your ${pet} could\n\t*if pet = \"hawk\"\n\t\tfly after\n\t*if pet = \"snake\"\n\t\tslither along\n\t*if pet = \"monkey\"\n\t\tclamber along\n\tthe rope and secure it.\nYou could also shoot the grapple yourself, if you think you're accurate enough.\n*if has_flashlight\n\tFinally, you could aim your flashlight at the vines to help ${helper}.\n*temp pet_used false\n*choice\n\t#I order ${helper} to shoot and hold onto the controls with all my strength.\n\t\t$!{helper} shoots, and you cling to the control stick. The hook\n\t\t*if ( power + command ) > 2\n\t\t\t*set crew +10\n\t\t\tcatches, and your hands are nearly wrenched off the stick, but you hold on.\n\t\t\t*gosub shoots\n\t\t\t*label all_killed\n\n\t\t\t\"The captain is going to get us all killed,\" ${helper} says.\n\t\t\t*goto aag_attack\n\t\t*else\n\t\t\t*set crew -10\n\t\t\tcatches, and your aero is dragged to a halt with such force that you lose your grip! You get your hands back on the controls, but the hook only snagged some of the vines.\n\t\t\t*gosub lose_post\n\t\t\t*goto all_killed\n\t*if pet != \"wolf\"\n\t\t#I order ${pet} across.\n\t\t\t*set pet_used true\n\t\t\t$!{helper} shoots the grappling hook, and your ${pet} @{(pet = \"hawk\") follows|follows along the rope}.\n\t\t\t*if ( intellect + engineering ) > 2\n\t\t\t\t*set crew +10\n\t\t\t\tYour ${pet} must have done it, because when you bank, the hook catches!\n\t\t\t\t*gosub shoots\n\t\t\t\t*gosub pet_drain\n\t\t\t\t*goto aag_attack\n\t\t\t*else\n\t\t\t\t*set crew -10\n\t\t\t\tBut the Deep Tech creature is not fast enough, and when you bank, the grapple only gets some of the vines!\n\t\t\t\t*gosub lose_post\n\t\t\t\t*gosub pet_drain\n\t\t\t\t*goto aag_attack\n\t#I'll take aim and shoot the grapple myself.\n\t\tYou order ${helper} and the mechanic to hold the controls steady and aim the grappling hook yourself. The hook arcs through the air and lands, and you shout for ${helper} to bank. $!{helper_he_she}\n\t\t*if ( finesse + fighting ) > 2\n\t\t\t*set crew +10\n\t\t\tturns, and the grapple catches!\n\t\t\t*gosub shoots\n\n\t\t\tYou and ${helper} return to your normal places.\n\t\t\t*goto aag_attack\n\t\t*else\n\t\t\t*set crew -10\n\t\t\tturns, but the hook only catches some of the vines!\n\t\t\t*gosub lose_post\n\t\t\t*goto aag_attack\n\t*if has_flashlight\n\t\t#I use the flashlight to give ${helper} something to aim for.\n\t\t\tYour J-20 doesn't have an external floodlight like Midian's, but you tell the mechanic where to aim the bulky flashlight.\n\t\t\t*if ( intellect + espionage ) > 1\n\t\t\t\t*set crew +10\n\t\t\t\t\"I see it, perfect!\" ${helper} says. $!{helper_he_she} shoots the grapple. You bank your aero, and the hook catches!\n\t\t\t\t*gosub shoots\n\t\t\t\t*gosub burnout\n\t\t\t\t*goto aag_attack\n\t\t\t*else\n\t\t\t\t*set crew -10\n\t\t\t\t$!{helper} shoots the grapple. You bank your aero, but the hook only catches some of the vines.\n\t\t\t\t*gosub lose_post\n\t\t\t\t*gosub burnout\n\t\t\t\t*goto aag_attack\n\n*label shoots\nThe [i]Falling Angel[/i] shoots into the enormous cavern just as your little aero lifts the coppery vines out of the way.\n*return\n\n*label lose_post\nThe [i]Falling Angel[/i] loses its forward lookout post and whoever was in it, but the airship makes it into the cavern.\n*return\n\n*label pet_drain\nYour pet returns, having barely eluded falling vines.\n*if has_motivator\n\t*set has_motivator false\n\tYou notice that its motivator has burned out.\n*else\n\t*set pet_used true\n\tIt looks exhausted. The proximity to the Deep Tech is making it increasingly difficult to control.\n*return\n\n*label burnout\n*set has_flashlight false\n\nIt looks like your flashlight has burned out.\n*return\n\n*label aag_attack\n\n*page_break\n*set_checkpoint\n\nDistracted by entering the cavern, the [i]Falling Angel[/i] does not notice the six AAG aeros before they open fire. Ryonet is up front in a heavy bomber. Her rocket bombs obliterate the [i]Falling Angel[/i]'s hangar and ignite its lower decks. Two AAG triplanes guard the bombers, while two more break off to attack you and Midian.\n\nIt's increasingly clear that you can't blur your loyalties for much longer.\n\nIf you're quick enough, you could elude the triplanes and attack that second bomber. Or you could hang back, though the [i]Falling Angel[/i] will suffer. Finally, you could rush right into the dogfight and hope you're smart enough to dodge all the fire–that would convince both sides of your loyalty.\n\n*temp attacker \"Ryonet\"\n\n*choice\n\t#Sorry, Ryonet. I attack the AAG bomber.\n\t\t*set ryonet -30\n\t\tYou dodge tailgun fire and blaze away at Ryonet's wingman. He climbs so he's between you and the [i]Falling Angel[/i],\n\t\t*if finesse > 2\n\t\t\t*set krayl +10\n\t\t\t*set crew +10\n\t\t\thoping you won't risk hitting your ship. Your bullets rip his engine to shreds. He falls out of the sky and explodes against the wall of the cavern. Ryonet tries to get behind you, but a spray from ${helper}'s tailgun makes her back off.\n\n\t\t\tMidian downs one of the triplanes, and the AAG aeros flee.\n\t\t\t*goto test_choice\n\t\t*else\n\t\t\tand you try to line up a clean shot. You hear ${helper}'s shout too late as Ryonet closes in from behind you. She opens fire, and the bullets\n\t\t\t*label rip\n\t\t\trip through your canopy,\n\t\t\t*if wounded\n\t\t\t\tthrough ${helper}, and into you. The last thing you see is the wall of the cavern rushing up to meet you.\n\t\t\t\t*choice\n\t\t\t\t\t#Try that choice again.\n\t\t\t\t\t\t*load_checkpoint\n\t\t\t\t\t#Restart the game.\n\t\t\t\t\t\t*goto restart\n\t\t\t*else\n\t\t\t\t*set wounded true\n\t\t\t\t*set injury \"cut hand\"\n\t\t\t\tbut you bank hard and avoid getting torn to pieces. $!{attacker} chases you until Midian gets in range, and the [i]Falling Angel[/i] opens fire, then the AAG aeros flee. A fragment of glass has cut your hand. You remove the glass and wrap your hand in your scarf.\n\t\t\t\t*goto test_choice\n\t#I just fall back—I don't want to get involved.\n\t\t*set crew -20\n\t\t*set krayl -10\n\t\t*set ryonet +10\n\t\tYou stay out of range as the AAG hammers the [i]Falling Angel[/i]. If anyone asks, you can claim technical problems. You do fly a J-20, after all—it's basically a barrel wrapped in bailing twine with a lawnmower engine.\n\n\t\tRyonet's bomber strafes the airship one final time before Midian gets in range. Afraid Midian will drive them into sight of the [i]Angel[/i]'s antiaircraft guns, the AAG aeros flee the cavern.\n\t\t*goto test_choice\n\t#I dive right into the middle of the shooting and dodge the cannon fire, paying attention so I don't get hit while convincing everyone I'm here to help.\n\t\tYou plunge into the middle of the dogfight. Dodging aeros and the [i]Falling Angel[/i]'s erratic fire, you\n\t\t*if intellect > 2\n\t\t\t*set krayl +10\n\t\t\t*set ryonet +10\n\t\t\tgive everyone a good show. When Ryonet's wingman explodes in a ball of flame, the AAG aeros flee the cavern.\n\t\t\t*goto test_choice\n\t\t*else\n\t\t\ttry to give everyone a good show. But you cannot track so many fast-moving lines of fire, and as you bank to avoid one of the [i]Falling Angel[/i]'s cannons, one of the triplanes gets behind you. Its machine guns\n\t\t\t*set attacker \"the Guardian triplane\"\n\t\t\t*goto rip\n\n*label test_choice\n\n*page_break\n\nTen minutes later, the [i]Falling Angel[/i] lands in a clearing surrounded by Deep Tech jungle. Since Ryonet obliterated the hangar, you set your aero down nearby. Midian and her crew are already out of their J-20. The first mate shouts to Captain Krayl, back on the [i]Angel[/i].\n\n\"The AAG will be back with a whole fleet in less than a day,\" she says. \"We need to get that treasure and get out.\"\n\nKrayl points at a distant green light and says, \"There it is. The Radiant Egg. It's worth a hundred fortunes. Get there and secure it. I'll find an air route through the copper vines and get the [i]Angel[/i] as close as I can.\"\n\n\"Understood, Captain,\" Midian says, but ${helper} and the others look furious. If they could, they would ask you what you plan to do with Krayl, when this is all over.\n\nAnd, as you organize your equipment, you ask yourself what you plan to do.\n*fake_choice\n\t#He's a pirate, and I'm going to arrest him.\n\t\t*if ryonet > 70\n\t\t\tArresting or killing Captain Krayl would make your career.\n\t\t*elseif ryonet > 50\n\t\t\tArresting or killing Captain Krayl would earn you a position of respect and authority within the Actorian Air Guard.\n\t\t*elseif ryonet > 20\n\t\t\tAt this point the Actorian Air Guard is dissatisfied with your performance, but arresting or killing Captain Krayl might let you keep your job.\n\t\t*else\n\t\t\tAt this point the Actorian Air Guard is so suspicious of your motivations that even if you arrested or killed Captain Krayl, they might still get rid of you.\n\t#He's obsessed, but he really might make us all rich. He still has my loyalty.\n\t\t*if krayl > 70\n\t\t\tCaptain Krayl trusts and respects you, and if you manage to save him from both Actorius and his crew, you will command his loyalty forever.\n\t\t*elseif krayl > 50\n\t\t\tCaptain Krayl trusts you, and if you manage to save him from both Actorius and his crew, you will have earned a true ally.\n\t\t*elseif krayl > 20\n\t\t\tCaptain Krayl does not entirely trust you, but saving him from both Actorius and his increasingly angry crew might at least earn you passage off his ship.\n\t\t*else\n\t\t\tCaptain Krayl does not like or trust you. Even if you manage to save his life, he might still kill you.\n\t#I'm going to steal his ship, obviously, and become a pirate captain myself.\n\t\tThe crew has come to hate Captain Krayl, and unless this Radiant Egg really is the treasure he claims, they will soon turn against him.\n\t\t*temp effective_wealth wealth\n\t\t*if crew > 70\n\t\t\tYou have earned their love and respect,\n\t\t\t*label wealth_notion\n\t\t\t*if effective_wealth > 400\n\t\t\t\tand you are so wealthy that you should be able to finance the [i]Falling Angel[/i] and perhaps even a fleet of ships. [i]Commodore ${name}[/i] has a nice ring to it.\n\t\t\t*elseif effective_wealth > 300\n\t\t\t\tand you are wealthy enough that you can maintain the [i]Falling Angel[/i]. [i]Commodore ${name}[/i] has a nice ring to it.\n\t\t\t*elseif effective_wealth > 200\n\t\t\t\tthough given your limited personal wealth, it may be difficult to maintain the [i]Falling Angel[/i]. Still, [i]Commodore ${name}[/i] has a nice ring to it.\n\t\t\t*else\n\t\t\t\tthough your lack of personal wealth means you may not be able to maintain the [i]Falling Angel[/i].\n\t\t*elseif crew > 50\n\t\t\t*set effective_wealth -100\n\t\t\tYou have earned the crew's respect. They might accept you as captain,\n\t\t\t*goto wealth_notion\n\t\t*elseif crew > 20\n\t\t\tUnfortunately, the crew does not trust you either.\n\t\t*else\n\t\t\tUnfortunately, the crew does not trust you. They would probably kill you if given a chance.\n\n*label explore\n*temp explore 2\n*temp pet_hurt false\n*temp copilot_alive true\n*temp mechanic_alive true\n*if wounded and has_medical_kit\n\t*set wounded false\n\t*set has_medical_kit false\n\n\tYou use your medical kit to attend to your ${injury}. Without time to heal, you're forced to rely on painkillers, but you soon feel better.\n\n\t*set injury_plural false\n\t*set injury \"undetermined\"\n\nOnce your equipment is organized, you take stock of your team. It consists of ${helper}, two mechanics, Midian, and Midian's copilot. You have swords and small arms, maps, rations, water,\n*if has_rifle\n\texplosives, and your Virello rifle.\n*if has_medical_kit\n\texplosives, and the medical kit.\n*if has_flashlight\n\texplosives, and your heavy portable flashlight.\n*else\n\tand explosives.\n\nBetween your team and the Radiant Egg: miles of metal jungle.\n\n*page_break\n\n\"Let's move,\" Midian says. \"The cave mouth faces west, so we're going to get a few hours of light once the sun starts to set, but I want to be somewhere safe when darkness falls. The machines here make ${name}'s ${metal} ${pet} look like a pet bunny.\"\n\nYou consider what to rely on. You have @{has_flashlight maps and a flashlight to read them by. You can use them to|maps, which will let you} navigate this savage landscape.\nYou also\n*temp guns \"undetermined\"\n*if has_rifle and has_revolver\n\t*set guns \"guns\"\n\tcome well armed with rifle, revolver, and ${weapon},\n*elseif ( has_rifle ) and ( has_revolver = false )\n\t*set guns \"rifle\"\n\thave a rifle and your ${weapon},\n*elseif ( has_rifle = false ) and ( has_revolver )\n\t*set guns \"revolver\"\n\thave your revolver and ${weapon},\n*else\n\thave your ${weapon},\nwhich you can use to guard your companions. Or you could rely on your @{pet_used ${pet}, though the creature is hard to control here in the heart of the Deep Tech|${pet}}.\n\n*label explore_choice\n*choice\n\t#I use the map @{has_flashlight and flashlight|} to help Midian navigate the jungle.\n\t\t*if has_flashlight\n\t\t\t*set explore -1\n\t\tThe others stick close to you, armed with sabers and rifles, as you use the map to navigate this alien realm.\n\t\t*if ( intellect + espionage ) > explore\n\t\t\t*set crew +10\n\t\t\tNotes scrawled on the map reveal known hunting grounds, so you're in a good, defensible position on top of an iron hill when the hunting pack appears.\n\t\t\t*gosub dogs\n\n\t\t\tBut when Midian cuts one down with her saber and\n\t\t\t*if ( pet_used )\n\t\t\t\t${helper} shoots another,\n\t\t\t*else\n\t\t\t\tyour ${pet}\n\t\t\t\t*if pet = \"monkey\"\n\t\t\t\t\tjumps on another and plays its head like bongos,\n\t\t\t\t*if pet = \"wolf\"\n\t\t\t\t\trips the throat out of another so coppery green fluid spills across the iron ground,\n\t\t\t\t*if pet = \"hawk\"\n\t\t\t\t\tdives on one and rips out its green-glass eyes,\n\t\t\t\t*if pet = \"snake\"\n\t\t\t\t\tcoils around one until you hear the crunch of broken metal,\n\t\t\tthe rest flee.\n\t\t\t*goto radiance\n\t\t*else\n\t\t\t*set crew -10\n\t\t\t*set copilot_alive false\n\t\t\tBut the Deep Tech is constantly changing, and you look up when Midian's copilot screams. She goes down under a wave of mechanical beasts—swift, deadly predators like wild dogs made of copper.\n\t\t\t*if wounded\n\t\t\t\tYou turn to run, but your wounds ache, and the Deep Tech monsters bring you down.\n\t\t\t\t*label copper\n\t\t\t\tThe last thing you see is coppery green jaws closing around your head.\n\t\t\t\t*choice\n\t\t\t\t\t#Try this day again.\n\t\t\t\t\t\t*load_checkpoint\n\t\t\t\t\t#Restart the game.\n\t\t\t\t\t\t*goto restart\n\t\t\t*else\n\t\t\t\t*set wounded true\n\t\t\t\t*set injury \"scratched back\"\n\t\t\t\tOne hits you from behind and knocks you to the ground, scratching your back. But your ${pet} shoves it off you, giving you time to draw your ${weapon}. For several horrible seconds you only see blood and metal as you fight the monsters off.\n\t\t\t\t*label dogs_flee\n\t\t\t\tWhen the copper dogs flee, they drag their dead with them, leaving trails of green liquid metal.\n\t\t\t\t*gosub copilot\n\t\t\t\t*goto radiance\n\t*if has_rifle or has_revolver\n\t\t#I get the ${guns} ready for trouble.\n\t\t\tYou hang back, covering your allies while Midian uses the map to navigate this alien realm. So you're the first to spot the hunting pack.\n\t\t\t*gosub dogs\n\t\t\tYou unload your @{has_rifle rifle|revolver} into the first wave,\n\t\t\t*if ( finesse + fighting ) > 1\n\t\t\t\t*set crew +10\n\t\t\t\t*set used_rifle true\n\t\t\t\tblowing them into fragments. Then the rest of the crew opens fire, and soon the copper dogs are in full retreat.\n\t\t\t\t*if has_rifle\n\t\t\t\t\tYou're all safe, but it looks like everyone had too much fun: you're out of rifle ammunition.\n\t\t\t\t\t*if has_revolver\n\t\t\t\t\t\tAt least you still have your revolver.\n\t\t\t\t*else\n\t\t\t\t\t*set used_revolver true\n\t\t\t\t\tThat's it for your revolver's ammunition, but it kept you alive.\n\t\t\t\t*goto radiance\n\t\t\t*else\n\t\t\t\t*set crew -10\n\t\t\t\t*set copilot_alive false\n\t\t\t\tbut only manage to down one, and then they're on you.\n\n\t\t\t\t*if wounded\n\t\t\t\t\t*if has_rifle and has_revolver\n\t\t\t\t\t\t*set has_rifle false\n\t\t\t\t\t\t*set used_revolver true\n\t\t\t\t\t\tCoppery jaws snap your rifle in half, but you draw your revolver and shoot the metal beast. Midian and your ${pet} rush into the midst of the copper dogs, and the crew's gunfire at last forces them to retreat.\n\t\t\t\t\t\t*goto radiance\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe monster bites @{has_rifle your rifle in half|through your revolver}, then seeks your throat.\n\t\t\t\t\t\t*goto copper\n\t\t\t\t*else\n\t\t\t\t\t*set crew -10\n\t\t\t\t\t*set wounded true\n\t\t\t\t\t*set injury \"scratched back\"\n\t\t\t\t\tThe monster bites\n\t\t\t\t\t*if has_rifle\n\t\t\t\t\t\t*set has_rifle false\n\t\t\t\t\t\tyour rifle in half\n\t\t\t\t\t*if has_revolver\n\t\t\t\t\t\t*set has_revolver false\n\t\t\t\t\t\tthrough your revolver.\n\t\t\t\t\tYou try to crawl away, but it scratches your back until your ${pet} slams into it. Though wounded, you crawl away as Midian cuts the copper dog in half with her saber. Then the rest of the crew opens fire, and soon the Deep Tech beasts are in full retreat.\n\t\t\t\t\t*goto dogs_flee\n\t#I make sure my ${weapon} is ready.\n\t\t*set used_weapon true\n\t\t*if has_better_weapon\n\t\t\t*set explore -1\n\t\tYou take point with ${weapon} drawn while Midian uses the map to navigate this alien realm. So you're right up front when the hunting pack appears.\n\t\t*gosub dogs\n\t\t*if ( power + fighting ) > explore\n\t\t\t*set crew +10\n\t\t\tThe first one to reach you flies over your head when ${helper} shoots it, your ${pet} slams into the next, and then you cut into the rest of them, shearing through copper flesh with your blade.\n\t\t\t*label crew_fire\n\t\t\tThe hunting pack flees when the rest of the crew opens fire, leaving mechanical corpses all around you.\n\t\t\t*if copilot_alive = false\n\t\t\t\t*gosub copilot\n\n\t\t\tThe metal beasts' copper bodies @{copilot_alive |also} did a number on your ${weapon}; it has a notch halfway down the blade.\n\t\t\t*goto radiance\n\t\t*else\n\t\t\t*set crew -10\n\t\t\t*set copilot_alive false\n\t\t\tYour allies kill several, but one bares down on you fangs first. Your ${weapon} clangs ineffectually off its carapace, and it knocks you to the ground.\n\t\t\t*if wounded\n\t\t\t\t*goto copper\n\t\t\t*else\n\t\t\t\t*set wounded true\n\t\t\t\t*set injury \"scratched back\"\n\t\t\t\tIt scratches your back and tries to tear out your throat, but your ${pet} forces it off you. You drive your ${weapon} into the glass eyes of the next one and down into the metal mouth of a third.\n\t\t\t\t*goto crew_fire\n\t#I coordinate with my ${pet} to watch for danger.\n\t\t*if has_motivator\n\t\t\t*set explore -1\n\t\t*else\n\t\t\t*set pet_used true\n\t\tYour ${pet}\n\t\t*if pet = \"wolf\"\n\t\t\t*set explore -1\n\t\t\tlopes into the metal woods, a ghostly shadow.\n\t\t*if pet = \"hawk\"\n\t\t\ttakes to the skies, soaring on thermals close to the cavern's metallic walls.\n\t\t*if pet = \"monkey\"\n\t\t\ttakes to the metal trees, brachiating and hooting.\n\t\t*if pet = \"snake\"\n\t\t\tvanishes into the rust-iron underbrush with barely a sound.\n\t\t*if ( intellect + engineering ) > explore\n\t\t\t*set crew +10\n\t\t\tA ${pet_noise_2} alerts you just as the hunting pack appears.\n\t\t\t*gosub dogs\n\t\t\tBut thanks to your ${pet}, your small crew is ready; they meet the hunters with rifles and sabers. The copper dogs' leader tries to rally them with screeching metal howls until your ${pet}\n\t\t\t*if pet = \"wolf\"\n\t\t\t\trips its throat out.\n\t\t\t*if pet = \"hawk\"\n\t\t\t\tdives onto its face and rips out its glass eyes.\n\t\t\t*if pet = \"monkey\"\n\t\t\t\tjumps from a tree onto the leader's back and breaks its neck.\n\t\t\t*if pet = \"snake\"\n\t\t\t\tcurls around the leader and crushes it to pieces.\n\n\t\t\tAs the surviving hunters flee,\n\t\t\t*label motivator_burnout\n\t\t\t*if has_motivator\n\t\t\t\tyou discover that the battle has burned out your ${pet}'s Deep Tech motivator.\n\t\t\t\t*set has_motivator false\n\t\t\t*else\n\t\t\t\tyour ${pet} lets out savage ${pet_noise}. It is clearly exhausted, perhaps due to the proximity of so much Deep Tech.\n\t\t\t\t*set pet_used true\n\t\t\t*goto radiance\n\t\t*else\n\t\t\t*set crew -10\n\t\t\t*set copilot_alive false\n\t\t\tYour companion is out of sight when the hunting pack appears.\n\t\t\t*gosub dogs\n\t\t\tMidian's copilot goes down under a wave of mechanical beasts.\n\t\t\t*if wounded\n\t\t\t\tYou call your ${pet} as you turn to flee, but your wounds ache, and the beasts bring you down before your companion can reach you.\n\t\t\t\t*goto copper\n\t\t\t*else\n\t\t\t\t*set wounded true\n\t\t\t\t*set injury \"scratched back\"\n\t\t\t\tYou call your ${pet}, but one of the dogs hits you from behind and knocks you to the ground, scratching your back. Then your ${pet} shoves it off you, giving you time to draw your ${weapon}. For several horrible seconds you only see blood and metal as you fight them off.\n\n\t\t\t\tWhen the copper dogs flee, they drag their dead with them, leaving trails of green liquid metal.\n\t\t\t\t*gosub copilot\n\n\t\t\t\tAs you catch your breath,\n\t\t\t\t*goto motivator_burnout\n\n*label dogs\nThey look like wild dogs made of copper, and they rush you without fear.\n*page_break\n*return\n\n*label copilot\nThe monsters also drag Midian's copilot into the metal trees. When the first mate tries to go after her, ${helper}\n*if job = \"engineer\"\n\tshakes her head and says, \"Don't bother. Those machines are efficient. She's gone.\"\n*if job = \"marine\"\n\tgets his sword between Midian and the trees and says, \"You'll die in there just like she did. You know that.\"\n*if job = \"bursar\"\n\tsays, \"That would be a mistake, ma'am. Your last.\"\n*if job = \"officer\"\n\traises one elegant hand in a gesture of warding and says, \"You will not survive if you follow her.\"\n*return\n\n*label radiance\n*temp loyalty \"undetermined\"\n*if wounded and has_medical_kit\n\t*set wounded false\n\t*set has_medical_kit false\n\tYou spend a few minutes tending to your ${injury} before resuming your journey. It will take you days to heal, but the painkillers make you feel better.\n\n\t*set injury \"undetermined\"\n\t*set injury_plural false\n\n*page_break\n\nAfter several hours of cutting your way through artificial jungle, an attack by a huge mechanical bird that tries to snatch your mechanic in its talons, and a river-crossing that sees you and ${helper} driving off a huge golden crocodile to save Midian, you follow the green glow to your destination. As the sun sets and the cave mouth turns from orange to rust-red, only the green glow illuminates the jungle around you. And then there it is: the Radiant Egg.\n\nIt looks like a huge sphere of black stone that glows with an inner green light. Metal vines encase it. Two long-dead Quon Bexi Tech raiders lie nearby. The [i]Falling Angel[/i] drifts overhead; it's cut its way through the vines and will reach you as soon as Krayl finds a place to land. Floodlights cut through the darkness. After a moment they illuminate your position. Krayl doesn't have space to land and is having a hard time getting closer, but if you can get the Egg out, he can haul you and it up with ropes.\n\nThen you spot an AAG airship behind the [i]Falling Angel[/i]. Blacked out and running quiet, it follows the pirate ship like a patient lioness. Your ${pet} ${pet_noise}. Shining electric eyes gather around you in the dark of the metal jungle.\n\n\"We have to get this Egg out now,\" Midian says.\n\n\"We have ropes,\" ${helper} says. \"We could work together to haul it up.\"\n\n\"We also have explosives,\" Midian says. \"Let's just blast it out.\"\n\nYou could also slice carefully through the vines with your @{used_weapon notched|} ${weapon}.\n*temp egg 2\n*choice\n\t#\"Let's work together and haul it up with ropes.\"\n\t\tYou work together to wrap the Radiant Egg in heavy lines and throw a winch over a nearby zinc-and-quartz tree.\n\t\t*if ( power + command ) > egg\n\t\t\tA hard tug pulls the Egg free of its entangling vines\n\t\t\t*label overhead\n\t\t\tjust as the [i]Falling Angel[/i] drifts directly overhead.\n\t\t\t*label got_egg\n\t\t\tJaguars of steel and jade crawl out of the jungle toward you, but the [i]Angel[/i]'s marines open fire as the crew gets you and the Egg aboard.\n\t\t\t*goto krayl_plan\n\t\t*else\n\t\t\t*set crew -10\n\t\t\t*set mechanic_alive false\n\t\t\tYou tug with all your strength, but the Egg remains in place until Midian's mechanic gets beneath it with an iron bar. He rips it free so you can hoist it, but then he stumbles back\n\t\t\t*label into\n\t\t\tinto the metal jungle. Jaguars of jade and steel tear him to pieces so quickly he cannot even scream. Midian shoots into the woods, but the jaguars drag the body away just as the [i]Falling Angel[/i] drifts directly overhead. The crew gets you and the Egg aboard.\n\t\t\t*goto krayl_plan\n\t#\"We'll blast it out.\" I'll set the charges.\n\t\t*set krayl -10\n\t\tYou might damage the Egg, but this is the quickest way to get it out. You and the mechanics position the charges, then step back.\n\t\t*if ( intellect + engineering ) > 1\n\t\t\tThe explosion is small and contained, blasting the metal vines away and freeing the Egg. It's ready to move\n\t\t\t*goto overhead\n\t\t*else\n\t\t\t*set crew -10\n\t\t\t*set mechanic_alive false\n\t\t\tBut the charge doesn't go off. Your mechanic frowns, steps toward the Egg, and says, \"Let me check the connections.\"\n\n\t\t\tThat's when it goes off. The blast flings the mechanic\n\t\t\t*goto into\n\t#I carefully slice it free of the vines with my ${weapon}.\n\t\t*if has_better_weapon\n\t\t\t*set egg -1\n\t\t*if used_weapon\n\t\t\t*set egg +1\n\t\t*if ( finesse + fighting ) > egg\n\t\t\tYou slice through the metal vines, working carefully so as not to break your ${weapon}. You clear off the last vine\n\t\t\t*goto overhead\n\t\t*else\n\t\t\tYou work carefully to avoid damaging your ${weapon}, but when you look back and see the electric eyes in the jungle creeping closer, you chop through the last few vines. Your ${weapon}\n\t\t\t*if used_weapon\n\t\t\t\t*set has_weapon false\n\t\t\t\tbreaks,\n\t\t\t*else\n\t\t\t\t*set used_weapon true\n\t\t\t\tis covered in nicks,\n\t\t\tbut ${helper} pulls the last vine away\n\t\t\t*goto overhead\n\n*label krayl_plan\n\n*page_break\n\nCaptain Krayl's marines secure the Radiant Egg on the deck below the bridge and just outside his quarters as the captain himself appears…beside @{spider_known the Deep Tech spider that tried to kill you|a Deep Tech spider of terrifying size}. Your ${pet} shrinks away.\n\nYou're not surprised to learn that the secret of Krayl's cabin is a Deep Tech creature of incredible complexity. But you are surprised that it's wearing a wedding dress.\n\n*page_break\n\n\"At last,\" Captain Krayl says, \"I have what I need to restore my beautiful Zindi! The Radiant Egg has the power to give these beasts of the Deep Tech not just flesh, but thoughts of their own. I will raise my new Zindi as I raised the old one!\"\n\n\"Ew,\" Midian mutters under her breath.\n\nYou peek into the captain's cabin, since all the doors there are now flung open. It's full of mementos of his dead wife, paintings of her, wax cylinders that even now repeat her voice, and heaped-up books on computation and psychology.\n\n$!{helper} looks toward the AAG airship, still half hidden by vines, and shouts, \"What about the treasure?!\"\n\n\"This [i]is[/i] the treasure, fool!\" Krayl roars. He takes the spider's razor-sharp metal hand in his. As Midian backs away and the AAG airship launches fighters, the crew starts to separate and reach for their weapons. The captain's personal guards loosen their sabers in their scabbards, getting ready to earn their pay.\n\n*choice\n\t#\"Krayl, you're under arrest for piracy, murder, bank robbery, Tech raiding, and whatever is going on with your dead wife.\"\n\t\t*set loyalty \"AAG\"\n\t\t*gosub turn\n\t\t*goto fight_krayl\n\t#I inch away from the crew to stand beside Captain Krayl. I'm with him.\n\t\t*set loyalty \"Krayl\"\n\t\tYou stand between Captain Krayl and the furious crew. For a second it looks like they're going to charge you, but then you point past them, to the incoming aeros.\n\n\t\t\"Everyone, action stations!\" Midian shouts, and the crew responds.\n\t\t*goto fight_aag\n\t#\"You've led us into a trap, Krayl!\" I turn to the crew and rally them. \"Down with the old captain!\"\n\t\t*set loyalty \"self\"\n\t\t*gosub turn\n\t\t*goto fight_krayl\n\n*label turn\nThe crew scatters as you\n*if ( has_rifle ) and ( used_rifle = false )\n\tchamber a round in your rifle and turn on the captain.\n*elseif ( has_revolver ) and ( used_revolver = false )\n\tdraw your revolver and turn on the captain.\n*elseif has_weapon\n\tdraw your @{used_weapon notched|} ${weapon} and turn on the captain.\n*else\n\tturn on the captain.\n*return\n\n*label fight_krayl\n*temp krayl_attack 2\n\nThe Deep Tech spider springs for you, shedding its gown, but your ${pet} intercepts it, and the metal beasts roll across the deck. They keep fighting up the stairs to the bridge, tumbling over each other and gouging the wood. Crew members turn on each other as the Radiant Egg opens, illuminating the cavern. Krayl\n*if ( has_rifle ) and ( used_rifle = false )\n\t*set has_rifle false\n\tstrikes the rifle from your hands with\n*elseif ( has_revolver ) and ( used_revolver = false )\n\t*set has_revolver false\n\tstrikes the revolver from your hands with\n*else\n\tdraws\nhis electrified broadsword and shouts, \"You will not keep me from her, ${name}! You die here!\"\n\n*if crew > 70\n\t*set krayl_attack 1\n\tThen he dodges behind an electrical regulator as ${helper} nearly blows his head off with ${helper_his_her} rifle. The ${helper_desc} starts reloading as Krayl rushes you.\n*if crew \u003c 30\n\t*set krayl_attack 3\n\tBut before he can strike, you have to throw yourself to the deck as ${helper} nearly blows your head off with ${helper_his_her} rifle.\n\n\tIt looks like you have not exactly won over this crew.\n\n\tThe ${helper_desc} starts reloading as Krayl rushes you.\n\n*if wounded\n\t*set krayl_attack +1\n\n*page_break\n*set_checkpoint\n\n@{has_weapon You could meet Krayl's blade with your own, though you would have to avoid touching the electric edge|Though your ${weapon} is broken, the crew's fighting has left weapons scattered across the deck–you could run for a fallen dagger}.\n*if has_revolver\n\tThough you still have your revolver, Krayl is too close for you to draw it.\nIf you can pin Krayl and keep the broadsword away, you could command your @{pet_used exhausted|} pet to break free of the spider and attack.\n*if loyalty = \"self\"\n\tOr you could try rallying the crew to your defense while dodging the captain's swings.\nFinally, you could lure Krayl into striking at one of the electrical junction boxes he installed.\n*choice\n\t*if has_weapon\n\t\t#I'm quick enough to strike Krayl with my ${weapon} without lettings its edge touch his electrified blade.\n\t\t\t*if has_better_weapon\n\t\t\t\t*set krayl_attack -1\n\t\t\t*if used_weapon\n\t\t\t\t*set krayl_attack +1\n\t\t\tYou dodge the captain's first savage swings and score a cut across his\n\t\t\t*if ( finesse + fighting ) > krayl_attack\n\t\t\t\tcheek.\n\t\t\t\t*label chop\n\t\t\t\t*set krayl_alive false\n\t\t\t\tHe howls and chops into his office door's frame, showering you with sparks, but you duck one last time, then drive your ${weapon} through his heart.\n\t\t\t\t*label krayl_killed\n\n\t\t\t\tDying, he cries, \"Zindi!\" but the mechanical spider disentangles itself from your ${metal} ${pet} and leaps off the side of the ship, back down into the metal jungles of the Deep Tech. Krayl dies moaning his dead wife's name.\n\t\t\t\t*goto loyalty_check\n\t\t\t*elseif ( ( finesse + fighting ) > (krayl_attack-1) ) and ( crew > 50 )\n\t\t\t\tcheek.\n\t\t\t\t*label ok_chop\n\t\t\t\t*set crew -20\n\t\t\t\t*set krayl_alive false\n\t\t\t\tHe howls and almost takes your head off. You fall, but four crew members rush their former captain. They die, sizzling, but that gives you time to roll to your feet. You dodge one last crackling sword-swing, then drive your ${weapon} through Krayl's heart.\n\t\t\t\t*goto krayl_killed\n\t\t\t*else\n\t\t\t\tcheek, but he\n\t\t\t\t*label chop_fail\n\t\t\t\thowls and chops into his office door's frame, showering you with sparks. You can only parry the next swing, and the lightning sword blasts your ${weapon} from your numb hands. The last thing you see is Krayl's eyes illuminated by his broadsword. Then he brings the flashing blade down one final time.\n\t\t\t\t*choice\n\t\t\t\t\t#Try that choice again.\n\t\t\t\t\t\t*load_checkpoint\n\t\t\t\t\t#Restart the game.\n\t\t\t\t\t\t*goto restart\n\t*if has_weapon = false\n\t\t#I go for the dagger. I'm quick enough to outfight Captain Krayl.\n\t\t\t*set weapon \"dagger\"\n\t\t\tYou dodge the captain's first savage swings and grab a dagger dropped in the fighting. Then you fall back and bide your time, hoping for a chance to strike.\n\t\t\t*if ( finesse + fighting ) > (krayl_attack+1)\n\t\t\t\t*goto chop\n\t\t\t*elseif ( ( finesse + fighting ) > krayl_attack ) and ( crew > 50 )\n\t\t\t\t*goto ok_chop\n\t\t\t*else\n\t\t\t\tHe\n\t\t\t\t*goto chop_fail\n\t#I hold Krayl back, keeping the electrified sword away from me, and call for my ${pet}.\n\t\tYou grapple with the captain, grabbing his wrist and stopping the crackling broadsword inches from your face.\n\t\t*if has_weapon\n\t\t\tHe snarls, grabs your other arm, and tries to @{has_weapon twist the tip of your ${weapon} into your stomach|force you to your knees}.\n\t\t*if ( power + engineering ) > krayl_attack\n\t\t\tBut then you call your ${pet}, and it rips free of the mangled Deep Tech spider. Krayl screams in despair as the broken spider tumbles off the edge of the [i]Falling Angel[/i]. He pulls away from you and tries to slash at your ${pet}, but he is not fast enough. Your companion\n\t\t\t*label pet_kill\n\t\t\t*if pet = \"wolf\"\n\t\t\t\tslams him against the gunwale and tears his throat out. Clutching the mortal wound, Krayl tumbles off the edge of airship, following the spider down into the metal jungle.\n\t\t\t*if pet = \"hawk\"\n\t\t\t\ttears at his face with its talons. Krayl screams, stumbles, and pitches off the edge of the airship, following the spider down into the metal jungle.\n\t\t\t*if pet = \"snake\"\n\t\t\t\twraps around Krayl's chest and throat. They both go over the edge of the airship. You run to the railing. You spot Krayl's broken body far below.\n\n\t\t\t\tYour snake clings to the rail, battered but victorious. You help it back up.\n\t\t\t*if pet = \"monkey\"\n\t\t\t\twraps its hands around Krayl's throat. They both go over the edge of the airship. You run to the railing. You spot Krayl's broken body far below.\n\n\t\t\t\tYour monkey clings to the rail, battered but victorious. You help it back up\n\t\t\t*goto loyalty_check\n\t\t*elseif ( ( power + engineering ) > (krayl_attack-1) ) and ( crew > 50 )\n\t\t\t*set crew -20\n\t\t\t*set krayl_alive false\n\t\t\tFour crew members rush Krayl, and he shoves you away in order to engage them. In seconds they're all dead, cut down by the captain's brilliant swordwork, but they bought you time to call your ${pet}. It rips free of the mangled Deep Tech spider. Krayl screams in despair as the broken spider tumbles off the edge of the [i]Falling Angel[/i]. Kicking a dead crew member away, he tries to slash at your ${pet}, but he is not fast enough. Your companion\n\t\t\t*goto pet_kill\n\t\t*else\n\t\t\tYou call your ${pet}, but it cannot free itself from the Deep Tech spider! Krayl laughs and pulls free of your grip, then strikes you across the chest with the electrified broadsword. You fall in a shower of sparks.\n\t\t\t*label not_stop\n\n\t\t\t\"You will not stop me from being with her,\" Krayl says, and brings the sword down one last time.\n\t\t\t*choice\n\t\t\t\t#Try that choice again.\n\t\t\t\t\t*load_checkpoint\n\t\t\t\t#Restart the game.\n\t\t\t\t\t*goto restart\n\t*if loyalty = \"self\"\n\t\t#I rally the crew while dodging Krayl's swings.\n\t\t\t*temp rally 5\n\t\t\t*if crew >= 100\n\t\t\t\t*set rally 1\n\t\t\t*if crew >= 70\n\t\t\t\t*set rally 2\n\t\t\t*if crew >= 50\n\t\t\t\t*set rally 3\n\t\t\t*if crew >= 30\n\t\t\t\t*set rally 4\n\t\t\tYou dodge Krayl's first savage swings and @{has_weapon raise your ${weapon}, shouting|shout} for the crew to overthrow their tyrannical captain.\n\t\t\t*if ( finesse + command ) > rally\n\t\t\t\t*set krayl_alive false\n\t\t\t\tThe crew does not hesitate; though a few marines remain loyal to Krayl and his handpicked guards until the bitter end…it really is a bitter end. They're hacked to pieces without mercy and flung piecemeal over the railing.\n\n\t\t\t\tWhen your ${pet} rips the Deep Tech spider in half, the captain wails in mindless despair and stops chasing you to attack the ${metal} ${pet}. And then Midian runs her saber through his back. His electric broadsword falls crackling to the deck. A moment later, he falls beside it, tries to crawl toward what remains of the spider, and dies.\n\t\t\t\t*goto loyalty_check\n\t\t\t*else\n\t\t\t\tBut the crew hesitates. You turn to flee, but Krayl is too quick; shoving past those crew members you've rallied, he strikes you a glancing blow with his electrified broadsword that nonetheless immediately paralyzes you. You fall in a shower of sparks.\n\t\t\t\t*goto not_stop\n\t#I'm clever enough to lure Krayl into lunging for an electrical junction box.\n\t\tYou dodge the captain's first savage swings, luring him back toward the central junction box.\n\t\t*if ( intellect + espionage ) > krayl_attack\n\t\t\t*set krayl_alive false\n\t\t\tWhen your ${pet} rips a leg off the Deep Tech spider, Krayl howls in rage and lunges for you.\n\t\t\t*label last_second\n\t\t\tYou wait until the last moment, then step aside. The captain drives his electrified broadsword right into the junction box.\n\n\t\t\tYou're blasted to the deck as a shockwave of electricity consumes the captain and his sword. When you can see again, the Deep Tech spider lies in broken pieces at the feet of a charred and blackened corpse. Your ${pet} ${pet_noise} in triumph.\n\t\t\t*goto loyalty_check\n\t\t*elseif ( ( intellect + espionage ) > (krayl_attack-1) ) and ( crew > 50 )\n\t\t\t*set crew -20\n\t\t\t*set krayl_alive false\n\t\t\tWhen your ${pet} rips a leg off the Deep Tech spider, Krayl howls in rage and lunges for you. He's too quick! All you can do is duck out of range and desperately try to circle around again. As Krayl presses you back, you think you're finished, but then four crew members rush their former captain. They die in seconds, wreathed in lightning, but they've given you time to get back into position.\n\n\t\t\t*goto last_second\n\t\t*else\n\t\t\tBut Krayl is too clever and too quick. He feints toward the junction box, and just when you think you have him, he twists the broadsword at the last minute and slams it into you. You stumble into the box, fly away in a shower of sparks, and fall to your knees before the captain.\n\t\t\t*goto not_stop\n\n*label loyalty_check\n*page_break\nThere's a moment of stunned silence, then First Mate Midian looks\n*if loyalty = \"AAG\"\n\tfrom the incoming triplanes to you and says, \"You're AAG. I should have known.\" She raises her saber and shouts, \"Death to the Air Guard!\"\n\n\t*if crew > 70\n\t\tThe first marine to reach you dies when ${helper}\n\t\t*if ( job = \"engineer\" ) or ( job = \"bursar\" )\n\t\t\tshoots him.\n\t\t*if job = \"marine\"\n\t\t\tchops his head off with his two-handed sword.\n\t\t*if job = \"officer\"\n\t\t\tslices him to ribbons with his swords.\n\t\tThen the ${helper_desc} says, \"We need to get to your J-20. Let's go!\"\n\t*elseif crew \u003c 30\n\t\tYou run as ${helper}\n\t\t*if ( job = \"engineer\" ) or ( job = \"bursar\" )\n\t\t\tshoots at you,\n\t\t*if job = \"marine\"\n\t\t\tcharges you with his two-handed sword,\n\t\t*if job = \"officer\"\n\t\t\tcharges you with his whirling blades,\n\t\tthen sprint for your J-20.\n\t*else\n\t\tYou run for your J-20, chased by a few pirates loyal to Midian, though most are more worried about the incoming aeros.\n\t*goto fight_midian\n*else\n\tat the incoming triplanes and says, \"I said get to your action stations!\"\n\n\tThe fighting stops instantly as the pirates run to repel the AAG. You\n\t*if crew \u003c 30\n\t\t*set helper_alive false\n\t\tleap over ${helper}, who lies dead on the deck, and\n\trun for your J-20.\n\t*goto fight_aag\n\n*label fight_aag\n*set_checkpoint\n*temp ryonet_attack 2\n\n*page_break\n\nYou've never launched this close to the ground before, but the deck crew doesn't hesitate before dropping your J-20 off its hook. Your ${pet} ${pet_noise} @{helper_alive and ${helper} yells|} as you pull back on the stick and try to gain altitude. AAG triplanes strafe the [i]Falling Angel[/i] as gossamer-thin metal leaves smack against your aero's undercarriage.\n*if krayl_alive\n\tYou spot Krayl himself manning one of the deck guns as the AAG airship closes in.\n\nOne aero drops in behind you as you level out, but Midian blows it to pieces. Then Lieutenant Ryonet forces Midian to back off and closes in on you.\n\nWithout enough altitude or speed and with Ryonet almost on top of you, your options are limited. And you're so close to the [i]Falling Angel[/i] that if you climb, you might fly right into it.\n\nIf you signal Midian and bank hard, you could get Ryonet to chase you into Midian's gun sights. Or you could pull up quickly enough to squeeze off a shot right into Ryonet's canopy, though you would have to be deadly accurate. You could also try hiding in the Deep Tech jungle, or–since Ryonet is so close–you could slow down and let your ${pet} @{(pet = \"hawk\") fly right at Ryonet|leap right into Ryonet's cockpit}.\n\n*choice\n\t#I signal Midian, hoping she'll help, then grab the stick with both hands and bank hard.\n\t\tYou wrench the control stick. Ryonet stays behind you in her more maneuverable Guardian triplane, @{helper_alive ignoring ${helper}'s shooting|},\n\t\t*if ( power + command ) > ryonet_attack\n\t\t\tbut you keep turning until Midian is in position. Bullets zip around your J-20, and then Midian's cannons open up. The AAG triplane veers off, trailing smoke.\n\t\t\t*label ryonet_finished\n\t\t\tRyonet is finished. Her wingmen panic and fly off in every direction as she tries to nurse his damaged aero back out of the cave.\n\t\t\t*goto angel_final\n\t\t*elseif ( ( power + command ) > (ryonet_attack-1) ) and ( crew > 50 )\n\t\t\t*set crew -20\n\t\t\tbut you turn back toward the [i]Angel[/i], hoping that the crew's guns will save you. The deck guns chatter and Ryonet lines up a shot on the pirate airship, strafing the crew but buying Midian the time she needs. Her cannons open up just as Ryonet overshoots you, ripping into the AAG aero.\n\n\t\t\t*goto ryonet_finished\n\t\t*else\n\t\t\tand though you try to escape, she has the altitude, the speed, and the firepower. Bullets rip through your engine and flames spread through your cockpit as Ryonet rips you to pieces.\n\t\t\t*label cough\n\t\t\tCoughing blood, you struggle to control your aero, but it turns over and plunges into the metal jungle.\n\t\t\t*choice\n\t\t\t\t#Try that choice again.\n\t\t\t\t\t*load_checkpoint\n\t\t\t\t#Restart the game.\n\t\t\t\t\t*goto restart\n\t#Timing it perfectly, I pop up and unleash a single, short burst into Ryonet's aero.\n\t\tYou twist the J-20 around so quickly that wood and metal rip, then pull back on the control stick with a single, swift motion and squeeze off a burst.\n\t\t*if ( finesse + fighting ) > (ryonet_attack + 1)\n\t\t\t*set crew +10\n\t\t\tBullets zip all around you, and you almost collide head-on before you twist the stick again. You look over your shoulder and\n\t\t\t*label see_wobble\n\t\t\tsee the Guardian triplane wobble and start to roll over. One of your bullets must have hit the lieutenant. She recovers before she crashes, but the aero drifts listlessly toward the cave entrance. She's finished. Her wingmen panic and scatter.\n\t\t\t*goto angel_final\n\t\t*elseif ( ( finesse + fighting ) > (ryonet_attack-1) ) and ( crew > 50 )\n\t\t\t*set crew -20\n\t\t\tBullets zip all around you, and you almost collide head-on before you twist the stick again. You bank hard and realize too late you're flying right toward the [i]Falling Angel[/i]! Twisting the stick, you rip through the [i]Angel[/i]'s rigging, significantly damaging the middle deck, but you manage not to crash. When you straighten out again, you look for Ryonet, and\n\t\t\t*goto see_wobble\n\t\t*else\n\t\t\tBut it only cracks her windscreen, and when Ryonet returns fire, her\n\t\t\t*label barrage\n\t\t\tbarrage rips through your cockpit, your engine, and you.\n\t\t\t*goto cough\n\t#I slow down, controlling the engine to avoid a stall, and let Ryonet fly into ${pet} range.\n\t\tYou're not sure if anyone has ever tried this before, but you'll probably be famous one way or another. You cut the throttle.\n\n\t\tRyonet, predicting that you might slow down so she overshoots, is ready for this trick. She takes aim mere yards behind you.\n\t\t*if pet_used\n\t\t\t*set ryonet_attack +1\n\t\t*if has_motivator\n\t\t\t*set ryonet_attack -1\n\t\t*if ( intellect + engineering ) > ryonet_attack\n\t\t\t*label thats_when\n\t\t\tThat's when\n\t\t\t*if pet = \"wolf\"\n\t\t\t\tyour wolf runs the length of your J-20 and lands right in her cockpit.\n\t\t\t*if pet = \"monkey\"\n\t\t\t\tyou throw your metal monkey right into her cockpit.\n\t\t\t*if pet = \"hawk\"\n\t\t\t\tyour hawk flies right into her face.\n\t\t\t*if pet = \"snake\"\n\t\t\t\tyou throw your metal snake right into her cockpit.\n\t\t\tYou don't see the resulting struggle, but you think you can hear Ryonet's horrified screams over the roar of the engines.\n\t\t\t*if pet = \"hawk\"\n\t\t\t\tAfter a moment your hawk flies back to you.\n\t\t\t*else\n\t\t\t\tYou drop as low as you dare, getting below Ryonet's triplane, and your ${pet} drops back onto the wing of your J-20.\n\t\t\tRyonet appears to have survived her attack, but she is defeated–definitely injured and probably in a foul mood. Her aero drifts listlessly toward the cave entrance. Seeing her dazed retreat, her wingmen panic and scatter.\n\t\t\t*goto angel_final\n\t\t*elseif ( ( intellect + engineering ) > (ryonet_attack-1) ) and ( crew > 50 )\n\t\t\t*set crew -20\n\t\t\tToo late you realize that you're still dangerously close to the [i]Angel[/i]; you're forced to bank around its hull, and Ryonet sends a chattering stream of bullets into the airship, destroying a deck gun. She banks hard and lines up a fatal shot right behind you.\n\t\t\t*goto thats_when\n\t\t*else\n\t\t\tYou signal your ${pet}, but the swirling aerial battle has disoriented it. Even as it @{(pet = \"hawk\") spreads its wings|tenses to leap}, Ryonet opens fire. Her\n\t\t\t*goto barrage\n\t#I descend and hide in the metallic foliage, confusing Ryonet's aim.\n\t\tYou dive toward the cover of the metal trees. Ryonet chases you, her finger never leaving the trigger, but she loses you in the darkness. Furious, she dives down into the jungle to follow you, blazing away as you weave around coppery vines and iron trunks. Her bullets rip whole trees apart as she tries to line up her shot.\n\n\t\t*if ( intellect + espionage ) > 2\n\t\t\tYou barely dodge a huge glass flower. She doesn't; the flower rips\n\t\t\t*label away\n\t\t\taway part of Ryonet's wing assembly and one of her cannons. She climbs frantically, her triplane maimed and useless. You pull up out of the jungle and watch her flee toward the cave mouth, defeated. Her wingmen panic and scatter.\n\t\t\t*goto angel_final\n\t\t*elseif ( ( intellect + espionage ) > (ryonet_attack-1) ) and ( crew > 50 )\n\t\t\t*set crew -20\n\t\t\tDesperate to escape her shooting, you dodge a huge glass flower, then circle back around toward the [i]Falling Angel[/i]. Its deck guns try to draw a bead on Ryonet. Furious at the distraction, she climbs and blows away one of the airship's guns, then dives again, eager to finish you.\n\n\t\t\tBut she dives too hard, picking up too much speed. You dodge a coppery tree. She doesn't; the tree's branches rip\n\t\t\t*goto away\n\t\t*else\n\t\t\tYou avoid her bullets, but don't see the huge glass flower until it's too late. You yank hard on the stick, but it rips open your fuselage. Flames spread through the cabin as you plunge down into the jungle and explode against an iron tree trunk.\n\t\t\t*choice\n\t\t\t\t#Try that choice again.\n\t\t\t\t\t*load_checkpoint\n\t\t\t\t#Restart the game.\n\t\t\t\t\t*goto restart\n\n*label fight_midian\n\n*page_break\n*set_checkpoint\n\nIt's a desperate running battle to the hangar, but your J-20 is waiting. A mechanic tries to stop you, but @{(crew > 70) ${helper} points ${helper_his_her} unloaded rifle at him until he backs off, and you|you shove him away and} jump into your aero.\n\nThe space above the Deep Tech jungle is already a raging battle by the time you launch. Guardian triplanes swarm the [i]Falling Angel[/i] as the AAG airship gets into cannon range. The airships' big guns start exchanging shots. Every miss blows a crater in the cavern wall or vaporizes a chunk of metal jungle. Weaving through falling debris and dodging the [i]Falling Angel[/i]'s cannons, you fight to gain altitude. As you consider what to do, @{(crew > 70) ${helper} opens fire with the tailgun|bullets fly past your cabin}; Midian's J-20 is right behind you, trying to line up a clean shot.\n\nMidian's angle isn't great, and you might be nimble enough to slip behind her and open fire. Or you could target the [i]Falling Angel[/i] itself and hit its engine. You could also organize the swarming AAG triplanes and direct them more effectively.\n*if crew > 70\n\tFinally, you could bank hard, which would help ${helper} a chance to line up a shot with ${helper_his_her} tailgun.\n\n*choice\n\t#I signal the AAG Guardians and coordinate a combined attack.\n\t\tThe AAG attack is ferocious but disorganized. With Lieutenant Ryonet in the lead, they're blazing away at the [i]Falling Angel[/i], but the pirate ship's firepower is tremendous. One triplane explodes before you can signal them,\n\t\t*if ( intellect + command ) > 2\n\t\t\t*set midian_alive false\n\t\t\tbut the other two recognize you and break away from their strafing runs to engage Midian. You lead Midian under the [i]Falling Angel[/i], then up toward the AAG airship. The triplanes box her in, and when you dive, she's flying right toward one of the AAG airship's big guns. It blows her J-20 to pieces in a single shot.\n\t\t\t*goto ryonet_final\n\t\t*elseif ( ( intellect + command ) > 1 ) and ( ryonet > 50 )\n\t\t\t*set ryonet -20\n\t\t\t*set midian_alive false\n\t\t\tbut the other two recognize you and break away from their strafing runs to engage Midian. You lead Midian under the [i]Falling Angel[/i], then up toward the AAG airship. A stray shot from the [i]Angel[/i] vaporizes one AAG aero, and the other careens into Midian's J-20. Both aeros crash into the AAG airship and explode in a ball of fire. The damage to the Actorian ship is significant, but it's still flying, and Midian is no longer a threat.\n\t\t\t*goto ryonet_final\n\t\t*else\n\t\t\tand the others bear down on you as if unaware of who you are. You dive, trying to outmaneuver two Guardians and a J-20. You manage to get clear just as you swing around the [i]Falling Angel[/i]…right in line with one of its big guns.\n\n\t\t\tThe cannon blows you out of the sky.\n\t\t\t*choice\n\t\t\t\t#Try that choice again.\n\t\t\t\t\t*load_checkpoint\n\t\t\t\t#Restart the game.\n\t\t\t\t\t*goto restart\n\t#I weave nimbly around Midian's shooting, get behind her, and blast her out of the sky.\n\t\tYou twist and weave through the burning air as Midian blazes away, both of you trying to line up a kill-shot. Diving beneath the [i]Falling Angel[/i], you\n\t\t*if ( finesse + fighting ) > 3\n\t\t\t*set midian_alive false\n\t\t\t*set ryonet +10\n\t\t\tcut your speed, risking a stall, and slide in behind her aero.\n\n\t\t\tHer tailgunner shoots wildly, but you\n\t\t\t*label check_distance\n\t\t\tcheck your distance and squeeze the trigger for exactly three seconds. When you stop, Midian's J-20 is ablaze from tip to tail. It maintains its course for a second, then plunges down into the metal jungle.\n\t\t\t*goto ryonet_final\n\t\t*elseif ( ( intellect + command ) > 2 ) and ( ryonet > 50 )\n\t\t\t*set ryonet -20\n\t\t\t*set midian_alive false\n\t\t\tcut your speed, risking a stall, and slide in behind her aero.\n\n\t\t\tHer tailgunner forces you off course, and two overeager AAG triplanes replace you. The fools think they see their chance, but Midian knows her business; she drops altitude, and her tailgunner blows them both out of the sky.\n\n\t\t\tStill, that gives you time to get back into position. You\n\t\t\t*goto check_distance\n\t\t*else\n\t\t\tmanage to elude Midian, only for the pirate airship to open fire on you. Bullets rip through your canopy as you twist away, but then Midian is on you again. Before you can escape,\n\t\t\t*goto barrage\n\t#I look for something on the [i]Falling Angel[/i] that will really, really explode when I shoot it.\n\t\t*set ryonet -10\n\t\tYou pour on the speed as Midian chases you, shooting wildly, then bank hard and line up a shot on the [i]Falling Angel[/i].\n\t\t*if ( intellect + engineering ) > 1\n\t\t\t*gosub blow_up_angel\n\t\t\tJ-20s aren't fast or maneuverable, but they've got a lot of guns up front. You pump everything your aero has into the pirate airship's engine, then fly past, skimming the wooden hull.\n\n\t\t\tMidian is behind you, still trying to get her shot, when the [i]Falling Angel[/i] explodes, consuming her aero and everything else nearby. The AAG airship lurches as the cavern momentarily becomes brighter than day. Huge fragments of the [i]Falling Angel[/i] rain down into the metal jungle.\n\t\t\t*goto ryonet_final\n\t\t*elseif ( ( intellect + command ) > 0 ) and ( ryonet > 50 )\n\t\t\t*set ryonet -20\n\t\t\t*gosub blow_up_angel\n\t\t\tJ-20s aren't fast or maneuverable, but they've got a lot of guns up front. You pump everything your aero has into the pirate airship's engine. The damage you cause is extensive, and fires spread across the [i]Angel[/i].\n\n\t\t\tToo late you realize the captain's spiteful plan. He steers his burning vessel right for the AAG airship. AAG triplanes strafe the [i]Falling Angel[/i], trying to bring it down, even as the AAG airship turns. Midian charges into the fray, blasting at the AAG aeros.\n\n\t\t\tAnd then the [i]Falling Angel[/i] explodes in a blinding flash of flame, consuming Midian and the AAG triplanes. When you can see again, the AAG airship is damaged but still in the air. You did it. Huge fragments of the [i]Falling Angel[/i] rain down into the metal jungle.\n\t\t\t*goto ryonet_final\n\t\t*else\n\t\t\tYou blaze away at the [i]Falling Angel[/i], but its reinforced hull deflects your bullets. And then it fires back. The first shot blows away part of your wing, and you dive. But Midian follows you under the pirate airship. Her\n\t\t\t*goto barrage\n\t*if crew > 70\n\t\t#I signal ${helper}, then get ready to wrench the stick.\n\t\t\tYou wrench the control stick, then level out just as hard.\n\t\t\t*if ( power + command ) > 2\n\t\t\t\t*set midian_alive false\n\t\t\t\t\"Perfect,\" ${helper} says as Midian slews off target, her bullets flying past your tail. The ${helper_desc} brings ${helper_his_her} tailgun around and opens fire. Midian's J-20 explodes in a ball of flame and plunges into the metal jungle.\n\t\t\t\t*goto ryonet_final\n\t\t\t*elseif ( ( power + command ) > 1 ) and ( ryonet > 50 )\n\t\t\t\t*set ryonet -20\n\t\t\t\t*set midian_alive true\n\t\t\t\t\"Good, good,\" ${helper} says as Midian slews off target, her bullets flying past your tail. But before the ${helper_desc} can line up a shot, Midian veers off and tears through two AAG aeros.\n\n\t\t\t\t\"Get back here!\" ${helper} shouts. Midian obliges, dropping down on you like an eagle. Bullets fly past your canopy. A moment later, ${helper} squeezes off a three-second burst, and Midian's J-20 explodes in a ball of flame.\n\t\t\t\t*goto ryonet_final\n\t\t\t*else\n\t\t\t\tBut Midian sticks to you, and though ${helper} blazes away, ${helper_his_her} bullets go wide. Midian's\n\t\t\t\t*goto barrage\n\n*label ryonet_final\n\n*if angel\n\t*page_break\n\tWith Midian dead, the remaining AAG aeros coordinate to batter down the [i]Falling Angel[/i]'s defenses. When the AAG airship launches marines, the fight is bloody but brief. A few minutes later, you land your battered J-20 on the AAG airship's landing deck right next to Ryonet's Guardian triplane.\n*else\n\tYou follow the surviving triplanes back to the AAG airship and land next to Ryonet's Guardian triplane.\n\n*page_break\n\nBack in Actorius, your debriefing is delayed for more than a week. The city is tense, gripped by fears of terrorism, political unrest, and political struggles with the rival city-state of Quon Bex.\n*if ryonet > 70\n\t*check_achievements\n\t*if choice_achieved_commander = false\n\t\t*achieve commander\n\t*set is_elite true\n\tBut Lieutenant Ryonet's superiors are impressed with you. When Ryonet leaves the AAG in a cloud of accusations after taking part in the bombing of a civilian protest, you are promoted to her position. Everyone agrees that war is coming to Actorius, whether from within or without, and the Actorian Air Guard needs agents like you to protect it in the years to come.\n\n\t*page_break\n\n\tFrom your office high in Combine Spire, you and your ${pet} regard your new flight team: six handpicked elite pilots with access to the latest aeros and equipment, ready to protect Actorius from any threat.\n\t*if ( crew > 70 ) and ( helper_alive )\n\n\t\t$!{helper}, you learn, will be one of those six.\n\n\tYou adjust the lieutenant pins on your lapel, scratch your ${pet}'s head, and order your new crew into your office. Your elite team awaits your orders.\n\n\t*label agent_choice\n\t*choice\n\t\t#\"We investigate these so-called 'Revolutionaries.' I want names, contacts, sources of income, threat levels.\"\n\t\t\t@{is_elite You have almost a hundred people in your department, from elite pilot-agents to common clerks. They all get to work collating the information Ryonet accumulated on the city's various|Your crew of pilot-agents scatter through the city to learn everything they can about the city's} revolutionary movements.\n\n\t\t\tThey uncover evidence of a train stolen from Scothic freight yards moving in secret through the Deep Tech. But that's as far as they can get. The rest is up to you, so @{((crew > 70) and (helper_alive)) you, ${helper}, and one of your best pilots|you and a wingman} climb into AAG Guardian triplanes and dive into the Deep Tech vaults beneath the city.\n\n\t\t\t*label floodlights\n\n\t\t\tYou turn on your floodlights for the first thousand feet of the cavern. After that, shining Deep Tech photoluminescence lights your way. In its glow you spot the revolutionaries' train. There's some kind of aero under a tarp…\n\n\t\t\tA blast of wind throws you @{((crew > 70) and (helper_alive)) and ${helper}|} off course. A moment later, something rips through @{((crew > 70) and (helper_alive)) the third pilot's|your wingman's} aero, vaporizing it instantly.\n\n\t\t\t*page_break\n\n\t\t\tWhen you get your Guardian under control again, you see what just hit you: an aero of unfamiliar design, with a huge propeller—wider than its wingspan—that flickers like gold. When @{((crew > 70) and (helper_alive)) ${helper} brings ${helper_his_her} Guardian in line for|you bank around to line up} a shot, the aero flies right into the stone wall of the cavern—and its huge propeller chews right into the rock. The aero barely slows down as it disappears into the tunnel it just made.\n\n\t\t\tIt's a flying mole machine.\n\n\t\t\tA moment later the mole machine bursts out of the ceiling, @{((crew > 70) and (helper_alive)) scattering you and ${helper} again|forcing you to dive before it chews you to pieces}, and an aero launches fro
