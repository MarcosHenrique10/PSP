<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NOLA Is Burning — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "nolaisburning", "title": "NOLA Is Burning", "scenes": {"beaten_and_bruised": "*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]NOLA is Burning[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n*temp in_confessional false\n*temp sawtooth_out false\n*temp condensed_confession false\n[b]Chapter Six: Beaten and Bruised[/b]\n\nThe tower bells of the historic St. Louis Cathedral ring out through the early-morning air. It's 3:30AM. You don't have much time left. \n\n[i]Girls Girls Girls[/i] is lit up and hoppin' down the street, but Father Confessor—a name given to him by the mob—provides heavenly forgiveness and potential information. Just like the Gator Girls, he sees and hears everything. The only problem is that he's also heavily addicted to uppers, what he calls his \"redbirds.\"\n\nFather Confessor is a shell of the man he once was. The services have really gone downhill, and he's lost quite a few members of his congregation. Some wise guy pointed out recently that it's mostly [i]mafiosi[/i] who attend nowadays.\n\nAnd hell, he's right.\n*set reveal_remorse true\n*page_break\n\nYou walk into the beautiful cathedral, and the heavy door swings shut behind you, its echoing boom announcing your arrival.\n\nDespite your career as a headcrusher, you were raised in the Catholic Church. You consider yourself to be…\n\n*fake_choice\n\t#An atheist—I don't believe in anything I can't kill.\n\t\t*set atheist true\n\t\tDisbelief also makes your career choice easier to swallow. \n\t#I haven't really thought too much about it lately.\n\t\tSome people need religion. You just need a martini on a beach. \n\t#Like every Italian…I was born Catholic and I will be Catholic again on my deathbed.\n\t\tYou tend to keep up traditions. That's why the mob has favored you so much.\n\t#I'm going to Hell and that's okay with me.\n\t\t*set remorse %-5\n\t\tYou've racked up enough sins that you're pretty sure you'll be doing eternity in the lake of fire. On the bright side, the conversations down there have to be a lot more interesting than the ones that happen while sitting on a cloud and strumming on a harp.\n\t#I still hold out hope that God may forgive me.\n\t\t*set remorse %+10\n\t\tMaybe you can make a new life for yourself, one where you serve others and make yourself worthy of God's forgiveness….\n*comment endif\n\nNo matter how you feel about religion, you recognize the peace and holiness of this place. Like Bourbon Street, it's neutral ground—a safe zone. There is no fighting or destruction inside these walls, but that doesn't mean things can't change suddenly here. \n\nWhat do you do?\n\n*choice\n\t#Call out for Father Confessor.\n\t\tIf he's hopped up on those redbirds, he could be anywhere.\n\t\t*set savvy %+5\n\t\t*set jumpin_the_gun %+5\n\t\t*set respect %-5\n\t\t*goto callout\n\t#Head straight to the confessional.\n\t\t*set in_confessional true\n\t\tNo use in wasting time. It will feel good to finally get all your sins forgiven.\n\t\t*set savvy %+5\n\t\t*set respect %+5\n\t\t*set jumpin_the_gun %-5\n\t\tYou whip open the red velvet curtain and sit down, noticing Father Confessor on the other side, somewhat coherent. He slowly recognizes you from all the times you snuck in and stood at the back of his late-night sermons.\n\t\t*goto confessional\n\t#Light a candle and pray at the altar.\n\t\t*set respect %+5\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*set remorse %+5\n\t\tWalking swiftly to the elaborate altar at the head of the church, you light a candle, kneel, and pray silently, reflecting on your life in NOLA and the decisions that have led you to this moment.\n\t\t*if atheist = false\n\t\t\tYou decide to share a private moment with the powers-that-be.\n\n\t\t\tAs you pray for forgiveness and strength, you hear mumbling behind you.\n\t\t*if atheist\n\t\t\tStanding there, you hear mumbling behind you.\n\t\t*comment endif\n\n\t\tIt's Father Confessor.\n\t\t*page_break\n\t\t*set sawtooth_out true\n\t\tWhen you turn, though, there's no one there. Sawtooth in hand, you walk down the main aisle, looking around you suspiciously. You follow the sound until you find Father Confessor stretched out on a pew, high as a kite.\n\t\t*goto found_in_pew\n\n*label callout\nYour voice bounces off the ornate walls, echoing through the massive building. You wait for the echo to die out before calling out for Father Confessor again.\n\n\"${name}?\"  His voice sounds distant, groggy, and slurred. You finally fined the drugged priest in a pew, holding a half empty bottle of redbirds. The growth on his face looks less like five o'clock shadow than the kind of uneven beard you get after a five-day bender.\n\nSeeing the state of this poor sap makes you…\n\n*fake_choice\n\t#…sympathetic. I know someone in the mob is behind his drug addiction.\n\t\t*set remorse %+5\n\t\t*set paranoia %+5\n\t\tIt's a tragedy that Father Confessor's good heart has brought him to this.  He wanted to redeem the unredeemable, but he found himself soiled by the very world he sought to brighten.\n\t\t\n\t\tYou look down at the dissipated priest and try to decide what to do with him.\n\t#…frustrated.  I've pulled quite a few teeth in my day, so a little pep talk woulda been nice.\n\t\tYou shake your head. He needs to wake up and do his fucking job here.\n\n\t\tYou look down at the dissipated priest and try to decide what to do with him.\n\t#…entertained. The old priest is always good for a laugh, and sometimes that's all I need.\n\t\t*set remorse %-5\n\t\t*set paranoia %-5\n\t\tYou indulge yourself in a deep belly laugh that echoes through the nave of the cathedral.\n\t\t\n\t\tUnfortunately, your amusement gets you no closer to your goal. You look down at the dissipated priest and try to decide what to do with him.\n*label found_in_pew\n\n*choice\n\t#Help him gently to the confessional. \n\t\t*set in_confessional true\n\t\t*set respect %+5\n\t\t*set take_it_to_the_mattresses %-5\n\t\tYou relieve Father Confessor of the bottle of redbirds and help him up. Putting your arm around his ribs, you get him to his feet. He looks up at you and smiles.\n\n\t\t\"${Name}…I knew you would come tonight….\"\n\n\t\tYou support him all the way to the confessional, open the curtains, and help him sit down. You enter the other side and kneel to face the grille.\n\t\t*goto confessional\n\t#Lives are at stake—drag him to the confessional.\n\t\t*set in_confessional true\n\t\t*set respect %+5\n\t\t*set take_it_to_the_mattresses %+5\n\t\t*set red_birds true\n\t\tYou rip the bottle of redbirds out of his hands. Then, you grab him by the waist and hoist him up. He yells and claws at you, trying to get those damn pills back. His desperation is palpable. \n\n\t\tYou drag him to the confessional, rip open the curtains, and shove him in. You get into the other side of the booth while he slides open the screen separating the two sides.\n\t\t*goto confessor_confessional\n\t#The church is empty! No need to drag him anywhere; I'll make my confession right here.\n\t\t*set savvy %+5\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*set red_birds true\n\t\tYou slide into the pew next to him and turn him a bit, so his head rests on your lap. Taking the pill bottle gently out of his hand, you shake him awake.\n\t\t\n\t\tThe priest slowly sits up, grabbing his head in pain. He looks at you, rubbing his face. He's actually coherent! You can't believe your luck.\n\t\t\n\t\t\"Of course, my ${son}. I've been waiting a long time for you to come to me. Tell me what's on your mind.\"\n\t\t*page_break\n\t\t\n\t\t*gosub hope_for_future\n\t\t\n\t\tTaking it all in, Father Confessor nods with understanding.\n\t\t*goto divulge\n\n*label confessional\nIn a slurred tone, Father Confessor mumbles something to the effect of \"helping you make a good confession.\" That's your cue.\n\n*choice\n\t#I gotta get in and get out. I'll tell him how I want to ${desire_text_1st} and get a little forgiveness.\n\t\t*set savvy %-5\n\t\t*set respect %-5\n\t\t*set remorse %-5\n\t\tYou tell him about how you want to ${desire_text} and give him the highlights of your mission tonight. When you finish, he looks at you through the window.\n\t\t*goto confessor_confessional\n\t#Hold up…I've got a chance to get my hands on some critical information.\n\t\t*set savvy %+5\n\t\t*set respect %+5\n\t\t*set jumpin_the_gun %-5\n\t\tYou grill Father Confessor on what he knows about [i]Girls Girls Girls[/i], you, ${l_name}, The Bull, and The Pitt.  Surprised by the sneak attack, he mumbles something about the red sky and how they just don't make automobiles the way they used to. The harder you grill him, the more vague he becomes.\n\n\t\tSomething's gotta give.\n\t\t*page_break\n\t\t*set sawtooth_out true\n\t\tYou rattle your sawtooth on the window, Father Confessor nervously gasps, as he realizes you're still there. In a drug-induced haze he tells you that ${l_name}, The Bull, and The Pitt have all come to see him in the past twenty-four hours.\n\t\t*goto confessor_confessional\n\t*if (desire = 2) #I've gotta be straight with him and share all my pain.\n\t\t*set jumpin_the_gun %+5\n\t\t*set respect %+5\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*label asleep\n\t\t*gosub hope_for_future\n\n\t\tYou ready yourself to say things you've never told anyone, but before you can, you realize that Father Confessor is asleep.\n\t\t\n\t\tThat's right. He's full on snoring.\n\t\t*label wakeup_1\n\t\t*if (pitts_crime = \"communion\") or (remorse > 60)\n\t\t\n\t\t\t\"Father!\" you exclaim.\n\t\t\t\n\t\t\tHe jolts upright, sputtering apologies. It seems he has a confession of his own to make.\n\t\t\t*goto priests_deal\n\t\t*else\n\t\t\t*label wakeup\n\t\t\t*if in_confessional\n\t\t\t\t*set sawtooth_out true\n\t\t\t\tYou wake him up by rattling your sawtooth on the grille that separates you. \n\t\t\t*if in_confessional = false\n\t\t\t\tYou wake him up with a quick, sharp slap.\n\t\t\tFather Confessor mumbles an apology and gives you center stage. You keep your confession to the important points, making sure the priest keeps his eyes open this time.\n\t\t\t*page_break\n\t\t\t\n\t\t\tWhen all is said and done, Father Confessor nods his head like he already knows the story. \n\t\t\t*goto divulge\n\t#I ask for his counsel. He might speak in riddles, but there could be a key in there.\n\t\t*set take_it_to_the_mattresses %+5\n\t\t*set respect %+5\n\t\tYou tell him about your upbringing and the rigorous demands of the mafia. You tell him about ${l_name} and the fear that has ruled your life because of your love affair with ${l_him}. \n\t\t*if remorse > 60\n\t\t\tYou discuss your guilty conscience and let him know that headcrushing has become too terrible to bear. You explain the mission and how innocent people's lives are now on your shoulders. Finally, you share your plans for the future.\n\t\t*if (remorse \u003c= 60) and (remorse >= 40)\n\t\t\tThe weight of it all has become too much, and after tonight's mission, you know it's time to put some serious distance between you and NOLA.\n\t\t*if remorse \u003c 40\n\t\t\tYou know every little crevice of this town up and down, and your background as a headcrusher gives you more credentials than The Bull and The Pitt put together. Running this town would be a snap, if they stopped running you around….\n\n\t\tExhausted, you wait for his guidance.\n\t\t*page_break\n\n\t\t*if savvy >= 60\n\t\t\t*label note\n\t\t\t*set letter_l true\n\t\t\tHe opens his bible and pulls out a small note. He opens the grille and passes it to you. \n\n\t\t\tFather Confessor has a secret.\n\t\t\t*page_break\n\n\t\t\tOn the letter is ${l_name}'s handwriting. You'd recognize ${l_his} scribble anywhere. This hasty note is wishes, kisses, and things you wouldn't want to be read out loud in a church. You blush a bit…some headcrusher you are! Pull it together! There's more. \"Use the back door\" is written at the bottom under the name.\n\n\t\t\t*choice\n\t\t\t\t#It's too convenient. This could be a setup.\n\t\t\t\t\t*set savvy %+5\n\t\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\t\t*goto threaten\n\t\t\t\t#Maybe the Father will explain.\n\t\t\t\t\t*set jumpin_the_gun %+5\n\t\t\t\t\t*set take_it_to_the_mattresses %-5\n\t\t\t\t\tHe opens a flask and takes a swig, launching into the details.\n\t\t\t\t\t*if (pitts_crime = \"communion\") or (remorse > 60)\n\t\t\t\t\t\t*goto priests_deal\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto divulge\n\t\t\t\t#Truth or not…the priest has read this note. That's an issue.\n\t\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\t\t*set respect %-5\n\t\t\t\t\t*goto threaten\n\t\t*else\n\t\t\tAnd you wait.\n\n\t\t\tYou clear your throat to let him know you're still there and wait a bit more.\n\t\t\t*page_break\n\n\t\t\tThen, you hear it: snoring. He's fallen asleep. He missed everything.\n\n\t\t\t*choice\n\t\t\t\t#Being nice about this just isn't cutting it anymore.\n\t\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\t\t*set respect %-5\n\t\t\t\t\t*set remorse %-5\n\t\t\t\t\t*goto threaten\n\t\t\t\t#Search him. He might have a clue of some sort.\n\t\t\t\t\t*set respect %-5\n\t\t\t\t\t*set savvy %+5\n\t\t\t\t\t*set red_birds true\n\t\t\t\t\t*set letter_l true\n\t\t\t\t\tYou quickly go through his pockets and find only redbirds, lint, and a strip of old beef jerky.\n\n\t\t\t\t\tPocketing his redbirds, you notice his bible on the ground next to him. You pick it up, and a tiny note falls from its pages.\n\n\t\t\t\t\tBingo.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto note\n\t\t\t\t#Wake him up and try again.\n\t\t\t\t\tYou were raised Catholic and you're gonna respect the church.\n\t\t\t\t\t*set respect %+5\n\t\t\t\t\t*set take_it_to_the_mattresses %-5\n\t\t\t\t\tYou are one patient headcrusher.\n\t\t\t\t\t*goto wakeup\n\n*label hope_for_future\nYou explain every detail—the drugs, the violence, the drama, and the rigorous demands of the mafia. You talk about your relationship with ${l_name} and share the many reasons loving ${l_him} will never work. You wrap it all up in a bloodstained bow, divulging the mission, how innocent people's lives are on your shoulders, and that one day, \n*if desire = 1\n\tthis town will be yours. None of this will matter, then.\n*if desire = 2\n\tyou might escape from this vicious existence.  Perhaps he could recommend a nice monastery with not too many chores, preferably in the French Alps?\n*if desire = 3\n\tyou can find someplace far away from NOLA. You'd buy the first picket-fence joint that you could find.\n*if desire = 4\n\tyou and ${l_name} will be reunited—come hell or high water.\n*return\n\n*label confessor_confessional\nFather Confessor shakes his head behind the grille, laughing to himself.\n\n\"${name}, the bishop absolves me of my sins regularly…but…I don't feel cleansed. I'm still a sinner. And the redbird demon has a truly nasty grip on me….\"\n\n*choice\n\t#Wait a minute. This is my confession!\n\t\t*set remorse %-5\n\t\t*set respect %-5\n\t\t*set jumpin_the_gun %+5\n\t\t*set condensed_confession true\n\t\tYou bang on the grille, interrupting the Father and bringing him back to what's really important here—you.\n\t\t\n\t\tFather Confessor mumbles an apology and gives you center stage. You stick to the important facts, making sure the priest keeps his eyeballs open this time.\n\t\t*goto divulge\n\t#Father Confessor needs help, and I might be the only person who can give it to him.\n\t\t*if (pitts_crime = \"communion\") or (remorse > 60)\n\t\t\t*set remorse %+10\n\t\t\t*if desire = 2\n\t\t\t\tWhat a perfect way to start turning away from your violent history!\n\t\t\tPlacing your own needs aside for now, you focus on Father Confessor's cry for help—and he reveals what you had suspected all along.\n\t\n\t\t\t*label priests_deal\n\t\t\t*set confessor_deal true\n\t\t\t*set contracts +1\n\t\t\tThe Pitt—that dirty rat—is the one who got Father Confessor hooked on redbirds in the first place—got him hooked and made sure he had to crawl to The Pitt for more. The Pitt forced Father Confessor to divulge confidential information about other mobsters; otherwise, he'd spike the communion wine with those damn redbirds and make sure Father Confessor got the blame. Father's reputation would be ruined; he might even be defrocked.\n\t\n\t\t\tEven worse, Father still feels the craving. He knows the redbirds are evil, that they're the hook The Pitt has in him, but he's an addict now. He's in a downward spiral, and he's barely holding on.\n\t\t\t*page_break\n\t\n\t\t\t\"I'm a coward.\"  \n\t\n\t\t\tFather Confessor leans back, sweat falling off his forehead, relieved from having spilled it all. You tell him to be strong, to free himself from the pills, because you are going to kill The Pitt tonight. Overjoyed, he kneels with you, desperately thanking you and providing forgiveness for what you are about to do. \n\t\t\t*if (voodoo_necklace = false)\n\t\t\t\t*set rosary true\n\t\t\t\tAs he stands up, he leaves his rosary in your hands, winking at you.\n\t\t\t*comment endif\n\n\t\t\t*if pitts_crime = \"communion\"\n\t\t\t\t*set pocketbook_bible true\n\t\n\t\t\t\t\"I have to show you something,\" he says.\n\t\t\n\t\t\t\tStumbling out of the confessional, he grabs your hand and leads you to the back of the church where he shows you a room full of bits and pieces of crosses, metal, wires, and switchboards. Father Confessor is an inventor. \n\n\t\t\t\tHe picks up a small pocketbook bible and shows you the interior, which is a thick block of silver. He places it in the pocket of your suit jacket. \"This will protect your heart, which is the direct line to God, ${name}.\"\n\t\t\t*comment endif\n\t\t\n\t\t\tHe holds your hand as you walk out and says a short prayer before you leave the church.\n\t\t\t*goto street\n\t\t*else\n\t\t\t*set remorse %+10\n\t\t\tYour attempts to comfort him ring hollow, and he looks at you suspiciously.\n\t\t\t*goto divulge\n\t#I'll let him spill the beans, but I've got things to do.\n\t\t*set jumpin_the_gun %-10\n\t\tFather Confessor babbles about how the redbirds help him to deal with the stress of being the NOLA mobs' preferred priest. You give him a minute to simmer down, and then \n\t\t*if desire = 1\n\t\t\ttell him there are more important matters to tend to at the moment. You destiny is at hand.\n\t\t*if desire = 2\n\t\t\ttell him how he needs to get off of the pills and focus on what's important: saving the city from an all-out mob war.\n\t\t*if desire = 3\n\t\t\ttell him the NOLA mobs will most likely consume each other, and you need his help to get out of this sinking city—fast.\n\t\t*if desire = 4\n\t\t\ttell him how much you love ${l_name}, and that ${l_he} is in trouble. This is no time to counsel him about his addiction. \n\t\t*goto note\n\n*label divulge\n*if remorse >= 55\n\t*set paranoia %-10\n\t*set jumpin_the_gun %-10\n\t*set rosary true\n\tFather Confessor looks at you quite seriously. \"I'm supposed to hold what is said to me in strictest confidence.\" \n\n\tThe priest explains that ${l_name} came to him and shared ${l_his} fear that ${l_he} might be in danger. In the event something bad happened, ${l_name} was sure The Bull would send you calling.\n\n\t\"But this mission is not about ${l_name}—${l_he} is being used as a symbol. You are a good person protecting innocent lives. God will smile upon you for it.\"\n\t*if remorse \u003c= 55\n\t\tYou look at the addled priest skeptically. No one in NOLA is innocent…and that goes for ${l_name} as well.\n\t*if remorse > 55\n\t\tYou can only hope that what the priest says is true.\n\t*comment endif\n\n\tFather Confessor hands you his rosary, in case you need extra heavenly support. Feeling renewed by his blessings, you head out of the church.\n\t*goto street\n*else\n\tThe priest pops some pills he finds in his pocket and chews them like candy, mumbling about the industrialization of school systems.\n\n\t*if in_confessional = false\n\t\t*set in_confessional true\n\t\tHe asks you to take him to the confessional. You help him up and stumble along with him to the shriving booth. Setting him down in his chair, you take your seat on the other side of the grille.\n\t*label threaten\n\t*if sawtooth_out\n\t\tGripping your sawtooth tightly, you\n\t*if sawtooth_out = false\n\t\tWhipping out your sawtooth, you\n\t*if in_confessional\n\t\ttap it meaningfully on the grille that separates you.\n\t*if in_confessional = false\n\t\tapproach the alarmed priest. \n\tHis eyes bug out and he vents a high-pitched shriek. \n\t\n\tHe launches into a bizarre, rambling monologue, full of convoluted conspiracies involving the government, the 1919 Black Sox, the Middle East, and how it's impossible to cook eggs properly in an iron pan. \n\t*if condensed_confession\n\t\tYou not sure what any of this has to do with your confession, ${l_name}, or The Bull.\n\t*comment endif\n\t\n\tThere may be truths in there, but it would take a lifetime to sort them out. \n\t\n\t*choice\n\t\t#I may as well burn the church down. All the mobs'll be pissed, but watching it burn will make me feel better.\n\t\t\t*set respect %-20\n\t\t\t*set take_it_to_the_mattresses %+10\n\t\t\t*set remorse %-10\n\t\t\t*set clips +1\n\t\t\t*set security_missing true\n\t\t\t*achieve burnitall\n\t\t\tIn a sadistic rage, you swipe the candles off the altar and fling them in all directions, sending flames up the giant velvet curtains and igniting the carpets, the pews, and the old wood that has stood the test of time.\n\n\t\t\tFather Confessor screams as his robes and the church are engulfed in fire. You walk out as people come running from all directions, including the security team stationed in front of the [i]Girls Girls Girls[/i] revue.\n\t\t\t*goto street\n\t\t*if (voodoo_necklace = false) #He doesn't deserve to be a priest! I take his rosary.\n\t\t\t*set jumpin_the_gun %+10\n\t\t\t*set remorse %-10\n\t\t\t*set rosary true \n\t\t\t*set red_birds true\n\t\t\t*if in_confessional\n\t\t\t\tYou emerge from the confessional and throw open the door on the Father Confessor's side. Reaching inside, you pull him out and throw him on the ground. He rolls over and raises his hands, expecting you to beat him.  Instead, you lift the rosary off of his neck, snapping it away when he reaches for it.\n\t\t\t\t*goto has_rosary\n\t\t\t*else\n\t\t\t\tYou quickly lift the rosary hanging from his neck, snapping it away when he reaches for it. \n\t\t\t\t*label has_rosary\n\t\t\t\tHe shrieks as you dangle it in front of him. He demands that you return it and promises he will do anything to have it, including getting off those redbirds. You work out a deal with him—if he gets off the drugs and watches your back, he can have his rosary back.\n\t\n\t\t\t\tHe gives you a long look, and then nods, accepting defeat. You put the rosary around your neck and pocket his redbirds before leaving the church.\n\t\t\t\t*goto street\n\t\t#I give him a little love tap.\n\t\t\tNo torture, just a smack to remember me by.\n\t\t\t*set respect %+5\n\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\n\t\t\tAs the priest jabbers on, you exit your side of the confessional, throw open the curtains on his side, and reach in to grab him. With one hand firmly gripping his cassock, you smack him on the back of the head, and toss him out of the confessional. Father Confessor shrieks and backs up on his hands, terrified.\n\n\t\t\t*if red_birds and (remorse > 55)\n\t\t\t\t*set red_birds false\n\t\t\t\t\"You're killing yourself with this garbage,\" you say, throwing the pills at him. \"And you're hurting the Cathedral too. If you were a man, you'd clean yourself up.\" Terrified, he agrees with you and promises to flush them down the toilet.\n\n\t\t\t\tAfter you make him pray for forgiveness at the altar, you leave the church feeling like a Good Samaritan. Hell, he might just change his life around.\n\t\t\t\t*goto street\n\t\t\t*else\n\t\t\t\t\"You're killing yourself with that stuff,\" you say. \"And we need you. You're the only guy a killer like me can call on.\"\n\n\t\t\t\tHe nods and promises that he'll do better. You leave him alone on the ground, sobbing.\n\t\t\t\t*page_break\n\t\t\t\t*goto street\n\t\t#I ask that he pray for me.\n\t\t\t*set remorse %+20\n\t\t\t*set jumpin_the_gun %-10\n\t\t\tYou kneel beside the Father Confessor, and he leads you in a Hail Mary.\n\t\t\t\n\t\t\tWhen you have finished, he makes the sign of the cross over you.\n\t\t\t*if voodoo_necklace = false\n\t\t\t\t*set rosary true\n\t\t\t\tAfter a moment's further thought, he reaches up to his neck and lifts his rosary over his head. He places it around your neck. \n\t\t\tYou thank him fervently.\n\t\t\t\n\t\t\t\"Go with God, my ${son}.\"\n\t\t\t\n\t\t\tYou stand and make your way out of the Cathedral.\n\t\t\t*page_break\n\t\t\t*goto street\n\n*label street\nThe darkness of the early morning greets you again in all its festive insanity—parades in the distance; steamboats blowing their early morning horns; drunks and other users on the street; and most of all, the neon sign on top of the [i]Girls Girls Girls[/i] revue, blinking in the darkness just a block away.\n*finish", "book_it": "*temp hit_by_cabbie false\n[b]Chapter Five: Book It[/b]\n\nThis is really turning out be one hell of a night. It'll go down in the history books. It's 3AM and ${l_name} is running out of time. Soon, daylight will break, and it when it does, someone's going to be dead.\n*if wounds >= 3\n\tThe pain from your wounds might slow you down if you let it get to you now. Focus is key.\n*comment endif\n\nYou gotta get all the way back through the French Quarter to Jackson Square—fast.\n\n*choice\n\t#Steal a police horse.\n\t\tA police stable is nearby, full of obedient Clydesdales waiting to hit the streets. \n\t\t\n\t\t*goto barn\n\t#Hail a cab.\n\t\tCabbies can't always be trusted, but hell, it's a fast ride.\n\t\t\n\t\t*goto cab\n\t#Use what my momma gave me: run.\n\t\tThe mob has drilled self-reliance into you, after all.\n\t\t*goto runstreet\n\n*label barn\nLeaping from the shadows, you run towards the smell and sound of horses. Through a hole in the fence, you see the big red barn where the horses are being kept.\n\nThere are cops swarming all over. \n\n*choice\n\t#I sneak into the barn. It will take some tricky maneuvering but it just might work….\n\t\t*set jumpin_the_gun %-10\n\t\t*label sneak\n\t\tHopping the old fence, you inch your way along until you see a corral. An old woman with a long braid is picking up horse shit, her back hunched over as her aching knees pop.\n\t\t\n\t\t*choice\n\t\t\t#I'll talk to the old woman. She might help me, depending on what mood she's in.\n\t\t\t\t\"Psst,\" you say from the shadows. She doesn't hear you, so you say it again, louder. She turns around and squints into the darkness.\n\t\t\t\n\t\t\t\t\"Who is that?\" She says, too loud. You slowly step out of the shadows, motioning for her to keep it down. \n\n\t\t\t\t*if pitts_crime = \"animals\"\n\t\t\t\t\t*set remorse %-10\n\t\t\t\t\t*set savvy %+5\n\t\t\t\t\tShe takes a good long look at you, and her eyes pop open wide. \"${name},\" she says, \"is that really you?!\"\n\n\t\t\t\t\t*label meet_horsekeeper\n\t\t\t\t\tShe slaps her knee, southern-style, and a surprisingly childlike laugh escapes her lips. She reminds you that years ago, you stopped The Pitt from torturing her dog, Abigail, who had strayed from her small farm and unfortunately wandered into his hands. \n\n\t\t\t\t\tAbigail ended up with a missing ear and had to be taken to the hospital, but you saved her life. With tears in her eyes, the old woman explains that Abigail died only a couple years ago. She lived a full, healthy life because of you.\n\t\t\t\t\t*label meet_horsekeeper_1\n\t\t\t\t\t*page_break\n\n\t\t\t\t\t\"What do you need, honey?\" the grateful old woman asks.\n\t\t\t\t\t\n\t\t\t\t\t\"A horse. And fast,\" you reply, clearly pressed for time.\n\t\t\t\t\t\n\t\t\t\t\tWithout further delay, she leads out a beautiful roan with clean lines. \"His name's Lightning,\" she says, \"and he lives up to it, so be careful.\"\n\n\t\t\t\t\tShe takes the spurs off her boots and transfers them to your shoes. \"I don't like using spurs,\" she says, \"but Lightning is as stubborn has he is fast. It's the only way you can control him. And spurs are sharp—you might find a use for them….\"\n\t\t\t\t\t*set spurs true\n\n\t\t\t\t\tShe keeps Lightning steady as you get a foot into the stirrup and swing yourself into the saddle. Lightning paws the ground, as the old woman hands you the reins. The giant beast suddenly rears and takes off, jumping over the fence!\n\t\t\t\t\t*page_break\n\n\t\t\t\t\tThe old woman runs after you, telling you to hold on as Lightning bolts towards the street.\n\t\t\t\t\t*goto pursuit\n\t\t\t\t*elseif savvy > 65\n\t\t\t\t\t*set paranoia %-5\n\t\t\t\t\t\"What do you want?\" she says.\n\t\t\t\t\t\n\t\t\t\t\tYou tell her you need a horse. Whether it's your natural charm or the sawtooth sticking out of your belt, she agrees and introduces you to a big roan. \"His name's Lighting,\" she says. \"He's got a bit of a temper, just like some folks do.\"\n\t\t\t\t\t\n\t\t\t\t\tYou lead the horse out the gate and pull yourself onto the saddle. Lightning bolts forward as you hold on for dear life, the old woman laughing behind you.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto pursuit\n\t\t\t\t*else\n\t\t\t\t\tShe steps back. \"Oh my! Help! Someone help!\"\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto threaten\n\t\t\t#I sneak past her. She works for the heat. She can't be trusted.\n\t\t\t\t*set paranoia %+5\n\t\t\t\t*label olympic\n\t\t\t\tWhile her back is turned, you run like an Olympic medalist towards the barn, diving through the corral fence—right into horse shit.\n\t\t\t\t\n\t\t\t\tGross. Really, really gross. \n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tYou wipe yourself off the best you can, but before you can got to your feet, a couple of pigs enter the corral. You crouch next to a horse's rear legs as the two cops choose their horses and mount up. You ready yourself to move as soon as they're gone, but before you can, the horse lets loose right above you, spilling its inner contents all over your hat and shoulders.\n\t\t\t\t\n\t\t\t\t\"This just isn't my day,\" you mutter, as you get the worst of it off you. You look, and lo and behold, a big roan horse waits right beyond the fence, already saddled and ready to go.\n\t\t\t\t\n\t\t\t\tIt's time to ride.\n\t\t\t\t\n\t\t\t\tSlinking through the fence, you unhook the horse from its post. You plant a foot in the stirrup and swing yourself into the saddle. As soon as he feels an unfamiliar rider on his back, the horse bolts.\n\t\t\t\t*label beast\n\t\t\t\t\n\t\t\t\tAs you try, and fail, to navigate, the cops around you clear out of your way to avoid getting trampled. The horse is clearly the one in control here, and its gait is quite bumpy. The horse takes you out onto the street and runs south, towards the French Quarter.\n\t\t\t\t*goto pursuit\n\t\t\t#I'll threaten her. A little bit of fear isn't going to hurt anyone.\n\t\t\t\t*if pitts_crime = \"animals\"\n\t\t\t\t\t\"Old lady…\" you begin, raising your sawtooth to give her a good look at it.\n\t\t\t\t\t\n\t\t\t\t\tShe turns and takes a look at you.\n\t\t\t\t\t*if identity_revealed\n\t\t\t\t\t\tShe seems distinctly unimpressed by your ruined suit.\n\t\t\t\t\t\"Oh, dearie,\" she says. \"Put that toothpick of yours away.\"\n\t\t\t\t\t\n\t\t\t\t\tWhile you don't recognize her face—she's grown old since you last saw her—you recognize the voice. It's the woman who owned the poor dog that The Pitt tortured almost to death so long ago. With tears in her eyes, the old woman explains that Abigail—the collie—died only a couple years ago, having lived a full and happy life.\n\t\t\t\t\t*goto meet_horsekeeper_1\n\t\t\t\t*else\n\t\t\t\t\t*label threaten\n\t\t\t\t\t*set jumpin_the_gun %+5\n\t\t\t\t\tYou jump the fence and grab the old woman, putting your hand over her mouth and the sawtooth to her throat. \n\t\t\t\t\t\n\t\t\t\t\t\"Make a noise and you're dead,\" you say. \"Nod if you understand me.\" When she does, you continue. \"I need a horse, and you're gonna get me one. If you do anything else, my sawtooth is gonna get up close and personal with your jugular.\"\n\n\t\t\t\t\tShe nods again, and you release her. She grabs the reins of a big roan and hands them to you.\n\t\t\t\t\t\n\t\t\t\t\t\"This here is Lightning,\" she says. \"He's got a bit of a temper, just like some folks.\" \n\t\t\t\t\t\n\t\t\t\t\tYou lead the horse out the gate and pull yourself onto the saddle. Lightning bolts forward as you hold on for dear life, the old woman laughing behind you.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto pursuit\n\t#If I cause a diversion, the coppers will clear out of the barn. As long as I don't get caught in the process….\n\t\t*label diversion\n\t\tA diversion! Brilliant! Draw them out like flies, and then take the goods.\n\t\t\n\t\tYou run back to the police car and open the door. Reaching past the grisly remains of the cop, you start the siren. As the lights and sounds leap to life, you shut the door and hide behind a bush. \n\t\t*page_break\n\t\t*if savvy >= 65\n\t\t\tWhat a great plan! The cops come running and surround the car. While they're chattering over the still-warm corpse in the car, you slink from behind the bush and head towards the barn.\n\t\t\n\t\t\tAs you approach, you see a horse saddled up and ready to go. Jumping on, you fix your hat and grab the reins.\n\t\t\n\t\t\tHi-ya!\n\t\t\n\t\t\tThe horse runs, fast. A little too fast. He gallops out of the barn, through the lot, onto the street, and right through the crowd of cops.\n\t\t\t*page_break\n\t\t\t*goto pursuit\n\t\t*else\n\t\t\tYou were right, the coppers come running…but so do their dogs.\n\t\t\n\t\t\tAs the cops discover the body inside the car, the three huge German Shepherds that accompany them start to bark. More cops run from the barn, preventing your escape. The dogs sniff the air and begin to hone in on the bushes.\n\t\t\n\t\t\tDamn. They must know you're there.\n\t\t\n\t\t\t*choice\n\t\t\t\t#Screw the barn. I make a run for it.\n\t\t\t\t\t*set jumpin_the_gun %+5\n\t\t\t\t\t*label run\n\t\t\t\t\tYou run as fast as you can towards the nearby intersection, pushing past the heat and knocking them down like bowling pins. Looking behind you, you see cops coming after you in a giant mob, those big dogs off their leads and hot on your trail.\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\tA large crowd waits at the intersection, but you have no time to waste, so you barrel through them. One of the guys you hit takes a swing at you, but hits someone else, and a massive donnybrook immediately erupts. A cabbie swerves past you right into a parked car. As you reach the other side of the street, the crowd spots you.\n\t\t\t\t\t*goto darkness\n\t\t\t\t*selectable_if (jumpin_the_gun \u003c 60) #I wait it out. They might not smell me.\n\t\t\t\t\t*set jumpin_the_gun %-10\n\t\t\t\t\t*set savvy %+10\n\t\t\t\t\t*label wait\n\t\t\t\t\tYou crouch, holding your breath, as the dogs get closer and closer to the bush you're hiding behind. Cops are everywhere.\n\t\t\t\t\t\n\t\t\t\t\tThey're probably picking up the smell of the river water, you realize as they get even closer. One lifts his head and barks. They are right next to the bush….\n\t\t\t\t\t*page_break\n\t\t\t\t\t\n\t\t\t\t\tSuddenly a singing drunkard appears across the street and takes a whiz right in front of everyone. For a timeless moment, everybody freezes, and then the dogs start running across the street, followed by laughing cops, who arrest the drunk…with his pants down. \n\t\t\t\t\t\n\t\t\t\t\tWith the heat distracted, you make a run for the barn. Gotta love it when it all works out. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto sneak\n\t\t\t\t#I steal the horse that a nearby cop is riding.\n\t\t\t\t\t*set respect %+5\n\t\t\t\t\tAs a horse clip-clops by, you jump out of the bush and pull the cop out of the saddle. Before he can react, you put a foot in the stirrup and swing yourself on to the horse's back. \n\t\t\n\t\t\t\t\t*goto pursuit\n\t#I wait for a cop to ride by and pull him off his horse. \n\t\tAs a horse clip-clops by, you jump out of the bush and pull the cop out of the saddle. Before he can react, you put a foot in the stirrup and swing yourself on to the horse's back. \n\n\t\t*label pursuit\n\t\t*set respect %+5\n\t\t*set jumpin_the_gun %+5\n\t\tWoohoo! What a rush! \n\t\t\n\t\tA mob of cops, on foot and on horseback, try to chase you, but they can't keep up. It looks like you are going to get away!\n\t\t\n\t\tThen you are hit with a tree branch—and another and another.\n\t\t*page_break\n\t\t\n\t\tSeeing stars, you hold on for dear life. The horse gallops through the intersection ignoring everything in its path, as cars and people get out of the way. One of the cars runs into a fire hydrant. A river bursts forth, blocking the cops on their horses.\n\t\t\n\t\tSo long suckers!\n\t\t*label runaway_horse\n\t\t*set heat %+10\n\t\t*page_break\n\t\tThe horse runs through The Dragon's territory, past the switchblade-wielding gutterpunks and straight to the river. You pull on the reins, but its heavy hooves continue to pound the street. \n\n\t\t*if spurs = true\n\t\t\tRemembering the spurs the old woman gave you, you kick then into Lightning's side and heave hard on the reins. He puts the breaks on and skids to a stop at the edge of the river. You are thrown forward, but catch yourself on his neck just in time. \n\n\t\t\tPhew!\n\n\t\t\tYou swing yourself out of the saddle, and drop the reins. You smack Lightning's butt, and the big roan trots happily down the cobblestones back toward the police station. \n\t\t\t*page_break\n\t\t\t*goto cathedral\n\t\t*else\n\t\t\t*set wounds +1\n\t\t\tThe horse gallops right to the edge of the river and stops suddenly. You grab for his neck but miss, and he pitches you right back into the river.\n\t\t\t*page_break\n\t\t\t\n\t\t\tAfter the initial shock and the all-too-familiar taste of filthy water, you claw your way to the surface. This time you get lucky; there's no heat on your trail. You splash your way to a dock and grab on, using your fingernails to dig into the wood and pull yourself up.\n\t\t\t\n\t\t\tThis is determination.\n\t\t\t*page_break\n\t\t\t*goto cathedral\n\n*label cab\nYou jog back to the main street, and throw your arms up in the air like a wild ${man}. Cars zoom past you as you look for the telltale yellow of a cab.\n\nThere's one!\n\nThe cab pulls up next to the curb. Perfect. You open the door, but before you can get in, you're rudely bumped out of the way by a pretentious couple in black evening wear.\n\n\"Excuse me,\" the man says, as they push you aside and get into the cab.\n\n*choice\n\t#I let it go and get the next cab. It's not worth dealing with these monkeys.\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*set savvy %+5\n\t\t*set juice -100\n\t\t*set respect %-10\n\t\tYou take a step back and let them get into the cab, thinking all the while that they have no idea how lucky they are. They ignore you as you shut the door for them like their butler.\n\n\t\t[i]Hasta la vista[/i], baby.\n\n\t\tThe cab drives off, spraying you with water from the street. You fiddle with the sawtooth in your pocket, telling yourself that you made the right decision; there was no time to teach those two common courtesy.\n\t\t*page_break\n\t\tYou turn back to the maze of headlights and raise your hand again as you search for another cab. \n\t\t\n\t\tAha! Victory! \n\t\t\n\t\tAnother cab quickly pulls into the spot where you were so rudely interrupted. \n\t\t*label nextcab\n\t\tYou open the door and see a Rastafarian cabbie, straight from the islands.\n\t\t\n\t\t\"Eh, yah ready to go, ${mahn}?\" He turns around, a big ol' spliff hangin' from his mouth and dreads framing his face.\n\t\t\n\t\tYou hop in.\n\t\t*page_break\n\t\t*label traffic\n\t\t\"St. Louis Cathedral,\" you say as the cab moves through traffic. \"A'ight ${mahn},\" he replies, turning up the music. A weird mash-up between swamp jamboree funk and reggae floats towards the back. The entire cab has the dense, overwhelming smell of patchouli. \n\t\t\n\t\tThe cabbie's dreads bounce to the music as the end of his spliff lights up in the darkness.  After a few puffs, he offers it back to you.  \"Take a toke'a'dis, yah. For all good luck on dis night.\"\n\t\t\n\t\t*fake_choice\n\t\t\t#I'll pass. Everybody smokes nowadays…but I have to keep my mind on my mission.\n\t\t\t\t*set jumpin_the_gun %-10\n\t\t\t\tYou pass on the weed, but you can't pass on the smoke, which tickles your throat. You cough.\n\t\t\t#I don't care that he smokes, but I don't want to be in an enclosed space with it.\n\t\t\t\t*set paranoia %+10\n\t\t\t\tRolling down the window, you breathe some fresh air. The cabbie takes notice and smiles in the rear view mirror. He's got one gold tooth.\n\t\t\t#I could use a toke right about now.\n\t\t\t\tHe nailed it.\n\t\t\n\t\t\t\tYou take a toke—for good luck—and pass it back. It hits you…hard. This weed is potent! You relax as the worst of your aches dissipate. \n\t\t\t\t*if wounds > 0\n\t\t\t\t\t*set wounds -1\n\t\t*comment endif\n\t\t\n\t\t*if (take_it_to_the_mattresses \u003c= 40) and (wounds \u003c= 3)\n\t\t\tThe cabbie settles in and focuses on driving, headed towards Jackson Square with music blaring. Suddenly, he brakes hard. The beautiful St. Louis Cathedral gleams on the far side of the Square.\n\t\t*if (take_it_to_the_mattresses > 40) or (wounds > 3)\n\t\t\t*set juice -500\n\t\t\t*set deal_cabbie true\n\t\t\tLooking over his shoulder, the cabbie \n\t\t\t*if hit_by_cabbie\n\t\t\t\tnotices the blood on your shirt—no, no, the other blood, not from where he hit you with his cab—and the determined look in your eyes.\n\t\t\t*if hit_by_cabbie = false\n\t\t\t\tnotices the blood on your shirt, and the determined look in your eyes.\n\t\t\tYou decide to milk him for information. He lets you know that he'll talk, but for a price. Once he has the cash in hand, he smiles. \n\t\t\n\t\t\t\"Yah. Only da fineest aristo-cats go to [i]Girls Girls Girls[/i], yah know?\"  He proceeds to tell you about how he takes CEOs, politicians, and social kings over to the revue at all hours of the night. He also gives you the setup. \n\n\t\t\t\"They got two security guards at the front door and three in the back. Nobody sees the owner, not never. Customers don' know who it is, and maybe is good, cos lots of them got a beef with him.\n\n\t\t\tHe hands you a bag of his weed, telling you that it's like gold to some of the girls there. He also tells you that a performer named Lulu Luscious is the one to talk to. She might even know where the owner hangs out….\n\t\t\t*page_break\n\t\t\n\t\t\tThe cabbie brakes hard in front of Jackson Square. St. Louis Cathedral gleams on the far side.\n\t\tYou pay him his fare plus a nice tip and thank him kindly, shutting the door. He turns up his Rastafarian swamp music and drives off.\n\t\t\n\t\tBefore you kick down the door of the [i]Girls Girls Girls[/i] revue, you need to make a pit stop. It's time to pay Father Confessor a little visit.\n\t\t*finish\n\t#Screw these people. This is my cab!\n\t\t*if jumpin_the_gun \u003c 55\n\t\t\tYou grab the unsuspecting couple, one hand on each, and pull them out of the way. \n\t\n\t\t\tYou get into the cab, but before you get the door shut, a purse hits you in the face. Two hands reach in, grab you by the collar, and throw you on the ground before you can see who they belong to.\n\t\n\t\t\tThe couple gets into the cab while you lie on the ground. A cop is standing over you, her hands on her hips. She dresses you down for your rudeness and writes you a ticket. \"Next time, I'll take you in.\"\n\t\n\t\t\tYou take the ticket like an obedient citizen and shove it in your pocket. The cop walks away, looking back at you suspiciously.\n\t\t\t*page_break\n\t\t\tYou turn back to the maze of headlights and raise your hand again as you search for another cab. \n\t\t\n\t\t\tAha! Victory! \n\t\t\n\t\t\tAnother cab quickly pulls into the spot where you were so rudely interrupted. \n\t\t\t*goto nextcab\n\t\t*else\n\t\t\tA nearby beat cop gives you a sideways glance as you push the couple out of the way, but apparently she has bigger fish to fry tonight.\n\t\t\t\n\t\t\tYou jump into the back of the cab and tell the cabbie to hit the gas. You even go so far as to stick your head out the window and flip off the couple as you speed away. What can you say, you're petty like that.\n\t\t\t*page_break\n\t\t\t*goto traffic\n\t#I offer to share the ride.\n\t\t*set savvy %+5\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*set paranoia %-5\n\t\t*set juice -50\n\t\tQuickly running around the other side, you jump in next to the overdressed, stuck-up woman and offer to share the ride.\n\n\t\tThe man—wearing a tux with his hair slicked back—is amused. He shuts the door. \"Sure, why not.\"\n\n\t\tYou tell the cabbie to take you to Jackson Square as the woman wrinkles her nose at the way you smell. Before you can ask, the couple mentions true tourist-style how excited they are to be hitting one of the city's most notorious spots…none other than the [i]Girls Girls Girls[/i] revue. \n\n\t\tOh my, what a coincidence.\n\n\t\tThey tell you how [i]Girls Girls Girls[/i] caters only to the finest of society—a high class way for the elite to mix with the dirty NOLA underground. And they mix quite well. Everyone knows about it and wants in. That's why they flew all the way from Chicago, just to pay an absurd amount of money to be a part of it.\n\n\t\tDropped off first—at Jackson Square—you say goodbye and shut the door. Before you kick down the door at the [i]Girls Girls Girls[/i] revue, you need to stop by St. Louis Cathedral.\n\n\t\tIt's time to pay Father Confessor a little visit.\n\t\t*finish\n\n*label runstreet\nTaking a deep breath, you break into a run. You're well on your way, the insanity of the police station falling further behind you with each step. \n\nYou reach an intersection with traffic blocking you, so you wait for the walk signal. Once it appears, you dash across the street.\n\nA yellow cab comes racing towards you, not noticing the red light. The cabbie slams on the brakes a few feet away from you, but it's too late!\n*set hit_by_cabbie true\n*set wounds +1\n\nBAM! \n\nYou hit the hood of the car as it skids to a stop, getting a glimpse of a Rastafarian-looking cabbie at the wheel. You clearly see the panic in his face as you roll off the car and hit the pavement. \n\nEverything goes black.\n*page_break\n\nSlowly coming to, you distantly hear cars honking around you, a woman screaming, and the pounding of feet. Your eyes open slowly to see the cabbie speaking to you, but you can't make out what he's saying.\n\nYou hear someone calling 911. \n\nUh-oh.\n\nYou struggle to get up, while everyone around you is too busy panicking to notice. A fight breaks out between the cabbie and the screaming woman. They've all lost it. \n\nWith sheer will, you crawl away and, when you make it to the sidewalk, you stagger to your feet. Meanwhile, no one notices your departure; they are too preoccupied with the brewing mayhem. The fight between the cabbie and the woman is drawing drunks like flies. All they need is an oil barrel on fire, and it would be a regular shindig.\n\n*label darkness\nAs you try to disappear, the heat floods the scene and breaks up the fight. An ambulance arrives, blue and red lights flashing.\n\n\"There ${he} is!\" someone yells out, alerting the heat to your whereabouts. \n\nA cop on a horse trots over in your direction.\n\n*choice\n\t#Run. Fast.\n\t\t*set jumpin_the_gun %-10\n\t\t*set savvy %+10\n\t\t*set respect %-5\n\t\tWithout looking behind you, you take off like there's no tomorrow, past drunk tourists headed back to their Château hotels. Hearing the horse behind you, you try to lose the cop by going down a side street and cutting over, but it's not working.\n\t\t*page_break\n\n\t\tSuddenly, big band music erupts ahead, and a sea of men dance down the streets with their shirts off. You realize that Southern Decadence, the largest annual gay celebration in this part of the country, has come home to NOLA.\n\n\t\tGiant floats celebrating the  pass by, while bears, queens, and all those in between party like it's 1999. \n\n\t\t*choice\n\t\t\t#Jump onto a float!\n\t\t\t\tRunning into the crowd, you leap onto a rainbow colored float in the shape of male genitalia. High-fiving the dancing men, you hide your jacket and hat away, and start to dance. Everyone is having a fantastic time.\n\n\t\t\t\tSomeone hooks you up with a drink. You inspect it.\n\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Nice! Water is life. \n\t\t\t\t\t\tThe cool water slides down your throat, refreshing you.\n\t\t\t\t\t#Total score. It's beer.\n\t\t\t\t\t\tThe crowd chants for you to chug, and you oblige, the cold beer soothing as it goes down your throat.\n\t\t\t\t\t\t*if wounds > 0\n\t\t\t\t\t\t\t*set wounds -1\n\t\t\t\t\t#Wine of the gods.\n\t\t\t\t\t\tGotta love NOLA.\n\t\t\t\t\t\t*if wounds > 0\n\t\t\t\t\t\t\t*set wounds -1\n\t\t\t\t\t#Sex on the beach. Sweet!\n\t\t\t\t\t\tYou down the colorful drink in full Southern Decadence style.\n\t\t\t\t\t\t*if wounds > 0\n\t\t\t\t\t\t\t*set wounds -1\n\t\t\t\t*comment endif\n\n\t\t\t\tThe cop on the horse stops and looks around at the crowd. You can see him trotting back and forth, getting frustrated until he practically barrels through the dancing crowd and disappears into the darkness. Meanwhile, you keep dancing like a happy fool and even get a cold barrel of ice water tossed on you while gyrating on top of the float. It totally wakes you up, and the crowd goes wild.\n\n\t\t\t\tThe parade winds around the river, conveniently going right past Jackson Square. You get off the brightly colored float and bid the parade goodbye. They continue on their merry way. \n\t\t\t\t*page_break\n\t\t\t\t*goto cathedral\n\t\t\t#Join the party of dancing bears.\n\t\t\t\tWoohoo! You strip off your hat and jacket, tie them around your waist, and run straight into the heart of the parade. A man waving rainbow garlands in the air throws one over your shoulders, and you break it down for your newfound friends on the street. \n\n\t\t\t\tThe cop approaches on his horse, scanning the jubilant crowd, but the bears tower over you, easily blocking his view. A marching band passes by, causing even more confusion. With a sigh, the cop turns the other direction of the seemingly unending parade. \n\t\t\t\t*page_break\n\n\t\t\t\tThe parade moves on as you practice some dance moves—the Sprinkler, the Chain Saw, the Running Man, the Macarena, and Gangnam Style. The crowd loves it and cheers you on, showering you with gifts of liquid and a rainbow flag to wave. \n\n\t\t\t\t*if desire = 2\n\t\t\t\t\tIt feels good to let go of the mission and your memories for a brief time.\n\t\t\t\t*if desire = 3\n\t\t\t\t\tIs this what retirement in Mexico would be like?\n\t\t\t\t*if desire = 4\n\t\t\t\t\tAs you dance, you realize that ${l_name} would fit right into this crowd. $!{l_he} is a great dancer and has mentioned Southern Decadence a few times.\n\t\t\t\t*comment endif\n\n\t\t\t\tYou are now officially one of the family.\n\n\t\t\t\tThe parade winds around along the river, conveniently passing by Jackson Square. Hugging your friends and waving your rainbow flag, you make your way to the sidewalk. St. Louis Cathedral's beautiful arches gleam in the night just beyond the park.\n\n\t\t\t\tPutting on your jacket and hat, you hand the garland and flag to a couple walking by.\n\t\t\t\t*goto cathedral\n\t\t\t#Are you kidding me? I don't have time for parades!\n\t\t\t\t*set jumpin_the_gun %+10\n\t\t\t\tRunning through the dancing crowd—and almost knocking a few over in the process—you make it through to the other side. The cop on the horse, meanwhile, is blocked by the parade. He guides the horse back and forth, his flashlight searching for you.\n\n\t\t\t\tCareful to stay in the shadows, you skirt the edge of The Dragon's territory until you turn a corner and hit Jackson Square. Before you kick down the door of the [i]Girls Girls Girls[/i] revue, you need to stop in at St. Louis Cathedral.\n\n\t\t\t\tIt's time to pay Father Confessor a little visit.\n\t\t\t\t*finish\n\t#Steal his horse.\n\t\t*set jumpin_the_gun %+10\n\t\t*set heat %+10\n\t\t*set take_it_to_the_mattresses %+5\n\t\tAs a horse clip-clops by, you jump up and pull the cop out of the saddle. Before he can react, you put a foot in the stirrup and grab the reins. The horse trots down the road with you halfway in the saddle. You slide your foot into the other stirrup as the bewildered cop starts to chase after you.\n\n\t\t\"Hi-ya!\" you shout, using the reins to whip the horse's withers.\n\n\t\tThe powerful animal whinnies and takes off, faster than you thought it would. You hold onto your hat for dear life as the horse barrels through an intersection, knocking over pedestrians and even jumping over the hood of a car.\n\n\t\tSo long suckers!\n\t\t*goto runaway_horse\n\t#Jump the fence of the closest French manor nearby and hide.\n\t\t*set savvy %+15\n\t\tYou get a running start and grab a tall white gate next to an old manor. You scramble to the top of the gate when you notice that it isn't locked. You pull the latch, and the gate swings open easily. You drop to the ground, lay flat on your back, and sigh.\n\n\t\tWhat a night.\n\t\t*page_break\n\n\t\tAs the gate closes behind you, the silhouette of a woman fills your vision. Illuminated by a fire in the background, she holds out her gloved hand as classical music fills the air.\n\n\t\tHow do you feel about this?\n\n\t\t*fake_choice\n\t\t\t*selectable_if (paranoia > 35) #Definitely alarmed. I'm on private property, and she could have a gun behind her back.\n\t\t\t\t*set paranoia %+5\n\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t*selectable_if (paranoia \u003c 65) #Cool as a cat.\n\t\t\t\t*set paranoia %-5\n\t\t\t\t*set take_it_to_the_mattresses %-5\n\t\t\t#A bit weary, but this grass feels nice.\n\t\t\t\t*set paranoia %+5\n\t\t\t\t*set take_it_to_the_mattresses %-5\n\t\t*comment endif\n\n\t\tYou blink and then take her hand. As she helps you stand up, you meet her large brown eyes. She gives you a warm smile and addresses you in French, still holding your hand. She's dressed in classic Renaissance attire, and her brown hair is pulled tight in a long braid.\n\t\t*if wounds >= 4\n\t\t\tShe [i]tsks[/i] at the condition of your attire. You look down in embarrassment at your shredded clothes, but her fingers find your chin and lift your eyes to hers. It doesn't matter anymore.\n\t\t*comment endif\n\n\t\tShe brings you over to the fire, where you discover a fancy soirée. The partygoers are dressed in elegant and colorful gowns and suits, complete with puffy sleeves and masks. A woman plays a harp on a small stage, while stuffy butlers carry around treats. Everyone looks at you, and the harp player stops. \n\t\t*page_break\n\n\t\tA servant brings a silver tray with a goblet full of red wine and a little chocolate treat. The party resumes, and the harp player begins again, creating a relaxing feeling.\n\t\t*if wounds > 0\n\t\t\t*set wounds -1\n\t\t*comment endif\n\n\t\tThe Bull, The Pitt, and ${l_name} slip away with the rest of the world. Time stands still, and the beauty of this moment touches you. You reach for the wine.\n\n\t\tAs you slowly lift the goblet up to your lips, you notice that behind the masks, all the eyes are on you. The music gains intensity, and you look at the harpist. Two red holes mar her neck, and seeping blood stains her white dress. Looking back at the guests, you see one licking redness off her fingers.\n\n\t\tThe woman with big brown eyes continues to speak sweetly to you and touch your arm. You slowly bring the cup to your lips….\n\t\t*page_break\n\t\t\n\t\tBefore you drink, you notice a mound of bodies lying on the grass behind the party. They look as though they just came off the street—vagrants, gypsies, homeless men and women.  You look back to the harp player, and see her shining eyes pleading. \n\n\t\t\"Help me,\" she seems to mouth as she plays. You look down at the goblet and the red fluid inside, which leaves a thick coat on the glass as it swirls.\n\t\t\n\t\tThe French woman comes closer to you, her eyes boring into you. What the hell are they?\n\t\t\t\n\t\t*choice\n\t\t\t#Vampires. Get away from her!\n\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\t*set paranoia %+10\n\t\t\t\t*set jumpin_the_gun %+5\n\t\t\t\t*set juice -100\n\t\t\t\tTurning to the French woman, you throw the blood in the goblet in her face. She stops, horrified, and the rest of the party, including the harp player, watch you in shock. \n\n\t\t\t\tShe starts to whine, wiping the blood from her eyes…or is it blood? You smell the goblet.\n\t\t\t\t\n\t\t\t\tOh. It's not blood. It's Dubonnet.\n\n\t\t\t\tYou look over behind the party, searching for the mound of bodies, but they aren't there anymore. A second look at the harp player reveals that she doesn't have any holes or blood on her neck….\n\n\t\t\t\tThe French woman curses at you as the expensive aperitif runs down her face. Before you can apologize, two large men in short pants grab you, haul you to the gate, and toss you back into the street. \n\t\t\t\t*page_break\n\t\t\t\t*if hit_by_cabbie\n\t\t\t\t\tAs you dust yourself off, a cab with a dented hood rolls up. The Rastafarian who hit you rolls the window down and lights up a spliff.\n\t\n\t\t\t\t\t\"Eh, I'm'a sorry bout hittin' yah earlier. Need a rieede?\"\n\t\t\t\t\t\n\t\t\t\t\tAs a matter of fact, you do. You jump in and the cab burns rubber.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto traffic\n\t\t\t\t*else\n\t\t\t\t\tAs you dust yourself off, a cab with a dented hood rolls up. A Rastafarian-looking cabbie rolls the window down and sticks his head out, a spliff hanging from his lip.\n\t\t\t\t\t\n\t\t\t\t\t\"Eh, ${mahn}.  You need a rieede?\"\n\t\t\t\t\t\n\t\t\t\t\tAs a matter of fact, you do. You jump in and the cab burns rubber.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto traffic\n\t\t\t#C'mon, vampires don't exist.\n\t\t\t\t*set savvy %+5\n\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\t*set paranoia %-10\n\t\t\t\t*set juice +2000\n\t\t\t\t*set juice -100\n\t\t\t\tYou throw down the goblet as she approaches, her fangs showing. You reach up quickly and yank out her fake teeth.\n\n\t\t\t\tThe French woman screams, her spell and illusion broken. Horrified, she clamps her gloved hands over her mouth, ashamed of her normal teeth. As the entire party gasps, you run up and lead the harpist from the small stage.\n\t\t\t\t\n\t\t\t\tThe partygoers start to argue, throwing down their goblets. The French woman backs up, shaking her head in horror.\n\n\t\t\t\t\"She's not a vampire?\" The harpist looks at you as she comes off the stage. \n\n\t\t\t\t*page_break\n\t\t\t\tYou go over to the mound of bodies and nudge one of them. The trance breaks—everyone's eyes pop open, and they all start to move. The partygoers get more riled up as the actors stand and demand their paychecks. The French woman flees to her manor, and everyone chases after her.\n\n\t\t\t\tThe harpist hangs back with you, touching her own neck. She is amazed how real the teeth were, and relieved that this wasn't a vampire party.\n\t\t\t\t\n\t\t\t\tShe follows you to the gate and pulls out a wad of bills from her corset. \"Take it. For helping.\" You take it, thanking her and bidding adieu. Once she's gone, you riffle through the cash. Two grand. Not bad.\n\t\t\t\t\n\t\t\t\tStepping outside the manor, you notice the heat has disappeared. It's like nothing ever happened. \n\n\t\t\t\t*if hit_by_cabbie\n\t\t\t\t\tA cab with a dented hood rolls up. The Rastafarian who hit you rolls the window down and lights up a spliff.\n\t\n\t\t\t\t\t\"Eh, I'm'a sorry bout hittin' yah earlier. Need a rieede?\"\n\t\t\t\t\t\n\t\t\t\t\tAs a matter of fact, you do. You jump in and the cab burns rubber.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto traffic\n\t\t\t\t*else\n\t\t\t\t\tA cab with a dented hood rolls up. A Rastafarian-looking cabbie rolls the window down and sticks his head out, a spliff hanging from his lip.\n\t\t\t\t\t\n\t\t\t\t\t\"Eh, ${mahn}.  You need a rieede?\"\n\t\t\t\t\t\n\t\t\t\t\tAs a matter of fact, you do.  You jump in and the cab burns rubber.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto traffic\n\t\t\t#A vampire cult? Really? Sounds like my kind of folks.\n\t\t\t\t*set savvy %+5\n\t\t\t\t*set paranoia %-10\n\t\t\t\t*set remorse %-10\n\t\t\t\t*if hit_by_cabbie\n\t\t\t\t\tYou reach for the goblet and take a swig. The blood fortifies you.\n\n\t\t\t\t\tThe harpist opens her mouth in slow-motion. The scream begins before her lips have even had time to part.\n\n\t\t\t\t\tBut she's yellow. And shaped suspiciously like a cab.\n\t\t\t\t\t*page_break\n\t\t\t\t\tSlowly coming to, you realize that the whole scene was some sort of hallucination. You're still on the street, the Rastafarian cabbie bending over you.\n\n\t\t\t\t\tSomeone is calling 911, but the cabbie waves them off. \"$!{he} doesn't want da cops, mahn,\" he says, bending down and helping you up slowly.\n\n\t\t\t\t\tThe cabbie apologizes for hitting you and offers to take you wherever you need to go. Once you're in his backseat, he lights a spliff and then peels out into traffic.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto traffic\n\t\t\t\t*else\n\t\t\t\t\tYou grab the goblet and take a swig of the blood. Or, what you thought was blood; its Dubonnet. Looking more closely a the French woman, you realize her fangs are fake; with a quick gesture, you rip them from her mouth.\n\n\t\t\t\t\tThe French woman screams, her spell and illusion broken. Horrified, she clamps her gloved hands over her mouth, ashamed of her normal teeth. As the entire party gasps, you run up and lead the harpist from the small stage.\n\t\t\t\t\n\t\t\t\t\tThe partygoers start to argue, throwing down their goblets. The French woman backs up, shaking her head in horror.\n\n\t\t\t\t\t\"She's not a vampire?\" The harpist looks at you as she comes off the stage. You shake your head no. \"Then let's get out of here!\" She grabs your hand and leads you to the street, thanking you along the way for freeing her.\n\n\t\t\t\t\tArriving at the curb, you look both ways and see that the heat is gone. You're about to say something else to the harpist, when time seems to slow. There's a cab coming straight for you, and it's too late to move.\n\n\t\t\t\t\tAs you fall to the street, you hear the harpist screaming. The Rastafarian cabbie gets out and rushes to your side, pushing the harpist out of the way. He's saying something, but you can't make out the words.\n\n\t\t\t\t\tFinally, you manage to croak out one word: cathedral. With the harpist's help, the Rastafarian helps you into the backseat of the cab, slamming the door behind you. Once behind the wheel, he lights up a spliff and peels out into traffic.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto traffic\n\n*label cathedral\nBefore you head towards the [i]Girls Girls Girls[/i] revue, you stop in front of the beautiful St. Louis Cathedral.\n\nIt's time to pay Father Confessor a little visit.\n*finish", "choicescript_description": "Your boss, The Bull, the most dangerous gangster in New Orleans, has a job for you. Rescue your kidnapped lover--officially The Bull’s lover, but unofficially yours--before dawn. Slaughter everyone who stands in your way, including other gangsters, cops, and the Triad, as you slink across the underbelly of New Orleans.\n\n[i]NOLA Is Burning[/i] is a blood-soaked interactive noir thriller where your choices control the story. The game is entirely text-based--without graphics or sound effects--and powered by the vast, unstoppable power of your imagination.\n\nWill you outwit your enemies or take it to the mattresses with your trusty sawtooth? Will you earn respect as NOLA’s most infamous headcrusher, or will you retire to Mexico on a huge pile of cash? To be honest, you'll probably die. But in NOLA, death is just the beginning.\n", "choicescript_stats": "*if wounds \u003c 0\n\t*set wounds 0\nName: ${name}\n\nClips: ${clips}\n*line_break\n[i]How many kills you've gotten in—tonight, anyway.[/i]\n*line_break\nContracts: ${contracts}\n*line_break\n[i]Deals secured.[/i]\n*line_break\nJuice: ${juice}\n*line_break\n[i]Cash money.[/i]\n\nHow are you feeling, headcrusher?\n*if wounds = 0\n\tYou're in tip-top shape? Good to know.\n\t*gosub weapon_desc\n*if wounds = 1\n\tA bruise? A cut? Good to know that it's nothing to worry about.\n\t*if identity_revealed\n\t\tIt's really too bad about your hat, though.\n\t*gosub weapon_desc\n*if wounds = 2\n\tA bruise? A cut? Good to know that it's nothing to worry about.\n\t*if identity_revealed\n\t\tIt's really too bad about your hat, though.\n\t*gosub weapon_desc\n*if wounds = 3\n\tYou've been roughed up tonight, you say? Well, you've seen worse.\n\t*if identity_revealed\n\t\tIt's really too bad about your hat, though.\n\t*gosub weapon_desc\n*if wounds = 4\n\tYou've been roughed up pretty bad tonight, you say? Well, you've seen worse.\n\t*if identity_revealed\n\t\tIt's really too bad about your hat, though.\n\t*gosub weapon_desc\n*if wounds = 5\n\tYou're hurting. There's no denying it.\n\t*gosub weapon_desc\n*if wounds = 6\n\tYou're really hurting. There's no use denying it.\n\t*gosub weapon_desc\n*if wounds = 7\n\tIt's hard to understand you when you keep coughing up blood. Are you sure you don't need some aspirin?\n\t*gosub weapon_desc\n*if wounds = 8\n\tFrom the look of you, most people would have gone to the hospital by now. Or died. You know, whatever.\n\t*gosub weapon_desc\n*if wounds = 9\n\tIt is unclear how you are still moving. You look like the walking dead.\n\t*gosub weapon_desc\n*if wounds >= 10\n\tYou should really just lie down and die. It would certainly hurt less.\n\t*gosub weapon_desc\n*comment endif\n\n*stat_chart\n\tpercent heat Heat\n[i]The cops on your tail.[i]\n*stat_chart\n\tpercent jumpin_the_gun Jumpin' the Gun\n[i]Jumping in without thinking things through.[/i]\n*if reveal_remorse and (remorse > 45)\n\t*stat_chart\n\t\tpercent remorse Remorse\n\t[i]Desire for repentance.[/i]\n*stat_chart\t\n\tpercent respect Respect\n[i]Honor and devotion to the mob.  Also, your reputation—how much people fear you.[/i]\n*stat_chart\n\tpercent savvy Savvy\n[i]Thinking with your head, not with your fists.[/i]\n*stat_chart\n\tpercent take_it_to_the_mattresses Take it to the Mattresses!\n[i]Brawling, fighting, and getting violent.[/i]\n\n*finish\n\n*label weapon_desc\n*if weapon != \"empty\"\n\t*if two\n\t\tMeanwhile, your ${appendage} have been replaced by ${weapon}.\n\t*if two = false\n\t\tMeanwhile, your ${appendage} has been replaced by a ${weapon}.\n*return\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  *if (choice_is_omnibus_app or choice_is_web)\n    [b]Remove Advertising and Delays[/b]\n\n    Permanently Remove All Advertising and Delays.\n  *if ((choice_is_omnibus_app = false) and (choice_is_web = false))\n    [b]Rest of the Game[/b]\n\n    Unlock the rest of the game, including the thrilling conclusion!\n\n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]NOLA Is Burning.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 7200 $4.99\n", "full_throttle": "*chec
