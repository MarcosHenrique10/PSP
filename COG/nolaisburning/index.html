ll_no_more false\n\t\t\t\t\tThe Bull shakes ${bull_his} head slowly. \"It's too bad, ${name}. You had to be greedy. Why couldn't you just learn your place? Together, we could have ruled this city.\"\n\t\t\t\t\t\n\t\t\t\t\tRaising a single, ring-encrusted finger, ${bull_he} smiles.\n\t\t\t\t\t\n\t\t\t\t\tHe may be prepared, but you are a ${dragon}.\n\t\t\t\t\t\n\t\t\t\t\tFrom across the street, a hidden assassin fires a shot meant for you. But you move—ever so gracefully—so that the bullet hits The Bull right between the eyes instead. Shooting a smile at ${l_name}, you spin around, and let loose with your ${weapon}. Bullets pummel the building across the street; you can see the assassin jerking as they tear into him.\n\t\t\t\t\t\n\t\t\t\t\tYou look down at The Bull and spit on ${bull_his} corpse. \"Why would I want to share?\"\n\t\t\t\t\t\n\t\t\t\t\tTaking ${l_name} into your arms, you give ${l_him} a passionate kiss.  When the two of you finally part, you take ${l_his} hand in yours, step over the corpses of The Bull and The Pitt, and make your way out of that chamber of horrors.\n\t\t\t\t\t*if deal_devil\n\t\t\t\t\t\t*goto devil_end\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto replace_bull_ending\n\t\t\t\t*elseif ls_affection = 3\n\t\t\t\t\tAfter you let him know exactly how much you want from this deal, The Bull arches ${bull_his} eyebrow and takes a long drag of ${bull_his} cigar, \"Greediness killed the cat,\" he says. \"This is a privilege, not a right.\"\n\n\t\t\t\t\tBehind you, a gun cocks. It's ${l_name}, preparing to blow you away. Only, ${l_he} doesn't. The bullet meant for you hits The Bull in the forehead instead. Maybe ${l_he} didn't really want to spend the rest of ${l_his} life in the Rockies hunting elk and wearing furs. Or maybe ${l_he} just reallly loves you.\n\t\t\t\t\t*goto saved_by_l\n\t\t\t\t*else\n\t\t\t\t\t*set respect %-30\n\t\t\t\t\tAfter you let him know exactly how much you want from this deal, The Bull arches ${bull_his} eyebrow and takes a long drag of ${bull_his} cigar, \"Greediness killed the cat,\" he says. \"This is a privilege, not a right.\"\n\n\t\t\t\t\tA gun cocks. Metal touches your neck…and ${l_name} blows you away.\n\t\t\t\t\t*page_break\n\t\t\t\t\tAs you hit the floor, The Bull does the sign of the cross over you and then grabs ${l_name}'s hand. The spiders descend on your corpse, and the couple exits the room, discussing how unfortunate it was that you had to grab at everything.\n\n\t\t\t\t\tYou were raised better than that.\n\t\t\t\t\t*goto violent_death\n\t\t\t#I tell The Bull the truth.\n\t\t\t\tYou're bound in a web of secrets—but not anymore.\n\t\t\t\t*set savvy %+20\n\t\t\t\t*set take_it_to_the_mattresses %-20\n\t\t\t\t*set jumpin_the_gun %-15\n\t\t\t\t*set respect %+20\n\t\t\t\t*label say_it\n\t\t\t\tThe truth pours out of you like you've been rehearsing this speech for years. You explain to The Bull how you've been harboring this secret, and how it's eaten away at you for too long. It's affected you, tormented you. raked you over the coals, and shoved you into paranoia, terror, sleepless nights, and wakeless days.\n\t\t\t\t\n\t\t\t\tYou have been a weak shell. But tonight you're finally strong enough to speak of what you've been repressing for all these years.\n\t\t\t\t\n\t\t\t\t*if respect > 65\n\t\t\t\t\t${l_name} takes your hand gently and looks straight into The Bull's alarmed eyes, spilling ${l_his} heart out to ${bull_him}. It's affected ${l_him} as well, and ${l_he}'s been terrified for ${l_his} life all this time. \n\t\t\t\t\t\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#$!{l_he} said it! Glad ${l_he} finally spoke up.\n\t\t\t\t\t\n\t\t\t\t\t\t#Psshhh. I knew ${l_he}'d come around.\n\t\t\t\t\t\n\t\t\t\t\t\t#It coulda gone either way. \n\t\t\t\t\t*set with_l true\n\t\t\t\t\t\n\t\t\t\t\tThe Bull stands back, eying you both. Clearing ${bull_his} throat, ${bull_he} tells you both that ${bull_he}'s known all this time. Tonight was a test. You coulda just left the mob and ${bull_him}, took the money and run. Hell, you coulda killed ${bull_him}.\n\t\t\t\t\t\n\t\t\t\t\tBut you didn't. You told the ugly truth.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto bulls_reaction\n\t\t\t\t*else\n\t\t\t\t\t${l_name} looks at you in horror. After a moment, ${l_he} begins to sputter denials. \"You must have lost too much blood tonight, if you think that I'd ever in my life go for a gross little headcrusher like you!\"\n\t\t\t\t\t\n\t\t\t\t\t*if letter_l\n\t\t\t\t\t\tYou pull out the letter that ${l_he} wrote, the one that you acquired from Father Confessor. You start at the top, reading the sweet nothings and saccharine endearments. Line after line you read, not bothering to take a breath. All three of you get red in the face as you go on. \n\t\t\t\t\t\t\n\t\t\t\t\t\tFinally ${l_he} caves. \"For the love of all that's holy, if you value our lives, shut the fuck up!\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*set with_l false\n\t\t\t\t\t\t*set l_alive false\n\t\t\t\t\t\tThe Bull takes a moment to enjoy the discord between you before raising a single, ring-encrusted finger. ${bull_he} smiles.\n\t\t\t\t\t\t\n\t\t\t\t\t\tFrom across the way, a hidden assassin fires. The windowpane shatters, and ${l_name} gasps.  $!{l_he} looks down in disbelief at the gaping hole in ${l_his} chest. $!{l_he} falls to his knees, and then to the floor.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Now, ${name}, I believe it's time for you to go. You're not really welcome here anymore.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou nod. It's time.\n\t\t\t\t\t\t*if deal_devil\n\t\t\t\t\t\t\t*goto devil_end\n\t\t\t\t\t\t*goto get_outta_town\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou have no proof. You try and argue, but it's your word against theirs. It makes you crazy to be betrayed like this, to hear the lies ${l_he} spills out. But, you're a headcrusher and not a Hallmark card, so you stand there and take it. You know what's coming to you, and baby, it's gonna hurt.\n\t\t\t\t\n\t\t\t\t\t\tThe Bull raises a ring-encrusted finger, and you turn to the window just in time to see a bullet smash through the dirty windowpane. It hits you right in the chest.\n\t\t\t\t\t\t*if pocketbook_bible\n\t\t\t\t\t\t\t*set l_adverse true\n\t\t\t\t\t\t\t*goto pocketbook_bible_2\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto two_birds\n\t*if (dragon_assistance) and ((savvy >= 60) and (deal_devil = false))\n\t\t*selectable_if (remorse \u003c= 65) #The Hell with ${l_name} and The Bull. I'm joining up with The Dragon to do some real business.\n\t\t\t*set savvy %+20\n\t\t\t*set contracts +1\n\t\t\t*set respect %+10\n\t\t\t*set jumpin_the_gun %-20\n\t\t\t*set juice +1000000\n\t\t\t*set dragon_business true\n\t\t\tYou graciously thank the Bull for everything ${bull_he}'s done for you and tell him that you'll be approaching The Dragon to arrange some legitimate business deals. The Bull nods in approval, realizing this could really benefit ${bull_him}.\n\n\t\t\t${l_name} is stunned and says nothing.\n\n\t\t\t*gosub pitts_head\n\t\t\t\n\t\t\tYou bid them adieu and walk past the now-unrecognizable corpse of The Pitt, down the winding staircase you fought so hard to conquer, through the empty hallways, and into The Pitt's office. \n\n\t\t\t*gosub pitts_money\n\t\t\t*page_break\n\t\t\t*if deal_cop and (malones_snitch = false)\n\t\t\t\tThe Pitt is dead, so Malone considers your deal with the coppers fulfilled. He lets you walk away squeaky clean from the carnage inside the revue. \n\t\t\t*comment endif\n\n\t\t\t*gosub dragon_and_mole\n\t\t\t\n\t\t\t*if malones_snitch\n\t\t\t\tUnfortunately, Malone isn't too happy about your idea of going straight. The Dragon makes time for a tête-à-tête with him and some of that tiger piss/distilled sorghum concoction she made you drink.\n\n\t\t\t\tMalone doesn't bother you again after that.\n\t\t\t*comment endif\n\n\t\t\tSetting yourself up with a nice townhouse in the French Quarter, you stay on the right side of the street from now on. The money still piles up, though, and you end up extremely rich. \n\t\t\t*page_break\n\n\t\t\t*if voodoo_necklace\n\t\t\t\t*set juice +50000\n\t\t\t\tWith you as an example of the power of the voodoo necklace, The Gator Girls' Voodoo Shop becomes the number one tourist destination in NOLA. Thousands of tourists flood their shop every month to purchase their own voodoo necklaces, and you get a cut of the profits.\n\t\t\t*comment endif\n\n\t\t\tIt's all about timing. And headcrusher, you got it right.\n\t\t\t*if two\n\t\t\t\t*achieve two\n\t\t\t*finish Next\n\n*label as_for_l\nAs for ${l_name}? $!{l_he} ends up living a simple life with The Bull in a small cabin, where ${l_he} wanted to be all along.\n*return\n\n*label deal_bull\n*if deal_bull = 1\n\t*set juice +65000\n\t$!{bull_he} hands over the rest of the seventy-five large ${bull_he} promised you at the beginning of the night, a reward for a job well done.\n*if deal_bull = 2\n\t*set juice +40000\n\t$!{bull_he} hands over the rest of the fifty large ${bull_he} promised you at the beginning of the night, a reward for a job well done.\n*if deal_bull = 3\n\t*set juice +15000\n\t$!{bull_he} hands over the rest of the twenty-five large ${bull_he} promised you at the beginning of the night, a reward for a job well done.\n*return\n\n*label pitts_head\n*if molecopsfamily\n\tBefore ${you} leave, however, you take a moment to hack off The Pitt's head and throw it in a bag; one last message job to deliver. But this time, it's a happier one.\n\t*if with_l\n\t\n\t\tOnce you're done, ${l_name} grabs your free hand, and the two of you head down to The Pitt's office.\n*return\t\t\n\n*label pitts_money\n*if pitts_money\n\t*set pitts_money false\n\t*if deal_lulu and lulu_alive\n\t\t*set juice +25000\n\t\tLulu meets you in The Pitt's office, and you give her a decent share of the cash out of the claw-foot bathtub. She's incredibly thankful, and lets you know she going to set up her own joint, where the performers will all own shares in the business.\n\t*if (deal_lulu = false) or (lulu_alive = false)\n\t\t*set juice +50000\n\t\tLike a kid in a candy store, you load up on the cash out of The Pitt's claw-foot bathtub. It may be dirty money, but it makes you extremely rich. You just wish you could have disinfected it before you had to touch it.\n\t*comment endif\n\t\n\tMoreover, while you're rummaging in his desk for more swag, you find the keys to The Pitt's infamous pink Cadillac El Dorado. Looks like you've got a new ride!\n\t*set el_dorado true\n*return\n\n*label dragon_and_mole\n*if dragon_assistance\n\t*set juice +50000\n\t*if leaving_nola = false\n\t\t*if el_dorado\n\t\t\tFiring the El Dorado up, you \n\t\t*if el_dorado = false\n\t\t\tYou \n\t\tcruise by The Dragon's green house to drop off the keys to [i]Girls Girls Girls[/i]; she pays you what she'd promised.\n\t*if leaving_nola\n\t\tBefore you get the fuck outta Dodge, you have to return the keys to [i]Girls Girls Girls[/i] to The Dragon.\n\t\t*if el_dorado\n\t\t\tFiring the El Dorado up, you cruise on by The Dragon's green house.\n\t\t*if el_dorado = false\n\t\t\tYou book it over to her green house.\n\tShe must have just finished a Zumba workout, as she's wearing an Anaheim Angels jersey. \n\t*if with_l\n\n\t\t\tYou take a moment to introduce ${l_name} to The Dragon—they had never met—and The Dragon raves about her newly found ${son}, even though you are kinda \"funny looking.\"\n\n\t*if dragon_business\n\t\tMaking the most of the opportunity, you pitch the idea of opening an import/export business with her. After all, you're the most successful headcrusher New Orleans has ever known. How could the two of you go wrong?\n\n\t\tThe Dragon informs you that during her Zumba workout she has just \"twerked\" for the first time and needs to take a shower. She leaves you to work out the details with the gutterpunks. \n\t\t\n\t\tYou'll be able to take trips to Mexico whenever you like!\n*if (dragon_assistance = false) and el_dorado\n\tYou fire up the El Dorado. She purrs like a kitten, just like you thought she would.\n*if molecopsfamily\n\n\t*gosub molecopfamily\n\t*page_break\n*return\n\n*label molecopfamily\n*set molecopsfamily false\n*set respect %+15\n*achieve atease\n*if retirement_home\n\tOf course, the first way you can \"give back\" is by delivering the head of The Pitt\n*if retirement_home = false\n\t*if leaving_nola\n\t\tBefore you go, though, you\n\t*if leaving_nola = false\n\t\tOf course, the next thing to do is to\n\tdeliver The Pitt's head \nto the family of the Silent Cop who died outside the police precinct. You let them know they don't have anything more to fear.\n\t\nTheir sense of relief is tempered by your wrecked suit and bloodied face.\n*return\n\t\t\t\t\t\n*label bulls_reaction\n*if respect >= 70\n\t*set with_l true\n\t*set you \"the two of you\"\n\tIt's hard for him, but The Bull tells you and $!{l_name} to get outta there. $!{bull_he} tells you it's okay—${bull_he} never filed the marriage certificate, anyway. You both are released.\n\n\tPhew.\n\n\t*if deal_devil\n\t\t*goto devil_end\n\t*achieve released\n\t*gosub deal_bull\n\t*label get_outta_town\n\t\n\t*gosub pitts_head\n\t*if (molecopsfamily = false) and (with_l)\n\t\tWith The Bull's blessing, you and ${l_name} head to The Pitt's office.\n\t*comment endif\n\t\n\t*gosub pitts_money\n\t*page_break\n\t*if deal_cop\n\t\tThe Pitt is dead, so Malone considers your deal with the coppers fulfilled. He lets you walk away squeaky clean from the carnage inside the revue. \n\t*comment endif\n\t\n\t*set leaving_nola true\n\t*gosub dragon_and_mole\n\t\n\tAnd with that, you head off to Mexico with ${l_name}. You're destined for a new, peaceful life, complete with a beautiful beach, sand between your toes, and the love of your life right by your side.\n\t*goto cop_fury\n*else\n\t*label pocketbook_bible\n\t*set l_alive false\n\tThe Bull raises a ring-encrusted finger, and you turn to the window just in time to see a bullet smash through the dirty windowpane. It hits you right in the chest.\n\t\n\t*if pocketbook_bible\n\t\t*label pocketbook_bible_2\n\t\t*achieve savedbythegoodbook\n\t\t*set clips +2\n\t\t*set kill_no_more false\n\t\t*set bull_alive false\n\t\tHowever, the trusty pocketbook bible stops the bullet just in time before it hits your heart. ${l_name} drops to the floor, ${l_his} eyes wide as ${l_his} knees hit the ground. \n\n\t\t*if (weapon = \"ossein gun\") or (weapon = \"ossein guns\")\n\t\t\tYou go into a rage, your ${weapon} firing sharp bones straight into The Bull's skull, cracking ${bull_his} head open. \n\t\t\t*goto fire_back\n\t\t*elseif (weapon = \"voodoo appendage\") or (weapon = \"voodoo appendages\")\n\t\t\tYou go into a rage, your ${weapon} firing bullets straight into The Bull's skull, cracking ${bull_his} head open. \n\t\t\t*goto fire_back\n\t\t*elseif (weapon = \"nanotech appendage\") or (weapon = \"nanotech appendages\")\n\t\t\tYou go into a rage, your ${weapon} firing bullets straight into The Bull's skull, cracking ${bull_his} head open. \n\t\t\t*goto fire_back\n\t\t*elseif (weapon = \"demonic appendage\") or (weapon = \"demonic appendages\")\n\t\t\tYou go into a rage, your ${weapon} firing black acid straight onto The Bull's face, burning it off. He dies horribly, screaming. \n\t\t\t*goto fire_back\n\t\t*elseif (weapon = \"divine cross\") or (weapon = \"divine crosses\")\n\t\t\tYou go into a rage, your ${weapon} firing sharp bones straight into The Bull's skull, cracking ${bull_his} head open. \n\t\t\t*goto fire_back\n\t\t*else\n\t\t\tYou go into a rage, your ${weapon} firing supercharged bullets straight into The Bull's skull, cracking ${bull_his} head open. \n\t\t\t*label fire_back\n\n\t\t\tNot ten seconds later, the window to the room shatters under a hail of bullets from the building across the street. Without hesitating—without even ducking for cover—you turn and fire back. \n\n\t\t\tThe bullets cease. A body tumbles over the edge of the rooftop and to the street below.  \n\n\t\t\tAmateur.\n\t\t\t*if deal_devil\n\t\t\t\n\t\t\t\t*goto devil_end\n\t\t\t*elseif l_adverse\n\n\t\t\t\tYou pat yourself down; all the necessary parts are still there. And then you look at ${l_name}, who stands there, shaking. $!{l_he} begins babbling, saying that ${l_he} knew you would come through all along.\n\n\t\t\t\tYour eyes narrow in suspicion.\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (paranoia \u003c 60) #I let ${l_him} go. The Bull and The Pitt are both dead; ${l_he} is no further threat to you.\n\t\t\t\t\t\t*set remorse %+20\n\t\t\t\t\t\t*set paranoia %-10\n\t\t\t\t\t\tYou turn your back on ${l_name}. There's no way you can trust ${l_him} after tonight, after ${l_his} denial of your love.\n\n\t\t\t\t\t\tYou close your eyes and motion for ${l_him} to go. You hear ${l_him} stand and exit the room.\n\n\t\t\t\t\t\tIt hurts, but you are free. Free of ${l_name}, free of The Bull, and The Pitt. Speaking of, wasn't there a bathtub full of juice around here somewhere?\n\t\t\t\t\t\t*goto replace_bull_ending_2\n\t\t\t\t\t*selectable_if (remorse \u003c 60) #I kill ${l_him}.\n\t\t\t\t\t\t*set l_alive false\n\t\t\t\t\t\t*set clips +1\n\t\t\t\t\t\t*set remorse %-20\n\t\t\t\t\t\t*if sawtooth\n\t\t\t\t\t\t\tIt's been a few hours since your sawtooth tasted blood. ${l_name}'s eyes go wide as she see it glinting in the dawn light.\n\n\t\t\t\t\t\t\t$!{l_his} screams turn those unfortuante enough to still be sleeping into nightmares.\n\t\t\t\t\t\t\t*goto replace_bull_ending_2\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou raise your ${weapon}. $!{l_he} screams out for mercy, but you are a ${dragon}, and you are not here to dispense mercy.\n\n\t\t\t\t\t\t\tWhen your ${weapon} falls silent again, ${l_name}'s body falls to the floor. So much for love.\n\n\t\t\t\t\t\t\t*gosub pitts_money\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto replace_bull_ending\n\t\t\t\t\t#I forgive ${l_him}.\n\t\t\t\t\t\t*set with_l true\n\t\t\t\t\t\t*set respect %-20\n\t\t\t\t\t\t${l_name} falls to ${l_his} knees and embraces you around your middle. You put your hands on either side of ${l_his} face, and pull ${l_him} up to kiss you.\n\n\t\t\t\t\t\tThere you are beside the cooling bodies of The Pitt and The Bull, surrounded by still-angry mechanical spiders, and the two of you are tearing the remains of each others' clothing off.\n\n\t\t\t\t\t\tYou fuck on the floor. It is brutal. Hungry. Desperate. And when you are done, there is no discussion and certainly no tenderness. The two of you put your clothes back on; it's time to go. \n\t\t\t\t\t\t*if deal_cop = false\n\t\t\t\t\t\t\tAs lazy as the cops of NOLA are, they will respond to reports of gunbattles eventually.\n\t\t\t\t\t\t*goto replace_bull_ending_2\n\t\t\t*else\n\t\t\t\t*page_break\n\t\t\t\t*label replace_bull_ending\n\t\t\t\tOnce you've patted yourself down—all the important parts are still there—you realize it's time to go collect the juice from The Pitt's tub.\n\t\t\t\t\n\t\t\t\t*label replace_bull_ending_2\n\t\t\t\t*gosub pitts_money\n\t\t\t\t*page_break\n\t\t\t\tIt's a new day. The Big Easy languishes in the morning heat before you.\n\t\t\t\t*if with_l\n\t\t\t\t\t*if l_adverse\n\t\t\t\t\t\tWith ${l_name} by your side, you feel rejuvenated.\n\t\t\t\t\t\t*if paranoia > 40\n\t\t\t\t\t\t\tBut in your heart-of-hearts, you know that you will never able to fully trust ${l_him} again. After tonight, honesty between you has been shattered. You may share a bed, a home, and a life, but never trust. And that is lonely, indeed.\n\t\t\t\t\n\t\t\t\t\t*if l_adverse = false\n\t\t\t\t\t\tWith ${l_name} by your side, you feel like you could take over the world.\n\t\t\t\t*if (l_alive = false) and (l_adverse = false)\n\t\t\t\t\tYou mourn the passing of ${l_name}, but that will not stop you from bringing this city to heel.\n\t\t\t\t*label replace_bull_ending_3\n\t\t\t\t*if two\n\t\t\t\t\t*achieve two\n\t\t\t\tAnd now it's time to run The Bull's operation your way. With the family fortune in your hands, you try to clean up some of the mob's nastier business deals.\n\t\t\t\t\n\t\t\t\t*if (weapon = \"cybernetic rifle\") or (weapon = \"cybernetic rifles\")\n\t\t\t\t\tYou get the heat on your side, and you clean up NOLA together. They scratch your back, and you don't shoot off theirs. You've got a gigantic machine gun for an appendage, so it's not exactly like they can tell you no.\n\t\t\t\t*if (deal_cop = false) and (heat > 65)\n\t\t\t\t\tYou run this town, but the cops are so far up your ass, you swear you can taste bacon every time you swallow. You know it's just the price you have to pay for all the hurt you brought them during this adventure. In time, they'll see things your way.\n\t\t\t\t*if (deal_cop = false) and (heat \u003c= 65)\n\t\t\t\t\tNOLA is yours, and the heat decides to find bigger fish to fry. After all the time you spent in the river tonight, you're a fan of fish. You and the heat keep your distance from one another, but you always have an eye out and an ear listening. You never know what help you might need down the road.\n\t\t\t\t*goto nola_ending\n\t*else\n\t\t*label two_birds\n\t\tTwo birds with one stone.\n\t\t*page_break\n\t\tYou both fall to your knees, pain ripping through your heart and soul. Everything you hoped to gain tonight has been taken by a simple bullet. ${l_name} faces you, ${l_his} eyes wide in horror, and then understanding. The Bull flicks ${bull_his} half-finished cigar between you and ${l_name} as the two of you collapse on the wood floor. The mechanical spiders scuttle towards your bodies on the floor.\n\t\n\t\t*goto violent_death\n\t\t\n*label nola_ending\n*if molecopsfamily\n\t*gosub molecopfamily\n\t*page_break\n*if (weapon = \"demonic appendage\") or (weapon = \"demonic appendages\")\n\tYou and your demonic appendage take hold of NOLA. At night, it whispers plans to you in your dreams, and the plans sound good. This city is full of sin and you like it that way.\n*if ((weapon = \"voodoo appendage\") or (weapon = \"nanotech appendage\")) or ((weapon = \"voodoo appendages\") or (weapon = \"nanotech appendages\"))\n\tThe city is yours and you owe it all to your guts and The Dragon. You know you're indebted to her, so you do what all the other bosses couldn't or wouldn't and bring her in on your plans. The two of you rule NOLA with iron fists.\n*if (weapon = \"cybernetic rifle\") or (weapon = \"cybernetic rifles\")\n\tNow you're in the big chair. You've vowed to be a bigger and better boss. Since you've had a personal audience with The Dragon, you feel you must bridge the gap between you if things are going to run smoothly in your town. Who wouldn't want that?\n*if (weapon = \"divine cross\") or (weapon = \"divine crosses\")\n\tWith divine intervention, NOLA is yours. You have a new outlook on life and you know, it ain't so bad. Father Confessor is at your side, and you have a light in your heart that just won't quit. You're gonna clean up this town one way or another! \n*if (weapon = \"ossein gun\") or (weapon = \"ossein guns\")\n\tIt only makes sense that NOLA's new boss would have deep, cultural ties to the old ways. Ezma and the Gator Girls are your right hands, and you wouldn't have it any other way. With this new appendage of yours, who else is going to understand you?\n*achieve newboss\n*if juice > 1000000\n\tYou're bringing sexy back! This is gonna be a golden age in NOLA, and you will spare no expense to make it happen!\n\t*finish Next\n*elseif juice > 250000\n\tWhile you can't party like it's 1999, you can still turn heads and keep yourself lookin' swank.\n\t*finish Next\n*elseif juice > 75000\n\tYou're not large but you're in charge. You're bringing the pain, but you're definitely rocking K-Mart's Blue Light Special.\n\t*finish Next\n*elseif juice > 50000\n\tYou're rolling in a minivan you got at a used car lot just outside of town. No matter how much you polish it, you know what it is.\n\t\n\tBut at least you're alive, right? And with your ${weapon}, no one's fucking with you.\n\t*finish Next\n*else\n\tYou're brown-baggin' it, kid. Your outfit is a bit Sanford and Son, so you'd better open a side business! Some tourist trap oughta do it. With your ${weapon}, you could start your own sideshow.\n\t\n\tThis is NOLA, after all.\n\t*finish Next\n\n*label cop_fury\n*if malones_snitch\n\t*page_break\n\tHowever, on your way out of town, you are pulled over by the obsessive Captain Malone, who informs you that he wants to keep you as a mole. He doesn't seem hip to your jive about gettin' clear to Mexico.\n\n\t*if savvy > 70\n\t\tYou burn rubber, and thanks to a few shortcuts you know, you narrowly escape his clutches. You take a private road out of town in case the blue-lights are blocking the highways. Before long, you're on your way to freedom!\n\t\t*goto future\n\t*elseif take_it_to_the_mattresses > 70\n\t\t*set wounds +2\n\t\t*if wounds >= 8\n\t\t\tTelling him to \"eat your dust,\" you burn rubber—heading towards Mexico as quickly as possible. He whips out his gun and shoots at the car, hitting you in the shoulder.\n\t\t\t\n\t\t\tYou look down in shock—he couldn't have hit you!—and when you look up again, it's too late. You hit an embankment, and your car goes flying into the air. Another shot from Malone hits the gas take and the car ignites, exploding before it even hits the ground.\n\t\t\t\n\t\t\t*goto violent_death\n\t\t*else\n\t\t\tWhen you disagree with him, he whips out his gun and puts a bullet in your shoulder. Ignoring the pain, you burn rubber and put some serious distance between you and those flashing lights. You're on your way to freedom!\n\t\t\t*goto future\n\t*else\n\t\t*achieve soclose\n\t\tWhen you disagree with him, he whips out his taser and shocks you with it repeatedly. The electricity jolting through you causes your foot to spasm and hit the gas, hard. The El Dorado hits an embankment, and flies eighty feet into the air.\n\t\t\n\t\tAs you're spinning for what seems like an eternity, you think maybe you shouldn't have pissed all over the cops quite so much? Perhaps you wouldn't be in this dilly of a pickle. Just as you're about to meet the ground and your destiny, you realize you probably should have had a bit more tact. \n\t\t\n\t\tThe El Dorado of Destiny crashes and explodes, burning you up with it. The explosion starts a fire that takes out a whole city block. Smash up job.\n\t\t*goto violent_death\n*elseif heat > 75\n\t*page_break\n\tAs you motor down the highway, you notice police lights ahead of you.  \n\t*if with_l\n\t\t${l_name} clutches your leg in warning.\n\tIt seems that the heat is out in force and they're looking for you.\n\t*if savvy > 72\n\t\tThankfully, The Pitt was prepared for things like this. You press a button in the dashboard, and the pink Cadillac suddenly unfolds and refolds itself—with you still inside—until you're suddenly driving a minivan, complete with \"My child is on the Honor Roll\" stickers on the rear bumper. It even comes with a wig full of rollers.\n\t\t\n\t\t*if with_l\n\t\t\tThe coppers wave you on when you get the roadblock—what self-respecting headcrusher would drive a minivan, after all?—and the two of you putter past on your way to Mexico.\n\t\t\t*goto future\n\t\t*else\n\t\t\tThe coppers wave you on when you get the roadblock—what self-respecting headcrusher would drive a minivan, after all?—and you putter past on your way to Mexico.\n\t\t\t*goto future\n\t*elseif take_it_to_the_mattresses > 72\n\t\tPutting the car into overdrive, you punch out the windshield of the El Dorado. You stick your ${weapon} through it and unload on the coppers.\n\t\t\n\t\tThe Cadillac bursts through the roadblock, and you continue on your way, leaving the smoking wreckage of the NOPD behind you.\n\t\t*if with_l\n\t\t\tIn a pure class move, ${l_name} sticks ${l_his} bare ass out the window as a final goodbye. Once ${l_his} arms and legs are safely back in the vehicle, the two of you share a good laugh.\n\t\t*goto future\n\t*else\n\t\t*achieve soclose\n\t\tPutting the car into overdrive, you punch out the windshield of the El Dorado. You stick your ${weapon} through it and unload on the coppers.\n\t\t\n\t\tUnfortunately, a line of roadspikes flattens your tires, and you sputter to a stop right in their crosshairs.  \n\t\t*if with_l\n\t\t\t${l_name} grips your hand in ${l_his}, ready for whatever comes—as long as it's with you.\n\t\tThe last thing you see before the lights go out is Malone's gleeful face.\n\t\t*goto violent_death\n*else\n\t*goto future\n\n*label violent_death\n*if deal_devil\n\t*goto devil_end\n*elseif (desire = 1) or (career_headcrusher)\n\tMaybe there's a managerial position open in Hell?\n\t*goto ending\n*else\n\tValhalla, here you come.\n\t*goto ending\n\n*label devil_end\nIt's at that moment that you start to feel funny.\n*if (remorse >= 60) and (kill_no_more)\n\tRight then, the colors of the room start to change. And you start to feel light on your feet. \n\t*if bull_alive \n\t\tThe Bull looks at you in shock. \n\t*if l_alive\n\t\t${l_name}'s jaw drops. \n\tYou're floating.\n\t\n\tThis is not what you expected.\n\t\n\tFrom somewhere, you hear Jane screaming. Slowly, but then faster and faster, you shoot up, passing through the roof and rocketing into the sky.\n\t*page_break\n\t*achieve purgatory\n\tYou took the devil's deal, \n\t*if l_alive\n\t\tsaved ${l_name}, \n\t*if bull_alive = false\n\t\tand though both The Bull and The Pitt are dead, neither of those are exactly your fault.\n\t*if bull_alive\n\t\tand refrained from killing The Bull. And The Pitt? Well, that wasn't exactly your fault. \n\tAlso, you feel really bad about that whole killing and torturing people thing.\n\t\n\tAn androgynous figure, dressed in robes of immaculate white that somehow seem to shimmer with rainbow of colors, nods as you arrive.\n\n\t\"I'm going to Heaven? After all I've done?\"\n\n\t\"Heaven? Oh, dear me, no. Or at least, not yet. It's Purgatory for you. You carry too much sin to progress on just yet. But your remorse has redeemed you.\"\n\t\t\t\t\n\tWell, your remorse and a few hundred years of hard labor. But that's something, right?\n\t*finish Next\n*elseif bull_alive = false\n\tYou blink, and you're back in the elevator, heading down.\n\t\n\tIt seems the devil is collecting his due.\n\t*page_break\n\tAgain, the elevator stops at the level with the halls full of doors with frosted glass. You follow the lights back to Jane's office. When you open the door, she stands and claps softly for you.\n\t\n\t\"You're going to do big things down here, ${name}. I'm sure of it.\"\n\t*page_break\n\t*achieve middlemanagement\n\tThe next few years are spent getting your bearings in the infernal bureaucracy. You never knew fury until you encountered a demon paper-pusher to whom your reports were misfiled.\n\t\n\tSomeday soon, you'll get to the whole tempting mortals bit. And then the world had better watch out, because there's going to be Hell to pay.\n\t\n\tNot bad, headcrusher. Not bad at all.\n\t*finish Next\n*else\n\tYou blink, and you're back in the elevator, heading down.\n\t\n\tIt seems the devil is collecting his due.\n\t*page_break\n\tAgain, the elevator stops at the level with the halls full of doors with frosted glass. But this time, when the bellhop presses the button to open the door, the floor drops out from beneath you.\n\t\n\tAnd you're falling. Falling into darkness.\n\t\n\t*achieve brick\n\tOver the next few—hours? months? centuries?—your body is heated to an infernal temperature and poured into a brick mold. You are stacked on a pallet along with millions of other soul-bricks and put into storage for a time. \n\n\tEventually, the pallet is removed, and you and your neighbors are used to line the floor of a new urinal outside Satan's Palace. It's a public urinal for demon-pilgrims, built through the beneficence of the Prince of Darkness, to keep them from soiling the roses.\n\t\t\t\t\n\tOn the bright side, it's good to know you're helping to clean up the streets even now.\n\t*finish Next\n\n*label future\n*if two\n\t*achieve two\n*page_break\n*if (remorse > 70) and ((desire = 1) or (desire = 2))\n\t*achieve retirementhome\n\t*set retirement_home true\n\tAfter everything you've done in your life and everything you've done tonight, you realize you can't go on like this. You feel the need to give back.\n\t*if molecopsfamily\n\t\t*gosub molecopfamily\n\t*comment endif\n\t\n\tYou find a nice house on the outskirts of town, and with the all the money you've got, you open a reform school for headcrushers and [i]mafiosi[/i]. \n\t*if confessor_deal\n\t\tThe good Father Confessor—now off his red birds—comes and leads you all in prayer every week or so.\n\tIt's a little [i]Goodfellas[/i] and a little [i]Welcome Back Kotter[/i].\n\t*finish Next\n*elseif juice >= 150000\n\t*achieve mexico\n\t*if career_archaelogy\n\t\tOnce you've relaxed for a few months, you decide to backpack through South America. While there, you come across a large archaeological dig going on, and ask to help. They're not keen on taking a neophyte on board, but you manage to convince them thanks to your obvious enthusiasm…and your trusty sawtooth. Working your way up in the ranks, you become an assistant to a well-known archaeologist who is fascinated with your ${weapon}.\n\n\t\tOne night, you are drinking a bottle of wine at the dig site, when a light appears—the light of an unidentified spacecraft. An alien emerges to warn you that continuing your digging could release an ancient God who will be determined to eliminate humankind.\n\n\t\t*if gator_girls = \"with\"\n\t\t\tAuntie Ezma and the Gator Girls see the alien as well, and you all agree to place a spell on the camp. You've had enough bad experiences with those who have too much power. \n\n\t\t\tThe next morning, everyone moves a couple miles south. \n\t\t\t*goto archaeologist_end\n\t\t*elseif gator_girls = \"visit\"\n\t\t\tYou call Auntie Ezma and the Gator Girls and explain the situation. They travel to the site immediately, arriving just in time to prevent a catastrophe. They place a spell on the camp freezing the workers just as the ancient God is being dug up. While everyone is frozen, you bury the spot where they were digging and move the markers to the other side of the camp. \n\t\t\t*goto archaeologist_end\n\t\t*else\n\t\t\t*label archaeologist_end\n\t\t\tYou explain to the archaeologist what happened, and he tells you that being on a dig for as long as you have can cause hallucinations. Raising your ${weapon}, you warn him that he has to move the dig. He gives in. \n\n\t\t\tYou live out the rest of your days at the campsite, never to see the aliens again.\n\n\t\t\t*gosub mexico_desire_result\n\t\t\t*page_break\n\t\t\t*goto_scene wrap_up\n\t*if career_pirate = true\n\t\t*if juice > 250000\n\t\t\t*set juice +1000000\n\t\t\tYou purchase a sleek, gorgeous pirate ship and, jeweled eye-patch in place, sail all over the world.\n\t\t\t*label pirate_gator_girls\n\t\t\t*if with_l\n\t\t\t\t$!{l_name} loves the open sea! You both learn how to scuba dive and spend many happy days swimming with the dolphins. Life is a dream, and you live out your days with the wind at your back.\n\t\t\t\t*goto pirate_end\n\t\t\t*elseif gator_girls = \"with\"\n\t\t\t\tThe Gator Girls and Auntie Ezma sell their voodoo charms everywhere you go, spreading positive energy and protection against evil spirits throughout the world.\n\t\t\t\t*goto pirate_end\n\t\t\t*elseif gator_girls = \"visit\"\n\t\t\t\tThe Gator Girls and Auntie Ezma visit you in the Caribbean. After a few days, they decide they love the locale, so they sell the shop in NOLA and move down permanently, peddling their voodoo charms and living a simple life on the beach.\n\n\t\t\t\tYou continue on, a bottle of ${canal_bottle} by your side and the wind at your back.\n\t\t\t\t*goto pirate_end\n\t\t\t*else\n\t\t\t\t*label pirate_end\n\t\t\t\tYou've already seen almost every corner of the world when you find a treasure map. Excited by a new challenge, you find your way a lost island. There, in true pirate style, you unearth a buried chest full of gold and jewels. \n\t\n\t\t\t\tNow insanely rich, you return to the Caribbean, but not before visiting Iceland to dip in their thermal waters and get mud mask treatments to revitalize your skin. You feel like a gazillion bucks.\n\n\t\t\t\t*gosub mexico_desire_result\n\t\t\t\t*finish Next\n\t\t*else\n\t\t\tUnable to afford a solid pirate ship that won't sink to the bottom of the sea, you\n\t\t\t*if take_it_to_the_mattresses > 65\n\t\t\t\t*set juice +250000\n\t\t\t\tsteal a ship from a drunk sea captain.\n\t\t\t\t*goto pirate_gator_girls\n\t\t\t*else\n\t\t\t\tlearn the trade of a fisher${man}.\n\t\t\t\t*set juice +25000\n\t\t\t\t\n\t\t\t\t*if with_l\n\t\t\t\t\t*set with_l false\n\t\t\t\t\t${l_name} is happy at first with a simple life, but grows restless. $!{l_he} leaves you one night, taking your bucket of fish for ${l_his} journey. Without enough cash to go after ${l_him}, you live alone until you die a miserable old ${man}.\n\t\t\t\t\t\n\t\t\t\t\t*gosub mexico_desire_result\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto_scene wrap_up\n\t\t\t\t*elseif gator_girls = \"with\"\n\t\t\t\t\tIt takes some getting used to, but you eventually find you like the fisherman's life. Your shack is cozy and homey, but there's enough space for the Gator Girls and Auntie Ezma to share. They sell their charms from a tiny blanket on the beach, while you work the sea. You live a poor but pleasant life for the rest of your days.\n\n\t\t\t\t\t*gosub mexico_desire_result\n\t\t\t\t\t*finish Next\n\t\t\t\t*else\n\t\t\t\t\tIt takes some getting used to, but you eventually find you like the fisherman's life. The other fisherman welcome you, and you spend the rest of your days happy and stress-free, fixing canoes, picking fish bones from your teeth, and swapping stories of \"the big one that got away.\"\n\n\t\t\t\t\t*gosub mexico_desire_result\n\t\t\t\t\t*finish Next\n\t*if career_fashion\n\t\tInspired by the local attire, you remember your passion for fashion and learn to sew. The first outfits you create are so unique that strangers offer to buy them off your back. Encouraged, you open up a boutique, and it quickly becomes insanely popular. \n\t\t*if gator_girls = \"with\"\n\t\t\tThe Gator Girls and Auntie Ezma bless each piece you make. Together, you help thousands of people to look good while warding off evil spirits.\n\t\t\t*goto design_end\n\t\t*elseif gator_girls = \"visit\"\n\t\t\tAuntie Ezma and the Gator Girls are so inspired by your boutique that they offer you voodoo charms to incorporate into the designs. The clothes leap off the racks, and you go into business together.\n\t\t\t*goto design_end\n\t\t*elseif with_l\n\t\t\t$!{l_name} handles the accounting and marketing aspects of the business. Your relationship flourishes, along with the business. You save up enough to buy a small villa and live happily together.\n\t\t\t*goto design_end\n\t\t*else\n\t\t\t*label design_end\n\t\t\t*set juice +250000\n\t\t\tYour designs pop up all over the world, and you become one of the world's leading fashionistas. You keep your companies based in Mexico, and you provide great wages and competitive benefits to your employees, improving the lives of hundreds of locals.\n\t\t\t*finish Next\n\t*if career_writer\n\t\tAfter a few years in Mexico, you decide to chase your muse. You catch up to her in a poet's garret in Earl's Court, London. It is there, with your cats for company, that you spin the noir tales that make you the talk of the publishing world and the autobiography that snares you a Pulitzer Prize. \t\n\t\t*if gator_girls = \"with\"\n\t\t\tThe Gator Girls and Auntie Ezma continue to create charms on the side, but they discover that their true passion is theatre. They start their own theatrical company and perform all over the UK. \n\t\t\t*goto writer_end\n\t\t*elseif gator_girls = \"visit\"\n\t\t\tThe Gator Girls and Auntie Ezma visit several times, bringing you all kinds of charms for protection. The bond between you lasts for your whole life.  \n\t\t\t*goto writer_end\n\t\t*elseif with_l\n\t\t\t$!{l_name} becomes a travel guide, exploring the British countryside. You take trips all over Europe together—visiting castles and seeing some of the world's greatest works of art.\n\t\t\t*goto writer_end\n\t\t*else\n\t\t\t*label writer_end\n\t\t\t*set juice +250000\n\t\t\tAs you grow old with the comforts of your cats, you remember that Benjamin Franklin said, \"Either write something worth reading or do something worth writing.\" \n\t\t\n\t\t\tAnd headcrusher, you did both and did them well.\n\t\t\t*finish Next\n\t*if career_dogwalking\n\t\tPutting together a DIY marketing campaign, you get the word out about your dog-walking business that caters to Mexico's wealthiest tourists. You charge an arm and leg, but your clients seem to think you're worth it for bringing \"canine culture\" south of the border.\n\t\t\n\t\t*if gator_girls = \"with\"\n\t\t\tUsing their voodoo knowledge, the Gator Girls and Auntie Ezma entrance the canines to behave. Your success brings enough cash for you all to purchase a lovely beachfront house. \n\t\t\t*goto dog_ending\n\t\t*elseif gator_girls = \"visit\"\n\t\t\tThe Gator Girls and Auntie Ezma love your idea. When they return to NOLA, they adopt several dogs from their local shelter. The dogs give the shop a homey feel and even stop a potential robbery.\n\t\t\t*goto dog_ending\n\t\t*elseif with_l\n\t\t\tWorking alongside you, $!{l_name} develops a new and successful dog training method. You write several training books together and build a stress-free life in the sand and sun.\n\t\t\t*goto dog_ending\n\t\t*else\n\t\t\t*label dog_ending\n\t\t\t*set juice +50000\n\t\t\tAfter a few years, you develop a program for training rescue dogs. Your dogs save thousands of lives in search-and-rescue missions, and even protect children from the local cartels.\n\n\t\t\t*gosub mexico_desire_result\n\t\t\t*finish Next\n\t*elseif career_retire\n\t\t*goto cartel_healer\n\t*elseif career_headcrusher\n\t\tYou still want to be a headcrusher! It's in your blood; it took your blood! Just look at yourself! You think you can live a normal life with ${weapon} attached to you? This is the life for you, buddy.\n\t\t*goto career_headcrusher\n\t*else\n\t\tYou spend some time on the beach to heal after your ordeal. When you get yourself back in order, you accept that being a headcrusher is your passion and always has been. \n\t\t*label career_headcrusher\n\t\t*set juice +1000000\n\t\tYou hook up with one of the bigger cartels and carry out high-profile jobs throughout Mexico a few times a year. \n\t\t\n\t\t*if gator_girls = \"with\"\n\t\t\tThe Gator Girls and Auntie Ezma open up a voodoo shop on the beach and provide you with charms for protection. You live like a happy family in a townhouse near their shop.\n\n\t\t\t*gosub mexico_desire_result\n\t\t\t*finish Next\n\t\t*elseif gator_girls = \"visit\"\n\t\t\tWhen the Gator Girls and Auntie Ezma come to visit, they find out you're working for the cartel. Enraged, they head back to NOLA, not wanting to have anything to do with you ever again.\n\n\t\t\tWho needs them anyway?\n\t\t\t*finish Next\n\t\t*elseif with_l\n\t\t\tAt first things are great, but $!{l_name} is still attracted to power. You're devastated when $!{l_he} leaves you for the boss of one of the big cartels. For months, you do nothing but drink yourself to sleep until one night, you snap. Screaming $!{l_name}'s name, you run into the sea and drown. The next day the locals find your body and bury you in the warm sand.\n\t\t\t*finish Next\n\t\t*else\n\t\t\tYou start the make a name for yourself in the Mexican underworld until you're caught in a crossfire between rival cartels. Another headcrusher puts a bullet in your brain. Doctors manage to save your body, but you spend the rest of your life as a wheelchair-bound vegetable.\n\t\t\t*finish Next\n*else\n\t*achieve mexico\n\t*label cartel_healer\n\tThe moment you hit the beach, your pain and cares seem to drop away.\n\n\t*if paranoia \u003c= 40\n\t\tA local healer, hearing of your past, takes a special liking to you and with his help, you work out your issues of abandonment and history of violence. Little did you know that the healer works for one of the big cartels—a cartel that had ties to The Pitt. \n\t\t*if gator_girls = \"visit\"\n\t\t\t*set paranoia %+10\n\t\t\tThe Gator Girls arrive at your villa in the middle of the night. They warn you about your new friend's connections, and together you escape in the nick of time. You lie low in Brazil, working on a farm while the Gator Girls make voodoo trinkets and sell them at the market.\n\t\t\t*finish Next\n\t\t*elseif take_it_to_the_mattresses >= 60\n\t\t\t*set paranoia %+30\n\t\t\tAfter a few months, a team of hitmen attack you in the middle of the night. You take a few bullets, but manage to take them down with your ${weapon}.\n\t\t\t*if with_l\n\t\t\t\tThankfully, ${l_name} is unhurt in the exchange.\n\t\t\t*comment endif\n\n\t\t\tIt seems that your history will never leave you in peace. After your wounds heal, you're forced to move on, trying to stay one step ahead of the cartels for as long as you can.\n\t\t\t*finish Next\n\t\t*else\n\t\t\tAfter a few months, your happy life comes to an end when you're attacked in the middle of the night. A headcrusher creeps into your villa while you're sleeping and riddles you with bullets. As the light fades from your eyes, the last words you hear are, \"One last gift from The Pitt.\"\n\t\t\t*finish Next\n\t*elseif heat >= 65\n\t\t*if juice >= 50000\n\t\t\t*set juice -50000\n\t\t\tYour carefree existence can't last. The local heat discovers your past and starts to come down on you, hard. To get them off your back you have to fork over some serious juice.\n\n\t\t\t*if with_l\n\t\t\t\t*goto hippie_commune\n\t\t\t*elseif juice > 150000\n\t\t\t\t*goto cerveza\n\t\t\t*elseif juice > 20000\n\t\t\t\t*goto bar\n\t\t\t*else\n\t\t\t\t*goto sheepdung\n\t\t*else\n\t\t\t*set juice 0\n\t\t\tYour carefree existence can't last. The local heat discovers your past and starts to come down on you, hard. To get them off your back, you fork over all your cash and live off the land for the rest of your days.\n\t\t\t\n\t\t\tYou become a sheep farmer and end up finding great joy and peace in working with the sheep…until corrupt cops steal your land. \n\t\t\t*if with_l\n\t\t\t\tEventually, ${l_name} leaves you, saying that ${l_he} didn't sign up for this when ${l_he} agreed to come to Mexico with you.\n\t\t\tTired and poor, you end up alone, dying of dehydration in an empty field.\n\t\t\t*finish Next\n\t*elseif with_l\n\t\t*label hippie_commune\n\t\tYou join a hippie commune with ${l_name}, and ${l_he} becomes a master of mediation, leading classes that assist people from all walks of life. You learn how to make raw food and share the local traditions with visiting tourists.\n\n\t\t*gosub mexico_desire_result\n\t\t*finish Next\n\t*elseif juice > 150000\n\t\t*label cerveza\n\t\tSupported by your nest egg, you spend the rest of your days on a beach, sipping [i]cerveza[/i], and watching the tide roll in.\n\t\t\n\t\t*gosub mexico_desire_result\n\t\t*finish Next\n\t*elseif juice > 20000\n\t\t*label bar\n\t\tUnfortunately, your nest egg isn't quite enough to support you in your retirement, but it's enough to buy a small bar on a beach. You spend the rest of your days serving drinks and telling tall tales about the origin of your ${weapon}.\n\n\t\t*gosub mexico_desire_result\n\t\t*finish Next\n\t*else\n\t\t*label sheepdung\n\t\tUnfortunately, your nest egg isn't enough for much, and you're forced to take a job on a sheep farm. But shoveling sheep dung isn't all bad, is it?\n\n\t\t*gosub mexico_desire_result\n\t\t*finish Next\n\n*label ending\n*goto_scene ending\n\n*label mexico_desire_result\n*if desire = 1\n\tOf course, this isn't quite the life you imagined for yourself. As you grow older, you often find yourself wondering whether you could have taken over New Orleans if you had made different choices.\n*if (desire = 2) and (career_headcrusher = false)\n\tThis is as good of a place as any to repent for your crimes. There's even a local priest of upright moral character who counsels you from time to time. \n\t*if atheist\n\t\tThe two of your stridently avoid discussions of theology, but that doesn't change your respect for him.\n\tWhen you can, you even help out in the orphanage he runs; the kids love to poke at your ${weapon} when you come by. Their laughter is one of your greatest comforts in your old age.\n*if desire = 3\n\tThis is what you wanted right? You made it out of NOLA in (mostly) one piece.  Well, try not to look so smug, headcrusher.\n*if desire = 4\n\t*if with_l\n\t\tUltimately, though, you're happy that you're alive and with ${l_name}. What more can you ask for?\n\t*if with_l = false\n\t\tAnd though you made it here alive, you are without ${l_name}. You continue to dream about ${l_him} for years and years; the memory of ${l_him} is a hole in your heart that never seems to fill.\n*return", "the_dragon": "*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]NOLA is Burning[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n*temp suicide_mission true\n*temp on_floor true\n*temp hinted false\n*temp disney false\n[b]Chapter Three: The Dragon[/b]\n\nThe only path that leads straight to the [i]Girls Girls Girls[/i] revue is policed by The Dragon, NOLA's resident Chinese mob boss. He arrived two short years ago, pulling into the murky harbor on a steamboat made to resemble an ancient Chinese war-junk. \n\nWord quickly spread like a disease throughout NOLA that The Dragon has the blood of emperors flowing like ice through his veins. The Forbidden City may seem like it's just a tourist trap these days, but quiet voices whisper that deep within those supposedly empty halls sits a criminal organization with minions—like The Dragon—in cities across the globe. \n\n*if paranoia >= 50\n\tThe Dragon's sudden appearance and rise has added a new layer of fear to the already bloody streets of NOLA. Gangsters may try to pretend they've seen his ilk before, but they tread lightly in his territory lest they suffer his wrath.\n*if paranoia \u003c 50\n\tThe Dragon's sudden appearance and rise has been impressive, but the underworld has seen his ilk before. Most gangsters see him almost like a shot of good, strong bourbon—it goes down smoothly, but you're not sure whether or not it will bite you in the ass.\n*page_break\n\nFor as long as it has existed, this city has been roiled by clashing forces—the Spanish, the English, the French, the Germans, the Italians, the Irish, and even Mother Nature with her stifling heat and raging hurricanes. \n\nAnd now, the Chinese.  \n\nA wise individual would fear The Dragon. Some might say you are two sides of the same coin. Still others might seek to drive this foreign competition from the city's shores. What do you say, headcrusher? \n\n*choice\n\t#He has my respect; The Dragon and I both use intimidation tactics to control our enemies—and friends. \n\t\t*set take_it_to_the_mattresses %+5\n\t\tNo one has ever described a headcrusher as wise, have they?\n\t\t*if career_headcrusher\n\t\t\tMaybe he will appreciate your dedication to you craft, should the two of you ever meet.\n\t\t*comment endif\n\n\t\t*goto unlucky\n\t#The Chinese? Finally! The mob has always embraced new business opportunities.\n\t\t*set respect %+5\n\t\tEnterprising and fearless. Maybe there's a future for you…if your greed doesn't kill you first.\n\t\t*if desire = 1\n\t\t\t*set jumpin_the_gun %-5\n\t\t\tOf course, if you really intend to take down The Bull, making friends withe The Dragon could benefit you greatly.\n\t\t*comment endif\n\n\t\t*goto unlucky\n\t#I couldn't care less, as long as The Dragon doesn't get in my way tonight.\n\t\t*set paranoia %-5\n\t\t*set jumpin_the_gun %+5\n\t\t*goto unlucky\n\t*if (desire = 2) #The Dragon and I are nothing alike! I know my past choices have been wrong, even evil.\n\t\t*set remorse %+5\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*set paranoia %-5\n\t\t*goto unlucky\n\n*label unlucky\nRumor has it that anyone unlucky enough to earn the Dragon's ire suffers the legendary ritual murder known as [i]Lingchi[/i], the death by a thousand cuts. The Dragon himself is said to wield the knives, first cutting out the victim's eyes, ears, and tongue, and then, over the next several days, administering thousands of small cuts all over the body before finally, mercifully, letting what's left of the victim die. \n\nThe victim's remains are then paraded through the streets of the Dragon's territory in a ceremonial display of carnage. As a form of execution, it is gruesome, but as a deterrent, it is magnificent, striking terror into the heart of the most hardened gangster. Just thinking about it makes a wave of fear wash over you.\n\n*fake_choice\n\t#I may be a headcrusher, but having a limb hacked off is terrifying stuff. \n\t\t*set fear_limb true\n\t\tThey say that karma's a bitch. You hope that you never have to meet her.\n\t#Spiders—tiny little legs crawling all over me, on my face, into my mouth….\n\t\t*set fear_spider true\n\t\tThe thought of their little legs crawling all over you gives you the heebie-jeebies. You try not to even think about them; if you do, you find yourself covered in dozens of imaginary ones, desperately trying to brush them off before they reach your mouth.\n\t#I dream about drowning all the time—sinking into darkness as water fills my lungs and I burn for air….\n\t\t*set fear_drowning true\n\t\tBefore you learned to defend yourself, you used to get your head dunked in toilet bowls. Though you learned to fight back, you never got over the fear of drowning that those moments instilled in you.\n*comment endif\n\nYou shake off those thoughts. They will do you no good here on The Dragon's turf.\n*page_break\nAs you make your way, childlike laughter echoes off the buildings around you. You're being followed.\n\nMore sights and sounds assault you. Lightning bugs flare and fade like faeries playing tricks. In the distance, a cat screeches. Trash cans roll past you, while multiple feet pound the pavement. \n\nYou reach down to your waist to grab the sawtooth with your…\n\n*fake_choice\n\t#…right hand.\n\t#…left hand.\n\t\t*set dominant \"left\"\n\t\t*set weak \"right\"\n\nAs you wrap your fingers around the sawtooth, you turn a sharp corner onto a dirty street faced by crumbling buildings. Haphazardly placed trash cans and broken benches block your path, forcing you into the middle of the road. \n\nIt's a trap.\n\nYou stop, chest heaving, sweaty ${dominant} hand gripping the life out of the sawtooth. You spin, but see no one in any direction. It's a game of cat and mouse. Go. \n\nTime to say something cool.\n\n*fake_choice\n\t#\"Come on out, ya crumb.\"\n\t\t*set savvy %+5\n\t\tA bit cliché, but you say it casually and play it off rather well. \n\t#\"I know you're there, and I got a big ol' blade waitin' for you.\"\n\t\t*set respect %+5\n\t\tBold move. The Dragon would dig it.\n\t#\"I'm here to do two things: kick ass and chew bubble gum…and I'm all out of bubble gum.\"\n\t\t*set jumpin_the_gun %+5\n\t\tA great line that doesn't give too much away.\n*comment endif\n\nLike a scene from a movie, lids explode from their trashcans and clatter to the pavement, while whoops and hollers echo in the night. The clink of dangling chains and the thud of myriad footsteps tell you something very clearly: you are surrounded.\n*page_break \n\nYou find yourself in a circle of teen faces—snot-nosed girls and boys covered in piercings, some with chains running from nose studs to ears. Spiked hair and name-brand anarchist T-shirts abound. Lest you take them lightly, though, thirty switchblades fly out of pockets and click open as one.\n\nIt's a gang of gutterpunks—rich street kids whose parents are part of the elite social and political crowd in NOLA. These spoiled brats are working for The Dragon now….\n\n*if male = false\n\tThe leader of the pack looks you up and down and sneers. \"Maybe you should stay on Bourbon Street with the other tourists where your boyfriend can take care of you.\"\n*if male\n\tThe leader of the pack moves toward you, mohawk standing tall on his head. He sneers. \"You don't look like much.\" \n*page_break\n\nBefore you can blink, he's on you, long arm slashing with the switchblade as he lets out a banshee scream. You get your arm up, but the blade opens your forearm, cutting through the bicep and showering your suit with blood. With your other hand, you grab his left arm, only to discover that he's packin' another switchblade in his right hand. The second blade leaps towards your face in one fell swoop.\n\nSLASH!\n*page_break\n\n*if take_it_to_the_mattresses \u003c= 50\n\t*set wounds +1\n\t*set identity_revealed true\n\tBlood slowly drips down your forehead, running down your cheek. The entire crowd becomes silent, their big childlike eyes turning to fear. \n\tYou reach up and slowly take off your hat. A diagonal tear runs from the crown to the brim. The old fedora that kept you anonymous, that protected your identity, and that had been yours so long that it felt like a part of you, is now just so much shredded fabric. \n\t*page_break\n\n\t*if pitts_crime = \"arson\"\n\t\t*label gutter_pitt\n\t\t*set gutterpunk_posse true\n\t\t\"I know you…\" the leader says. As you lock eyes, he puts down his blades and tells the other kids to do the same. After a moment's hesitation, they do what he says.\n\n\t\tThe leader goes on. \"You stopped The Pitt from burning my Dad's house down. Thanks to you, the only thing that went up in flames was our antique couch. You saved the only records of our Russian heritage.\"\n\n\t\tHe laughs and gives you a hug, apologizing for the bloody mess you are in. \n\n\t\t\"Let's go see The Dragon.\"\n\n\t\tSoon, a dilapidated green house comes into view. The leader of the gutterpunks gestures for you to enter.\n\t\t*goto gutterpunk_escort\n\t*else\n\t\tThe leader cocks his head, getting a good long look at you. \"I know you from somewhere…. I've seen you around.\" \n\t\n\t\tWith your identity blown, you can feel the tension rising in you. The snot-nosed leader gives you a wide, mirthless smile, revealing bright blue braces. He knows they have you now, and he doesn't hesitate to take advantage. \n\n\t\tHis right hand a blur, he opens another hole, this time in your arm. As your blood pours out, the other punks surround you, jabbing and tearing at you. Stinging, searing pain explodes all over your body. \n\t\t*goto overcome\n*else\n\tThe blade puts a small cut in your forehead, barely missing your hat. That was a close one, and you'll have a nice little scar to complement all the others.\n\n\tYou look up at the crowd, fresh blood splattered all over your suit.  There certainly does seem to be a lot of them.\n\t\n\t*choice\n\t\t#Maybe I can talk them into letting me go. Hell, they might even help. Everyone hates The Pitt. \n\t\t\t*set savvy %+5\n\t\t\t*set respect %-5\n\t\t\tYou jump on to one of the sturdier benches to get their attention. Once you have it, you let them know where you're headed: [i]Girls Girls Girls[/i]. The gutterpunks' ears perk up; they're interested.\n\t\t\t\n\t\t\t*if pitts_crime = \"arson\"\n\t\t\t\t*goto gutter_pitt\n\t\t\t*elseif savvy >= 65\n\t\t\t\t*set respect %+5\n\t\t\t\tYou lay it out for them—minus a few key points that would give away your identity. You're taking The Pitt down and you'll throw his body to the wolves, if they can stand the rancid, stringy meat. All you need from them is safe passage through The Dragon's territory. \n\t\t\t\t*label slowly\n\t\t\t\t\n\t\t\t\tSlowly, a small smile crosses the face of the leader, and he lowers his blades. The other gutterpunks follow his cue. Their blades are down, but not put away. \n\t\t\t\t\n\t\t\t\tThey are still suspicious, and rightfully so….\n\t\t\t\t\n\t\t\t\t\"You hook us up with two large, and we'll take you to The Dragon.\"\n\t\t\t\t\n\t\t\t\tTwo large? That's chump change. You toss them the juice, and your newly hired bodyguards lead you deeper into The Dragon's territory. Soon, a dilapidated green house comes into view. The leader of the gutterpunks gestures for you to enter.\n\t\t\t\t*set juice -2000\n\t\t\t\t*page_break\n\t\t\t\t*goto gutterpunk_escort\n\t\t\t*else\n\t\t\t\t*set jumpin_the_gun %+5\n\t\t\t\tAll your pent-up anger, all your tension, all your suspicion fades away as you lay it out for the gutterpunks. You let 'em know that you're on the warpath, you're taking out The Pitt, and you're gonna do it in a way that would even disturb The Dragon. \n\t\n\t\t\t\tYour speech ends, and they stare blankly at you. Damn.\n\t\n\t\t\t\tFinally, the leader steps up to you, and gives you a long look, before punching you in the face with the handle of his switchblade. The punks surround you, jabbing and tearing at your suit. Stinging, searing pain explodes all over your body. \n\t\t\t\t\n\t\t\t\t*goto overcome\n\t\t#Keep fighting.  One thing The Bull taught me is to die with honor, unless I kill them first….\n\t\t\t*set take_it_to_the_mattresses %+10\n\t\t\t*set clips +2\n\t\t\t*set respect %+10\n\t\t\t*set wounds +1\n\t\t\tYour sawtooth poised and ready in your ${dominant} hand, you spin, slashing arms and stomachs, hitting faces with your elbows, and dodging attacks as redness spurts into the air. Your face and suit are soon covered with blood, most of it not yours. The gutterpunks in the front fall away, trampled by those behind them. \n\t\n\t\t\tYou're skilled and nimble, but they've still got you surrounded. They come at you from all sides, and you can't hope to block them all. As multiple blades cut and rip into your flesh, searing agony explodes throughout your body. \n\t\n\t\t\t*choice\n\t\t\t\t#I ignore it, and keep fighting.\n\t\t\t\t\t*set jumpin_the_gun %+10\n\t\t\t\t\t*set wounds +1\n\t\t\t\t\t*set clips +4\n\t\t\t\t\t*if take_it_to_the_mattresses > 60\n\t\t\t\t\t\tEven in pain, your skills are formidable. Four gutterpunks go down in sprays of blood and bone.  Your chest heaves from the exertion.\n\t\t\t\t\t\t\n\t\t\t\t\t\tClearly impressed, the leader calls his gang off. \"Ok, boss. Let's go meet The Dragon.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour newly acquired bodyguards lead you deeper into The Dragon's territory. Soon, a dilapidated green house comes into view. The leader of the gutterpunks gestures for you to enter.\n\t\t\t\t\t\t*goto gutterpunk_escort\n\t\t\t\t\t*else\n\t\t\t\t\t\tKnowing your life is on the line, you fight dirty, kicking and clawing your way down the street. But there are just too many of them, and even more blades sink into your flesh. You realize you might not make it out of this.\n\t\t\t\t\t\t*goto overcome\n\t\t\t\t#I run to the Mississippi River.\n\t\t\t\t\t*set respect %-15\n\t\t\t\t\t*set jumpin_the_gun %-10\n\t\t\t\t\tThe sawtooth still clutched in your ${dominant} hand, you break into a limping run and hobble as fast as you can down the street. The gutterpunks head you off, keeping you running, playing you like cats playing a mouse.\n\n\t\t\t\t\tFinally, exhausted and bleeding, you can run no more.\n\t\t\t\t\t*goto overcome\n\t\t\t\t#I play dead.\n\t\t\t\t\t*set savvy %+10\n\t\t\t\t\t*set respect %-10\n\t\t\t\t\t*set jumpin_the_gun %-10\n\t\t\t\t\tYou let yourself fall and lie completely still. It only takes a moment for the gutterpunks to stop slashing and kicking your limp body. The leader nudges your body with his foot to see if he gets a reaction.\n\t\n\t\t\t\t\tNothing.\n\t\n\t\t\t\t\tThen, gasping. Confusion. A short argument. A young girl is crying. They didn't want to kill anyone. They aren't supposed to kill anyone. After a few minutes of letting them panic and reveal their vulnerabilities, you move slightly.\n\t\t\t\t\t*page_break\n\n\t\t\t\t\t*if voodoo_necklace\n\t\t\t\t\t\tThe leader reaches down, noticing the bony necklace around your neck. He mutters the name  \"Auntie Ezma,\" anger and fear warring on his face. He warns his followers not to touch the necklace for fear of a voodoo curse. \n\n\t\t\t\t\t\t*label time_to_see\n\t\t\t\t\t\t\"We gotta take ${him} to see The Dragon.\"\n\n\t\t\t\t\t\tTwo of them pick you up and sling you over their shoulders. Following the leader, they carry you deeper into The Dragon's territory.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto drags\n\t\t\t\t\t*else\n\t\t\t\t\t\tWhen the gutterpunks notice, they heave simultaneous sighs of relief! The leader tells you he feels bad about practically killing you, so he's going to take you to The Dragon. He grabs your sawtooth, heaves you over his shoulder, and starts to carry you.\n\t\n\t\t\t\t\t\tThe Dragon will know what to do, and you'll get a free ride there! \n\t\n\t\t\t\t\t\tTotal score!\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto drags\n\t\t#Give up and tell them to take you to their boss.\n\t\t\t*set savvy %+5\n\t\t\t*set respect %-15\n\t\t\tThrowing the sawtooth on the ground at the leader's feet, you surrender and tell them you need to talk business with The Dragon.\n\t\n\t\t\t*if pitts_crime = \"arson\"\n\t\t\t\tIt's at this point that something strange happens.\n\t\t\t\t*goto gutter_pitt\n\t\t\t*elseif take_it_to_the_mattresses \u003c= 60\n\t\t\t\tThe leader gives you a long look, and then punches you in the face with the handle of his switchblade. Apparently, raising-the-white-flag isn't in their vocabulary. The punks surround you, jabbing and tearing at your suit. Stinging, searing pain explodes all over your body. \n\t\t\t\t*set wounds +1\n\t\t\t\t\n\t\t\t\tLike a king of legend overcome by the sea, you collapse under their onslaught. Laughing, they continue to slash and kick as you roll around on the ground.\n\n\t\t\t\tThey only stop once they realize you are no longer moving. The leader gives you one final kick—muttering something about not trusting cowards—and directs his companions to hoist you up.\n\t\t\t\t*page_break\n\t\t\t\t*goto drags\n\t\t\t*else\n\t\t\t\tThe leader gives you a long look, and then throws a punch at your face, but you grab his fist, and using his own momentum, twist his arm behind his back. You relieve him of his knife, flick it open, and hold it to his ear.\n\t\n\t\t\t\t\"Ow! My ear!\" the leader cries. The rest of the gutterpunks gasp, not knowing what to do.\n\t\t\t\t*page_break\n\t\n\t\t\t\tIn a deadly voice just loud enough to be heard by the gutterpunks around you, you say, \"The Dragon. Now. Or I start cutting.\" \n\t\n\t\t\t\tCowed, he lets you march him down the street. \n\t\t\t\t*if male = false\n\t\t\t\t\tThe leader tries to apologize for doubting your skills earlier. Your burning gaze shuts him up mid-sentence.\n\t\t\t\tThe gutterpunks follow from a safe distance like lost puppies. You finally arrive at a dilapidated green house, festooned with so many faded decorations that it looks like the aftermath of an exploded Chinese lantern.\n\t\t\t\t*gosub disney\n\t\n\t\t\t\tYou take the blade away from the leader's ear and hand it back to him, along with your sawtooth (house rules). He promises you'll get it back when you are done—if you survive.\n\t\t\t\t*page_break\n\t\t\t\t*label gutterpunk_escort\n\t\t\t\t*set on_floor false\n\t\t\t\tYou pass through the doorway into a dimly lit hall suggesting an opium den. Bronze incense burners in every corner fill the room with smoke, while women wearing colorful clothing and painted faces stare at you with dark eyes. The incense mixes with the smell of cigars and heavy perfume, and the sounds of rough laughter fill your ears. Somewhere you hear coughing and conversation.\n\t\t\t\t*gosub disney\n\t\t\t\t\n\t\t\t\tFinally, you enter an actual room.\n\t\t\t\t*goto ceremoniously_dumped\n\n*label overcome\n*set wounds +1\nLike a king of legend overcome by the sea, you collapse under their onslaught. Laughing, they continue to slash and kick as you roll around on the ground.\n\nThey finally stop when they realize you are no longer moving.\n*goto time_to_see\n\n*label drags\nThe gang carries you inside a dilapidated green house. They don't stop their forward motion even though you are instantly bewildered by the winding hallways, suggestive of an opium den. You pass through the doorway into a dimly lit hall suggesting an opium den. Bronze incense burners in every corner fill the room with smoke, while women wearing colorful clothing and painted faces stare at you with dark eyes. The incense mixes with the smell of cigars and heavy perfume, and the sounds of rough laughter fill your ears. Somewhere you hear coughing and conversation.\n*gosub disney\n\nFinally, you are deposited on the floor in the middle of an actual room. You look up, and a mighty bronze dragon hanging off the ceiling stares back into your very soul. Its eyes offer no peace or support. Instead, they cut into you, eviscerate you. \n\nThe voices fade, and time seems to stop. \n*page_break\n\nA large, polished boot with a steel toe appears next to you. As you raise yourself to your elbows, your eyes focus on the meticulous laces, the pants tucked in with military precision. \n*if respect \u003c= 60\n\tThe boot touches your chin, pushing your head back. Your nostrils flare, seeking clean air among the room's heavy scents. The steel toe turns slightly, forcing you to look at its owner, and a foul odor assaults you. \n\n\tThe boot has been rubbed in dog shit. \n*if respect > 60\n\tA hand holding a handkerchief reaches down to the boot and wipes away a foul-smelling substance. As the boot touches your chin, you realize it was covered in dog shit. \n\n\tAt least the crap was wiped off the boot before it touched your face—a proper headcrusher deserves at least that. The steel toe turns slightly, forcing you to look at its owner.\n*comment endif\n\n*choice\n\t*if (identity_revealed) #The shredded suit and hat is a bit embarrassing. The mob taught me better than this.\n\t\t*set respect %+5\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*goto post_outfit\n\t#This kick-me-while-I'm-down-motif is wearin' kinda thin. \n\t\t*set take_it_to_the_mattresses %+5\n\t\t*goto post_outfit\n\t*if ((respect \u003c= 60) and (identity_revealed)) #What a hilarious way to go out—dog shit in my face, a mangled suit, and a failed mission. \n\t\t*set savvy %+5\n\t\t*set paranoia %-5\n\t\t*goto post_outfit\n\t*if ((respect \u003c= 60) and (identity_revealed = false)) #This is no way for me to go out, with dog shit on my face and a mission left undone.\n\t\t*set savvy %+5\n\t\t*set paranoia %-5\n\t\t*goto post_outfit\n\t*if (respect > 60) #It's time to get my shit together. NOLA's Number One headcrusher doesn't belong at anyone's feet.\n\t\t*set savvy %+5\n\t\t*goto post_outfit\n\n*label post_outfit\nAs you look up from the boot, your eyes are immediately drawn to the tip of a sheathed sword hanging over your heart. Little gold dragons decorate the sheath, clawing and breathing fire all the way up to the hip the sword rides on. On the sword's hilt rests a firm hand, a strong hand with carefully manicured and lacquered fingernails. \n*goto see_dragon\n\n*label ceremoniously_dumped\nThe first thing you notice on entering the room is the sword. It rests in an ornate sheath decorated with little gold dragons clawing and breathing fire all the way up its length. It rides at the hip of a figure with its back to you. Slowly, the figure turns to face you.\n*goto see_dragon\n\n*label see_dragon\n\nIt's The Dragon. And he's a woman.\n*page_break\n\nAsh falls off the cigar clenched between her teeth, and white hair billows in a halo around her head. She asks what you have to say for yourself.\n\n*choice\n\t#When in doubt, I'm a smart ass. \n\t\t*set savvy %+5\n\t\t*set paranoia %-5\n\t\tYou salute.\n\n\t\t\"What's up, Cap'n?\" \n\t\t\n\t\t*if on_floor\n\t\t\tShe laughs, obviously entertained, and moves her boot away from your face, letting you fall back to the ground in comical fashion. She claps twice, and a steaming bottle of liquid is brought out.\n\t\t*if not(on_floor)\n\t\t\tShe laughs, obviously entertained. She claps twice, and a steaming bottle of liquid is brought out.\n\t\t*page_break\n\t\t*goto liquid\n\t*if (desire = 1) #This might work out in my favor; I'll give her a taste of what I'm up to.\n\t\t*set savvy %+5\n\t\t*set paranoia %-5\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*set respect %-5\n\t\tWith a shrug of your shoulders, you casually mention that you are on a mission to stop a mafia war. \n\n\t\tThe Dragon folds her arms and looks at you. \"A mafia war, you say?\" She motions with her eyes, and a steaming bottle of liquid is brought out.\n\t\t*goto liquid\n\t#I belong to The Bull. I ain't sayin' nothin'.\n\t\t*set paranoia %+5\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*set respect %+5\n\t\tShe cocks her eyebrows, waiting for you to speak. As the silence lengthens, she begins to scowl.\n\n\t\t\"Did someone cut out your tongue? Why are all [i]mafiosi[/i] so stubborn?\"\n\n\t\tShe shakes her head and claps her hands. A steaming bottle is brought out.\n\t\t*goto liquid\n\t#The only one I trust on this suicide mission is myself. She'll get nothin' out of me.\n\t\t*set paranoia %+5\n\t\t*set savvy %+5\n\t\t*set take_it_to_the_mattresses %+5\n\t\tAs she waits for you to spill the goods, she taps a foot impatiently. The click of the boot against the floor makes you think of a timer, and sure enough, after thirty seconds of—relative—silence your time runs out. She puts her hands on her hips and sticks her chin up in the air.\n\n\t\t\"Fine, you want to play it that way?\"\n\n\t\tA steaming bottle is brought out, and she smiles.\n\t\t*goto liquid\n\t#Wait…isn't The Dragon supposed to be a man? \n\t\t*set jumpin_the_gun %+5\n\t\t*set savvy %+5\n\t\tThe words fly out of your mouth with no filter. Her eyes narrow, and she gives you a look that could cut through ice. \n\n\t\tSuddenly, she hugs herself and bursts into laughter. She claps her hands twice, and a steaming bottle is brought out.\n\t\t*goto liquid\n\n*label liquid\n*if on_floor\n\tTwo men grab your hair and pull your face up. Another pours hot liquid down your throat. \n*if on_floor = false\n\tTwo men seize your arms, and force you to your knees. Another reaches forward, pulling your mouth open, while a fourth pours hot liquid down your throat.\nAs the noxious concoction runs down your pipes, your eyes snap open wide. You gasp and try to force yourself away from the steaming bottle.\n\nYou shake your head, blinking, and start to feel very, very weird….\n\nAs the drug takes effect, your mind becomes oddly sharper, but more disconnected from your body. You feel yourself floating and you look down at the floor. Seeing your body below you, you meet your own eyes as you hover. \n\nThere are now two of you.\n*page_break\n\n\"Sweet liquid death….\" The words slip out almost against your will.\n\nThe Dragon cocks a smile.\n\n\"Not death…just fermented tiger piss mixed with distilled sorghum.\" \n\n*fake_choice\n\t#That would explain the kick at the end.\n\n\t#Ugh. Gross.\n\n\t#Eh. I've drunk worse things.\n*comment endif\n\nWith a flourish, she takes a seat on an ornate golden throne. Crossing her legs, she expresses fascination with your determination. Her voice echoes through the room as she points out how stupid you must be to stumble through her territory. \n\nYou search both your minds in order to figure out what to tell her. The fermented tiger piss is causing you to feel a bit out of control. \n\n\"Let us try this again.  Why have you come to me, headcrusher? You risk a lot coming into my territory.\"\n\n*choice\n\t#I talk about the night I spent with ${l_name}. I love ${l_him} more than anything.\n\t\t*if desire = 4\n\t\t\tYou start babbling about the smell of ${l_name}'s skin, the color of ${l_his} eyes, the softness of ${l_his} hair; how ${l_he} has ruined you for anyone else; and how much you love ${l_him}. And how you have to save ${l_him} from The Pitt and plant that little weasel six feet under.\n\t\t\t*set respect %+5\n\t\t\t*set paranoia %-10\n\t\n\t\t\tWith a gasp, you slap all four hands over your mouths to stop \n\t\t\t*if desire != 4\n\t\t\t\tfrom spilling more about your wishes to ${desire_text}. \n\t\t\t*if desire = 4\n\t\t\t\tyou from rambling any further about your love for ${l_name}.\n\t\t\tThe Dragon hugs herself and laughs. \n\t\n\t\t\t\"It's the tiger piss,\" she says, leaning forward and staring into you. \"It takes your defenses down, makes you divulge your deepest secrets.\"\n\t\n\t\t\tSudden vertigo washes over you, and your two halves collide, leaving you whole but disoriented. As your vision clears, you find yourself back in your body, on the floor and in deep trouble. \n\n\t\t\tAfter all these years of burying it, your deepest secret is in the hands of a rival mob boss, thanks to the tender offices of fermented tiger urine. You've delivered canaries for lesser offenses. \n\t\n\t\t\tNow you are one of them. \n\t\t\t*page_break\n\t\t\tThe Dragon places both her elbows on her knees.\n\t\n\t\t\t\"What I find interesting is that your darkest secret is about falling in love. It's not something I can kill you for. Warriors, true warriors, need love.\" \n\t\n\t\t\t*if respect >= 40\n\t\t\t\tShe stands up. \n\t\t\t\t*goto doe\n\t\t\t*else\n\t\t\t\tShe stands up. \"It's time for my Zumba session,\" she says. You try to rise, but your balance deserts you, and you find yourself sprawled on the floor. Clearly, the tiger piss is still affecting you. \n\t\n\t\t\t\t\"No Zumba for you!\" The Dragon laughs as she waves her finger. \"But you may pass through my territory. Here are your things.\" She gestures, and the gutterpunks return your sawtooth and your juice to you. \"Good luck on your journey,\" she says by way of goodbye.\n\n\t\t\t\t*gosub last_question\n\t\t\t\t*if false\n\t\t\t\t\t*label last_question\n\t\t\t\t\tYou might have time to ask her just one last question.\n\t\t\t\t\t*set hinted true\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#\"That wasn't really tiger piss, was it?\"\n\t\t\t\t\t\t\tShe turns and laughs. \"No, it wasn't. It was my thesis project at MIT. You never realize how rewarding a Ph.D. in chemical engineering can be until you've used it to blackmail your defense committee!\"\n\t\t\t\t\t\t#\"You're not really from China, are you?\"\n\t\t\t\t\t\t\tShe turns and laughs. \"You noticed my accent.\"\n\t\t\t\t\t\t#\"Can I have a job?\"\n\t\t\t\t\t\t\tShe turns and laughs. \"I don't think you're worth the shit I'd have to take from The Bull.\"\n\t\t\t\t\t\t#These are all stupid questions.\n\t\t\t\t\t\t\tYou clutch your hands over your mouth to avoid saying anything else. She turns and laughs. \"You need to work on your self control.\"\n\t\t\t\t\t*comment end_choice\n\n\t\t\t\t\tThe Dragon launches into a heartfelt monologue. \"I grew up in Southern California, where free will is an illusion. My parents emigrated from Vietnam; they always wanted me to go to MIT, get my engineering degree, and find a good husband. I will not be stuck in the past, forced to serve and dress and do as I'm told.\"\n\n\t\t\t\t\t*if male = false\n\t\t\t\t\t\t\"You and I, we're trapped in a man's world, and we must be strong, fast, and smart to survive it. Just like you wear a suit and carry a sawtooth, I wear an identity. That is why I never leave this territory. So\n\t\t\t\t\t*if male\n\t\t\t\t\t\t\"So\n\t\t\t\t\tI fled until I found myself in New Orleans. I fell in love with its beauty and its secrets. Let the people think I am a man. Let them create illusions. I'll keep my power and, even better, my freedom.\"\n\t\t\t\t\t*page_break\n\t\t\t\t\t*return\n\t\t\t\t\n\t\t\t\tThe gutterpunks blindfold you and take you outside, Clean air fills your lungs for a moment, until they throw you in the back of a van. They
