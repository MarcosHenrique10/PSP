k_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]NOLA is Burning[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n*temp has_allies false\n*if gutterpunk_posse\n\t*set has_allies true\n*if cop_posse\n\t*set has_allies true\n*if forest_demons\n\t*set has_allies true\n*if deal_performers\n\t*set has_allies true\n*temp patrons_evac true\n[b]Chapter Ten: Full Throttle[/b]\n\nThe neon lights from [i]Girls Girls Girls[/i] illuminate the horizon, but now they compete with the first rays of the new rising sun. 6AM is fast approaching. \n\nTwo bouncers stand at the door; you raise your ${weapon} and they suddenly discover that discretion is the better part of valor. Once they have fled, you kick down the door of the revue and storm inside.\n\nThe patrons, performers, musicians, and staff pause at the sight of you and your ${weapon}, too terrified to move. Then, from a side room, three of The Pitt's goons appear. They must be the welcoming committee…and they must be even dumber than they look, because even up close and personal, they don't stop when they see a ${dragon} before them. No matter.\n*if (remorse > 55) and ((jumpin_the_gun \u003c 60) and (deal_devil))\n\t*if two\n\t\tYou raise your new arm and fire it into the air.\n\t*if two = false\n\t\tYou raise your ${weapon} and fire it into the air.\n\t*comment endif\n\t\n\tThe three goons drop their weapons and flee through the nearest exit.\n\t*goto across_the_room\n*if (weapon = \"ossein gun\") or (weapon = \"ossein guns\")\n\tYou raise your ${weapon}, and bullets made of living bone shred the meatsacks that used to be The Pitt's men.\n*if (weapon = \"voodoo appendage\") or (weapon = \"voodoo appendages\")\n\tBullets and bone fragments burst from your ${weapon}, hitting The Pitt's men right in their foreheads.\n*if (weapon = \"nanotech appendage\") or (weapon = \"nanotech appendages\")\n\tYou hold up your ${weapon}, and bullets tear into The Pitt's men.\n*if (weapon = \"demonic appendage\") or (weapon = \"demonic appendages\")\n\tBlack acid spews from your ${weapon} and covers The Pitt's men, dissolving them into unholy sludge.\n*if (weapon = \"divine cross\") or (weapon = \"divine crosses\")\n\tYou hold up the giant cross and it sends flaming communion wafers into The Pitt's men.\n*if (weapon = \"cybernetic rifle\") or (weapon = \"cybernetic rifles\")\n\tHigh-powered slugs shoot from your rifle, and several slam into the stomachs and chests of The Pitt's men. Look, Ma! Swiss cheese!\n*set clips +3\n*set kill_no_more false\n\nIt's a massacre.\n*label across_the_room\n\nAcross the room, more of The Pitt's goons begin to file in from the bowels of the complex. There must be dozens of them. Too bad they missed the show.  \n*if gutterpunk_posse\n\tThe gutterpunks filter into the venue behind you, playing with their chains and their switchblades.\n*if cop_posse\n\tThe cops nonchalantly stroll in behind you, twirling their billy clubs.\n*if forest_demons\n\tThe forest demons fan out behind you, spinning their swords.\nLooks like it's time to make a real impression!\n\nSeizing the moment, you jump onto the stage.\n\n*choice\n\t#I warn the patrons to flee…unless they want to become part of the show.\n\t\tMost of the customers run out the front door as more of The Pitt's men come out. \n\t\t*label gutterpunk_posse\n\t\t*set kill_no_more false\n\t\t*if (weapon = \"ossein gun\") or (weapon = \"ossein guns\")\n\t\t\t*set clips +7\n\t\t\tYour ${weapon} acts on instinct, showering The Pitt's goons with organic bullets. Thank goodness for Auntie Ezma!\n\t\t*if (weapon = \"divine cross\") or (weapon = \"divine crosses\")\n\t\t\t*set clips +15\n\t\t\tHolding up your ${weapon}, you fire into The Pitt's goons all at once. Father Confessor watches from the doorway, cheering you on.\n\t\t*if (weapon = \"demonic appendage\") or (weapon = \"demonic appendages\")\n\t\t\t*set clips +22\n\t\t\tBlack acid and fire shoot from your ${weapon} and cover The Pitt's goons. Their bodies immediately melt into a disgusting mess!\n\t\t*if (weapon = \"voodoo appendage\") or (weapon = \"voodoo appendages\")\n\t\t\t*set clips +16\n\t\t\tSkin matter explodes from your ${weapon} to cover The Pitt's goons, followed by sharp knives that sprout from unsuspecting chests.\n\t\t*if (weapon = \"nanotech appendage\") or (weapon = \"nanotech appendages\")\n\t\t\t*set clips +12\n\t\t\tYou hold up your ${weapon} and flames belch forth in the direction of The Pitt's goons. The lucky ones are incinerated immediately, while the others roast in exquisite pain.\n\t\t*if deal_performers\n\t\t\tThe performers push the patrons out, yelling at them to run for their lives.\n\t\t*comment endif\n\n\t\t*if respect > 75\n\t\t\tThe Pitt's men—the ones who are still alive, anyway—stop in their tracks, taking stock of your\n\t\t\t*if forest_demons\n\t\t\t\t${weapon} and the team of warrior Forest Demons.\n\t\t\t\t*goto backtracking\n\t\t\t*elseif cop_posse\n\t\t\t\t${weapon} and police backup.\n\t\t\t\t*goto backtracking\n\t\t\t*elseif gutterpunk_posse\n\t\t\t\t${weapon} and the sea of switchblade-wielding gutterpunks behind you.\n\t\t\t\t*goto backtracking\n\t\t\t*elseif deal_performers\n\t\t\t\t${weapon} and the angry performers.\n\t\t\t\t*goto backtracking\n\t\t\t*elseif (weapon = \"ossein gun\") or (weapon = \"ossein guns\")\n\t\t\t\tterrifying ${weapon} that makes you look like a weird voodoo trash monster, risen straight from the dumpster. Frozen with fear, they stare at you with wide eyes while the customers race for the door.\n\t\t\t\t*page_break\n\t\t\t\t*goto backstage\n\t\t\t*else\n\t\t\t\t${weapon}.\n\t\t\t\t*label backtracking\n\t\t\t\t\n\t\t\t\tBacktracking, they turn tail and run, pushing each other out of the way and trampling the unlucky customers in their way. \n\t\t\t\t*page_break\n\t\t\t\t*goto backstage\n\t\t*else\n\t\t\t*label fight_pitts_men\n\t\t\t*if take_it_to_the_mattresses > 65\n\t\t\t\t*label fight_pitts_men_ok\n\t\t\t\t*set wounds +1\n\t\t\t\t*label fight_pitts_men_good\n\t\t\t\t*set clips +6\n\t\t\t\t*set kill_no_more false\n\t\t\t\tApparently, they still haven't gotten the message that you're not to be fucked with. They charge.\n\n\t\t\t\tYour body moves with fluid grace as you effortlessly toss them around the room. \n\t\t\t\t*if forest_demons\n\t\t\t\t\tThe Forest Demons cut off arms and heads with ease. These girls ain't messin' around.\n\t\t\t\t*if cop_posse\n\t\t\t\t\tThe police throw bracelets on whomever is still alive, hauling them out of the revue.\n\t\t\t\t*if gutterpunk_posse\n\t\t\t\t\tThe gutterpunks follow your lead, ripping and tearing with their switchblades. \n\t\t\t\t*if deal_performers\n\t\t\t\t\tA few of the performers take down goons with skillfully thrown stilettos.\n\t\t\t\t*comment endif\n\n\t\t\t\tTables, glasses, napkins, and trays go flying as dead men sail through the air. A couple of The Pitt's men tag you with punches, but you grab their fists before they can come back for seconds. With a smooth twist, you break their arms and send them flying through the air.\n\t\t\t\t*gosub combat_results\n\n\t\t\t\tA piece of cake. \n\t\t\t\t*goto backstage\n\t\t\t*else\n\t\t\t\t*label fight_pitts_men_bad\n\t\t\t\t*set wounds +2\n\t\t\t\t*set clips +3\n\t\t\t\t*set kill_no_more false\n\t\t\t\tThe Pitt's goons whip out their knives and charge in unison. You find yourself wheezing as you struggle to toss them over tables and onto the stage. \n\t\t\t\t*if remorse > 60\n\t\t\t\t\t*set wounds +1\n\t\t\t\t\t*if patrons_evac \n\t\t\t\t\t\tA drunk customer—clearly slow on the uptake, since almost all the others fled for their lives—accidentally gets in the way. You take a knife to the side, and most of the Pitt's goons get away unscathed.\n\t\t\t\t\t*if patrons_evac = false\n\t\t\t\t\t\tA drunk customer accidentally gets in the way. You take a knife to the side, and most of the Pitt's goons get away unscathed.\n\t\t\t\t\t*comment endif\n\n\t\t\t\t\t*label backstab\n\t\t\t\t\t*if (weapon = \"ossein gun\") or (weapon = \"ossein guns\")\n\t\t\t\t\t\tRipping the knife out of your side, you hit the stabber with your ${weapon}, connecting with his skull. Bone-on-bone never sounds good. He collapses, knocked out cold.\n\t\t\t\t\t\t*goto allies\n\t\t\t\t\t*else\n\t\t\t\t\t\tRipping the knife out of your side, you hit the stabber with your ${weapon}. His body hits the ground—hard.\n\t\t\t\t\t\t*label allies\n\t\t\t\t\t\t*gosub combat_results\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if forest_demons\n\t\t\t\t\t\t\tThe forest demons finish up the job, hacking him to bits in a display of savagery. They attack the remaining goons as you head backstage.\n\t\t\t\t\t\t\t*goto backstage\n\t\t\t\t\t\t*elseif gutterpunk_posse\n\t\t\t\t\t\t\tThe gutterpunks grab the poor guy and slash him to pieces with their switchblades. The Pitt's other goons try to crawl away, but it's too late—the gutterpunks jump on them.\n\t\t\t\t\t\t\t*goto backstage\n\t\t\t\t\t\t*elseif cop_posse\n\t\t\t\t\t\t\tThe heat drags out the survivors, probably to take them back to the station and torture them.\n\t\t\t\t\t\t\t*goto backstage\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tWith The Pitt's men crashed out all over the stage and floor, you head backstage.\n\t\t\t\t\t\t\t*goto backstage\n\t\t\t\t*else\n\t\t\t\t\t*if patrons_evac\n\t\t\t\t\t\tA drunk customer—clearly slow on the uptake, since almost all the others fled for their lives—accidentally gets in the way. You grab him and use him as a human shield—until his body is too mushy to be of use, anyway. But that doesn't help with the knife in the side you take from a goon you hadn't noticed.\n\t\t\t\t\t*if patrons_evac = false\n\t\t\t\t\t\tA drunk customer accidentally gets in the way. You grab him and use him as a human shield—until his body is too mushy to be of use, anyway. But that doesn't help with the knife in the side you take from a goon you hadn't noticed.\n\t\t\t\t\t*comment endif\n\t\t\t\t\t\n\t\t\t\t\t*goto backstab\n\t*if (has_allies) #I demand that the goons take me to see The Pitt.\n\t\t*if (savvy > 55) and (respect > 60)\n\t\t\tAs the action pauses, the last of the customers turn tail and run.  \n\t\t\t\n\t\t\tYou hold up your ${weapon} to The Pitt's goons and gesture towards their dead comrades. Time to spill the beans, boys!\n\n\t\t\t*if deal_lulu = false\n\t\t\t\tWaving a symbolic white flag, they apologize for what happened and agree to take you to The Pitt's office. They know you've been wronged by The Pitt, and they were part of his scheme. Leading you through the revue's confusing hallways, they glance nervously at each other. Selling out their boss is a huge no-no for them, and you can see it all over their faces.\n\n\t\t\t\tA funhouse-like door finally appears, reading [b]BIG BOSS MAN[/b] in oversized letters. \n\t\t\t\t*if cop_posse\n\t\t\t\t\tThe cops haul The Pitt's men off to the station, leaving you to deal with the situation.\n\t\t\t\t*if cop_posse = false\n\t\t\t\t\tThe Pitt's men leave you there to deal with the situation.\n\t\t\t\t*page_break\n\t\t\t\t*goto boss_man\n\t\t\t*else\n\t\t\t\tWaving a symbolic white flag, they immediately apologize for what happened earlier in the evening.\n\t\n\t\t\t\t*if cop_posse\n\t\t\t\t\tThe cops immediately haul The Pitt's men off to the station.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto backstage\n\t\t\t\t*if gutterpunk_posse\n\t\t\t\t\tYou head backstage as the gutterpunks surround the goons.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto backstage\n\t\t\t\t*if forest_demons\n\t\t\t\t\tThe warriors creep around, as the goons look on nervously. You head backstage as the screaming starts.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto backstage\n\t\t\t\t*if deal_performers\n\t\t\t\t\tYou head backstage as the performers surround the goons and get their payback.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto backstage\n\t\t\t\t*if (weapon = \"ossein gun\") or (weapon = \"ossein guns\")\n\t\t\t\t\tThe goons on their knees beg for forgiveness from the possessed-voodoo-bone creature. When nothing happens to them, they crawl out of the venue like canines. You head backstage.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto backstage\n\t\t\t\t*else\n\t\t\t\t\tThis is a bug!  Please report it!\n\t\t\t\t\t*link mailto:jason@choiceofgames.com\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto backstage\n\t\t*else\n\t\t\t*temp patrons_evac false\n\t\t\tFor a moment, the audience is too stunned—and too drunk—to understand the danger. They stare at you and your ${weapon} with glassy eyes, until you start screaming for them to get out. That finally gets through, and they flee [i]en masse[/i]. Meanwhile, The Pitt's men wait, pulling out their weapons and devising an attack plan. They keep their eyes on you as the last customer stumbles out of the revue.\n\t\t\t*if forest_demons\n\t\t\t\tThe warriors freeze in place, crouched low to the ground, as they devise a plan of attack.\n\t\t\t*if cop_posse\n\t\t\t\tThe heat keeps the door open for the innocent bystanders, picking off the ones they recognize from the Most Wanted list.\n\t\t\t*if gutterpunk_posse\n\t\t\t\tThe gutterpunks clink their switchblades together, ready for action. \n\t\t\t*if deal_performers\n\t\t\t\tThe performers take up positions behind you. Whatever happens, they're done with The Pitt and his goons. \n\t\t\t*comment endif\n\n\t\t\tIt's time to get it on.\n\t\t\t\n\t\t\t*goto fight_pitts_men\n\t*selectable_if (remorse \u003c 50) #I kill 'em all.\n\t\t*set take_it_to_the_mattresses %+10\n\t\t*set remorse %-30\n\t\t*set jumpin_the_gun %+10\n\t\t*set clips +5\n\t\t*set kill_no_more false\n\t\t*if take_it_to_the_mattresses \u003c 50\n\t\t\t*set wounds +3\n\t\t*if (take_it_to_the_mattresses \u003c 65) and (take_it_to_the_mattresses >= 50)\n\t\t\t*set wounds +2\n\t\t*if (take_it_to_the_mattresses \u003c 80) and (take_it_to_the_mattresses >= 65)\n\t\t\t*set wounds +1\n\t\tAttacking the patrons as well as The Pitt's men just means a higher body count. And you're down with that.\n\t\t*goto fight_pitts_men\n\t*if (has_allies = false) #I lay it out for them. They are in the wrong place at the wrong time.\n\t\t*if (savvy > 60) and (respect > 65)\n\t\t\t*set jumpin_the_gun %+10\n\t\t\t*set respect %+20\n\t\t\tYou may be a lone ${dragon}, but you're a fucking terrifying ${dragon} when you want to be. And tonight, no one is stopping you.\n\t\t\t\n\t\t\tThe customers and The Pitt's men turn and run. You give 'em a toothy smile as they go.\n\t\t\t\n\t\t\tIt's time to find The Pitt. \n\t\t\t*page_break\n\t\t\t*goto backstage\n\t\t*else\n\t\t\t*set jumpin_the_gun %+10\n\t\t\t*set wounds +2\n\t\t\tThe crowd watches you in fear as you explain the situation. Panic and chaos ensue as The Pitt's men try to keep the customers inside. No reason to fear one ${man}, right?\n\t\t\t\n\t\t\tFortunately for the customers, they manage to get out anyway. Now it's just you—you and The Pitt's army.\n\t\t\t*page_break\n\t\t\t*if take_it_to_the_mattresses > 75\n\t\t\t\t*goto fight_pitts_men_good\n\t\t\t*elseif take_it_to_the_mattresses > 65\n\t\t\t\t*goto fight_pitts_men_ok\n\t\t\t*else\n\t\t\t\t*goto fight_pitts_men_bad\n\n*label combat_results\n*if wounds >= 8\n\t*if pocketbook_bible\n\t\t*set pocketbook_bible false\n\t\t*set wounds -2\n\t\tStartled by the accuracy of their shots, you look down at your chest. You fall behind a table, where you realize you're not as hurt as you thought you were.\n\t\t\n\t\tReaching into your jacket, you pull out the pocketbook bible that Father Confessor gave you—several bullets are lodged in the front cover.\n\t\t*if wounds >= 8\n\t\t\tUnfortunately, it's not enough.\n\t\t\t\n\t\t\tThe wounds you've sustained are too much. You falter, and fall to your knees.  How could this be?  You are the Number One headcrusher. No, no…you are the ${dragon}, bearing your ${weapon}. You are indestructible!\n\t\t\t\n\t\t\tAlas, determination alone is not enough to sustain you.\n\t\t\t*if (desire = 1) or (career_headcrusher)\n\t\t\t\tBut maybe there's a managerial position open in hell?\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene wrap_up\n\t\t\t*else\n\t\t\t\tValhalla, here you come.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene wrap_up\n\t\t*else\n\t\t\tSaying a quick prayer, you return to the fray, only to find it almost over.\n\t\t\t*return\n\t*else\n\t\tThey pull out their guns and open fire on you. A bullet tears through your chest and intense pain fills your body. \n\t\t*if two\n\t\t\tYour ${weapon} begin moving of their own accord. They look like they're ready to blow, and you find yourself jerking around uncontrollably.\n\t\t*if two = false\n\t\t\tYour ${weapon} rises of its own accord, and looking like it's about ready to blow, starts to throw you around uncontrollably. \n\t\t*if (weapon = \"demonic appendage\") or (weapon = \"demonic appendages\")\n\t\t\t*set clips +20\n\t\t\t*set kill_no_more false\n\t\t\t*if two\n\t\t\t\tSuddenly, the ${weapon} explode with a dark whirlwind.\n\t\t\t*if two = false\n\t\t\t\tSuddenly, the ${weapon} explodes with a dark whirlwind. \n\t\t\tDemons burst forth, grabbing with their clawed fingers at anyone they can reach. As they retreat back into the weapon with their prey, one of them locks his clawed fingers around your throat. Its deathgrip pulls you into the weapon. You scream as everything goes black.\n\t\n\t\t\tMaybe there's a managerial position open in hell?\n\t\t\t*goto ending\n\t\t*else\n\t\t\t*set clips +5\n\t\t\t*set kill_no_more false\n\t\t\t*if (weapon = \"divine cross\") or (weapon = \"divine crosses\")\n\t\t\t\t*if two\n\t\t\t\t\tThe crosses fill the room with flaming communion wafers, which slice through the flesh of The Pitt's men like butter.\n\t\t\t\t*if two = false\n\t\t\t\t\tThe cross fills the room with flaming communion wafers, which slice through the flesh of The Pitt's men like butter.\n\t\t\t*if (weapon = \"nanotech appendage\") or (weapon = \"nanotech appendages\")\n\t\t\t\t*if two\n\t\t\t\t\tYour ${weapon} are out of control, pulling you across the room and showering everything in your path with bullets.\n\t\t\t\t*if two = false\n\t\t\t\t\tYour ${weapon} is out of control, pulling you across the room and showering everything in your path with bullets. \n\t\t\t*if (weapon = \"voodoo appendage\") or (weapon = \"voodoo appendages\")\n\t\t\t\t*if two\n\t\t\t\t\tYou ${weapon} start to malfunction as the organic matter is blown apart by bullets and slashed by spinning knives.  \n\t\t\t\t*if two = false\n\t\t\t\t\tYour ${weapon} starts to malfunction as the organic matter is blown apart by bullets and slashed by spinning knives.\n\t\t\t\tHorrible pain radiates through your body as the fragments hit a few of The Pitt's men in the process.\n\t\t\t*if (weapon = \"ossein gun\") or (weapon = \"ossein guns\")\n\t\t\t\tThe bones of your ${weapon} explode, showering everything in its path, including you. Stunned, you fall down.\n\t\t\t*if (weapon = \"cybernetic rifle\") or (weapon = \"cybernetic rifles\")\n\t\t\t\t*if two\n\t\t\t\t\tYour rifles begin to go haywire,\n\t\t\t\t*if two = false\n\t\t\t\t\tYour rifle begins to go haywire, \n\t\t\t\tspraying bullets through the room uncontrollably and leaving smoking holes in the walls of the revue.\n\t\t\t\t*if dragon_assistance\n\t\t\t\t\tYou hope The Dragon won't dock that from your pay.\n\t\t\t*if forest_demons\n\t\t\t\t*set clips +10\n\t\t\t\tBullets whip through both The Pitt's men and the unsuspecting warriors who are standing in the path of destruction. \n\t\t\t*if cop_posse\n\t\t\t\t*set clips +15\n\t\t\t\tThe rifle sprays bullets at unlucky cops who are in the wrong place at the right time. \n\t\t\t*if gutterpunk_posse\n\t\t\t\t*set clips +10\n\t\t\t\tBullets from your ${weapon} hit several gutterpunks as they dive behind tables, their young bodies sailing through the air.\n\t\t\t*if deal_performers\n\t\t\t\t*set clips +5\n\t\t\t\tBullets from your ${weapon} pierce several of the unsuspecting performers. The others flee the room.\n\t\t\t*comment endif\n\t\t\n\t\t\tUnfortunately, one of The Pitt's men takes this opportunity to put a bullet right through the back of your head.\n\t\t\n\t\t\tValhalla, here you come.\n\t\t\t*goto ending\n*else\n\t*return\n\n*label backstage\n\n*if deal_lulu\n\tRunning past the frenzied staff members, who are fleeing out the back door, you remember the directions Lulu gave you. They were confusing, but you manage to follow them and eventually reach a big door labeled [b]BIG BOSS MAN[/b] in oversized letters.\n\n\tThis must be it.\n\t*goto boss_man\n*elseif (lulu_alive = true) and (deal_lulu = false)\n\tAs you arrive backstage, the performer closest to you turns around. It's none other than Lulu Luscious, wearing a fresh set of bruises and a limp.\n\n\t*if lulu_doublecross = true\n\t\tLooking like a deer in headlights, Lulu mumbles an apology about earlier, mentioning that she might have underestimated your talents….\n\t*choice\n\t\t#I ask Lulu to take me to The Pitt.\n\t\t\t*set jumpin_the_gun %-10\n\t\t\t*set wounds +1\n\t\t\tLulu smiles and grabs your hand, running down the twisting hallways. Filled with hope, you tell her about your wishes to ${desire_text}. After a few minutes, the look on her face tells you that she clearly doesn't know where she's going.\n\n\t\t\t\"I thought I knew where it was…but…I'm all turned around now….\"\n\n\t\t\t*if remorse > 65\n\t\t\t\tSuddenly, one of The Pitt's men comes around a corner; thankfully, Lulu screams before he can sucker punch you. You tussle with him for a moment and knock him unconscious.\n\t\t\t\t\n\t\t\t\t*label find_door\n\t\t\t\tAfter Lulu regains her composure, you let her get back to helping the staff. Alone again, you run through the hallways, looking for some sign of The Pitt. You finally come across a funhouse door labeled [b]BIG BOSS MAN[/b] in oversized letters.\n\t\t\t\t*page_break\n\t\t\t\t*goto boss_man\n\t\t\t*else\n\t\t\t\t*set clips +1\n\t\t\t\t*set kill_no_more false\n\t\t\t\tSuddenly one of The Pitt's men comes around a corner. Before he can make a move, you rip his arm off. Lulu screams as she is sprayed with blood.\n\t\n\t\t\t\tHow's that for headcrushing?\n\t\n\t\t\t\t*goto find_door\n\t\t#I push past right her. I'll be better on my own.\n\t\t\t*set take_it_to_the_mattresses %+10\n\t\t\t*set jumpin_the_gun %+5\n\t\t\t*set savvy %+5\n\t\t\t\n\t\t\tAs you push past her, Lulu is knocked off her stilettos. She starts to protest as you run down the hallway, but you are determined.\n\n\t\t\tAnd determination can be a killer.\n\t\t\t*label big_boss_man\n\t\t\t*page_break\n\t\t\t*if remorse > 65\n\t\t\t\tAs you run down the hallways, The Pitt's men jump you, singly and in pairs. You dodge their blows and beat them into submission, lining the corridors with their unconscious bodies until no more appear.\n\t\t\t*if remorse \u003c= 65\n\t\t\t\t*set clips +3\n\t\t\t\t*set kill_no_more false\n\t\t\t\tAs you run down the hallways, The Pitt's men jump you, singly and in pairs. But you are a ${dragon}. You slam heads into walls, snap necks, and rip off limbs. \n\t\n\t\t\t\tA trail of corpses marks your path.\n\t\t\t*comment endif\n\n\t\t\t*goto escher_painting\n\t\t#I kiss her. Hell, I'm a new ${man}.\n\t\t\t*set clips +3\n\t\t\t*set savvy %+5\n\t\t\t*set jumpin_the_gun %+5\n\t\t\t*set take_it_to_the_mattresses %-5\n\t\t\tGrabbing her, you pull her close and kiss her with a fiery passion. For a moment she responds, matching your passion, but then she pulls away and slaps you right on the cheek.\n\n\t\t\tAnd then she smiles.\n\n\t\t\t\"I know where The Pitt's office is now. Go down that hallway. Take a right. Right. Left. Down the stairs. Then right…and ask first before you kiss me again!\" \n\n\t\t\tWithout a moment to lose, you run down the hallway.\n\t\t\t*goto big_boss_man\n\t\t*if (paranoia \u003c 50) and (lulu_doublecross)\n\t\t\t*selectable_if (jumpin_the_gun > 40) #She's in my way. I'd better just kill her.\n\t\t\t\t*set remorse %-20\n\t\t\t\t*label kill_lulu\n\t\t\t\t*set lulu_alive false\n\t\t\t\t*set clips +4\n\t\t\t\t*set kill_no_more false\n\t\t\t\t*set respect %-10\n\t\t\t\tYou grab Lulu, pin her against the wall, and snap her neck. As her corpse slides to the ground, you turn and ask other staff members for directions, but they are too terrified by your sudden violence. They flee the revue before the scary dragon ${man} descends upon them.\n\t\n\t\t\t\tYou run down the hallways in a frenzy. The Pitt's men jump you, singly and in pairs. You slam heads into walls, snap necks, and rip off limbs. A trail of corpses marks your path.\n\t\n\t\t\t\t*label escher_painting\n\t\t\t\tThe revue's hallways twist and bend like an Escher painting as you race to find The Pitt's office. A fun house-like door finally appears, labeled [b]BIG BOSS MAN[/b] in oversized letters. \n\t\n\t\t\t\tBingo.\n\t\t\t\t*page_break\n\t\t\t\t*goto boss_man\n\t\t*if (paranoia >= 50) and (lulu_doublecross = true)\n\t\t\t#I kill her. She's working for The Pitt, and I'm not leaving her alive.\n\t\t\t\t*set paranoia %+10\n\t\t\t\t*set remorse %-10\n\t\t\t\t*goto kill_lulu\n*else\n\tAs you run down the hallways, The Pitt's men jump you, singly and in pairs. You slam heads into walls, snap necks, and rip off limbs.\n\t\n\tA trail of corpses marks your path.\n\t\n\t*goto escher_painting\n\n*label boss_man\nWith a single kick, you knock the big boss man's door right off its hinges. Behind it is a pristine room with classical music playing.\n\nThe Pitt is nowhere to be seen; however, your sawtooth is sitting on his desk, waiting for you, beckoning you.\n\n*fake_choice\n\t#I pocket it. The sawtooth has been a big part of my life. \n\t\t*set remorse %-10\n\t\t*set sawtooth false\n\t\tYou put the sawtooth in your pocket and flip the desk on its side.\n\t#I leave it. It's part of the life I'm leaving behind.\n\t\t*set remorse %+30\n\t\t*set sawtooth false\n\t\tYou leave the sawtooth lying there.\n\t#I make it part of my ${weapon}. Now I'll really be invincible.\n\t\t*set remorse %-20\n\t\t*if (weapon = \"demonic appendage\") or (weapon = \"demonic appendages\")\n\t\t\tA tiny clawed hand reaches out of the ${weapon}, snatching the sawtooth from you. It draws the blade into the limb, incorporating it into itself.\n\n\t\t\tThe clawed hand, however, disappears as quickly as it came.\n\t\t*if (weapon = \"voodoo appendage\") or (weapon = \"voodoo appendages\")\n\t\t\t*if two\n\t\t\t\tThe sawtooth is consumed by the skin, moving through your arm until it finds a place next to a tiny Chinese clock.\n\t\t\t*if two = false\n\t\t\t\tThe sawtooth is consumed by the skin, moving through your ${appendage} until it finds a place next to a tiny Chinese clock.\n\t\t*if (weapon = \"nanotech appendage\") or (weapon = \"nanotech appendages\")\n\t\t\t*if two\n\t\t\t\tYour nanotech arm produces a wheel of tiny, jagged blades—with one convenient open slot. You slide the sawtooth right in.\n\t\t\t*if two = false\n\t\t\t\tYour ${weapon} produces a wheel of tiny, jagged blades—with one convenient open slot. You slide the sawtooth right in.\n\t\t\tLike it was meant to be there, all along.\n\t\t*if (weapon = \"cybernetic rifle\") or (weapon = \"cybernetic rifles\")\n\t\t\t*if two\n\t\t\t\tYou affix it below the barrel of one of your cybernetic rifles…a gruesome, modern-day bayonet.\n\t\t\t*if two = false\n\t\t\t\tYou affix it below the barrel of your cybernetic rifle…a gruesome, modern-day bayonet.\n\t\t*if (weapon = \"divine cross\") or (weapon = \"divine crosses\")\n\t\t\t*if two\n\t\t\t\tYour arm-cross spins, producing a selection of tiny, jagged blades—and one open slot. You slide the sawtooth right in.\n\t\t\t*if two = false\n\t\t\t\tYour cross spins, producing a selection of tiny jagged blades—and one open slot. You slide the sawtooth right in. \n\t\t*if (weapon = \"ossein gun\") or (weapon = \"ossein guns\")\n\t\t\t*if two\n\t\t\t\tYour living-bone arm shifts until a crevice opens, conveniently sized for a sawtooth.\n\t\t\t*if two = false\n\t\t\t\tYour ${weapon} slides a bone aside, and you place the sawtooth in the crevice. \n\t\t\tIt's slightly uncomfortable at first, but the bones get used to it quickly.\n*comment endif\n\nLooking around, you spot a partially-open door, through which you can see The Pitt playing in an exquisite claw-foot bathtub packed full of juice. He's completely naked…except for a baby-blue bonnet around his head. You try not to snicker at the sight; you don't want to ruin your grand entrance.\n\nFinally, you fling the bathroom door open. The Pitt looks up as his cackling face is covered in shadow—your shadow. \n\nHis expression turning from joy to sheer panic, he shrieks in fright as you haul him bodily from the tub like the shriveled fly he is. Money drops from his body as he hangs from your grip. His feet kick in the air as tears of fear begin to roll down his face. \n\nIt's an entrance that puts his earlier one to shame.   \n*page_break\n\nHe doesn't win; he doesn't get to write the end of this story. You have come back from the dead. Bigger. Better. Faster. Stronger. And most of all, completely terrifying. He could never have imagined what was comin'.\n\nHe agrees to take you to where ${l_name} is being held captive; you carry him out of the office, leaving a trail of sticky Benjamins in your wake. He blabbers, slobbers, and begs for forgiveness, for mercy, for release. \n\nDamn straight.\n*finish\n\n*label ending\n*goto_scene ending", "informants": "*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]NOLA is Burning[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n\n[b]Chapter Two: The Informants[/b]\n*temp encountered_cops false\n\nThe old phone booth door slides open, and you step out into the warm, sticky night. Thick clouds have clustered together in the sky. A storm is coming. \n\nYou pick up the bag of juice and put the bills in your money clip. These bills ain't free, and your career as a headcrusher has come at a heavy price.\n\nWhat do you think of your message jobs?\n\n*fake_choice\n\t#It's not like I really enjoy 'em, but I do 'em for the family.\n\t\t*set respect %+5\n\t\t*set jumpin_the_gun %-5\n\t\tYou had to grow up fast; being the meanest, smartest, and fastest was your only option. And now you do it because it's the only thing you know. It's not about enjoying it; it's about doing the job.\n\t\t\n\t\tEven so, while\n\t#It's the one thing I'm good at.\n\t\t*set remorse %-10\n\t\t*set take_it_to_the_mattresses %+10\n\t\tSkills come in a variety of forms, and well, yours just happens to be extremely lethal! \n\t\t\n\t\tEven so, while\n\t#Doing them makes me physically sick.\n\t\t*set remorse %+20\n\t\t*set respect %-5\n\t\tThat's certainly not a good thing for a professional headcrusher! While\ndelivering the limbs of canaries to the Bull's various enemies—real or imagined—you sometimes wonder whether you could make it in another profession if you could ever gain your freedom.\n\n*choice\n\t*if (desire = 1) #The mafia is the only life for me. There will be no retirement. I will either rule the city or die trying.\n\t\t*set take_it_to_the_mattresses %+5\n\t\t*set paranoia %+10\n\t\t*set remorse %-20\n\t\t*set career_headcrusher true\n\t\t*set dreams \"being the boss of NOLA.  That's the only way I will be able to command the respect I deserve.\"\n\t\tScrappy 'til the day you die—those are fightin' words.\n\t\t*page_break\n\t\t*goto epicenter\n\t*if (desire != 1) #Being a headcrusher is the life for me. I'm addicted to the danger, the violence, the emotional roller coaster.\n\t\t*set take_it_to_the_mattresses %+5\n\t\t*set paranoia %+10\n\t\t*set remorse %-20\n\t\t*set career_headcrusher true\n\t\t*set dreams \"doing more message jobs—but for another boss, in a city far away from all this.\"\n\t\tScrappy 'til the day you die—those are fightin' words.\n\t\t*page_break\n\t\t*goto epicenter \n\t#I've always had a thing for archaeology—digging for clues, putting together data, meeting the natives, and possibly even teaching!\n\t\t*set remorse %+10\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*set jumpin_the_gun %-5\n\t\t*set career_archaelogy true\n\t\t*set dreams \"digging in the dirt in Peru or the Yucatan, while the sun beats down on my neck. Finding ancient secrets.\"\n\t\tSounds like a fitting road to go down. You've been burying bodies long enough as it is…might be nice to try and dig some up once in a while.\n\t\t*page_break\n\t\t*goto epicenter\n\t#A solitary life as a writer—of mysteries, noir, thrillers, and finally, an autobiography—would satisfy me.\n\t\t*set remorse %-10\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*set jumpin_the_gun %-5\n\t\t*set savvy %+5\n\t\t*set career_writer true\n\t\t*set dreams \"being in a room of my own, a place of solitude where I could write in peace. Somewhere, anywhere…just far from here.\"\n\t\t*if (desire = 3) or (desire = 4)\n\t\t\tYou can just imagine it: a little cabana on the beach. A typewriter. A [i]cerveza[/i].\n\t\t\t*if desire = 4\n\t\t\t\t${l_name} by your side.\n\t\t\tCould it get any better?\n\t\t\t*page_break\n\t\t\t*goto epicenter\n\t\t*else\n\t\t\tWrite what you know, right? And ${boy}, do you know it.\n\t\t\t*page_break\n\t\t\t*goto epicenter\n\t*if gutting_fish\n\t\t#The sea is where I belong—I'd become a pirate, and go back to gutting fish, and the odd victim, with my bare hands.\n\t\t\t*label dreams_of_the_sea\n\t\t\t*set remorse %-10\n\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t*set jumpin_the_gun %+5\n\t\t\t*set career_pirate true\n\t\t\t*set dreams \"clear blue water, the wind at my back, and the world's oceans spread before me.\"\n\t\t\tYou want a life of mystery and adventure on the wide-open sea.\n\t\t\t*page_break\n\t\t\t*goto epicenter\n\t*if gutting_fish = false\n\t\t#The sea is where I belong—I'd become a pirate, taking what I wanted from those unlucky enough to cross my path.\n\t\t\t*goto dreams_of_the_sea\n\t#I prefer the company of canines to most humans I know. Professional dog-walking sounds like a nice life. \n\t\t*set remorse %+10\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*set jumpin_the_gun %-5\n\t\t*set career_dogwalking true\n\t\t*set dreams \"a whole pack of rambunctious dogs, licking my hands and face.\"\n\t\tA quiet life where you can dig into your thoughts calls to you—a total 180 from what chasing The Pitt and The Bull around has accustomed you to.\n\t\t*page_break\n\t\t*goto epicenter\n\t#Fashion design, all the way. Working within The Bull's restrictions has forced me to get creative.\n\t\t*set remorse %+10\n\t\t*set take_it_to_the_mattresses %-10\n\t\t*set jumpin_the_gun %-5\n\t\t*set savvy %+5\n\t\t*set respect %+5\n\t\t*set career_fashion true\n\t\t*set dreams \"seeing my designs on a runway…in New York or Paris.  Somewhere far away from here.\"\n\t\tYou can make any suit look bangin'. Even The Bull notices.\n\t\t*page_break\n\t\t*goto epicenter\n\t*if (desire != 1) #Second career? I just want to retire to Mexico!\n\t\t*set remorse %+5\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*set jumpin_the_gun %-5\n\t\t*set savvy %+5\n\t\t*set career_retire true\n\t\t*set dreams \"sand between my toes and a [i]cerveza[/i] in my hand. Mexico seems both so close and yet so far now.\"\n\t\tWarm sand between your toes, an umbrella in a fruity cocktail, and the sea. Sounds like heaven.\n\t\t*page_break\n\t\t*goto epicenter\n\n*label epicenter\nUnfortunately, to get to what you truly desire, you've got to complete your mission first, and The Pitt is the epicenter of that mission. He's had a beef with you for years—whenever he sees you, his face goes bright red and his fists clench so hard that the knuckles go white. \n\nThe mix of fear and anger is obvious to everyone, and the fact that he'll shoot off his slack-jawed, chip-toothed mouth about you to anyone who'll even pretend to care, means everyone who's anyone knows that you're not exactly on his Christmas card list.  \n\nFrankly, The Pitt was always a spoiled little brat. The Pitt was born around the time The Bull first took you in. Even though you were a half-wild orphan, you naturally assumed the role of big ${brother}, and The Pitt resented it. Then, when you were about twenty-two, and The Pitt was the ripe old age of thirteen, you caught him doing something unspeakable.\n\n*choice\n\t#Torturing animals. \n\t\t*set pitts_crime \"animals\"\n\t\t*set pitts_crime_desc \"tortured animals\"\n\t\t*comment I think you should specifically mention Abigail here, and even gesture towards the occupation of Abigail's, as a hint about how to get the spurs in book_it.\n\t\tYou caught The Pitt torturing an adorable border collie called Abigail, who had wandered away from the horse farm where her owner worked. You rushed the dog to the veterinarian, and once you got back, you rubbed his scrawny face in the mess that was left behind. He's had it out for you ever since.\n\t\t*set take_it_to_the_mattresses %+5\n\t\t*set jumpin_the_gun %+5\n\t\t*goto pitts_future\n\t#Bullying the physically disabled kid down the street.\n\t\t*set pitts_crime \"ruby\"\n\t\t*set pitts_crime_desc \"made fun of disabled kids\"\n\t\t*set savvy %+5\n\t\t*set jumpin_the_gun %+5\n\t\tAuntie Ezma is one of the most renowned voodoo priestess in NOLA, and one you already owed a few favors. Ruby, her blood niece, had gotten her legs mangled by an alligator when she was seven. So when you caught The Pitt making fun of the way Ruby walked, you slapped him down, hard. Then, you forced him to hang out with her for an hour every day after school, sometimes just to watch him seethe. \n\t\t*goto pitts_future\n\t#Trying to burn down a neighbor's home.\n\t\t*set pitts_crime \"arson\"\n\t\t*set pitts_crime_desc \"committed arson\"\n\t\t*set respect %+5\n\t\t*set take_it_to_the_mattresses %+5\n\t\t*set savvy %+5\n\t\tWhile you were both over at a neighbor's house, The Pitt took a candle to an antique couch, one that had been passed down for generations. You quickly put out the fire he made, gave him a solid smack, and apologized to the wealthy socialite homeowner. Then, you dragged him to the feet of The Bull, who handled the situation from there.\n\t\t*goto pitts_future\n\t#Urinating in the communion wine at St. Louis Cathedral.\n\t\t*set respect %+10\n\t\t*set take_it_to_the_mattresses %+5\n\t\t*set pitts_crime \"communion\"\n\t\t*set pitts_crime_desc \"urinated in the sacrament\"\n\t\tHe thought it would be fun to profane the holiest rite of the  Church, but you caught him in the act. As Mass was starting, you dragged him out in front of the whole congregation and threw him at the priest's feet. His punishment was to serve as an altar boy at the earliest Mass every Sunday until he was sixteen. He never forgave you the humiliation or the years of lost sleep.\n\t\t*goto pitts_future\n\n*label pitts_future\n\nFrom that day on, The Pitt never ${pitts_crime_desc} again, at least not while you were around or word could get back to you. But stopping him from running amok caused severe tension between you two, and you were well aware that the day would come when The Pitt would establish his own [i]borgata[/i] and force you to take it to the mattresses. \n\nHe may be a little brat, but he knows how to get your attention. \n*if (paranoia > 60) or ((ls_affection = 1) or (ls_affection = 2))\n\tAnd all the while, ${l_name} could very well be the grand puppeteer, pulling not only your strings, but The Pitt's and The Bull's too.\n*page_break\n\nRight on cue, the skies open and torrents of warm rain sheet down as you step onto the cracked pavement in your alligator shoes. Within seconds, your suit is drenched, and water pours off your hat as you head towards your destiny. \n\nThe only way to find ${l_name} fast and blow this Sno-Ball stand is to discover that passage to the underground railroad. The notorious Gator Girls just might hold the magic ticket, but it's certainly going to cost you.\n*page_break\n\nBased in the French Quarter, the Gator Girls—Ruby and Coco—are a pair of scrappy Creole sisters, whip-crack smart with keen business instincts. They're co-owners of The Gator Girls' Voodoo Shop, located right on Bourbon Street. The mob may be cutthroat, but it's got nothin' on making a living as shop owners, particularly ones who specialize in Louisiana voodoo. \n\nRuby and Coco, and their Auntie Ezma, protect themselves as much with their backcountry Creole charm as with their fearsome reputations. They'll roast a pig and invite a Zydeco band to their unique home any day of the week. They're like family to you…at the right price.\n*if pitts_crime = \"ruby\"\n\tThese girls have a special soft spot for you, especially since you saved Ruby from The Pitt's abuse. \n*page_break\n\nThey aren't associated with the mob, but the Gator Girls have been loyal and trustworthy over the years. They see and hear everything, and although they may not hand out information for free, they always have your back when you need them. On top of that, they are perceptive, intuitive, and give one hell of a card reading.\n\n*fake_choice\n\t#Ruby and Coco warned me about an assassination attempt on The Bull.\n\t\tIn the nick of time, you reached The Bull's office and took down a pair of headcrushers bent on punching ${bull_his} ticket. The Bull tried to play it off, but ${bull_he} was visibly shaken up. You gained major respect in the family for this.\n\t\t*set respect %+10\n\t\t*set paranoia %+10\n\t\t*set heat %+5\n\t#They offered refuge when my life was in danger.\n\t\tWhen the head of the Irish gang tried to take you down, they let you hide out in their voodoo shop. Later, you launched a counterattack with the The Bull backing you up. \n\t\t*set jumpin_the_gun %-10\n\t\t*set paranoia %-10\n\t\t*set heat %+5\n\t#Auntie Ezma distracted the cops so I avoided getting pinched.\n\t\tTrapped like an animal in St. Louis Cemetery No. 1, you crouched behind a tombstone as the cops closed in from all directions. Before they could put the squeeze on you, Auntie Ezma appeared like an angel, shaking her hands and chanting, confusing the cops long enough for you to creep from your hiding place and hop over the wall.\n\t\t*set take_it_to_the_mattresses %-10\n\t\t*set heat %-20\n*comment endif\n\nOf course, the help didn't come for free—it took several months for you to pay them back—but they were willing to let you slide a little. They knew you were good for it.\n*page_break\n\nAs you make your way, the rain stops suddenly as if God turned off a faucet. Heavy clouds still hang over NOLA, though, a match for your mood. Up ahead, Bourbon Street is in full swing, swarming with [i]mafiosi[/i]. \n\nBourbon is neutral ground—wise guys, [i]cugines[/i], gutterpunks, and wannabes can all party together there. The syndicates have an agreement, and they enforce it, hard. Anyone caught making trouble receives a quick message job. Anywhere north, south, east, or west of Bourbon is a totally different game.\n*page_break\n\nYou smoothly step into \"Cat Alley\"—a narrow, dumpster-filled way behind the cheap restaurants and sleazy clubs on Bourbon. Feral cats emerge from invisible hiding places to perch on the dumpster hoods, eyes shining. Most of them know you, since you've brought them food and toys before.\n\nThe Gator Girls' Voodoo Shop is located across the street, right on Bourbon, past the candy-colored stop sign on the corner. The brightly-lit shop window is adorned with [i]gris-gris[/i], dolls, and charms.\n\nYou need to get there without attracting attention. \n\n*choice\n\t*selectable_if (paranoia \u003c 60) #Walk right in the front door to the shop.\n\t\t*set paranoia %-10\n\t\t*set respect %+10\n\t\tHey, you're a paying customer too! You're just paying for a different kind of merchandise….\n\n\t\t*goto approach\n\t#Go in through the back door.\n\t\tIt's fairly easy to pay a visit unnoticed. You just have to get there.\n\t\t*set savvy %+5\n\t\t*set paranoia %+10\n\t\t*set respect %-10\n\t\t\n\t\tSticking to the shadows where possible, you edge unnoticed across Bourbon Street to the voodoo shop, where a glittering mural of Erzulie Dantor decorates the back door. You hit the doorbell, and a red light goes on quietly.\n\n\t\tAfter a moment, the door opens to reveal Ruby and Coco, their dark skin shaded to a deep purple in the light from the fixture above.\n\t\t*page_break\n\t\t\n\t\t\"${name},\" say Ruby and Coco at the same time.\n\t\t\n\t\tPassing through the doorway, you close and lock the door behind you. Your eyes adjust to the red light, showing you a narrow hallway with strings of beads hanging at one end. Beyond the beads is the voodoo shop, bustling with tourists.  \n\t\t\n\t\tRuby and Coco lead you to a secret stairway, which you follow down into a damp, stuffy cellar. A large black coffin draped with flowers sits in the middle of the room. Voodoo paraphernalia cover the walls, while fabric stitched to the ceiling drapes down in long billows. Multiple smells—musty cloth, rich herbs, damp stone, and strong wine—blend into a uniquely NOLA bouquet.\n\t\t\n\t\tThe door slams shut.\n\t\t*page_break\n\t\t*goto cellar\n\t*selectable_if (savvy > 45) #Use a light signal.\n\t\tWhipping out a red laser, you aim it at the window and send a series of flashes that only the Gator Girls will understand. It's like the Gator-signal, and it works every time.\n\t\t*set respect %-5\n\t\t*set jumpin_the_gun %-5\n\t\t*set savvy %+5\n\t\t*set paranoia %+5\n\t\t*goto information\n\t\t\n*label approach\nEasing your way through the drunken madness, you cross the street, ignoring the wisecracks of fellow [i]mafiosi[/i]. You shake your head at the drunken tourists, who are unaware of the seething danger that surrounds them.\n*if male = false\n\tSince Bourbon is full of men, you always find it hard to avoid attention because you are not male, although the suit helps. Tonight, you keep your head down and avoid meeting anyone's eye, because any attention could blow your mission.\n*if male\n\tBourbon is full of boisterous men, who barely notice another guy weaving through the crowd. You keep your head down and avoid physical contact, since a random fistfight is not what you need tonight….\n*comment endif\n\nYou walk past the candy-colored stop sign on the corner, up to The Gator Girls' Voodoo Shop, and right through the open door. The place is crawling with cops, all decked out in their brass buttons with billy clubs and guns at their sides. They love The Gator Girls and the shop, so they decided to pay a visit. \n\nThe Gator Girls seem slightly alarmed by your sudden presence. The cops turn to look at you.\n\n*choice\n\t*selectable_if (savvy > 55) #Pretend to purchase a card reading and wait for them to leave.\n\t\t*set jumpin_the_gun %-5\n\t\t*set juice -100\n\t\t*if heat > 60\n\t\t\tThe cops glance at each other while keeping a steady eye on you. One of 'em mutters something to his colleague. They're out for blood tonight, and the air is practically choking you.\n\n\t\t\tRetreating, you head outside for fresh air. There's gotta be a better way to find out what you need to know. The Gator Girls watch carefully as you walk back towards Cat Alley. A cop walks out of the shop and motions to a patrol car.\n\t\t\t*goto busted\n\t\t*else\n\t\t\tAfter an uncomfortable pause, the coppers return to what they are doing, but not before giving you a good once over.\n\n\t\t\tWalking up to the front of the shop, you smoothly ask them if they do card readings. The Gator Girls look at the heat packed in their tiny shop before taking your money. Coco opens the beads to the back of the shop and brings you down the hallway to the wine cellar in silence.\n\n\t\t\tShe opens the door and smacks you on the back of the head as you walk in. \n\n\t\t\t\"Are you crazy?!\"  She shakes her head, tells you to stay put, and shuts the heavy door behind her.\n\t\t\t*page_break\n\t\t\t*goto cellar\n\t#Walk out. Quickly.\n\t\t*set jumpin_the_gun %-10\n\t\t*set juice -500\n\t\t*if savvy > 60\n\t\t\tYou must have pulled off the \"confused tourist\" look, because while they certainly noticed your hasty exit, they don't seem to be following you.\n\t\t\t\n\t\t\tYou head around back. The Gator Girls should be out shortly.\n\t\t\t*goto information\n\t\t*else\n\t\t\t*set heat %+10\n\t\t\tYou look around quickly and then go right back out the door. Several cops stare at you, eyebrows cocked. The Gator Girls watch carefully as you walk back across the street.\n\t\n\t\t\tAs you head towards Cat Alley, a cop walks out of the shop and motions to a patrol car.\n\t\t\t*page_break\n\t\t\t*goto busted\n\t#Purchase a voodoo doll and slip 'em a note.\n\t\t*set savvy %+5\n\t\t*set jumpin_the_gun %+5\n\t\t*set juice -100\n\t\tGrabbing the closest doll, you head up to the front with determination. \n\n\t\t*if heat >= 55\n\t\t\tThe cops stare as you walk up to the counter. One of 'em mutters something to his colleague. They are out for blood tonight, and the air is practically choking you.\n\n\t\t\tYou change your mind about the doll, and head outside for some fresh air. There's gotta be a better way to find out what you need to know. The Gator Girls watch carefully as you walk back towards Cat Alley. A cop walks out of the shop and motions to a patrol car.\n\t\t\t*goto busted\n\t\t*else\n\t\t\tYou walk past the cops, who ignore you and talk among themselves, and place the doll on the counter. The Gator Girls ring it up slowly, eyeballing you and the heat packed in the tiny space. Pulling out a hundred, you scribble a note on it and Ruby picks it up, reading it. Coco grabs your hand.\n\n\t\t\t\"You know, we do card readings as well…just in case this fertility doll doesn't work.\"\n\n\t\t\tShe smiles and hands you the doll in a bag. Then, she motions to the back and opens the hanging beads, granting you passage. You follow her in silence, down the hallway and into the wine cellar below the shop.\n\t\t\t*page_break\n\t\t\tAs you enter the cellar, Coco winks at you before shutting the door.\n\n\t\t\tIt won't be long now.\n\t\t\t*goto cellar\n\n*label busted\n*set encountered_cops true\nJust as you are about to reach Cat Alley, a copper swings his car around and pins you with his searchlight.\n\nDamn.\n*page_break\n\n*if heat \u003c= 45\n\tThe cop gives you an eyeful as he pulls up next to you. A female voice blasts through the crackling static of his CB. \"Calling all units to Esplanade and Henriette, calling all units.\" The cop gives you another long look before hitting the gas and driving off into the night. \n\n\tYou turn the corner and hide in the shadows. Getting information tonight is not proving to be easy, and the last thing you need is the heat bearing down on you….\n\t*goto information \n*else\n\tThe cop gives you an eyeful as he pulls up next to you. You've gotta play this off good. Killing a cop has never been on your list of things to do, and you've somehow avoided it up to this point. But getting searched would reveal the sawtooth. You're going to have to think fast.\n\n\t*choice\n\t\t#Act drunk.\n\t\t\t*set savvy %+5\n\t\t\tDon't act too drunk; you don't want a breathalyzer test. \n\t\t\t\n\t\t\tThe cop takes his time getting out of the car, sighing. He rests his hands on his giant belt, rocking his hips back and forth. Ugh. This one is going to be a problem. \n\t\t\t*page_break\n\t\t\t\n\t\t\tWhen he asks where you are going, you slur your words a bit and give him a cock-and-bull story about a new bar in the Garden District that serves discount Bloody Marys and po-boys to tourists. As the cop shines his flashlight into your face, you produce a perfectly timed burp and slap your hand over your mouth. His CB suddenly goes off. \"Calling all units. Calling all units.\" \n\t\t\t\n\t\t\tSighing, he backs slowly toward his vehicle and slides in, staring at you all the while. Finally, he hits the gas and burns rubber down the street. \n\t\t\t*goto information\n\t\t#Pretend you live in the alleyway.\n\t\t\t*set respect %-5\n\t\t\t*set jumpin_the_gun %-10\n\t\t\tHell, you have before, so why wouldn't it work now? \n\n\t\t\tThe cop takes his time getting out of the car, and you pull out all the stops, jabbering on about how the value of your cardboard box keeps depreciating because of all these tropical storms. \n\n\t\t\tThe cop takes a good long look at you, shining his flashlight in your face. Deciding that you are harmless, he lets you go with a warning to stay out of trouble.\n\t\t\t*goto information\n\t\t#Work out a deal.\n\t\t\t*set respect %-5\n\t\t\t*set jumpin_the_gun %-20\n\t\t\tThis is a tried and true practice that has gotten you out of fixes before.\n\t\t\t\n\t\t\tThe cop shines his flashlight in your face, and asks you what your business is with the Voodoo Shop. Instead of answering, you note that the heat has major problems with the mob in this town, and you clue him in that you can be a source of \"assistance,\" as long as he keeps his trap shut.\n\n\t\t\tThe cop laughs, not taking you seriously. Suddenly, his CB radio goes off. \"Calling all units, calling all units.\"\n\t\t\t*page_break\n\t\t\t\n\t\t\tThe cop heads back to his car, but not before dropping some cutting remarks about your chances of survival if you cross the mob. He suggests that you might want to look for a new line of work instead of trying to take down the whole system. He hops in the car and takes off.\n\t\t\t*goto information \n\n*label cellar\n\"Death! Pain! Unspeakable miseries!\" \n\nA crackling death rattle rings out through the cellar….\n*page_break\n\n\"${name},\" the shaky voice calls out in a long-winded whine. You turn around and see Ezma, the Gator Girls' auntie, standing there. Hunched by old age, she wears decorative robes and twigs in her hair. Her glass eye, the left one, rolls around in her skull. As she approaches, she holds her hands up, and the bones on her bracelets rattle almost musically.\n\n\"${name}, your path tonight is a dark one,\" she intones, as she puts her fingers to your face. Like a blind woman, she feels the contours of your cheekbones and eyelashes.\n*if pitts_crime = \"ruby\"\n\tYou've known Auntie a long time, and she still does this every goddamn time she—ahem—sees you.\n*fake_choice\n\t#Though she's a bit scary, I respect her intuition. She might be able to point me in the right direction.\n\t*if pitts_crime = \"ruby\"\n\t\t#I don't like bein' touched on the face, but I make an exception for Auntie Ezma.\n\t*if pitts_crime != \"ruby\"\n\t\t#I really don't like bein' touched on the face. Who knows where her hands have been?\n\t#This woman cuts through the bullshit. I dig it.\n*comment endif\n\nEzma greets you, \"It's been too long, child.\" She explains that she is serving as [i]mambo[/i] tonight, presiding over a summoning. Erzuli—the [i]loa[/i]—will be possessing a [i]cheval[/i]—a mortal host—and Ezma has to get back in time to greet the spirit.\n\n*if (respect >= 57) or (pitts_crime = \"ruby\")\n\t*set voodoo_necklace true\n\t*set ezma_deal true\n\t*set contracts +1\n\tEzma pulls off one of her cherished bone bracelets and places it around your neck to make a charm necklace. The tiny, delicate bones scratch and dig slightly into your skin. \n*if respect \u003c 57\n\tAuntie Ezma smiles, bringing her hands down. As always, you wonder why she bothers with this ritual.\n*comment endif\n\n*if pitts_crime = \"ruby\"\n\t*set velvet_bag true\n\tShe pulls a small purple velvet bag out of the drapes of her dress and places it into your hands. \"This will help you tonight, but only in your most desperate hour.\" Her one good eye looks at both of yours, searching through your mind. \n\n\t\"Use it wisely,\" she whispers.\n\t*if paranoia > 50\n\t\tYou clutch it gratefully; the powers of the [i]loa[/i] have cast a long shadow over your life.\n\t*if paranoia \u003c= 50\n\t\tYou're not normally given to believing in this voodoo nonsense—it's all well and good for the tourists—but you're not about to say that to Auntie Ezma.\n\t\n\tShe waves her hands, mumbling a blessing—or maybe it was a recipe for gumbo. You can never be sure with her.\n*page_break\n\nYou fork over some of your juice, and the Gator Girls give you the lowdown without wasting your time.\n*set juice -500\n\nThe Pitt is the man behind the green curtain of a burlesque revue close to the outskirts of the French Quarter called [i]Girls Girls Girls[/i]. It's a hoppin' place at the corner of Chartres Street and Madison Avenue, tucked near St. Louis Cathedral. All the big players are in residence every night—CEOs, executives, and politicians.\n\n*if voodoo_necklace\n\tTouching the necklace around your throat, you \n*if voodoo_necklace = false\n\tYou\ntake one last look at the Gator Girls and Ezma before you climb the stairs, knowing full well this may be the last time you see them in this life. There's no stopping now. No matter what, the truth will be revealed—in love, life, or death. And if it's the latter…Valhalla, here you come. \n*page_break\n\nYou nimbly exit via the shrine in the back of the building and turn the corner away from Bourbon, your heart threatening to burst with emotion. That's when you break into a run.\n\nSo it begins.\n*goto run\n\n*label respect_test\n\n*if respect > 60\n\t60+\n\t*return\n*elseif respect > 58\n\t58+\n\t*return\n*elseif respect > 56\n\t56+\n\t*return\n*elseif respect > 55\n\t55+\n\t*return\n*elseif respect > 53\n\t53+\n\t*return\n*else\n\t*return\n\n*label information\n*page_break\nRuby and Coco arrive a few minutes later and join you near one of the big dumpsters behind the shop—your usual meeting spot when you can't go inside. You hand them a wad of your juice, and they give you the lowdown. \n*set juice -500\n\nThe Gator Girls have the key to the magical door. The Pitt is the man behind the green curtain of a burlesque revue close to the outskirts of the French Quarter called [i]Girls Girls Girls[/i]. It's a hoppin' place on the corner of Chartres Street and Madison Avenue, tucked near St. Louis Cathedral. All the big players are in residence every night—CEOs, executives, and politicians.\n\nThe Gator Girls explain they can't stay for long, because Ezma is serving as a [i]mambo[/i] tonight.  Erzuli—the [i]loa[/i]—is about to possess a [i]cheval[/i]—a mortal host—and they have to get back in time to help Auntie greet the spirit. There's a lot you don't know, or want to know, about their rituals.\n\n*if (respect >= 57) or (pitts_crime = \"ruby\")\n\t*set voodoo_necklace true\n\t*set ezma_deal true\n\t*set contracts +1\n\t\"Auntie Ezma sent you something,\" Ruby says, leaning forward to tie a necklace made of bones around your neck.  The tiny, delicate bones scratch and dig slightly into your skin. \n\t*if pitts_crime = \"ruby\"\n\t\t*set velvet_bag true\n\t\n\t\t\"And this,\" says Coco, handing you a small velvet pouch.  \"She always did like you.\"\n\t\n\t\t\"No idea why,\" says Ruby with a wink.\n\n\t\tYou thank them over your shoulder, already on your way.  ${l_name} is running out of time.\n\t\t*goto goodbye_girls\n\t*else\n\t\n\t\tYou thank them over your shoulder, already on your way.  ${l_name} is running out of time.\n\t\t*goto goodbye_girls\n*else\n\t*if pitts_crime = \"ruby\"\n\t\t*set velvet_bag true\n\t\t\"Auntie Ezma sent you something,\" Ruby says, offering you a small velvet pouch. \"She always did like you.\"\n\t*comment endif\n\t\n\tYou thank them over your shoulder, already on your way.  ${l_name} is running out of time.\n\t*goto goodbye_girls\n\t\n*label goodbye_girls\n\n*if heat \u003c= 45\n\tSwiftly stepping around the corner, you pass the candy-colored stop sign and the overflowing trashcans, disappearing into the darkness on the other side of the street. You are headed away from the madness of Bourbon Street, to a much more dangerous world. \n\n\tThat's when you break into a run.\n\t*goto run\n*else\n\t*page_break\n\tAt the far end of the alley, you freeze. The cats that fill the alley scatter and take cover as well.\n\n\t*if encountered_cops\n\t\tThe cop car is back and blocking the alleyway with a big ol' spotlight moving towards you. \n\t*if encountered_cops = false\n\t\tTurning your head, you see that a patrol car is blocking the alleyway. A big ol' spotlight is moving towards you. \n\tYour back touches something hard and you look up to see a ladder covered in vines reaching the roof of the building. The cop gets out of the car, static from the CB deafening you. There is no time to waste. \n\t*choice\n\t\t#Climb up the ladder and get out of there!\n\t\t\t*set savvy %+5\n\t\t\t*set take_it_to_the_mattresses %-5\n\t\t\t*set respect %-5\n\t\t\t*goto climb\n\t\t#Push past the cop.\n\t\t\t*temp get_wounded false\n\t\t\t*if (respect > 60) or (heat > 65)\n\t\t\t\tYou attempt to run past the boy in blue, and he pulls out his billy club, stopping you dead in your tracks. He demands some identification.\n\n\t\t\t\t*choice\n\t\t\t\t\t#Sweet talk him.\n\t\t\t\t\t\t*set heat %-5\n\t\t\t\t\t\tCarrying identification would only get you into trouble. You pull your pockets out and declare that you don't have any. The cop searches you, mentioning that he might need to take you downtown until you finally remember where your ID is.\n\n\t\t\t\t\t\tAfter harassing you for a few minutes, the cop grows bored and lets you go with a stack of warnings. He watches as you head across Bourbon Street, into the safety of the crowd. As soon as he loses sight of you, you hang a hard right onto a side street, and break into a run.\n\t\t\t\t\t\t*goto run\n\t\t\t\t\t#Kill him.\n\t\t\t\t\t\t*label kill_cop\n\t\t\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\t\t\t*set jumpin_the_gun %+10\n\t\t\t\t\t\t*set remorse %-20\n\t\t\t\t\t\t*set heat %+15\n\t\t\t\t\t\t*set respect %+10\n\t\t\t\t\t\t*set clips +1\n\t\t\t\t\t\t*set juice +500\n\t\t\t\t\t\t*set kill_cop true\n\t\t\t\t\t\tWith quick slash of your sawtooth, you open the cop's jugular vein. He sprays red all over the car…and you. \n\t\t\t\t\t\t*if get_wounded\n\t\t\t\t\t\t\tUnfortunately, he manages to get a shot off before the light goes out of his eyes. It rips along your leg…more than a graze, but not enough to stop a headcrusher.\n\t\t\t\t\t\t*comment endif\n\n\t\t\t\t\t\tYou wipe yourself off and go through his wallet, scoring some extra juice is [i]lagniappe[/i]. Waiting until the coast is clear, you walk casually around the corner and cross to the other side of Bourbon Street. Once across, you break into a run.\n\t\t\t\t\t\t*goto run\n\t\t\t\t\t#Jump over his car.\n\t\t\t\t\t\t*set jumpin_the_gun %+5\n\t\t\t\t\t\t*set heat %+10\n\t\t\t\t\t\tJust like ${superman}, you smoothly leap onto his car without making a dent in the hood. You nimbly run over the metal body, and the cop pulls out his gun. \n\n\t\t\t\t\t\tAs you land on the other side, you find yourself in his sights. \"Freeze!\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*if pitts_crime = \"animals\"\n\t\t\t\t\t\t\t*set cat_help true\n\t\t\t\t\t\t\tAs you put your hands up in the air, the feral cats suddenly come to your aid. Screeching like demons, they launch themselves at him—some clawing his legs, some leaping for his arms, and some covering the cop car itself. \n\t\n\t\t\t\t\t\t\tWhirling in the midst of the feline maelstrom, the cop squeezes off a panic shot and takes out his own tire. You sprint across Bourbon as other cops follow the sounds of gunshots. Ducking down a side street, you race off, leaving the scene behind you.\n\t\t\t\t\t\t\t*goto run\n\t\t\t\t\t\t*elseif take_it_to_the_mattresses > 65\n\t\t\t\t\t\t\tYou freeze. There's nowhere to go.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tToo bad he doesn't know who he's dealing with.\n\t\t\t\t\t\t\t*goto kill_cop\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*set get_wounded true\n\t\t\t\t\t\t\t*set wounds +1\n\t\t\t\t\t\t\tYou freeze. There's nowhere to go.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tToo bad he doesn't know who he's dealing with.\n\t\t\t\t\t\t\t*goto kill_cop\n\t\t\t*else\n\t\t\t\t*set savvy %+5\n\t\t\t\tYou walk right up to the cop, and look him in the eye as you pass. Apparently, he doesn't recognize you, or something in your eyes makes him hesitate. Either way, you're soon lost in the madness of Bourbon Street. Disappearing into the crowd, you break into a run right as you pass The Gator Girls' Voodoo Shop, and then hang a hard left onto a side street.\n\t\n\t\t\t\tNo one comes after you. So long, suckers!\n\t\t\t\t*goto run\n\t\t#Hide in a dumpster.\n\t\t\t*if pitts_crime = \"animals\"\n\t\t\t\t*set cat_help true\n\t\t\t\t*set jumpin_the_gun %-10\n\t\t\t\t*set savvy %+10\n\t\t\t\tHiding is definitely a weak move, but hey, when times are tough, you gotta go with the flow. Besides, you and dumpsters…you have history.\n\t\n\t\t\t\tYou throw yourself into the dumpster, wincing at the filth and stench. The clowder of cats that call the alley home follow, covering you up. The cop gives the dumpsters a desultory glance before heading to the ladder and climbing up.\n\t\n\t\t\t\tExcellent!\n\t\t\t\t\t\n\t\t\t\tOnce the cop disappears to the roof, you leap from the dumpster and run out of the alleyway, jumping on the hood of the cop car to get out. Crossing Bourbon, you make your way to a side street and take to your heels.\n\t\t\t\t*goto run\n\t\t\t*else\n\t\t\t\t*set respect %+5\n\t\t\t\t*set jumpin_the_gun %-10\n\t\t\t\tFrom here, you can hear the cop as he creeps down the alley. In a moment, he's beside the dumpster. And that's when you pounce.\n\t\t\t\t\n\t\t\t\tStanding up, you grab the cop and pull him into the dumpster with you. Your sawtooth comes out, and it's goodnight Irene.\n\t\t\t\t*if take_it_to_the_mattresses \u003c 50\n\t\t\t\t\t*set wounds +1\n\t\t\t\t\tUnfortunately, during the struggle, he manages to give you a solid elbow to the kidneys. You'll be pissing blood for a week—if you survive the night, that is.\n\t\t\t\t*comment endif\n\t\t\t\t\n\t\t\t\tYou wipe yourself off and go through his wallet, scoring some extra juice as a nice bonus. Waiting until the coast is clear, you walk casually around the corner and cross to the other side of Bourbon Street. Once across, you break into a run.\n\t\t\t\t*goto run\n\n*label climb\nYou pull yourself onto the rickety ladder and start to climb, trying not to shake the vines. Cats zip by the cop, distracting him for a moment, but just as you reach the top, the cop looks up and sees you fall onto the rooftop. \n\nAs the cats screech in warning, you crawl away from the edge and the glare of the cop's flashlight. Once you're hidden in shadow, you stand and walk to the other side of the building. A high-end oyster bar, catering to NOLA's wealthiest tourists, is right next door. Peering over the edge, you can see the white-clad waiters hustling to please their customers in the garden seating area. \n\nBeing spotted is now the least of your concerns; if the heat catches you, your mission is over. You need to escape this roof, no matter what.\n\n*choice\n\t#Jump like ${spiderman} to the restaurant balcony.\n\t\t*set respect %+5\n\t\t*set heat %-5\n\t\tYou could fall, but it's the closest thing you've got….\n\t\t\n\t\tYou take a deep breath and step back to get a good, running start. Behind you, you can hear the vine-covered ladder shaking—the cop is coming. As you focus on the leap, the sounds around you fade, leaving only the tattoo of your heart and the rasp of your breath. Your feet begin to move. \n\n\t\tOne. Two. Three.\n\t\t\n\t\tYou leap from the building into the air.\n\t\t*page_break\n\t\t\n\t\tYour suit flaps in the rush of warm wind, and the balcony looms in your vision as you drop. You realize that you aren't going to make it just as a waiter looks up to see you plummeting like an avenging angel. Your eyes lock in mutual terror, while the customers pause, wine glasses at their lips and oysters on their tongues. \n\t\t\n\t\tSuddenly, you crash into the dumbfounded waiter, who serves as a surprisingly effective cushion for your landing. He falls into a table, and red wine spills all over a full-figured female customer in a straining corset. She screams in shrill panic. \n\t\t*page_break\n\n\t\tYou made it!\n\t\t\n\t\tOff you go—down the stairs of the restaurant, across Bourbon, and onto a side street. You look behind you to see if the cop caught on, but no one comes. You got what you wanted, and now you know what you have to do. You break into a run.\n\t\t\n\t\tSo it begins.\n\t\t*goto run\n\t#Hide on the roof and come back down the ladder when the cop isn't looking.\n\t\t*set jumpin_the_gun %-10\n\t\tIt's a chicken move, but hey, your mission is more important than getting caught!\n\t\t*if pitts_crime = \"animals\"\n\t\t\t*set heat %-10\n\t\t\t*set savvy %+10\n\t\t\t*set cat_help true\n\t\t\t\n\t\t\tYou quickly duck behind a crooked chimney made of red brick, hoping the cop will lose interest. No such luck. You can hear the rattle of the vine-covered ladder, followed by the crunch of heavy black boots on tar as the cop steps onto the roof. \n\n\t\t\tCrouching in your makeshift hiding place, you watch him scan the roof with his flashlight, unaware that cats are flooding the roof behind him. He heads to the edge, and looks down over Bourbon. \n\t\n\t\t\tThis is your chance.\n\t\t\t*page_break\n\n\t\t\tYou run for it. As you bolt for the ladder, the cop turns and pulls his gun. \"Freeze!\" he yells, targeting you. You stop, keeping the deadly muzzle in your sight.  \n\t\t\t\n\t\t\tBefore anything else can happen, the dedicated cats suddenly swarm the cop, ripping at his legs with their claws. As he yelps and flails, trying to withstand the feline maelstrom, you take off and slide down the ladder, getting a last glimpse of the alley cat–covered cop. \n\t\t\t\n\t\t\t*fake_choice\n\t\t\t\t#Meow! I love these felines!\n\t\t\t\n\t\t\t\t#Feral cats are unstable and carry diseases. \n\t\t\t\n\t\t\t\t#Hell, smoke 'em if you got 'em. They're a free task force at my disposal.\n\t\t\t*comment endif\n\t\t\t\n\t\t\tYou hit the ground of the alley almost at a dead run, leaving the cop's screams behind. You tear around the corner, past the candy-colored stop sign, across Bourbon Street, and onto a side street.\n\t\t\t*goto run\n\t\t*else\n\t\t\tYou stay there, holding your breath and waiting for the cop to pass. It is a long few minutes. Soon enough, though, he slips out of sight and you emerge from cover.\n\t\t\t\n\t\t\tTime to get a move on.\n\t\t\t*goto run\n\t#Kill the cop.\n\t\tWhen times get tough, the sawtooth comes out.\n\t\t*set heat %+10\n\t\t*set clips +1\n\t\t*set kill_cop true\n\t\t\n\t\tWith the sawtooth in your hands, you approach the shaking ladder. \n\n\t\tThe cop pokes his head up like a rookie, and you place your alligator shoe firmly over his face so he doesn't see you. With a quick jerk, you slit his throat and shove him off the ladder. His body sails through the night and lands straight in the dumpster. Trash flies through the air, while cats descend on his body.\n\t\t\n\t\tYou slide down the ladder as the cats screech with joy. You run around the corner, past the candy-colored stop sign, across Bourbon Street, and onto a side street.\n\t\t*goto run\n\n*label run\n*page_break\nYour breathing becomes more focused as your feet pound the pavement. Large, draping live oak trees extend overhead as you approach the territory you should never enter.\n\nIt's the only way to get to the [i]Girls Girls Girls[/i] revue without drawing undue heat down on your neck: a quick jaunt through the heart of The Dragon's lair. \n*finish", "paybacks_a_bitch": "*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]NOLA is Burning[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n*temp missing_leg false\n*temp took_red_birds false\n*temp has_a_deal false\n*if dragon_assistance\n\t*set has_a_deal true\n*if deal_cop\n\t*set has_a_deal true\n*if ezma_deal\n\t*set has_a_deal true\n*if confessor_deal\n\t*set has_a_deal true\n*if gutterpunk_posse\n\t*set has_a_deal true\n*temp heimlich false\n[b]Chapter Eight: Payback's a Bitch[/b]\n\nFamiliar smells within the belly of the revue cause memories to whoosh by like passing trains in a thick, wet fog. You remember\n*if desire = 1\n\tgripping your sawtooth and fighting for your own territory in order to survive. It must be the smell of dried blood that fills the room.\n*if desire = 2\n\ta paralyzing fear of the other kids—the harder ones who were occupying the same streets where you had escaped. It must be the sticky sweat of The Pitt's goons that reminds you.\n*if desire = 3\n\trummaging through dumpsters with your filthy hands, freezing in the New York winters. This room must open onto the alley behind the building.\n*if desire = 4\n\tyour days with Nonna, and the aching longing for security, for love, for acceptance. Someone must have been eating lasagna.\n*comment endif\n\nThe memories fade as reality begins to intrude. The pain comes first, a Mardi Gras marching band making its way through your head, and then your senses return. You can hear hot jazz booming above you, rattling bottles. The dim light above you swings from the ceiling in time to the vibrations of the music. \n\nThe cold cement supporting your body is firm. Strong. Harsh. \n\nThe voices of The Pitt's men are all around you. Someone accidentally steps on the pinky finger of your right hand, and you come back all the way to the here and now. \n*page_break\n\nOpening your eyes, you see several of The Pitt's men standing over your crooked body, which is lying next to a blood-soaked wooden table in a cellar below the revue. You shudder at the thought that soon your blood will be drying into that table as well. \n\nMeanwhile, the goons shoot the shit about Drew Brees and the Saints, and complain about how hard it is to get good pizza in this town. One of them keeps spitting, his mouth full of tobacco. One is smoking a cigar. The one in the middle is eating a sandwich.\n\nJust another day at the slaughterhouse.\n*choice\n\t#I'll try to get up. Maybe they won't notice.\n\t\tLifting your pounding head off the cement, you attempt to sit up slowly. Most likely spurred on by that damn light swinging from the ceiling, the world suddenly goes sideways and nausea washes over you. You breathe deeply and try to regain your equilibrium.\n\n\t\tThe Pitt's men notice nothing. This just might work.\n\t\t\n\t\tThe nausea fades and the world comes back to normal. You start to slide along the floor, placing your right hand into something wet. Your hand is planted in a pool of fresh blood that has dripped off the wooden table. They must have already done one message-job tonight.\n\t\t*if desire = 4\n\t\t\tThis couldn't be ${l_name}'s blood, could it? You shake the thought off; if it is, there's nothing you can do about it now.\n\t\t*comment endif\n\n\t\tYou keep scooting along, inching away from the men supposedly guarding you. Sandwich Man keeps spitting chunks of half-chewed food as he talks and laughs mid-bite. There are mustard stains on his shirt and pickles on the floor beneath him.\n\n\t\tTaking a deep breath, you slide into a dark corner and stand up slowly. \n\t\t*choice\n\t\t\t#Sneak away like a ninja.\n\t\t\t\t*set savvy %+5\n\t\t\t\t*set jumpin_the_gun %-5\n\t\t\t\t*set respect %-5\n\t\t\t\tYour back to the wall, you wait for your moment. When the goons burst into loud laughter, you make your move, slinking from your corner and putting the blood-soaked table between you and them. You crouch down and scuttle like a monkey toward the stairs. \n\n\t\t\t\tJust as you make it to the third step, The Pitt's men notice their runaway. The butt of a cane suddenly hits you right in the middle of the forehead. \n\n\t\t\t\tBAM!\n\n\t\t\t\tYou collapse back down the stairs into the waiting arms of one of The Pitt's men. He drags you back to where you started. \n\n\t\t\t\tThe boss is comin'.\n\t\t\t\t*page_break\n\t\t\t\t*goto the_pitt\n\t\t\t#Sneak attack. They'll never see it comin'.\n\t\t\t\t*set jumpin_the_gun %+5\n\t\t\t\t*set respect %+5\n\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\tGrabbing a pair of rusted bloody pliers off the wood table, you run towards them, screaming like a banshee. You take a mighty swing, but you only manage to knock the sandwich out of Sandwich Man's hand.\n\n\t\t\t\tDamn.\n\n\t\t\t\tAs the sandwich lands in a puddle of blood, The Pitt's men tackle you. A sweet pickle rolls briefly along the cement.\n\n\t\t\t\t\"That was my dinner!\" Sandwich Man says. He pulls your head back and his hands close into fists, ready to take his frustration out on you. Before he can strike, a footfall sounds on the stairs. \n\n\t\t\t\tThe goons quickly make like everything is under control. \n\t\t\t\t*page_break\n\t\t\t\t*goto the_pitt\n\t\t\t#Join the conversation like a true smooth talker.\n\t\t\t\t*set jumpin_the_gun %+5\n\t\t\t\t*set savvy %+5\n\t\t\t\t*set respect %+5\n\t\t\t\tTheir conversation turns to the different pizza styles in major cities. You jump in. \"Everyone says that NYC pizza is the best, but it's not. It's Chicago pizza all the way, baby.\"\n\n\t\t\t\tAlarmed, they stand there, not sure what to do.  Apparently, this has never happened to them before. The one who can't stop spitting drops a huge brown tobacco plug right next to your shoe.\n\n\t\t\t\t\"You're supposed to be half-dead,\" says the one with the cigar. \n\n\t\t\t\t*if male = false\n\t\t\t\t\tThe goons look at each other and nod enthusiastically. \"Not bad for a woman….\"\n\n\t\t\t\t\tRolling his eyes, the one with the sandwich smacks them both on the shoulder and reminds them of what they learned recently about sexist statements.  They start to argue about the difference between compliments and sexist remarks. To your shock, Sandwich Man and Cigar Smoker start on a side track involving Freud and third-wave feminism. Jumping in, you inform them that the person they are working for is extremely sexist.\n\t\t\t\t*if male = true\n\t\t\t\t\tThe goons all agree that you are pretty hardcore and give you nods of approval.\n\t\t\t\t*comment endif\n\n\t\t\t\tYou take center stage and tell 'em The Pitt will surely turn on them eventually, whether because it's to his benefit or just because he wants to shake things up. You let them know that the man has no respect and no loyalty to anyone, he's brewing up a mafia war, and he'll spend their lives without a second thought. They're pawns—just like you, just like everyone involved. No money or false sense of future job stability is worth that.\n\n\t\t\t\tYou can see you've got them thinking. But then you hear footfalls on the stairs. The Pitt's men turn and tackle you immediately. \n\t\t\t\t*page_break\n\t\t\t\t*goto the_pitt\n\t#I don't go down that easily. Maybe I can get one of 'em in the kneecaps. \n\t\t*if spurs\n\t\t\t*set spurs false\n\t\t\tYou bring your leg up and slash your spur across the kneecap of the nearest goon, Sandwich Man. He drops, surprised, and his sandwich hits the floor. Half a pickle rolls into a small pool of blood. The other goons grab you and drag you to the bloodstained wooden table, ripping off your spurs.\n\t\t\t\n\t\t\tThey start to pummel you, when a sound echoes down the hallway and into the room. Stopping, they grab your face and turn you, so you can see who's coming.\n\t\t\t*page_break\n\t\t\t*goto the_pitt\n\t\t*else\n\t\t\tWith a twist of your hip, your foot shoots up and hits the knee of the nearest goon, Sandwich Man. He drops, surprised, and his sandwich hits the floor. Half a pickle rolls into a small pool of blood. The other goons grab you and drag you to the bloodstained wooden table.\n\t\n\t\t\t*label cpr\n\t\t\tBehind th
