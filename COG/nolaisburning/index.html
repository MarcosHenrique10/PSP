ts. Your vision and hearing come back all the way now, dropping you smack dab into reality. \n\n\t*if velvet_bag\n\t\t*set wounds -3\n\t\tOne of them finds the small velvet bag that Auntie Ezma gave you and pulls it out of your pocket. Another one smells the contents and nods excitedly, dumping it into the pot. \n\n\t\tEzma was looking out for you, that's for sure.\n\t*choice\n\t\t#I want to know what they're doing. It never hurts to ask.\n\t\t\t*set savvy %-5\n\t\t\t*set take_it_to_the_mattresses %-5\n\t\t\t*set jumpin_the_gun %+5\n\t\t\tMumbling incoherently, you lift your head off the floor and try to get to their attention, but they ignore you. \n\n\t\t\tHmmm…actual words might be effective here….\n\n\t\t\tYou try again and manage to make a little sense. They take notice of you, but do not say what they are doing. A soft hand touches your face, pushing your head back down to the ground.\n\t\t\t*page_break\n\t\t\t*goto dragon\n\t\t#I keep my trap shut, just this once.\n\t\t\t*set savvy %+5\n\t\t\t*set take_it_to_the_mattresses %-5\n\t\t\t*set respect %+5\n\t\t\tYou lie back and accept their attentions, drifting into a trance-like state. It's a soothing feeling—and revitalizing. If you'd died back in the dumpster, this would be the passage, the preparation for the afterlife. \n\n\t\t\tBut then your whole life is, isn't it? Every single moment.\n\t\t\t*page_break\n\t\t\t*goto dragon\n\t\t*if two\n\t\t\t#I summon the Dragon. I've lost two limbs trying to svae this city. I've earned the right.\n\t\t\t\t*goto summon_dragon\n\t\t*if two = false\n\t\t\t#I summon the Dragon. I've lost a limb trying to save this city. I've earned the right.\n\t\t\t\t*label summon_dragon\n\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\t*set savvy %+5\n\t\t\t\tGathering your strength, you sit up and shout something about a yellow dragon. They push you back down, talking quickly to each other and laughing, impressed by your stubbornness. \n\t\t\t\t*goto dragon\n\t\t*if (desire = 2) #I thank them, even though I don't deserve their kindness.\n\t\t\t*set take_it_to_the_mattresses %-5\n\t\t\t*set remorse %+5\n\t\t\t*set respect %+5\n\t\t\tYou manage to mumble out a few words of gratitude, and they smile back at you. That simple human connection encourages you to cling to life.\n\t\t\t*goto dragon\n*elseif deal_cop \n\t*set weapon \"cybernetic rifle\"\n\t*if two\n\t\t*set weapon \"cybernetic rifles\"\n\t*set dragon \"cyber-warrior\"\n\t*set gutterpunk_posse false\n\t*achieve cyborg\n\tBlue and red flashing lights fill your vision, and the commanding voices of the heat call out for medics. Careful hands lift you out of the dumpster and into an ambulance, where an oxygen mask is placed over your mouth. \n\n\tSomeone jabs an IV into a vein, and in a matter of minutes what feels like an avalanche of uppers hits your bloodstream. Your eyes pop open as the drugs course through you. You cry out in pain every time the ambulance hits one of the many bumps in the pot-holed streets of NOLA; the uppers make you feel every crack and dip in the pavement.\n\n\t*if voodoo_necklace\n\t\tYou reach up slowly, touching the scratchy bone necklace that Auntie Ezma gave you. \n\n\t\tMalone sits down next to you and recognizes the necklace from the Gator Girls' Voodoo Shop. Almost everyone on the force loves that place. \n\n\t\tMalone tells you that Ezma pulled him out of a jam long ago when he was just a cop walking the beat—before the two of you ever met. He was cornered in an alley by some young Italians who had it out for him because he was bringing down heat on their wanna-be gambling racket. Ezma came in, bones-a-blazing, speaking in tongues, and scared these [i]paesanos[/i] into thinking she'd cursed their manhoods.\n\n\t\tThey ran as fast as they could to church to get the so-called curse reversed. Actually, all she'd been doing was reciting a recipe in Creole for a good chicken gumbo! Because of that, he and Ezma are thick as thieves. \n\t*if voodoo_necklace = false\n\t\tMalone sits down next to you.\n\t*page_break\n\n\tWhile your heart pounds a mile a minute, he informs you in a condescending tone how lucky you are that they found you. \n\t*if security_missing\n\t\tEven though they suspect you of causing the horrible fire down the street at St. Louis Cathedral, they're focused on The Pitt.\n\tThe heat is on your side—this time—and they want you to finish the mission. This is no normal ambulance; this is some high-tech X-Files-meets-Buffy-the-Vampire-Slayer laboratory on wheels. Some tall creep with Einstein hair and a mask over his face approaches. He's holding some scary looking bottles in his black, rubber-gloved hands. In a thick Eastern European accent he says, \"Don't worry, this may sting a little.\" \n\t\n\tHe uncaps the bottles and pours the liquids over your raw, bloody ${stump}. After what seems like an eternity of searing pain—worse than getting the ${limb} removed to begin with—your wounds start to go numb. He turns to his wall of devices and presents \n\t*if two\n\t\ta pair of weird looking rifles-their ends shaped\n\t*if two = false\n\t\ta weird looking rifle—the end of it shaped \n\tinto an odd-looking flat circle. Without waiting, he jams \n\t*if two\n\t\tthe ends of the rifles\n\t*if two = false\n\t\tthe end of the rifle \n\tinto the ${stump} of your missing ${limbs}, and \n\t*if two\n\t\tthey suddenly latch\n\t*if two = false\n\t\tit suddenly latches \n\tonto you. You scream as the metal fuses directly to your body. And here you thought the mysterious liquid was painful! So much for that numbing agent!\n\n\tFrom the far side of the van, Malone lets you know this is new government tech that's still being beta-tested, and you get to be one of the lucky guinea pigs. And he's supposed to be on your side! You briefly wonder what Malone would have had jammed into you if you were still on his bad side!\n\t*page_break\n\n\tInhaling, you look down at your body. \n\t*if two\n\t\tThe ${weapon} move when you want them to move.\n\t*if two = false\n\t\tThe ${weapon} moves when you want it to move.\n\t*comment endif\n\n\tIt's connected to you now.\n\n\tAs the pain finally fades, the attendants help you out of the ambulance. Silent cops fill the alley, waiting for your direction, as Malone joins you. He doesn't need to remind you that you will be released from all obligations to the heat after this night. \n\t\n\tFeeling the prescription drugs pump through your system, you walk back through the crowd of silent cops, heading back towards the revue. It's a few short blocks away.\n\t*if (has_dominant_leg = false) or (has_weak_leg = false)\n\t\tThe cops are shocked by the sight of your leg-rifle thumping the ground with every step. Surprisingly, it's only slightly awkward. Hell, pirates used peglegs and one thought the less of them—why can't you use this?\n\t*comment endif\n\n\t*if letter_l\n\t\t\"One last thing, ${name},\" he says. You glare at him, annoyed by the interruption. He produces the crumpled letter from ${l_name}. You snatch it from his grubby fingers and thrust it into your pocket before turning to leave. Behind you, you hear Malone instructing the cops to follow you to the revue.\n\t*if letter_l = false\n\t\tMalone instructs them to follow you.\n\t*page_break\n\t*goto coppers_follow\n*elseif confessor_deal\n\t*set weapon \"divine cross\"\n\t*if two\n\t\t*set weapon \"divine crosses\"\n\t*set dragon \"crusader\"\n\t*achieve crusader\n\tA blinding light fills your vision—the light of your next journey. You're in the proverbial tunnel, so you decide you must be dead. \n\t*if paranoia \u003c 50\n\t\tWhere's Saint Peter? Where's the bell boy with your wings and harp? Why does it still smell like a dumpster?\n\t*if paranoia >= 50\n\t\tYou're headed straight to Hell…which somehow still smells like a dumpster. Figures.\n\t*comment endif\n\t\n\t*if cat_help\n\t\tYou take a deep breath as the cats scamper away and warm hands are placed on your wounds. \n\tAn incredible feeling, a wave of positive organic energy, fills your body. Bring on the tired, the poor, the huddled masses, and you'll take good care of 'em. Just call you Mother Headcrusher from now on.\n\n\t*choice\n\t\t#Fantastic. This is the only peace I've gotten all night.\n\t\t\tYou take your time before opening your eyes. Your vision slowly comes back.\n\t\t\t*goto father_arrives\n\t\t*if (desire != 1) #Mexico, here I come!\n\t\t\tYou breathe in deeply and open your eyes.\n\t\t\t*goto father_arrives\n\t\t#Nonono! The story isn't over. I'm not done yet!\n\t\t\tDetermination fills you as your eyes fly open.\n\t\t\t*goto father_arrives\n\t\t*if (desire = 1) #Whoever it is better make it snappy—I got fish to fry!\n\t\t\tYou sigh impatiently as your eyes open. \n\t\t\t*goto father_arrives\n\t*label father_arrives\n\n\tAs you strain to see through the blinding light, a holy silhouette appears. \"Be still, my ${son}. All will be well.\" Uh oh! You can't meet your Lord and Savior looking and smelling like this! You try futilely to straighten your outfit and tidy your hair until you realize…\n\n\tIt's Father Confessor.\n\t*page_break\n\tHe climbs into the dumpster with you, and you realize he's more than just the pill-popping loser you left back in the cathedral. He says a quick prayer and then places his warm hands on your bloody ${stump}. Beside him is a jug of what must be holy water and a large bundle wrapped in deep red velvet. He washes your stump with the water, and the wound bubbles and spurts foam. \n\t\n\tAfter wiping away the mess, he carefully unwraps his bundle. He pulls out a large wooden cross and pours the rest of the water over it, all the while muttering phrases in Latin. What seems like the scent of incense touches your nose, but you decide it's probably just something in this dumpster. \n\n\tHe gently attaches a giant cross to your sanctified ${stump} in place of your ${appendage}. The cross grows roots and connects to your body. You feel the roots branching through your entire being, as the cross joins itself to your body and suppresses your pain. \n\n\tYou have, in fact, never felt better. Maybe there's something to this whole religion thing after all?\n\n\tAs the bright light dims, Father Confessor's smiling eyes meet yours. \"It's not your time yet, ${name}. You still have work to do.\"\n\t\n\tHe takes your hand and helps you out of the dumpster. \n\t*if (has_dominant_leg = false) or (has_weak_leg = false)\n\t\tYou land light on your feet…well…foot and cross!\n\t*if two\n\t\tThe giant crosses are no normal crosses—they're weapons, \n\t*if two = false \n\t\tThe giant cross is no normal cross—it's a weapon, \n\tattuned to your thoughts.\n\t*if two\n\t\tThey're connected to you now.\n\t*if two = false\n\t\tIt's connected to you now.\n\t*comment endif\n\tInhaling, you look down at your body. It seems better, stronger, faster. \n\n\tLook out, Lee Majors! There's a new man in town!\n\t*page_break\n\t\n\tFather Confessor encourages you to try it. You think of defending yourself, and flaming communion wafers fly in all directions, narrowly missing Father Confessor. You silently request a change in ammo, and bullets tear into the alley's back wall, creating a beautiful image of the Mother and Child, etched in bullet holes and brick. \n\t\n\tFather Confessor beams—he's been working on this invention for years—and he's thrilled to see it put to some just use.\n\t*if desire = 2\n\t\tHe believes you were sent here for a reason. Your spirits rise in a way you've never experienced before.\n\t*if letter_l and (atheist = false)\n\t\t\"One last thing, ${name},\" says the Father Confessor. Turning, you see that he holds the crumpled letter from ${l_name}. You take it, thanking him.\n\n\t\t*label non_atheist\n\t\tWith heavenly healing on your side, you storm into the front of the revue, renewed. You're on a mission—a mission from God.\n\t\t*page_break\n\t\t*goto kick_ass\n\t*elseif letter_l and atheist\n\t\t\"I know you doubt the existence of God, ${name},\" you try not to roll your eyes, expecting a sermon. \"But clearly he believes in you,\" he says, gesturing to your partially-healed wounds and replacement\n\t\t*if two\n\t\t\tlimbs.\n\t\t*if two = false\n\t\t\tlimb.\n\t\t*comment endif \n\n\t\t\"I have to admit, Father Confessor, something has happened here this evening,\" you reply, begrudgingly.\n\n\t\t\"And here, I believe this is yours,\" he says, handing you the crumpled note from ${l_name}. You take it, thanking him. \n\t\t*label atheist\n\t\tWith heavenly healing on your side, you storm into the front of the revue, renewed. You're on a mission—a mission from God?\n\t\t*page_break\n\t\t*goto kick_ass\n\t*elseif atheist = false\n\t\t*goto non_atheist\n\t*else\n\t\t*goto atheist\n*elseif gutterpunk_posse\n\tYou hear the sounds of teenagers talking all at once.\n\t*if cat_help\n\t\tThe cats are pushed to the side. \n\tThe smell of cigarette smoke and expensive perfume fills your nose. You feel a slap across your face. The voice of a boy repeats \"${name},\" over and over again.\n\n\t*fake_choice\n\t\t#I wish I was back in the dumpster. It's the only peace I've gotten all night.\n\t\t\tYou take your time before opening your burning eyes. Your vision slowly comes back.\n\t\t#Awesome! Who the hell knows where I'll end up next?\n\t\t\tYou breathe deeply and open your eyes. \n\t\t#After all I've lost tonight, this could turn out quite interesting….\n\t\t\tYou open your eyes, curious to see who you are surrounded by.\n\t*comment endif\n\n\tIt's the gutterpunks. One of them throws a t-shirt over you, and\n\tthey lift you from the dumpster and into the back of a truck. The driver punches the gas and follows a twisting, turning route through the French Quarter until finally coming to sudden stop. The gutterpunks lift you out and let you know they're taking you to their boss: The Dragon.\n\t*page_break\n\tThey enter the dilapidated green house carefully and bring you to the back room. They lay you on the floor and they disappear as The Dragon's men and women surround you.\n\t*goto gutterpunks_dragon\n*elseif ezma_deal\n\t*set weapon \"ossein gun\"\n\t*if two\n\t\t*set weapon \"ossein guns\"\n\t*set dragon \"[i]cheval[/i]\"\n\t*achieve cheval\n\tBurning hot hands tear open the plastic bag, and the smell of patchouli and old wine assaults you. An old woman grabs your necklace, voice rising as she utters a string of Yoruba and French words you can't understand. You struggle to keep your eyes open as her hands touch your forehead. Her voice reaches a crescendo, and she pushes your head back into the trash below you.\n\n\tA powerful shock rocks through your body, from your head to your feet. An immense amount of natural energy suddenly flows through every cell in your being. You sit up and open your eyes.\n\n\tIt's Auntie Ezma.\n\t*page_break\n\n\tWith her glass eye rolling around in her head, she smiles widely and pulls out a mess of tangled organic matter and bones that might once have been a human limb. Fascinated and repelled, you take a closer look and see that the bones are actually moving. It's alive. \"Now, it's time we got you out of there.\"\n\t\n\tDemonstrating a surprising amount of strength, the old woman pulls the garbage bag containing you out of the dumpster and into a wheelbarrow. Once you're secure, Auntie Ezma takes the living-bone-appendage-${thingy} into her hands again.\n\n\t*if two\n\t\t\"These are a pair of ${weapon}, gifts from Baron Samedi. Gifts for you.\"\n\t*if two = false\n\t\t\"This is an ${weapon}, a gift from Baron Samedi. A gift for you.\"\n\t*comment endif\n\t\n\tShe presses the undulating bones to your ${stump}, where they begin to meld with your flesh. She picks up the handles and pushes the wheelbarrow away from the revue; as she does, strange words pour from her lips in time with the rotation of the single, ill-maintained wheel. She calls down the [i]loa[/i] to bless you with its power, to come from the heavens and ride you…ride you to victory.\n\t\n\tThe discomfort from your ${stump} quickly dissipates, leaving you feeling completely normal, \n\t*if two\n\t\tlike the tangled messes have been there all along—like they've always been your limbs.\n\t*if two = false\n\t\tlike the tangled mess has been your limb all along. \n\tYou are whole again. \n\n\t*if velvet_bag and (wounds > 2)\n\t\t*set wounds -3\n\t\tAuntie Ezma thanks you again for helping Ruby all those years ago and tells you that she has always wished to pay you back in some way. She reaches into your suit and takes the velvet bag out of your pocket.  \n\n\t\t\"I figured you would need this tonight,\" she says. Emptying the contents into her hands—a powder that begins to glow when she puts her hands together—she rubs your other wounds. Suddenly, they don't hurt quite so much. She smiles.\n\t\t\n\t\tNow, you are even.\n\t*comment endif\n\n\tShe takes a moment to stand back and admire you. You are a ${dragon}—and you truly are a fright! She encourages you to try out the ${weapon}. You lift \n\t*if two\n\t\tone of them up\n\t*if two = false\n\t\tit up \n\tand spray sharp bullets made of bone into the wheelbarrow, which practically dissolves under the assault. These bullets are no joke.\n\n\tAuntie Ezma kisses you on the forehead. \n\t*if letter_l\n\t\tShe presses the crumpled letter from ${l_name} into your hand, recovered from atop your body in the dumpster.\n\tYou leave her standing there, the ${weapon} moving fluidly with your body as intense energy pours through you.\n\t*page_break\n\t*goto kick_ass\n*else\n\t*bug\n\n*label dragon\nA neon light announces arrival of The Dragon, dressed in Zumba jammies, white hair like a flaming halo around her head. \n\n\"You've had a busy night! And now, you will be like ${superman}—a mighty force of power and precision. I have made you this nanotech device. You and I made a deal, and I hold true to my word, my funny-looking ${son}.\"\n\nShe adds that it's undergone only a little beta-testing. You are not comforted. \n*goto contraption\n\n*label contraption\n*if two\n\tTwo metallic contraptions complete with brass wires, some sort of greyish iridescent goo, diamond knives, a travel-sized machine gun, and a flame thrower are revealed. Conveniently, they're in the shape of your missing ${appendage}. The Dragon lets you take in the sight for a moment, and then she shoves the ends of the contraptions directly into each of your bloody stumps. \n*if two = false\n\tA metallic contraption complete with brass wires, some sort of greyish iridescent goo, diamond knives, a travel-sized machine gun, and a flame thrower is revealed. Conveniently, it's in the shape of your missing ${appendage}. The Dragon lets you take in the sight for a moment, and then she shoves the end of the contraption directly into your bloody stump. \n*page_break\n\n*if two\n\tThe contraptions hook themselves\n*if two = false\n\tThe contraption hooks itself\ninto the skin of your ${stump}, molding and adjusting to your body. You scream as pain tears through every fiber of your being. The pain from the sawtooth was nothing compared to this. The Dragon pulls your face to hers, making you focus on her.\n\n\"You are a strong ${man}! A force of precision and power! You are…a ${dragon}!\" \n\n*if voodoo_necklace = true\n\t*set weapon \"voodoo appendage\"\n\t*if two\n\t\t*set weapon \"voodoo appendages\"\n\t*set dragon \"voodoo dragon\"\n\tThe Dragon looks down, noticing the voodoo necklace digging into the skin of your neck. She smiles.\n\n\t\"You've been to Auntie Ezma?\"\n\n\tSuddenly, your back arches as new pain shoots through your body. Before you can scream, however, the pain is washed away by an intense feeling of wellness—as if a beneficent spirit has stepped into your body. You can feel your new ${limbs} changing, the mess of metal, cords, and organic matter at the end of your ${stump} transforming as bones and skin grow over it. The Dragon hugs herself with glee as your body becomes one with the ${weapon} and animistic power rises within you. \n\n\t*if two\n\t\tThese ${weapon} have the power of voodoo.\n\t*if two = false\n\t\tThis ${weapon} has the power of voodoo. \n\tSlap that baby, make him free!\n\t*goto sticky_liquid\n*elseif rosary and (remorse \u003c 50)\n\t*set weapon \"demonic appendage\"\n\t*if two\n\t\t*set weapon \"demonic appendages\"\n\t*set dragon \"demonic dragon\"\n\t*achieve poweroverwhelming\n\tThe Dragon suddenly notices the rosary around your neck. Her face goes ashen. \"You've been to see Father Confessor?\" \n\n\tShe nervously points out that the nanotech is susceptible to otherworldly influences. And with your history of nefarious activities….\n\t\n\tSuddenly, your back arches as new pain shoots through your body. Before you can scream, however, the pain is washed away by an ominous feeling of rising power—like a demon has stepped into your body. You can feel your new ${limbs} changing, the mess of metal, cords, and organic matter at the end of your ${stump} transforming as bones and skin grow in a blaze of liquid fire. The Dragon shakes her head as your body becomes one with the ${weapon} and unholy power stirs within you. \n\t\n\t*goto sticky_liquid\n*else\n\t*set weapon \"nanotech appendage\"\n\t*if two\n\t\t*set weapon \"nanotech appendages\"\n\t*if (rosary = true) and (remorse > 60)\n\t\tThe weight of the rosary on your chest gives you hope. Maybe, just maybe, you'll pull through this.\n\tThe Dragon watches intently as the pain begins to fade. As you come back to yourself, she gives a satisfied nod.\n\t*goto sticky_liquid\n\n*label sticky_liquid\nAnd with that, she pinches your nose shut and pours sticky liquid down your throat.\n\nEveryone backs away, letting you choke on what tastes like rancid syrup. As it slides down your throat, the last of your pain dissipates. Instead, energy explodes through your body, from your mind and heart down to your furthest extremities. Your eyes become completely clear. Focused. Different. \n*page_break\n*achieve dragon\nInhaling, you look down at your body. \n*if two\n\tThe ${limbs} move when you want them to move.\n\t\n\tThey're connected to you now.\n*if two = false\n\tThe ${limbs} moves when you want it to move. \n\t\n\tIt's connected to you now.\n*comment endif\n\nIlluminated by the neon lights, The Dragon smiles. \"Rise, my ${son}.\"\n\nYou stand up carefully, testing out your new ${limbs}. Energy rushes through your veins like you've never experienced before. All your senses are honed to razor-edge, except for pain. \n\nThere is no pain. Anywhere.\n\n\"You and the dragon are now one. Let it feed you. \n*if letter_l\n\tNow, go kick some ass, and take this with you,\" she says, tossing the crumpled letter from ${l_name} towards you. You catch it and stuff it into your pocket; the gutterpunks must have found it atop your body in the dumpster.\n*if letter_l = false\n\tNow, go kick some ass.\"\n*comment endif\n\nAs you head for the door, the crowd parts to let you through. As you pass through the angled hallways of the dilapidated building, you begin to move faster and faster. Your blood flows red hot as the ${weapon} works on your body. When you reach the front door, you practically rip it off its hinges without even trying. \n\n*page_break\nOut on the sidewalk, you come to a full stop, leaving a skid mark on the broken cement.\n\n*if gutterpunk_posse = false\n\t*set gp_with true\n\tThe Dragon's green house is surrounded by more gutterpunks than you've ever seen before. It's like every teenager in NOLA dropped their Xbox controllers and decided to get serious all at once. Chains dangle from clenched fists and cigarettes dangle from clenched teeth. A wall of determined eyes surrounds you.\n\n\tYou're not sure why, but you strike a strong pose and give them a welcoming grin. The leader grins back, shaking his head.\n\n\t\"Let's go, ${dude},\" he says. Apparently, he's offering you backup.\n\t*choice\n\t\t#Nah. This is my mission. I don't need these kids following me.\n\t\t\t*set respect %+20\n\t\t\t*goto kick_ass\n\t\t*if (desire = 1) #As long as they don't cramp my style, they can follow along.\n\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t*set savvy %+5\n\t\t\t*set gutterpunk_posse true\n\t\t\tYou tip your hat and take off down the street. Picking up what you're layin' down, they follow you.\n\t\t\t*goto kick_ass\n\t\t#I get my own mob? Yes, please!\n\t\t\t*set gutterpunk_posse true\n\t\t\tYou raise your arm, Road Warrior—style, and the gutterpunks roar their approval, filling the sticky Louisiana air. The streets echo with their warrior screams. \n\t\t\tAnd you run.\n\t\t\t*goto kick_ass\n\t\t*selectable_if (respect > 65) #I'd rather take The Dragon's warriors. Skilled fighters are a great backup plan.\n\t\t\t*achieve forestdemons\n\t\t\t*set savvy %+5\n\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t*set forest_demons true\n\t\t\tYou wave off the gutterpunks and head back into the dilapidated green house. Your feet take you back down crooked hallways, back into the room where you have been changed forever.\n\t\t\t\n\t\t\tSurprised, The Dragon asks why you have come back. You tell her you want her warriors.\n\t\t\t*page_break\n\t\t\t\n\t\t\tLaughing, she says something about \"Forest Demons.\" She nods her wild head of hair, and all the women immediately grab the swords off the walls.\n\t\t\t\n\t\t\tThe women are the warriors….\n\t\t\t*page_break\n\t\t\t\n\t\t\tAs they line up behind you, bloodlust in their eyes, The Dragon gives them a pep talk, reminding them to live, love, fight, and die with honor.\n\t\t\t\n\t\t\tYou thank them and run out of the house. Despite their small feet, the warriors keep up with you with no difficulty. The neon lights of the [i]Girls Girls Girls[/i] revue begin to fade in the spreading light of sunrise. 6AM is fast approaching. \n\t\t\t*goto kick_ass\n*elseif (heat > 65) or (security_missing)\n\t*label encounter_cops\n\tThe heat fills the streets with its lit-up cars, stuffy suits, CB radios, megaphones, and guns. Egos on full display, coppers wear the law brazenly on their chest. \n\n\t*if deal_cop\n\t\tEven though you made a deal with the heat, you are a ${dragon} now.\n\t*if deal_cop = false\n\t\tImages of what you went through to get out of the police station earlier in the evening flash through your mind, rapid-fire.\n\t*comment endif\n\n\tThe cops aim their weapons at you, waiting for the least excuse to pump you full of lead. \n\t*if security_missing\n\t\tA megaphone at his lips, Malone tells the world you're responsible for the fire at St. Louis Cathedral. \n\t\t*if remorse > 40\n\t\t\tThe memory of the raging fire pops into your mind. That church was a historical monument….\n\t\t*if remorse \u003c= 40\n\t\t\tYou remember the church going up in flames. Oops. You shrug, holding up your ${weapon}.\n\t\t*goto weapon_down\n\t*elseif malones_snitch\n\t\t\n\t\t*goto weapon_down\n\t*else\n\t\tMalone holds up a megaphone and lets you know they want to have a conversation about dear old Silent Cop, found dead in the police parking lot.\n\t\t\n\t\tConversation. Heh.\n\t\t*goto weapon_down\n\t\t\n\t*label weapon_down\n\n\t*if two\n\t\tThinking your ${appendage} are weapons—well, they are—they yell out, \"Put down your weapons, ${name}!\"\n\t*if two = false\n\t\tThinking your ${appendage} is a weapon—well, it is—they yell out, \"Put down your weapon, ${name}!\"\n\t*choice\n\t\t*selectable_if (jumpin_the_gun > 40) #I take 'em out. It's brazen, but what the hell.\n\t\t\t*if take_it_to_the_mattresses > 75\n\t\t\t\t*label attack_cops\n\t\t\t\t*set jumpin_the_gun %+10\n\t\t\t\t*set respect %+20\n\t\t\t\t*set clips +20\n\t\t\t\t*set kill_no_more false\n\t\t\t\t*set heat %+50\n\t\t\t\tYou fix the coppers with a cold look. They sense something new about you—something new and terrifying. They stop dead in their tracks.\n\n\t\t\t\t*if (weapon = \"demonic appendage\") or (weapon = \"demonic appendages\")\n\t\t\t\t\tBlack sludge bursts from your ${weapon}, covering the sea of cops. They start to scream as it eats into their skin. \n\n\t\t\t\t\tThe sludge is acid.\n\t\t\t\t*if (weapon = \"voodoo appendage\") or ((weapon = \"nanotech appendage\") or ((weapon = \"voodoo appendages\") or ((weapon = \"nanotech appendages\"))))\n\t\t\t\t\tSkin and sharp bones fly from your ${weapon}, followed by an onslaught of spinning blades. Blood flows and coppers crumple, some reaching out blindly in supplication. \n\t\t\t\t*comment endif\n\n\t\t\t\tAnd that's when you attack.\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tYou leap on the cowering cops, ripping out hearts, tossing bodies into walls, snapping necks, and pulling off limbs—it's total mayhem. A couple of cops manage to get off shots, but you're too fast for them to hit. The bodies begin to pile up. \n\t\t\t\t*if foolish_attack\n\t\t\t\t\t*set wounds +1\n\t\t\t\t\tIn the chaos, one of them does manage to land a few blows to your chest with his billy club. At least one rib is broken, but that won't stop you. Your hand closes over his face, and you crush his skull.\n\t\t\t\t*comment endif\n\t\n\t\t\t\tThe surviving cops finally accept that you can't be beaten; they break and run. You stand in the street, your entire body soaked in fresh blood. But this time, it's not yours.\n\t\t\t\t*page_break\n\t\n\t\t\t\t*if deal_cop\n\t\t\t\t\t*set contracts -1\n\t\t\t\t\t*set deal_cop false\n\t\t\t\t\tThe deal you made with the cops has gone by the wayside, buried under a pile of corpses. With a shrug, you jump over the bodies and pound the streets towards [i]Girls Girls Girls[/i].\n\t\t\t\t\t*goto kick_ass\n\t\t\t\t*else\n\t\t\t\t\tWith a pile of uniformed corpses lying before you, you decide it's time to motor. You leap the hood of a car and run straight to the [i]Girls Girls Girls[/i] revue.\n\t\t\t\t\t*goto kick_ass\n\t\t\t*elseif take_it_to_the_mattresses >= 60\n\t\t\t\t*set foolish_attack true\n\t\t\t\t*goto attack_cops\n\t\t\t*else\n\t\t\t\t*label cops_open_fire\n\t\t\t\t*set heat %+50\n\t\t\t\t*set jumpin_the_gun %+10\n\t\t\t\t*set respect %+30\n\t\t\t\t*set wounds +3\n\t\t\t\t*if wounds >= 8\n\t\t\t\t\t*set clips +4\n\t\t\t\t\t*set kill_no_more false\n\t\t\t\t\t*set respect %+20\n\t\t\t\t\tYour ${weapon} lights up like a magic wand and you launch into attack mode. \n\t\t\t\t\t*if (weapon = \"demonic appendage\") or (weapon = \"demonic appendages\")\n\t\t\t\t\t\tBlack sludge bursts from your ${weapon}, covering the sea of cops. They start to scream as it eats into their skin. \n\n\t\t\t\t\t\tThe sludge is acid.\n\t\t\t\t\t*if (weapon = \"voodoo appendage\") or ((weapon = \"nanotech appendage\") or ((weapon = \"voodoo appendages\") or ((weapon = \"nanotech appendages\"))))\n\t\t\t\t\t\tBullets and skin fly from your ${weapon}, blinding some cops and blowing holes in others.\n\t\t\t\t\t*comment endif\n\t\t\t\t\t\n\t\t\t\t\tYou take out the coppers closest to you, but not before their screams prompt their partners to open fire on you. As a hail of bullets fly, you decide to use one of the cops you so recently bereft of life as a human shield. For a little while, the corpse absorbs the bullets aimed at you—for a little while, but not for long….\n\t\n\t\t\t\t\tA bullet hits your shoulder. Another shatters your hip, and you go down. A lucky shot hits your ${weapon}, which bursts into flame. You twist in agony as the fire consumes you and bullets continue to tear through you.\n\t\n\t\t\t\t\tBeing a ${dragon} ain't all it's cracked up to be.\n\t\t\t\t\t*page_break\n\t\t\t\t\tA brilliant white line consumes your vision as your consciousness fades. \n\t\n\t\t\t\t\tAnd then, your body explodes.\n\t\n\t\t\t\t\t*if (desire = 1) or (career_headcrusher)\n\t\t\t\t\t\tMaybe there's a managerial position open in Hell….\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene wrap_up\n\t\t\t\t\t*else\n\t\t\t\t\t\tMexico, here you come.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene wrap_up\n\t\t\t\t*else\n\t\t\t\t\t*set clips +6\n\t\t\t\t\t*set kill_no_more false\n\t\t\t\t\tYour ${weapon} lights up like a magic wand and you launch into attack mode. \n\t\t\t\t\t*if (weapon = \"demonic appendage\") or (weapon = \"demonic appendages\")\n\t\t\t\t\t\tBlack sludge bursts from your ${weapon}, covering the sea of cops. They start to scream as it eats into their skin.  \n\n\t\t\t\t\t\tThe sludge is acid. \n\t\t\t\t\t*if (weapon = \"voodoo appendage\") or ((weapon = \"nanotech appendage\") or ((weapon = \"voodoo appendages\") or ((weapon = \"nanotech appendages\"))))\n\t\t\t\t\t\tBullets and skin fly from your ${weapon}, blinding some cops and blowing holes in others.\n\t\t\t\t\t*comment endif\n\t\t\t\t\t\n\t\t\t\t\tDeciding that discretion is the better part of valor, you turn and run into the night, before they have a chance to regroup and respond to your assault.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto kick_ass\n\t\t*if deal_cop\n\t\t\t#We had a deal! I don't care if I look like a savage in a suit. Stay out of my way!\n\t\t\t\t*if heat >= 55\n\t\t\t\t\t*set deal_cop false\n\t\t\t\t\t*set contracts -1\n\t\t\t\t\tThe coppers laugh when you remind them of your agreement. They don't keep deals with scum like you.\n\n\t\t\t\t\tNo one ever said that the heat was fair. They're gonna bring you in, and the looks on some faces tell you they don't care if you're dead or alive when they do.\n\t\t\t\t\t*goto cops_open_fire\n\t\t\t\t*else\n\t\t\t\t\tThe coppers nod when you remind them of your agreement. A deal is a deal.\n\n\t\t\t\t\tThey're further interested when you remind them that this bust will really help them…and The Pitt will no longer be any trouble.\n\n\t\t\t\t\tThey get the fame. You get to wrap this night up with a perfect pink bow.\n\n\t\t\t\t\tThey lower their guns and agree. You give them a wink, and take off running. \n\t\t\t\t\t*goto coppers_follow\n\t\t*if (deal_cop = false)\n\t\t\t*selectable_if (paranoia \u003c 55) #I offer to join forces. A little bit of heat in the kitchen could be very effective.\n\t\t\t\t*if savvy > 65\n\t\t\t\t\t*set savvy %+10\n\t\t\t\t\t*set take_it_to_the_mattresses %-5\n\t\t\t\t\t*set jumpin_the_gun %-5\n\t\t\t\t\t*set respect %+5\n\t\t\t\t\tYou let them know that they better come with you if they want The Pitt.\n\t\t\n\t\t\t\t\tThe cops keep their guns on you while they decide what to do. A few of them shoot worried glances at you. You may be a ${dragon}, but ${dragon}s ain't pretty.\n\t\t\n\t\t\t\t\tThey finally agree, and put down their guns. You give them a wink and take off running. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*label coppers_follow\n\t\t\t\t\t*set cop_posse true\n\t\t\t\t\t*set gutterpunk_posse false\n\t\t\t\t\tThe coppers follow you on foot, forced to leave their cars in the street behind them.\n\t\t\t\t\t*goto kick_ass\n\t\t\t\t*else\n\t\t\t\t\tThey want you, and none of your sweet talkin' is going to convince them otherwise.\n\t\t\t\t\t*goto cops_open_fire\n\t\t#Let's have some fun. I let them chase me. \n\t\t\t*set respect %+10\n\t\t\t*set clips +5\n\t\t\t*set kill_no_more false\n\t\t\tYou give 'em a big ol' shit-eating grin, and take off towards the [i]Girls Girls Girls[/i] revue. The heat chases you, shouting at you to stop.\n\n\t\t\t*if (has_dominant_leg = false) or (has_weak_leg = false)\n\t\t\t\tYour new leg and your remaining alligator shoe carry you fast.\n\t\t\t*if (has_dominant_leg) and (has_weak_leg)\n\t\t\t\tYour alligator shoes carry you fast. \n\t\t\tYou head around the corner and up the block, turning sharply. The coppers can't possibly keep up, but they can feel the heat you give off as your feet smash through the bricks in the street. \n\t\t\t*if (gp_with = false) and (gutterpunk_posse)\n\t\t\t\t*gosub gutterpunks_join\n\t\t\t\t*page_break\n\t\t\t*goto kick_ass_2\n*else\n\t*gosub gutterpunks_join\n\t*page_break\n\t*goto kick_ass\n\n*label gutterpunks_join\n*if gutterpunk_posse\n\t*set gp_with true\n\tYou're only a few blocks from [i]Girls Girls Girls[/i]—a neon halo already surrounds the intervening buildings—when a familiar sound reaches your ears.\n\t\t\n\tGum smacks. Chains rattle. Switchblades flick in and out.  It's the gutterpunks.\n\t\n\tYou stop when their leader emerges from the shadows. \"We're with you. Until the end.\"\n\t\n\tIt's about time you had some backup.\n\t*return\n*else\n\t*return\n\n*label kick_ass\n*if wounds > 2\n\t*set wounds -2\nYour new ${appendage} \n*if two\n\twork\n*if two = false\n\tworks \nwith your body as you pound the streets towards the revue.\n*if (gp_with = false)\n\t*gosub gutterpunks_join\n*if gutterpunk_posse\n\tThe gutterpunks follow, their war cries sounding in your wake.  \n*if forest_demons\n\tMoving like a plague—silent and deadly—the forest demons follow you the last few blocks to the revue.\n*if cop_posse\n\tThe cops fall into line behind you. Like a pack of sharks, they smell blood in the air, and they mean to get fed tonight.\n*comment endif\n\n*label kick_ass_2\nBlood pumping, adrenaline rising…you rejoice in your new power. Your lost ${limbs} \n*if two\n\thave been remade into glorious devices that move better than you ever did. They anticipate your actions and improve upon your desires.\n\n\tNo one's going to fuck with you ever again—especially not with these two ${weapon} in place of your limbs.\n\t*set respect %+20\n*if two = false\n\thas been remade into a glorious device that moves better than you ever did. It anticipates your actions and improves upon your desires.\n\n\tNo one's going to fuck with you ever again—especially not with this ${weapon} in place of your limb. \n*comment endif\n\n*if desire = 1\n\tThis is for The Bull. With ${bull_his} blessing, you're about to take out the biggest threat to ${bull_his} dominance, and your own dominance once ${bull_he}'s gone. The Bull doesn't realize that tonight ${bull_he}'s signed ${bull_his} own death warrant. Once The Pitt is gone, nothing will stop you from taking NOLA for yourself.\n*if desire = 2\n\tThis is for all the innocent people you've hurt in the name of the mob. It's for every person who has single-handedly stood up for something that they believe in—taking down a toxic system to build something better in its place. \n\t\n\tBut, in the end, it's also for you.\n*if desire = 3\n\tThis is for Mexico. It's so close that you can taste it.\n*if desire = 4\n\tThis is for ${l_name}. But in the end, this is for you. \n*finish", "screenshots": "*script window.animateEnabled = false;\nscreenshots\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Joan\"\n*set male false\n*set savvy 71\n*set respect 39\n*set contracts 1\n*set clips 2\n*set take_it_to_the_mattresses 49\n*set jumpin_the_gun 63\n*set juice 7600\n*set l_him \"him\"\n*set l_name \"Luke\"\n*set bull_husband \"husband\"\n*set l_he \"hhe\"\n\nThe gutterpunk's blade puts a small cut in your forehead, barely missing your hat. That was a close one, and you'll have a nice little scar to complement all the others.\n\nYou look up at the crowd of them, fresh blood splattered on your suit.  There certainly does seem to be a lot of them.\n\t\n*fake_choice\n\t#Maybe I can talk them into letting me go. Hell, they might even help. Everyone hates The Pitt. \n\t#Keep fighting.  One thing The Bull taught me is to die with honor, unless I kill them first….\n\t#Give up and tell them to take you to their boss.\n\n\n*script changeBackgroundColor(\"black\")\n\n*set name \"Antonio\"\n*set male true\n*set savvy 41\n*set respect 65\n*set contracts 0\n*set clips 0\n*set take_it_to_the_mattresses 52\n*set jumpin_the_gun 38\n*set juice 12000\n*set l_him \"her\"\n*set l_name \"Elle\"\n*set bull_husband \"wife\"\n*set l_he \"she\"\n\nYou were covered in warm blood, having just finished a message job, when ${l_he}—literally—bumped into you outside your place. You couldn't let ${l_him} leave, now that there was blood on ${l_his} clothes; that would have been bad form. So you invited ${l_him} upstairs. Already aroused by your evening's handiwork, your resistance to ${l_his} advances was negligible.\n\t\t\t\nThat single, steamy night with ${l_name} changed your future forever; if nothing else, you're always aware that ${l_he} might use it to blackmail you. When you're alone, ${l_he} talks about running off to Mexico together…but the specter of The Bull and ${bull_his} legendary waves of anger terrify ${l_him}.\n\nDoes ${l_he} really care about you?\n\n*fake_choice\n\t#I know ${l_he} loves me.\n\t#$!{L_he}'s playing me for a fool, but I love ${l_him} all the same.\n\t#$!{l_he} hates The Bull, but I'm still not sure if ${l_he} cares about me.\n\n\n*script changeBackgroundColor(\"sepia\")\n\n\n*set name \"Godiva\"\n*set male false\n*set savvy 55\n*set respect 44\n*set contracts 2\n*set clips 6\n*set take_it_to_the_mattresses 52\n*set jumpin_the_gun 48\n*set juice 100\n*set l_him \"her\"\n*set l_name \"Elle\"\n*set bull_husband \"wife\"\n*set l_he \"she\"\n\nYour sawtooth poised and ready in your ${dominant} hand, you spin, slashing arms and stomachs, hitting faces with your elbows, and dodging attacks as redness spurts into the air. Your face and suit are soon covered with blood, most of it not yours. The gutterpunks in the front fall away, trampled by those behind them. \n\nYou're skilled and nimble, but they've still got you surrounded. They come at you from all sides, and you can't hope to block them all. As multiple blades cut and rip into your flesh, searing agony explodes throughout your body. \n\n*fake_choice\n\t#I ignore it, and keep fighting.\n\t#I run to the Mississippi River.\n\t#I play dead.\n\n*set name \"Jack\"\n*set male true\n*set savvy 44\n*set respect 59\n*set contracts 3\n*set clips 1\n*set take_it_to_the_mattresses 68\n*set jumpin_the_gun 63\n*set juice 4300\n*set l_him \"him\"\n*set l_name \"Alexander\"\n*set bull_husband \"husband\"\n*set l_he \"he\"\n\nAs you make it to the side street behind the Police precinct, Silent Cop drives up next to you and pitches a bag marked \"EVIDENCE\" at you through the open window. \n\n\"I need to talk to you—it's important,\" he says.\n\n*fake_choice\n\t#He did deliver the sawtooth—I hear him out.\n\t#Ugh. This guy will probably just suck me back into the drama. I'm not interested.\n\t#Hell no! I don't mix with moles.\n\t#He's got info on me, and besides, I don't want to miss a chance to kill a cop.", "startup": "*title NOLA Is Burning\n*author Claudia Starling\n*scene_list\n\tstartup\n\tphone_call\n\tinformants\n\tthe_dragon\n\tpinched\n\tbook_it\n\tbeaten_and_bruised\n\tprivate_show\n\tpaybacks_a_bitch\n\trebirth\n\tfull_throttle\n\ttempted\n\twrap_up\n\tending\n\n*comment $s from bookit to tempted\n\n*create respect 50\n*create savvy 50\n*create contracts 0\n*create paranoia 50\n*create take_it_to_the_mattresses 50\n*create jumpin_the_gun 50\n*create remorse 50\n*create reveal_remorse false\n*create clips 0\n*create juice 100\n*create heat 50\n*create wounds 0\n*create voodoo_necklace false\n*create dragon_assistance false\n*create cat_help false\n*create gutterpunk_posse false\n*create cop_posse false\n*create spurs false\n*create fear_limb false\n*create fear_drowning false\n*create fear_spider false\n*create lulu_doublecross false\n*create velvet_bag false\n*create deal_cop false\n*create deal_lulu false\n*create deal_performers false\n*create deal_cabbie false\n*create deal_devil false\n*create deal_bull 0\n*create career_headcrusher false\n*create career_archaelogy false\n*create career_writer false\n*create career_pirate false\n*create career_dogwalking false\n*create career_fashion false\n*create career_retire false\n*create dreams \"empty\"\n*create canal_bottle \"empty\"\n*create appendage \"\"\n*create two false\n*create red_birds false\n*create weapon \"empty\"\n*create has_dominant_hand true\n*create has_weak_hand true\n*create has_dominant_arm true\n*create has_weak_arm true\n*create has_dominant_leg true\n*create has_weak_leg true\n*comment Dan removed duplicate *create pitts_crime\n*comment *create pitts_crime \"empty\"\n*create kill_cop false\n*create ezma_deal false\n*create forest_demons false\n*create confessor_deal false\n*create pocketbook_bible false\n*create security_missing false\n*create rosary false\n*create letter_l false\n*create dominant \"right\"\n*create weak \"left\"\n*create male true\n*create surname \"Doe\"\n*create mr \"Mr.\"\n*create name \"J\"\n*create businessman \"businessman\"\n*create dude \"dude\"\n*create man \"man\"\n*create mahn \"mahn\"\n*create men \"men\"\n*create son \"son\"\n*create king \"king\"\n*create spiderman \"Spiderman\"\n*create cowboy \"cowboy\"\n*create superman \"Superman\"\n*create brother \"brother\"\n*create boy \"boy\"\n*create he \"he\"\n*create his \"his\"\n*create him \"him\"\n*create big_pappa \"big poppa\"\n*create bull_husband \"husband\"\n*create bull_male true\n*create bull_he \"he\"\n*create bull_him \"him\"\n*create bull_his \"his\"\n*create bull_man \"man\"\n*create l_wife \"wife\"\n*create l_name \"l\"\n*create l_female true\n*create l_attracted_male true\n*create l_he \"she\"\n*create l_him \"her\"\n*create l_his \"her\"\n*create l_hers \"her\"\n*create ls_affection 1\n*create molecopsfamily false\n*create pitts_crime \"none\"\n*create pitts_crime_desc \"empty\"\n*create lulu_alive true\n*create sawtooth true\n*create identity_revealed false\n*create desire 0\n*create desire_text \"empty\"\n*create desire_text_1st \"empty\"\n*create desire_text_presprog \"empty\"\n*create malones_snitch false\n*create dragon \"dragon\"\n*create bottle \"bottle\"\n*create gutting_fish false\n*create limbs \"limbs\"\n*create soulbrick false\n*create purgatory false\n*create kill_no_more true\n*create atheist false\n*create l_alive true\n*create bull_alive true\n*create pitt_alive true\n\n*achievement atease visible 10 At Ease\n\tPut the family of the Silent Cop at ease.\n\tYou put the family of the Silent Cop at ease.\n*achievement betrayal visible 50 Betrayal\n\tBe betrayed by the one you love.\n\tYou were betrayed by the one you love.\n*achievement brick visible 10 Another brick in the wall...\n\tBe consigned to spend eternity as a brick.\n\tYou were consigned to spend eternity as a brick.\n*achievement burnitall hidden 25 Burn It All\n\thidden\n\tYou set fire to St. Louis Cathedral.\n*achievement cheval visible 50 Cheval\n\tBecome an avatar for the loa.\n\tYou became an avatar for the loa.\n*achievement crusader visible 50 Crusader\n\tBecome a crusader.\n\tYou became a crusader.\n*achievement cyborg visible 50 Cyborg\n\tBecome a cyber-warrior.\n\tYou became a cyber-warrior.\n*achievement demon visible 50 Demon\n\tBecome an agent of Hell.\n\tYou became an agent of Hell.\n*achievement dragon visible 50 Dragon\n\tBecome a dragon.\n\tYou became a dragon.\n*achievement dumpsterdiving visible 25 Dumpster Diving\n\tDie an early death.\n\tYou died in the dumpster.\n*achievement heimlich visible 10 Heimlich\n\tSave Sandwich Man.\n\tYou saved Sandwich Man.\n*achievement lastonestanding visible 10 Last One Standing\n\tSee to it that The Bull, The Pitt, and your love are all dead.\n\tThe Bull, The Pitt, and your love are all dead.\n*achievement mexico visible 75 Mexico\n\tMake it to Mexico in one piece.\n\tYou made it to Mexico in one piece.\n*achievement middlemanagement visible 50 Middle Management\n\tEarn a place in Hell's bureaucracy.\n\tYou earned a place in Hell's bureaucracy.\n*achievement newboss visible 75 New Boss\n\tBecome the new boss of NOLA.\n\tYou became the new boss of NOLA.\n*achievement poweroverwhelming visible 50 Power Overwhelming\n\tBecome powered by hellfire.\n\tYou are powered by hellfire.\n*achievement purgatory hidden 75 Purgatory\n\thidden\n\tYou escaped the Devil's clutches and found solace in Purgatory.\n*achievement redbirds visible 10 Redbirds\n\tBe saved by the Father Confessor's redbirds.\n\tYou were saved by the Father Confessor's redbirds.\n*achievement released visible 25 Released\n\tHave The Bull release you and your love.\n\tThe Bull released you and your love.\n*achievement retirementhome visible 10 Retirement Home\n\tStart a retirement home for repentant mafiosi.\n\tYou started a retirement home for repentant mafiosi.\n*achievement savedbyl visible 25 Saved by L\n\tBe saved by your lover.\n\tYou were saved by your lover.\n*achievement savedbythegoodbook visible 25 Saved by the Good Book\n\tBe saved by the Good Book.\n\tYou were saved by the Father Confessor's pocketbook Bible.\n*achievement soclose visible 25 So Close...\n\tDie at the hands of the cops as you flee NOLA.\n\tYou died at the hands of the cops as you fled NOLA.\n*achievement two visible 50 Two\n\tSurvive the night despite losing two limbs.\n\tYou survived the night despite losing two limbs.\n*achievement dealmaker visible 10 Wheeler and Dealer\n\tMake eight deals over the course of the night.\n\tYou made eight deals over the course of the night!\n*achievement forestdemons visible 25 Forest Demons\n\tYou recruited a band of forest demons to your side.\n\tRecruit a band of forest demons to your side.\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tYour boss, The Bull, the most dangerous gangster in New Orleans, has a job for you. Rescue your kidnapped lover--officially The Bull’s lover, but unofficially yours--before dawn. Slaughter everyone who stands in your way, including other gangsters, cops, and the Triad, as you slink across the underbelly of New Orleans.\n\n\t[i]NOLA Is Burning[/i] is a blood-soaked interactive noir thriller where your choices control the story. The game is entirely text-based--without graphics or sound effects--and powered by the vast, unstoppable power of your imagination.\n\n\tWill you outwit your enemies or take it to the mattresses with your trusty sawtooth? Will you earn respect as NOLA’s most infamous headcrusher, or will you retire to Mexico on a huge pile of cash? To be honest, you'll probably die. But in NOLA, death is just the beginning.\n\n\t*if choice_is_steam\n\t\t[i]You can play the first four chapters of the game for free. Purchase the rest of the game below.[/i]\n\t\t*if choice_is_advertising_supported\n\t\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n\t\t*if choice_is_advertising_supported\n\t\t\t*page_break_advertisement\n\t\t*if not(choice_is_advertising_supported)\n\t\t\t*page_break Play Now for Free\n\n\t\t*goto purchased\n\t*else\n\t\t*if choice_is_advertising_supported\n\t\t\t[i]NOLA is Burning[/i] is supported by advertisements, but you can buy the unlimited version to turn off ads forever.\n\n\t\t\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n\t\t\t*page_break_advertisement\n\n\t\t\t*goto purchased\n\t\t*else\n\t\t\t[i]You can play the game for free, with 2 hour breaks between chapters, or you can buy the game now for unlimited play without breaks.[/i]\n\n\t\t\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n\t\t\t*page_break Play Now for Free\n\n*label purchased\n\n\n", "tempted": "*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]NOLA is Burning[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n*comment ñáéç\n*temp with_l false\n*temp gator_girls \"empty\"\n*temp flamethrower true\n*temp l_adverse false\n*temp alligator_shoes \"alligator_shoes\"\n*temp fires \"fires\"\n*temp dragon_business false\n*temp leaving_nola false\n*temp el_dorado false\n*temp retirement_home false\n*temp pitts_money true\n*temp you \"you\"\n*if two\n\t*set fires \"fire\"\n*if (has_dominant_leg = false) or (has_weak_leg = false)\n\t*set alligator_shoes \"remaining alligator shoe\"\n*if (weapon = \"ossein gun\") or (weapon = \"divine cross\")\n\t*set flamethrower false\n[b]Chapter Eleven: Tempted[/b]\n\nAs you carry The Pitt through the hallways, screams echo all around you. The Pitt continues to squirm and kick his feet in frustration. As the clock closes in on 6AM, you put him down and force him to lead you up the stairwell to the mysterious tower.\n\nHe walks backwards up the stairs, his junk flopping back and forth between his meaty thighs. He holds his hands up in a defensive gesture and apologizes for everything as he goes. He explains that he \"just wants people to like him…,\" blah blah blah. It must be hard walking backwards up old rickety stairs like that; he keeps stumbling, but he won't take his eyes off of you.\n\n*choice\n\t#Wow. I legitimately feel sorry for the guy.\n\t\t*set remorse %+20\n\t\t*goto top_of_stairs\n\t#I love it! Let him crawl like the little piggy he is!\n\t\t*set remorse %-10\n\t\t*goto top_of_stairs\n\t#He deserves to die. He tried to kill me, started a mafia war, and kidnapped my one true love.\n\t\t*set remorse %-10\n\t\t*goto top_of_stairs\n\t*if (desire = 4) #All I care about right now is getting ${l_name} in my arms.\n\t\t*goto top_of_stairs\n\n*label top_of_stairs\nAt the top of the stairs, you push the key into the lock and turn it to the right. The heavy, oval, Spanish door creaks open. \n\n\"${name}, is that you?\" It's ${l_name}'s voice. $!{l_he} sounds far-off, and there's a note of suppressed panic in ${l_his} voice….\n*page_break\n\nYou step into the room, and by the neon light of the [i]Girls Girls Girls[/i] sign outside, you see hundreds of protein crystals in a matrix of amino acids covering the tower.\n\nIn other words, it's an entire room full of complex spider webs.  \n\nGiant, sinister-looking spiders hang off the large, condensed webs, their little feet clicking on the floors, walls, and ceiling like metal. \n*if fear_spider\n\tSpiders are certainly not your forté, and there are hundreds of them between you and ${l_name}. How did The Pitt know? He must have read your journal or overheard a conversation you had. He's been saving this for you. \n*comment endif\n\nYou can see ${l_name} on the other side. $!{l_he}'s tied up in front of the window. \"Don't come any closer $!{name}; these aren't normal spiders!\"\n\nThe Pitt gives you an evil smile, but the effect is somewhat undermined by the combination of his rotting teeth and the blue bonnet on his head. His nudity doesn't help matters, either. \n\nHe explains that these are robotic spiders designed in Africa to consume poisonous insects, small rodents, and even corpses! With an attempt at a villainous laugh that sounds more like a high-pitched squeal, he tells you that he \"special ordered them off eBay.\"\n\nTime is ticking, and you need to get to ${l_name}.\n\n*choice\n\t#I send The Pitt in as the guinea pig. \n\t\t*set savvy %+5\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*set jumpin_the_gun %-5\n\t\tHell, he's vile enough.\n\n\t\tWith no time to waste, you push The Pitt into the complicated maze of webs. The spiders immediately descend on him like aliens falling from the sky. He flails around the room as the spiders cover him, creating a path to $!{l_name} on the other side. $!{l_he}'s blindfolded and bound at the wrists, arms stretched overhead by a heavy rope hanging from the ceiling.\n\n\t\tThe Pitt's shrill screams grow louder as the spiders begin consuming his flesh with a sickening slurping sound. You step past them carefully as they drag their meal into a far corner to dine in privacy. \n\t\t*page_break\n\t\t*goto L\n\t*if (flamethrower) #I burn the suckers. What the hell, I've got a flamethrower now.\n\t\t*set jumpin_the_gun %+10\n\t\t*if (weapon = \"demonic appendage\") or (weapon = \"demonic appendages\")\n\t\t\t*set clips +1\n\t\t\t*set kill_no_more false\n\t\t\t*set respect %+10\n\t\t\t*if two\n\t\t\t\t*if has_dominant_arm\n\t\t\t\t\tLifting your demonic ${weak} arm,\n\t\t\t\t*if has_weak_arm\n\t\t\t\t\tLifting your demonic ${dominant} arm,\n\t\t\t*if two = false\n\t\t\t\tLifting your demonic ${appendage}, \n\t\t\tyou spew hellfire into the spider webs. At first, it seems to have no effect, but soon the metal threads begin to melt and the mechanical spiders let out little squeals as they curl up and pop.\n\t\t\t\n\t\t\tThe Pitt screams in anger. Without you intending it, the flames, like a serpent, coil and strike at The Pitt. His howls die into gurgles as his face melts and his eyeballs burst under the intensity of the hellfire.\n\t\t\t\n\t\t\tAnd that is the end of The Pitt. Maybe someone should have warned him to keep his eyes shut?\n\t\t\t\n\t\t\tLooking up, you see that the path to ${l_name} has been cleared. $!{l_he}'s blindfolded and bound at the wrists, arms stretched overhead by a heavy rope hanging from the ceiling.\n\t\t\t*goto L\n\t\t*elseif (weapon = \"voodoo appendage\") or (weapon = \"voodoo appendages\")\n\t\t\t*set clips +1\n\t\t\t*set kill_no_more false\n\t\t\t*set respect %+10\n\t\t\t*if two\n\t\t\t\t*if has_dominant_arm\n\t\t\t\t\tLifting your voodoo-powered ${weak} arm,\n\t\t\t\t*if has_weak_arm\n\t\t\t\t\tLifting your voodoo-powered ${dominant} arm,\n\t\t\t*if two = false\n\t\t\t\tLifting your voodoo-powered ${appendage}, \n\t\t\tyou release a strange blue flame into the spider webs. At first, it seems to have no effect, but soon the metal threads begin to melt and the mechanical spiders let out little squeals as they curl up and pop.\n\t\t\t\n\t\t\tThe Pitt screams in anger. As if it heard him, the strange blue flame begins to undulate and coalesce, finally taking a human form—that is, if a roaring blue flame can be called human.  \n\n\t\t\tThe Pitt's eyes go wide at the sight, and he turns to run, his exposed junk flapping against the fat of his legs.  Before he can get anywhere, however, the fire-being leaps forward and catches him in an embrace. The Pitt's flesh melts under the heat of the fiery limbs, but the creature doesn't let go until The Pitt is only a charred husk.\n\t\t\t\n\t\t\tAnd that is the end of The Pitt.\n\t\t\t\n\t\t\tLooking up, you see that the path to ${l_name} has been cleared. $!{l_he}'s blindfolded and bound at the wrists, arms stretched overhead by a heavy rope hanging from the ceiling.\n\t\t\t*goto L\n\t\t*else\n\t\t\tTurning on your flamethrower, you spray a gout of fire into the webs. It does nothing—no melting, no burning, no sizzling. Nothing.\n\t\n\t\t\tThese spiders are invincible.\n\t\t\t*page_break\n\t\n\t\t\tThe Pitt claps and giggles to himself. He's obviously very proud of his eBay purchase. He's so proud that he starts to caper in place, a grotesque little dance of glee. Then, he accidentally trips….\n\t\n\t\t\tScreaming in sudden terror, The Pitt falls right into the maze of high-tech webs, shredding them as he falls. Enraged spiders engulf him, covering him in poisonous bites. The Pitt convulses as bloody foam bursts from his mouth, his feet beating a rapid tattoo on the floor. Finally, his spasms slow and the spiders retreat, giving you a clear look at the little weasel's blackened, swollen, filth-encrusted face.\n\t\n\t\t\tAnd that is the end of The Pitt.\n\t\n\t\t\tLooking up, you see that the path to ${l_name} has been cleared. $!{l_he}'s blindfolded and bound at the wrists, arms stretched overhead by a heavy rope hanging from the ceiling.\n\t\t\t*goto L\n\t*if (sawtooth) #I cut the webs with my recently reclaimed sawtooth. After all, that's what it's for.\n\t\t*set savvy %-10\n\t\t*set take_it_to_the_mattresses %+10\n\t\t*set jumpin_the_gun %+10\n\t\t*set clips +1\n\t\t*set kill_no_more false\n\t\tYou swing the sawtooth and cut the webs with no effort. A mass of spiders hit the ground hard, and they get angry.\n\n\t\tLightning quick, they scuttle toward you and The Pitt, out for vengeance. When the reach your ${alligator_shoes}, you start swinging the sawtooth wildly. It doesn't do much to the spiders, but you do take The Pitt's head off with a single stroke. As the body collapses, blood splatters against the wall and floor.\n\n\t\tThe spiders go wild, jumping on The Pitt.\n\t\t*page_break\n\n\t\tAs they devour his body, you step past, cutting through the webs.\n\t\t*goto L\n\t*selectable_if (fear_spider = false) #Fuck it. I'm a ${dragon}! I just walk through!\n\t\t*set savvy %+10\n\t\t*set take_it_to_the_mattresses %+10\n\t\t*set jumpin_the_gun %+10\n\t\tTaking a deep breath, you take a single careful step into the spiders' lair. The spiders slide down their perfect little threads to inspect you, their metal chelicerae dripping with lethal poison. They swarm around but do not molest you as you pick your way carefully through their complex web system.\n\n\t\tThe Pitt is amazed—and infuriated.\n\n\t\t\"Attack ${him}!\" he screams.  \n\t\t\n\t\tThe neon lights glow brighter as the spiders grant you passage through their network. ${l_name} stands in front of the dirty window pane, blindfolded and bound at the wrists with arms stretched overhead by a heavy rope hanging from the ceiling. As you pass the last of the silver threads, The Pitt charges in after you, angry.\n\n\t\tThe spiders attack.\n\t\t*page_break\n\n\t\tThe spiders flow over his body and into his screaming mouth—biting, injecting, consuming. He convulses madly within the webs as hundreds of spiders, his spiders, overwhelm him.\n\n\t\tThe mad prince is undone by his own malice. The spiders drag his body into the corner and begin consuming his tissue with a sickening slurping sound. \n\n\t\tThe Pitt is no more.\n\t\t*page_break\n\t\t*goto L\n\t*if (remorse > 55) #There must be another way through!\n\t\t*set remorse %+10\n\t\t*set savvy %+10\n\t\tThe Pitt cackles at your indecision, mistaking it for fear. Looking around the room, you locate a fire extinguisher. You grab it, yank out the pin, and begin spraying the spiders.\n\n\t\tSomehow, the flameretardant foam interferes with their microscopic gizmos, and they begin to curl up on themselves. The Pitt screams in fury and rushes towards you, trying to wrest the extiguisher from your hands. You tussel, and in the exchange, he loses his footing and falls into what remains of the spiderwebs.\n\n\t\tThe few spiders that remain fall on The Pitt, devouring his soft tissue in their clicking mandibles. You spray them with the last of the foam, but it's too late—The Pitt is dead.\n\t\t*page_break\n\t\t*goto L\n\n*label L\n*set pitt_alive false\nYou pull down ${l_name}'s blindfold, revealing those deep green eyes as, beyond the dirty window, the sun rises over NOLA. $!{l_he} notices your ripped and bloodied clothes, then the bruises and scratches, and finally your recently-acquired ${weapon}. Taking it all in, ${l_he} shakes ${l_his} head and declares that the mob has nearly destroyed you—destroyed you both.\n\nTears fall from ${l_his} eyes as you cut ${l_him} down. $!{l_he} falls right into your arms, holding you. ${l_name} has never embraced you in this way before. \n\n\"I know you went through so much to find me. Thank you…\"\n\n*choice\n\t*selectable_if (paranoia \u003c 55) #I've been waiting for this. It's completely reassuring.\n\t\t*goto l_choice\n\t#It's nice, but I'm not relaxing yet. I still don't know who's playin' who.\n\t\t*set paranoia %+10\n\t\t*goto l_choice\n\t#This isn't the end. I don't have time to waste right now.\n\t\t*goto l_choice\n\n*label l_choice\n*if letter_l = true\n\tYou produce the note that $!{l_name} had given to Father Confessor. $!{l_he} smiles sadly, looking again at your shredded clothes and ${weapon}. $!{l_he} tells you ${l_he} knew something bad was going to happen when The Pitt asked ${l_him} to come to the revue—offering a cockamamie story about wanting to patch things up with The Bull.\n*comment endif\n\n\"Let's go. Let's go to Mexico,\" ${l_name} says determinedly. \n*if desire = 1\n\tMexico. That's a sweet thought. Too bad that's not what you're after anymore.\n*if desire = 2\n\tMexico. If only that were enough to soothe your troubled soul.\n*if desire = 4\n\tWherever ${l_name} wants to go, you will be by ${l_his} side.  Nothing can separate you now.\n$!{l_he} yanks ${l_his} wrists out of the leftover rope.\n\nA floorboard creaks across the room, and you both look up. There stands The Bull in all ${bull_his} massive glory, a thick cigar hanging from ${bull_his} mouth. $!{bull_he} looks down at what's left of ${bull_his} dead step-brother as the spiders continue their grisly feast. The Bull shakes ${bull_his} head.\n\n\"I knew the little weasel would dig his own grave one day. I didn't think he'd do it Bond-villain style, though.\"\n\n${l_name} moves closer to you, as if bracing ${l_him}self against the blows that may come. The Bull looks up, puffing on ${bull_his} cigar, and gives you a big smile. $!{bull_he} begins to clap, congratulating you as if you'd just passed a math exam. $!{bull_he} notices your modified ${appendage} and steps towards you and ${l_name}, arms out.\n\nIt's your move, headcrusher.\n*page_break\n\nThis is the big moment. This entire night—all the torture, the insanity, the heat, the deals, the money, the mobs—was all to bring you here. Search inside your heart and discover what you truly want. Is it ${l_name}, who was the reason you took this mission? Or was ${l_he} just the catalyst? Do you really love ${l_him}, or is ${l_he} simply a symbol of the freedom that could be yours if you left the mob?\n\nMaking the wrong choice here could cost you everything. It could ruin you. Make your choice, headcrusher, before someone does it for you.\n\n*choice\n\t#I try to kill The Bull. $!{bull_he} stands between me and what I truly desire.\n\t\t*set savvy %-20\n\t\t*set take_it_to_the_mattresses %+20\n\t\t*set jumpin_the_gun %+15\n\t\t*set respect %-30\n\t\t*label kill_bull\n\t\tAs you step forward, The Bull knows immediately what your intentions are. Without even a thought, your ${weapon} ${fires} up for protection. The Bull smiles as ${l_name} suddenly wraps ${l_his} former restraints around your neck, forcing you to pause.\n\t\t\n\t\tThe Bull frowns. \"It's a real shame it had to turn out this way.\"\n\t\t\n\t\t$!{bull_he} adds that you coulda made it out with all the goods if you hadn't decide to kill the person who took you in, the only one who gave you a chance. \n\t\t\n\t\tBut what about ${l_name}?\n\t\t*page_break\n\t\t\n\t\t*if ls_affection = 1\n\t\t\t*achieve betrayal\n\t\t\t${l_name} never loved you. $!{l_he}'s committed to The Bull, one hundred and fifty percent.\n\t\t\n\t\t\tIt was all a plan to see where your loyalty is, before The Bull turns the entire operation over to you.\n\t\t\n\t\t\tBut that ain't gonna happen now, is it?\n\t\t\t*page_break\n\t\t\n\t\t\t${l_name} places a gun to the back of your head and blows you away. Your body seems to waver for a second before you collapse, landing face first on the floor. So much wasted potential. And you were so close to freedom, to getting everything you ever wanted.\n\t\t\n\t\t\tBetter luck next time, headcrusher.\n\t\t\t*goto ending\n\t\t*elseif ls_affection = 2\n\t\t\t$!{l_name} is a professional mole. $!{l_he}'s not even ${bull_his} ${l_wife}, and ${l_he} doesn't feel a single, tiny, little thing for you.\n\t\t\n\t\t\tThis whole night was to test your respect to the mob, to the order, and most of all, to The Bull.\n\t\t\n\t\t\tAnd you blew it.\n\t\t\t*goto pocketbook_bible\n\t\t*else\n\t\t\tA bullet flies through the window, aimed right for your skull, but ${l_name} shoves you out of the way. The bullet goes right through ${l_his} shoulder and hits The Bull square in ${bull_his} forehead. \n\t\t\t*label saved_by_l\n\t\t\t*page_break\n\t\t\t*achieve savedbyl\n\t\t\t*set with_l true\n\t\t\t*set bull_alive false\n\t\t\t*set you \"the two of you\"\n\t\t\n\t\t\tThe Bull falls, ${bull_his} massive frame hitting the creaking floorboards. The spiders scuttle over to the fresh corpse and drag it away to join ${bull_his} step-brother.\n\t\t\n\t\t\t${l_name} told the truth all along. $!{l_he} rushes to your arms, and you embrace ${l_him}, kissing ${l_him} deeply.\n\t\t\t*if deal_devil\n\t\t\t\t*goto devil_end\n\t\t\t*gosub pitts_head\n\t\t\t*if molecopsfamily = false\n\t\t\t\t$!{l_he} grabs your hand, and the two of you head down to The Pitt's office.\n\t\t\t*comment endif\n\t\t\n\t\t\t*gosub pitts_money\n\t\t\t*page_break\n\t\t\t*if deal_cop\n\t\t\t\t*set heat %-20\n\t\t\t\tNow that The Pitt and The Bull are dead, Malone considers your deal with the coppers fulfilled. He lets you walk away squeaky clean from the carnage inside the revue. \n\t\t\n\t\t\t\tThe next day, Malone's picture is all over the newspapers as he stands in front of [i]Girls Girls Girls[/i], hands on his hips, delivering a speech about cleaning up this dirty city.\n\t\t\n\t\t\t\tHeh. If they only knew.\n\t\t\t*comment endif\n\t\t\n\t\t\t*gosub dragon_and_mole\n\t\t\t*if desire = 1\n\t\t\t\t*goto replace_bull_ending_2\n\t\t\t*elseif career_headcrusher and (desire != 3)\n\t\t\t\tIt takes some doing, but you finally convince ${l_name} that there's no more need to flee to Mexico. The Bull and The Pitt are dead, and what other life is there for you but headcrushing?\n\t\t\t\t\n\t\t\t\tFinally, ${l_he} relents. NOLA will be yours to rule—together.\n\t\t\t\t*goto replace_bull_ending_3\n\t\t\t*else\n\t\t\t\t*set juice +100000\n\t\t\t\t${l_name} drains ${l_his} private bank account, doubling your get-away money.\n\t\t\t\t\n\t\t\t\tWhile you wait in the El Dorado, you think about your destination. You're off to Mexico with ${l_name}, scot-free. No more mobs. No more headcrushing. And no more losing limbs. You're destined for a new life, complete with a beautiful beach, sand between your toes, and the love of your life right by your side. \n\t\t\t\t\n\t\t\t\t$!{l_he} hops into the car, and the two of you head to the interstate.\n\t\t\t\t*goto cop_fury\n\t*selectable_if (jumpin_the_gun > 40) #I tell The Bull the truth. Maybe the old saying is right and \"the truth shall set you free.\"\n\t\t*set savvy %+20\n\t\t*set take_it_to_the_mattresses %-20\n\t\t*set jumpin_the_gun %-15\n\t\t*set respect %+20\n\t\tStanding between the married couple, you hold up your hands, and tell them you've got something to confess. $!{l_name}'s mouth drops open and ${l_he} shakes ${l_his} head in fear. Every fiber of ${l_his} being screams out for you not to say it.\n\n\t\t*choice\n\t\t\t#I say it. \n\t\t\t\t*set savvy %+15\n\t\t\t\t*set jumpin_the_gun %+10\n\t\t\t\t*set respect %+20\n\t\t\t\t*goto say_it\n\t\t\t#If I kill The Bull, I don't have to say anything.\n\t\t\t\t*set savvy %-20\n\t\t\t\t*set take_it_to_the_mattresses %+20\n\t\t\t\t*set jumpin_the_gun %+15\n\t\t\t\t*set respect %-30\n\t\t\t\t*goto kill_bull\n\t\t\t*selectable_if (jumpin_the_gun \u003c 60) #On second thought, I should let the boss make the first move….\n\t\t\t\t*set savvy %+15\n\t\t\t\t*set take_it_to_the_mattresses %-25\n\t\t\t\t*set jumpin_the_gun %-20\n\t\t\t\t*set respect %-15\n\t\t\t\t*goto arms\n\t\t\t*if (desire = 3) #I can't take the drama. I'm gonna walk away and let them duke it out.\n\t\t\t\t*set savvy %+15\n\t\t\t\t*set take_it_to_the_mattresses %-25\n\t\t\t\t*set jumpin_the_gun %-20\n\t\t\t\t*set respect %+15\n\t\t\t\t*set juice +800000\n\t\t\t\t*label walk_away\n\t\t\t\tWith a simple tip of your hat, you pass ${l_name} over to The Bull and wish them the very, very best. You thank ${bull_him} graciously for everything ${bull_he}'s done for you, and tell ${bull_him} that you'll take your payment from the bathtub full of dirty money downstairs, so you can get outta their hair.\n\t\t\t\t\n\t\t\t\t${l_name} is shocked. Completely dumbfounded.\n\t\t\t\t\n\t\t\t\tThe Bull tries to convince you to stay. You are ${bull_his} best headcrusher and ${bull_his} only ${son}. You deserve immediate promotion for returning ${l_name}. You deserve to run this mob someday.\n\t\t\t\t\n\t\t\t\tAnd it's always on the table.\n\t\t\t\t*if deal_devil\n\t\t\t\t\t*goto devil_end\n\t\t\t\t*gosub deal_bull\n\t\t\t\t*page_break\n\t\t\t\t*gosub pitts_head\n\t\t\t\tYou bid them adieu and walk past the unrecognizable corpse of The Pitt, down the winding staircase you fought so hard to conquer, through the empty hallways, and into The Pitt's office. \n\t\t\t\t\n\t\t\t\t*gosub pitts_money\n\t\t\t\t*page_break\n\t\t\t\t*if cop_posse\n\t\t\t\t\t*set heat %-20\n\t\t\t\t\t*set malones_snitch false\n\t\t\t\t\tNow that The Pitt is dead, Malone considers your deal with the coppers fulfilled. He lets you walk away squeaky clean from the carnage inside the revue. \n\t\t\t\t\n\t\t\t\t\tThe next day, Malone's photo is all over the newspapers as he stands in front of [i]Girls Girls Girls[/i], hands on his hips, delivering a speech about cleaning up this dirty city.\n\t\t\t\t\n\t\t\t\t\tHeh. If they only knew.\n\t\t\t\t*comment endif\n\t\t\t\t\n\t\t\t\t*set leaving_nola true\n\t\t\t\t*gosub dragon_and_mole\n\t\t\t\t\n\t\t\t\tOn your way out of town, you run into the Gator Girls and Auntie Ezma on Frenchman's Street. \n\t\t\t\t*if (weapon = \"ossein gun\") or (weapon = \"ossein guns\")\n\t\t\t\t\tEzma shows the Gator Girls your voodoo-fueled bone ${limbs}, her glass eye rolling in pride. The Gator Girls are suitably impressed.\n\t\t\t\t*comment endif\n\t\t\t\t\n\t\t\t\t*if with_l\n\t\t\t\t\t${l_name} makes sure to graciously thank them for their help in your misadventures. The three of them wave goodbye, and the two of you motor off into the sunrise.\n\t\t\t\t\t*goto cop_fury\n\t\t\t\t*else\n\t\t\t\t\tExcitement lights up in their eyes when you tell them about where you are headed. Maybe you should invite them along?\n\t\t\t\t\t\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#The Gator Girls and Auntie Ezma in Mexico? Yes!\n\t\t\t\t\t\t\t*set gator_girls \"with\"\n\t\t\t\t\t\t\tThey jump in the El Dorado with you and coast towards Mexico.\n\t\t\t\t\t\t\t*goto cop_fury\n\t\t\t\t\t\t#I'll invite 'em to visit when I'm set up like a ${king}.\n\t\t\t\t\t\t\t*set gator_girls \"visit\"\n\t\t\t\t\t\t\tThey each give you a big hug and tell you to take care. You spin your wheels on the pavement and then motor, heading for Mexico with your newly found freedom.\n\t\t\t\t\t\t\t*goto cop_fury\n\t\t\t\t\t\t#For once, I need a little me time. \n\t\t\t\t\t\t\t*set savvy %+10\n\t\t\t\t\t\t\t*set jumpin_the_gun %-10\n\t\t\t\t\t\t\tAuntie Ezma and the Gator Girls agree that you need a break, preferably with a little umbrella in a stiff drink and a beautiful beach. Bidding them adieu, you head to Mexico, every mile shedding years of pressure from your shoulders.  \n\t\t\t\t\t\t\t*goto cop_fury\n\t*selectable_if (jumpin_the_gun \u003c 65) #I'm keepin' my trap shut. Freedom is so close, I can almost taste it.\n\t\t*set savvy %+10\n\t\t*label arms\n\t\t\n\t\tGood thinkin'. A smart ${man} knows that the right time to divulge acts of passion with the boss's ${l_wife} is three days after never. \n\t\t*if desire = 1\n\t\t\tThis could even lead to you ruling over NOLA—sooner than later.\n\t\t*if desire = 2\n\t\t\tThe Bull won't like the fact you've gone soft…so you'd better keep your game face on for now.\n\t\t*if desire = 3\n\t\t\tIf you let them battle it out, you can see the kinds of cards The Bull and ${l_name} play.\n\t\t*if desire = 4\n\t\t\tNo matter how much you want to proclaim your love, you know you have to let ${l_name} take the lead on this one.\n\t\t*page_break\n\t\tThe Bull throws ${bull_his} arms around you, giving you a massive bear hug. And ${l_name} says nothing. Nothing at all.\n\t\t*if desire = 4\n\n\t\t\tYour heart breaks as ${l_name} retreats, unwilling to spill the goods—even after this night of hell that you've been through to save ${l_him}.\n\t\t*comment endif\n\n\t\tThe Bull reveals ${bull_he} wants to retire and get a small cabin in the Rockies with ${l_name}, hunting elk and wearing furs. ${l_name} nods sheepishly, already aware of this plan.\n\n\t\tThe offer is on the table—the family is yours if you want it, along with the houses, the power, and the responsibility. You've proved yourself and the choice is yours: freedom or power.\n\t\t*choice\n\t\t\t#Freedom! Screw this joint, I'm outta here!\n\t\t\t\t*set savvy %+10\n\t\t\t\t*set jumpin_the_gun %-10\n\t\t\t\t*set take_it_to_the_mattresses %-10\n\t\t\t\t*goto walk_away\n\t\t\t#After all this work, I'm not walkin' out! I'm gonna run NOLA my way!\n\t\t\t\t*if respect >= 72\n\t\t\t\t\t*set respect %+20\n\t\t\t\t\tThe Bull is delighted and pats you on the back. Now it's time for you to run the NOLA mob with an iron fist!\n\n\t\t\t\t\t*if deal_devil\n\t\t\t\t\t\t*goto devil_end\n\t\t\t\t\t*set juice +2500000\n\t\t\t\t\t*gosub pitts_head\n\t\t\t\t\t\n\t\t\t\t\t*gosub pitts_money\n\t\t\t\t\t*page_break\n\t\t\t\t\t*if deal_cop and (malones_snitch = false)\n\t\t\t\t\t\t*set heat %-20\n\t\t\t\t\t\tThe Pitt is dead, so Malone considers your deal with the coppers fulfilled. He lets you walk away squeaky clean from the carnage inside the revue. \n\n\t\t\t\t\t\t*if dragon_assistance = false\n\t\t\t\t\t\t\tThe next day, Malone's picture is all over the newspapers as he stands in front of [i]Girls Girls Girls[/i], hands on his hips, delivering a speech about cleaning up this dirty city.\n\n\t\t\t\t\t\t\tHeh. If they only knew.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t*comment endif\n\n\t\t\t\t\t*set dragon_business true\n\t\t\t\t\t*gosub dragon_and_mole\n\t\t\t\t\t\n\t\t\t\t\t*if voodoo_necklace\n\t\t\t\t\t\t*set juice +25000\n\t\t\t\t\t\tWith you as an example of the power of the voodoo necklace, The Gator Girls' Voodoo Shop becomes the number one tourist destination in NOLA. Thousands of tourists flood their shop every month to purchase their own voodoo necklaces, and you get a cut of the profits.\n\t\t\t\t\t\n\t\t\t\t\t*if malones_snitch\n\t\t\t\t\t\tThe heat can't take down any other mafia bigwigs, so they put the screws to you. They know you're willing to sell out the mob.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou're on top, but you're under the thumb of Captain Malone, which adds a great deal of stress to your life. Since you've helped him before, he expects it now. If you give a cop a donut, he'll want a snitch for life.\n\n\t\t\t\t\t\t*if respect > 78\n\t\t\t\t\t\t\tYears later, he is gruesomely decapitated in a car accident. You can't say you're sad to see Malone go…. Perhaps it was the mob behind it, perhaps not. You'll never say; you may plead the Fifth on it, but that's as far as you'll go. \n\n\t\t\t\t\t\t\tRegardless, you are able to spend the rest of your days free of his supervision.\n\n\t\t\t\t\t\t\t*gosub as_for_l\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto nola_ending\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou spend the rest of your days under his grubby, piggy thumb. You curse yourself for ever being a stool pigeon. If you met your past self today you'd give yourself a slap or two.\n\n\t\t\t\t\t\t\t*gosub as_for_l\n\t\t\t\t\t\t\t*finish Next\n\t\t\t\t\t*elseif heat > 65\n\t\t\t\t\t\tEven though business is booming under you—on the right side of the street, too—the heat gets restless and decides to take you down. They pin some random violence on you, landing you in jail. After a few nights in the clink, you stand before a judge to plead your case. As you're standing there trying to come up with a way out, you realize you know this judge! This guy would go deep sea fishing with The Bull; they go way back and you know he owed The Bull a favor.\n\t\t\t\t\t\t\n\t\t\t\t\t\tNow that favor has been passed on to you, and you use it to get off with community service, which twists Malone up inside. He spends the rest of his days watching your every move, which makes you miserable. How can you be an effective don when you've gotta live your life squeaky clean like [i]Leave it to Beaver[/i]?\n\n\t\t\t\t\t\t*gosub as_for_l\n\t\t\t\t\t\t*finish Next\n\t\t\t\t\t*else\n\t\t\t\t\t\t*gosub as_for_l\n\t\t\t\t\t\t*goto nola_ending\n\t\t\t\t*elseif take_it_to_the_mattresses > 72\n\t\t\t\t\t*set respect %+30\n\t\t\t\t\t*set juice +5000000\n\t\t\t\t\t*set with_l true\n\t\t\t\t\t*set clips +2\n\t\t\t\t\t*set ki
