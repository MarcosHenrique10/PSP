t\t\n\t\t\t\tThe beggar looks at you, gun shaking, and begins to pull the trigger….\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tHe can't do it. Just like that, he puts the gun away and grabs the rotting viola. \n\t\t\t\t*goto lights\n\t#I grab onto the bow of a passing boat. They just might help me on board.\n\t\t*set savvy %+5\n\t\t*set jumpin_the_gun %-5\n\t\t*set take_it_to_the_mattresses %+5\n\t\tOne of those tourist-trap paddleboats comes your way, and you manage to latch onto it like a mudbug. \n\n\t\tWoooo!\n\n\t\tPulling your upper body out of the water, you slap your wet hand onto the deck of the boat.\n\t\t*page_break\n\t\t*set mayor true\n\t\tJust your luck. The boat happens to be a yacht hosting a fundraiser for the mayor.\n\t\t\n\t\tYou are swarmed by security officers, who radio for police backup.  One of the police patrolboats escorting the yacht picks you up and carts you back to shore.\n\t\t*goto interrogation\n\n*label lights\nSuddenly, blue and red lights flash, and an all too familiar sound blasts out your eardrums. Good thing your ears are full of water; otherwise, you wouldn't be able to hear for a week.  \n\nIt's the heat in all its glory. A patrolboat cruises up right behind you, and a net flies out and nabs you. The cops haul you in as though you're the catch of the day. \n\nGetting locked up by the cops could ruin the entire mission. Everyone in NOLA knows the police force is corrupt, and you have no idea which team these particular pigs are playing on. \n*if (paranoia \u003c 40) and (remorse \u003c 50)\n\tYou imagine that at least a few cops are stand-up folks, but you've never met one.\n*comment endif\n\nBut there's no getting out of this one, unless The Bull has someone on the inside who can help you….\n*page_break\n*label interrogation\n\nThe next hour is a blur. They find your juice and sawtooth, read you your rights, and cuff you. Then, it's off to the station, where they take you to a cold, windowless room. They set you down on a hard wooden chair with your hands still cuffed behind you. A single bright bulb shines in your eyes.\n\nIn the shadows behind the light, an audience of cops watches and waits….\n\nThe door bursts open. It's Jimmy Malone, smug as the proverbial cat who caught the canary. \n*if malones_snitch = false\n\tIt seems he's made captain since the last time you met.\nHe struts over to you, reveling in the knowledge that he owns the room. He leans in, placing his hands on the chair, and breathes right into your face. \n*if malones_snitch = false\n\tHolding your gaze with his own, he tells you straight out they've got you dead to rights. The weapon they found on your person is notorious for being involved in the most skilled message jobs in all of New Orleans. He lets you know that your only hope is to flip.\n*if malones_snitch\n\tHolding your gaze with his own, he gives you the standard threats about jail—performing for the cameras filming this scene. You may be his informant, but there's no way that the shit you two have done together is legit. Instead, he explains at length how the weapon found on your person is notorious for being involved in the most skilled message jobs of the past few years.\n\n*fake_choice\n\t*if malones_snitch = false\n\t\t#Awww. He's stroking my ego.\n\t#I just want my precious sawtooth back—it's like my security blanket. \n\t#Compliments ain't gonna work. He's just trying to intimidate me.\n\t*if malones_snitch\n\t\t#I mug for the camera; this is almost fun!\n*comment endif\n\nMalone keeps going as you sit there dripping like a wet dog. He tells you again that the sawtooth ties you directly to the mob, and adds that they know about the brewing mafia war. All he wants from you is the specifics of who lies behind it. \n*if kill_cop\n\n\tWhen you still don't break, he puts his nose to yours and mentions that a rookie cop came to a bad end just off Bourbon Street a few hours ago. The smell of cheap diner coffee is strong on his breath as he accuses you of the cop's murder. Holding your face up, he forces you to look him in the eyes. And that's when he starts to get excited.\n*if kill_cop = false\n\t\"I got a tip, you know. A little birdie told me you were going to be on the prowl tonight. You think you're so smart, but you were easy to find. And if you don't spill it, this is only going to get worse for you.\" He's clearly getting excited.\nAnd the other cops are starting to get excited as well. One even cracks his knuckles in anticipation of the beatdown you're about to receive.\n\n*if jumpin_the_gun > 55\n\tYou spit in his face.\n\n\tSlowly, he wipes the spit from his face. With a last glare at you, he leaves you with the other officers. \n*if jumpin_the_gun \u003c= 55\n\tYou lips are sealed. There's no way you're talking.\n\n\tMalone glares at you. One final glance before turning to leave you alone…alone with the other officers.\n*if malones_snitch\n\t*set paranoia %+10\n\tThis is certainly new. Malone has never left you unsupervised before.  Maybe he's serious this time?\n*comment endif\n\t\nThey lock the door, turn off the cameras, and get down to business. A fist hits you right in the jaw, flipping your wet head back. You see one of the officers hanging back in the shadows. His dark brown eyes stare from the darkness, but he makes no move to stop them.\n\nWhat do you think about this Silent Cop? Something about him tells you he's not his own man—that he works for somebody. \n*if kill_cop = false\n\tMaybe for the same person that tipped off Malone that you had a job tonight?\nAs the blows continue to fall, you consider who that might be.\n\n*fake_choice\n\t*if malones_snitch\n\t\t#He's Malone's man-in-the-room, making sure the other pigs don't go too far.\n\t\t\t*set paranoia %+5\n\t\t\tCops don't like your kind, and accidents have been known to happen.\n\t#He might be a mole working for The Bull.\n\t\t*set paranoia %+5\n\t\tWhy not? The Bull has plenty of ties to the heat.\n\t#He could be working for The Pitt, who is determined to make this night hell for me.\n\t\t*set paranoia %+5\n\t\tIt certainly fits with The Pitt's character.\n\t#At this point, all I care about is the fist in my face.\n\t\t*set paranoia %-5\n\t\tTaking five of the best across the jaw tends to tighten your focus.\n*comment endif\n\nThe rest of the coppers start taking their aggression out on you, too—one with a punch, another with a kick in the stomach, a third with the stock of a gun. Then they all get their shots at once.\n*set wounds +1\n\nThis is getting old, real quick. You gotta do something or you might be stuck here for hours. \n\n*choice\n\t*if (desire = 4) #Spill it.  Getting ${l_name} back is all that matters at this point.\n\t\t*gosub end_trial\n\t\t*label goods\n\t\tAnd, well, there goes your cover.\n\n\t\t*label potential_cop_deal\n\t\t*if jumpin_the_gun >= 45\n\t\t\t*label spill\n\t\t\t*set respect %-20\n\t\t\t*set heat %-10\n\t\t\tYou open your bloody mouth and start talking. You clue the cops in on your secret mission and your desire to ${desire_text}. You explain that if they don't let you go free, the impending mafia war, a war they'll get sucked into, will spill more blood than they can imagine.\n\t\t\n\t\t\tWhen you're done blabbing, the cop who hung back glares at you from the shadows, his eyes seeming to drill a hole directly into your head. Satisfied, the majority of the coppers exit to talk things over with Captain Malone, leaving Silent Cop and you to participate in a staring contest. Sweat and blood runs into your eyes, stinging them; you try to blink it away, but to no avail.\n\t\t\t*page_break\n\t\t\t*goto deal\n\t\t*else\n\t\t\tYour mind moves quickly and before you open your bloody mouth, you decide on a little judicious editing. You give 'em a taste, but only a taste, of what's cookin'. \n\t\t\t\n\t\t\tJust then, the (formerly) silent cop interrupts.  \"I think the captain might want to hear this,\" he says.  The others stop and look at each other for a moment before nodding.  They file out of the room.  \n\t\t\t\n\t\t\tOnce they're gone, Silent Cop tells you to shut your trap, unlocks the handcuffs, and pushes you out a back door.\n\t\t\t\n\t\t\tThe door slams behind you, and you find yourself blinking in the lights of the police parking lot.  You're free to go…but without your stuff. No sawtooth. No money clip. No juice.\n\t\t\t*goto goodbye_2\n\t#Grit my teeth and bear it.\n\t\t*gosub end_trial\n\t\tYou don't want their greasy little hands in your business, especially when it comes to The Bull.\n\t\t*set respect %+15\n\t\t*set heat %-15\n\t\t*set wounds +1\n\t\t\n\t\tYour bloodstained face breaks into a shit-eating grin, which annoys them all the more. They take turns whaling on you, but carefully. The only one who doesn't participate is Silent Cop; instead, he watches you with those intense eyes.\n\n\t\tThe pigs are pros—no broken ribs, jaw, or nose. They do it carefully…just like the mob. \n\t\t\n\t\tHow long is this going to last?\n\t\t\n\t\t*choice\n\t\t\t#Okay, I give in. I'll talk about how I want to ${desire_text_1st}.\n\t\t\t\t*goto smile\n\t\t\t#No way, no how, will I ever tell these wolves in uniforms anything about ${desire_text}. \n\t\t\t\t*set take_it_to_the_mattresses %+10\n\t\t\t\t*set respect %+30\n\t\t\t\t*set jumpin_the_gun %-20\n\t\t\t\t*set wounds +1\n\t\t\t\tYou spit out a bloody tooth and look up at them, as the light bulb swings above you. The fact that you're still smiling seems to disturb them. They look at each other, realizing that you ain't gonna talk.\n\t\t\t\t\t\t\t\t\n\t\t\t\tBacking off, they decide to huddle in a corner of the room and figure out what to do with you. You hear them whispering and see them shoot the occasional glance your way. Finally, after what seems like forever, they make their decision.\n\n\t\t\t\t*page_break\n\t\t\t\t*label deliberate\n\t\t\t\t\"Get ${him} out of here.\"\n\t\t\t\t\n\t\t\t\tThey break their huddle, uncuff your bloody wrists, and open a side door. As they shove you through, they give you a bunch of variations on the tried-and-true, \"This isn't the end—we're watching you,\" speech. If it was meant to intimidate, it failed. Once you're in the hall, you limp towards a back door with a bright red EXIT sign above it.\n\t\t\t\t*goto goodbye\n\t\t\t#I let them have their fun. But I'm a trained killer. Time to take some revenge.\n\t\t\t\t*goto chair\n\t#I'm the Number One headcrusher in this town. It's time for a prison break.\n\t\t*gosub end_trial\n\t\t*label chair\n\t\t*if take_it_to_the_mattresses \u003c 60\n\t\t\tTaking a deep breath and focusing, you tense your muscles to pounce.\n\t\t\t\n\t\t\tUnfortunately, one of the cops senses your intentions and smacks you—hard. You see stars, and blood pours from your mouth. That's when you break.\n\t\t\t\n\t\t\t*goto spill\n\t\t*elseif wounds >= 4\n\t\t\tTaking a deep breath and focusing, you tense your muscles to pounce.\n\t\t\t\n\t\t\tUnfortunately, your reactions have been dulled by all the wounds you've taken. Sensing your intentions, one of the cops puts his hands on your shoulders and pushes you back down as you start to rise.\n\t\t\t\n\t\t\tSeveral of them huddle in a corner of the room to figure out what to do with you. You hear them whispering and see them shoot the occasional glance your way. Finally, after what seems like forever, they make their decision.\n\t\t\t*goto deliberate\n\t\t*else\n\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t*set heat %+40\n\t\t\t*set respect %+30\n\t\t\t*label breath\n\t\t\tTaking a deep breath and focusing, you drop to your knees and whip the chair you're handcuffed to around in a semicircle. Four of the cops go down like bowling pins, taken out by the chair's legs. You get the chair out from under you and your hands around your legs and in front of you. \n\t\t\t\n\t\t\tHuzzah!\n\t\t\t*page_break\n\t\t\t\n\t\t\tYour victory may be short lived, however; the cops whip out their guns to take you out.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Guns aren't my forte, but I'll take what I can get.  \n\t\t\t\t\t*set jumpin_the_gun %-10\n\t\t\t\t\t*set clips +4\n\t\t\t\t\tYou grab the cop closest to you, snatching his gun and pulling him in front of you as a shield. You squeeze off a couple of shots at them while they're deciding what to do, and then duck behind a table, still dragging your hostage. The table falls on its side, providing a barrier as they fire at you. \n\t\t\t\n\t\t\t\t\tSuddenly, red lights start flashing and an alarm begins to wail. Water from the emergency sprinklers starts to pour down, adding to the confusion. The cops in the room fort up behind other desks in one corner, while the ones outside pound on the locked door.\n\t\t\t\t\t*page_break\n\t\t\t\t\tA hand suddenly grabs your arm. \n\t\t\t\n\t\t\t\t\tIt's Silent Cop. He opens a door behind you, and you run for it. A neon sign that reads EXIT beckons you. Pushing through the back door, you burst into the parking lot still holding the gun, the shouts of confused cops behind you. \n\t\t\t\t\t*goto escape\n\t\t\t\t#Caveman violence is truly the best kind of violence. I use the chair.\n\t\t\t\t\t*set jumpin_the_gun %+20\n\t\t\t\t\t*set clips +8\n\t\t\t\t\tYou break a couple of legs off a chair and start laying about for all your worth. You knock guns out of hands, crack skulls, and gouge necks open. The cops, taken aback by the ferocity of your attack and the blood fountaining from their fellows, only manage to get off a single shot before you take them down.\n\t\t\t\n\t\t\t\t\tSilent Cop, who has stayed out of the fray, opens a side door without a word. You take your cue and run through it. A neon sign that reads EXIT beckons you. Pushing through the back door, you burst into the parking lot, the shouts of confused cops behind you.\n\t\t\t\t\t*goto escape\n\t\t\t\t#The body is the ultimate weapon!\n\t\t\t\t\t*set clips +5\n\t\t\t\t\t*set respect %+5\n\t\t\t\t\t*set jumpin_the_gun %+10\n\t\t\t\t\tTime to get primitive. \n\t\t\t\n\t\t\t\t\tYou headbutt the cop nearest you, and feel the satisfying crunch of bone as his nose shatters. As the other cops recoil in surprise, you launch yourself at them, punching and kicking, and where necessary, scratching and biting. Like a rabid animal, you keep attacking as they crawl away.\n\t\t\t\n\t\t\t\t\tThey are terrified.\n\t\t\t\n\t\t\t\t\tSilent Cop, who has stayed out of the fray, opens a side door without a word. You take your cue and run through it. A neon sign that reads EXIT beckons you. Pushing through the back door, you burst into the parking lot, the shouts of confused cops behind you.\n\t\t\t\t\t*goto escape\n\t*if malones_snitch = false\n\t\t*selectable_if (savvy > 60) #I can work out a deal. The little fishies just might bite.\n\t\t\t*gosub end_trial\n\t\t\t*set savvy %+5\n\t\t\t*set respect %-10\n\t\t\t*label smile\n\t\t\tPoised and ready, the cops wait for you like children gathering around for story time. Who knows what secrets you might spill? This will be big news around the water cooler later, so you gear up to make it good.\n\t\t\t*goto potential_cop_deal\n\t*if malones_snitch\n\t\t#Time to cry uncle; I yell out for Malone.\n\t\t\t*gosub end_trial\n\t\t\t*set respect %-10\n\t\t\t*set savvy %+10\n\t\t\tYou yell for Malone. The cops in the room stop pounding on you and step back. Smiles split all their faces…it's story time.\n\t\t\t\n\t\t\tThey leave you alone for a moment—just long enough for you to catch your breath.\n\t\t\t*goto deal\n\n*label deal\nThe coppers return with Malone. He takes a good long look at you—the bruises on your face, the rips in your clothes, and the puddle around your chair from the river water.\n\n*if malones_snitch\n\tHe puts his hands on his hips, still mugging for the camera—even though the camera isn't recording any more, and would damn him far more than you if it actually was.  \n\t\n\tHe offers you a way out. You've been his stoolie for a long time, but tonight there's a chance to leave that behind.\n\t*goto cop_work2\n*elseif kill_cop\n\tHe kicks your chair over, screaming at the top of his lungs that he knows you killed the cop tonight. He tells you that there's no getting out of this one, that he'll keep you detained for months if he has to. He doesn't care about the mafia war. He just wants someone to pay for killing a cop.\n\n\t*choice\n\t\t#I'll blame the cop's murder on The Pitt.\n\t\t\t*set respect %-10\n\t\t\t*if cat_help\n\t\t\t\tApparently, the body of the dead cop was found mostly devoured by stray cats, so there's not enough evidence to confirm your involvement one way or another.\n\t\t\t\t\n\t\t\t\tMalone stares intently at you, as if by looking deeply into you, he can tell whether you're lying. Eventually, he offers you a deal: your freedom in exchange for The Pitt's untimely demise.\n\t\t\t\t*page_break\n\t\t\t\t*goto cop_work\n\t\t\t*elseif savvy > 65\n\t\t\t\tVery carefully, you tell Malone that The Pitt is responsible for the death of the cop. You should know…you've been chasing him all night! If they let you go, you can finish the job and stop the war.\n\n\t\t\t\tMalone thinks hard and finally agrees: your freedom in exchange for The Pitt's untimely demise.\n\t\t\t\t*page_break\n\t\t\t\t*goto cop_work\n\t\t\t*else\n\t\t\t\tMalone spits in your face and tells you flat out that he doesn't believe you. You're The Bull's ${man}.\n\t\t\t\t\n\t\t\t\tBut, still, he's not sure what to do with you.\n\t\t\t\t*goto deliberate\n\t\t#Screw these cops. It's time for me to get outta here.\n\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t*set jumpin_the_gun %+5\n\t\t\t*set paranoia %+5\n\t\t\tMalone leaves as the cops lock the door and prepare to torture you again.\n\t\t\t*goto breath\n\t\t#Nope. I'm not gonna admit to anything.\n\t\t\t*set respect %+5\n\t\t\t*set savvy %-5\n\t\t\t*set paranoia %-5\n\t\t\tYour indifference to Malone's threats makes him uncomfortable.\n\t\t\t*goto deliberate\n*else\n\t*label cop_work\n\tHe puts his hands on his hips, and looks you ever. \"I own you now,\" he said. \"And the only way you're getting out of this is by giving me what I want.\" \n\t\n\t*label cop_work2\n\tIf you take out The Pitt, there will be no repercussions: no prison food; no six-by-nine cell; no license plates. Just you and your freedom. \n\t*if malones_snitch\n\t\tAnd, most importantly, no more snitching.\n\tHell, who knows? Maybe you'll even end up in law enforcement!\n\t*set contracts +1\n\t*set deal_cop true\n\t*set exposed \"exposed\"\n\t*set heat %-15\n\t*fake_choice\n\t\t#Heh. Yeah right.\n\t\t\t*set remorse %-5\n\t\t#Sure, let 'em think that.\n\t\t\t*set paranoia %+5\n\t\t#A new career as a cop wouldn't be half bad.\n\t\t\t*set remorse %+5\n\t\t\t*set respect %-5\n\tYou agree to work with them, but only if you can do it your way—down and dirty. No guns, no wires, and certainly no cell phones. They'll know the job is done when The Pitt's body turns up…or if the job's not done, they'll find you swimming with the fishes.\n\n\tSilent Cop watches these negotiations impassively.\n\t*page_break\n\t*goto goodbye\n\n*label goodbye\nIt's a very anticlimactic goodbye: they force you to walk right out the back of the police station…without your stuff. No sawtooth. No money clip. No juice.\n*label goodbye_2\n*if desire = 1\n\t*if paranoia \u003c= 50\n\t\tYou stand outside the station, wondering what to do next.  How are you going to take down The Pitt or The Bull without your blade?\n\t*if paranoia > 50\n\t\tYou stand outside the station, struck by the nefariousness of The Bull's plan: he strung you out, ${exposed} you as a traitor, and stripped away everything you had.\n*if (desire = 2) or (desire = 3)\n\tFor a moment, you feel a certain relief. Are you free? Could you walk away, right now, and never see any of this mess again?\n*if desire = 4\n\tYou stand outside the station, feeling naked and exposed. How will you save ${l_name} without your precious? Filthy hobbitses.\n*comment endif\n\n*goto run\n\n*label escape\n*page_break\nBursting into the warm night, you run through the parking lot past rows of cop cars. The heat is buzzing around like flies. Adrenaline pumping through your veins, you break the handcuffs on the metal fence like they're nothin'.\n\nA cop car burns rubber close by. You stand up and turn.\n\nIt's Silent Cop. He opens the car door and gives you a look. \n\n*choice\n\t#Get in the car.\n\t\t*set savvy %+5\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*goto getin\n\t#Kill him!\n\t\t*set has_stuff false\n\t\t*goto strangle_mole\n\t#Get closer and see what he wants.\n\t\t*set jumpin_the_gun %-10\n\t\t*goto gunpoint\n\t#Run!\n\t\t*set paranoia %+10\n\t\t*set jumpin_the_gun %+5\n\t\tYou run for it, straight out of the parking lot. \n\t\t\n\t\tHe pulls up alongside you and pitches a bag labeled \"EVIDENCE\" at you. Inside is your sawtooth, your juice, and the rest of your things.\n\n\t\t*goto evidence_bag\n\n*label getin\nYou dive into the cop car, and shut the door. \n\nSilent Cop cruises out of the parking lot and takes a couple of random turns before pulling up to the curb on a side street. He hands you a plastic bag marked \"EVIDENCE.\" The sawtooth and your hard-earned juice is there.\n\n*goto evidence_bag\n\n*label run\n*if malones_snitch\n\t*page_break\n\t*set juice -3000\n\tBefore your despair grows too great, however, a figure rounds the corner into the police parking lot. It's Malone.\n\t\n\tIn his hands is a bag marked \"EVIDENCE.\" Inside is your juice—about three grand lighter, which Malone attributes to expenses—and your sawtooth.\n\t\n\t\"Time to go,\" he says.\n\t\n\tYou take your stuff and turn away. It's time to get down to business.\n\t*goto clock\n*else\n\tAs you make it to the side street, Silent Cop drives up next to you and pitches a bag marked \"EVIDENCE\" at you. \n\t*goto evidence_bag\n\n*label evidence_bag\n\"I need to talk to you—it's important.\"\n\n*choice\n\t*if has_stuff\n\t\t#He did deliver the sawtooth—I hear him out.\n\t\t\t*set paranoia %-5\n\t\t\t*set heat %-5\n\t\t\t*set take_it_to_the_mattresses %-5\n\t\t\tYou get into the passenger seat, closing the door for a little privacy.\n\t\t\t*goto gunpoint\n\t*if (desire = 2) #Ugh. This guy will probably just suck me back into the drama. I'm not interested.\n\t\t*set paranoia %-10\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*set remorse %+5\n\t\tYou explain to him that you don't need any more conflict in your life. He gives you a long look before bursting into tears.\n\n\t\tGreat.\n\t\t\n\t\tYou get into the passenger seat, closing the door as he cries like a baby. \n\t\t*page_break\n\t\t*set molecopsfamily true\n\t\tHe pleads with you to kill The Pitt. He was told to kill you or he and his family would be tortured and killed instead. Finally you break down and promise that you'll kill The Pitt for him; you're already planning on doing that tonight anyway, right?\n\t\t\n\t\tYou take your stuff and close the car door behind you. As you're walking away, you hear a gunshot. Turning, you see the windows of the car are splattered with blood and gore; Silent Cop has gone and offed himself.\n\t\t\n\t\tYou'd better get outta here before that gunshot brings the coppers, headcrusher!\n\t\t*page_break\n\t\t*goto tree\n\t#Hell no! I don't mix with moles.\n\t\t*set paranoia %+5\n\t\t*set heat %+5\n\t\t*set take_it_to_the_mattresses %+5\n\t\t*set jumpin_the_gun %+5\n\t\tYou tell the mole to eat your dust. He sighs and pulls out his gun. \n\n\t\tBefore you can react, he sticks the gun in his mouth and pulls the trigger. Bits of cracked bone, brains, and blood spray the inside of the car. Whatever message he had for you is long gone. Kicking the door closed, you turn away from him to focus on your mission.\n\t\t*page_break\n\t\t*goto tree\n\t#He's got info on me, and besides, I don't want to miss a chance to kill a cop.\n\t\t*label strangle_mole\n\t\t*set heat %+10\n\t\t*set jumpin_the_gun %+5\n\t\t*set respect %+10\n\t\t*set clips +1\n\t\t*set molecopsfamily true\n\t\tDiving into the car, you wrap your fingers around his throat with all the anger you can muster. He slaps ineffectually at your hands, and you tighten your grip. His legs kick below him as his face reddens and his eyes bulge. Before you can finish him, he manages to gurgle and rasp a last message. \n\n\t\t\"Kill The Pitt, before…he…gets to…my family….\"\n\n\t\tHis body goes slack as you release him. His hands fall to his sides as his sightless eyes stare right at you. He's dead.\n\t\t*if has_stuff = false\n\t\t\tOn the passenger seat is a bag marked \"EVIDENCE\"—it contains your sawtooth, your juice, and the rest of your things.\n\t\t*choice\n\t\t\t#Damn. Now I feel bad that I killed him….\n\t\t\t\t*set remorse %+20\n\t\t\t\t*set paranoia %+10\n\t\t\t\t*set take_it_to_the_mattresses %-5\n\t\t\t\tYou close his eyes, apologize, and get out of the car, shutting the door.\n\t\t\t\t*goto tree\n\t\t\t#He was playing both sides! He deserved it.\n\t\t\t\t*set remorse %-20\n\t\t\t\t*set take_it_to_the_mattresses %+10\n\t\t\t\t*set paranoia %-5\n\t\t\t\t*set savvy %+5\n\t\t\t\t*set juice +500\n\t\t\t\tChecking his pockets, you snag some juice out of his wallet and get out of the car.\n\t\t\t\t*goto tree\n\t\t\t#Messing with the mob is no joke. I might have even saved his family.\n\t\t\t\t*set remorse %+5\n\t\t\t\t*set paranoia %+5\n\t\t\t\t*set take_it_to_the_mattresses %+10\n\t\t\t\tChecking his pockets, you find a picture of his family, along with a suicide note. The poor bastard was gonna blow his brains out if you hadn't come along.\n\t\t\t\t*goto tree\n\n*label gunpoint\n\n*if heat >= 50\n\t*set paranoia %-10\n\t*set heat %-5\n\t*set remorse %+5\n\tHe pulls out his sidearm, pointing it right at you. \"The Pitt…he says….\" The gun shakes in his hands. \"He says…\"\n\n\tYou finger your sawtooth. It would be tight—the moreso after your recent beating—but you think you can take him. But maybe you can talk him down? It seems like he doesn't want to do this.\n\t\n\t*goto family_life\n*else\n\t\"I'm on strict orders to do this myself,\" he says, pulling out his gun and aiming it right at your forehead. Well, this is an interesting predicament.\n\t*if (jumpin_the_gun \u003c 60) and (savvy > 40)\n\t\n\t\tAs you grip the sawtooth in your hand, preparing to stab him before he can shoot you, you notice his hand is trembling slightly. The barrel of his gun gently rattles. He's unsure of himself.\n\t*choice\n\t\t*if (jumpin_the_gun \u003c 60) and (savvy > 40)\n\t\t\t#Screw it. I'm gonna kill him.\n\t\t\t\t*label kill_mole\n\t\t\t\t*set heat %+10\n\t\t\t\t*set remorse %-10\n\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\t*set clips +1\n\t\t\t\t*set respect %+5\n\t\t\t\tYour reach up and push the gun away just as it goes off. The bullet whizzes by your noses and shatters the passenger side window, spraying glass on the side of your face.\n\t\t\t\t\n\t\t\t\tIn one swift motion, your cut his throat with the sawtooth. Bright arterial spray covers your face and the dash. You reach over, turning off the car and grabbing a set of Donut City napkins from the glove compartment. \n\t\t\t\t\n\t\t\t\tThe dead cop lays there, head resting on the steering wheel.\n\t\t\t\t\n\t\t\t\tWiping off your face, you pat the poor ol' bastard on the back and get out of the car.\n\t\t\t\t*page_break\n\t\t\t\t*goto clock\n\t\t*if (jumpin_the_gun >= 60) or (savvy \u003c= 40)\n\t\t\t#I kill him before he can kill me.\n\t\t\t\t*goto kill_mole\n\t\t#He could have killed me earlier tonight if he wanted to. I'm gonna try to talk him down. \n\t\t\t*set paranoia %-5\n\t\t\t*set remorse %+10\n\t\t\t*label milk\n\t\t\t*set savvy %+5\n\t\t\tHe tries to steady his hand, but the gun just trembles even more. He definitely doesn't want to do this, and he's crumbling under the pressure. \n\t\t\t*label family_life\n\t\t\t*set molecopsfamily true\n\t\t\t\n\t\t\t\"You don't understand. My family's life is at stake.\"\n\t\t\t\n\t\t\tAfter a long moment, he sets the gun down, tears falling from his eyes. \"I know a way out of this. The right way. So just get outta here,\" he says.\n\t\t\t\n\t\t\tYou turn to open the car door, and the poor bastard blows his brains out. The blast stings your ears; you turn to watch as the gun in his hand falls and the body goes slack. \n\t\t\t\n\t\t\tAs you get out of the car, it sinks in how important this night is. \n\t\t\t*if desire = 1\n\t\t\t\tYou know that if you were the don of NOLA, none of this would be going down. You owe it to NOLA. You love this city, and you'd protect her honor as the boss.\n\t\t\t*if desire = 2\n\t\t\t\tYou know this is no life for you. You feel it in what's left of your Cajun-blackened soul. You want to make it right and give back to the world you took so much from. \n\t\t\t*if desire = 3\n\t\t\t\tHow important your freedom is. You owe it to yourself, and to people like that poor dead sap back there. And thanks to him, you can see that Mexican sunrise at the end of a very long, dark tunnel.\n\t\t\t*if desire = 4\n\t\t\t\tThis life is short, and you just want to spend what little time you've got left with ${l_name}, Bull or no Bull.  \n\t\t\t*page_break\n\t\t\t*goto tree\n\t\t#I'll milk him for information. Then I'll kill him…maybe.\n\t\t\t*set paranoia %-5\n\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t*set jumpin_the_gun %-5\n\t\t\t*goto milk\n\t\t\t\n*label tree\n*if has_stuff\n\tYou take cover behind an oak tree and catch your breath.\n\t*if deal_cop\n\t\t*set juice -3000\n\t\tYou glance at your juice, and see that the heat has peeled about three large off the top. Bastards.\n\t*if deal_cop = false\n\t\tYou glance at your juice; it looks like it's all there.\n\t*goto clock\n*else\n\t*if deal_cop\n\t\t*set juice -3000\n\t\tYou hide behind an oak tree and pull the sawtooth and your juice out of the EVIDENCE bag. Looks like the heat took about three grand off the top.\n\t*if deal_cop = false\n\t\tYou hide behind an oak tree and pull the sawtooth and your juice out of the EVIDENCE bag. It's all there.\n\t*goto clock\n\n*label clock\n\nThe cathedral clock strikes the hour, bells echoing through the streets of the Quarter. It's 3AM; daylight is fast approaching. \n*finish\n\n*label end_trial\n*check_purchase adfree\n*if (choice_purchased_adfree or (choice_is_omnibus_app or choice_is_web)) or not(choice_purchase_supported)\n\t*return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n*abort\n\n*label purchased\n*return", "private_show": "*temp tied_up false\n*temp drunken_act_dropped false\n*temp taken_back false\n[b]Chapter Seven: A Private Show[/b]\n\n*if security_missing\n\tYou leave behind the fire engulfing St. Louis Cathedral and pass people panicking on the street. With the security team gone, you breeze right into the [i]Girls Girls Girls[/i] revue—diving into a sea of cigar smoke, heavy laughter, and hot jazz. It's 4AM and the party is still going strong.\n\t*if rosary and (atheist = false)\n\t\tTouching the rosary around your neck for good luck, you enter the venue.\n\t*if voodoo_necklace\n\t\tGrasping the tiny bones in Auntie Ezma's voodoo necklace, you enter the venue.\n\t*goto party\n*elseif letter_l\n\tAs you approach the [i]Girls Girls Girls[/i] revue, you clutch the note from ${l_name}. It's 4AM and the party inside sounds like it's still going strong. As ${l_he} advised, you avoid the front entrace and head down the alley, searching for the back door. It is easy enough to find, now that you know to look for it.\n\t*if rosary and (atheist = false)\n\t\tTouching the rosary around your neck for good luck, you push the door open and enter.\n\t*if voodoo_necklace\n\t\tGrasping the tiny bones in Auntie Ezma's voodoo necklace, you push the door open and enter.\n\t*if (rosary = false) and (voodoo_necklace = false)\n\t\t*if (remorse > 55)\n\t\t\t*if atheist\n\t\t\t\tYou take a deep breath and search your heart for the resolve to soldier on. Steeled for what is to come, you push the door open and enter.\n\t\t\t*if atheist = false\n\t\t\t\tCrossing yourself, you push the door open and enter.\n\t\t*if remorse \u003c= 55\n\t\t\tTaking a deep breath, you push the door open and enter.\n\t*comment endif\n\t\n\tIt only takes a moment to see that the coast is clear and for you to slip inside. Passing by private rooms, you realize that the hallways turn and twist in a manner that makes you dizzy trying to keep them straight. \n\n\tYou take a right turn and then a left, and end up right back where you started. You do it again, following the sound of the laughter and jazz to the front room.\n\t*goto party\n*else\n\tApproaching the revue is easy. It's getting inside that might be more complicated.\n\t\n\tAs you walk up to the door, the security guys give you the hairy eyeball and demand to see your ID. \n\t*if savvy > 70\n\t\tYou flash them your fake ID card. After a sloppy search that would make the coppers down at the station laugh, they waste even more time by quizzing you about your bloody \n\t\t*if identity_revealed\n\t\t\tclothes.  One of them remarks that the brim of your hat is slashed and stained with dried blood.\n\t\t*if identity_revealed = false\n\t\t\tclothes and your hat. After convincing them that your hat is an extension of you and it's only respectful to allow you to wear it inside, they finally decide to let you in.\n\t\t*page_break\n\t\t*goto party\n\t*elseif identity_revealed or (respect > 70)\n\t\t*set wounds +1\n\t\t*set tied_up true\n\t\tUnfortunately, the security guards recognize you. Before you know it, they've swarmed you and lifted your sawtooth.\n\t\t\n\t\tYou punch and kick, but there's too many of them. Within moments, they have you tied up in a private room inside the revue.\n\t\t*page_break\n\t\tThey leave you alone with your thoughts. \"How could you have been so stupid?\" you mutter to yourself.\n\t\t\n\t\tIn only a few minutes, a blonde bombshell doing a hell of a Marilyn Monroe impression slips into the room. She introduces herself as Lulu Luscious, and it seems she's been waiting for you.\n\t\t*goto on_vinyl_seats\n\t*else\n\t\t*set juice -1000\n\t\tPalming the guard some Benjamins, you walk past the rather long line and into the club.\n\t\t\n\t\tThey pretend to pat you down, but this is [i]Girls Girls Girls[/i]—if they were serious about searches, most of the clientele wouldn't bother showing. The mobsters who frequent the place aren't going to give up their security blankets.\n\t\t*page_break\n\t\t*goto party\n\t\t\n\n*label party\n\nInside the revue are some of the most powerful men inside and outside of NOLA. A sea of well-dressed bankers, pimps, drug lords, CEOs, and politicians watch with hungry eyes as women undulate on stage under red lights while a live jazz band provides the mood music. Benjamins migrate from wallets to the hands of scantily dressed servers as bottles are cracked open and ice clinks in glasses.\n\nThe Pitt has done well for himself. \n*if dragon_assistance\n\tThanks to The Dragon, of course.\n*comment endif\n\nThere are almost no women in the joint other than the ones on stage or serving tables. \n*if male = false\n\tThe lack of women in the audience makes your femininity stick out like a sore thumb. \n\t*if identity_revealed\n\t\tToo bad your hat was destroyed; it would have helped you avoid attention right about now.\n\t*if identity_revealed = false\n\t\tA simple pull of your hat fixes the issue for the most part. \n*if male \n\tAbsent any female patrons, the men slap asses and ogle the goods without reservation.\n*comment endif\n\nStill covered in river water, blood, and sweat, you look like someone who doesn't belong here. You avoid eye contact with the people passing and you slide into a corner to survey the situation.\n\n*if deal_cabbie\n\tThe cabbie told you that a performer by the name of Lulu Luscious is the one to talk to. Grabbing a passing server, you ask about Lulu. The server points to a Marilyn Monroe lookalike sitting on the lap of an older gentleman.\n\n\t\"That's Lulu.\" The server cocks her eyebrow at your disheveled state. \"Don't bother if you don't have the goods….\"\n\t\n\t*goto approach\n*else\n\tA server comes up to you for a drink order, and you ask her who is in charge. She looks you up and down.\n\t\n\t\"What's it to you?\"\n\t*set juice -1000\n\t\n\tShe puts her hand out and you place a Benjamin on her palm. She looks at you like you're a carton of milk gone sour, so you up it to a grand. She smiles, pocketing the money. She points to a Marilyn Monroe lookalike sitting on the lap of an older gentleman. \"That's Lulu. She's in charge of the girls.\"\n\t*goto approach\n\n*label approach\nYou approach Lulu as the customer tickles her. She bursts into laughter and looks up just in time to see you coming. Slapping him on the shoulder in a playful manner that would rival the true Monroe, she stands and smooths out her dress. You let her know she's the one you've been instructed to talk to. The music is so loud you practically have to yell in her ear. \n\nIn a drunken slur, she tells you her name is Lulu Luscious, queen of the performers in this joint. She offers a private show in the back of the revue. \n\n*choice\n\t#Go with her. Finding ${l_name} is top priority right now.\n\t\t*gosub lulu_takes_you_back\n\t\t\n\t\tDiscarding the pretense of drunkenness, she addresses you clearly.\n\t\t*set drunken_act_dropped true\n\t\t*label negotiate_lulu\n\t\t\"It's gonna cost you,\" Lulu says, rubbing her fingers together. \"This place is real classy. Five large is the going rate.\" \n\n\t\tOuch.\n\n\t\t*if deal_cabbie\n\t\t\tYou pull out the ganja that the cabbie gave you and wave it in front of her. She recognizes it immediately and snatches it out of your hands. \"It's been a while since I've had the good stuff.\" \n\n\t\t\t*if taken_back = false\n\t\t\t\t*set taken_back true\n\t\t\t\tShe motions for you to follow her. You consider your options; how are you going to find out more about ${l_name}?\n\t\t\t*goto bought_lulu\n\t\t*elseif juice > 5000\n\t\t\t*if savvy > 70\n\t\t\t\t*set respect %-5\n\t\t\t\t*set juice -2500\n\t\t\t\tWith a smile, you whisper a few sweet nothings in her ear and convince her to cut her demand in half.\n\t\t\t\t*goto bought_lulu\n\t\t\t*else\n\t\t\t\t*set savvy %-10\n\t\t\t\t*set juice -5000\n\t\t\t\t*goto bought_lulu\n\t\t*elseif juice > 3500\n\t\t\t*set juice 0\n\t\t\t*set respect %-20\n\t\t\tYou tell her that you'll give her everything you've got, but it's not five grand. She takes the juice, but stops short of telling you what you want to hear.\n\t\t\t*goto on_vinyl_seats\n\t\t*else\n\t\t\tYou tell her that you don't have the money.\n\t\t\t\n\t\t\tLulu looks at you for a moment, aggravated. \"Fine. I was gonna help you…but not for free.\"\n\t\t\t*if jumpin_the_gun >= 55\n\t\t\t\tSensing danger, you grab her and prevent her from tripping some sort of alarm.\n\t\t\t\t*goto lulu_terrified\n\t\t\t*else\n\t\t\t\t*goto lulu_dismisses_2\n\t#Agree, but show her the sawtooth. Cooperation from her is key.\n\t\t*set paranoia %+5\n\t\t*set jumpin_the_gun %+5\n\t\t*label cooperation\n\t\tThe blade of the sawtooth shines underneath the flickering revue lights, as you stare directly into Lulu's big brown eyes.\n\t\t*if respect \u003c= 60\n\t\t\tShockingly, she laughs. \"Is that a cheap sawtooth, or are you just happy to see me?\"  \n\t\t\t*if drunken_act_dropped\n\t\t\t\tShe cocks her eyebrows at you, all business now.\n\t\t\t*if drunken_act_dropped = false\n\t\t\t\tCocking her eyebrow, she speaks flatly, dropping the drunk act.\n\t\t\t*comment endif\n\t\t\n\t\t\t\"You gonna just knife me right here? And ${l_name} said you were smart….\" \n\t\t\n\t\t\tApparently, she's more with it than you thought she was, and she's not impressed by you at all.\n\n\t\t\t*if deal_cabbie\n\t\t\t\tYou pull out the baggie of ganja that the cabbie gave you and dangle it in front of her. Her eyes go wide—she recognizes it immediately—and she snatches it out of your hands. \n\t\t\t*comment endif\n\n\t\t\tShe motions with a small head movement to the back.\n\t\t\n\t\t\t*if male = false\n\t\t\t\t\"C'mon lady.\n\t\t\t*if male\n\t\t\t\t\"C'mon.\n\t\t\tI know what you came for.\"\n\t\t\t\n\t\t\t*gosub lulu_takes_you_back\n\t\t\t*goto lulu_dismisses_2\n\t\t*else\n\t\t\tShe trembles at the sight of the blade, aware of your reputation. She nods slowly, briefly locking eyes with the performers on stage. \n\t\t\n\t\t\tCarefully, she leads you away from the crowd.\n\t\t\t\t\t\t\n\t\t\tYou follow her into the dark bowels of the revue, wandering through a complicated maze of corridors lit by lurid red lights. \n\t\t\t\n\t\t\tShe hangs a right and takes you into a red-washed room with white vinyl seats. She pulls the curtains closed behind her, spins around, and folds her arms. She drops the drunk act and motions to your sawtooth. \n\t\t\t\n\t\t\t\"Oh, Jesus. Put that thing away. This is a clean show.\" Lulu tells you she knows who you are and that everyone working for The Pitt knows he kidnapped ${l_name}. Now they're all in danger, and they've been waiting for you to show up all night.\n\n\t\t\t*choice\n\t\t\t\t#Fine. I'll put it away…for now.\n\t\t\t\t\t*label hit_lulu\n\t\t\t\t\t\"We don't have much time before they get here,\" she says. \"Quick, hit me in the face.\" She points to her cheek and braces herself. When you hesitate, she grabs your fist.\n\t\t\n\t\t\t\t\t\"You think I want to die for letting you go? We need a distraction.\"\n\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#Sure! Why not.\n\t\t\t\t\t\t\t*set remorse %-5\n\t\t\t\t\t\t\t*set take_it_to_the_mattresses %-5\n\t\t\t\t\t\t#I don't like hitting women.\n\t\t\t\t\t\t\t*set remorse %+5\n\t\t\t\t\t\t\t*set take_it_to_the_mattresses %-5\n\t\t\t\t\t\t#She's pretty adamant. Do I really have a choice?\n\t\t\t\t\t\t\t*set jumpin_the_gun %+5\n\t\t\t\t\t\t\t*set savvy %+5\n\t\t\t\t\t*comment endif\n\t\t\n\t\t\t\t\tFrustrated, she gives you a whopper of a bargain.\n\t\t\n\t\t\t\t\t\"Hit me and I'll tell you where The Pitt's office is. I'm one of the only people in this dump who's actually been there.\" She looks through the curtain and suddenly unloads on you.\n\t\t\n\t\t\t\t\t*if male = false\n\t\t\t\t\t\t\"Do you understand me? The Pitt's men are coming for you. I know you're a woman, so this may be hard for you. But hit me! Now!\"\n\t\t\t\t\t*if male\n\t\t\t\t\t\tShe pushes you. \"Do you understand me? The Pitt's men are coming for you. Don't be such a little pussy! Are you a headcrusher or what?!\"\n\t\t\t\t\t*comment endif\n\t\t\n\t\t\t\t\tYou hear the sound of feet coming down the hallway. Time is running out. Your hand curls into a fist.\n\t\t\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I'm gonna hit her.\n\t\t\t\t\t\t\t*set jumpin_the_gun %+5\n\t\t\t\t\t\t\t*set deal_lulu true\n\t\t\t\t\t\t\t*set contracts +1\n\t\t\t\t\t\t\tYou do it. You hit her.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tShe holds her bleeding mouth and smiles. \"Go through that curtain. Take a right. Right. Left. Down the stairs. Then right.\"\n\t\t\n\t\t\t\t\t\t\tShe pushes you toward a curtain on the other side of the room, and from there, you haul ass. The Pitt's men walk in on the other side of the room just as you run out. You tear down the hallway following Lulu's directions, while she distracts The Pitt's men. \n\n\t\t\t\t\t\t\tYou pass by a winding staircase leading up to a rickety tower.\n\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Time to take a detour! A tower is just the kind of place The Pitt would keep ${l_name} in. \n\t\t\t\t\t\t\t\t\t*set jumpin_the_gun %+5\n\t\t\t\t\t\t\t\t\tYou run up the winding, narrow stairway, calling out for ${l_name} as you get closer to the tower.\n\t\t\n\t\t\t\t\t\t\t\t\tYou hear feet pounding behind you as you reach a large metal door with a giant lock on it. You struggle with the lock, howling like a trapped animal, until a searing pain whips through your spine. You topple backwards, down the staircase.\n\t\t\n\t\t\t\t\t\t\t\t\tLights out.\n\t\t\t\t\t\t\t\t\t*goto stairs\n\t\t\t\t\t\t\t\t#I'm staying on track. Once I find The Pitt and I'll get everything I need.\n\t\t\t\t\t\t\t\t\t*set remorse %-5\n\t\t\t\t\t\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\t\t\t\t\t\tLulu's instructions echo in your head as you race through a maze of funhouse-like hallways to find The Pitt's office. Discovering a door that reads [b]BIG BOSS MAN[/b], you grab the doorknob just as three men tackle you to the floor, punching you repeatedly.\n\n\t\t\t\t\t\t\t\t\tYou try to fight them off, but these guys are giants. Their blows catch you off guard and knock you out cold.\n\t\t\t\t\t\t\t\t\t*goto stairs\n\t\t\t\t\t\t\t\t#I'd better help Lulu—she might be in danger.\n\t\t\t\t\t\t\t\t\t*set remorse %+5\n\t\t\t\t\t\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\t\t\t\t\t\tYou dash back through the curtain, and see three giant goons menacing Lulu. As you grab the closest one, Lulu screams and falls in her stilettos. The other two leave her and join their partner. Now, you are outnumbered.\n\n\t\t\t\t\t\t\t\t\tThe goons hit hard! You take a few punches before you fall and hit your head on the ground. Consciousness fades, and the last thing you here are Lulu's screams as if from a distance.\n\t\t\t\t\t\t\t\t\t*goto stairs\n\t\t\t\t\t\t#No way! I'm not hitting this chick!\n\t\t\t\t\t\t\t*set remorse %+5\n\t\t\t\t\t\t\t*set lulu_doublecross true\n\t\t\t\t\t\t\t*if take_it_to_the_mattresses > 60\n\t\t\t\t\t\t\t\tLulu gets frustrated. She tries to sucker punch you, but you grab her delicate fist just in time. She kicks you in the groin and smacks you on the face, calling you an idiot as The Pitt's men enter the room and throw you against the wall. \n\t\t\t\t\t\t\t\t*goto stairs\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*if juice >= 5000\n\t\t\t\t\t\t\t\t\t*set juice -5000\n\t\t\t\t\t\t\t\t*if juice \u003c 5000\n\t\t\t\t\t\t\t\t\t*set juice 0\n\t\t\t\t\t\t\t\tLulu realizes you are not going to do it. \n\t\t\t\n\t\t\t\t\t\t\t\t\"You idiot!\" She slams her ring encrusted hand into your jaw in a surprise blow. You collapse backward, hatting the wall behind you and knocking yourself out cold. She takes the opportunity to rifle through your pockets and steal some of your cash.\n\t\t\t\t\t\t\t\t*goto stairs\n\t\t\t\t\t\t#This chick is cra-zy. I'm outta here.\n\t\t\t\t\t\t\t*set respect %-5\n\t\t\t\t\t\t\t*set jumpin_the_gun %+5\n\t\t\t\t\t\t\t*set remorse %-5\n\t\t\t\t\t\t\tYou spin around and run through a curtain on the other side of the room—right into the arms of The Pitt's men.\n\t\t\n\t\t\t\t\t\t\tDamn.\n\t\t\t\t\t\t\t*page_break\n\t\t\n\t\t\t\t\t\t\tThey escort you down a hallway, entertaining themselves by bouncing you off the walls like a tennis ball. After a particularly vicious collision, you see a winding staircase ahead of you. That's gotta lead to $!{l_name}, right? $!{l_he}'s locked in a tower, like in a fairytale.\n\t\t\n\t\t\t\t\t\t\tHow tragically romantic.\n\t\t\n\t\t\t\t\t\t\tAs you reach toward the staircase, a giant boot fills your vision. It solidly connects with your jaw, and you lose contact with the here and now. \n\t\t\t\t\t\t\t*goto stairs\n\t\t\t\t#Hell, no! I don't trust this chick.\n\t\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\t\t*set savvy %-5\n\t\t\t\t\t*set paranoia %+10\n\t\t\t\t\t*label lulu_dismisses\n\t\t\t\t\tLulu looks at you for a moment, aggravated.  \"Fine. I was gonna help you…but not if you're going to threaten me with that thing,\" she says, eyeing the sawtooth.\n\t\t\t\t\t*label lulu_dismisses_2\n\t\t\t\t\t*set lulu_doublecross true\n\t\t\t\n\t\t\t\t\tShe pushes a red button on the wall, and The Pitt's men flood the room. Your sawtooth drops to the ground as they pin you against the wall. The biggest goon headbutts you with the strongest skull you've ever come in contact with.\n\t\t\t\n\t\t\t\t\tWhile you're seeing stars, they grab your sawtooth and drag your body out of the room.\n\t\t\t\t\t*goto stairs\n\t\t\t\t#I'll put it in my pocket. But I'm not closing it!\n\t\t\t\t\t*goto hit_lulu\n\t#Refuse, then follow her. I will jump her when she's out of sight of the bouncers.\n\t\t*set jumpin_the_gun %-5\n\t\t*set savvy %+5\n\t\t*label refuse\n\t\tAs you turn your eyes back to the crowd, Lulu steps closer.\n\t\t\n\t\t\"I really think you should come with me. I can help you find what you are looking for….\"\n\t\t\n\t\tShe has officially dropped the drunk act and looks pretty serious.\n\n\t\t*choice\n\t\t\t#I stick to my guns: ignore her and then follow her to somewhere dark.\n\t\t\t\t*set savvy %-5\n\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\t*set remorse %-5\n\t\t\t\t*set lulu_doublecross true\n\t\t\t\tReading the look on your face, she shrugs.\n\t\t\n\t\t\t\t\"Your loss.\"\n\t\t\n\t\t\t\tShe walks toward the back of the revue. You give her some lead time before following suit. Once out of the main room, she walks confidently through the hallways. Music vibrates through the corridors as you pass rooms shrouded in red light. \n\t\t\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Man, I feel like a stalker.\n\t\t\t\t\t\t*set remorse %+5\n\t\t\t\t\t\t*set take_it_to_the_mattresses %-5\n\t\t\t\t\t#I love being a headcrusher!\n\t\t\t\t\t\t*set remorse %-5\n\t\t\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\t\t#Shoulda been a spy…I'm really good at this.\n\t\t\t\t\t\t*set jumpin_the_gun %+5\n\t\t\t\t\t\t*set savvy %+5\n\t\t\t\t*comment endif\n\n\t\t\t\tRounding a corner, you practically run right into Lulu, who is leaning against the wall with one heel propped up, inspecting her nails.\n\t\t\n\t\t\t\t\"Nice of you to show up, pardner.\"\n\t\t\t\t\t\t\n\t\t\t\tSuddenly, you're grabbed by several men behind you. The stalker was being stalked all along.\n\t\t\n\t\t\t\tThey bounce you off the walls like a pinball, each thud echoing through your body. Finally, the biggest goon grabs you by the throat and lifts you off the ground. Your feet kick in the air as you struggle. He doesn't loose his grip until you lose consciousness.\n\t\t\t\t*goto stairs\n\t\t\t#I go with her. She's obviously on my side.\n\t\t\t\t*gosub lulu_takes_you_back\n\t\t\t\t*goto negotiate_lulu\n\t\t\t#I go, but milk her for information first.\n\t\t\t\t*set savvy %-5\n\t\t\t\t*set respect %+5\n\t\t\t\t*set jumpin_the_gun %+5\n\t\t\t\t*set lulu_doublecross true\n\t\t\t\tLike a savvy ${businessman}, you demand a bit more information first. \n\t\t\n\t\t\t\tShe laughs. \"No one demands anything from Lulu Luscious.\"\n\n\t\t\t\tShe winks at someone behind you, and you are grabbed by several of The Pitt's men. Everyone in the room—clients, musicians, dancers, and servers—stops what they're doing to stare as the big goons haul you outside. In the alley, you hear the music start up again to cover the noise.\n\n\t\t\t\tThe Pitt's men pin you against the alley wall. One works you over, while another turns out your pockets. Once they find your sawtooth and the juice, the puncher sizes you up and just about drives your jaw back into your brain. You slide down the wall, unconscious.\n\t\t\t\t*goto stairs\n\n*label lulu_takes_you_back\nShe takes your hand and leads you into the dark bowels of the revue. The sounds of the crowd fade as you as you wander through the complicated maze of corridors, passing cameras that follow your every move. \n*set taken_back true\n\nShe takes you into a red-washed room with white vinyl seats.\n*page_break\n\nLulu shoves you toward the vinyl seats. She stumbles over to the doorway in her transparent stilettos and pulls the curtains closed.\n*return\n\n*label on_vinyl_seats\n*choice\n\t*if (tied_up) #I beg her to untie me.\n\t\t*set respect %-20\n\t\tShe gives you a mocking grin. \"New Orleans' Number One headcrusher is begging me for help? I could get used to this.\"\n\t\t\n\t\tYou try to convince her that it's the only way. She's under the thumb of The Pitt, right?  How does she plan on getting free?\n\t\t*goto stairs\n\t#I tell it like it is. She's just like me—a pawn for the mob.\n\t\t*label bought_lulu\n\t\t*set savvy %+5\n\t\t*set paranoia %-5\n\t\t*set deal_lulu true\n\t\t*set contracts +1\n\t\tLulu Luscious turns around and faces you. Her high pitched voice wavers as she almost trips over her own feet.\n\n\t\t*if tied_up = false\n\t\t\t*if male = false\n\t\t\t\t\"I don't generally do dances for dames around here. As you can tell there's a serious lack of 'em.\"\n\t\t\t*if male \n\t\t\t\t\"Are you ready for your private show?\"\n\t\t\t*comment endif\n\t\n\t\t\tGrabbing her hand, you make her sit down and tell her that what's at stake is much larger than everyone in this revue put together. You sell it to her, hard.\n\t\t\t*page_break\n\t\t*comment endif\n\n\t\tLulu bursts into tears and tells you she's afraid for her life. The Pitt himself is gonna slit her throat if she doesn't delay you here. \n\n\t\t*fake_choice\n\t\t\t#Wow. The Pitt thinks I'm dumb enough to fall for this skirt's waterworks?\n\n\t\t\t#It's a pretty good tactic, but I'm a bit smarter than that.\n\n\t\t\t#I like it—it buys me some time, and I've gotten deeper into the revue.\n\n\t\t\t#Seeing Lulu so scared makes me sick. The mob life is really starting to get to me.\n\t\t\t\t*set remorse %+5\n\t\t*comment endif\n\n\t\tLulu musters up the courage to tell you where The Pitt's office is. A red light suddenly blinks at the corner of the room. \n\t\t*if tied_up\n\t\t\tShe pulls out a knife and slices through the duct tape holding your hands together.\n\t\t\"Go. Now.\"\n\n\t\t*choice\n\t\t\t#I don't need to be told twice! I'm outta here! \n\t\t\t\t*set jumpin_the_gun %+5\n\t\t\t\t*set lulu_alive false\n\t\t\t\t*set remorse %+10\n\t\t\t\tYou dash through the curtain just as a group of The Pitt's men arrive. Lulu tries to delay them as you run down the hallway. A gunshot rings out, bouncing off the narrow hallways.\n\n\t\t\t\tLulu screams once, and you hear a thud. Shoving her fate out of you mind, you concentrate on her directions. After several sharp turns, you arrive at The Pitt's office. As you kick in a large door that reads [b]BIG BOSS MAN[/b], a heavy object connects with the back of your head. \n\n\t\t\t\tThen, darkness.\n\t\t\t\t*goto stairs\n\t\t\t#I tell her to run.\n\t\t\t\t*set remorse %+5\n\t\t\t\t*set jumpin_the_gun %-5\n\t\t\t\t*set remorse %+5\n\t\t\t\t*set take_it_to_the_mattresses %-5\n\t\t\t\t*set lulu_alive false\n\t\t\t\tLulu flat out refuses. She's tired of running, lying, and being used. She takes off her stilettos and laughs.\n\n\t\t\t\t\"I hate these things.\"\n\n\t\t\t\tThe Pitt's men burst into the room. Lulu trips one of them and nails another right in the face with one of her stilettos. They pick her up and throw her against the wall, headfirst. You hear a sickening crack, and Lulu falls to the floor, blood seeping out of her skull.\n\t\t\t\t\n\t\t\t\t*if spurs = true\n\t\t\t\t\t*set clips +4\n\t\t\t\t\t*set spurs false\n\t\t\t\t\tKicking your legs into the air, you slam your sharp spurs into a couple of unsuspecting faces. \n\n\t\t\t\t\tBefore you can do more, though, they pin you to the wall. The biggest goon slams the back of your head against the wall. They rip your spurs off as you lose consciousness.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto stairs\n\t\t\t\t*else\n\t\t\t\t\tThe Pitt's men surround and overwhelm you. You get in a couple of good shots, but they knock you all the way to the moon. \n\t\t\t\t\t*goto stairs\n\t\t\t#I help her save herself.\n\t\t\t\t*set remorse %+10\n\t\t\t\t*set take_it_to_the_mattresses %-5\n\t\t\t\t*set deal_performers true\n\t\t\t\t*set contracts +1\n\t\t\t\t*set lulu_alive false\n\t\t\t\t*set clips +2\n\t\t\t\tLulu is totally hip to your jive and has some ideas of her own. She tells you that the performers will help you if you need it. No matter what happens to her, they've already agreed on it.\n\n\t\t\t\t*if male = false\n\t\t\t\t\tYou do a high five after Lulu tells you she's so pleased that NOLA's Number One headcrusher has been a woman all these years.\n\t\t\t\t*if male\n\t\t\t\t\tAs she gathers materials, Lulu thanks you for being a perfect gentleman. She's not used to that, obviously.\n\t\t\t\t*comment endif\n\n\t\t\t\tQuickly, she lies on the couch and splays her legs, corpse-like. You wrap a bra around her neck, making it look like she's been strangled. \n\n\t\t\t\tWhat a great plan!\n\t\t\t\t*page_break\n\n\t\t\t\tYou dash through the curtain as The Pitt's men show up.  You hide in the room as they are momentarily distracted by Lulu. \n\n\t\t\t\t\"Take her out to the dumpster,\" says the biggest of the goons. \n\n\t\t\t\tLulu opens her eyes and kicks one of the fellas in the face. She jumps up on the couch and leaps onto another guy's back, screaming and choking him with her bra. This gives you time to launch your own attack. \n\t\t\t\t*if spurs\n\t\t\t\t\t*set clips +3\n\t\t\t\t\t*set spurs false\n\t\t\t\t\t*set respect %+10\n\t\t\t\t\tKicking your legs into the air, you slam your sharp spurs into a couple of unsuspecting faces. Blood splatters as you bring your sawtooth around and hit the closest jugular.\n\n\t\t\t\t\tBefore you can do more, though, they pin you to the wall. The biggest goon slams the back of your head against the wall. They rip your spurs off as you lose consciousness.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto stairs\n\t\t\t\t*else\n\n\t\t\t\t\tYou open a couple of necks with your sawtooth, but they quickly overwhelm you and pin you to the wall. The biggest goon gives you a titanic headbutt, knocking you out. The last thing you see is Lulu's purpling face as they strangle her to death. Then, darkness.\n\t\t\t\t\t*goto stairs\n\t*if (tied_up = false) #I trust my sawtooth. It's never let me down.\n\t\t*set jumpin_the_gun %+5\n\t\t*set savvy %-5\n\t\t*if respect > 55\n\t\t\t*set clips +1\n\t\t\t*label lulu_terrified\n\t\t\t*set lulu_alive false\n\t\t\t*set deal_performers true\n\t\t\t*set contracts +1\n\t\t\tGrabbing her tiny wrist, you show her the sawtooth and demand answers. Shocked beyond comprehension, Lulu struggles for words, her knees buckling underneath her.\n\t\n\t\t\tShe trips over her stilettos, and her wig flies off in the shuffle, revealing bright pink hair. She suddenly collapses…right onto the sawtooth.\n\t\n\t\t\tShit.\n\t\t\t*page_break\n\t\n\t\t\tLowering her down on the vinyl seats, you discover the sawtooth has penetrated deeply into her abdomen. You apply pressure to the wound as blood pours into her white dress. She grabs your hand and whispers.\n\t\n\t\t\t\"The performers—they'll help you…if you get into trouble.\"\n\n\t\t\t*fake_choice\n\t\t\t\t#Feeling pretty guilty right now.\n\t\t\t\t\t*set remorse %+10\n\t\t\t\t#War ain't pretty, baby.\n\t\t\t\t\t*set remorse %-10\n\t\t\t\t#Maybe she'll survive.\n\t\t\t\t\t*set remorse %+5\n\t\t\t*comment endif\n\n\t\t\tLulu dies in your arms just as The Pitt's men enter the room. They rip the sawtooth out of Lulu's body and throw you into a wall. Your head slams back with a solid crunch.\n\t\n\t\t\tYou hit your knees, and the world falls away. Then, darkness. \n\t\t\t*goto stairs\n\t\t*else\n\t\t\t*goto lulu_dismisses\n\t#I scream for The Pitt. Pretty gutsy move…but he just might hear me.\n\t\t*set respect %-10\n\t\t*if tied_up\n\t\t\t*set wounds +1\n\t\t\t\"You fucking idiot,\" she says, once you've finished screaming your head off.  \"${l_name} asked me to help you—to let you know ${l_he}'s here, upstairs. And there you go….\"\n\t\t\t\n\t\t\tHer words trail off as the door opens. It seems that The Pitt's men are back, and they're excited to see you.\n\t\t\t\n\t\t\tThey start to beat on you, and within a few minutes you've lost your grip on reality.\n\t\t\t*goto stairs\n\t\t*elseif jumpin_the_gun >= 60\n\t\t\t*set lulu_doublecross true\n\t\t\tWhile you yell, you check the entire room and see a curtain on the other side. Behind it is a hallway that runs into a staircase at the end. That's gotta lead to the office somehow.\n\t\t\t\n\t\t\tTurning around, you see Lulu behind you, shrouded in red light. As if this was some bad slasher flick, she lifts up her stiletto and hits you in the face with it.\n\t\t\t*page_break\n\n\t\t\tStunned, you fall through the curtain behind you, grabbing at the velvet. It rips off the door frame and shrouds you in softness as you hit the floor. Lulu gets on top of you and wraps the curtain around your face. You try to crawl down the hallway, but Lulu's weight and lack of air impede you. Unable to escape, you lose consciousness.\n\t\t\t*goto stairs\n\t\t*else\n\t\t\t*set contracts +1\n\t\t\t*set deal_performers true\n\t\t\tYour lungs expand with air as you prepare to shout for The Pitt. Suddenly, you feel a hard smack on the back of the head. You turn around to see Lulu with her fingers to her lips.\n\n\t\t\t\"Ugh! $!{men} sometimes!\" She throws her hands up in the air, and then stops suddenly. Listening to see if anyone is coming, she sighs and puts her hands on her hips, dropping the drunk act. \n\n\t\t\t\"So…you're the big mean headcrusher everybody's been talking about.\n\t\t\t*if male = false\n\t\t\t\tAnd all this time, it's been a chick! That's awesome.\"\n\t\t\t*if male\n\t\t\t\tHuh…pretty cool.\"\n\t\t\t*comment endif\n\n\t\t\t\"I know what you're here for,\" she explains. \"All of us girls have our own ideas of what's wrong and right. And what The Pitt's doing…it's not right. We'll help you, as long as you help us get rid of him.\"\n\n\t\t\tThe Pitt's men burst in the room, shoving Lulu out of the way. \n\t\t\t*if spurs\n\t\t\t\t*set clips +2\n\t\t\t\t*set spurs false\n\t\t\t\tKicking your legs into the air, you slam your sharp spurs into a couple of unsuspecting faces. Blood splatters all over the screaming Lulu.\n\n\t\t\t\tBefore your can do anything else, though, they pin you to the wall. The biggest goon chokes you until you lose consciousness. The last thing you remember is them ripping off your spurs.\n\t\t\t\t*goto stairs\n\t\t\t*else\n\t\t\t\tShe screams fearfully as they give you a beating of a lifetime. In a matter of minutes, everything goes black….\n\t\t\t\t*goto stairs\n\t*if (desire = 4) #I ask her straight out where ${l_name} is.\n\t\tLulu looks you up and down.\n\t\t*if savvy >= 60\n\t\t\t*set contracts +1\n\t\t\t*set deal_performers true\n\t\t\t*set deal_lulu true\n\t\t\t*if male = false\n\t\t\t\t\"So all this time…NOLA's Number One headcrusher has been a woman? That's pretty inspiring….\"\n\t\t\t*if male \n\t\t\t\t\"I didn't expect the lead headcrusher to be like…this….\" She laughs, folding her arms.\n\t\t\t*fake_choice\n\t\t\t\t#\"What's wrong with the way I look?\"\n\n\t\t\t\t#\"Yeah, yeah. I get that all the time.\"\n\n\t\t\t\t#\"At least I don't look like a cheap imitation of Marilyn Monroe.\"\n\t\t\t*comment endif\n\n\t\t\tLulu tells you what she knows about ${l_name} and The Pitt. All the performers know that ${l_name} is being kept somewhere in the revue and that some pawn—that's you—has been sent by The Bull to save ${l_him}.\n\n\t\t\tLulu lets you know the performers will help you if and when this fight spreads to the rest of the revue, but only if they get their fair share of The Pitt's profits. They've put up with short paychecks, unfair splits, and bad treatment long enough. Just because they're strippers doesn't mean they don't work hard, and they deserve to keep what they've earned.\n\n\t\t\tAnd this is just the right opportunity.\n\t\t\t*page_break\n\n\t\t\tAs you shake her hand, a red light in the corner starts to blink. Fear flashes across Lulu's face.\n\n\t\t\tShe tells you The Pitt's office is through the curtain, and gives directions. \"Take a right. Another right. Left. Down the stairs. Then right.\" She hits the floor as you head out.\n\n\t\t\tYou run through the curtain and bounce right off The Pitt's men, who are waiting on the other side. Before you can do anything, a large man with bad breath gets you into a stranglehold.\n\n\t\t\tDarkness follows. \n\t\t\t*goto stairs\n\t\t*else\n\t\t\t*goto hit_lulu\n\n*label stairs\n*page_break\n*set wounds +1\nAs you fade in and out of consciousness, you feel yourself dragged through a series of hallways, down a short set of wooden stairs that leave splinters in your shoulder blades, and then onto rough, cold cement. The smells of old damp wood, red wine, rusted metal, cigars, and dried blood seep into your nostrils.\n\nYou are in the thick of it now—the deepest, darkest underbelly of NOLA's gangland. Good thing you dressed the part.\n*finish", "rebirth": "*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]NOLA is Burning[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n*temp foolish_attack false\n*temp gp_with false\n*temp stump \"stump\"\n*temp thingy \"thingy\"\n*temp limb \"limb\"\n*temp limbss \"limb\"\n*if two\n\t*set stump \"stumps\"\n\t*set thingy \"thingies\"\n\t*set limbss \"limbs\"\n*if two = false\n\t*set limbs appendage\n[b]Chapter Nine: Rebirth[/b]\n\n*if deal_devil\n\tUnfortunately, there are no tunnels of light for scumbags like you. What you get is an elevator straight down to hell—a creaky, janky, DC-powered elevator with a strange little…man?…in a bellhop outfit operating the lever.\n\t\n\tYou stand up a little straighter and adjust your suit as best you can. Looking down, you notice that it's in tip-top shape, like tonight never happened.\n\n\t*fake_choice\n\t\t#It was all a nightmare…a terrible nightmare!\n\t\t\tYou'd like to think that, wouldn't you?  But even as you keep telling yourself that, you know that it's a lie. Tonight has been all too real.\n\t\t#I must be dreaming in the dumpster—or maybe hallucinating is a better word.\n\t\t\tYour surroundings are certainly surreal, but you can't just dismiss it as a dream. Something else is going on.\n\t\t#I'm dead. And that means this must be….\n\t\t\tYou have no doubts about the fate of your soul. The only question is when does the ominous anticipation end and the screaming in a lake of fire begin?\n\t\n\tYou reach for your sawtooth—an unconscious gesture—and discover that it's not in your pocket.\n\t*if paranoia > 50\n\t\tSomeone musta stolen it!\n\t*if paranoia \u003c= 50\n\t\tCould you have lost it somewhere?\n\t*comment endif\n\t\n\tAs the elevator continues to rattle downward, you try to take your mind off your fate. You look at the bellhop and consider starting a conversation, but after seeing his face you think better of it. Instead, you finger the material of your suit, pleased but worried about the lack of slashes and bloodstains.\n\n\tThe rear wall of the elevator is mirrored; you're admiring your new hat and wondering if you'll be able to keep it when the elevator finally comes to a smooth stop. The bellhop opens the door and gestures for you to step out of the elevator into a long hallway. The doors slide shut behind you. \n\n\tLittle lights on the floor of the hallway—like on an airplane—indicate your path. You square your shoulders, fighting down a surge of terror, and follow the lights until they turn red outside a door with a smoky glass window. \n\n\tWith a sigh, you push it open.\n\t*page_break\n\t*temp its \"it's\"\n\n\tBehind a desk sits a woman—or something like that, anyway. \n\t\n\t\"Oh, ${name}, it's a pleasure to finally meet you.\" She says it so matter-of-factly that you can't determine if she's being sarcastic, kissing your ass, or naturally polite. She gestures to a seat without looking up.\n\t\n\t\"And you are?\" you say, sitting in the chair she indicated.\n\t\n\t\"I'm…well, you couldn't pronounce my name, so let's not try. You can call me Jane. And let me tell you, we have big plans for you down here.\" You sit up a little straighter in your chair. \"Or we did, anyway.\" Suddenly, you realize that your suit is conspicuously limp.\n\t*if two\n\t\t*set its \"they're\"\n\t\tThose limbs you were missing? They're gone again.\n\t*if two = false\n\t\tThat limb you were missing? It's gone again.\n\t*comment endif\n\t\n\tYou feel your ${stump} and take some small comfort in the fact that ${its} not still bleeding.\n\n\t*page_break\n\t\n\t\"As I was saying, we had such plans for you. But here you are, an early arrival, your potential cut short.\" She smiles for the first time, finally raising her eyes from her paperwork to look at you. \"Pardon the pun.\"\n\t\n\t\"So I'm dead, and you're making jokes.\"\n\t\n\tShe shakes her head, ignoring your interruption. \"The Big Kahuna has plans for you. So the question is, are you willing to do what it takes?\"\n\t\n\t\"What do you mean?\"\n\t\n\t\"We're willing to send you back to finish your mission. And when you're done, we just might find a nice middle-management job for you down here. What do you say?\"\n\t\n\t*choice\n\t\t#The Bull is counting on me; I must complete my mission.\n\t\t\t*set jumpin_the_gun %-10\n\t\t\t*set paranoia %-10\n\t\t\t*set respect %+10\n\t\t\t*goto accept_devils_deal\n\t\t#Vengeance will be mine.\n\t\t\t*set remorse %-20\n\t\t\t*set jumpin_the_gun %+15\n\t\t\t*goto accept_devils_deal\n\t\t*if (desire = 4) or ((ls_affection = 1) or (ls_affection = 3))\n\t\t\t#Yes, anything to save ${l_name}.\n\t\t\t\t*set remorse %+20\n\t\t\t\t*set jumpin_the_gun %-5\n\t\t\t\t*label accept_devils_deal\n\t\t\t\t*set contracts +1\n\t\t\t\t*set dragon \"demon\"\n\t\t\t\t*set weapon \"demonic appendage\"\n\t\t\t\t*achieve demon\n\t\t\t\t*if two\n\t\t\t\t\t*set weapon \"demonic appendages\"\n\t\t\t\t*set wounds -2\n\t\t\t\t*set deal_devil true\n\t\t\t\tJane smiles. \"Good. Now, let's see about\n\t\t\t\t*if two\n\t\t\t\t\tthose missing limbs of yours, shall we?\"\n\t\t\t\t*if two = false\n\t\t\t\t\tthat missing limb of yours, shall we?\"\n\t\t\t\t*comment endif\n\t\t\t\t\n\t\t\t\tA capsule arrives in the pneumatic tube behind her. She takes the capsule out, opens it, and pulls out a document. \"Can you imagine? I have to fill out this requisition form…in triplicate.\" She sighs. \"The things I do for my charges.\"\n\t\t\t\t\n\t\t\t\tShe fills out the necessary paperwork and puts it back into the capsule, which is then whisked away by the vacuum tube. She turns her attention back to the documents in front of her. \n\t\t\t\t*if jumpin_the_gun \u003c= 50\n\t\t\t\t\tYou resist the urge to rap your fingers on the arm of your chair.\n\t\t\t\t\t\n\t\t\t\t*if jumpin_the_gun > 50\n\t\t\t\t\t\"Is it going to take very long?\" you inquire. \"I do have places to go and people to kill.\"\n\t\t\t\t\n\t\t\t\t\t\"It shouldn't be long now.\"\n\t\t\t\t\t\n\t\t\t\t\tAnd she's right.\n\t\t\t\t*comment endif\n\t\t\t\tAfter another minute or so, you begin to scream.\n\t\t\t\t\n\t\t\t\tFrom your ${stump}, something has started to grow. You look down to see your suit starting to fill out again.\n\t\t\t\t*if (has_dominant_arm = false) \n\t\t\t\t\tYou raise your ${dominant} arm, holding it up so you can witness the unholy appendage emerging from the sleeve of your suit. Every moment is excruciating until, finally, there it is. A hand! Attached to an arm!\n\t\t\t\t*if (has_weak_arm = false)\n\t\t\t\t\tYou raise your ${weak} arm, holding it up so you can witness the unholy appendage emerging from the sleeve of your suit. Every moment is excruciating until, finally, there it is. A hand! Attached to an arm!\n\t\t\t\t*if (has_dominant_arm) and (has_weak_arm)\n\t\t\t\t\t*if has_dominant_leg\n\t\t\t\t\t\tYou extend your ${weak} leg,\n\t\t\t\t\t*if has_weak_leg\n\t\t\t\t\t\tYou extend your ${dominant} leg,\n\t\t\t\t\tholding it so you can watch the unholy appendage emerging from the leg of your suit. Every moment is excruciating until, finally, there it is. A foot! Attached to a leg!\n\t\t\t\tBut made of charred flesh and molten fire.\n\t\t\t\t*achieve poweroverwhelming\n\t\t\t\t\n\t\t\t\tSuddenly, you realize your screaming has stopped.\n\t\t\t\t\n\t\t\t\t\"You can go now,\" Jane says. You stand\n\t\t\t\t*if (has_dominant_leg) and (has_weak_leg)\n\t\t\t\t\tup,\n\t\t\t\t*if (has_dominant_leg = false) or (has_weak_leg = false)\n\t\t\t\t\tup gingerly, testing the new leg,\n\t\t\t\tand Jane waves you out of her office.\n\t\t\t\t\n\t\t\t\t\"And what is it that you want, exactly?\" you say, hand on the doorhandle.\n\t\t\t\t\n\t\t\t\t\"The Pitt. And the Bull. Dead.\"\n\t\t\t\t\n\t\t\t\t*if desire = 4\n\t\t\t\t\tYou don't hesitate for a moment.\n\t\t\t\t\"Understood.\"\n\t\t\t\t*if desire = 4\n\t\t\t\t\tYou'll do whatever it takes to save ${l_name}.\n\t\t\t\t*comment endif\n\t\t\t\t\n\t\t\t\tEmerging from the office, you find the lights leading you back toward the elevator. When the lattice opens, the bellhop is clearly surprised to see you again. You flex your new ${appendage} for him, and he gestures for you to come aboard.\n\t\t\t\t\n\t\t\t\tAnd there you are, rising back up through the layers of hell.\n\t\t\t\t*page_break\n\t\t\t\tWhen you wake up, you are in the back of a dump truck. It must be trash day. Looking down, you see that it wasn't a dream. \n\t\t\t\t*if two\n\t\t\t\t\tYour severed ${limbs} have been replaced by ${weapon},\n\t\t\t\t*if two = false\n\t\t\t\t\tYour severed ${limbs} has been replaced by a ${weapon},\n\t\t\t\twhich means you have a job to do.\n\t\t\t\t*if letter_l\n\t\t\t\t\tBut first, you dig around to locate the letter from ${l_name}, stuffing it back into your pocket.\n\t\t\t\t*comment endif\n\t\t\t\t\n\t\t\t\tThe next time the truck stops, you get a grip on the edge and pull yourself out. You land neatly on the street next to the garbage man, whose cigarette drops from his mouth in shock. You pick it up, take a drag, and return it to him.\n\t\t\t\t\n\t\t\t\tYou have business to attend to.\n\t\t\t\t*if (heat > 65) or security_missing\n\t\t\t\t\t*goto encounter_cops\n\t\t\t\t*else\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto kick_ass\n\t\t#I'm done. I don't want to kill anymore. I tell her no and accept the consequences.\n\t\t\t*if remorse > 65\n\t\t\t\tSuddenly, the room starts to change colors. Jane's eyes go wide. \"No…it can't be.\"\n\t\t\t\t\n\t\t\t\tYou start to float above your chair, just a little—less than a centimeter.\n\t\t\t\t\n\t\t\t\tJane pounds her hand on her desk, and sirens begin to blare. As she starts screaming, you float a little higher.\n\t\t\t\t\n\t\t\t\tThe walls of the room fall away, revealing numberless monstrosities. They surround you, pulling and clawing at you with talons, tentacles, and things more gruesome, but they cannot touch you. You float a little higher still.\n\t\t\t\t\n\t\t\t\tJane's mouth opens and an impossibly long tongue shoots out to wrap around your leg. But it recoils when it touches you, burnt by unseen flames.\n\t\t\t\t\n\t\t\t\tAnd suddenly you're shooting up through the brimstone clouds.\n\t\t\t\t*page_break\n\t\t\t\t*achieve purgatory\n\t\t\t\tAn androgynous figure, dressed in robes of immaculate white that somehow seem to shimmer with a rainbow of colors, nods as you arrive.\n\n\t\t\t\t\"I'm going to Heaven? After all I've done?\"\n\n\t\t\t\t\"Heaven?  O, dear me, no.  Or at least, not yet. It's Purgatory for you. You carry too much sin to progress on just yet. But your remorse has redeemed you.\"\n\t\t\t\t\n\t\t\t\tWell, your remorse and a few hundred years of hard labor. But that's something, right?\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene wrap_up\n\t\t\t*else\n\t\t\t\tShe shakes her head sadly, returning her eyes to her paperwork. \"And we had such high hopes.\"\n\t\t\t\t\n\t\t\t\tHer mouth opens and an impossibly long tongue shoots out, touching a spot below the lip of the desk to her right.\n\t\t\t\t\n\t\t\t\tYour seat gives way beneath you, and you fall into a lightless chute.\n\t\t\t\t*page_break\n\t\t\t\t*achieve brick\n\t\t\t\tOver the next few—hours? months? centuries?—your body is heated to an infernal temperature and poured into a brick mold. You are stacked on a pallet along with millions of other soul-bricks and put into storage for a time. \n\n\t\t\t\tEventually, the pallet is removed, and you and your neighbors are used to line the floor of a new urinal outside Satan's Palace. It's a public urinal for demon-pilgrims, built through the beneficence of the Prince of Darkness, to keep them from soiling the roses.\n\t\t\t\t\n\t\t\t\tIt's good to know you're helping to clean up the streets even now.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene wrap_up\n\t\n*if cat_help\n\t*set wounds -3\n\tColdness invades your remaining extremities, a coldness that exists only in the cemeteries of NOLA, but you can still feel the faint prickle of feline feet on your chest. Feral cats cut into the black bag with their sharp claws, mewing to show they understand your situation. They snuggle up to you, keeping you warm in the night. Softness in death—how perfect is that?\n\t\n\tAs the wild felines purr and lick your face to keep you awake, you struggle to keep your eyes open. If you weren't dying, you'd almost say that their attentions were making you feel better. But the truth is that you're bleeding out your life in a dumpster. In a way, it's comforting, you suppose. You're far away from the torture and the harsh realities of life.\n*comment endif\n\nEven though New Orleans can be harsh and cruel, it really does love you with all its being. It's given you a good run.\n*page_break\n\nWhen you finally allow your heavy eyes to close and let go once and for all, the lid flies open. \n\n*if dragon_assistance\n\t*if cat_help = true\n\t\tSeveral hands bat away the cats trying to protect you. \n\tThey pull the trash bag containing you out of the dumpster, and you get a taste of cool night before the bag is placed in the back of large vehicle. An unseen driver slams on the gas, spinning the wheels in true getaway fashion.\n\n\tA babble of voices, both male and female, washes over you, but the trash bag around you and the searing pain inside you makes them hard to understand.  \n\n\tOne thing is for sure, though: they want to help.\n\n\tThe vehicle turns sharply, and you roll to the side. Hands grab you before you can whack the side of the vehicle, and a woman yells harshly at the driver. As you notice the weird agro-pop music blasting, something wet and sticky is applied to your wounds. It warms you at first, but then burns like fire. Your face is covered in something scratchy that makes your eyes and nose burn. \n\n\t*fake_choice\n\t\t#I wish I was back in the dumpster. It's the only peace I've gotten all night.\n\t\t\tYou take your time before opening your burning eyes. Your vision slowly comes back.\n\t\t\t*goto surrounded\n\t\t#Awesome! Who the hell knows where I'll end up next?\n\t\t\tYou breathe deeply and open your eyes. \n\t\t\t*goto surrounded\n\t\t#After all I've lost tonight, this could turn out quite interesting….\n\t\t\tYou open your eyes, curious to see who you are surrounded by.\n\t\t\t*goto surrounded\n\t\t*if (desire = 1) #Nobody puts baby in the corner! \n\t\t\tIgnoring your weakness, you snap your eyes open with a glare. \n\t\t\t*goto surrounded\n\n\t*label surrounded\n\tSurrounding you are several men and women, speaking a language you don't understand. They clap their hands to test your reactions. From their babble, you manage to pick out something about The Dragon.\n\n\tThe Dragon! Of course!\n\t*page_break\n\n\tThe driver slams on the brakes, stopping the vehicle with a screech. They carry you inside the decaying green building you visited only hours ago, and set you down in the room where you had exposed your deepest secrets. The handmade yellow dragon hanging from the ceiling stares deep into you once more. \n\n\tThis time, instead of examining you, its eyes bore into you, paying tribute to your extreme determination and focus. \n\t*label gutterpunks_dragon\n\n\tThe pungent smell of medicinal plants reaches you. All around you, the Dragon's people are cutting leaves and grinding odd looking flowers into small po
