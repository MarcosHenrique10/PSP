em, Sandwich Man starts to gag and choke. He can't breathe. Grabbing his bulging throat, he makes it clear that he's on the verge of choking to death.\n\t\n\t\t\tHe needs help, and he needs it now.\n\t\n\t\t\tThe other goons freeze, not sure what to do. Should they help him, and give you a chance to escape? Or should they let him die? They start to argue with you right in the middle.\n\t\t\t*choice\n\t\t\t\t#I gotta help the guy. And hey, it might buy me some time.\n\t\t\t\t\t*set respect %+5\n\t\t\t\t\t*set remorse %+10\n\t\t\t\t\t*set take_it_to_the_mattresses %-10\n\t\t\t\t\t*set heimlich true\n\t\t\t\t\t*achieve heimlich\n\t\t\t\t\tYou get their attention and tell them you can help. You've taken a course or two in emergency first aid, after all….\n\t\t\t\t\t\n\t\t\t\t\tThey hesitate, starting to argue again as their colleague continues to choke in the corner. You put up your hands, promising no funny business.\n\t\n\t\t\t\t\t\"Fine! Hurry up!\" \n\t\n\t\t\t\t\tThey push you towards the dying Sandwich Man.\n\t\t\t\t\t*page_break\n\t\n\t\t\t\t\tYou open his mouth and clear out the bits of sandwich lodged in his throat, including a slimy pickle. Gross.\n\t\n\t\t\t\t\tAs you administer the Heimlich maneuver, he coughs up a big piece of salami and turns on his side, hacking away. Satisfied, you pat his upper back softly, until you are grabbed by the collar and dragged away. You hear the sound of footfalls on the stairwell.\n\t\n\t\t\t\t\tThe boss is comin'.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto the_pitt\n\t\t\t\t#I let the bastard die! He shoulda known never to eat on the job.\n\t\t\t\t\t*set remorse %-10\n\t\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\t\t*set clips +1\n\t\t\t\t\tOoh. Them's fighting words!\n\t\n\t\t\t\t\tYou laugh as good ol' Sandwich Man chokes to death, laugh long and hard…until the other goons sucker punch you.\n\t\n\t\t\t\t\tAs the beating commences, Sandwich Man spasms desperately in the corner, his face purpling. His colleagues have forgotten him, however, in their haste to take their aggression out on you.\n\t\n\t\t\t\t\tSuddenly, the punches and kicks stop, and the goons—even Sandwich Man in his last extremity—turn to face the stairs.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto the_pitt\n\t\t\t\t#I gotta look out for Number One. I might be able to escape while they're distracted. \n\t\t\t\t\t*set respect %+5\n\t\t\t\t\t*set take_it_to_the_mattresses %+5\n\t\t\t\t\t*set savvy %-10\n\t\t\t\t\t*set clips +1\n\t\t\t\t\tAs they push and shove each other, you jump into the argument, adding fuel to the fire. How could they let one of their own die?\n\t\n\t\t\t\t\tWho knew you had the makings of a sociopath?\n\t\n\t\t\t\t\tThat's smart.\n\t\t\t\t\t*page_break\n\t\t\t\t\tAs their colleague chokes to death in the corner, the goons jump into a full-blown fight…with each other. Ah, testosterone. Sandwich Man's corpse lies still in the corner. He took one for the team.\n\t\n\t\t\t\t\tYou make a run for the stairs. You're almost scot-free when your forehead impacts heavily with a silver- and gold-plated cane.\n\t\n\t\t\t\t\tYou collapse back down the stairs into the waiting arms of one of The Pitt's men. Apparently, the fight ended pretty quickly. Now they freeze in place as footfalls sound on the stairs. \n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto the_pitt\n\t*if (desire = 1) #I tell 'em I'll be runnin' this town one day.\n\t\t*set jumpin_the_gun %+5\n\t\t*set remorse %-5\n\t\t*set respect %+5\n\t\tYou get their attention and look each one dead in the eye. \"You don't know who you're messin' with, but I'll give you a chance to do the right thing,\" you say. \"I'm gonna be runnin' this town one day, and when I am, I'll remember what happened here.\"\n\n\t\tThey give you a long, considering look. And then they erupt in laughter. Sandwich Man laughs so hard that salami falls out of his mouth. They take turns kicking you in the ribs, and you try to curl into a ball, pain ripping through your abdomen.\n\t\t*if letter_l\n\t\t\tOne of them grabs ${l_name}'s note out of your pocket and reads it out loud, mimicking ${l_his} voice to tease you.\n\t\t*comment endif\n\n\t\tFootsteps hit hard on the staircase leading to the cellar from the club. The goons grab you and whip you around to look at who's comin'.\n\t\t*page_break\n\t\t*goto the_pitt\n\t#I reason with 'em. I appeal to their insecurities.\n\t\t*set jumpin_the_gun %-10\n\t\tSitting up with extreme effort, you interrupt their conversation to ask them why they work for someone like The Pitt.\n\n\t\tThey stop mid-sentence, staring at you.\n\n\t\tThe one who can't stop spitting cocks his eyebrow. \"Are we gettin' soft? You should be half-dead.\"\n\t\t*page_break\n\n\t\tYou ignore him and ask again why they work with someone who will turn on them as soon as it profits him or even just to shake things up. You remind them that The Pitt is proud of his history: double-crossing everyone; inflicting unnecessary pain for the pleasure of it; stealing from people with nothing and sucking up to the high rollers. You warn them that he didn't build his mob to protect himself or to make the rackets run smooth, but to validate his ego and give him life-and-death power over others.\n\n\t\tEven for hardened mob goons like this, working for someone with no trust or love in his heart is a scary thought.\n\n\t\tThey exchange looks, back and forth, gears turning in their minds. They've got families to support, and The Pitt pays them good…kinda. Not enough, really. Okay, sometimes they don't get paid.\n\n\t\tBut they are getting paid tonight—for you. And that's dirty cash they can take home. That's what it all comes down to.\n\n\t\tHearing footsteps on the staircase, the goons grab you and whip you around to look at who's comin'.\n\t\t*page_break\n\t\t*goto the_pitt\n\n*label the_pitt\nThe clicking of steel-toed boots and the tapping of a silver- and gold-plated cane serve as an impromptu drumroll for The Pitt's grand entrance. He bursts into the room, a monument to ghetto fabulousness and living proof that wealth does not confer taste. \n\nJewel-encrusted rings cover his knuckles, and rhinestones line the seams of his crushed-velvet suit. His hat is almost like a crown, deep purple fabric highlighted with yet more jewels and precious metals. He breathes in satisfaction, not realizing, or maybe not caring, that he looks like a caricature of a pimp straight out of the 70s. \n\nThe little weasel smiles his signature crooked smile, thin lips stretching over his rotting teeth.\n\n\"Oh, sweet, sweet ${name}…you look like hell. Did you wake up on the wrong side of the canal with a lonely Benjamin in your pocket and a ${bottle} of ${canal_bottle} in your hand?\" \n*page_break\n\nHis men hand him your sawtooth. \n*if letter_l\n\t*set respect %-10\n\tThey also hand him the note that ${l_name} wrote to you. He reads it out loud and they all have another good laugh at your expense.\n*comment endif\n\nThe Pitt walks closer, the tip of his cane hitting the floor with a sound like a gunshot every time he takes a step.\n\nHe makes his disappointment known that The Bull didn't come out to play, but he's overjoyed that the most dangerous mobster in New Orleans sent ${bull_his} only ${son} to do ${bull_his} dirty work.\n\nHow delightfully unfortunate for you.\n\n*if spurs = false\n\tHe snorts a large quantity of coke conveniently stashed in the gold locket hanging from his neck. \n*if spurs\n\t*set spurs false\n\t*set respect %+15\n\tKicking your leg into the air, you slash your spur into The Pitt's side. He screams out and hugs his abdomen, while his men grab your legs and tie them together to keep you from moving. Falling against the far wall, The Pitt breathes hard, face pale. He looks at the blood covering his fingers, and his fear turns to anger.\n\t\n\tHis shaky hand reaches up to a gold locket hanging from his neck. Opening it, he takes a huge snort of the coke stashed inside and silently prays for the pain to go away. After a moment, he shakes his head as the coke hits his system.\n*if pitts_crime = \"animals\"\n\tHe wipes his nose and starts raging about how he was never allowed to have pets after you stopped him from punishing the stupid border collie that crapped on his lawn. You try to explain that just because he's a made man, that doesn't give him the right to torture a dog to death; but he stomps his feet like a child and ignores you.\n*if pitts_crime = \"ruby\"\n\tHe wipes his nose and yells about how miserable he was when you forced him to hang out with that mentally handicapped kid—Ruby.\n\n\tYou start to explain (again) that Ruby is physically handicapped, not mentally handicapped, but you quickly realize that he's not listening.\n*if pitts_crime = \"arson\"\n\tHe wipes his nose and goes into a diatribe about how that annoying neighbor deserved to go up in flames that night. \n*if pitts_crime = \"communion\"\n\tHe wipes his nose and starts to giggle. He tells you how funny it would have been if you had just let him piss in the sacramental wine on the regular when he was a kid. What a riot that would have been! \n*comment endif\n\nHis men lift your aching body up to the wooden table and strap you down. Ignoring your demands to see ${l_name} and stop this insanity before it's too late, The Pitt rubs coke dust on his gums and waves your sawtooth in the air like an excited bingo winner.\n\n\"I'm gonna give you a choice, headcrusher. What would you rather lose? Your right arm? Left arm? How about a leg?\"\n\nHe can't be serious.\n\nCan he?\n*page_break\n\n\"Choose a limb!\" \n\nHe slams his fist into the table in a flash of coke-induced anger. He's so close now that you can smell his awful cologne. This isn't about ${l_name} or The Bull anymore. This is payback. It's pure vengeance.\n*if desire = 1\n\tOn the bright side, the underworld of NOLA will surely give you a wide berth if you survive The Pitt's chamber of horrors and still manage to take over the city.\n*if desire = 2\n\tYou have long feared the consequences of your sins. It seems the time the time has come to account for them.\n*if desire = 3\n\tDamn. You should have split like a banana when you had the chance. \n*if desire = 4\n\t$!{l_name}'s face flashes in your mind. Would ${l_he} still love you if you were missing a limb?\n*comment endif\n\nAll those years of headcrushing have finally caught up to you—and it's a bitch.\n\n*if fear_limb = true\n\tCold sweat prickles on your skin, and you begin to shake. One of your worst fears is about to come true…and there might be nothing you can do about it. The Pitt notices the effect he's having on you, and his mouth curls into a satisfied smile. He's got you pinned.\n*comment endif\n\n*if heimlich\n\t*set took_red_birds true\n\tWhile The Pitt isn't looking, Sandwich Man slips you one of Father Confessor's redbirds. Small mercies, you suppose.  \n\t\n\tThe pill hits your system immediately—your heart pounds a million miles a minute. The redbird makes your eyes bug out of your skull, but it'll take the edge off of what's to come.\n*comment endif\n\n*choice\n\t#I'm not talking. I may not be able to stop him, but I'm sure as hell not going help him. \n\t\t*set wounds +2\n\t\t*set savvy %-10\n\t\t*set take_it_to_the_mattresses %-10\n\t\t*set jumpin_the_gun %+10\n\t\t*set appendage \"${dominant} leg\"\n\t\t*set missing_leg true\n\t\t\"Fine. Be that way.\"\n\n\t\tThe Pitt flicks his wrist and tells his men to get to work. It's their choice what they remove.\n\n\t\tOh no.\n\t\t\n\t\tAs you try to break the straps keeping you tied down, they approach the table with the sawtooth, your sawtooth. \n\n\t\tAfter some deliberation, they choose your ${dominant} leg.  \n\t\t*set has_dominant_leg false\n\n\t\tCarefully placing your own sawtooth on the upper thigh of your ${dominant} leg, they cut past the thin fabric of your suit and into the flesh. They pass the skin and dig into the meat of your leg. Deeper and deeper they cut, working their way toward the bone.\n\n\t\tWhite-hot pain courses through you, and sweat runs off your body in rivers. Your fingers dig into the wooden table, and your blood drips onto the cement. You scream and scream. \n\n\t\t*choice\n\t\t\t#This is excruciating!\n\t\t\t\tGrit your teeth, headcrusher.\n\t\t\t\t*goto music\n\t\t\t#I think I'm going to be sick.\n\t\t\t\tThat's a totally natural thing. You've certainly seen it before!\n\t\t\t\t*goto music\n\t\t\t#I don't think I can take much more of this torture.\n\t\t\t\tPayback really is a bitch, isn't it?\n\t\t\t\t*goto music\n\t\t\t#This is all they've got?\n\t\t\t\tYeah! Get after it, sport!\n\t\t\t\t*goto music\n\t\t\t*if (desire = 2) #If I make it through this, perhaps I can finally forgive myself….\n\t\t\t\t*goto music\n\t\t*label music\n\n\t\tMusic from the club upstairs insinuates itself into your senses, while The Pitt cackles in the corner. This really could be the end of the line for you. A missing limb is nothing to walk away from—no pun intended—and you knew the consequences of starting on this mission. The fact that you've come this far is truly phenomenal, and the night isn't over yet.\n\n\t\tIf you do survive this, you'll be changed forever…and not just physically.\n\n\t\t*fake_choice\n\t\t\t#I deserve this. Being a headcrusher is horrible.\n\n\t\t\t#This is just some sick bastard's revenge!\n\n\t\t\t#Bring it on, baby! I'm a survivor.\n\n\t\t\t#I'll just think of ${dreams}.\n\t\t*comment endif\n\n\t\tYou barely notice the light swinging above you, as shock settles in to help ease the pain. The Pitt's men finish up the bloody job, holding your ${appendage} in the air like a prize. The Pitt gives them a thumbs up and snorts more coke, giggling to himself like a schoolgirl.\n\n\t\t*if respect \u003c= 60\n\t\t\tHe takes your sawtooth as a prize and leaves the room, telling them to get rid of your body.\n\n\t\t\tIt's over. It's finally over. Soon, it will be sweet release.\n\t\n\t\t\tThey place you and your ${appendage} in an industrial strength black plastic bag. Then, they drag you up the stairs, down the maze of hallways, and out into the alley behind the revue. Grunting, they lift the bag and toss you into the dumpster. A real nice, clean job.\n\t\t\t*goto dumpster\n\t\t*else\n\t\t\t*set two true\n\t\t\t*set wounds +2\n\t\t\t*set has_weak_arm false\n\t\t\t*set appendage \"${dominant} leg and ${weak} arm\"\n\t\t\t\"Take another limb,\" he says.\n\n\t\t\t*if male = false\n\t\t\t\tHis men hesitate. \"But…it's a woman, boss.\"\n\n\t\t\t\tThe Pitt's tiny hands curl into white-knuckled fists.\n\n\t\t\t\t\"That ain't no woman.\"\n\t\t\t*if male = true\n\t\t\t\tHis men hesitate. \"Isn't taking another limb  kinda…inhumane?\" \n\n\t\t\t\t\"Take another!\" The Pitt screams, veins bulging in his neck.\n\t\t\t*page_break\n\n\t\t\t*if rosary \n\t\t\t\tCigar Smoker grabs your rosary and, after offering a silent apology with his eyes, places it in your mouth for you to bite down on.\n\t\t\t*if voodoo_necklace and (rosary = false)\n\t\t\t\tCigar Smoker grabs your voodoo necklace and, after offering a silent apology with his eyes, places it in your mouth for you to bite down on.\n\t\t\t*if (rosary = false) and ((red_birds = true) and (took_red_birds = false))\n\t\t\t\t*set took_red_birds true\n\t\t\t\tThey search your pockets quickly and force-feed you one of Father Confessor's redbirds. The pill hits your system immediately—your heart pounds a million miles a minute. The redbird makes your eyes bug out of your skull, but it helps take the edge off.\n\t\t\t*comment endif\n\n\t\t\tThey grab your ${weak} arm and saw it off right at the shoulder. Fresh pain washes over you, and you give vent to a horrible, drawn-out scream. The goons stop, not wanting to continue, but The Pitt shouts at them from the corner. With a sigh, they start again, pushing deeper to finish as fast as they can. Their eyes plead for forgiveness. \n\n\t\t\tThis is beyond torture. \n\t\t\t*page_break\n\n\t\t\t*if lulu_alive and lulu_doublecross\n\t\t\t\tThe irregular click of stiletto heels on the stairs interrupts the sawing. With a squeak, Lulu Luscious stumbles into room and wrinkles her nose at the smell.\n\n\t\t\t\tThe Pitt holds his arms out, and she walks over to him and whispers in his ear. He frowns at what he hears and whines at Lulu, but then he tells his men to \"finish up the job\" and heads upstairs. Lulu comes over to the table to look at you. She clicks her teeth and then turns her attention to the goons, distracting them.\n\t\t\t\t*page_break\n\n\t\t\t\tShe gives the biggest goon a smile and a pat on the back. She tells them you're a goner and offers then a drink at the bar as soon as they get you taken care of. She helps them unstrap your poor body from the table and deposit it in a black plastic bag, along with your ${appendage}. The pain is still almost unbearable, but at least they stopped sawing.\n\n\t\t\t\tAs she closes the bag, she whispers an apology in your ear—she was being watched, so she had to hand you over to The Pitt. She rips a small hole in the bag so you can breathe easier. \n\n\t\t\t\t*choice\n\t\t\t\t\t#That's understandable. We all gotta do what we gotta do.\n\t\t\t\t\t\t*set lulu_doublecross false\n\t\t\t\t\t\t*set deal_lulu true\n\t\t\t\t\t\t*goto drug\n\t\t\t\t\t#What does she expect—forgiveness? No way. No how.\n\t\t\t\t\t\t*set remorse %+5\n\t\t\t\t\t\t*goto drug\n\t\t\t\t\t#She's gotta be feelin' pretty bad about all this. I beg her for help. \n\t\t\t\t\t\t*set respect %-5\n\t\t\t\t\t\t*if took_red_birds\n\t\t\t\t\t\t\tShe takes your hand in hers and squeezes it—a small reassurance.\n\t\t\t\t\t\t\t*goto drug\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*set took_red_birds true\n\t\t\t\t\t\t\tShe rummages through your pockets, finds the redbirds, and gives them to you.\n\t\t\t\t\t\t\t*goto drug\n\t\t\t\t\t#At least she came through now…she mighta saved my life.\n\t\t\t\t\t\t*set lulu_doublecross false\n\t\t\t\t\t\t*set deal_lulu true\n\t\t\t\t\t\t*goto drug\n\t\t\t*else\n\t\t\t\t*if lulu_alive and (deal_lulu)\n\t\t\t\t\tYou hear a high-pitched scream, not your own, and multiple thumps on the wooden stairs. A disheveled Lulu Luscious rolls into the room, interrupting the sawing. The Pitt claps with glee as she comes to a stop on the blood-soaked cement floor. One of his goons comes in behind her and picks her up. \n\t\n\t\t\t\t\tThe goon grabs Lulu's hair, holding up her bruised and bloodied face. The Pitt giggles and tries to force her to sniff his coke, but she spits in his face, so he smacks her. The goons turn her around for \"the show,\" telling her that if she keeps acting up, she'll be next on the bill, performing all the way to Hell.\n\t\n\t\t\t\t\tFrom the table, you lock eyes with her. You feel better having her to focus on. The Pitt's men go back to work on your left arm, and Lulu's face contorts in terror. Your consciousness starts to fade in time with the light swinging above the table and the rhythm of the sawtooth in your arm. Pain overtakes your senses. and you begin to slip into darkness….\n\t\t\t\t\t*page_break\n\t\t\t\t*comment endif\n\t\t\t\t\n\t\t\t\tWhen they finally finish, they place you and your ${appendage} in an industrial strength black plastic bag. Then, they drag you up the stairs, down the maze of hallways, and out into the alley behind the revue. Grunting, they lift the bag and toss you into the dumpster. A real nice, clean job.\n\t\t\t\t*goto dumpster\n\t#I choose before they choose for me!\n\t\t*set respect %+5\n\t\tYou contemplate the horrific decision that faces you, and The Pitt's mocking leer isn't making it any easier. This is exactly where he wanted you—helpless and under his control.\n\n\t\tAs your mind whirls, The Pitt starts to count down slowly from 10 like a parent disciplining a child. You ponder offering one of your ${dominant} limbs, hoping he'll do the opposite of what you ask. Or you could offer one of your ${weak} limbs, because he knows you'll try to trick him. He'll think by choosing the one you asked for, he'll be a step ahead of you, but in reality, you'll protect your dominant limbs. \n\t\t*choice\n\t\t\t#The ${dominant} arm.\n\t\t\t\t*set wounds +2\n\t\t\t\tYou scream at them to take the ${dominant} arm. The Pitt hands the sawtooth to his men, \n\t\t\t\t*if savvy > 65\n\t\t\t\t\ttelling them to go for the ${weak} arm. You were right, smartypants. It was a trick, and you had the foresight to see it comin' a mile away.\n\t\t\t\t\t*set appendage \"${weak} arm\"\n\t\t\t\t\t*set has_weak_arm false\n\n\t\t\t\t\tSay goodbye to your ${weak} arm.\n\t\t\t\t\t*goto saw\n\t\t\t\t*else\n\t\t\t\t\ttelling them to do what you say. \"He's trying to trick us.\" Your trick to trick him has, in the end, tricked you.\n\t\t\t\t\t*set has_dominant_arm false\n\t\t\t\t\t*set appendage \"${dominant} arm\"\n\n\t\t\t\t\tSay goodbye to your ${dominant} arm.\n\t\t\t\t\t*goto saw\n\t\t\t#The ${weak} arm.\n\t\t\t\t*set wounds +2\n\t\t\t\tYou scream at them to take the ${weak} arm. The Pitt hands the sawtooth to his men, telling them to do what you say.\n\t\t\t\t*if savvy > 65\n\t\t\t\t\t*set appendage \"${weak} arm\"\n\t\t\t\t\tYou were right, smartypants. It was a trick and you had the foresight to see it comin' a mile away.\n\n\t\t\t\t\tTrying to double-cross the double-crosser, they go for the ${weak} arm.\n\t\t\t\t\t*goto saw\n\t\t\t\t*else\n\t\t\t\t\t*set appendage \"${dominant} arm\"\n\t\t\t\t\tBefore they start sawing, The Pitt stops them. He smirks and tells you he knows you too well. Your trick to trick him has, in the end, tricked you.\n\n\t\t\t\t\tSay goodbye to your ${dominant} arm.\n\t\t\t\t\t*goto saw\n\t\t\t#The ${weak} leg.\n\t\t\t\t*set wounds +2\n\t\t\t\t*set missing_leg true\n\t\t\t\tYou scream at them to take the ${weak} leg. The Pitt hands the sawtooth to his men, telling them to do what you say.\n\t\t\t\t*if savvy > 65\n\t\t\t\t\t*set appendage \"${weak} leg\"\n\t\t\t\t\tYou were right, smartypants. It was a trick, and you had the foresight to see it comin' a mile away.\n\n\t\t\t\t\tTrying to double-cross the double-crosser, they go for the ${weak} leg. \n\t\t\t\t\t*goto saw\n\t\t\t\t*else\n\t\t\t\t\t*set appendage \"${dominant} leg\"\n\t\t\t\t\tBefore they start sawing, The Pitt stops them. He smirks and tells you he knows you too well. Your trick to trick him has, in the end, tricked you.\n\n\t\t\t\t\tSay goodbye to your ${dominant} leg.\n\t\t\t\t\t*goto saw\n\t\t\t#The ${dominant} leg.\n\t\t\t\t*set wounds +2\n\t\t\t\t*set missing_leg true\n\t\t\t\tYou scream at them to take the ${dominant} arm. The Pitt hands the sawtooth to his men,\n\t\t\t\t*if savvy > 65\n\t\t\t\t\t*set appendage \"${weak} leg\"\n\t\t\t\t\ttelling them to go for the ${weak} leg. You were right, smartypants. It was a trick, and you had the foresight to see it comin' a mile away.\n\n\t\t\t\t\tSince you chose the ${dominant} leg, they go for the ${weak} one. \n\t\t\t\t\t*goto saw\n\t\t\t\t*else\n\t\t\t\t\t*set appendage \"${dominant} leg\"\n\t\t\t\t\ttelling them to do what you say. \"He's trying to trick us.\" Your trick to trick him has, in the end, tricked you.\n\n\t\t\t\t\tSay goodbye to your ${dominant} leg.\n\t\t\t\t\t*goto saw\n\t\t\t#Go for the head! Losing a limb is like a slow death. Just end it now.\n\t\t\t\t*goto head\n\t#Go for the head. Losing a limb is like a slow death. Just end it now.\n\t\t*label head\n\t\t*set wounds +2\n\t\t*set take_it_to_the_mattresses %+10\n\t\t*set jumpin_the_gun %+5\n\t\tYou scream at the little weasel to cut your head off. In response, he gives you an evil grin.\n\t\t\n\t\t\"You'd like that, wouldn't you?\"\n\t\t*set appendage \"${dominant} arm\"\n\t\t*set has_dominant_arm false\n\t\t\n\t\tThe Pitt hands the sawtooth to his goons and tells them to cut off your ${dominant} arm. \n\t\t\n\t\tDamn. Plan has officially backfired.\n\t\t*goto saw\n\t\t\n*label saw\n*page_break\nHis men get to work, cutting through the thin fabric of your suit with your own weapon. Pain floods your system as the sawtooth digs deeply into your flesh. This is not good. \n\nMusic from the club upstairs insinuates itself into your senses, while The Pitt cackles in the corner. This really could be the end of the line for you. A missing ${appendage} is nothing to walk away\n*if missing_leg\n\tfrom—no pun intended—and\n*if missing_leg = false\n\tfrom, and\nyou knew the consequences when you started on this mission. The fact that you've come this far is truly phenomenal, and the night isn't over yet.\n\nIf you do survive this, you'll be changed forever…and not just physically.\n\n*choice\n\t#I deserved this. Karma's a bitch.\n\t\t*set remorse %+10\n\t\t*goto lights_swing\n\t#This is just some sick bastard's revenge.\t\n\t\t*goto lights_swing\n\t#Bring it on, baby! I'm a survivor.\n\t\t*goto lights_swing\n\t*if (desire = 3) #I'll just think of ${desire_text_presprog}.\n\t\t*goto lights_swing\n\n*label lights_swing\nYou barely notice the light swinging above you, as shock settles in to help ease the pain. The Pitt's men finish up the bloody job, holding your ${appendage} in the air like a prize. The Pitt takes the sawtooth and leaves the room, telling them to get rid of your body.\n\nIt's over. It's finally over. \n*page_break\n\nYou are placed in an industrial strength black, plastic bag, along with your ${appendage}. \n*label drug\nThen, they drag you up the stairs, down the maze of hallways, and out into the alley behind the revue. Grunting, they lift the bag and toss you into the dumpster. When Cigar Man points out that you're still breathing, the others laugh. \"Not for long,\" another says.\n\nA real nice, clean job.\n*goto dumpster\n\n*label dumpster\n*if letter_l\n\n\tAnd as a final \"fuck you,\" they crumple up the letter from ${l_name} and throw it on top of you.\n*page_break\n*if has_a_deal = false\n\t*goto early_death\n*elseif wounds >= 8\n\t*if took_red_birds\n\t\t*achieve redbirds\n\t\tThe lid slams shut on the dumpster, and you breathe heavily into the bag around you. After all that pain, the redbird you were fed is somehow keeping you cognizant.\n\n\t\tThank you, Father Confessor!\n\t\t*goto barking\n\t*else\n\t\t*label early_death\n\t\t*achieve dumpsterdiving\n\t\tWell, well, well. Here you are. Look at yourself—alone and dying in a dumpster. Well done. No man is an island; even a headcrusher needs friends! What? You think you got where you were without the help of anyone?\n\n\t\tBy the time the lid slams shut on the trash-filled dumpster, you're already losing your sense of time and space. Warm blood fills the black plastic bag encasing you, filling your nostrils with the smell of iron. \n\t\t\n\t\tSomeone once told you that time is a circle, and that we will all be here again, repeating our many moments over and over. You certainly hope not.\n\t\n\t\tSuddenly, from a great distance, you feel the prick of feline paws. Feral cats scramble over you, tearing the black trash bag open. Their hungry, sharp teeth dig into your flesh and their sandpaper tongues lap up your blood, as they consume what's left of you. Thoughts of ${l_name}, The Bull, The Pitt, and the mission fade in favor of childhood memories and finally….\n\t\n\t\tRelease.\n\t\n\t\tMexico, Valhalla, or perhaps a new life…here you come.\n\t\t*set deal_devil true\n\t\t*finish\n*elseif (letter_l) and (desire = 4)\n\tAs the lid slams shut on the dumpster, ${l_name}'s words come to you. A jolt of adrenaline courses through you, sharpening your awareness. You breathe deeply, keeping oxygen circulating through your body. $!{l_his} face appears in your mind and begs you to stay awake. \n\t*goto barking\n*else\n\t*if took_red_birds\n\t\tThe lid slams shut on the dumpster, and you breathe heavily into the bag around you. After all that pain, the redbird you were fed is somehow keeping you cognizant.\n\t*label barking\n\t*if took_red_birds\n\t\t*set wounds -1\n\tThe echo of dogs barking at steamboats fills the air as lovers walk right by the dumpster, laughing and intoxicated. They have no idea that a ${man} whose ${appendage} has been cut off is bleeding to death in a pile of garbage. And for what? For the mob? For love? For freedom? \n\n\tHah.\n\n\tYou've had quite a history with dumpsters, so you feel like it's only natural to end up here. The darkness of the early morning begins to slip over you….\n\t*finish\n\n*label wound_check\n*if wounds = 2\n\t2 Wounds\n*if wounds = 3\n\t3 Wounds\n*if wounds = 4\n\t4 Wounds\n*if wounds = 5\n\t5 Wounds\n*if wounds = 6\n\t6 Wounds\n*if wounds = 7\n\t7 Wounds\n*if wounds = 8\n\t8 Wounds\n*if wounds = 9\n\t9 Wounds\n*if wounds = 10\n\t10 Wounds\n*if wounds > 10\n\t11+ Wounds\n*return", "phone_call": "*temp damsel \"damsel\"\n*temp stings \"stings\"\n\n[b]Chapter One: The Phone Call[/b]\n\nIt's the most magical place on earth, and you've had it all there—the drugs, the drama, the unabashed violence, and the harm it's done to you and everyone you've ever loved.\n\nThis mysterious, exotic city lured you in a long time ago and numbed you with a fix for your every desire. Against this landscape, you've carved out a prosperous career. Through the sheer force of your will, the city has molded and bent before your very eyes, covering your every potential insecurity with false confidence and gaudy excess.\n*page_break\n\nIn return, the city has jaded you, stripped you of your humanity, and warped you into an unrecognizable shell of noir-esque dysphoria, washed up on the filthy banks of the city's famous canals. It has brought you to this very moment, waking in the early evening from a haunting dream to find a crinkled brown paper bag clutched in your soiled hand.\n\nThe cries of oil-slicked seagulls slowly awaken you from your temporary escape. You look down to find an empty bottle peeking out of the paper bag in your hands. Once your eyes can focus, you see what it is.\n\n*fake_choice\n\t#Whiskey.\n\t\t*set canal_bottle \"whiskey\"\n\t\tThat explains the toxic afterburn tearing through your system.\n\t#Gin & Juice, yo! \n\t\t*set canal_bottle \"gin and juice\"\n\t\tThere ain't nothin' like waking up with too much sugar in your system.\n\t#Pepto-Bismol.\n\t\t*set canal_bottle \"Pepto-Bismol\"\n\t\t*set stings \"coats\"\n\t\tLast night's events suddenly hit you like a ton of bricks. Thank goodness for antinausea medication.\n\t#Milk.\n\t\t*set canal_bottle \"milk\"\n\t\t*set bottle \"carton\"\n\t\t*set stings \"coats\"\n\t\tStraight from the Korova Milk Bar, this cocktail sharpens you up and makes you ready for a bit of the ol' ultraviolence….\n*comment endif\n\nThis night—the night that will give you a chance at everything you want—begins when you rise, downing the dregs of the ${canal_bottle} at sunset. Looking down, you discover a single $100 bill in your money clip.\n\nShit.\n*page_break\n\nThis can only mean one thing—a phone call from your boss, The Bull, the most dangerous gangster in the city. Amid historic buildings that have long since fallen into disrepair, the air hangs thick with the scent of roasting coffee and chicory, oysters and spice, whiskey and cigars…and the mafia. \n\nCriminals infest the dank cellars and broken streets here—penny-ante con men and pickpockets, second storey artists and headcrushers, gunmen and their molls, whores and their pimps—all scratching and clawing for a leg up, for any advantage, and The Bull had scratched and clawed all the way to the top.\n\nThere is only one place in the entire world that provides this exquisite clash of culture and flavor, a city that was built on an ongoing battle for territory: New Orleans.\n\nAnd The Bull? The Bull is the top dog. \n*page_break\n\nBecause the majority of Creoles are so kind, The Bull's totalitarian rule over New Orleans—which some call NOLA—has met with little resistance—except from the Irish, anyway. The Bull runs a tight ship, in the classic Italian style. \n*comment the weird thing about you mentioning the Irish is that I don't see them playing a role in the game currently.  So this is something of a red herring. But hell, it works.\n\nCode names reflect an era long past, double-breasted suits adorn even the lowest-level button man, and snap brim hats and polished alligator shoes are the order of the day. Gangsters look the part, because The Bull demands it.\n\nEven the most notorious gangsters have said that when The Bull gets angry, New Orleans drowns in waves of fear. And this, you can certainly attest to.\n\n*fake_choice\n\t#The Bull is a cigar-smoking, hard-as-nails, bald, mountain of a man who grinds his teeth when he's about to explode. \n\t\tHis hands are the biggest you've ever seen, and he can hurl any [i]cugine[/i], fella, or made man across the room with barely a flick of his wrist. He comes by his name honestly—his anger is a raging, unstoppable thing, trampling all in its path. He's a loose cannon who will be your best friend one moment and will order your bloody death without care or remorse the next. His violent acts of persuasion have the entire city in terror. \n\n\t\tYou have his respect…for now. That could change at a moment's notice.\n\t#The Bull is a sturdy, strong-willed woman. She wears her hair in a tight ponytail and unabashedly refuses to wear makeup.  \n\t\t*set bull_male false\n\t\t*set bull_he \"she\"\n\t\t*set bull_his \"her\"\n\t\t*set bull_him \"her\"\n\t\t*set bull_man \"woman\"\n\t\tShe has a natural beauty that's fierce and strong. She's no one's [i]comare[/i] or plaything, and none of the rules for female gangsters apply to her. Plus, she's smarter and more manipulative than anyone you have ever met.\n\t\t\n\t\tShe makes you earn respect, which may be why she's always watched you suspiciously. Either she has your back, or she's carefully watching, waiting to catch you doing something wrong. Maybe both….\n*comment endif\n\nThe Bull's influence has helped you rise to dizzying heights of power, but dragged you back through the gutter to do it. Your life is a roller coaster, but no matter what terrifying traits The Bull possesses, ${bull_he} is the lesser of two evils, and ${bull_he} made you into who you are today.\n\nA headcrusher.\n*page_break\n\nThe Bull became your guardian, protector, and teacher after you fled Nonna, your Catholic grandmother. Nonna raised you by herself in New York City, using the large crucifix that normally hung above the dinner table to discipline you for your perceived infractions.  \n\nWhen you were really bad, she forced you to pray in a small closet for hours on end. Memories of the boiling hot \"sinner's room\" can still make you sweat, even today.\n\nYou learned really quickly not to cry, at least in public, because Nonna had big dreams for you.\n\n*fake_choice\n\t#To be a nun in a convent in Italy, the motherland. She would dress me in a nun's habit and make me scrub her floors on my hands and knees. \n\t\t*set male false\n\t\t*set he \"she\"\n\t\t*set his \"her\"\n\t\t*set him \"her\"\n\t\t*set cowboy \"cowgirl\"\n\t\t*set man \"woman\"\n\t\t*set mahn \"lay-dee\"\n\t\t*set men \"women\"\n\t\t*set boy \"girl\"\n\t\t*set businessman \"businesswoman\"\n\t\t*set superman \"Wonder Woman\"\n\t\t*set spiderman \"Catwoman\"\n\t\t*set dude \"lady\"\n\t\t*set brother \"sister\"\n\t\t*set son \"daughter\"\n\t#To be a priest of surpassing holiness, even a saint. She was worried about her own sins and sought forgiveness riding on my coattails.\n*comment endif\n\nEscaping to the streets of Manhattan brought its own tribulations. It was wintertime when you ran away, and the city offered no relief. You spent your nights wishing for a miracle.\n\n*fake_choice\n\t#I prayed that Nonna might take me back.\n\t\tBut when you returned, you found her dead in the street. She'd been murdered on her way home from the grocery store without you there to protect her.\n\n\t\tIt was then that you vowed to always be smarter, faster, and meaner than your opponents. If they'd kill an old lady, they'd go after you in a heartbeat.  \n\t\t*set take_it_to_the_mattresses %-5\n\t\t*set jumpin_the_gun %+10\n\t\t*set paranoia %-5\n\t#I hoped a nice family would come along and adopt me, complete with a puppy and a turkey at Christmas.\n\t\tYou'd think wishes were stars. So cold, so many…so out of reach.\n\n\t\tInstead of discovering a situation right out of a storybook, you became stronger, wiser, faster, and smarter. No one was going to take care of you, so you had to learn to take care of yourself.\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*set jumpin_the_gun %-5\n\t\t*set paranoia %-5\n\t\t*set savvy %+5\n\t#I wanted to be part of one of the street gangs run by the older kids, because they were hard, just like me.\n\t\tThe street gangs of New York City are hardcore, that's for sure. But you were destined for much bigger and better things.\n\t\t*set jumpin_the_gun %+5\n\t\t*set take_it_to_the_mattresses %+5\n\t#I needed to keep fending for myself, because nothing would make me go back to Nonna.\n\t\tYou fought tooth and nail to get a little territory of your own on the streets. You grew up fast, because you had to.\n\t\t*set savvy %+5\n\t\t*set take_it_to_the_mattresses %+5\n*comment endif\n\nYou made a home for yourself inside an overturned dumpster. There you were protected from the snow and the rain. And though it stank to high heaven, it was home—for a while, at least.\n\nLonging for something better, you eventually decided to split like a banana. You hopped trains all the way to New Orleans, Louisiana, otherwise known as down-and-dirty NOLA. Warmer pastures were what you were going for, but you had no idea how hot things would get down here.\n*page_break\n\nShortly after arriving, you found a jagged blade trapped in the gutter, on its way to the Mississippi. You didn't know it at the time, but this small piece of metal would become the notorious \"sawtooth.\" An integral part of your persona, the sawtooth—your precious sawtooth—fits in the palm of your hand and has kept every gangster in NOLA shaking in fear since your induction.\n\nOn the momentous day you met The Bull—who was about thirty at the time—you were in the middle of something earth-shakingly important.\n\n*fake_choice\n\t#I was gutting and eating raw, oil-soaked fish on the curb, covered in filth.\n\t\t*set gutting_fish true\n\t\tYou looked up with fish guts on your chin to see ${bull_him} for the very first time.\n\t\t*set savvy %+5\n\t\t*set take_it_to_the_mattresses %-5\n\t#I was chasing a seagull for my next dinner.\n\t\tYou tackled that bird, cracking its neck right in front of a school bus full of children. They screamed at the tops of their lungs as The Bull laughed, thoroughly amused.\n\t\t*set take_it_to_the_mattresses %+5\n\t\t*set savvy %-5\n\t#I was swiping the sawtooth through the air as the street kids demanded what was in my pockets.\n\t\tThe sawtooth proved effective in keeping their grubby little hands and arms away from what was yours. You left more than a few scars on the kids who were too eager.\n\t\t*set take_it_to_the_mattresses %+10\n\t\t*set savvy %-5\n\t\t*set paranoia %+5\n\t#I was giving the ol' softshoe to the tourists in the French Quarter.\n\t\t*set take_it_to_the_mattresses %-5\n\t\t*set paranoia %-5\n\t\t*set savvy %+10\n\t\t*set respect %-10\n\t\tYou weren't a professional by any means, but you entertained passersby as you tap danced to zydeco, smiling around the sawtooth in your mouth.\n\t#I was mugging some unsuspecting tourists.\n\t\tLots of tourists couldn't help but smile at such \"an adorable kid\" demanding their pocket money. When you produced the sawtooth, their smiles disappeared and you got the cash fast.\n\t\t*set heat %+10\n\t\t*set take_it_to_the_mattresses %+10\n\t\t*set jumpin_the_gun %+10\n\t\t*set paranoia %+10\n*comment endif\n\nFascinated, The Bull took you in and immediately became your\n*if bull_male \n\tfather, instructor, and most of all, Boogeyman. $!{bull_he} was the a monster—no doubt about it—the sort of monster that Nonna had warned you about. And while the Bull has always been hard on you, consistently pushing you beyond your limits, he also treated you as his own, offering help and encouragement when you needed it most. \n\n\tYou have dedicated your life to The Bull, becoming one of ${bull_his} headcrushers—a messenger of human limbs when ${bull_he} demands it. The sawtooth you so fervently clutched in your hands the day ${bull_he} found you has become your closest ally—an infamous sign of devotion to the ${bull_man} who took you in.\n*if bull_male = false\n\tmother, teacher, and most of all, Wicked Queen. The Bull was no Nonna, and there was a tenderness about her in quiet moments that almost resembled motherhood. Still, she has never let you forget that she rules your world and demands obeisance at all times.\n\n\tYou have dedicated your life to The Bull, becoming one of ${bull_his} headcrushers—a messenger of human limbs when ${bull_he} demands it. The sawtooth you so fervently clutched in your hands the day ${bull_he} found you has become your closest ally—an infamous sign of devotion to the ${bull_man} who took you in.\n*comment endif\n\nWith the doors of your new life opening and the lavish lifestyle of the mob in your reach, you chose a new identity. You took on a [i]nom de guerre[/i] and left your old life behind.\n\n*fake_choice\n\t*if male \n\t\t#Antonio. \n\t\t\tWhen those who beg for their lives tell you they can offer you more juice than The Bull could ever dream of, you tell them your name is Antonio, and you don't need their juice—only praise from The Bull.\n\t\t\t*set name \"Antonio\"\n\t\t#Clyde. \n\t\t\tYou named yourself after Clyde Chestnut Barrow, the greatest outlaw that ever lived. A daredevil. A thrill-seeker.  \n\t\t\t*set name \"Clyde\"\n\t\t#Damian. \n\t\t\tNonna always wanted you to be a saint, and so you took the name of a crusader.\n\t\t\t*set name \"Damian\"\n\t\t#Jack. \n\t\t\tTaken from the song \"Hit the Road, Jack,\" this name came to you when The Bull called you a \"jack of all trades.\" The most famous whiskey in the world is named Jack. It's a great name. There is no mystery. No secrets. Nothing to hide.\n\t\t\t*set name \"Jack\"\n\t\t#None of these is right…\n\t\t\tWhat, then?\n\t\t\t*input_text name\n\t*if male = false\n\t\t#Elizabeth. \n\t\t\tWith your name, you honor the Virgin Queen and make a firm statement that you can take care of yourself, no matter what horrible disaster is spiraling around you. \n\t\t\t*set name \"Elizabeth\"\n\t\t#Godiva. \n\t\t\tLady Godiva, the English noblewoman who rode naked through the streets to protest oppressive taxation, couldn't care less what others thought of her—and neither can you.\n\t\t\t*set name \"Godiva\"\n\t\t#Joan. \n\t\t\tThe headstrong Joan of Arc is highly esteemed by NOLA residents as \"The Maid of Orléans.\"  Inspired by the statue of the saint on her horse in front of Café du Monde in the French Quarter, you took on the name to be a defender of NOLA in your own right.  \n\t\t\t*set name \"Joan\"\n\t\t#Sam. \n\t\t\tShort for Samantha, you chose this name for its straightforwardness. This is your life. You make your own rules and build your own walls. The name Sam also helps if you ever need to pretend to be a man. In this business, you never know what's going to be thrown at you.\n\t\t\t*set name \"Sam\"\n\t\t#None of these is right…\n\t\t\tWhat, then?\n\t\t\t*input_text name\n*comment endif\n\nWrapping yourself in your new name like a mantle, you dragged yourself up through the muck and the filth and everything that stood in your way. In time, you worked your way up to become The Bull's Number One headcrusher.\n*if male \n\tThis title alone has made you into a [i]cugine[/i]—a \"made man\"—and you've handled every message job with gusto. \n\n\tYour first job sent ripples of fear through the city, in part because no one knew who you were or how little experience you had. But it was the way that you did it that was so terrifying.  \n\n\t*fake_choice\n\t\t#I cut off each arm and leg, and stripped the mouth away. I kept the poor sap alive for a long time. \n\t\t\tDelivering this message to his boss was one of your most exhilarating experiences.\n\t\t#I used standard CIA techniques like confinement, waterboarding, and exposure to get the information I needed. \n\t\t\tYou cut off his hand before you let him go free into hiding. He'll never look at the mafia the same way again. \n\t\t#I cut off his head, cleaned it up all nice and neat, and deposited it on his boss's doorstep.\n\t\t\tAfter you burnt the rest of his body, no one ever muttered his name again.\n\t\t#I showed up. The target took one look at me and ate the barrel of his own gun.\n\t\t\tKnowing full well that it would look too easy, you strapped him to floaties and threw him in the Mississippi. By the time the police found him, he was riddled with maggots and had been chewed on by an alligator.\n*if male = false\n\tThis title alone has made you into one of the only \"made women,\" and you have handled every message job with panache. Being a woman in this business means that you too wear a suit. And a hat. Even a nice pair of alligator shoes. You dress the part and watch your back and your money clip. \n\t\n\tYou have to be tough. You have to think faster, talk faster. Your jobs have to be ten times more clean and precise than those of any man working in the same field. \n\n\t*if bull_male\n\t\tThe Bull may be a terrifying presence, but ${bull_he} has always stuck up for you when someone disapproved of ${bull_his} decision to make a dame a headcrusher. In fact, your very first message job had one of these naysayers as its target; you pulled it off with such skill that it sent the others falling to their knees, begging for forgiveness.\n\t\t\n\t\tYou demonstrated your talent by…\n\n\t\t*fake_choice\n\t\t\t#Cutting off each arm and leg, and stripping the mouth away. I kept the poor sap alive for a long time. \n\t\t\t\tDelivering this message to his boss was one of your most exhilarating experiences.\n\t\t\t#Severing every single finger and toe. I delivered them in a pink box with a red bow—for that feminine touch.\n\t\t\t\tYou even sent a Polaroid of the sucker begging for his life.\n\t\t\t#Cutting off his head, cleaning it up, and depositing it on his boss's doorstep.\n\t\t\t\tAfter you burned the rest of his body, no one ever muttered his name again.\n\t\t\t#Strapping the victim to the back of a carriage and dragging him around the French Quarter until he was unrecognizable.\n\t\t\t\tThe cops never identified the body, but his boss sure got the message.\n\t*if bull_male = false\n\t\tNo one dared to utter a peep when the decision to turn you into a headcrusher was made. The Bull is one of the (very) few top women in the business. And the possibility that you are her chosen protégé…well, that has loomed large in your consciousness as she drilled into you the same ruthlessness that drove her to her position. \n\t\t\n\t\tAny lingering misgivings among the rest of the [i]mafiosi[/i] were dispelled by your first message job. You demonstrated your talent by…\n\n\t\t*fake_choice\n\t\t\t#Cutting off each arm and leg, and stripping the mouth away. I kept the poor sap alive for a long time.  \n\t\t\t\tDelivering this message to his boss was one of your most exhilarating experiences.\n\t\t\t#Severing every single finger and toe. I delivered them in a pink box with a red bow—for that feminine touch.\n\t\t\t\tThe Bull gave you one of ${bull_his} rings to place on the left-hand ring finger as a symbolic touch.\n\t\t\t#Cutting off his head, cleaning it up, and depositing it on his boss's doorstep.\n\t\t\t\tAfter you burned the rest of his body, no one ever muttered his name again.\n\t\t\t#Hoisting him high in the air, opening a vein, and draining his rich blood into a wine barrel.\n\t\t\t\tFeeling festive, you cut his body up into 28 symmetrical pieces in the shape of apples. Then, you plopped those bad boys into the barrel and left your present in his boss's office.\n*page_break\n\nOf course, it's not always about torturing people. Sometimes, you use other methods to solve the problems The Bull puts before you.\n*fake_choice\n\t#No. Overwhelming violence is always the answer.\n\t\t*set take_it_to_the_mattresses %+30\n\t\tWhoever coined the term \"take it to the mattresses\" was clearly thinking about you at the time.\n\t#Sometimes, I like to out-think my opponents.\n\t\t*set savvy %+30\n\t\tBeat someone up, you get fear. Beat them with your brains, you get respect.\n\t#Intimidation is the key. If I can solve a problem without taking off my jacket, so much the better.\n\t\t*set respect %+30\n\t\tDry-cleaning is expensive, after all.\n\t#Sometimes I wonder if my soul is damned; but it doesn't stop me from getting the job done.\n\t\t*set remorse %+10\n\t\t*set take_it_to_the_mattresses %+10\n\t\t*set jumpin_the_gun %-10\n\t\t*set paranoia %-10\n\t\tYou've long since learned to push your concerns deep into the pit of your stomach, only letting them come out when you've already found the bottom of a bottle.\n*comment endif\n\nSo far, you have successfully maintained a comparatively low profile—physically, anyway—a useful thing in your chosen profession; anonymity helps when you saw off appendages for a living. Few would guess that ${name}, who blends in and disappears with the crowd, is also ${name}, the hired assassin who lurks in the darkest nightmares of those who mess up in this business.\n\nYou are a walking nightmare and no one sees you coming.\n*page_break\nOf course, these message jobs aren't always wine and roses. There have been nights when things got messy. Once, you got caught holding the bag—literally. It contained the head of an informant that The Bull directed you to take out.  \n\nIt was there, in the rain, that you first met Jimmy Malone. It was Malone who drew down on you. He was an Irish detective who was investigating The Bull's outfit—his snitch's head was in the bag—and you were in the wrong place at the wrong time. His backup was closer than yours, and when he went to put the steel bracelets on you, you had to make a decision.\n\n*fake_choice\n\t#I stood tall. The Bull would see me through.\n\t\t*set respect %+10\n\t\t*set heat %+10\n\t\t*set jumpin_the_gun %-10\n\t\tYou went to jail for a time, but the head soon disappeared from the evidence locker and the case against you was dismissed.\n\t\t\n\t\tMalone was humiliated, and he's had it out for the whole crew ever since.\n\t#I waited until he was close, and then I sucker punched him.\n\t\t*set take_it_to_the_mattresses %+10\n\t\t*set heat %+20\n\t\t*set jumpin_the_gun %+20\n\t\tNo one's takin' you in. Not while there's still breath in your body.\n\t\t\n\t\tIt was close, but you clocked him good and escaped before he came to. Unfortunately, he's had it out for you ever since.\n\t#I tried to make a deal; he could use an informant in The Bull's organization, right?\n\t\t*set respect %-10\n\t\t*set heat %-20\n\t\t*set jumpin_the_gun %-10\n\t\t*set malones_snitch true\n\t\tUsing the intel you provided, Malone was able to make several high-profile busts. Now he's a captain in the force, thanks to you.\n*comment endif\n\nBut that was long ago. Tonight, you find yourself trapped in a tangled web as the sun dies and the stars take its place. Sour sweat rolls down your hand onto the money clip you grasp tightly, as you head to the last working phone booth in the city.\n\nNo one working for The Bull has even a single thought without ${bull_him} knowing about it. $!{bull_he} knows your every action, and you know there is nothing you can get past ${bull_him}, especially the intense yearning coursing through your body for the one person who is absolutely, undeniably, off limits.\n\n*choice\n\t#Elle, The Bull's enigmatic wife.\n\t\t*set l_name \"Elle\"\n\t\t*set bull_husband \"wife\"\n\t\tUnfortunately, ${l_he}'s bound to ${l_his} terrifyingly powerful\n\t\t*if bull_male\n\t\t\thusband.\n\t\t*if bull_male = false\n\t\t\twife.\n\t\t*goto after_l\n\t*if (bull_male = true) #Luke, The Bull's delicate husband.\n\t\tThe Bull married Luke, his delicate male counterpart, even though it was illegal in the state of Louisiana. The Bull plays by his own rules and loves who he wants…and it's not like the parish clerk was going to tell The Bull \"no.\"\n\t\t*set l_name \"Luke\"\n\t\t*set l_female false\n\t\t*set l_he \"he\"\n\t\t*set l_him \"him\"\n\t\t*set l_his \"his\"\n\t\t*set l_hers \"his\"\n\t\t*set l_wife \"husband\"\n\t\t*set damsel \"dude\"\n\t\t*goto after_l\n\t*if (bull_male = false) #Alexander, The Bull's husband, who is undoubtedly ${bull_his} anchor.\n\t\tUnfortunately, he is bound to his terrifyingly powerful wife.\n\t\t*set l_name \"Alexander\"\n\t\t*set l_female false\n\t\t*set l_attracted_male false\n\t\t*set l_he \"he\"\n\t\t*set l_his \"his\"\n\t\t*set l_him \"him\"\n\t\t*set l_hers \"his\"\n\t\t*set l_wife \"husband\"\n\t\t*set damsel \"dude\"\n\t\t*goto after_l\n\n*label after_l\n\nThe aftertaste of the ${canal_bottle} ${stings} your throat. In that taste is held a reminder of the late nights, the atrocities you have committed, and even your despair over the affections of ${l_name}, who would surely never leave The Bull for a headcrusher like you.\n\n*if l_female\n\t${l_name}'s the whole package—intelligent, hilarious, and gives completely of ${l_him}self to bring others the slightest shred of happiness. $!{l_he} doesn't care where people come from; ${l_he} treats them with a deep appreciation and understanding that surpasses even the best social workers.\n\n\t$!{l_he} is beautiful, graceful, and tall with legs that don't stop. With ${l_his} green eyes, black hair, and sultry voice, ${l_he} could bring any man or woman to their knees, if ${l_he} so desired. $!{l_he} seems unhappy in ${l_his} situation and yet remains mysterious, unknowable. There's something inside ${l_him} that you can't figure out and may never know.\n*if (l_female = false)\n\t*if l_attracted_male\n\t\t${l_name}'s the whole package—delicate but not whiny, refined but never pretentious, ${l_he} somehow attracts the attention of every person in any room without the least bit of effort. $!{l_he} didn't come from a lavish upbringing and has experienced ${l_his} own share of hard knocks, which shaped ${l_him} into the beautiful person ${l_he} has become.\n\t*if l_attracted_male = false\n\t\t${l_name} embodies a deeply kind-hearted, give-the-shirt-off-${l_his}-back attitude to everyone ${l_he} meets. $!{l_he}'s the type to whom you would deliver body parts for the rest of your life, if ${l_he} only asked you to. $!{l_he}'s passionate, funny, has a photographic memory, and can build anything ${l_he} puts ${l_his} mind to. The icing on this double-chocolate cake are ${l_his} intense green eyes, which seem to burn right through you.\n*comment endif\n\nDespite these qualities, some whisper that ${l_name} is in cahoots with The Pitt—The Bull's weaselly, estranged step-brother. \n*if paranoia > 50\n\tThough it could just be your mind playing tricks on you, there have been moments that have made you wonder.\n*if paranoia \u003c= 50\n\tYou don't believe it, though. Not even for a moment.\n*comment endif\n\nLike these stories always seem to go, it was at their wedding that you first met ${l_him}. Right there, at that moment, there was something about ${l_him} that drew you to ${l_him}.\n*temp l_reason 0\n*choice\n\t#It was the thrill of the forbidden fruit.\n\t\t*set jumpin_the_gun %+20\n\t\t*set l_reason 1\n\t\tYou never were one to tell yourself no. When you see something you want, you reach out and take it. And The Bull's ${bull_husband}? Why would this be any different?\n\t\t*goto wedding\n\t#$!{l_he} had something magical. When we touched, we both felt the electricity.\n\t\t*set savvy %+10\n\t\t*set paranoia %-10\n\t\t*set l_reason 2\n\t\tHow could you resist? From the tingle at the crown of your head to the one in each of your ten toes, you knew that ${l_he} was destined to be with you.\n\t\t*goto wedding\n\t#$!{l_he} just looked so lost and innocent—surrounded by all these blackhearted gangsters—and I wanted to save ${l_him} from them.\n\t\t*set remorse %+10\n\t\t*set paranoia %-10\n\t\t*set l_reason 3\n\t\tThe Bull left the two of you alone for a moment, and you asked ${l_him} to dance.  \n\t\t*if (male = false) and (l_female = false)\n\t\t\tLooking into his green eyes, there on the dance floor, you began to imagine another life.\n\t\t\t*goto wedding\n\t\t*else\n\t\t\tThere on the dance floor, you felt—for just a moment—that maybe you could protect ${l_him} from this life.\n\t\t\t*goto wedding\n*comment another reason?\n\n*label wedding\n\nAnd then they were married. You had to sit through the toasts and the dancing, all the while knowing that ${l_name} was meant for you.\n\n*choice\n\t#I thought ${l_he} was a fine piece of ass, and damn the consequences, I threw caution to the wind and pursued ${l_him}.\n\t\t*set respect %-10\n\t\t*set savvy %-5\n\t\t*set jumpin_the_gun %+5\n\t\t*set remorse %-10\n\t\tRight there at the wedding, you made your move.\n\t\t*if l_reason != 1\n\t\t\tYou spent most of your life taking what you wanted, when you wanted, and you weren't gonna stop with ${l_him}, even if ${l_he} belonged to The Bull. \n\t\t*comment endif\n\t\t\n\t\tWhen your hands met reaching for the same glass of champagne, you grabbed ${l_him} and said to meet in the coatcheck. $!{l_he} beat you there. Punctual and devious—just your type. \n\t\t\n\t\tIt was on like Donkey Kong.\n\t\t\n\t\tSince then, the two of you have arranged the occasional tryst, but The Bull's nose for bullshit is mighty, and steering clear of ${bull_his} watchful gaze has been difficult. Moreover, you've been constantly aware that ${l_he} might use your affair to blackmail you. Yet, when you're alone, ${l_he} talks about running off to Mexico together.\n\t\t*goto albeit_post\n\t#Despite all my efforts, I was lost from that first moment. I was like a puppy, begging for ${l_his} attention.\n\t\t*set respect %-5\n\t\tTime fell away and you were instantly transported to another universe, one where your entire life as a couple played out before your eyes. You knew you were meant to be together. When ${l_he} spoke, the angels spoke through ${l_him}.\n\n\t\t*goto albeit\n\t#$!{l_he} pursued me relentlessly, even daring to shoot me lusty looks right in front of The Bull. \n\t\t*if l_reason = 3\n\t\t\t*temp ingenue \"ingénue\"\n\t\t\t*if male\n\t\t\t\t*set ingenue \"ingénu\"\n\t\t\tYou were suitably surprised to discover that ${l_he} was no blushing ${ingenue}. $!{l_his} pursuit was constant and put the lie to your desire to protect ${l_him} when you first met.\n\t\t\t\n\t\t\tThen, it finally happened.\n\t\t\t*goto covered_in_blood\n\t\t*else\n\t\t\t*label covered_in_blood\n\t\t\t*set savvy %-10\n\t\t\t*set respect %-5\n\t\t\t*set remorse %+10\n\t\t\tYou were covered in warm blood, having just finished a message job, when ${l_he}—literally—bumped into you outside your place. You couldn't let ${l_him} leave, now that there was blood on ${l_his} clothes; that would have been bad form. So you invited ${l_him} upstairs. You were already aroused by your evening's handiwork; your resistance to ${l_his} advances was negligible.\n\t\t\t\n\t\t\tThat single, steamy night with ${l_name} changed your future forever; if nothing else, you're always aware that ${l_he} might use it to blackmail you. When you're alone, ${l_he} talks about running off to Mexico together…but the specter of The Bull and ${bull_his} legendary waves of anger terrify ${l_him}.\n\t\t\t*goto albeit_post\n\t#Our relationship was a slow build. We were friends first, and then lovers…but only once. \n\t\t*set savvy %+5\n\t\t*set respect %-5\n\t\t*set jumpin_the_gun %-5\n\t\t*set remorse %-5\n\t\tOver the next few years, the two of you encountered each other regularly. The desire still smoldered inside both of you. You both tried to resist, but neither of you were strong enough to resist forever.\n\t\t\n\t\t*goto albeit\n\n*label albeit\nAlbeit totally forbidden, you had a single, steamy night with ${l_name} that changed your future forever; if nothing else, you've been constantly aware that ${l_he} might use it to blackmail you. Yet, when you're alone, ${l_he} talks about running off to Mexico together…but the specter of The Bull and ${bull_his} legendary waves of fury seem to terrify ${l_him}. \n*label albeit_post\n\nDoes ${l_he} really care about you?\n\n*fake_choice\n\t#I know ${l_he} loves me.\n\t\t*set ls_affection 3\n\t#$!{L_he}'s playing me for a fool, but I love ${l_him} all the same.\n\t\t*set ls_affection 1\n\t#$!{l_he} hates The Bull, but I'm still not sure if ${l_he} cares about me.\n\t\t*set ls_affection 2\n\nWhich brings you to tonight. You were supposed to meet ${l_name} just after sunset—${l_he}'d said ${l_he} had something to tell you—but ${l_he} didn't show. And so you started to drink. The longer you waited while ${l_he} still didn't show, the more you drank.  And now you're here, washed up by the canals and gripping a ${bottle} of ${canal_bottle}.  It's been a long time coming, but you've finally made a decision.\n\n*choice\n\t#It's time to take what's mine. Respect, juice…why, even NOLA itself.\n\t\t*set desire 1\n\t\t*set desire_text \"take over NOLA for yourself\"\n\t\t*set desire_text_1st \"take over NOLA for myself\"\n\t\t*set desire_text_presprog \"taking over NOLA for myself\"\n\t\tFrustration burns through your veins. You're tired of being pissed on by The Pitt, jerked around by ${l_name}, and ordered about like some bag-${boy} by The Bull. You want what's comin' to you, and you're ready to take it.\n\t\t\n\t\tAnd The Bull? $!{bull_he} already knows. What's more, you know ${bull_he} knows. $!{bull_he} can smell betrayal from a mile away. \n\t\t*set remorse %-20\n\t\t*set take_it_to_the_mattresses %+10\n\t\t*set paranoia %+20\n\t\t*set jumpin_the_gun %+15\n\t\t*goto decision\n\t#I've had enough; my soul has been crushed by my sins. \n\t\t*set desire 2\n\t\t*set desire_text \"repent for your sins\"\n\t\t*set desire_text_1st \"repent for my sins\"\n\t\t*set desire_text_presprog \"repenting for my sins\"\n\t\tYour game is way off because your guilt is messing with you. You're even questioning your reasons for sawing appendages off in the first place. And that's a very bad quality for NOLA's Number One headcrusher. \n\t\t\n\t\tBut maybe it's good for your soul? ${l_name}'s suggestion of fleeing to Mexico doesn't sound so bad. Maybe you could spend the rest of your days there, repenting for your sins? There's no way ${l_he} would could with you, right?\n\t\t\n\t\tBut The Bull? Surely ${bull_he} knows. $!{bull_he} has to know. $!{bull_he} can probably smell the guilt on you. \n\t\t\n\t\tIt's time you got yourself out of this mess. People have been escaping prisons since walls were invented, whether they were sinner's rooms, dumpsters, or even the mob.\n\t\t*set remorse %+30\n\t\t*set jumpin_the_gun %-10\n\t\t*set paranoia %-10\n\t\t*set respect %-5\n\t\t*goto decision\n\t#It's time to hit the road—before the shit really hits the fan.\n\t\t*set desire 3\n\t\t*set desire_text \"retire to Mexico\"\n\t\t*set desire_text_1st \"retire to Mexico\"\n\t\t*set desire_text_presprog \"retiring to Mexico\"\n\t\t*set remorse %-5\n\t\t*set savvy %+10\n\t\t*set paranoia %+5\n\t\t*set jumpin_the_gun %-10\n\t\tIt's all come down to this—this choice you've made to walk away from The Bull, the mob, even NOLA. It's the hardest decision you've ever made.\n\t\t\n\t\t${l_name}'s idea of Mexico sounds like the ticket. And The Bull? Surely ${bull_he} knows. $!{bull_he} has to know. $!{bull_he} can probably smell the betrayal on you. \n\t\t\n\t\tIt's time you got yourself out of this mess. People have been escaping prisons since walls were invented, whether they were sinner's rooms, dumpsters, or even the mob.\n\t\t\n\t\t*goto decision\n\t#I'm in love.  I'd do anything to get ${l_name} back.\n\t\tIt all comes down to this—this choice you've made has been the hardest of your life: to turn against The Bull and the mob in the hopes that what you feel for $!{l_name} is true.\n\t\t\n\t\tAnd The Bull? $!{bull_he} already knows. What's more, you know ${bull_he} knows. $!{bull_he} can smell betrayal from a mile away. But maybe, just maybe, the two of you can escape to Mexico before ${bull_he} wreaks ${bull_his} vengeance upon you both.\n\t\t\n\t\t*set desire 4\n\t\t*set desire_text \"earn ${l_name}'s eternal love\"\n\t\t*set desire_text_1st \"earn ${l_name}'s eternal love\"\n\t\t*set desire_text_presprog \"earning ${l_name}'s eternal love\"\n\t\t*set paranoia %-10\n\t\t*set jumpin_the_gun %+10\n\t\t*goto decision\n\n*label decision\n\nThis phone call may be your only chance. \n\nIn the distance, St. Louis Cathedral begins to chime—twelve rings for midnight—and the phone rings shrilly in the booth. \n\nYour dirty, clammy hand slowly picks up the receiver….\n*page_break\n\nIt's The Bull on the other end, all right, and something is terribly, terribly wrong. \n*if bull_male = false\n\tThe only other time you have heard her sound like this was when some poor sap called her a cow. His home went up in flames later that night, with him inside, screaming.\n*comment endif\n\nThe Bull is about to declare war on The Pitt, who has kidnapped ${l_name} and is holding ${l_him} hostage.  The Pitt is demanding an absurd amount of ransom money for ${l_his} safe return. This has enraged The Bull, who screams that if ${l_name} is not returned to ${bull_his} arms, ${bull_he} will commence an all-out war, dragging every innocent bystander in NOLA into a full-blown slaughterhouse. \n\nThe Bull intends to send you in after ${l_him}, with no help from any colleagues, [i]cugine[/i], or made men. $!{bull_he} wants you, and only you, to bring ${l_name} back by 6AM. \n*page_break\n\nHow do you feel about this obvious suicide mission? Be honest.\n\n*choice\n\t*if (desire != 1) #It's a test. The Bull knows about me and $!{l_name}. \n\t\t$!{Bull_he} knows you want to walk away from the mob, and thus, from ${bull_him}. $!{Bull_he}'s got eyes and ears, and the entire command center of this dirty city works for ${bull_him}. You might have to fight your way outta this one, even go up against The Bull ${bull_him}self….\n\t\t*set paranoia %+5\n\t\t*set jumpin_the_gun %+5\n\t\t*goto trapped\n\t*if (desire = 1) #It's a trick. The Bull knows I'm ready to challenge ${bull_him}, and ${bull_he} wants to eliminate both me and The Pitt with one deft move.\n\t\t*set paranoia %+10\n\t\t*set jumpin_the_gun %+10\n\t\t$!{Bull_he} knows you want to take NOLA for yourself. $!{Bull_he}'s got eyes and ears, and the entire command center of this dirty city works for ${bull_him}. You're gonna have to fight your way outta this one…all the way to The Bull ${bull_him}self….\n\t\t*goto trapped\n\t*if (desire != 4) #It's a setup by The Pitt and ${l_name}. \n\t\tIt's simple. This is a trap set up by ${l_name} and The Pitt—of course ${l_name} doesn't love you. You can see it all now: the lovelorn headcrusher dies trying to rescue the ${damsel} in distress. Once you're out of the way, they can take on The Bull and take the NOLA for themselves.\n\n\t\tThe Bull is the victim here, which makes you a victim as well. \n\t\t*set paranoia %+20\n\t\t*set savvy %+10\n\t\t*set take_it_to_the_mattresses %+5\n\t\t*goto trapped\n\t*if (desire = 4) #I don't care about The Bull or The Pitt; I have to save ${l_name}!\n\t\tThat's why ${l_he} didn't meet with you earlier. $!{L_he} would have been there if ${l_he} could have. That explains everything!\n\t\t*set paranoia %-20\n\t\t*set jumpin_the_gun %+10\n\t\t*set savvy %-5\n\t\t*goto trapped\n\t#This is the real deal. And, whatever else, I'm not going to just abandon The Bull…not yet, anyway.\n\t\tAn all-out street war might descend over NOLA if you don't do something about it. You are still dedicated to The Bull, no matter what secrets you have screaming to get out.\n\t\t*set paranoia %-10\n\t\t*set jumpin_the_gun %-5\n\t\t*goto trapped\n\t*if (desire = 2) #I have to stop this. I can't let The Bull go to war; it will destroy the city.\n\t\tYou are a killer, after all. What's a few more dead bodies to your already impressive tally? At least in this case, you'll save hundreds of lives by ending a few tonight.\n\t\t*set remorse %+20\n\t\t*goto trapped\n\t*if (desire = 3) #It's one last job to write home about—one final score before I sail off into the sunset.\n\t\tIt doesn't matter who's double-crossed who. You'll make whatever deals you need to make—and kill whoever you need to kill—to survive the night and come out the other side with a fat wad of juice and a ticket out of town.\n\t\t*set savvy %+5\n\t\t*set jumpin_the_gun %-5\n\t\t*goto trapped\n\n*label trapped\n*page_break\nThe hot air trapped inside the phone booth seem to thicken into a steamy cloud that fills your lungs with sticky moisture. You struggle to catch your breath as sweat rolls down your brow and tension pulses in your temples. \n\nInnocent people might die in this dangerous game if you don't do something about it. You've gotta think quick to get yours. As the weight of the world settles on your shoulders, the clock strikes a quarter past midnight.\n\n*choice\n\t#I tell ${bull_him} no. $!{Bull_he} hasn't killed me yet, and I just might get what I want out of the deal.\n\t\t*if respect > 60\n\t\t\t*label better_deal\n\t\t\t*set respect %+15\n\t\t\t*set contracts +1\n\t\t\t*set savvy %+5\n\t\t\t*set deal_bull 1\n\t\t\tThe words that spill from your mouth enrage ${bull_him}—waves of anger spill from of the receiver as ${bull_he} threatens your life. However, ${bull_he} quickly calms down when ${bull_he} realizes you mean business. You are the only one on whom ${bull_he} can truly depend, and ${bull_he} knows it. \n\t\n\t\t\tRanting quickly turns to begging. $!{Bull_he}'ll do anything to get ${l_name} back, which includes giving you your freedom and a considerable amount of juice. Cha-ching!\n\t\t\t*goto receiver_down\n\t\t*else\n\t\t\tYou stand up to The Bull, telling ${bull_him} that a suicide mission just ain't gonna work. The long pause on the other end of the line ends with rage-filled denunciations and gruesome threats spilling forth. $!{Bull_his} fury at your decision would cow any made ${man} into taking a bullet for ${bull_him}. \n\n\t\t\tThe Bull isn't going to negotiate, and you give in.\n\t\t\t*goto crumble\n\t#Agree like I always have. If I simply deliver and don't ask questions—for now—The Bull might return the favor and give me my freedom.\n\t\t*set paranoia %-20\n\t\t*set respect %-5\n\t\t*label crumble\n\t\t*set deal_bull 3\n\t\t*set contracts +1\n\t\tThe Bull's anger suddenly turns into a laugh and ${bull_he} says, \"That's my $!{name}, my Number One headcrusher.\" \n\n\t\tEven though you're ${bull_his} ${man}, ${bull_he} offers a pretty high quantity of juice, more than ${bull_he} has ever offered before.\n\t\t*goto receiver_down\n\t*if (desire = 2) or (desire = 3)\n\t\t#Strike a deal. I want freedom, and I want the juice I'll need to make it. A six-hour suicide mission is worth that.\n\t\t\t*if savvy > 60\n\t\t\t\t*goto better_deal\n\t\t\t*elseif respect > 50\n\t\t\t\t*label mediocre_deal\n\t\t\t\t*set respect %+10\n\t\t\t\t*set contracts +1\n\t\t\t\t*set savvy %+5\n\t\t\t\t*set deal_bull 2\n\t\t\t\tThe Bull must be desperate, because you can hear ${bull_him} gritting ${bull_his} teeth on the other end of the line. \n\t\t\n\t\t\t\tAfter a long moment, ${bull_he} agrees to give you cash and freedom, as long as you deliver the goods without a single scratch. $!{Bull_he} also compliments you on your negotiating skills, taking credit for everything you've learned. Before ${bull_he} hangs up the phone, ${bull_he} mentions that you might be up to taking ${bull_his} place when ${bull_he}'s gone…if you intend to stick around, anyway.\n\t\t\n\t\t\t\tThere are fighting words mixed in with the compliment. You have something to meditate on tonight.\n\t\t\t\t*goto receiver_down\n\t\t\t*else\n\t\t\t\tYou argue that you deserve a fair deal, but The Bull unloads ${bull_his} frustration and anger on you. $!{Bull_he} isn't gonna negotiate, especially after all ${bull_he} has done for you!\n\t\n\t\t\t\tSweat pours down your brow as you give into ${bull_his} demands.\n\t\t\t\t*goto crumble\n\t*if (desire = 1) #A commission to take down The Pitt, and then maybe a one-on-one with The Bull? My plans are already coming together.\n\t\t*set contracts +1\n\t\t*set respect %+5\n\t\t*set savvy %+5\n\t\t*set deal_bull 2\n\t\tYou put up an illusion of resistance, to allay any suspicions ${bull_he} might have about your enthusiasm for the job.\n\t\t\n\t\tAfter a desultory negotiation, ${bull_he} offers you a handsome sum—in advance—for your services.  ${Bull_he} also compliments you on your negotiating skills, taking credit for everything you have learned. \n\t\t\n\t\tIt's a good thing ${bull_he} can't see you rolling your eyes through the phoneline.\n\t\t*goto receiver_down\n\t*if (desire = 4) #${l_name}'s in danger? I have to save ${l_him}.  The money doesn't matter…though it would be nice.\n\t\t*set jumpin_the_gun %+20\n\t\t*set contracts +1\n\t\t*set deal_bull 2\n\t\t*set paranoia %-10\n\t\t*set respect %-10\n\t\tYour enthusiasm for the suicide job must have come through loud and clear, as The Bull's anger suddenly turns to laughter.  \"That's my ${name}, my Number One headcrusher!\"\n\t\t\n\t\tEven though ${bull_he}'s got you planted directly under ${bull_his} thumb, ${bull_he} offers you a pretty high quantity of juice, more than ${bull_he} has ever offered before. You accept without further debate. Time is passing.\n\t\t*goto receiver_down\n\t\t\n*label receiver_down\n*page_break\n*set juice +10000\nYou set the receiver on its cradle, the metal clinking against the hard plastic. The sound reverberates in your ears as adrenaline pumps through every vein in your body. Within ten minutes, a car drives by and drops a bag of juice—ten large as an advance—right outside the booth. \n\nThis is the moment of truth. What will come tonight will not be for the faint of heart. Fear and indecision are not options, nor is getting pinched by some two-bit cop in a trim blue uniform. Wit, strategy, and split-second decision-making are required tonight. Outside the booth, the bag of juice waits for you.\n\nAre you ready for the insanity to begin?\n\n*fake_choice\n\t#I know damn well this might be my last, bittersweet hurrah.\n\t\t*set savvy %+5\n\t\tYour success on this crazy night is not dependent on how many bodies you rack up or how much juice you can finagle outta the deal—it's about using your brain, and sometimes, your charm. It's what being a headcrusher is all about.\n\t#True freedom is so close I can taste it. \n\t\t*set paranoia %-5\n\t\tHope, dreams, love, and the desire to start anew flood your senses. This just might be your way out of the mob, once and for all. \n\t#It's all for ${l_name}. Nothing else matters.\n\t\t*set paranoia %-5\n\t\tYou hope that ${l_he}'ll appreciate it when you die in ${l_his} name.\n\t#What's can I say? It's exciting—an invitation to get my hands dirty with some of the most immoral gangsters in this city. \n\t\t*set take_it_to_the_mattresses %+10\n\t\t*set remorse %-5\n\t\tYour fingers delicately touch the jagged edges of the sawtooth. This is what you were made for, and you just might convince $!{l_name} to join you. \n\t#I only pray that God will forgive me for what I will do this night.\n\t\t*set remorse %+5\n\t\tTaking a moment, you close your eyes and make the sign of the cross.\n*comment endif\n\nGo get 'em, tiger.\n*finish\n\n", "pinched": "*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]NOLA is Burning[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n*temp has_stuff true\n*temp exposed \"cast\"\n*temp mayor false\n*temp evidence false\n[b]Chapter Four: Pinched[/b]\n\n*if fear_drowning\n\tYou begin to panic as the river swallows you. Water fills your mouth, redolent with the taste of oil, dead fish, and a faint, unhealthy sweetness that might be the flavor of rotting human remains. As you flail about, helpless before the current, your foot tangles in a rope dangling from a rusty anchor. It wraps around your ankle and begins to pull you under!\n\n\tGibbering with terror, you gasp for air but find none. Your lungs burn and your vision begins to narrow, but somewhere inside you, determination rises. You will not die here! You refuse! Desperately, you heave yourself down to the anchor and manage to free your foot. The current carries you back up, and you burst through the surface, taking deep, heaving breaths. You're alive!\n\n\tAfter a moment, you notice a blinking neon sign in the distance. Hope rises in your chest—it's the [i]Girls Girls Girls[/i] revue. To top it all off, a beggar serenades you from the riverbank, playing a broken love song on a battered viola. \n*if fear_drowning = false\n\tWater fills your mouth, redolent with the taste of oil, dead fish, and a faint, unhealthy sweetness that might be the flavor of rotting human remains. Your legs kick powerfully, quickly bringing you to the surface. You spit out the filthy water and take a deep breath.\n\n\tYou see a bright, blinking neon sign in the distance. Hope rises in your chest—it's the [i]Girls Girls Girls[/i] revue. To top it all off, a beggar serenades you from the riverbank, playing a broken love song on a battered viola. \n*comment endif\n\nCrawling out of the river is tricky, and you might need help.  \n\n*choice\n\t*if dragon_assistance\n\t\t#I am a true warrior now. Asking for help just won't do. \n\t\t\t*set paranoia %+5\n\t\t\t*set jumpin_the_gun %-5\n\t\t\t*goto swim\n\t*if dragon_assistance = false\n\t\t#I'm the Number One headcrusher of NOLA! I don't ask for help!\n\t\t\t*set paranoia %+5\n\t\t\t*set jumpin_the_gun %-5\n\t\t\t*goto swim\n\t#I'll yell for help to the beggar. He's gotta have a heart, right?\n\t\t*set paranoia %-5\n\t\t*set jumpin_the_gun %-5\n\t\tThere's nothing wrong with asking for help! You wave your arms and yell, trying to be heard over the sound of his screechy viola. He stops playing and looks at you, squinting.\n\n\t\t\"Whas'hat?\" He cups his ear.\n\t\t*choice\n\t\t\t#Yell for help again. \n\t\t\t\t*set savvy %+5\n\t\t\t\t*set paranoia %+5\n\t\t\t\tYou yell again, and more of the putrid river water gets in your mouth. He leans forward.\n\n\t\t\t\t\"What did ya say!?\" His voice sounds just like his banged up instrument. \n\t\t\t\t*page_break\n\t\t\t\t*label swim\n\t\t\t\tSplashing about in the strong current like a flailing mongoose, you try to reach the shore, but the water keeps going down your throat and gagging you. When you finally start getting closer to the riverbank, the beggar drops his viola and points a gun right at you….\n\t\t\t\t*page_break\n\t\t\t\t*goto gun\n\t\t\t#Swim for the river's edge instead of waiting around to be saved.\n\t\t\t\t*set respect %+5\n\t\t\t\t*set paranoia %-5\n\t\t\t\t*goto swim\n\t\t\t#Grab onto leftover wood from a destroyed boat floating by, just like in the movie [i]Titanic[/i].\n\t\t\t\t*set savvy %-5\n\t\t\t\t*set jumpin_the_gun %+5\n\t\t\t\tYes! What a great idea! You wrap your arms around the piece of wood.\n\t\t\t\t\n\t\t\t\tIt sinks. Hmmm…maybe this wasn't such a good idea after all….\n\n\t\t\t\tSuddenly, a much larger piece of wood drifts towards you. In fact, it's a whole boat. Aha! You pull yourself on board. You are saved! Then, you see that the beggar has exchanged his viola for a gun.\n\t\t\t\t*page_break\n\t\t\t\t*label gun\n\t\t\t\tHe cocks his gun and says something in a wheezy rasp. His broken teeth and swollen gums make him hard to understand, but you're pretty sure he's telling you The Pitt told him to do it.\n\t\t\
