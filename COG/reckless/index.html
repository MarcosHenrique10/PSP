ves, and that the vermite is within the mountain.  Surely that information is important enough to secure your place on the Reckless. Your next question is:\n\t\t\t*fake_choice\n\t\t\t\t#\"How many tenders are there in a community?\"\n\t\t\t\t#\"What time of day do Medusi sleep?\"\n\t\t\t\t#\"Do tenders carry weapons?\"\n\t\t\t\t#\"How much vermite does 4-7-2 produce per rotation?\"\n\t\t\t\t#\"How much does Spider pay for a meter cubed of vermite?\"\n\t\t\t\n\t\t\t\"Too many questions!\" thunders The Mushroom.  The massive alien quickly closes the space between you, stopping near enough for you to see the brown and yellow mottling on its moist hood.  The mold-and-acid odor is so strong you have to breathe through your mouth to keep from vomiting.  \"If fellow prisoner aid Medusa, Medusi prisoner completeness security.  Sufficiency information!\"\n\t\t\t\n\t\t\tYou step back, wary of the alien's limbs that writhe like eyeless snakes mere centimeters away.\n\t\t\t\t\t\t\t\n\t\t\t\"Go, human!  Go!\" The Mushroom bellows.  \"Leave victim in peace!\"\n\t\t\t*page_break\n\t\t\t*goto status\t\t\t\t\n\t\t*else\n\t\t\t\"Witless!\" shouts The Mushroom's speech box.  \"Human thinks dishonesty to superiority intellect?\"\n\t\t\t\n\t\t\tThe massive alien quickly closes the space between you, stopping near enough for you to see the brown and yellow mottling on its moist hood and to smell its mold-and-acid odor so strongly you have to breathe through your mouth to keep from vomiting.\n\t\t\t\n\t\t\t\"Go, human!  Go!\" The Mushroom bellows.  \"Leave victim in peace!\"\n\t\t\t\n\t\t\tTime to try another tactic.  You decide to employ…\n\t\t\t*choice\n\t\t\t\t#…reason.\n\t\t\t\t\t*goto reason\n\t\t\t\t#…violence.\n\t\t\t\t\t*set empathy %- 25\n\t\t\t\t\tYou brush the floor by your foot with your hand, until your fingers tangle in the strands of the electric whip.\n\t\t\t\t\t\n\t\t\t\t\t*set infamy %+15\n\t\t\t\t\t*goto use_whip\n\t\t\t\t#…trickery, but on the alien's behalf this time.\n\t\t\t\t\t*set empathy %+ 20\n\t\t\t\t\t*goto can_type\n\t#…fake an interrogation with the alien's help.\n\t\t*set mushroom_ally true\n\t\t*label fake\n\t\tThat way, you can maintain your position on the ship, while cementing an alliance with The Mushroom.\n\t\t*set empathy %+ 20\n\t\t*label can_type\n\t\tYou rack your brains for some way to communicate with The Mushroom without the Reckless crew overhearing.  You clench your fists in frustration, and then it comes to you: why does the speech box require a hand inside to activate?  Most translators are activated and deactivated by voice command (when humans want to speak without aliens overhearing).  So you begin tapping with the fingers inside the box, as if your hand rested on a standard alpha pad.\n\t\t\n\t\t\"They are watching and listening.  If you give me a little information, they will trust me, and I will be able to set you free to warn the colony when we arrive,\" you type.  Your words are silently translated to the Medusa, without the pirates hearing.\n\t\t\n\t\tYou realize you should say something to fill the silence, and allay suspicion, too.\n\t\t\n\t\t*gosub persuasion\n\t\t\n\t\t\"Levelers?\" you ask, but it's not essential that you understand Medusi society right now.\n\t\t\n\t\tSweating and half-choking in the warm, wet air, you type, \"Pretend to give in.\"  You hope that The Mushroom is receiving, and believing, your covert messages.  It's difficult to collude with an alien of an unfamiliar species, an ally whose body language you cannot read at all.\n\t\t*page_break\n\t\t*goto success\n\t\t\n*label status\n*if ((info = false) and (crew = false))\n\t*gosub door\n\tYou breathe deeply as Ny-bat tells you impassively that your time is up.\n\t*label failed\n\tThe captain chastises you for your failure, and assigns you a guard.\n\t*set infamy %- 20\n\t*set strength %+ 15\n\t*page_break\n\t*goto_scene prisoner\n*elseif ((info = true) and (crew = false))\n\t*set infamy %+ 20\n\t*gosub door\n\tNy-bat is here to take you to the captain to report—a formality, since the command crew has been listening the entire time.  You are instated as a member of the Reckless crew, and promised a pitiful quarter of a percent of the profits, along with the opportunity to prove you deserve more.\n\t*page_break\n\t*goto_scene bonus\n*elseif ((info = false) and (crew = true))\n\t*set infamy %- 20\n\t*gosub door\n\t*label report\n\tNy-bat tells you ${n_he} is ordered to escort you to the captain.  Since you haven't coaxed any information out of The Mushroom, you are afraid she is going to return you to prisoner status.\n\t*if (infamy >= 30)\n\t\t*set crew true\n\t\t*achieve crewmember\n\t\tLuckily, you have proved your value in other ways, so that you merely have to endure some verbal chastisement and an injunction to better your performance during the next mission if you want to remain on the crew.\n\t\t\t\n\t\tYou are glad you haven't completely destroyed your standing on the Reckless.\n\t\t*page_break\n\t\t*goto_scene bonus\n\t*else\n\t\t*set crew false\n\t\tThe captain chastises you before turning you back over to Ny-bat.\n\t\t*goto failed\n*else\n\t*set infamy %+ 20\n\t*gosub door\n\tNy-bat is here to take you to the captain to report—a formality, since the command crew has been listening the entire time.\n\t\n\t\"You succeeded where others failed,\" Zoa tells you.  \"If you continue to prove useful on 4-7-2, I'll grant you suitable bonus when we've secured the vermite.\"\t\n\t*page_break\n\t*goto_scene bonus\n*label door\nThe door behind you opens, thinning the air as some of the mist escapes into the hallway.\n*return\n*label what_know\nHere's what you know: the small Medusi colony on planet 4-7-2 provides Spider, the huge shipping conglomerate that controls all Medusi interstellar trade, with vermite.  The Mushroom calls the Medusi that work there tenders, though with the inevitable difficulty of translating alien concepts, it's hard to say precisely what that means.  The Mushroom's files have already revealed which island hosts the colony.  Zoa can deduce that the planet will have a supersaturated atmosphere breathable by Medusi, but she wants to know more about the colony and the location of the main camp.\n\n*return\n*label drop_whip\nThe first thing you do is drop the whip.  You don't see it hit the floor; it sinks into the mist and disappears.  The Mushroom rustles, though, and you wonder if it can see better than you in its natural atmosphere.\n\n*return\n*label persuasion\nYou say:\n*choice\n\t#\"If you cooperate, we can heal your wounds.\"\n\t\t*goto unselfish\n\t#\"Information will help the pirates\tdeal peacefully with your people.\"\n\t\t\"Or bombardment with surprise,\" says The Mushroom.\n\t\t\n\t\t\"The captain wants to make a deal, and pay a fair price,\" you insist.\n\t\t\n\t\tThe alien's unbroken limbs—the ones not serving as legs at the moment—slice sideways through the air.  You think that might indicate agitation, but with an unfamiliar species, you can never be sure.\n\t\t\n\t\t\"Impossibility evaluation alien honesty!\n\t\t*goto motivation\n\t#\"The captain will pay you generously for your help.\"\n\t\t*goto unselfish\n\t#\"We both benefit if you answer my questions.\"\n\t\t*goto unselfish\n*label unselfish\n\"There's no reason you can't end up safe with your people on 4-7-2 after we leave with our cargo.  Just tell me where we can find the tenders, and who we should negotiate with,\" you finish.\n\nThe alien's unbroken limbs—the ones not serving as legs at the moment—slice sideways through the air.  You think that might indicate agitation, but with an unfamiliar species, you can never be sure.\n\n\"\n*label motivation\nHumans motivation by individual self-interest.  Inferiority species assumption also Medusi behavior.  But I, Honored Diplomat, silence in the interest of all Medusi,\" says The Mushroom through the speech box.\n\nYou are ready for this line of argument.  \"But is it really in the interest of the average Medusi to allow Spider a monopoly on vermite?  The captain is willing to pay more per square meter, and isn't that better for the tenders?\"\n\n\"Decision for Levelers, not for I,\" says the alien, limbs waving like kelp in a water-farm.\n*return", "medusi_camp": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*comment ñáéç…—\n*temp ex false\n*set crew false\n*temp calm false\n*if (solo = false)\n\t*goto start\n*else\n\t*goto arrival\n\n*label start\n*if (late)\n\tThe Medusi structures are open-sided, mere poles and high canvas ceilings.  About twenty Medusi are gathered in the largest one.  With some difficulty you pick out The Mushroom, who is gesticulating wildly.  As you approach, you feel your skin begin to tingle from the electricity in the air, and your speech box relays a babble of raised voices.\n\t\n\t*goto argue\n*else\n\t*goto all\n\n*label all\nThe Medusi structures are open-sided, mere poles and high canvas ceilings.  The Mushroom leads you into the largest tent, where about twenty aliens have gathered.  You feel like a Zeekie caught by a Joodar gang, with the massive Medusi towering over you.  Your speech box relays a babble of raised voices, and you feel your skin tingling from the electricity in the air.\n\n\"…not children…\"\n\n\"…deeper caves…\"\n\n\"…consideration stranger…\"\n\n\"…visualization aliens…\"\n\nThe box has given each Medusa a distinctive voice, but the overlapping speech is still unintelligible, until a strong voice cuts through the babble.\n\n\"Fellow prisoner, corroboration!  Treaty breakers most violence and more irrational!  Medusi must retreat to defensible position!\"  The Mushroom seems a bit upset.\n\nYou…\n*choice\n\t#…back up The Mushroom.\n\t\t\"These pirates are dangerous.  The one who is coming to negotiate is insane.  He wants your vermite, and he'll kill you to get it.  You should listen to your Honored Diplomat, and get your people to safety,\" you say.\n\t\t*label silence\n\t\t\n\t\tThe Medusi fall silent.  Because of their government's isolationist policies, the tenders have probably never spoken to a member of another species before.\n\t\t\t\t\n\t\tSuddenly the leader shoves you with a tentacle, not hard enough to break anything, but hard enough to land you on your rear end on the unforgiving rock.  \"Impossibility of evaluating sanity of alien mind.  Possibility falsehoods.\"\n\t\t\t\t\t\n\t\tYou pick yourself up, wondering what you can say that will convince the Medusi to trust you.\n\t\t*label score_boost\n\t\t*choice\n\t\t\t#\"I was a prisoner on the human ship.\"\n\t\t\t\t\"I have no loyalty to those humans, no reason to lie to you,\" you tell the Medusa.\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t*label lie\n\t\t\t\t\n\t\t\t\t\"Unless alien plans rejoining fellow-species,\" says the leader.  \"Unless escape merely cunning strategy…\"\n\t\t\t\t*goto spider\n\t\t\t#\"My survival depends on yours.  Why would I lie?\"\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t\n\t\t\t\t*goto lie\n\t\t\t#\"The decision is yours.\"\n\t\t\t\t\"I can only offer insight into the motivations of unfamiliar creatures,\" you tell the Medusa.\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t\n\t\t\t\t*goto lie\n\t\t\t*if (mushroom_ally) #\"I saved your Honored Diplomat, didn't I?\"\n\t\t\t\t\"So you know I'm on your side,\" you tell the Medusa.\n\t\t\t\t*goto lie\t\t\t\t\n\t#…contradict The Mushroom, and advise the Medusi to make a deal.\n\t\t*set empathy %+ 5\n\t\t\"The pirates have orders to negotiate a deal for your vermite, and only use violence as a last resort.  You should talk to them, if you're at all willing to sell,\" you say.\n\t\t\t\n\t\tThe Mushroom shoves you with a tentacle, not hard enough to break anything, but hard enough to land you on your rear on the unforgiving rock.\n\t\t\t\t\n\t\tYou pick yourself up.  The Medusi have fallen silent.  Because of their government's isolationist policies, the tenders have probably never spoken to a member of another species before.\n\t\t\t\n\t\t\"Suspicion agreement from strange alien,\" muses the leader.  You wonder what you can say that will convince the Medusi to trust you.\n\t\t*goto score_boost\n\t#…suggest the Medusi call for help.\n\t\t*set empathy %+ 5\n\t\t\"These pirates are dangerous.  The one who is coming to negotiate is insane.  He wants your vermite, and he'll kill you to get it.  You should get your people to safety,\" you say.\n\t\t*goto silence\n\t#…stay out of the argument.\n\t\tYou shake your head, and, when you realize that means nothing to a Medusa, take your hand out of the speech box, leaving it on but demonstrating your reluctance to speak.  The Mushroom shoves you with a tentacle, not hard enough to break anything, but hard enough to land you on your rear on the unforgiving rock.\n\t\t\t\t\n\t\tYou pick yourself up.  The Medusi have fallen silent.  Because of their government's isolationist policies, the tenders have probably never spoken to a member of another species before.\n\t\t\t\t\n\t\t\"Suspicion silence from strange alien,\" muses the leader.  You wonder what you can say that will convince the Medusi to trust you.\n\t\t*goto score_boost\n\t\t\n*label spider\n\n\"Alien unimportance!\" bellows The Mushroom.  \"Vermite sales only Trading Conglomerate, as Levelers dictation!  When human aim frustration, violence ensue!\"\n\nThe tenders begin to mutter again at the mention of the Medusi trading corporation humans call Spider, worms on their heads twitching. \n\n\"Next trading conglomerate visit point four home-rotations in the future.  Tenders' report may not be excessively detailed,\" the leader remarks.\n*page_break\nThe Mushroom dissolves into incoherence for a moment, as its limbs whip wildly out from under its hood.  Its massive body bends and heaves like a runner at the end of a race, though you don't hear any air whooshing in and out.  Instead, sparks seem to fly from the worms on its head in all directions, conducted by the super-saturated air, and given a blue tinge by your colored goggles.  Your hair stands on end, but luckily you aren't hit by any streaks of electricity.  The tenders seem to absorb The Mushroom's small lightning bolts with no problem at all, but you're not sure a human body could handle that much electricity.\n\n*label argue\nThe leader of the tenders steps closer to The Mushroom, with its hood sucked in tight and all its limbs pointing straight down to the ground.  Its posture is clearly a resolute response to The Mushroom's wild flailing.  \"I authority here!  I of the Third Level, and this my sphere!\" it says with determination.\n\n\"And I Honored Diplomat of the Fifth Level!\" yells The Mushroom.  \"Authority in all places!\"\n\n\"Fifth level previously,\" says the leader.  \"But if intellect currently clouded by traumatic experiences—\"\n\n\"And also authority of age!\" screams The Mushroom.\n\n\"Of senility!\" taunts one of the tenders, and another cacophony breaks out.\n\n\"Others quiet,\" says the leader, in a low but firm voice.  \"Us not knowledge what diplomat endured.  Argument irrelevance now aliens arrival.\"\n*label arrival\nIt points a limb past you.  You turn to see the Reckless crew filing out of the jungle, led by Krantic.  The pirates all carry their weapons in front of them, and though you know they are not all equally despicable, they are a grim sight stalking towards you.\n\n*if (solo = false)\n\tThe Mushroom sags, and a tender advances to crowd it on each side.  You guess they plan to restrain The Mushroom in case of further outbursts.\n\t\n\t*goto replace\n*else\n\t*goto replace\n\t\n*label replace\nYou…\n*choice\n\t#…suggest the Medusi insist on speaking to someone other than Krantic.\n\t\t*set empathy %+ 10\n\t\t*if ((empathy > 45) or (persuasiveness > 60))\n\t\t\t\"Alien ally choose rational negotiator among pirates,\" the leader agrees.\n\t\t\t\t\t\t\n\t\t\t\"I can do that,\" you say.\n\t\t\t*goto negotiator\n\t\t*else\n\t\t\t\"Alien silence,\" snaps the Medusi leader.  \"Leaders now speak.\"\n\t\t\t*goto opening\n\t#…offer to speak on the leader's behalf.\n\t\t\"I could talk to them, if you like.  They know me,\" you say.\n\t\t\t\n\t\t*if ((empathy > 60) or (persuasiveness > 60))\n\t\t\t\"Medusi speech for selves,\" says the leader.  \"Alien ally choose rational negotiator among pirates.\"\n\t\t\t\t\t\t\n\t\t\t\"I can do that,\" you say.\n\t\t\t*goto negotiator\n\t\t*else\n\t\t\t\"Medusi speech for selves,\" snaps the leader.\n\t\t\t*goto opening\n\t#…tell the pirates to lay down their weapons if they want to talk.\n\t\t*set empathy %+ 20\n\t\t\"Die in space, Stashie traitor!\" shouts Krantic.  \"You're not part of this!\"\n\n\t\tYou wonder if he realizes he's already put his hand in his speech box.\n\t\t\n\t\tThe leader of the tenders steps forward, placing itself between you and the Reckless crew.  \n\t\t\n\t\t\"This human remain living minimum duration of negotiations,\" it says, its translated voice echoing across sixteen speech boxes.  You slide out from behind the massive alien, so you can keep an eye on the crew.  You can't read the Medusa's body language, but the humans are teetering on the edge of violence.  They hold their weapons ready, and you can see the tension in the hunched shoulders, the fear in the white-knuckled grips.\n\t\t\n\t\t\"Didn't mean it literally,\" says Krantic through clenched teeth. \"Not going to shoot the Stashie this second.  Mistranslation.\"\n\t\t\n\t\t\"Unauthorized aliens must statement purpose,\" the Medusa says.\n\t\t\n\t\t\"We want vermite.  We'll pay,\" Krantic says.\n\t\t*goto threat\n\t#…wait to see how the situation develops.\n\t\t*goto opening\n\t\t\n*label opening\nThe leader of the tenders steps forward, placing itself between the Reckless crew and the Medusi.  You can't read its body language, but the humans are teetering on the edge of violence.  They hold their weapons ready, and you can see the tension in the hunched shoulders, the fear in the white-knuckled grips.\n\n*label purpose\n\"Unauthorized aliens must statement purpose,\" the alien says, and its translated voice echoes across sixteen speech boxes.\n\n*if (leader = \"Krantic\")\n\tKrantic steps forward, though not so far forward as to put himself within the Medusa's reach, and puts his hand in his speechbox.  \"We want vermite.  We'll pay,\" he says.\n\t*label threat\n\t\n\tHe takes his hand out of the box, so it stops translating, and tells you, \"I'll deal with you as soon I'm done with these fungi.  Maybe you should run away again—that might be entertaining.\"\n\t\n\tYou stand your ground as he turns back to the Medusi leader.\n\t\t\n\t\"Levelers decree vermite sale only to trading conglomerate,\" says the Medusa.\n\t\n\t\"Space the Levelers, whoever the hell they are,\" says Krantic.\n\t*page_break\n\tThere is a stir among the Medusi, and the electrical discharge makes the hairs on your arm stand up.  The humans shift nervously and grip their weapons tighter in response.\n\t\n\tYou decide to jump in and…\n\t*fake_choice\n\t\t#…blame the speech box for a mistranslation.\n\t\t\t*set level %+ 5\t\n\t\t#…apologize for any insult.\n\t\t\t*set persuasiveness %+ 5\n\t\t\t*set empathy %+ 5\n\t\t\t\"Cultural misunderstandings expected,\" the Medusi leader says, accepting your apology.\n\t\t#…redirect the conversation towards the benefits of trade.\n\t\t\t*set persuasiveness %+ 5\n\t\t\t\"Tender payment often insufficient,\" says the leader in agreement.\n\t\t#…tell the pirates to calm down.\n\t\t\t\"Seal it, Stashie!\" shouts Krantic.  \"You're nothing to us, Stashie—you made your choice.\"\n\n\t\t\t\"Explanation previous remark!\" demands the Medusi leader.\n\t\t\t\n\t\t\t\"Ship's business.  We'll take small shipments.  The Levelers will never know,\" says Krantic.\n\t*comment endif\n\t\t\t\n\t*gosub scuffle\n\t*page_break\n\tKrantic ignores both the outbreak and the cryptic remark.  \"How much vermite can we take now?\" he asks.\n\t\n\t\"None,\" says the Medusa.  \"Vermite yet immaturity.  Commencement of business transaction possible in point two rotations.\"\n\t\t\n\tKrantic raises his weapon.\n\t*goto disintigration\t\n*else\n\t${leader} steps forward.  \"Good day,\" he says.  \"We are traders, here to purchase vermite.  We hope to establish an arrangement that will benefit you, as well as us.\"\n\t\t\n\t\"Levelers decree vermite sale only to trading conglomerate,\" says the Medusa.\n\t\t\n\t\"And are there any Levelers here?\" asks ${leader}.\n\n\tThere is a stir among the Medusi, and the electrical discharge makes the hairs on your arm stand up.  The humans shift nervously and grip their weapons tighter in response.\n\n\tYou decide to jump in and…\n\t*fake_choice\n\t\t#…blame the speech box for a mistranslation.\n\t\t\t*set level %+ 5\t\n\t\t#…apologize for any insult.\n\t\t\t*set persuasiveness %+ 5\n\t\t\t*set empathy %+ 5\n\n\t\t\t\"Cultural misunderstandings expected,\" the Medusi leader says, accepting your apology.\n\t\t#Redirect the conversation towards the benefits of trade.\n\t\t\t*set persuasiveness %+ 5\n\t\t\t\n\t\t\t\"Tender payment often insufficient,\" says the leader in agreement.\n\t\t#Tell the pirates to calm down.\n\t\t\t\"Seal it, Stashie!\" shouts Krantic.  \"You're nothing to us—you made your choice.\"\n\n\t\t\t\"Explanation previous remark!\" demands the Medusi leader.\n\t\t\t\n\t\t\t\"An internal matter.  We understand your concern.  We'll take small shipments that will not draw the attention of the Levelers,\" ${leader} says reasonably.\n\t*comment endif\n\t\n\t*gosub scuffle\n\t*page_break\n\t${leader} remains admirably calm during this outbreak and asks, \"How much could you spare for a first shipment?\"\n\t\n\t\"None,\" says the Medusa.  \"Vermite yet immaturity.  Commencement of business transaction possible in point two rotations.\"\n\t\n\t\"Our captain will not like leaving empty-handed,\" says ${leader} steadily.  \"If we could—\"\n\t\n\tKrantic surges forward, pushing ${leader} aside and raising his weapon.\n\t*goto disintigration\n\t\n*label disintigration\n\"I'm no gullible Groundsider,\" he growls.  \"We leave with vermite today, one way or another.  It can 'mature' in our hold.\" \n\nThe Medusi in the tent erupt into motion, waving their tentacles frantically.  Blue sparks shoot everywhere.\n*page_break\n\"No!\" bellows the leader.  \"Alien cruelty!  Younglings in solitude without instruction?  Heartlessness!\"\n\nIs it talking about vermite, the organic tech that seals starships?  You knew it was alive, in a micro-organism kind of way, but the way the Medusa talks about it…\n\nBut you don't have time to reflect on the nature of vermite.\n\n\"Lies!  Excuses!\" Krantic is yelling.\n\n\"Monsters!  Torturers!\" the leader yells back.  A miniature lightning bolt streaks from one of the worms on its head, striking the long-faced pirate standing next to Krantic.  The woman falls to the ground, convulsing.\n\nKrantic's face is a terrifying marriage of rage and glee.  \"They are attacking!  Kill them!\" he shouts, shooting at the Medusa leader.  The alien slumps, thick yellow mucus oozing from a hole in his hood.\n*set medusi_strength - 1\n*choice\n\t#\"Hold your fire!  They are shouting, not shooting!\"\n\t\t*set persuasiveness %+ 5\n\t\t*set empathy %+ 5\n\t\t\t\t\n\t\tKrantic laughs at you and shoots at a fleeing Medusa.  The aliens are speeding towards the cave entrance, their massive bodies oddly nimble as they run.\n\t\t\t\t\n\t\t*if (leader = \"Krantic\")\n\t\t\t*if ((persuasiveness > 75) or (infamy >= 20))\n\t\t\t\tThe rest of the crew seems to believe you, or at least to doubt Krantic; they lower their weapons uncertainly.\n\n\t\t\t\tDo you want to:\n\t\t\t\t*choice\n\t\t\t\t\t#Stay and try to reason with the more reasonable members of the crew.\n\t\t\t\t\t\t*goto try_reason\n\t\t\t\t\t#Run after the Medusi into the cave.\n\t\t\t\t\t\t*gosub run\n\t\t\t\t\t\tMaybe the crew actually listened to what you had to say.\n\t\t\t\t\t\t*goto solo_exit\n\t\t\t*else\n\t\t\t\t*goto must_run\n\t\t*else\n\t\t\t*label leader_stops\n\t\t\t\"Don't shoot!\" yells ${leader}.  $!{l_he} points ${l_his} own gun at Krantic, and the grim set of ${l_his} mouth says ${l_he} will shoot if ${l_he} has to, clearer than any words.  \"Utambu, take his weapon.\"\n\n\t\t\tKrantic smiles ironically.  \"The aliens are getting away while you mess around here.  You should worry about them, not me.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\"You have nearly destroyed any chance we have of establishing ongoing trade with these Medusi, as the captain ordered us to do.  You are no longer in command on this mission,\" ${leader} says.  \"I am.\"\n\n\t\t\tDo you want to:\n\t\t\t*choice\n\t\t\t\t#Stay and try to reason with the more reasonable members of the crew.\n\t\t\t\t\t*gosub calm\n\t\t\t\t\t*gosub explain\n\t\t\t\t\t*goto group_exit\n\t\t\t\t#Run after the Medusi into the cave.\n\t\t\t\t\t*gosub run\n\t\t\t\t\tMaybe the crew actually listened to what you had to say.\n\t\t\t\t\t*goto solo_exit\t\t\t\n\t*if (gun) #I shoot Krantic.\n\t\t*set infamy %+ 25\n\t\t*set crew_strength -1\n\t\t*if (leader = \"Krantic\")\n\t\t\t*set leader \"Ny-bat\"\n\t\t\t*if n_he = \"she\"\n\t\t\t\t*set l_he \"she\"\n\t\t\t\t*set l_him \"her\"\n\t\t\t\t*set l_his \"her\"\n\t\t\t\t*goto krantic_shot\n\t\t\t*else\n\t\t\t\t*goto krantic_shot\n\t\t*else\n\t\t\t*goto krantic_shot\t\t\n\t*if (gun) #I point my gun at Krantic, but don't shoot yet.\n\t\t*set infamy %+ 20\n\t\tKrantic's grin falters.  \"The aliens are getting away!  You should worry about them, not me,\" he says.\n\t\t\t\t\n\t\tThe Medusi are fleeing towards the cave entrance, their massive bodies oddly nimble as they run.\n\t\t*if (leader = \"Krantic\")\n\t\t\t*set leader \"Ny-bat\"\n\t\t\t*if n_he = \"she\"\n\t\t\t\t*set l_he \"she\"\n\t\t\t\t*set l_him \"her\"\n\t\t\t\t*set l_his \"her\"\n\t\t\t\t*goto leader_stops\n\t\t\t*else\n\t\t\t\t*goto leader_stops\n\t\t*else\n\t\t\t*goto leader_stops\n\t#I hurry out of the line of fire.\n\t\t*set infamy %- 15\n\t\t*set empathy %- 15\n\t\tYou sprint across the black rock, removing yourself from the conflict.  Your heart is pounding, your blood a muffled drumming in your ears.  Once you are safely behind a thick knot of slender, twisted trees, you take a deep calming breath, and listen to the shouting voices.\n\t\t\t\t\n\t\t*if (leader = \"Krantic\")\n\t\t\t*set medusi_strength -2\n\t\t\t\"Chase them!  Leave two alive to show us the vermite.  Kill the rest!\" Krantic yells.  His command is followed by the sharp report of several weapons.\n\t\t\t\t\t\t\n\t\t\t*label must_choose\n\t\t\tThe Medusi must be fleeing, probably into the cave near their camp.  You realize that you have to join one group or the other, or be left alone, stranded on an alien planet, with no allies and no ship.\n\t\t\t\n\t\t\tYou…\n\t\t\t*choice\n\t\t\t\t#…try to reason with the more reasonable members of the Reckless crew.\n\t\t\t\t\tYou run across the rippled rock to join the Reckless ground team.\n\t\t\t\t\t*label try_reason\n\t\t\t\t\t*gosub calm\n\t\t\t\t\t*gosub explain\n\t\t\t\t\t*if ((persuasiveness > 75) or (infamy > 20))\n\t\t\t\t\t\t*if (leader = \"Krantic\")\n\t\t\t\t\t\t\t*set leader \"Ny-bat\"\n\t\t\t\t\t\t\t*if n_he = \"she\"\n\t\t\t\t\t\t\t\t*set l_he \"she\"\n\t\t\t\t\t\t\t\t*set l_him \"her\"\n\t\t\t\t\t\t\t\t*set l_his \"her\"\n\t\t\t\t\t\t\t\t*goto restrain\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto restrain\n\t\t\t\t\t\t\t*label restrain\n\t\t\t\t\t\t\t\"Crazy runaway Stashie!\" Krantic shouts.  \"If you open that mouth again, I'll fill it with blood.  Gao!  Restrain the deserter.  We've got aliens to kill!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I don't think that would be wise,\" ${leader} says.  $!{l_he} points ${l_his} own gun at Krantic, and the grim set of ${l_his} mouth says ${l_he} will shoot if ${l_he} has to, clearer than any words.  \"Utambu, take his weapon.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tUtambu edges closer to Krantic as a trainer might approach a circus lion, ever aware that lions are never truly tamed.  He snatches Kranic's gun and scoots quickly away.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tKrantic smiles ironically.  \"The aliens are getting away while you mess around here.  You should worry about them, not me.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"You have nearly destroyed any chance we have of establishing ongoing trade with these Medusi, as the captain ordered us to do.  You are no longer in command on this mission,\" ${leader} says.  \"I am.\"\n\t\t\t\t\t\t\t*label group_exit\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t${leader} turns to you.  \"I'm not sure what your role here is, ${name}.\n\t\t\t\t\t\t\t*if ((leader = \"Ny-bat\") and (nybat_rom > 1))\n\t\t\t\t\t\t\t\tYou know how I feel about you, and I know you had the best intentions, making contact with the Medusi alone.  But this is a dangerous situation, and we need to cooperate.  What will convince you to coordinate with us?\"\n\t\t\t\t\t\t\t\t*goto need_choice\n\t\t\t\t\t\t\t*if (((infamy > 70) or ((leader = \"Gao\") and (gao_ally = true))) or ((leader = \"Ny-bat\") and (nybat_ally = true)))\n\t\t\t\t\t\t\t\tI trusted you, until you ran off.\n\t\t\t\t\t\t\t\t*label stashie_role\n\t\t\t\t\t\t\t\tBut we can't just accept you as part of the ground team.  What do you want from us?\"\n\t\t\t\t\t\t\t\t*label need_choice\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#\"Your promise: don't shoot any more Medusi.\"\n\t\t\t\t\t\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t\t\t\t\t\t*set level %+ 5\n\t\t\t\t\t\t\t\t\t\t\"I won't, if I have any other choice,\" says ${leader}.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*label together\n\t\t\t\t\t\t\t\t\t\t\"You have a rapport with the Medusi.  If you explain the misunderstanding, perhaps we can still salvage this mission.  You can follow us, for now.  The captain will eventually have to decide what to do with you.\"\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*if (nybat_rom > 1)\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tNy-bat smiles reassuringly.  \"Of course, you will have my support when that time comes.\"\n\t\t\t\t\t\t\t\t\t\t\t*goto altleader_exit\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*label altleader_exit\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tThe pirate who was struck by the bolt of electricity is beginning to recover; ${leader} leaves her in charge of monitoring Krantic (now restrained with foam) and updating the captain.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tYou and the rest of the pirates set out at a run for the cave, feet pounding across the black rock.\n\t\t\t\t\t\t\t\t\t\t\t*gosub affection\n\t\t\t\t\t\t\t\t\t\t\tYour thick breaths catch in your throat; the soupy air isn't conducive to exertion.  Soon the jagged roof of the cave looms over you like a monstrous black overbite.\n\t\t\t\t\t\t\t\t\t\t\t*set crew true\n\t\t\t\t\t\t\t\t\t\t\t*page_break Chapter Five: Into the Dark\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene crew_cave\n\t\t\t\t\t\t\t\t\t#\"Your cooperation.  Follow my lead and I'll handle the Medusi.\"\n\t\t\t\t\t\t\t\t\t\t*if ((infamy > 75) or ((infamy > 60) and (allies > 2)))\n\t\t\t\t\t\t\t\t\t\t\t*set infamy %+ 20\n\t\t\t\t\t\t\t\t\t\t\t*set level %+ 10\n\t\t\t\t\t\t\t\t\t\t\t${leader} thinks for a moment.  \"You have a rapport with the Medusi.  If you explain the misunderstanding, perhaps we can still salvage this mission.  We'll follow you, for now.  But the moment you put the crew in unnecessary danger, I'm back in command.\"\n\n\t\t\t\t\t\t\t\t\t\t\tYou nod in agreement.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\"The captain will eventually have to decide what to do with you,\" ${leader} adds.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*if (nybat_rom > 1)\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tNy-bat smiles reassuringly.  \"Of course, you will have my support when that time comes.\"\n\t\t\t\t\t\t\t\t\t\t\t\t*goto you_exit\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t*label you_exit\n\t\t\t\t\t\t\t\t\t\t\t\t*set leader \"you\"\n\t\t\t\t\t\t\t\t\t\t\t\t*achieve leader\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tThe pirate who was struck by the bolt of electricity is beginning to recover; you leave her in charge of monitoring Krantic (now restrained with foam) and updating the captain.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tYou and the rest of the pirates set out at a run for the cave, feet pounding across the black rock.\n\t\t\t\t\t\t\t\t\t\t\t\t*gosub affection\n\t\t\t\t\t\t\t\t\t\t\t\tYour thick breaths catch in your throat; the soupy air isn't conducive to exertion.  Soon the jagged roof of the cave looms over you like a monstrous black overbite.\n\t\t\t\t\t\t\t\t\t\t\t\t*set crew true\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break Chapter Five: Into the Dark\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene crew_cave \n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\"You know I can't just hand over command,\" says ${leader}.  \"But I can promise not to shoot if I have any other choice.\"\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*goto together\n\t\t\t\t\t\t\t\t\t#\"Your departure.  Leave the Medusi alone.\"\n\t\t\t\t\t\t\t\t\t\t*set infamy %- 15\n\t\t\t\t\t\t\t\t\t\t*set level %- 5\n\t\t\t\t\t\t\t\t\t\t*if (nybat_rom \u003c 2)\n\t\t\t\t\t\t\t\t\t\t\t\"You know we can't do that,\" says ${leader}.  \"Utambu, you'd better foam ${name} until the captain…\"\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tYou don't hear the rest, because you are running \n\t\t\t\t\t\t\t\t\t\t\t*label let_go\n\t\t\t\t\t\t\t\t\t\t\ttowards the cave, feet pounding across the black rock.  Your thick breaths catch in your throat; the soupy air isn't conducive to exertion.  You strain for the sound of firing weapons, but it seems that ${leader} has decided to let you go.\n\t\t\t\t\t\t\t\t\t\t\t*goto solo_exit\n\t\t\t\t\t\t\t\t\t\t*elseif (leader = \"Ny-bat\")\n\t\t\t\t\t\t\t\t\t\t\t\"You know we can't do that,\" says ${leader}.  \"Follow the Medusi, ${name}.  Perhaps you can do some good.\"\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tSome of the pirates begin to protest Ny-bat's decision to let you go, but you don't stay to listen.  You run \n\t\t\t\t\t\t\t\t\t\t\t*goto let_go\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\"You know we can't do that,\" says ${leader}.  \"Utambu, you'd better foam ${name} until the captain…\"\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\"Or we could let ${name} follow the Medusi, and perhaps do some good?\" suggests Ny-bat.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tSome of the pirates begin to protest, but you don't stay to listen.  You run \n\t\t\t\t\t\t\t\t\t\t\t*goto let_go\n\t\t\t\t\t\t\t*elseif (infamy > 40)\n\t\t\t\t\t\t\t\tI was just beginning to trust you when you ran off.\n\t\t\t\t\t\t\t\t*goto stashie_role\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou haven't earned our trust.  You chose the Medusi.\n\t\t\t\t\t\t\t\t*goto stashie_role\t\t\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto group_exit\t\t\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto must_run\n\t\t\t\t#I run after the Medusi, my alien allies.\n\t\t\t\t\t*label follow_medusi\n\t\t\t\t\t*gosub run\n\t\t\t\t\tMaybe they are unclear on whether you're an admissible target or not.\n\t\t\t\t\t*goto solo_exit\n\t\t*else\n\t\t\t\"Don't shoot!\" yells ${leader}. \"Utambu, take his weapon.\"\n\t\t\t\t\t\t\n\t\t\t\"The aliens are getting away!  You should worry about them, not me,\" Krantic says.\n\t\t\t\t\t\t\n\t\t\t\"But we always worry about you,\" ${leader} says.  You strain to hear ${l_his} voice, now that ${l_he} is not shouting.  \"And I'm worried about that Stashie, too.\"\n\t\t\t\n\t\t\tThe Medusi must be fleeing, probably into the cave near their camp.  You realize that you have to join one group or the other, or be left alone, stranded on an alien planet, with no allies and no ship.\n\t\t\t*choice\n\t\t\t\t#I run after the Medusi, my alien allies.\n\t\t\t\t\t*goto follow_medusi\n\t\t\t\t#I try and reason with the Reckless crew.\n\t\t\t\t\t*goto group_exit\n\n*label krantic_shot\n*gosub new_leader\nYou raise Vikola's gun and press the archaic mechanical trigger.\n\nKrantic stumbles to the ground, screaming, with bullets in both legs.  You were aiming for the heart, but you still managed to remove him from the fight. \tChaos erupts, as some pirates cluster around Krantic, some back away, and some point their weapons towards you.  You holster your gun, indicating that you have no intention of shooting anyone else.  Krantic's screams are cut off abruptly; someone must have rendered him unconscious.  You can't see his head, only the legs Utambu is spraying; foam makes a good pressure bandage in emergency situations.\n\nThe Medusi are fleeing towards the cave entrance, their massive bodies oddly nimble as they run.  You…\n*choice\n\t#…run after the Medusi into the cave.\n\t\t*gosub run\n\t\tProbably they are busy sorting out who will lead the ground team now.\n\t\t*goto solo_exit\n\t#…stay and reason with the more reasonable members of the Reckless crew.\n\t\t*gosub calm\n\t\t\t\t\t\t\n\t\t\"Medusi speak through electrical discharge,\" you remind them.  \"When they yell, they throw sparks.  They didn't mean to hurt anyone.  But Krantic was determined to start a war.\"\n\t\t\n\t\t\"Take ${name}'s weapon, Utambu,\" says ${leader}.\n\t\t*set gun false\n\t\t\n\t\tYou give up your gun without protest.\n\t\t\n\t\t\"None of us are going to pity Krantic, ${name}.  You did what had to be done.  But you weren't the one to do it.\"\n\t\t*page_break\n\t\t*goto group_exit\n\t\t\n*label new_leader\n*if (leader = \"Krantic\")\n\t*set leader \"Ny-bat\"\n\t*if n_he = \"she\"\n\t\t*set l_he \"she\"\n\t\t*set l_him \"her\"\n\t\t*set l_his \"her\"\n\t\t*return\n\t*else\n\t\t*return\n*else\n\t*return\n\n*label calm\n*if (calm = false)\n\t*set calm true\n\t\"Everyone just calm down,\" you say, making eye contact with Gao, Utambu, Ny-bat—the more reasonable members of the Reckless delegation.\n\t\n\t*return\n*else\n\t*return\n\n*label explain\n*if (ex = false)\n\t*set level %+ 3\n\t*set ex true\n\n\t\"Medusi speak through electrical discharge,\" you remind them.  \"When they yell, they throw sparks.  They didn't mean to hurt anyone.\"\n\n\t\"Shut up!\" Krantic shouts.  He turns to the crew.  \"The Stashie's just buying time for the aliens to get away.  I'm in command here; when I say shoot, you shoot!\"\n\n\t*return\n*else\n\t*return\n\t\n*label negotiator\nYou step forward, placing yourself between the Reckless crew and the Medusi.  It is a nerve-wracking place to be.  You can't read Medusi body language, but the humans are teetering on the edge of violence.  They hold their weapons ready, and you can see the tension in the hunched shoulders, the fear in the white-knuckled grips.\n\n\"Stashie!\" yells Krantic.  \"I'll deal with you when I'm done with these fungi.  Maybe you should run away again—that might be entertaining.\"\n\t\nYou stand your ground and ignore Krantic.\n\t\n\"The Medusi are willing to negotiate,\" you say.  \"But they insist on speaking to…\"\n*choice\n\t#…Gao.\n\t\t*set infamy %+ 10\n\t\t\"Not possible,\" says Krantic.\n\t\t*label gaoleader\n\t\t*set leader \"Gao\"\n\t\t\t\t\n\t\t\"The captain is eager for a peaceful solution,\" says Ny-bat.  $!{n_he} is so tall that everyone, Krantic included, has to tilt their heads back in order to look ${n_him} in the face.  \"And Gao is our financial adviser.  It is reasonable for him to negotiate a purchase.\"\n\t\t\t\t\n\t\tGao clears his throat.  \"I suppose I was the one who thought of the vermite run in the first place,\" he says.\n\t\t\t\t\n\t\t\"I am in command!\" shouts Krantic, wildly swinging his weapon from Ny-bat to Gao and back again.\n\t\t\t\n\t\t\"You are,\" agrees Ny-bat mildly, as ${n_he} puts ${n_his} hand on Krantic's weapon and gently but inexorably forces it down.  $!{n_he} keeps ${n_his} eyes fixed on Krantic's all the while.  It is Krantic who looks away first.\n\t\t\t\n\t\t\"We'll follow Gao's lead,\" says Ny-bat.\n\t\t\t\t\n\t\tYou breathe a sigh of relief.\n\t\t*page_break\n\t\t*goto nego\n\t#…Zeeber.\n\t\t*set infamy %- 10\n\t\t*set level %- 5\n\t\t\"Not possible,\" says Krantic.\n\t\t\t\t\n\t\t*if (zeeber_ally = false)\n\t\t\t\"Why are you trying to get me in trouble?\" hisses Zeeber, inching farther away from Krantic.\n\t\t\t\t\t\t\n\t\t\t\"I wasn't,\" you protest.  You were simply nominating someone who would let you control the conversation, without considering the ramifications.\n\t\t\t\t\t\t\n\t\t\t\"Perhaps someone more experienced should serve as go-between,\" suggests Ny-bat.  $!{n_he} is so tall that everyone, Krantic included, has to tilt their heads back in order to look ${n_him} in the face.\n\t\t\t*set leader \"Ny-bat\"\n\t\t\t*if n_he = \"she\"\n\t\t\t\t*set l_he \"she\"\n\t\t\t\t*set l_his \"her\"\n\t\t\t\t*set l_him \"her\"\n\t\t\t\t*goto nybat\n\t\t\t*else\n\t\t\t\t*goto nybat\n\t\t*else\n\t\t\t\"I can negotiate!  I've seen Zoa do it lots!\" says Zeeber, hopping out from among the pirates.\n\t\t\t\t\t\n\t\t\t\"Get back!\" shouts Krantic, gesturing with his gun.\n\t\t\t\t\t\t\n\t\t\tZeeber bites her lip and retreats.  There is muttering among the pirates—they didn't like your choice.\n\t\t\t\t\t\n\t\t\t\"You need someone who understands the economics,\" mutters Gao.\n\t\t\t\t\t\t\n\t\t\t*set leader \"Ny-bat\"\n\t\t\t*if n_he = \"she\"\n\t\t\t\t*set l_he \"she\"\n\t\t\t\t*set l_him \"her\"\n\t\t\t\t*set l_his \"her\"\n\t\t\t\t*goto nybatstart\n\t\t\t*else\n\t\t\t\t*goto nybatstart\n\t#…Ny-bat.\n\t\t*set infamy %+ 10\n\t\t*label nybatstart\n\t\t*set leader \"Ny-bat\"\n\t\t*if n_he = \"she\"\n\t\t\t*set l_he \"she\"\n\t\t\t*set l_his \"her\"\n\t\t\t*set l_him \"her\"\n\t\t\t*goto nycalms\n\t\t*else\n\t\t\t*label nycalms\n\t\t\t\"I will serve as go-between,\" Ny-bat says calmly.  $!{n_he} is so tall that everyone, Krantic included, has to tilt back in order to look ${n_him} in the face.\n\t\t\t*label nybat\n\t\t\t\t\t\n\t\t\t\"The captain—\" begins Krantic.\n\t\t\t\t\t\n\t\t\t\"Is eager for a peaceful solution,\" says Ny-bat.\n\t\t\t\t\t\n\t\t\tGao clears his throat.  \"We all know the captain trusts Ny-bat.\"\n\t\t\t*label staring\n\t\t\t\t\t\n\t\t\t\"I am in command!\" shouts Krantic, wildly swinging his weapon from Ny-bat to Gao and back again.\n\t\t\t\t\t\n\t\t\t\"You are,\" agrees Ny-bat mildly, as ${n_he} puts ${n_his} hand on Krantic's weapon and gently but inexorably forces it down.  $!{n_he} keeps ${n_his} eyes fixed on Krantic's all the while.  Krantic looks away first.\n\t\t\t\t\t\n\t\t\tYou breathe a sigh of relief.\n\t\t\t*page_break\n\t\t\t*goto nego \n\t#…Utambu.\n\t\t*set infamy %- 5\n\t\t\"Not possible,\" snarls Krantic.\n\t\t\t\n\t\t\"You're sure?  I mean, me?\" asks Utambu uncertainly.\n\t\t\t\t\n\t\tThe pirates are muttering—they don't like your choice.  You hear Ny-bat's name several times, and \"Gao knows the market,\" from someone in the back.\n\t\t\t\t\n\t\t\"Shut it, all of you!\" shouts Krantic uselessly.\n\t\t\t\t\n\t\t*if (infamy > 50)\n\t\t\tYou still have some influence with the Reckless crew, so you use it to support:\n\t\t\t*choice\n\t\t\t\t#Gao\n\t\t\t\t\t*set leader \"Gao\"\n\t\t\t\t\t\"Gao knows the most about vermite, so the Medusi will negotiate with him,\" you say.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"They'll talk to me!\" Krantic insists.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*goto gaoleader\n\t\t\t\t#Ny-bat\n\t\t\t\t\t*set leader \"Ny-bat\"\n\t\t\t\t\t\"Ny-bat has the captain's trust, so the Medusi negotiate with ${n_him},\" you say.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"They'll talk to me!\" Krantic insists.\n\t\t\t\t\t*if n_he = \"she\"\n\t\t\t\t\t\t*set l_he \"she\"\n\t\t\t\t\t\t*set l_him \"her\"\n\t\t\t\t\t\t*set l_his \"her\"\t\n\t\t\t\t\t\t*goto nybatstart\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto nybatstart\n\t\t*else\n\t\t\tThe crew won't care for your opinion, so you let them sort it out.\n\t\t\t\t\t\n\t\t\t*goto nybatstart\n\n*label nego\nYou see that Krantic is seething, his jaw clenched tight.  You wonder how long until he explodes in some way, despite his orders, and if ${leader} will be able to hold him back.  At least the Medusi have someone rational to speak with now.\n\nThe Medusa leader joins you between the two groups.\n*goto purpose\n\n*label scuffle\n*if (solo = false)\n\t\"No!  Impossibility!\" booms a deep voice.  A scuffle breaks out in the Medusi's tent.  The Mushroom attempts to surge forward, while others hold it back with a tangle of tentacles.\n\n\tThe leader turns, hood sucked in tight.  \"Diplomat indisposition, necessity withdrawal,\" it says.\n\n\tTwo tenders drag the struggling Mushroom into the cave, and a restless peace returns to the Medusi tent.  \n\n\t\"Forgive dissension.  Diplomat requires re-leveling,\" says the Medusi leader.\n\n\t*return\n*else\n\t\"No!  Impossibility!\" booms a deep voice.  A scuffle ensues in the Medusi tent as one alien attempts to surge forward, while others hold it back with a tangle of limbs.\n\n\tThe leader turns, looking like a capped pen with its hood sucked in tight and all its limbs pointing straight down to the ground.  Its posture is clearly a resolute response to its follower's wild flailing.  \"I authority here!  I of Third Level, and this my sphere!\" it says with determination.\n\n\tA restless peace returns to the Medusi's tent.  \n\n\t\"Forgive dissension.  Creature of the First Level,\" says the Medusi leader.\n\t\n\t*return\n\t\n*label solo_exit\n\nSoon the jagged roof of the cave looms over you like a monstrous black overbite.  The darkness is abrupt, and you almost crash into the corpulent Medusa blocking your way.\n*page_break Chapter Five: Into the Dark\n*goto_scene medusi_cave\n*label run\nYou dash after the retreating Medusi, your feet pounding across the black rock.  Your thick breaths catch in your throat; the soupy air isn't conducive to exertion.  You strain for the sound of firing weapons, but the crew isn't shooting at the moment, thank the stars.\n*return\n\n*label must_run\n*set medusi_strength -2\nYou hear several pirates open fire, and see two more Medusi slump to the ground before the aliens disappear into the dark volcano.  The pirates don't trust you, and won't listen to what you have to say—at least not while Krantic is in charge.\n\n*gosub run\n*goto solo_exit\n\n*label affection\n*if (nybat_rom > 1)\n\tNy-bat squeezes your arm as ${n_he} lopes past, and the brief gesture of affection reminds you that you are not alone on this adventure anymore.\n\t*return\n*else\n\t*return", "medusi_cave": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\nInto the Dark\n(Chapter 5 of 6)\n\n*set crew false\n*if (leader = \"you\")\n\t*set leader \"Ny-bat\"\n\t*if n_he = \"she\"\n\t\t*set l_he \"she\"\n\t\t*set l_his \"her\"\n\t\t*set l_him \"her\"\n\t\t*goto start\n\t*else\n\t\t*goto start\n*else\n\t*goto start\n*label start\nThe interior of the cave is a hollow tube stretching back into the mountain, a channel carved by molten lava. The curving walls look organic, like the smooth sides of a gigantic throat.\n\nYou almost run into a huge Medusa who suddenly halts and blocks your path.\n\n\"Why following?\" thunders the Medusa.  \"Aliens initiation violence! Now enemies.\"\n\nYou answer:\n*choice\n\t#\"I am not one of the pirates.\" \n\t\t\"I was kidnapped, just like your Honored Diplomat,\" you say.\n\t\t*set infamy %-5\n\t\t*goto empathy_check\n\t#\"Only one of us is violent.\"\n\t\t\"Once he is dealt with, we can talk rationally and reach an agreement that will benefit us both,\" you say.\n\t\t*set persuasiveness %+ 5\n\t\t*goto empathy_check\n\t#\"I can help you defend yourselves from the pirates.\"\n\t\t*set persuasiveness %+ 5\n\t\t*set empathy %+ 5\n\t\t*label empathy_check\n\t\t*if ((empathy >= 60) or (persuasiveness >= 80))\n\t\t\tThe alien considers your words.  You glance over your shoulder, wondering how long it will take the Reckless crew to regroup and follow you.\n\t\t\t\t\t\t\n\t\t\tFinally, it says, \"Level is unknown.  Uncertainty of ability for aid.  I, humble Assistant Foreperson, incapacity for judgement. But alien may prove worth.\"\n\t\t\t\n\t\t\tIt turns and follows its fellows, and you suppose you are free to do the same.\n\t\t\t*page_break\n\t\t\t*goto tunnels\n\t\t*else\n\t\t\t*set prisoner true\n\t\t\tThe alien considers your words.  You glance over your shoulder, wondering how long it will take the Reckless crew to regroup and follow you.\n\t\t\t\t\t\t\n\t\t\tFinally, it says, \"Level is unknown.  Uncertainty of ability for aid.  Insufficiency of trust.  I, humble Assistant Foreperson, incapacity for judgement.  Alien will accompaniment as prisoner—incapacitation by shouts if resistance.\"\n\t\t\t\t\t\t\n\t\t\tIt's an ugly threat. You don't want to end up convulsing on the ground, so you let the Medusa prod you down the ever narrowing tunnel.\n\t\t\t*goto tunnels\n\t#\"You are my only way home.\"\n\t\t*set infamy %- 5\n\t\t*set empathy %- 10\n\t\t*goto empathy_check\n\n*label tunnels\nYou draw some oxygen from your emergency breather, a gadget the shape of a miniature flute. By the time you reach the first bend, the Medusi can travel only in single file.  You take a last look at the brilliant outdoors, before rounding the corner and plunging into gloom.  Your goggles automatically begin to emit a soft white light, and to enhance your low-light vision.  You see the branching of the tunnel clearly, but entirely in shades of gray.\n\nThe Medusi pause for a 'whispered' discussion, their electrical speech so faint that your speech box hisses quietly but cannot translate. Eventually, they split into two groups. The Assistant Foreperson wraps a limb round your wrist and tugs you towards the left-hand tunnel. You shudder at the moist touch.\n\nYou follow a sinuous path deep into the mountain, stopping after a sharp corner.\n\n\"Two will remain, blockage to alien progress,\" says the Assistant Foreperson.  \"Incapacitation by shout if aliens approach.\"\n\nAn ambush sounds like…\n*choice\n\t#…a good idea for others to carry out.\n\t\tThe pirates are probably right behind you; an ambush will delay them, and give the Medusi time to get wherever they are going. You compliment the Assistant Foreperson on its strategic thinking.\n\t\t\n\t\t*goto deeper\n\t#…a chance to prove myself.\n\t\tIf you help hold off the pirates, you'll improve your relationship with the Medusi.\n\t\t*goto ambush\n\t#…a horrible idea that will cost lives.\n\t\tTwo unarmed Medusi will have no defense against pirates with guns.\n\t\t*set empathy %+3\n\t\tYou argue strenuously against this plan.\n\t\t\t\t\n\t\t\"Medusi safety of paramount importance.  Alien assessment of risk correctness,\" says the Assistant Foreperson.  That sounds like agreement to you.  \n\t\t\n\t\t*label deeper\n\t\t\"Reliance on emergency protocol.  Haste!\" it orders you, hurrying off down the serpentine tunnel,\n\t\t*if (prisoner)\n\t\t\tdragging you along.\n\t\t\t*page_break\n\t\t\t*goto trap\n\t\t*else\n\t\t\tracing ahead as you, a mere human, fall behind.\n\t\t\t*page_break\n\t\t\t*goto trap\n\t#…merely delaying the inevitable.\n\t\tCaptain Zoa isn't going to leave empty-handed, so you argue strenuously against this plan.\n\t\t\t\t\n\t\t\"Violent aliens not ascension.  No negotiations in that case.  Alien will witness,\" says the Assistant Foreperson, disregarding your opinion.  It chooses two Medusi to stage an ambush, and races away.\n\t\t\t\n\t\t*label stay_or_go\n\t\tDo you want to…\n\t\t*choice\n\t\t\t#…stay behind and help with the ambush.\n\t\t\t\t*goto ambush\n\t\t\t#…continue on with the Assistant Foreperson.\n\t\t\t\t*goto deeper\n\n*label ambush\n*set empathy %+ 20\n*set crew_strength -3\n\n\"Alien exposure risk for Medusi safety,\" says the Assistant Foreperson, obviously impressed with your selflessness.\n*if prisoner\n\tIt releases your arm, finally willing to consider you an ally rather than a prisoner.\n\t*set prisoner false\n\t*goto conflict\n*else\n\t*goto conflict\n\n*label conflict\n*set crew_strength -2\n\nIt leaves you with two Medusi standing hood to hood, filling the tunnel.  You are forced to crouch and peer through a tangle of limbs.\n\nYou hear the pirates approaching, and wonder what kind of sensory system allows the Medusi to perceive them at a distance. In any case, the Medusi are ready, and begin shouting bright streaks of light from the worms on top of their hoods as soon as the pirates round the corner.  Two of the Reckless crew members fall to the ground convulsing, and are dragged back around the curve by their companions.  Only half of the ground team seems to be here—the others must have explored the right-hand fork.\n*if (leader = \"Krantic\")\n\tYou have time for a few soupy breaths while the pirates mutter.\n\t\n\tSoon you hear Krantic's raised voice.  \"Run away, Mushrooms!  I'll give you a centasecond before I start shooting.  Run or die!\"\n\t\n\t\"We of the First Level! This beyond our capacity! What response?\" you speech box squawks. Your Medusi companions are begging for guidance.\n\t\n\tYou tell them:\n\t*choice\n\t\t#\"Order the pirates back to their ship.\"\n\t\t\t\"We can't be intimidated by threats,\" you explain.\n\t\t\t\n\t\t\tYour box transmits the Medusa's strident answer.  \"Aliens already demonstration instability and violence.  No arrangement could be trust.  Aliens must not proceed.  That is all.\"\n\t\t\t\t\t\t\n\t\t\t*goto attack\n\t\t#\"Krantic will kill us.  Let's run.\"\n\t\t\tYou and the two Medusi race down the tunnel, hoping it will take the pirates a few minutes to realize you are gone.\n\t\t\t*goto trap\n\t\t#\"Shout at Krantic now, before he starts shooting.\"\n\t\t\tKrantic is the threat, after all—if he is unconscious, the rest of the ground team might be reasonable.\n\t\t\t*set crew_strength -1\n\t\t\t*set medusi_strength -1\n\t\t\t*set leader \"Ny-bat\"\n\t\t\t*if n_he = \"she\"\n\t\t\t\t*set l_he \"she\"\n\t\t\t\t*set l_his \"her\"\n\t\t\t\t*set l_him \"her\"\n\t\t\t\t*goto shouting\n\t\t\t*else\n\t\t\t\t*label shouting\n\t\t\t\tThe Medusi are absurdly fleet on their six flexible limbs, and round the corner long before you do.  You can't hear their silent screams, but the clatter is deafening, as weapons bark and stray projectiles hit solid rock.\n\t\t\t\t\t\t\t\n\t\t\t\t\"Stop!  Cease fire!\" you shout.  \"They're only after Krantic!\"\n\t\t\t\t\t\t\t\n\t\t\t\tThe pirates stop shooting.  One\n\t\t\t\t*label got_krantic\n\t\t\t\tof the Medusi is injured, oozing yellow fluid from a hole in its hood.  Ny-bat is crouched over a seizing Krantic, hobbling him with foam.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\"That was overdue,\" says Ny-bat calmly, looking down at Krantic's contorted face.\n\t\t\t\t\n\t\t\t\t\"Please convey our apologies to your leader,\" ${n_he} says to the Medusa who is still standing.  \"We are sorry that the actions of one unstable individual caused you harm.  We promise you we will offer no more violence.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\"Will message transfer.  Medical supplies necessity for companion,\" squeaks the Medusa, running off down the lava tube.\n\t\t\t\t\n\t\t\t\t*if (nybat_rom > 1)\n\t\t\t\t\tYou pull Ny-bat up for a quick kiss, relieved that ${n_he} has come through the firefight safely.\n\t\t\t\t\t\n\t\t\t\t\t\"I should follow the Medusi, and try to earn their trust,\" you tell ${n_him}.\t\t\t\t\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#\"Can you turn back?\"\n\t\t\t\t\t\t\t\"I have my orders,\" ${n_he} says.  \"We will find a peaceful solution together.\"\n\t\t\t\t\t\t#\"Give me a few centaseconds before you follow.\"\n\t\t\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t\t\t*set empathy %+ 5\n\t\t\t\t\t\t\t$!{n_he} nods.  \"Try to calm them, if you can.\"\n\t\t\t\t\t\t#\"I don't think you'll get any vermite.\"\n\t\t\t\t\t\t\t\"I have my orders,\" ${n_he} says.  \"We will find a peaceful solution together.\"\n\t\t\t\t\t\t#\"I'll convince them to negotiate.\"\n\t\t\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t\t\t\"I hope you can,\" ${n_he} says.\t\t\t\t\t\n\t\t\t\t\t*goto trap\n\t\t\t\t*else\n\t\t\t\t\tBefore you follow it, you tell Ny-bat:\n\t\t\t\t\t\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#\"Don't follow me.\"\n\t\t\t\t\t\t\t\"I have my orders,\" ${n_he} says.\t\t\t\t\n\t\t\t\t\t\t#\"Give the Medusi time to regroup before you follow.\"\n\t\t\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t\t\t*set empathy %+ 5\n\t\t\t\t\t\t\t\"They'll be more likely to listen if they feel secure,\" you say.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Good advice,\" Ny-bat says.\n\t\t\t\t\t\t#\"You'll never get the vermite.\"\n\t\t\t\t\t\t\t\"I have my orders,\" ${n_he} says.\n\t\t\t\t\t\t#\"I'll convince the Medusi to negotiate.\"\n\t\t\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t\t\t\"I hope you can,\" ${n_he} says.\n\t\t\t\t\t*goto trap\n\t\t#Yell for the ground team to mutiny against Krantic.\n\t\t\t\"Ny-bat! Utambu! Gao!  Whoever's over there—we can work this out, if you can muzzle Krantic.  Take his gun!  Foam him!\"\n\t\t\t*label attack\n\t\t\t*set crew_strength -1\n\t\t\t*set medusi_strength -1\n\t\t\t*set leader \"Ny-bat\"\n\t\t\t\n\t\t\tKrantic roars wordlessly and rounds the corner, shooting.  The clatter is deafening, as his weapon barks and stray projectiles hit solid rock.  The Medusi make no sound, but their screams create a miniature lightning storm.  You are forced to back down the tunnel to avoid the electricity.\n\t\t\t\t\t\n\t\t\tWhen it's safe to try again, you discover that one\n\t\t\t*if n_he = \"she\"\n\t\t\t\t*set l_he \"she\"\n\t\t\t\t*set l_his \"her\"\n\t\t\t\t*set l_him \"her\"\n\t\t\t\t*goto got_krantic\n\t\t\t*else\n\t\t\t\t*goto got_krantic\n*else\n\t*label response\n\t\t\n\tYou have time for a few soupy breaths while the pirates mutter.\n\t\n\tThen you hear ${leader}'s raised voice. \"We are sorry for the injuries we have caused you.  The one who inflicted these wrongs on you is no longer in charge, and we promise you we will offer no more violence.\"\n\t\t\n\t\"We of the First Level. This beyond our capacity. What response?\" your speech box says softly.  Your Medusi companions are begging for guidance.\n\t\n\tYou tell it:\n\t*choice\n\t\t#\"You can trust ${leader}.\"\n\t\t\t\"He really does want a peaceful solution.  Tell them you'll pass their apologies on to your Assistant Foreperson,\" you say.\n\t\t\t\n\t\t\t\"Necessity transfer of new information to leadership,\" the Medusi answer.  \"Aliens await response shipside.\"\n\t\t\t\t\t\t\n\t\t\tYou doubt ${leader} will return to the ship, but you might be able to get a few minutes' lead.  The three of you slip away down the tunnel.\n\t\t\t*goto trap\n\t\t#\"Threaten to shout.\"\n\t\t\t\"Our orders are to delay them,\" you remind the Medusi.\n\t\t\t\n\t\t\tYour box transmits the Medusi' strident answer.  \"Aliens already demonstration instability and violence.  No arrangement could be trust.  Aliens must not proceed.  That is all.\"\n\t\t\t\t\t\n\t\t\tYou wait for a response that does not come.\n\t\t\t\n\t\t\t\"Nothing to say?\" you call out eventually.\n\t\t\t\t\t\t\n\t\t\t\"Um, they're gone,\" Zeeber says.  \n\t\t\t\n\t\t\tYou inch past the Medusi and peek around the corner.  Zeeber is alone with two unconscious pirates.  \n\t\t\t\n\t\t\t\"They didn't want to fight, so they went back and around the other way.  I'm supposed to stay with the ones who got zapped,\" says Zeeber.\n\t\t\t\t\t\t\n\t\t\t\"Necessity transfer of new information to leadership,\" says a Medusa from behind you.\n\t\t\t\t\t\t\n\t\t\tThe three of you follow the tunnel deeper into the volcano to report on your success.\n\t\t\t*page_break\n\t\t\t*goto trap\n\t\t#\"We'll attack first.\"\n\t\t\t\"Let's round the corner and try to take them all out,\" you say.\n\t\t\t*set crew_strength -5\n\t\t\t*set medusi_strength -2\n\t\t\t*set infamy %- 25\n\t\t\t*set empathy %- 20\n\t\t\t*set allies 0\n\t\t\t*set nybat_ally false\n\t\t\t*set nybat_rom 1\n\t\t\t*set gao_ally false\n\t\t\t*set zeeber_ally false\n\t\t\t*set utambu_ally false\n\t\t\tThe Medusi are absurdly fleet on their six limbs, and turn the corner long before you do. You can't hear their silent screams, but the clatter is deafening, as weapons bark and stray projectiles hit solid rock.\n\n\t\t\tAs you round the bend, the noise abruptly ceases, and the last standing pirate slumps to the ground.\n\n\t\t\t*set leader \"Gao\"\n\t\t\tBoth Medusi are huddled on the ground, oozing thick yellow fluid from holes in their hoods.  You have no way of knowing if they are dead or injured and in need of medical attention.  Beyond them, seven pirates lie unconscious and twitching on the ground, including Zeeber and Ny-bat.  The other half of the ground team must have taken the other tunnel.\n\t\t\t\t\t\t\t\n\t\t\tYou have radically changed the odds; now the Medusi outnumber the pirates {medusi_strength} to {crew_strength}.  You've also destroyed any relationships you had with members of the Reckless crew—they won't trust you, now that you've attacked them.  You race down the tunnel to find the Medusi Assistant Foreperson and make your report.\n\t\t\t*page_break\n\t\t\t*goto trap\n\t\t#\"He might by lying.  Let's run!\"\n\t\t\tYou and the two Medusi race down the tunnel, hoping it will take the pirates a few minutes to realize you are gone.\n\t\t\t*goto trap\n\n*label trap\n\nBefore you get too far, you hear a deafening crunch, the sound of a giant biting into a rock sandwich.  Somewhere, a tunnel has collapsed.\n\nYou run on, pushing yourself until you are panting, unable to catch your breath by heaving in the thick, wet air.  It's a good thing you have:\n*fake_choice\n\t#A pair of goggles.\n\t\t*set level %- 10\n\t\t*set hacking %- 20\t\n\t\tYou really must be light-headed from lack of oxygen! After tapping your goggles in confusion, you dig in your pocket for your emergency breather.\n\t#A speech box.\n\t\t*set level %- 10\n\t\t*set hacking %- 20\n\t\tYou really must be light-headed from lack of oxygen!  After feeling around the inside of your speech box, you dig in your pocket for your emergency breather.\n\t#A pocket.\n\t\t*set level %+5\n\t\t*set hacking %+ 5\n\t\tYes.  A pocket with something in it, something whose name you can't remember.  You really must be light-headed from lack of oxygen!  But when your hand closes around your emergency breather, you know what to do with it.\n\t#An emergency breather.\n\t\t*set hacking %+ 15\n\t\t*set level %+ 10\n\t\tExactly.  Lack of oxygen hasn't muddled your thinking, not yet.  You dig in your pocket for your emergency breather.\n*comment endif\n\nA few sweet breaths of oxygen, and your heart slows.\n\n*if (prisoner = false)\n\tYou come to a lone Medusa standing next to a vermite-plugged tunnel entrance.\n\n\t\"What's through there?\" you ask via your speech box.\n\n\t\"Violent aliens.  Entrapment, and soon death from deficiency of necessity molecules in everymist,\" it says, which you take to mean that the other half of the Reckless ground team is sealed in, and will run out of air.\n\n\tDo you want to…\n\t*choice\n\t\t#…persuade the Medusa to let the pirates out.\n\t\t\t*set empathy %+ 15\n\t\t\t*if ((persuasiveness >= 85) or (empathy >= 70))\n\t\t\t\t*set crew_strength -3\n\t\t\t\t*set crew true\n\t\t\t\t*set infamy %+ 25\n\t\t\t\t*gosub reasons\n\t\t\t\t\"Alien ally will accompaniment other aliens, guarantee peaceableness?\"\n\t\t\t\t\n\t\t\t\tYou promise to do so.\n\t\t\t\t\n\t\t\t\tThe Medusa touches a limb to the vermite and says, \"In eight units of time portal appearance.  This Medusa will give report.  Aliens will follow, and if ascension, perhaps trade possibility.\"\n\t\t\t\t\n\t\t\t\t\"Ascension?\" you ask, but the Medusa doesn't answer, just races off down the tunnel.\n\t\t\t\t\n\t\t\t\tYou wait with your hand against the vermite—eight units of Medusi time turns out to be about a kilosecond.  You feel the vermite soften, ripple, and then flow across your hand towards the edges of the narrow lava tube.  Four extremely grateful pirates stumble out.  Two more were severely injured by the rockfall, and must wait for medical evacuation. Utambu, who has a deep cut on one arm, will stay to watch over them.  You've saved the lives of a third of the Reckless crew now, and that has earned you quite of bit of respect from the pirates.\n\t\t\t\t*label group_exit\n\t\t\t\t\n\t\t\t\tYou lead the pirates you released on down the tunnel.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene pits\n\t\t\t*else\t\t\t\n\t\t\t\t*gosub nice_try\n\t\t\t\t*choice\n\t\t\t\t\t#Beg for an air hole instead.\n\t\t\t\t\t\t*if ((persuasiveness > 70) or (empathy > 60))\n\t\t\t\t\t\t\t*goto hole\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"I will question for orders,\" says the Medusa.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto solo_exit\n\t\t\t\t\t#Threaten it with violence.\n\t\t\t\t\t\t*set infamy %+ 20\n\t\t\t\t\t\t*label threaten\n\t\t\t\t\t\t*if (gun = true)\n\t\t\t\t\t\t\t*set strength %- 20\n\t\t\t\t\t\t\tYou pull your gun from its holster, \n\t\t\t\t\t\t\t*label struck\n\t\t\t\t\t\t\tbut before you have a chance to raise it, you are engulfed in agony.  Every pain nerve in your body fires simultaneously for a moment, and then there is nothing.\n\n\t\t\t\t\t\t\tYou wake alone in a world of gray and black.  You are in the lava tube where the Medusa struck you with its mini-lightning, next to the vermite seal.  Echos of pain race down your nerves as you sit up.  Your chronometer says that only a kilosecond has passed.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou have no choice but to continue on, and hope that you haven't lost all credibility with the Medusi.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto_scene pits\n\t\t\t\t\t\t*elseif (needle = true)\n\t\t\t\t\t\t\tYou withdraw the long medibed needle from your sleeve,\n\t\t\t\t\t\t\t*goto struck\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tHow?  You have no weapon, and the Medusa is easily three times your mass.  You have no choice but to continue on.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto_scene pits\n\t\t\t\t\t#Race after the Assistant Foreperson.\n\t\t\t\t\t\t*goto solo_exit\n\t\t#…convince the Medusa to give the pirates an air hole.\n\t\t\t*set empathy %+ 25\n\t\t\t*if ((persuasiveness > 70) or (empathy > 60))\n\t\t\t\t*set infamy %+ 20\n\t\t\t\t*gosub reasons\n\t\t\t\t*label hole\n\t\t\t\t\"Passage will appearance for everymist.\" \n\t\t\t\t\n\t\t\t\tIt touches a limb to the vermite seal, and a circular hole about the size of your hand appears in the middle of the glassy wall.\n\t\t\t\t\n\t\t\t\tYou've just saved the lives of half the Reckless ground team.  That should earn you some respect.\n\t\t\t\t*page_break\n\t\t\t\t*goto solo_exit\n\t\t\t*else\n\t\t\t\t*gosub nice_try\n\t\t\t\t*choice\n\t\t\t\t\t#Threaten it with violence.\n\t\t\t\t\t\t*goto threaten\n\t\t\t\t\t#Race after the Assistant Foreperson.\n\t\t\t\t\t\t*goto solo_exit\n\t\t#…continue on.\n\t\t\t*label cruel\n\t\t\t*set infamy %- 30\n\t\t\t*set empathy %- 20\n\t\t\t*set allies 0\n\t\t\t*set nybat_ally false\n\t\t\t*set nybat_rom 1\n\t\t\t*set gao_ally false\n\t\t\t*set zeeber_ally false\n\t\t\t*set utambu_ally false\n\t\t\t*set crew_strength -7\t\t\t\n\t\t\tYou leave the pirates to die, destroying any relationships you may have developed with members of the Reckless crew.\n\t\t\t\n\t\t\t*label solo_exit\n\t\t\tThe Medusa accompanies you down the serpentine tunnel.\n\t\t\t\n\t\t\t*goto_scene pits\n*else\n\tYou come to a lone Medusa standing next to a vermite-plugged tunnel entrance.\n\n\t\"Report!\" demands the Assistant Foreperson.\n\n\t\"Violent aliens entrapment, and soon death from deficiency of necessity molecules in everymist,\" the other Medusa says, which you take to mean that some of the Reckless ground team is sealed in, and will run out of air.\n\t\n\tDo you want to…\n\t*choice\n\t\t#…persuade the Assistant Foreperson to let the pirates out.\n\t\t\t*set empathy %+ 15\n\t\t\t*set infamy %+ 25\n\t\t\t*gosub reasons\n\t\t\t\n\t\t\t\"But danger excessiveness.\"\n\t\t\t\n\t\t\t\"I'm of _______ level,\" you say, not really understanding what that means, but desperate to try anything.\t\t\t\n\t\t\t*fake_choice\n\t\t\t\t#Second.\n\t\t\t\t#Third.\n\t\t\t\t#Fourth.\n\t\t\t\t#Fifth.\n\t\t\t\"Baseline level of human species is unknown,\" scoffs the Assistant Foreperson.\n\t\t\t\n\t\t\tYou beg for an air hole instead, and the Assistant Foreperson agrees to let the pirates breathe, pending further orders from the injured leader.\n\t\t\t\n\t\t\t*label saved\n\t\t\tThe other Medusa touches a limb to the vermite seal, and a circular hole about the size of your hand appears in the middle of the glassy wall.\n\t\t\t\n\t\t\tYou've just saved the lives of half the Reckless ground team!  That should earn you some respect.\n\t\t\t\n\t\t\tThe Assistant Foreperson hurries you down the serpentine tunnel.\n\t\t\t*page_break\n\t\t\t*goto_scene pits\t\t\n\t\t#…convince the Assistant Foreperson to give the pirates an air hole.\n\t\t\t*set empathy %+ 20\n\t\t\t*set infamy %+ 30\n\t\t\t*gosub reasons\n\t\t\t\n\t\t\t*goto saved\n\t\t#…stay silent.\n\t\t\t*goto cruel\n\n*label nice_try\nThe Medusa has received strict orders; nothing you say can convince it to deviate from its instructions.  \"I'm of _______ level,\" you say, not really understanding the Medusi levels, but desperate to try anything.\n*fake_choice\n\t#Second.\n\t#Third.\n\t#Fourth.\n\t#Fifth.\n\"Baseline level of human species is unknown,\" scoffs the Medusa.  You have only two choices:\n*return\n\n*label reasons\nYou explain that Krantic, the violent alien, is no longer a factor, and pile some moral arguments on top of that.\n\t\t\t\n\"Mercy towards fellow aliens admiration quality,\" concedes the Medusa.\n*return", "mushroom": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*set mushroom true\n*set free_time -5\n*temp code \"?\"\nThis cell is identical to yours, except that the clammy, reddish fog gives the metal walls and floor a copper tinge.\n\nThe alien in front of you looks like a gigantic pile of yellowish-brown fungus, and smells worse.  You have to steel your stomach as you examine it.  You live in space, and you know that humans instinctively find almost all aliens revolting.  If you want to communicate, it's necessary to push those reactions aside.  As usual, you steady yourself by…\n*fake_choice\n\t#…performing mental calculations.\n\t\t*set level %+ 10\n\t#…cursing under my breath.\n\t\t*set infamy %+ 10\n\t#…retreating from the foul-smelling alien.\n\t\t*set infamy %+ 5\n\t\tYou put another meter between you and the source of the stomach-churning odor.\n\t#…digging my nails into my palms.\n\t\t*set infamy %+ 10\n\t#…breathing in the lotus pattern, as I do before meditation.\n\t\t*set level %+ 5\n\t\t*set empathy %+ 5\n\nNow you are able to focus on the alien. It is half a meter taller than you, at least twice as wide, and has no features that you can recognize as a face.  Most of its body is covered by a hood of splotchy brown flesh.  Six limbs protrude from under the hood, not jointed like human limbs, but completely flexible, like elephant trunks.  Four of them serve as legs, keeping the alien \"standing\" upright.  One twitches anxiously in the air.  The sixth hangs at odd, sharp angles, covered with yellow mucus.  All six look interchangeable to you, with no fundamental differences between \"arms\" and \"legs\".  On the very top of the alien is something you hesitate to call hair.  It's more like a tuft of long worms, springing from a central point.\n\nA black box sits on the floor by your feet.  The alien extends a limb—it really does resemble an elephant's trunk, ending in the same fingerless but grip-enabled way—and nudges the box closer to you.  You cough.  It's hard to catch your breath when every inhalation is a mouthful of rotten chicken soup.  You…\n*choice\n\t#…pick up the box.\n\t\t*set level %+ 8\n\t\t*label got_box\n\t\tThe black box is about the length and width of your shoe, and surprisingly light.  Each long face has a different output—a speaker, a visual display, a metal plate to conduct electrical signals, and a chemical factory for those aliens who communicate by smell.  The narrow end opens onto a cushioned cavity perfect for a human hand.\n\t\t\n\t\t\"Signs of intelligence!\" the deep voice coming from the box tells you.  \"Fellow prisoners will communication.  Not damage.\"  The whole limb points towards the broken one in illustration.\n\t\t\t\t\n\t\tYou slide your right hand into the speech box.  That should tell it to translate your side of the conversation, too.\t\t\n\t\t\n\t\tHoping the alien can now hear you, you ask, \"Who are you?\"\n\t\t*page_break\n\t\tThe alien actually answers you.  \"Humans cannot speak name.  Treaty-breakers gift undignified name of Mushroom.\"\n\t\t\n\t\tIt does look rather like a gigantic straw mushroom.  Also, you notice that the worms on top of its head wiggle a bit when it talks.\n\t\t\n\t\t\"What is your species?\" you ask next.\n\t\t\n\t\t\"Stupid!  Evident!  Medusa!\" the alien shouts.\n\t\t\n\t\t*label medusi_info\n\t\tNow you realize why you didn't recognize the alien's form.  The Medusi are the most secretive race humans have encountered.  They don't frequent the interspecies trading posts, preferring to transfer cargo in deep space.  They never let humans aboard their ships, and the locations of their planets remain a mystery.  Only a few human ambassadors have ever been face to face with a Medusa—a name of convenience given by humans, of course—in order to work out strict trade treaties regarding products such as vermite.  In fact, wasn't there a summit in this sector just last week?  You wish you'd paid more attention to the news.\n\t\t\n\t\tYou cough harshly for a moment, still adjusting to the syrupy air.  When the spasm has passed, you touch a finger to the metal plate on the side of the box as you speak.  As expected, you receive a mild shock.  Medusi communicate through electrical signals, carried by the moisture in the air and received through their skin. You've heard that they can talk directly to machines, though you're not sure you believe it.  You use your speech box to ask:\n\t\t*choice\n\t\t\t#\"What do the treaty-breakers want from you?\"\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t\"Too late, too late,\" The Mushroom moans.  His unbroken limb writhes.\n\t\t\t\t*label destination\n\t\t\t\t*set mission_info true\n\t\t\t\t\"Weak self capitulated under torture.  Treaty-breakers have coordinates of least-but-still-sovereign tender cooperative.  Aliens visitation Medusi world!  Anathema!  Limited alien trade performance Spider monopoly, exchange never alien influence, never alien violation Medusi habitations—essence of treaty!\"\n\t\t\t\t\t\t\t\t\n\t\t\t\tThat was semi-comprehensible.  The pirates have clearly learned the location of one of the Medusi worlds.  Establishing a direct trade route, circumventing the official Medusi purveyors and the human tariffs, would be immensely profitable.  That must be the pirates' plan.\n\t\t\t\t\n\t\t\t\tYou say:\n\t\t\t\t*choice\n\t\t\t\t\t#\"Direct trade could profit the Medusi, too.\"\n\t\t\t\t\t\t*set infamy %+15\n\t\t\t\t\t\t*goto scream\n\t\t\t\t\t#\"Tell me the coordinates, and I'll contact the IHP.\"\n\t\t\t\t\t\t*set infamy %- 5\n\t\t\t\t\t\tThe Mushrooms screams, \"It wants the locations.  It is one of them!  It is a flesh-tearing animal!\"\n\t\t\t\t\t\t*goto freak_out\n\t\t\t\t\t#\"Help me now, and I'll do what I can when we land.\"  But I lie.\n\t\t\t\t\t\t*set infamy %+10\n\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\t*goto get_help\n\t\t\t\t\t#\"After we land, we can help each other escape.\"  And I mean it.\n\t\t\t\t\t\t*set persuasiveness %+10\n\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t*label get_help\t\n\t\t\t\t\t\t*set mushroom_ally true\n\t\t\t\t\t\t*set free_time +30\n\t\t\t\t\t\t\"This is cooperation, for a deaf, individualistic human,\" the alien concludes.  The Mushroom bounces a little on its standing limbs.  Its whole body seems springy, like slimy rubber.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Lauding of fellow prisoner!  Good animal!  Now communication with ship, so fellow prisoner can concealment.  Sirens not silent-singing.  Cameras not visualization prisoner.  Departure from cell!  And return when ship arrival!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe Mushroom shifts to stand on three limbs instead of four.  It shoves the newly freed limb into the vermite between this chamber and the airlock.  It is helping you, though it can't do it without insulting you, too.  You tell it:\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Humans are not animals, you sickening lump of fungus!\"\n\t\t\t\t\t\t\t\t*label scream\n\t\t\t\t\t\t\t\tThe Mushroom screams, \"It is one of them!  It is a flesh-tearing animal!\"\n\t\t\t\t\t\t\t\t*goto freak_out\n\t\t\t\t\t\t\t#\"I don't take orders—we are equal partners in this.\"\n\t\t\t\t\t\t\t\t*set persuasiveness %+10\n\t\t\t\t\t\t\t\t*label nofreak\n\t\t\t\t\t\t\t\tThe alien's hood flares, whether in annoyance or agreement you can't tell.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"On the planet, then,\" you say, and slip out the door.\n\t\t\t\t\t\t\t\t*goto out\n\t\t\t\t\t\t\t#Nothing.  I won't be drawn into a pointless argument.\n\t\t\t\t\t\t\t\tSo The Mushroom is xenophobic—that's hardly something new to a Stashie.\n\t\t\t\t\t\t\t\t*set empathy %+ 5\n\t\t\t\t\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Program activation,\" says The Mushroom, withdrawing its limb from the vermite.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"On the planet, then,\" you say, and slip out the door.\n\t\t\t\t\t\t\t\t*goto out\n\t\t\t#\"How can I help you?\"\n\t\t\t\t*set empathy %+10\n\t\t\t\t*label offer_help\n\t\t\t\t\"No help for The Mushroom now.  Outside not every-mist.  Inappropriate atmosphere.  But after arrival, cooperation to facilitation escape.  Yes?\"\n\t\t\t\t\n\t\t\t\t\"Arrival?\" you ask.  \"You know where we are going?\"\n\t\t\t\t\n\t\t\t\t*goto destination\n\t\t\t#\"Can you hide me from the Reckless crew?\"\n\t\t\t\t*set empathy %-10\n\t\t\t\tThe Mushroom's unbroken limb writhes.  \"Always the humans:  self! self! self!  The egocentricity outlook of the limitation mind.  Where possibility escape on spaceship?  What achievements possibility by exit?  Fellow prisoner imperative listening beyond immediacy situation. Consideration problems of the other!\"\n\t\t\t\t\n\t\t\t\tYou begin to fume—it's The Mushroom who is shortsighted.  Can't it speak without lecturing?  You decide to reply with:\n\t\t\t\t*choice\n\t\t\t\t\t#Sarcasm.  \"Fine.  Tell me your problems, oh condescending one.\"\n\t\t\t\t\t\t*goto destination\n\t\t\t\t\t#Calm maturity.  \"Why don't you explain the situation to me?\"\n\t\t\t\t\t\t*set persuasiveness %+10\n\t\t\t\t\t\t*goto destination\n\t\t\t\t\t#Violence.  I hurl the speech box at the insufferable alien.\n\t\t\t\t\t\t*label throw\n\t\t\t\t\t\t*set infamy %+10\n\t\t\t\t\t\tThe black box hits The Mushroom in the middle of the hood.  Yellow mucus oozes from the wound; the box clatters to the floor.\n\t\t\t\t\t\t*goto freak_out\n\t\t\t\t\t#Absence.  I don't have ti
