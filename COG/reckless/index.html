<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reckless Space Pirates — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "reckless", "title": "Reckless Space Pirates", "scenes": {"ambush": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*if ((dry_first = true) or (split = false))\n\t*set crew_strength -3\n\tYou and your companions enter the left-hand tunnel, following a sinuous path deep into the mountain. As you round a corner, you are suddenly blinded by bright streaks of light. The pirate ahead of you reels backwards, crashing into you and sliding to the ground.  You regain your balance and bend to hook your hands under the twitching woman's arms, so you can drag her back around the curve.\n\t\t\n\t*if (leader = \"Krantic\")\n\t\tThe Medusi don't follow you back—they seem content to block your path.  Someone drags another unconscious victim alongside yours—Krantic was hit!  You stare down at the lax face half-hidden by magnetized dreads, and suddenly feel more secure.\n\t\t\n\t\t\"Who's in charge now?\" asks Zeeber.\n\t\t\t\n\t\t*label leaderchange\n\t\tYou quickly cast a vote for:\n\t\t*choice\n\t\t\t#Myself.\n\t\t\t\t*if ((infamy >= 80) or (allies >= 3))\n\t\t\t\t\t*achieve leader\n\t\t\t\t\t*set leader \"you\"\n\t\t\t\t\t*set infamy %+ 20\n\t\t\t\t\t*set level %+ 10\n\t\t\t\t\t*if (nybat_ally)\n\t\t\t\t\t\t\"${name} is a reasonable choice,\" says Ny-bat.  Heads nod in agreement.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (nybat_rom > 1)\n\t\t\t\t\t\t\tYou pull Ny-bat down for a quick kiss, to thank ${n_him} for ${n_his} support.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto leaderyou\n\t\t\t\t\t\t*else\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*label leaderyou\n\t\t\t\t\t\t\t\"The captain is eager for a peaceful solution,\" Ny-bat reminds you.  \"Do you think you can arrange one?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tNy-bat is so tall that you have to tilt your head back in order to look ${n_him} in the eyes.  \"I only want to get us some vermite without making any enemies, so we can come back for more,\" you say.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Then we'll follow your lead,\" ${n_he} agrees.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto ambush\n\t\t\t\t\t*elseif (gao_ally)\n\t\t\t\t\t\t\"${name} understands the economics,\" says Gao.  Heads nod in agreement.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto leaderyou\n\t\t\t\t\t*elseif (utambu_ally)\n\t\t\t\t\t\t\"I trust ${name},\" says Utambu.  Heads nod in agreement.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto leaderyou\n\t\t\t\t\t*else\n\t\t\t\t\t\t\"${name} will be great at making nice!\" says Zeeber enthusiastically.  Eyes roll, but at least someone spoke up for you.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto leaderyou\n\t\t\t\t*else\n\t\t\t\t\t*set level %- 5\n\t\t\t\t\t*set infamy %- 5\n\t\t\t\t\t\"Space, kid, you sure know how to make friends,\" Gao grumbles.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tThe pirates are muttering; they didn't like your choice.  You hear Ny-bat's name several times, and \"Gao knows the market,\" from someone in the back.\n\t\t\t\t\t*label influence\n\t\t\t\t\t\n\t\t\t\t\tYou still have some influence with the Reckless crew, so you use it to support:\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Gao\n\t\t\t\t\t\t\t*label gaoleader\n\t\t\t\t\t\t\t*set leader \"Gao\"\n\t\t\t\t\t\t\t*set second \"Ny-bat\"\n\t\t\t\t\t\t\t\"Gao knows the most about vermite, so he should be in command,\" you say.  Your crewmates murmur their agreement.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto ambush\n\t\t\t\t\t\t#Nybat\n\t\t\t\t\t\t\t*label nybatleader\n\t\t\t\t\t\t\t*set leader \"Ny-bat\"\n\t\t\t\t\t\t\t*if n_he = \"she\"\n\t\t\t\t\t\t\t\t*set l_he \"she\"\n\t\t\t\t\t\t\t\t*set l_his \"her\"\n\t\t\t\t\t\t\t\t*set l_him \"her\"\n\t\t\t\t\t\t\t\t*goto setsecond\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*label setsecond\n\t\t\t\t\t\t\t\t*set second \"Gao\"\n\t\t\t\t\t\t\t\t\"Ny-bat has the captain's trust, so ${n_he} should be in command,\" you say.  Your crewmates murmur their agreement.\n\t\t\t\t\t\t\t\t*if (nybat_rom > 1)\n\t\t\t\t\t\t\t\t\tNy-bat bends down for a quick kiss, to thank you for your support.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto ambush\n\t\t\t\t\t\t\t\t*else\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto ambush\t\t\t\t\t\t\t\t\t\n\t\t\t#Ny-bat.\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*set level %+ 5\n\t\t\t\t*goto nybatleader\n\t\t\t#Gao.\n\t\t\t\t*set infamy %+ 15\n\t\t\t\t*set level %+ 5\n\t\t\t\t*goto gaoleader\n\t\t\t#Utambu.\n\t\t\t\t*set infamy %- 10\n\t\t\t\tThe pirates are muttering; they don't like your choice.  You hear Ny-bat's name several times, and \"Gao knows the market,\" from someone in the back.\n\t\t\t\t\t\n\t\t\t\t\"No thanks.  Really,\" says Utambu self-consciously.\n\t\t\t\t*goto influence\n\t\t\t#Zeeber.\n\t\t\t\t*set infamy %- 15\n\t\t\t\t*set level %- 5\n\t\t\t\t\"Are you trying to get me in trouble?\" Zeeber hisses angrily.\n\t\t\t\t\n\t\t\t\tThe pirates are muttering; they don't like your choice.  You hear Ny-bat's name several times, and \"Gao knows the market,\" from someone in the back.\n\t\t\t\t*goto influence\t\n\t*else\n\t\tSomeone drags another unconscious victim alongside yours.\n\t\t\t\t\n\t\t*goto ambush\n*else\n\t*set split false\n\t*set crew_strength + 5\n\tYou and your companions backtrack to the fork and enter the left-hand tunnel, following a sinuous path deep into the mountain.  After a few centaseconds, you hear human voices arguing, and perceive a dim glow ahead.  You soon stumble upon the other half of the Reckless team, crouching with weapons drawn around two unconscious crew members.\n\t\t\n\t*if (leader = \"Krantic\")\n\t\tKrantic is one of the unconscious ones.  You stare down at the lax face half-hidden by magnetized dreads, and suddenly feel more secure.\n\t\t\t\n\t\t\"There's two Medusi round the corner,\" says\n\t\t*if (second = \"Gao\")\n\t\t\tNy-bat.  \n\t\t\t*label retell\n\t\t\t\"It's an ambush.  They know they can take us down just by shouting at us now.  We can't agree on how to respond.\"\n\t\t\t\t\n\t\t\t\"Well, who's in command?\" whispers Zeeber, as if the aliens could hear.\n\t\t\t\n\t\t\t\"That's what we're arguing about,\" says one of the pirates.\n\t\t\t*goto leaderchange\n\t\t*else\n\t\t\tGao.\n\t\t\t*goto retell\n\t*elseif ((leader = \"Ny-bat\") or (leader = \"Gao\"))\n\t\t\"There's two Medusi round the corner,\" says ${leader}.  \"It's an ambush.  They know they can take us down just by shouting at us now.  We can't agree on how to respond.\"\n\t\t\n\t\tYour opinion is clearly desired.\n\t\t*goto response\n\t*else\n\t\t*goto ambush\n\t\t\n*label ambush\n\"There's two of them,\" says ${second}.  \"It's an ambush.  They know they can take us down just by shouting at us now.\"\n\n\"What should we do?\" whispers Zeeber, as if the aliens could hear.\n\n*label response\nYou say:\n*choice\n\t#\"We'll shoot our way through.\"\n\t\t*set level %- 10\n\t\t*set empathy %-10\n\t\t*if ((leader = \"you\") or (split = true))\n\t\t\t*if (second = \"Gao\")\n\t\t\t\t${second} nods, willing to take your advice.\n\t\t\t\t*label shootout\n\t\t\t\t*set empathy %- 20\n\t\t\t\t*set medusi_strength -2\n\t\t\t\t*set crew strength -2\n\t\t\t\t\n\t\t\t\tYou and the crew ready your weapons\n\t\t\t\t*gosub gun\n\t\t\t\tand fire as you round the corner.  You hardly need to aim, since two Medusi standing hood to hood fill this lava tube.  The two aliens have no defense against the spray of projectiles.  The clatter is deafening, as guns bark and stray bullets hit solid rock.  The Medusi make no sound, but their screams create a miniature lightning storm, and two more of your people are struck down.\n\t\t\t\t*label leave\n\n\t\t\t\t*if (split = true)\n\t\t\t\t\t*label split_exit\n\t\t\t\t\t*gosub crash\n\t\t\t\t\tDo you want to…\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#…race back to the aid of the other group.\n\t\t\t\t\t\t\t*set empathy %+ 20\n\t\t\t\t\t\t\t*set infamy %+ 20\n\t\t\t\t\t\t\t*goto_scene trap\n\t\t\t\t\t\t#…continue on.\n\t\t\t\t\t\t\t*set empathy %- 20\n\t\t\t\t\t\t\t*set infamy %- 20\n\t\t\t\t\t\t\t*set utambu_ally false\n\t\t\t\t\t\t\t*set allies -1\n\t\t\t\t\t\t\t*set crew_strength -1\n\t\t\t\t\t\t\t\"But what about the others?\" Utambu protests.  \"What if they need help?\"\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"We'll find them once we've secured the vermite,\" you say.\n\t\t\t\t\n\t\t\t\t\t\t\t\"I'm going back,\" says Utambu.  \"I've got friends who may be in trouble.  You'll have to shoot me to stop me.\"  \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou watch him stalk away; there's really nothing to be gained by shooting him.\n\t\t\t\t\t\n\t\t\t\t\t\t\t*label onwards\n\t\t\t\t\t\t\tYou are forced to leave Zeeber with the wounded, reducing your numbers even further. Now you have only ${crew_strength} companions—you hope that's enough to finish the mission.  You lead your crewmates past the oozing Medusi, and continue down the tunnel.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto_scene pits\n\t\t\t\t*else\n\t\t\t\t\t*goto onwards\n\t\t\t*else\n\t\t\t\t*if (nybat_rom > 1)\n\t\t\t\t\t*set nybat_rom 1\n\t\t\t\t\t*set nybat_ally false\n\t\t\t\t\t\"I am disappointed that you would suggest such a thing,\" says Ny-bat.  \"I must have been mistaken, to think we could…\"  $!{n_he} backs away from you, and you realize that your predilection for violence has ended any intimacy between you.  \"I will take charge,\" Ny-bat announces, and the other pirates voice their agreement.\n\t\t\t\t\t\n\t\t\t\t\t*goto choices\n\t\t\t\t*elseif (nybat_ally)\n\t\t\t\t\t*set nybat_ally false\n\t\t\t\t\t\"I am disappointed that you would suggest such a thing,\" says Ny-bat.  \"Perhaps I was wrong to trust you.\"  You realize that your predilection for violence has lost you an ally.  \"I will take charge,\" Ny-bat announces, and the other pirates voice their agreement.\n\t\t\t\t\t\n\t\t\t\t\t*goto choices\n\t\t\t\t*else\n\t\t\t\t\t\"That would be counter-productive,\" says Ny-bat.  \"Perhaps I should take charge.\"\n\t\t\t\t\t\n\t\t\t\t\tThe other pirates voice their agreement.\n\t\t\t\t\t\n\t\t\t\t\t*goto choices\t\t\t\t\n\t\t*else\n\t\t\t\"That would be counter-productive,\" says ${leader}.\t\n\t\t\t*label choices\n\t\t\t\"We should try to re-open negotiations.  The question is, should we try threats, bribery, or apology?\"\n\t\t\t*goto talk_choice\t\n\t#\"We'll try to negotiate.\"\n\t\t*set empathy %+ 15\n\t\t${second} nods in agreement.  \"The question is, should we try threats, bribery, or apology?\"\n\t\t*label talk_choice\n\t\t\n\t\tYou suggest…\n\t\t*choice\n\t\t\t#…threats.\n\t\t\t\t*set level %- 5\n\t\t\t\t*set persuasiveness %- 10\n\t\t\t\tYou stick your hand in your speech box.  \"Let us through, or we will be forced to kill you,\" you say.\n\n\t\t\t\tYou have time for a few deep, soupy breaths before your box transmits the strident answer.  \"More deaths not necessity.  You withdrawal to alien transport!\"\n\t\t\t\t\n\t\t\t\t\"Not without some vermite,\" you say.  \"You must negotiate with us.  You have no choice.\"\n\t\t\t\t\n\t\t\t\t*if ((persuasiveness >= 75) or (empathy > 60))\n\t\t\t\t\tYou wait for an answer that does not come.  Carefully, you peek around the corner, and see an empty tube.  The Medusi must have believed your threat.  They fled, or perhaps ran to prepare the next trap.  You leave Zeeber with the wounded, and continue on.\n\t\t\t\t\t*if (split = true)\n\t\t\t\t\t\t*goto gone_exit\n\t\t\t\t\t*else\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene pits\n\t\t\t\t*else\n\t\t\t\t\tThis pause is even longer, before the box relays an answer.\n\t\t\t\t\t*goto noway\t\t\t\t\t\t\n\t\t\t#…bribery.\n\t\t\t\t*set persuasiveness %+ 10\n\t\t\t\tYou stick your hand in your speech box.  \"Please listen—there's no need for us to fight.  We're going to make you rich, richer than you can imagine.\"\n\t\t\t\t\n\t\t\t\t*if ((persuasiveness >= 75) or (empathy > 60))\n\t\t\t\t\tYou have time for a few deep, soupy breaths before your box transmits the strident answer.  \"Aliens already demonstration instability and violence.  No arrangement could be trust.  Aliens must not proceed.  That is all.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\"Only one of us aliens is unstable and violent, and he is not longer our leader—no longer even conscious.  The rest of us want to make a deal that benefits us both,\" you reply.\n\t\t\t\t\t\n\t\t\t\t\tThis pause is even longer.  Then, \"This beyond First Level.  Necessity transfer new information to leadership,\" says one of the aliens.\n\n\t\t\t\t\tCarefully, you peek around the corner, and see an empty tube.\n\t\t\t\t\t*if (split = true)\n\t\t\t\t\t\t*goto gone_exit\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou leave Zeeber with the wounded, and continue deeper into the volcano.\n\t\t\t\t\t\t*goto_scene pits\n\t\t\t\t*else\n\t\t\t\t\tYou have time for a few deep, soupy breaths before your box transmits the strident answer.  \n\t\t\t\t\t*label noway\n\t\t\t\t\t\"Aliens already demonstration instability and violence.  No arrangement could be trust.  Aliens must not proceed.  That is all.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tThe Medusi simply don't believe you.  You can only…\n\t\t\t\t\t*choice\n\t\t\t\t\t\t*if ((leader = \"you\") or (split = true)) #…shoot my way through.\n\t\t\t\t\t\t\t*goto shootout\n\t\t\t\t\t\t*if (rockfall = false) #…avoid confrontation by taking the other tunnel.\n\t\t\t\t\t\t\t*label exit_dry\n\t\t\t\t\t\t\t*set empathy %+ 10\n\t\t\t\t\t\t\tBy withdrawing from the situation, you hope to prove to the Medusi that you are committed to a nonviolent solution.  Leaving Zeeber behind to look after the wounded, you and your team retreat back to the fork in the tunnel.  This time you take the slimed path, following a trail of thick, wet goo.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*if (split = true)\n\t\t\t\t\t\t\t\t*gosub crash\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto_scene trap\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto_scene trap\n\t\t\t\t\t\t#…apologize for Krantic.\n\t\t\t\t\t\t\t*goto apology\n\t\t\t\t\t\t#…wait.\n\t\t\t\t\t\t\t*goto wait\n\t\t\t#…an apology.\n\t\t\t\t*set persuasiveness %+ 15\n\t\t\t\t*set empathy %+ 10\n\t\t\t\t*label apology\n\t\t\t\tYou stick your hand in your speech box.  \"We are so sorry for the injuries we have caused you.  The one who inflicted these wrongs on you is no longer in charge, and we promise you we will offer no more violence.\"\n\t\t\t\t\n\t\t\t\tYou have time for a few deep, soupy breaths before your box transmits an answer.\n\t\t\t\t\n\t\t\t\tThen, \"This is beyond First Level.  Necessity transfer of new information to leadership,\" says one of the aliens.  Carefully, you peek around the corner, and see an empty tube.  You leave Zeeber with the wounded, and continue on.\n\t\t\t\t*if (split = true)\n\t\t\t\t\t*goto gone_exit\n\t\t\t\t*else\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto_scene pits\n\t#\"We'll say we're returning to the ship, and wait them out.\"\n\t\t*label wait\n\t\tYou retreat down the tunnel, hoping the Medusi will think you are gone and abandon their position.\n\t\t\n\t\tWhether they believe you or not, they are gone when you peer around the corner two kilosecends later. Perhaps their orders were merely to delay you, while the rest of the Medusi retreated to a more secure position.\n\t\t*if (split = true)\n\t\t\t*label gone_exit\n\t\t\t*gosub crash\n\t\t\tDo you want to…\n\t\t\t*choice\n\t\t\t\t#…race back to the aid of the other group.\n\t\t\t\t\t*set empathy %+ 20\n\t\t\t\t\t*set infamy %+ 20\n\t\t\t\t\t*goto_scene trap\n\t\t\t\t#…continue on.\n\t\t\t\t\t*set empathy %- 20\n\t\t\t\t\t*set infamy %- 20\n\t\t\t\t\t*set utambu_ally false\n\t\t\t\t\t*set allies -1\n\t\t\t\t\t*set crew_strength -1\n\t\t\t\t\t\"But what about the others?\" Utambu protests.  \"What if they need help?\"\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"We'll find them once we've secured the vermite,\" you say.\n\t\t\n\t\t\t\t\t\"I'm going back,\" says Utambu.  \"I've got friends who may be in trouble.  You'll have to shoot me to stop me.\"  \n\t\t\t\t\t\n\t\t\t\t\tYou watch him stalk away; there's really nothing to be gained by shooting him.\n\t\t\t\n\t\t\t\t\t*label empty\n\t\t\t\t\tYou are forced to leave Zeeber with the wounded, reducing your numbers even further. Now you have \n\t\t\t\t\t*if (crew_strength > 1)\t\t\t\t\t\n\t\t\t\t\t\tonly ${crew_strength} companions—you \n\t\t\t\t\t\t*goto companions\n\t\t\t\t\t*else\n\t\t\t\t\t\tonly one companion—you \n\t\t\t\t\t\t*label companions\n\t\t\t\t\t\thope that's enough to finish the mission.  You continue warily down the empty tunnel.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene pits\n\t\t*else\n\t\t\t*goto empty\t\t\n\t*if ((dry_first = true) and (split = true)) #\"We'll go back for the rest of the crew.\"\n\t\t*goto exit_dry\n\t*if ((dry_first = true) and (split = false)) #We'll go back and try the other tunnel.\"\n\t\t*goto exit_dry\n\t*if (net = true) #\"We'll use this magnetic net.\"\n\t\t*set level %+ 5\n\t\t*label net\n\t\t*set net false\n\t\t\"Good thinking!\" shouts Utambu.  \"It will attract and absorb their electricity!  At least, until they figure out how to turn it off.  It's really meant to hold cargo, not anything with a brain.\"\n\t\t\t\t\n\t\t\"We only need a few minutes.  We'll throw it and run past.  Zeeber, you stay here with the wounded.  The Medusi won't bother you if you don't try to follow us.  Everyone ready?\"\n\n\t\tYou ball up the silky fibers, thumb the button on one of the magnetic tabs, peek around the corner, and throw.  The net snaps open to its widest extent, covering the two Medusi.  Then it pulls tight, as the magnetic tabs begin seeking each other behind the aliens' backs.  Sparks fly from the worms on the Medusi's heads, but the net catches them, shimmering as electricity courses through the fibers.  You and your companions race ahead, squeeze past the confused aliens, and run down the serpentine tunnel.\n\t\t*if ((dry_first = true) and (split = true))\n\t\t\t*gosub crash\n\t\t\tDo you want to…\n\t\t\t*choice\n\t\t\t\t#…race back to the aid of the other group.\n\t\t\t\t\t*set empathy %+ 20\n\t\t\t\t\t*set infamy %+ 20\n\t\t\t\t\t*goto_scene trap\n\t\t\t\t#…continue on.\n\t\t\t\t\t*set empathy %- 20\n\t\t\t\t\t*set infamy %- 20\n\t\t\t\t\t*set utambu_ally false\n\t\t\t\t\t*set allies -1\n\t\t\t\t\t*set crew_strength -1\n\t\t\t\t\t\"But what about the others?\" Utambu protests.  \"What if they need help?\"\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"We'll find them once we've secured the vermite,\" you say.\n\t\t\n\t\t\t\t\t\"I'm going back,\" says Utambu.  \"I've got friends who may be in trouble.  You'll have to shoot me to stop me.\"  \n\t\t\t\t\t\n\t\t\t\t\tYou watch him stalk away; there's really nothing to be gained by shooting him.\n\t\t\t\n\t\t\t\t\tNow you have only ${crew_strength} companions—you hope that's enough to finish the mission.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto_scene pits\n\t\t*else\n\t\t\tNow you have only ${crew_strength} companions—you hope that's enough to finish the mission.\n\t\t\t*page_break\n\t\t\t*goto_scene pits\n\n*label crash\n\nYou hear a deafening crunch, the sound of a giant biting into a rock sandwich.  Somewhere, a tunnel has collapsed.\n*return\n\n*label gun\n*if (gun)\n\t*return\n*else\n\t(you take one from a fallen pirate)\n\t*set gun true\n\t*return\n\n\t", "beach": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*comment ñáéç…—\n*set arrived true\n*comment nybat_rom 1 = no 2 = slow 3 = slept with\nPart Two: Groundside\n\nArrival\n(Chapter 4 of 6)\n\nYou climb out of the ship, coughing.  The world outside the hatchway is only a shifting sea of copper-colored mist—until you pull on your goggles with the special filters and built-in communicator.  Then you can see the Reckless crew members gathered on top of the hull.  You force yourself to breathe deeply of the damp, smelly air, knowing that's the only way to convince your body you aren't choking to death.\n\n\"Move it, ${name},\" says Gao, coming up behind you.\n\nYou shift over to let the gruff pirate out, turning on the scanner in your hand.  It will examine the hull for damage caused by the debris the Reckless hit when The Mushroom sabotaged its systems.\n*gosub gaohurt\n\n*if (crew = false)\n\t\"Only three reasons you're up here,\" Gao says.  \"First, Zoa doesn't trust you alone down in the ship, and two to watch The Mushroom is all we can spare.  Second, you can help walk the hull—you'll be just as dead as us if we have a breach in flight.  Third, where are you going to run?\" \n\t*goto situ\n*else\n\t*label situ\n\t*page_break\n\tThe Reckless has landed on the island's shore, since the beach is the only open space big enough to accommodate the starship.  You look up to the desolate, black slopes of the volcano that dominates the island.  It's hard to imagine anything growing up there, even the hardy vermite microbe.\n\t\n\t\"Eyes on the hull, Stashie,\" says Zoa.  She is dangling by tether from the tip of the pyramid, scanning the near-vertical sides of the mess hall hull.  You shuffle forward, examining the hull plating at your feet.\n\t\n\tYour scanner beeps.  You bend down and see a hole in the hull, a millimeter or so wide.  Holes like this have to be plugged if the vermite seal is to cover the whole ship again.  What will you do?\n\t*choice\n\t\t#Report the hole.\n\t\t\t*set infamy %+ 5\n\t\t\t*set level %+ 5\n\t\t\tYou call out to Utambu, who hurries over and sets to work with a small metal disk and a torch to melt it.\n\t\t\t\n\t\t\t*goto mush\n\t\t#Fix it myself.\n\t\t\t*set infamy %+ 5\n\t\t\t*set level %+ 5\n\t\t\tYou take a small metal disk from Utambu's bin of supplies, and hold out your hand for his torch to melt it.\n\t\t\t*if (crew)\n\t\t\t\tUtambu hands it over with a smile, and you complete the repair.\n\t\t\t\t\n\t\t\t\t*goto mush\n\t\t\t*else\n\t\t\t\tUtambu looks over at Gao, who shakes his head.  The engineer follows you back to the hole and fixes it himself, since you apparently can't be trusted with a torch.\n\t\t\t\t\n\t\t\t\t*goto mush\n\t\t#Pass on by.\n\t\t\tYou see no reason to help the Reckless or her crew, so you shuffle onwards in silence.\n\t\t\t\n\t\t\t*goto mush\n\n*label mush\nWhen you reach the edge of the hull with your scanner, you peer over the side to where Vikola and Hammer are guarding The Mushroom on the sand.\n*gosub mush_check\n\nThe Mushroom towers over its surly guards.  All six of its limbs have been forced straight down and hobbled in a block of foam the size of a barstool.  None of the limbs are twisted or swollen, and its hood is smooth and unblemished, all signs of former mistreatment erased.  You suppose the alien will make a better peace offering, or bargaining chip, if it's whole and healthy.\n*label hello\n\n\"Get out of here, Stashie,\" Vikola says, waving you on with her gun. \"Or should I call Krantic over and tell him you've been sniffing around?\"\n\n\"Just saying hello to the fungus,\" you say, hoping to provoke a reaction from The Mushroom.  The edge of its hood continues to ripple meditatively, its rhythm unchanged.  You've confirmed your suspicion that the Medusi can't hear, any more than you can perceive the electrical language it may be sending in your direction at this very moment.\n\t\n\"You've said it.  Now fly,\" Vikola says.\n\nYou have an important decision to make.  You…\n*choice\n\t#…try to rescue The Mushroom and warn the Medusi.\n\t\t*set crew_strength -1\n\t\t*gosub hammer\n\t\t*label mush_too\n\t\t*gosub vfight\n\t\t\n\t\t*if (gun = false)\n\t\t\tDo you want to take Vikola's gun with you?\n\t\t\t*choice\n\t\t\t\t#I'll take it.\n\t\t\t\t\t*set gun true\n\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\tYou grab the gun and jam it into your belt.  It's better to be prepared.\n\t\t\t\t\t\n\t\t\t\t\t*goto duo_exit\n\t\t\t\t#I'll leave it.\n\t\t\t\t\t*set empathy %+ 15\n\t\t\t\t\tYou leave Vikola's gun where it is.  You are trying to avoid violence, not precipitate it.\n\t\t\t\t\t\n\t\t\t\t\t*goto duo_exit\n\t\t\t\t#I'll throw it in the ocean.\n\t\t\t\t\t*set empathy %+ 15\n\t\t\t\t\tYou pitch Vikola's gun into the water, knowing the crew has a limited number of these non-electrical weapons.\n\t\t\t\t\t\n\t\t\t\t\t*goto duo_exit\n\t\t*else\n\t\t\t*page_break\n\t\t\t*goto duo_exit\t\t\n\t*if (crew = true) #…follow orders for now.\n\t\t*set mushroom_ally false\n\t\t\"Space!\"\n\t\t\n\t\tYou hear swears coming from the cylindrical cargo hold, where Ny-bat and another crew member are struggling to replace a hull plate as tall as you.  Really it's a job for three, but the crew is stretched impossibly thin, trying to rush these repairs before confronting the Medusi.  You…\n\t\t*choice\n\t\t\t#…rush to help lift the heavy metal sheet.\n\t\t\t\t*set nybat_ally true\n\t\t\t\t*set infamy %+ 10\n\t\t\t\tYou dash across the hull, and grab the bottom edge of the metal plate just before it crashes down on Ny-bat's feet.\n\t\t\t\t\n\t\t\t\t\"Thank you,\" Ny-bat says wryly.  \"We may have overestimated our strength.\"\n\t\t\t\t\n\t\t\t\t\"You think?\" You grin up at ${n_him}, holding the bottom of the plate steady as ${n_he} begins to seal the top.\n\t\t\t\t\n\t\t\t\t\"Just a tad.  It's good to know we can count on your help,\" ${n_he} says.\n\t\t\t\t*goto team\t\t\t\t\n\t\t\t#…grab a torch and start sealing the edges.\n\t\t\t\t*set nybat_ally true\n\t\t\t\t*set infamy %+ 10\n\t\t\t\tYou take the torch from Ny-bat, freeing one of ${n_his} hands to grip the bottom of the metal plate and hold it steady.  You carefully begin to seal the top of the plate to the hull, melting the metal just enough.\n\t\t\t\t\n\t\t\t\t\"Thank you,\" Ny-bat says wryly.  \"We may have overestimated our strength.\"\n\t\t\t\t\n\t\t\t\t\"You think?\"\n\t\t\t\t\n\t\t\t\t\"Just a tad.  It's good to know we can count on your help,\" ${n_he} says.\n\t\t\t\t*goto team\n\t\t\t#…shout to Zoa that Ny-bat needs help.\n\t\t\t\tAll the pirates look up from their examination of the hull at your shout, and the one closest to Ny-bat hurries to grab the bottom edge of the plate.\n\t\t\t\t\n\t\t\t\t\"I'm sure Ny-bat can manage his assignment,\" Zoa calls.  \"Can't you, Ny-bat?\"\n\t\t\t\t\n\t\t\t\t\"Of course,\" Ny-bat answers her, and frowns in your direction.  You didn't mean to make Ny-bat look incompetent, but perhaps you did, accidentally.\n\t\t\t\t*goto team\n\t\t\t#…let them struggle.\n\t\t\t\t*set infamy %- 10\n\t\t\t\tYou watch as they drop the plate, almost crushing Ny-bat's foot.  Ny-bat calls over another crew member to help them try again.\n\t\t\t\t*label team\n\t\t\t\t\n\t\t\t\tZoa calls you over.\n\t\t\t\t\n\t\t\t\t\"You'll double check the hull when the ground team leaves to confront the Medusi,\" she tells you.\n\t\t\t\t\n\t\t\t\tIt's the most boring job you can think of, and she wants you to do it while most of the crew has an adventure?  You remind her…\n\t\t\t\t*choice\n\t\t\t\t\t*if (mushroom_ally = true) #…I've established a rapport with The Mushroom.\n\t\t\t\t\t\t*goto fine\n\t\t\t\t\t*if (mushroom_ally = false) #…I'm the only one who didn't kidnap The Mushroom.\n\t\t\t\t\t\t*goto fine\n\t\t\t\t\t*if (strength > 60) #…my combat skills might be needed if negotiations go wrong.\n\t\t\t\t\t\t*goto fine\n\t\t\t\t\t*if (hacking > 60) #…only Utambu and I really understand the ground team's specialized gear.\n\t\t\t\t\t\t*goto fine\n\t\t\t\t\t*if (persuasiveness > 60) #…I can be very persuasive in negotiations.\n\t\t\t\t\t\t*goto fine\n\t\t\t\t\t*if (level > 60) #…I'm more intelligent that her average employee.\n\t\t\t\t\t\t*goto fine\n\t\t\t\t\t#…she promised me a chance to prove myself.\n\t\t\t\t\t\t*label fine\t\t\t\t\t\n\t\t\t\t\t\t\"Fine,\" she says, so quickly that you wonder if this conversation was simply a test of your initiative.\n\t\t\t\t\t\t\n\t\t\t\t\t\tSoon you and the rest of the ground team are assembled on the beach to hear the captain's orders.\t\t\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"This deal-or-steal is the most lucrative opportunity of your entire career,\" Zoa says, instantly commanding everyone's attention.  \"Our hope today is to establish a steady line of supply.  We'd like to return here for vermite for rotations to come.  So, convince them to sell if at all possible.  If not, secure their stockpile.  Don't get shot\"—there are chuckles from the crew—\"and call for the ship if a rain of fire would be at all helpful,\" she finishes, with something that almost passes for a smile.  \"Are you ready to be rich?\"\n\n\t\t\t\t\t\tThe crew cheers, and the captain turns to stride up the gangway.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Krantic commands,\" she says from the doorway, before disappearing into the ship.  There are no cheers after that pronouncement.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou decide to stay away from Krantic if possible, and march next to one of your allies in the crew.  You decide to approach:\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Ny-bat.\n\t\t\t\t\t\t\t\t*if (nybat_ally)\n\t\t\t\t\t\t\t\t\t*gosub jungle\n\t\t\t\t\t\t\t\t\t*if (nybat_rom > 1)\n\t\t\t\t\t\t\t\t\t\tNy-bat rests ${n_his} hand briefly on the back of your neck when you approach.  The light touch is more exciting than it should be, and you smile at ${n_him}.  If anyone on the crew didn't know about your romance, they do now.  Ny-bat\n\t\t\t\t\t\t\t\t\t\t*goto warning\n\t\t\t\t\t\t\t\t\t*else\t\n\t\t\t\t\t\t\t\t\t\tNy-bat pulls you slightly away from the group, calm and unreadable as always.  $!{n_he}\n\t\t\t\t\t\t\t\t\t\t*label warning\n\t\t\t\t\t\t\t\t\t\tsomehow manages to look prepared in ${n_his} goggles, while everyone else just looks bug-eyed.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"We are about to enter a possibly dangerous situation.  You should know that your weapon is nonfunctional.  It is Zoa's standard order not to arm new hires, until their loyalty has been proven.  You are, of course, not supposed to be aware of this.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou try not to react, but your mouth becomes a grim line.  You thank Ny-bat.  It's better to know now, than to find out in the middle of a gun battle.\n\t\t\t\t\t\t\t\t\t\t*if (nybat_rom \u003c 2)\n\t\t\t\t\t\t\t\t\t\t\tIt's good to know that Ny-bat is on your side.\n\t\t\t\t\t\t\t\t\t\t\t*goto move_out\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\tIt's comforting to know that Ny-bat truly cares for you, and is on your side.\n\t\t\t\t\t\t\t\t\t\t\t*goto move_out\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*gosub jungle\n\t\t\t\t\t\t\t\t\tNy-bat somehow manages to look prepared in ${n_his} goggles, while everyone else is bug-eyed.  $!{n_he} nods in greeting.\n\t\t\t\t\t\t\t\t\t*label move_out\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\tKrantic's voice rises above the babble of sixteen eager pirates.  \"You heard the captain.  I own you now,\" he says with menacing glee. \"Fall behind and we'll find out what a shot from my new toy does to a foot!\"\n\n\t\t\t\t\t\t\t\t\tWith that he marches towards the trees, gun at the ready, lion's mane of magnetic dreads bouncing on his shoulders.\n\n\t\t\t\t\t\t\t\t\tYou scramble across the sand with the rest of the crew, determined to keep up. Then you are under the cover of the trees, feeling wonderfully enclosed.  Overhead, the trees twine together to form a woven ceiling, with threads all the same color, but varying in width from the size of your finger to the size of your calf.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tSurely the aliens have some way to detect incoming ships.  They'll be expecting you…\n\t\t\t\t\t\t\t\t\t*set mushroom_ally false\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*goto_scene crew_camp\n\t\t\t\t\t\t\t#Gao.\n\t\t\t\t\t\t\t\t*gosub jungle\n\t\t\t\t\t\t\t\t*if (gao_ally)\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tGao pulls you away from the group, looking grim and bug-eyed with his goggles on.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"Don't react,\" he grunts.  \"Your weapon is a dud.  Standard practice for new hires.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou try not to react, but your mouth becomes a grim line.  You thank Gao.  It's better to know now, than to find out in the middle of a gun battle.  You are glad you took the time to make Gao an ally.\n\t\t\t\t\t\t\t\t\t*goto move_out\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tGao grunts when you move alongside him, grim and bug-eyed with his goggles on.\n\t\t\t\t\t\t\t\t\t*goto move_out\n\t\t\t\t\t\t\t#Zeeber.\n\t\t\t\t\t\t\t\t*gosub jungle\n\t\t\t\t\t\t\t\t*if (zeeber_ally)\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tZeeber turns to you, all girlish enthusiasm, eyes wide behind her goggles.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"It's your first mission!  I brought you a piece of the Reckless for luck!\" she exclaims, pressing a magnetic nut into your hand.  She leans forward as if to kiss your cheek, but actually whispers, \"Your weapon's a dud.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou try not to react, but your mouth becomes a grim line.  Zeeber is a better actress; she darts off, smiling, before you can even thank her.  You are glad you took the time to make Zeeber an ally.  It's better to know now, than to find out in the middle of a gun battle.\n\t\t\t\t\t\t\t\t\t*goto move_out\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tZeeber scowls at you, as only a teenager can.\n\t\t\t\t\t\t\t\t\t\n\n\t\t\t\t\t\t\t\t\t*goto move_out\n\t\t\t\t\t\t\t#Utambu.\n\t\t\t\t\t\t\t\t*gosub jungle\n\t\t\t\t\t\t\t\t*if (utambu_ally)\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tUtambu pulls you aside, looking furtive and bug-eyed with his goggles on.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"Don't react,\" he whispers.  \"You should know your weapon is a dud.  Standard practice for new hires.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou try not to react, but your mouth becomes a grim line.  You thank Utambu.  It's better to know now, than to find out in the middle of a gun battle.  You are glad you took the time to make Utambu an ally.\n\t\t\t\t\t\t\t\t\t*goto move_out\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tUtambu gives you a shy half-smile.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto move_out\n\t\t\t\t\t\t\t#Nobody.  I don't feel like talking.\n\t\t\t\t\t\t\t\t*gosub jungle\n\t\t\t\t\t\t\t\t*goto move_out\n\t*if (crew = false) #…try to escape without The Mushroom.\n\t\t*label solo_path\n\t\t*set crew_strength -1\n\t\t*set mushroom_ally false\n\t\t*gosub hammer\n\t\t*gosub vfight\n\t\n\t\t*goto solo_exit\n\t*if (crew = true) #…try to desert alone.\n\t\t*goto solo_path\n\n*label vfight\n*choice\n\t#Crash into Vikola.\n\t\t*if (strength \u003c 75)\n\t\t\t*label crash\n\t\t\tYou throw yourself onto Vikola, using sheer uncoordinated weight to knock her to the ground.  She heaves underneath you.  You know she'll throw you off in a matter of seconds, and you have a sudden inspiration. You grab the canister from her belt and flick the switch to foam just as Vikola pushes you off her and your behind thumps into the soft, curiously powdery sand.\n\n\t\t\t*label feet\n\t\t\tYou're at Vikola's feet now, but that suits you fine.  You start spraying: ankles, knees, thighs—\n\n\t\t\t\"Space!\" Vikola swears, knocking the canister from your grip.  It tumbles into the sand and begins rolling down the sloping beach, towards the ocean.  Vikola dives for it, but the foam around her legs is already beginning to harden, and the movement sends her toppling into the sand.\n\n\t\t\t\"Crazy Stashie bastard,\" she snarls, reaching for her goggles.  You tear it off her head, throwing it towards the water before she can call anyone inside the ship.  You quickly retrieve the canister, and start spraying again, not really bothering to aim.  Vikola instinctively puts her arms up to shield her face, so you get those, too.\n\n\t\t\t\"Stop squirming,\" you tell her.  \"I'm going to do your mouth, and you don't want me to get your nose by accident, do you?\"\n\n\t\t\t\"Die in space, alien-lover,\" she spits, but when you move the canister in front her face, she shuts her mouth and stills.  You use a careful line of foam to gag her, so that she can't call out to the crew on the ship.\n\t\t\t*return\n\t\t*else\n\t\t\tYou throw yourself onto Vikola, knocking her to the ground.  She writhes ineffectively as you expertly pin her arms with one hand, while retrieving the canister of foam from her belt with the other.\n\t\t\t\n\t\t\t\"Crazy Stashie bastard,\" she snarls, as you foam her hands, and then toss her goggles towards the ocean.  You spray her feet next, hobbling her.\n\t\t\t*label cocoon\n\t\t\t\n\t\t\t\"Stop squirming,\" you say.  \"I'm going to do your mouth, and you don't want me to get your nose by accident, do you?\"\n\n\t\t\t\"Die in space, alien-lover,\" she spits, but when you move the canister in front her face, she shuts her mouth and stills.  You use a careful line of foam to gag her, so that she can't call out to the crew on the ship.\n\t\t\t*return\t\t\t\n\t*if (net = true) #Throw the magnetic net over Vikola.\n\t\t*set net false\n\t\tYou pull a small bundle of silky fibers out of your pocket—it's the magnetic net you found in the cargo hold, which the pirates never bothered to take from you.  You turn it on and throw it towards Vikola, watching as it opens wide.  It hits Vikola and engulfs her, the magnetic tabs snapping together behind her back.\n\n\t\t\"Space!\" Vikola swear.  \"Crazy alien-loving Stashie bastard…\"\n\t\t\n\t\tIt will only take a minute or two for Vikola to find a tab and turn the net off, so you don't stay to watch her squirm.\n\t\t*return\n\t*if (needle = true) #Stab Vikola with the medibed needle.\n\t\t*set needle false\n\t\tYou still have the medibed needle you retrieved in your cell secreted in your sleeve pocket; the overconfident pirates never bothered to search you.  You slide the needle out and rush Vikola, stabbing her in the arm.\n\t\t\n\t\tShe screams wordlessly, too surprised to respond to your attack.  You hope her goggles weren't on, and the entire Reckless crew isn't about to come pouring down the gangway in response to her scream.\n\t\t*return\n\t#Dive for Vikola's gun.\n\t\tVikola doesn't expect open rebellion—you've been a well-behaved prisoner for kiloseconds—so she lets you approach as you scan the hull.\n\t\t*if (strength >= 75)\n\t\t\t*set gun true\n\t\t\tAs you pass by, you suddenly turn and yank the narrow projectile weapon from Vikola's belt, pointing it at her head.  \"Lose the goggles,\" you tell her in your toughest voice.  \"Give me the foam.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\"Crazy Stashie bastard,\" she snarls, but she obeys.  You take the canister she offers you and flick the switch to foam.  You crouch down to spray Vikola's ankles.\n\t\t\t\t\t\t\t\t\n\t\t\t\"Space!\" Vikola swears, trying to step out of the morass you've created.  But the foam around her legs is already hardening, and the movement sends her toppling into the sand.  You kneel beside her and poke her in the sternum with the gun barrel, since she seems to have forgotten who is in charge.  She puts her hands up in a gesture of negation, so you spray foam around those, too.\n\t\t\t*goto cocoon\n\t\t*else\n\t\t\tAs you pass by, you grab the handle of the projectile weapon, but you can't pull it out fast enough.  Vikola's hand clamps down on your arm, and she raises a hand to her goggles.  You can't let her call for help!\n\t\t\t\n\t\t\t*goto crash\t\t\n\t#Grab the can of foam from Vikola's belt.\n\t\tVikola doesn't expect open rebellion—you've been a well-behaved prisoner for kiloseconds—so she lets you approach as you scan the hull.\n\t\t*if (strength >= 75)\n\t\t\tAs you pass by, you suddenly turn and yank the canister of foam from her belt.  You flick the switch to foam, and spray her hand as she goes for her gun.  She swings at you with her free hand, but you duck under the blow.\n\t\t\t\n\t\t\t*goto feet\n\t\t*else\n\t\t\tAs you pass by, you grab the canister of foam on her belt, but you can't pull it out fast enough.  Vikola's hand clamps down on your arm, and she raises a hand to her goggles.  You can't let her call for help!\n\t\t\t\n\t\t\t*goto crash\n\n*label solo_exit\n\n*if (gun = false)\n\tDo you want to take Vikola's gun with you?\n\t*choice\n\t\t#I'll take it.\n\t\t\t*set gun true\n\t\t\t*set infamy %+ 15\n\t\t\tYou grab the gun and jam it into your belt.  It's better to be prepared.\n\t\t\t\n\t\t\t*goto sprint\n\t\t#I'll leave it.\n\t\t\t*set empathy %+ 15\n\t\t\tYou leave Vikola's gun where it is.  You are trying to avoid violence, not precipitate it.\n\t\t\t\n\t\t\t*goto sprint\n\t\t#I'll throw it in the ocean.\n\t\t\t*set empathy %+ 15\n\t\t\tYou pitch Vikola's gun into the water, knowing the crew has a limited number of these non-electrical weapons.\n\t\t\t\n\t\t\t*goto sprint\n*else\n\t*page_break\n\t*goto sprint\n\n*label sprint\n*set solo true\nYou sprint across the sand towards the jungle, leaving The Mushroom behind.  The leafless trees look blue-gray, though that may be the effect of your selective color-canceling goggles.  The trees, if you can use such a human-centric word, are ropey and parasitic, wrapping around each other, strangling their fellows in their desperate race towards the sun.  \n\nIn less than a minute you are under the cover of the trees, feeling wonderfully enclosed.  Of course you've had your anti-agoraphobia training like every other Stashie, but your stomach still seems more settled when there's a roof over your head.\n*label jog\n\nYou keep up a distance runner's pace as you weave between the trees, heading for the volcano.  Overhead, the trees twine together to form a woven ceiling, with threads all the same color, but varying in width from the size of your finger to the size of your calf.  You should arrive a few minutes ahead of the Reckless ground team, with plenty of time to find a clump of trees to hide in and watch the confrontation.\n\t\t\t\t\t\t\t\nSurely the aliens have some way to detect incoming ships.  They'll be expecting the pirates…\n*page_break\n*achieve freedom\nYou position yourself behind a clump of intertwined trees, where you will be able to watch the Reckless crew confront the Medusi.\n\nThe Medusi structures are open-sided, mere poles and distressingly high canvas ceilings.  A half dozen of these huge tents are littered with unidentifiable equipment.  The seventh holds about twenty Medusi, all waving their limbs wildly.  Perhaps they are arguing—you can't hear their electrical language, but you see sparks jump out from the worms on top of their hoods, conducted by the super-saturated air.  Your colored goggles give these mini-lightning bolts a blue tinge.  The Medusi seem to absorb these shocks with no problem at all, but you're not sure a human body could handle that much electricity.\n\nSuddenly, you are jerked backwards by a sharp tug on your shirt.  You look behind you and the see the massive form of a Medusa.  Of course, the aliens must have posted sentries to watch for the arrival of strangers.  You put a hand in your speech box, and say:\n*choice\n\t#\"Please release me.\"\n\t\t\"Alien necessity dialogue leader.\"\n\t\t*label caught\n\t\tThe lip-like end of the Medusa's limb remains clamped on your shirt, no matter how you twist.  The alien pushes you out into the open, and towards the tent where the Medusi have gathered.\n\t\t*goto meet_leader\n\t#\"Let go, fungus!\"\n\t\t\"Appellation untranslatable.  This Medusa Humble Tender Untranslatable.  Alien necessity dialogue leader.\"\n\t\t*goto caught\n\t#\"Listen to me!  You are in danger!\"\n\t\tYou try to explain your situation and the pirates' plans, but the Medusa cuts you off.\n\t\t\n\t\t\"I Humble Tender Untranslatable,\" it says.  \"Alien necessity dialogue leader.\"\n\t\t\n\t\tIt nudges you out into the open, towards the tent where the Medusi have gathered.\n\t\t*goto meet_leader\n\t#\"Take me to your leader.\"\n\t\t*set persuasiveness %+ 5\n\t\t\n\t\t\"Agreement.  Following,\" says the Medusa, nudging you out into the open, and towards the tent where the Medusi have gathered.\n\t\t\n\t\t*label meet_leader\n\t\tA Medusi steps forward.  \"Statement alien intention!\" it demands.\n\t\t\n\t\tYou tell them of the Reckless and your kidnapping, and urge them to…\n\t\t*fake_choice\n\t\t\t#…flee to safety.\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t\"These pirates are dangerous.  The one who is coming to negotiate is insane.  He wants your vermite, and he'll kill you to get it.  You should get your people to safety,\" you say.\n\t\t\t#…call for help.\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t\"These pirates are dangerous.  Their ship is highly armed.  You need to call for reinforcements, and hide until they come,\" you say.\n\t\t\t#…negotiate a deal.\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t\"The pirates have orders to negotiate a deal for your vermite, and only use violence as a last resort.  You should talk them, if you're at all willing to sell,\" you say.\n\t\t\t#…attack first.\n\t\t\t\t*set infamy %+ 5\n\t\t\t\t*set empathy %- 10\n\t\t\t\t\"These pirates are dangerous.  The one who is coming to negotiate is insane.  He wants your vermite, and he'll kill you to get it. You should attack them first,\" you say.\n\t\t*comment endif\n\t\t\t\t\n\t\tThe leader is silent a moment.  Because of their government's isolationist policies, it has probably never spoken to a member of another species before.  Suddenly it shoves you with a tentacle, not hard enough to break anything, but hard enough to land you on your rear end on the unforgiving rock.  \"Impossibility of evaluating sanity of alien mind.  Possibility falsehoods.\"\n\n\t\tYou pick yourself up, wondering what you can say that will convince the Medusi to trust you.\n\t\t*label score_boost\n\t\t*choice\n\t\t\t#\"I was a prisoner on the human ship.\"\n\t\t\t\t\"I have no loyalty to those humans, no reason to lie to you,\" you tell the Medusa.\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t*label lie\n\t\t\t\t\n\t\t\t\t\"Unless alien plans rejoining fellow-species,\" says the leader.  \"Unless escape merely deviousness strategy….\"  A cacophony rises from your speech box, as the Medusi all shout their opinion of your honesty.  \"Others silence,\" the leader continues, in a low but firm voice.  \"Argument irrelevance now other aliens arrival.\"\n\t\t\t\t*goto_scene medusi_camp\n\t\t\t#\"My survival depends on yours.  Why would I lie?\"\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t*goto lie\n\t\t\t#\"The decision is yours.\"\n\t\t\t\t\"I can only offer insight into the motivations of unfamiliar creatures,\" you tell the Medusa.\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t*set empathy %+ 5\t\t\t\t\n\t\t\t\t*goto lie\n\t\t\t*if (mushroom_ally) #\"I saved your Honored Diplomat, didn't I?\"\n\t\t\t\t\"So you know I'm on your side.\"\n\t\t\t\t*goto lie\n\n*label hammer\nYou'll have to wait for the right moment, when the rest of crew goes inside to gear up, leaving only Hammer, Vikola, and their prisoner outside.  You'll need an excuse to stay outside yourself with the two guards, so you volunteer to scan the hull around the airlocks, which are currently resting at ground level.  That way, you can claim not to be done when the other repairs are completed.\n\nYou'll never make it past Vikola and Hammer, though.  You need something or someone to pull one of them away, such as…\n*choice\n\t#…a ship-wide alarm.\n\t\tOnce you, Vikola, and Hammer are the only humans outside, you deliberately leave an airlock door ajar, and then work your way around the ship to their vicinity.  Two centaseconds later, an alarm begins to sound throughout the Reckless, audible to you through the open gangway.  Hammer puts a hand to his goggles, obviously receiving orders to find the breach.\n\t\t*label moment\n\t\t*if (crew = false)\n\t\t\t\"Watch them,\" he orders Vikola, as you practice your most innocent look.\n\t\t\t\n\t\t\tHe'll be back in a moment.  You quickly:\n\t\t\t*return\n\t\t*else\n\t\t\t\"Watch the fungus, both of you,\" he orders, as you practice your most innocent look.\n\t\t\t\n\t\t\tHe'll be back in a moment.  You quickly:\n\t\t\t*return\n\t*if (hacking > 50) #…a minor explosion.\n\t\tOnce you, Vikola, and Hammer are the only humans outside, you pull out the conduit behind an exterior airlock control, and set up an overload.  You choose an airlock on the opposite side of the ship for your sabotage, and then work your way around the ship to the guards' vicinity.  Two centaseconds later, you hear a sharp pop, and smoke begins to rise over the grounded ship.  Hammer puts a hand to his goggles, obviously receiving orders to find the problem.\n\t\t\n\t\t*goto moment\n\t*if (nybat_ally = true) #…Ny-bat.\n\t\t*if (nybat_rom = 3)\n\t\t\t\"I don't understand, ${name},\" Ny-bat says, when you ask ${n_him} to help you run.  \"I thought we were together.\"\n\t\t\t\n\t\t\tYou tell him:\n\t\t\t*choice\n\t\t\t\t#\"We are.  Come with me.\"\n\t\t\t\t\t*label together\n\t\t\t\t\tNy-bat takes your hand.  \"You would actually…? But I have ties here, people who depend on me to bring a measure of sanity…I will have to think about it.\n\t\t\t\t\t*label pledge\n\t\t\t\t\tWe will find each other again, before anyone departs from the planet.  But do we have to separate?  What do you hope to accomplish?\"\n\t\t\t\t\t\n\t\t\t\t\t*label nyreply\n\t\t\t\t\tYou reply:\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"I want the Medusi to trust me.\"\n\t\t\t\t\t\t\t*set empathy %+ 5\n\t\t\t\t\t\t\t\"That could be important, if negotiations don't go as planned.  I'll help you,\" Ny-bat says.\n\t\t\t\t\t\t\t*label promise\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Thank you.\"\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*gosub kiss\n\t\t\t\t\t\t\t*label hover\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou hover near the guards, ostensibly scanning a nearby airlock.  In a few centaseconds, Hammer puts a hand to his goggles, obviously receiving a message from inside the ship.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Watch them,\" he orders Vikola, and strides up the gangway.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tHe'll be back in a moment.  You quickly:\n\t\t\t\t\t\t\t*return\n\t\t\t\t\t\t#\"I'll stop Krantic from hurting the Medusi.\"\n\t\t\t\t\t\t\t*set empathy %+ 10\n\t\t\t\t\t\t\t\"That is a worthy goal,\" says Ny-bat.\n\t\t\t\t\t\t\t*goto promise\t\t\t\t\t\n\t\t\t\t\t\t#\"Maybe the Medusi will help me get home.\"\n\t\t\t\t\t\t\t*set infamy %- 10\n\t\t\t\t\t\t\t*if (nybat_rom \u003c 3)\n\t\t\t\t\t\t\t\t\"It's possible,\" says Ny-bat.  \"You deserve the chance.\"\n\t\t\t\t\t\t\t\t*goto promise\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\"It's possible.  You'd better take the Diplomat, if you want the Medusi's help,\" says Ny-bat.  \"And you will find a way to contact me, if you secure a way off the planet?  You will not simply leave?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Not without seeing you,\" you promise.\n\t\t\t\t\t\t\t\t*goto promise\n\t\t\t\t\t\t#\"I have to get away from Zoa and Krantic.\"\n\t\t\t\t\t\t\t*if (nybat_rom \u003c 2)\n\t\t\t\t\t\t\t\t*set infamy %- 10\n\t\t\t\t\t\t\t\t\"And you think the Medusi are less dangerous?  I hope you are right.  Anyway, you deserve the chance to find out.  I'll distract Hammer for a few minutes,\" says your ally.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto hover\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\"I would like to protect you, if I could,\" says Ny-bat.  \"But I cannot be with you every moment.  If you are determined to leave, I will help you.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*gosub kiss\n\t\t\t\t\t\t\t\t*goto hover\n\t\t\t\t\t\t#\"This isn't my fight—I don't want to be in the line of fire.\"\n\t\t\t\t\t\t\t*set infamy %- 10\n\t\t\t\t\t\t\t*if (nybat_rom \u003c 2)\n\t\t\t\t\t\t\t\t\"You may not have a choice,\" says Ny-bat.  \"But you deserve the chance to try.  I'll distract Hammer for a few minutes.\"\n\t\t\t\t\t\t\t\t*goto hover\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*gosub kiss\n\t\t\t\t\t\t\t\t\"You may not have a choice,\" says Ny-bat.  \"Although I would like to protect you if I could.  If you are determined to leave, I will help you.\"\n\t\t\t\t\t\t\t\t*goto hover\t\t\t\t\t\t\n\t\t\t\t#\"We are.  This will keep our options open.\"\n\t\t\t\t\t*label trust\n\t\t\t\t\tNy-bat takes your hand.  \"I will trust you.\n\t\t\t\t\t*goto pledge\n\t\t\t\t#\"I can't stay with you, though part of me wants to.\"\n\t\t\t\t\t*label just_ally\n\t\t\t\t\t*set nybat_rom 2\n\t\t\t\t\t\"If the circumstances were different…\" Ny-bat trails off.\n\t\t\t\t\t\n\t\t\t\t\t\"Who knows?\" you say.\n\t\t\t\t\t\n\t\t\t\t\t\"I am still your ally,\" says Ny-bat.  \"What do you hope to accomplish by running now?\"\n\t\t\t\t\t*goto nyreply\n\t\t\t\t#\"It was only one night.  It didn't mean anything.\"\n\t\t\t\t\t*label cold\n\t\t\t\t\t*set nybat_rom 1\n\t\t\t\t\tNy-bat takes a step back, and straightens, so that ${n_his} gaze passes over your head.\n\t\t\t\t\t\n\t\t\t\t\t\"Of course,\" ${n_he} says in a detached tone.  \"However, I still have sympathy for your unfortunate situation.  What do you hope to accomplish by running now?\"\n\t\t\t\t\t*goto nyreply\n\t\t*elseif (nybat_rom = 2)\n\t\t\t\"I don't understand, ${name},\" Ny-bat says, when you ask ${n_him} to help you run.  \"I thought we were beginning to…I thought we might…\"\n\t\t\t\n\t\t\tYou tell ${n_him}:\n\t\t\t*choice\n\t\t\t\t#\"We can be together if you come with me.\"\n\t\t\t\t\t*goto together\n\t\t\t\t#\"I hope we still can.  My departure could create options for us both.\"\n\t\t\t\t\t*goto trust\n\t\t\t\t#\"Maybe some day, in better circumstances.  But I can't stay.\"\n\t\t\t\t\t*goto just_ally\n\t\t\t\t#\"It was just one kiss.  It didn't mean anything.\"\n\t\t\t\t\t*set nybat_rom 1\n\t\t\t\t\t*goto cold\n\t\t*elseif (crew = true)\n\t\t\t\"What do you hope to accomplish by running now?\" asks Ny-bat.  \"You've earned your place with us.\"\t\t\t\n\t\t\t*goto nyreply\n\t\t*else\n\t\t\t\"What do you hope to accomplish by escaping onto a possibly hostile alien planet?\" asks Ny-bat.\n\t\t\t*goto nyreply\n\t*if (gao_ally = true) #…Gao.\n\t\t*if (crew = true)\n\t\t\t\"Why run now?\" asks Gao.  \"You joined up.\"\t\t\t\n\t\t\t*label reply\n\n\t\t\tYou reply:\n\t\t\t*choice\n\t\t\t\t#\"I want the Medusi to trust me.\"\n\t\t\t\t\t*set empathy %+ 5\n\t\t\t\t\t\"That could be helpful, if negotiations don't go as planned.  I'll help you,\" your ally says.\n\t\t\t\t\t*label will\n\t\t\t\t\t\n\t\t\t\t\t\"Thanks.\"\n\t\t\t\t\t\n\t\t\t\t\tYou hover near the guards, ostensibly scanning a nearby airlock.  In a few centaseconds, Hammer puts a hand to his goggles, obviously receiving a message from inside the ship.\n\t\t\t\t\t\n\t\t\t\t\t\"Watch them,\" he orders Vikola, and strides up the gangway.\n\t\t\t\t\t\n\t\t\t\t\tHe'll be back in a moment.  You quickly:\n\t\t\t\t\t*return\n\t\t\t\t#\"I'll stop Krantic from hurting the Medusi.\"\n\t\t\t\t\t*set empathy %+ 10\n\t\t\t\t\t\"If you think you can, I'll help you,\" says your ally.\n\t\t\t\t\t*goto will\t\t\t\t\t\n\t\t\t\t#\"Maybe the Medusi will help me get home.\"\n\t\t\t\t\t*set infamy %- 10\n\t\t\t\t\t\"It's possible,\" your ally says.  \"You deserve the chance.\"\n\t\t\t\t\t*goto will\t\t\t\t\n\t\t\t\t#\"I have to get away from Zoa and Krantic.\"\n\t\t\t\t\t*set infamy %- 10\n\t\t\t\t\t\"And you think the Medusi are less dangerous?  I hope you are right.  Anyway, you deserve the chance to find out.  I'll distract Hammer for a few minutes,\" says your ally.\n\t\t\t\t\t*goto will\t\n\t\t\t\t#\"This isn't my fight—I don't want to be in the line of fire.\"\n\t\t\t\t\t*set infamy %- 10\n\t\t\t\t\t\"You may not have a choice,\" says your ally.  \"But you deserve the chance to try.  I'll distract Hammer for a few minutes.\"\n\t\t\t\t\t*goto will\n\t\t*else\n\t\t\t\"What good will it do to escape here?\" asks Gao.\n\t\t\t*goto reply\n\t*if (zeeber_ally = true) #…Zeeber.\n\t\t*if (crew = true)\n\t\t\t\"But I thought you were going to stay.  I thought you were looking out for me a bit.  Please don't go,\" Zeeber says, forlorn.  Then she seems to remember she's tough, and sticks her thumbs in her utility belt.  \"I mean, it's an alien planet.  There's giant mushrooms and red fog and probably no human food.  It's not a great place to escape to!\"\n\t\t\t\n\t\t\tPoor kid, she really seems to have become attached to you.\n\t\t\t\n\t\t\t*label zeeberreply\n\t\t\tYou tell her:\n\t\t\t*choice\t\t\t\n\t\t\t\t#\"Come with me.\"\n\t\t\t\t\t\"You would take me?\" she steps forward, as if about to throw her arms around you, but pulls back before reaching you.  \"It's no good.  Zoa will just come after you.  She gets what she wants.  All the time, kinda.  Better not to have her mad at me, too.\"\n\t\t\t\t\t\n\t\t\t\t\t\"Maybe, when this is settled—\"\n\t\t\t\t\t\n\t\t\t\t\t\"Whatever,\" Zeeber interrupts you, not wanting to hear promises you may not be able to keep.  \"I'll help you try, I guess.\"\n\t\t\t\t\t*goto escape\n\t\t\t\t#\"I'm keeping you safe by trying to avoid violence.\"\n\t\t\t\t\t*set empathy %+ 10\n\t\t\t\t\t\"I'm safe enough, but I don't want to shoot anybody.  I haven't yet,\" she says, almost embarrassed.  So I'll help you try, I guess.\"\n\t\t\t\t\t*goto escape\n\t\t\t\t#\"I need to protect the Medusi.\"\n\t\t\t\t\t*set empathy %+ 10\n\t\t\t\t\t\"You think you can?\" asks Zeeber.  \"Zoa gets what she wants.  All the time, kinda.  But I'll help you try, I guess.\"\n\t\t\t\t\t*goto escape\t\n\t\t\t\t#\"Maybe the Medusi will help me get home.\"\n\t\t\t\t\t*set infamy %- 10\n\t\t\t\t\t\"Maybe,\" Zeeber says.  \"Zoa gets what she wants.  All the time, kinda.  But I'll help you try, I guess.\"\n\t\t\t\t\t*goto escape\t\n\t\t\t\t#\"I have to get away from Zoa and Krantic.\"\n\t\t\t\t\t*set infamy %- 10\n\t\t\t\t\t\"People don't really get away from Zoa,\" Zeeber says.  \"Zoa gets what she wants.  All the time, kinda.  But I'll help you try, I guess.\"\n\t\t\t\t\t*label escape\n\t\t\t\t\t\n\t\t\t\t\tShe stands up straight and tilts her chin, just to make it clear that she doesn't need any protection.\n\t\t\t\t\t\n\t\t\t\t\tYou hover near the guards, ostensibly scanning a nearby airlock.  In a few centaseconds, Hammer puts a hand to his goggles, obviously receiving a message from inside the ship.\n\t\t\t\t\t\n\t\t\t\t\t\"Watch them,\" he orders Vikola, and strides up the gangway.\n\t\t\t\t\t\n\t\t\t\t\tHe'll be back in a moment.  You quickly:\n\t\t\t\t\t*return\t\t\t\t\t\n\t\t\t\t#\"This isn't my fight—I don't want to be in the line of fire.\"\n\t\t\t\t\t*set infamy %- 10\n\t\t\t\t\t\"You're kind of in it, now,\" Zeeber says.  \"But I'll help you try, I guess.\"\n\t\t\t\t\t*goto escape\n\t\t*else\n\t\t\t\"But it's an alien planet.  There's giant mushrooms and red fog and probably no human food.  It's not a great place to escape to!\" says Zeeber.\n\t\t\t*goto zeeberreply\n\t*if (utambu_ally = true) #…Utambu.\n\t\t*if (crew = true)\n\t\t\t\"Are you sure running is a good idea?\" Utambu asks.  \"You've earned a place on the ship.\"\n\t\t\t*goto reply\n\t\t*else\n\t\t\t\"Are you sure escaping now is a good idea?\" Utambu asks.  \"It's an unknown world, with all kinds of risks.\"\n\t\t\t*goto reply\n\n*label duo_exit\nYou flick the canister's switch from foam to solvent, and begin to spray The Mushroom's limbs.  As soon as it can separate its gooey limbs, the alien lumbers toward the jungle.  You have to sprint across the powdery sand to keep up.\n\nThe leafless trees look blue-gray, though that may be the effect of your selective color-canceling goggles.  The trees, if you can use such a human-centric word, are ropey and parasitic, wrapping around each other, strangling their fellows in their desperate race towards the sun.  \n\nIn less than a minute you are under the cover of the trees, feeling wonderfully enclosed.  Of course you've had your anti-agoraphobia training like every other Stashie, but your stomach still seems more settled when there's a roof over your head.\n*achieve freedom\n\nYou keep up a distance runner's pace as you weave between the trees, following the Medusa.  When it judges you are far enough from the Reckless (you suppose), it stops and raps the top of your speech box, reminding you to turn it on.\n*page_break\n*if (mushroom_ally = true)\n\t\"Alien ally praise—fulfillment promise.  Only lacking time!\" it says, gesturing upwards.\n\t*label ride\n\tOverhead, the trees twine together to form a woven ceiling, with threads all the same color, but varying in width from the size of your finger to the size of your calf. \t\n\t\n\tThe Mushroom reaches up to wrap two limbs around thick strands of the canopy.  Before you have time to speculate, it has flipped upside down, and is hanging from four limbs like a living hammock.  This is your first glimpse under its hood, and you see a squishy-looking brown mass inside a ring of limbs, with two unidentifiable protrusions on each side.  You are fighting down your disgust when the two free limbs reach out and twine around your wrists, gently tugging you forward.\n\n\tYou can't suppress a shudder from the wet, alien touch.  The elephant-trunk limbs tug again, and you realize with horror that The Mushroom wants you to climb onto it!  You…\n\t*choice\n\t\t#…climb aboard.\n\t\t\t*label on\n\t\t\t*set empathy %+ 10\n\t\t\tThe limbs leave your wrists and wrap around your waist, hoisting you up onto The Mushroom's soft underside.  You try to breathe through your mouth, but you can't completely block the Medusa's stench.  You feel like you are sitting on a partially filled waterbed—your balance is precarious, and there's nothing to hang onto.  The Medusa surges forward, wrapping limbs around the crisscrossing trees overhead, swinging from one limb-hold to the next faster than you would have believed possible.  Your upper body is thrown this way and that.  Luckily, two limbs stay firmly wrapped around your waist.  Without them, you'd pitch over the side.\n\t\t\t\n\t\t\tThe jungle is a bluish-gray blur as The Mushroom speeds along.  You lift your goggles for a moment to see if that's better, but all you see without them is red fog.  Your eyes start to water from the unfamiliar elements in the air, and you quickly replace your goggles.\n\t\t\t*page_break\n\t\t\tYou don't usually get motion-sick, but the swaying combined with the rotten celery smell begins to make you nauseous.  You are grateful when The Mushroom suddenly stops, and the limbs around your waist heave you over the side.  The Mushroom drops down beside you.  It is heaving strangely—from exertion, you assume.\n\t\t\t\n\t\t\tYou put a hand on the nearest tree and breathe deeply of the soupy air for a moment, recovering your equilibrium.  The surface of the tree is strangely soft, more like skin than bark.\n\t\t\t\t\t\n\t\t\tYou are leaning against the last twisted clump of trees before a rocky plain, a narrow ring of barren rock circling the volcano.  You take a few steps forward, and the ground beneath your feet becomes a smooth swirl of black basalt, cooled lava that still remembers its liquid past.  At the base of the volcano, beside the grim black maw of a cave entrance, is the Medusi camp.\n\t\t\t*set infamy %- 25\n\t\t\t*page_break\n\t\t\t*goto_scene medusi_camp\n\t\t#…protest via speech box.\n\t\t\t\"I can walk on my own,\" you say.\n\t\t\t*label secondchance\n\t\t\t\n\t\t\t\"Speed!  Warning to tenders!  Haste!\" shouts the Medusa.  It clearly believes it can travel faster than you can walk.\n\t\t\t\n\t\t\tWill you ride on the Medusa?\n\t\t\t*choice\n\t\t\t\t#Yes.\n\t\t\t\t\t*goto on\n\t\t\t\t#No.\n\t\t\t\t\t\"I'll follow,\" you promise.\n\t\t\t\t\t\n\t\t\t\t\tThe Mushroom sets off without you, swinging under the canopy faster than you thought possible.  Soon, it is out of sight, and you are alone with the tangled trees.  You jog through the jungle, hoping you will arrive in time to meet the Medusi before the Reckless ground team arrives.\n\t\t\t\t\t\n\t\t\t\t\tFinally you break out of the trees onto a rocky plain, a narrow ring of barren rock circling the volcano.  You take a few steps forward, and the ground beneath your feet becomes a smooth swirl of black basalt, cooled lava that still remembers its liquid past.  At the base of the volcano, beside the grim black maw of a cave entrance, is the Medusi camp.\n\t\t\t\t\t*set late true\n\t\t\t\t\t*set infamy %-25\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto_scene medusi_camp\n\t\t#…turn away, trying not to vomit.\n\t\t\t*set empathy %- 5\n\t\t\t*label no\n\t\t\tYou back away from The Mushroom, and the limbs slide off your wrist.\n\t\t\t*goto secondchance\n\t\t#…refuse to put myself completely in someone else's power.\n\t\t\t*set empathy %- 5\n\t\t\t*set infamy %+ 5\n\t\t\t*goto no\n*else\n\t*if (empathy > 50)\n\t\t\"Fellow prisoner execution of altruistism rescue!\" it says.  \"Behavior unexpectedness.  Rationalization?\"\n\t\t\n\t\tYou think it's asking why you freed it, when you had no previous alliance.\n\t\t\n\t\tYou tell The Mushroom you saved it because…\n\t\t*fake_choice\n\t\t\t#…I wanted to strike at the pirates.\n\t\t\t#…I sympathized with its plight.\n\t\t\t\t*set empathy %+ 5\n\t\t\t#…I hope to protect the Medusi from the pirates.\n\t\t\t\t*set empathy %+ 5\n\t\t\t#…I want the Medusi's help.\n\t\t\t\n\t\t\"Sufficiency of reason,\" The Mushroom says.\n\t\t*label coop\n\t\t*set mushroom_ally true\n\t\t\"Suggestion cooperation until banishment of treaty-breakers?\"\n\t\t*choice\n\t\t\t#\"Yes.\"  The Medusi will need my help.\n\t\t\t\t*label allies\n\t\t\t\t\"Agreement.  Only lacking time!\" The Mushroom says, gesturing upwards.\n\t\t\t\t*goto ride\n\t\t\t#\"Yes.\"  The Medusi may be my only way off this planet.\n\t\t\t\t*goto allies\n\t\t\t#\"No.\"  I'll make my own decisions, alone.\n\t\t\t\t*label mush_exit\n\t\t\t\tWithout another word, The Mushroom reaches up to wrap two limbs around thick strands of the canopy.  Before you have time to speculate, it has flipped upside down, and is hanging from four limbs like a living hammock. It swings off faster than you would have thought possible, and soon you are alone with the tangled trees.\n\t\t\t\t\n\t\t\t\t*goto jog\n\t\t\t#\"No.\"  I don't trust The Mushroom.\n\t\t\t\t*goto mush_exit\n\t*else\n\t\t\"Fellow prisoner execution of rescue!\" it says.  \"Behavior inexplicable.  Not consistency with previous aggression.  Rationalization?\"\n\t\t\n\t\tYou think it's asking why you freed it, when you didn't seem particularly concerned with its well-being before.\n\t\t\n\t\tYou tell The Mushroom you saved it because…\n\t\t*choice\n\t\t\t#…I wanted to strike at the pirates.\n\t\t\t\t\"Insufficiency of reason,\" it says.\n\t\t\t\t*goto mush_exit\n\t\t\t#…I sympathized with its plight.\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t\"Demanding to belief.  Yet possibility of usefulness,\" The Mushroom says.\n\t\t\t\t*goto coop\n\t\t\t#…I hope to protect the Medusi from the pirates.\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t\"Demanding to belief.  Yet possibility of usefulness,\" The Mushroom says.\n\t\t\t\t*goto coop\n\t\t\t#…I want the Medusi's help.\n\t\t\t\t\"Insufficiency of reason,\" it says.\n\t\t\t\t*goto mush_exit\n\n*label mush_check\n*if (mushroom)\n\t*return\n*else\n\tThe alien is half a meter taller than Hammer, at least twice as wide, and has no features that you can recognize as a face.  On the very top of the alien is something you hesitate to call hair—it's more like a tuft of long worms, springing from a central point.  Most of its body is covered by a hood of splotchy brown flesh.  Six limbs protrude from under the hood, not jointed like human limbs, but completely flexible like elephant trunks.  All six have been forced straight down and hobbled in a block of
