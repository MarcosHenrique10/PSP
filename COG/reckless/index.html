foam the size of a barstool.  You don't see any signs of injury, though.  You suppose the alien will make a better peace offering, or bargaining chip, if it's whole and healthy.\n\t*goto hello\n\t\n*label jungle\nA jungle rises before the Reckless crew; the leafless trees look blue-gray, though that may be the effect of your selective color-canceling goggles.  The trees, if you can use such a human-centric word, are ropey and parasitic, wrapping around each other, strangling their fellows in their desperate race towards the sun.  You look forward to walking under the interwoven branches. Of course you've had your anti-agoraphobia training like every other Stashie, but your stomach still seems more settled when there's a roof over your head.\n*return\n\n*label gaohurt\n*if (gao_hurt)\n\tThis might be a good time to clear the air with Gao.  You haven't talked much since you attacked him in your cell.\n\t\n\t\"Last week, in the cell,\" you say.\n\t*fake_choice\n\t\t#\"Sorry I hurt you.\"\n\t\t\t*set persuasiveness %+5\n\t\t\t*set empathy %+ 10\n\t\t\t*set gao_ally true\n\t\t#\"I did what I had to.  Nothing personal.\"\n\t\t\t*set infamy %+ 5\n\t\t#\"Risks of the job.  You understand.\"\n\t\t\t*set empathy %- 5\n\t\n\t\"I understand,\" says Gao wryly.  \"Wasn't the first time.  And I'm not one for grudges.\"\n\t\n\tHe gets to his feet beside you on the uneven hull.\n\t*return\n*else\n\t*return\n\t\n*label kiss\n*if (nybat_rom = 3)\n\tAnd you kiss ${n_him} fiercely before relinquishing his hand.\n\t*return\n*elseif (nybat_rom = 2)\n\tAnd you kiss ${n_him}, softly and sadly, and let him go.\n\t*return\n*else\n\t*return", "bonus": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*comment ñáéç…—\n*set crew true\n*temp workout false\n*temp play false\n*comment nybat rom 0 = not yet asked 1 = no 2 = undecided 3 = yes\nYou manage to avoid Krantic for a full day, before he catches you alone.  You are showering in the tiny bathroom off the main bridge, since the three in the bedroom deck below were occupied, so the metal stall door hides Krantic from view.  All you hear is his eerie voice.\n\n\"Come out, come out, come out and play, Stashie,\" he sings.\n\n\"Space yourself,\" you reply, furious.\n\nYou don't know how he does it from out there, since the control panel is in the stall with you, but suddenly the water is freezing cold.  You slam your hand on the panel to shut if off, though you've still got soap in your hair.  The humiliation inherent in the situation only makes you angrier.\n*choice\n\t#\"I'm opening a line to the captain,\" I say icily.\n\t\t*goto nofun\n\t#\"I'm recording this.  Leave now or the captain hears it,\" I tell him.\n\t\t*set infamy %+ 5\n\t\t*goto nofun\n\t#\"I'll kill you in your sleep for this,\" I threaten.\n\t\t*set infamy %+ 10\n\t\t*goto nofun\n\t*if (nybat_ally) #\"I'm calling Ny-bat.  Ready for a beating?\" I taunt.\n\t\t*set infamy %+ 5\n\t\t*goto nofun\n\t#I grab my towel and stomp out to him.\n\t\t*set infamy %+ 15\n\t\tYou walk right up to Krantic and his manic grin, unembarrassed and unafraid.  \n\t\t\n\t\t\"You can't hurt me.  So seal it and get out.\"\n\t\t*goto nofun\n\n*label nofun\n\"Aw, you're no fun anymore,\" Krantic says.  His voice becomes a fierce whisper.  \"I can't hurt you now.  Captain rules the ship.  But we won't always be on the ship, and what Zoa doesn't know can't get me spaced.\"\n\nKrantic bangs the door as he leaves.  You suppose you are relatively safe from him—for now.\n*page_break\n*label favor\n*if (gao_released)\n\tGao is waiting for you in your room when you return.\n\t\n\t\"You owe me a favor, ${name}\" he says.  \"I've come to collect.\"\n\t\n\t\"What do you need?\" you ask, remembering that Gao risked the captain's displeasure by letting you out of your cell.\n\t\n\t\"\n\t*label collect\n\tKrantic owes me 37 chip from Straights last night.  I want you to collect for me.  Last time I asked him for money he broke my nose.  But the captain said he can't touch you.\"\n\t*label debt\n\t\t\n\t\"That's hardly anything, 37 chip.\"\n\t\n\t\"It's the principle of the thing,\" Gao says.\n\t*choice\n\t\t#\"Sorry, I can't.  I'll do anything else.\"\n\t\t\t*set infamy %- 15\n\t\t\t*set gao_ally false\n\t\t\t\"Perfect.\"  Gao scowls, heading for the door.  \"Next time you need something, don't bother asking.  You won't get it.\"\n\t\t\t\n\t\t\tYou didn't want to disappoint him, but Krantic is insane.\n\t\t\t*goto bonus\t\t\t\n\t\t*if (hacking >= 75) #\"Easy.  I'll just hack his account and take it.\"\n\t\t\t*set infamy %+ 10\n\t\t\t*gosub gaocheck\n\t\t\tIt takes you most of the day, but you do just that.  Krantic doesn't have the skills to trace your electronic intrusion, so he'll never know it was you.\n\t\t\t*goto bonus\n\t\t#\"Sure.  He doesn't scare me.\"\n\t\t\t*set infamy %+ 15\n\t\t\t*gosub gaocheck\n\t\t\t*label confront\n\t\t\tYou find Krantic in the communications room, scanning for proximal signals and watching something incredibly violent on a hovering visual at the same time.\n\t\t\t\n\t\t\t*if ((persuasiveness >75) or (infamy >50))\n\t\t\t\tAt first, he refuses even to discuss his gambling debt, preferring to pronounce chilling threats in a gleeful, childlike manner.  But you persist and threaten to tell the captain he accosted you in the shower.  Eventually he hands over 37 chip just to get rid of you.\n\t\t\t\t*goto bonus\n\t\t\t*else\n\t\t\t\t*set infamy %- 5\n\t\t\t\tAt first, he refuses even to discuss his gambling debt, preferring to pronounce chilling threats in a gleeful, childlike manner.  When you persist, he loses control, and slams you against the wall.  You leave without the money—37 chip is hardly worth a beating—but Gao appreciates your efforts.\n\t\t\t\t*goto bonus\n\t\t#\"I'll try my best.\"\n\t\t\t*gosub gaocheck\n\t\t\t*goto confront\n\t\t*if ((gao_ally = false) and (gao_hurt = false)) #\"Not interested.\"\n\t\t\t*set gao_ally false\n\t\t\t\"Perfect.\"  Gao scowls, heading for the door.  \"Next time you need something, don't bother asking.  You won't get it.\"\n\t\t\t\n\t\t\t*goto bonus\n\t\t*if ((gao_ally = true) or (gao_hurt = true)) #\"I don't owe you anything.\"\n\t\t\t*set gao_ally false\n\t\t\t\"Perfect.\"  Gao scowls, heading for the door.  \"Next time you need something, don't bother asking.  You won't get it.\"\n\n\t\t\t*goto bonus\n*elseif (gao_hurt)\n\t*set gao_hurt false\n\tGao is waiting for you in your room when you return.  You haven't really talked since you attacked him in your cell.\n\n\t\"Last week, in the cell,\" you say.\n\t*fake_choice\n\t\t#\"Sorry I hurt you.\"\n\t\t\t*set persuasiveness %+5\n\t\t\t*set empathy %+ 15\n\t\t\t*set gao_ally true\n\t\t#\"I did what I had to.  Nothing personal.\"\n\t\t\t*set infamy %+ 5\n\t\t#\"Risks of the job.  You understand.\"\n\t\t\t*set empathy %- 5\n\t\n\t\"I understand,\" says Gao wryly.  \"Wasn't the first time.  And I'm not one for grudges.\"\n\t\n\tYou throw your towel onto your bed.\n\t\n\t\"But you made me bleed,\" he says.  \"You owe me a favor, ${name}.\"\n\t*goto collect\n*else\n\tGao is waiting for you in your room when you return.\n\t\n\t\"Got a proposition for you,\" he says.  \"Krantic owes me 37 chip from Straights last night.  Last time I asked him for money, he broke my nose.  But the captain said he can't touch you.  If you can collect it for me, I'll give you ten percent.\"\n\t*goto debt\n\t\n*label bonus\n\nYou have two weeks until the Reckless arrives at 4-7-2. Perhaps you can accomplish something en route, and arrive better prepared.  Would you rather…\n*choice\n\t#…form alliances among the crew.\n\t\t*set infamy %+ 20\n\t\tYou spend the first week getting to know your fellow smugglers, and persuading most of them to accept you as a member of the crew.  In particular, you work to form a bond with:\n\t\t*choice\n\t\t\t*if (gao_ally) #Gao.\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*gosub gaocheck\n\t\t\t\tThe gruff economist is well-liked by the rest of the crew; they go to him for advice on investing their earnings and planning for the future.  Gao neither threatens those pirates who insist on macho posturing, nor submits to any hazing.  He walks a middle road, gaining respect while making no enemies, and he's willing to teach you to follow in his footsteps—as long as you agree to study vermite economics as well.\n\t\t\t\t\n\t\t\t\t*goto verm\n\t\t\t#Zeeber.\n\t\t\t\t*gosub zeebercheck\n\t\t\t\t*set empathy %+ 20\n\t\t\t\tZeeber is starved for attention, poor kid, and when you show her a little kindness, she latches onto you like a magnetic tether.  You find her waiting outside your door when you get up in the morning, eager to talk to you before breakfast, or hovering in the gallery as you learn to shoot the projectile weapons designed for the supersaturated atmosphere of 4-7-2.\n\n\t\t\t\tShe shows you all around the ship, more thoroughly than anyone else would have done, and though you sometimes tire of the kinds of wisecracks teenagers find hilarious, you come to care about her almost despite yourself.  You learn all about her childhood as a Sandovali slave, and listen somewhat unhappily as she sings Zoa's praises.  You're sure Zoa is brilliant and brave, but she'll never be the parent Zeeber needs.  You're not quite ready to volunteer for the job yourself, but by the end of the first week, you're sure Zeeber would do anything for you, wise or otherwise.\n\t\t\t\t*page_break\n\t\t\t\t*if ((level >= 50) or (persuasiveness >=50))\n\t\t\t\t\tThe captain orders you to report to Gao for a crash course in vermite economics, since you may have the necessary skills to act as a salesperson.\n\t\t\t\t\t\n\t\t\t\t\t*goto verm\n\t\t\t\t*else\n\t\t\t\t\t*goto rep\n\t\t\t#Utambu.\n\t\t\t\t*gosub utambucheck\n\t\t\t\t*set hacking %+ 25\n\t\t\t\t*goto help_utambu\n\t\t\t#Ny-bat.\n\t\t\t\t*gosub nybatcheck\n\t\t\t\t*set strength %+ 20\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*goto workout\n\t#…familiarize myself with the technology I'll be taking on the mission.\n\t\t*set hacking %+ 25\n\t\t*gosub utambucheck\n\t\t*label help_utambu\n\t\tYou help Utambu assemble the projectile weapons and speech boxes you'll be taking on the mission to 4-7-2, learning not just how to use them, but how they work.  When you express curiosity about the emergency breathers you'll be using, Utambu is happy to show you the inner workings of those, too.\n\t\t\t\t\n\t\tUtambu is grateful for the help—apparently, not many of the crew are interested in the technical aspects of their trade.  As you work side by side, you can't help but become friends with the man.  He's a basically harmless individual, barely in his twenties, who has lived most of his life on a family-owned trader.  Like most Shippers, the ideas of borders and tariffs seem strange to him, so he has no ethical objection to smuggling.  The rough behavior of some of the pirates was a shock to him, after his sheltered upbringing, but his folks need the money, so he has tried to adjust.  He doesn't challenge anyone, so they mostly let him be.  A little kindness on your part makes a big impression, though.  By the end of the first week you've gained some technical knowledge and an ally.\n\t\t*page_break\n\t\t*if ((level >= 50) or (persuasiveness >=50))\n\t\t\tThe captain orders you to report to Gao for a crash course in vermite economics, since you may have the necessary skills to act as a salesperson.\n\t\t\t\n\t\t\t*goto verm\n\t\t*else\n\t\t\t*goto rep\n\t#…improve my physical condition, and learn some combat skills, too.\n\t\t*set infamy %+ 10\n\t\t*set strength %+ 30\n\t\t*gosub nybatcheck\n\t\tFor the first week, you spend six kiloseconds a day in a medibed, as the machine injects you with protein and stimulates muscle growth.  You wake each day aching all over, cursing as you stumble to the mess hall and then the gym, where you must work your newly strengthened muscles if you want to keep the artificial growth.\n\t\t\t\t\n\t\t*label workout\n\t\t*set workout true\n\t\tTwice a day you spar with Ny-bat, who has kindly offered to teach you to defend yourself.  $!{n_he} is the perfect opponent, so skilled that ${n_he} can simulate any level of proficiency, and provide you with challenges you can overcome as you learn new techniques.  $!{n_he} is considered to be the best hand-to-hand fighter on the ship, and not just because of ${n_his} longer reach and exaggerated height.\n\t\t\n\t\tAs a child on the planet Evergreen, a planet with only 75% of Earth's mass and gravity, Ny-bat cleaned the home of a martial arts master in return for the lessons ${n_his} family could not afford.  $!{n_he} used those skills to defend ${n_him}self against the roving gangs of street children who resented anyone with a roof over their heads, no matter how poor that home might be.  Before long, ${n_he} had made peace between the children of his neighborhood, convincing them to steal food from those in the better part of the town instead of from each other.  $!{n_he} became something of a leader, until ${n_he} grew too old for the children to trust, and decided to embark on the Reckless.\n\t\t\t\t\n\t\tThe crew respects Ny-bat for ${n_his} unruffled calm, ${n_his} quiet wisdom, and ${n_his} physical prowess.  You are lucky that your training sessions give you an opportunity to befriend ${n_him}, because you could not have chosen a better ally.\n\t\t*page_break\n\t\t*if ((level >= 50) or (persuasiveness >=50))\n\t\t\tThe captain orders you to report to Gao for a crash course in vermite economics, since you may have the necessary skills to act as a salesperson.\n\t\t\t\n\t\t\t*goto verm\n\t\t*else\n\t\t\t*goto rep\n\t#…take menti-stim, to give myself a temporary cognitive boost.\n\t\t*set level %+ 30\n\t\t*set strength %- 10\n\t\tThe medibeds stock menti-stim, for those willing to endure the side effects.  Your limbs seem to be made of lead each morning, as you force yourself to climb into the medical coffin for your daily dose.  Then the pain hits—streaks of pure heat throughout your body as the medicine scours your neurons clean of all the naturally occurring detritus that inhibits perfect nerve conduction.  It may be phantom pain—pure nerve stimulation—but it hurts like a hand on a stove filament.\n\t\t\n\t\tYou stumble out to the mess hall in a daze of pain a few times a day, and otherwise lie in bed watching movies on the hovering visual.  You don't talk to the crew much, but you hope they understand that you're doing this for the sake of the mission.  \n\t\t\n\t\tAt night it's hard to sleep.  Though the sharp pain has faded, you often need a medibed to soothe muscles that have spasmed in response to the pain.  Also, your mind feels so clear in those kiloseconds, it's difficult to shut it off and rest.\n\t\t\n\t\tYou stop the menti-stim after a week, and sleep eighty kiloseconds straight.  When you wake up, you are hyper-alert and eager to analyze an unfamiliar alien society.  Your senses are keen, your mind is sharp, and your memories are so vivid you can recall specific test questions from your end-of-school exams.  You wish it took more than two months for your nerve pathways to clog again, but you are determined to enjoy your heightened mental abilities while they last. \n\t\t*page_break\n\t\tZoa tells you to report to Gao, who will give you a crash course in vermite economics.\n\t\t*goto verm\n\t\t\n*label verm\n\n*if (gao_ally = false)\n\tGao isn't happy with this assignment, but he doesn't have much of a choice.  At least you'll have another opportunity to impress him—if you care at all about his opinion, which you may not.\n\t\n\t*goto memorize\n*else\n\t*label memorize\n\tThere's a lot to memorize: You learn how thick a vermite coating must be to seal a starship, how much heat the microorganisms need to stay alive, and how much computing power is needed to regulate the vermite's behavior.  Then there's the math.  To sell vermite (and project the right image while doing it), you have to calculate equivalencies in the twelve major currencies employed in this part of the spiral, to know what Spider charges clients of the various races, and to emphasize how much your clients will save by not paying taxes.\n\n\t\"It's like this,\" Gao says.  \"A Joodar freighter offers you a hundred-joo chip per meter cubed.  You know Spider charges 90, but the Joodar collective adds twenty percent tax.  Do you take the deal?\"\n\t*fake_choice\n\t\t#\"Sure!  I make 10 more than Spider, and the Joodar saves 8.\"\n\t\t\t*set persuasiveness %- 10\n\t\t\t\"What are you, a Groundsider?\"  Gao shakes his head in disbelief, as if shocked by your idiocy.  \"You never take a first offer.  Ask for 108, settle for 105.\"\n\t\t#\"I ask for 105.  The Joodar still saves 3.\"\n\t\t\t*set persuasiveness %+ 5\n\t\t\tGao shakes his head.  \"You settle for 105.  But ask for 108, so you can meet in the middle.\"\n\t\t#\"I ask for 108, what the Joodar usually pays.  Vermite is rare.\"\n\t\t\t*set persuasiveness %+ 15\n\t\t\t\"Good.\"  Gao nods in approval.  \"Ask high, settle for 105.\"\n\t\t#\"I sell it for 95, to attract more customers.\"\n\t\t\t*set persuasiveness %- 15\n\t\t\t\"What are you, a Groundsider?\"  Gao shakes his head in disbelief, as if shocked by your idiocy.  \"The point of this is to make money.  As much money as possible.  You ask for 108, settle for 105.  Everyone's desperate for vermite.  We won't have any trouble finding customers.\"\n\t*comment endif\n\n\tYou practice bargaining with Gao until he's satisfied—or too bored to continue.  It's hard to tell sometimes, with Gao.\n\t\n\t*goto rep\n\n*label rep\nThere's a segment of the crew, led by Vikola, that continues to slight you whenever possible—moving away if you sit next to them at the mess, pretending you haven't spoken when you try to join a conversation, or switching off the mess hall's giant hover when you are watching.  You decide to…\n*choice\n\t#…avoid them.\n\t\t*set level %+ 5\n\t\tYou have as little to do with Vikola's gang as possible; you don't care what they think.\n\t\t\n\t\t*if (nybat_ally)\n\t\t\tNy-bat notices, though, and thinks it is safer to have everyone's respect.\n\t\t\t*goto nyadvice\n\t\t*elseif (zeeber_ally)\n\t\t\tZeeber notices, though, and thinks you need to stand up for yourself, or their behavior will only get worse.\n\t\t\t*goto zeeberad\n\t\t*elseif (utambu_ally)\n\t\t\tUtambu notices, though, and thinks you need to stand up for yourself.\n\t\t\t*goto hack\n\t\t*else\n\t\t\tGao notices, though, and thinks you need to be able to work with everyone on the crew.\n\t\t\t*goto gaoad\n\t#…insult them in return.\n\t\tYour mocking only goads the pirates.  The situation escalates until you and Vikola can't be in the same room without shouting insults at each other.  The captain calls you to her office.\n\t\t\n\t\t*goto captainad\t\t\n\t#…ask Gao's advice. The pirates like him best.\n\t\t*label gaoad\n\t\t*if (gao_ally = false)\n\t\t\tYou find Gao in the comm room, where he is scanning stock values on various worlds.  He has so many hovers running, the displays cover the walls and the ceiling.\n\t\t\t\n\t\t\t\"So now you want advice?\" he asks.  \"Tough luck.\"\n\t\t\t\n\t\t\t\"I'm just trying to survive here.  You were new once, remember?  And now everyone trusts you.  How did you do it?\"\n\t\t\t\n\t\t\tGao grunts, but you can see he doesn't have the heart to refuse you.\n\t\t\t*page_break\n\t\t\t\"You don't have to be friends with Vikola and her crew.  You have to make them respect you, though.  Otherwise you might get left out of a lucrative side deal.  Accidentally left behind on an alien world.  You see what I'm saying,\" he tells you.\n\t\t\t*goto how\n\t\t*else\n\t\t\t\"You don't have to be friends with Vikola and her crew,\" Gao tells you one day in the comm room, where he is scanning stock values on various worlds.  He has so many hovers running, the displays cover the walls and the ceiling.  \"You have to make them respect you, though.  Otherwise you might get left out of a lucrative side deal.  Accidentally left behind on an alien world.  You see what I'm saying.\"\n\t\t\t*label how\n\t\t\t\n\t\t\t\"How do I get their respect?\" you ask.\n\n\t\t\t\"Beat them at Z-ball.  At the shooting range.  At hand-to-hand.\"\n\n\t\t\t\"That's not what you do,\" you protest.\n\n\t\t\t\"I make them money.  Find your own way.  Now beat it,\" he says.\n\n\t\t\tYou just smile, used to his abrupt manner by now, knowing that he wouldn't be giving you advice if he didn't think you were worth it.\n\n\t\t\tYou think over Gao's suggestions, and decide…\n\t\t\t*choice\n\t\t\t\t#…I'll challenge Hammer to a game of Z-ball.\n\t\t\t\t\t*gosub gaocheck\n\t\t\t\t\t*label zball\n\t\t\t\t\tEntertainment is scarce in deep space, so most of the pirates come to watch you play.  Hammer doesn't chat as the two of you ricochet back and forth across the the zero-G court, slamming the ball with your open hands.  But then, friendship was never the point of this little exercise.\n\t\t\t\t\t\n\t\t\t\t\tWhen you pause for a water break, you see a flurry of activity around Gao, and realize he's taking bets.\n\t\t\t\t\t\n\t\t\t\t\t*if (strength >= 75)\n\t\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t\tYou beat Hammer, but only by 3, so he is in no way humiliated.  He \n\t\t\t\t\t\t*label game\n\t\t\t\t\t\tgives you a nod of grudging approval, so you suppose you've succeeded in tempering his dislike.\n\t\t\t\t\t\t\n\t\t\t\t\t\tVikola lost money betting on Hammer, so she hates you more than ever.  At least now you only have to worry about her and Krantic, rather than a whole faction that's set against you.\n\t\t\t\t\t\t*achieve acceptance\n\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cards\n\t\t\t\t\t*elseif (strength > 50)\n\t\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t\tYou lose by 3, so you are in no way humiliated.  Hammer \n\t\t\t\t\t\t*goto game\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou lose by 20, a humiliating amount.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Waste of time,\" Hammer tells you, turning away in disgust.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (gao_ally)\n\t\t\t\t\t\t\tHis exit is blocked by Gao, who hands him a money chip.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"What's this?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Your share of the take.  Compensation for the bar on Dekara.  Didn't ${name} tell you?\" Gao says.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tComprehension dawns on Hammer's face, and he nods at you with grudging approval.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I just saved your reputation,\" Gao says, scowling at you after Hammer has left.  But by now you know that scowl is Gao's equivalent of a smile.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto cards\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*set infamy %- 15\n\t\t\t\t\t\t\tYou've actually made your reputation worse.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto cards\n\t\t\t\t#…I'll challenge Vikola to a shooting match.\n\t\t\t\t\t*gosub gaocheck\n\t\t\t\t\t*label shoot\n\t\t\t\t\tEntertainment is scarce in deep space, so most of the pirates come to watch the competition.\n\t\t\t\t\t\n\t\t\t\t\t\"Look familiar, Stashie?\" sneers Vikola, as she calls up a hovering visual onto the shooting range wall.  You know this program—it simulates a headlong rush down typical station corridors through a marketplace, during which the players are meant to shoot as many of the station's inhabitants as possible.\n\t\t\t\t\t\n\t\t\t\t\t*if (strength >= 75)\n\t\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\t\tLuckily, it takes more than that to rattle you.  You easily beat Vikola, and earn the respect of the watching pirates.  Even Hammer gives you a nod of approval when the wall flashes your scores.\n\t\t\t\t\t\t\n\t\t\t\t\t\tVikola hates you more than ever—she seems to think you meant to humiliate her, not impress her.  At least now you only have to worry about her and Krantic, rather than a whole faction that's set against you.\n\t\t\t\t\t\t*achieve acceptance\n\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cards\n\t\t\t\t\t*elseif (strength > 50)\n\t\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t\tLuckily, it takes more than that to rattle you.  You lose by 3, so you are in no way humiliated.  Even Hammer gives you a nod of approval when the wall flashes your scores.\n\t\t\t\t\t\t\n\t\t\t\t\t\tOnly Vikola refuses to be impressed, and continues to mock you.  At least now you only have to worry about her and Krantic, rather than a whole faction that's set against you.\t\n\t\t\t\t\t\t*achieve acceptance\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cards\n\n\t\t\t\t\t*else\n\t\t\t\t\t\t*set infamy %- 15\n\t\t\t\t\t\tYou lose by 25, a humiliating amount.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Waste of time,\" Vikola tells you, smirking.  \"You're worse than Zeeber.  Better ask the kid for some tips.\"\n\n\t\t\t\t\t\tYou've actually made your reputation worse.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cards\n\t\t\t\t#…I'll impress in my own way, with a hilarious hack.\n\t\t\t\t\t*gosub gaocheck\n\t\t\t\t\t*goto hack\n\t\t\t\t*if (workout = false) #…I'll ask Ny-bat to teach me hand-to-hand—he's the best.\n\t\t\t\t\t*gosub gaocheck\n\t\t\t\t\t*gosub nybatcheck\n\t\t\t\t\t*label lesson\n\t\t\t\t\t*set strength %+ 20\n\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t*achieve acceptance\n\t\t\t\t\tTwice a day you spar with Ny-bat, who kindly agrees to teach you to defend yourself.  $!{n_he} is the perfect opponent, so skilled that ${n_he} can simulate any level of proficiency, and provide you with challenges you can overcome as you learn new techniques.  $!{n_he} is considered to be the best hand-to-hand fighter on the ship, and not just because of ${n_his} longer reach and exaggerated height.\n\t\t\t\n\t\t\t\t\tAs a child on the planet Evergreen, a planet with only 75% of Earth's mass and gravity, Ny-bat cleaned the home of a martial arts master in return for the lessons ${n_his} family could not afford.  $!{n_he} used those skills to defend himself against the roving gangs of street children who resented anyone with a roof over their heads, no matter how poor that home might be.  Before long, ${n_he} had made peace between the children of ${n_his} neighborhood, convincing them to steal food from those in the better part of the town instead of from each other.  $!{n_he} became something of a leader, until he grew too old for the children to trust, and decided to embark on the Reckless.\n\t\t\t\t\t\n\t\t\t\t\tThe crew respects Ny-bat for ${n_his} unruffled calm, ${n_his} quiet wisdom, and ${n_his} physical prowess.  At the end of the week, Ny-bat stages a demonstration which the other pirates come to watch—entertainment is scarce in deep space.  Your performance earns you some respect, though Vikola still hates you as much as ever.  At least now you only have to worry about her and Krantic, rather than a whole faction that's set against you.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto cards\n\t\t\t\t*if (workout = true) #I'll ask Hammer to go hand-to-hand a few rounds.\n\t\t\t\t\t*gosub gaocheck\n\t\t\t\t\t*label fight\n\t\t\t\t\tThe other pirates come to watch you spar with Hammer—entertainment is scarce in deep space.  As you circle the mat and throw the first few punches, you analyze the older pirate's fighting style, as Ny-bat taught you.  Hammer is powerful, but not fast.\n\t\t\t\t\t\n\t\t\t\t\t*if (strength >= 75)\n\t\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\t\t*achieve acceptance\n\t\t\t\t\t\tNy-bat's lessons, added on to your previous skills, were all you needed to become Hammer's equal.  You dart under Hammer's defenses and duck his blows, not all the time, but enough to provide him with a challenge.  You each drop each other twice, before he gives you a nod of approval and calls a halt.\n\t\t\t\t\t\t\n\t\t\t\t\t\tOnly Vikola refuses to be impressed, and continues to mock you.  At least now you only have to worry about her and Krantic, rather than a whole faction that's set against you.\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cards\n\t\t\t\t\t\t\n\t\t\t\t\t*elseif (strength > 50)\n\t\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t\t*achieve acceptance\n\t\t\t\t\t\tYou dart under Hammer's defenses a few times, and land a few solid blows.  You can't actually get the better of him; you haven't learned enough from Ny-bat to counter Hammer's sheer muscle and decades of experience.  But at least you make him work for the win each time he drops you to the mat.  After four bouts, Hammer gives you a nod of approval and calls a halt.\n\t\t\t\t\t\n\t\t\t\t\t\tOnly Vikola refuses to be impressed, and continues to mock you.  At least now you only have to worry about her and Krantic, rather than a whole faction that's set against you.\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cards\t\t\t\n\t\t\t\t\t*else\n\t\t\t\t\t\t*set infamy %- 15\n\t\t\t\t\t\tUnfortunately, you haven't learned enough from Ny-bat to counter Hammer's sheer muscle and decades of experience.  He beats you easily and repeatedly.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Waste of time,\" he tells you, stomping away after dropping you to the mat for the fourth time.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou've actually made your reputation worse.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cards\t\t\t\t\n\t\t\t\t#…I'll win at cards.\n\t\t\t\t\t*gosub gaocheck\n\t\t\t\t\t*goto cards\n\t\t\t\t#…I refuse to care what those pirates think of me.\n\t\t\t\t\t*set empathy %+ 5\n\t\t\t\t\tYou'd rather be true to yourself than take Gao's advice.\n\t\t\t\t\t\n\t\t\t\t\t*goto cards\t\n\t#…ask Ny-bat's advice. The pirates respect ${n_him} the most.\n\t\t*label nyadvice\t\n\t\t\"You don't need their friendship, but you do need their respect.  Otherwise, accidents happen groundside, people get left behind—do you see?\" Ny-bat asks.  $!{n_he} is warming up in the training room/shooting range the pirates use to hone their skills.  It's a relatively small cube, compared to a station gym, but the plastic floor absorbs shocks, and one wall has a complete hover that can show various interactive vistas suitable for target practice.\n\t\t\n\t\t\"People who see kindness as a weakness must be cowed by authority.  You must act with confidence, and impress them with skill.\"\n\t\t\n\t\t\"Like you do.\"\n\t\t\n\t\tNy-bat drops ${n_his} arms from their formal defensive pose.  \"To be honest, it makes me tired sometimes, to always be so respected, to always make peace and check the crew's worse impulses, to always give advice and settle disagreements.  Everyone turns to me, and it would be pleasant, sometime, to have someone to turn to myself….\"  $!{n_he} raises ${n_his} arms, abruptly, and executes a formal attack that leaves ${n_him} facing away.\n\t\t\n\t\tIs Ny-bat obliquely indicating that ${n_he}'s interested in you romantically?  You're not sure.\n\t\t*gosub so_check\n\t\t*choice\n\t\t\t#I'll ignore it. I'm not attracted to ${n_him}.\n\t\t\t\t*set nybat_rom 1\n\t\t\t\t*label nychoice\n\t\t\t\t\"So you think I should impress them,\" you say, returning to the subject at hand.\n\t\t\t\t*choice\n\t\t\t\t\t#I'll challenge Hammer to a game of Z-ball.\n\t\t\t\t\t\t*gosub nybatcheck\n\t\t\t\t\t\t*goto zball\n\t\t\t\t\t#I'll challenge Vikola to a shooting match.\n\t\t\t\t\t\t*gosub nybatcheck\n\t\t\t\t\t\t*goto shoot\n\t\t\t\t\t#I'll impress in my own way, with a hilarious hack.\n\t\t\t\t\t\t*gosub nybatcheck\n\t\t\t\t\t\t*goto hack\n\t\t\t\t\t*if (workout = false) #\"It would help if you taught me hand-to-hand, Ny-bat.\"\n\t\t\t\t\t\t*gosub nybatcheck\n\t\t\t\t\t\t*goto lesson\n\t\t\t\t\t*if (workout = true) #I'll ask Hammer to go hand-to-hand a few rounds.\n\t\t\t\t\t\t*gosub nybatcheck\n\t\t\t\t\t\t*goto fight\n\t\t\t\t\t#I'll win at cards.\n\t\t\t\t\t\t*gosub nybatcheck\n\t\t\t\t\t\t*goto cards\n\t\t\t\t\t#I refuse to care what those pirates think of me.\n\t\t\t\t\t\t*set empathy %+ 5\n\t\t\t\t\t\tYou'd rather be true to yourself than take Ny-bat's advice.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto cards\t\t\t\t\t\t\t\t\t\n\t\t\t*if (so != \"none\") #I'll ignore it. My ${so} is waiting for me.\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t*set nybat_rom 1\n\t\t\t\t*set married true\n\t\t\t\t*goto nychoice\n\t\t\t#I'll ignore it. Why would ${n_he} flirt with me?\n\t\t\t\t*set nybat_rom 2\n\t\t\t\t*goto nychoice\n\t\t\t#I'll encourage ${n_him}. I like ${n_him}.\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t*label respond\n\t\t\t\t*gosub nybatcheck\n\t\t\t\t*set nybat_rom 3\n\t\t\t\t\"Everyone's looking for someone like that,\" you say.\n\t\t\t\t\n\t\t\t\tNy-bat turns around, and you look at each other for a moment.  It's nothing you can put a name to, but it's a beginning, maybe.\n\t\t\t\t\n\t\t\t\t*goto nychoice\n\t\t\t#I'll encourage ${n_him}. It may be to my advantage.\n\t\t\t\t*set empathy %- 10\n\t\t\t\t*set nybat_rom 2\n\t\t\t\t*goto respond\n\t#…ask Zoa's advice. She's the captain.\n\t\t*label captainad\n\t\tYou explain the situation to Zoa as she sits in her chair surrounded by hovering visuals.  You can see only an echo of her face through the semi-transparent images.\n\t\t\n\t\t\"Are you telling me you are not capable of handling a little hazing from my crew?\" she asks you, voice hard.  \"Perhaps I was hasty in hiring you.\"\n\t\t\n\t\t\"No.  That's not what I'm saying,\" you tell her, worried you're about to be demoted to prisoner status again.\n\t\t\n\t\t\"Then get out,\" says Zoa.\n\t\t*page_break\n\t\tWhen you reach your room, there's a message from Ny-bat, inviting you to join ${n_him} in the training room.  You realize you should have gone to ${n_him} first; you've seen him managing conflicts between crew members.\n\t\t\n\t\t*goto nyadvice\n\t#…ask Zeeber's advice. She watches everyone.\n\t\t*label zeeberad\n\t\t\"I run Vikola's laundry over to the sterilizer.  I hide some dessert for Hammer if he's got late shift.  So they leave me alone,\" Zeeber says.  \"You gotta do stuff for them.  Or you gotta be better than them, like Ny-bat.  No one on the ship can take Ny-bat.  So ${n_he}'s got respect.\"\n\t\t\n\t\tYou and Zeeber are in the training room/shooting range the pirates use to hone their skills.  It's a relatively small cube, compared to a station gym, but the plastic floor absorbs shocks, and one wall has a complete hover that can show a various interactive vistas suitable for target practice.  The two of you are practicing with the projectile weapons you'll have to use on 4-7-2 because of the supersaturated atmosphere.  The spacing guns kick back, unlike normal energy weapons, and they have only one setting!  You feel like a primitive Groundsider.\n\t\t\n\t\t\"I don't think running errands will work for me, kid,\" you tell Zeeber, smiling at her.\n\t\t\n\t\t\"Don't call me a kid.  I have to be crew, or Zoa will put me off.  So I'm crew,\" she reminds you, for the third time today, at least.  \"You have to impress them.  Aren't you good at anything?  I mean, you must be good at something, ${name}!\"\n\t\t*choice\n\t\t\t#I'll challenge Hammer to a game of Z-ball.\n\t\t\t\t*gosub zeebercheck\n\t\t\t\t*goto zball\n\t\t\t#I'll challenge Vikola to a shooting match.\n\t\t\t\t*gosub zeebercheck\n\t\t\t\t*goto shoot\t\t\t\t\n\t\t\t#I'll impress in my own way, with a hilarious hack.\n\t\t\t\t*gosub zeebercheck\n\t\t\t\t*goto hack\n\t\t\t*if (workout = false) #I'll ask Ny-bat to teach me hand-to-hand.\n\t\t\t\t*gosub zeebercheck\n\t\t\t\t*goto lesson\t\t\t\t\t\t\n\t\t\t*if (workout = true) #I'll ask Hammer to go hand-to-hand a few rounds.\n\t\t\t\t*gosub zeebercheck\n\t\t\t\t*goto fight\n\t\t\t#I'll win at cards.\n\t\t\t\t*gosub zeebercheck\n\t\t\t\t*goto cards\n\t\t\t#I refuse to care what those pirates think of me.\n\t\t\t\t*set empathy %+ 5\n\t\t\t\tYou'd rather be true to yourself than take Zeeber's advice.\n\t\t\t\n\t\t\t\t*goto cards\n\t#…join forces with Utambu. He's in the same situation.\n\t\t*label hack\n\t\t*gosub utambucheck\n\t\t\"Are we going to do something nasty to them?\" Utambu asks, with undisguised glee.  \"Because I've tried being nice.\"\n\t\t\n\t\tYou are sitting in Utambu's workshop, at a table piled high with computer components, strangely colored metal, and kilometers of conduit.  This week, Utambu is working on a better way to store energy in the dark between the stars.  Last week he was rewriting the life-support software, programming it to predict the effects of a concentration of the ship's crew in any one area and respond accordingly.\n\t\t\n\t\t\"You have access to all the ship's systems, don't you?\" you ask him.\n\t\t\n\t\t\"What are you thinking, ${name}?  Cold showers?\"\n\t\t\n\t\t\"No,\" you say, remembering Krantic.  \"We'll do something to Vikola.  Something public.  And the others will back down.\"\n\t\t*choice\n\t\t\t#We'll make a rude hover follow her around.\n\t\t\t\t*set infamy %+ 15\n\t\t\t\t*if (hacking >= 75)\n\t\t\t\t\tThe two of you stay up late, writing a devilish piece of code.\n\t\t\t\t\t*goto shirt\n\t\t\t\t*else\n\t\t\t\t\tYou provide the slogan, and Utambu writes the code.\n\t\t\t\t\t*label shirt\n\t\t\t\t\t\n\t\t\t\t\tAt breakfast the next day, Vikola storms into the mess hall, furious.  \"What is this?\" she shouts, gesturing towards her own chest.  There, bright white against the black of her shirt, is your eloquent summation of Vikola's character: \"Whenever I talk, I spit jooslugs.\"\n\t\t\t\t\t\n\t\t\t\t\tThe Reckless crew erupts in laughter.\n\n\t\t\t\t\t\"Try changing your shirt,\" Hammer says.\n\t\t\t\t\t\n\t\t\t\t\t\"It's not on the shirt!  It's a spacing hover!\"  Vikola demonstrates by crossing the room.  The words flicker a bit as the image switches from one projector to another, but they always settle right across her front.  Your program makes the hovering visual follow her anywhere there's a projector, which is most of the ship.\n\t\t\t\t\t\n\t\t\t\t\t\"Fascinating,\" you say.\n\t\t\t\t\t\n\t\t\t\t\t\"You!\" Vikola screeches.  \"Turn it off!\"\n\t\t\t\t\t\n\t\t\t\t\t\"In a few days,\" you say, grinning.  \"If you can treat Utambu and me like human beings until then.\"\n\t\t\t\t\t*goto hack_exit\n\t\t\t#We'll make static blare every time she speaks.\n\t\t\t\t*set infamy %+ 15\n\t\t\t\t*if (hacking >= 75)\n\t\t\t\t\tThe two of you stay up late, writing a devilish piece of code.\n\t\t\t\t\t*goto static\n\t\t\t\t*else\n\t\t\t\t\tYou provide the idea, and Utambu creates the code.\n\t\t\t\t\t*label static\n\t\t\t\t\t\n\t\t\t\t\tAt breakfast the next day, Vikola storms into the mess hall, furious.  She says something, but you don't know what, because the communication system emits a loud burst of static as soon as she begins to speak.\n\t\t\t\t\t\n\t\t\t\t\t\"St—\" She tries again, but her invective is drowned out by another mechanical screech.\n\t\t\t\t\t\n\t\t\t\t\tThe Reckless crew erupts in laughter.\n\t\t\t\t\t\n\t\t\t\t\t\"What did you do?\" Hammer asks you.\n\t\t\t\t\t\n\t\t\t\t\t\"My mother always said, 'If you can't say something nice, don't say anything at all,'\" Utambu says, grinning.\n\t\t\t\t\t\n\t\t\t\t\t\"So Vikola won't be saying anything until she can treat Utambu and me like human beings,\" you explain.\n\t\t\t\t\t*goto hack_exit\n\t\t\t#We'll use the shower to bleach her hair.\n\t\t\t\t*set infamy %+ 15\n\t\t\t\t*if (hacking >= 75)\n\t\t\t\t\tThe two of you stay up late, altering the plumbing in the shower on Vikola's hall.  You have to install fingerprint recognition on the control panel, too, so the ship's computer can identify who is taking a shower.\n\t\t\t\t\t*goto shower\n\t\t\t\t*else\n\t\t\t\t\tYou provide the idea, and Utambu alters the plumbing in the shower on Vikola's hall.  He has to install fingerprint recognition on the control panel, too, so the ship's computer can identify who is taking a shower.\n\t\t\t\t\t*label shower\n\t\t\t\t\t\n\t\t\t\t\tAt breakfast the next day, Vikola storms into the mess hall, furious.  Her long hair, previously black and glorious as space, is now a white waterfall down her back.\n\t\t\t\t\t*achieve acceptance\n\t\t\n\t\t\t\t\tThe Reckless crew erupts in laughter.\n\t\t\t\t\t\n\t\t\t\t\t\"You did this!\" Vikola screeches, marching up to you and giving you a small shove.  \"Synthesize me some hair dye. Now!\"\n\t\t\t\t\t\n\t\t\t\t\t\"In a few days,\" you say, grinning.  \"If you can treat Utambu and me like human beings until then.\"\n\t\t\t\t\t*goto hack_exit\n\n*label hack_exit\n\nThe rest of the crew laughs—even Hammer can't help smirking.  Vikola must hate you more than ever, but now you only have to worry about her and Krantic, rather than a whole faction that's set against you.\n*page_break\n*label cards\nThe night before your arrival at planet 4-7-2, you find yourself in the mess hall, deep in a synthochair, watching the Reckless crew play Straights.  The pirates take their cards—and their debts—seriously.  Gao logs the wins and losses, and takes side bets from the spectators.  Those who don't play are pitied.  Those who play badly are scorned.\n\nOf course, you can't play without money, and you don't exactly have access to your station accounts.  So far, you haven't had the opportunity to join in.\n\n*if (nybat_rom != 1)\n\t\"I'll stake you, ${name},\" says Ny-bat, who has been on a winning streak.  \"You can pay me back out of your winnings.\"\n\n\t\"At what interest?\" you ask.\n\n\t\"I'm sure we can find some way for you to make it up to me,\" Ny-bat says, with a sidelong glance.\n\t*if (nybat_rom = 0)\n\t\t$!{n_he} is definitely flirting with you.\n\t\t*gosub so_check\n\t\t*goto flirt_choice\n\t*elseif (nybat_rom = 2)\n\t\t$!{n_he} is definitely flirting with you this time.  It seems ${n_he} wasn't deterred by your silence last time.\n\t\t*goto flirt_choice\n\t*else\n\t\t$!{n_he} is definitely flirting with you again.\n\t\t*label flirt_choice\n\t\t*choice\n\t\t\t#I'll take the money and flirt back.\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t*set nybat_rom 3\n\t\t\t\t*gosub nybatcheck\n\t\t\t\t\"Thanks.  Let's talk about payment later.  In private,\" you say with a smile.\n\t\t\t\t\n\t\t\t\t\"I'd be happy to,\" says Ny-bat, blushing.\n\t\t\t\t*goto play\n\t\t\t#I'll flirt back but decline to play cards.\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t*set nybat_rom 3\n\t\t\t\t*gosub nybatcheck\n\t\t\t\t\"Thanks, but I don't think I play well enough.  Maybe you could give me a lesson later.  In private,\" you say with a smile.\n\t\t\t\t\n\t\t\t\t\"I'd be happy to,\" says Ny-bat, blushing.\n\t\t\t\t*goto watch\n\t\t\t#I'll take the money but discourage Ny-bat.\n\t\t\t\t*set nybat_rom 1\n\t\t\t\t\"I'll give you twenty percent of my winnings,\" you say, avoiding eye contact with Ny-bat.\n\t\t\t\t*goto play\n\t\t\t#I'll refuse the offer and the flirtation.\n\t\t\t\t*set nybat_rom 1\n\t\t\t\t\"No, thanks,\" you say, avoiding eye contact with Ny-bat.  \"I don't want to owe anyone; I'll just watch.\"\n\t\t\t\t*goto watch\n*else\n\t\"I'll stake you,\" Gao offers.  \"But you're a risk.  So, I take sixty percent of your winnings.\"\n\t\n\t\"Sixty percent!  That's robbery!\" you protest.\n\t\n\tGao's mouth curves into a rare half-smile.\n\t*choice\n\t\t#I'll accept Gao's terms.\n\t\t\t*goto play\n\t\t#I'll just watch for now.\n\t\t\t*label watch\n\t\t\t*set infamy %- 15\n\t\t\tNy-bat, Vikola, Gao and Hammer are clustered round a low card table, their synthochairs upright and their spines straight.  The table is connected to the ship's computer, of course, so that players can deposit and withdraw from their shipboard accounts.\n\t\t\t\n\t\t\tYou watch a tense game of Straights, along with Utambu, Zeeber and a few other spectators.  The pirates play for points, rather than winner-takes-all, though the winner of each hand receives a hefty point bonus.  All four pirates are expert players, excellent at bluffing—Ny-bat and Hammer are impassive as asteroids, Vikola endlessly sneers, and Gao continuously scowls.  It's impossible to tell what any of them are thinking.\n\t\t\t\n\t\t\tAs Vikola inputs her winnings, Zeeber marches up to Gao.  \"You said I could play when I got the chip.  Well, I've got it.  So can I play?\"\n\t\t\t\n\t\t\t\"Get spaced, kid,\" says Vikola.\n\t\t\t\n\t\t\t\"My money's as good as anyone else's!\" shouts Zeeber, long hair falling into her face.  Her fists are clenched.\n\t\t\t*page_break\n\t\t\tNy-bat suggests two games, with a winner's game afterwards.  Players flip a chip, and Zeeber ends up playing with Utambu, Vikola, and one of Vikola's cronies.\n\t\t\t\t\t\t\n\t\t\t*goto cheat_choice\n\t\t#I'll ask Zeeber for money.\n\t\t\t*if (zeeber_ally)\n\t\t\t\t*set level %+ 5\n\t\t\t\t*label zeeber_stake\n\t\t\t\t\"I'll take thirty percent of winnings over the principal,\" the teen says, flipping her hair out of her eyes.\n\t\t\t\t\n\t\t\t\t\"Done,\" you say.\n\t\t\t\t\n\t\t\t\t*goto play\n\t\t\t*else\n\t\t\t\t\"Sorry.  What if you lose?\" says Zeeber.\n\t\t\t\t*goto second_choice\n\t\t#I'll ask Ny-bat for money.\n\t\t\t*if (nybat_ally)\n\t\t\t\t*set level %+ 5\n\t\t\t\t*label nybat_stake\n\t\t\t\t\"I'll take thirty percent of winnings over the principal,\" Ny-bat says.\n\t\t\t\t\n\t\t\t\t\"Done,\" you say.  You're glad ${n_he} doesn't seem to hold your rejection of ${n_his} romantic advance against you.\n\t\t\t\t\n\t\t\t\t*goto play\n\t\t\t*else\n\t\t\t\tNy-bat shakes ${n_his} head.  \"Too risky.  Gao has made a standard offer.  You should take it.\"\n\t\t\t\t*goto second_choice\n\t\t#I'll ask Utambu for money.\n\t\t\t*if (utambu_ally)\n\t\t\t\t*set level %+ 5\n\t\t\t\t*label utambu_stake\n\t\t\t\t\"Sure,\" says Utambu.  \"But, um, fifteen percent of winnings?\"\n\t\t\t\t\n\t\t\t\t\"Done,\" you say.\n\t\t\t\t\n\t\t\t\t*goto play\n\t\t\t*else\n\t\t\t\t\"Sorry, ${name},\" he says.  \"I haven't seen you play yet.\"\n\t\t\t\t*goto second_choice\t\t\n\t\t#I'll ask Hammer for money.\t\n\t\t\t\"Space yourself,\" Hammer says, in a bored tone.\n\t\t\t\n\t\t\t*label second_choice\n\t\t\t\n\t\t\tYou'd better ask someone you've begun a friendship with, or give up on a better offer.\n\t\t\t*choice\n\t\t\t\t*if (zeeber_ally) #Zeeber.\n\t\t\t\t\t*goto zeeber_stake\n\t\t\t\t*if (nybat_ally) #Ny-bat.\n\t\t\t\t\t*goto nybat_stake\n\t\t\t\t*if (utambu_ally) #Utambu.\n\t\t\t\t\t*goto utambu_stake\n\t\t\t\t#I'll take Gao's offer.\n\t\t\t\t\t*goto play\n\t\t\t\t#I'll watch.\n\t\t\t\t\t*goto watch\n\n*label play\n*set play true\n*set infamy %+ 5\nYou sit at a low card table with Ny-bat, Vikola, and Hammer, your synthochair upright and your spine straight.  The table is connected to the ship's computer, of course, so that players can deposit and withdraw from their shipboard accounts.\n\nYou play a tense game of Straights, conscious of the spectators hovering behind you, peeking at your cards. The pirates play for points, rather than winner-takes-all, though the winner of each hand receives a hefty point bonus.  All three pirates are expert players, excellent at bluffing—Ny-bat remains completely impassive, Vikola endlessly sneers, and Gao continuously scowls.  It's impossible to tell what any of them are thinking.\n\n*if (level > 75)\n\t*achieve acceptance\n\t*set infamy %+ 10\n\tYou win the hand with a run of diamonds; you're quite good at cards, and you were lucky in the other players' discards.  Really it's all memorization and probability, and mental acrobatics are easy for you.\n\t\n\tAs you input your winnings into the table,\n\t*goto zeeber_asks\n*elseif ((level > 50) and (persuasiveness > 80))\n\t*achieve acceptance\n\t*set infamy %+ 10\n\tYou win the hand with a run of diamonds.  You may not be able to calculate probabilities in your head, but you are intelligent enough to remember what's been played, and you are a superb actor.  You won this hand by acting naive and distressed, tricking the pirates into discarding exactly what you needed.  It won't work again, but it was fun.\n\t\n\tAs you input your winnings into the table, \n\t*goto zeeber_asks\n*elseif (level > 50)\n\tYou lose the hand, of course, but you do manage to rack up a few points.\n\t\n\tAs Vikola inputs her winnings,\n\t*goto zeeber_asks\n*else\n\t*set infamy %- 10\n\tYou lose the hand, and don't earn a single point.  You don't really have the skills to win against this kind of player.\n\t\n\tAs Vikola inputs her winnings, \n\t*goto zeeber_asks\n\n*label zeeber_asks\t\nZeeber marches up to Gao.  \"You said I could play when I got the chip.  Well, I've got it.  So can I play?\"\n\n\"Get spaced, kid,\" says Vikola.\n\n\"My money's as good as anyone else's!\" shouts Zeeber, long hair falling into her face.  Her fists are clenched.\n*page_break\nNy-bat suggests two games, with a winner's game afterwards.  Players flip a chip, and Zeeber ends up playing you, Vikola, and one of Vikola's cronies.\n\t\t\t\n*label cheat_choice\t\nAs the game progresses, you notice something odd.  Vikola and her friend never, ever discard anything that Zeeber wants to pick up.  Of course, that is statistically possible, but by the third hand you are beginning to suspect something.  You study the pirate standing behind Zeeber's chair, and eventually you see a repetitive flick of his hand—a signal of some kind.   The pirate is letting his friends know which cards Zeeber has. \n\n*if (play)\n\tIf anything, you are benefiting from Vikola's desire to crush Zeeber.  You've won two out of three hands, due in part to some odd choices the other players have made—choices you now see were meant to prevent Zeeber from acquiring any points at all.  You decide to…\n\t*goto cheat\n*else\n\tIf anyone, it's Utambu who is unknowingly benefiting from Vikola's desire to crush Zeeber.  He's won two out of three hands, due in part to some odd choices the other players have made—choices you now see were meant to prevent Zeeber from acquiring any points at all.  You decide to…\n\t*goto cheat\n\n*label cheat\n*choice\n\t*if (play) #…stay quiet and benefit from Vikola's cheating.\n\t\t*set infamy %+ 10\n\t\t*set empathy %- 20\n\t\tYou play a few more hands with these players, and then the winners—including you but not Zeeber—play for a while.\n\t\t\n\t\tZeeber remains defiant, despite losing every hand, and refuses to be sent to bed like a kid.\n\t\n\t\tWhen the game is over,\n\t\t*goto sleep\n\t*if (play = false) #…stay quiet and let Utambu benefit at Zeeber's expense.\n\t\t*set empathy %- 15\n\t\tThe players stay in this configuration for a few more hands, and then the winners—including Utambu but not Zeeber—play for a while.\n\t\t\n\t\tZeeber remains defiant, despite losing every hand, and refuses to be sent to bed like a kid.\n\t\n\t\tWhen the game is over,\n\t\t*goto sleep\n\t*if (play) #…do nothing now, but split the winnings with Zeeber later.\n\t\t*gosub zeebercheck\n\t\t*set empathy %+ 10\n\t\t*set level %+ 5\n\t\tYou play a few more hands with these players, and then the winners—including you but not Zeeber—play for a while.  Zeeber remains defiant, despite losing every hand, and refuses to be sent to bed like a kid.  You finally manage to drag her into the hall, explain what happened, and share your winnings.  She wants to confront Vikola, but you convince her it's wiser to just take the money.\n\t\t\n\t\t*goto sleep\n\t*if (play = false) #…do nothing now, but tell Utambu to share the winnings with Zeeber later.\n\t\t*gosub zeebercheck\n\t\t*gosub utambucheck\n\t\t*set empathy %+ 10\n\t\t*set level %+ 5\n\t\tThe players stay in this configuration for a few more hands, and then the winners—including Utambu but not Zeeber—play for a while.  Zeeber remains defiant, despite losing every hand, and refuses to be sent to bed like a kid.  You finally manage to drag her and Utambu into the hall, explain what happened, and prompt Utambu to share his dishonest winnings.  Zeeber wants to confront Vikola, but you and Utambu convince her it's wiser to just take the money.\n\t\t\n\t\t*goto sleep\n\t#…publicly accuse Vikola of cheating.\n\t\t*label accuse\n\t\t*gosub zeebercheck\n\t\t*set infamy %+ 15\n\t\t\"Vikola's cheating.  This pathetic little Zeekie is reporting Zeeber's cards,\" you say, pointing towards Vikola's confederate.\n\t\t\n\t\tSilence falls in the mess hall.\n\t\t\n\t\t\"I didn't…I mean, I'm not…\" stutters the pirate.\n\t\t\n\t\t\"Is this true?\" Ny-bat asks Vikola.\n\t\t\n\t\t\"Stashie's just making trouble,\" Vikola declares.\n\t\t\n\t\t\"Is it true?\" Ny-bat asks Vikola's partner.  \n\t\t\n\t\tYou'd swear the young pirate starts to shake under Ny-bat's stern gaze.\n\t\t\n\t\t\"She told me…I didn't mean…\" he stammers.\n\t\t\n\t\t\"A word,\" says Ny-bat.  As Ny-bat marches Vikola out of the mess hall, even Hammer won't meet her eyes.  \n\t\t\n\t\t*page_break\n\t\tZeeber throws her arms around you, inordinately grateful.  You don't think anyone stands up for her on a regular basis.\n\t\t\n\t\tMany of the pirates compliment your sharp eyes.  You've learned something about the moral code of this new world you are inhabiting: the occasional kidnapping, theft or murder might be a necessary evil—but cheating your own crewmate at cards is almost unforgivable.\n\t\t\n\t\tWhen Ny-bat and Vikola return, Vikola pays Zeeber a small \"compensation.\"\n\t\t\n\t\tBut her true punishment is that no one will let her join a game.  Eventually she stalks out, rigid with fury.\n\t\t\n\t\tWhen the game is over,\n\t\t*goto sleep\n\t#…tell the pirate who is signaling to move.\n\t\t*set persuasiveness %+ 10\n\t\t*if (play)\n\t\t\t\"Sit down, for star's sake.  You're distracting me,\" you say to the signaling pirate.\n\t\t\t*goto whine\n\t\t*else\n\t\t\t\"Sit down, for star's sake.  You're blocking my view,\" you say to the signaling pirate.\n\t\t\t*label whine\n\t\t\t\n\t\t\t\"Am not,\" he says uncertainly, glancing at Vikola.\n\t\t\t\n\t\t\t\"Quit your whining, Stashie,\" Vikola says.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#\"Make me.\"\n\t\t\t\t\t*label sit\n\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t*gosub zeebercheck\n\t\t\t\t\t\"Seal it, you two,\" says Gao from the other table.  \"And you, just sit.  There's a chair right there!\"\n\t\t\t\t\t\n\t\t\t\t\tVikola's confederate sits, looking sheepish.\n\t\t\t\t\t\n\t\t\t\t\tZeeber does a bit better over the next few hands.  She's not really a match for the more experienced players at the table, but at least she scores a few points.\n\t\t\t\t\t\n\t\t\t\t\tYou finally manage to drag her into the hall and explain what happened.  She wants to confront Vikola, but you convince her it's wiser to save that information for when she really needs it.  The crew doesn't look kindly on cheaters.\n\t\t\n\t\t\t\t\t*goto sleep\n\t\t\t\t\t\t\t\t\n\t\t\t\t#\"Quit your sneering, Shipper.\"\n\t\t\t\t\t*goto sit\n\t\t\t\t#\"Vikola is cheating, everyone.\"\n\t\t\t\t\t*goto accuse\n\t\t\t\t#\"I will if he moves.\"\n\t\t\t\t\t*goto sit\n\t\t\t\t#I stand, ready to reply with my fists.\n\t\t\t\t\t*goto sit\n\t\t\t\t#I stand and shove the pirate into a chair.\n\t\t\t\t\t*goto force\t\t\t\n\t#…forcibly remove the pirate who is signaling.\n\t\t*label force\n\t\t*gosub zeebercheck\n\t\tThere's an empty synthochair behind and to the right of Vikola's confederate; he won't be able to see Zeeber's cards from there.  You stand and shove him in the right direction, taking him completely by surprise.  He stumbles and sits, the synthochair cushioning his fall.\n\t\t\n\t\t\"Sit,\" you add, for emphasis.\n\t\t\n\t\tNy-bat rises from ${n_his} chair at the other table, and swiftly crosses to your side.\n\t\t\n\t\t\"There's no brawling allowed.  I'm afraid I have to ask you to leave, and inform the captain of your behavior,\" ${n_he} says.\n\t\t*if (nybat_ally)\n\t\t\t$!{n_he} looks extremely disappointed in you.\n\t\t\t*goto blame\n\t\t*else\n\t\t\t*label blame\n\t\t\t\n\t\t\tThere's no way you are going to take the blame for this!\n\t\t\t*page_break\n\t\t\t*goto accuse\n\n*label sleep\n*if (nybat_rom = 3)\n\tNy-bat catches up with you on the bridge deck.\n\t\t\n\t$!{n_he} takes your hand in\n\t*if (n_he = \"she\")\n\t\thers.\n\t\t*goto room\n\t*else\n\t\this.\n\t\t*label room\n\t\t\"Come to my room instead, if that is what you want.  Though you should know that I will be your advocate with the captain either way, so please don't say yes on that account.\"\n\t\t*choice\n\t\t\t#\"I'll say yes on your account, instead.\"\n\t\t\t\t*set empathy %+ 10\n\t\t\t\t*set nybat_rom 3\n\t\t\t\tNy-bat takes you to ${n_his} room, locks the door, and rests ${n_his} hands on your shoulders.\n\t\t\t\t\t\n\t\t\t\t\"${name}, I'm sorry for any part I have played—\"\n\t\t\t\t\t\n\t\t\t\tYou silence ${n_him}, placing your hand on ${n_his} cheek and brushing ${n_his} lips with your thumb.  $!{n_he} kisses you deeply, and not long enough.\n\t\t\t\t\t\n\t\t\t\t\"You are sure?\" ${n_he} asks again.\n\t\t\t\t\t\n\t\t\t\tYou are.\n\t\t\t\t*page_break Chapter Four: Arrival\n\t\t\t\t*goto_scene beach\t\n\t\t\t#\"I can't be with you until my position here is secure.\"\n\t\t\t\t*label slow\n\t\t\t\t*set nybat_rom 2\n\t\t\t\t\"Then perhaps this will help us wait….\" And Ny-bat kisses you, deeply, and not long enough.\n\t\t\t\t\t\n\t\t\t\tYou try not to think too much about Ny-bat and ${n_his} kiss as you get ready for bed.  You need sleep if you want to be prepared to face tomorrow.  In the morning, you'll arrive at an alien planet!\n\t\t\t\t*page_break Chapter Four: Arrival\n\t\t\t\t*goto_scene beach\t\n\t\t\t#\"I'd like to take this slower.\"\n\t\t\t\t*goto slow\n\t\t\t#\"You've misunderstood me.  I want to be your friend.\"\n\t\t\t\t*set nybat_rom 1\n\t\t\t\t\t\n\t\t\t\t\"Ah,\" says Ny-bat, dropping your hand.  \"Forgive me.\"\n\t\t\t\t\t\n\t\t\t\t$!{n_he} strides away.\n\t\t\t\t\t\n\t\t\t\t*goto bed\n*else\n\t*label bed\n\tYou don't stay up too late, because you want to be prepared to face tomorrow.  In the morning, you'll arrive at an alien planet!\n\t*page_break Chapter Four: Arrival\n\t*goto_scene beach\t\n\t\t\t\n*comment SUBROUTINES\n\n*label so_check\n*if (so = \"none\")\n\t*return\n*else\n\tYou think of your ${so}; it seems like years since you've seen ${n_him}.\n\t*return\n\n\n*label zeebercheck\n*if (zeeber_ally)\n\t*return\n*else\n\t*set zeeber_ally true\n\t*Set allies + 1\n\t*return\n*label nybatcheck\n*if (nybat_ally)\n\t*return\n*else\n\t*set nybat_ally true\n\t*set allies + 1\n\t*return\n*label gaocheck\n*if (gao_ally)\n\t*return\n*else\n\t*set gao_ally true\n\t*set allies + 1\n\t*return\n*label utambucheck\n*if (utambu_ally)\n\t*return\n*else\n\t*set utambu_ally true\n\t*set allies + 1\n\t*return\n\t", "captain": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*comment ñáéç…—\n*temp krantic false\nThe captain's office is beyond luxurious: It has an enormous window, a rotation's salary worth of vermite used just for decoration.  A person could stand at that window and feel the thrill of space itself, dangerous and beautiful.  Stashies and Shippers curse with the word \"space,\" and swear oaths with it; it's their enemy, and their home.\n\nZoa herself is reclining in a multi-use chair, her face hidden under layers of hovering visuals.  She is making you wait.  It's an obvious display of power; you see it for the deliberate manipulation it is.  And yet, it works, despite your awareness of the ploy.  Standing here with foamed hands, surrounded by your kidnappers, unable to stretch your fingers or take a step without your elbows being seized, you can't help but remember that you are trapped on this ship, far from help and home.  Your very survival depends on the goodwill of the woman in charge.\n*page_break\nFinally the floating images flicker out, and you can examine Zoa as her chair rises to an upright position.  She is sixty or so, firm, fit, and straight-backed, every muscle primed for action.  She has a stage presence, this pirate captain; she radiates coiled energy.  If she wasn't an outlaw already, you'd recommend a career in hover movies.\n\nZoa's own gaze is steely, and missing some spark of humanity you usually recognize in any new acquaintance.  You wonder about her history.\n\n*gosub gaohurt\n*choice\n\t#\"Did you send Krantic to torture me?\"\n\t\t*set krantic true\n\t\t\"Krantic has been forbidden to touch you,\" says the captain.  \"He needs a reminder, sometimes, that certain proclivities are not always appropriate.\"\n\t\t\n\t\t\"I suppose I should thank you for that,\" you say.\n\t\t\n\t\t*goto nothing\n\t*if (mission_info) #\"Risky plan, stealing vermite from the Medusi.\"\n\t\t*set infamy %+ 5\n\t\t\"So, you have deduced our destination,\" she says acidly.  \"Yet your understanding of our methods is crude.  We intend to buy vermite, if the Medusi are willing to sell.  We cultivate good relations with our suppliers whenever possible.  A willing supplier is a steady supplier.\"\n\t\t\n\t\t\"And if the Medusi aren't willing?\" you ask.\n\t\t\t\t\n\t\t\"Then one shipment is better than none.  My lieutenant, Krantic, specializes in those situations.  He produces excellent results, which is why we put up with his…quirks.\"\n\t\t\t\t\n\t\tYou reply:\n\t\t*choice\n\t\t\t#\"It sounds like you could use more muscle.\"\n\t\t\t\t*set strength %+ 10\n\t\t\t\t\"We\n\t\t\t\t*goto info_offer\n\t\t\t#\"You need people who can think on their feet.\"\n\t\t\t\t*set level %+ 10\n\t\t\t\t\"We\n\t\t\t\t*goto info_offer\n\t\t\t#\"What about the Inter-Human Police?\"\n\t\t\t\t\"How could a load of vermite possibly be worth the risk?  The IHP's punishments for interspecies treaty-breakers are harsher than…\"\n\t\t\t\t\n\t\t\t\t\"They'd have to find us first.  Space is vast,\" says Zoa.\n\t\t\t\t\t\t\t\n\t\t\t\t\"I suppose I could take the risk, if you made it worth my while,\" you say.\n\t\t\t\t\n\t\t\t\t\"We\n\t\t\t\t*goto info_offer\n\t\t\t#\"I want no part of it, deal or steal.  I want to go home.\"\n\t\t\t\t*goto dog\n\t#\"I'd make a better crew member than a prisoner.\"\n\t\t*goto offer_or_not\n\t#\"I'm ready to bargain for my return to Dekara Station.\"\n\t\t\"Bargain?  And what do you think you can offer?\" Zoa asks icily.\n\t\t\t\n\t\tYou strive for calm as you consider your answer.  You are not exactly in the best bargaining position at the moment.\n\t\t*choice\n\t\t\t*if (hacking > 65) #\"My technical expertise, for the duration of this mission.\"\n\t\t\t\t*goto offer_or_not\n\t\t\t*if (strength > 65) #\"My combat skills, for the duration of this mission.\"\n\t\t\t\t*goto offer_or_not\t\t\t\n\t\t\t*if (persuasiveness > 65) #\"My knack for negotiation, for the duration of this mission.\"\n\t\t\t\t*goto offer_or_not\n\t\t\t*if (level > 65) #\"My sharp mind, for the duration of this mission.\"\n\t\t\t\t*goto offer_or_not\n\t\t\t#\"My help with your current mission.\"\n\t\t\t\t*goto offer_or_not\n\t\t\t#\"All my savings, when we return to my station.\"\n\t\t\t\t\"You have no station.  You will never return.  So you offer nothing.\"  Zoa slices the air with an empty hand.  \"I can give you your life, as long as you are no threat to the Reckless.\"\n\n\t\t\t\t*goto dog\n\t\t\t*if (stationrep = true) #\"A ransom, paid by my friends and family on the station.\"\n\t\t\t\t\"A ransom, tagged and tracked by the IHP?  You offer our ruin.\"  Zoa slices the air with an empty hand.  \"I can give you your life, as long as you are no threat to the Reckless.\"\n\n\t\t\t\t*goto dog\n\t\t\t*if (stationrep = false) #\"A new market for sensitive cargo.\"\n\t\t\t\t\"I'll introduce you to my contacts on Dekara Station,\" you offer.\n\t\t\t\t\n\t\t\t\t\"An interesting proposition.  You would be required to act as intermediary, a position of considerable trust.  Can I trust you, Stashie?\"\n\n\t\t\t\t\"Let me crew for a few weeks, and you'll find out,\" you answer.\n\t\t\t\n\t\t\t\t*goto offer_or_not\n\t*if (sabotage != \"none\") #\"Having trouble with the ship's systems?\"\n\t\t\"Yes, we noticed your interference with the ${sabotage}.  It wasn't particularly amusing,\" Zoa says.\n\t\t\n\t\t\"If I could do that in only a few minutes, imagine the improvements I could make if you hired me on,\" you say.\n\n\t\t*goto offer_or_not\n\t#\"I have skills you need.  Make me an offer.\"\n\t\t*goto offer_or_not\n\t\t\t\t\t\n\t#Nothing.  I'll let Zoa direct the conversation.\n\t\t*label nothing\n\t\t\"I brought you here for a reason,\" Zoa says.  \"Do you know what that was?\"\n\t\t\t\t\n\t\t\"You're recruiting,\" you say.\n\t\t\n\t\t\"Exactly.  I thought you might be useful.  What do you have to offer, Stashie?\"\"\n\t\t\t\t\n\t\t*choice\n\t\t\t*if (hacking > 65) #\"My technical expertise.\"\n\t\t\t\t*goto offer_or_not\n\t\t\t*if (strength > 65) #\"My combat skills.\"\n\t\t\t\t*goto offer_or_not\t\t\t\n\t\t\t*if (persuasiveness > 65) #\"My knack for negotiation.\"\n\t\t\t\t*goto offer_or_not\n\t\t\t*if (level > 65) #\"My sharp mind.\"\n\t\t\t\t*goto offer_or_not\n\t\t\t#\"My help with your current mission.\"\n\t\t\t\t*goto offer_or_not\n\t\t\t#\"All my savings, if you return me to my station.\"\n\t\t\t\t\"You have no station.  You will never return.  So you offer nothing.\"  Zoa slices the air with an empty hand.  \"I can give you your life, as long as you are no threat to the Reckless.\"\n\n\t\t\t\t*goto dog\n\t\t\t*if (stationrep = true) #\"A ransom, paid by my friends and family, if you return me to the station.\"\n\t\t\t\t\"A ransom, tagged and tracked by the IHP?  You offer our ruin.\"  Zoa slices the air with an empty hand.  \"I can give you your life, as long as you are no threat to the Reckless.\"\n\n\t\t\t\t*goto dog\n\t\t\t*if (stationrep = false) #\"An introduction to my contacts on Dekara station—a new market for sensitive cargo.\"\n\t\t\t\t\"An interesting proposition.  You would be required to act as intermediary, a position of considerable trust.  Can I trust you, Stashie?\"\n\n\t\t\t\t\"Let me crew for a few weeks, and you'll find out,\" you answer.\n\t\t\t\t*goto offer_or_not\n\t\t\t\t\n*label offer_or_not\n\n\"Do you know where we are bound?\" Zoa asks.\n\n\"To steal vermite,\" you say, having figured out that much.\n\n\"Your understanding of our methods is crude,\" she says.  \"Pampered, brain-deficient Groundsiders wrote the Human-Medusi treaty, not Shippers who actually engage in trade.  They granted the Medusi's government-owned trading consortium a monopoly that benefits no one.  We intend to buy vermite directly from the Medusi, if the Medusi are at all willing to sell.  We cultivate good relations with our suppliers whenever possible.  A willing supplier is a steady supplier.\"\n*page_break\n\"And if the Medusi aren't willing?\" you ask.\n\t\t\n\"Then one shipment is better than none.  My lieutenant, Krantic, specializes in those situations.  He produces excellent results, which is why we put up with his…quirks.  He has been ordered not to touch you, so you needn't worry about that anymore.  We\n*label info_offer\nare somewhat short-staffed for this mission….\"\n\n\"Which is why you want me,\" you say.\n\t\t\t\n*if (infamy >= 25)\n\t*goto offer\n*else\n\t*label too_good\n\t*page_break\n\t\"You think an upstanding citizen like yourself could make a home on this ship?  I think not.\"  Zoa's voice is like the ring of metal on metal, musical and utterly cold.\n\t\t\n\tYou feel you have not made a good impression so far.\t\n\t*label dog\n\t\n\t\"I am not ready to trust you yet.  But let me make your position clear.\"  Zoa crosses the room and stops mere centimeters away, crowding you back against your captors.  \"There is no going home, do you understand?  Either you cast your lot with us, or we let space have you.\"  She looks out her stunning window, and you realize with a simple command to the vermite, she could send you to your death right here.\n\t\t\n\t\"For now, we'll give you some time to think.  Since you will not remain in your cell, we'll have to put you somewhere more central.\"  She turns to the crew members gathered by the door.  \"Chain the Stashie under the mess hall table.  Like a dog.\"\n\t\t\n\tYou watch the crew's reactions. Ny-bat and Utambu seem uncomfortable, Hammer shows no emotion whatsoever, and Vikola smiles.\n\t\t\n\tOf course, they all hurry to grab your arms and obey.\n\t*if (message)\n\t\t\t\t\n\t\tStars be thanked you sent that message—it may be your only hope!\n\t\t*page_break\n\t\t*gosub lurch\n\t\t*page_break Chapter Three: Reckless Living\n\t\t*goto_scene chained\n\t*else\n\t\t*page_break\n\t\t*gosub lurch\n\t\t*page_break Chapter Three: Reckless Living\n\t\t*goto_scene chained\n\n*label offer\n\"Direct,\" says Zoa.  \"I like that.  It's true that we are short-handed.  Also true that you have accomplishments.  But loyalty is more important than skills on a ship like this.  Do you understand loyalty, Stashie?\"\n\nYou know that you must answer carefully.  Whether you truly want to join the pirates, or you simply want to pretend to give them your allegiance, you know Zoa's trust is essential to your survival.  You respond:\n*choice\n\t#\"Loyalty is caring for your shipmates.\"\n\t\t*set empathy %+ 5\n\t\t*if (sabotage != \"none\")\n\t\t\t*gosub hacked\n\t\t\t*goto feelings\n\t\t*else\n\t\t\t*label feelings\n\t\t\t\"I ask about loyalty and you give me feelings.  Feelings are not to be trusted.  They are irrational.\"\n\t\t\t*label Zoa_loyalty\n\t\t\t\t\t\n\t\t\tZoa stalks to the window and back, like a caged betabeast you saw once at the circus.  \"Loyalty is acting for the good of the ship, because that is for your own good, too.  Loyalty is knowing you will live and prosper with the Reckless, or rot in prison, alone.  Loyalty is knowing the Reckless runs best with me at the head, because I prove it every day, with every mission.\"\n\t\t\t\t\t\t\n\t\t\tZoa certainly paints a flattering picture of the pirate life.  According to her sales pitch, she rules by reason, expects her crew to think for themselves, and practically gives them her blessing to mutiny if she ceases to be a superior captain.  You can't tell if that's the truth, though.  Zoa may be rational and fair, but she's also dangerous—you feel that deep down, in the instinctual part of you that recognizes a predator when it sees one.\n\t\t\t\n\t\t\t\"Quarter of a percent,\" Zoa says suddenly, startling you out of your reverie.  She has a voice like metal on metal, musical and cold.\n\t\t\t\t\t\t\n\t\t\tYou respond:\n\t\t\t*choice\n\t\t\t\t#\"Agreed.\"\n\t\t\t\t\t*set infamy %- 10\n\t\t\t\t\t\"Too cowed to haggle?  Or not expecting to be with us on payday?\" Zoa's eyes narrow suspiciously. \n\t\t\t\t\t*label onwards\n\t\t\t\t\t\"If you're wise, Stashie, you'll work to earn my trust.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tIt is a dismissal; Zoa turns away as if you are no longer there.  She climbs gracefully into her chair, and calls up a handful of hovers.  You glance around at your captors, but they are clearly still waiting for some further sign.  A tense, silent moment passes, before Zoa bothers to say, \"Assign ${name} a room, Utambu.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tYour shoulders slump with relief, and you realize you've been clenching them tightly enough to make the muscles ache.  Ny-bat sprays your foam-covered fists, flashing you a quick half-smile.  You begin to peel the softening goo from your hands, hating the slimy texture.  Hopefully, your new room will have a sink.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*gosub lurch\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto room\n\t\t\t\t#\"Half.\"\n\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t*label third\n\t\t\t\t\t\"A third,\" Zoa says.  She puts her face mere centimeters from yours.  You squirm uncomfortably, but she remains as impassive as a block of marble.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*goto onwards\n\t\t\t\t#\"Three quarters.\"\n\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t*goto third\n\t\t\t\t#\"One percent.\"\n\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t\"Are you attempting to anger me?\" Zoa asks.  She puts her face mere centimeters from yours.  You squirm uncomfortably, but she remains as impassive as a block of marble.  \"You will take the quarter, until you prove that you deserve more.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*goto onwards\n\t#\"Loyalty is doing right by those who trust you.\"\n\t\t*set empathy %+ 5\n\t\t*if (sabotage != \"none\")\n\t\t\t*gosub hacked\n\t\t\t*goto right\n\t\t*else\n\t\t\t*label right\n\t\t\t\"I ask about loyalty and you give me morality.  What is right?  Right is an emotional label.  Emotions are irrational.\"\n\t\t\t*goto Zoa_loyalty\n\t#\"Loyalty is knowing who is the boss.  You.\"\n\t\t*set level %+ 5\n\t\t*set persuasiveness %+ 5\n\t\t\"Yes,\" Zoa answers.  \"But I prefer reasoned loyalty to blind.  Any Sandovali slave may know who his master is.  That does not make him loyal.\"  She gives you a smile with no warmth behind it.\n\t\t*if (sabotage != \"none\")\t\t\t\n\n\t\t\t*gosub hacked\n\t\t\t*goto Zoa_loyalty\n\t\t*else\n\t\t\t*goto Zoa_loyalty\n\t#\"Loyalty is realizing I'm better off on the Reckless.\"\n\t\t*set level %+ 5\n\t\t*set infamy %+ 5\n\t\t*set persuasiveness %+ 5\n\t\t\"Yes,\" Zoa answers.  \"That is an excellent start.  You do show signs of suitability.\"\n\t\t*if (sabotage != \"none\")\n\t\t\t\t\n\t\t\t*gosub hacked\n\t\t\t*goto Zoa_loyalty\n\t\t*else\n\t\t\t*goto Zoa_loyalty\n\n*label hacked\n\"Your words would carry more weight if you had not \n*if (sabotage = \"doors\")\n\tmade the doors as jumpy as cats in zero-G,\" says Zoa.\n\t*goto fix\n*elseif (sabotage = \"freezer\")\n\tmelted all the ice cream and compromised our meat rations,\" says Zoa.\n\t*goto fix\n*else\n\tblasted 'pirates eat vat-grown jooslugs' throughout the ship,\" says Zoa.\n\t*goto fix\n\n*label fix\n\n\"I can fix that,\" you assure her.\n\n\"No need.  Utambu will erase your modifications.\"\n*return\n\n*label room\n*set crew true\n*achieve crewmember\nUtambu chatters amiably as he leads you through the ship.  He's relentlessly cheerful, brimming with nervous smiles. You learn that he is the foremost tech specialist on the Reckless, that he started out at a quarter of a percent five rotations ago.  He's also a Shipper, born and bred among the stars. You know better than to judge people on their origin, but that doesn't stop the childhood rhyme from running through your head: Groundsiders hazy, Stashies lazy, Shippers crazy.\n*if (kids)\n\tYou remember your kids chanting it while bouncing around a z-ball.  You hope you've made the right choice by joining the crew, and that you'll be reunited with them once you've earned Zoa's complete trust.\n\t*goto chatter\n*else\n\t*goto chatter\n\t\n*label chatter\n\"There's only a few real rough ones in the crew,\" Utambu tells you.  \"Vikola, Hammer, Krantic.  The captain doesn't let things get too out of hand.  Just try to stay out of Krantic's way.\"\n\n\"How many on the Reckless?\" you ask.\n\n\"Twenty-one.  No, twenty-two now, with you,\" Utambu answers.  \"I'll take you to the mess next.\"\n\nYou arrive at your room, a little gray box with a bed, an easy chair, a toilet, and yes, a sink.  There's no window or shower, but you've traveled on enough cramped ships to know that a private room with dedicated facilities is something to be thankful for.  Your own room, back on the station, had wall-to-wall hover projectors and ivy on the ceiling for carbon exchange.\n*gosub so_bit\nBut it's no use thinking of that now.\n\nUtambu insists that you enter first, as if he's afraid to put his back to you.  Is he right?  Are you just pretending to be on his side?\n*choice\n\t#I'm a pirate now, through and through.\n\t\t*set infamy %+ 10\n\t\t*goto hungry\n\t#I'm keeping an open mind.\n\t\t*set level %+ 5\n\t\t*set persuasiveness %+ 5\n\t\t*goto hungry\n\t#My only loyalty is to myself.\n\t\t*set empathy %- 10\n\t\t*goto hungry\n\t*if (kids = false) #I'm waiting for a chance to escape and go home.\n\t\t*set persuasiveness %+ 5\n\t\t*set empathy %+ 10\n\t\t*goto hungry\n\t*if (kids = true) #I'm doing whatever it takes to get back to my kids.\n\t\t*set empathy %+ 10\n\t\t*goto hungry\n\t\t\n*label hungry\n\"Hungry?\" asks Utambu, who is still hovering by the door.  \"I'll take you to the mess.\"\n\n*page_break Chapter Three: Reckless Living\n*goto_scene hazing\n\n*label lurch\nSuddenly, the ship lurches beneath your feet.  You stagger before regaining your balance, along with everyone else.\n\n\"Space!\" Vikola swears.\n\n\"Is it Spider?\" Utambu asks apprehensively.\n\nZoa is consulting the hovering displays above her chair.  \"No, it's that ground-loving Mushroom in the system again.  It turned off automatic navigation correction, and we hit some debris.  Utambu, get over here before we vent all our atmosphere!\"\n\nUtambu rushes over to the floating visuals and starts punching holographic buttons.  \"I'm withdrawing the vermite from around the cargo hold; there's nothing in there that needs atmosphere.  That will free up enough to plug the holes 'til we're on the ground.\"\n\n\"The Mushroom is our Medusa prisoner,\" Ny-bat tells\n*if (mushroom)\n\tyou, not realizing that you have already met the alien.\n\t*goto infodump\n*else\n\tyou.  \n\t*label infodump\n\t\"Its language is electrical, and it can communicate directly with machines.  It gave us the location of the vermite-producing planet, but Krantic questioned it in a regrettably rough manner.  It's rather hostile and unstable now, and we're having trouble keeping it out of the ship's systems.\"\n\n\tYou suggest…\n\t*choice\n\t\t#…lining its cell with non-conductive material.\n\t\t\t*set infamy %+ 5\n\t\t\t*set hacking %+ 5\n\t\t\t\"We considered that,\" says Ny-bat.  \"We have limited resources aboard, and we haven't come up with anything The Mushroom won't simply dismantle.\"\n\t\t\t\n\t\t\t*goto spider\n\t\t#…keeping it unconscious.\n\t\t\t*set infamy %+ 5\n\t\t\t*set level %+ 5\n\t\t\t\"We considered that,\" says Ny-bat.  \"Unfortunately, humans have had so little contact with Medusi, our medibed software doesn't know anything about their physiology.  We don't know how to sedate it safely.\"\n\t\t\t\n\t\t\t*goto spider\n\t\t#…killing it, since it has served its purpose.\n\t\t\t*set infamy %+ 5\n\t\t\t*set empathy %- 15\n\t\t\t*set level %- 5\n\t\t\t*set nybat_ally false\n\t\t\tAn expression of distaste flickers across Ny-bat's face, but ${n_he} quickly schools ${n_his} expression.\n\t\t\t\n\t\t\t\"It may be useful yet,\" ${n_he} tells you.  \"It could give us something to bargain with besides money as we negotiate with the Medusi for vermite.\"\n\t\t\t\n\t\t\t*goto spider\t\t\n\t\t#…treating its wounds.\n\t\t\t*set empathy %+ 10\n\t\t\t*set nybat_ally true\n\t\t\tNy-bat looks at you with approval.  \"I agree that some kindness may be the best way to achieve a detente,\" says Ny-bat.  \"And, of course, it's more humane as well.  It's the captain's decision, though; I intend to speak with her when she's not handling a crisis.\"\n\t\t\t\n\t\t\t*label spider\n\t\t\t\"What's this 'spider' Utambu's afraid of?\" you ask.\n\t\t\t\n\t\t\t\"It's what we call the Medusi trading conglomerate, the only ones legally allowed to sell Medusi products to other species,\" Ny-bat explains.\n\t\t\t\n\t\t\t\"Atmosphere stable, for the moment,\" the captain says from over by the command chair.  Turning around, she notes your continued presence with a slight frown.\n\t\t\t\n\t\t\t\"Get the Stashie out of here,\" she says.\n\t\t\t*return\n\n*label gaohurt\n*if (gao_hurt)\n\t\"You injured one of my officers,\" she says.  \"You're lucky the damage was easily fixed by the medibed, or I might have been upset.\"\n\t\n\tYou refuse to apologize for resisting captivity.  Instead, you say:\n\t*return\n*else\t\n\tOf course, asking the captain about her past would not be wise.  Instead, you say:\n\t*return\n*label so_bit\n*if (so = \"none\")\n\t*return\n*else\n\tAnd it has your {so}, who does
