n't even know if you are dead or alive.\n\t*return", "capture": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*temp injured\n*set injured false\nSuddenly, the door to the cargo hold flies open.\n*if (sabotage = \"doors\")\n\tThen it crashes down, then up, then down, and up and down again.  Whenever it is up, you can hear the curses of the pirates on the other side.  You know you are about to be recaptured, but you laugh anyway.\n\t\n\tOne of the crew manages to stick a boot under the closing hatch, engaging the safety mechanism and allowing the door to fully open.\n\t\t\n\t*goto enter\n*else\n\t*goto enter\n*label enter\nFour crew members enter: a small, dark-skinned man with grease on his coveralls; a long-haired woman with a permanent sneer; an extremely tall ${nybat_gender} with the stretched look of those raised in low-G; and an older man with massive clenched fists.  You recognize the sneering woman and the older man from the bar.  None of them are carrying weapons, but then again, neither are you.  Who shoots a weapon shipside, except in a shielded arena?\n\t\n\"Get down here, Stashie,\" says the older man.\n*gosub gaohurt\n\n\"Let us be reasonable, ${name}.  There is no escape,\" says the one with Low-G Syndrome, in an unexpectedly deep voice.  \"My name is Ny-bat, and I guarantee you won't be harmed if you come with us peaceably.  My companions are Utambu, Vikola, and Hammer, and they also are ordered to use violence only if necessary.\"\n\nNy-bat begins to climb the lattice.\n\nThere's only one exit, so you'd gain nothing by climbing higher—nothing except a more vicious beating.  That doesn't mean you have to make things easy for them, though.  You could…\n*choice\n\t#…fight the pirates on the ground level.\n\t\t*set empathy %- 10\n\t\tA good fight certainly won't hurt your reputation. You've been itching to bloody a few of your kidnappers, and now seems like the perfect time.  It will be worth the beating to show them what kind of person they're dealing with, and earn some respect.\n\n\t\tYou climb down to the base of the cylindrical cargo hold and face your opponents.  Three crew members spread out in a rough semi-circle, waiting for you to attack.  The older man smiles slightly, and pounds one fist into the opposite hand.  The dark-skinned one shuffles his feet nervously.  The sneering woman beckons you towards her with a look of contempt.\n\t\t\t\t\n\t\t\"I don't even know who to cheer for,\" says Zeeber.  The crew members shout contradictory orders at her, most of which begin with the words 'seal it.'\n\t\t\n\t\tShe ignores them all, and wisely stays tucked among the cargo, out of the fray.\n\t\t\n\t\tYou decide to rush…\n\t\t*choice\n\t\t\t#…Hammer, the older man, the strongest fighter.\n\t\t\t\tYou want to grapple with the best, so you propel yourself towards the massive, gray-haired pirate.\n\t\t\t\t*if (needle)\n\t\t\t\t\tIn one hand you hold the needle you took from the medibed.  The other hand you clench into a fist.\n\t\t\t\t\t\n\t\t\t\t\t*goto older_attack \n\t\t\t\t*elseif (strength >= 75)\n\t\t\t\t\t*label older_attack\n\t\t\t\t\t*set infamy %+ 20\n\t\t\t\t\t*set injured true\n\t\t\t\t\tYou keep your fist level with his face until he raises his hands to protect himself, and then drive your other hand under the block, right into his stomach.  He folds like a flexiscreen.  You add a swift cut on the top of his shoulder, forcing him down to his knees.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\tWhile your attention is on him,\n\t\t\t\t\t*gosub rib\n\t\t\t\t\tOf course, that's nothing you haven't experienced before.\n\t\t\t\t\t*page_break\t\t\t\n\t\t\t\t\tThe grease-stained man has come up behind you, and is trying to grab your right hand and pin it.  You elbow him right in the face—it's good to be as tall as you are—and hear him cry out as something gives.  Your elbow is damp with blood.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tVikola is more difficult to take care of; you can't seem to land a blow.  The older man stands again, recovered, and you know your moment of glory is about to end.  You have one more move to play: you break free for a moment, dashing across the narrow space, forcing the low-G Syndrome—Ny-bat—to jump down and block you.\n\t\t\t\t\t\n\t\t\t\t\tNow you can say it took four of them to bring you down.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*gosub trussed\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto caught\n\t\t\t\t*else\n\t\t\t\t\t*set infamy %- 10\n\t\t\t\t\tHe catches your fist in the air, and lands a blow to your stomach.  Perhaps this wasn't such a good idea.  \n\t\t\t\t\t\n\t\t\t\t\t*label give_in\n\t\t\t\t\tAs you struggle to defend yourself from someone clearly much stronger than you, \n\t\t\t\t\t*gosub rib\n\t\t\t\t\t*page_break\n\t\t\t\t\tStill, there's no point in accumulating more injuries.  You tried and failed.  There's nothing you can do to salvage your reputation right now.\n\t\t\t\t\t*gosub trussed\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto caught\n\t\t\t#…Utambu, the dark-skinned man, the easiest target.\n\t\t\t\tYou propel yourself towards the slight man with the grease-stained clothes—he looks more like an engineer than a fighter.\n\t\t\t\t*if (needle)\n\t\t\t\t\tIn one hand you hold the needle you took from the medibed.  The other hand you clench into a fist.\n\n\t\t\t\t\t*goto utambu_attack\n\t\t\t\t*elseif (strength >= 50)\n\t\t\t\t\t*label utambu_attack\n\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\tYou keep your fist level with his face until he raises his hands to protect himself, and then drive your other hand under the block, right into his stomach.  He folds like a flexiscreen.  You add a swift cut on the top of his shoulder, forcing him down to his knees.  He topples over, clutching his stomach, out of the fight.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tYou whirl to catch a huge fist just centimeters from your face.  The muscular, grey-haired man has joined the fight, and even though you blocked his punch, the sheer force of the blow makes you stumble backwards.\n\t\t\t\t\t*goto give_in\n\t\t\t\t*else\n\t\t\t\t\t*set injured true\n\t\t\t\t\t*set infamy %-15\n\t\t\t\t\tHe catches your fist in the air, and lands a blow to your stomach.  Perhaps this wasn't such a good idea—you're not much of a fighter.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tAs you clutch your stomach, groaning, \n\t\t\t\t\t*gosub rib\n\t\t\t\t\t*page_break\n\t\t\t\t\tBefore you can get your bearings, you feel a massive blow to the side of your head, and everything becomes grey and swirly.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tWhen you can see again, you are lying on the floor, with your hands trapped in self-seal foam.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto caught\n\t\t\t#…Vikola, the contemptuous-looking woman.  I really don't like her attitude.\n\t\t\t\t*set injured true\n\t\t\t\tYou propel yourself towards the woman with the sneering expression.\n\t\t\t\t*if (needle)\n\t\t\t\t\tIn one hand you hold the needle you took from the medibed.  The other hand you clench into a fist.\n\n\t\t\t\t\t*goto woman_attack\n\t\t\t\t*elseif (strength >= 65)\n\t\t\t\t\t*label woman_attack\n\t\t\t\t\t*set infamy %+ 17\n\t\t\t\t\tYou keep your fist level with her face until she raises her hands to protect herself, and then drive your other hand under the block, right into her stomach.  She folds like a flexiscreen.  You add a swift cut on the top of her shoulder, forcing her down to her knees.\n\t\t\t\t\t\n\t\t\t\t\tWhile your attention is on her, the grey-haired man lands a sharply painful blow to your left side.  The force of the blow makes you stagger to the side, and you narrowly avoid another smashing blow to the face.  It hurts when you breathe in.  You think he has cracked one of your ribs.\n\t\t\t\t\t*set injured true\n\t\t\t\t\t*page_break\t\t\t\t\n\t\t\t\t\tYou stumble out of his range, but the woman is rising to her feet again.  Also, the dark-skinned man has come up behind you, and is trying to grab your right arm.  You elbow him right in the face—it's good to be as tall as you are—and hear him cry out as something gives.  Your elbow is damp with blood.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tStill, you know when you're beaten.\n\t\t\t\t\t*gosub trussed\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto caught\n\t\t\t\t*else\n\t\t\t\t\t*set infamy %- 10\n\t\t\t\t\tShe catches your fist in the air, and lands a blow to your stomach.  Perhaps this wasn't such a good idea.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tWhile your attention is on her, the grey-haired man lands a sharply painful blow to your left side.  The force of the blow makes you stagger to the side, and you narrowly avoid another smashing blow to the face.  It hurts when you breathe in—you think he has cracked one of your ribs.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*gosub trussed\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto caught\t\n\t#…talk tough.  I demand to be taken to the captain.\n\t\t*set persuasiveness %+ 10\n\t\t\"I want to talk to the captain,\" you say.  You're rather pleased with the way your voice carries.\n\t\t\t\t\n\t\tVikola, the sneering woman, snorts.  \"Why should Zoa waste time on a worthless Stashie?\"\n\t\t\t\t\n\t\t\"Why should you make your lives more difficult?\" you reply.  \"We can do this the easy way or the . . .\" \n\t\t\t\t\n\t\tYou don't get to finish.  \"Isn't that our line?\" interrupts Ny-bat.  $!{n_he} has reached the platform you are standing on, and is making ${n_his} way around the circular balcony, towards you.\n\t\t\n\t\t\"She'll want to talk to me,\" you assert, working a bit harder for that note of absolute confidence.\n\t\t*choice\n\t\t\t*if (sabotage = \"doors\") #\"She wants the doors to start working again, doesn't she?\"\n\t\t\t\t*label meet_utambu\n\t\t\t\tUtambu steps forward, wiping his hands on his grease-stained coveralls.  \"There's nothing you could do to this ship I can't undo in five minutes.  I just haven't had time,\" he says.  It's his calmly confident tone, rather than his boast, that convinces you.  You suppose you've met their tech-wizard, software and hardware, by the looks of his clothes.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\"I only had a few minutes myself,\" you point out.\n\t\t\t\t\n\t\t\t\t\"I know.\"  Utambu grins.  \"Possibly looking forward to working with you, if you survive.\"\t\t\t\t\t\t\t\t\n\t\t\t\t*label nybat\n\t\t\t\t\n\t\t\t\tNy-bat has made ${n_his} way around the ring.  $!{n_he} stands a few decameters away from you, tall and willowy, like an artist's creative approximation of a human being.  \"The captain will see you if you submit to restraints,\" ${n_he} says, showing you a canister of self-seal foam.  \"That is her condition.\"\n\n\t\t\t\tYou…\n\t\t\t\t*choice\n\t\t\t\t\t#…agree to the foam.\t\t\n\t\t\t\t\t\t\"We will take you directly to the captain,\" Ny-bat reassures you.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label foam\n\t\t\t\t\t\tYou reluctantly hold out your hands, relaxing your fingers into a comfortable position.  Ny-bat sprays the foam from the canister, and the gluey mass quickly dries around your hands, immobilizing them.  $!{n_he} turns off the gravity with a voice command, and tows you down to the bottom.\n\t\t\t\t\t\t*goto caught\n\t\t\t\t\t#…fight Ny-bat here at the edge of the platform.\n\t\t\t\t\t\t*gosub nybat_fight\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto foam\n\t\t\t\t\t#…climb down and surrender to one of the other pirates—a gesture of defiance.\n\t\t\t\t\t\t*label alt_foam\n\t\t\t\t\t\tComplete capitulation is not in your repertoire, so you scramble down to the bottom and hold your hands out to…\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#…Hammer, the burly, older man.\n\t\t\t\t\t\t\t\tHammer grunts, grips you painfully by the upper arm, and takes a canister of foam from his belt.  You try to relax your fingers into a comfortable position as he sprays.  The gluey mass quickly dries around your hands, immobilizing them.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto caught\n\t\t\t\t\t\t\t#…Vikola, the woman with a permanent sneer.\n\t\t\t\t\t\t\t\t\"Spacing Stashie,\" Vikola swears, apparently taking your choice as some sort of insult.  She retrieves a canister of foam from her belt.  \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou try to relax your fingers into a comfortable position as she sprays.  The gluey mass quickly dries around your hands, immobilizing them.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto caught\n\t\t\t\t\t\t\t#…Utambu, the man dressed in engineering coveralls.\n\t\t\t\t\t\t\t\t\"Me?  Wow,\" Utambu says, apparently taking your choice as a compliment.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Try to, uh, relax your fingers, and it will be more comfortable,\" he tells you as he takes a canister of foam from his belt.  You try to follow his advice as he sprays you with white foam.  The gluey mass quickly dries around your hands, immobilizing them.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*set utambu_ally true\n\t\t\t\t\t\t\t\t*goto caught\n\t\t\t*if (sabotage = \"freezer\") #\"She doesn't want the frozen stores to spoil, does she?\"\n\t\t\t\t*goto meet_utambu\n\t\t\t*if (sabotage = \"intercom\") #She doesn't want the intercom keeping everyone awake, does she?\"\n\t\t\t\t*goto meet_utambu\n\t\t\t*if (message) #\"I've already told the authorities everything.\"\n\t\t\t\t*set infamy %- 5\n\t\t\t\tThe crew members erupt in a cacophony of curses.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\"Are you insane?\" Zeeber asks you.  \"Krantic will kill you!\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\"The IHP won't be able to find us, will they?\" Utambu asks anxiously.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\"No chance,\" says Vikola.\n\t\t\t\t*goto nybat\n\t\t\t*if (mushroom) #\"I know I could be useful on the Medusi planet.\"\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t\"How in space do you know about that?\" shouts Vikola.\n\t\t\t\t\t\t\t\n\t\t\t\t\"Captain won't be happy,\" says Utambu nervously.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\"It wasn't my fault!\" Zeeber calls down.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\"I am sure you will not be blamed,\" says Ny-bat.\n\t\t\t\t*goto nybat\n\t\t\t*if (mushroom) #\"The Mushroom thinks I'm a 'fellow-prisoner.'  I'm sure I could get more information out of it.\"\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t*set infamy %+10\n\t\t\t\t*if (mushroom_ally = false)\n\t\t\t\t\tOf course, The Mushroom is insane and seems to hate you, but that doesn't stop you from bluffing.\n\t\t\t\t\t \n\t\t\t\t\t*goto bluff\n\t\t\t\t*else\n\t\t\t\t\t*label bluff\n\t\t\t\t\t\"How in space did you get The Mushroom to talk to you?\" shouts Vikola.\n\t\t\t\t\t\n\t\t\t\t\t\"The captain might be interested in discussing that,\" says Ny-bat.\n\t\t\t\t\t*goto nybat\n\t\t\t#\"I'm ready to join the crew.  That's what she wants, isn't it?\"\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t*set infamy %+10\n\t\t\t\t\"How would you know what the captain wants?\" snaps Vikola.\n\t\t\t\t\t\t\t\t\n\t\t\t\t*label utambu_speaks\n\t\t\t\t\"She might have a job for you,\" says Utambu, ignoring Vikola.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\"I'm certain you will get a chance to discuss it with her,\" says Ny-bat.\n\t\t\t\t*goto nybat\n\t\t\t*if (gao_ally) #\"Just ask Gao.\"\n\t\t\t\t*set infamy %- 5\n\t\t\t\t\"What in space does Gao have to do with this?\" asks Vikola.\n\t\t\t\t\t\t\t\t\n\t\t\t\tUh-oh.  You belatedly remember promising Gao you wouldn't tell anyone that he helped you.  You probably shouldn't have mentioned his name.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\"Nothing.\"  You try to cover your mistake.  \"He just agreed I might have some useful skills.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t*goto nybat\n\t\t\t*if (zeeber_ally) #\"Just ask Zeeber.\"\n\t\t\t\t*set infamy %+ 5\n\t\t\t\tZeeber leans over the edge of the platform, so that you are looking down at her tangled hair.  Someone should tell the kid to use a hairbrush.  \"${name}'s got a few skills,\" she calls down.  \"And you know Zoa wants to give a recruitment speech.  So you might as well—\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\"Seal it,\" growls Hammer.  Zeeber sits back.  You can't see her face.\n\t\t\t\t*goto utambu_speaks\t\t\n\t\t\t#\"I'm always entertaining.  I even make myself laugh.\"\n\t\t\t\t\"The captain doesn't have much sense of humor, unfortunately,\" says Utambu.\n\t\t\t\t\t\t\t\t\n\t\t\t\t*goto nybat\n\t#…find something to throw down on the pirates' heads.\n\t\tYou climb upwards as quickly as you can, scrambling for footholds and gasping for breath.\n\t\t*gosub gravityqu\n\n\t\tVikola entertains you from below with a scathing list of insults, touching on your cowardice, your physique, your intelligence, your family, and the whole station-dwelling population.  You really don't like her.\n\t\t\t\t\n\t\tNy-bat climbs after you, and you struggle to maintain your lead.\n\t\t\n\t\t\"No one will hurt you if you just come with us,\" says Utambu.  You hope that option will still be open to you after you punish them a bit for kidnapping you.\n\t\t*page_break\n\t\t*set net true\n\t\tThe cargo hold is largely empty, with just a few bits of cargo on each level.  There's a shipping container of raspberry micromead taller than you are one platform up, but that's not convenient for throwing.\n\n\t\tYou have better luck on the next level: heaps of Sinbalo wood, held to the deck by lightweight magnetic netting.  The branches are thin, barely two centimeters in diameter, and extremely light, but Sinbalo wood is as strong as steel.  You shut off one of the nets, and flick it towards you.  Demagnetized, it collapses into a handful of silky fibers.  You shove the net into your pocket, just in case you need one later.\n\t\t*page_break\n\t\tYou turn off two more nets while considering your options.  You could throw armfuls of Sinbalo wood.  It's light but sharp.  From this height, those branches will be really painful.  You'll get to see some blood. \n\t\t\t\n\t\tYou could throw some magnetic nets.  The edges of the nets will be attracted to the floor of the cargo hold, and the crew members will be forced to their knees before they can turn them off.  That would be worth a laugh.\n\t\t\n\t\tOr you could hurt the crew where it counts—in the pocket.  There are some interactive paintings lying around that might be worth something.  You're no art critic, so you can't be sure.  But whatever their value, a fall from this height will smash their circuitry, and then they'll be worthless.\n\t\t\n\t\tThe Reckless crew kidnapped you, but they haven't actually hurt you yet.  How badly do you want to hurt them?  How angry do you want to make them?  You decide to throw:\n\t\t*choice\n\t\t\t#Sinbalo wood.\n\t\t\t\t*set infamy %- 10\n\t\t\t\t*set empathy %- 15\n\t\t\t\t*gosub look_down\n\t\t\t\tYou toss the first armload of Sinbalo wood over the side, and lean over to watch the effects.  The twigs spread out in flight, tumbling end over end, catching the light like shards of silver.  Utambu shouts; all three pirates throw their arms over their heads and run for the cover of the ring-shaped platform.  It's hard to see the actual scratches, sheltered as the crew members are now by the overhang across the cylinder, but you can tell from the way they examine their arms and exclaim that they have been mildly hurt.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\"That was really mean!\" you hear Zeeber exclaim, with either shock or admiration—it's hard to tell.  She was sheltered from the falling branches, up among the cargo.\n\n\t\t\t\t\"And unnecessary,\" says a deep voice beside you. \n\t\t\t\t*label nybat_throw\n\t\t\t\tNy-bat has caught up with you, and ${n_he} does not look happy.  Face to face, ${n_he} is impossibly tall and willowy, like an artist's creative approximation of a human being.\n\t\t\t\t*choice\n\t\t\t\t\t#I will fight Ny-bat, here at the edge of the platform.\n\t\t\t\t\t\t*gosub nybat_fight\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto foam\t\n\t\t\t\t\t#I start negotiating, before I get hurt.\n\t\t\t\t\t\t\"That was unkind,\" says Ny-bat.\n\n\t\t\t\t\t\t\"So was drugging me and locking me in a cell.  But what's done is done, right?  I'd like to speak to the captain,\" you say, raising your voice so that everyone can hear.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tDown below, Vikola snorts.  \"Why should Zoa waste time on a worthless Stashie?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"The captain will see you if you submit to restraints,\" Ny-bat says, showing you a canister of self-seal foam.  \"That is her condition.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto foam\n\t\t\t\t\t#I climb down and surrender to one of the other pirates in a gesture of defiance.\n\t\t\t\t\t\t*goto alt_foam\n\t\t\t#Magnetic nets.\n\t\t\t\tYou switch off a few of the nets by squeezing one of the marble-sized magnets around the edges, and fill your arms with silky fibers.\n\t\t\t\t*gosub look_down\n\t\t\t\t\t\t\t\t\t\n\t\t\t\tQuickly you turn the nets on, one by one, and toss them over the side.  They immediately snap out to their full diameter, magnets seeking the floor.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\tThe crew members instinctively cover their heads.  The nets land softly and painlessly, but begin to push the pirates inexorably towards the ground.  They grunt and bend, hands scrabbling for one of the dangling magnets.  Hammer is forced down to one knee before he can grab one, while Vikola manages to stay upright.  Utambu somehow gets stuck folded in half, hands on the ground, butt in the air, magnets out of reach.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\"Idiot,\" Vikola says as she releases him.\n\n\t\t\t\t*goto nybat_throw\n\t\t\t#Interactive paintings.\n\t\t\t\t*set infamy %- 10\n\t\t\t\tYou feel the stretch across your chest as you struggle to hold on to two corners of a wide plastic box.  The thin, flat container is surprisingly heavy.  You have to drag it to the edge and push it over.  The pirates jump out of the way just in time.  You hear a satisfying crunch-tinkle as it lands, the sound of broken machinery.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\tUtambu lets out a slightly hysterical giggle.  \"I told Zoa that was junk,\" he says.  \"And now it is junk.  I told her that anyone with a Cert 3 in programming and the gall to call himself an artist could—\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\"Seal it, Utambu,\" says Hammer.  \"Someone would have paid something for it.  Gotta come out of someone's percentage, now.\"\n\t\t\t\t\n\t\t\t\t\"You hear me up there, Stashie?\" Vikola shouts.  \"If Zoa touches my percentage because of you, I'm going to carve you up, piece by piece, 'til there's nothing left for the medibed to fix.\"\n\t\t\t\t\n\t\t\t\t*goto nybat_throw\n\t\t\t\t\n*label look_down\nYou peer over the edge of the platform, at the upturned faces of your opponents.  With their mouths open, they look like three fish in a tank.\n*return\n\n*label rib\nVikola lands a sharply painful blow to your left side.  You turn to face her, and block her next blow, aimed at your face.  It hurts when you breathe in—you think she has cracked one of your ribs.\n*set injured true\n*return\n\n*label trussed\nYou switch entirely to defense, protecting your injured side.  It doesn't take long for them to pin you and immobilize your hands with self-seal foam.\n*return\n\n*label nybat_fight\n*set infamy %+ 10\nYou have little room to maneuver, but you are determined to show these pirates you will not be cowed.\n\nYour first, second, and third swings miss—Ny-bat dodges like a Z-ball player.  You decide to make this a wrestling match instead of a fist fight, and grab ${n_him}.  $!{n_he} tries to dance away from your grasping hands, but ${n_he}, too, is hindered by the limited space.  The two of you grapple for a moment, equally matched in strength though Ny-bat surpasses you in skill.  Then, as Ny-bat wrenches ${n_him}self free, you trip on a bit of packaging and start to fall backwards over the edge.\n\nAn elongated hand grabs a fistful of your shirt and hauls you back onto the platform.  As you struggle to find your footing, your flailing knocks Ny-bat off-balance, and ${n_he} begins to tip over into empty space.\n\nYou have no time to think.  Your instinct is to…\n*choice\n\t#…grab ${n_him}.\n\t\t*set empathy %+ 25\n\t\t*set infamy %+ 10\n\t\tYou dive forward and grab Ny-bat by the shirt.  $!{n_his} feet go out from under ${n_him}.  You manage to keep ${n_him} on the platform, but the weight brings you down, too: you both end up sitting on the floor.  Ny-bat grins, panting.  You've made a friend.\n\t\t\n\t\t\"Zoa insists on foam, though I regret the necessity,\" ${n_he} says, taking a canister from ${n_his} belt.\n\t\t*set nybat_ally true\n\t\t*set allies +1\n\t\t*return\n\t#…let ${n_him} fall.\n\t\t*set empathy %- 20\n\t\tYou watch as Ny-bat wheels his arms in panic.  \"Code 7!  Gravity off!\" ${n_he} shouts as ${n_he} goes over.\n\t\t\t\t\n\t\tYou can feel it in your stomach, that sudden cessation of gravity.  You move cautiously to the edge, thinking to peer over and check on Ny-bat.  Instead, a hand reaches up and seizes your arm, tugging you over the edge.  In an instant you are floating over the center of the cargo hold, staring in dismay at the angry pirates and the hard floor below you.\n\t\t\t\t\n\t\tYou grip Ny-bat's arm tightly; ${n_he} is your only tether.  \"Code 9.  Gravity on,\" ${n_he} says, and you plummet downwards, swinging on Ny-bat's arm and crashing into the lattice of brown poles between the platforms.\n\t\t*page_break\t\n\t\tYou feel too dazed and nauseous to take decisive action.  You cling to Ny-bat's hand and the pole you just smacked your head on.  Ny-bat helps you onto the platform, and then seals your hands together in quick-drying foam.  You've been caught.  Ny-bat turns the gravity off again, and tows you down to the bottom.\n\t\t*goto caught\n\t#…shout for emergency cessation of gravity.\n\t\t\"Emergency!  Gravity off!\" you shout, assuming the ship is programmed with basic safety protocols.\n\t\t*set empathy %+ 25\n\t\t*set infamy %+ 10\n\t\t\n\t\tYou can feel it in your stomach, that sudden cessation of gravity.  Ny-bat continues down, since that's the way ${n_he}'s going, but pushes safely off the floor to float back up to you.  You grab ${n_him} by the belt and haul ${n_him} back onto the platform.  Ny-bat grins, panting.  You've made a friend.\n\t\t\n\t\t\"Code 9.  Gravity on,\" ${n_he} says, when ${n_he} has ${n_his} feet back under ${n_him}.\n\t\t\n\t\t$!{n_he} takes a canister from ${n_his} belt.  \"Zoa insists on foam, though I regret the necessity,\" ${n_he} says.\t\n\t\t*set nybat_ally true\n\t\t*set allies +1\n\t\t*return\n\t\t\n*label caught\nThe foam around your hands is soft as microsuede, but you have an uncontrollable desire to wiggle your fingers, now that you can't.  You hope you'll be seeing the captain sooner, rather than later.\n\nThe pirates lead you out of the cargo bay and down the docking corridor.\n\n*if (sabotage = \"intercom\")\n\tAs you march past your old cell, the intercom begins blaring, \"Pirates eat vat-grown jooslugs.\"\n\t\t\n\tPerfect timing.\n\n\t*goto medstop\n*else\n\t*label medstop\n\t*if (injured)\n\t\tHammer opens one of the airlocks, and Ny-bat helps you into a medibed.  Since the captain is waiting, he instructs the machine to perform a quick healing without restorative sleep.  So you are privileged to feel every injection of nanites and sickening movement of bone, even if the local anesthetic does block the pain.  In just a kilosecond or so, you are on your feet and heading towards the center of the ship.\n\t\t*page_break\n\t\t*goto krantic\n\t*else\n\t\t*goto krantic\n\t\t\n*label krantic\n*page_break\nAs you round a corner, Krantic steps forward to block your path.  A menacing smile spreads slowly across his face.  His eyes seem opened too wide, like a brain-twist addict or a Zeekie.\n\nEveryone in your escort tenses.\n\n\"Krantic,\" Ny-bat says steadily.\n\n\"See you found our pet Stashie,\" Krantic says.  \"Let's see if it's true what they say: 'Shippers crazy, Stashies lazy.'  Let's see if we can make this Stashie run.\"  He draws his knife out of his belt.\n\n\"We're taking ${name} to Zoa,\" Ny-bat says, looking down on Krantic from ${n_his} impossible height.  \"She's not in the mood to wait.\"\n\nKrantic shrugs grandly, arms outspread.  \"Next time, then, Stashie.  Next time.\"\n\nHe runs the flat of his blade across your arm as he passes, and laughs uproariously when you flinch.  You can hear his laughter echoing down the corridor even after he is out of sight.\n\n\"Zoa makes the decisions,\" Ny-bat tells you, with a sympathetic smile.\n\nYou're sure that's meant to be comforting.\n*page_break\n*goto_scene captain\n\n*label gravityqu\n*if (zeeber_ally)\n\tYou consider turning off the gravity, now that you know that code, but you are worried that will give the pirates an advantage.  Shippers spend even more time in zero-G than Stashies.\n\t*return\n*else\n\t*return\n*label gaohurt\n*if (gao_hurt)\n\t\"You put Gao in a medibed.  Make this difficult and I'll do the same to you.\"\n\t*return\n*else\n\t*return", "cargo_bay": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*temp info false\n*page_break\nFriends or Foes\n(Chapter 2 of 6)\n\nBeside the door to the cargo hold is another safety lock, preventing someone from accidentally—or drunkenly—opening the door when the compartment is exposed to vacuum during a cargo transfer in space.\n\nYou glance at the display that indicates normal atmospheric conditions, and then study the brief test of your coherence and sobriety.\n\nIt says: 1, 4, 10, 22, 46, ?\n\nSo you type:\n*choice\n\t#64\n\t\t*label wrong_number\n\t\t*if (level >= 60)\n\t\t\tSpace.  You must have mistyped.  You are intelligent enough to see that you must multiply by two and then add two in order to arrive at the next number. \n\t\t\t\n\t\t\t*label answer\n\t\t\tYou look back at the sequence: 1, 4, 10, 22, 46, ?\n\t\t\t*choice\n\t\t\t\t#64\n\t\t\t\t\t*goto wrong\n\t\t\t\t#68\n\t\t\t\t\t*goto wrong\n\t\t\t\t#92\n\t\t\t\t\t*goto wrong\n\t\t\t\t#94\n\t\t\t\t\t*set level %+ 10\n\t\t\t\t\t*goto solved\n\t\t\t\t#104\n\t\t\t\t\t*goto wrong\n\t\t*else\n\t\t\tBeep.  You entered the wrong code.  Numbers aren't really your strong suit.  You decide to…\n\t\t\t*choice\n\t\t\t\t#…try this problem again.\n\t\t\t\t\t*goto answer\n\t\t\t\t#…bring up a new test.\n\t\t\t\t\tThe new sequence is: 0, 1, 1, 2, 3, 5, 8, 13, ?\n\t\t\t\t\t\n\t\t\t\t\tYou type:\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#20\n\t\t\t\t\t\t\t*label second_try\n\t\t\t\t\t\t\t*if (level >= 50)\n\t\t\t\t\t\t\t\tPerhaps you made an addition error.  You understand that each number in the sequence 0, 1, 1, 2, 3, 5, 8, 13 is the sum of the two previous numbers, so you know the next number must be:\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#20\n\t\t\t\t\t\t\t\t\t\tWrong again.\n\t\t\t\t\t\t\t\t\t\t*goto wrong\n\t\t\t\t\t\t\t\t\t#21\n\t\t\t\t\t\t\t\t\t\t*goto solved\n\t\t\t\t\t\t\t\t\t#23\n\t\t\t\t\t\t\t\t\t\tWrong again.\n\t\t\t\t\t\t\t\t\t\t*goto wrong\n\t\t\t\t\t\t\t\t\t#24\n\t\t\t\t\t\t\t\t\t\tWrong again.\n\t\t\t\t\t\t\t\t\t\t*goto wrong\n\t\t\t\t\t\t\t\t\t#25\n\t\t\t\t\t\t\t\t\t\tWrong again.\n\t\t\t\t\t\t\t\t\t\t*goto wrong\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tWrong again.\n\t\t\t\t\t\t\t\t*goto wrong\n\t\t\t\t\t\t#21\n\t\t\t\t\t\t\t*goto solved\n\t\t\t\t\t\t#23\n\t\t\t\t\t\t\t*goto second_try\n\t\t\t\t\t\t#24\n\t\t\t\t\t\t\t*goto second_try\n\t\t\t\t\t\t#25\n\t\t\t\t\t\t\t*goto second_try\n\t\t\t\t#Look for the manual emergency release.\n\t\t\t\t\t*label wrong\n\t\t\t\t\t*set level %-10\n\t\t\t\t\t*set free_time - 10\n\t\t\t\t\tReally, they should make these rotating codes easier, so that a person of action like yourself can operate the spacing door.\n\t\t\t\t\t\n\t\t\t\t\tYou lift off the panel hiding the manual release, and turn the wheel inside with a grunt of effort.  The huge door rolls upwards into the ceiling.  Using the emergency release has surely set off an alarm somewhere, so you've lost a significant portion of your free time.  You'll have to hurry if you want to accomplish anything before the pirates recapture you.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto inside\t\n\t#68\n\t\t*goto wrong_number\n\t#92\n\t\t*goto wrong_number\n\t#94\n\t\t*set level %+ 15\n\t\t*label solved\n\t\tThat was easy.  The huge door rolls upwards into the ceiling.  You hope the ship's computer doesn't retain records of door openings and closings; otherwise, your experience of freedom will be extremely short.  You know the crew will find you sooner or later, but you'd like to give them a challenge—and to spend some unfettered time with the ship's computer before you get recaptured.\n\t\t*page_break\n\t\t*goto inside\n\t#104\n\t\t*goto wrong_number\n\n*label inside\nThe cargo hold clearly began life as part of a Sandovali ship, not a human one.  The room is one long cylinder stood on end, four human-habitat stories high, but with scarcely as much standing room as your favorite tea shop back on the station.  The Sandovali don't stand, of course—they swing. So all the way around the rising tunnel is a lattice of storage spaces and brown-painted poles, crisscrossing up and up in a monochromatic plaid.  Sandovali would swing easily from level to level, but for a human, some of the gaps between the horizontal platforms require quite a stretch.  As your gaze travels upwards, you see a set of giant robotic arms anchored to the middle of the ceiling, far above.  The crew must use these to store and retrieve cargo.\n*page_break\nYou step in, and the door automatically shuts behind you.  You scan the wall around the door frame—the only accessible wall—but don't find a computer terminal, just a hover displaying the name of the ship.  For all you know, the Reckless doesn't have wall terminals at all, and the crew uses portables for everything.\n\nYou begin planning your climb up to a possible hiding place, since you don't know how to switch off the gravity.  But as you study the giant shelves and their scattered contents, you realize you are not alone.  There is a small, hunched figure on the second level.  The slender person has his or her—probably her, given the long curly hair—back to you, and doesn't seem to have registered the low hiss of the door opening and closing.  When you listen intently, you can hear soft sobs.  Do you want to…\n*choice\n\t#…softly call out to the crying girl.\n\t\t*set empathy %+ 10\n\t\t*set persuasiveness %+10\n\t\t\"Hello, there,\" you say gently.\n\t\t\t\t\n\t\t*label meet_zeeber\n\t\t\"What?\"  The girl starts and turns, and you see that she is a red-eyed teenager, probably no more than fourteen.  \"You must be the Stashie.  ${name}.  Are you supposed to be…I guess I should…\" she trails off, casting about for her terminal to report you.  You quickly…\n\t\t*choice\n\t\t\t#…plead: \"Please don't call anyone.  I'm not dangerous, and I need your help.\"\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t*set free_time -3\n\t\t\t\t*label reluctance\n\t\t\t\t\"You don't understand,\" she says.  \"I can't mess up again.  Zoa will get rid of me for sure.\"  Still, she stays away from her terminal, and that's a good sign.\n\t\t\t\t\n\t\t\t\tYou try to sound as gentle and sympathetic as possible.  \"I'll never tell her you helped me. And maybe I can help you. What's the problem?\"\n\t\t\t\t\n\t\t\t\t*gosub zeeber_problem\n\t\t\t\t*label up\n\t\t\t\t*page_break\n\t\t\t\t\"Can I come up there?\" you ask.\n\t\t\t\t\n\t\t\t\tZeeber gives a reluctant nod.\n\t\t\t\t\n\t\t\t\t*gosub poles\n\t\t\t\tYou haul yourself up to the next platform and approach the scrawny girl.\n\t\t\t\t\n\t\t\t\t*gosub time_check\n\t\t\t\t*goto help_choice\n\t\t\t#…bargain: \"Tell me what's wrong.  Maybe we can help each other.\"\n\t\t\t\t*set level %+ 5\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t*set free_time -3\n\t\t\t\t*gosub zeeber_problem\n\t\t\t\t*goto up\n\t\t\t#…threaten: \"Don't call for help.  I can reach you a lot faster than they can.\"\n\t\t\t\t*set free_time -5\n\t\t\t\t*set persuasiveness %+5\n\t\t\t\t*goto threatened\n\t#…sneak up on the crying girl.\n\t\t*set infamy %+10\n\t\tYou cross the ceramic floor slowly and carefully, until you are standing almost directly under the girl.  She remains intent on some piece of machinery she is holding, and hasn't paused in her sobbing. You try to climb quietly, but as you stretch out along the lattice, the sole of your shoe squeaks against the faux-wood pole it's resting on.\n\t\t\n\t\t*goto meet_zeeber\n\t#…shout, \"Stay where you are!  And don't even think about calling for help!\"\n\t\t*set free_time - 5\n\t\t*set infamy %+ 10\n\t\t*label runs\n\t\tThe girl starts and turns, and you see that she is a red-eyed teenager, probably no more than fourteen.\n\n\t\t*label threatened\n\t\t\"Please don't hurt me,\" the girl begs.\n\t\t\t\t\n\t\t\"I won't if…\" you begin, but the pleading was just a ploy.  \n\t\t*label moment_runs\n\t\tThe girl grabs a gray slab from the platform at her feet and begins to climb higher, with the terminal tucked awkwardly under one arm. You have to stop her from using the terminal to call for help.\n\n\t\tYou begin to clamber up the horizontal poles, thinking how much easier this would be if you knew how to turn the gravity off.  The first level is easy to reach, but to get to the next you have to pull yourself up past a big open cargo space.\n\t\t*page_break\n\t\tYou look up at the fleeing girl.  The rubber soles of her shoes are only two meters away.  She's nimble, you'll give her that.  But she's also hindered by her terminal.  You are definitely closing the gap.\n\t\t\t\t\n\t\tOne more level, and you find yourself on the same platform as the girl.  She darts desperately around the piled cargo, but you are faster.  Soon you have her cornered between two metal storage containers higher than your head.\n\t\t\t\n\t\t\"You don't understand.  I can't mess up again!\" she pleads.\n\n\t\t\"What are you talking about?\" you ask.\n\t\t*page_break\n\t\t*gosub zeeber_problem\n\t\t*gosub time_check\n\t\t*label help_choice\n\t\t\"Listen, Zeeber, I don't have a lot of time before they find me,\" you say.\n\t\t*choice\n\t\t\t#\"But I'll help you if I can.\"\n\t\t\t\t*goto arms\n\t\t\t#\"So I need to use your terminal now.\"\n\t\t\t\t\"Why should I help you?\" Zeeber asks, arms folded across her chest in defense and defiance.\n\t\t\t\t\n\t\t\t\t\"Let me tell you something about myself,\" you say.  Of course, you don't have to tell her the truth.  No one knows you here on the Reckless; you can reinvent yourself however you wish, say whatever might make her trust you.\n\t\t\t\t*choice\n\t\t\t\t\t#\"I may look tough, but I'm a bouncer, see?  I keep everybody safe.\"\n\t\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t\t*set strength %+ 10\t\t\t\t\t\t\n\t\t\t\t\t\t*label toterm\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Oh, fine,\" says Zeeber.  \"Take it.  But if you tell anyone I helped you, I'll tell Zoa you attacked me.  Then you'll be in real trouble.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe terminal is a thin, stiff rectangle of plastic that fits comfortably between the elbow and wrist of your left arm.  You ghost your right hand over the blank surface, and it comes alive with swooping patterns of swirls, black on white—Sandovali.\n\n\t\t\t\t\t\tYou close the girl's programs.  What you want is access to the ship's main computer.\n\n\t\t\t\t\t\t*goto terminal\n\t\t\t\t\t#\"I'm just a prankster, really.\"\n\t\t\t\t\t\t\"Some people have no sense of humor, you know?  But me, I'll do almost anything for a laugh.\"\n\t\t\t\t\t\t*set infamy %+ 10\t\t\t\t\t\t\n\t\t\t\t\t\t*goto toterm\n\t\t\t\t\t#\"I'm what you call a good citizen.\"\n\t\t\t\t\t\t\"I know you haven't met many of those, but let me tell you what it means: I've never hurt anybody, and I don't plan to start.\"\n\t\t\t\t\t\t*set infamy %- 10\n\t\t\t\t\t\t*set empathy %+ 5\n\t\t\t\t\t\t*goto toterm\n\t\t\t\t\t#\"I'm smarter than I look.\"\n\t\t\t\t\t\t\"I've gotten my friends and myself out of quite a few sticky situations in the past.  Don't you think you and I could be friends?\"\n\t\t\t\t\t\t*set level %+ 10\n\t\t\t\t\t\t*goto toterm\t\n\t\t\t#I grab her by both wrists.\n\t\t\t\t*set empathy %- 10\n\t\t\t\t*label seize\n\t\t\t\t*if (strength \u003c 50)\n\t\t\t\t\t*set infamy %-15\n\t\t\t\t\tYou seize Zeeber's wrists, but she's wiry, and stronger than she looks.  She twists violently against your clutching hands, kicking out at the same time, tearing her arms from your grasp.\n\t\t\t\t\t\n\t\t\t\t\tZeeber runs away from you, dodging around a storage container, but you manage to get a fistful of her shirt before she can climb up or down.  She slaps your hand away, but stops running, clearly realizing that you have reached an impasse.\n\n\t\t\t\t\tShe stands there panting, her hands squeezing into unconscious fists. You pick up the terminal from the ground where it fell in the scuffle.\n\n\t\t\t\t\tThe terminal is a thin, stiff rectangle of plastic that fits comfortably between the elbow and wrist of your left arm.  You ghost your right hand over the blank surface, and it comes alive with swooping patterns of swirls, black on white—Sandovali.\n\t\t\t\t\t\n\t\t\t\t\tSuddenly, Zeeber barrels into you, all jabbing elbows and vicious kicks.  She can't really hurt you, but you lose your grip on the terminal.  It goes spinning over the side of the platform.  Zeeber instantly stops fighting.\n\t\t\t\t\t\n\t\t\t\t\t\"Got you,\" she says, with a satisfied smirk.\n\t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto_scene capture\n\t\t\t\t*else\n\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t*set free_time - 3\n\t\t\t\t\tYou seize Zeeber's wrists.  She twists violently against your clutching hands, kicking out at the same time, but you maintain your hold on her.  After a few minutes of struggling, the girl goes limp and begins to cry again.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"Zoa will be so angry with me.  She'll get rid of me this time for sure,\" the girl sobs.\n\t\t\t\t\t\n\t\t\t\t\tYou're not wearing anything rope-like, but the girl has a piece of blue fabric tied around her waist like a sash. You transfer your grip—the girl is so scrawny you can hold both her wrists in one of your hands—and untie the silky belt.  You wind the material around the girl's ankles and tie it securely.  You wish you had something to tie her wrists with, too, but you don't.  You pick up the terminal from the ground where it fell in the scuffle.\t\t\t\t\n\t\t\t\t\t*gosub time_check\n\t\t\t\t\t*page_break\n\t\t\t\t\tThe terminal is a thin, stiff rectangle of plastic that fits comfortably between the elbow and wrist of your left arm.  You ghost your right hand over the blank surface, and it comes alive with swooping patterns of swirls, black on white—Sandovali.\n\n\t\t\t\t\tYou close the girl's programs.  What you want is access to the ship's main computer.\n\n\t\t\t\t\t*goto terminal\n\n*label arms\nShe hands you her terminal, a thin, stiff rectangle of plastic that fits comfortably between the elbow and wrist of your left arm.  You ghost your right hand over the blank surface, and it comes alive with swooping patterns of swirls, black on white—Sandovali.\n\n\"What's this?\" you ask.\n\n\"The manual,\" she says, and starts chewing worriedly on her lower lip.\n\nYou tell her:\n*choice\n\t#\"I can't do anything with this terminal, but I'll go up and pull the arms apart.\"\n\t\t*label climb\n\t\tYou reluctantly hand the terminal back, and walk to the edge of the platform.  \"Gravity?\" you ask.\n\t\t\n\t\t\"Code 7.  Gravity off,\" Zeeber says.\n\t\t\n\t\tYou push off, and float diagonally upwards on a lazy course towards the metal arms.  Once you grab hold, you see that the metal arms are segmented like worms.  Each arm is made of hundreds of silver rings, so that it can twist and bend in any direction.  You suspect those segments expand as well, allowing the arms to reach the bottom level when fully extended.  The two arms have twined around each other right at the top, where they come out of the ceiling.  \n\t\t*page_break\n\t\tYou pull one of the arms while kicking the other away from you—but even without gravity, the massive machinery is hard to shift.  You end up turning upside down, and are able to force the arms around that way.  You catch a glimpse of the girl on the edge of a lower platform, looking up at you like you are the star of your own comicfile.  It's a long way down—and you love that shot of adrenaline, that surge of excitement zero-G acrobatics can give.\n\t\t*label zeeber_thanks\n\t\t\n\t\tYou dive back down, showing off some of your favorite flips on the way.\n\t\t*page_break\n\t\t\n\t\t\"Code 9.  Gravity on.  That was amazing, ${name},\" Zeeber says, when you've landed feet-first on the platform.  \"I owe you.\"\n\t\t\t\t\t\t\t\n\t\tYou've definitely made an ally.\n\t\t*set zeeber_ally true\n\t\t*set allies +1\n\t\t*gosub time_check\n\t\tNow you'd better spend some time with Zeeber's terminal, before the rest of the crew comes bursting through the doors.\n\t\t\n\t\t*goto terminal\t\t\n\t#\"Get me into the command code for the arms, and I'll write an untangling subroutine.\"\n\t\tZeeber\n\t\t*label hacking_help\n\t\tmakes a few quick selections, and hands you back the terminal.  You look down at familiar symbols.  Programs are written in neither English nor Sandovali, of course, but in a computer language.  There are probably as many of these as there are spoken languages in the galaxy, which is to say, millions, but there are only a handful commonly used in this edge of the spiral for machinery likely to pass between species—otherwise, a junkyard ship like this one could never be made to function as a whole.\n\t\t*if (hacking > 70)\n\t\t\t*set free_time -8\n\t\t\tThis looks like Delta 5, stars be thanked.\n\t\t\t \t\t\t\n\t\t\tYou decide to go up to the arms, and get a feel for how they move.\n\t\t\t\n\t\t\t\"Gravity?\" you ask.\n\t\t\n\t\t\t\"Code 7.  Gravity off,\" Zeeber says.\n\t\t\t\n\t\t\tYou push off, and float diagonally upwards on a lazy course towards the metal arms.  Once you grab hold, you see that the metal arms are segmented like worms.  Each arm is made of hundreds of silver rings, so that it can twist and bend in any direction.  You suspect those segments expand as well, allowing the arms to reach the bottom level when fully extended.  The two arms have twined around each other right at the top, where they come out of the ceiling.\n\t\t\t*page_break\n\t\t\tA quick glance at the program helps you understand why Zeeber was having so much trouble—the movement subroutine is too automated for its own good.  A user is supposed to enter the grid number of the cargo to be retrieved, and let the sensors and the program write a movement subroutine for the arms.  The retrieval system is probably writing perfect subroutines, all of which assume the arms are starting from a standard position, instead of twined around each other as they are now.\n\t\t\t\t\t\t\n\t\t\tThe simplest thing to do is to bypass all the automation, and start entering the most basic commands possible:\n\t\t\t\t\t\t\n\t\t\tArm 1 50 centimeters left.\t\t\t\n\t\t\tArm 2 50 centimeters right.\t\t\t\n\t\t\tArm 1 100 centimeters forwards.\n\t\t\t\t\t\t\n\t\t\tAnd so on and so on [i]ad nauseam[/i], with the huge arms creaking and sometimes, when you underestimate the necessary distance, clanging against each other.  Given twenty minutes, you could write a lovely program to manage this, but the crew could come bursting in the cargo hold door any centasecond, so you're stuck playing the absolute most boring VR game ever.  On the bright side, the girl is staring at you like you are the star of your own comicfile.\n\t\t\t*page_break\n\t\t\t*goto zeeber_thanks\n\t\t*else\n\t\t\tYou recognize just enough symbology to realize this code is Delta 5, a language you don't know.\n\t\t\t*choice\n\t\t\t\t#I try to unwind the arms by hand.\n\t\t\t\t\t*goto climb\n\t\t\t\t#I tell the girl that I can't help her after all.\n\t\t\t\t\t*goto no_help\n\t#\"Sorry, there's nothing I can do.\"\n\t\t*label no_help\n\t\t*set infamy %- 5\n\t\t\"Well aren't you the worthless piece of space junk,\" Zeeber grumbles.  She's not the sweetest kid you've ever met.\t\n\t\t*gosub time_check\n\t\tYou'd better spend some time with her terminal, before the pirates come looking for you.\n\t\t\n\t\t*goto terminal\n\n*label terminal\nYou may not have time to do everything you'd like to.  What is your first priority?\n*choice\n\t#To call for help.\n\t\t*set infamy %- 25\n\t\t*set free_time -5\n\t\t*gosub rep\n\t\tYou are desperate to be rescued as soon as possible.  You quickly find the ship's communication protocols.  You record a quick message explaining your situation, and attach course data from the Reckless's own nav computer.\n\n\t\tSending the recorded message back towards your home station will be easy—but, of course, it will immediately alert the pirates to your whereabouts.  And will probably make them extremely, extremely angry.  You decide to think for a minute before committing yourself.  On the one hand, this may be your only chance to call for outside help.  On the other hand, if you've been a bit troublesome in the past, the station government may choose not to believe your plea, and you may anger the pirates for nothing.  On the third hand, there may be opportunities here on the Reckless you don't want to miss by making yourself a snitch.\n\t\t\n\t\tYou take a moment to sort this all out, and then you decide…\n\t\t*choice\n\t\t\t#…to send the message now.\n\t\t\t\tThe pirates will find you sooner or later, and you're as ready to face them now as you'll ever be.\n\t\t\t\t*set message true\n\t\t\t\t*achieve call\n\t\t\t\t*set infamy %-20\n\t\t\t\t*label message_sent\n\t\t\t\tYou send your recording flying out into the universe.  \n\n\t\t\t\t*goto_scene capture\n\t\t\t#…to delay the message a kilosecond.\n\t\t\t\t*set level %+ 5\n\t\t\t\t*set message true\n\t\t\t\t*achieve call\n\t\t\t\t*set infamy %-20\n\t\t\t\t*label second\n\t\t\t\tYou haven't announced your current location, so you may have more time before they find you.  Or, the pirates may be just outside the door.\n\t\t\t\t\n\t\t\t\tYou decide to use whatever time you have left to:\n\t\t\t\t*choice\n\t\t\t\t\t#I see what trouble I can brew among the Reckless systems.\n\t\t\t\t\t\t*gosub time_check\n\t\t\t\t\t\t*goto sabotage_try\n\t\t\t\t\t#I find any helpful information in the ship's computer.\n\t\t\t\t\t\t*gosub time_check\n\t\t\t\t\t\t*goto info_dump\t\t\t\n\t\t\t#…to hide the message in the next signal the Reckless sends.\n\t\t\t\tYou have absolute confidence in your ability as a hacker, and know this is within your abilities.\n\t\t\t\t\n\t\t\t\t*set hacking %+ 10\n\t\t\t\t*set message true\n\t\t\t\t*achieve call\n\t\t\t\t*if (hacking >= 75)\n\t\t\t\t\t*set level %+ 5\n\t\t\t\t\t*set free_time -5\n\t\t\t\t\tIt takes a few minutes, but you manage to disguise your message.  The Reckless crew will never know you sent it, and your reputation on the ship won't be compromised.\n\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t\n\t\t\t\t\t*goto second\n\t\t\t\t*else\n\t\t\t\t\t*set message false\n\t\t\t\t\t*set infamy %-20\n\t\t\t\t\t*set level %-10\n\t\t\t\t\tYou activate your program, thinking you've disguised its origins, but a minute later your terminal is forcibly disconnected from the ship's computer.  The crew know where you are and what you tried to do—you've angered them and failed to send the message.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto_scene capture\n\t\t\t#To delete the message.\n\t\t\t\t*goto second\n\t#To have some fun with the ship's systems.\n\t\t*label sabotage_try\n\t\t*set hacking %+ 10\n\t\t*set free_time - 10\n\t\t*if (hacking > 75)\n\t\t\tA frenetic search turns up three systems that are laughably insecure.  It's sloppy work on the part of the crew, but then again, they probably don't make a habit of kidnapping hackers of your caliber.\n\n\t\t\tDo you want to interfere with:\n\t\t\t*choice\n\t\t\t\t#The interior doors.\n\t\t\t\t\t*set sabotage \"doors\"\n\t\t\t\t\tYou can't get deep enough inside the Reckless's security barriers to lock or unlock any of the doors—at least, not in the time you have.  But you can make one small change that should drive the crew crazy.  You set the time until automatic close to half-seconds, so that once a crew member opens a door, he'll have only a moment to get through before the door shuts automatically.  There are safety features that will prevent serious crush injuries, but you still chuckle, imagining the crew jumping back as the doors bear down on them.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*label scored_point\n\t\t\t\t\tIt feels immeasurably good to score a point off your kidnappers.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*if (info)\n\t\t\t\t\t\t*goto_scene capture\n\t\t\t\t\t*else\n\t\t\t\t\t\t*gosub time_check\n\t\t\t\t\t\tThe crew still hasn't found you, so you have time to look for useful information.\n\t\t\t\t\t\t*goto info_dump\n\t\t\t\t#The kitchen subroutines.\n\t\t\t\t\t*set sabotage \"freezer\"\n\t\t\t\t\tThere's no chance of starting a fire, however gratifying that would be.  The safety precautions are many and encrypted.  You can turn off the freezer in order to perform maintenance, though—and you do.  You wonder how long it will be before someone notices, and how sticky and disgusting the melted food will be.  You grin.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*goto scored_point\n\t\t\t\t#The intercom.\n\t\t\t\t\t*set sabotage \"intercom\"\n\t\t\t\t\tYou can't turn off internal communication, or cause any serious malfunctions—at least, not in the time you have.  But you can ensure that a recorded phrase is repeatedly broadcast throughout the ship.  You choose something pithy, yet crude, and delay the broadcast so as not to draw attention to your current activities.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*goto scored_point\n\t\t*else\n\t\t\tYou try to sneak into some of the non-essential ship systems: the interior doors, the kitchen subroutines, the intercom.  But even these programs are heavily protected.  You are forced to abandon the effort before you waste too much time.\n\t\t\t\n\t\t\t*if (info)\n\t\t\t\t*goto_scene capture\n\t\t\t*else\n\t\t\t\t*gosub time_check\n\t\t\t\tThe crew still hasn't found you, so you have a little time.\n\t\t\t\t\n\t\t\t\t*goto info_dump\n\t#To find out as much as I can about the Reckless.\n\t\t*label info_dump\n\t\t*set info true\n\t\tYou begin at the ship's main message board, the center of its electronic communication.  There's a file on the board named \"4-7-2\" that the captain wants everyone to read, a memo on kitchen duty, a schedule for weapons training, and—look!—a message with your name as the title.  Since you may have time to read only one file, you open:\n\t\t*choice\n\t\t\t#File 4-7-2.\n\t\t\t\t*label 472\n\t\t\t\t*set free_time -2\n\t\t\t\t*set mission_info true\n\t\t\t\tThe file reads:\n\t\t\t\t\n\t\t\t\t*label planet\n\t\t\t\tAtmosphere is breathable but hypersaturated.  All away crew are instructed to carry breathers in case of light-headedness.  Electrical discharge travels easily through the atmosphere.  Therefore, all electrical weapons are strictly prohibited.  Anyone carrying such a device groundside will immediately lose a profit percentage point.  Specialized projectile weapons are available in the training room; find time to practice this week.  Anyone who shoots wild on the deal-or-steal will be dealt with by me.  Krantic will have absolute authority on 4-7-2.\n\n\t\t\t\tMedusi are thought to be non-aggressive, so a deal seems likely.  We'd like to return for vermite often, so mind your manners.  No mistakes this time!  The potential for profit is too high.\n\n\t\t\t\tZoa\n\n\t\t\t\tYou've certainly learned something about the ship's destination and the pirates' intentions.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene capture\n\t\t\t\t\n\t\t\t#The message about me.\n\t\t\t\t*label your_message\n\t\t\t\t*set free_time -2\n\t\t\t\tWe have an unwilling passenger out on corridor 4, who is to stay there until after our visit to 4-7-2.  You will all recognize the Stashie from the incident on Dekara Station, but no personal vendettas—that means you, Vikola.  One of you will be on duty at all times—schedule is appended.  No talking about 4-7-2 until I have determined the Stashie's future.  Feel free to give the usual recruitment speeches, but report all communication.  I want to know what our visitor wants.\n\t\t\t\t\t\t\t\t\n\t\t\t\tIf you have to subdue our guest, I want no permanent damage done—nothing a medibed can't handle.  If the Stashie decides to join up, I want the usual precautions.\n\t\t\t\t\t\t\t\n\t\t\t\tZoa\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene capture\n\t\t\t#Neither—the real dirt will be in the financial accounts.\n\t\t\t\tYou attack the captain's encrypted spreadsheets.\n\t\t\t\t*if (hacking > 75)\n\t\t\t\t\t\n\t\t\t\t\tYou see that the ship's last score was selling a cargo hold full of Joodar delicacies all the way out to Earth, of all places.  The Reckless certainly gets around.  You note some interesting information:\n\t\t\t\t\t\n\t\t\t\t\t1. Next to the captain, the highest paid pirate is Krantic (the one Gao warned you about), closely followed by Ny-bat (whoever that is).\n\t\t\t\t\t\n\t\t\t\t\t2. Someone named Utambu, listed as chief engineer, is seriously underpaid.\n\t\t\t\t\t\n\t\t\t\t\t3. Gao seems to manage a separate fund—do pirates have retirement plans?  Maybe they hide emergency funds under false names in case they have to hide from the IHP.  In any case, if everyone trusts him with their investments, Gao must be the most well-liked pirate on the ship.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto_scene capture\n\t\t\t\t*else\n\t\t\t\t\tYour hacking skills simply aren't up the task, though; you can't find your way in.  Instead you return to the message board and quickly scan file 4-7-2:\n\t\t\t\t\t\n\t\t\t\t\t*goto planet\n\n*label poles\nThe horizontal poles between the ground and the next level are no more than half a meter apart here, so you can climb them as you would climb a ladder.\n*return\n\n*label zeeber_problem\n\"It's those arms,\" she says, gesturing towards the giant mechanical arms dangling from the ceiling.  \"They're twisted, and I'm supposed to fix them. But they won't respond to commands.  And even when I switch off the gravity and swim up, I'm not strong enough to pull them apart. And I can't ask for help.  I have to show Zoa I'm useful, even though I'm getting too old to play the role.\"\n\nYou shake your head, a little bewildered by this sudden outpouring.  This girl speaks faster than a Groundsider.  \"What role?\" you ask.\n\n\"I pretend to be Zoa's daughter. It helps her seem all warm and motherly during negotiations, especially with the Joodars.  You know how Joodars are about mothers and children.  That's what she bought me for.\"\n*page_break\n\"Bought you?\" you exclaim, completely shocked.  Slavery is a barbarity humanity has outgrown, and the punishments are extreme.  You can't believe that even a pirate ship would deal in slaves.\n\n\"Rescued me,\" the girl says.  \"I was a Sandovali slave.  I don't know how they got a hold of me; I was just a baby.  When I was seven, Zoa bought me and freed me and gave me a job.  The Reckless is the best place I've ever been, but if I'm not useful, Zoa will just dump me on some human planet and leave me there.  That's what she's like.\"\n\nPrivately, you think the girl might be better off under the care of some planetary government. But now isn't the time to argue it.\n\n\"Why don't you tell me your name?\" you ask.\n\n\"I'm Zeeber.\"\n\n*return\n\n*label time_check\n*if (free_time \u003c= 100)\n\t*page_break\n\t*goto_scene capture\n*else\n\t*return\n\t\n*label rep\n*if (stationrep)\n\t*return\n*else\n\tOf course, the Dekara authorities might decide to ignore your plea for help, given the unfortunate reputation you've earned on the station.\n\t*return", "ch1": "*temp door false\n*temp attack false\n*temp injured false\n\nPrologue\n\nThe air is hazy from the output of so many breathing masks.  There are Joodars hunched over low tables, Zeekies leaning on the bar, Sandovals clinging to the walls, and a fair number of Shippers, Stashies, and tourist Groundsiders sitting at the human-sized tables.  The lights are low.\n\nYou catch the bartender's attention—she knows what you are drinking, what you always drink.  This is your third in quick succession, but you are sure you can handle it.  Tomorrow is a holiday on Dekara station—no one works on First Spin.  You grab your drink and head over towards the human tables, feeling social.  You don't know those Shippers, but new vessels are always stopping at Dekara Station.  What could go wrong?\n*page_break Chapter One: Awakening\nPart One: Shipside\n\nAwakening\n(Chapter 1 of 6)\n\nYou wake slowly, with a pounding headache.  You are lying on something hard, something that is definitely not your synthobed.  You don't really want to open your eyes, but you suppose you must.  \n\nYou see metal walls, and a metal ceiling—not surprising, since you're a Stashie, an inhabitant of a space station.  But with that thought comes another realization: the gentle hum of the station's air filtration system has been replaced by the harsher roar of a ship in motion!\n\nYou jump to your feet, reeling dizzily.  The door won't open when you push the release button.  The window shows only a long hallway.  You stagger to the pressure seal on the other side of the small room.  Through the transparent material you see a small airlock, and through the airlock's viewport, you see moving stars.  You're definitely on a faster-than-light ship, though you had no plans to board one. \n\nYou take a closer look at the narrow room.  The hard bench you woke on stretches across one long side, and a powered down medibed takes up the other.  You're in a decontamination chamber, and now you understand.  A decontamination chamber makes a good cell.  \n\nLast night, you never should have…\n*choice\n\t#…cheated at Straights.\n\t\t*set stationrep false\n\t\t*set persuasiveness 65\n\t\t*set infamy 35\n\t\t*set empathy 35\n\t\t*set level 60\n\t\tBut who knew those marks were pirates?  You've been fleecing travelers passing through Dekara Station for rotations.  The bartender points out easy targets for you and takes a cut in return.  She made a serious mistake last night, and you're the one paying for it.  You're not a monster—just a small-time con, motivated by…\n\t\t*choice\n\t\t\t#…ordinary greed.\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*goto cell\n\t\t\t#…pride in my superior intelligence.\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*set level %+ 15\n\t\t\t\t*goto cell\n\t\t\t#…hatred of the Shippers and Groundsiders who look down on Stashies.\n\t\t\t\t*set infamy %- 10\n\t\t\t\t*set empathy %- 10\n\t\t\t\t*goto cell\n\t\t\t#…a responsibility to feed my kids.\n\t\t\t\t*set stationrep true\n\t\t\t\t*set kids true\n\t\t\t\t*set empathy %+ 13\n\t\t\t\t*set infamy %- 10\n\t\t\t\t*goto cell\t\t\n\t#…been so eloquent on the topic of Stashie superiority.\n\t\t*set persuasiveness 70\n\t\t*set level 60\n\t\tBut those Shippers were insulting you and your fellow station dwellers—you had to respond in kind!  You had too much…\n\t\t*choice\n\t\t\t#…pride. I have to maintain my station's reputation.\n\t\t\t\t*set empathy %+ 8\n\t\t\t\t*set persuasiveness %+ 10\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*goto cell\n\t\t\t#…loyalty. My fellow Stashies were insulted.\n\t\t\t\t*set stationrep true\n\t\t\t\t*set empathy %+ 15\n\t\t\t\t*goto cell\n\t\t\t#…hatred. I hate Shippers who think they're better than everyone else.\t\n\t\t\t\t*set infamy %- 10\n\t\t\t\t*goto cell\n\t\t\t#…impulsiveness. I rarely think before I speak.\n\t\t\t\t*set level %- 15\n\t\t\t\t*goto cell\t\t\n\t#…hacked the station's tariff records and exposed those pirates.\n\t\t*set stationrep true\n\t\t*set infamy 5\n\t\t*set empathy 60\n\t\t*set hacking 75\n\t\t*set level 70\n\t\tBut it was the right thing to do—your home, Dekara station, survives on the tariffs paid by honest interstellar tradespeople.  It's not fair to make those who pay their taxes compete with smugglers offering cheaper goods.  You were motivated by…\n\t\t*choice\n\t\t\t#…moral principles.\n\t\t\t\t*set stationrep true\n\t\t\t\t*set empathy %+ 15\n\t\t\t\t*goto cell\n\t\t\t#…enlightened self-interest.\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*goto cell\n\t\t\t#…hope of reward and recognition.\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*goto cell\n\t\t\t#…hatred of Shippers who look down on Stashies.\n\t\t\t\t*set infamy %- 10\n\t\t\t\t*set empathy %- 10\n\t\t\t\t*goto cell\n\t\t\t#…pride in my home station.\n\t\t\t\t*set empathy %+ 10\n\t\t\t\t*set persuasiveness %+ 10\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*goto cell\n\t#…posted that compromising picture of the Station Administrator.\n\t\t*set stationrep false\n\t\t*set infamy 15\n\t\t*set hacking 75\n\t\t*set level 70\n\t\tThe corrupt Administrator of your home station must have set these pirates on you.  You know he was taking bribes to waive tariffs (because you hacked your way into his private Memory), so he must have contacts among the smugglers.  You made yourself his enemy, though really you had no choice.  You were compelled to act by your…\n\t\t\n\t\t*choice\n\t\t\t#…moral principles. He is a thief.\n\t\t\t\t*set stationrep true\n\t\t\t\t*set empathy %+ 15\n\t\t\t\t*goto cell\n\t\t\t#…jealousy. I hoped to be elected Administrator myself.\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*set empathy %- 15\n\t\t\t\t*set persuasiveness %+ 15\n\t\t\t\t*set level %+ 10\n\t\t\t\t*goto cell\n\t\t\t#…pride. He is tarnishing my station's reputation.\n\t\t\t\t*set empathy %+ 8\n\t\t\t\t*set persuasiveness %+ 10\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*goto cell\n\t\t\t#…compassion. The station's poor need that money.\n\t\t\t\t*set stationrep true\n\t\t\t\t*set empathy %+ 15\n\t\t\t\t*goto cell\n\t\t\t#…hatred. He's bullied me since childhood.\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*set level %+ 10\n\t\t\t\t*set strength %- 10\n\t\t\t\t*set empathy %- 10\n\t\t\t\t*goto cell\n\t#…started that bar fight.\n\t\t*set stationrep false\n\t\t*set strength 75\n\t\t*set infamy 35\n\t\t*set level 40\n\t\t*set empathy 25\n\t\tBut you couldn't let those pirates insult your fellow Stashies like that.  You have too much…\n\t\t*choice\n\t\t\t#…pride. I have to maintain my station's reputation.\n\t\t\t\t*set empathy %+ 8\n\t\t\t\t*set persuasiveness %+ 10\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*goto cell\n\t\t\t#…loyalty. My fellow Stashies were in danger.\n\t\t\t\t*set stationrep true\n\t\t\t\t*set empathy %+ 15\n\t\t\t\t*goto cell\n\t\t\t#…hatred. I hate Shippers who think they're better than everyone else.\n\t\t\t\t*set infamy %- 10\n\t\t\t\t*goto cell\n\t\t\t#…impulsiveness. I rarely think before I act.\n\t\t\t\t*set level %- 15\n\t\t\t\t*goto cell\n\t#…tried to stop that bar fight. \t\n\t\t*set stationrep true\n\t\t*set strength 75\n\t\t*set infamy 25\n\t\t*set level 40\n\t\t*set empathy 50\n\t\tYou can usually handle anything on the station.  Who knew those pirates would pull stingers?  You had to confront them when they began fighting with those Groundsiders at the bar—you were compelled to act by your…\n\t\t*choice\n\t\t\t#…duty. I'm the bouncer, after all.\n\t\t\t\t*set empathy %+ 10\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*goto cell\n\t\t\t#…compassion. The Groundsiders were in real danger.\n\t\t\t\t*set empathy %+ 15\n\t\t\t\t*goto cell\n\t\t\t#…hatred. I hate Shippers who think they are better than everyone else.\n\t\t\t\t*set infamy %- 10\n\t\t\t\t*goto cell\n\t\t\t#…pride. I own the bar, and keep it civilized.\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*set persuasiveness %+ 10\n\t\t\t\t*set hacking %+ 10\n\t\t\t\t*set level %+ 20\n\t\t\t\t*goto cell \n\n*label cell\nBut that's in the past, now.  Time to face facts: you've been drugged and kidnapped.  The dizziness is beginning to pass, though your limbs still feel heavy.  You decide to take a closer look around your cell.  The only panels that seem to have power are the safety lock beside the pressure seal and a small communication pad by the door.\n\nThe familiar safety lock is designed to keep drunk, distracted, or otherwise impaired people from accidentally exposing themselves to the vacuum.  The display indicates that the airlock is pressurized, so you tap the panel for a quick test of your mental capacity.\n\nThe panel tells you to type the letters in the word \"reckless\" in alphabetical order, so you type:\n*choice\n\t#ceklrss\n\t\t*label misspell\n\t\t*set level %- 10\n\t\t\"Correct response: ceeklrss,\" the panel displays.  You tap to try again.  The next word, \"ship,\" seems even easier to reorder.  You alphabetize the letters, and type:\n\t\t*choice\n\t\t\t#ihps\n\t\t\t\t*label wrong\n\t\t\t\t\"Correct response: hips,\" you read.  You must still be suffering the effects of the drug the pirates gave you.  You concentrate harder, and are able to correctly rearrange the third word.\n\n\t\t\t\t*goto dissolve\n\t\t\t#hips\n\t\t\t\t*set level %+ 5\n\t\t\t\t*goto dissolve\n\t\t\t#pihs\n\t\t\t\t*goto wrong\n\t\t\t#siph\n\t\t\t\t*goto wrong\n\t#ceeklirss\n\t\t*goto misspell\n\t#ceeklrss\n\t\t*set level %+ 10\n\t\t*goto dissolve\n\t#ceeeklrs\n\t\t*goto misspell\n\t\t\n*label dissolve\nThe transparent doorway, at first as hard as diamond, becomes a viscous liquid and drains into the door frame without spilling a drop. It's alien technology—vermite, if you're not mistaken.  These pirates must be rather successful.\n\nThe airlock is scarcely bigger than the decontamination chamber.  There's no flexsuit in the cupboard, only an emergency breather that can collect and dispense a centasecond of oxygen, or about a minute and half, in Groundsider terms.  You take the three-centimeter stick and put in it your pocket, just in case.\n\nThe bulbous viewport is also vermite, which probably means the pirates can space you from outside the cell with one command.  As stars streak by, you get farther and farther from your home station.  What you miss most is…\n*choice\n\t#…my family.\n\t\t*set empathy %+ 10\n\t\t*set infamy %- 10\n\t\t*set persuasiveness %+ 10\n\t\t*set miss \"with your family\"\n\t\t*set kids true\n\t\tHow are your children coping with your disappearance?  Your need to comfort them is an actual physical pain.  You are determined to find your way home.  You desperately miss your…\n\t\t*choice\n\t\t\t#…wife.\n\t\t\t\t*set married true\n\t\t\t\t*set nybat_gender \"woman\"\n\t\t\t\t*set n_he \"she\"\n\t\t\t\t*set n_his \"her\"\n\t\t\t\t*set n_him \"her\"\n\t\t\t\t*set so \"wife\"\n\t\t\t\t*goto garn\n\t\t\t#…husband.\n\t\t\t\t*set married true\n\t\t\t\t*set nybat_gender \"man\"\n\t\t\t\t*set n_he \"he\"\n\t\t\t\t*set n_his \"his\"\n\t\t\t\t*set n_him \"him\"\n\t\t\t\t*set so \"husband\"\n\t\t\t\t*goto garn\n\t\t\t#…children.  I don't see much of my ex-wife.\n\t\t\t\t*set nybat_gender \"woman\"\n\t\t\t\t*set n_he \"she\"\n\t\t\t\t*set n_his \"her\"\n\t\t\t\t*set n_him \"her\"\n\t\t\t\t*goto garn\n\t\t\t#…children.  I don't see much of my ex-husband.\n\t\t\t\t*set nybat_gender \"man\"\n\t\t\t\t*set n_he \"he\"\n\t\t\t\t*set n_his \"his\"\n\t\t\t\t*set n_him \"him\"\n\t\t\t\t*goto garn\n\t#…my friends.\n\t\t*set empathy %+ 10\n\t\t*set persuasiveness %+ 10\n\t\t*set miss \"with your friends\"\n\t\tYou have strong ties to your friends back on Dekara station.  You wonder how long it will take them to notice you are missing, and hope you'll find your way back to them soon.  In the meantime, you'll just have to make friends among the pirates—that's just the kind of outgoing person you are.\n\t\t\n\t\t*goto orientation\n\t#…my political power.\n\t\t*set stationrep true\n\t\t*set miss \"in the political arena you so enjoy\"\n\t\t*set infamy %+ 10\n\t\t*set persuasiveness %+ 10\n\t\t*set level %+ 10\n\t\tBack on the station, you were well-known and respected, with a loyal network of informers and enforcers operating behind the scenes.  A few more months, and you would have been the Administrator of Dekara Station.  Now, you'll have to start from the ground up, building alliances and evaluating those in power.  You know you'll end up on top—that's just who you are.\n\t\t\n\t\t*goto orientation\n\t#…my independence.\n\t\t*set infamy %+ 10\n\t\t*set miss \"in control, free\"\n\t\tYou like to be in control of your life—to set your own schedule, make your own decisions, and never ask permission of anyone.  You don't need to interfere with other people's lives to feel secure, but you don't let anyone order you around, either.  You haven't married yet, though you've had a few serious relationships.  You're looking for someone as self-sufficient as you.\n\t\t\n\t\t*goto orientation\n\t#…my wireless connection to the station network.\n\t\t*set persuasiveness %- 15\n\t\t*set level %+ 10\n\t\t*set miss \"in touch with the station network\"\n\t\tYou feel blind and deaf without the constant input of your myriad electronic connections.  There's no one on the station you'll miss terribly—you mostly interact with people on-line.  But now you are here without even a terminal to delve into, and you'll probably be forced to deal with people face-to-face.\n\t\t\n\t\t*goto orientation\n\t#…my apartment.\n\t\t*set persuasiveness %- 15\n\t\t*set miss \"in your beloved apartment\"\n\t\tYou don't mind being alone—in fact, you prefer it.  However, you like to be in your own space, surrounded by your hard-earned collections and hand-picked hovering visuals.\n\t\t\n\t\t*goto orientation\n\t#…my safety.\n\t\t*set infamy %- 15\n\t\t*set miss \"where you feel secure\"\t\n\t\tYou don't handle uncertainty very well, but here you are, with no idea what will happen to you next.  You try not to imagine the horrible fates these pirates might have in store for you, but you can't help wishing you were safe at home.\n\t\t\n\t\t*goto orientation\n\t#…my customized computer set-up.\n\t\t*set persuasiveness %- 10\n\t\t*set hacking %+ 10\n\t\t*set miss \"with your precious computer array\"\n\t\tYou've spent years assembling an array of hardware and software that grants you unfettered, undetectable, and illegal access to any computer on the station.  Without your masterpiece, you feel information-starved, blind and deaf.\n\t\t\n\t\t*goto orientation\n\t\t\n*label orientation\n*choice\n\t#I miss my girlfriend, too.\n\t\t*set nybat_gender \"woman\"\n\t\t*set n_he \"she\"\n\t\t*set n_his \"her\"\n\t\t*set n_him \"her\"\n\t\t*set so \"girlfriend\"\n\t\t*goto garn\n\t#I miss my boyfriend, too.\n\t\t*set nybat_gender \"man\"\n\t\t*set n_he \"he\"\n\t\t*set n_his \"his\"\n\t\t*set n_him \"him\"\n\t\t*set so \"boyfriend\"\n\t\t*goto garn\n\t#At least I don't have a girlfriend to miss, though I've been looking.\n\t\t*set nybat_gender \"woman\"\n\t\t*set n_he \"she\"\n\t\t*set n_his \"her\"\n\t\t*set n_him \"her\"\n\t\t*goto garn\n\t#I don't have a boyfriend to miss, though not for lack of trying.\n\t\t*set nybat_gender \"man\"\n\t\t*set n_he \"he\"\n\t\t*set n_his \"his\"\n\t\t*set n_him \"him\"\n\t\t*goto garn\n\t#I wish I had a boyfriend or girlfriend to miss. Either would work for me.\n\t\t*set nybat_gender \"woman\"\n\t\t*set n_he \"she\"\n\t\t*set n_his \"her\"\n\t\t*set n_him \"her\"\n\t\t*goto garn\n\t#Stars be thanked, I'm not interested in romance, and haven't left anyone behind.\n\t\t*set nybat_gender \"man\"\n\t\t*set n_he \"he\"\n\t\t*set n_his \"his\"\n\t\t*set n_him \"him\"\n\t\t*goto garn\n\n*label garn\n\nAs you return to your cell, the call light by the door changes from red to green.\n\nA gravelly voice says, \"Well, if it isn't the stinking Stashie, waking up at last.  I'm Gao, and I'll be your guard for today.  This is the Reckless, out of None-of-your-spacing-business.  Lunch is in two kiloseconds, and if you behave 'til then I might just bring you some.\"\n\nYou may be a Stashie, station born and bred, but you don't stink.  Or at least, not usually.  At the moment you could use a shower and a change of clothes.\nYou insist, \"My name is…\"\n*choice\n\t#Davo.\n\t\t*set name \"Davo\"\n\t\t*goto respond\n\t#Elarin.\n\t\t*set name \"Elarin\"\n\t\t*goto respond\n\t#Jin-lo.\n\t\t*set name \"Jin-lo\"\n\t\t*goto respond\n\t#Lexima.\n\t\t*set name \"Lexima\"\n\t\t*goto respond\n\t#Madria.\n\t\t*set name \"Madria\"\n\t\t*goto respond\n\t#Ramik.\n\t\t*set name \"Ramik\"\n\t\t*goto respond\n\t#Savern.\n\t\t*set name \"Savern\"\n\t\t*goto respond\n\t#Other.\n\t\tType your name:\n\t\t\n\t\t*input_text name\n\t\t*page_break\n\t\t*goto respond\n\n*label respond\n${name} is a common name on Dekara Station for…\n*fake_choice\n\t#…a man.\n\t#…a woman.\nYou tell Gao:\n*choice\n\t#\"I plan on behaving.  I may not have signed up for this trip, but I'm here now.  There's no reason we can't be cordial.\"\n\t\t*set persuasiveness %+ 5\n\t\t\"Considerate of you,\" Gao says gruffly.\n\t\t\n\t\t\"Can't you tell me what your boss has planned for me?\"\n\t\t\n\t\t*goto future\n\t#\"What are you going to do with me?\"\n\t\t*label future\n\t\t\"Who knows?  If Captain Zoa thinks she can use you, and you stay out of Krantic's way, you'll be fine.  Just do as you're told, that's my suggestion.  That's what I did, when they needed an economist and grabbed me fifteen rotations ago.  Now seal it.  The Captain wants a report on vermite prices before lunch.\"\n\t\t\n\t\tThe communications console loses power, and you are alone again.\n\t\t\n\t\t*goto ch_qu\n\t#\"Get over here this minute and face me!\"\n\t\t*set infamy %+ 8\n\t\t\"Tough one, are you?  Well, listen up, ${name}.  I take orders from two people only, and you're not as smart as the Captain or as crazy as Krantic.  So I guess you won't be eating lunch, after all.\"\n\t\t\t\t\n\t\tA sharp beep tells you Gao has closed the connection.  You try to raise him again, but he doesn't answer.  Two kiloseconds come and go, and he fails to bring you any food.  You are getting quite hungry.\n\t\t*goto ch_qu\n\t#\"I may be a Stashie, but no one stinks like a rotten pirate.\"\n\t\t*set infamy %+ 8\t\n\t\t\"That all you got?  Try harder next time,\" Gao answers, unfazed.\n\t\t\n\t\t\"I don't waste my best material on flunkies,\" you quip.\n\t\t\n\t\tGao snorts.  \"Think you're smart, do you?  Shut up, ${name}.  I'm trying to read.\"\n\t\t\n\t\t\"It's just this small matter of my life expectancy that's bothering me,\" you say.  \"What does your boss have planned for me?\"\n\t\t\n\t\t*goto future\n\t\t\n*label ch_qu\n*page_break\nYou stare at the bare metal walls, feeling like an antenna torn from a hull at hyperspeed, left to drift in space.  Of course the station has projectors everywhere, so you are usually surrounded by hovering visuals, the holographic scenes you've chosen for your own apartments or the garish ads that line the station corridors.\n\nWhat you hate most about being trapped in a cell is…\n\n*choice\n\t#…being alone, with no one to talk to.\n\t\t*set empathy %+ 10\n\t\t*set persuasiveness %+ 10\n\t\t*set infamy %- 5\n\t\tYou miss your ${so} terribly.\n\t\t\n\t\t*goto krantic\n\t#…having nothing to occupy my mind.\n\t\t*set level %+ 10\n\t\t*set infamy %+ 5\n\t\t*goto krantic\n\t#…sitting still, without room to move around.\n\t\t*set strength %+ 10\n\t\t*set infamy %+ 5\n\t\t*goto krantic\n\t#…containing my rage against the pirates.\n\t\t*set infamy %+ 10\n\t\t*set empathy %- 10\n\t\t*goto krantic\n\t\t\n*label krantic\nWithout warning, the door to your cell opens, and a man strides in.  He is tall, pale, and muscular, with multitudes of magnetized dreads—tawny hair and gold wire—heaped from head to shoulder
