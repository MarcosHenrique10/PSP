o utambu_smiles\n\t\t#…reply, \"Luckily, I'm the forgiving type, too.\"\n\t\t\t*set infamy %- 15\n\t\t\tAs you wipe yourself off, you hear snorts of laughter from around the table.  You glance up at your kidnappers, and intercept a few predatory smiles.  The pirates seem to think you're an easy target now, all except Ny-bat and Utambu, who gives you a small sympathetic smile.\n\t\t\t\t\t\t\t\n\t\t\t*goto next_victim\n\t\t#…loom over her threateningly.\n\t\t\tYou can't show weakness, or the whole crew will think you're an easy target.\n\t\t\t*label loom\n\t\t\tYou lean over Vikola, taking full advantage of your intimidating position.  You make your voice hard, and your face grim.  \"Is there a problem?\" you ask.\n\t\t\t\t\t\t\t\n\t\t\t*if ((infamy > 45) or (strength >= 75))\n\t\t\t\t*set infamy %+ 15\n\t\t\t\tVikola seethes, but can't meet your eyes.  Her fingers whiten as she attempts to strangle a spoon.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\"There's no problem,\" says Ny-bat, before Vikola can find a reply.  $!{n_his} deep voice has a ring of calm authority to it.  \"Sit down.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\tYou nod and return to your seat, reputation intact.  Vikola's spoon clatters against her plate.  Her crewmates\n\t\t\t\t*label busy\n\t\t\t\tare suddenly quite busy buttering their bread.\n\t\t\t\t*goto utambu_smiles\n\t\t\t*elseif ((infamy > 30) or (strength > 55))\n\t\t\t\t*set infamy %+ 8\n\t\t\t\t\"You'd need a mirror to see it,\" Vikola says, beginning to stand.\n\t\t\t\t\n\t\t\t\tYou put a hand on her shoulder and easily prevent her from rising.  The result is somewhat awkward for Vikola, as she loses her balance and sticks her elbow into her buttered bread.\n\t\t\t\t\n\t\t\t\t\"No brawling in the mess,\" Ny-bat says.  $!{n_his} deep voice has a ring of calm authority to it.  \"You don't wish to be restrained again, do you?\" \n\t\t\t\t\n\t\t\t\t\"Was that a brawl?\" you ask, returning to your seat. Your kidnappers\n\t\t\t\t*goto busy \n\t\t\t*else\n\t\t\t\t*set infamy %- 15\n\t\t\t\t\"Am I supposed to be scared?\" Vikola asks with a malicious grin.  \"Why don't you sit down, before you strain something.  You being the delicate type, and all.\"\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tThe crew laughs at you, all except Ny-bat and Utambu.  You slouch back to your seat.  Unfortunately, you're simply not that intimidating.\n\t\t\t\t\t\t\t\t\n\t\t\t\tUtambu gives you a small sympathetic smile.\n\t\t\t\t\n\t\t\t\t*goto next_victim\n\n*label ally\nYou spend a lot of time in the mess hall over the next few days, sometimes tethered to (but not under) the table, sometimes allowed to relax in a synthochair, depending on the temperament of your guard.  You and the pirates become familiar to one another, if not exactly friends.  You have nothing to do other than contemplate your dilemma, and talk to the pirates when they come to eat, so you decide to better your situation by making an ally.  You may need as many as you can get, before your ordeal is over.\n\nYou decide to focus your attention on…\n*choice\n\t#…Gao.\n\t\t*set infamy %+ 15\n\t\t*gosub gaocheck\n\t\tThe gruff economist is well-liked by the rest of the crew; they go to him for advice on investing their earnings and planning for the future.  Gao neither threatens those pirates who insist on macho posturing, nor submits to any hazing.  He walks a middle road, gaining respect while making no enemies, so he's a good ally to have.\n\t\t\n\t\tIt's easy to keep Gao talking, as long as you're willing to discuss vermite.  You learn how thick a vermite coating must be to seal a starship, how much heat the microorganisms need to stay alive, and how much computing power is needed to regulate the vermite's behavior.\n\t\t\n\t\t*if ((level >= 50) or (persuasiveness >=50))\n\t\t\tGao thinks you have the skills to be a good salesperson, and keeps hoping you'll join the Reckless crew, so he takes it upon himself to teach you to negotiate.\n\t\t\t\n\t\t\tTo sell vermite (and project the right image while doing it), you have to calculate equivalencies in the twelve major currencies employed in this part of the spiral, to know what Spider charges clients of the various races, and to emphasize how much your clients will save by not paying taxes.\n\n\t\t\t\"It's like this,\" Gao says.  \"A Joodar freighter offers you a hundred-joo chip per meter cubed.  You know Spider charges 90, but the Joodar collective adds twenty percent tax.  Do you take the deal?\"\n\t\t\t*fake_choice\n\t\t\t\t#\"Sure!  I make 10 more than Spider, and the Joodar saves 8.\"\n\t\t\t\t\t*set persuasiveness %- 10\n\t\t\t\t\t\"What are you, a Groundsider?\"  Gao shakes his head in disbelief, as if shocked by your idiocy.  \"You never take a first offer.  Ask for 108, settle for 105.\"\n\t\t\t\t#\"I ask for 105.  The Joodar still saves 3.\"\n\t\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t\tGao shakes his head.  \"You settle for 105.  But ask for 108, so you can meet in the middle.\"\n\t\t\t\t#\"I ask for 108, what the Joodar usually pays.  Vermite is rare.\"\n\t\t\t\t\t*set persuasiveness %+ 15\n\t\t\t\t\t\"Good.\"  Gao nods in approval.  \"Ask high, settle for 105.\"\t\t\n\t\t\t\t#\"I sell it for 95, to attract more customers.\"\n\t\t\t\t\t*set persuasiveness %- 15\n\t\t\t\t\t\"What are you, a Groundsider?\" Gao shakes his head in disbelief, as if shocked by your idiocy.  \"The point of this is to make money.  As much money as possible.  You ask for 108, settle for 105.  Everyone's desperate for vermite; we won't have any trouble finding customers.\"\n\t\t\t*comment endif\n\t\t\t\n\t\t\tYou practice bargaining with Gao until he's satisfied…or too bored to continue.  It's hard to tell sometimes, with Gao.\n\t\t\t*page_break\n\t\t\t*goto rep\n\t\t*else\n\t\t\t*page_break\n\t\t\t*goto rep\n\t#…Zeeber.\n\t\t*gosub zeebercheck\n\t\t*set empathy %+ 20\n\t\tZeeber is starved for attention, poor kid, and when you show her a little kindness, she latches onto you like a magnetic tether.  She begs to be assigned as your guard, but Zoa refuses.  Even so, she spends hours talking to you, brings you small comforts like an extra pillow, and shows you and your bored guard all around the ship, more thoroughly than anyone else would have done.\n\n\t\tThough you sometimes tire of the kinds of wisecracks teenagers find hilarious, you come to care about Zeeber almost despite yourself.  You learn all about her childhood as a Sandovali slave, and listen somewhat unhappily as she sings Zoa's praises.  You're sure Zoa is brilliant and brave, but she'll never be the parent Zeeber needs.  You're not quite ready to volunteer for the job yourself, but by the end of the first week, you're sure Zeeber would do anything for you, wise or otherwise.\n\t\t*page_break\n\t\t*goto rep\n\t#…Utambu.\n\t\t*gosub utambucheck\n\t\t*set hacking %+ 15\n\t\tWhen it's Utambu's turn to guard you, he brings you down to the engine deck.  After watching him work for a while, you offer to help assemble the speech boxes the pirates will take on the mission to 4-7-2.  You reason that communication is essential to avoiding violence, so you are not violating your principles by aiding Utambu.\n\t\t\t\t\n\t\tUtambu is grateful for the help; apparently not many of the crew are interested in the technical aspects of their trade.  As you work side by side, you can't help but become friends with the man.  He's a basically harmless individual, barely in his twenties, who has lived most of his life on a family-owned trader.  Like most Shippers, the ideas of borders and tariffs seem strange to him, so he has no ethical objection to smuggling. The rough behavior of some of the pirates was a shock to him, after his sheltered upbringing, but his folks need the money, so he has tried to adjust.  He doesn't challenge anyone, and so they mostly let him be.  A little kindness on your part makes a big impression, though, so by the end of the first week you've gained some technical knowledge and an ally.\n\t\t*page_break\n\t\t*goto rep\n\t#…Ny-bat.\n\t\t*gosub nybatcheck\n\t\t*set strength %+ 10\n\t\t*set infamy %+ 10\n\t\t*set workout true\n\t\tWhen it's Ny-bat's turn to guard you, ${n_he} takes you to the training room.  Ny-bat is considered to be the best hand-to-hand fighter on the ship, and not just because of ${n_his} longer reach and exaggerated height.  You ask ${n_him} to teach you hand-to-hand, but ${n_he} declines to instruct you, since you are still a prisoner.  However, ${n_he} allows you to copy the forms of ${n_his} graceful exercise routine, and to learn what you can simply by watching.  As you practice together, you learn ${n_his} history.\n\t\t\n\t\tAs a child on the planet Evergreen, a planet with only 75% of Earth's mass and gravity, Ny-bat cleaned the home of a martial arts master in return for the lessons ${n_his} family could not afford.  $!{n_he} used those skills to defend himself against the roving gangs of street children who resented anyone with a roof over their heads.  Before long, ${n_he} had made peace between the children of his neighborhood, convincing them to steal food from those in the better part of the town instead of from each other.  $!{n_he} became something of a leader, until ${n_he} grew too old for the children to trust, and decided to embark on the Reckless.\n\t\t\t\t\n\t\tThe crew respects Ny-bat for ${n_his} unruffled calm, ${n_his} quiet wisdom, and ${n_his} physical prowess.  You are lucky to have an opportunity to befriend ${n_him}, because you could not have chosen a better ally.\n\t\t*page_break\n\t\t*goto rep\n\t#…no one.\n\t\tYou don't want to form ties to any of the pirates, since you plan to escape from them as soon as possible.\n\t\t\n\t\t*goto rep\n\n*label rep\nNow that they know you, most of the pirates treat you with a modicum of respect.  Only Vikola and her cronies make you suffer when they are assigned to guard you: insisting that you be foamed, keeping you tethered to the furniture, and delaying or skipping your meals.  (You see little of Zoa or Krantic, who commands the night shift.)\n\nYou decide to handle Vikola's gang by…\n*choice\n\t#…refusing to react.\n\t\t*set level %+ 5\n\t\t*set empathy %+ 5\n\t\tWhen one of Vikola's cronies demeans you, you simply refuse to engage, shutting down and entering an almost meditative state.  Your lack of affect at these times drives the insulting pirates crazy.\n\t\t\n\t\t*if (nybat_ally)\n\t\t\tNy-bat notices, though, and thinks it is safer to have everyone's respect.\n\t\t\t*goto nyadvice\n\t\t*elseif (zeeber_ally)\n\t\t\tZeeber notices, though, and thinks you need to stand up for yourself, or their behavior will only get worse.\n\t\t\t*goto zeeberad\n\t\t*elseif (utambu_ally)\n\t\t\tUtambu notices, though, and thinks you need to stand up for yourself.\n\t\t\t*goto hack\n\t\t*else\n\t\t\tGao notices, though, and thinks you need to be able to work with everyone on the crew.\n\t\t\t*goto gaoad\n\t#…insulting them in return.\n\t\tYour mocking only goads the pirates, and the situation escalates until you and Vikola can't be in the same room without shouting insults at each other.  The captain calls you to her office.\n\t\t\n\t\t*goto captainad\t\t\n\t#…asking Gao's advice.  The pirates like him best.\n\t\t*label gaoad\n\t\t*if (gao_ally = false)\n\t\t\tYou ask your guard to take you to Gao in the comm room, where he is scanning stock values on various worlds.  He has so many hovers running, the displays cover the walls and the ceiling.\n\t\t\t\n\t\t\t\"So now you want advice?\" he asks.  \"Tough luck.\"\n\t\t\t\n\t\t\t\"I'm just trying to survive here.  You were new once, remember?  And now everyone trusts you.  How did you do it?\"\n\t\t\t\n\t\t\tGao grunts, but you can see he doesn't have the heart to refuse you.\n\t\t\t*page_break\n\t\t\t\"You don't have to be friends with Vikola and her crew.  You have to make them respect you, though.  Otherwise you might find a hole in your flexsuit.  Accidentally get left behind on an alien world.  You see what I'm saying,\" he tells you.\n\t\t\t*goto how\n\t\t*else\n\t\t\t\"You don't have to be friends with Vikola and her crew,\" Gao tells you one day in the comm room, where he is scanning stock values on various worlds.  He has so many hovers running, the displays cover the walls and the ceiling.  \"You have to make them respect you, though.  Otherwise you might find a hole in your flexsuit.  Accidentally get left behind on an alien world.  You see what I'm saying.\"\n\t\t\t*label how\n\t\t\t\n\t\t\t\"How do I get their respect?\" you ask.\n\n\t\t\t\"Beat them at Z-ball.  At the shooting range.  At hand-to-hand.\"\n\n\t\t\t\"That's not what you do,\" you protest.\n\n\t\t\t\"I make them money.  Find your own way.  Now seal it.  I'm reading,\" he says.\n\n\t\t\tYou just smile, used to his abrupt manner by now, knowing that he wouldn't be giving you advice if he didn't think you were worth it.\n\n\t\t\tYou think over Gao's suggestions, and decide…\n\t\t\t*choice\n\t\t\t\t#…I'll challenge Hammer to a game of Z-ball.\n\t\t\t\t\t*gosub gaocheck\n\t\t\t\t\t*label zball\n\t\t\t\t\tEntertainment is scarce in deep space, so Zoa agrees to let you play.  Most of the pirates come to watch the competition.  Hammer doesn't chat as the two of you ricochet back and forth across the the zero-G court, slamming the ball with your open hands.  But then, friendship was never the point of this little exercise.\n\t\t\t\t\t\n\t\t\t\t\tWhen you pause for a water break, you see a flurry of activity around Gao, and realize he's taking bets.\n\t\t\t\t\t\n\t\t\t\t\t*if (strength >= 75)\n\t\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t\tYou beat Hammer, but only by 3, so he is in no way humiliated.  He\n\t\t\t\t\t\t*label game\n\t\t\t\t\t\tgives you a nod of grudging approval, so you suppose you've succeeded in tempering his dislike.\n\t\t\t\t\t\t\n\t\t\t\t\t\tVikola lost money betting on Hammer, so she hates you more than ever.  At least now you only have to worry about her and Krantic, rather than a whole faction that's set against you.\n\t\t\t\t\t\t*achieve acceptance\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cards\n\t\t\t\t\t*elseif (strength > 50)\n\t\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t\tYou lose by 3, so you are in no way humiliated.  Hammer\n\t\t\t\t\t\t*goto game\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou lose by 20, a humiliating amount.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Waste of time,\" Hammer tells you, turning away in disgust.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (gao_ally)\n\t\t\t\t\t\t\tHis exit is blocked by Gao, who hands him a money chip.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"What's this?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Your share of the take.  Compensation for the bar on Dekara.  Didn't ${name} tell you?\" Gao says.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tComprehension dawns on Hammer's face, and he nods at you with grudging approval.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I just saved your reputation,\" Gao says, scowling at you after Hammer has left.  But by now you know that scowl is Gao's equivalent of a smile.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto cards\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*set infamy %- 15\n\t\t\t\t\t\t\tYou've actually made your situation worse.  Now Vikola has something new to taunt you with, and taunt she does, over the entire next week.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto cards\n\t\t\t\t#…I'll challenge Vikola to a shooting match.\n\t\t\t\t\t*gosub gaocheck\n\t\t\t\t\t*label shoot\n\t\t\t\t\tEntertainment is scarce in deep space, so Zoa agrees to let you compete.  Most of pirates come to watch.\n\t\t\t\t\t\n\t\t\t\t\t\"Look familiar, Stashie?\" sneers Vikola, as she calls up a hovering visual onto the shooting range wall.  You know this program: it simulates a headlong rush down typical station corridors through a marketplace, during which the players are meant to shoot as many of the station's inhabitants as possible.\n\t\t\t\t\t\n\t\t\t\t\t*if (strength >= 75)\n\t\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\t\tLuckily, it takes more than that to rattle you.  You easily beat Vikola, and earn the respect of the watching pirates.  Even Hammer gives you a nod of approval when the wall flashes your scores.\n\t\t\t\t\t\t\n\t\t\t\t\t\tVikola hates you more than ever; she seems to think you meant to humiliate her, not impress her.  At least now you only have to worry about her and Krantic, rather than a whole faction that's set against you.\n\t\t\t\t\t\t*achieve acceptance\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cards\n\t\t\t\t\t*elseif (strength > 50)\n\t\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t\tLuckily, it takes more than that to rattle you.  You lose by 3, so you are in no way humiliated.  Even Hammer gives you a nod of approval when the wall flashes your scores.\n\t\t\t\t\t\t\n\t\t\t\t\t\tOnly Vikola refuses to be impressed, and continues to mock you.  At least now you only have to worry about her and Krantic, rather than a whole faction that's set against you.\t\n\t\t\t\t\t\t*achieve acceptance\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cards\n\n\t\t\t\t\t*else\n\t\t\t\t\t\t*set infamy %- 15\n\t\t\t\t\t\tYou lose by 25, a humiliating amount.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Waste of time,\" Vikola tells you, smirking.  \"You're worse than Zeeber.  Better ask the kid for some tips.\"\n\n\t\t\t\t\t\tYou've actually made your situation worse.  Now Vikola has something new to taunt you with, and taunt she does, over the entire next week.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cards\n\t\t\t\t#…I'll impress in my own way, with a hilarious hack.\n\t\t\t\t\t*gosub gaocheck\n\t\t\t\t\t*goto hack\n\t\t\t\t*if (workout = false) #…I'll ask Ny-bat to teach me hand-to-hand. $!{n_he}'s the best.\n\t\t\t\t\t*gosub gaocheck\n\t\t\t\t\t*gosub nybatcheck\n\t\t\t\t\t*label lesson\n\t\t\t\t\t*set strength %+ 10\n\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t*set workout true\n\t\t\t\t\tNy-bat is considered to be the best hand-to-hand fighter on the ship, and not just because of ${n_his} longer reach and exaggerated height.  You ask ${n_him} to teach you hand-to-hand, but ${n_he} declines to instruct you, since you are still a prisoner.  However, ${n_he} allows you to copy the forms of ${n_his} graceful exercise routine, and to learn what you can simply by watching.  As you practice together, you learn ${n_his} history.\n\t\t\n\t\t\t\t\tAs a child on the planet Evergreen, a planet with only 75% of Earth's mass and gravity, Ny-bat cleaned the home of a martial arts master in return for the lessons ${n_his}  family could not afford.  $!{n_he} used those skills to defend ${n_him}self against the roving gangs of street children who resented anyone with a roof over their heads.  Before long, ${n_he} had made peace between the children of ${n_his} neighborhood, convincing them to steal food from those in the better part of the town instead of from each other.  He became something of a leader, until ${n_he} grew too old for the children to trust, and decided to embark on the Reckless.\n\t\t\t\t\n\t\t\t\t\tThe crew respects Ny-bat for ${n_his} unruffled calm, ${n_his} quiet wisdom, and ${n_his}  physical prowess.  They're beginning to see you as under ${n_his} protection, and so Vikola's followers moderate their treatment of you.\n\t\t\t\t\t\n\t\t\t\t\tVikola still hates you as much as ever, but now you only have to worry about her and Krantic, rather than a whole faction that's set against you.\n\t\t\t\t\t*achieve acceptance\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto cards\n\t\t\t\t*if (workout = true) #I'll ask Hammer to go hand-to-hand a few rounds.\n\t\t\t\t\t*gosub gaocheck\n\t\t\t\t\t*label fight\n\t\t\t\t\tEntertainment is scarce in deep space, so Zoa agrees to let you fight Hammer.  Most of pirates come to watch.  As you circle the mat and throw the first few punches, you analyze the older pirate's fighting style.  Hammer is powerful, but not fast.\n\t\t\t\t\t\n\t\t\t\t\t*if (strength >= 75)\n\t\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\t\tNy-bat's forms were all you needed to become Hammer's equal.  You dart under Hammer's defenses and duck his blows, not all the time, but enough to provide him with a challenge.  You each drop each other twice, before he gives you a nod of approval and calls a halt.\n\t\t\t\t\t\t\n\t\t\t\t\t\tOnly Vikola refuses to be impressed, and continues to degrade you.  At least now you only have to worry about her and Krantic, rather than a whole faction that's set against you.\n\t\t\t\t\t\t*achieve acceptance\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cards\n\t\t\t\t\t\t\n\t\t\t\t\t*elseif (strength > 50)\n\t\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t\tYou dart under Hammer's defenses a few times, and land a few solid blows.  You can't actually get the better of him; you haven't learned enough from watching Ny-bat to counter Hammer's sheer muscle and decades of experience.  But at least you make him work for the win each time he drops you to the mat.  After four bouts, Hammer gives you a nod of approval and calls a halt.\n\t\t\t\t\t\n\t\t\t\t\t\tOnly Vikola refuses to be impressed, and continues to degrade you.  At least now you only have to worry about her and Krantic, rather than a whole faction that's set against you.\t\n\t\t\t\t\t\t*achieve acceptance\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cards\t\t\t\n\t\t\t\t\t*else\n\t\t\t\t\t\t*set infamy %- 15\n\t\t\t\t\t\tUnfortunately, you haven't learned enough from watching Ny-bat to counter Hammer's sheer muscle and decades of experience.  He beats you easily and repeatedly.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Waste of time,\" he tells you, stomping away after dropping you to the mat for the fourth time.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou've actually made your situation worse.  Now Vikola has something new to taunt you with, and taunt she does, over the entire next week.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto cards\n\t\t\t\t#…I'll win at cards.\n\t\t\t\t\t*gosub gaocheck\n\t\t\t\t\t*goto cards\n\t\t\t\t#…I refuse to care what those pirates think of me.\n\t\t\t\t\t*set empathy %+ 5\n\t\t\t\t\tYou'd rather be true to yourself than take Gao's advice.\n\t\t\t\t\t\n\t\t\t\t\t*goto cards\t\n\t#…asking Ny-bat's advice. The pirates respect ${n_him} the most.\n\t\t*label nyadvice\n\t\tYou raise the subject when Ny-bat is next assigned to guard you.\n\t\t\n\t\t\"You don't need their friendship, but you do need their respect.  Otherwise, accidents happen groundside, people get left behind.  Do you see?\" Ny-bat asks.  $!{n_he} is warming up in the training room/shooting range the pirates use to hone their skills.  It's a relatively small cube, compared to a station gym, but the plastic floor absorbs shocks, and one wall has a complete hover that can show various interactive vistas suitable for target practice.\n\t\t\n\t\t\"People who see kindness as a weakness must be cowed by authority.  You must act with confidence, and impress them with skill.\"\n\t\t\n\t\t\"Like you do.\"\n\t\t\n\t\tNy-bat drops ${n_his} arms from their formal defensive pose.  \"To be honest, it makes me tired sometimes, to always be so respected, to always make peace and check the crew's worse impulses, to always give advice and settle disagreements.  Everyone turns to me, and it would be pleasant, sometime, to have someone to turn to myself….\"  $!{n_he} raises ${n_his} arms, abruptly, and executes a formal attack that leaves ${n_him} facing away.\n\t\t\n\t\tIs Ny-bat obliquely indicating ${n_he}'s interested in you romantically?  You're not sure.\n\t\t*gosub so_check\n\t\t*choice\n\t\t\t#I'll ignore it. I'm not attracted to ${n_him}.\n\t\t\t\t*set nybat_rom 1\n\t\t\t\t*label nychoice\n\t\t\t\t\"So you think I should impress them,\" you say, returning to the subject at hand.\n\t\t\t\t*choice\n\t\t\t\t\t#I'll challenge Hammer to a game of Z-ball.\n\t\t\t\t\t\t*gosub nybatcheck\n\t\t\t\t\t\t*goto zball\n\t\t\t\t\t#I'll challenge Vikola to a shooting match.\n\t\t\t\t\t\t*gosub nybatcheck\n\t\t\t\t\t\t*goto shoot\t\t\t\t\n\t\t\t\t\t#I'll impress in my own way, with a hilarious hack.\n\t\t\t\t\t\t*gosub nybatcheck\n\t\t\t\t\t\t*goto hack\n\t\t\t\t\t*if (workout = false) #\"It would help if you taught me hand-to-hand, Ny-bat.\"\n\t\t\t\t\t\t*gosub nybatcheck\n\t\t\t\t\t\t*goto lesson\t\t\t\t\t\t\n\t\t\t\t\t*if (workout = true) #I'll ask Hammer to go hand-to-hand a few rounds.\n\t\t\t\t\t\t*gosub nybatcheck\n\t\t\t\t\t\t*goto fight\n\t\t\t\t\t#I'll win at cards.\n\t\t\t\t\t\t*gosub nybatcheck\n\t\t\t\t\t\t*goto cards\n\t\t\t\t\t#I refuse to care what those pirates think of me.\n\t\t\t\t\t\t*set empathy %+ 5\n\t\t\t\t\t\tYou'd rather be true to yourself than take Ny-bat's advice.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto cards\n\t\t\t*if (so != \"none\") #I'll ignore it. My ${so} is waiting for me.\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t*set nybat_rom 1\n\t\t\t\t*set married true\n\t\t\t\t*goto nychoice\n\t\t\t#I'll ignore it. I don't know how I feel.\n\t\t\t\t*set nybat_rom 2\n\t\t\t\t*goto nychoice\n\t\t\t#I'll encourage ${n_him}. I like ${n_him}.\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t*label respond\n\t\t\t\t*gosub nybatcheck\n\t\t\t\t*set nybat_rom 3\n\t\t\t\t\"Everyone's looking for someone like that,\" you say.\n\t\t\t\t\n\t\t\t\tNy-bat turns around, and you look at each other for a moment.  It's nothing you can put a name to, but it's a beginning, maybe.\n\t\t\t\t\n\t\t\t\t*goto nychoice\n\t\t\t#I'll encourage ${n_him}. It may be to my advantage.\n\t\t\t\t*set empathy %- 10\n\t\t\t\t*set nybat_rom 2\n\t\t\t\t*goto respond\t\t\t\t\n\t#…asking Zoa's advice.  She's the captain.\n\t\t*label captainad\n\t\tYou ask your guard to take you to the captain's office, and explain the situation to Zoa as she sits in her chair surrounded by hovering visuals.  You can see only an echo of her face through the semi-transparent images.\n\t\t\n\t\t\"Are you telling me you are not capable of handling a little hazing from my crew?\" she asks you, voice hard.  \"Are you telling me that you would like to leave us, now, in mid-flight?\"\n\t\t\n\t\t\"No.  That's not what I'm saying,\" you choke out, throat closing in fear.  The civility of some of the pirates had made you forget that Zoa could order you spaced at any time.\n\t\t\n\t\t\"Then get out,\" says Zoa.\n\t\t*page_break\n\t\tYour guard is sympathetic, and offers to take you to Ny-bat.  You realize you should have gone to ${n_him} first.  You've seen ${n_him} managing conflicts between crew members.\n\t\t\n\t\t*goto nyadvice\n\t#…asking Zeeber's advice. She watches everyone.\n\t\t*label zeeberad\n\t\tZeeber is not considered responsible enough to guard you, but you convince one of your guards to take you to her.\n\t\t\n\t\t\"I run Vikola's laundry over to the sterilizer.  I hide some dessert for Hammer if he's got late shift.  So they leave me alone,\" Zeeber says.  \"You gotta do stuff for them.  Or you gotta be better than them, like Ny-bat.  No one on the ship can take Ny-bat.  So ${n_he}'s got respect.\"\n\t\t\n\t\tYou and Zeeber are in the training room/shooting range the pirates use to hone their skills.  It's a relatively small cube, compared to a station gym, but the plastic floor absorbs shocks, and one wall has a complete hover that can show various interactive vistas suitable for target practice.  Zeeber is practicing with the projectile weapons the pirates will use on 4-7-2 because of the supersaturated atmosphere.  The projectiles exit from a twenty-centimeter long cylinder, so the guns look like something from humanity's primitive Groundsider days.\n\t\t\n\t\t\"I don't think running errands will work for me, kid,\" you tell Zeeber, smiling at her.\n\t\t\n\t\t\"Don't call me a kid.  I have to be crew, or Zoa will put me off.  So I'm crew,\" she reminds you, for the third time today, at least.  \"You have to impress them.  Aren't you good at anything?  I mean, you must be good at something, ${name}!\"\n\t\t*choice\n\t\t\t#I'll challenge Hammer to a game of Z-ball.\n\t\t\t\t*gosub zeebercheck\n\t\t\t\t*goto zball\n\t\t\t#I'll challenge Vikola to a shooting match.\n\t\t\t\t*gosub zeebercheck\n\t\t\t\t*goto shoot\t\t\t\t\n\t\t\t#I'll impress in my own way, with a hilarious hack.\n\t\t\t\t*gosub zeebercheck\n\t\t\t\t*goto hack\n\t\t\t*if (workout = false) #I'll ask Ny-bat to teach me hand-to-hand.\n\t\t\t\t*gosub zeebercheck\n\t\t\t\t*goto lesson\t\t\t\t\t\t\n\t\t\t*if (workout = true) #I'll ask Hammer to go hand-to-hand a few rounds.\n\t\t\t\t*gosub zeebercheck\n\t\t\t\t*goto fight\n\t\t\t#I'll win at cards.\n\t\t\t\t*gosub zeebercheck\n\t\t\t\t*goto cards\n\t\t\t#I refuse to care what those pirates think of me.\n\t\t\t\t*set empathy %+ 5\n\t\t\t\tYou'd rather be true to yourself than take Zeeber's advice.\n\t\t\t\n\t\t\t\t*goto cards\t\t\t\t\t\t\t\n\t#…joining forces with Utambu. He's also tormented by them.\n\t\t*label hack\n\t\t*gosub utambucheck\n\t\t\"You think I should do something nasty to them?\" Utambu asks, with undisguised glee.  \"Because I've tried being nice.\"\n\t\t\n\t\tYou are sitting in Utambu's workshop, at a table piled high with computer components, strangely colored metal, and kilometers of conduit.  This week, Utambu is working on a better way to store energy in the dark between the stars.  Last week he was rewriting the life-support software, programming it to predict the effects of a concentration of the ship's crew in any one area and respond accordingly.\n\t\t\n\t\t\"You have access to all the ship's systems, don't you?\" you ask him.\n\t\t\n\t\t\"What are you thinking, ${name}?  Cold showers?\"\n\t\t\n\t\t\"No,\" you say, remembering Krantic.  \"Vikola's making us both miserable.  So we'll do something to her.  Something public.  And the others will back down.\"\n\t\t*choice\n\t\t\t#We'll make a rude hover follow her around.\n\t\t\t\t*set infamy %+ 15\n\t\t\t\t*if (hacking >= 75)\n\t\t\t\t\tThe two of you stay up late, writing a devilish piece of code.\n\t\t\t\t\t*goto shirt\n\t\t\t\t*else\n\t\t\t\t\tYou provide the slogan, and Utambu writes the code.\n\t\t\t\t\t*label shirt\n\t\t\t\t\t\n\t\t\t\t\tAt breakfast the next day, Vikola storms into the mess hall, furious.  \"What is this?\" she shouts, gesturing towards her own chest.  There, bright white against the black of her shirt, is your eloquent summation of Vikola's character: \"Whenever I talk, I spit jooslugs.\"\n\t\t\t\t\t\n\t\t\t\t\tThe Reckless crew erupts in laughter.\n\n\t\t\t\t\t\"Try changing your shirt,\" Hammer says.\n\t\t\t\t\t\n\t\t\t\t\t\"It's not on the shirt!  It's a spacing hover!\" Vikola demonstrates by crossing the room.  The words flicker a bit as the image switches from one projector to another, but they always settle right across her front.  Your program makes the hovering visual follow her anywhere there's a projector, which is most of the ship.\n\t\t\t\t\t\n\t\t\t\t\t\"Fascinating,\" you say.\n\t\t\t\t\t\n\t\t\t\t\t\"You!\" Vikola screeches.  \"Turn it off!\"\n\t\t\t\t\t\n\t\t\t\t\t\"In a few days,\" you say, grinning.  \"If you can treat Utambu and me like human beings until then.\"\n\t\t\t\t\t*goto hack_exit\t\t\t\t\n\t\t\t#We'll make static blare every time she speaks.\n\t\t\t\t*set infamy %+ 15\n\t\t\t\t*if (hacking >= 75)\n\t\t\t\t\tThe two of you stay up late, writing a devilish piece of code.\n\t\t\t\t\t*goto static\n\t\t\t\t*else\n\t\t\t\t\tYou provide the idea, and Utambu creates the code.\n\t\t\t\t\t*label static\n\t\t\t\t\t\n\t\t\t\t\tAt breakfast the next day, Vikola storms into the mess hall, furious.  She says something, but you don't know what, because the communication system emits a loud burst of static as soon as she begins to speak.\n\t\t\t\t\t\n\t\t\t\t\t\"St—\" She tries again, but her invective is drowned out by another mechanical screech.\n\t\t\t\t\t\n\t\t\t\t\tThe Reckless crew erupts in laughter.\n\t\t\t\t\t\n\t\t\t\t\t\"What did you do?\" Hammer asks you.\n\t\t\t\t\t\n\t\t\t\t\t\"My mother always said, 'If you can't say something nice, don't say anything at all,'\" Utambu says, grinning.\n\t\t\t\t\t\n\t\t\t\t\t\"So Vikola won't be saying anything until she can treat Utambu and me like human beings,\" you explain.\n\t\t\t\t\t*goto hack_exit\n\t\t\t#We'll use the shower to bleach her hair.\n\t\t\t\t*set infamy %+ 15\n\t\t\t\t*if (hacking >= 75)\n\t\t\t\t\tThe two of you stay up late, altering the plumbing in the shower on Vikola's hall.  You have to install fingerprint recognition on the control panel, too, so the ship's computer can identify who is taking a shower.\n\t\t\t\t\t*goto shower\n\t\t\t\t*else\n\t\t\t\t\tYou provide the idea, and Utambu alters the plumbing in the shower on Vikola's hall.  He has to install fingerprint recognition on the control panel, too, so the ship's computer can identify who is taking a shower.\n\t\t\t\t\t*label shower\n\t\t\t\t\t\n\t\t\t\t\tAt breakfast the next day, Vikola storms into the mess hall, furious.  Her long hair, previously black and glorious as space, is now a white waterfall down her back.\n\t\t\n\t\t\t\t\tThe Reckless crew erupts in laughter.\n\t\t\t\t\t\n\t\t\t\t\t\"You did this!\" Vikola screeches, marching up to you and giving you a shove.  \"Synthesize me some hair dye.  Now!\"\n\t\t\t\t\t\n\t\t\t\t\t\"In a few days,\" you say, grinning.  \"If you can treat Utambu and me like human beings until then.\"\n\t\t\t\t\t*goto hack_exit\n\t\t\t\t\t\n*label hack_exit\n\nThe rest of the crew laughs—even Hammer can't help smirking.  Vikola must hate you more than ever, but now you only have to worry about her and Krantic, rather than a whole faction that's set against you.\n*page_break\n*label cards\n*achieve acceptance\nThe night before the Reckless reaches 4-7-2, the pirates are full of nervous energy and have little to do, since their preparations have all been completed.  Your guard brings you to the mess, tethers you to a synthochair, and wanders off to find a drink.  The hovers are off, the crew is playing Straights.\n\nThe pirates take their cards—and their debts—seriously.  Gao logs the wins and losses, and takes side bets from the spectators.  Those who don't play are pitied.  Those who play badly are scorned.\n*page_break\nOf course, you're a prisoner, not a crewmate, and you haven't had the opportunity to join in.  But tonight the pirates are restless, and someone suggests testing your skill at the game.  Of course, you can't play without money, and you don't exactly have access to your station accounts.\n\n*if (nybat_rom != 1)\n\t\"I'll stake you, ${name}\" says Ny-bat, who has been on a winning streak.  \"You can pay me back out of your winnings.\"\n\n\t\"At what interest?\" you ask.\n\n\t\"I'm sure we can find some way for you to make it up to me,\" Ny-bat says, with a sidelong glance.\n\t*if (nybat_rom = 0)\n\t\t$!{n_he} is definitely flirting with you.\n\t\t*gosub so_check\n\t\t*goto flirt_choice\n\t*else\n\t\t$!{n_he} is definitely flirting with you again.\n\t\t*label flirt_choice\n\t\t*choice\n\t\t\t#I'll take the money and flirt back.\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t*set nybat_rom 3\n\t\t\t\t*gosub nybatcheck\n\t\t\t\t\"Thanks.  Let's talk about payment later.  In private,\" you say with a smile.\n\t\t\t\t\n\t\t\t\t\"I'd be happy to,\" says Ny-bat, blushing.\n\t\t\t\t*goto play\n\t\t\t#I'll flirt back but decline to play cards.\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t*set nybat_rom 3\n\t\t\t\t*gosub nybatcheck\n\t\t\t\t\"Thanks, but I don't think I play well enough.  Maybe you could give me a lesson later.  In private,\" you say with a smile.\n\t\t\t\t\n\t\t\t\t\"I'd be happy to,\" says Ny-bat, blushing.\n\t\t\t\t*goto watch\n\t\t\t#I'll take the money but discourage Ny-bat.\n\t\t\t\t*set nybat_rom 1\n\t\t\t\t\"I'll give you twenty percent of my winnings,\" you say, avoiding eye contact with Ny-bat.\n\t\t\t\t*goto play\n\t\t\t#I'll refuse the offer and the flirtation.\n\t\t\t\t*set nybat_rom 1\n\t\t\t\t\"No, thanks,\" you say, avoiding eye contact with Ny-bat.  \"I don't want to owe anyone; I'll just watch.\"\n\t\t\t\t*goto watch\n*else\n\t\"I'll stake you,\" Gao offers.  \"But you're a risk.  So, I take sixty percent of your winnings.\"\n\t\n\t\"Sixty percent!  That's robbery!\" you protest.\n\t\n\tGao's mouth curves into a rare half-smile.\n\t*choice\n\t\t#I'll accept Gao's terms.\n\t\t\t*goto play\n\t\t#I'll just watch for now.\n\t\t\t*label watch\n\t\t\t*set infamy %- 15\n\t\t\tNy-bat, Vikola, Gao and Hammer are clustered round a low card table, their synthochairs upright and their spines straight.  The table is connected to the ship's computer, of course, so that players can deposit and withdraw from their shipboard accounts.\n\t\t\t\n\t\t\tYou watch a tense game of Straights, along with Utambu, Zeeber and a few other spectators.  The pirates play for points, rather than winner-takes-all, though the winner of each hand receives a hefty point bonus.  All four pirates are expert players, excellent at bluffing: Ny-bat and Hammer are impassive as asteroids, Vikola endlessly sneers, and Gao continuously scowls.  It's impossible to tell what any of them are thinking.\n\t\t\t\n\t\t\tAs Vikola inputs her winnings, Zeeber marches up to Gao.  \"You said I could play when I got the chip.  Well, I've got it.  So can I play?\"\n\t\t\t\n\t\t\t\"Get spaced, kid,\" says Vikola.\n\t\t\t\n\t\t\t\"My money's as good as anyone else's!\" shouts Zeeber, long hair falling into her face.  Her fists are clenched.\n\t\t\t*page_break\n\t\t\tNy-bat suggests two games, with a winner's game afterwards.  Players flip a chip, and Zeeber ends up playing with Utambu, Vikola, and one of Vikola's cronies.\n\t\t\t\t\t\t\n\t\t\t*goto cheat_choice\n\t\t#I'll ask Zeeber for money.\n\t\t\t*if (zeeber_ally)\n\t\t\t\t*set level %+ 5\n\t\t\t\t*label zeeber_stake\n\t\t\t\t\"I'll take thirty percent of winnings over the principal,\" the teen says, flipping her hair out of her eyes.\n\t\t\t\t\n\t\t\t\t\"Done,\" you say.\n\t\t\t\t\n\t\t\t\t*goto play\n\t\t\t*else\n\t\t\t\t\"Sorry.  What if you lose?\" says Zeeber.\n\t\t\t\t*goto second_choice\n\t\t#I'll ask Ny-bat for money.\n\t\t\t*if (nybat_ally)\n\t\t\t\t*set level %+ 5\n\t\t\t\t*label nybat_stake\n\t\t\t\t\"I'll take thirty percent of winnings over the principal,\" Ny-bat says.\n\t\t\t\t\n\t\t\t\t\"Done,\" you say.  You're glad ${n_he} doesn't seem to hold your rejection of ${n_his} romantic advance against you.\n\t\t\t\t\n\t\t\t\t*goto play\n\t\t\t*else\n\t\t\t\tNy-bat shakes ${n_his} head.  \"Too risky.  Gao has made a standard offer.  You should take it.\"\n\t\t\t\t*goto second_choice\n\t\t#I'll ask Utambu for money.\n\t\t\t*if (utambu_ally)\n\t\t\t\t*set level %+ 5\n\t\t\t\t*label utambu_stake\n\t\t\t\t\"Sure,\" says Utambu.  \"But, um, fifteen percent of winnings?\"\n\t\t\t\t\n\t\t\t\t\"Done,\" you say.\n\t\t\t\t\n\t\t\t\t*goto play\n\t\t\t*else\n\t\t\t\t\"Sorry, ${name},\" he says.  \"I haven't seen you play yet.\"\n\t\t\t\t*goto second_choice\t\t\n\t\t#I'll ask Hammer for money.\n\t\t\t\"Space yourself,\" Hammer says, in a bored tone.\n\t\t\t\n\t\t\t*label second_choice\n\t\t\t\n\t\t\tYou'd better ask someone you've begun a friendship with, or give up on a better offer.\n\t\t\t*choice\n\t\t\t\t*if (zeeber_ally) #Zeeber.\n\t\t\t\t\t*goto zeeber_stake\n\t\t\t\t*if (nybat_ally) #Ny-bat.\n\t\t\t\t\t*goto nybat_stake\n\t\t\t\t*if (utambu_ally) #Utambu.\n\t\t\t\t\t*goto utambu_stake\n\t\t\t\t#I'll take Gao's offer.\n\t\t\t\t\t*goto play\n\t\t\t\t#I'll watch.\n\t\t\t\t\t*goto watch\n\n*label play\n*set play true\n*set infamy %+ 5\nNy-bat releases your tether, so that you can sit at a low card table with ${n_him}, Vikola, and Hammer.  Though the cord is unbreakable plastic, smooth and lightweight, you feel enormously more comfortable without it hanging from your wrist.  The table is connected to the ship's computer, of course, so that players can deposit and withdraw from their shipboard accounts.\n\nYou play a tense game of Straights, conscious of the spectators hovering behind you, peeking at your cards.  The pirates play for points, rather than winner-takes-all, though the winner of each hand receives a hefty point bonus.  All three pirates are expert players, excellent at bluffing: Ny-bat remains impassive as an asteroid, Vikola endlessly sneers, and Gao continuously scowls.  It's impossible to tell what any of them are thinking.\n\n*if (level > 75)\n\t*set infamy %+ 10\n\t*achieve acceptance\n\tYou win the hand with a run of diamonds; you're quite good at cards, and you were lucky in the other players' discards.  Really it's all memorization and probability, and mental acrobatics are easy for you.\n\t\n\tAs you input your winnings into the table, \n\t*goto zeeber_asks\n*elseif ((level > 50) and (persuasiveness > 80))\n\t*set infamy %+ 10\n\t*achieve acceptance\n\tYou win the hand with a run of diamonds.  You may not be able to calculate probabilities in your head, but you are intelligent enough to remember what's been played, and you are a superb actor.  You won this hand by acting naive and distressed, tricking the pirates into discarding exactly what you needed.  It won't work again, but it was fun.\n\t\n\tAs you input your winnings into the table, \n\t*goto zeeber_asks\n*elseif (level > 50)\n\tYou lose the hand, of course, but you do manage to rack up a few points.\n\t\n\tAs Vikola inputs her winnings,\n\t*goto zeeber_asks\n*else\n\t*set infamy %- 10\n\tYou lose the hand, and don't earn a single point.  You don't really have the skills to win against this kind of player.\n\t\n\tAs Vikola inputs her winnings,\n\t*goto zeeber_asks\n\n*label zeeber_asks\t\nZeeber marches up to Gao.  \"You said I could play when I got the chip.  Well, I've got it.  So can I play?\"\n\n\"Get spaced, kid,\" says Vikola.\n\n\"My money's as good as anyone else's!\" shouts Zeeber, long hair falling into her face.  Her fists are clenched.\n*page_break\nNy-bat suggests two games, with a winner's game afterwards.  Players flip a chip, and Zeeber ends up playing you, Vikola, and one of Vikola's cronies.\n\t\t\t\n*label cheat_choice\t\nAs the game progresses, you notice something odd.  Vikola and her friend never, ever discard anything that Zeeber wants to pick up.  Of course, that is statistically possible, but by the third hand you are beginning to suspect something.  You study the pirate standing behind Zeeber's chair, and eventually you see a repetitive flick of his hand—a signal of some kind.   The pirate is letting his friends know which cards Zeeber has. \n\n*if (play)\n\tIf anything, you are benefiting from Vikola's desire to crush Zeeber.  You've won two out of three hands, due in part to some odd choices the other players have made—choices you now see were meant to prevent Zeeber from acquiring any points at all.  You decide to…\n\t*goto cheat\n*else\n\tIf anyone, it's Utambu who is unknowingly benefiting from Vikola's desire to crush Zeeber.  He's won two out of three hands, due in part to some odd choices the other players have made—choices you now see were meant to prevent Zeeber from acquiring any points at all.\n\t\n\tThe fact that an unbreakable plastic cord ties you to your chair by the wrist limits your options for physical action.  You decide to…\n\t*goto cheat\n\n*label cheat\n*choice\n\t*if (play) #…stay quiet and benefit from Vikola's cheating.\n\t\t*set infamy %+ 10\n\t\t*set empathy %- 20\n\t\tYou play a few more hands with these players, and then the winners—including you but not Zeeber—play for a while.\n\t\t\n\t\tZeeber remains defiant, despite losing every hand, and refuses to be sent to bed like a kid.\n\t\n\t\tEventually Ny-bat calls a halt, and the pirates scatter.\n\t\t*goto sleep\n\t*if (play = false) #…stay quiet and let Utambu benefit at Zeeber's expense.\n\t\t*set empathy %- 15\n\t\tThe players stay in this configuration for a few more hands, and then the winners—including Utambu but not Zeeber—play for a while.\n\t\t\n\t\tZeeber remains defiant, despite losing every hand, and refuses to be sent to bed like a kid.\n\t\n\t\tEventually Ny-bat calls a halt, and the pirates scatter.\n\t\t*goto sleep\t\n\t*if (play) #…do nothing now, but split the winnings with Zeeber later.\n\t\t*gosub zeebercheck\n\t\t*set empathy %+ 10\n\t\t*set level %+ 5\n\t\tYou play a few more hands with these players, and then the winners—including you but not Zeeber—play for a while.  Zeeber remains defiant, despite losing every hand, and refuses to be sent to bed like a kid.  As your guard leads you out, though, you convince her to follow you into the hall, where you explain what happened and share your winnings.  Zeeber wants to confront Vikola, but you convince her it's wiser to just take the money.\n\t\t\n\t\t*goto sleep\n\t*if (play = false) #…do nothing now, but tell Utambu to share the winnings with Zeeber later.\n\t\t*gosub zeebercheck\n\t\t*gosub utambucheck\n\t\t*set empathy %+ 10\n\t\t*set level %+ 5\n\t\tThe players stay in this configuration for a few more hands, and then the winners—including Utambu but not Zeeber—play for a while.  Zeeber remains defiant, despite losing every hand, and refuses to be sent to bed like a kid.  As your guard leads you out, though, you convince her and Utambu to follow you into the hall, where you explain what happened and prompt Utambu to share his winnings.  Zeeber wants to confront Vikola, but you and Utambu convince her it's wiser to just take the money.\n\t\t\n\t\t*goto sleep\n\t#…publicly accuse Vikola of cheating.\n\t\t*label accuse\n\t\t*gosub zeebercheck\n\t\t*set infamy %+ 15\n\t\t\"Vikola's cheating.  This pathetic little Zeekie is reporting Zeeber's cards,\" you say, pointing towards Vikola's confederate.\n\t\t\n\t\tSilence falls in the mess hall.\n\t\t\n\t\t\"I'm not a…I mean, I'm not…\" stutters the pirate.\n\t\t\n\t\t\"Is this true?\" Ny-bat asks Vikola.\n\t\t\n\t\t\"The Stashie's just making trouble,\" Vikola declares.\n\t\t\n\t\t\"Is it true?\" Ny-bat asks Vikola's confederate.  \n\t\t\n\t\tYou'd swear the young pirate starts to shake under Ny-bat's stern gaze.\n\t\t\n\t\t\"She told me…I didn't mean…\" he stammers.\n\t\t\n\t\t\"A word,\" says Ny-bat. As ${n_he} marches Vikola out of the mess hall, even Hammer won't meet her eyes.  \n\t\t\n\t\t*page_break\n\t\tZeeber throws her arms around you, inordinately grateful.  You don't think anyone stands up for her on a regular basis.\n\t\t\n\t\tMany of the pirates compliment your sharp eyes.  You've learned something about the moral code of this new world you are inhabiting: the occasional kidnapping, theft or murder might be a necessary evil—but cheating your own crewmate at cards is almost unforgivable.\n\t\t\n\t\tWhen Ny-bat and Vikola return, Vikola pays Zeeber a small \"compensation.\"\n\t\t\n\t\tBut her true punishment is that no one will let her join a game.  Eventually she stalks out, rigid with fury.\n\t\t\n\t\tWhen Ny-bat calls a halt, the pirates scatter.\n\t\t*goto sleep\t\n\t#…tell the pirate who is signaling to move.\n\t\t*set persuasiveness %+ 10\n\t\t*if (play)\n\t\t\t\"Sit down, for star's sake.  You're distracting me,\" you say to the signaling pirate.\n\t\t\t*goto whine\n\t\t*else\n\t\t\t\"Sit down, for star's sake.  You're blocking my view,\" you say to the signaling pirate.\n\t\t\t*label whine\n\t\t\t\n\t\t\t\"Am not,\" he says uncertainly, glancing at Vikola.\n\t\t\t\n\t\t\t\"Quit your whining, Stashie,\" Vikola says.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#\"Make me.\"\n\t\t\t\t\t*label sit\n\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t*gosub zeebercheck\n\t\t\t\t\t\"Seal it, you two,\" says Gao from the other table.  \"And you, just sit.  There's a chair right there!\"\n\t\t\t\t\t\n\t\t\t\t\tVikola's confederate sits, looking sheepish.\n\t\t\t\t\t\n\t\t\t\t\tZeeber does a bit better over the next few hands.  She's not really a match for the more experienced players at the table, but at least she scores a few points.\n\t\t\t\t\t\n\t\t\t\t\tEventually Ny-bat calls a halt, and the pirates scatter.  As your guard leads you out, you call for Zeeber to follow into the hall, where you explain what happened.  Zeeber wants to confront Vikola, but you convince her it's wiser to save that information for when she really needs it.  The crew doesn't look kindly on cheaters.\n\t\t\n\t\t\t\t\t*goto sleep\t\t\t\t\t\t\t\t\n\t\t\t\t#\"Quit your sneering, Shipper.\"\n\t\t\t\t\t*goto sit\n\t\t\t\t#\"Vikola is cheating, everyone.\"\n\t\t\t\t\t*goto accuse\n\t\t\t\t#\"I will if he moves.\"\n\t\t\t\t\t*goto sit\n\t\t\t\t#I stand, ready to reply with my fists.\n\t\t\t\t\t*goto sit\n\t\t\t\t*if (play) #I stand and shove the pirate into a chair.\n\t\t\t\t\t*goto force\n\t*if (play) #…forcibly remove the pirate who is signaling.\n\t\t*label force\n\t\t*gosub zeebercheck\n\t\tThere's an empty synthochair behind and to the right of Vikola's confederate; he won't be able to see Zeeber's cards from there.  You stand and shove him in the right direction, taking him completely by surprise.  He stumbles and sits, the synthochair cushioning his fall.\n\t\t\n\t\t\"Sit,\" you add, for emphasis.\n\t\t\n\t\tNy-bat rises from ${n_his} chair at the other table, and swiftly crosses to your side.\n\t\t\n\t\t\"There's no brawling allowed.  I'm afraid you'll be escorted out, while I inform the captain of your behavior,\" ${n_he} says.\n\t\t*if (nybat_ally)\n\t\t\t$!{n_he} looks extremely disappointed in you.  \n\t\t\t*goto blame\n\t\t*else\n\t\t\t*label blame\n\t\t\t\n\t\t\tThere's no way you are going to take the blame for this!\n\t\t\t*page_break\n\t\t\t*goto accuse\n\n*label sleep\n*if (nybat_rom = 3)\n\tNy-bat catches up with you on the bridge deck, and tells your guard ${n_he} needs a moment alone with you.\n\t\n\t$!{n_he} takes your hand in\n\t*if (n_he = \"she\")\n\t\thers.\n\t\t*goto room\n\t*else\n\t\this.\n\t\t*label room\t\n\t\t\"I could guard you in my room tonight, ${name}.  If you're sure that's what you want.  I will argue for your safety with the captain either way, so please don't say yes on that account.\"\n\t\t*choice\n\t\t\t#\"I'll say yes on your account, instead.\"\n\t\t\t\t*set empathy %+ 10\n\t\t\t\t*set nybat_rom 3\n\t\t\t\tNy-bat arranges things with your guard, takes you to ${n_his} room, and removes your tether, dropping it to the floor with a look of disgust.\n\t\t\t\t\n\t\t\t\t\"${name}, I'm sorry for any part I have played…\"\n\t\t\t\t\n\t\t\t\tYou silence ${n_him}, placing your hand on ${n_his} cheek and brushing ${n_his} lips with your thumb.  $!{n_he} kisses you deeply, and not long enough.\n\t\t\t\t\n\t\t\t\t\"You are sure?\" ${n_he} asks again.\n\t\t\t\t\n\t\t\t\tYou are.\n\t\t\t\t*page_break Chapter Four: Arrival\n\t\t\t\t*goto_scene beach\t\n\t\t\t#\"I can't be with you while I'm a prisoner.\"\n\t\t\t\t*label slow\n\t\t\t\t*set nybat_rom 2\n\t\t\t\t\"Then perhaps this will help us wait….\" And Ny-bat kisses you, deeply, and not long enough.\n\t\t\t\t\n\t\t\t\t$!{n_he} calls your guard and strides away.\n\t\t\t\t\n\t\t\t\tYou are taken to the comm room, where someone will stay awake all night, watching over you and the Reckless.  You try to sleep, and not to think too much about Ny-bat and ${n_his} kiss, because you want to be prepared to face tomorrow.  In the morning, you'll arrive at an alien planet!\n\t\t\t\t*page_break Chapter Four: Arrival\n\t\t\t\t*goto_scene beach\t\n\t\t\t#\"I'd like to take this slower.\"\n\t\t\t\t*goto slow\n\t\t\t#\"You've misunderstood me.  I want to be your friend.\"\n\t\t\t\t*set nybat_rom 1\n\t\t\t\t\n\t\t\t\t\"Ah,\" says Ny-bat, dropping your hand.  \"Forgive me.\"\n\t\t\t\t\n\t\t\t\t$!{n_he} calls your guard and strides away.\n\t\t\t\t\n\t\t\t\t*goto bed\n*else\n\t*label bed\n\tYou are taken to the comm room, where someone will stay awake all night, watching over you and the Reckless.  You try to sleep, because you want to be prepared to face tomorrow.  In the morning, you'll arrive at an alien planet!\n\t*page_break Chapter Four: Arrival\n\t*goto_scene beach\t\n\t\t\n*comment SUBROUTINES\n\n*label so_check\n*if (so = \"none\")\n\t*return\n*else\n\tYou think of your ${so}; it seems like years since you've seen ${n_him}.\n\t*return\n\n\n*label zeebercheck\n*if (zeeber_ally)\n\t*return\n*else\n\t*set zeeber_ally true\n\t*Set allies + 1\n\t*return\n*label nybatcheck\n*if (nybat_ally)\n\t*return\n*else\n\t*set nybat_ally true\n\t*set allies + 1\n\t*return\n*label gaocheck\n*if (gao_ally)\n\t*return\n*else\n\t*set gao_ally true\n\t*set allies + 1\n\t*return\n*label utambucheck\n*if (utambu_ally)\n\t*return\n*else\n\t*set utambu_ally true\n\t*set allies + 1\n\t*return\n\t", "resist": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*comment ñáéç…—\n*set resist true\n*temp zoa_in\n*set zoa_in false\n*temp with\n*set with \"?\"\n*temp help\n*set help false\n*temp slime\n*set slime false\n*temp chance\n*set chance false\n\"Human trustworthiness, now indication best course.  Protection by vermite dome or usage vermite to disability pirate ship?  Or employment deception?\" asks the Medusi leader.\n*if (level \u003c 40)\n\t\"Alien of low level, but human knowledge-understanding of human attackers.\"\n\t*goto resist_plan\n*else\n\t*goto resist_plan\n*label resist_plan\nYou tell the Medusi to…\n*choice\n\t#…erect a vermite dome.\n\t\t*set empathy %+ 10\n\t\t\"Semi-instructable vermite will join with not-yet-aware.  Alien will see,\" says the leader cryptically.\n\n\t\tAs black dust settles around the Reckless, a river of vermite flows up from the pool in the center of the crater and rushes straight towards you.  It sparkles in the sunlight, wave after wave of living water, enough to fill twenty starships.  It is one of the most beautiful sights you have ever seen, and one of the most terrifying.  You flinch as the towering wave comes within a meter of the room's transparent wall, but instead of crashing, the wave flows up and around the Medusi houses, forming a dome over the entire settlement.\n\n\t\t\"Impenetrability to weapons fire,\" notes the Medusa leader from its pallet.  \"Ship inevitability despair of profit and enactment departure.\"\n\t\t\n\t\tYou think perhaps it is underestimating Zoa's determination.\n\t\t*page_break\n\t\t*label defense\n\t\tAfter 50 kiloseconds, during which the Medusi offer you food and a pallet, and make it clear you are now a guest rather than a prisoner, Zoa opens fire.  She doesn't target the vermite dome, which would be pointless, but the wall of the crater above the dome.  The Medusi make the ceiling of the central room transparent, so you and the children can watch huge chunks of black basalt bounce off the vermite shield, followed by a rain of smaller fragments.\n\t\t\n\t\tYou rush back into the leader's sickroom, anxious to help.\n\t\t\n\t\t\"Tell me we're not going to be buried alive,\" you say.\n\t\t\n\t\t\"Immediacy situation not,\" says the leader.  \"Yet consequences long-term bombardment.  First, probability collapse of caverns in crater wall, containment food supply.  Second, possibility complete burial dome in rubble, consequence impossibility lower dome.\"\n\t\t\n\t\tThe dome wasn't a permanent solution.  You'll have to…\n\t\t*label resist_choice\n\t\t*choice\n\t\t\t#…use vermite to disable the Reckless.\n\t\t\t\t*set level %+ 5\n\t\t\t\t*goto distract\n\t\t\t#…stage the fake destruction of the Medusi colony.\n\t\t\t\t*set level %+ 5\n\t\t\t\t*goto trick\n\t\t\t#…pretend to surrender and give the pirates vermite.\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t*goto slime\n\t#…send me out to distract Zoa while vermite disables the Reckless.\n\t\t*label distract\n\t\t*set persuasiveness %+ 10\n\t\t*set level %+ 10\n\t\tIf the Reckless is encased in vermite, Zoa will not be able to fire on the Medusi colony.  Unfortunately, it will take a few minutes for the vermite to flow around the ship—a few minutes in which Zoa could simply move the Reckless to a new position.  \n\t\t\n\t\t*gosub partner_chance\n\t\t*page_break\n\t\tYou end up alone on the rough rock of the crater, gulping in the thick air.  You hope Zoa won't decide to blast you out of existence for desertion, or ignore your presence and fire on the colony.\n\t\t\n\t\t*if (infamy > 35)\n\t\t\tInstead, an airlock opens and Zoa emerges, alone as she originally promised.  It seems you earned some trust while you were on the Reckless, enough to convince Zoa to meet with you.\n\t\t\n\t\t\t\"What do you think you're doing, Stashie?\" she asks.\n\t\t\t\n\t\t\tYou reply:\n\t\t\t*choice\n\t\t\t\t#\"I'm here to offer you a deal for some vermite.\"\n\t\t\t\t\t*set persuasiveness %+ 10\n\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t*gosub prove\n\t\t\t\t\t\n\t\t\t\t\tYou lay out imaginary terms for a long-term agreement, stretching out your explanations as long as possible.\n\t\t\t\t\t*goto dome_rise\n\t\t\t\t#\"I have information about the Medusi that might help you.\"\n\t\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t*gosub prove\n\t\t\t\t\t\n\t\t\t\t\tYou tell her what you've learned about the Medusi and their levels, describing their hierarchical society in as much detail as you can.\n\t\t\t\t\t*label dome_rise\n\t\t\t\t\t*gosub creeping\n\t\t\t\t\t\n\t\t\t\t\t\"What the—\" Zoa suddenly interrupts you, and you look past her to see a shimmering coating of vermite creeping up the sides of the Reckless.  Zoa sprints towards her ship, shouting orders into her goggles' transmitter.  The Reckless roars; the crew is starting the engines.\n\t\t\t\t\t\n\t\t\t\t\t*if (persuasiveness > 60)\n\t\t\t\t\t\t*set reckless_caught true\t\t\t\t\t\t\n\t\t\t\t\t\tZoa hurdles the vermite barrier and boards the Reckless. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe engines roar, but it takes a few moments for the Reckless engines to heat up.  The trapped crew doesn't have enough time; you distracted Zoa long enough.  Before the Reckless can rise, a dome of vermite has neatly sealed the ship.  Now Zoa is in an untenable position, trapped with limited supplies.\n\t\t\t\t\t\t*goto imprisoned\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe vermite dome is climbing higher and higher, but not fast enough—you didn't distract Zoa for long enough.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou watch helplessly as Zoa hurdles the barrier and boards the Reckless.  A scant centasecond later the Reckless takes off.  The Medusi immediately reverse the direction of the vermite, building a protective dome around their colony, but leaving an opening for you to scramble through.\n\n\t\t\t\t\t\tAt least, you've created a stalemate: the Reckless can't land in the crater without being chased by the vermite, and nothing burns fuel like hovering in place within the atmosphere.  Zoa will have to land elsewhere, or return to space.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto ship_choice\n\t\t\t\t#\"I want to come aboard.\"\n\t\t\t\t\t*gosub prove\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\tYou launch into the story of your time with the Medusi, spinning out your tale as long as possible.\n\t\t\t\t\t*goto dome_rise\n\t\t\t\t*if (partner != \"The Mushroom\") #\"Let's bargain for ${partner}'s safe return.\"\n\t\t\t\t\t*set persuasiveness %+ 10\n\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t*gosub prove\n\t\t\t\t\t\n\t\t\t\t\tYou lay out imaginary conditions, stretching out your explanations as long as possible.\n\t\t\t\t\t*goto dome_rise\n\t\t*else\n\t\t\tZoa doesn't come out to meet you, as she originally promised; she must not trust you enough.\n\t\t\t\n\t\t\tInstead, you hear her voice over the loudspeaker: \"What do you think you're doing, Stashie?\"\n\t\t\t\n\t\t\tYou reply:\n\t\t\t*choice\n\t\t\t\t#\"I'm here to offer you a deal for some vermite.\"\n\t\t\t\t\t*set persuasiveness %+ 10\n\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t*gosub prove\n\t\t\t\t\t\n\t\t\t\t\tYou lay out imaginary terms for a long-term agreement, stretching out your explanations as long as possible.\n\t\t\t\t\t*goto dome_rising\n\t\t\t\t#\"I have information about the Medusi that might help you.\"\n\t\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t*gosub prove\n\t\t\t\t\t\n\t\t\t\t\tYou tell her what you've learned about the Medusi and their levels, describing their hierarchical society in as much detail as you can.\n\t\t\t\t\t*label dome_rising\n\t\t\t\t\t*gosub creeping\n\t\t\t\t\t\n\t\t\t\t\t\"What the—\" Zoa suddenly interrupts you, and you see a shimmering coating of vermite creeping up the sides of the Reckless.\n\t\t\t\t\t*if (persuasiveness > 60)\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe Reckless roars; Zoa is starting the engines, and probably cursing the lack of ground propulsion on her deep-space vessel.  It takes a few moments for the Reckless engines to heat up, and the trapped crew doesn't have a enough time; you distracted Zoa for long enough.  Before the Reckless can rise, the dome of vermite has neatly sealed the ship.  Now Zoa is in an untenable position—trapped with a finite amount of supplies.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label imprisoned\n\t\t\t\t\t\t*set reckless_caught true\n\t\t\t\t\t\t*gosub ihp_or_not\n\t\t\t\t\t\t*goto ship_choice\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe Reckless roars; Zoa is starting the engines.  The vermite dome is climbing higher and higher, but not fast enough—you didn't distract Zoa for long enough.  You watch helplessly as the Reckless takes off.\n\n\t\t\t\t\t\tStill, you've created a stalemate: the Reckless can't land without being chased by the vermite, and nothing burns fuel like hovering in place within the atmosphere.  Zoa will have to land elsewhere, or return to space.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*gosub ihp_or_not\n\t\t\t\t\t\t*goto ship_choice\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#\"I want to come aboard.\"\n\t\t\t\t\t*gosub prove\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\tYou launch into the story of your time with the Medusi, spinning out your tale as long as possible.\n\t\t\t\t\t*goto dome_rising\n\t\t\t\t*if (partner != \"The Mushroom\") #\"Let's bargain for ${partner}'s safe return.\"\n\t\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t*gosub prove\n\t\t\t\t\t\n\t\t\t\t\tYou lay out imaginary conditions, stretching out your explanations as long as possible.\n\t\t\t\t\t*goto dome_rising\n\t#…trick Zoa into thinking the settlement has been destroyed.\n\t\t*set persuasiveness %+ 10\n\t\t*set infamy %+ 10\n\t\tFor the trick to work, the Medusi must pretend to be buried under a collapsed vermite dome.  As black dust settles around the Reckless, a river of vermite flows up from the pool in the center of the crater and rushes straight towards you.  It sparkles in the sunlight, wave after wave of living water, enough to fill twenty starships.  It is one of the most beautiful sights you have ever seen, and one of the most terrifying.  You flinch as the towering wave comes within a meter of the room's transparent wall, but instead of crashing, the wave flows up and around the Medusi houses, forming a dome over the entire settlement.\n\n\t\tAs you hoped, Zoa opens fire when the Medusi refuse to talk with her.  She doesn't target the vermite dome, which would be pointless, but the wall of the crater above the dome.  The Medusi make the ceiling of the central room transparent, so you and the children can watch huge chunks of black basalt bounce off the vermite shield, followed by a rain of smaller fragments.\n\t\t*page_break\n\t\t*label trick\n\t\t*gosub partner_chance\n\t\t*page_break\n\t\tWhile the Medusi run some computer simulations to determine exactly how to collapse the dome, you help herd all the children towards the back door, which opens directly into the volcano itself.  The vast cavern you enter is clearly Medusi-made—the right angles are obviously unnatural.\n\t\t\n\t\tSome crates next to you are filled with unidentifiable goo, but most of the cavern contains massive liquid-filled vats, almost as tall as you and ten times as wide.  The vats seem grown, not fabricated, like hollowed out slices of a giant knobbly tree, and you wonder what is growing in them.\n\t\t\t\t\t\n\t\tYou ask your speech box to translate some of the markings on the sides, and it says: \"Communicators.  Healers.  Cleaners.  Measurers.  Sacraments.  Untranslatable foodstuffs.  Offspring.\"\n\t\t\t\t\t\n\t\tAliens never cease to amaze you.\n\t\t\n\t\tThe injured leader is wheeled in on its pallet.  It has one more question to ask you: Who do you think the Medusi should call to dig you out after the Reckless is gone, the human authorities (the IHP) or the Medusi authorities (Spider)?\n\t\t*choice\n\t\t\t#The IHP.\n\t\t\t\t*set infamy %- 15\n\t\t\t\t*set empathy %- 15\n\t\t\t\t*gosub crash\n\t\t\t\t*gosub medusi_week\n\t\t\t\tA thunderous crunch tells you that the IHP has begun to dig you out.  When the patter of falling rocks ceases, you and some of your allies carefully make your way down the newly created path through the rubble, out onto the surface of the crater.\n\t\t\t\t\n\t\t\t\t*goto ihp_greet\n\t\t\t#Spider.\n\t\t\t\t*set empathy %+ 15\n\t\t\t\t*label spider\n\t\t\t\t*gosub crash\n\t\t\t\t*gosub medusi_week\n\t\t\t\tA thunderous crunch tells you that Spider has begun to dig you out.  When the patter of falling rocks ceases, you carefully make your way down the newly created path through the rubble.\n\t\t\t\t\n\t\t\t\t*goto spider_greet\n\t\t\t#Instead, I recommend some of my friends on Dekara Station.\n\t\t\t\t*set level %- 5\n\t\t\t\t*set empathy %+ 5\n\t\t\t\tIn your experience, it's better to avoid the authorities altogether.\n\t\t\t\t\n\t\t\t\tThe Medusi don't agree, however; giving aliens the location of their planet is a serious crime.  They call Spider, instead.\n\t\t\t\t\n\t\t\t\t*goto spider\n\t#…deceive Zoa into leaving with inactive slime.\n\t\t*set persuasiveness %+ 10\n\t\t*set infamy %+ 10\t\t\n\t\t*label slime\n\t\t*set slime true\n\t\tYou and the Medusi leader develop a plan: You will pretend to negotiate with Zoa.  When you reach an agreement, the Medusi will bring some organic building material that looks like vermite but is much less advanced up from the slime pits.  The Medusi will still suffer a financial loss, but they will protect the immature vermite, which can't yet understand machine commands and is not ready to be alone on a starship.  You will offer to stay behind as a liaison to the Medusi, so you won't have to face Zoa when she finds out she was tricked.\n\n\t\t*gosub partner_chance\n\t\t*page_break\t\n\t\t*goto fakenego\n\t\t\n*label fakenego\nYou end up alone on the rough rock of the crater, gulping in the thick air.  You hope Zoa won't decide to blast you out of existence for desertion, or ignore your presence and fire on the Medusi.\n\t\t\t\t\t\t\n*if (infamy > 35)\n\tInstead, an airlock opens and Zoa emerges, alone as she originally promised.  It seems you earned some trust while you were on the Reckless, enough to convince Zoa to meet with you.\n\n\t\"What do you think you're doing, Stashie?\" she asks.\n\t\n\t\"I'm here to offer you a deal for some vermite,\" you say.\n\t\n\t\"I'll listen before deciding what to do with you—only because you have proved somewhat useful in the past,\" says Zoa.\n\t*goto opening\n\t\n*else\n\t*set zoa_in true\n\tZoa doesn't come out to meet you, as she originally promised; she must not trust you enough.\n\t\n\tInstead, you hear her voice over the loudspeaker: \"What do you think you're doing, Stashie?\"\n\t\n\t\"I'm here to offer you a deal for some vermite,\" you say.\n\t\n\t\"Why should I trust you at all?\" asks Zoa.  \"You've been conspiring with the Medusi.\"\n\n\t\"I've acted in accordance with my conscience,\" you say.  \"I'm a lot more trustworthy than you.\"\n\n\t\"Talk, then,\" Zoa says icily.\n\t*label opening\n\t\n\tYou open with…\n\t*choice\n\t\t#…a demand for an apology.\n\t\t\t*set empathy %+ 10\n\t\t\t\"I regret that our previous encounter ended in violence.  The person responsible will be punished,\" Zoa says.  \"Please recall, though, that one of my people was the first to fall, however unintentional her injury may have been.\"\n\t\t\t\n\t\t\t*goto act\n\t\t*if ((partner_saved = false) and (partner != \"The Mushroom\")) #…the terms of ${partner}'s release.\n\t\t\t*set persuasiveness %+ 10\n\t\t\t*label bomb\n\t\t\tYou tell Zoa, \"When the vermite is loaded, we will release ${partner} to you, along with an organic device we've attached to the prisoner.  When you leave this planet, the device will deactivate.  If you do not leave within a kilosecond, the device will poison its wearer.\"\n\t\t\t*label conds\n\t\t\t\n\t\t\tZoa agrees to this arrangement, and to the other conditions you propose: phony instructions for \"maturing\" the vermite; a currency that actually has value to the Medusi, who can't spend credits and don't see the worth of precious metals;\n\t\t\t*if (mushroom_ally = true)\n\t\t\t\t*label last\n\t\t\t\tand instructions about when to return (and find Spider waiting, though of course you don't say that part).\n\t\t\t\t*label price\n\t\t\t\n\t\t\t\tFinally you get down to the actual bargaining, which you pursue…\n\t\t\t\t*choice\n\t\t\t\t\t#…deferentially; the Medusi have been defeated.\n\t\t\t\t\t\t*set infamy %- 10\n\t\t\t\t\t\tUnfortunately, this tactic makes Zoa suspicious.  The Medusi are anything but humble, and Zoa expects a certain amount of greed in her bargaining partners.\n\t\t\t\t\t\t*if (persuasiveness > 75)\n\t\t\t\t\t\t\tIt takes a lot of fast talking on your part to maintain the deception.\n\t\t\t\t\t\t\t*goto final_lie\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"The Fungi are up to something,\" she says.  You hear the unmistakable sound of the ship's energy weapons powering up, and sprint for the Medusi structures.\n\n\t\t\t\t\t\t\t\"Stop or be blasted,\" Zoa says.\n\n\t\t\t\t\t\t\t*gosub ihp_or_not\n\t\t\t\t\t\t\t*goto pirate_end_transition\t\t\t\t\t\t\t\t\n\t\t\t\t\t#…doggedly; the Medusi are stubborn.\n\t\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t\tZoa seems to expect a certain amount of stubborn self-interest and greed in a bargaining partner, so your stance is quite deceptive.\n\t\t\t\t\t\t*label final_lie\n\t\t\t\t\t\t\n\t\t\t\t\t\tWhen the agreement between Zoa and the Medusi is settled, Zoa asks what you expect for your services as a negotiator.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I ask for a thousand credits to be deposited into a station account.\n\t\t\t\t\t\t\t\t*set level %- 10\n\t\t\t\t\t\t\t\t*set infamy %- 15\n\t\t\t\t\t\t\t\tZoa bargains you down a bit, and the deal is made.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto load\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#I ask for five percent of the profit from the vermite.\n\t\t\t\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\t\t\t\t*set level %+ 10\n\t\t\t\t\t\t\t\tZoa bargains you down a bit, and the deal is made.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto load\n\t\t\t\t\t\t\t#I ask for passage home on the Reckless.\n\t\t\t\t\t\t\t\t*set infamy %- 25\n\t\t\t\t\t\t\t\t*set level %- 5\n\t\t\t\t\t\t\t\tThen you realize that if you leave with the Reckless, you'll be onboard when Zoa discovers the deception—and blames you!  You try to backtrack, but that makes Zoa suspicious.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"The Fungi are up to something,\" she says.  You hear the unmistakable sound of the ship's energy weapons powering up, and sprint for the Medusi structures.\n\n\t\t\t\t\t\t\t\t\"Stop or be blasted,\" Zoa says.\n\t\t\t\t\t\t\t\t*gosub ihp_or_not\n\t\t\t\t\t\t\t\t*goto pirate_end_transition\t\t\t\t\t\t\n\t\t\t\t\t\t\t#I ask for a crate of something salable from the cargo hold.\n\t\t\t\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\t\t\t\t\"Five hundred grams of Sinbolo wood,\" Zoa offers.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou haggle a bit, and the deal is made.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label load\n\t\t\t\t\t\t\t\tSeveral Medusi emerge to direct a river of slime up from the pool in the center of the landing pads.  It sparkles in the sunlight, wave after wave of living water.  You notice that a layer of slime on the bottom is flowing back towards the pool, and are confused until you realize that vermite is ferrying the inert substitute into the hold and then withdrawing.  Zoa notices, too, and you beckon a Medusi over to give an incomprehensible explanation.\n\n\t\t\t\t\t\t\t\t*gosub ihp_or_not\n\t\t\t\t\t\t\t\t*set reckless_caught false\n\t\t\t\t\t\t\t\tWhen the slime is loaded, Zoa and her crew take off.  Of course, there's a good chance she'll come back for revenge later, when she discovers your trick.\n\t\t\t\t\t\t\t\t*goto ship_choice\n\t\t\t\t\t\t\t#I ask for nothing.  I am doing this for the Medusi.\n\t\t\t\t\t\t\t\t*set infamy %- 15\n\t\t\t\t\t\t\t\t*set level %- 5\n\t\t\t\t\t\t\t\tUnfortunately, altruism isn't something Zoa understands.\n\t\t\t\t\t\t\t\t*if (persuasiveness > 75)\n\t\t\t\t\t\t\t\t\tYou need all your powers of persuasion to allay her suspicions.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto load\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\"The Fungi are up to something,\" she says.  You hear the unmistakable sound of the ship's energy weapons powering up, and sprint for the Medusi structures.\n\n\t\t\t\t\t\t\t\t\t\"Stop or be blasted,\" Zoa says.\n\t\t\t\t\t\t\t\t\t*gosub ihp_or_not\n\t\t\t\t\t\t\t\t\t*goto pirate_end_transition\n\t\t\t\t\t#…fiercely; the Medusi are angry.\n\t\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\t\tZoa seems to expect a certain amount of animosity in a bargaining partner, so your stance is quite deceptive.\t\t\t\t\t\t\n\t\t\t\t\t\t*goto final_lie\n\t\t\t*else\n\t\t\t\tthe release of the Honored Diplomat;\n\t\t\t\t*goto last\t\t\t\t\t\t\n\t\t*if ((partner_saved = true) and (partner != \"The Mushroom\")) #…${partner}'s assignment as liaison to the Medusi.\n\t\t\t*label assign\n\t\t\tYou describe ${partner}'s duties as ambassador and hostage to the Reckless' good behavior, and ask for a month's worth of human food from the ship's supplies.  You need some excuse to keep ${partner} from boarding the Reckless, after all.\n\t\t\t*if (infamy > 50)\n\t\t\t\t*goto conds\n\t\t\t*else\n\t\t\t\tZoa doesn't trust you enough to risk the safety of one her people, not because she cares for ${partner}, but because she'll lose the willing support of the crew if she seems careless with their lives.  She insists on speaking with ${partner} privately and face to face, so you have no choice but to gamble on ${partner}'s ability to deceive.\n\n\t\t\t\tYou resist the impulse to kick nervously at the uneven black rock beneath your feet as you watch Zoa and ${partner} confer in the open space between the ships.  Zoa insisted that you retreat to the edge of the Medusi settlement so that she and ${partner} can speak privately, and you strive for an aura of confidence as you wait.\n\t\t\t\t\n\t\t\t\t*if ((partner = \"Utambu\") or (partner = \"Zeeber\"))\n\t\t\t\t\tUnfortunately, it was ${partner} who needed to keep calm.  You hear the unmistakable sound of the ship's energy weapons powering up, and see ${partner} scramble back from Zoa.  You sprint towards the Medusi structures.\n\t\t\t\t\t\n\t\t\t\t\t\"Stop or be blasted,\" Zoa says over the loudspeaker.\n\t\t\t\t\t*gosub ihp_or_not\n\t\t\t\t\t*goto pirate_end_transition\t\t\t\t\t\t\n\t\t\t\t*else\n\t\t\t\t\tThankfully, all seems to go well, and ${partner} returns to the Medusi structure.  You tell Zoa she must begin transferring food as soon as the vermite begins to load.\n\t\t\t\t\n\t\t\t\t\t*goto conds\n\t\t#…the conditions of the sale.\n\t\t\t*label act\n\t\t\tYou explain that you will make your own way back to human space, for reasons of your own safety, and insist that a certain number of credits be deposited into your account.  Zoa understands self-interest, not altruism, so this is an important part of your act.\n\t\t\t\n\t\t\t*if (partner != \"The Mushroom\")\n\t\t\t\tNext you deal with the Medusi's prisoner, ${partner}.\n\t\t\t\t*if (partner_saved = true)\n\t\t\t\t\t*goto assign\n\t\t\t\t*else\n\t\t\t\t\t*goto bomb\n\t\t\t*else\n\t\t\t\t*goto conds\n\n*label ship_choice\n*if (reckless_caught = true)\n\tYou will need a heavily armed ship to keep Zoa in check when you release her.  Who should you call?\n\t*choice\n\t\t#The IHP.\n\t\t\t*set infamy %- 15\n\t\t\t*set empathy %- 15\n\t\t\t*gosub medusi_week\n\t\t\t\n\t\t\tYou walk out onto the crater floor to greet the IHP ship with a few of your alien allies.  The Medusi create a large hole in the side of the Reckless' prison, baring an airlock and allowing signals to reach the ship.  Zoa exits the airlock and walks towards you, obviously assuming some sort of negotiation is about to take place.\n\t\t\t\n\t\t\t*goto ihp_arrives\n\t\t#Spider.\n\t\t\t*set empathy %+ 15\n\t\t\t*label spider_pickup\n\t\t\t*gosub medusi_week\n\t\t\t\n\t\t\t*gosub spider_ship\n\t\t\t\n\t\t\tThe Reckless is taken into custody, to be transferred to the IHP for judgement\n\t\t\t*if (partner_saved = true)\n\t\t\t\t, except for ${partner}, who decides to accompany you home, rather than go to prison.\n\t\t\t\t\n\t\t\t\t*goto homewards\n\t\t\t*else\n\t\t\t\t.  You are sure they will all end up in prison.\n\t\t\t\t\n\t\t\t\t*label homewards\n\t\t\t\t*if (adopt = 0)\n\t\t\t\t\tThe Medusi consider Zeeber a child, and therefore innocent.\n\t\t\t\t\t*gosub zeeber_offer\n\t\t\t\t\t\n\t\t\t\t\t*goto journey\n\t\t\t\t*else\n\t\t\t\t\t*label journey\t\t\t\n\t\t\t\t\tThe Spider captain is forbidden to approach a human habitation, but it promises to find a diplomatic ship to take you home.  You spend a week as a virtual prisoner on the Spider ship; these Medusi are not as friendly as the ones you've come to know.  You arrive at a Medusi diplomatic outpost bored but unharmed, and transfer to a Medusi diplomatic ship, then to a human diplomatic ship, and finally to a passenger liner that will take you home.\n\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t*goto_scene station_end\n\t\t#Instead, I recommend some of my friends on Dekara Station.\n\t\t\t*set level %- 5\n\t\t\t*set empathy %+ 5\n\t\t\tIn your experience, it's better to avoid the authorities altogether.\n\t\t\t\n\t\t\tThe Medusi don't agree, however; giving aliens the location of their planet is a serious crime.  They call Spider, instead.\n\t\t\t\n\t\t\t*goto spider_pickup\n*else\n\tYou will need a heavily armed ship to guard the Medusi against Zoa's return.  Should you advise the Medusi to call the human authorities (the IHP) or the Medusi authorities (Spider)?\n\t*choice\n\t\t#The IHP.\n\t\t\t*set infamy %- 15\n\t\t\t*set empathy %- 15\n\t\t\t*gosub medusi_week\n\t\t\t\n\t\t\tYou walk out onto the crater floor to greet the human ship, with a few of your alien allies.\n\t\t\t\n\t\t\tSuddenly, a roar fills your ears and a strong wind makes you stagger.\n\t\t\t*label ihp_greet\n\t\t\tYou instantly recognize the black spikes of an IHP ship.  \n\n\t\t\tA loudspeaker blares, \"This is the Inter-Human Police.  You are in violation of the Human-Medusi Articles of Peaceful Trade.  Your presence here confirms your guilt!  All humans will be taken into custody!  Surrender to the android agent or waive your right to a trial before execution.\"\n\t\t\t*goto android\n\t\t#Spider.\n\t\t\t*set empathy %+ 15\n\t\t\t*label spider_get\n\t\t\t*gosub medusi_week\n\t\t\t*page_break\n\t\t\t*label spider_greet\n\t\t\t*gosub spider_ship\n\t\t\t\n\t\t\t*if (partner_saved = true)\n\t\t\t\t${partner} will, of course, accompany you home.\n\t\t\t\t\n\t\t\t\t*goto homewards\n\t\t\t*else\n\t\t\t\t${partner} is taken into custody with the rest of the crew.\n\n\t\t\t\t*goto homewards\n\t\t#Instead, I recommend some of my friends on Dekara Station.\n\t\t\t*set level %- 5\n\t\t\t*set empathy %+ 5\n\t\t\tIn your experience, it's better to avoid the authorities altogether.\n\t\t\t\n\t\t\tThe Medusi don't agree, however; giving aliens the location of their planet is a serious crime.  They call Spider, instead.\n\t\t\t\n\t\t\t*goto spider_get\n\n*label ihp_or_not\n*if (message = false)\n\t*return\n*else\n\t*label ihp_arrives\n\t*set reckless_caught true\n\tSuddenly, a roar fills your ears and a strong wind makes you sta
