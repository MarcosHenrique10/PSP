e suffering from Ship Isolative Syndrome, the well-known phenomenon that causes isolated microsocieties aboard starships to develop deviant patterns of behavior.  They commit you to a resocialization institution, groundside of all places.  It takes one rotation of soul-searching therapy, and another of probation while integrating into a \"human normal\" society, for you to convince the doctors that you are sane enough to return to space.\n\t\n\t*if (nybat_rom > 1)\n\t\tYou miss Ny-bat, and wish you had had more time to explore your feelings for ${n_him}.  You start a correspondence when the doctors allow you—Ny-bat writes beautiful, elegant letters—and ${n_he} promises to join you when ${n_his} sentence is served.\n\t\t\n\t\t*goto zeeb\n\t*else\n\t\t*label zeeb\n\t\n\t\tYou travel back to Dekara Station, and try to resume your old habits.\n\t\t*if (adopt = 2)\n\t\t\tZeeber joins you, and you enroll your daughter in school, hoping to provide a bit of the normalcy and stability she has never had.\n\t\t\t\n\t\t\t*goto home\n\t\t*else\t\n\t\t\t*goto home\n\t\t\n*label endings\n*if (stay)\n\t*if (nybat_rom >= 2)\n\t\tAs soon as you can be alone, Ny-bat expresses ${n_his} regret that you'll be apart just as you are starting to get to know one another.\n\t\t*gosub nybat_future\n\t\t*goto weeks\n\t*else\n\t\t*label weeks\n\t\t*gosub learn\n\t\tBy the time the Reckless returns, you have the complete trust of the Medusi.\n\t\t\n\t\tSmall but steady shipments of vermite will be enormously profitable, both for the humans and the Medusi of 4-7-2.  As the Reckless' liaison with the tenders, you are now an invaluable member of the crew.\n\t\t*page_break\t\n\t\t*goto_scene pirate_end\n*else\n\t*if (nybat_rom > 1)\n\t\tNy-bat pulls you aside as you are returning to the ship.  \"Our partnership has been extremely successful so far.  I hope it will continue for some time,\" ${n_he} says, and you know from ${n_his} tone exactly what kind of partnership ${n_he} is discussing.\n\t\t\n\t\t*gosub nybat_future\n\t\t*goto transition\t\n\t*else\n\t\t*label transition\n\t\tWhen you and the Reckless return to 4-7-2 for the first shipment of vermite, you find a more mature Zeeber waiting for you.  She renegotiates her position aboard the ship with Zoa before agreeing to serve as a liaison with the Medusi, who trust her completely.\n\t\t\n\t\tSmall but steady shipments of vermite will be enormously profitable, both for the humans and the Medusi of 4-7-2.\n\t\t*page_break\n\t\t*goto_scene pirate_end\n\n*label android\nYou freeze, as an android that could be mistaken for a human in a flexsuit and helmet exits an airlock.  You've seen IHP androids on the station now and again, and you know that the helmet doesn't come off.\n\n*if (empathy > 75)\n\tTo your surprise, the Medusa guard shifts to stand beside you.\n\t\n\t\"Humble Tender will declaration for this human intentionality,\" it says.  \"Not abandonment until safety assurance.\"\n\t\n\tYou smile in a way you haven't since your kidnapping, touched by the Medusa's loyalty.\n\t\n\tYou offer up your hands to the android for foaming, introducing the Medusa by your side.\n\t\n\t*goto android_speaks\n*else\n\t*label android_speaks\n\t\n\t\"All comments will be recorded and reviewed by interrogators,\" says the android in a clearly synthetic voice.  You suppose the flat tone is deliberate, so the android cannot be mistaken for a human.\n\n\t\"Let's meet the interrogators, then,\" you say bravely, and allow yourself to be marched towards the IHP ship.\n\t*return\n\n*label learn\nYou learn a lot about the Medusi over the next few months.  Tenders are chosen because of their soft hearts, so most of the Medusi on 4-7-2 are only first or second level.  Their one overriding concern is that their children perform well at their leveling—the intelligence test that will determine their future place in society.  Most children score within the same level as their parents, though it is not unheard of for two second-levels to produce a third, for example.  The tenders spend most of their free time trying to stimulate their children's intellects, just in case one of them has the capacity to exceed expectations.\n\t\nYou endear yourself to your alien hosts by playing strategy games, tossing out math problems, and sharing information on the many alien races who pass through your home station.\n*return\n\n*label nybat_future\nNy-bat is clearly envisioning a long-term future for the two of you.  This is…\n*choice\n\t#…good, because I might be falling in love with ${n_him}.\n\t\t*set nybat_rom 3\n\t\t\"I can't wait to get home to the Reckless,\" you say, kissing ${n_him}.\n\t\t\n\t\t\"Neither can I.  Preferably with a cargo that will make us rich,\" says Ny-bat.\n\t\t\n\t\t*return\n\t#…worrisome, because I'm not ready for a serious relationship.\n\t\t*set nybat_rom 2\n\t\t\n\t\t\"We'll certainly have time to figure that out, over the next few weeks,\" you say, keeping your tone light.\n\t\t\n\t\t\"Of course,\" Ny-bat says, forehead wrinkling.  $!{n_he} understands your subtle hint, and avoids talking about the future from then on.\n\t\t\n\t\t*return\n\t#…embarrassing, because I only meant to flirt, that's all.\n\t\t*set nybat_rom 1\n\t\t\"I plan to stay on the Reckless, so we will definitely have chances to work together,\" you say, because it would be crueler to let ${n_him} hope.\n\t\t\n\t\tNy-bat nods, turning away.  From then on ${n_he} treats you with deference and distance, instead of affection.\n\n\t\t*return\n\n*label nybatcheck\n*if (nybat_ally)\n\t*return\n*else\n\t*set nybat_ally true\n\t*set allies + 1\n\t*return\n*label gaocheck\n*if (gao_ally)\n\t*return\n*else\n\t*set gao_ally true\n\t*set allies + 1\n\t*return\n*label utambucheck\n*if (utambu_ally)\n\t*return\n*else\n\t*set utambu_ally true\n\t*set allies + 1\n\t*return\n*label zeebercheck\n*if (zeeber_ally)\n\t*return\n*else\n\t*set zeeber_ally true\n\t*set allies + 1\n\t*return", "space": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*temp light false\n*temp time 20\n*if strength >= 75\n\t*set time +5\n\t*goto airlock\n*else\n\t*goto airlock\n\n*label airlock\nBack in the airlock, you review what you know about the human body exposed to vacuum—quite a bit, since you've lived your whole life on a station deep in space.  You've been playing in the vacuum since childhood, safe in a flexsuit, of course, but you've witnessed a minor accident or two. \n\nYou're no Groundsider, terrified of boiling blood or instant frostbite.  You know that the initial problems a human has in space are due to the lack of pressure.  If you are smart and rid the lungs of excess gas, you have about 80 seconds before the expanding gasses do any permanent damage.  On the other hand, the average person can stay conscious for only 20 seconds or so before succumbing to the lack of oxygen.  That is your practical time limit for reaching and opening a nearby airlock.\n*page_break\nYou lean into the bulbous vermite window.  Far to the left you see a huge cylinder, probably a cargo hold.  That might be a good place to hide, but an impractical destination at the moment.  A darkened vermite window only 8 meters away probably leads to another airlock.\n\nYou look to the right, and see another window 8 meters in that direction.  This one is lighted.\n\nWhich way will you go?\n*choice\n\t#To the darkened window.\n\t\t*goto breath\n\t#To the lighted window.\n\t\t*set light true  \n\t\t*goto breath\n\n*label breath\nThere's nothing more you can do to prepare yourself, except steel your nerves.  You examine the touchpad next to the airlock door.  It seems relatively simple, with clear buttons for opening the door and dissolving the vermite seal.  You hope the control panels on the outside are equally easy to use, since you'll be opening the next door dazed from lack of oxygen.\n\nIt's time.  The most important thing you must do before going into space is to…\n*choice\n\t#…take a deep breath.\n\t\tYou breathe in as you hit the pad.  You grab the door handle, hitching a ride as it swings open.  Space is black and silent.  You barely have time to register the cold before a searing pain rips through your chest.  The air in your lungs has expanded, ripping your lungs.\n\t\t\n\t\t*label pain\n\t\tThe pain is like nothing you've ever experienced.  You scream, but the vacuum swallows the sound.  You taste blood.  The pain is everything, it is everywhere, but you must think!  You are dying.  Your only hope is to get to a medibed before you bleed out.\n\t\t\n\t\tYou are still clinging to the door handle, stars be thanked, so you are face to face with the exterior touchpad.  Your vision is blurry; you cannot read the choices.  You hammer on the panel with your fist, hoping to raise an alarm. Soon everything is black.\n\t\t*goto medibed\n\t#…breathe out.\n\t\tExactly.  As you hit the touchpad, you breathe out, emptying your lungs.  You grab the door handle, hitching a ride as it swings open.  Space is black and silent.  It's your favorite view, but one you don't have time to sit and appreciate now.  Your lungs ache; your fingers, clenched around the door handle, feel cold and stiff.\n\t\t\n\t\tYou are still clinging to the door, face to face with the exterior touchpad.\n\t\t*choice\n\t\t\t#I take a few seconds to close the door, so that alarms don't sound.\n\t\t\t\t*set free_time 130\n\t\t\t\t*set time -10\n\t\t\t\tYou quickly transfer your grip to a cylindrical protrusion on the hull and tap the close and seal commands on the touchpad.  Since you closed the door, it might take some time for the pirates to realize that you've gone.  As the door begins its swing, you look more closely at what you are holding.  The top seems to screw off—and you can't believe your luck.  It's a coiled tether.  You'll be able to cross the hull much faster, now that you don't have to worry about floating off into space.\n\t\t\t\t\n\t\t\t\tYou clip the tether onto your belt and push off for the next handhold, an uneven join between two blocky hull plates.  Clearly this is a junkyard ship, cobbled together from pieces of wrecked ships.  It wouldn't be spaceworthy if it weren't sealed with vermite.\n\t\t\t\t\n\t\t\t\tYou have plenty of line, so you hitch a bit of tether round the corner of a hull plate and push off for a sensor apparatus.  The long metal antenna is even easier to grasp, but when you push off for the door you find the tether has become tangled in the equipment down on the hull.  You don't have time to untangle the line with numb fingers, so you unclip the tether.\n\t\t\t\t\n\t\t\t\tYou decide to:\n\t\t\t\t*choice\n\t\t\t\t\t#Push off for the door.  That will be quickest.\n\t\t\t\t\t\t*set time -3\n\t\t\t\t\t\t*goto push\n\t\t\t\t\t#Creep along the hull.  That will be safest.\n\t\t\t\t\t\t*set time -7\n\t\t\t\t\t\tYou scramble for a handhold along the unevenly joined hull plates.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto doorchoice\n\t\t\t#I grab the next handhold and hurry across the outside of the ship.\n\t\t\t\t*set free_time 110\n\t\t\t\tYou cling to whatever protrusions you can find, and set off across the hull.  There's no time to close the door, even though it means setting off alarms and alerting the pirates to your movements.\n\t\t\t\t*set time -12\n\t\t\t\t\n\t\t\t\tThe hull is uneven.  Plates overlap and join messily, with bent corners sticking up.  Clearly this is a junkyard ship, cobbled together from pieces of wrecked ships.  It wouldn't be spaceworthy if it weren't sealed with vermite.  The plate edges make lousy handholds, but they are all you've got at the moment.  The metal is piercingly cold.\n\t\t\t\t\n\t\t\t\tYou reach a sensor apparatus, and gratefully grab on to a long metal antenna.  You're at least halfway to the door, but you've already counted twelve seconds. Most people are unconscious by twenty seconds, you remember. You decide to:\n\t\t\t\t*choice\n\t\t\t\t\t#Push off for the door.  I'll never make it otherwise.\n\t\t\t\t\t\t*set time -3\n\t\t\t\t\t\t*label push\n\t\t\t\t\t\tIt's a risk you have to take.  Your stomach churns as you carefully stretch out parallel to the hull.  Of course you've been doing these kinds of maneuvers since childhood, but never without a tether.  Time is short, so you push off with your feet against the edge of the apparatus.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou skim the surface for one, two, three seconds, before you realize your trajectory is taking you slowly away from the hull. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*label doorchoice\n\t\t\t\t\t\t*if (light)\n\t\t\t\t\t\t\t*goto lightdoor\n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t*goto darkdoor\n\t\t\t\t\t#Keep creeping across the hull.  I'm stronger than most, so I'll last longer.\n\t\t\t\t\t\t*set time -7\n\t\t\t\t\t\t*goto doorchoice\n\t\t\t#I align myself and push off through the vacuum.\n\t\t\t\t*set free_time 110\n\t\t\t\tHopefully, you'll manage to catch the handle of the next airlock's door.  There's no time for creeping across the surface or closing the door, though it means setting off alarms and alerting the pirates to your movements.\n\t\t\t\t*set time -5\n\t\t\t\t\n\t\t\t\tYour stomach churns as you carefully stretch out parallel to the hull.  Of course you've been doing these kinds of maneuvers since childhood, but never without a tether.  Time is short, so you push off with your feet against the edge of the door.\n\t\t\t\t\n\t\t\t\tYou skim the surface for one, two, three seconds, before you realize your trajectory is taking you slowly away from the hull.  Your hands scramble against the uneven hull plates, trying to grasp one of the bent corners.  Clearly this is a junkyard ship, cobbled together from pieces of wrecked ships.  It wouldn't be spaceworthy if it weren't sealed with vermite.\n\t\t\t\t\n\t\t\t\tThe edges of the plates are too hard to catch as you are moving, but you must be the luckiest Stashie in the worlds.  You crash into an antenna, and grab the thin metal rod before you float away.\n\t\t\t\t\n\t\t\t\tYour heart is pounding.  You almost floated out into space!  But you must push those feelings away for now. You are halfway to the door, and have counted out five of your twenty seconds.  What will you do?\n\t\t\t\t*choice\n\t\t\t\t\t#Push off for the door again.  I survived the last time. \n\t\t\t\t\t\tDespite your near miss, you realign yourself and push off for the door.  This time, you manage better aim: The door handle looms ever closer.  You are going to hit it with your face, rather than your hands!  You jerk your head away, and your foot accidentally hits the hull, altering your course.  Your desperate hands swing past the door.  You flail in nothingness, and luckily manage to wedge a foot in the handle.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou carefully, carefully fold yourself up, and grasp the handle with your hand. You try to extricate your foot, but it's stuck!  Dizziness washes over you, leaving weakness and confusion behind.  You are running out of oxygen.  You cannot open the door; the automatic swing would crush you against the hull.  You have only one choice left.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (strength >= 70)\n\t\t\t\t\t\t\t*set strength %-15\n\t\t\t\t\t\t\tYou use your exceptional strength to wrench your foot free, regardless of the damage done to the soft tissue.  An injured foot will put you at a disadvantage later, but at least there will be a later.  You quickly activate the touchpad and set the door moving.  In just a moment, you'll be able to breathe.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*if (light)\n\t\t\t\t\t\t\t\t*goto lightairlock\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto darkairlock\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\tYour vision is blurry; you cannot read the choices on the touchpad.  You hammer on the panel with your fist, hoping to raise an alarm. Soon everything is black.\n\t\t\t\t\t\t\t*goto medibed\n\t\t\t\t\t#Creep across the hull.  It's safer.   \n\t\t\t\t\t\t*set time -8\n\t\t\t\t\t\tYou find handholds in the messy joins of badly matched hull plates, and pull yourself along as fast as you can.\n\t\t\t\t\t\t*goto doorchoice\n\t#…use the emergency breather I found to fill my lungs with oxygen.\n\t\tYou shove the three-centimeter tube into your mouth as you hit the pad.  You grab the door handle, hitching a ride as it swings open.  Space is black and silent.  Your favorite view, but one you don't have time to sit and appreciate now.  You pinch the end of the breather to start the flow of oxygen.  You barely have time to register the cold before a searing pain rips through your chest.  The air in your lungs has expanded, ripping your lungs.  You tear the breather from your mouth, sending it spinning into space, but the damage has already been done.\n\t\t*goto pain\n\n*label medibed\n*set strength %- 25\n*set infamy 5\nYou wake slowly.  Again.  This time you are staring straight up at the spidery metal arms and beige lid of a medibed.  You breathe deeply.  No pain.  The pirates must have hauled you in quite quickly.  You squirm at the thought that you owe them a debt.  At first you think you are restrained, but then you realize that you are simply weak.\n\n\"Medical report,\" you croak.\n\nThe lid lights up with a review of your vitals and a list of surgeries performed.  At the end is a suggestion for further treatment: twenty kiloseconds of aided recovery.  Yes/No.  \n\nYou tell the machine:\n*choice\n\t#Yes.  I need my strength back.\n\t\t*set strength %+ 15\n\t\tYou drift off to sleep, and wake feeling somewhat better.\n\t\t*label exit\n\t\tAs you sit up, the lid of the medibed rises automatically, and the mechanical arms scurry out of your way.  \n\t\t\t\t\n\t\t*label mystery\n\t\tYou are in the same cell as before, or, at least, an identical decontamination chamber.  You wonder if Krantic was monitoring your medibed use, and if you're about to receive another unpleasant visit.\n\t\t\n\t\tAs your feet touch the floor, a tense, unfamiliar voice crackles out of the call box.  \"Come!  Fellow prisoner, come!\"\n\t\t\n\t\tThe door to your cell slides open.  You hesitate for a moment, wondering if this is some kind of test or trap.\n\t\t\n\t\t\"Before treaty-breakers detection intrusion to mechanical systems, come!\" says the voice.  Though the voice is fully human in tone, there's something about it that makes you sure it is computer-generated.  A lifetime of experience on a busy station tells you are being hailed by an alien being.  All the pirates you've seen are human, so perhaps an ally is helping you.  It's time to leave your cell.\n\t\t*goto hallway\n\t#No.  I want to show the pirates how tough I am.\n\t\t*set infamy %+10\n\t\tThe medibed seems to tilt as you lift your head, but that's probably just dizziness.  You swallow down a bit of bile that's trying to escape your stomach.\n\t\t*goto mystery\n\t\t\n*label darkdoor\n\nBy the time your hand clenches around the door handle, you can feel the saliva boiling off of your tongue.  Your lungs are burning with the need to breathe.\n*if time \u003c 2\n\tYou try to focus your eyes on the touchpad beside the door, but your vision is too blurry to read the choices.  You can barely remember why you are out here; your thoughts are now mere flickers in the encroaching dark.  All you know is that you are dying, so you hammer on the touchpad with all your might.\n\t*goto medibed\n*else\n\tIt's hard to focus on the touchpad; the choices seem to be bouncing around like a handball in a zero-gym.  You raise a shaking hand and concentrate on selecting the right option.  The door begins its slow outward swing.  In a moment, you'll be able to breathe.\n\t*goto darkairlock\n\t\n*label darkairlock\n*page_break\nThe next moments are difficult to recall.  The floor seems to rise up and attack you; the warm air seems to claw at your freezing hands and face.  When you are yourself again, and the walls have ceased their spinning, you disengage the seal and stagger into the decontamination chamber.  It looks exactly like your cell, and your stomach flutters as you approach the door.  You've suffered so much, and achieved something nearly impossible, but if the door to this empty room is locked, all your efforts will have been in vain.\n\nYou punch the release button—and the door opens!  Finally, a bit of luck.\n*set infamy %+20\n*goto hallway\n\n*label lightdoor\n\nBy the time your hand clenches around the door handle, you can feel the saliva boiling off of your tongue.  Your lungs are burning with the need to breathe. You try to peer into the airlock window, but all you can see is a golden glow.\n*if time \u003c 2\n\tYou try to focus your eyes on the touchpad beside the door, but your vision is too blurry to read the choices.  You can barely remember why you are out here; your thoughts are now mere flickers in the encroaching dark.  All you know is that you are dying, so you hammer on the touchpad with all your might.\n\t*goto rescue\n*else\n\tIt's hard to focus on the touchpad; the choices seem to be bouncing around like a handball in a zero-gym.  You raise a shaking hand and concentrate on selecting the right option.  The door begins its slow outward swing.  In a moment, you'll be able to breathe.\n\t*goto lightairlock\n\t\n*label lightairlock\n*page_break\nThe next moments are difficult to recall.  The floor seems to rise up and attack you; the warm air seems to claw at your freezing hands and face.  When you are yourself again, and the walls have ceased their spinning, you realize that the air is thick and wet, barely breathable.  You pull yourself up to sitting, and peer through the haze and the transparent vermite seal.\n*label alien\nThere is a large lump in one corner of the decontamination chamber—a tan and yellow alien lump.\n\nThe vermite seal between the two rooms begins to dissolve from the center outwards, though you haven't made a move.  Clearly, the alien is inviting you in.\n*achieve escaped\n*set infamy %+ 20\n*page_break\n*goto_scene mushroom\n\n*label rescue\n*page_break\nYou wake coughing, choking on warm, thick and barely breathable air.  You pull yourself up to sitting, and realize you have been sprawled on an airlock floor.  You must have been rescued, but by whom?\n\nYou peer through the haze and the transparent vermite seal.\n*goto alien\n\n*label hallway\n*page_break\n*achieve escaped\nThe corridor is a tunnel of gray metal just tall enough for you to stand in, the kind of narrow space Stashies call homey and Groundsiders call claustrophobic.  You don't have time to stand around gawking, so you quickly take in the layout of this section of the ship.  On either side of your cell are two identical doors, one with a darkened window and one casting a golden glow over the floor in front of it.  Past the lit airlock, the passage ends in an oversized door clearly leading to a cargo hold.  In the other direction, the corridor bends sharply, perhaps leading into the center of the ship.\n\nYou need to see the captain before Krantic finds you, and you need information.  The cargo hold seems like your best option; it must have a terminal, and perhaps you can perform some reconnaissance before confronting the captain.\n\nAs you pass the lit airlock, you can't help taking a quick peek in.  The window is obscured by reddish-gold steam.  Clearly, the pirates are maintaining a different atmosphere inside.  The mist stirs, and suddenly you can make out a brownish lump moving towards the door.\n\n\"I am here.  You are here,\" says a deep voice, startling you.\n\nYou don't exactly have time to stand around and chat.  But this alien could be an ally against the pirates—or a source of information.\nYou reply:\n*fake_choice\n\t#\"Are you a prisoner?\"\t\n\t#\"Can humans breathe that air?\"\n\t#\"If you tell anyone you saw me, you'll regret it.\"\n\t#\"Help me!  I've been kidnapped!\"\n\"Humans bring pain.  The talking-talking-talking of ship and the silence of space.  Woe to tenders.  Humans on the ground.  Humans silence in the every-mist.  My shame!\" says the voice.\n\nYou have no idea what that means.\n\nWith a click, the airlock door pops open.  You instinctively step back as a wash of warm, thick air passes over you.  It is breathable, but smells foul.\n\nIt seems you are invited in.\n*choice\n\t#Enter the cell.\n\t\t*goto_scene mushroom\n\t#Speed to the cargo hold.\n\t\t*goto_scene cargo_bay\n", "startup": "*comment ñáéç…—\n*title Reckless Space Pirates\n*author Rachel Zakuta\n*scene_list\n\tstartup\n\tch1\n\tspace\n\tmushroom\n\tcargo_bay\n\tcapture\n\tcaptain\n\tchained\n\tprisoner\n\thazing\n\tinterrogation\n\tbonus\n\tbeach\n\tmedusi_camp\n\tcrew_camp\n\tmedusi_cave\n\tcrew_cave\n\tambush\n\ttrap\n\tpits\n\tnewcrater\n\tship\n\tresist\n\thostage\n\tpirate_end\n\tstation_end\n\n*create strength 50\n*create empathy 50\n*create level 50\n*create persuasiveness 50\n*create hacking 25\n*create infamy 5\n*create intent 2\n*create needle false\n*create gao_release false\n*create miss \"?\"\n*create kids false\n*create so \"none\"\n*create gao_hurt false\n*create gao_released false\n*create mushroom false\n*create chained false\n*create message false\n*create sabotage \"none\"\n*create zeeber_ally false\n*create gao_ally false\n*create mushroom_ally false\n*create nybat_ally false\n*create utambu_ally false\n*create leader_ally false\n*create free_time 120\n*create net false\n*create mission_info false\n*create allies 0\n*create crew false\n*create solo false\n*create prisoner false\n*create gun false\n*create extralate false\n*create leader \"Krantic\"\n*create crew_strength 16\n*create medusi_strength 20\n*create second \"Ny-bat\"\n*create split false\n*create dry_first false\n*create speakvermite false\n*create rockfall false\n*create trial false\n*create level_text \"Unknown\"\n\n*create name \"none\"\n*create partner \"none\"\n*create adopt 0\n*create stationrep true\n*create late false\n\n*create nybat_rom 0\n*create married false\n*create nybat_gender \"man\"\n*create n_he \"he\"\n*create n_him \"him\"\n*create n_his \"his\"\n*create l_he \"he\"\n*create l_him \"him\"\n*create l_his \"his\"\n\n*create arrived false\n*create leveled false\n*create reckless_caught false\n*create partner_saved false\n*create vermite_state 3\n*create resist false\n*create p_end false\n*create zeeber_fate 0\n*create already_hazing false\n*create ship_name \"Reckless\"\n*create position \"Officer\"\n\n*achievement acceptance visible 25 Made your mark\n\tImpress the crew.\n\tYou impressed the crew.\n*achievement call visible 50 Distress Call\n\tSend a call for help.\n\tYou sent a call for help.\n*achievement captain hidden 100 Captain of a Starship!\n\thidden\n\tYou became the captain of a starship.\n*achievement crewmember visible 25 You joined the crew!\n\tJoin the Reckless's crew.\n\tYou joined the Reckless's crew.\n*achievement diplomat visible 50 You earned the Medusi's trust.\n\tEarn the Medusi's trust.\n\tYou earned the Medusi's trust.\n*achievement escaped visible 25 You escaped from your cell!\n\tEscape from your cell.\n\tYou escaped from your cell.\n*achievement intel visible 25 Mushroom Interrogator\n\tGather some intel from the Mushroom.\n\tYou gathered some important information from the Mushroom.\n*achievement fifth visible 100 Fifth Level\n\tImpress the Medusi with your intelligence.\n\tYou impressed the Medusi with your intelligence.\n*achievement fourth visible 50 Fourth Level\n\tImpress the Medusi with your intelligence.\n\tYou impressed the Medusi with your intelligence.\n*achievement freedom visible 25 Flee the pirates!\n\tEscape the Reckless's crew.\n\tYou escaped the pirates.\n*achievement second visible 50 Second-in-Command\n\tBecome second-in-command of a starship.\n\tYou became second-in-command of a starship.\n*achievement home visible 100 There and back again.\n\tMake you way home to Dekara Station.\n\tYou made you way home to Dekara Station.\n*achievement leader visible 25 Commander of the Ground Team\n\tBecome leader of the ground team.\n\tYou became the Commander of the Ground Team.\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tYou have a choice: join a crew of space pirates to steal priceless slime from a nest of mushroom-like aliens--or hoodwink the pirates and team up with the mushroom colony to prevent an interstellar war!\n\n\t\"Reckless Space Pirates\" is a thrilling interactive science-fiction novel by Rachel Zakuta where your choices control the story. The game is entirely text-based--without graphics or sound effects--and powered by the vast, unstoppable power of your imagination.\n\n\tWill you survive the infamous space-slime pits? Will you earn the respect of the crew, or even start a romance with a space pirate? Can you negotiate with the fungoid aliens, despite linguistic and cultural barriers? Or will you blast their rubbery guts, plunder the slime pits, and retire in luxury?\n\n\t*if choice_is_advertising_supported\n\t\t[i]Reckless Space Pirates[/i] is supported by advertisements, but you can buy the unlimited version\n\t\tto turn off ads forever.\n\t\t\n\t\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t\t*page_break_advertisement\n\n\t\t*goto purchased\n\t*else\n\t\t[i]You can play the game for free, with 2 hour breaks between chapters, or you can buy the game now for unlimited play without breaks.[/i]\n\n\t\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t\t*page_break Play Now for Free\n\n*label purchased\n", "station_end": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*comment ñáéç…—\n*achieve home\n*temp nybat_with false\n*temp gao_with false\n*temp utambu_with false\n*temp zeeber_with false\n*temp family_with false\n*temp rejected false\n*comment just for ease of coding, though partner_saved + partner does the trick\nEpilogue\n\nYou have what you wanted: you are home, safe, back ${miss}.\n*if (kids)\n\tYour children are overjoyed, and actually do what you tell them to without complaint for awhile.\n\t*goto so_check\n*else\n\t*label so_check\n\t*if (so = \"none\")\n\t\t*goto blah\n\t*elseif (nybat_rom = 1)\n\t\tYour ${so} missed you terribly.\n\t\t*goto blah\n\t*else\n\t\t*set so \"none\"\n\t\tYou have to tell your ${so} that you are with Ny-bat now, but the rest of your reunions are happy.\n\t\t*goto blah\n\n*label blah\nYou return to your familiar routines, though time seems to pass strangely: the days stretch long, but whole months seem to disappear from your memory, with nothing of significance for you to recollect.  You don't quite understand it—you should be happier!\n\n*if (adopt > 1)\n\t*set zeeber_with true\n\tZeeber has trouble adjusting to a less adventurous life, but she loves you unreservedly.  You are grateful that your kidnapping brought her into your life.\n\n\t*goto partner\n*else\n\t*label partner\n\t*if (partner_saved = true)\n\t\t*if (partner = \"Ny-bat\")\n\t\t\t*set nybat_with true\n\t\t\tNy-bat stages some public martial arts displays, and collects enough students to keep ${n_him} busy.  You can tell ${n_he} is restless, though.  $!{n_he} is an excellent teacher, but ${n_his} leadership skills are going to waste.\n\t\t\t*goto nybat_relationship\n\t\t\t\n\t\t*elseif (partner = \"Gao\")\n\t\t\t*set gao_with true\n\t\t\tGao finds a position teaching economics in the station school.  When school breaks for Confederation Day, you convince him to make a trip to his home planet, and see the family he has been ashamed to contact ever since Zoa kidnapped him thirty years ago.\n\t\t\t\t\t\t\n\t\t\t*goto ny_apart\n\t\t\n\t\t*elseif (partner = \"Utambu\")\n\t\t\t*set utambu_with true\n\t\t\tUtambu can't settle into station life—he needs a ship to tinker with.  You find him a position on a legal trader that makes weekly runs from Dekara Station to the planet below.  He stays with you on his days off. \n\t\t\t\n\t\t\t*goto ny_apart\n\t\t\n\t\t*else\t\t\n\t\t\t*goto ny_apart\n\t*else\n\t\t*goto ny_apart\n\n*label ny_apart\n*if ((nybat_with = false) and (nybat_rom > 1))\n\t*set nybat_with true\n\t*if (reckless_caught)\n\t\tNy-bat writes to you from prison, where ${n_he} works to secure ${n_his} release in exchange for testimony against Krantic.  Krantic doesn't get an actual trial—there's some business about him being a failed, illegal genetic experiment—but when he's taken away to wherever they take those classified as dangerous subhumans, Ny-bat is free to join you on Dekara.\n\t\t*goto nybat_relationship\n\t*else\n\t\tAccording to the plans you made back on the Reckless, Ny-bat abandons Zoa as soon as ${n_he} can, and joins you on Dekara station.\n\t\t\n\t\t*label nybat_relationship\n\t\t*if (nybat_rom = 3)\n\t\t\t*page_break\n\t\t\tYou and Ny-bat share an apartment, of course, and the best hours of the day are the evenings you spend together.\n\t\t\t*label roommates\n\t\t\t\n\t\t\tYou argue about where it's acceptable to throw dirty clothes and where it's not, and whose turn it is to prune the ceiling ivy—but that's what lovers do when they first share living space.  You play ${n_him} your favorite music.  $!{n_he} cooks food from Planet Evergreen for you.  You learn to read ${n_his} feelings from the look on ${n_his} face, even when ${n_he}'s doing ${n_his} impression of an impassive android.\n\t\t\t\n\t\t\tYou sleep in on Confederation Day, and wake to find a note from Ny-bat requesting your presence in one of Dekara's smaller vista bubbles.  The sign on the ladder says \"Closed for Repairs,\" but you climb up anyway, and find Ny-bat alone, with the stars all around ${n_him}.  $!{n_he} asks you to marry ${n_him}, and you answer:\n\t\t\t*choice\n\t\t\t\t#Yes.\n\t\t\t\t\tYou knock Ny-bat back into the transparent wall with your enthusiastic response.\n\t\t\t\t\t\n\t\t\t\t\tThough your life doesn't change much after you and Ny-bat are married, everything is different.  You should have known—you've spent enough time in vacuum—it's the tether that lets you fly.\n\t\t\t\t\t\n\t\t\t\t\t*goto home_choice\n\t\t\t\t#No.\n\t\t\t\t\t*set nybat_with false\n\t\t\t\t\t*set nybat_ally false\n\t\t\t\t\t*set allies - 1\n\t\t\t\t\t*set rejected true\n\t\t\t\t\tNy-bat can't stay—${n_he} can't have anything less than everything with you.  He takes ship on a trader heading across the arm of the spiral, and that's the last you hear from ${n_him}.\n\t\t\t\t\t\n\t\t\t\t\t*goto home_choice\t\t\t\n\t\t*if (nybat_rom = 2)\n\t\t\t*page_break\n\t\t\tYou let Ny-bat stay with you; ${n_he}'s clearly devoted, though you're not sure how you feel about a long-term commitment.  You have fun spending evenings at home together, but is it just fun you want, or something more?\n\t\t\t\n\t\t\t*goto roommates\n\t\t*else\n\t\t\t*goto home_choice\n*else\n\t*goto home_choice\n\n*label home_choice\nWhen First Spin rolls around again, you finally admit to yourself that 'safe' doesn't satisfy you anymore.  'Safe' is boring.  Your experience with the Medusi has changed you, and you yearn for a life that is more…\n*choice\n\t#…adventurous.\n\t\t*set infamy %+ 15\n\t\t*set empathy %+ 15\n\t\t*if (resist = false)\n\t\t\tYou empty all your accounts and buy a single-family ship.  There are some Medusi you want to visit, and after that, there's an awful lot of galaxy out there.\n\t\t\t\n\t\t\t*gosub people_with\n\t\t\t\n\t\t\t*gosub companion\n\t\t\tYour crew is complete, and your adventures are just beginning.  There are aliens who've never met a human, worlds that no human has ever seen.\n\t\t\t*page_break\n\t\t\t\n\t\t\t*gosub with_fates\n\t\t\t\t\t\t\n\t\t\t*gosub content\n\t\t\t\n\t\t\t*goto_scene ending\n\t\t*else\n\t\t\tYou empty all your accounts and buy a single-family ship.  There are some Medusi you'd like to visit, and after that, there's an awful lot of galaxy out there.\n\t\t\t*label adventure\n\t\t\t\n\t\t\t*gosub people_with\n\t\t\t\n\t\t\t*gosub companion\n\t\t\tYour crew is complete, and your adventures are just beginning.\n\t\t\t*page_break\n\t\t\tYou make a name for yourself as a benevolent rover, an independent operator who responds to distress calls, delivers emergency medical supplies, and runs blockades.  Stars be thanked you were kidnapped by the Reckless!  Otherwise, you never would have found your calling.\n\t\t\t\t\t\t\n\t\t\t*gosub with_fates\n\t\t\n\t\t\t*gosub content\n\t\t\t\n\t\t\t*goto_scene ending\n\t#…altruistic.\n\t\t*set empathy %+ 30\n\t\t*if (resist = false)\n\t\t\t*label solo_adventure\n\t\t\tYou empty all your accounts and buy a single-family ship.  There are so many injustices out here on the edge of human civilization—so many people that you could help.\n\t\t\t*gosub people_with\n\t\t\t\t\n\t\t\t*gosub companion\n\t\t\tYour crew is complete, and your adventures are just beginning.\n\t\t\t*page_break\n\t\t\tYou make a name for yourself as a benevolent rover, an independent operator who responds to distress calls, delivers emergency medical supplies, and runs blockades.  Stars be thanked you were kidnapped by the Reckless!  Otherwise, you never would have found your calling.\n\t\t\t\t\t\n\t\t\t*gosub with_fates\n\t\t\t\n\t\t\t*gosub content\n\t\t\t\n\t\t\t*goto_scene ending\n\t\t*else\n\t\t\tThere are many ways to serve, of course.  You decide to…\n\t\t\t*choice\n\t\t\t\t#…pursue a career in the IHP.\n\t\t\t\t\t*goto ihp_career\n\t\t\t\t#…set out to do good in mine own ship.\n\t\t\t\t\t*goto solo_adventure\n\t\t\t\t#…join the diplomatic corps.\n\t\t\t\t\t*label diplomatic_career\n\t\t\t\t\tYou've seen firsthand the problems created by a trade treaty that hurts both manufacturers and consumers.  You decide to apply to the diplomatic corps, and dedicate your life to maintaining galactic peace.\n\t\t\t\t\t\n\t\t\t\t\t*if (level > 65)\n\t\t\t\t\t\tBecause of your superior intelligence, you rise quickly through the ranks.  You agitate for a revised Human-Medusi treaty, and are instrumental in breaking Spider's monopoly and improving the standard of living for lower-level Medusi.\n\t\t\t\t\t\t*goto altruistic\n\t\t\t\t\t*elseif (strength > 74)\n\t\t\t\t\t\tBecause of your excellent combat skills, you are assigned to guard high-level diplomats as they meet face-to-face with potentially dangerous aliens.  You save a few lives when violence breaks out, and occasionally prevent violent misunderstandings because of your instinctive understanding of alien behavior.\n\t\t\t\t\t\t*goto altruistic\n\t\t\t\t\t*elseif (hacking > 74)\n\t\t\t\t\t\tBecause of your innate understanding of computer systems, you are assigned to work electronic security at deep space conferences with potentially dangerous aliens.  You foil a few assassination attempts, and expose the underhanded dealings of one of humanity's own diplomats.\n\t\t\t\t\t\t*goto altruistic\n\t\t\t\t\t*else\n\t\t\t\t\t\t*label altruistic\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (nybat_with)\n\t\t\t\t\t\t\tNy-bat follows you into the diplomatic corps, often posing as a simple bodyguard while covertly gathering information.  You forge an incredible partnership, and are often assigned as a pair to resolve particularly difficult situations.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*label second_with\n\t\t\t\t\t\t\t*gosub family_check\n\t\t\t\t\t\t\t*if (gao_with)\n\t\t\t\t\t\t\t\tGao stays on Dekara Station, insisting that he is too old for any more adventures.  He sets up his own import/export business, and does extremely well.  You would invest with him for old times' sake, but you are not convinced all his transactions are completely above board.\n\t\t\t\t\t\t\t\t*goto zeeber_diplomatic\n\t\t\t\t\t\t\t*elseif (utambu_with)\n\t\t\t\t\t\t\t\tUtambu follows you into the diplomatic corps, providing technical support to field agents.  You forge an incredible partnership, and are often assigned as a pair to resolve particularly difficult situations.\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto zeeber_diplomatic\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*label zeeber_diplomatic\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (zeeber_with)\n\t\t\t\t\t\t\t\t\tZeeber stays with you for four years.  She's happy to be back in space; Shippers often have trouble adjusting to the larger social world of a station or planet.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tBy the time she's an adult, Zeeber knows her way around the diplomatic corps.  Though she has little formal education, she finds a job as a translator, thanks to her fluency with Sandovali language and culture.  You hope that facing her past as a Sandovali slave will bring her some peace.\n\t\t\t\t\t\t\t\t\t*label diplomatic_end\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*gosub influence\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tEvery year,\n\t\t\t\t\t\t\t\t\t*if ((nybat_with = true) and (nybat_rom > 1))\n\t\t\t\t\t\t\t\t\t\tNy-bat and\n\t\t\t\t\t\t\t\t\t\t*goto wrap\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*label wrap\n\t\t\t\t\t\t\t\t\t\tyou put a little aside for your retirement dream—a ship of your own.  There are aliens who've never met a human, worlds that no human has ever seen.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tThere's a lot of galaxy out there, and your adventures are just beginning.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*goto diplomatic_end\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto second_with\n\t\t\t\t\t\t\t\n\t*if (resist = false) #…subversive.\n\t\t*set infamy %+ 30\n\t\t*label smuggling\n\t\tYou empty all your accounts and buy a single-family ship.  It has only a small space for cargo, but what space you have you fill with hover projectors.\n\t\t\n\t\t*gosub people_with\n\t\t\n\t\tThe Medusi of 4-7-2 are happy to see you, and willing to trade some vermite.  They give you the coordinates of a few other small tender colonies, and you are able to spread out your business so that Spider doesn't notice a shortfall at any particular site.  \n\t\t\t\t\n\t\t*gosub companion\n\t\tYour crew is complete, and your adventures are just beginning.\n\t\t*page_break\n\t\tYour smuggling is extremely lucrative, and soon you are able buy a luxurious space yacht for you and your growing crew.  You hire a couple more crew members, but you keep your operation small, and manage to avoid the notice of the IHP.\n\t\t\n\t\t*gosub with_fates\n\t\t\t\t\n\t\t*gosub content\n\t\t\n\t\t*goto_scene ending\n\t*if (resist = true) #…ambitious.\n\t\t*set empathy %+ 15\n\t\t*set infamy %+ 15\n\t\tThere are many ways to achieve success, of course.  You prefer to…\n\t\t*choice\n\t\t\t#…join the diplomatic corps.\n\t\t\t\t*goto diplomatic_career\n\t\t\t#…set out to change the galaxy in mine own ship.\n\t\t\t\t*goto solo_adventure\n\t\t\t#…start mine own smuggling business.\n\t\t\t\t*goto smuggling\n\t\t\t#…pursue a career in the IHP.\n\t\t\t\t*label ihp_career\n\t\t\t\tYou've seen firsthand how dangerous pirates can be.  You decide to apply to the IHP, and dedicate your life to enforcing the inter-species treaties that maintain galactic peace.\n\t\t\t\t\n\t\t\t\tYou rise through the ranks due to your commitment and\n\t\t\t\t*if (hacking > 74)\n\t\t\t\t\tengineering skills.\n\t\t\t\t\t\n\t\t\t\t\t*label ambitious\n\t\t\t\t\t*if (nybat_with)\n\t\t\t\t\t\tNy-bat follows you into the IHP; the organization decides to overlook his shady past because he is so perfectly suited to undercover work.  $!{n_he} often poses as a pirate while covertly gathering information.  You forge an incredible partnership, and are often assigned as a pair to resolve particularly difficult situations.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label who_with\n\t\t\t\t\t\t*gosub family_check\n\t\t\t\t\t\t*if (gao_with)\n\t\t\t\t\t\t\tGao stays on Dekara Station, insisting that he is too old for any more adventures, and the IHP would never accept him anyway.  He sets up his own import/export business, and does extremely well.  You would invest with him for old times' sake, but you are not convinced all his transactions are completely above board.\n\t\t\t\t\t\t\t*goto zeeber_ihp\n\t\t\t\t\t\t*elseif (utambu_with)\n\t\t\t\t\t\t\tUtambu follows you into the IHP; the organization decides to overlook his shady past in light of his gift for technological innovation.  He stays at headquarters, improving IHP equipment and ship design, but you see him often.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto zeeber_ihp\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*label zeeber_ihp\n\t\t\t\t\t\t\t*if (zeeber_with)\n\t\t\t\t\t\t\t\tZeeber stays with you for four years.  She's happy to be back in space; Shippers often have trouble adjusting to the larger social world of a station or planet.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tBy the time she's an adult, Zeeber knows her way around the IHP.  Though she has little formal education, she finds a job as a translator, because of her fluency with Sandovali language and culture.  You hope that facing her past as a Sandovali slave will bring her some peace.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto ihp_end\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*label ihp_end\n\t\t\t\t\t\t\t\t*gosub influence\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tEvery year,\n\t\t\t\t\t\t\t\t*if ((nybat_with = true) and (nybat_rom > 1))\n\t\t\t\t\t\t\t\t\tNy-bat and\n\t\t\t\t\t\t\t\t\t*goto you\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*label you\n\t\t\t\t\t\t\t\t\tyou put a little aside for your retirement dream—a ship of your own.  There are aliens who've never met a human, worlds that no human has ever seen.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tThere's a lot of galaxy out there, and your adventures are just beginning.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto_scene ending\t\t\t\t\t\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto who_with\t\t\t\t\t\t\n\t\t\t\t*elseif (strength > 74)\n\t\t\t\t\tcombat skills.\n\t\t\t\t\t*goto ambitious\n\t\t\t\t*elseif (level > 65)\n\t\t\t\t\tsuperior intelligence.\n\t\t\t\t\t*goto ambitious\n\t\t\t\t*else\n\t\t\t\t\tcharisma.\n\t\t\t\t\t*goto ambitious\t\t\n*label people_with\n*if (miss = \"with your friends\")\n\tIt's a bit sad, leaving your Dekara friends again, but of course you can come back and visit.\n\t\n\t*goto zeeber_possibility\n*elseif (miss = \"with your family\")\n\tYour family comes with you, naturally; you would never leave them behind.\n\t*goto zeeber_possibility\n*else\n\t*goto zeeber_possibility\n*label zeeber_possibility\n*gosub family_check\n*if (zeeber_with)\n\tZeeber happily abandons her studies and joins you.\n\t*goto others\n*else\n\t*label others\n\t*if ((nybat_with) and (nybat_rom > 1))\n\t\tOf course Ny-bat would stay with you whatever you chose—but ${n_he} is thrilled with your decision, for ${n_his} own sake as well as yours.\n\t\t*label who\n\t\t*if (gao_with)\n\t\t\tGao is happy to take ship again, and you're glad to have his company.\n\t\t\t*return\n\t\t*elseif (utambu_with)\n\t\t\tUtambu wishes you had let him check the engine before paying for the ship, but you tell him he'll have ample opportunity to fashion upgrades.\n\t\t\t*return\t\n\t\t*else\n\t\t\t*return\n\t*elseif (nybat_with)\n\t\tNy-bat is thrilled with your decision, for ${n_his} own sake as well as yours.\n\t\t*goto who\n\t*else\n\t\t*goto who\n\n*label companion\nIs there anyone from the Reckless you'd like to invite to accompany you?\n*choice\n\t*if ((nybat_with = false) and (rejected = false)) #Ny-bat.\t\n\t\t*gosub nybatcheck\n\t\t*set nybat_with true\n\t\t*if (reckless_caught)\n\t\t\tNy-bat finishes out ${n_his} prison term, before joining you on your ship.\n\t\t\t*return\n\t\t*else\n\t\t\tNy-bat's leadership skills are wasted on the Reckless, under Zoa.  You leave messages for ${n_him} at various ports of call, and ${n_he} eventually leaves the Reckless and finds you.\n\t\t\t*return\t\t\t\t\t\t\n\t*if (gao_with = false) #Gao.\n\t\t*set gao_with true\n\t\t*gosub gaocheck\n\t\t*if (reckless_caught)\n\t\t\tYou know that Gao was originally one of Zoa's victims, just like you.  He finishes up an easy prison term while helping his guards invest their pensions wisely, and then joins you on your ship.\n\t\t\t*return\n\t\t*else\n\t\t\tYou know that Gao was originally one of Zoa's victims, just like you. You leave messages for him at various ports of call, and he eventually leaves the Reckless and finds you.\n\t\t\t*return\n\t*if (utambu_with = false) #Utambu.\n\t\t*set utambu_with true\n\t\t*gosub utambucheck\n\t\t*if (reckless_caught)\n\t\t\tYou're sure that the nervous engineer never actually hurt anyone.  Utambu earns early parole, after improving the prison's security system, and then joins you on your ship.\n\t\t\t*return\n\t\t*else\n\t\t\tYou're sure that the nervous engineer never actually hurt anyone.  You leave messages for Utambu at various ports of call, and he eventually leaves the Reckless and finds you.\n\t\t\t*return\n\t*if (zeeber_with = false) #Zeeber.\t\n\t\t*set zeeber_with true\n\t\t*gosub zeebercheck\n\t\tYou weren't prepared to adopt Zeeber, but that doesn't mean you don't sympathize with her.\n\t\t\n\t\t*if (reckless_caught)\n\t\t\tYou find her languishing in the group home where the IHP has placed her, unable to connect with the other teens or see the point of a formal education.  Her departure from the therapeutic setting may not be precisely legal, but Zeeber is profoundly grateful to be shipside again.\n\t\t\t*return\n\t\t*else\n\t\t\tYou leave messages for Zeeber at various ports of call, and eventually she leaves the Reckless and finds you.\n\t\t\t*return\t\t\n\t#No one.\n\t\tYou prefer to take your chances by hiring a stranger; you're sure you can easily find someone more trustworthy than the pirates who kidnapped you.\n\t\t*return\n\t\t\n*label influence\n*if (reckless_caught = true)\n\tNow that you've gained some influence, would you like to help any of the pirates attain early parole?\n\t*choice\n\t\t*if ((nybat_with = false) and (rejected = false)) #Ny-bat.\n\t\t\t*set empathy %+ 10\n\t\t\t*gosub nybatcheck\n\t\t\tYou respect Ny-bat, and know that ${n_his} leadership skills are wasted in prison, so you arrange for ${n_his} release.  Ny-bat makes a name for ${n_him}self as a kind of benevolent rover, an independent operator who responds to distress calls, delivers emergency medical supplies, and runs blockades. You use your position to tell ${n_him} where ${n_he} is needed, and remain life-long allies.\n\t\t\t*return\n\t\t*if (gao_with = false) #Gao.\n\t\t\t*set empathy %+ 10\n\t\t\t*gosub gaocheck\n\t\t\tYou know that Gao was originally one of Zoa's victims, just like you.  You are able to get his sentence reduced, and to find him a teaching position on your home station.  He eventually sets up his own import/export business, and does extremely well.  You would invest with him for old times' sake, but you are not convinced all his transactions are completely above board.\n\t\t\t*return\n\t\t*if (utambu_with = false) #Utambu.\n\t\t\t*set empathy %+ 10\n\t\t\t*gosub utambucheck\n\t\t\tYou're sure that the nervous engineer never actually hurt anyone.  You are able to get Utambu's sentence reduced, and to find him a position on a legal trader.  Eventually, he patents some technological innovations, and makes a name for himself in the field of engine design.\n\t\t\t*return\n\t\t*if (zeeber_with = false) #I'll check on Zeeber in her group home, instead.\n\t\t\t*set empathy %+ 10\n\t\t\t*gosub zeebercheck\n\t\t\tYou find Zeeber languishing in the group home where the IHP has placed her, unable to connect with the other teens or see the point of a formal education.  She's desperate to be back in space; Shippers often have trouble adjusting to the larger social world of a station or planet.  Since she's a legal adult now, you find her a job as a translator, where she can use her knowledge of Sandovali language and culture.  You hope that facing her past as a Sandovali slave will bring her some peace.\n\t\t\t*return\n\t\t#None of them interest me anymore.\n\t\t\t*set empathy %- 15\n\t\t\t*return\n*else\n\tNow that you've gained some influence, would you like to offer any of the pirates amnesty, in exchange for some information about smuggling routes?\n\t*choice\n\t\t*if (partner != \"Ny-bat\") #Ny-bat.\n\t\t\t*set empathy %+ 10\n\t\t\t*gosub nybatcheck\n\t\t\tYou respect Ny-bat, and know that ${n_his} leadership skills are wasted serving on the Reckless under Zoa.  You leave messages for ${n_him} at various ports of call, and ${n_he} eventually turns ${n_him}self in to you, though ${n_he} won't give any information that puts the Reckless in particular at risk.\n\t\t\t\n\t\t\tNy-bat makes a name for ${n_him}self as a kind of benevolent rover, an independent operator who responds to distress calls, delivers emergency medical supplies, and runs blockades.  You use your position to tell ${n_him} where ${n_he} is needed, and remain life-long allies.\n\t\t\t\n\t\t\t*return\n\t\t*if (partner != \"Gao\") #Gao.\n\t\t\t*set empathy %+ 10\n\t\t\t*gosub gaocheck\n\t\t\tYou know that Gao was originally one of Zoa's victims, just like you. You leave messages for him at various ports of call, and he eventually turns himself in to you, though he won't give any information that puts the Reckless in particular at risk.  You are able to find him a teaching position on your home station.\n\t\t\t\n\t\t\tGao eventually sets up his own import/export business, and does extremely well.  You would invest with him for old times' sake, but you are not convinced all his transactions are completely above board.\n\t\t\t*return\n\t\t*if (partner != \"Utambu\") #Utambu.\n\t\t\t*set empathy %+ 10\n\t\t\t*gosub utambucheck\n\t\t\tYou're sure that the nervous engineer never actually hurt anyone.  You leave messages for Utambu at various ports of call, and he eventually turns himself in to you, though he won't give any information that puts the Reckless in particular at risk.\n\t\t\t\n\t\t\tUtambu can't settle down to station life—he needs a ship to tinker with.  You are able to find him a position on a legal trader.  Eventually, he patents some technological innovations, and makes a name for himself in the field of engine design.\n\t\t\t*return\n\t\t*if (zeeber_with = false) #Zeeber.\n\t\t\t*set empathy %+ 10\n\t\t\t*gosub zeebercheck\n\t\t\tZeeber was as much Zoa's victim as her collaborator.  You leave messages for her at various ports of call, and she eventually turns herself in to you, though she won't give any information that puts the Reckless in particular at risk.\n\t\t\t\n\t\t\tSince she's a legal adult now, you find Zeeber a job as a translator on a legal trader, where she can use her knowledge of Sandovali language and culture.  You hope that facing her past as a Sandovali slave will bring her some peace.\n\t\t\t*return\n\t\t#None of them interest me anymore.\n\t\t\t*set empathy %- 15\n\t\t\t*return\t\n\t\t\n*label with_fates\n*if ((nybat_with) and (nybat_rom > 1))\n\n\tYou forge a relationship with Ny-bat based on love and trust, and become an unbeatable married team, able to anticipate each other's actions even when a dangerous situation separates you.\n\t*goto zeeber_end\n*elseif (nybat_with)\n\tYou and Ny-bat form an incredible partnership.  Eventually ${n_he} finds someone to marry—a Groundsider, no less—and they have the first baby to be born on your ship, though not the last.\n\t*goto zeeber_end\n*else\n\t*label zeeber_end\n\t*if (zeeber_with)\n\t\tZeeber is happy to be shipside again; Shippers often have trouble adjusting to the larger social world of a station or planet.  When she's ready, you take her back to Sandovali space to file charges against her former masters.  You don't stay long enough to see if the ship is caught, but the act of facing her past and making the complaint seems to bring Zeeber some peace.  \n\t\t*goto gao_end\n\t\t\n\t*else\n\t\t*label gao_end\n\t\t*if (gao_with)\n\t\t\tGao manages your money and the hidden savings of the former Reckless crew, which the IHP never found.  You form a firm friendship and partnership, and he becomes like a father to you.\n\t\t\t*goto utambu_end\n\t\t*else\n\t\t\t*label utambu_end\n\t\t\t*if (utambu_with)\n\t\t\t\tUtambu turns your ship into the fastest single-engine cruiser you've ever heard of.  He falls in love with a fellow hacker he's never met, and brings her on board.\t\t\t\t\n\t\t\t\t*return\n\t\t\t*else\n\t\t\t\t*return\n\n\n*label content\nAs for you, when the engines are roaring in the background, and the ship is in motion, you feel a contentment deeper than any rational explanation.  Life has its ups and downs, but you know that as long as you are going somewhere, you're fine.  You suppose that makes you a Shipper, but if it makes you crazy, well, you're in good company.\n*return\n\n*label family_check\n*if ((kids = true) and (so = \"none\"))\n\tYour children travel back and forth between you and your ex; you have them half the time.\n\t*return\n*elseif (kids = true)\n\tYour ${so} and children follow you to your new home.\n\t*return\n*elseif (so != \"none\")\n\tYour ${so} follows you to your new home.\n\t*return\n*else\n\t*return\n\t\n\n*comment ALLY ADJUSTMENT SUBROUTINES\n*label nybatcheck\n*if (nybat_ally)\n\t*return\n*else\n\t*set nybat_ally true\n\t*set allies + 1\n\t*return\n*label gaocheck\n*if (gao_ally)\n\t*return\n*else\n\t*set gao_ally true\n\t*set allies + 1\n\t*return\n*label utambucheck\n*if (utambu_ally)\n\t*return\n*else\n\t*set utambu_ally true\n\t*set allies + 1\n\t*return\n*label zeebercheck\n*if (zeeber_ally)\n\t*return\n*else\n\t*set zeeber_ally true\n\t*set allies + 1\n\t*return\t", "trap": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*set rockfall true\n*temp reason false\n*temp command false\n*temp simple false\n*if ((dry_first = true) and (split = true))\n\t*set split false\n\tAs you round a corner, you're confronted with a massive pile of rubble.  The rest of the ground team is presumably trapped on the other side.\n\t\n\tYou…\n\t*choice\n\t\t#…start shifting boulders.\n\t\t\t*if (strength >= 75)\n\t\t\t\t*label self_dig\n\t\t\t\t*set infamy %+ 15\n\t\t\t\tRocks can be shifted—all it takes is brute strength.  Luckily, you've got a lot of that.\n\t\t\t\t\t\t\t\n\t\t\t\t\"Clear off!\" you bellow, as you begin heaving rocks down the slope.  You don't have to move the whole pile of rubble—you just need to create a narrow crawlspace between the roof of the tunnel and the fallen rocks.  The best way to dig a tunnel is to let gravity work for you.\t\n\t\t\t\t\n\t\t\t\t*label exercise\n\t\t\t\tStill, shifting these sharp rocks is serious exercise, and soon you are gasping, unable to catch your breath while breathing the thick, alien air.\n\t\t\t\t\n\t\t\t\tYou have something that might help, though, don't you?  You have:\n\t\t\t\t*gosub breather\n\t\t\t\t\n\t\t\t\tSoon you've created a small hole near the top of the tunnel, a mere chink.\n\t\t\t\t\n\t\t\t\t\"Anyone there?\" you call.  You are answered by a chorus of cheers.\n\t\t\t\t\t\n\t\t\t\t*set crew_strength +6\n\t\t\t\t\"We're stuck!\" a pirate shouts back.  \n\t\t\t\t*if (leader = \"Krantic\")\n\t\t\t\t\t*set leader \"Ny-bat\"\n\t\t\t\t\t\"Krantic's down!  The other end of the cavern is plugged by vermite!\"\n\t\t\t\t\t*if n_he = \"she\"\n\t\t\t\t\t\t*set l_he \"she\"\n\t\t\t\t\t\t*set l_his \"her\"\n\t\t\t\t\t\t*set l_him \"her\"\n\t\t\t\t\t\t*goto rescue\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto rescue\n\t\t\t\t*else\n\t\t\t\t\t\"The other end of the cavern is plugged by vermite!\"\n\t\t\t\t\t*label rescue\n\t\t\t\t\t\t\t\t\n\t\t\t\t\tThe entire crew races to enlarge the opening.  Utambu slips down the pile, slicing his arm on a sharp rock.  He ties his shirt round it for a bandage, but it bleeds profusely.\n\t\t\t\t\t\n\t\t\t\t\tWith crew digging on both sides of the rockfall, you soon widen the hole, until it is a passageway a grown man can slither through on his stomach.\n\t\t\t\t\t\n\t\t\t\t\tYou and your half of the ground team crawl into the cavern.\n\t\t\t\t\t*if ((nybat_rom > 1) and (second = \"Gao\"))\n\t\t\t\t\t\tYou rush to where Ny-bat kneels by a wounded pirate, and are glad to find ${n_he} isn't injured.  You briefly place a hand on ${n_his} shoulder, before stepping carefully around the scattered rocks on your way to the back of the cavern.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto skill\n\t\t\t\t\t*else\n\t\t\t\t\t\t*label skill\t\t\t\t\t\n\t\t\t\t\t\tYou hope to find a way through the vermite seal—after all, vermite is organic technology, and you have…\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#…a talent for technology.\n\t\t\t\t\t\t\t\t*set hacking %+ 10\n\t\t\t\t\t\t\t\t*gosub plug\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto solo_vermite\t\t\t\t\t\t\n\t\t\t\t\t\t\t#…Utambu, engineer extraordinaire.\n\t\t\t\t\t\t\t\t*gosub u_ally\n\t\t\t\t\t\t\t\t*gosub plug\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto try_vermite\n\t\t\t\t\t\t\t#…plenty of specialized gear.\n\t\t\t\t\t\t\t\t*set hacking %+ 10\n\t\t\t\t\t\t\t\t*gosub plug\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto solo_vermite\n\t\t\t*else\n\t\t\t\tYou don't have to move the whole pile of rubble—you just need to create a narrow crawlspace between the roof of the tunnel and the fallen rocks.  So you climb to the top of the pile and send a few smaller rocks, jagged chunks of basalt, tumbling down the slope.  Unfortunately, you just don't have the strength to dislodge the bigger boulders.\n\t\t\t\t\n\t\t\t\t\"Listen, everyone!  The Medusi think they've got us, but they don't know what we can do if we work together!  They don't know what it means to be human!  They don't know what it means to be Reckless!\"\n\t\t\t\n\t\t\t\tThe pirates laugh at you, but seem inspired nonetheless.  Together, you heave rocks down the slope, letting gravity work for you.\n\t\t\t\t\n\t\t\t\t*goto exercise\t\t\t\t\n\t\t#…rally my companions to work together.\n\t\t\t*label all_dig\n\t\t\t*set infamy %+ 15\n\t\t\t*set persuasiveness %+ 10\n\t\t\t\n\t\t\t\"Listen, everyone!  The Medusi think they've got us, but they don't know what we can do if we work together!  They don't know what it means to be human!  They don't know what it means to be Reckless!\"\n\t\t\t\n\t\t\tThe pirates laugh at you, but seem inspired nonetheless.  You and the ${crew_strength} who aren't injured begin heaving rocks down the slope.  You don't have to move the whole pile of rubble—you just need to create a narrow crawlspace between the roof of the tunnel and the fallen rocks.  The best way to dig a tunnel is to let gravity work for you.\t\n\t\t\t\t\n\t\t\t*goto exercise\t\t\t\t\n\t\t#…shout to the trapped pirates.\n\t\t\t*set infamy %+ 5\n\t\t\t*set empathy %+ 10\n\t\t\t\"We're going to get you out!  Can anyone hear me?\" you yell.\n\t\t\t\n\t\t\tNo sound comes from the other side of the cave-in.  You'll have to dig first.\n\t\t\t*if (strength >= 75)\n\t\t\t\t*goto self_dig\n\t\t\t*else\n\t\t\t\t*goto all_dig\n*else\n\tAs you round a corner, you glimpse a fleeing alien running ahead of you through the sinuous tunnel.\n\t\n\t*if ((leader = \"you\") or (split = true))\n\t\t\"Wait!\" you call with a hand in your speech box, but the alien does not pause.\n\t\t\n\t\t*gosub rockfall\t\n\t\t*label aftermath\n\t\tYou were lucky—you have only bruises, though you have enough of those to accompany each movement with a chorus of aches.\n\t\t*if ((nybat_rom > 1) and ((split = false) or (second = \"Ny-bat\")))\n\t\t\tYou rush over to where Ny-bat kneels by a wounded pirate, and are glad to find ${n_he} isn't injured.  You place a hand on ${n_his} shoulder.\n\t\t\t\n\t\t\t*goto priority\n\t\t*else\n\t\t\t*label priority\n\t\t\t*set strength %- 10\n\t\t\tYour first priority is to…\n\t\t\t*choice\n\t\t\t\t#…help the wounded.\n\t\t\t\t\t*set strength %+ 10\n\t\t\t\t\t*set empathy %+ 15\n\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\t*if (strength >= 70)\n\t\t\t\t\t\tYou begin to roll jagged black rocks off your pinned companions, careless of the scratches accumulating on your hands.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto vermite\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe porous black rocks are heavier than they look.  You can't unpin the fallen pirates until ${second} comes to help you.  Together you roll the jagged pieces off the wounded, careless of the scratches accumulating on your hands.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto vermite\n\t\t\t\t#…dig a tunnel through the rubble.\n\t\t\t\t\t*set strength %+ 10\n\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\t*if (strength >= 70)\n\t\t\t\t\t\tYou climb up the pile of jagged black rocks, disregarding the scratches accumulating on your hands.\n\t\t\t\t\t\t*label top\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tThe rubble reaches right to the ceiling, and some preliminary digging shows you that it's quite deep.  You begin to worry about the amount of air in the cavern.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label blocked\t\t\t\t\t\n\t\t\t\t\t\t\"There's no way out!\" Utambu calls hysterically from the other end of the cavern.  He has a makeshift bandage around one arm.  \"The exit is plugged with vermite!\"\n\t\t\t\t\t\t*goto central_choice\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou drag yourself over the jagged black rocks, accumulating cuts on your hands.  Halfway up, the rocks beneath your feet give way and you begin to slide, only to be caught by ${second}.  $!{n_he} helps you to haul yourself to the top.\n\t\t\t\t\t\t*goto top\n\t\t\t\t#…search for the Medusa I followed in, or its hidden exit.\n\t\t\t\t\t*set level %+ 15\n\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t*goto vermite\n\t\t\t\t*if (((leader = \"Gao\") or (leader = \"Ny-bat\")) and (split = false)) #…ask ${leader} what to do.\n\t\t\t\t\t*set persuasiveness %+ 10\n\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t\"We were lured in here.  Figure out how that Medusa got out,\" says ${leader}.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*goto vermite\n\t*elseif (leader = \"Krantic\")\n\t\t\"Stop!\" bellows Krantic, but the alien does not pause.\n\t\t*gosub rockfall\n\t\tOne of them is Krantic.  As you look down on his lax unconscious face, half-hidden by magnetized dreads, you suddenly feel more secure.\n\t\t\t\t\n\t\t*set leader \"Ny-bat\"\n\t\t*goto aftermath\n\t*else\n\t\t\"Wait!\" calls ${leader} with a hand in ${l_his} speech box, but the alien does not pause.\n\t\t*gosub rockfall\n\t\t*goto aftermath\n\n*label vermite\n\"There's no way out up here!\" Utambu calls out hysterically.  He has climbed the pile of rubble with one arm in a makeshift bandage.  \"It might even be airtight!\"\n\n\"The Medusa who led us in got out somehow,\" you remind him.  You leave the wounded to those with a bit of medical training, and begin running your hand across the wall of the cavern.\n\n*gosub plug\n*label central_choice\n\nLuckily, you have…\n*choice\n\t*if (hacking >= 70) #…a talent for technology.\n\t\t*set hacking %+ 10\n\t\t*label solo_vermite\n\t\tYou know that vermite can change state—from a solid, to a viscous liquid—and that it can obey the commands of a computer.  But there is no control panel here, and even if there was, it wouldn't be programmed with human language commands.\n\t\t\n\t\t\"If there's no control panel, how did the Medusi speak to the vermite?\" you muse aloud to Utambu, who has come over to help.  \"Medusi must speak directly to vermite, in their own electrical language.\"\n\t\t\n\t\tAnd you have something that translates human language into electrical signals, don't you?  You might be able to talk to the vermite if you adapted:\n\t\t*gosub box\n\n\t\t*label boxed\n\t\tYou pry off the cover of your speech box and take a few minutes to run a bit of conduit right to the vermite, so that it has direct, physical contact.  You assume the vermite doesn't respond to \"spoken\" electrical language bandied about the room, because that could be fatal on a starship.\n\t\t*label talk_vermite\n\t\t\t\t\t\n\t\tTime to test your theory.  How do you intend to speak to the vermite?\n\t\t*choice\n\t\t\t#Commandingly.\n\t\t\t\t*label command\n\t\t\t\t*set infamy %+10\n\t\t\t\t*set command true\n\t\t\t\t\"I command you to open!  Open!  Liquefy!  Soften!  Dissolve!\"  You become more frustrated as you wrack your brain for synonyms.  \"Go away!  Empty!  Space yourself!\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\tThe vermite is unresponsive, a glass wall.  Maybe you should try another tactic.  You could talk to it as if it were:\n\t\t\t\t*choice\n\t\t\t\t\t*if (reason = false) #A reasonable adult.\n\t\t\t\t\t\t*goto reason\n\t\t\t\t\t*if (simple = false) #A small child.\n\t\t\t\t\t\t*goto simple\n\t\t\t\t\t#A cute baby.\n\t\t\t\t\t\t*goto love\n\t\t\t#Lovingly.\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t*set level %+ 15\n\t\t\t\t*label love\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t\"You're some good little vermite, yes you are,\" you croon.  \"Now let me in, little darling, open up.  Everything's spaceworthy.  I won't hurt you.  You're a darling little tube of…\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\tYou stop when the vermite begins to soften.  You've done it!  Clearly the tenders raise the vermite with love, before it develops enough to understand computer commands.  You didn't expect it of the pompous Medusi!\n\t\t\t\t\t\t\t\t\t\n\t\t\t\tThe vermite begins to harden again, so you resume your coaxing.  \"That's right, sweetheart, open right up…\"  You keep up a steady stream of patter, and the vermite shrinks back against the walls of the lava tube, leaving the center open.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\tUtambu shouts for the others, and the pirates file through.  You are the last—Utambu stays behind with the two unconscious victims of the rockfall—and you take the adapted box with you.  Utambu can make another, to refresh the air until you return to evacuate the wounded.\n\t\t\t\t*set speakvermite true\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene pits\n\t\t\t#Simply.\n\t\t\t\t*set persuasiveness %+ 10\n\t\t\t\t*set level %+ 10\n\t\t\t\t*label simple\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t*set simple true\n\t\t\t\t\"I go in,\" you say, slowly and carefully.  \"Vermite be soft, so I go in.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\tYou feel a ripple beneath the hand that is pressing the conduit to the vermite, a vibration.  It's a response, though not exactly what you were hoping for.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\tYou remember how the Medusi spoke of the vermite during the disastrous negotiations.  Perhaps you should treat it like:\n\t\t\t\t*choice\n\t\t\t\t\t*if (reason = false) #A reasonable adult.\n\t\t\t\t\t\t*goto reason\n\t\t\t\t\t#A cute baby.\n\t\t\t\t\t\t*goto love\n\t\t\t\t\t*if (command = false) #A computer.\n\t\t\t\t\t\t*goto command\n\t\t\t#Rationally.\n\t\t\t\t*label reason\n\t\t\t\t*set level %+ 10\n\t\t\t\t*set reason true\n\t\t\t\t\"We're trapped,\" you explain to the vermite, feeling slightly silly.  \"We need to get out before we run out of air, and this is the only way.  Please become liquid, so that we can pass through you.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\tNothing happens.  Perhaps your language was a bit overly elaborate—you are talking to a collection of microorganisms, after all.  Next, you'll imagine the vermite is:\n\t\t\t\t*choice\n\t\t\t\t\t*if (command = false) #A computer.\n\t\t\t\t\t\t*goto command\n\t\t\t\t\t*if (simple = false) #A small child.\n\t\t\t\t\t\t*goto simple\n\t\t\t\t\t#A cute baby.\n\t\t\t\t\t\t*goto love\n\t#…Utambu, engineer extraordinaire.\n\t\t*gosub u_ally\n\t\t*label try_vermite\n\t\tYou lead a staggering Utambu over to the vermite seal, noting his dazed expression and the way the bandage on his arm is darkening with blood.  You sit him down and tighten the tourniquet on his upper arm.\n\t\t\t\n\t\t\"Tell me what to do,\" you prompt him.\n\t\t\t\t\n\t\t\"It's vermite.  Vermite can change state—solid, liquid, solid, liquid.  Can take commands from a computer.  Problem is, no control panel here, and even if there was, it wouldn't speak human,\" Utambu says.\n\t\t\t\t\n\t\t\"But wait, if there's no control panel, how did the Medusi speak to the vermite?\" you ask.  Utambu just stares at you, glassy eyed, and you find you can answer your own question.  \"Medusi must speak directly to vermite, in their own electrical language.\"\n\t\t\t\t\n\t\tAnd you have something that translates human language into electrical signals, don't you?  You might be able to talk to the vermite if you adapted:\n\t\t*gosub box\n\t\t\n\t\t*goto boxed\t\n\t#…plenty of specialized gear.\n\t\t*set hacking %+ 10\n\t\t*goto solo_vermite\n\t*if ((dry_first = false) and (strength >= 75)) #…the strength to dig through the rockfall.\n\t\tRocks can be shifted—all it takes is brute strength.  Luckily, you've got a lot of that.\n\t\t*set infamy %+ 15\n\t\t*set strength %+ 10\n\t\t*gosub solo_dig\n\t\t*gosub breather\n\t\t*gosub crawlspace\n\t\t*label trynext\n\t\t\t\t\n\t\tUtambu stays behind with the wounded—his arm only stops bleeding when he's still, anyway.  The rest of you make your way back to the fork and through the other tunnel.\n\t\t*page_break\n\t\t*goto_scene ambush\t\t\t\t\t\t\t\n\t*if (dry_first = false) #…enough people to dig through the rockfall.\n\t\t*set persuasiveness %+ 10\n\t\t*set infamy %+ 15\n\t\t\"Listen, everyone!   The Medusi think they've got us, but they don't know what we can do if we work together!  They don't know what it means to be human!  They don't know what it means to be Reckless!\"\n\t\t\t\t\n\t\t*if (((persuasiveness > 70) or (infamy > 60)) or ((allies > 2) or (split = true)))\n\t\t\t*set leader \"you\"\n\t\t\t*achieve leader\n\t\t\tThe pirates laugh at you—that was a bit sentimental—but they seem inspired nonetheless.  The uninjured start to climb the pile of rubble, while Utambu hands out extra breathers.\n\t\t\t*gosub group_dig\n\t\t\t*gosub breather\n\t\t\t*gosub crawlspace\n\t\t\t*goto trynext\n\t\t*else\n\t\t\tThe pirates laugh at your speech, and not kindly, either.  You haven't built enough credibility with them to take charge like that.\n\t\t\t\t\t\t\n\t\t\t${leader} organizes the crew into teams.  You and rest of the uninjured climb the rubble, while others collect extra breathers for you, and Utambu examines the vermite.\n\t\t\t*gosub group_dig\n\t\t\t*gosub breather\n\t\t\t*gosub crawlspace\n\t\t\t*goto trynext\n\t\t\t\n*label rockfall\n*set crew_strength -3\n\nYou chase the Medusa through a narrow opening into a wider cavern, a space two or three times the size of your apartment back on the station, and somehow lose track of it.  You squint at the patterns of pale grey and darker shadow, but the Medusa seems to have vanished.  Before you can speculate on this turn of events, you hear a deafening crunch, the sound of a giant biting into a rock sandwich.  Boulders smash into the ground in front of the cavern's entrance.  You throw up your arms to protect your head from a rain of smaller rocks, as those who were standing closer to the opening begin to scream.\n\nWhen the black dust drifts down out of the already murky air, you see that two crew members are pinned under chunks of rubble.\n\n*return\t\n\n*label solo_dig\n\"Clear off!\" you bellow, as you begin heaving rocks down the slope.  You don't have to move the whole pile of rubble—you just need to create a narrow crawlspace between the roof of the tunnel and the fallen rocks.  The best way to dig a tunnel is to let gravity work for you.\t\n\t\nStill, shifting these sharp rocks is serious exercise, and soon you are gasping, unable to catch your breath while breathing the thick, alien air.\n\nYou have something that might help, though, don't you?  You have:\n*return\n\n*label crawlspace\n\n*set infamy %+ 8\nYou attack the rubble with renewed vigor, shifting rocks of all sizes away from the cavern roof.  Just when you think you'll have to use your breather again, the light from your goggles shines through the first chink, a bite-sized gap leading out into the tunnel.  You widen and widen the hole, until it is a passageway a grown man can slither through on his stomach.\n\nYour companions nod in your direction—you've definitely risen in their estimation.  It's time to leave.\n*return\n\n*label group_dig\nYou and the other ${crew_strength} who aren't injured begin heaving rocks down the slope.  You don't have to move the whole pile of rubble—you just need to create a narrow crawlspace between the roof of the tunnel and the fallen rocks.  The best way to dig a tunnel is to let gravity work for you.\t\n\nStill, shifting these sharp rocks is serious exercise, and soon you are gasping, unable to catch your breath while breathing the thick, alien air.\n\nYou have something that might help, though, don't you?  You have:\n*return\n\n*label u_ally\n*if (utambu_ally = true)\n\t*return\n*else\n\t*set utambu_ally true\n\t*set allies + 1\n\t*return\n\t\n*label breather\n*choice\n\t#A pair of goggles.\n\t\t*set level %- 10\n\t\t*set hacking %- 20\n\t\tYou fiddle with your goggles, confused.  You really must be light-headed from lack of oxygen!\n\t\t*label help\n\t\t\n\t\t*if ((nybat_ally = true) and (second = \"Ny-bat\"))\n\t\t\t\"Use my emergency breather,\" Ny-bat says.  $!{n_he} tosses a thin plastic tube up to you.  \"Then use yours.\"\n\t\t\t\t\t\n\t\t\tYou put your mouth on the end of the plastic tube, and breathe in sweet, sweet oxygen.  Your lungs stop seizing, and your pounding heart calms.  Next, Ny-bat tosses you some fabric to wrap round your bleeding hands.\n\t\t\t*if (nybat_rom \u003c 2)\n\t\t\t\tIt's good to have allies.\n\t\t\t\t*return\n\t\t\t*else\n\t\t\t\tIt's good to have someone who cares about you.\n\t\t\t\t*return\n\t\t*elseif ((gao_ally = true) and (second = \"Gao\"))\n\t\t\t\"Use my emergency breather,\" Gao says.  He tosses a thin plastic tube up to you.  \"Then use yours.\"\n\t\t\t\t\t\n\t\t\tYou put your mouth on the end of the plastic tube, and breathe in sweet, sweet oxygen.  Your lungs stop seizing, and your pounding heart calms.  Next, Gao tosses you some fabric to wrap round your bleeding hands.  It's good to have allies.\n\t\t\t*return\n\t\t*elseif ((zeeber_ally = true) and (dry_first = false))\n\t\t\t\"Use my emergency breather,\" Zeeber says.  She tosses a thin plastic tube up to you.  \"Then use yours.\"\n\t\t\t\t\t\n\t\t\tYou put your mouth on the end of the plastic tube, and breathe in sweet, sweet oxygen.  Your lungs stop seizing, and your pounding heart calms.  Next, Zeeber tosses you some fabric to wrap round your bleeding hands.  It's good to have allies.\n\t\t\t*return\n\t\t*elseif (utambu_ally = true)\n\t\t\t\"Use my emergency breather,\" Utambu says.  He tosses a thin plastic tube up to you.  \"Then use yours.\"\n\t\t\t\t\n\t\t\tYou put your mouth on the end of the plastic tube, and breathe in sweet, sweet oxygen.  Your lungs stop seizing, and your pounding heart calms.  Next, Utambu tosses you some fabric to wrap round your bleeding hands.  It's good to have allies.\n\t\t\t*return\n\t\t*else\n\t\t\t*set hacking %-5\n\t\t\t*set infamy %-10\n\t\t\tObviously, you can't think straight.  This is just too big a job for one person, even for you. \n\n\t\t\t\"Am I the only one who can lift a rock?\" you yell—or rather, gasp—down to the pirates.  They climb up the rubble, and begin helping.\n\t\t\t\t\t\n\t\t\t\"Use your breather,\" says ${second}, after one look at you.  You fish out the thin plastic tube and breathe in sweet, sweet oxygen.  Your
