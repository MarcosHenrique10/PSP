gger.  A ship is descending onto one of the landing pads!  You instantly recognize the black spikes of an IHP ship.  You're so glad you sent that course data; they never would have found you otherwise.\n\t\n\tA loudspeaker blares, \"This is the Inter-Human Police.  You are in violation of the Human-Medusi Articles of Peaceful Trade.  Your presence here confirms your guilt.\"\n\t\t\t\t\n\tYou hear several dull thuds—the IHP ship has grappled the Reckless with huge magnetic tethers.\n\n\tZoa swears and races back towards her ship.  You and the Medusi race towards the homes at the edge of the crater, afraid to be caught in the crossfire, until the loudspeaker blares again.  \"All humans will be taken into custody!  Surrender to the android agent or waive your right to a trial before execution.\"\n\t*label android\n\t*page_break\n\tYou freeze, as an android that could be mistaken for a human in a flexsuit and helmet exits an airlock.  You've seen IHP androids on the station now and again, and you know that the helmet doesn't come off.\n\n\t*if (empathy > 75)\n\t\tTo your surprise, a Medusa comes out of the dome to stand beside you.\n\t\t\n\t\t\"Humble Assistant Foreperson will declaration for this human intentionality,\" it says.  \"Not abandonment until safety assurance.\"\n\t\t\n\t\tYou smile in a way you haven't since your kidnapping, touched by the Medusa's loyalty.\n\t\t\n\t\tYou offer up your hands to the android for foaming, introducing the Medusa by your side.\n\t\t\n\t\t*goto android_speaks\n\t\t\n\t*else\t\n\t\tYou also know that running will result in broken bones, or worse.\n\t\t\n\t\t\"I'm the one who called for you!  The Medusi will speak for me!\" you protest, as the android foams your hands.\n\n\t\t*label android_speaks\n\t\t\"All comments will be recorded and reviewed by interrogators,\" says the android in a clearly synthetic voice.  You suppose the flat tone is deliberate, so the android cannot be mistaken for a human.\n\n\t\t\"Let's meet the interrogators, then,\" you say bravely, and allow yourself to be marched towards the IHP ship.\n\t\t*page_break\n\t\t*if (empathy \u003c 35)\n\t\t\tYour interrogation goes fairly well.  The IHP doesn't exactly approve of all your actions since your abduction; they think you gave too much aid to the pirates.  But in light of your cooperation with the Medusi, who credit you with the success of their resistance, they decide to release you with a warning.\n\n\t\t\t*label ihp_hero\n\t\t\t*if (reckless_caught = true)\n\t\t\t\tThey've been hunting the Reckless for rotations, and there's a substantial bounty on Zoa's head, to which you are entitled to a portion.\n\t\t\t\t\n\t\t\t\t*gosub partner_fate_ihp\n\t\t\t\t\n\t\t\t\tSoon you are on your way home.\n\t\t\t\t*page_break Epilogue\n\t\t\t\t*goto_scene station_end\t\t\t\t\n\t\t\t*else\n\t\t\t\tThey've been hunting the Reckless for rotations, and never come this close.  At least you've given them a week-old propulsion trail to try to follow.\n\t\t\t\t\n\t\t\t\t*gosub partner_fate_ihp\n\t\t\t\t\n\t\t\t\tSoon you are on your way home.\n\t\t\t\t*page_break Epilogue\n\t\t\t\t*goto_scene station_end\t\n\t\t*else\n\t\t\tYour interrogation turns into a celebration; the IHP agents see you as a hero.\n\t\t\t\t\n\t\t\t*goto ihp_hero\n\n\t\t\t\n*comment SUBROUTINES\n\n*label partner_fate_ihp\n*if (partner != \"The Mushroom\")\n\tDo you want to speak on ${partner}'s behalf?\n\t*choice\n\t\t#Yes.\n\t\t\t*set empathy %+ 15\n\t\t\t*gosub speak_for\n\t\t\t\n\t\t\tThe other pirates face a range of prison terms, depending on whether the IHP has evidence of anything more violent than smuggling.\n\t\t\t*return\n\t\t*if ((adopt = 0) and (partner != \"Zeeber\")) #Yes, and Zeeber's too.  She's still a kid.\n\t\t\t*set empathy %+ 15\n\t\t\t*gosub speak_for\n\t\t\t*gosub zeeber_offer\n\t\t\t\n\t\t\tThe IHP agents are relieved to have a solution to their quandary.  Minors don't often break inter-species treaties, and they weren't quite sure what to do with a child smuggler who had clearly suffered a lifetime of emotional abuse.\n\t\t\t\n\t\t\tThe other pirates face a range of prison terms, depending on whether the IHP has evidence of anything more violent than smuggling.\n\t\t\t*return\n\t\t*if ((adopt = 2) and (partner != \"Zeeber\")) #Yes, and Zeeber's too.  I still plan to adopt her.\n\t\t\t*set empathy %+ 15\n\t\t\t*gosub speak_for\n\t\t\t\n\t\t\tYou also inform them of your intention to adopt Zeeber, and the IHP agents are relieved to have a solution to their quandary.  Minors don't often break inter-species treaties, and they weren't quite sure what to do with a child smuggler who had clearly suffered a lifetime of emotional abuse.\n\t\t\t\n\t\t\tThe other pirates face a range of prison terms, depending on whether the IHP has evidence of anything more violent than smuggling.\n\t\t\t*return\n\t\t#No.\n\t\t\tThe pirates face a range of prison terms, depending on whether the IHP has evidence of anything more violent than smuggling.\n\t\t\t\n\t\t\t*return\n\t\t*if ((adopt = 0) and (partner != \"Zeeber\")) #No, but Zeeber's still a kid.\n\t\t\t*gosub zeeber_offer\n\t\t\t\n\t\t\tThe IHP agents are relieved to have a solution to their quandary.  Minors don't often break inter-species treaties, and they weren't quite sure what to do with a child smuggler who had clearly suffered a lifetime of emotional abuse.\n\t\t\t\n\t\t\tThe other pirates face a range of prison terms, depending on whether the IHP has evidence of anything more violent than smuggling.\n\t\t\t*return\n\t\t*if ((adopt = 2) and (partner != \"Zeeber\")) #No, but I still plan to adopt Zeeber.\n\t\t\tYou inform them of your intention to adopt Zeeber, and the IHP agents are relieved to have a solution to their quandary.  Minors don't often break inter-species treaties, and they weren't quite sure what to do with a child smuggler who had clearly suffered a lifetime of emotional abuse.\n\t\t\t\n\t\t\tThe other pirates face a range of prison terms, depending on whether the IHP has evidence of anything more violent than smuggling.\n\t\t\t*return\n*else\n\t*return\n\n*label speak_for\nYou tell the IHP that ${partner} also played a role in the Medusi resistance, and plead for leniency.\t\n*if (partner_saved = true)\n\tThe fact that ${partner} meant to abandon the Reckless and the smuggling life weighs particularly heavily, you hope.\n\t*goto partcont\n*else\n\t*label partcont\n\tThe agents work out a deal: in return for certain information regarding the Reckless' contacts, ${partner} will serve a reduced sentence aboard an IHP fuel tanker.  It's not freedom, but it's not prison, either.  ${partner} will join you on Dekara soon.\n\t*set partner_saved true\n\t*return\n\n*label prove\n*if (infamy \u003c 35)\n\t\"Why should I trust you at all?\" asks Zoa.  \"You've been conspiring with the Medusi.\"\n\t\n\t\"I've acted in accordance with my conscience,\" you say.  \"I'm a lot more trustworthy than you.\"\n\t\n\t\"Talk, then,\" Zoa says icily.\n\t*return\n*else\n\t\"I'll listen before deciding what to do with you—only because you have proved somewhat useful in the past,\" says Zoa.\n\t*return\n\n*label medusi_week\n*set empathy %+ 20\nYou learn a lot about the Medusi over the next week, while you wait for the authorities to arrive.  Tenders are chosen because of their soft hearts, so most of the Medusi on 4-7-2 are only first or second level.  Their one overriding concern is that their children perform well at their leveling.  The test determines their future place in Medusi society, whether they will owe obedience to all (First Level), or obedience to the majority (Second Level), or enjoy authority in their own sphere (Third Level), authority over the majority (Fourth Level), or authority over all (Fifth Level).  Most children score within the same level as their parents, though it is not unheard of for two second-levels to produce a third, for example.  The tenders spend most of their free time trying to stimulate their children's intellects, just in case one of them has the capacity to exceed expectations.\n\t\t\t\nYou endear yourself to your alien hosts by playing strategy games, tossing out math problems, and sharing information on the many alien races who pass through your home station.  By the time the Medusi's instrumentation shows the approach of a ship, you have the complete trust of the Medusi.\n*page_break\n*return\n\n*label spider_ship\nYou walk out onto the crater floor to greet the Medusi ship, with a few of your alien allies.  The vessel looks bizarre to human eyes: lumpy, striated, and organic, like a giant, living ball of yarn.  The fibers pull apart to create an opening, and several armored Medusi lunge towards you.  Your alien friends push you behind them, and lightning flies between the two groups of Medusi as they argue too fast for your speech box to translate.\n\nEventually, a detente is reached.  Your allies insist that you be granted a portion of the reward for the capture of the pirates, as well as passage back to human space.\n*return\n\n*label pirate_end_transition\n*set vermite_state 2\n*set infamy %- 40\n*if (zoa_in = false)\n\tYou stop and turn towards Zoa.  \n\t*goto ultimatum\n*else\n\tYou hear the whine of the ship's energy weapons as Zoa powers them up.\n\t*label ultimatum\n\t\n\t\"You can either tell me what is going on, or find out why we don't use energy weapons in a supersaturated atmosphere,\" she says.  You decide to…\n\t*choice\n\t\t#…tell her everything.\n\t\t\t*set empathy %- 20\n\t\t\t*set infamy %+ 10\n\t\t\tYou tell Zoa what the Medusi are doing; it won't help them any for you to be hurt.  She forces them to load actual vermite\n\t\t\t*if (partner != \"The Mushroom\")\n\t\t\t\tand to turn over ${partner}\n\t\t\t\t*goto captured\n\t\t\t*else\n\t\t\t\t*label captured\n\t\t\t\t, before marching you into the ship.\n\t\t\t\t*label chained\n\t\t\t\tYou end up chained under the mess hall table as the Reckless takes off.\n\t\t\t\t\n\t\t\t\t*label pirate_choice\n\t\t\t\tYou failed to escape the pirates, or to help your Medusi allies.  Now you are faced with the same choice you had in the beginning: to build a life for yourself on the Reckless, working to regain Zoa's trust, or to refuse to cooperate, and take your chances wherever Zoa decides to strand you.\n\t\t\t\t\n\t\t\t\tYou decide to…\n\t\t\t\t*choice\n\t\t\t\t\t#…become a pirate, and try to change the Reckless from within.\n\t\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\t\t*goto_scene pirate_end\n\t\t\n\t\t\t\t\t#…resist to the bitter end.\n\t\t\t\t\t\t*set empathy %+ 25\n\t\t\t\t\t\t*set infamy %- 15\n\t\t\t\t\t\tZoa decides you are a waste of space, and lets you off on a Hrodish world, all the way across the galactic arm from Dekara Station.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (adopt > 1)\n\t\t\t\t\t\t\tOf course Zeeber accompanies you—she's your daughter now, and Zoa no longer needs her.\n\t\t\t\t\t\t\t*goto ny_with\n\t\t\t\t\t\t*elseif (zeeber_fate = 3)\n\t\t\t\t\t\t\tYou take Zeeber with you.  When you make your way back to human space, you'll find her a place in a group home, maybe on the planet below Dekara Station.\n\t\t\t\t\t\t\t*goto ny_with\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*label ny_with\n\t\t\t\t\t\t\t*if (nybat_rom > 1)\n\t\t\t\t\t\t\t\tNy-bat relinquishes ${n_his} post on the Reckless and leaves with you.  Zoa allows it,\n\t\t\t\t\t\t\t\t*goto trust\n\t\t\t\t\t\t\t*elseif ((partner = \"Ny-bat\") and (partner_saved = true))\n\t\t\t\t\t\t\t\tNy-bat relinquishes ${n_his} post on the Reckless and leaves with you.  Zoa allows it,\n\t\t\t\t\t\t\t\t*goto trust\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*if (partner_saved = true)\n\t\t\t\t\t\t\t\t\t*if ((partner = \"Gao\") or (partner = \"Utambu\"))\n\t\t\t\t\t\t\t\t\t\t${partner} decides to go with you, and Zoa allows it,\n\t\t\t\t\t\t\t\t\t\t*label trust\n\t\t\t\t\t\t\t\t\t\tsince she trusts him not to betray the Reckless' secrets.  (You don't know anything about the Reckless' contacts or regular ports of call, so you're not much of a risk.)\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*label work_home\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tPassage off the Hrodish world is expensive, but you are determined, and so you manage to work your way home.  You make a full report to the IHP, but you don't hold out much hope.  Space is vast, and Zoa is clever.  They'll never catch the Reckless.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t\t\t\t\t*goto_scene station_end\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*goto work_home\t\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*goto work_home\n\t\t#…continue to lie.\n\t\t\t*set empathy %+ 20\n\t\t\t*set infamy %+ 10\n\t\t\t*if (persuasiveness >= 80)\n\t\t\t\tLuckily you are a fast talker, and you manage to confuse Zoa and avoid immediate blasting.  Instead, she gets Hammer to haul you into the Reckless.\t\t\t\t\n\t\t\t\t*goto chained\n\t\t\t*else\n\t\t\t\tUnfortunately, Zoa doesn't believe you.  She fires.\n\t\t\t\t*goto blast\n\t\t#…refuse to speak.\n\t\t\t*set empathy %+ 20\n\t\t\t*set infamy %+ 15\n\t\t\tYou fold your arms in defiance, and set your mouth in a grim line.  Zoa fires.\n\t\t\t*label blast\n\t\t\t\n\t\t\tThe blast seems to dissipate as it hits the water vapor in the air.  For a second, you think you are lucky.  Then you scream with pain, as the suddenly charged mist burns your face, your hands, your lungs.  After an eternity, which somehow is less time than it takes you to crumple to the ground, you fall blessedly unconscious.\n\t\t\t\n\t\t\tNy-bat wakes you from your medibed-sleep a week later.\n\t\t\t\n\t\t\t*goto pirate_choice\n\n*label crash\nYou huddle among crates, waiting for the crash.  Apparently, the Medusi homes will reassemble themselves after the rubble is cleared, so the destruction, and a week trapped in the storage caves, is worth tricking Zoa.  Hopefully, she will think that the dome's collapse is the result of her blasting the crater wall, and believe that the tenders were killed in their homes.  The organic building material will lose cohesion under the weight of the rocks, and it will be impossible for Zoa to tell if crushed Medusi corpses are part of the jelly or not.  The Reckless doesn't have the equipment to excavate large amounts of rubble, and the vermite is too immature to be directed into the cargo hold by inexperienced humans and imperfect translation devices.  Zoa will have no choice but to leave.\n\nA particularly friendly Medusa child presses right up against you and hunkers down, limbs draped across your lap.  It's wet and smells of rotten celery, but it is willing to share its small screen, which is receiving video from an outside camera.  You watch as the vermite dome cracks and falls inward, as if overburdened by the massive amounts of rock Zoa is piling on it.  Jagged boulders crash down, crushing the Medusi homes.  \n\nSuddenly an adult Medusi snatches the screen away.  \"No signals!  Tenders all quietly dead,\" it says.\n\n\"Understanding,\" agrees the child.\n*page_break\n*return\t\n*label creeping\nAll around you, vermite is creeping towards the Reckless, not in a great river, but in a wide, invisible lake a scant millimeter thick.  You focus on Zoa, using all your powers of persuasion to keep her focused on you.\n*page_break\n*return\n\n*label partner_chance\n*if ((partner != \"The Mushroom\") and (chance = false))\n\t*set chance true\n\tThe Medusi are wondering if you should bring ${partner} into the plan.  You…\n\t*choice\n\t\t#…offer ${partner} asylum with the Medusi.\n\t\t\t*label asylum\n\t\t\t*set empathy %+ 25\n\t\t\t*if (partner = \"Zeeber\")\n\t\t\t\t*gosub zeebercheck\n\n\t\t\t\tZeeber dashes towards you and attaches herself to your arm.  \"We did good, yeah?\" she asks.\n\t\t\t\t\n\t\t\t\t*gosub zeeber_offer\n\t\t\t\t\n\t\t\t\t*if ((help = true) or (slime = true))\n\t\t\t\t\t*page_break\n\t\t\t\t\tYou still have to elude the Reckless, so you ask Zeeber to help.\n\t\t\t\t\t*if (slime = true)\n\t\t\t\t\t\t\"But who is going to protect the Medusi when Zoa comes back all angry and blasting?\" Zeeber says.  \"What does your plan say about that?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I didn't think of that,\" you admit.\n\t\t\t\t\t\t*label slime_choice\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou decide to…\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#…use vermite to disable the Reckless instead.\n\t\t\t\t\t\t\t\t*set level %+ 5\n\t\t\t\t\t\t\t\t*goto distract\n\t\t\t\t\t\t\t#…stage the destruction of the Medusi colony instead.\n\t\t\t\t\t\t\t\t*set level %+ 5\n\t\t\t\t\t\t\t\t*goto trick\n\t\t\t\t\t\t\t#…rely on Spider and the Levelers to protect the tenders against Zoa's return.\n\t\t\t\t\t\t\t\t*set empathy %- 5\n\t\t\t\t\t\t\t\t*set level %- 5\n\t\t\t\t\t\t\t\t*return\t\t\t\t\t\t\n\t\t\t\t\t*else\n\t\t\t\t\t\t\"I'm not so good at lying to Zoa,\" Zeeber says.  \"She kind of scares me.  I might mess up if I have to talk to her.  She always knows when I'm lying.\"\n\t\t\t\t\t\n\t\t\t\t\t\t\"Why don't you help take the children into the back?\" you ask.\n\t\t\t\t\t\t\n\t\t\t\t\t\tZeeber nods eagerly, relieved.\n\t\t\t\t\t\t*return\n\t\t\t\t*else\n\t\t\t\t\t*return\t\t\t\t\n\t\t\t*elseif (partner = \"Ny-bat\")\n\t\t\t\t*gosub nybatcheck\n\t\t\t\t*set partner_saved true\n\t\t\t\tNy-bat is still under guard in the small room where ${n_he} helped you pass the Trial of Trust.\n\n\t\t\t\t*if (nybat_rom > 1)\n\t\t\t\t\t$!{n_he} crosses to take your hand.  \"Our partnership seems rather successful so far.  Perhaps we should continue it,\" ${n_he} says, raising his eyebrows to a truly impossible height.\n\t\t\t\t\t\n\t\t\t\t\t*goto nybat_chance\n\t\t\t\t*else\n\t\t\t\t\t*label nybat_chance\n\t\t\t\t\t$!{n_he} listens closely as you explain your plan.\n\t\t\n\t\t\t\t\t\"You don't want to return to the ship, do you?\" you ask ${n_him}.\n\t\t\t\t\t*if (nybat_rom > 1)\n\t\t\t\t\t\t\"Not without you,\" ${n_he} says.\n\t\t\t\t\t\t\n\t\t\t\t\t\tNy-bat is clearly envisioning a long-term future for the two of you.  This is…\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#…good, because I might be falling in love with ${n_him}.\n\t\t\t\t\t\t\t\t*set nybat_rom 3\n\t\t\t\t\t\t\t\t*set partner_saved true\n\t\t\t\t\t\t\t\t\"I can't wait to take you home,\" you say, kissing ${n_him}.\n\t\t\t\t\t\t\t\t*goto nybat_help\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#…worrisome, because I'm not ready for a serious relationship.\n\t\t\t\t\t\t\t\t*set partner_saved true\n\t\t\t\t\t\t\t\t*set nybat_rom 2\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Will you spend a few days with me on Dekara?\" you ask, keeping your tone light.  \"Then you can decide whether to go, or whether to stay.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Of course,\" Ny-bat says, forehead wrinkling.  $!{n_he} understands your subtle hint, and avoids talking about the future from then on.\n\t\t\t\t\t\t\t\t*goto nybat_help\n\t\t\t\t\t\t\t#…embarrassing, because I only meant to flirt, that's all.\n\t\t\t\t\t\t\t\t*set partner_saved false\n\t\t\t\t\t\t\t\t*set nybat_rom 1\n\t\t\t\t\t\t\t\t\"I'll be returning to Dekara station.  Where will you be going?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tNy-bat goes still.  \"I suppose I don't have a reason to leave the Reckless, do I?\" he asks, ${n_his} real question clear.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Not now, when you are about to become rich off vermite,\" you say, because it would be crueler to let ${n_him} hope.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tNy-bat nods, turning away.  From then on ${n_he} treats you with deference and distance, instead of affection.\n\t\t\t\t\t\t\t\t*label nybat_help\n\t\t\t\t\t\t\t\t*if ((help = true) or (slime = true))\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\tYou still have to elude the Reckless, so you ask Ny-bat to help.\n\t\t\t\t\t\t\t\t\t*if (slime = true)\n\t\t\t\t\t\t\t\t\t\t\"There is a flaw in your plan,\" Ny-bat says.  \"What do you think Zoa will do when she finds out she has been tricked?  She'll return to punish the Medusi, and how will you protect them then?\"\n\n\t\t\t\t\t\t\t\t\t\t\"I didn't think of that,\" you admit.\n\t\t\t\t\t\t\t\t\t\t*goto slime_choice\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\"Perhaps you can offer me up to Zoa as a bargaining chip?  A gesture of goodwill?  That might aid the deception.  I will play the role of an ignorant prisoner, and even return to the Reckless if necessary,\" Ny-bat says.  \"I would find another way to escape Zoa.\"\n\t\t\t\t\t\t\t\t\t\t*return\t\t\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*return\n\t\t\t\t\t*else\t\t\t\t\t\t\n\t\t\t\t\t\tNy-bat paces away from you, clearly torn.  \"I think not, if it can be avoided,\" ${n_he} says.  \"When I joined the crew, Zoa seemed like a rational leader, with a more civilized philosophy than most pirate captains.  But she is too quick to condone violence.  I will accompany you back to human space, and try to find a posting on a legitimate ship.\"\n\t\t\t\t\t\t*goto nybat_help\t\t\n\t\t\t*elseif (partner = \"Gao\")\n\t\t\t\t*set partner_saved true\n\t\t\t\t*gosub gaocheck\n\t\t\t\tGao is still under guard in the small room where he helped you pass the Trial of Trust.\n\t\t\t\n\t\t\t\t\"Not bad, kid,\" says Gao.  He leans against the wall, arms crossed.\n\t\t\t\t\n\t\t\t\tHe listens closely as you explain your plan.\n\t\t\t\t\n\t\t\t\tGao looks away, clearly torn.  \"There's things I've done…things Zoa made me do…the truth is, a pirate ship's the only place for me now.  I'm not fit for decent society anymore.  You'd better send me back to the Reckless.  Or hand me over to the IHP.\"\n\t\t\t\t\n\t\t\t\t\"You are 'decent society,'\" you tell him.  \"You helped me when I was alone and friendless.  I'll testify for you to the IHP if they catch you.\"\n\t\t\t\t\n\t\t\t\tGao shakes his head.  \"An optimist.  I can't believe I'm running from the Reckless with a spacing optimist.\"\n\t\t\t\t*if ((help = true) or (slime = true))\n\t\t\t\t\t*page_break\n\t\t\t\t\tYou still have to elude the Reckless, so you ask Gao to help.\n\t\t\t\t\t*if (slime = true)\n\t\t\t\t\t\t\"Won't work,\" he says gruffly.  \"Once Zoa finds out she's been tricked, she'll be back to blast them all before they have a chance to hide.  You'll condemn your new friends to death.\"\n\n\t\t\t\t\t\t\"I didn't think of that,\" you admit.\n\t\t\t\t\t\t*goto slime_choice\n\t\t\t\t\t*else\n\t\t\t\t\t\t\"You can try to sell me to Zoa, make me part of the bargain.  She'll believe that.  Might give you a bit more time.  I'll play along.\"\n\t\t\t\t\t\n\t\t\t\t\t\t\"Hopefully you won't actually have to go back to the Reckless,\" you say.\n\t\t\t\t\t\t*return\n\t\t\t\t*else\n\t\t\t\t\t*return\n\t\t\t*else\n\t\t\t\t*gosub utambucheck\n\t\t\t\tUtambu is still under guard in the small room where he helped you pass the Trial of Trust.\n\n\t\t\t\t\"Some team we make,\" Utambu jokes, sitting on the oversized pallet.  \"I can't wait till Vikola hears you and I secured the deal.\"\n\t\t\t\t\n\t\t\t\tHe listens closely as you explain your plan.\n\n\t\t\t\tUtambu rises from the pallet and starts to pace.  \"No more Krantic?  No more Vikola?  Yeah, I'll go.  But I'll need a job quick; I send money to my parents.  Do they need engineers on stations?  I've never really been anywhere but shipside….\"\n\t\t\t\t\n\t\t\t\t\"They need engineers everywhere,\" you say, grinning at your friend.\t\n\t\t\t\t*if ((help = true) or (slime = true))\n\t\t\t\t\tYou still have to elude the Reckless, so you ask Utambu to help.\n\t\t\t\t\t*if (slime = true)\n\t\t\t\t\t\t\"Zoa's not going to like it when she finds out she's been tricked,\" he says nervously.  \"What's going to stop her from coming back and blasting the Medusi to dust?\"\n\t\t\t\t\t\n\t\t\t\t\t\t\"I didn't think of that,\" you admit.\n\t\t\t\t\t\t*goto slime_choice\n\t\t\t\t\t*else\n\t\t\t\t\t\tHe rises from the pallet and starts to pace.  \"If you think I should, yeah, I'll help, but Zoa's kind of sharp, and I'm not the best liar, you know?  I'm afraid if I have to talk her, well, my help might be worse than nothing.\"\n\t\t\t\t\t\n\t\t\t\t\t\t\"Why don't you help the Medusi with the technical aspects of the plan, and leave the lying to me?\" you ask.\n\t\t\t\t\t\t\n\t\t\t\t\t\tUtambu nods eagerly.\n\t\t\t\t\t\t*return\n\t\t\t\t*else\n\t\t\t\t\t*return\t\t\t\t\n\t\t#…ask ${partner} to help.\n\t\t\t*set help true\n\t\t\t*goto asylum\t\t\t\t\n\t\t#…keep ${partner} ignorant.\n\t\t\t*set empathy %- 20\n\t\t\tYou're not sure how loyal ${partner} is to the Reckless, so you avoid risk by keeping your plan a secret.\n\t\t\t*return\n*else\n\t*return\n\t\t\t\t\t\t\t\t\t\n*label zeeber_offer\nYou suggest that Zeeber should accompany you back to human space.\n\n\"And then what?  You'll find a ship that needs a drudge?\" Zeeber asks.\n\nYou offer to…\n*choice\n\t#…adopt her myself.\n\t\t*set adopt 2\n\t\t*set zeeber_ally true\n\t\t*set empathy %+ 25\n\t\t\"You'll live with me and go to school, at least until you're ready for college…\"\n\n\t\tYou stop because Zeeber is crying so hard, and you put your arms around her.  She clings to you like she's jumped out an airlock and you're her tether.  You realize you are a parent now.  You have a daughter to protect.  The knowledge changes you in some way you can't quantify; you only feel a vast and subtle rearrangement inside you—a shift of tectonic plates.\n\t\t\n\t\t*if (partner = \"Zeeber\")\n\t\t\t*set partner_saved true\n\t\t\t*return\n\t\t*else\n\t\t\t*return\n\t#…find her a therapeutic group home.\n\t\t*set adopt 1\n\t\t*set zeeber_fate 3\n\t\t*set empathy %- 5\n\t\t*set level %+ 10\n\t\tYou'll turn her over to a planetary government, and she'll be cared for as a ward of the state.  With her traumatic past, she needs the kind of help you simply can't give.\n\n\t\t*return\n\t#…get her a place on a legal trader.\n\t\t*set zeeber_fate 3\n\t\t*set adopt 1\n\t\t*set empathy %- 20\n\t\t\"That's what I thought,\" Zeeber says glumly, picking at a loose thread on her worn shoes.  \"You'll dump me the first chance you get.  Well, I'm done living shipside.  On planets, they have places like orphanages, don't they?\"\n\n\t\t\"Group homes,\" you tell her.\n\t\t\n\t\t\"I'm going to find me one of those,\" Zeeber says defiantly.\n\t\t\n\t\tYou can help with that, at least.\n\t\t*page_break\n\t\t*return\n\t\t\t\n\t\n*comment ALLY ADJUSTMENT SUBROUTINES\n*label nybatcheck\n*if (nybat_ally)\n\t*return\n*else\n\t*set nybat_ally true\n\t*set allies + 1\n\t*return\n*label gaocheck\n*if (gao_ally)\n\t*return\n*else\n\t*set gao_ally true\n\t*set allies + 1\n\t*return\n*label utambucheck\n*if (utambu_ally)\n\t*return\n*else\n\t*set utambu_ally true\n\t*set allies + 1\n\t*return\n*label zeebercheck\n*if (zeeber_ally)\n\t*return\n*else\n\t*set zeeber_ally true\n\t*set allies + 1\n\t*return\n\t\n\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*comment first choice captain\n*script changeBackgroundColor(\"sepia\")\n*set name \"Davo\"\n*set strength 80\n*set hacking 25\n*set persuasiveness 60\n*set level 40\n*set infamy 60\n*set empathy 35\n\n*set gao_ally false\n*set nybat_ally false\n*set zeeber_ally false\n*set utambu_ally false\n*set mushroom_ally false\n*set leader_ally false\n*set allies 0\n\n*set stationrep false\n\nStanding here with foamed hands, surrounded by your kidnappers, unable to stretch your fingers or take a step without your elbows being seized, you can't help but remember that you are trapped on this ship, far from help and home.  Your very survival depends on the goodwill of the woman in charge.\n\nZoa's gaze is steely, and missing some spark of humanity you usually recognize in any new acquaintance.\n\nYou say:\n*fake_choice\n\t#\"Did you send Krantic to torture me?\"\n\t#\"Risky plan, stealing vermite from the Medusi.\"\n\t#\"I'd make a better crew member than a prisoner.\"\n\t#\"I'm ready to bargain for my return to Dekara Station.\"\n\t#Nothing.  I'll let Zoa direct the conversation.\n\n*comment bonus rep qu\n*script changeBackgroundColor(\"black\")\n*set name \"Elarin\"\n*set strength 50\n*set hacking 25\n*set persuasiveness 90\n*set level 65\n*set infamy 40\n*set empathy 65\n\n*set gao_ally true\n*set nybat_ally true\n*set zeeber_ally true\n\n*set allies 3\n\n*set stationrep true\n\n\"You don't have to be friends with Vikola and her crew,\" Gao tells you one day in the comm room, where he is scanning stock values on various worlds.  He has so many hovers running, the displays cover the walls and the ceiling.  \"You have to make them respect you, though.  Otherwise you might get left out of a lucrative side deal.  Accidentally left behind on an alien world.  You see what I'm saying.\"\n\nYou decide:\n*fake_choice\n\t#I'll challenge Hammer to a game of Z-ball.\n\t#I'll challenge Vikola to a shooting match.\n\t#I'll impress in my own way, with a hilarious hack.\n\t#I'll ask Ny-bat to teach me hand-to-hand--he's the best.\n\t#I'll win at cards.\n\t#I refuse to care what those pirates think of me.\n\n\n*comment camp disintigration\n*script changeBackgroundColor(\"sepia\")\n*set name \"Jin-lo\"\n*set strength 75\n*set hacking 20\n*set persuasiveness 75\n*set level 50\n*set infamy 85\n*set empathy 70\n\n*set gao_ally true\n*set nybat_ally true\n*set zeeber_ally true\n*set utambu_ally true\n*set mushroom_ally true\n\n*set allies 4\n\n*set stationrep true\n\n*set crew_strength 15\n*set medusi_strength 19\n*set leader \"You\"\n\n\"Lies!  Excuses!\" Krantic is yelling.\n\n\"Monsters!  Torturers!\" the Medusi leader yells back.  A miniature lightning bolt streaks from one end of the worms on top of its hood, striking the long-faced pirate standing next to Krantic.  The woman falls to the ground, convulsing.\n\nKrantic's face is a terrifying marriage of rage and glee.  \"They are attacking!  Kill them!\" he shouts, shooting at the Medusa leader.\n\nDo you:\n*fake_choice\n\t#Shoot at the Medusi in the tent.\n\t#Shout, \"Hold your fire!  They are shouting, not shooting!\"\n\t#Shoot Krantic.\n\t#Point your gun at Krantic, but don't shoot yet.\n\t#Grab Krantic's gun.\n\n*comment crater\n*set name \"Lexima\"\n*set strength 40\n*set hacking 85\n*set persuasiveness 60\n*set level 80\n*set infamy 30\n*set empathy 70\n\n*set gao_ally true\n*set zeeber_ally true\n*set crew_strength 15\n*set medusi_strength 19\n*set leader \"Gao\"\n\n*set allies 2\n\n*set stationrep false\n\nYou are standing in the center of a black crater, in the middle of a trio of landing pads placed around the glistening vermite pool.  You can't really judge the size of the crater--you haven't had enough experience with open spaces.  But it seems big, big enough that a dozen windowless buildings built against the edge only snake a quarter of the way around.\n\n\"Orders presentation alien injured leader,\" says one of the Medusi, and all three of them reach out to grab you.  You:\n*fake_choice\n\t#Run.\n\t#Engage the emergency program you wired into your speech box.\n\t#Throw the magnetic net over them.\n\t#Agree to go with them.\n\t#Try to talk them out of it.\n\t\n\t\n*if not(choice_is_ios_app)\n\t*comment Trial choice\n\t*set name \"Madria\"\n\t*set strength 30\n\t*set hacking 80\n\t*set persuasiveness 75\n\t*set level 85\n\t*set infamy 15\n\t*set empathy 90\n\n\t*set zeeber_ally true\n\n\t*set mushroom_ally true\n\t*set leader_ally true\n\t*set allies 1\n\n\t*set stationrep true\n\n\t*set crew_strength 15\n\t*set medusi_strength 19\n\t*set leader \"Ny-bat\"\n\t*set partner \"Zeeber\"\n\n\tIt hits you--hot, pulsing agony in every centimeter of you below the neck. You manage to slap the blob round your neck, and with that brief touch, the pain lessens a bit.  At the same instant, you hear a strangled cry, and see ${partner} stagger on the other side of the transparent wall.\n\n\tYour fingers begin to blur, and bright spots dance in the dark edges of your vision.  You are losing consciousness, at best, or suffering nerve damage, at worst.\n\t*fake_choice\n\t\t#I'll send Zeeber a little more pain.\n\t\t#I'll try to comfort Zeeber.\n\t\t#I'll curse the Medusi, and endure.\n\t\t#I'll remove the sacrament and end the Trial.\n*finish\t\n\t", "ship": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*comment ñáéç…—\n*temp stay\n*set stay false\n*temp ear\n*set ear false\n*comment variable partner_saved indicates your partner will remain with you through the ending, so after the trial, partner can change to be whoever will remain with you\nDeal or Steal (or Not)\n(Chapter 6 of 6)\n\nSuddenly the door bangs open.\n\n\"Alien ship!\" says your box, as \n*if (crew = false)\n\tthe Assistant Foreperson barges in.\n\t*goto wall\n*else\n\tan excessively large Medusa barges in.\n\t*goto wall\n*label wall\n\nThe wall behind your escort becomes transparent, giving you a wide view of the Reckless landing in the center of the crater.  The ship is a collection of mismatched shapes and odd angles, a squat goblin crouching on the landing struts with a pointed hat—the mess hall pyramid—poking out from behind.\n\nThe wall between you and ${partner} becomes opaque, and the hole through which you could speak closes in on itself.\n\nYour speech box crackles and emits Zoa's voice.  \"Medusi tenders,\" she says, crisp and emotionless.  \"This is the captain of the Reckless.  I regret the breakdown of negotiations.  Send a representative out and I will meet with it personally, so that we can resolve this conflict like civilized beings.\"\n\n\"Nothing for discussion.  Departure from planet!  Transmission,\" says the Medusi leader.\n\nThere is barely a pause, before Zoa replies, \"If you will not bargain, then you must fill our cargo hold with vermite, or we will destroy this outpost and everything in it.  You have 50 kiloseconds to comply.  Then I open fire.\"\n\n*if (intent = 1)\n\t\"She'll do it!\" you tell the Medusi.  \"We have to take the children somewhere safe!\"\n\t*goto path\n*if (intent = 2)\n\t\"She'll do it, if you won't talk,\" you tell the Medusi.  \"Send me out to negotiate!\"\n\t*goto path\n*if (intent = 3)\n\t\"I told you,\" you say.  \"You should have listened to me.\"\n\t*goto path\n*label path\n*page_break\n*if (level > 40)\n\t*if (trial = false)\n\t\t*goto_scene hostage\n\t*else\n\t\t*if (intent = 1)\n\t\t\t*goto_scene resist\n\t\t*elseif (intent = 2)\n\t\t\t*goto you_nego\n\t\t*else\n\t\t\t\"Nullification of weapons with vermite,\" says the leader.\n\t\t\t\n\t\t\tThreats don't seem to be effective.  You…\n\t\t\t*choice\n\t\t\t\t#…offer myself as a negotiator.\n\t\t\t\t\t*set empathy %+ 10\n\t\t\t\t\t*goto you_nego\n\t\t\t\t#…act as a spy in enemy territory.\n\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t*goto_scene hostage\n\t\t\t\t#…fight against the Medusa holding my arms.\n\t\t\t\t\t*set level %- 5\n\t\t\t\t\tYou try to yank your arms away and run, but human strength is simply not enough to break a Medusa's hold.  \n\t\t\t\t\t\n\t\t\t\t\tThe escort's grip on your arms tightens painfully, and the leader says, \"If alien difficulty, no choice except isolation.\"\n\t\t\t\t\t*goto_scene hostage\n*else\n\t*if (trial = false)\n\t\t*goto_scene hostage\n\t*else\n\t\t*if (intent = 1)\n\t\t\t*goto_scene resist\n\t\t*if (intent = 2)\n\t\t\t*goto med_nego\n\t\t*else\n\t\t\t\"Nullification of weapons with vermite,\" says the leader.\n\t\t\t\n\t\t\tThreats don't seem to be effective.  You…\n\t\t\t*choice\n\t\t\t\t#…offer to help the Medusi negotiate.\n\t\t\t\t\t*set empathy %+ 10\n\t\t\t\t\t*goto med_nego\n\t\t\t\t#…act as a spy in enemy territory.\n\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t*goto_scene hostage\n\t\t\t\t#…fight against the Medusa holding my arms.\n\t\t\t\t\t*set level %- 5\n\t\t\t\t\tYou try to yank your arms away and run, but human strength is simply not enough to break a Medusa's hold.  \n\t\t\t\t\t\n\t\t\t\t\tThe escort's grip on your arms tightens painfully, and the leader says, \"If alien difficulty, no choice except isolation.\"\n\t\t\t\t\t*goto_scene hostage\n\n*label you_nego\n*page_break\n\"Agreement,\" says the Medusi leader.  \"Yet strategy requirement.  Opposition necessity also emergence.\"\n\nIt's right, of course: you have to start thinking like a negotiator.  If you step out in front of Zoa's blasters without her there, you'll put yourself entirely in her power.  That's no way to begin bargaining.  Instead, you and the Medusi should start by…\n*choice\n\t#…demanding that Zoa also stand in the line of fire.\n\t\tThe leader sends a message indicating that the Medusi's negotiator will emerge if and when Zoa comes out alone.  Zoa counters with a promise to exit first if she is allowed to bring three crew members for protection.  In the end, you are assigned a Second Level Medusa guard, and are permitted to take ${partner}, too.\n\t\t\n\t\t*label meet\n\t\tThe two delegations meet on the bare rock of the crater between the Reckless and the Medusi houses. As always, Zoa stands with the stillness of a cat waiting to pounce, her expression inscrutable behind her goggles.  Three crew members stand behind her,\n\t\t*if (((partner = \"Zeeber\") or (partner = \"Utambu\")) or (partner = \"The Mushroom\"))\n\t\t\tNy-bat, Gao, and Hammer.\n\t\t\t*if ((nybat_ally = true) and (gao_ally = true))\n\t\t\t\tThat gives you two more allies on the scene—hopefully they will help convince Zoa to trust you.\n\t\t\t\t*goto open\n\t\t\t*elseif (nybat_ally = true)\n\t\t\t\t*label present\n\t\t\t\tThat gives you another ally on the scene—hopefully that will help convince Zoa to trust you.\n\t\t\t\t*goto open\n\t\t\t*elseif (gao_ally = true)\n\t\t\t\t*goto present\n\t\t\t*else\n\t\t\t\t*goto open\n\t\t*elseif (partner = \"Ny-bat\")\n\t\t\tincluding Gao.\n\t\t\t*if (gao_ally = true)\n\t\t\t\t*goto present\n\t\t\t*else\n\t\t\t\t*goto open\n\t\t*else\n\t\t\tincluding Ny-bat.\n\t\t\t*if (nybat_ally = true)\n\t\t\t\t*goto present\n\t\t\t*else\n\t\t\t\t*goto open\t\t\t\n\t#…using vermite to disable Zoa's blasters.\n\t\t*set level %+ 15\n\t\tThe Medusi's first priority is the safety of the children, and you certainly sympathize with that imperative.  As you watch, a river of vermite flows up from the pool in the center of the crater and crawls up the sides of the Reckless, encasing the ship.  It sparkles in the sunlight, wave after wave of living water, enough to fill twenty starships.  Only one hatch remains uncovered when the vermite stops flowing.\n\t\t\n\t\t\"Impenetrable to weapons fire at current density,\" notes the Medusa leader from its pallet.\n\t\t\n\t\tSo, if the Reckless fires, the blast would only rebound on the ship itself.\n\t\t\n\t\tYou stride out of the Medusi house with a Second Level Medusi guard hovering a pace behind, and ${partner} at your side.\n\t\t*page_break\n\t\t*goto meet\t\t\n\t#…erecting a vermite dome to protect the Medusi.\n\t\t*set empathy %+ 10\n\t\t*set level %+ 5\n\t\tThe Medusi's first priority is the safety of the children, and you certainly sympathize with that imperative.  A dome of semi-aware vermite won't protect you while you are out negotiating, but it eliminates Zoa's ability to threaten the colony as a whole.\n\t\t\n\t\tAs you watch, a river of vermite flows up from the pool in the center of the crater and rushes straight towards you.  It sparkles in the sunlight, wave after wave of living water, enough to fill twenty starships.  It is one of the most beautiful sights you have ever seen, and one of the most terrifying.  You flinch as the towering wave comes within a meter of the room's transparent wall, but instead of crashing, the wave flows up and around the Medusi houses, forming a dome over the entire settlement.\n\n\t\t\"Impenetrable to weapons fire,\" notes the Medusa leader from its pallet.\n\t\t*page_break\n\t\tYou exit the dome through a Medusa-sized portal, along with a Second Level Medusa guard and ${partner}.\n\t\t*goto meet\t\n\n*label med_nego\n*set ear true\n*page_break\n\"Appreciation willingness.  Only competence doubtful,\" says the Medusa leader.  It trusts you now; it just thinks you're too stupid to handle delicate negotiations.\n\n\"What if you could hear what Zoa said?  And send me responses to relay?\" you ask.\n\n\"Alien repetition I, Colony Leader, statements?  With only correction of translation imperfection?\"\n\n\"Sure,\" you say.\n\nAt a gesture from the leader, one of the Medusi takes your speech box and inserts a limb.  When it hands it back to you, you see white words against the black of the visual output facet: Broadcasting translation.  Receiving on private band, visual only.\n\n\"I'll go, then,\" you say.\n*goto you_nego\n*label open\n\t\n*if (ear)\n\tYou glance down at your speech box.  Primary elicit apology previous injuries, you read.\n\t\n\tOf course, you don't have to keep your promise to follow the Medusi's instructions.  They probably won't come charging out to take over the negotiations—not immediately, anyway.\n\t\n\t*goto open_choice\n*else\n\t*label open_choice\n\tYou open with…\n\t*choice\n\t\t#…a demand for an apology.\n\t\t\t*set empathy %+ 10\n\t\t\t\"I regret that our previous encounter ended in violence.  The person responsible will be punished,\" Zoa says.  \"Please recall, though, that one of my people was the first to fall, however unintentional her injury may have been.\"\n\t\t\t\n\t\t\tYou glance at the bundle of thick worms on top of your guard's hood.  There are no sparks coming out of the Medusa's strange appendages now—the Medusa seems calm.\n\t\t\t\n\t\t\t*if (ear)\n\t\t\t\tAcceptable remorse.  Listing of conditions, you read on your speech box.\n\t\t\t\t\n\t\t\t\t*goto list\n\t\t\t*else\n\t\t\t\t*goto list\n\t\t#…a list of non-negotiables.\n\t\t\t*set infamy %+ 10\n\t\t\t*label list\n\t\t\t\"The Medusi have some conditions,\" you say.  \"Most importantly, the Medusi will set the schedule for vermite shipments.  They don't have any mature vermite available today.\"\n\t\t\t\n\t\t\t*if (mushroom_ally)\n\t\t\t\t*page_break\n\t\t\t\t*goto trust\n\t\t\t*else\n\t\t\t\t\"They also demand the return of their Honored Diplomat,\" you add.\n\t\t\t\t*page_break\n\t\t\t\t\"We will release the prisoner if an agreement is reached,\" says Zoa.\n\t\t\t\t\n\t\t\t\t\"Acceptable.\"\n\t\t\t\t\n\t\t\t\t*goto trust\n\t\t#…a discussion of price.\n\t\t\t*set infamy %+ 5\n\t\t\t\"The Medusi are ready to hear your offer,\" you tell Zoa.\n\t\t\t\n\t\t\t\"Perhaps we can proceed like civilized beings, then,\" Zoa says.  \"We have matters of scheduling and currency to discuss.\"\n\t\t\t\n\t\t\t*if (ear)\n\t\t\t\tListing of conditions, you read on your speech box.\n\t\t\t\t\n\t\t\t\t*goto list\n\t\t\t*else\n\t\t\t\t*goto list\n\n*label trust\n\"How do I know Spider or the IHP won't be waiting to arrest us when we return?\" Zoa asks.\n\n\"I believe the Medusi will keep their promises,\" you say.\n\n*if (infamy \u003c 50)\n\t\"Why should I trust you at all?\" asks Zoa.  \"You've been conspiring with the Medusi.\"\n\n\t\"I've acted in accordance with my conscience,\" you say.  \"I'm a lot more trustworthy than you.\"\n\n\t*label speak_up\n\t*if (nybat_rom = 3)\n\t\t*set infamy %+ 5\n\t\t\"You may rely on ${name} as you rely on me,\" says Ny-bat.  \"I'm sure of it.\"\n\t\t*goto grimace\n\t*elseif (nybat_ally)\n\t\t*set infamy %+ 5\n\t\t\"I have come to value ${name}'s opinion,\" says Ny-bat quietly to Zoa.  \"I think, in time, you will do the same.\"\n\t\t*label grimace\n\t\t\n\t\tZoa grimaces, but seems to accept Ny-bat's word.  \"I still need a guarantee from the Fungi,\" she insists.\n\t\t*goto exchange\n\t*elseif (gao_ally)\n\t\t*set infamy %+ 5\n\t\t\"${name}'s reliable.  My opinion, anyway,\" says Gao to Zoa. \n\n\t\tZoa grimaces, but seems to accept Gao's word.  \"I still need a guarantee from the Fungi,\" she insists.\n\t\t*goto exchange\n\t*elseif ((partner = \"Zeeber\") or (partner = \"Utambu\"))\n\t\t*set infamy %+ 5\n\t\t\"I trust ${name},\" volunteers ${partner}.\n\t\t\n\t\t\"No one gave you permission to speak,\" Zoa tells ${partner}.  Then she turns her glare back to you.  \"Words are worthless.  I need a guarantee from the Fungi.\"\n\t\t*goto exchange\n\t*else\n\t\t*goto exchange\n*else\n\t\"You may have earned some respect, but you're still a new hire, Stashie,\" Zoa says.\n\t\n\t*goto speak_up\n*label exchange\n\n*if (ear)\n\tMedusa leader submittance Trial of Trust, reads your speechbox.  Human captain likewise!\n\t\n\tYou can't imagine Zoa agreeing to the Trial, and you're sure she won't take the leader's success as proof of trustworthiness.\n\t\n\tYou…\n\t*choice\n\t\t#…pass on the Medusa's proposal.\n\t\t\t*set empathy %+ 10\n\t\t\t*set level %- 5\n\t\t\tYou did promise to follow the Medusa leader's prompts, so you explain the Trial of Trust to Zoa.\n\t\t\t\n\t\t\t\"You are joking,\" she says flatly.\n\t\t\t\n\t\t\t\"Insistence!  Insistence!\" reads your speech box, but you know that won't help.  It's up to you to bridge the cultural gap between the humans and the Medusi, and you'll have to do it in your own way.\n\t\t\t\n\t\t\t*goto hostage\n\t\t#…say the Medusi will wait for payment until the Reckless' return.\n\t\t\t*set level %- 5\n\t\t\t*set empathy %- 10\n\t\t\t*set infamy %- 10\n\t\t\t\"That would be acceptable,\" says Zoa quickly.\n\t\t\n\t\t\tImpossibility!  Insufficiency of surety! reads your speech box.\n\t\t\t\n\t\t\t\"Sorry.  The Medusi don't agree,\" you say, embarrassed by your own naive supposition.  You try a different tactic.\n\n\t\t\t*goto hostage\n\t\t#…suggest an exchange of hostages.\n\t\t\t*set infamy %+ 10\n\t\t\t*set level %+ 10\n\t\t\t*goto hostage\t\t\n*else\n\t*label hostage\n\t\"We will exchange hostages,\" you say firmly.  \"One Medusa to travel on the Reckless, and one crew member to stay here.  You could leave…\"\n\t*choice\n\t\t#…me.\n\t\t\t*set stay true\n\t\t\t*set infamy %+ 25\n\t\t\t*set empathy %+ 20\n\t\t\t*gosub approval\n\t\t\tZoa nods in approval.  \"You will be our liaison with the Medusi.  Now, as to price…\"\n\t\t\t\n\t\t\t*if (nybat_rom > 1)\n\t\t\t\tYou note Ny-bat's concerned expression, but need to stay focused on the negotiations for the moment.\n\t\t\t\t\n\t\t\t\t*goto price\n\t\t\t*else\n\t\t\t\t*label price\n\t\t\t\tYou settle on human visual display technology—terminals and hovers—as a currency.  That's the one area Medusi organic technology falls behind human metallic technology, so it will have excellent resale value on the Medusi black market.  Finally you get down to the actual bargaining, which you pursue…\n\t\t\t\t*choice\n\t\t\t\t\t#…deferentially.\n\t\t\t\t\t\t*set infamy %- 15\n\t\t\t\t\t\tUnfortunately, this tactic makes Zoa suspicious.  The Medusi are anything but humble, and Zoa expects a certain amount of greed in her bargaining partners.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (persuasiveness > 75)\n\t\t\t\t\t\t\tIt takes a lot of fast talking on your part to reassure Zoa that you are bargaining in good faith.\n\t\t\t\t\t\t\t*goto payment\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tLuckily, ${partner} is there to tell you what you are doing wrong, and you manage to adopt a more forceful demeanor before Zoa walks away.\n\t\t\t\t\t\t\t*goto payment\n\t\t\t\t\t#…doggedly.\n\t\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t\tZoa seems to expect a certain amount of stubborn self-interest and greed in a bargaining partner, so your stance is effective.\n\t\t\t\t\t\t*label payment\n\t\t\t\t\t\t\n\t\t\t\t\t\tWhen the agreement between Zoa and the Medusi is settled, Zoa asks what you expect for your services as a negotiator.  You ask for…\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#…a thousand credits to be deposited into my station account.\n\t\t\t\t\t\t\t\t*set level %- 10\n\t\t\t\t\t\t\t\t*set infamy %- 15\n\t\t\t\t\t\t\t\tYou can see from Gao's face that this was not an astute request.  As you think it through, you realize you're a pirate now, and you won't actually be able to draw from your old account without alerting the IHP.\n\t\t\t\t\t\t\t\t*if (gao_ally = true)\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"At least let me put it in an account ${name} can access,\" Goa says to Zoa.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tZoa agrees, and the deal is made.\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*goto ihp_or_not\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tZoa agrees, and the deal is made.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto ihp_or_not\n\t\t\t\t\t\t\t#…five percent of the Reckless' profit from now on.\n\t\t\t\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\t\t\t\t*set level %+ 10\n\t\t\t\t\t\t\t\tZoa bargains you down to four percent, and the deal is made.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto ihp_or_not\n\t\t\t\t\t\t\t#…a home on the Reckless.\n\t\t\t\t\t\t\t\t*set infamy %- 25\n\t\t\t\t\t\t\t\tZoa frowns, disappointed.\n\t\t\t\t\t\t\t\t*if (nybat_rom > 1)\n\t\t\t\t\t\t\t\t\tNy-bat grips your arm, but then seems to recollect that this is not the time for a private conversation.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto cap_react\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*label cap_react\n\t\t\t\t\t\t\t\t\t*if (infamy > 30)\n\t\t\t\t\t\t\t\t\t\tStars be thanked, you've earned enough of Zoa's trust that she doesn't think you will inform on the Reckless once you're home.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*if (message = false)\n\t\t\t\t\t\t\t\t\t\t\t*if (nybat_rom > 1)\n\t\t\t\t\t\t\t\t\t\t\t\t\"I'll inform the captain that I intend to retire from smuggling,\" says Ny-bat.  \"She won't be pleased, but we'll be together, and free of the Reckless.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tNy-bat is clearly envisioning a long-term future for the two of you.  This is…\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#…good, because I might be falling in love with ${n_him}.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set nybat_rom 3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set partner_saved true\n\t\t\t\t\t\t\t\t\ lates.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto home\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#\"You'll live with other teens who've had it rough.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set adopt 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set zeeber_fate 3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set empathy %- 5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set level %+ 10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAfter all the trauma she's been through, Zeeber needs more help than you can give.  Once you're in human space, you'll hand her over to a planetary government, which can send her to a therapeutic group home.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto home\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Zeeber annoys me, but the Reckless is no place for a kid.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto return\n\t\t\t\t\t\t\t\t\t\t\t\t\t#The Reckless is the best place for Zeeber.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set adopt 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set zeeber_fate 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set empathy %- 10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tShippers often have trouble adjusting to the wider social world of a station or planet.  Zeeber, in particular, would struggle to adapt to the very different pressures of a normal high school experience.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tBesides, the crew of the Reckless is about to become immensely wealthy, thanks to the deal you've set up with the Medusi.  Zeeber should stay a few more years and build a fortune; then she can do anything she wants, go anywhere in the spiral.  She'll be truly free.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto home\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene station_end\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*goto ihp_or_not\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\"Planning to tell the IHP of our arrangement here?\" she asks.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"Of course not,\" you say.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"Someday I might believe you,\" she says.  \"Today you are joining the crew, willingly or not.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou suppose there's nothing to be gained by acting unwilling.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto ihp_or_not\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t#…a crate of something salable from the cargo hold.\n\t\t\t\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\t\t\t\t\"Five original interactive paintings,\" Zoa offers, raising her eyebrows.  She seems pleased with your initiative.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (gao_ally = true)\n\t\t\t\t\t\t\t\t\tGao shakes his head slightly, so you know the interactive painting trade can't be too lucrative.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*label offer\n\t\t\t\t\t\t\t\t\tYou…\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#…accept her offer.\n\t\t\t\t\t\t\t\t\t\t\t*set infamy %- 10\n\t\t\t\t\t\t\t\t\t\t\t*set level %- 10\n\t\t\t\t\t\t\t\t\t\t\tThe deal is made.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*goto ihp_or_not\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t#…ask for the Sinbolo wood I saw in the cargo hold.\n\t\t\t\t\t\t\t\t\t\t\t*set level %+ 10\n\t\t\t\t\t\t\t\t\t\t\t*set infamy %- 5\n\t\t\t\t\t\t\t\t\t\t\tEventually you and Zoa agree on two kilograms of Sinbolo wood.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*goto ihp_or_not\n\t\t\t\t\t\t\t\t\t\t#…demand a meter cubed of vermite.\n\t\t\t\t\t\t\t\t\t\t\t*set level %+ 15\n\t\t\t\t\t\t\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t\t\t\t\t\t\tZoa bargains you down to seventy centimeters cubed, and the deal is made.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*goto ihp_or_not\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*goto offer\n\t\t\t\t\t\t\t#…nothing.  I am doing this for the Medusi.\n\t\t\t\t\t\t\t\t*set level %- 5\n\t\t\t\t\t\t\t\t*set infamy %- 15\n\t\t\t\t\t\t\t\tUnfortunately, altruism isn't something Zoa understands.  Her eyes narrow with suspicion.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (nybat_ally)\n\t\t\t\t\t\t\t\t\t\"${name} means to say that a secure position on the Reckless is enough for now,\" says Ny-bat.  \"You will, of course, adjust the profit percentage you offered based on ${name}'s stellar performance here.\"\n\t\t\t\t\t\t\t\t\t*goto convinced\n\t\t\t\t\t\t\t\t*elseif (gao_ally)\n\t\t\t\t\t\t\t\t\t\"${name} just wants to be paid like the rest of us,\" Gao says.  \"Percentage based on performance.  Secure place.\"\n\t\t\t\t\t\t\t\t\t*goto convinced\n\t\t\t\t\t\t\t\t*elseif (utambu_ally)\n\t\t\t\t\t\t\t\t\t\"${name} means it's enough to stay on the Reckless for good, with a decent percentage as pay,\" Utambu says.\n\t\t\t\t\t\t\t\t\t*goto convinced\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\"${name} means it's enough to stay on the Reckless for good, with a decent percentage as pay,\" says Zeeber.\n\t\t\t\t\t\t\t\t\t*label convinced\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tZoa accepts this explanation, and promises you a salary of three percent of the Reckless' profits.\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*goto ihp_or_not\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t#…fiercely.\n\t\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\t\tZoa seems to expect a certain amount of animosity in a bargaining partner, and takes no offense.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto payment\n\t\t\t\n\t\t#…Ny-bat.\n\t\t\t*if (nybat_rom > 1)\n\t\t\t\tNy-bat frowns at you in concern.\n\t\t\t\t*goto no\n\t\t\t*else\n\t\t\t\t*label no\n\t\t\t\t\"No.  I need Ny-bat,\" Zoa tells you.  \"They can have Zeeber.  My daughter.\"  Her eyes dare you to expose the lie.\n\t\t\t\t*goto zeeber\n\t\t#…Zeeber.\n\t\t\t\"The Medusi can care for my daughter,\" Zoa agrees, her eyes daring you to expose the lie.\n\t\t\t*label zeeber\n\t\t\t\n\t\t\t\"Highest honor, fostering of child!\" exclaims the Medusa guard, its translated voice sounding awed.\n\t\t\t\n\t\t\t*gosub approval\n\t\t\t\n\t\t\tShould you tell the Medusi that Zeeber is not Zoa's daughter?  The aliens are obviously thrilled, but is it a good idea to base this agreement on a lie?  Also, there is Zeeber's well-being to consider.\n\t\t\t\n\t\t\tYou tell the Medusi Zeeber is…\n\t\t\t*choice\n\t\t\t\t#…Zoa's precious daughter.\n\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t*set empathy %- 10\n\t\t\t\t\t\"Now, as to price…\" Zoa says.\n\t\t\t\t\t*goto price\n\t\t\t\t#…mine.  I plan to adopt her.\n\t\t\t\t\t*set adopt 2\n\t\t\t\t\t*set zeeber_ally true\n\t\t\t\t\t*set empathy %+ 30\n\t\t\t\t\t\"Still honor, child of human ally,\" says the Medusi guard.\n\t\t\t\t\t\n\t\t\t\t\tYou are glad that telling the truth didn't endanger the agreement.\t\t\t\t\t\t\t\n\t\t\t\t\t*if (partner = \"Zeeber\")\n\t\t\t\t\t\n\t\t\t\t\t\tZeeber doesn't say anything; she just lunges for you, almost knocking you over as she throws her arms around you.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Sorry we'll be apart for a few weeks to start,\" you say, as she cries on your shoulder.\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe clings to you like she's jumped out an airlock and you're her tether.  You realize you are a parent now.  You have a daughter to protect.  The knowledge changes you in some way you can't quantify; you only feel a vast and subtle rearrangement inside you—a shift of tectonic plates.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Now, as to price…\" Zoa says.\n\t\t\t\t\t\t*goto price\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou hope Zeeber will be happy when she learns of your intention to adopt her.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Now, as to price…\" Zoa says.\n\t\t\t\t\t\t*goto price\n\t\t\t\t#…an orphan, cared for by the whole community.\n\t\t\t\t\t*set level %+ 10\n\t\t\t\t\t\"Great honor for ship, care of non-relationship child,\" says the Medusi guard.  \"And honor pass to Medusi.\"\n\n\t\t\t\t\tYou are glad that telling the truth didn't endanger the agreement.\n\n\t\t\t\t\t*if (partner = \"Zeeber\")\n\t\t\t\t\t\tZeeber flashes you a grateful smile.  She seems pleased to be the Reckless' liaison.\n\n\t\t\t\t\t\t\"Now, as to price…\" Zoa says.\n\t\t\t\t\t\t*goto price\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto price\n\t\t\t\t#…just a young member of the crew.\n\t\t\t\t\t*set level %- 10\n\t\t\t\t\t\"Pre-leveling child without guardianship?  Savagery!\" says the Medusi guard.  \"Rectification in Medusi colony.\"\n\t\t\t\t\t\n\t\t\t\t\tYou may have dimmed the Medusi's view of humanity, but at least they are still anxious for the hostage exchange to take place.\n\t\t\t\t\t\n\t\t\t\t\t\"Now, as to price…\" Zoa says.\n\t\t\t\t\t*goto price\n\n*label approval\n*if (ear)\n\tThe Medusi leader indicates its approval of this plan via your speech box.\n\t*return\n*else\n\t*return\n\n*label ihp_or_not\n*if (message = false)\n\t*goto endings\n*else\n\t*label ihp_arrives\n\t*set reckless_caught true\n\tSuddenly, a roar fills your ears and a strong wind makes you stagger.  A ship is descending onto one of the landing pads!  You instantly recognize the black spikes of an IHP ship.  This must be a response to the message you sent when you were a prisoner—the IHP never would have found you otherwise.\n\t\n\tYou hear several dull thuds as the IHP ship grapples the Reckless with huge magnetic tethers.\n\t\n\tA loudspeaker blares, \"This is the Inter-Human Police.  You are in violation of the Human-Medusi Articles of Peaceful Trade.  Your presence here confirms your guilt.  All humans will be taken into custody!  Surrender to the android agent or waive your right to a trial before execution.\"\n\t\n\tYou decide to…\n\t*choice\n\t\t#…surrender to the IHP.\n\t\t\t*set infamy %- 25\n\t\t\t*gosub android\n\t\t\n\t\t\t*goto ihp_outcomes\n\t\t#…help the Reckless escape.\n\t\t\t*set infamy %+ 30\n\t\t\t\"Listen, everyone,\" you whisper fiercely.  \"We landed here by accident…some ship malfunction…we didn't know it was a Medusi planet…you Medusi were just offering aid.  Will you help us?\"\t\t\n\n\t\t\t*if ((empathy >= 60) and (medusi_strength >= 18))\n\t\t\t\t\"Medusi will corroboration,\" says the leader via your speech box.  \"Fast!  Creation damage!\"\n\t\t\t\t\n\t\t\t\tZoa races towards the ship.\n\t\t\t\t\n\t\t\t\tYou can best help with the deception by…\n\t\t\t\t*choice\n\t\t\t\t\t#…lying to the IHP.\n\t\t\t\t\t\t*gosub android\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou stick to your story, insisting that the message the IHP received was a malicious joke, and that you willingly accepted a post on this innocent legal trader.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if ((persuasiveness > 74) or (level > 65))\n\t\t\t\t\t\t\t*label tricked\n\t\t\t\t\t\t\t*set reckless_caught false\n\t\t\t\t\t\t\tOf course the IHP see right through your ruse.  But they have no evidence, so all they can do is escort you back to human space, and leave a few trackers that you easily disable.  In a week, you are back at 4-7-2\n\t\t\t\t\t\t\t*if (stay = true)\n\t\t\t\t\t\t\t\tto begin your stay.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto endings\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tto drop off Zeeber.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto endings\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tUnfortunately, the IHP investigators you lead through the Reckless see right through your ruse, and are able to dig out enough evidence from the Reckless computer to arrest the whole crew.  You've been rescued despite yourself.\n\t\t\t\t\t\t\t*goto ihp_outcomes\n\t\t\t\t\t#…making the Reckless systems support my story.\n\t\t\t\t\t\t\"I'll crash the nav computer,\" says Zoa, as the two of you run back into the ship.  \"Stars be thanked, the hold is almost empty.  Nothing too incriminating.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"There was a message…\" you say, just inside the hatch.  Zoa gives you a hard stare that tells you she has already figured that out.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I was your prisoner at the time,\" you say in your defense.  \"I'll take care of it.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou race to the nearest terminal, and begin creating a trail that shows how that message was bounced off the Reckless from an unknown origin, as a malicious joke.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*if (hacking > 50)\n\t\t\t\t\t\t\tOf course the IHP see right through your ruse.  But they have no evidence, so all they can do is escort you back to human space, and leave a few trackers that you easily disable.  In a week, you are back at 4-7-2\n\t\t\t\t\t\t\t*if (stay = true)\n\t\t\t\t\t\t\t\tto begin your stay.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto endings\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tto drop off Zeeber.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto endings\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tUnfortunately, the IHP investigators that access the Reckless system see right through your ruse, and are able to dig out enough evidence from the Reckless computer to arrest the whole crew.  You've been rescued despite yourself.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto ihp_outcomes\n\t\t\t\t\t#…melting the nav computer.\n\t\t\t\t\t\tYou head deep into Utambu's territory, grabbing a torch from a workbench as you pass.  Within the sterile computer room, you find the unmistakable crystal memory of the nav computer and turn your torch on it.  The delicate crystals melt into a pile of stinking, molten slag.\n\t\t\t\t\t\t\n\t\t\t\t\t\tBefore you go, you:\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Use the torch on other parts of the computer.\n\t\t\t\t\t\t\t\t*goto stupid\n\t\t\t\t\t\t\t#Hide the torch.\n\t\t\t\t\t\t\t\t*label stupid\n\t\t\t\t\t\t\t\t*set level %- 10\n\t\t\t\t\t\t\t\t*set infamy %- 20\n\t\t\t\t\t\t\t\tUnfortunately, when the IHP discovers the hot crystal slag, they know someone has just inflicted purposeful damage.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto ihp_outcomes\n\t\t\t\t\t\t\t#Jam the door, so the crystals can cool before being discovered.\n\t\t\t\t\t\t\t\t*set level %+ 15\n\t\t\t\t\t\t\t\tThe damage is supposed to be at least a few kiloseconds old, right?\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto tricked\t\t\t\t\t\t\t\t\n\t\t\t*else\n\t\t\t\t\"No,\" says the Medusi leader via your speech box.  \"Risk too immensity.  Too much loss already for tenders.\"\n\t\t\t\t\n\t\t\t\tIHP androids are emerging to take everyone into custody.  There's nothing else you can do.  You've been rescued despite yourself.\n\t\t\t\t\n\t\t\t\t*gosub android\n\n\t\t\t\t*goto ihp_outcomes\n\t\t#…ask the Medusi for asylum.\n\t\t\t*set reckless_caught true\n\t\t\tFirst, you grab…\n\t\t\t*choice\n\t\t\t\t#…Ny-bat.\n\t\t\t\t\t*set partner \"Ny-bat\"\n\t\t\t\t\t*set partner_saved true\n\t\t\t\t\tThe two of you\n\t\t\t\t\t*goto dash\n\t\t\t\t#…Gao.\n\t\t\t\t\t*set partner \"Gao\"\n\t\t\t\t\t*set partner_saved true\n\t\t\t\t\tThe two of you\n\t\t\t\t\t*goto dash\n\t\t\t\t*if (partner = \"Zeeber\") #…Zeeber.\n\t\t\t\t\t*set partner_saved true\n\t\t\t\t\tThe two of you\n\t\t\t\t\t*goto dash\n\t\t\t\t*if (partner = \"Utambu\") #…Utambu.\n\t\t\t\t\t*set partner_saved true\n\t\t\t\t\tThe two of you\n\t\t\t\t\t*goto dash\n\t\t\t\t#…my guard's closest limb.\n\t\t\t\t\tYou \n\t\t\t\t\t*label dash\n\t\t\t\t\tdash across the black rock, knowing the IHP won't shoot for fear of hitting your Medusa guard and violating one of the treaties it exists to enforce.\n\t\t\t\t\t\n\t\t\t\t\t*if (trial = false)\n\t\t\t\t\t\tUnfortunately, the Medusi decline to offer you asylum, and hand you over to the human authorities instead.\n\t\t\t\t\t\t*set partner_saved false\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto ihp_outcomes\t\t\t\t\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe Medusa leader offers you asylum, and the IHP are forced to leave you on 4-7-2, since they cannot violate Medusi territory to retrieve you.  You watch through transparent walls as the Reckless is impounded and its crew taken prisoner.  The Reckless crew will presumably stand trial, but if you can make your own way home, the IHP will never be able to prove you were on 4-7-2.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if ((partner = \"Ny-bat\") and (nybat_rom > 1))\n\t\t\t\t\t\t\t*if (partner_saved)\n\t\t\t\t\t\t\t\tNy-bat pulls you in for a giddy kiss.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"We are together now.  Free of the Reckless, free of the IHP—we can do anything!\" ${n_he} exults.  Ny-bat is clearly envisioning a long-term future for the two of you.  This is…\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#…good, because I might be falling in love with ${n_him}.\n\t\t\t\t\t\t\t\t\t\t*set nybat_rom 3\n\t\t\t\t\t\t\t\t\t\t\"I can't wait to take you home,\" you say, kissing ${n_him} again.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*goto wait\n\t\t\t\t\t\t\t\t\t#…worrisome, because I'm not ready for a serious relationship.\n\t\t\t\t\t\t\t\t\t\t*set nybat_rom 2\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"Will you come with me as far as Dekara?\" you ask, keeping your tone light.  \"Then you can decide where to go, or whether to stay.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"Of course,\" Ny-bat says, forehead wrinkling.  $!{n_he} understands your subtle hint, and avoids talking about the future from then on.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*goto wait\n\t\t\t\t\t\t\t\t\t#…embarrassing, because I only meant to flirt, that's all.\n\t\t\t\t\t\t\t\t\t\t*set nybat_rom 1\n\t\t\t\t\t\t\t\t\t\t*set partner_saved false\n\t\t\t\t\t\t\t\t\t\t\"Yes, free!\" you say.  \"I'll be returning to Dekara station.  Where will you be going?\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tNy-bat goes still.  \"I suppose I could find a new ship, a legal trader, perhaps?\" ${n_he} asks, ${n_his} real question clear.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"That sounds perfect for you,\" you say, because it would be crueler to let ${n_him} hope.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tNy-bat nods, turning away.  From then on ${n_he} treats you with deference and distance, and you never break through ${n_his} reserve again.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*goto wait\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou miss Ny-bat immediately, and wish you had longer to explore your feelings for ${n_him}.  You determine to track ${n_him} down after his trial, and see if ${n_he} wants to remain in touch while incarcerated.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if ((partner_saved = true) and (partner != \"Zeeber\"))\n\t\t\t\t\t\t\t\t\t*goto partner_with\n\t\t\t\t\t\t\t\t*elseif ((partner_saved = true) and (partner = \"Zeeber\"))\n\t\t\t\t\t\t\t\t\t*goto zeeber_with\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*goto wait\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*elseif ((partner_saved = true) and (partner != \"Zeeber\"))\n\t\t\t\t\t\t\t*label partner_with\n\t\t\t\t\t\t\t${partner} is grateful for your help escaping the IHP, and decides to return with you to Dekara station.\n\t\t\t\t\t\t\t*goto wait\n\t\t\t\t\t\t*elseif ((partner_saved = true) and (partner = \"Zeeber\"))\n\t\t\t\t\t\t\t*label zeeber_with\n\t\t\t\t\t\t\t*if (adopt = 2)\n\t\t\t\t\t\t\t\tStars be thanked, you were able to keep Zeeber with you.  She is both excited and terrified by the prospect of a new life with you on Dekara Station.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto wait\n\t\t\t\t\t\t\t*elseif (adopt = 1)\n\t\t\t\t\t\t\t\tZeeber is grateful for your help escaping the IHP.  You'll take her back to human space, and find a good therapeutic group home for her.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto wait\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tZeeber is grateful for your help escaping the IHP, but feels lost without the Reckless to call home.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#I adopt her myself.\n\t\t\t\t\t\t\t\t\t\t*set adopt 2\n\t\t\t\t\t\t\t\t\t\t*gosub zeebercheck\n\t\t\t\t\t\t\t\t\t\t*set empathy %+ 30\n\t\t\t\t\t\t\t\t\t\tYou invite Zeeber to return with you to Dekara Station.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"And then what?  You'll find a ship that needs a drudge?\" Zeeber asks.\n\n\t\t\t\t\t\t\t\t\t\t\"Of course not!\" you say, saddened by how little Zeeber expects from people.  \"You'll live with me and go to school, at least until you're ready for college…\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou stop because Zeeber is crying so hard, and you put your arms around her.  She clings to you like she's jumped out an airlock and you're her tether.  You realize you are a parent now.  You have a daughter to protect.  The knowledge changes you in some way you can't quantify; you only feel a vast and subtle rearrangement inside you—a shift of tectonic plates.\n\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto wait\n\t\t\t\t\t\t\t\t\t#I place her in a therapeutic group home.\n\t\t\t\t\t\t\t\t\t\t*set adopt 1\n\t\t\t\t\t\t\t\t\t\t*set empathy %- 5\n\t\t\t\t\t\t\t\t\t\t*set level %+ 10\n\t\t\t\t\t\t\t\t\t\t*set zeeber_fate 3\n\t\t\t\t\t\t\t\t\t\tAfter all the trauma she's been through, Zeeber needs more help than you can give.  Once you're in human space, you'll hand her over to a planetary government that can send her someplace appropriate.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*goto wait\n\t\t\t\t\t\t\t\t\t#I find her a berth on a legal trader.\n\t\t\t\t\t\t\t\t\t\t*set adopt 1\n\t\t\t\t\t\t\t\t\t\t*set zeeber_fate 3\n\t\t\t\t\t\t\t\t\t\t*set empathy %- 20\n\t\t\t\t\t\t\t\t\t\t\"That's what I thought,\" Zeeber says glumly, picking at a loose thread on her worn shoes.  \"You'll dump me the first chance you get.  Well, I'm done living shipside.  On planets, they have places like orphanages, don't they?\"\n\n\t\t\t\t\t\t\t\t\t\t\"Group homes,\" you tell her.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"I'm going to find me one of those,\" Zeeber says defiantly.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou can help with that, at least.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*goto wait\n\t\t\t\t\t\t*else\t\n\t\t\t\t\t\t\t*label wait\n\t\t\t\t\t\t\t*gosub learn\n\t\t\t\t\t\t\tBy the time a Spider ship arrives to collect the vermite crop, you feel like you have a home among the Medusi of 4-7-2.\n\t\t\t\t\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\tThe Spider vessel looks bizarre to human eyes: lumpy, striated, and organic, like a giant, living ball of yarn.  The fibers pull apart to create an opening, and several armored Medusi lunge towards you.  Your alien friends push you behind them, and lightening flies between the two groups of Medusi as they argue too fast for your speech box to translate.\n\n\t\t\t\t\t\t\tEventually, a detente is reached.  The crew of the Spider ship agrees to drop you off at an interspecies trading post.  From there, you'll be able to make your way back to human space.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t\t\t*goto_scene station_end\t\t\t\t\n*label ihp_outcomes\nThe IHP does not approve of all your actions since your kidnapping; they think you gave too much aid to the smugglers.  Your interrogator, a bored bureaucrat, tells you that you'll fare much better if you are willing to testify against the Reckless crew.  Are you?\n*choice\n\t#Yes.  I'll give evidence against them.\n\t\t*set infamy %- 25\n\t\tThe pirates kidnapped you—you don't owe them anything!  You give an accurate account of your experiences, and let the Reckless crew accept the consequences of their own actions.  Krantic faces execution—the IHP is inflexible where human-alien violence is concerned—and Zoa gets life in prison for kidnapping and other crimes, but the rest of crew is convicted only of attempting to violate an interspecies treaty, with various prison sentences as a result.\n\n\t\t*goto sentence\n\t#No.  I'll deny that I was kidnapped.\n\t\t*set infamy %+ 25\n\t\tYou are loyal to the Reckless now, and refuse to give evidence.\n\t\t\n\t\tMost of the crew is convicted of attempting to violate an interspecies treaty, but at least you've saved them from kidnapping charges, as well.  Krantic faces execution—the IHP is inflexible where human-alien violence is concerned—and Zoa gets life in prison, but the rest of the crew faces rather light sentences on IHP fuel tankers rather than the notorious asteroid prisons, thanks to your testimony on their behalf.\n\t\t*goto sentence\n\t#I'll testify against some, and in defense of others.\n\t\t*set empathy %+ 15\n\t\tZeeber won't be charged with anything; the IHP sees her as Zoa's victim.  All of the other crew members face trial for various crimes.  In particular, you refuse to implicate…\n\t\t*choice\n\t\t\t#…Ny-bat.\n\t\t\t\t*gosub nybatcheck\t\t\t\n\t\t\t\tYour testimony earns Ny-bat time on an IHP fuel tanker, instead of one of the notorious asteroid prisons.  Krantic faces execution—the IHP is inflexible where human-alien violence is concerned—and Zoa gets life in prison, but the rest of crew is convicted only of attempting to violate an interspecies treaty, with various prison sentences as a result.\n\t\t\t\t*goto sentence\n\t\t\t#…Gao.\n\t\t\t\t*gosub gaocheck\n\t\t\t\tYour testimony earns Gao time on an IHP fuel tanker, instead of one of the notorious asteroid prisons.  Krantic faces execution—the IHP is inflexible where human-alien violence is concerned—and Zoa gets life in prison, but the rest of crew is convicted only of attempting to violate an interspecies treaty, with various prison sentences as a result.\n\t\t\t\t*goto sentence\n\t\t\t#…Utambu.\n\t\t\t\t*gosub utambucheck\n\t\t\t\tYour testimony earns Utambu time on an IHP fuel tanker, instead of one of the notorious asteroid prisons.  Krantic faces execution—the IHP is inflexible where human-alien violence is concerned—and Zoa gets life in prison, but the rest of crew is convicted only of attempting to violate an interspecies treaty, with various prison sentences as a result.\n\t\t\t\t*goto sentence\n\t\t\t#…Ny-bat, Gao, or Utambu.\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t*gosub nybatcheck\n\t\t\t\t*gosub gaocheck\n\t\t\t\t*gosub utambucheck\n\t\t\t\tYour testimony earns Ny-bat, Gao, and Utambu time on an IHP fuel tanker, instead of one of the notorious asteroid prisons.  Krantic faces execution—the IHP is inflexible where human-alien violence is concerned—and Zoa gets life in prison, but the rest of crew is convicted only of attempting to violate an interspecies treaty, with various prison sentences as a result.\n\t\t\t\t*goto sentence\n\n*label sentence\n\n*if ((infamy \u003c 45) or (empathy > 70))\n\tAs for you, your message to the IHP and the testimony of the Medusi on your behalf weigh heavily with the sentencing committee (the closest the IHP gets to a jury).  You are released with a warning, and given passage home.\n\t\n\t*if (adopt > 1)\n\t\t*label family\n\t\tYou and Zeeber travel back to Dekara Station, where you enroll your daughter in school, and try to provide a stable home for her.\n\t\t\n\t\t*goto miss\n\t*elseif (adopt = 0)\n\t\tThe IHP agents are not sure what to do with Zeeber.  Though she has been aiding the pirates for rotations, she is a minor, and one who has clearly suffered a lifetime of emotional abuse.\n\t\t*choice\n\t\t\t#I will adopt her yourself.\n\t\t\t\t*set adopt 2\n\t\t\t\t*gosub zeebercheck\n\t\t\t\t*set empathy %+ 30\n\t\t\t\tIHP agents bring Zeeber to your room aboard their ship, and you explain that she'll be returning with you to Dekara Station.\n\t\t\t\t\n\t\t\t\t\"And then what?  You'll find a ship that needs a drudge?\" Zeeber asks, sitting down on the bed.\n\n\t\t\t\t\"Of course not!\" you say, saddened by how little Zeeber expects from people.  \"You'll live with me and go to school, at least until you're ready for college…\"\n\t\t\t\t\t\n\t\t\t\tYou stop because Zeeber is crying so hard, and you put your arms around her.  She clings to you like she's jumped out an airlock and you're her tether.  You realize you are a parent now.  You have a daughter to protect.  The knowledge changes you in some way you can't quantify; you only feel a vast and subtle rearrangement inside you—a shift of tectonic plates.\n\n\t\t\t\t*page_break\n\t\t\t\t*goto family\t\t\t\t\n\t\t\t#I place her in a therapeutic group home.\n\t\t\t\t*set zeeber_fate 3\n\t\t\t\t*set adopt 1\n\t\t\t\t*set empathy %- 5\n\t\t\t\t*set level %+ 10\n\t\t\t\tThe agents agree, and decide to turn her over to a convenient planetary government that will care for her as a ward of the state.\n\t\t\t\t\n\t\t\t\t*goto miss\n\t\t\t\t\n\t\t\t#I find her a berth on a legal trader.\n\t\t\t\t*set adopt 1\n\t\t\t\t*set empathy %- 20\n\t\t\t\t*set zeeber_fate 3\n\t\t\t\tThe agents look at you like you are a psychopath, and they have made a mistake in setting you free.  They tell you a group home is more appropriate.  \n\t\t\t\t\n\t\t\t\t*label miss\n\t\t\t\t*if (nybat_rom > 1)\n\t\t\t\t\tYour return to the station is tinged with regret, since Ny-bat isn't with you.\n\t\t\t\t\t\n\t\t\t\t\t*goto returned\n\t\t\t\t*else\n\t\t\t\t\t*label returned\n\t\t\t\t\tThe IHP returns you to Dekara Station, where you try to resume your old habits.\n\t\t\t\t\t*page_break Epilogue\n\t\t\t\t\t*goto_scene station_end\n\t*else\n\t\t*goto miss\n*elseif ((infamy \u003c 65) or (empathy > 50))\n\tAs for you, your message to the IHP and the testimony of the Medusi on your behalf weighs heavily with the sentencing committee (the closest the IHP gets to a jury).  They can't ignore all of your actions, though, so you are convicted of conspiracy to smuggle and sentenced to a rotation on an IHP fuel tanker.  At least you won't be held at one of the IHP's notorious asteroid prisons!\n\t*if (nybat_rom > 1)\n\t\tYou miss Ny-bat, and wish you had had more time to explore your feelings for ${n_him}.  You stay in touch while you're on the tanker—${n_he} writes beautiful, elegant letters—and ${n_he} promises to join you when ${n_his} sentence is served.\n\t\t\n\t\t*goto served\n\t*else\n\t\t*label served\n\t\tA rotation is just a rotation, and after completing your service you return to Dekara Station, and try to resume your old habits.\n\t\t\n\t\t*if (adopt > 1)\n\t\t\tZeeber joins you, and you enroll your daughter in school, hoping to provide a bit of the normalcy and stability she has never had.\n\t\t\t\n\t\t\t*goto home\n\t\t*else\t\n\t\t\t*goto home\n*else\n\tAs for you, when the IHP sentencing committee looks at your message and your subsequent actions, they determine that you ar
