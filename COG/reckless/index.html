s like a lion's mane.\n\n\"Surprise, surprise,\" he says with a feral smile.  \"The Stashie's taking a trip.\"\n\n\"I'm…\" you begin.\n\nThe next thing you know, there's a knifepoint scraping the underside of your chin, and a hand painfully clutching the hair on the back of your head.  The maniac's face is centimeters from your own, the skin a sickly white, the eyes wild, the mouth still smiling, as if he's enjoying this game.\n*page_break\n\"I talk.  You listen,\" he says slowly and clearly, as if addressing an alien with limited humanspeak.  \"Nod if you understand.\"  He forces your head up and down, carelessly shifting the knife.  You grit your teeth against the sharp sting of the point, and feel a trickle of blood drip down your neck.\n\nThe pirate releases you as quickly as he grabbed you.  \"Or scream.  We'll get to screams,\" he shouts cheerfully, waving the bloody knife in the air.\n\nYou'd better act quickly!\n*choice\n\t#I retreat and lock myself into the airlock.\n\t\tLuckily, you never reformed the pressure seal between the decontamination chamber and the airlock. You hurl yourself through the empty door frame, and slam your fist down on the emergency button.  The vermite seal immediately re-forms, a strange and speedy waterfall that flows from the edges of the door frame into the center.\n\t\t\n\t\tThe crazy pirate throws himself against the transparent barrier, but he is too late.  You see his mouth moving, but you can't hear anything through the vermite seal.  He tries to use the control panel to open the seal, but you've engaged the emergency system, and the ship's computer is programmed to protect the ship from a breach in pressure.\n\t\t\n\t\tGao's rough voice suddenly fills the small room.  The airlock and the decontamination chamber must be on the same communications circuit.  \"Krantic.  Captain wants you.  Now!\"\t\n\t\t\n\t\tThe pirate (Krantic, you assume) bares his teeth at you like a growling dog, and stalks out of the cell.\n\t\t\n\t\tYou turn your attention to the touchpad by the pressure seal, and begin the process of assuring the computer that the emergency is over and normal pressure has been reestablished.\n\t\t*page_break\n\t\t*goto medibed\t\t\n\t#I attack the crazy pirate.\n\t\t*if (strength > 70)\n\t\t\t*set injured true\n\t\t\t*set strength %- 10\n\t\t\tThis isn't the first time you've have to take on a knife-wielding opponent.  You grab the man's right wrist, turning the knife away from you, and attempt to sweep his feet out from under him.\n\t\t\t\n\t\t\tThe pirate blocks your leg, and smashes his left fist into your jaw at the same time.  He is reacting too fast for a natural human.  He must have G-enhancements, like you.  You duck under his next swing and simultaneously force him to drop the knife, but you can't seem to land a blow yourself.\n\t\t\t\n\t\t\t\"I've never lost a fight,\" the pirate says conversationally, as the two of you grapple.  \"You?\"\n\t\t\t\n\t\t\tGao's rough voice suddenly fills the small room.  \"Krantic.  Captain wants you.  Now!\"\n\t\t\t\n\t\t\tThe pirate (Krantic, you assume) shoves you backwards hard enough to wrest his wrist from your grip and send you stumbling into the bench you woke up on.  He leaps into the hallway, and locks the door before you can reach it.  He bares his teeth at you through the window, like a growling dog, and he's gone.\n\t\t\t\n\t\t\t\"Space,\" you swear, and wish you hadn't.  Your jaw hurts.\n\t\t\t*page_break\n\t\t\t*goto medibed\n\t\t*else\n\t\t\t*set injured true\n\t\t\t*set strength %- 10\n\t\t\tYou duck your head and charge at the pirate with more rage than skill.  Your head connects with his middle, but he just laughs.  He drops his knife and hauls you upright so he can smash his fist into your jaw.  You probably would have fallen backwards from the force of the blow, but the pirate is holding you up by your shirt.\n\t\t\t\n\t\t\t\"I've never lost a fight,\" he says conversationally, as he slaps aside your feeble swings.  \"You?\"\n\t\t\t\n\t\t\t*label called\n\t\t\tGao's rough voice suddenly fills the small room.  \"Krantic.  Captain wants you.  Now!\"\n\t\t\t\n\t\t\tThe pirate (Krantic, you assume) shoves you backwards hard enough to send you sprawling across the bench you woke up on.  He leaps into the hallway, and locks the door before you can reach it.  He bares his teeth at you through the window, like a growling dog, and he's gone.\n\t\t\t\n\t\t\t\"Space,\" you swear, and wish you hadn't.  Your jaw hurts.\n\t\t\t*page_break\n\t\t\t*goto medibed\t\t\t\n\t#I dash past the crazy pirate towards the open door.\n\t\tYou don't want to stick around for the screaming, so you run towards the open door.\n\t\t\n\t\tThe pirate drops his knife and grabs you by the shirt as you speed past.  He is reacting too fast for a natural human—he must have G-enhancements.  You try to sweep his legs out from under him, but he blocks your kick and smashes his fist into your jaw.\n\t\t\n\t\t*goto called\n\t#I try to talk the crazy pirate out of torturing me.\n\t\t*set injured true\n\t\t*set strength %- 10\n\t\t\"I could be useful,\" you tell the pirate, as he runs the flat of his blade down your arm.  \"You don't have to hurt me.  I'll cooperate now.\"\n\t\t\n\t\t\"Oh, you'll be useful,\" he says conversationally.  \"First you'll be useful entertaining me.  Then the medibed will patch you up, and you'll be useful for the captain.\"\n\t\t\n\t\t\"Are you sure the captain…\" you begin, as the pirate scratches your palm with the tip of his knife.\n\n\t\t*goto called\n\t\t\n*label medibed\nYou're alone again, though Gao is due to bring you lunch in a few minutes.  You try to remember how to breathe.\n\nThere's one thing you're sure of: you don't want to be here, in your cell, when Krantic returns.  Of course there's no true escape on a starship, but if the rest of the crew is more sane, they might protect you from torture.  If you can find a terminal, you might be able to call for help—or if you can find the captain, you might get yourself under her protection before Krantic catches you alone again.\n\nBefore you plot your escape, you examine the long, deep, coffin-like medibed, considering how you can use it to your advantage.  Two metal arms hover over it, one with various scanning devices and one with a long needle.  As you look at the needle, it seems like a potential weapon.  \nYou think…\n*choice\n\t*if (injured = true) #…I'll use the medibed to heal myself, not hurt others.\n\t\tYou don't use violence to solve your problems.\n\t\t*set empathy %+15\n\t\t\n\t\tThe medibed is powered down, and doesn't respond to your touch on the control panel.\t\t\n\t\t*if (hacking >= 50)\n\n\t\t\tYou open the panel, as any maintenance tech would, and study the mechanisms beneath.  You can see where the medibed circuitry intersects with a compato-chip that enables it to send and receive information to the ship's central system.  You break that delicate connection with your thumbnail, and presto!  You have an independent medibed.  You turn on the power, and the control panel begins to respond to your touch.\n\t\t\t\n\t\t\t*gosub healing\n\t\t\t\n\t\t\tWhen your injuries are repaired, you climb out of the medibed, feeling more alert than you have since waking on this ship.\n\t\t\t\n\t\t\tWith a clear mind, you consider your options for escaping the cell, those that appeal and those that do not:\n\t\t\t*goto exit_choices\n\t\t*else\n\t\t\tYou open the panel, as any maintenance tech would, and study the mechanisms beneath.  Unfortunately, you can't make sense of what you see.  Technological savvy is not one of your talents.\n\t\t\t\n\t\t\tYou'll just have to suffer through your minor injuries.  You now consider your options for escaping the cell, those that appeal and those that do not:\n\t\t\t*goto exit_choices\n\t*if (injured = false) #…I would never use a weapon.\n\t\tInstead, you consider your options for escaping the cell, those that appeal and those that do not:\n\t\t*goto exit_choices\n\t*if (injured = true) #…I'll heal myself, then prepare to defend myself.\n\t\tThe medibed is powered down, and doesn't respond to your touch on the control panel.\n\t\t*label heal_needle\n\t\t*if (hacking >= 50)\n\n\t\t\tYou open the panel, as any maintenance tech would, and study the mechanisms beneath.  You can see where the medibed circuitry intersects with a compato-chip that enables it to send and receive information to the ship's central system.  You break that delicate connection with your thumbnail, and presto!  You have an independent medibed.  You turn on the power, and the control panel begins to respond to your touch.\n\t\t\t\n\t\t\t*gosub healing\n\t\t\t*page_break\n\t\t\tWhen your injuries are repaired, you climb out of the medibed, feeling more alert than you have since waking on this ship.\n\t\t\t\n\t\t\tIt takes you a few minutes to learn the system, but it's not difficult.  Eventually you manage to convince the medibed you need to replace the needle.  The lock releases, and a mild tug gets you the needle.\n\t\t\t*set needle true\n\t\t\t*goto gotneedle\n\t\t*else\n\t\t\tYou open the panel, as any maintenance tech would, and study the mechanisms beneath.  Unfortunately, you can't make sense of what you see.  Technological savvy is not one of your talents.\n\t\t\t\n\t\t\tYou'll just have to suffer through your minor injuries.\n\n\t\t\t*if (strength > 50)\n\t\t\t\t*goto push\n\t\t\t*else\n\t\t\t\tYou consider your options for escaping the cell, those that appeal and those that do not:\n\t\t\t\t*goto exit_choices\n\t*if (injured = false) #…I might need to defend myself.\n\t\t*set empathy %+ 5\n\t\t*label needle\n\t\tThere must be some way to replace the needle; it can't be welded in.  You give it an experimental tug, but it is, of course, firmly attached.  It won't yield to ordinary human strength—otherwise, they probably wouldn't have left it in here.  You try the medibed's control panel, but it does not respond, since the machine is powered down by command of the ship's central system.\n\t\t*choice  \n\t\t\t#Oh, well.  I can talk my way out of anything, anyway.\n\t\t\t\t*set persuasiveness %+ 15\n\t\t\t\tInstead, you consider your options for escaping the cell, those that appeal and those that do not:\n\t\t\t\t*goto exit_choices\n\t\t\t#My G-enhancements make me so strong, I'll knock that needle out.\n\t\t\t\t*set strength  %+ 15\n\t\t\t\t*label push\n\t\t\t\t*set needle true\n\t\t\t\t\n\t\t\t\tYou set your feet, flex your wrist, and set the heel of your hand against the needle.  You're going to push, with all your strength and body weight, and hope it snaps.  Ready? Push!\n\n\t\t\t\tWith a sharp crack, the needle snaps and goes spinning across the floor.  You retrieve it, careful of the two sharp ends.\n\n\t\t\t\t*label gotneedle\n\t\t\t\tNow you feel a little more prepared.  You consider your options for escaping the cell, those that appeal and those that do not:\n\t\t\t\t*goto exit_choices\n\t\t\t#I'm very good with technology.  I can get that medibed up and running.\n\t\t\t\t*set hacking  %+ 15\n\t\t\t\t*set needle true\n\t\t\t\tYou open the control panel, as any maintenance tech would, and study the mechanisms beneath.  You can see where the medibed circuitry intersects with a compato-chip that enables it to send and receive information to the ship's central system.  You break that delicate connection with your thumbnail, and presto!  You have an independent medibed.  You turn on the power, and the control panel begins to respond to your touch.\n\t\t\t\t\t\t\t\t\n\t\t\t\tIt takes you a few minutes to learn the system, but it's not difficult.  Eventually you manage to convince the medibed you need to replace the needle.  The lock releases, and a mild tug gets you the needle.\t\t\t\n\t\t\t\t*goto gotneedle\n\t*if (injured = false) #…I want to stick that needle in the neck of the first pirate I see.\n\t\t*set empathy %-15\n\t\t*set infamy %+15\n\t\t*goto needle\n\t*if (injured = true) #…I'll heal myself and stab a pirate.\n\t\t*set empathy %-15\n\t\t*set infamy %+15\n\t\t*goto heal_needle\n\t*if (injured = true) #…Forget healing, get the needle—my injuries will keep me angry.\n\t\t*set empathy %-15\n\t\t*set infamy %+15\n\t\t*goto needle\n\t\t\n*label exit_choices\n*choice\n\t#I'll hot wire the door.\n\t\t*set hacking %+ 5\n\t\t*if hacking >= 75\n\t\t\t*set door true\n\t\t\tYou pry the lid off the communications panel next to the door, and the housing around the release button.  Of course you have a bit of conduit in your pocket—you're always tinkering.  You manage to feed a burst of power into the door's circuits, and just like that, it slides open.\n\t\t\t*choice\n\t\t\t\t#I leave the cell.\n\t\t\t\t\t*set infamy %+ 20\n\t\t\t\t\t*set free_time 130\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto hallway\n\t\t\t\t#I'll wait and learn what I can from Gao, and then go.\n\t\t\t\t\tThose pirates really underestimated you, didn't they?  You close the door, and tuck the bit of conduit under the comm panel, where you can use it to open the door at a moment's notice.\n\t\t\t\t\t\n\t\t\t\t\t*goto lunch\n\t\t*else\n\t\t\tYou pry off the housing around the release button, revealing a tangle of conduit.  You consider breaking a few, but with your limited knowledge of technology, you could as easily lock yourself in permanently as let yourself out.\n\t\t\t\n\t\t\tYour only choices are to…\n\t\t\t*choice\n\t\t\t\t#…win Gao over to my side.\n\t\t\t\t\t*goto lunch\n\t\t\t\t#…attack Gao when he arrives.\n\t\t\t\t\t*set attack true\n\t\t\t\t\t*goto lunch\n\t\t\t\t#…go out the airlock, though that's insane.\n\t\t\t\t\t*goto_scene space\t\t\t\n\t#I'll go into space and across the hull to the next airlock.\n\t\t*goto_scene space\n\t#I'll make Gao my ally.\n\t\t*goto lunch\n\t#I'll attack Gao when he brings lunch.\n\t\t*set attack true\n\t\t*goto lunch\n\t\t\n*label lunch\n*if (attack = false)\n\tFinally the communications console lights up and you hear Gao's gruff voice. He orders you to stand up against the far wall before he opens the door, but at least he comes in, rather than just shoving the tray in your direction.  He places a tray with a sandwich, a metal mug, and a package of vacu-fruit on the bench.\n\t\"You've got to stay away from Krantic,\" he says, not meeting your eyes.  \"The rest of us aren't so bad.\"\n\t\n\t\"Hard to avoid him when I'm stuck in a cell,\" you say.  \"But thanks for calling when you did.\"\n\t\n\t\"Captain Zoa's the only one he'll listen to.  You remember that,\" Gao says.\n\t*page_break\n\t\"So, how did you end up here?\" you ask him, hoping to keep him talking.\n\n\tGao leans back against the medibed and folds his arms across his chest.  He's the stocky type, no weakling, but without the muscles of a true fighter.  His nose looks bent, as if it had been broken, and you wonder why he hasn't had a medibed fix it.\n\t\n\t\"Kinda like you did.  I was Dr. Chang-gong Gao Zhang then, unemployed economist, hick from a hick planet.  First time in space, and I get nabbed along with a cargo hold of vacu-tomatoes.  From Dr. Zhang to just Gao in under a centasecond.  Decided to stay on as a financial consultant.  The captain can be persuasive.  Never gives something for nothing, though.  You'd better hope she can use you somehow, ${name}.\"\n\t\n\tYou respond:\n\t*choice\n\t\t#\"I'm not sure I'd want to be used by a pirate.\"\n\t\t\t*set infamy %- 10\n\t\t\tGao shakes his head.  \"Get yourself spaced, talking like that.\"\n\t\t\t\t\t\n\t\t\tThat didn't go well.  Time for another conversational gambit.\n\t\t\t*choice\n\t\t\t\t#\"I'd like to know more about the ship.\"\n\t\t\t\t\t*label ship\n\t\t\t\t\t*set mission_info true\n\t\t\t\t\t\"The Reckless?  Ask Karlini, if you want a technical answer.  All I know is, she looks like yesterday's dinner, but she runs smooth as shineberry ale.  That's the vermite—there's nothing like it.  If the treaty with the Medusi allowed humans to sell vermite, well, it'd put a lot of repair yards out of business, for one thing.  Vermite cuts corrosion down to almost zero, besides being handy with keeping the air in.  Wouldn't be a human ship without it, if the Medusi didn't keep the price so high.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\"You sound like a vermite salesman,\" you say.\n\t\t\t\t\t\n\t\t\t\t\tGao grunts, amused.  \"Might get a chance at that, if things go our way.\"\n\t\t\t\t\t\n\t\t\t\t\t*label favor\n\t\t\t\t\tGao pushes off from the wall and starts towards the door.  He seems much more relaxed now.  You decide to…\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#…ask him to leave the door unlocked.\n\t\t\t\t\t\t\t\"Is there any way you could accidentally leave that door unlocked?  I could rip up some circuits, make it look like I hot-wired it.  Krantic will be coming back to 'play' with me some more.  And it might impress the Captain if I could escape from my cell.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if ((persuasiveness > 75) or ((persuasiveness > 50) and (infamy > 20)))\n\t\t\t\t\t\t\t\tGao snorts, but at least he pauses to think about it.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"You would owe me.  And if you told anyone, I'd chop off your thumbs and throw them out an airlock.  Got that, ${name}?\"\n\t\t\t\n\t\t\t\t\t\t\t\t\"Absolutely,\" you promise.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tAs soon as the door slides shut, you hop up and punch the release button.  It works!  You actually talked your way out of your cell. You need to see the captain before Krantic finds you, but first perhaps you can find a terminal and do some reconnaissance.\n\t\t\t\t\t\t\t\t*set gao_ally true\n\t\t\t\t\t\t\t\t*set gao_released true\n\t\t\t\t\t\t\t\t*set allies +1\n\t\t\t\t\t\t\t\t*set infamy %+ 20\n\t\t\t\t\t\t\t\t*set free_time 160\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto hallway\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*label reluctant_Gao\n\t\t\t\t\t\t\t\tGao doesn't pause.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"And what would the Captain think of me, then?\" he says, as the door slides closed.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tClearly, you are not going to be able to talk your way out of the cell.  You'll have to…\n\t\t\t\t\t\t\t\t*goto last_try\n\t\t\t\t\t\t#…ask him to let me \"overpower\" him.\n\t\t\t\t\t\t\t*if ((persuasiveness > 75) or ((persuasiveness > 50) and (infamy > 10)))\n\t\t\t\t\t\t\t\t*set gao_ally true\n\t\t\t\t\t\t\t\t*set allies +1\n\t\t\t\t\t\t\t\t*set gao_released true\n\t\t\t\t\t\t\t\tGao snorts, but at least he pauses to think about it.  \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Krantic will be back to 'play' with me some more,\" you remind him.  \"And it might impress the captain if I could escape from my cell.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"You would owe me.  And if you told anyone, I'd chop off your thumbs and throw them out an airlock.  Got that, ${name}?\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Absolutely,\" you promise.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"You'll have to hurt me, or the Captain will be suspicious.  But no broken bones, ${name}.  Nothing the medibed won't fix in under five minutes.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe comes to stand in front of you and waits for the blow.  He may be a pirate, but you're really starting to admire Gao.  You aim carefully, and give him a nice bruise across the cheekbone.  He staggers, then lifts one hand to the injury, and nods with satisfaction.\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Get out of here, then,\" he tells you.  \"I'll raise the alarm in 5 centaseconds.  And remember, you're mine.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou quickly punch the release button and head out the door.\n\t\t\t\t\t\t\t\t*set free_time 120\n\t\t\t\t\t\t\t\t*set infamy %+ 20\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto hallway\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto reluctant_Gao\n\t\t\t\t\t\t#…ask for a terminal, so I can call for help.\n\t\t\t\t\t\t\t*set level %- 5\n\t\t\t\t\t\t\t\"Will you help me send a message home, Gao?  I promise to speak for you when the Inter-Human Police ship comes.\"\n\t\t\t\t\t\t\t*set infamy %- 15\n\t\t\t\t\t\t\tGao gives you a look of utter disbelief.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Do you think I'm stupid?  The IHP don't care how you got started or who you helped.  If you've traded outside the interspecies treaties, you're a pirate, and it's life in a cell half this size.  I'd remember that, if I were you.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tHe leaves in a huff.  Clearly, you're not going to be able to talk your way out of the cell.  You'll have to… \n\t\t\t\t\t\t\t*label last_try\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#…attack Gao when he brings dinner, and hope Krantic doesn't return before then.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tEither you are lucky, or the captain has curtailed Krantic's activities, because you have no more visitors until dinner.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto attack\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (door) #…leave the cell through the hot-wired door.\n\t\t\t\t\t\t\t\t\tYou take a moment to eat, and then use your bit of conduit to let yourself out.  Hopefully, it will take the pirates a while to notice that you are gone.\n\t\t\t\t\t\t\t\t\t*set free_time 130\n\t\t\t\t\t\t\t\t\t*set infamy %+ 20\n\t\t\t\t\t\t\t\t\t*goto hallway\n\t\t\t\t\t\t\t\t#…take my chances in space.\n\t\t\t\t\t\t\t\t\t*goto_scene space\n\t\t\t\t\t\t*if (door) #…wait until he leaves, then leave through the hot-wired door.\n\t\t\t\t\t\t\tThis way, Gao won't be blamed for your escape.  You take a moment to eat, and then use your bit of conduit to let yourself out.  Hopefully, it will take the pirates a while to notice that you are gone.\n\t\t\t\t\t\t\t*set free_time 130\n\t\t\t\t\t\t\t*set gao_ally true\n\t\t\t\t\t\t\t*set allies +1\n\t\t\t\t\t\t\t*goto hallway\n\t\t\t\t#\"Can you tell me about the Captain?\"\n\t\t\t\t\t*label zoa\n\t\t\t\t\t\"She's sharp, our Captain.  Never takes a big risk for a little reward.  Never wastes a worthwhile opportunity.  Always finds a way out when a deal goes bad,\" Gao tells you.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"She sounds very reasonable,\" you say.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"She always has a reason,\" Gao replies.  \"Just don't expect her to care.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"Care?\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"About anything.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tThat's a bit unsettling.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*goto favor\n\t\t\t\t#\"Where are we heading, by the way?\"\n\t\t\t\t\t*label vermite\n\t\t\t\t\t*set mission_info true\n\t\t\t\t\t\"Somewhere no human has gone before,\" Gao says.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"Oh, no,\" you say.  \"Not an interdicted world!\"  The punishments for breaking interspecies treaties are extraordinarily severe.  The IHP (Inter-Human Police) is charged with preventing a galactic war, and its officers aren't exactly known for their compassion.  Just being aboard a ship headed into forbidden space could land you in jail.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tOne corner of Gao's mouth quirks up.  \"What's the most valuable commodity humans are not allowed to sell?\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tYou roll your eyes—you're not an economist, after all—and your gaze falls on the airlock seal.  \"Vermite?\" you hazard.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"Got it in one,\" Gao replies.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"But no one even knows where vermite comes fr—Oh,\" you say, noticing the acquisitive gleam in Gao's eyes.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*goto favor\n\t\t#\"A ship like this can always use a hacker.\"\n\t\t\t*set hacking %+ 10\n\t\t\t*set infamy %+ 5\n\t\t\t*label mention\n\t\t\tGao looks at the ceiling.  He talks tough, but he can't meet your eyes.  You're beginning to think he's embarrassed to be holding you captive.\n\t\t\t\t\t\t\n\t\t\t\"Maybe I'll mention that to the captain,\" he says.\n\t\t\t*choice\n\t\t\t\t#\"Thanks.  Tell me about her, will you?\"\n\t\t\t\t\t*goto zoa\n\t\t\t\t#\"Thanks.  Can you tell me more about the ship?\"\n\t\t\t\t\t*goto ship\n\t\t\t\t#\"Thanks.  Where are we heading, by the way?\"\n\t\t\t\t\t*goto vermite\n\t\t#\"A ship like this can always use a salesperson.\"\n\t\t\t*set persuasiveness %+ 10\n\t\t\t*set infamy %+ 5\n\t\t\t*goto mention\n\t\t#\"A ship like this can always use more muscle.\"\n\t\t\t*set strength %+ 10\n\t\t\t*set infamy %+ 5\n\t\t\t*goto mention\n*else\n\t*label attack\n\tYou position yourself by the door, ready to strike.  The centaseconds stretch as long as a Sandoval's neck as you wait.  Finally, you see Gao's rugged face and crooked nose through the door's small window.  You tense as the locking mechanism whirs, ready to…\n\t*choice\n\t\t*if (needle) #…jab the needle I've obtained into Gao's arm.\n\t\t\t*set infamy %+10\n\t\t\t*set needle false\n\t\t\tYou dart forward with more enthusiasm than aim, and stick the needle into the back of Gao's outstretched hand.  The tray and its contents clatter onto the metal floor.  Gao groans with pain and clutches at the needle, desperate to pull it out.\n\t\t\t*label bleeding\n\t\t\t*set gao_hurt true\n\t\t\tHe's clearly no fighter, and doesn't have a countermove ready.  You take advantage of his confusion to…\n\t\t\t*choice\n\t\t\t\t#…throw him to the ground and pin him there.\n\t\t\t\t\tYou throw yourself on top of Gao, pinning him face down on the floor.  He reaches around and grabs one of your legs, trying to pull you off him.  You manage to kick free, but you probably won't be able to hold him down for long—he has the bigger mass.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tLuckily, Gao is carrying some self-tightening filament—probably meant for you—on his belt.  You struggle to unhook it with one hand, while pressing Gao's face into the floor with the other.  The curls of gray plastic finally fall free.  You wrap a few loops around one hand, then the other, then the leg of the bench you woke up on.  When you snap the end of the cable, it immediately hardens and tightens, tying Gao to the bench.  You leap off the pirate's back and scuttle out of range.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tGao twists around to scowl at you.  \"You've got nowhere to go,\" he spits, pressing a hand against his bleeding wound.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"I know that,\" you say.  \"But this way, I won't be here when Krantic shows up.  And your captain will know who she's dealing with.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tYou step out of the open door and study the control panel mounted on the wall.  If you lock him in, tied where he can't reach the call button, you'll have some time before anyone sounds an alarm.  You're sure someone will come looking for him eventually, and that he won't bleed to death from such a minor wound.\n\t\t\t\t\t*set free_time 130\n\t\t\t\t\t*goto closein\n\t\t\t\t#…push past him out into the hallway.\n\t\t\t\t\t*set free_time 110\n\t\t\t\t\tAdrenaline courses through you, and you move faster than ever before.  You shoulder Gao aside, turn, and slam both hands against his back, pushing him into the cell.  Next, your fist crashes down on the control panel, closing the door.\n\t\t\t\t\t*label closein\n\t\t\t\t\tAs the door slides past the gaping pirate, you say:\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Sorry!  Nothing personal.\"\n\t\t\t\t\t\t\t*set empathy %+5\n\t\t\t\t\t\t\t*label next\n\t\t\t\t\t\t\tAnother moment with the controls, and you've locked Gao in.  He'll call for help in a second, but for this one instant, you are free!\n\t\t\t\t\t\t\t*set infamy %+20\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto hallway\n\t\t\t\t\t\t#\"Tell your captain no cell can hold me!\"\n\t\t\t\t\t\t\t*set infamy %+5\n\t\t\t\t\t\t\t*goto next\n\t\t\t\t\t\t#\"Die in space, pirate!\"\n\t\t\t\t\t\t\t*set infamy %+5\n\t\t\t\t\t\t\t*goto next\t\t\t\n\t\t*if (needle) #…stick the needle into Gao's eye.\n\t\t\t*set needle false\n\t\t\t*set empathy %-20\n\t\t\tYou lunge forwards with more rage than aim, and miss the eye, jabbing the the needle into Gao's eyebrow instead.  When it hits bone you feel the shock all the way to your elbow.  Blood spurts from the wound, and you loose your grip on the slippery needle.  Gao is groaning with pain, completely dazed.\n\t\t\t*goto bleeding\n\t\t#…grab Gao's arm and pull him off balance and into the room.\n\t\t\t*if strength > 50\n\t\t\t\t*set infamy %+10\n\t\t\t\tYou seize Gao's arm and yank with all of your strength.  The tray and its contents clatter onto the metal floor, as the pirate stumbles forward.  His arm scrapes the sharp corner of the medibed, and a bit of blood begins to well up from a red scratch.\n\t\t\t\t*goto bleeding\n\t\t\t*else\n\t\t\t\t*set strength %-10\n\t\t\t\t*set infamy %-15\n\t\t\t\tYou seize Gao's arm and yank with all of your strength.  You make him stumble a bit, but after all you've been through, you aren't strong enough to pull him off his feet.\n\t\t\t\t\n\t\t\t\t*label punched\n\t\t\t\tGao drops the tray, and as it clatters to the ground you see his fist approaching faster than you can react.  Pain explodes around your right eye, blinding you for a moment.  You barely register Gao's hands on your shoulders, shoving you back from the doorway.  You sit down hard, and your sight returns just in time to glimpse the grim set of Gao's mouth as the cell door slides closed.\n\t\t\t\t\t\t\t\t\n\t\t\t\tYou stay on the hard, cold floor for a while.  Adrenaline still prickles along your veins, like ants skittering up and down your limbs.  When the nausea has passed, you realize it's time to…\n\t\t\t\t*choice\n\t\t\t\t\t*if (door) #…leave the cell through the hot-wired door.\n\t\t\t\t\t\t*set infamy %+20\n\t\t\t\t\t\t*set free_time 130\n\t\t\t\t\t\t*goto hallway\n\t\t\t\t\t#…take my chances in space.\n\t\t\t\t\t\t*goto_scene space\n\t\t#…punch Gao square in the face.\n\t\t\t*if strength > 50\n\t\t\t\t*set infamy %+10\n\t\t\t\tYour fist slams into Gao's face. When your knuckles hit bone, you feel the shock all the way to your elbow.  Blood spurts from a cut above the pirate's eye, and the tray clatters to the metal floor.\n\t\t\t\t*goto bleeding\n\t\t\t*else\n\t\t\t\t*set strength %-10\n\t\t\t\t*set infamy %-15\n\t\t\t\tYour knuckles slam into Gao's heavy brow, but he hardly seems to feel it.\n\t\t\t\t*goto punched\n\n*label hallway\n\n*achieve escaped\nThe corridor is a tunnel of gray metal just tall enough for you to stand in, the kind of narrow space Stashies call homey and Groundsiders call claustrophobic.  You don't have time to stand around gawking, so you quickly take in the layout of this section of the ship.  On either side of your cell are two identical doors, one with a darkened window and one casting a golden glow over the floor in front of it.  Past the lit airlock, the passage ends in an oversized door clearly leading to a cargo hold.  In the other direction, the corridor bends sharply, perhaps leading into the center of the ship.\n\nYou need to see the captain before Krantic finds you, and you need information.  The cargo hold seems like your best option.  It must have a terminal, and perhaps you can perform some reconnaissance before confronting the captain.\n*page_break\nAs you pass the lit airlock, you can't help taking a quick peek in.  The window is obscured by reddish-gold steam.  Clearly, the pirates are maintaining a different atmosphere inside.  The mist stirs, and suddenly you can make out a brownish lump moving towards the door.\n\n\"I am here.  You are here,\" says a deep voice, startling you.  \n\nYou don't exactly have time to stand around and chat. But this hazy cell might make a great hiding place—if only you could trust whoever was inside.\nYou reply:\n*fake_choice\n\t#\"Are you a prisoner?\"\t\n\t#\"Can humans breathe that air?\"\n\t#\"If you tell anyone you saw me, you'll regret it.\"\n\t#\"Help!  I've been kidnapped!\"\n\"Humans bring pain.  The talking-talking-talking of ship and the silence of space.  Woe to tenders.  Humans on the ground.  Humans silent in the every-mist.  My shame!\" says the voice.\n\nYou have no idea what that means.\n\nWith a click, the airlock door pops open.  You instinctively step back as a wash of warm, thick air passes over you.  It is breathable, but smells foul.\n\nIt seems you are invited in.\n*choice\n\t#Enter the cell.\n\t\t*goto_scene mushroom\n\t#Speed to the cargo hold.\n\t\t*page_break Chapter Two: Friends or Foes\n\t\t*goto_scene cargo_bay\n\n*label healing\nInstead, you climb into the medibed.  The lid closes, and you ask for a medical report.  The needle samples your blood, the unseen scanners take images.  Words appear in bright letters against the darkened lid: \"Minor injury repair.  Four centiseconds.  Yes/No.  Trace amounts of sedative.  Sedative purged.  Ten seconds.  Yes/No.\"\n\n\"Yes and yes,\" you say, and draw in a sharp breath as one of the arms begins to spread a nano-rich paste right where it hurts.  In a second the area is numb, and the needle begins to descend again.  You close your eyes as the medibed heals you.\n*return", "chained": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*comment ñáéç…—\n*set chained true\n*temp solved false\nThe mess hall is one large pyramid, a style popular half a century ago.  The high pointed ceiling was thought to give an impression of openness, while conserving actual volume to be heated and oxygenated.  There's room in the wide open base of this mess hall for the whole crew to gather at the long table in the back or to circle round a hover.  You don't see a kitchen, but stairs lead down to a lower level, so it's probably somewhere below.\n\nAt the moment, your view of the mess hall is that of a child, or a dog, as the captain said.  From this angle, the landscape is a forest of legs: narrow table legs, like the one you are tethered to, wedge-shaped bench legs, far-off synthochair legs over by the hover, and, of course, the moving legs of the Reckless crew members as they come and go.  Most of the crew ignores you.  A few seem to think that a certain amount of kicking is an essential part of your punishment.\n\nYou distract yourself by listening to the holographic movie the off-duty crew are watching, poking your head out between the bench and tabletop to catch glimpses of the hovering visual before the awkward position strains your neck.\n*if (so = \"none\")\n\tThe movie is a ridiculously campy portrayal of the First Alien War, but watching it is better than dwelling on your own situation.\n\t*goto kidcheck\n*else\n\tThe movie is a ridiculously campy portrayal of the First Alien War.  Your ${so} would have hated it.  Your ${so} doesn't know if you are dead or alive, but there's no point in dwelling on that now.\n\t*goto kidcheck\n*label kidcheck\nThe question you keep gnawing at is: Will you try to feign loyalty to the Reckless now, if given another chance?\n*if (kids)\n\tWhat kind of example will you set for your children if you turn pirate?  But will you ever make it back to them if you don't?\n\t*goto visit\n*else\n\t*goto visit\n*label visit\n*page_break\n*if (zeeber_ally)\n\tFour kiloseconds later, Zeeber crawls under the table on all fours, looking even more like a mangy mutt than you do, with all her shaggy hair falling into her face.\n\t\t\n\t\"So, what's your plan, ${name}?\" she asks eagerly.  \"How are you going to get out of this one?\"\n\t\t\n\t\"I don't really have one,\" you tell her.  There's not much you can accomplish here under the table, with your hands encased in foam and some of the crew always in the room.\n\t\t\n\t\"Space,\" she swears companionably.  \"If you had a plan, I'd help you with it.\"\n\t\t\n\t\"Well,\" you begin, \"since you're offering…\"\n\t*choice\n\t\t#\"…I need to convince the captain to hire me.  Who would she listen to?\"\n\t\t\t*set infamy %+ 5\n\t\t\t*set persuasiveness %+ 10\n\t\t\t\"Ny-bat!  That's a great idea,\" Zeeber says.  \"Everyone listens to Ny-bat, and ${n_he} won't mind about the cargo hold or anything.  I'll go get ${n_him} for you!\"\n\t\t\t\t\t\n\t\t\tShe scuttles backwards, out from under the table.\n\t\t\t*goto nybat_conversation\t\t\t\n\t\t#\"…I need to prove my usefulness to the captain.\"\n\t\t\t*set infamy %+ 10\n\t\t\t*set persuasiveness %+ 5\n\t\t\t\"There's not much you can do under a table,\" Zeeber says.  \"Unless…hey, are you any good with viruses?\"\n\t\t\t\t\t\t\n\t\t\t\"I'm…\"\n\t\t\t*choice\n\t\t\t\t#\"…incredible.\"\n\t\t\t\t\t*label virus\n\t\t\t\t\t\"Awesome!\" Zeeber exclaims.  \"Let me go talk to Utambu, and I'll bring you something to do.\"  She scuttles backwards, out from under the table.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tZeeber returns more quickly than you hoped, and passes you a thin gray rectangle.  You whisper it on, since you don't have the use of your hands.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tZeeber navigates quickly to a closed data package.  \"We've got these IHP star charts, see?  Military star charts are the best, so they'd really be worth something if we could open them.  But they're protected by a virus that crashes the system whenever someone tries to get in.  Utambu isolated this terminal from the ship, so you can try to disable the bug if you want.  He just hasn't had time.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tYou tell her you'll work on it, and she leaves you the terminal.\n\t\t\t\t\t*goto terminal\n\t\t\t\t#\"…decent.\"\n\t\t\t\t\t*goto virus\n\t\t\t\t#\"…useless.\"\n\t\t\t\t\t\"Too bad,\" says Zeeber.  \"But if you're ready to sign up, maybe you should talk to Ny-bat.  The captain listens to ${n_him}.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tShe scuttles backwards, out from under the table.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto nybat_conversation\n\t\t*if (message = false) #\"…can you get me a terminal?\"\n\t\t\t\"I guess I could sneak one in past the cameras, under my shirt, maybe,\" Zeeber says, crawling backwards, out from under the table.\n\t\t\t\t\t\t\n\t\t\tShe returns more quickly than you hoped, and passes you a thin gray rectangle.  You whisper it on, since you don't have the use of your hands, and hope the recording devices in the mess hall are not sensitive enough to catch your whisper above the noise of the playing holo.\n\t\t\t\n\t\t\t*goto message\n\t\t#\"…I'd rather be a prisoner than a pirate.  But can you free my hands?\"\n\t\t\t\"I already thought of that,\" she says, \"But see, all they have to do is watch the video for this room, and they'll see your hands are out after I came by to chat.  It will get me in trouble, and it won't really help change Zoa's mind either.\"\n\t\t\t\t\t\t\n\t\t\t\"I'm not too interested in changing her mind,\" you say.\n\t\t\t\t\t\t\n\t\t\t\"Stubborn,\" Zeeber says, shaking her head disappointedly.  You don't think it's stubbornness motivating you; it's principled resistance.\n\t\t\t\t\t\t\n\t\t\t\"The Reckless is a great place, and we're going to be rich in a few weeks, too.  You're making a mistake,\" Zeeber says, and crawls out backwards.\n\t\t\t*page_break\n\t\t\t*goto transition\n*elseif (gao_ally)\n\tBefore long, Gao slides onto one of the long benches that run alongside the table, heaving a weary sigh.  As you are considering whether to greet him, or whether demonstrating your friendship might cast suspicion on him for your early escape, he slides a plate laden with honeyed pastry onto the bench beside him.\n\t\n\t\"I appreciate the thought,\" you say, showing him your hands sealed in foam.\n\t\n\t\"I draw the line at feeding you, ${name},\" he says in an undertone.  \"But I'm sure you'll find a way.\"  He stretches down and puts the plate on the floor under the table.\n\t\n\tAt least no one will see you eating like an animal, under here in the dark.\n\t\n\t\"That's all I can do for you, though,\" he says.  While his voice is gruff, you can hear that he'd like to do more.  \"Two escapes after talking to me would be a bit suspicious.\"\n\t\n\t\"I'm not asking you to cut my leash,\" you say, \"but…\"\n\t*choice\n\t\t#\"…I need to convince the captain to hire me.  Who would she listen to?\"\n\t\t\t*set infamy %+ 5\n\t\t\t*set persuasiveness %+ 10\n\t\t\tGao considers for a minute.  \"She might listen to Ny-bat, if ${n_he} spoke for you.  I can tell ${n_him} you want to talk to ${n_him}.  Can't promise anything, though.\"\n\t\t\t\t\n\t\t\t*page_break\n\t\t\t*goto nybat_conversation\n\t\t#\"…I need to prove my usefulness to the captain.\"\n\t\t\t*set infamy %+ 10\n\t\t\t*set persuasiveness %+5\n\t\t\t\"There's not much you can do under a table,\" Gao says.  \"Except with a terminal.  Know your way around a virus?\"\n\t\t\t\t\t\t\n\t\t\t\"I'm…\"\n\t\t\t*choice\n\t\t\t\t#\"…incredible.\"\n\t\t\t\t\t*label virus_gao\n\t\t\t\t\t\"If you say so,\" Gao says, skeptical.  \"Let me go talk to Utambu, and I'll bring you something to do.\"  He puts both hands flat on the table, and heaves himself up.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tHe returns more quickly than you hoped, and places a thin gray rectangle on the bench.  You whisper it on, since you don't have the use of your hands.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tGao navigates quickly to a closed data package.  \"We've got these IHP star charts, see?  Military star charts are superior, so they'd be worth something if we could open them.  But they're protected by a virus that crashes the system whenever someone tries to get in.  Utambu isolated this terminal from the ship, so you can try to disable the security if you want.  He hasn't had time.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tYou tell Gao you'll work on it, and he leaves you the terminal.\n\t\t\t\t\t*goto terminal\n\t\t\t\t#\"…decent.\"\n\t\t\t\t\t*goto virus_gao\n\t\t\t\t#\"…useless.\"\n\t\t\t\t\t\"Too bad,\" says Gao.  \"If you're ready to sign up, maybe you should talk to Ny-bat.  I'll send ${n_him} in.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tHe puts both hands flat on the table, and heaves himself up.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto nybat_conversation\t\t\n\t\t#\"…I'd be a lot more comfortable with my hands free.\"\n\t\t\t\"Sorry,\" Gao says.  \"They'd know it was me.  You'll have to wait 'til the captain gives the order.\"\n\t\t\t\t\t\t\n\t\t\tHe pushes back from the table, and in a moment you're alone again.\n\t\t\t*page_break\n\t\t\t*goto nybat_conversation\n*else\n\t*goto nybat_conversation\n\n*label nybat_conversation\nYou are dozing lightly, your back against a table leg and your foamed hands resting on your knees, when the bench in front of you is lifted out of the way.  You shake yourself fully awake, and watch as Ny-bat folds ${n_his} lanky form and takes a seat on the floor, facing you.  You haven't seen that many low-G Syndromes passing through your home station; they mostly stay on their own planets, possibly because of the prejudice they encounter everywhere else.  The elongation caused by birth and growth in a low-G environment extends even to the face.  As a result, something is inherently odd about Ny-bat's features, a kind of monstrous elegance that will take some getting used to.\n\n\"It is difficult to be a stranger in a new place,\" Ny-bat says.\n\n\"And you would know?\" you ask.\n*page_break\n\"When I first went to space, four of my shipmates broke both of my legs testing to see if LGS bones were especially brittle.  Four is not so many, but they had electric whips.\"  Ny-bat tells the story calmly, with no hint of self-pity.\n\n\"Let me guess: Krantic?\" you ask.\n\n\"No, no,\" Ny-bat says with a half-smile.  \"Zoa and I can handle Krantic.  That was another ship, a less civilized ship.\"\n\n\"Kidnapping is not particularly civilized,\" you say. \n\n\"We have our little lapses,\" Ny-bat admits.\n*if (solved)\n\t\"Given your work with the IHP star charts, I think I can convince the captain to give you a chance, ${name}.  If she agrees, I'll send Utambu to fetch you.\"\n\t*label release\n\t*page_break\n\t*set crew true\n\t*achieve crewmember\n\tUtambu comes within a kilosecond, and sprays your foamed hands with the dissolving agent.  He chatters amiably as he disengages your tether and then leads you through the ship.  He's relentlessly cheerful, brimming with nervous smiles.  You learn that he is the foremost tech specialist on the Reckless, that he started out at a quarter of a percent five rotations ago.  He's also a Shipper, born and bred among the stars.  You know better than to judge people on their origin, but that doesn't stop the childhood rhyme from running through your head: Groundsiders hazy, Stashies lazy, Shippers crazy.\n\n\t\"There's only a few real rough ones in the crew,\" Utambu tells you.  \"Vikola, Hammer, Krantic.  The captain doesn't let things get too out of hand.  Just try to stay out of Krantic's way.\"\n\n\t\"How many on the Reckless?\" you ask.\n\n\t\"Twenty-one.  No, twenty-two now, with you,\" Utambu answers.  \"Let's get some food, next.\"\n\t*page_break\n\tYou arrive at your room, a little gray box with a bed, an easy chair, a toilet, and yes, a sink.  There's no window or shower, but you've traveled on enough cramped ships to know that a private room with dedicated facilities is something to be thankful for.  Your own room, back on the station, had wall-to-wall hovers and ivy on the ceiling for carbon exchange.  But it's no use thinking of that now.\n\n\tUtambu hovers by the door, almost as if he's afraid of you.  Is he right?  Are you just pretending to be on his side?\n\t*choice\n\t\t#I'm a pirate now, through and through.\n\t\t\t*set infamy %+10\n\t\t\t*goto_scene hazing\n\t\t#I'm keeping an open mind.\n\t\t\t*set persuasiveness %+ 5\n\t\t\t*goto_scene hazing\n\t\t#I'm only loyal to myself.\n\t\t\t*set empathy %- 5\n\t\t\t*goto_scene hazing\n\t\t#I'm waiting for a chance to escape and go home.\n\t\t\t*set persuasiveness %+ 5\n\t\t\t*set empathy %+ 10\n\t\t\t*goto_scene hazing\n*else\t\n\t\"I think you could be useful here, and content, ${name}.  And there is one way you might convince the captain you are ready to join us.  You could agree to question our alien prisoner.  Since you were not one of its captors, it might be willing to talk to you.\"\n\t*choice\n\t\t#I agree.\n\t\t\t\"I'll tell Zoa you agree, and she'll send someone to release you.  I'll do everything I can to help you adjust,\" ${n_he} says, leaving to report your decision to the captain.  \n\t\t\t*set infamy %+ 10\n\t\t\t*set nybat_ally true\n\t\t\t*set allies + 1\n\t\t\t*goto release\n\t\t#I'll talk to it, but I won't torture it.\n\t\t\t*set empathy %+ 10\n\t\t\t*set infamy %+ 10\n\t\t\t\"I respect your adherence to your principles,\" Ny-bat says.  $!{n_he} leaves to report your decision to the captain.\n\t\t\t*if (nybat_ally)\n\t\t\t\t*goto release\n\t\t\t*else\n\t\t\t\t*set nybat_ally true\n\t\t\t\t*set allies +1\n\t\t\t\t*goto release\n\t\t#I refuse.\n\t\t\t*set empathy %+ 10\n\t\t\t*set strength %+ 15\n\t\t\t\"I respect your adherence to your principles,\" Ny-bat says.  \"But if you will not help us, you must remain a prisoner.\"\n\t\t\t\n\t\t\t*label transition\n\t\t\tAt dinner time, Zoa finally allows Ny-bat to spray your foamed hands with a dissolving agent.  You are permitted to eat at the table, rather than under it.  Zoa decrees that you must be watched and guarded at all times, and therefore must accompany your guard about his or her duties, rather than remain alone in a cell.  You are determined to endure your captivity with dignity; there is nothing more to be gained by running from one deck to another on a ship in space.\n\t\t\t\n\t\t\tKrantic has been ordered not to touch you, so you are safe from physical harm at the moment, and though you resent the lack of privacy, your situation is not unbearable.\n\t\t\t*page_break\n\t\t\t*goto_scene prisoner\n\n*label message\nNothing is as important as contacting Dekara Station, and getting a message to the Inter-Human Police.  You quickly find the ship's communication protocols.  You record a short message explaining your situation, and attach course data from the Reckless' own navigational computer.\n\nSending the recorded message back towards your home station will be easy…but, of course, it will make Zoa extremely, extremely angry, eliminating any chance you may have of earning a place on the crew.  You decide to think for a minute before committing yourself.  On the one hand, this may be your only chance to call for outside help.  On the other hand, if you've been a bit troublesome in the past, the station government may choose not to believe your plea, and you may anger the pirates for nothing.  On the third hand, there may be opportunities here on the Reckless you don't want to miss by making yourself a snitch.\n\nYou take a moment to sort this all out, and then you decide…\n*choice\n\t#…to send the message now.  I'm prepared to remain a prisoner.\n\t\t*set message true\n\t\t*achieve call\n\t\t*set infamy %- 25\n\t\tYou send your recording flying out into the universe.\n\t\t*page_break\n\t\t*goto transition\n\t#…to hide the message in the next signal the Reckless sends.\n\t\tYou have absolute confidence in your ability as a hacker, and know this is within your abilities.\t\t\n\t\t*set hacking %+ 5\n\t\t*achieve call\n\t\t*set message true\n\t\t*if (hacking >= 75)\n\t\t\tIt takes a while, but you manage to disguise your message.  The Reckless crew will never know you sent it, and your reputation on the ship won't be compromised.\n\t\t\t\n\t\t\t*goto nybat_conversation\n\t\t*else\n\t\t\t*set message false\n\t\t\t*set level %-5\n\t\t\t*set infamy %- 20\n\t\t\tYou activate your program, thinking you've disguised its origins, but a minute later your terminal is forcibly disconnected from the ship's computer.  The crew know where you are and what you've tried to do; you've angered them and failed to send the message.\n\t\t\t*page_break\n\t\t\t*goto transition\n\t#…to delete the message.\n\t\t*set level %+ 5\n\t\tYou'll survive on your own, without the help of the IHP.\n\t\t\n\t\t*goto nybat_conversation\n*label terminal\n*if (message = false)\n\tThe question is, are you going to try to hack the data package, or are you going to use this opportunity to try to call for rescue?\n\t*choice\n\t\t#I'll impress the captain by solving the problem.\n\t\t\t*gosub work\n\t\t\t\n\t\t\tYou shout for someone to ferry the terminal to Utambu, and settle down to wait for the captain to hear of your achievement.\n\t\t\t\n\t\t\t*goto nybat_conversation\n\t\t#I'll call for help.\n\t\t\t*goto message\n\t\t#I'll do both.\n\t\t\t\t*gosub work\n\t\t\t\t\n\t\t\t\tNext you focus on reconnecting your terminal to the ship, so that you can call for help.\n\n\t\t\t\t*goto message\n*else\n\t*gosub work\n\t*page_break\n\t*goto nybat_conversation\n*label work\nYou study the code protecting the star charts, and set up a simulation area, so you don't have to wait for the terminal to reboot every time you fail.  There must be a way to gain access, since the star charts are meant to be used by IHP personnel.  You just have to figure out how an IHP computer verifies its authority and disables the virus.\n\t\t\t\n*if (hacking >= 60)\n\t*set infamy %+ 15\n\t*set hacking %+ 10\n\t*set solved true\n\tThere is probably a simple and elegant solution to the problem, but you just can't see it.  So, you take the brute force approach, writing programs to probe the code for you.  It takes kiloseconds, but you learn how to shut off the virus and access the star charts.\n\t*page_break\n\t*return\n*else\n\t*set infamy %+ 5\n\tThere is probably a simple and elegant solution to the problem, but you just can't see it.  You try a few brute-force methods, but none of them are successful.  Hopefully, Zoa will appreciate the fact that you tried.\n\t*page_break\n\t*return\n", "choicescript_description": "You have a choice: join a crew of space pirates to steal priceless slime from a nest of mushroom-like aliens--or hoodwink the pirates and team up with the mushroom colony to prevent an interstellar war!\n\n\"Reckless Space Pirates\" is a thrilling interactive science-fiction novel by Rachel Zakuta where your choices control the story. The game is entirely text-based--without graphics or sound effects--and powered by the vast, unstoppable power of your imagination.\n\nWill you survive the infamous space-slime pits? Will you earn the respect of the crew, or even start a romance with a space pirate? Can you negotiate with the fungoid aliens, despite linguistic and cultural barriers? Or will you blast their rubbery guts, plunder the slime pits, and retire in luxury?\n", "choicescript_stats": "${name}'s Current State:\n\n*temp allies \"None\"\n*temp comma false\n*if nybat_ally\n\t*set allies \"Ny-bat\"\n\t*set comma true\n*if gao_ally\n\t*if allies = \"None\"\n\t\t*set allies \"\"\n\t*if comma\n\t\t*set allies &\", \"\n\t*set allies &\"Gao\"\n\t*set comma true\n*if utambu_ally\n\t*if allies = \"None\"\n\t\t*set allies \"\"\n\t*if comma\n\t\t*set allies &\", \"\n\t*set allies &\"Utambu\"\n\t*set comma true\n*if zeeber_ally\n\t*if allies = \"None\"\n\t\t*set allies \"\"\n\t*if comma\n\t\t*set allies &\", \"\n\t*set allies &\"Zeeber\"\n\t*set comma true\n*temp station_text\n*if (stationrep)\n\t*set station_text \"Good\"\n\t*goto aliens\n*else\n\t*set station_text \"Bad\"\n\t*goto aliens\n*label aliens\n*temp alienallies_text\n*if ((mushroom_ally = true) and (leader_ally = true))\n\t*set alienallies_text \"The Mushroom, Medusi Leader\"\n\t*goto chart\n*elseif (mushroom_ally = true)\n\t*set alienallies_text \"The Mushroom\"\n\t*goto chart\n*elseif (leader_ally = true)\n\t*set alienallies_text \"The Medusi Leader\"\n\t*goto chart\n*else\n\t*set alienallies_text \"?\"\n\n*label chart\n*stat_chart\n\tpercent Strength\n[i]Your physical prowess[/i]\n*stat_chart\n\tpercent Hacking\n[i]Your facility with technology[/i]\n*stat_chart\n\tpercent persuasiveness Persuasion\n[i]Your ability to convince or deceive[/i]\n*stat_chart\n\tpercent Empathy\n[i]Your compassion and reputation among the aliens[/i]\n*stat_chart\n\tpercent Infamy\n[i]Your reputation among the pirates[/i]\n*stat_chart\n\tpercent level Intelligence\n\ttext allies Allies\n\ttext station_text Station Reputation\n[i]Likelihood of help from home[/i]\n*if (arrived = true)\n\t*stat_chart\n\t\ttext alienallies_text Alien Allies\n\t\ttext leader Commander of the Ground Team\n\t\ttext crew_strength Ground Team\n\t[i]Active members of the Reckless delegation[/i]\n\t*stat_chart\n\t\ttext medusi_strength Medusi\n\t[i]Active Medusi tenders[/i]\n\t*goto lev\n*label lev\n*if (leveled = true)\n\t*stat_chart\n\t\ttext level_text Level\n\t[i]A Medusi measurement of intelligence[/i]\n*if (p_end)\n\t*stat_chart\n\t\ttext ship_name Ship\n\t\ttext position Position\n*finish\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game, including the thrilling conclusion!\n\n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n", "crew_camp": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*comment ñáéç…—\n*temp ex false\n*temp calm false\n\nYou step out of the jungle onto the narrow ring of barren rock circling the volcano.  The ground beneath your feet is a smooth swirl of black basalt, cooled lava that still remembers its liquid past.  At the base of the volcano, beside the grim black maw of a cave entrance, is the Medusi camp.\n\nThe Medusi structures are open-sided, mere poles and distressingly high canvas ceilings.  A half dozen of these huge tents are littered with unidentifiable equipment.  The seventh holds about twenty Medusi, all waving their limbs wildly.  Perhaps they are arguing; you can't hear their electrical language, but you see sparks jump out from the worms on top of their hoods, conducted by the super-saturated air.  Your colored goggles give these mini-lightning bolts a blue tinge.  The Medusi seem to absorb these shocks with no problem at all, but you're not sure a human body could handle that much electricity.\n\nKrantic marches the crew right to the cluster of Medusi, stopping a scant five meters short.  Medusi are so much bigger than humans, you feel like a Zeekie caught by a Joodar gang.\n*page_break\nOne of the Medusi steps forward, the leader, you suppose.  You can't read its body language, but you can see that Krantic is vibrating with excitement, just waiting for an excuse to start shooting.  Even the more rational humans are teetering on the edge of violence.  They hold their weapons ready, and you can see the tension in the hunched shoulders, the fear in the white-knuckled grips.\n\n\"Unauthorized aliens must explain knowledge of this location,\" the alien says, his translated voice echoing across sixteen speech boxes.\n\nKrantic steps forward, though not so far forward as to put himself within the Medusa's reach.  \"We traveled with one of your diplomats.  We want vermite.  We'll pay.  When we reach an agreement, your diplomat will go free.\"\n\n\"No!  Impossibility…\" booms a deep voice.  A scuffle ensues in the Medusi tent, as one alien attempts to surge forward, while others hold it back with a tangle of limbs.\n\nThe leader turns, with his hood sucked in tight and all his limbs pointing straight down to the ground.  Its posture is clearly a resolute response to its follower's wild flailing.  \"I authority here!  I of Third Level, and this my sphere!\" it says with determination.\n\nA restless peace returns to the Medusi's tent.  \n\n\"Forgive dissension.  Creature of the First Level,\" says the Medusi leader. \"Levelers decree vermite sale only to trading conglomerate.\"\n\n\"Space the Levelers, whoever the hell they are,\" says Krantic.\n\nThere is a stir among the Medusi, and the electrical discharge makes the hairs on your arm stand up.  The humans shift nervously and grip their weapons tighter in response.\n\nYou take a deep breath of the swampy air, and settle your goggles more firmly on your face.  It's time for you to jump in and…\n*choice\n\t#…blame the speech box for a mistranslation.\n\t\t*set level %+ 5\n\t\t\"Technology imperfection expected.  Explanation previous remark?\" demands the Medusi leader.\n\n\t\t*label small\n\t\t\"We'll take small shipments.  The Levelers will never know,\" says Krantic.\n\t\t\n\t\t*goto leader_choice\t\t\n\t#…apologize for any insult.\n\t\t*set persuasiveness %+ 5\n\t\t*set empathy %+ 5\n\t\t\n\t\t\"Cultural misunderstandings expected,\" the Medusi leader says, accepting your apology.\n\n\t\t*goto small\t\t\t\n\t#…redirect the conversation towards the benefits of trade.\n\t\t*set persuasiveness %+ 5\n\t\t\n\t\t\"Tender payment often insufficient,\" says the leader in agreement.\n\n\n\t\t*goto small\n\t#…tell the pirates to calm down.\n\t\t\"Seal it, Stashie,\" snaps Krantic.\n\t\t\n\t\tHe turns back to the Medusi leader.\n\t\t*goto small\t\t\n\n*label leader_choice\n\"Inferior intellects difficulty trickery Levelers,\" says the Medusa leader.\n\n\"Space take you, for an inferior intellect,\" yells Krantic.\n\nPerhaps someone other than Krantic should be conducting these negotiations—someone more diplomatic.  You suggest…\n*choice\n\t#…Gao.\n\t\t*set infamy %+ 15\n\t\t*label gaoleader\n\t\t*set leader \"Gao\"\t\t\t\n\t\t\"The captain is eager for a peaceful solution,\" says Ny-bat.  $!{n_he} is so tall that everyone, Krantic included, has to tilt back in order to look ${n_him} in the face.  \"And Gao is our financial adviser.  It is reasonable for him to negotiate a purchase.\"\n\t\t\t\t\t\t\n\t\tGao clears his throat.  \"I suppose I was the one who thought of the vermite run in the first place,\" he says.\n\t\t\t\t\t\t\n\t\t\"I am in command!\" shouts Krantic, wildly swinging his weapon from Ny-bat to Gao and back again.\n\t\t\t\t\t\n\t\t\"You are,\" agrees Ny-bat mildly, as ${n_he} puts ${n_his} hand on Krantic's weapon and gently but inexorably forces it down.  $!{n_he} keeps ${n_his} eyes fixed on Krantic's all the while.  Krantic looks away first.\n\t\t\t\t\t\n\t\t\"We'll follow Gao's lead,\" says Ny-bat.\n\t\t\t\t\t\t\n\t\tYou breathe a sigh of relief.\n\t\t*page_break\n\t\t*goto negotiations\n\t#…Zeeber.\n\t\t*set infamy %- 10\n\t\t*set level %- 5\n\t\t*if (zeeber_ally = false)\n\t\t\t\"Why are you trying to get me in trouble?\" hisses Zeeber, inching farther away from Krantic.\n\t\t\t\t\t\t\n\t\t\t\"I wasn't,\" you protest.  You were simply nominating someone who would let you control the conversation.\n\t\t\t\t\t\t\n\t\t\t\"Perhaps someone more experienced should serve as go-between,\" suggests Ny-bat.  $!{n_he} is so tall that everyone, Krantic included, has to tilt back in order to look ${n_him} in the face.\n\t\t\t*goto nybat\n\t\t*else\n\t\t\t\"I can negotiate!  I've seen Zoa do it lots!\" says Zeeber, hopping out from among the pirates.\n\t\t\t\t\t\t\t\n\t\t\t\"Get back!\" shouts Krantic, gesturing with his gun.\n\t\t\t\t\t\t\t\n\t\t\tZeeber bites her lip and retreats.  There is muttering among the pirates—they didn't like your choice.\n\t\t\t\t\t\t\t\t\n\t\t\t\"You need someone who understands the economics,\" mutters Gao.\n\t\t\t\t\t\t\t\t\n\t\t\t*goto nybatstart\n\t#…Ny-bat.\n\t\t*set infamy %+ 10\n\t\t*set level %+ 5\n\t\t*label nybatstart\t\n\t\t\"I will serve as go-between,\" Ny-bat says calmly.  $!{n_he} is so tall that everyone, Krantic included, has to tilt back in order to look ${n_him} in the face.\n\t\t*label nybat\n\t\t\t\n\t\t\"The captain…\" Krantic says.\n\t\t\t\t\t\n\t\t\"The captain is eager for a peaceful solution,\" says Ny-bat.\n\t\t\t\t\t\n\t\tGao clears his throat.  \"We all know the captain trusts Ny-bat.\"\n\t\t\t\t\t\n\t\t\"I am in command!\" shouts Krantic, wildly swinging his weapon from Ny-bat to Gao and back again.\n\t\t\t\t\t\n\t\t\"You are,\" agrees Ny-bat mildly, as ${n_he} puts ${n_his} hand on Krantic's weapon and gently but inexorably forces it down.  $!{n_he} keeps ${n_his} eyes fixed on Krantic's all the while.  Krantic looks away first.\n\t\t\t\t\t\n\t\tYou breathe a sigh of relief.\n\t\t*set leader \"Ny-bat\"\n\t\t*if n_he = \"she\"\n\t\t\t*set l_he \"she\"\n\t\t\t*set l_his \"her\"\n\t\t\t*set l_him \"her\"\n\t\t\t*goto negotiations\n\t\t*else \n\t\t\t*goto negotiations\t \n\t#…Utambu.\n\t\t*set infamy %- 10\t\n\t\t\"You're sure?  I mean, me?\" asks Utambu uncertainly.\n\t\t\t\t\t\t\n\t\tThe pirates are muttering—they don't like your choice.  \n\t\t*label second_try\n\t\tYou hear Ny-bat's name several times, and \"Gao knows the market,\" from someone in the back.\t\t\t\n\t\t\n\t\t\"Seal it, all of you!\" shouts Krantic uselessly.\n\t\t\t\t\t\t\n\t\t*if (infamy > 45)\n\t\t\tYou still have some influence with the Reckless crew, so you use it to support:\n\t\t\t*choice\n\t\t\t\t#Gao\n\t\t\t\t\t\"Gao knows the most about vermite, so he should negotiate,\" you say.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"They'll talk to me!\" Krantic insists.\n\t\t\t\t\t\n\t\t\t\t\t*goto gaoleader\n\t\t\t\t#Nybat\n\t\t\t\t\t\"Ny-bat has the captain's trust, so ${n_he} should negotiate,\" you say.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"They'll talk to me!\" Krantic insists.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*goto nybatstart\n\t\t*else\n\t\t\t*page_break\n\t\t\tThe crew doesn't care for your opinion, so you let them sort it out.\n\t\t\t\t\t\t\t\t\n\t\t\t*goto nybatstart\n\t#…myself.\n\t\t*if ((infamy >= 70) or (allies >= 3))\n\t\t\t*set leader \"you\"\n\t\t\t*set infamy %+ 20\n\t\t\t*set level %+ 10\n\t\t\t*achieve leader\n\t\t\t\"You!\"  Krantic grits his teeth, too enraged to elaborate.\n\t\t\t\t\t\t\t\t\n\t\t\t*if (nybat_ally)\n\t\t\t\t*label nybat_supports\n\t\t\t\t\"${name} is a reasonable choice,\" says Ny-bat.  Heads nod in agreement.\n\t\t\t\t*label argue \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\"The Captain…\" Krantic says.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\"The captain is eager for a peaceful solution,\" says Ny-bat.  $!{n_he} is so tall that everyone, Krantic included, has to tilt back in order to look ${n_him} in the face.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tYou clear your throat.  \"I only want to get us some vermite without making any enemies, so we can come back for more,\" you say.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\"I am in command!\" shouts Krantic, wildly swinging his weapon from Ny-bat to you and back again.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\"You are,\" agrees Ny-bat mildly, as ${n_he} puts ${n_his} hand on Krantic's weapon and gently but inexorably forces it down.  $!{n_he} keeps ${n_his} eyes fixed on Krantic's all the while.  Krantic looks away first.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\"We'll follow ${name}'s lead,\" says Ny-bat.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tYou breathe a sigh of relief.\n\t\t\t\t*page_break\n\t\t\t\t*goto negotiations\n\t\t\t*elseif (gao_ally)\n\t\t\t\t\"The Stashie understands the economics,\" says Gao.  Heads nod in agreement.\n\t\t\t\t*goto argue\n\t\t\t*elseif (utambu_ally)\n\t\t\t\t\"The Stashie had no part in taking The Mushroom prisoner—that's good, don't you think?\" asks Utambu.  Heads nod in agreement.\n\t\t\t\t*goto argue\n\t\t\t*elseif (zeeber_ally)\n\t\t\t\t\"${name} will be great at making nice!\" says Zeeber enthusiastically.  Eyes roll, but at least someone spoke up for you.\n\t\t\t\t*goto argue\n\t\t\t*else\n\t\t\t\t*goto nybat_supports\n\t\t*else\n\t\t\t\"Space, kid, are you trying to get yourself killed?\" Gao asks.\n\t\t\t\n\t\t\tThe pirates are muttering—none of them liked your choice.\n\t\t\t*goto second_try\n\t#…no one.  I'll wait to see if Krantic succeeds.\n\t\t*goto negotiations\n\n*label negotiations\n\"Inadequate translation of previous remark!\" the Medusa leader bellows.\n*if (leader = \"Krantic\")\n\n\tKrantic ignores its protest.  \"How much vermite can we take now?\" he asks.\n\n\t\"None,\" says the Medusa.  \"Vermite yet immaturity.  Commencement of business transaction possible in point two rotations.\"\n\t\t\n\tKrantic raises his weapon.\n\t*goto disintigration\t\n*elseif ((leader = \"Gao\") or (leader = \"Ny-bat\"))\n\n\t\"Just an internal matter,\" says ${leader}, stepping forwards.  \"As for the vermite, we can offer you much more than Spider pays.  How much could you spare for a first shipment?\"\n\t\n\tYou see that Krantric is seething, jaw clenched tight.  You hope ${leader} will be able to contain his next outburst.\n\t\n\t\"None,\" says the Medusa.  \"Vermite yet immaturity.  Commencement of business transaction possible in point two rotations.\"\n\t\t\n\t\"Our captain will not like leaving empty-handed,\" says ${leader} steadily.  \"If we could—\"\n\t\t\n\tKrantic surges forward, pushing ${leader} aside and raising his weapon.\n\t*goto disintigration\n*else\n\n\t\"Just an internal matter,\" you say, stepping forward.  \"As for the vermite, we can offer you much more than Spider pays.  How much could you spare for a first shipment?\"\n\t\t\n\t\"None,\" says the Medusa.  \"Vermite yet immaturity.  Ship must return in point one rotations for first shipment.\"\n\t\n\t\"Our captain will not like leaving empty-handed,\" you say steadily.  \"If we could—\"\n\t\t\n\tKrantic surges forward, pushing you aside and raising his weapon.\n\t*goto disintigration\n\n*label disintigration\n\"I'm no gullible Groundsider,\" he growls.  \"We leave with vermite today, one way or another.  It can 'mature' in our hold.\" \n\nThe Medusi in the tent erupt into motion, waving their limbs frantically.  Blue sparks shoot out from the worms on top of their hoods.\n*page_break\n\"No!\" bellows the leader.  \"Alien cruelty!  Younglings in solitude without instruction?  Heartlessness!\"\n\nIs it talking about vermite, the organic tech that seals starships?  You knew it was alive, in a micro-organism kind of way, but the way the Medusa talks about it…\n\nBut you don't have time to reflect further on the nature of vermite.  \n\n\"Lies!  Excuses!\" Krantic is yelling.\n\n\"Monsters!  Torturers!\" the leader yells back.  A miniature lightning bolt streaks from one end of the worms on top of its hood, striking the long-faced pirate standing next to Krantic.  The woman falls to the ground, convulsing.\n\nKrantic's face is a terrifying marriage of rage and glee.  \"They are attacking!  Kill them!\" he shouts, shooting at the Medusa leader.  The alien slumps, thick yellow mucus oozing from a hole in his hood.\n*set medusi_strength -1\n*choice\n\t#I shoot at the Medusi in the tent.\n\t\t*set infamy %+ 20\n\t\t*set empathy %-30\n\t\tThe Medusi are easy targets, all clustered together in panic, waving their limbs and shooting sparks from the worms on top of their hoods.\n\t\t*if (leader = \"Krantic\")\n\t\t\t*set medusi_strength -2\n\t\t\tSome, though not all, of the other pirates are following Krantic's order and shooting.  You see two more Medusi stagger to the ground before the aliens begin to flee towards the cave, dragging their wounded, their massive bodies oddly nimble as they run.\n\t\t\t*goto gun_state\n\t\t*elseif ((leader = \"Gao\") or (leader = \"Ny-bat\"))\n\t\t\tNone of the other pirates are shooting—they're waiting for ${leader}'s orders, you suppose—but that doesn't stop you.  The Medusi are beginning to flee towards the cave, dragging their wounded, their massive bodies oddly nimble as they run.\n\t\t\t*goto gun_state\n\t\t*else\n\t\t\t*set medusi_strength -2\n\t\t\tNone of the other pirates are shooting—you suppose they are waiting for your decision, now that you've assumed leadership.\t\t\t\n\t\t\t\t\t\t\n\t\t\t\"Shoot at will,\" you tell them.  Most of the pirates raise their weapons at your command, but not Ny-bat, you notice.\n\t\t\t*if (nybat_rom > 1)\n\t\t\t\t$!{n_he} is staring at you in shock, and possibly disappointment.\n\t\t\t\t*goto reaction\n\t\t\t*else\n\t\t\t\t*label reaction\n\t\t\t\tYou file that observation away for the moment; the Medusi are beginning to flee towards the cave, their massive bodies oddly nimble as they run.  They drag three wounded Medusi with them.\n\t\t\t\t*label gun_state\n\t\t\t\t\t\t\n\t\t\t\t*if (gun = true)\n\t\t\t\t\t*set medusi_strength -1\n\t\t\t\t\tYou raise Vikola's gun and press the archaic mechanical trigger.  The sharp report rings in your ears, and another Medusi topples over.  You keep firing, but the aliens are getting out of range, disappearing into the darkness of the cave.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*if (leader = \"Krantic\")\n\t\t\t\t\t\t*label krantics_plan\n\t\t\t\t\t\t\"We'll follow.  Leave two alive to show us the vermite.  Kill the rest,\" Krantic commands.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*gosub lose_nybat\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label kleader_exit\n\t\t\t\t\t\tThe pirate who was struck by the bolt of electricity is beginning to recover; Krantic leaves her in charge of updating the captain.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tYou and the rest of the pirates set out at a run for the cave the Medusi fled to, feet pounding across the black rock.\n\t\t\t\t\t\t*gosub affection\n\t\t\t\t\t\tYour breath catches in your throat; the soupy air isn't conducive to exertion.  Soon the jagged roof of the cave looms over you like a monstrous black overbite.\n\t\t\t\t\t\t*set crew true\n\t\t\t\t\t\t*page_break Chapter Five: Into the Dark\n\t\t\t\t\t\t*goto_scene crew_cave\n\t\t\t\t\t*elseif ((leader = \"Gao\") or (leader = \"Ny-bat\"))\n\t\t\t\t\t\t\"Do not fire!\" shouts ${leader}.  \"Don't you remember that the Medusi communicate through electrical discharge?  That spark was accidental.  If we explain the misunderstanding, we may be able to salvage the mission.  Especially if we don't have Krantic with us.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t${leader} turns the gun on Krantic, and many of the other pirates follow suit.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*gosub lose_nybat\n\n\t\t\t\t\t\t*label group_exit\n\t\t\t\t\t\tThe pirate who was struck by the bolt of electricity is beginning to recover; ${leader} leaves her in charge of monitoring Krantic (now restrained with foam) and updating the captain.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tYou and the rest of the pirates set out at a run for the cave, feet pounding across the black rock.\n\t\t\t\t\t\t*gosub affection\n\t\t\t\t\t\tYour thick breaths catch in your throat; the soupy air isn't conducive to exertion.  Soon the jagged roof of the cave looms over you like a monstrous black overbite.\n\t\t\t\t\t\t*set crew true\n\t\t\t\t\t\t*page_break Chapter Five: Into the Dark\n\t\t\t\t\t\t*goto_scene crew_cave\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto youlead_exit\n\t\t\t\t*else\n\t\t\t\t\tYou raise your gun and press the archaic mechanical trigger.  Nothing happens.  All the indicator lights are green, but the weapon won't fire.  The pirates gave you a dud, in case you turned on them.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tKrantic laughs wildly.  \"You think we would give you a working weapon?\" he asks.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tYou grit your teeth and shove your humiliation aside.  \"Give me one now, and I'll shoot some aliens for you,\" you tell \n\t\t\t\t\t*if (leader != \"you\")\n\t\t\t\t\t\t${leader}.\n\t\t\t\t\t\t*goto next_line\n\t\t\t\t\t*else\n\t\t\t\t\t\tKrantic.\n\t\t\t\t\t\t*label next_line\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*if ((infamy > 50) and (leader = \"Krantic\"))\n\t\t\t\t\t\t\t*set gun true\n\t\t\t\t\t\t\t\"Space yourself,\" Krantic says, but he nods to Utambu, and the engineer tosses you another weapon.  The Medusi are out of range now, disappearing into the darkness of the cave, but you're sure you'll get another chance to use it.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto krantics_plan\n\t\t\t\t\t\t*elseif (leader = \"Krantic\")\n\t\t\t\t\t\t\t\"Space yourself,\" says Krantic.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*gosub lose_nybat\n\t\t\t\t\t\t\t*goto kleader_exit\n\t\t\t\t\t\t*elseif ((leader = \"Gao\") or (leader = \"Ny-bat\"))\n\t\t\t\t\t\t\t\"Not yet,\" says ${leader}.  In any case, the Medusi are out of range now, disappearing into the darkness of the cave.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*gosub lose_nybat\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto group_exit\t\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*set gun true\n\t\t\t\t\t\t\t\"Space yourself,\" Krantic says, but Utambu tosses you another weapon.  The Medusi are out of range now, disappearing into the darkness of the cave, but you're sure you'll get another chance to use it.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*gosub lose_nybat\n\t\t\t\t\t\t\t*goto youlead_exit\t\t\t\t\t\n\t#\"Hold your fire!  They are shouting, not shooting!\"\n\t\t*set persuasiveness %+ 5\n\t\t*set empathy %+ 15\n\t\t\t\t\n\t\tKrantic laughs at you and shoots at a fleeing Medusa.  The aliens are speeding towards the cave entrance, their massive bodies oddly nimble as they run.\n\t\t\t\n\t\t*if (leader = \"Krantic\")\n\t\t\t*if ((persuasiveness > 65) or (infamy > 50))\n\t\t\t\tThe rest of the crew seems to believe you, or at least to doubt Krantic; they lower their weapons uncertainly.\n\n\t\t\t\tYou…\n\t\t\t\t*choice\n\t\t\t\t\t#…stay and try to reason with the more reasonable members of the crew.\n\t\t\t\t\t\t*gosub explain\n\t\t\t\t\t\t*set leader \"Ny-bat\"\n\t\t\t\t\t\t*if n_he = \"she\"\n\t\t\t\t\t\t\t*set l_he \"she\"\n\t\t\t\t\t\t\t*set l_his \"her\"\n\t\t\t\t\t\t\t*set l_him \"her\"\n\t\t\t\t\t\t\t*goto coup\n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t*goto coup\n\t\t\t\t\t\t*label coup\n\t\t\t\t\t\t\"I don't think that would be wise,\" ${leader} says, pointing ${l_his} gun at Krantic.  The grim set of ${l_his} mouth says ${l_he} will shoot if ${l_he} has to. \n\t\t\t\t\t\t*goto disarm\t\t\t\t\t\t\n\t\t\t\t\t#…abandon the pirates, and join the Medusi in the cave.\n\t\t\t\t\t\tThe aliens will make better allies than these trigger-happy pirates.\n\t\t\t\t\t\t*gosub run\n\t\t\t\t\t\tMaybe the crew actually listened to what you had to say.\n\t\t\t\t\t\t*goto solo_exit\n\t\t\t*else\n\t\t\t\t*label cant_convince\n\t\t\t\t*set medusi_strength -2\n\t\t\t\tSeveral pirates open fire, and two more Medusi slump to the ground before the aliens disappear into the dark volcano.  The pirates don't trust you enough to listen to what you have to say—at least not while Krantic is in charge.\n\t\t\n\t\t\t\tYou…\n\t\t\t\t*choice\n\t\t\t\t\t#…stay with the pirates. \n\t\t\t\t\t\tYou'll try to keep your head down, and hope Krantic doesn't decide to shoot you next.\n\t\t\t\t\t\t*goto kleader_exit\t\t\t\t\t\t\n\t\t\t\t\t#…abandon the pirates, and join the Medusi in the cave.\n\t\t\t\t\t\tThe aliens will make better allies than these trigger-happy pirates.\n\t\t\t\t\t\t*gosub run\n\t\t\t\t\t\t*goto solo_exit\n\t\t*elseif ((leader = \"Gao\") or (leader = \"Ny-bat\"))\n\t\t\t*goto leader_stops\n\t\t*else\n\t\t\t*goto second_stops\n\t#I shoot Krantic.\n\t\t*set infamy %+ 10\n\t\t*set crew_strength -1\n\t\t*goto krantic_shot\t\t\n\t#I point my gun at Krantic, but don't shoot yet.\n\t\t*set infamy %+ 20\n\t\t\"Stop!\" you shout, aiming your weapon at Krantic.\n\t\t\t\t\n\t\tKrantic laughs wildly.  \"You think we would give you a working weapon?\" he asks.\n\t\t\t\t\n\t\t*if (gun = true)\n\t\t\t\"It's Vikola's gun,\" you say.  You point your weapon up and pull the archaic trigger.  The report rings in your ears.\n\t\t\t\t\t\t\n\t\t\tKrantic's grin falters.  \"The aliens are getting away while you mess around here.  You should worry about them, not me,\" he says.\n\t\t\t\t\t\t\n\t\t\tThe Medusi are fleeing towards the cave entrance, their massive bodies oddly nimble as they run.\n\t\t\t*if (leader = \"Krantic\")\n\t\t\t\t*set leader \"Ny-bat\"\n\t\t\t\t*if n_he = \"she\"\n\t\t\t\t\t*set l_he \"she\"\n\t\t\t\t\t*set l_his \"her\"\n\t\t\t\t\t*set l_him \"her\"\n\t\t\t\t\t*goto points\n\t\t\t\t*else \n\t\t\t\t\t*label points\n\t\t\t\t\tNy-bat also points ${n_his} gun at Krantic, and says, \n\t\t\t\t\t*goto disarm\n\t\t\t*elseif ((infamy > 80) or (leader = \"you\"))\n\t\t\t\t*goto second_disarm\n\t\t\t*else\n\t\t\t\t*goto points\n\t\t*else\n\t\t\tOh, no.  You raise your gun and press the archaic mechanical trigger.  Nothing happens.  All the indicator lights are green, but the weapon won't fire.  The pirates gave you a dud, in case you turned on them.\n\t\t\t\t\t\t\n\t\t\t*goto bad_gun\n\t#I grab Krantic's gun.\n\t\t*if (strength >= 75)\n\t\t\t*set infamy %+ 20\n\t\t\tYou dash across the black rock and wrest Krantic's weapon from his hands.\t\t\t\n\t\t\t*label restrain\n\t\t\t\n\t\t\t\"Restrain the spacing Stashie!\" he shouts.\n\t\t\t\n\t\t\t*if (leader = \"Krantic\")\n\t\t\t\t*set leader \"Ny-bat\"\n\t\t\t\t*if n_he = \"she\"\n\t\t\t\t\t*set l_he \"she\"\n\t\t\t\t\t*set l_his \"her\"\n\t\t\t\t\t*set l_him \"her\"\n\t\t\t\t\t*goto coup\n\t\t\t\t*else \n\t\t\t\t\t*goto coup\t\t\t\n\t\t\t*elseif ((leader = \"Gao\") or (leader = \"Ny-bat\"))\n\t\t\t\t*goto coup\n\t\t\t*else\n\t\t\t\t\"They don't take orders from you anymore,\" you say.\n\t\t\t\t\n\t\t\t\tKrantic growls, beyond words.\n\t\t\t\t\n\t\t\t\t\"${name}'s right,\" says Ny-bat.\n\t\t\t\t*goto second_disarm\n\t\t*else\n\t\t\t*set infamy %+ 10\n\t\t\tYou dash across the black rock and try to wrest Krantic's weapon from his hands.  Instead, he shoves you to the ground.\n\t\t\t*goto restrain \n\n*label solo_exit\n\nSoon the jagged roof of the cave looms over you like a monstrous black overbite.  The darkness is abrupt, and you almost crash into the corpulent Medusa blocking your way.\n*page_break Chapter Five: Into the Dark\n*set crew false\n*goto_scene medusi
