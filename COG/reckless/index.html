me to waste on this disgusting and irritating alien.\n\t\t\t\t\t\t*goto out\n\t#…cautiously nudge the box back with my foot.\n\t\t*label convince_box\n\t\tSome kind of spasm seizes the alien—perhaps body language that you cannot understand—and its hood flaps for a moment like laundry in front of an air vent.  You catch a glimpse of muscular upper limbs underneath.  Then a deep voice says, \"Speech is only in the every-mist.  Incarceration among the deaf!  Vicious creatures, level lower than vermite.\"\n\t\t\t\n\t\tYou're not sure, but you think it is insulting the human race.  As he goes on, you realize that the voice is coming from the speech box, not the creature itself.\n\t\t\n\t\tYou think you should…\n\t\t*choice\n\t\t\t#…defend humanity's honor with a tirade of my own.\n\t\t\t\t*set level %- 5\n\t\t\t\t*set persuasiveness %- 12\n\t\t\t\tYou expound at length at the top of your voice on the virtues of humanity.  The alien cuts you off mid-word, as if it's not even aware that you are talking.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\"Impossibility of communication with inferiority intelligences!\" it moans.  And then, \"Box.  Hand.  Box.  Hand.  Box.  Hand.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\tYou decide to…\n\t\t\t\t*choice\n\t\t\t\t\t#…pick up the spacing box.\n\t\t\t\t\t\t*goto got_box\n\t\t\t\t\t#…leave the alien to its own superior company.\n\t\t\t\t\t\t*goto out\n\t\t\t\t\t#…hurl the box right at the disgusting alien.\n\t\t\t\t\t\t*goto throw\n\t\t\t#…pick up the speech box.\n\t\t\t\t*goto got_box\n\t\t\t#…race into the hallway.\n\t\t\t\tHow could you trust an alien who thinks humans are vicious animals?\n\t\t\t\t*label out\n\t\t\t\tYou speed from The Mushroom's cell along the hallway, towards the oversized door at one end.  Hopefully the cargo bay will be empty of pirates, and have a terminal you can use.\n\t\t\t\t\n\t\t\t\t*goto_scene cargo_bay\n\t#…ask, \"Can I hide here for a few minutes?\"\n\t\t*set level %- 5\n\t\t*goto convince_box\n\t#…shout, \"Keep away from me!\"\n\t\t*set level %- 5\n\t\t*set persuasiveness %-12\n\t\t*goto convince_box\n\t\t\n*label freak_out\n*set mushroom_ally false\n*set free_time - 2\nThe Medusa seems to go berserk.  It sways on two limbs, as the other four flail wildly.  Even the injured limb jerks painfully, and the worms on the top of its head wiggle and emit sparks.  For a moment the box emits deafening static, which gives way to a stream of incoherent words: \"Pain-silence-no-stop-alone-pain-don't-animals-animals-animals-must-not-silence-help...\"\n\nThe alien's mind must have broken under torture.  It's obviously reliving its interrogation by the Reckless crew.  As you gape at the suddenly insane alien, a limb whips out, knocking you squarely in the chest.  You fall backwards into the wall, dropping the speech box.\n\nYour chest feels bruised, but you are not seriously hurt.  You think you should…\n*choice\n\t#…leave The Mushroom to its insanity.  I just don't have time for this.\n\t\t*goto out\n\t#…comfort The Mushroom by placing a gentle hand on its hood.\n\t\t*set empathy %+ 7\n\t\t*set level %- 5\n\t\t*set free_time - 3\n\t\t*set strength %- 13\n\t\tIt's difficult to get close to the Medusa, past the uncontrolled flapping of its limbs, but you manage it.  You experience a shiver of revulsion as you prepare to touch the wet, fleshy poncho that covers the upper half of its body.  Carefully, you give the Medusa a soft, friendly pat.  Its hood feels soft and slimy, like the back of a swimming toad.\n\t\t\n\t\t*label thrown\n\t\tAnother burst of static assaults your ears.  Before you know it, two strong tentacles have wrapped around your waist.  You feel your feet leave the floor, and the next thing you know, you are crashing into the hard metal bench on the other side of the room.  The back of your head feels wet.  You touch it gingerly and your fingers come away bloody.  It also hurts a little to breathe—you think you've bruised a rib.\n\t\t\n\t\tYou've learned the hard way that Medusi don't like to be touched.  That shouldn't surprise you.  Species from different planets tend to find each other repellent on an instinctual level.  You decide to leave and let The Mushroom calm down.  It's obviously dangerous when it's not lucid.\n\n\t\t*goto out\n\t#…try to talk The Mushroom down.\n\t\t*set free_time - 5\n\t\t*set empathy %+10\n\t\tYou speak as soothingly as you can, assuring the distressed alien that you mean it no harm.\n\t\t\t\t\n\t\t*if ((persuasiveness > 70) or (empathy > 80))\n\t\t\t*set mushroom_ally true\n\t\t\tGradually, the uncontrolled flapping of the limbs slows.  The Mushroom pulls its hood tight around its torso, in a gesture you can't interpret.\n\t\t\t\t\t\t\n\t\t\t\"Go now,\" whispers the Medusa through your speech box. \"Hide.\"\n\t\t\t\t\t\t\n\t\t\tYou carefully make your way through the heavy, swirling air to the door.\n\t\n\t\t\t*set mushroom_ally true\n\t\t\t*goto out\n\t\t*else\n\t\t\tThe Mushroom's reply is incoherent.  The Medusa begins to move towards you, shuffling its limbs forward and flaring its wet, fleshy hood.  You gulp the syrupy air and decide it might be best to leave the alien on its own for the moment.\n\n\t\t\t*goto out\n\t#…grab a limb and yank.  When someone hits me, I hit back.\n\t\t*set free_time - 3\n\t\t*set empathy %-12\n\t\tIt's hard to catch a limb while also avoiding the uncontrolled flapping of the rest.  When you do grab one, you are surprised at its strength.  It squirms in your hand like a captured snake.\t\n\t\t\n\t\t*if strength > 50\n\t\t\tYou need two hands to keep the limb from escaping, and even then you can barely hold on.  Before it escapes, you give the limb a vicious tug.\n\t\t\t\t\t\t\n\t\t\tAnother burst of static assaults your ears.  The Mushroom pulls its wet, fleshy hood tight around its torso, possibly in a defensive gesture.  \"Please no, please no,\" it moans.\n\t\t\t\t\t\t\n\t\t\tPoint made, you are ready to take your leave, and breath some decent air.\n\n\t\t\t*goto out\n\t\t*else\n\t\t\t*set strength %- 12\n\t\t\tYou can't keep hold of it—you're not strong enough.\n\t\t\t*goto thrown", "newcrater": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*comment ñáéç…—\n*comment intent 1 = help resist 2 = nego deal  3 = threaten\nIt's a long swim.  The last part, where the column passes through the hardened lava that makes up the ceiling of the cavern, is terrifying.  What if Medusi can hold their breath much longer than humans?  You have no choice but to take a deep breath, and hope this air, plus the oxygen in your emergency breather, will be enough to get you through to the floor of the crater.\n\nYour lungs are starting to burn when you finally break through into the light and the mist.  The vermite holds you up as you gasp and blink.\n\nMedusi limbs snake around your arms and haul you out of the silky vermite.  As you stand shaking by the edge of the vermite pool, a Medusa reaches down into the vermite.  The slime immediately hardens.\n*if (crew_strength > 1)\n\tThe ground team—the ${crew_strength} of them still free and conscious, anyway—won't be able to follow you by that route unless you come to some kind of understanding with the Medusi.  \n\t*goto cont\n*elseif (crew_strength = 1)\n\tThe ground team—the one remaining member still free and conscious, that is—won't be able to follow you by that route unless you come to some kind of understanding with the Medusi.\n\t*goto cont\n*else\n\tNo one could follow you by that route—but no one from the ground team is left free and conscious, anyway.\n\t*goto cont\n*label cont\nYou are alone, surrounded by angry aliens.\n*page_break\nYou are standing in the center of a black crater, in the middle of a trio of landing pads placed around the glistening vermite pool.  You can't really judge the size of the crater; you haven't had enough experience with open spaces.  But it seems big, big enough that a dozen windowless buildings built against the edge only snake a quarter of the way around.\n\n\"Orders presentation alien injured leader,\" says one of the Medusi, and all three of them reach out to grab you.\n*choice\n\t#I flee.\n\t\t*set strength %+ 5\n\t\t*if (strength \u003c 75)\n\t\t\tYou try to run, but Medusi are faster than humans.  The flexible lips at the ends of several Medusi limbs fasten on to your clothing.  You resign yourself to being dragged across the crater towards the structures at the edge, trying not to choke on the old-vegetable Medusi smell.\n\t\t\t*goto inside\n\t\t*else\n\t\t\tYou race towards the Medusi structures, thinking perhaps you can enter an empty house and bar the door behind you while you call the ship.  Stars be thanked, you've worked hard to condition your body.  Otherwise, you wouldn't have a chance.\n\t\t\t\t\t\n\t\t\t*label kids\n\t\t\tYou reach the closest building just ahead of your pursuers and burst through the door, gasping for air.  The house isn't empty, as you thought; it's filled with miniature Medusi, two dozen children, at least.\n\t\t\t*gosub kid_check\n\t\t\t\n\t\t\tSeveral doors open off this great room, but you have no idea where they lead.  You…\n\t\t\t*choice\n\t\t\t\t#…grab the smallest child and threaten to kill it.\n\t\t\t\t\t*set empathy %- 30\n\t\t\t\t\t*set strength %- 20\n\t\t\t\t\t\"I'll kill this one if you come any closer!\" you shout.\n\t\t\t\t\t\n\t\t\t\t\tYou throw your arms around the smallest Medusa's hood.  It's about as tall as a three-rotation-old, but much more massive.  You feel a tingly sensation where its worm-hair is crushed against your chest.\n\t\t\t\t\t\n\t\t\t\t\tYou heave the child off the ground, and that mild buzz becomes a hot river of pain, flowing down your nerves like molten lava.  You scream and drop the child.  Its scream wasn't enough to knock you out, but your arms are limp and useless, and your chest burns deep inside.\n\t\t\t\t\t\n\t\t\t\t\tThe Medusi chasing you seize you roughly by the arms, making the damaged nerves shriek with agony.  \n\t\t\t\t\t\n\t\t\t\t\t\"Now punishment alien,\" one says.  \n\t\t\t\t\t\n\t\t\t\t\tA spark shoots from one of its head-worms.  You scream again as pain spreads outwards, racing along every nerve, until you feel nothing at all.\n\n\t\t\t\t\t*page_break\t\t\t\t\t\n\t\t\t\t\tYou wake when a Medusa pulls you roughly to your feet.\n\t\t\t\t\t*goto meet\n\t\t\t\t#…push through the children towards one of the doors.\n\t\t\t\t\t*set empathy %-15\n\t\t\t\t\t*set strength %- 20\n\t\t\t\t\tThe Medusi children crowd around you as you try to cross the room.  You feel a tingly sensation when your bare arm brushes the worm-hair of one of the smaller ones pushing against your knees.\n\t\t\t\t\t\n\t\t\t\t\tYou accidentally tread on a limb, trying to push past, and that mild buzz becomes a hot river of pain, flowing down your nerves like molten lava.  You scream and back away from the child.  Its scream wasn't enough to knock you out, but your arms are limp and useless, and your chest burns deep inside.\n\t\t\t\t\t\n\t\t\t\t\tThe Medusi chasing you seize you roughly by the arms, making the damaged nerves shriek with agony.  \n\t\t\t\t\t\n\t\t\t\t\t\"Now punishment alien,\" one says.  \n\t\t\t\t\t\n\t\t\t\t\tA spark shoots from one of its head-worms.  You scream again as pain spreads outwards, racing along every nerve, until you feel nothing at all.\n\n\t\t\t\t\t*page_break\t\n\t\t\t\t\tYou wake when a Medusa pulls you roughly to your feet.\n\t\t\t\t\t*goto meet\n\t\t\t\t#…give myself up.  I'm not so hardened that I'd endanger a child.\n\t\t\t\t\t*set empathy %+ 25\n\t\t\t\t\t\"I'll cooperate,\" you pant.\n\t\t\t\t\t*goto meet\n\t*if (hacking > 74) #I engage the emergency program that I wired into my speech box.\n\t\t*set hacking %+ 10\n\t\t\"Medusi repellent!\" you shout.\n\t\t\t\t \n\t\tYou can't hear it, but the box begins to emit an electrical signal that's the equivalent of an unbearable shriek.  The Medusi abruptly recoil.  The worms on top of their heads writhe and spark.\n\t\t \n\t\tOne Medusa lurches towards you, determined despite the painful sound.  You race towards the Medusi structures, thinking perhaps you can enter an empty house and bar the door behind you while you call the ship.  Stars be thanked, the electrical shriek is keeping the Medusi off-balance; otherwise, you wouldn't have a chance.\n\t\t\n\t\t*page_break\n\t\t*goto kids\t\t\t\n\t*if (net = true) #I throw the magnetic net over them.\n\t\t*set level %+ 5\n\t\tYou take the handful of silky fibers from your pocket and toss it towards the Medusi.  The net snaps out to its fullest size, covers two of the aliens, and begins to pull tight, as the magnetic tabs seek each other behind the aliens' backs.\n\t\t\n\t\tShrieks of dismay come from your speech box as the third Medusa fumbles around for the off switch, but you don't stay to watch.  You race towards the Medusi structures, thinking perhaps you can enter an empty house and bar the door behind you while you call the ship.  Stars be thanked, the net will delay the Medusi for a few minutes; otherwise, you wouldn't have a chance.\n\n\t\t*page_break\n\t\t*goto kids\t\t\n\t#I agree to go with them.\n\t\t*set persuasiveness %+ 5\n\t\t\"I'd like the chance to talk to your leader,\" you say, allowing the flexible lips at the ends of several Medusi limbs to fasten on to your clothing.  You scramble to keep up with your escort as you cross the crater towards the Medusi buildings.\n\t\t*label inside\n\t\t\n\t\tThe structure you enter is filled with miniature Medusi—two dozen children, at least.\n\t\t*gosub kid_check\n\t\t*label meet\n\t\tYour escort leads you across the large front room where the children are gathered and through one of the many doors that lead out of it.  You enter a smaller chamber, something like a bedroom, you imagine, because it has an oversized pallet where a massive Medusa reclines.\n\t\t\n\t\tThis Medusa has a red gelatinous blob stuck to its hood, right where you remember the leader being shot.  The blob pulses, and indecipherable characters appear on a wall-mounted screen at the same time.  The blob must be organic tech, some kind of bandage and monitor rolled into one.  The Medusi must be masters of genetic engineering…and suddenly realization hits you like a gravity upswing.\n\t\t\n\t\t\"Vermite's not natural,\" you blurt.  \"You engineered it out of alien micro-organisms and…\"\n\t\t*choice\n\t\t\t#\"…your own genes.\"\n\t\t\t\t*set level %+ 10\n\t\t\t\t\"Inaccuracy but degree of proximity to fact,\" says your speech box in the sonorous voice it has chosen to represent the Medusi leader.\n\t\t\t\t*goto genes\n\t\t\t#\"…the genes of hive insects.\"\n\t\t\t\t\"Bizarre supposition,\" says your speech box in the sonorous voice it has chosen to represent the Medusi leader.\n\t\t\t\t*goto genes\n\t\t\t#\"…the genes of animals similar to Medusi.\"\n\t\t\t\t*set level %+ 20\n\t\t\t\t\"Astuteness of deduction,\" says your speech box in the sonorous voice it has chosen to represent the Medusi leader.\n\t\t\t\t*label genes\n\t\t\t\t\"Genes of untranslatable.\"\n\t\t\t\t\n\t\t\t\t\"Untranslatable?\" you ask.\n\t\t\t\t\n\t\t\t\t\"Animals with Medusi relationships,\" tries the leader.  \"Companion breeds.  Pets.\"\n\t\t\t\t\n\t\t\t\tThat explains a lot.\n\t\t\t\t*page_break\n\t\t\t\t*goto intentions\n\t\t\t#\"…the genes of water plants.\"\n\t\t\t\t*set level %- 5\n\t\t\t\t\"Ridiculous supposition,\" says your speech box in the sonorous voice it has chosen to represent the Medusi leader.\n\t\t\t\t*goto genes\n\t#I try to talk them out of it.\n\t\t*set infamy %- 15\n\t\t\"It's not me you want,\" you say, as the flexible lips at the ends of several Medusi limbs fasten on to your clothing.  \"You want Zoa, our captain.  Let me call her, and she can meet with your leader.\"\n\t\t\n\t\t\"Question for higher level.  Orders presentation alien,\" repeats one of your captors.  You resign yourself to being dragged across the crater towards the windowless buildings, trying not to choke on the old-vegetable Medusi smell.\n\t\t*goto inside\n\t\t\n*label intentions\nThe door opens, and a small Medusa peeks in.  \"Greetings alien presence?  Education experience!\" a small voice pipes through your speech box.\n\n\"Not this moment,\" the leader says firmly, and the child withdraws.\n\n*gosub wounded\n*if (empathy > 69)\n\t\"Some trust deservedly,\" says the leader.  \"Release alien.\"\n\t\n\tMedusi limbs slide wetly across your arms as your escort lets you go.\n\t*goto stance\n*else\n\t*goto stance\n\n*label stance\nYou may be at the mercy of the Medusi for the moment, but you still need to decide what stance to take.\n*choice\n\t#I help the Medusi resist the pirates.\n\t\t*label story\n\t\t*set intent 1\n\t\t*set empathy %+ 25\n\t\tYou tell the leader your story, and assure it that you have no loyalty to the Reckless.\n\t\t\n\t\t*label disbelief\n\t\t*gosub empathy_check\n\t\tLevel completeness unknown.  Impossibility discussion without leveling!\"\n\t\t\n\t\t\"What is leveling?\" you ask.\n\t\t\n\t\tThe leader is shocked into silence for a moment.  Then, \"Leveling!  Determination of level!  Test of intelligence!\" it shouts.\n\t\t\n\t\t\"So level me already,\" you say.\n\t\t\n\t\t\"Leveling by impropriety non-official merit severeness punishment.  But administration practice material for offspring…\"\n\t\t\n\t\tThe red bandage-blob pulses.  The worms on the Medusa's head wiggle.  It seems to be waiting for you to speak.\n\t\t\n\t\t\"Fine.  I'll take a practice test,\" you say.\n\t\t*page_break\n\t\t*goto leveling\n\t#I ask the Medusi to protect me from the pirates.\n\t\t*goto story\n\t#…negotiate a deal for the benefit of all.\n\t\t*set infamy %+ 25\n\t\t*set intent 2\n\t\tYou explain that Krantic acted on his own, and begin to outline the mutual benefits of trade.\n\t\t\n\t\t*goto disbelief\n\t\n\t*if (crew = true) #I threaten the Medusi with the ship's firepower.\n\t\t*set intent 3\n\t\t*set infamy %+ 15\n\t\tYou warn the leader that the Reckless is sure to find their base, and that Zoa will not leave without vermite.\n\t\t\n\t\t*goto disbelief\n\n*label leveling\n\"Untranslatable!\" your speech box yells.  Before you can ask what the leader shouted, the door is opened by a half-size Medusa.\n\t\t\n\"Task assignment.  Intellectual exercise.  Identification leveling questions translatable to alien intellect.  Presentation immediacy,\" says the leader.\n\nOf course alien body language can be deceiving, but there seems to be an eagerness in the way the little Medusa releases the door handle and scurries away.  You hear lots of shuffling in the otherwise silent front room, and soon several of the larger Medusi children are crowded around the doorway, clutching the chunky Medusi versions of a terminal.\n\n\"Line formation,\" orders the leader.\n\nThe Medusi children scoot into a line, each one pressing tight against the next—canned mushrooms with elephant trunks.  They are almost cute.\n\nThe first one steps forward.\n\n\"Hood to limbs, as petals to!\" it squeaks, before listing the following choices:\n*choice\n\t#Stem\n\t\t*set level %- 10\n\t\t*label analogy\n\t\t\"Perhaps next inquiry less dependency Medusi culture,\" says the leader.\n\t\t\n\t\tThe next child steps forward.\n\t\t\n\t\t\"If 3 newborn offspring 6 limbs each, how old when combined age equal half combined limbs?\"\n\t\t*choice\n\t\t\t#2\n\t\t\t\t*label math_hint\n\t\t\t\t*if (level >= 50)\n\t\t\t\t\tYou almost say, but then you realize that 18 divided by two, then divided by 3, is:\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#2\n\t\t\t\t\t\t\t*set level %-10\n\t\t\t\t\t\t\t*goto math_wrong\n\t\t\t\t\t\t#3\n\t\t\t\t\t\t\t*set level %+ 10\n\t\t\t\t\t\t\t*goto math_right\n\t\t\t\t\t\t#6\n\t\t\t\t\t\t\t*set level %-10\n\t\t\t\t\  identical purple mass.  You cringe as the Medusa settles the organism around your shoulders.  The blob is damp and warm, unmoving but unmistakably alive.  You feel a tingle at the back of the neck, where the jelly scarf crosses your spine.\n\n\"Sacrament of Trial,\" says the leader, levering itself up on its pallet and reaching a limb out towards the purple blob. \n\n\"Delivery of pain.  Alien touch here, transference pain to partner, less pain alien.  Partner necessity trust alien will not transference enough for permanence of damage.  Not…transference…too…much…pain,\" it says, clearly making an effort to speak simply, and be understood through the filter of inadequate translation software.  \"Partner not trust, removal sacrament, trial failure.\"\n*page_break\n*if (partner = \"Zeeber\")\n\t\"Wait, pain?\" Zeeber shrills, reaching up to grab the purple blob on her shoulders.\n\t\n\t\"Don't take it off!\" you shout.\n\n\tZeeber startles and drops her hand.  \"I don't think you picked the right person for this!  I'm not good at pain!\"\n\t\n\tYou tell her:\n\t*choice\n\t\t#\"I'll send you as little pain as possible.\"\n\t\t\t*set empathy %+ 10\n\t\t\t*set zeeber_ally true\n\t\t\t\"You'd better,\" Zeeber says. \"I guess I'll try.\"\n\t\t\t*label z_trial\n\t\t\t*gosub pain\n\t\t\t*choice\n\t\t\t\t#I'll try to bear all this pain.\n\t\t\t\t\t*set empathy %+ 15\n\t\t\t\t\t*set zeeber_ally true\n\t\t\t\t\t*gosub collapse\n\t\t\t\t\t\n\t\t\t\t\tYour fingers begin to blur, and bright spots dance in the dark edges of your vision.  You are losing consciousness, at best, or suffering nerve damage, at worst.  Zeeber is shouting something at you through the hole in the wall, but you can't find any sense in the sounds she makes.\n\t\t\t\t\t\n\t\t\t\t\tBefore you pass out, you…\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#…send Zeeber some pain.\n\t\t\t\t\t\t\t*set empathy %- 5\n\t\t\t\t\t\t\tYou give the purple sacrament one quick tap, just to drain a bit of the pain.\n\t\t\t\t\t\t\t\n\t\t\t s the sacrament and hurls it across the room.  The pain instantly stops.  You shakily slide the purple blob from your own neck, letting it fall to the floor.\n\t\t\t\t\t \n\t\t\t\t\tThe worms on The Mushroom's head are waving crazily.  Eventually the static resolves into words.  \"Human failure!  Limitless pain to partner!  Knowledge of weakness state, yet lack consideration!\"\n\n\t\t\t\t\t\"Trial Failure,\" says the leader.  \"Human not demonstration capability inspiration trust.  Remain hostage only.\"\n\n\t\t\t\t\tYou scowl.\n\t\t\t\t\t*page_break Chapter Six: Deal or Steal (or Not)\n\t\t\t\t\t*goto_scene ship\n\t\t\t\t#I'll ask The Mushroom how it is doing.\n\t\t\t\t\t*set empathy %+ 20\n\t\t\t\t\t*gosub collapse\n\t\t\t\t\t\n\t\t\t\t\t\"Honored…Diplomat?\" you gasp, barely able to draw enough breath to carry the words.\n\t\t\t\t\t\n\t\t\t\t\t\"I appreciation, alien consideration.  Endurance smallness amount additional pain,\" it says.\n\n\t\t\t\t\tYou give the blob a quick tap, just to drain a drop of the pain.\n\t\t\t\t\t\n\t\t\t\t\tThe Mushroom sways, but stays on its feet.\n\t\t\t\n\t\t\t\t\t\"Endurable, for ally rescuer.  Preference not increase,\" The Mushroom says, much more coherent than you are at the moment.  You are definitely in more pain than it is.\n\t\t\t\t\t\n\t\t\t\t\tYou resolve to…\n\t\t\t\t\t*goto m_bit\t\t\n\t\t#\"I'll share the pain equally.\"\n\t\t\t\"Uncertainty I, Honored Diplomat, capability endurance half pain,\" says The Mushroom.\n\t\t\t\n\t\t\t*goto m_trial\n\t\t#\"I have to convince the other Medusi to trust me.\"\n\t\t\t*set persuasiveness %+ 10\n\t\t\t\"Understanding necessity of trusted envoy,\" says The Mushroom. \n\t\t\t\t\n\t\t\t*goto m_trial\t\n\t\t\t\n\t\t#\"This is our best hope for a peaceful solution.\"\n\t\t\t*set persuasiveness %+ 15\n\t\t\t\"Understanding necessity of trusted envoy,\" says The Mushroom. \n\t\t\t\t\n\t\t\t*goto m_trial\t\t\t\n\t\t#\"I'll send you as little pain as possible.\"\n\t\t\t*set empathy %+ 10\n\t\t\t\"Wisdom,\" says The Medusa.  \"Medusi superior physique, yet Diplomat health imperfection after kidnapping ordeal.\"\n\t\t\t*goto m_trial\n\t\t\t\n*comment SUBROUTINES\n\n*label pain\n\"Trial begins,\" says the Medusa leader suddenly.\n\n\"Now?\" you say, and then it hits you: hot, pulsing agony in every centimeter of you below the neck.  You scream and fall to your knees; you can't think, can't speak.\n\nYou manage to slap the blob round your neck, and with that brief touch, the pain lessens a bit, just enough to let some of your reason back in.  At the same instant, you hear a strangled cry, and see ${partner} stagger on the other side of the transparent wall.  You sent your partner some of your pain.\n\nThe pain still throbs almost unbearably.  And didn't the leader say something about permanent damage?  What will you do?\n*return\n\n*label threat\nMy captain will be coming soon with the ship.  Either you'll give her your vermite, or you'll die and she'll take it anyway.\"\n\t\t\nThe leader seems unconcerned—not a worm twitches.  Perhaps there's something you don't know about the Medusi defenses.\n*page_break\n\"Suggestion from human?\" it asks you mildly.\n\n\"Let me go.  I'll try to convince her to let you live.\"\n\n*return\n\n*label wounded\n*if (medusi_strength \u003c 19)\n\t\"Wounded retrieval?\" the Assistant Foreperson asks your escort.\n\t\n\t\"In progression,\" the escort replies.\n\t\n\t*return\n*else\n\t*return\n*label empathy_check\n\"Impossibility evaluation alien statements!\" the leader huffs.\n*if (empathy > 50)\n\t\"Actions indication some compassion.\n\t*return\n*elseif (empathy > 35)\n\t\"Actions indication capacity for compassion and aggression both.\n\t*return\n*else\n\t\"Actions indication aggression, deficiency of compassion.\n\t*return\n\t\n*label level_qu\nConversation of certainty possible.\"\n\n\"What level are you?\" you ask wearily.  All that thinking was tiring.\n\n\"I of the Third Level.\"\n\n*return\n*label collapse\nYou slide fully onto the floor and curl into a fetal position.  You flex your fingers over and over before your eyes; it's just impossible to believe that the flesh is not blackened and burned, that nothing mars the perfect skin, when you can feel the injury, there and everywhere.\n*return\n*label kid_check\n*if (kids)\n\tThe thought of your own kids, and the pain they must be feeling since your disappearance, is like a splash of boiling oil on bare skin.\n\t*return\n*else\n\t*return", "pirate_end": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*comment ñáéç…—\n*comment vermite_state 0 = no vermite 1 = fake vermite  2 = inactive vermite  3 = good vermite\n*comment zeeber_fate, see line 500\n*set p_end true\n*temp nybat_with false\n*temp gao_with false\n*temp utambu_with false\n*temp hammer_with false\n*temp zeeber_with true\n*comment--just to make things easier!\n*if (vermite_state = 0)\n\tThe hold is empty, and Zoa is furious.  Everyone feels the weight of her displeasure, but she blames Krantic the most.\n\t*goto krantic\n*elseif (vermite_state = 1)\n\tThe hold is full of building slime, rather than vermite, and Zoa is furious.  Everyone feels the weight of her displeasure, but she blames Krantic the most.\n\t*goto krantic\n*elseif (vermite_state = 2)\n\tThe hold is full of immature, unresponsive vermite, and Zoa is furious.  You convince her to tow the unusable vermite behind you and feed it heat from the atmospheric engines, freeing the cargo hold for other goods but allowing you to keep working with it.  Luckily, she blames Krantic the most for the outcome of the mission.\n\t*goto krantic\n*else\n\tZoa is pleased with the outcome of the mission, though not with Krantic's behavior.\n\t*goto krantic\n*label krantic\n\nYou're not sure what horrible fate the captain has planned for Krantic.  Right now, he is living in a decontamination chamber (a cell like the one you woke in), awaiting punishment.  You decide to…\n*choice\n\t#…space him.  He's too dangerous to live.\n\t\t*set infamy %+ 15\n\t\t*set empathy %- 30\n\t\tYou choose a time when Hammer is on guard outside the cell door, hoping the hardened pirate will understand what needs to be done.\n\t\t\n\t\t\"It's time,\" you tell him.  \"Zoa can't give the order; she doesn't want the crew worrying she'll space them if they make a mistake.  But you know it's what she wants.  Krantic…\"\n\t\t*choice\n\t\t\t#\"…deserves it.\"\n\t\t\t\t\"Cause he's a worse murderer than you?\"  Hammer snorts.  \"I take my orders from Zoa.\"\n\t\t\t\t\n\t\t\t\tYou don't want to fight him, so you go to Zoa.  She listens to your confession with only a slight tightening at the corner of her mouth, and you're not sure if she's unhappy with your attempt or the fact that Hammer stopped you.\n\t\t\t\t*goto confab\n\t\t\t#\"…is insane.\"\n\t\t\t\t*label spaced\n\t\t\t\tHammer nods.  \"You do it, you deal with Zoa.  All I did was leave you on guard a few minutes.\"  He stomps off down the curving hallway, and turns at the next junction.  You're alone.\n\t\t\t\t\n\t\t\t\tKrantic is about to die.  Do you want to…\n\t\t\t\t*choice\n\t\t\t\t\t#…tell him, so he can prepare himself spiritually.\n\t\t\t\t\t\t*set empathy %+ 10\n\t\t\t\t\t\t*label warning\n\t\t\t\t\t\tYou open communication, but not the door, of course.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"This is ${name},\" you say.  \"The airlock will open in three centaseconds.  Use this time to prepare yourself.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Spacing Stashie!\" Krantic swears, as he hurls himself against the closed door.  He smashes against the metal door again and again, hard enough to break bones, you think.  His bloody face in the window is that of a wild animal, but his voice is all too human.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Zoa!  I want to talk to Zoa!\" he yells.\n\t\t\t\t\t\t\n\t\t\t\t\t\tIt seems like centuries, but only two centaseconds have passed.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I open the airlock.\n\t\t\t\t\t\t\t\t*goto push\n\t\t\t\t\t\t\t#I change my mind.\n\t\t\t\t\t\t\t\t*set empathy %+ 15\n\t\t\t\t\t\t\t\tKrantic may deserve to die, but you can't kill him, not like this.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Zoa will decide,\" you tell him, and hurry to the captain's office.  She listens to your confession with only a slight tightening at the corner of her mouth, and you're not sure if she's unhappy with your attempt or the fact that you couldn't go through with it.\n\t\t\t\t\t\t\t\t*goto confab\n\t\t\t\t\t#…tell him, so he will suffer the anticipation.\n\t\t\t\t\t\t*set empathy %- 20\n\t\t\t\t\t\t*goto warning\n\t\t\t\t\t#…push the button with no warning. It's kinder.\n\t\t\t\t\t\t*set empathy %+ 10\n\t\t\t\t\t\tYou glance in the viewport, though you know it's not wise.  Krantic is squatting on the bench, tearing at a sandwich like a wild animal.  The room is revolting; clearly he's been using his own bodily wastes to make some kind of point.  You can't imagine how he stands the smell.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label push\n\t\t\t\t\t\tYou move quickly to the control panel, and easily tell the computer to lock the surrounding airlocks, so there's no chance of Krantic reentering the ship.  You tell the ship to open this airlock door and dissolve the vermite seal between the decontamination chamber and the airlock proper.  This is irregular—usually the seals are opened one at a time, not both at once—so the computer asks you several security questions.  Finally, you come to: EXPOSE DECONTAMINATION CHAMBER TO VACUUM?  YES/NO\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Yes.  This is necessary.\n\t\t\t\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t\t\t\tYou don't hear anything, because the air goes out with Krantic, of course.  After a moment you step in front of the viewport, and gaze at the empty cell.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHumans can survive approximately 80 seconds in space without a space suit.  You count out those seconds, and then you know Krantic is dead.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tZoa never says a word to you, so you know she approves.  Hammer must have reported to her and no one else, because to most of the crew, it remains a mystery who actually put an end to Krantic.  That's for the best, since you want them to respect you, not fear you.  And some of your more soft-hearted allies might not understand.\n\t\t\t\t\t\t\t\t*goto position\n\t\t\t\t\t\t\t#No. I changed my mind.\n\t\t\t\t\t\t\t\t*set empathy %+ 15\n\t\t\t\t\t\t\t\tKrantic may deserve to die, but you can't kill him, not like this.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Zoa will decide,\" you mutter, and hurry to the captain's office.  She listens to your confession with only a slight tightening at the corner of her mouth, and you're not sure if she's unhappy with your attempt or the fact that you couldn't go through with it.\n\t\t\t\t\t\t\t\t*goto confab\n\t\t\t\t\t#Push the button with no warning. It's crueler.\n\t\t\t\t\t\t*set empathy %- 20\n\t\t\t\t\t\t*goto push\n\t\t\t#\"…is a liability.\"\n\t\t\t\t*goto spaced\n\t\t\t#\"…is too dangerous to keep around.\"\n\t\t\t\t*goto spaced\n\t#…suggest that Zoa strand him on a habitable planet.\n\t\t*set infamy %+ 15\n\t\tYou find Zoa in her office.\n\t\t\n\t\t\"Habitable?  Or inhabited?\" Zoa asks, rising from her command chair.  \"Because 'inhabited' is impossible.  There are things you do not know about Krantic.\"\n\t\t\n\t\t*label confab\n\t\tZoa summons Ny-bat and Gao—and says nothing until they arrive.  You fidget, possessing the normal human response to prolonged social silence, but Zoa seems perfectly at ease simply staring at you.\n\t\t\n\t\t\"Krantic is not human,\" she says, when the others have arrived.  \"He is the result of an illegal genetic experiment designed to improve mental processing speed.\"\n\t\t\n\t\tYou draw in a sharp breath.  Though G-enhancements for better muscles are considered safe, any tinkering with the genes that control the development of the human brain tends to result in aggression, violence, and incurable insanity.  Such experiments were outlawed during your parents' day, and the results—the murderous children—were hunted down and exterminated.\n\t\t*page_break\n\t\t\"So you see,\" continues Zoa, \"Krantic will fail even the most basic security scan, and be killed as a subhuman.  He was alone, living in an abandoned asteroid mine, when I found him two years ago.  Perhaps you wonder why I trusted him not to betray the Reckless?  It is simple: he cannot leave. There is no station or planet, human or otherwise, that will allow him to live.\n\t\t\n\t\t\"I thought to make use of him, to control him by offering him a safe haven, but now I see he is impossible to control.  We must be rid of him, that is certain.  Uninhabited, habitable planets are difficult to find. And isolation is its own form of torture.  Yet I'm not sure how the crew will respond to a captain who kills one of her own.  So I ask you.\"\n\t\t*choice\n\t\t\t#\"Kill him.  He deserves it.  The crew will understand.\"\n\t\t\t\t*set empathy %- 20\n\t\t\t\t\"You will help them understand,\" Zoa says.  It is more of a command than a suggestion.\n\t\t\t\t\n\t\t\t\t*label zoa_kill\n\t\t\t\tZoa turns to her chair and calls up a hovering visual.  It is a simple matter for her to dissolve the vermite seal between Krantic's chamber and the airlock, and then to open the airlock door.\n\t\t\t\t\n\t\t\t\tIn the silence, Gao puts a hand over his face.  Ny-bat does ${n_his} impression of an android, remaining impassive.\n\t\t\t\t\n\t\t\t\t\"Go,\" says Zoa. \"Talk to the crew.\"\n\t\t\t\t*page_break\n\t\t\t\t*goto position\n\t\t\t#\"Kill him.  It's kinder.\"\n\t\t\t\t*goto zoa_kill\n\t\t\t#\"Keep him locked up until we find a planet.\"\n\t\t\t\t*set empathy %+ 5\n\t\t\t\t*set infamy %+ 10\n\t\t\t\tNy-bat and Gao agree with you, and Zoa accepts your decision.  Krantic spends half a year in a cell, until you find an uninhabited, habitable world out towards the edge of the galactic arm.  No has bothered to settle the world because it's so out of the way, but Krantic will be able to survive just fine with the tools you leave him.\n\t\t\t\t*goto position\n\t\t\t#\"Let's ask Krantic what he would choose.\"\n\t\t\t\t*set empathy %+ 15\n\t\t\t\t\"You ask,\" says Zoa.  She opens a communications channel.  \"We'll be listening.\"\n\t\t\t\t\n\t\t\t\tWhen you present Krantic with this choice, he laughs, then growls, then laughs again.\n\t\t\t\t\n\t\t\t\t\"Spacing cowards can't even kill me.  Need permission!  Zoa!  Listening, Zoa?  You're a spacing coward, Zoa!  Hear me?  Hear—\"\n\t\t\t\t\n\t\t\t\t*goto zoa_kill\n\t#…talk to him.\n\t\t*set empathy %+ 20\n\t\tHammer is on guard outside the cell door.  Krantic is squatting on the bench inside the decontamination chamber, tearing at a sandwich like a wild animal.  The room is revolting; clearly he's been using his own bodily wastes to make some kind of point.  You can't imagine how he stands the smell.\n\t\t\n\t\tYou use the communications panel and try to open a dialogue, but Krantic refuses to answer, or even look your way.\n\t\t\n\t\t\"Is this work—\" you start to ask Hammer, when Krantic suddenly throws himself against the cell door, hard enough to send blood dripping down his face.\n\t\t\n\t\t\"Kill you, Stashie, gonna kill you, Stashie,\" he chants, laughing almost too hard to get the words out.\n\t\t\n\t\tSuddenly, Zoa's voice blares, \"Report to my office, ${name}, and stop baiting the lunatic.\"  Hammer must have called her.\n\t\t\n\t\tYou jog to her office, knowing she hates to wait.\n\t\t*page_break\n\t\t*goto confab\t\t\n\t#…bring friends and give him a beating.\n\t\t*set infamy %+ 20\n\t\tYou choose your companions carefully—some of the younger pirates, with the proper appetite for this sort of adventure.  They all have grievances against Krantic.\n\t\t\n\t\tYou wait until one of them is on guard duty, and gather outside Krantic's cell.  When the guard opens the door, the smell hits you like a Z-ball in the face.  You peer inside.  The room is revolting; clearly Krantic has been using his own bodily wastes to make some kind of point.\n\t\t\n\t\t\"Come in!\" cackles Krantic, standing with arms open wide between walls smeared with his own filth.\n\t\t\n\t\t\"${name}!\" Zoa voice blares out of a nearby communications panel.  \"Stop acting like a Stashie gang leader and report to my office!\"\n\t\t\n\t\tYou step forward, and get in one good punch, right in that manic smile, before the guard closes the door.  If you're going to endure Zoa's icy disapproval, you may as well have a satisfying memory to keep you warm.\n\t\t*page_break\n\t\tYou think of your fist connecting with Krantic's face while Zoa scolds you, and then tells you to remain.\n\t\t*goto confab\t\t\n\t#Ask Zoa about his past.\n\t\t*goto confab\n\n*label position\nWith Krantic gone, Zoa reorganizes the crew.\n\n*if (infamy > 70)\n\tShe is impressed by your behavior during the 4-7-2 mission, and gives you a position of responsibility on the Reckless as a junior officer.  Most of the other pirates respect your authority, and Gao begins to tutor you in the business of smuggling.\n\t\n\t*goto onwards\n*elseif (infamy > 50)\n\tYou've earned some respect by your behavior on 4-7-2, and you enjoy the admiration of your crewmates.  Zoa doesn't officially acknowledge your accomplishments, but she does instruct Gao to begin teaching you the business of smuggling, so you can assume she has plans for your future.\n\t\n\t*goto onwards\n*else\n\tYour position on the Reckless is secure, now that you've proved your loyalty and worth on 4-7-2.  You have to start on the bottom, directing the cleaning robots and monitoring the recyclers, but so did every other pirate.\n\t\n\t*goto onwards\n*label onwards\n*if (vermite_state \u003c 2)\n\tThe Reckless returns to its regular route.\n\t*goto ny_future\n\n*elseif (vermite_state = 2)\n\tThe Reckless returns to its regular route, and you talk to the vermite every day, trying to duplicate the education it would have received from its tenders.  \n\t*set infamy %+ 15\n\tFinally, you succeed in training it to follow ordinary computer commands.  It is salable, and profitable.  Your persistence earns Zoa's respect.\n\t*goto ny_future\n*else\n\tThe Reckless establishes a very successful trade in vermite.\n\t*goto ny_future\n\t\n*label ny_future\n*if (nybat_rom \u003c 2)\n\t*page_break\n\t*goto vikola\n*elseif (nybat_rom = 2)\n\t*page_break\n\tYou move into Ny-bat's more spacious quarters; ${n_he}'s clearly devoted, though you're not sure how you feel about a long-term commitment.  You have fun spending evenings at home together, but is it just fun you want, or something more?\n\t\t\t\n\t*goto roommates\n*else\n\tYou move into Ny-bat's more spacious quarters, and the best hours of the day are the evenings you spend together.\n\t*label roommates\n\t\t\t\n\tYou argue about where it's acceptable to throw dirty clothes and where it's not, and whose turn it is to prune the ceiling ivy—but that's what lovers do when they first share living space.  You play ${n_him} your favorite music.  $!{n_he} cooks food from Planet Evergreen for you.  You learn to read ${n_his} feelings from the look on ${n_his} face, even when ${n_he}'s doing ${n_his} impression of an impassive android.\n\t\n\tOne morning you wake to find a note from Ny-bat requesting your presence in the ship's sole vista bubble.  The sign on the ladder says \"Closed for Repairs,\" but you climb up anyway, and find Ny-bat alone, with the stars all around ${n_him}.  $!{n_he} asks you to marry ${n_him}, and you answer:\n\t*choice\n\t\t#Yes.\n\t\t\t*set nybat_rom 3\n\t\t\t*set nybat_with true\n\t\t\tYou knock Ny-bat back into the transparent wall with your enthusiastic response.\n\t\t\t\n\t\t\tThough your life doesn't change much after you and Ny-bat are married, everything is different.  You should have known—you've spent enough time in vacuum—it's the tether that lets you fly.\n\t\t\t\n\t\t\t*goto vikola\n\t\t#No.\n\t\t\t*set nybat_with false\n\t\t\t*set nybat_ally false\n\t\t\t*set nybat_rom 1\n\t\t\tYou move back to your own quarters after that—Ny-bat is tense and awkward around you now.  You miss ${n_his} companionship, but it's important to you to remain free.\n\t\t\t\n\t\t\t*goto vikola\n\t\n*label vikola\nYou settle into your new role, and the crew learns to accept you, with one notable exception.  Vikola simply will not stop working against you, and you've tried all but the most extreme solutions.  It's time to…\n*choice\n\t#…pay her to leave the Reckless.\n\t\t*set infamy %- 15\n\t\t*if (vermite_state > 1)\n\t\t\tYou've made enough money from the sale of vermite to pay Vikola a hefty bribe.\n\t\t\t*label v_gone\n\t\t\tShe's unhappy on the Reckless, anyway, now that her cadre of followers have ceased to blindly follow.\n\t\t\t\n\t\t\tThe next time you dock for station leave, Vikola departs on another pirate ship, without a word of farewell to anyone.\n\t\t\t\n\t\t\t*goto epilogue\n\t\t*else\n\t\t\tIt wipes out your accounts, but you are able to offer Vikola a hefty bribe.\n\t\t\t*goto v_gone\n\t#…\"accidentally\" leave her behind on a station.\n\t\t*set infamy %+ 15\n\t\t*set empathy %- 10\n\t\tThe next time you dock for station leave, you make sure Vikola hears about an incredible opportunity to buy borals by the sackful on the planet below.  She would have time to make it there and back with just a few more hours of leave, which you promise to arrange…except you tell Zoa that Vikola has jumped ship, and Reckless may as well go.\n\t\t\n\t\tZoa gives you a long, hard look, and you're sure she knows what you're doing.  But Utambu corroborates your story—he hates Vikola's constant mocking—and Zoa decides to take off, leaving Vikola behind.\n\t\t\n\t\t*goto epilogue\n\t#…beat her senseless, with a few of my friends.\n\t\t*set infamy %+ 15\n\t\t*set empathy %- 20\n\t\t*if (strength > 74)\n\t\t\tYou corner Vikola in the training room, as your friends circle up.  Utambu guards the door; he hates Vikola's constant mocking.  \n\t\t\t\n\t\t\tYou take Vikola on yourself, to make sure she gets the right message.  You drop her to the mat with two quick punches, and step back, point made.  Unfortunately for Vikola, the others you've brought with you all want to land a few kicks while she's down.  When they're done, they drop her bloody and battered into a medibed.\n\t\t\t\n\t\t\tVikola leaves you alone after that.\n\t\t\t\n\t\t\t*goto epilogue\n\t\t*elseif (nybat_ally)\n\t\t\tYou enlist Ny-bat's help, and the two of you corner Vikola in the training room.  Ny-bat gives Vikola a professional, impersonal beating.  $!{n_he} announces ${n_his} intention to break her arm, and reminds her that ${n_he} will have no difficulty breaking it again and again if she does not begin to treat you with respect.  Then, crack!  And the two of you drop her bloody and battered into a medibed.\n\t\t\t\n\t\t\tVikola leaves you alone after that.\n\t\t\t\n\t\t\t*goto epilogue\n\t\t*else\n\t\t\tYou corner Vikola in the training room, as your friends circle up.  Utambu guards the door; he hates Vikola's constant mocking.\n\t\t\t\n\t\t\tThere's nothing elegant or sophisticated about this fight; Vikola drops to the mat after one good punch, and you all kick her a few times to make your point.  When everyone is done, they drop her bloody and battered into a medibed.\n\t\t\t\n\t\t\tVikola leaves you alone after that.\n\t\t\t\n\t\t\t*goto epilogue\n\n*label epilogue\n*page_break\n*gosub zeeberoffer\n*page_break Epilogue\nEpilogue\n*gosub family_check\nAs time passes, the Reckless becomes so successful that Zoa decides to expand her operation and set up a partner ship.\n*if (infamy > 70)\n\tShe offers you the captaincy of the new vessel, the Shipwreck, and assigns Ny-bat as your second, so that you can benefit from ${n_his} experience. Technically you will still answer to Zoa in matters of business strategy, but most of the time you will making your own decisions.\n\t*choice\n\t\t#I accept.\n\t\t\t*set ship_name \"Shipwreck\"\n\t\t\t*set nybat_with true\n\t\t\t*set position \"Captain\"\n\t\t\t*achieve captain\n\t\t\t*set infamy %+ 25\n\t\t\t*goto choose_sw\n\t\t#I express my desire to remain on the Reckless.\n\t\t\t*set ship_name \"Reckless\"\n\t\t\t*set position \"Second\"\n\t\t\t*achieve second\n\t\t\t*set infamy %+ 15\n\t\t\tZoa does not understand your request—she has no concept of home or family—but she is willing to grant it.  She offers you the position of second on the Reckless, with the crew you now trust with your life, and gives Ny-bat the captaincy of the Shipwreck.\n\t\t\t\n\t\t\t*gosub ny_separate\n\t\t\t\n\t\t\t*goto crew\n\t\t#I suggest that Ny-bat deserves to be captain.\n\t\t\t*set ship_name \"Shipwreck\"\n\t\t\t*set position \"Second\"\n\t\t\t*achieve second\n\t\t\t*set infamy %+ 15\n\t\t\t*set nybat_with true\n\t\t\tZoa does not understand why you would settle for less, but she willingly makes Ny-bat the captain of the Shipwreck, and assigns you to serve as ${n_his} second.\n\t\t\t\n\t\t\t*goto choose_sw\n\t\t\n*elseif (infamy > 50)\n\t*set position \"Second\"\n\t*achieve second\n\tShe gives Ny-bat the captaincy of the new vessel, the Shipwreck, and offers you the position of second on the Reckless.\n\t*choice\n\t\t#I accept.\n\t\t\t*set infamy %+ 15\n\t\t\t*set ship_name \"Reckless\"\n\t\t\tThe Reckless is your home now, and you trust the crew with your life.\n\t\t\t\n\t\t\t*gosub ny_separate\n\t\t\t\n\t\t\t*goto crew\n\t\t#I ask to serve under Ny-bat instead.\n\t\t\t*set ship_name \"Shipwreck\"\n\t\t\t*set infamy %+ 15\n\t\t\t*gosub ny_together\n\t\t\t*set nybat_with true\n\t\t\tZoa grants your request, and makes you Ny-bat's second in command.\n\t\t\t\n\t\t\t*goto choose_sw\n\t\t#I protest that I deserve to captain the Shipwreck.\n\t\t\t*set ship_name \"Shipwreck\"\n\t\t\t*set infamy %+ 20\n\t\t\t*set nybat_with true\n\t\t\t\"Space is dangerous,\" Zoa says.  \"Perhaps something will happen to Ny-bat or myself, and you'll end up captain after all….\"\n\t\t\t\n\t\t\tYou wonder uneasily exactly how she came to be in possession of the Reckless in the first place. \n\t\t\t\n\t\t\tIn the meantime, though, Zoa decides to make you second on the Shipwreck.\n\t\t\t\n\t\t\t*goto crew\n*else\n\t*set position \"Officer\"\n\tShe gives Ny-bat the captaincy of the new vessel, the Shipwreck, and offers you a choice.  You'll be a junior officer on whichever ship you choose.\n\t*choice\n\t\t#I ask to stay on the Reckless.\n\t\t\t*set infamy %-15\n\t\t\t*set ship_name \"Reckless\"\n\t\t\tThe Reckless is your home now, and you trust the crew with your life.  That's more important to you than advancing through the ranks.\n\t\t\t\n\t\t\t*gosub ny_separate\n\t\t\t\n\t\t\t*goto crew\n\t\t#I join the Shipwreck crew.\n\t\t\t*set infamy %+ 10\n\t\t\t*set ship_name \"Shipwreck\"\n\t\t\t*set nybat_with true\n\t\t\t*gosub ny_together\n\t\t\t\n\t\t\t*label choose_sw\n\t\t\tYour new vessel, the Shipwreck, looks unremarkable, but carries the best engines and weapons money can buy.  And, of course, it has a vermite seal.\n\t\t\t\n\t\t\t*goto crew\t\t\t\n\t\t#I demand a bigger promotion.\n\t\t\t*set infamy %+ 20\n\t\t\t*set ship_name \"Shipwreck\"\n\t\t\t*set position \"Second\"\n\t\t\t*achieve second\n\t\t\tZoa appreciates ambition, and assigns you the position of second on the Shipwreck.\n\t\t\t\n\t\t\t*gosub ny_together\n\t\t\t*goto choose_sw\n\n*label crew\nAs the crew is dividing between the two ships, is there anyone you'd like to ask to join you on the ${ship_name}?\n*if (adopt = 2)\n\t*set zeeber_with true\n\t(Of course Zeeber will stay with you—she's your daughter now.)\n\t*goto crew_choice\n*elseif (zeeber_fate = 1)\n\t*set zeeber_with true\n\t(Of course Zeeber will stay with you; you've taken responsibility for her, at least to some extent.)\n\t*goto crew_choice\n*else\n\t*label crew_choice\n\t*choice\n\t\t#Gao.\n\t\t\t*if (gao_ally)\n\t\t\t\t*set gao_with true\n\t\t\t\t*gosub gaocheck\n\t\t\t\tGao agrees—the two of you are becoming friends.\n\t\t\t\t*goto final\n\t\t\t*else\n\t\t\t\tGao declines—he wants to live on the other ship, and has no particular loyalty to you.\n\t\t\t\t*goto final\n\t\t#Utambu.\n\t\t\t*set utambu_with true\n\t\t\t*gosub utambucheck\n\t\t\tUtambu happily accepts—he is grateful to you for dealing with Vikola.\n\t\t\t*goto final\n\t\t*if (zeeber_fate = 2) #Zeeber.\n\t\t\t*if (zeeber_ally)\n\t\t\t\t*set zeeber_with true\n\t\t\t\t*gosub zeebercheck\n\t\t\t\tZeeber is grateful for the attention, and agrees to your request.\n\t\t\t\t*goto final\n\t\t\t*else\n\t\t\t\tZeeber doesn't trust your motives, since you haven't helped her in the past.  She chooses the other ship.\n\t\t\t\t*goto final\n\t\t#Hammer.\n\t\t\t*if (infamy > 75)\n\t\t\t\t*set hammer_with true\n\t\t\t\tHammer grudgingly agrees to serve under you for a while.  If the ${ship_name} makes money, and you impress him with your performance, he'll stay.\n\t\t\t\t*goto final\n\t\t\t*else\n\t\t\t\tHammer refuses—he's not convinced you're tough enough to make money as a pirate.\n\t\t\t\t*goto final\n\t\t#No one.\n\t\t\t*goto final\n\n*label final\nThe ${ship_name} prospers, with your help.\n*if (position = \"Officer\")\n\tAs an officer, you negotiate with the ${ship_name}'s established contacts, load cargo, and manage the ship's resupply.  You face danger alongside the crew, and so they become loyal to you.\n\t*goto respect\n*elseif ((position = \"Second\") and (ship_name = \"Reckless\"))\n\tZoa contines to handle the financial side of the Reckless, making contacts and establishing trade routes.  As her second, you command the ground team, meeting with aliens, loading cargo, and balancing risk and reward.  You face danger alongside the crew, and so they become loyal to you.\n\t*goto respect\n*elseif ((position = \"Second\") and (ship_name = \"Shipwreck\"))\n\tNy-bat handles the financial side of the Shipwreck, making contacts and establishing trade routes.  As his second, you command the ground team, meeting with aliens, loading cargo, and balancing risk and reward.  You face danger alongside the crew, and so they become loyal to you.\n\t*goto respect\n*else\n\tAs the captain, you handle the financial decisions, making useful contacts and establishing profitable new trade routes, balancing risk and reward.  You leave the ship much more often than Zoa did, creating strong relationships with suppliers and customers, and facing danger alongside the crew, so that they become loyal to you.\n\t*goto respect\n*label respect\nYou use a careful mix of reliability and toughness to command the respect of space-hardened smugglers.\n\n*if ((nybat_with = true) and (nybat_rom = 3))\n\tYou forge a relationship with Ny-bat based on love and trust, and become an unbeatable married team, able to anticipate each other's actions even when a dangerous situation separates you.\n\t*goto gao_fate\n*elseif (nybat_with)\n\tYou and Ny-bat form an incredible partnership, and become an unbeatable command team.\n\t*goto gao_fate\n*else\n\t*label gao_fate\n\t*page_break\n\t*if (gao_with)\n\t\tGao serves as your mentor, teaching you the business of smuggling.  By the time he retires, you know how to analyze a commodities market, decode a tax system, and choose the most profitable cargo.  Gao still handles the crew's investments, so the ${ship_name} regularly stops by his station to conduct business and take shore leave.\n\t\t*goto utambu_fate\n\t*else\n\t\t*label utambu_fate\n\t\t\n\t\t*if (utambu_with)\n\t\t\tUtambu gains self-confidence, and turns the ${ship_name} into the fastest single-engine hauler in human space.  He falls in love with a fellow hacker he's never met and brings her on board.  They have the first baby to be born on the ${ship_name}, but not the last.\n\t\t\t*goto hammer_fate\n\t\t*else\n\t\t\t*label hammer_fate\n\t\t\t*if (hammer_with)\n\t\t\t\n\t\t\t\tHammer learns to respect you, after you've planned a few successful smuggling runs.  You use him more as a deterrent to violence than as an enforcer, and as he gets older, he appreciates the change.\n\t\t\t\t*goto zeeber_end\n\t\t\t*else\n\t\t\t\t*label zeeber_end\n\t\t\t\t*if (adopt = 2)\n\t\t\t\t\n\t\t\t\t\tZeeber stays with you for four rotations.  She loves you, unreservedly, but remains troubled.  Eventually,\n\t\t\t\t\t*if (position = \"Captain\")\n\t\t\t\t\t\tyou \n\t\t\t\t\t\t*label origins\n\t\t\t\t\t\ttake the ship into Sandovali space, and help Zeeber trace her origins back to a Sandovali pirate attack on a human trading caravan.  Now Zeeber knows where she can from, and understanding her past seems to bring her some peace.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto other_ship\n\t\t\t\t\t*else\n\t\t\t\t\t\tyou convince the captain to\n\t\t\t\t\t\t*goto origins\n\t\t\t\t*elseif (zeeber_fate = 1)\n\t\t\t\t\n\t\t\t\t\tZeeber stays on board for more four rotations.  Though her quality of life improves thanks to you, she remains troubled, quick to fear and slow to trust.  When she has completed a Basic Education certificate, she finds a job as a translator, on a trader where she can use her knowledge of Sandovali language and culture.  You hope that facing her past as a Sandovali slave will bring Zeeber some peace.\n\t\t\t\t\t*goto other_ship\n\t\t\t\t*elseif ((zeeber_fate = 2) and (zeeber_with = true))\n\t\t\t\t\t\n\t\t\t\t\tZeeber stays aboard the ${ship_name} for a couple more rotations, and then disappears.  You're not surprised she didn't announce her departure; she remained troubled, quick to fear and slow to trust.  You hope that she finds some way to face her traumatic past, wherever she is.\n\t\t\t\t\t*goto other_ship\n\t\t\t\t*else\n\t\t\t\t\t*label other_ship\n\t\t\t\t\t\n\t\t\t\t\tYou meet up with the\n\t\t\t\t\t*if (ship_name = \"Reckless\")\n\t\t\t\t\t\tShipwreck\n\t\t\t\t\t\t*goto other\n\t\t\t\t\t*else\n\t\t\t\t\t\tReckless\n\t\t\t\t\t\t*label other\n\t\t\t\t\t\ta few times a rotation, whenever one of the ships needs more cargo space or a show of force.  Your partner ship seems to fare as well as your own.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*goto ending\n\n*label ending\n*page_break\nEvery year,\n*if ((nybat_with = true) and (nybat_rom > 1))\n\tNy-bat and\n\t*goto wrap\n*else\n\t*label wrap\n\tyou put a little aside for your retirement dream—a ship of your own.  There are aliens who've never met a human, worlds that no human has ever seen.\n\t\n\tThere's a lot of galaxy out there, and your adventures are just beginning.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\tFor now, though, the ${ship_name} is your home, and you find it hard to believe you were ever a Stashie.  When the engines are roaring in the background and the ship is in motion, you feel a contentment deeper than any rational explanation.  Life has its ups and downs, but you know that as long as you are going somewhere, you're fine.  You suppose that makes you a Shipper, but if it makes you crazy, well, you're in good company.\n\t\n\t*goto_scene ending\t\t\t\t\n\n*label ny_together\n*if (nybat_rom = 3)\n\tOf course, you would never want to be apart from Ny-bat.\n\t*return\n*else\n\t*return\n\t\t\n*label ny_separate\n*if (nybat_rom = 3)\n\tNy-bat is distressed—${n_he} doesn't understand why you would choose to live apart from ${n_him}.\n\t*choice\n\t\t#I join Ny-bat on the Shipwreck after all.\n\t\t\t*set ship_name \"Shipwreck\"\n\t\t\t*set nybat_with true\n\t\t\t*goto choose_sw\n\t\t#I dissolve my marriage to Ny-bat.\n\t\t\t*set ship_name \"Reckless\"\n\t\t\t*set nybat_with false\n\t\t\t*set nybat_ally false\n\t\t\t*set nybat_rom 1\n\t\t\tNy-bat is heartbroken.  You're glad you'll be living on separate ships now.\n\t\t\t*return\n\t\t#I ask Ny-bat to stay on the Reckless…for me.\n\t\t\t*set ship_name \"Reckless\"\n\t\t\tYou beg Ny-bat to stay on the Reckless with you; it's your home now, and your crewmates are your family.  Ny-bat must truly love you, because ${n_he} agrees.\n\t\t\t*return\n*else\n\t*return\n\t\n*label zeeberoffer\n*if (adopt > 1)\n\t*return\n*elseif (zeeber_fate = 3)\n\t*goto group\n*elseif ((adopt = 1) and (resist = true))\n\t*set zeeber_fate 3\n\t*label group\n\tWith Zoa's permission, you leave Zeeber in a therapeutic setting on the next human world you come to.  You hope that with the proper help she'll be able to face the traumas of her past, and find some peace.\n\t*return\n*else\n\tAs time passes, you notice that Zeeber seems adrift among the adults of the Reckless crew.  She is treated with scorn by some, and with haphazard kindness by others, but mostly, she is ignored.\n\t\n\tYou decide to…\n\t*choice\n\t\t*if (adopt = 0) #…adopt her.\n\t\t\t*set adopt 2\n\t\t\t*set zeeber_fate 0\n\t\t\t\n\t\t\t\"And then what, when you get sick of me?  You'll find a ship that needs a drudge?\" Zeeber asks, after you make your offer.\n\n\t\t\t\"Of course not!\" you say, saddened by how little Zeeber expects from people.  \"You'll live with me as long as you want to…\"\n\t\t\t\t\t\t\n\t\t\tYou stop because Zeeber is crying so hard, and you put your arms around her.  She clings to you like she's jumped out an airlock and you're her tether.  You realize you are a parent now.  You have a daughter to protect.  The knowledge changes you in some way you can't quantify; you only feel a vast and subtle rearrangement inside you, a shift of tectonic plates.\n\t\t\t*page_break\t\t\t\t\t\n\t\t\t*gosub zeebercheck\n\t\t\t*return\n\t\t#…take over her education.\n\t\t\t*set zeeber_fate 1\n\t\t\t*gosub zeebercheck\n\t\t\tYou reduce Zeeber's work hours and arrange a course of computerized learning that will enable her to earn a Basic Certificate in a few years.  She'll need that if she ever wants to get a job on a legal trader.\n\t\t\t*return\n\t\t#…speak to the crew about their treatment of her.\n\t\t\t*set zeeber_fate 1\n\t\t\t*gosub zeebercheck\n\t\t\tYou remind the crew that they are raising a child together, and scold them for their treatment of Zeeber.  You outlaw the practice of giving Zeeber laundry or other personal chores, so that she only works the official shifts she's assigned.  Since she'll have more time on her hands, you arrange a course of computerized learning that will enable her to earn a Basic Certificate in a few years.  She'll need that if she ever wants to get a job on a legal trader.\n\t\t\t*return\n\t\t#…suggest she might be happier in a foster home, groundside.\n\t\t\t*set zeeber_fate 2\n\t\t\tZeeber practically spits, she's so enraged by this suggestion.  You stomp away, muttering that the only thing you can do for her is leave her alone.\n\t\t\t*return\n\t\t#…drop her off at a therapeutic group home.\n\t\t\t*set zeeber_fate 3\n\t\t\tYou leave Zeeber in a therapeutic setting on the next human world you come to.  She is hysterically opposed to this plan, but you hope that with the proper help she'll be able to face the traumas of her past, and find some peace.\n\t\t\t*return\n\t\t#…leave her be.  She'll toughen up.\n\t\t\t*set zeeber_fate 2\n\t\t\tThe best thing you can do for Zeeber is just to leave her alone, and perhaps give her some more adult responsibilities.  She'll earn the pirates' respect, just as you did.\n\t\t\t*return\n\n\n*label zeebercheck\n*if (adopt = true)\n\tZeeber will, of course, stay with you—she's your daughter now.\n\t*return\n*else\n\t*return\n*label nybatcheck\n*if (nybat_ally)\n\t*return\n*else\n\t*set nybat_ally true\n\t*set allies + 1\n\t*return\n*label gaocheck\n*if (gao_ally)\n\t*return\n*else\n\t*set gao_ally true\n\t*set allies + 1\n\t*return\n*label utambucheck\n*if (utambu_ally)\n\t*return\n*else\n\t*set utambu_ally true\n\t*set allies + 1\n\t*return\n*label family_check\n*if ((kids = true) and (so = \"none\"))\n\tYou haven't forgotten your children back on the station.\n\t*label ex\n\tA pirate ship is no place to raise kids, but you have enough money now to make sure they have the best education possible.  They live with your ex, but you visit often.\n\t*return\n*elseif (kids = true)\n\t*if (nybat_rom = 1)\n\t\tYou haven't forgotten your family back on the station.  Eventually, Zoa agrees to hire your ${so} as well, and ${n_he} and your children join you on the Reckless.  \n\t\t*return\n\t*else\n\t\tYou haven't forgotten your family back on the station.  Your children are overjoyed to find out you are still alive, and you have a happy reunion when the Reckless stops at Dekara.  Your visit home is marred only by the necessity of telling your ${so} that you are with Ny-bat now.\n\t\t\n\t\t*goto ex\n*elseif ((kids != true) and (so != \"none\"))\n\tYou haven't forgotten your ${so} back on the station.\n\t*if (nybat_rom = 1)\n\t\tEventually, Zoa agrees to hire ${n_him}, and ${n_he} joins you on the Reckless.\n\t\t*return\n\t*else\n\t\tYou let ${n_him} know that you are alive, but break off the relationship since you are with Ny-bat now.\n\t\t*return\n*else\n\t*return\n\t", "pits": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*temp reason false\n*temp command false\n*temp simple false\n*if (crew = true)\n\t*gosub entrance\n\t\"We've certainly found the vermite,\" says ${second}.  \"But how do they get it out of here?\"\n\t\t\n\t\"It flows up and out,\" you say, craning your neck back to stare at the ceiling.  \"And I bet the Medusi are up there, too.\"\n\t*page_break\n\t*label how_up\n\tYou run your hand over the vermite column; it's smooth as glass.\n\t*if (speakvermite = false)\n\t\tYou know that vermite can change state—from a solid, to a viscous liquid—and that it can obey the commands of a computer.  But there is no control panel here, and even if there was, it wouldn't be programmed with human language commands.\n\t\t\n\t\t\"If there's no control panel, how did the Medusi speak to the vermite?\" you muse aloud to Gao, who has come over to help.  \"Medusi must speak directly to vermite, in their own electrical language.\"\n\t\t\n\t\tAnd you have something that translates human language into electrical signals, don't you?  You might be able to talk to the vermite if you adapted a…\n\t\t*choice\n\t\t\t#…breather.\n\t\t\t\t*label wrong_gadget\n\t\t\t\t*set level %- 10\n\t\t\t\t*set hacking %- 20\n\t\t\t\t\"Huh?  We could use a speech box,\" Gao suggests, looking at you like you're a bit of an idiot.\n\t\t\t\t\n\t\t\t\t*goto adapt_box\t\t\t\n\t\t\t#…speech box.\n\t\t\t\t*set level %+ 15\n\t\t\t\t*set hacking %+ 15\n\t\t\t\t*label adapt_box\n\t\t\t\tYou pry off the cover of your speech box, and take a few minutes to run a bit of conduit right to the vermite, so that it has direct, physical contact.  You assume the vermite doesn't respond to \"spoken\" electrical language bandied about the room, because that would be fatal on a starship.\n\t\t\t\t*gosub talk_vermite\n\t\t\t\n\t\t\t\t*goto up\t\t\n\t\t\t#…projectile weapon.\n\t\t\t\t*goto wrong_gadget\n\t\t\t#…pair of goggles.\n\t\t\t\t*goto wrong_gadget\n\t*else\n\t\tYou've already learned how to speak to vermite, stars be thanked.  You press the conduit of your adapted speech box up against the smooth column, and croon, \"Let us up, love.  Good vermite.  Take us up, darling.\"\n\t\t\t\t\n\t\t*label up\n\t\tYou almost lose your balance as your hand sinks into the column.  The vermite is now a viscous fluid, though it still maintains its outward shape.  You were hoping for stairs, or the Medusi equivalent, but it looks as though you'll have to swim through the slime if you want to proceed.\n\t\t\n\t\t*if ((leader = \"Gao\") or ((leader = \"Ny-bat\") and (nybat_rom \u003c 2)))\n\t\t\t\n\t\t\t\"We'll swim up—there's no point in anything else,\" says ${leader}. \"You first, ${name}.\"\n\t\t\t\t\t\t\n\t\t\t*label swim\n\t\t\tYou inch a foot into the column and draw it back out, testing the vermite to see if it will release you to take breaths.  You try not to imagine the vermite hardening with you inside, since you are determined to take this risk.\n\t\t\t\n\t\t\tYou take a deep breath, and immerse yourself in the vermite.  The slime feels silky against your exposed hands and face, like synthetic cooking oil.  You push off from the ground, and shoot up much farther than you expected—the vermite is helping, undulating, so that you are swimming with the waves to a high, high shore.  You poke your head out of the vermite whenever you need a breath, and notice that your face is perfectly dry and slime-free every time.\n\t\t\t*page_break\n\t\t\t*goto_scene newcrater\n\t\t*else\t\t\n\t\t\t\"I'll go first,\" you say.\n\t\t\t\n\t\t\t*goto swim\n*else\n\t*gosub entrance\n\tSome Medusi are gathered at the base of the column, and before your astonished eyes, they enter it one after another and begin to swim upwards.\n\t*if (prisoner = false)\n\t\tThe Assistant Foreperson suddenly blocks your path.\n\t\t*label test\n\t\t\n\t\t\"Alien proof above First Level.  But this locality Medusi are tenders, not Levelers, and understanding cognitive ability not all-sufficient criteria.  To vermite decision.  If alien ascension, agreement possibility,\" it says.\n\t\t*page_break\n\t\tThe last Medusa swims upwards, and you are left alone in the vast cavern with the towering column of vermite. You run your hand over the column; it's smooth as glass.  You knock on it once, just to confirm that it is solid and completely impregnable.\n\t\n\t\tYou know that vermite can change state—from solid, to a viscous liquid—and that it can obey the commands of a computer.  But there is no control panel here, and even if there was, it wouldn't be programmed with human language commands.\n\t\n\t\t\"If there's no control panel, how did the Medusi speak to the vermite?\" you muse aloud.  \"Medusi must speak directly to vermite, in their own electrical language.\"\n\t\n\t\tAnd you have something that translates human language into electrical signals, don't you?  You might be able to talk to the vermite if you adapted a…\n\t\t*choice\n\t\t\t#…breather.\n\t\t\t\t*label wrong\n\t\t\t\t*set level %- 10\n\t\t\t\t*set hacking %- 10\n\t\t\t\tYou look at the gadget, but realize you don't even know how to begin modifying it.\n\t\t\t\t\n\t\t\t\tAfter all, it's your speech box that translates alien languages.  \n\t\t\t\t\n\t\t\t\t*goto adapt_box_alone\t\t\n\t\t\t#…speech box.\n\t\t\t\t*set level %+ 15\n\t\t\t\t*set hacking %+ 15\n\t\t\t\t*label adapt_box_alone\n\t\t\t\tYou pry off the cover of your speech box, and take a few minutes to run a bit of conduit right to the vermite, so that it has direct, physical contact.  You assume the vermite doesn't respond to \"spoken\" electrical language bandied about the room, because that would be fatal on a starship.\n\t\t\t\t*gosub talk_vermite\n\t\t\t\t*set empathy %+ 10\n\t\t\t\t\n\t\t\t\t*goto swim\n\t\t\t#…projectile weapon.\n\t\t\t\t*goto wrong\n\t\t\t#…pair of goggles.\n\t\t\t\t*goto wrong\t\t\t\t\t\t\n\t*else\n\t\tThe Assistant Foreperson releases your arm.\n\t\t*goto test\n\t\t\n*label entrance\nYou enter an immense cavern at the heart of the volcano.  The ground is pocked with craters where lava once burst up from below, and these pits are filled with translucent slime—vermite.  You peer into a pit as you pass it, and the shaft goes down far into the earth, down to the source of the lava.\n\nIn the center of the chamber, a column of gleaming vermite stretches up taller than a starship, punching through the distant ceiling.  Daylight filters down through the milky spear, bouncing off irregular concentrations of vermite, creating stars and nebulae.\n\n*return\n\n*label talk_vermite\nTime to test your theory.  How do you intend to speak to the vermite?\n*choice\n\t#Commandingly.\n\t\t*label command\n\t\t*set infamy %+ 10\n\t\t*set command true\n\t\t\"I command you to open!  Open!  Liquefy!  Soften!  Dissolve!\" You become more frustrated as you wrack your brain for synonyms.  \"Lift!  Take up!  Space yourself!\"\n\t\t\t\n\t\tThe vermite is unresponsive, a glass wall.  Maybe you should try another tactic.  You could talk to it as if it were…\n\t\t*choice\n\t\t\t*if (reason = false) #…a reasonable adult.\n\t\t\t\t*goto reason\n\t\t\t*if (simple = false) #…a small child.\n\t\t\t\t*goto simple\n\t\t\t#…a cute baby.\n\t\t\t\t*goto love\n\t#Lovingly.\n\t\t*set empathy %+ 5\n\t\t*set level %+ 15\n\t\t*label love\n\t\t*set persuasiveness %+ 5\n\t\t*set empathy %+ 5\n\t\t\"You're some good vermite, yes you are,\" you croon.  \"Now let me in, little darling, open up.  Everything's spaceworthy.  I won't hurt you.  You're a darling column of…\"\n\t\t\t\n\t\tYou stop when the vermite begins to soften.  You've done it!  Clearly the tenders raise the vermite with love, before it develops enough to understand computer commands.  You didn't expect that of the pompous Medusi.\n\t\t\t\n\t\tThe vermite begins to harden again, so you resume your coaxing.  \"That's right, sweetheart, show me how to go up…\"  You keep up a steady stream of patter, and the vermite becomes a viscous fluid, while still holding its shape.\n\t\t*page_break\n\t\t*return\n\t#Simply.\n\t\t*set persuasiveness %+ 10\n\t\t*set level %+ 10\n\t\t*label simple\n\t\t*set persuasiveness %+ 5\n\t\t*set simple true\n\t\t\"I go up,\" you say, slowly and carefully.  \"Vermite change, so I go up.\"\n\t\t\t\n\t\tYou feel a ripple beneath the hand that is pressing the conduit to the vermite, a vibration.  It's a response, though not exactly what you were hoping for.  You're almost on the right track.\n\t\t\t\n\t\tYou remember how the Medusi spoke of the vermite during the negotiations.  Perhaps you should treat it like…\n\t\t*choice\n\t\t\t*if (reason = false) #…a reasonable adult.\n\t\t\t\t*goto reason\n\t\t\t#…a cute baby.\n\t\t\t\t*goto love\n\t\t\t*if (command = false) #…a computer.\n\t\t\t\t*goto command\n\t#Rationally.\n\t\t*label reason\n\t\t*set level %+ 10\n\t\t*set reason true\n\t\t\"I need to follow the Medusi,\" you explain to the vermite, feeling slightly silly.  \"I need to rise to the top of the volcano, and this is the only way.  Please do whatever it is you do to lift people up.\"\n\t\t\t\t\n\t\tNothing happens.  Perhaps your language was a bit overly elaborate; you are talking to a collection of microorganisms, after all.  Next, you  imagine the vermite is…\n\t\t*choice\n\t\t\t*if (command = false) #…a computer.\n\t\t\t\t*goto command\n\t\t\t*if (simple = false) #…a small child.\n\t\t\t\t*goto simple\n\t\t\t#…a cute baby.\n\t\t\t\t*goto love", "prisoner": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*comment ñáéç…—\n*temp workout false\n*temp play true\n\nYou are forced to grab what sleep you can on a mattress in the comm room, under the alert eyes of the pirates on the night shift.\n\nIn the morning, a pirate escorts you to the tiny bathroom off the main bridge, and graciously agrees to wait outside the door.  There is no other way out of the bathroom, after all.\n\nWhile you are enjoying a long shower, you hear the door open.  You expect to hear the voice of your current guard, hurrying you towards breakfast.  The metal stall door hides you—and your unexpected visitor—from each other's view, so you are startled to hear Krantic's eerie voice instead of your guard's.\n\n\"Come out, come out, come out and play, Stashie,\" he sings.\n\n\"Space yourself,\" you reply, furious.\n\nYou don't know how he does it from out there, since the control panel is in the stall with you, but suddenly the water is freezing cold.  You slam your hand on the panel to shut if off, though you've still got soap in your hair.  The humiliation inherent in the situation only makes you angrier.\n*choice\n\t#\"I'm calling my guard,\" I say icily.\n\t\t*goto nofun\n\t#\"I'm recording this.  Leave now or the captain hears it,\" I tell him.\n\t\t*set infamy %+ 5\n\t\t*goto nofun\n\t#\"I'll kill you in your sleep for this,\" I threaten.\n\t\t*set infamy %+ 10\n\t\t*goto nofun\n\t*if (nybat_ally) #\"I'm calling Ny-bat.  Ready for a beating?\" I taunt.\n\t\t*set infamy %+ 5\n\t\t*goto nofun\n\t#I grab my towel and stomp out to him.\n\t\t*set infamy %+ 15\n\t\tYou walk right up to Krantic and his manic grin, unembarrassed and unafraid.  \n\t\t\n\t\t\"You can't hurt me.  So seal it and get out.\"\n\t\t*goto nofun\n\n*label nofun\n\"Aw, you're no fun anymore,\" Krantic says.  His voice becomes a fierce whisper.  \"I can't hurt you now.  Captain rules the ship.  But we won't always be on the ship, and what Zoa doesn't know can't get me spaced.\"\n\nKrantic bangs the door as he leaves.  You suppose you are relatively safe from him—for now.\n*page_break\n*if (already_hazing)\n\t*goto ally\n*else\n\tAt breakfast, as you fill your tray with fresh bread and stewed dehydrated fruit, Vikola motions for your guard to seat you next to her.\n\n\t\"Look at me, saying a friendly good morning to our prisoner,\" Vikola says, as soon as you slide onto the bench.  \"The Stashie's caused some trouble, but we are supposed to forgive that, since we're such forgiving people—space!\"  She overturns your hot fruit with a grand gesture you don't believe was accidental.  You jump up before you get burned.  Every pair of eyes at the table turns towards you—suddenly, you're the center of attention.  \n\t\t\n\t\"Real sorry,\" Vikola says, but she can't hide a nasty smile. You…\n\t*choice\n\t\t#…pretend it was an accident, but sneak in a insult.\n\t\t\t\"That's all right.  We all get clumsy as we get older.\"\n\t\t\t*set infamy %+ 15\n\t\t\t*set level %+ 5\n\t\t\t*label witty\n\t\t\t*set persuasiveness %+ 5\n\t\t\tThe crew laughs at Vikola's expense.  You wipe yourself off, reputation intact.  Vikola seethes, her fingers whitening as she attempts to strangle a spoon.\n\t\t\t*label utambu_smiles\n\t\t\tUtambu flashes you a wide grin, teeth bright against his dark skin.\n\t\t\t\n\t\t\t*label next_victim\n\t\t\t\"Got something to say, Utambu-Crisp?\" Vikola asks.\n\t\t\t\t\t\t\t\n\t\t\tUtambu just stares into his fruit, crestfallen. You decide to…\n\t\t\t*choice\n\t\t\t\t#…defend him.\n\t\t\t\t\tUtambu might make a good ally, or even a friend.\n\t\t\t\t\t*set utambu_ally true\n\t\t\t\t\t*set allies +1\n\t\t\t\t\t*set empathy %+15\n\t\t\t\t\t*if (persuasiveness > 70)\n\t\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t\t\"Utambu knows it's no use talking to a wall, Vicious-Vikola,\" you retort.  The crew laughs, and you hear someone repeat \"Vicious-Vikola.\"  The nickname is so apt, it might stick.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label defended\n\t\t\t\t\t\tVikola scowls.  Utambu looks at you gratefully.  You've made an ally, and your reputation with the crew doesn't seem to have suffered.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto ally\n\t\t\t\t\t*elseif (persuasiveness > 45)\n\t\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t\t\"Nothing simple enough for you to understand, Vikola,\" you say. A few of your kidnappers struggle to hide amused smiles.\n\t\t\t\t\t\n\t\t\t\t\t\t*goto defended\n\t\t\t\t\t*else\n\t\t\t\t\t\t\"Utambu doesn't pick on people.  He leaves that to you,\" you say.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tThe crew does not seem impressed by your moralizing.  Utambu looks grateful, though.  You've made an ally with useful skills, if not popularity.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto ally\n\t\t\t\t#…join in the mocking.\n\t\t\t\t\tAs a prisoner, your future may depend on your reputation with the crew.  You'll do what it takes to get in their good graces.\n\t\t\t\t\t\n\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\t\"Utambu-Crisp?  Now that's a story I've got to hear,\" you say, smiling confidently at the crew in general.  One of the men takes the bait, launching into a story about how Utambu set himself on fire while experimenting in his lab.  You laugh heartily at the end of the tale, and since you're such a good audience, the crew eagerly shares some of the funnier mishaps of their voyage, laughing with you, not at you.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tUtambu stays silent, though, and won't meet your eyes.  You feel you've missed an opportunity to make an ally, but it was probably worth it, to establish your standing as one of the crew.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto ally\n\t\t\t\t#…concentrate on my food.\n\t\t\t\t\tWhatever happens between Vikola and Utambu is none of your business.\n\t\t\t\t\t\n\t\t\t\t\t\"Utambu-Crisp has a nasty habit of setting himself on fire,\" says Vikola.  \"You might want to stay out of his lab when he's 'experimenting.'\"  The crew chuckles, doubtless remembering an incident of engineering gone awry.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tUtambu won't meet your eyes.  You feel you've missed an opportunity to make an ally, but then again, you refrained from associating yourself with an obviously unpopular crew member.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto ally\n\t\t#…retort angrily.\n\t\t\t\"When I need forgiveness from a limp-fisted pirate, I'll ask for it,\" you snap.\n\t\t\t*set infamy %+ 10\n\t\t\t*label angry\n\t\t\t\n\t\t\tVikola jumps up, red-faced and clutching a spoon.  \"No one talks to me like that,\" she snarls.\n\t\t\t\t\t\t\t\n\t\t\t*label nybat_calms\n\t\t\tBefore you can respond, Ny-bat rises and places a hand on Vikola's arm.\n\t\t\t\n\t\t\t\"No brawling in the mess,\" ${n_he} says.  $!{n_his} deep voice has a ring of calm authority to it.\n\t\t\t\t\t\t\t\n\t\t\tVikola shrugs off his hand, but she sits.\n\t\t\t*got
