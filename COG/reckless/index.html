_cave\n\n*label run\nYou dash after the retreating Medusi, your feet pounding across the black rock.  Your breath catches in your throat; the soupy air isn't conducive to exertion.  You strain for the sound of firing weapons, but the crew isn't shooting at the moment, stars be thanked.\n*return\n\n*label krantic_shot\n*if (gun = true)\n\t*set infamy %+ 15\n\t*gosub new_leader\n\tKrantic stumbles to the ground, screaming, with bullets in both legs.  You were aiming for the heart, but you still managed to remove him from the fight.  Chaos erupts, as some pirates cluster around Krantic, some back away, and some point their weapons towards you.  You holster your gun, indicating that you have no intention of shooting anyone else.  Krantic's screams are cut off abruptly; someone must have rendered him unconscious.  You can't see his head, only the legs Utambu is spraying; foam makes a good pressure bandage in emergency situations.\n\n\tThe Medusi are fleeing towards the cave entrance, dragging their wounded, their massive bodies oddly nimble as they run.  You…\n\t*choice\n\t\t#…abandon the pirates and join the Medusi in the cave.\n\t\t\t*gosub run\n\t\t\tProbably they are busy sorting out who will lead the ground team now.\n\t\t\t*goto solo_exit\n\t\t#…stay and reason with the more reasonable members of the Reckless crew.\n\t\t\t*gosub calm\n\t\t\t\t\t\t\t\n\t\t\t\"Medusi speak through electrical discharge,\" you remind them.  \"When they yell, they throw sparks.  They didn't mean to hurt anyone.  But Krantic was determined to start a war.\"\n\t\t\t\t\n\t\t\t\"None of us are going to pity Krantic, ${name}.  You did what had to be done,\" says Gao.\n\t\t\t\t\t\t\t\t\t\n\t\t\t*if (leader = \"you\")\n\t\t\t\t*label youlead_exit\n\t\t\t\tNy-bat thinks for a moment.  \"You are the only one innocent of The Mushroom's kidnapping.  If you explain the misunderstanding, perhaps we can still salvage this mission.  We'll follow you for now.  Of course, the captain will eventually have to decide what to do with you.\" \n\t\t\t\t\n\t\t\t\tYou stare in shock for a moment, as you realize that you are now in command of the Reckless delegation.  Then you quickly give your orders.  The pirate who was struck by the bolt of electricity is beginning to recover; you leave her in charge of monitoring Krantic (now restrained with foam) and updating the captain.\n\t\t\t\t\n\t\t\t\tYou and the rest of the pirates set out at a run for the cave the Medusi fled to, feet pounding across the black rock.\n\t\t\t\t*gosub affection\t\t\n\t\t\t\tYour thick breaths catch in your throat; the soupy air isn't conducive to exertion.  Soon the jagged roof of the cave looms over you like a monstrous black overbite.\n\t\t\t\t*set crew true\n\t\t\t\t*page_break Chapter Five: Into the Dark\n\t\t\t\t*goto_scene crew_cave\t\t\t\t\n\t\t\t*else\n\t\t\t\t\"You are the only one innocent of The Mushroom's kidnapping.  If you explain the misunderstanding, perhaps we can still salvage this mission.  Of course, the captain will eventually have to decide what to do about you shooting Krantic,\" ${leader} says.\n\n\t\t\t\t*goto group_exit\n*else\n\t*set medusi_strength -2\n\tYou raise your gun and press the archaic mechanical trigger.  Nothing happens.  All the indicator lights are green, but the weapon won't fire.  The pirates gave you a dud, in case you turned on them.\n\t\t\n\tKrantic laughs at you and shoots at a fleeing Medusa.\n\t*label bad_gun\n\tThe aliens are speeding towards the cave entrance, their massive bodies oddly nimble as they run.\n\t\t\n\t*if (leader = \"Krantic\")\n\t\tYou hear several pirates open fire, and see two more Medusi slump to the ground before the aliens disappear into the dark volcano.  You…\n\t\t*choice\n\t\t\t#…stay and try to reason with the more reasonable members of the crew.\n\t\t\t\t*set leader \"Ny-bat\"\n\t\t\t\t*if n_he = \"she\"\n\t\t\t\t\t*set l_he \"she\"\n\t\t\t\t\t*set l_his \"her\"\n\t\t\t\t\t*set l_him \"her\"\n\t\t\t\t\t*goto leader_stops\n\t\t\t\t*else \n\t\t\t\t\t*goto leader_stops\n\t\t\t#…abandon the pirates, and join the Medusi in the cave.\n\t\t\t\tThey'll make better allies than these trigger-happy pirates.\n\t\t\t\t*gosub run\n\t\t\t\tMaybe they are unclear on whether you're an admissible target or not.\n\t\t\t\t*goto solo_exit\n\t*elseif ((leader = \"Gao\") or (leader = \"Ny-bat\"))\n\t\t*label leader_stops\n\t\t\"Don't shoot!\" yells ${leader}.  $!{l_he} points ${l_his} own gun at Krantic, and the grim set of ${l_his} mouth says ${l_he} will shoot if ${l_he} has to, clearer than any words.\n\t\t*label disarm\n\t\t\"Utambu, take his weapon.\"\n\t\t\t\t\n\t\tUtambu edges closer to Krantic as a trainer might approach a circus lion, ever aware that lions are never truly tamed.  He snatches Krantic's gun and scoots quickly away.\n\t\t\t\t\n\t\tKrantic smiles ironically.  \"The aliens are getting away while you mess around here.  You should worry about them, not me.\"\n\t\t\t\t\n\t\t\"But we always worry about you,\" ${leader} says.\n\t\t\t\t\n\t\tYou…\n\t\t*choice\n\t\t\t#…stay and reason with ${leader} and the others.\n\t\t\t\t*gosub calm\n\t\t\t\t*gosub explain\n\t\t\t\t\"You are the only one innocent of The Mushroom's kidnapping.  If you explain the misunderstanding, perhaps we can still salvage this mission,\" ${leader} says, ignoring Krantic.\n\t\t\t\t\n\t\t\t\t*goto group_exit\t\t\n\t\t\t#…abandon the pirates, and join the Medusi in the cave.\n\t\t\t\tThe aliens will make better allies than the pirates.\n\t\t\t\t*gosub run\n\t\t\t\tHopefully there won't be any more shooting, now that Krantic has been disarmed.\n\t\t\t\t*goto solo_exit\n\t*else\n\t\t*label second_stops\n\t\t\"Don't shoot!\" yells Ny-bat.  $!{n_he} points ${n_his} own gun at Krantic, and the grim set of ${n_his} mouth says ${n_he} will shoot if ${n_he} has to, clearer than any words.\n\t\t*label second_disarm\n\t\t\"Utambu, take his weapon.\"\n\t\t\n\t\tUtambu edges closer to Krantic as a trainer might approach a circus lion, ever aware that lions are never truly tamed.  He snatches Kranic's gun and scoots quickly away.\n\t\t\t\t\n\t\tKrantic smiles ironically.  \"The aliens are getting away while you mess around here.  You should worry about them, not me.\"\n\t\t\n\t\t\"But we always worry about you,\" Ny-bat says.\n\t\t\t\t\n\t\tYou…\n\t\t*choice\n\t\t\t#…stay and take charge of the pirates.\n\t\t\t\t*gosub calm\n\t\t\t\t*gosub explain\n\t\t\t\t*set crew true\n\n\t\t\t\t*goto youlead_exit\n\t\t\t#…abandon the pirates, and join the Medusi in the cave.\n\t\t\t\t*set leader \"Ny-bat\"\n\t\t\t\t*if n_he = \"she\"\n\t\t\t\t\t*set l_he \"she\"\n\t\t\t\t\t*set l_his \"her\"\n\t\t\t\t\t*set l_him \"her\"\n\t\t\t\t\t*goto solo_exit\n\t\t\t\t*else \n\t\t\t\t\t*goto solo_exit\n\n*label new_leader\n*if (leader = \"Krantic\")\n\t*set leader \"Ny-bat\"\n\t*if n_he = \"she\"\n\t\t\t*set l_he \"she\"\n\t\t\t*set l_his \"her\"\n\t\t\t*set l_him \"her\"\n\t\t\t*return\n\t*else\n\t\t*return\n*else\n\t*return\n\n*label calm\n*if (calm = false)\n\t*set calm true\n\t\"Everyone just calm down,\" you say, making eye contact with Gao, Utambu, Ny-bat—the more reasonable members of the Reckless delegation.\n\t*return\n*else\n\t*return\n\n*label explain\n*set level %+ 5\n*if (ex = false)\n\t*set ex true\n\t\"Medusi speak through electrical discharge,\" you remind them.  \"When they yell, they throw sparks.  They didn't mean to hurt anyone.\"\n\n\t\"Seal it!\" Krantic shouts.  He turns to the crew.  \"${name} is just buying time for the aliens to get away.  I'm in command here; when I say shoot, you shoot!\"\n\n\t*return\n*else\n\t*return\n\n*label lose_nybat\n*if (nybat_rom > 1)\n\t*set nybat_rom 1\n\t*set nybat_ally false\n\tNy-bat comes over to you; you raise your arm, intending to wrap it momentarily around ${n_his} waist, but ${n_he} bends to whisper, \"I see I was mistaken in you.  Consider this the end of any intimacy we shared,\" and stalks off.\n\t\n\t*return\n*elseif (nybat_ally = true)\n\t*set nybat_ally false\n\tNy-bat shakes ${n_his} head at you, sadly.  \"You have lost my trust, ${name}.  You should not be so quick to use violence.\"\n\t\n\tYou suppose Ny-bat is too much of a pacifist for your taste, anyway.\n\t\n\t*return\n*else\n\n\t*return\n\n*label affection\n*if (nybat_rom > 1)\n\tNy-bat squeezes your arm as ${n_he} lopes past, and the brief gesture of affection reminds you that you are not alone on this adventure anymore.\n\t*return\n*else\n\t*return", "crew_cave": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\nInto the Dark\n(Chapter 5 of 6)\n\nThe interior of the cave is a hollow tube stretching back into the mountain, a channel carved by molten lava. The curving walls look organic, the smooth sides of a gigantic throat.\n\nThe Medusi have already passed out of sight around a curve in the tunnel ahead.  You take a minute to draw some oxygen from your emergency breather, a gadget the shape of a miniature flute, and see others doing the same.\n*if (leader = \"you\")\n\tYou lead the crew through the ever-narrowing tunnel.\n\t*goto through\n*else\n\t${leader} leads the crew through the ever-narrowing tunnel.\n\t*goto through\n*label through\t\nAt the first bend, you take a last look at the brilliant outdoors, before rounding the corner and plunging into gloom.  Your goggles automatically begin to emit a soft white light and to enhance your low-light vision. You see the branching of the tunnel clearly, but entirely in shades of gray. As you stop to make a decision, you are surrounded by beings with glowing eyes—the ground team, of course, with their goggles shining like yours.\n\nZeeber, who has been sniffing around the entrances like a security dog at a spaceport, jumps up with her fingers spread wide in front of her face.\n\n\"Slime!\" she says triumphantly.  \"They went this way!\"\n\nOr they wanted you to think that.\n\n*if (leader = \"you\")\n\tYou could…\n\t*choice\n\t\t#…enter the slimed tunnel.\n\t\t\t*goto slime\n\t\t#…follow the dry tunnel\n\t\t\t*set dry_first true\n\t\t\t*goto_scene ambush\n\t\t#…split my forces, and send a group down each tunnel.\n\t\t\t*set crew_strength -7\n\t\t\t*set split true\n\t\t\t*set level %+ 5\n\t\t\t*set infamy %+ 5\n\t\t\t*set second \"Gao\"\n\t\t\t\"We should split up,\" you propose.  \"That way, we double our chances of finding the Medusi and their vermite.\"\n\t\t\t\t\t\t\n\t\t\t\"But there will be so few of us—what if it comes to a fight?\" Utambu asks.\n\t\t\t\n\t\t\t\"It's the only way to ensure that we take the right path,\" you say.  \"Our goggles' signals can't penetrate the mountain.  So we will explore for two kiloseconds and then turn back if we've seen nothing but empty tunnels.\"\n\t\t\n\t\t\tYou look over your glowing troops, considering.  \"I'll take you two, plus Zeeber, Utambu, and Gao.  Ny-bat, will you lead the other six?\"\n\t\t\t\t\n\t\t\t\"Of course,\" answers Ny-bat calmly.\n\t\t\t\n\t\t\t\"Stars with you,\" you say.  \"We'll take the…\"\n\t\t\t*label which_tunnel\n\t\t\t*choice\n\t\t\t\t#\"…slimed one.\"\n\t\t\t\t\t*goto slime\n\t\t\t\t#\"…dry one.\"\n\t\t\t\t\t*set dry_first true\n\t\t\t\t\t*goto_scene ambush\n*elseif ((leader = \"Gao\") or (leader = \"Ny-bat\"))\n\t\"Options?  Opinions?\" asks ${leader}.\n\t\n\t*choice\n\t\t#\"We should follow the trail.\"\n\t\t\t\"Otherwise, we could end up wandering through the volcano for days without finding anything,\" you point out.\n\t\t\t\n\t\t\t${leader} agrees with your reasoning.\n\t\t\t*goto slime\n\t\t#\"We should take the dry tunnel.\"\n\t\t\t\"Left-behind mucus could be a trick,\" you point out.\n\t\t\t\n\t\t\t${leader} agrees with your reasoning.\n\t\t\t*set dry_first true\n\n\t\t\t*goto_scene ambush\n\t\t#\"We should split up.\"\n\t\t\t\"Send one group through each tunnel.  That way, we double our chances of finding the Medusi and their vermite,\" you propose.\n\t\t\t*set infamy %+5\n\t\t\t*set level %+ 5\n\t\t\t*set crew_strength -7\n\t\t\t*set split true\n\t\t\t\n\t\t\t\"But they'll be so few of us—what if it comes to a fight?\" Utambu asks.\t\n\t\t\t\t\t\t\n\t\t\t\"It's the only way to ensure that we take the right path,\" says ${leader}.  \"Our goggles' signals can't penetrate the mountain.  So we will explore for two kiloseconds and then turn back if we've seen nothing but empty tunnels.\"\n\t\t\t\t\t\t\n\t\t\t${leader} studies the ground team, considering.  \"I'm sending you two with the Stashie, plus Zeeber, Utambu, and\n\t\t\t*if (leader = \"Gao\")\n\t\t\t\t*set second \"Ny-bat\"\n\t\t\t\tNy-bat as second-in-command.  You'll take the dry one.\"\n\t\t\t\t*set dry_first true\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene ambush\n\t\t\t*else\n\t\t\t\t*set second \"Gao\"\n\t\t\t\tGao as second-in-command.  You'll take the dry one.\"\n\t\t\t\t*set dry_first true\n\t\t\t\t*goto_scene ambush\n*else\n\t\"Space take those ground grubbing mushrooms!\" Krantic shouts.  \"We'll follow the trail, and shoot our way out if it's a trap.\"\n\t\t\n\tYou…\n\t*choice\n\t\t#…stay quiet, and follow Krantic.\n\t\t\t*goto slime\n\t\t#…insist on the dry tunnel, because the other might be a trap.\n\t\t\t*set infamy %+5\n\t\t\t*label split_up\n\t\t\t*set crew_strength -7\n\t\t\t*set second \"Ny-bat\"\n\t\t\t*set split true\n\t\t\t*set dry_first true\n\t\t\t\"I've had enough of you, Stashie,\" says Krantic.  \"You take the other tunnel, and get lost and left behind with the fungi. Before I decide to skin you instead.\"\n\t\t\t\t\t\t\n\t\t\tYou peer down the tunnel, prepared to explore on your own, but Ny-bat steps towards you.  \"I'll accompany ${name},\" ${n_he} says.  \"We have a better chance of finding the vermite if we explore both tunnels.\"\n\t\t\t\t\t\t\n\t\t\t\"I'll go, too,\" says Gao.\n\t\t\t\t\t\t\n\t\t\t\"Make it an expedition, then!\" Krantic says with ominously false cheer.  He assigns Zeeber, Utambu, and two other pirates to your group, and then stalks off down the slimed tunnel.\n\t\t\t*page_break\n\t\t\t*goto_scene ambush\n\t\t#…suggest that Krantic split his forces.\n\t\t\tThat will double your chance of finding the vermite.\n\t\t\t\n\t\t\t*set infamy %+5\n\t\t\t*set level %+ 5\n\t\t\t*goto split_up\n\t\t\t\n*label slime\nYou and your companions enter the right-hand tunnel, following a trail of thick, wet goo.\n*goto_scene trap\t\n\n\t\t\n\t", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Reckless Space Pirates.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "hazing": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*comment ñáéç…—\n*set crew true\n*set already_hazing true\n*if (chained = false)\n\t*gosub description\n\t\n\tUtambu leads you past a hovering visual projector playing a cartoonish space battle to a small serving table laden with fresh bread, green soup, and stewed dehydrated fruit.  You load up a bowl and plate, and turn to the long table where several pirates are seated.\n\t*goto start\n*else\n\tBack in the mess hall, the serving table is laden with fresh bread, green soup, and stewed dehydrated fruit.  You load up a bowl and plate, and turn to the long table where several pirates are seated.\n\t*goto start\n\t\n*label start\nVikola and Ny-bat are there, along with three crew members you haven't met yet.  Vikola beckons you over, still sneering.  The gesture seems more like a challenge than a friendly invitation.  You decide to…\n\n*choice\n\t#…sit across from her.\n\t\t*set infamy %+ 10\n\t\tYou place your bowl on the table, across from Vikola's.  Utambu hesitates, then walks around to sit beside you.\n\t\t\t\t\n\t\t\"This here's ${name}, the Stashie, fresh hire,\" Vikola says, as soon as you slide onto the bench.  \"Caused some trouble, but we are supposed to forgive that, since we're such forgiving people—space!\"  She has overturned your hot soup with a grand gesture you don't believe was accidental.  You jump up before you get burned.  Every pair of eyes at the table turns towards you.  Suddenly, you're the center of attention.\n\t\t*goto spilled\n\t#…sit beside her.\n\t\t*set infamy %+ 12\n\t\tYou place your bowl on the table, next to Vikola's.  Utambu hesitates, then walks around to the other side, so he can sit across from you.\n\t\t\t\t\n\t\t\"This here's ${name}, the Stashie, fresh hire,\" Vikola says, as soon as you slide onto the bench.  \"The Stashie's caused some trouble, but we are supposed to forgive that, since we're such forgiving people—space!\"  She has overturned your hot soup with a grand gesture you don't believe was accidental.  You jump up before you get burned.  Every pair of eyes at the table turns towards you.  Suddenly, you're the center of attention.  \n\t\t*label spilled\n\t\t\t\t\n\t\t\"Real sorry,\" Vikola says, but she can't hide a nasty smile. You…\n\t\t*choice\n\t\t\t#…pretend it was an accident, but sneak in a insult.\n\t\t\t\t\"That's all right.  We all get clumsy as we get older.\"\n\t\t\t\t*set infamy %+ 15\n\t\t\t\t*set level %+ 5\n\t\t\t\t*label witty\n\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\tThe crew laughs at Vikola's expense.  You wipe yourself off, reputation intact.  Vikola seethes, her fingers whitening as she attempts to strangle a spoon.\n\t\t\t\t*label utambu_smiles\n\t\t\t\tUtambu flashes you a wide grin, teeth bright against his dark skin.\n\t\t\t\t\n\t\t\t\t*label next_victim\n\t\t\t\t\"Got something to say, Utambu-Crisp?\" Vikola asks.\n\t\t\t\t\t\t\t\t\n\t\t\t\tUtambu just stares into his soup, crest-fallen.  You decide to…\n\t\t\t\t*choice\n\t\t\t\t\t#…defend him.\n\t\t\t\t\t\tUtambu might make a good ally, or even a friend.\n\t\t\t\t\t\t*set utambu_ally true\n\t\t\t\t\t\t*set allies +1\n\t\t\t\t\t\t*set empathy %+15\n\t\t\t\t\t\t*if (persuasiveness > 70)\n\t\t\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t\t\t\"Utambu knows it's no use talking to a wall, Vicious-Vikola,\" you retort.  The crew laughs, and you hear someone repeat \"Vicious-Vikola.\"  The nickname is so apt, it might stick.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*label defended\n\t\t\t\t\t\t\tVikola scowls.  Utambu looks at you gratefully.  You've made an ally, and your reputation with the crew doesn't seem to have suffered.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto krantic\n\t\t\t\t\t\t*elseif (persuasiveness > 45)\n\t\t\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t\t\t\"Nothing simple enough for you to understand, Vikola,\" you say. A few of your crewmates struggle to hide amused smiles.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto defended\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"Utambu doesn't pick on people.  He leaves that to you,\" you say.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe crew does not seem impressed by your moralizing.  Utambu looks grateful, though.  You've made an ally with useful skills, if not popularity.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto krantic\n\t\t\t\t\t#…join in the mocking.\n\t\t\t\t\t\tSomeone has to be on the bottom rung of the social ladder, and you'd rather it wasn't you.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\t\t\"Utambu-Crisp?  Now that's a story I've got to hear,\" you say, smiling confidently at the crew in general.  One of the men takes the bait, launching into a story about how Utambu set himself on fire while experimenting in his lab.  You laugh heartily at the end of the tale, and since you're such a good audience, the crew eagerly shares some of the funnier mishaps of their voyage, laughing with you, not at you.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tUtambu stays silent, though, and won't meet your eyes.  You feel you've missed an opportunity to make an ally, but it was probably worth it, to establish your standing as one of the crew.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto krantic\n\t\t\t\t\t#…concentrate on my food.\n\t\t\t\t\t\tWhatever happens between Vikola and Utambu is none of your business.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Utambu-Crisp has a nasty habit of setting himself on fire,\" says Vikola.  \"You might want to stay out of his lab when he's 'experimenting.'\"  The crew chuckles, doubtless remembering an incident of engineering gone awry.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tUtambu won't meet your eyes.  You feel you've missed an opportunity to make an ally, but then again, you refrained from associating yourself with an obviously unpopular crew member.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto krantic\n\t\t\t#…retort angrily.\n\t\t\t\t\"When I need forgiveness from a limp-fisted pirate, I'll ask for it,\" you snap.\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*label angry\n\t\t\t\t\n\t\t\t\tVikola jumps up, red-faced and clutching a spoon.  \"No one talks to me like that,\" she snarls.\n\t\t\t\t\t\t\t\t\n\t\t\t\t*label nybat_calms\n\t\t\t\tBefore you can respond, Ny-bat rises and places a hand on Vikola's arm.\n\t\t\t\t\n\t\t\t\t\"No brawling in the mess,\" ${n_he} says.  $!{n_his} voice has a ring of calm authority to it.\n\t\t\t\t\t\t\t\t\n\t\t\t\tVikola shrugs off his hand, but she sits.\n\t\t\t\t*goto utambu_smiles\n\t\t\t#…reply, \"Luckily, I'm the forgiving type, too.\"\n\t\t\t\t*set infamy %- 15\n\t\t\t\tAs you wipe yourself off, you hear snorts of laughter from around the table.  You glance up at your new crewmates, and intercept a few predatory smiles.  The pirates seem to think you're an easy target now, all except Ny-bat and Utambu, who gives you a small sympathetic smile.\n\t\t\t\t\t\t\t\t\n\t\t\t\t*goto next_victim\n\t\t\t#…loom over her threateningly.\n\t\t\t\tYou can't show weakness, or the whole crew will think you're an easy target.\n\t\t\t\t*label loom\n\t\t\t\tYou lean over Vikola, taking full advantage of your intimidating position.  You make your voice hard, and your face grim.  \"Is there a problem?\" you ask.\n\t\t\t\t\t\t\t\t\n\t\t\t\t*if ((infamy > 45) or (strength >= 75))\n\t\t\t\t\t*set infamy %+ 15\n\t\t\t\t\tVikola seethes, but can't meet your eyes.  Her fingers whiten as she attempts to strangle a spoon.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"There's no problem,\" says Ny-bat, before Vikola can find a reply.  $!{n_his} voice has a ring of calm authority to it.  \"Welcome aboard.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tYou nod and return to your seat, reputation intact.  Vikola's spoon clatters against her plate.  Her\n\t\t\t\t\t*label busy\n\t\t\t\t\tcrewmates are suddenly quite busy buttering their bread or fishing potatoes out of their soup.\n\t\t\t\t\t*goto utambu_smiles\n\t\t\t\t*elseif ((infamy > 30) or (strength > 55))\n\t\t\t\t\t*set infamy %+ 8\n\t\t\t\t\t\"You'd need a mirror to see it,\" Vikola says, beginning to stand.\n\t\t\t\t\t\n\t\t\t\t\tYou put a hand on her shoulder and easily prevent her from rising.  The result is somewhat awkward for Vikola, as she loses her balance and sticks her elbow into her buttered bread.\n\t\t\t\t\t\n\t\t\t\t\t\"No brawling in the mess,\" Ny-bat says.  $!{n_his} voice has a ring of calm authority to it.\n\t\t\t\t\t\n\t\t\t\t\t\"Was that a brawl?\" you ask, returning to your seat. Your\n\t\t\t\t\t*goto busy \n\t\t\t\t*else\n\t\t\t\t\t*set infamy %- 15\n\t\t\t\t\t\"Am I supposed to be scared?\" Vikola asks with a malicious grin.  \"Why don't you sit down, before you strain something.  You being the delicate type, and all.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tThe crew laughs at you, all except Ny-bat and Utambu.  You slouch back to your seat.  Unfortunately, you're simply not that intimidating.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tUtambu gives you a small sympathetic smile.\n\t\t\t\t\t\n\t\t\t\t\t*goto next_victim\n\t#…sit as far from her as possible.\n\t\t*set infamy %- 5\n\t\tYou find a place at the far end of the long, narrow table.  Utambu hesitates, then follows you, placing his bowl across from yours.\n\t\t\t\n\t\t\"Too shy to sit with your fellow crew?  Or too afraid?\" Vikola taunts, as soon as you slide onto the bench.  Every pair of eyes at the table turns towards you.  Suddenly, you're the center of attention.  You…\n\t\t*choice\n\t\t\t#…ignore her.\n\t\t\t\t*set infamy %- 10\n\t\t\t\tYou refuse to participate in Vikola's infantile game.  Unfortunately, the crew seems to interpret your silence as weakness rather than maturity.\n\t\t\t\t*goto more_taunts\n\t\t\t#…joke, \"Definitely too afraid.  The last time I sat down next to a strange dog, I got bitten.\"\n\t\t\t\t*set level %+ 5\n\t\t\t\t*set infamy %+ 15\n\t\t\t\tThe crew laughs at Vikola's expense.  Vikola seethes, her fingers whitening as she attempts to strangle a spoon.\n\t\t\t\t\n\t\t\t\t*goto utambu_smiles\n\t\t\t#…retort, \"Just smart enough to know who's worth sitting with.\"\n\t\t\t\t*set infamy %+ 10\n\t\t\t\t*goto angry\n\t\t\t#…reply, \"I keep myself to myself. I'm not trying to make trouble.\"\n\t\t\t\t*set infamy %- 10\n\t\t\t\tThe other crew members turn back to their food.  Either your confident tone convinced them that you can't be baited, or your refusal to engage made them dismiss you as a nobody.  It's hard to tell.\n\t\t\t\t*label more_taunts\n\t\t\t\t\t\t\t\t\n\t\t\t\tVikola smiles maliciously.  \"You already made trouble, see.  The problem is, you think you're better than us, even though you're nothing but a stinking Stashie.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\tYou pretend not to hear her, concentrating on buttering your bread, until the sharp clatter of a spoon dropped onto a plate makes you look up.  Vikola is standing, clearly intending to come over and make you respond.\n\t\t\t\t\t\t\t\t\n\t\t\t\t*goto nybat_calms\n\t\t\t#…stand and stalk over to her.\n\t\t\t\t*goto loom\n\t\t\t\t\n*label krantic\nUtambu tenses suddenly.  Across the table, heads snap up to focus on something behind you.  You twist around to see Krantic making his way towards you with a bounding, lopsided gait.\n\n\"Hungry, Stashie?  No time!  No time to eat!  Time to earn your food!\" he shouts, shoving your meal away.\n\nHe reaches into a back pocket and draws out a coil of black filament—an electric whip.  He drops it on the table in front of you.\n\n\"Got a job instead,\" he says.  \"The captain wants more information from The Mushroom, and thinks it might talk to you.  Do you need a script, Stashie?  Or are you smart enough to form questions all by yourself?\"\n\n\"I'm not an idiot,\" you say, reaching out for the whip.  The fibers are smooth against your palm.  You glance around the table.  When you meet Ny-bat's eyes, ${n_he} gestures minutely towards the door.\n*choice\n\t#Take Ny-bat's advice and leave.\n\t\t*set level %+ 5\n\t\tYou lurch to your feet.  You're sure the crew won't blame you for fleeing the scene; they all seem afraid of Krantic, except Ny-bat.\n\t\t\t\t\n\t\tJust as you reach the door, Krantic calls out, \"And remember, Stashie, we'll be listening!\"\t\t\n\t\t*page_break\n\t\t*goto_scene interrogation\n\t#Tell Krantic, \"I'm not afraid of you, either.\"\n\t\t*set infamy %+ 20\n\t\t\"So you are an idiot, then,\" Krantic says.  His smile is a bloody promise, the kind you hope he'll never get a chance to fulfill.\n\t\t\n\t\tYou turn your back on him and walk rigidly to the door, half expecting a knife in the back at any second.\n\t\t\n\t\tYou've proved your point, to Krantic and to the watching crew.\n\t\t*if (nybat_ally)\n\t\t\t*page_break\n\t\t\t*goto_scene interrogation\n\t\t*else\n\t\t\t*set nybat_ally true\n\t\t\t*set allies +1\n\t\t\t*page_break\n\t\t\t*goto_scene interrogation\n\t#Lash Krantic with the whip.\n\t\tSpace take the consequences—no one cuts you and gets away with it.\n\t\t\n\t\t*set crew false\n\t\tYou lurch to your feet, letting lengths of the thin, silky whip fall through your fingers.  Krantic isn't even looking at you as you thumb the power on and flick the whip against the back of his legs.  He convulses, electricity coursing through him, and falls backwards to the ground.  The crew at the table shouts in surprise.  They rush to pin your arms and pry the insulated whip-handle out of your grasp.  You don't mind too much, because Krantic has recovered enough to scream with pain and rage, and you like that sound.\n\t\t\n\t\tYou're a prisoner again, but it was worth it.\n\t\t*page_break\n\t\t*set already_hazing true\n\t\t*goto_scene prisoner\n\t\t\n*label description\nThe mess hall is one large pyramid, a style popular half a century ago.  The high pointed ceiling was thought to give an impression of openness, while conserving actual volume to be heated and oxygenated.  There's room in the wide open base of this mess hall for the whole crew to gather at the long table in the back or to circle round the holo-table in synthochairs molded for individual comfort.  You don't see a kitchen, but stairs lead down to a lower level, so it's probably somewhere below.\n\t\t\n*return", "hostage": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*comment ñáéç…—\n*temp deceive true\n*comment vermite_state 0 = no vermite 1 = fake vermite  2 = inactive vermite  3 = good vermite\n*if (trial = true)\n\tAfter 50 kiloseconds, during which the Medusi offer you putrid-smelling food and make it clear you are now a guest rather than a prisoner, Zoa opens fire.  She doesn't target the vermite dome, which would be pointless, but the wall of the crater above the dome.  The Medusi make the ceiling of the central room transparent, so you and the children can watch huge chunks of black basalt bounce off the vermite shield, followed by a rain of smaller fragments.\n\n\tYou rush back into the leader's sickroom, anxious to overhear its plans.  \"Tell me we're not going to be buried alive,\" you say.\n\n\t*label overhear\n\t*gosub plan\n\t\n\tRevealing the Medusi's trick would definitely assure your future on the Reckless.  The Medusi trust you, now that you've passed their trial, so perhaps you can use that to your advantage.  You ask the Medusi to…\n\t*choice\t\n\t\t*if (partner != \"The Mushroom\") #…send ${partner} and me out to conduct the fake negotiations.\n\t\t\t*goto allies_out\n\t\t*if (partner = \"The Mushroom\") #…send me out to conduct the fake negotiations.\n\t\t\t*label you_out\n\t\t\tThe leader agrees, delegating two adult Medusi to see you through the dome.  It gives you messages to carry to Zoa, and apologizes for returning you to your immoral fellow-humans.\n\t\t\t\n\t\t\tAs you approach the dome, another blast hits the volcano, and debris crashes down a scant half-meter in front of you.\n\t\t\t\n\t\t\t*label solo_sprint\n\t\t\tYou tap the side of your goggles to call the Reckless as soon as there's a hole for a signal to pass through.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\"Hold fire!  Crew coming through!\"\n\t\t\t\n\t\t\t*label solo_return\t\t\t\n\t\t\tYou sprint across the rock-strewn crater, towards the safety of the Reckless.  A hatch pops open to receive you, and you jump in, gasping and giddy.\n\t\t\t*page_break\n\t\t\t*goto report\n\t\t*if (partner != \"The Mushroom\") #…return ${partner} and me to the Reckless as a show of good faith.\n\t\t\t*label allies_out\n\t\t\tThe leader agrees, delegating two adult Medusi to see you through the dome.  It gives you messages to carry to Zoa, and apologizes for returning you to your immoral fellow-humans.\n\t\t\t\n\t\t\tAs you and ${partner} approach the dome, another blast hits the volcano, and debris crashes down a scant half-meter in front of you.\n\t\t\t*goto dome_exit\n\t\t*if (partner = \"The Mushroom\") #…return me to the Reckless as a show of good faith.\n\t\t\t*goto you_out\t\t\n\t\t*if (partner = \"The Mushroom\") #…take me somewhere to rest.  (And then I'll escape).\n\t\t\tThe Medusa leader agrees, and you make your way back into the great room and through the first door on your left.\n\t\t\t\n\t\t\tThe Mushroom greets you with a rippling hood and a flood of words: \"Trial success due to I, Honored Diplomat, cooperation!  Alien trustworthiness proof in eyes of tenders!  Now alien repayment Honored Diplomat, persuasion tenders not betrayal Levelers, not trade with treaty-breakers!\"\n\t\t\t\n\t\t\t\"Sure,\" you say, in no mood to argue about alien assumptions, and ask The Mushroom to…\n\t\t\t*choice\n\t\t\t\t#…let me sneak out.\n\t\t\t\t\t*label no_help\n\t\t\t\t\t\"Contradiction!  Human ally necessity remain, influence leader of tenders.  Leader gullibility of Third Level, and inexperience of youth!\"\n\t\t\t\t\t\n\t\t\t\t\t\"Of course,\" you say, realizing you'll get no help from The Mushroom.  \"I'm just feeling the effects of the Trial.  Maybe I should sleep a little.\"\n\t\t\t\t\t\n\t\t\t\t\t*goto tricked\n\t\t\t\t#…make an opening in the dome for me.\n\t\t\t\t\t*goto no_help\n\t\t\t\t#…give me some private time to recuperate.\n\t\t\t\t\t*label tricked\n\t\t\t\t\t\"Certainty.  I, Honored Diplomat, familiarity human weakness,\" it says, and leaves you alone.\n\t\t\t\t\t\n\t\t\t\t\t*goto escape_plan\t\t\t\t\t\t\n\t\t*if (partner != \"The Mushroom\") #…take me to ${partner}.  (And then I'll escape).\n\t\t\t*set infamy %+ 5\n\t\t\tThe Medusa leader agrees, and you make your way back into the great room and through the first door on your left.\n\t\t\t\n\t\t\t*if (partner = \"Zeeber\")\n\t\t\t\tZeeber dashes towards you and attaches herself to your arm.  \"We did good, yeah?\" she asks.\n\t\t\t\t\n\t\t\t\t*goto privacy\n\t\t\t*elseif (partner = \"Utambu\")\n\t\t\t\t\"Some team we make,\" Utambu jokes, sitting on the oversized pallet.\n\t\t\t\n\t\t\t\t*goto privacy\n\t\t\t*elseif (partner = \"Gao\")\n\t\t\t\t\"Not bad, kid,\" says Gao.  He leans against the wall, arms crossed.\n\t\t\t\t\n\t\t\t\t*goto privacy\n\t\t\t*else\n\t\t\t\t*if (nybat_rom > 1)\n\t\t\t\t\tNy-bat crosses to take your hand.  \"Our partnership seems rather successful so far.  I hope it will continue for some time,\" ${n_he} says.\n\t\t\t\t\t\n\t\t\t\t\t*gosub nybat_future\n\t\t\t\t\t*goto privacy\n\t\t\t\t*else\n\t\t\t\t\t\"Zoa will be pleased,\" Ny-bat says.  \"Perhaps the Medusi will negotiate with her now, thanks to us.\"\n\t\t\t\t\t\n\t\t\t\t\t*label privacy\t\t\n\t\t\t\t\t\"Can we have some privacy?\" you ask the guard at the door.\n\t\t\t\t\t\n\t\t\t\t\t\"Alien guest.  Trustworthiness proved,\" answers the Medusa.  It opaques the wall between this room and the leader's sickroom before leaving.  You deactivate your speech boxes just in case.\n\t\t\t\t\t*page_break\n\t\t\t\t\t\"Let's get out of here,\" you say to ${partner}.\n\t\t\t\t\t\n\t\t\t\t\t\"How?\" ${partner} asks skeptically.\n\t\t\t\t\t\n\t\t\t\t\tYou see three possibilities: you could suggest to the Medusi that you and ${partner} be released, to buy the Medusi time; you could explore the back door of this room, which seems to lead into the mountain itself; or you could go outside and try to talk the dome itself into letting you out, just as you coaxed the vermite column.  You and ${partner} decide to…\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#…convince the Medusi.\n\t\t\t\t\t\t\t*set persuasiveness %+ 5\n\t\t\t\t\t\t\t*goto allies_out\n\t\t\t\t\t\t#…explore.\n\t\t\t\t\t\t\t*set infamy %+ 5\n\t\t\t\t\t\t\t*label back_door\n\t\t\t\t\t\t\tYou hurtle through the back door into a vast cavern, clearly Medusi-made.  The right angles where walls meet ceiling are obviously unnatural.  There are some crates filled with unidentifiable goo next to you, but most of the cavern is full of massive liquid-filled vats, almost as tall as you and ten times as wide.  The vats seem grown, not fabricated, like hollowed out slices of a giant knobbly tree, and you wonder what is growing in them.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou ask your speech box to translate some of the markings on the sides, and it says: \"Communicators.  Healers.  Cleaners.  Measurers.  Sacraments.  Untranslatable foodstuffs.  Offspring.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAliens never cease to amaze you.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou work your way through the vats into the next, nearly identical chamber to the right.  \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tOn one side there's a door just like the entrance you used, and the passage continues forward.  The Medusi will come looking for you soon.  Which way will you go?\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#In the door.\n\t\t\t\t\t\t\t\t\tThrough the door is another Medusi home, empty, since everyone is gathered at the leader's house.  You hurry though the great room and out the front door, pulling up sharply to avoid colliding with the vermite dome.  Another blast hits the volcano, and debris crashes down a scant half-meter in front of you.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*if (partner != \"The Mushroom\")\n\t\t\t\t\t\t\t\t\t\t${partner} has attached a speech box to the vermite, and is coaxing a portal into being.\n\t\t\t\t\t\t\t\t\t\t*label dome_exit\n\t\t\t\t\t\t\t\t\t\tYou tap the side of your goggles to call the Reckless as soon as there's a hole for a signal to pass through.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"Hold fire!  Crew coming through!\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*goto sprint\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\tYou attach a speech box to the vermite, and coax a portal into being.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*goto solo_sprint\n\t\t\t\t\t\t\t\t#On to the next cavern.\n\t\t\t\t\t\t\t\t\tAs you jog between the vats, you hear the patter of hasty Medusi following after you.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*if (trial = true)\n\t\t\t\t\t\t\t\t\t\t\"Leader request presence with politeness!  Alien ally what destination?\" calls a pursuing Medusa.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tThere's no point in trying to outrun Medusi.  You let them lead you back to the leader, your escape plan a failure.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\tThe leader asks if you'd be willing to return to the Reckless as a negotiator; it trusts you completely now, even though you will have opportunity for betrayal.\n\t\t\t\t\t\t\t\t\t\t*if (partner != \"The Mushroom\")\n\t\t\t\t\t\t\t\t\t\t\tYou don't bother to hide your glee—the Medusi cannot read human body language at all, stars thanked—and ask that ${partner} be allowed to accompany you.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*goto allies_out\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\tYou don't bother to hide your glee—the Medusi cannot read human body language at all, stars thanked—and ask if you can leave immediately.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*goto you_out\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\tYou try to outrun them, but the next cavern is a dead end, and soon you have nowhere to run.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*label release\n\t\t\t\t\t\t\t\t\t\tThe Medusi drag you back to their leader, who spends a considerable amount of time cursing vile, violent, smelly humans before it declares its intentions.  It seems that the leader and Zoa have entered negotiations (a small hole was made in the dome to allow signals through) and you \n\t\t\t\t\t\t\t\t\t\t*if (partner != \"The Mushroom\")\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tand ${partner} are about to be released as a sign of good faith.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tZoa has stopped blasting for the moment, but you glance up uneasily at the rubble perched on the dome, as you pass through a portal in the vermite.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*goto sprint\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\tare about to be released as a sign of good faith.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tZoa has stopped blasting for the moment, but you glance up uneasily at the rubble perched on the dome, as you pass through a portal in the vermite.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*goto solo_return\n\t\t\t\t\t\t\t\t*if (trial = true) #Back to the leader.\n\t\t\t\t\t\t\t\t\t*set infamy %- 5\n\t\t\t\t\t\t\t\t\tThere's nothing interesting in these storage caverns, anyway.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou tell the Medusi leader that you want to return to the ship, to help deceive Zoa from there.\n\t\t\t\t\t\t\t\t\t*if (partner != \"The Mushroom\")\n\t\t\t\t\t\t\t\t\t\t*goto allies_out\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*goto you_out\n\t\t\t\t\t\t#…talk to the dome.\n\t\t\t\t\t\t\t*set level %+ 5\n\t\t\t\t\t\t\t*label front_door\n\t\t\t\t\t\t\tYou hurry into the great room.  All the Medusi children gathered there shift when you enter—watching you, you suppose—but you speed towards the front door.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tBy the time you step outside, they are all crowding behind you, curious and much too trusting.  Their hovering impedes the adults at the back of the crowd.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAnother blast hits the volcano, and debris crashes down a scant half-meter in front of you.\n\t\t\t\t\t\t\t*if (partner != \"The Mushroom\")\t\t\n\t\t\t\t\t\t\t\t${partner} has attached a speech box to the vermite, and is coaxing a portal into being.\n\t\t\t\t\t\t\t\t*goto crowd\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou attach a speech box to the vermite, and coax a portal into being.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label crowd\n\t\t\t\t\t\t\t\t*if (trial = true)\n\t\t\t\t\t\t\t\t\t\"Please explanation intentions?  Medusi ally question with politeness!\" calls an adult Medusa.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou ignore it as it tries to gently push through the children, tapping the side of your goggles and calling the Reckless as soon as there's a hole for a signal to pass through.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"Hold fire!  Crew coming through!\"\n\t\t\t\t\t\t\t\t\t*if (partner != \"The Mushroom\")\n\t\t\t\t\t\t\t\t\t\t*label sprint\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou and ${partner} sprint across the rock-strewn crater, towards the safety of the Reckless.  A hatch pops open to receive you, and you jump in, gasping and giddy.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto report\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*goto solo_return\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\"Aliens stillness!  Orders from leader!\" yells an adult Medusa.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou ignore it as it tries to gently push through the children, tapping the side of your goggles and calling the Reckless as soon as there's a hole for a signal to pass through.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"Hold fire!  Crew coming through!\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou are about to step through the portal when a flexible limb reaches over the head of child and fastens onto your shirt.  You throw yourself uselessly forward—the spacing Medusi are so strong!\n\t\t\t\t\t\t\t\t\t*if (partner != \"The Mushroom\")\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tSuddenly ${partner} slams a speech box onto the grasping limb.  The Medusa loses its grip, and ${partner} pulls you through the portal, grinning.  It seems that nominating ${partner} for the Trial has not put you beyond forgiveness, at least.\n\t\t\t\t\t\t\t\t\t\t*goto sprint\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou quickly divest yourself of your shirt, and scamper through the portal.\n\t\t\t\t\t\t\t\t\t\t*goto sprint\n*else\n\tYou are a prisoner again, but perhaps you're getting used to it; you feel much more in control this time.\n\t\n\tWhen Zoa opens fire, she doesn't target the vermite dome, which would be pointless, but the wall of the crater above the dome.  The Medusi make the ceiling of the central room transparent, so you and the children can watch huge chunks of black basalt bounce off the vermite shield, followed by a rain of smaller fragments.\n\n\t\"Tell me we're not going to be buried alive,\" you say.\n\t\n\t*gosub plan\n\t\n\tRevealing the Medusi's trick would definitely assure your future on the Reckless.\n\t*page_break\n\t\n\tYour escort drags you back into the great room and into the first door on your left.\n\t\n\t*if (partner = \"Zeeber\")\n\t\tZeeber is huddled on the oversize pallet.  \"You let them torture me,\" she accuses.\n\t\t\n\t\t\"You're fine,\" you tell her.  \"If you had trusted me more, we'd be guests instead of prisoners.\"\n\t\t\n\t\t\"Trusting people is stupid,\" Zeeber says with absolute certainty.\n\t\t\n\t\t*goto overpower\n\t*elseif (partner = \"Utambu\")\n\t\t\"Some team we make,\" Utambu grumbles, sitting on the oversized pallet.  \"I can't wait till Vikola hears that you and I spaced the vermite deal.\"\n\t\t\n\t\t\"Could be worse,\" you say.  \"We could be brain-damaged by the purple pain blobs.\"\n\t\t\n\t\t\"That's a comfort.  We'll be completely aware and in our right minds when Zoa sucks us out an airlock,\" Utambu says, some of his wry humor returning.\n\t\t\t\n\t\t*goto overpower\n\t*elseif (partner = \"Gao\")\n\t\t\"What in space were you thinking?\" Gao asks, stomping up to you with arms crossed.  \"You just spaced the vermite deal!\"\n\t\t\n\t\t\"I was thinking I didn't ask to be brought here and tortured!\" you yell back.\n\t\t\n\t\t\"That's your excuse?  Time to stop whining, and start acting like a pirate,\" Gao tells you.\n\t\t\n\t\t*goto overpower\n\t*elseif (partner = \"The Mushroom\")\n\t\tThe Mushroom greets you with writhing worms and a flood of words: \"Human failure!  Weakness and impulsiveness!  Result not influence with leader of tenders, not opportunity persuasion to refusal treaty-breakers!\"\n\t\t\n\t\tYou take it The Mushroom was hoping you would convince the Medusi leader not to trade vermite.  It really doesn't understand you.\n\t\t\n\t\t\"I can still influence the pirates,\" you say, letting The Mushroom make its own assumptions about the advice you'll give.  You ask it to…\n\t\t*choice\n\t\t\t#…let me sneak out.\n\t\t\t\t*label distrust\n\t\t\t\t\"Nonexistent advantage if human remain, yet possibility betrayal if human departure,\" muses The Mushroom, hood rippling.\n\t\t\t\t\n\t\t\t\t\"I rescued you.  You can trust me,\" you remind it.\n\t\t\t\t\n\t\t\t\t\"Not.  Time necessity for strategy contemplation.  I future return,\" says The Mushroom, and leaves you alone.\n\t\t\t\t\n\t\t\t\t*goto escape_plan\n\t\t\t#…make an opening in the dome for me.\n\t\t\t\t*goto distrust\n\t\t\t#…give me some private time to recuperate.\n\t\t\t\t\"Agreement.  Time necessity for strategy contemplation.  I future return,\" says The Mushroom, and leaves you alone.\n\t\t\t\t\n\t\t\t\t*goto escape_plan\t\t\n\t*else\n\t\t*if (nybat_rom > 1)\n\t\t\tNy-bat crosses to take your hand.  \"We must find some way to salvage this situation, so that Zoa will allow you to remain with me on the Reckless,\" ${n_he} says.\n\t\t\t\n\t\t\t*gosub nybat_future\n\t\t\t*goto overpower\n\t\t*else\n\t\t\t\"Zoa will not be pleased,\" Ny-bat says.  $!{n_his} back is to you, as ${n_he} watches the Medusi leader through the transparent wall.  \"The Medusi will refuse to negotiate, as a result of our failure.\"\n\t\t\t\n\t\t\t*label overpower\t\n\t\t\tYou glance at the Medusi guarding the door to the great room, and deactivate your speech box.  \"Let's get out of here.\"\n\t\t\t*page_break\n\t\t\t\"How?\" ${partner} asks skeptically.\n\t\t\t\n\t\t\tAnother blast hits the volcano.  \n\t\t\t\n\t\t\tYour guard shuffles nervously.  This is your opportunity to escape.\n\t\t\t\n\t\t\tFirst, you need to disable the guard for a moment—or convince it to leave for a centasecond to ask for new orders. You and ${partner} decide to…\n\t\t\t*label guard\n\t\t\t*choice\n\t\t\t\t*hide_reuse #…confuse it.\n\t\t\t\t\t*set persuasiveness %+ 10\n\t\t\t\t\t*set level %+ 5\n\t\t\t\t\t*set empathy %- 10\n\t\t\t\t\t*if ((persuasiveness > 70) or (level > 40))\n\t\t\t\t\t\tYour guard is of the First Level, so it's not too hard to convince it that it needs to return to the leader for instructions.\n\t\t\t\t\t\t*label escape_plan\n\t\t\t\t\t\tWhile it's gone, you could either dash through the back door of this room, which seems to lead into the mountain, or you could run for the front door and try to talk the dome itself into letting you out, just as you coaxed the vermite column.  You choose:\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#The back door.\n\t\t\t\t\t\t\t\t*goto back_door\n\t\t\t\t\t\t\t#The front door.\n\t\t\t\t\t\t\t\t*goto front_door\n\t\t\t\t\t*else\n\t\t\t\t\t\tYour guard is of the First Level, but it clings stubbornly to its simple orders, and won't budge.  You are forced to choose a more drastic approach.\n\t\t\t\t\t\t*goto guard\n\t\t\t\t*if (net = true) #…throw my magnetic net on it.\n\t\t\t\t\t*set empathy %- 10\n\t\t\t\t\tWithout warning, you toss your magnetic net towards the Medusa guard.  It snaps out to its full extent, and then wraps round the Medusa, the powerful magnetic tabs seeking each other behind its back.\n\t\t\t\t\t\n\t\t\t\t\tSparks fly from the spaghetti on your guard's head, but the net catches and absorbs the electricity.  You think it's safe to push past the Medusa, but you'd better do it quickly.  It's probably screaming, and anyway it only takes a minute to deactivate the net.\n\t\t\t\t\t*label door_choice\n\t\t\t\t\t\n\t\t\t\t\tYou could either dash through the back door of this room, which seems to lead into the mountain, or you could run for the front door and try to talk the dome itself into letting you out, just as you coaxed the vermite column.  You choose:\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#The back door.\n\t\t\t\t\t\t\t*goto back_door\n\t\t\t\t\t\t#The front door.\n\t\t\t\t\t\t\t*goto front_door\n\t\t\t\t*if (needle = true) #…jab it with the medibed needle.\n\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t*set empathy %- 20\n\t\t\t\t\t*set needle false\n\t\t\t\t\tAs you move closer to your guard, you tell the Medusa that ${partner} desperately needs an untranslatable.  While it stands there in confusion, you suddenly jab it in the hood with the long, thin medibed needle, embedding the needle several centimeters into Medusi flesh.  Sparks fly from the spaghetti on your guard's head.  The Medusa staggers back, trying to pull the needle out, and probably howling silently.  It turns out that a long, thin, smooth stick is extremely hard for the Medusi to grasp with the lip-like ends of the their elephant-trunk limbs.\n\t\t\t\t\t\n\t\t\t\t\tYou only have a moment before more Medusi respond to your attack.\n\t\t\t\t\t*goto door_choice\n\t\t\t\t#…bludgeon it with my speech box.\n\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t*set empathy %- 20\n\t\t\t\t\tYour speech box doesn't make much of a weapon against a huge Medusa, but perhaps you can startle your guard for a moment, just long enough for you to leave the room.  As you move closer to your guard, you tell the Medusa that ${partner} desperately needs an untranslatable.  While it stands there in confusion, you smack the sharp-cornered box into the Medusa's hood as hard as you can.\n\t\t\t\t\t\n\t\t\t\t\t*if (strength > 60)\n\t\t\t\t\t\tYour blow has enough force to draw blood, or whatever that thick yellow ooze is.  The Medusa staggers back, feeling the wound with the lip-like end of an elephant-trunk limb.  Sparks fly from the spaghetti on your guard's head, but luckily none of them hit you or ${partner}.  You have only a moment before it recovers enough to grab you, or the other Medusi respond to its silent howling.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto door_choice\n\t\t\t\t\t*else\n\t\t\t\t\t\tYour blow glances off the Medusa's thick hood.  Sparks fly from the spaghetti on your guard's head.  \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"No,\" it says, grabbing you with three limbs and smashing your speech box against the wall with another.  Circuitry, conduit, and shattered black plastic rain down on the pallet.\n\t\t\t\t\t\t\n\t\t\t\t\t\tSpace take these Medusi, anyway.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto release\n\t\t\t\t#…pretend to be injured.\n\t\t\t\t\t*set persuasiveness %+ 10\n\t\t\t\t\t*set level %+ 5\n\t\t\t\t\t*set empathy %- 10\n\t\t\t\t\tYour guard is of the First Level, and knows nothing of humans, so it isn't that hard to throw it into a panic.  You work up some spit and let it dribble down your chin.\n\t\t\t\t\t\n\t\t\t\t\t\"Oh, no!\" you cry.  \"I'm losing vital fluid!  If I bleed too much, I could die.  Quickly!  I need coffee to stop the blood!\"  You know 'coffee' will come out as untranslatable, and only add to the confusion.\n\t\t\t\t\t\n\t\t\t\t\tYour guard rushes out for help and further orders.  While it's gone, you could either dash through the back door of this room, which seems to lead into the mountain, or you could run for the front door and try to talk the dome itself into letting you out, just as you coaxed the vermite column.  You choose:\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#The back door.\n\t\t\t\t\t\t\t*goto back_door\n\t\t\t\t\t\t#The front door.\n\t\t\t\t\t\t\t*goto front_door\t\t\n\n*label plan\n\"Immediate situation not,\" says the leader.  \"Yet consequences long-term bombardment.  First, probability collapse of caverns in crater wall, containment food supply.  Second, possibility complete burial dome in rubble, consequence impossibility lower dome and sale of vermite.  New strategy requirement.\"  It outlines a plan to deceive Zoa, by pretending to surrender and loading the ship with some organic building material that looks like vermite but is much less advanced.  The Medusi will still suffer a financial loss, but they will protect the immature vermite, which can't yet understand machine commands and is not ready to be alone on a starship.\n*return\n\n*label report\nZoa listens attentively to your report, still as a cat waiting to spring.  You describe the leveling and the trial, and share your conclusions about Medusi society.\n*choice\n\t#I tell her about the Medusi's plan because I'm loyal to the Reckless.\n\t\t*set deceive false\n\t\t*set infamy %+ 20\n\t\tZoa praises you for discovering the Medusi's plan to substitute inactive slime for vermite.\n\t\t*goto zoa_choice\n\t#I tell her about the Medusi's plan because I want to get rich.\n\t\t*set deceive false\n\t\t*set infamy %+ 10\n\t\tZoa praises you for discovering the Medusi's plan to substitute inactive slime for vermite.\n\t\t*goto zoa_choice\n\t#I keep quiet, because I sympathize with the Medusi.\n\t\t*set empathy %+ 15\n\t\t*goto zoa_choice\t\t\n\t#I keep quiet to avoid being blamed for delivering bad news.\n\t\t*goto zoa_choice\n\n*label zoa_choice\nThe Reckless and the Medusi have supposedly reached an agreement, though Zoa is too suspicious of the Medusi to believe anything they say.  You have spent a few kiloseconds with the aliens, and you've proved your loyalty to the Reckless, so she wants your advice.  She outlines the possibilities open to the Reckless.  The ship could…\n*choice\n\t#…bury the Medusi dome and return to human space.\n\t\t*set empathy %- 15\n\t\t*set vermite_state 0\n\t\tYou convince Zoa that the Medusi will never give up actual vermite, no matter what they promise, and that there is nothing to be gained by staying on 4-7-2.\n\t\t\n\t\tZoa vents her frustration by burying the Medusi dome under a pile of rubble, where the aliens will have to wait for Spider to come dig them out.\n\n\t\t*label bote\n\t\t*gosub ihp_or_not\n\t\t*page_break\n\t\t*goto_scene pirate_end\t\t\t\n\t#…accept what the Medusi give (though you know it's not vermite).\n\t\t*set vermite_state 1\n\t\t*set infamy %+ 10\n\t\t*set persuasiveness %+ 10\n\t\t*label accept\n\t\t*if (deceive = false)\n\t\t\tYou convince Zoa that the Medusi will never give up actual vermite, no matter what they promise.\n\t\t\t\n\t\t\tYou watch on the hovering visual as several Medusi lead a river of gleaming slime into the cargo hold.  From her command chair, Zoa manages a minimum of barely civil exchanges with them, as she watches the Reckless being cheated.\t\t\t\n\t\t\t*goto bote\n\t\t*else\n\t\t\t*set infamy %- 15\n\t\t\tYou convince Zoa to accept the Medusi's offer, hoping she'll believe you when you swear you didn't know it wasn't vermite.\n\t\t\t\n\t\t\t*gosub ihp_or_not\n\t\t\t\n\t\t\tZoa has Utambu test the cargo before you reach human space, and her fury is terrifying when the results show the goo is not vermite at all.  She doesn't discover that you lied to her, but she blames you for not finding out the truth.\n\t\t\t\n\t\t\t*page_break\n\t\t\t*goto_scene pirate_end\n\t*if (deceive = false) #…force the Medusi to load actual vermite at gunpoint.\n\t\t*set vermite_state 2\n\t\t*label force\n\t\t*Set empathy %- 20\n\t\t*set infamy %- 20\n\t\tZoa waits until several Medusi are out of their dome, loading slime into the cargo hold, before broadcasting her knowledge of the Medusi plot.  The Medusi are ordered to load real vermite or be blasted, and Utambu is sent to perform analyses of the slime in the cargo hold, to make sure they comply.\n\t\t\n\t\t*gosub ihp_or_not\t\t\n\t\tThe Reckless leaves with a hold full of actual vermite.\n\t\t*page_break\n\t\t*goto_scene pirate_end\t\t\t\t\n\t#…spy on the next Spider ship to visit 4-7-2.\n\t\t*set vermite_state 3\n\t\t*set level %+ 20\n\t\t*set infamy %+ 25\n\t\tYou concoct a devious plan, based on the assumption that the Medusi called for help from Spider.  The Reckless hides on a nearby moon until a Spider ship arrives in the system.  The vessel looks bizarre to human eyes—lumpy, striated, and organic, like a giant, living ball of yarn.  You watch on a hovering visual as it vanishes into the atmosphere of 4-7-2.  The Reckless crew springs into action, preparing the ship for a stealthy journey.\n\n\t\t*if (message = true)\n\t\t\tHowever, before the Reckless returns to space, another ship arrives, bristling with the black spikes of the IHP.  This must be a rescue ship, responding to the message you sent as a prisoner.  Now that you've embraced a life of piracy, you're glad the Reckless is hidden, and the IHP ship will think you are far away.\n\t\t\t*page_break\n\t\t\t*goto track\n\t\t*else\n\t\t\t*label track\n\t\t\tThanks to Utambu's brilliant innovations, the Reckless is able to track the Spider ship when it emerges, and follow it to its next destination.  That turns out to be a farming planet, producing some kind of Medusi foodstuff, but two stops later, the ship visits another volcanic island.  There, the Reckless hides until the Spider ship leaves, and then tries again to establish trading relations with the small tender colony on the planet.  With Ny-bat in charge of the ground team, and all that you have learned about the Medusi, the Reckless is able to establish an amicable trading relationship with the tenders.\n\t\t\t\n\t\t\t*page_break\n\t\t\t*goto_scene pirate_end\n\n*label ihp_or_not\n*if (message = false)\n\t*return\n*else\n\tSuddenly, you hear the clang of a proximity alarm.  The captain quickly changes the view on the hovering visual above the command chair.  You instantly recognize the black spikes of an IHP ship.  It must have come in response to that message you sent a week ago, with course data attached; the police never would have found the Reckless otherwise.\n\t\t\t\n\t\"They found us,\" says Ny-bat.  $!{n_He} seems to be shocked into immobility, but Zoa is already closing the cargo hold and prepping engines.  You leap across to Zoa's chair, call up a navigational hover, and plot a course.\n\t*page_break\n\tIn a few moments the Reckless is in the air and heading for space.  The IHP ship follows, but the Reckless engines have a few modifications the Inter-Human Police deem too dangerous.  Thanks to your and Zoa's quick thinking, you are able to evade the authorities.\n\t\t\t\n\tYou don't get thanks, though.  You get Zoa's frozen stare.  \"You contacted them,\" she says.  \"It's the only explanation.\"\n\t\t\t\n\t\"I was your prisoner at the time,\" you remind her.  \"And I just helped you escape.\"\n\t\n\t*return\n\n*label nybat_future\nNy-bat is clearly envisioning a long-term future for the two of you.  This is…\n*choice\n\t#…good, because I might be falling in love with ${n_him}.\n\t\t*set nybat_rom 3\n\t\t\"I can't wait to get home to the Reckless,\" you say, kissing ${n_him}.\n\t\t\n\t\t\"Neither can I.  Preferably with a cargo that will make us rich,\" says Ny-bat.\n\t\t\n\t\t*return\n\t#…worrisome, because I'm not ready for a serious relationship.\n\t\t*set nybat_rom 2\n\t\t\n\t\t\"We'll certainly have time to figure that out, over the next few weeks,\" you say, keeping your tone light.\n\t\t\n\t\t\"Of course,\" Ny-bat says, forehead wrinkling.  $!{n_he} understands your subtle hint, and avoids talking about the future from then on.\n\t\t\n\t\t*return\n\t#…embarrassing, because I only meant to flirt, that's all.\n\t\t*set nybat_rom 1\n\t\t\"I plan to stay on the Reckless, so we will definitely have chances to work together,\" you say, because it would be crueler to let ${n_him} hope.\n\t\t\n\t\tNy-bat nods, turning away.  From then on ${n_he} treats you with deference and distance, instead of affection.\n\n\t\t*return\n\t", "interrogation": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Reckless Space Pirates[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 7200\n\n*label purchased\n*comment ñáéç…—\n*temp info false\n*if (mushroom)\n\tOnce again you enter the alien's hazy cell.  Red fog swirls around you—it brushes your cheek like wet hair, and slips down your throat like cold smoke.  The Mushroom is merely a lump on the other side of the small chamber; the haze makes it nearly impossible to see.  Now you understand why Krantic said he would be listening: visibility is so poor in here, the cameras probably can't make out exactly what is going on.\n\t*if (mushroom_ally)\n\t\t*gosub drop_whip\n\t\t\n\t\t\"Alien ally purpose visitation?\" asks The Mushroom.\n\t\t\n\t\tBefore you answer, you need to settle on a strategy.  Will you…\n\t\t*choice\n\t\t\t#…fake an interrogation with The Mushroom's help.\n\t\t\t\t*set empathy %+ 20\n\t\t\t\t*goto fake\n\t\t\t#…persuade The Mushroom to cooperate for its own sake.\n\t\t\t\t*set empathy %+ 10\n\t\t\t\t*gosub what_know\n\n\t\t\t\tFirst, you let The Mushroom know that the pirates are listening, so it knows not to discuss your plans for escape.  Then you say:\n\t\t\t\t*label perchoice\n\t\t\t\t*choice\n\t\t\t\t\t#\"If you cooperate, I can get permission to heal your wounds.\"\n\t\t\t\t\t\t*goto qu\n\t\t\t\t\t#\"Information will help the pirates\tdeal peacefully with your people.\"\n\t\t\t\t\t\t\"Or bombardment with surprise,\" says The Mushroom.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"The captain wants to make a deal, and pay a fair price,\" you insist.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe alien's unbroken limbs—the ones not serving as legs at the moment—slice sideways through the air.  You think that might indicate agitation, but with an unfamiliar species, you can never be sure.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Impossibility evaluation alien captain honesty!\n\t\t\t\t\t\t*goto self\n\t\t\t\t\t#\"If I succeed here, you'll have an ally on the crew.\"\n\t\t\t\t\t\t*goto qu\n\t\t\t\t\t#\"The captain will pay you generously for your help.\"\n\t\t\t\t\t\t*goto qu\n\t\t\t\t\t#\"We both benefit if you answer my questions.\"\n\t\t\t\t\t\t*label qu\t\t\t\t\n\t\t\t\t\t\t\"Please tell me where we can find the tenders, and who we should negotiate with,\" you finish.\n\n\t\t\t\t\t\tThe alien's unbroken limbs—the ones not serving as legs at the moment—slice sideways through the air.  You think that might indicate agitation, but with an unfamiliar species, you can never be sure.\n\n\t\t\t\t\t\t\"\n\t\t\t\t\t\t*label self\n\t\t\t\t\t\tHumans motivated by individual self interest.  Inferiority species assumption also Medusi behavior.  But I, Honored Diplomat, silence in the interest of all Medusi,\" says The Mushroom through the speech box.\n\n\t\t\t\t\t\tYou are ready for this line of argument.  \"But is it really in the interest of the average Medusi to allow Spider a monopoly on vermite?  The captain is willing to pay more per square meter, and isn't that better for the tenders?\"\n\n\t\t\t\t\t\t\"Decision for Levelers, not for I,\" says the alien, limbs waving like kelp in a water-farm.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto success\t\t\t\n\t\t\t#…trick information out of The Mushroom for the pirates' benefit.\n\t\t\t\t*set empathy %- 15\n\t\t\t\t*set mushroom_ally false\n\t\t\t\t*gosub what_know\n\t\t\t\tSince The Mushroom thinks you are its ally, it might give you information you could hypothetically need to rescue it once the ship is groundside.\n\t\t\t\t\t\t\t\n\t\t\t\t\"We need to plan our escape,\" you say, hoping the absent listeners will understand your ploy.  \"How will we find your people after we land?\"\n\t\t\t\t\n\t\t\t\t\"Witless!\" shouts The Mushroom's speech box.  \"Human thinks revelation information while treaty-breaker listeners?  Stupidity?  Or treachery?\"\n\t\t\t\t\n\t\t\t\tThe massive alien quickly closes the space between you, stopping near enough for you to see the brown and yellow mottling on its moist hood and to smell its mold-and-acid odor so strongly you have to breathe through your mouth to keep from vomiting.\n\t\t\t\t\n\t\t\t\t\"Go, human!  Go!\" The Mushroom bellows.  \"Leave victim in peace!\"\n\t\t\t\t\n\t\t\t\tYou seem to have lost The Mushroom as an ally.  Time to try another tactic.  You decide to employ…\n\t\t\t\t*choice\n\t\t\t\t\t#…reason.\n\t\t\t\t\t\t*goto reason\n\t\t\t\t\t#…violence.\n\t\t\t\t\t\t*set empathy %- 25\n\t\t\t\t\t\tYou brush the floor by your foot with your hand, until your fingers tangle in the strands of the electric whip.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set infamy %+15\n\t\t\t\t\t\t*goto use_whip\n\t\t\t\t\t#…trickery, but on the alien's behalf this time.\n\t\t\t\t\t\t*set empathy %+ 20\n\t\t\t\t\t\t*goto can_type\n\t*else\n\t\n\t\t*goto enemy\n*else\n\t*page_break\n\t*set mushroom true\t\n\tRed fog swirls around you the second you step inside the alien's cell.  It brushes your cheek like wet hair, and slips down your throat like cold smoke.  The alien is merely a lump on the other side of the small chamber; the haze makes it nearly impossible to see.  Now you understand why Krantic said he would be listening: visibility is so poor in here, the cameras probably can't make out exactly what is going on.\n\n\tYou step closer to the alien, peering closely to determine if it has anything resembling a face.  It doesn't.  The alien in front of you looks like a gigantic pile of yellowish-brown fungus, and smells worse.  You have to steel your stomach as you examine it.  You live in space; you know that humans instinctively find almost all aliens revolting.  If you want to communicate, it's necessary to push those reactions aside.  As usual, you steady yourself by:\n\t*fake_choice\n\t\t#Performing mental calculations.\n\t\t\t*set level %+ 10\n\t\t#Cursing under my breath.\n\t\t\t*set infamy %+ 10\n\t\t#Retreating from the foul-smelling alien.\n\t\t\t*set infamy %+ 5\n\t\t\tYou put another meter between you and the source of the stomach-churning odor.\n\t\t#Digging my nails into my palms.\n\t\t\t*set infamy %+ 10\n\t\t#Breathing in the lotus pattern, as I do before meditation.\n\t\t\t*set level %+ 5\n\t\t\t*set empathy %+ 5\n\t\n\tNow you are able to focus on the alien.  It is half a meter taller than you, at least twice as wide, and has no features that you can recognize as a face.  Most of its body is covered by a hood of splotchy brown flesh.  Six limbs protrude from under the hood, not jointed like human limbs, but completely flexible like elephant trunks.  Four of them serve as legs, keeping the alien \"standing\" upright.  One twitches anxiously in the air.  The sixth hangs at odd, sharp angles, covered with yellow mucus.  All six look interchangeable to you, with no fundamental differences between \"arms\" and \"legs.\"  On the very top of the alien is something you hesitate to call hair.  It's more like a tuft of long worms, springing from a central point.\n\n\tA black box sits on the floor by your feet.  The alien extends a limb—it really does resemble an elephant's trunk, ending in the same fingerless but grip-enabled way—and nudges the box closer to you.  You cough.  It's hard to catch your breath when every inhalation is a mouthful of rotten chicken soup.  You…\n\t*choice\n\t\t#…pick up the box.\n\t\t\t*label got_box\n\t\t\tThe black box is about the length and width of your shoe, and surprisingly light.  Each long face has a different output: a speaker, a visual display, a metal plate to conduct electrical signals, and a chemical factory for those aliens who communicate by smell.  The narrow end opens onto a cushioned cavity perfect for a human hand.\n\t\t\t\t\t\n\t\t\t\"Signs of intelligence!\" the deep voice coming from the box tells you.  \"Fellow prisoners will communication.  Not damage.\"  The free limb points towards the broken one in illustration.\n\t\t\t\n\t\t\tYou slide your right hand into the speech box; that should tell it to translate your side of the conversation, too.\n\t\t\t\n\t\t\tHoping the alien can now hear you, you ask, \"Who are you?\"\n\t\t\t*page_break\n\t\t\tThe alien actually answers you.  \"Humans cannot speech name.  Treaty-breakers gift the undignified name of Mushroom.\"\n\t\t\t\n\t\t\tIt does look rather like a gigantic straw mushroom.  The Medusi are the most secretive race humans have encountered.  They don't frequent the interspecies trading posts, preferring to transfer cargo in deep space.  They never let humans aboard their ships, and the locations of their planets remain a mystery.  Their interspecies treaties permit limited trade, strictly controlled by the Medusa government, in exchange for complete freedom from alien contamination of Medusi worlds.  Only a few human ambassadors have ever been face to face with a Medusa—a name of convenience given by humans, of course—in order to work out strict trade treaties regarding products such as vermite.  In fact, wasn't there a summit in this sector just last week?  You wish you'd paid more attention to the news.\n\t\t\t\n\t\t\tYou cough harshly for a moment, still adjusting to the syrupy air.  When the spasm has passed, you touch a finger to the metal plate on the side of the box as you speak.  As expected, you receive a mild shock.  Medusi communicate through electrical signals, carried by the moisture in the air and received through their skin.  You've heard that they can talk directly to machines, though you're not sure you believe it.\n\t\t\t\n\t\t\t*label enemy\n\t\t\tYou realize that you need a strategy, if you intend to survive this encounter with your reputation as a pirate intact.  You plan to…\n\t\t\t*goto strategy\t\n\t\t#…cautiously nudge the box back with my foot.\n\t\t\t*label convince_box\n\t\t\tSome kind of spasm seizes the alien—perhaps body language that you cannot understand—and its hood flaps for a moment like laundry in the wind.  You catch a glimpse of six muscular upper limbs beneath.  Then a deep voice complains, \"Speech is only in the every-mist.  Incarceration among the deaf!  Vicious creatures, isolationists, ambition without limit.  Level lower than vermite.\"\n\t\t\t\t\t\n\t\t\tYou're not sure, but you think it is insulting the human race.  As it goes on, you realize that the voice is coming from the speech box at your feet.\n\t\t\tYou think you should…\n\t\t\t*choice\n\t\t\t\t#…defend humanity's honor with a tirade of my own.\n\t\t\t\t\t*set persuasiveness %- 10\n\t\t\t\t\t*set level %- 5\n\t\t\t\t\tYou expound at length at the top of your voice on the virtues of humanity.  The alien cuts you off mid-word, as if it's not even aware that you are talking.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"The impossibility of communication with inferiority intelligences!\" it moans.  And then, \"Box.  Hand.  Box.  Hand.  Box.  Hand.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tYou pick up the spacing box.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto got_box\n\t\t\t\t#…hurl the box right at the disgusting alien.\n\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\t*set empathy %- 15\n\t\t\t\t\t*set level %- 5\n\t\t\t\t\tThe black box hits The Mushroom in the middle of the hood.  Yellow mucus oozes from the wound; the box clatters to the floor.\n\t\t\t\t\t*label freak_out\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tThe Medusa seems to go berserk.  It sways on two limbs, as the other four flail wildly.  Even the injured limb jerks painfully, and the worms on the top of its head wiggle and emit sparks.  For a moment the box emits deafening static, which gives way to a stream of incoherent words: \"Pain-silence-no-stop-alone-pain-don't-animals-animals-animals-must-not-silence-help…\" and on and on.\n\t\t\t\t\t\n\t\t\t\t\tThe alien's mind must have broken under torture.  It's obviously having some kind of flashback to its interrogation by the Reckless crew, triggered by your violence.  As you gape at the suddenly insane alien, a limb whips out and knocks you squarely in the chest.  You fall backwards into the wall, bruised but not really hurt.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tYou realize that you need to communicate with the alien, however you intend to extract information.  You bow to the inevitable, and pick up one of the black boxes.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto got_box\n\t\t\t\t#…flick the alien with the electric whip.\n\t\t\t\t\t*set empathy %- 25\n\t\t\t\t\t*set infamy %+ 10\n\t\t\t\t\tYou send the whip shooting out from your hand.  The tip brushes The Mushroom's hood, and the alien convulses.  Yellow mucus oozes from the contact point.\n\t\t\t\t\t*goto freak_out\n\t\t\t\t#…pick up the spacing box.\n\t\t\t\t\t*goto got_box\n\t\t#…ask, \"What can you tell me about planet 4-7-2?\"\n\t\t\t*goto convince_box\n\t\t#…shout, \"Keep away from me!\"\n\t\t\t*set persuasiveness %- 15\n\t\t\t*goto convince_box\n\n*label strategy\n*choice\n\t#…interrogate the alien while brandishing the electric whip.\n\t\t*set persuasiveness %- 15\n\t\t*set empathy %-15\n\t\t*set infamy %+ 15\n\t\t*gosub what_know\n\t\t*label use_whip\n\t\t\"How many Medusi are there on 4-7-2?\" you ask, flicking the whip to the side of The Mushroom.\n\t\t\t\t\t\n\t\tThe alien's hood—a curtain of thick flesh draped over the upper half its body—flares out.  You think that's a sign of distress.\n\t\t\n\t\t\"Tell me what I want to know, or there will be pain.  You understand pain, don't you, Mushroom?\"  You flick the whip even closer, barely missing the twitching limbs that The Mushroom can't seem to keep still.\n\t\t\n\t\t\"No pain!  Please!  Pain already!\" gibbers the alien, two unbroken limbs jerking erratically while it stands on the other three.  \"Cannot speech!  Already guilt of the betrayer, weakness and disgust!  Must silence!\"\n\t\t\n\t\tThreats don't seem to be working.  You are ready to…\n\t\t*choice\n\t\t\t#…inflict some actual damage on the alien.\n\t\t\t\t*set empathy %- 25\n\t\t\t\tYou send the whip flying out towards the limbs serving as legs.  It's impossible to see how many you hit through the fog, but The Mushroom totters.  For a moment you think the massive alien will crash to the floor, but its free limbs shoot downwards to help it balance.\n\t\t\t\t\t\n\t\t\t\t\"Please, no, please, no, please, no,\" it begs in a whisper.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\"Answer the question!  How many Medusi?\" you insist.\n\t\t\t\t\n\t\t\t\t\"Five cubed or more!\" shouts The Mushroom.  \"Honored Diplomat no occasion to visit minor outposts!  Knowledge of generalities only!  No more pain!\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\"But more questions,\" you say, and proceed to ask about the location and layout of the camp.  The Mushroom describes the fertile valley settings where Medusi find vermite.\n\t\t\t\t*page_break\t\t\t\t\t\n\t\t\t\t*gosub door\n\t\t\t\tNy-bat appears, expression inscrutable as always.  You join ${n_him} in the hallway, pleased to have so much to report.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\"It's lying,\" Ny-bat says.  \"It gave us access to the files on its terminal; that's how we identified the colony in the first place.  There's enough geographic data to tell us there is no valley.  It's just saying whatever it thinks will keep you from hurting it.\"\n\t\t\t\t*set info false\n\t\t\t\t*if (crew = true)\n\t\t\t\t\t*goto report\n\t\t\t\t*else\n\t\t\t\t\t*goto failed\n\t\t\t#…switch tactics, and try persuasion.\n\t\t\t\t*goto persuade\n\t\t\t#…switch sides, and collude with the alien against the pirates.\n\t\t\t\t*set empathy %+ 20\n\t\t\t\t*goto can_type\n\t#…persuade the alien to give me some information.\n\t\t*gosub what_know\n\t\t*label persuade\n\t\t*gosub drop_whip\n\t\t*label reason\n\t\t*gosub persuasion\n\t\t*page_break\n\t\t*if (persuasiveness >= 65)\n\t\t\t*label success\n\t\t\t\"I don't know who the Levelers are, but you are the only Medusa here,\" you say.  \"You are responsible for the tenders on the colony you identified for us.  Will you help the captain negotiate, or will you force her to use violence against the tenders?\"\n\t\t\t\t\t\t\t\n\t\t\tThe Mushroom goes limp, letting all five whole limbs dangle to the floor.  \"Cooperation only reasonable selection,\" it says.\n\t\t\t*set info true\n\t\t\t*achieve intel\n\t\t\t\t\t\t\t\n\t\t\t*goto answers\n\t\t*else\n\t\t\t\"I don't know who the Levelers are, but you are the only Medusa here,\" you say.  \"You are responsible for the tenders on the colony you identified for us.  Will you help the captain negotiate, or will you force her to use violence against the tenders?\"\n\t\t\t\t\t\t\t\n\t\t\t\"Yes responsibility!  Yes guilt!  Yes betrayer!\"  The Mushroom begins to flail wildly, and the worms atop its head crackle with electricity.  It's a terrifying sight, but The Mushroom doesn't attack you.  It seems lost in its own madness.  You wish you hadn't triggered such unbearable self-recrimination, but who can say the right thing every time?\n\t\t\t\t\t\t\t\n\t\t\t*goto status\n\t#…trick the alien into believing I'm its ally.\n\t\t*set empathy %- 15\n\t\t*gosub what_know\n\t\tIf The Mushroom thinks you are its ally, it might give you information you could hypothetically need to rescue it once the ship is groundside.\n\t\t\t\t\t\n\t\t*gosub drop_whip\n\t\t\"I'm not going to hurt you.  I'm not one of those pirates,\" you say, hoping the absent listeners will understand your ploy.  \"I want to escape with you when we land, but I don't know how to manage it.  How will we find your people?\"\n\t\t*page_break\n\t\t*if (persuasiveness >= 65)\n\t\t\t*set info true\n\t\t\t*achieve intel\n\t\t\t\"Not treaty-breaker?  Fellow prisoner?\" The Mushroom asks through its speech box.\t\t\t\t\n\t\t\t\n\t\t\t\"Fellow prisoner,\" you say firmly, grateful that your charm seems to work on aliens, too.\n\t\t\t\n\t\t\t\"In the everymist, haste.  Must warning!  Must gift precious moments to tenders, to upwards-drain the slime pits.\"\n\t\t\t\n\t\t\t\"Where can I find the tenders?  And what are the slime pits?\" you ask.\n\t\t\t\n\t\t\t*label answers\n\t\t\t\"Even the obvious clouds deficiency brains,\" The Mushroom says sadly.  \"I, Honored Diplomat, visitations not such places as 4-7-2.  But tenders of necessity must community establishment at the base of mountain with liquid core, near nature-occurring entrances.  And the slime pits within—how can humans ignorance, when that is what the treaty-breakers search?\"\n\t\t\t\n\t\t\tStars around!  You've just learned that the Medusi camp will be at the base of a volcano, near ca
