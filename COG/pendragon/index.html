ast.\"\n\t*goto part3_line_end\n*else\n\tYou've faced my ${son} and lived. So there is some luck in you, at the least.\"\n\t*goto part3_line_end\n\n*label part3_line_end\n\n\"Do you know what your ${son} is, Saxon?\" rumbles ${Gawain}. \"Do you know what ${he}'s become?\"\n\n\"$!{He} is the best warrior of ${his} age, and ${he} is my heir,\" snaps the old ${man}, showing anger for the first time.\n\n\"$!{He} is a monster,\" says ${Cai}.\n\n${Cerdic} waves a hand in dismissal. \"$!{Men} die in war.\"\n\n\"Aye, they die!\" ${Gawain} barks. \"But torn to pieces with tooth and claw? Ware your ${son}, ${Cerdic} of Wessex; ${he}'ll be your death as much as ours. $!{He}—\" The sentence is cut off by ${Cerdic}'s fist, bloodying ${Gawain}'s nose.\n\nThe silence is broken by a new voice. \"My $!{Lord} ${Cerdic}, my $!{Lord} ${Geraint}, you are well, I hope?\"\n*page_break\nIt is a tall ${man} with salt-and-pepper hair, lean, wearing plain yet well-made gear. $!{His} only adornments are a silver ring around ${his} left arm, likewise a torc at ${his} neck that bears two birds of black stone. A handful of ${men} are at ${his} back, the dust of travel still on them.\n\nThe black birds give you ${his} name. ${Gorlaes} of Kernow, $!{King} of the tip of land to the far south-and-west of the island of Britain. ${Uther}'s bitterest enemy, Gwynedd's hated foe. You are amongst wolves here; the only question is who will rip you to pieces first.\n\n\"${Gorlaes}!\" $!{King} ${Geraint}'s voice drips servility. \"I am pleased beyond measure. This is $!{King} ${Cerdic} of Wessex.\"\n\nThe Saxon and the $!{King} of Kernow clasp forearms, eyes on each other, calculating, measuring. They are of a height, and although ${Cerdic} is far more well-built, the other is one of those who draws eyes to ${him}. \"So you are a ${king} now, rather than simply the leader of a warband,\" says ${Gorlaes}. \"That is a thing, is it not?\"\n\n\"I am old, and I begin to have thoughts of setting roots down, and I move too slowly in my dotage,\" says ${Cerdic}. \"Alas, too slowly to escape the hangers-of-titles.\" $!{He} smiles.\n\n\"Old, perhaps, but dotard? Never,\" says ${Gorlaes}. $!{He}, too, smiles, but there's no humor in it.\n\n\"And this is ${Arthur} of Gwynedd.\" $!{King} ${Geraint} is crowing now.\n*if chapter10_pretend_cai\n\n\t\"No, it is not,\" says ${Gorlaes}.\n\t\n\t\"I… I can assure you…\"\n\t\n\t${Gorlaes} gestures to you. \"That ${man} there is ${Arthur} of Gwynedd. I will pay you a tenweight of gold if I am wrong. Is it not so?\" $!{He} addresses you.\n\t\n\tThere's no point in dissembling. \"It is.\"\n\t\n\t\"But…\"\n\t\n\t${Cerdic} gives a hearty laugh. \"Ah, ${Geraint}—so much for your spies.\"\n\t\n\t\"I assure you, this is the ${man} whom we—\"\n\t\n\t\"${Gorlaes} speaks truth. That is ${Arthur},\" spits a voice. ${Cynric}, lounging in the doorway, staring knives at you.\n\t*goto part3_cynric\n*else\n\n\t${Gorlaes} nods thoughtfully. \"So I see. I've heard much of you, young ${man}.\"\n\t\n\t\"Why does ${he} still live?\" spits a voice. ${Cynric} stands in the doorway, staring knives at you.\n\t*goto part3_cynric\n\t\n*comment --------------------------------------------------------------\n*label part3_cynric\n\nYou see ${Cai}'s wince of recognition. \"I was just wondering what could make this worse,\" ${he} mutters.\n*page_break\n\"This is my ${son},\" says ${Cerdic}, pride in ${his} voice. \"If—\"\n\n*if chapter9_cynric_caledfwlch\n\t\"$!{His} sword, $!{father},\" ${Cynric} glowers at you. You realize ${his} shoulder is bound; the wound Caledfwlch gave ${him} still troubles ${him}, it seems. \"Give me ${his} sword.\" $!{He} follows it up with a burst of aggrieved Saxon directed at ${his} ${father}, and strides over to you.\n\t\n\t${Gorlaes} moves to block ${his} way. \"$!{King}'s ${son} or not, ${Cynric} of Wessex, these goods are not yours to dispose of. If anyone's, they are ${Geraint}'s. We have decisions to make.\"\n\t\n\tYou see rage blossom in ${Cynric}'s eyes—the faintest hint of a black stain. $!{His} hand strays towards ${his} knife.\n\t\n\t$!{King} ${Gorlaes} stands firm, calm, unflinching, staring down at the shorter ${man}.\n\t\n\t${Cerdic}'s laughter fills the room. \"Come, ${son}, neither ${Arthur} nor the sword will go anywhere. Sit. Let us talk.\"\n\t\n\t${Cynric} snarls, and stalks away to squat at the edge of the hall, watching you.\n\t\n\t${Gorlaes} sits down on the other side of table from you. \"So, ${Arthur} ${ap} ${Uther}. I have questions for you.\" $!{His} grey eyes are keen; it feels like they see through you.\n\t*goto part3_gorlaes\n*else\n\t\"Why does ${he} still live, $!{father}?\" ${Cynric} glowers at you. \"Why do any of them live? A ransom? Faugh! We should slice their throats and have done. What use have they for us?\"\n\t\n\t\"Perhaps none,\" says $!{King} ${Gorlaes}. \"Indeed, perhaps we'll hang them from ${Geraint}'s thorn trees. But I have questions for ${Arthur} ${ap} ${Uther} first of all.\" $!{He} sits down on the other side of the table from you.\n\t*goto part3_gorlaes\n*comment --------------------------------------------------------------\t\n*label part3_gorlaes\n${Cerdic} folds ${his} arms and watches, a slight smile on ${his} lips, indulgent.\n\nThe grey-eyed ${Gorlaes} regards you coolly, watchful, studying you, as if weighing your worth.\n\n\"Now tell me, ${son} of ${Uther}…it is said that ${Uther} lies on the Isle of the Dead, and that ${men} argue over ${his} throne. Who, then, will be $!{King} of Gwynedd?\"\n\n*temp lied_to_gorlaes\n*set lied_to_gorlaes false\n\n*temp part3_first_question\n*set part3_first_question true\n*label part3_gorlaes_begin\n*choice\n\t#\"I will.\"\n\t\t*set chapter10_gorlaes_impressed +2\n\t\t$!{He} holds your gaze, grey eyes assessing. \"Indeed. \n\t\t*goto part3_gorlaes_2\n\t\t\n\t#\"It will be ${Bedwyr}.\"\n\t\t*set chapter10_gorlaes_impressed +1\n\t\t\"Ah, yes, ${Uther}'s favored ${son}. \n\t\t*goto part3_gorlaes_2\n\t\t\n\t#\"I don't know.\"\n\t\t*set chapter10_gorlaes_impressed +0\n\t\t$!{He} raises an eyebrow. \"No? It seems this should be something that isn't simply left to the priests and their auguries. \n\t\t*goto part3_gorlaes_2\n\t\t\n\t*if (part3_first_question) #\"I'll not answer your questions.\"\n\t\t*set part3_first_question false\n\t\t*goto part3_gorlaes_stubborn\n\t\n*label part3_gorlaes_2\nTell me—what is it that you seek in this fight, ${Arthur}? Gwynedd is dying, the time of the Britons is passing. Why do you still fight for a cause that is so clearly lost?\"\n\nThis feels like ${Ector}'s questioning of you during your lessons; it's as if ${Gorlaes} is testing you. But what is it that ${he} wants to hear? You've heard that ${he}'s a stiff-necked ${man}, unbending and honorable.\n\n\"I'm waiting,\" ${he} says. \n\n*choice\n\t#(Lie) \"Because I have taken an oath to do so.\"\n\t\t*if (bravado\u003c45)\n\t\t\t*set chapter10_gorlaes_impressed +2\n\t\t\t$!{King} $!{Gorlaes} nods. \"And a ${man} must abide by ${his} oaths, must ${he} not? That is well.\n\t\t\t*goto part3_gorlaes_3\n\t\t*else\n\t\t\t*set chapter10_gorlaes_impressed +0\n\t\t\t*set lied_to_gorlaes true\n\t\t\t$!{King} $!{Gorlaes}'s eyebrow raises. \"Indeed? A ${man} must abide by ${his} oaths. And yet it would be better if a ${man} told the truth, no matter the threat to ${his} life or ${his} land.\n\t\t\t*goto part3_gorlaes_3\n\t\t\t\n\t#\"Honestly? I enjoy the fight, the struggle, the challenge.\"\n\t\t*set chapter10_gorlaes_impressed +1\n\t\t$!{King} $!{Gorlaes} shrugs. \"For the thrill? An interesting choice. \n\t\t*goto part3_gorlaes_3\n\t\t\n\t#\"Because someone must.\"\n\t\t*set chapter10_gorlaes_impressed +2\n\t\t$!{King} $!{Gorlaes} frowns, brow furrowed. \"You see it as a duty to stand up, then, to show others the way, despite the hopelessness of it. \n\t\t*goto part3_gorlaes_3\n\t\t\n\t#\"The cause is not lost.\"\n\t\t*set chapter10_gorlaes_impressed +1\n\t\t\"Is it not? Do you have cause to believe that, I wonder, or just blind faith? \n\t\t*goto part3_gorlaes_3\n\t\n*label part3_gorlaes_3\nBut Gwynedd is not your land, is it? You are not a Briton, not truly—you were brought up in the Roman ways, in the way of Christ.\"\n\t\n*choice\n\t#\"In all honesty, I'm caught deeper in this than I ever intended.\"\n\t\t*set chapter10_gorlaes_impressed +0\n\t\t${Gorlaes} snorts. \"Aye, I know how that can be. \n\t\t*goto part3_gorlaes_4\n\t\t\n\t#\"I'm Briton. These are my people. Religion has no bearing on this.\"\n\t\t*set chapter10_gorlaes_impressed +2\n\t\t${Gorlaes} nods, slowly. \"So it is family and blood that keeps you here. \n\t\t*goto part3_gorlaes_4\n\t\t\n\t*if (old_faith\u003c50) #\"If the Saxons win, there'll be no place for Christ in this land.\"\n\t\t*set chapter10_gorlaes_impressed +1\n\t\t\"And so you would help preserve it—if the Saxons are defeated. I see. \n\t\t*goto part3_gorlaes_4\n\t\t\n\t*if (old_faith>=50) #\"I'm no Christian. I'll do all in my power to preserve the old ways.\"\n\t\t*set chapter10_gorlaes_impressed +1\n\t\t\"The old ways of this land are just as dark as the ways of the Saxons. \n\t\t*goto part3_gorlaes_4\n\t\t\n\t*if (old_faith\u003c50) #(Lie) \"I'm no Christian. I'll do all in my power to preserve the old ways.\"\n\t\t*if (bravado\u003c45)\n\t\t\t*set chapter10_gorlaes_impressed +1\n\t\t\t\"The old ways of this land are just as dark as the ways of the Saxons.\n\t\t\t*goto part3_gorlaes_4\n\t\t*else\n\t\t\t*set chapter10_gorlaes_impressed +0\n\t\t\t*set lied_to_gorlaes true\n\t\t\t$!{He} frowns. \"You tell me what you think I want to hear. And so easily deny your faith. Is uttering falsehood a part of the Christian teachings, then?\" $!{He} shakes ${his} head. \"No matter.\n\t\t\t*goto part3_gorlaes_4\n\t\t\n\t#\"This country has already begun to forget what it learned from Rome. If the Saxons win, we'll be back to savagery. I can help stop that.\"\n\t\t*set chapter10_gorlaes_impressed +3\n\t\t\"Now that is interesting. There is value in what Rome and the Britons are together, is that your thought? What of a greater combination? \n\t\t*goto part3_gorlaes_4\n\n*label part3_gorlaes_4\nWhat if there were a greater kingdom to be gained? Stability and peace, through alliance with the Saxons?\"\n\n*choice\n\t#(Lie) \"Yes, I think an alliance may be the best hope for our people.\"\n\t\t*if (bravado\u003c45)\n\t\t\t*set chapter10_gorlaes_impressed +2\n\t\t\t${Gorlaes}'s brow lifts a little. \"Indeed? Then perhaps you are not as filled with ${Uther}'s hatred as I expected.\"\n\t\t\n\t\t\t${Cerdic} says nothing, just watches, face grim.\n\t\t\n\t\t\t${Gorlaes} considers you for a moment. \n\t\t\t*goto part3_gorlaes_decide\n\t\t*else\n\t\t\t*set chapter10_gorlaes_impressed +0\n\t\t\t*set lied_to_gorlaes true\n\t\t\t${Gorlaes}'s look darkens. \"Your words say one thing; your eyes say another. What is it, I wonder? ${Uther}'s pride? ${Uther}'s hatred?\"\n\t\t\t\n\t\t\t${Cerdic} makes a small grunt of contempt.\n\t\t\t\n\t\t\t${Gorlaes} considers you for a moment. \n\t\t\t*goto part3_gorlaes_decide\n\t\t\t\t\t\n\t#\"We couldn't trust the Saxons to keep peace. You've not seen what we've seen—they use dark magics.\"\n\t\t*set chapter10_gorlaes_impressed +1\n\t\t${Cynric} spits on the floor. ${Cerdic}'s eyes narrow, looking between ${his} ${son} and you.\n\t\t\n\t\t${Gorlaes} looks back to you. \"It's not the first time I've heard that said. But such is often said by those who fight on different sides of a war.\"\n\t\t\n\t\t\"It's true, damn you,\" says ${Cai}. \"We've seen it. This…creature—\" $!{He} nods at ${Cynric}, who straightens up, lip twitching.\n\t\t\n\t\t${Gorlaes} raises ${his} hand. \"My questions were for ${Arthur},\" ${he} says softly. \n\t\t*goto part3_gorlaes_decide\n\t\t\n\t#\"A partnership forged in peace, with treaties, perhaps. Accepting thralldom and the eradication of Briton ways, never.\"\n\t\t*set chapter10_gorlaes_impressed +2\n\t\t${Gorlaes} looks at ${Cerdic}. \"Admirable, wouldn't you say? Something the Saxon people would understand.\"\n\t\t\n\t\t${Cerdic}'s eyebrow twitches, but ${he} says nothing, just watches you.\n\t\t\n\t\t${Gorlaes} considers you for a moment. \n\t\t*goto part3_gorlaes_decide\n\t\t\n\t#\"You're a traitor to your land to even ask that question.\"\n\t\t*set chapter10_gorlaes_impressed +0\n\t\t${Gorlaes} shakes ${his} head as if in disappointment. \"That's a fool's answer.\" \n\t\t*goto part3_gorlaes_decide\n\n*label part3_gorlaes_decide\n*if chapter10_gorlaes_impressed\u003c=2\n\t*goto part3_gorlaes_kill\n$!{He} stands, suddenly. \"So, my decision is made.\" $!{He} claps ${his} hands.\n\n${Geraint} looks at ${him}, puzzled. \"Decision?\"\n\n${Cynric}'s head snaps round—${he}'s heard something outside. Metal on metal. And then ${Gorlaes}'s ${men}, who've quietly taken up station around the hall while the questioning has gone on, have swords in their hands. Saxons reach for weapons; three fall dead, throats cut. Others are at sword point. ${Geraint}'s ${men} look uncertain, helpless.\n\n\"Ah—I'm sorry,\" says ${Gorlaes}. \"I may not have been clear. I am here to talk of an alliance, ${Geraint}, ${Cerdic}, but not with you. I brought a few additional ${men} to assure it.\" There is a knife in ${his} hand; ${he} slices your bonds with an easy movement.\n\n\"I will tear out your throat!\" hisses ${Cynric}, then spits something in Saxon.\n\n${Cerdic}'s fists clench; then ${he} grits ${his} teeth, lets out a Saxon curse, and shakes ${his} head. \"No. There's no profit in fighting, not here, my ${son}. We would gain nothing but death. You have made your choice, ${Gorlaes} of Kernow, and it's a poor one. I came here in good faith, and you are not my enemy, not today. Do we have your leave to depart?\"\n\n\"Kill the ${insult_bastards}!\" shouts ${Cai}.\n\n*choice\n\t#\"Don't let them leave! This might be our only chance.\"\n\t\t*set chapter10_gorlaes_impressed +0\n\t\t\"I'd thought better of you, ${Arthur},\" says ${Gorlaes}; then, to ${Cerdic}. \n\t\t*goto part3_saxons_leave\n\t\t\n\t#\"We can't face them—we haven't the strength here. They're more powerful than you think.\"\n\t\t*set chapter10_gorlaes_impressed +1\n\t\t${Gorlaes} looks at you, then at ${Cynric}, seeing the hatred there; then, to ${Cerdic}. \n\t\t*goto part3_saxons_leave\n\t\t\n\t#\"As ${Cerdic} said, they came in good faith, and they should be allowed to leave.\"\n\t\t*set chapter10_gorlaes_impressed +2\n\t\t${Gorlaes} looks at you with a slight smile. \"Very well.\" $!{He} turns to ${Cerdic}. \n\t\t*goto part3_saxons_leave\n\t\t\n*comment --------------------------------------------------------------\n*label part3_saxons_leave\n\"Leave. You'll be unharmed. And, friend ${Geraint}—I know this is your hall, but you'll not object to me borrowing it for a short time? Minutes only.\"\n\n${Geraint} splutters for words while ${Cerdic} nods gravely, and orders ${his} ${men} to gather the fallen. ${Cynric}'s fists are twitching, but ${Cerdic} stands in front of ${his} ${son} and talks to ${him} in low words. ${Cynric} curses and storms off out of the building.\n\t\t\nThen ${Cerdic} turns. $!{He} stares down at the two of you—${he} makes no threatening move, but you're aware of the weight that this ${man} carries in the world. This is not an enemy to be lightly made. \"We will see each other again, ${Arthur} of Gwynedd and ${Gorlaes} of Kernow. May that time be not long delayed.\" \n\t\t\n\"I look forward to it,\" says ${Gorlaes} with a slight smile. $!{He} looks to ${Geraint}. \"Perhaps you should show our guests out?\"\n\n\"I…\" ${Geraint} swallows, hesitates, and then follows the Saxons out of the door.\n*goto part4\n\t\n*comment --------------------------------------------------------------\n*label part3_gorlaes_kill\n\n$!{He} stands, suddenly. \"$!{King} ${Geraint}, $!{King} ${Cerdic}. ${Arthur} ap ${Uther} is of no use to me. I'd hoped for more conviction, for more pride, for a true tie to the land; perhaps then we could have come to some agreement or alliance. But this ${man} is shallow and uncertain. $!{He}'s not the one to broker a treaty. There's too much of ${Uther} in ${him}. Do what you will with ${him}—I leave ${his} fate in your hands.\"\n\t\n$!{He} looks at you for a brief moment, grits ${his} teeth, and sighs. \"You have ${her_his} eyes. But nothing else of ${hers}.\" And with that, ${he} is gone.\n\t\n\"Can we not ransom them?\" asks ${Geraint}.\n\t\n${Cerdic} considers. \"Perhaps ${Gawain}—$!{King} ${Lot} would pay, I think. ${Arthur} ${himself} is too dangerous. And the other is worth nothing.\"\n\n\"Death, then, for the others?\" asks ${Geraint}.\n\t\n\"Kill us, then,\" says ${Cai} through gritted teeth. $!{His} eyes are moist. \"You bloody snivelling traitor. As for you, you Saxon ${insult_bastard}. I hope your ${son} eats your heart.\"\n\t\n\"Kill you?\" asks ${Cerdic}. \"No.\" $!{He} kneels next to you, peering into your face, and then puts a hand to your neck. \"Fetch the thrall-rings, and heat the fire,\" ${he} calls.\n\t\nIt seems you are destined to live the remainder of your life as a thrall to the Saxons, tilling their fields, hauling their goods, tending their flocks, labouring and working for them until you sicken and die.\n\n*page_break\n\n[i]And so it is that ${Arthur} Pendragon never returns to ${his} home. It heralds a dark time for the people of Britain, where Saxon wolves roam the kingdoms, driving the people into the hills and into remote holdfasts. It is a long, bleak struggle, where slowly the Britons try to break the will of the Saxons, try to use the land to make it known that it will never be theirs.[/i]\n\n[i]Perhaps, for a time, they succeed. But the Saxons are not the Romans; in their own way, they are as desperate as the Britons, for they need a place to live.[/i]\n\n[i]And there is something dark at the heart of them. Some dark spirit that hides behind the eyes of its leaders. And without a true leader, without a ${man} worthy of the name Pendragon, it may never be defeated.[/i]\n\n*goto_scene startup early_death\n\n*comment --------------------------------------------------------------\n*label part3_gorlaes_stubborn\n\"There is no need for stubbornness. I merely wish to learn a little of your faith and your fears.\"\n\n\"Before you kill us?\" spits ${Gawain}. \"Traitor to your own.\"\n\n\"Perhaps I'm being over-polite.\" $!{His} voice takes on a steel edge. \"I'll have your answers, ${Arthur} ${ap} ${Uther}, or you're of no use to me.\"\n\n*choice\n\t#Refuse to answer ${him}.\n\t\t$!{King} ${Gorlaes} sighs. \"And there, you see. I was willing to give the doubt to you, willing to see you prove you'd the intelligence to better yourself, to better the land, but no.\"\n\t\t*goto part3_gorlaes_stubborn_kill\n\t\n\t#\"Very well. Ask your questions.\"\n\t\t\"That's better. I'd asked you who will be $!{King} of Gwynedd?\"\n\t\t*goto part3_gorlaes_begin\n\t\t\n\t*if (old_faith\u003c50) #\"Rot in Annwn's pit, you ${son} of a whore.\"\n\t\t$!{King} ${Gorlaes} sighs. \"And so it comes to braying cheap insults that'll gain neither you nor your people anything of any worth. I'd thought better of you.\"\n\t\t*goto part3_gorlaes_stubborn_kill\n\t\n\t*if (old_faith>=50) #\"Rot in the pits of hell, you ${son} of a whore.\"\n\t\t$!{King} ${Gorlaes} sighs. \"And so it comes to braying cheap insults that'll gain neither you nor your people anything of any worth. I'd thought better of you.\"\n\t\t*goto part3_gorlaes_stubborn_kill\n\n*comment --------------------------------------------------------------\n*label part3_gorlaes_stubborn_kill\n$!{He} looks over at ${Cerdic}. \"$!{He}'s no use to us.\"\n\n${Cerdic} nods, flint-eyed.\n\n${Gorlaes} turns back to you and there's a brief, flickering moment, a flash of something. ${Gawain} cries out.\n\nYou try to look round, but something's very wrong. There's a warm wet stinging at your neck, and there's something caught in your throat, and…\n\n${Gorlaes} shakes ${his} head. \"I'm sorry, truly. I'd hoped for so much more.\" $!{He} wipes the blade in ${his} hand, and puts it away.\n\nYou hear ${Cai} sobbing. You hear a roar, and see ${Gawain} raging, struggling free of ${his} bonds; see ${Gorlaes}'s sudden look of panic as the Bear of Orkney's hands wrap around ${his} neck. You hear the snap of bone.\n\nYou try to speak, but it's far too late. The life drains out through your severed throat, and the dark closes in.\n\n*goto_scene startup early_death_vision\n*comment --------------------------------------------------------------\n*comment                   Part 4: Gorlaes\n*comment --------------------------------------------------------------\n*label part4\n*page_break\n*if tied_up\n\t${Gawain} rubs at ${his} unbound wrists, and \n*if tied_up=false\n\t${Gawain}\nshakes ${his} head in bewilderment. \"Why? Why this trickery?\"\n\n${Gorlaes} looks at you. \"Because I wasn't sure,\" ${he} says. \"I wasn't sure about ${Arthur}, and I wanted to meet ${him}.\"\n\n\"So you might have allied with ${Cerdic}?\" you ask ${him}.\n\n\"No. I'm not ${Geraint}. They told me they were bringing you here, and I took the chance.\"\n\n\"You've always hated Gwynedd. I remember the fighting, even when I was a ${boy}. How can we believe you'd ally with us now?\"\n\n\"You remember, do you? But you don't know why? Or perhaps you never knew? It wasn't Gwynedd I hated. It was ${Uther}. And you. Or the idea of you.\" There's a blurring of moisture in ${his} eyes.\n\n\"Me?\"\n\n\"${Ygerna},\" says ${Gawain} in realization. \"$!{She} was [i]your[/i] lover! I knew ${she} came from the South, and I knew there'd been trouble, but not the detail. I remember ${her_him}, from when I was a little ${lad}.\"\n\n${Ygerna}. Your ${mother}. \n*if gender=\"male\"\n\tDead at your birth.\n*if gender=\"female\"\n\tKilled in a border skirmish not long after you were born.\n\n\"My lover, yes. My ${wife}. ${Uther} stole ${her_his} heart,\" says ${Gorlaes}. \n*if gender=\"male\"\n\t\"You stole ${her_his} life.\"\n*if gender=\"female\"\n\t\"My fight with ${Uther} stole ${her_his} life.\" \n\t\n*set chapter10_gorlaes_allies true\n\nThere's silence, and then ${Gorlaes} looks away. \"It was a long time ago. I hold no grudge towards you—and ${Uther} is dead. But more than that, \n*if chapter10_gorlaes_impressed\u003c=5\n\t*set allies +1\n\tin your words you've shown you're a reasonable ${man}, which ${Uther} never was. I'll lend you aid when you need it. \n\t*goto part4_ally\n*elseif chapter10_gorlaes_impressed\u003c=8\n\t*set allies +2\n\tin your words you've shown that you'll stand up and fight for what you believe in. I respect that in a ${man}. I have trained ${men} that you need.\n\t*goto part4_ally\n*else\n\t*set allies +3\n\tin your words you've shown a wisdom and diplomacy that belies your age. I'm prepared to lend my coffers and strength of arms to our joint struggle. \n\t*goto part4_ally\n*label part4_ally\nI think we can work together. But I'll expect actions to match those words, when I bring Kernow's warriors to your banner.\"\n\n*if lied_to_gorlaes\n\t$!{He} shifts forward, looking you straight in the eye. \"There is, however, one thing that must change. I value honesty. You have lied to me; I grant you it was in an attempt to save your life. But it must not happen again.\"\n\t\n\tYou swallow. \"It won't.\"\n\t\n\t\"Well enough, then.\"\n$!{He} clasps your hand. \"You'd best be on the road, as should I be. There's much to do. But one thing, before we part…what of ${Geraint}? I believe ${he} might be persuaded to join our cause; ${he}'s now seen how quickly ${he} can lose ${his} power. $!{He} has warriors aplenty, but ${he}'s no brain to use them.\"\n \n*choice\n\t#\"$!{He}'s proven ${himself} to be a coward and a traitor. I don't want ${him} fighting with us.\"\n\t\t*set warrior %+15\n\t\t*set diplomat %-15\n\t\t\"Understandable. Others won't trust ${him} or ${his} followers. Very well. We'll talk again; I'll send messengers soon. It would be best that you leave now, while my ${men} still hold this fort—I can let you have mounts. Once you're gone, we'll withdraw, and leave ${Geraint} to make ${his} own future.\"\n\t\t*goto part4_leave\n\t\t\n\t#\"We should work towards showing ${him} that together our land has a chance.\"\n\t\t*set leader %+15\n\t\t*set warrior %-15\n\t\t*set chapter10_geraint_allies true\n\t\t*achieve support_geraint\n\t\t*set allies +1\n\t\t\"Agreed. I'll sit down with ${him} before I leave, and we'll discuss the future. It may be that ${he} can be talked round. You and I will talk again; I'll send messengers soon. I can let you have mounts—if I understand things aright, you need to be back in Gwynedd with all speed.\"\n\t\t*goto part4_leave\n\t\t\n\t#\"I don't give a damn about ${Geraint}, but we need ${his} ${men}. Perhaps ${he} can be bought.\"\n\t\t*set diplomat %+15\n\t\t*set warrior %-15\n\t\t*set chapter10_geraint_allies true\n\t\t*achieve support_geraint\n\t\t\"$!{He}'ll not be bought cheaply, or I don't know ${Geraint},\" says ${Gorlaes}.\n\t\n\t\t*if chapter9_item_arthur=\"cup\"\t\n\t\t\t*set chapter10_used_cup true\n\t\t\t*set allies +3\n\t\t\t\"The cup!\" says ${Cai}. \"${Ambrosius}'s chalice, the silver guesting cup. You have it, don't you, ${Arthur}?\"\n\t\t\n\t\t\t\"I do.\"\n\t\t\t\n\t\t\t\"${Ambrosius}'s guesting cup? I remember it. That would do very well—not only for its worth, but it will appeal to ${Geraint}'s pride. Very well. I can broker that deal for us. You and I will talk again; I'll send messengers soon. I can let you have mounts—if I understand things aright, you need to be back in Gwynedd with all speed.\"\n\t\t\t*goto part4_leave\n\t\t*else\n\t\t\t*set allies +1\n\t\t\t\"Gwynedd is not rich,\" says ${Gawain}.\n\t\t\t\n\t\t\t\"And I have no titles to give,\" you say. \"I am not a $!{King}.\"\n\t\t\t\n\t\t\t\"I will see what I can find to sway ${him} from my own coffers,\" says ${Gorlaes}. \"Leave that to me. So, you and I will talk again; I'll send messengers soon. I can let you have mounts—if I understand things aright, you need to be back in Gwynedd with all speed.\"\n\t\t\t*goto part4_leave\n\t\n*label part4_leave\n*if chapter10_gorlaes_allies\n\t*achieve support_gorlaes\n$!{Gorlaes} considers you for a moment, and then nods with a slight smile. \"You have ${her_his} eyes. Fare well, ${Arthur}.\"\n\n*goto part5\n\n*comment --------------------------------------------------------------\n*comment                   Part 5: The Veiled Isle\n*comment --------------------------------------------------------------\n*label part5\n*if (chapter2_pregnant=false) and (chapter2_morgan_pregnant=false)\n\t*finish\n\n*page_break\n\n[i]The Veiled Isle. ${Morgan} stands with ${her_his} ${mother}.[/i]\n\n[i]\"And what will happen if ${he} becomes $!{King}?[/i]\n*if gender=\"male\"\n\t[i]I know you bear his child;[/i] \n*if gender=\"female\"\n\t[i]I know she bears your child;[/i]\t\n[i]a child out of wedlock. Do you see a future for the two of you?[/i]\n\t\n*if romance_morgan\n\t[i]\"I…I don't know. Maybe. I think so.\"[/i]\n\t\n\t[i]\"I'm sorry, my ${daughter}, but anything between you—it cannot last.\"[/i]\n\t\n*if romance_morgan=false\n\t[i]\"No. I don't think so. It was a night, just one night.\"[/i]\n\t\n\t[i]\"That's as well. Anything between you—it would not last.\"[/i]\n\t\n[i]\"Why not?\"[/i]\n\n*if gender=\"male\"\n\t[i]\"I have never told you the name of your father. It is Uther.\"[/i]\n\t\n*if gender=\"female\"\n\t[i]\"You have never known your mother's name.\"[/i]\n\t\n\t[i]\"I do! It was Elen!\"[/i]\n\t\n\t[i]\"She was not your mother. Your true mother bore twins. One of them was promised to the Old Ones before your birth, in return for certain blessings of strength upon the other. I took you, as was my right. I believe she thought you had died, even up to her death.\"[/i]\n\t\n\t[i]\"Who?\"[/i]\n\t\n\t[i]\"Utta. You are twin to ${Bedwyr}.\"[/i]\n\n[i]Silence, for a time, and then: \"I am ${Arthur}'s ${sister}?\"[/i]\n\n[i]\"Half-${sister}. I never told ${Uther} you had lived.\"[/i]\n\n[i]Drawn breath. \"Why do you tell me now?\"[/i]\n\n[i]\"So that you understand why you can never be together. If ${he} found out…[/i]\n*if old_faith\u003c50\n\t[i]could ${he}, with ${his} Christian faith, live with it?\"[/i]\n*if old_faith>=50\n\t[i]well. Perhaps ${he} could bury that secret. But ${he} will need the $!{King}s of Christian lands on ${his} side, much as that prospect displeases me—and one whiff of it and they will desert ${him}.\"[/i]\n\t\n[i]\"That doesn't explain why you're telling me. Why you're telling me now. Why you've never done so before.\"[/i]\n\n*if gender=\"male\"\n\t[i]\"The child must stay on the Isle, ${daughter}. [/i]\n*if gender=\"female\"\n\t[i]\"The child must come and live with me, here on the Isle, son.[/i]\n[i]$!{He} must not grow up in ${Arthur}'s court. $!{He} is far, far too important.\"[/i]\n\n[i]A long silence this time. \"What have you seen?\"[/i]\n\n[i]\"Nothing for certain. But I do know that ${Arthur}'s reign, if it comes to pass, will be a short-lived one. And yet it may be the saving of all of us.\"[/i]\n\n*finish\n", "chapter11": "*comment ==============================================================\n*comment                Chapter 11: The Torchbearer\n*comment ==============================================================\n\n*comment --------------------------------------------------------------\n*comment                        Introduction\n*comment --------------------------------------------------------------\n*label intro\n\n*image chap11.png center Chapter Eleven: The Torchbearer\n\n*comment --------------------------------------------------------------\n*comment                   Part 1: The Saxons\n*comment --------------------------------------------------------------\n*label part1\n\n[i]\"Aye, I am old. And perhaps I've had enough of our ${men} dying to take more land!\" ${Cerdic}'s fist pounds down on the table.[/i]\n\n[i]${Cynric} stares at ${his} ${father} with contempt. $!{He} spreads ${his} hands, looking at the others around the fire. \"These ${men} followed you to war, $!{father}. What are we to do—go home, tails between our legs? The Britons have lost ${Uther}—and it was I who did that. They have no High $!{King}. Gwynedd has no $!{King}. The Roman ${insult_bastard} ${Arthur} would be dead by now, if you'd not forbidden it. All the western lands are ripe for the taking. If we take $!{Uther}'s fortress, the heart of their land—and if we fortify it and hold it—\"[/i]\n\n[i]\"We've lost too many at Dinas Emrys already.\" ${Cerdic} speaks the words loudly to drown out the mutterings of agreement from the ${men} around the fire.[/i]\n\n[i]\"You've never had the courage to send a large enough force. We have the ${men}. We have the opportunity. We can take them swiftly, before they have chance to grow stronger. We can slaughter ${Arthur}, this Warleader who's never fought a war.\"[/i]\n\n[i]\"You've grown bloodthirsty, and obsessed with one ${man}, my ${son},\" says ${Cerdic}. \"Our people came to this land to find a place to live. To settle. To grow crops. We have been pushed west, and west again, but somewhere we must stop. We should stay here and fortify these lands, heal, and grow.\"[/i]\n\n[i]\"Aye,\" comes from several voices in the circle. Heads nod in agreement. ${Cynric}'s fists clench, and ${his} teeth grit. $!{Men} standing nearby back away from ${him} and ${his} companions, as the firelight seems to wither away.[/i]\n\n[i]\"No,\" says ${Cynric}, in a voice full of iron nails. \"Not this time, $!{father}. This is no time for peace. We have the favor of the gods. At first light we march to rip the heart from their lands.\"[/i]\n\n[i]\"We will not,\" manages ${Cerdic}, feeling ${his} breath thick in ${his} mouth. \"Not on your say so.\"[/i]\n\n[i]${Cynric}'s eyes glitter black, and, as if crushed by a sudden wind, the flames of the fire fall away. Around ${Cynric}, ${men} stiffen as if chilled to the bone. \"We will,\" ${he} says, and this time a chorus of voices echo ${his} words in one unanimous breath, as if they speak with ${his} voice.[/i]\n\n[i]\"No—\" is what ${Cerdic} means to say, but ${Cynric} raises a hand; to ${Cerdic}'s alarm ${he} can see claws shine. The words won't come. $!{He} struggles, trying to curse, but ${his} tongue betrays ${him}; ${his} ${son}'s will is a crushing weight.[/i]\n\n[i]\"I hear no debate,\" says ${Cynric}. \"The gods are with us, $!{father}. They have blessed me, and their power grows stronger.\"[/i]\n\n*comment --------------------------------------------------------------\n*comment                   Part 2: Wolves Gather\n*comment --------------------------------------------------------------\n*label part2\n*page_break\nWinds whip sleet around the palisades of Dinas Emrys; it's one day after your return, and the winter has sent you a sharp reminder that it's not over yet. ${Blaise} and ${Vivian} have been locked in debate with the druids and the ${priestesses} for days now. It's a fragile moment; all want there to be an answer, and a swift one, but it feels as if there is a deep split through the heart of Gwynedd.\n\n\"You should just take it,\" says ${Cai}. \"At least then someone would be [i]doing[/i] something. Did you know they've run out of salt fish? Maybe we should go fishing until this all sorts itself out.\"\n\n\"The stores are low,\" agrees ${Emrys}, brushing the snow from ${his} cloak as ${he} steps in to your hut. \n*if chapter10_fake_hand\n\t$!{He} has a package under ${his} arm.\n\"The ground is still frozen, and snow still covers the grass in places. The sun is late this year, and what little meat the hunters bring in is from lean, starved creatures. If the weather doesn't break soon there may be trouble.\"\n\n\"Could we not buy food?\" asks ${Cai}. \"It was much warmer down south; perhaps they can spare something?\"\n\n*if chapter9_emrys_wounded\n\t${Emrys} winces as ${he} massages the flesh over over ${his} ribs—${his} wound still pains ${him}.\n*if chapter9_emrys_wounded=false\n\t${Emrys} grimaces.\n\"Perhaps, but Gwynedd's coffers are bare, and we've little to trade; the fighting through the winter has taken a great toll. On weapons, as well as food; we lost a good smith and a master fletcher. \n*if ( (((chapter10_gorlaes_allies=false) and (chapter6_cadells_men=false)) and (chapter7_lots_men=false)) and ((chapter9_item_arthur!=\"cup\") or (chapter10_used_cup=true)) )\n\t*comment No choice. Arthur's been terrible at alliances\n\tIf we had allies, now would be the time to call on them. But we have none who would have food to spare and the inclination to send it to us.\"\n\t*goto part2_hand\nWe may need to ask for the support of our allies and neighbours.\"\n\n*choice\n\t*selectable_if (chapter10_gorlaes_allies) #\"I think ${Gorlaes} might be persuaded to help us. $!{He} seemed a generous ${man}.\"\n\t\t*set chapter11_food_ally \"gorlaes\"\n\t\t\"It's a good thought, from what you've told me of ${him},\" says ${Emrys}. \"I'll talk to ${Blaise} about sending a message when ${he} has a moment.\"\n\t\t*if chapter10_gorlaes_impressed>=6\n\t\t\t*set chapter11_food_level 2\n\t\t\t*goto part2_hand\n\t\t*else\n\t\t\t*set chapter11_food_level 1\n\t\t\t*goto part2_hand\n\t\t\t\n\t*selectable_if (chapter6_cadells_men) #\"We should send to $!{King} ${Cadell} for aid; call on ${his} Christian charity.\"\n\t\t*set chapter11_food_ally \"cadell\"\n\t\t*if (old_faith\u003c=40)\n\t\t\t*set chapter11_food_level 2\n\t\t\t\"${Cadell}—yes, it's a good thought. $!{He} sees you as a strong ally, and I think ${he}'d be willing,\" says ${Emrys}. \"I'll talk to ${Blaise} about sending a message when ${he} has a moment.\"\n\t\t\t*goto part2_hand\n\t\t*elseif (old_faith\u003c=50)\n\t\t\t*set chapter11_food_level 1\n\t\t\t\"${Cadell}—perhaps. $!{He}'s certainly not ill-disposed towards us,\" says ${Emrys}. \"I'll talk to ${Blaise} about sending a message when ${he} has a moment.\"\n\t\t\t*goto part2_hand\n\t\t*else\n\t\t\t*set chapter11_food_level 1\n\t\t\t\"${Cadell} may exact a high price,\" says ${Emrys}. \"I think ${he} feels slighted that ${his} Warleader doesn't share ${his} faith. But I'll talk to ${Blaise} about sending a message when ${he} has a moment.\"\n\t\t\t*goto part2_hand\n\t\t\n\t*selectable_if (chapter7_lots_men) #\"What of ${Gawain}'s ${father}, $!{King} ${Lot}? We could ask ${him}. I know ${he} will always put Lothian first, but ${he}'s a ${man} of wealth.\"\n\t\t*set chapter11_food_ally \"lot\"\n\t\t*set chapter11_food_level 1\n\t\t\"Perhaps,\" says ${Emrys}. \"I suspect $!{King} ${Lot} will exact a high price from us; ${he} is not a charitable ${man}. But I'll talk to ${Blaise} about sending a message when ${he} has a moment.\"\n\t\t*goto part2_hand\n\t\t\n\t*selectable_if ((chapter9_item_arthur=\"cup\") and (chapter10_used_cup=false)) #\"Could we not trade Ambrosius's guesting cup? ${Vivian} said that it was worth a fortune. But a fortune's useless to starving people.\"\n\t\t*set chapter11_food_ally \"cup\"\n\t\t*set chapter11_food_level 3\n\t\t*set chapter11_used_cup true\n\t\t\"That is an excellent notion, if you can bear to be parted from it,\" says ${Emrys}. \"It would fetch a good price; that would see us well-supplied with both goods and weapons. I will talk to ${Blaise} about who best to approach.\"\n\t\t*goto part2_hand\n\t#\"We can't ask. Gwynedd needs to appear strong, even if in truth it isn't. We must tighten our belts.\"\n\t\t*set chapter11_food_ally \"none\"\n\t\t*set chapter11_food_level 0\n\t\t*set compassion %-10\n\t\t*set bravado %+10\n\t\t${Cai} looks sorely at ${his} cup of wine. \"I'll start taking it in sips, then, I suppose,\" ${he} says dolefully.\n\t\t\n\t\t${Emrys} nods. \"I understand, ${Arthur}. You're right, the appearance of strength is important. I hope that the weather treats us well.\"\n\t\t*goto part2_hand\n\n*comment --------------------------------------------------------------\n*label part2_hand\n*if chapter10_fake_hand=false\n\t*goto part2_rumors\n\t\n*set chapter11_bedwyr_rival true\n\n$!{He} takes the bundle from under ${his} arm and lays it on the table, unwrapping it. \"Here, look.\"\n\nIt's a glove wrought of iron. It looks new-made; overlapping scales gleam in the light. It takes your breath away.\n\n\"That's amazing,\" says ${Cai}, picking it up. \"You made this, ${Emrys}? I've never seen armor so fine…what's it for?\"\n\n\"${Bedwyr},\" says ${Emrys}. \"A maimed ${man} cannot be $!{King}. \n*if chapter10_fake_hand_asked=false\n\t${Arthur} thought I should attempt it.\nIt's not silver, of course, but I think it will do the task.\"\n\n*if chapter10_fake_hand_asked=false\n\t${Cai} looks at you in puzzlement. \n*if chapter10_fake_hand_asked\n\t${Cai} stares at the two of you in puzzlement.\n\"And there I was thinking you didn't like the ${man}.\"\n\n${Emrys} beams. \"Well, ${Arthur}, will you come with me to present it to ${him}?\"\n\n*choice\n\t#\"I don't want ${him} to feel indebted to me; and it was your idea. You take it to ${him}, ${Emrys}.\"\n\t\t*set rel_bedwyr %+20\n\t\t*set acclaim %+10\n\t\t*achieve even_handed\n\t\t${Emrys} nods. \"Very well, ${Arthur}, I will do so.\"\n\t\t*goto part2_rumors\n\t\t\n\t#\"I will—let's find ${him}, but we should do it quietly.\"\n\t\t*set rel_bedwyr %+15\n\t\t*set diplomat %+10\n\t\t*set warrior %-10\n\t\t*achieve even_handed\n\t\tAnd so you and ${Emrys} seek out ${Bedwyr} and take ${him} aside to present ${him} with the gift.\n\t\t\n\t\t\"This…this is masterwork, Wanderer,\" ${he} says to ${Emrys}, turning it over. Then ${he} looks at you. \"Why would you encourage this, ${Arthur}?\"\n\t\t\n\t\t*fake_choice\n\t\t\t#\"I've no desire to be $!{King}.\"\n\t\t\t\t\"Indeed.\" $!{He} frowns, thoughtful. \"We will see what the council says. Thank you, ${Emrys}.\"\n\t\t\t\t\n\t\t\t#\"Gwynedd needs you, ${Bedwyr}. It has lost too much. It needs to see you hale and hearty.\"\n\t\t\t\t\"I thank you,\" ${he} says. \"I thank you both.\"\n\t\t\t\t\n\t\t\t#\"No one deserves what happened to you, ${Bedwyr}, not if it can be mended.\"\n\t\t\t\t\"Not mended,\" ${he} says bitterly. \"Perhaps 'patched' would be a better word. But I thank you for the sentiment. I thank you both.\"\n\t\t\t\n\t\t*goto part2_rumors\n\t\t\n\t#\"We should present it to ${him} in front of as many people as possible.\"\n\t\t*set rel_bedwyr %-10\n\t\t*set bravado %+15\n\t\t*set acclaim %+20\n\t\t*achieve even_handed\n\t\tAnd so, in front of a packed hall, you and ${Emrys} present ${Bedwyr} with the gift.\n\t\t\n\t\tThere is a rumbling of shock and surprise through the crowd as the hand is revealed. \n\t\t*if chapter10_fake_hand_asked\n\t\t\t${Bedwyr} is clearly irritated at being so publically indebted to you, but even so ${his} eyes widen with a \n\t\t*if chapter10_fake_hand_asked=false\n\t\t\tThe look on ${Bedwyr}'s face comprises shock, anger, but also a \n\t\tmeasure of avaricious pleasure as ${he} sees the quality of the gift.\n\t\t\n\t\t${Emrys} helps ${him} strap it to ${his} forearm and then the maimed $!{Prince} of Gwynedd stands, whole again, hand gleaming in the firelight.\n\t\t\n\t\tA cheer goes up.\n\t\t\n\t\t\"Thank you, Wanderer,\" says ${Bedwyr} to ${Emrys}. \"I will not forget this.\"\n\n\t\t*goto part2_rumors\n\t\t\n*comment --------------------------------------------------------------\n*label part2_rumors\n*page_break\nThat evening, as the sleet turns to a thick grey rain, bedraggled scouts report that a large Saxon force is on the move. This is no mere raiding party like the one who attacked Dinas Emrys at the beginning of winter.\n\n\"It must be nearly all their strength,\" says ${Gawain}. \"A rash, rash move in this weather. Why did they not wait for spring?\"\n\n\"Maybe it was just to take us by surprise?\" says ${Cai}, brushing damp hair back from ${his} face. \"Or maybe it's just because the air here is so full of water right now that they can make proper use of their longships.\"\n\n\"This is no laughing matter,\" says ${Gawain}. \"If that whole force gets here, that's it; it's over.\"\n\n\"It's time,\" says ${Emrys}, putting ${his} head around the door. \n*if (chapter9_item_arthur=\"torc\")\n\t*set acclaim %+15\n\t$!{He} sees you, and walks over to you. \"${Arthur}—you took this from ${Ambrosius}'s tomb. It's time to wear it.\"\n\n\tWith that ${he} settles the golden Torc of the Pendragon around your neck.\n\n\t\"But ${he}'s not $!{King}!\" objects ${Cai}. \"Won't this—\"\n\t\n\t\"It doesn't matter,\" says ${Emrys}. \"This is a reminder of who ${Arthur} is; that ${he}'s as much a part of Gwynedd as anyone else. That ${he}'s the Warleader. And of ${Ambrosius}, the last great ${king}. Now come with me. They're waiting.\"\n\n*if (chapter9_item_arthur!=\"torc\")\n\t\"Time for what?\" asks ${Cai}.\n\n\t\"Come with me, ${Arthur},\" says ${Emrys}. \"They're waiting.\"\n*comment -------------------------------------------------------------\n*page_break\nYou step into the round hut that ${Vivian} and ${Blaise} have been using for their debates. It's gloomy, and thick with smoke from the small fire in the center. There's an acrid taste to it, a bitterness; perhaps from the burning of one of ${Vivian}'s herbs.\n\n${Vivian} stands by the fire, dark cowl pulled up around ${her_his} face, looking like a raven-spirit from the old tales. ${Blaise} stands beside ${her_him}, leaning on ${his} staff; ${he} looks tired. In the darkness, you make out other figures sat around the edges of the space. You're not sure who they are.\n\n*if chapter11_bedwyr_rival\n\t*goto part2_rivalry\n*else\n\t*goto part2_norivalry\n*comment --------------------------------------------------------------\n*label part2_rivalry\n${Bedwyr} stands with ${Blaise} and ${Vivian}, ${his} new hand gleaming silver in the firelight.\n\nYou step forward, aware that ${Emrys} has remained by the door.\n\n\"And so we come to it,\" says ${Vivian}. \"I will give you the thoughts of our council. It is a simple thing I have to say to you both. And then each of you must go from here, search your hearts, and then return to us. God willing, that will give us the answer we need.\"\n\n\"You are both the ${son}s of ${Uther}. Both of you are strong, in different ways. Both of you have those who will follow you into battle. Both of you have proved yourselves true warriors of Gwynedd, and of this country.\"\n\n*if (((leader>50) and (acclaim>40)) and (rel_vivian>30))\n\t$!{She} pauses, and looks directly at ${Bedwyr}. \"Yet I tell you, ${Bedwyr}, ${son} of ${Uther}, without slight to you, without bitterness, but with words of truth, that this council is of the opinion that ${Arthur} ${ap} ${Uther} would be the better ${man} to lead the folk of Gwynedd in this dire need.\"\n\n\tYou see ${Bedwyr}'s face—stoic, unchanged, brown eyes a mirror for the fire.\n\t*goto part2_rivalry_1\n*else\n\t$!{She} pauses, and looks directly at you. \"Yet I tell you, ${Arthur}, ${son} of ${Uther}, without slight to you, without bitterness, but with words of truth, that this council is of the opinion that ${Bedwyr} ${ap} ${Uther} would be the better ${man} to lead the folk of Gwynedd in this dire need.\"\n\t*goto part2_rivalry_1\n\n*label  part2_rivalry_1\n\n\"This is the council's advice. It is not binding, and much depends on your next action. Now go, search your hearts, and return with words to speak to us.\"\n\nYou feel ${Emrys}'s hand on your shoulder. You nod, avoiding ${Bedwyr}'s look, and return to your chamber.\n*page_break\n\n*gosub_scene startup get_lover\n\n*if (lover=\"gawain\")\n\tIt's just you and ${Gawain}.\n\n\t\"I don't know,\" ${he} tells you.\n\t*if acclaim>40\n\t\t\"You're well liked.\n\t*if acclaim\u003c=40\n\t\t\"I don't think you're as well liked as ${Bedwyr}.\n\t*if leader>50\n\t\tThey know you're a good leader.\n\t*if leader\u003c=50\n\t\tI'm not sure they'd follow you.\n\t*if warrior>30\n\t\tYou've proved yourself in a fight, time and again.\n\t*if warrior\u003c=30\n\t\tI don't think they've seen you stand up and fight, not where all can see.\n\tBut I just don't know. I'm sorry.\"\n\n\t$!{He} sits down beside you and puts ${his} arm around you. \"I'm with you, though, whatever you decide.\"\n\n\t\"Thank you,\" you tell ${him}.\n\n\t$!{He} kisses you. \"Don't ever doubt it. But for now, I'll let you think. ${Emrys} will call you when it's time.\"\n\t*goto part2_rivalry_2\n\n*else\n\tIt's just you and ${Emrys}. $!{He} sits listening to the rain in the rafters, hands loosely laced, a slight smile on ${his} lips.\n\n\t\"Well?\" you ask ${him}.\n\n\t$!{He} nods slowly. \"Well. \n\t*if diplomat>50\n\t\tYou've the tongue of a $!{King}. Oh, keep that smirk from your face—I mean that you've proved, time and again, that you can say the things which needs to be said. You've the subtlety that's needed, right enough.\"\n\t*if diplomat\u003c=50\n\t\tYou've seen and done a great deal since you've returned here, ${Arthur}, and you've fought well and proved yourself a leader, but it's my thought that a $!{King} needs to be subtle. Subtle words can win or lose a battle just as much as swords. Have you that subtlety?\"\n\t\n\t*if allies>5\n\t\t\"You've been able to bring promises of alliance, and that means a great deal.\n\t*if allies \u003c=5\n\t\t\"You could have done more to bring promises of alliance, perhaps; Gwynedd feels exposed.\n\t*if compassion>60\n\t\tYou're seen as a compassionate ${man}, and that's no bad thing in a ${king}.\n\t*if compassion\u003c40\n\t\tThere's a streak of ruthlessness in you; but that means you're seen as decisive.\n\t*if ((compassion>=40) and (compassion\u003c=60))\n\t\tYou're seen as even-tempered, but some might read that as emotionless, detached.\n\t*if bravado\u003c40\n\t\tYou're quicker-witted than ${Bedwyr}, that much is plain to all.\n\t*if bravado>60\n\t\tYou're straightforward in your approach to things, and people like that in a ruler.\n\t*if ((bravado>=40) and (bravado\u003c=60))\n\t\tYou have wit when it's needed, and forthrightness when the time comes to act.\n\t*if old_faith\u003c40\n\t\tYou pay more service to Christ than ${Bedwyr} or ${Uther}, but that puts ${men}'s minds back to ${Ambrosius}.\n\t*if old_faith>60\n\t\tPeople were worried you'd ignore their gods, you'd be too much a ${man} of Christ, but that's not the case.\n\t*if ((old_faith>=40) and (old_faith\u003c=60))\n\t\tYou've done a good job of balancing both old and new faiths, alienating neither.\n\tBut in all this, ${Arthur}, I can only tell you what people think. I can't tell you what to do.\"\n\n\t*if lover=\"emrys\"\n\t\t$!{He} sits down beside you and takes your hand. \"This will be a difficult path, whichever one you choose to take. But you do have friends, and we will be with you.\" $!{He} kisses your hand. \"But at the end, this decision must be yours.\"\n\n\t*goto part2_rivalry_2\n\n*label part2_rivalry_2\n*choice\n\t#\"I won't take the throne. I'll step aside for ${Bedwyr}.\"\n\t\t*set diplomat %+15\n\t\t*set warrior %-15\n\t\t*set chapter11_king \"bedwyr\"\n\t\t*achieve step_aside\n\t\t*goto part2_king\n\t\t\n\t#\"It's simple. If it's a choice between ${Bedwyr} and me, then it must be me. I'll make ${Vivian} and ${Blaise} see that.\"\n\t\t*set diplomat %-15\n\t\t*set warrior %+15\n\t\t*if lover=\"gawain\"\n\t\t\t${Gawain} nods. \n\t\t*if lover!=\"gawain\"\n\t\t\t${Emrys} nods.\n\t\t\"Then you'd best go back to them and say so. But be careful, Art. They won't like you forcing their hands.\"\n\t\t*if (((bravado>60) and (compassion\u003c45)) and (acclaim>40))\n\t\t\t*set chapter11_king \"arthur\"\n\t\t\t*goto part2_king\n\t\t*else\n\t\t\t*set chapter11_king \"bedwyr\"\n\t\t\t*goto part2_king\n\t\t\t\n\t#\"This shouldn't be a decision for a council behind closed doors. This should be a decision for the people. I'll talk to ${Bedwyr}—${Blaise} and ${Vivian} need to put this to everyone.\"\n\t\t*set warrior %-15\n\t\t*set leader %+15\n\t\tThe Long Hall is packed full; you can hear the babble and hubbub as you and ${Bedwyr} sit quietly in the hut next door. Neither of you have spoken; there's nothing unfriendly about ${his} manner, it's more that ${he}'s concentrated, tense, like the string of a bow.\n\n\t\tYou've heard ${Vivian}'s practiced tones rising above the voices; you've heard both approbation and anger. But it's muted, muffled here by the sound of the rain hammering on the thatch, and you've no idea what the mood is.\n\n\t\tAnd then the voices quiet all of a sudden. \n\t\t\n\t\t${Bedwyr} looks at you.\t\"It was a good thing, you did,\" ${he} says, raising ${his} metal hand. \"This is a great gift, and I know you had much to do with it. Whatever happens now, you have my thanks. $!{Brother}.\"\n\n\t\t$!{He} extends ${his} good arm and the two of you clasp hands.\n\n\t\tAnd then the roar goes up. ${Bedwyr} stiffens. A word, shouted, then shouted again by a hundred voices.\n\n\t\t*if ((acclaim>40) or (allies>6))\n\t\t\t*set chapter11_king \"arthur\"\n\t\t\t\"${Arthur}! ${Arthur}!\"\n\n\t\t\t$!{He} releases your hand. \"Well, we have our answer,\" ${he} says bitterly.\n\t\t\t*goto part2_king\n\t\t*else\n\t\t\t*set chapter11_king \"bedwyr\"\n\t\t\t\"${Bedwyr}! ${Bedwyr}!\"\n\n\t\t\t$!{He} releases your hand. \"Well, we have our answer.\"\n\t\t\t*goto part2_king\n\t\t\t\n*comment --------------------------------------------------------------\n*label part2_norivalry\n\n${Bedwyr} stands with ${Blaise} and ${Vivian}, a resolved look on ${his} face, ${his} bandaged arm tied in a sling across ${his} body.\n\nYou step forward, aware that ${Emrys} has remained by the door.\n\n\"And so we come to it,\" says ${Vivian}. \"${Bedwyr} has something ${he} wishes to say in your hearing.\"\n\n\"Aye,\" says ${Bedwyr}. $!{He} steps forward to you, eyes dark. \"${Arthur} ${ap} ${Uther}; I am a maimed ${man}. That much is clear. I cannot rule our people. But someone must, or Gwynedd will fall into the darkness.\"\n\n\"There are those that have been raising their voices in my support. Those who mislike the idea of a ${man} who is so much of a Roman as yourself ruling our people and our fate.\" $!{His} face is sombre. \"Those people have forgotten ${Ambrosius}. This wrangling and back-biting has gone on too long. Whatever I think of you, ${Arthur}, Gwynedd must have a $!{King}, a strong $!{King}, and it must have one now. You have all of my support, and I will urge the same of my followers.\"\n\n$!{He} extends ${his} good hand to clasp yours. \"May the gods favor you, $!{brother}.\"\n\n${Vivian} nods. \"It is decided,\" ${she} says. \"You will be $!{King}, ${Arthur} ${ap} ${Uther}.\"\n\n*set chapter11_king \"arthur\"\n*goto part2_king\n*comment --------------------------------------------------------------\n*label part2_king\n*page_break\n\nYellow-gold firelight flares up and flickers on the tall stones of the circle, as ${men} with torches move to surround it. In the center stands ${Blaise}, heavy woollen cloak dripping with rain. The torches sputter and hiss as the people of Gwynedd crowd around the stones; weather is nothing compared to what is to happen here.\n\nOne of ${Blaise}'s acolytes steps forward and lowers a copper bowl at ${his} feet. The liquid in it is dark, and in it the reflected flames are green-blue. $!{Blaise} takes a fine-pointed knife and immerses it in the liquid, then nods in satisfaction.\n\nThen ${he} raises ${his} staff and slams the heel of it down on rock. It's not loud, and yet the buzz of voices around the circle stills, instantly, and all that's to be heard is the rain.\n\nYou are aware of ${Vivian} on the edge of the circle, wrapped in ${her_his} darkness, hood pulled up so that all you can see is ${her_his} mouth—a thin line, betraying nothing.\n\n\"The time has come,\" says ${Blaise} at last. \"We have taken counsel with the Old Ones. It is time. Gwynedd needs a $!{King}. \n*if chapter11_king=\"arthur\"\n\tStep forward, ${Arthur} ${ap} ${Uther}.\"\n\n\t$!{He} bids you speak words that have been spoken in this circle for time out of mind. $!{He} makes you kneel, and bare your chest. And there, amongst the tall stones, the people of Gwynedd watch as ${Blaise} marks the skin over your heart with the three-fold sign of the gods. And the rain falls.\n\n\tWhen you rise again and stand before them, it is as $!{King} ${Arthur} of Gwynedd.\n\t*if ((acclaim>50) and (leader>50))\n\t\t*set chapter11_final_fight +2\n\t\tThe cheer that goes up is overwhelming.\n\t\t*goto part3\n\t*elseif ((acclaim>40) and (leader>40))\n\t\t*set chapter11_final_fight +1\n\t\tThe cheer that goes up is loud with approval.\n\t\t*goto part3\n\t*elseif ((acclaim\u003c30) and (leader\u003c30))\n\t\t*set chapter11_final_fight -1\n\t\tThe cheer that goes up is ragged and desultory.\n\t\t*goto part3\n\t*else\n\t\tThe cheer that goes up holds more relief than joy.\n\t\t*goto part3\n*else\n\tStep forward, ${Bedwyr} ${ap} ${Uther}.\"\n\n\t$!{He} bids ${Bedwyr} speak words that have been spoken in this circle for time out of mind. $!{He} makes your ${brother} kneel, and bare ${his} chest. And there, amongst the tall stones, the people of Gwynedd watch as ${Blaise} marks the skin over ${Bedwyr}'s heart with the three-fold sign of the gods. And the rain falls.\n\n\tWhen ${he} rises again to stand before them, it is as $!{King} ${Bedwyr} of Gwynedd.\n\n\tThe cheer that goes up is loud with approval.\n\n\t*set chapter11_final_fight +1\n\t*goto part3\n\n*comment --------------------------------------------------------------\n*comment                   Part 3: Allies\n*comment --------------------------------------------------------------\n*label part3\n*page_break\nOver the next days, there's barely a moment for you to stop and work out what's happened. The Saxons near every day, moving openly through the hills, burning as they come.\n*if (chapter11_king=\"arthur\")\n\tAs both $!{King} and Warleader, you're forced to take decisions that have waited too long. \n*if (chapter11_king=\"bedwyr\")\n\tYou may not be $!{King} of Gwynedd but you're still Warleader of the Britons, in name at least, and ${Bedwyr} is forced to work with you.\nMessages are sent to allies, fighting ${men} are gathered from nearby settlements, more scouts are sent out to make sure of the foe, people are set to repair fortifications.\n\n*if chapter11_food_level=0\n\tThere's precious little food in the stores, and you must make do with the battered and ill-repaired weapons and armor in the fortress. Your people do what they can to make improvements.\n\t*goto part3_summon_allies\n\n*else\n\tOn the fifth day, food and weaponry starts to arrive from \n\t*if chapter11_food_ally=\"gorlaes\"\n\t\tKernow.\n\t*if chapter11_food_ally=\"lot\"\n\t\tLothian.\n\t*if chapter11_food_ally=\"cadell\"\n\t\tPowys.\n\t*if chapter11_food_ally=\"cup\"\n\t\tthe surrounding kingdoms, its high prices paid for by ${Ambrosius}'s silver guesting cup.\n\t*if chapter11_food_level=1\n\t\t*set chapter11_final_fight +1\n\t\tIt's poor fare and won't stretch far, but it's better than nothing at all.\n\t*if chapter11_food_level=2\n\t\t*set chapter11_final_fight +2\n\t\tIt's good, solid fare and the weapons are of a decent quality—${Emrys} commends you on your decision.\n\t*if chapter11_food_level=3\n\t\t*set chapter11_final_fight +3\n\t\tThe food is plentiful, and the weapons and armor are far superior to what you have remaining in the stores. There's even wine for ${Cai}.\n\n*comment --------------------------------------------------------------\n*label part3_summon_allies\n\n*if allies>=6\n\t*set chapter11_final_fight +3\n\t*goto part3_1\n*elseif allies >=3\n\t*set chapter11_final_fight +2\n\t*goto part3_1\n*elseif allies >=2\n\t*set chapter11_final_fight +1\n\t*goto part3_1\n\n*if allies=0\n\tYou've sent messages out, but no one rides to your aid; where there were alliances to be won over the winter, none of the overtures were successful. You are on your own.\n\t\n*label part3_1\n\n*temp ally_count\n*set ally_count 0\n\n*if chapter6_cadells_men\n\t*set ally_count +1\n\tOn the seventh day, the banner of Powys is seen in the distance, and that evening a good-sized force under $!{King} ${Cadell} sets up camp around the tall stones. ${Cadell} promptly orders a wooden cross erected.\n\n*if chapter7_lots_men\n\t*set ally_count +1\n\tOn the ninth day, the ${men} of Lothian arrive, with ${Gawain}'s ${brother} ${Agravaine} at their head. $!{He} greets you coldly; you're certain ${his} presence here wasn't by ${his} own choice.\n*if ( (chapter7_lots_men=false) and (chapter7_epithet_spitehearth) )\n\tOn the ninth day, a message arrives from ${Gawain}'s family in the north. It commiserates with your current troubles, and apologizes, saying that Lothian cannot spare any warriors from its own troubles at the moment. It is addressed to ${Arthur} Spitehearth.\n\n*if chapter7_duncans_men\n\t*set ally_count +1\n\tOn the twelfth day, ${Lot}'s neighbour $!{King} ${Duncan} of Strathclyde rides in through your gates; ${his} ${men} joke and laugh and work hard clearing space for their tents.\n\n*if chapter8_dyfrig_ally\n\t*set ally_count +1\n\tOn the thirteenth day, a small, battered group arrive, armed and armored and bearing chapbooks. Their leader is ${Dyfrig}, the mad ${priest} of Christ, still utterly convinced of ${his} vision of an angel. ${Cai} is aghast. \"${Morgan} said ${he} was a lunatic—why on earth would we want ${him} here?\"\n\n\t\"Better here where we can see ${him},\" grunts ${Gawain}. \"Although I must confess I've more temptation to put in a knife in ${his} throat than for anyone else save ${Cynric}.\"\n\n*if chapter10_gorlaes_allies\n\t*set ally_count +1\n\tOn the fourteenth day the black raven banner is seen and the warriors of Kernow arrive, with $!{King} $!{Gorlaes} riding at the fore. \n\t*if chapter10_geraint_allies\n\t\t*set ally_count +1\n\t\tAlongside ${him} is ${Geraint} of Dumnonia and ${his} men.\n\tThese newcomers are greeted with a mixture of suspicion, disbelief and hope; since ${Uther}'s dalliance with ${Ygerna}, the banner of Kernow has never flown alongside Gwynedd.\n\n*if allies=0\n\t\"This is hopeless,\" says ${Bedwyr} to you.\n*if allies>0\n\t\"But I doubt it's enough,\" says ${Bedwyr} to you. \n*if chapter11_king=\"arthur\"\n\t$!{He} has been out-of-sorts, understandably, but has swallowed ${his} pride and is doing ${his} best to work with you.\n\"Now, if we had ${Aeron} of Dyfed, that would make a difference. Since ${he} refused to acknowledge you Warleader, ${he}'s allied together a number of kingdoms, and if ${he} could be persuaded they'd follow.\"\n\n\"How do we get ${his} aid?\" you ask ${him}.\n\n$!{He} looks at ${Emrys}. \"There is a way,\" ${he} says. \"There is still no High $!{King} of the Britons. If Gwynedd were to back ${Aeron} to be Pendragon,\n*if allies>0\n\tand if we were to be able to convince our allies of it, \nthen we could again be one country, under one leader, and ${Aeron}'s aid would be beyond doubt. But we must move fast.\"\n\n\"Or perhaps Gwynedd might show that it's now strong enough to take that title,\" says ${Emrys}.\n*if chapter11_king=\"arthur\"\n\t\"It could be you, $!{King} ${Arthur}. \n*if chapter11_king=\"bedwyr\"\n\t\"It could be you, $!{King} ${Bedwyr}.\nIt might be that now there's a strong $!{King}, ${Aeron} is persuadable to bow the knee to you.\"\n\n*choice\n\t#\"You're right, ${Bedwyr}. We should persuade our friends and allies and send word to ${Aeron} at once that we'll back ${him} to be High $!{King}.\"\n\t\t*set rel_bedwyr %+10\n\t\t*if ((diplomat>50) and (allies>3))\n\t\t\t*set chapter11_final_fight +2\n\t\t\t*set chapter11_high_king \"Aeron\"\n\t\t\t*set chapter11_aerons_men true\n\t\t\tYou take counsel with your allies and reach a broad agreement. Your messengers ride to ${Aeron} with the next dawn.\n\t\t\t*goto part3_highking\n\t\t*elseif (allies>1)\n\t\t\tYou and your allies can't come to an agreement; not all will support ${Aeron}.\n\t\t\t*goto part3_highking\n\t\t*else\n\t\t\tYou spend hours in discussion with ${Emrys}, ${Bedwyr} and ${Blaise}, but it becomes apparent that you just don't have enough allies to support ${Aeron}. Your support would make little difference.\n\t\t\t*goto part3_highking\n\n\t*if (chapter11_king=\"arthur\") #\"Yes. If we show ${Aeron} that we are strong, and that we have support, ${he}'ll bend the knee to Gwynedd. I will be the next Pendragon.\"\n\t\t*if ((leader>50) and (allies>=5))\n\t\t\t*set chapter11_final_fight +2\n\t\t\t*set chapter11_high_king \"arthur\"\n\t\t\t*set chapter11_aerons_men true\n\t\t\tYou gather your allies together and spend a long night in debate and dealmaking. As dawn breaks, there is accord; your allies are prepared to support you to become High $!{King}, ${Uther}'s successor.\n\n\t\t\tYou send swift messengers to ${Aeron}. The message ${he} sends in response is marked with the words '${Arthur}, future Pendragon.' The alliance—and ${his} warriors—are yours.\n\t\t\t*goto part3_highking\n\t\t*elseif (((leader>50) and (allies>=3)) and (diplomat>30))\n\t\t\t*set chapter11_high_king \"arthur\"\n\t\t\tYou gather your allies together and spend a long night in debate and dealmaking. As dawn breaks, there is accord; your allies are prepared to support you to become High $!{King}, ${Uther}'s successor.\n\n\t\t\tYou send swift messengers to ${Aeron}. The message ${he} sends in response is cool, congratulating you on the support of your peers, but not offering ${his} own.\n\n\t\t\tStill, the news in the camp that a new Pendragon might be proclaimed any day raises spirits. This might make enough of a difference.\n\t\t\t*goto part3_highking\n\t\t*else\n\t\t\tYou gather your allies together, but over a long night of debate, it's clear there's not enough support for you to assume ${Uther}'s mantle and become Pendragon.\n\t\t\t*goto part3_highking\n\n\t*if (chapter11_king=\"bedwyr\") #\"Yes. If we show ${Aeron} that we are strong, and that we have alliances, ${he}'ll bend the knee to Gwynedd. ${Bedwyr} should claim the mantle of Pendragon.\"\n\t\t*set rel_bedwyr %+10\n\t\t*if ((diplomat>50) and (allies>4))\n\t\t\t*set chapter11_final_fight +2\n\t\t\t*set chapter11_high_king \"bedwyr\"\n\t\t\t*set chapter11_aerons_men true\n\t\t\tYou and ${Bedwyr} gather your allies together and spend a long night in debate and dealmaking. As dawn breaks, there is accord; your allies are prepared to support ${Bedwyr} becoming High $!{King}, ${Uther}'s successor.\n\n\t\t\tYou send swift messengers to ${Aeron}. The message ${he} sends in response is marked with the words '${Bedwyr}, future Pendragon of Britain.' The alliance is made, and ${his} warriors will come.\n\t\t\t*goto part3_highking\n\t\t*elseif ((diplomat>50) and (allies>2))\n\t\t\t*set chapter11_high_king \"bedwyr\"\n\t\t\tYou and ${Bedwyr} gather your allies together and spend a long night in debate and dealmaking. As dawn breaks, there is accord; your allies are prepared to support ${Bedwyr} becoming High $!{King}, ${Uther}'s successor.\n\n\t\t\tYou send swift messengers to ${Aeron}. The message ${he} sends in response is cool, congratulating ${Bedwyr} on the support of ${his} peers, but not offering ${his} own.\n\n\t\t\tStill, the news in the camp that a new Pendragon might be proclaimed any day raises spirits. This might make enough of a difference.\n\t\t\t*goto part3_highking\n\t\t*else\n\t\t\tYou and ${Bedwyr} gather your allies together, but over a long night of debate, it's clear there's not enough support for ${him} to assume ${Uther}'s mantle and become Britain's Pendragon.\n\t\t\t*goto part3_highking\n\t\t\t\n\t#\"We've only just overcome our own argument—this is no time to start a new squabble over the High $!{King}ship. The time would be better spent preparing for war.\"\n\t\t*if (leader>60)\n\t\t\t*set chapter11_final_fight +1\n\t\t\t${Bedwyr} looks at you for a time, and then sighs. \"Aye, you're right, $!{brother}. There's too much scope for argument. Let's put our minds to using what we have.\"\n\t\t\t*goto part3_highking\n\t\t*else\n\t\t\t\"You're wrong,\" says ${Bedwyr}, angrily. \"We need those ${men}.\" The two of you debate it, and then you discover that ${Bedwyr} has been trying to broker the deal without your support. Rather predictably, more time is spent amongst the Briton ${king}s in argument over the matter, and no resolution is come to. The friction infects the ${men} with unrest.\n\t\t\t*goto part3_highking\n\n*comment --------------------------------------------------------------\n*label part3_highking\n*page_break\n\n*if chapter11_aerons_men\n\t*set ally_count +1\n\t*achieve support_aeron\n\t*if ally_count>=7\n\t\t*achieve support_all\n\tOn the twentieth day, a great force of $!{King} ${Aeron} Longhand's ${men} and ${his} allies reach Dinas Emrys, with food and supplies for all.\n*if chapter11_aerons_men=false\n\tOn the twentieth day, all of the stragglers finally reach Dinas Emrys.\n\nAnd then the waiting truly begins.\n\n\"Well, here we are,\" says ${Cai}. \"Who'd have thought it?\n*if (chapter11_king=\"bedwyr\")\n\t*if (chapter11_high_king=\"Aeron\")\n\t\tYou're Warleader, ${Bedwyr}'s the $!{King}, and $!{King} ${Aeron} will be the next Pendragon.\n\t\t*goto part3_end\n\t*elseif (chapter11_high_king=\"bedwyr\")\n\t\tYou're Warleader, ${Bedwyr}'s the $!{King} and ${he}'ll be Pendragon soon enough.\n\t\t*goto part3_end\n\t*else\n\t\tYou're Warleader and ${Bedwyr}'s the $!{King}.\n\t\t*goto part3_end\n*else\n\t*if (chapter11_high_king=\"Aeron\")\n\t\tYou, a $!{King}, and hobnobbing with $!{King} ${Aeron}, the next Pendragon.\n\t\t*goto part3_end\n\t*elseif (chapter11_high_king=\"arthur\")\n\t\tYou're the damned $!{King}, ${brother}-mine, and you'll be the Pendragon before long!\n\t\t*goto part3_end\n\t*else\n\t\tYou're only the damned $!{King} of Gwynedd!\n\t\t*goto part3_end\n\n*label part3_end\nI wouldn't have credited any of it a year ago. Just you wait, in another year they'll have turned you into a saint!\"\n\n\"The chances of us being here in a year aren't great,\" says ${Gawain}.\n\n${Cai} shrugs. \"I think to be a saint you have to be dead. So I suppose it's sort of a promotion. Well. I've found one, last, whole wineskin. I suggest we make the best of it. Let's get drunk.\"\n\n*goto part4\n\n*comment --------------------------------------------------------------\n*comment                   Part 4: Calm Before The Storm\n*comment --------------------------------------------------------------\n*label part4\n*page_break\n\n${Gawain} bursts into the Long Hall. \"Scouts are in,\" ${he} barks. \"Five, maybe six hours before the first of ${Cerdic}'s forces reach the ford at Dyfi.\"\n\nYou know that, this time, you need to meet in the field. Dinas Emrys isn't fit for a fight of this size; all of you are agreed. You plan to face them in the Baddon valley, where the ground breaks into a maze of hummocks so they can't just roll over you; where there are trees and ditches to hide ${men}; where you know the ground and they don't.\n\n*if (chapter11_final_fight\u003c=2)\n\t*goto part4_hopeless\n\n\"Give the order,\" you tell ${him}. \"Time to move.\"\n\nWhen you emerge into the cleared space before the stockade gate, it is overflowing with bustling people settling gear on their backs, picking up spear and slinging shield, exchanging embraces with loved ones, joking with friends. There is a brittle cheerfulness to everything; it is as if the mood might snap.\n*page_break\n\t\n*if chapter11_high_king=\"Aeron\"\n\t$!{King} ${Aeron} of Dyfed clambers up to stand atop the platform next to the gates, so that all can hear ${him}. The deal you've reached with ${him} over the High $!{King}ship hasn't been announced, but the mutterings have already started, and ${he}'s a well-respected enough ${man} that there's an immediate hush to hear ${his} words.\n\n\t\"I've not much to say,\" ${he} says, and pauses to flash a grin in acknowledgment of the small cheer that goes up at this. \"Not much, but enough. It's quite a feast that Gwynedd has arranged for us, is it not? None can say that this kingdom has ever stinted on its hospitality. I know that the last time we gathered, hard words were spoken, not least my own. But such things are forgotten in the light of day and when heads are less sore. I'm pleased to be your guest,\n\t*if chapter11_king=\"arthur\"\n\t\t$!{King} ${Arthur} of Gwynedd,\n\t*if chapter11_king=\"bedwyr\"\n\t\t$!{King} ${Bedwyr} of Gwynedd,\n\tand I hope you'll grant this small boon that I might make amends. I've a hankering to see the valley of Baddon, for I hear there's good hunting to be found there, and I was wondering if you'd allow myself and, say, a few half hundreds of my closest friends to go for a stroll there, armed to the teeth?\"\n\t\n\tThere's outright laughter at this.\n\n\t\"So long as you leave some of the hunt for the rest of us,\" comes a shout from nearby. ${Cai}.\n\n\t${Aeron} waves it off. \"As to that—we'll just have to see who gets there first, won't we? Come on then, ${lads}! Let's go a-hunting.\"\n\t*goto part4_speech\n\n*elseif (chapter11_high_king=\"bedwyr\") or ((chapter11_high_king=\"\") and (chapter11_king=\"bedwyr\"))\n\t${Bedwyr}, with help from ${Gawain}, scrambles up on to the platform next to the stockade. \n\n\t\"I'm not much of a one for speeches, so this will be a simple thing. ${Cerdic} and ${his} wolves have offered themselves up for the slaughter. They won't go easily, we all know that, but they've saved us a goodly trek—they're all here. Here we can make an end of it. Here we can change things, so that when the spring comes, we can tend the flocks, we can raise our children, we can sit in the sun with a cup of ale. Here we can cut them to pieces, so we don't have to do it again. It won't be easy, but no worthwhile thing ever is.\"\n\n\tThe crowd is nodding, but ${he}'s no rabble-rouser, and ${he} knows it.\n\n\t\"That's all I have to say. Oh—save for one thing more. To the ${man} who takes that weasel-${insult_bastard} ${Cynric}'s head, I'll give three arm-rings of gold.\"\n\n\tA roar goes up at this. \"That's more like it,\" mutters ${Cai}.\n\t*goto part4_speech\n\n*else\n\t*goto part4_speech\n\n*comment --------------------------------------------------------------\n*label part4_speech\n\n\"You're Warleader—now's the time to say something, Art,\" mutters ${Cai} to you. $!{He} and ${Gawain} help you up on to the platform next to the stockade.\n\nYou turn to look out over the crowd.\n\n*temp speech_score\n*set speech_score 0\n\n*choice\n\t*if (leader>40) #\"It's time we took a walk in the valleys…\"\n\t\t*set speech_score +1\n\t\t\"…for it's said there's good hunting in Baddon. Wolves, they say, and here's us all geared up for a wolf-hunt.\"\n\n\t\tThere's laughter amongst the crowd.\n\t\t*goto part4_speech2\n\n\t*if (leader\u003c=40) #\"We've got a hard thing to do here…\"\n\t\t\"…but I know you'll stand with me as we march to Baddon.\"\n\t\t\n\t\tThe crowd is silent, unreponsive, if anything slightly puzzled by your words; you'll have to catch their attention.\n\t\t*goto part4_speech2\n\n\t*if (diplomat>40) #\"Look at our ${brother}s, our allies, those who've come to stand with us…\"\n\t\t*set speech_score +1\n\t\t\"…those who perhaps we've had our arguments with in the past. Here they stand, come to us when we asked. Because they are family. Families fall out over the smallest of things, yet by the next morning all is forgotten. So look around you. This is your family. Together we'll go down to Baddon and show ${Cerdic} and ${his} whelp exactly what happens when you take on [i]this[/i] family.\"\n\n\t\tThere're grins at this, and you see ${Gawain} slap a warrior on the back.\n\t\t*goto part4_speech2\n\n\t*if (diplomat\u003c=40) #\"I want to thank all those who've come to stand with us…\"\n\t\t\"…—even if we had differences in the past, those differences are forgotten now, in the face of the greater threat.\"\n\t\tThere's a murmuring amongst the crowd, and a shuffling of feet.\n\t\t*goto part4_speech2\n\n\t*if (warrior>40) #\"Can you feel your fingers curling, flexing? Mine are restless—they need a sword-hilt to grasp…\"\n\t\t*set speech_score +1\n\t\t\"I know you can feel that tightness in your neck, in your shoulders; that need to be swinging your arm, that need to have your heart pound, your legs pump, your lungs burn. Because that's what it is to be a warrior, a fighter. And today…why, what a day it will be for a warrior, when we stand at Baddon. Are you ready?\"\n\n\t\tThere's a shout of \"Aye!\" loudly from the back and much laughter at it. But you can see it in them; see hands grasp sword-hilts or fists clench and fingers flex.\n\t\t*goto part4_speech2\n\n\t*if (warrior\u003c=40) #\"I know you're ready to fight…\"\n\t\t\"I know every one of you is a true fighter, a Briton warrior. Today is a day for war; today is a day when we'll measure ourselves against ${Cerdic}, and today, we can win.\"\n\t\t\n\t\tThere's polite attention, but you can tell they're unconvinced.\n\t\t*goto part4_speech2\n\n*label part4_speech2\n*choice\n\t*if (compassion>60) #\"I know you're leaving your families; I know some will never return…\"\n\t\t*set speech_score +1\n\t\t\"But remember this. Because of you, because of us, because of what we do today—our families, our children, they won't have these wolves to face. This is our chance to end it, now, so there's the chance of a fine summer and the chance to tend our flocks.\"\n\n\t\tMurmuring and nods of agreement.\n\t\t*goto part4_speech3\n\n\t*if (compassion\u003c=60) #\"I know you're leaving your families; I know some of you may never see them again…\"\n\t\t\"But what we're doing today will make our land safe for the future. Make it safer for everyone we care about.\"\n\n\t\tYour words feel hollow to you, and find no purchase in the crowd; people will die, and who then will tend their flocks?\n\t\t*goto part4_speech3\n\n\t*if (compassion\u003c40) #\"They pride themselves on being like wolves, like predators, looking at us as if we're a nice, fat flock…\"\n\t\t*set speech_score +1\n\t\t\"But we're not sheep. We're the shepherds, we're the hunters, we're the butchers. We are ${men}. Wolves are scavenging animals, who scuffle and yelp in the dirt. Let them be animals. We have fire. We have the sword. We'll put them down like the dogs they are.\"\n\t\n\t\tA cheer goes up at this.\n\t\t*goto part4_speech3\n\n\t*if (compassion>=40) #\"We'll cut them apart like the wolves they pretend to be…\"\n\t\t\"For if they're nothing but animals, then we'll treat them like animals.\"\n\n\t\tA few faint smiles at this.\n\t\t*goto part4_speech3\n\n\t*if (bravado>60) #\"${Cerdic} marches into our land as if ${he} thinks ${he}'s already won…\"\n\t\t*set speech_score +1\n\t\t\"Well—there's a simple answer to that. These are our hills. These are our valleys. We've been here longer than ${he} can dream—this land is in our bones. To break us, ${he}'ll have to break the very rocks themselves. Our land will chew ${him} up and spit ${him} out.\"\n\n\t\tIt's a good image, and you're answered by the hammering of spear-butts in the dirt.\n\t\t*goto part4_speech3\n\n\t*if (bravado\u003c=60) #\"${Cerdic} marches on us as if ${he} thinks ${he}'s already won…\"\n\t\t\"We'll show ${him} how wrong ${he} is. This is our land, and it'll take more than a rabble of dogs to chase us off.\"\n\n\t\tThere're a couple of nodding heads at that, but the crowd seem restless.\n\t\t*goto part4_speech3\n\n*label part4_speech3\n*choice\n\t*if (bravado\u003c40) #\"Now here's a thing. ${Cerdic} has not been clever, but we can be…\"\n\t\t*set speech_score +1\n\t\t\"$!{He}'s just marching ${his} warriors straight into a valley. A valley that we know, a valley full of broken ground, of hillocks, of covered pools, of treacherous bog. We'll use that, and we'll use it well.\"\n\n\t\tNodding, and excited murmuring,\n\t\t\n\t\t*goto part4_speech4\n\n\t*if (bravado>=40) #\"This is fight that'll be best won by the use of our wits…\"\n\t\t\"We know the ground, and we can use it to make sure we have the advantage of ${him}.\"\n\n\t\tSilence over a growing restlessness.\n\t\t\n\t\t*goto part4_speech4\n\t\n\t*if (old_faith>60) #\"You know who stands with us, who watches over our shoulders. These hills are old, and the gods who walk them are our gods…\"\n\t\t*set speech_score +1\n\t\t\"The gods are as much a part of this land as we are. The Romans tried to burn them out of us, to slaughter our priests; and this greatest of Empires has failed and withered and the gods are still here. What hope have the Saxon rabble against the Old Ones of the hills?\"\n\n\t\tThere is much muttering at this, and signs made of warding, but it feels as if you've hit the right note.\n\t\t*if chapter6_cadells_men\n\t\t\tHowever, $!{King} ${Cadell} does not look pleased.\n\t\t\t\n\t\t*goto part4_speech4\n\n\t*if (old_faith\u003c=60) #\"The old gods of this country stand with us…\"\n\t\t\"And we will have them at our backs. The Saxons are far from their own gods; what can they do to harm us?\"\n\n\t\t\"Hack us to pieces?\" mutters someone. There's laughter, hastily-stifled.\n\t\t\n\t\t*goto part4_speech4\n\n\t*if (old_faith\u003c40) #\"God himself is with us…\"\n\t\t*set speech_score +1\n\t\t\"The God who shines a light into dark places, who will drive the evil from the soul of ${Cynric} and ${his} kind. The god of ${Ambrosius}, who never lost a battle on these lands. He will strengthen our limbs, bolster our minds against fear, and He will show the enemy only despair and ruin.\"\n\n\t\tThere are some puzzled looks, but one or two ${men} nod along, particularly when you mention ${Ambrosius}.\n\t\t*if chapter6_cadells_men\n\t\t\t$!{King} ${Cadell} looks particularly pleased.\n\t\t\t\n\t\t*goto part4_speech4\n\n\t*if (old_faith>=40) #\"God is with us, and his son Christ the redeemer, who will strengthen us in battle and save our souls.\"\n\n\t\t\"Save arseholes?\" mutters someone. \"He'd better save you, then, Corran, you're a right arsehole.\"\n\n\t\tAnother ${m
