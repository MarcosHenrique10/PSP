ing through your head, you roll sideways. Your hand closes on something and you come to your feet. There's a sword in your hand. It was just lying there on the rock. Is this part of the contest?\n\t\t\t\nThere's a gasp of shock, and silence. ${final_opponent} has come to a halt next to you, disappointment on ${his} face.\n\t\t\t\n${Blaise} breaks the silence. \"By the terms of this honor circle, whoever stands on the stone and holds ${Uther}'s sword in ${his} hand shall be the Warleader of all the Britons.\"\n\t\t\t\nThen the shouting begins.\n\t\t\t\n*page_break\n\n\"$!{He} is no true Briton!\"\n\n\"You all saw it! The bastard didn't even know what ${he} was fighting for!\"\n\n\"It was luck, just dumb luck!\"\n\n\"We'll not follow ${him}! An untried ${boy}! ${Blaise}, this cannot stand.\"\n\n\"The circle had already begun!\"\n\n$!{King}s and warriors arguing, pressing forward, disgusted, angry, clamoring to be heard. In the middle of it, you are strangely ignored by the tumult as it washes around you, focusing on ${Blaise}, on arguing tradition, on demanding fairness.\n\n\"So,\" says ${Cai}, standing beside you. \"As I said, I made this bet.\"\n\n\"[i]You[/i] wanted to be Warleader in place of ${Uther}?\"\n\n$!{He} shrugs. \"Mostly I wanted to wipe the smiles off their faces and show I could give as good as I got. I didn't expect to win. I didn't expect [i]you[/i] to win.\" $!{He} gestures at the crowd. \"I don't suppose it'll stand for more than a few minutes. Enjoy the title while you can!\"\n\nYou see $!{Lady} ${Vivian} in urgent debate with ${Blaise}. And there with them is ${Uther} ${himself}; you hadn't realized ${he} was at the circle.\n*if chapter2_uther_healed\n\t$!{He}'s leaning on a staff, and has a serving-${man} at ${his} side, who seems petrified that ${he} might overexert ${himself}. $!{Uther}'s \n\t*goto part3_end_1\n*else\n\t$!{He}'s sat on a seat that must have been brought up for ${him}. $!{His} eyes are sunken, the skin around them tinged with yellow. $!{His} \n\t*goto part3_end_1\n*label part3_end_1\nbrow is knotted with anger and ${he} addresses the others in sharp direct whispers.\n\n\"Seems to me this might not have been the best way to become popular,\" says ${Cai}.\n\n*fake_choice\n\t#\"I don't think there's any way I could have been popular.\"\n\t#\"Better than standing on the sidelines and being branded a coward.\"\n\t#\"Thanks, $!{brother}, that's exactly the kind of help I need right now.\"\n\n${Cai}'s look is more sombre than usual. \"Ach, don't worry. They'll put someone else in. It'll be forgotten soon enough.\"\n\nAnd there's ${Blaise} standing on the great rock in the center of the circle, banging the heel of ${his} staff on the stone. \"Peace!\"\n\nAn immediate hush.\n\n${Blaise} clears ${his} throat. \"We have consulted, I for the Old Ones, and the $!{Lady} ${Vivian} for the Isle, and this is our word. ${Arthur} ${ap} ${Uther} was not aware of the contest when ${he} stumbled into it; ${he} had not given ${his} name to the ${priests}, ${his} place was not blessed, and so, though not ${his} fault, we deem it was ill-won. It will be held a second time at this day's dusk.\"\n\nA lifting of brows, surprised murmurs, a break in the atmosphere. ${Blaise} raises a hand. \"Peace, I said! Ill-won, but it was won, and all here saw it won. That being so, ${Arthur} ${ap} ${Uther} is accorded a place in this night's contest and has our blessing to do so.\"\n\nYou see the black look on your ${father}'s face. It would seem that ${Uther} does not always have ${his} own way.\n\n${Cai} puts ${his} arm around your shoulders. \"Ah, well. That's you in the chronicles, then, Art, the shortest-lived Warleader that this country ever had. And mayhap the most successful—you've not lost a single ${man}! Come on, I need something to clear this dust out of my throat.\"\n\n*comment --------------------------------------------------------------\n*comment                  Part 4: Scheming\n*comment --------------------------------------------------------------\n*label part4\n*page_break\n\n[i]\"…and so we must all work together and must take ${Arthur} from the fight as soon as it starts; we cannot have ${him} as Warleader. It is for the good of us all, ${Gawain}. Can you imagine your ${father}'s face?\"[/i]\n\n[i]\"Aye, all too well. But I mislike this. ${Blaise} said ${Arthur} had the blessing of both Isle and Old Ones to be there. For the rest of us to all work against ${him}—there's little honor in it. Oh, two or three allies and friends together in a circle, aye, fair enough. But all of us? It feels wrong.\"[/i]\n\n[i]\"Bugger the honor! We've ${Cerdic}'s Saxons pushing us from the East, closer and closer every year. We've got to be united under a leader, a real leader, one that all will follow. You. Me. By the gods, anyone save that by-blow.\"[/i]\n\n[i]\"I'll think on it, my ${lord} ${Bedwyr}.\"[/i]\n\n[i]\"See that you do, ${ap} ${Lot}.\"[/i]\n\n[i]A sigh, and ${Bedwyr}'s footsteps fading away, back into the hall. Then, after a time:[/i]\n\n[i]\"I know you're there, ${Morgan}.\"[/i]\n\n[i]\"I wasn't trying to hide it, oh Bear of Orkney! I was just taking some air.\"[/i]\n\n[i]\"What does your ${mother} think of all this?\"[/i]\n\n[i]\"Oh, about what you'd expect. Nothing goes smoothly, and so here must ${Vivian} be, soothing nerves that ${Uther} has riled, calming folk who'd kill ${Arthur} here and now. Keeping the Britons together is like trying to keep a dozen salmon in a bucket.\"[/i]\n\n[i]\"So, then, what do you think? Should I go with ${Bedwyr}'s plan for all of us, together, to put ${Arthur} on ${his} arse? It sticks in my craw.\"[/i]\n\n*if (rel_morgan\u003c40)\n\t[i]\"I think ${he}'s right. If ${Arthur} were declared leader, the alliances would shatter into pieces.\"[/i]\n\t\n\t[i]\"Aye, maybe you're right. It's a hard thing for a ${man}, though, to find that all have banded against ${him}.\"[/i]\n\t*goto part5\n*else\t\t\n\t[i]\"The whole point of an honor circle is that any ${man} can win it. The gods choose with wiser eyes than us. And don't forget—${Arthur} is ${Uther}'s eldest-born. $!{He} has more right to this than ${Bedwyr}.\"[/i]\n\t\n\t[i]\"Aye, that's true enough. Perhaps we should leave it in the lap of the gods.\"[/i]\n\t*goto part5\n\t\t \n*comment --------------------------------------------------------------\n*comment                  Part 5: Choose Tactics\n*comment --------------------------------------------------------------\n*label part5\n*page_break\n\n\"${Arthur}.\" A dark-cloaked figure turns as you enter your hut.\n\n\"My $!{Lady} ${Vivian}!\"\n\n\"Don't look so alarmed. I'm not here to berate you for your actions this morning. Although I do have somewhat to say to you. As ${Blaise} said, all saw you fight, and all saw you win. And so ${he} and I are certain you must fight again, for if you do not, all ${men} will wonder what might have been. You must be seen, ${Arthur}. But, if you value the good of this land, you must be seen to lose. And to lose well, giving it your all.\"\n\n${Cai} bristles. \"You can't ask ${him} to-\"\n\n\"I can, ${ap} ${Ector}. This is more important than ${Arthur} showing off how fierce ${he} is, or how well ${he} can beat someone to pulp.\"\n\n\"What happened to leaving it to your gods? I thought that's what you people were all about.\"\n\n\"${Cai}…\" You put a hand on ${his} shoulder. \"Thank you, $!{Lady}. I'll think on it.\"\n\n\"See that you do. Know that I mean you only kindness in this; your life would be a painful one were you to win. And not at my hand.\"\n\n\"I understand.\"\n\n$!{She} strides from the hut.\n\n${Cai} turns an aggrieved glare on you. \"You're not going to listen to that heathen, are you? The whole thing's ridiculous anyway, of course; why on earth does the ${man} who can land the most punches qualify to be the best at leading an army? In any case, what'll you do?\"\n\n*temp temp_deity\n*if old_faith>=50\n\t*set temp_deity \"the gods\"\n\t*goto part5_choice\n*else\n\t*set temp_deity \"the Lord\"\n\t*goto part5_choice\n\n*label part5_choice\n*choice\n\t#\"I'm going to try to win, and if I do, it's the will of ${temp_deity}. Living by faith is the way of these people, even if few seem to remember that.\"\n\t\t*set chapter3_circle_approach \"win\"\n\t\t*set bravado %+20\n\t\t*set diplomat %-30\n\t\t*set warrior %+20\n\t\t*set rel_vivian %-30\n\t\t*set track_champion +1\n\t\t*comment If you trust in God, magnify it; likewise for Old Faith\n\t\t*if old_faith>=50\n\t\t\t*set old_faith %+30\n\t\t\t*goto part5_tactics\n\t\t*else\n\t\t\t*set old_faith %-30\n\t\t\t*goto part5_tactics\n\t\t\n\t#\"I'll put up a good fight for the crowd, but ${she}'s right, ${Cai}, it'll do no good to anyone if I win. Best to watch the others and to back whoever comes out on top, even if it's ${Bedwyr}.\"\n\t\t*set chapter3_circle_approach \"lose\"\n\t\t*set bravado %-30\n\t\t*set rel_vivian %+20\n\t\t*set warrior %-30\n\t\t*set rel_gawain %-10\n\t\t*set diplomat %+20\n\t\t${Cai} grimaces. \"Fair enough. If it is ${Bedwyr}, though, I'll lay odds that we'll be shipped out of here on the morning tide. Or buried in a pit, of course. Listen, best to rest a while now and shake last night's wine; you'll need a clear head later. \"\n\t\t*goto part6\n\t\t\n\t#\"I think ${she}'s right. At the same time, I think ${Bedwyr}'s the wrong ${man} for it. I'll put up a fight, but I'm going to do all I can to make sure that ${Gawain}'s the one who wins.\"\n\t\t*set chapter3_circle_approach \"gawain\"\n\t\t*set rel_gawain %+20\n\t\t*set leader %+20\n\t\t*set warrior %-30\n\t\t${Cai}'s lips twitch. \"${Gawain}? As a siege-weapon, maybe, or perhaps a battering ram, but I can't see ${him} as a leader. Still, I'll back whatever you do. Best to rest a while now and shake last night's wine; you'll need a clear head later. \"\n\t\t*goto part6\n\n*comment --------------------------------------------------------------\n*label part5_tactics\n\n\"Well, then, if you're going to try your hand at this madness I'm with you! Have you a plan?\"\n\n*choice\n\t#\"I know how to fight, ${Cai}—you of all people should know that. And I've done this once, even if it was an accident. I can do it again.\"\n\t\t*set chapter3_circle_tactics \"warrior\"\n\t\t\"Very well, $!{brother}. One way or another, it's going to be a day to remember!\"\n\t\t*goto part6\n\t#\"I'll show them I can lead. I'll band together the weaker fighters, we'll bring down the stronger.\"\n\t\t\"Band the weak against the strong? Seems sensible. Just don't use the word 'weak' when you talk to them, that's my advice. You'd best get going—you've got a lot of convincing to do.\"\n\t\t*set chapter3_circle_tactics \"leader\"\n\t\t*goto part6\n\t#\"A Warleader needs to be more than a fighter—they need to be able to pick who to fight, where and when, and to make alliances. I'll talk to some of the others beforehand, I'll find out what they want. Everybody wants something.\"\n\t\t*set chapter3_circle_tactics \"diplomat\"\n\t\t\"Hah! Rome's senate might be long gone, but we'll make a senator of you yet! You'd best get going—you've plenty of bribes to offer.\"\n\t\t*goto part6\n\t\t \n*comment --------------------------------------------------------------\n*comment                  Part 6: Round 2\n*comment --------------------------------------------------------------\n*label part6\n*page_break\n\n*temp body_part\n*if gender=\"male\"\n\t*set body_part \"groin\"\n\t*goto part6_body_part\n*else\n\t*set body_part \"teat\"\n\t*goto part6_body_part\n\n*label part6_body_part\n\nSunset amongst the tall stones, grey sky stained with pink. Torches are set against the gathering dark.\n\n${Uther} sits in the wooden seat they've set at the edge of the circle for ${him}, eyes heavy, unreadable. ${Vivian} stands by ${his} side, hood raised, only the glitter of eyes within. The crowd is bigger than it was at dawn. You feel many people watching you, and you know that most of them wish you ill.\n\nThere's ${Morgan}, though, a little back on the hillside up on a ledge, kicking ${her_his} heels.\n*if (chapter2_spent_night=\"morgan\")\n\t$!{She} catches your look and smiles.\n\t*goto part6_approach\n*elseif ((chapter2_spent_night=\"girl\") or (chapter2_spent_night=\"both\"))\n\tAnd there's ${Hana}, the ${girl} from last night, although ${she}'s not meeting your gaze, but is stood next to a slim warrior who has ${his} arm around ${her_his} waist.\n\t*goto part6_approach\n*else\n\t*goto part6_approach\n\n*label part6_approach\nAnd ${Aeron} of Dyfed, undoubtedly here to support ${his} champion, but still, ${his} smile is friendly. Beside ${him} is $!{Bishop} ${Iwan}, the old Christian ${priest}.\n\nYou contemplate the upcoming fight.\n*if chapter3_circle_approach=\"lose\"\n\tThe trick here is going be to make it look as if you're fighting as hard as you can, but still to fall at the last.\n\t*goto part6_start\n*elseif chapter3_circle_approach=\"gawain\"\n\tThe trick here is going to be to make it look as if you're fighting as hard as you can, but to throw your support behind ${Gawain} when it matters. Ideally, without being obvious about it.\n\t*goto part6_start\n*elseif chapter3_circle_tactics=\"warrior\"\n\tYou roll your shoulders, loosening the muscles, repeating the breathing exercises ${Ector} taught you to calm your heartbeat and clear your head.\n\t*goto part6_start\n*elseif chapter3_circle_tactics=\"leader\"\n\tYou look around the circle, mentally tallying up those who you talked to earlier in the day, those you think you might have convinced to follow you. Whether they'll do so remains to be seen.\n\t*goto part6_start\n*else\n\t*comment chapter3_circle_tactics=\"diplomat\"\n\tYou look around the circle, mentally tallying up those who'd seemed positive when you approached them earlier in the day. Promises are easy things to make; the trick is to keep them, or at least to make it feel as if you have. \n\t*goto part6_start\n\n*label part6_start\n*page_break\n${Cai} nudges you. \"Pay attention, $!{brother}. Are you ready?\"\n\n\"You didn't have to do this.\"\n\n\"You're here, so I'm here. Besides, I've got a bet to win, haven't I?\"\n\n${Blaise} raises ${his} staff. \"This is the second time for the choosing of the Warleader of our people, in an honor circle called by ${Uther}, the Pendragon. The second time, and the last time. All you here who speak for your kingdoms, you will accept my naming of the victor. Anything other, and by the fire and the stone I tell you that the eyes of the gods will be turned from you. I am the voice of the Old Ones and I have spoken.\"\n\n\"And I,\" says ${Vivian}. \"For the Isle, I have witnessed it.\"\n\n\"Your word, ${Uther} of Gwynedd,\" says ${Blaise}.\n\n\"My word,\" says your ${father}.\n\n\"Your word, ${Aeron} of Dyfed.\"\n\n\"My word,\" says ${Aeron}.\n\n\"Your word, ${Cadell} of Powys…\"\n\nAnd so it goes, around the circle, until each ${king} or ${his} representative here amongst the stones has spoken.\n\nYou see ${Blaise} look at ${Vivian}, and ${she} gives a nod. ${Blaise} brings the heel of ${his} staff down on the stone. Once. Twice. \"Begin!\"\n\n*if chapter3_circle_approach=\"lose\"\n\t*goto part6_lose\n*elseif chapter3_circle_approach=\"gawain\"\n\t*goto part6_lose\n*elseif chapter3_circle_tactics=\"warrior\"\n\t*goto part6_warrior\n*elseif chapter3_circle_tactics=\"leader\"\n\t*goto part6_leader\n*else\n\t*comment chapter3_circle_tactics=\"diplomat\"\n\t*goto part6_diplomat\n\n*comment --------------------------------------------------------------\n*label part6_lose\n*page_break\n\nIt starts as you'd planned. You knock a few ${men} down, picking off the weaker, knowing full well that ${Bedwyr} and ${Gawain} wait for you, knowing that they'll defeat you, so you can fight now and fight well. You take bruises, but that's to be expected; you split your knuckles on a ${man}'s chin, you take a kick to your ribs that'll leave you sore for a week. And here's ${Gawain} and here's ${Bedwyr}. Of the two, it's ${Gawain} you close with; you'd rather go down at ${his} hand than ${Bedwyr}'s, but you'll give ${him} a good run for it, you'll put on a good show.\n\n$!{He} shoves you sideways and you stumble. $!{He} catches you up in a great bear hug, squeezing the air out of your lungs until your face feels hot with blood.\n*if romance_gawain\n\t$!{His} lips brush your ear and you hear a whispered \"I'm sorry, ${Arthur}.\"\n\nThen ${he} throws you to the ground. You land on one knee, painfully, and stagger upwards, realizing belatedly that you should probably have stayed down. Then someone lands a solid blow to your ribs and you hear something crack.\n\nYou try to fall. You can give up, now. You've given a good showing. But in a sudden press of bodies someone hauls you upwards. \"${Cai}?\"\n\nThere's a harsh laugh. Not ${Cai}. ${Bedwyr}. $!{He} pulls you into a headlock.\n\n*goto part6_end_loss\n\n*comment --------------------------------------------------------------\n*label part6_warrior\n*page_break\n\n${Uther}'s sword lies gleaming in the torchlight on the stone, and you're racing, now, grabbing the ${man} next to you and planting a knee in ${his} kidneys; bringing an elbow back into the face of Dyfed's champion, flattening ${his} nose. You take a blow to the head, but give as good as you get with a sharp jab to the ${body_part}.\n\nThen you're through that pack and grappling with ${Gawain}. \n\n*if warrior>=40\n\t*fake_choice\n\t\t#I struggle away from ${him} and focus on getting to the sword.\n\t\t#I focus on taking down ${Gawain}.\n\t\t#I try to escape ${Gawain} and focus on defeating ${Bedwyr}.\n\t\t\t\n\t*goto part6_gawain_choice\n*else\n\t$!{He} breaks your hold easily, shoving you sideways and then, reversing your roles, grabs you into a great bear hug, squeezing the air out of your lungs until your face feels hot with blood.\n\t*if romance_gawain\n\t\t$!{His} lips brush your ear and you hear a whispered \"I'm sorry, ${Arthur}.\"\n\n\tThen ${he} throws you to the ground. You land on one knee, painfully, and stagger upwards. Someone lands a solid blow to your ribs and you hear something crack. You cry out, nearly falling, but in the sudden press of bodies someone hauls you upwards. ${Bedwyr}. $!{He} pulls you into a headlock.\n\t*goto part6_end_loss\n\n*comment --------------------------------------------------------------\n\n*label part6_gawain_choice\nYou've tangled ${Gawain}'s legs. $!{He} falls heavily—you hammer your heel down on ${his} thigh, anything to slow ${him} from rising, and then you take to your heels towards ${Bedwyr} and the sword.\n\n${Bedwyr} is ahead of you, fighting free of a slender ${man} from Rhegedd. You throw yourself at ${him}, bringing ${him} to ${his} knees, and then the two of you are struggling forward. ${Bedwyr} kicks out at you, catching you high in the ribs—you hear something crack. Ignoring the pain, you plant your elbow in ${his} ear, knocking ${him} sideways, and then leap forward. One step. Two. You fall flat across the stone just as another ${man} does the same, flinging ${himself} at the blade, arm outstretched. $!{He}'s too fast, there's no way that—\n\t\nBut no. Your hand grips the hilt.\n\t\nThe other ${man} was ${Cai}. $!{He} grins at you. \"Stand up, $!{brother},\" ${he} says.\n\t\n*goto part6_end_win\n\n*comment --------------------------------------------------------------\n*label part6_leader\n*page_break\nYou race towards ${Uther}'s sword where it lies gleaming in the torchlight on the stone. \n*if leader>=40\n\n\tOn your right, a ${man} starts into your path. \"Now—together!\" you shout, and the ${man} to ${his} right leaps for ${him}. The two of you bring ${him} down. Your ally shouts a warning at you; you duck under a blow from Dyfed's champion and jab ${him} in the ${body_part}, and another of your allies sweeps ${his} feet out from under ${him}.\n\t\n\t\"${Gawain}!\" you shout. The Bear of Orkney turns, puzzled, and then sees four of you bearing down on ${him}. $!{He}'s far too strong for you alone, there's no way you could have held ${him}, but then ${Cai} grabs one of ${his} arms and a ${man} from the North sits on ${his} legs. ${Gawain} hurls abuse at you, struggling, until a kick leaves ${him} winded.\n\t\n\t${Bedwyr} is ahead of you, fighting free of a slender ${man} from Rhegedd, another of your allies. You throw yourself into the fray and bring ${Bedwyr} to ${his} knees, and then the two of you are struggling forward. ${Bedwyr} kicks out at you, catching you high in the ribs—you hear something crack. $!{He}'s flattened by the Rhegedd ${man}'s knee to ${his} face.\n\t\t\n\tYou rise. There's just you and the ${men} you'd allied with and it's every ${man} for ${himself}. It's a scrap, a scrum, but the best fighters are already down. You roll under one ${man}, gasping at the pain in your chest, and trip ${him}; ${he} falls into another of your pursuers. You leap forward towards the sword. One step. Two. You fall flat across the stone just as another ${man} does the same, flinging ${himself} at the blade, arm outstretched. $!{He}'s too fast, there's no way that—\n\tBut no. Your hand grips the hilt.\n\t\n\tThe other ${man} was ${Cai}. $!{He} grins at you. \"Stand up, $!{brother},\" ${he} says.\n\t*goto part6_end_win\n*else\n\tOn your right, a ${man} starts into your path. \"Now—together!\" you bark at the ${man} next to ${him}, but ${he} merely grins and throws ${himself} low at your legs and you tumble into the dirt between the two of them. So much for allies. You struggle to rise, lashing out indiscriminately; one ${man} is downed by the champion of Dyfed, who then makes a lunge at you. You punch ${him} in the ${body_part} and throw yourself forward towards the central stone.\n\t\n\tYou slam into ${Gawain}. $!{He} breaks your hold easily, and grabs you into a great bear hug, squeezing the air out of your lungs until your face feels hot with blood.\n\t*if romance_gawain\n\t\t$!{His} lips brush your ear and you hear a whispered \"I'm sorry, ${Arthur}.\"\n\n\tThen ${he} throws you to the ground. You land on one knee, painfully, and stagger upwards. Someone lands a solid blow to your ribs and you hear something crack. You cry out, nearly falling, but in the sudden press of bodies someone hauls you upwards. ${Bedwyr}. $!{He} pulls you into a headlock.\n\t*goto part6_end_loss\n\n*comment --------------------------------------------------------------\n*label part6_diplomat\n*page_break\nYou race towards ${Uther}'s sword where it lies gleaming in the torchlight on the stone. \n*if diplomat>=40\n\tOn your right, a ${man} starts into your path, only to be brought down by a second, who simply leaps into ${him}, bringing the two to the ground. $!{He}'s kept ${his} part of your bargain. You throw a punch, duck under a blow from Dyfed's champion and jab ${him} in the ${body_part}, and another of your allies sweeps ${his} feet out from under ${him}.\n\t\n\tThen you're through that pack and grappling with ${Gawain}. $!{He}'s far too strong for you, there's no way you can hold ${him}, but then ${Cai} grabs one of ${his} arms and a ${man} from the North sits on ${his} legs. ${Gawain} hurls abuse as you tear yourself free.\n\t\n\t${Bedwyr} is ahead of you, fighting free of a slender ${man} from Rhegedd. You throw yourself at ${him}, bringing ${him} to ${his} knees, and then the two of you are struggling forward. ${Bedwyr} kicks out at you, catching you high in the ribs—you hear something crack. A stone, flung by one of your allies, takes ${him} under the ear and ${he} collapses.\n\t\n\tThen there's just you and the ${men} you'd allied with and it's every ${man} for ${himself}. It's a scrap, a scrum, but the best fighters are already down. You roll under one ${man}, gasping at the pain in your chest, and trip ${him}; ${he} falls into another of your pursuers. You leap forward towards the sword. One step. Two. You fall flat across the stone just as another ${man} does the same, flinging ${himself} at the blade, arm outstretched. $!{He}'s too fast, there's no way that—\n\t\n\tBut no. Your hand grips the hilt.\n\t\n\tThe other ${man} was ${Cai}. $!{He} grins at you. \"Stand up, $!{brother},\" ${he} says.\n\t*goto part6_end_win\n*else\n\tOn your right, a ${man} starts into your path. A second, next to ${him}, wavers towards ${him} and for a moment you think your plan is going to work, that your newfound ally is going to clear your opponent out of the way. But then the second grins and throws ${himself} low at your legs and you tumble into the dirt between the two of them. So much for allies. You struggle to rise, lashing out indiscriminately; one is downed by the champion of Dyfed, who then makes a lunge at you. You punch ${him} in the ${body_part} and throw yourself forward towards the central stone.\n\t\n\tYou slam into ${Gawain}. $!{He} breaks your hold easily, and grabs you into a great bear hug, squeezing the air out of your lungs until your face feels hot with blood.\n\t*if romance_gawain\n\t\t$!{His} lips brush your ear and you hear a whispered \"I'm sorry, ${Arthur}.\"\n\n\tThen ${he} throws you to the ground. You land on one knee, painfully, and stagger upwards. Someone lands a solid blow to your ribs and you hear something crack. You cry out, nearly falling, but in the sudden press of bodies someone hauls you upwards. ${Bedwyr}. $!{He} pulls you into a headlock.\n\t*goto part6_end_loss\n\n*comment --------------------------------------------------------------\n*label part6_end_win\n*set acclaim 40\n\nYou force yourself to your feet and stand, swaying, as ${Blaise} raises ${his} voice. \"By the terms of this honor circle…\"\n\nThe rest is lost in a tumult of noise.\n\n*goto part7\n\n*comment --------------------------------------------------------------\n*label part6_end_loss\n\n\"Did you know, $!{brother},\" ${he} murmurs, \"there's a way to make sure you can never challenge my place here. They'll never follow a maimed ${man}.\"\n\nThen ${he} grips your left arm tightly and twists away from you, hauling your arm along with ${him}. You turn, dazed, uncertain what's happening and then ${he}'s tripped you and you're on the ground, arm still firmly gripped but wrenched back now in agony.\n\n*choice\n\t#I plead with ${Bedwyr} for mercy.\n\t\t*set rel_gawain %-30\n\t\tYou struggle to spit out the words, but ${Bedwyr} is implacable.\n\t\t*goto part6_end_loss2\n\t\t\n\t#I call to ${Cai} for help.\n\t\t*set rel_gawain %-10\n\t\tYou struggle to spit out the words, but they come out as a strangled squawk. ${Bedwyr}'s pressure is implacable.\n\t\t*goto part6_end_loss2\n\t\t\n\t#I appeal to ${Gawain} for help.\n\t\t*set rel_gawain %-10\n\t\t\"${Gawain}!\" You struggle and spit out the word, but ${Bedwyr} pushes you down into the dirt, the pressure implacable.\n\t\t*goto part6_end_loss2\n\t\t\n\t#I put up with the pain.\n\t\t*set rel_gawain %+20\n\t\t*goto part6_end_loss2\n\n*label part6_end_loss2\n\n\"${Bedwyr}, no…\" It's ${Gawain}'s voice, aghast.\n\n${Bedwyr} twists and your tendons scream. Your face is pressed to the rock. $!{He}'s brought you down right on the edge of the central stone. But this time there's no sword within arm's reach. You catch a glimpse of it, tantalizingly close. You try to reach out, but it's a good five feet clear of your hand; it might as well be on the other side of an ocean. \n\nSomething twangs like a harp string in your shoulder.\n\n\"$!{Brother}!\" You catch a brief glimpse. ${Cai}'s hand coming up. A rock, hurled through the air.\n\nIt strikes the central stone, there's a clang of metal, and ${Uther}'s sword slithers to within an inch of your fingertips.\n\nYou close the gap and it's in your hand.\n\n${Bedwyr} shouts in fury and wrenches at your other arm. You roll with it, rolling in the same direction, grating your face against the rock and losing skin.\n\nThen suddenly the pressure is released and there's a cry of pain. ${Bedwyr}. You look up, blood dripping into your eyes. ${Gawain} has dragged the ${man} off you and has ${him} in a chokehold.\n\nAstonished, you force yourself to your feet, the sword in your hand, and only then realize what this means, as ${Blaise} raises ${his} voice. \"By the terms of this honor circle…\"\n\nYou fall to your knees again, and don't hear the rest of ${his} words over the hubbub.\n*if chapter3_circle_approach=\"lose\"\n\t*set acclaim 20\n\t*goto part7\n*else\n\t*set acclaim 30\n\t*goto part7\n\n*comment --------------------------------------------------------------\n*comment                  Part 7: Warleader\n*comment --------------------------------------------------------------\n*label part7\n*set chapter3_circle_won true\n*comment SUGGESTED POINT FOR END OF TRIAL\n*page_break\n\nTorches flare around the circle of stones. Your face is bloody, your muscles ache, and your ribs creak when you draw breath. But you're here, you're upright, and you hold ${Uther}'s sword. And here you are standing before your ${father}, seated in ${his} wooden chair. Muttering and shouting still goes on in the background, but, for now, it's hard to think straight about what that means.\n\n${Uther} doesn't rise from ${his} bundling furs. $!{He} is wounded, after all. Or perhaps ${he} feels you're not worth the courtesy. \"${Arthur},\" ${he} says. \"The gods have spoken, it seems.\"\n\nYou can feel ${Vivian}'s eyes boring into you, furious.\n\n*choice\n\t#\"I can't take this. For the good of Britain, I cannot.\"\n\t\t*set diplomat %+20\n\t\t*set leader %-30\n\t\t\"You have no choice.\" ${Vivian}'s voice is loud, carefully neutral. \"You have fought the honor circle and you have won.\"\n\t\t\n\t\t\"Twice.\" ${Cai}'s voice from the audience.\n\t\t\n\t\t\"They speak truth, ${ap} ${Uther},\" says ${Blaise}. You see ${Uther} visibly wince at the name. \"The gods have spoken.\" $!{He} steps to your side. \n\t\t*goto part7_swear\n\t\t\n\t#\"I know that you have your doubts—but I have proved myself twice over. I will not let you down.\"\n\t\t*set leader %+20\n\t\t*set compassion %+20\n\t\t*set warrior %-20\n\t\tThere's a snort of disgust from ${Uther}.\n\t\t\n\t\t${Blaise} steps to your side.\n\t\t*goto part7_swear\n\t\t \n\t#\"I've proved myself in front of all of you, twice over. Does any ${man} truly believe I'm not fit to lead? If so, I'll face you here and now!\"\n\t\t*set compassion %-30\n\t\t*set bravado %+20\n\t\t*set warrior %+20\n\t\t*set diplomat %-20\n\t\t*set rel_gawain %-10\n\t\t\"The contest is done.\" ${Vivian}'s voice is loud, carefully neutral—or do you detect an edge of scorn? \"The time for fighting is over. No one here will challenge you.\"\n\t\t\n\t\t\"At least, not today.\" A voice from somewhere behind you in the crowd. You're not sure whose.\n\t\t\n\t\t${Blaise} steps to your side.\n\t\t*goto part7_swear\n\n*label part7_swear\n\"The Warleader must declare ${his} oath of fealty to the Pendragon,\" ${he} says softly. \"You must lay ${Uther}'s sword on ${his} lap.\"\n\n\"Or fall on it,\" snaps the $!{King}, and it's only then that you see the depth of hatred in ${his} dark eyes.\n\n\"I swear,\" you manage to croak out. \"I, ${Arthur} ${ap} ${Uther}, named Warleader of Britain, swear fealty to ${Uther}, $!{King} of Gwynedd and Pendragon of the Britons. And I will hold the good of this island above all else.\" You lay the sword on ${Uther}'s lap.\n\nYou catch a strange, approving look from ${Blaise}.\n\n${Uther} stares at the blade on ${his} lap. $!{He} lifts it, and weighs it. \"I'd hoped to give this to my ${son}.\"\n\nThe words are a needle in your heart. $!{He} means ${Bedwyr}—of [i]course[/i] ${he} means ${Bedwyr}. $!{He} doesn't consider you ${his} true ${son}; perhaps ${he} never did. What did your ${mother} do, to be so hated?\n\n$!{He} grunts, and thrusts the hilt towards you. \"Take it.\"\n\nYou take the proffered weapon, a magnificent piece of work, the sword of ${Uther}, rumored to be the sword of ${Maximus}, last Roman ruler of Britain. It might as well be a lump of lead in your hands.\n\n*page_break\n\"Now you ${king}s here present,\" says ${Blaise}. \"You will swear your warbands to this ${man}. And all others, those who are not here, word will be sent, and they must present themselves here within a moon's span. $!{King} ${Uther} of Gwynedd.\"\n\nYour ${father} doesn't look at you. \"I swear,\" ${he} says. You catch the look on ${Bedwyr}'s face, and wonder if you can ever sleep safely again.\n\n\"$!{King} ${Aeron} of Dyfed.\"\n\n\"Ah. Aye, good ${Blaise}, I accept your naming of the victor, as was my word. ${Arthur} ${ap} ${Uther} has indeed won the circle. But I'll not pledge my ${men} to ${him}.\"\n\n\"You swore—\"\n\n\"I swore to accept your naming of the victor, and I have done so. But my loyalty is first to Dyfed, and second to Britain. I'm sorry, ${lad},\" here ${he} turns to you, \"but you've no notion what you're doing, you've no knowledge of these lands, and the ${men} just won't follow you, whatever title you have. This is a favor I'm doing you. You're out of your depth.\"\n\n\"Careful,\" calls out ${Vivian}, loud and clear. \"Oh, do be careful, my ${lord}. We've worked hard for these alliances.\"\n\n\"And if my ${lord} ${Uther} wasn't such a prideful ${insult_bastard} we'd have sorted all this properly rather than through a scuffle in the dirt. No. I mean none of you ill. But I'm wintering at home, and we'll be sharpening our swords, and we'll be fighting the Saxons in Dyfed's name in the spring. If you've come to your senses by then, send me word.\"\n\n\"What of the rest of you?\" asks ${Vivian} coldly. \"Would you all weasel out of your sworn oaths?\"\n\n\"I will not swear,\" says $!{King} ${Cadell} of Powys. \"Had the victor been a sound, tried ${man}, and had all followed, I'd have gone along with it. But my God is not yours, and my God did not choose this ${man}.\"\n\n\"I will not.\" The $!{King} of Ceredigion.\n\n\"Nor I.\"\n\nA moment of silence.\n\n\"I will swear.\" It's ${Gawain}. \"In my ${father}'s name, in the name of ${Lot} of Lothian and of Orkney, I will hold to my oath, even if none of the rest of you buggers have the guts to do so.\"\n\nThere's silence, only broken by ${Cai}'s murmured \"Oh well, at least we have a battering ram.\"\n\n*goto part8\n\n*comment --------------------------------------------------------------\n*comment                  Part 8: Backlash\n*comment --------------------------------------------------------------\n*label part8\n*page_break\n\nAn air of hopelessness settles over the circle and the crowd breaks up into smaller, arguing knots. You find yourself ignored, blessedly, until ${Gawain} approaches you.\n\n\"Thank you,\" you say to ${him}.\n\n\"Aye, well. It may prove my undoing—my ${father}'s likely to gut me. But an oath can't be broken lightly, whatever a ${man} might feel. It'd be good for you to remember that.\"\n*if rel_gawain>=40\n\t$!{He} grimaces. \"There's a steep hill ahead, ${Arthur}. I'll help you with it. I think that it might surprise us all.\"\n\t\n\t\"I hope so.\"\n\t*goto part8_1\n*else\n\t$!{He} gives a sigh. \"Understand this, ${Arthur}. I'm of ${Aeron}'s opinion. I think you're not the ${man} for this. I think Britain's in a great deal more danger because of what happened here today. But I'll do my duty by you. I bear you no ill will.\"\n\t\n\t\"Thank you, I suppose. For my part, I'll be glad to have you.\"\n\t*goto part8_1\n\n*label part8_1\n\t\n*if romance_gawain\n\tYou catch a faint flush to ${his} cheeks that's nothing to do with the bruising ${he} took in the circle.\n\n\"Aye. Well, I'll leave you to it.\" $!{He} walks off into the darkness, head bowed.\n\n*page_break\n\n\"Well, you've had quite a day.\"\n\nIt's ${Morgan}, sat waiting for you outside the ramparts as you walk back towards the fort. \n*if (chapter2_spent_night=\"morgan\")\n\t*if chapter3_morgan_intentions!=\"unknown\"\n\t\t\"From a hungover but reasonably inoffensive fool this morning—even if you did chase me round a hillside for no good reason—to the most hated ${man} in Britain tonight. Well done!\"\n\t\t*goto part8_2a\n\"From a hungover but reasonably inoffensive fool this morning to most hated ${man} in Britain tonight. Well done!\"\n*goto part8_2a\n\n*label part8_2a\n\n\"Don't you start.\"\n\n$!{She} stands up and dusts the dirt off ${her_his} breeches.\n*if (rel_morgan\u003c=40)\n\tYou catch the look in ${her_his} eye. $!{She} is keeping a very close lid on ${her_his} temper. \"You [i]are[/i] a fool, ${Arthur} ${ap} ${Uther}. I'm not sure if what happened today was due to you seeking glory, or if you genuinely thought you knew what you were doing.\"\n\t*goto part8_3\n*else\n\t$!{She} shakes ${her_his} head. \"It wasn't your fault, at least not entirely. I'm not saying I wouldn't have done things differently. But we are where we are now. Best to make the best of it.\"\n\t*if romance_morgan\n\t\t$!{She} slips ${her_his} hand into yours and squeezes your fingers. \"You know where I am if you need me.\"\n\t*goto part8_3\n\n*label part8_3\n\n$!{She} breaks away from you. \"I've to attend my ${mother}. Who'll be turning from a simmer to a boil right about now. Get some sleep, Art. It might be the last for you for quite some time.\" $!{She} disappears into the gloom, leaving you to face night—and the prospect of sleep—on your own.\n\nNot quite on your own.\n\n\"Well, $!{brother},\" says ${Cai}, who's been waiting for you by the gate. \"Time for a drink, I think?\" $!{He} puts ${his} arm around your shoulder, wincing from ${his} own bruises. \"Maybe this is what ${Ector} meant when ${he} told us to stay out of trouble. I'd love to see ${his} face. 'Sorry, $!{father}—Art accidentally became Warleader of Britain. We won't do it again!'\"\n\n\"${Arthur}.\" Both you and ${Cai} look round. It's ${Blaise}, tattered robes making ${him} near invisible in the darkness.\n\n\"Oh, what now?\" asks ${Cai}. \"Can't you give a ${man} half a moment to recover?\"\n\n${Blaise} ignores ${him} completely. \"$!{King} ${Uther} wishes to speak with you,\" ${he} says. \"Privately. Follow me.\"\n\n${Cai} looks at you, and sighs. \"I'll meet you in the hall, if you're still alive. Good luck fighting the dragon.\"\n\n*comment --------------------------------------------------------------\n*comment                  Part 9: Conversation With Uther\n*comment --------------------------------------------------------------\n*label part9\n*page_break\n\nThe hut is dimly lit; a fire flickers in the hearth, and candles burn low in iron holders dotted around the room. \n\n*if chapter2_uther_healed\n\t${Uther} is huddled in a chair by the fire. $!{His} face is pale, glistening with sweat, although ${his} eyes are sharp enough as ${he} looks up at you. But it's still\n*if chapter2_uther_healed=false\n\t${Uther} lies in ${his} bed, propped up on piled furs. $!{His} face is pale, glistening with sweat. $!{His} eyes, when ${he} looks up at you, have a disturbing yellow cast to them. It's\na staggering change from earlier; you realize how much it must have cost ${him} to appear strong before the assembled ${king}s.\n\n\"${Arthur},\" ${he} says by way of greeting. \"Sit down. ${Blaise}—leave us. Stop your fussing; I can manage.\"\n\n${Blaise} dips ${his} head in acknowledgment, and leaves the two of you alone.\n\nThe silence is thick and awkward.\n\nFinally, ${he} clears ${his} throat. \"I wish to apologize for my words. They were spoken in haste, and in shock. You are my ${son}.\"\n\n*if (gender=\"female\") \n\t\"And daughter of a wayward lecher.\"\n*if (gender=\"male\")\n\t\"And son of a foreign slattern.\"\nYou can't help the bitterness. \"That's what the gossips say. And it'll be repeated loudly and often, here, tonight. I can't understand why you asked ${Ector} to send me back here.\"\n\n\"${Ygerna} was no\n*if (gender=\"female\") \n\tlecher!\"\n*if (gender=\"male\")\n\tslattern!\"\nThere's momentary fury in ${his} eyes; then ${he} passes ${his} hand across ${his} brow and the moment has passed. \"I cannot mend actions that I took so long ago. Your ${mother} is dead, and that cannot change. And I should have not sent you away, for them to turn you into…into [i]this[/i].\" $!{He} sighs. \n*if chapter3_circle_approach=\"lose\"\n\t\"At least in the circle you showed the good sense to try to stay down, even if events conspired against you. But\n*if chapter3_circle_approach=\"gawain\"\n\t\"But you showed a good head on your shoulders there in the circle, today; ${Gawain} is a fine ally to have. It is a shame your efforts were so ill-aimed. So\n*if chapter3_circle_approach=\"win\"\n\t\"But you showed a spark today, there, in the circle. Something that you could have been. It is a shame it was so ill-aimed. And\nnow you are Warleader, and what shall come to Gwynedd? What shall come to my people? You've dealt us a sore blow this day.\"\n\n*choice\n\t#\"Better me than ${Bedwyr}. $!{He}'s arrogant, vicious, and prone to rushing in when ${he} should be thinking.\"\n\t\t*set rel_uther %-30\n\t\t*set compassion %-20\n\t\t\"Enough!\" ${Uther} is livid, ${his} breathing ragged. $!{He} blinks ${his} eyes rapidly, trying to master ${himself}. \"Enough. Do not let me hear you insult your ${brother} again. It lessens you as it lessens Gwynedd.\"\n\t\t\n\t\t\"And will you command the same of ${him}?\"\n\t\t\n\t\t\"Get. Out.\" There's a flash of hatred in ${his} eyes as ${he} spits out the words.\n\t\t*goto part9_end\n\t\t\n\t#\"I know, and I'm sorry for it. I'll do what I can to make things right.\"\n\t\t*set rel_uther %+20\n\t\t*set diplomat %+15\n\t\t*set warrior %-15\n\t\t\"That is well. You must cooperate more with your ${brother}, at the least—$!{Bedwyr}, not that oiled creature from Aquitania. Perhaps ${Bedwyr} can cover for any mistakes you make in your new role.\" $!{He} winces, shifting uncomfortably. \"You should go, now, ${son}. Sleep. There is much that will need to be done.\"\n\t\t*goto part9_end\n\t\t\n\t#\"I've proven myself before the Gods, whatever you think of me.\"\n\t\t*set rel_uther %+15\n\t\t*set bravado %+15\n\t\t\"Hah! Well, at least there is spirit in you. But our people do not see you as someone who bends the knee to their Gods, ${Arthur}; you have been with the Roman Christ for too long. It makes ${men} uneasy. You should braid your hair, adopt a more fitting mode of dress. If you are to stand for Gwynedd, you should act a part of it. Commanding warriors is much more about commanding hearts than it is about tallying supplies and playing with wooden counters on maps.\" $!{He} winces, shifting uncomfortably. \"You should go—I would sleep. Think on what I've said.\"\n\t\t*goto part9_end\n\t\t\n\t#\"You have a ${son} who is Warleader, $!{father}, when the title could have gone to some other land.\"\n\t\t*set rel_uther %-20\n\t\t*set compassion %+15\n\t\t$!{He} looks up at you in a moment of surprise, and then ${he} shakes ${his} head. \"Do you think so little of me that you think it comes down to pride alone? There are great warriors, great commanders amongst the $!{King}s of Britain, ${Arthur}. If ${Bedwyr} could not command, then it would have been far better to be one of them. Yes, Gwynedd would have been lessened, but that need not have been forever. But here we are, I suppose.\" $!{He} winces, shifting uncomfortably. \"I have made my apology, and we will not solve Britain's problems this night. Go, leave me. Perhaps, with ${Bedwyr}'s aid, we can make something of this yet.\"\n\t\t*goto part9_end\n\t\t\n\t#\"Then teach me! You've led armies in battle; help me learn what to do, since we're in this situation.\"\n\t\t*set rel_uther %+20\n\t\t*set leader %+15\n\t\t*set warrior %-15\n\t\t$!{He} shakes ${his} head. \"It takes years, ${Arthur}, to learn how to command warriors on a battlefield. It takes years to find the rhythms of the battle, to learn how to win ${men}'s hearts, to build up trust with your banner${men}.\"\n\t\t\n\t\t\"I have learned, $!{father}. ${Ector} has trained me, and trained me well. Perhaps not all the Roman teachings fit with the forces of Britain, but it is much more than nothing. I am no milk-wet infant.\"\n\t\t\n\t\t$!{He} considers you for a time. \"Perhaps,\" ${he} says at last. \"Perhaps, with ${Bedwyr}'s aid, we can make something of this. It speaks well of you that you are willing to try.\" $!{He} winces, shifting uncomfortably. \"You should go now, and leave me to my wound—I would try to sleep.\"\n\t\t*goto part9_end\n\t\t\n\t#\"Even now you insult me. ${Ector} was a fine foster-${father} and a fine teacher. I am what ${he} made me, and I may surprise you, ${Uther} Pendragon.\"\n\t\t*set rel_uther %-30\n\t\t*set bravado %+15\n\t\t$!{His} lip curls. \"I thought, today, that I saw moments where you were a Briton, or might become so. But listening to you now…\" $!{He} shakes ${his} head. \"Surprise me, then, ${man} of Rome, if you can. But for now, leave me to my wound, and to try to capture sleep. For I have no doubt that you have much to prepare.\"\n\t\t*goto part9_end\n\n*label part9_end\n*finish\n\n*label trial_end\n*temp discount_ends \"Dec 11\"\n*temp time_stamp timestamp(\"${discount_ends}, 2015\")\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n*abort", "chapter4": "*comment ==============================================================\n*comment                Chapter 4: The Wolf At The Door\n*comment ==============================================================\n\n*comment --------------------------------------------------------------\n*comment                        Introduction\n*comment --------------------------------------------------------------\n*label intro\n\n*image chap4.png center Chapter Four: The Wolf At The Door\n\n*comment --------------------------------------------------------------\n*comment                   Part 1: The Messenger\n*comment --------------------------------------------------------------\n*label part1\n\nA month of being caged in a small fortress in the snow, with a sullen and frustrated ${Uther} made worse by ${his} festering wound. A month of contemptuous silence and bursts of fury from ${Bedwyr}. A month of seeing hopelessness on the faces of the folk of Gwynedd and seeing their eyes slide away from yours. A month of ${Cai}'s brand of humor, wearing thin for all those around ${him}. \n*if romance_morgan\n\tA month of missing ${Morgan}—${she}'s on Ynys Mon, ${her_his} ${mother}'s Isle.\n\t*goto part1_0a\n*else\n\tA month with no ${Morgan}—${she}'s on the Isle with ${her_his} ${mother}. \n\t*goto part1_0a\n\n*label part1_0a\n*if romance_gawain\n\tA month of sideways glances and awkward conversations with ${Gawain} as ${he} tries to come to terms with your approach at Nos Calan Gaeaf and the oath ${he}'s made to you.\n\t*goto part1_0b\n*else\n\tA month of ${Gawain}'s mounting frustration as ${he} chafes against the oath ${he}'s made to you.\n\t*goto part1_0b\n\n*label part1_0b\n\nAnd then, on a grey afternoon where you sit in the Long Hall trying to write a tally of ${men} who might answer Gwynedd's call—a depressingly low number—a ${man} bursts in through the door short of breath, flanked by the door-wards. \"My ${lord} ${Uther}!\"\n\n${Bedwyr} leaps to ${his} feet, hand on sword.\n\nYour ${father} looks up from ${his} platter. \"What's this noise?\"\n\n\"My ${lord}! Saxons! A Saxon warband.\"\n\n${Uther} gestures to the door-wards to stand down. \"Where? How many?\"\n\n\"I'm from Arfon, ${lord}…twenty ${men}, maybe more. They burned Pen y Bryn.\"\n\n${Bedwyr} curses. \"That's two days in this weather. I'll round up the ${men}. We'll leave at first light. There're few places to hide in those valleys; gods grant we can find them before they do any more damage.\"\n\n*if rel_uther>32\n\t${Uther} looks to you. \"Well, ${Arthur}, I suppose we should hear your voice. What do you say?\"\n\t*goto part1_1\n*else\n\t\"Aye.\" ${Uther} waves a hand dismissively. \"They can't sit there for long, not and feed their ${men}. See they're dealt with.\"\n\t\n\tBoth ${men} have completely ignored you. This decision should be yours.\n\t*goto part1_1\n\n*label part1_1\n*choice\n\t#\"We can't just chase out after them—we should send out scouts into the area to work out what's going on first.\"\n\t\t*set rel_bedwyr %-30\n\t\t*comment Cunning\n\t\t*set bravado %-30\n\t\t${Bedwyr} glares at you. \"Aye, and by the time you've tiptoed around there'll be nothing of Gwynedd left!\"\n\t\t\n\t\t\"${Bedwyr}'s right,\" says ${Uther}. \"They need to be dealt with swift and sure. Anything else we can clear up afterwards.\n\t\t*goto part1_2\n\t\t\n\t#\"Yes, we should send out ${men}, but we should make sure of the safety of the surviving folk of Pen y Bryn before we chase the Saxons; it's the dead of winter. We can't leave them to fend for themselves.\"\n\t\t*set compassion %+20\n\t\t${Bedwyr} rolls ${his} eyes. \"And have other villages burned out in the meantime?\"\n\t\t\n\t\t\"${Bedwyr}'s right,\" says ${Uther}. \"They need to be dealt with swift and sure. Anything else we can clear up afterwards.\n\t\t*goto part1_2\n\t\t\n\t#\"${Bedwyr}'s right. We should march in the morning—we need to destroy them swiftly.\"\n\t\t*set bravado %+20\n\t\t*set rel_bedwyr %+20\n\t\t${Bedwyr} looks at you in puzzlement, as if trying to determine your motive for siding with ${him}. \"Aye. Well. I'm glad we agree.\"\n\t\t\n\t\t\"Very well,\" says ${Uther}. \"We send the warband. \n\t\t*goto part1_2\n\n*label part1_2\n*if rel_uther>32\n\t*set chapter4_arthur_leader true\n\tIt seems a simple enough matter. ${Arthur}, you should lead this. ${Bedwyr}, you should stay here; we can't leave the fort unprotected.\"\n\t\n\t${Bedwyr} scowls at you.\n\t\n\t*choice\n\t\t#\"No. ${Bedwyr} should be the one leading the warband. $!{He} has the experience.\"\n\t\t\t*set leader %+15\n\t\t\t*set diplomat %-15\n\t\t\t*set chapter4_arthur_leader false\n\t\t\t*set rel_bedwyr %+15\n\t\t\tBoth ${Uther} and ${Bedwyr} look at you in puzzlement. \"Aye, $!{father},\" says ${Bedwyr} at last. \"I'll take the ${men}.\"\n\t\t\t*goto part1_4\n\t\t\n\t\t#\"Thank you, my ${lord}.\"\n\t\t\t*set diplomat %+15\n\t\t\t*set warrior %-15\n\t\t\t${Uther} nods. \"Well then, that's settled.\"\n\t\t\t*goto part1_4\n\t\n\t\t#\"I'm pleased you recognize my worth as Warleader, $!{father}.\"\n\t\t\t*set diplomat %-15\n\t\t\t*set warrior %+15\n\t\t\t*set rel_bedwyr %-30\n\t\t\t${Bedwyr}'s look holds hatred.\n\t\t\t\n\t\t\t${Uther}'s jaw hardens. \"If you are going to claim that title, it is time you started living up to it.\" \n\t\t\t*goto part1_4\n\t\n*else\n\t*set chapter4_arthur_leader false\n\tIt seems a simple enough matter. ${Bedwyr}, you should lead this, you've the experience. ${Arthur}, you should stay here; we can't leave the fort unprotected.\"\n\t\n\t${Bedwyr} smirks at you.\n\t\n\t*choice\n\t\t#\"No. I'm the Warleader. I should be the one leading the warband.\"\n\t\t\t*set leader %+15\n\t\t\t*set diplomat %-15\n\t\t\t*set chapter4_arthur_leader true\n\t\t\t*set rel_uther %-20\n\t\t\t${Bedwyr} scowls. ${Uther} holds your gaze for a moment and then, grudgingly, nods. \"Very well. But you'll take ${Gawain} to stand alongside you.\"\n\t\t\t*goto part1_4\n\t\n\t\t#\"That seems sensible, my ${lord}.\"\n\t\t\t*set leader %-15\n\t\t\t*set diplomat %+15\n\t\t\t*goto part1_4\n\t\t\n\t\t#[Sarcastic] \"I'm pleased you recognize my worth as Warleader, $!{father}.\"\n\t\t\t*set diplomat %-15\n\t\t\t*set warrior %+15\n\t\t\t*set rel_uther %-20\n\t\t\t${Uther}'s jaw hardens. \"You're an untried ${boy}—remember that.\"\n\t\t\t\n\t\t\tYou bristle. \"The old laws gave me that title. Laws good enough for you, and for your forebears. Like it or not, it is mine, and I must start taking on its responsibilities. \"\n\t\t\t\n\t\t\t\"Perhaps so. But you will have no authority from me until you stop whining like a petulant child.\" ${Uther} controls ${himself} with some difficulty. \"${Bedwyr} will take the ${men}.\"\n\t\t\t\n\t\t\t${Bedwyr} nods dutifully, but you catch glee in ${his} eyes.\n\t\t\t*goto part1_4\n\n*label part1_4\n*if chapter4_arthur_leader\n\n\t${Bedwyr} lowers ${his} voice. \"$!{Father}, we can't—\"\n\t\t\n\t\"I've made my decision.\"\n\t*goto part1_5\n*else\n\n\t\"Good, then,\" says ${Uther}. \"Make sure the ${men} are told to prepare.\"\n\t\t\n\t\"I'll see to it,\" says ${Bedwyr}.\n\t*goto part1_5\n*label part1_5\t\n*page_break\n*if chapter4_arthur_leader\n\t\"${Arthur}!\" It's ${Gawain}, shaking you awake. It's too dark to be dawn.\n\t\n\t\"What is it?\"\n\t\n\t${Cai} mutters a curse from the other side of the room and pulls ${his} furs over ${his} head.\n\t\n\t${Gawain} looks flustered. \"It's ${Bedwyr}. $!{He}'s gone—${he}'s out of the gates with the warband at ${his} heels. Maybe two hours since, according to the ${men} on the gate.\"\n\t\n\t\"What!?\"\n\t\n\t\"Seems ${he} thinks ${he} has a better chance of dealing with the Saxons than you do.\"\n\t\n\tYou struggle out of bed.\n\t\n\t\"There's no point, ${ap} ${Uther},\" says the north${man}. \"There's nothing you can do about it now.\"\n\t*goto part2\n*else\n\tThe next morning you watch a warband of fifty ${men} leave Dinas Emrys with ${Bedwyr} at their head.\n\t*goto part2\n\n*comment --------------------------------------------------------------\n*comment                   Part 2: Ynys Mon In Peril\n*comment --------------------------------------------------------------\n*label part2\n*page_break\n\nTwo days later and there's another unexpected arrival at Dinas Emrys. It's ${Morgan}, looking as exhausted as the pony ${she}'s ridden in on. \"${Arthur}! Saxons! Heading for Ynys Mon…\"\n\nThe Holy Isle, where ${Vivian} and the other ${priestesses} work their mysteries! You help ${Morgan} to a bench; ${Cai} fetches ${her_him} a beaker of water. ${Morgan} nods in thanks. \"Perhaps a hundred and fifty ${men}, and ${Cerdic}'s ${son} ${Cynric} at their head. Five boats landed at the Gogarth—they must have come from Rhegedd or up through Ceredigion.\"\n\n${Gawain} curses. \"This is why they raided—to draw us out. There's no way we can get word to ${Bedwyr} in time to save the Isle.\"\n\n${Morgan} shakes ${her_his} head. \"No. Not the Isle. That's where they're headed, yes, but $!{Mother} says that it can defend itself. But ${she} also says that ${Cynric}, if ${he} can't have Ynys Mon as a prize, will undoubtedly head here. All know that ${Uther}'s been abandoned by most of ${his} allies. That's why ${she} sent me to warn you.\"\n\n\"By Branwen's left teat!\" spits ${Gawain}. \"We've maybe a hundred warriors here, that's all.\"\n\n\"Are you sure about the Isle?\" asks ${Cai}. \"I mean, I'm no lover of the mumbling of your soothsayers, but it'd be a hammerblow to your people if the Saxons cut them apart. I can't see how a bunch of ${priestesses} can stop a raiding party—what are they going to do, pray them away?\"\n\n${Morgan} glares at ${him}.\n\n\"Present company excepted, of course,\" mutters ${Cai}.\n\n*choice\n\t#\"${Cai}'s right—we need to defend the Isle. We'll send a small force to march immediately to Ynys Mon. The rest will stay here and fortify Dinas Emrys.\"\n\t\t*set defence_of_dinas_emrys %-30\n\t\t*set old_faith %+30\n\t\t*set compassion %+20\n\t\t*set rel_gawain %+15\n\t\t*set chapter4_troops \"isle\"\n\t\t\"I'll see to it,\" says ${Gawain}. \"We'll need to move swiftly if we're to get to the Isle in time.\" $!{He} leaves at a run.\n\t\t*goto part3\n\t\t\n\t#\"They'll attack here—send out forward scouts to watch for their advance.\"\n\t\t*comment Cunning\n\t\t*set bravado %-30\n\t\t*set defence_of_dinas_emrys %-20\n\t\t*set rel_gawain %-15\n\t\t*set chapter4_troops \"scout\"\n\t\t\"I'll see to the scouts,\" says ${Gawain}. $!{He} leaves at a run.\n\t\t*goto part3\n\n\t#\"I trust $!{Lady} ${Vivian}. We've not enough ${men} to send anyone out; we stay here and fortify Dinas Emrys.\"\n\t\t*set old_faith %+20\n\t\t*set defence_of_dinas_emrys %+20\n\t\t*set rel_gawain %+15\n\t\t*set chapter4_troops \"defend\"\n\t\t\"Aye,\" says ${Gawain}. \"I'll spread the word.\" $!{He} leaves at a run.\n\t\t*goto part3\n\t\t\n*comment --------------------------------------------------------------\n*comment                   Part 3: The Families\n*comment --------------------------------------------------------------\n*label part3\n\n${Morgan} looks up at you. \"There's more to Gwynedd than this fortress,\" ${she} says. \"Don't forget the folk of the valleys around here. We should gather them into the fort, make sure ${Cynric} can't harm them.\"\n\n${Cai} shakes ${his} head. \"They'll just get in the way—if it comes to a siege, there'll be more mouths to feed.\"\n\n*choice\n\t#\"${Cai}'s right—we don't need them in the way here, they'll just get hurt. The Saxons have nothing to gain by going for the outlying farms—they'll want to win the fortress.\"\n\t\t*comment Ruthlessness\n\t\t*set compassion %-30\n\t\t*set acclaim %-10\n\t\t*set rel_cai %+20\n\t\t*set rel_morgan %-30\n\t\t*set rel_gawain %-10\n\t\t*set chapter4_families \"abandon\"\n\t\t\n\t\t${Cai} sees ${Morgan}'s expression. \"I know it might seem harsh,\" ${he} says, \"But we can clear the ground here, give us space to fight; we don't need all those bodies in here. It's the right thing.\"\n\t\t\n\t\t\"Remember that when we look out from our walls and see the farms ablaze,\" says ${Morgan}.\n\t\t*goto part4\n\t\t\n\t#\"Gather the families in. We've few enough warriors here as it is; put them on the walls, give them weapons, and even if they can't fight they'll make Dinas Emrys seem much better defended than it is.\"\n\t\t*set defence_of_dinas_emrys %+20\n\t\t*comment Cunning\n\t\t*set bravado %-30\n\t\t*set rel_morgan %+20\n\t\t*set rel_cai %-30\n\t\t*set chapter4_families \"arm\"\n\t\t\n\t\t${Cai} hesitates, but then nods. \"I suppose a ruse is as good as anything—we've got precious little else going for us.\"\n\t\t\n\t\t*if romance_morgan\n\t\t\t${Morgan} catches hold of your fingers and squeezes them. \"Thank you.\"\n\t\t\t*goto part4\n\t\t*else\n\t\t\t\"Thank you,\" says ${Morgan}.\n\t\t\t*goto part4\n\t\t\n\t#\"Gather them in, and give them space in the Long Hall. They'll be out of the way there, and as well-defended as we can manage.\"\n\t\t*set acclaim %+15\n\t\t*set compassion %+20\n\t\t*set rel_morgan %+15\n\t\t*set rel_cai %-20\n\t\t*set defence_of_dinas_emrys %-30\n\t\t*set chapter4_families \"hide\"\n\t\t*set rel_gawain %+10\n\t\t\n\t\t${Cai} looks sour. \"I suppose so,\" ${he} says. \"So long as they bring in as much food as they can carry, and they stay out of the way.\"\n\t\t\n\t\t*if romance_morgan\n\t\t\t${Morgan} catches hold of your fingers and squeezes them. \"Thank you.\"\n\t\t\t*goto part4\n\t\t*else\n\t\t\t\"Thank you,\" says ${Morgan}.\n\t\t\t*goto part4\n\n*comment --------------------------------------------------------------\n*comment                   Part 4: Taking Stock\n*comment --------------------------------------------------------------\n*label part4\n*page_break\n\nLater on, you step out into the courtyard from ${Uther}'s hall to find ${Gawain} looking for you. \"${Arthur}.\"\n\n\"Sorry, ${Gawain}, I was talking to my ${father}.\"\n\n\"How is ${he}?\"\n\t\n*if chapter2_uther_healed\n\t\"Cantankerous, but upright.\n\t*goto part4_1\n*else\n\t\"Not well. ${Blaise} says the wound isn't healing as it should. But ${Uther}'s still got ${his} voice.\n\t*goto part4_1\n\n*label part4_1\n$!{He}'s got no option but for the defense of the fort to be in my hands. It doesn't please ${him}.\"\n\n\"$!{He}'ll have other problems soon enough,\" says ${Gawain}. \"I've been taking stock. There's a good stockpile of spare gear—swords, axes, helms.\n*if chapter4_families=\"arm\"\n\tYour farmers will at least be able to look the part.\nThere're tubs of tallow for the torches, a fair stock of arrows. It could be worse. Oh, and we found someone locked in the old cattle pen. Apparently ${he} was under guard there—${Bedwyr}'s orders. Says ${he} can help us if we give ${him} a free hand, and won't stop asking to see you.\"\n\n\"What? Who?\"\n\n${Gawain} gestures to one of the ${men} and a lanky figure is dragged forward. \n\nIt's ${Emrys}. \"${Arthur},\" says the Wanderer. \"You've been busy they tell me? It's good to see you. I can help, if you'll permit.\"\n\n*choice\n\t#\"What do you want, Wanderer?\"\n\t\t*set rel_emrys %-10\n\t\t\"You're more like your ${father} than I remembered. Ah well. \n\t\t*goto part4_emrys_help\n\t\t\n\t#\"${Emrys}! I'd no idea you were still here; I'm sorry, if I'd known I'd have released you sooner.\"\n\t\t*set rel_emrys %+15\n\t\t\"I won't say I've spent the time in comfort, but it's not been wasted. It's allowed me to think. \n\t\t*goto part4_emrys_help\n\t\t\n\t#\"I won't turn aside any aid at this point. How can you help?\" \n\t\t*set rel_emrys %+10\n\t\t$!{He} nods approvingly. \"Pragmatism. ${Ambrosius} would have approved.\n\t\t*goto part4_emrys_help\n\n*label part4_emrys_help\n*if chapter2_uther_healed\n\tIs the $!{King} well? They won't tell me much.\"\n\t\n\t\"Not well, but I think you helped ${him}.\"\n\t\n\t\"Good, good.\nSo, Saxons at the gates and not much time, as I understand it. You know I've studied siegecraft. If you've a few ${men} to spare to help me, I can perhaps help you to shore up the palisades. What would you have me do?\"\n\n*gosub_scene startup get_god\n\n*label part4_4\n*choice\n\t#\"You know something of healing and medicine. I'd like you to set things ready so that you can aid our ${men} during the fight.\"\n\t\t*set defence_of_dinas_emrys %+20\n\t\t*set chapter4_emrys_request \"medicine\"\n\t\t*set compassion %+20\n\t\t\n\t\t\"Field surgeon? A valuable thing. I'll need to look over your stock of herbs, cloths set to boil, and braziers for hot irons.\"\n\t\t\n\t\t\"See ${Gawain} for anything you need. \n\t\t*goto part4_5\n\t\t \n\t#\"The palisades. I'll give you some ${men}—you direct them as you see fit to strengthen the walls.\"\n\t\t*set defence_of_dinas_emrys %+20\n\t\t*set chapter4_emrys_request \"walls\"\n\t\t*comment Cunning\n\t\t*set bravado %-30\n\t\t\n\t\t\"Of course. We might have to demolish a couple of huts for the wood, and I'll need rope, and someone to cut me some pegs.\"\n\t\t\n\t\t\"I'll leave it in your hands. See ${Gawain} for anything you need. \n\t\t*goto part4_5\n\t\t\n\t#\"I want to do as much damage to the Saxons as possible; I want them broken, completely broken. Can you fashion some sort of weapon?\"\n\t\t*set chapter4_emrys_request \"damage\"\n\t\t\n\t\t$!{He} scratches ${his} head. \"Weapon, weapon…. I don't suppose you have distilled spirits and I have no alembic in any case. Do you have oils or tallow?\"\n\t\t\n\t\t\"I know we have tallow.\"\n\t\t\n\t\t\"Good, good, I should be able to do something with that. And a few ${men}, and some shovels.\"\n\t\t\n\t\t\"See ${Gawain} and ${he}'ll arrange for help for you. \n\t\t*goto part4_5\n\t\t\n\t#\"I want them driven off; I want to put the fear of ${god} into them and for ${Cynric} to run home with ${his} tail between ${his} legs. Can you find a way?\"\n\t\t*set chapter4_emrys_request \"fear\"\n\t\t\n\t\t$!{He} beams broadly. \"Well, as it happens, I've been thinking about something like that. I think I know what'll do the job. I'll need a quantity of oxhide and some wood, and whatever oils you might have lying around.\"\n\t\t\n\t\t\"We have tallow. I would say that this sounds dangerous, but then I suppose that's the point. See ${Gawain} for anything you need. \n\t\t*goto part4_5\n\n*label part4_5\nThank you.\"\n\n\"Not at all! After a month of lying around I confess I'm rather looking forward to it.\"\n\n*comment --------------------------------------------------------------\n*comment                   Part 5: The White Lady\n*comment --------------------------------------------------------------\n*label part5\n*page_break\n\n[i]Further north, a cold sea washes across a grey sand shore. Boats are drawn up on the sand. $!{Men} huddle around fires on the beach, pale-faced, their speech muted.[/i]\n\n[i]One ${man}, a tight-muscled tattooed creature with head shaved save for a single braid of long hair, stands looking north across the water to where an island looms through the fog.[/i]\n\n[i]\"My ${lord}.\" It's one of ${his} warband, a slender ${man} with grey, troubled eyes. \"What was that creature?\"[/i]\n\n[i]\"You heard it,\" says the braided ${man}. \"It named itself. 'The ${White_Lady}.' Some spirit, a wraith raised by the[/i] \n*if gender=\"male\"\n\t[i]witches[/i] \n*if gender=\"female\"\n\t[i]sorcerers[/i] \n[i]on that isle. $!{Father} always believed the Briton ${priestesses} had no power. It seems ${he} was wrong.\"[/i]\n\n[i]\"Will we go back in the daylight?\"[/i]\n\n[i]The braided ${man} grinds ${his} teeth. \"Look around you,\" ${he} says softly. \"The ${men} have no heart for it. If ${she} were to appear again, they'd rout. No. We need a swift victory. We're not going home without it.\"[/i]\n\n[i]\"South, then?\" says the grey-eyed ${man}.[/i]\n\n[i]\"Aye, south. ${Uther}'s fortress. Held by a stripling Roman whom ${he} hates, and with half ${his} forces stripped from ${him}. Build up the fires; we'll march at the dawn.\"[/i]\n\n[i]The grey-eyed ${man} dips ${his} head in acknowledgment and turns away, heading back up the beach.[/i]\n\n[i]${Cynric} continues to stare at the opposite shore, straining ${his} eyes, unable to make out anything in the gloom.[/i]\n\n*finish", "chapter5": "*comment ==============================================================\n*comment                Chapter 5: The Fires Of Gwynedd\n*comment ==============================================================\n\n*comment --------------------------------------------------------------\n*comment                        Introduction\n*comment --------------------------------------------------------------\n*label intro\n\n*image chap5.png center Chapter Five: The Fires of Gwynedd\n\n*comment --------------------------------------------------------------\n*comment                   Part 1: Before the Fight\n*comment --------------------------------------------------------------\n*label part1\n\n\"There! There, I swear it—sun on a spear-tip, or I've never seen one!\"\n*if chapter1_aided_uther=\"tend\"\n\t${Alun}'s shout rings out from the wooden tower by the gate, where ${he}'s stationed ${himself} so ${he} can feel that ${he}'s of use.\n\t*goto part1_2\n*else\n\tThe shout goes up from the wooden tower by the gate.\n\t*goto part1_2\n\n*label part1_2\n\n\"So then,\" says ${Gawain}, hefting ${his} spear and ${his} targe. \"This may be the end of us, Art.\"\n\n\"Don't be such a misery-guts,\" says ${Cai}. \"It could be worse. We could be out of wine.\" $!{He} takes a long draught from the skin in ${his} hand and wipes ${his} lips. \"Anyone else?\"\n\n\"You do know that's the last of it?\" asks ${Morgan}.\n\n${Cai} eyes ${her_him}. \"You [i]are[/i] joking?\"\n\n${Morgan} shrugs. $!{She} hooks a limb of ${her_his} bow around ${her_his} leg and strings it in one easy movement. Then ${she} settles it across ${her_his} shoulders and starts up the ladder to the watchtower. \n\n${Cai} turns to you and ${Gawain}. \"$!{She}'s joking…?\"\n\n*if chapter2_uther_healed=true\n\t*set defence_of_dinas_emrys %+10\n\t\"Well now, would you look at that?\" ${Gawain} is looking off towards the Long Hall. \n\t\n\t${Uther} stands there, spear in hand, ${Blaise} by ${his} side. As you watch ${he} walks slowly towards the gate, head erect. You know—all know, watching ${him}—that it must cost ${him} dearly to manage even this much. $!{He} stops just inside the gate, facing it, and plants the butt of ${his} spear in the dirt, gripping it tightly. You hear the susurration of voices around you, you see approval on the faces of the ${men}, and you know that ${Uther} being here will make a difference.\n\t*goto part1_speech\n*else\n\t${Gawain} ignores ${him}. \"We need something,\" ${he} says quietly. \"Something to make a difference. The ${men} here are brave, there's no doubting it. But there's precious little hope here, Art.\"\n\t\n\tYou know that to be true. Perhaps if ${Uther} were here, and hale…but ${he} lies on a stretcher, ${Blaise} by ${his} side, in one of the huts by the back gate, with the others who're not fit to fight.\n\t\n\t*goto part1_speech\n\t\n*comment --------------------------------------------------------------\n*label part1_speech\n*page_break\nYou're aware of their eyes on you, the defenders of Dinas Emrys.\n*if chapter4_families=\"arm\"\n\tThe farmers and herders gathered from the nearby valleys wear helms and hauberks that don't fit, or are spotted with rust, and spears sit uneasily in their hands.\nWarriors stand ready,\n*if chapter4_troops=\"defend\"\n\tbut even though you've kept as many as you can here in the fort it still looks like too few—\n\t*goto part1_speech_1\n*elseif chapter4_troops=\"scout\"\n\tbut precious few of them, since you sent ${men} out to scout—\n\t*goto part1_speech_1\n*else\n\tbut precious few of them, since you sent ${men} to defend the Isle—\n\t*goto part1_speech_1\n\n*label part1_speech_1\nand these are the ${men} who didn't follow ${Bedwyr}, so the more young and untried, or the more infirm.\n*if chapter4_emrys_request=\"medicine\"\n\t${Emrys} and ${his} helpers wait next to the Long Hall, braziers and poultices ready to aid the wounded.\n*if chapter2_uther_healed=true\n\tAnd then there's the $!{King}, your ${father}, ${Uther}, seeming held up by ${his} spear and iron will, eyes cold.\nThey're all watching you now.\n\n${Cai} nudges you. \"Time to say something, $!{brother}.\"\n*choice\n\t#\"No. This is no time for flowery speeches. Everyone here knows the situation. We fight, or we die.\"\n\t\tThe word 'die' echoes through the fort, and there's a moment of silence. A stillness.\n\t\t*if acclaim>40\n\t\t\t*set defence_of_dinas_emrys %+15\n\t\t\tThere's fear here, you can feel it, but there's a quiet determination. You look over at ${Gawain}; ${his} jaw is firm with resolve, ${his} eyes clear. $!{He} meets your eyes, and nods. \"We fight,\" ${he} says. Then ${he} takes a deep breath and roars \"Gwynedd!\"\n\t\t\t\n\t\t\tThe voices of your troops raise the word to the sky in one great shout.\n\t\t\t*goto part1_deployment\n\t\t*else\n\t\t\tYou can see the uncertainty written across their faces. You look over at ${Gawain}; ${his} expression is grave, but ${his} voice is firm. \"For Gwynedd, $!{brother}s,\" ${he} says. \"Let's make a fight of it.\"\n\t\t\t*goto part1_deployment\n\t\n\t#I'll inspire them, I'll make them understand that there's hope.\n\t\t\"I know you're thinking that we're on our own, that we've got little chance. That our allies have abandoned us; indeed, that this feels like the end of the Britain we know, with the Saxons this deep into the hills. That we've no hope of winning. But we don't need to win. All we need to do is to hold.\n\t\t\n\t\t\"The Saxons came for Ynys Mon, and they found nothing at the Isle, so they've come here to vent their rage. But this is winter, in the hills of Britain. How much food do you think they've brought? Not enough. How many fur blankets? How long will those stay dry in the rain? These Saxons aren't a besieging force, they're not geared for it, so as long as they stay outside these wooden walls they'll be wet, miserable, cold, and soon hungry. And bored, and want to go home.\n\t\t\n\t\t*if leader>55\n\t\t\t*set defence_of_dinas_emrys %+20\n\t\t\t*set track_orator +1\n\t\t\t*set acclaim %+15\n\t\t\t\"And do you think ${Bedwyr} will be idle when ${he} realizes ${he}'s been drawn out in a trick? No. $!{He} and ${his} ${men} will be on their way back now, as I speak. So all we need to do is to hold. Hold the $!{King}'s fort, which has never fallen. A ring of high wood; old, hard trees, weathered by wind and baked by sun. Those won't burn, and I'll wager it'll take more than a Saxon axe to chop a hole in it.\n\t\t\n\t\t\t\"No, our biggest danger here is boredom, and being unable to sleep due to the noise outside.\"\n\t\t\t\n\t\t\tYou see the nodding of heads amongst the warriors, and hear laughter and a small cheer in the ranks. The mood is less oppressive, and the ${men} stand more at ease.\n\t\t\t*goto part1_deployment\n\t\t\n\t\t*elseif (leader>=40) and (leader\u003c=55)\n\t\t\t*set defence_of_dinas_emrys %+15\n\t\t\t\"When ${Bedwyr} realizes ${he}'s been tricked, do you not think ${he}'ll be running back here? Just imagine ${his} face—${he}'d be sore disappointed if we didn't leave ${him} a few Saxons to deal with.\n\t\t\t\n\t\t\t\"For myself, I've a mind to leave ${him} as few as possible. What do you say?\"\n\t\t\t\n\t\t\tYou see the nodding of heads amongst the warriors, and hear a chuckle somewhere in the back of the ranks. The mood is less oppressive.\n\t\t\t*goto part1_deployment\n\t\t*else\n\t\t\t*set defence_of_dinas_emrys %-20\n\t\t\t\"All we need to do is to hold. They'll soon grow tired of us.\"\n\t\t\t\n\t\t\tYou can see from the faces around you that you haven't won them over.\n\t\t\t*goto part1_deployment\t\n\n\t#I'll ridicule the Saxons, belittle them, and make our people resentful of their presence.\n\t\t\"Do you know who these Saxons are? A drunken rabble. ${Cynric}'s at their head, ${Cerdic}'s ${son}, and ${he}'s out with ${his} friends to have a bit of fun. They've tried to make trouble at the Isle, and the ${priestesses} have sent them away with their tails low. And now they're on the loose and wanting to break a few heads. This isn't an invading force. It's a mob that's in its cups. And now we have to discipline ${Cynric}'s ${son} for ${him}, as the old ${man}'s too feeble to do it for ${himself}.\n\t\t\n\t\t*comment Testing ruthlessness\n\t\t*if compassion\u003c45\n\t\t\t*set track_orator +1\n\t\t\t*set defence_of_dinas_emrys %+15\n\t\t\t*set warrior %+15\n\t\t\t*set diplomat %-15\n\t\t\t\"So let's do just that. Let's send them back to ${Cerdic} with bloody noses, and ${Cynric} can tell ${his} ${da} that we gave ${him} a good hiding. That doesn't take an army. It doesn't even take all the folk we have here. I'll wager ${Gawain} could do it with one hand behind ${his} back. But that's not the point. The point is to show them that they can't come here, to our lands, and play their stupid, childish games. To show them that they won't find their easy entertainment in Gwynedd. Nor in Dyfed, nor Powys, nor any of our lands. And once we've shown them that, why, maybe in the spring we'll kick them back off this island.\"\n\t\t\t\n\t\t\tThere's a cheer at this, and a rattling of spears on shields. They're with you.\n\t\t\t*goto part1_deployment\n\t\t\t\n\t\t*else\n\t\t\t*set defence_of_dinas_emrys %-20\n\t\t\t*set acclaim %-20\n\t\t\t\"So we'll fight these Saxon children, and we'll send them running back home to their parents.\"\n\t\t\t\n\t\t\tYou hear a muttering from the crowd. \"And maybe then they'll come back with their mates,\" says a voice. ${Gawain} glares at the speaker.\n\t\t\t\n\t\t\t\"And maybe they will come back,\" you allow. \"Maybe. But the next time we face them it'll be with our warband home, and alliances with other kingdoms. For today, we've to spank some children, that's all.\"\n\t\t\t\n\t\t\tYou can see from the faces around you that you haven't won them over.\n\t\t\t*goto part1_deployment\n\t\t\n*comment --------------------------------------------------------------\n*label part1_deployment\n\n${Gawain} clears ${his} throat. \"Warleader.\" The word is loud enough for all to hear. \"The Saxons near. What are your orders—where should we station the ${men}?\"\n*temp defence_selected\n*choice\n\t#\"Every ${man} to the walls; let's make sure the Saxons see as much of our strength as possible. It should give them pause.\"\n\t\t*set defence_selected \"full\"\n\t\t*set defence_selected \"full\"\n\t\t*set rel_gawain %+10\n\t\t*set bravado %+15\n\t\t*set warrior %+15\n\t\t*set leader %-15\n\t\t${Gawain} nods, and issues orders swiftly. $!{Men} take up their places at the gate, and at any other weak points in the high wooden palisade.\n\t\t*goto part1_discuss\n\t#\"Keep half the ${men} back, well out of sight; then they'll be rested and can act to surprise ${Cynric}, or to reinforce breaches in our defenses where needed. The rest should be at the walls.\"\n\t\t*set defence_selected \"half\"\n\t\t*set compassion %+15\n\t\t*set leader %+15\n\t\t*set warrior %-15\n\t\t${Gawain} nods, and issues orders swiftly. $!{Men} take up their places at the gate, and at any other weak points in the high wooden palisade. Others retreat to a holding position amongst the storehouses behind the Long Hall, ready for your call.\n\t\t*goto part1_discuss\n\t#\"Before the Saxons get here, send a force of ${men} out into the dark to find a place to hide. When the attack has begun, they can strike from the rear. The rest should be at the walls.\"\n\t\t*set bravado %-20\n\t\t*set compassion %-20\n\t\t*set defence_selected \"sneak\"\n\t\t*set rel_gawain %-20\n\t\t\"I'll go with them,\" says ${Cai}. \n\t\t\n\t\t${Gawain} looks ${him} up and down dubiously.\n\t\t\n\t\t${Cai} shrugs. \"It's not like you've a wealth of candidates.\"\n\t\t\n\t\t\"Aye, fair enough,\" says ${Gawain}.\n\t\t\n\t\tThe ${men} are swiftly divided and leave by the rear gate, the one that leads up to the tall stones. Suddenly the fort feels a great deal emptier. ${Gawain} orders ${men} to their places at the gate, and to any other weak point in the high wooden palisade.\n\t\t*goto part1_discuss\n\t\t\n*comment --------------------------------------------------------------\n*label part1_discuss\n*page_break\n\n*gosub_scene startup get_lover\n\n\"${Arthur}.\"\n\n*comment At this stage it can only be Gawain or Morgan\n*if interest=\"morgan\"\n\tYou turn. It's ${Morgan}.\n\t\n\t\"This won't be easy,\" ${she} says.\n\t*if interest_rel>60\n\t\t$!{She} comes up to stand close by you, looking out over the fortress.\n\t*if interest_rel\u003c=60\n\t\t$!{She} looks out over the fortress.\n\t*goto part1_discuss1\n*elseif interest=\"gawain\"\n\tYou turn. It's ${Gawain}.\n\n\t\"This won't be easy,\" ${he} says.\n\t*if interest_rel>60\n\t\t$!{He} comes up to stand close by you, looking out over the fortress.\n\t*if interest_rel\u003c=60\n\t\t$!{He} looks out over the fortress.\n\t*goto part1_discuss1\n\t\n*label part1_discuss1\n*if defence_of_dinas_emrys>55\n\t\"You've done well with what you have. This'll be a close-run thing, I think.\n*if defence_of_dinas_emrys\u003c=55\n\t\"I won't lie; our chances are not good.\n*if interest_rel>60\n\tRemember that I'm here. Anything you need of me, you only have to ask.\"\n*if interest_rel\u003c=60\n\tYour first command as Warleader. And perhaps your last.\"\n*choice\n\t*if (interest_rel>60) #\"Now's hardly the time for that sort of thing.\"\n\t\t*if interest=\"morgan\"\n\t\t\t*set rel_morgan %+15\n\t\t\t$!{She} raises an eyebrow and grins. \"Haven't you got enough trouble with the Saxons?\"\n\t\t*if interest=\"gawain\"\n\t\t\t*set rel_gawain %+15\n\t\t\t$!{He} blushes. \"We've matters of war to attend to.\"\n\t\t*goto part1_end\n\t\t\n\t*if (interest_rel\u003c=60) #\"I can't bear it when you're so cheerful.\"\n\t\t*if interest=\"morgan\"\n\t\t\t*set rel_morgan %+15\n\t\t\t$!{She} smiles. \"I'm sorry. You've enough to worry about without me being a doomsayer.\"\n\t\t*if interest=\"gawain\"\n\t\t\t*set rel_gawain %+15\n\t\t\t$!{He} grimaces. \"Aye, well. I'm sorry, Art. I'm sure you're doing your best.\"\n\t\t*goto part1_end\n\t\t\n\t#\"Don't worry. With God's help we'll get through this.\"\n\t\t*if interest=\"morgan\"\n\t\t\t*set rel_morgan %-10\n\t\t\t$!{Her_his} lip twitches in irritation. \"Don't let the ${men} hear you say that
