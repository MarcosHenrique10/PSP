k gold, the eyes of the two dragon-headed end-caps glittering green.\n\t\t\n\t\t*goto part3_arthur_leaves\n\t\t\n\t*if (tomb_morgan=false) #I take the silver chalice.\n\t\t*set chapter9_item_arthur \"cup\"\n\t\t*set chapter9_taken_cup true\n\t\t*achieve item_cup\n\t\tYou lift the cup from beside ${Ambrosius}'s hand, half afraid that at any time you might wake ${him}, that ${his} hand might catch yours. But ${he} doesn't stir. The cup gleams silver, the gold chasing around the horse's head engraved in the bowl glinting in the light.\n\t\t\n\t\t*goto part3_arthur_leaves\n\t\n\t#I take the $!{King}'s sword.\n\t\t*set chapter9_item_arthur \"sword\"\n\t\t*set chapter9_taken_sword true\n\t\t*achieve item_sword\n\t\tYou lift the sword, belt and scabbard from by the $!{King}'s side, half afraid that ${he} might stir and stop you, that you might be violating ${his} grave. But ${he} makes no move; indeed, ${his} expression is one of profound peace. The sword is heavy in your hand, the purple stone glittering darkly in the light.\n\t\t\n\t\t*goto part3_arthur_leaves\n\t\n\t#I take the banner.\n\t\t*set chapter9_item_arthur \"banner\"\n\t\t*set chapter9_taken_banner true\n\t\t*achieve item_banner\n\t\tYou lift the roll of cloth from next to the $!{King}'s head, half afraid that ${he} might stir and stop you, that you might be violating ${his} grave. But ${he} makes no move; indeed, ${his} expression is one of profound peace. The banner smells musty, but the colors are still bright, red and green thread glinting in the light.\n\t\t\n\t\t*goto part3_arthur_leaves\n\n*comment --------------------------------------------------------------\n*label part3_arthur_leaves\nYou stand looking at $!{Ambrosius} for a moment. $!{He} is at rest, and ${his} troubles have passed. Yours have barely started.\n\nYou turn your back and make your way down the corridor, \n*if chapter9_item_arthur=\"torc\"\n\tthe torc gripped firmly in your hand.\n*if chapter9_item_arthur=\"sword\"\n\tcradling the sword to your chest.\n*if chapter9_item_arthur=\"cup\"\n\tthe cup gripped firmly in your hand.\n*if chapter9_item_arthur=\"banner\"\n\tcradling the banner to your chest.\n\n*if ( chapter2_pregnant )\n\t*page_break\n\tWhen you reach the light of the entryway, you see concerned faces looking in at you. You let them see your prize, take a step over the threshold—and then a terrible pain stabs you in your gut. You let the ${chapter9_item_arthur} fall, and collapse into a ball of agony by the doorway, hugging your abdomen. You realize you're screaming.\n\t\n\t\"${Arthur}! ${Arthur}!\" ${Morgan} is there by your side; then ${Vivian}, and then you see ${Emrys}'s face. Everything feels like it's concentrating on the burning knot in your stomach—the edges of your vision are blurring and fading. The pain comes in waves.\n\t\n\t${Vivian} presses ${her_his} hands to your belly, prodding, stroking, asking where the pain is. You grit your teeth and tell ${her_him} that it's everywhere…and then the pain passes, fades, drains away as ${her_his} cool hand soothes your skin.\n\t\n\tThen it comes again, all in a wave. You gasp, but it's not as bad as before, and it fades. Then pain. Then it's gone. Then a small stab, another. And then just the memory, and you fall back on the grass and blink tears from your eyes.\n\t\n\t\"You stupid girl,\" says ${Vivian}, in equal parts anger and distress. \"Why didn't you tell anyone?\"\n\t\n\t\"Tell anyone what?\"\n\t\n\t${Emrys} takes your hand. \"The spirits will only suffer one living soul to stand within,\" ${he} says quietly. \"Did you not know you were with child?\"\n\t\n\tYou shake your head in blank incomprehension.\n\t\n\t*fake_choice\n\t\t#\"I…I can't be…\"\n\t\t\t\"You are,\" says ${Vivian}. \"There is no doubt of it.\"\n\t\t\t\n\t\t\t${Morgan} kneels by you, face utterly drained of color.\n\t\t\t\n\t\t#\"${Morgan}?\"\n\t\t\t\"I am here.\" You see ${Morgan}'s face as he kneels by you, utterly drained of color. Then he turns to ${Vivian}, and through blue lips says \"Father. Will she…will the child…?\"\n\t\t\t\n\t\t#\"Is…is it hurt?\"\n\t\t\tYou're aware of ${Morgan} kneeling by you, face utterly drained of color.\n\t\n\t\"I do not think there is danger for you, not now,\" says ${Vivian} to you. \"And the child within you lives. Whether it will remain healthy, whether you will bear it living when the time comes, whether it has been…changed by this I cannot tell. But know and remember this, ${Arthur} ${ap} ${Uther}—all actions have consequences.\"\n\t\n\tHe calls one of his acolytes to bring water for you, and helps you sit up. \"I will make you up a tonic to drink when we have left this place. But for now you must find strength, ${Arthur}, for there is work yet to be done.\"\n\t\n\t${Morgan}, still ashen-faced, lays a hand on your shoulder.\n\n*if chapter2_pregnant=false\n\tWhen you reach the entryway, you see concerned faces looking in at you. You let them see your prize, and step, blinking, into the light. ${Emrys} nods at you in satisfaction.\n\t\n*if (tomb_bedwyr=false)\n\t*if ( chapter2_pregnant )\n\t\t\"Go,\" says ${Vivian} to ${Bedwyr}. \"Find your treasure.\"\n\t*page_break\n\t*if (chapter2_pregnant = false)\n\t\tIt's ${Bedwyr}'s turn.\n\t\n\t*goto part3_bedwyr_enters\n\t\n*if (tomb_morgan = false)\n\t*if ( chapter2_pregnant )\n\t\t\"Go,\" says ${Vivian} to ${Morgan}. \"Find your treasure.\" ${Morgan} looks between you and ${her_him}—you nod to ${her_him} to leave you. \n\t*page_break\n\t*if (chapter2_pregnant = false)\n\t\tIt's ${Morgan}'s turn.\n\t\n\t*goto part3_morgan_enters\n\t\n*goto part4\n\n*comment --------------------------------------------------------------\n*comment                   Part 4: Choices Made\n*comment --------------------------------------------------------------\n*label part4\n*page_break\n\nThe shadows have shifted. Behind the fog, the sun must be well past noon.\n\nYou sit on the grass not far from the tomb. ${Morgan} and ${Emrys} sit next to you. ${Bedwyr} sits apart, the ${chapter9_item_bedwyr} by ${his} side. ${Vivian} stands before all of you, seemingly deep in thought. Behind ${her_him}, amongst the stones, is the ${White_Lady}, fading in and out of existence. $!{She} says nothing, but simply watches, hands clasped in front of ${her_him}.\n\n${Vivian} clears ${her_his} throat. \n*if chapter9_taken_torc\n\t*if chapter9_item_arthur=\"torc\"\n\t\t$!{She} looks at you. \n\t*if chapter9_item_bedwyr=\"torc\"\n\t\t$!{She} looks at ${Bedwyr}. \n\t\"The torc,\" ${she} says. \"It is the torc of the Pendragon. ${Ambrosius} wore it, and all saw it. If one who seeks to rule is seen wearing it, it will add much to their claim. It was not passed to ${Uther}.\"\n\t\n\t\"Why not?\" asks ${Bedwyr}.\n\t\n\t\"That is not for me to say,\" says ${Vivian}.\n*if chapter9_taken_cup\n\t*if chapter9_item_arthur=\"cup\"\n\t\t$!{She} looks at you. \n\t*if chapter9_item_morgan=\"cup\"\n\t\t$!{She} looks at ${Morgan}. \n\t\"The chalice is the $!{King}'s Guesting Cup. Perhaps a luxury in these days, but at the least it's worth money; selling it could make certain that the people of Gwynedd have the food and arms they need to fight the Saxons. Or it could be given as a royal gift to strengthen an alliance.\"\n\t\n*if chapter9_taken_banner\n\t*if chapter9_item_arthur=\"banner\"\n\t\t$!{She} looks at you. \n\t*if chapter9_item_morgan=\"banner\"\n\t\t$!{She} walks over to ${Morgan}. \n\t\"The red dragon banner has not been seen in ten years. It will put heart into the people of Gwynedd if they see it flying on the battlefield.\"\n\t\n*if chapter9_taken_sword\n\t\"The sword… \n\t*if chapter9_item_arthur=\"sword\"\n\t\tDraw it, ${Arthur}.\"\n\t\t\n\t\tYou do as ${she} says. \n\t*if chapter9_item_bedwyr=\"sword\"\n\t\tDraw it, ${Bedwyr}.\"\n\t\t\n\t\t$!{He} does as ${she} says. \n\tThe blade is still as bright as when it was forged.\n\n\t\"This is the sword of the ${Emperor} ${Maximus}, the blade the Romans called Excalibur—Caledfwlch, 'Cut-Steel' to our people.\"\n\t\n\tThis takes you by surprise. \"But…${Uther} had the sword of ${Maximus}. $!{He} gave it to me. It's set with gold, the hilt bears a dragon's head. It looks…well. Like an ${emperor}'s sword. Not like this.\"\n\t\n\t*if chapter8_sword_broken\n\t\t\"Looked,\" says ${Bedwyr} bitterly. \"You broke it, if you recall.\"\n\t\t\n\t\"${Uther}'s sword was not Caledfwlch. It was a gaudy fake. ${Ambrosius} refused to give Caledfwlch to ${him}, so ${he} made ${his} own. This…this is a weapon of Rome, made for a Roman ${emperor}. Its touch is feared by Briton and Saxon alike.\"\n\nSomething passes between ${Vivian} and the ${White_Lady}. ${Vivian} nods, and then looks around at all of you. \"It is time for you to lay aside any difference you might have amongst you,\" ${she} says. \"They only serve to weaken us. Take these treasures back into the world. It is their time.\"\n\n*comment --------------------------------------------------------------\n*comment                   Part 5: Death Of Kings\n*comment --------------------------------------------------------------\n*label part5\n*page_break\n*temp uther_dead\n*set uther_dead false\n\n*if chapter9_use_causeway\n\tYou return to the mainland across the causeway, \n*if chapter9_use_causeway=false\n\tThere's a hidden causeway just before the surface of the sea, which connects the Isle of the Dead to the mainland. It seems as if you are walking on water as you make your way back to solid ground\nand reunite with ${Gawain} and ${Cai} on the shore. They were led astray by the fog, and eventually found their way back.\n\nAll four of you who spent time on the Isle find yourselves reluctant to talk of the experience. \n*if chapter2_pregnant\n\tAnd you can't bring yourself to talk of your own revelation. A child—${Morgan}'s child, by the timings—is growing inside you. You haven't even begun to think about what that might mean.\n*if chapter2_morgan_pregnant\n\tAnd you haven't even begun to think about the revelation that ${Morgan} is pregnant. Is it yours, from the autumn festival? What will ${she} do? What will you do? \n\t*if lover_gawain\n\t\tWhat will ${Gawain} say? \n\t*if romance_emrys\n\t\tWhat does ${Emrys} think of this?\n\t\nDespite bearing hope in the form of the treasures, it is a silent and thoughtful group who make their way back through the fog to Dinas Emrys as the evening falls.\n*page_break\n\nOnce through the gates, ${Bedwyr} turns to you. \"They spoke truth. We should not be set against one another. Not in the face of ${Cynric} and ${his} people. I acknowledge you Warleader. Now I go to present the ${chapter9_item_bedwyr} to our ${father}, but later we should talk.\"\n\nAs ${he} walks away, ${Emrys} says, \"That took courage. Perhaps there is some hope after all.\"\n\n\"The ${man}'s still an arse,\" mutters ${Cai}.\n\n\"Perhaps so,\" rumbles ${Gawain}. \"But ${he}'s far from the only one.\"\n\n\"At least I don't pretend I'm God's gift to anything.\"\n\n\"Except ${women}?\" says ${Gawain}.\n\n\"Ahh…yes. Well. Guilty, I suppose.\"\n\nYou make your way towards the Long Hall. It's full of people; you're told that a delegation of ${monk}s from Ireland have petitioned to see the $!{King}. ${Bedwyr} stands at ${Uther}'s side—the ${chapter9_item_bedwyr} lies in the $!{King}'s hands. The old ${man} looks up at you as you enter, and nods, then turns back to ${his} discussion with the $!{Abbot}, someone you've seen at court before.\n\n${Cai} deftly scoops up two cups of wine from a nearby table and hands you one of them. \"Here's to not being cold and damp,\" ${he} says. \"Should you talk to your ${father}?\"\n\n\"I suppose I should,\" you say reluctantly, and start down the hall.\n\n*if (chapter2_pregnant or chapter2_morgan_pregnant)\n\tNext to you, ${Morgan} clears ${her_his} throat. \"Afterwards…can we talk? In private?\" The muscles in ${her_his} jaw flex—${she}'s tense as a bowstring. \n\t*goto part5_attack\n\t\n*gosub_scene startup get_lover\n*if interest=\"morgan\"\n\t${Morgan} takes your hand. \"Well, I'm going to wash, and then get some sleep. Or something like sleep. Come join me when you're done?\" There's something strained in ${her_his} tone. \n\t*goto part5_attack\n*if interest=\"gawain\"\n\t${Gawain} claps a hand on your shoulder. \"I've a great need to rid myself of travel dust, and to find something to eat. Join me after if you wish, ${Arthur}.\" $!{He} squeezes your shoulder gently. \n\t*goto part5_attack\n*if interest=\"emrys\"\n\t${Emrys} stands next you. \"I should write it down,\" ${he} says. \"What happened on the Isle. Who knows how long we'll live? There should be some record. It's a shame we had to leave the \n\t*if chapter9_taken_torc=false\n\t\ttorc.\"\n\t*if chapter9_taken_sword=false\n\t\tsword.\"\n\t*if chapter9_taken_banner=false\n\t\tbanner.\"\n\t*if chapter9_taken_cup=false\n\t\tcup.\"\n\t\t\n\t\"What did you mean when you said you'd been offered it?\"\n\t\n\t$!{He} looks uncomfortable. \"Are you sure you want to know?\"\n\n*label part5_attack\nYou open your mouth to reply, and then—\n\n\"To the gates! To the gates! Saxons!\"\n\n${Gawain}'s sword is in ${his} hand. \"Arawn's teeth, where did they come from?\" $!{He} pushes through the crowd towards the door.\n\nThen— \"${Arthur}!\" It's ${Cai}. You follow ${his} gaze—the ${abbot} has a knife drawn.\n\nYour stomach lurches. \"I've seen ${him} before…${he}'s no ${priest}, ${he}—\" Then ${monk}s are throwing off their habits; underneath are tattooed, lean bodies and sharp swords. One of them grins at you. \"Ware! ${Cynric}!\" shouts ${Morgan}.\n\n${Bedwyr} backhands the ${abbot} across the face; the ${man} stumbles and falls, but ${Cynric} is there in two swift strides. $!{He} brings down ${his} sword towards ${Uther}; ${Bedwyr} throws up ${his} arm, and then you hear a cry and see blood spurt and a hand, severed, spin across the hall.\n\nThen ${Cynric}'s sword slices into the $!{King}'s neck and blood sprays.\n\n*choice\n\t#\"${Emrys}! The $!{King}!\" I'll leap to the $!{King}'s defense and protect ${him}, fighting off ${Cynric} while ${Emrys} binds ${Uther}'s wounds.\n\t\t*set bravado %+20\n\t\t*set rel_uther %+20\n\t\t*goto part5_protect_uther\n\n\t#\"${Emrys}! Save ${Bedwyr}!\" ${Uther} won't survive this; I'll fight off ${Cynric} while ${Emrys} binds ${Bedwyr}'s wounds.\n\t\t*set bravado %-30\n\t\t*set rel_bedwyr %+20\n\t\t*goto part5_protect_bedwyr\n\t\t \n\t#\"Gwynedd! To arms!\" ${Uther} and ${Bedwyr} are lost—I'll rally the hall and we'll wipe out ${Cynric}.\n\t\t*set leader %+20\n\t\t*set diplomat %-30\n\t\t*goto part5_rally\n\n*comment --------------------------------------------------------------\n*label part5_protect_uther\n*set track_champion +1\n\n\"${Cynric}!\" You shout a challenge, knocking people out of your way as you run towards the $!{King}. ${Bedwyr} is on ${his} knees, clutching at the stump of ${his} left arm. Blood gushes from the $!{King}'s neck, yet the old ${man} \n*if chapter9_item_bedwyr=\"sword\"\n\thas lifted Caledfwlch from where it lies on ${his} lap in an effort to ward off the Saxon.\n*if chapter9_item_bedwyr!=\"sword\"\n\thas seized a long knife and holds it up, futilely attempting to defend ${himself}.\n\t\nContemptuously, ${Cynric} slaps the blade aside; it clatters to the floor.\n\n*if chapter9_item_arthur=\"sword\"\n\tYou draw Caledfwlch and launch yourself at ${him}.\n*if chapter9_item_arthur!=\"sword\"\n\tYou draw your sword and launch yourself at ${him}.\n$!{He} turns, laughter on ${his} lips, and deflects your first blow with ease; it slides from ${his} blade. $!{His} eyes are darkening—you see ${his} shoulders hunch and lips twitch, teeth lengthening. $!{He} ducks the next blow, drawing blood on your wrist; you stab out, catching ${him} high on the shoulder.\n\n*if chapter9_item_arthur=\"sword\"\n\t*goto part5_cynric_sword\n*else\n\tYou manage to work yourself between ${Cynric} and the $!{King}—you know ${Emrys} is behind you, and will try to staunch the bleeding, if you can just hold the Saxon off.\n\t\n\t*fake_choice\n\t\t#I call for others in the hall to aid me.\n\t\t\t\"${Gawain}! ${Morgan}!\"\n\t\t#I can handle this on my own.\n\t\t#I goad ${Cynric}—try to enrage ${him}, to draw ${him} on to me and away from the $!{King}.\n\t\t\t\"Come on, fight me, you ${son} of a whore—or is an old, sick ${man} truly the fight you came here to seek, you honorless piss-bag?\" \n\tYou fight sparingly, every blow controlled; you know that if ${he} gets an opening ${Cynric} could rip your throat out. You're aware that there's more fighting in the hall, but you can't take your eyes off ${him} for a moment. It takes all your concentration.\n\t\n\t*if (warrior>55)\n\t\t*set acclaim %+15\n\t\t\n\t\tYou knock ${Cynric}'s blade aside; ${he} snarls and lashes out at you with sudden claws. They slice across the back of your sword hand. You take the opportunity to kick out at ${him}; it catches ${him} in the stomach.\n\t\t\n\t\t\"Duck!\" It's ${Gawain}. You throw yourself downwards as something whistles past your head; the end of a bench catches ${Cynric} full in the face and knocks ${him} flying. ${Gawain} drops the bench and frees ${his} axe from ${his} belt-loop. You realize that the Saxons are being driven towards the back of the hall.\n\t\t\n\t\t${Cynric} staggers to ${his} feet, breathing heavily, eyes black, muscles and tendons standing out stark against ${his} skin. $!{He} screams something in guttural Saxon and bares ${his} teeth at ${Gawain}.\n\t\n\t\tThere are Briton swords and shields alongside you, now. The Saxons are gravely outnumbered.\n\t\t\t\t\n\t\t\"Run, little dog,\" says ${Gawain} quietly. \"Run while you can. You've done your work here today. The next time we meet I'll nail your hide to a tree.\"\n\t\t\n\t\t${Cynric} snarls, spits, and then turns tail and flees.\n\t\t*goto part5_end\n\t*else\n\t\t*set uther_dead true\n\t\tAnd then you slip.\n\t\t\n\t\tOne mistake, it's all it takes. ${Cynric} kicks you sideways with ${his} boot; as you sprawl you see ${him} level a cut at ${Emrys}, and then ${he} runs ${Uther} through with a swift stroke. Dark gore bursts from the $!{King}'s mouth.\n\t\t\n\t\tThen there's an explosion of light and fire. You climb to your knees, and see ${Emrys} standing, blood dripping from ${his} side, hands extended in front of ${him}, fingers blackened and smoking. ${Cynric} is clutching at seared, blistered skin across ${his} chest and stomach, and staring at ${Emrys}. $!{He} barks commands in ${his} own tongue and then flees, still staring at ${Emrys}.\n\t\t\n\t\t${Emrys}'s arms fall. $!{He} looks at you. \"An alchymical trick I learned in Araby,\" ${he} says hoarsely. \"I believe I have burned my fingers.\" And then ${he} collapses.\n\t\t\n\t\t*set chapter9_emrys_wounded true\n\t\t*goto part5_end\n\n*comment --------------------------------------------------------------\n*label part5_protect_bedwyr\n*set track_champion +1\n\n\"${Cynric}!\" You shout a challenge, knocking people out of your way as you run towards where ${Bedwyr} kneels next to the $!{King}. $!{He}'s on ${his} knees, clutching at the stump of ${his} left arm. \"$!{Emrys}, quickly!\"\n\n*if chapter9_item_arthur=\"sword\"\n\tYou draw Caledfwlch and launch yourself at ${Cynric}.\n*if chapter9_item_arthur!=\"sword\"\n\tYou draw your sword and launch yourself at ${Cynric}.\n$!{He} turns, laughter on ${his} lips, and deflects your first blow with ease; it slides from ${his} blade. $!{His} eyes are darkening—you see ${his} shoulders hunch and lips twitch, teeth lengthening. $!{He} ducks the next blow with ease, drawing blood on your wrist; you stab out, catching ${him} high on the shoulder.\n\n*if chapter9_item_arthur=\"sword\"\n\t*goto part5_cynric_sword\n\n*else\n\t*set uther_dead true\n\t$!{He} grabs your blade in ${his} hand and wrenches it from your grasp, throwing it contemptuously to the floor. Then ${he} kicks you aside and, in one fluid movement, runs ${his} sword through ${Uther}'s chest. Dark gore bursts from the $!{King}'s mouth.\n\t\n\tYou grab a candlestick and throw it at ${Cynric}'s head. $!{He} ducks it, but it gives you time to recover your sword. You slash at ${his} legs, tearing the fabric of ${his} breeches and slicing into ${his} thigh; ${he} gives ground and you manage to work yourself between ${him} and $!{Bedwyr}—you know ${Emrys} is behind you, and will try to staunch the bleeding, if you can just hold the Saxon off.\n\t*fake_choice\n\t\t#I call for others in the hall to aid me.\n\t\t\t\"${Gawain}! ${Morgan}!\"\n\t\t#I can handle this on my own.\n\t\t#I goad ${Cynric}—try to enrage ${him}, to draw ${him} on to me and away from the $!{King}.\n\t\t\t\"Come on, fight me, you ${son} of a whore—or is an old, sick ${man} truly the fight you came here to seek, you honorless piss-bag?\" \n\tYou fight sparingly, every blow controlled; you know that if ${he} gets an opening ${Cynric} could rip your throat out. You're aware that there's more fighting in the hall, but you can't take your eyes off ${him} for a moment. It takes all your concentration.\n\t\n\t*if (warrior>55)\n\t\tYou knock ${Cynric}'s blade aside; ${he} snarls and lashes out at you with sudden claws. They slice across the back of your sword hand. You take the opportunity to kick out at ${him}; it catches ${him} in the stomach.\n\t\t\n\t\t\"Duck!\" It's ${Gawain}. You throw yourself downwards as something whistles past your head; the end of a bench catches ${Cynric} full in the face and knocks ${him} flying. ${Gawain} drops the bench and frees ${his} axe from ${his} belt-loop. You realize that the Saxons are being driven towards the back of the hall.\n\t\t\n\t\t${Cynric} staggers to ${his} feet, breathing heavily, eyes black, muscles and tendons standing out stark against ${his} skin. $!{He} screams something in guttural Saxon and bares ${his} teeth at ${Gawain}.\n\t\n\t\tThere are Briton swords and shields alongside you, now. The Saxons are gravely outnumbered.\n\t\t\t\t\n\t\t\"Run, little dog,\" says ${Gawain} quietly. \"Run while you can. You've done your work here today. The next time we meet I'll nail your hide to a tree.\"\n\t\t\n\t\t${Cynric} snarls, spits, and then turns tail and flees.\n\t\t*goto part5_end\n\t*else\n\t\tAnd then you slip.\n\t\t\n\t\tOne mistake, it's all it takes. ${Cynric} kicks you sideways with ${his} boot; as you sprawl you see ${him} level a cut at ${Emrys}.\n\t\t\n\t\tThen there's an explosion of light and fire. You climb to your knees, and see ${Emrys} standing, blood dripping from ${his} side, hands extended in front of ${him}, fingers blackened and smoking. ${Cynric} is clutching at seared, blistered skin across ${his} chest and stomach, and staring at ${Emrys}. $!{He} barks commands in ${his} own tongue and then flees, still staring at ${Emrys}.\n\t\t\n\t\t${Emrys}'s arms fall. $!{He} looks at you. \"An alchymical trick I learned in Araby,\" ${he} says hoarsely. \"I believe I have burned my fingers.\" And then ${he} collapses.\n\t\t\n\t\t*set chapter9_emrys_wounded true\n\t\t*goto part5_end\n\n*comment --------------------------------------------------------------\n\n*label part5_cynric_sword\n*set chapter9_cynric_caledfwlch true\n$!{He} screams and falls back, shocked, clutching at ${his} shoulder, and staring at the blade in your hand. Then ${he} shouts a strangled command to ${his} followers and flees.\n\n${Cai}, blood-spattered from ${his} encounter with one of the other Saxons, stares at you. \"What just happened?\"\n\n\"Creatures of chaos cannot bear its touch,\" says ${Emrys}. \"Now help me—${Bedwyr} is sore hurt.\"\n\n*goto part5_end\n\n*comment --------------------------------------------------------------\n\n*label part5_rally\n\n\"Gwynedd!\" You scream a rallying cry. \"With me, ${Cai}, ${Emrys}, ${Morgan}!\" \n*if chapter9_item_arthur=\"sword\"\n\tYou draw Caledfwlch \n*if chapter9_item_arthur!=\"sword\"\n\tYou draw your sword \nand grab up a stool as a shield. \"On me!\"\n\nYou start forward towards the Saxons; not a ragged charge but a slow and steady advance, keeping your force together, giving other folk a chance to swell your ranks or to take cover behind you. ${Cynric} stands next to the $!{King}, ${his} sword at ${Uther}'s chest. You make ${him} your focus, engaging Saxon warriors where you must, but moving forward, always forward.\n\n*if chapter9_item_arthur=\"sword\"\n\tA Saxon warrior throws ${himself} from a table towards you, roaring defiance. ${Cai}, beside you, takes the opportunity to slice along ${his} side; the ${man} crumples and rolls and then bounces to ${his} feet in front of you, snarling. $!{He} launches an overarm blow from one of ${his} two axes. You take the short path and stab Caledfwlch towards ${his} gut—${he} twists, taking it high under ${his} arm.\n\t\n\t$!{He} screams in panic, falling backwards, clutching at ${his} arm as if it's on fire. $!{He} shouts words in the Saxon tongue and backs away. Other Saxons stare at you and the sword and, likewise, pull backwards towards ${Cynric}.\n\t\n\t*set uther_dead true\n\t\n\t${Cynric}'s gaze is pure, black-eyed hatred. $!{He} rams ${his} sword through ${Uther}'s chest. Dark gore bursts from the $!{King}'s mouth. Then ${he} shouts a single command to ${his} followers. The Saxons make their escape through the door at the back of the hall.\n\t\n\t${Cai} stares at you. \"What just happened?\"\n\t\n\t\"Creatures of chaos cannot bear the sword's touch,\" says ${Emrys}. \"Now help me—${Bedwyr} is sore hurt.\"\t\n\t*goto part5_end\n\t\n*else\n\t*temp eff_leader\n\t*set eff_leader leader\n\t*if (chapter9_item_arthur=\"torc\")\n\t\t*set eff_leader %+20\n\t*if (chapter9_item_arthur=\"banner\")\n\t\t*set eff_leader %+20\n\t\t\n\t*set uther_dead true\n\t\n\t${Cynric}'s gaze is pure, black-eyed hatred. $!{He} rams ${his} sword through ${Uther}'s chest. Dark gore bursts from the $!{King}'s mouth. Then ${Cynric} simply stands waiting for you at the end of the hall, ${his} followers around ${him}, bloodied sword point-down on the ground.\n\t\n\tThe Saxons are all black-eyed, now, their shoulders hunched, their tendons and muscles standing out stark against their skin. You catch a flash of claw, and a glimpse of lengthened tooth—the spirals on their skin and the blood spattering their bodies make them seem wholly creatures of nightmare.\n\t*page_break\n\t*if (eff_leader>65)\n\t\t*set acclaim %+20\n\t\t\n\t\t\"On,\" you say, voice firm, and you don't let the people around you falter. Step, step, another step—and then you realize you're chanting it, as if you were in the Roman lines, as if ${Ector} were drilling you. \"Step.\" Move forward. \"Step.\" Move forward. ${Cai} takes it up alongside you, and then ${Emrys}, and other voices. And suddenly the Saxons seems smaller, less fearsome, as your implacable advance approaches. \"Step! Step!\"\n\t\t\n\t\tYou see ${Cynric} lick ${his} lips as if in doubt. $!{He} looks at the body of the $!{King}, and back at you, and then mutters something in Saxon. $!{His} ${men} fade backwards towards the door at the back of the hall, and then take their leave.\n\t\t\n\t\tAs soon as they're gone, ${Emrys} and ${Morgan} run to where ${Bedwyr} and the $!{King} lie.\n\t\t*goto part5_end\n\t*else\n\t\tYou can feel your ${men} faltering around you as the darkness seems to grow. ${Cynric} takes two lazy paces forward and drops ${his} sword. You can clearly see ${his} distended fingers, grown into long, twisted claws. $!{He} stands waiting for you while ${his} ${men} shuffle and snarl in the background.\n\t\t\n\t\t\"Well, $!{brother},\" says ${Cai} beside you—you can taste ${his} fear. \"Shall we?\"\n\t\t\n\t\tYou feel ${Emrys}'s hand on your shoulder. You know ${Morgan} is by your side. And then you hear ${Gawain} behind you. \"Let's send these ${insult_bastards} home.\"\n\t\t\n\t\t\"Gwynedd!\" The name of your country is on your lips as you charge forwards. Your blade strikes flesh, there's blood, there's pain, something rips at you, you hear ${Cai} cry out, you stab forward and see ${Cynric}'s smirk turn to rage, a claw tears into your gut, something explodes across your temple…\n\t\t\n\t\tA voice cries out. \"${Arthur}!\"\n\t\t\n\t\t*gosub_scene startup get_lover\n\t\t*if interest=\"gawain\"\n\t\t\t${Gawain}.\n\t\t\t\n\t\t*if interest=\"morgan\"\n\t\t\t${Morgan}.\n\t\t\t\n\t\t*if interest=\"emrys\"\n\t\t\t${Emrys}.\n\t\t\t\n\t\tAnd that is the last thing you ever hear.\n\t\t\n\t\t*goto_scene startup early_death_vision\n\n*comment --------------------------------------------------------------\n*label part5_end\n*page_break\n*if uther_dead\n\t${Uther} is dead. It's clear from a glance; there's no blood left to flow. It stains the great fur cloak and pools on the floor beneath. You reach out a hand and close the blank, staring eyes.\n\t\n*if uther_dead=false\n\tWhen you reach ${him}, ${Uther}, incredibly, still lives. $!{His} chest rises and falls in sharp, bubbling breaths. $!{His} eyelids flutter open as ${he} feels your hand on ${him}. \"${Arthur}…\n\t*if rel_uther>50\n\t\tI failed you. I failed ${Ambrosius}. Don't hate—\" \n\t*if rel_uther\u003c=50\n\t\twhere is my ${son}?\" \n\tAnd with a single, wheezing breath, the life goes out of ${him}.\n\n*if chapter9_emrys_wounded\n\t${Bedwyr} lies pale in a pool of ${his} own blood. ${Morgan}, kneeling beside ${him}, looks up at you. \"$!{He} still lives,\" ${she} says. \"${Gawain}—bind ${his} arm, hold it tight. ${Emrys}—what must we do?\"\n\t\n\tFrom where ${he} lies clutching ${his} side and nursing ${his} burned fingers, ${Emrys} gasps out \"Fire. Seal the wound.\"\n\t\n*if chapter9_emrys_wounded=false\n\t${Bedwyr} lies pale in a pool of ${his} own blood. ${Emrys}, kneeling beside ${him}, looks up at you. \"$!{He} still lives,\" ${he} says. \"${Gawain}—bind ${his} arm, hold it tight. ${Arthur}—we need fire to seal the wound.\"\n\t\nYou grab your knife and thrust it amongst the glowing embers of the fire.\n\n*if chapter9_emrys_wounded\n\t${Cai} helps ${Emrys} sit up, and examines the wound in ${his} side. \"I won't die of it,\" says ${Emrys}. \"But some cold water for my hands, I beg you.\"\n*if chapter9_emrys_wounded=false\n\t${Emrys} rips cloth from ${his} undershirt for makeshift bandages, while ${Cai} fetches fresh water. \n\nOnce the knifepoint glows red, you use a corner of your cloak to pick it up by the hilt. The color is fading fast. You drop to your knees beside ${Bedwyr}. ${Gawain} has ${his} hands clamped around the stump. $!{He} looks at you, then nods and loosens the binding. Blood spurts. You bring down the flat of the blade.\n\n${Bedwyr} screams, and then passes out again.\n\nThe hall is silent around you; figures standing, watching. You can feel the uncertainty in them, the shock, the hopelessness.\n\n\"Seven hells,\" says ${Cai} at length. \"Tell them what to do, ${Arthur}. Get them doing something. Anything.\"\n\n\"I…why are you asking me?\"\n\n\"A maimed ${man} cannot be $!{King},\" says ${Emrys}. \"Had you forgotten?\"\n\t\n*finish\n", "choicescript_description": "Seize the throne in the age of King Arthur! Lead an army of Britons against the darkest of enemies in this epic interactive medieval fantasy novel.\n\n\"Pendragon Rising\" is a thrilling 112,000-word interactive novel by Ian Thomas, where your choices control the story. It's entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\nAs the bastard offspring of the aging ruler Pendragon, you’ll fight to save Britain from a demon-tainted enemy and claim the crown you deserve. Command an army as Arthur, brave son of Uther, or Arta, fearless daughter of Utta.\n\nCharge heroically to the front of battle, or use tricks to defeat your foes. Dally with your childhood companion, or seek romance elsewhere. Hold the line with your closest friends against foreign invaders and their sinister magics. Find friendship, forge alliances, uncover plots, and triumph over creatures of nightmare to win a future for your people and your kingdom.\n\nWill you be mercenary or merciful? Seductive or solitary? Most importantly, can you lead your allies to drive back the darkness, and seize your place as Pendragon of Britain?\n", "choicescript_stats": "*comment ---------------------\n*comment    Main Stat Chart\n*comment ---------------------\n\n*comment ------------- Epithet --------------\n*temp epithet \"\"\n\n\n*comment Order here is pretty arbitrary - just things that I think take precedence over other things\n*if gender = \"male\"\n\t*if chapter11_exile\n\t\t*comment *set epithet \"the Exile\"\n\t\t*image exile2.png center Arthur the Exile\n\t\t*goto acclaim\n\t*elseif (chapter11_high_king=\"Arthur\")\n\t\t*comment *set epithet \"Pendragon\"\n\t\t*image pendragon2.png center Arthur Pendragon\n\t\t*goto acclaim\n\t*elseif (chapter11_cerdic_oath)\n\t\t*comment *set epithet \"Oathmaker\"\n\t\t*image oathmaker2.png center Arthur Oathmaker\n\t\t*goto acclaim\n\t*elseif (chapter11_killed_cynric)\n\t\t*comment *set epithet \"Wolfsbane\"\n\t\t*image wolfsbane2.png center Arthur Wolfsbane\n\t\t*goto acclaim\n\t*elseif chapter11_bedwyr_rival\n\t\t*comment *set epithet \"the Even-handed\"\n\t\t*comment Var set when you give Bedwyr the silver hand\n\t\t*image even_handed2.png center Arthur the Even-handed\n\t\t*goto acclaim\n\t*elseif (chapter7_epithet_spitehearth)\n\t\t*comment *set epithet \"Spitehearth\"\n\t\t*image spitehearth2.png center Arthur Spitehearth\n\t\t*goto acclaim\n\t*elseif chapter6_epithet_cursebreaker\n\t\t*comment *set epithet \"Cursebreaker\"\n\t\t*image cursebreaker2.png center Arthur Cursebreaker\n\t\t*goto acclaim\n\t*elseif chapter5_uther_armring\n\t\t*comment *set epithet \"the Stalwart\"\n\t\t*image stalwart2.png center Arthur the Stalwart\n\t\t*goto acclaim\n\t*elseif (chapter4_troops=\"isle\")\n\t\t*comment *set epithet \"Friend of the Isle\"\n\t\t*image isle2.png center Arthur Friend of the Isle\n\t\t*goto acclaim\n\t*elseif (leader>=75)\n\t\t*comment *se troops=\"isle\")\n\t\t*comment *set epithet \"Friend of the Isle\"\n\t\t*image isle1.png center Arta Friend of the Isle\n\t\t*goto acclaim\n\t*elseif (leader>=75)\n\t\t*comment *set epithet \"of the Sure Path\"\n\t\t*image sure_path1.png center Arta of the Sure Path\n\t\t*goto acclaim\n\t*elseif (warrior>=75)\n\t\t*comment *set epithet \"of the Skillful Hand\"\n\t\t*image skilful_hand1.png center Arta of the Skillful Hand\n\t\t*goto acclaim\n\t*elseif (diplomat>=75)\n\t\t*comment *set epithet \"of the Silver Tongue\"\n\t\t*image silver_tongue1.png center Arta of the Silver Tongue\n\t\t*goto acclaim\n\t*elseif chapter3_circle_won\n\t\t*comment *set epithet \"the Ill-fated\"\n\t\t*image ill-fated1.png center Arta the Ill-fated\n\t\t*goto acclaim\n\t*else\n\t\t*comment *set epithet \"Ill-born\"\n\t\t*image ill-born1.png center Arta Ill-born\n\t\t*goto acclaim\n*else\n\t*comment *image pendragon_rising.png\n\t*image unknown.png center Pendragon Rising\n\t*goto acclaim\n\n*comment -------------------------------------\n*label acclaim\n*comment *temp display_name\n*comment *set display_name \"${Arthur} ${epithet}\"\n\n*comment In case stats are accessed before gender is picked\n*comment *if gender = \"unknown\"\n\t*comment *set display_name \"Unknown\"\n\t\n*comment Pretty names for Acclaim\n*temp display_acclaim \"ERROR\"\n*if acclaim \u003c 20\n\t*set display_acclaim \"Disliked\"\n\t*goto acclaim_end\n*elseif acclaim \u003c 35\n\t*set display_acclaim \"Liked\"\n\t*goto acclaim_end\n*elseif acclaim \u003c 50\n\t*set display_acclaim \"Admired\"\n\t*goto acclaim_end\n*elseif acclaim \u003c 65\n\t*set display_acclaim \"Adored\"\n\t*goto acclaim_end\n*else\n\t*set display_acclaim \"Beloved\"\n*label acclaim_end\n\n*comment Pretty names for Allies\n*temp display_allies \"ERROR\"\n*if allies \u003c 2\n\t*set display_allies \"Few\"\n\t*goto allies_end\n*elseif allies \u003c 4\n\t*set display_allies \"Scattered\"\n\t*goto allies_end\n*elseif allies \u003c 6\n\t*set display_allies \"Diverse\"\n\t*goto allies_end\n*else\n\t*set display_allies \"Numerous\"\n\t*goto allies_end\n*label allies_end\n\n*comment chapter6_cadells_men\n*temp stat_cadell \"$!{King} ${Cadell} of Powys\"\n*comment chapter7_lots_men\n*temp stat_lot \"$!{King} ${Lot} of Lothian & Orkney\"\n*comment chapter7_duncans_men\n*temp stat_duncan \"$!{King} ${Duncan} of Strathclyde\"\n*comment chapter8_dyfrig_ally\n*temp stat_dyfrig \"$!{Dyfrig} of the $!{Brother}s of Christ\"\n*comment chapter10_gorlaes_allies\n*temp stat_gorlaes \"$!{King} ${Gorlaes} of Kernow\"\n*comment chapter10_geraint_allies\n*temp stat_geraint \"$!{King} ${Geraint} of Dumnonia\"\n*comment chapter11_aerons_men\n*temp stat_aeron \"$!{King} ${Aeron} of Dyfed\"\n\n*temp bullet \"*\"\n\n*comment Main chart\n*stat_chart\n\tpercent Leader\n\tpercent Diplomat\n\tpercent Warrior\n\topposed_pair Compassion\n\t\tRuthlessness\n\topposed_pair Bravado\n\t\tCunning\n\topposed_pair old_faith\n\t\tOld Faith\n\t\tRome\n\ttext display_acclaim Acclaim\n\ttext display_allies Allies\n*if chapter6_cadells_men\n\t${bullet} ${stat_cadell}\n\t*line_break\n*if chapter7_lots_men\n\t${bullet} ${stat_lot}\n\t*line_break\n*if chapter7_duncans_men\n\t${bullet} ${stat_duncan}\n\t*line_break\n*if chapter8_dyfrig_ally\n\t${bullet} ${stat_dyfrig}\n\t*line_break\n*if chapter10_gorlaes_allies\n\t${bullet} ${stat_gorlaes}\n\t*line_break\n*if chapter10_geraint_allies\n\t${bullet} ${stat_geraint}\n\t*line_break\n*if chapter11_aerons_men\n\t${bullet} ${stat_aeron}\n\t*line_break\n\n*comment ---------------------\n*comment    Debug Stat Chart\n*comment ---------------------\n*if debug_stats\t\n\t*line_break\n\t*line_break\n\t[b]Debug Stats: Version ${version}[/b]\n\t*stat_chart\n\t\ttext Acclaim\n\t\ttext Allies\n\t\ttext rel_cai Relationship (${Cai})\n\t\ttext rel_gawain Relationship (${Gawain})\n\t\ttext rel_morgan Relationship (${Morgan})\n\t\ttext rel_emrys Relationship (${Emrys})\n\t\ttext rel_bedwyr Relationship (${Bedwyr})\n\t\ttext rel_vivian Relationship (${Vivian})\n\t\ttext rel_uther Relationship (${Uther})\n\t\ttext romance_morgan Romance (${Morgan})\n\t\ttext romance_emrys Romance (${Emrys})\n\t\ttext romance_gawain Romance (${Gawain})\n\t\ttext lover_morgan Lover (${Morgan})\n\t\ttext defence_of_dinas_emrys Defense Of Dinas Emrys", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game, including the thrilling conclusion!\n\n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set gender \"female\"\n*set Arthur \"Arta\"\n*set leader 37\n*set diplomat 33\n*set warrior 76\n*set acclaim 40\n*set allies 1\n*set compassion 29\n*set bravado 49\n*set old_faith 65\n\nThe prisoners are rounded up, Cynna amongst them, and they're forced at spear point to kneel in front of the Queen.\n\n\"What is to be their fate?\" asks Yvaine.\n\nBlodwyn speaks first. \"Hostages,\" she says to Utta. \"They should live, so that we have a choke-hold on Cynna's mother.\"\n\nUtta shakes her head. \"They must die,\" she says. \"The Saxons must learn what an attack on Gwynedd earns them. We will send back their heads.\"\n\n\"You can't!\" It's Gaia. She realizes who she's talking to. \"My apologies, lady, but if we kill them here, now, without swords in their hands, then we are no better than the Saxons.\"\n\nUtta glares at her, then frowns, and looks over at you. \"Well, Warleader? What is your opinion?\" You're surprised she's asking you at all.\n\nYou hesitate, and then catch the expression on Cynna's face; the smile of a woman who doesn't care.\n\n*fake_choice\n\t#\"Kill them.\"\n\t#\"Let them return home to carry word of our victory to their people.\"\n\t#\"Keep Cynna as hostage, release the others.\"\n\t#\"Keep Cynna as hostage, kill the others.\"\n\t\n*script changeBackgroundColor(\"black\")\n\n*set Arthur \"Arthur\"\n*set chapter7_epithet_spitehearth true\n*set leader 65\n*set diplomat 27\n*set warrior 62\n*set acclaim 25\n*set allies 3\n*set chapter6_cadells_men true\n*set compassion 35\n*set bravado 66\n*set old_faith 24\n\n\"It's all right. You cannot control your dreams. Tell me about them.\" His voice is soothing and gentle. You're aware that, beside you, Morgan has gone rigid, tense, as if barely keeping herself in check.\n\nAled shrinks away from him again, and looks round at the others. He bites his lip. \"Teeth,\" he says. \"Teeth, tearing at bone, and at skin. Eating people alive.\"\n\n\"What are these the teeth of? A wild animal?\"\n\n\"I don't know!\" he bursts out. \"I don't, I swear. Sometimes I think that they're wolves, hunting in the forest. But sometimes I think they're…that they're men in the skin of wolves.\" He's shaking now. \"They ask me to join them.\"\n\n\"And you see these when you sleep? When did this start?\"\n\n\"Three nights ago,\" the captive whispers. \"I felt them. They're here.\"\n\nDyfrig brings up the boy's chin in one hand, studying him carefully. Then he sighs. \"It is always such a shame when one so young falls to the evil one's influence. I am sorry, Aled.\"\n\nWith his free hand he pulls a knife from his belt and raises it to his captive's throat.\n\n\"No!\" Morgan's cry rings out. Dyfrig looks at her.\n\n*fake_choice\n\t#\"Dyfrig! Stop this!\" I'll try and talk him out of it.\n\t#\"Dyfrig! I know why he has these dreams!\" I'll spin a lie to make his nightmares plausible.\n\t#I shove Dyfrig aside and stand in front of the boy.\n\t#\"You're all followers of Christ! You can't allow this!\" I'll appeal to Dyfrig's followers.\n\n*script changeBackgroundColor(\"sepia\")\n\n*set Arthur \"Arthur\"\n*set chapter7_epithet_spitehearth false\n*set leader 50\n*set diplomat 65\n*set warrior 35\n*set acclaim 25\n*set allies 1\n*set chapter6_cadells_men false\n*set compassion 57\n*set bravado 69\n*set old_faith 50\n\nThe high seat at the far end of the hall is empty. There's no sign of the King; Blaise, chief of Uther's druids, welcomes guests to the hall in his stead.\n\n\"Oh-hoh. Here's trouble,\" murmurs Cai—but it's not the empty chair he means.\n\nShouldering his way through the throng comes your half-brother Bedwyr, and the look on his face is not one of friendship.\n\n\"You!\" He grabs you by the collar and pushes you up against the wall. \"This is your doing!\"\n\nHe's been drinking, that much is obvious—his cheeks are flushed. You can see Gawain, watchful, behind him.\n\n\"Come on,\" says Cai lightly, picking up a goblet. \"Let's just have a drink, hey?\"\n\nBedwyr's eyes are furious, locked on yours. \"You were with him,\" he says softly. \"If a true Briton had been there, Uther would not now lie bleeding his guts out on the bed linens, you piece of Roman filth!\"\n\nHow do you handle this?\n\n*fake_choice\n\t#I punch him—I can't let him treat me like this in public!\n\t#The feast doesn't need this kind of display. I'll try to reason with him, to calm him down.\n\t#I know he needs someone to rage at right now. I'll let him have this victory—he'll feel better for it.\n\t\n*set Arthur \"Arta\"\n*set chapter11_bedwyr_rival true\n*set leader 60\n*set diplomat 51\n*set warrior 31\n*set acclaim 66\n*set allies 5\n*set chapter7_lots_men true\n*set chapter7_duncans_men true\n*set chapter10_geraint_allies true\n*set chapter11_aerons_men true\n*set compassion 64\n*set bravado 64\n*set old_faith 49\n\nThe valley of Baddon. A clinging, grimy mist wraps itself around rough hummocks of waterlogged ground at the bottom of a steep-sided valley. To the east, the flank of Mynydd Baddon rises up, its saddle-backed peaks lost in the fog. To the west, the slope of Waun Goch, the Red Heath; this is not the first time blood has been spilled on this land. The Saxons must pass through this vale from the north. You have come into the valley from the south.\n\nThe land is broken and treacherous—hummocks of solid ground riven by concealed streams and dank mire.\n\nThe leaders of your troops stand before you. \"Well, my Lady,\" says Queen Angharad with a smile. \"What are your orders?\" More quietly, she adds \"We have a good-sized force here, with our allies—but it does make it harder to hide what we're doing. Be careful.\"\n\n*fake_choice\n\t#\"Split the women into small roving groups; let them use the land to ambush the Saxons and pull away quickly wherever they get the chance.\"\n\t#\"Form up half of our warriors to act as bait; let's get the Saxons bogged down in the mire attacking our women, and then attack them from the sides with the reserves.\"\n\t#\"One force, united; we smash them apart with weight of numbers.\"", "startup": "*title Pendragon Rising\n*author Ian Thomas\n*scene_list\n\tstartup\n\tchapter1\n\tchapter2\n\tchapter3\n\t$ chapter4\n\t$ chapter5\n\t$ chapter6\n\t$ chapter7\n\t$ chapter8\n\t$ chapter9\n\t$ chapter10\n\t$ chapter11\n\t\n*create version \"1.1\"\n*create debug false\n*create debug_stats false\n*comment ==============================================================\n*comment                         Stats\n*comment ==============================================================\n*comment -- Gender --\n*create gender \"unknown\"\n\n*comment -- Main Stats --\n*create leader 50\n*create diplomat 50\n*create warrior 50\n*create acclaim 1\n*create allies 1\n\n*comment -- Opposed --\n*comment Compassion / Ruthlessness\n*create compassion 50\n*comment Bravado / Cunning\n*create bravado 50\n*comment Old Faith / Rome\n*create old_faith 50\n\n*comment -- Relationships --\n*create rel_cai 90\n*create rel_gawain 40\n*create rel_morgan 60\n*create rel_emrys 50\n*create rel_bedwyr 10\n*create rel_vivian 40\n*create rel_uther 30\n*create romance_morgan false\n*create rom idden 25 Walking on Water\n\thidden\n\tUse the hidden causeway to the Isle of the Dead.\n\t\n*achievement no_surrender hidden 25 No Surrender\n\thidden\n\tRefuse to surrender to the Saxons.\n\t\n*achievement step_aside hidden 25 The Kingdom First\n\thidden\n\tVoluntarily relinquish your claim to the throne.\n\t\n*comment ==============================================================\n*comment                   Gender Vars\n*comment ==============================================================\n*comment ---------------------\n*comment        Male\n*comment ---------------------\n*comment -- Gendered Words --\n*create he \"he\"\n*create she \"she\"\n*create him \"him\"\n*create her_him \"her\"\n*create his \"his\"\n*create her_his \"her\"\n*create his_hers \"his\"\n*create hers \"hers\"\n*create son \"son\"\n*create daughter \"daughter\"\n*create ap \"ap\"\n*create mab \"ferch\"\n*create brother \"brother\"\n*create sister \"sister\"\n*create priest \"priest\"\n*create priests \"priests\"\n*create priestess \"priestess\"\n*create priestesses \"priestesses\"\n*create mother \"mother\"\n*create father \"father\"\n*create lady \"lady\"\n*create lord \"lord\"\n*create king \"king\"\n*create queen \"queen\"\n*create emperor \"emperor\"\n*create himself \"himself\"\n*create herself \"herself\"\n*create man \"man\"\n*create woman \"woman\"\n*create boy \"boy\"\n*create girl \"girl\"\n*create men \"men\"\n*create women \"women\"\n*create ma \"ma\"\n*create da \"da\"\n*create prince \"prince\"\n*create princess \"princess\"\n*create lad \"lad\"\n*create lass \"lass\"\n*create lads \"lads\"\n*create lasses \"lasses\"\n*create insult_bastard \"bastard\"\n*create insult_bastards \"bastards\"\n*create master \"master\"\n*create mistress \"mistress\"\n*create sorceress \"sorceress\"\n*create aunt \"aunt\"\n*create uncle \"uncle\"\n*create wife \"wife\"\n*create cfather \"Father\"\n*create bishop \"bishop\"\n*create abbot \"abbot\"\n*create monk \"monk\"\n*comment -- Cast --\n*crea
