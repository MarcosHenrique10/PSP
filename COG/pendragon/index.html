delay them further.\"\n\t\nYou and ${Morgan} dash into the temple to find that the villagers who were tied up have already freed themselves. A handful of them are armed with staves, candlesticks, stones, anything they can find as weapons. \"You're leaving,\" you tell them. \"We'll hold the temple, we'll distract the Saxons. You get out through the rear.\"\n\n\"Where will we go to?\" It's ${cfather} ${Rhodri}, battered, but upright.\n\n\"${dest},\" says ${Morgan}. \"It's not far—if you're quick on your feet, you could make it in two hours. There's a high stockade, and two dozen ${men} who're as good with a spear as an axe.\"\n\n${cfather} ${Rhodri} looks at the others, and then nods. \"It will be difficult out there in the dark, but aye, it might be done. Thank you.\"\n\n*if dyfrig_ally = false\n\tYou hear shouting and the clash of arms outside. ${Gawain} upturns a table and wedges it between two pillars as a makeshift barricade. \"There's no time,\" you tell ${Rhodri}. \"Go, now, and quickly.\"\n\t\n*if dyfrig_ally\n\t${Dyfrig}'s ${men} pull back into the temple entranceway and start to pile up the temple's fixtures as barricades. \"Go now,\" calls ${Dyfrig}. \"There's no time.\"\n\n*if dyfrig_ally\n\t${cfather} ${Rhodri} leads the locals to the back of the building. You hear howling at the front; ${Morgan} and ${Gawain} join ${Dyfrig}'s ${men}. ${Morgan} looses an arrow into the darkness and you hear a Saxon curse; several of ${Dyfrig}'s followers hurl stones. You wave ${Rhodri} to go, and two dozen ${men}, ${women} and children head out into the dark.\n\nYou hurry to the front of the building.\n*if dyfrig_ally\n\tThe fire in front of the temple has died enough that you can see the outline of the buildings near the temple in the moonlight. ${Dyfrig}'s ${men} wait with you, swords bared, ready. There's no obvious sign of the Saxons. \"Where are they?\"\n\t\n\t\"They'll be here soon enough,\" says ${Gawain}.\n\n*if dyfrig_ally=false\n\tPeering through the pillars you can hear fighting out ahead of you; screams of ${men}, curses, the clatter of weapons. The fire in front of the temple has died enough that you can see flashes in the moonlight of mail and sword.\n\n*choice\n\t#\"Make noise. We need to draw the Saxons' attention.\"\n\t\t*if dyfrig_ally\n\t\t\t${Gawain} starts to rattle ${his} sword on ${his} shield, and lets out a roar. ${Dyfrig}'s ${men} follow suit, and ${Dyfrig} ${himself} raises ${his} voice in loud prayer.\n\t\n\t\t*if dyfrig_ally=false\n\t\t\t${Gawain} starts to rattle ${his} sword on ${his} shield, and lets out a roar. You follow suit. ${Morgan} bangs two stones together. \n\t\t\t\t\n\t\t*comment Testing cunning\n\t\t*if (bravado\u003c40)\n\t\t\t*set acclaim %+15\n\t\t\t*set villagers_fled true\n\t\t\t*set chapter8_villagers_escaped true\n\t\t\tYou pray that it's enough, that the villagers have got away.\n\t\t\t*goto part5\n\t\t*else\n\t\t\t*goto part4_villescape_fail\n\t\t\t\n\t#\"We need to engage the Saxons, to keep them busy; come on, let's take the fight to them.\"\n\t\t*if dyfrig_ally\n\t\t\t${Dyfrig} leads the charge as you leap over the barricade, ${his} cross held high in ${his} hand. \n\t\n\t\t*if dyfrig_ally=false\n\t\t\t${Gawain} leads the charge as you leap over the barricade, ${his} sword rattling on ${his} shield to draw their attention.\n\t\t\t\n\t\t*if (bravado>60)\n\t\t\t*set acclaim %+15\n\t\t\t*set villagers_fled true\n\t\t\t*set chapter8_villagers_escaped true\n\t\t\tThe Saxons take the bait; there's a flash, and something erupts from the darkness. You find yourself bowled over, scrabbling to drag your shield up to defend yourself as something heavy lands on you. There's a sharp pain in your ribs as you barely hold claws off, and then teeth clamp down on your shoulder.\n\t\t\t\n\t\t\tThere's a roar—but it's from ${Gawain}, as ${he} slams bodily into your attacker, driving ${him} off you. The figure lands gracefully and a long tongue licks bloodied lips, grinning.\n\t\t\t*if dyfrig_ally\n\t\t\t\t${Dyfrig} holds up ${his} cross. \"Back! Back, spirit of darkness!\" For a brief moment the creature hesitates.\n\t\t\t*if dyfrig_ally=false\n\t\t\t\t${Morgan} hurls a lit torch; it lands at the creature's feat, illuminating corded muscle and tattooes. It jumps back.\n\t\t\tIt's enough. ${Emrys} seizes you and helps you to your feet; you and your companions fall back to the barricade.\n\t\t\t\n\t\t\tYou pray that it's enough, that the villagers have got away.\n\t\t\t*goto part5\n\t\t*else\n\t\t\tBut nothing comes out of the darkness to meet you.\n\t\t\t*goto part4_villescape_fail\n\t\t\t\n\t#I taunt the Saxons, trying to provoke them into an attack.\n\t\t*if (diplomat>60)\n\t\t\t*set acclaim %+15\n\t\t\t*set villagers_fled true\n\t\t\t*set chapter8_villagers_escaped true\n\t\t\t\"You there, mongrel curs yapping in the darkness! Are you so scared of the light and so scared of our blades that you'll keep yourselves hidden away in the hope we'll sleep? It's the only way you'll win! Do you think a little paint on your face and a rasp in your throat is enough to make you fearsome? You're children trying to look like warriors; if your ${lord} ${Cerdic} saw you ${he}'d beat you like the whipped, flea-bitten dogs you are.\"\n\t\t\t\n\t\t\t${Morgan} raises ${her_his} voice. \"You're all a bunch of hairy-arsed, underfed carrion-munchers whose only mystic powers are the ability to shit in the woods and to lick your own genitals!\" $!{She} looks at you. \"Too much?\"\n\t\t\t\n\t\t\t\"Just enough, I think,\" says ${Gawain}, as you hear scornful laughter from outside the front of the temple.\n\t\t\t\n\t\t\t${Cynric}'s voice: \"This from a Warleader who has never fought a war and a limp-wristed smoke-addled ${priestess}? I hear your teeth rattle and I smell the piss-stench of your fear. Come out, oh mighty Briton warriors! Or are you scared of the dark?\"\n\t\t\t\n\t\t\t${Emrys} is watching towards the back of the temple. \"Keep them busy,\" ${he} hisses. \"As long as you can.\"\n\t\t\t\n\t\t\tYou and ${Morgan} set about finding new, and increasingly inventive, ways of giving ${Cynric} cause to hurl insults at you.\n\t\t\t*goto part5\n\t\t*else\n\t\t\t\"Ho, Saxon vermin! Do you think to just hide in the darkness? You've not the strength nor the wits to come closer, I suppose?\"\n\t\t\t\n\t\t\t${Morgan} looks at you, eyebrow raised. \"[i]That's[/i] the best you can do? Ho! You lard-arsed flea-raddled sacks of filth! I've something here for you to chew on!\"\n\t\t\t\n\t\t\t${Gawain} shakes ${his} head. There's no movement out there in the darkness; they haven't taken the bait.\n\t\t\t*goto part4_villescape_fail\n\t\n*label part4_villescape_fail\nThen there's a howling from the rear of the building. \"The villagers—they've scented them,\" snaps ${Emrys}. \"Quickly!\"\n\n$!{He} leaps to ${his} feet; you follow, with \n*if dyfrig_ally\n\ta handful of ${Dyfrig}'s ${men},\n${Gawain} and ${Morgan} in tow. By the time you reach the small door ${Emrys} has wrenched it open.\n\nYou hear screaming. Horrified, you run outside, and then all turns to panic and chaos as something slashes into you and you and the people around you are fighting for your lives.\n\nEventually, in the confusion, you find ${Gawain} dragging you back into the building and ${Morgan} slamming the door. $!{She}'s pale, with a long gash across ${her_his} temple. \n*if dyfrig_ally\n\tA handful of ${Dyfrig}'s ${men}—fewer than there were—aid the few villagers that you were able to rescue from the night.\n*if dyfrig_ally=false\n\tA handful of villagers, weeping, blood-smeared, try to comfort each other; these are the few that you were able to rescue from the night.\n${Emrys} kneels over the body of ${cfather} ${Rhodri}. $!{He} looks up at you and shakes ${his} head.\n\nA howl goes up again, this time from the front of the temple.\n\n\"They're coming,\" says ${Emrys}.\n*set villagers_count -3\n*goto part5\n\n*comment --------------------------------------------------------------\n*comment                   Part 5: The Defence\n*comment --------------------------------------------------------------\n*label part5\n*page_break\n\n*comment Dyfrig didn't help out, so got a bunch of his men killed\n*if dyfrig_ally=false\n\t*set dyfrigs_men_count -1\n\tThe sounds of fighting from outside have stopped. None of you discuss why that might be; it remains unspoken that it's almost certainly because ${Dyfrig} and ${his} followers are bleeding corpses on the ground.\n\t\nYou strengthen barriers, light makeshift torches,\n*if chapter8_villagers_escaped = false\n\ttend to the villagers' wounds,\nand search for anything that might be of aid. At ${Emrys}'s urging the old temple is now brightly lit, the old frescoes and crumbling stonework gleaming. ${Gawain} takes up station by the temple pillars, keeping a watchful eye on the night outside.\n\n*if dyfrig_ally\n\t${Dyfrig} is praying, head bowed. $!{His} ${men} follow suit, echoing ${his} words in unison.\n\t*if old_faith\u003c50\n\t\t*set rel_morgan %-10\n\t\tIt's calming. You find yourself, head bowed, murmuring the same words, and then see a flash of anger on ${Morgan}'s face.\n\t\t\n\t*if old_faith>=50\n\t\tThere's mingled anger and contempt in ${Morgan}'s expression.\n\n\tThe moment of quiet \n*if dyfrig_ally=false\n\t\"Art!\" ${Gawain} at the entrance. \"By the gods!\" $!{He} scrambles over the barricade and is outside; you've barely time to wonder why before ${he}'s climbing back up, dragging a body with ${him}. One of ${Dyfrig}'s ${men}, bloodied, armor torn. Hauling ${him} up is ${Dyfrig} ${himself}.\n\t\n\tWhen you've managed to get them all back in to the temple, you realize that ${Dyfrig}'s force has been reduced to four ${men} where once there were a dozen.\n\t\n\tA moment of numbed silence \nis shattered as something smashes into the side of the building; tiles clatter on to the floor and you hear a scrabbling across the roof.\n\n*choice\n\t#\"Run!\"\n\t\t*set acclaim %-10\n\t\tYou make a break for the back of the chamber as more roof-tiles land, waving the others back, retreating to where the roof is more solid.\n\t\t*if (chapter8_villagers_escaped = false)\n\t\t\tYou hear panicked cries from the villagers.\n\t\t\n\t\tSomething lands on the floor in front of the barrier and uncoils itself—a dark shadow with gleaming eyes. It chuckles and walks slowly forward.\n\t\t\n\t\tThen there's a splintering of wood and ceramic above you.\n\t\t*goto part5_cynric\n\t\t\n\t#\"Come on, you ${insult_bastards}!\"\n\t\t*set bravado %+10\n\t\t\"Move! Move!\" screams ${Gawain}, and then something falls down amongst you and it's chaos; you get a flash of tattoos, blood, and a line of pain drawn across your shoulder, blindingly painful. You throw yourself backwards. ${Dyfrig} is there immediately, and you hear ${Morgan}'s bow sing.\n\t\t*goto part5_cynric\n\t\t\n\t#Remain silent and listen for other sounds.\n\t\t*set bravado %-10\n\t\tYou hold your finger to your lips, silencing the others, and you wait, sword poised to strike.\n\t\t\n\t\tMore tiles scatter above you, and when something falls down amongst you you are ready for it; you leap forward, slashing across a tattooed torso with your sword. ${Gawain}'s charge drives it backwards into the barricade. It screams in anger and rears up—you hear ${Morgan}'s bow sing. An arrow sprouts from its shoulder.\n\t\t*goto part5_cynric\n\n*label part5_cynric\nAnother shape drops from the ceiling; ${Gawain} chops down with ${his} sword but it rolls, ducks, and slaps one of ${Dyfrig}'s ${men} aside; you hear a sickening crack.\n\nAnd then it's standing in front of you. ${Cynric}, head down, eyes jet-black, chest heaving and slick with sweat and blood, hands open.\n\nHands [i]clawed[/i]. Gleaming talons half a finger in length.\n\n*page_break\n\nYou bring up your shield just in time; ${his} blow takes part of it, shredding through hide and wood. You slash out with your sword; it slices through the flesh of ${his} forearm, drawing blood. $!{His} smile is vicious as ${he} throws ${himself} at you. Your sword cuts deep into ${his} ribcage and wedges there; claws rake down your arm, splitting your vambrace. $!{He} drops and rolls to ${his} feet and the sword's wrenched from your hands.\n\n$!{He} stands swaying slightly, surprised, looking down at the blade embedded in ${his} side. One of ${Dyfrig}'s ${men} takes the chance to aim a spear-blow at ${Cynric}'s chest. ${Cynric} seizes the haft, drags the ${man} up close, head-butts ${him} and then hurls ${him} against a wall.\n\nThen ${Cynric} reaches down and rips the sword free. Blood gushes. $!{He} drives the blade through ${his} attacker's chest with unnatural force. Metal shatters bone and there's a horrific crack. The stone wall splits.\n\nThe body slides to the floor, leaving a trail of gore. And your sword, ${Uther}'s sword, the sword said to have belonged to ${Maximus} the Great, falls to the ground in two pieces.\n*set chapter8_sword_broken true\n\n${Gawain} pulls you out of the way, standing in front of you. One of ${Dyfrig}'s ${men} pushes a spear into your hand. Your head spins; all you can really see is the flash of steel and splatter of blood.\n\n${Morgan} grabs your shoulder. \"This is chaos. We need to do something, ${Arthur}, or we'll be slaughtered.\"\n\n\"I might have an idea,\" shouts ${Emrys}, \"If you can keep them busy! But it's risky!\"\n\n*choice\n\t#\"Do it, ${Emrys}; we'll hold them off as long as we can!\"\n\t\t*set rel_emrys %+10\n\t\t*goto part5_trick\n\n\t*if (chapter8_villagers_escaped = true)  #I pull everyone together, ${Dyfrig}'s followers and mine, and go into a full attack, concentrating on driving the Saxons out.\n\t\t*set warrior %+15\n\t\t*set diplomat %-15\n\t\t*goto part5_attack\n\t\t\n\t*if (chapter8_villagers_escaped = false)  #I pull everyone together, ${Dyfrig}'s followers, the villagers, and my friends, and go into a full attack, concentrating on driving the Saxons out.\n\t\t*set warrior %+15\n\t\t*set diplomat %-15\n\t\t*goto part5_attack\n\n\t#I'll challenge ${Cynric} to settle this one-on-one.\n\t\t*set leader %+15\n\t\t*set diplomat %-15\n\t\t*goto part5_duel\n\n*comment --------------------------------------------------------------\n\n*label part5_trick\n${Emrys} pushes up next to you. \"Hold them there,\" ${he} says. \"Then drop back when I say.\"\n\nNow you've got space to breathe you can see that there are three of them, ${Cynric} and the two you saw outside in the darkness.\n\n\"Keep them busy,\" you snap at ${Gawain} and ${Dyfrig}. \"Defend, don't attack.\"\n*if (leader>60) \n\t*set acclaim %+20\n\t*set dyfrig_saw_angel true\n\t*set chapter8_defeated_cynric true\n\tYou get a nod from each to show that they understand. \n\t*if dyfrigs_men_count\u003c2\n\t\tOnly two of ${Dyfrig}'s ${men} remain; they \n\t*if dyfrigs_men_count>=2\n\t\t${Dyfrig}'s remaining ${men} \n\tlock shields with you, ${Gawain} and ${Dyfrig} to keep the Saxons back. \n\t*if (chapter8_villagers_escaped=false)\n\t\tSome of the remaining villagers have armed themselves with stones to throw into the fray.\n\t\n\tThere's only a moment's respite before they attack again; the ${woman} tears away ${Dyfrig}'s shield. ${Gawain} kicks ${her_him} in the thigh, driving ${her_him} backwards, and then you are concentrating hard, blocking blows aimed at your companions, letting them slide off the spear's haft, abandoning attack in a furious attempt to stop the Saxons getting a blow through. Your arms burn and sweat drips into your eyes; you know that you can't keep this up for long.\n\t\n\tThen, as you slip on slick blood and ${Morgan} steadies you, you hear ${Emrys} hiss \"Now!\"\n\t\n\t*page_break\n\t\n\t\"Back,\" you tell the others, and the line falls back, step by step, until you stand next to the altar. A Saxon claws one of the soldiers to the floor—${Gawain} drags ${him} back behind ${his} shield.\n\t\n\t\"Hold!\" A terrible voice erupts from nowhere with a great rushing roar and a light flares up; a gout of flame, intense, white. It comes from the altar. As your eyes adjust, you see a shimmering form floating above it—a figure of white fire, twisting and writhing. A robed man? A woman in a flowing dress, arms outstretched? It shifts and changes as you watch.\n\t\n\tYou realize the room has fallen silent.\n\t\n\t\"Sanctus, Sanctus, Sanctus, Dominus Deus exercituum,\" the figure intones, voice sonorous and echoing. \"Plena es terra gloria tua: Gloria Patri, Gloria Filio, Gloria Spiritui Sancto.\"\n\t*if old_faith\u003c50\n\t\tA prayer to God, one which you've heard many times.\n\t*if old_faith>=50\n\t\tA prayer to the Christian god.\n\t${Dyfrig}'s face is white.\n\t\n\t${Cynric} stands slowly, one hand shading ${his} eyes, seeming diminished in the light. $!{He} says something in the Saxon tongue; you don't understand it, but ${his} manner is arrogant, swaggering. Yet you detect an undercurrent of fear.\n\t\n\tThe figure shakes, roars words in Saxon that you don't understand and then the altar explodes with light.\n\t\n\tThen darkness falls. When your eyes finally adjust, you see that ${Cynric} and ${his} companions have fled.\n\t\n\t${Dyfrig} is face-down on the floor, muttering in Latin prayer. $!{His} remaining followers are doing likewise.\n\t*if (chapter8_villagers_escaped=false)\n\t\tThe villagers are cowering at the back of the temple.\n\t\n\t${Emrys} emerges from behind the altar looking terribly pleased with ${himself}.\n\t\n\t\"That was you?\" whispers ${Morgan}.\n\t\n\t${Emrys} puts ${his} hands together with a pious expression. \"On the contrary, it was an act of God,\" ${he} says.\n\t\n\t${Morgan} snorts.\n\t\n\t\"All right,\" says ${Emrys}. \"An act of the Roman priests who designed this place. A speaking tube, an oil feed and some bellows. A practical religion, I think you'll agree.\"\n\t\n\tYou looks down at ${Dyfrig}. \"Should we tell ${him}, do you think?\"\n\t\n\t\"Not just yet,\" says ${Morgan}.\n\t\n*if (leader\u003c=60)\n\t*set dyfrig_alive false\n\t*set dyfrigs_men_count -1\n\tYou get a nod from ${Gawain} to show that ${he} understands. You try to pull together with ${Dyfrig}'s remaining ${men}, but ${Dyfrig} ${himself} keeps pushing forward, leaving ${his} flanks open, dragging you all forward.\n\t*if (chapter8_villagers_escaped=false)\n\t\t*set villagers_count -2\n\t\tRocks fly over your head and into the foe, distracting them, knocking them sideways—the villagers taking any opportunity they can to help—but it doesn't stop them for long.\n\t\n\t${Gawain}, out of breath, blood running from a cut in ${his} scalp, grabs your arm. \"We can't hold this, Art,\" ${he} says. \"We need to get out.\"\n\t\n\tYou look over your shoulder for ${Emrys}, but there's no sign. At that moment you're thrust backwards as the Saxon ${man} splinters ${Dyfrig}'s shield and rams ${his} hand into the Christian's throat. ${Dyfrig} falls.\n\t\n\t\"Back!\" you shout. \"The back door.\"\n\t\n\tSuddenly it's a crush of bodies as you're being pressed towards the way out.\n\t*if (chapter8_villagers_escaped=false)\n\t\tVillagers scatter, several falling to ${Cynric}'s rage. \n\tMore of ${Dyfrig}'s ${men} fall. ${Morgan}, long out of arrows, is by your side, knife in hand. ${Emrys}, panicked, crawls out from behind the altar and opens the door. ${Gawain} roars, heaving one of ${Cynric}'s companions into the other two and then there's nothing you can do but get outside. ${Gawain} tumbles stones down across the door.\n\t\n\tYou escape into the night. You try and keep everyone together, but it's a tattered, broken group.\n\t\n*goto part6\n\t\n*comment --------------------------------------------------------------\n\n*label part5_attack\n\nNow you've got space to breathe you can see that there are three of them, ${Cynric} and the two you saw outside in the darkness.\n\n\"Together,\" you shout to ${Gawain} and ${Dyfrig}. \"We can do this!\"\n\n*if (warrior>55)\n\t*set acclaim %+15\n\t*set dyfrigs_men_count -1\n\t*set chapter8_defeated_cynric true\n\tYou knit shields together with ${Dyfrig} and ${his} ${men} and drive forwards, using sheer weight, fighting as if you're a Roman shield wall. \n\t*if (chapter8_villagers_escaped=false)\n\t\tThe remaining villagers press in behind you, choosing opportune moments to hurl rocks at the Saxons.\n\t${Morgan}'s bow sings and ${Cynric}'s chest sprouts an arrow, but it just seems to enrage ${him}. Shields are torn apart. Blood flows. One, two of ${Dyfrig}'s soldiers fall. ${Gawain}'s axe cuts deep into the Saxon ${woman}'s neck, and ${she} shrieks, blood spraying down ${her_his} front. $!{Her_his} companion goes into a frenzy, shredding the vambrace on ${Gawain}'s right arm; you spear ${him} in the side and ${he} slips backwards in a pool of blood.\n\t\n\tThen there's no room for them to move. ${Cynric} throws ${himself} at the row of shields, trying to push you back, but your shoulders are set and your legs braced.\n\t\n\t${Cynric} draws the Saxons back, clambering up on top of the barricade. $!{He} raises an arm to point straight at you. \"You, Briton,\" ${he} growls. \"You.\"\n\t\n\tAnd then ${he}'s disappeared back into the darkness, ${his} companions with ${him}.\n\t\n*if (warrior\u003c=55)\n\t*set dyfrigs_men_count -2\n\t*set dyfrig_alive false\n\tYou try to pull together with ${Dyfrig} and ${his} ${men} to drive the Saxons back but your attacks are piecemeal and broken; you and your companions are tiring fast.\n\t*if (chapter8_villagers_escaped=false)\n\t\t*set villagers_count -3\n\t\tA slip by ${Gawain} and one of the villagers is caught by the Saxon ${woman}. $!{She} makes short work of ${him}, tearing ${him} open from throat to groin. ${Gawain} shouts in rage and cuts into ${her_him}, driving ${her_him} back.\n\t${Morgan} uses ${her_his} last arrow, burying it in ${Cynric}'s chest, but it only seems to enrage ${him}.\n\t\n\t${Gawain}, out of breath, blood running from a cut in ${his} scalp, grabs your arm. \"We can't hold this, Art,\" ${he} says. \"We need to get out.\"\n\t\n\tAt that moment ${Cynric} splinters ${Dyfrig}'s shield and rams ${his} hand into the Christian's throat. ${Dyfrig} falls.\n\t\n\t\"Back!\" you shout. \"The back door.\"\n\t\n\tAnd then it's a crush of bodies as you're being pressed towards the way out.\n\t*if (chapter8_villagers_escaped=false)\n\t\tVillagers scatter, several falling to ${Cynric}'s rage. \n\tMore of ${Dyfrig}'s ${men} fall. ${Morgan}, long out of arrows, is by your side, knife in hand. ${Emrys}, panicked, crawls out from behind the altar and opens the door. ${Gawain} roars, heaving one of ${Cynric}'s companions into the other two and then there's nothing you can do but get outside. ${Gawain} tumbles stones down across the door.\n\t\n\tYou escape into the night. You try and keep everyone together, but it's a tattered, broken group.\n\n*goto part6\n\n*comment --------------------------------------------------------------\n\n*label part5_duel\n*set chapter8_cynric_duel true\n*set track_champion +1\nNow you've got space to breathe you can see that there are three of them, ${Cynric} and the two you saw outside in the darkness.\n\nYou straighten up, and raise your hand, pointing it at ${Cynric}'s chest. \"You,\" you say. \"Just you. Let's settle this. Let the others go.\"\n\n$!{Cynric} laughs in apparent delight, and rolls ${his} head around, loosening ${his} shoulder muscles.\n\n*if chapter8_sword_broken\n\t\"A sword—someone lend me a sword,\" you say. One of ${Dyfrig}'s ${men} does so; you pass ${him} back the spear.\n\n*gosub_scene startup get_lover\n*if interest=\"morgan\"\n\t\"This is stupid, Art,\" murmurs ${Morgan}.\n\t\n*if interest=\"gawain\"\n\t\"Careful, Art,\" murmurs ${Gawain}.\n\t\n*if interest=\"emrys\"\n\t\"Beware, ${Arthur},\" murmurs ${Emrys}. \"$!{He} won't hold to any promise.\"\n\nThe other two Saxons stand part in shadow, moving, always moving, pacing, watching. ${Cynric} walks into the open space in front of you, confident, movements liquid. $!{He} waits for you to take a tentative step forward; then even before you've raised your shield ${he}'s upon you.\n\n*if chapter5_duel\n\t$!{He}'s fast, even faster than ${he} was the last time you fought ${him}, \n*if chapter5_duel=false\n\tYou've never fought anyone like this. $!{He}'s fast, beyond fast, \nswipes and punches coming from impossible angles. You duck; claws sprout through your shield and then rip a portion of it away. You throw yourself sideways and stab, but the target isn't there, and a claw draws a line of blood across your arm. Again, you narrowly miss and ${he} pinks you. And once more, this time sending a spray of blood from your scalp across your eyes—you dash it away.\n\t\n$!{He}'s playing with you.\n\t\n*choice\n\t#I'll trick ${him}—I'll use a feint to gain the advantage.\n\t\t*goto part5_duel_trick\n\t\t\n\t#I'll use the building around me to my advantage.\n\t\t*goto part5_duel_masonry\n\t\t\n\t#I'll fall back on my training and just fight ${him} as best I can.\n\t\t*goto part5_duel_straight\n\t\n*comment --------------------------------------------------------------\n*label part5_duel_trick\nYou let ${him} think ${he}'s rattled you, which is true enough, and play things just a little slower, a little more tired than the truth. You have a slash across your abdomen for your trouble, tearing your mail; the claws are wickedly sharp. Then you fake a slip in a pool of blood and your foot goes out under you. You cry out and drop to one knee. There's a gasp from the watchers as you fall.\n\n*if (bravado\u003c=40)\n\t*set acclaim %+20\n\t*set chapter8_defeated_cynric true\n\t*set chapter8_arthur_wounded true\n\t${Cynric} launches ${himself} towards you.\n\t\n\tYou pivot on your 'wounded' leg and kick out; ${Cynric}'s own momentum carries ${him} full into it and your heel hammers into ${his} chin. Then you crack the rim of your shield across ${his} temple. For a moment ${he} lies there stunned.\n\t\n\tYou fall on ${him}, using your whole bodyweight to force your blade down. $!{He} twists, but it still slides home between ${his} shoulder and ${his} collarbone. $!{He} screams in rage.\n\t\n\tYou lean on the sword, trying to widen the wound, but ${he} sinks claws into your chest and you have to pull away. $!{He} staggers upright and gasps Saxon words to ${his} companions, the wound welling up in blood.\n\t\n\tThe Saxon ${woman} steps forward in front of ${him} protectively. ${Cynric} glowers at you.\n\t\n\tYour companions move closer.\n\t\n\t${Cynric} mutters a curse, and steps backward. The three figures clamber over the barricade and are gone.\n\t*goto part6\n\t\n*else\n\t*set acclaim %-10\n\t$!{He} reads the trick and gives a harsh laugh, taking a step back and waiting for you to recover yourself. Then ${he} launches ${himself} at you.\n\t\n\t*goto part5_duel_rescue\n\n*comment --------------------------------------------------------------\n*label part5_duel_masonry\nYou endure several passes from ${him}, as you try and let your thoughts settle a little, as you try and size up the space around you. It's not easy; you slide away from blows, catch them on your shield when you can, but ${he}'s brutally strong. But then you see it—a supporting pillar weakened by time and decay. And when ${Cynric} overextends, just slightly, giving you a small space to breathe, you turn and hammer both sword and shield into the base of the pillar.\n\n*if (bravado>60)\n\t*set acclaim %+20\n\t*set chapter8_defeated_cynric true\n\tThere's a loud cracking and stones plummet. One catches ${Cynric} high on the temple and ${he}'s knocked sprawling. You flatten yourself against the wall. \"Back! Back!\" ${Gawain} hefts ${his} shield over ${his} head, pushing ${Emrys} and ${Morgan} back towards the exit.\n\t\n\tThe ceiling groans, wood snaps, and tiles start to rain down. One of ${Cynric}'s companions leaps forward, but ${Gawain} charges at ${her_him}, knocking ${her_him} into the path of a falling beam. $!{She} goes down under a pile of rubble.\n\t\n\tAs you and your companions retreat towards the back of the temple, you hear roaring curses in Saxon from the collapsing room. You've slowed them, at least for now, but you're certain they're not dead.\n\t*goto part6\n\t\n*else\n\t*set acclaim %-10\n\tNothing happens.\n\t\n\t$!{Cynric} laughs. You turn, and in the fraction of a second before your guard is up ${he} launches ${himself} at you.\n\t\n\t*goto part5_duel_rescue\n\t\n*comment --------------------------------------------------------------\n*label part5_duel_straight\n\nYou set your shield and lower your swordpoint and fall back into the rhythms ${Ector} taught you and ${Cai}. You concentrate on defense; side-step here, let the attacker slide off your shield there, turn and set shield again; deflect, block, step, turn, set, all the while looking for those moments where you can launch a blow; a cut to the forearm here, a slash on the belly there.\n\n*if (warrior>55)\n\t*set acclaim %+20\n\t*set chapter8_defeated_cynric true\n\tIt serves to anger ${him}, as if you were a fly stinging, again and again. One of your luckier blows has blood dripping down into ${his} left eye. Another catches the knuckles of a warped, distorted hand. Sweat must be working its way into those small irritations, itching, stinging…\n\t\n\t$!{He} roars and leaps at you, but you've read it and slip out of the way. $!{He} does it again, hammering blows towards your face, but you duck, block, and turn and slip your blade between ${his} ribs from behind. $!{He} falls forward with a groan and rolls back to ${his} feet.\n\t\n\tWhatever ${he} is—unnaturally fast, unnaturally strong—${he} is not immortal.\n\t\n\tBut neither are you. You are tiring, and tiring fast.\n\t\n\tYou resolve to use the next mistake ${he} makes. It's simple enough; provoked, ${he} unleashes too strong a blow towards your arm. You sidestep—the claws only brush you, but they tangle in the rings of your chain shirt. You ram your blade through the bones of ${his} arm; it sticks, and ${he} shrieks.\n\t\n\t$!{He} staggers backwards and gasps Saxon words to ${his} companions, the wound welling up in blood.\n\t\n\tThe Saxon ${woman} steps forward in front of ${him} protectively. ${Cynric} glowers at you.\n\t\n\tYour companions move closer.\n\t\n\t${Cynric} mutters a curse, and steps backward. The three figures clamber over the barricade and are gone.\n\t*goto part6\n\t\n*else\n\t*set acclaim %-10\n\tIt's not enough. You're tiring, and ${he}'s not. The wounds you inflict ${he} doesn't seem to notice. There's a moment, just a moment, where you think you have ${him}—your blade slides between two ribs. $!{He} grabs it, hammers ${his} elbow into your face, and then kicks you to the floor.\n\t\n\t*goto part5_duel_rescue\n\t\n*comment --------------------------------------------------------------\n*label part5_duel_rescue\n*set dyfrig_alive false\n*set dyfrigs_men_count -1\n*set chapter8_arthur_wounded true\nThe impact is staggering. $!{He} shreds your shield; you throw aside the remnants and block ${his} slashes with the sword—once, twice. Then ${he} catches you high on the arm; blood spills and your sword spins away. $!{He} punches the other fist into your chest; claws sink deep.\n\t\nThen ${Gawain}'s shield hammers into ${Cynric}'s face. The Saxon staggers backwards and falls.\n\n\"Sorry, Art,\" says ${Gawain}. \"Not today.\"\n\n${Cynric} picks ${himself} up, howls, and the three Saxons attack. \"Back,\" shouts ${Morgan}. \"We need to get out—the back door!\"\n\nAt that moment ${Cynric} splinters ${Dyfrig}'s shield and rams ${his} hand into the Christian's throat. ${Dyfrig} falls. \"Come on,\" shouts ${Emrys}.\n\nAnd then it's a crush of bodies as you're being pressed towards the way out.\n*if (chapter8_villagers_escaped=false)\n\t*set villagers_count -2\n\tVillagers scatter, several falling to ${Cynric}'s rage. \nMore of ${Dyfrig}'s ${men} fall. ${Morgan}, long out of arrows, is by your side, knife in hand. ${Emrys} holds the door open. ${Gawain} roars, heaving one of ${Cynric}'s companions into the other two and then there's nothing you can do but get outside. ${Gawain} tumbles stones down across the door.\n\nYou escape into the night, staggering, ${Gawain} helping you along. ${Emrys} and ${Morgan} try to keep everyone together, but it's a tattered, broken group.\n\n*goto part6\n\n*comment --------------------------------------------------------------\n*comment                   Part 6: The End\n*comment --------------------------------------------------------------\n*label part6\n*page_break\n\n*if chapter8_defeated_cynric\n\tEven with the Saxons driven off, you don't feel safe in the village, and there are many wounds that need attention. You decide to make a break for it while you have the chance.\nIn the grey dawn, you reach ${dest}, a small settlement of woodcutters in the next valley. \n*if villagers_fled\n\t*achieve save_villagers\n\tThere you're greeted by ${cfather} ${Rhodri} and the rest of the survivors from the village; none were lost to the woods and the dark.\n*if villagers_fled = false\n\t*if villagers_count=4\n\t\t*achieve save_villagers\n\t\tThe people make the villagers welcome; you've rescued nearly two score people.\n\t*if (villagers_count>1) and (villagers_count\u003c4)\n\t\tThe people make the villagers welcome; they are shaken, several are wounded, and you know some lie dead back in their village, but it could have been so much worse.\n\t*if villagers_count=1\n\t\tThe people make the few surviving villagers welcome; they are pale and shaken, and several are wounded. You can't help but think of how many now lie dead in the village.\n\t*if villagers_count\u003c1\n\t\tThey listen to your news in horror. A whole village slaughtered. \n*if dyfrigs_men_count>1\n\tThe $!{Brother}s of Christ are battered, but a full eight of the dozen still stand.\n*if dyfrigs_men_count=1\n\tFour of the $!{Brother}s of Christ still stand, all bearing wounds. If nothing else, these ${men} are brave.\n*if dyfrigs_men_count\u003c1\n\tNone of ${Dyfrig}'s ${men} escaped the Saxons.\n*if Dyfrig_alive\n\t*if dyfrig_saw_angel\n\t\t*set allies +1\n\t\t*set chapter8_dyfrig_ally true\n\t\t\n\t\tAs for ${Dyfrig} ${himself}…${he} comes to you where you sit with ${Emrys} stitching your wounds, and ${he} kneels in front of you and takes your hand. \"I humbly beg your pardon,\" ${he} says. \"I thought that you were ungodly folk. But your cause is more than just. Those creatures must surely have been demons. And who else has an angel who fights by their side?\"\n\t\t\n\t\t${Emrys} frantically stifles a cough.\n\t\t\n\t\t\"Your cause has my sword,\" continues ${Dyfrig}, \"and any others who I can bring to it. You have shown me the way.\"\n\t\t\n\t*if dyfrig_saw_angel=false\n\t\n\t\tAs for ${Dyfrig} ${himself}, ${he} is wounded, but still stands. $!{He} spends much time in prayer. \"Those were demons,\" ${he} informs you at last. \"There is no question of it. I will seek them out, and I will destroy them. My eyes are opened.\"\n\t\t\n\t*if chapter8_boy_killed\n\t\t\"You have no welcome amongst us,\" says ${Morgan}, taut with rage. \"You killed an innocent ${boy}.\"\n\t\t\n\t\t\"I did but the Lord's—\"\n\t\t\n\t\t\"Get out,\" says ${Gawain}. \"Or I'll gut you where you stand.\"\n\t\n\t*if chapter8_boy_killed=false\n\t\t\"You have no welcome among us,\" says ${Morgan}. \"If not for us you'd have killed an innocent ${boy}.\"\n\t\t\n\t\t\"I did but the Lord's—\"\n\t\t\n\t\t\"You have no power to dispense justice in this land,\" you tell ${him}. \"If I hear of your hand raised against any Briton again, I'll remove it. If you kill any Briton, I'll have your head. Now go.\"\n\t\t\n*if dyfrig_alive = false\n\tAnd ${Dyfrig} ${himself} fell in the temple.\n*page_break\n*if chapter8_dyfrig_ally\n\t*achieve support_dyfrig\nLater, you sit with the others in front of the fire.\n*if chapter8_arthur_wounded\n\tEverything hurts; when you draw a breath you can still feel ${Cynric}'s claws in you. \"It will take time,\" says ${Emrys}. \"First we must make sure there is no fever; and then the flesh must have time to knit. No more duels with the ${son}s of ${Cerdic}, yes?\"\n\t\n*if chapter8_arthur_wounded=false\n\tYou ache all over from bruises, and your flesh is ripped and torn; your companions bear similar scars.\n\n\"What [i]is[/i] ${he}?\" you ask your friends. \"What are they?\"\n\n\"I must speak with my ${mother},\" says ${Morgan}.\n\n\"There are old, old stories even among our own folk of workers of magic who can turn themselves or others into beasts,\" says ${Emrys}. \"And in the Saxon lands, there are tales of something called a skin-changer. A shifter. One who can walk in the form of a beast. As for myself… I wonder if perhaps ${Dyfrig} was not wrong to call them demons.\"\n\n\"Is ${Cynric} not a ${man}?\"\n\n\"Perhaps not. Or perhaps not any more.\"\n\n\"We can't fight them, not like this. You saw what happened. ${Uther}'s sword broken.\"\n\n\"They can't all be like this,\" says ${Gawain}. \"And ${he} wasn't like this when we fought them before winter.\"\n\n\"I think ${Cynric} has found some Saxon magic,\" says ${Emrys}.\n\n\"We need to find a way to fight against it.\" You wince as your stitches pull.\n\n\"Excuse me, ${lord}.\" It's ${hall_owner}, the owner of the hall.\n\n\"Yes?\"\n\n\"We have another here…a ${man}. A traveler who found ${his} way here last night. I think perhaps you might know ${him}?\"\n\n\"Where is ${he}?\"\n\n\"$!{He} is abed. $!{He}…drank somewhat yestereve. I can't wake ${him}.\"\n\nWhen ${hall_owner} leads you to the barn, there you find a ${man} sprawled across a makeshift cot, one boot off, an empty flask lying amongst the blankets. It's ${Cai}.\n\n${Gawain} rolls ${his} eyes. \"This one's nothing to do with us.\"\n*finish", "chapter9": "*comment ==============================================================\n*comment                Chapter 9: The White Stag\n*comment ==============================================================\n\n*comment --------------------------------------------------------------\n*comment                        Introduction\n*comment --------------------------------------------------------------\n*label intro\n\n*image chap9.png center Chapter Nine: The White Stag\n\n*comment --------------------------------------------------------------\n*comment                   Part 1: The Hunt\n*comment --------------------------------------------------------------\n*label part1\n\nThe story you bring back from the Eastern valleys can't be ignored. At the urging of both ${Morgan} and ${Emrys}, you discuss it only with the $!{King}, with ${Bedwyr}, and with ${Blaise}—spreading word of ${Cynric}'s wolves will only sow panic. Nonetheless, the story will spread. \n*if chapter8_sword_broken\n\t${Uther} is particularly angry and distressed to hear of the broken sword; ${he} insists that the matter must be kept quiet, or folk will lose heart.\n\t\n${Cai} believes none of it, of course; ${he} insists that all four of you must have been mistaken. ${Morgan} travels north to Ynys Mon to talk with ${her_his} ${mother} on the matter; you, ${Bedwyr}, and ${Gawain} raise ${men} for patrols.\n\n*gosub_scene startup get_lover\n\n*if interest=\"gawain\"\n\tAs a result, you spend precious little time with ${Gawain}; \n*if interest=\"emrys\"\n\tYou catch pensive looks from ${Emrys} when ${he} thinks you're not looking, as if ${he}'s studying your face, but you're so busy that you never find the time to talk to ${him} about it; \n*if interest=\"morgan\"\n\tYou spend precious little time at the hall yourself; \nyou're often out in the hills and valleys of Gwynedd with a handful of warriors, patrolling, listening for rumors of wolves. Despite the snows, you're now less than certain that the Saxons will wait until spring.\n\n*page_break\nLate on a grey morning, you're sitting with ${Cai} outside cleaning the rust from your mail when ${Bedwyr} storms in, thunder on ${his} face, throwing ${his} longbow down into the dirt so hard you worry the limbs will snap. $!{His} small warband follow ${him} in, subdued, watching their leader warily. There's no sign that they've been in a fight, no blood or bruises.\n\n\"What's got into ${him}?\" asks ${Cai}. \"$!{He} looks like ${his} lover ran off with ${his} favorite sheep.\"\n\n\"$!{He} was hunting,\" says a quiet voice. \"$!{He} lost ${his} prey.\" You look around; it's ${Morgan}, cloaked and hooded in the dark robes of the Isle. $!{She} puts down ${her_his} bow and settles down to join you, hugging ${her_his} knees. \"A stag, a white stag.\"\n\n\"Again? $!{He} was on about one yesterday—same one, I guess?\"\n\n\"$!{He} shot at it yesterday and hit it square on, or so ${he} says. And now the same thing today—swears ${he} saw the shaft go straight into its flank. Saw it fall. But then, nothing…\" $!{She} shrugs. \"$!{He}'ll be out after it again tomorrow, no doubt. Hello, by the way.\" \n*if ( chapter2_morgan_pregnant )\n\t$!{She} doesn't look at you.\n*if (chapter2_morgan_pregnant=false)\n\t$!{She} looks tired.\n\t\n\"Hello yourself,\" says ${Cai}. \"What did your ${mother} say, then? About ${Cynric}? Did ${she} believe you?\"\n\n$!{She} ignores the question. \"I think we should go with ${him}.\"\n\n\"What? Go with who?\" asks ${Cai}.\n\n\"I think we should all go with ${Bedwyr}. We should help ${him} hunt the stag.\"\n\n\"Why?\"\n\n$!{She} shrugs again. \"Just a feeling. I've got work to do—I'll see you later.\"\n\n$!{She} gets up, collects ${her_his} bow, and walks away towards the Long Hall. ${Cai} looks at you in surprise. \"Well, what on earth's got into ${her_him}?\n*if (romance_morgan)\n\tHave you two fallen out?\"\n*if (romance_morgan=false)\n\tThink ${her_his} ${mother}'s given ${her_him} a scolding for something?\"\n\n*fake_choice\t\n\t#\"If I were to guess, I'd say ${her_his} ${mother} told ${her_him} something about ${Cynric} and ${his} wolves that we really don't want to hear.\"\n\t\t${Cai} grimaces. \"More than likely. I'd rather hear it, though, than not.\"\n\t\n\t*if (rel_morgan>=40)\n\t\t#\"I really don't know. Maybe when this work is done, whatever it is, ${she}'ll be more in a mood to talk.\"\n\t\t\t${Cai} nods. \"Some task for ${her_his} ${mother}, I guess.\"\n\t\n\t*if (rel_morgan\u003c40)\n\t\t#\"In all honesty, ${Cai}, I don't know what ${she}'s thinking. We don't get on very well these days.\"\n\t\t\t\"Oh. Right. Sorry. That's a shame.\"\n\t\t\n\t#\"$!{She}'s probably just tired. It must have been a long journey.\"\n\t\t\"I suppose so. Seems like a bit more than that, though.\"\n\nThe next morning it's grey again—worse, in fact, for the mist has come down on to the hills. \n*if (chapter2_pregnant)\n\tYou're not feeling your best this morning; the ale again last night. It might be time to give up drinking with ${Cai} of an evening—it's exhausting.\n\n${Morgan} is right. ${Bedwyr} is up early and berating ${his} companions to be out to look for the stag. When ${he} discovers that you want to join the hunting party ${he}'s displeased to say the least; ${he} shakes you off brusquely and heads out before you can collect your gear. \n\n${Cai} shrugs. \"We could go out and see what we can find; think of ${his} face if we catch the beast before ${him}!\"\n\n\"Provoking ${Bedwyr} is not the wisest course, ${ap} ${Ector},\" says ${Emrys}. \"At least, not more than we already have.\"\n\n\"We should go,\" says ${Morgan}, decisively.\n\n${Gawain} looks at ${her_him} surprised, then shrugs and shoulders ${his} pack. ${Cai} breaks into a broad smile. \"Come on, then, $!{brother}! Let's go hunting!\"\n*comment --------------------------------------------------------------\n*label part1_stag\n*page_break\nAn hour later and ${Cai}'s regretting ${his} decision. The mist has thickened into fog and followed you down the valley. \"I hope you know where we are,\" ${he} says. \"We've little chance of seeing each other, let alone any quarry.\"\n\nAs ${he} says it, a breeze springs up and the fog parts for a moment. Ahead you catch a glimpse of white, and then there it is: a stag, crowned with nine-point antlers, tall and broad-chested, pale-eyed with snow white hide.\n\n\"Look at it!\" whispers ${Cai} in awe.\n\nAnd then you see the figure rising from the bracken: a dark figure, bow bent in readiness. ${Bedwyr}.\n\n\"No!\" ${Morgan}'s shout comes from beside you. The stag bolts. ${Bedwyr}'s bow sings, but the arrow skitters into grey stone.\n\n${Bedwyr}'s face is purple as ${he} turns to your party. \n*if gender=\"male\"\n\t\"What have you done, witch?\n*if gender=\"female\"\n\t\"What you have you done, you sorry excuse for a priest?\nI should have your skin!\"\n\n${Morgan} strides forward without hesitation; ${she} throws up ${her_his} arm. \"Look,\" ${she} says, pointing.\n\n${Bedwyr} turns. Amongst a grove of trees, ahead, is the stag, looking back towards you.\n\n\"Sometimes a hunt is not about a kill,\" says ${Morgan}. \"We should follow it.\"\n\n\"What mockery is this?\"\n\n*choice\n\t#\"I think we should follow. Unless you're afraid to, ${Bedwyr}?\"\n\t\t${Bedwyr} gives you a hard look. The stag chooses that moment to start walking off up the valley.\n\t\t\n\t\t${Morgan} follows.\n\n\t\t\"Come on, ${Arthur},\" says ${Emrys},\n\t\t*if romance_emrys\n\t\t\tlaying ${his} hand on your arm.\n\t\t*if (romance_emrys=false)\n\t\t\tas certain as you've ever heard ${him}.\n\t\t\t\n\t\tYou head off. After a moment's hesitation, ${Bedwyr} joins you.\n\t\t*goto part1_lady\n\t\t\n\t#\"You know something more about this, ${Morgan}. Will you tell us?\"\n\t\t$!{She} grimaces. \"I don't know much—only guesses. But I have heard stories of a white stag. Some say it's the stag that appeared to Pwyll. It's said it will lead you to your fate.\"\n\t\t\n\t\t\"To your fate?\" asks ${Cai}. \"What, to death, you mean?\"\n\t\t\n\t\t\"Death is only one of many fates,\" says ${Morgan}. \"I suppose I mean that it leads people to a turning point in their lives.\"\n\t\t\n\t\t\"So something important for ${Bedwyr}, then?\"\n\t\t\n\t\t\"We can all see the stag,\" says ${Emrys}.\n\t\t\n\t\t${Cai}, looking nervous, makes the sign of the cross.\n\t\t\n\t\t${Bedwyr} slings ${his} bow over ${his} shoulder. \"Very well,\" ${he} says. \"If this is leading me to my fate, then so be it. I don't need your help.\" The stag chooses that moment to start walking off up the valley.\n\t\t\n\t\t\"We can all see the stag,\" repeats ${Morgan}. \"We're all coming with you.\"\n\t\t*goto part1_lady\n\n\t#\"This feels like we're walking into a trap.\"\n\t\t\"If it is, it's not the doing of the Saxons,\" says ${Emrys}.\n\t\t\n\t\t\"No, ${Arthur},\" says ${Morgan}. \"It's not a trap. But I'm not sure exactly what it is.\" The stag chooses that moment to start walking off up the valley. \"It may lead us into danger; it may lead us to aid. Or both. But this is a message from the Old Ones. Trust me?\"\n\t\t\n\t\t${Emrys} catches your eye, and nods.\n\t\t\n\t\t\"Very well,\" says ${Bedwyr}. \"Let's see what the gods have in store for us. Unless you're afraid, ${Arthur}?\"\n\t\t*goto part1_lady\n\n*comment --------------------------------------------------------------\n*label part1_lady\n*page_break\n*gosub_scene startup get_lover\nThe stag is hard to follow, glimmering in and out of the fog; sometimes slow and sometimes darting forward so that you think you've lost it and hurry ahead. But always you find it again. The fog seems very close, now, and sometimes it seems there's nothing save the stag ahead and\n*if interest=\"emrys\"\n\t${Emrys} by your side.\n*if interest!=\"emrys\"\n\t${Morgan} by your side.\n\nThen the stag vanishes, and you rush forward again, only to find your footsteps crunching on gravel and then splashing into water.\n\nThe fog lifts a little. You can smell salt on the air, and hear waves crashing on the shore.\n\n\"The sea. How far have we come?\" says ${Bedwyr} in wonderment.\n\n\"There is still far to go.\"\n\nIt's a voice you've never heard before, clear as a crystal stream. And then you see ${her_him}—\n*if gender=\"male\"\n\ta lady \n*if gender=\"female\"\n\ta man \nin long white robes stands on the shore. $!{Her_his} skin shimmers in the grey light; ${her_his} pale hair writhes around ${her_his} shoulders as if it lives. $!{Her_his} face is unlined, translucent, ${her_his} eyes white and pupilless, yet ${she} seems to see you. $!{Her_his} expression is calm.\n\n\"The ${White_Lady},\" says ${Emrys}, a touch of awe in ${his} voice. You realize ${he}'s kneeling—${Morgan} follows suit, and you and ${Bedwyr} do the same.\n\n\"There is no time,\" says the apparition. $!{She} lifts an arm and gestures, and the fog rolls back. In the distance, over the water, a dark shape hugs the horizon. \"The Isle of the Dead. You must stand on it within the hour.\"\n\nAnd, just like that, ${she} is gone as if ${she} were never there.\n\n*comment --------------------------------------------------------------\n*comment                   Part 2: To The Isle\n*comment --------------------------------------------------------------\n*label part2\n*page_break\n\n\"Where did ${she} go?\" ${Bedwyr} is on ${his} feet. \n\n\"I don't like this—more of your tricks.\" ${Cai} scowls at ${Emrys}, but you can see that ${his} hand is trembling.\n\n\"No trick,\" says ${Emrys}. \"Or at least, none of mine.\"\n\n\"We must go there,\" says ${Morgan}, looking out over the Isle. \"All of us.\" ${Bedwyr} looks at ${her_him} sharply.\n\n*if (romance_gawain)\n\t${Gawain} lays ${his} hand on your shoulder. \n*if (romance_gawain=false)\n\t${Gawain} nods—${he}'s a little pale, unsettled.\n\"$!{She}'s right,\" ${he} says quietly. \"I've heard of this ${White_Lady}, even amongst my people. It'd be foolish to refuse ${her_him}.\"\n\n\"Who is ${she}?\"\n\n*if gender=\"male\"\n\t\"Some say Arianrhod,\" says ${Morgan}. \"Or Modron, or even Branwen. No one knows for certain, but she protects these lands.\"\n*if gender=\"female\"\n\t\"Some say Gwydion,\" says ${Morgan}. \"Or Mabon, or even Bran himself. No one knows for certain; but he protects these lands.\"\n\n\"Well, ${Arthur},\" says ${Bedwyr}. \"It seems we have little choice.\"\n\nYou find yourself nodding.\n\n\"Indeed,\" says ${Emrys}, looking at you closely. \"But I think you should be very clear, ${Arthur}, why you want to go.\"\n\n*choice\n\t#(Truth) \"Because I trust ${Morgan}—this is a messenger of the old gods.\"\n\t\t*set old_faith %+15\n\t\t*set rel_morgan %+15\n\t\tYou catch ${Morgan}'s small smile of approval. ${Emrys} nods. \"Very well.\"\n\t\t*goto part2_route\n\t\t\n\t#(Lie) \"Because I trust ${Morgan}—this is a messenger of the old gods.\"\n\t\t*set old_faith %-20\n\t\t*set rel_morgan %+10\n\t\tYou catch ${Morgan}'s small smile of approval. ${Emrys} nods, but you can feel ${his} gaze on you. \"Very well.\"\n\t\t*goto part2_route\n\t\t\n\t#\"Because I think someone's pulling our strings, and I mean to find out who and why.\"\n\t\t*set bravado %-20\n\t\t*set old_faith %-20\n\t\t*set rel_emrys %+15\n\t\t${Emrys} nods in surprised approval. ${Morgan} looks faintly disappointed.\n\t\t*goto part2_route\n\t\n\t#\"Because my friends think I should.\"\n\t\t*set rel_gawain %+15\n\t\t*set rel_morgan %+15\n\t\t*set rel_cai %-20\n\t\t\"I don't think we should!\" says ${Cai}. \"But I suppose that I'm only your foster-${brother}, and not actually a friend…\" $!{He} sees your expression. \"Oh, ignore me. Your country, your rules.\"\n\t\t*goto part2_route\n\n*comment --------------------------------------------------------------\n*label part2_route\n\n\"How do we get there?\" ${Bedwyr} stands on the shore peering out into the fog at the dark shape of the Isle.\n\n\"Oh, swimming, probably,\" says ${Cai} dolefully. \"It looks to be just the day for it. What is this place, anyway?\"\n\n\"It's said that the ${priestesses} of Ynys Mon carry dead ${men} there and lay them down to sleep,\" says ${Emrys}. \"Those who are deemed worthy of the honor. So do you know a way, ${Morgan}?\"\n\n${Morgan} grimaces. \"I'm sorry; I'm forbidden to speak of it.\"\n\n\"Then show us,\" says ${Bedwyr}.\n\n$!{She} shakes ${her_his} head. \"This is something you must do for yourselves.\"\n\n${Bedwyr} turns away, sour-faced.\n\n${Cai} looks at you. \"${Arthur}?\"\n*choice\n\t#\"There's nothing for it—I think we should swim.\"\n\t\t*set bravado %+15\n\t\t*goto part2_swim\n\n\t#\"Let's search the shore—someone nearby must have a boat?\"\n\t\t*comment Cunning\n\t\t*set bravado %-20\n\t\t*goto part2_boat\n\t\t\n\t#\"The ${White_Lady}'s words applied to you as well, ${Morgan}, and the stag appeared to you. If you know the way, you should tell us.\"\n\t\t$!{Morgan} holds your gaze for a while, then closes ${her_his} eyes and takes a breath. When they open again, ${her_his} decision is clear.\n\t\t*if rel_morgan>70\n\t\t\t\"You're right. Follow me.\"\n\t\t\t*goto part2_causeway\n\t\t*else\n\t\t\t\"No. I can't. It's one of the Mysteries. I can't just tell people, not even you. You must find a way.\"\n\t\t\t\n\t\t\t\"There's nothing for it, then,\" says ${Cai}. \"Swimming it is.\"\n\t\t\t*goto part2_swim\n\n*comment --------------------------------------------------------------\n*label part2_boat\n\nIt takes a good half hour before you come across any signs of life. But up the coast a way a small fishing boat sits outside a rough shack. An old ${woman} sits next to it, scraping away a patch of cracked wood at the prow. A small fire is set amongst the stones by ${her_his} side.\n\n\"We need your boat,\" says ${Bedwyr} without preamble.\n\n${Morgan} rolls ${her_his} eyes at you.\n\nYou clear your throat. \"That is to say, we need your help,\" you say. \"We've an urgent mission to the Isle, there, and no means to reach it. If you'll take us there, we'll pay well for your time.\"\n\nThe fisher${woman} shades ${her_his} eyes. $!{She} takes in your group. \"See, I'd meant to get this hole patched today, then I can go out early tomorrow. But I see gold arm-rings. Bright swords. Who are you, and what's so urgent?\"\n\n*choice\n\t#\"I am ${Arthur}, ${son} of $!{King} ${Uther}. In truth we've no idea what's so urgent.\"\n\t\t*set compassion %+15\n\t\t*if  (acclaim>40)\n\t\t\tThe fisher${woman}'s eyes stay on you. \"${Arthur}, hey? I've heard the name, and I've heard good things of it. Aye. I'll take you.\"\n\t\n\t\t\t*goto part2_travel_boat\n\t\t*else\n\t\t\tThe fisher${woman} blinks at you. \"Well, then, little ${prince}, you can surely afford yourself a whole fleet and need nothing of me. But I need to patch this boat or I'll not eat tomorrow. So be gone with you.\"\n\t\t\t\n\t\t\t*goto part2_travel_noboat\n\n\t#\"We're warriors of ${Uther}'s court, and the gods command us to the Isle.\"\n\t\t*set old_faith %+15\n\t\t*if (bravado>65)\n\t\t\tThe fisher${woman} shrinks back a bit. \"Aye, well,\" ${she} mumbles. \"Fair enough, I suppose. I'll take you across.\"\n\n\t\t\t*goto part2_travel_boat\n\t\t*else\n\t\t\tThe fisher${woman} scowls at you. \"Aye, well, the gods might have commanded it of you, but I need to patch this boat or I'll not eat tomorrow. If the gods want you there, the gods can build you a boat.\"\n\t\t\t\n\t\t\t*goto part2_travel_noboat\n\t\t\t\n\t#\"I'm ${Arthur}, and this is ${Morgan} of Ynys Mon, $!{Lady} ${Vivian}'s ${daughter}.\"\n\t\t*comment Cunning\n\t\t*set bravado %-20\n\t\t*if (leader>65)\n\t\t\tThe fisher${woman} hastily gets up and smoothes down ${her_his} tunic. \"I'm sorry, my ${lady}, I didn't know. Of course I'll take you.\"\n\t\t\t\n\t\t\t*goto part2_travel_boat\n\t\t*else\n\t\t\tThe fisher${woman} sighs. \"I'm sorry, my ${lady} ${Morgan}—I mean no disrespect to your ${mother}, but see I need to patch this boat or I'll not eat tomorrow.\"\n\t\t\t\n\t\t\t\"That's all right,\" says ${Morgan}. \"We'll find another way.\"\n\t\t\t\n\t\t\t*goto part2_travel_noboat\n\t\n*comment --------------------------------------------------------------\n*label part2_travel_noboat\n\n${Bedwyr}'s face darkens. \"Listen, you old sluggard, I—\" $!{His} hand is on ${his} sword.\n\n${Gawain} grabs ${Bedwyr}'s arm, and silently shakes ${his} head.\n\n\"Swimming it is,\" says ${Cai}. \"Nice weather for it!\"\n*goto part2_swim\n\n*comment --------------------------------------------------------------\t\n*label part2_travel_boat\nAs easy as that. You help ${her_him} haul the boat across the stones to the water, all climb into it, and then set off into the deepening fog.\n\n*page_break\n\nYou're standing on a rocky beach, stones under your feet, with a rough track leading up into the fog. It's so thick now that you can barely see beyond the end of your arm. ${Bedwyr} takes the lead, and you leave the boat and the beach behind you.\n\nAfter a few minutes climbing—and you still can't see any destination, through the greyness—${Morgan} stops you. \"${Arthur}—where are the others?\" \n\nYou look around. ${Bedwyr} is in front of you; ${Morgan} by your side, and ${Emrys} brings up the rear. There's no sign of the other two.\n\nYou slide back down the track a little way, past ${Emrys}. \"${Cai}? ${Gawain}?\" They were right behind you, you would have sworn. \n\n\"If the $!{Lady} spoke truth, we've no time to wait for them,\" calls ${Bedwyr}.\n\n\"I think you'll find they're safe enough,\" says ${Emrys}. \"I think perhaps they weren't meant to be here.\"\n\nYou catch ${Morgan} staring at ${him} for a moment.\n\n$!{Emrys} smiles faintly and nods. \"We should go.\"\n*goto part3\n\t\n*comment --------------------------------------------------------------\n*label part2_causeway\n\n*set chapter9_use_causeway true\n\n$!{She} walks purposefully along the shore, looking out across the water at the dark shape of the island, then back at the stones of the beach, then out again. At length ${she} stops and says. \"Here.\"\n\n\"Where?\" says ${Cai}.\n\n${Morgan} raises an eyebrow at ${him}, and then turns and starts to walk out into the sea.\n\n\"${Morgan}, what…!\" ${Gawain} takes swift steps after ${her_him}, but ${Bedwyr} stops ${him}.\n\n\"Look!\"\n\n$!{Morgan} is now twenty paces from the shore and still the water is no deeper than ${her_his} ankles. It's as if ${she}'s floating.\n\n\"Devilry,\" mutters ${Cai}.\n\n\"No.\" ${Emrys} is smiling. \"Just a causeway—a ridge under the water. Be glad it's not high tide! Come on.\"\n\nThe water laps your ankles as you splash after ${Morgan} into the thickening fog.\n\n*page_break\n*achieve water_walk\n\nYou're standing on a rocky beach, stones under your feet, with a rough track leading up into the fog. It's so thick now that you can barely see beyond the end of your arm. \n\n\"Where are the others?\" It's ${Morgan} speaking. $!{She}'s looking around. You realize that ${Bedwyr} and ${Emrys} stand with ${her_him}, but there's no sign of the other two.\n\n\"${Cai}? ${Gawain}?\" They were right behind you, you would have sworn. You turn back to the causeway.\n\n\"If the $!{Lady} spoke truth, we've no time to wait for them,\" says ${Bedwyr}.\n\n\"I think you'll find they're safe enough,\" says ${Emrys}. \"I think perhaps they weren't meant to be here.\" \n\nYou catch ${Morgan} staring at ${him} for a moment.\n\n$!{Emrys} smiles faintly and nods. \"We should go.\"\n*goto part3\n\t\n*comment --------------------------------------------------------------\n*label part2_swim\n*page_break\n*set chapter9_stripped true\nYou strip down to your undershirt and breeches and make a bundle of your gear, stowing it amongst the scrub by the shore, keeping only your belt-knife. The others follow suit, \n*if gender=\"male\"\n\t${Gawain} stripping to the waist. ${Cai} whistles. \"You could hide an entire army of Britons in that chest-hair, Northman. No wonder they call you the Bear!\"\n\t*if romance_gawain\n\t\t${Gawain} catches your appreciative gaze and blushes furiously. He hastily splashes out into the water until he's sunk shoulder-deep in it.\n*if gender=\"female\"\n\t${Morgan} unselfconsciously stripping to the waist. You catch ${Cai} stealing appreciative looks at him—nut-brown, unblemished skin over lithe muscle. \n\t*if romance_morgan\n\t\t\"Eyes front,\" you mutter to your foster-sister. She gives you a quick grin and then wades out into the water.\n\nThe sea is freezing. You wade deeper until the rocks under your feet are nearly too far away to reach them, and then strike out, swimming for the isle through a deepening fog.\n*page_break\nIt's tough going; the swell of the waves is pushing you back towards the shore and your muscles burn as you force yourself onwards, the waves seeming to get higher all the time. You cast around for the others; ${Morgan} is ahead of you, ${Cai} somewhere off to your left by the splashing and complaining. The dark shape looming through the grey doesn't seem to be getting any closer. \n\n*if (warrior>60)\n\tAnd then, of a sudden, it is. A rocky beach, stones under your feet, and a rough track leading up into the fog. It's so thick now that you can barely see beyond the end of your arm. ${Bedwyr} is wringing water from ${his} shirt. ${Morgan} is helping ${Emrys} from the water. And…\n\t\n\t*goto part2_missing\n*else\n\tAnd then there's a sudden swell and a gust and you get a mouthful of salt water. As you cough and splutter, something catches at your legs—weed, perhaps—and your head goes under a second time. You flail out in panic, kicking free, but a current pulls you sideways and suddenly you're not sure which way is up.\n\t\n\tThen arms are around you and you're dragged upwards in a firm grip. Eyes streaming, lungs burning, you're hauled on to a stony shore. Then ${Morgan} is by your side, and you realize your rescuer was ${Bedwyr}.\n\t\n\t\"I'd thought you were a better swimmer than that,\" ${he} says, squeezing the water from ${his} shirt.\n\t\n\tYou cough up the last of the water and then sit up, looking around. You're on a rocky beach  with a rough track leading up into the fog. It's so thick now that you can barely see beyond the end of your arm. There's ${Bedwyr}, there's ${Emrys}, and ${Morgan} is next to you. But…\n\t\n\t*goto part2_missing\t\n*comment --------------------------------------------------------------\n*label part2_missing\n\"Where are the others?\"\n\nYou spend some time walking up and down the beach calling for ${Cai} and ${Gawain}.\n\n\"They'll have come to shore somewhere else,\" says ${Bedwyr}. \"If the $!{Lady} spoke truth, we've no time to wait for them.\"\n\n\"I think you'll find they're safe enough,\" says ${Emrys}. \"I think perhaps they weren't meant to be here.\"\n\nYou catch ${Morgan} staring at ${him} for a moment. \n\n$!{Emrys} smiles faintly and nods. \"We should go.\"\n\n*goto part3\n*comment --------------------------------------------------------------\n*comment                   Part 3: Burial Mounds\n*comment --------------------------------------------------------------\n*label part3\n*page_break\n\nThe path leads you up on to a grass trail. It's lighter here, the fog is brighter—you can feel the sun trying to break through above you. The warmth is welcome.\n\nAfter a time, shapes loom to either side; standing stones set upright in the grassy bank like the tall stones of the circle at Dinas Emrys. These are carved with spirals and half-covered with moss, the white-scored stone of the spirals standing out stark against the dark stone.\n\n\"Hsst,\" whispers ${Bedwyr}, holding up ${his} hand. \"I can hear voices.\"\n\n$!{He}'s right. Sounds drift from ahead of you. $!{Women}'s voices. In fact…\n\n\"$!{Mother}?\" calls ${Morgan}, walking forwards.\n\nYou follow ${her_him}. You stand amongst grass-covered mounds. Amongst them burns a yellow-orange fire in a small brazier. Five cloaked figures stand around it. Their leader has ${her_his} hood thrown back; you see long, red hair. It's the first time you've seen $!{Lady} ${Vivian} dumbfounded. $!{She} stares at you in stark surprise. \"What are you doing here? ${Morgan}…did you lead them? You have no right—\"\n\n\"All four have the same right to be here.\" A white figure shimmers into existence behind the group—the ${White_Lady}.\n\n${Vivian}'s hand goes to the knife at ${her_his} waist…and then ${she} sees the figure. $!{She} swallows, and bows ${her_his} head. \"$!{Lady}. I…yes. You have the right of it.\"\n\n\"It's time, ${Vivian}. We know what faces us now. They must have aid.\"\n\n*choice\n\t#\"I've had enough of riddles and mysteries. Tell us what's going on.\"\n\t\t*set bravado %+15\n\t\t${Vivian}'s brows narrow alarmingly. \"You will have your answers, ${ap} ${Uther}. Be careful of your tongue in such company.\"\n\t\t\n\t\tThe ${White_Lady} raises a hand. \"Peace, ${Vivian}. Forgive us, all of you. You will understand soon enough.\"\n\t\t*goto part3_mounds\n\t\t\n\t#I bow my head to the ${White_Lady}. \"Thank you, $!{Lady}, we'll gladly accept any aid.\"\n\t\t*set old_faith %+15\n\t\tThe shimmering figure smiles faintly. \"I thank you for your courtesy. But perhaps it is wise to ask questions ${Arthur} ${ap} ${Uther}, rather than to follow blindly. ${Vivian}…\"\n\t\t\n\t\t*goto part3_mounds\n\t\t\n\t#I murmur a prayer to Christ to protect us from evil spirits.\n\t\t*set old_faith %-20\n\t\t*set rel_morgan %-10\n\t\t*set rel_vivian %-10\n\t\t*set bravado %+15\n\t\tThe shimmering figure fades and gutters suddenly, as if the wind is blowing a candle. ${Morgan} stares at you in alarm.\n\t\t\n\t\t\"Be careful, ${Arthur},\" murmurs ${Gawain}.\n\t\t\n\t\t${Vivian}'s look is black. \"Hold your tongue, ${ap} ${Uther}!\"\n\t\t\n\t\t\"Peace!\" It is the ${White_Lady}, solidifying, reforming. \"It is right that one should hold firmly to ones beliefs. I would take it as a courtesy, ${Arthur}, if you would restrain yourself; for your God is a jealous god, and there are many things on the isle that it would be best not to wake.\"\n\t\t\n\t\t*goto part3_mounds\n\n*label part3_mounds\n${Vivian} draws ${herself} up to ${her_his} full height, and closes ${her_his} eyes. Calm settles over ${her_his} features, and ${she} lets out a long slow breath. Then ${her_his} eyes open once again.\n\n\"${Arthur} ${ap} ${Uther}. ${Bedwyr} ${ap} ${Uther}. ${Emrys} ${ap} ${Ambrosius}. ${Morgan} ${mab} ${Vivian}. You stand amongst the Dead. Walk with me.\"\n\nThe grass-covered mounds around you must be tombs, burial mounds. \n\nUnder the gaze of the ${White_Lady}, you follow ${Vivian} to one particular mound. Three stones form an entrance to it—a lintel over two supports. There is no door, simply a dark void that leads inside.\n\n\"Inside this place lie treasures,\" says ${Vivian} to all of you. \"Treasures vital to the rulership of the people of our lands. They will be granted to the deserving. You may pass the doorway—but be warned, the spirits that guard this place will only suffer one living soul to stand within at any time. Each of you may enter and may make your choice of treasure. That is all it is permitted me to say.\"\n\n${Bedwyr} meets your gaze with wonder. ${Morgan} grimaces, and nods in acceptance. ${Emrys}'s mouth twists into a wry smile. \"I have no need to step within,\" ${he} says. \"I know what lies there. I have been offered it before; I refused it then, and I will not change my mind now.\"\n\n\"Then which of you will enter first?\" asks ${Vivian}.\n\n\"${Arthur}, ${Bedwyr}…you are both ${son}s of the $!{King},\" says ${Morgan}. \"I think it should be one of you.\"\n\n*temp tomb_arthur false\n*temp tomb_morgan false\n*temp tomb_bedwyr false\n*temp arthur_last false\n\n*choice\n\t#\"${Bedwyr}—you should go first.\"\n\t\t*set diplomat %+15\n\t\t*set warrior %-15\n\t\t*set rel_bedwyr %+10\n\t\t${Bedwyr} stares at you in surprise, and then nods, slowly. \"Thank you, ${Arthur}.\"\n\t\t\n\t\t*goto part3_bedwyr_enters\n\t\t\n\t#\"I will go.\"\n\t\t*set bravado %+15\n\t\t*if rel_bedwyr>35\n\t\t\t${Bedwyr} nods. \"Aye. I'm content to let it be so.\"\n\t\t\t\n\t\t\t*goto part3_arthur_enters\n\t\t*else\n\t\t\t\"No!\" ${Bedwyr} turns on you. \"I'm ${Uther}'s heir. This should be my task!\"\n\t\t\t\n\t\t\t\"The Briton people need leaders, not squabbling children,\" says ${Vivian}. \"It seems I must decide for you. \n\t\t\t*if ((old_faith>50) and (rel_vivian>50))\n\t\t\t\t${Arthur}, you will enter first.\"\n\t\t\t\t\n\t\t\t\t*goto part3_arthur_enters\n\t\t\t*else\n\t\t\t\t${Bedwyr}, you will enter first.\"\n\t\t\t\t\n\t\t\t\t*goto part3_bedwyr_enters\n\t\t\t\t\n\t#\"${Morgan}—it should be you.\"\n\t\t*set rel_morgan %+15\n\t\t$!{She} looks at you in surprise, and then nods, slowly. \"Very well.\"\n\t\t\n\t\t*goto part3_morgan_enters\n\t\t\n\t#\"We should draw straws.\"\n\t\t*set leader %+15\n\t\t*set warrior %-15\n\t\t\n\t\tYou pull up three blades of grass and snap two to the same length and one shorter. Then, concealing their length, you let ${Morgan} and ${Bedwyr} choose. \n\t\t\n\t\t*comment Not bothering with Morgan here\n\t\t*temp order\n\t\t*rand order 1 2\n\t\t*if order=1\n\t\t\t${Bedwyr}'s is the shorter. $!{He} nods. \"Very well.\"\n\t\t\t\n\t\t\t*goto part3_bedwyr_enters\n\t\t*else\n\t\t\t\n\t\t\tYours is the shortest. ${Bedwyr} looks at you for a moment and then nods. \"Very well.\"\n\t\t\t\n\t\t\t*goto part3_arthur_enters\n\t\t\n\t#I'll suggest that we draw straws, but will use sleight of hand to ensure that I win. \n\t\n\t\tYou pull up three blades of grass and snap two to the same length and one shorter. Then, concealing their length, you let ${Morgan} and ${Bedwyr} choose, carefully shifting them so that you're left with the short straw.\n\t\t\n\t\t*comment Testing cunning\n\t\t*if (bravado\u003c35)\n\t\t\t*set acclaim %+20\n\t\t\t${Bedwyr} looks at the straw in ${his} hand for a moment and then nods. \"Very well. It shall be ${Arthur}.\"\n\t\t\t\n\t\t\t*goto part3_arthur_enters\n\t\t*else\n\t\t\t*set acclaim %-20\n\t\t\t*set diplomat %-15\n\t\t\t*set warrior %+15\n\t\t\t*set rel_morgan %-20\n\t\t\t*set rel_bedwyr %-20\n\t\t\tAs you swap the straws in your hand, ${Bedwyr}'s fingers close over yours. \"Did you think to trick me, $!{brother}?\" ${he} says. \"Your hands are not as fast as you think they are.\"\n\t\t\t\n\t\t\t${Morgan}'s look is one of disappointment.\n\t\t\t\n\t\t\t\"${Bedwyr} will enter first,\" says ${Vivian}, eyeing you with contempt. \"And for ${his} actions, ${Arthur} will be last.\"\n\t\t\t\n\t\t\t*set arthur_last true\n\t\t\t*goto part3_bedwyr_enters\n\n*comment --------------------------------------------------------------\n*label part3_bedwyr_enters\n\n*set tomb_bedwyr true\n\t\n*set chapter9_item_bedwyr \"torc\"\n*set chapter9_taken_torc true\n*if chapter9_item_arthur=\"torc\"\n\t*set chapter9_item_bedwyr \"sword\"\n\t*set chapter9_taken_sword true\n\nWith a look of apprehension, ${Bedwyr} ducks under the lintel of the tomb and disappears into the dark.\n\nYou hear nothing for a time, then faintly the sound of a voice, muffled. \n*if tomb_arthur=false\n\t*comment First time\n\tMinutes pass, as all outside are silent; \n\t*if romance_morgan\n\t\t${Morgan}'s hand twitches near yours as if need of reassurance, but under ${her_his} ${mother}'s gaze it falters. You \n\t*if romance_emrys\n\t\t${Emrys}'s eyes are on yours, calm, reassuring. You \n\t*if ((romance_morgan=false) and (romance_emrys=false))\n\t\tyou\n\tare only too aware of ${Vivian}, a dark crow standing watchful. And you know the eyes of the shimmering figure in white are also on you.\n\t\n*if tomb_arthur=true\n\tYou picture ${him} standing there, as you did, taking in the tomb, studying each item. You're still not sure whether you chose wisely or not, or what ${his} choice will mean for you.\n\t\n${Bedwyr} emerges with a haunted, drawn look on ${his} face.\n*if chapter9_item_bedwyr=\"torc\"\n\tIn ${his} fist ${he} clutches a heavy torc, a neck-band of twisted gold wire. \n*if chapter9_item_bedwyr=\"sword\"\n\tIn ${his} right hand ${he} grips a long-bladed sword, hilted in the Roman fashion—the sword that lay by ${Ambrosius}'s side.\n$!{He} swallows, and opens ${his} mouth to speak. ${Vivian} shakes ${her_his} head, and ${he} nods in acquiescence.\n\n*if ((tomb_arthur=false) and ( (arthur_last=false) or (tomb_morgan)) )\n\t*page_break\n\tIt's your turn.\n\t\n\t*goto part3_arthur_enters\n\t\n*if (tomb_morgan = false)\n\t*page_break\n\tIt's ${Morgan}'s turn.\n\t\n\t*goto part3_morgan_enters\n\t\n*goto part4\n\n*comment --------------------------------------------------------------\n*label part3_morgan_enters\n\n*set tomb_morgan true\n\t\n*set chapter9_item_morgan \"cup\"\n*set chapter9_taken_cup true\n*if chapter9_item_arthur=\"cup\"\n\t*set chapter9_item_morgan \"banner\"\n\t*set chapter9_taken_banner true\n\n${Morgan} swallows, lets out a slow breath, and then steps forward into the darkness of the tomb.\n\nYou can hear nothing from inside. \n*if tomb_arthur=false\n\t*comment First time\n\tYou are only too aware of ${Vivian}, a dark crow standing watchful; and you know the eyes of the shimmering figure in white are also on you, as you wait. ${Emrys} nods at you in reassurance. What did ${he} mean? What did ${he} turn down?\n\t\n*if tomb_arthur=true\n\t$!{Morgan} liked ${Ambrosius}—you can remember the old $!{King} teaching you both a hunting song in the Long Hall, and ${his} pleased laughter at ${Morgan} singing it in front of a packed hall at Samhain.\n\t\nAfter a time that seems to stretch on forever, ${Morgan} stumbles out of the tomb. In ${her_his} hand ${she} holds a \n*if chapter9_item_morgan=\"cup\"\n\theavy cup wrought of silver.\n*if chapter9_item_morgan=\"banner\"\n\troll of embroidered cloth—the banner that lay at ${Ambrosius}'s head.\n\t\n$!{She} shakes ${her_his} head at you, tears in ${her_his} eyes. \n*if ( chapter2_morgan_pregnant )\n\tAnd then ${she} clutches at ${her_his} belly and doubles over screaming in pain and sobbing. You rush forward; ${Vivian} and ${Emrys} are by your side. You lift ${her_him} and lay ${her_him} down on softer grass; ${she} twists on to ${her_his} side, hugging ${herself}. ${Vivian} and ${Emrys} exchange a look; ${Emrys} grabs you by the arm and pulls you away while ${Vivian} ministers to ${Morgan}.\n\t\n\t\"What's wrong with ${her_him}?\" asks ${Bedwyr} in shock.\n\t\n\t\"You foolish ${girl},\" murmurs ${Vivian}, and you're alarmed to hear tears in ${her_his} voice. \"Why didn't you tell me?\"\n\t\n\tYou stare at ${Emrys}. \"The spirits will only suffer one living soul to stand within,\" ${he} says quietly. \"Did you not know ${she} was with child?\"\n\t\n\tYou shake your head in blank incomprehension. \"$!{Lady} ${Vivian}…is ${she}…will ${she}—\"\n\t\n\t\"Hold your tongue, ${ap} ${Uther}!\" ${she} snaps in rage.\n\t\n\t${Emrys} restrains you gently while ${Vivian} works. ${Bedwyr} paces back and forth.\n\t*page_break\n\tThe sun is lower in the sky when ${Vivian} comes to you. One of ${her_his} apprentices sits with ${Morgan}, who is pale but conscious.\n\t\n\t\"$!{She} will live,\" says ${Vivian}. \"As does the child within ${her_him}. Whether it will remain healthy, whether ${she} will bear it living when the time comes, whether it has been…changed by this I cannot tell. But know and remember this, ${Arthur} ${ap} ${Uther}—all actions have consequences. And if my ${daughter} dies because of you…\"\n\t\n\t$!{She} trails off, and you see ${her_his} eyes are wet.\n\t\n\t*choice\n\t\t#\"I'm sorry. I didn't know.\"\n\t\t\t\"The cry of ${man} through the ages,\" ${she} says bitterly. \n\t\t\t*goto part3_morgan_extra\n\t\t#\"I'll look after ${her_him}.\"\n\t\t\t\"And how will you do that, ${Arthur} ${ap} ${Uther}? What do you know of birth, let alone the shadows and spirits of this isle?\" $!{She} shakes ${her_his} head.\n\t\t\t*goto part3_morgan_extra\n\t\t*if (romance_morgan) #\"I love ${her_him}.\"\n\t\t\t\"Love? Your love will bring ${her_him} nothing but ruin, ${Arthur} ${ap} ${Uther}. Do not be a fool.\" $!{She} shakes ${her_his} head.\n\t\t\t*goto part3_morgan_extra\n\t\t#\"Is there anything I can do?\"\n\t\t\t\"You can leave ${her_him} be,\" ${she} says bitterly.\n\t\t\t*goto part3_morgan_extra\n\n*label part3_morgan_extra\n*if ((tomb_arthur=false) and ( (arthur_last=false) or (tomb_bedwyr)) )\n\t*if chapter2_morgan_pregnant\n\t\t\"Go,\" ${she} snaps, gesturing at the tomb. \"Take your treasure.\"\n\t*page_break\n\t*goto part3_arthur_enters\n\t\n*if (tomb_bedwyr = false)\n\t*if chapter2_morgan_pregnant\n\t\t\"Go,\" ${she} snaps to ${Bedwyr}, gesturing at the tomb. \"Take your treasure.\"\n\t*page_break\n\t*goto part3_bedwyr_enters\n\n*if chapter2_morgan_pregnant\n\t\"There is work yet to be done.\" ${She} pulls ${her_his} hood up until ${her_his} eyes are shadowed.\n\t\t\n*goto part4\n\n*comment --------------------------------------------------------------\n*label part3_arthur_enters\n\n*set tomb_arthur true\n\nYou duck under the lintel and head into the darkness.\n*if chapter9_stripped\n\tYour bare feet are cold on the packed earth floor. \n*if chapter9_stripped=false\n\tYour boots are muffled on the packed earth floor. \nYou're in a tunnel which winds to the left; the roof is low and you're walking half-crouched. You draw in your elbows, which scrape on the stones set in the walls. The air tastes of earth and dampness. You quickly start to feel trapped, start to feel a need to stand up, to push your arms outwards, to break the walls. You can't see, and wish you'd brought a spill from ${Vivian}'s brazier.\n\nAnd then there's light ahead, and you emerge into a small chamber.\n\nThe light comes from one of three square holes in the side of the chamber roof. It blinds you for a moment—you raise a hand against it and give yourself time for your eyes to adjust.\n\nIn the center of the chamber, cut into the middle of the floor, is a box with stone sides. In it, curled up like a child, is what used to be a ${man}.\n\nYou've seen death before, of course you have, and a dead ${man} should be nothing to fear. Yet, as you kneel, something wraps itself around your heart; you can feel it quivering in your chest. And you realize that this ${man} surely cannot be dead, surely simply asleep, there's color in ${his} cheeks and ${his} lips, ${his} skin is smooth and untainted by any rot or illness.\n\nAnd then you realize that this ${man} [i]must[/i] be dead, for you remember ${his} death, you remember the whole fort in mourning for ${him}, you remember ${him} whittling a stick for you to play at swords. This is your ${uncle}, the High $!{King} before ${Uther}. This is ${Ambrosius}, Pendragon of the Britons.\n\n*page_break\n\nHow can ${he} look so alive?\n\nYou reach out and tentatively touch ${his} skin. It's cold, yet still soft under your fingers. $!{He} looks as if ${he} might wake at any moment. Yet ${he} is dead. $!{Lady} ${Vivian}'s arts?\n\nYou sit back, and take in the rest of the chamber. It is dressed as the chamber of a ${king}; there are wooden chests, cups, a [i]tawlbwrdd[/i] set with carved wooden pieces, enameled brooches. \n*if (tomb_morgan=false)\n\tA heavy silver drinking chalice ornamented with gold lies close by ${Ambrosius}'s hand—you remember seeing that in the Long Hall, passed to guests to welcome them.\nSet just above ${his} head, almost as a pillow, is a roll of cloth embroidered in red and green. That must surely be ${Ambrosius}'s banner—you remember the dragon that used to fly above the fort. By the $!{King}'s side lies a scabbarded sword with a Roman-style hilt; it's set with a purple stone. The copperwork on the hilt glints in the light. \n*if (tomb_bedwyr=false)\n\tThe only other treasure lies around the $!{King}'s throat—a thick-twined torc of gold. The torc of the Pendragon.\n\n${Vivian} said that you should choose a treasure.\n*choice\n\t*if (tomb_bedwyr=false) #I'll carefully remove the golden torc from around the $!{King}'s neck. \n\t\t*set chapter9_item_arthur \"torc\"\n\t\t*set chapter9_taken_torc true\n\t\t*achieve item_torc\n\t\tYou slide the cold metal away from ${Ambrosius}'s neck, half afraid that at any time you might wake ${him}. But ${he} doesn't stir. The torc gleams dar
