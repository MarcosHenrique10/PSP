an}—Corran—snorts and bursts out laughing, and then you've lost them as the laughter spreads.\n\t\t\n\t\t*goto part4_speech4\n\n*label part4_speech4\t\n\"In short!\" shouts ${Cai}, \"Let's go out and get the ${insult_bastards}!\"\n\n*if speech_score=3\n\tThere's a roaring cheer at this. The crowd is buzzing with excitement. \"Good speech,\" says ${Cai} to you. \"Now come on, let's get going or the Saxons will be there before us.\"\n\t*set track_orator +1\n\t*goto part4_banner\n*elseif speech_score=2\n\tThere's a cheer at this. The crowd seems lively, energetic; it's a cheerful, determined babble. \"Nicely done,\" says ${Cai}. \"Now come on, let's get going or the Saxons will be there before us.\"\n\t*goto part4_banner\n*elseif speech_score=1\n\tThere's a small cheer at this. The crowd seems tense, and there are mutterings, but on the whole you think they're ready to march. \"Not too bad,\" says ${Cai}. \"Next time just tell them that the sheep are on the other side of the Saxons—that's how to get farmers moving!\"\n\t*goto part4_banner\n*else\n\tThere's a stony silence. ${Cai} helps you down from the platform. \"Oh well,\" ${he} says quietly to you. \"At least you didn't fall over.\"\n\t*goto part4_banner\n\n*comment --------------------------------------------------------------\n*label part4_hopeless\n\n\"Should we move?\"\n\nThen you see ${Emrys}'s expression. \"It's time to face reality, ${Arthur},\" says ${Emrys}. \"We have nowhere near enough ${men}. We don't have the allies we need. We have no advantage of any sort here and I tell you now, if you fight this battle, you will lose it.\"\n\n${Gawain} grimaces. \"${Emrys} has the right of it, I fear. What do you want to do?\"\n\n*choice\n\t#\"This isn't about winning or losing. It's about standing up and fighting. I know we won't win. But we must still make the attempt.\"\n\t\tThe two look at each other. Then ${Gawain} sighs. \"Very well. I'll give the orders.\" $!{He} claps you on the shoulder as ${he} walks out.\n\n\t\t*if (chapter11_high_king=\"Aeron\")\n\t\t\t\"It might be that ${Aeron} holds a different view,\" says ${Emrys}. \"Let us see.\"\n\t\t\t*goto part5\n\t\t*elseif (chapter11_high_king=\"bedwyr\") or (chapter11_king=\"bedwyr\")\n\t\t\t\"It might be that ${Bedwyr} holds a different view,\" says ${Emrys}. \"Let us see.\"\n\t\t\t*goto part5\n\t\t*goto part5\n\n\t#\"We scatter; get everyone to the hills. Let the Saxons have Dinas Emrys, and disappear. From there we can start fighting back—we'll make life unpleasant enough for them that they won't want to stay.\"\n\t\t${Emrys} nods. \"It's the wisest course. You are right, ${Arthur}.\"\n\n\t\t${Gawain} goes to break the news to the others.\n\n\t\t[i]And so begins a long campaign, fought from the hills of Gwynedd, from remote holdfasts well hidden from the Saxons. It is a long, bleak struggle, where slowly the Britons try to break the will of the Saxons, try to use the land to make it known that it will never be theirs.[/i]\n\n\t\t[i]And perhaps, for a time, they are held back. But the Saxons are not the Romans; in their own way, they are as desperate as the Britons, for they need a place to live.[/i]\n\n\t\t[i]And there is something dark at the heart of them. Some dark spirit that hides behind the eyes of its leaders. And it is something that ${Arthur} and ${his} companions never find a way to defeat.[/i]\n\t\t*goto_scene startup early_death\n\n\t#\"There's nothing we can do. We should come to terms with ${Cerdic}. I've met ${him}—I think ${he}'s a fair ${man}. We should make peace; there is land to spare.\"\n\t\t${Gawain}'s expression turns sour. \"Surrender? Has it truly come to that?\"\n\n\t\t\"It has, I fear,\" says ${Emrys}. \"We're bereft of allies, and the heart has gone out of us. ${Arthur}'s right; it's the best way to save lives.\"\n\n\t\t[i]And so begins a time in which the heart of the land falls under the yoke of the Saxons. Where free folk become thralls; and yet they are alive, and while they are alive there is some measure of hope. There are attempts at rebellion; there are attempts at throwing off the shackles. But there is something dark in the heart of the Saxons; some dark spirit that hides behind the eyes of their leaders. And perhaps that is simply too strong, in the end.[/i]\n\t\t*goto_scene startup early_death\n\n*comment --------------------------------------------------------------\n*label part4_banner\n\n*if track_orator>=2\n\t*achieve orator\n\t\n*if chapter9_taken_banner=false\n\t*goto part5\n\nAt that, ${Emrys} climbs up on to the platform. In ${his} hand is a staff…no, not a staff, for ${he} unties a bundle at the end, and then raises it, unfurls it. It's a banner, a standard. The material is green, but stitched across it in heavy fabric is a snarling red dragon, flame issuing from its mouth. The banner that\n*if chapter9_item_arthur=\"banner\"\n\tyou\n*if chapter9_item_morgan=\"banner\"\n\t${Morgan}\n*if chapter9_item_bedwyr=\"banner\"\n\t${Bedwyr}\nbrought out of ${Ambrosius}'s tomb.\n\n\"The banner of the Pendragon,\" says someone in awe.\n\n\"Gwynedd! Gwynedd!\" goes up the shout. \"Gwynedd for the Pendragon!\"\n\n*set chapter11_final_fight +2\n\n*goto part5\n\n*comment --------------------------------------------------------------\n*comment                   Part 5: The Storm\n*comment --------------------------------------------------------------\n*label part5\n*page_break\n\n*temp the_plan\n\nThe valley of Baddon. A clinging, grimy mist wraps itself around rough hummocks of waterlogged ground at the bottom of a steep-sided valley. To the east, the flank of Mynydd Baddon rises up, its saddle-backed peaks lost in the fog. To the west, the slope of Waun Goch, the Red Heath; this is not the first time blood has been spilled on this land. The Saxons must pass through this vale from the north. You have come into the valley from the south.\n\nThe land is broken and treacherous—hummocks of solid ground riven by concealed streams and dank mire.\n\nThe leaders of your troops stand before you. \"Well, Warleader,\" \n*if chapter11_aerons_men\n\tsays $!{King} ${Aeron} with a smile.\n*if chapter11_aerons_men=false\n\tsays ${Gawain}, voice loud.\n\"What are your orders?\" \n*if (allies\u003c=2)\n\tMore quietly, ${he} adds \"Bear in mind that we've few allies here, and our ${men} will be stretched thin.\"\n*if (allies>=6)\n\tMore quietly, ${he} adds \"We have a good-sized force here, with all these allies—but it does make it harder to hide what we're doing. Be careful.\"\n\n*choice\n\t#\"Split the ${men} into small roving groups; let them use the land to ambush the Saxons and pull away quickly wherever they get the chance.\"\n\t\t*set the_plan \"groups\"\n\t\t*if allies\u003c=2\n\t\t\t*comment The best thing you can do with a tiny force\n\t\t\t*set chapter11_final_fight +2\t\n\t\t*if allies>=6\n\t\t\t*comment Too big a force = too easy to spot groups, can just mop up\n\t\t\t*set chapter11_final_fight -2\n\t\tYou split your forces into roving knots of ${men} hidden amongst the byways of the broken ground, and sit down with your own troops to take what little rest you can.\n\t\t*goto part5_start\n\t\t\t\n\t#\"Form up half of our warriors to act as bait; let's get the Saxons bogged down in the mire attacking our ${men}, and then attack them from the sides with the reserves.\"\n\t\t*set the_plan \"split\"\n\t\t*if allies\u003c=2\n\t\t\t*comment Half a small force and it will just get cut to bits\n\t\t\t*set chapter11_final_fight -2\n\t\tYou split your force into two. The main force stays very visible, in the middle of the valley floor; the other troops scatter and go to ground on either side of the valley, as hidden as they can be. You, as Warleader, are with the main force. The ${men} are restless as you wait for your enemies.\n\t\t*goto part5_start\n\t\t\t\n\t#\"One force, united; we smash them apart with weight of numbers.\"\n\t\t*set the_plan \"smash\"\n\t\t*if allies>=6\n\t\t\t*comment With a big force, this adds an intimidation/morale factor\n\t\t\t*set chapter11_final_fight +1\n\t\tYou take your place in the vanguard of the massed forces of your troops in the middle of the valley floor and wait for your enemies.\n\t\t*goto part5_start\n\n*comment --------------------------------------------------------------\n*label part5_start\n\nIt begins swiftly. Through the mist, the Saxons pour into the upper valley like a flood of ants eager to find something to consume. \n*if the_plan=\"groups\"\n\t*goto part5_groups\n*elseif the_plan=\"split\"\n\t*goto part5_split\n*else\n\t*goto part5_smash\n\t\n*comment --------------------------------------------------------------\n*label part5_groups\nBattle is joined when \n*if chapter10_gorlaes_allies\n\t$!{King} ${Gorlaes} gives them something to seize on; the ${men} of Kernow \n*if chapter10_gorlaes_allies=false\n\t${Gawain} gives them something to seize on; ${his} ${men}\nburst from cover and cut down a small group of Saxon scouts. The scouts give chase, and their ${brother}s roar after them.\n\nSaxons falter and fall as they flounder into unexpected mires, and then more small groups of your ${men} leap forward to attack them.\n\nFor a moment, it seems that the Saxons will be trapped, brought down by the bogs, unable to maneuver; that you and your companions will be able to pick them off.\n\nBut only for a moment.\n\nAnd then the bulk of the Saxon force emerge from the mist and tear into your troops. Thrown axes and arrows scatter your ${men}; then the vanguard hit them. At their head you see a knot of tall, flaxen-haired warriors—in their center strides ${Cerdic}, face grim. They plough through the mud and mire by sheer brute strength and will, great axes rising and falling.\n\n*if chapter11_final_fight\u003c=2\n\t*page_break\n\tYour ${men} fall back as best they can, but it seems there's nothing they can really do to hurt them; mobility is only useful if you can lead the enemy astray or into traps, but the Saxon force is so large compared to yours that it can just keep coming forward down the valley, surge by surge, cutting down your ${men} if they get too close. It's as if your warriors were gnats stinging at a boar; you don't have the ${men} or the support that you need to fight this battle, you're simply outmatched.\n\n\tSome of your troops try to pull back, to regroup, ${Gawain} shouting at them. Some scatter.\n\t*goto part5_deathbycynric\n\n*if chapter6_cadells_men\n\tThen the ${men} of Powys, $!{King} ${Cadell} at their head, step from their cover.\n*if chapter6_cadells_men=false\n\tThen the archers under ${Cai} step from their cover.\nArrows arc up and out. Many Saxons have forgone shields, and the arrows find targets; the Saxons onslaught falters for a beat as ${men} fall.\n\nBut a shout goes up from ${Cerdic}, axes flash, and the relentless march continues. You'd expected to be the nimbler force, to be able to move where they cannot, but their pace is ferocious. Instead, you're the ones caught unable to escape through the mud; as they roar and charge you find yourself hand-to-hand amongst the fray.\n\n*goto part5_frontline\n*comment --------------------------------------------------------------\n*label part5_split\nThe Saxon scouts swiftly spot your banners, and you can see discussion amongst them; it's as if they're gathering the courage to strike. For a moment it seems as if this will be easier than you thought.\n\nBut only for a moment.\n\nAnd then the bulk of the Saxon force emerge from the mist at the valley's head, a wall of metal, leather and wood. You hear chanting, cursing, the roar of insults, their warriors working themselves up into a frenzy.\n\n\"Here they come,\" murmurs ${Emrys} from beside you.\n\nThe massive force starts to advance, gathering speed, forming into an arrowhead to break your lines. They push forward relentlessly, despite the broken landscape—a slow, implacable march. You can pick out individual faces, scarred, pale-eyed, determined.\n\nAnd then, a hundred feet from your lines, they surge forward with a roar and tear towards your troops. Thrown axes and arrows scatter some of your ${men}; then the vanguard hit. At their head you see a knot of tall, flaxen-haired warriors—in their center strides ${Cerdic}, face grim. They plough through the mud and mire by sheer brute strength and will, great axes rising and falling.\n\n*if chapter11_final_fight\u003c=2\n\t*page_break\n\tYour ${men} stand their ground as best they can, but it seems there's nothing they can really do; the Saxon force is so large compared to yours that it can just keep coming forward down the valley, surge by surge, driving you back.\n\t\n\tA roar goes up from the right flank as you see \n\t*if chapter10_gorlaes_allies\n\t\t$!{King} ${Gorlaes}'s\n\t*if chapter10_gorlaes_allies=false\n\t\t${Gawain}'s\n\t${men} burst from their concealment and throw themselves at the foe. Moments later, the same on the left flank, as\n\t*if chapter6_cadells_men\n\t\t$!{King} ${Cadell}\n\t*if chapter6_cadells_men=false\n\t\t${Cai}\n\tunleashes ${his} troops. The Saxon charge falters momentarily, but then the line simply rolls forward towards you; you can't make out the flanks, but it seems to trouble the Saxons only a little that you are attacking them on three sides. There are simply too many of them; you're outmatched.\n\t\n\t*goto part5_deathbycynric\n\nA roar goes up from the right flank as you see \n*if chapter10_gorlaes_allies\n\t$!{King} ${Gorlaes}'s\n*if chapter10_gorlaes_allies=false\n\t${Gawain}'s\n${men} burst from their concealment and throw themselves at the foe. The Saxon advance slows, staggered, surprised. Moments later on the left flank you hear\n*if chapter6_cadells_men\n\t$!{King} ${Cadell}\n*if chapter6_cadells_men=false\n\t${Cai}\nshout, and ${his} warriors hammer into the Saxons from the side.\n\nIt shocks the Saxon charge, and you are able to take a breath and push forward with your own force. You surround them on three flanks, now, and if you can just hold them here…\n\nBut a shout goes up from ${Cerdic}, and the Saxon front line rolls forwards through your ${men}, axes cutting. Then a roar goes up, and it turns into a full-blown charge. You find yourself hand-to-hand amongst the fray.\n\t\n*goto part5_frontline\n*comment --------------------------------------------------------------\n*label part5_smash\nThe Saxon scouts swiftly spot your banners, and you can see discussion amongst them; it's as if they're gathering the courage to strike. For a moment it seems as if this will be easier than you thought.\n\nBut only for a moment.\n\nAnd then the bulk of the Saxon force emerge from the mist at the valley's head, a wall of metal, leather and wood. You hear chanting, cursing, the roar of insults, their warriors working themselves up into a frenzy.\n\n\"Here they come,\" murmurs ${Emrys} from beside you.\n\nThe massive force starts to advance, gathering speed, forming into an arrowhead to break your lines. They push forward relentlessly, despite the broken landscape; a slow, implacable march. You can pick out individual faces, scarred, pale-eyed, determined.\n\nAnd then, a hundred feet from your lines, they surge forward with a roar and tear towards your troops. Thrown axes and arrows scatter some of your ${men}; then the vanguard hit. At their head you see a knot of tall, flaxen-haired warriors—in their center strides ${Cerdic}, face grim. They plough through the mud and mire by sheer brute strength and will, great axes rising and falling.\n\n*if chapter11_final_fight\u003c=2\n\t*page_break\n\tYour ${men} stand their ground as best they can, but it seems there's nothing they can really do; the Saxon force is so large compared to yours that it can just keep coming forward down the valley, surge by surge, driving you back. There are simply too many of them; you're outmatched.\n\t\n\tSome of your troops try to pull back, to regroup, ${Gawain} shouting at them. Some scatter.\n\t*goto part5_deathbycynric\n\nYou give a command, a horn is sounded, and your troops push forward in response, to meet the onslaught. On your left, \n*if chapter10_gorlaes_allies\n\t$!{King} ${Gorlaes}'s\n*if chapter10_gorlaes_allies=false\n\t${Gawain}'s\n${men} succeed in pushing back the Saxon charge somewhat, breaking up their line. On your right, arrows arc upwards as\n*if chapter6_cadells_men\n\t$!{King} ${Cadell}\n*if chapter6_cadells_men=false\n\t${Cai}\ngives the order, and ${men} fall in the center of the Saxon lines.\n\nBut a shout goes up from ${Cerdic}, and the Saxon's line rolls forwards through your ${men}, axes cutting. Then a roar goes up, and it turns into a full-blown charge. You find yourself hand-to-hand amongst the fray.\n\n*goto part5_frontline\n*comment --------------------------------------------------------------\n*label part5_deathbycynric\nYou find yourself bogged down, unable to move fast enough as Saxon arrows catch ${men} around you.\n\n${Cai} falls with an arrow in ${his} throat.\n\n${Emrys} throws up a hand; you glimpse powder and a flame, and then light erupts in front of ${Cerdic}. The big ${man} howls like a wounded bear, shaking it off; you can see scorched flesh. $!{He} struggles to charge; then ${Gawain} is on ${him}.\n\nYou throw yourself forward into the fray, but something slams into you from the side, whip-quick and lean, claws extended. You don't feel the pain, but your sword falls from nerveless fingers. You look down to see great gouts of blood spewing from a hole in your side.\n\n${Cynric} licks ${his} fingers, eyes black as a raven's wing. \"Well met, ${Arthur} ${ap} ${Uther}.\"\n\n*gosub_scene startup get_lover\n\nYour strength is failing you; you stagger and fall to your knees.\n\n\"No!\"\n*if lover=\"emrys\"\n\t${Emrys} throws ${himself} in front of you. ${Cynric} lashes out; ${Emrys} coughs, breath bubbling in ${his} throat.\n*if lover!=\"emrys\"\n\t${Gawain} throws ${himself} in front of you. ${Cynric} lashes out; ${Gawain} coughs, breath bubbling in ${his} throat.\n\nAs the light fades, you see ${Cynric}'s fangs lengthen and ${his} jaw reshape.\n\nAnd the last thing of all is pain.\n\n*goto_scene startup early_death_vision\n*comment --------------------------------------------------------------\n*label part5_frontline\n\t\n*if chapter11_final_fight\u003c=4\n\t*goto part5_aeron\n\n*page_break\n\n*if chapter11_king=\"bedwyr\"\n\t$!{King} ${Bedwyr} pushes \n*if chapter11_king!=\"bedwyr\"\n\tYou push\nyour ${men} forward through the struggling bodies, cutting right and left, making a gap. Saxons fall. Britons fall. But you've slowed their advance; the Saxon pace falters and the reeds start to darken with blood.\n\n*if chapter11_final_fight\u003c=7\n\t*goto part5_aeron\n\nAnd then the hammerblow strikes. A great shout goes up from your troops as\n*if (chapter7_duncans_men and chapter7_lots_men)\n\tthe ${men} of Strathclyde and Lothian, the joint banners of ${Duncan} and ${Lot} fluttering above them, \n\t*goto part5_northmen\n*elseif (chapter7_lots_men)\n\tthe ${men} of Lothian, $!{King} ${Lot}'s banner fluttering above them,\n\t*goto part5_northmen\n*else\n\tyour reserves\n\t*goto part5_northmen\n*label part5_northmen\nslam into the Saxons from the left flank. They'd been concealed in a low-lying hollow, and are no doubt soaked to the skin, but they pour their rage and frustration into their attack on ${Cerdic}'s ${men}. You see the big Saxon look around wildly; there's shock on ${his} face. You press forward into the fight.\n\t\n*goto part5_aeron\n\t\n*comment --------------------------------------------------------------\n*label part5_aeron\n\n*page_break\n\n*gosub_scene startup get_lover\n\nIt's bloody work. You're learning, and learning fast, that a carefully planned order of troops on a field means nothing when you're in the middle of mud, blood and chaos. You can't see who's moving where; you've no idea where any flank is, nor yet who has the upper hand.\n\n*if chapter11_aerons_men\n\t${Emrys} is beside you—${he} grabs your arm. \"There, look—${Aeron}!\"\n\t\n\tYou can see the\n\t*if chapter11_high_king=\"Aeron\"\n\t\tHigh $!{King}-to-be\n\t*if chapter11_high_king!=\"Aeron\"\n\t\t$!{King}\n\tmaking quick, snake-like strikes with ${his} spear, holding ${his} shield high, ${his} banner${men} around ${him} as they force a route towards ${Cerdic}. You see ${Aeron} hurl words at the Saxon leader as the two meet, but you can't hear them over the noise.\n\t\n\tThere's a parting of the throng; space is made between the two, space to fight. ${Aeron} throws off ${his} fur cloak, hefts ${his} shield, and steps forward, spear at the ready.\n\t\t\n\t${Cerdic}'s axe swings around in a deceptive double-loop, brutally fast. The first impact smashes the spear wide. The second hacks a good six inches into ${Aeron}'s shoulder. You don't hear the snap of bone, but you see the look on the $!{King}'s face. Blood spurts.\n\t\t\n\tThe Saxons cheer as ${Aeron} falls to the ground; they renew their assault.\n\nThe world collapses into a narrow-focused view of rain, mud, blood and flashing metal. You duck, parry, knock spears aside; you feel an arrow cut your cheek.\n*if chapter9_item_arthur=\"sword\"\n\tCaledfwlch, in your hand, sings and chimes as it clatters off steel, its keen edge biting deep into flesh.\n*if chapter9_item_arthur!=\"sword\"\n\tYour sword plunges into flesh, spilling gore across the field; your hands are red to the elbow.\nYou've been forced away from ${Cerdic}. You find yourself facing a pair of tattooed ${men} who could be twins; tall, fair, well-muscled, faces and necks painted with blood. Each is armed with a short spear and an axe, and it's all you can do to stay alive.\n\n*if warrior>60\n\tYou manage to block and then duck their blows, scrambling through the mud, but Saxons are pushing forward to either side of you; you're in danger of being cut off.\n\t\n*if warrior\u003c=60\n\tThey're too much for you; you find yourself stumbling backwards, blood oozing from a painful gash to your ribs.\n\t\n*if chapter7_malcolm_saved\n\t*set chapter11_final_fight +1\n\tThen a shout goes up around you: \"${Arthur}! ${Arthur}!\" The Saxons are pushed away from you in a sudden onslaught; you recognize none of the ${men} around you. One slaps you on the back. \"Good to see you upright!\" It's ${Malcolm}, the ${man} you rescued from the snow in Lothian. \"I heard you were having a feast, and didn't want to miss it. Brought some friends.\"\n\t\n\t\"You are most welcome,\" you manage.\n\t*goto part5_mesmer\n*else\n\tThen there's a burst of light. Your attackers shriek and leap back. ${Emrys} stands over you dramatically, holding ${his} hand high. Another ${man} pulls you to your feet; ${Emrys} steps back to you, tucking a small leather bag back into ${his} tunic. $!{He} gives you a brief smile.\n\t*goto part5_mesmer\n\t\n*label part5_mesmer\n\nThen everything slows. It's as if you've run into treacle, as if something's binding your arms. You see\n*if chapter7_malcolm_saved\n\t${Malcolm}'s\n*if chapter7_malcolm_saved=false\n\t${Emrys}'s\nshocked look; you see the same look on the faces of the ${men} around you. Faces whiten; swords drop from nerveless hands. You look up, and then you see ${him}. ${Cynric} stands in the heart of the Saxon throng, ${his} companions around ${him}, ${his} head lowered, ${his} arms raised as if pushing against a great weight. You see the glitter of ${his} black eyes.\n\nThe weight settles on you, crushing your breath. You can feel ${men} falling back. \"Sorcery!\" gasps ${Emrys}. \"Fight it, fight it, ${Arthur}! You can rally them!\"\n\n*choice\n\t*if (chapter9_item_arthur=\"banner\") #I raise ${Ambrosius}'s banner.\n\t\tYou turn with agonizing slowness and seize the banner from the ${man} next to you. As your fingers touch the haft, you feel lighter; as you raise it you suck in air and give a great shout. \"Gwynedd!\"\n\t\n\t\tWith the air leaving your lungs, the weight is gone. \"Gwynedd!\" you shout again. Ragged cries go up around you. \"Pendragon!\" comes the shout. \"The Pendragon for Gwynedd!\"\n\t\n\t\tIt's enough. You see a black look of fury from ${Cynric} as your ${men} turn and stand firm.\n\t\t*goto part5_cynric\n\t\t\n\t#I'll raise a battle cry.\n\t\t*if ((leader>=50) or (chapter11_final_fight>=5))\n\t\t\t\"Gwynedd!\" You struggle with the word at first, but try again, pulling at reserves deep inside you, forcing away the weight, using your voice as a weapon to batter against this barrier. \"Gwynedd!\"\n\t\t\t\n\t\t\tYou hear one or two voices around you rise, stumbling, wrapping thick tongues around the syllables. But it comes, of a sudden, it's there, and the shout goes up; ragged, but building in volume. Together you throw off the weight of the spell. You see a black look of fury from ${Cynric} as your ${men} turn and stand firm.\n\t\t\t*goto part5_cynric\n\t\t*else\n\t\t\t\"Gwynedd,\" you attempt, but your tongue is thick and heavy and what comes out is more of a hiss. You reach deep and try again, but there's nothing; your ${men} are stumbling away. You catch ${Cynric}'s look of black glee as the Saxon line starts to advance on you.\n\t\t\t*goto part5_morgan\n\t\t\t\n\t#I'll lead by example, and try to charge into the foe.\n\t\t*set track_champion +1\n\t\t*if (track_champion>=6)\n\t\t\t*achieve champion\n\t\t*if ((warrior>=50) or (chapter11_final_fight>=5))\n\t\t\tYou throw yourself forward, every muscle straining. Lead-heavy limbs answer, sluggishly, the mud dragging at your feet. But that's one step; then another. You grit your teeth, and expend every effort in raising your sword. It moves, slowly; your next breath becomes a roar as you push on, push on. You're aware that others around you are moving with you. Your roar becomes a shout.\n\t\t\t\n\t\t\tAnd then something snaps, and you are charging. You catch a black look of fury from ${Cynric} as you hammer into the fray.\n\t\t\t*goto part5_cynric\n\t\t*else\n\t\t\tYou lunge forward, or you try to, but your limbs are as heavy as lead. The mud drags at your feet, the sword in your hand pulls your arm downwards…your body just won't obey you. Around you, ${men} are stumbling away. You catch ${Cynric}'s look of black glee as the Saxon line starts to advance on you.\n\t\t\t*goto part5_morgan\n\t\t\t\n\t#I'll invoke the name of God.\n\t\t*if ((old_faith\u003c=50) or (chapter8_dyfrig_ally))\n\t\t\tYou open your mouth, but nothing comes. You raise your hand and sluggishly trace a cross, and try again. The first words of the Signum Crucis struggle out from your lips. \"In nomine Patris…et Filii…\"\n\t\t\t\n\t\t\t*if chapter8_dyfrig_ally\n\t\t\t\tAnd then you hear another voice, near you, chanting the same words. ${Dyfrig}, ${his} cross held high. \"…et Spiritus Sancti!\" Something snaps, and the two of you together shout \"Amen!\" With the last word you raise your sword and rush forward, ${Dyfrig} beside you, catching a black look of fury from ${Cynric}.\n\t\t\t\t*goto part5_cynric\n\t\t\t*else\n\t\t\t\tAnd then something snaps, and the rest of the words rush out. \"…et Spiritus Sancti!\" With the last word you raise your sword and rush forward, catching a black look of fury from ${Cynric}. \"Amen!\"\n\t\t\t\t*goto part5_cynric\n\t\t*else\n\t\t\t\"In nomine…\" you attempt, but your tongue is thick and heavy and what comes out is more of a hiss. You reach deep and try again, but there's nothing; your ${men} are stumbling away. You catch ${Cynric}'s look of black glee as the Saxon line starts to advance on you.\n\t\t\t*goto part5_morgan\n\t\t\t\n\t#I'll call on the Old Gods.\n\t\t*if ((old_faith>=50) or (chapter11_final_fight>=5))\n\t\t\tYou open your mouth, but nothing comes. You gather your strength, picture the White Lady, draw from deep inside you, and try again. Words struggle from your lips. \"Beli…Mawr…bright…Arianrhod…\"\n\t\t\n\t\t\tAnd then something snaps, and the rest of the words rush out. \"…in Gwydion's name, and by the name of the Dark ${Mother}! Forward, ${men} of Gwynedd!\" With the last word you raise your sword and rush forward, catching a black look of fury from ${Cynric}. \"Gwynedd!\"\n\t\t\t*goto part5_cynric\n\t\t*else\n\t\t\t\"Bright Arianrhod…\" you attempt, but your tongue is thick and heavy and what comes out is more of a hiss. You reach deep and try again, but there's nothing; your ${men} are stumbling away. You catch ${Cynric}'s look of black glee as the Saxon line starts to advance on you.\n\t\t\t*goto part5_morgan\n\t\n*comment --------------------------------------------------------------\n*label part5_morgan\n*page_break\n*set chapter11_final_fight -1\n\nThere's nothing you can do. You struggle to throw off the weight, but it's futile. You see axes fall, and your ${men} start to fall with them.\n\nAnd then a flicker from the corner of your eye. [i]Behind[/i] ${Cynric}.\n\nThe tall, shaven-headed, tattooed Saxon next to ${Cynric} cries out, and staggers. The weight bearing down on you lessens just a little…and you see an arrow has sprouted from ${his} shoulder. A second one punches ${him} from ${his} feet and ${he} slumps.\n\nAmongst the Saxon ranks, a figure in Saxon leathers, stained with blood and mud, drops ${her_his} bow and makes a run for ${Cynric}, bright knife flashing. ${Morgan}. $!{She} ducks a blow levelled at ${her_him} by one of ${Cynric}'s companions and slides through the mud underneath, cutting at a hamstring. The ${man} screams and goes down.\n\nYou see ${Cynric}'s eyes snap into awareness as the crushing weight suddenly vanishes. $!{He} turns, and slaps ${Morgan} aside contemptuously. You see blood spray.\n\nBut you are free. \"Gwynedd!\" you shout and charge towards the Saxon sorcerer.\n\n*goto part5_cynric\n*comment --------------------------------------------------------------\n*label part5_cynric\n*page_break\n\n*if (chapter11_final_fight\u003c3)\n\tBut you can't even reach ${Cynric}. The Saxon line is cutting your force apart; you realize that you've been flanked, that the Saxon force surrounds you on all sides. You just don't have enough ${men}. You hear ${Gawain} yell out in anger from somewhere off to your right, and you think you catch sight of ${his} red hair, but then rain gets in your eyes. You shoulder-barge someone out of the way, dashing the water from your eyes, and then someone lances a sword into your back.\n\t\n\tYou stumble and fall.\n\t\n\t\"No!\" From somewhere, you can hear\n\t*if interest=\"emrys\"\n\t\t${Emrys}.\n\t*if interest=\"morgan\"\n\t\t${Morgan}. ${Morgan}, here?\n\t*if interest=\"gawain\"\n\t\t${Gawain}.\n\t\n\tYou struggle to your feet, feeling a warm, stinging pain in your back. ${Cynric} stands in front of you, eyes black, grin wolf-like. $!{He} nods ${his} head to you—it's almost like a formal bow—and then steps forward.\n\t\n\t*if chapter9_item_arthur=\"sword\"\n\t\tYou have Caledfwlch. You raise it—the blade gleams bright, despite the mud and gore. ${Cynric} eyes it, shrugs, and raises a three-clawed hand.\n\t\t\n\t\tThree arrows punch into your chest.\n\t\t\n\t\tAnd the rest is only pain.\n\t\t*goto_scene startup early_death_vision\n\t*else\n\t\tYou raise your sword. ${Cynric} opens ${his} hand to you, eyes intent on you, and then makes a sudden fist. Your fingers twitch and spasm open, and your blade falls to the mud.\n\t\t\n\t\t$!{His} claws punch deep under your rib cage. Something inside you bursts. A second slash takes your throat.\n\t\t\n\t\tAnd the rest is only pain.\n\t\t*goto_scene startup early_death_vision\n\t\t\n*comment --------------------------------------------------------------\n\nThere's a gap in the fighting, a moment's pause, as you dispatch an opponent and kick ${him} off your blade.\n\nIn front of you stands ${Cynric}, claws dripping gore, long braid writhing around ${his} shoulders almost as if it's alive.\n\nYour eyes meet ${his_hers}. There's nothing human in them, not any more; just deep voids, holes into emptiness. As you start towards ${him}, the nothingness grows, settling like a chill into your limbs, sapping your strength. $!{He} smirks, raising ${his} hands and curling in ${his} fingers; you can feel their pull on your tendons. The same dark wave, draining the will from you, the same sorcerous power. But this time it is solely focused on you.\n\n*if chapter9_item_arthur=\"sword\"\n\tYour fingers clench around your sword as you try to resist the compulsion. You see ${his} eyes flick down to your hand, and a small crease of doubt appear.\n\t\n\tThe sword. Caledfwlch. [i]$!{He}'s scared of the sword.[/i]\n\t\n\tWith an effort of will you grasp it and raise it. Sweat beads form on ${his} brow—${his} eyes fix on yours, trying to hold you. And then something snaps and the weight on your limbs vanishes. You hear ${him} cry out as you lunge at ${him}; Caledfwlch draws a line of blood across ${his} chest. $!{He} shrieks.\n\t\n\t*if ((warrior>=40) or (chapter11_final_fight>=5))\n\t\t*set acclaim %+15\n\t\t*set chapter11_killed_cynric true\n\t\tThere are Saxons launching themselves at you from all sides; but this is your chance, perhaps your one chance. You knock aside a wild swing with the rim of your shield, duck low and dodge a spinning axe, then pivot on one heel, throwing yourself around in an unexpected spin that has your attackers jumping back in surprise. You come out of it with Caledfwlch angled upwards—${Cynric} shreds your shield with a panicked blow, but your blade takes ${him} low in the gut.\n\t\t\n\t\tYou rip the sword through ${his} belly and out to the side. $!{He} blinks in disbelief. You see the black eyes glaze over as ${he} falls.\n\t\t\n\t\tThen ${Gawain} is with you, driving back the Saxons—and ${Bedwyr} is by your side.\n\t\t*goto part6\n\t*else\n\t\tThere are Saxons launching themselves at you from all sides; but this is your chance, perhaps your one chance. You knock aside a wild swing with the rim of your shield and duck low, ready to leap forward. But something catches you high on your helm, stunning you for a moment—a thrown axe—and your heel slips out from under you and you go down.\n\t\t\n\t\t\"No!\" From somewhere, you can hear\n\t\t*if interest=\"emrys\"\n\t\t\t${Emrys}.\n\t\t*if interest=\"morgan\"\n\t\t\t${Morgan}. ${Morgan}, here?\n\t\t*if interest=\"gawain\"\n\t\t\t${Gawain}.\n\t\t\t\n\t\tAnd then there is ${Cynric}, and only pain.\n\t\t*goto_scene startup early_death_vision\n\t\t\n*if chapter9_item_bedwyr=\"sword\"\n\t\"No!\" A figure cuts down two of ${Cynric}'s Saxons; you hear a shriek of pain from one of them. ${Cynric} looks up. It's ${Bedwyr}, sword bloody. ${Cynric} smiles lazily and raises a clawed hand.\n\t\n\t${Bedwyr} stares at you and back at ${Cerdic}'s ${son}. You know that any moment ${he}'ll fall under ${Cynric}'s spell. But nothing happens.\n\t\n\tThen you see ${Cynric}'s eyes fall to the sword ${Bedwyr} carries. Caledfwlch, the sword of ${Maximus}.\n\t\n\t[i]$!{He}'s scared of the sword![/i] you try to tell ${Bedwyr}. You can see it in the Saxon's eyes.\n\t\n\t*if rel_bedwyr>=30\n\t\t${Bedwyr} lunges forward as ${he} realizes the same thing. Saxons leap at ${him}—${he} knocks aside one wild swing and ducks under a spinning axe, then throws ${himself} at ${Cynric}. ${Cynric}'s claws rake down ${Bedwyr}'s side;\n\t\t*if chapter11_bedwyr_rival\n\t\t\tthere's a crunch as ${Bedwyr} brings up ${his} metal hand into ${Cynric}'s face.\n\t\t*if chapter11_bedwyr_rival=false\n\t\t\t${Bedwyr} falls back with a gasp, flailing with the stump of ${his} left arm, but managed to catch ${his} balance.\n\t\tAnd then ${he} drives Caledfwlch deep into ${Cynric}'s gut and rips it out sideways.\n\t\t\n\t\tThe hold on you breaks.\n\t\t\n\t\t$!{Cynric} blinks in disbelief. You see the black eyes glaze over as ${he} falls.\n\t\t\n\t\tYou can move. You leap forward to aid ${Bedwyr}. And then ${Gawain} is with you, driving back the Saxons.\n\t\t*goto part6\n\t*else\n\t\t${Bedwyr} licks ${his} lips, seemingly nervous. [i]Come on,[i] you try to tell ${him}.\n\t\t\n\t\t${Cynric}'s gaze is on your half-${brother} as ${he} reaches out with a clawed hand to your throat. Then, of a sudden, ${he} laughs, a guttural, bestial sound. \"I understand why you wait,\" ${he} says. \"${Arthur} dies at my hands, and there is no blame on you.\"\n\t\t\n\t\t${Bedwyr} won't look at you. \n\t\t\n\t\t\"Very well,\" says ${Cynric}. $!{His} hand moves faster than thought, and suddenly you have no throat, and blood is choking up through your lips.\n\t\t\n\t\tClaws enter up through your belly and into your lungs. Something bursts inside you.\n\t\t\n\t\t\"No!\" From somewhere, you can hear\n\t\t*if interest=\"emrys\"\n\t\t\t${Emrys}.\n\t\t*if interest=\"morgan\"\n\t\t\t${Morgan}. ${Morgan}, here?\n\t\t*if interest=\"gawain\"\n\t\t\t${Gawain}.\n\t\t\t\n\t\tAnd then there is ${Cynric}, and pain, and the look in ${Bedwyr}'s eyes.\n\t\t*goto_scene startup early_death_vision\n*else\n\t*if ((leader>50) or (chapter11_final_fight>=5)) \n\t\t*set chapter11_killed_cynric true\n\t\t\"No!\"\n\t\t\n\t\tA thrown spear knocks one of ${Cynric}'s companions from ${his} feet, and then ${Gawain} is there, hammering ${his} sword down toward ${Cynric}. The compulsion on you snaps as ${Cynric} throws ${himself} backwards out of the way. \"Now, ${Arthur},\" shouts ${Emrys} from somewhere behind you, and you run to help ${Gawain}, your limbs free of the weight.\n\t\t\n\t\tTwo ${men} stand in your way; ${Gawain} takes one with an elbow to the throat. You cut the other down with a slash across ${his} thighs and then a sword to ${his} neck as ${he} folds.\n\t\t\n\t\t${Cynric} throws ${himself} bodily at ${Gawain} like a dog leaping at a bear's throat. ${Gawain} tears at ${him} with heavy hands, trying to rip ${him} free. You stab out at ${Cynric}, catching ${him} across ${his} back, but ${he} doesn't seem to notice, so lost is ${he} in rage. You hear a gasp from ${Gawain} as claws sink between ${his} ribs; the two roll back and forward like animals in a pit.\n\t\t\n\t\tYou narrowly avoid being skewered by a spear wielded by a Saxon ${woman}; then, as you fight ${her_him} off, ${she} suddenly drops with a gasp. ${Cai} staggers forward from behind ${her_him}, blood staining ${his} tunic, a knife in ${his} hand. \"Hello, $!{brother},\" ${he} says, eyes mazed. \"I think someone hit me.\" Then: \"Look out!\"\n\t\t\n\t\tYou move. ${Cynric}'s claws catch you high on the shoulder, shredding your mail, scoring deep into your flesh. You roll and turn; as you come up, you bury your sword in ${Cynric}'s gut.\n\t\t\n\t\t$!{He} stiffens, bestial face contorting.\n\t\t\n\t\tYou tug the sword sideways and rip it out. Gore spills. $!{He} staggers back, shaking ${his} head.\n\t\t\n\t\tThen ${Gawain}'s blade bursts from the front of ${his} chest, ${his} black eyes glaze over, and ${his} mouth goes slack.\n\t\t*goto part6\n\t*else\n\t\tYou summon every fiber of will you have and try to break the compulsion. But the eyes just draw you in; you can feel them, even with your own eyes shut. You stumble forwards.\n\t\n\t\t\"No!\" From somewhere, you can hear\n\t\t*if interest=\"emrys\"\n\t\t\t${Emrys}.\n\t\t*if interest=\"morgan\"\n\t\t\t${Morgan}. ${Morgan}, here?\n\t\t*if interest=\"gawain\"\n\t\t\t${Gawain}.\n\t\t\t\n\t\tThere's a sudden pain as someone lances a sword into your back. You twist aside, sluggishly, slowly, agony spiking; and ${Cynric} stands in front of you, eyes black, grin wolf-like. $!{He} nods ${his} head to you—it's almost like a formal bow—and then steps forward.\n\t\t\n\t\tYou raise your sword. ${Cynric} opens ${his} hand to you, eyes intent on you, and then makes a sudden fist. Your fingers twitch and spasm open, and your blade falls to the mud.\n\t\t\n\t\t$!{His} claws punch deep under your rib cage. Something inside you bursts. A second slash takes your throat.\n\t\t\n\t\tAnd the rest is only pain.\n\t\t*goto_scene startup early_death_vision\n\t\t\n*comment --------------------------------------------------------------\n*comment                   Part 6: Saxons Parley\n*comment --------------------------------------------------------------\n*label part6\n*set chapter11_cynric_dead true\nThe cry goes up. \"$!{He} is dead! ${Cynric} is dead!\"\n*page_break\n*if chapter11_killed_cynric\n\t*achieve kill_cynric\n\"Halt! Hold!\" It's a shout that echoes across the field, and is taken up by Saxon voices. You see some Saxons spit and throw down weapons. And then there is ${Cerdic}, greying hair loose around ${his} shoulders, striding across the field, face stone. Others fall back to allow ${him} to pass.\n\nBritons turn to look at you, uncertain what to do.\n\nThe old warrior plants ${his} axe in front of you; this is no surrender, no bowing of the knee. This is a proud ${man}. $!{He} looks down at ${his} ${son}.\n\n\"$!{He} lives yet,\" says ${Emrys} softly. \"But there is no saving ${him}.\"\n\n${Cerdic} nods ${his} head. You catch a moment where there are tears in ${his} eyes, but ${he} blinks them back. \n*if chapter11_king=\"arthur\"\n\t$!{He} looks directly at you. \"Grant me leave to take my ${son} from this field. My people will come with me. This fight is over.\"\n\t*choice\n\t\t#\"Granted. Take your ${son}, take your ${men}, and go in peace.\"\n\t\t\t*goto part6_allow_depart\n\t\t#\"You may leave, with your ${son}, but only after you have sworn an oath of fealty to Gwynedd.\"\n\t\t\t*goto part6_oath\n\t\t#\"$!{He} was only one ${man}. Many have died. Many more will do so. This fight is not over.\" I order the Britons to attack.\n\t\t\t*goto part6_attack\n*else\n\t$!{He} looks at ${Bedwyr}. \"Grant me leave to take my ${son} from this field. My people will come with me. This fight is over.\"\n\t\n\t${Bedwyr}, shaken, turns to you. \"What do you think?\" ${he} says quietly.\n\t*choice\n\t\t#\"Let them go. The demon that drove them is dead.\"\n\t\t\t${Bedwyr} swallows, and then nods. $!{He} straightens up. \"Aye. It's granted. Take your ${son}, take your ${men}, and go.\"\n\t\t\t*goto part6_allow_depart\n\t\t#\"Let ${him} go, but only if ${he} swears fealty.\"\n\t\t\t${Bedwyr} nods. \"Aye, well thought.\" $!{He} straightens up and raises ${his} voice. \"You may leave, with your ${son}, but only after you have sworn an oath of fealty to Gwynedd.\"\n\t\t\t*goto part6_oath\n\t\t#\"We have the advantage. This fight isn't over. Fight on—this is our chance to strike a blow at the Saxons they will never forget.\"\n\t\t\t${Bedwyr} nods. $!{He} straightens up and raises ${his} voice. \"This fight is not over, ${Cerdic}. Return to your ${men}, and pick up your sword.\"\n\t\t\t*goto part6_attack\n\t\t\t\n*comment --------------------------------------------------------------\n*label part6_allow_depart\n\n*set acclaim %+15\n\n${Cerdic} inclines ${his} head. \"You have my thanks. We will not trouble your borders, I swear it.\"\n\nWith that, as ${his} ${men} gather around ${him}, ${he} kneels, and picks up the stricken ${Cerdic} as if ${he} were a child. $!{He} turns, and walks away through the churned earth and the broken bodies. In silence, many Saxons follow. Others turn to attend their fallen companions.\n\n${Cai} lets air hiss through ${his} teeth. \"I'm not sure what just happened there, $!{brother}. But…well…I think we won?\"\n*goto part7\n\t\n*comment --------------------------------------------------------------\n*label part6_oath\n\n${Cerdic}'s face goes rigid; there's an unhappy muttering from the ranks of the Saxons. $!{He} closes ${his} eyes—you can see ${him} visibly controlling ${himself}.\n\n*if ( ((acclaim>50) and (diplomat>50)) and (chapter11_final_fight>=6) )\n\t*set chapter11_cerdic_oath true\n\t${Cerdic} opens ${his} eyes. \"To extract an oath of fealty of a ${man} over the body of ${his} ${son}—that is a hard, hard thing. Yet even were we to fight on, this day is lost to us, I deem. I seek only life, shelter, and freedom for my people. If you will swear, by all your gods, to uphold that—then I will bow the knee.\"\n\t\n\tThere's shock amongst the Saxons behind ${him}.\n\t\n\t*if chapter11_king=\"bedwyr\"\n\t\t${Bedwyr} nods slowly. \"Very well, ${Cerdic}. Swear to me, and I will swear by all my gods that so long as your people raise no weapon against the people of Gwynedd, there shall be land and shelter for you on our Eastern border.\"\n\t*if chapter11_king=\"arthur\"\n\t\t\"Very well, ${Cerdic}. If you swear to me here and now, I in my turn will swear by\n\t\t*if old_faith\u003c50\n\t\t\tGod Almighty\n\t\t*if old_faith>=50\n\t\t\tArianrhod and Gwydion\n\t\tthat so long as your people raise no weapon against the people of Gwynedd, there shall be land and shelter for you.\"\n\t\n\tThe old Saxon lowers ${himself} to ${his} knees, takes\n\t*if chapter11_king=\"bedwyr\"\n\t\t${Bedwyr}'s\n\t*if chapter11_king=\"arthur\"\n\t\tyour\n\thand, lays ${his} forehead against it and, before the assembled host of Saxons and Britons, swears ${himself} to the banner of Gwynedd and to\n\t*if chapter11_king=\"bedwyr\"\n\t\t${Bedwyr}'s\n\t*if chapter11_king=\"arthur\"\n\t\tyour\n\trule.\n\t\n\tThen ${he} rises, picks up the body of ${his} ${son}, cradling ${him} like a child, and walks from the field, ${his} ${men} at ${his} back.\n\t\n\t${Cai} lets air hiss through ${his} teeth. \"That…that was not what I expected.\"\n\t*goto part7\n*else\n\t${Cerdic} opens ${his} eyes. \"To extract an oath of fealty of a ${man} over the body of ${his} ${son}; to try to use that grief, when your own army cannot hope to win—that is a shameful thing. Even were I to consider bending the knee to a Briton, by your actions you've shown you are unfit to rule. I offered peace, and you throw it in my face. Very well.\" $!{He} hefts ${his} spear. \"Run, $!{King} of Gwynedd. Run, lest my axe find your neck.\"\n\t\n\tA shout goes up from the Saxons. This battle is far from over.\n\t*goto part6_fight2\n\t\n*comment --------------------------------------------------------------\n*label part6_attack\n*set diplomat %-15\n*set warrior %+15\n\n${Cerdic}'s face is hard as stone. \"Very well. Let there be no peace until every one of you is a rotting corpse on this field.\"\n\n*goto part6_fight2\n*comment --------------------------------------------------------------\n*label part6_fight2\n\n${Cerdic} is first into the renewed fray. $!{He} pulls ${his} long-handled axe around ${him} in long looping arcs; the first splits a ${man}'s shield, the second ${his} skull. You and ${Cai} race forward, and then the world becomes a tight chaos of blade and body.\n\n*if (chapter11_final_fight>=6)\n\t*set chapter11_cerdic_dead true\n\tIt seems to stretch forever. You take wounds you're unaware of until the moment you see a flap of skin loose, or find blood making your grip unsure. You wound ${men}, you kill them, but you couldn't say how many, or which fell to your blow or those of your companions around you. \n\t\n\tThe mud grows thicker, the rain grows heavier, and the smell of the carrion on the field more rank, as guts are split and bodies pile up.\n\t\n\tAt the last, ${Gawain} seizes your arm. \"It's over! It's over, ${Arthur}.\"\n\t\n\tYou blink, coming back to yourself. Few ${men} near you stand. Bodies lie stricken in the mire, many still moving. You hear crying, whimpering in pain.\n\t\n\tThere's nothing left of a standing Saxon force. Some have surrendered. Others must have fled.\n\t\n\t${Cai}, to your left, is being violently sick. At length ${he} straightens up, wipes ${his} mouth, and says \"I think we've won.\"\n\t*goto part7\n*else\n\tYou lose all sight of which force is victorious. All you can see is the short space in front of you: the thrust of a sword, the parry of a spear, a shield rim catching an arrow; the raging charge of a Saxon beserker, cut down to lie in the mud. The loose flap of skin over your knuckles as your blow goes awry. The sword which pierces your thigh. The fist which smashes into your jaw.\n\t\n\tThe arrow which takes ${Cai} high in the throat.\n\t\n\tThe furious, raging ${Cerdic} whose face and hair drip with mingled blood and tears. The shock as ${his} axe-blow catches your shield and shatters it, throwing it sideways. The impact of the reverse sweep as it hammers into your leg. The cracking of bone.\n\t\n\tThe sound of the axe sweeping through the air.\n\t\n\tThere is nothing more.\n\t*goto_scene startup early_death_vision\n\t\t\n*comment --------------------------------------------------------------\n*comment                   Part 7: Aftermath\n*comment --------------------------------------------------------------\n*label part7\n*page_break\n\n*if chapter11_final_fight>=6\n\t*set track_warlord +1\n\t*if track_warlord>=2\n\t\t*achieve warlord\n\t\t\n*if ((chapter11_cerdic_oath) and (chapter11_high_king!=\"bedwyr\"))\n\t*achieve saxon_peace\n${Emrys} sets to trying to deal with the wounded. You, ${Gawain}, and ${Cai} find yourselves fetching and carrying; helping to lift ${men} from where they lie, if they are in a state for it—helping to dispatch others where there is only mercy left to give them.\n\n*if chapter11_cerdic_dead\n\tThe bodies of ${Cerdic} and ${his} ${son} you set in a place apart. \"It is best to burn them,\" says ${Emrys}. \"It is best to cleanse the foul spirit from ${Cynric}. Such things may linger.\"\n\n*if (chapter11_aerons_men and (chapter11_high_king=\"Aeron\") )\n\t$!{King} ${Aeron}, the High-$!{King}-to-be, also lies dead upon the field. You give orders for a bier to be built. $!{His} kinsfolk will carry ${him} home to Dyfed.\n\t\nWhen your back is aching, and your wounds make your every movement a hardship, ${Bedwyr} comes to you. \"${Vivian} is here,\" ${he} says. \"$!{She} has come from the Isle.\"\n\n\"That was fast,\" says ${Cai}.\n\n\"$!{She} was already here,\" says ${Gawain}. \"I thought I heard ${Morgan} on the field.\"\n\nAnd then here is ${Vivian}, black-cloaked and inscrutable as ever. Beside ${her_him} are two shorter figures, similarly shrouded in darkness. One pulls back ${her_his} hood. It is indeed ${Morgan}, face as stern as ${her_his} ${mother}'s. There's a spattering of blood across ${her_his} cheek.\n*if lover=\"morgan\"\n\t$!{She} doesn't meet your look.\n$!{She} seems pale, exhausted, and ill-at-ease.\n\n*if ((chapter11_high_king!=\"bedwyr\") and (chapter11_high_king!=\"arthur\"))\n\t*if ((acclaim>45) and (chapter11_king!=\"bedwyr\"))\n\t\t*set chapter11_high_king \"arthur\"\n\t\t\"I have taken counsel with the $!{King}s,\" says ${Vivian}. \"Every hall is agreed. To you, ${Arthur} ${ap} ${Uther}, is given the torc of the High $!{King} and the right to raise the banner of the Pendragon.\"\n\t\t\n\t\t*if chapter9_item_arthur=\"torc\"\n\t\t\t\"$!{He} already has the torc,\" mutters ${Cai} with a grin. ${Vivian} shoots ${him} a withering look.\n\t\t\t\n\t\t\"Well,\" says ${Emrys}, with an air of satisfaction. \"There's a thing.\"\n\t\t*goto part7_end_highking\n\t\t\n\t*elseif (chapter11_king=\"bedwyr\")\n\t\t*set chapter11_high_king \"bedwyr\"\n\t\t\"I have taken counsel with the ${king}s,\" says ${Vivian}. \"Every hall is agreed. To you, $!{King} ${Bedwyr} of Gwynedd, is given the torc of the High $!{King} and the right to raise the banner of the Pendragon.\"\n\t\t\n\t\tThere is a moment's silence.\n\t\t\n\t\t\"Well done,\" says ${Cai} brightly. \"Come on, ${Arthur}—you should let ${Emrys} see to those wounds.\"\n\t\t*goto part7_check_exile\n\t*else\n\t\t*set chapter11_high_king \"\"\n\t\t\"There is much to do,\" says ${Vivian}. \"We will aid you.\" $!{She} issues orders to ${her_his} followers, and they join ${Emrys} in bringing succor—or swift death—to the wounded.\n\t\t\n\t\t\"Is that it?\" says ${Cai} to you. \"I thought ${she} was going to, oh, I don't know…give us some sort of lecture about how the gods had blessed us all, or something.\"\n\t\t\n\t\t${Gawain} looks around the gore and death of the field. \"Do you think they have, ${ap} ${Ector}?\"\n\t\t*goto part7_end_summary\n\t\t\n*elseif (chapter11_high_king=\"bedwyr\")\n\t\"It is time, $!{King} ${Bedwyr},\" says ${Vivian}. \"The ${king}s named you High $!{King} of the Briton people. For better or for worse, you are the Pendragon. In this hour, we need leadership, and the command is yours.\"\n\t\n\t${Bedwyr} looks surprised. \"Aye…of course. Let's talk, $!{Lady} ${Vivian}—we'll discuss what needs to be done.\"\n\t*goto part7_check_exile\n\t\n*elseif (chapter11_high_king=\"arthur\")\n\t\"It is time, $!{King} ${Arthur},\" says ${Vivian}. \"The ${king}s named you Pendragon of Britain. For better or for worse, you are the Pendragon. In this hour, we need leadership, and the command is yours.\"\n\t\n\t${Gawain} claps you on the shoulder. \"Come on, my $!{King},\" ${he} says. \"Let ${Emrys} take a look at those wounds. There's much to do.\"\n\t*goto part7_end_highking\n\n*comment --------------------------------------------------------------\n*label part7_check_exile\n*if chapter11_high_king=\"bedwyr\"\n\t*if rel_bedwyr\u003c=40\n\t\t*goto part7_exile\n\t\t\n*goto part7_end_summary\n\n*comment --------------------------------------------------------------\n*label part7_end_highking\n*page_break\n\nThe ceremony is a brief one. \"This, we will repeat at the welcoming of spring,\" says ${Vivian}. \"When the summons are carried to all the kingdoms. When we have time and leisure for feasting. But for now, it is a simple thing—we must have a High $!{King}. And so each $!{King} here will swear fealty to you now.\"\n\nAnd it is that simple.\n\n*if chapter10_geraint_allies\n\t${Geraint} is obsequious in ${his} rush to pledge Dumnonia to you. \n\n*if chapter10_gorlaes_allies\n\t$!{King} ${Gorlaes} has a wry smile for you. \"My liege,\" ${he} says, and then: \"${Ygerna} would be proud, I think.\"\n\n*if chapter7_lots_men\n\t${Agravaine} is grudging, offering a brief oath of alliance in ${his} ${father}'s name, and promising that $!{King} ${Lot} ${himself} will be sending envoys.\n*if (chapter7_lots_men and chapter7_duncans_men)\n\t$!{King} ${Duncan} is far more gracious, and is expansive in pledging you ${his} spears.\n\n*if ((chapter7_lots_men=false) and chapter7_duncans_men)\n\t$!{King} ${Duncan} is expansive in pledging you ${his} spears.\n\n*if chapter6_cadells_men\n\t*if old_faith\u003c50\n\t\t$!{King} ${Cadell} makes a brief speech on the importance of the unity of Christian kingdoms, and seems to count it a personal victory that you are the one ascending the throne.\n\t*if old_faith>=50\n\t\t$!{King} ${Cadell} gives a brief sermon on the importance of tolerance between different religions, and offers to send ${his} own personal priest of Christ to aid in the spring festival.\n\nAnd then it is done. ${Vivian} blesses you in the name of Bran, the Watcher, the Raven.\n\n\"Welcome,\" ${she} says. \"Welcome, ${Arthur} Pendragon.\"\n\n*goto part7_end_summary\n\n*comment --------------------------------------------------------------\n*label part7_end_summary\n*page_break\n\n*if chapter11_high_king=\"arthur\"\n\t*achieve pendragon\n\t\n\"So here we are,\" says ${Cai}, looking round at the rest of you.\n\nYou follow ${his} gaze. \n\n*if lover=\"morgan\"\n\t${Morgan} holds your look with a mix of exhaustion and sadness. \n\t*if chapter2_morgan_pregnant\n\t\t$!{She} has ${her_his} hands clasped across ${her_his} stomach; you can see the slight swelling there now. You look up, and see the rueful twist at the corner of ${her_his} mouth.\n\t*if chapter2_pregnant\n\t\tThen ${she} looks down to where your hand unconsciously rests across your stomach, over the slight swelling. You catch the rueful twist at the corner of ${her_his} mouth.\n*if lover!=\"morgan\"\n\t${Morgan} doesn't look well. You wonder if ${she}'s taken a wound, but if so ${she} betrays nothing of it.\n\t*if chapter2_morgan_pregnant\n\t\t$!{She} has ${her_his} hands clasped across ${her_his} stomach; you can see the slight swelling there now. You catch a slight smile.\n\t*if chapter2_pregnant\n\t\t$!{She}'s looking down to where your hand unconsciously rests across your stomach, over the slight swelling. You catch a slight smile.\n\"So, ${Arthur}. You've come a long way. \n*if chapter11_high_king=\"arthur\"\n\tPendragon of the Britons. ${Ambrosius} would have been proud. But I do not think ${he} would have been surprised.\"\n*if ((chapter11_high_king!=\"arthur\") and (chapter11_king=\"arthur\"))\n\t$!{King} of Gwynedd. ${Ambrosius} would have been proud.\"\n*if ((chapter11_high_king!=\"arthur\") and (chapter11_king!=\"arthur\"))\n\tI think you've proved something today, Warleader. ${Ambrosius} would have been proud.\"\n\n$!{She} inclines ${her_his} head to you, and then turns and walks back towards ${her_his} ${mother}.\n\n\"Wait!\" says ${Cai}, but ${she} doesn't.\n\n\"Let ${her_him} go,\" says ${Emrys}. \"The Isle has ${her_him} now.\"\n*if lover=\"emrys\"\n\t$!{He} rests ${his} hand lightly at the small of your back. \"I will be here. I'd thought to travel, a little; there's someone I should visit. But I think you'll have need of me, and in truth I'd rather stay.\"\n*if lover!=\"emrys\"\n\t*if rel_emrys>50\n\t\t$!{He} smiles. It's a little wistful. \"I had thought to travel, a little; there's someone I should visit. But I think you'll have need of me here, ${Arthur}.\"\n\t*if rel_emrys\u003c=50\n\t\t$!{He} sighs. \"And I think it's time I, too, departed. There's someone I should visit. I think you'll do best without me. Fare well, ${Arthur}.\"\n\t\t\n\t\t\"What is this?\" says ${Cai}. \"Everyone just running off?\"\n\t\t\n\t\t\"There's more to this world than Gwynedd, ${Cai}. You're here, you and ${Arthur}. There's another place for me to be.\"\n\n${Gawain} meets your eyes. Above the neckline of ${his} tunic, you can see bruises. There are cuts on ${his} arms; one ear is bloody, and the knuckles of ${his} right hand are swollen. Lines of sweat run down from ${his} hairline, and there are dark circles under ${his} eyes. \n*if lover=\"gawain\"\n\tAnd then ${he} smiles, and you know everything will be all right.\n*if lover!=\"gawain\"\n\t*if rel_gawain>50\n\t\t$!{He} gives you a tired smile, and then a nod. $!{He} will be staying.\n\t*if rel_gawain\u003c=50\n\t\t$!{He} flexes ${his} swollen fingers uneasily. \"I should make sure of the situation in Lothian.\"\n\t\t\n\t\t${Cai} sighs. \"Not you, too.\"\n\t\t\n\t\t${Gawain}'s expression firms. \"Aye,\" ${he} says. \"I'm not sure there's a place for me here in Gwynedd, not now.\"\n\t\nAnd then there's ${Cai}. $!{He} looks at you, expression doleful. \"As for me, I'm off—there's this ${girl} in—\" Then ${he} grins. \"No, don't worry, $!{brother}. I'll be here as long as you are. But everyone keeps saying there's a lot of work to do…but I reckon we've earned ourselves a night off. I've got an idea…\"\n\n*goto part8\n\n*comment --------------------------------------------------------------\n*label part7_exile\n*page_break\n*set chapter11_exile true\nIt is some hours later, when ${Emrys} has bathed and sewn your wounds, and you are feeling a little light-headed from the raw spirit ${he} made you drink, when ${Cai} comes to you.\n\n\"We're summoned,\" ${he} says. \"By the new Pendragon.\"\n\nYou stand before High $!{King} ${Bedwyr} in ${his} impromptu court: a hastily constructed shelter at some remove from the stench of the field. A small cadre of bloodied and battered warriors are in attendance.\n*if chapter6_cadells_men\n\t$!{King} ${Cadell} is here; ${he}'s plainly aggrieved by something.\n*if chapter7_lots_men\n\t${Agravaine} of Lothian sits by the fire cleaning ${his} sword.\n*if chapter10_geraint_allies\n\t$!{King} ${Geraint} of Dumnonia has an amused look on ${his} face—${he} watches you carefully.\n*if chapter10_gorlaes_allies\n\t$!{King} ${Gorlaes} of Kernow looks on, stone-faced.\n${Vivian} is ${her_his} inscrutable self in the background—although there's no sign of ${Morgan}. Something is up.\n\n${Bedwyr} rises to meet you. \"$!{Brother} ${Arthur}. It is good that you live. I feared for you in the fight.\"\n\nSomething is [i]definitely[/i] up.\n\n\"We have been talking,\" says ${Bedwyr}. \"This fight is now done, and it's time for us to move on to other things. There is a kingdom to rebuild. This is no time for war.\" $!{He} paces, considering. \"The country now has a Pendragon. And there is no need of a Warleader.\"\n\n\"Ah, so that's it,\" murmurs ${Cai}.\n\n\"It is also for the best that the loyalties of the people of Gwynedd—and indeed the people of all our lands—are not split,\" says ${Bedwyr}. \"The last thing needed now is fighting amongst our own people. To that end, we think it best that you return across the sea, to the land of your foster-${father}, to Aquitania.\"\n\n\"Who is [i]we[/i]?\" snarls ${Cai}. \"Have the courage to say [i]I[/i], ${ap} ${Uther}!\"\n\nSome of the warriors are on their feet, hands at swords.\n\n*temp take_gawain\n*set take_gawain false\n*temp take_emrys\n*set take_emrys false\n\n*if ((rel_gawain>=50) or (lover=\"gawain\"))\n\t\"If you do this, ${Arthur} will not walk alone,\" says ${Gawain}. \"I name you craven, ${Bedwyr} ${ap} ${Uther}.\" $!{He} spits at the High $!{King}'s feet. \t\n\t*set take_gawain true\n*if ((rel_emrys>=50) or (lover=\"emrys\"))\n\t${Emrys}'s hand is on your shoulder.\n\t*set take_emrys true\n\t\n\"This is for the best for all of us,\" says ${Bedwyr}. \"And best done here, today.\"\n\t\n*if chapter10_gorlaes_allies\n\t$!{King} ${Gorlaes} stands, abruptly. \"I have not sworn to you, ${Bedwyr} Pendragon,\" ${he} says. \"And so now I take my people home to Kernow. If not for ${Arthur}, I would not be here, and perhaps this battle would have gone another way. That being the case…\" $!{He} turns to you. \"There is a welcome for you at Tintagel, ${Arthur} ${mab} ${Ygerna}, should you wish it. I am travelling there now.\"\n\t\n\t$!{He} extends a hand to you. \"Come with me?\"\n\t*goto part8\n\t\n*else\n\t\"Then we go,\" you say quietly.\n\t\n\t*if take_gawain\n\t\t${Gawain} stands next to you. \"Aye. Fare well, Pendragon.\" The words are dripping with sarcasm.\n\t\t\n\t*if take_gawain=false\n\t\t${Gawain} looks at you, and shakes ${his} head. \"I'm sorry, ${Arthur}. I must stay, and see that there's not too much damage done.\"\n\t\t\n\t\t\"I understand,\" you tell ${him}.\n\t\t\n\t*if take_emrys\n\t\t\"I've a yearning to travel again,\" says ${Emrys} the Wanderer. \"I'll travel with you, if I may.\"\n\t\n\t*if take_emrys=false\n\t\t\"I too must stay,\" says ${Emrys}. \"There's much to do.\"\n\t\t\n\t${Cai} sighs. \"Well then. At least Aquitania will have something decent to drink. Come on, $!{brother}. I need to get free of the stench of this place.\"\n\t*goto part8\n\n*comment --------------------------------------------------------------\n*comment                   Part 8: Epilogue 1\n*comment --------------------------------------------------------------\n*label part8\n*page_break\n\n[b]An End[/b]\n\n*if chapter11_cerdic_dead=false\n\t[i]Under the paltry cover offered by the trees of a small copse, ${Cerdic} of Wessex kneels in the mud. Before ${him} is ${his} ${son}, ${Cynric}. The young ${man} is trying to talk, but has barely any breath left to speak. ${Cerdic} kneels over ${him} like a stone statue, offering no comfort, offering no words. $!{He} just listens. And ${he} watches the dying ${man}'s eyes as the darkness drains from them.[/i]\n\t\n\t[i]A short distance behind ${him}, the remnants of ${his} warriors gather. No one speaks. They have started a small fire, and one ${man} has killed a rabbit and is making a simple broth. They are tending their wounds, and cleaning their gear, and waiting for their ${lord}.[/i]\n\t\n\t[i]After a time, the whispered words run dry.[/i]\n\t\n\t[i]${Cerdic} doesn't move for a time. Then finally ${he} stands, and ${his} shoulders straighten.[/i]\n\t\n\t[i]\"My ${lord},\" says one of the ${men}. \"Will you eat?\"[/i]\n\t\n\t[i]${Cerdic} turns. \"I will,\" ${he} says, and ${his} eyes gleam jet black in the firelight.[/i]\n\t*goto part9\n\n[i]On a far grey shore at the utter East coast, wood crunches on gravel as a ship draws up on the beach. A young flaxen-haired ${man}, well-muscled, bright-eyed, leaps over the bow. $!{He} turns back to look at the ${man} behind ${him}.[/i]\n\n[i]\"${Hengest},\" ${he} cries, as other ships slide up the gravel and ${men}'s boots hit the shore. \"This is where it begins, $!{brother}, this is where it begins!\"[/i]\n*goto part9\n\n*comment --------------------------------------------------------------\n*comment                   Part 9: Epilogue 2\n*comment --------------------------------------------------------------\n*label part9\n*if ((chapter2_pregnant=false) and (chapter2_morgan_pregnant=false))\n\t*goto the_end\n\t\n*page_break\n\n[b]A Beginning[/b]\n\n*achieve new_beginning\n\n[i]Later in the year, as the summer storms bluster around [/i]\n*if (chapter2_pregnant)\n\t*if chapter11_exile\n\t\t*if chapter10_gorlaes_allies\n\t\t\t[i]the fortress of Tintagel by the sea,[/i]\n\t\t*if chapter10_gorlaes_allies=false\n\t\t\t[i]a small encampment on the south coast,[/i]\n\t*if chapter11_exile=false\n\t\t[i]the fortress of Dinas Emrys,[/i]\n*if (chapter2_morgan_pregnant)\n\t[i]the sanctuary on the Isle,[/i]\n[i]there's a break in the sounds of pain; a release, a moment of peace, a sigh of pent-up breath.[/i]\n\n[i]And a cry goes up from a new voice, as the child of ${Arthur} and ${Morgan} greets the world.[/i]\n*goto the_end\n\n*comment --------------------------------------------------------------\n*comment                   Early Death\n*comment --------------------------------------------------------------\n*label early_death_vision\n\n*page_break\n\n[i]\"And so hope fades…\" ${Vivian} turns away from the dark waters and looks over at the shimmering form beside ${her_him}. \"The ${boy} is dead. What now, $!{Lady}?\"[/i]\n\n[i]The ${White_Lady}'s voice holds sorrow. \"It was only the slenderest of chances, ${Vivian}. We were told as much. It would have bought us time; a span of years of peace, where we could prepare. But that is not to be. Now the Saxon wolves will tear apart the kingdoms, and our people will be driven into the hills. Many will die. But not all. We always knew it would happen. But the Saxons are not the greatest threat.\"[/i]\n\n*if chapter11_cynric_dead\n\t[i]\"Aye,\" says ${Vivian} bitterly. \"It's the creature that lurked behind ${Cynric}'s eyes. It's old magic, powerful magic, and it did not die with ${him}. What can be done against such a thing?\"[/i]\n*if chapter11_cynric_dead=false\n\t[i]\"Aye,\" says ${Vivian} bitterly. \"It's this creature that lurks behind ${Cynric}'s eyes. It's old magic, powerful magic. What can be done against such a thing?\"[/i]\n\n[i]\"I do not know,\" says the ${White_Lady}. \"But there is one, perhaps, who might.\"[/i]\n\n[i]${Vivian}'s face pales, freckles standing stark against the skin. $!{She} swallows. \"It is time, then?\"[/i]\n\n[i]\"Yes,\" says the ${White_Lady}. \"It is time. Your ${daughter} must travel to the cave, ${Vivian}. It is time to wake the Merlin.\"[/i]\n\n*comment --------------------------------------------------------------\n\n*label early_death\n\n[b]-- An End --[/b]\n\nYou've come to the end of your story, perhaps too soon. Maybe in another telling the story might have taken a different turn.\n\n*goto backpage\n\n*comment --------------------------------------------------------------\n*comment                   The End\n*comment --------------------------------------------------------------\n*label the_end\n\n[b]-- The End --[/b]\n\nYou've come to the end of your story. Perhaps, in another telling, the story might have taken a different turn.\n\n*label backpage\n*page_break End\n*feedback\nChoice of Games releases new games on a regular basis.\n*subscribe\n*page_break\n\nThank you for playing [i]Pendragon Rising.[/i]\n\n*ending\n", "chapter2": "*comment ==============================================================\n*comment                   Chapter 2: The Feasting Hall\n*comment ==============================================================\n\n*comment --------------------------------------------------------------\n*comment                        Introduction\n*comment --------------------------------------------------------------\n*label intro\n\n*image chap2.png center Chapter Two: The Feasting Hall\n\nDinas Emrys at night. Inside the earth ramparts and the high palisade, open fires burn in pits. Knots of people gather around them talking, laughing. Beyond, light spills from the doorways of thatch-roofed huts. One building rises above the others: the great double-peaked hall of the $!{King}, ${Uther}, your ${father}. Raucous cheering comes from inside.\n\nYou remember this buzz of activity from when you were a ${boy}. This is Nos Calan Gaeaf, the feast of winter, celebrated when the last leaves have turned and the livestock are brought to the valley. The smell of the peat fires, the chill of the air, the excited babble of voices; one night of brightness before the long dark falls. Over the water in Aquitania, your foster-${father} ${Ector} held to Rome and the ways of the Christ. $!{He} had no time for fires and dancing.\n\n\"Seven years, Art,\" says ${Cai}, leaning against the palisade. \"Regretting coming back?\"\n\n*fake_choice\n\t#\"Yes. I'd forgotten how cold it is.\"\n\t\t${Cai} laughs. \"Well—the rotgut stuff your kin serve will soon warm you up. Come on.\"\n\t#\"Not a bit of it; I'm looking forward to the feast.\"\n\t\t\"$!{Da} always said that a proper fight'd make you hungry, and I could eat a couple of oxen.\" ${Cai} laughs. \"Even cooked by your kin. Come on.\"\n\t#\"I don't know yet. Maybe tonight I'll find out.\"\n\t\t${Cai} shrugs. \"Don't fret. If you can't stomach them, or they can't stomach you, there's always that bottle of red. Come on.\"\n*comment endchoice\n\n$!{He} leads you towards ${Uther}'s hall, ignoring the stares of a small gaggle of the fort's children. You've taken the time to clean up, and both of you are in plain tunics by Aquitanian standards, but you're realizing that the cloth is finer and the colors richer than these people are used to.\n*if (gender=\"female\")\n\tThe pair of you stick out like sore thumbs.\n\t*goto intro_ready\n*else\n\tAnd you're beginning to regret having scraped the stubble from your chin. You're the only clean-shaven men over the age of fifteen. The pair of you stick out like sore thumbs.\n\t*goto intro_ready\n\n*label intro_ready\n\n\"Well? Ready to be ${Arthur} ${ap} ${Uther}, ${son} of the $!{King}?\" asks ${Cai}, as ${he} steps up to the throng waiting to enter the hall. A few folk stand aside from you, recognizing your face.\n\n\"What if ${he} dies, ${Cai}?\" The question's been on the tip of your tongue all evening.\n\n\"Who?\"\n\n\"${Uther}.\"\n\n${Cai} purses ${his} lips. \"Well, this place'll need a new $!{King}, for one thing. And I suppose the whole of your Isle of Britons will need a new High $!{King}. What's the title here? Chief Dragon? Pendragon? Now that'd be a name worth having—I wonder how I'd get a chance at that?\" $!{He} catches your expression. \"Sorry! Sorry. Well, ${he} can't be all that badly hurt. They're still singing. If you can call it singing.\"\n\nMemory comes back to you. \"They sing when you die, as well. They sang when ${Ambrosius} died. But yes—maybe it wasn't so loud. You're right. Let's go in.\"\n\n*comment --------------------------------------------------------------\n*comment                        Part 1\n*comment --------------------------------------------------------------\n*label part1\n*page_break\n\nThe Long Hall is lit by fire and the smoky gold of tallow candles. Great beams support the thatch above. Long tables stretch the length of the room, heavy with bread, meat, and jugs of honeyed wine. The room is packed with people dressed in their best: soft suedes and linens trimmed with fur; bright rings, bracelets and torcs. Some of the ${men} sport bruises or fresh bandages. Some sit propped against the stones of the wall, faces grey, nursing stricken limbs, clearly adamant that they'll be present no matter the severity of their wounds. The people of Gwynedd are set for a long night of feasting.\n\nThe high seat at the far end of the hall is empty. There's no sign of the $!{King}; ${Blaise}, chief of ${Uther}'s druids, welcomes guests to the hall in ${his} stead.\n\n\"Oh-hoh. Here's trouble,\" murmurs ${Cai}—but it's not the empty chair ${he} means.\n\nShouldering ${his} way through the throng comes your half-${brother} ${Bedwyr}, and the look on ${his} face is not one of friendship.\n\n\"You!\" $!{He} grabs you by the collar and pushes you up against the wall. \"This is your doing!\"\n\n$!{He}'s been drinking, that much is obvious—${his} cheeks are flushed. You can see ${Gawain}, watchful, behind ${him}.\n\n\"Come on,\" says ${Cai} lightly, picking up a goblet. \"Let's just have a drink, hey?\"\n\n${Bedwyr}'s eyes are furious, locked on yours. \"You were with ${him},\" ${he} says softly. \"If a true Briton had been there, ${Uther} would not now lie bleeding ${his} guts out on the bed linens, you piece of Roman filth!\"\n\nHow do you handle this?\n\n*choice\n\t#I punch ${him}—I can't let ${him} treat me like this in public!\n\t\t*set warrior %+30\n\t\t*set compassion %-30\n\t\t*set diplomat %-30\n\t\t\n\t\t*if (warrior>=50)\n\t\t\t*set acclaim %+20\n\t\t\t*set rel_bedwyr %-30\n\t\t\t*set rel_gawain %-20\n\t\t\tAngry as ${he} is, ${Bedwyr} just isn't paying enough attention. You sink a fist into ${his} stomach, driving the air from ${his} lungs. $!{He} starts to fold; you catch ${him} across the side of the head with your forearm, knocking ${him} to the ground. $!{He} collapses into the rushes, gasping for breath.\n\t\t\t\n\t\t\tThe hall is silent for a moment.\n\t\t\t\n\t\t\t\"Whoops,\" says ${Cai} cheerfully. \"I think ${he} tripped over ${his} tongue.\"\n\t\t\t\n\t\t\tYou see anger on some faces, but amusement on others—you aren't the only one to suffer from ${Bedwyr}'s heavy-handedness. But ${Gawain} shakes ${his} head at you in disappointment. $!{He} helps your half-${brother} away to recover ${his} injured pride.\n\t\t\t*goto part2\n\t\t*else\n\t\t\t*set rel_bedwyr %-10\n\t\t\t*set rel_gawain %-10\n\t\t\tYou try to lash out, but ${Bedwyr} isn't that drunk. $!{He} catches your forearm and tightens ${his} grip on your neck. \"Really?\" ${he} says. \"You'd fight here, in the $!{King}'s hall?\"\n\t\t\t\n\t\t\t\"${Bedwyr},\" says ${Gawain} quietly from behind ${him}.\n\t\t\t\n\t\t\tThe fingers around your throat tighten. You're aware that ${Cai} has stopped smiling, and is eyeing the goblet in ${his} hand as if it's about to be used as a weapon.\n\t\t\t\n\t\t\t\"Well?\" Your half-${brother}'s eyes are hard. It's difficult to breathe. You grit your teeth and shake your head.\n\t\t\t\n\t\t\t\"I thought not.\" ${Bedwyr}'s lip curls—then there's a moment of white-hot pain as ${he} snaps your head back against the stone wall before releasing you.\n\t\t\t\n\t\t\tYou gasp for breath, knowing that everyone's eyes are on you.\n\t\t\t\n\t\t\t\"That ${man} really doesn't like you, does ${he}?\" says ${Cai} sombrely. \"So much for ties of blood.\"\n\t\t\t*goto part2\n\t\t\n\t#The feast doesn't need this kind of display. I'll try to reason with ${him}, to calm ${him} down.\n\t\t*set diplomat %+20\n\t\t*set warrior %-20\n\t\tYou pitch your voice low. \"Think, ${Bedwyr}. We're in the $!{King}'s hall with ${his} friends and allies. I know you're angry, I know you're worried for ${him}. But just think. Would ${he} want this, here, in public, from you? Tonight?\"\n\t\t\n\t\t${Bedwyr} grits ${his} teeth. You feel ${his} fingers flex on your throat. You're aware of ${Cai}, off to one side, considering ${his} goblet like ${he} might be about to bash in ${Bedwyr}'s skull with it.\n\t\t\n\t\t*if (diplomat>=50)\n\t\t\t*set rel_bedwyr %+15\n\t\t\t\"Leave it,\" you say. \"For tonight, at least.\"\n\t\t\t\n\t\t\t${Bedwyr} holds your gaze for a moment, then nods. \"For tonight.\" $!{He} relaxes ${his} grip.\n\t\t\t\n\t\t\tYou're aware of ${Cai}'s eyes on you as your half-${brother} stalks away. \"That ${man} really needs to learn to relax,\" says ${Cai}. $!{He} passes you a cup of wine.\n\t\t\t*goto part2\n\t\t\n\t\t*else\n\t\t\t\"$!{He}'s my ${father} too,\" you say.\n\t\t\n\t\t\tIt's exactly the wrong thing. ${Bedwyr} slams your head back against the stone—there's a white-hot snap of pain. \"You're no ${brother} of mine,\" ${he} snarls.\n\t\t\t\n\t\t\t$!{He} raises ${his} fist—${Gawain} catches it, holding ${him} back. \"No, $!{prince} of Gwynedd,\" ${he} says with heavy emphasis. \"$!{He}'s not worth the trouble.\"\n\t\t\t\n\t\t\tThe next you know, ${Bedwyr} is gone, and ${Cai} is helping you to a seat. \"Come on, Art. Your ${brother}'s never been one for words, has ${he}?\"\n\t\t\t*goto part2\n\t\t\n\t#I know ${he} needs someone to rage at right now. I'll let ${him} have this victory—${he}'ll feel better for it.\n\t\t*set compassion %+20\n\t\t\n\t\t\"Yes,\" you say. \"I could have done more. It was my fault.\"\n\t\t\n\t\t\"Did you hear that?\" says ${Bedwyr}, raising ${his} voice. $!{He} pushes you back against the wall, releasing you. \"You heard this ${man}, who claims to be a warrior of Gwynedd. Look at ${him}, at ${his} fine clothes, at ${his} soft hands, at the primping streak of piss ${he}'s taken as a ${brother}. Stick to your books and your music lessons, ${Arthur}. This is not your home.\"\n\t\t\n\t\t${Blaise}, ${Uther}'s chief druid, clears ${his} throat. \"Whatever ${he} may be, $!{prince} of Gwynedd, ${he} is here at your ${father}'s request. And like it or no, ${he} is your ${brother}.\"\n\t\t\n\t\t\"This piece of Roman excrement is not my ${brother}.\" ${Bedwyr} spits at your feet and stalks off. ${Gawain} gives you a sympathetic look and heads off after ${him}.\n\t\t\n\t\t\"Primping streak of piss? I'm flattered, it must have taken ${him} days to think that one up,\" says ${Cai}. $!{He} pours you a cup of wine and holds it out. \"Welcome home, Art!\"\n\t\t\n\t\t*goto part2\n\n*comment --------------------------------------------------------------\n*comment                        Part 2\n*comment --------------------------------------------------------------\n*label part2\n*page_break\n\nA couple of cups of honeywine in and ${Cai} is clearly enjoying ${himself}, laughing with two local ${girl}s, no doubt giving them some account of how ${he}'d chased off the Saxons by ${himself}. $!{He}'d be equally at home in a palace or a pigsty. The atmosphere's too thick for you. You tap ${him} on the shoulder and tell ${him} you're stepping out for a moment.\n\nOutside people are still laughing and drinking, but there's more space, more air to breathe. You wander for a bit, keeping back from the fires, just trying to soak up the atmosphere of Dinas Emrys, trying to feel like you fit in. Not that you ever did, not really.\n\nYou're at the back of the Long Hall when movement catches your eye. Furtive movement, out of place. A shadow creeping round the back of a hut. It's the large hut with the two spear${men} posted at the front of it. ${Uther}'s hut.\n\nYou draw your belt-knife and tread softly across the packed mud. The figure has stopped and appears to be digging something out of a bag. They haven't noticed you. Calling out for help now would just make them run.\n\nYou step forward—one pace, another. And then you recognize the figure.\n\n\"${Emrys}?\"\n\n$!{He} starts, guiltily, and drops the rope ${he} was carrying. \"What? Who?\"\n\nYou take a couple of steps closer. \"${Emrys}. It's me. ${Arthur}.\"\n\nIt's definitely the Wanderer—there's no mistaking that lanky frame. $!{He} peers at you, puzzled, and then you watch relief spread across ${his} face. \"Oh! It's you! I'd heard you were back, but-\"\n\n\"${Emrys}, what are you doing?\"\n\n\"The $!{King}. $!{He}'s wounded, and from what they tell me ${he} needs proper attention. I'm sure I can do something about it, but the blasted idiots at the door won't let me in. They don't know a
