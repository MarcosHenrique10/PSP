our walking, you push through undergrowth to find yourselves looking up at a rocky outcrop. A waterfall spills down it into a pool at the base.\n\n\"There,\" says ${Gawain}, voice grim.\n\nYou can smell the foulness. The water in the pool is a red-tinged bloody brown.\n\n${Cai} goes white. \"${Emrys}? What do we do? Can we stop this?\" $!{He} covers ${his} mouth. \n\n${Emrys} is looking at the rock face. \"Up there,\" ${he} says. \"The water coming down is red. Whatever's fouled it is somewhere there, up above.\"\n\n${Morgan} has taken several steps backwards and cranes ${her_his} neck to look up. \"There's a way in,\" ${she} calls. \"A sort of cave, I think. Looks like the way is narrow.\"\n\n\"That's it, then,\" says ${Gawain}. \"That's the source.\"\n\n\"I suppose one of us has to go inside?\" asks ${Cai} in less-than-cheerful tones.\n\n*choice\n\t#\"I'll go.\"\n\t\t*set bravado %+15\n\t\tYou gather your courage and, with ${Gawain}'s help to boost you up, clamber up the spray-slick rock face. The smell is worse here, and you can see that the gushing water is red with putrid liquid.\n\t\t\n\t\t${Morgan}'s right, there's a narrow cave entrance where the water disappears into the rock. You take a breath and squeeze through it. It takes your eyes a moment to adjust to what little light streams in behind you.\n\t\t\n\t\tThe cave, a short distance from the door, is choked with bloody, matted white wool. Sheep carcasses. Half a dozen of them, eyes missing, maggots crawling amongst the flesh, the foul water bubbling around and through the rot and carrying it downstream.\n\t\t\n\t\tYou make the mistake of taking a breath.\n\t\t*if warrior>50\n\t\t\tIt's a good minute before you've got your stomach under control again.\n\t\t*if warrior\u003c=50\n\t\t\tYour stomach convulses, and you throw up into the water. It makes little difference.\n\t\t\t\n\t\tYou push back into the fresh air and take a moment.\n\t\t\n\t\t\"What is it?\" comes ${Emrys}'s voice. \"Have you found something?\"\n\t\t\n\t\t\"This is not going to be fun,\" you call back down to ${him}. \"${Gawain}, can you pass up a spear?\"\n\t\t*goto part3_end\n\t\t\n\t#\"${Gawain}, it should be you—you're best able to defend yourself should the Saxons have got here before us.\"\n\t\t${Gawain} shrugs and then nods. \n\t\t*goto part3_gawain\n\n\t#\"${Morgan}, you're lighter on your feet and a better climber than the rest of us—will you go?\"\n\t\t$!{She} raises an eyebrow at you, and hands you ${her_his} bow. Then, with ${Gawain} helping to boost ${her_him} up, ${she} clambers up the rock face, disappearing over the top.\n\t\t\n\t\t\"Looks like the stream does go into the cave,\" ${she} calls down. \"That's definitely where the foulness comes from; the air's thick with it. I'm going to try to get in.\"\n\t\t\n\t\tThere's silence for a while, and then you hear, faintly, a curse.\n\t\t\n\t\t\"${Morgan}?\" calls ${Cai}, concerned.\n\t\t\n\t\t\"It's all right,\" comes the response, louder now. You see ${her_him} appear at the edge of the rocks, face pale. \"The place is full of carcasses, sheep carcasses, and they've been there a while. We'll have to get them out.\"\n\t\t\n\t\t\"I'll come up,\" says ${Gawain}.\n\t\t\n\t\t\"There's no room,\" ${she} says. \"Pass me up a spear, would you? And stand clear below.\"\n\t\t*goto part3_end\n\t\t\n\t#\"${Emrys}, you're most likely to be able to work out what they've done—can you go up?\"\n\t\t$!{He} nods. \"Yes, of course.\" \n\t\t\n\t\t${Morgan} and ${Gawain} help boost ${him} up, and, rather unevenly, ${he} makes ${his} way up the rock face, disappearing over the top.\n\t\t\n\t\tThen; nothing.\n\t\t\n\t\tYou look at the other three. \"Wanderer?\" calls ${Morgan}.\n\t\t\n\t\tThere's a coughing from above; ${Emrys} appears worryingly close to the edge of the cliff, a cloth held to ${his} mouth. $!{He} removes it and draws a breath. \"Sheep!\"\n\t\t\n\t\tYou exchange confused looks with the others. \"Sheep?\" calls up ${Morgan} after a moment.\n\t\t\n\t\t$!{He} nods. \"Yes. Half a dozen of them. They've been dead a week or more, and it looks like ${Cynric} and ${his} ${men} have shoved them into the cave here, blocking the stream. Clever.\"\n\t\t\n\t\t\"Can we get them out?\" you ask.\n\t\t\n\t\t\"With a few strong levers,\" ${he} says. \"Pen Eurfaen was a mining town; there might be block and tackle in the—\"\n\t\t\n\t\t\"Let me come up,\" say ${Gawain}. \"It won't be my first dead sheep.\" $!{He} hands you ${his} spear.\n\t\t*goto part3_end\n\t\t\n\t#\"${Cai}, you've drawn the short straw.\"\n\t\t*set rel_cai %-10\n\t\t${Cai} stares at you in horror. \"Go up?\"\n\t\t\n\t\t\"Why not?\" you ask. \"Would you rather one of us did it? We'd be taking the same risk.\"\n\t\t\n\t\t\"I…I…why don't [i]you[/i] go? You might be Warleader, but this isn't a war, and—\"\n\t\t\n\t\t\"Ach, listen to the pair of you. I'll go,\" says ${Gawain}. \"And now I remember why it's a good thing that my ${brother}s are at the other end of the country.\"\n\t\t\n\t\t*goto part3_gawain\n\t\t\n*comment --------------------------------------------------------------\n\n*label part3_gawain\nYou and ${Morgan} help boost ${him} up the rock face.\n\n\"${Morgan}'s right, there is a cave,\" ${he} calls back down. \"Not sure if I'll fit.\"\n\nThere's a grunt, and then silence.\n\n\"I guess ${he} did fit after all,\" says ${Cai}, looking at you.\n\n\"${Gawain}?\" calls ${Morgan}.\n\nYou hear a great gasp of breath, and then retching. \"Aye!\" calls ${Gawain} at last, voice ragged. \"Aye. I'm all right. But there's nasty work ahead; those buggers've blocked the stream with rotten sheep carcasses. Must be half a dozen. Will you pass up a spear, ${Arthur}, and I'll try to get them out?\"\n\n\"Do you need help?\"\n\n\"I'll manage it. This won't be my first dead sheep.\"\n\n*label part3_end\n\n*comment --------------------------------------------------------------\n*comment                   Part 4: The Solution\n*comment --------------------------------------------------------------\n*label part4\n*page_break\nBy the time $!{King} ${Cadell} returns with the holy ${man}, the sickness is lifting; you've carried the carcasses away to where they won't moulder into the river, and fresh water is flowing again. Impressed, ${Cadell} turns to you for an explanation. \"It seems the curse is lifted; my people say that you had a hand in it. How was this managed?\"\n\n*choice\n\t#\"There was no curse. ${Cynric}'s ${men} had killed one of your flocks and poisoned the stream with the corpses.\"\n\t\t${Cadell} deflates, as if a little disappointed that this wasn't the work of dark magics. \"I see. You're to be commended, then, on finding the source of this trouble. Is there aught I can do for you in return?\"\n\t\t\n\t\t*if diplomat\u003c=40\n\t\t\t\"$!{Men},\" you say. \"There's a war, ${Cadell}, and Britain needs to fight together.\"\n\t\t\t\n\t\t\t${Cadell} shakes ${his} head. \"The rest of the people will never follow you, ${Arthur}. I'm sorry, I must protect my own. I will reward you handsomely, but cannot risk sending my warriors.\"\n\t\t\t*goto part5_fail\n\t\t*else\n\t\t\t*set allies +2\n\t\t\t\"$!{Men},\" you say. \"There's a war, $!{King} ${Cadell}. The kingdoms of Britain must be united on this, or the Saxons will cut us down one-by-one. If you stand with us, then others will follow your example. The other $!{king}s respect you and will follow your lead.\"\n\t\t\t\n\t\t\t${Cadell} looks at you carefully. \"I think I've misjudged you, ${Arthur} ${ap} ${Uther}. Yes. Two kingdoms together is better than two kingdoms apart. You'll have my support when it's needed; I'll give you ${men} and provisions. Lead them well.\"\n\t\t\t*goto part5_win\n\t\t\n\t#(Lie) \"${Morgan} is the ${daughter} of ${Vivian} of the Isle. $!{Her_his} power was greater than that of the Saxons; ${she} lifted the curse.\"\n\t\t*comment Testing cunning\n\t\t*if bravado\u003c40\n\t\t\t*set allies +2\n\t\t\t*set chapter6_epithet_cursebreaker true\n\t\t\t${Cadell} frowns at this, but the villagers chip in, supporting your tale. They've been impressed with ${Morgan}'s care for the sick while you've waited for the $!{King}; many now feel much better for the herbs ${she}'s mixed for them.\n\t\t\t\n\t\t\t\"I must think on this,\" says ${Cadell}. \"But you have my thanks, ${Arthur} ${ap} ${Uther}, for if the curse had spread…well. I'll send a strong force of ${men} to Gwynedd's aid, and provisions, when you have need to call on them. Lead them well.\"\n\t\t\t*goto part5_win\n\t\t*else\n\t\t\t*if leader>40\n\t\t\t\t*set allies +1\n\t\t\t\t*set chapter6_epithet_cursebreaker true\n\t\t\t\t${Cadell} frowns. \"Perhaps. Or perhaps there's more to this than I can see?\" $!{He} shakes ${his} head. \"No matter. This kingdom owes you a debt, ${Arthur} ${ap} ${Uther}, and I see that I've perhaps misjudged you. That being the way of things, I'll send ${men} to Gwynedd's aid when it's needed, to be under your command.\"\n\t\t\t\t*goto part5_mid\n\t\t\t*else\n\t\t\t\t*set acclaim %-30\n\t\t\t\t${Cadell} makes the sign of the cross, alarmed, looking to ${his} priest for support. \"You should not trust ${her_his} kind. To call on black arts for such aid is no better than the Saxons. The curse may be ended, ${Arthur} ${ap} ${Uther}, but who's to say what else you might have brought on these poor people. If you truly want to lead Britain's troops you should examine your conscience and your choice of companions.\"\n\t\t\t\t\n\t\t\t\t${Morgan} opens ${her_his} mouth, but ${Gawain}, face stern, holds up a warning hand. $!{She} subsides, lips curling with anger.\n\t\t\t\t*goto part5_fail\n\t\t\n\t#(Lie) I take the $!{King} aside. \"${Morgan} is powerful, $!{King} ${Cadell}. $!{She} has cast a counter-charm against this curse, but it saps ${her_his} strength to do so. If you provide ${men} to aid our fight, ${she} can concentrate on keeping your lands free of the curse.\"\n\t\t*comment Testing ruthlessness\n\t\t*if compassion\u003c40\n\t\t\t*set allies +2\n\t\t\t$!{He} makes the sign of the cross, then stares at you, then at ${Morgan}. \"I see. So if I do not aid you, this curse falls on us once more?\" $!{He} shakes ${his} head. \"It seems I have little choice. Very well, I will send men to join your fight. But you should think carefully when you choose your companions, ${Arthur} ${ap} ${Uther}.\"\n\t\t\t*goto part5_win\n\t\t*if compassion>=40\n\t\t\t*if diplomat>40\n\t\t\t\t*set allies +1\n\t\t\t\t*set acclaim %+20\n\t\t\t\t$!{He} makes the sign of the cross, then stares at you, then at ${Morgan}. \"It seems I have little choice. I've merely exchanged one black magic for another. Very well, my warriors will join your damned fight when you call for them. But you have not won a friend here today, ${Arthur} ${ap} ${Uther}.\n\t\t\t\t*goto part5_mid\n\t\t\t*if diplomat\u003c=40\n\t\t\t\t*set acclaim %-30\n\t\t\t\t$!{He}'s furious. \"You dare? You dare to threaten me, to use my people's lives in such a way? I would not bow to the Saxon's dictats, and I will not bow to yours. Get out of here, and take your pet ${sorceress} with you!\"\n\t\t\t\t*goto part5_fail\n\n*comment --------------------------------------------------------------\n*comment                   Part 5: The End\n*comment --------------------------------------------------------------\n*label part5_win\n\n*set chapter6_cadells_men true\nAs you ride away, ${Emrys} congratulates you. \"That was well done, ${Arthur}. Those ${men} are a good start. Perhaps it'll change other people's minds to see ${Cadell} standing with us.\"\n\n*achieve support_cadell\n\n*finish\n*comment --------------------------------------------------------------\n*label part5_mid\n\n*set chapter6_cadells_men true\nAs you ride away, ${Gawain} says \"Well, that could have gone worse. A handful of ${men} is better than none, and it might make the other ${king}s stop and think.\"\n\n*achieve support_cadell\n\n*finish\n*comment --------------------------------------------------------------\n*label part5_fail\n\n*set chapter6_cadells_men false\nAs you ride away, you realize ${Morgan}'s eyes are on you. $!{She} shakes ${her_his} head. \"We needed ${men}, ${Arthur}. We could have had them, too.\"\n\n\"Oh, there're plenty more ${king}s,\" calls ${Cai} cheerfully. \"${Cadell} will soon fall in line when the others do.\"\n\n\"I hope so,\" says ${Morgan}.\n*finish\n", "chapter7": "*comment ==============================================================\n*comment                Chapter 7: A Matter Of Law\n*comment ==============================================================\n\n*comment --------------------------------------------------------------\n*comment                        Introduction\n*comment --------------------------------------------------------------\n*label intro\n\n*image chap7.png center Chapter Seven: A Matter of Law\n\n*comment --------------------------------------------------------------\n*comment                        Part 1: The Attack\n*comment --------------------------------------------------------------\n*label part1\n\"Snow,\" grumbles ${Cai}. \"It's supposed to be nearly spring, isn't it? Iesu Christos curse you to hell, ${Arthur} ${ap} ${Uther}, but my toes are cold.\"\n\n\"It's not ${his} fault,\" says ${Morgan}. \"It's ${Gawain}'s family, after all.\"\n\n\"Oh, I know,\" says ${Cai}. \"Little ${brother}'s handfasting and all of that, yes, I understand. So that's why ${Gawain}'s here. But you dragged us here, ${Arthur}, because you need to make sure of ${Gawain}'s ${father}'s warriors—don't deny it.\"\n\n\"I don't,\" you say. \"It's needed.\n*if chapter6_cadells_men\n\tEven with ${Cadell}'s ${men}, it's needed.\n*if chapter6_cadells_men=false\n\tWe have nothing from ${Cadell}.\n$!{King} ${Lot} is the most powerful ${man} in the North. ${Gawain} pledged ${his} ${father}'s warband to our cause, but ${Lot} is a proud ${man}; we need to make certain of ${him}.\"\n\n\"So here we are,\" says ${Cai} gloomily. \"Politics makes for cold toes.\" $!{He} lowers ${his} voice. \"And cold company.\" $!{He} nods to where $!{Lady} ${Vivian} rides at the front of your party, ${Gawain} alongside ${her_him}.\n\n\"You're talking about my ${mother},\" says ${Morgan}. \"You do know that?\"\n\n\"Oh, I know, but ${she}'s…well…you must admit, ${Morgan}, you've met wolves that are friendlier and less liable to rip out your throat.\"\n\n\"Mind your tongue! If—\"\n\n\"Quiet.\" ${Emrys} hisses a warning. \"Do you hear that?\"\n\nAhead, around the bend in the track, you can hear a ${man} calling for help.\n*page_break\n\nYou dismount and tether the pony to a stump. With ${Morgan} by your side, an arrow nocked to ${her_his} bow, you lead the others through the trees to get a clear view of what's going on, keeping to the cover.\n\nThe screams come from a ${man} with ${his} back pressed up against a tree. At first you think ${he}'s just standing there—then you realize there's an arrow through ${his} shoulder, pinning ${him} in place. A second ${man} lies on the ground; there's blood on the snow. Four raggedly-dressed figures are moving through the snow towards them, three with bows at the ready, one with a long knife in ${his} hands.\n\n\"Leave this,\" says $!{Lady} ${Vivian} from behind you. \"They have bows, we do not.\"\n\n*choice\n\t#I attack.\n\t\t\"Take them,\" you tell the others.\n\t\t*goto part1_attack\n\t\t\t\n\t#I'll threaten the outlaws; try to scare them off.\n\t\tYou step clear of the trees, sword in hand. \"Put aside your bows!\"\n\t\t\t\n\t\tThe attackers freeze—all eyes are on you. The tallest of the attackers brings ${his} bow to bear at your chest. \"And who are you to say so?\"\n\t\t\n\t\t\"I am ${Arthur} of Gwynedd. Flee now as you value your lives.\"\n\t\t\n\t\t*if (acclaim>40) or (compassion\u003c=40)\n\t\t\t*set rel_vivian %-10\t\n\t\t\t*if acclaim>40\n\t\t\t\tThe leader swallows. \"I've heard of you,\" ${he} says. $!{He} lowers the bow. \"We don't want trouble with you.\"\n\t\t\t*if (acclaim\u003c=40) and (compassion\u003c=40)\n\t\t\t\tThe leader looks back and forth at you and your companions. $!{He} swallows. \"Aye. We want no trouble with you.\"\n\t\t\t\t\n\t\t\tSlowly ${he} and ${his} ${men} step backwards, eyes on you. ${Gawain} growls and the ${men} flee.\n\t\t\t\t\n\t\t\t*goto part1_end\n\t\t*else\n\t\t\tThe leader looks back and forth between you and your companions; then nods at the bows ${he} and ${his} mates hold ready. \"I don't think you have the means to stop us.\"\n\t\t\t*goto part1_attack\n\t\t\t\n\t#I'll obey ${Vivian}—the odds are against us.\n\t\t*set diplomat %+15\n\t\t*set warrior %-15\n\t\t*set compassion %-20\n\t\t*set rel_vivian %+15\n\t\t*set rel_morgan %-20\n\t\t*set rel_gawain %-20\n\t\t*set chapter7_malcolm_saved false\n\t\t${Vivian} nods approval as you hold up your hand to the others and gesture to them to avoid the main track. You catch ${Gawain}'s face, furious, as ${he} passes you, but ${he} doesn't say anything. ${Morgan} doesn't look at you. ${Cai} and ${Emrys} press on as you direct, moving carefully through the trees, trying to keep quiet.\n\t\t\n\t\t\"Well done,\" says ${Vivian} quietly. \"It's hard to rein in the instinct to act. I'm impressed.\"\n\t\t\n\t\tYou fall into step with ${her_him} as ${she} starts off through the snow, following the others.\n\t\t*goto part2\n*comment --------------------------------------------------------------\n*label part1_attack\n\n*if warrior>50\n\t*set rel_vivian %-10\n\t*set chapter7_kill_bandits true\n\t${Morgan}'s arrow takes the leader high in the throat. $!{He} falls, gurgling, in a spray of red. One of ${his} companions throws ${herself} into cover; a second looses an arrow at ${Gawain} but the big ${man} ducks aside and then charges, roaring a challenge. Another arrow slices across ${Cai}'s forearm—${he} gives a cry of anger and matches you stride for stride as you race at the enemy.\n\t\n\tIt's over swiftly. With their leader down, the bandits don't put up much of a fight; when it's over, two of them lie dead, the others have fled.\n\t\n\t\"You should have more faith in us, $!{mother},\" says ${Morgan} brightly. You sense this is an old argument between them.\n\t*goto part1_end\n*else\n\t*set rel_vivian %-20\n\t*set acclaim %-10\n\t${Morgan} looses an arrow at the leader, but ${he} steps aside and releases ${his_hers} in response. It misses you by a hair's breadth; you feel the fletchings tug at your hair. ${Gawain} shouts in anger and starts forward, but the leader already has another arrow nocked, aimed at ${Vivian}. \"Enough!\" ${he} shouts. \"We'll take our due, then we'll leave. But you'll not be stopping us.\"\n\t\n\t$!{He} nods to one of ${his} followers; ${she} moves over to the pinned ${man} and starts rifling through ${his} pouches.\n\t\n\t\"[i]Look at me![/i]\" says ${Vivian} sharply. The leader's eyes flick up to meet ${hers} and there's a moment where ${he} freezes, and ${his} mouth drops open. \"[i]Go[/i],\" says ${Vivian}, in tones that could freeze a river. \"[i]Go now, and do not return.[/i]\"\n\t\n\tThe ${man}, pale, hand shaking, lowers ${his} bow. \"Aye, ${lady}.\" $!{His} followers stare at ${him} as ${he} drops the bow in the snow at ${his} feet and walks off into the trees. They look at each other, and then, with confused glances at ${Vivian}, follow ${his} lead.\n\t\n\t\"That is not something I enjoy,\" says ${Vivian}, conversationally. \"Do not make me have cause to do it again, ${Arthur} ${ap} ${Uther}.\"\n\t*goto part1_end\n\n*label part1_end\n\n${Emrys} and ${Morgan} quickly determine that the ${man} pinned to the tree is wounded, but will survive if ${he}'s bandaged and cared for. $!{His} name is ${Malcolm}, ${he} tells you, a serving-${man} to the ${lord} who now lies dead in the snow. \"We'd stopped for a bite and they came upon us,\" ${he} says. \"There was nothing I could do. We were bound for Garlot.\"\n\nFor the wedding. For the same destination as you, the home of $!{King} ${Lot}. It seems the feast will be short a guest. ${Gawain} puts the body over ${his} pony.\n\n${Emrys} binds ${Malcolm}'s wounds, and ${Gawain} supports ${him} as you carry on your journey.\n\n*comment --------------------------------------------------------------\n*comment                        Part 2: The Arrival & The Feast\n*comment --------------------------------------------------------------\n*label part2\n*page_break\n${Morgan} rides up beside you. \"So,\" ${she} says, \"I suppose you'll want a proper explanation of who everyone is and who you should be paying attention to.\"\n\n\"You can try, but I'm not sure it'll stick,\" you say. \"Even knowing you're related to ${Gawain} is confusing enough. You're ${his} ${aunt}—so you're ${his} ${mother}'s ${sister}, yes?\"\n\n\"${Morgause} is much older than me,\" ${she} says. \"And ${she}'s ${his} step-${mother}, so I'm not truly related to ${him}. So. $!{She}'s ${wife} to $!{King} ${Lot}. They have three ${son}s; ${Gawain} is the eldest, ${Agravaine} is next, and then ${Gareth}.\"\n\n\"And it's ${Gareth} who's getting married, and ${he}'s marrying the ${daughter} of another ${king}. Yes, I know.\"\n\n\"Don't discount that. The $!{King} of Strathclyde is not as powerful as $!{King} ${Lot}, but ${he}'s another one who would make a good ally. Between the two of them they hold the North against the Saxons. This joining is important.\"\n\n\"I understand. So—who should I watch out for?\"\n\n\"All of them.\" $!{She} sees your expression. \"Save ${Gareth}, that is—I've always liked ${him}. But ${Lot}, ${Agravaine}…they have little respect for ${Uther}, and won't see much need for this alliance that ${Gawain} has made. You're lucky to have ${him}.\"\n\n\"What about your ${sister}?\"\n\n\"${Morgause}? I love ${her_him} dearly, but ${she}'s the worst of them all. \n*if romance_morgan\n\tDo try not to sleep with ${her_him}, ${Arthur}.\"\n\t*choice\n\t\t#\"Why, would it matter to you?\"\n\t\t\t\"It might, at that.\" $!{She} flushes slightly, then won't look at you. \"I think I'm going to ride on a bit.\" $!{She} slaps ${her_his} pony's flank; it starts forward at a trot.\n\t\t\t*goto part2_cai_comment\n\t\t#\"I promise I'll be careful.\"\n\t\t\t\"You do that.\" $!{She} rides in silence with you for a short while, and then settles the pony back, leaving you on your own.\n\t\t\t*goto part2_gates\n\t\t#\"I wouldn't even think of it.\"\n\t\t\t\"Good.\" $!{Her_his} slow smile is a shared moment, before ${Cai} catches up to the two of you. \n\t\t\t\n\t\t\t\"How far is it? I swear it's getting colder.\"\n\t\t\t*goto part2_gates\n*else\n\tBe careful of ${her_him}, ${Arthur}.\"\n\t*page_break\n\t*goto part2_gates\n*comment --------------------------------------------------------------\n*label part2_cai_comment\n\n\"What's up with ${her_him}?\" asks ${Cai}, catching you up, then \"Oh. Are you two finally—\"\n\t\t\n*fake_choice\n\t#\"Shut up, ${Cai}.\"\n\t\t$!{He} grins wickedly. \"Fair enough. You do know that it's blatantly obvious, though?\"\n\t#\"I don't know—has ${she} said anything?\"\n\t\t$!{He} shakes ${his} head. \"Not to me. $!{She} does spend a lot of time around us rather than where ${she} should be, though, or hadn't you noticed?\"\n\t#\"I hope so.\"\n\t\t$!{He} laughs. \"Oh, come on, Art. Don't wait forever to make your move!\"\n*goto part2_gates\n*comment --------------------------------------------------------------\n*label part2_gates\n\nGarlot is a grey snow-bound fortress that clings to a headland on the shores of a cold sea. It's difficult to see how any attacker might take it—and, as ${Cai} remarks, difficult to see why any would want to.\n\nAs you ride towards the forbidding doors, set in a slab of grey stone, ${Vivian} catches you up. \"${Arthur}. $!{King} ${Lot} is very much one for the appearance of propriety and for rules. You are $!{King} ${Uther}'s representative here. You should ride at the head of our group.\"\n\n\"But surely you, as family, and $!{Lady} of the Isle—\"\n\n\"You hold the highest title here, Warleader, or had you forgotten?\"\n\nAt ${her_his} bidding you lead your small group up to the door. \n*if chapter7_malcolm_saved\n\t${Gawain} is on foot; ${he}'s given up ${his} pony to the wounded ${Malcolm} and the corpse.\n\nYou are greeted by a tall ${man}, the door-ward. $!{He}'s clad in fine, bright mail, \n*if gender=\"male\"\n\tand his hair and beard are red-gold curls.\n*if gender=\"female\"\n\tand her hair is red-gold and curls to her neck. \nOn ${his} arms are a pair of twisted gold arm-rings, signifying ${his} battle-honors. $!{He} lowers ${his} spear and steps forward, the ${men} who flank ${him} still standing watchful and ready.\n\n\"A greeting to you all. Who rides to Garlot's gate?\"\n\n*fake_choice\n\t#\"I am ${Arthur} ${ap} ${Uther}, Warleader of Britain.\"\n\t#\"I am ${Arthur}, emissary of $!{King} ${Uther} of Gwynedd.\"\n\t#\"I am ${Arthur} of Gwynedd, and I bring ${Lot}'s kin to the handfasting.\"\n\t\nThe door-ward nods, face stern. \"I ask you now to take the guest oath. Do you, ${Arthur}, swear that your people shall work no ill against the $!{King} and people of Lothian while you remain in ${his} hall?\"\n*choice\n\t#\"By Almighty God I so swear.\"\n\t\t*set rel_vivian %-20\n\t\t*set old_faith %-20\n\t\t*set chapter7_guest_oath \"god\"\n\t\t*goto part2_gareth\n\t\t\n\t#\"In the name of Bran the Blessed, Gwydion, and bright Arianrhod I so swear.\"\n\t\t*set rel_vivian %+15\n\t\t*set old_faith %+15\n\t\t*set chapter7_guest_oath \"gods\"\n\t\t*goto part2_gareth\n\t\t\n\t#\"By my honor and the honor of Gwynedd I so swear.\"\n\t\t*set diplomat %+10\n\t\t*set warrior %-10\n\t\t*set chapter7_guest_oath \"honor\"\n\t\t*goto part2_gareth\n\t\t\n*comment --------------------------------------------------------------\n*label part2_gareth\nThe warrior breaks into a bright smile. \"Sa, sa, it's all to the good, then! Welcome! And I bid you welcome too, my ${brother}.\" $!{He} flings an arm around ${Gawain}; then turns and pecks ${Morgan} on the cheek. \"And dearest ${aunt}!\"\n\n\"You make me feel a hundred,\" says ${Morgan}, returning ${his} smile.\n\nThen ${he} reaches out a formal hand to ${Vivian}. \"Grand${mother}.\"\n\n\"${Gareth}. If I hear that word pass your lips once more, I will skin you and make a fine coat for your new ${wife} to wear.\"\n\n$!{She} sounds entirely serious, yet ${Gareth} breaks into laughter. \"Ach, forgive me, my ${lady}. I'm so pleased you could be here, that you'll have a chance to meet my ${Laurel}. And you…\" ${he} turns back to you. \"${Arthur}. I hear much of you from my ${brother}. You are welcome, welcome indeed.\"\n*if romance_gawain\n\t$!{He} shoots a knowing glance at ${Gawain} and then winks at you. You realize ${Gawain}'s face is burning.\n\nThe guards push the great doors open. \"Now come, come inside,\" says ${Gareth}. \"I'll show you to your quarters; you're in good time for we eat within the hour.\"\n*comment --------------------------------------------------------------\n*page_break\nYour room is grey stone, and pleasant—a fire burns in the hearth. \n*if chapter7_malcolm_saved\n\tThere are three beds; it seems you're to share with ${Cai} and ${Malcolm}.\n*if chapter7_malcolm_saved=false\n\tThere are two beds; it seems you're to share with ${Cai}.\nYou stow your gear and wash the grime of travel away before changing for the feast.\n\n${Cai} has walked off to explore the fortress. \n*if chapter7_malcolm_saved\n\t${Malcolm} is having ${his} wound redressed by ${Lot}'s wise-${women}. \n\nThere's only you and ${Gawain} here.\n*if romance_gawain\n\t$!{He} clears ${his} throat, nervous. \"I wanted to talk to you, ${Arthur}.\"\n\t\n*if romance_gawain=false\n\t\"My ${lord} ${Arthur}—can I speak with you?\"\n\t\n\"Is there something wrong?\"\n\n\"No. Well, yes, actually. I need your help.\" The big ${man} sighs. \"My family. My ${father} and I, we do not get along so well; we have different views of the world, I suppose. $!{He} is not the best of ${men} with the truth, and ${he} always has to find some way to see others belittled. My ${brother} ${Agravaine}…\" ${he} shakes ${his} head. \"${Agravaine} thinks only of ${himself}. And my step-${mother}—${she}'s difficult.\"\n\n\"${Morgan} told me some of this. What help could I be?\"\n\n\"I will not have ${Gareth}'s match, a match ${he} makes for love, ruined by my family's stupid games,\" ${he} says. \"I know my ${father}. $!{He} will have something up ${his} sleeve; ${he}'s still angry for me pledging to your cause. I just want…I suppose I want you to be careful, and don't trust fair words.\"\n\n*choice\n\t#\"I'll be on my guard.\"\n\t\t*set rel_gawain %+10\n\t\t\"Thank you, that's all I ask. We should head down to the hall; they'll be waiting.\"\n\t\t*goto part2_lot_greet\n\t#\"I won't let your ${brother}'s handfasting be ruined.\"\n\t\t*set rel_gawain %+15\n\t\t\"Thank you, ${Arthur}—it means a great deal to me.\"\n\t\t*goto part2_lot_greet\n\t#\"I'll do what I can—but remember, at the end of all this I need your ${father}'s warriors.\"\n\t\t*set rel_gawain %-10\n\t\t\"I know, I know,\" ${he} says. \"But you should keep in mind that if ${he} wins over you, ${he}'ll never respect you.\"\n\t\t*goto part2_lot_greet\n\t*if (romance_gawain) #\"Of course I'll help—but I was hoping you wanted to talk about something completely different.\"\n\t\t*if (rel_gawain>=40)\n\t\t\t*set chapter7_gawain_kissed true\n\t\t\t$!{He} goes red, a sight you're becoming accustomed to. \"We should go down to the feast—\"\n\t\t\n\t\t\t\"${Gawain}. We need to talk about this at some time, surely.\"\n\t\t\n\t\t\t\"I know, but now isn't it.\" $!{He} sees your frustration, and takes a step towards you. You smell damp hair and soap, and realize again how tall ${he} is. And then, tentatively, ${he}'s bending ${his} head and drawing you into a kiss.\n\t\t\n\t\t\t$!{He} breaks away much sooner than you would have liked. \"We should go down to the feast,\" ${he} says, more firmly this time.\n\t\t\t*goto part2_lot_greet\n\t\t*else\n\t\t\t*set romance_gawain false\n\t\t\t$!{He} goes red. \"I've had enough of this. Drop it, all right? I don't want to hear that sort of thing from you again—I'm not interested.\"\n\t\t\t*goto part2_lot_greet\n\t\n*label part2_lot_greet\n*page_break\n$!{King} ${Lot}'s hall is finer than the Long Hall at Dinas Emrys. Although not near as large, it's taller, with great oak rafters supporting rings of tallow candles. Four great fire-pits burn at the corners of the room, sending smoke up to hover amongst the beams, which are carved with swirls and spirals that look like something the Pictish folk would paint on their bodies.\n\nThree trestle tables run the length of the hall, and ${Lot} and ${his} family sit at the head of the central one. ${Gawain} leads you to that table, as honored guest, and as you approach ${Lot} rises. \"Ah, the Warleader of Britain! Greetings to you, ${Arthur} ${ap} ${Uther}—I hope your journey was not too arduous. Thank you for bringing my family together once more.\"\n\nAround the table sit ${Gareth}—next to a young ${woman} with pale-gold hair, presumably ${Laurel}—and a tall lean-boned ${man} who from ${his} coloring must be ${Agravaine}. Next to ${Lot} sits a\n*if gender=\"male\"\n\tbeautiful\n*if gender=\"female\"\n\thandsome\n${woman} with raven-black hair and, to your shock, ${Morgan}'s features, if more well-fed; this must be ${Morgause}. Next to ${her_him} is an older ${man}, seamed and white-haired, but with a firm jaw and keen dark eyes. This must be ${Duncan}, $!{King} of Strathclyde, ${Laurel}'s ${father}.\n\n$!{King} ${Lot} gestures you to your seats. You find yourself next to ${Morgan},\n*if (romance_gawain and chapter7_gawain_kissed)\n\t*if romance_morgan\n\t\t*set rel_morgan %-20\n\t\twho looks at your face and at ${Gawain}'s and you see ${her_his} lips tighten to a firm line.\n\t\t\n\t\t${Cai} looks across the table at you and shakes ${his} head.\n\t\t*goto part2_lot_sword\n\t*else\n\t\twho leans over to you and murmurs \"You realize, Art, that I'm going to find out why you two are blushing?\"\n\t\t\n\t\t${Cai} looks across the table at you and grins.\n\t\t*goto part2_lot_sword\n*elseif (romance_morgan)\n\twho meets your eyes, smiling warmly at you and then seems to realize ${she}'s doing it and hastily looks away.\n\t\n\t${Cai} looks across the table at you and waggles ${his} eyebrows.\n\t*goto part2_lot_sword\n*else\n\twho murmurs, \"You're late,\" without moving ${her_his} lips.\n\t\n\t${Cai} looks across the table at you and rolls ${his} eyes.\n\t*goto part2_lot_sword\n\n*label part2_lot_sword\n*page_break\n\"Honored guests,\" says $!{King} ${Lot}, rising to stand once more. \"It is good that you are all here. My ${son} and my ${daughter}-to-be will not wed until the morrow, but I, I have had something put into my hands this day which I cannot wait until then to show you. Indulge me—as my ${wife} is fond of telling me, I am a little ${boy} at heart.\" $!{His} broad grin is infectious; this is not the dour Northern chieftain that you expected.\n\n$!{He} raises a hand, beckoning. A flaxen-haired ${woman} in braid-edged clothes steps forward bearing a long bundle in ${her_his} hands. $!{She}'s tall, with scarred hands and a seamed face and eyes of brightest blue.\n\n\"Saxon!\" ${Cai} can't help saying it out loud in ${his} surprise. You see ${Duncan}'s hand grip ${his} sword reflexively, eyes on the ${woman}.\n\n${Lot} nods. \"Yes indeed, ${Cai} ${ap} ${Ector}, ${Marta} is a visitor to our shores, as I understand you are? $!{She} is a crafts${woman} of great renown amongst ${her_his} people, and ${she} brings me this.\"\n\n$!{He} takes the bundle from the Saxon ${woman} and unwraps it. Inside is a sword that makes you draw a breath. It glitters in the firelight, the steel of the blade faceted, patterned like the bones of a fish. The hilt is of golden metal, and looks to be a tracery that chases itself around and about like twisted ivy. The grip is silver wire; the pommel is of gold, again, and bears the sign of a leaping fish.\n\n\"This I had made for you, ${Duncan} of Strathclyde,\" says ${Lot}, holding the hilt towards ${Laurel}'s ${father}. \"To be a symbol of our new-found alliance.\"\n\n${Duncan} keeps ${his} composure, but it's clear ${he} realizes the magnitude of the gesture. \"$!{King} ${Lot}—the gift of your ${son} is enough for any ${father}, but this…it is generous beyond words.\"\n\n\"Don't thank me yet,\" says ${Lot} with a quick grin. \"It's not yours until the deed is done. And now I see it I've a fancy to keep it for myself. So I think you should be keeping a close eye on these two. ${Laurel}—can I press you to another jug of wine?\" There's laughter; ${Lot} wraps the blade again and sets it in the hands of a serving-${man}. \"Take this,\" ${he} says, \"and see it's set in the strongroom. We'll fetch it again tomorrow eve.\" $!{He} raises ${his} cup. \"And now we should celebrate—for all my family is now here! To family!\"\n\n\"To family!\" The toast echoes around the hall and the serious business of feasting starts.\n*comment --------------------------------------------------------------\n*comment --------------------------------------------------------------\n*page_break\n*label part2_cutaway1\n[i]\"So, $!{brother}, that's your famous ${Arthur}, is it? Got you well trained; seems you're following ${him} around like a lapdog. That's a fine sight for the people of Lothian.\"[/i]\n\n[i]\"${Agravaine}.\" ${Gawain} colors. \"Mind what you say—${Arthur}'s an honored guest here.\"[/i]\n\n[i]\"Oh, come on, the ${man}'s an upstart and a foreigner. What are you doing following ${him}?\"[/i]\n\n*if rel_gawain>50\n\t[i]\"Think what you like—${he}'s a damned good choice, even if ${he} doesn't know it ${himself}. $!{He}'ll surprise you.\"[/i]\n\t\n\t*if romance_gawain\n\t\t[i]\"Why…oh, my ${brother}. You're sweet on ${him}, aren't you? You bloody fool.\"[/i]\n\t\t\n\t\t[i]\"Whatever's between us is exactly no business of yours.\"[/i]\n\t\t\n\t\t[i]\"You're still a ${prince} of Lothian, even if you pretend otherwise. Tie yourself to a shameful relationship with one of those who's well on the way to destroying Britain, if that's what you want to do, but don't drag our name down with it.\"[/i]\n\t\t*goto part2_cai\n\t*else\n\t\t[i]\"Fair enough, $!{brother}, fair enough. Maybe ${he}'ll surprise me, although I doubt it. Just try and have some thought for your own country, will you?\"[/i]\n\t\t*goto part2_cai\n\t\t\n*else\n\t[i]\"I swore an oath to ${Arthur} as my Warleader, ${Agravaine}. Unlike other members of my family, I keep my oaths.\"[/i]\n\n\t[i]\"Watch your tongue. You may be the older ${brother}, but I'm the one who's still here standing by our family.\"[/i]\n\t*goto part2_cai\n\t\n*comment --------------------------------------------------------------\n*label part2_cai\n*page_break\nAs the meal breaks up, so too do people start to mingle, standing or sitting in small groups and talking. You can see ${Gawain} with ${his} ${brother} ${Agravaine}; you get the distinct impression that there's some heat to their words.\n\n\"So, $!{brother},\" says ${Cai}, leaning over the table, cup in hand. \"Life seems to be getting complicated for you at the moment. What's on your mind?\n*if romance_morgan\n\t${Morgan}?\n*if romance_gawain\n\tOur giant Northern friend?\n*if (romance_morgan or romance_gawain)\n\tOr some other torrid relationship I don't know about?\"\n\t*goto part2_cai_2\n*else\n\tPolitics? Love? Saxons?\"\n\t*goto part2_cai_2\n\t\n*label part2_cai_2\n*choice\n\t*if (romance_morgan) #\"${Morgan}. $!{She}'s…confusing.\"\n\t\t\"Oh, is that all? That's simple enough. \n\t\t*if rel_morgan\u003c40\n\t\t\t*set romance_morgan false\n\t\t\t$!{She}'s just discovered ${she} doesn't like you very much. Never mind what happened at the feast. Sorry, $!{brother}—I suppose time changes people. $!{She} probably preferred what you were like before us terrible Romans got our claws into you. My advice is to move on.\"\n\t\t*if rel_morgan>=40\n\t\t\t$!{She}'s your friend, and doesn't want to ruin that; ${her_his} ${mother} doesn't want ${her_him} involved with you…not much more to be said, really. I'm sure ${she}'ll come around. You know, if you do something about that ugly face of yours. Like wash it.\"\n\t\t*goto part2_emrys\n\t\t\n\t*if (romance_gawain) #\"${Gawain}. I'm not sure what's going on there.\"\n\t\t\"I am! \n\t\t*if chapter7_gawain_kissed\n\t\t\tThe two of you fooled around before the feast, which is why you were both \n\t\t\t*if gender=\"male\"\n\t\t\t\tbright red and having trouble walking.\n\t\t\t*if gender=\"female\"\n\t\t\t\tbright red.\n\t\t\tThat sounds entirely healthy to me, and I'd suggest, $!{brother}, that things are going well.\n\t\t*if chapter7_gawain_kissed=false\n\t\t\t*if rel_gawain\u003c=40\n\t\t\t\t*set romance_gawain false\n\t\t\t\t$!{He} doesn't like you much. I don't know what you've done, but I'd back off if I were you.\"\n\t\t\t\t*goto part2_emrys\n\t\t\t*else\n\t\t\t\tI'm pretty sure ${he} likes you. You just need to sweet-talk ${him}. And wash, of course. I reckon you'll do all right. \n\t\tCan't say ${he}'s my type, mind, being knocked senseless has never been a favorite thing of mine, but each to their own.\"\n\t\t*goto part2_emrys\n\t\t\n\t*if (romance_gawain and romance_morgan) #\"${Morgan}. ${Gawain}. I don't know what to do.\"\n\t\t$!{He} takes a long draught from ${his} cup, and then upends it on the table. \"$!{Brother},\" ${he} says, \"I think you should both have your cake [i]and[/i] eat it, if you take my meaning.\" $!{He} waggles ${his} tongue comically and you snort wine.\n\t\t\n\t\t\"Seriously,\" ${he} says as you try to catch your breath. \"It depends if you're in it for the fun, or for something else. If for fun, you need to let them both know that, I'd say. If for something else…then I think you might just have to make a choice.\" $!{He} looks perturbed for a moment. \"Oh dear. I must be drunk. I think I just advised you to forego at least one pleasure of the flesh. Do forgive me, won't you?\"\n\t\t*goto part2_emrys\n\t\t\n\t#\"The Saxons. I don't like that they're here—I don't know what ${Lot} is playing at.\"\n\t\t\"Probably playing us all off against each other, I shouldn't wonder. ${Emrys} says ${he}'s a sly one. Whatever it is, I think $!{King} ${Duncan}'s as wary of them as you, from the looks I've seen. But that ${woman}'s sword was something, though, wasn't it? Amazing piece of work. Wouldn't mind a piece like that myself.\" $!{He} sips from the cup before adding \"The sword. I [i]did[/i] mean the sword.\"\n\t\t*goto part2_emrys\n\t\t\n\t#\"This place. It feels like we've stepped into a nest of vipers. I think I know why ${Gawain} left.\"\n\t\t\"Oh, I don't know. ${Gareth} seems all right. And that ${Morgause}…${she}'s something, isn't ${she}? Like ${Morgan},\n\t\t*if gender=\"male\"\n\t\t\tbut she curves where Morgan goes straight up and down. And she's learned how to brush her hair.\n\t\t*if gender=\"female\"\n\t\t\tbut with a bit of proper muscle, taut in the right places, and has learned a bit about grooming.\n\t\t${Lot}'s a lucky ${man}!\"\n\t\t\n\t\t\"Don't do anything stupid, ${Cai}.\"\n\t\t\n\t\t\"When do [i]I[/i] do anything stupid?\"\n\t\t*goto part2_emrys\n\t\t\n\t#\"I just feel out of my depth.\"\n\t\t*if (leader>=50)\n\t\t\t\"Don't be too hard on yourself, Art. I've been a bit surprised as to how well you've taken to leading these heathens, in all honesty.\"\n\t\t\t*goto part2_emrys\n\t\t*if (diplomat>=50)\n\t\t\t\"Don't be too hard on yourself, Art. I've been a bit surprised as to how well you've dealt with all the politicking, to be honest. I couldn't cope with that.\"\n\t\t\t*goto part2_emrys\n\t\t*if (warrior>=50)\n\t\t\t\"Don't be too hard on yourself, Art. I've been a bit surprised as to how you've handled yourself in a fight, to be honest. I mean it's one thing on the training ground, and quite another here. The locals respect that kind of thing.\"\n\t\t\t*goto part2_emrys\n\t\t\"I don't know, $!{brother}. Maybe you should stop trying to be all things to all ${men}.\"\n\t\t*goto part2_emrys\n\t\n*comment --------------------------------------------------------------\n*label part2_emrys\n*page_break\n*if chapter7_malcolm_saved\n\tLater, as you cross the room, you spot ${Emrys} in a corner, deep in conversation with ${Malcolm}, the ${man} you rescued on the road. ${Emrys} lifts a hand in acknowledgment—you head over to talk to them.\n\t\n\t\"${Malcolm}'s been telling me a bit of the news from up here in the North,\" says ${Emrys}. \"Having these Saxons here isn't an unusual thing; not all are like ${Cynric} and ${Cerdic}. Over the past few years there's been a lot more trade going on with different groups, rather than war.\"\n\t\n\t${Malcolm} nods. \"That one,\" ${he} says, gesturing with ${his} cup at the Saxon swordsmith, \"$!{She}'s been at my ${lord}'s hall before. $!{She} had axes to trade, both for war and for woodcutting. $!{She}'s always done fairly by us.\"\n\t\n\t\"What happens to you now?\" you ask ${Malcolm}.\n\t\n\t\"When I'm fit, I'm for home; ${Lot} has already sent a message to my ${lord}'s kin to give them the news, but I need to get back there.\n\t*if chapter7_kill_bandits=false\n\t\tAnd ${he}'s arranged for ${men} to go out to find any trace of those bandits and where they hide themselves.\n\tThank you.\"\n\n\t\"Oh, we were just in the right place,\" says ${Emrys}. \"The will of the gods, or the random chance of the world, take it how you will.\"\n\t\n\t${Malcolm} raises ${his} cup to you and then heads to find more food.\n\t\n\t${Emrys}'s brows furrow as ${he} looks around the room.\n\t*goto part2_emrys_2\n*else\n\tLater, as you cross the room, you spot ${Emrys} in a corner looking off into the middle distance, no doubt deep in contemplation of some puzzle or other. You head over to talk to ${him}.\n\t\n\t*goto part2_emrys_2\n\t\n*label part2_emrys_2\n\"This stonework could be Roman,\" ${he} says to you. \"Isn't that odd? I wonder which outpost this might once have been?\"\n\n$!{His} expression, in that moment, seems to be that of a deeply befuddled woodpecker. You abruptly burst out laughing, and when ${he} makes it worse by peering at you quizzically, it takes you half a minute to catch your breath.\n\n\"Yes, well, now that's over,\" ${he} says crossly, \"is there some advice I can give you, oh great Warleader of Britain?\"\n\n*choice\n\t#\"I don't think I've ever met anyone quite like you.\"\n\t\t*set chapter7_emrys_ambrosius true\n\t\t$!{He} looks at you, and you realize that ${his} expression isn't unfocused any more, it's sharp and clear. \"You have, you know. We're not so different, you and I. Had I traveled a different path…my fate might have been yours. Standing up in front of people. Being seen as a figurehead for a cause. I chose not to, I chose to wander. I am thankful that you chose otherwise.\"\n\t\t\n\t\tYou study ${him}, confused. $!{He}'s older than you, but not that much older—ten years at the most, just travel worn. $!{He} could even be termed \n\t\t*if gender=\"male\"\n\t\t\thandsome \n\t\t*if gender=\"female\"\n\t\t\tpretty \n\t\tif ${he} braided ${his} hair and tidied ${his} clothes. \"What do you mean?\"\n\t\t\n\t\t\"We're both bastards, ${Arthur}, didn't you know? I'm the ${son} of ${Ambrosius}—but not by ${his} ${wife}.\"\n\t\t\n\t\t${Ambrosius}! ${Uther}'s elder ${brother}; the last truly Roman ruler of the Briton kingdoms, respected and loved in a way ${Uther} never was. You remember ${him}, from when you were a ${boy}; a stern figure, but always a kindly one to you.\n\t\t\n\t\t\"You're my cousin?\"\n\t\t\n\t\t${Emrys} smiles gently. \"That's all in the past. For the present…we have ${Lot} to deal with. Tread softly this eve.\"\n\t\t*goto part2_emrys_morgause\n\t\t\n\t*if (chapter2_uther_healed=false) #\"When we met in Dinas Emrys…I'm sorry I stopped you helping ${Uther}. Perhaps you could have helped, after all.\"\n\t\t*goto part2_emrys_uther\n\t\t\n\t*if (chapter2_uther_healed) #\"When we met in Dinas Emrys…you helped ${Uther}. Thank you for that.\"\n\t\t*goto part2_emrys_uther\n\t\t\n\t#\"How do you suggest I get ${Lot} on my side?\"\n\t\t\"Flatter ${him}. Make ${him} believe ${he}'s cleverer than you, that ${he} has you outmaneuvered. $!{He}'s more likely to grant you troops if ${he} thinks ${he} can control you.\"\n\t\t\n\t\t\"What if ${he} can?\"\n\t\t\n\t\t\"Don't worry. If ${Lot}'s pulling your strings, I'll be sure to tell you.\"\n\t\t*goto part2_emrys_morgause\n\t\t\n*label part2_emrys_uther\n\n$!{He} shrugs. \"No matter. I can't help but think, now, that perhaps ${Vivian} was right. It might have been better if ${he} had died. This slow decline is bringing ${him} no joy, and it still might be the ruin of Britain.\"\n*label part2_emrys_morgause\n$!{He} looks across the room. \"Ah. I see ${Morgan} has caught up with ${her_his} ${sister}. I don't know, ${Arthur}—f I were ${Cai} I think I might be placing some sort of wager on who would survive.\"\n\n\"And?\"\n\n\"${Morgan},\" ${he} says. \"Always ${Morgan}. I know ${Morgause} of old; when you get right down to it, ${she}'s manipulative, spiteful, but terribly, terribly lazy.\"\n*goto part2_cutaway2\n\n*comment --------------------------------------------------------------\n*label part2_cutaway2\n*page_break\n[i]\"Oh, $!{sister} dear, but we were only saying it the other day—is it not time you told $!{mother} where to stick the whole ${priestess} thing and found a ${man} to settle down with? Or even just found a ${man}!\"[/i]\n\n[i]\"It's not your business, ${Morgause}.\"[/i]\n\n[i]\"Oh, come on. What if you married ${Bedwyr}? Heir to Gwynedd's throne, heir to the throne of Britain if ${he} tried hard enough and my ${Lot} didn't get there first.[/i]\n*if gender=\"male\"\n\t[i]Handsome, a warrior of renown…\"[/i]\n*if gender=\"female\"\n\t[i]Shapely, a warrior of renown…\"[/i]\n\n[i]\"And what am I supposed to do—sit home and comb my hair?\"[/i]\n\n[i]\"That's not what I mean. I'm talking about getting out from under $!{mother}'s thumb. What about ${him}?\"[/i]\n\n[i]\"Who?\"[/i]\n\n[i]\"Don't play the dimwit. ${Arthur}. Look at ${him}. Young, gorgeous eyes, ${he}'s the right shape in all sorts of different ways, and if you don't I might beat you to ${him}.\"[/i]\n\n*if ((((romance_gawain=true) and (romance_morgan=false)) and (chapter2_spent_night!=\"morgan\")) and (rel_morgan>50)) \n\n\t[i]\"Perhaps, although ${he} turned me down at Nos Calan Gaeaf. Besides, I think ${he}'s set ${his} sights on someone else.\"[/i]\n\t\n\t[i]\"Really, my dear? How fascinating. Who?\"[/i]\n\t\t\n\t[i]\"That's not our business. Just leave well alone, ${Morgause}. I'm not playing your games.\"[/i]\n\t*goto part2_morgan\n\t\n*elseif (romance_morgan=true) \n\n\t[i]\"Leave ${him} alone, $!{sister}. $!{He}'s not one of your pets.\"[/i]\n\n\t[i]\"You and ${he}…? Oh yes, I thought I caught one or two looks at the table.\"[/i]\n\t\t\n\t[i]\"That's not— I mean, it was only once. It's not a—\"[/i]\n\t\t\n\t[i]\"I suppose that's wise—it can get such a terrible bore having them trail after you.\"[/i]\n\t\n\t[i]\"Oh, stop it, ${Morgause}. Things are complicated enough. I'm not playing your games.\"[/i]\n\t*goto part2_morgan\n\t\t\n*else\n\t\t\n\t[i]\"$!{He}'s a good leader, but I'd rather fight alongside ${him} than wrestle with ${him}.\"[/i]\n\t\n\t[i]\"Oh well. ${Duncan} has a younger ${brother}, a ${prince} in ${his} own right—perhaps I can introduce you?\"[/i]\n\t\n\t[i]\"Oh, stop it, ${Morgause}. Things are complicated enough. I'm not playing your games.\"[/i]\n\t*goto part2_morgan\n*comment --------------------------------------------------------------\n*comment --------------------------------------------------------------\n*label part2_morgan\n\n*temp spoken_to_morgan\n*set spoken_to_morgan false\n*temp spoken_to_gawain\n*set spoken_to_gawain false\n\n*comment Don't want to have 'empty' conversation with Morgan so let's skip this if we don't have interesting stuff to say\n*if ( (romance_morgan=false) or ((rel_morgan>=40) and (rel_morgan\u003c60)) )\n\t*goto part2_propositions\n\n*page_break\n*set spoken_to_morgan true\n\nYou finally catch up with ${Morgan} out in the courtyard. $!{She}'s sat on the steps of the fortress wall, looking out over the sea, expression sour.\n\n\"${Morgan}. It doesn't look like you're enjoying the family reunion.\"\n\n*if (rel_morgan\u003c40)\n\t*set romance_morgan false\n\t$!{She} sighs. \"Look, ${Arthur}, you're the last person I want to talk to right now. This, us…just…you're not the person I thought you were. Let's do what we can to rebuild the mess ${Uther}'s making, fine, but other than that…forget what happened at Nos Calan Gaeaf, or we'll fall out. I made a mistake.\"\n\t\n\tAnd then ${she}'s gone, disappearing back down the steps into the main building.\n\t*goto part2_propositions\n*elseif romance_gawain\n\t\"Look…${Arthur}. I want to ask you something. I've seen the way ${Gawain} and you…well. The two of you. There was a time when I thought the two of us, and I keep seeing…ach, I'm no good at this. Just…what do you want?\"\n\t*choice\n\t\t#\"You.\"\n\t\t\t*set rel_morgan %+10\n\t\t\t*achieve torn\n\t\t\t$!{She} raises an eyebrow. \"Then perhaps you should stop paying so much attention to ${him}?\" $!{She} sees your expression and sighs. \"Look, Art, I know coming back to this place has been strange for you. Just…if there is to be a chance for us…\"\n\t\t\t\n\t\t\t$!{She} leaves it hanging for a moment.\n\t\t\t*if rel_morgan>65\n\t\t\t\tThen ${she} lays a hand on the step beside ${her_him}. \"Sit, ${Arthur}.\"\n\t\t\t\t*goto part2_sleep_morgan\n\t\t\t\"I'm for bed,\" ${she} says. \"I'm tired, and in a sour mood. I'll see you in the morning.\" $!{She} heads back down the steps into the main building, leaving you to your thoughts.\n\t\t\t*goto part2_propositions\n\t\t\t\n\t\t#\"I'm sorry, ${Morgan}. This thing with ${Gawain} took me by surprise, but—I think I want to see where it goes.\"\n\t\t\t*set romance_morgan false\n\t\t\t*set rel_morgan %-20\n\t\t\t*achieve torn\n\t\t\t$!{She} swallows, and turns away. \"Very well. I'm tired, Art. I'll see you in the morning.\" $!{She} heads back down the steps into the main building, leaving you to your thoughts.\n\t\t\t*goto part2_propositions\n\t\t\t\n\t\t#\"Can't I have both?\"\n\t\t\t*set romance_morgan false\n\t\t\t*set rel_morgan %-30\n\t\t\t$!{She} stares at you for a moment, expression hard, and then says \"No. But don't worry, Art, you've just made your decision much easier. You're not the person I thought you were, not the ${boy} who left Gwynedd all those years ago. I made a mistake. I'll see you in the morning.\" $!{She} heads back down the steps into the main building, leaving you to your thoughts.\n\t\t\t*goto part2_propositions\n*else\n\t$!{She} grimaces. \"Yes. There's a lot to think about. Will you sit?\" $!{She} lays a hand on the step beside ${her_him}.\n\t*goto part2_sleep_morgan\n\n*comment --------------------------------------------------------------\n*label part2_sleep_morgan\n\nYou settle yourself down. $!{Her_his} shoulder presses against yours companionably. \n\nAfter a time ${she} says \n*if chapter3_morgan_intentions=\"none\"\n\t\"I know you said you didn't want to take things further, but I thought you might have been lying to please me. I've thought a lot about this. I'd like you to answer, truthfully, now, and I won't ask you again. \n*if chapter3_morgan_intentions=\"more\"\n\t\"I've thought a lot about this. You said you wanted more than friendship from me, but it was the morning after the festival and I'm not sure if you were thinking straight. So I'd like you to answer, truthfully, now, and I won't ask you again. \n*if chapter3_morgan_intentions=\"unknown\"\n\t\"We've not properly talked of what happened at Nos Calan Gaeaf. I've thought a lot about it, and I'm not sure what to do. But I'd like you to answer, truthfully, now, and I won't ask you again. \nIs it your wish that we be together? For more than a festival night?\"\n*choice\n\t#\"Yes.\"\n\t\t*set lover_morgan true\n\t\t$!{She} lays ${her_his} head on your shoulder and just sits there, silent, for a while.\n\t\t\n\t\t\"It's going to be a hard road,\" ${she} says at last. \"We may be drowned in a tide of Saxons within the year. And then there's $!{mother} to contend with. I'm not sure which is worse.\" $!{Her_his} fingers lace into yours. \"${Ambrosius} used to say that you've no real life if you fail to live it. So. Here we are, you and me, with the dark all around us. Let's face it together for a time.\"\n\t\t\n\t\t$!{She} cups ${her_his} hand under your chin, hesitates, and then draws you into a kiss.\n\t\t*goto part3\n\t\t\n\t#\"No.\"\n\t\t*set romance_morgan false\n\t\t*set rel_morgan %-20\n\t\tYou hear an exhalation of breath, and then ${Morgan} pulls away from you and gets to ${her_his} feet. $!{She} doesn't look at you. \"Very well. I'm tired, Art. I'll see you in the morning.\"\n\t\t\n\t\t$!{She} heads back down the steps into the main building, leaving you to your thoughts.\n\t\t*goto part2_propositions\n\t\t\n\t#\"In truth, I don't know, ${Morgan}.\"\n\t\t*set rel_morgan %-10\n\t\t$!{She} sighs. \"And there's the decisive Warleader of the Briton kingdoms.\" $!{She} pulls away from you and gets to ${her_his} feet. $!{She} doesn't look at you. \"I'm tired, Art. I'm going to bed. I'll see you in the morning.\"\n\t\t\n\t\t$!{She} heads back down the steps into the main building, leaving you to your thoughts.\n\t\t*goto part2_propositions\n\n*comment --------------------------------------------------------------\n*label part2_propositions\n\n*if (romance_gawain and (rel_gawain>60))\n\t*page_break\n\t*set spoken_to_gawain true\n\t*if spoken_to_morgan=false\n\t\tLater in the evening you step out into the main courtyard for a breath of fresh air.\n\t\n\tYou've been standing there for a while looking up at the crisp, cold stars when you realize there's someone behind you.\n\t\n\t\"Art.\"\n\t\n\tIt's ${Gawain}. For someone of ${his} size, ${his} steps are unexpectedly quiet.\n\t\n\t*if chapter7_gawain_kissed=false\n\t\t\"So there's something we should have talked about before,\" ${he} says, all in a rush of words, as if afraid to keep them pent up. \"Although, in truth, I'd like it if there was a bit more than talk.\"\n\t*if chapter7_gawain_kissed\n\t\t\"I'd like it if we carried on from where we left off earlier,\" ${he} says, all in a rush of words, as if afraid to keep them pent up.\n\t\t\n\tYou turn; ${he}'s smiling tentatively; there's a clay cup in ${his} hand. $!{He} sees you notice it and blushes again. \"For courage,\" ${he} says, with a defiant edge to ${his} tone.\n\t\n\t*choice\n\t\t#\"It's about time.\"\n\t\t\t*set lover_gawain true\n\t\t\tYou take the cup from ${him} and drain it. Then you step into ${his} embrace. It's warm, enveloping, driving away the cold. $!{He} kisses you full on the lips, and you lose yourself in the sensation for a while and the scent of woodsmoke in ${his} hair. Then ${he} pulls back. \"Maybe not here.\"\n\t\t\t\n\t\t\tYou shrug. \"Not here. But somewhere.\"\n\t\t\t\n\t\t\t\"Come with me,\" ${he} says.\n\t\t\t*goto part3\n\t\t\t\n\t\t#\"I'm sorry; I've been thinking about this a lot and I've made a mistake in leading you on. Please forgive me.\"\n\t\t\t*set rel_gawain %-30\n\t\t\t*set romance_gawain false\n\t\t\t$!{His} face falls. It's like kicking a faithful hound. The red on ${his} cheeks rises to the roots of ${his} hair and ${he} turns ${his} eyes away from you, shoulders squaring. \"Aye. Well. That's all that needs said, then, isn't it?\"\n\t\t\t\n\t\t\t$!{He} throws the goblet to the ground; it clatters on the flagstones, wine staining the grey.\n\t\t\t\n\t\t\t\"${Gawain}, I…\"\n\t\t\t\n\t\t\tBut ${he}'s gone, striding across the courtyard, heading back into the inner fortress.\n\t\t\t*goto part3\n\t\t\t\n\t\t#\"That's wonderful, but this isn't the place and time, is it? What if your family were to find out?\"\n\t\t\t$!{He} holds your eyes for a moment as if drinking you in, and then gives a sigh, looking away, \"Aye,\" ${he} says, draining the cup. \"You're probably right. Well, then, I'm for my bed. But before I go, ${Arthur}, know that there'll be less talking about this the next time we're alone.\"\n\t\t\t\n\t\t\t\"Really?\"\n\t\t\t\n\t\t\t\"That's a promise.\" $!{His} hand twitches by ${his} side as if in an abortive attempt to reach for you; then ${he} strides off towards the inner fortress.\n\n\t\t\t*goto part3\n\t\t\t\n\t\t*if (romance_morgan) #\"I'm sorry, ${Gawain}; I'm in love with ${Morgan}. I think I have been as long as I can remember—I just didn't realize it until very recently.\"\n\t\t\t*set romance_gawain false\n\t\t\t*set rel_gawain %-20\n\t\t\t\"${Morgan}. Aye.\" $!{He} turns ${his} eyes away from you, squaring ${his} shoulders, and takes a long draught from the goblet. $!{He} wipes ${his} mouth. \"I can't say I'm wholly surprised. Well, then. That's all that needs said, isn't it?\"\n\t\t\t\n\t\t\t$!{He} drops the goblet to the flagstones and then stamps on it, hard. It cracks into shards. $!{He} grinds them underfoot.\n\t\t\t\n\t\t\t\"${Gawain}, I…\"\n\t\t\t\n\t\t\tBut ${he}'s gone, striding across the courtyard, heading back into the inner fortress.\n\t\t\t*goto part3\n\t\t\n*comment --------------------------------------------------------------\n*label part2_emrys_proposition\n*if ( ( (spoken_to_gawain=false) and (spoken_to_morgan=false) ) and ( (romance_morgan=false) and (romance_gawain=false) ) )\n\t*page_break\n\tLater in the evening you step out into the main courtyard for a breath of fresh air. You find ${Emrys} there, looking up at the stars and then scribbling with chalk on a flagstone, deep in concentration. \"${Emrys}. What are you working on?\"\n\n\t\"Oh.\" $!{He} looks almost embarrassed. \"It's ridiculous, I suppose. There is a Greek system of thought, brought in from Chaldea, that the stars that attend our birth can determine the paths we'll take in life. That if you have the hour and place of birth of anyone, you can calculate their fate.\"\n\t\n\t\"I've heard of it. Why do you find it ridiculous?\"\n\t\n\t\"Oh, it has been thoroughly examined and discarded by many respected scholars…and yet… I never like to discard something that I have not tested for myself.\"\n\t\n\t\"And what have you concluded? Were you looking at your own path?\"\n\t\n\t$!{He} swallows, and reddens. \"Amongst others.\"\n\t\n\tIt's rare to see ${him} so discomfited.\n\t\n\t*choice\n\t\t#\"Whose fate were you seeking?\"\n\t\t\t\"I was…attempting to calculate the fate that might befall Britain if we continue down this current path.\"\n\t\t\t\n\t\t\t\"And?\"\n\t\t\t\n\t\t\t\"The calculations are difficult to make, ${Arthur}, and I don't have my instruments. I have miscalculated, I think; for I came to two answers that wildly contradicted each other.\"\n\t\t\t\n\t\t\t\"What do you mean?\"\n\t\t\t\n\t\t\t\"Complete victory. And at the same time, complete defeat.\"\n\t\t\t\n\t\t\t\"I thought these calculations were always for a person, not for a whole land?\"\n\t\t\t\n\t\t\t\"They are. I charted your course, ${Arthur}.\"\n\t\t\t*goto emrys_proposition\n\t\t\t\n\t\t#\"I do believe you're blushing, Wanderer. Were you seeking the fate of someone dear to you?\"\n\t\t\t\"I…I was attempting to calculate the path of someone I deem important to the fate of Britain.\"\n\t\t\t\n\t\t\t\"And who is that?\"\n\t\t\t\n\t\t\t\"You.\" $!{He} scratches ${his} chin nervously, and won't meet your eyes.\n\t\t\t\n\t\t\t*goto emrys_proposition\n\t\t\t\n\t\t#\"Would you read mine?\"\n\t\t\t$!{He} reddens further. \"In truth, I already have.\"\n\t\t\t*goto emrys_proposition\n\t\t\n*goto part3\n\n*comment --------------------------------------------------------------\n*label emrys_proposition\n\n*choice\n\t#\"So you were…casting your fate and mine, together? That's…interesting.\"\n\t\t*set romance_emrys true\n\t\t$!{He} looks down at the ground and coughs nervously, absently twining a finger into ${his} hair. \"Yes. Well. Since I am attempting to be of aid to you, I was trying to determine if my help would be a hindrance or a boon.\"\n\t\t\n\t\t\"And what's the answer to that?\"\n\t\t\n\t\t\"I don't know. Both, perhaps.\"\n\t\t*goto part3\n\t\t\n\t#\"What did the stars tell you?\"\n\t\t\"I must have miscalculated; I don't have my instruments with me, and may have misremembered a chart. The conclusion I drew was twofold…that you would achieve complete success, but also complete defeat. Pay no heed to it.\"\n\t\t*goto part3\n\t\t\n\t#\"I'd prefer not to know.\"\n\t\t\"Nothing is proven; I had no instruments with me, so what I've read means nothing, not in truth. It was a whim, that's all. I will keep my results to myself.\"\n\t\t*goto part3\n\n*comment --------------------------------------------------------------\n*comment                        Part 3: The Missing Sword\n*comment --------------------------------------------------------------\n*label part3\n*page_break\n\n*temp coverup\n*set coverup false\n*temp accuse\n*set accuse \"\"\n\n*temp thief\n*set thief \"${Cai}\"\n*if chapter7_malcolm_saved\n\t*set thief \"${Malcolm}\"\n\nIt's the noise that wakes you up. Shouting in the corridor. Your eyes open, blinking, into morning light.\n\n*if lover_gawain\n\tThere's a hollow next to you. ${Gawain}. $!{He} was here with you, for at least part of the night. At the last you remember being curled up together, feeling ${him} tense, trying to hold ${his} breath, trying not to give away ${his} presence as a drunken ${Cai} stumbled around the room trying to find ${his} way to bed.\n\n*if lover_morgan\n\tThere's a hollow next to you. ${Morgan}. $!{She} was here with you, for at least part of the night. At the last you remember holding each other in the dark, entwined, both trying not to giggle as ${Cai} thumped around the room trying to find ${his} way to bed.\n\n\"Art?\" ${Cai} sits up, hair a haystack. \n*if chapter7_malcolm_saved\n\tIn the bed across from ${him}, ${Malcolm} is stirring. $!{He} looks considerably less bleary-eyed than ${Cai}.\n\t\nYou hear another shout.\n\n\"Something about a sword?\" says ${thief}.\n\t\n*if chapter7_malcolm_saved\n\tAnd then you all see it, three pairs of eyes drawn to it like iron to a lodestone.\n*if chapter7_malcolm_saved=false\n\tAnd then you both see it, two pairs of eyes drawn to it like iron to a lodestone.\n\t\t\nA sword. [i]The[/i] sword, the one that ${Lot} had made for ${Duncan}. It lies amongst ${thief}'s gear, next to ${his} boots.\n\t\n\"How did it get here? Did you…?\" You stare at ${him}. \n\n$!{He} looks panicky. \"No! No, I swear…\"\n\nIt sounds like ${Lot}'s ${men} are searching room to room.\n\n${Cai} swallows. \"What do we do?\"\n\n*choice\n\t#\"What choice do we have? We own up; explain that we know nothing about it.\"\n\t\t*set compassion %-10\n\t\t*if chapter7_malcolm_saved=false\n\t\t\t*set rel_cai %-20\n\t\t\t${Cai} looks at you in shock. \n\t\t*if chapter7_malcolm_saved\n\t\t\t${Malcolm} looks at you in surprise. \"But surely—\"\n\t\t\n\t\tAnd the door flies open. In the doorway stands ${Agravaine}. \"Apologies for the interruption,\" ${he} says. \"It seems that during the night there was—\"\n\t\t\n\t\tThen ${he} sees the sword, in plain view next to ${thief}'s bed.\n\t\t\n\t\t\"No,\" says ${thief}, jumping up out of bed. \"No. It's not what it looks like. We found it here.\"\n\t\t\n\t\t\"And I'm to believe that?\" says ${Agravaine}. $!{He} advances towards the sword; there are two armed ${men} behind ${him}. \"Here is our thief.\" $!{He} glares at ${thief}. \"Even if this were a drunken prank, it's ill-done, and you'll answer for it.\"\n\t\t\n\t\tAnd then ${he} turns to you. \"And so will you. For did you not swear by\n\t\t*if chapter7_guest_oath=\"god\"\n\t\t\tyour god \n\t\t*if chapter7_guest_oath=\"gods\"\n\t\t\tthe gods \n\t\t*if chapter7_guest_oath=\"honor\"\n\t\t\tyour honor \n\t\tthat your people would do no ill? The shame—and the reparation—falls upon you, ${Arthur} ${ap} ${Uther}.\" $!{He} looks to ${his} ${men}. \"Bring them!\"\n\t\t*goto part3_arthur_blamed\n\t\t\n\t#\"Let's hide it, quick. We'll work out what to do with it later.\"\n\t\t*set leader %+15\n\t\t*set warrior %-15\n\t\t*comment Test cunning\n\t\t*if (bravado\u003c=40)\n\t\t\tYou tumble out of bed and grab the sword, then do the only thing you can think of; you loop a leather cord around the pommel and sling the sword out of the window, tying the cord to the peg that holds the shutter back. \n\t\t\t\n\t\t\tAs you hastily climb back into bed the door flies open. In the doorway stands ${Agravaine}. \"Apologies for the interruption,\" ${he} says. \"It seems that during the night there was a thief at work.\" There are two armed ${men} flanking ${him}.\n\t\t\t\n\t\t\t\"Why, what's missing?\" asks ${Cai}, blinking sleepily. \"Surely you can't think we had something to do with it?\"\n\t\t\t\n\t\t\t\"Oh, certainly not,\" says ${Agravaine}, \"but it's only fair of us to treat all our guests as equals. You understand.\"\n\t\t\t\n\t\t\tYou nod. \"Of course. Feel free to search.\"\n\t\t\t\n\t\t\tThey do so, as you stand shivering in the cold. You see ${thief}'s hands twitch as ${Agravaine} stands next to the window surveying the room.\n\t\t\t\n\t\t\tEventually ${Lot}'s ${son} gives a dissatisfied grunt. \"Nothing. It seems we must continue our search. We'll find it, that I swear.\" $!{He} looks around at all three of you, one by one, then ${his} lip curls and ${he} strides back out of the room followed by ${his} ${men}.\n\t\n\t\t\t*page_break\n\t\t\t\"Well, that was something,\" says ${Cai}. \"Now what?\"\n\t\t\t\n\t\t\t*choice \n\t\t\t\t#\"We get it back into the strongroom as quietly as we can, so as not to disturb the handfasting.\"\n\t\t\t\t\t*set compassion %+10\n\t\t\t\t\t*goto part3_back_to_strongroom\n\t\t\t\t\t\n\t\t\t\t#\"We go to ${Lot}, tell ${him} the truth and give it back to ${him}.\"\n\t\t\t\t\t*set bravado %+10\n\t\t\t\t\t*goto part3_return_sword\n\t\t\t\t\t\n\t\t\t\t#\"We hold on to it for now and try to work out how it ended up here.\"\n\t\t\t\t\t*set bravado %-10\n\t\t\t\t\t*goto part4\n\t\t*else\n\t\t\tYou tumble out of bed and grab the sword, then do the only thing you can think of; you slide it into the straw of your mattress.\n\t\t\t\n\t\t\tAs you hastily climb back into bed the door flies open. In the doorway stands ${Agravaine}. \"Apologies for the interruption,\" ${he} says. \"It seems that during the night there was a thief at work.\" There are two armed ${men} flanking ${him}.\n\t\t\t\n\t\t\t\"Why, what's missing?\" asks ${Cai}, blinking sleepily. \"Surely you can't think we had something to do with it?\"\n\t\t\t\n\t\t\t\"Oh, certainly not,\" says ${Agravaine}, \"but it's only fair of us to treat all our guests as equals. You understand.\"\n\t\t\t\n\t\t\tYou nod. \"Of course. Feel free to search.\"\n\t\t\t\n\t\t\tThey do so, as you stand shivering in the cold. It takes them minutes to find the blade where you so inexpertly stowed it. ${Agravaine}'s look is hard. \"I'd expected better, ${Arthur} ${ap} ${Uther}.\"\n\t\t\t\n\t\t\t${Cai} holds up a hand. \"Wait, wait. It wasn't ${him}. We found it here when we woke.\"\n\t\t\t\n\t\t\t${Agravaine} shakes ${his} head. \"You realize how ridiculous that sounds?\" $!{He} looks over at ${his} ${men}. \"Bring them.\"\n\t\t\t\n\t\t\tYou have little choice but to go with ${him}.\n\t\t\t*goto part3_arthur_blamed\n\t\t\n\t#\"We'll tell them it was a drunken prank; swallow our pride and take our punishment.\"\n\t\t*set bravado %+15\n\t\t\n\t\tWhen the door opens to reveal ${Agravaine} flanked by two ${men}, you are holding the sword. \"You are looking for this, I think?\"\n\t\t\n\t\t${Agravaine} glares at the \n\t\t*if chapter7_malcolm_saved=false\n\t\t\ttwo \n\t\t*if chapter7_malcolm_saved\n\t\t\tthree \n\t\tof you. \"So are you our thief, ${Arthur} ${ap} ${Uther}?\"\n\t\t\n\t\t\"It doesn't matter which of us it was. A ${man} in ${his} cups often goes astray. I apologize wholeheartedly, and will gladly say the same to $!{King} ${Lot}.\"\n\t\t\n\t\t\"You will,\" says ${Agravaine}, gesturing to ${his} ${men} to grab hold of you.\n\t\t\n\t\tYou have little choice but to go with ${him}.\n\t\t*goto part3_arthur_blamed\n\n*comment --------------------------------------------------------------\n*comment                   Return Sword To Strongroom\n*comment --------------------------------------------------------------\n*label part3_back_to_strongroom\n*if bravado\u003c=35\n\tIt's a straightforward enough task—the searchers are so convinced that the sword has been taken that they've left the strongroom unguarded, and it's a matter of slipping in while no one is looking and laying the sword next to ${Lot}'s chest of coin. You walk back to your quarters satisfied that at least this disaster has been averted.\n\t*goto part6\n*else\n\tIt's a straightforward enough task—the searchers are so convinced that the sword has been taken that they've left the strongroom unguarded, and it's a matter of slipping in while no one is looking and laying the sword next to ${Lot}'s chest of coin.\n\t\n\tOr so you think.\n\t\n\tThe sword has barely left your grasp when you realize that a shadow is blocking the door to the strongroom. It's ${Agravaine}.\n\t\n\t\"I thought better of you ${Arthur} ${ap} ${Uther}. And my ${brother} speaks so well of you. You can explain yourself to my ${father}.\"\n\t*goto part3_arthur_blamed\n\t\n\t\n*comment --------------------------------------------------------------\n*comment                   Return Sword Openly To Lot\n*comment --------------------------------------------------------------\n*label part3_return_sword\n*if diplomat>45\n\t${Lot}, when you face ${him} in ${his} chambers, is not pleased to see you.\n\t\n\t\"A prank?\" ${he} shakes ${his} head in disgust. \"I understand that standards have lapsed somewhat in ${Uther}'s hall, but they have not in mine. You claim the title of Warleader of the Britons, you swore an oath for the good behaviour of the ${men} under your command in my house. And now this? $!{Men} are wont to be unruly under the spell of ale, as you say, but more tact is needed if you're going to fulfil your role, ${Arthur}. Or perhaps you might consider whether you are best suited to some other station in life. Well. Let us say no more. The gift is returned and the handfasting shall continue.\"\n\t*goto part6\n*else\n\t*goto part3_arthur_blamed\n\t\n*comment --------------------------------------------------------------\n*comment                        Arthur Blamed\n*comment --------------------------------------------------------------\n*label part3_arthur_blamed\n*page_break\n*set acclaim %-20\nYou stand in ${Lot}'s private chambers. ${Agravaine} holds ${thief}'s arm firmly, and you'd swear ${he}'s trying not to smirk at your discomfiture. $!{Lady} ${Vivian} is a cowled shape in the corner, forbidding, mouth stern. \n*if lover_gawain\n\t${Gawain}, bleary-eyed and pale, is avoiding your eyes.\n*if lover_gawain=false\n\t${Gawain} is looking a little the worse for wear, and more than a little shocked at what's happened.\n\n${Lot} paces, the sword in ${his} hand. \"So this is the Warleader of the Britons? A youngster who can't control the ${men} under ${his} command—or ${himself}—as a guest in another ${man}'s hall?\" ${Lot} sets the blade down on ${his} table. \"Prank or malice, this is not something that can stand, ${Arthur} ${ap} ${Uther}. My ${son} has declared us allies in the sight of all, and this is how you treat us? What have you to say?\"\n\n*choice\n\t#\"The fault is mine, my $!{Lord} ${Lot}. I should have called for your ${men} when we first found the blade. It had been placed in my room, no doubt as a jest by another of the guests. If I or any of mine had truly stolen such a prize, would we have concealed it amongst our own belongings? That's the act of a fool.\"\n\t\t*if (diplomat>=45)\n\t\t\t$!{He} sighs. \"Aye—it is as you say. I spoke rashly. You would be a fool indeed to do so. The gift is returned, and we will say no more publicly about this; but be assured I will look into this matter.\"\n\t\t\t*goto part6\n\t\t*else\n\t\t\t${Lot} snorts. \"Or a drunkard. And none of you stinted on the wine yestereve.\" $!{He} shakes ${his} head. \"You're a fool, ${Arthur}, and I cannot let the insult to myself and my guests stand.\n\t\t\t*goto part3_arthur_spitehearth\n\t\t\t\n\t#\"${Gawain}—you know me better than this. Would I be so foolish as to insult my host in this manner? More than that—would I be so foolish as to leave the sword in my room?\"\n\t\t*if (rel_gawain>45)\n\t\t\t${Gawain} shakes ${his} head. \"This is nonsense, $!{father}. Someone's trying to drive a wedge between the two kingdoms, and they've made a poor job of it.\"\n\t\t\t\n\t\t\t*if romance_gawain\n\t\t\t\t${Agravaine} sneers. \"Defending your lover, $!{brother}? All know your feelings for this ${man}.\"\n\t\t\t\t\n\t\t\t\t${Gawain}'s fists clench. \"All ${men} know I do not lie,\" ${he} spits. \"And that is unchanged, whatever I feel for anyone in this room—including you.\"\n\t\t\t\t\n\t\t\t\t\"Enough!\" ${Lot}'s stare is diamond hard. \"${Agravaine}, if I hear that accusation on your tongue again, I'll tear it out. ${Gawain}, I will take your word on this, but be mindful that you are my ${son}, not ${Uther}'s vassal, nor ${his} ${son}'s.\n\t\t\t*if romance_gawain=false\n\t\t\t\t${Agravaine} sneers. \"You're more a ${man} of Gwynedd than of Lothian now, $!{brother}.\"\n\t\t\t\t\n\t\t\t\t${Gawain} bristles. \"I want the best for both kingdoms; indeed, for all of us. The Saxons are the enemy, not ${Arthur}, or had you forgotten?\"\n\t\t\t\t\n\t\t\t\t\"Enough,\" says ${Lot}, bringing ${his} hand down. \"I'll have peace.\n\t\t\tThe gift is returned, and we will say no more in public about this; but be assured I will look into this matter.\"\n\t\t\t*goto part6\n\t\t*else\n\t\t\t${Gawain} looks troubled. \"I want to believe you, ${Arthur}, but I wasn't there—I cannot be sure. There were a lot of folk in their cups last night.\"\n\t\t\t\n\t\t\t${Lot} shakes ${his} head in disgust. \"You're a fool, ${Arthur}, and I cannot let the insult to myself and my guests stand.\n\t\t\t*goto part3_arthur_spitehearth\n\t\t\t\n\t#\"$!{Lady} ${Vivian}. We may not see eye to eye on all matters, but you know that I wouldn't be foolish enough to risk an alliance for a night-time prank.\"\n\t\t*if ((rel_vivian>45) or (old_faith > 50))\n\t\t\t${Vivian} nods. \"$!{He} speaks truth, ${Lot}. Out of ${his} depth ${he} may be, but this has the mark of some other party trying to cause trouble.\"\n\t\t\t\n\t\t\t${Lot} massages ${his} temples with ${his} forefingers. \"Aye. Aye, $!{Lady}, you see clearly, as ever. Not even ${Arthur} ${ap} ${Uther} would be this foolish. Well. The gift is returned. We will say no more in public about this, but be assured I will look into the matter.\"\n\t\t\t*goto part6\n\t\t*else\n\t\t\t${Vivian} stares at you, eyes cold. \"Do I? You've done little to prove yourself to me so far, ${ap} ${Uther}. No, I'll not be your shield here.\"\n\t\t\t\n\t\t\t${Lot} shakes ${his} head in disgust. \"You're a fool, ${Arthur}, and I cannot let the insult to myself and my guests stand.\n\t\t\t*goto part3_arthur_spitehearth\t\n\t\n\t#\"My lord $!{Lot}, if you truly wish to level a formal accusation against Gwynedd and the High $!{King}'s representative, you risk any alliance between us. If you think I or my people are so foolhardy, then that is your choice. But tread carefully. Is it not more likely that some other party attempts to drive a wedge between us?\"\n\t\t*if ((bravado>=45) or (diplomat>60))\n\t\t\t$!{King} ${Lot} stares at you, eyes calculating, and then finally nods. \"It is as you say. I mis-spoke in my anger, Warleader. You would be indeed a great fool to play such a prank. It is more likely to be the work of troublemakers. The gift is returned, and we will say no more publicly about this; but be assured I will look into this matter.\"\n\t\t\t*goto part6\n\t\t*else\n\t\t\t${Lot} snorts. \"If that is supposed to be a threat, ${Arthur}. you have much to learn. It is you who have come to me cap in hand, not the other way around.\" $!{He} shakes ${his} head. \"You're a fool, ${Arthur}, and I cannot let the insult to myself and my guests stand.\n\t\t\t*goto part3_arthur_spitehearth\n\n*comment --------------------------------------------------------------\n*label part3_arthur_spitehearth\n*set acclaim %-30\n*set chapter7_epithet_spitehearth true\nI name you ${Arthur} Spitehearth, and you'll get no more troops from me. You may return to your ${father} now, you and these others; my ${son}, my ${wife}'s ${sister} and my ${wife}'s ${mother} will remain for the handfasting and I will ensure they have an escort to wherever they wish to go.\"\n\n*if rel_vivian>60\n\t\"My ${lord},\" says ${Vivian} gently, \"Is this wise? Think of the Saxons.\"\n\n\t\"The Saxons will not be defeated by ${Uther} and ${his} whelps.\"\n\n*label part3_sent_home\n\t\n*if rel_gawain>60\n\t${Gawain} can't contain ${himself} any longer. \"If you turn your back on ${Arthur} you turn your back on our best hope for uniting the kingdoms.\"\n\t\n\t${Lot} laughs. \"There are many ${men} within this hall who are better fighters, better strategists and who do not insult their hosts. You yourself, my ${son}, are twice ${Arthur} ${ap} ${Uther}. Let ${him} go on ${his} way with the reward ${he} deserves.\"\n\t\n\t\"If you cast ${him} out, I go too.\"\n\t\n\t*if rel_morgan>60\n\t\t\"And I,\" says ${Morgan} quietly.\n\t\t\n\t${Lot} shrugs. \"Very well.\"\n\t\n\t*goto part3_leave\n*else\n\t${Cai} bristles. \"But you can't just throw us out!\"\n\t\n\t${Lot} raises an eyebrow. \"Can I not? This is my hall.\"\n\t\n\t*if rel_morgan>60\n\t\t\"Then I go with them,\" says ${Morgan} quietly.\n\t\t\n\t\t\"
