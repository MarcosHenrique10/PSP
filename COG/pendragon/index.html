. This isn't Rome, Art.\"\n\t\t*if interest=\"gawain\"\n\t\t\t$!{He} looks at you for a moment. \"Aye. Your God be with you.\"\n\t\t*set old_faith %-30\n\t\t*goto part1_end\n\t\t\n\t#\"Don't worry. With the gods' help we'll get through this.\"\n\t\t*if interest=\"morgan\"\n\t\t\t*set rel_morgan %+15\n\t\t\t$!{She} smiles ruefully. \"They don't come at our beck and call, Art. But perhaps we can make them sit up and take notice. They're said to favor the suicidally brave.\"\n\t\t*if interest=\"gawain\"\n\t\t\t*set rel_gawain %+10\n\t\t\t$!{He} sighs. \"Aye. Though I'd give a lot if their help were another few hundred ${men}.\"\n\t\t*set old_faith %+20\n\t\t*goto part1_end\n\t\t\n\t#\"Making me leader may have been a mistake, but if nothing else I mean to take a few Saxon heads.\"\n\t\t*set leader %-30\n\t\t*set warrior %+30\n\t\t*if interest=\"morgan\"\n\t\t\t$!{She} lays ${her_his} hand on your arm. \n\t\t*if interest=\"gawain\"\n\t\t\t$!{He} lays ${his} hand on your arm. \n\t\t\"Don't just throw yourself into the fight blindly. Remember that if the Warleader falls, these people will fall apart. No matter what they may think of you now, without you there'd be no hope at all.\"\n\t\t*goto part1_end\n\n*label part1_end\n\n*if interest=\"morgan\"\n\tA shout goes up from the gate, and ${she} stiffens. \"We've work to do. Fight well, ${ap} ${Uther}.\"\n*if interest=\"gawain\"\n\tA shout goes up from the gate, and ${he} stiffens. \"We've work to do. Fight well, ${ap} ${Uther}.\"\n\n*comment --------------------------------------------------------------\n*comment                   Part 2: The First Wave\n*comment --------------------------------------------------------------\n*label part2\n*page_break\n\n*temp saxons_inside\n*set saxons_inside false\nAnd so they come.\n\nIt starts with three dozen ${men} striding up to the gates as if they own the ground they walk on, axes and swords in hand, pale hair loose, tattoos and paint on skin that gleams in a mix of the dying sunlight and the torches that they bear. There's no pause outside, no moment for parley; a shout in the barbarian tongue and axes rise and fall, cutting into the ropes and pegs that hold the logs of the gate together. And then the torches are thrown up and over the palisade, no doubt aimed to hit the thatch of buildings. They fall short—the folk of Gwynedd are not foolish enough to build against the palisade—but the guttering fires throw a haze of smoke across everything.\n\n*if chapter2_uther_healed=true\n\t${Uther} stands by the Long Hall; you can feel ${his} gaze on your shoulders. $!{He}'s too ill to be in the front lines, but you know just having ${him} there will help the ${men}.\n\t\n${Gawain} stands just inside the entry-way, warriors of Gwynedd around ${him}. Many of them are braced against the tree-trunks that make up the gate, helping support it against the barbarian axe-blows.\n\nAnd then there are shouts from around the palisades as short spears start to rain down from the sky.\n\n\"Down! Cover yourselves!\" shouts ${Gawain}, but for some it's too late. You see a spray of blood as a shaft slices through the neck of one of the ${men} on your right. $!{He} collapses, a rag doll.\n\nThere's a roar from the gate as a Saxon warrior throws ${himself} bodily over the top of it, launched by ${his} companions.\n\t\n${Gawain} launches ${himself} at the interloper, driving a spear up and into ${his} armpit; the ${man} screams and collapses under a wave of Britons. You draw your sword and run to the palisade, to take the place of a fallen warrior just as Saxons start to scramble atop the tree-trunks that make up the defenses.\n\n*page_break\n*if defence_selected=\"full\"\n\t*goto part2_fulldefence\n*elseif defence_selected=\"half\"\n\t*goto part2_halfdefence\n*else\n\t*goto part2_sneak\n\n*comment --------------------------------------------------------------\n\n*label part2_fulldefence\n\nAll your force is at the walls, so cutting at the limbs of the Saxons as they try to pull themselves over is easy work, at least to start. Blood rains from many wounds, and the few Saxons who do manage to make it over are swiftly dispatched. Then there's a roar from the gate as it starts to fail under the axes, and you see a small force of Saxons burst through, led by a ${man} who could be ${Guthwulf}'s twin. $!{He} swings ${his} huge axe in a great circle and you see several Briton ${men} fall in an explosion of gore before a spear transfixes the Saxon's neck. $!{He} goes down with a cry, blood streaming down bare chest.\n\n*if defence_of_dinas_emrys>60\n\t${Gawain} leads a rapid charge to close the breach and the Saxons are soon dead or thrown back through the gate.\n\t*if chapter4_emrys_request=\"walls\"\n\t\t${Emrys} sets about repairing it swiftly while ${Gawain} and ${his} troops hold the gap with brute strength.\n\t*if chapter4_emrys_request!=\"walls\"\n\t\t${Gawain} and ${his} troops hold the gap with brute strength while other ${men} do their best to repair the damage.\n\t*goto part3\n*else\n\t*set saxons_inside true\n\t${Gawain} leads a rapid charge to try to thrust the Saxons backwards, but it's too late; the remains of the gate splinters and falls, and the force is inside the walls. Suddenly you're ducking and stabbing out at tattooed figures, bringing up your shield, and the circle of your awareness shrinks to a spear's length.\n\t*goto part3\n\n*comment --------------------------------------------------------------\n\n*label part2_halfdefence\n\nYou only have half of your force at the walls, so it's tricky work; as soon as you've cut at one Saxon as ${he} tries to pull ${himself} over, you have to leap to tackle another. Your sword is soon bloody from use; some of the attackers make it to the ground and there's fighting inside the walls. Then there's a roar from the gate as it fails under the axes and there's a cry of victory from ${Cynric}'s forces as they burst through.\n*if defence_of_dinas_emrys>60\n\t${Gawain} and the ${men} with ${him} react swiftly; they throw themselves into the breach hacking, cutting, and for a moment in the confusion it's hard to see what's happened. Then there's a yell of \"Gwynedd!\" and you realize a small knot of your ${men} hold the gate, ${Gawain} at their fore,\n\t*if chapter4_emrys_request=\"walls\"\n\t\tas ${Emrys} sets about shoring up the damage.\n\t*if chapter4_emrys_request!=\"walls\"\n\t\tas others brace the gates with beams and more rope.\n\t*goto part3\n*elseif defence_of_dinas_emrys>40\n\tThe tide is too much for ${Gawain}—Briton warriors are scattered as the Saxons force their way through. You find yourself up against two Saxons, fighting hand to hand; there's no space for spear-work here, and you're ducking and stabbing with your sword.\n\t\n\tThen a roar goes up from behind; the second portion of your troops pour out from their hiding place. They take the Saxons by surprise; the shock on your enemy's faces turns to outright panic as they realize there's nowhere to retreat. Saxon bodies land in the dust, and a few stragglers are driven back to the gate. ${Gawain}'s ${men} hold it\n\t*if chapter4_emrys_request=\"walls\"\n\t\tas ${Emrys} sets about shoring up the damage.\n\t*if chapter4_emrys_request!=\"walls\"\n\t\tas others brace the gates with beams and more rope.\n\t*goto part3\n*else\n\tThe tide is too much for ${Gawain}—Briton warriors are scattered as the Saxons force their way through. You find yourself up against two Saxons, fighting hand to hand; there's no space for spear-work here, and you're ducking and stabbing with your sword.\n\t\n\tThere's a roar from behind you; the second portion of your troops have joined the fray. There's a moment of surprise on the faces of the ${men} you face, but another wave of Saxons push in from the gate, and now you're amongst a struggling mass of ${men} and the circle of your awareness is a spear's length.\n\t*set saxons_inside true\n\t*goto part3\n\n*comment --------------------------------------------------------------\n\n*label part2_sneak\nIt's tricky work at the walls, as you're short of ${men}; as soon as you've cut at one Saxon as ${he} tries to pull ${himself} over, you have to leap to tackle another. Your sword is soon bloody from use; some of the attackers make it to the ground and there's fighting inside the walls. Then there's a roar from the gate as it fails under the axes and there's a cry of victory from ${Cynric}'s forces as they burst through.\n\n*if defence_of_dinas_emrys>60\n\t*set defence_of_dinas_emrys %+15\n\t${Gawain} gives a shout and leads a charge towards the breach, ${he} and ${his} men cutting some down and driving the rest back. And then there's yelling from outside the fort and you realize that ${Cai} and ${his} warriors have broken their cover, striking the Saxons from behind. From here you can't see the result, but from the panic on Saxon faces at the gate and the lessening of the assault on the walls you know ${Cai}'s giving them something to think about.\n\t*goto part3\n*elseif defence_of_dinas_emrys>40\n\tThe Saxons pour in through the breach, driving back ${Gawain} and ${his} companions, but then there's shouting and confusion from outside the fort and you realize that ${Cai} and ${his} warriors have made their move, striking the Saxons in the rear. From here you can't see what's happening, but the panic on Saxon faces and the lessening of the assault on the walls means that ${Cai} is giving them something to think about. ${Gawain}'s force seals the breach at the gate, dispatching the Saxons who'd made it inside.\n\t*goto part3\n*else\n\tThe tide is too much for ${Gawain}—Briton warriors are scattered as the Saxons force their way through. You find yourself up against two Saxons, fighting hand to hand; there's no space for spear-work here, and you're ducking and stabbing with your sword. You hear a yelling from outside—${Cai}'s force has made their move, striking at the Saxons from behind. But you've no idea whether ${he}'s making any difference; you're in a struggling mass of ${men} and the circle of your awareness is a spear's length.\n\t*set saxons_inside true\n\t*goto part3\n\n*comment --------------------------------------------------------------\n*comment                   Part 3: The Second Wave\n*comment --------------------------------------------------------------\n*label part3\n*page_break\n\n*if saxons_inside=false\n\t*set acclaim %+15\n\tIt's only a moment of peace, a moment for you to catch your breath and for your ${men} to prepare for the next assault. You see ${Gawain} mopping blood from ${his} brow.\n\t*if chapter2_uther_healed=true\n\t\t${Uther} stands grey-faced, leaning on ${his} spear; ${he} looks like ${he}'ll not stand for long.\n\t*if chapter4_emrys_request=\"medicine\"\n\t\t${Emrys} and ${his} helpers swiftly work to aid the wounded where they can, moving from fallen ${man} to fallen ${man}.\n\n\tSuddenly there's a crash from your right, from beyond the animal pens. $!{Men} shout, and you see Saxons blades flash as they swarm over the palisade. Another thud, then another, and more Saxons appear. Ladders—heavy ladders, perhaps felled trees.\n\t\nFrom the gate, another shout goes up; this from the Saxons. Striding into the fort, flanked by two huge axe${men}, is a lean warrior, head shaven save for a single braid, \n*if gender=\"male\"\n\tclad only in breeches,\n*if gender=\"female\"\n\tclad only in breeches and breast-binding,\nbody swirled with paint as if ${he}'s a [i]bwca[/i] or a Pict. $!{He} wears a heavy gold arm-ring and a thick torc of twisted gold and holds an ornate spear.\n\n${Cynric}.\n\n$!{He} raises the spear and gives a great shout. The Saxons cheer in approbation.\n\n*if chapter4_emrys_request=\"damage\"\n\tYou realize ${Cai} has worked ${his} way to you, battered, bleeding. \"$!{Brother},\" ${he} gasps, \"I think it's ${Emrys}'s turn.\"\n\t\n\t$!{He}'s right. \"Back!\" you order the ${men}. \"Fall back, now!\" You race towards where ${Emrys} stands.\n\t\n\tYour ${men} follow you, disengaging as best they can, scrambling in retreat towards the Long Hall, avoiding the mounds of straw that dot the ground between the gate and the buildings. You stand with ${Emrys} at your side waiting, watching, desperate for the moment when the last few of your ${men} are clear; but it's not going to be so easy. ${Emrys}'s plan will hurt the Saxons, or so ${he}'s promised, but some of your ${men} still fight. If you—\n\t\n\t${Emrys} brings ${his} hand down and four lit arrows fly.\n\t\n\t*if compassion\u003c50\n\t\t*set acclaim %+15\n\t\t*set defence_of_dinas_emrys %+15\n\t\tAnd then everything is flame.\n\t\t\n\t\tWhen the burst of fire dims and you bring your hands away from your scorched face, you see a mass of ${men} with hair and clothes aflame, screaming, rolling away from the fire trenches that ${Emrys} had dug across the open spaces in front of the Hall. Cries of pain and the smell of burned flesh. They are not all Saxons; you caught Britons amongst them. But the attack has faltered. You can see ${Cynric} staring murder at you across the flames.\n\t\t\n\t\t${Cai} looks at you and swallows. \"Well. I suppose that worked.\"\n\t\t\n\t\tIt's scant breathing space, though—Saxons are screaming insults across the fire at you, incensed at your tactics. A knot of their troops test their luck in a sortie across the fire, and when it's clear there isn't another explosion forthcoming, the rest of your foes rejoin the fight.\n\t\t*goto part3_troops_state\n\t*else\n\t\t\"Run!\" You only realize you've shouted after the fact. $!{Men} hear you, both Briton and Saxon, and become aware of the danger as flames leap up from the straw mounds. ${Cynric} shouts an urgent command and raises ${his} fist and the attack falters.\n\t\t\n\t\tAnd then everything is flame.\n\t\t\n\t\tWhen the burst of fire dims and you bring your hands away from your scorched face, you see ${men} with hair and clothes aflame, screaming, rolling away from the fire trenches that ${Emrys} had dug across the open spaces in front of the Hall. But the bulk of the Saxon force escaped, stopped short by ${Cynric} and your warning.\n\t\t\n\t\t\"That could have gone better,\" mutters ${Cai}, as ${Cynric} brings ${his} hand down and the attack resumes.\n\t\t*page_break\n\t\t*goto part3_troops_state\n*elseif chapter4_emrys_request=\"fear\"\n\n\tThen the weirdest sound goes up, a hissing shrill shriek. Saxon and Briton alike flinch; the clatter of blades stills.\n\t\n\tThe noise comes again, and a stream of flame and smoke burst out over the heads of the warriors. It comes from the roof of the Long Hall. When it clears, ${men} are staring up at it. A robed figure stands there, illuminated by flame. $!{He}'s holding a long spear with a banner fluttering from it; with another burst of light you can see the banner clear. The red dragon of Gwynedd.\n\t\n\t\"$!{She} comes,\" crows the figure, high and shrill. \"The people of ${Uther} have called, and the Dragon wakes. Flee! Flee, every ${man}, lest the fire consume you!\"\n\t\n\tAnother great burst of flame and smoke roll out over the air; you can feel the heat of it. And something…something…rustles and flaps behind the Long Hall, like great, leathery wings…\n\t\n\t\"You asked for fear. Christ's blood, but ${he}'s good,\" says ${Cai}.\n\t\n\t${Emrys}'s ruse. This is why ${he} wanted oil and hide.\n\t\n\t*if bravado\u003c50\n\t\t*set acclaim %+15\n\t\t*set defence_of_dinas_emrys %+15\n\t\tYou realize some of your own ${men} are cowering. You raise your sword, and your voice: \"The Dragon comes at our call. Gwynedd! Gwynedd! Gwynedd for the Dragon!\"\n\t\t\n\t\tThe cheers of your ${men} rise up around you and the belch of flame comes once more. You see Saxon faces pale and shocked; many turn and flee, others fade into the darkness.\n\t\t\n\t\tThen ${Cynric}'s voice, crisp and clear, shouts harsh Saxon words of contempt and the flight halts. With a crash of spear on shield and a rhythmic chanting the Saxons resume their attack.\n\t\t*page_break\n\t\t*goto part3_troops_state\n\t*else\n\t\tYou realize your mouth is open as you stand there in awe.\n\t\t\n\t\tThen ${Cynric}'s voice, crisp and clear, comes from the front of the Saxon line. The words are foreign to you, but the contempt is not. An arrow sprouts from the thatch next to ${Emrys}'s feet, followed by a second. ${Emrys} throws ${himself} backwards in undignified scrabbling and falls over the back of the roof.\n\t\t\n\t\tThere's laughter from the Saxons.\n\t\t\n\t\t\"Oh well,\" mutters ${Cai}, as the Saxons charge.\n\t\t*page_break\n\t\t*goto part3_troops_state\n\n*label part3_troops_state\n*if chapter4_emrys_request=\"fear\"\n\t*achieve dragon\n*if defence_of_dinas_emrys>60\n\tIt's bloody work, this, and confusing amongst smoke and flame; night has fallen while you've fought. But you begin to realize that there are more Britons standing than Saxons; you're winning, cutting off groups of your attackers and cutting them down or driving them back to the gate.\n\t*goto part3_orders\n*elseif defence_of_dinas_emrys>40\n\tDarkness has fallen while you fight, and there's confusion of smoke and flame; you're fighting hand-to-hand and your shield was shattered by a Saxon axe. Grabbing another from a fallen Briton you bring it up, punching it into a foe's face. $!{He} falls; as ${he} does, you take in the scene in front of you. Britons and Saxons clash in small groups, and it's hard to tell who has the upper hand, but you've lasted much longer than you expected.\n\t*goto part3_orders\n*else\n\tAll is dark and confusion; your blade drips blood and your shield is cracked. Cut, thrust, parry, punch with shield, kick the legs out from under one ${man}, plunge your blade into the gut of another. Smoke and flame drift through the fort. In the brief glimpses you have between opponents you realize that you and your warriors, what's left of them, are being forced back towards the Long Hall. You are not winning this fight.\n\t*goto part3_orders\n\n*label part3_orders\n\n*gosub_scene startup get_god\n\n*temp end_state\n*set end_state \"fighting\"\n\n*choice\n\t#I'll order an all-out attack.\n\t\t*set compassion %-20\n\t\t*set bravado %+15\n\t\t*set end_state \"fighting\"\n\t\tYou exchange glances with ${Cai}. $!{He} nods. \"Gwynedd!\" you scream. \"For Gwynedd and ${god}!\"\n\t\t\n\t\tAnd you charge straight at ${Cynric} and ${his} ${men}.\n\t\t\n\t\t*if leader>55\n\t\t\t*set acclaim %+15\n\t\t\tYou feel the ${men} come with you; Britons either side of you, hammering their way forward with you at their heart. \"Gwynedd!\" Saxons fall in the crush; you feel a cut slice across your arm, another across your shin, and then all is blood and chaos as you lose yourself in the sharpness of combat.\n\t\t\t*goto part4\n\t\t*else\n\t\t\tThe ${men} with you respond half-heartedly; you hear ragged shouting. But you're committed now. Your battered force rattles into the Saxons and breaks into knots of fighting; you struggle towards ${Cynric} as ${he} dispatches one of your ${men} with ease.\n\t\t\t*goto part4\n\t\t\n\t#I'll order the ${men} to retreat, to abandon Dinas Emrys.\n\t\t*set bravado %-20\n\t\tYou look around you, the ${men} are too battered to survive another exchange. It's time to save lives.\n\t\t\n\t\t\"Back!\" you cry. \"Fall back—this is just sticks and mortar, let them have it!\"\n\t\t\n\t\t${Gawain} hears you and takes up the call. \"Fall back!\"\n\n\t\t*if diplomat>55\n\t\t\t*set end_state \"retreating\"\n\t\t\tIn small groups, as they can, your ${men} follow orders and draw back, using the Long Hall as cover. You beat a slow retreat back towards the rear of the fortress and the path up to the tall stones.\n\t\t*if diplomat\u003c=55\n\t\t\t*set acclaim %-20\n\t\t\t*set end_state \"fighting\"\n\t\t\tThe ${men} of Gwynedd don't share your opinion. As you pull back to the Long Hall, you realize they're not coming with you.\n\t\t\t\n\t\tYou hear a shouted laugh from ${Cynric}. $!{He} lowers ${his} weapons and reaches a beseeching hand out to you across the field in mock pain at your departure. Then ${he} spits in your direction.\n\t\t*goto part4\n\t\t\n\t#I'll challenge ${Cynric} to a one-on-one fight.\n\t\t*set bravado %+20\n\t\t*set end_state \"duel\"\n\t\t*set chapter5_duel true\n\t\t*set track_champion +1\n\t\tYou step forward and raise your sword and shield. \"${Cynric}!\" you shout. \"$!{Son} of ${Cerdic}! Will you face me?\"\n\t\t\n\t\t${Cai} stares at you. \"What are you doing, $!{brother}?\" ${he} hisses.\n\t\t\n\t\t\"Face me, ${Cynric}! I am ${Arthur} ${ap} ${Uther}, Warleader of Britain—I command here!\"\n\t\t\n\t\tYou hear curt Saxon syllables from ${Cynric}. The ${men} around ${him} hush. $!{He} stares at you, eyes narrowed, and the fighting dies away. $!{He} strides forward into the open space in front of the Long Hall.\n\t\t\n\t\t\"Come, then,\" ${he} says, accent thick and guttural. $!{He} bangs ${his} fist to ${his} \n\t\t*if gender=\"male\"\n\t\t\tchest. \n\t\t*if gender=\"female\"\n\t\t\tbreast.\n\t\t\"Come, ${Arthur} ${ap} ${Uther}, and die on my spear.\"\n\t\t\n\t\tYou realize your hands grip your weapons tightly, too tightly. You loosen your grip and try to relax as ${Ector} told you, as you step forward to face ${him}.\n\t\t\n\t\tIt starts before you're ready. The speartip darts for your face, swift as a viper; you're barely able to bring up your shield and to duck away. The haft rattles off your shield-rim. And then you are fighting for your life.\n\t\t\n\t\t$!{He}'s fast, ${Cynric}, cat-quick, always in motion, leaping, ducking, twisting away from you, using ${his} body to feint and dodge. The spear comes in at you from angles you don't expect, using all of it, the haft and heel, the point and the blade-edge. You've never fought anyone like this, and it's all you can do just to stay alive, let alone whole; blood drips from a fresh wound over your eye and a line of slices burn up your forearm. You hang on with grim determination, battering away the spear, trying to knock it aside so you can get in with your sword, but ${Cynric}'s constant assault is wearing you down.\n\t\t\n\t\tYou bear up under the blows, using both shield and blade for shelter, imagining a barrier around you, and hold on. But you know you can't stand up to this forever; and ${Cynric}'s blows aren't lessening in power.\n\t\t\n\t\tTime to gamble.\n\t\t\n\t\tYou draw yourself in, making yourself as small a target as possible, knocking the spear aside with your blade once—to the right—twice—to your knee—then duck the third blow and spin, using your momentum to throw your shield edge-on at ${his} knees.\n\t\t\n\t\t*if warrior>55\n\t\t\t*set acclaim %+15\n\t\t\tYou see a moment of blank surprise on ${his} face before ${he} stumbles and falls.\n\t\t\t\n\t\t\tYou throw yourself at ${him} before ${he} has a chance to recover, landing on ${him}. $!{He} wriggles out of the way of your blade, just, but ${he}'s lost ${his} spear, and the two of you scramble, wrestling, as ${he} grapples for your sword.\n\t\t\t*goto part4\n\t\t*else\n\t\t\t*set acclaim %-20\n\t\t\tToo slow. $!{He} caught your move. $!{He} leaps over the shield; it slides uselessly into the dirt behind ${him}. $!{He} struts towards you, all dark eyes and wicked grin, your death on the end of ${his} spear.\n\t\t\t*goto part4\n\n*comment --------------------------------------------------------------\n*comment                   Part 4: Endgame\n*comment --------------------------------------------------------------\n*label part4\n*page_break\n\n*if end_state=\"fighting\"\n\t*if defence_of_dinas_emrys>50\n\t\t*set leader %+15\n\t\t*set acclaim %+15\n\t\tThere's a roar from your ${men}. You turn to see that ${Cynric}, standing in front of ${Gawain}, has thrown down ${his} spear and is holding out empty hands. You realize that only a handful of Saxons are left fighting. ${Cynric} snaps commands, and in disgust others cast down their weapons. \n\t\t*if defence_of_dinas_emrys>60\n\t\t\t*set rel_bedwyr %-20\n\t\t\t*set acclaim %+15\n\t\t\t*set track_warlord +1\n\t\t\tDespite everything, you have won the day, and as you look out across your fighting force you realize that you have won it overwhelmingly—despite bruises and wounds, most of your ${men} still stand.\n\t\t*if defence_of_dinas_emrys\u003c=60\n\t\t\tDespite everything, you have won the day. It's cost you, though; looking out across your fighting force you see the hammering the defenders have taken, and realize that there are many fewer ${men} than when you started.\n\t\t\n\t\t${Cai} claps you on the shoulder. \"That's it. You buying, $!{brother}?\"\n\t\t\n\t\tThen a shout goes up and you both lift your blades; but no, it's from the gate. It's ${Bedwyr} and the warband, racing in with spears at the ready only to see that the fight is already won. \n\t\t\n\t\t*if defence_of_dinas_emrys>60\n\t\t\t\"If ${he} didn't hate you before,\" murmurs ${Cai}, \"${he} will now!\"\n\t\t*goto part4_uther\n\t*else\n\t\t*set acclaim %-30\n\t\tThere's a shout from the gate: \"Gwynedd! Gwynedd for ${Uther}!\" You turn, and see more warriors pouring into the fort. These are fresh-faced with gleaming spears—and at their head is ${Bedwyr}. The warband has returned!\n\t\t\n\t\tThe Saxons fall back, shocked out of their superiority. There's a flurry of contact, screams and angry yells, and then you see ${Cynric} throw down ${his} spear in disgust and shout commands in the Saxon tongue. The battle peters out, Saxons dropping their weapons and holding out empty hands.\n\t\t*goto part4_uther\n*elseif end_state=\"retreating\"\n\t*set rel_bedwyr %-20\n\t*set acclaim %-20\n\tAs you fall back towards the back gate and ${men} work frantically to unbar it, a shout goes up from the Saxons. For a moment you think it's victory, but then you hear: \"Gwynedd! Gwynedd for ${Uther}!\" You turn, and see more warriors pouring into the fort. These are fresh-faced with gleaming spears—and at their head is ${Bedwyr}. The warband has returned!\n\t\n\tYour ${men}, taking new heart, rush back into the fray.\n\t\n\tThe Saxons fall back, shocked out of their superiority. There's a flurry of contact, screams and angry yells, and then you see ${Cynric} throw down ${his} spear in disgust and shout commands in the Saxon tongue. The battle peters out, Saxons dropping their weapons and holding out empty hands.\n\t*goto part4_uther\n*else\n\t*comment end_state=\"duel\"\n\t*set rel_bedwyr %-20\n\t\"Hold! Saxon, it is over!\"\n\t\n\tThere's enough command in the voice for both of you to freeze momentarily. And then you realize what's happened.\n\t\n\tThe two of you have been so wrapped up in the fight with each other than you'd not heard the shouts from the gate. A new force stands there, fresh-faced, spears gleaming. At their head is ${Bedwyr} and it's ${he} who has spoken.\n\t\n\tThe Saxons are vastly outnumbered.\n\t\n\t${Cynric} backs away from you, scorn in ${his} eyes, and spits at your feet. Then ${he} holds out empty hands to ${Bedwyr} in surrender. $!{His} ${men} follow ${his} lead.\n\t*goto part4_uther\n\t\t\n*label part4_uther\n\n*if chapter2_uther_healed=true\n\t${Bedwyr} strides up to ${Uther}.\n*if chapter2_uther_healed=false\n\tAs ${Bedwyr} orders the ${men} to deal with the Saxons, you hear a murmured 'the $!{King}!' Turning, you see ${Uther} helped from ${his} hut by a spear${man}. ${Bedwyr} swiftly crosses to ${him}.\n\t\n\"My $!{Lord},\" ${he} says, \"Are you well?\"\n\t\n${Uther}, yellow-skinned and tired, nods. \"I am.\" $!{He} holds ${himself} straighter and raises ${his} voice. \"The ${men} have given as good an account of themselves as I could have wished.\"\n\n${Gawain} bows ${his} head to the $!{King}. \"$!{Lord}.\n*if defence_of_dinas_emrys>60\n\t*set rel_gawain %+20\n\t*set rel_uther %+15\n\t*set acclaim %+20\n\t*set chapter5_uther_armring true\n\tAll that has been won here today is by ${Arthur}'s command. $!{He} has proved ${his} worth.\"\n\t\n\t\"I know it,\" says ${Uther}, looking hard at you. \"You have the $!{King}'s gratitude, ${Arthur}, for doing much with little.\" $!{He} reaches up and unclasps a heavy gold arm-ring, and holds it out to you.\n\t\n\tShocked, you take it, feeling ${Bedwyr}'s eyes on you.\n\t*goto part4_saxons_captured\n*elseif defence_of_dinas_emrys>40\n\t*set rel_gawain %+15\n\t*set acclaim %+10\n\tIf not for ${Arthur}, we would have lost this fight.\"\n\t\n\t\"I know it,\" says ${Uther}. $!{He} holds your gaze for a moment, then nods.\n\t*goto part4_saxons_captured\n*else\n\tWithout ${Bedwyr} we would not live.\"\n\n\t\"I know it,\" says ${Uther}. \"We shall not be tricked like that again.\"\n\t*goto part4_saxons_captured\n\n*label part4_saxons_captured\n*page_break\n*if chapter5_uther_armring\n\t*achieve armring\n\t\n*temp saxon_fate\nThe prisoners are rounded up, ${Cynric} amongst them, and they're forced at spear point to kneel in front of the $!{King}.\n\n\"What is to be their fate?\" asks ${Gawain}.\n\n${Bedwyr} speaks first. \"Hostages,\" ${he} says to ${Uther}. \"They should live, so that we have a choke-hold on ${Cynric}'s ${father}.\"\n\n${Uther} shakes ${his} head. \"They must die,\" ${he} says. \"The Saxons must learn what an attack on Gwynedd earns them. We will send back their heads.\"\n\n\"You can't!\" It's ${Cai}. $!{He} realizes who ${he}'s talking to. \"My apologies, ${lord}, but if we kill them here, now, without swords in their hands, then we are no better than the Saxons.\"\n\n${Uther} glares at ${him}, then frowns, and looks over at you. \"Well, Warleader? What is your opinion?\" You're surprised ${he}'s asking you at all.\n\nYou hesitate, and then catch the expression on ${Cynric}'s face; the smile of a ${man} who doesn't care.\n\n*choice\n\t#\"Kill them.\"\n\t\t*set compassion %-30\n\t\t*set saxon_fate \"kill\"\n\t\t*set rel_gawain %-20\n\t\t*set rel_cai %-30\n\t\t${Cai} stares at you in shock. ${Uther} nods in satisfaction. \"See it done, ${Gawain}.\"\n\t\t*goto part5\n\t#\"Let them return home to carry word of our victory to their people.\"\n\t\t*set bravado %+20\n\t\t*set saxon_fate \"kill\"\n\t\t${Uther}'s brows raise in shock. \"Let them free? Never. ${Gawain}—see that they are dispatched.\"\n\t\t*goto part5\n\t#\"Keep ${Cynric} as hostage, release the others.\"\n\t\t*set bravado %-30\n\t\t*set rel_gawain %+10\n\t\t*set rel_cai %+20\n\t\t*set saxon_fate \"hostage_plus_release\"\n\t\t${Uther}'s brows raise in surprise. \"Let them free to carry back word of their leader's plight?\n\t\t*if rel_uther>40\n\t\t\tAye. I can see the smile fall from ${Cerdic}'s face as they tell their tale. See it done, ${Gawain}.\"\n\t\t*if rel_uther\u003c=40\n\t\t\tNo. No Saxon leaves this place today. Kill them, ${Gawain}.\"\n\t\t\t*set saxon_fate \"kill\"\n\t\t*goto part5\n\t#\"Keep ${Cynric} as hostage, kill the others.\"\n\t\t*set compassion %-20\n\t\t*set bravado %-20\n\t\t*set rel_cai %-20\n\t\t*set rel_gawain %-20\n\t\t*set saxon_fate \"hostage_plus_kill\"\n\t\t${Cai} stares at you in shock. ${Uther} nods. \"A fair suggestion. See it done, ${Gawain}.\"\n\t\t*goto part5\n*comment endchoice\n\n*comment --------------------------------------------------------------\n*comment                   Part 5: The Demon\n*comment --------------------------------------------------------------\n*label part5\n\n*if saxon_fate=\"kill\"\n\tGrim-faced, ${Gawain} gestures warriors forward and steps forward ${himself}, sword in hand. ${Cai} is white-faced and furious, but you have no time to talk with ${him} now. You step forward with the others and draw your blade.\n\t\n\t\"Now,\" orders ${Gawain}.\n\t\n\tBlades and spears stab. Saxons die. Two ${men} approach ${Cynric}, who looks over at you and smiles.\n\t*goto part5_escape\n*elseif saxon_fate=\"hostage_plus_kill\"\n\tGrim-faced, ${Gawain} gestures warriors forward and steps forward ${himself}, sword in hand. ${Cai} is white-faced and furious, but you have no time to talk with ${him} now. You step forward with the others and draw your blade.\n\t\n\t\"Now,\" orders ${Gawain}.\n\t\n\tBlades and spears stab. Saxons die.\n\t\n\tTwo ${men} grip ${Cynric}'s arms. $!{His} face is impassive.\n\t\n\t\"Bind ${him},\" says ${Gawain}.\n\t\n\t${Cynric} looks over at you and smiles.\n\t*goto part5_escape\n*else\n\t*comment if saxon_fate=\"hostage_plus_release\"\n\t${Gawain} gestures warriors forward. \"Hold ${him},\" ${he} orders, gesturing at ${Cynric}. The ${men} do so.\n\t\n\tThe other Saxons are allowed to depart, weaponless. ${Cynric} watches them go, face impassive. Then ${he} looks over at you and smiles.\n\t*goto part5_escape\n\n*label part5_escape\n\nYou are five feet away from ${him} when you see the shift in ${his} eyes. They go jet-black in an eye-blink, as if there was never any white. And ${he} springs, ${his} empty hand punching out.\n\t\nThere's a crack. The ${man} in front of ${him} stumbles and falls, ribcage caved in like it's been hit with a rock. As ${he} coughs and bubbles blood, ${Cynric} slashes ${his} hand across another ${man}'s throat; you see three parallel wounds open up and fill with blood. \n\t\n\"Stop ${him}!\" shouts ${Gawain}.\n\nIt's too late. The Saxon leader leaps for the wooden palisade; you see ${him} scramble, cat-like, up its sheer face, muscles writhing. You see ${him} vanish over the top into the darkness.\n\nAnd then ${he}'s gone, leaving only claw-scars in the bare wood ${he}'s just climbed.\n*finish\n", "chapter6": "*comment ==============================================================\n*comment                Chapter 6: The Cursed Village\n*comment ==============================================================\n\n*comment --------------------------------------------------------------\n*comment                        Introduction\n*comment --------------------------------------------------------------\n*label intro\n\n*image chap6.png center Chapter Six: The Cursed Village\n\n*temp Bran\n*set Bran \"Owain\"\n*temp Ina\n*set Ina \"Ina\"\n\n*if gender=\"female\"\n\t*set Bran \"Olwen\"\n\t*set Ina \"Ifan\"\n\n[i]\"Hold up a moment, ${Bran}, let me catch my breath…it's my stomach. I reckon I've got what Tomos had.\"[/i]\n\n[i]\"The fish was bad. I told you that last night.\"[/i]\n\n[i]\"Well, what was I to do, go without? I'll be all right. Just wait up a while.\"[/i]\n\n[i]\"Did you hear? Riders have come from $!{King} ${Uther}. Trying to get us to fight for ${him}, I suppose.\"[/i]\n\n[i]\"Can't see as who waves a flag with a dragon on it makes any difference to us.\"[/i]\n\n[i]\"It might make a difference to stopping the Saxons. The bastards. I saw ${Ina} two days back. $!{Her_his} whole herd gone. Not stolen; slaughtered and left to rot. In the spring, too. There'll be no lambs. So what'll ${her_his} people eat come next winter?\"[/i]\n\n[i]\"But why would someone do— why have you stopp—\"[/i]\n\n[i]\"Look.\"[/i]\n\n[i]Five saplings, bark scorched, forming a circle. A burned shape traced out on the ground…the smell of blood and entrails. At the foot of each sapling, a blackened sheep skull.[/i]\n\n[i]\"Gods, ${Bran}, what is this?\"[/i]\n\n[i]\"Magics, dark magics. I don't know wha— Wait, there's something moving…gods and fishes! Who are you people? What do you—\"[/i]\n\n[i]The first ${man} dies, heart torn from ${his} body.[/i]\n\n[i]\"Don't…please, don't!\" The second ${man} wets ${his} breeches.[/i]\n\n[i]\"No. Not you. You will live. Tell your $!{King} ${Cadell} this. We have laid a curse upon this village, a curse of sickness. It is a warning to ${him}. If ${he} allies ${himself} with ${Uther}, then that sickness will spread across all the people of ${his} lands, killing every creature it touches, until it reaches ${his} heart. Do you understand me?\"[/i]\n\n[i]\"Y-yes. I— aagh!\"[/i]\n\n[i]\"That is so you do not forget. Now go.\"[/i]\n\n*comment --------------------------------------------------------------\n*comment                   Part 1: Powys\n*comment --------------------------------------------------------------\n*label part1\n*page_break\nYou fall back to ride next to ${Cai}. $!{He} greets you with a exasperated sigh. \"So what does our royal host have to say for ${himself}?\"\n\n\"Oh, what you'd expect—that ${Uther} is weak, and cannot lead Britain. That I am not a suitable candidate for Warleader. That the land of Powys cannot support Gwynedd. That we should support ${him} in place of ${Uther}.\"\n\n\"Shame. The two of you seemed to be getting on.\"\n\n\"$!{King} ${Cadell} is perfectly civil. Just convinced ${he}'s right. Perhaps ${he} is. So much for finding allies; there's no alliance to be found here.\"\n\n\"No, all we'll return with are sore posteriors from riding these poor bony little creatures…\" ${Cai} slaps the pony's flank. \"Why doesn't Britain have any decent horse, Art? We should bring some over the water.\"\n\n\"With what coin? And who would we find to ride them?\"\n\n\"Oh, I don't know. But sitting on this dwarf…doesn't it make you feel…well, silly?\"\n\n${Gawain}, riding nearby, chuckles.\n\n${Cai} bristles. \"Don't you laugh, North${man}! You look even stupider, given you're a foot taller than me—and I'd swear they've given you the smallest beast! Poor thing…\"\n\n\"This is a $!{King}'s boar hunt, ${ap} ${Ector}, not a battle charge. A pony's a damn sight more sure-footed than one of your Roman stallions. And you'll knock your head on fewer branches.\"\n\n\"Bah! Boar hunt. I haven't seen hide nor hair of a rabbit, let alone any wild pigs. I could wave my spear at that squirrel if you think it'd help.\"\n\nIt's going to be a long day. Still, it's good to be out of the oppressive atmosphere of Dinas Emrys. ${Cynric}'s escape angered and frustrated everyone, and blame has been tossed around liberally. The strangeness of it…people aren't openly talking, but the rumors rumble on behind everything else.\n\nYou look back over your companions, all riding in the tail of the train of ${Cadell}, $!{King} of Powys: ${Gawain}, who was growing restless cooped up in Dinas Emrys; ${Emrys}, who'd succeeded in irritating ${Bedwyr} so much that ${he} ordered the Wanderer out with you; ${Morgan}, who had quietly insisted ${she} join you, possibly at ${Vivian}'s urging; and ${Cai}, who thought that visiting a foreign ${King} might be more fun, having exhausted the good wine.\n\n$!{King} ${Cadell} has made it clear that ${he} has other people of more import to talk to at the front of the pack. So who will you ride next to for the day's hunt?\n\n*comment Choose companion\n*choice\n\t#${Gawain}.\n\t\t*set rel_gawain %+15\n\t\t*goto part1_gawain_talk\n\t#${Morgan}.\n\t\t*set rel_morgan %+15\n\t\t*goto part1_morgan_talk\n\t#${Cai}.\n\t\t*set rel_cai %+15\n\t\t*goto part1_cai_talk\n\t#${Emrys}.\n\t\t*set rel_emrys %+15\n\t\t*goto part1_emrys_talk\n\n*comment --------------------------------------------------------------\n*label part1_gawain_talk\nYou settle your mount back next to ${Gawain}. \"How goes it?\"\n\n*if rel_gawain>50\n\t$!{He} smiles. \"I was thinking how little your foster-${brother} would enjoy a trip to my home.\"\n\n\t\"Do you have ${women} and wine? If so, ${he}'d find a way to cope.\"\n\n\t\"We have both, but not in abundance, and both have a tendency to sourness.\" $!{He} sees your expression. \"Seriously, you should meet my ${mother}. But come, ${Arthur}—there's something on your mind; out with it!\"\n\t*goto part1_gawain_choice\n\t\n*else\n\t$!{He} nods. \"Well, I thank you.\" $!{His} words are careful, reserved; ${he}'s clearly ill-at-ease with you.\n\t\n\t\"You've recovered from the fight?\"\n\t\n\t$!{He} runs a finger along a livid slash across ${his} cheek. \"Aye, well enough. It's a long ride we have, $!{Prince} ${Arthur}; there's something you want to talk about, I think—what is it?\"\n\t*goto part1_gawain_choice\n\n*label part1_gawain_choice\n*choice\n\t#\"${Cynric}. What we saw at the end there. I swear ${he} changed. I swear I saw claws.\"\n\t\t$!{He} nods carefully. \"Aye. Even though I can't say that I saw what you saw, I saw the results.\"\n\t\t\n\t\t\"Well? What do you make of it?\"\n\t\t\n\t\t\"In the North, in my ${father}'s land, the folk know to bar their doors at night and not open them for anything, even for a friendly voice. There are…things up there that kill livestock, that take children, that leave bloody claw-marks across travelers killed for sport, not for food. Some of those things are said to take on the form of ${men}.\"\n\t\t\n\t\t\"You think ${Cynric} is one of these?\"\n\t\t\n\t\t\"I don't know what ${he} is. But I wonder if the cold lands of the Saxons have something similar, something of their own. And they brought it here.\"\n\t\t*goto part1_gawain_end\n\t\t\n\t#\"${Uther}. ${Emrys} says ${he}'ll live, but ${he}'ll never recover. So what happens now?\"\n\t\t$!{He} looks at you. \"I don't know the answer to that.\"\n\t\t\n\t\t\"Can ${he} still be $!{King} of Gwynedd, truly?\"\n\t\t\n\t\t\"$!{He} can do whatever ${he} wills, so long as the people—and the ${priests}—follow ${him}. As to whether they will…\" ${he} shrugs. \"I don't know. But this argument between you and ${Bedwyr}, it helps nothing.\"\n\t\t*goto part1_gawain_end\n\t\t\n\t#\"Me…as Warleader. You supported me when others wouldn't—why?\"\n\t\t$!{He} seems slightly taken aback. \"Because to do otherwise would be hypocrisy. The rules laid down by ${Blaise} were clear. Their meaning was clear, too, no matter how the ${King}s tried to twist them.\"\n\t\t\n\t\t\"So it wasn't because you thought I'd be any good at the task?\"\n\t\t\n\t\t\"In honesty, ${Arthur}, did you think you'd be any good at the task? Oh, you have been trained, I know, but in the Roman ways, and ${men} do not know you. How could you lead, and lead well? And so the ${king}s would not put their ${men} under your command.\"\n\t\t\n\t\t\"And yet you still supported me, knowing this.\"\n\t\t\n\t\t\"I had no choice.\"\n\t\t\n\t\t\"Other ${men} would say different.\"\n\t\t\n\t\t$!{He} smiles, ruefully. \"So my ${father} has repeatedly told me.\"\n\t\t*goto part1_gawain_end\n\t\t\n\t*if (romance_gawain=true) #\"I was wondering if you'd given any more thought to our discussion in the Long Hall?\"\n\t\tYou see a shock run through ${him}; ${his} cheeks stain crimson as if ${he}'s been slapped.\n\t\t*if (rel_gawain\u003c=40)\n\t\t\t*set romance_gawain false\n\t\t\t\"I… I'd be grateful if you didn't speak of it again,\" ${he} says with finality, not meeting your eyes.\n\t\t\t\n\t\t\t\"Very well.\"\n\t\t\t\n\t\t\t\"I'll not hold this agai—\"\n\t\t\t*goto part1_gawain_end\n\t\t*else\n\t\t\t*set rel_gawain %+15\n\t\t\t$!{He} swallows. \"Aye,\" ${he} says quietly, not meeting your eyes. \"I have thought about it. And now's not the time for talking further, but aye, I think I might have got used to the idea.\" And now ${he} does look up at you, ${his} smile uncertain. You see a vein pulse in the hollow of ${his} throat.\n\t\t\t\n\t\t\t${Gawain}, $!{Prince} of Lothian, the Bear of Orkney, one of the foremost fighters of Britain, renowned for wading into any fight without hesitation, and here you have ${him} utterly terrified.\n\t\t\t\n\t\t\t\"We'll talk of it later,\" you promise.\n\t\t\t\n\t\t\t$!{He} lets out a breath. \"Good,\" ${he} says. \"But we cannot—\"\n\t\t\t*goto part1_gawain_end\n\t\t\t\n\t*if (romance_gawain=false) #\"I know this might be somewhat unexpected…but I was wondering if you were promised to anyone?\"\n\t\t*if (rel_gawain\u003c=40)\n\t\t\t$!{He} scowls at you. \"That's no business of yours. Whether I am or am not will make no difference to how I serve Gwynedd, or Britain.\"\n\t\t\t\n\t\t\t\"I—\"\n\t\t\t\n\t\t\t\"You may be Warleader, $!{Prince} ${Arthur}, but you've not go so much say over your ${men} that you can ask them who they—\"\n\t\t\t*goto part1_gawain_end\n\t\t*else\n\t\t\t*set romance_gawain true\n\t\t\t$!{He} blinks. \"Uh. I…no. I'm not.\" $!{He} looks up at you in sudden shock, crimson flooding ${his} cheeks. \"Do you mean—\"\n\t\t\t\n\t\t\t\"Yes. I do mean.\"\n\t\t\t\n\t\t\t\"I hadn't thought… I mean I…\n\t\t\t*if romance_morgan\n\t\t\t\tAren't you and ${Morgan}…? I didn't think that you—\n\t\t\t\"\n\t\t\t*goto part1_gawain_end\n\n*label part1_gawain_end\n\n$!{He} breaks off, head up, intent. \"What's that?\"\n\n*goto part1_villager\n\n*comment --------------------------------------------------------------\n*label part1_morgan_talk\nYou rein your pony back next to ${Morgan} and match ${her_his} speed. $!{She} looks ill-at-ease with ${her_his} mount. \"Enjoying the ride?\"\n\n*if rel_morgan>50\n\t\"This cursed creature…\" $!{She} laughs. \"I'm no horse${woman}, Art, not by any measure. And this beast does insist on dragging me through briars. I'll be in tatters by the time we get back to ${Cadell}'s hall.\"\n\t\n\t\"You're at home climbing rocks, balancing on tree-limbs, or bringing down a deer with a bow, but a pony's your better? That's hard to credit.\"\n\t\n\t$!{She} grimaces. \"I just- it doesn't do what I ask it to- oh, damn you, Art. Was there something you wanted?\"\n\t*goto part1_morgan_choice\n*else\n\t\"I suppose so, thank you, ${Arthur}. I won't say I'm particularly comfortable with beasts. Is there something you wanted?\"\n\t*goto part1_morgan_choice\n\t\n*label part1_morgan_choice\n*choice\n\t#\"${Cynric}. What we saw at the end there. I swear ${he} changed. I swear I saw claws.\"\n\t\t$!{She} frowns. \"Yes, I know. I'm not sure I saw what you saw, but I saw…something. I wish my ${mother} had been there; such things are ${her_his} domain. I've sent ${her_him} word of it, but had no reply yet. If I'd to guess…well, I'd prefer not to guess.\"\n\t\t\n\t\t\"So I'm not going mad.\"\n\t\t\n\t\t\"If so, you're not alone in it. No…there are stories. Perhaps the gods of the Saxons have taken a hand. \n\t\t*if old_faith\u003c=50\n\t\t\tAh, but I know you don't put stock in such things. Mayhap it'd be best for you to think of them as your Christian demons or devils. If—\"\n\t\t*if old_faith>50\n\t\t\tIt has been the way, in the past, when an invader comes here—such as the Romans—then they bring their gods with them. And that is a matter for ${Vivian}. If—\"\n\t\t*goto part1_morgan_end\n\t\t\n\t#\"${Uther}. ${Emrys} says ${he}'ll live, but ${he}'ll never recover. So what happens now?\"\n\t\t\"It is time for the old to make way for the new. The trouble is that ${Uther} may not see it that way. In some ways, it were better if ${he} had died.\"\n\t\t\n\t\t$!{She} catches your look. \"It's best to be practical about these things, ${Arthur}. A kingdom's strength rests on it. Had ${Bedwyr} taken the throne, then perhaps another of the $!{King}s would now be declared both Pendragon and Warleader…\" $!{She} shakes ${her_his} head. \"Well, it's not to be. ${Uther}'s proud. And I hope ${his} pride will melt away before the Saxon threat sweeps across all of us; being split like this is—\"\n\t\t*goto part1_morgan_end\n\t\t\n\t#\"So why did you choose to come? Was it your ${mother}?\"\n\t\t\"I've not spoken to ${her_him} since ${Cynric}'s attack. \n\t\t*if rel_morgan>50\n\t\t\tWhy should it be anything more than a desire to keep you foolish ${men} safe?\" $!{She} smiles.\n\t\t*if rel_morgan\u003c=50\n\t\t\tWhy would it be anything more than a desire to get out into the spring air?\"\n\t\t*comment endif\n\t\t\n\t\t\"That's one way to duck the question. What did the $!{Lady} ${Vivian} have to say to you before the attack, then?\"\n\t\t\t\n\t\t${Morgan} sighs. \"All right. Let's say that I'm here with my ${mother}'s blessing, shall we?\"\n\t\t\n\t\t\"So ${she} wants an eye kept on…who? Me? ${Uther}'s alliances?\"\n\t\t\n\t\t\"If I—\" \n\t\t*goto part1_morgan_end\n\t\t\n\t*if (romance_morgan=true) #\"I was wondering…I'd like to talk about what happened at the feast. Afterwards, I mean.\"\n\t\t$!{She} raises an eyebrow. \"Would you?\n\t\t*if rel_morgan\u003c=40\n\t\t\t*set romance_morgan false\n\t\t\tWell, I'm not interested in talking about it.\" \n\t\t\t*goto part1_morgan_end\n\t\t*else\n\t\t\t*if chapter3_morgan_intentions=\"unknown\"\n\t\t\t\tSo! You weren't too drunk to remember after all!\"\n\t\t\t*if chapter3_morgan_intentions=\"none\"\n\t\t\t\tI thought you didn't want it to come to anything else?\"\n\t\t\t*if chapter3_morgan_intentions=\"more\"\n\t\t\t\tI suppose I should have expected it.\"\n\t\t\t$!{She} smiles. \"That look on your face! It's like I said, Art, it was a festival. I enjoyed it. If you want there to be something more…we've been friends for a long time. And now you're Warleader, and I have the duties my ${mother} gives me. What if we found ourselves working at odds to one another?\"\n\t\t\t*goto part1_morgan_choice2\n\t\t\t\t\t\n\t*if (romance_morgan=false) #\"I was thinking about what you said to me at Nos Calan Gaeaf. I think I might have been wrong.\"\n\t\t*if rel_morgan\u003c=40\n\t\t\t$!{She} raises an eyebrow. \"You weren't. Believe me. Now I've spent more time with you, I think you were right—it would have been a mistake. Besides, if—\"\n\t\t\t*goto part1_morgan_end\n\t\t*else\n\t\t\t*set romance_morgan true\n\t\t\t$!{She} smirks. \"Oh, do you? And what if I said it was too late?\" $!{She} catches the look on your face, and laughs. \"Don't worry, Art, I don't think your time amongst the Christians has entirely ruined you. But we've been friends for a long time; and now you're Warleader, and I have the duties my ${mother} gives me. What if we found ourselves working at odds to one another?\"\n\t\t\t*goto part1_morgan_choice2\n\t\t\t\n*label part1_morgan_choice2\n*choice\n\t#\"We're both working for Britain.\"\n\t\t$!{She} snorts. \"Now there's the romantic, Art! That's the way to win a ${woman}'s heart! If I—\"\n\t\t*goto part1_morgan_end\n\t#\"We'll find a way.\"\n\t\t$!{She} sighs. \"So instead of how to win the battle, you'll suddenly be trying to work out how to win the battle and how to handle me, is that it? I'm sure that'll be—\"\n\t\t*goto part1_morgan_end\n\t#\"We already have that problem. You said it yourself—we've been friends for a long time.\"\n\t\t$!{She} shakes her head. \"But you've always been a hopeless romantic, Art, so you'll turn it into something much more than it should be, and—\"\n\t\t*goto part1_morgan_end\n\t\t\t\t\t\n*label part1_morgan_end\n\n$!{She} breaks off, startled, staring out into the trees. \"Did you hear something?\"\n\n*goto part1_villager\n\n*comment --------------------------------------------------------------\n*label part1_cai_talk\nYou move your pony over to ride next to ${Cai}; ${he} shoots you a sour look. \"This isn't what I imagined, Art. ${Uther}'s Warleader goes off to make an alliance with a nearby ${King}—that sounds impressive. This?\" $!{He} snorts. \"It's hardly a grand procession.\"\n\n\"You could have stayed at Dinas Emrys.\"\n\n\"What, with that lot? Most of them haven't much time for me.\"\n\n\"Is that because you spend all your time chasing the ${women}folk, or is it because you're a Roman, or is it because you're my foster-${brother}?\"\n\n\"Several of those,\" ${he} says. \"And three of them owe me money from knucklebones. I can't see why they're so upset about that one, it's their stupid game, not mine…so, anyway—what's on your \n*if romance_morgan=true\n\tmind? Is it ${Morgan}? You've been mooning over ${her_him} since the feast!\"\n\t*goto part1_cai_choice\n*else\n\tmind?\"\n\t*goto part1_cai_choice\n\n*label part1_cai_choice\n*choice\n\t*if (romance_morgan=true) #\"No. Although…has ${she} said anything to you?\"\n\t\t$!{He} laughs. \"$!{She}'s not the sort to talk to me about you, of all people! But if you want my opinion, \n\t\t*if rel_morgan\u003c=40\n\t\t\t*set romance_morgan false\n\t\t\tI'd say ${she} doesn't like you much! So I'd stop it with following ${her_him} around like a kicked puppy and go after someone more your level. You know, like one of ${Uther}'s sheep. Or this bastard of a—\"\n\t\t\t*goto part1_cai_end\n\t\t*else\n\t\t\tI'd say you'll do all right with ${her_him}. If, you know, you actually do something about it, you great idiot. Like mention—\"\n\t\t\t*goto part1_cai_end\n\t#\"It's the Saxon who escaped—${Cynric}. I was right next to ${him}. I swear ${he} had claws.\"\n\t\t\"Well, I heard that some of the Scythian tribes in the far South took the claws of a great beast—a lion or something—and made them into hand weapons. Supposed to make them more fearsome. Something like that?\"\n\t\t\n\t\t\"No, I mean ${he} [i]grew[/i] claws.\"\n\t\t\n\t\t${Cai} just looks at you, perplexed. Then ${he} looks at the sky. \"We [i]are[/i] in Britain—I was just checking—so you can't be sun-addled. So, then, all I can conclude is you've been spending much too much time with ${Morgan}'s ${mother} and chewing on ${her_his} herbs. $!{Men} don't grow claws, Art.\"\n\t\t\n\t\t\"I know, I know. But that ${man}'s throat was slashed; and you saw what happened to—\"\n\t\t\n\t\t\"A weapon, Art! It's not complicated. It was dark, $!{he} just had a knife hidden, that's—\"\n\t\t*goto part1_cai_end\n\t\t\n\t#\"${Uther}. ${Emrys} says ${he}'ll live, but ${he}'ll never recover. So what happens now?\"\n\t\t\"Hell if I know, ${brother}-mine—this is your country, these are your ways. Seems you've returned in time for it all to fall apart. I'm more concerned about you—this nonsense of you being a Warleader without an army. Way I see it, lots of other people now think you're in their way, or are in the way of a united kingdom. You'd best be keeping an eye out, because some of these folk won't be shy about removing you from the picture.\"\n\t\t\n\t\t\"I know; but it won't be ${Bedwyr}, and I can't believe it'd be ${Uther}—they're too close to it. For me to die in any sort of—\"\n\t\t\n\t\t\"They don't need you to die. They just need you to be wounded. And if you don't think ${Uther} would—\"\n\t\t*goto part1_cai_end\n\t\t\n\t#\"It seems we're not welcome here; if anything, it seems we've caused more trouble than anything else.\"\n\t\t\"What are you suggesting, that we go back across the water? Don't be foolish. You're more alive—and I'm less bored—than either of us have been in years!\n\t\t*if defence_of_dinas_emrys>60\n\t\t\tBesides, you did damned well in that battle, and don't let anyone tell you different. If not for you, ${Uther} would have lost ${his} fort and likely ${his} life. Why—\"\n\t\t\t*goto part1_cai_end\n\t\t*else\n\t\t\tSo the battle didn't go as well is it might; that's hardly your fault, ${Bedwyr} left you with no ${men}, and the $!{King} wasn't any use for anything. If it wasn't for us dashing band of \n\t\t\t*if gender=\"male\"\n\t\t\t\theroes—\"\n\t\t\t*if gender=\"female\"\n\t\t\t\theroines—\"\n\t\t\t*goto part1_cai_end\n\t\t\n*label part1_cai_end\n\n$!{He} stops midsentence, staring off into the trees, hand on ${his} sword. \"There's someone out there.\"\n\n*goto part1_villager\n\n*comment --------------------------------------------------------------\n*label part1_emrys_talk\nYou ride over to where ${Emrys} sits comfortably on ${his} pony, seemingly oblivious to the passing scenery, letting ${his} mount pick the route. You know ${he}'s traveled a lot, and can't help but wonder how ${he} manages it without being robbed, falling into rivers or getting hopelessly lost. Perhaps ${he} doesn't.\n\n\"${Emrys}?\"\n\n$!{He} starts, and looks around. \"Oh! Oh. It's you, ${ap} ${Uther}. Have we far to go?\"\n\n\"Until $!{King} ${Cadell} decides there's no boar to be found, I imagine. Did I wake you?\"\n\n\"Not exactly. I was wondering if there might be a better way to move dressed stone up to Dinas Emrys. It needs proper fortifications, not wooden stakes, but it'd take years to get all the stone quarried and carted up there. There must be a simpler way. Oh, I'm sorry—was there something you wanted?\"\n\n*choice\n\t#\"It's been years, ${Emrys}; you left when ${Ambrosius} died. Why choose now to return?\"\n\t\t$!{He} shrugs awkwardly. \"Oh, it was time. What's the point in traveling if you never come home?\"\n\t\t\n\t\t\"I would agree, but I find, coming back, that I'm not sure it's home anymore.\"\n\t\t\n\t\t\"It is, ${Arthur}, I promise you. All things change. But you'll come to realize that this is your place.\" $!{He} sighs. \"It took me long enough to realize it.\"\n\t\t\n\t\t\"So what do you plan to do now you're here?\"\n\t\t\n\t\t\"Whatever I can. I know ${Vivian} isn't fond of me or of the things I've learned, but I think Britain will have need of my skills in the coming dark.\"\n\t\t\n\t\t\"The coming dark? Do you mean the Saxons?\"\n\t\t\n\t\t\"That is the start of it, certainly. If—\"\n\t\t*goto part1_emrys_end\n\t\t\n\t*if (chapter4_emrys_request=\"medicine\") #\"Thank you for what you did at the fort; there are ${men} walking who would otherwise be dead.\"\n\t\t\"Thank you, but don't be too harsh on ${Blaise} and ${his} people. They do have some skill; it's just they seem to have no appreciation for what makes a wound fester. If you ever find yourself in a situation of having to deal with a wound, I strongly advise cleansing it and then using an application of honey.\"\n\t\t\n\t\t\"Honey?\"\n\t\t\n\t\t\"Most definitely. It is a powerful curative, and most excellent at preventing festering and fevers. Why, if—\"\n\t\t*goto part1_emrys_end\n\t\t\n\t*if (chapter4_emrys_request=\"walls\") #\"Without your help at the walls the gate wouldn't have held as long.\"\n\t\t$!{He} grimaces. \"I could have done more, there was no time. No one in this country has given any real thought to defense of their steadings other than 'put it on a hill.' You should see the walls at Ta'if, far over the seas in Araby. It makes Hadrian's Folly look like a child's plaything. Mind you, not that the Saxons are any better; if we—\"\n\t\t*goto part1_emrys_end\n\t\t\n\t*if (chapter4_emrys_request=\"damage\") #\"The fire trenches you laid… I don't understand how the flames were so big.\"\n\t\t$!{He} beams. \"Ah, that's a simple matter of giving the vapor time to build up. If you heat the tallow gently, you see, it gives off a—\"\n\t\t*goto part1_emrys_end\n\t\t\n\t*if (chapter4_emrys_request=\"fear\") #\"That dragon was a moment of genius, ${Emrys}—well done.\"\n\t\t$!{He} beams. \"Playing upon the enemy's superstition should never be overlooked as a tactic, I feel! As for the fire…a pair of bellows and a crude and rapid distillate from tallow and lanolin—we can do much better, given time. If we can find a good source of peat, I may be able to create a form of naptha, and then—\"\n\t\t*goto part1_emrys_end\n\t\n\t#\"${Cynric}. What we saw at the end there. I swear ${he} changed. I swear I saw claws.\"\n\t\t${Emrys}'s eyes narrow. \"I've heard that from more than one person. Interesting. And I saw how ${he} climbed that wall.\"\n\t\t\n\t\t\"Can you explain it?\"\n\t\t\n\t\t$!{He} shrugs. \"I'm sure I could come up with an explanation for it, even replicate it, given time, but I'm not sure that's the question you are asking, since my solution would rely on the fashioning of a set of metal talons and a measure of sleight of hand. No…all I will say, ${Arthur}, is that you shouldn't discount anything. In my experience ${Vivian}'s tricks, although wrapped in mummery and mystique, have substance at their root. Not everything can be explained by iron and fire. Spirits are real, both for good and for ill; in fact—\"\n\t\t*goto part1_emrys_end\n\t\t\n\t#\"You said ${Uther} will live, but that ${he}'ll never recover. So what happens now?\"\n\t\t${Emrys} sighs. \"$!{He} will be stubborn, and ${he} will bring the kingdom to ruin, I suspect.\" $!{He} sees your expression. \"I'm sorry, ${Arthur}, but your ${father} is a prideful ${man}. Were ${he} anything like ${his} ${brother} ${Ambrosius} then it would be a different tale; ${Ambrosius} would not have hesitated to cede the ${king}ship to a better ${man}. If there were one.\" The last has a bitter tinge to it; ${he} realizes you've noticed and forces a smile. \"If your real question is what you should do about it? By ${Uther}'s lights, by ${Bedwyr}'s lights, die, I suspect. For the good of Britain, though? I'm not sure, truly. There's more here than meets the eye. If—\"\n\t\t*goto part1_emrys_end\n\t\t\n*label part1_emrys_end\n\n$!{He} stops suddenly, puzzled. \"Hello?\" ${he} calls out, looking into the woods.\n\n*goto part1_villager\n\n*comment --------------------------------------------------------------\n*label part1_villager\nYou hear a choked sobbing, and a ${man} staggers from the treeline. In ${his} arms ${he} cradles a lifeless body: a child. \"$!{King} ${Cadell},\" ${he} cries, tears streaming down ${his} face. \"Is the $!{King} with you?\"\n*page_break\n\n*temp Hefin\n*set Hefin \"Hefin\"\n*temp Stephanus\n*set Stephanus \"Stephanus\"\n*if gender=\"female\"\n\t*set Hefin \"Haf\"\n\t*set Stephanus \"Stephania\"\n\t\nWhile the $!{King} is fetched the child is taken gently from the ${man}'s arms and laid down on a blanket. $!{She} is dead—${Emrys} quickly confirms it with a solemn shake of the head—but there is no mark upon ${her_him}. The ${man} sits and sobs, head buried in ${his} hands, on the grass amongst the trees until ${his} $!{King} comes to ${him}.\n\n$!{King} ${Cadell} is a gentle ${man}. $!{He} kneels next to the mourner, hand on ${his} shoulder, comforting ${him}, letting ${him} sob, until the ${man} has a measure of control of ${himself}.\n\n\"I am sorry, my ${lord},\" ${he} says at last. \"I am ${Hefin} of Pen Eurfaen.\"\n\n\"You called for me,\" says the $!{King}. \"What has happened to you?\"\n\n\"A curse,\" says ${Hefin}, staring at nothing. \"A curse, my ${lord}. The Saxons have cursed us, and that curse will not be lifted. It is a warning to you, ${lord}; do not ally with ${Uther}. If you do, they say all your kingdom will perish.\"\n\nThe $!{King} shoots a puzzled glance at you. \"What curse? And how is this known?\"\n\n${Hefin} recounts the tale of village ${men} who were waylaid by the Saxons in the woods, and of the dark magics worked there and the braid-haired Saxon's words. \"It is a sickness, ${lord},\" ${he} says. \"Many in the village have it. $!{She}…${she}…\" $!{He} cannot look at the body, and the tears start once more.\n\n${Emrys} looks alarmed. \"A sickness,\" ${he} mutters to you. \"We must be very careful here, ${Arthur}.\"\n\n*page_break\n\"I will not be driven to my decisions by the Saxons,\" says $!{King} ${Cadell}, ${his} look taking in both you and ${Hefin}. \"But such magics are something that a ${man} such as I cannot defeat, not alone. Only God can do that. I will send ${men} to scour the forest for these Saxons. And I myself will ride, now, for Heulog, the ${priest} of the chapel on the marsh. $!{He} keeps a powerful relic there; the bones of St. ${Stephanus}. $!{He} is a holy, Christian ${man} whose knowledge of the scripture is deep. $!{He} will lift the curse if any can.\"\n\n\"That's a long journey,\" says ${Morgan} carefully. \"Is there naught that can be done for these people in the meantime? I volunteer my services; if I can be of help, I will be.\" You can see that ${she}'s unconvinced by ${Cadell}'s solution.\n\n${Cai}'s face is pale. \"You're suggesting we go to a village full of sick people.\"\n\n\"And how else could we help them?\"\n\n\"Perhaps ${Emrys} or ${Morgan} can be of aid,\" says ${Gawain} quietly to you, \"If so, it might win ${Cadell} to our cause.\"\n\nIt makes sense. \"We'll go to the village, $!{King} ${Cadell}, by your leave, if only to protect the people there.\"\n\nThe $!{King} considers you for a moment and then nods. \"Very well.\"\n\n*goto part2\n\n*comment --------------------------------------------------------------\n*comment                   Part 2: The Village\n*comment --------------------------------------------------------------\n*label part2\n*page_break\n*temp Braith\n*set Braith \"Braith\"\n*if gender=\"female\"\n\t*set Braith \"Bran\"\n\t\nYou head east until you find a small river, and you follow its banks into a steep valley below rocky hills. Here lies the village of Pen Eurfaen, a place that survives on its herds and on the copper that's cut from a seam in a nearby cliffside. The village is grey and solemn, and the village elder the same; ${her_his} name is ${Braith}.\n\n\"What would you?\" ${she} asks, eyes hollow and tired. \"You offer aid? Then lift the curse, but I doubt you can. So you may aid us in fetching, carrying, and tending the sick, for near half the village is laid up with the bloody flux, but your finery will suffer for it, I think.\"\n\n\"We'd like to examine one of your folk,\" says ${Emrys}. \"Perhaps there is something we can do to ease their suffering.\"\n\n$!{She} massages ${her_his} bony fingers. \"I'll not have you disturbing them overmuch; this is no place for gawkers. One of you may come.\"\n\n${Cai} shudders. \"Not me,\" ${he} says in a low voice. \"And if you take my advice you'll keep well clear of the sick, Art; this could well be catching.\"\n\n*temp part2_investigate_who\n\n*choice\n\t#\"${Morgan}—it should be you. You can determine whether this is truly a curse at work.\"\n\t\t*set compassion %+15\n\t\t*set rel_morgan %+10\n\t\t*set old_faith %+10\n\t\t*set part2_investigate_who \"morgan\"\n\t\t${Morgan} nods. $!{She} follows ${Braith} into one of the huts.\n\t\t*goto part2_investigate\n\t\t\n\t#\"${Emrys}, will you go? Your Roman training may mean you see something others miss.\"\n\t\t*set compassion %+15\n\t\t*set rel_emrys %+10\n\t\t*set old_faith %-10\n\t\t*set part2_investigate_who \"emrys\"\n\t\t${Emrys} nods. $!{He} follows ${Braith} into one of the huts.\n\t\t*goto part2_investigate\n\t\t \n\t#\"${Cai}'s right; it's dangerous to get too close, we shouldn't risk that.\"\n\t\t*set compassion %-20\n\t\t*set bravado %-20\n\t\t*set rel_morgan %-10\n\t\t*set rel_gawain %-10\n\t\t*set rel_cai %+10\n\t\tYou have a thankful look from ${Cai}, and frustrated looks from the others. \"Then how are we supposed to find out more?\" asks ${Morgan}.\n\t\t\n\t\t\"Use your heads,\" retorts ${Cai}. \"There must be other ways than breathing in the sick air around these people!\"\n\t\t\n\t\t*goto part2_solution\n\n*comment --------------------------------------------------------------\n*label part2_investigate\n\nWhile you wait, you look around the village. A few people are up and around, seemingly not laid up with the sickness, but spending their time aiding those who are ill or concerning themselves with vital tasks, such as hunting. Most bear some sort of weapon, even crude sticks, presumably to guard against the Saxons. There is a grim mood on the place.\n\n\"Many of these huts are empty,\" says ${Cai} with a shiver. \"They can't all have died already, can they?\"\n\n\"From what ${Braith} says, only a handful of the elderly and very young have died thus far,\" says ${Gawain}. \"Pen Eurfaen was once a much busier place, if I remember it rightly. Their mine produced a great deal of copper. There's little left there now, so people have moved on.\"\n\n\"I'm surprised they haven't all just upped and left what with all this.\"\n\n\"It's a hard thing to leave your home.\"\n\n*if part2_investigate_who=\"morgan\"\n\tAt length, ${Morgan} emerges from the hut, a troubled look on ${her_his} face. \"I do not know what this is; it could be an illness, but the onset is very sudden, and I don't understand how it only affects some of the people here while others seem untouched. I think we need to look deeper—perhaps it is a curse.\"\n\t\n\t*goto part2_solution\n*else\n\tAt length, ${Emrys} emerges from the hut. \"Well,\" ${he} says, \"they're ill, that is clear—the fever and the flux confirm that. But what that illness is, I don't know. It could be many things. I'm puzzled as to how it spread, though, for some people are perfectly well while others suffer greatly; there seems no point in between. It's only taken two days to reduce these people to this state.\"\n\t\n\t*goto part2_solution\n\t\t\n*comment --------------------------------------------------------------\n\n*label part2_solution\n\"What do you suggest?\" you ask, looking around the group.\n\n${Cai}'s mouth twists. \"I vote for going somewhere else entirely.\"\n\n${Morgan} glares at ${him}. \"There is a counter-charm I could perform,\" ${she} says. \"It might be effective against a curse of this nature, if indeed it is a curse.\"\n\n${Emrys} raises ${his} eyebrows. \"Yes, well, that's certainly a possibility. Or our time might be better spent questioning the locals, to find out more about how the illness spread.\"\n\n\"I've got a simpler answer,\" says ${Gawain}. \"We track down the Saxons and make them tell us what they've done.\"\n\n*choice\n\t#\"I think we should try ${Morgan}'s counter-charm.\"\n\t\t*set rel_morgan %+10\n\t\t*set old_faith %+10\n\t\t*goto part2_rite\n\n\t#\"${Emrys} is right, the spread of this sickness is a mystery; we should talk to people.\"\n\t\t*set rel_emrys %+10\n\t\t*set old_faith %-10\n\t\t*goto part2_question\n\t\t\n\t#\"${Gawain}'s idea is the simplest; let's track down those Saxons and get an answer from them.\"\n\t\t*set rel_gawain %+10\n\t\t*set bravado %-10\n\t\t*goto part2_track\n\n*comment --------------------------------------------------------------\n*label part2_rite\nIt's rare to be a witness to any of the mysteries of the Old Faith, but ${Morgan} assures you that this is no great secret. \"As I said, it's a counter-charm,\" ${she} says. \"${Vivian} uses it when it's thought that someone is under some sort of influence or curse; where their actions are no longer their own, or they're suffering unwarranted ill-fortune.\"\n\n${Cai} mutters something under ${his} breath. ${Morgan} shoots ${him} a hard look; ${he} stomps off, kicking at the mud.\n\n\"Have you done this before?\" asks ${Emrys}. $!{He}'s pulled out a sheaf of paper and a quill, to ${Morgan}'s slight consternation.\n\n\"Yes,\" ${she} says. \"This isn't something which should be written down, Wanderer.\"\n\n${Emrys} blinks. \"Why not?\"\n\n\"It…it just shouldn't.\"\n\n\"Very well, very well!\"\n\n$!{He} stuffs the quill behind ${his} ear while ${Morgan} sets out six stones upon the ground in front of where ${she} sits, pulling them from ${her_his} leather bag. Each is worn smooth as if by running water, and has a hollow in the top like a thumb has worn away at it. $!{She} moves them until they stand in a circle; there's a careful order to their placement. With a long-bladed knife ${she} traces a pattern that spirals from the circle's center and reaches out to enclose each stone. Then ${she} tips a small amount of liquid into the hollow of each stone from a waxed vessel.\n\n\"What [i]is[/i] that?\" asks ${Emrys}. ${Morgan} just shakes ${her_his} head and smiles. Then ${she} raises the knife and nicks the back of ${her_his} hand, allowing a drop of blood to fall into each hollow.\n\n\"Fetch fire,\" ${she} says to ${Gawain}—${he} does so, uncomplaining, returning with a lit taper from a brazier. $!{She} touches it to each stone and a flame springs up in it and a thin trail of sickly sweet smoke rises, and then ${Morgan} closes ${her_his} eyes and begins to sing.\n\n*page_break\n\nIt's a low tone, the words rolling and sonorous, liquid honey to the ears. The sounds flow around ${her_him}. You can make no sense of them, save for some names you recognize—Arianrhod, Gwydion, powerful names—but somehow the world has changed; ${Morgan} is real, more real than you've known ${her_him}, a weight on the world, and everything is focused towards ${her_him}. It feels as if a dam is about to burst, or if thunder is gathering. There is power here, real power, and you're not sure why that should surprise you but it does. ${Morgan}…this is a side of ${her_him} you've never seen.\n\nYou look up—${Cai}'s returned. $!{He}'s sitting staring at ${Morgan}, white-faced. ${Emrys} is leaning forward, intent. ${Gawain}'s face is unreadable.\n\nThe words continue to flow. And then ${Morgan} holds both hands out in front of ${her_him}, fingers splayed, takes a breath, holds it for a moment, and then releases it.\n\nThe tension snaps. The flames go out, leaving a cloud of smoke, and in it is just ${Morgan} again, coughing. You get a lungful of the stuff as well, and join ${her_him} in spasms; it's bitter and sweet.\n\n$!{She} manages to laugh. \"Sorry…sorry! I'd forgotten about that.\" $!{She} waves it away, eyes watering. \n\n\"Well?\" asks ${Emrys}.\n\n${Morgan} sits for a moment and collects ${her_his} thoughts. \"It's no curse,\" ${she} says. \"That's clear. But as to what it is…\" $!{She} frowns. \"Something to do with the river? I saw blood in the water.\"\n\n${Emrys} lets out a small sigh. \"Of course! That's why the spread of the illness is so odd. It's in the water. I'll lay good odds on the healthy people not having drunk from the river.\" $!{He} looks at you. \"We should follow the river, ${Arthur}, and see what it tells us.\" $!{He} puts away ${his} writing tools and starts off.\n\n${Cai} lays a hand on your shoulder to stop you as the others leave. $!{He}'s pale, and shakes ${his} head in slow disbelief. \"What are we doing, ${Arthur}? That…I don't know what that was, but…do you believe it?\"\n\n*choice\n\t#\"It seems to have worked, ${Cai}. It's going to help us help these people. That's what's important.\"\n\t\t*set leader %+10\n\t\t*set diplomat %-10\n\t\t*goto part3\n\t\t\n\t#\"The old magics are real. They're a part of living here, $!{brother}. I felt something. Didn't you?\"\n\t\t*set old_faith %+15\n\t\t*goto part3\n\t\t\n\t#\"I'm not sure. Perhaps it is trickery. But I don't have a better idea, not now.\"\n\t\t*set leader %-10\n\t\t*set diplomat %+10\n\t\t*goto part3\n\t\t\n\t#\"I don't know either. And I'm not comfortable with it. It felt…wrong.\"\n\t\t*set old_faith %-20\n\t\t*goto part3\n\n*comment --------------------------------------------------------------\n*label part2_question\nIt takes longer than it might. ${Braith} gives you grudging permission to talk to those who are not ill, but is adamant that you shouldn't trouble the sick. You, ${Emrys} and ${Morgan} speak to the villagers. ${Gawain} keeps up a watch, pacing around the middle of the village, concerned about the closeness of the Saxons. ${Cai} waits with ${him}, unwilling to spend any time close to the locals.\n\nYou meet a succession of grim-faced people; ${men}, ${women} and children, old, young and middle-aged. There seems no pattern to who has the sickness and who does not; you see infirm older folk who are untouched by its ravages, yet they'll tell you of a healthy and strong ${son} who lies in pain within a nearby hut. But then the village blacksmith is perfectly well, if—at this moment—drunk on barley spirits. \"There's only one answer,\" ${he} tells you. \"We should have left this place a long time ago.\"\n\n\"Why haven't you, then?\"\n\n$!{His} lip curls petulantly. \"No one else would go.\"\n\nEventually you meet up with the others by the fire and share the stories you've heard. It's ${Emrys} who first suggests that it might be something they've eaten, although it doesn't seem the normal result of spoiled food. And you're on that path for some time, going back to check with some of the people, before ${he} has an answer for you, scratching the shape of the village into the earth with a stick. \"I know what it is,\" ${he} says excitedly. \"These people\" ${he} gestures \"live a bit outside the village, look, further from the river. And these. And the blacksmith has ${his} forge right next to the river, but I'll wager ${he} drinks a skin of wine or ale rather than anything else.\"\n\n\"What do you mean? Something in the drink?\"\n\n\"The water,\" says ${Emrys}. \"These folk out here drink from a rain barrel, as it's a distance from the river; these from the small stream that runs down by the rowan trees. But all the rest drink from the river itself. They've poisoned the river.\"\n\n\"How do you poison a river?\" asks ${Gawain}. \"Wouldn't the water carry it away?\"\n\n\"I suggest we follow the river and find out,\" says ${Emrys}.\n\n*goto part3\n\n*comment --------------------------------------------------------------\n*label part2_track\n${Morgan} is the best tracker; ${Gawain} and ${Emrys} defer to ${her_him} immediately. You'd forgotten; before ${she} was a ${priestess} ${she} spent a lot of ${her_his} time with the hunters, like ${her_his} ${father} before ${her_him}.\n\n$!{She} follows tracks to the glade the villagers spoke of. It's an easy path, ${she} says; panicked villagers ran this way. And there are four blackened sheep skulls underneath four saplings, and a mark burned out on the ground.\n\n\"Saxon magic,\" mutters ${Cai}. \"Isn't that all we need to know?\"\n\n${Emrys} frowns. \"Maybe,\" ${he} says. \"But I'd say this mark, here, has not been carefully laid; the lines aren't clean or even, and the shape itself is very crude. Even a practitioner of Saxon magic would take some care. ${Morgan}?\"\n\n$!{She} nods. \"Yes. This has a strange, rushed look. I can't fathom it.\"\n\n\"I can,\" says ${Emrys}. \"This is staged, a show, a sham. There is no curse. No, something else is going on.\"\n\n\"[i]Hssst![/i]\" ${Gawain} beckons you to be quiet. $!{He}'s peering off through the trees. Then ${he} turns and mouths 'Saxon.'\n\n*page_break\n${Morgan} melts into the treeline. ${Gawain} turns to you and makes talking motions with ${his} hand, gesturing to you and ${Cai}. Then ${he} too slips into the trees, moving quietly for such a big ${man}.\n\n\"Well,\" you say loudly, gesturing at ${Cai} to play along. \"What do you think has happened?\"\n\n\"I don't know,\" says ${Cai}, \"and as soon as we're away from here the happier I'll be. This is a fool's errand, Art. People get sick. People die. Here we are in a tin-pot little kingdom run by someone who doesn't trust us, and we've been sent here by someone who hates you. Why aren't we somewhere sunnier, remind me?\"\n\n\"It's the sickness, isn't it?\" you ask more quietly. \"You're scared?\"\n\n\"Of course I'm damn well scared! You'd be a fool not to be.\"\n\nAt that moment there's a cry, and a shout of anger from ${Gawain}. You race towards the sound.\n\nWhen you reach them you find ${Gawain} with a shaven-headed Saxon ${man} at ${his} feet. ${Gawain} is cursing under ${his} breath, flexing ${his} fist. ${Morgan} has an arrow strung to ${her_his} bow, aimed at the Saxon's ear.\n\n\"$!{Insult_bastard} bit me,\" says ${Gawain}. \"And to cap that, I've realized there's a problem. Any of you speak Saxon?\"\n\n${Cai} gives a long-suffering sigh.\n\nThen ${Emrys} clears ${his} throat. \"A little,\" ${he} says. $!{He} squats down next to the ${man} and says a few words very slowly, enunciating each syllable.\n\n\"We could be here a while,\" mutters ${Cai}.\n\n*page_break\n\nIt's a struggle, but eventually ${Emrys} manages to understand and be understood, and ${he} and the Saxon come to terms. \"So that's our answer,\" ${he} says, as the Saxon walks off into the trees. \"Water. They've poisoned the river somehow.\"\n\n${Morgan} watches the Saxon, jaw twitching. \"It sticks in my throat to just let ${him} walk away.\"\n\n\"I promised ${him},\" says ${Emrys}. \"Did you want ${him} dead?\"\n\n${Morgan} scowls. \"No. But to let ${him} free—\"\n\n\"Would you carry ${him} with you trussed up? Or tie ${him} up here and leave ${him} for the wolves or to starve?\"\n\n$!{She} shakes ${her_his} head. \"No, Wanderer. Well. We'd best move fast, before ${he} reaches ${his} companions.\"\n\n\"We should follow the river, ${Arthur},\" says ${Emrys}. \"Free flowing water is difficult to poison. We'll find the source, I'm sure of it.\"\n*goto part3\n\n*comment --------------------------------------------------------------\n*comment                   Part 3: The Stream\n*comment --------------------------------------------------------------\n*label part3\n*page_break\nIt's started to spit with rain as you work your way up the riverbank. The water is swift and clear; at least it is until, after perhaps half an h
