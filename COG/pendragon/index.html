 thing about medicine—it's all herbs and handwaving. Can you help me?\"\n\nScholar, musician, traveler, poet—${Emrys} spends ${his} time poking ${his} nose into everything and anything, building models out of sticks, grinding rocks to powder and, on at least one occasion, setting fire to the building ${he} was sleeping in. There's no doubt ${he} knows a lot, but you're not at all sure you'd trust ${him} to fix a gate, let alone the $!{King}'s body. ${Blaise}'s druids have treated many battle-wounds before, and they'll be at the $!{King}'s side.\n\nOn the other hand ${Emrys} has picked up bits and pieces of knowledge from everywhere. You wouldn't put it past ${him} to know a bit of Roman medicine. But there's no doubt ${Uther} and ${Bedwyr} would object to it.\n\n*choice\n\t#\"All right. I'll distract the ${men} at the door—you sneak inside.\"\n\t\t*set rel_emrys %+20\n\t\t*set bravado %-30\n\t\t*set chapter2_uther_healed true\n\t\tIt's swift enough work on your part; you head back to the Long Hall and snag a jug of honeywine and two goblets. \"It's Nos Calan Gaeaf,\" you tell the ${men} guarding ${Uther}'s hut. \"You're allowed a sup, at the least.\"\n\t\t\n\t\tYou might be only newly-returned, but they recognize the $!{King}'s bastard, and they're grateful enough for the drink.\n\t\t\n\t\tDespite the Wanderer's gawkiness ${he} can move quietly enough when ${he} wants to. If you hadn't known that ${he} was creeping in through the door, you'd never have noticed ${him}.\n\t\t\n\t\tIt all starts to go wrong when you hear the voice of the chief druid, ${Blaise}, approaching. $!{He} has others with ${him}—two dark-cloaked figures, presumably more of ${his} order. $!{He} eyes you, puzzled. \"${Arthur}?\"\n\t\t\n\t\t\"I thought our friends deserved a drink,\" you say. \"Shame to be the only ones with duty on this night.\"\n\t\t\n\t\t\"Aye,\" ${he} says. \"Well, there's work to be done. I think $!{prince} ${Bedwyr} would be none too pleased to see you here, ${lad}. Best get back to the hall.\"\n\t\t\n\t\tYou try to delay. \"What of the $!{King}?\"\n\t\t\n\t\tThe taller of the cloaked figures pulls back ${her_his} hood. Red hair spills out, framing a hard, pale face. It's ${Vivian}, the $!{Lady} of the Isle, the leader of the Old Faith amongst the Britons. If anyone can help ${Uther} it's ${her_him}. \"If you'll stand aside, ${ap} ${Uther}, then perhaps we can answer your question.\"\n\t\t\n\t\tThis is ${Vivian}. $!{She} is not to be crossed. \"Of course, $!{Lady}.\"\n\t\t\n\t\tYou follow them into the hut. No one challenges you.\n\t\t\n\t\tYou hear ${Blaise}'s gasp. \"What is this?\"\n\t\t\n\t\t${Emrys} the Wanderer is standing over the $!{King}. $!{He} has a knife in ${his} hand, and there's blood on the blade. $!{He} swallows nervously. \"Ah. This doesn't look good, does it?\"\n\t\t*goto part2_chuckout\n\t\t\n\t#\"Let me talk to the guards; perhaps I can get them to let you in.\"\n\t\t*set diplomat %+20\n\t\t*set warrior %-20\n\t\t*set rel_emrys %+20\n\t\t*set chapter2_uther_healed true\n\t\tYou approach the guards. \"Is the $!{King} awake?\"\n\t\t\n\t\tOne shakes ${his} head. \"No, ${lord}.\"\n\t\t\n\t\t\"You know who I am?\"\n\t\t\n\t\tOne nods respectfully. \"Yes, ${lord}. You're ${Arthur} ${ap} ${Uther}.\"\n\t\t\n\t\t\"This ${man},\" you gesture to ${Emrys}, \"is a physician, a healer. I want ${him} to take a look at my ${father}'s wound.\"\n\t\t\n\t\tThe guards look at each other. \"$!{Prince} ${Bedwyr} said that only the druids were-\"\n\t\t\n\t\t\"$!{Prince} ${Bedwyr} has had a long day, as have I. The Wanderer is known for ${his} skill. $!{He} merely wishes to examine the wound. It may be the saving of the $!{King}.\"\n\t\t\n\t\tThe first guard looks uncomfortable. $!{His} companion leans over and mutters something in ${his} ear. The first guard's expression clears. \"Yes, ${lord}. $!{He} is, after all, your ${father}.\" \n\t\t\n\t\tThey stand aside, and you lead ${Emrys} into the hut. It's lit only by the fire in the hearth and a tallow candle by the bedside. ${Emrys} hurries across to it, pulling a cloth wrap from ${his} bag. You follow more slowly. ${Uther}'s face is very pale. $!{His} eyes are closed; there's sweat on ${his} brow and ${his} breathing looks shallow.\n\t\t\n\t\t${Emrys} unrolls the cloth. Inside are a range of instruments—you've seen similar in ${Ector}'s halls when the surgeon visited. The Wanderer gently pulls aside ${Uther}'s coverlet and exposes the wound. It's bound around with cloth over a bloody sponge that soaks up the blood.\n\t\t\n\t\t${Emrys} sniffs the wound. \"It does not seem diseased, but it might be too early to tell. I need to clean it—clean it properly—and stitch it up.\"\n\t\t\n\t\t\"Quickly,\" you tell ${him}.\n\t\t\n\t\tYou watch, fretting, as ${he} works. ${Uther} seems insensible. $!{He} must have lost a great deal of blood. Why there's no one attending ${him} is beyond you.\n\t\t\n\t\t${Emrys} works swiftly. $!{He} is looping up thread as you watch. It's fascinating—there's the gruesomeness of the needle piercing flesh, but you can see that the wound is smaller with each stitch. $!{He} raises ${his} knife to cut the thread.\n\t\t\n\t\tThen there's a hiss. \"What is this?\"\n\t\t\n\t\tIt's ${Blaise}, ${Uther}'s chief druid. Behind ${him} are two dark-cloaked figures. The first has ${her_his} hood thrown back to reveal red hair. $!{Her_his} pale face is stern. This is ${Vivian}, the $!{Lady} of the Isle, the leader of the Old Faith amongst the Britons.\n\t\t\n\t\t${Emrys} pauses, the blade in ${his} hand. $!{He} swallows nervously. \"Ah. This doesn't look good, does it?\"\n\t\t*goto part2_chuckout\n\t\t\n\t#\"The druids know what they're doing—this isn't the first time ${Uther}'s been wounded in battle.\"\n\t\t*set rel_emrys %-30\n\t\t*set old_faith %+20\n\t\t*set rel_vivian %+20\n\t\t*set compassion %-20\n\t\t*set chapter2_uther_healed false\n\t\t\n\t\t${Emrys} looks frustrated. \"But they don't understand about wound putrefaction, and they don't realize that-\"\n\t\t\n\t\t\"And you know everything, Wanderer?\"\n\t\t\n\t\tIt's a voice from behind you, cold, full of distaste. You spin, heart in your throat. You didn't hear anyone approach.\n\t\t\n\t\tA dark-cloaked figure, red-haired, with a pale, stern face. This is ${Vivian}, the $!{Lady} of the Isle, the leader of the Old Faith amongst the Britons. Behind ${her_him} stands the druid ${Blaise}, disapproval on ${his} face, and another smaller cloaked figure.\n\t\t\n\t\t\"$!{Lady} ${Vivian},\" ${Emrys} seems more defeated than surprised. \"The $!{King} will be in your hands, then.\"\n\t\t\n\t\t\"And who better?\" snaps ${Blaise}.\n\t\t\n\t\t\"It doesn't matter,\" says ${Emrys}. \"I'm sure the ${lady} will do what's best for the kingdom.\"\n\t\t\n\t\t${Vivian} laughs, but there's no humor in it. \"As you once did.\"\n\t\t\n\t\t\"I suppose so.\"\n\t\t\n\t\t\"You'd best leave, Wanderer. There's nothing for you here.\"\n\t\t\n\t\t\"No, my ${lady},\" says ${Blaise}, almost apologetic. \"${Uther} gave orders to lock this one up if ${he} showed ${his} face here again. The last time—well, let's just say that ${his} help proved worse than useless.\"\n\t\t\n\t\t${Emrys} just looks tired. \"I saved five lives.\"\n\t\t\n\t\t\"From a fire you started.\"\n\t\t\n\t\tIn short order the guards have been summoned and have dragged the Wanderer off. ${Blaise} turns to you. \"I wouldn't linger here, ${ap} ${Uther}. If ${Bedwyr} found that you were spending your time near ${his} ${father}'s sickbed, ${he} would not be pleased.\"\n\t\t\n\t\t\"$!{He}'s my ${father} too. This is my home. Everyone seems to have forgotten that.\"\n\t\t\n\t\tYou can feel ${Vivian}'s eyes on you.\n\t\t\n\t\t${Blaise} makes an impatient gesture. \"Oh, by the spirits, start using your head, ${lad}. You realize that ${Bedwyr} could be $!{King} before the night is over? Now—oh—find somewhere to be, somewhere not here.\"\n\n\t\t${Vivian}, ${Blaise} and their companion watch you as you walk away into the darkness.\n\t\t*goto part3\n\t\t\n*label part2_chuckout\n*page_break\n\t\t\nIn short order ${Bedwyr} has been summoned, the Wanderer has been dragged off under guard, and ${Blaise} pulls you out of the hut and into the darkness. \"I can't think what led you to involve yourself in this,\" ${he} says. \"I'll not tell ${Uther} nor ${Bedwyr}, not yet, because I think this was likely foolishness on your part rather than malice. But realize your place here, ${boy}—${Bedwyr} will use any excuse to kick you out into the darkness.\"\n\t\t\n\"This is my home,\" you say to ${him}. \"This is where I was born. I've as much right to be here as any of them.\"\n\t\t\n\"Then, by the spirits, start using your head, ${lad}. You realize that ${Bedwyr} could be $!{King} before the night is over? Now—oh—find somewhere to be, somewhere not here.\"\n\nYou feel ${his} eyes on you as you make your way back to the Long Hall.\n*goto part3\n\t\t\n*comment --------------------------------------------------------------\n*comment                        Part 3\n*comment --------------------------------------------------------------\n*label part3\n*page_break\n\nYou stand in the doorway of the Long Hall. ${Cai} is pretty much where you expected ${him} to be: surrounded by ${girl}s and holding forth with a cup of wine in ${his} hand. It might be trouble, later—you can see that one or two of the ${men} are eyeing ${him} with distaste. Still—${Cai} is old enough to look after ${himself}.\n\nA grey-haired ${man} wrapped in an impressive fur cloak pushes past you and then stops, catching sight of your face. \"Ah! \n*if gender=\"male\"\n\tYou are ${Uther}'s bastard,\n*if gender=\"female\"\n\tYou are ${Uther}'s ${son} by ${Ygerna},\nare you not?\" There's a heavy torc of twisted gold wire around ${his} neck; this must be someone of note.\n\nYou incline your head. \"Yes. I'm ${Arthur}.\"\n\n\"We've met,\" ${he} says. \"You were knee-high to a goat, and ${Ambrosius} was still alive.\" ${Ambrosius}, ${Uther}'s ${brother}, who died when you were small—a ${man} who you remember being as kindly and calm as ${Uther} is sour and quick to anger. You still can't place this guest, though. $!{He} chuckles. \"${Aeron},\" ${he} says. \"I'll not blame you—it has been a long time.\"\n\n$!{King} ${Aeron} of Dyfed! You'd no idea ${he} was even invited.\n*if (diplomat\u003c40)\n\tYou stammer out a hasty welcome, fumbling with the words. \"No matter,\" ${he} says. \"You've been away. But tell me—how is your ${father}?\"\n\t*goto part3_morgan\n*else\n\tYou bow politely to ${him}, and offer ${him} the formal words of hospitality that any visiting ${King} should expect. $!{He} smiles. \"That's more courtesy than I've had in this hall of late. But tell me—how is your ${father}?\"\n\t*goto part3_morgan\n\t\n*label part3_morgan\n\n*if (chapter2_uther_healed)\n\tA voice comes from behind you. \"Better than ${he} has any right to be. Awake, and complaining.\"\n\t*goto part3_morgan2\n*else\n\tA voice comes from behind you. \"$!{He} lives, although ${he}'ll not raise a glass with us this night.\"\n\t*goto part3_morgan2\n\n*label part3_morgan2\n\nYou turn. Dark hair, dark eyes, nut-brown skin—it's ${Morgan}. Of course it's ${Morgan}. You realize that this is who you've been seeking out, unconsciously, this was the face missing from the crowd. $!{She} was so much a part of this place that ${her_his} absence has been like missing a limb.\n\n\"Where've you been?\" The words are out of your mouth before you've fully thought about them.\n\n\"Attending the $!{King},\" ${she} says. \"With my ${mother}. I saw you, even if you didn't see me.\"\n\nOf course! The second hooded figure with ${Vivian}. \"You've taken up your studies, then? You're a ${priestess} on the Isle?\"\n\n\"In training. Five years, now,\" ${she} says. \"I'm almost as much of a stranger here as you.\"\n\n$!{King} ${Aeron} clears ${his} throat. \"Forgive me. It seems I'm a distraction from a meeting of old friends. Please, ${lad}, ${lass}, let ${Uther}—and the $!{Lady} ${Vivian}—know of my best wishes for ${his} health.\"\n\nYou make hasty apologies to the $!{King}. $!{He} chuckles and waves it away, moving off through the throng.\n\n\"Well,\" says ${Morgan}. \"Seven years, and now here we both are. You're taller.\"\n\nYou step back, and look ${her_him} up and down. $!{She}'s a head shorter than you, as ${she} always was, but ${she}'s leaner and more lithe. \"And you still look like a [i]bwca[/i],\" you say. $!{She} does—like a Dark One, one of the little folk of the old hills.\n\n$!{She} pokes you in the side. \"Don't start that. So. Here's ${Arthur} ${ap} ${Uther}, bastard ${prince} of Gwynedd, home for the feast of Nos Calan Gaeaf. How will ${he} spend the evening?\"\n\n*choice\n\t#\"I'll introduce you to ${Cai}—and then we should talk. It's been too long. I want to find out what you've been up to, out there on the Isle.\"\n\t\t*set rel_morgan %+20\n\t\t*set rel_cai %+20\n\t\t*set chapter2_spent_evening \"morgan\"\n\t\t$!{She} smiles. \"I can't tell you much of the Isle; you know that. $!{Mother} would peel my skin off. But you're right, it's been too long. I'm guessing ${Cai} would be the loud one up at the back there trying to talk two ${girl}s out of their clothes?\"\n\t\t\n\t\t\"Yes. Come on. Let's make life more difficult for ${him}.\"\n\t\t\n\t\t$!{She} links ${her_his} arm through yours, and you make your way back through the crowd towards ${Cai}'s table. For the first time, you're starting to feel at home.\n\t\t\n\t\t\"${Bedwyr}…\" ${she} says.\n\t\t\n\t\t\"$!{He} was less than pleased to see me.\"\n\t\t\n\t\t\"I know.\n\t\t*gosub part3_warn_bedwyr\n\t\tBut, now, here's the Roman you were going to introduce me to.\" $!{She} looks ${Cai} up and down. \"I see what you mean, ${he} [i]is[/i] oily.\" ${Cai}'s mouth drops open. $!{She} grins.\n\t\t*goto part4\n\t\t\n\t#\"I feel like a stranger here. I should talk to ${Gawain} and some of the ${men} who fought today; I should get to know them better. I'm still the foreigner from Aquitania and I need to change that.\"\n\t\t*set leader %+20\n\t\t*set diplomat %-30\n\t\t*set rel_gawain %+20\n\t\t*set chapter2_spent_evening \"gawain\"\n\t\t$!{She} nods. \"I understand; we've plenty of time to catch up, but you need to find your place here. Especially today. The $!{King} is badly hurt and it sets everyone on edge. On a day like today, royal blood matters.\"\n\t\t\n\t\t\"I wish it didn't. It hasn't won me any love from ${Bedwyr}.\"\n\t\t\n\t\t\"Don't misunderstand ${him}; ${he}'s feeling the weight on ${his} shoulders. $!{He}'s not a bad ${man}.\n\t\t*gosub part3_warn_bedwyr\n\t\tStill—you'd best go and join ${Gawain}. If I know ${him} you've got a jug's worth of catching up to do. I'd better get back to my ${mother}. I'll see you later on.\" You feel the warm touch of ${her_his} fingers on your arm long after ${she}'s left your side.\n\t\t\n\t\tYou fill a cup with honeywine and straddle the bench next to ${Gawain}.\n\t\t\n\t\t\"${Arthur}!\" As ${Morgan} foretold, there's already a slight slur to ${his} words, but ${he} seems pleased to see you. \"${Arthur}, come, I was just telling Teyrnon here about the Saxon charge on the left—you were there, you saw it? I hurt my fist on ${Cynric}'s chin, the little snakey ${insult_bastard}. See, here, this scar? That's ${his} blade; I'll be damned lucky if it isn't poisoned…\"\n\t\t\n\t\tYou raise your cup, and begin the business of catching up with ${him}.\n\t\t\n\t\t*goto part4\n\t\t\n\t#\"There are important people like $!{King} ${Aeron} here—${Uther}'s friends and allies from other kingdoms. I should talk to them, for courtesy's sake, since ${Uther} is in ${his} bed; to try to get a feel for how the land fares.\"\n\t\t*set diplomat %+20\n\t\t*set warrior %-20\n\t\t*set chapter2_spent_evening \"aeron\"\n\t\t$!{She} sighs. \"Yes, I know. Politics, politics—there never seems to be an end to it. It matters, though—especially with the $!{King} so badly hurt. And it looks like ${Bedwyr}'s been drinking already, so best you step in, I suppose.\"\n\t\t\n\t\t\"$!{He} was less than pleased to see me.\"\n\t\t\n\t\t\"I know.\n\t\t*gosub part3_warn_bedwyr\n\t\tBut now, you should go and talk to the $!{King}s and I should get back to my ${mother}. I'll see you later on.\" You feel the warm touch of ${her_his} fingers on your arm long after ${she}'s left your side.\n\n\t\tYou sigh, and look around the hall. $!{King} ${Aeron} is talking with another richly-dressed ${man}—you think it's ${Cadell}, $!{King} of Powys. It's time to make your introductions.\n\t\t\n\t\t*goto part4\n*comment --------------------------------------------------------------\t\n*label part3_warn_bedwyr\nBe careful with ${him}, Art. Don't let ${him} think you're trying to take ${his} place. I think ${he}'s worried about it.\"\n\n\"I'll be careful.\"\n\n\"It's already reminding me of ${Ambrosius} and ${Uther}. You know? There was never any love lost there, either. I often wonder what would have become of Gwynedd if ${Ambrosius} hadn't died when ${he} did.\"\n\n\"Well, if you listen to ${Cai}'s theories, better personal hygiene and finer imported wines. I think ${he}'s missing Aquitania, and ${Uther}'s never had any time for Roman ways.\"\n\n\"Is that what you are, now, Art? A ${son} of Rome, a follower of Christ? The straight line rather than the spiral?\"\n*choice\n\t#\"I suppose so. ${Ector}'s taught me a lot over the last few years: the sciences, the histories, the provision and supply of armies, the logic within the Book. It's something I can understand.\"\n\t\t*set old_faith %-40\n\t\t*set rel_morgan %-20\n\t\t$!{She} looks at you, eyes dark. \"You'll never be able to understand everything, ${ap} ${Uther}.\n\t\t*return\n\t#\"No. ${Ector} made much of it, and there are Roman rules that can be learned and used, but it's too cold, too clinical. There's too much certainty, and people are too complex for that.\"\n\t\t*set old_faith %+40\n\t\t*set rel_morgan %+15\n\t\t$!{She} raises an eyebrow. \"Well, maybe you've learned something after all, ${ap} ${Uther}!\n\t\t*return\n\t#\"I don't know, ${Morgan}. The Old Faith speaks to the heart, and the Roman faith speaks to the head. I think perhaps I'm both.\"\n\t\t$!{She} grins. \"Hah! Forever sitting on the fence! Still, perhaps I can convince you.\n\t\t*return\n\t#(Lie) \"No, of course not. I'm Briton, not Roman, even if I do wash more often than you!\"\n\t\t*set old_faith %-30\n\t\t*set rel_morgan %+10\n\t\t$!{She} pinches your arm and grins. \"May the [i]bwca[/i] steal the heat from your bathwater, ${ap} ${Uther}!\n\t\t*return\n\n*comment --------------------------------------------------------------\n*comment                        Part 4\n*comment --------------------------------------------------------------\n*label part4\n*page_break\n\n[i][b]Elsewhere:[/b][/i]\n\n[i]\"You know the rules, ${Uther}. A maimed ${man} cannot be $!{King}.\"[/i]\n\n[i]\"Spare me your doggerel, $!{Lady} ${Vivian}. I'm not maimed. I may be wounded, but I will recover.\"[/i]\n\n[i]\"Not fully. You'll not fight at the head of a warband again. Don't fool yourself. And it's doggerel ${men} are already repeating out there in the hall. I know this is hard, but you have to make choices, and you have to make them now.\"[/i]\n\n[i]\"The Saxons will give us this winter. I'll have time to heal.\"[/i]\n\n[i]\"A winter of uncertainty. A winter where your allies will mutter behind their hands, make their own alliances, and where there'll be bickering and squabbling. I'm sorry, ${Uther}, but you need to act or they'll force you out.\"[/i]\n\n[i]\"I will not give up the ${king}ship, not of the Britons, nor of Gwynedd. Not yet.\"[/i]\n\n[i]\"Then the warband, at least. You command the warriors of the Briton kingdoms. You must cede that to a ${man} who can fight.\"[/i]\n\n[i]\"${Bedwyr} shall have it.\"[/i]\n\n[i]\"They won't follow ${him}. Not on your say so. $!{He} needs to prove ${himself}, in front of all of them. If you want ${him} to have a chance to become Warleader, there is only one way.\"[/i]\n\n[i]\"What, then?\"[/i]\n\n[i]\"An honor circle.\"[/i]\n\n[i]Silence, for a time, and then: \"And if ${he} loses?\"[/i]\n\n[i]\"Then ${he} loses. This is your only way to give ${him} a chance, the only way the other ${king}s will accept ${him}. If you want a ${man} of Gwynedd to lead, this is the only chance you have. A fair one.\"[/i]\n\n[i]Another pause. \"It will be as you say. $!{He} is skilled, and ${he} is well-liked amongst the ${men}. That will have to serve.\"[/i]\n\n[i]\"On to other matters—the bastard ${Arthur}. Returned at last from ${Ector}'s training in the ways of Rome.\"[/i]\n\n[i]\"${Ambrosius}'s wish, never mine.\"[/i]\n\n[i]\"I know. Tell me, ${Uther}—how did ${he} fare in the battle today?\"[/i]\n\n*if (chapter1_aided_uther=\"attack\") \n\t[i]\"$!{He} doesn’t stop to consider the consequences—just charges straight in without thought.\"[/i]\t\n\t\n\t*goto part4_end\n*elseif (chapter1_aided_uther=\"sneak\") \n\t[i]\"$!{He} doesn’t understand that we must face our foes out in the open, or lose face with everyone.\"[/i]\n\t\n\t*goto part4_end\n*elseif (chapter1_aided_uther=\"parley\") \n\t[i]\"$!{He} thinks too much. $!{He} wants to stop and talk, when the time for talking is long past.\"[/i]\n\t\n\t*goto part4_end\n*else \n\t*comment (chapter1_aided_uther=\"tend\") \n\t[i]\"$!{He} takes no thought for how ${his} actions appear to the ${men} around ${him}.\"[/i]\n\n*label part4_end\n[i]\"$!{He} will learn. Or ${he} will die.\"[/i]\n\n*comment --------------------------------------------------------------\n*comment                        Part 5\n*comment --------------------------------------------------------------\n*label part5\n*page_break\n\n*if chapter2_spent_evening=\"morgan\"\n\tYou're sitting with ${Morgan} and ${Cai} in the corner by the fire. ${Morgan} has just told ${Cai} that all Briton ${girl}s must braid their body hair from the time that it first grows until they're wed…and ${he}'s fallen for it like a fish for a lure.\n\t\n\t\"And all the ${boy}s are pierced,\" says ${Morgan} with due solemnity. \"${Arthur} must have told you. Since you'll be wintering here, and are to be counted as part of the warband, ${Blaise} has arranged a special ceremony for you. Nos Calan Gaeaf is a perfect time according to lore; I think he's warming up the iron spike right now.\"\n\t*goto part5_boast\n*elseif chapter2_spent_evening=\"gawain\"\n\tYou're sitting with ${Gawain} and other ${men} of the warband discussing the finer points of Roman tactics and how Agricola might have managed today's battle, mostly through the use of wine cups and chicken bones.\n\t\n\t\"Britons just wouldn't do that, though,\" says ${Gawain}. \"That plan relies on ${men} who've been taught to all do the same thing, again and again. I know it's the way of the Eagles, but it feels like each ${man} giving up on who they are. And, aye, it worked for Rome for a time, but where's Rome now?\"\n\t*goto part5_boast\n*else\n\t*comment chapter2_spent_evening=\"aeron\"\n\tYou're sitting with two $!{King}s, ${Aeron} of Dyfed and ${Cadell} of Powys. ${Cadell}, a deeply Christian ${man}, has been holding forth on a point of scripture—${he} seems pleased to have the ear of someone who has an idea what ${he}'s talking about. \n\t\n\t${Aeron}'s just been watching the two of you and listening, a smile of mild bemusement on ${his} face. \"It's not that I don't think your god's real,\" ${Aeron} says at last. \"It's just that he seems a mite jealous—he doesn't seem to like having other gods around the place at all. And I'm not at all sure the ${lady} ${Vivian} would let us hear the end of that.\"\n\t*goto part5_boast\n\t\n*label part5_boast\n\nThen, of a sudden, you become aware that one of the ${men} is up on a table. \"I was telling Idris here,\" ${he} says loudly. \"I was first in the charge, at the front of the ranks, but as I cut down my first ${man} I saw $!{Prince} ${Bedwyr} take two; one at the thigh and one straight across the neck. That blow was so deep that the head was just held on by the skin.\"\n\n\"Aye,\" calls another. \"I saw that! But you can't have, for you were four ranks back at the least!\"\n\nThe boasting. You'd forgotten about this. As more ${men} stand to voice their opinions, it becomes compliments, good-natured jibes, and raucous laughter; a retelling of the day from the ${men} of the warband that might not resemble in the slightest what really happened, but which will no doubt become the histories of it and later sung into story. You listen and laugh along with the others as tale piles on tale.\n\n*if (chapter1_aided_uther=\"attack\")\n\t*set acclaim %+10\n\t*set rel_bedwyr %-20\n\t\"And then I saw ${Arthur},\" cries one voice. \"$!{Man} of the Eagles, some of you call ${him}, and there ${he} was flying right at ${Guthwulf} ${himself}—stuck a sword straight into ${his} belly! If that's the way the Eagles fight these days then I say we need a bit more of it!\" Amazingly, it's ${Gawain}—you hadn't even noticed ${him} stand up. $!{He} rather drunkenly grins at you and raises ${his} cup in a toast.\n\t\n\t\"The Eagle and the Bear!\" goes up a cheer. \"The Eagle, and the Bear of Orkney!\" And so you find yourself toasted alongside ${Gawain}—${he}'s a favorite of the warband.\n\t\n\tYou notice the scowl on ${Bedwyr}'s face. This hasn't made ${him} into a friend. But on the other hand, what would?\n\t*goto part5_addastory\n\t\n*elseif (chapter1_aided_uther=\"sneak\")\n\t*set rel_morgan %+15\n\t*set rel_gawain %-20\n\t\"And then I saw ${Arthur},\" cries a voice. \"${Uther} stood there on ${his} own, ${Guthwulf} against ${him}, and what does ${Arthur} do? Why, the cowardly bastard hides ${himself} amongst the wounded and then stabs the Saxon in the back. Is that the sort of ${man} we want fighting alongside us?\" It's ${Bedwyr}. You might have known.\n\t\n\t\"It's a coward's way.\" You hear ${Gawain}'s disapproving mutter.\n\t\n\t\"I don't know about you,\" says another voice. \"But if I'd gone toe to toe with that particular Saxon I'd be a pile of bloody bones by now. Far better for everyone here that ${Arthur} helped to sort ${him} out. Aye, the $!{King}'s wounded, but it could have been far worse.\" It's ${Morgan}, and you smile your thanks at ${her_him}.\n\t\n\t\"You don't fight in the warband,\" snarls ${Bedwyr}. \"Your opinion means naught!\"\n\t\n\tThere's the clearing of a throat and the hall goes deathly quiet. You, like ${Bedwyr}, suddenly realize that $!{Lady} ${Vivian} is in the room, hood cast back. $!{She} has a faint smile on ${her_his} lips.\n\t\n\t${Bedwyr} swallows audibly. \"That's to say, ${Morgan} ${mab} ${Vivian}, your place as ${priestess} sets you aside from the warriors, with different tasks. Of course we'll always listen to your words.\"\n\t\n\t\"I'm honored, $!{Prince} ${Bedwyr},\" says ${Morgan} into the silence. \"Perhaps sometime we can talk about what things are the mark of a coward, and what things are not.\"\n\t\n\t\"${Morgan},\" says ${Vivian} in a calm, even voice, but you know it's a warning. ${Morgan} smiles and bobs ${her_his} head and says no more; after a time, the hubbub resumes.\n\t\n\tYou catch ${Bedwyr}'s scowl. This has not made a friend of ${him}.\n\t\n\t*goto part5_addastory\n\t\n*elseif (chapter1_aided_uther=\"parley\")\n\t*set acclaim %-20\n\t*set rel_gawain %+15\n\t\"And then the bastard ${Arthur} stands up and tries to [i]talk[/i] the Saxon to death!\" cries one of the ${men}. \"${Uther}'s stood there on ${his} own, ${Guthwulf} against ${him}, and the two are just both staring at ${Arthur}—neither could believe it!\"\n\t\n\tThere's a moment of silence, and then ${Gawain} gives a roar. You rear back in panic, but then realize that the big ${man} is laughing, and laughing hard, tears rolling down ${his} cheeks. $!{His} laughter sweeps through the room and carries others with it, and suddenly you find yourself amongst a hall that's in fits.\n\t\n\tOh well. At least you made an impression.\n\t\n\t*goto part5_addastory\n\t\n*else \n\t*comment (chapter1_aided_uther=\"tend\")\n\t\"And then I saw the bastard ${Arthur},\" cries a voice. \"${Uther} stood there on ${his} own, ${Guthwulf} against ${him}. ${Arthur} could have helped, but no, not ${him}—${he} hid ${himself} among the wounded.\" It's ${Bedwyr}. You might have known.\n\t\n\t\"Not so!\" comes another shout. \"That is not what happened. $!{Prince} ${Arthur} aided me when no others could.\" The crowd part to reveal a ${man} sitting propped up against the wall. $!{He} has a cup of wine in ${his} hand, and raises it. It is ${Alun}. \"$!{Prince} ${Arthur} stayed back to save my life, and I value it, even if you do not. Thank you, ${lord}! Your health, as you have given me mine.\" $!{He} drains the cup. A few other people nod approvingly—you realize with surprise that one is the $!{Lady} ${Vivian}—but for the most part there's silence in the hall. ${Bedwyr}, it seems, is out to ruin you.\n\t*set acclaim %-20\n\t*set rel_vivian %+15\n\t\n\t*goto part5_addastory\n\n*label part5_addastory\n*if chapter2_spent_evening=\"morgan\"\n\t${Morgan} nudges you. \"Well, you were there, you saw ${Uther} fight the Saxon. Anything to tell these folk?\"\n\t*goto part5_storychoice\n\t\n*elseif chapter2_spent_evening=\"gawain\"\n\t${Gawain} leans over the table to you. \"Well,\" ${he} says loudly, \"You were there, ${ap} ${Uther}, you saw our $!{King} slay the Saxon. Tell us more!\"\n\t*goto part5_storychoice\n\t\n*else\n\t*comment chapter2_spent_evening=\"aeron\"\n\t$!{King} ${Aeron} nods to you. \"It might be the last time High $!{King} ${Uther} fights in battle,\" ${he} says. \"Have you anything to add to ${his} tale for these folk to hear?\"\n\t*goto part5_storychoice\n\t\n*label part5_storychoice\n\n*choice\n\t#I praise ${Uther}, telling the hall how ${he} fought and defeated ${Guthwulf}.\n\t\tYou tell them what you saw: a ${king}, a ${man} of Gwynedd, standing without fear against a renowned foe. And prevailing where lesser ${men} would have fallen. There's a rousing cheer from the hall at the end of it, and another toast to the $!{King}'s health.\n\t\t*goto feast1\n\t\t\n\t#I praise the Saxon champion's prowess; ${he} may have died, but ${he} was a worthy foe.\n\t\tYou remind them of the stories of ${Guthwulf}—${his} feats of strength, the heads ${he}'s said to have taken in battle, a valiant warrior who made ${his} name echo across this island and the sea, falling at last to the mighty $!{king} of Gwynedd. There's silence for a moment, and then a thumping of fists on tables in approval.\n\t\t\n\t\t*goto feast1\n\t\t\n\t#No, I've nothing to say.\n\t\tYou shake your head and sit down, keeping your thoughts to yourself.\n\t\t*if chapter2_spent_evening=\"morgan\"\n\t\t\t${Morgan} shrugs. \"Fair enough. $!{He}'s your ${father}.\"\n\t\t\t\n\t\t\t*goto feast1\n\t\t*elseif chapter2_spent_evening=\"gawain\"\n\t\t\t${Gawain} frowns faintly. \"Aye, well enough. Perhaps all that's needed has been said.\"\n\t\t\t\n\t\t\t*goto feast1\n\t\t*else\n\t\t\t*comment chapter2_spent_evening=\"aeron\"\n\t\t\t${Aeron} regards you for a moment quietly, and then smiles. \"You have a complicated relationship with your ${father}. I understand.\"\n\t\t\t\n\t\t\t*goto feast1\n\t\n*label feast1\n\nA heavy gong sounds, and the hall falls away to silence of a sudden.\n\n*if (chapter2_uther_healed)\n\t${Blaise} stands by the great chair at the head of the hall, the gong in ${his} hands. $!{He} lowers it and steps back, deferring to the occupant of the chair.\n\t\n\tWith surprise, you realize that ${Uther} is seated there, wrapped in ${his} great fur cloak. $!{He} looks pale, but holds ${his} head high. \"My guests—I am sorry for my absence, but I bruised a knuckle on the chin of a Saxon not a few hours ago. I would have come straight from the field to the feast, but my wise folk spoke against it, saying that perhaps I should at least bathe my hands to rid me of the stink.\"\n\t\n\tThere's laughter and cheers. All know that ${Uther} has come near death today, but to see their Pendragon upright and joking means much to them. You wonder what effort it's costing ${Uther}—you saw the wound ${he} took. Perhaps ${Emrys}'s ministrations had some effect after all.\n\t*goto feast2\n*else\n\t${Blaise} stands by the great chair at the head of the hall where ${Uther} should be sitting. It is conspicuously empty. $!{He} sets down the gong and speaks. \"I have news of High $!{King} ${Uther}. The Pendragon lives, is wide awake and wishes you all good cheer. $!{He} will spend more time with you, ${his} guests, in the coming days; for now, ${he} celebrates Nos Calan Gaeaf, and I believe is even now trying to bed one of ${his} serving ${women}.\"\n\t\n\tThere's laughter and a cheer, but it's ragged. All know that ${Uther} teeters perilously close to insult by not appearing at ${his} own feast to sup with ${his} guests. $!{He} cannot be well at all.\n\t*goto feast2\n\t\n*label feast2\n\nYou turn back to your companions, and fill another cup.\n\n*comment --------------------------------------------------------------\n*comment                        Part 6\n*comment --------------------------------------------------------------\n*label part6\n*page_break\n\nIt's late. The fires are lower, and the exuberance in the hall has muted somewhat, although you can hear ${Cai} having some sort of loud boasting contest with ${Gawain}. You find yourself sat staring at your cup, at the light the flickering flames cast on the rough surface. When you were last here the Long Hall seemed magical—to be sat amongst the warriors at a feast after a battle, that seemed a dream. Now…now your head is full of fog and your muscles ache.\n\n*if chapter2_spent_evening=\"morgan\"\n\t\"Here,\" says ${Morgan}, leaning across the table to you with half a honeycake in ${her_his} hand. \"This'll soak up the wine.\"\n\t*goto proposition1\n*elseif chapter2_spent_evening=\"gawain\"\n\t\"So, have you had your fill of warriors boasting and farting at you?\" It's ${Morgan}. $!{She} sets down ${her_his} cup and sits down opposite you. \"Here—this'll soak up the wine.\" $!{She} hands you half a honeycake.\n\t*goto proposition1\n*else\n\t\"Well, and how were the $!{King}s?\" It's ${Morgan}. $!{She} sets down ${her_his} cup and sits down opposite you. \"Here—this'll soak up the wine.\" $!{She} hands you half a honeycake.\n\t*goto proposition1\n\n*label proposition1\n\n$!{She} takes a bite of the other half, closing ${her_his} eyes for a moment, savoring the sweetness. \"I've missed these. They don't starve us on the Isle, but Rhian's cooking doesn't match what we can get here.\"\n\n\"You're not back at Dinas Emrys much, then?\"\n\n\"Oh, aye, often enough, but it's for our duties rather than for feasting. It's been a rough few years all told. ${Uther}'s only just been hanging on to everything—the High $!{King}ship, ${his} role as Warleader—and we've been run ragged trying to keep it all together.\"\n\n\"Is supporting ${Uther} your concern? I mean, I know you were born here, but you serve the Isle now—shouldn't ${Vivian} be trying to make a stronger country rather than to prop up someone who's failing?\"\n\n\"I think getting them to agree on anyone—even ${Uther}—was a miracle, and that's only because ${he} was ${Ambrosius}'s ${brother}. I think this is the strongest we get, for now. Whether it'll be enough, who can tell? These Saxons—${Cerdic} and ${Cynric}—they lead many, many ${men}. But they're far from the only ones. From the way I hear it, there are more coming from the east, from beyond the lands the Saxons now hold. We're weak as we are. If ${Uther} doesn't survive, or if ${he} loses the alliances ${he} has now…well…\"\n\nThe fire is burning low, a single flame flickering amongst glowing embers.\n\n\"Still. That's for tomorrow.\" $!{She} grins, suddenly. \"This is still the feast, late though it is, and we've finished the honeycake.\" $!{She} reaches out and takes your wrist and draws your hand towards ${her_him}. \"And you, my ${lord} ${Arthur}, have honey all over your fingers.\" $!{She} dips ${her_his} head and licks the tip of your forefinger.\n\nSuddenly it's seven years ago, and you're still a ${boy}, on the edges of becoming a ${man}, as your years of friendship with ${Morgan} turned to awkwardness. All the moments when something might have happened and didn't, both of you too afraid to break whatever it was you had. And then you were sent to Gaul and ${Morgan} to the Isle, and you ran out of time to find out what might happen.\n\nAnd now? Is now the time to risk breaking a life-long friendship for the sake of a few hours?\n\n${Morgan}'s dark eyes are on yours. \"So, I was thinking about finding my bed. The guest beds at Dinas Emrys are a fair size, and I'd prefer not to spend the festival night alone.\" $!{She} raises an eyebrow, and squeezes your hand gently. \"What are your thoughts on that, ${Arthur} ${ap} ${Uther}?\"\n\n*choice\n\t#\"I'm in your hands.\"\n\t\t*set romance_morgan true\n\t\t*set rel_morgan %+20\n\t\t*set chapter2_spent_night \"morgan\"\n\t\t\"Come with me, then.\"\n\t\t\n\t\t$!{She} takes your hand and leads you from the smoky hall and out into the night. In the dark, out of the firelight, ${she} pulls you to ${her_him} for a kiss; it lasts an age and is still too short. $!{She} breaks away from you at last, laughing, ${her_his} breath clouding in the night air, and then ${she} grips your hand and the two of you head deeper into the maze of huts, to somewhere warm and quiet.\n\t\t*if gender=\"female\"\n\t\t\t*set chapter2_pregnant true\n\t\t\t*finish\n\t\t*else\n\t\t\t*set chapter2_morgan_pregnant true\n\t\t\t*finish\n\t\n\t#I grab ${her_him} and kiss ${her_him}.\n\t\t*set romance_morgan true\n\t\t*set rel_morgan %-30\n\t\t*set chapter2_spent_night \"morgan\"\n\t\tYou reach across and pull ${her_him} towards you. $!{She} looks surprised, then your lips close on ${hers}. It's a brief, snatched moment. $!{She} pulls back. \"Not here!\" $!{She} looks round hurriedly, breathing heavily.\n\t\t\n\t\tYou keep ${her_his} hand tight in yours. \"Then shall we find the bed you spoke of?\"\n\t\t\n\t\t$!{She} hesitates, and then: \"Yes.\"\n\t\t\n\t\tYou lead ${her_him} out into the darkness and into the maze of huts in search of somewhere warm and quiet.\n\t\t*if gender=\"female\"\n\t\t\t*set chapter2_pregnant true\n\t\t\t*finish\n\t\t*else\n\t\t\t*set chapter2_morgan_pregnant true\n\t\t\t*finish\n\t\t\n\t#\"I'm sorry, ${Morgan}—I'm tired, and I've drunk too much, and I don't want to ruin things when I'm not thinking clearly.\"\n\t\t*set rel_morgan %+20\n\t\t$!{She} gives a half smile. \"Aye. It might be for the best, at that. In any case, welcome home, Art. I'm to bed, then. On my own—alas! It's bad luck to be alone as the year dies. But I daresay I'll make do.\" $!{She} kisses your fingers again, squeezes your hand and then gets up and makes ${her_his} way out of the hall.\n\t\t*goto proposition2\n\t\n\t*if (old_faith\u003c55) #\"I'm sorry, ${Morgan}, I can't. It's a vow we make amongst the followers of Christ. If we were married, it would be a different answer.\"\n\t\t*set old_faith %-30\n\t\t*set rel_morgan %-20\n\t\t*set chapter2_spent_night \"alone\"\n\t\t$!{She} raises an eyebrow. \"So…well, that's as firm an answer as I could ask for, I suppose. You know I'll never be a Christian, Art. But it's your choice.\" $!{She} releases your hand. \"I'm to bed, then. On my own—alas! It's bad luck to be alone as the year dies. But I daresay I'll make do.\" $!{She} gets up, yawns and stretches, and makes ${her_his} way out of the hall.\n\t\t\n\t\tYou sit there for a while, and realize that there's little point—people seem to be drifting away. It's clear most are heading off to their beds, or indeed to other people's. You'd forgotten the Nos Calan Gaeaf tradition; ${Morgan}'s right, many people are pairing off.\n\t\t\n\t\t*goto part6_end\n\t\n\t#\"I'm sorry, ${Morgan}—I don't think we're for each other.\"\n\t\t*set rel_morgan %-10\n\t\t$!{She} raises an eyebrow. \"Indeed? So, do you think me so ugly and backward after your stay over the sea, then? Or has it just opened your eyes to…other things? Well, it's your choosing.\" $!{She} releases your hand. \"I'm to bed, then. On my own—alas! It's bad luck to be alone as the year dies. But I daresay I'll make do.\" $!{She} gets up, yawns and stretches, and makes ${her_his} way out of the hall.\n\t\t*goto proposition2\n\t\t\n*label proposition2\n\nYou look around the long room. Small groups of people are sitting and talking, but the boisterousness has gone out of it; it's clear most are heading off to their beds, or indeed other people's. You'd forgotten the Nos Calan Gaeaf tradition; ${Morgan}'s right, many people are pairing off.\n\nThere are only a few faces left that you recognize; ${Cai} is still laughing and joking with a group in the corner and looks to have made a few friends amongst the warband; ${he} also has a ${girl} cuddled up on each side, which wouldn't be the first time for ${him}. ${Gawain} looks to have sobered up a bit and is talking to several of the wounded. ${Blaise} the druid sits by the fire telling stories to a rapt audience of all ages, youngsters in various states of sleepiness lying at ${his} feet.\n*if (chapter2_uther_healed)\n\t${Uther}'s chair now stands empty.\n*comment endif\n\nHow will you spend the rest of Nos Calan Gaeaf?\n\n*choice\n\t\t\n\t#I'll talk to a few more people and then find my bed, alone.\n\t\t*set diplomat %+15\n\t\t*set warrior %-15\n\t\t*set chapter2_spent_night \"alone\"\n\t\tYou spend a bit of time just chatting, and then, head fogged from honey wine, decide to retire.\n\n\t\t*goto part6_end\n\t\t\n\t#I'll get to know ${Gawain} a bit better and perhaps flirt with ${him}, to see where it leads.\n\t\t*set rel_gawain %+15\n\t\t*set chapter2_spent_night \"alone\"\n\t\t*if (chapter1_aided_uther=\"tend\")\n\t\t\tYou join ${Gawain} as ${he} talks to ${Alun}. The latter greets you, and reaches up to grip your hand. \"My thanks,\" ${he} says. \"I, for one, am glad to see you back.\"\n\t\t\t*goto part6_gawain\n\t\t*else\n\t\t\tYou join ${Gawain} as ${he} talks to one of the wounded ${men}. The big ${man} has an easy, enviable rapport with everyone ${he} speaks to; ${he} feels safe and comfortable.\n\t\t\t*goto part6_gawain\n\t\t\n\t#I'll stay up for a bit and see if I can find a ${girl} to share my bed.\n\t\t*set compassion %-20\n\t\t*set rel_morgan %-20\n\t\t*set chapter2_spent_night \"girl\"\n\t\tYou join ${Cai} and the others and sit up for a while, laughing, joking and flirting with a ${girl} with dark-brown braided hair. A few drinks, a few snatched kisses, and some time much later that night you're helping ${her_him} from ${her_his} garments as the two of you fall fumbling into the furs in the hut you share with ${Cai}, having made a pact that ${he}'ll find somewhere else to be. If it's bad luck to be alone at Nos Calan Gaeaf, the pair of you spend a lot of time making sure you're very lucky indeed.\n\t\t*finish\n\n\t#I'll stay up for a bit and see if I can find a ${boy} to share my bed.\n\t\t*set compassion %-20\n\t\t*set rel_morgan %-20\n\t\t*set chapter2_spent_night \"boy\"\n\t\tYou join ${Cai} and the others and sit up for a while, laughing, joking and flirting with a ${boy} with close-cropped dark hair and a leaf tattoo at the back of ${his} neck. A few drinks, a few snatched kisses, and some time much later that night you're helping ${him} from ${his} garments as the two of you fall fumbling into the furs in the hut you share with ${Cai}, having made a pact that ${he}'ll find somewhere else to be. If it's bad luck to be alone at Nos Calan Gaeaf, the pair of you spend a lot of time making sure you're very lucky indeed.\n\t\t*finish\n\t\t\n\t#I'll follow ${Cai}'s example and go to bed with anyone who's up for it!\n\t\t*set compassion %-20\n\t\t*set rel_morgan %-20\n\t\t*set chapter2_spent_night \"any\"\n\t\tYou join ${Cai} and the others and sit up for a while, laughing, joking and flirting with anyone who catches your eye. A few drinks, a few snatched kisses, and some time later that night you and a ${girl} with dark-brown braided hair are stripping a ${boy} of ${his} garments before falling in a fumbling heap into the furs in the hut you share with ${Cai}, having made a pact that ${he}'ll find somewhere else to be. If it's bad luck to be alone at Nos Calan Gaeaf, the three of you of spend a lot of time making sure you're very lucky indeed.\n\t\t*finish\n\n*label part6_gawain\n\nYou sit down with ${Gawain} at an unoccupied table and share a drink. $!{He} seems sombre, and when you ask ${him} why, ${he} grimaces.\n\n\"I know it's a celebration, and I know we have a long winter to look forward to without the Saxons—not even ${Cerdic} is foolish enough to fight on foreign ground in winter. But we've lost ${men} today, good ${men}, and it wasn't needed.\"\n\n\"Wasn't needed?\"\n\n$!{He} looks as if there's a sour taste in ${his} mouth. \"Doesn't matter. I'm not the one leading the warband. Let's just say that on some points your ${father} and I disagree, and leave it there.\" $!{He} studies the pattern on the side of ${his} wine cup. \"Mind you, I often disagree with my own ${father} as well, so there we are—perhaps I just always think I know best.\"\n\nYou know ${Gawain} is a ${prince} in ${his} own right, sent to serve ${Uther} Pendragon by ${his} own ${father}, $!{King} ${Lot} of Lothian and Orkney, vast and empty lands which stretch all across the north. \"Trouble with your family?\"\n\n\"I won't bother you with them. You've problems of your own.\"\n\t\n\"It's Nos Calan Gaeaf,\" you find yourself saying. \"Time to put troubles aside.\"\n\n$!{He} nods. \"Aye. I've just had a sup too much to drink—it has a habit of turning me doleful.\"\n\nYou reach out and take ${his} hand. \"Perhaps I can cheer you up?\"\n\n*if (rel_gawain\u003c=40)\n\t$!{He} starts, violently, and pulls ${his} hand away, staring at you. Then ${he} looks around the hall to see if anyone noticed. It seems not. $!{He} looks back at you, takes a breath, and says very quietly \"I'll pretend that never happened, ${Arthur} ${ap} ${Uther}, for the sake of who you are, for the sake of your ${father}, and for the sake of your land. The gods know you've got enough troubles. Don't make yourself any more.\"\n\t\n\t$!{He} stands up, controlled rage in every movement, and stalks out of the hall.\n\t*goto part6_gawain2\n*else\n\t*set romance_gawain true\n\t$!{He} starts, suprised, staring at you. Then ${he} looks around the hall to see if anyone has noticed. It seems not. $!{He} swallows, nervous, but ${he} doesn't draw ${his} hand away. \"Um. Aye. Well. That's…it's not something I'd given any thought to, I have to say.\"\n\t\n\t\"But you're thinking about it now?\"\n\t\n\t$!{His} cheeks are flushed red. For such a giant of a ${man}, ${he} suddenly looks like a bashful little ${boy}. \"Aye. Well.\" $!{He} grips your fingers briefly and then pulls ${his} hand back. \"Maybe the thinking'll take a bit of time.\" $!{He} swallows again. \"We'll maybe talk of it some other time. But, well, not tonight. All right? I've…I've got to go.\"\n\t\n\tAnd with that, ${he}'s stood up and left you at the table, ${his} drink unfinished by your hand.\n\t*goto part6_gawain2\n\t\n*label part6_gawain2\n\nIt seems as if you'll be spending Nos Calan Gaeaf alone after all. There's no point sitting here. \n\n*label part6_end\nYou make your way back through the dark to the hut that you and ${Cai} share, hoping fervently that ${he} finds somewhere else to spend the night rather than brings back company. Wrapped in a fleece and a blanket, you lie there eyes closed. The sounds are that of a tired and happy people, and the smell is of straw and woodfires. It peels away the years from you. This is your safe haven, Dinas Emrys, the fortress of Gwynedd, your home.\n\n*finish", "chapter3": "*comment ==============================================================\n*comment                Chapter 3: The Circle of Stones\n*comment ==============================================================\n\n*comment --------------------------------------------------------------\n*comment                        Introduction\n*comment --------------------------------------------------------------\n*label intro\n\n*image chap3.png center Chapter Three: The Circle of Stones\n\n*comment --------------------------------------------------------------\n*comment                   Part 1: Waking Up\n*comment --------------------------------------------------------------\n*label part1\n\nYou wake, light cutting through your eyelids, head thick and sore. It's been years since you've drunk that quantity of mead. Sitting up, you send motes of straw dust up into a shaft of sunlight. It's morning, too-bright morning, yet there's no sound of the usual bustle from outside. \n\n*if (chapter2_spent_night=\"alone\")\n\tYou focus on your surroundings with some difficulty, and realize that ${Cai}'s bed is empty. No doubt ${he} spent the night learning the local customs of Nos Calan Gaeaf.\n\t\n\tYou struggle from bed, pour a jug of cold water over your hair to clear your head, and then pull on your clothes. Feeling a little more human, you brave the day, stepping out into the morning sunlight.\n\t\n\t*goto part1_tooquiet\n\t\n*elseif (chapter2_spent_night=\"girl\")\n\t*goto part1_girl\n\t\n*elseif (chapter2_spent_night=\"boy\")\n\t*goto part1_boy\n\t\n*elseif (chapter2_spent_night=\"any\")\n\t*goto part1_both\n\t\n*else\n\t*comment (chapter2_spent_night=\"morgan\")\n\t*goto part1_morgan\n\n*comment --------------------------------------------------------------\n*label part1_girl\n\nThere's a murmur of contentment as someone shifts against you. It's the ${girl} from last night, head crooked on ${her_his} arm, braids of ${her_his} hair mussed. $!{She} opens a bleary eye. \"Is it morning?\"\n\t\n\"It is.\"\n\t\n$!{Her_his} eyes snap open at your voice and ${she} stares at you, mouth open, then flushes crimson. \"I…I shouldn't be here.\" $!{She} sits up in a panic, attempting to pull the furs up to hide ${her_his} nakedness and only succeeds in falling off the bed.\n\n*choice\n\t#\"Thank you for the night.\"\n\t\t*set bravado %+15\n\t\t$!{She} blushes again, struggling to pull on ${her_his} clothes. \"Aye. Well. I won't say that I didn't enjoy it. But Nos Calan Gaeaf is over, and some of us have other places to be now.\" Pulling on ${her_his} shoes ${she} stops to look at you, \"It's ${Hana}, in case you'd forgotten.\" And then ${she}'s out of the door.\n\t\t\n\t\tYou dress, and step out after ${her_him} into the morning sunlight.\n\t\t\n\t\t*goto part1_tooquiet\n\t\t\n\t#\"Will you stay a while?\"\n\t\t*set compassion %-20\n\t\t\"No! No. I can't stay.\" $!{She} hurriedly pulls on ${her_his} clothes and, in the doorway, turns to look at you, still blushing. \"${Hana},\" ${she} says. \"In case you'd forgotten.\" And then ${she}'s gone.\n\t\t\n\t\tYou dress, and step out after ${her_him} into the morning sunlight.\n\t\t\n\t\t*goto part1_tooquiet\n\t\t\n\t#Someone might see ${her_him} here—I'll help ${her_him} leave as quickly as possible.\n\t\t*set compassion %+15\n\t\tYou help ${her_him} with ${her_his} clothes, and make sure that ${her_his} hair is back in place and at least passably tidy. \"Thank you,\" ${she} says, and gives you a quick kiss. \"The name's ${Hana}, by the way.\" And then ${she}'s out of the door.\n\t\t\n\t\tYou dress, wait for a time to let ${her_him} get ahead of you, and then step out after ${her_him} into the morning sunlight.\n\t\t\n\t\t*goto part1_tooquiet\n\n*comment --------------------------------------------------------------\n*label part1_both\n\nYour left arm is numb. That's because someone's lying on it; you see dark-swirled tattoos, and remember the ${boy} from last night. And…wait, someone else murmurs sleepily, rolling over against you on the right. A ${girl} with braided hair.\n\nThe festival treated you well.\n\nThe ${girl} opens ${her_his} eyes, and then there's sudden panic in them. \"I shouldn't be here!\" $!{She} struggles out of the bed. It takes a while to untangle everyone, but then ${she}'s dressing swiftly, not looking at you or the ${boy}, face flushed.\n\nThe ${boy} yawns. \"Don't worry. No one keeps a count of what happens at Nos Calan Gaeaf.\"\n\n\"That was last night,\" ${she} says, voice uneven. \"I've somewhere I should be, and I daresay you two do too.\" $!{She} finishes lacing ${her_his} tunic, and makes for the door—but stops to look at the two of you. \"I'm ${Hana},\" ${she} says. \"May the winter treat you well.\" And then ${she}'s gone.\n\nThe ${boy} looks at you. \n*goto part1_boy2\n\n*comment --------------------------------------------------------------\n*label part1_boy\n\nSomeone rolls over and stretches and yawns next to you. It's the ${boy} from last night, spiralling tattoos dark against ${his} skin. $!{He} runs a hand through ${his} hair and grins. \"Morning.\"\n\t\n\"Good morning.\"\n\n*label part1_boy2\n\"Well. The things you don't learn in the stories of ${Arthur} ${ap} ${Uther}, hey?\"\n\n\"There are stories?\"\n\n\"All sorts of stories, as it happens. About ${Uther} and your ${mother}, for a start—they said ${he} used spells on ${her_him}. And, then later on, about how ${Uther} packed you off across the sea. But some other time, maybe—I've to head back east this morning, I need to get on the road.\" $!{He} slips out of bed and starts pulling on ${his} clothes.\n\n*choice\n\t#\"Will you stay a while?\"\n\t\t*set bravado %+15\n\t\t$!{He} shakes ${his} head. \"No, not even for a bastard ${prince}. ${Aeron}'d have my hide. But maybe some other time, aye?\" $!{He} kisses you on top of the head and slips out of the door. \"Oh—\" $!{his} head peeks back around the door. \"It's ${Marc}, in case you were wondering.\" And then, with another grin, ${he}'s out the door.\n\t\t\n\t\tYou dress, and step out after ${him} into the morning sunlight.\n\t\t\n\t\t*goto part1_tooquiet\n\t\t\n\t#Someone might see ${him} here—I'll get rid of ${him} as quickly as possible.\n\t\t*set compassion %-20\n\t\tYou get up, get dressed, and are tapping your boot by the door as ${he} takes ${his} time over the lacing on ${his} tunic. $!{He} raises an eyebrow. \"Trying to get rid of me, is it? Fair enough. But I wouldn't worry. I won't be the only one in the wrong bed.\" With that, ${he} gives you a hard kiss whether you want it or no. \"It's ${Marc}, by the way,\" ${he} says, and is out the door.\n\t\t\n\t\tYou give ${him} time, for decency's sake, and then follow ${him} out into the morning sunlight.\n\t\t\n\t\t*goto part1_tooquiet\n\t\t\n\t#\"Thank you for the night.\"\n\t\t*set compassion %+15\n\t\t\"Well, it's not like I did all the work,\" ${he} says, pulling on ${his} tunic. \"So, ${prince}, maybe we'll meet at the next festival. May the winter be good to you!\" $!{He} pauses on the threshold. \"It's ${Marc}, by the way.\" $!{He} blows you a kiss and is out the door.\n\t\t\n\t\tYou dress, and step out after ${him} into the morning sunlight.\n\t\t\n\t\t*goto part1_tooquiet\n\n*comment --------------------------------------------------------------\n*label part1_morgan\nYou focus on your surroundings with some difficulty, and realize that ${Cai}'s bed is empty. No doubt ${he} spent the night learning the local customs of Nos Calan Gaeaf.\n\nThere is an absence, a space in the furs beside you, a cooling warmth. ${Morgan}. $!{She} was here, and now ${she} is not. What you remember of last night was good, but now, you can't help but wonder if your old friendship can ever be the same, or if you've changed it beyond repair.\n\n*choice\n\t#I'll go now and find ${Morgan} and talk to ${her_him} about what just happened.\n\t\tYou dress quickly and head out into the sunlight of the day.\n\t\t\n\t\tThe air is bright and brittle. One or two people are out and about their business. You wander past the embers of the festival fires, where the smell of charcoal still hangs heavy, to the small gate at the rear of the palisade. It leads up to the hills. Out there on the hillside stands a ring of tall stones, used for blessings and other ceremonies. But up the hillside, above that, is a place where ${Morgan} used to go when ${she} wanted to be apart from the crowd for a bit.\n\t\t\n\t\tYou make your way up the hill. It's every bit as steep as you remember. Rounding the bend in the track you hear the familiar rush of water and catch the edge of a rainbow in the spray; here water gushes out of a split in the earth below the crag at the top of Dinas Emrys's hill.\n\t\t\n\t\tAnd, as if you've never been away these seven years, there's a dark figure sitting on the ledge looking out over the falling water kicking ${her_his} feet in the spray.\n\t\t\n\t\t\"Good morning!\" says ${Morgan}. \"So I take it getting up early in the morning wasn't part of ${Ector}'s training. Or was it the wine?\"\n\t\t\n\t\t*choice\n\t\t\t#Kiss ${her_him}.\n\t\t\t\t*set bravado %+15\n\t\t\t\t$!{She} pushes you away. \"Hoy! The festival's over, you know—none of that! I hope you didn't think it was something more.\"\n\t\t\t\t\n\t\t\t\t*goto part1_morgan_intentions\n\t\t\t\t\n\t\t\t#\"Good morning yourself! Where is everyone?\"\n\t\t\t\t*set rel_morgan %+15\n\t\t\t\t\n\t\t\t\t$!{She} stands up and stretches. \"I'm not rightly sure. I was up early; your oily friend wasn't in ${his} bed, so I assume ${he} never came back. I think there was something going on down at the Hall.\"\n\t\t\t\t\n\t\t\t\t\"Is it ${Uther}? Has ${he}-\"\n\t\t\t\t\n\t\t\t\t\"No, no, I saw $!{mother} this morning, and ${she} said ${he}'d had the fever overnight but that it'd broken now. $!{He}'ll live to trouble you yet. But-\"\n\t\t\t\t\n\t\t\t\t*goto part1_morgan_end\n\t\t\t\n\t\t\t#\"About last night… I'm sorry, ${Morgan}, I never meant things to go that far.\"\n\t\t\t\t*set compassion %+15\n\t\t\t\t\n\t\t\t\t\"Don't be an idiot. It was the festival. We're both full grown. I hope you didn't think it was something more than a night of joy for the both of us?\"\n\t\t\t\t\n\t\t\t\t*goto part1_morgan_intentions\n\t\t\t\t\t\t\t\n\t#I can't think straight yet. I'll douse my head in water and try to clear my thoughts, then go to look for ${her_him}.\n\t\t*set leader %+20\n\t\t*set diplomat %-30\n\t\t*set chapter3_clear_head true\n\t\tDamp-haired, still a bit mazed by the events of the night, you step out into the sunlight. ${Morgan}'s a guest here, along with ${her_his} ${mother}. You're not even sure where they'd be staying. At this hour, ${Morgan} should undoubtedly be up and about ${her_his} ${mother}'s work. But there's one place you know ${she} might be, a spot by the waterfall up on the hillside where the two of you used to go on mornings like this.\n\t\t\n\t\t*goto part1_tooquiet\n\t\t\n\t*if (old_faith\u003c55) #I'll go to $!{Bishop} ${Iwan}, my mentor in Christianity. I've been remiss in seeing ${him}, and ${he} can help me work out what to do.\n\t\t*set old_faith %-30\n\t\t\n\t\t${Iwan}'s small church is shabbier than you recall, thatch rotting, sticks showing through crumbling clay wall. In ${Ambrosius}'s day it was kept well, but ${his} ${brother} ${Uther} rules now, and ${Uther} has no time for Christ.\n\t\t\n\t\t\"I was wondering when you'd remember me.\" ${Iwan}'s smile of pleasure is genuine. $!{He}'s grown older, there's more dust in ${his} wrinkles, and ${his} hair has grown thin. \"So, home to stay, Art? From your look, all's not well?\"\n\t\t\n\t\t*choice\n\t\t\t#I'll admit that I spent the night with ${Morgan} and ask ${his} advice.\n\t\t\t\t$!{He}'s disappointed in you, of course, as you'd expected. $!{He} spends some time in prayer with you in front of the idol of the Christ. It's carved wood, a beautiful thing, gleaming in the rays of the morning sun. At last, ${he} draws you up to sit on the bench and takes your hand.\n\t\t\t\t\n\t\t\t\t\"Nos Calan Gaeaf and its like—these may seem harmless things, a chance for the folk to enjoy themselves, but there's something older and deeper here, and I fear your friend ${Morgan} is becoming lost to it. Do you know what rites ${her_his} ${mother} performs out there on the Isle?\"\n\t\t\t\t\n\t\t\t\t\"No. Unless you're a ${priestess}, you're not permitted to be there.\"\n\t\t\t\t\n\t\t\t\t\"Be careful, ${Arthur}. And I don't just mean careful of the mummery and fakery that ${Vivian} surrounds ${herself} with. People have died on the Isle. And your ${Morgan}'s becoming a part of that.\"\n\t\t\t\t\n\t\t\t\t*goto part1_endiwan\n\t\t\t\t\n\t\t\t#I'll spend an hour or so catching up with ${him}, finding out what's been happening in Gwynedd.\n\t\t\t\tYou sit and chat with the old ${priest}. $!{He} laments how far the kingdom has fallen since ${Ambrosius}'s time. \"I sometimes think that we're living in the last days,\" ${he} says. \"${Ambrosius} knew the value of education, ${he} saw to it that ${boy}s learned their letters, ${he} saw to it that the right stores were laid by for winter, ${he} made sure that those out with the warband had their crops and farms looked after. $!{He} was a great believer in building something that others could build higher. It's different now. ${Uther} disdains the writing down of things as if it's some sort of sin. A hundred years from now, we'll have forgotten how to speak.\"\n\t\t\t\t\n\t\t\t\t\"We survived here for many years without the Roman ways.\"\n\t\t\t\t\n\t\t\t\t\"Yes, in barbarism and superstition. We were growing, like crops out of the soil, flowering into something better than we had been. But now? I worry that we're withering on the vine.\"\n\t\t\t\t\n\t\t\t\t*goto part1_endiwan\n\t\t\t\t\n\t\t\t#I'll ask ${his} advice about my ${father} and ${Bedwyr} to try to work out how I should handle all this now I'm back home.\n\t\t\t\t\"It's a thorny problem, I'll admit,\" says the old ${priest}. \"I think you've got to make a place for yourself, ${Arthur}—to find somewhere you can fit into Dinas Emrys so that ${Bedwyr} doesn't feel threatened by you and so that you're of use to ${him}. If you intend to stay.\"\n\t\t\t\t\n\t\t\t\t\"I do. But why would ${he} be threatened by me?\"\n\t\t\t\t\n\t\t\t\t\"You are ${Uther}'s only other ${son}, and the life of a warrior of Gwynedd is not an easy one. What if ${Bedwyr} were badly wounded or even maimed, like ${his} ${father}? To whom would the rulership pass?\"\n\t\t\t\t\n\t\t\t\t\"Not to me! Never to me!\"\n\t\t\t\t\n\t\t\t\t\"It may not be your choice.\"\n\t\t\t\t\n\t\t\t\t*goto part1_endiwan\n\t\t\n\t*if (old_faith>45) #The Gods are pleased by whatever happens at Nos Calan Gaeaf; ${Morgan} will be fine with this, as will I. I'll take my time in getting up, then head out to see what the day will bring.\n\t\t*set bravado %+20\n\t\t*set chapter3_clear_head true\n\t\tYou doze a little until the worst of the fog in your head clears, then get up and get dressed. Feeling considerably better, you step out into the day to see what it brings you.\n\t\t\n\t\t*goto part1_tooquiet\n\n*comment --------------------------------------------------------------\n*label part1_morgan_intentions\n\n*choice\n\t#\"No! No, of course not. Sorry.\"\n\t\t*set chapter3_morgan_intentions \"none\"\n\t\t*goto part1_morgan_uncomfortable\n\t\t\n\t#\"I'd rather hoped it was, yes.\"\n\t\t*set rel_morgan %+20\n\t\t*set chapter3_morgan_intentions \"more\"\n\t\t*goto part1_morgan_uncomfortable\n\t\t\n\t#\"Maybe it could be, in time?\"\n\t\t*set rel_morgan %+15\n\t\t*set chapter3_morgan_intentions \"more\"\n\t\t*goto part1_morgan_uncomfortable\n\t\t\t\n*label part1_morgan_uncomfortable\n\t\n$!{She} stands up, looking a bit out of sorts. \"Aye. Well. Let's leave it there for the moment, shall we? I was about to come down to see if you were awake. I've to head off back to the Isle later today, and-\"\n\t\t\t\t\n*comment --------------------------------------------------------------\n*label part1_morgan_end\n$!{She} breaks off. You can hear voices raised; people are shouting. $!{She} shoots you an alarmed look and takes to ${her_his} heels—you follow ${her_him} at a run, scrambling and sliding down the trail.\n\nThere's a mob of people heading up towards the tall stones. In fact, by the looks of it, most of the people of Dinas Emrys. You can make out ${Blaise}, and there's ${Gawain}.\n\nYou can't remember any blessing or festival that falls today. \"What's going on?\" you call to ${Morgan}.\n\n\"I haven't a notion!\"\n\nThey've reached the stones by the time you get to where the path forks. You hurry after Morgan, trying to work out what's happening. There's more shouting—definitely some sort of argument going on. One of those voices…that's ${Cai}.\n\nYou put your head down and run.\n\n*goto part2\n\n*comment --------------------------------------------------------------\n*label part1_endiwan\n\nYou leave the old ${priest} to ${his} church, and head out amongst the huts.\n*goto part1_tooquiet\n\n*comment --------------------------------------------------------------\n*label part1_tooquiet\nIt's still deathly quiet out here, the air bright and brittle. You wander past the embers of the festival fires, where the smell of charcoal still hangs heavy, to the small gate at the rear of the palisade.\n\nThere's shouting in the distance. Fearing some sort of attack, you clear the gate and see that something's happening out on the hillside. There's a crowd gathered around the tall stones. You can't remember any blessing or festival that falls today.\n\nThere's an argument going on. One of those voices…that's ${Cai}.\n\nYou break into a run.\n\n*goto part2\n\n*comment --------------------------------------------------------------\n*comment                  Part 2: Arrival At The Circle\n*comment --------------------------------------------------------------\n*label part2\n*page_break\n\n*if (chapter3_clear_head=true)\n\tYou arrive in the circle of stones, out of breath.\n\t*goto part2_1\n*else\n\tYou arrive in the circle of stones, breathless, head pounding.\n\t*goto part2_1\n\t\n*label part2_1\n${Bedwyr} stands facing off against ${Cai}, other ${men} around ${him}. ${Gawain}'s there, fists clenched. It's clear a fight is brewing.\n\n${Cai}'s pale, looking very hungover. $!{He} looks at you owlishly, blinking in the light. \"$!{Brother}? What are you doing?\" ${Bedwyr}'s head snaps round; the look on ${his} face is pure fury.\n\nThere's a crack of sound from the edge of the circle as the butt of a staff strikes the ground. \"Begin!\" shouts ${Blaise}.\n\nYou only realize that you've misunderstood the situation as the ${man} standing next to you throws a punch. It catches you completely unawares; you see sparks and are reeling as someone else trips you. You manage to roll away; ${Cai} grabs your hand and drags you back.\n\nGroggy, clutching your jaw, you find your feet next to ${him}. Everyone seems to be struggling with each other—it's not just you being set upon.\n*if (old_faith>50)\n\t\"Bran's balls, ${Cai}, what's going on?\"\n\t*goto part2_2\n*else\n\t\"In God's name, what's going on?\"\n\t*goto part2_2\n\n*label part2_2\n\t\n\"Contest!\" shouts ${Cai}, ducking a blow and kicking someone in the shins. \"I made a bet!\"\n\nBelatedly, you realize the only people inside the stone circle are those fighting. The folk of Dinas Emrys surround you, an audience for whatever this is. Something nags at your memory, but as another ${man} barrels into you and knocks you from your feet, focusing isn't an option right now.\n\n${Cai} staggers forward, retching. $!{He} doesn't look like ${he} has any prospect of winning ${his} bet.\n\n*temp allied_with_cai\n*set allied_with_cai false\n\n*choice\n\t#I join forces with ${Cai} and the pair of us do our best to defeat all comers.\n\t\t*gosub trial_end\n\t\t*set rel_cai %+20\n\t\t*set compassion %+20\n\t\t*set allied_with_cai true\n\t\tYou pull ${Cai} to ${his} feet and fend off a couple of blows aimed at ${him}. \"Come on, $!{brother}, let's show them a trick or two!\"\n\t\t\n\t\t${Cai} shoots you a sickly grin. \"Adiuta Deus!\" ${he} shouts, and presses ${his} back to yours. ${Ector}'s legion prayer to God.\n\t\t\n\t\tThe pair of you survey the circle.\n\t\t*goto part3\n\t\n\t#I didn't intend to get involved in this; I'll explain that and get out of the circle. I don't need to antagonize ${Bedwyr} any further.\n\t\t*gosub trial_end\n\t\t*set diplomat %+20\n\t\t*set warrior %-20\n\t\t\"$!{Master} ${Blaise}!\" You raise your voice, edging towards the ${priest}. \"This isn't a fight I want; I'm here by a misunderst—\"\n\t\t\n\t\tAn arm wraps around your neck, choking your words off. ${Bedwyr}'s voice in your ear. \"Whether you wanted it or not, coward, you'll be in the dirt in front of all these folk.\"\n\t\t\n\t\t*if warrior>30\n\t\t\tYou drive an elbow into ${his} stomach and stamp down on ${his} instep; ${he} cries out in anger and ${his} grip slackens. You twist and drive your shoulder into ${him}. $!{He}'s off-balance and staggers back into the fray.\n\t\t\t\n\t\t\tYou look over at ${Blaise}. $!{He} shakes ${his} head, face grim. It's too late to get out of this. You take a breath and survey the circle.\n\t\t\t*goto part3\n\t\t*else\n\t\t\tYou struggle for breath, feel your knees weakening. Stars start to swim at the edges of your eyes. Then something smashes ${Bedwyr} away from you, leaving you in the dust, retching. ${Bedwyr} is locked in a struggle with the champion of Dyfed, who's taken advantage of the ${King}'s ${son}'s hatred for you.\n\t\t\n\t\t\tYou crawl forward to the edge of the stones and look up at ${Blaise}. $!{He} shakes ${his} head, nudging you back with ${his} staff. It's too late to get out of this.\n\t\t\n\t\t\tYou get to your feet, swaying slightly, and survey the circle.\n\t\t\t*goto part3\n\t\t\n\t#${Cai} got ${himself} into this mess. If this is a contest, let's do this properly—I'll do my best to defeat everyone, including ${Cai}.\n\t\t*gosub trial_end\n\t\t*set bravado %+20\n\t\t*set compassion %-30\n\t\t*set track_champion +1\n\t\tYou take the golden opportunity to kick ${Cai}'s feet out from under ${him}. $!{He} goes down in a heap, the air knocked out of ${him}. \"Agh! Crows take you, Art, you ${insult_bastard}!\"\n\t\t\n\t\tYou take a step back and survey the circle.\n\t\t*goto part3\n\t\t \n*comment --------------------------------------------------------------\n*comment                  Part 3: Round 1\n*comment --------------------------------------------------------------\n\n*comment --------------------------------------------------------------\n*label part3\n*temp final_opponent\n*set final_opponent Bedwyr\nA knot of ${men} are struggling between you and the central stone. Two are down, insensible. There are perhaps a dozen more, some clearly more dangerous than others. ${Bedwyr}, ${Gawain}, and the dark-haired champion of Dyfed are the biggest threats.\n*if allied_with_cai=false\n\t${Cai}, in ${his} current hungover state, shouldn't trouble you.\n\t*goto part3_choice\n*else\n\t${Cai} catches ${his} breath. \"Come on, $!{brother}, there's no time to waste!\"\n\t*goto part3_choice\n\n*label part3_choice\n\n*choice\n\t#I'll ally with ${Gawain} to target ${Bedwyr} first; we can fight it out between the two of us after ${Bedwyr} is dealt with.\n\t\tYou dodge a kick, take a blow on your shoulder, and duck under a wildly-swung punch. Now you're next to ${Gawain}. $!{He} has one ${man} in a headlock and is fending another off with a raised fist. You grab ${his} second attacker and run ${him} into one of the stones; the ${man} grunts in pain and sways, lip bloodied. \n\t\t*if allied_with_cai=false\n\t\t\tYou trip ${him} and ${he} goes down.\n\t\t\t*goto part3_1\n\t\t*else\n\t\t\t${Cai} trips ${him} and ${he} goes down.\n\t\t\t*goto part3_1\n\n\t\t*label part3_1\n\t\t\n\t\t${Gawain} looks at you in puzzlement, dropping ${his} foe senseless to the floor.\n\t\t\t\t\n\t\t\"A truce?\" you call. \"Against ${Bedwyr}.\"\n\t\t\n\t\t*if rel_gawain>=40\n\t\t\t*comment ------------------ Gawain agrees to truce ----------------------\n\t\t\t$!{He} nods. \"'Til ${he}'s down. Come on!\"\n\t\t\t\t\n\t\t\t${Gawain} plunges into the fray, heading for ${Bedwyr}. You follow. A knot of ${men} struggle near the central stone—you see a punch thrown and the champion of Dyfed goes down. ${Gawain} blocks a ${man} on ${his} right, giving you the opening you need to get to ${Bedwyr}. $!{He} hasn't noticed you; you seize the chance and hammer a punch into ${his} kidneys. $!{He} rears back.\n\t\t\t*if allied_with_cai=false\n\t\t\t\t${Gawain} catches ${him} high around the chest and pulls ${him} to ${his} knees as ${he} struggles to turn, furious. You kick the air out of ${his} lungs.\n\t\t\t\t*goto part3_2\n\t\t\t*else\n\t\t\t\t${Cai} catches ${him} high around the chest and pulls ${him} to ${his} knees as ${he} struggles to turn, furious. ${Gawain} kicks the air out of ${his} lungs and ${Bedwyr} is down.\n\t\t\t\t*goto part3_2\n\n\t\t\t*label part3_2\n\t\t\tThere's a groan from the watchers around the circle.\n\t\t\t\n\t\t\t${Gawain} turns to look at you, a question on ${his} face. You look down at the fallen ${Bedwyr}, and nod to ${Gawain}. ${Gawain} gives a faint smile, and nods in return.\n\t\t\t\n\t\t\tAnd then ${he} throws ${himself} atop you, and you're fighting to twist away from ${him}, to get out of ${his} reach, knowing that as soon as those strong arms lock around you you'll be finished. You turn the fight, falling back foot by foot. You can hear shouting from the audience. You're aware that ${Cai} is somewhere in the background, shouting with the others.\n\t\t\t\n\t\t\t*set final_opponent Gawain\n\t\t\t\n\t\t\t*goto part3_end\n\t\t*else\n\t\t\t*comment ------------------ Gawain disagrees with truce ----------------------\n\t\t\t*if allied_with_cai=false\n\t\t\t\t\"I'll make my own way, ${ap} ${Uther}. Fight your own battles.\"\n\t\t\t\t*goto part3_3\n\t\t\t*else\n\t\t\t\t$!{He} glares at the two of you. \"Your friend looks fit to throw up. Fight your own battles.\"\n\t\t\t\t*goto part3_3\n\n\t\t\t*label part3_3\n\t\t\tThen ${he}'s striding towards the knot of ${men} struggling near the central stone. You see ${him} throw a punch and the champion of Dyfed goes down.\n\t\t\t\n\t\t\t*goto part3_bedwyr\n\t\t\t\n\t#I'll rely on my own strength and skill, jump right in, and enjoy the brawl.\n\t\t*set rel_gawain %+10\n\t\tYour forearm slams into a ${man}'s throat. You duck a punch thrown by a second attacker, and kick out at a third, catching ${him} in the shin; ${he}'s off-balance and you seize ${him}, swinging ${him} into ${Cai}'s path.\n\t\t*if allied_with_cai=false\n\t\t\tThe two go down in a tangle of limbs.\n\t\t\t*goto part3_4\n\t\t*else\n\t\t\t${Cai} sticks out a foot and the ${man} crashes to the ground.\n\t\t\t*goto part3_4\n\n\t\t*label part3_4\n\t\t\n\t\tA hand knots into your hair and pulls you up short. You're dragged round against your will—it's Dyfed's champion, a wiry, lithe ${man} covered in tattoos. $!{He} jabs up under your breastbone once, twice, pulling you towards ${him}, but you twist and the blows land on your ribs. You take a chance and spring forward, smashing your head into ${his} nose. $!{He} falls back, bloodied.\n\t\t\n\t\t*if bravado>=40\n\t\t\t*comment ------------------ You beat Bedwyr with bravado ----------------------\n\t\t\tThen ${Bedwyr} is on you. $!{His} knuckles glance from your temple, but you're moving too fast for ${him}—\n\t\t\t*if gender=\"male\"\n\t\t\t\tyou get under his guard and seize him, dragging him on to the knee you bring up into his groin. There's a sympathetic groan from the watchers around the circle as he falls to his knees, cross-eyed.\n\t\t\t\t*goto part3_5\n\t\t\t*else\n\t\t\t\tyou get under her guard, ram an elbow just under her left breast, and launch a stiff-fingered punch at the base of her throat. She coughs, chokes, and falls to her knees. There's a groan from the watchers around the circle.\n\t\t\t\t*goto part3_5\n\n\t\t\t*label part3_5\n\t\t\t\t\n\t\t\tHands grab at you from behind. \n\t\t\t*goto part3_gawain\n\t\t*else\n\t\t\t*comment ------------------ You don't have enough bravado to beat Bedwyr ----------------------\n\t\t\t*goto part3_bedwyr\n\t\t\n\t#I'll hang back and spot opportunities to take people out at minimum of risk to myself.\n\t\t*set rel_gawain %-10\n\t\t*if allied_with_cai=false\n\t\t\tYou take a couple of steps back and start circling around the stones to your right, watching, waiting. \n\t\t\t*goto part3_6\n\t\t*else\n\t\t\tYou take a couple of steps back and start circling around the stones to your right, watching, waiting, ${Cai} keeping pace with you and watching your left flank.\n\t\t\t*goto part3_6\n\n\t\t*label part3_6\n\t\tThere's a struggle taking place between ${Gawain} and Dyfed's champion; the big ${man} has ${his} opponent in a headlock. ${Bedwyr} is wrestling someone back from the flat stone in the center of the ring. Your best bet is to take out ${Bedwyr}, and quickly, for you know ${he}'ll be coming for you. You work your way behind ${him}.\n\t\t\n\t\tOne ${man} comes in from your left. You scoop up a handful of dust and fling it into ${his} face and\n\t\t*if allied_with_cai=false\n\t\t\tuse the moment that ${his} eyes flutter shut to kick ${him} soundly in the midriff.\n\t\t\t*goto part3_7\n\t\t*else\n\t\t\t${Cai} uses the moment that ${his} eyes flutter shut to kick ${him} soundly in the midriff.\n\t\t\t*goto part3_7\n\n\t\t*label part3_7\n\t\t$!{He} goes down with a sound like a punctured pig's bladder.\n\t\t\n\t\tYou scoop up a fist-sized stone and, ten paces from ${Bedwyr}, draw back your hand to throw.\n\t\t*if bravado\u003c=50\n\t\t\t*comment ------------------ You beat Bedwyr with cunning ----------------------\n\t\t\tThe stone takes ${him} high on the shoulder, and ${he} cries out, spasming forward. $!{His} opponent takes advantage of the moment to wrap one arm around ${his} throat and to pull ${him} down.\n\t\t\t\n\t\t\tThen someone barrels into you from the side.\n\t\t\t*goto part3_gawain\n\t\t*else\n\t\t\t*comment ------------------ You're not cunning enough to beat Bedwyr ----------------------\n\t\t\tBut ${he} must have spotted you. The moment the stone leaves your fingers ${he}'s throwing ${himself} low, away from ${his} opponent, and landing ready to spring.\n\t\t\t*goto part3_bedwyr\n\n\n*comment --------------------------------------------------------------\n*label part3_gawain\n*set final_opponent Gawain\nIt's ${Gawain}; you fight to twist away from ${him}, to get out of ${his} reach, knowing that as soon as those strong arms lock around you you'll be finished. You turn the fight, falling back foot by foot. You can hear shouting from the audience. You're aware that ${Cai} is somewhere in the background, shouting with the others.\n*goto part3_end\n\n*comment --------------------------------------------------------------\n*label part3_bedwyr\n\"Bastard!\" That's all the warning ${Bedwyr} gives you before ${he}'s on you. You take a fist to your jaw that rattles your teeth and you reel backwards, fighting to twist away from ${him}, to get out of ${his} reach. \n*if warrior>50\n\tGiven a bit of breathing space you regain your footing and give as good as you get in a series of jabs to ${his} ribs, but when you try to hook ${his} feet out from under ${him} ${he} shoves you.\n\t*goto part3_end\n*else\n\t$!{He}'s too much for you; you've no time to breathe. You take punishing blows to your ribs and then ${he}'s kicked your left foot out from under you and you stagger backwards.\n\t*goto part3_end\n\t\n*comment --------------------------------------------------------------\n*label part3_end\nAnd then you trip and stumble and your head hits rock. The flat stone in the center of the circle—you've fallen prone across it. You hear a victorious shout and know that ${final_opponent} is leaping to finish you.\n\nPain stabb
