<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pendragon Rising — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "pendragon", "title": "Pendragon Rising", "scenes": {"chapter1": "*comment ==============================================================\n*comment                   Chapter 1: The Carrion Field\n*comment ==============================================================\n\n*image chap1.png center Chapter One: The Carrion Field\n\nYou wake.\n\nIt's a struggle to breathe; a weight lies atop you, crushing you. Something sharp digs into your ribs. Pain pulses behind your eyes. There's the salt tang of blood on your lips.\n\nYou force your eyes open. Pale light stabs at you. Moonlight. It glints off the rings of the mail shirt worn by the dead body you lie on. There's a face next to yours, bloodless, mouth slack. Its helm is split in two.\n\nThe weight above you is another corpse. You heave at it with rising panic and it rolls aside like a sack of grain and now you can breathe.\n\nSomeone laughs, a guttural bark, and a figure looms over you. Long pale hair, tattered furs and leather and the gleam of tattooed flesh. Saxon! A blade flashes—a long dagger, rising, rising.\n\nThe enemy is upon you. You have no weapon. What do you do?\n\n*comment ----------------------------------\n*comment         Action Intro\n*comment ----------------------------------\n*choice\n\t#I attack my enemy barehanded—there's no time for anything else.\n\t\t*set bravado %+15\n\t\tYou throw yourself forward and grapple the Saxon, seizing the descending arm, stopping the knife in its tracks.\n\t\t\n\t\tThe two of you are locked together, your sinews screaming, your head pounding. Inch by inch you force the blade further away and up; you can feel hot breath on your skin. \n\t\t\n\t\tThen you jab out with your elbow—it catches high up in the gut, driving air from lungs. The Saxon folds double, gasping. You punch to the throat. There's a choked, strangling cough and your attacker collapses. \n\t\t\n\t\tYou stand for a moment, swaying, and then fall to your knees, points of light dancing in your vision, trying not to retch.\n\t\t*goto part0\n\t\t\n\t#I try to trick my enemy, pretending there's someone behind them.\n\t\t*set bravado %-20\n\t\tYou shift back in apparent terror and then look to the Saxon's left, feigning sudden relief.\n\t\t\n\t\tYour enemy takes the bait. It's a brief glance sideways, but that's enough—you take the opportunity for a swift kick in the groin and then wrestle the knife away. You slash once, twice. It catches on bone the second time and when you try to pull it out the blood-slick hilt slips from your fingers. The blade spins away into the long grass, but the damage is done. Your attacker sinks to the ground, throat cut.\n\t\t\n\t\tThe world spins around you as you try to catch your breath. You find yourself on your knees trying not to retch.\n\t\t*goto part0\n\t\t\n\t#I grab one of the corpses and use it as a shield.\n\t\t*set compassion %-20\n\t\tYou roll sideways and grab out at one of your fallen comrades. The body is heavy, but desperation grants you strength; you heave it up and between you and the Saxon.\n\t\t\n\t\tThe blade falls, but doesn't hit you—you feel it grate through the iron rings of the armor the corpse is wearing. The Saxon curses. The dagger's stuck. You wrench the body sideways and the dagger slips from your enemy's fingers.\n\t\t\n\t\tYou take the moment of surprise for a punch to the throat. There's a choked, strangling cough and your attacker collapses. \n\t\t\n\t\tYou pull yourself to your knees, head swimming, trying to catch your breath.\n\t\t*goto part0\n\n*comment ----------------------------------\n*comment        Part0\n*comment ----------------------------------\n*label part0\n\n\"Gwynedd!\" A shout, a single voice, strong and sure, from somewhere just ahead of you. The name of your homeland in a voice you recognize.\n\n*page_break\n\nYou crawl forward, blinking, your vision still blurry, and then you see them. Two figures face each other on open ground, surrounded by the dead and dying. One is armed in Briton fashion, sword, helm, mail coat and shield. The other is huge, clad in skins and furs, and bears an axe with a haft almost as tall as them.\n\nBoth forms are familiar. But your head pounds, the world is spinning, and names are hard to grasp—even your own.\n\n[i]In this Dark Ages fantasy of Britain, you might be a male hero in a world where most warriors are men and it's women who guard the mysteries of the Veiled Isle. Or you might be a female hero, and it's the women who go to war and men who talk to the old gods. Now's the time to choose.[/i]\n\nYou try to clear your head. Who are the two warriors that stand in the moonlight in front of you?\n\n*comment ----------------------------------\n*comment         Pick Gender\n*comment ----------------------------------\n*choice\n\t#It's Utta, Queen of Gwynedd, High Queen of the Britons. She faces Gunhild, the Saxon champion.\n\t\t*set gender \"female\"\n\t\t*goto set_gender\n\t\t\n\t#It's Uther, King of Gwynedd, High King of the Britons. He faces Guthwulf, the Saxon champion.\n\t\t*set gender \"male\"\n\t\t*goto set_gender\n\n*label set_gender\n*gosub_scene startup init_gender\n\n*comment --------------------------------------------------------------\n*comment                        Part 1\n*comment --------------------------------------------------------------\n*label part1\n\nThe fog clears. Of course, you are ${Arthur}, bastard-born ${son} of ${Uther} the High $!{King}, the Briton ${man} who stands before you. Your ${father} is alone against the Saxon champion ${Guthwulf}, a battle-scarred brute of a ${man}—you've heard songs sung about ${his} strength.\n\n${Uther} is still hale and hearty, a veteran of many battles, but ${he}'s aged a great deal in the years you've been gone.\n\n\"Gwynedd!\" calls ${Uther} again; it's a challenge. There's no fear in it. $!{He} steps forward. ${Guthwulf}'s grin is wide; ${he} readies ${his} axe.\n\nNeither ${man} has noticed you. Your sword lies by your hand. What will you do?\n\n*comment ----------------------------------\n*comment    Aid Uther against Guthwulf\n*comment ----------------------------------\n\n*temp went_to_help_uther false\n\n*choice\n\t#I'll throw myself forward and attack ${Uther}'s enemy, screaming a challenge.\n\t\t*set bravado %+30\n\t\t*set warrior %+30\n\t\t*set diplomat %-30\n\t\t*set went_to_help_uther true\n\t\t*set chapter1_aided_uther \"attack\"\n\t\tYou grab your sword, scramble to your feet and throw yourself forward. \"Gwynedd!\" you find yourself screaming.\n\t\t\n\t\tBoth heads turn. ${Uther}, startled, hesitates—and ${Guthwulf} brings ${his} axe around in a wide sweep.\n\t\t\n\t\tYou duck under the blow, stabbing out with your blade, and feel it bite home. There's a spray of blood and a grunt from ${Guthwulf}, but an echoing cry from ${Uther}. You pull your sword loose and cut into flesh, again, a third time. The Saxon snarls. A meaty forearm catches you on the side of the head, sending you backwards into the dirt.\n\t\t\n\t\tThere's a roar from the Saxon. You look up to see the axe rise into the air—then ${Guthwulf} drags it downwards in an unstoppable blow aimed straight for ${Uther}.\n\t\t\n\t\tThe $!{King} takes a step to the side. Just one step, but it's enough. The head of the axe scrapes down ${his} shield and hammers into the ground, and ${Uther}'s sword slices deep into the Saxon's ribcage and sticks there.\n\t\t\n\t\t${Guthwulf} releases the axe and grabs for the $!{King}'s shield. ${Uther} brings it up under the big ${man}'s chin. ${Guthwulf}'s head snaps back; ${he} sways and falls to ${his} knees.\n\t\t\n\t\tThe $!{King} lets ${his} shield fall and seizes the hilt of the sword with both hands. $!{He} wrenches it back and forth like a ${man} digging a posthole. The wound widens and tears, and the Saxon's breath bubbles and wheezes.\n\t\t\n\t\tContemptuously, the $!{King} kicks the big ${man} off the sword. You watch the body slump.\n\t\t\n\t\t\"You see, ${boy}?\" says the $!{King}. \"Everyone dies.\"\n\t\t\n\t\tIt's only then that you see the stain that darkens ${Uther}'s side—the split in the hauberk where the Saxon's first blow drove chain rings deep into ${his} flesh. It's only then that you see how pale ${he} is.\n\t\t*goto part2\n\t\t\n\t#I'll work my way round the battlefield stealthily, looking for an opportunity to stab ${Guthwulf} in the back.\n\t\t*set bravado %-30\n\t\t*set warrior %+30\n\t\t*set leader %-30\n\t\t*set went_to_help_uther true\n\t\t*set chapter1_aided_uther \"sneak\"\n\t\tYou curl your fingers around the hilt of your sword and inch forward, keeping to the shadows, focusing on the two ${men}.\n\t\t\n\t\tThe Saxon hefts ${his} great-axe as if it were half the size. $!{He} brings it down in a wide sweep. The first pass is nowhere near ${Uther}, but it's only the first movement in a rapidly shifting pattern as the huge ${man} works ${himself} up into a rhythm, blade rising and falling and looping through the air around the Saxon. There's a fierce grin on ${his} face; this is no mindless brute, this is a skilled warrior.\n\t\t\n\t\tThe $!{King} keeps ${his} distance, shield raised, cautious, letting the Saxon work up a sweat.\n\t\t\n\t\tBoth ${men}'s eyes are locked on each other's rather than on the weapons they hold.\n\t\t\n\t\tYou work your way around to ${Guthwulf}'s left, step by step, conscious that at any moment the Saxon might see you. There's a moment where your foot slides on blood-slick grass, just an inch—you catch yourself. There's a flicker as ${Uther}'s eyes meet yours in acknowledgment, but they snap back immediately to ${his} opponent.\n\t\t\n\t\tAnd then, with a roar, ${Guthwulf}'s blade is swooping round in a wide circle at waist height, blade hammering towards the $!{King}'s midriff.\n\t\t\n\t\tYou seize your moment and dash towards the Saxon's back. ${Uther} sees you coming; ${he} gives a yell and sidesteps right, pulling the Saxon's gaze round and away from you.\n\t\t\n\t\tYou sink your blade into ${Guthwulf}'s back, just above the kidneys, with an echoing cry. \"Gwynedd!\"\n\t\t\n\t\t${Guthwulf} howls and reacts instantly, twisting, hammering the haft of ${his} axe back into your ribcage. It catches you high, driving the air out of your lungs. You see stars for a moment; hear a grunt from the $!{King} and an oath from the Saxon. And then your vision clears and you see ${Guthwulf} stagger as ${Uther} drives ${his} blade deep into the big ${man}'s chest.\n\t\t\n\t\tYou stab out, once, twice, and the Saxon champion totters and falls. You drop to one knee, head spinning, out of breath.\n\t\t\n\t\tThe $!{King} pulls ${his} sword loose and regards you solemnly. $!{He} has one hand clasped to ${his} side. Blood drips through ${his} fingers.\n\t\t*goto part2\n\t\t\n\t#I'll step out and attempt to parley with the Saxon champion.\n\t\t*set diplomat %+20\n\t\t*set leader %-30\n\t\t*set chapter1_aided_uther \"parley\"\n\t\tYou scramble to your feet. \"Stop!\" you cry. \"Stop this. The battle's done. No one else need die.\"\n\t\t\n\t\tThere's a muttered oath of frustration from the $!{King}. ${Guthwulf} stares at you in puzzlement. \n\t\t\n\t\t\"$!{He}'s young,\" says ${Uther} to ${his} opponent, almost in apology. \"$!{He}'s spent too much time amongst those who follow the Eagles.\"\n\t\t\n\t\tThe Saxon grunts. \"Rome is dead, ${boy},\" ${he} says to you. \"Here, a ${King} falls, or a champion falls, or mayhap both. It is not a time for words.\"\n\t\t\n\t\t$!{He} hauls ${his} axe into the air. ${Uther} steps forward to meet ${him}, raising ${his} shield.\n\t\t\n\t\tThe Saxon is swifter than you could have imagined, bringing round ${his} great axe in a set of long sweeping strokes that ${Uther} only just manages to dodge. Parrying would be futile, even with the shield; ${Guthwulf}'s blows would knock a ${man} flying.\n\t\t\n\t\t${Uther} has realized this. $!{He} steps and twists out of the way, small economical movements learned from a lifetime of battle, always just out of ${Guthwulf}'s reach—but ${he}'s old and ${he}'s tiring, and the Saxon is powerful and in ${his} prime. The gap between axe and flesh is narrowing.\n\t\t\n\t\tYou are reaching to pick up your sword, convinced that this can only end one way, when ${Uther} surprises both of you. Instead of stepping back ${he} darts forward, stepping under the sweeping blade, shield held high. The axehead glances off it with a rattle, splintering the shield—but the $!{King} sinks ${his} blade between ${Guthwulf}'s ribs.\n\t\t\n\t\tThe Saxon howls and drags the axe down through the air, reversing its motion in a breathtaking feat of strength. ${Uther} sees it coming; instead of dodging ${he} presses forward, ramming home ${his} blade.\n\t\t\n\t\tThe axe hits home and ${Uther} gasps; but ${Guthwulf} staggers, ${his} strength suddenly failing; the $!{King}'s sword has pierced ${his} lung. The axe falls from nerveless hands and ${Uther} kicks the ${man}'s feet out from under ${him}. ${Guthwulf} dies there on the ground, breath bubbling.\n\t\t\n\t\t$!{Uther} pulls ${his} sword free and stands there, swaying slightly, face pale, hand pressed to ${his} side. The fingers are black with blood.\n\t\t*goto part2\n\t\t\n\t#I'll hang back and tend to any wounded who still live; the $!{King} is a vastly-experienced warrior and will gain much respect by dealing with ${Guthwulf} by ${himself}.\n\t\t*set compassion %-30\n\t\t*set leader %+20\n\t\t*set warrior %-20\n\t\t*set chapter1_aided_uther \"tend\"\n\t\tThe Saxon hauls ${his} axe into the air and steps forward, swinging it into long, looping strokes. ${Uther} raises ${his} shield, the point of ${his} sword low, looking for a gap in the ${man}'s defenses.\n\t\t\n\t\tYou keep half an eye on the two figures as you hunt through the bodies. A ${man} moans as you set your hand on ${his} shoulder. It's ${Alun}. $!{He}'s alive, but ${his} face and neck are dark with blood; the shoulder of ${his} mail hauberk has a jagged hole in it where something has forced the rings apart. A spear, by the looks of it. $!{He}'s losing blood fast. You tear a strip of cloth from your undershirt and wad it up. This is the best you'll be able to do for ${him} for now; and even if you stop the bleeding, ${he}'ll likely die of fever within days. But ${he} has no one else.\n\t\t\n\t\tYou press the cloth into the wound, clamping your hand down on it. $!{He} flinches back, but you ignore ${him}, pressing more firmly. $!{He} cries out.\n\t\t\n\t\tYou look up. Neither ${Guthwulf} nor ${Uther} noticed the sound—they are focused on each other. The Saxon is battering at the $!{King}'s shield, and ${Uther} is clearly tiring.\n\t\t\n\t\tAnd then ${he} does the unexpected, leaping forward to get under ${Guthwulf}'s guard. $!{His} blade sinks between the Saxon's ribs. But it's a costly move; even though ${Guthwulf}'s blow is robbed of its strength, still the great-axe catches ${Uther} in the side.\n\t\t\n\t\tThe $!{King} slams ${his} shield up and under the Saxon champion's chin. The ${man}'s head snaps backwards, and ${he} staggers to ${his} knees. ${Uther} shoves ${his} sword deeper and twists it; then kicks ${his} foe off the blade and lets ${him} slide to the ground.\n\t\t\n\t\t${Uther} stands pale in the moonlight, swaying slightly, breathing heavily. $!{He} has one hand clasped to the wound in ${his} side. Blood drips through ${his} fingers.\t\t\n\t\t*goto part2\n\t\t\n*comment --------------------------------------------------------------\n*comment                        Part 2\n*comment --------------------------------------------------------------\n*label part2\n\nWhat do you do?\n\n*choice\n\t#I go to help ${Uther}.\n\t\t*set compassion %+15\n\t\tYou step forward. \"You're wounded, $!{father}.\"\n\t\t\n\t\t*if went_to_help_uther\n\t\t\t${Uther} waves you away. \"I'm upright, ${boy}, and that's what counts.\"\n\t\t\t*goto part3\n\t\t*else\n\t\t\t*set rel_uther %-20\n\t\t\t${Uther}'s eyes are cold. \"Now you'll leap to my aid, when there's not a Saes blade in sight. Keep your craven hands to yourself.\"\n\t\t\t*goto part3\n\t\t\n\t#Knowing ${he}'s a proud ${man}, I wait for ${him} to ask for help.\n\t\t*set rel_uther %+15\n\t\tThe $!{King} closes ${his} eyes, taking long, slow breaths, mastering ${his} pain. Once again you're struck by how much older ${he} looks now than when you left this land all those years ago.\n\t\t*goto part3\n\t\t\n\t#I take the opportunity to ensure ${Guthwulf} won't get up again.\n\t\t*set compassion %-20\n\t\tYou kneel at the Saxon's side, draw your short knife and cut the ${man}'s throat. It's a bloody business, but it's best to be sure. The Saxons are known for their tricks.\n\n\t\t*if went_to_help_uther\n\t\t\tYou find ${Uther}'s eyes on you. \"$!{He}'s no threat, ${boy}. I've seen to that.\"\n\t\t\t*goto part3\n\t\t*else\n\t\t\t*set rel_uther %-20\n\t\t\tYou find ${Uther} staring at you. \"So only now, when ${he}'s far past hurting you, you'll find the courage to attack ${him}. You're no ${son} of mine.\"\n\t\t\t*goto part3\n\n*comment --------------------------------------------------------------\n*comment                        Part 3\n*comment --------------------------------------------------------------\n\n*label part3\n*achieve first_blood \n\n\"$!{Father}! My $!{Lord}!\" It's ${Bedwyr}, ${Uther}'s legitimate ${son} and heir, your half-${brother}. There are a handful of ${men} with ${him}. $!{He} shoots you a venomous glare and pushes past you, going to help the $!{King}. \"It's done, $!{lord}, the fighting's over. We were too far away—I tried to get back to you, but—\"\n\nThe $!{King} interrupts ${him}. \"What of their leaders—what of ${Cerdic}?\"\n\n\"The Wolf-$!{Lord} and ${his} whelp of a ${son} are fled, along with a score of their ${men}. We'll not be seeing them this side of winter.\"\n\n${Uther} grunts in acknowledgment. \"Aye, but while we build up our winter stores they'll be doing the same. They—\" $!{He} gives a sudden gasp, and sways where ${he} stands, clutching at ${his} side.\n\n${Bedwyr} takes ${his} ${father}'s arm; ${men} go to ${his} aid. You watch helplessly as they start to help ${him} from the field. ${Uther} and ${his} true ${son}.\n*if chapter1_aided_uther=\"tend\"\n\tOthers have arrived to tend the wounded. ${Alun} is still alive, thanks to your efforts; one of the druid acolytes is instructing two ${men} to carry ${him} to where ${he} can be treated.\n*comment *endif\n\n\"${Arthur}. Are you wounded?\" It's ${Gawain}—you were so focused on ${Uther} and ${Bedwyr} you didn't notice ${him} approach. The big ${man} is steaming slightly in the cold night air, and ${his} bare arms are caked in dirt and blood; ${he} will have been where the fighting was thickest.\n\n\"Not where you'd see it,\" you mutter.\n\n${Gawain} is looking down at the Saxon champion's corpse. \"Well, at least some good's come of the night.\"\n\nSomeone slaps you on the back; it's ${Cai}, your foster-${brother}. \"Cheer up! Not a bad start to our battle-honors!\"\n\n${Gawain} growls. \"I'd keep your mouth closed about battle-honors today. ${Cerdic} and ${his} ${son} ${Cynric} are away and free, and the $!{King} looks fit for the grave.\"\n\n*temp insult \"hairy Northern lard-barrel\"\n*if gender=\"female\"\n\t*set insult \"steaming Northern lard-barrel\"\n\"But we've driven them off, you ${insult}! It's worth a smile at the least!\" ${Cai} sees your expression. \"Oh, come on, Art, we're back in your homeland, you're alive, the enemy's fled, life is good! I've a bottle of Aquitanian red I've saved from the paws of your barbarian kins${men}—let's get back and break it open. And then, if I know this lot, there'll be feasting. Right?\" $!{He} addresses ${Gawain}. \"That's what you Britons do, isn't it?\"\n\n${Gawain} nods reluctantly. \"Oh aye. There'll be feasting.\"\n\n*finish", "chapter10": "*comment ==============================================================\n*comment                Chapter 10: A Parliament Of Wolves\n*comment ==============================================================\n\n*comment --------------------------------------------------------------\n*comment                        Introduction\n*comment --------------------------------------------------------------\n*label intro\n\n*image chap10.png center Chapter Ten: A Parliament of Wolves\n\n*temp tied_up \n*set tied_up false\n\n*comment --------------------------------------------------------------\n*comment                   Part 1: The Funeral\n*comment --------------------------------------------------------------\n*label part1\n\nA black boat is drawn up on a grey shore. The folk of Gwynedd, grim-faced, stand silent on the shoreline as a bier is carried to the side of the boat and laid across the thwarts. On it lies a ${man}, pale, grey-haired, clad in russet-dyed tunic trimmed with gold. A thick fur cloak wraps ${his} shoulders, and there's a heavy gold pin at the shoulder. Rings are on ${his} fingers and a fine sword is belted at ${his} waist.\n\nAt the stern sit two oars${men}. In the prow are two cloaked figures: ${Blaise}, chief druid to the Pendragon; and $!{Lady} ${Vivian} of the Veiled Isle. As the boat is pushed off the stones into the rising water, they draw up their hoods and become part of the silhouette, dark cut-outs against a mist-pale sky. \n\nAnd the boat fades from shore and drifts away towards the Isle of the Dead.\n\nSo passes ${Uther}, $!{King} of Gwynedd and Pendragon of the Britons, to lie under grass on the Isle alongside ${his} ${brother} ${Ambrosius} and ${his} fore${father}s.\n\n*page_break\n\nThe Long Hall. It's busy, bustling. You push in past a group wearing the boar symbol of Dumnonia and get several unfriendly glares for your trouble.\n\nIt takes you a moment to work out where the others are; it's difficult to see over the crowd. Eventually you spot them amongst the throng in the far corner.\n\n\"It's all they're talking about,\" says ${Cai} to you, handing you a cup. \"What about ${Bedwyr}'s hand, does that make ${him} unfit? Will ${he} be $!{King}? Will you be $!{King}, ${Arthur}? [i]Should[/i] you be $!{King}?\"\n\n\"It will take days of wrangling; ${Blaise} has to gather opinion from many voices, and must ask the advice of the Old Ones,\" says ${Emrys}.\n*if chapter9_emrys_wounded\n\tThe color is back in ${his} cheeks, now; ${he} holds ${himself} carefully, and moves slowly, so as not to re-open ${his} wound. \n*if rel_uther>50\n\t\"I think many of $!{Uther}'s followers would prefer you to ${Bedwyr} now, if I read the mood aright. But there are still plenty of folk who don't trust you. It would be a struggle.\"\n*if rel_uther\u003c=50\n\t\"$!{Uther}'s followers don't want you. That's the truth of it, no matter what tradition says.\"\n\n\"What about $!{Lady} ${Vivian}?\" asks ${Gawain}, sounding troubled. \"$!{She}'ll know the law of things.\"\n\n\"$!{She}'ll not be long,\" says ${Morgan}. \"There are preparations to be made; the dead must be honored.\"\n\n\"$!{She}'s here—I saw ${her_him} outside,\" says ${Cai}. \"Dealing with some ${priestess} thing for the funeral, I suppose. I don't know what you folk do for the death of ${king}s.\"\n\n\"Drink, mostly,\" mutters ${Gawain} gloomily. $!{He} sighs. \"Listen, Art, if they acclaim you $!{King}, then—\"\n\n\"Wait.\" ${Emrys} holds up a hand; ${he}'s become more assertive since the Isle. \"$!{Arthur}. What is it that [i]you[/i] want? For you need to know, before ${Blaise} or ${Vivian} force you to something. Do you want to be $!{King} of Gwynedd?\"\n\n*choice\n\t#\"I don't. Not enough folk would follow me—it would break Gwynedd too badly, and we need to be strong now.\"\n\t\t*set diplomat %+20 \n\t\t*set leader %-30\n\t\t*set compassion %+15\n\t\t${Emrys} raises an eyebrow. \"Recognising such flaws already makes you more fitted for the role than ${Uther} ever was. But yes, you're right—Gwynedd needs to be strong, and you might not be her best chance.\"\n\t\t\n\t\t*goto part1_comments\n\t\t\n\t#\"Someone needs to take it for Gwynedd to be strong. ${Bedwyr} is maimed—it can't be ${him}. I have no other choice.\"\n\t\t*set leader %+20\n\t\t*set warrior %-30\n\t\t*set compassion %+15\n\t\t${Emrys} nods thoughtfully. \"You're right—Gwynedd does need to be strong. But there is always a choice.\"\n\t\t\n\t\t*goto part1_comments\n\t\t\n\t#\"Damned right I want it!\"\n\t\t*set compassion %-20\n\t\t*set bravado %+15\n\t\t*set warrior %+20\n\t\t*set diplomat %-30\n\t\t*set chapter10_wants_crown true\n\t\t${Cai} slaps you on the back. \"That's more like it! Look at it this way—${Bedwyr}'s been a pain in your arse since we got here, and at the very least you'll be able to shut ${him} the hell up.\"\n\t\t\n\t\t${Emrys} studies you, and nods. \"Perhaps you're more like your ${father} than I'd thought.\"\n\t\t\n\t\t*goto part1_comments\n\t\t\n\t*if (chapter2_pregnant) #\"There's a child to think of; that needs to be my concern now.\"\n\t\t*set compassion %+15\n\t\t*set leader %-30\n\t\t*set diplomat %+20\n\t\t${Morgan} doesn't look at you.\n\t\t\n\t\t${Emrys} holds your gaze, and then nods. \"A child over a kingdom. It's a difficult choice. But it's important to remember that there is always a choice; ${Vivian} cannot force you against your will.\"\n\t\t\n\t\t*goto part1_comments\n\n*comment --------------------------------------------------------------\n*label part1_comments\n\nYou notice serving ${men} clearing a space by the fire; setting out a seat. The hall is filled with dignitaries, $!{King}s and the emissaries of $!{King}s; even those ${Uther} argued with constantly have sent messengers, from Lothian to Dumnonia. None seem quite clear who they should give their condolences to after ${Uther}'s death, so they settle on exchanging words with ${Blaise}. The room buzzes with one question—what now?\n\nYou watch as ${Bedwyr} is helped through the crowd to the seat. The stump of ${his} arm is bound up, and ${his} face is grey, but ${he}'s lost the sickly yellow of the last few days. \n\n*if rel_morgan>=60\n\t\"I think you could be $!{King}, and a good one, perhaps a better one than you think,\" says ${Morgan} quietly. \n\t*if chapter10_wants_crown=false\n\t\t\"But I can understand why you'd hesitate. And I, for one, would not want to make you do something you didn't want to do.\"\n\t\t\n\t\t*goto part1_comment_gawain\n\t*else\n\t\t\"I think it's yours for the taking if you want it, and I think Gwynedd would be the stronger for it.\"\n\t\t\n\t\t*goto part1_comment_gawain\n*elseif rel_morgan\u003c=40\n\t\"The people here know ${Bedwyr}.\" says ${Morgan} quietly. \" They're used to the idea that ${he} will rule them. And if truth be told I believe ${he}'d be better at it than you. But ${he} is maimed.\"\n\t\n\t*goto part1_comment_gawain\n*else\n\t\"I honestly don't know if they'll follow you or not,\" says ${Morgan} quietly. \"You're not what they're used to. But then again, you may be what they need.\"\n\n*label part1_comment_gawain\n*if rel_gawain>=60\n\t*if acclaim>50 \n\t\t\"You've done damned well as Warleader. They'd follow you, I've no doubt at all,\" says ${Gawain}. \"I'd follow you.\"\n\t\n\t\t*goto part1_comment_emrys\n\t*else\n\t\t\"You may not have made your name as Warleader,\" says ${Gawain}, \"but a $!{King} is a different matter. They'll follow you, I'd lay odds on it.\"\n\t\t\n\t\t*goto part1_comment_emrys\n*elseif rel_gawain\u003c=40\n\t${Gawain} sighs. \"I don't think you'll find enough support, even if your claim's the right one—I think it might be best for all if you step down if it comes to you. There'll be jostling, aye, fair enough, but we need a strong choice, and if half the ${men} won't follow you, well…\"\n\t\n*label part1_comment_emrys\n*if allies>=5\n\t\"Don't forget how many allies you've brought Gwynedd,\" says ${Emrys}. \"That matters. People will remember it.\"\n\t\n\t*goto part1_comment_cai\n*elseif allies>=2\n\t\"Don't forget you've brought allies to Gwynedd,\" says ${Emrys}. \"Maybe not many, but it counts for something.\"\n\n*label part1_comment_cai\n${Cai} shrugs. \"You know me, $!{brother}. I'll stick with you whatever you say. Oh—hsst! Here's ${Vivian}.\"\n\n*page_break\n\nThe crowd parts before the $!{Lady} of Ynys Mon as ${she} walks slowly to the head of the hall, where $!{Uther}'s throne sits. The hall is silent, all eyes on ${her_him}.\n\n\"${Uther} is dead,\" ${she} says at last. \"$!{He} died at the hands of a Saxon sorcerer, here in the hall of Dinas Emrys, in the heart of what's left of our country. The $!{King} of Gwynedd, the Pendragon, the High $!{King}.\" $!{She} looks around the room, to the invited guests. \"${Aeron} of Dyfed—you knew ${him} well. Do you have aught to say of ${Uther}?\"\n\n$!{King} ${Aeron} rises from ${his} seat. You haven't seen ${him} since the circle of stones, since ${he} refused to give ${his} oath to you. \"$!{Uther} was a ${man},\" ${he} says quietly. \"I called ${him} prideful and arrogant when last I spoke, and I stand by that. Yet ${he} was also a brave ${man}, a strong one, who'd take ${his} burdens squarely on ${his} shoulders. I wished ${him} no ill.\"\n\n\"$!{King} ${Cadell}?\"\n\n${Cadell} of Powys stands. \"God will judge ${Uther},\" ${he} says. \"For my part, I will miss ${his} laughter and ${his} boasting. \n*if chapter6_cadells_men\n\tI promised my ${men} to ${Uther}'s cause, and I repeat that promise; they will fight for Gwynedd and undo this insult. Powys stands with you.\"\n*if chapter6_cadells_men=false\n\t$!{His} kin have my sympathy and my prayers.\"\n\t\n\t\"We'd rather have your swords,\" mutters someone behind you too loudly. Powys's troops could have been yours, if only you'd managed to convince ${Cadell}.\n\t\n\"$!{King} ${Lot},\" says ${Vivian}.\n\n${Lot} remains seated, cup in hand. \"${Uther} was a friend,\" ${he} says, gesturing expansively. \"And ${he} was a fool, stubborn, thick-headed, and unable to give up power. I told ${him} this to ${his} face. We have had no true Pendragon, not since ${Ambrosius}. But I liked ${Uther}. \n*if chapter7_lots_men\n\tMy ${men} stand with Gwynedd in hunting down this ${insult_bastard} ${Cynric}.\"\n*if chapter7_lots_men=false\n\tThough I'd very much like to know what Gwynedd will do now.\"\n\t\n${Vivian} turns to you. \"${Arthur}—you were ${his} Warleader. What have you to say of ${Uther}?\"\n*choice\n\t#\"${Uther} was a great $!{King}. $!{He} cared deeply for ${his} people and did all ${he} could to keep them in safety, and to hold off the invaders.\"\n\t\t*set diplomat %+15\n\t\t*set warrior %-15\n\t\t*set rel_bedwyr %+15\n\t\t${Bedwyr} can't hide ${his} surprise at your words. You hear a ripple of approval through the room; save for ${Lot}, who regards you with an amused, cynical smile.\n\n\t\t*goto part1_morgan\n\t\t\n\t#\"${Uther} was a weak ${man}. $!{He} placed ${his} own status and ${his} own pride above the safety of ${his} kingdom. $!{His} stubbornness has put us in a perilous situation.\"\n\t\t*set diplomat %-15\n\t\t*set warrior %+15\n\t\t*set compassion %-20\n\t\t*set rel_bedwyr %-20\n\t\t${Bedwyr}'s face is a dark cloud. There's a surly muttering through the room, save for one or two who you catch nodding in support. ${Aeron} regards you thoughtfully. ${Lot} has an amused smile.\n\n\t\t*goto part1_morgan\n\t\t\n\t#\"${Uther}, for all ${his} faults and flaws, was a brave ${man}, and wanted the best for ${his} people. But ${he} always lived in ${his} ${brother} ${Ambrosius}'s shadow; ${he} was always jealous of the love that people gave to ${Ambrosius}, and that tainted ${his} choices.\"\n\t\t*set leader %+15\n\t\t*set diplomat %-15\n\t\t*set bravado %+15\n\t\t\"Well said.\" ${Aeron} regards you thoughtfully. \n\t\t*goto part1_morgan\n\t\t\n*comment --------------------------------------------------------------\t\n*label part1_morgan\n\n*gosub_scene startup get_lover\n*temp other_present\n*set other_present false\n\nOther speeches follow—simple messages of friendship, acknowledgment of debt, or simply the bearing of witness. In the middle of all of this, ${Morgan} takes your arm. \"Come outside?\n*if (chapter2_pregnant or chapter2_morgan_pregnant)\n\t*if (lover=\"gawain\")\n\t\tAnd you, ${Gawain}.\"\n\t\t*set other_present true\n\t\t*goto part1_morgan_1\n\t*elseif (lover=\"emrys\")\n\t\tAnd you, ${Emrys}.\"\n\t\t*set other_present true\n\t\t*goto part1_morgan_1\nIt won't be for long.\"\n\t\n*label part1_morgan_1\n\n$!{She} leads you out of the back of the hall into the cold of day. When you've reached one of the new storage huts, thrown up since ${Cynric}'s raid, ${she} lets go of your arm and paces.\n*if other_present\n\t*if lover=\"gawain\"\n\t\t${Gawain} folds ${his} arms and looks troubled.\n\t*if lover=\"emrys\"\n\t\t${Emrys} smiles slightly, as if ${he}'s been expecting this.\n\t\t\nYou clear your throat. \"What is it?\"\n\n*if lover_morgan\n\t$!{She} doesn't look at you. \n*if lover_morgan=false\t\n\t$!{She} lets out a pent-up breath.\n\"There's something I've been meaning to tell you. I have to leave.\"\n\t\n\"What do you mean?\"\n\t\n\"My ${mother}'s tolerated me being here, in ${Uther}'s court, for long enough. Now ${he}'s dead…well, I've studies to return to, decisions to make. I have to go back to the Isle, and I don't know when I'll be back. It'll be a while. A long while.\"\n\t\n*if (chapter2_pregnant or chapter2_morgan_pregnant)\n\t*comment Very different conversation…\n\t*goto part1_morgan_pregnant\n\n*choice\n\t*if (lover_morgan=false) #\"Please don't go, ${Morgan}.\"\n\t\t\"I can't stay, ${Arthur}. It's not just because my ${mother} tells me to go; there are things I must do if I'm to become a ${priestess}. And I need to. Everything's falling apart. I can't just watch. I'm not doing this for ${her_him}.\"\n\t\t*goto part1_morgan_2\n\t\t\n\t*if (lover_morgan) #\"Please don't go—I love you.\"\n\t\t\"I know, [i]cariad[/i], I'm the same. But I can't stay. It's not just because my ${mother} tells me to go; there are things I must do if I'm to become a ${priestess}. And I need to. Everything's falling apart. I can't just watch. I'm not doing this for ${her_him}.\"  \n\t\t*goto part1_morgan_2\n\t\t\n\t#\"I understand. You should go. It won't be forever.\"\n\t\t*if (lover_morgan)\n\t\t\t\"I do love you. And aye, it won't be forever. But things might be…different.\" $!{She} sighs. \"I'm sorry. Everything's falling apart. It might be that neither of us are here in two months, let alone five years. But I can't wait any longer.\" \n\t\t\t*goto part1_morgan_2\n\t\t*else\n\t\t\t\"Thank you for understanding. I don't do this lightly. But I can't stand by and watch things unravel; there are things I can do as a ${priestess} that I can't do otherwise.\" \n\t\t\t*goto part1_morgan_2\n\t\t\t\n\t#\"I'm not sure there's a place for me here either. Perhaps I should come with you.\"\n\t\t$!{She} laughs; it's a strange moment of brightness amongst the somber mood. \"Aye. Perhaps you might, if they took ${men} as ${priestesses}. But no, Art; we've both roles to play in this fight, and yours is here. We'll meet again, though. \n\t\t*if (lover_morgan)\n\t\t\tI love you ${Arthur}. That won't change.\" \n\t\t\t*goto part1_morgan_2\n\t\t*else\n\t\t\tI can promise you that, ${Arthur}.\" \n*label part1_morgan_2\n$!{She} sighs. \"It sounds so final, doesn't it? You never know—perhaps we'll clear the Saxons from the shore. It's to be hoped. But right now it feels like we're a guttering candle, and the dark is closing in. We should get back.\"\n\n*goto part1_emrys\n\t\t\t\n*comment --------------------------------------------------------------\n*label part1_morgan_pregnant\n\n*choice\n\t*if (chapter2_pregnant) #\"There's the child to think of.\"\n\t\t\"I know. I know, I'm not running. We've not had time. \n\t\t*goto part1_morgan_child_choice\n\t\t\n\t*if (chapter2_morgan_pregnant) #\"There's the child to think of.\"\n\t\t\"I know that. Although on the Isle…well, it's a safe place for a birth. But we've not had time, I know. \n\t\t*goto part1_morgan_child_choice\n\t\t\t\n\t*if (lover_morgan=false) #\"Please don't go, ${Morgan}.\"\n\t\t\"I can't stay, ${Arthur}. It's not just because my ${mother} tells me to go; there are things I must do if I'm to become a ${priestess}. And I need to. Everything's falling apart. I can't just watch. I'm not doing this for ${her_him}.\" $!{She} sighs. \"And then there's the babe. \n\t\t*goto part1_morgan_child_choice\n\t\t\n\t*if (lover_morgan) #\"Please don't go—I love you.\"\n\t\t\"I know, [i]cariad[/i], I'm the same. But I can't stay. It's not just because my ${mother} tells me to go; there are things I must do if I'm to become a ${priestess}. And I need to. Everything's falling apart. I can't just watch. I'm not doing this for ${her_him}.\" $!{She} sighs. \"And then there's the babe. \n\t\t*goto part1_morgan_child_choice\n\t\t\n\t#\"I understand. You should go. It won't be forever.\"\n\t\t*if (lover_morgan)\n\t\t\t\"I do love you. And aye, it won't be forever. But things might be…different.\" $!{She} sighs. \"I'm sorry. Everything's falling apart. It might be that neither of us are here in two months, let alone five years. But I can't wait any longer. And then there's the babe. \n\t\t\t*goto part1_morgan_child_choice\n\t\t*else\n\t\t\t\"Thank you for understanding. I don't do this lightly. But I can't stand by and watch things unravel; there are things I can do as a ${priestess} that I can't do otherwise.\" $!{She} sighs. \"Now there's the babe. \n\t\t\t*goto part1_morgan_child_choice\n\t\t\n\n*comment --------------------------------------------------------------\n*label part1_morgan_child_choice\n*if other_present\n\tThe three of us should talk about the future.\n\t*if chapter2_pregnant\n\t\tUnless I miss my guess, you'd both be happiest if I weren't here in any case, after the child comes; it'd just complicate things. Once born, well, it could come to live with me, if that's what you think best. Or stay here with you.\n\t\t*goto part1_morgan_child_choice_1\n\t*else\n\t\tThe child will be born on the Isle. After that…well, it could stay with me, if that's what you think best. Or come to live with you.\n\t\t*goto part1_morgan_child_choice_1\n*else\n\tAnd I've left it too late; there's barely time to say anything. \n\t*if lover_morgan\n\t\tI love you, my ${Arthur}. \n\t\t*if chapter2_pregnant\n\t\t\tI'd hoped to be here, with you, to see our child born.\n\t\t*if chapter2_morgan_pregnant\n\t\t\tI'd hoped to stay here with you until our child was born.\n\t\tBut I can't do that. And as to whether I can come back for any length of time beyond— I truly don't know. So here's a thing I need to ask; is it your will, once the child comes, that it lives here, or lives on the Isle with me?\n\t\t*goto part1_morgan_child_choice_1\n\t*else\n\t\tWe're friends, ${Arthur}, but I've no intention of settling down with you. I'm sorry for it, but we both have lives to live. So I need to ask: is it your will, once the child comes, that it lives here, or lives on the Isle with me?\n\t\t*goto part1_morgan_child_choice_1\n\n*comment --------------------------------------------------------------\n*label part1_morgan_child_choice_1\nOn the Isle they will be safe, and brought up honoring the Old Faith. With you…their future is less certain, Gwynedd being what it now is. I know it is a difficult thing. I know how much you suffered because of your ${mother}'s absence, and how your own ${father} turned against you. I know how much you suffered because people saw you as the result of your ${father}'s infidelity. But you and I can never wed, ${Arthur}, and never be together for long. So let us think what is best.\"\n\n*choice\n\t#\"The child should stay with me.\"\n\t\t*set chapter10_child_dest \"arthur\"\n\t\t${Morgan} nods. \"Very well. \n\t\t*goto part1_morgan_child_choice_2\n\t\t\n\t#\"The child would be safer on the Isle.\"\n\t\t*set chapter10_child_dest \"morgan\"\n\t\t${Morgan} nods. \"Very well. \n\t\t*goto part1_morgan_child_choice_2\n\t\t\n\t#\"It seems to me that it would be best for the child to know both its parents, and to learn from both. So perhaps it would be best to spend half a year on the Isle, and half with me.\"\n\t\t*set chapter10_child_dest \"both\"\n\t\t${Morgan} raises an eyebrow. \"It will be difficult, I think, and perhaps hold risks. But aye, fair enough, we will do what we can to manage that.\n\t\t*goto part1_morgan_child_choice_2\n\t\t\n\t*if (lover=\"gawain\") #\"${Gawain}? What do you think?\"\n\t\t*set rel_gawain %+15\n\t\t*if gender=\"female\"\n\t\t\t*set chapter10_child_dest \"arthur\"\n\t\t\t\"The child should be with its mother, ${Arthur}. With us.\"\n\t\t\t\n\t\t\t\"Very well,\" says ${Morgan}. \"We're agreed. \n\t\t\t*goto part1_morgan_child_choice_2\n\t\t*else\n\t\t\t*set chapter10_child_dest \"morgan\"\n\t\t\t\"The child should be with its mother, ${Arthur}. With ${Morgan}.\"\n\t\t\t\n\t\t\t\"Very well,\" says ${Morgan}. \"We're agreed, then. \n\t\t\t*goto part1_morgan_child_choice_2\n\t\t\n\t*if (lover=\"emrys\")\t#\"${Emrys}? What do you think?\"\n\t\t*set rel_emrys %+15\n\t\t*set chapter10_child_dest \"morgan\"\n\t\t\"The Isle is the safest place, for the time being,\" says ${Emrys}. \"In later years, who can tell?\"\n\t\t\n\t\t\"Very well,\" says ${Morgan}. \"We're agreed, then. \n\t\t*goto part1_morgan_child_choice_2\n\t\t\n*label part1_morgan_child_choice_2\n*if chapter10_child_dest=\"arthur\"\n\t*if (chapter2_morgan_pregnant)\n\t\tOnce the child is beyond nursing age, ${he}'ll be sent here. If there's still a here to be sent to.\"\n\t\t*goto part1_morgan_child_choice_3\n\t*else\n\t\t$!{He}'ll stay here with you. And one day ${he}'ll know ${his} ${mother}, I swear.\"\n\t\t*goto part1_morgan_child_choice_3\n*elseif chapter10_child_dest=\"morgan\"\n\t*if (chapter2_morgan_pregnant)\n\t\t${He}'ll stay on the Isle with me. And one day, when ${he}'s old enough, you'll meet ${him}—I swear.\"\n\t\t*goto part1_morgan_child_choice_3\n\t*else\n\t\tOnce the child is beyond nursing age, you send ${him} to me.\"\n\t\t*goto part1_morgan_child_choice_3\n*else\n\tOnce the child is beyond nursing age, we will find a safe means for ${him} to travel between us.\"\n*label part1_morgan_child_choice_3\n$!{She} grimaces. \"It sounds so final, doesn't it? You never know—perhaps we'll clear the Saxons from the shore. It's to be hoped. But right now it feels like we're a guttering candle, and the dark is closing in. We should get back.\"\n\n*if lover=\"gawain\"\n\t\"A moment,\" says ${Gawain}. \"I need to talk to ${Arthur} myself, if you'll leave us to it.\"\n\t\n\t\"Of course,\" says ${Morgan}. $!{She} hesitates a moment, then gives you a swift hug, and walks away.\n\t*goto part1_gawain_pregnancy\n\t\n*if lover=\"emrys\"\n\t\"A moment,\" says ${Emrys}. \"I need to talk to ${Arthur} myself. Would you mind?\"\n\t\n\t\"Of course,\" says ${Morgan}. $!{She} hesitates a moment, then gives you a swift hug, and walks away.\n\t*goto part1_emrys_pregnancy\n\t\n*goto part1_emrys\n\n*comment --------------------------------------------------------------\t\n*label part1_emrys_pregnancy\n\n\"The three of us,\" says ${Emrys}. \"Now that's a peculiar thing. Why do you think ${she} said that?\" $!{He} frowns, deep in thought. \"Shall I tell you what I think? I think ${Morgan}'s seen the looks between you and I, and assumed something has happened which hasn't. Should we tell ${her_him} ${she}'s wrong, do you think?\"\n\n*choice\n\t#\"$!{She}'s not wrong. Or wouldn't be, if we'd had a moment to stop.\"\n\t\t*set lover_emrys true\n\t\t$!{His} eyebrow raises. \"Really? Well, perhaps one day we should find that time. Alas, I doubt it'll be this day. \n\t\t*goto part1_emrys_pregnancy_1\n\t\t\n\t#\"$!{She} is wrong. I like you well enough, ${Emrys}, but that's as far as it goes.\"\n\t\t$!{He} frowns faintly, seeming more puzzled than offended. \"Really? Ah well, I was never the best at reading a person's face. My apologies if I've made you uncomfortable. \n\t\t*goto part1_emrys_pregnancy_1\n\t\t\n\t#\"Now is really not the time for this.\"\n\t\t$!{He} purses ${his} lips. \"Perhaps so. In my experience people always leave things later than they should; they trick themselves into thinking they live for ever. But you are probably right—${Uther}'s wake is not the place. \n\t\t*goto part1_emrys_pregnancy_1\n\n*label part1_emrys_pregnancy_1\nIn any case, that's not what I wished to talk to you about. No, I merely wished to say that\n*if chapter10_child_dest=\"arthur\"\n\tI'll aid you to bring up the child in any way which I can.\"\n*if ( (chapter10_child_dest=\"morgan\") or (chapter10_child_dest=\"both\") )\n\t*if (chapter2_pregnant)\n\t\tI'll be by your side when the child is born; have no fear. I have overseen childbirth before, and the whole thing is considerably more simple than some would make it.\"\n\t*if (chapter2_morgan_pregnant)\n\t\tI think you've made the right decision for the child; but I will keep an eye on ${him}. I have certain…access to the Isle that other ${men} may not. I'll look after ${him}.\"\n\n\"Thank you.\"\n\n*goto part1_emrys\n\n*comment --------------------------------------------------------------\t\n*label part1_gawain_pregnancy\n\n\"Well, ${Arthur},\" says ${Gawain}. \"I've no notion what to say, not truly. I knew you and ${she} were close, once, many years ago. And that you've always been friends. But that was a long time past. And…well. I've been thinking of this, since I found out about the child. And what I want to feel is pleased, I suppose; we could never have a babe, and the thought that there will be one, and it's from both you and ${Morgan}—${Morgan} who's fierce and kind and quick and the best of companions. I should be pleased for you, for all of us. And yet…and yet…\"\n\n$!{He} looks away, fighting for words, lip twisting, eyes hot with tears. \"And yet I'm damned if I don't burn with jealousy. I don't want that. I shouldn't feel that. I don't mean it. And I'll swallow it, I'll bury it. But there it is.\"\n\n*choice\n\t#\"${Gawain}—we don't know if we'll live a month, let alone long enough to see the birth. Forget the past, don't guess at the future. Here and now, we're together, and that's all that matters.\"\n\t\t$!{He} lets out a long, slow sigh and closes ${his} eyes. \"I know. I do know. In my head I know, it's the heart that's the problem. Pay it no mind, I just need to get used to the idea. And I'll be there—\" $!{He} breaks off with a rueful smile. \"But there's me on about the future again. We should deal with the present.\" $!{He} kisses you on the brow. \"Come on. There's a hall of folk waiting for you.\"\n\t\t\n\t\t*goto part1_emrys\n\t\t\n\t#\"The last thing, the very last thing that I need now is to start worrying about if I've upset you. There's too much else to deal with.\"\n\t\t*set rel_gawain %-20\n\t\t\n\t\t$!{His} expression darkens. \"Aye,\" ${he} mutters. \"Aye, I'm sorry—I know there's a great deal on your mind. Don't worry ${Arthur}, I won't cause you problems. As you say, there's bigger things to think of.\" $!{He} knuckles tears from ${his} eyes. \"Come on. We should get back.\"\n\t\t\n\t\t*goto part1_emrys\n\t\t\n\t#\"I understand. In your place I'd feel the same. You've no cause for jealousy; you know that. I'm with you; the child will be as much part of my life as yours, if you wish it.\"\n\t\t*set rel_gawain %+20\n\t\t\n\t\tYou see a smile dawn through the tears. \"Aye! I do wish it. I'll be there for you, and for the babe, whatever happens.\" $!{He} releases a breath, and straightens up. \"And I'll teach them to fight properly, too, not like you and your lackwit of a foster-${brother}. All will be well.\" $!{He} grabs you into a sudden bear-hug. \"All will be well.\"\n\t\t\n\t\t$!{He} smells of woodsmoke and fur, and ${his} arms feel fit to break you, your ribs creaking in protest. \"${Gawain}! I'd like to survive the day?\"\n\t\t\n\t\t\"Aye! Aye. Sorry. Well, then. We should get back.\"\n\t\n\t\t*goto part1_emrys\n\n*comment --------------------------------------------------------------\t\n*label part1_emrys\n\n*if (chapter10_wants_crown)\t\n\tYou make your way back to the hall, and the repairing of a broken kingdom. \n\t*goto part1_kidnap\n\t\n*if other_present\n\t*if (lover=\"emrys\")\n\t\t\"There's another thing,\" says ${Emrys} quietly. \"It's about ${Bedwyr}.\"\n\t\t\n\t*if (lover=\"gawain\")\n\t\tA figure appears, walking towards you from the hall. ${Emrys}. \"I'm sorry to bother you both,\" ${he} says. \"Can I have a moment of ${Arthur}'s time? I have an idea about ${Bedwyr}.\"\n\t\t\n\t\t\"Aye, course,\" says ${Gawain}. \"I'll leave you to it.\"\n\t\t\n*if other_present=false\n\tA figure appears, walking towards you from the hall. ${Emrys}. \"I'm sorry to bother you both,\" ${he} says. \"Can I have a moment of ${Arthur}'s time? I have an idea about ${Bedwyr}.\"\n\t\n\t\"Of course,\" says ${Morgan}, surprised. \"I'll leave you to it.\" $!{She} gives you a swift hug, and walks away.\n\t\n\"${Bedwyr}?\"\n\n\"Yes,\" says ${Emrys}. \"You're not wholly set on this idea of being $!{King}, but it seems likely. I was wondering about offering another option.\"\n\n\"What do you mean? $!{He}'s maimed. I don't think even your skills go as far as to healing a severed limb.\"\n\n\"No, no, of course not. But even so, I might have a solution, something that could allow ${Bedwyr} to have a chance at the throne, if you'll let me try?\"\n\n\"A solution?\"\n\n\"Indeed. Legends speak of a ${king} of one of our tribes who bore a hand made of silver. It was enough for ${his} people, and it is a story that most folk know. It might well suffice; oh, something I construct will never function as a real hand would, but this is more about changing people's perception of ${Bedwyr} from a cripple into someone who echoes an old legend.\" $!{He} smiles, eyes sparkling, clearly pleased with ${himself}. \"I thought it might serve as a gift from us.\"\n\n*choice\n\t#\"If you can make such a thing, then I think it's a worthy cause.\"\n\t\t*set compassion %+20\n\t\t*set chapter10_fake_hand true\n\t\t\n\t\t\"Very well.\" $!{He} smiles, eyes distant, obviously already caught up in ${his} scheme.\n\t\t\n\t\t*goto part1_emrys_bg\n\t\t\n\t#\"No. $!{He}'s maimed, and pretence won't fix that.\"\n\t\t*set compassion %-20\n\t\t\"As you wish. Then we should return to the hall, and find out what fate awaits you.\"\n\t\t\n\t\t*goto part1_emrys_bg\n\t\t\n\t#\"I'd back you in making it, but it shouldn't be my decision. Ask ${Bedwyr}.\"\n\t\t*set diplomat %+15\n\t\t*set warrior %-15\n\t\t*set chapter10_fake_hand true\n\t\t*set chapter10_fake_hand_asked true\n\t\t\n\t\t\"That's a fair answer. I'll talk to ${Bedwyr}.\"\n\t\t\n\t\t*goto part1_emrys_bg\n\t\t\n*comment --------------------------------------------------------------\n*label part1_emrys_bg\n\n\"${Emrys}…back on the island…when you said you'd been offered the choice before. What did you mean?\"\n\n$!{He} smiles. \"I'm a little older than you, you know. Not much, but enough. Enough that when my ${father} died, ${he} wanted to pass the Torc of the Pendragon to ${his} bastard ${son}—to me—not to ${Uther}.\"\n\n\"$!{Ambrosius} tried to make you $!{King}? What happened?\"\n\n\"I turned ${him} down. It wasn't for me, ${Arthur}. Oh, the country suffered, somewhat, under ${Uther}. But I'd have been a terrible $!{King}. I couldn't pay it the attention it deserved. Couldn't care enough, I suppose. ${Bedwyr} cares.\n*if compassion>50\n\tYou care.\n*if compassion\u003c=50\n\tPerhaps you don't, quite so much.\nFor myself, I'd have been looking at numbers on paper, not people. Is that so terrible of me?\" $!{He} smiles. \"We should get back.\"\n\n*goto part1_kidnap\n\t\t\n*comment --------------------------------------------------------------\n*label part1_kidnap\n*page_break\n\nThe festivities for ${Uther}'s wake continue late into the night.\n\nIt's not until early next morning, when you're abruptly shaken awake by ${Gawain}, that you realize something is wrong.\n\n\"${Cai},\" ${he} says, voice grim. \"Did you see ${him} at all yesterday, after you spoke for ${Uther}?\"\n\nYou massage throbbing temples. \"No.\" You'd assumed ${he} was with a ${girl} somewhere. \"What's happened?\"\n\n\"A herder found this.\" $!{He} holds up a scabbarded blade; ${Cai}'s. \"Outside, by the stockade.\"\n\n\"$!{He} probably dropped it when ${he} was drunk.\"\n\n\"There's blood on the hilt, ${Arthur}. No one's seen ${him}.\"\n*page_break\nYou struggle from bed, and start searching Dinas Emrys. ${Gawain}'s right—no one's seen your foster-${brother} since yesterday. The last, it seems, is $!{King} ${Aeron}'s cup-bearer. \"I did see ${him}, well after midnight,\" said the ${boy}. \"By the stables. $!{He} was talking to some ${men}; maybe half a dozen? They were looking at the ponies; ${he} was drinking. $!{He} asked me to fetch more ale; but when I went back, there was no one.\"\n\n\"These ${men}—would you recognize them?\"\n\n\"Aye, maybe,\" says the ${boy}. \"They had a badge on their gear: a pig, I think it was.\"\n\n\"A golden boar?\" demands ${Gawain}.\n\nThe ${boy} swallows, then nods quickly. \"It could be.\"\n\n\"Dumnonia,\" says ${Gawain} with certainty. \"$!{King} ${Geraint}'s ${men}. $!{He}'s no friend to Gwynedd or to ${Uther}—didn't even trouble to come ${himself} to the wake, just sent ${his} ${men}. But why would ${he} take ${Cai}?\" $!{He} spends a moment in thought, and then looks up at you. \"It's not been many hours, and they'll have been crossing land they don't know. And ${Cai}'s a terrible horse${man}. It's days to Dumnonia. We can catch them, ${Arthur}, if we leave now.\"\n\n\"We should gather a force—\"\n\n\"Teats of the Mother, ${Arthur}, are you listening? We can't waste time, and this whole fort has a hangover. ${Morgan}'s gone. \n*if chapter9_emrys_wounded\n\t${Emrys} is wounded, ${he}'s in no state to travel.\n*if chapter9_emrys_wounded=false\n\tWho knows where ${Emrys} is?\nI'm going, right now, and so are you, even if I need to nail you to a saddle. Come on!\"\n\n*comment --------------------------------------------------------------\n*comment                   Part 2: Geraint's Court\n*comment --------------------------------------------------------------\n*label part2\n*page_break\n\n*temp drugged\n*set drugged false\n\nTwo days later, exhausted as the stumble-footed ponies beneath you, you ride into a patrol of ${men} from the court of $!{King} ${Geraint} of Dumnonia. Whatever half-hearted plans you've been making fall by the wayside swiftly; they outnumber you considerably. They are courteous, but insist that you be taken before their ${lord} to declare your purpose in ${his} land.\n\n${Geraint}'s fortress is like Dinas Emrys, save that ${his} hall is a great round low-roofed hut, like to those of the [i]bwca[/i] in the North but much bigger. You find the $!{King} at supper with ${his} guest—${Cai}.\n\n\"Ah, ${Cai}, my ${brother},\" says ${Cai} with a mix of relief and trepidation on ${his} face. \"I'm glad you found me.\"\n\n${Gawain} stares at ${him} as if ${he}'s gone mad.\n\n\"So this is ${Cai} ${ap} ${Ector},\" says ${Geraint}, rising to greet you. $!{He}'s a young ${man}, flaxen-haired and pale, and ${his} hand when ${he} grasps yours is limp and cold. \"I have heard much of you from my ${lord} ${Arthur}. Please, sit and eat, and all can be explained.\"\n\n\"But ${he}'s not—\" begins ${Gawain}, confused.\n\n*choice\n\t#\"I'm afraid you're mistaken, $!{King} ${Geraint}. I am ${Arthur} ${ap} ${Uther}. It seems you wanted to speak to me. May I ask why? Perhaps we can come to some agreement?\"\n\t\t*set diplomat %+15\n\t\t*set warrior %-15\n\t\t*goto part2_diplomacy\n\n\t#\"You've been misled, $!{King} ${Geraint}. I am ${Arthur} ${ap} ${Uther}, and you kidnapped my ${brother}. Would you care to explain?\" I draw my sword.\n\t\t*set bravado %+15\n\t\t*goto part2_violence\n\n\t#I tread on ${Gawain}'s foot. \"No, ${Gawain}, I'm definitely hungry. I'll gladly break bread with ${Arthur} and $!{King} ${Geraint}.\"\n\t\t*set bravado %-20\n\t\t*goto part2_act\n\n*comment --------------------------------------------------------------\n*label part2_diplomacy\n${Geraint}, confusion on ${his} face, looks back and forth between you and ${Cai}. \n\n\"It's true,\" admits ${Cai}. \"I don't know how your ${men} confused us, but I'm ${Cai} ${ap} ${Ector}. It seemed rude to correct you.\"\n\n\"Now tell me—why are we here?\" you ask ${Geraint}. \"You were never a friend to ${Uther}, but taking me prisoner on the day of ${his} funeral seems un-neighbourly indeed.\"\n\n\"I…\" ${he} rubs at ${his} chin. \"This is…well, you have the advantage of me.\" $!{He} looks you up and down. \"You're not what I expected, I'll grant you that. You are here because I have an…an ally who'll be pleased to meet you.\"\n\n\"$!{He} wanted to sell me—well, you—to the Saxons,\" says ${Cai} helpfully.\n\n${Gawain} growls; you feel ${him} tense beside you.\n\t\n*if (acclaim>50)\n\t*set drugged true\n\t\"Y-yes,\" ${Geraint} falters. \"But I wished to speak with you beforehand. I am caught between hammer-and-anvil here, $!{Lord} ${Arthur}—they sent an envoy to me. I thought that perhaps you might have a better offer to make, one that might better ensure the safety of my kingdom.\"\n\t\n\t\"$!{He} wants gold,\" says ${Cai}. \"We'd come to a pretty good deal, I think. Although I don't actually know if Gwynedd has [i]got[/i] any gold. And I've got no idea if you can get at it. Are you $!{King} yet, by the way?\"\n\t\n\t${Geraint} turns to ${Cai}. \"So everything you told me was a lie?\"\n\t\n\t\"Well, you did kidnap me, after all. It's not the most helpful negotiating tactic.\"\n\t\n\t\"I'm sorry, my ${lord},\" says ${Geraint}, turning to you. \"It seems I have badly miscalculated. Please, sit, and we can talk, and I will try to make amends for my insult.\"\n\n\t\"I can vouch for the wine,\" says ${Cai}, raising ${his} cup. \"The food—well, it [i]is[/i] Briton.\"\n\t*page_break\n\t$!{King} ${Geraint} calls for more food and drink, and you set to with a will—your belly is rumbling after two days on the road and the meat and wine is good.\n\t*if chapter2_pregnant\n\t\t\"Careful, $!{brother},\" says ${Cai} with a wicked grin, eyeing your waistline. \"Eat like that and shoon enough you won't fit in your armor. If you…uh…you…euuh…\"\n\t*if chapter2_pregnant=false\n\t\t\"Careful, $!{brother},\" says ${Cai}. \"You don't want to…euuh…\"\n\t\t\n\tYou look up at ${him}, startled. $!{He}'s swaying in ${his} seat, eyes, unfocused. $!{He}'s sweating. \"Think I mizht have had a bhit too musch…\"\n\t\n\tAnd then you realize that the room is blurring in front of you, and your tongue is thick in your mouth.\n\t\n\t\"Poison!\" rumbles ${Gawain}.\n\t\n\tThe knife slips from your numbed fingers on to the floor.\n\t*goto part2_wake\n*else\n\tThe ${men} in the corner of the room draw their swords.\n\t\n\t\"Please!\" says ${Geraint}. \"There's no need for that. Sit, ${Arthur}, and eat. You look famished.\"\n\t\n\t\"What of the Saxons?\"\n\t\n\t\"It's simply a matter of importance. Who is most important to the safety of my people? Gwynedd's day is done, as is an alliance of the Briton tribes. It is all about who can ensure a prosperous future for their nation. ${Cerdic} is simply stronger than you.\"\n\t\n\t\"${Arthur}?\" ${Gawain} looks at you.\n\t*goto part2_saxons\n\n*comment --------------------------------------------------------------\n*label part2_violence\nImmediately the ${men} in the corner of the room draw their swords. \n\n\"There is no need for violence!\" says ${Geraint} hastily. \"I can explain—\"\n\n\"$!{He} was planning to sell me—well, you—to the Saxons,\" says ${Cai} helpfully.\n\n${Gawain} growls; you feel ${him} tense. $!{He} looks at you, hand on ${his} sword. \"${Arthur}?\"\n\n*goto part2_saxons\n\n*comment --------------------------------------------------------------\n*label part2_act\n*set drugged true\n*set chapter10_pretend_cai true\n\n${Geraint} calls for more food and drink.\n\n\"So, ${brother} ${Cai},\" says ${Cai} as you sit down. \"Good $!{King} ${Geraint} here was telling me ${his} proposal. $!{He} wishes to make a bargain; the Saxons have asked for my head on a platter, and the $!{King} wonders if we can make a better offer.\"\n\n\"An offer of what?\" You set to the meal with a will—your stomach is rumbling after your journey, and the meat and wine is good.\n\n\"My kingdom lies exposed to the Saxons,\" says ${Geraint}, toying with ${his} cup. \"I have two choices: fortify my lands, arm ${men}, and fight—or strike a deal with the Saxons and grant them safe passage. And, under ${Uther}'s rule, it seems to me that the alliance of the Briton tribes is now dissolved. If those bonds were strong, then perhaps, but they are not.\"\n\n\"Then what is it you want?\"\n\n\"Oh, gold and ${men}!\" says ${Cai} expansively, waving ${his} goblet. \"What doesh every kingdom want?\" Is ${he} drunk?\n\n\"A shrewd insight, my ${lord} ${Arthur},\" says ${Geraint}.\n\n\"I c'n see yerr shituashon,\" says ${Cai}. \"Ass zhe warr-leder 'f…\" $!{He} breaks off, blinking owlishly at ${his} wine. \"Zhere's sumpff…\"\n\t\nAnd then you realize that the room is blurring in front of you, and your tongue is thick in your mouth.\n\t\n\"Poison!\" rumbles ${Gawain}.\n\t\nThe knife slips from your numbed fingers on to the floor.\n\n*goto part2_wake\n\n*comment --------------------------------------------------------------\n*label part2_wake\n*page_break\n\n*set tied_up true\n\nYour waking is a shock, as someone throws water across your face. You splutter, cough, and struggle, realizing quickly that you're still in ${Geraint}'s hall, but that you're tied to a chair.\n\nYour head pounds and your stomach churns.\n\nThe Saxon in front of you reaches out and cups your chin in ${his} hand, turning your head, examining you. $!{He}'s big, ${his} square face seamed, ${his} braids \n*if gender=\"male\"\n\tand beard \nshot with silver streaks amongst flame red. There are sword-cuts on ${his} cheeks, and the hand that grips you is powerful.\n\n$!{He} sees that you're awake, and gives a deep-throated chuckle. Words follow, amused, sneering words barked in the Saxon tongue; they mean nothing to you, but other voices around the room laugh along with the speaker.\n\nThe world comes into focus. There is ${Geraint}, with a handful of ${his} ${men}. But the other faces around the room are Saxon.\n\n\"It is as I promised, $!{Lord} $!{Cerdic},\" says ${Geraint}. \"Here is ${Arthur} of Gwynedd.\"\n*if chapter10_pretend_cai\n\t$!{He}'s pointing at ${Cai}.\n\nThis, then, is ${Cerdic} of Wessex. ${Cynric}'s ${father}.\n \n*goto part3\n\n*comment --------------------------------------------------------------\n*label part2_saxons\n\nThe door flies open. Two more of ${Geraint}'s ${men} are there, flanking a barrel-chested ${man} with long silver-red\n*if gender=\"male\"\n\tbeard and \nbraids. A spear is in ${his} hand; a shield at ${his} back. Behind ${him} you see more figures, long-haired and heavily armed.\n \n\"My $!{King}, this is—\" starts one of ${Geraint}'s guards, but the big ${man} raises a hand.\n\n\"I am ${Cerdic}, ${son} of Elesa, ${son} of Riga,\" says the newcomer, voice thick with accent. \"Put up your swords, or die by mine.\"\n\n${Cynric}'s ${father}.\n\n*choice\n\t#\"I'll die before the Saxons take me.\" I attack, knowing it means certain death.\n\t\t*set bravado %+15\n\t\t*achieve no_surrender\n\t\tYou leap at ${Cerdic}. You hear ${Gawain}'s battle cry from beside you, the clatter of blade on blade. ${Geraint}'s ${men} back away as ${Cerdic} batters your attack sideways with ${his} spear-haft. Behind ${him}, more Saxons press forward. Your sword slashes through the old ${man}'s armor and sinks deep between the ribs—a death-blow, you'd swear. But this old ${man} is strong. $!{His} riposte is the butt of ${his} spear to your calf, staggering you off-balance. A fist thunders into your face, knocking you sideways, and you fall.\n\n\t\tThen something hot enters your spine and punches through your lungs.\n\n\t\tThen—\n\t\t*goto_scene startup early_death_vision\n\t\t\n\t#\"Very well.\" I sheathe my sword.\n\t\t*set bravado %-20\n\t\t\"Wisdom,\" grunts the old warrior. \"It is rare amongst you Britons. Sit. Let us talk.\"\n\t\t*goto part3\n\t\t\n\t#\"It's me you want; let ${Cai} and ${Gawain} go and I'm yours without a fight.\"\n\t\t*set compassion %+15\n\t\t*set tied_up true\n\t\t\"No!\" says ${Cai}, hotly—you raise a hand to silence ${him}. \n\n\t\tThe old warrior looks closely at all three of you, then steps forward. Behind ${him}, Saxons move in to the hall.\n\n\t\t\"Those are fine words,\" says Cerdic. \"But all three of you are valuable to me, alive or dead. Put up your swords and live, for now.\"\n\n\t\t\"${Arthur},\" says ${Cai} in warning. $!{He}'s right. ${Geraint}'s ${men} at your back, Saxons to your front. You've no choice.\n\t\t\n\t\tThey take your weapons and tie you to three chairs.\n\t\t*goto part3\n\n*comment --------------------------------------------------------------\n*comment                   Part 3: Cerdic\n*comment --------------------------------------------------------------\n*label part3\n*page_break\n\n\"Sa, sa, this is well,\" says ${Cerdic}.\n\n\"Have I not delivered what I promised, ${lord}?\" says ${Geraint}.\n\n\"You have. This is good, a first step for us to be allies,\" says ${Cerdic}. \"There were ${men} behind us on the road; I think our other guest approaches.\"\n\n*if chapter10_pretend_cai\n\t$!{He} steps up to ${Cai}.\n*if chapter10_pretend_cai=false\n\t$!{He} steps up to you.\n\"${Arthur} of Gwynedd. So. \n*if acclaim\u003c40\n\tThey tell me the Britons won't follow you.\n\t*goto part3_line2\n*elseif (acclaim\u003c60)\n\tThey tell me you're making a name for yourself.\n\t*goto part3_line2\n*else\n\tThey tell me you're famed amongst your people.\n\t*goto part3_line2\n\t\n*label part3_line2\n*if ((diplomat>leader) and (diplomat>warrior))\n\tThat you are a talker, and no fighter.\n\t*goto part3_line3\n*elseif ((warrior>leader) and (warrior>diplomat))\n\tThat you are better at fighting than talking.\n\t*goto part3_line3\n*elseif ((leader>warrior) and (leader>diplomat))\n\tThat you are better at telling ${men} what to do than doing it yourself.\n\t*goto part3_line3\n*else\n\tThat you are neither leader of ${men}, nor a great warrior, nor a great talker.\n\t*goto part3_line3\n\t\n*label part3_line3\n*if allies>=5\n\tThat, even so, you've brought promises of alliance to Gwynedd.\n\t*goto part3_line4\n*elseif allies>=3\n\tThat you've made as many friends as enemies amongst the Briton ${king}s.\n\t*goto part3_line4\n*elseif allies>=2\n\tThat you've the support of only a few ragtag Briton ${king}s.\n\t*goto part3_line4\n*else\n\tThat Gwynedd is alone, friendless, and you've failed to do anything about it.\n\t*goto part3_line4\n\t\n*label part3_line4\n*if compassion\u003c=35\n\tA ruthless ${man},\n\t*goto part3_line5\n*elseif compassion>=65\n\tA soft-hearted ${man},\n\t*goto part3_line5\n*else\n\tA ${man} without the courage to make harsh choices,\n\t*goto part3_line5\n\n*label part3_line5\n*if bravado\u003c=35\n\ta weasel,\n\t*goto  part3_line6\n*elseif bravado>=65\n\ta rash fool,\n\t*goto  part3_line6\n*else\n\tindecisive,\n\t*goto part3_line6\n\n*label part3_line6\n*if old_faith>=60\n\ta slave to ${his} Old Gods.\"\n\t*goto part3_line7\n*elseif old_faith\u003c=40\n\twho's turned ${his} back on the gods of ${his} people.\"\n\t*goto part3_line7\n*else\n\ta ${man} who wavers in ${his} faith.\"\n\t*goto part3_line7\n\n*label part3_line7\n$!{He} shakes ${his} head. \"What should we do with such a ${man}? \n*if chapter5_duel and chapter8_cynric_duel\n\tYou've faced my ${son}, ${man} to ${man}, twice—and lived. That is no small thing.\"\n\t*goto part3_line_end\n*elseif chapter5_duel or chapter8_cynric_duel\n\tYou've faced my ${son}, ${man} to ${man}, and lived. So you are no craven, at the le
