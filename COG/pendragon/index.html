Very well,\" says ${Lot}.\n\t\t\n\t*goto part3_leave\n\t\n*comment --------------------------------------------------------------\n*label part3_leave\n\nYou have little choice but to pack your goods and set out back into the snow, and return to Gwynedd with nothing to show for your long journey but a new, and unwanted, name—Spitehearth. \n*if chapter7_malcolm_saved\n\t${Malcolm} travels with you for some of the way, then strikes out for ${his} own lands further down the West coast.\n*finish\n\t\n*comment --------------------------------------------------------------\n*comment                        Part 4: Investigation\n*comment --------------------------------------------------------------\n*label part4\n*temp question_got_results\n*set question_got_results false\n*temp Bledri\n*set Bledri \"Bledri\"\n*if gender=\"female\"\n\t*set Bledri \"Blodau\"\nIt's after you've broken your fast—${Gawain}, ${Emrys} and ${Morgan} have joined you in your chambers.\n*if lover_gawain\n\t${Gawain} seems troubled, and won't meet your eyes, but every so often you see a small smile on the corner of ${his} lips.\n*if lover_morgan\n\t${Morgan} catches your hand and squeeze it hard, once, as ${she} sits on the bed beside you.\n\n\"So where do we start?\" asks ${thief}. \"We've little time; the handfasting is this afternoon.\"\n\n${Gawain} spreads ${his} hands. \"Someone who wants to split the kingdoms apart. ${Cerdic}'s folk—the Saxons?\"\n\n${Morgan} bites ${her_his} lip. \"That's too obvious, I think. What of ${Agravaine}, simply trying to discredit ${Arthur}? I know ${he}'s your ${brother}, ${Gawain}, but everyone knows ${he}'d be desperate to be Warleader if ${he} had the chance.\"\n\n\"I think we're missing something,\" says ${Emrys}. \"What if it's nothing to do with ${Arthur} at all, but is an attempt to sow enough discord to put a halt to the marriage?\"\n\n\"Ill-thought out, then,\" says ${Cai}. \"And who'd want to do that?\"\n\n${Emrys} shrugs. \"${Morgause}? Does ${she} really want to lose ${her_his} ${son} to a foreign girl? ${Morgan}? ${Gawain}? You know ${her_him} better than I, but I've heard it said that ${she}'s a jealous ${mother}.\"\n\n\"Perhaps,\" says ${Morgan}, ignoring ${Gawain}'s shocked look. \"Perhaps so.\"\n\n*choice\n\t#\"I think we should concentrate our efforts on these Saxons, the ones who made the sword. That they're here at all is peculiar. I'll go and talk to them; perhaps you others could ask around and see what the people here have to say of them?\"\n\t\tYou find the Saxon leader in the main courtyard, where ${she}'s tending to ${her_his} horse. $!{She} nods a greeting as ${she} tugs a comb through the knotted mane. $!{Her_his} eyes are disconcertingly blue; and it's rare anyone towers over you save ${Gawain}. \n\t\t\t\n\t\t\"You are ${Arthur}, ${son} of the old High $!{King},\" ${she} says, the syllables slightly stilted on ${her_his} tongue. \"I am ${Marta}. You wish to speak to me?\"\n\t\t\n\t\t\"I do. I was surprised to find your folk here, and wondered if I could learn more.\"\n\t\t\n\t\t\"We trade with ${Lot} and ${his} people. We bring worked leather, salt fish, and crafted metal—weapons such as the one you have seen. In return, we take fleece, fresh fish, and peat from the mire.\"\n\t\t\n\t\t*if (diplomat>55)\n\t\t\t*set acclaim %+20\n\t\t\t\"And whom do you serve?\"\n\t\t\t\n\t\t\t$!{She} smiles, showing yellowed teeth. \"Serve? Why, we serve ourselves. I am head of our hall; we call no other ${master}. If your question is whether we serve ${Cerdic} the Black Wolf, no, ${he} is no friend to our folk.\"\n\t\t\t\n\t\t\t\"You know that the sword has been taken?\"\n\t\t\t\n\t\t\t$!{She} nods. \"I do. Some argument amongst your people, I think? One trying to make another lose face? It is not my business, but it is a shame for the young couple.\"\n\t\t\t\n\t\t\tYou sense no deception here; either ${she} is sincere, or ${she}'s a very good liar.\n\t\t\t*set question_got_results true\n\t\t\t*goto part4_end_saxons\n\t\t*else\n\t\t\t*set acclaim %-20\n\t\t\t\"And you you serve ${Cerdic}?\"\n\t\t\t\n\t\t\t$!{She} scowls. \"The Black Wolf? I will not speak of ${him}.\"\n\t\t\t\n\t\t\t\"But you know that the sword has been taken?\"\n\t\t\t\n\t\t\t$!{She} straightens up, looking even taller. \"And your tone asks if we took it.\" $!{Her_his} voice is loud but firm. \"My people and I have no need to take part in your petty squabbles, [i]$!{Lord}[/i] ${Arthur}. We are guests in ${Lot}'s hall as you are. If you would make accusation, state it plainly, here, in front of all. And be prepared to unsheathe your sword.\"\n\t\t\t\n\t\t\t\"No.\" You realize that ${Vivian} has been watching all this. \"Forgive ${Arthur}, $!{Mistress} ${Marta}; ${he} is young and ${his} tongue runs faster than ${his} thoughts. I'd return to your friends, ${ap} ${Uther}, you'll do no good here.\"\n\t\t\t\n\t\t\tAll you've earned here are hard Saxons stares as you make your way back to your quarters.\n\t\t\t*goto part4_end_saxons\n\t\t\t\n\t#\"I suspect ${Agravaine}; ${he} was too quick to search this room. We should keep an eye on ${him}, see what we can find out.\"\n\t\tIt isn't hard to find ${Agravaine}; ${he}'s angry, and is making ${his} displeasure known throughout the hall. You keep at a distance from ${him}, as if admiring the fortress, and keep both ears open as ${he} strides around like a bee-stung bear.\n\t\t\n\t\tLate in the morning you are leaning on the battlements \n\t\t*if lover_gawain\n\t\t\tnear where ${Gawain} kissed you last night,\n\t\t*if lover_morgan\n\t\t\tnear where ${Morgan} kissed you last night,\n\t\t*if ((lover_gawain=false) and (lover_morgan=false))\n\t\t\tlooking out over the sea,\n\t\tand you hear ${Agravaine} directly below you, talking to ${Bledri}, one of ${his} ${men}.\n\t\t\n\t\t\"I don't care, I want it found. I know ${Arthur} and ${his} folk have it. The blade was in their room, but they cheated me this morning, they were too quick for me. They cannot have put it far away. Search again. Take another four ${men}.\"\n\t\t\n\t\tIt seems ${Agravaine} is very certain that the sword was in your room. Almost as if ${he} arranged for it to be there.\n\t\t*set question_got_results true\n\t\t*goto part4_end_agravaine\n\t\t\t\n\t#\"Perhaps ${Emrys} is right. We should try and find out more about what ${Morgause} thinks of the handfasting.\"\n\t\tYou find ${Morgause} sat in the main hall surrounded by a gaggle of servants. They are working feverishly to decorate the hall. $!{She} sits serene amongst them, occasionally directing or chastising. $!{She} looks up at you as you approach, and ${her_his} eyes are ${Morgan}'s; it's a hard thing to get used to. $!{She} smiles warmly. \"${Arthur}! I'd hoped we would have time to talk.\"\n\t\n\t\t\"You are busy, $!{Lady} ${Morgause}.\"\n\t\n\t\t$!{She} waves it away. \"Our tasks are nearly done, and I can always make time for you. I've heard so much of you from ${Morgan}, and from my dearest ${Gawain}, of course. I'm so pleased you came for the marriage. Tell me, how is that you yourself are not yet wed?\"\n\t\t\n\t\t*fake_choice\n\t\t\t#\"I have no time for such things at present; there's a war to be fought.\"\n\t\t\t\t$!{She} rolls ${her_his} eyes. \"Oh my dear, there are [i]always[/i] wars to be fought. You should make time for you! \n\t\t\t#\"I have yet to find the right person.\"\n\t\t\t\t$!{She} smiles again. \"Well, perhaps I can aid you with that. I know one or two young ${women} who would be delighted to make your acquaintance. I will make introductions. \n\t\t\t#\"I wanted to talk to you about something else.\"\n\t\t\t\t$!{She} laughs. \"Oh my dear—was I trespassing somewhere I shouldn't? Please forgive me. \n\t\tBut I am being rude; what did you want to talk to me about?\"\n\t\t\t\n\t\t\"I was wondering what you made of ${Gareth}'s ${wife}-to-be, ${Laurel}; I've not had time to meet her. It must be strange for you, to have your ${son} about to leave the nest.\"\n\t\n\t\t\"${Laurel}? $!{She}'s a darling. I think ${Gareth} will do very well amongst ${Duncan}'s people.\"\n\t\n\t\t\"You will miss ${him}, though?\"\n\t\n\t\t\"Of course I'll miss ${him}. Any ${mother} would. But it's nothing I haven't been through before—after all, you have stolen ${Gawain} from me.\"\n\t\t\n\t\t*if (diplomat>55)\n\t\t\t\"Hardly stolen, surely—${he} made ${his} own choices.\"\n\t\n\t\t\t\"[i]Impressed[/i] ${him}, then, shall I say? I had thought that ${Gawain} would be a leader in ${his} own right, but perhaps ${he} doesn't have that confidence. My ${Agravaine}, now, ${he} is a skilled warrior and leader. Much like you, of course; I think ${he} might have made a fine Warleader.\"\n\t\t\n\t\t\tThere's a falseness to ${her_his} smile, now, a strange light in ${her_his} eyes. You get the distinct impression that ${she} would have much preferred it if ${Agravaine} held your post.\n\t\t\t*set question_got_results true\n\t\t\t*goto part4_end_morgause\n\t\t*else\n\t\t\t\"I didn't steal ${him}. $!{He} sees the worth in what we're doing in Gwynedd.\"\n\t\t\t\n\t\t\t\"Oh, yes, of course ${he} does. Let's not get caught up in politics now, dear. Shouldn't you be getting ready for the handfasting?\"\n\t\t\t*goto part4_end_morgause\n\n*comment --------------------------------------------------------------\n*label part4_end_saxons\n*page_break\n\"So how have we fared?\" you ask the others back in your room.\n\n${thief} shrugs. \"All I discovered is that they've traded with ${Lot}'s people for a few years.\"\n\n${Morgan} nods. \"My ${sister} seems to trust them, as does ${Lot}. What do you think, ${Arthur}? You talked to them?\"\n\n*if question_got_results\n\t\"I don't think they're working for ${Cerdic} or ${Cynric}, and I can't see that they'd have enough of a grasp of our politics to try to cause me trouble. I don't think they're at fault here.\"\n*if question_got_results=false\n\t\"I didn't get anything useful from them, other than to make them angry.\"\n\t\n*goto part5\n\n*comment --------------------------------------------------------------\n*label part4_end_agravaine\n*page_break\n\"So how have we fared?\" you ask the others back in your room.\n\n${thief} shrugs. \"$!{He} was up at an early hour and had plenty of time to get to the strongroom; but then so did many people.\"\n\n${Emrys} shakes ${his} head. \"$!{He}'s ambitious, but I couldn't find anything to place the blame squarely on ${him}. What about you, ${Arthur}?\"\n\n*if question_got_results\n\t\"I heard it near as certain from ${his} lips that ${he} knew the sword was in our chamber before ${he} came in. $!{He} placed it there, I'm sure of it.\"\n*if question_got_results=false\n\t\"Nothing, aside from earning more of ${his} ire.\"\n\t\n*goto part5\n\n*comment --------------------------------------------------------------\n*label part4_end_morgause\n*page_break\n\"So how have we fared?\" you ask the others back in your room.\n\n${thief} grimaces. \"${Morgause} has been doing everything ${she} can to ensure the wedding succeeds. I'm not sure ${Emrys} was right.\"\n\n${Gawain} looks a little askance at ${Morgan}. \"Aye. From all I can see ${she}'s been overjoyed by the whole thing. What did you get from ${her_him}, ${Arthur}?\"\n\n*if question_got_results\n\t\"$!{She} think ${Agravaine} would be a much better Warleader—which, let's face it, may well be true. So I don't think ${she}'d be above arranging things so that I looked bad.\"\n*if question_got_results=false\n\t\"Nothing. $!{She} seems happy about the match.\"\n\t\n*goto part5\n\n*comment --------------------------------------------------------------\n*comment                        Part 5: Confrontation\n*comment --------------------------------------------------------------\n*label part5\n\n${Cai} sighs. \"Then what? What do we do? The handfasting's about to happen.\"\n*choice\n\t#\"I'll go and see ${Lot} quietly, and give ${him} back the blade.\"\n\t\t*goto part5_quiet\n\t\t\n\t#\"We fight back; let's plant the blade in someone else's quarters.\"\n\t\t*goto part5_plant\n\t\n\t#\"We return the blade to ${Lot} publicly.\"\n\t\t*goto part5_public\n\n*comment --------------------------------------------------------------\n*label part5_quiet\n*set diplomat %+15\n*set warrior %-15\nYou are ushered into ${Lot}'s quarters. $!{He}'s seated on a stool by the fire while a serving-${man} trims and oils ${his} hair. \"You asked to see me, ${ap} ${Uther}?\"\n\n\"I bring you back the Saxon sword, my ${lord}.\" You lay it on a side-table. ${Lot}'s brow shoots up. \"Indeed! And where did you find it?\"\n*choice\n\t#\"Hidden in the courtyard. I think some drunkard must have been playing a prank. Either that or a thief panicked.\"\n\t\t*if (diplomat>=65)\n\t\t\t${Lot} looks at you, hard, for a moment, and then nods. \"I see. No doubt there's more to this, but I thank you for recovering it. I will see you at the feast.\"\n\t\t\t*goto part6\n\t\t*else\n\t\t\t${Lot} looks at you, hard, for a moment, and then says: \"You swore an oath, ${Arthur}, that the people under your command would not break my hospitality while they were at my hearth. Anything that they did reflects upon you.\"\n\t\t\t\n\t\t\t\"I understand that, $!{Lord}.\"\n\t\t\t\n\t\t\t\"It is good that you have recovered the sword. But if you cannot control your ${men}, $!{Arthur}—or indeed, yourself—then you are a poor choice for Britain's Warleader. I will see you at the feast.\"\n\t\t\t*goto part6\n\n\t#\"I believe your ${son} ${Agravaine} planted the sword amongst our gear, ${Lord}.\"\n\t\t${Lot} stares hard at you. \"You'd best have proof of this.\"\n\t\t\n\t\t\"Question the ${man} ${Bledri},\" you say. \"${Agravaine} was certain that the sword was in our chamber. $!{He} searched it first, and again, and instructed ${Bledri} to do so certain that we had it. $!{He} spent little time on anyone else for ${he} knew it was there.\"\n\t\t\n\t\t*if (diplomat>=60)\t\n\t\t\t${Lot} snorts. \"That is no proof.\"\n\t\t\t\n\t\t\tYet there's the faintest touch of doubt to ${his} tone.\n\t\t\t\n\t\t\t\"I leave it in your hands, ${lord},\" you say carefully. \"I may of course be mistaken.\"\n\t\t\t\n\t\t\t\"Go. I will see you at the feast. I will investigate this matter and take whatever action is needed. Be sure you do not mention it again.\"\n\t\t\t*set accuse \"agravaine\"\n\t\t\t*goto part6\n\t\t*else\n\t\t\t${Lot} waves the serving-${man} away and stands. \"You come to me and accuse my ${son} with this? This is not proof. I might as well say that you, ${Arthur}, or one of your followers, drunk on my wine, did this deed. And I'd have just as much proof. No. I will not let this stand. You'll get no troops from me ${Arthur} ${ap} ${Uther}, and your presence at the handfasting is not required. You will leave as soon as your gear can be packed. I will find suitable escort for the $!{Lady} ${Vivian} and ${her_his} ${daughter} on return. Go.\"\n\t\t\t\n\t\t\t*goto part5_home\n\t\t\t\n\t#\"I believe your ${wife} ${Morgause} planted the sword amongst our gear, ${Lord}.\"\n\t\t*set acclaim %-30\n\t\t*set chapter7_epithet_spitehearth true\n\t\t${Lot} waves the serving-${man} away, then stands. \"You have the temerity to accuse my ${wife}? Even—and I do not believe this for a moment, mark you—even if ${she} [i]had[/i] done this deed, do you think making this accusation is the act of a wise Warleader?\"\n\t\t\n\t\t\"You spit on the hearth of your host, ${Arthur} ${ap} ${Uther}. I name you Spitehearth, and the name will follow you. Your presence at the handfasting is not required. You will leave as soon as your gear can be packed. I will find suitable escort for the $!{Lady} ${Vivian} and ${her_his} ${daughter} on return. Go.\"\n\t\t\t\n\t\t*goto part3_sent_home\n\n\t#\"I believe it was the Saxon ${Marta} and ${her_his} folk, $!{Lord}, trying to divide Gwynedd and Lothian.\"\n\t\t\"Indeed.\" ${Lot} looks at you thoughtfully. \"It may be the case. I will investigate this matter and make my own judgement. I will take action on it, never fear.\"\n\t\t\n\t\t$!{He} examines ${his} hair critically in a bronze mirror, and nods approval to the serving-${man}. Then ${he} motions you to leave. \"I will see you at the feast, ${ap} ${Uther}.\"\n\t\t*goto part6\n\t\t\n*comment --------------------------------------------------------------\n*label part5_home\nYou have little choice but to pack your goods and set out back into the snow, and you and ${Cai} return to Gwynedd with nothing to show for your long journey.\n*if chapter7_malcolm_saved\n\t${Malcolm} travels with you for some of the way, then strikes out for ${his} own lands further down the West coast.\n\t\n*finish\n\n*comment --------------------------------------------------------------\n*label part5_plant\n${Gawain} looks concerned, but ${Cai} grins. \"That's more like it. So whose room shall we sneak it into?\"\n*choice\n\t#\"We'll plant the sword amongst the Saxons' gear. I don't like ${Lot}'s trade with them; if we can break that relationship so much the better.\"\n\t\t*if (bravado>=40)\n\t\t\t*set acclaim %-20\n\t\t\tHalf an hour later, you and ${thief} stand in front of ${Lot} in ${his} chambers. ${Marta}, the Saxon leader, glowers at you from across the room. ${Agravaine} holds ${thief}'s arm firmly, trying not to smirk at your discomfiture.\n\t\t\t\n\t\t\t${Lot} paces, the sword in ${his} hand. \"So you say that the blade was placed in your quarters by these Saxons, and you were trying to turn the blame back on to them when my ${men} caught you.\" $!{He} sets it down on the table. \"And you offer not one shred of proof. You are supposed to be the Warleader of the Britons, ${Arthur} ${ap} ${Uther}, not some child playing children's games. These are games which will affect the life and death of kingdoms, your own included.\"\n\t\t\t\n\t\t\t$!{He} shakes ${his} head, and turns to ${Marta}. \"You have my apology, ${mistress}. Know that I will double the fee I offered you in recompense.\" $!{He} looks back at you. \"My ${wife}'s ${mother}, my ${wife}'s ${sister} and my ${son} will stay here for the wedding, and I will offer them escort afterwards to wherever they wish to go. As for you and your hangers-on, you leave as soon as your gear is packed. You will have no ${men} from me, 'Warleader,' and you can consider this sham of an alliance over.\"\n\t\t\t\n\t\t\t*goto part5_home\n\t\t*else\n\t\t\t*set chapter7_denounce_saxons true\n\t\t\tAn hour later the news reaches you that the sword has been found amongst the Saxons' gear. There's no word of what action ${Lot} will take—${he}'s not spoken publicly about it—but there's an undercurrent of tension as you prepare for the handfasting ceremony.\n\t\t\t*goto part6\n\t\t\n\t#\"We'll put it in ${Agravaine}'s room.\"\n\t\t*set rel_gawain %-10\n\t\t\"You are talking about my ${brother},\" says ${Gawain}.\n\t\t\n\t\t\"$!{He} likely put it here ${himself},\" says ${Cai}, glowering. \"Come on, Art, I'll help you.\"\n\t\t\n\t\t*if (bravado>=40)\n\t\t\tHalf an hour later, you and ${Cai} stand in front of ${Lot} in ${his} chambers. ${Agravaine} glowers at you from across the room.\n\t\t\t\n\t\t\t${Lot} sets the sword down on the table. \"So you try to place the blame on my ${son} and are caught at your mischief. And then you tell me that ${he} planted the blade in your quarters to start with, and you offer not one shred of proof. You are supposed to be the Warleader of the Britons, ${Arthur} ${ap} ${Uther}, not some child playing children's games. I will not bear such an insult. My ${wife}'s ${mother}, my ${wife}'s ${sister} and my ${son} will stay here for the wedding, and I will offer them escort afterwards to wherever they wish to go. As for you and your hangers-on, you leave as soon as your gear is packed. You will have no ${men} from me, 'Warleader,' and you can consider this sham of an alliance over.\"\n\t\t\t\n\t\t\t*goto part5_home\n\t\t*else\n\t\t\tTogether the two of you slip into ${Agravaine}'s quarters to place the blade in a hidden, but not too hidden, location.\n\t\t\n\t\t\tAn hour later the news reaches you that the search for the sword has been ended. There's no word as to why.\n\t\t\t*goto part5_coverup\n\t\t\n\t#\"We'll put it in ${Morgause}'s room.\"\n\t\t*set rel_gawain %-20\n\t\t${Gawain} goes white. \"That is my ${mother} you're talking about.\"\n\t\t\n\t\t\"Oh, it's got to be ${her_him} or ${Agravaine},\" says ${Cai}. \"Or both together; you know that, ${Gawain}.\"\n\t\t\n\t\t\"You've no proof.\"\n\t\t\n\t\t\"What's the worst that could happen? At worst it's found in ${her_his} room and everyone's puzzled as to what happened. At best, it [i]was[/i] ${her_him} who planned this, and it sends ${her_him} a message. Either way it's out of our hands.\"\n\t\t\n\t\t\"I don't like this, ${Arthur}.\"\n\t\t\n\t\t${Cai} shakes ${his} head. \"Then don't come! I'll help you, Art.\"\n\t\t\n\t\t*if (bravado>=40)\n\t\t\tHalf an hour later, you and ${Cai} stand in front of ${Lot} in ${his} chambers. ${Agravaine} glowers at you from across the room.\n\t\t\t\n\t\t\t${Lot} sets the sword down on the table. \"So you try to place the blame on my ${wife}. It is just as well that my ${men} were watching ${her_his} chambers, is it not? I can't think what you hoped to gain from this. You have not the slightest shred of proof that ${she} was involved in the sword's theft—indeed, I have seen nothing to suggest that it was not you or one of your ${men}. You are supposed to be the Warleader of the Britons, ${Arthur} ${ap} ${Uther}, and I will ensure you ${father} hears of this insult. My ${wife}'s ${mother}, my ${wife}'s ${sister} and my ${son} will stay here for the wedding, and I will offer them escort afterwards to wherever they wish to go. As for you and your hangers-on, you leave as soon as your gear is packed. You will have no ${men} from me, 'Warleader,' and you can consider this sham of an alliance over.\"\n\t\t\t\n\t\t\t*goto part5_home\n\t\t*else\n\t\t\tAn hour later the news reaches you that the search for the sword has been ended. There's no word as to why.\n\t\t\n\t\t\t*goto part5_coverup\n\t\t\t\n*comment --------------------------------------------------------------\n*label part5_coverup\n*set coverup true\n*goto part6\n\n*comment --------------------------------------------------------------\n*label part5_public\n*set bravado %+15\nThe hall stands ready for the handfasting; you merely wait for the young couple to arrive. ${Laurel} will be brought in by ${her_his} ${father}'s serving-${women}. ${Gareth} will be brought in by ${his} ${brother}s ${Agravaine} and ${Gawain}. You are in fine clothes of soft wool and are uncomfortably warm despite the snow outside; the fires burn bright.\n\n${Lot} stands with ${his} ${wife} talking to some of the guests. You take the opportunity, grasping the sword in its sheath, and walk across to the couple. \"May I have a moment of time, $!{King} ${Lot}? I have somewhat to return to you.\"\n\nThe ${man} turns, surprised; ${he} accepts the sword from your hands and studies it. Then ${he} looks up at you, eyes sharp. \"How did you come by this, ${ap} ${Uther}?\"\n*choice\n\t#\"That's unimportant, my ${lord}; what's important is that it's here and safe.\"\n\t\t*set diplomat %+15\n\t\t*set warrior %-15\n\t\t${Lot} narrows ${his} eyes, considering you, and then nods. \"Very well, ${Arthur} ${ap} ${Uther}. You have my thanks.\" You note approval amongst the surrounding guests.\n\t\t\n\t\t*goto part6\n\t\t\n\t#\"The Saxons tried to drive a wedge between Gwynedd and Lothian by laying the blame for this at my feet, ${lord}. I thought it fitting to return it to you direct.\"\n\t\tYou hear the chatter die away around you.\n\t\t\n\t\t\"Lies!\" shouts the leader of the Saxons, outraged. $!{She} strides across the hall towards you. \"That is a damned lie, bastard of ${Uther}!\"\n\t\t\n\t\t*if acclaim>35\n\t\t\t*set chapter7_denounce_saxons true\n\t\t\t\"This is the handfasting of my ${son},\" says ${Lot} quietly, but heard by all. \"I will not have this, not in my hall. I know the repution of ${Arthur} ${ap} ${Uther}—I know ${he} would not bring this to me without proof. So I ask you to leave my hall, ${Marta} of the Iuti, along with your people.\"\n\t\t\t\n\t\t\tThe giant smith stares at ${him}, ${her_his} face drained of color. Then ${she} says, through tight lips, \"Very well, my ${lord}. And be assured I will spread the tale of your good hospitality across the land.\"\n\t\t\t\n\t\t\tWith that, ${she} and ${her_his} followers walk out.\n\t\t\t\n\t\t\t\"Thank you,\" says ${Lot} coldly. You realize that ${he} is angry, intensely angry, but ${he}'s controlling it well. It seems you've forced ${him} into doing something ${he} had no wish to do. \"The sword is returned, and that's an end to it. Let us pay heed to the happy event.\"\n\t\t\t*goto part6\n\t\t*else\n\t\t\t\"Now is not the time for such an accusation,\" says ${Lot} quietly, but heard by all. \"I will not have this, not in my hall, not at this time. ${Marta} is beyond reproach in my eyes, ${Arthur} ${ap} ${Uther}. Have you proof to offer?\"\n\t\t\t\n\t\t\tYou realize your cheeks are burning. \"Uh…my ${lord}…\"\n\t\t\t\n\t\t\t\"I ask you to retire,\" says ${Lot}. \"It seems you have not recovered from yestereve's festivities. But once you have recovered, I wish you a speedy and pleasant journey on your way south.\"\n\t\t\t\n\t\t\tIt seems you've insulted ${him} greatly.\n\t\t\t\n\t\t\t*goto part5_home\n\t\t\n\t#\"Your ${wife} placed it in my chamber, ${lord}, for reasons I don't confess to understand.\"\n\t\t*set rel_gawain %-20\n\t\t*set diplomat %-15\n\t\t*set warrior %+15\n\t\t*set accuse \"morgause\"\n\t\tThere's shock on the faces of the guests, turning to smirks on some faces and outrage on others.\n\t\t\n\t\t*if (leader>=60)\n\t\t\t*set acclaim %+20\n\t\t\t\"Is it so?\" ${Lot} turns to ${his} ${wife}, who smiles at ${him} and shrugs. \"I see,\" says ${Lot}. \"I apologize for my ${wife}, ${Arthur}; ${her_his} sense of humor is a strange one on times. Thank you for the return of the blade.\"\n\t\t\t\n\t\t\tThat seems to be it. \n\t\t\t*goto part6\n\t\t*else\n\t\t\t*set acclaim %-20\n\t\t\t\"Indeed?\" asks ${Lot} quietly, but heard by all. \"Have you proof to offer, ${ap} ${Uther}?\"\n\t\t\t\n\t\t\tYou realize your cheeks are burning. \"Uh…my ${lord}…\"\n\t\t\t\n\t\t\t\"I ask you to retire,\" says ${Lot}. \"It seems you have not recovered from yestereve's festivities. But once you have recovered, I wish you a speedy and pleasant journey on your way south.\"\n\t\t\t\n\t\t\tIt seems you've insulted ${him} greatly.\n\t\t\t\n\t\t\t*goto part5_home\n\t\t\t\n\t#\"Your ${son} ${Agravaine} placed it in my chamber, ${lord}; I believe ${he}'s desirous of my position. If ${he} wants to contest my right to lead, I'd prefer a straight fight.\"\n\t\t*set rel_gawain %-20\n\t\t*set diplomat %-15\n\t\t*set warrior %+15\n\t\t*set accuse \"agravaine\"\n\t\tThere's shock on the faces of the guests, turning to smirks on some faces and outrage on others.\n\t\t\n\t\t*if (leader>=60)\n\t\t\t*set acclaim %+20\n\t\t\t${Lot} looks at ${his} ${wife} and something passes between them. \"I'm sure there was no insult intended, ${ap} ${Uther},\" says ${Lot}. \"Later, when we are not in the midst of a celebration, I will talk with ${him}. But for now, accept my apologies for any embarrassment. I thank you for the return of the blade.\"\n\t\t\t\n\t\t\tThat seems to be it. \n\t\t\t*goto part6\n\t\t*else\n\t\t\t*set acclaim %-20\n\t\t\t\"Indeed?\" asks ${Lot} quietly, but heard by all. \"Have you proof to offer, ${ap} ${Uther}?\"\n\t\t\t\n\t\t\tYou realize your cheeks are burning. \"Uh…my ${lord}…\"\n\t\t\t\n\t\t\t\"I ask you to retire,\" says ${Lot}. \"It seems you have not recovered from yestereve's festivities. But once you have recovered, I wish you a speedy and pleasant journey on your way south.\"\n\t\t\t\n\t\t\tIt seems you've insulted ${him} greatly.\n\t\t\t\n\t\t\t*goto part5_home\n\t\t\t\n*comment --------------------------------------------------------------\n*comment                        Part 6: The Wedding\n*comment --------------------------------------------------------------\n*label part6\n*page_break\n\nAnd so the handfasting of ${Gareth} of Lothian and ${Laurel} of Strathclyde takes place in $!{King} ${Lot}'s hall. \n*if coverup\n\tDuring the marriage feast, with no explanation of how it was recovered, \n*if coverup=false\n\tDuring the marriage feast \n$!{King} ${Lot} presents the sword to $!{King} ${Duncan} of Strathclyde for a second time, and declares an oath of binding between the two kingdoms.\n\n*if chapter7_denounce_saxons\n\tThe absence of ${Marta} and ${her_his} Saxons is a shadow on the celebration, but ${Lot} seems sanguine about the loss of the trading arrangement.\n*if chapter7_denounce_saxons=false\n\tYou spend some time talking to ${Marta}, the leader of the Saxons, and find ${her_him} to have a wicked sense of humor and a wide experience of the world.\n\t\n*if accuse=\"agravaine\"\n\tYou are aware that your accusation of ${Agravaine} has caused trouble; the young ${man}'s eyes spit daggers at you. But ${his} ${father} treats you as nothing less than an honored guest, and so ${Agravaine} can say nothing.\n*if accuse=\"morgause\"\n\t${Morgause} is perfectly pleasant to you, but every so often you catch a biting black anger hiding behind ${her_his} eyes. You have made an enemy here; one who may be very dangerous.\n\nThe feast is a great success. \n*if ((diplomat+acclaim)>75)\n\t*set chapter7_duncans_men true\n\t*achieve support_duncan\n\tAs it draws to a close, ${Duncan} of Strathclyde approaches you publicly.\n\t*if ( ((accuse=\"agravaine\") or (accuse=\"morgause\")) or chapter7_denounce_saxons)\n\t\t*set allies +2\n\t\t\"You've impressed me, ${Arthur}, particularly in your ability to stand up in a difficult situation and speak the truth. \n\t*if ( (accuse=\"\") and (chapter7_denounce_saxons=false) )\n\t\t*set allies +1\n\t\t\"The borders of Strathclyde are made secure by my alliance with Lothian. \n\tThat being the case, I'm minded to offer troops to your banner—not to fight for Gwynedd, but to fight for Britain. I shall send a ${man} to you with the details.\"\n\t\n\t*if ((accuse=\"agravaine\") or (accuse=\"morgause\"))\n\t\t${Lot} smiles and applauds ${Duncan}'s words, but offers no similar words of ${his} own. Perhaps the accusation of a member of ${his} family has stung ${his} pride.\n\t*if (accuse=\"\")\n\t\t*set chapter7_lots_men true\n\t\t*achieve support_lot\n\t\t*if ((diplomat+acclaim)>95)\n\t\t\t*set allies +2\n\t\t\t\"Aye,\" says ${Lot}. \"It's a worthy cause, and I shall provide some of my finest.\"\n\t\t*if ((diplomat+acclaim)\u003c=95)\n\t\t\t*set allies +1\n\t\t\t\"Aye,\" says ${Lot}. \"It's a good cause. I shall provide ${men} to fight with you.\"\n\t*goto part7\n*else\n\tBut in its aftermath you've been unable to extract any promises of troops from either ${Lot} or ${Duncan}.\n\n*comment --------------------------------------------------------------\n*comment                        Part 7: Conclusion\n*comment --------------------------------------------------------------\n*label part7\n*page_break\nSeveral days later you pack up your gear and set off South, back into the snow. \n*if chapter7_malcolm_saved\n\t${Malcolm} will travel with you for some of the way, then strike out for ${his} own lands further down the West coast.\n\n\"So,\" says ${Cai}, keeping ${his} voice low enough that ${Vivian} won't hear. \"That's some family you have there, ${Gawain}. I'm not surprised you don't visit that often.\"\n\n${Gawain} simply scowls, and kicks ${his} pony to ride a distance ahead of the rest of you.\n\n*if chapter7_lots_men\n\t\"There'll come a time that you'll be grateful to have the ${men} of Lothian fighting alongside you,\" says ${Emrys}.\n*if chapter7_lots_men=false\n\t\"We'll regret not having many more of ${Gawain}'s family fighting alongside us,\" says ${Emrys}. \"I wish you could have convinced ${Lot}, ${Arthur}.\"\n\t\n\"I'm just pleased we all got out with our heads on our shoulders,\" says ${Cai}.\n\nLater, ${Emrys} rides alongside you. \"So here's a thing,\" ${he} says quietly. \"Why do you think it is that ${Lot} brought out the sword on the first night to show it off, only to then take it away once more?\"\n\n\"What do you mean?\"\n\n\"I don't know. It simply strikes me as a strange thing to do. I think perhaps ${he}'s been playing ${his} own game through all of this. What if ${Lot} was behind the theft all along? Why would ${he} do that, do you think?\"\n\n*fake_choice\n\t#\"To discredit us, and through us, ${Uther}, surely?\"\n\t\t\"To have a reason not to ally with us. Yes, it seems likely.\"\n\t\t\n\t#\"Perhaps ${he} simply wanted to see how we dealt with it?\"\n\t\t\"A test of our mettle when it comes to things which aren't skill-at-arms? Possibly.\"\n\t\t\n\t#\"Perhaps ${he} didn't really want the wedding, and tried to cause enough confusion to have it ended.\"\n\t\t\"It seems a complicated way of going about it, but perhaps so.\"\n\t\t\n\t#\"I don't think ${he} was behind it. I think ${he}'s just a rich, arrogant ${man} who wanted everyone to see how generous ${he} is.\"\n\t\t\"Don't discount ${Lot}, ${Arthur}—${he}'s far less straightforward than ${Gawain}.\"\n\nFor a time you ride in silence.\n*finish\n", "chapter8": "*comment ==============================================================\n*comment                Chapter 8: Gods and Monsters\n*comment ==============================================================\n\n*comment --------------------------------------------------------------\n*comment                        Introduction\n*comment --------------------------------------------------------------\n*label intro\n\n*image chap8.png center Chapter Eight: Gods and Monsters\n\n*comment --------------------------------------------------------------\n*comment                   Part 1: Raiding Parties\n*comment --------------------------------------------------------------\n*label part1\n\n*temp hall_owner\n*set hall_owner \"Ifawr\"\n*temp dest\n*set dest \"Ifawr's Hall\"\n*if gender=\"female\"\n\t*set dest \"Ela's Hall\"\n\t*set hall_owner \"Ela\"\n\t\n\"There! There ${she} goes!\"\n\nYou catch a flash of a fawn-colored tunic through the trees. \"I see ${her_him}! Hoy you, ${girl}, stop there!\" You start running again.\n\n${Morgan} speeds away past you into the trees, after the child. ${Gawain} crashes through the undergrowth to your left; ${Emrys} is hot on your heels. You've no idea where ${Cai} is.\n\n\"We're not going to hurt you!\" You hear ${Morgan}'s voice clear. \"We're $!{King} ${Uther}'s folk. Please stop!\"\n\n\"$!{She}'s been beaten,\" manages ${Emrys}, out of breath. \"Did you see? Bruises across ${her_his} face.\"\n\n\"Got you!\" You hear ${Gawain}'s roar, and a crashing and squealing.\n\nBoth of you slow; ${Emrys} sighs. \"Well, I'm sure that'll make things better.\"\n\n*page_break\n\n\"Calm down, ${lass}, I'm not going to hurt you.\" ${Gawain}'s arm is wrapped around the ${girl} in a bear-hug; ${she}'s kicking and struggling.\n\n\"Keep ${her_him} quiet!\" ${Morgan} has ${her_his} bow drawn, and paces the edge of the clearing. \"If the Saxons are truly here—\"\n\n\"Then they've already heard us,\" says ${Emrys} mildly. \n*if (chapter2_morgan_pregnant)\n\t${Morgan} glares at ${him}. $!{She}'s been on edge since ${she} got back to Gwynedd from ${her_his} ${mother}'s Isle, and she won't tell you why; perhaps ${Vivian} has finally decided to withdraw ${her_his} support from the ailing ${Uther}.\n*if ( chapter2_pregnant )\n\tYou lean against a tree, catching your breath. You're dizzy again, and pull yourself up, trying to hide it. You've been unwell since you got back from the North; ${Lot} may have spared no expense on ${his} feasts, but there was something in the Northern food that your stomach won't forgive you for. There hasn't been time to stop and recover.\nThe number of raids by the Saxons has increased since you went North, and there's increasing pressure on ${Uther}—and you—to deal them a decisive blow. \n*if allies>1\n\tDespite promises made, additional fighting ${men} haven't reached Dinas Emrys yet and your warriors are stretched thin.\n*if allies\u003c=1\n\tYou've gained no allies, and the number of fighting ${men} at your call is pitiful.\n\t\n\"We can help you,\" says ${Emrys}, kneeling in front of ${Gawain} and the ${girl}, voice soft. \"Tell us who hurt you.\"\n\nThe ${girl} stops struggling, tears streaking ${her_his} face. $!{She}'s perhaps seven years old. ${Emrys} reaches out to ${her_his} cheek—${he} was right, there's a mottled blue and black pattern of bruises under the skin.\n\n\"The Christ ${man} with the sword!\" ${she} blurts out. \"$!{He}'s got Aled, Olwen, Olwen's da, everyone! And ${he}'s tied up ${cfather} ${Rhodri}.\"\n\n\"Not Saxons, then,\" says ${Gawain}.\n\n${Emrys} looks up you. You nod.\n\n\"Shouldn't we wait for ${Cai}?\" asks ${Morgan}.\n\n\"I don't think we've the time to spare,\" you tell ${her_him}. \"$!{He}'ll catch us up.\"\n\n\"Can you show us the way?\" ${Emrys} asks the ${girl}.\n\n*comment --------------------------------------------------------------\n*comment                   Part 2: The Paladin\n*comment --------------------------------------------------------------\n*label part2\n*page_break\n\n*temp tied_up\n*set tied_up false\n\n\"This was a Roman place. Look at those fallen pillars,\" says ${Emrys} as you approach the village. \"And the well.\" The buildings are ramshackle wood built on old stone, by the looks of it, the old as the foundations for the new. One building stands out, its frontage a semi-circle of columns in mottled grey stone. \"That must have been a temple once.\"\n\n\"And that's where the trouble is,\" says ${Gawain}, voice grim. \"Look.\"\n\nIn the gathering dusk you can make out armed ${men} standing around the temple in small knots; some have lit a fire. You see mail shirts, grey cloaks, and swords. \"Saxons?\" But they don't look like Saxons; they're too uniform, almost in the way that the legions might once have been, save the gear is different.\n\n\"No,\" says ${Gawain}. \"I don't recognize these at all.\" $!{He} grimaces. \"Perhaps a dozen. We haven't a chance against these. Even if ${Cai} had caught us up. Gods and little fishes, where has ${he} got to? Probably drunk in a ditch somewhere.\"\n\n${Emrys} kneels next to the ${girl} again. \"You said that this ${man} had your friends. Where? In the temple?\"\n\n$!{She} nods, fists clenching fitfully.\n\n\"We've got to do something, ${Arthur},\" says ${Morgan}. \"We can't leave it like this.\"\n\n\"Well, if we—\"\n\nYou hear a sharp cry from the temple, a ${woman}'s voice. And the ${girl} pulls free of ${Emrys}'s hand and dashes forwards. \"$!{Ma}! $!{Ma}!\" $!{She} dashes past the soldiers as ${men} turn, weapons coming reflexively to hand.\n\n${Gawain} draws ${his} sword. \"Seems there's not a choice.\"\n\n*page_break\n\nIn moments a semi-circle of ${men} face you, swords in hand. These are seasoned, trained fighters. \"Hold!\" says one, a lean ${man} with dark hair. \"Swords to the ground, or we will not be gentle.\"\n\n\"How is beating a child gentle?\" ${Morgan} spits the words through gritted teeth, holding ${her_his} bow taut, arrow trained on the speaker.\n\n${Emrys} holds up a warding hand towards ${her_him}, and addresses the ${men}. \"You stand in the presence of ${Arthur}, Warleader of Britain and $!{Prince} of Gwynedd. This is Gwynedd's land. It's your place to tell us who you are, and what it is you do here. Be courteous, and you'll meet the same courtesy from us.\"\n\n\"We are the soldiers of the Lord, and we do the Lord's work.\" It's a new voice, firm and commanding. A mail-clad ${man} strides forward from amongst the pillars; ${he}'s dragging a struggling figure, a ${man} dressed in rough robes. $!{He} casts the ${man} to the ground. \"This ${man} is the serpent that leads this village to ruin. $!{He} calls ${himself} a ${man} of God, yet leads children in rites outlawed by the Council of Carthage.\"\n\n\"And you are?\"\n\n\"I am ${Dyfrig} of the $!{Brother}s of Christ.\" \n\nYou hear ${Emrys}'s indrawn breath.\n\n\"$!{Lord} $!{Arthur},\" wheezes the ${man} on the ground, \"It was no blasphemy! The temple…it is now our church, it has been sanctified! I led the children in the blessing of the candles; it's the feast of the presentation of—\"\n\n${Dyfrig} kicks the ${priest} in the gut; the ${man} collapses, wheezing. \"Adding the name of Our Saviour to a pagan ritual does not make it holy.\" The armored ${man} looks to you. \"Well, $!{Prince} of Gwynedd? Will you aid me or hinder me in cleansing this place of evil?\"\n\nYou can see that ${Morgan} is seething; ${her_his} arrow is now pointing directly at ${Dyfrig}. ${Gawain} shoots you a hard, questioning look.\n\nBeside you, ${Emrys} murmurs quietly, \"I've heard of this one; ${he}'s insane, ${Arthur}. Tread carefully.\"\n\n*choice\n\t#I'll talk ${him} round using my knowledge of Christian theology.\n\t\t\"This is the feast of St Fraid, whom the Irish Church calls Brigid,\" you tell ${him}. \n\t\t*if (old_faith\u003c50)\n\t\t\t\"A feast that has been celebrated for many years here; why, I've seen it presided over by the $!{Bishop} of Meneva. The blessing of the candles and the involvement of the children is the form the $!{Bishop} sanctions. And $!{cFather} $!{Rhodri} is telling you the truth; this church has been sanctified by the $!{Bishop}.\"\n\t\t*if (old_faith>=50)\n\t\t\t\"A feast that has been celebrated for many years amongst our people.\"\n\t\t\t\n\t\t*if ((diplomat>50) and (old_faith\u003c40))\n\t\t\t*set acclaim %+15\n\t\t\t\n\t\t\t${Dyfrig} frowns. \"I have heard of this $!{Bishop}; a pious ${man}, it is said. I should speak with ${him}; perhaps learn more of this matter. I had thought that this was the heathen rite of Imbolc, such as the godless over the sea practice; I did not know this was a place of worship.\" $!{He} straightens up. \"My thanks to you, $!{Prince}, for your aid in this matter.\"\n\t\t\t\n\t\t\t$!{He} hauls the hapless ${man} to ${his} feet. \"Go to your people, ${priest}. I will make a donation to your church for your troubles.\" The startled ${man} stumbles back into the temple.\n\t\t\t*goto part2_release_prisoners\n\t\t*else\n\t\t\n\t\t\t${Dyfrig} snorts. \"Brigid is a heathen icon that the godless Irish burn flames for their feast of Imbolc. If the folk of Gwynedd are as keen to see flame, then we can oblige them. And by your words, it seems the corruption in this country is spread wider than I had hoped. Take them!\"\n\t\t\t\n\t\t\t${Gawain} lifts ${his} blade. But there are fifteen swords ready to answer it. You grit your teeth, and signal the others to back down.\n\t\t\t*goto part2_tiedup\n\t\t\t\n\t#\"These people are subject to the laws of Gwynedd, $!{master} ${Dyfrig}, not your laws. Release them into my custody and I'll see justice done. If you persist in harming people who are under my protection then you go against the $!{King}.\"\n\t\t*comment Ruthless\n\t\t*set compassion %-20\n\t\t*if (bravado>55)\n\t\t\t*set acclaim %+15\n\t\t\t\n\t\t\t${Dyfrig}'s eyes are unreadable for a moment—then ${he} smiles. \"A valiant answer, $!{Prince} ${Arthur}, from one with ${his} people's wellbeing in ${his} heart. Very well. It shall be as you say. I shall write a missive to your churchmen. You will have custody of these prisoners, and I will trust that you will see them properly punished.\" $!{He} nods to several of ${his} ${men}, who head into the temple.\n\t\t\t*goto part2_release_prisoners\n\t\t*else\n\t\t\n\t\t\t${Dyfrig}'s eyes glitter. \"I only answer to one ruler, and He is not bound by your laws.\" $!{He} looks around. \"It seems this worship of devils is sanctioned by this land's $!{Prince}. I weep for its people. Take them!\" \n\t\t\n\t\t\t${Morgan}'s arm twitches, but you knock ${her_his} bow sideways. There are fifteen swords ready to answer it. You grit your teeth, and signal the others to back down.\n\t\t\t*goto part2_tiedup\n\t\t\t\n\t#I'll go along with ${him} for now, and look for an opportunity to rescue the villagers later.\n\t\t\"I will aid you and your companions, ${master} ${Dyfrig}—these villagers are in my care, and any trespass of theirs is something I will take most seriously.\"\n\t\t\n\t\tYou are aware of ${Morgan} staring at you.\n\t\t*comment Testing cunning\n\t\t*if (bravado\u003c40)\n\t\t\t*set leader %+15\n\t\t\t*set warrior %-15\n\t\t\t\n\t\t\t\"A most excellent answer!\" ${Dyfrig} gestures ${his} followers to lower their weapons. \"Come, then, and you can join me in questioning the other people of this accursed place.\"\n\t\t\t*goto part2_wait\n\t\t*else\n\t\t\t\n\t\t\t${Dyfrig}'s eyes shift to ${Morgan}. \"Not all of your people share your convictions, it seems. No, I think it best that we keep you safe from these evils; you shall be our guests until we've established the truth of what has taken place here. Take them!\"\n\t\t\t\n\t\t\t${Morgan}'s arm twitches, but you knock ${her_his} bow sideways. There are fifteen swords ready to answer it. You grit your teeth, and signal the others to back down.\n\t\t\t*goto part2_tiedup\n\n*comment --------------------------------------------------------------\n\n*label part2_tiedup\n*page_break\n*set tied_up true\n*set acclaim %-5\n\n\"The stonework here is incredible,\" say ${Emrys}, staring up at the roof above.\n\n${Gawain} scowls. \"Ach, well, thank the gods we've been tied up by nutters, then, so you've got a good view.\"\n\n\"I mean it,\" says ${Emrys}. \"This must have been the temple of an administrator or a victorious general—someone with money and time. Look, you can still see parts of a fresco behind that screen. I think that's a handmaiden of Vesta; see the white robes?\"\n\n\"I'd strangle you, but I can't reach your scrawny neck. Because of us being tied up. Have you not noticed?\"\n\n*if ( chapter2_pregnant )\n\t\"Shut up, both of you!\" You can't help the words; you're feeling bilious again; there's acid rising in your throat. \"We need to find a way out of this.\"\n\t*goto part2_villagers\n*else\n\t\"Shut up, both of you,\" says ${Morgan}, uncharacteristically harsh—${she}'s pale. \"We need to find a way out of this.\"\n\t*goto part2_villagers\n\n*label part2_villagers\n\n\"I can see others,\" says ${Gawain}. \"Through the archway, there. Looks like most of the folk of the village, even elders and children. Maybe forty people in all.\" $!{He} strains against ${his} bonds. \"What do we do?\"\n\nThere's movement. Two of ${Dyfrig}'s followers drag in a grey-faced young ${man} and prop ${him} up so ${he}'s sitting against a wooden table. They tie ${his} hands above ${his} head. ${Dyfrig} strides in, pulling off ${his} heavy gloves, and takes one knee in front of the captive, examining ${his} face.\n\n*goto part3\n\n*comment --------------------------------------------------------------\n\n*label part2_release_prisoners\n\n*set chapter8_freed_prisoners true\n\n\"It is night,\" announces ${Dyfrig}, somewhat redundantly given how much the light has faded. \"You should stay, $!{Prince} ${Arthur}. We should break bread together and discuss the evil that is loose in this land.\"\n\nWith that ${he} leads you into the temple, where ${his} ${men} are freeing villagers; some have been tied up. \"For their protection,\" insists ${Dyfrig}. \"Here they will be safe; if they were to flee, who knows what they might meet in the darkness?\"\n\nYou can feel ${Morgan}'s emotions gathering like black clouds before a storm. $!{She} kneels down next to $!{cfather} ${Rhodri}, whose wounds are being attended to by one of the other villagers.\n\nIn all it looks to be perhaps forty people. The temple is decaying, but impressive, with tall arches, stone pillars and crumbling walls on which you can make out the remnants of painted scenes. \"This must have belonged to a rich landowner in the days of Rome,\" says ${Emrys}. \"That or a victorious general.\"\n\n${Gawain} shoots ${him} an irritated look, and then addresses ${Dyfrig}. \"These people can go to their homes, now? They don't need to be kept here?\"\n\n\"Indeed,\" says ${Dyfrig}. \"They are in your care now; it is to you to see to their disposition.\"\n\n\"Please…\" One of the older children catches at your sleeve. \"We can't go. Not now. It's dark.\"\n\n\"Would you not rather be at home?\"\n\n$!{He} shakes ${his} head, tears in ${his} eyes. \"No,\" ${he} says. \"No. In here, there are ${men} with swords. They can protect us.\"\n\n\"Against what?\"\n\n\"Against the monsters.\"\n\nThere's no time to find out what ${he} means, as ${Dyfrig} leads you towards the middle of the room, where a grey-faced young ${man} sits slumped against a wooden table, hands tied above ${his} head. ${Dyfrig} pulls off ${his} heavy gloves and takes one knee in front of the captive, examining ${his} face.\n\n*goto part3\n\n*comment --------------------------------------------------------------\n\n*label part2_wait\n\nWith that ${he} leads you into the temple. There you find people of all ages—men, women and children—sitting huddled in groups, faces hopeless. Some appear to be tied up. In all it looks to be perhaps forty people.\n\nThe temple is decaying, but impressive, with tall arches, stone pillars and crumbling walls on which you can make out the remnants of painted scenes. \"This must have belonged to a rich landowner in the days of Rome,\" says ${Emrys}. \"That or a victorious general.\"\n\n\"That's fascinating,\" mutters ${Morgan}. \"But can you concentrate on how we get these people out of here?\"\n\nMute faces watch as you are led towards the middle of the room, where a grey-faced young ${man} sits slumped against a wooden table, hands tied above ${his} head. ${Dyfrig} pulls off ${his} heavy gloves and takes one knee in front of the captive, examining ${his} face.\n\n*goto part3\n\n*comment --------------------------------------------------------------\n*comment                   Part 3: The Questioning\n*comment --------------------------------------------------------------\n*label part3\n*page_break\n\n*temp victim\n*set victim \"Aled\"\n*if gender=\"female\"\n\t*set victim \"Alys\"\n\nThe ${boy} is perhaps fifteen or sixteen, and looks, from ${his} dress, to be one of the villagers. ${Dyfrig} calls for water; ${he} dips ${his} fingers in the cup that's brought to ${him} and splashes water across the ${boy}'s face. \n\n*if (tied_up=false)\n\t\"What's going on here?\" you ask. \"Who is ${he}?\"\n\t\n\t\"A ${boy} profoundly affected by the evil in this place,\" says ${Dyfrig}.\nThe ${boy}'s eyes flutter and open; ${he} sees ${Dyfrig} and shrinks back, pulling against ${his} bonds.\n\n\"Shh, shh,\" says ${Dyfrig} softly, laying ${his} hand against the captive's cheek. \"You're safe here.\"\n\n$!{He} looks around, eyes wild. \"Where—why—Let me go! Why have you tied me! I was…\" $!{His} voice is harsh, raw. $!{He} swallows. \"What do you want?\"\n\n\"Your name is ${victim}, yes?\"\n\n\"Yes.\"\n\n\"They tell me that you've had strange dreams.\"\n\n\"I didn't! I never—I—I— wouldn't—\"\n\n\"It's all right. You cannot control your dreams. Tell me about them.\" $!{His} voice is soothing and gentle. You're aware that, beside you, ${Morgan} has gone rigid, tense, as if barely keeping ${herself} in check. \n\n$!{victim} shrinks away from ${him} again, and looks round at the others. $!{He} bites ${his} lip. \"Teeth,\" ${he} says. \"Teeth, tearing at bone, and at skin. Eating people alive.\"\n\n\"What are these the teeth of? A wild animal?\"\n\n\"I don't know!\" ${he} bursts out. \"I don't, I swear. Sometimes I think that they're wolves, hunting in the forest. But sometimes I think they're…that they're ${men} in the skin of wolves.\" $!{He}'s shaking now. \"They ask me to join them.\"\n\n\"And you see these when you sleep? When did this start?\"\n\n\"Three nights ago,\" the captive whispers. \"I felt them. They're here.\"\n\n${Dyfrig} brings up the ${boy}'s chin in one hand, studying ${him} carefully. Then ${he} sighs. \"It is always such a shame when one so young falls to the evil one's influence. I am sorry, ${victim}.\"\n\nWith ${his} free hand ${he} pulls a knife from ${his} belt and raises it to ${his} captive's throat.\n\n\"No!\" ${Morgan}'s cry rings out. ${Dyfrig} looks at ${her_him}.\n\n*choice\n\t#\"${Dyfrig}! Stop this!\" I'll try and talk ${him} out of it.\n\t\t*set compassion %+15\n\t\t*if (diplomat>55)\n\t\t\t*if chapter8_freed_prisoners\n\t\t\t\t\"You released these people into my custody. \n\t\t\t*if chapter8_freed_prisoners=false\n\t\t\t\t\"There is a better way. \n\t\t\tIf you kill ${him} you are committing a crime against Gwynedd. Instead, tie ${him} up, gag ${him}, by all means—${he} should be taken before $!{King} $!{Uther} and $!{Bishop} ${Iwan} and you should have their blessing for the death. That way the whole of our land will see God's justice.\"\n\t\t\t\n\t\t\t${Dyfrig} lowers the knife. \"Indeed. It would be a good thing to show the ${king} and ${his} ${bishop} what their people have come to. Very well.\"\n\t\t\t*goto part3_boy_alive\n\t\t*else\n\t\t\t\"This is folly—everyone has nightmares, and as you said yourself, ${he} cannot control them.\"\n\t\t\t\n\t\t\t$!{He} looks at you. \"Everyone has nightmares, but ${his_hers} are demon-tainted. Demons summoned by the ${priest}'s blasphemy, perhaps. They have entered ${his} mind, that is clear.\" With a swift, economical movement ${he} slashes ${victim}'s throat. Blood gushes.\n\t\t\t*goto part3_boy_killed\n\t\t\t\n\t*if (tied_up=false) #I shove ${Dyfrig} aside and stand in front of the ${boy}.\n\t\t*set warrior %+15\n\t\t*set diplomat %-15\n\t\t*if (bravado>55)\n\t\t\t*set acclaim %+15\n\t\t\tThe ${man} sprawls on the tiles and looks up at you, fury in ${his} eyes, fingers closing tight around ${his} knife. \"I wouldn't,\" says ${Gawain}, casually leaning the tip of ${his} blade on the stone of the floor next to ${Dyfrig}'s head. \"You'd be attacking the $!{King}'s ${son}.\"\n\t\t\t\n\t\t\t\"You'd free a ${boy} who consorts with demons!?\"\n\t\t\t\n\t\t\t\"I'd spend more than five minutes finding out the truth of the matter,\" you say. \"And I'd involve $!{Bishop} ${Iwan} and the $!{King} before I slew one of ${his} subjects.\"\n\t\t\t*goto part3_boy_alive\n\t\t*else \n\t\t\t*set tied_up true\n\t\t\tThe ${man} sprawls on the tiles and looks up at you, fury in ${his} eyes, fingers closing tight around ${his} knife. \"You'd free a ${boy} who consorts with demons!? Take them!\"\n\t\t\t\n\t\t\tIn a matter of moments you're surrounded by ${Dyfrig}'s ${men}. There are too many for you to fight. \n\t\t\t*if chapter8_freed_prisoners=false\n\t\t\t\tYou're helpless while they strip you and your companions of your weapons and tie you up with the villagers.\n\t\t\t*if chapter8_freed_prisoners\n\t\t\t\tYou're helpless while they strip you and your companions of your weapons.\n\t\t\t\n\t\t\t${Dyfrig} casually grips ${victim}'s jaw with one hand, and uses the other to slash across ${his} throat with ${his} knife. Blood gushes.\n\t\t\t*goto part3_boy_killed\n\t\t\t\n\t*if (tied_up) #\"${Dyfrig}! I know why ${he} has these dreams!\" I'll spin a lie to make ${his} nightmares plausible.\n\t\t\"What are you talking about?\" ${Dyfrig}'s eyes are on you.\n\t\t\n\t\t\"A pack of wolves has moved into these woods; they came down from the Felin valley. We've been tracking them. They've been troubling the livestock here, since there's precious little game at this time of year and this village has plenty of food. \n\t\t*comment Testing cunning\n\t\t*if (bravado\u003c40)\n\t\t\t*set acclaim %+15\n\t\t\t$!{He}'s heard them prowling around at night, that's all.\"\n\t\t\t\n\t\t\t$!{He} looks at you carefully, then back at the ${boy}. \"Hm. Perhaps. In the morning you shall show me these tracks, $!{Prince}.\"\n\t\t\t*goto part3_boy_alive\n\t\t*else\n\t\t\tThat's all it is.\"\n\t\t\t\n\t\t\t$!{He} looks at you carefully. \"That explains nothing. It appears, $!{Prince} ${Arthur}, that you don't have the stomach for dealing with those afflicted by evil. I pray for your people.\" With a swift, economical movement ${he} slashes ${victim}'s throat. Blood gushes.\n\t\t\t*goto part3_boy_killed\n\t\t\t\n\t#\"You're all followers of Christ! You can't allow this!\" I'll appeal to ${Dyfrig}'s followers.\n\t\t*if (diplomat>75)\n\t\t\t*set leader %+15\n\t\t\t*set warrior %-15\n\t\t\t\"There's nothing here to say ${he} deserves death; ${he}'s merely had dreams, and which of us have not? Can you, as true Christians, truly allow this? What of the stain on your soul for the killing of an innocent? Surely, at the least, this should go before the ${bishop}?\"\n\t\t\t\n\t\t\tOne of ${Dyfrig}'s ${men} licks ${his} lips. \"Perhaps, ${master}, we should investigate further?\"\n\t\t\t\n\t\t\t${Dyfrig} looks around ${his} followers; ${he} senses that the mood in the room has shifted. \"Interesting,\" ${he} remarks to you. \"Interesting that a $!{Prince} of this land would defend corruption in this way. Yes, perhaps we should indeed go to the ${bishop}.\"\n\t\t\t*goto part3_boy_alive\n\t\t*else\n\t\t\t\"There's nothing here to say ${he} deserves death; ${he}'s merely had dreams, and which of us have not? Can you, as true Christians, truly allow this? What of the stain on your soul for the killing of an innocent?\"\n\t\t\t\n\t\t\tThere's a moment where the attention of the room is on you; then ${Dyfrig}'s followers look at ${him} to respond, and you know you've lost them.\n\t\t\t\n\t\t\t\"Evil must be cut out, root and branch,\" says ${Dyfrig}. \"If our souls are tainted so that others may be saved, that is a price we will gladly pay.\" With a swift, economical movement ${he} slashes ${victim}'s throat. Blood gushes.\n\t\t\t*goto part3_boy_killed\n\t\t\t\n*comment --------------------------------------------------------------\n*label part3_boy_killed\n*page_break\n*set chapter8_boy_killed true\n\nSilence falls as everyone realizes what ${he}'s done; villagers stare.\n\n\"I will kill you for that,\" says ${Morgan} into the silence. $!{She}'s passed so far out through the other side of anger that ${she}'s perfectly still, and ${her_his} voice ice-cold.\n\n${Dyfrig} frowns, wiping ${his} blade on a rag. \"It is the Lord's work we do here. Who are you to speak against that?\"\n\n\"I am ${Morgan}, the ${daughter} of ${Vivian}, $!{Lady} of the Veiled Isle. In my veins runs the blood of Modron, of Afallach, of Beli Mawr. And with that blood I mark you, ${Dyfrig} of the Christ.\" $!{She} spits, full in ${his} face; blood flecks ${his} skin. $!{She}'s bitten ${her_his} tongue. \"So will the gods know you.\"\n\n${Dyfrig} backhands ${her_him} across the face.\n\n*if tied_up=false\n\t${Gawain} lurches forward; two of ${Dyfrig}'s followers grab ${him}.\n*if tied_up\n\t${Gawain} roars, straining against ${his} bonds, face purple.\n\n*goto part3_growling\n\n*comment --------------------------------------------------------------\n*label part3_boy_alive\n*page_break\n*set chapter8_boy_killed false\n*achieve save_dreamer\n\n${Dyfrig} steps away from the ${boy}. \"We will look into this matter further,\" ${he} says. \"For now, we will—\"\n\n*goto part3_growling\n\n*comment --------------------------------------------------------------\n*label part3_growling\n\n\"$!{Master}!\" A soldier stumbles into the temple. $!{He}'s dragging a second ${man}, or what's left of one—${he}'s clearly dead, the carcass trailing blood and gore across the tiles. The soldier, oblivious to what's going on in the hall, lays ${his} comrade down. \"I heard ${him} screaming. When I…when I got there, I found…this.\" There are tears in ${his} eyes. \"What's done this, $!{Master}?\"\n\nAs ${he} looks at ${Dyfrig}, a howl goes up from somewhere outside; it freezes the blood in your veins and drags a fingernail up your spine. \n*if chapter8_boy_killed=false\n\t${victim}'s eyes go wide. \"The dream! This is my dream!\"\n*if chapter8_boy_killed\n\t${Emrys} says softly, \"The ${boy}'s dream.\"\n\t\nA second howl rises, now from the other side of the temple. \"That's no wolf,\" says ${Gawain}. A third joins it, long, mournful and utterly chilling.\n\n\"The Saxons,\" says ${Emrys}.\n\n\"You, you and you!\" snaps ${Dyfrig} to three of ${his} men. \"Outside. Find the truth of this, and quickly!\"\n\n*if (tied_up)\n\t${Emrys} looks at you. \"${Arthur}?\"\n\t\n\t\"Free us,\" you say to ${Dyfrig}. \"These are raiders from the East. They will destroy everyone they find here. You will need every blade.\"\n\t\n\t*if (leader>60)\n\t\t*set tied_up false\n\t\t${Dyfrig} studies you thoughtfully for a moment. \"I'll have your oath, $!{Prince}, that you and yours will not raise sword against my ${men}.\"\n\t\t\n\t\t\"You have it.\"\n\t\n\t\t$!{He} slashes your bonds. You stand, shakily, massaging blood back into your wrists, and retrieve your sword and shield.\n\t*if (leader\u003c=60)\n\t\t${Dyfrig} shakes ${his} head. \"I'm not so foolish as that. Who's to say these aren't companions of yours trying to rescue you once they've distracted us? No. You stay bound. Bring them, they may be of use!\" Several of ${his} followers drag you and your companions out through the temple columns.\n\t*goto part4\n\t\t\n*if chapter8_boy_killed\n\t\"${Gawain}, ${Morgan},\" you say. \"Whatever argument we have with this ${man}, we have other troubles now. We'll deal with this later, yes?\"\n\t\n\t\"Aye,\" says ${Gawain} slowly, unhappily. The two ${men} holding ${him} release ${his} arms—${he} pulls away.\n\t\n\t\"${Morgan}?\"\n\t\n\t$!{She} looks at you. \"This is not finished, ${Arthur}.\"\n\t\n\t\"Not now. Later. I swear.\"\n\t*goto part4\n\t\n${Dyfrig} mutters something, eyes closed; you realize ${he}'s intoning a prayer. $!{He} crosses ${his} chest, and opens ${his} eyes and looks at you. \"Well, $!{Prince} of Gwynedd, shall we see what the night has brought us?\" $!{His} tone is calm and even. But there's nothing sane about the look in those eyes.\n*goto part4\n\t\n*comment --------------------------------------------------------------\n*comment                   Part 4: The Wolves Attack\n*comment --------------------------------------------------------------\n*label part4\n*page_break\n\n*temp dyfrig_ally\n*set dyfrig_ally false\n*temp dyfrig_alive\n*set dyfrig_alive true\n*temp dyfrigs_men_count\n*set dyfrigs_men_count 2\n*temp dyfrig_saw_angel\n*set dyfrig_saw_angel false\n\n*temp villagers_count\n*set villagers_count 4\n*temp villagers_fled\n*set villagers_fled false\n\nDarkness has fallen. The moon stands high and full above the trees, streaming pale light down on the village; the white stones gleam. A fire burns before the temple steps, no doubt set by ${Dyfrig}'s ${men} to warm themselves while they watch.\n\n*if tied_up\n\tAs you're dragged forward and dumped on the steps, \n*if tied_up=false\n\tAs you step through the columns,\nanother cry goes up; this is no howl, this is a tortured scream of pain from somewhere in the darkness to your right. A quartet of ${Dyfrig}'s followers, blades drawn, head into the night at a run.\n\nSilence for a time. You strain your ears, but there's nothing. And then they return, dragging something with them. A body in a grey cloak and mail. Another of ${Dyfrig}'s ${men}. But this one lacks a head.\n\nThey lay the body at the foot of the steps. ${Dyfrig} kneels, studying it, somber. $!{He} traces the gashes across the ${man}'s chest. Three wounds that have gone straight through the armor, splitting the rings. Three parallel slashes, choked with blood.\n\n*gosub_scene startup get_lover\n*if interest=\"morgan\"\n\t${Morgan} looks at you. \"${Cynric},\" ${she} says, voice flat.\n\t\n*if interest=\"gawain\"\n\t${Gawain} looks at you. \"${Cynric},\" ${he} says, voice harsh.\n\t\n*if interest=\"emrys\"\n\t${Emrys} looks at you. \"${Cynric},\" ${he} says in wonder.\n\nA howl goes up; then a second. On your far left, something—you only get a flash of it from the corner of your eye—erupts from the darkness and is gone again. One of ${Dyfrig}'s ${men} is dragged with it. One moment ${he}'s there, the next, gone.\n\n*page_break\n\n*gosub_scene startup get_god\n\n*if tied_up\n\t\"I know what this is!\" you snarl to ${Dyfrig}. \"Let us free, let us fight, ${god} take you!\"\n\t\n\t$!{He} looks at you, a hard, calculating look, and then reaches behind you and cuts your bonds. \"Free your companions,\" ${he} says. \"And tell me what you know, swiftly.\"\n\t\n*if tied_up=false\n\t\"I know what this is,\" you say quietly to ${Dyfrig}. \"I've fought it before.\"\n\t\n\t\"Tell me what you know—swiftly.\"\n\n*choice\n\t#\"It's ${Cynric}. $!{Son} of ${Cerdic} of the Saxons. $!{He} has some strange, dark power; ${he} escaped our fortress after slashing the throat out of one of our ${men}. I'd swear it's ${him}.\"\n\t\t\"Your enemy?\"\n\t\n\t\t\"Everyone's enemy.\"\n\t\t\n\t\t${Dyfrig} strides forward, calling for ${his} ${men}. \"Keep together. Don't be tempted into the darkness by them. Fall back to the pillars, the temple entrance; we'll defend there.\"\n\t\t\n\t\t*goto part4_steps\n\t\n\t#\"You wouldn't believe me. But it's no natural creature—this is something neither your God or your sword has strength against.\"\n\t\t*set old_faith %+15\n\t\t\"Hah! We will put that to the test.\" ${Dyfrig} pulls the cross ${he} wears from around ${his} neck and lifts it up in ${his} hand.\n\t\t*goto part4_steps\n\n\t#\"I think you might best call it a demon. You're a ${man} of God—perhaps the power of God can defeat it.\"\n\t\t*set old_faith %-20\n\t\tYou could swear that ${Dyfrig} smiles. There's a light in ${his} eyes—the light of a ${man} who has found what ${he}'s been seeking. \"Good, then. Let us see what we can accomplish, my God and I.\" $!{He} pulls the cross ${he} wears from around ${his} neck and lifts it up in ${his} hand.\n\t\t*goto part4_steps\n\t\n*label part4_steps\nThe ${men} fall back and stand with you on the temple steps. ${Dyfrig} raises ${his} voice. \"I know not what creatures you might be, but my faith in the Lord is strong, and my sword is keen. You will not prevail. Step out of the shadows, and come into the light.\"\n\nThere's a guttural laugh, a bark, in the darkness straight ahead of you. A figure steps forward; at first a silhouette, tattooed skin gleaming in the moonlight, then face lit red by the embers of the guttering fire. One long braid coils like a serpent from high on ${his} shaven scalp down to ${his} shoulder. $!{He}'s stripped from the waist up, \n*if gender=\"female\"\n\tsave for a single leather band across her breasts, \nand is all lean muscle. $!{His} arms and ${his} hands drip with gore, and ${his} eyes are jet black, with no sign of white. ${Cynric}.\n\n\"It is a demon,\" whispers ${Dyfrig}, more cowed than you've seen ${him}.\n\n\"No,\" says ${Emrys}. \"But something more than a ${man}. Be wary, ${Arthur}.\"\n\nThen two more forms step into the light, each bigger than ${Cynric}, each stripped to the waist and corded with bloodied muscle. One ${man}, one ${woman}, each with the same darkness in their eyes. None of them carry weapons.\n\n${Cynric} beckons. \"Come into the shadows,\" ${he} says, accent thick. \"Bring your God.\" \n\nThen all three vanish back into the darkness.\n\nYou've got to do something. You move closer to ${Dyfrig}.\n\n*choice\n\t#\"We can't hold. We need to get everyone out of here, a fighting retreat, before we're trapped.\"\n\t\t*goto part4_retreat\n\t\t\n\t#\"${Dyfrig}, we can hold the temple, if the villagers help us.\"\n\t\t*goto part4_protect\n\t\t\n\t#\"We should keep ${Cynric} and ${his} folk busy while the villagers escape.\"\n\t\t*goto part4_defence\n\t\t\n*comment --------------------------------------------------------------\n\n*label part4_retreat\n*if leader>65\n\t*set acclaim %+15\n\t*set dyfrig_ally true\n\t${Dyfrig} watches the darkness carefully for a moment, showing no sign that ${he}'s heard you; then, finally, ${he} nods. \"Very well. Pass the word, and quickly, before the wolves gather.\"\n\t\n*if leader\u003c=65\n\t${Dyfrig} watches the darkness carefully for a moment, showing no sign that ${he}'s heard you; then, finally, ${he} shakes ${his} head. \"Like a muddied spring or a polluted fountain is a righteous ${man} who gives way before the wicked.\"\n\t\n\t\"Stay and die, then,\" says ${Morgan}. \"Come on, Art.\"\n\nYou and ${Morgan} dash into the temple to find that the villagers who were tied up have already freed themselves. A handful of them are armed with staves, candlesticks, stones, anything they can find as weapons.\n\n*if dyfrig_ally\n\t\"We're going to get everyone out of here. ${Dyfrig} and ${his} ${men} too—they'll help us keep the Saxons back as we leave.\"\n\t\n*if dyfrig_ally=false\n\t\"We're going to get everyone out of here. ${Dyfrig} and ${his} ${men} will stay. That means we'll not have much protection on the journey; we'll need to be very careful.\"\n\n\"Where will we go to?\" It's ${cfather} ${Rhodri}, battered, but upright.\n\n\"There's a cave,\" says one of the other villagers. \"It's less than a mile; they won't know of it. We could wait there until light?\"\n\n\"What about ${dest}?\" asks ${Morgan}. \"It's not far—if we're quick on our feet, we could make it in two hours. There's a high stockade, and two dozen ${men} who're as good with a spear as an axe.\"\n\n\"We could make for the river,\" says ${Emrys}. \"If these…things…can track us, then we might walk down the river until we find somewhere safe to hide.\"\n\n*if dyfrig_ally\n\t${Dyfrig} and ${his} followers pull back into the hall. \"We have built the fire and riled them up with arrows. If we're to go, $!{Prince}, it's now!\"\n\t\n*if dyfrig_ally=false\n\tYou hear cursing and shouting from the front of the temple, and a howl goes up. \"If we're going to go, it's now,\" says ${Gawain}, appearing in the doorway.\n\n*temp lost_villagers\n*set lost_villagers 0\n\n*choice\n\t#\"The river. It'll be hard going, but it's safest.\"\n\t\t*gosub part4_escape\n\t\t*goto part4_escape_river\n\t\t\n\t#\"We should go to the cave—we have children, we have wounded, we can't walk far.\"\n\t\t*gosub part4_escape\n\t\t*goto part4_escape_cave\n\t\t\n\t#\"${dest} sounds best; we need a strong wall around us.\"\n\t\t*gosub part4_escape\n\t\t*goto part4_escape_hall\n\t\t\n*comment --------------------------------------------------------------\t\n*label part4_escape\nBetween you, you rally the villagers, and surround them as you all make a break through the rear of the temple into the night, ${Rhodri} ensuring every last one is through the door.\n\t\nYou have no light, but the bright moon shows you the path. \n*if dyfrig_ally\n\tAll move as silently and swiftly as they can. ${Dyfrig}'s followers carry the children and aid the wounded. \"I fear they're already after us,\" says ${Emrys}, quietly. \"We should have had something to keep them there, some distraction.\"\n\t\n\tEven as ${he} speaks, you hear a voice rise up in the distance. It quavers, but is loud…and the words are those of the Bible. You hear guttural laughter—the Saxons—but the voice continues, growing firmer. It's ${cfather} ${Rhodri}.\n\t\n\t\"$!{He}'s a dead ${man},\" says ${Gawain}, as a howl splits the air.\n\t\n\t\"And ${he} may have saved us,\" says ${Morgan}. \"Come on—quickly!\"\n\t*set lost_villagers 0\n\t*return\n\t\nAll move as silently and swiftly as they can, but it's slow going underfoot even with the light. You have injured with you, including ${Rhodri}. You can hear ${Dyfrig}'s voice back at the temple, and the ring and clatter of weapons, and harsh Saxon shouts.\n\nThen a howl goes up; and a second. Much closer to you than the fighting. \"They've scented us,\" says ${Emrys}. \"Run!\"\n\nYou hurry the people along; ${Gawain} picks up one of the children; ${Emrys} helps ${Rhodri}. You and ${Morgan} watch the rear and the flanks.\n\nAnd then a scream, and one of the ${men} on the right flank disappears under a shadowy figure. Then ${cfather} ${Rhodri} is dragged from ${Emrys}'s side.\n\n*comment Testing cunning\n*if (bravado\u003c40)\n\t*set acclaim %+15\n\t${Emrys} raises ${his} hands—you see spark on flint, and then suddenly a great burst of light flares up in front of the Saxon. You see pure shock on the ${man}'s face as ${he} struggles to see; you take the opportunity and slice your sword into ${his} chest. Then you grab ${Rhodri} and drag ${him} with you.\n\t\n\t${Morgan} takes ${Emrys} by the shoulder and, together, you run.\n\t*set lost_villagers 1\n\t*return\n\nYou hear a harsh gurgle of pain from the ${priest}. \n\n${Morgan} shakes ${her_his} head at you. \"Go! Go!\" $!{She} grabs ${Emrys}'s shoulder and, together, you run.\n*set lost_villagers 2\n*return\n*comment --------------------------------------------------------------\t\n*label part4_escape_hall\n*page_break\nBy the early hours you are at ${dest}, the village and the Saxons behind you, where you find shelter, and where you also find ${Cai} dozing in front of a fire, having found ${his} way to the hall. \n*if lost_villagers=0\n\tNot a villager has been lost; but ${Cynric} and ${his} ${men} are free to roam these valleys, for now.\n\t\n*if lost_villagers=1\n\tIn all there's only a broken, tattered band of villagers, and ${Cynric} and ${his} ${men} are free to roam these valleys, for now.\n\t\n*if lost_villagers=2\n\tOnly stragglers remain from the village; you can only hope that some still live, scattered in the forest, and that they will find their way to safety. ${Cynric} and ${his} ${men} are free to roam these valleys, for now. \n\t\nYou head back to Dinas Emrys to warn ${Bedwyr} and the $!{King}.\n*finish\n\n*comment --------------------------------------------------------------\t\n*label part4_escape_river\n*page_break\n\n*if lost_villagers=0\n\tYou work your way along the river swiftly but carefully, and after an hour's travel you take shelter in a hollow near an old Roman bridge. Not a villager has been lost, but you're all shivering and tired. When light comes, you strike out for the nearest settlement. ${Cynric} and ${his} ${men} are free to roam these valleys, for now.\n\t\n*if lost_villagers=1\n\tYou splash into the river and then lead the frightened remnants of the villagers as swiftly and quietly as you can. After an hour's travel you take shelter in a hollow near an old Roman bridge. You've lost many people, and you're all shivering and tired. When light comes, you strike out for the nearest settlement. ${Cynric} and ${his} ${men} are free to roam these valleys, for now.\n\t\n*if lost_villagers=2\n\tYou splash into the river and make your way up it as fast as you can. When finally, exhausted, you struggle out to take shelter, only stragglers remain from the village. You can only hope that when light comes some still live, scattered in the forest, and that they will find their way to safety. ${Cynric} and ${his} ${men} are free to roam these valleys, for now. \n\t\nYou head back to Dinas Emrys to warn ${Bedwyr} and the $!{King}. And there you find ${Cai} dozing in front of the fire, having found ${his} way back to the road.\n*finish\n\n*comment --------------------------------------------------------------\t\n*label part4_escape_cave\n*page_break\n\n*if lost_villagers=0\n\tIt's not long before you reach the cave; it's warm and dry, and well-hidden from sight. Not a villager has been lost, but ${Cynric} and ${his} ${men} are free to roam these valleys, for now.\n\t\n*if lost_villagers=1\n\tIt's not long before you reach the cave; it's warm and dry, and well-hidden from sight. However, you lead only a small, tattered band of remaining villagers, many wounded. You're forced to wait until light comes before striking out for the nearest settlement. ${Cynric} and ${his} ${men} are free to roam these valleys, for now.\n\t\n*if lost_villagers=2\n\tYou stumble across the cave almost by accident; ${Morgan} spied the entrance. It's warm, dry, and well-hidden from sight. You collapse there, exhausted. By dawn, only one or two villagers have joined you. You can only hope that when light comes some still live, scattered in the forest, and that they will find their way to safety. ${Cynric} and ${his} ${men} are free to roam these valleys, for now. \n\t\nYou head back to Dinas Emrys to warn ${Bedwyr} and the $!{King}. And there you find ${Cai} dozing in front of the fire, having found ${his} way back to the road.\n*finish\n\n*comment --------------------------------------------------------------\n\n*label part4_protect\n\n*if diplomat\u003c=65\n\t${Dyfrig} watches the darkness carefully for a moment, showing no sign that ${he}'s heard you; then, finally, ${he} shakes ${his} head. \"I will not stand with godless heathens. I have a mission here, that is clear—to destroy these creatures of darkness.\"\n\t\n\tWith that ${he} gives a shout, and raises ${his} sword high. \"$!{Brother}s of Christ! We have at last found that which we've spent so long searching for. Here is our foe; here is our chance to make a difference in this world. The Lord calls us. Blessed be the Lord, my rock, who trains my hands for war, and my fingers for battle.\"\n\t\n\t$!{His} ${men} echo the blessing, some kiss crosses that hang as pendants around their necks. Then they lift up shields, raise swords, and walk forward into the darkness.\n\t\n\t\"Idiots,\" mutters ${Morgan}. \"Come on, Art, we've barricades to build; at least they've bought us time.\"\n\t*page_break\n\t\n*if diplomat>65\n\t*set dyfrig_ally true\n\t${Dyfrig} watches the darkness carefully for a moment, showing no sign that ${he}'s heard you; then, finally, ${he} nods. \"Very well. Pass the word, and quickly, before the wolves gather. Arm them with what you can. Barricade where you can.\"\n\nYou and ${Morgan} dash into the temple to find that the villagers who were tied up have already freed themselves. A handful of them are armed with staves, candlesticks, stones, anything they can find as weapons. \"Any loose blocks, any tables, bits of wood, statues, anything you can find,\" you tell them. \"Pile it up in front of the doors—let's make them pay for every inch.\"\n\n\"And light more torches,\" adds ${Emrys}. \"They fight in the darkness; let's deny it to them.\"\n\n*comment Calculations here will be used at the end to figure out who's left\n*if (dyfrig_ally) and (warrior>50)\n\t*set villagers_count -1\n\t*goto part5\n\n*elseif (warrior>60)\n\t*set villagers_count -2\n\t*goto part5\n\n*else\n\t*set villagers_count -3\n\t*goto part5\n\n*comment --------------------------------------------------------------\n\n*label part4_defence\n\n*if diplomat\u003c=65\n\t${Dyfrig} watches the darkness carefully for a moment, showing no sign that ${he}'s heard you; then, finally, ${he} shakes ${his} head. \"Let the villagers do what they will; I'll not protect godless heathens. I have a mission here, that is clear—to destroy these creatures of darkness.\"\n\t\n\tWith that ${he} gives a shout, and raises ${his} sword high. \"$!{Brother}s of Christ! We have at last found that which we've spent so long searching for. Here is our foe; here is our chance to make a difference in this world. The Lord calls us. Blessed be the Lord, my rock, who trains my hands for war, and my fingers for battle.\"\n\t\n\t$!{His} ${men} echo the blessing, some kiss crosses that hang as pendants around their necks. Then they lift up shields, raise swords, and walk forward into the darkness.\n\t\n\t\"Idiots,\" mutters ${Morgan}. \"But it might give a breathing space for people to escape. Come on, Art, we need to free them and to do what we can to buy them more time.\"\n\t*page_break\n\n*if diplomat>65\n\t*set dyfrig_ally true\n\t${Dyfrig} watches the darkness carefully for a moment, showing no sign that ${he}'s heard you; then, finally, ${he} nods. \"Very well. Pass the word, and quickly, before the wolves gather. Barricade where you can to
