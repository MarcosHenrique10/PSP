roid's eye lights up. \"Yes!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou cough up the dough, and the Spheroid suddenly becomes much more animated. He even chats with you as he leads you through the alleys. You soon find yourself before a spectacularly seedy bar. Once he's shown you the place, he vanishes back into the alleys. \n\t\t\t\t\t\t*set cash -10\n\t\t\t\t\t\t*goto seedy_bar\n\n\t\t\t\t\t#I follow him!\n\t\t\t\t\t\t*if stealth > 55\n\t\t\t\t\t\t\tYou pace behind the Spheroid, slipping in and out of the shadows. Once or twice, he turns around, his massive eye watering, but he never sees you. You're just too stealthy!\n\n\t\t\t\t\t\t\tAt last, he goes into a spectacularly seedy bar. You find a hiding place in a nearby alcove and wait. Minutes pass, and then a different Spheroid emerges, clutching some brightly colored Earth confectionery.\n\t\t\n\t\t\t\t\t\t\tYou've found the place.\n\t\t\t\t\t\t\t*goto seedy_bar\n\t\t\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou pace behind the Spheroid, but your feet get tangled in each other, and you stumble into him. He rolls forward. Upon coming to a stop, he stares at you blankly.\n\n\t\t\t\t\t\t\t\"I tell you more?\" he asks.\n\n\t\t\t\t\t\t\t\"Yes!\" you gasp. \n\t\t\t\t\n\t\t\t\t\t\t\tAnother pause. It's like talking to stone. A very reticent stone. He's about as round as one, too. \n\t\t\n\t\t\t\t\t\t\t\"What?\" you say.\n\n\t\t\t\t\t\t\t\"Money.\"\n\n\t\t\t\t\t\t\tOf course. Bribery is unfortunate, but often necessary. You cough up the dough, and soon find yourself before a spectacularly seedy bar. Once the Spheroid has shown you the place, he vanishes back into the alleys. \n\t\t\t\t\t\t\t*set cash -10\n\t\t\t\t\t\t\t*goto seedy_bar\n\n\t\t\t#The Chiroptera.\n\t\t\t\tAs you approach, the Chiroptera's huge ears swivel towards you, their delicate pink edges quivering. It's unnerving, talking to what looks like a skinny bat as tall as you are. \"PGPB,\" she says. \n\n\t\t\t\tYou're impressed; Chiroptera have no eyes. \"Right.\"\n\n\t\t\t\t\"You walk like one.\"\n\n\t\t\t\tWell then. \"Clever, aren't you?\"\n\n\t\t\t\t\"Observant.\"\n\t\t\t\t*page_break Observant And Creepy\n\n\t\t\t\t\"You observe any Earth contraband?\" you ask.\n\n\t\t\t\t\"Perhaps.\"\n\n\t\t\t\tYou're already reaching for your cash when she shakes her head. Her leathery wings fold and unfold reflexively, displaying deep purple veins along their undersides. \"It is bad, the channels opening. We are stable now. Barely, but stable.\"\n\n\t\t\t\t\"And that might change?\"\n\n\t\t\t\t\"Will change. The signs are there, for those who can see them.\"\n\t\t\t\t*page_break Really Creepy\n\n\t\t\t\t*label cool_chiroptera\n\t\t\t\tBefore you can speak, she says, \"I do not live here by choice—the PGPB has shut down many options for my family. Crime is all they had. Still, I do not want the rising tide to come. Things are afoot, agent. Follow me.\"\n\n\t\t\t\tThis is getting more and more bizarre, but you trail after her. Though blind, she weaves easily through the crowds of aliens, depositing you in front of a seedy bar. With one skinny claw, she touches your arm. \"Fix this.\"\n\n\t\t\t\t\"I'll try.\"\n\t\t\t\t*goto seedy_bar\n\n\t#I pose as a tourist.\n\t\t*set stealth %+20\n\t\tTourists are nonthreatening, likely to get passed over. Unfortunately, everyone in the galaxy knows that humans haven't even made it past their moon. You need a disguise. Luckily, there's a few things in your pack. Some grey daub, prostheses, and stage makeup, and you're good to go.\n\t\t*page_break Look At You\n\n\t\tTrudging down the Strip, you're anonymous in a sea of aliens looking to lose money and have a good time. The omnipresent drizzle makes your makeup itch like thousands of mosquito bites. Yet another sacrifice for the job.\n\n\t\tThe neon and signage may be impressive, but only petty dealings happen on the Strip. If you're going after the big fish, you need a deeper, darker pond.\n\t\t*page_break Hang A Left\n\n\t\tThe main thoroughfare nearly blinded you. In the alleys, you struggle to see. There isn't actually much movement on the streets. A few aliens lounge on doorsteps, but most of the action here takes place behind closed (and often bolted) doors.\n\n\t\tA Spheroid trundles up beside you, trotting to keep up on his stubby legs. \"Lost?\"\n\n\t\t*choice\n\t\t\t#\"Yes, can you recommend a bar?\"\n\t\t\t\tThe Spheroid blinks. \"Drink?\"\n\n\t\t\t\t\"Drink, and also…\" You wink. \"Souvenirs. Earth souvenirs.\"\n\n\t\t\t\tThe pebbly blue skin around the Spheroid's single eye crinkles. Then, \"Yes!\" \n\n\t\t\t\tA few more twists and turns, and you're standing before a spectacularly seedy bar.\n\n\t\t\t\t*goto seedy_bar\n\n\t\t\t#\"No, doing just fine, thanks.\"\n\t\t\t\tYou must be too self-assured for a tourist, because the Spheroid keeps right on your heels. His single eye blinks. \"Where you going?\"\n\n\t\t\t\t\"None of your business.\"\n\n\t\t\t\t\"Look human.\"\n\n\t\t\t\tYou freeze. \"What?\"\n\n\t\t\t\t\"Look like human. Like human things?\"\n\n\t\t\t\tAha. You nod. A few more twists and turns, and you're standing before a spectacularly seedy bar.\n\t\t\t\t*goto seedy_bar\n\n\t\t\t#\"I'm okay, I'm meeting a friend.\"\n\t\t\t\t\"Meeting friend with stunner like that?\"\n\n\t\t\t\tYou probably could have concealed it better. \"I carry one for protection.\"\n\n\t\t\t\tThe Spheroid doesn't miss a beat. \"Me too.\"\n\n\t\t\t\tYou look down. It's bigger than yours. You gulp.\n\n\t\t\t\t\"Why you carry stunner?\" the Spheroid asks.\n\n\t\t\t\t\"Protection.\"\n\n\t\t\t\t\"Me too.\"\n\t\t\t\t*page_break Such A Conversationalist\n\n\t\t\t\t\"Why you here? Strip back there.\"\n\n\t\t\t\t\"I'm looking for Earth souvenirs.\"\n\n\t\t\t\tThe Spheroid falls silent. \"I can find.\"\n\n\t\t\t\tThere's a strange sureness in his voice. You nod, and follow him deeper into the alleys. A few more twists and turns, and you're standing before a spectacularly seedy bar.\n\n\t\t\t\t*if observation \u003c 55\n\t\t\t\t\tYou turn to thank him, and notice your pockets feel lighter. The sneak took some of your Standard Currency Units! \n\t\t\n\t\t\t\t\tGrumbling and promising yourself that you'll pay closer attention, you survey the storefront. \n\t\t\t\t\t*set cash -20\n\t\t\t\t\t*goto seedy_bar\n\t\t\t\t*else\n\t\t\t\t\t*goto seedy_bar\n\n\t#I pass as another smuggler.\n\t\t*set rule_bender %+20\n\t\tIt doesn't happen often, but sometimes a PGPB agent goes rogue. When that happens, they're cut off, left to fend for themselves. A few humans have gone that route, so you're not stretching plausibility too far.\n\n\t\tYou need one last touch for your smuggler get-up. What's it going to be?\n\t\t*fake_choice \n\t\t\t#A wide-brimmed hat to hide my face.\n\t\t\t#A bowtie. Bowties are cool.\n\t\t\t#My jacket. It's still raining.\n\t\t\t#Fake scars. It'll make me look tough.\n\n\t\tYou hit the Strip, but don't stay long. A real smuggler wouldn't waste time among the flashing lights. If you're looking for trouble, you go straight to the source—the knotted backstreets.\n\n\t\tMost aliens give you a wide berth, but you sense some appraising gazes. \n\n\t\tJust as you're fruitlessly turning another corner, there's a commotion up ahead. There's a bat-like Chiroptera pressed against a wall, surrounded by a cadre of Spheroids. She looks like a skinny bat about your height, and she's trembling, large ears pressed flat to her skull, eyeless face pointed downwards. \n\n\t\tThe Spheroids have guns.\n\t\t*choice\n\t\t\t#I walk by. This isn't my fight.\n\t\t\t\tIt's too bad, but there's nothing you can do. You walk straight past the Chiroptera, ignoring the screams that echo down the alleyway. \n\n\t\t\t\tThe sudden silence following is harder to ignore. But hey, you made your choice.\n\t\t\t\t*set justice %-30\n\t\t\t\t*goto shifty_guide\n\n\t\t\t#I try to defuse the situation.\n\t\t\t\t\"What's happening here?\"\n\n\t\t\t\tAs one, the Spheroids turn towards you.\n\t\t\t\t*if persuasion > 60\n\t\t\t\t\t\"Look, you guys are obviously confused.\" You slip between the round Spheroids and the Chiroptera, putting your arm around her bony shoulders. \"You thought this was a rat, but she's my associate. Thanks for finding her!\"\n\n\t\t\t\t\tAnd before the Spheroids can react, you've whisked her away.\n\t\t\t\t\t*set justice %+25\n\t\t\t\t\t*page_break\n\t\t\n\t\t\t\t\t*label chiroptera_safe\n\t\t\t\t\t*achieve rescuer\n\t\t\t\t\t\"Are you all right?\" you ask, once you've reached a safe distance.\n\n\t\t\t\t\tHer ears twitch. \"You are human.\"\n\n\t\t\t\t\t\"How…?\"\n\n\t\t\t\t\t\"You sound like one.\" She tilts her head. \"You know, there have been human products coming through here.\"\n\n\t\t\t\t\t*goto cool_chiroptera\n\t\t\t\t*else\n\t\t\t\t\t*label spheroid_attack\n\t\t\t\t\tAnd almost immediately they attack, leaving you in a heap in the gutter. At least your heart was in the right place, though that's small consolation as you stagger down the street.\n\t\t\t\t\t*set combat %-10\n\t\t\t\t\t*set justice %+25\n\t\t\t\t\t*goto shifty_guide\n\n\t\t\t#I charge to the rescue, weapon readied.\n\t\t\t\tYou draw your gun and spring forward. The Spheroids swivel as one.\n\t\t\t\t\n\t\t\t\t*if combat > 60\n\t\t\t\t\tA few shots to stun them, coupled with a few well-placed kicks and punches, render them mostly immobile. Spheroids make a soft, sucking sound when struck—you never get used to it. The more mobile ones scatter, and you grab the Chiroptera.\n\t\t\t\t\t*set justice %+15\n\t\t\t\t\t*goto chiroptera_safe\n\t\t\t\t*else\n\t\t\t\t\tYou're quick, but the Spheroids bowl you over. The most sensitive part of a Spheroid is its eye, but you never aim well enough to hit the target. \n\n\t\t\t\t\tAfter making short work of you, they leave you in a heap in the gutter. Your wallet's lighter now, but  they didn't take everything. At least your heart was in the right place, though that's small consolation as you stagger down the street. \n\t\t\t\t\t*set cash -10\n\t\t\t\t\t*set justice %+15\n\t\t\t\t\t*goto shifty_guide\n\n\t\t\t#I take their information for a later arrest.\n\t\t\t\tStanding close, but not too close, you causally fish out your communicator and start taking notes. The Chiroptera begins screaming as they move in on her, but you need to remain aloof. Professional. There is protocol to follow, and it doesn't involve you jumping in as a lone wolf.\n\n\t\t\t\tIt's for the best. It's also hard to convince yourself of that. \n\n\t\t\t\tEspecially when the screaming stops.\n\t\t\t\t*set justice %-15\n\t\t\t\t*set resolve %-15\n\t\t\t\t*set rule_bender %-15\n\t\t\t\t\n\t\t\t\t*label shifty_guide\n\t\t\t\tFinally, down a dead-end alley, you find a hungry-looking Hirsus. His fur bristles as you draw near. \"What?\" he says.\n\t\t\t\t\n\t\t\t\t\"Look,\" you answer. \"I've had a very bad day. I'm looking for products from Earth.\"\n\n\t\t\t\t\"Aren't you from Earth?\"\n\t\t\t\t\n\t\t\t\tYou force laughter. \"Sharp brain you got there. What makes you think I'm allowed back?\"\n\n\t\t\t\tThe Hirsus shrugs. \"Fair point.\"\n\n\t\t\t\t\"Can you help me or not?\"\n\n\t\t\t\t\"Maybe….\" The alien shakes his shaggy head. \"Got any coin?\"\n\n\t\t\t\tYou do, and at this point, you're willing to pay just about anything. Soon enough, he takes you to a bar set well back from the main road. He doesn't stay long, though. Once you hand over his payment, he disappears.\n\t\t\t\t*set cash -15\n\t\t\t\t*goto seedy_bar\n\n*label seedy_bar\nDirt streaks the bar's window. The name is barely visible under all the filth, but you can still make it out: \"The Bast and Vi.\" Once, it was a favorite haunt of the Jackalope, one of the most slippery members of the galactic criminal underworld. \n\nInside, aliens hunch around battered tables. They clutch cracked mugs and clouded bottles, murmuring to each other as you head to the bar.\n\n\"Give me a…\"\n\nWait. What are you drinking?\n*fake_choice\n\t#Klaatu.\n\t#BadWolf.\n\t#Mead.\n\t#Kali-fal.\n\n*label bar_choice\n*set cash -1\nSipping your drink, you scan the crowded room. There's a low rumble of conversation; it's not as rowdy as you expected. But as your dear old grandmum used to say, \"The river runs silent when the water is deep.\" Something's up. You just need to find out who's got the goods. \n\n*choice\n\t*disable_reuse #I chat up the bartender.\n\t\tReapproaching the bar, you flash the bartender a smile. \"I'll take another, please.\"\n\n\t\tThe bartender's a chupacabra. His hairless snout quivers as he polishes a glass. \"Thirsty, are you?\"\n\t\t*if persuasion > 65\n\t\t\tWith a fresh drink in hand, you settle into an easy conversation with the bartender. You let him air some grievances (the liquor license inspectors even make it here, and patrons stiff on tips), let him feel comfortable.\n\n\t\t\tGradually, you turn the discussion towards Earth goods. At first, the bartender is reluctant, but you wear him down.\n\n\t\t\t\"I guess,\" he says slowly, \"that if I were interested in Earth goods, I'd check the back room.\"\n\n\t\t\tYou tip him extremely well.\n\t\t\t*set cash -5\n\t\t\t*goto backroom\n\t\t*else\n\t\t\tYou nurse your drink, but no matter what you do, you can't get the bartender to open up. Not even a big tip will do it. And so, you're back to square one. \n\t\t\t*set cash -5\n\t\t\t*goto bar_choice\n\n\t#I take a surveillance position.\n\t\tYou settle into a corner booth, a little removed from the action, but not so much that you're blind to what's happening. As you watch the other patrons, you set you drink down. When you try to lift it again, it sticks to the table.\n\n\t\tYou try not to touch the table anymore.\n\t\t\n\t\t*if observation > 65\n\t\t\tAfter a while, you notice a pattern. Aliens keep heading towards the back, re-emerging with what passes for smiles on their alien faces. Some of them are patting suspicious lumps in their clothing.\n\n\t\t\tYou slide from the booth and stroll after the aliens.\n\t\t\t*goto backroom\n\t\t*else\n\t\t\tAfter a while, all you have is a sore throat and a numb bottom. Your communicator flashes. Tweel won't call you undercover—this is a text.\n\n\t\t\t\u003cAgent ${name}, give status.>\n\t\t\t\n\t\t\t\u003cLocation found. Seeking target.>\n\t\t\t\n\t\t\t\u003cSTILL?!>\n\t\t\t*page_break Ouch\n\n\t\t\t*label tweel_bar_hint\n\t\t\tYou hurry to tap out a response, but Tweel's comes first. \u003cHold position. Intel working.>\n\t\n\t\t\tFeeling like a scolded child, you can do nothing but twiddle your thumbs. At last, the device flashes again. \u003cGoods coming through back room. Very disappointed in you. Expect demotion.>\n\n\t\t\tWell, at least you have a lead, even if Tweel is furious. The demotion sure stings, though. You hate when your Clearance Level drops.\n\t\t\t*set clearance -15\n\t\t\t*set relationship_tweel %-20\n\t\t\t*goto backroom \n\n\t*disable_reuse #I set a cunning trap.\n\t\tNow, where will the aliens be vulnerable? The answer is obvious: there are plenty of historical examples of traps set in bathrooms. And so, you slip through a back hallway to the facilities. This bar has four different rooms for use by eleven distinct genders. Honestly, that seems a little restrictive.\n\t\t\n\t\tWhich door do you choose?\n\t\t*fake_choice\n\t\t\t#One.\n\t\t\t#Two.\n\t\t\t#Three.\n\t\t\t#Four.\n\n\t\tBehind the door, there's a few battered sinks and some stalls. You grab the one at the end and lie in wait. \n\n\t\tNot that you have to wait long. The door opens again shortly and claws click across the dirty linoleum. There are sounds a few stalls down, and then the sink runs. \n\t\t\n\t\tYou open the door.\n\t\t*page_break Crrreak\n\n\t\tA chupacabra washes his paws. Mangy fur grows in patches across his flanks and down his spine. For a chupacabra, he actually has a fairly thick pelt. \n\t\t\n\t\t*if combat > 65\n\n\t\t\tThe chupacabra never sees it coming. Striking with lightning quickness, you leap on the chupacabra's back. His bare skin is clammy and pebbly, easy enough to grip.\n\n\t\t\tThe chupacabra snarls, ragged ears flattened. Grappling for purchase, you manage to jam your stunner against the chupacabra's head. He catches sight of his own reflection in the cracked mirror and stops.\n\n\t\t\t\"Right,\" you say. \"I'm looking for the Earth goods.\"\t\n\t\t\t*page_break\n\n\t\t\tThe chupacabra's wrinkled lips lift from his fangs. He doesn't say anything, just growls.\n\n\t\t\tYou press the stunner more firmly. \"Tell me and I'll make it easy on you.\"\n\n\t\t\t\"Back room,\" the chupacabra snarls. You barely understand it, even with the universal translator. \"Get off me, human.\"\n\n\t\t\tJust as you reach the door, he calls after you, rubbing his head. \"Peejer thug!\"\n\n\t\t\tYou know the derogatory term for PGPB agents. You're not used to being called \"thug,\" though. It hits you hard. What is the PGPB doing to you?\n\t\t\t*goto backroom\n\n\t\t*else\n\t\t\tYou come racing out, but the chupacabra sees you in the mirror. Without rustling one greasy hair on that pelt, he flips you, steps on your chest while washing his paws, spits, and leaves.\n\n\t\t\tIf only he'd just wounded your pride. Alas, you've got a couple of nice bruises now.\n\n\t\t\tThen your communicator flashes. Tweel won't call you undercover—this is a text.\n\n\t\t\t\u003cAgent ${name}, give status.>\t\n\t\t\t\n\t\t\t\u003cLocation found. Seeking target.>\n\t\t\n\t\t\t\u003cSTILL?!>\n\t\t\n\t\t\t*goto tweel_bar_hint\n\n*label backroom\n*page_break\nBehind the main barroom, there's a narrow, dimly lit hallway. Faded, peeling posters of alien entertainment acts are tacked to the walls; it feels like the images watch you. A black door meets you at the end of the hall, guarded by a squat Spheroid.\n\nHis eye is closed. His breathing is deep and even.\n\n*if stealth > 60\n\tYou creep past the guard. He snores softly. You freeze until he goes quiet again. Easy, now. You push the door silently. Stealthily.\n\n\tYou're in.\n\t*goto contraband\n*else\n\tThe Spheroid snores. You go to creep past, but you brush too closely. The edge of your sleeve brushes his side.\n\n\tHe jerks awake. \n\n\t*choice\n\t\t#I knock him back out.\n\t\t\t*if combat > 60\n\t\t\t\tOne quick strike to his head, and he's out cold. You waltz past. You're in.\n\t\t\t\t*goto contraband\n\t\t\t*else\n\t\t\t\tHe shakes his head, blinking. You freeze. But instead of calling for more security, he holds out his stubby palm, grinning.\n\n\t\t\t\tYou liked having money, once….\n\t\t\t\t*set cash -5\n\t\t\t\t*goto contraband\n\t\t#I talk him into letting me through.\n\t\t\t*if persuasion > 60\n\t\t\t\tYou've always been the persuasive type. Weaving an intricate web of lies—your ill mother, a misplaced present, some blazing hot sauce—you win his sympathies. Or maybe you just confuse him. Doesn't matter. You're in!\n\t\t\t\t*goto contraband\n\t\t\t*else\n\t\t\t\tYou start telling the guard a sad tale of woe, but he shakes his head abruptly in the middle of it. Your voice trails off, and your heart pounds. But instead of calling for more security, he holds out his stubby palm, grinning.\n\n\t\t\t\tYou liked having money, once….\n\t\t\t\t*set cash -5\n\t\t\t\t*goto contraband\n\t\t#I run like all heck.\n\t\t\t*if resolve > 60\n\t\t\t\tYou were waiting for this. The instant his eye flutters open, you dart past. You're through before he can blink.\n\t\t\t\t*goto contraband\n\t\t\t*else\n\t\t\t\tYou think you're ready to run, but a single moment of hesitation dooms you, that one instant when your resolve falters. Before you can move, the Spheroid grabs your wrist. He holds out his other palm, grinning.\n\n\t\t\t\tYou liked having money, once….\n\t\t\t\t*set cash -5\n\t\t\t\t*goto contraband\n\n*label contraband\nThe door opens onto a square room. The ceiling is a couple of feet higher than your head, but it's stacked with so many crates that the room seems three times smaller than it actually is. All sorts of goods spill from the crates onto the floor.\n\nYou see candy bars, some electronics, a few samples of fruit and seeds (you make a mental note: those are biohazards on the wrong planet), and box upon box of glow-in-the-dark watches.\n\nTo your surprise, a grey-skinned Skeeret sits cross-legged in the middle, scribbling furiously on a notepad. Paper—no way to trace it. Clever.\n*page_break\n\n*if (silver_hardworker = true) or (silver_soubrette = true)\n\t*set skeeret_him \"her\"\n\t*set skeeret_his \"her\"\n\t*set skeeret_she \"she\"\n\t*goto agents_rogue\n\n*else\n\t*set skeeret_him \"him\"\n\t*set skeeret_his \"his\"\n\t*set skeeret_she \"he\"\n\t*goto agents_rogue\n\n*label agents_rogue\nThe Skeeret have had connections to Earth for a while; the aliens who landed at Roswell were Skeeret. This one is slight, but built compactly, with a fair bit of muscle. Black, almond-shaped eyes meet yours, and ${skeeret_she} smirks.\n\n\"I've got a guard outside,\" ${skeeret_she} says flatly. \"Just because the Jackalope ain't here no more don't mean you can push me around.\"\n\n\"I know.\" You crouch next to ${skeeret_him}. \"Don't worry; no guns, just talk.\"\n\nAt that, ${skeeret_she} snorts, but you notice ${skeeret_him} looking at you with keen interest. Actually, it's more than interest. If you didn't know better, you'd think it was a very special kind of hunger.\n\nBut there isn't time for that now. You need to find out where on Earth these goods originate. But how?\n\n*choice \n\t#I offer to buy, to gain ${skeeret_his} trust.\n\t\t\"Seriously.\" You pick up a watch. \"I'm here to buy.\"\n\n\t\tThe Skeeret eyes you. \"Really?\" Tilting ${skeeret_his} head, ${skeeret_she} lets ${skeeret_his} tongue flicker over ${skeeret_his} lips. \"Is that all?\"\n\n\t\tThe alien is flirting with you. You almost can't believe it.\n\n\t\t*choice\n\t\t\t#I flirt right back.\n\t\t\t\t\"No,\" you say. \"I also wanted to see a lovely face.\"\n\n\t\t\t\tThe Skeeret's eyes widen, but you know that's a smile for ${skeeret_him}. \"Well, then we both got our wish.\"\n\n\t\t\t\tOh, ${skeeret_his} tone is practically a purr. This is getting very heated, very quickly.\n\n\t\t\t\t*choice\n\t\t\t\t\t#That's fine, I want to see where this goes.\n\t\t\t\t\t\t\"So…\" you say. \"You must see a lot of people passing through here.\"\n\t\t\t\t\n\t\t\t\t\t\tThe Skeeret shrugs. \"No one memorable.\" And then ${skeeret_she} winks, a trait common to both your species. \"But you, I'll remember.\"\n\n\t\t\t\t\t\t\"And I'll remember you.\" Funny, you actually will. There's something about ${skeeret_him}, something spirited that you like. \"Uh, so this is awkward, but do you have a communicator?\"\n\n\t\t\t\t\t\t\"Several,\" ${skeeret_she} says briskly. \"I'll give you the safe one. I'm Ket, by the way.\"\n\n\t\t\t\t\t\t\"${name},\" you answer. As ${skeeret_she} dictates ${skeeret_his} communicator's signature, you nod towards the watches.\n\t\t\t\t\t\t*set skeeret_flirt true\t\t\t\t\t\t\n\t\t\t\t\t\t*goto where_are_they_from\n\n\t\t\t\t\t#I dial it back, I am technically on the clock.\n\t\t\t\t\t\t\"Uh, so…\" you stammer, drawing back from the Skeeret. \"Those are nice watches.\"\n\n\t\t\t\t\t\t\"I've seen nicer things.\"\n\t\n\t\t\t\t\t\tThat's it. You are keeping at least a double-arm's length between you at all times. You grab one of the watches and inspect it very, very closely, never once looking up at the Skeeret.\n\t\t\t\t\t\t*goto where_are_they_from\n\n\t\t\t\t\t#I stop flirting outright.\n\t\t\t\t\t\tThat was fun, but now it's back to business for you. You feel your spine stiffen, like you're at the Academy. With a professional air, you inspect the watches.\n\t\t\t\t\t\t*goto these_are_great\n\t\t\n\t\t\t#I ignore ${skeeret_his} signals.\n\t\t\t\tThe Skeeret seems very nice, and you actually quite like ${skeeret_his} hint of sassiness, but you're not interested. Instead, you pore over the goods, stopping to linger over the glow-in-the-dark watches.\n\t\t\t\t*goto these_are_great\n\n\t\t\t#I shut ${skeeret_him} down before this gets out of hand.\n\t\t\t\t\"Look,\" you say, \"I'm flattered, but I'm really just here on business.\"\n\n\t\t\t\tThe Skeeret looks down, ${skeeret_his} narrow shoulders hunching. \"Are you sure?\"\n\n\t\t\t\t\"Positive,\" you say, picking up one of the glow-the-dark watches.\n\t\t\t\t*goto these_are_great\n\n\t\t*label these_are_great\n\t\t\"These are great,\" you say, \"I'll take a box.\" As ${skeeret_she} starts to smile, you add, \"No, two.\"\n\n\t\t\"Good quality watches, these.\" The Skeeret begins packaging them, playing cool. \"Finest from Earth.\"\n\n\t\t*page_break Uh-Huh\n\n\t\t*label where_are_they_from\n\t\t\"Where are they from?\" you ask.\n\n\t\tThe Skeeret pauses. \"That's extra.\"\n\n\t\tOf course it is. \"Can I just hold one?\"\n\t\n\t\t*if (persuasion > 50) or (skeeret_flirt = true)\n\t\t\t$!{skeeret_she} peers at you sharply, but nods. You hold the watch gingerly. There's a tartan pattern on the strap, a castle on the face. \n\n\t\t\tIt reminds you of home, so very long ago. Somewhere in the UK, you're sure of it.\n\t\n\t\t\tYou exhale, hand the watch back. \"Thanks, I changed my mind.\"\n\n\t\t\t*if (skeeret_flirt = true)\n\t\t\t\t\"About me?\" Ket asks.\n\n\t\t\t\tYou flash a roguish grin. \"No, I like you.\"\n\n\t\t\t\t\"Good. Not too bad yourself.\"\n\n\t\t\t\t\"But the watches aren't for me.\" You stretch. \"Call you up sometime?\"\n\n\t\t\t\tKet shakes ${skeeret_his} oval head, ${skeeret_his} eyes twinkling. \"Go ahead.\"\n\t\t\t\t*goto outside_bar\t\t\t\n\n\t\t\t*else\n\t\t\t\tThe alien curses, but you're already on your way out the door.\n\t\t\t\t*goto outside_bar\n\n\t\t*else\t\n\t\t\t\"You touch, you buy,\" she says.\n\t\t\t\n\t\t\tYou sigh, as she pockets the money. \"Well?\"\n\n\t\t\t\"I don't know,\" she says, once there's no hope of you getting your payment back. \n\n\t\t\t\"What do you mean, you don't know?\"\n\n\t\t\t\"Somewhere in the Yoo-Kay. That's all I know.\" She waves you off. \"Thank you!\"\n\t\t\t*set cash -10\n\t\t\t*page_break\n\n\t\t\tSo you're down more cash, and you've got a very unhelpful clue. But it's better than no clue at all. At least you think it is.\n\t\t\t*goto outside_bar\n\n\t#I examine the goods for clues.\n\t\t*if observation > 60\n\t\t\tWith the Skeeret watching your every movement, you examine the goods. The chocolate bars are mostly Cadbury's, the electronics include a few DVDs of \"Coronation Street,\" and the glow-in-the-dark watches have a picture of the Queen. It makes you feel unexpectedly nostalgic.\n\n\t\t\tAnd it also gives you a clue.\n\n\t\t\tIt seems you can never really escape your past. \n\t\n\t\t\t\"On second thought,\" you say. \"I don't want to buy.\"\n\n\t\t\tAnd then you run. The UK is waiting.\n\t\t\t*goto outside_bar\n\t\t\n\t\t*elseif (skeeret_flirt = true)\n\t\t\t\"They're really nice,\" you say. \"What part of Earth are they from?\"\n\n\t\t\t\"Oh, I can't give that away….\" If Skeeret blushed, you know Ket would be bright red.\n\n\t\t\t\"Come on.\" You push ${skeeret_him} playfully, leaving your fingertips on ${skeeret_his} smooth grey skin just a few seconds too long. \"Why not?\"\n\n\t\t\tKet runs ${skeeret_his} elongated hand up your arm. \"Well…I guess I could.\" Pulling you in close, ${skeeret_she} whispers in your ear, ${skeeret_his} breath soft and cool. \"Some nice little place in the north. Loch Ness.\"\n\n\t\t\tIt's what you needed. You draw back slightly, find Ket gazing at you with unmistakable interest. \"Call me?\" ${skeeret_she} says.\n\n\t\t\t\"Of course,\" you answer. After all, this could prove interesting.\n\t\t\t*goto outside_bar\n\n\t\t*else\n\t\t\tYou look at the goods. Lots of knickknacks of all kinds, but you can't place them. They could be coming from anywhere. At last, as the Skeeret breathes down your neck, you're forced to admit defeat and slink from the room.\n\t\t\t*goto skeeret_fail\n\n\t#I flatter ${skeeret_him} with my pretty words.\t\t\t\n\t\t\"You know,\" you say, \"I admire you. Such an astute entrepreneur.\"\n\n\t\tThe Skeeret blinks. \"Oh?\"\n\n\t\t\"Yes…\" Edging nearer, you say, \"You must be awfully clever, organizing a big network like this. From Spheron all the way to…where, exactly?\"\n\t\t*page_break\n\t\t\n\t\t*if (persuasion > 60) or (skeeret_flirt = true)\n\t\t\tYou're very conscious of your voice and body language. Soothing, gentle. Like you're dearest friends, like you're just trying to help ${skeeret_him} out—or maybe like you want more.\n\n\t\t\tYou're good at this, and ${skeeret_she} blinks. \"Nowhere special. Some Earth place. The Yoo-Kay.\"\n\n\t\t\t\"Right…\" You pat ${skeeret_his} shoulder. \"Well, I'm sure you're very busy. I'll leave you to it.\"\n\t\t\t*if (skeeret_flirt = true)\n\t\t\t\t\"Make sure you call me!\" Ket shouts after you. \"That's my private communicator I gave you!\"\n\t\t\t\t\n\t\t\t\tYou grin. \"I will.\"\n\t\t\t\t*goto outside_bar\n\t\t\t\n\t\t\t*else\n\t\t\t\tYou can't help a slight bounce in your step as you leave. The UK is waiting.\n\t\t\t\t*goto outside_bar\n\t\n\t\t*else\n\t\t\tThe Skeeret smiles sweetly. \"To…get out of my shop.\"\n\n\t\t\t\"What?\"\n\t\n\t\t\t\"Get out.\" The alien grabs a gun. \"I know what you're up to, and I've got the entire bar ready to hunt you like a rabid smeerp.\"\n\n\t\t\tCaution seems prudent.\n\t\t\t*set rule_bender %-15\n\t\t\t*goto skeeret_fail\n\t\n\t*if(skeeret_flirt = false) #I threaten ${skeeret_him} with my angry words.\n\t\t\"Talk can be powerful though,\" you say. \n\n\t\t\"Mmm-hmmm.\"\n\n\t\t\"No, really.\" You slip your stunner out. \"It can mean the difference between freedom, and—\"\n\n\t\t*if combat > 60\n\t\t\t\"Stop!\" The Skeeret waves ${skeeret_his} hands over ${skeeret_his} head. \"I give up!\"\n\n\t\t\tYou're a little taken aback. \"What?\"\n\n\t\t\t\"You just look so threatening.\" Tears glisten in ${skeeret_his} eyes. \"Please don't hurt me.\"\n\n\t\t\tThis is just plain uncomfortable now. You lower the gun. \"Then where are the goods coming from?\"\n\n\t\t\t\"The Yoo-Kay!\" The alien's voice cracks. \"That's all I know! Honest!\"\n\n\t\t\tAfter you reassure the near-hysterical Skeeret, you run. The UK is waiting.\n\t\t\t*goto outside_bar\n\n\t\t*else\n\t\t\t\"Are you threatening me?\" The Skeeret shakes ${skeeret_his} head. \"Get out.\"\n\t\t\t*page_break That Was Unexpected\n\n\t\t\tYou scowl at ${skeeret_him}. \"Why should I?\"\n\n\t\t\t\"Because the entire room is booby trapped. I have three stunners, a guard on the other side of the door, and four more behind a door you don't know about. And the entire bar owes me favors.\"\n\t\n\t\t\tThose are good reasons. You leave.\n\t\t\t*goto skeeret_fail\n\n*label skeeret_fail\nBack in the main barroom, you're sorely tempted to get another drink. You know Tweel isn't going to react well to this. It's not fair. You've done the best job you could—you'd think the PGPB would take your long years of service into account.\n\nBut the PGPB only cares about one thing, and it isn't the unique circumstances of its agents.\n\nWith a heavy heart and sour temper, you message Tweel.\n\t\n\u003cTraced goods. Unable to locate point of origin.>\n*page_break Send\n\nThe reply isn't long in coming. In fact, it isn't long at all. \u003cWhy?>\n\nRolling your eyes, you slouch lower at the table. \u003cAttempts failed.>\n\n\u003cNo, ${name}. You failed.>\n*page_break My Heart\n\nIt takes all your self-restraint not to snap at her. Sometimes, Tweel works on your last nerve. \n\nAnother message from her. \u003cHold position.>\n\nGreat. Just great. That means the crew from Intel are tracking things down. It's going to take a while, so you spend the next hour or so brooding. Maybe you can buy a wee cottage somewhere, set yourself up nicely with some chickens and a nice vegetable garden.\n\n\u003cThe illegitimate warp gate is in Scotland.>\n*page_break Och Aye\n\nMore messages are coming. \u003cDisappointed you could not handle this. Demotion for you. Clearance Level will drop.>\n*set spheron_success \"false\"\n*set relationship_tweel %-15\n*set clearance -15\n*goto outside_bar\n\n*label outside_bar\nOutside the bar, you pull your coat tighter against the rain and sigh. You are completely wiped. Head down, you trudge back through the dives and lowlife bars, past the neon-festooned Strip, and back to the vacant lot. \n\nBut on reaching it, you stop and stare.\n\nThat's funny. You don't remember your ship being that broken. \n*finish\n*goto_scene ending", "startup": "*title Yeti's Parole Officer\n*author KT Bryski\n\n*scene_list\n\tstartup\n\thimalayas\n\tnewzealand\n\tspheron\n\tvirginia\n\tlochness\n\tplains\n\trigel\n\tintricacies\n\tlosses\n\tendgame\n\n\n*achievement pgpbhero visible 100 Top Agent\n\tBecome the PGPB's hero\n\tRose to the top of the Pan-Galactic Prisons Bureau.\n*achievement crimelord visible 100 Crime Boss\n\tRule the criminal underworld\n\tSeized the criminal underworld. \n*achievement jailbreak hidden 100 PGPB Superstar\n\thidden\n\tStopped the jailbreak!\n*achievement trap hidden 50 Tough to Kill\n\thidden\n\tBeat the Jackalope's trap.\n*achievement kidshero visible 50 You're My Hero\n\tDon't just investigate: inspire\n\tChanged a kid's life. \n*achievement rescuer visible 75 Champion of the Oppressed\n\tSave a helpless alien from thugs\n\tSaved a helpless alien from thugs.\n*achievement goodcop visible 50 Good Cop Bad Cop\n\tPull a slick routine with your partner\n\tPulled a slick routine with your partner.\n*achievement jackseduce visible 75 Nerves of Steel\n\tCan you resist the galaxy's most seductive voice?\n\tStayed on target, got information!\n*achievement romance visible 100 Agents in Love\n\tRomance your partner\n\tGot together with your partner.\n*achievement ally visible 50 Got an Ally\n\tFind a source on the inside\n\tFound a source on the inside.\n*achievement lightson visible 50 Fix the Grid\n\tLet there be light\n\tSaved the PGPB's headquarters.\n*achievement pubs hidden 75 Pub Crawler\n\thidden\n\tVisited three pubs: all in a day's work!\n\n*create silver \"\"\n*create silver_him \"\"\n*create silver_his \"\"\n*create silver_she \"\"\n*create silver_sweet false\n*create silver_charismatic false\n*create silver_hardworker false\n*create silver_soubrette false\n\n*create skeeret_him \"\"\n*create skeeret_his \"\"\n*create skeeret_she \"\"\n\n*create tweel_meeting_rough false\n*create yeti_free false\n*create skeeret_flirt false\n*create el_sid_fail false\n*create ship_name \"\"\n\n*create relationship_tweel 60\n*create relationship_silver 30\n*create relationship_mothman 50\n\n*create spheron_success true\n*create panel false\n*create monster_hunter false\n*create ufo false\n*create cloak false\n*create chup_win false\n*create net false\n*create armor false\n*create silver_date false\n*create station_flee false\n*create turncoat true\n\n*create jailbreak true\n*create silver_dead false\n*create incompetent false\n\n*create name \"\"\n*create justice 50\n*create rule_bender 50\n*create resolve 50\n*create persuasion 50\n*create combat 50\n*create stealth 50\n*create observation 50\n*create clearance 20\n*create cash 100\n*create gender \"unknown\"\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tThe Yeti, Loch Ness Monster, Chupacabra, and Mothman are aliens, sentenced to prison on Earth by the Pan-Galactic Prisons Bureau. As the Yeti's parole officer, you must defend the galaxy from these convicts, unravel their criminal conspiracy, and bring them to justice!\n\n\t\"Yeti's Parole Officer\" is a hilarious interactive sci-fi novel by KT Bryski, where your choices control the story. It's entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\n\tAs an officer of pan-galactic law, you'll travel around the world to wipe all memory of alien activity on Earth, battling extaterrestrial smugglers and rival PGPB agents alike to save the world from nefarious cryptids.\n\n\tWill you play as male or female? Gay or straight? Will you throw the book at the alien scofflaws messing with your planet, or will you betray your allies for personal gain? The choice is yours!\n\n\n\t*if choice_is_advertising_supported\n\t\t[i]Yeti's Parole Officer[/i] is supported by advertisements, but you can buy the unlimited version\n\t\tto turn off ads forever.\n\t\t\n\t\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t\t*page_break_advertisement\n\n\t\t*goto purchased\n\t*else\n\t\t[i]You can play the game for free, with 20 minute breaks between chapters, or you can buy the game now for unlimited play without breaks.[/i]\n\n\t\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t\t*page_break Play Now for Free\n\n*label purchased\n\n*goto_scene himalayas", "virginia": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Yeti's Parole Officer[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\nThere's a jagged hole where one of your transport's engines used to be. Metal glints around the hole like teeth around a wide-open mouth. Your mouth is wide open too, in shock.\n\nThen your communicator buzzes again. Of course.\n\n*if relationship_tweel > 60\n\t\"Agent!\"\n\n\t\"Um, hi.\" You pace in front of the wreckage. \"Commissioner, this isn't exactly a good time.\"\n\n\t\"What? Why?\"\n\n\tYou're pretty sure she likes you, but the sharpness never takes long to reappear. \"Someone junked my ship.\"\n\t*page_break Cue Explosion\n\n\t\"Get yourself another ship, ${name}. Something's come up.\"\n\n\tCan't you ever catch a break? \"What now?\"\n\n\t\"You remember Mothman.\"\n\n\tYou do. Wings, glowing red eyes, exiled to Earth in 1966—relatively recently, by PGPB standards. \"What about him?\"\n\t*page_break Please, Nothing Bad\n\n\t\"He's terrorizing picnickers in the Shenandoah Valley.\"\n\n\t\"But, there are warp gates in the UK….\"\n\n\t\"Priorities, Agent! This is an emergency—you can go to the UK after you've sorted this out.\" Her voice softens a little. For her, anyway. \"You've been doing well, ${name}. Just a standard procedure. Find a ship and get over there.\"\n\t*goto ship_options\n\n*elseif relationship_tweel > 40\n\t\"Agent!\"\n\n\t\"H-hello…\"\n\n\tShe pauses. \"Agent? Is that you?\"\n\n\t\"Yes, it's just…\" You take a deep breath. \"Someone junked my ship.\"\n\n\t\"What?\"\n\t*page_break \n\n\t\"Tweel, I—0\"\n\n\tShe inhales sharply. The line buzzes. \"We can handle this later. For now, I need you to get to Virginia. Mothman is terrorizing picnickers in the Shenandoah Valley. You can resume your investigation after, but this is an emergency. Get yourself a ship, and get to Virginia.\"\n\t*goto ship_options\t\n\n*else\n\t\"Agent, why are you still planet-side?\"\n\n\tYou sigh, pass a hand over your eyes. \"Someone junked my ship.\"\n\n\t[i]\"What?\"[/i]\n\n\tEven with you holding the communicator at arm's length, her tinny voice rings across the vacant lot. You try to speak calmly. \"I'll find another ship.\"\n\n\t\"See that you do. We have no one to spare to pick you up, and I need you to get to Virginia.\"\n\t*page_break That's New\n\n\tYou wanted to go to the UK. Frankly, you wanted to go home. In your frustration, you kick an empty food container across the parking lot. \"Why?\"\n\n\t\"Mothman's going after humans in the Shenandoah Valley.\"\n\n\tThat red-eyed, winged jerk. He hasn't even been on Earth that long. He has no excuse for cabin fever. \"I'll get a ship and be there soon.\"\n\n\t\"Sooner than that, Agent.\" Her tone makes you gnash your teeth. \"Your performance has been subpar lately. This is your chance to make me think otherwise. Fail…\" She lets the sentence hang, just long enough to make you sweat. \"Fail, and we'll have to see about reassignment.\"\n\n\tShe wants to stick you in the archives, you know it. \"Fine,\" you grunt, and disconnect.\n\t*goto ship_options\n\n\n*label ship_options\n*page_break\nIf no one is coming to get you, you've got to figure out a way to get off this planet and back to Earth. And here you'd been hoping for a hot meal and a long sleep. Suck it up, Buttercup—what's your move?\n\n*choice\n\t#I \"borrow\" a ship.\n\t\t*set rule_bender %+15\n\t\tAs an agent of a law enforcement organization, you can't just steal a spaceship. That would be irresponsible. Possibly unethical as well. (You're not too sure on that, honestly.)\n\n\t\tBut commandeering a ship when there's an emergency like this? That's a different matter.\n\n\t\tYour last trip to Spheron was a bit of a blur (let's just say you hit the Strip in more ways than one), but at least you remember where the docks are.\n\t\t*page_break Hop, Skip, Jump\n\n\t\tThere are a number of ships refueling in the docking facility: squat ones like metallic teardrops, long ones like glowing cigars, sleek ones that remind you of panthers. You walk up and down the rows a few times. One ship is unguarded, one's crew is clearly impaired, and one is a model 1-X, the sweetest, fastest ride in the galaxy.\n\t\n\t\tWhich one is it gonna be?\n\n\t\t*label many_ships\n\t\t*choice\n\t\t\t*disable_reuse #The unguarded one\n\t\t\t\tYou saunter up the gangplank and into the ship. There, you freeze. The controls in this ship are a bit unusual—hope you studied up on ship configurations at the Academy!\n\n\t\t\t\t*if rule_bender \u003c 65\n\t\t\t\t\tOf course you did! You're diligent like that. You swing into the seat and take the controls. Since you're also familiar with air traffic protocols, no one questions you as you pilot the ship out. As you rocket towards the warp gate, you see the ship's captain waving and hollering, but it's too late.\n\t\t\t\t\t*goto arrival_shenandoah\n\n\t\t\t\t*else\n\t\t\t\t\tStudy? You never did much of that, and that means you ain't flying this ship anywhere. Shame-faced, you scuttle down the gangplank before anyone can see you. Tweel won't be happy about the delay.\n\t\t\t\t\t*set relationship_tweel %-10\n\t\t\t\t\t*goto many_ships\n\n\t\t\t#The one with the sleepy crew.\n\t\t\t\t*if resolve > 50\n\t\t\t\t\tYou are the patient type. It takes a while for all the crew members to slip into a stupor, but when they do, you slip aboard, grab one of the ship's mini-fighters, and away you go. Well done!\n\t\t\t\t\t*goto arrival_shenandoah\n\t\t\t\t\t\n\t\t\t\t*else\n\t\t\t\t\tWaiting for the crew to tire of their drinking songs and just fall asleep is so boring! Plus, you're getting nervous about how much time is passing. Want to give up?\n\n\t\t\t\t\t*choice\n\t\t\t\t\t\t*disable_reuse #Yeah, Tweel's waiting.\n\t\t\t\t\t\t\tYou're hesitant to waste more time. Understandable. You survey the ships again.\n\t\t\t\t\t\t\t*goto many_ships\n\n\t\t\t\t\t\t*disable_reuse #I'll wait another five minutes. That's it. \n\t\t\t\t\t\t\tJust your luck, they begin the longest drinking song in the galaxy: The Ballad of Taumatawhakatangihangakoauauotamateaturipukakapikimaungahoronukupokaiwhenuakitanatahu. You blame the Moehau Monster. She managed to get a few poems out.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tBut it seems this crew's going nowhere fast. Tweel won't be happy about the delay. Try again.\n\t\t\t\t\t\t\t*set relationship_tweel%-10\n\t\t\t\t\t\t\t*goto many_ships\n\n\t\t\t\t\t\t#No, it'll be soon, I'm sure!\n\t\t\t\t\t\t\tYou amuse yourself by playing I Spy until the aliens fall asleep. Then you sneak aboard, toss the crew out, and fly away.\n\t\t\t\t\t\t\t*goto arrival_shenandoah\n\n\t\t\t*disable_reuse #The fast, pretty one.\n\t\t\t\tOh, it is fast and pretty. It's also guarded.\n\t\t\t\t*if (stealth > 65) and (combat > 70)\n\t\t\t\t\tYou sneak up on the guard, silent as a shadow. Then, with a quick flash of movement, you render him unconscious on the ground. You step over his prone body, minding the tentacles, and take the controls.\n\n\t\t\t\t\tOh. Oh, yes. This is a fast one. You message Tweel, feeling pleased with yourself.\n\n\t\t\t\t\tThe message comes back: \u003cGood.>\n\n\t\t\t\t\tYou'll take it. You key in the start up code and gun for Earth.\n\t\t\t\t\t*goto arrival_shenandoah\n\n\t\t\t\t*else\n\t\t\t\t\tYou sneak up on the guard. At least, you try to, but you trip over your own feet and stumble into him. He grabs you before you can dodge and punts you halfway across the dock. There's a pretty nasty bump on your forehead. You won't be trying that again. Tweel won't be happy about the delay.\n\t\t\t\t\t*set relationship_tweel %-10\n\t\t\t\t\t*goto many_ships\n\n\t#I hire a ship.\n\t\t*set rule_bender %-15\n\t\tWhile your last trip to Spheron was a bit of a blur, you do remember where the docks are. There are a number of ships refueling, and you walk up and down the rows, admiring their gleaming metallic sides. \n\t\t\n\t\tThree captains lounge on the docks, swapping racy stories and tales of derring-do. You recognize the Spheroid as a competent pilot, there's a Tetu who looks down on her luck, and a Hirsus is poring over the schematics of a really fast ship. \n\t\t*page_break\n\t\t\n\t\t*label three_captains\n\t\tThree captains, three different aliens. Who's it going to be?\n\t\t*choice\n\t\t\t*disable_reuse #The Spheroid\n\t\t\t\tYou approach the Spheroid. \"Say, can I talk to you for a moment?\" When he blinks his single, azure eye, you clarify, \"In private.\"\n\n\t\t\t\tAnother slow blink. Then he glances to his companions and shrugs. \"Guess so.\" He trundles after you. When you reach a spot out of earshot, he coughs. \"I win the lottery or something?\"\n\n\t\t\t\tYou smile tightly. \"Maybe. I need to charter a ship. Something that can drop me off on Earth.\"\n\n\t\t\t\tIf Spheroids had eyebrows, this captain would be raising his. \"Here's my price.\"\n\n\t\t\t\t*if cash > 50 \n\t\t\t\t\tIt's not as bad as you expected. \"Deal,\" you say.\n\t\t\t\t\t\t\t\n\t\t\t\t\tThe Spheroid waddles towards his ship, a rounded behemoth whose sides are smooth as his are lumpy. \"We leave in an hour.\"\n\n\t\t\t\t\t*set cash -10\n\t\t\t\t\t*goto arrival_shenandoah\n\n\t\t\t\t*else\n\t\t\t\t\tYou don't have enough. Guess you'll have to try your luck with one of the other captains.\n\t\t\t\t\t*goto three_captains\n\n\t\t\t*disable_reuse #The Tetu\n\t\t\t\tThe Tetu's uniform has seen better days. Stray feathers poke through holes in the chest, and her claws are dirty and untrimmed. \"Can we talk?\" you ask.\n\n\t\t\t\tShe dips her birdlike head. That's all the answer you get. Around the corner, you sigh and face her squarely. \"I need to hire a ship to Earth. I can't pay much, but—\"\n\n\t\t\t\t\"You're PGPB.\"\n\n\t\t\t\tYou can't exactly deny it. \"Yeah.\"\n\n\t\t\t\t\"I used to be. Tweel had it in for me. I bungled a case.\"\n\t\t\t\t\n\t\t\t\t*if justice \u003c 60\n\t\t\t\t\tYour heart melts for the Tetu. No wonder she's worse for wear. Sometimes, you wonder at the PGPB's harshness. Keeping strict rules is all well and good, but only as long as they're actually helping.\n\n\t\t\t\t\t\"I'll take you to Earth,\" she says. \"For free. If…\" She clicks her talons. \"You put in a good word for me with Tweel.\"\n\n\t\t\t\t\tWhat do you think?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Sure, it's a nice thing to do.\n\t\t\t\t\t\t\t*set justice %-15\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if relationship_tweel > 60\n\t\t\t\t\t\t\t\t\"All right,\" you say. \"What's your name?\"\n\n\t\t\t\t\t\t\t\tHer eyes widen in an exhausted Tetu grin. \"Keela. Thank you so, so much.\" She strides towards her ship. \"We leave in an hour.\"\n\t\t\t\t\t\t\t\t*goto arrival_shenandoah\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\"Absolutely,\" you say. \"She's been so relaxed lately. So congenial!\"\n\n\t\t\t\t\t\t\t\tThe Tetu's eyes narrow. \"That doesn't sound like Tweel.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Erm…\"\n\t\t\n\t\t\t\t\t\t\t\t\"You're lying! I bet you couldn't put in a word with her at all—she probably doesn't even know your name!\" The Tetu snorts. \"Find another ride.\"\n\t\t\t\t\t\t\t\t*set persuasion %-10\n\t\t\t\t\t\t\t\t*goto three_captains\n\n\t\t\t\t\t\t#Maybe I can convince her I will.\n\t\t\t\t\t\t\t*if persuasion > 60\n\t\t\t\t\t\t\t\t\"Of course,\" you say. \"Not a problem.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tShe beams. \"Thank you.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tAs she leads you aboard, you manage not to feel too guilty. For the most part.\n\t\t\t\t\t\t\t\t*set rule_bender %+20\n\t\t\t\t\t\t\t\t*goto arrival_shenandoah\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\"Uh…ok,\" you say.\n\n\t\t\t\t\t\t\t\tHer beak clacks. \"Are you sure?\"\n\t\t\t\n\t\t\t\t\t\t\t\t\"Absolutely.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Funny.\" With one long talon, she pokes your chest. \"I think you're lying. And I think you need a new captain!\"\n\t\t\t\t\t\t\t\t*goto three_captains\n\t\t\t\t\t\t\n\t\t\t\t\t\t#No way! She's a bungler.\n\t\t\t\t\t\t\t*set rule_bender %-15\n\t\t\t\t\t\t\t\"Sorry,\" you say. \"I can't. Not in good conscience.\"\n\n\t\t\t\t\t\t\tThe feathers around her neck stiffen. \"Then find another captain.\"\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto three_captains\n\n\t\t\t\t*else\n\t\t\t\t\t\"I won't lie,\" the Tetu says. \"It's been rough since then.\"\n\n\t\t\t\t\tYou cough. \"Sounds like you deserved it.\"\n\n\t\t\t\t\tThe Tetu stares at you, unblinking. \"Sounds like you're flying with someone else.\"\n\n\t\t\t\t\tOuch. Maybe you ought to be a little nicer to people, ${name}. \n\t\t\t\t\t*goto three_captains\n\n\t\t\t#The Hirsus\n\t\t\t\tThe Hirsus sizes you up the minute you approach. \"Looking for a charter?\" he barks.\n\n\t\t\t\tYou're a little stunned. \"To Earth.\"\n\n\t\t\t\tThe Hirsus chuckles. \"Earth, eh? Know it well. Plenty of my kind there.\" His laughter cuts off as abruptly as it began. \"Don't like Earth.\"\n\t\t\t\t*page_break Should Have Guessed\n\n\t\t\t\t\"Well,\" you say. \"You don't have to stay. Just stop long enough to drop me off.\"\n\n\t\t\t\t\"Presuming I take you.\" He pushes auburn fur from his eyes. \"Don't like Earth, after all.\"\n\n\t\t\t\t\"Do you like money?\"\n\n\t\t\t\tThe Hirsus makes a show of stretching. \"Sure.\"\n\n\t\t\t\t*if cash > 55\n\t\t\t\t\t\"How's this?\" You write an offer on a scrap of paper and hand it to him. Even with all the technology you've seen in the last decades, you still like paper best. Call it a relic of your nineteenth-century upbringing. \n\t\t\t\t\t\n\t\t\t\t\tThe Hirsus grunts. \"I'll do it. Get in the ship. We're leaving now.\"\n\n\t\t\t\t\t\"Really?\"\n\n\t\t\t\t\t\"Before I change my mind. Get in!\"\n\t\t\t\t\t*set cash -15\n\t\t\t\t\t*goto arrival_shenandoah\n\n\t\t\t\t*else\n\t\t\t\t\t\"Too bad,\" you say. \"I haven't got any.\"\n\n\t\t\t\t\tTo your surprise, the Hirsus bursts out laughing. \"Tight spot, eh? Get in.\"\n\n\t\t\t\t\tYou can't believe your ears. \"What?\"\n\n\t\t\t\t\t\"You make me laugh. And you need help.\" The Hirsus beckons you to follow. \"We're not all bad sorts, human. Not everyone's as rotten as the Jackalope. Sometimes we like to help each other.\"\n\t\t\t\t\n\t\t\t\t\t\"I see….\" \n\n\t\t\t\t\tIt's something you've started thinking about more and more, lately. Most aliens you meet are convicts, but that doesn't mean they all are. You stuck with this job because the aliens fascinated you. Maybe you need to remember that a little more often.\n\t\t\t\t\t*goto arrival_shenandoah\n\n\t#I sneak onto a tourist ship.\n\t\t*set rule_bender %+15\n\t\tWhile your last trip to Spheron was a bit of a blur, you do remember where the docks are. There are a number of ships refueling, and you walk up and down the rows, admiring their gleaming metallic sides. The tourist liners are berthed on the well-lit, relatively clean side.\n\n\t\tYou still can't get used to the fashions that have swept Earth in the decades since you joined the PGPB. (It was bad enough when crinolines finally yielded to bustles—you never want to see bellbottoms or choker necklaces again.) As you watch passengers mill about, you decide that that alien haute couture is almost normal by comparison.\n\t\t*page_break\n\t\n\t\tYou find a ship that will be passing by Earth. Even better, ports for escape pods pepper its hull—you can eject one when you approach the planet and pilot your way straight down to the Shenandoah Valley.\n\n\t\tIn the confusion, it's easy to slip aboard the vessel. Now, the main question is this: where are you going to hide?\n\t\t*fake_choice\n\t\t\t#An empty guest cabin.\n\t\t\t#The lavatory.\n\t\t\t#A cleaning supply closet.\n\t\t\t#In the air vents.\n\n\t\tWell, it's not the most comfortable trip you've ever made, but such is the life of a PGPB agent. The whole trip, you jump at every small sound. But when the time comes, you emerge from your hiding place and sneak towards the escape pods.\n\t\t*if stealth > 60\n\t\t\tYou activate one of the pods without anyone hearing and jet towards Earth. Slick, Agent. Real slick.\n\t\t\t*goto arrival_shenandoah\n\t\t*else\n\t\t\tAs you're prying one of the escape hatches open, the alarm shrieks. You manage to get into the pod before anyone hears you, but you've set a chain of communications in motion that will eventually reach Tweel.\n\t\t\t\n\t\t\tShe won't be happy. Oh well.\n\t\t\t*set relationship_tweel %-10\t\n\t\t\t*goto arrival_shenandoah\n\n*label arrival_shenandoah\n*page_break\nVirginia in February has a kind of bleak, desolate beauty. Long, yellow grass clumps around shuttered farmhouses set back from the road. You pass a few after you've landed and changed into civilian clothes—it's easy to imagine a simpler time, summers of nostalgia. Now there's only the wind through broken glass rattling bare branches and disturbing the few remaining patches of green.\n\nSeriously, these people are picnicking? Sightseers, more like. It wouldn't be the first time the translator chip hasn't got things quite right. \n*page_break Oh Well\n\nThe Blue Ridge Mountains crouch on the horizon like a bank of storm clouds. You set off into the woods, squeezing through bracken and getting your boots stuck in the moist, russet-colored soil. \n\nThankfully, your communicator is primed for use on Earth. Besides, Earth has less fluvion-ray pollution than some of the busier corners of the galaxy. Long story short? You can always track things more easily in your own neck of the woods.\n*page_break Track On\n\nAfter sustaining soaked boots, muddy elbows, and a branch snagging in your hair, you emerge from the woods. Tall hickory trees, their thin branches grasping at the sky like fingers, border the clearing. They're interspersed with delicate birches that sparkle like silver in the winter light. \n\nAnd there, pressed against a fallen log, an older couple trembles, their denim-clad knees knocking together.\n\n\"Who goes there?\" the man shouts. \n\n*choice\n\t#\"Just a forestry student!\"\n\t\t*set rule_bender %-15\n\t\tA woman with flyaway grey hair peeps over. \"Did you see that monster?\"\n\n\t\tStay calm. \"What are you talking about?\"\n\n\t\tShe shudders, clutches her husband. \"It's dreadful! Get down, there's room to hide here. It might come back!\"\n\t\t*goto fallen_log\n\n\t#\"Canadian tourist!\"\n\t\t*set persuasion %+15\n\t\tThe minute you shout, the man calls back, \"Yeah, right! That's not a Canadian accent!\"\n\n\t\tNearly two centuries of working all over the globe has smoothed your accent until you simultaneously sound like you're from everywhere and nowhere. It makes you sad, sometimes. Another way that you've become rootless.\n\n\t\tBut you can put that persuasion of yours to work. \"Canadian by way of Britain,\" you say, smiling. \"I went across the pond when I was quite young. Still have the passport, though.\"\n\n\t\tA woman with flyaway grey hair peeps over the log. \"Enough jibber-jabber! Duck down here with us—there's a monster about!\"\n\t\t*goto fallen_log\n\n\t#\"Monster hunter!\"\n\t\t*set monster_hunter \"true\"\n\t\t*set combat %+15\n\t\tSilence greets you. Both the man and the woman poke their heads up from behind the log. The earflaps on the man's hat are terribly askew. His wife swallows hard. \"So it is true.\"\n\n\t\tOops. That was a bit foolhardy, don't you think? Time to backpedal. \"Well, uh, I meant…\"\n\t\n\t\tThe woman shakes her head. \"Come hide here with us—the monster might come back!\"\n\t\t*goto fallen_log\n\n\t#\"Eccentric writer!\"\n\t\t*set rule_bender %+15\n\t\tThe older man pops up like a jack-in-the-box. \"Writer, you say?\"\n\n\t\tThe woman follows suit. \"Eccentric, you say?\"\n\n\t\t\"Roaming the countryside for inspiration, I say.\" You stretch, inhaling the moist air deeply. It almost reminds you of tramping the countryside before your world changed. Before your life ended, in a way. \"How are you folks today?\n\n\t\tThe woman's shoulders hunch. \"Enough jibber-jabber! Duck down here with us—there's a monster about!\"\n\t\t*goto fallen_log\n\n*label fallen_log\nBehind the fallen log, you get your first good look at the couple. Probably in their early sixties, both of them. He's wearing one of those duck-hunter hats with earflaps; she's got a knitted purple scarf thrown around her shoulders. Both can't seem to stop shaking, even though it really isn't that cold.\n\nYou do your best to be soothing. \"Now, what's going on?\"\n\n\"A monster!\" the woman bursts out. \"Oh, it was like a demon come to life! Taller than Bill, here, with ashen skin, wings like a bat, and—and its eyes! The most terrible, glowing red eyes!\"\n\nAlthough you paste a polite smile on your face, you're sighing inside. Mothman, no question.\n\nAs though reading your mind, the man adds, \"It's Mothman, no question!\"\n\nOk, pro. How do you handle this?\n\n*label mothman_ploys\n*choice\n\t*selectable_if (monster_hunter) #I pretend to defeat the \"monster.\"\n\t\t\"I'm a professional,\" you say. \"Just leave this to me.\"\n\n\t\tAware of both hikers watching you, you slip into the woods. Once hidden in the brush, you rub your hands. It's showtime.\n\n\t\tScreaming terribly, you thrash around, chucking rocks and snapping branches. Then you grab a vial from your belt. It's full of fake blood, which you daub over your face and shirt. After stowing the vial away, you stumble back to the clearing, panting.\n\n\t\t\"Run!\" you say. \"I've stunned it—for now!\"\n\n\t\tThey don't hesitate, booking it in the direction of the nearest town. You wipe the fake blood away and grin. Tweel will be pleased with your stealthiness and acting ability.\n\t\t*set stealth %+15\n\t\t*set relationship_tweel %+15\n\t\t*goto mothman_meeting\n\n\t*selectable_if (monster_hunter = false) #I convince them it was an animal.\n\t\tHands in your pockets, you shrug. \"Mothman's just a myth. Could be anything. A bird, maybe.\"\n\n\t\tThe man's eyes bulge. \"It wasn't a bird!\"\n\n\t\t\"I've heard stories. Here…\" You pull out your communicator. The couple look at it, wide-eyed, until you add, \"Smartphone.\" As they relax, you pull up a screen with several different birds. \n\t\t\n\t\t*label birds\n\t\tWhich one do you show them?\n\t\t*choice\n\t\t\t*disable_reuse #Golden Eagle\n\t\t\t\t\"See?\" You enlarge the image. \"Eagles like this are huge. Seven-foot wingspan, easy.\"\n\n\t\t\t\tThe man frowns at the image. \"Wrong color. We said Mothman was pale.\"\n\n\t\t\t\tOops. Try again!\n\t\t\t\t*goto birds\n\t\n\t\t\t#Barn Owl\n\t\t\t\t\"Pale, large wingspan, glowing eyes, right?\" you ask.\n\n\t\t\t\tBoth hikers nod.\n\n\t\t\t\tYou smile and pull up an image. \"Think it was a barn owl?\"\n\n\t\t\t\tThe man grabs the communicator. You try not to cringe as he drags his fingers over the screen. \"Pale feathers…\" he murmurs. Then, after a few minutes, he hands it back with a sheepish smile. \"I think we might have been mistaken.\"\n\n\t\t\t\t*page_break\n\n\t\t\t\t\"Not to worry.\" You take the communicator back and find another image of a barn owl with wings fully spread. If you didn't know better, you'd almost be convinced. \"Mistakes happen.\"\n\n\t\t\t\tThe female hiker tugs her hat. \"I suppose we'll toddle on home, now.\"\n\n\t\t\t\tAs they say goodbye, you hide a grin. Look who handled an incident! Good job, you!\n\t\t\t\t*set relationship_tweel %+15\n\t\t\t\t*set persuasion %+15\n\t\t\t\t*goto mothman_meeting\n\t\t\t\n\t\t\t#Sandhill Crane\n\t\t\t\t\"What about this?\" You hold out your communicator. \"Sandhill cranes are common in this area. Big, too.\"\n\n\t\t\t\tThe woman squints. \"Bigger than Bill?\"\n\t\n\t\t\t\t\"Close, but probably not,\" you admit. \"But your eyes can play tricks on you. And look here, see the red patches around their eyes? Couldn't that look like glowing red eyes?\"\n\n\t\t\t\tShe bites her lip. \"Maybe.\"\n\t\t\n\t\t\t\tThe man stares a moment longer. Sighs. \"Rest of the feathers are the right color.\"\n\t\t\t\t*page_break Almost There\n\n\t\t\t\tAs the two of them deliberate, you say nothing. At last, the woman giggles nervously. \"Well! It sounds like we might have got ourselves worked up over nothing. What's your name?\"\n\t\n\t\t\t\t\"${name}.\"\n\n\t\t\t\tShe enfolds your hand in hers. \"Thank you, ${name}.  I think we'll toddle on home now.\"\n\n\t\t\t\tHey, look who handled an incident! Good job, you!\n\t\t\t\t*set relationship_tweel %+15\n\t\t\t\t*set persuasion %+15\n\t\t\t\t*goto mothman_meeting\n\n\t\t\t*disable_reuse #Kiwi\n\t\t\t\t\"Could it be this?\"\n\n\t\t\t\tNeither the man or the woman spare your communicator a second glance. \"Kiwis only live in New Zealand.\" The woman sniffs. \"I don't think you know much about birds.\"\n\n\t\t\t\tOoh, that was quite a slip. Let's try again.\n\t\t\t\t*goto birds\n \n\t#I get them to flee to safety.\n\t\tYou rearrange your features into something resembling surprise. They really ought to include \"acting ability\" under the PGPB's Required Skills. \"Gee, Mothman?\" To your ears, it sounds false, but the old couple nod solemnly. Maybe you're just getting cynical after so many years.\n\n\t\tScrunching down on the decaying leaves, you surreptitiously check your communicator. Mothman's near, but holding his distance. For now, anyway.\n\n\t\tThe old man spreads his arms wide, mimicking Mothman's wings. \"It was him all right. A big freak, or maybe an alien, jumped from that beech there!\"\n\t\t*page_break C'mon Mothman\n\n\t\tInwardly, you seethe. Mothman is one of the more recent exiles to Earth, but even he ought to know better. These people can't stay here—he's a wily felon, convicted for plans to commit treason against the Pan-Galactic Alliance. The PGA doesn't take such things lightly, and the PGPB seems to view Earth as no better than a primitive rock in the galactic sea.\n\n\t\tIt's a little insulting, when you think about it.\n\n\t\tBut that's an outrage for another time. How can you get these people to leave?\n\n\t\t*choice\n\t\t\t#I get them all excited about the tabloids…which are really a PGPB front.\n\t\t\t\t\"You know,\" you say casually. \"The Global Gossip loves stories like this.\"\n\n\t\t\t\tBoth hikers stare at you. \"Isn't that a tabloid?\" the woman says at last.\n\n\t\t\t\t\"Not at all!\" Wearing a mask all the time gets hard. You force a smile. \"Investigative journalism, I swear. They're very thorough; they've got a whole database of eyewitness accounts.\"\n\n\t\t\t\tYeah, they do, since they're a front for the PGPB's Department of Misinformation. More creative minds than yours pull those strings—your job is just to get people to them.\n\t\t\t\t*page_break Such Glamour\n\n\t\t\t\t\"And the best part,\" you continue, \"is that they give a reward. Just the first time, though; they don't want people coming back with false stories again and again. The one-time payment's to discourage hoaxes.\"\n\t\t\n\t\t\t\tIrony, sweet irony.\n\n\t\t\t\tThe man rubs his chin. \"Seems reasonable.\"\n\n\t\t\t\tHook, line, and sinker. \"Get home now,\" you urge. \"Write them an email, while it's still fresh.\"\n\t\t\t\t*page_break \n\n\t\t\t\tThe woman wrings her hands. \"Well, I suppose we could. Bill, what do you think?\"\n\n\t\t\t\tHe nods. \"Before it comes back!\"\n\n\t\t\t\tYou politely decline their offer of a ride back to town and message the PGPB. The reply comes in seconds. Textbook case management, deserved accolades. Looks like you've got a bump in Clearance Level!\n\t\t\t\t*set clearance +15\n\t\t\t\t*goto mothman_meeting\n\n\t\t\t#Mothman is dangerous. I play that up for them!\n\t\t\t\tYou press yourself flat to the ground, damp earth clammy on your knees and elbows. \"You know what Mothman is, right?\" you hiss.\n\n\t\t\t\tThe man ducks. \"What?\"\n\t\t\n\t\t\t\t\"A radioactive mutant freak!\" Warming to your story, you have to suppress a grin. \"Often spotted around the TNT area in West Virginia. Nasty place, that, heaps of ammunition and radioactive rubbish, all tossed in the lake. Could be they mutated a bird, made it dangerous.\"\n\n\t\t\t\tThe man nods, but the woman is frowning. \"Your accent,\" she says. \"What's happening to it?\"\n\t\t\t\t*page_break Darn\n\n\t\t\t\tHer question stings. It's your own fault, of course; excitement has made you slip into a mode closer to the one you had as a child and young adult. For an instant, you wish with all your heart that you could go home.\n\n\t\t\t\tBut you can't. Everyone you knew then is dead, your old neighborhood demolished and replaced by high-rises.\n\n\t\t\t\t\"I grew up in Britain,\" you say quickly. \"But yeah, Mothman's really dangerous. You should get home.\"\n\t\t\t\t*page_break Smooth\n\n\t\t\t\tThey leave, but judging by the looks they give you, they're more afraid of you than Mothman. You flop on your back, massaging your temples. This homesickness is upending you more and more. And it's not just yearning for a place, but a time as well—a time you'll never get back. In a way, the PGPB has exiled you as much as any convict. \n\n\t\t\t\tFor the first time, you wonder how often the aliens look at the stars and despair that they'll never go home again. Looks like you're starting to sympathize with them, and you're not sure how to feel about that. \n\n\t\t\t\tBut hey, you got your job done. Right?\n\t\t\t\t*set justice %-15\n\t\t\t\t*goto mothman_meeting\n\n\t\t\t#There's a storm coming in. I use that to scare them.\n\t\t\t\t\"Oh, wow!\" you say, pointing dramatically. \"Look at that weather!\"\n\n\t\t\t\tIt's not totally a lie. Knotted black clouds advance over the horizon. The bare branches rattle like bones. What you wouldn't give for a blanket and a hot cup of tea.\n\n\t\t\t\tBut duty calls. You shake your head. \"You ought to get home, before the weather catches you. Hiking safety, right?\"\n\n\t\t\t\t\"Right you are!\" the man says. \"Let's go together.\"\n\t\t\t\t*page_break Let's Not\n\n\t\t\t\t\"It's all right,\" you say. \"I can manage myself.\"\n\n\t\t\t\tThe older woman shakes her head. \"Honey, there's a monster in those woods and a bad storm coming in. What would your mother think if you stayed out alone?\"\n\n\t\t\t\tYour mother had smiling eyes, and you loved flinging yourself against her petticoats.\n\t\n\t\t\t\tThe memory leaves you with tears standing in your eyes. \"I'll be fine.\"\n\n\t\t\t\tThe couple shrug and slowly leave, the man snapping pictures every few feet. Great, you'll have to have them flagged and monitored in case they return. \n\n\t\t\t\tBut more, you're overwhelmed by the past. Standing alone in that clearing, it really, truly hits you.\n\n\t\t\t\tThe PGPB is all you have left.\n\t\t\t\t*set resolve %+15\n\t\t\t\t*goto mothman_meeting\n\n\t*disable_reuse #I leave them and search for Mothman alone.\n\t\tYou sigh, feigning disinterest. \"Right, Mothman. Whatever you say.\" Yawning, you shuffle into the woods.\n\n\t\tBut the minute you're out of sight, you're creeping from tree to tree, gun drawn and ready. Provoking Mothman into an all-out fight is dangerous with humans—civilians, you mean; you're human too, right?—in the area, but you can handle it.\n\t\t\t\n\t\tAt least, you're pretty sure you can.\n\t\t*page_break Carry On\n\n\t\tLooping around the clearing, you take cover under a thicket. Thorns scratch your face, but you ignore them and lie in wait.\n\n\t\tThere's a sound in the trees. Shooting now might stun Mothman long enough for you to secure and question him. But if those hikers are still around, the sounds of combat will doubtless scare them, possibly into doing something stupid.\n\n\t\tFire or not? Your call.\n\t\t*choice\n\t\t\t#Shoot!\n\t\t\t\tYour finger squeezes the trigger. A crackling beam of energy bursts from the tip of your gun, illuminating the forest like lightning. A smoking crow falls from the branches to land with a thump. \n\n\t\t\t\tThat's what you get for jumping the gun (pardon the pun, if you would). Through the trees, the hikers scream. \n\t\t\t\t\n\t\t\t\t\"What's going on?\"\n\n\t\t\t\t\"The poor dear must be dead!\"\n\t\t\t\t*page_break Sigh\n\n\t\t\t\t\"No, no!\" You rush back through the woods, jamming your gun out of sight as you skid to a halt in the clearing. \"I'm fine. It's all fine. Everything is fine.\"\n\t\t\t\t\t\n\t\t\t\tThe couple eye you. \"Was it Mothman?\"\n\n\t\t\t\t\"No…\" Come on, they need to leave. Find a way!\n\t\t\t\t*set rule_bender %+15\n\t\t\t\t*set persuasion %-15\n\t\t\t\t*goto mothman_ploys\n\n\t\t\t#Don't shoot!\n\t\t\t\tCaution wins out. Good thing, too. Hardly a moment later, a huge crow flaps from the tree. You sigh and replace your gun. Shooting would have been a very, very bad idea. \n\t\t\t\t\t\n\t\t\t\tAs you crouch in wait, more movement rustles to your left. At ground level this time. Through the thickets, you glimpse a flash of grey. Scarlet eyes blaze like coals.\n\n\t\t\t\tSilently, you raise your gun. Just enough that he can see it. The hikers' voices filter through the trees. Mothman's head snaps towards the sound. You cough and push the gun forward.\n\n\t\t\t\tHe pauses. The sounds gradually fade away. The hikers are gone.\n\n\t\t\t\tNow you're left with him.\n\t\t\t\t*set resolve %+15\n\t\t\t\t*set rule_bender %-15\n\t\t\t\t*goto mothman_meeting_two\n\n*label mothman_meeting\nWith the hikers gone, you can get down to business. You venture into the woods, wishing you had about ten extra eyes to survey every direction at once. Some aliens are that lucky; sometimes, being human feels like a distinct disadvantage. \n*page_break\n\nYour communicator beeps, startling you half out of your skin. Mothman is near. You clear your throat. \"This is Agent ${name}, Liaising Agent with the Pan-Galactic Prisons Bureau. I know you're here, Mothman. Show yourself.\"\n\nYou're still not prepared when he steps from the bush.\n*goto mothman_meeting_two\n\n*label mothman_meeting_two\nYou don't remember Mothman being quite this tall. From a distance, he could almost pass as human, but there's something off in his proportions. The arms are too long, bend too much; his face looks like it can't decide whether it was going for \"humanoid\" or \"insectoid.\"\n\nAnd that's not even mentioning the glowing red eyes and giant wings.\n\nWhen he speaks, it's a soft, raspy sound, like silk snagging on gravel. \"May I help you?\"\n*page_break\n\n\"Yes, actually.\" Honestly, you're getting a bit tired of the false politeness ploy. It grated on you in the parlors of your old life, and the passage of time hasn't helped matters any. \"Quite a stunt you pulled with those hikers, Mothman. A few more incidents like that, and you can forget about parole.\"\n\nMothman tilts his narrow head to one side, like a particularly frightening dog. \"Why?\"\n\nSeriously? \"Because that's how this works. Stay low, stay out of trouble, and maybe you can get your sentence shortened. That's the deal.\"\n\nFor a long time, Mothman doesn't say anything. Then, \"I do not like this deal.\"\n*page_break Great\n\n\"Too bad.\" You tap at your communicator. \"I'll have to add this to the file. You know you're not supposed to approach humans, especially not humans on foot.\" While you draft an incident report, Mothman waits silently. \n\nJust before you hit send, you hesitate. Mothman has always been an odd one. He rarely gives a reason for anything he does, but he always, always has one. On the other hand, it'd be just like an exile to make you second-guess yourself.\n\n*choice\t\n\t#I can make him uncomfortable too. Then, maybe he'll talk. \n\t\t*set combat %+20\n\t\tTime to turn the tables, see how he likes being intimidated. Your fingers dance over your gun and you raise an eyebrow. Mothman just shakes his head. It becomes a standoff, the two of you motionless as statues, watching each other for the barest flicker of expression. Fortunately, you're the patient type.\n\t\n\t\tUnfortunately, so is Mothman.\n\t\n\t\t*if resolve > 60\n\t\t\tIn the end, though, you successfully outlast him. Mothman shudders and breaks his intense stare. \"I have a deal,\" he says quietly.\n\t\t\t*goto deal\n\t\t\n\t\t*else\n\t\t\tThe minutes tick by, broken only by the wind in the branches. Just as you're about to break the silence, Mothman inhales and tilts his head. Eagerly, you lean forward, but he resettles himself. Quiet again.\n\t\t\t*goto wrong_footing\n\n\t#He's messing with me. I send the report.\n\t\t*set rule_bender %-20\n\t\t*set justice %+20\n\t\tAs you tap send, you shake your head. After all this time, you ought to be immune to their psychological warfare. If there's one thing you've learned, it's this: aliens think differently, but some things are pretty much universal.\n\n\t\t\"Well?\" You give him your best penetrating glare. \"Don't you have anything to say for yourself?\"\n\n\t\tThe alien's nostrils flare. He says nothing.\n\t\t*page_break Forget This\n\n\t\tRolling your eyes, you turn to leave. Naturally, Mothman chooses that moment to say, \"I have a deal.\"\n\t\t*goto deal\n\n\t#Something isn't right. I question him.\n\t\t*set rule_bender %-20\n\t\t*set justice %-20\n\t\t\"Say, Mothman…\" You inject a note of compassion into your voice. It isn't hard. In fact, you do genuinely feel for some of these aliens. Every one of them has a story, and they're all fascinating. \"What's wrong? Sure, you caused a fuss when you first arrived, but you've been quiet the last few decades. This isn't like you.\"\n\n\t\tMothman's red eyes hold yours. \"Is it not?\"\n\n\t\t*label wrong_footing\n\t\tHe always had a habit of wrong-footing you. You wait, giving him another chance, but Mothman remains as tight lipped as ever. Until the moment you turn to leave.\n\n\t\t\"I have a deal.\"\n\t\t*goto deal\n\n\t\t*label deal\n\t\t*page_break\n\t\tEvery nerve tunes to high alert. \"Deal?\"\n\n\t\tMothman dips his head. \"You require information.\"\n\n\t\tAlarm bells ring. \"About…what, specifically?\"\n\n\t\tHe regards you haughtily. \"You require information. I collect information.\"\n\n\t\t\"You'll turn mole?\" You shouldn't laugh, but you can't help it. \n\n\t\t\"I will give you information. You will set me free.\"\n\t\t*page_break Well Then\n\n\t\tPlay it cool, ${name}. \"You're asking for a lot. Why should I trust you?\"\n\t\n\t\tIf only you could read Mothman better, but his eyes are as featureless as stone. \"I fly. I hear the others. They talk. There are plans in motion. Plans you cannot imagine. You can give me freedom. Helping you will help me.\"\n\n\t\tFirst, Tweel would never sanction this conversation. Ever. Second, this is really starting to creep you out. Mothman takes a few steps closer, which doesn't help.\n\n\t\t\"Will you accept my deal?\"\n\t\t*choice\n\t\t\t#Sure, I need an informant.\n\t\t\t\t*achieve ally\n\t\t\t\t*set rule_bender %+20\n\t\t\t\t*set relationship_mothman %+150\n\n\t\t\t\t\"All right,\" you say. \"Deal. You feed me information, I'll knock a few centuries off your sentence. We'll call it good behavior.\" \n\n\t\t\t\tMothman blinks. He's tricky to read, but you can practically feel the satisfaction rolling form him. \"Good.\" \n\n\t\t\t\tThere's a tracker installation unit in your communicator. A few minor adjustments, and Mothman can call you as he pleases. \n\n\t\t\t\t\"You should know,\" Mothman says, \"some exiles have been experimenting with new warp gate technology on Earth.\"\n\n\t\t\t\tYou shrug. \"Warp gates aren't very stable so close to the planet's gravitational field. You can't do much with them.\"\n\n\t\t\t\t\"So they are finding…for now.\" With that, Mothman spreads his wings and takes off. Well, it seems you have yourself a new partner, one that you cannot let Tweel even suspect. Hope you know what you're doing!\n\t\t\t\t*goto va_conclusion\n\n\t\t\t#No way. He's a convict.  \n\t\t\t\t*set rule_bender %-20\n\t\t\t\t*set relationship_mothman %-150\n\t\t\t\tWho does this convict think he is? You're here to uphold the law. There's no way you'll be partnering yourself with a criminal. \"Sorry, no deal.\"\n\n\t\t\t\tMothman's wings flare. Your hand's already on your gun, but then he settles down, drawing his wings around himself like a cloak. \"You chose this,\" he hisses, and then stalks into the woods.\n\n\t\t\t\tSomeone's unhappy. Better watch your back, Agent.\n\t\t\t\t*goto va_conclusion\n\n\t\t\t#I make a counter-offer: his info now, or I tell Tweel. \n\t\t\t\t*set relationship_mothman %-50\n\t\t\t\t*set rule_bender %-20\n\t\t\t\t\"How about this?\" you say. \"You give me your information now, and I'll talk to Tweel.\"\n\n\t\t\t\t\"No.\"\n\n\t\t\t\t\"Hey now, I don't have complete authority over your case. I can't just promise things.\"\n\n\t\t\t\tMothman glares are you. \"I am disappointed.\" \n\n\t\t\t\tAnd then he's gone, slipping through the woods. That was puzzling. You wonder what he meant by \"plans in motion.\"\n\t\t\t\t*goto va_conclusion\n\n*label va_conclusion\nWith the Mothman situation (mostly) under control, it's time to return your attention to the matter of this smuggling ring and their warp gates. \n\n*if (spheron_success = true)\n\tThe intelligence team has been busy while you've been traipsing through the woods. The information you acquired on Spheron has aided them greatly. Knowing that the warp gate is based somewhere in the United Kingdom has cut down the area they need to search—something that makes Tweel extremely happy.\n\n\tCongratulations, looks like your work has earned you a promotion. Clearance Level increases!\n\n\tAnd the intelligence team has pinpointed the illegal warp gate's location:\n\n\tLoch Ness.\n\t*set Clearance +5\n\t*set relationship_tweel %+10\n\t*finish\n\n*else\n\tThe intelligence team has been busy while you've been traipsing through the woods. Of course, it would have been better if you could have provided them with more information, but they eventually pinpointed the warp gate's location:\n\n\tLoch Ness.\n\t*set relationship_tweel %-10\n\t*finish"}};
</script>
<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
