nYou smile tightly. \"Part of the job—\" Movement behind the Moehau Monster catches your eye. \"Wait, what's that?\"\n\nThe Moehau Monster shuffles her feet, staring at the ground. Then she produces a struggling sheep from behind her. \n*page_break Sigh\n\nYou shake your head. \"Are you stealing that sheep?\"\n\nShe snorts. \"Look at you, mate, gone all stroppy.  Country's chock-a-block with sheep. More sheep than blokes, I reckon.\"\n\nYour jaw drops. The last time you made an official visit, you noticed the Moehau Monster had picked up more of the local slang than her cousin. It's worse now.\n\n\"You—you didn't answer the question.\"\n\n\"Not thick, are you?\" The Moehau Monster strokes the sheep. \"I was taking it back to its bach, returning it to the bloke what lost it. Now sheep, sheep are thick. I like to help them when they wander off.\"\n*page_break Oh, Sure\n\nYou raise an eyebrow. \"I find that hard to believe.\"\n\n\"Well, it ain't my brekkie, Bugalugs, if that's what you're thinking.\" The Moehau Monster's eyes narrow, and the sheep wriggles in her grasp. \"I wasn't about to nick it. Can't prove I was.\"\n\nCan you? Do you even want to? What do you do?\n\n*choice\n\t#I note this on her file.\n\t\t*set rule_bender %-20\n\t\t*set justice %+20\n\t\t\"Sorry,\" you say. \"I'll need to record this as an official incident.\"\n\n\t\tThe Moehau Monster leaps back. \"I wasn't doing nothing with it. Don't get all brassed off; I didn't steal it!\"\n\n\t\tYou shrug. \"Rules are rules.\"\n\n\t\tShe glares at you, fur falling into her piercing eyes. \"And how many years does that set me back, eh?\"\n\n\t\t\"That's up to Commissioner Tweel.\"\n\t\t\n\t\t\"Not fair,\" she mutters. \"I'm up the boohai, behaving meself, and my hard case cousin's on Discovery Channel every year taking a tiki tour of the Himalayas, and what does he get? Slap on the wrist, not even.\"\n\n\t\t*page_break\n\t\t\"The terms of the Yeti's sentence are between him and the Pan-Galactic Prisons Bureau,\" you say. \"I have nothing to do with it.\"\n\n\t\tThe Moehau Monster drops the sheep unceremoniously. Bleating, it blunders off into the bush. She bares her teeth. \"Sure, that's what they all say. Wash your hands, that's all.\"\n\t\t*page_break Ouch\n\n\t\tYou flinch. \"I will not argue this with you.\"\n\n\t\tShe turns her back to you, the ruff of fur along her neck bristling: a deliberate Hirsus insult. \"Because you can't.\"\n\n\t\tStaring at her steadily, you will your voice to stay even. \"We're done here. I have a few things to check in the nearest towns, after which I will report my findings to Commissioner Tweel. You'll be informed.\"\n\n\t\tShe doesn't look at you.\n\t\t*goto Thames \n\t\n\t#I turn a blind eye.\n\t\t*set rule_bender %+20\n\t\t*set justice %-20\n\t\tBiting back a sigh, you shake your head. \"You know you're only making things harder for yourself when you resort to antics like this.\"\n\n\t\tThe Moehau Monster peers through the thick curtain of fur falling into her eyes. \"And…?\"\n\n\t\t\"Next time, I'll have to inform Commissioner Tweel.\"\n\n\t\t\"But you won't this time?\"\n\n\t\tYou hesitate. \"No.\"\n\n\t\tShe springs to enfold your hand in her paw. \"I'm dead chuffed, mate! Thanks!\" \n\t\t*page_break Ow, My Hand\n\t\t\n\t\tYou wriggle free. \"Just don't do it again.\"\n\n\t\tThe sheep takes advantage of the distraction to hightail it through the bush. The Moehau Monster winks. \"I won't.\"\n\t\n\t\t\"All right.\" You rub your hand. \"I need to head into town. You'll be informed of the results of our meeting in due time.\"\n\t\t*goto Thames\n\n\t#I take custody of the sheep.\n\t\t*set justice %+25\n\t\t*set combat %+10\n\t\tBefore you can do anything else, you need to ensure the sheep's safety. You cross your arms and look at the Moehau Monster expectantly. Rolling her eyes, she drops the sheep. You crouch down and open your arms. The sheep runs straight into them. You hold it close. Wool tickles your nose.\n\n\t\t\"I'll be returning this myself,\" you say.\n\t\t\n\t\tThe Moehau Monster doesn't respond. \n\n\t\t\"We're done here.\" You stand. The sheep bumps against your knee. \"I have a few things to check in the nearest towns, after which I will report my findings to Commissioner Tweel. You'll be informed.\" You lead the sheep back to the ship. A quick stop at the nearest farm to return it, and then you're off to town. \n\t\t*goto Thames\n\n*label Thames\n*page_break\nThe township of Thames nestles at the southwestern end of the Coromandel Peninsula, not far from the Moehau Ranges. Rolling green hills plunge towards the sea, ending in cliffs battered by waves. Small Victorian buildings cling to the space between hills and ocean. Salty air tickles your nose as you wander the quiet streets.\n\nYou'd love time to play the tourist. But when you're on PGPB missions, you know there's one place you have to visit.\n\nThe pub.\n*page_break Such Hardship\n\nFrom past visits, you know that the Tumu Hotel serves as the local watering hole. The room seems smaller than you remember: more shadows in the corner and grime along the bar. Glasses stand in crooked lines along the bar, the rear ones coated with a fine layer of dust.\n\nWhere do you want to sit?\n\n*choice\n\t#By the window.\n\t\t*set observation %+10\n\t\tYou like seeing what's going on. You press close to the window, watching the activity on the street. This time of year, tourists flood Thames. You're used to them. Sometimes you wonder what it'd be like to join them—but then, perhaps you've been with the PGPB too long. You're different from the humans here, and you know it.\n\t\t*if (silver_sweet = true)\n\t\t\tThis is the sort of town that Andrew would have liked. Your hands clench on the tabletop, but you can't help a slightly painful smile. Even after all this time, you miss your rough farmboy. There have been others in the interim, but nothing very meaningful. \n\t\t\t*goto young_woman\n\n\t\t*else\n\t\t\t*goto young_woman\n\n\t#In the corner.\n\t\t*set stealth %+10\n\t\tIt's best not to attract attention. Sitting back here, you can lurk, bide your time, and plan your next move. The other pub-goers seem innocent. They probably are, although there are a handful of human ex-PGPB agents who have gone rogue. \n\t\t*goto young_woman\n\n\t#By the door.\n\t\t*set combat %+10\n\t\tAlways have an escape route. That was drilled into you during your combat classes. Always have an escape route. And so, you set yourself up by the door. From this vantage point, you can see the entire pub, just in case a fight breaks out or something. Not that you expect it to, but… \n\n\t\tScratch that. It happens.\n\t\t*goto young_woman\n\n\t#That table by the bar.\n\t\t*set persuasion %+10\n\t\tIt's always good to keep one ear on the conversations around you. It's even better to join in where appropriate, turning events with a few well-placed words.\n\t\t*if (silver_hardworker = true)\n\t\t\tSara the milkmaid would have been a good backup agent, you think suddenly. Odd, you haven't thought of her in decades. Sometimes, you wonder what it would be like to have a partner—or to be attached to someone again.\n\t\t\t*goto young_woman\n\t\t*elseif (silver_soubrette) = true\n\t\t\tLady Serena would have been a good backup agent, you think suddenly. Odd, you haven't thought of her in decades. Sometimes, you wonder what it would be like to have a partner—or to be attached to someone again.\n\t\t\t*goto young_woman\n\t\t*else\n\t\t\t*goto young_woman\n*label young_woman\nA young woman hands you a menu. It's getting near supper, and you doubt you'll be able to pick up any useful information on an empty stomach.\n\nWhat are you having tonight?\n\n*fake_choice\n\t#Fish and chips.\n\t#Lamb with mint jelly.\n\t#Bangers and kumara mash.\n\t#Mince pie with tomato sauce.\n\t#The vegetarian option.\n\t\t\nExcellent choice! Your food arrives quickly, and soon you're tucking in. After a long day's work, your stomach feels pinched, so you spend a few moments absorbed in the rapid movement of knife and fork to your mouth and back. Only a few moments, though—you are a professional. Once the edge of your hunger is dulled, you lean back in your chair and listen.\n\n\"All Blacks will take it, I reckon,\" declares a man across the room. \"Dead chuffed.\"\n\t\t\n\"So I says to him, if you're nipping out the whare for kai, you might ask your tama if he wants to come, eh?\"\n\nAnd then, a shrill American accent. \"No, I swear, I got a photo—it looks like a Bigfoot or something!\"\n*page_break Aha\n\n*label angle_chair\nSubtly, you angle your chair so that you're facing the speaker. He's a young man with lank brown hair and a spray of freckles across his nose. An overstuffed backpack, its top lashed with bungee cords and secured with a heavy padlock, sits at his feet. He's waving his phone around the table.\n\n\"See, no one back home has ever heard of this thing, this Moe…Moe-how…\"\n\n\"The Moehau Monster?\" an old man says quietly.\n\n\"That's it!\" The young man drags his finger across his phone's screen. It startles you, sometimes, how quickly human technology has changed. Sometimes, you wonder if Earth's alien convicts are responsible. \"I've been searching for it, and now I've got proof.\" He grins. \"I could get good cash for these, right?\"\n*page_break Time To Intervene\n\nYou need to do something about this young man. But what?\n\n*label jon_choices\n*choice\n\t#I act friendly to draw this kid out.\n\t\t*set resolve %+10\n\t\tYou go over and introduce yourself, pasting a smile on. \"Couldn't help overhearing. This Moehau Monster sounds really interesting. I'm ${name}, by the way.\"\n\n\t\tThe young man barely looks at you. \"Jon Stetson.\"\n\t\t\n\t\t\"Have you been in New Zealand long, Jon?\" you ask.\n\t\t\n\t\tHe shakes his head. \"Just a few weeks. Came to find the beast.\"\n\n\t\t\"And how did you find her—it?\"\n\t\n\t\tThe young man puffs himself up. \"Spent a few nights in the bush: just me, my tent, and my camera. Sheep were going missing, see, so I figured it had to be the monster.\"\n\t\t*page_break Of Course\n\t\t\n\t\tCursing the Moehau Monster, you nod towards his phone. \"All the pictures on there, I take it?\"\n\t\t\n\t\t\"Yep.\"\n\n\t\t*if persuasion > 50\n\n\t\t\tYou fish two hundreds from your wallet. Good thing you changed some of your Standard Currency Units to American dollars earlier. \"Look, I'll give you these if you delete them.\"\n\n\t\t\tJon's eyes widen. \"Why?\"\n\n\t\t\t\"Because it's bad for the bush, having people tramp through looking for some ridiculous legend!\" you snap. \"New Zealand is a unique ecology. Nuts like you are only threatening that.\"\n\n\t\t\tHe goes quiet. \"I hadn't thought of that,\" he says at last. \"All right.\"\n\n\t\t\t*set cash -10\n\t\t\t*goto jon_success\n\n\t\t*else\n\t\t\n\t\t\tYou fish two hundreds from your wallet. Good thing you changed some of your Standard Currency Units to American dollars earlier. \"Look, I'll give you these if you delete them.\"\n\n\t\t\tHe snorts. \"No way. I can make a lot more! I'll keep these photos, thanks.\"\n\t\t\t*goto closing_time\n\n\t*selectable_if (persuasion \u003c 55) #I ask to borrow his phone.\n\t\tYou walk over, patting your pockets. \"Say…this is embarrassing.\" You give the kid your most winning smile. \"I seem to have left my phone at the backpackers'. Can I borrow yours?\"\n\n\t\tHe snorts. \"You just want to see my photos. Believe me, Jon Stetson is not that dumb.\"\n\n\t\tNo, but apparently he does refer to himself in the third person. Fantastic. As for you, ${name}, you probably could have been a bit more subtle. Want to try that again?\n\t\t*goto jon_choices\n\n\t*selectable_if (persuasion > 50) #I ask for copies of his photos.\n\t\tYou carefully slide into the seat next to the young man. \"Sorry to bother you, I couldn't help overhearing that you got some remarkable photos. I wonder…\" You trail off, smoothing your shirt unnecessarily. \"Could you send me some copies of those photos?\"\n\t\t\n\t\tThe man's eyes nearly bug out of his head. \"And let you get the fame and fortune? No way! You'll see! Jon Stetson—that's me—is gonna be a household name!\"\n\t\t\n\t\tQuick, rebuttal!\n\t\t*choice\n\t\t\t#\"Look, I'm a cryptozoologist. I study monsters.\"\n\t\t\t\t*set rule_bender %-10\n\t\t\t\tThe instant the words leave your mouth, Jon's face lights up. \"So…it's a real monster, right?\"\n\t\t\t\t\n\t\t\t\tYou hesitate. \"It's hard to tell for sure.\"\n\n\t\t\t\tThe old man shrugs. \"Lots of people have heard now. All the tourists, even us Kiwis, they're all coming here to find it.\"\n\n\t\t\t\tYou curse inwardly. \"Do you have any other proof?\"\n\n\t\t\t\t\"Just this….\"\n\t\t\t\t*page_break\n\n\t\t\t\tJon withdraws a clump of matted fur from his pocket. Your heart sinks. It's definitely the Moehau Monster's. But your training kicks in, and you force a laugh. \"Looks like possum fur, mate.\"\n\n\t\t\t\tThe old man shoots you a sharp look. \"Yes…\" he says slowly. \"That's what I thought….\"\n\t\t\t\t*goto closing_time\n\t\t\t\n\t\t\t#\"I want to buy them.\"\n\t\t\t\t*set resolve %+10\n\t\t\t\tJon clutches the phone to his chest. \"You?\"\n\n\t\t\t\t\"Sure.\" You shrug. \"I don't have a few million, but I could give you a hundred bucks.\"\n\n\t\t\t\t\"A hundred bucks?\" Jon's voice cracks. A few other patrons turn around, peering at him over their drinks. \"This is worth way more than that!\"\n\t\t\t\t*page_break\n\n\t\t\t\t\"Take it or leave it.\"\n\n\t\t\t\tJon huffs. \"Leave it.\"\n\t\t\t\t*goto closing_time\n\t\t\t\n\t\t\t#\"It doesn't look like a monster, kid.\"\n\t\t\t\t*set combat %+10\n\t\t\t\tFor a moment, there's dead silence. Then Jon leaps up and steps towards you. You watch him dispassionately. \"Well, it doesn't,\" you say.\n\n\t\t\t\t\"Oh yeah?\" Jon's hands curl to fists by his sides. \"Mind telling me what it does look like?\"\n\t\t\t\n\t\t\t\tMotioning for the phone, you pretend to examine the pictures again. You tap your chin. \"A hiker. A hunter, maybe, in camouflage gear. A large possum. A kiwi, with some digital manipulation.\"\n\t\n\t\t\t\tThe young man gapes at you. \"It is not!\" With that, he gets up and moves to the other side of the pub. The old man gives you a sympathetic look.\n\t\t\t\t*goto closing_time\n\n\t#I wait until he gets up, then swipe his phone.\n\t\tAfter a few more plates of chips and pavlovas, the young man sidles away towards the washroom. \"Back in a minute,\" he calls to the old man. \"Or my name isn't Jon Stetson!\"\n\n\t\tHe's left his phone.\n\t\t\n\t\t*if stealth > 55\n\n\t\t\tYou sweep the phone into your lap. No one notices. Working quickly, you flip through his photos. It's easy enough to delete them, and you slide the phone back in place just as Jon comes back.\n\n\t\t\t\"Thought I lost this!\" he says, pocketing the phone. \n\n\t\t\tYou smile. \"That would be a pity.\"\n\n\t\t\t\"Sure.\" Jon gulps down another L&P. \"All the photos are there!\"\n\t\t\t\n\t\t\tYou grin.\n\t\t\t*goto jon_success\n\t\t\n\t\t*else\n\t\t\tYou sweep the phone into your lap. At least, you try to, but your elbow bumps the salt cellar. It clatters across the table, spilling salt everywhere. Your cheeks burn as the old man looks at you.\n\n\t\t\t\"That isn't yours,\" he says quietly.\n\n\t\t\tYou can't look him in the eye. You slide the phone back onto the table and clean up the salt.\n\t\t\t*goto closing_time\n\n\t#I ask the old man for his opinion.\n\t\t*set persuasion %+10\n\t\tSwiveling in your chair, you face the old man. Deep lines bracket his mouth, but his eyes are sharp and focused: so dark, they're nearly black. \n\n\t\t\"What do you think?\" you say. \"Is the Moehau Monster a myth?\"\n\n\t\tThe old man's dark gaze penetrates you. The young man is leaning forward on his chair, holding his breath. You ignore him.\n\n\t\t\"Well?\" you repeat. \"What do you think?\"\n\t\t*page_break\n\n\t\tThe old man's eyes flick to the young man. It's so fast you nearly miss it. Then, he looks at you again and you swear he winks. \n\n\t\t\"I've never seen it,\" the old man says. \"Not like Jon, here. Never the Moehau Monster, nor the taniwha, the pouakai, patupaiarehe—\"\n\n\t\tJon's jaw drops. You run through a mental checklist. Only the Moehau Monster is an exile under the PGPB. Humanity does have some of its own myths, after all.\n\n\t\t\"But I see no need to hunt them,\" the old man finishes.\n\n\t\t\"But—the proof!\" Jon sputters.\n\n\t\t\"If you need proof and I do not…\" the old man finishes his drink. \"Then, I must believe in them more than you.\"\n\t\t*goto closing_time\n\n*label closing_time\nClosing time eventually rolls around at the pub. As you follow the other patrons into the warm New Zealand night, you feel yourself focusing. Your reconnaissance didn't quite go as well as you hoped. Enough talk, time for action.\n\n*choice\n\t#I force Jon's silence.\n\t\t\"Hey, Jon!\" You stumble a little. \"A little help?\"\n\n\t\tJon drifts back to you. \"What's wrong?\"\n\n\t\t\"Twisted my ankle just there. Give me a hand to the backpackers'.\"\n\t\n\t\tYou support yourself on Jon's shoulder and gently direct him through the streets. Thames is small, but you find an out-of-the-way alley. \"This way,\" you say.\n\t\t*page_break\n\n\t\t*if combat > 55\n\t\t\tJon peers at it. \"There's a hostel down here?\"\n\n\t\t\t\"No.\" You spring free of him and draw your PGPB-issued gun. Jon goes pale. \"I need your phone, Jon.\"\n\n\t\t\t\"Help!\" he calls. \"Mugger!\"\n\n\t\t\tYou discharge the gun against the wall. The air crackles with electric blue heat. Jon's eyes widen. PGPB agents can use force when they need to—you answer to a galactic power, not just earthbound ones. Sometimes, agents get used to it.\n\t\n\t\t\t\"The phone, Jon.\"\n\t\t\t*page_break\n\n\t\t\tHe tosses it to you. You pocket it. \"And your external storage devices.\"\n\t\n\t\t\tA collection of USB keys and hard drives clatters on the pavement. You scoop them all up. \"The laptop, too.\"\n\n\t\t\tHe shakes his head. \"Didn't bring it.\"\n\n\t\t\tYou fire another warning shot. \n\n\t\t\tHe passes you his entire backpack.\n\t\t\t*page_break\n\n\t\t\t\"Now, Jon….\" You circle nearer. \"I don't want to hear any more about the Moehau Monster. Understood?\"\n\n\t\t\tHe gawks at your gun. \"Who are you?\"\n\t\n\t\t\t\"Understood?\"\n\t\n\t\t\t\"Yes,\" he whispers.\n\n\t\t\t\"Good.\" You speak very softly, right in his ear. \"Because I'll know. And I'll be back.\" Checking him one last time, you nod. \"Get out of here.\"\n\n\t\t\tHe does. Immediately.\n\t\t\t*set combat %+15\n\t\t\t*set justice %+15\n\t\t\t*goto smuggling_ring\n\t\n\t\t*else\n\t\t\tAs you go to grab the phone, you trip and fall into Jon. His hands go flying up, and the phone slips between his fingers. It smashes into the ground with a sickening crunch. You try to regain your balance, but your legs are tangled with Jon's and both of you fall. Jon lands heavily on his backpack. You hear more crunching.\n\n\t\t\tYou stare at him, stunned and kind of elated. \"Sorry, mate.\"\n\t\t\n\t\t\t\"Sorry?!\" Jon screams. \"My photos! Everything! You'll pay for this!\"\n\t\n\t\t\tDoubtless Tweel will be unhappy to hear how this will affect next quarter's budget. That's going to cost you points in her book—and drop your clearance level. But hey, you got the job done!\n\t\t\t*set clearance -5\n\t\t\t*goto smuggling_ring\n\n\t#I relocate the Moehau Monster.\n\t\t*set resolve %+10\n\t\tMoving confidently, you head back to the ${ship_name}. The Moehau Monster is lurking in the bushes nearby.\n\n\t\t\"I see you,\" you call out.\n\n\t\tShe blinks. \"Reckoned you did, mate. It's a bit hard to blend in, eh?\"\n\n\t\t\"Exactly.\" You take out your communicator. \"That's why we're relocating you.\"\n\n\t\t\"What?\"\n\t\t*page_break\n\t\n\t\t\"You heard me.\"\n\t\t\n\t\tThe Moehau Monster shakes her shaggy head. \"But why?\"\n\n\t\t\"People know you're here. They're descending on the Coromandel region—you need somewhere quieter.\" You pull up a map of New Zealand. \"Where to put you?\"\n\t\t*fake_choice\n\t\t\t#Stewart Island: the country's southernmost point.\n\t\t\t#The West Coast: rugged and remote.\n\t\t\t#Tongariro National Park: volcanic, sometimes inaccessible.\n\t\t\t#Fiordlands: beautiful, far away.\n\t\t\t\t\n\t\tExcellent choice! You punch in the coordinates and look up. \"A transport will be here shortly.\"\n\t\t\t\t\n\t\tThe Moehau Monster kicks at the ground. \"Rough ride, that. I liked it here.\"\n\n\t\t\"Maybe you'll be back one day.\" You climb into your ship. \"Stay on your best behavior.\"\n\t\t*set stealth %+15\n\t\t*set rule_bender %-15\n\t\t*goto smuggling_ring\n\n\t#I make it look like a hoax.\n\t\t*if persuasion > 55\n\t\t\tYour plan takes a bit of time and attention to detail, but it's nothing you haven't done before. Some specimens of possum fur, collected from your last visit, get scattered around the area. You snap a few photos yourself: obviously possums, but close enough to Jon's images that people understand how he might have been \"mistaken.\" \n\n\t\t\tA few choice words about how bad the possums have been this year—a story energetically taken up by the old man from the pub—and the town's in agreement: there is no Moehau Monster, only a very large possum that fooled a young backpacker.\n\t\t\t*set resolve %+15\n\t\t\t*set persuasion %+15\n\t\t\t*goto smuggling_ring\n\n\t\t*else\n\t\t\tYou do your best, but Jon's attracting all the wrong sorts of attention. A few people give him funny second looks, but most actually seem pretty excited about the Moehau Monster. Tweel won't be particularly happy with your performance, but thank goodness for that old man—you hope you can trust him to settle the town down.\n\t\t\t*set resolve %-10\n\t\t\t*set relationship_tweel %-10\n\t\t\t*goto smuggling_ring\n\n*label jon_success\nNice work, ${name}, you handled the situation with Jon very well. When the pub closes, you can't help smiling as he ambles into the night. Those pictures won't be a problem now!\n*goto smuggling_ring\n\n*label smuggling_ring\nJust as you're taking a second to catch your breath, your communicator flashes urgently. You take it out. Tweel is looking for you, and she wants to talk to you face-to-face.\n\nSo, you have to wait until you're settled in the ${ship_name}. You call up a screen and wait, drumming your fingers on the armrest until Tweel's beaked countenance fills your field of vision.\n\n\"Agent!\" she barks.\n\n*page_break Uh-Oh\n\n\"What is it?\" You try to ignore the feathers bristling around her face. \n\n\"Glow-in-the-dark watches! Chocolate bars! Croquet sets!\"\n\nMaybe, after all of this time, Tweel has finally snapped. You compose yourself. \"I'm sorry, Commissioner. I don't understand.\"\n\n\"We interrupted a shipment of goods being processed on Spheron.\" Tweel's large yellow eyes narrow. \"Illegally imported goods. Earth goods.\"\n\nThe bottom drops from your stomach.\n*page_break Uh-Oh Again\n\n\"How did Earth goods wind up on Spheron?\" you ask. \"I know it's not the most law-abiding planet, but…\"\n\n\"That's the question of the day, isn't it?\" Even separated by a screen, Tweel's voice makes you shrivel a little inside. \"Because the only extraterrestrial inhabitants of Earth are our exiles. The exiles that you are supposed to be monitoring.\"\n\n\"No one's gotten off-world,\" you say quickly. \"I'm sure of it.\"\n\n\"Then they're helping a third party smuggle goods between Earth and Spheron.\" Tweel shakes her head. \"It's a smuggling ring, operating right under your nose.\"\n\n*if rule_bender > 60\n\tYou shrug. \"I'm only responsible for the exiles themselves, not anyone they're consorting with.\"\n\n\t*if persuasion > 60\n\n\t\tTweel frowns. \"I suppose you're right. You're off the hook this time, but watch your step, ${name}.\"\n\t\t*goto liftoff_nz\n\t\n\t*else\n\t\t\"But you are responsible for their behavior. I'm very disappointed, ${name}.\" Her feathers bristle again. \"I'm afraid this means demotion. Your Clearance Level will drop.\"\n\t\t*set clearance -10\n\t\t*set relationship_tweel %-20\n\t\t*goto demotion\n\n\t*label demotion\n\t\"Demotion?\" Your voice sounds hollow to your own ears.\n\n\t\"I'm tired of your skirting protocol. Maybe this will help the lesson stick.\" Tweel dismisses you with a wave of her hand. \"Now, Agent Braun is usually our top choice for off-planet missions, but she's injured. Explosives-related, I believe. Expect a PGPB transport to reach you in the next hour. You're going to Spheron.\"\n\t*goto liftoff_nz\n\n*else\n\t\"I can't believe it,\" you murmur. Tendrils of horror curl around your chest. \"This whole time…\"\n\t\n\t\"What's done is done,\" Tweel says briskly. \"The important thing is stopping the traffic. I'll add some Standard Currency Units to your budget. Use them wisely.\"\n\t*set cash +100\n\t*goto braun\n\n\t*label braun\n\tAs you try to stammer out your thanks, Tweel dismisses you with a wave of her hand. \"Now, Agent Braun is usually our top choice for off-planet missions, but she's injured herself again. Explosives-related, I believe. Expect a PGPB transport to reach you in the next hour. You're going to Spheron.\"\n\t*goto liftoff_nz\n\n*label liftoff_nz\n*page_break\nTrue to Tweel's word, a transport arrives quickly. It's piloted by another Tetu, but to your surprise, a small, batlike Chiroptera leaps out and scampers to your ship.\n\n\"What are you doing?\" you shout.\n\nThe Chiroptera waggles his enormous ears and spreads his claws wide, revealing the membrane stretching between his forearms and sides. \"Taking your ship to PGPB docks for you. The Atlantic one. Atlanta?\"\n\n\"Atlantis?\"\n\n\"That's the one! She'll be waiting when you get back.\" The Chiroptera hops inside. \"Have fun on Spheron!\"\n\nAs the door to the transport closes, you suppress a shudder. You're not sure fun is the right word. Not at all.\n*finish \n\n\n", "plains": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Yeti's Parole Officer[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\nWhen your transport touches down in Texas, it's pitch-black and you're having trouble catching your breath. Hopping from place to place is a necessary part of the job, but it's certainly rough on you. You check your communicator, calling up the universal clock function. Although it's the wee hours of the morning in Loch Ness, it's just after nine at night here.\n\nAs you step from the transport, you shiver. It's warmer than it was in Virginia, but the night air still carries a chill. Clouds cloak the moon; the lights of a small town glow in the distance. \n\nIt's so dark. You tap at your communicator again, scanning for life forms.\n*page_break\n\n${silver} jostles you. \"Anything?\"\n\n\"Hold on.\" You bite your lip. The lines of data keep blurring in your vision. It's been a long day, and you're starting to run on fumes. \"The chupacabra definitely were here.\"\n\n${silver} snorts. \"I could have guessed that.\"\n\n\"Oh?\"\n\nWordlessly, ${silver_she} points to a dark shape on the ground about twenty feet away.\n*page_break This Doesn't Look Good\n\nYou stumble through dusty stones and scrub. When you're still a few steps away, you recognize the shape. It's a cow, lying flat. You can tell at a glance that it's dead, but it doesn't smell.\n\nAnd it is that absence of smell which is horrifying.\n\nBy sheerest cosmic coincidence, the chupacabra's own name for themselves is identical to the one the people of Earth have given them. \n\nEl chupacabra. Goat-sucker. \n\nThey drain their victims completely dry. The cow looks mummified. If you were a less experienced agent, your fish and chips dinner would be splattered all over the ground by now. As it is, you still have to swallow hard.\n*page_break Eurgh\n\n*if (silver_sweet = true)\n\tTurning away from the cow, you face ${silver}. $!{silver_she} has gone very pale, but when ${silver_she} speaks, ${silver_his} voice is steady. \"It's been here a while.\" ${silver} hesitates, and then adds, \"Poor thing.\"\n\n\t*choice\n\t\t#Poor ${silver}. I hug ${silver_him}.\n\t\t\tYou give ${silver} a hug that surprises you more than ${silver_him}. \"Don't worry,\" you say. \"We'll find them.\" \n\n\t\t\tFaint tracks surround the carcass. You kneel to inspect them. Suddenly, ${silver} blurts, \"Thanks for that, ${name}.\n\t\t\t\n\t\t\tYou smile.\n\t\t\t*set relationship_silver %+10\n\t\t\t*goto act_now\n\t\t\t\n\t\t#I crack a joke to break the tension.\n\t\t\t\"Shucks,\" you say. \"No chance of steak tartare then?\"\n\n\t\t\t${silver} swings around with a horrified expression. \"You can't eat it! It's evidence!\"\n\n\t\t\tPoor ${silver}. You shake your head. \"Good point.\" Noting some tracks heading northward, you peer into the night.\n\t\t\t*goto act_now\n\n\t\t#We don't have time for this. I tell ${silver} to buck up.\n\t\t\t\"It's just a cow,\" you say. \"Stiff upper lip, ${silver}.\"\n\n\t\t\t${silver} raises an eyebrow. \"You're heartless.\"\n\n\t\t\t\"I am not.\" You kneel to inspect the cow. It's clearly been there a while, and faint tracks surround it, heading northwards.\n\t\t\t*set relationship_silver %-10\n\t\t\t*goto act_now\n\n*elseif (silver_charismatic = true) or (silver_soubrette = true)\n\t${silver} nudges you. \"You doing all right there, ${name}?\"\n\n\t\"Of course. Why wouldn't I be?\"\n\n\t${silver} grins wickedly. \"Looked a little pale, that's all.\"\n\n\t*choice\n\t\t#I tell ${silver} to be quiet.\n\t\t\t\"Not now, ${silver},\" you say. \"We're on the clock.\"\n\n\t\t\t${silver} shrugs. \"Just worried about you. That's all.\"\n\n\t\t\tOh. That was…unexpected. You ponder that as you examine tracks around the cow's carcass. They're heading northwards, and at a good pace, too.\n\t\t\t*goto act_now\n\n\t\t#${silver} doesn't look so hot either. I mention that to ${silver_him}.\n\t\t\t\"You know,\" you say, \"you're not even looking at it. What's the matter? Scared?\"\n\n\t\t\t${silver}'s eyes flash. \"No. I was actually looking at the tracks around the body. Chupacabra prints, if you hadn't noticed.\"\n\t\t\t*if observation > 50\n\t\t\t\tYou did. You say so. ${silver} is unimpressed.\n\t\t\t\t*goto abz\n\n\t\t\t*else\n\t\t\t\tYou hadn't. That's a little embarrassing. ${silver} looks smug.\n\t\t\t\t*goto abz\n\n\t\t\t*label abz\n\t\t\t\"They're heading north,\" ${silver} continues. \"At a good clip, too.\"\n\t\t\t*set relationship_silver %-10\n\t\t\t*goto act_now\n\n\t\t#I bite my tongue. I may say something I'll regret otherwise.\n\t\t\tPressing your lips tightly together, you crouch next to the cow. It's not much more than bones and leather, now.\n\n\t\t\t\"Hey, ${name},\" ${silver} says suddenly. \"Did I upset you?\"\n\n\t\t\tYou shrug.\n\n\t\t\t\"I didn't mean to.\" ${silver} kneels next to you. \"Sorry if I went overboard.\"\n\n\t\t\tAn apology? You feel a slow smile creeping across your face. \"Thanks for that.\" Returning your attention to the cow, you point to some tracks. \"What do you think? They're going north?\"\n\n\t\t\t${silver} frowns. \"Pretty fast, too.\"\n\t\t\t*set relationship_silver %+10\n\t\t\t*goto act_now\n\n*else\n\t${silver} is such a hard worker—you've barely had time to examine the cow's carcass when ${silver_she} announces, \"It's been here a while. See those tracks? The chupacabra are heading north. Quickly, too.\"\n\n\tOh. ${silver} is looking at you expectantly, but how do you feel?\n\t*choice\n\t\t#${silver} means well, but I think ${silver_she} can be a bit insufferable sometimes—like now.\n\t\t\tYou [i]did[/i] want a crack at figuring things out yourself. Not to mention, this was your case originally. You sigh. \"Thanks, ${silver}….\"\n\t\t\t*set relationship_silver %-10\n\t\t\t*goto act_now\n\n\t\t#Wow, I'm glad one of us is on top of things!\n\t\t\tMaybe Tweel knew what she was doing when she paired you two. Having ${silver} around is certainly helpful. You grin at ${silver_him}. \"Nice one!\"\n\t\t\t*set relationship_silver %+10\n\t\t\t*goto act_now\n\t\t\n\t\t#Mixed: this was my case, but ${silver} is helpful….\n\t\t\tPartnerships in the PGPB can be complicated. On the one hand, you're impressed by ${silver}'s work ethic. On the other— well, you want to contribute too. You manage to give ${silver} a small smile, at least.\n\t\t\t*goto act_now\n\n*label act_now\nIf you act now, you might be able to find the chupacabra. But you are so exhausted, you're not sure how effective you'll be. And as much as ${silver} might deny it, you can tell ${silver_she} is dragging, too. As always, it's your call, ${name}.\n\n*choice\n\t#I can keep searching once I get some coffee in me.\n\t\t*set resolve %+10\n\t\tWearily, you head back to the ship. There is a packet of instant coffee and a hot water valve alongside one wall. You make a coffee for yourself, and then hesitate.\n\n\t\tWill you make one for ${silver}, too?\n\t\t*choice\n\t\t\t#Yeah, ${silver_she} looks tired.\n\t\t\t\t${silver} may get on your nerves, but you're partners now. You gulp your coffee down and hand another to ${silver_him}.\n\n\t\t\t\tIt's accepted silently, but with a nod that lets you know it was the right thing to do. Now, get searching!\n\t\t\t\t*set justice %-15\n\t\t\t\t*set relationship_silver %+15\n\t\t\t\t*goto chup_search_one\n \n\t\t\t#No, if ${silver_she} wanted one, ${silver_she} would ask.\n\t\t\t\tYou gulp your coffee down. When you come back out, ${silver} raises an eyebrow. \"Where's mine?\" ${silver_she} asks.\n\n\t\t\t\tYou freeze. \"You looked so alert,\" you say quickly. \"I didn't think you would want one.\"\n\n\t\t\t\t${silver_she} smiles. \"That's right. Thank you.\"\n\n\t\t\t\tSo, you've kept ${silver} in a good mood, but at what cost? As you start searching, you can't help but think ${silver_she} is moving more slowly. Too late now!\n\t\t\t\t*set persuasion %+15\n\t\t\t\t*set relationship_silver %+15 \n\t\t\t\t*goto chup_search_two\n\n\t\t\t#I find ${silver} hard to read. I'll ask ${silver_him}. \n\t\t\t\tYou stick your head outside. \"Hey, ${silver}! Want a coffee?\"\n\n\t\t\t\t\"Uh…sure?\"\n\n\t\t\t\tAs you hand ${silver_him} the cup, ${silver_she} smiles hesitantly. \"Thanks.\"\n\n\t\t\t\tMaybe this partnership thing won't be so bad.\n\t\t\t\t*set observation %+15\n\t\t\t\t*set relationship_silver %+15\n\t\t\t\t*goto chup_search_one\n\n\t\t*label chup_search_one\n\t\tThe coffee's done you well. Of course, you need sleep soon, but you can function a bit longer. Both you and ${silver} keep your communicators handy, scanning for signs of extraterrestrial life.\n\n\t\tThere's some residual DNA here and there: stray hairs, saliva, that sort of thing. They're increasingly fresh; the chupacabra can't be far away.\n\n\t\tYou're near a farm when you see it up ahead: another shape sprawled on the ground. This one doesn't look like a cow.\n\t\t*page_break Uh-Oh\n\n\t\t*label find_farmer\n\t\tYou and ${silver} race towards it. Your legs ache with tiredness, but you are suddenly very, very alert.\n\n\t\tIt's a man, somewhere in his forties, with a weatherworn face and cropped grey hair. Blood oozes from gashes in his arms and chest, and seeps through tears in his blue denim jeans.\n\n\t\t${silver} curses. \"What do we do, ${name}?\"\n\n\t\tThe PGPB could save him, but he'd need a memory wipe after, and that's a complicated procedure. A human doctor might be able to save him, if you could call for help. That being said, he's in bad shape. You've both got first aid kits—you may be able to patch him up.\n\n\t\t\"What do we do?'\n\t\t\n\t\t*choice\n\t\t\t#I call the PGPB.\n\t\t\t\tThis isn't for you to handle. You call the PGPB, while ${silver} attempts to staunch the bleeding. Tweel isn't pleased, but even she agrees the man's life needs to be saved. Brilliant lights dart across the sky, and then an emergency medical vehicle lands. \n\n\t\t\t\tWorking hard, the medics manage to stabilize the man. It takes a long time to heal his wounds, longer still to wipe his memory. There's a reason the PGPB doesn't do it often, but this is a special case.\n\n\t\t\t\tWhen he wakes up, he'll have vague recollections of coyotes rushing him. You're more worried about the PGPB vehicle. Lights have appeared in the farmhouse, and you can practically see the headlines proclaiming UFO sightings.\n\t\t\t\t*set justice %-20\n\n\t\t\t\t*if relationship_silver > 55\n\t\t\t\t\t${silver} surprises you by laying a hand on your arm. \"There's nothing more we can do tonight,\" ${silver_she} says. \"We'll track them down in the morning.\"\n\t\t\t\t\t*goto next_morning\n\n\t\t\t\t*else\n\t\t\t\t\t${silver} is apparently thinking along the same lines. \"So much for subtlety,\" ${silver_she} mutters. \"Everyone in a fifty-mile radius will know we're here.\"\n\n\t\t\t\t\t\"Better than him dying!\" you protest.\n\n\t\t\t\t\tThe cold look in ${silver_his} eyes scares you. \"If the PGPB is revealed, there may be more.\" Abruptly, ${silver_she} turns on ${silver_his} heel. \"It's too dark now. Tomorrow, we are finding those disgusting, bloodthirsty brutes.\"\n\t\t\t\t\t*set ufo true\n\t\t\t\t\t*goto next_morning\n\n\t\t\t#I run to the farmhouse and use the phone to call a human doctor.\n\t\t\t\t*label farmhouse\n\t\t\t\tYou don't want to waste PGPB resources—memory wipes are only done in truly exceptional circumstances. You're not sure this counts, and you're not confident enough in the PGPB to risk it. They can be coldly calculating at times.\n\n\t\t\t\tSo you goad your legs into more movement. You run across the fields, towards the soft lights winking in the farmhouse windows. You hammer on the door, rehearsing what you're going to say.\n\n\t\t\t\t*if persuasion > 60\n\t\t\t\t\tAs soon as the door opens, you gasp. \"My friend and I were driving and our car broke down and we found a man! He's hurt—I think coyotes attacked him!\" \n\n\t\t\t\t\tThe woman who answers the door gasps. You're persuasive enough that she buys your story without much hesitation. A medical helicopter comes quickly and the man is whisked away to a nearby hospital. \n\n\t\t\t\t\tFor now, you've controlled things without involving the PGPB, but the man's injuries are distinctively chupacabra. ${silver} grabs you as you return. \"Tomorrow,\" ${silver_she} spits through clenched teeth, \"we find them.\"\n\t\t\t\t\t*set resolve %+10\n\t\t\t\t\t*goto next_morning\n\n\t\t\t\t*elseif resolve > 50\n\t\t\t\t\tAs soon as the door opens, you gasp. \"My friend and I were driving and our car broke down and we found a man! He's hurt—I think coyotes attacked him!\" \n\n\t\t\t\t\tIt takes a while to convince the woman. She's wary of you—you know, since you're a stranger pounding on her door in the middle of the night—but you are resolved. You are not leaving until that man gets help.\n\n\t\t\t\t\tDespite her skepticism, you stand your ground. Finally, she calls for help. The medics arrive not long after. Since you did lose some time, ${silver} tells you, the man will survive, but he'll deal with the effects of his injuries for life. \"So tomorrow,\" ${silver} spits through clenched teeth, \"we find those chupacabra.\"\n\t\t\t\t\t*set justice %+10\n\t\t\t\t\t*goto next_morning\n\n\t\t\t\t*else\n\t\t\t\t\tAs soon as the door opens, you gasp. \"My friend and I were driving and our car broke down and we found a man! He's hurt—I think coyotes attacked him!\" \n\n\t\t\t\t\tIt takes a while to convince the woman. She has many questions (Where is your car? Why were you driving through her fields? Are you a robber?) and you struggle to answer them to her satisfaction. You should work on your persuasiveness.\n\n\t\t\t\t\tBy the time you finally convince her to call for help, the man's breath is gurgling. As the paramedics load him into the emergency helicopter, you hear one mutter, \"Too late.\"\n\n\t\t\t\t\t\"Tomorrow,\" ${silver} spits through clenched teeth, \"we find those chupacabra.\"\n\t\t\t\t\t*set rule_bender %+10\n\t\t\t\t\t*goto next_morning\n\t\n\t\t\t#I save him myself with my first aid kit.\n\t\t\t\t*if resolve > 50\n\t\t\t\t\tIt takes steady hands and a clear mind to patch up wounds as bad as these. Even sleep deprived, you have both. You work quickly but efficiently. The man still needs a human doctor, but just as you finish cleaning the worst gashes, ${silver} comes running back from the farmhouse.\n\n\t\t\t\t\t\"Humans on their way,\" ${silver_she} says. \"There's nothing else we can do tonight—it's too dark, and I'm not reading any new signals. But tomorrow, we find those chupacabra.\"\n\t\t\t\t\t*set relationship_silver %+10\n\t\t\t\t\t*goto next_morning\n\n\t\t\t\t*else\n\t\t\t\t\tYou're too tired, too nervous, too unfocused. The man's breathing becomes more labored. ${silver} shakes you. \"Get help!\" ${silver_she} shouts.\n\t\t\t\t\t*goto farmhouse\n\n\t\t*label chup_search_two\n\t\tYou're tired, but it's obvious that ${silver} is struggling even more. Several times, ${silver_she} misses the chupacabra's tracks, the spots of blood dotting the dust. When ${silver_she} stumbles, you know you have to do something. Be careful, though. ${silver} is fiercely proud of ${silver_his} abilities as a field agent; ${silver_she} may not take kindly to any suggestion that you think ${silver_she} isn't up to the task.\n\n\t\t*choice\n\t\t\t#I persuade ${silver_him} to rest back on the ship.\n\t\t\t\t\"Hey, ${silver}!\"\n\n\t\t\t\tIt takes ${silver_him} a moment to respond. When ${silver_she} does, ${silver_his} eyes are glassy. \"What?\"\n\n\t\t\t\t\"Go back to the ship. You need sleep.\"\n\n\t\t\t\t*if (persuasion > 50) and (relationship_silver > 50)\n\t\t\t\t\tFor a moment, ${silver_his} eyes narrow, but then ${silver} runs a hand through ${silver_his} hair and sighs. \"I guess you're right.\" Smacking ${silver_his} communicator against ${silver_his} palm, ${silver_she} adds, \"Not getting a signal anyway.\"\n\n\t\t\t\t\tLights arc across the sky; great ribbons of green and blue. You gasp.\n\n\t\t\t\t\tEven ${silver} looks awed. \"An aurora,\" ${silver_she} says softly. \"You don't usually see them this far south.\"\n\n\t\t\t\t\t\"Well, that explains the jammed signal. They have to rest sometime as well; let's carry on when we have the daylight.\" After a moment's hesitation, you offer ${silver} your hand. \n\n\t\t\t\t\tAfter another moment of hesitation, ${silver_she} takes it.\n\t\t\t\t\t*set ufo true\n\t\t\t\t\t*set justice %-15\n\t\t\t\t\t*goto next_morning\n\n\t\t\t\t*else\n\t\t\t\t\t\"You know, I don't like that tone.\" With icy calmness, ${silver} stares you down. \"Tweel asked me to keep an eye on you. That means that you do not order me. Understood?\"\n\n\t\t\t\t\t\"What?\" you protest. \"The way you're staggering around, it looks like I need to keep an eye on you!\"\n\n\t\t\t\t\t\"We're wasting time.\" ${silver} turns sharply. Another hint that ${silver_she} is tired; ${silver_his} temper has become hair-trigger. \"Don't forget your place again, ${name}.\"\n\t\t\t\t\t*page_break\n\n\t\t\t\t\t*label keep_walking\n\t\t\t\t\tYou keep walking. There's some residual DNA here and there: stray hairs, saliva, that sort of thing. They're increasingly fresh; the chupacabra can't be far away.\n\n\t\t\t\t\tYou're near a farm when you see it up ahead: another shape sprawled on the ground. This one doesn't look like a cow.\n\t\t\t\t\t*goto find_farmer\n\n\t\t\t#I offer ${silver_him} my thermos of coffee.\n\t\t\t\tYou cough. \"Hey, ${silver}…\"\n\n\t\t\t\tScowling, ${silver_she} turns towards you.\n\n\t\t\t\tYou hold up the thermos. \"Want some?\"\n\n\t\t\t\t*if relationship_silver > 60\n\t\t\t\t\t*set justice %-10\n\t\t\t\t\t*set relationship_silver %+10\n\t\t\t\t\t${silver} hesitates. You can practically see the gears turning in ${silver_his} brain as ${silver_she} weighs the benefits of accepting with the drawbacks of possibly appearing weak in front of you. Part of you wants to shake ${silver_him}, tell ${silver_him} that you're partners, not competitors—but you know that the best thing is to wait.\n\n\t\t\t\t\tIn the end, ${silver_she} accepts the thermos silently, but with a begrudging nod. Still, you know it was the right thing to do, and you smile as you keep walking. There's some residual DNA here and there: stray hairs, saliva, that sort of thing. They're increasingly fresh; the chupacabra can't be far away.\n\n\t\t\t\t\tYou're near a farm when you see it up ahead: another shape sprawled on the ground. This one doesn't look like a cow.\n\t\t\t\t\t*goto find_farmer\n\n\t\t\t\t*else\n\t\t\t\t\t${silver} sighs. \"No, thank you.\"\n\n\t\t\t\t\tYou shake the thermos. \"Are you sure? It might help.\"\n\n\t\t\t\t\t\"I'll be fine. Thanks, though.\"\n\n\t\t\t\t\tAll right, then. You continue on in silence. There's some residual DNA here and there: stray hairs, saliva, that sort of thing. They're increasingly fresh; the chupacabra can't be far away.\n\n\t\t\t\t\tYou're near a farm when you see it up ahead: another shape sprawled on the ground. This one doesn't look like a cow.\n\t\t\t\t\t*goto find_farmer\n\n\t\t\t#I stealthily slow the pace so ${silver_she} can keep up. Maybe ${silver_she} won't notice!\n\t\t\t\t*if stealth > 50\n\t\t\t\t\tGradually, with the utmost care, you start walking a little more slowly. The terrain here is rough anyway; if the chupacabra have been setting as hard a pace as it appears, chances are good that they will need to rest soon as well. Still, you know ${silver} well enough to guess that ${silver_she} won't appreciate any suggestion that you think ${silver_she} is weak.\n\n\t\t\t\t\t$!{silver_she}'s not, of course. Just tired, the same as you.\n\t\t\t\t\t*goto keep_walking\n\n\t\t\t\t*else\n\t\t\t\t\tUnfortunately, you aren't very stealthy. You drop to a snail's pace within a few steps, and ${silver} looks at you like you've lost your mind. You're growing accustomed to that look.\n\n\t\t\t\t\t\"What?\" ${silver_she} says brusquely.\n\n\t\t\t\t\t\"Nothing.\"\n\t\n\t\t\t\t\tYou can practically see the gears turning in ${silver_his} brain as ${silver_she} considers you. Then, ${silver_she} gasps. \"You think I can't keep up!\"\n\t\t\t\t\t*page_break Busted\n\n\t\t\t\t\t\"Well,\" you begin.\n\n\t\t\t\t\t${silver} shakes ${silver_his} head. \"No, no, I can keep up just fine. I would kindly ask you not to assume otherwise.\"\n\t\t\t\t\t*set relationship_silver %-10\n\t\t\t\t\t*goto keep_walking\n\n\t#There are two of us. I recover my strength while ${silver} searches.\n\t\tThis is one of the benefits of having a partner: the principle of divide and conquer becomes much easier. You are absolutely useless right now, so you head back to the ship while ${silver} combs the desert for signs of the chupacabra. \n\n\t\tYou hope ${silver_she} will return soon, so you can take your turn. Partnership: it's a beautiful thing.\n\n\t\tSuddenly, banging and howling arise outside.\n\t\t*page_break What Was That?\n\n\t\tYou spring out of the ship. The Texas landscape seems barren, the moonlight falling in silver pools between jagged rocks. A stealthy wind creeps across the ground. You freeze, listening.\n\n\t\tWhat do you want to do?\n\n\t\t*label alone_with_chups\n\t\t*choice\n\t\t\t*disable_reuse #I call ${silver}.\n\t\t\t\tQuickly, you withdraw your communicator. The signal is acting finicky, though. PGPB technology is usually pretty good, but right now…\n\n\t\t\t\tLights arc across the sky; great ribbons of green and blue. You gasp. It's an aurora; you don't usually see them this far south. But that explains the jammed signal. With any luck, that's only a temporary hindrance, but it looks like you're on your own. What now?\n\n\t\t\t\t*goto alone_with_chups\n\n\t\t\t#I investigate the surrounding area.\n\t\t\t\t*if observation > 55\n\t\t\t\t\tYou crouch, inspecting the grasses and soil closely. Dry dust coats your fingertips, but then you spy a darker patch of soil. In the faint moonlight, it's barely visible, but your eyes are good. You run your scanner over it.\n\n\t\t\t\t\tChupacabra saliva. \n\n\t\t\t\t\tThey were here. Recently, too.\n\t\t\t\t\t*page_break Uh-Oh\n\n\t\t\t\t\tYou stand up straight and try calling ${silver} again. No luck, the signal is jammed—no small thanks to the brilliant aurora arcing overhead. You don't feel tired anymore; you are very, very alert.  So what are you going to do now?\n\t\t\t\t\t\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I strike out after ${silver}.\n\t\t\t\t\t\t\tGrabbing a thermos of coffee from the ship, you set out after ${silver}. It doesn't take you very long to find ${silver_him}, and honestly, ${silver_she} looks a little relieved to see you. In the time you've been onboard, ${silver_she} hasn't made it far at all; ${silver_she} stumbles over the larger boulders. You almost feel sorry for ${silver_him}. \n\n\t\t\t\t\t\t\tAlmost. \n\n\t\t\t\t\t\t\t*goto chup_search_two\n\n\t\t\t\t\t\t#I try to fix my communicator.\n\t\t\t\t\t\t\tThis shouldn't be too hard. Or so you think. Eyeing the aurora overheard, you retreat back to the ship. Fortunately, ${silver} is freakishly organized, so you have no problem helping yourself to ${silver_his} spare circuitry and soldering parts. In short order, you have the communicator dissembled in front of you.\n\n\t\t\t\t\t\t\tYou remember how to put these back together, right?\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#Case like this, you gotta rejig the flux capacitor. There's too much flux in that capacitor.\n\t\t\t\t\t\t\t\t#Easy. The Fing-longer needs tweaking, and then it'll be good to go.\n\t\t\t\t\t\t\t\t#I totally paid attention at the Academy. It's the red button.\n\t\t\t\t\t\t\t\t#As long as I don't hit the self-destruct chip, I'll be fine. Look, there it is!\n\t\t\t\t\t\t\t\t#Using simple physics, and this hammer, I will manage.\n\n\t\t\t\t\t\t\tWith some amount of sweat, an ill-planned curse, and a minor shock, you piece the components of your communicator together. Testing its weight in your palm, you smile. Good as new, the signal rerouted to override the ionic disturbances resulting from the aurora.\n\n\t\t\t\t\t\t\tYou dial ${silver}.\n\n\t\t\t\t\t\t\tTrue to form, ${silver_she} sounds busy. \"What now, ${name}?\"\n\n\t\t\t\t\t\t\t\"I heard something out there. Found traces of the chupacabra. You better come back; it's too dangerous to be out alone.\"\n\n\t\t\t\t\t\t\tThere's a momentary silence, and then ${silver} sighs. \"You're right. The trail's gone cold anyway. We'll search more in the morning.\"\n\t\t\t\t\t\t\t*goto next_morning\n\n\t\t\t\t\t\t#I search for the chupacabra by myself.\n\t\t\t\t\t\t\tGrabbing a thermos of coffee from the ship to keep you going, you head out into the night. Soon enough, you bump into ${silver}; ${silver_she} hasn't managed to make it far. Since ${silver_she} doesn't explicitly object to your presence, you fall into step alongside ${silver_him}. \n\t\t\t\t\t\t\t*goto chup_search_two\n\n\t\t\t\t*else\n\t\t\t\t\tYou can't find anything. You're tenacious though, and you're still combing the area when ${silver} comes staggering back. \n\n\t\t\t\t\t\"Trail's gone cold,\" ${silver_she} tells you. \"Saw some lights in the sky, though.\"\n\n\t\t\t\t\t\"Think they took off?\"\n\n\t\t\t\t\t\"Who would take them? Probably a PGPB cruiser.\" Yawning, ${silver} shakes ${silver_his} head. \"Tweel said to wait until morning. If they're here, they'll need to rest, too. Harsh terrain out there.\"\n\t\t\t\t\t*temp ufo true\n\t\t\t\t\t*goto next_morning \n\n\t\t\t#I ask if any aliens want to parley.\n\t\t\t\t*if persuasion > 65\n\t\t\t\t\t\"Parley!\" you shout. \n\n\t\t\t\t\tA hairless, doglike head emerges from behind a rock. \"No…guns?\"\n\n\t\t\t\t\tYou set yours on the ground. \"No guns.\"\n\n\t\t\t\t\tThe chupacabra approaches. He's a runty thing, his ribs poking through. He's also bleeding from a hole in his side.\n\n\t\t\t\t\tYou gasp. \"What happened to you?\"\n\n\t\t\t\t\t\"Shot…\" he wheezes. \"Humans, in a car.\" Then he makes a very distressing gurgling sound.\n\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I grab my first aid kit and start compressing the wound.\n\t\t\t\t\t\t\tYou press some gauze to his wound. The chupacabra's eyes are already glazing over. \"The Jackalope…\" he says suddenly. \"She said…\"\n\t\n\t\t\t\t\t\t\t\"What?\"\n\n\t\t\t\t\t\t\tIt's too late. He's dead.\n\t\t\t\t\t\t\t*goto dead_chupacabra\n\n\t\t\t\t\t\t#I bring him onboard the ship; it's further, but the medicine is better.\n\t\t\t\t\t\t\tYou lift the chupacabra over your shoulders and carry him to the ship, grateful that he's so undersized and light. There, you lay him on the deck and rummage through the medical supplies. \"The Jackalope…\" he wheezes.\n\n\t\t\t\t\t\t\tEvidently, even that short journey was too much. When you turn around, he's dead.\n\t\t\t\t\t\t\t*goto dead_chupacabra\n\n\t\t\t\t\t\t#I'll provide basic care, but no more than that. He's a criminal. \n\t\t\t\t\t\t\tWho knows what atrocities this mangy beast has committed? You dutifully wrap a bandage around his middle. The chupacabra's lips lift, revealing scraggly teeth. A soft growl issues from his chest, but the sound grows thick and wet, and then with a last rattle, he wheezes, \"The Jackalope…\" and goes still.\n\n\t\t\t\t\t\t\tNothing more to be done, then.\n\t\t\t\t\t\t\t*goto silver_return_one\n\n\t\t\t\t\t*label dead_chupacabra\n\t\t\t\t\tWith a heavy heart, you take the body to an empty patch of ground. There is a protocol for dealing with deceased convicts. You take out a small vial from an inner pocket and sprinkle its contents over the chupacabra's body. It'll kickstart the decomposition process and destroy the DNA—no human scientist will ever be able to tell what this organism was.\n\n\t\t\t\t\tYou feel more uncomfortable than ever. He didn't seem like a bad creature. Desperate, maybe, but not bad. The aliens are fascinating, and sometimes you wonder if the PGPB is a bit draconian. Times are tough all over the galaxy; many of these \"criminals\" have few other options, and it's not like the PGPB provides much assistance [i]before[/i] the aliens act out.\n\n\t\t\t\t\tNo more time to muse on that now. ${silver} is returning. Quickly, you tell ${silver_him} about the dead chupacabra.\n\t\t\t\t\t*set justice %-20\n\t\t\t\t\t*page_break\n\n\t\t\t\t\t*label silver_return_one\n\t\t\t\t\t${silver} looks tired. \"No sign of the others,\" ${silver} says. \"Orders came in. We're to hold position tonight, keep looking tomorrow.\"\n\n\t\t\t\t\tSilently, you both head back to the ship.\n\t\t\t\t\t*goto next_morning\n\n\t\t\t\t*else\n\t\t\t\t\t\"Parley!\" you call. Nothing takes the bait; a tremor in your voices betrays your nervousness. You're still standing at attention, listening, when ${silver} comes staggering back. \n\n\t\t\t\t\t\"Trail's gone cold,\" ${silver_she} tells you. \"Saw some lights in the sky, though.\"\n\n\t\t\t\t\t\"Think they took off?\"\n\n\t\t\t\t\t\"Who would take them? Probably a PGPB cruiser.\" Yawning, ${silver} shakes ${silver_his} head. \"Tweel said to wait until morning. If they're here, they'll need to rest, too. Harsh terrain out there.\"\n\t\t\t\t\t*set ufo true\n\t\t\t\t\t*goto next_morning \n\n\t\t\t#I fire a quick warning shot.\n\t\t\t\t*if combat > 60\n\t\t\t\t\tYou fire into the night. Something hits. You run over and spy a trail of blood. Following proves easy at first, but you soon wander further and further afield. There's a dark shape up ahead. \n\n\t\t\t\t\tYou're just drawing your weapon again when you realize it's ${silver}. \n\n\t\t\t\t\t\"${silver}!\" you call.\n\n\t\t\t\t\tWithout even looking at you, ${silver_she} hushes you and points. There's another shape, sprawled on the ground not too far away.\n\t\t\t\t\t*goto find_farmer\n\n\t\t\t\t*else\n\t\t\t\t\tYou fire some shots, but they go wide into the night. There's no response, no further movement, nothing. Suddenly, the grasses move and you almost pull the trigger, but it's only ${silver}, staggering back.\n\t\t\t\t\t*goto silver_return_one\n\n\t#There are two of us. I search and let ${silver} sleep.\n\t\t\"Don't worry, ${silver},\" you say. \"I can continue on. You rest.\"\n\n\t\tYour partner's eyes flash. \"I don't think so.\"\n\n\t\tWell, it was worth a try. Sighing, you snag a thermos of coffee just in case, and follow ${silver} across the harsh terrain.\n\t\t*goto chup_search_two\n\n*label next_morning\n*page_break\nThe next morning, refreshed and well-fed, the pair of you continue on. ${silver} takes the transport for a short skip—you ought to be back on the trail of the chupacabra. \n\nStill, there's some time to ponder. You glance at ${silver} as ${silver_she} pilots the craft. You first met ${silver_him} during your training period at the Academy. You have to admit, ${silver_she} impressed you in your first class together. But why, exactly?\n\n*choice\n\t#${silver} was so dedicated to ${silver_his} work.\n\t\t*set resolve %+10\n\t\t*set rule_bender %-10\n\t\t${silver} pulled a lot of late nights and never complained once—sometimes, you'd find ${silver_him} asleep among the databases, completely worn out. You smile at the memory.\n\n\t\tYou've both come a long way since then.\n\t\t*goto bright_sunlight\n\n\t#I liked ${silver_his} attitude.\n\t\t*set combat %+10\n\t\t*set rule_bender %+10\n\t\t${silver} can have a sharp tongue at times. Deep down, you appreciate that—some might call ${silver} blunt, but you wish more people actually said what they mean. It helps, knowing where you stand with someone.\n\n\t\tSpeaking of which, ${silver} rolls ${silver_his} eyes at you. \"You look like you've been hit in the head,\" ${silver_she} says. \"What's wrong with you?\"\n\n\t\tYou smile. \"Oh, nothing…\"\n\t\t*goto bright_sunlight\n\n\t#${silver} knew how to work PGPB politics.\n\t\t*set stealth %+10\n\t\t*set persuasion %+10 \t\t\n\t\tFor humans, getting thrust into the middle of the Pan-Galactic Prisons Bureau can be unsettling. There is so much to keep track of: interplanetary diplomacy and different species' approaches to the universe; personal rivalries and interdepartmental alliances; and agents' Clearance Levels and meetings about \"strategic visions.\" Sometimes, you felt like you'd never get it.\n\n\t\t${silver} thrived right away. Sometimes it's hard to admit, but it was helpful having ${silver_him} as a model. Watching another human succeed, you didn't feel quite so alone.\n\n\t\tYou smile at ${silver}, even though ${silver_she} isn't looking at you. No, you're not alone. Not anymore.\n\t\t*goto bright_sunlight\n\n\t#${silver} was so smart. $!{silver_she} knows everything about galactic law!\n\t\t*set observation %+10\n\t\t*set justice %+10\n\t\tWorking for the Pan-Galactic Prisons Bureau, you do need to know about galactic law in general, along with planet-specific criminal codes. You despaired a few times (privately), but ${silver} got it right away, seizing on the smallest, finest semantics.\n\n\t\tIt was incredible to watch. Even now, you smile thinking of it.\n\t\t*goto bright_sunlight\n\n*label bright_sunlight\nWhen you land, bright sunlight streams into your eyes. You climb out of the ship, instantly alert for any signs of life.\n\n*if (ufo = true)\n\tAnd you don't need to look far. A crowd gathers close by. Most have binoculars and are anxiously scanning the skies. A few people wander the crowd, clutching balloons shaped like flying saucers.\n\n\t${silver} goes very quiet, and ${silver_his} eyes narrow. \"What is this?\" ${silver_she} hisses.\n\n\t\"At a guess…\" You shrug. \"Looks like a UFO watching party.\"\n\n\t\"But how?\"\n\n\t\"Guess they saw something last night.\" Even as you say it, you can imagine the faces back at PGPB headquarters. This is getting progressively messier; you're almost tempted to run off and join the aliens yourself.\n\n\t*set relationship_tweel %-15\n\t*set rule_bender %+15\n\t*page_break Hmmm\n\n\t${silver} is also less than impressed. \"I'll handle them.\"\n\n\t*if persuasion > 60\n\t\tYou raise an eyebrow. \"Really? I'm good at talking to people. One of my strengths, actually.\"\n\n\t\t${silver} is silent a moment. \"Don't tell this to anyone,\" ${silver_she} says at last. \"At my last employee review Tweel mentioned it as…a skill to continue working on. I need to prove to her that I can do this.\"\n\n\t\tSeems fair to you.\n\t\t*goto ufo_silver_fakechoice\n\t*else\n\t\t*label ufo_silver_fakechoice\n\t\t*fake_choice\n\t\t\t#\"Good plan. Divide and conquer, right?\"\n\t\t\t#\"No way. I want to help!\"\n\t\t\t#\"Think you're up to it, ${silver}?\"\n\t\t\t#\"Good. I'd much rather tackle the aliens.\"\n\n\t\t${silver} waves you away dismissively. \"Just deal with it. Don't mess up.\"\n\n\t\t\"Oh ye of little faith…\" you mutter under your breath as ${silver} activates the transport's cloaking systems and strides towards the crowd.\n\n\t\tLooks like you're on your own. \n\t\t*page_break Onwards\n\n\t\tLeaving ${silver} to spread some misinformation, you scramble over a rocky outcrop. Dust rises behind you, catching the sunlight. Without too much difficulty, you pick up the chupacabra trail again. The claw marks continue…and then they stop.\n\n\t\tCompletely.\n\t\t*page_break Huh\n\n\t\tThinking you've lost them, you double back. No, the trail is easy to see. You poke around a bit more and uncover a cave, dug into the side of a small rise. Kneeling in front of it, you cautiously extend your communicator.\n\n\t\tMovement.\n\t\n\t\t\"Who's there?\" you call.\n\t\t*goto jack_intro\n\n*else\n\tThere isn't much except an armadillo trundling off in the distance. You exhale in relief. ${silver} points to some tracks, and you're back on the trail. The land gets more broken the further you go; you leap over jagged outcrops and dodge clumps of cacti. The claw marks continue for a while…and then, just as you're getting hopeful, they stop.\n\n\tCompletely.\n\t*page_break Huh\n\n\tThinking you've lost them, you signal ${silver} to double back with you. After some more poking around, you uncover a cave, dug into the side of a small rise.\n\n\t${silver} stands well back from it. \"It's not big enough to hold them, if that's what you're thinking.\"\n\n\t\"We don't know how deep it goes.\"\n\n\t\"Are you blind, ${name}?\" ${silver} shakes ${silver_his} head. \"We were receiving reports of at least a dozen chupacabra. There's no way they're hiding in there.\"\n\n\t\"Then what is?\"\n\t*page_break What Indeed?\n\n\t${silver} plays with ${silver_his} already-straight lapels. \"I don't know.\"\n\n\tYou crouch before the cave. \"I'm going to investigate.\" A quick look over your shoulder. \"Are you coming?\"\n\n\t\"It's not big enough for a dozen chupacabra, and it's not big enough for the two of us.\" Frowning, ${silver} eases ${silver_his} stunner from its holster. \"I'll keep watch.\"\n\n\tYou roll your eyes, but leave ${silver} to do ${silver_his} thing. If you didn't know better, you'd think ${silver_she} was scared. Claustrophobic, maybe.\n\t*page_break It Is Small\n\n\tAlthough the mouth of the cave is cramped, forcing you into a stooping shuffle, it opens up enough for you to stand nearly upright. You turn on the flashlight feature of your communicator. The light plays over the sandstone walls, revealing bits of wire, some books, and a nest constructed from bits of fabric.\n\n\tYou have an idea whose lair this might be. But it doesn't hurt to make sure.\n\n\tYou clear your throat. \"Hello?\"\n\t*goto jack_intro\n\n*label jack_intro\nYour query meets with silence. And then, two reddish eyes glow in the depths of the cave. Teeth glint below them. You fumble with the light on your communicator; its beam picks up a squashed, apathetic face. A face completed by a twitching button nose and quivering whiskers.\n\n\"Jackalope?\"\n\n\"Yes.\" Her voice is smooth. Lulling. Seductive, if you're being honest, and much richer than you'd expect coming from that tiny, furry body. \"I know you, Agent ${name}. So good of you to visit. Would you care for a seat?\"\n\nYou gulp. You can't help yourself. This is one of the most infamous mistresses of petty crime in the galaxy. Her eyes rest on yours, unwavering.\n\n\"Well?\" she presses, gently. \"Care to make yourself more comfortable?\"\n\n*choice\n\t#I'm not about to seduced by the Jackalope. I reject her!\n\t\t*if resolve > 65\n\t\t\t\"Erm,\" you say, \"that's a very kind offer, but…\"\n\n\t\t\t\"You must be tired, ${name}….\" Seriously, her voice is like honey: warm, sweet, thick. It boggles the mind; you can't reconcile those dulcet tones with the creature standing before you.\n\n\t\t\tBut you are not short of willpower. Feeling a bit like Odysseus with the sirens, you retreat a few steps and shake your head. \"I'm here on business.\"\n\t\t\t*achieve jackseduce\n\t\t\t*goto step_over_there\n\n\t\t*else\n\t\t\tOh, goodness, that voice. It's a weapon in itself: warm, sweet, heavy. You want to resist it, try desperately to ignore it, but you can't. The Jackalope motions you to sit, and you do, ending up cross-legged on the cave's dusty floor.\n\n\t\t\t\"Now,\" she says, \"you've travelled a long way. You want to go home, surely?\" She ducks into an alcove and comes back with a small leather pouch. When she jingles it, you hear the clink of coins. \"I can help.\"\n\n\t\t\t\"Uh…\" You're lost in the richness of her tones.\n\n\t\t\t\"Just walk back out that door, ${name}. That's all you have to do.\"\n\t\t\t\n\t\t\tComing from her, it does seem like a good idea…but no, you have to pull yourself together!\n\t\t\t*goto spotted_something\t\t\t\t\t\n\n\t#I tease this out a little more.\n\t\t\"Maybe…\" you say. You stretch, just brushing the cave's ceiling with your fingertips. \"There.\"\n\t\t\n\t\tThe Jackalope's nose twitches. \"Oh, aren't you clever?\"\n\n\t\tYou smile. \"A bit clever, yes. Clever enough to outwit you? Never.\"\n\n\t\t\"Who said anything about outwitting?\" The Jackalope tosses her antlered head. \"I'm just being a gracious hostess.\"\n\t\t*goto spotted_something\n\n\t#Hey, that voice is stunning. I can be seduced by her.\n\t\t\"You know,\" you say, coming close beside the Jackalope. \"I always had one regret.\"\n\n\t\tThe Jackalope practically purrs. \"What's that?\"\n\n\t\t\"That we don't know each other well.\"\n\n\t\tShe pauses. \"We could become better acquainted,\" she said. \"Maybe I could even make a small cash donation to the cause. All you have to do is walk out of this cave.\"\n\t\t*goto jack_seduce\t\t\n\n\t#She means sitting on a chair or something right?\n\t\t\"Uh…that would be very nice,\" you say. \"Thank you.\"\n\n\t\t\"Ah.\" She hops forward. Ducks her antlered head. \"Unfortunately, as you can see, seating space is at a premium. An unfortunate condition of exile, it seems.\" \n\t\t*goto sarcasm\n\n*label sarcasm\n*page_break Ow, Sarcasm\n*if (observation > 65) and (resolve > 60)\n\tSomething catches your eye: a soft, green glow. You've seen it before, somewhere. \"Is that…?\" It hits you: Spheron, and that cramped back room. \"Is that a glow-in-the-dark watch?\"\n\n\tThe Jackalope sweeps it away. \"Of course not.\"\n\n\t\"Yes, it is!\"\n\n\t\"Fine…a tourist dropped it, if you must know.\" She withdraws it, admiring its phosphorescent face. \"It is beautiful, no?\"\n\t*goto spotted_something\n\n*elseif (observation > 50) or (resolve > 50)\n\t*label spotted_something\n\tAs the Jackalope talks, you spot something. There's a hairline crack in the rock which, even in the dim light, is a little too rectangular to be perfectly natural. One problem: it's a lot closer to the Jackalope than to you. \n\n\t*label panel_choices\n\t*choice\n\t\t*disable_reuse #I shove her out of the way.\n\t\t\t*if combat > 50\n\t\t\t\tThe Jackalope inhales sharply as you push her to one side. As you trail your fingers over the crack, you realize it's a panel. You open it to reveal a tangle of wires. \n\n\t\t\t\tAt a glance, they look almost like the circuitry used in warp gates. But if that's the case, the Jackalope has made some bizarre alterations. Besides, warp gates are really unstable unless they're located a good distance from centers of planetary mass. The Jackalope cocks her head. \"I wouldn't touch that,\" she says softly.\n\t\t\t\t*set panel true\n\t\t\t\t*goto jack_bribe\n\n\t\t\t*else\n\t\t\t\tThe Jackalope shoves you right back. Try again! \n\t\t\t\t*goto panel_choices \n\n\t\t*disable_reuse #I order her to stand aside.\n\t\t\t*if persuasion > 50\n\t\t\t\t*label step_over_there\n\t\t\t\t\"Step over there,\" you say, putting every ounce of authority you can muster into your voice. It seems to work, because the Jackalope obeys, leaving the peculiar patch clear. As you trail your fingers over the crack, you realize it's a panel. \n\n\t\t\t\tYou open it to reveal a tangle of wires. Nothing you understand. The Jackalope cocks her head. \"I wouldn't touch that,\" she says softly. \n\t\t\t\t*goto jack_bribe\n\n\t\t\t*else\n\t\t\t\tThe Jackalope laughs at your attempt at authority. \"I think not. This is my home, ${name}. Do I order you about in yours?\"\n\t\t\t\t*goto plains_fail\n\n\t\t*disable_reuse #I sneak it open when she's not looking.\n\t\t\t*if stealth > 50\n\t\t\t\tYou wait patiently until the Jackalope looks away, distracted by the sound of ${silver} coughing outside. Then you slip behind her and run your fingers over the crack. Realizing it's a panel, you open it to reveal a tangle of wires. \n\n\t\t\t\tAt a glance, they look almost like the circuitry used in warp gates. But if that's the case, the Jackalope has made some bizarre alterations. Besides, warp gates are really unstable unless they're located a good distance from centers of planetary mass. The Jackalope cocks her head. \"I wouldn't touch that,\" she says softly.\n\t\t\t\t*set panel true\n\t\t\t\t*goto jack_bribe\n\n\t\t\t*else\n\t\t\t\tYou wait, patiently, until the Jackalope looks away, distracted by the sound of ${silver} coughing outside. When you try to slip behind her, you accidentally brush against her furry back. The Jackalope's ears stiffen and her whiskers quiver.\n\n\t\t\t\t\"What do you think you're doing?\" she demands.\n\n\t\t\t\t\"Nothing!\"\n\n\t\t\t\t\"Oh, really?\" The Jackalope snarls. You tense, but she's already leaped on top of you, scratching with her claws and gnashing her teeth.\n\t\t\t\t*goto bilodeau\n\n\t\t#I make a mad rush for it.\n\t\t\tMustering your resolve, you take a deep breath and charge forward. You're a lot bigger than the Jackalope—she comes to your knee, if that—and so you manage to rush right over her. As you trail your fingers over the crack, you realize it's a panel. You open it to reveal a tangle of wires. \n\n\t\t\tAt a glance, they look almost like the circuitry used in warp gates. But if that's the case, the Jackalope has made some bizarre alterations. Besides, warp gates are really unstable unless they're located a good distance from centers of planetary mass. The Jackalope cocks her head. \"I wouldn't touch that,\" she says softly.\n\t\t\t*goto jack_bribe\n\n\t*label jack_bribe\n\t\n\t\"No?\"\n\n\t\"No.\" She squeezes between you and the panel, lowering her head so that the points of her antlers are aimed at your eyes. \"Nothing there. But listen, I can make this worth your while. You PGPB agents are always in need of more…funds. How would you like an extra hundred Standard Currency Units?\"\n\t*choice\n\t\t#\"Absolutely!\"\n\t\t\t*label jack_seduce\n\t\t\t\"Good.\" The Jackalope rummages for some currency in a small hole off the main den. \"Pleasure doing business with you.\"\n\n\t\t\t\"Likewise,\" you say, enjoying the weight of the money in your hand. \"We should do it again sometime.\"\n\n\t\t\tThe Jackalope laughs. \"I'm glad to hear you say that….\" She leans close. \"You could have a future with me. Don't answer that yet. Just think about it.\" \n\n\t\t\tWith that, you're dismissed.\n\t\t\t*set cash +100\n\t\t\t*set rule_bender %+25\n\t\t\t*set justice %-25\n\t\t\t*goto outside_cave_two\n\n\t\t#\"No way, you can't bribe me!\"\n\t\t\t*label wrong_answer\n\t\t\t\"Wrong answer,\" the Jackalope says, just before she delivers a rabbit-punch to your jaw.\n\n\t\t\t*if combat > 60\n\t\t\t\tAfter a few blows are exchanged on either side, you get the Jackalope in a headlock. \"For that,\" you say, \"another ten years.\"\n\n\t\t\t\tIn answer, the Jackalope gets free and charges you, forcing you from the cave. You fight back, land a few good hits to her sides, but she's like a tiny, furry demon. \n\n\t\t\t\t*label bilodeau\n\t\t\t\t\"Quit it!\" you yell. For the first time, you're actually scared of her. She used to be a big name in the galactic underworld; the isolation clearly hasn't been good for her. She slams you again. This time, her antler catches your jaw—perilously close to your jugular, now that you think of it—and a hot trickle of blood rolls down your neck.\n\n\t\t\t\tYou wince in pain, but she's on you again, striking with her sharp little claws. Bit by bit, she forces you backwards. You fumble for your stunner, but she kicks dirt in your face, blinding you.\n\t\t\t\t*page_break\n\n\t\t\t\t\"Ow! You foul, cruel, bad-tempered rodent!\" Grit stings your eyes. You can't see. The Jackalope takes advantage of your blindness to deliver a crushing kick to your skull. Stars explode before your eyes. You fall, heavily. As you scramble to right yourself, the Jackalope rolls a stone in front of the cave mouth, sealing herself in from the inside.\n\n\t\t\t\tYou rub your bruises. Maybe it ought to be another [i]twenty[/i] years. But you'll need to talk to Tweel about that. You also want reinforcements if you're going anywhere near that cave again. For now, it's time to find ${silver}.\n\t\t\t\t*set rule_bender %-15\n\t\t\t\t*set justice %+15\n\t\t\t\t*if (panel = true)\n\t\t\t\t\t*goto outside_cave\n\t\t\t\t*else\n\t\t\t\t\t*goto outside_cave_two\n\n\t\t\t*else\n\t\t\t\tYou can't react fast enough and you're knocked out cold. Eventually you come to, with ${silver} leaning over you and the Jackalope looking unimpressed on the far side of the cave.\n\n\t\t\t\t${silver} actually looks concerned. \"You okay?\"\n\n\t\t\t\t\"Fine.\"\n\n\t\t\t\tAfter glaring at the Jackalope, ${silver_his} face softens. \"Then let's get out of here.\"\n\t\t\t\t*goto outside_cave\n\n\t\t#\"Let me think about it?\"\t\t\t\n\t\t\tThe Jackalope sneers. \"If you must…though I hardly see why you need to.\"\n\n\t\t\t*if (persuasion > 50) or (panel = false)\n\t\t\t\t\"I'm not as smart as you,\" you say. \"The whole thought process takes me a while longer.\"\n\n\t\t\t\tThe Jackalope sighs. \"I suppose you have a point.\"\n\n\t\t\t\t*label edge_closer_panel\n\t\t\t\tAs you speak, you edge closer to the panel you spotted before. Before the Jackalope can react, you've wrenched it open again. It's just as puzzling as before.\n\n\t\t\t\t\"New hobby?\" you ask peevishly.\n\n\t\t\t\tThe Jackalope shrugs. \"I have to find some way of keeping myself amused on this desolate rock.\"\n\n\t\t\t\tYou prod the wires, wondering if there's any connection to the contraband on Spheron. After a while, however, you're forced to admit that they're completely nonfunctional. For display and study only, as the Jackalope says. Gritting your teeth, you tell the Jackalope you'll think more about her offer, and storm off back to ${silver}.\n\t\t\t\t*set panel true\n\t\t\t\t*goto outside_cave\n\n\t\t\t*elseif (stealth > 50) or (panel = true)\n\t\t\t\t\"Look,\" you say, holding up your hands placatingly. \"This is a big decision. You can't just ask me to say yes, one way or the other.\"\n\t\t\t\t*goto edge_closer_panel\n\n\t\t\t*else\n\t\t\t\tYou stand there, flummoxed. \"Erm…\"\n\n\t\t\t\tThe Jackalope's eyes narrow. \"Time's up.\"\n\t\n\t\t\t\tWith that, she charges you. She hits you with far more force than you anticipated, forcing you from the cave. Pain spears your knees as she targets your kneecaps, pounding and headbutting. Those antlers are sharp, easily piercing your skin. You hiss in pain, trying to hold her off. It's no use; she's like a tiny, furry demon.\n\t\t\t\t*goto bilodeau\n*else\n\tYou investigate the cave, top to bottom, but can't find any evidence of wrongdoing. The Jackalope simply watches, a faint smile playing about her whiskers. But you can't arrest her for smiling. Even if you're sure she has something to do with the chupacabra and warp gates. It's all connected somehow…if only you could see the answer!\n\n\tFinally, you nod curtly. \"That will be all. Keep your nose clean.\"\n\n\tThe Jackalope smiles sweetly. \"Always, ${name}. Always.\"\n\n\tFor some reason, it's the most sinister thing you've ever heard.\n\t*goto outside_cave_two\n\n\n*label outside_cave\nOutside the cave, ${silver} raises an eyebrow. \"What did you find out, ${name}?\"\n\nQuickly, you fill ${silver_him} in on the mysterious tangle of wires in the hidden panel. ${silver} clucks ${silver_his} tongue. \"Hard to say what that was, exactly…the Jackalope's always been a bit of a packrat.\"\n\n\"It didn't look like anything I've ever seen.\"\n\n\"Well, I'll add her to Tweel's watchlist….\" Suddenly, both your communicators buzz and ${silver_his} face tenses. \"Hold on. Incoming message. It's about the chupacabra.\"\n*goto plains_conclusion\n\n*label plains_fail\nThe Jackalope always did have an attitude. You try to investigate around her, but she just sits there with an air of self-satisfaction. Finally, you're forced to yield: you can't find anything overtly suspicious and she's making you very uncomfortable.\n*goto outside_cave_two\n\n*label outside_cave_two\nOutside the cave, ${silver} raises an eyebrow. \"What did you find out, ${name}?\"\n\nYou kick a stone across the ground. \"That the Jackalope is as irritating as ever.\"\n\n${silver} gives a short laugh. \"Petty criminal bosses never really change, I guess.\" Suddenly, both your communicators buzz and ${silver_his} face tenses. \"Hold on. Incoming message. It's about the chupacabra.\"\n\n*goto plains_conclusion\n\n*label plains_conclusion\nSo it is. You scan the message quickly.\n\n\u003cBEGIN CLASSIFIED INTEL. CHUPACABRA SIGHTED ON RIGEL IX. NO INFO ON MEANS OF TRANSPORT. EXPECT SHIP IMMINENTLY. CANNOT ALLOW A JAILBREAK. FIND THEM—OR ELSE.>\n\nNo sooner have you finished the message than you hear a loud humming. You look up, and there, hovering against the azure Texas sky is…nothing.\n\nThen, dust kicks up about twenty feet away. The cloaking systems switch off, and the ship comes into view. A planet-hopper, designed to pass through warp gates easily, not much in the way of weapons.\n*page_break Pity About The Weapons\n\n${silver} is still preoccupied with the message. \"Or else…\" ${silver_she} muses. \"${name}, you'd better not cost me my promotion.\"\n\n\"We've got bigger things to worry about,\" you say tersely. \"There's been a jailbreak, ${silver}. That has never happened. How did they get off Earth?\"\n\n\"I don't know,\" ${silver} admits, striding towards the ship. \"But I'm not letting it happen again.\"\n\nWell, that's ${silver_his} belief, unambiguous as always. How about yours?\n*finish\n", "rigel": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Yeti's Parole Officer[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n*temp factory_visited false\n*temp haunts_visited false\n\"You know what's bothering me?\"\n\nYou sigh. You and ${silver} are on a PGPB transport speeding through hyperspace, and the rolling, undulating colors are giving you a headache. \"What?\" you ask, finally.\n\n\"How did the chupacabra get off-planet?\" ${silver} is known for ${silver_his} attention to ${silver_his} uniform, but now, ${silver_she} roll
