 daub some mud along its back, trying to mask its glittering fur. Then you wait together, breathless, as the bird-creatures pass close by.\n\n\t\t\"Wait a second!\" one calls. \"I'm picking up another life-form! A human!\"\n\n\t\tBefore you can react, they're shoving the bushes aside. \"No!\" you shout. \"Leave him alone!\"\n\n\t\tThe bird-creature chirps, and you realize it's laughing. \"Well, I've never met a human like you before. Look at you; you're not scared at all. Don't you worry,\" it adds, \"he'll be just fine. But I think someone would like to meet a brave human like you.\" The other bird-creatures' eyes widen, and then they all chirrup excitedly. \"We're going to introduce you to Subcommissioner Tweel.\"\n\t\t*goto Tweel_meeting_good\n\n\t#I get a better look at that horseless silver coach.\n\t\t*goto horseless_coach\n\n*label Tweel_meeting_good\n\nOne creature remains behind to handle the Fen Lion, but the rest bundle you into their horseless carriage. You wish you had about ten more eyes, so you could look everywhere at once. The inside walls are smooth and white, like an egg. Blinking, multicolored lights cover panels set throughout. They sit you down on a too-tall seat and strap you in.\n\n\"Careful,\" you say, \"The clasp is caught on my…\" \n\nWhat?\n*choice\n\t#My skirts—I'm a lady!\n\t\t*set gender \"female\"\n\t\t*goto checking\n\t#My suspenders—I'm a man!\n\t\t*set gender \"male\"\n\t\t*goto checking\n\t#I'm a man, but it's caught on my handbag!\n\t\t*set gender \"male\"\n\t\t*goto checking\n\t#I'm a lady, but it's caught on my trouser hem!\n\t\t*set gender \"female\"\n\t\t*goto checking\n\n*label checking\n\nThe ship rumbles and lifts off the ground. Your stomach clenches. \"Where are we going?\" you cry.\n\n\"Not far. The Subcommissioner was doing her rounds anyway. She's in orbit.\"\n\nThat doesn't make sense to you. But there's no time to ponder—the ship jolts forward. You twist around to look out a window. There are stars. You're in the sky. Suddenly, you feel both very small and very free. \n*page_break\n\nA massive silvery wall fills your field of vision. The bird-creatures unstrap you and lead you out of their carriage into a maze of winding, windowless corridors studded with doors. You realize their carriage has connected to some sort of skyfaring ship. \n\nAt one door, they pause. \"Subcommissioner?\" one calls. \"We've got a potential recruit.\"\n\n\"Come in.\"\n\nThe door opens. You gasp.\n*page_break\n\nAnother bird-creature stands behind a desk. She has the same thin beak as the others. Her slender arms end in clawed hands. The long, pinkish feathers on her curving neck smooth out around her shoulders. Her yellow eyes fix on you.\n*if (Tweel_meeting_rough = true)\n\t*set relationship_tweel %+10\n\t\"So,\" she says. \"I hear you had an altercation with my team.\"\n\n\t\"I was minding my own business!\" you say. \"But then they were hunting the Fen Lion….\"\n\n\tThe creature sighs. \"His name is really B'ob, and he's a Na.\"\n\n\t\"A what?\"\n\n\t\"A Na. They live on the planet Nannette.\" She nods to the room's single chair. \"Sit down. Your heart was in the right place, but I see I'll have to explain a few things. You've caused us quite a nuisance.\"\n\n\tYou sink onto the chair.\n\t*goto what_name\n\n*else\n\t*set relationship_tweel %+30\n\t\"New recruit, hmm? Sit down.\"\n\n\tThere's one chair. You sink onto it. The other bird-creatures melt from the room.\n\t*goto what_name\n\n*label what_name\n\"What's your name, human?\"\n\n*choice\n\t#River \n\t\t*set name \"River\"\n\t\t*goto reporting\n\t#Jim \n\t\t*set name \"Jim\"\n\t\t*goto reporting\n\t#Mairi\n\t\t*set name \"Mairi\" \n\t\t*goto reporting\n\t#Nieve \n\t\t*set name \"Nieve\"\n\t\t*goto reporting\t\n\t#Brandon\n\t\t*set name \"Brandon\"\n\t\t*goto reporting\n\t#None of these! \n\t\t*label input_name\n\t\tWhat is your name, then?\n\t\t*input_text name\n\n*label reporting\n\n\"I'm ${name},\" you say. \n\n\"And I am Subcommissioner Tweel of the Pan-Galactic Prisons Bureau.\" She meets your blank stare with a sigh. \"My team didn't tell you much, did they?\"\n\nYou shake your head.\n\n\"Earth is not the only planet with life. There are many sentient species throughout the galaxy. My own people—the Tetu—keep peace among them. Sometimes, individuals commit crimes.\"\n\n\"They do on Earth, too,\" you say. \"They go to jail.\"\n\nTweel's eyes glitter. \"Or to penal colonies; isn't that right?\"\n\nThinking of Australia, you nod.\n*page_break\n\n\"Earth is one of [i]our[/i] penal colonies. We place convicts in exile here. Those 'monsters' aren't supernatural beings; they're criminals.\" Tweel taps her talons together. \"Every so often, we recruit a human to help us. Someone to liaise between the PGPB and Earth, and ensure that our exile program is kept secret from humanity. I'm making you that offer. Otherwise…\" Her eyes narrow. \"We'll give you a memory wipe.\"\n\nYou think. \"Can I see my family again?\"\n\n\"No. Humans have pathetically short lives. We'll inject you with nanobots to keep you young—most of our convicts have sentences lasting several of your centuries. Once you're in, the Pan-Galactic Prisons Bureau will be your life.\" Tweel tilts her head to one side. \"Is there someone you will miss?\"\n\nYou do have a sweetheart. What was their name again?\n\n*choice\n\t#Mr. W.T. Books, Esq., a charismatic fellow.\n\t\tAh, a delightfully vibrant chap! You do appreciate a man with spirit!\n\t\t*set silver \"Luke\"\n\t\t*set silver_she \"he\"\n\t\t*set silver_him \"him\"\n\t\t*set silver_his \"his\"\n\t\t*set silver_charismatic true\n\t\t*goto without_warning\n\n\t#Sara the Milkmaid, a hardworking girl.\n\t\tA lovely girl, works hard to support her parents.\n\t\t*set silver \"Lucy\"\n\t\t*set silver_she \"she\"\n\t\t*set silver_him \"her\"\n\t\t*set silver_his \"her\"\n\t\t*set silver_hardworker true\n\t\t*goto without_warning\n\n\t#Andrew-down-the-way, a sweet farmboy.\n\t\tDashing, in a rough, farmboy sort of way. Still, he makes your heart beat faster. \n\t\t*set silver \"Luke\"\n\t\t*set silver_she \"he\"\n\t\t*set silver_him \"him\"\n\t\t*set silver_his \"his\"\n\t\t*set silver_sweet true\n\t\t*goto without_warning\n\n\t#Lady Serena, a witty lass.\n\t\tA fair maid indeed, always keeping you on your toes!\t\t\n\t\t*set silver \"Lucy\"\n\t\t*set silver_she \"she\"\n\t\t*set silver_him \"her\"\n\t\t*set silver_his \"her\"\n\t\t*set silver_soubrette true\n\t\t*goto without_warning\n\n*label without_warning\n\n\"There is someone….\" you murmur. \nTweel shrugs. \"It's a hard life, ${name}. We don't have many humans in the PGPB, and romantic relationships between agents are frowned upon. But you'll travel to other planets, see things like you've never seen, and live a long, long life.\" \n\nThat certainly sounds appealing.\n\n\"What was your occupation prior to this?\" Tweel asks.\n\n*if gender = \"male\"\n\t*choice \n\t\t#A soldier.\n\t\t\t*set combat %+20\n\t\t\t*goto initiation\n\t\t#A valet.\n\t\t\t*set resolve %+20\n\t\t\t*goto initiation\n\t\t#An amateur fossil-hunter.\n\t\t\t*set observation %+20\n\t\t\t*goto initiation\n\t\t#A politician.\n\t\t\t*set persuasion %+20\n\t\t\t*goto initiation\n\t\t#A pickpocket.\n\t\t\t*set stealth %+20\n\t\t\t*goto initiation\n\n*else\n\t*choice\n\t\t#A tavern manager.\n\t\t\t*set combat %+20\n\t\t\t*goto initiation\n\t\t#A lady-in-waiting.\n\t\t\t*set observation %+20\n\t\t\t*goto initiation\n\t\t#A factory worker.\n\t\t\t*set resolve %+20\n\t\t\t*goto initiation\n\t\t#A novelist with a pseudonym.\n\t\t\t*set persuasion %+20\n\t\t\t*goto initiation\n\t\t#A pickpocket.\n\t\t\t*set stealth %+20\n\t\t\t*goto initiation\n\n\n*label initiation\n\n\"Well,\" Tweel says. \"It will be quite an initiation. Are you interested in joining us?\"\n\n\"I am,\" you say carefully.\n\n\"Why, specifically?\"\n\n*choice\n\t#\"I need a new job.\"\n\t\t*set rule_bender %+10\n\t\t*goto pilot_duck\n\t#\"I want to see new things!\"\n\t\t*set observation %+10\n\t\t*goto pilot_duck\n\t#\"Protecting my planet is the right thing to do.\"\n\t\t*set justice %+10\n\t\t*goto pilot_duck\n\t#\"You aliens fascinate me. I want to build ties with you.\"\n\t\t*set persuasion %+10\n\t\t*goto pilot_duck\n\t#\"It seems like a big job. I want to prove I can do it.\"\n\t\t*set resolve %+10\n\t\t*goto pilot_duck\n\t#\"You've got big guns. I want one.\"\n\t\t*set combat %+10\n\t\t*goto pilot_duck\n\n*label pilot_duck\nTweel nods thoughtfully. \"Fair enough. Before your medical appointment, we'll need to enroll you in the Academy for training.\" She passes a small screen to you. A strange, alien language fills it. Tweel sighs and taps the screen once. The symbols rearrange themselves, and you realize it's a list of courses. \n\n\"You'll have a specialty, of course,\" Tweel says.\n\nWhich course speaks to you most? \n\n*choice\n\t#Diplomatic Negotiations—the fine art of persuasion!\n\t\t*set persuasion %+30\n\t\t*goto second\n\t#Munitions—I can blow things up.\n\t\t*set combat %+30\n\t\t*goto second\n\t#Disguise—I like being stealthy.\n\t\t*set stealth %+30\n\t\t*goto second\n\t#Observation—I have an eye for small details.\n\t\t*set observation %+30\n\t\t*goto second\n\t#Focus and Resolve—I'm proud of my willpower! \n\t\t*set resolve %+30\n\t\t*goto second\n\n*label second\n\n\"Very well,\" Tweel says. \"I'll give you a moment on the Observation Deck to bid your planet farewell. Then, you'll need to report to Med Deck Three for nanobot treatment and translator implant.\"\n\nEarth looks so small hanging against the darkness of space. A thrill of excitement runs through you. This is going to be a great adventure!\n*page_break And Time Goes By\n\nYou do well in the Academy. Within a few years, you've made Junior Subliaising Agent. By the twenty-first century ([i]that[/i] feels strange to say!), you are a full-fledged Liaising Agent, keeping the convicts on Earth from getting too unruly and making sure the people of Earth remain blissfully oblivious. \n\nOverall, things are going well. The nanobots have kept your body as young as it was the day you met Tweel. The translator chip feels natural under your skin. Even the communicators have improved since you started. You're used to the job; people in the PGPB know your name after a few decades.\n\nBut then, one day, the Yeti asks for a meeting to discuss his parole. \n*page_break\n\nThe PGPB has a base deep in the Himalayas. You've visited a few times over the years—it's a good spot for parole meetings—and you stride into the room confidently, not even blinking in the bright light. A single long table sits directly in front of you. A few meters further on, the air shimmers innocently. You swallow: it's a field of nanobots, held in place for now, but ready to sting anyone who blunders into them. No wonder the Yeti is sitting so quietly on the other side.\n\nHis long white fur has been neatly combed and his claws polished. Commissioner Tweel nods at you as you take your seat.  \"About time,\" she says. She turns forward and gives the Yeti withering glare. \"Now, Prisoner 24601, otherwise known as Yeti, your plea.\"\n\n\"Commissioner Tweel,\" the Yeti begins. \"Liaising Agent ${name}, it's very kind of you to hear me today—\"\n*page_break\n\n\"Get on with it, Yeti.\"\n\nHe flinches at Tweel's tone. \"I have been exiled to this planet for one hundred and eighty-one years. That's nearly half a lifetime for a Hirsus like me. I've learned my lesson; I'm ready for parole.\"\n\nTweel glances at you. Your mind races. You need to say something!\n*choice\n\t#\"If that's true, why do we keep hearing reports that you've been sighted?\"\n\t\t*set combat %+20\n\t\tThe Yeti shrugs his hairy shoulders. \"The Himalayas are less isolated than they used to be. Earth is less isolated than it used to be.\"\t\n\t\t\n\t\tYou frown. \"Explain.\"\n\t\t\n\t\tThe Yeti smiles at you. \"Remember when you wrote my first case summary, Agent ${name}? Trains were new. Now, you can fly to the Himalayas in a day. You've even been to the moon. There are more humans, and they're getting into more places. I can hide, sure, but sometimes they see me.\"\n\t\t*goto deviousness\n\t\n\t#\"It has been a long exile. Why don't you tell us how you've changed?\"\n\t\t*set justice %-20\n\t\tTears fill the Yeti's eyes. \"So many ways, Agent ${name}! Back home on Hirsutania, I was a lowlife. Yeti was my name and conning my game. I could cheat anyone. Then someone…\" he shoots Tweel a quick scowl, \"caught me out on a sweet grift. Dumped me here. For nearly two hundred years, people have called me a monster. They make you think, those cold nights when you're alone on some alien mountaintop.\"\n\t\t\n\t\tHe wipes his face with a massive paw. \"I want to go home. I've been a monster for too long—I'm ready to prove I'm not.\"\n\t\t*page_break\n\n\t\tDespite everything, you feel yourself softening. \"Then why did you get involved with those grifters?\"\n\t\t\n\t\t\"Hard choices in a hard life, Agent. You can understand that, can't you?\"\n\t\t\n\t\t\"Yes…\" you murmur. \"I can.\"\n\t\t*goto deviousness\n\t\n\t#\"You were sent to this penal colony for a reason! How can we trust you?\"\n\t\t*set justice %+20\n\t\tThe Yeti sits up very straight, looking slightly ridiculous in a chair far too small for him. He shakes his furry head. \"I wasn't that bad. Cheated a few people, rigged a few systems. More comfortable with a gamble than a gun, always.\"\n\t\t\n\t\t\"You haven't answered my question.\"\n\t\t\n\t\t\"Just getting my side in, Agent.\" The Yeti's gaze flicks to Tweel and then settles on you. \"I've been out of the game too long. Nearly two hundred years! My contacts have moved on; I'm washed up. Nothing for me to gain by going back to Hirsutania.\"\n\t\t*page_break\n\n\t\t\"If you're a shining beacon of innocence,\" you say, \"why did you get involved with those grifters in the first place?\"\n\t\t\n\t\t\"Hard choices in a hard life, Agent. You can understand that, can't you?\"\n\t\t\n\t\tYou snort. \"A hard life doesn't give you permission to break the law.\"\n\t\t*goto deviousness\n\t\n\t#\"Don't you eat people?\"\n\t\t*set justice %+20 \t\t\n\t\tThe Yeti smiles, revealing rows of sharp, jagged teeth. \"Just a couple. And it was right after I got here! People climbing around with bulky coats and heavy packs—I didn't even know they were humans then! I could've sworn they were some big, ugly animal.\" He leans back in his chair, looking thoughtful. \"Actually, I thought maybe they were manatees.\"\n\t\t\n\t\tYou snort. \"Manatees?\"\n\t\t\n\t\t\"Manatees, humanity, it's an honest mistake! I just knew manatees were big. Mountaineers are big.\" He spreads his paws wide. \"Can you blame me?\"\n\t\t\n\t\t\"Yes.\"\n\t\t\n\t\t\"When was the last time I ate a mountaineer?\"\n\t\t\n\t\tAt Tweel's gesture, you check your notes. \"1912.\"\n\t\t\n\t\t\"See! Over a century with a spotless record!\"\n\t\t*goto deviousness\n\n*label deviousness\nThe Yeti pauses. Familiar deviousness flickers across his face. \"Besides,\" he says slowly, \"I have information that might interest you.\"\n\nTweel's beak clacks as she draws her talons over a screen inlaid on her desk. Text scrolls down the display. After long years with the PGPB, you read alien scripts easily. The Yeti has amassed quite a profile, with several psychological tests and a list of misdemeanors longer than your forearm.\n\n\"Let's have it, Yeti,\" Tweel says.\n*page_break Indeed\n\nThe Yeti picks at his fur. His pink tongue skitters over his rows of teeth. When he laughs, it rings all too false to your ears. \"Why don't you grant me parole first?\"\n\nTweel clicks her talons on the desk, unblinking. \"Perhaps you misunderstand. That is not our procedure.\"\n\n\"I promise!\" The Yeti's voice rises. \"It's good stuff!\"  \n*page_break\n\nYou give the Yeti a hard look. \"He does have a history of lying.\"\n\n\"But I really have valuable information!\" Suddenly, the Yeti's voice quavers. His shoulders hunch. He looks almost…scared. \"It's dangerous for me to even mention it. It's important. Trust me.\"\n\n\"We can't,\" Tweel pulls up another screen. \"Parole denied.\"\n\n\"Stop!\" the Yeti pleads. \"Please, Agent ${name}, give me a chance!\"\n\n*choice\n\t#Let him speak.\n\t\t*set justice %-10\n\n\t\tThe desperation in the Yeti's face stirs something deep within you, and you feel yourself softening. Giving Tweel a pleading look of your own, you nod to him. \"All right, Yeti. What is it?\"\n\n\t\t\"Promise you'll let me go home, first.\"\n\n\t\t\"I can't promise that.\"\n\n\t\t\"Worth a try,\" the Yeti sighs. \"It's coming on June 31st.\"\n\t\t*page_break That's Not A Date\n\n\t\tIt's not a date, but you'll humor him. \"What is?\" you ask.\n\n\t\t\"I can't tell you that.\" It might be your imagination, but you think you catch the tiniest of grins from him. \"It's coming on June 31st.\"\n\n\t\t\"I've heard enough,\" Tweel interrupts. \n\t\t*goto turning_parole\n\n\t#Send him back to exile.\n\t\t*set justice %+10\n\n\t\tYou shake your head at the Yeti's antics. So far, nothing he's said has convinced you that he's ready to return to law-abiding society. Justice must be served. \"I agree with Commissioner Tweel,\" you say. \"I recommend your parole be denied.\"\n\n\t\tGuards swoop in and seize the Yeti. As they escort him from the chamber, ready to return him to the mountainside, the Yeti yells, \"It's coming on June 31st!\"\n\t\t*page_break What?\n\n\t\tYou and Tweel both freeze. \"That date doesn't exist,\" you say. \"You're lying.\"\n\n\t\t\"That's all I can say.\" The Yeti looks so smug, it sets your teeth on edge. \"June 31st.\"\n\n\t\t\"You lied to me the first time I met you.\" Almost without realizing it, you rub your thumb over the nanobot cluster embedded in your wrist. It was so long ago, now. \"You'll have to do better than that. June 31st? What a joke.\"\n\n\t\tTweel nods. \"Next time, make sure your facts are right. It'll make them easier to believe.\" She scoffs. \"Only thirty days in June, Yeti.\" \n\t\t*goto turning_parole\n\n*label turning_parole\nTurning to you, Tweel adds, \"What do you think? Should he get parole?\"\n*choice\n\t#Sure, he's harmless enough.\n\t\t\"I don't think he'll be a problem,\" you say carefully. Tweel rolls her eyes. Keeping your composure, you add to the Yeti, \"We'll be watching you carefully.\"\n\n\t\tThe Yeti nods, his eyes shining. \"Thank you, Agent ${name}! You won't regret this!\"\n\n\t\t\"I hope not,\" Tweel mutters as the Yeti is led away. Just before he exits the room, he turns around and flashes you a big smile.\n\n\t\tIt feels good, even if Tweel's disapproval is almost palpable.\n\n\t\t\"Well, that's done.\"\n\t\t*set yeti_free true\n\t\t*goto tweel_rises\n\n\t#No way. I don't trust him.\n\t\t\"I recommend he stays on Earth,\" you say. \"A little more time in exile will be good for him.\"\n\n\t\tThe Yeti groans, but Tweel nods. \"I agree.\" To the guards, she says, \"This meeting is over.\"\n\n\t\tAs guards lead the Yeti away, you watch him carefully. He doesn't look scared anymore. Just disappointed. \n\n\t\t\"Well, that's done.\"\n\t\t*set relationship_tweel %+10\n\t\t*goto tweel_rises\n\n\t#Let's schedule another hearing soon. I want to watch him more.\n\t\t\"His behavior has been good,\" you start, \"but he isn't ready yet. Let's have another hearing in six months for reassessment.\"\n\n\t\tWhen the Yeti grumbles, you give him a sharp look. \"That's a lot better than another hearing in five years,\" you remind him.\n\n\t\t\"Indeed,\" Tweel says. \"We're done here.\" \n\n\t\tTo your surprise, the Yeti follows the guards docilely, his big head hanging low as they leave the room. \n\n\t\tTweel turns to you. \"Well done, ${name}. You kept your resolve well.\" \n\t\t*goto tweel_rises\n\n\t*hide_reuse #Question him further.\n\t\t*set persuasion %+10\n\t\t\"Yeti,\" you say softly. \"Why are you so scared?\"\n\n\t\tThe Yeti's head snaps up. So does Tweel's. \"Scared?\" the Yeti says.\n\n\t\t\"Look at you. You're trembling.\" You lean over the desk. \"Either this is big news…or you're scared of being caught in another lie.\"\n\n\t\t*page_break\n\n\t\tSuddenly, the Yeti won't meet your eye. You smile knowingly. \"Who's your source, Yeti?\"\n\n\t\t\"I can't tell you,\" he mumbles.\n\n\t\t\"Right. And when did you come across this information?\"\n\n\t\t\"I can't tell you.\"\n\n\t\t\"What does it pertain to?\"\n\n\t\tIf Hirsus had sweat glands, he'd be dripping. Instead, his tongue lolls like a dog's. \"I can't tell you.\"\n\n\t\t\"What can you tell me?\"\n\n\t\t\"It's coming on June 31st.\" \n\n\t\t*page_break What?\n\n\t\t\"June 31st?\" you repeat. \"That isn't a real date!\"\n\n\t\tTweel scowls. \"Stop wasting our time, Yeti.\"\n\t\t*goto turning_parole\n\n*label tweel_rises\nTweel stands. \"It's been a while, ${name}. Still looking to rise through our ranks? Land a desk job someday?\"\n\n*choice\n\t#\"Desk job? I love field work!\"\n\t\t*set relationship_tweel %+10\n\t\tTetu don't do much in the way of shoulder pats or handshakes, but Tweel relaxes. \"Good,\" she says. \"Because your next assignment is in.\"\n\t\t*goto assignment\n\n\t#\"I hadn't really thought about it.\"\n\t\t*set relationship_tweel %+5\n\t\t\"Well,\" Tweel answers. \"You have some time to think. As long as you don't start thinking about my job.\"\n\t\t*goto assignment\n\t\t\n\t#\"Definitely. The shooting, bribes, deceit—it gets old.\"\n\t\tTweel's feathers ruffle. \"Not gunning for my job, I hope.\"\n\t\t*choice\n\t\t\t#\"Of course not!\"\n\t\t\t\t*set relationship_tweel %+10\n\t\t\t\tTweel hands you a disk, looking relieved. \"Your next assignment, Liaising Agent.\"\n\t\t\t\t*goto assignment\n\t\t\t#\"Well, actually…\"\n\t\t\t\t*set combat %+10\n\t\t\t\tTweel thrusts a disk into your hands, with rather more force than necessary. \"Your next assignment, Liaising Agent.\"\n\t\t\t\t*goto assignment\n\t\t\t#\"I like my position. A higher salary wouldn't hurt, though.\"\n\t\t\t\t*set relationship_tweel %+5\n\t\t\t\t*set combat %+5\n\t\t\t\t\"Very funny. Your next assignment is in.\"\n\t\t\t\t*goto assignment\n\t\t\t#\"Actually, I was thinking of a transfer.\"\n\t\t\t\t\"A transfer?\" Tweel pauses. \"Where to?\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"Pilot.\"\n\t\t\t\t\t\t*set resolve %+10\n\t\t\t\t\t\t*goto tired\n\t\t\t\t\t#\"Espionage.\"\n\t\t\t\t\t\t*set observation %+5\n\t\t\t\t\t\t*set stealth %+5\n\t\t\t\t\t\t*goto tired\n\t\t\t\t\t#\"Politics.\"\n\t\t\t\t\t\t*set persuasion %+10\n\t\t\t\t\t\t*goto tired\n\t\t\t\t\t#\"Security.\"\n\t\t\t\t\t\t*set combat %+10\n\t\t\t\t\t\t*goto tired\n\t\t\t\t\t\t\n\n*label tired\nGently, but firmly, Tweel presses a disk on you. You load it into your communicator, sinking inwardly as the new assignment icon flashes across the screen. It's been a lot of running, these past centuries—a lot of running, with little time to rest.\n\nAlmost as though reading your thoughts, Tweel speaks, her tone softer than usual, almost gentle. \"You're tired, aren't you, ${name}?\n\nThat was unexpected. How do you respond?\n\n*fake_choice\n\t#\"Tired? Me?\"\n\t#\"Yeah. I am.\"\n\t#\"I wouldn't call it tired, exactly….\"\n\t#I say nothing.\n\nTweel's fluffy eyebrows raise, but she chooses not to pursue the matter. Again, still in that same soft, low tone, she says, \"We need you, ${name}.This is a routine check-in. You can rest soon.\"\n*goto assignment\n\n*label assignment\n\nYou fiddle with your communicator. \"What is this assignment?\"\n\nTweel's already leaving the room. You have to trot to keep up. \"Nothing that will take too much of your time. You know our Yeti isn't the only Hirsus exiled on Earth.\"\n\nHonestly, you've lost count of how many of the Yeti's relatives you've run into over the decades.\n\n\"Which one this time?\" You tap the screen impatiently.\n\n\"The Moehau Monster.\"\n\n*page_break Oh, Joy\n\nYour laughter rings off the walls. \"The Yeti's cousin?\"\n\nTweel isn't laughing. \"It's been a while since anyone checked in with her. I want to make sure she's behaving.\"\n\n\"Right.\" A sudden thought occurs to you, and you feel a grin spread across your face. \"At least it's summer in New Zealand!\"\n\n*finish", "intricacies": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Yeti's Parole Officer[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\nYou haven't visited PGPB headquarters for a while. As your transport docks, you peer out the windows. It's an orbiting station, revolving lazily above the Tetu home planet. Spokes connect a series of concentric rings to one central axis. There are offices and bridges in the rings, engines and power grids in the center. The rings spin independently of each other, assisting the antigravity engines. The whole station is made of silver-white metal and gleams in the light of the Tetuan sun. \n\nThe ship docks with a jolt. A retinue of four Tetu guards waits immediately outside the airlock. Their feathers bristle. \"Well,\" says one. \"The agents from Earth.\" His beak clacks with glee. \"Tweel's been looking forward to having a word with you—oh yes, she has.\"\n\nBeside you, ${silver} gulps.\n*page_break Uh-Oh\n\nTweel is waiting in her office. It's on the fourth ring out from the center: not as exposed as the outer rings, but also not too close to the engines. A window behind her desk reveals a glittering expanse of stars and the brilliant curve of the next ring. You think back to the person you used to be, back when you were an ordinary, mortal human and not a PGPB agent. Back then, you would've given your life for a sight like this.\n\nIn a way, of course, that's exactly what you did. \n\n\"So,\" Tweel says. \"That smuggling ring…\"\n\nYou nod.\n\n\"Let's chat about that. What progress have you made?\"\n*page_break Um.\n\n${silver} still looks like ${silver_she} might keel over; ${silver_she} is very pale, and ${silver_she} is breathing quickly and shallowly. It might be best to get ${silver_him} out of here. Besides ${silver_his} personal distress, ${silver_she} looks panicked enough to put ${silver_his} foot in ${silver_his} mouth. Then again, you don't exactly want to face Tweel alone, either….\n\n*choice\n\t#Offense is the best defense. I start questioning Tweel.\n\t\t*if rule_bender > 60\n\t\t\t\"Well, it's hard without the right support!\" you say. ${silver} gives you a wild, wide-eyed stare, but you refuse to yield. \"What have you been doing, Commissioner? You've got more technology, more information—\"\n\n\t\t\t\"And more responsibilities,\" Tweel says coldly. \"We call it the Pan-Galactic Prisons Bureau for a reason, ${name}. I monitor the entire galaxy. I thought the two of you could handle one planet.\"\n\n\t\t\t\"We call it a smuggling ring for a reason, Tweel. If you're monitoring the entire galaxy, why haven't you tracked down the smugglers on your side?\"\n\n\t\t\tTweel's beak opens, then closes. \"Perhaps…\" she mutters. \"Perhaps I have been slightly harsh.\"\n\t\t\t*goto tweel_conflict_win\n\n\t\t*else\n\t\t\t\"Well, it's hard without the right support!\" you say. ${silver} gives you a wild, wide-eyed stare, but you refuse to yield. \"What have you been doing, Commissioner? You've got more technology, more information—\"\n\n\t\t\t\"I'm sorry, ${name}.\" Tweel's eyes glitter dangerously. \"It almost sounds like you're questioning me.\"\n\n\t\t\t\"I am!\"\n\n\t\t\t\"I am the Commissioner; you are nothing but a field agent! Oh, don't give me that look. You know that the Liaison Office is another term for fieldwork.\" Tweel struts out behind from her desk. ${silver} whimpers. \"I see I was right to call you in.\"\n\t\t\t*goto tweel_conflict_fail\n \n\t#I take all the blame, so poor ${silver} can leave.\n\t\tYou take a deep breath. \"Look, Commissioner, before you say anything—it was all my fault.\"\n\n\t\tBoth Tweel and ${silver} raise eyebrows at you. You shrug. \"I was struggling, right? That's why you assigned ${silver} to help me. And even with ${silver_his} help, I haven't found the smuggling ring or learned anything really concrete about the warp gates. That's not because ${silver} is a bad agent. I am.\"\n\n\t\tTweel preens, stroking the long feathers on her neck. \"Agent ${silver}, perhaps you should leave.\"\n\n\t\t${silver} can hardly get out of the room fast enough. The moment ${silver_she} is gone, Tweel fixes you with a steely glare.\n\n\t\t*if relationship_tweel > 60\n\t\t\t\"You don't actually believe it was your fault,\" Tweel says simply.\n\n\t\t\t\"I…\"\n\n\t\t\t\"I know you better than that, ${name}.\" She flips idly through the screens set into her desk. \"You want to uphold your reputation as a competent agent. Clearly, you also wish to protect your partner. That is noble, if naïve.\" Tweel glances up. \"I was considering turning this case over to ${silver}. But I think you need each other.\"\n\t\t\t\n\t\t\tShe presses a button in the desktop. \"Send ${silver} back in, please.\"\n\n\t\t\tAs ${silver} re-enters, looking puzzled, Tweel clacks her beak. \"${name} and I have talked, ${silver}. You are both still highly respected agents. Don't worry.\"\n\t\t\t*set relationship_silver %+15\n\t\t\t*set relationship_tweel %+15\n\t\t\t*set justice %-15\n\t\t\t*goto tweel_conflict_win\n\n\t\t*else\n\t\t\t\"So,\" Tweel says coldly. \"You're to blame, are you?\"\n\n\t\t\tBefore, you might have yielded right then, unable to bear the idea of Tweel thinking badly of you. You're past that now. ${silver}, you know with equal conviction, is not. You don't care about yourself, but maybe you can keep ${silver_him} out of trouble.\n\n\t\t\tAnd so, you straighten up and meet Tweel's yellow eyes. \"Probably.\"\n\n\t\t\t\"${name}…\"\n\n\t\t\tYou flash a cocky grin. \"You know ${silver}. Better than you know me. You know ${silver_she} is totally competent, totally by-the-book. Ergo, none of this is ${silver_his} fault. Ergo, it must be mine.\"\n\n\t\t\tYou're digging your own grave a little more with every word. You must like ${silver} or something. Or ${silver} will owe you. Or both.\n\n\t\t\tTweel's feathers stiffen with anger. \"I see I was right to call you in.\" She presses a button on her desktop. \"Send Agent ${silver} back in.\"\n\t\t\t*set relationship_silver %+15\n\t\t\t*set rule_bender %+15\n\t\t\t*goto tweel_conflict_fail\n\n\t#I blame ${silver}. Hey, it's my neck on the line.\n\t\t*if (silver_date = true)\n\t\t\t\"Look, I was doing just fine, until ${silver_him} showed up!\" you say, stabbing a finger towards ${silver}. \"This is all ${silver_his} fault!\"\n\n\t\t\t${silver} steps backward. Anger flashes across ${silver_his} face. \"What?\"\n\n\t\t\tYou cross your arms over your chest. \"You heard me. I'm a competent agent. You're getting in my way. Tweel should sack you, not me.\" Seeing ${silver}'s distress mount, you do feel a little regret. But your job is way more important than any passing dalliance.\n\n\t\t\tUnfortunately, ${silver} doesn't seem to agree with you. Without another word, ${silver_she} turns on ${silver_his} heel and practically runs from the room. Not so fast that you don't see ${silver_his} tears, though, you terrible person. \n\n\t\t\tTweel gapes at you. \"I think you need to explain that, ${name}.\n\t\t\t*set relationship_silver %-50\n\t\t\t*set justice %+15\n\t\t\t*goto tweel_silver_busted\n\n\t\t*else\n\t\t\t\"Look, I was doing just fine, until ${silver_him} showed up!\" you say, stabbing a finger towards ${silver}. \"This is all ${silver_his} fault!\"\n\n\t\t\t${silver} snorts. \"Oh, please.\"\n\n\t\t\t\"If you hadn't offended Nessie back in Scotland, she would've told me everything! I had her eating out of the palm of my hand!\"\n\n\t\t\t\"No, you were eating fish and chips with your hands. There's a difference, ${name}!\"\n\n\t\t\t\"Stop!\" Tweel glowers. \"I see I was right to check in with you.\"\n\t\t\t*set relationship_silver %-15\n\t\t\t*set relationship_tweel %-15\n\t\t\t*goto tweel_conflict_fail\n\n\t*selectable_if(silver_date = true) #I grab ${silver}'s hand. We're facing this together.\n\t\t${silver} gulps. It's interesting: ${silver} may seem totally cool and competent out in the field, but faced with the prospect of displeasure or discipline from Tweel, ${silver_she} folds faster than a pessimistic poker player. \n\n\t\tSeeing ${silver_his} terrified expression sparks a weird, protective instinct that you didn't know you possessed. Without thinking, you grip ${silver_his} hand tightly.\n\n\t\t${silver} squeezes back as you stare Tweel down. \"We've done our best,\" you tell her confidently. \"We checked around Loch Ness, we pursued the chupacabra right to their home planet, and we even questioned the Jackalope!\"\n\n\t\tTweel isn't paying attention; her yellow eyes are riveted on your clasped hands. \"${name} and ${silver}, what are you doing?\"\n\t\t*set justice %-15\n\t\t*set relationship_silver %+15\n\t\t*goto tweel_busted_two\n\n\t*selectable_if(relationship_mothman > 50) #I excuse myself to call Mothman. Maybe he has some last-minute intel!\n\t\tMumbling something about sudden, severe gastrointestinal distress, you excuse yourself. Thankfully, Tweel has only the vaguest notions of how the human GI tract works, and she's concerned that your bowels might literally explode. At least ${silver} looks concerned on your behalf; you just hope there isn't an awkward conversation in your future.\n\n\t\tOh well. You gave up on saving your dignity decades ago.\n\n\t\tIn the privacy of a lavatory, you feverishly dial the secure line Mothman gave you.\n\t\t*goto mothman_pickup_intricacies\n\n\t\t*label mothman_pickup_intricacies\n\t\tThankfully, he picks up right away. \"Yes?\"\n\n\t\t\"Mothman!\" You lean your forehead against the smooth metal bulkhead. \"I need your help. Now.\"\n\n\t\t\"I assist.\"\n\n\t\t\"Any progress on that smuggling? I've got Tweel demanding answers. We're partners, man, now's the time to come through!\"\n\n\t\t\"A moment.\" \n\n\t\tThere's a short silence. Your heart pounds in your ears. You hope ${silver} isn't saying anything unfortunate back in Tweel's office.\n\n\t\tMothman's voice crackles on the line. \"They are using new technology. Usually, warp gates of such complexity are not stable within a planet's gravitational field. They have overcome this. Now, they rely on PGPB complacency and inattention.\"\n\n\t\t\"New tech, complex—like…something that could convey living things?\"\n\n\t\t\"Indeed.\"\n\n\t\t\"Got it.\" You hang up without saying goodbye and sprint back to Tweel's office.\n\t\t*goto back_to_tweels_office\n\n\t\t*label back_to_tweels_office\n\t\tBefore you even catch your breath, you repeat the information to Tweel, passing it off as your own discovery. ${silver} looks baffled, but ${silver_she} is wise enough not to interrupt as you save your hides.\n\n\t\tWhen you finish, Tweel strokes her feathers thoughtfully. \n\n\t\t\"Well,\" she says. \"It seems you've learned more than I thought.\"\n\t\t*set rule_bender %+15\n\t\t*set resolve %+15\n\t\t*goto tweel_conflict_win\n\n*label tweel_conflict_win\nAt Tweel's words, ${silver} gives an audible sigh of relief. You can't help smiling as well. It feels like a heavy weight has been lifted from your chest.\n\n\"You two will remain on the case together,\" she continues. \"${silver}, I am increasing your Clearance Rank.\"\n\n\"Hey!\" you interrupt.\n\n\"Yours too, ${name}. Be patient.\" She shakes her head. \"In this matter, we are willing to give you some additional, limited support. I can increase your budget slightly…I said slightly, ${name},\" she repeats, catching your expression.\n*set clearance +1\n*set cash +50\n*goto power_outage\n\n*label tweel_conflict_fail\nYou'll say this about Tweel: she knows her agents well. Pacing in front of you and ${silver}, she doesn't lay into you right away. No, she lets you sweat, your dread building as her talons click over the metal floor. \n\n\"${silver},\" she says at last. \"You have always been one of our most respected agents. I had hoped that you would keep ${name} in line.\"\n\n${silver} hangs ${silver_his} head, ${silver_his} cheeks flaming red.\n\n\"Oh, ${silver}, I don't blame you. Agent ${name} has become increasingly…contrary these past few years.\" \n\nYou say nothing. You won't deny something that's true.\n\n\"${name}, I'm decreasing your Clearance Level. As well, I am reassigning your case to—\"\n\nBefore she can finish her sentence, the lights flicker ominously and an acrid, burning smell fills the air.\n*set clearance -2\n*goto power_outage\n\n*label tweel_silver_busted                                 \n\"Um.\" You suddenly feel like a teenager again, trying to explain to your parents why you were walking with your love interest sans chaperone. \"I think ${silver} is a little overemotional.\"\n\n\"I see that. However, ${silver} has always controlled ${silver_his} emotions remarkably well, except when ${silver_she} is…\" Tweel trails off. Her eyes widen, and she fumbles her way to the nearest seat. \"${name}, have you been developing a personal relationship with ${silver}?\"\n\n\"Kind of.\"\n\n\"We have a strict policy against that kind of fraternization! For precisely these reasons! ${name}, our job is hard enough without such distractions! ${silver} is our best agent—\"\n\nYou can't help interjecting, \"I thought I was your best agent.\"\n\n\"This is serious, ${name}. I'm lowering your Clearance Level.\" She presses a button on her desktop. \"Send ${silver} in.\"\n\nWhen ${silver} returns, ${silver_she} won't look at you. Tweel sighs. \"Right. Well, I was hoping not to deal with this. As long as you're both PGPB agents, any personal relationship—\"\n\n\"We have no personal relationship,\" ${silver} hisses.\n\n\"Good. ${name}, I'm reassigning this case to—\"\n\nBefore she can finish her sentence, the lights flicker ominously and an acrid, burning smell fills the air.\n*set clearance -2\n*set silver_date false\n*goto power_outage\n\n*label tweel_busted_two\nYou knew this was coming. As ${silver}'s fingers curl around yours, you take a deep breath. \"We…\"\n\nThen, to your surprise, ${silver} lifts ${silver_his} chin. In a firm, steady voice, ${silver} says, \"We've begun a personal relationship.\"\n\n\"I see.\" Tweel clicks her claws together. \"You do realize that this is a direct contravention of PGPB policy?\"\n\nYou nod.\n\n${silver} shudders, but says, \"We understand that this presents a conflict of interest, however, we…please, Commissioner.\"\n\nThat is unusual for ${silver_him}, when ${silver_she} cares so much about ${silver_his} standing in the PGPB…and following the rules. If nothing else, ${silver} sticks by ${silver_his} own strict moral code. The fact that ${silver_she} is willing to challenge Tweel like this tells you just how strongly ${silver_she} feels for you. \n\n\"If you feel strongly about this…\" Tweel shakes her head. \"You have lost the ability to treat each other professionally and objectively. One of you will require reassignment to a different department. ${name}, since you've been a spectacular failure, I suggest reassigning this case entirely to—\"\n\nBefore she can finish her sentence, the lights flicker ominously and an acrid, burning smell fills the air.\n*set clearance -2\n*goto power_outage\n\n*label power_outage\nSuddenly, the station shudders violently. Vibrations run through the metal floor, juddering along your sternum. There's a sharp crackling, followed by a burst of light. \n\nAnd then, darkness fills the station.\n\n*if (silver_date = true)\n\tYour hand goes instinctively to ${silver}. You need to make sure ${silver_she} is safe. With that confirmed, you fumble for your stunner.\n\t*goto tweel_silhouette\n*else\n\tYour hand instinctively goes to your stunner. \n\t*goto tweel_silhouette\n\n*label tweel_silhouette\nTweel is nothing but a silhouette against the backdrop of stars, but you see her raise her own weapon. The station gives a tired, moaning sound, and then the emergency lighting system kicks in. Soft, pale green strips of light glow in three bands: one at floor level, one at eye level, and one near the ceiling. \n\nTweel dives for the intercom. \"What's happened?\"\n\nNo answer. She switches to the emergency channel. \"Engineering, can you hear me?\"\n\nThe response is delayed, but audible. \"Power's out all over the station, Commissioner.\"\n*page_break Well, That's Bad\n\n\"Any idea why?\" Tweel demands. \n\n\"Whatever it was, it was intentional.\" The engineer pauses. \"Commissioner, this is sabotage.\"\n\nMeanwhile, ${silver} has drifted to Tweel's desk. Frowning, ${silver_she} flips through several screens. You scoot over and peer over ${silver_his} shoulder. Most of the screens are black; a few are running on auxiliary power and show greatly simplified displays. Still, it's enough for you to realize something.\n\n\"Tweel…\" You drag your fingers over the schematics, enlarging them. Just to make sure. \"The Earth Monitoring System was hit the worst. Circuits are completely fried.\"\n\n\"You mean no one is watching Earth?\"\n*page_break Nope\n\nYou gulp. The smuggling, the jailbreak, and now Earth is completely unobserved. This is no coincidence. The main power grid is at the heart of the station; it'll be tricky to reach, but it's your best bet for getting the station back online. You could try hooking the EMS to the auxiliary power unit: it won't help the station, but it'll ensure that Earth is monitored. \n\nTweel's looking angst-ridden, though. Maybe you don't want to leave her; you can always direct the engineers over the comm lines. Then again, this might be the perfect time to make a discreet exit.\n\n*label intricacies_main_branch\n*choice\n\t*disable_reuse #I head for the main grid.\n\t\t\"I'll fix this,\" you announce. With that, you stride from the office. \n\n\t\t${silver} runs to catch up with you. \"Where do you think you're going?\"\n\n\t\tYou shrug ${silver_him} off. \"To the main power grid.\"\n\n\t\t*if relationship_silver > 60\n\t\t\t\"I'm coming with you.\"\n\n\t\t\tYou shake your head. \"${silver}, we don't know what other systems have been affected. It's dangerous.\"\n\n\t\t\tAt that, ${silver_his} chin juts out. \"Which is exactly why you need me.\"\n\n\t\t\tYou can't help laughing a little. \"All right, all right! You got me—I do need you.\" You start off down the hall. \"Let's go.\"\n\t\t\t*goto grid_trek_duo\n\n\t\t*else\n\t\t\t${silver}'s blue eyes narrow. \"That's the most foolhardy thing you've come out with in a while. We don't know what other systems have been affected.\"\n\n\t\t\t\"You don't have to come.\"\n\n\t\t\t\"I don't intend to.\" Scowling, ${silver_she} stalks back to Tweel.\n\n\t\t\tNice to know you've got a cheerleading section. Onwards!\n\t\t\t*goto grid_trek_solo\n\n\t\t*label grid_trek_duo\n\t\tCrisis protocols have been enacted all over the station. All crew are in lockdown in the nearest secure chambers…except for you and ${silver}, but that seems to be fine. The emergency lights fill the corridors with a pale, ghostly glow.\n\n\t\tIf you can just get to one of the \"spokes\" that connects the station's rings, you can head straight to the grid at the center. Or so you think, but when you arrive at one, it's pitch-black. There aren't even emergency lights \n\n\t\t\"This is the most direct route,\" ${silver} says. \"It'll take forever to go around. But I don't know if we can get through. If they've lost life support, the containment walls are down.\"\n\n\t\tContainment walls: a handy engineering feature meant to quarantine segments of the ship if necessary.\n\n\t\t*label grid_choices_one\n\t\tWhat's the plan?\n\t\t*choice\n\t\t\t#I find an alternate route; better safe than sorry.\n\t\t\t\t*if (stealth > 60) or (rule_bender > 60)\n\t\t\t\t\t\"Let's find another way,\" you say. \"I…\" And then you pause. And grin. \"I know one.\"\n\n\t\t\t\t\tSo, there's no official reason that you should be familiar with the ventilation shafts. After all, crew are expected to walk the corridors, not scuttle behind the walls like villains on a heist. But the fact is, you know the system of shafts very well.  \n\n\t\t\t\t\tYou prise a panel from the wall and beckon ${silver} through. Together, you bypass the questionable corridor and quickly make your way to the main grid.\n\t\t\t\t\t*goto grid_win_quick\n\n\t\t\t\t*else\n\t\t\t\t\t\"Let's find another way,\" you say, shuddering at the yawning pit of darkness.\n\n\t\t\t\t\tAs expected, it takes a long time. It'd be nice if you knew a faster way to get there—but you're not that stealthy. Eventually, though, you hook into one of the other spokes and charge full tilt towards the grid. Let's hope you're not too late!\n\t\t\t\t\t*goto grid_win_slow\n\n\t\t\t*disable_reuse #I try communicating with the engineers from here.\n\t\t\t\t*if resolve > 60\t\t\n\t\t\t\t\tIt takes a long, long time to patch through the auxiliary line. Tweel's office could access it, but from here, there are many firewalls in your way. Probably not a bad security feature if the station was ever besieged, but for now, it requires a lot of resolve and fortitude to dismantle each defense.\n\n\t\t\t\t\tEventually, you do get through. You clear your throat. \"Engineering, this is Agent ${name}.\"\n\n\t\t\t\t\t\"${name}! We're giving her all we've got! You've got to get to the grid.\"\n\n\t\t\t\t\t\"Wish I could. Containment walls in my way.\"\n\n\t\t\t\t\t\"Hold on!\"\n\n\t\t\t\t\tSlowly, begrudgingly, the walls start to rise. After much groaning of metal, your way is clear. Now, go!\n\t\t\t\t\t*goto grid_win_quick\n\t\t\t\t\t\n\t\t\t\t*else\t\t\t\t\t\n\t\t\t\t\tYou tap at the wall-mounted communicator ineffectively. Tweel's office could access the auxiliary line, but you can't break into it from here. Probably not a bad safety feature if the station was ever besieged, but for now, it means you need to try again.\n\t\t\t\t\t*goto grid_choices_one\n\n\t\t\t*disable_reuse #I forge ahead, into the darkness.\n\t\t\t\t*if (resolve > 55) or (relationship_silver > 60)\n\t\t\t\t\tIt's very dark and frightening. ${silver} walks close on your heels, and you turn every so often to murmur reassurances to ${silver_him}. There's a point in the middle of the corridor where you can't see anything. It's like walking through the void, and you freeze, fear like ashes in your mouth.\n\n\t\t\t\t\tThen, there's a light touch on your back. ${silver}. It feels good to know someone is there. Not just anyone, either, but ${silver}, your partner. You take a deep breath, muster your resolve, and keep going. You even pick up speed, and before too long, you see the lights of the main power grid shining like a beacon ahead.\n\t\t\t\t\t*goto grid_win_quick\n\n\t\t\t\t*else\n\t\t\t\t\tYou get a few steps down the corridor and freeze. It's so black, you might as well be in space. Your blood curdles at the thought. \"I can't do this,\" you mutter.\n\n\t\t\t\t\t${silver}'s voice comes disembodied through the darkness. \"What?\"\n\n\t\t\t\t\t\"I can't!\" Don't panic! Don't panic! ${silver} touches your arm lightly. It does reassure you a little, but your heart feels like it's beating too quickly. You break away from ${silver_him}, gasping.\n\n\t\t\t\t\t\"All right,\" ${silver} murmurs. \"It appears that we need to find another way.\"\n\t\t\t\t\t*goto grid_choices_one\n\n\t\t*label grid_win_quick\n\t\tAll things considered, it didn't take you that long to reach the main power grid. You stare at the tangle of wires and buttons. There's a pattern here, if you can just concentrate….\n\n\t\t*if observation > 50\n\t\t\tAfter a few moments' contemplation, you think you've spotted it. Red wire to green socket, flip the blue switch overhead, press the shiny button that looks like a firefly, cross your fingers…\n\t\t\t*goto power_on_one\n\n\t\t\t*label power_fail_one\n\t\t\tThe lights blaze all around you. It's like being engulfed by the sun. There's a harsh sizzling sound, an explosion that sends you pitching to your feet, and Tweel's voice coming over the auxiliary comm line.\n\n\t\t\t\"${name}? That's a demotion.\"\n\t\t\t*set clearance -10\n\t\t\t*goto intricacies_fail\n\n\t\t\t*label power_on_one\n\t\t\tFor a second, you don't think it's worked. But then humming starts under your feet. It spreads through the whole station. Lights and screens glow softly to life. You stagger over to the nearest screen and turn it to the Earth Monitoring System. Just in time, too. You spot a tiny blip: a warp gate activating in Scotland.\n\n\t\t\tTweel's voice comes over the auxiliary comm line. \"Good work, ${name}. Consider your Clearance Level increased.\"\n\t\t\t*achieve lightson\n\t\t\t*set clearance +10\n\t\t\t*goto intricacies_win\n\n\t\t*else \n\t\t\t*label rule_bender_grid\n\t\t\tYou stare at the grid in bewilderment. None of this makes any sense to you. Acting on a guess, you switch a few wires around. Then you press a button for good measure.\n\t\n\t\t\tDid it work?\n\t\t\t*goto power_fail_one\n\n\t\t\t*label grid_win_slow\n\t\t\tYeah, you were really slow. The engines are making odd noises, and sparks fly all over the room. It's a good-sized room, too.\n\t\t\t*goto rule_bender_grid\n\n\t\t*label grid_trek_solo\n\t\tCrisis protocols have been enacted all over the station. All crew are in lockdown in the nearest secure chambers…except for you, but that seems to be fine. The emergency lights fill the corridors with a pale, ghostly glow.\n\n\t\tIf you can just get to one of the \"spokes\" that connects the station's rings, you can head straight to the grid at the center. Or so you think, but when you arrive at one, it's pitch-black. There aren't even emergency lights.\n\t\t*page_break Creepy\n\n\t\tIt's the most direct route; going around will take forever. But you're not sure if you can get through. If they've lost life support, the containment walls are almost certainly down.\n\n\t\tContainment walls: a handy engineering feature meant to quarantine segments of the ship if necessary.\n\n\t\t*choice\n\t\t\t#I find an alternate route; better safe than sorry.\n\t\t\t\t*if (stealth > 60) or (rule_bender > 60)\n\t\t\t\t\tYou're preparing for a long haul when you pause. There's no official reason that you should be familiar with the ventilation shafts. After all, crew are expected to walk the corridors, not scuttle behind the walls like villains on a heist. But the fact is, you know the system of shafts very well.  \n\n\t\t\t\t\tYou prise a panel from the wall. Using the shaft behind, you bypass the questionable corridor and quickly make your way to the main grid.\n\t\t\t\t\t*goto grid_win_quick\n\n\t\t\t\t*else\n\t\t\t\t\tAs expected, finding another route takes a long time. It'd be nice if you knew a faster way to get there—but you're not that stealthy. Eventually, though, you hook into one of the other spokes and charge full tilt towards the grid. Let's hope you're not too late!\n\t\t\t\t\t*goto grid_win_slow\n\n\t\t\t#Forget fixing the main grid. I want to make a new choice.\n\t\t\t\tAw, it's just a deserted, darkened hallway, possibly with contaminants and/or a deadly lack of oxygen along the way…no? You're sure you don't want to continue? Well, maybe you'd feel differently with ${silver} here. Guess you should've treated ${silver_him} a little better, huh?\n\n\t\t\t\tToo late now. Just be grateful there's time for a new choice. \n\t\t\t\t*goto intricacies_main_branch\n\n\t\t\t#I forge ahead, into the darkness.\n\t\t\t\tStriding confidently, you march down the deserted corridor. It's so black, you might as well be in space. Your blood curdles at the thought. And your breathing feels labored. Hard to say if that's just panic setting in, or if the air in this wing has been compromised by the power outage.\n\n\t\t\t\tYou stop, panting. It's moments like these that you really need a partner—too bad ${silver} will barely speak to you. Maybe you should've treated ${silver_him} a little better, huh? Your head pounds and you sink to your knees. Definitely something wrong with the air here.\n\n\t\t\t\tAnd that's the last thought you have, until a handful of PGPB crewmembers manage to get an oxygen mask on you and take you back to Tweel.\n\t\t\t\t*goto intricacies_fail\n\n\t#I go to the auxiliary power unit.\n\t\tThe auxiliary power unit is a lot closer than the main power grid. Rather than trekking halfway across the station—quite an enterprise in deep space, even for a voyager like yourself—you only need to head down a nearby corridor.\n\n\t\tOf course, standing in front of the unit is a different matter. You tap at a screen and bring up the schematics. Rerouting the Earth Monitoring System through the APU might be a tad harder than you anticipated.\n\t\t*choice\n\t\t\t*selectable_if (relationship_mothman > 50) #I bet Mothman knows! I call him!\n\n\t\t\t\tLuckily, your communicator is attached to an outside system; you can't place calls within the space station itself, but you can contact those on the outside. Soon enough, Mothman's raspy voices fills your ears. \"Yes?\"\n\n\t\t\t\t\"What do you know about circuitry?\" \n\n\t\t\t\t\"Some.\"\n\n\t\t\t\t*if observation > 60\t\t\t\t\t\n\t\t\t\t\tHe talks you through it. Some of the steps seem a little odd, not what you would do. You pause. \"Are you sure this is right?\"\n\n\t\t\t\t\t\"Yes.\"\n\n\t\t\t\t\tYou're not sure, so you freeze, paralyzed by indecision. You wait too long—and suddenly there's a sizzling sound and an explosion that sends you pitching to your feet. You knew it! Mothman led you astray. The nerve of him—you might want to think twice before taking his advice again!\n\t\t\t\t\t*set relationship_mothman %-30\n\t\t\t\t\t*goto mothman_obs_bridge\t\n\t\t\t\t\n\t\t\t\t*else\n\t\t\t\t\tHe talks you through it. Some of the steps seem a little odd, not what you would do. But you trust Mothman. As you work through his instructions, there's a sudden sizzling sound and an explosion that sends you pitching to your feet. You must have messed something up!\n\t\t\t\t\t*goto mothman_obs_bridge\n\n\t\t\t\t*label mothman_obs_bridge\n\t\t\t\tTweel's voice comes over the auxiliary comm line. \"${name}? After that, I'm dropping your Clearance Level.\"\n\t\t\t\t\n\t\t\t\t*set clearance -3\n\t\t\t\t*goto intricacies_fail\n\n\t\t\t#I will test every circuit, even if it takes forever.\n\t\t\t\t*if resolve > 50\n\t\t\t\t\tYou know that elsewhere on the station, engineers are scrambling to fix the outage. Their efforts will buy you some time—the rest is up to you. Your high resolve is essential here. Gritting your teeth in intense concentration, you work through the circuits quickly, but methodically. \n\t\t\t\t\t*goto power_on_one\n\t\t\t\t\n\t\t\t\t*else\n\t\t\t\t\tTesting each circuit is hard, and you're not exactly the patient type. As you see the \"Earth Monitoring System Offline\" message pop up again and again, you grow increasingly frustrated. Frustration can lead to mistakes, a fact you fail to consider as you hurriedly try yet another combination of wires and drivers.\n\t\t\t\t\t*goto power_fail_one\n\n\t\t\t#We covered auxiliary power units at the Academy! I have the notes on my communicator!\n\t\t\t\t*if rule_bender \u003c 40\n\t\t\t\t\tWow! It's a good thing you were so diligent in your studies. Since you always played by the rules, you took very thorough notes and made sure to back them up in multiple locations. And you're not smug about it at all, are you? Glancing through your notes, you carefully hook up the Earth Monitoring System to the alternate power grid. \n\t\t\t\t\t*goto power_on_one\n\n\t\t\t\t*else\n\t\t\t\t\tWell, you have some notes. Conventional note-taking wasn't really your modus operandi at the Academy. Mischief, yes. Studying, not so much. You'll just have to trust your luck and instinct on this one.\n\t\t\t\t\t*goto rule_bender_grid\n\n\t\t\t#It's hammer time.\n\t\t\t\t*if combat > 65\n\t\t\t\t\tOnce you lay your hands on a blunt object, you always feel better. Comes with your combat experience, you suppose. Thanks to the PGPB implants, you lived through the age when most technology could be fixed with a sharp slap or kick. Apparently, some things don't change.\n\n\t\t\t\t\tYou hope. Here goes nothing!\n\t\t\t\t\t*goto power_on_one\n\n\t\t\t\t*else\n\t\t\t\t\tA frustrated cry bursts from your lips. Maybe this isn't the best idea, but—\n\n\t\t\t\t\tOops. Too late.\n\t\t\t\t\t*goto power_fail_one\n\n\t#I'll remain here and help Tweel.\n\t\tYou smile at Tweel. Despite everything, she is your Commissioner, and you will not abandon her at a time like this. When you tell her so, she offers a tight smile. \"Glad to hear it, ${name}.\"\n\n\t\tAnd so, for now, you've thrown your lot in with the PGPB. Good thing that it looks like Tweel still respects you!\n\t\t*set justice %+20\n\t\t*set relationship_tweel %+20\n\t\t*set rule_bender %-20\n\n\t\t\"Now, ${name},\" Tweel says, glancing around her office. \"What am I going to do with you?\"\n\n\t\tIt takes you a second to realize that it's not a rhetorical question. She's really asking you.\n\n\t\t*choice\n\t\t\t#\"I'll help direct the engineers over the comm line.\"\n\t\t\t\tIt's a trying task. The engineers are a flighty bunch. Very, very clever, certainly—they just tend to wander off into their own thoughts and miss your instructions. The scratchiness of the auxiliary comm lines doesn't help matters either. Not to mention, the files for the station's power systems are so dense, you're certain your eyesight is worsening with every line you read.\n\n\t\t\t\t*if resolve > 60\n\t\t\t\t\tBut you are resolved. Patiently, you look up figures and repeat them ad nauseam. Finally, a shudder runs through the station….\n\t\t\t\t\t*goto power_on_two\n\n\t\t\t\t*else\n\t\t\t\t\tIt's too much. You push away from Tweel's desk with a sigh, rubbing your eyes. \"What's the next sequence?\" an engineer whines in your ear.\n\n\t\t\t\t\tYou try to focus. \"RYCBAR123\"\n\t\t\t\t\t*goto power_fail_two\n\n\t\t\t#\"I'll try to enter the system from your console.\"\n\t\t\t\t*if observation > 60\n\t\t\t\t\tWhen you first joined the PGPB, fresh from a life of horse-drawn carriages and steam-powered ships, you thought there was nothing Tweel's magic desk couldn't do. You've learned over the years. More importantly, you've watched.\n\n\t\t\t\t\tThere was a subroutine you noticed the IT crew use once before. That power outage wasn't as extensive as this one is, but the principle ought to be the same…right?\n\t\t\t\t\t*goto power_on_two\n\n\t\t\t\t*else\n\t\t\t\t\tThe moment you sit at Tweel's console, you realize you've made a mistake. It's a lot more complex than you remember. There definitely weren't that many buttons and icons before!\n\n\t\t\t\t\tStill, you kind-of-sort-of vaguely remember a subroutine the IT crew used once before. That power outage wasn't as bad…and you think you got the gist of it. Right?\n\t\t\t\t\t*goto power_fail_two\n\n\t\t\t#\"I'll start contacting other PGPB offices for assistance.\"\n\t\t\t\t*if rule_bender \u003c 50\n\t\t\t\t\tYour communicator still connects to outside lines, just nothing within the station. Because you follow protocol, you have a list of contacts and procedures. While Tweel talks the engineers through the process of rewiring the station, you calmly and efficiently alert other offices that the Earth Monitoring System is offline. They agree to pick up the slack, and offer more technical advice.\n\t\n\t\t\t\t\tBy the time you set your communicator down, you can't help a smug smile.\n\t\t\t\t\t*goto power_on_two\n\n\t\t\t\t*else\n\t\t\t\t\tYour communicator still connects to outside lines, just nothing within the station. Because you follow protocol, you have a list of contacts and procedures…only, wait, when have you ever followed protocol? You wiped most of those numbers ages ago to make room for other, more interesting things.\n\n\t\t\t\t\tSo while Tweel talks the engineers through the process of rewiring the station, you struggle to make contact with the appropriate offices.\n\n\t\t\t\t\t\"Have you reached anyone yet, ${name}?\" Tweel asks. \"We need technical advice, if nothing else.\"\n\n\t\t\t\t\t\"Ummm…\"\n\t\t\t\t\t*goto power_fail_two\n\n\t\t*label power_on_two\n\t\tThe station hums, the floor vibrating beneath your feet. You catch sight of ${silver} crouching, braced against the juddering. Then the hum fades away. Lights flicker on, and the one for the Earth Monitoring System glows green.\n\n\t\tTweel nods. \"Excellent work, ${name}. I'm very pleased with you.\"\n\t\t*goto intricacies_win\n\n\t\t*label power_fail_two\n\t\tThere is a very ominous zap. And then the auxiliary system blows as well.\n\n\t\t\"${name}!\" Tweel cries. \"I thought you knew what you were doing!\"\n\n\t\t\"Well…\"\n\n\t\tThe engineers get the auxiliary lines running again shortly, but Tweel isn't pleased with you. Not at all.\n\t\t*goto intricacies_fail\n\n\t\t*label intricacies_win\n\t\t*set clearance +5\n\t\t*set relationship_tweel %+10\n\t\tWith the darkness dispelled, Tweel's office seems to positively glow. She can't smile, because she has a beak, but warmth shines through her eyes. \"You did very well. Because of your actions, we were able to get the Earth Monitoring Systems back online, just in time to see…\"\n\n\t\t\"What?\" ${silver} asks.\n\n\t\t\"A warp gate, activating in Loch Ness.\" Tweel shakes her head. \"Nessie is a crafty one—not crafty enough to keep herself out of trouble, but evidently crafty enough to fool the two of you.\" As ${silver} looks crestfallen, Tweel raises a claw. \"I'm not blaming you. She's tricked far better agents before.\"\n\n\t\t\"Hey!\" you start to protest, but Tweel cuts you off.\n\n\t\t\"You needed a new lead in your case. Here it is. Besides, it looks like the power outage itself was caused by a signal emanating from the vicinity of Loch Ness. The Earth Monitoring System was offline long enough that we don't know whether only one warp gate activated, or if any ships managed to get inside our perimeter around Earth.\" She points to the door. \"Go back to Loch Ness. I expect this smuggling ring disbanded and in our holding cells by the time you return here.\"\n\t\t*finish\n\n\t\t*label intricacies_fail\n\t\tIt takes a very long time for the station to return to normal. Countless engineers work as fast as their various appendages will let them, but you're aware of every second. Mostly because Tweel is glaring at you.\n\n\t\t\"It looks like the power outage itself was caused by a signal emanating from the vicinity of Loch Ness. The Earth Monitoring System was offline too long. Illegal ships may have managed to get inside our perimeter around Earth.\"\n\t\n\t\t\"If you were planning a jailbreak,\" ${silver} says softly, \"this would be a good way to start.\"\n\n\t\tYou stare out the window, drumming your fingers on the combination fused-silica/borosilicate glass. \"I think we should return to Loch Ness.\"\n\n\t\tTweel raises a feathery eyebrow. \"Oh?\"\n\n\t\t\"I don't trust Nessie,\" you say. \"Everything started going wrong after we talked to her.\"\n\n\t\t${silver} nods. \"You're right. Commissioner, I'll go too.\" Smiling, ${silver_she} turns to you and adds, \"Someone has to keep an eye on you.\"\n\n\t\t\"Very well.\" Tweel shakes her head. \"I'm giving you a slightly lower Clearance Level, though. This power outage hit us hard.\"\n\n\t\tAnd so back to Scotland you go! \n\t\t*set clearance -2\n\t\t*finish", "lochness": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Yeti's Parole Officer[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\nIt's been a while since you were last in Scotland. A light dusting of snow streaks the hills around Loch Ness. The loch itself looks like polished stone, reflecting the grey sky above. It wasn't all that long ago that you'd use any trips to the Highlands as an excuse to travel through the UK, visiting some of your old haunts. You've stopped doing that, though. It's depressing to see how much has changed.\n\nNow, if you were an illegal, off-grid warp gate being used to smuggle contraband through Spheron to distant corners of the galaxy, where would you be?\n*page_break Let's Find Out\n\nAs you stand on the frosty shore, scrutinizing the hills' contours for any irregularities, scraps of paper gust along the ground. You pick one up.\n\nNESSIE-HUNTING TOURS!\n\nMONSTER WATCHING! FIND THE BEAST!\n\nLEVIATHAN OF THE LOCH!\n*page_break Fantastic\n\nNessie holds one of the longest sentences of the exiles to Earth. She's been here since 565 CE, along with her partner-in-crime, the Cadborosaurus. But unlike him, she hasn't exactly kept a low profile. Even in her grifting days, she liked the spotlight. \n\nIt's all right, though. Getting people to debate the possible existence of a monster is a lot safer for the PGPB than letting them think about aliens.\n*page_break\n\nTime for some preliminary investigations. Maybe you should get out on the water and arrange a meeting with Nessie now. Then again, those goods are coming overland at some point. It may be better to explore the surrounding area first. What do you think?\n\n*label investigating_nessie\n*choice\n\t#I row out on the loch. Maybe I can spot Nessie with my eagle eyes. \n\t\tIf nothing else, Loch Ness has a thriving trade, albeit one totally different from the tourists on Spheron. Kids run through the surf, screaming to each other about monsters and ice cream. Tired parents walk behind, while dedicated monster hunters take to the loch with high-tech cameras in tow.\n\t\t\n\t\tYou feel as tired as the parents as you approach a small boathouse on the far side. They take Earth currency, so you fish out a few pounds and lay down a fake set of keys as your deposit. \n\n\t\tWhich boat do you want?\n\t\t*fake_choice\n\t\t\t#The blue one!\n\t\t\t#The white one!\n\t\t\t#The one with a red stripe!\n\t\t\t#The wee green one!\n\n\t\tExcellent choice! You're looking awfully sharp, ${name}. With considerable effort, you shove the boat into the water and clamber in. \n\n\t\tAnd you thought standing on the shore was chilly. There's more wind on the loch. You're wearing a decent jacket, but the wind still cuts right through. You shiver, arms burning with exhaustion. It occurs to you that the last time you slept was in Kathmandu. \n\n\t\tYou've been running a long, long time.\n\n\t\tThe other boaters attract your attention. When they get tired, they can retreat to the shore, hole up with some fish and chips somewhere. Relegate monsters to myth.\n\n\t\tWhat is this strange heartache you're feeling?\n\t\t*page_break \n\n\t\t*if observation > 60 \n\t\t\tAll right, enough bellyaching. You peer into the water. At first, you can hardly see anything, but you wait patiently. \n\n\t\t\tThere. Just a slight shadow, easy to miss. But you know: she's down there, waiting for you.\n\t\t\t*page_break \n\t\t\n\t\t\tYou pull an LDC—a Long Distance Communicator—from your pack. The actual unit is a flat, silver disc about the size of your palm. You sync it with your main communicator, adjust its auto-return settings, and chuck it into the loch.\n\n\t\t\tRipples spread across the loch's surface. The disc flips end-over-end as it descends to the depths of the loch.\n\n\t\t\t*label ldc\n\t\t\tAfter a few minutes, you speak into your communicator.\n\t\t\t*fake_choice\n\t\t\t\t# \"Here, Nessie, Nessie, Nessie….\"\n\t\t\t\t# \"This is Liaising Agent ${name}. Respond immediately.\"\n\t\t\t\t# \"Nessie, I've got neeps'n'tatties for you!\"\n\t\t\t\t# \"Come on, Nessie. I feel unloved.\"\n\t\t\tThe communicator beams your voice down through the waters, where it's picked up and broadcast through the LDC. From there, the sound waves roll through the water.\n\n\t\t\tJust as you're getting annoyed, Nessie's sultry voice comes through the communicator. \"${name}, darling, is that you?\"\n\n\t\t\tEasy, there. \"Yes. Nessie, we need to talk.\"\n\t\t\t*page_break\n\n\t\t\t\"Oh, darling, must we? I've been quite well-behaved, you know…and if I came up now, why, the humans would see!\"\n \n\t\t\t\"That doesn't usually bother you, Nessie.\" You shake your head, even though she (probably) can't see you. \"The usual inlet, the usual time.\"\n\t\n\t\t\t\"Two in the morning? Why, dear ${name}, you'll be ever so tired!\"\n\n\t\t\t\"I'll live.\"\n\n\t\t\tAnd maybe you can finally catch a break.\n\t\t\t*goto fish_chips \n\n\t\t*else\n\t\t\tAll right, enough bellyaching. You peer into the loch, but there's nothing there. Nothing that even remotely resembles the monster. After a few miserable hours hunched over the sides of the boat, peering into the loch, you're forced to admit defeat. \n\n\t\t\tYou're freezing and starving. Time for the nearest pub.\n\t\t\t*goto cat_and_thistle\n\n\t#I hit the tourist traps. It'll take some patience, but I can handle it with my firm resolve. \n\t\tBack in 565 CE, Loch Ness was probably little more than forests and rolling countryside. Isolated, rugged, the perfect place to stash a misbehaving grifter. At least, it was perfect until the 1930s, when Nessie realized that she liked the notoriety brought by radio and photography.\n\n\t\tOver the years, tourist shops have sprung up. Nessie figurines and stuffed animals fill the windows; tartan umbrellas and Loch Ness napkin rings spill onto the streets. \n\t\t*page_break Tartan Umbrellas?\n\n\t\tYou seize one of the umbrellas. It's got a thick red handle and a distinctive pattern—it's identical to some umbrellas you spotted on Spheron. Poking around the shop, you find some more familiar goods: salt cellars, a plaid hot bottle, some stationary sets…\n\n\t\t…and stashed away in the corner, some glow-in-the-dark watches.\n\t\t*page_break Seriously? Seriously?\n\t\t\n\t\t*if resolve > 60\n\t\t\tYou swallow your anger. Something's fishy here, and it isn't just the loch. You leave the shops and head back to the shore. You pull an LDC—a Long Distance Communicator—from your pack. The actual unit is a flat, silver disc about the size of your palm. You sync it with your main communicator, adjust its auto-return settings, and chuck it into the loch.\n\n\t\t\tRipples spread across the loch's surface as it vanishes from view.\n\t\t\t*goto ldc\n\n\t\t*else\n\t\t\t\"Can I help you?\"\n\n\t\t\tYou whirl around. The shop assistant is looking at you curiously, pushing her glasses up her nose. \"Uh, uh,\" you stammer. Quick, grab a knickknack! \"I'll take a…\"\n\n\t\t\t*fake_choice\n\t\t\t\t# \"Nessie tea towel!\"\n\t\t\t\t# \"Loch Ness lolly!\"\n\t\t\t\t# \"Beautiful Landscapes calendar!\"\n\t\t\t\t# \"Sporran spoon!\"\n\t\t\tThe shopkeeper raises her eyebrows, but rings you up. \"Ach, and you have a good day, now,\" she says, handing you the bag. \n\n\t\t\tBlushing furiously, you take the bag and practically sprint from the shops. Striding down the street, you thrust your ill-advised souvenir into the hands of a young couple. Then, you survey the street. You should ask if there have been other monster sightings. \n\t\t\t*page_break To The Pub\n\n\t\t\t*label cat_and_thistle\n\t\t\tSure, you've been hopping from pub to pub all day long, but duty calls. The Cat and Thistle isn't too far. It's been a favorite of yours since it opened just after the First World War. Warm wooden walls and plush booths welcome you. Some people crowd around the bar, while tourists pack the booths and tables. There's also a spirited group of men chatting by a television screen in the corner.\n\t\t\t*achieve pubs\n\t\t\t*label pubchoices\n\t\t\t*choice\n\t\t\t\t*disable_reuse #I stealthily eavesdrop at the bar.\n\t\t\t\t\tSince you're running on adrenaline and not much else, you order a strong black coffee and sip it at the bar. The locals converse amongst themselves; you just try to look inconspicuous.\n\t\t\t\t\t*if stealth > 60\n\t\t\t\t\t\tIt works. There's all the usual gossip about who fancies whom, but then they turn to other matters. \"I can't think on it,\" one's saying. \"I'm off 'round to my gran's last night, and sure but I'm seeing a right beastie!\"\n\n\t\t\t\t\t\t\"Don't be daft, man!\" Another young man shakes his head. \"You were jaked, that's all. Down in your cups.\"\n\n\t\t\t\t\t\t\"No, it was a dog, like, if the Divvil took a dog, chewed 'im, and spit 'im back.\"\n\n\t\t\t\t\t\tYou slam the rest of your coffee back. That sounds like a chupacabra. You need to find Nessie.\n\t\t\t\t\t\t*goto nessie_talk_one\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe young men turn on you. \"Eh, what's this, then?\" one shouts. \"Listenin' in on us? Clear off!\"\n\t\n\t\t\t\t\t\tThey're civilians, and they're your own people. You can't do much but take your coffee elsewhere.\n\t\t\t\t\t\t*goto pubchoices\n\n\t\t\t\t*disable_reuse #I use my observation skills to check with the tourists.\n\t\t\t\t\tYou settle yourself at a table that's surrounded on all sides. To an outsider, it looks like you're staring at the glossy menu in your hands. Really, you're listening as hard as you can.\n\t\t\t\t\t*if (observation > 60) and (resolve > 50)\n\t\t\t\t\t\tA little girl the next table over is chatting animatedly to her grandmother. \"And then, Jack said he saw a dog, only it was a really gross dog! It only had a little bit of fur and long teeth like it was smiling at him, but it was a creepy smile!\"\n\n\t\t\t\t\t\tYour grip tightens on the menu. That sounds like a chupacabra. But what is a chupacabra doing here, and why is it talking to Nessie?\n\n\t\t\t\t\t\tYou've heard enough. Time to find your monster.\n\t\t\t\t\t\t*goto nessie_talk_one\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe conversation in the pub swells around you. You do your best to pay attention, but it's hard to hear. Besides, a nice young server keeps bobbing at your elbow, asking if you've decided yet. You stab blindly at some peas, but it's clear that you're not getting any information this way. Try again!\n\t\t\t\t\t\t*goto pubchoices\n\n\t\t\t\t#I've been away from Scotland for a while. I should check the TV for news.\n\t\t\t\t\tYou drift over to the television. Once, it would have astounded you. Now, it's completely pedestrian. Laughable even, after what the PGPB has shown you.\n\n\t\t\t\t\tThere's that uncomfortable feeling in the pit of your stomach again. You don't really belong anywhere, do you?\n\t\t\t\t\t*page_break Huzzah For Self-Pity\n\n\t\t\t\t\tYou peer over the shoulders of the young men and women around the set. The scrolling news reel at the bottom shows mostly sports- and weather-related news. Nothing about Nessie. Nothing about other aliens. The most interesting thing is a passing mention of a possibly rabid dog sighted several towns over.\n\n\t\t\t\t\tTime to talk to the old dame herself. \n\t\t\t\t\t*goto nessie_talk_one\n\n\t\t\t\t*disable_reuse #Forget this, I need a drink!\n\t\t\t\t\tHey! Wait a second! What about that drink on Spheron? What will Tweel think if you pass out on the job? \n\t\t\t\t\t*goto pubchoices\n\n\t#I bike the paths around the loch. Rough terrain doesn't scare me; I'm tough. \n\t\t*set combat %+10\n\t\tWell, after all of that fighting, stalking, and piloting, you could sure use some exercise! There are a number of paths around the loch; if Nessie's consorting with other aliens, you may be able to find evidence there.\n\n\t\tThere is a small bike rental not too far away. The owner, Jock, is nice enough. You knew his grandfather when he was a boy, some seventy years ago now. At that thought, you wince. Thanks to the nanotechnology residing in your body, time doesn't hold the same meaning for you that it does for the rest of your species.\n \n\t\tBut hey, look! There are the bikes! Which one do you want?\n\t\t*fake_choice\n\t\t\t#The mountain bike!\n\t\t\t#The bike with a flower basket!\n\t\t\t#The red one!\n\t\t\t#The quaint old-fashioned one!\n\t\tGreat choice! You wheel your bike around, pay Jock (you've always thought of him as a kid, but even you see that's no longer the case), and then cycle down the road.\n\t\t*page_break Pedal Pedal Pedal\n\n\t\tAs soon as the wind hits your face, you're glad you chose this. Yes, it is Scotland in February, which means that it's freezing, and also that you're very, very careful of ice patches on the paths. But the ground is pretty packed down, and besides, this makes you feel normal, riding a bike like any other human being.\n\n\t\tYou pass a lot of people on day trips. They captivate you. Nearly every face turns towards the loch at one point or another. Not just taking in the lake's beauty or admiring Urquhart Castle across the way, either. No, they're hoping—desperately, in some cases—for a sign of Nessie.\n\n\t\tIt makes you ache a little. You always loved the fantastic, and getting the chance to work with such strange creatures once seemed like a dream come true. Here's the problem, though: when you add in the badge, the rules, the regulations…it drains some of that magic out. What would it be like, just working and living with the aliens without the omnipresent PGPB breathing down your neck?\n\t\t*page_break Hmmmm\n\n\t\tThere is a bit where the road comes quite near the loch and then flattens out. You hop off your bike and lock it to a section of fencing. Then you pull an LDC—a Long Distance Communicator—from your pack. The actual unit is a flat, silver disc about the size of your palm. You sync it with your main communicator, adjust its auto-return settings, and chuck it into the loch.\n\t\t\n\t\tRipples spread across the loch's surface. You wait. Give the disc a chance to acclimate….\n\t\t*goto ldc\n\n\t*disable_reuse #I rent a small plane.\n\t\tOh, you're adorable. This kind of case requires an agent on the ground—how will you see anything worthwhile from so far away? Give this a second thought.\n\t\t*goto investigating_nessie\n\n*label nessie_talk_one\nThis whole situation requires a face-to-face meeting with Nessie. But you can just imagine the chaos that would ensure if you casually chat with her in broad daylight. Passing her off as a boat wake or line of birds would get a bit complicated.\n\nYou goal right now is to establish a rendezvous for later tonight, when you can use the cover of darkness. Strolling along the shoreline, you pull an LDC—a Long Distance Communicator—from your pack. The actual unit is a flat, silver disc about the size of your palm. You sync it with your main communicator, adjust its auto-return settings, and chuck it into the loch.\n\nRipples spread across the loch's surface. You wait. Give the disc a chance to acclimate….\n*goto ldc\n\n*label fish_chips\nAfter all of this, you are starving. You head straight to the nearest fish and chips place—it's a tiny canteen saturated with the delicious, delicious smell of oil. Accepting the newspaper-wrapped bundle is a beautiful moment that almost brings tears to your eyes. You stand at a counter by the window, wolfing it down.\n\nThere's a tap on your shoulder. \"Excuse me—do the Perseids peak tonight?\"\n\nYou stiffen. The Perseid meteor shower isn't until August. It's a code the PGPB uses when agents meet in the field. Swallowing hastily, you give the correct answer: \"Sometime around midnight.\"\n*page_break\n\nThere's no gasp, no sign of surprise. Someone slides onto the stool next to you. Fairly tall, coppery hair, bright blue eyes. You should have known. There aren't many human PGPB Liaising Agents, and there's only one person this could be: Agent Silver, ${silver} Silver. \n\n*label silver_smirk\n${silver} shoots you a smirk. \"Well, well, Agent ${name}. Fancy meeting you here.\"\n\nYou shrug in a noncommittal manner and add more malt vinegar to your fish and chips. \"What do you want, ${silve
