<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yeti's Parole Officer — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "yeti", "title": "Yeti's Parole Officer", "scenes": {"choicescript_description": "The Yeti, Loch Ness Monster, Chupacabra, and Mothman are aliens, sentenced to prison on Earth by the Pan-Galactic Prisons Bureau. As the Yeti's parole officer, you must defend the galaxy from these convicts, unravel their criminal conspiracy, and bring them to justice!\n\n\"Yeti's Parole Officer\" is a hilarious interactive sci-fi novel by KT Bryski, where your choices control the story. It's entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\nAs an officer of pan-galactic law, you'll travel around the world to wipe all memory of alien activity on Earth, battling extaterrestrial smugglers and rival PGPB agents alike to save the world from nefarious cryptids.\n\nWill you play as male or female? Gay or straight? Will you throw the book at the alien scofflaws messing with your planet, or will you betray your allies for personal gain? The choice is yours!\n", "choicescript_stats": "*stat_chart\n\ttext Name\n\ttext Clearance\n\ttext Cash\n\tpercent Resolve \n\tpercent Persuasion \n\tpercent Combat \n\tpercent Stealth \n\tpercent Observation \n\topposed_pair Justice\n\t\tMercy\n\topposed_pair rule_bender \n\t\tRule Bender\n\t\tBy the Book\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 10[/b]\n  \n  Unlock chapters 4 through 10, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 10[/b]\n  \n  You've paid to unlock chapters 4 through 10.\n", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "endgame": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Yeti's Parole Officer[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\nBy the time you reach Texas, you're trembling. After everything—crisscrossing the galaxy, your time with ${silver}, dealing with countless aliens—it's all come down to this. Hefting your stunner, you set off across the dusty mesa. In the distance, hills form a dark, jagged line against the indigo sky. A hot wind rolls across the baked earth. It brings no relief from the heat, barely stirs the dust. Your boots crush the thorny brush as you weave between rocky outcroppings.\n\n*if (silver_dead = true) and (silver_date = true)\n\tEvery sight brings heart-wrenching memories of ${silver}. You loved ${silver_him}. Despite your better judgment, perhaps, you were starting to imagine a life together, a life beyond the PGPB. It would've worked. You both could have been free—free to be with each other, free of the organization that has left the galaxy broken, not protected. The guilt is inescapable. In your mind's eye, you see ${silver_him} still—the adorable twist to ${silver_his} smile, the way ${silver_his} eyes sparkled vivid blue.\n\n\tAll of that is gone now, forever. It's a crushing thought. \n\n\tSuddenly, your communicator buzzes.\n\t*set resolve %-10\n\t*goto endgame_tweel_calling\n\n*elseif (silver_dead = true)\n\tEvery sight brings uncomfortable memories of ${silver}. You [i]don't[/i] lose your partner. Either you both come back, or neither of you do. The guilt is inescapable. In your mind's eye, you see ${silver_him} still—the constant furrow in ${silver_his} brow, the stiff way ${silver_she} held ${silver_him}self. Still. Maybe it was your imagination, but you thought ${silver_she} was starting to loosen up around you.\n\n\tYou'll never know now. It's a crushing thought. \n\n\tSuddenly, your communicator buzzes.\n\t*set resolve %-10\n\t*goto endgame_tweel_calling\n\n*else\n\tAfter spending so much time with ${silver}, it does feel strange being on your own. You keep expecting a comment from ${silver_him}, something to keep you on track. If nothing else, ${silver_she} did keep you focused!\n\t*if (turncoat = true)\n\t\tBut honestly, you feel freer than you have in ages. Leaving the PGPB was absolutely the right choice; you'll never have to hear Tweel's acid voice again….\n\n\t\tAs if on cue, your communicator buzzes.\n\t\t*set rule_bender %+10\n\t\t*goto endgame_tweel_calling\n\n\t*else \n\t\t\"Soon,\" you tell yourself. You just need to bring the Jackalope to justice, wrap up this last bit of business, and then, you and ${silver} are due for some time off. Drinks on a beach somewhere. \n\n\t\tSuddenly, your communicator buzzes.\n\t\t*set resolve %+10\n\t\t*goto endgame_tweel_calling\n\n*label endgame_tweel_calling\nIt's Tweel. You hesitate before answering. \"Hello?\"\n\n\"${name}, we hadn't heard any updates from you or ${silver}. What is your status?\"\n\n*if (silver_dead = true) or (turncoat = true)\n\tUh-oh. How to handle this?\n\n\t*choice\n\t\t#I lie and tell her everything is just dandy.\n\t\t\t*if persuasion > 70\n\t\t\t\t*label searching_loch_smoothly\n\t\t\t\t\"We're still searching the loch,\" you say smoothly. \"Visibility is only about a meter, and our scanners are malfunctioning; ${silver} thinks our ship's circuits were damaged by the power outage back on HQ.\"\n\n\t\t\t\t\"Let me speak to ${silver}.\"\n\n\t\t\t\t\"Sorry, but ${silver_she} is dealing with some really delicate wiring right now. I'll have ${silver_him} call you back as soon as ${silver_she} can.\"\n\n\t\t\t\tYou hang up before Tweel can ask any more questions. Whew, that was a close one!\n\t\t\t\t*goto find_jack\n\n\t\t\t*else\n\t\t\t\t\"Uh…\" You clear your throat. \"Uh, we're okay.\"\n\n\t\t\t\t\"Okay?\" Instantly, you hear the shift in Tweel's voice. \"Get me ${silver}.\"\n\n\t\t\t\t\"Erm…${silver_she} is busy.\" \n\n\t\t\t\t\"That's it. I'm sending a team after you. Let me triangulate your position….\" A pause. \"You're in Texas.\"\n\n\t\t\t\t\"Uh…\"\n\n\t\t\t\t\"${name}, what is going on?\"\n\n\t\t\t\tWith shaking fingers, you disconnect the call. You know what will happen now. She will send a team. Not to assist, but to apprehend. They know you've gone rogue. \n\n\t\t\t\tYou need to find the Jackalope before the PGPB finds you.\n\t\t\t\t*set incompetent true\n\t\t\t\t*goto find_jack\n\n\t\t#I fake getting attacked by aliens—gotta go!\n\t\t\t*if stealth > 70\n\t\t\t\tStunts like this require a certain amount of acting talent. You prattle on for a few moments, and then freeze with a sharp intake of breath.\n\t\t\t\n\t\t\t\t\"What is it?\" Tweel asks.\n\n\t\t\t\t\"We're under attack,\" you say, in a hushed voice. \"I'll be in touch!\"\n\n\t\t\t\tYou hang up. That's bought you some time, at least. Now, to find the Jackalope. \n\t\t\t\t*goto find_jack\n\n\t\t\t*else\n\t\t\t\t\"Gah!\" you cry. \"We're under attack!\"\n\n\t\t\t\t\"What? Why don't I hear anything?\"\n\n\t\t\t\t\"Uh…\" With shaking fingers, you disconnect the call. You know what will happen now. She will send a team. Not to assist, but to apprehend. They know you've gone rogue. \n\n\t\t\t\tYou need to find the Jackalope before the PGPB finds you.\n\t\t\t\t*set incompetent true\n\t\t\t\t*goto find_jack\n\n\t\t*if (turncoat = true) #I declare my new allegiance to the Jackalope.\n\t\t\t\"Honestly?\" you begin, and then you throw all caution to the winds. \"It's over, Tweel.\"\n\n\t\t\t\"What?\"\n\n\t\t\t\"It's over. You've pushed me around for too long. You don't see the harm the PGPB is doing. I'm defecting.\"\n\n\t\t\t\"${name}…\" Tweel laughs nervously. \"You can't be serious.\"\n\n\t\t\t\"Dead serious.\" You blink against the harsh sunlight. \"We're finished.\"\n\n\t\t\tSilence falls. When Tweel next speaks, her voice is ice-cold. \"I see. Consider yourself under arrest. The retrieval team is on its way.\"\n\n\t\t\tYou laugh as you hang up. The Jackalope will protect you—if you can get to her in time.\n\t\t\t*set resolve %+10\n\t\t\t*goto find_jack\n\n\t\t*if (silver_dead = true) #I admit that ${silver} is dead.\n\t\t\t\"Tweel,\" you say softly. \"I have something to tell you. ${silver} is dead.\"\n\n\t\t\tTweel doesn't answer.\n\n\t\t\t\"Commissioner?\"\n\n\t\t\t\"You're mistaken,\" Tweel says at last. \"You're joking. You humans don't understand when to be serious, that's all….\"\n\n\t\t\t\"I wish I was, Tweel, but ${silver_she} really is dead.\"\n\n\t\t\t\"But ${silver_she} was one of my agents.\" Tweel sounds lost. \"My agents always come home.\"\n\n\t\t\tYou don't know what to say.\n\n\t\t\t\"Who killed ${silver_him}?\" Tweel demands suddenly. \"Whoever it was, you have my permission to do anything. Anything.\"\n\n\t\t\tAs you hang up, you glance towards the horizon. Ominous clouds are rolling in. \n\n\t\t\tTime to move on.\n\t\t\t*set resolve %+15\n\t\t\t*goto find_jack\n\n\t\t#I smash my communicator. Let's see her talk to me then!\n\t\t\tWithout even answering, you grip the communicator tightly. There's a trick to this—you need to destroy it completely in one blow, or else it will emit a distress signal, leading Tweel right to you.\n\n\t\t\t*if combat > 70\n\t\t\t\tCommunicators are built to be resilient, but you are built like a tank. You smash the device against the stones. It splinters into countless tiny fragments. You hold your breath.\n\n\t\t\t\tAnd there is only the hot wind through the scrubland.\n\n\t\t\t\tSlowly, you exhale. You did it. Tweel will grow suspicious when neither you nor ${silver} responds to her calls, but for now, you are safe. Now, you just need to find the Jackalope.\n\t\t\t\t*goto find_jack\n\n\t\t\t*else\n\t\t\t\tYou throw the device down. There's an audible crack, but then it goes bouncing away over the stones. You drop to your knees, scrambling to pick it up. An unholy screeching fills the air. You jab at the communicator frantically, but the sound continues until you beat the device into silence with a heavy rock. \n\n\t\t\t\tIt's too late. The PGPB has already received the distress call, and they'll know your position any moment now. They will know that you are not in Scotland. There are only two things to do now.\n\n\t\t\t\tRun. \n\n\t\t\t\tAnd find the Jackalope.\n\t\t\t\t*set incompetent true\t\t\n\t\t\t\t*goto find_jack\n\n*else\n\tUh-oh. How to handle this?\n\n\t*choice\n\t\t#I lie; I don't want her knowing I messed up.\n\t\t\t*if persuasion > 70\n\t\t\t\t*goto searching_loch_smoothly\n\n\t\t\t*else\n\t\t\t\t\"Uh, we're fine,\" you say. \n\t\n\t\t\t\t\"Really? Have you found the warp gate yet?\"\n\t\n\t\t\t\t\"Yes.\" Well, that's not a lie, at least.\n\t\n\t\t\t\t\"Agent ${name}, I'm troubled. I'm sending in a crew to assist you and ${silver}.\"\n\n\t\t\t\tSo, she hasn't found out about ${silver} yet. But when she finds out you're in Texas, things will just get worse. Your only hope is to find the Jackalope before she finds you; if you can hand over the boss of the criminal underworld, Tweel will forgive any and all transgressions.\n\n\t\t\t\tYou hope.\n\t\t\t\t*set incompetent true\n\t\t\t\t*goto find_jack\n\n\t\t#I'm in over my head. Forget Tweel's anger; I need help.\n\t\t\t\"Uh, Tweel?\" you whisper. This is going to take a while, so you perch on a flat stone and finally spill the beans about everything that's happened since your transport dipped beneath the waters of Loch Ness.\n\n\t\t\t*if (jailbreak = true)\n\t\t\t\tWhen you reach the part about how the PGPB's exiles have the capacity to escape Earth, you hear Tweel's beak click shut. \"Is this true?\" she asks, in a low, dangerous voice.\n\n\t\t\t\t\"It's technology like we've never seen!\" you say. \"The Jackalope must be a genius!\"\n\n\t\t\t\t\"She is,\" Tweel says grimly. \"This is bad news, Agent ${name}. We will double our security on Earth, but you need to defeat her. Failure is not an option. Failure is grounds for dismissal.\"\n\n\t\t\t\tYou gulp and hang up. One good thing about Tweel: you always know where you stand with her.\n\t\t\t\t*set rule_bender %-10\n\t\t\t\t*set incompetent true\n\t\t\t\t*goto find_jack\n\n\t\t\t*else\n\t\t\t\tWhen you mention that you destroyed the warp gate under Loch Ness, Tweel's relief is audible. \"Thank goodness for small mercies,\" she says. \"But clearly, they have the technology. They can rebuild it. Luckily, you've bought us time—can you defeat the Jackalope?\"\n\n\t\t\t\t\"I'll try.\"\n\n\t\t\t\t\"Don't try, ${name}. Just do it.\"\n\n\t\t\t\tYou gulp and hang up. One good thing about Tweel: you always know where you stand with her.\n\t\t\t\t*set resolve %+10\n\t\t\t\t*goto find_jack\n\n\t\t#Why not be honest? I'm doing my job.\n\t\t\t\"Honestly?\" You barely hesitate as you lope across the dusty mesa. A lizard goes scuttling over the rock as you leap off a stony outcrop. \"The convicts were planning a jailbreak. ${silver} got hurt. I'm hunting the Jackalope. Questions?\"\n\n\t\t\t\"Expect backup as soon as possible.\" But she doesn't sound irritated. If anything, Tweel seems sort of…proud. \"But until they arrive, know this. I may test you at times, but only because I believe you have the makings of a great agent. Prove me right.\"\n\n\t\t\tYou hang up with a grim smile. You certainly intend to.\n\t\t\t*set relationship_tweel %+20\n\t\t\t*goto find_jack\n\n*label find_jack\n*page_break\nYou find the Jackalope's lair just as you remember it from last time. The cave opens like a mouth in the hillside. It looks too small—surely, it's too small—but you grit your teeth and squeeze through, stooping so that your hair just brushes the sandy ceiling. As you scuttle through the cave, you realize how well-constructed it is. In fact, it isn't really a cave at all; the Jackalope has constructed herself a proper underground lair. Thinking of the Yeti's cryptic clue, you wonder if her tunnels stretch all the way to Wyoming.\n\n*if (turncoat = true)\n\tAt first, all seems to be going well. Then, suddenly, you notice a flashing pattern of red lights set into the walls, right near the ceiling. They rapidly wink on and off, and the speed increases as you watch. It unnerves you, and you freeze.\n\n\tThe Jackalope's deep, sultry voice sounds right in your ear. You jump, then realize there's a speaker in the wall behind you.\n\n\t\"So. You made it.\"\n\n\tYou clear your throat. Uncertain if there are cameras about as well, you crane your head surreptitiously. \n\n\tThere's a throaty chuckle from the wall. \"Yes, ${name}, I can see you. I've been watching you for a long, long time.\"\n\t*page_break Well Then\n\n\t\"Oh, really?\" You try to inject some bravado into your voice. \"Why me?\"\n\n\t\"I always thought you had potential.\" The Jackalope's voice drops. \"Now, it's time to see if I'm right.\"\n\n\tYou laugh nervously. \"Well, I'm here, aren't I?\"\n\n\t\"That's a good first step, ${name}. But if you join me, I must be certain of your abilities. Just like your time at the Academy, I must…\" She pauses. \"Test you.\"\n\n\tRumbling fills the small space. You startle. The walls are shaking. Is it an earthquake? No—with a cold rush in your stomach, you realize that the walls are moving in.\n\n\t\"Good luck,\" the Jackalope says.\n\t*choice\n\t\t#I search for a kill switch; she must have included one.\n\t\t\t*if observation > 50\n\t\t\t\t*label kill_switch_win\n\t\t\t\tYou run your fingers over the walls. Smooth, smooth stone—and there, an unnatural indentation. You follow it, and your fingers probe a shallow depression. Most people wouldn't see it, but evidently, you are not most people. You flip open a false section of stone to reveal a bright red button. Gasping, you punch it.\n\n\t\t\t\tThe walls fall still and silent.\n\t\t\t\t*achieve trap\n\t\t\t\t*if (turncoat = false)\n\t\t\t\t\t*goto jack_intruder_win\n\t\t\t\t*else\n\t\t\t\t\t*goto jack_test_win\n\n\t\t\t*else\n\t\t\t\t*label kill_switch_fail\n\t\t\t\tYou run your fingers over the walls. Smooth, smooth stone. Nothing but smoothness. If there's a kill switch, you can't find it. Maybe you've made a mistake; maybe she didn't incorporate one into the design—\n\n\t\t\t\tIt's too late.\n\t\t\t\t*goto wall_crush_death\n\n\t\t#I can talk my way out of this. That's the test, right?\n\t\t\t*if persuasion > 55\n\t\t\t\tYou raise your voice. \"You know, Jackalope, it seems silly to test me like this. You've put a lot of time and effort into watching me, it seems. So really, I've already passed, haven't I? This is just to test how much I trust you not to kill me. And…\" You plant your feet firmly. \"I've passed that already too, haven't I?\"\n\n\t\t\t\tThe walls fall still and silent.\n\t\t\t\t*achieve trap\n\t\t\t\t*goto jack_test_win\n\n\t\t\t*else\n\t\t\t\tYou force a laugh. \"Come on, Jackalope, this isn't funny.\"\n\n\t\t\t\tThe walls move closer.\n\n\t\t\t\t\"Seriously, you can stop now. I'm on your side.\" The walls keep moving. Your voice rises in pitch. \"Jackalope! Please, I'll do anything! Just don't kill me!\"\n\n\t\t\t\tYou shout other things at her, losing track of what's coming out of your mouth, fear prickling across the back of your neck. But it's too late.\n\t\t\t\t*goto wall_crush_death\n\n\t\t#Those walls are awfully close. I run like heck.\n\t\t\t*if combat > 55\n\t\t\t\t*label run_walls_win\n\t\t\t\tYour combat training serves you well here. You sprint, twisting sideways to squeeze through the increasingly narrow gap. As you run down the hall, missiles fire from the walls. It's just like being on a battlefield. You duck, swerve, and leap over a few nasty shots aimed at your feet.\n\n\t\t\t\tAt last, you make it to a clear patch. You swing around, panting.\n\n\t\t\t\tThe walls fall still and silent.\n\t\t\t\t*achieve trap\n\t\t\t\t*if (turncoat = false)\n\t\t\t\t\t*goto jack_intruder_win\n\t\t\t\t*else\n\t\t\t\t\t*goto jack_test_win\n\n\t\t\t*else\n\t\t\t\t*label run_walls_fail\n\t\t\t\tWith no other choice, you run. As you run down the hall, missiles fire from the walls. It's just like being on a battlefield. You wish you were better at combat. Still, you duck and swerve as best you can—\n\n\t\t\t\tBut you don't notice the missiles set near the floor until it's too late. One shot drills straight into your ankle, shattering the bone. You scream and fall to the ground. The walls do not stop their relentless advance.\n\t\t\t\t*goto wall_crush_death\n\n\t*label wall_crush_death\n\tYou squeeze your eyes shut, but that doesn't block the sound. The walls crunch over the stone like grinding bones. It sets your teeth on edge, raises the hairs on the back of your neck. Cold, sick horror settles in your stomach. Is it really ending like this?\n\n\tThere's a chittering noise up ahead. The Jackalope cocks her head, just beyond the walls. \"Well, well,\" she says. \"This is quite a sticky wicket, isn't it?\"\n\n\tRage fuels you. You lunge forward. Not far enough to reach open ground, but enough to wrap your fingers around the Jackalope's leg. You pull her close to you. Her chittering turns to panicked yelping as the walls advance. You clutch her tightly. If you're going down, you're taking her with you.\n\n\tAs the walls near, they drown out the Jackalope's cries. That crunching, grinding sound is the last thing you hear. There's an explosion of white-hot pain—\n\n\tAnd then, you're dead.\n\t*goto ending\n\n\t*label jack_test_win\n\tYou stay still for a few moments, just getting your breath back. It worked. You can't believe you're still alive. The Jackalope's voice comes through the speaker system again.\n\n\t\"Well, ${name}, it seems you've passed. Carry on, then. Come into my chamber….\"\n\n\tSteeling yourself, you obey, striding down the hall and into a round cavern with a low ceiling.\n\t*goto round_cavern\n\n\t*label jack_intruder_win\n\tYou stay still for a few moments, just getting your breath back. It worked. You can't believe you're still alive. But you can't rest on your laurels. You have a job to finish! Steeling yourself, you stride down the hall and into a round cavern with a low ceiling.\n\t*goto round_cavern\n\n*else\n\tAt first, all seems to be going well. Then, suddenly, you notice a flashing pattern of red lights set into the walls, right near the ceiling. They rapidly wink on and off, and the speed increases as you watch. It unnerves you, and you freeze.\n\n\tThe Jackalope's deep, sultry voice sounds right in your ear. You jump, then realize there's a speaker in the wall behind you.\n\n\t\"Oh, Agent ${name}, I'm afraid you shouldn't be here.\"\n\n\tRumbling fills the small space. You startle. The walls are shaking. Is it an earthquake? No—with a cold rush in your stomach, you realize that the walls are moving in.\n\n\t*choice\n\t\t#I search for a kill switch. She must have included one.\n\t\t\t*if observation > 50\n\t\t\t\t*goto kill_switch_win\n\t\t\t*else\n\t\t\t\t*goto kill_switch_fail\n\n\t\t#Those walls are awfully close. I run like heck.\n\t\t\t*if combat > 55\n\t\t\t\t*goto run_walls_win\n\t\t\t*else\n\t\t\t\t*goto run_walls_fail\n\n\t\t#I say that the Yeti sent me.\n\t\t\t*if persuasion > 55\t\n\t\t\t\t\"Wait, Jackalope!\" you shout. \"The Yeti sent me here!\"\n\n\t\t\t\tThe walls slow their advance. The Jackalope's voice sounds again. \"What did you say?\"\n\n\t\t\t\t\"He sent me. Said you needed a partner.\" You take a deep breath. \"Well, here I am.\"\n\n\t\t\t\tWith a sickening squeal, the walls stop. An agonizing silence replaces the rumbling. At last, the Jackalope murmurs, \"Carry on, then. Come into my chamber….\"\n\n\t\t\t\tSteeling yourself, you obey, striding down the hall and into a round cavern with a low ceiling.\n\t\t\t\t*achieve trap\n\t\t\t\t*goto round_cavern\n\n\t\t\t*else\n\t\t\t\t\"Wait, Jackalope!\" you shout. \"The Yeti sent me here!\"\n\n\t\t\t\tThe walls' relentless advance continues. You throw your hands out, pushing against them in an utterly useless gesture. \"Please! I'm telling the truth!\"\n\n\t\t\t\t\"Oh, I think not,\" the Jackalope says. Strange, her voice is really so beautiful. What a twisted, conniving little creature. \"Goodbye, Agent ${name}.\"\n\t\t\t\t*goto wall_crush_death\n\n*label round_cavern\nThe Jackalope waits for you in the center. Her golden eyes watch you unblinkingly. This time, all manner of electrical panels and wiring is exposed. You recognize some of it as warp gate technology. The Jackalope's genius strikes you anew. What work could she have done, what contributions might she have made…if she hadn't turned to crime, hadn't been exiled to Earth?\n\n\"Agent ${name},\" she says quietly. \"It is a pleasure.\"\n\n*if (turncoat = true)\n\tYou nod, waiting for her to go on. \"I've been waiting a long time for this,\" the Jackalope continues. \"When my fellow convicts escape from this vile prison of a planet, my empire will return to strength throughout the galaxy. I will need a second-in-command, then. ${name}, you have the talent and qualities I seek. Will you join me?\"\n\n\t*choice\n\t\t#Absolutely. It'd be a pleasure to serve a strong leader like her.\n\t\t\tHead erect, shoulders back, you look the Jackalope right in the eye. \"It would be an honor.\"\n\n\t\t\tThe Jackalope offers you a thin smile. \"I rather hoped you would say that.\"\n\n\t\t\t*if (jailbreak = false)\n\t\t\t\tYou did destroy the warp gate under Loch Ness, but it was easily fixed. The Jackalope leads you through the local gate in her lair. It deposits you in Nessie's hideaway. From there, it's another quick jump off-planet to a waiting ship. Sure, living things can't travel far through her warp gate network, but still, this is an unprecedented innovation.\n\t\t\t\t*goto stunned_sophistication\n\n\t\t\t*else\n\t\t\t\tThe jailbreak in progress under Loch Ness doesn't take too long to complete. The Jackalope constructed a local warp gate in her lair, one which leads directly to Loch Ness. From there, it's another quick jump off-planet to a waiting ship. Sure, living things can't travel far through her warp gate network, but still, this is an unprecedented innovation.\n\n\t\t\t\t*label stunned_sophistication\n\t\t\t\tYou're stunned by the sophistication of the technology involved. The Jackalope truly is a genius—and now, you work for her. \n\n\t\t\t\tIt doesn't take long for the Jackalope's new criminal empire to spread. In some ways, she's a better boss than Tweel was. A textbook case of \"an iron fist in a velvet glove,\" perhaps, but the Jackalope actually does genuinely care about those in her employ. \n\n\t\t\t\tSomewhat.\n\n\t\t\t\tYou get a position of petty power. That means decent bonuses, an average amount of dirty work, and the chance to see even more of the galaxy and its myriad of inhabitants. Of course, Tweel has put a bounty on your head and permanently exiled you…so you can never go home again.\n\n\t\t\t\tThat's all right, though. In a strange way, you've found a new home. It's not quite the one you imagined, but it suits the person you've become.\n\t\n\t\t\t\tBesides, there's always Earth contraband. \n\t\t\t\t*goto good_ending\n\n\t\t#I'm getting cold feet about this. I don't want to join the aliens anymore!\n\t\t\t*goto not_turncoat\n\n\t\t#Actually, I think I'd make a better leader than her. I fight for the top spot!\n\t\t\t\"Indeed.\" Not breaking eye contact with her, you withdraw your stunner. \n\n\t\t\tThe Jackalope remains as unflappable as ever. \"What do you think you're doing, ${name}?\"\n\n\t\t\tYou aim directly at her. \"Taking over.\"\n\n\t\t\t*if (combat > 60) and (rule_bender > 60)\n\t\t\t\t*label fight_not_turncoat\n\t\t\t\tThe Jackalope springs into action, but you're just as fast. This is one of the most difficult fights you've ever been in. The Jackalope does not pull any punches. Her antlers are like daggers, slicing into your ribs and arms. At the same time, her sharp teeth seek your throat.\n\n\t\t\t\tAs aggressive as the Jackalope is, the fact remains that she's considerably smaller than you. You manage to throw her off. She sails through the air and hits the wall—but then she's on her paws again, ready for another round.\n\n\t\t\t\tTime to ditch the rules of combat. You start fighting dirty: spitting, tripping, throwing dirt in her golden eyes. You have no idea how much time passes; you sink into the rhythm of the fight, your confidence building the entire time. This feels instinctive. This feels right.\n\n\t\t\t\t*label jack_falls_good\n\t\t\t\tAt last, the Jackalope falls and does not rise. \"I…I surrender,\" she wheezes.\n\t\t\t\t*if (turncoat = true)\n\t\t\t\t\t*goto crime_boss\n\t\t\t\t*else\n\t\t\t\t\t*goto combat_hero\n \n\t\t\t\t*label crime_boss\n\t\t\t\tAnd so, you take over the Jackalope's fledgling criminal empire at the moment of its creation. She is a genius—the local warp gates she's constructed are able to transport living things short distances, just far enough to reach a ship waiting beyond the reach of the PGPB. Under your direction, the jailbreak is a success. \n\t\n\t\t\t\tIt doesn't take long for your empire to spread. Your defeat of the near-mythical Jackalope earns you instant respect. In your new role, you are truly free of the PGPB's shackles. You can finally join the world you've watched and wanted for so long.\n\n\t\t\t\tOf course, you're now the PGPB's most wanted criminal…and sometimes, you feel a pang when you think about ${silver}. Then you look at the cash rolling in, at the lives you get to experience.\n\n\t\t\t\tIn one of your many lairs throughout the galaxy, you recline in your favorite chair, stroking a smuggled Earth cat.\n\n\t\t\t\tYes, it's good to be the boss.\n\t\t\t\t*achieve crimelord\n\t\t\t\t*goto good_ending\t\n\n\t\t\t*else\n\t\t\t\t*label fight_lose_not_turncoat\n\t\t\t\tThe Jackalope springs into action, diving straight for your throat. You barely throw her off in time. You can't even catch your breath before she's charging again. Her antlers slice your ribs and arms like daggers. For such a small creature, her ferocity is staggering.\n\n\t\t\t\tIt doesn't take you long to realize that you're in trouble. She fights dirty, she fights well, and you quickly flag. Instead of fighting to win, you start fighting not to lose. Then you start fighting not to die.\n\n\t\t\t\t*label ankle_cut\n\t\t\t\tAnother sharp line of pain, this one on your ankle. There's a terrible tearing feeling as the Jackalope's antler shears your tendon. You go down hard. The Jackalope snatches your stunner and presses it to your temple. \"Surrender?\" she hisses.\n\n\t\t\t\tYou have no choice. You nod.\n\t\t\t\t*if (turncoat = false)\n\t\t\t\t\t*goto combat_fail\n\t\t\t\t*else\n\t\t\t\t\t*goto not_crime_boss\n\n\t\t\t\t*label not_crime_boss\n\t\t\t\tWell, after that little display of ambition, there is no way that the Jackalope is trusting you in her new empire. What's more, her planned jailbreak goes off without a hitch. Tweel is furious about this…but when she finds out that you defected from the PGPB, her wrath reaches apocalyptic levels.\n\n\t\t\t\tYou run for a time. But the PGPB eventually find you. Then it's a jail cell and hard labor for you.\n\n\t\t\t\tYou always did want to spend more time with the aliens, especially the criminal ones. \n\n\t\t\t\tCareful what you wish for, ${name}. It's a bitter lesson, but you've got centuries to learn it. Careful what you wish for.\n\t\t\t\t*goto ending\n\n*else\n\t\"We know about the warp gates,\" you say. \"The smuggling ring, that was just one small piece, wasn't it? You were testing them with objects first…when that worked, you sent living things. The chupacabra. They can't go far, can they? Just enough to reach an escape ship, lurking beyond the PGPB's defenses.\"\n\n\tThe Jackalope inclines her antlered head. \"You were always clever, ${name}. Too clever, perhaps.\"\n\n\t*if observation > 55\n\t\tWait a moment, what's that? \n\n\t\tWith your keen observation, you spy a flaw in the Jackalope's wiring system. You could use it to blow up this entire lair…maybe even knock out her system of warp gates. Of course, there is no guarantee you would survive, but there is a slight chance.\n\n\t\tMaybe.\n\t\t*goto not_turncoat\n\n\t*else\n\t\t*goto not_turncoat\n\n*label not_turncoat\nAll right. Welcome to the endgame. What's your move, ${name}?\n\n*choice\n\t#I make one last attempt to reach out to the Jackalope.\n\t\t*if justice \u003c 40\n\t\t\tMercy has long been an undervalued virtue in the PGPB. Now, you crouch down to the Jackalope's level. She glares at you, her nose twitching. You spread your hands wide, trying to look nonthreatening.\n\n\t\t\t\"Jackalope,\" you say softly, \"you're hurting, aren't you?\"\n\n\t\t\tThe Jackalope retreats. \"What?\"\n\n\t\t\t\"You're smart. Really smart. And stuck here, what do you do? You try to get everyone else off-planet, first.\" You inch closer. \"You care for them.\"\n\n\t\t\tShe scowls. \"So?\"\n\n\t\t\t\"So…if you're compassionate, why choose a life of crime?\"\n\n\t\t\tThe Jackalope tosses her head; she looks very uncomfortable. \"What do you care?\" Reading your sympathetic silence correctly, she exhales. \"I was forced into it. The PGPB closed down our trade routes, our livelihood. There were no legitimate means of transporting goods or communicating with other worlds.\" She pauses, and then hisses. \"They took my mate.\"\n\t\t\t*page_break Oh Man\n\n\t\t\t\"I'm so, so sorry,\" you say.\n\n\t\t\t\"Little late for that, isn't it?\" the Jackalope sneers. \"We're in too far, now.\"\n\n\t\t\t\"Are we?\" You let the question hang.\n\n\t\t\tAt last, the Jackalope scratches the dirt, not meeting your gaze. \"Are we?\" she repeats softly. There's a hint of hope in her voice.\n\t\t\t*page_break\n\n\t\t\tIt takes a lot of work. A [i]lot[/i] of work. Certainly more late nights and caffeine than you ever believed your body could handle. Between you and the Jackalope, you manage to send several messages.\n\n\t\t\t*if (jailbreak = true)\n\t\t\t\tThe first is to the escaping aliens, calling off the jailbreak. They are confused, but the Jackalope's reputation as a leader is too strong. They come back to Earth. And then, it's on you to negotiate with the PGPB. On careful consideration of certain law codes, it seems that many of these aliens don't deserve the sentences they got.\n\n\t\t\t\t*label sentence_lightened\n\t\t\t\tSome have their sentences lightened. Some stay a while longer. Others go home.\n\n\t\t\t\tIn the end, that's what you've all wanted, all this time—you, ${silver}, the Jackalope, the Yeti. You want to go home.\n\n\t\t\t\t*if (silver_dead = false)\n\t\t\t\t\tYou still see ${silver}. But when all the aliens' cases are over, their sentences either upheld or appealed, something feels wrong. Something is missing.\n\t\t\t\t\t*goto bp_two\n\t\t\t\n\t\t\t\t*else\n\t\t\t\t\tYou didn't realize how hard it would be without ${silver}, though.\n\t\t\t\t\t*goto bp_two\n\t\t\t\n\t\t\t*else\n\t\t\t\tThe first is to Tweel and the PGPB. It takes a while to persuade her, but eventually she relents. The jailbreak participants are pardoned for the time being while you dive into research. On careful consideration of certain law codes, it seems that many of these aliens don't deserve the sentences they got.\n\t\t\t\t*goto bp_two\n\n\t\t*else\n\t\t\tYou crouch down before the Jackalope. \"Jackalope,\" you say, trying to sound sincere. \"What's wrong?\"\n\n\t\t\tShe bares her sharp, pointy teeth. \"You wouldn't understand, human. Not even if I told you.\"\n\t\t\n\t\t\tYou stare at this tiny creature. She might as well be made of hatred: her claws dig into the earth, her yellow eyes are narrowed, and her antlers gleam in the dim light.\n\t\t\n\t\t\tYou're inclined to agree. You don't understand this anger, this willingness to hurt others.\n\n\t\t\tJust as you're despairing, you hear footsteps running towards the cavern. Then a voice:\n\n\t\t\t\"Pan-Galactic Prisons Bureau!\"\n\t\t\t*goto talk_okay\n\n\t#I challenge her to a duel. Winner takes all.\n\t\t\"All right,\" you tell the Jackalope. \"Here is the deal. You and I, right here, right now. Winner takes all, whatever they decide [i]all[/i] is.\"\n\n\t\tShe spits and rubs her paws over her antlers. Her fur bristles. \"Deal.\"\n\n\t\t*choice\n\t\t\t#I use a classical fighting style.\n\t\t\t\t*if rule_bender \u003c 40\n\t\t\t\t\tThe classics are classics for a reason. Form is all. But more importantly, you know all forms, and so you become all forms, incorporate all forms, defend against all forms. Fighting classically, you are not bound by one rigid set of rules. You draw from all of them.\n\t\t\n\t\t\t\t\tThe Jackalope dives for your throat. Your hand strikes out and knocks her to the ground. She springs for your ankle. You jump and kick, grimacing at the sound of her yelp.\n\n\t\t\t\t\tFormlessness as form. You think you've heard that before, somewhere in your travels, but can't think where, now.\n\t\t\t\t\t*goto jack_falls_good\n\t\t\n\t\t\t\t*else\n\t\t\t\t\t*goto fight_lose_not_turncoat\n\t\t\n\t\t\t#I fight dirty.\n\t\t\t\t*if rule_bender > 60\n\t\t\t\t\tThere's nothing you won't do to win. It's served you well in the past, and it serves you well now. As the Jackalope considers you, you kneel down and scoop a handful of dirt. Flinging it in the Jackalope's face, you throw yourself on her. She kicks and writhes against you, but you spit and wrap your fingers around her neck. At one point you even bite. (You regret that right away; she tastes like mildew.)\n\t\t\t\t\t*goto jack_falls_good\n\t\t\t\n\t\t\t\t*else\n\t\t\t\t\tYou thought you fought dirty. The Jackalope is even worse. You scrabble for sand to throw in her face, but she's already diving in, kicking up dust that stings your eyes and coats your throat. Coughing, you stumble backwards. The Jackalope takes advantage of your blindness and confusion to deliver several rabbit-punches to your kidneys. You double over, wracked with pain.\n\t\t\t\t\n\t\t\t\t\tBy the time the Jackalope pauses to draw breath, you are a mass of bruises. \"Ow,\" you mumble.\n\n\t\t\t\t\t\"Surrender?\"\n\n\t\t\t\t\t\"Ow.\"\n\n\t\t\t\t\tShe lowers her antlers. It's too much. You nod.\n\t\t\t\t\t*if (turncoat = false)\n\t\t\t\t\t\t*goto combat_fail\n\t\t\t\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto not_crime_boss\n\t\t\n\t\t\t#I let her tire herself out.\n\t\t\t\t*if (combat > 60) or (resolve > 60)\n\t\t\t\t\tThere are many ways to fight, and you are wise enough to recognize this. The Jackalope drives forward, again and again. You sidestep, not bothering to waste energy. It takes a long time, but eventually her attacks come a little slower. Her eyes go glassy with effort, and sweat slicks her fur down.\n\t\t\t\t\t\n\t\t\t\t\tAt last, she collapses. Slowly, deliberately, you walk over to her and place one foot on her quivering body. \"Well?\" you ask coolly.\n\n\t\t\t\t\t\"I…\" Her eyes burn with hatred, but she can hardly breathe. \"I surrender.\"\n\t\t\t\n\t\t\t\t\t*if (turncoat = true)\n\t\t\t\t\t\t*goto crime_boss\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto combat_hero\n\n\t\t\t\t*else\n\t\t\t\t\tYou plant your feet firmly, ready to fend off the Jackalope's attacks. They come like the surf, crashing on you with relentless power. For such a small alien, the Jackalope certainly is feisty.\n\n\t\t\t\t\tAnd she has more stamina than you. You don't want to admit it, but it's true. While the Jackalope looks as fresh as a spring daisy, your legs are quivering and your breath is raw and harsh in your lungs.\n\n\t\t\t\t\tAll it takes is one mistake. In your tiredness, you make it, leaving your calf unguarded. The Jackalope goes straight for it, and your leg buckles, suddenly unable to bear your weight.\n\t\t\t\t\t*goto ankle_cut\n\n\t*if (observation > 55) #I exploit that electrical flaw.\n\t\t*if (resolve > 50)\n\t\t\tYou lunge forward. With deft fingers, you switch three essential wires around. For the first time, the Jackalope looks rattled. \"No!\" she cries, her golden eyes widening in terror. \n\n\t\t\tToo late. The metallic tang of electricity fills the cavern. A terrible crackling drowns out the Jackalope's shouts. It's like standing in the middle of a lightning storm—everything is hot, white, jagged.\n\n\t\t\tAnd then there is only blackness. \n\t\n\t\t\tEventually, you wake up in a hospital bed.\n\n\t\t\t*if (silver_dead = false)\n\t\t\t\t${silver} leans over the bed. You raise your head and catch sight of impressive scars along ${silver_his} leg. \"Welcome back,\" ${silver_she} says.\n\n\t\t\t\t\"${silver}? What happened?\"\n\n\t\t\t\t\"You blew up the lair.\" ${silver} settles on a chair near your bed. You notice that ${silver_she} uses a cane now; ${silver_his} leg muscles are not fully regrown yet. \"Destroyed the warp gate system and stopped the jailbreak. You're a hero, ${name}.\"\n\n\t\t\t\t\"Well…\" You smile. \"You helped too.\"\n\n\t\t\t\t${silver} snorts. \"Sure, but I'm not the number one agent.\"\n\n\t\t\t\t\"What?\"\n\n\t\t\t\t\"Told you: a hero.\"\n\n\t\t\t\t*label hero_ending\n\t\t\t\tYou settle back in the cool white sheets. A hero. You roll the word around your head. It will take some getting used to. For now, you're just grateful you stopped the Jackalope's plot, protected the galaxy for another day. The inevitable debriefings, medals, banquets, glory, and honor—that can all wait for now.\n\n\t\t\t\tTake a rest, ${name}. You've earned it.\n\t\t\t\t*goto good_ending\n\n\t\t\t*else\n\t\t\t\tTweel leans over your bed. The sudden sight of her clacking beak and yellow eyes makes you jump. \"Commissioner!\" you yelp.\n\n\t\t\t\tShe raises a talon. \"Settle down. You've had quite a time.\"\n\n\t\t\t\t\"Commissioner, ${silver}—\"\n\n\t\t\t\t\"${silver} has been given the appropriate memorial service. When you are recovered, you may go see ${silver_his} plaque.\" Tweel perches on a nearby chair. \"I know it is hard, ${name}. But you blew up the lair, destroyed the warp gate system, and stopped the jailbreak. You're a hero…and as of now, our top agent.\"\n\t\t\t\t*goto hero_ending\n\n\t\t*else\n\t\t\tYou lunge forward. With deft fingers, you switch three essential wires around. For the first time, the Jackalope looks rattled. \"No!\" she cries, her golden eyes widening in terror. \n\n\t\t\tToo late. The metallic tang of electricity fills the cavern. A terrible crackling drowns out the Jackalope's shouts. She rushes to the wires, switches them back—\n\n\t\t\tBOOM.\n\n\t\t\tBoth you and the Jackalope go flying backwards. You slam into the wall hard, hitting your wrist at an odd angle. It breaks with a sickening crack. \n\n\t\t\tBut the warp gate system is still operational; the Jackalope has fixed it in time.\n\n\t\t\tJust as you're despairing, you hear footsteps running towards the cavern. Then a voice:\n\n\t\t\t\"Pan-Galactic Prisons Bureau!\"\n\n\t\t\t*label electricity_ok\n\t\t\tSo, you didn't end up destroying the warp gate. A few aliens managed to get off-planet, but the PGPB rounded them up. The most important thing is that the Jackalope has been transferred to a high security prison. She won't be causing any more trouble there, nor masterminding any more jailbreaks.\n\n\t\t\tAs for you…well, when your wrist is healed, it's suggested that a nice, long vacation is the best thing for you. You can't say no. After all of this, your nerves are just about shot. A few months of lying around doing nothing sounds perfect. \n\n\t\t\tYou've got the entire galaxy to choose from. How about Barcelona? Not the city Barcelona, the planet Barcelona…\n\t\t\t*goto good_ending  \n\n\t#I keep the Jackalope talking. Anything to buy more time.\n\t\t*if (persuasion > 70)\n\t\t\t\"Come on, Jackalope,\" you say. \"You're a genius. You're one of the smartest creatures in the galaxy, right? Tell me all about it.\"\n\n\t\t\tThe Jackalope's eyes light up. \"Oh, ${name}, you have no idea. For so many years, I have been stuck on this rock, and I never gave up. No, it only made me stronger….\"\n\n\t\t\tShe rambles on as you ask the right questions, prodding her story along, stroking her ego just the right way—\n\n\t\t\tSuddenly, you hear footsteps running towards the cavern. A team of Tetu burst in, guns drawn. \"Pan-Galactic Prisons Bureau!\"\n\t\t\t*goto talk_hero\n\n\t\t*elseif (incompetent = true)\n\t\t\t\"Come on, Jackalope,\" you say. \"You're a genius. You're one of the smartest creatures in the galaxy, right? Tell me all about it.\"\n\n\t\t\tThe Jackalope's eyes narrow. \"Oh, I'm not falling for that, ${name}. You want me to blather on. Well, it isn't going to happen.\" She reaches into a recess in the wall, withdraws a gun. \"This ends now.\"\n\n\t\t\tThis is the end. You screw your eyes shut, hoping it isn't too painful….\n\t\t\t\n\t\t\tAnd then a team of Tetu burst in, guns drawn. \"Pan-Galactic Prisons Bureau!\"\n\t\t\t*goto talk_okay\n\n\t\t*else\n\t\t\t\"Come on, Jackalope,\" you say. \"You're a genius. You're one of the smartest creatures in the galaxy, right? Tell me all about it.\"\n\n\t\t\tShe laughs. \"You thought you could fool me, ${name}? I don't think so. Enough delay!\" With that, she does something completely unexpected.\n\n\t\t\tShe leaps through the warp gate. Just like that, she's gone—whisked away to Scotland and the portal under Loch Ness. You try to follow, but the gate slams shut, automatically deactivated.\n\n\t\t\tIt's over.\n\t\t\t*goto talk_not_hero\n\n\t*if (silver_dead = true) #I need to avenge ${silver}. I charge the Jackalope!\n\t\t*if (combat > 60) and (rule_bender > 60)\n\t\t\t*goto fight_not_turncoat\n\t\t*else\n\t\t\t*goto fight_lose_not_turncoat\n\n*label combat_hero\nThe PGPB arrive soon after and take the Jackalope into custody. She's transferred to a maximum security prison, one where she won't cause any more trouble…or mastermind any more jailbreaks.\n\n*if (silver_dead = true)\n\t*label benevolent_path\n\tAfter dealing with the jailbreak and its fallout, you have to attend the memorial for ${silver}. There's a new plaque at PGPB headquarters. Still, it leaves you hollow inside. You've been lucky over the years. You haven't lost too many of your comrades. ${silver}'s death hits you hard.\n\n\t*label bp_two\n\tLate at night, lying in your bunk, you think about the harshness and hardness you've seen throughout the galaxy. You don't really want to fight anymore. You want to help, really help.\n\n\tYou tender your resignation not long after. Soon, you're working with a humanitarian group (or so you think of it), trying to help aliens before desperation reaches critical levels.\n\n\tSometimes you miss the adventure of being a PGPB agent. But deep inside, you know you're doing the right thing.\n\n\tIn the end, your choices were good.\n\t*goto good_ending\n\n*else\n\tYou and your fighting skills become legendary in the PGPB. After all, you are the one who defeated the Jackalope. For weeks afterwards, you enjoy the hoopla and kudos. ${silver} does too, when ${silver_his} leg heals up.\n\n\tRumor has it that this time next year, you'll be enjoying a fat bonus and sweet promotion. As it is, you've already risen to become the PGPB's top agent.\n\n\tThere's no stopping you. The possibilities—and choices—are as vast as the galaxy itself. Well done.\n\t*achieve pgpbhero\n\t*goto good_ending\n\n*label combat_fail\nAfter dispatching you, the Jackalope leaps through her warp gate. You're too wounded to do anything other than grit your teeth in frustration as the jailbreak continues unimpeded. The PGPB finds you eventually, long after a huge number of convicts have escaped off-planet and disappeared into the universe's underbelly.\n\nThey find some of them. Not all. Tweel never lets you forget that this was mostly your fault. Working under her becomes increasingly hard. One too many cutting remarks prompts your resignation, and soon, you're walking the Earth.\n\nYou're back home. You never have to leave the planet again. But you've never felt so rootless in all your life. You've always been caught between worlds, and now, that difference stings you with every step you take and breath you draw.\n\nThere's one more thing. Remember that implant the PGPB gave you when you first joined up? The one that keeps you perpetually young? Well, it's still working. You'll have a long, long time to stare at the stars, sigh through the streets, and yearn for the life that might have been.\n\nBetter luck next time!\n*goto ending\n\n*label talk_hero\nThe PGPB arrive soon after and take the Jackalope into custody. She's transferred to a maximum security prison, one where she won't cause any more trouble…or mastermind any more jailbreaks.\n\n*if (silver_dead = true)\n\t*goto benevolent_path\n\n*else \n\tYou and your silver tongue become legendary in the PGPB. After all, you are the one who outwitted the Jackalope. For weeks afterwards, you enjoy the hoopla and kudos. ${silver} does too, when ${silver_his} leg heals up.\n\n\tNoticing your skill at persuasion, Tweel moves you from Earth Liaison to Diplomacy. The work is fascinating, and you're good at it. You're contributing, which feels awesome. Plus, your skills mean that you're rising through the department with shocking speed.\n\n\tThere's no stopping you. The possibilities—and choices—are as vast as the galaxy itself. Well done.\n\t*goto good_ending\n\n*label talk_okay\nThe Jackalope is taken into custody and transferred to a maximum security prison, one where she won't cause any more trouble…or mastermind any more jailbreaks.\n\nAs for you…well, Tweel wishes you'd been more effective. But in the end, the jailbreak was averted and the Jackalope captured, so she can't complain too much. But she doesn't give you a big promotion either. You continue much as you always have, spreading misinformation on Earth, making sure humanity never realizes precisely who shares their planet.\n\nIt's an odd life. But in the end, it's your life, shaped by your choices.\n\nNot too shabby.\n*goto good_ending\n\n*label talk_not_hero\nYou get in touch with the PGPB as soon as you can. But by then, it's far too late. The convicts under Loch Ness have escaped, and there's no telling where in the galaxy they are.\n\nThe search continues for a long time. The PGPB never finds more than a handful of the escapees. But the Jackalope's influence is certainly felt. Under her new empire, crime rises throughout the galaxy. The PGPB can't be everywhere at once—it looks like a new galactic Dark Age.\n\nAnd it's mostly your fault. Tweel summons you to her office one morning and explains that it'd be better for everyone if you just left.\n\nYou wind up back on Earth. Not just bitter and worn out, but purposeless, friendless, rootless. You've always been caught between worlds, and now, that difference stings you with every step you take and breath you draw.\n\nThere's one more thing. Remember that implant the PGPB gave you when you first joined up? The one that keeps you perpetually young? Well, it's still working. You'll have a long, long time to stare at the stars, sigh through the streets, and yearn for the life that might have been.\n\nBetter luck next time!\n*goto ending\n\n*label good_ending\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]Yeti's Parole Officer.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*goto_scene ending\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Yeti's Parole Officer.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "himalayas": "A crunch echoes in the darkness. You freeze in the lane. The moon is full, but the night is overcast, so you strain to see in the darkness. A small clump of bushes lines the road just ahead of you, and in the distance, a cluster of factories emits a dim, reddish glow.\n\nNo bells, so it can't be a carriage approaching. The new locomotives haven't reached your little village yet; it's only 1832. Besides, this doesn't sound like chugging machinery, but a rasping scrape over gravel. \n\nMovement in one of the bushes. The clouds part. A shaft of moonlight glints off something shining among the leaves and brambles.\n\nIt's nighttime. You're alone. You've heard tales of a beast stalking the countryside: the Fen Lion. A ghost, a monster, a hoax, depending on who you ask. It'd make an awfully good story if you saw it. Besides, it could be someone in trouble. Or maybe you're just curious, plain and simple.\n\n*choice\n\t#I find a safe hiding spot and watch for a bit.\n\t\t*set observation %+10\n\t\tYou take up position in some nearby shrubbery. The leaves are cool and wet against your face as you lean forward. The clouds are shifting; moonlight pools on the lane. Frowning with concentration, you keep watching.\n\n\t\tA lithe, wraithlike shape emerges from the bush. The moon sheens off its silvery fur, and its eyes glow red in the night.\n\n\t\tIt [i]is[/i] the Fen Lion: the mythical creature that's been the center of all village gossip for the past fortnight. \n\n\t\t*choice\n\t\t\t#I drink in as much detail as I can. I have to remember this!\n\t\t\t\t*set observation %+10\n\t\t\t\tHolding your breath, you watch the creature. You note, categorize, and file away every detail. Its hairs are tipped with silver so that it seems to shimmer in the night. The ears are strangely pointed, more like a wolf's than a lion's. You notice that its movements look wary, frightened—almost like it is being hunted by something.\n\n\t\t\t\tWhat could hunt the Fen Lion?\n\t\t\t\t*goto fenlion_hidden_encounter\n\n\t\t\t#I sneak away. I've seen enough.\n\t\t\t\t*set stealth %+10\n\t\t\t\tCarefully, you ease back. You don't make a sound; you're far too stealthy for that. Silent as the Fen Lion itself, you ease yourself through the shrubbery. The long grass in the field behind should hide you.\n\n\t\t\t\tThe wind shifts. You freeze, cursing. Pressing yourself low to the ground, you pray the Fen Lion doesn't catch your scent.\n\n\t\t\t\tA soft growl sounds in the night. \n\t\t\t\t*goto fenlion_growl\n\n\t\t\t#I hide deeper in the shrubbery. I don't want him to eat me!\n\t\t\t\t*set stealth %+10\n\t\t\t\tYou are good at hiding. Wedging yourself between two particularly thick clumps of brush, you focus on breathing quietly and lightly. But the Fen Lion doesn't actually seem interested in eating you. Instead, it's looking up and down the road, its tail lashing. Its movements are tense and wary, almost like it is being hunted by something.\n\n\t\t\t\tBut what could hunt the Fen Lion?\n\t\t\t\t*goto fenlion_hidden_encounter \n\n\t#I call to whatever's there. They might need help.\n\t\t*set justice %-10\n\t\t\"Hello?\" you call softly. \"Is anyone there?\"\n\n\t\tSilence from the bushes. You clear your throat and try again, a little louder this time. \"Hello! Do you need help?\"\n\n\t\tA soft moan answers you. There is definitely something in there, but it might be too hurt to come out. Then again, this could be a ploy to lure you in. \n\n\t\t*choice\n\t\t\t#I investigate more closely—but I find some protection first.\n\t\t\t\t*set rule_bender %-10\n\t\t\t\tYou're in this far; you can't just turn around and walk away. But you're a prudent type who thinks things through. There's no point in charging in willy-nilly. There's a decent-sized stick lying on the ground. You grab that and venture closer.\n\n\t\t\t\tStanding well back from the bush, you use the stick to push the leaves apart. The moon, now shining coldly in a clear sky, glints off something silvery.\n\n\t\t\t\tA soft growl issues from the brush.\n\t\t\t\t*goto fenlion_growl\n\n\t\t\t#I try to establish dialogue from the safety of the road.\n\t\t\t\t*label fenlion_talk\n\t\t\t\t*set persuasion %+10\n\t\t\t\tYou've always prided yourself on your persuasive skills. After all, the pen—or in this case, words—is mightier than the sword. Taking up position on the road, you call, \"Hello! Is anyone in there?\"\n\n\t\t\t\tAnother moan answers you.\n\n\t\t\t\t\"Do you need help?\"\n\n\t\t\t\tMore of a whimper, this time. And then, slowly, a lithe, wraithlike shape emerges from the brush. Your breath catches. It [i]is[/i] the Fen Lion. Its red eyes glow in the darkness. But as it swings its head from side to side, looking up and down the road, you can't help but think that it looks scared.\n\t\t\t\t*goto sad_fenlion\n\n\t\t\t#I continue on my journey. I need to look after my own skin.\n\t\t\t\t*set rule_bender %+10\n\t\t\t\tWell, there might be something in there. But in the end, you look out for you. Shaking your head, you start to head down the road.\n\n\t\t\t\tA soft growl stops you. You freeze. Glance over your shoulder. \n\n\t\t\t\tIt [i]is[/i] the Fen Lion. In the gloom, it looks like a silvery lion: its ragged mane seems to capture the starlight, and its red eyes glow through the darkness. With a snarl, it bares its teeth.\n\n\t\t\t\tGoodness, it has large teeth.\n\t\t\t\t*goto fenlion_teeth\n\n\t#I get a stick and start poking the bushes.\n\t\t*set combat %+10\n\t\tWhen in doubt, grab a stick. There's a decent-sized one lying on the path. You snatch it up, test its weight. It feels good in your hand. Solid. \n\n\t\tCarefully, you step closer and jab the stick into the bushes. A soft growl answers you, but it almost sounds frightened.\n\t\t*choice\n\t\t\t#I back off. Whatever is in there, it doesn't seem threatening.\n\t\t\t\t*set justice %-10\n\t\t\t\tYou're not heartless. The growl sounds more like a moan. You don't actually want to hurt anything if it's not going to hurt you, so you retreat a few steps. \"What's in there?\" you ask aloud.\n\n\t\t\t\tA whimper answers you. And then, slowly, a lithe, wraithlike shape emerges from the brush. Your breath catches. It [i]is[/i] the Fen Lion. Its red eyes glow in the darkness. But as it swings its head from side to side, looking up and down the road, you notice how scared it looks. \n\t\t\t\t*goto sad_fenlion\n\n\t\t\t#I keep poking. It's probably faking, not frightened. \n\t\t\t\t*set combat %+10\n\t\t\t\tYou believe the best defense is a good offense. Whatever is in there, you can't let it think that you're weak. It might attack you the second your back is turned. You give a few sharp jabs, just enough to show it that you can protect yourself if necessary.\n\n\t\t\t\tThe growling grows louder. The bushes shake, and a lithe, wraithlike shape emerges. It [i]is[/i] the Fen Lion. In the gloom, it looks like a silvery lion; its ragged mane seems to capture the starlight.\n\n\t\t\t\tIt bares its teeth. Goodness, it has very large teeth.\n\t\t\t\t*goto fenlion_teeth\n\n\t\t\t#I try to establish communications with it.\n\t\t\t\t*goto fenlion_talk\n\n\t#I sneak as close as I can.\n\t\t*set stealth %+10\n\t\tYou're pretty stealthy. You wait until the breeze shifts and carries your scent downwind. Then, you creep forward. Your boots don't make a sound on the gravel road. You take it one step at a time, pausing every so often to listen with bated breath. You're almost there.\n\t\t*choice\n\t\t\t#This is close enough. I'll observe from here.\n\t\t\t\t*set observation %+10\n\t\t\t\tGrateful for your keen eyesight, you pause where you are. The clouds have now drifted off completely, and moonlight bathes the country lane. You squint. The branches twitch slightly, just enough that you know it isn't the wind. \n\n\t\t\t\tThere's a flash of silver. Two glowing red eyes appear through the leaves. And then, a lithe, wraithlike shape emerges from the brush. Your heart catches in your chest.\n\n\t\t\t\tIt [i]is[/i] the Fen Lion. In the gloom, it looks like a silvery lion; its ragged mane seems to capture the starlight, and its red eyes glow through the darkness.\n\t\t\t\t*goto fenlion_growl\n\n\t\t\t#I throw a rock. Maybe I can flush the thing out of hiding.\n\t\t\t\t*set combat %+10\n\t\t\t\tYour fingers curl around a smooth, palm-sized stone. You toss it into the bushes. Not very hard, mind you, just enough to scare whatever is hiding in there. You'd rather have it out in the open, where you can see it. \n\n\t\t\t\tThe bushes shake, and a lithe, wraithlike shape emerges. It [i]is[/i] the Fen Lion. In the gloom, it looks like a silvery lion; its ragged mane seems to capture the starlight.\n\n\t\t\t\tIt bares its teeth. Goodness, it has very large teeth.\n\t\t\t\t*goto fenlion_teeth\n\n\t\t\t#I try and get even closer.\n\t\t\t\t*set rule_bender %-10\n\t\t\t\tYou like to do things thoroughly. Besides, you're confident you can sneak even closer. You crouch low, wait a few moments, and then continue your approach. Silent as a ghost, you pause just at the edge of the brush. If you listen very carefully, you can hear something breathing.\n\n\t\t\t\tYou wonder if it can hear your heartbeat, which seems to thunder in your ears.\n\n\t\t\t\tInstead, there is a whimper. And then, slowly, a lithe, wraithlike shape emerges from the brush. Your breath catches. It [i]is[/i] the Fen Lion. Its red eyes glow in the darkness. But as it swings its head from side to side, looking up and down the road, you can't help but think that it looks scared.\n\t\t\t\t*goto sad_fenlion\n\n*label fenlion_hidden_encounter\n\nFrom your hiding place, you watch as the Fen Lion paces back and forth. No question, it looks nervous. The branches of a nearby tree creak in the wind, and it leaps straight up, its hackles rising. \n\nSuddenly, a humming noise fills the air. You shake your head, wondering what it is. The Fen Lion freezes. It looks up towards the sky—and then its ears go flat to its skull. It turns tail and leaps into the bushes\n\nRight where you are hiding.\n*page_break\n\n*set justice %-10\nIt's hard to say who is more surprised: you or the Fen Lion. It makes a few strangled yelps, before pressing itself flat to the earth. Apparently, it isn't interested in eating you. You glance towards the sky as well, and notice that one of the stars is moving very quickly and getting very large. The humming grows louder….\n*goto ship_appearance\n\n*label fenlion_growl\n*set resolve %+10\n\nYour heart beats wildly, but you're not going to back down. It's a little like encountering a bear in the woods; the worst thing you can do is run away. Instead, you spread your arms wide, hoping to make yourself look tall and imposing.\n\n\"Get away!\" you shout. \"I don't want to hurt you, but I will if I have to!\"\n\nThe Fen Lion makes a sound like laughter, but stops abruptly as a loud humming fills the air. You glance up. One of the stars overhead seems to be getting bigger and brighter, almost like it's falling to earth.\n*goto ship_appearance_two\n\n*label fenlion_teeth\nYou take a step backwards, not taking your eyes off the Fen Lion. Its jaws open, and its red eyes fix on yours. It occurs to you that you might be eaten here on this lonely road, and no one will ever know what happened to you.\n\nThe Fen Lion advances another step but stops abruptly as a loud humming fills the air. You glance up. One of the stars overhead seems to be getting bigger and brighter, almost like it's falling to earth.\n*goto ship_appearance_two\n\n*label ship_appearance_two\nThe star grows so blindingly bright, you have to close your eyes. When you open them, an object like nothing you've ever seen is sitting on the road. It looks rather like an enormous coach, although made of silver metal and lacking horses. Lights glow in bands along its top and sides. A doorway appears, and three creatures step into the night.\n\n*page_break Oh My\n\n*label tetu_appearance_two\nThey remind you of pictures you've seen of the Egyptian god Thoth: slim, feathered beings just taller than you with birdlike heads and hands that end in curving talons. They stand lightly on two feet.\n\n\"Well, well,\" one says, and you're shocked that you can understand it. \"We found you, B'ob.\"\n\nThe Fen Lion snarls as another creature shakes its head. \"Thought you could bend the rules of your exile, did you?\" the bird-creature asks. \n\nYou stare from the Fen Lion to the bird-creatures. The bird-creatures sound like constables, and they're treating the Fen Lion like—like a criminal.\n\n*choice\n\t#I jump in and introduce myself.\n\t\t*set persuasion %+10\n\t\tAffecting an air of confidence, you stroll between the bird-creatures and the Fen Lion. If you can understand them, maybe they can understand you. It's worth a shot, anyway.\n\n\t\t\"Hello,\" you say. \"I take it you're travelers. Nice coach. Anyway, I was passing by, and I happened across the Fen Lion here. Has he done something wrong?\"\n\n\t\tThe bird-creatures stare at each other and then burst out in strange chirps that must be laughter. \"This one's got some tail feathers!\" one says. \"And the [i]Fen Lion[/i]?\"\n\n\t\t\"That's how the humans know him,\" another answers. \"When they see him, that is.\"\n\n\t\tAnother bird-creature casually takes out something that looks like a pistol. He aims at the Fen Lion. A beam of light arcs through the air, and the Fen Lion collapses. \"Don't worry,\" the bird-creature chuckles as you gasp. \"He's only stunned.\" Stowing the pistol away, he adds, \"I think someone would like to talk to you….Let's take this human to meet Subcommissioner Tweel.\"\n\t\t*goto Tweel_meeting_good\n\n \n\t#I distract the creatures so the Fen Lion can escape.\n\t\t*label distraction_tetu\n\t\t*set rule_bender %+10\n\t\tYou leap between the Fen Lion and the bird-creatures. \"Hello!\" you shout. \"Hello, look at me! What are you? No, here, look over here!\"\n\n\t\tThe creatures stare at you incredulously. The Fen Lion takes the opportunity provided and bolts. By the time you've turned around, the Fen Lion is halfway down the road.\n\n\t\tOne bird-creature shakes its head. \"Now we'll have to find him all over again.\"\n\n\t\tAnother hoists something that looks like a pistol. \"Shall we stun this one? We might need to order a memory wipe.\"\n\n\t\tThat doesn't sound good, but the first creature pushes the pistol aside. \"No. I think Subcommissioner Tweel will want to talk to this human.\"\n\t\t*set Tweel_meeting_rough true\n\t\t*goto Tweel_meeting_good\n\n\t#I get a better look at that horseless silver coach.\n\t\t*label horseless_coach\n\t\t*set observation %+10\n\t\tWith the monsters all distracted by each other, you edge closer to the strange silver machine. After a moment's hesitation, you dare to run your hands along the outside. It's warm and smooth, and it sends a tingle along your fingers and up your arms.\n\n\t\tA scuffle breaks out behind you. One of the bird-creatures whips out something like a pistol and aims it at the Fen Lion. There is a burst of light, and the Fen Lion collapses.\n\n\t\t\"Stunned,\" the bird-creature says. \"Let's take him back to HQ.\" Then, it freezes. \"There's a human at our ship.\"\n\n\t\t\"And it doesn't look scared,\" another says.\n\n\t\t\"I'm not,\" you say.\n\n\t\tThe first bird-creature looks thoughtful. \"Then I think Subcommissioner Tweel will want to talk to you….\"\n\t\t*goto Tweel_meeting_good \n\n*label sad_fenlion\n*set justice %-10\nThe Fen Lion just looks so [i]sad[/i]. Your heart goes out to it. You step a little closer. After hesitating for a moment, you extend your hand. The Fen Lion sniffs it; it's definitely a flesh-and-blood creature, not a ghost. \n\n\"What's wrong?\" you ask it. \"Can I do anything?\"\n\nIt answers with a strange combination of yelps and rumbles. Suddenly, humming fills the air, and it goes silent. It glances up and hisses. You look up too. Strange, one of the stars overhead is moving. It's getting bigger and brighter, almost like it's falling to Earth.\n\nThe Fen Lion shoves you into the nearest bush and leaps in after you. You try to shout, but it whips its tail around to cover your mouth and presses itself flat to the ground. Through the leaves, you watch the mysterious star.\n*goto ship_appearance\n\n*label ship_appearance\nThe star grows so blindingly bright, you have to close your eyes. When you open them, an object like nothing you've ever seen is sitting on the road. It looks rather like an enormous coach, although made of silver metal and lacking horses. Lights glow in bands along its top and sides. A doorway appears, and three creatures step into the night.\n\n*page_break Oh My\n\n*label tetu_appearance\nThey remind you of pictures you've seen of the Egyptian god Thoth: slim, feathered beings just taller than you with birdlike heads and hands that end in curving talons. They stand lightly on two feet. To your shock, you can understand what they say to each other.\n\n\"The scanner says he's close by.\"\n\n\"Blasted convicts—always trying to bend the rules.\"\n\n\"Is a little rule of law too much to ask for?\"\n\nBeside you, the Fen Lion hisses. You shift your stare from the creatures to it. They sound like constables—constables on a manhunt. Which means, if you're reading the situation correctly, the Fen Lion is some sort of… criminal? \n\n*choice\n\t#I attract the bird-creatures' attention.\n\t\t*goto distraction_tetu\n\n\t#I do my best to hide the Fen Lion.\n\t\t*set justice %-10\n\t\tYou sympathize with the Fen Lion. \"Shh!\" you hiss to it. \"Get down, maybe they won't see you.\"\n\n\t\tThe Fen Lion does so, and you
