s the fabric obsessively between ${silver_his} fingertips. \"They were moving, they were eating, and then…nothing.\"\n\nThe ship rolls. You close your eyes. \"We'll find them.\"\n\n${silver} harrumphs. \"It's your hide on the line. Tweel likes me.\"\n*page_break Thanks, ${silver}\n\nThe ship lurches back into regular space. ${silver} immediately presses against the window. You don't bother. You were on Rigel IX last year. It's a scorching hot planet, the way Earth must have been during the Jurassic. Thick, leafy jungle covers most of the planet. Where there isn't jungle, there are cities—great sprawling cities, with streets of mud and crumbling buildings. You always feel a bit awkward here, since only the PGPB call it Rigel IX. It reminds you uncomfortably of the colonialist attitudes you witnessed on Earth in centuries past.\n\nSuffice it to say, you aren't exactly looking forward to tracking the chupacabra across their home planet.\n\nThe ship dumps you close to where the chupacabra were last seen: one of the larger towns. Tin-roofed shanties compete for space with scraps from junked ships. As you step from the ship, you recoil from the smell. Garbage, rotting meat, sewage…\n\nAll the smells of desperation.\n*page_break \n\nNow, you have a choice to make. You'll cover more ground if you and ${silver} split up, but there are a number of chupacabra poking their snouts out, looking at you two with a mix of curiosity and menace. Then again, there's one young chupacabra who's mostly gazing with curiosity. Maybe he'd be a good local guide.\n\n*choice\n\t#I stick with ${silver}.\n\t\t*set relationship_silver %+15\n\t\tYou're becoming reliant on this partner of yours. Maybe that isn't such a bad thing. You've worked alone for a long, long time. Having someone else around is kind of…nice. And unless you're losing your mind, ${silver} feels the same. At least, ${silver_she} smiles.\n\n\t\t${silver} actually has a pretty nice smile.\n\n\t\tWhoa! Where are these thoughts coming from, ${name}? Best keep your mind on the job, don't you think?\n\t\t*page_break Yes, Yes\n\n\t\tYou and ${silver} venture into the streets. Suddenly, you're very aware of every movement ${silver_she} makes. But you are a professional, and so you push such thoughts firmly away. Oblivious, ${silver} continues tapping at ${silver_his} communicator.\n\n\t\t\"Remember that mob from a few years back?\" ${silver_she} says, not looking up. \"The Afilades?\"\n\n\t\t\"The Chupacabra Mafia? Sure.\"\n\n\t\t\"Well, their boss lives in a mansion just outside the slum. He might be sheltering the escapees. Or…\" ${silver_she} swipes the screen. \"There's an abandoned factory emitting a weird signal, almost like a spaceship beacon, but nothing I recognize. Or, it looks like all the escapees came from the same neighborhood, also close to here. Might be a good idea to search it. Finally, ${silver_she} puts the communicator down and looks at you. It's very distracting.\n\n\t\t\"What do you think?\" ${silver_she} asks.\n\n\t\t*choice\n\t\t\t*disable_reuse #\"Let's question the mob boss.\"\n\t\t\t\t${silver} was right; it isn't far to the home of El Sid, the (ostensibly reformed) boss of the Afilades gang. Once, he was vying with the Jackalope for top spot in the criminal underworld…but by complete coincidence, he felt the urge to reform his ways just before the PGPB closed in on him.\n\n\t\t\t\t*label el_sid_bridge\n\t\t\t\tAfter wandering through the tiny shanties where most of the chupacabra dwell, you're a little discombobulated by the sight of El Sid's mansion. Pale gold stone shines in the afternoon sunlight, and you suddenly remember the actual, chupacabran name for the planet, the one the PGPB doesn't like to use.\n\t\n\t\t\t\tValldellum: valleys of light.\n\t\t\t\t*page_break Oh, Look: Guards\n\n\t\t\t\tA number of guards line the sweeping driveway. Their wrinkled lips lift as you approach, revealing curved, yellowing teeth. More frightening are the guns clutched in their sturdy paws. Rolling your eyes, you march to the nearest one and flash your PGPB badge. \"We need to talk to El Sid.\"\n\n\t\t\t\tThe guard growls softly. \"El Sid is busy.\"\n\n\t\t\t\t*choice\n\t\t\t\t\t*disable_reuse #I claim to have a delivery for El Sid.\n\t\t\t\t\t\t*if persuasion > 60\n\t\t\t\t\t\t\t\"I know,\" you say. \"He must be getting impatient for this delivery.\"\n\n\t\t\t\t\t\t\tThe guard tilts his head. \"Delivery?\" \n\n\t\t\t\t\t\t\t${silver} gives you a questioning look, but you smile and pat your pocket. \"Data, on a portable drive. He didn't trust the network.\"\n\n\t\t\t\t\t\t\t\"El Sid didn't tell me about any deliveries….\" the guard grumbles.\n\n\t\t\t\t\t\t\t${silver} has caught on, and ${silver_she} sighs. \"Well, I suppose he wouldn't confide in [i]junior[/i] staff.\"\n\n\t\t\t\t\t\t\t\"I'm up there!\" The guard's spiked fur bristles. \"He…he did tell me!\"\n\n\t\t\t\t\t\t\t\"Great!\" You smile. \"So, just through the main entrance, right?\"\n\n\t\t\t\t\t\t\tThe guard spits and nods. ${silver} winks at you.\n\t\t\t\t\t\t\t*goto wait_a_sec\n\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"But I have a delivery!\" you say.\n\n\t\t\t\t\t\t\tThe guard scratches his mangled ear. \"Of what?\"\n\n\t\t\t\t\t\t\tYou're not carrying anything. Smooth. \"Encrypted data!\" ${silver} says, at the same time you shout out, \"A sample of nanobots!\"\n\n\t\t\t\t\t\t\tAnother growl issues from the guard's chest.\n\n\t\t\t\t\t\t\t\"Uh…\" You gulp. \"Nanobots carrying encrypted data?\"\n\n\t\t\t\t\t\t\tNot surprisingly, the guard doesn't believe you. More of them start clustering—too many for you and ${silver} to take on. Looks like you're going to have to continue your investigations elsewhere.\n\t\t\t\t\t\t\t*set el_sid_fail true\n\t\t\t\t\t\t\t*goto wait_a_sec\n\n\t\t\t\t\t*disable_reuse #I thank the guard…and sneak in another entrance.\n\t\t\t\t\t\t*if stealth > 60\n\t\t\t\t\t\t\tAfter thanking the guard (he looks surprised by this), you and ${silver} stroll back down the driveway. Really, though, you're probing El Sid's manor for weaknesses. An unattended window on the second floor catches your eye, and you grab ${silver}'s elbow. Immediately, ${silver_she} nods.\n\n\t\t\t\t\t\t\tLong grass ripples like water—El Sid's mansion is an island in its midst. You and ${silver} are stealthy, managing to bob and weave well enough to avoid detection. The window is too high to reach alone, but there's a ledge beneath it. \n\n\t\t\t\t\t\t\tYou help ${silver} up first; it feels strange, holding ${silver_him} like that, grasping ${silver_his} fingers as ${silver_she} hauls you up after. You want to say something, but ${silver} has already slipped through the window. You follow, landing on plush carpets.\n\t\t\t\t\t\t\t*goto wait_a_sec\n\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou and ${silver} leave the guard looking pleased with himself and venture around the back of the mansion. There's a door ajar; it looks like a kitchen door. You start towards it.\n\n\t\t\t\t\t\t\t\"Wait,\" ${silver} says, \"I hear someone coming.\"\n\n\t\t\t\t\t\t\tYou pause. There is only the sound of wind in the grass and alien birds hooting mournfully from a nearby strand of purple trees. \"I don't,\" you respond.\n\n\t\t\t\t\t\t\tConfident, you sneak over to the door, slip inside…\n\n\t\t\t\t\t\t\tAnd meet a chupacabra cook, who gives you a good whack with a spatula and promptly boots you out again.\n\n\t\t\t\t\t\t\t${silver} waits beneath one of the purple trees. \"I won't say, [i]I told you so[/i],\" ${silver_she} says.\n\n\t\t\t\t\t\t\tYou rub your throbbing shoulder. \"Thanks.\n\t\t\t\t\t\t\t*set el_sid_fail true\n\t\t\t\t\t\t\t*goto wait_a_sec\n\t\t\t\t\t\t\t\n\t\t\t\t\t*if (relationship_silver > 60) #I work a good cop/bad cop routine with ${silver}.\n\t\t\t\t\t\t*if (silver_sweet = true) or (silver_hardworker = true)\n\t\t\t\t\t\t\t\"Busy!\" You snort. \"That's a bad excuse. Look here, you moth-eaten pile of fur, we are [i]going[/i] to see El Sid and we're willing to blast our way in if necessary.\"\n\n\t\t\t\t\t\t\tThe guard looks slightly stunned. So does ${silver}, but at least ${silver_she} is quick on the uptake. \"Now, hold on, ${name}, he's just doing his job….\" ${silver} turns to the guard. \"I understand, you want to protect El Sid.\"\n\n\t\t\t\t\t\t\tJust like ${silver}: earnest and hardworking. The guard hesitates. You jump back in. \"What's wrong with you? Don't you recognize us? Didn't El Sid [i]say[/i] we were coming?\"\n\t\t\n\t\t\t\t\t\t\tWide-eyed, the guard shakes his head. ${silver} sighs. \"Well, that's unfortunate, but we won't tell him. We're running late as it is. Come, ${name}, let's leave our friend to his work.\"\n\n\t\t\t\t\t\t\tBefore the guard can react, you're striding through El Sid's front door. You're smiling. Pulling that routine felt [i]good[/i]. There are definitely benefits to having a partner.\n\t\t\t\t\t\t\t*goto wait_a_sec\t\t\t\t\t\n\t\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t${silver} reads your intentions at a glance, and goodness, do ${silver_his} eyes gleam. \"El Sid [i]did[/i] mention we were coming, right?\" ${silver_she} says, ${silver_his} voice soft and dangerous.\n\n\t\t\t\t\t\t\tThe chupacabra retreats a few steps. \"Well, uh, no, not exactly, but…\"\n\n\t\t\t\t\t\t\tYou slide between the chupacabra and ${silver}, fighting a smile. \"Now, ${silver}, I'm sure it's just an oversight.\"\n\n\t\t\t\t\t\t\t\"I don't know.\" Wow, ${silver} can pull out the authority when ${silver_she} wants—[i]you[/i] almost believe ${silver_him}. \"Maybe this guard's just incompetent. El Sid won't be happy.\"\n\n\t\t\t\t\t\t\t\"No way.\" You smile sweetly at the now-terrified chupacabra. \"You're completely competent. Just about to let us in, right?\"\n\n\t\t\t\t\t\t\t\"Of course, of course!\" The guard stammers, and moments later, you're striding through El Sid's front door. You're smiling. Pulling that routine felt [i]good[/i]. There are definitely benefits to having a partner.\n\t\t\t\t\t\t\t*goto wait_a_sec\t\n\t\t\t\t\t\n\t\t\t\t\t*disable_reuse #El Sid respects the PGPB. I'll drop Tweel's name. \n\t\t\t\t\t\t*if resolve > 60\n\t\t\t\t\t\t\t\"Not for the PGPB, he isn't,\" you say, injecting some confidence into your voice. \"Commissioner Tweel will have something to say to him.\" You pause for effect. \"They go back a long way, El Sid and Tweel.\"\n\n\t\t\t\t\t\t\tAs the guard hesitates, ${silver} gives you a look that you haven't seen from ${silver_him} before. It's almost…appreciative.\n\t\n\t\t\t\t\t\t\tYou turn back to the guard. \"Well?\"\n\n\t\t\t\t\t\t\tHe growls again, but stands down. \"I will take you.\"\n\t\t\n\t\t\t\t\t\t\t\"Nice work,\" ${silver} whispers in your ear as the guard whisks you inside. \n\t\t\t\t\t\t\t*set relationship_silver %+10\n\t\t\t\t\t\t\t*goto wait_a_sec\n\t\t\t\t\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"Come on,\" you wheedle.\n\n\t\t\t\t\t\t\tNothing doing. You drag your toe across the ground. It's hard to keep your resolve, even when ${silver} steps in to try and help. Sometimes, a partner is a good thing. ${silver} isn't even mocking you for failing to talk the guard around.\n\t\t\t\t\t\t\t*set el_sid_fail true\n\t\t\t\t\t\t\t*goto wait_a_sec\n\n\t\t\t\t*label wait_a_sec\n\t\t\t\tWait a sec. Is it your imagination, or is ${silver_she} standing just a little too close?\n\t\t\t\t*choice\n\t\t\t\t\t#I hope it's my imagination. That would be too awkward!\n\t\t\t\t\t\tRight you are. Romance in the field is distracting at best, deadly at worst.\n\t\t\t\t\t\t*set relationship_silver %-20\n\t\t\t\t\t\t*if (el_sid_fail = true)\n\t\t\t\t\t\t\t*goto el_sid_fail_scene\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto El_Sid_meeting\n\n\t\t\t\t\t#Fantastic! I was really hoping ${silver_she} might be starting to like me!\n\t\t\t\t\t\tWell, it seems that ${silver_she} might. Be careful, though. ${silver} is a fiery one, and you know what they say about playing with fire….\n\t\t\t\t\t\t*set relationship_silver %+20\n\t\t\t\t\t\t*if (el_sid_fail = true)\n\t\t\t\t\t\t\t*goto el_sid_fail_scene\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto El_Sid_meeting\n\n\t\t\t\t\t#Ummm…I'm really not sure how I feel about this.\n\t\t\t\t\t\tDon't worry, ${name}. You have lots of time to figure it out. For now, just focus on El Sid and the chupacabra. Also the smuggling ring. And the off-grid warp gate you still haven't found yet.\n\n\t\t\t\t\t\tYeah…maybe now is not the best time for a fling.\n\t\t\t\t\t\t*if (el_sid_fail = true)\n\t\t\t\t\t\t\t*goto el_sid_fail_scene\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto El_Sid_meeting\n\n\t\t\t\t\t#I loathe ${silver}.\n\t\t\t\t\t\tOh. All right, then. Never mind.\n\t\t\t\t\t\t*set relationship_silver %-35\n\t\t\t\t\t\t*if (el_sid_fail = true)\n\t\t\t\t\t\t\t*goto el_sid_fail_scene\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto El_Sid_meeting\n\n\t\t\t\t*label el_sid_fail_scene\n\t\t\t\tSo, your investigation has hit a temporary dead end. That's all right, though. You might be able to try El Sid later, and you have a few other options. Where to now?\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (not(factory_visited)) #I search the abandoned factory.\n\t\t\t\t\t\t*goto chup_factory\n\t\t\t\t\t*selectable_if (not(haunts_visited)) #I visit the old haunts of the escaped chupacabra.\n\t\t\t\t\t\t*goto old_haunts\n\t\t\t\t\t#I keep searching alone.\n\t\t\t\t\t\t*goto search_alone\n\n\t\t\t\t*label El_Sid_meeting\n\t\t\t\tEl Sid waits for you in an ornately furnished parlor. The golden sun spills through wide windows, bathing the room in light. Your boots make no sound on thick, white carpets. The furniture gleams, the wood polished to an amberlike color.\n\n\t\t\t\tIt's a strange contrast with the chupacabra awaiting you in the center of it all. His head is even more wrinkled than most chupacabra, and it's crisscrossed with old scars. His ragged ears prick forward, and he nods. \n\n\t\t\t\t\"It has been a long time since the PGPB has done me the pleasure of a visit.\"\n\n\t\t\t\tHis voice sounds pleasant, but you aren't fooled. You know the kidnappings, thefts, and occasional murders his gang committed.\n\n\t\t\t\t\"Let's get to business,\" you say bluntly. \"Convicts were sighted here. Chupacabra meant to be serving their sentence on Earth.\"\n\n\t\t\t\tEl Sid's eyes light up. \"A jailbreak? Oh, your beaked Commissioner won't be happy. Especially not if they had…shall we say…inside help?\"\n\t\t\t\t*page_break Oops\n\n\t\t\t\tMaybe you shouldn't have given up that nugget. You interview El Sid for a bit longer, but he's just reveling in smugness. He does promise to keep the PGPB updated…though you're not sure you trust him.\n\n\t\t\t\t*if relationship_silver > 60\n\t\t\t\t\t*label silver_kiss_slum\n\t\t\t\t\tOn the way back to the slum, it seems like you and ${silver} are walking really close together. Unnecessarily close together. Close together in a way that makes sweat prickle under your collar and sets you thinking about the PGPB's strict antifraternization policy. How do you feel about that?\n\t\t\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#Awesome! ${silver} is awesome!\n\t\t\t\t\t\t#Very confused. ${silver}? Really?\n\t\t\t\t\t\t#Sad. ${silver} is practically married to the PGPB. A relationship would never work.\n\t\t\t\t\t\t#Annoyed. We're meant to be working!\n\t\t\t\t\t\t#Erm…ask me in about five minutes.\n\t\t\t\t\t\n\t\t\t\t\tHonestly, you're not totally surprised ${silver} pauses in an alcove. You follow when ${silver_she} beckons you. It's a small space, so while you're very well-hidden, you're also very close together. For some reason, the PGPB's antifraternization policy flashes across your mind. Personal relationships between agents aren't [i]prohibited[/i] exactly, but they're not encouraged either. Civil, courteous, and professional—those are Tweel's favorite words.\n\n\t\t\t\t\tAs you're thinking all this, ${silver} inhales and ${silver_his} lips part. Oh my. What now?!\n\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I kiss ${silver_him}! I kiss ${silver_him} now!\n\t\t\t\t\t\t\tElectricity tingles along your spine, all the way to your fingertips. The kiss deepens; it's like a fire has gripped you somewhere around the belly button. After a while—who knows how long?—${silver} pulls away.\n\n\t\t\t\t\t\t\t\"I'm sorry….\" ${silver_she} begins.\n\n\t\t\t\t\t\t\tYou press a finger to ${silver_his} lips. \"Don't be.\"\n\n\t\t\t\t\t\t\t\"Uh…\" ${silver} looks at the ground. \"We should talk. PGPB policy doesn't condone this level of fraternization between agents. But…\" ${silver} looks up and for the first time, you see a glint of wickedness in ${silver_his} eyes. \"Some rules are meant to be broken.\"\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#\"Let's keep this a one-time thing.\"\n\t\t\t\t\t\t\t\t\t${silver} looks disappointed, but nods. \"Perhaps that's best. We could both lose our jobs.\"\n\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tOf course, ${silver_she} doesn't sound completely convinced, but you've both made your choice.\n\t\t\t\t\t\t\t\t\t*set rule_bender %-20\n\t\t\t\t\t\t\t\t\t*goto arms_bridge\n\n\t\t\t\t\t\t\t\t#\"Look, I really like you. Let's go for it.\"\n\t\t\t\t\t\t\t\t\t\"As a real, long-term relationship?\" ${silver} asks.\n\n\t\t\t\t\t\t\t\t\tYou nod.\n\t\t\n\t\t\t\t\t\t\t\t\t\"It's been a long time….\" $!{silver_his} fingers trail along your arm. \"But I think we can make it work. If Tweel doesn't find out.\"\n\n\t\t\t\t\t\t\t\t\tYour cheeks hurt from smiling. Everything is different now.\n\t\t\t\t\t\t\t\t\t*set rule_bender %+15\n\t\t\t\t\t\t\t\t\t*set silver_date true\n\t\t\t\t\t\t\t\t\t*achieve romance\n\t\t\t\t\t\t\t\t\t*set relationship_silver %+40\n\t\t\t\t\t\t\t\t\t*goto arms_bridge\n\n\t\t\t\t\t\t\t\t#\"Let's revisit this, as soon as we've wrapped up this case.\"\n\t\t\t\t\t\t\t\t\t${silver} looks disappointed, but nods. \"Yes, that seems prudent.\"\n\n\t\t\t\t\t\t\t\t\tJust as you turn to go, ${silver_his} fingertips trail along your arm. \"I'm holding you to that, you know,\" ${silver_she} tells you.\n\n\t\t\t\t\t\t\t\t\tYou smile. \"I expect nothing less.\"\n\t\t\t\t\t\t\t\t\t*set rule_bender %+15\n\t\t\t\t\t\t\t\t\t*set relationship_silver %+20\n\t\t\t\t\t\t\t\t\t*goto arms_bridge\n\n\t\t\t\t\t\t#I pretend I don't know what's happening.\n\t\t\t\t\t\t\t\"Oh, hey!\" you say, too loudly. \"Look at us here in this alcove like pals. Because we are pals. Yep, good old pals. Pals, pals, pals!\" ${silver} looks first bewildered, then hurt, but you can't shut up. \"Better get back to the case, though!\"\n\n\t\t\t\t\t\t\tYou practically run back to the slum. Hopefully the awkward bullet you just dodged doesn't hit you later.\n\n\t\t\t\t\t\t\tAnd hopefully the metaphors get better.\n\t\t\t\t\t\t\t*set relationship_silver %-15\n\t\t\t\t\t\t\t*goto arms_bridge\n\n\t\t\t\t\t\t#I gently turn ${silver_him} down.\n\t\t\t\t\t\t\t\"Ah, ${silver}…\" You swallow hard. \"I'm really sorry. I don't…\"\n\n\t\t\t\t\t\t\tA flush rises in ${silver_his} cheeks, but ${silver_she} nods curtly. \"I appreciate your honesty.\"\n\n\t\t\t\t\t\t\t\"Partners?\"\n\n\t\t\t\t\t\t\t\"Indeed.\"\n\n\t\t\t\t\t\t\tTime to return to the case, then.\n\t\t\t\t\t\t\t*goto arms_bridge\n\n\t\t\t\t*else\n\t\t\t\t\tYou can't help mulling El Sid's comments around in your mind. Inside help. Normally, it'd be impossible for the chupacabra to escape orbit without the PGPB noticing. This smuggling ring was probably using a local warp gate—but those are only large enough for small objects. The warp gates able to handle ships need to be far from a planet's gravity to be stable.\n\t\t\t\t\t\n\t\t\t\t\tRight?\n\n\t\t\t\t\tAs you follow ${silver} back to the slums, you feel more and more frustrated with yourself.\n\t\t\t\t\t*goto arms_bridge\n\n\t\t\t*selectable_if (not(factory_visited)) #\"I want to investigate that factory.\"\n\t\t\t\t*label chup_factory\n\t\t\t\t*set factory_visited true\n\t\t\t\tYou strike out on the road. The jungle clears out as you near the factory, and soon enough, you're there. It's a ramshackle building, corrugated tin crumbling on every side. How do you enter?\n\n\t\t\t\t*fake_choice\n\t\t\t\t\t#I go through the front door—what's left of it.\n\t\t\t\t\t#I squeeze through a window.\n\t\t\t\t\t#I find a hole in the side. \n\n\t\t\t\tThe air inside the factory smells musty, like it's been forgotten a long time. Rust clings to every surface. ${silver} casts an impassive eye over it.\n\n\t\t\t\t\"Lots of jobs here, once,\" ${silver_she} comments.\n\n\t\t\t\tAnd you don't see any new ones to replace them. You wonder if Tweel's ever seen this reality. Probably not— the PGPB strive to keep order, but they don't seem terribly interested in fixing things before they break.\n\n\t\t\t\t*if (observation > 65) or (resolve > 50)\n\t\t\t\t\tA low humming interrupts your thoughts. It's barely perceptible; if your senses weren't so keen, you'd never have heard it. It's coming from one of the factory's interior walls.\n\n\t\t\t\t\t\"What are you doing?\" ${silver} asks, as you press your ear to the cool metal.\n\n\t\t\t\t\t\"Shh.\" Vibrations run up and down your cheek. You scrabble at the metal, searching for a seam, a panel—and then you find it, a latch that keeps the false wall on hidden runners. With a few deft movements, you have it unhooked, and the wall slides to one side.\n\t\t\t\t\t*page_break Swish\n\n\t\t\t\t\t*if (silver_date = true)\n\t\t\t\t\t\tA broken, smoldering pile of metal greets you. ${silver} squeezes your hand as ${silver_she} looks it over. \"Part of some spacecraft,\" ${silver_she} says. \"What do you think?\"\n\n\t\t\t\t\t\tYou're still distracted by the factory itself. \"I think the PGPB should do more to help.\"\n\n\t\t\t\t\t\t${silver} laughs nervously. \"They do.\"\n\t\n\t\t\t\t\t\t\"Not really, ${silver}. It's almost like once they got involved in other societies, things don't end well.\"\n\n\t\t\t\t\t\tDiscomfort flashes over ${silver_his} face. \"Look,\" ${silver_she} says, \"the PGPB is very important to me. And so are you. So please, can we drop it?\"\n\t\t\t\n\t\t\t\t\t\tThere's a weird tension. You can almost feel the scales shifting: the PGPB on one side, your relationship on the other. But ${silver} is right, you can drop it for now. You stoop to inspect the twisted metal remnants.\n\t\t\t\t\t\t*goto got_chewed_up\n\n\t\t\t\t\t*else\n\t\t\t\t\t\tA broken, smoldering pile of metal greets you. ${silver} elbows past you to inspect it. \"Part of some spacecraft,\" ${silver_she} mutters. \n\t\t\t\n\t\t\t\t\t\t*label got_chewed_up\n\t\t\t\t\t\t\"Looks like it got really chewed up,\" you say.\n\n\t\t\t\t\t\t\"For lack of a better term, yes.\" ${silver} stands. \"Rough ride out of hyperspace.\"\n\n\t\t\t\t\t\tYou raise an eyebrow. \"The chupacabra getaway vehicle?\"\n\n\t\t\t\t\t\t${silver} shrugs. \"Maybe. It doesn't look like it's equipped to handle hyperspace properly. Odd cloaking, too. Almost like a prototype, rather than an actual…\"\n\n\t\t\t\t\t\t${silver} trails off.\n\n\t\t\t\t\t\t*if (panel = true)\n\t\t\t\t\t\t\t\"${silver},\" you say hesitantly. \"The Jackalope looked like she was experimenting, too. Almost like she was trying to build a warp gate in her lair.\"\n\n\t\t\t\t\t\t\t${silver} snorts. \"Mad creature. The gravitational center would be all wrong.\"\n\n\t\t\t\t\t\t\t\"I know.\" You look at the wrecked ship again, mulling over the possibilities. \"They couldn't have gotten this far,\" you say at last. \"Not directly from Earth. Hyperspace is too unstable that close to a planet.\"\n\n\t\t\t\t\t\t\t\"She's going a little stir-crazy in exile.\" ${silver} shrugs. \"We'll file a report, let Tweel know. Standard protocol, nothing to fret over.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou have to admit, ${silver}'s insistence on playing by the book is comforting.\n\t\t\t\t\t\t\t*goto sidelong_look\n\t\t\t\t\t\t\n\t\t\t\t\t\t*elseif (el_sid_fail = true)\n\t\t\t\t\t\t\tYou both look around the factory more, but it seems that you've gotten all the information you can out of it. Time for a tactical retreat.\n\t\t\t\t\t\t\t*goto arms_bridge\n\t\t\t\t\t\t\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"Well,\" you say. \"Looks like the stakes just got raised. They may have been the first, but they won't be the last. Come on, let's track them down.\"\n\n\t\t\t\t\t\t\t*label sidelong_look\n\t\t\t\t\t\t\t${silver} gives you a sidelong look. \"Maybe we should investigate a little more. Let's pay a visit to El Sid.\"\n\t\t\n\t\t\t\t\t\t\tDropping in on a mob boss? Sounds like a plan!\n\t\t\t\t\t\t\t*goto el_sid_bridge\n\n\t\t\t\t*else\n\t\t\t\t\tYou poke around the factory, but there's nothing but dust, rust, and despair. It breaks your heart. There's still detritus from the former workers: shards of cups, some comics scrawled in the chupacabra alphabet. You wonder why the factory closed and what the chupacabra are doing now. And if any turned to crime to survive.\n\n\t\t\t\t\tIt doesn't seem fair. The PGPB strives to keep order, but they don't seem terribly interested in fixing things before they break.\n\n\t\t\t\t\t\"You ready?\" ${silver} asks. \n\n\t\t\t\t\t*if (silver_date = true)\n\t\t\t\t\t\tYou take a deep breath. \"Yeah.\" Part of you wants to ask how this is fair, how ${silver_she} can condone the PGPB's role in this, but the words lodge in your throat. Instead, you mumble, \"Let's head back.\"\n\t\t\t\t\t\t*set rule_bender %+15\n\t\t\t\t\t\t*set justice %-15\n\t\t\t\t\t\t*goto silver_kiss_slum\n\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou take a deep breath. \"Yeah.\" Part of you wants to ask how this is fair, how ${silver_she} can condone the PGPB's role in this, but the words lodge in your throat. Instead, you mumble, \"Let's head back.\"\n\t\t\t\t\t\t*goto sidelong_look\n\n\t\t\t*selectable_if (not(haunts_visited)) #\"We should search their old haunts.\"\n\t\t\t\t*label old_haunts\n\t\t\t\t*set haunts_visited true\n\t\t\t\tThe chupacabra escapees were well-known to the PGPB, all with detailed background biographies on file. They all came from a neighborhood not far from your landing site, and not far from the reported sightings.\n\n\t\t\t\t*label chup_village_kids\n\t\t\t\tThe roads weren't great to start with, but they get progressively worse. Muddier and narrower. It saddens you—the PGPB has been targeting the chupacabra pretty aggressively, ostensibly \"cleaning up\" after a rash of mob violence a while back. However, with more and more of the workforce in prison or exile, the economy has never really recovered, leading to more crime. It's a negative feedback loop, and the PGPB's role in it makes you distinctly uncomfortable.\n\n\t\t\t\tThe streets get more crowded and then abruptly empty out. A few huts cluster on the banks of a wide, murky river. Chupacabra pups roughhouse in the space between the huts. When they see you, they stop. \n\n\t\t\t\tYou hadn't really thought this far ahead. \n\n\t\t\t\t*choice\n\t\t\t\t\t#I ask to see their parents.\n\t\t\t\t\t\t*if persuasion > 60\n\n\t\t\t\t\t\t\t\"Hey,\" you say, keeping your voice light and friendly. \"Are there any grown-ups around?\"\n\n\t\t\t\t\t\t\tIf the pups had proper fur, instead of mangy, scraggly manes, they'd look adorable. But they don't, so…they don't. Still, their tails wag. One points a curved claw to the nearest house.\n\t\t\t\t\t\t\t*page_break Thanks, Kid\n\n\t\t\t\t\t\t\tAt first, you're not sure if the chupacabra inside the house is a grown-up. She's slight, smaller than the adults you saw earlier. She shreds meat with her claws and wraps it in broad leaves, ready for cooking over a fire.\n\n\t\t\t\t\t\t\t\"Hi.\" Ignoring your partner's incredulous look, you sit next to her. \"Listen, we have a few questions….\"\n\n\t\t\t\t\t\t\tYou're gentle and persuasive. The chupacabra answers you softly, but dodges the questions relating to the actual escapees. Then suddenly, she sets the food aside. \n\n\t\t\t\t\t\t\t\"I have a question,\" she says. \"Have you visited the old factory?\"\n\n\t\t\t\t\t\t\tYou shake your head.\n\n\t\t\t\t\t\t\tShe looks down. \"I suggest you do.\"\t\n\t\t\t\t\t\t\t*set justice %-10\n\t\t\t\t\t\t\t*goto chup_factory\n\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*label kids_crowd_close\n\t\t\t\t\t\t\tThe kids crowd close together, eyeing you nervously. A slender female chupacabra comes running from the house. \"What do you want?\" she cries.\n\n\t\t\t\t\t\t\tYou quickly explain yourselves. The adult chupacabra motions the pups to get behind her so that she forms a barrier between you and them. She's so slight, she isn't much of a barrier at all…which is precisely why the gesture touches you.\n\n\t\t\t\t\t\t\t\"I have a question,\" she says. \"Have you visited the old factory?\"\n\n\t\t\t\t\t\t\tYou shake your head.\n\n\t\t\t\t\t\t\tHer lips lift from her teeth. \"I suggest you do.\"\n\t\t\t\t\t\t\t*goto chup_factory\n\n\t\t\t\t\t#I join in the game.\n\t\t\t\t\t\t*if rule_bender > 60\n\n\t\t\t\t\t\t\t\"Hey, kids.\" You drop next to them. \"What are we playing?\"\n\n\t\t\t\t\t\t\tA pup throws himself upon you. \"Dogfight!\"\n\n\t\t\t\t\t\t\t\"Cool! I love dogfight!\"\n\n\t\t\t\t\t\t\tAs ${silver}'s jaw drops, you begin playing with the chupacabra pups. You're careful not to hurt them, and it doesn't take long before you're genuinely having fun. Some of the stress melts away, and you beam.\n\t\t\t\t\t\t\t*page_break Awww\n\n\t\t\t\t\t\t\tEventually, you and the pups drop back, exhausted. \"So,\" you say. \"I have a few questions for you.\"\n\n\t\t\t\t\t\t\tThe pups want to be helpful, they really do, but they're kids. One claims that the escapees passed through the main slum area not too long ago; another says they took a secret spaceship from Earth, one with new cloaking technology.\n\n\t\t\t\t\t\t\tIf it's true, that is not a happy thought. Some more carefully directed questions suggest that maybe the chupacabra escaped on a prototype ship, that maybe more escapes are forthcoming….\n\n\t\t\t\t\t\t\tUnless it's just kids being kids.\n\t\t\t\t\t\t\t*page_break Kids, Man \n\n\t\t\t\t\t\t\t\"Huh,\" ${silver} says, as you leave the neighborhood. \"I'm not sure what to make of that.\"\n\n\t\t\t\t\t\t\t\"Me either.\" You sigh. \"Come on, let's try to cover more ground before it gets dark.\"\n\t\t\t\t\t\t\t*goto silver_kiss_slum\n\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto kids_crowd_close\n\n\t\t\t\t\t#I start searching houses.\n\n\t\t\t\t\t\t*if stealth > 60\n\n\t\t\t\t\t\t\tAs ${silver} distracts the pups, you sidle into the houses. None of them have proper locks, and the windows are large and glassless to let in the breeze. Thatched, low-hanging roofs offer some shade. \n\n\t\t\t\t\t\t\tThere isn't much. Some fruit in one house, bits of cloth in another. A chupacabra-shaped doll in a third. Then, you find the drawings.\n\n\t\t\t\t\t\t\tThey aren't much, not detailed. They look like kids' scribbles, but they show a ship leaving Earth, right from the center. Lots of squiggly lines. Smiling chupacabra faces.\n\n\t\t\t\t\t\t\tSomeone's coming. You drop the papers and run.\n\t\t\t\t\t\t\t*page_break Move Out\n\n\t\t\t\t\t\t\tOutside, you catch ${silver} and grab ${silver_his} elbow. Quickly, you describe what you saw. Your partner's blue eyes narrow. \"That's impossible. Just a child's fantasy.\"\n\n\t\t\t\t\t\t\t\"They got off Earth somehow….\"\n\n\t\t\t\t\t\t\t\"Local warp gates can only send small objects! Anything the size of a spacecraft, you have to clear orbit.\" ${silver} shakes ${silver_his} head. \"Let's keep looking, while we still have the light.\"\n\t\t\t\t\t\t\t*goto arms_bridge\n\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tThe first house you sidle into, you surprise a chupacabra. She's young, small, barely an adult. She shreds meat with her claws and wraps it in broad leaves, ready for cooking over a fire.\n\n\t\t\t\t\t\t\t\"Hi.\" Ignoring your partner's incredulous look, you sit next to her. \"Listen, we have a few questions.\"\n\n\t\t\t\t\t\t\tYou're gentle and persuasive. The chupacabra answers you softly, but dodges the questions relating to the actual escapees. Then suddenly, she sets the food aside. \n\n\t\t\t\t\t\t\t\"I have a question,\" she says. \"Have you visited the old factory?\"\n\n\t\t\t\t\t\t\tYou shake your head.\n\n\t\t\t\t\t\t\tShe looks down. \"I suggest you do.\"\n\t\t\t\t\t\t\t*set justice %-10\n\t\t\t\t\t\t\t*goto chup_factory\n\n\t#I search alone.\n\t\t*set rule_bender %+15\n\t\t*label search_alone\n\t\tIt'll be much better if you and ${silver} can cover more ground. Besides, you're looking forward to a little time by yourself again. While you've had the occasional (and always temporary) partner for short-term missions, you're more of a lone wolf deep down.\n\n\t\tSo you cheerfully wave goodbye to ${silver} and strike out deeper into the slums. In fact, as you walk, it's hard to keep a smile from your face. Fresh, warm air, freedom from your partner, and the incredibly golden sunlight that is Rigel IX's best-kept secret.\n\n\t\tOnly the PGPB calls it Rigel IX. The chupacabra have their own name for their home planet. \n\n\t\tValldellum: valleys of light.\n\t\t*page_break Nice Name \n\n\t\t${silver} was heading towards a nearby river and the little hamlet situated on its banks; you're cutting into deeper habitation. Chupacabra watch you from doorways, their claws curling around the tattered blankets that serve in place of doors. That gorgeous sun bounces off the pale stone and shards of tin used for roofing and repairs. You hold an arm up, shielding your eyes, and look away from the sun.\n\n\t\t*label chup_assassin\n\t\tThat's when you spot the chupacabra following you.\n\n\t\t*if relationship_mothman > 60\n\t\t\tShe's being crafty, lurking in the shadows when she can, but there's no mistaking the intention in her hunter's posture. You don't see a gun, but she does have a knife strapped to a band around her waist. She catches you looking, and her teeth flash.\n\n\t\t\t*choice\n\t\t\t\t#I run away. Fast.\n\t\t\t\t\t*goto choice_chup_runaway\n\n\t\t\t\t#I engage in combat.\n\t\t\t\t\t*if combat > 60\n\t\t\t\t\t\tWith one fluid motion, you draw your stunner. The chupacabra pauses, tugging her knife free and assuming a defensive stance. You don't fire a warning shot, just allow the stunner to flash red warning lights along its barrel.\n\n\t\t\t\t\t\t\"I wouldn't try anything,\" you warn.\n\n\t\t\t\t\t\tShe laughs. \"Mothman said you were sharp.\"\n\n\t\t\t\t\t\tYou lower the stunner. \"Wait, what?\"\n\t\t\t\t\t\t*goto chup_mothman\n\n\t\t\t\t\t*else \n\t\t\t\t\t\tHoping to catch the chupacabra off-guard, you whip out your stunner, overbalance, and fall in a heap. The chupacabra leaps on you—you feel her paws in your money pouch, but the wind's knocked out of you, preventing you from protesting.\n\n\t\t\t\t\t\tCurrency units clink, and your money pouch feels lighter. The chupacabra leers down at you.\n\n\t\t\t\t\t\t\"Mothman said you were smart. I'm not sure I believe it, myself….\"\n\n\t\t\t\t\t\t\"Wait, what?\"\n\t\t\t\t\t\t*set cash -5\n\t\t\t\t\t\t*goto chup_mothman\n\n\t\t\t\t#I get myself a hiding place.\n\t\t\t\t\t*label choice_chup_runaway\n\t\t\t\t\t*if stealth > 50\n\t\t\t\t\t\tYou turn and run. A gap shows between the rickety boards of a fence, so you dive through. The chupacabra is on your heels, but you're too fast for her. \n\n\t\t\t\t\t\tBut then, you hear, \"Wait! I'm with Mothman!\"\n\n\t\t\t\t\t\tYou stop and face her. \"What did you say?\"\n\t\t\t\t\t\t*goto chup_mothman\n\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou try to run, but the street feels too open, too exposed. Besides, an unexplained feeling of dread pinches tight around your abdomen. You dive behind some bins piled high with junk, cursing as your catch yourself and your money pouch falls open. Currency units roll across the street and are quickly scooped up by passersby.\n\n\t\t\t\t\t\tThen, the chupacabra yells, \"Wait! I'm with Mothman!\"\n\n\t\t\t\t\t\tYou stop and face her. \"Wait, what?\"\n\t\t\t\t\t\t*set cash -5\n\t\t\t\t\t\t*goto chup_mothman\n\n\t\t\t\t#I acknowledge her directly.\n\t\t\t\t\t*if persuasion > 60\n\t\t\t\t\t\t\"Well, now,\" you say. \"Can I help you with something?\"\n\t\n\t\t\t\t\t\tThe chupacabra shakes her head. \"No, but I can help you.\" She pauses. \"Mothman sent me.\"\n\n\t\t\t\t\t\t\"Wait, what?\"\n\t\t\t\t\t\t*goto chup_mothman\n\n\t\t\t\t\t*else\n\t\t\t\t\t\t\"Well, now…\" you begin. That's all you get out before you feel something in your money pouch. You turn around just as a pickpocket lopes away.\n\n\t\t\t\t\t\tThe chupacabra laughs. \"Sorry about that—you look the PGPB bureaucrat, every inch of you. Easy pickings.\" Then, her eyes darken. \"All the same…Mothman sent me to find you.\"\n\n\t\t\t\t\t\t\"Wait, what?\"\n\t\t\t\t\t\t*set cash -5\n\t\t\t\t\t\t*goto chup_mothman\n\n\t\t\t*label chup_mothman\n\t\t\t\"Mothman.\" She repeats it slowly, as though you're an idiot. \"I think you met him? Tall, glowing red eyes, fairly impressive wingspan….\"\n\n\t\t\t\"I know!\" You cut her off, sighing. \"What does he want?\"\n\n\t\t\t\"This jailbreak—it's the first step. An experiment, if you like. They've found a way to get convicts off Earth, without alerting the PGPB.\"\n\n\t\t\t\"Obviously.\"\n\n\t\t\tThe chupacabra snarls. \"You humans are almost as arrogant as the Tetu! Think! They've got illegal warp gates on Earth's surface, small enough to send goods…the larger gates, the ones ships go through, those are unstable, right? You can only access them out in space. But what if someone found a way to—\"\n\t\t\t*page_break Oh No\n\n\t\t\t\"They've got gates on Earth?\" you whisper. \"Large enough to take living things?\"\n\n\t\t\tThe chupacabra shakes her head. \"Not yet. This jailbreak was an experiment, as I said. The refugees barely survived, and the blast-back damaged the gate itself.\" Her eyes narrow. \"You have some time, but not much.\"\n\n\t\t\tYou need to find ${silver}, but as you go to leave, you pause. \"Why are you helping me like this?\"\n\n\t\t\t\"Because Mothman told me to,\" she says simply. \"He is a powerful ally—or a terrible enemy. Remember that.\"\n\n\t\t\tAnd now, it's back to your initial drop point to rendezvous with ${silver}. The plot, you believe, has thickened.\n\t\t\t*goto arms_bridge\n\n\t\t*else\n\t\t\tShe's being crafty, lurking in the shadows when she can, but there's no mistaking the intention in her hunter's posture. You don't see a gun, but she does have a knife strapped to a band about her waste. She catches you looking, and her teeth flash.\n\n\t\t\tAnd then, she lowers her head, unsheathes her knife, and charges towards you.\n\n\t\t\t*choice\n\t\t\t\t#I dodge!\n\t\t\t\t\t*if stealth > 60\n\t\t\t\t\t\tYou leap out her path just in time. \n\n\t\t\t\t\t\t*label attacker_win\n\t\t\t\t\t\tThe chupacabra pulls up short and spits. \"Mothman has a message, ${name}.\" The use of your name scares your more than her knife. \"This jailbreak? That was an experiment. They'll be better, next time. As for now…\"\n\n\t\t\t\t\t\tShe drives her shoulder into you. It hurts, though you manage to keep silent. The chupacabra spits again. \"I see how it is. You chose not to betray the PGPB. I hope they protect you.\"\n\n\t\t\t\t\t\tShe vanishes into the labyrinth of buildings, leaving you numb. What does she mean, an experiment? Next time? You shiver. Time to head back and find ${silver}.\n\t\t\t\t\t\t*goto arms_bridge\n\n\t\t\t\t\t*else\n\t\t\t\t\t\t*label attacker_fail\n\t\t\t\t\t\tThere's no time. She knocks you flat and rips some currency units from your money pouch. Then she leans over and spits.  \"Mothman has a message, ${name}.\" The use of your name scares your more than her knife. \"This jailbreak? That was an experiment. They'll be better, next time. As for now…\" She gives you a firm kick in the ribs.\n\n\t\t\t\t\t\t\"Mothman could have been an ally, ${name}. You chose wrong.\"\n \n\t\t\t\t\t\tShe vanishes into the labyrinth of buildings, leaving you numb. What does she mean, an experiment? Next time? You shiver. Time to head back and find ${silver}.\n\t\t\t\t\t\t*set cash -5\n\t\t\t\t\t\t*goto arms_bridge\n\n\t\t\t\t#I talk her out of it!\n\t\t\t\t\t*if persuasion > 75\n\t\t\t\t\t\t\"Whoa! Easy!\" you shout.\n\t\t\t\t\t\t*goto attacker_win\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto attacker_fail\n\n\t\t\t\t#I fight! \n\t\t\t\t\t*if combat > 60\n\t\t\t\t\t\tYou fire your stunner. It clips her right foreleg and she stumbles.\n\t\t\t\t\t\t*goto attacker_win\n\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto attacker_fail\n\n\t#I hire the young chupacabra.\n\t\tThe little guy has bright, inquisitive eyes, and his whiskers twitch as you and ${silver} approach. You slow down, not wanting to scare him. His ears prick forward attentively; they don't look quite as ragged as those of the older chupacabra you've seen.\n\n\t\t\"Hi,\" you say. \"I was wondering if you could help us….\"\n\n\t\tThe young chupacabra squints at you. You still haven't changed out of your street clothes, and ${silver} has stashed ${silver_his} badge out of sight.\n\n\t\t\"Are you PGPB?\" the pup asks.\n\n\t\t*choice\n\t\t\t#I lie—this is a planet full of criminals.\n\t\t\t\t\"Nope,\" you say, elbowing ${silver} before ${silver_she} can say anything. \"We're independent explorers.\"\n\n\t\t\t\t\"Really?\" The pup's eyes shine. \"Wow! That's so cool!\"\n\n\t\t\t\t\"Yeah, well.\" You tug your jacket nonchalantly, reveling in his open admiration. \"Listen, we heard there are some pretty cool chupacabra here—present company included.\"\n\n\t\t\t\t\"My mom says I'm cool.\"\n\n\t\t\t\t\"And she's right!\" You crouch down next to the chupacabra pup. His wrinkled lips are quivering. \"But there are others, aren't there? Other explorers. They explored their way from Earth, right to here.\"\n\n\t\t\t\tFor a moment, the pup looks wary. But then, he nods.\n\t\t\t\t*page_break Aha\n\n\t\t\t\tAll this time, ${silver} has been looking at you like you're insane. So, really, not too different from ${silver_his} usual expression. When the pup nods, though, ${silver_she} leans down as well. \"Can you help us find them?\" ${silver_she} asks.\n\n\t\t\t\tThe pup sucks his claw. You hold up a currency unit. \"We'd say thank you.\"\n\n\t\t\t\tHe holds out his paw. The moment you put the coin on his pale little paw pad, it disappears, tucked into his ragged belt. \"All right.\"\n\t\t\t\t*set cash -1\n\n\t\t\t\t*if stealth > 50\n\t\t\t\t\t*label adorable_chup\n\t\t\t\t\t*achieve kidshero\n\t\t\t\t\tAn hour or so later, there's no sign of them. The pup looks distressed. \"I'm sorry,\" he whines.\n\n\t\t\t\t\t\"It's all right.\" You can't ruffle his fur, because he has only a mangy, balding head. But the impulse is there; you're feeling more sympathy for the aliens lately.\n\n\t\t\t\t\t\"Maybe they're at their old village…\" the pup muses. \"But I have to get home.\"\n\n\t\t\t\t\t\"Just point us in the right direction,\" you tell him.\n\n\t\t\t\t\tHe gives you a rough idea, but as he turns away, he hesitates. \n\n\t\t\t\t\t\"I'd really like to see the galaxy one day,\" he says softly. \"Maybe…if you ever need someone to help you…will you remember me? Will you come back?\"\n\t\t\t\t\t\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#\"Awww! You're adorable! Of course I will!\"\n\t\t\t\t\t\t#\"Sorry, kid, you're a little young. Stay in school!\"\n\t\t\t\t\t\t#\"Come back? Erm…sure…\"\n\t\t\t\t\t\t#\"No.\"\n\t\t\t\t\t\t#\"Yes. There's no one else I would want.\"\n\n\t\t\t\t\t${silver} touches your arm. \"We have to go.\"\n\n\t\t\t\t\t*set justice %-15\n\t\t\t\t\t*set rule_bender %+15\n\t\t\t\t\t*set relationship_tweel %-15\n\t\t\t\t\t*goto chup_village_kids\n\n\t\t\t\t*else\n\t\t\t\t\t*label lies_terrible_lies\n\t\t\t\t\t\"I'll stay here as backup,\" ${silver} whispers to you. \"In case he pulls something—one of us will be alive to contact the PGPB.\"\n\n\t\t\t\t\tSo valiant of ${silver}, offering to put ${silver_his} safety on the line so that you can…oh, right. You're the one going with the chupacabra kid.\n\n\t\t\t\t\tWhen you've turned a few corners, the pup suddenly sneers at you. \"You were lying,\" he says. \"You are PGPB.\"\n\n\t\t\t\t\t\"No, I…\"\n\n\t\t\t\t\t\"You are. I can tell.\" He swipes some more of your money and snarls. \"I don't like liars. They're bad people.\" \n\n\t\t\t\t\tAnd with that, he runs off.\n\t\t\t\t\t*set cash -2\n\t\t\t\t\t*page_break Ow\n\n\t\t\t\t\tAre you a bad person? You mull the thought after you let ${silver} know you're safe. You'll keep searching the streets—${silver_she} may try to do some reconnaissance of ${silver_his} own.\n\n\t\t\t\t\tA bad person? The pain in the pup's eyes was so vivid. You replay it, over and over, lost in thought….\n\n\t\t\t\t\t*goto chup_assassin\n\n\t\t\t#I tell the truth.\n\t\t\t\t\"Yes,\" you admit. \"We are.\"\n\n\t\t\t\tThe pup is silent, thinking. \"My mom says the PGPB aren't bad,\" he says slowly. \"But sometimes they make bad choices.\"\n\n\t\t\t\tYou shift uncomfortably. \"We're trying to find some chupacabra who have made very bad choices.\"\n\n\t\t\t\tThe pup's ugly features contort even more with internal conflict, but then he nods. \"Pay up and follow me.\"\n\t\t\t\n\t\t\t\tWell, your guide needs a fair wage. You toss him a coin and trot along after.\n\t\t\t\t*set cash -1\n\t\t\t\t*goto adorable_chup\n\n\t\t\t#I lie by omission only.\n\t\t\t\t*if persuasion > 60\n\t\t\t\t\t\"The PGPB is a huge organization,\" you explain. \"We're just two people. What do you think?\"\n\n\t\t\t\t\tThe pup looks at you uncertainly. \"I guess not?\"\n\n\t\t\t\t\t\"So…there are some chupacabra around. They came from Earth. We need to find them. Do you know where they are?\"\n\n\t\t\t\t\t\"Maybe…\" He drags a claw through the dirt. \"El Sid might.\"\n\n\t\t\t\t\t${silver} inhales sharply. \"The mob boss?\"\n\t\t\t\t\t*page_break\n\n\t\t\t\t\t\"He's nice,\" the pup assures ${silver_him}. \"If you don't annoy him.\" \n\n\t\t\t\t\tYou offer a currency unit. \"Could you take us to him?\"\n\n\t\t\t\t\tThe pup grabs the coin, stuffs it into his raggedy belt. \"I'm not getting too close. But I'll show you where his mansion is.\"\n\n\t\t\t\t\tAs you follow the pup through the narrow streets, you can't help wincing at how skinny he is, how hard the chupacabra seem to be struggling just to survive. Maybe if there were more support systems in place…maybe if the PGPB wasn't so draconian with its punishments…\n\n\t\t\t\t\tThe pup stops abruptly and points. \"Just around the corner, and it's right there.\"\n\n\t\t\t\t\tYou can't ruffle his fur, because he has only a mangy, balding head. But the impulse is there. You offer another coin instead and thank him.\n\t\t\t\t\t*set cash -2\n\t\t\t\t\t*goto el_sid_bridge\n\n\t\t\t\t*else\n\t\t\t\t\t*goto lies_terrible_lies\n\n*label arms_bridge\nAfter all of that adventure, you and ${silver} need to catch your respective breaths. You rest under a bridge, panting, out of sight.\n\nOr so you thought. A furtive chupacabra hisses from the bushes. \"Hey!\"\n\n${silver} holds you back, but you shrug ${silver_him} off to investigate. \"Hey, what?\"\n\n\"Got things for sale.\"\n\nYou check out his wares. You are very tempted. Which one do you want?\n\n*choice\n\t#The shiny new gun.\n\t\t*set combat %+15\n\t\t*set chup_win true\n\t\t*goto purchase\n\n\t#The cloaking device.\n\t\t*set stealth %+15\n\t\t*set cloak true\n\t\t*goto purchase\n\n\t#Weighted netting.\n\t\t*set rule_bender %+15\n\t\t*set net true\n\t\t*goto purchase\n\n\t#Armor.\n\t\t*set resolve %+15\n\t\t*set armor true\n\t\t*goto purchase\n\n*label purchase\nAs you go to hand over your money, the arms-runners eyes narrow. \"Hold on….\"\n\n*if relationship_mothman > 55\n\t\"I know you.\" He checks that ${silver} is out of earshot, but lowers his voice all the same. \"You're that human in Mothman's web.\"\n\n\t\"I'm in his web?\" you say indignantly. \n\n\t\"Whatever. He passes information to you. That means something.\" The chupacabra clicks his claws. \"It means a discount, for one.\"\n\n\t\"Really?\" You fight to keep from grinning too openly. There is something unexpectedly heady about having a connection to a legend like Mothman. Maybe the aliens' underworld isn't so bad after all…. Discounts, right?\n\t*set rule_bender %+15\n\t*set cash -1\n\t*goto stalking\n\n*else\n\t\"What?\" you say nervously.\n\n\tHe freezes…and then scratches himself vigorously behind the ear. \"That's better. Now. The money.\"\n\n\tYou pay up and heft your new purchase. Despite the disapproving looks from ${silver}, it's time to track some convicts.\n\t*set cash -3\n\t*goto stalking \n\n*label stalking\nWhen you and ${silver} resume stalking the escapees, you immediately run into better luck. The communicators still aren't picking up the chupacabra's DNA signatures—really, you need to have a chat with the Tech Department—but going old-school isn't so bad. You find a hair sample, which you successfully scan—you're on the right trail.\n\nFinally, the trail leads you down a twisting path into the jungle. Red-eyed, purple-plumed birds screech from the canopy, and fuzzy things like the unholy children of sloths and monkeys hang from vine-covered branches.\n\nVoices ahead. You've found them.\n\n*if stealth > 80\n\tYou and ${silver} successfully flank the escapees, moving silently through the brush. They're sitting around a campfire, roasting tubers. They don't notice you until it's too late—you've got them handcuffed, trussed, and ready for PGPB pickup.\n\t*goto chup_recovery_win\n\n*elseif (cloak = true)\n\tTime to put that new cloaking device to good use. Being black market, it's not the highest quality, but it will be good enough for this. Motioning ${silver} to stay put, you cloak yourself and slip silently through the brush, the device scattering light rays and shielding you from the sight of the chupacabra. They don't notice you until it's too late—you've got them handcuffed, trussed, and ready for PGPB pickup.\n\t*goto chup_recovery_win\n\n*else\n\tAs you edge forward, a twig cracks, sounding like a gunshot in the jungle. The chupacabra look up from their campfire. And then they leap to their paws, snarling.\n\n\t*if (combat > 70) or (chup_win = true)\n\t\tYou can take them. What move will you pull?\n\n\t\t*fake_choice\n\t\t\t#I stun them!\n\t\t\t#I charge towards them!\n\t\t\t#I use my fancy new gun!\n\t\t\t#I break out the martial arts moves!\n\n\t\tThe fight is over almost before it begins; the chupacabra look fierce, but they are tired and stressed. You easily overpower them, and then they're handcuffed and ready for PGPB pickup.\n\t\t*goto chup_recovery_win\n\n\t*else\n\t\tUh-oh! What now?\n\t\t*choice\n\t\t\t#I stun them!\n\t\t\t\tThanks to your trusty stunner, you incapacitate one, but there are too many for you and ${silver} to handle. Maybe a more skilled fighter could do it—but you watch helplessly as the chupacabra bundle up their fallen comrade and disappear into the jungle. You're too exhausted to give chase. They've escaped for now.\n\t\t\t\t*goto chup_recovery_fail\n\n\t\t\t#I charge towards them!\n\t\t\t\tBellowing a battle cry, you bow your head and charge madly…right into a tree. When the stars fade from your vision, ${silver} is pressing a cold-pack to your head and the chupacabra have vanished. They've escaped for now.\n\t\t\t\t*goto chup_recovery_fail\n\n\t\t\t*selectable_if (armor = true) #I can wear my new armor for defense!\n\t\t\t\tThe armor looks great, but it hinders your movements. The chupacabra dart in, knock you to the ground, and scamper off. By the time you pick yourself up, they're gone.\n\t\t\t\t*goto chup_recovery_fail\n\n\t\t\t*selectable_if (net = true) #I use my weighted net!\n\t\t\t\tSo…you've never used a weighted net before. You swing it around your head, promptly entangle yourself in it, and fall to the ground. By the time you pick yourself up, the chupacabra are gone.\n\t\t\t\t*goto chup_recovery_fail\n\n\t\t\t#I break out the martial arts moves!\n\t\t\t\tIt's a valiant effort, but there are too many chupacabra and they are too quick. You throw kicks, but one gets under your guard and trips you. By the time you pick yourself up, the chupacabra have vanished into the jungle without a trace. They've escaped for now.\n\t\t\t\t*goto chup_recovery_fail\n\n*label chup_recovery_win\nA PGPB ship has been waiting in orbit, so the extraction team arrives quickly. To your immense surprise, Tweel strides out of the hatch. She stands with her boots sinking into the rich soil, looking around the jungle in disgust.\n\n\"Squalid planet,\" she mutters. Then, with an equally disgusted look at the bound chupacabra, she adds, \"Good work, agents. They'll be back on Earth shortly. Take a raise in Clearance Level, both of you.\"\n\n${silver} beams and punches you lightly in the arm. \"Good work, partner! You were amazing!\"\n*set relationship_silver %+15\n*set clearance +10\n*page_break Huzzah\n\n\"Now,\" she continues, as a team of Tetu hustle the chupacabra into the prison transport. \"Tell me what progress you've made with this smuggling ring.\"\n\nSilence.\n\n\"Well?\"\n\n${silver} clears ${silver_his} throat. \"Er, Commissioner Tweel, our investigations in Scotland were unsuccessful, and then we got called away to Texas….\"\n\n\"I see.\" Tweel's eyes narrow. \"Perhaps the three of us ought to have a little talk at Headquarters.\"\n\n${silver} trembles beside you. You force yourself to remain stoic. But deep inside, you're scared too.\n\n*finish\n\n*label chup_recovery_fail\nThe prospect of informing the PGPB of this latest failure sets ${silver} hyperventilating. That is not hyperbole. You're actually deeply concerned that ${silver_she} is going to pass out.\n\n*if (silver_date = true)\n\tYou give ${silver} a hug and then kiss ${silver_him} lightly. This is still new territory for you both. If you're honest, it feels kind of weird…but in a good way…. \n\n\t\"Listen,\" you say. \"Don't worry. I'll make the call to Tweel.\"\n\n\t\"Really?\" ${silver} says, wide-eyed.\n\n\t\"Of course.\" You run your fingers down ${silver_his} cheek. ${silver} shivers. You do, too. \"We're partners now—in more ways than one. I have your back.\"\n\n\t\"But, it's my responsibility….\"\n\n\t\"Don't worry about that.\" \n\n\t${silver} kisses you and you grin as you withdraw your communicator. You could get used to this.\n\t*goto rigel_call_to_tweel\n\n*else\n\tYou sit ${silver} under a tree and make ${silver_him} keep ${silver_his} head between ${silver_his} knees.\n\n\t\"I'm fine!\" ${silver} chokes out.\n\n\t\"Yeah, I kind of doubt that.\" You push ${silver_him} back down. \"Stay there. I'll make the call.\"\n\t*goto rigel_call_to_tweel\n\n*label rigel_call_to_tweel\nIt's about what you expected. Tweel is very disappointed, the PGPB is ashamed of you (not ${silver}—apparently, rather than ${silver} being a good influence on you, you're leading ${silver_him} astray), etc., etc., etc. \n\nThen, something you don't expect. Tweel's brittle voice sharpens even further. \"I want you and ${silver} to come to PGPB Headquarters.\"\n\n\"Commissioner,\" you begin, \"I really don't think—\"\n\n\"Is it what you think that matters, Agent ${name}, or is it what I want?\"\n*page_break\n\nYou have no answer to that. No polite answer, anyway. \n\n\"The PGPB transport meant to carry the prisoners will escort you to me,\" Tweel continues. \"Expect it momentarily. I think it's high time that you, ${silver}, and myself had a frank conversation. Let's call it a check-in.\"\n\nYou wonder how to break the news gently to ${silver}, but ${silver_she} has heard every word. \n\n\"Deep breaths,\" you say. \"Just a check-in.\"\n\n${silver} nods, gulps once, and then ${silver_she} is out cold. \n\nBy the time the transport arrives, ${silver_she} is back on ${silver_his} feet, but obviously still terrified. You'd never admit it, but you are, too.\n\n*finish", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Gaelin\"\n*set justice 30\n*set rule_bender 66\n*set resolve 48\n*set persuasion 60\n*set combat 58\n*set stealth 42\n*set observation 55\n*set clearance 15\n*set cash 238\n*set gender \"male\"\n*set relationship_tweel 52\n*set relationship_silver 35\n*set relationship_mothman 75\n*set ship_name \"Hapax\"\n\nYou hit the Strip, but don't stay long. A real smuggler wouldn't waste time among the flashing lights. If you're looking for trouble, you go straight to the source—the knotted backstreets.\n\nJust as you're fruitlessly turning another corner, there's a commotion up ahead. There's a bat-like Chiroptera pressed against a wall, surrounded by a cadre of Spheroids. She looks like a skinny bat about your height, and she's trembling, large ears pressed flat to her skull, eyeless face pointed downwards. \n\nThe Spheroids have guns.\n*fake_choice\n\t#I walk by. This isn't my fight.\n\t#I try to defuse the situation.\n\t#I charge to the rescue, weapon readied.\n\t#I take their information for a later arrest.\n\n*script changeBackgroundColor(\"black\")\n\n*set name \"Auckland\"\n*set justice 68\n*set rule_bender 32\n*set resolve 60\n*set persuasion 64\n*set combat 51\n*set stealth 78\n*set observation 70\n*set clearance 25\n*set cash 144\n*set gender \"male\"\n*set silver_she \"he\"\n*set silver_him \"him\"\n*set silver_his \"his\"\n*set relationship_tweel 81\n*set relationship_silver 74\n*set relationship_mothman 25\n*set ship_name \"Red Racer\"\n\nHonestly, you're not totally surprised ${silver} pauses in an alcove. You follow when ${silver_she} beckons you. It's a small space, so while you're very well-hidden, you're also very close together. For some reason, the PGPB's antifraternization policy flashes across your mind. Personal relationships between agents aren't [i]prohibited[/i] exactly, but they're not encouraged either. Civil, courteous, and professional—those are Tweel's favorite words.\n\nAs you're thinking all this, ${silver} inhales and ${silver_his} lips part. Oh my. What now?!\n\n*fake_choice\n\t#I kiss ${silver_him}! I kiss ${silver_him} now!\n\t#I pretend I don't know what's happening.\n\t#I gently turn ${silver_him} down.\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Codie\"\n*set justice 48\n*set rule_bender 80\n*set resolve 39\n*set persuasion 54\n*set combat 79\n*set stealth 70\n*set observation 67\n*set clearance 12  \n*set cash 56\n*set gender \"male\"\n*set relationship_tweel 41\n*set relationship_silver 61\n*set relationship_mothman 80\n*set ship_name \"Eureka Maru\"\n\nThe PGPB has a base deep in the Himalayas. You've visited a few times over the years—it's a good spot for parole meetings—and you stride into the room confidently, not even blinking in the bright light. A single long table sits directly in front of you. A few meters further on, the air shimmers innocently. You swallow: it's a field of nanobots, held in place for now, but ready to sting anyone who blunders into them. No wonder the Yeti is sitting so quietly on the other side.\n\n\"Agent,\" the Yeti begins. \"I have been exiled to this planet for one hundred and eighty-one years. That's nearly half a lifetime for a Hirsus like me. I've learned my lesson; I'm ready for parole.\"\n\nYou need to say something!\n\n*fake_choice\n\t#\"If that's true, why do we keep hearing reports that you've been sighted?\"\n\t#\"It has been a long exile. Why don't you tell us how you've changed?\"\n\t#\"You were sent to this penal colony for a reason! How can we trust you?\"\n\t#\"Don't you eat people?\"\n\n*set name \"Mairi\"\n*set justice 22\n*set rule_bender 75\n*set resolve 52\n*set persuasion 78\n*set combat 30\n*set stealth 81\n*set observation 57\n*set clearance 5  \n*set cash 327\n*set gender \"female\"\n*set relationship_tweel 69\n*set relationship_silver 58\n*set relationship_mothman 33\n*set ship_name \"Grey Run\"\n\nTweel is nothing but a silhouette against the backdrop of stars, but you see her raise her own weapon. The station gives a tired, moaning sound, and then the emergency lighting system kicks in. Soft, pale green strips of light glow in three bands: one at floor level, one at eye level, and one near the ceiling. \n\n\"Tweel…\" You drag your fingers over the schematics, enlarging them. Just to make sure. \"The Earth Monitoring System was hit the worst. Circuits are completely fried.\" \n\nYou gulp. The smuggling, the jailbreak, and now Earth is completely unobserved. This is no coincidence. \n\n*fake_choice\n\t#I head for the main grid—I can fix this!\n\t#I go to the auxiliary power unit, it’s safer.\n\t#I'll remain here and help Tweel. She needs me!\n", "spheron": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Yeti's Parole Officer[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\nPulsing neon.\n\nHyperspace is beautiful and deadly all at once, surrounding your ship on all sides. Pinks and yellows merge and meld around you, shot through with thin purple lines like the filaments of a light bulb. It's so far removed from the greys and greens of your childhood home that it still makes your head hurt a little. \n\nWaves of energy pummel the ship. Warp gates, the doorways to hyperspace, are the key to bridging the gulfs of interstellar space, but they're highly unstable and even more dangerous. For that reason, they're highly regulated. Sometimes, an illegitimate gate appears on the grid, but that's like punching holes through a delicate web. The PGPB always jumps to shut them down.\n*page_break BOOM\n\nAnother shockwave shudders the length of your ship. Conditions in hyperspace are usually dicey at best, but you haven't seen pulsations this bad for years.\n\nA console light blinks. That last pounding damaged one of your gyroscopes, the instruments that help you navigate hyperspace. You can try to fly completely manually, but there might be a few technical tricks to test out. Then again, you're not used to piloting this type of ship….\n\nThe ship lists to one side. You've got to make a choice.\n\n*choice\n\t#Disengage gyroscopes. I'm going totally manual.\n\t\tWith a soft shudder, the flagging gyroscopes release entirely. It's almost like the ship sighs in relief. With the damaged instruments no longer affecting the ship's systems, you're free to see about getting yourself out of here. It'll just take intense concentration.\n\n\t\t*if resolve > 50\n\t\t\tFor the next several minutes, your universe narrows to the ship and the streaming ribbons of color that lash it. Your focus is absolute—that's one of your skills as a PGPB agent. Committed to the task at hand, you calmly pilot the ship through volatile hyperspace.\n\n\t\t\tA black rip opens in the pink-yellow-orange tapestry. It's the warp gate! You've done it!\n\t\t\t*set resolve %+15\n\t\t\t*set relationship_tweel %+15\n\t\t\t*goto arrival_spheron\n\t\t*else \n\t\t\tThis is no time for distractions, but you start to waver, second-guessing yourself. Part of you knows that you should just buckle down to the task at hand, but you can't—there's too much happening, both outside the ship and inside your head. \n\n\t\t\tIt's like being caught in a thunderstorm. A black rip—the warp gate back to regular space—dangles temptingly ahead, but there are a thousand distractions in between. One of them is a particularly large surge of energy, which knocks out half your shields and a section of the shipboard archives.\n\t\t\t*page_break Oops\n\n\t\t\tAt last, your ship limps through the gate, back to regular space. A quick diagnostic confirms your suspicions. Your preoccupation while piloting has resulted in more damage. Nothing to do now but send a maintenance request and wait for Tweel to upbraid you.\n\n\t\t\tOh, and investigate the planet below.\n\t\t\t*set relationship_tweel %-15\n\t\t\t*goto arrival_spheron\n\n\t#I search the manual for the documented fix.\n\t\tEvery ship has a manual somewhere in its archives. Hesitant to attempt any creative fixes, you call up the schematics and guide. It's huge, but you remember seeing something like it during your time at the Academy. \n\n\t\tHope you studied hard!\n\t\t*page_break\n\t\t*if rule_bender \u003c 60\n\t\t\tOf course you always studied hard! This ship might be alien to you (pardon the pun), but as a student you spent hours drilling technical information into your head. So you know precisely where in the manual to look. And once you find the relevant information, you can interpret it at light speed (again, pardon the pun) to right the ship.\n\n\t\t\tYour fingers fly over the console, punching in code that essentially patches over the gyroscopes. It's not a permanent fix, but it'll get you to your gate.\n\t\t\t*page_break Fly On\n\n\t\t\tWith the correct code in place, the ship's responses improve dramatically. It rides the swells of energy like a surfer adjusting to every rise and trough in the ocean. Then a black rip opens in the pink-yellow-orange tapestry. It's the warp gate! You've done it! And with no further damage to the ship! Tweel will be pleased.\n\t\t\t*set relationship_tweel %+15\n\t\t\t*goto arrival_spheron\n\t\t*else\n\t\t\tAfter so many years, saying something \"might as well be in an alien script\" has pretty much lost its meaning. Still, as you scroll through the manual, you're completely lost. Possibly, you should have spent more of time studying and less time engaging in…other pursuits. Who knew your choices as a student would catch up to you now?\n\t\t\t*page_break Oops\n\n\t\t\tAbandoning your efforts to use an official repair on the gyroscopes, you fall back on punching wild strings of code, whatever you think will work.\n\t\t\t*goto repair_fail\n\n\t#I work with my remaining 'scopes. I got this.\n\t\tThere's no sense in fully deactivating the gyroscopes. Sure, they're damaged, but that doesn't mean they're useless. Between the bits of information they're feeding you and your own piloting skills, you should get through all right.\n\t\t*if observation > 65\n\t\t\tIt's difficult to see at first, but there is a pattern in the swells of hyperspace. The colors run together in subtle patterns, currents of energy that require a keen eye to detect. Calmness settles over you as you let yourself sink into those patterns.\n\n\t\t\tThis makes sense. With the failing gyroscopes running supplementary information, you steer your ship towards the correct warp gate. A black rip appears in the tapestry of color. Riding hyperspace, you maneuver towards it. \n\n\t\t\tYou're through, with no additional damage. Well done!\n\t\t\t*set relationship_tweel %+15\n\t\t\t*goto arrival_spheron\n\t\t*else\n\t\t\tColors belt the ship: pinks, yellows, and oranges that are somehow just slightly wrong. There is no rhyme or reason to anything happening in hyperspace. At least, none that you can detect. \n\n\t\t\tAt last, your ship limps through the gate, back to regular space. A quick diagnostic confirms your suspicions. Your preoccupation while piloting has resulted in more damage. Nothing to do now but send a maintenance request and wait for Tweel to upbraid you.\n\n\t\t\tOh, and investigate the planet below.\n\t\t\t*set relationship_tweel %-15\n\t\t\t*goto arrival_spheron\n\t#I use a standard override. I've been in enough fights that I have it memorized from other ships.\n\t\t*if combat > 60\n\t\t\tYou've been in enough fights over the years that you know your way around different ships—even ones built for hyperspace. Really, the configuration reminds you of an old battle cruiser you flew through the Asteroid Belt once. Fun times, hunting down some of the Jackalope's cronies. \n\n\t\t\tBut that's beside the point. The point is that you punch in the override without hesitation. Some people like looking everything up; you prefer the instinct and knowledge born from hard experience.\n\n\t\t\tAnd it works. With the correct code in place, the ship's responses improve dramatically. It rides the swells of energy like a surfer adjusting to every rise and trough in the ocean. Then a black rip opens in the pink-yellow-orange tapestry. It's the warp gate! You've done it! And with no further damage to the ship! Tweel will be pleased.\n\t\t\t*set relationship_tweel %+15\n\t\t\t*goto arrival_spheron \t\t\n\n\t\t*else\n\t\t\t*label repair_fail\n\t\t\tAs you punch buttons, flick switches, and tap at the console screen, a bead of sweat rolls down your temple. Maybe this particular override works on your transport back on Earth, but that ship has profoundly different gyroscopes. \n\n\t\t\tAfter all, that ship never goes beyond the Moon's orbit. This is hyperspace, and honestly, you're just not that familiar with it. The ship groans and rattles as yet another override proves ineffective. Guess you should've thought of this before.\n\t\t\t*page_break Guess So\n\t\t\t\n\t\t\tAt last, your warp gate appears up ahead. Your ship limps through the gate, back to regular space. A quick diagnostic confirms your suspicions. Your preoccupation while piloting has resulted in more damage. Nothing to do now but send a maintenance request and wait for Tweel to upbraid you.\n\t\n\t\t\tOh, and investigate the planet below.\n\t\t\t*set relationship_tweel %-15\n\t\t\t*goto arrival_spheron\n\n*label arrival_spheron\nClouds race across the surface of Spheron. It's about the size of Earth, but smaller enough that you'll have a slight spring in your step from the reduced gravity. Even from orbit, you spy red and blue lights piercing the cloud cover, most of them concentrated at one specific point.\n\nAh, the Strip.\n*page_break Descend\n\nOnce seen, never forgotten. With cloaking up to maximum, you hover over it, searching for an inconspicuous place to land. The Strip itself is a wide thoroughfare, studded with neon and scrolling marquees easily five times your height. \n\nTangled alleys and lanes spill off the main street. There's less neon there, the deals run shadier, and tourists fear to tread some of the dimmer byways.\n*page_break No Fear Here\n\nThere's a vacant lot not far from the Strip. You wedge the ship into a distant corner and disembark.\n\nImmediately, you wince. A steady drizzle falls on your head; it feels like the dampness is seeping right into your bones. Streetlights shine off the slick streets, almost like they're pointing you to the Strip.\n\nBut before you can start investigating, you need a plan.\n\n*choice\n\t#I investigate in full uniform.\n\t\t*set justice %+20\n\t\tThis is official PGPB business, so why wouldn't you wear your official uniform? Better these convicts know who they're dealing with. You pause by a puddle to straighten your lapel, and then head into the streets.\n\t\t*page_break\n\n\t\tOn the Strip, it's easy to tell who's a tourist and who's working the game. The tourists light up when they catch sight of your badge. They press close to you. \n\n\t\tThe more world-weary (and world-wearying) slouch in doorways, watching you with a myriad of eyes. In particular, it's hard to miss the Spheroids. One up ahead keeps turning around to look at you, his single blue eye as bright and clear as a tropical sea.\n\t\t*page_break Hang A Left\n\n\t\t*label first_questioning\n\t\tOnce you turn off the main Strip, you get more looks. The bars and \"clubhouses\" get progressively more run down the further into the back streets you go. Most aliens refuse to make eye contact with you, but there's a trio up ahead who look promising.\n\n\t\tA Hirsus, a Spheroid, and a bat-like Chiroptera lounge down a dead-end alley. Which one do you want to question?\n\t\t*choice\n\t\t\t#The Hirsus.\n\t\t\t\tMaybe it's the Yeti and Moehau Monster lingering in your mind, but you approach the Hirsus. He stretches, muscles rippling under his pelt. \"What?\" he grunts.\n\n\t\t\t\tYou flash your badge. \"Pan-Galactic Prisons Bureau. Here to ask some questions. Walk with me.\"\n\n\t\t\t\tThe Hirsus glances to his companions, but then shrugs and follows you just out of their earshot. \"I didn't do nothing,\" he says. \n\n\t\t\t\t\"We know about the contraband,\" you cut in.\n\t\t\t\t*page_break Oh Snap\n\n\t\t\t\tTo his credit, the Hirsus recovers quickly. \"I might have heard a rumor.\"\n\t\t\t\t\n\t\t\t\t*if persuasion > 65\n\t\t\t\t\t\"I might have a role in handing out immunities.\"\n\n\t\t\t\t\tThe Hirsus sizes you up. \"Do you?\"\n\n\t\t\t\t\t\"I don't know.\" You smile. \"Heard a rumor?\"\n\n\t\t\t\t\tThe Hirsus laughs: a whuffing noise that showcases his long eyeteeth. \"Follow me.\"\n\t\t\t\t\t*goto seedy_bar\n\t\t\t\t*else\n\t\t\t\t\tYou straighten. \"You are required to tell PGPB authorities of any illegal activity, suspected or otherwise.\"\n\n\t\t\t\t\tThe Hirsus snarls. \"And now I just forgot my rumor.\"\n\n\t\t\t\t\t\"But—\"\n\n\t\t\t\t\t\"I might remember it…for a price.\"\n\n\t\t\t\t\tYou don't have to take that, ${name}!\n\t\t\t\t\t\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I berate him!\n\t\t\t\t\t\t\t*if persuasion > 55\n\t\t\t\t\t\t\t\t\"Well, I never!\" you say, fanning the flames of your self-righteous indignation for all you're worth. \"It's been a long time since I've seen such cowardice. I bet you don't know anything, do you? Do you?\"\n\n\t\t\t\t\t\t\t\tYou lean right into his face. \"Do you?\"\n\n\t\t\t\t\t\t\t\tThe Hirsus takes a step back, obviously stunned. \"Wait, I do….\"\n\n\t\t\t\t\t\t\t\t\"Then why this song-and-dance? Trying to make yourself feel big? Feeling big now, you big furry…big thing, you?\"\n\t\n\t\t\t\t\t\t\t\tVisibly overwhelmed, the Hirsus raises his paws. \"Hold up!\" \n\n\t\t\t\t\t\t\t\tIt doesn't take too long after that. Still trembling, the Hirsus leads you to a spectacularly seedy bar. Once he's shown you the place, he vanishes back into the alleys. \n\t\t\t\t\t\t\t\t*goto seedy_bar\n\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\"Well, I never!\" you say, fanning the flames of your self-righteous indignation for all you're worth. \"It's been a long time since I've seen such cowardice. I bet you don't know anything, do you? Do you?\"\n\n\t\t\t\t\t\t\t\tYou lean right into his face. \"Do you?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe Hirsus laughs. \"Nice try. No money, no intel.\"\n\n\t\t\t\t\t\t\t\tWell, bribery is unfortunate, but often necessary. You cough up the dough, and soon find yourself in front of a spectacularly seedy bar. Once the Hirsus has shown you the place, he vanishes back into the alleys. \n\t\t\t\t\t\t\t\t*set cash -5\n\t\t\t\t\t\t\t\t*goto seedy_bar\n\n\t\t\t\t\t\t#I fight him!\n\t\t\t\t\t\t\t*if combat > 55\n\n\t\t\t\t\t\t\t\t\"I don't think so.\" You slip your stunner out. Though the Hirsus is much bigger than you, you keep your demeanor calm. Professional. And terrifyingly battle-hardened. \"I think you remember it right now.\"\n\t\n\t\t\t\t\t\t\t\t\"Yeah?\"\n\n\t\t\t\t\t\t\t\tYou shrug, turn as though you're about to walk away. Then, before he can react, your foot shoots out, catching him on the ankle. It's a weak spot for Hirsus, and caught off-guard, he ends up flat on his back.\n\t\t\t\t\t\t\t\t*page_break Take That\n\t\t\t\t\n\t\t\t\t\t\t\t\tHe pants. Casually, you point the stunner at him. \"Remember now?\"\n\n\t\t\t\t\t\t\t\tHe snarls. You wait, eyes narrowed.\n\n\t\t\t\t\t\t\t\tAt last, he nods. You let him up, and before long, he's led you to a spectacularly seedy bar. Once he's shown you the place, he vanishes back into the alleys.\n\t\t\t\t\t\t\t\t*goto seedy_bar\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"I don't think so.\" You start to draw your stunner, but the Hirsus is faster. With a flick of his wrist, he knocks it from your hand. You scuttle after your weapon as he laughs.\n\n\t\t\t\t\t\t\t\t\"What do you think?\" he calls. \"The longer you wait, the worse my memory gets!\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tWell, bribery is unfortunate, but often necessary. You cough up the dough, and soon find yourself before a spectacularly seedy bar. Once the Hirsus has shown you the place, he vanishes back into the alleys.\n\t\t\t\t\t\t\t\t*set cash -5\n\t\t\t\t\t\t\t\t*goto seedy_bar\n\n\t\t\t\t\t\t#I track him. Maybe he'll lead me somewhere!\n\t\t\t\t\t\t\t*if stealth > 55\n\t\t\t\t\t\t\t\tYou smile, nod, and melt into the shadows. After a while, the Hirsus leaves the others. Acting on a hunch, you follow him as he travels through the twisting streets and back alleys. \n\n\t\t\t\t\t\t\t\tOnce or twice, the crowds swarm so aggressively you almost lose him, but you're an experienced enough tracker to stay on his tail.\n\n\t\t\t\t\t\t\t\tHe never notices you. Eventually, you trail him to a spectacularly seedy bar. The Hirsus disappears inside without a backwards glance. \n\n\t\t\t\t\t\t\t\tThis must be the place.\n\t\t\t\t\t\t\t\t*goto seedy_bar\n\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\tYou smile, nod, and melt into the shadows. After a while, the Hirsus leaves the others. Acting on a hunch, you follow him around a corner and down a few more twisting streets. You barely manage to keep track of the Hirsus. Nerves get the better of you—you walk too quickly and your footsteps echo through the alley.\n\n\t\t\t\t\t\t\t\tThe Hirsus turns, smiling. \"I knew you were there.\"\n\n\t\t\t\t\t\t\t\t\"Uh…\"\n\n\t\t\t\t\t\t\t\t\"Not too late, you know.\"\n\n\t\t\t\t\t\t\t\tWell, bribery is unfortunate, but often necessary. You cough up the dough, and soon find yourself before a spectacularly seedy bar. Once the Hirsus has shown you the place, he vanishes back into the alleys.\n\t\t\t\t\t\t\t\t*set cash -5\n\t\t\t\t\t\t\t\t*goto seedy_bar\n\n\t\t\t#The Spheroid.\n\t\t\t\tAs a professional, you waste no time. \"PGPB. Got a few questions for you.\"\n\n\t\t\t\tThe Spheroid blinks his single eye, shifting on his stubby little legs. Beneath the eye, a lipless mouth parts, and his forked tongue darts over pebbly blue skin.\n\n\t\t\t\t\"We've received reports of contraband Earth products arriving on Spheron. Know anything about this?\"\n\n\t\t\t\tMaybe he's excessively honest or just dim, but the Spheroid's voice rumbles up, \"Yes.\"\n\t\t\t\t*page_break Okay Then\n\n\t\t\t\tYou wait, but that seems to be it. Finally, you say, \"Can you tell me more?\" \n\n\t\t\t\t\"No.\" With that, he trundles away.\n\n\t\t\t\tUh-oh, do something!\n\t\t\t\t*choice\n\t\t\t\t\t#I intimidate him!\n\t\t\t\t\t\t*if combat > 60\n\n\t\t\t\t\t\t\t\"Stop right there.\" You slip your stunner out. The Spheroid pauses. You keep your demeanor calm. Professional. And terrifyingly battle-hardened. \"Let's try this again.\"\n\n\t\t\t\t\t\t\tThe Spheroid's eye waters. \"Don't shoot.\"\n\n\t\t\t\t\t\t\t\"I won't…if you tell me what I want to know.\"\n\n\t\t\t\t\t\t\tThe rotund alien hesitates, blinking rapidly. He chews his rubbery lower lip, while you wait with your eyes narrowed and your stunner trained on him.\n\n\t\t\t\t\t\t\tAt last, he nods. You don't put the stunner away, but motion him to go on. Before long, he's led you to a spectacularly seedy bar. Once he's shown you the place, he vanishes back into the alleys.\n\t\t\t\t\t\t\t*goto seedy_bar\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Stop right there.\" You start to draw your stunner, but the Spheroid chuckles. Without any hesitation, he trundles forward. He slams into you, knocking the wind from your lungs and the stunner from your hand. You scuttle after your weapon as his chuckling deepens.\n\n\t\t\t\t\t\t\t\"Funny,\" he says. Then his laughter dies. \"I like money better. Bribe?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\tWell, bribery is unfortunate, but often necessary. You cough up the dough, and soon find yourself before a spectacularly seedy bar. Once the Spheroid has shown you the place, he vanishes back into the alleys. \n\t\t\t\t\t\t\t*set cash -15\n\t\t\t\t\t\t\t*goto seedy_bar\n\n\t\t\t\t\t#I bribe him!\n\t\t\t\t\t\t\"Wait!\" you call. \"Let's talk about this!\"\n\n\t\t\t\t\t\t\"No.\"\n\n\t\t\t\t\t\t\"I can give you things.\" You hold out a few Standard Currency Units. \"What do you think?\"\n\t\t\n\t\t\t\t\t\tThe Sphe
