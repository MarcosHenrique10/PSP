r}?\"\n\n${silver} could not look more innocent if ${silver_she} tried. \"Tweel sent me to work with you.\"\n\n\"Work with me, or work instead of me?\" You battle a rising tide of unease. \"This is my investigation! What is Tweel playing at?\"\n\n${silver} twirls a plastic straw between ${silver_his} fingertips. \"Thought you needed some assistance, I suppose. Come now, ${name}, you should trust Tweel.\"\n*page_break Hmmm\n\nThis is an unexpected development. What do you think about it?\n\n*choice\n\t#Actually, I don't mind. I've wanted to get to know ${silver} better.\n\t\t\"Well, it has been a rough go,\" you say, shaking ${silver_his} hand. \"I'm looking forward to working with you.\"\n\n\t\t*if (silver_sweet = true) or (silver_hardworker = true)\n\t\t\t${silver} nods enthusiastically. \"Likewise. It's good to be out in the field. I just hope we make Tweel proud!\"\n\n\t\t\tRight. ${silver} has a reputation for eagerness, particularly where it relates to ${silver_his} work. \n\n\t\t\t*if (silver_sweet = true)\n\t\t\t\tIn a funny way, ${silver} reminds you of Andrew-down-the-way, the farmer boy from so long ago. There's something in ${silver_his} smile—some shy, hidden sweetness.\n\n\t\t\t\t\"Come on,\" you tell ${silver_him}. \"Let's move out.\"\n\t\t\t\t*set relationship_silver %+30\n\t\t\t\t*set rule_bender %-15\n\t\t\t\t*goto nessie_inlet\n\t\t\t\n\t\t\t*else\n\t\t\t\tIn a funny way, ${silver} reminds you of Sara the milkmaid; ${silver_she} has that same solid commitment and work ethic. No matter what happens, you know ${silver} will find a way to get the job done.\n\t\t\t\t*goto comforting\n\n\t\t*else\n\t\t\tYour counterpart nods. \"Good. Hopefully this won't take too long. What are your plans now?\"\n\n\t\t\t\"I'm interviewing Nessie tonight.\" You toy with a chip; ${silver} isn't quite as frosty as you remember ${silver_him} in the past. \"Will you come?\"\n\n\t\t\t\"Of course. I'll make a report to Tweel after. She needs to know what a good job you're doing, ${name}.\"\n\t\n\t\t\t*if (silver_charismatic = true)\n\t\t\t\tThere's a sparkle in ${silver}'s eyes that reminds you of your old flame, Mr. W.T. Books, Esq. Now [i]there[/i] was a charismatic man…and you suspect ${silver} is cut from the same cloth.\n\n\t\t\t\t\"Time to move out,\" you say. When ${silver} nods lightly, you shake your head—${silver_she} definitely reminds you of old Books. \n\n\t\t\t\t*label comforting\n\t\t\t\tIn any case, that's comforting. Maybe ${silver} is your good-luck charm!\n\t\t\t\t*set relationship_silver %+30\n\t\t\t\t*set rule_bender %-15\n\t\t\t\t*goto nessie_inlet\n\n\t\t\t*else\n\t\t\t\t${silver} keeps a straight face. You're pretty sure that ${silver_she} is being sincere, but you still get the sense that ${silver_she} is privately amused by something. That tilt of ${silver_his} head, the knowingness of ${silver_his} smile—it's always reminded you of someone.\n\n\t\t\t\tThen it hits you: Lady Serena.\n\n\t\t\t\tNow you're the one privately amused. \"Come on,\" you tell ${silver}. \"We need to find Nessie.\"\n\t\t\t\t*set relationship_silver %+30\n\t\t\t\t*set rule_bender %-15\n\t\t\t\t*goto nessie_inlet\n\n\t#That ambitious ${silver} is trying to horn in on my case!\n\t\tInstantly, you go on alert. This is your investigation, these convicts are your responsibility, and you're not letting anyone take that from you. Glancing around the fish and chips shop, you lean towards ${silver} and lower your voice. \"I trust Tweel. I don't trust you.\"\n\n\t\t${silver} sits back, spreading ${silver_his} hands wide. \"Look, ${name}, I'm just trying to do my job, same as you.\"\n\n\t\t\"Trying to do your job, or trying to do mine?\"\n\t\t*page_break\n\t\t\n\t\t*if (silver_charismatic = true) or (silver_soubrette = true)\n\t\t\t${silver} laughs. And then, ${silver_she} pats your cheek. It's just quick, a light brush of ${silver_his} fingers, but it sparks a frustrating mix of desire and irritation. \"Come on, ${name}, we're on the same side.\"\n\n\t\t\tYou swat ${silver_him} away. \"I was doing just fine.\"\n\t\n\t\t\tSuddenly, ${silver_his} blue eyes narrow. \"Evidently, Tweel doesn't think so.\"\n\t\t\t*goto start_to_protest\n\t\n\t\t*else\n\t\t\t${silver} looks wounded. \"I just want what's best for the PGPB.\" \n\n\t\t\tYou feel like you kicked a puppy, but still. \"${silver}, this is my case.\"\n\n\t\t\t${silver} smiles. You think it's meant to be reassuring. \"Now it's [i]our[/i] case,\" ${silver_she} says.\n\t\t\t*goto start_to_protest\n\t\t\n\t\t*label start_to_protest\n\t\tYou start to protest, but ${silver_she} keeps talking. \"I assume you've arranged to meet the convict?\"\n\n\t\t\"Nessie?\" Really, ${silver_she} might as well use her adopted name; Nessie likes it. \"Yes, I have.\"\n\n\t\t\"Good.\" ${silver} nabs a chip from your packet. \"I'll come with you.\"\n\t\t\n\t\tOh, joy.\n\t\t*set relationship_silver %-20\n\t\t*set resolve %+10\n\t\t*goto nessie_inlet  \n\n\t#I'm miffed. Tweel thinks I'm incompetent!\n\t\tAnger pounds hot and sharp through your temples. Without even realizing, you begin shredding the newspaper wrapping the remains of your meal. \"I don't need assistance.\"\n\n\t\t\"Evidently, Tweel thinks otherwise.\" Oh, that smirk. You'd almost forgotten. The irony kills you—${silver} is one of the few other humans in your position, and you can't stand each other.\n\n\t\t\"I've been doing just fine.\"\n\t\t*page_break That's Right\n\n\t\tAt that, ${silver} shoots you a look. You're not sure if you're being paranoid or astute. \"All I know,\" ${silver} says slowly, \"is that Tweel asked me to come. And since…\" Here, ${silver_she} smiles. \"And since I am a dutiful, dedicated agent, I could do nothing but obey.\"\n\n\t\t\"Fine.\" Fuming, you add, \"I'm dutiful and dedicated too, you know.\"\n\n\t\t\"I'm sure.\" ${silver} shrugs. \"I assume you have a rendezvous with the convict set up?\"\n\n\t\t\"We're meeting Nessie at the usual time, usual place.\"\n\n\t\tYou emphasize Nessie's name. It doesn't seem to help.\n\t\t*set relationship_tweel %-5 \n\t\t*set combat %+10\n\t\t*set relationship_silver %-20\n\t\t*goto nessie_inlet\n\n\t#An extra pair of hands? Awesome! ${silver} can do all the legwork! \n\t\t\"Oh, good,\" you say. ${silver} blinks, but you beam. \"I could use an assistant.\"\n\n\t\tFor a second, you think ${silver_his} eyebrows will shoot right off ${silver_his} face. \"Assistant?!\"\n\n\t\tAdd a little sweetness to that smile. Go on. \"That's why you're here, isn't it?\"\n\t\t*page_break This Is Fun\n\n\t\t${silver} scowls. \"I'm here on Tweel's orders, ${name}.\"\n\n\t\tHm. Well, that's troubling. \"But…you'll still help with the running around, right?\"\n\n\t\tMoving ${silver_his} chair to avoid a crowd of teenagers rushing past with their meals, ${silver} relaxes. A little. \"Absolutely.\"\n\n\t\t\"Good.\" Tossing the grease-stained scraps of newspaper in the rubbish bin, you stand. \"Then, let's go.\"\n\t\t*set relationship_silver %+20\n\t\t*set persuasion %+10\n\t\t*goto nessie_inlet\n\n*label nessie_inlet\nBy the time you arrive at the inlet, the clouds have mostly cleared away. Moonlight sparkles off the loch like shattered glass. You shiver in the chill wind.\n*if relationship_silver > 50\n\tYou while away the remaining minutes making small talk with ${silver}. Sure, it's a little strained, but you have to admit, it is kind of nice to have someone who knows what you're going through. Maybe the PGPB should run support groups, at least for its human agents.\n\t*if (silver_hardworker = true) or (silver_sweet = true)\n\t\tYou don't get to talk for too long, though. ${silver} seems a little shy and very much focused on the job at hand. Maybe you'll get more time later, after ${silver_she} has warmed up to you.\n\t\t*goto nessie_meeting_two\n\n\t*else\n\t\tConversation with ${silver} is almost an art form in itself; you can hardly keep up with ${silver_him}.\n\t\t*if (silver_charismatic = true) \n\t\t\tYes, Mr. Books would have liked ${silver_him}.\n\t\t\t*goto nessie_meeting_two\n\t\t*else\n\t\t\tYes, Lady Serena would have liked ${silver_him}.\n\t\t\t*goto nessie_meeting_two\n\t\t\n*else\n\tIt's an awkward silence, but even that's better than more conversation with ${silver}. You can't quite put your finger on what irritates you so much. Something in the way ${silver_she} struts, maybe, some curl to ${silver_his} lip. \n\n\tOr maybe it's the way ${silver_she} keeps tapping ${silver_his} communicator and then smugly relating news from PGPB headquarters. Not that you care that Tweel apparently adores ${silver}. Not at all.\n\t*goto nessie_meeting_two\n\n*label nessie_meeting_two\nSuddenly, a wave disrupts the placid loch. ${silver} scrambles from ${silver_his} perch on a rock near the shore. \"The convict's coming!\"\n\n*if justice \u003c 50\t\n\t\"It's Nessie,\" you remind ${silver_him}.\n\n\t${silver} looks at you as though you've gone insane and zips ${silver_his} jacket higher. \"Convicts are convicts are convicts.\"\n\n\tYou'd like to ask what ${silver} would think if someone insisted on stripping ${silver_his} name and identity, but then Nessie heaves herself onto the shore.\n\t*goto nessieshore\n\n*elseif rule_bender > 50  \n\tChecking the time on your communicator, you nod. \"Right on schedule.\"\n\t\n\t\"Actually,\" ${silver} begins, in a tone that heralds a lecture, \"PGPB protocol states than when dealing with convicts at this latitude, official questioning and rendezvous should take place between the hours of 0230 and 0400 hours local time, to lessen the likelihood of civilian interference.\"\n\n\tIt's just on 0215. It's hard to admit, but ${silver_she} is right. You have a feeling you're going to be getting tired of ${silver_him} being right. Before you can formulate a response, Nessie heaves herself onto the shore.\n\t*goto nessieshore\n*else\n\t\"About time,\" you say.\n\n\t${silver} snorts. \"Just let me handle the questioning, all right?\"\n\n\t\"You're here to assist me,\" you remind ${silver_him}. \"We'll do it together.\"\n\n\tBefore ${silver} can respond, Nessie heaves herself onto the shore. \n\t*goto nessieshore\n\n*label nessieshore\nShe certainly is a sight to behold. Approximately four meters from tip to tail—some stories do get a little exaggerated—with four paddle-like flippers; a smooth, blunt-nosed head; and a long neck. All in all, a fine specimen of a Plesian. \n\nBeside you, ${silver} rolls ${silver_his} eyes and flashes ${silver_his} badge. \"Agents Silver and ${name}, here to question you.\"\n\nNessie waves a large flipper. \"Oh, darling, I know who you are. Young ${name}—oh, don't give me that look, gorgeous, you are young. At least, compared to me. Anyway, young ${name} told me the PGPB would be paying a little social call.\"\n\nSilence from ${silver}.\n*page_break Wow\n\nYou never thought you'd see the day, but ${silver} is speechless. Probably best for you to step in. \"Do you know why we're here, Nessie?\"\n\nNessie dips her head. Even the darkness, you can tell she's practically doe-eyed. \"Why no, my dear ${name}, I can't say that I do….\"\n\nOh, she's lying. Or is she? There must be an illicit warp gate in the area, possibly even aliens hiding out. How will you find them?\n\n*label nessie_interrogation_one\n*choice\n\t*hide_reuse #${silver} has a ship. It goes underwater. I search the loch! \n\t\t\"All right,\" you say, and start walking away. Both ${silver} and Nessie gawk after you. \n\n\t\t${silver} gives quick pursuit.\n\n\t\t\"What are you…?\" ${silver_she} whispers furiously.\n\n\t\t\"Follow my lead.\"\n\t\t*set relationship_silver %-10\n\t\t*set rule_bender %+10\n\t\t*page_break\n\n\t\t*if (silver_sweet = true)\n\t\t\tThere's a long pause. \"All right,\" ${silver} says at last, but there's a deep furrow in ${silver_his} brow. \"I hope you know what you're doing.\"\n\n\t\t\t\"I do.\" \n\t\t\t\n\t\t\tYou probably do. Still, it's a good thing ${silver} is relatively trusting. Eventually, ${silver_she} does lead you to ${silver_his} ship. That camouflage job could be in a textbook. Probably is. You explain your plan, and although ${silver} remains skeptical, ${silver_she} does insist on piloting.\n\t\t\t*goto into_the_loch\n\n\t\t*else\n\t\t\t${silver} is fuming over your unconventionality in general and that last remark in particular, but you're okay with that. \"Where's your transport?\" you ask.\n\n\t\t\t\"It's highly outside standard—\"\n\n\t\t\t\"Yeah, well, that's how I roll.\"\n\n\t\t\tEventually, ${silver_she} does lead you to ${silver_his} transport. That camouflage job could be in a textbook. Probably is. You explain your plan, and although ${silver} remains skeptical, ${silver_she} does insist on piloting.\n\t\t\t*goto into_the_loch\n\t\t\n\t\t*label into_the_loch\n\t\tThe transport plunges into the loch. Thick, peaty water surrounds you on all sides. It's like flying through pea soup.\n\t\t*if (observation > 65) and (resolve > 50)\n\t\t\tThe transport's lights slice through the murk like knives. ${silver} presses close to you. At first, you startle, but it seems ${silver_she} is only peering out the windows, ${silver_his} face tense with concentration.\n\n\t\t\tYou have to admire tenacity like that. Maybe it's time you thought more kindly of your counterpart.\n\t\t\t*fake_choice\n\t\t\t\t#Yes, maybe I was hasty….\n\t\t\t\t#Kindly? Please, no room for that out here.\n\t\t\t\t#I'll consider it, but I don't trust ${silver_him} yet.\n\t\t\t\t#No way. I can't stand ${silver_him}!\n\t\t\tJust a thought. As you're skimming the loch bed, you spot something glinting. \"Look!\"\n\n\t\t\tAt your cry, ${silver} nudges the transport lower. A metal strip gleams under your headlights.\n\n\t\t\tJust as you're getting excited, ${silver} shakes ${silver_his} head. \"Just Nessie's dwelling. PGPB approved.\" Then, to your surprise, ${silver_she} smiles. \"But good catch.\"\n\n\t\t\tSo far, having a partner really isn't that bad. You're liking ${silver}—who'd have thought? \n\t\t\t*set relationship_silver %+20\n\t\t\t*goto back_on_shore\n\t\t*else\n\t\t\tYou haven't been searching very long when you push back from the controls in frustration. \"This isn't working.\"\n\n\t\t\t${silver} sneers. \"Giving up already?\"\n\n\t\t\t\"Being practical.\" You motion for ${silver_him} to steer towards shore. \"This was a bad decision. If something's down here, we're not finding it.\"\n\n\t\t\t${silver} complies, but mutters, \"Typical.\"\n\t\t\t*set relationship_silver %-15\n\t\t\t*goto back_on_shore\n\n\t*selectable_if (relationship_silver > 50) #${silver} and I pull a good cop/bad cop routine. It's a classic for a reason!\n\t\tSubtly, so that Nessie can't see it, you motion to ${silver}. \"See? Innocent as a lamb, this one.\"\n\n\t\tTo ${silver_his} credit, ${silver} doesn't miss a beat. \"Unlikely. Ordinarily, I'd push for a longer sentence, but the convict likes it here. She's no Jackalope.\" With a long finger, ${silver_she} stabs at Nessie. \"Want to spend your exile on Gerex?\"\n\n\t\tNessie looks horrified. \"But—but, darlings! No!\"\n\t\t*page_break \n\n\t\t\"It's all right.\" You soothe the agitated Plesian. \"Help us out. I'll make sure you stay here.\"\n\n\t\tNessie blinks her wide eyes. \"Oh, would you? I would be ever so grateful.\"\n\n\t\t\"It's just that there's been some talk of warp gates.\"\n\n\t\tThe Plesian's tail twitches. \"I'm so, so sorry. Poor dear, coming all this way. But I simply haven't heard anything like that. Vicious, vicious rumors!\"\n\n\t\tYou both try various tacks—${silver} thinks quick on ${silver_his} feet—but Nessie isn't talking. Reluctantly, you decide that she really doesn't know anything.\n\t\t*set relationship_silver %+10\n\t\t*achieve goodcop\n\t\t*goto back_on_shore \n\n\t*hide_reuse #Nessie's notoriously vain; I manipulate her with my brilliant people skills.\n\t\t\"You know, Nessie,\" you say slowly. \"You're looking lovely tonight.\"\n\n\t\tNessie bows her head. She may play at being a grand dame, but muscles ripple all along the length of her neck. \"I do declare, ${name}, you're making me blush!\"\n\n\t\t\"You can't blush,\" ${silver} cuts in. \"Different capillaries.\"\n\n\t\tAt that, Nessie shoots ${silver_him} a frosty look. \"It was,\" she says, voice dripping with contempt, \"a figure of speech.\"\n\t\t*page_break Oh, Great\n\n\t\t*if persuasion > 60\n\t\t\t\"It's all right,\" you say smoothly, \"${silver} was trying to make a joke.\"\n\n\t\t\tNessie sniffs. \"It wasn't funny.\"\n\n\t\t\t\"Exactly. ${silver_she} needs practice.\" When Nessie nods sympathetically, you continue, \"Now, about those warp gates…\"\n\n\t\t\t\"What warp gates, darling?\"\n\n\t\t\t\"We…our intelligence says—\"\n\n\t\t\t\"Dreadfully sorry, young ${name}. I haven't the foggiest. Now, I do need my beauty sleep. Will that be all? Good.\" Just before she sinks beneath the surface, she winks at ${silver}. \"Keep practicing those jokes, ${silver}. You'll get there one day!\"\n\n\t\t\tAnd then, she's gone.\n\t\t\t*goto back_on_shore\n\t\t*else\n\t\t\tWell, despite your best efforts, it seems that ${silver} has scuppered your plans to flatter Nessie. Time for a new approach.\n\t\t\t*set relationship_silver %-15\n\t\t\t*goto nessie_interrogation_one\n\n\t*hide_reuse #Nessie loves fish and chips. I get her some to put her in a good mood.\n\t\t*set justice %-15\n\t\t*set rule_bender %+20\n\t\tNessie laughs at your offer. \"Why, darling! How dear of you! But why ever would you suggest such a thing?\"\n\n\t\tYou smile. She's settled into her exile well; you actually have quite a bit of affection for her. \"It gets cold out here. Besides, it's nice to have cooked fish every so often, right?\"\n\n\t\t\"Aren't you sweet?\" Nessie nods towards ${silver}. \"Well, don't you agree?\"\n\n\t\t\"Absolutely,\" ${silver} spits through clenched teeth.\n\t\t*page_break I Am Brilliant\n\n\t\tThe attendant manning the late-night fish and chips shop raises his eyebrows as you enter, mostly because ${silver} is on your heels, hissing like a goose in your ear.\n\n\t\t\"Have you completely lost your mind, ${name}? We're on duty, and you get the convict chips?\"\n\n\t\t\"And an extra order of fish,\" you tell the attendant.\n\n\t\tOutside, ${silver} crosses ${silver_his} arms, seething. \"I don't know how you've lasted this long in the PGPB.\"\n\t\t*page_break Because I Am Brilliant\n\n\t\tWhen you bring the food, Nessie wolfs it down, her needle-like teeth flashing in the moonlight. After she swallows the last morsel, you say, \"So…about those warp gates…\"\n\n\t\tNessie touches her mouth with one flipper. \"What warp gates, darling?\"\n\n\t\t\"We…our intelligence says—\"\n\n\t\t\"Dreadfully sorry, young ${name}. I haven't the foggiest.\" She sniffs your hands, nostrils flaring. \"I do appreciate the fish, though.\"\n\n\t\tIf ${silver}'s looks could kill, you'd be a scorched patch of earth.\n\t\t*set relationship_silver %-15\n\t\t*goto back_on_shore\n\n\t*selectable_if (relationship_silver \u003c 50) #${silver} has a better scanner. I swipe it and use it. \n\t\tOne good thing about ${silver} being a stickler for PGPB rules and regulations: ${silver_she} has all the newest PGPB toys. Since you don't check in with the PGPB as often as you should, you do forgo some of the shiny toys.\n\n\t\tBut just because ${silver} has the shiny toys, that doesn't mean that ${silver_she} should get all the glory, too. As ${silver_she} leans in towards Nessie, you lift the scanner from ${silver_his} back pocket.\n\n\t\tReally, ${silver_she} should know better than to leave it so unguarded.\n\t\t*set rule_bender %+20\n\t\t*page_break The Scanner Is Mine\n\n\t\tWhile ${silver} keeps cajoling Nessie (unsuccessfully, you might add), you subtly wander to the shoreline. You slip the scanner into the water, adjust its settings, and wait. It's reading whatever organic traces it can find in the loch…but as the seconds tick by, you realize you should have considered this more.\n\n\t\tLoch Ness is filled with peat. And fish. And invertebrates. And more peat. All of those biological markers are jamming the sensors. If any aliens besides Nessie are hiding in the loch, there's no way you'll find them.\n\t\t*page_break\n\n\t\tThen there's a shout behind you. \"Hey, ${name}! What do you think you're doing?\"\n\n\t\t*if (silver_sweet = true) or (silver_hardworker = true)\n\t\t\tYou turn. ${silver} is standing behind you, with ${silver_his} hands curled to fists. A pang of guilt goes through you; despite everything, ${silver} has a certain innocence and devotion. You didn't mean to upset ${silver} this much.\n\t\t\t*goto scanner_fake_choices \n\t\t\n\t\t*else\n\t\t\tYou turn. ${silver} is standing behind you, shaking ${silver_his} head. \"Really?\" ${silver_she} says. \"Really, ${name}? Wow. Just…just, wow.\"\n\n\t\t\tThe derisive tone make you bristle, but you have to admire ${silver}'s guts. How to respond, though?\n\t\t\t*goto scanner_fake_choices\n\t\t\n\t\t*label scanner_fake_choices\n\t\t*fake_choice\n\t\t\t#\"Sorry, it, ah, fell on the ground….\"\n\t\t\t#\"I just needed it for a second!\"\n\t\t\t#\"I asked to borrow it, but you didn't hear!\"\n\t\t\t#\"What? Goodness, I thought it was mine!\"\n\t\t\"I don't care!\" ${silver} snatches it back. \"You're worse than these convicts!\"\n\n\t\t\"Oh, my…\" Behind you, Nessie shakes her head. \"Such arguments, you two….\"\n\n\t\tAfter that, your chances of getting anything out of Nessie are pretty much nil, and you've got ${silver} furious. Splendid.\n\t\t*goto back_on_shore\n\n*label back_on_shore\nTrudging along the shore back to town, ${silver} won't keep quiet.\n\n\"We can't find the illegal warp gate, and doubtless Nessie's sheltering more convicts. If we could just pin her down….\"\n\n\"We'll figure it out.\"\n\n${silver} whirls on you. \"I have never failed the PGPB and I do not intend to start now! This is a disgrace!\"\n\n*if relationship_mothman > 50\n\tSuddenly, your communicator buzzes. Private call. It can only be Mothman. You excuse yourself from ${silver}, which earns you an impressive eye roll.\n\n\t\"Agent ${name}.\" It is Mothman; you'd recognize that gravelly voice anywhere. \"Others are moving.\"\n\n\t\"What? What do you mean?\"\n\n\t\"Our deal. I found information.\" \n\t*page_break Oh Joy\n\n\tStatic fills the line. You wonder if he's flying. \"Chupacabra in Texas. They thirst for blood.\" A pause. \"That is my information. You have little time.\"\n\n\tAt his words, your blood runs cold. No doubt, things have been set in motion. The contraband, the warp gates, the Yeti's warning….\n\t*choice\n\t\t#I tell ${silver} this news immediately.\n\t\t\t\"Listen, ${silver}.\" Quickly, you share your news. You don't give your source.\n\t\t\n\t\t\tDoesn't matter. ${silver_she} raises an eyebrow. \"And I'm meant to trust you?\"\n\n\t\t\t\"Please, ${silver}, we're both PGPB. People need us.\"\n\t\t\n\t\t\t\"Fine.\" With a nod, ${silver_she} flips ${silver_his} transport's door open and beckons. \"Let's go.\"\n\t\t\t*set resolve %+20\n\t\t\t*set relationship_silver %+20\n\t\t\t*goto loch_conclusion\n\n\t\t#I make up a story, so ${silver_she} will fly me to Texas.\n\t\t\tIt takes some doing, but you concoct a story of a new assignment. But you're nervous—${silver} keeps looking at you like you've joined the criminal underworld. Maybe you have. There's no trust or love between you. This whole situation increasingly resembles a powder-keg waiting to blow.\n\t\t\t*set relationship_silver %-15\n\t\t\t*goto loch_conclusion\n\t\n\t\t#The PGPB will hear soon enough. I wait it out.\n\t\t\tIt takes longer than you expect. Each second is agonizing. Mothman's words chase themselves through your head, over and over….\n\t\t\t*set resolve %-50\n\t\t\t*goto pgpb_tell_chup\n\n*else\n\t*goto pgpb_tell_chup\n\n*label pgpb_tell_chup\nBoth your communicators buzz. The message is simple: \u003cChupacabra attack. Get to Texas NOW!>\n\n${silver} stuffs ${silver_his} communicator inside ${silver_his} coat. \"Get in. Maybe we can redeem ourselves.\"\n*goto loch_conclusion\n\n*label loch_conclusion \nStrapped into the transport, you leave the dark loch far below. Yes, things are happening, vague movements in the shadows now coming to light. As ${silver} talks to Tweel and punches coordinates for Texas, you shudder.\n\nThe day started so well, too.\n*finish\n", "losses": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Yeti's Parole Officer[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\nLoch Ness always looks a little grim. Many things have changed over the years; the loch's propensity towards brooding grey skies and waters has not. ${silver} pilots the transport with noticeably less finesse than usual; ${silver_his} hands shake on the controls.\n\n*if (relationship_silver > 40) or (silver_date = true)\n\tYou clear your throat, lay a hand on ${silver_his} shoulder. \"Thank you for coming with me. Really.\"\n\n\t*if (silver_sweet = true) or (silver_hardworker = true)\n\t\t${silver} turns ${silver_his} face towards you; ${silver_she} is pale. \"Like I said, someone has to keep you out of trouble.\" There's a moment in which you don't know what to say, and then ${silver} murmurs, \"I don't want to see you in trouble.\" \n\t\n\t\tYou lay your hand on ${silver_his} shoulder. \"I'm not going to be in trouble. Not if you're around.\"\n\t\n\t\t${silver} takes a deep breath and nods. \"I'll do my best.\"\n\t\t*goto display_emotion\n\n\t*else\n\t\t${silver} shrugs. You can tell ${silver_she} is trying for a confident smile, but ${silver_she} isn't quite managing it. \"It's that pesky conscience of mine. Can't let you wander off unsupervised—you'll just end up hurting yourself, and then how will I feel?\"\n\n\t\t\"Sad?\"\n\n\t\t${silver} doesn't answer for a moment. \"Yeah,\" ${silver_she} says finally, the cockiness toned down for once. \"Sad.\"\n\t\t*goto display_emotion \n\t\n\t*label display_emotion\n\tThis display of emotion is huge for ${silver}. You never thought you'd find something that ${silver} values more than ${silver_his} standing in the PGPB—it's ${silver_his} whole world. But apparently, there is something: you. \n\n\tIt's a sobering thought. Besides, ${silver} needs some comfort…if for no other reasons than because ${silver_his} hands are trembling and your flight pattern is getting quite erratic. \n\n\t*choice\n\t\t#I agree to check in with Tweel.\n\t\t\t\"Let me call the PGPB,\" you say.\n\n\t\t\t${silver} gives you a sidelong look. \"Are you sure?\"\n\n\t\t\t\"Yes.\" You pick up your communicator. \"I can reassure her, let her know how well you're doing. You know that will make you feel better. Right?\"\n\n\t\t\tLooking a little shamefaced, ${silver} nods. \n\t\t\t*goto call_tweel_losses\n\n\t\t\t*label call_tweel_losses\n\t\t\tAfter you hang up, following a glowing account of ${silver}'s skills, ${silver} flings ${silver_his} arms around you. You can't help but smile. It's definitely a nice change from the way your partnership started.\n\t\t\t*set justice %+15\n\t\t\t*goto into_loch\n\n\t\t#I kiss ${silver}.\n\t\t\tAs ${silver} takes another shuddering breath, you reach forward and clasp ${silver_his} hands tightly. ${silver} glances up in surprise, but before ${silver_she} can say anything, you draw ${silver_him} into a secure embrace and plant your lips on ${silver_his}.\n\n\t\t\tWell. That certainly didn't help the transport's erratic course. You're still locked deep in the kiss when movement out the window catches your eye.\n\n\t\t\tOh. You're crashing.\n\t\t\t*set silver_date true\n\t\t\t*goto crash_into_loch\n\n\t\t#I take over piloting.\n\t\t\t*if (combat > 60) or (resolve > 60)\t\t\n\t\t\t\tYou nudge ${silver} from the pilot's chair. For once, ${silver} doesn't argue; ${silver_she} goes to sit by the passenger's window, hands folded in ${silver_his} lap. \n\n\t\t\t\tThe air currents are tricky around here. You can't help but wonder if it's the warp gate's influence. But your skills shine, and you manage to maneuver the transport down to the loch's surface.\n\n\t\t\t\t${silver} startles, as though ${silver_she} has just woken up. \"Thank you,\" ${silver_she} mumbles. As ${silver_she} retakes the controls, you can't help but wonder how badly the stress is affecting ${silver_him}.\n\t\t\t\t*goto into_loch\n\n\t\t\t*else\n\t\t\t\tSo it turns out that the air currents are really tricky around here. You can't help but wonder if it's the warp gate's influence. ${silver} has moved into the passenger seat. At first, ${silver_she} just stares out the window, but as it becomes more apparent that you're struggling, ${silver_she} clutches the armrest. \"Is everything okay?\" ${silver_she} says.\n\n\t\t\t\t\"Oh, yeah, I just need to…\"\n\n\t\t\t\tThe gyroscopes spin, the engine makes a very unfortunate sound, and suddenly, you're crashing.\n\t\t\t\t*goto crash_into_loch\n\n\t\t#I give ${silver} my best pep talk.  \n\t\t\t*if (silver_date = true)\n\t\t\t\t\"Silver…\" You adjust your chair so that it's closer to ${silver_him}. \"What are you so scared of?\"\n\n\t\t\t\t${silver} hesitates. \"You want to hear? Really?\"\n\n\t\t\t\tYour fingers trail little circles around ${silver_his} kneecap. \"Of course. Comes with the territory, when you're in a relationship.\"\n\n\t\t\t\t\"Well…\" ${silver} takes a deep breath. \"At this point, the PGPB is all I have left. ${name}, you're in the same boat as me. We've outlived everyone we knew before. I don't know about your home, but mine got demolished over a century ago. We're like refugees, you know? In a state of limbo, caught between worlds…we couldn't fit in on Earth anymore. We don't have family. The PGPB is literally the only thing in the universe that's even sort of mine. I can't lose that. Every time I disappoint Tweel, I'm scared she's going to kick me out, and then I'll have absolutely nothing.\"\n\n\t\t\t\tWordlessly, you start rubbing ${silver}'s back. Shuddering, ${silver_she} gives a bitter laugh. \"I've become institutionalized, as much as any alien exiled too long. I need the PGPB, and the only way I feel safe is knowing that it needs me just as much. So I have to be a perfect, top-level, exemplary agent.\" ${silver} turns to you, ${silver_his} eyes swimming with tears. \"Do you understand?\"\n\n\t\t\t\t\"I do,\" you say quietly. \"But ${silver}, don't forget—from here on out, whatever happens with the PGPB, you've got me now.\"\n\n\t\t\t\t${silver} grips your hand. \"Thank you,\" ${silver_she} murmurs.\n\n\t\t\t\tYou can't help feeling like it's the two of you against the universe. And for now, you don't feel too bad about it.\n\t\t\t\t*set relationship_tweel %-15\n\t\t\t\t*goto into_loch   \n\t\t\t\n\t\t\t*elseif persuasion > 55\n\t\t\t\t\"Hey…\" You adjust your chair, so that it's closer to ${silver}. \"Let's talk.\"\n\n\t\t\t\tAnd you do. ${silver} keeps the transport flying more-or-less steady while ${silver_she} finally releases the tension and stress ${silver_she} has been keeping locked inside for so long. Under ${silver_his} uncompromising, by-the-book exterior, there is a lot of insecurity, and a vulnerability that you never guessed at. \n\n\t\t\t\tIt's not so much a pep talk so much as a pep listen. \"At this point,\" ${silver_she} begins, \"the PGPB is all I have left. ${name}, you're in the same boat as me. We've outlived everyone we knew before. I don't know about your home, but mine got demolished over a century ago. We're like refugees, you know? In a state of limbo, caught between worlds…we couldn't fit in on Earth anymore. We don't have family. The PGPB is literally the only thing in the universe that's even sort of mine. I can't lose that. Every time I disappoint Tweel, I'm scared she's going to kick me out, and then I'll have absolutely nothing.\" \n\t\t\t\t\n\t\t\t\t\"Hey, now,\" you say. \"Agents like you are one of a kind. Tweel would never fire you. Not as long as you want to work for her.\"\n\t\t\t\n\t\t\t\t${silver} nods. Tears stream down ${silver_his} cheeks, but ${silver_she} is also breathing a little easier. \n\n\t\t\t\tYou touch ${silver_his} arm. \"Are you going to be all right?\"\n\n\t\t\t\t\"I will be now.\" ${silver} looks you right in the eye. \"Thanks. You…you are a good partner.\"\n\n\t\t\t\tYou're glad to hear it. You suspect that you'll both need that partnership, very soon.\n\t\t\t\t*set relationship_silver %+10\n\t\t\t\t*set justice %-15\n\t\t\t\t*goto into_loch\n\n\t\t\t*else\n\t\t\t\t\"So…${silver}.\" You scoot your chair closer. \"Wanna talk?\"\n\n\t\t\t\t${silver} shoots you a wary look. \"About what?\"\n\n\t\t\t\t\"Well, if there's anything you want to vent about.\"\n\n\t\t\t\t\"I need to concentrate, ${name}.\" ${silver} sighs, but it's more like a shudder. \"I appreciate it, but let's leave emotions out of this for now. I mean, I…\"\n\n\t\t\t\tMovement out the window catches your eye. \"Uh, ${silver}?\"\n\n\t\t\t\t\"What?\"\n\n\t\t\t\t\"We're crashing.\"\n\t\t\t\t*goto crash_into_loch\n\n*else\n\tYou cough. \"So…are you upset with me?\"\n\n\t\"I'm not pleased,\" ${silver} answers, with a voice like stone. \"Let's just get this done, all right?\"\n\n\tYou settle back, but the air currents above the loch are tricky. The transport keeps dropping sharply, then stabilizing, only to drop again. It's making your stomach do all sorts of nasty things. ${silver} looks pretty grim; you don't really want to disturb ${silver_him}, but you may have to.\n\t*choice\n\t\t#I take over piloting. ${silver} isn't up to this.\n\t\t\t*if combat > 70\n\t\t\t\t\"Here,\" you say. \"Let me try.\"\n\n\t\t\t\t${silver} raises an eyebrow. Really, it's a most impressive look for ${silver_him}. \"What was that?\"\n\n\t\t\t\t\"I can do this. I've flown through worse, going through enemy fire.\"\n\n\t\t\t\t${silver} considers this. Finally, ${silver_she} gives a dramatic sigh and pushes back from the controls. It's a joystick set-up, and the joystick quivers in your hand. You take a deep breath, concentrate, and guide the transport to the surface of the loch. Shooting a grin at ${silver}, you exclaim, \"I did it!\"\n\n\t\t\t\t\"Yeah, yeah.\" ${silver} doesn't smile back. \"Don't get smug.\"\n\t\t\t\t*goto into_loch\n\n\t\t\t*else\n\t\t\t\t\"Here,\" you say, attempting to elbow ${silver} out of the way. \"I got this.\"\n\n\t\t\t\t\"What?\" ${silver}'s fingers tighten on the controls. \"No!\"\n\n\t\t\t\t\"Seriously, ${silver}, I can get us down.\"\n\n\t\t\t\t\"Seriously, ${name}, back off.\"\n\n\t\t\t\tA brief scuffle ensues. You touch the controls once or twice, but ${silver} outfights you, jamming an elbow in your ribs and squashing your hands pretty good. You break apart, panting, and realize—\n\n\t\t\t\tYou're crashing.\n\t\t\t\t*goto crash_into_loch\n\n\t\t#I call Tweel for assistance. ${silver} fears her.\n\t\t\tTweel sounds distracted. Still ironing out some remaining power fluctuations, and trying to identify the guilty party. \"It was probably Bernard. It's always Bernard.\"\n\n\t\t\t\"Right. Tweel…\"\n\n\t\t\t\"We think they were trying to disable the Earth Monitoring System. Like crushing a boulder with an ant. Regardless, be vigilant.\"\n\n\t\t\t\"Tweel, you need to talk to ${silver}.\"\n\n\t\t\tYou pass the communicator over and try not to listen as ${silver} talks in low, pleading tones. Finally, ${silver} chucks the communicator back to you. \"You're flying.\"\n\n\t\t\tYou know ${silver} isn't happy about it. But you do get the transport safely landed on the loch's surface. \n\t\t\t*goto into_loch\n \n\t\t#I suggest a new flight path. Diplomacy!\n\t\t\t*if (observation > 60)\n\t\t\t\tYou watch the displays carefully. Tracing the air currents with a finger, you superimpose them onto a map display of the loch and its environs, and then send it to ${silver}'s console. \"Read that.\"\n\n\t\t\t\t${silver} peers at it. \"That…that might actually work.\"\n\n\t\t\t\tYou grin. \"Only one way to find out.\"\n\n\t\t\t\tIt does work. When you land on the loch's surface, ${silver} looks at you with something akin to respect. \"Good work,\" ${silver_she} says. \"Now, let's find Nessie.\"\n\t\t\t\t*set relationship_silver %+10\n\t\t\t\t*goto into_loch\n\n\t\t\t*else\n\t\t\t\tYou watch the displays carefully. Tracing the air currents with a finger, you superimpose them onto a map display of the loch and its environs, and then send it to ${silver}'s console. \"Read that.\"\n\n\t\t\t\t${silver} barely gives it a second glance. \"You've made a mistake.\"\n\n\t\t\t\t\"What? No, I haven't.\"\n\n\t\t\t\t\"Yes, you have. Can't you see it?\" \n\n\t\t\t\tYou study your calculations, frowning. If there is an error, you can't spot it. Maybe ${silver} is just being a jerk, but…\n\n\t\t\t\t\"Trust me,\" you say. \"I know this will work.\"\n\n\t\t\t\t${silver} rolls ${silver_his} eyes and makes the first of your recommended adjustments. The transport immediately spirals downwards.\n\n\t\t\t\tOops.\n\t\t\t\t*goto crash_into_loch\n\n*label into_loch\nYou rest on the surface of the loch for a moment. Tiny waves lap against the sides of the transport. It's a miserable, drizzly day. There won't be many tourists about, but you've cloaked the ship anyway. ${silver} punches a few last codes, preparing it for underwater transportation.\n\n\"I miss my ship,\" ${silver_she} says simply. Sighing, ${silver_she} turns to you. \"You ready?\"\n\nYou nod. \"Let's do it.\"\n*page_break Dive\n\n*label peaty_water_murky\nThe peaty water is just as murky as last time. The transport's headlights don't cut through the silt very much at all. The bio-sensors work just fine, though. Nessie isn't prowling the loch, but as you pass over a rocky outcrop on the loch bed, the sensors' lights flash green.\n\nYou stop ${silver}. \"Pass by there again.\"\n\n${silver} does, with the same result. \"How is that possible?\" ${silver_she} asks. \"It's just rock.\"\n\n\"No…\" you murmur, realizing. \"It's a cave. We missed it last time. Nessie…Nessie was on the surface, so we weren't picking up her signal. We got lucky this time. She must be inside.\"\n\n\"She and a whole party.\" ${silver} points to the now-wildly flashing sensors. \"There's more than one life-form in there.\" \n\n\"Then I guess it's time for a little gate-crashing, isn't it?\"\n*page_break Onwards\n\nIt takes some doing, but you find the cave. Well, you use the term \"cave\" loosely. It's actually a tunnel mouth. You follow it, guiding the transport through pitch darkness and precarious twists and turns. After what feels like a long time, you emerge from the tunnel. \n\nThere's air. The console lights up right away. You're in a massive subterranean cavern. You go to open the hatch, but ${silver} stops you, shaking ${silver_his} head. Quickly, ${silver_she} raises the periscope instead. You hold your breath as ${silver_she} presses ${silver_his} eye to it. \n\n\"My goodness…\" ${silver} exhales.  \"It's full of—\"\n\n\"Stars?\"\n\n\"No.\" ${silver} lowers the periscope. \"Aliens.\"\n*goto seedy_docks_line\n\n*label crash_into_loch\nYou hit the loch with rather more force than you'd have liked. There's no time to calibrate the transport for underwater travel; instead, you smash right through the restless waters. A torrent of bubbles obscures your view. If Nessie's anywhere nearby, she's been warned.\n\n${silver} can't arrest the transport's trajectory. Not immediately, anyway. In fact, ${silver_she} just manages to avoid crashing into the loch bed. The sudden stop throws you both forward. When you look up, ${silver_she} is bleeding from a cut on ${silver_his} forehead.\n\n\"Oh…${silver}, you're bleeding….\" You feel really dazed. It didn't feel like you hit your head, but maybe you just didn't notice. \"I'm sorry.\"\n\n${silver} fishes out the first aid kit, grumbling. Bandaging the cut, ${silver_she} scowls at the murky water. \"Right. The sooner we solve this, the better.\"\n*goto peaty_water_murky\n\n*label seedy_docks_line\nSeedy docks line the underwater cavern. It looks like they've been constructed from whatever logs and driftwood wind up in the loch. With a jolt, you remember an incident a few years back: a photographer was convinced he'd captured an image of Nessie's horned head. It was only a log, of course—it was easy to convince the public—and unless you're very much mistaken, you spot that same log here, propping up the nearest wharf. \n\n${silver} puts up every cloaking device the transport has. As silently and inconspicuously as possible, ${silver_she} nudges the transport beneath the nearest dock. You exit through the top hatch—the loch water is cold—and scramble up a rotting rung to the dock's surface.\n\nHow are you feeling about all this, ${name}?\n\n*fake_choice\n\t#About ready to throttle Nessie.\n\t#Wary. There are too many hiding places down here.\n\t#Famished. Wasn't that fish-and-chips the last thing I ate?\n\t#Miffed with Tweel. If the PGPB missed all this, how was I meant to solve this?\n\t#Wow, ${silver} sure looks nice—sorry, I'm a bit distracted.\n\nWell, that's understandable. You can't help another look around the docks as ${silver} clambers up the ladder after you. The air down here is damp and musty; ${silver} wrinkles ${silver_his} nose in disgust. You're about to agree…when you pause.\n\nA flash of white fur just disappeared into the nearest warehouse. You'd recognize it anywhere.\n\nWhat is the Yeti doing under Loch Ness?\n*page_break Let's Find Out\n\nBeckoning ${silver}, you slip into the warehouse after the Yeti. Squinting in the dim light, you make out what looks like a crude warp gate. It's hard to tell for sure; aliens keep moving in front of it. There are chupacabra, and Hirsus, and Chiroptera, and even a Spheroid or two. \"Patience, darlings!\" Nessie's voice rings out. \"Oh, you mustn't break it, not after all the hard work we've put into it….\"\n\nA Spheroid ventures close to the warp gate. He blinks his massive eye, steadies himself…and leaps through. He's gone in a flash of light. Hardly ten seconds later, he reappears with a daft grin.\n\n\"Landed on getaway ship. PGPB haven't seen it. Earth Monitoring System not working right.\"\n\n\"Those crafty devils…\" you murmur under your breath. \"They've figured out how to transport themselves through warp gates. When the EMS went down, their getaway ship must have gotten within range.\"\n\n${silver} turns to you, ${silver_his} eyes wide. \"${name},\" ${silver_she} whispers. \"They're planning a jailbreak.\"\n\nThey are inventive; you'll give them that. In fact, it looks downright exciting. After all this time chafing under the PGPB's bureaucracy, it occurs to you that maybe you need a jailbreak of your own….\n\n\"${name}, darling? Whatever are you doing here?\"\n\nUh-oh. Nessie's spotted you.\n\n*choice\n\t*selectable_if (cloak = true) #Cloaks can be used as weapons. I toss mine over Nessie!\n\t\tThe art of fighting with cloaks is an ancient one; they can be used defensively, wrapped around the body as crude armor. And they can be used offensively, whipped out to blind and entangle the enemy.\n\t\t*if combat > 65\n\t\t\tThankfully, you are experienced with many weapons, from plasma cannons to humble cloaks like the one you purchased on Rigel. Just as Nessie spots you, you lash out with your cloak. The corner hits Nessie in the eye. As she bellows in pain, you whip the cloak at her again, tangling her flippers. Nessie stumbles blindly backward—her bulk crushes the warp gate, and it collapses in a shower of sparks and groaning metal.\n\t\t\t*set turncoat false\n\t\t\t*set jailbreak false\n\t\t\t*achieve jailbreak\n\t\t\t*goto Mothman_bridge\n\n\t\t*else\n\t\t\tNessie dips her head. You seize the opportunity and fling your cloak out, hoping to catch her in the eyes. Unfortunately, cloak-fighting takes a lot of skill and practice; you know how to handle a stunner (mostly), but you just don't have the expertise for this kind of combat.\n\n\t\t\tThe edge of the cloak hits Nessie's side. She scarcely glances down. \"Oh, ${name}, be a dear and stop that.\" With that, her head darts forward on the end of her long neck, and she rips the cloak from your grasp, dropping it just beside you.\n\t\t\t*set turncoat false\n\t\t\t*set jailbreak true\n\t\t\t*goto Mothman_bridge \n\n\t#I open fire on the warp gate. I won't let these convicts escape!\n\t\t*if (chup_win = true)\n\t\t\tWhile you generally prefer your stunner, that gun you purchased on Rigel is sure handy now. It's powerful. Before the aliens can react, you've blasted the warp gate. It collapses in a shower of sparks and screeching metal.\n\t\t\t*set turncoat false\n\t\t\t*set jailbreak false\n\t\t\t*achieve jailbreak\n\t\t\t*goto Mothman_bridge\n \n\t\t*else\n\t\t\tYou fire with your stunner, but it's just not strong enough. You're scrambling to think of a new plan when the Moehau Monster (she's here too?) tackles you. \"Sorry, mate,\" she says. \"Can't have that now.\" She nods to the Yeti, and he pins ${silver}. \n\n\t\t\tYou're stuck.\n\t\t\t*set turncoat false\n\t\t\t*set jailbreak true\n\t\t\t*goto Mothman_bridge\n\n\t*selectable_if (relationship_mothman > 50) #I call Mothman for advice.\n\t\tBy now, you should have Mothman's number memorized. You gasp with relief when you hear his smooth voice. \"Mothman!\" you cry. \"I need you!\"\n\n\t\t\"I am here.\"\n\n\t\tYou turn. And there he is.\n\t\t*goto Mothman_appearance_two\n\n\t#I follow protocol and call the PGPB for reinforcements.\n\t\t*if (rule_bender \u003c 50)\n\t\t\tIf there's anything you know, it's protocol. You've drilled this so many times that your muscles seem to move of their own accord. You punch the distress code on your communicator…right as the Moehau Monster (she's here too?) claps her paw over it. But you're grinning—the message got out just in time. Even as the Moehau Monster pins you and the Yeti grabs ${silver}, you can take a deep breath: the PGPB has been alerted.\n\t\t\t*set turncoat false\n\t\t\t*set jailbreak false\n\t\t\t*achieve jailbreak\n\t\t\t*goto Mothman_bridge\n\n\t\t*else\n\t\t\tYou can't even reach for your communicator before the Moehau Monster (she's here too?) tackles you. \"Sorry, mate,\" she says. \"Can't have that now.\" She nods to the Yeti, and he pins ${silver}. \n\n\t\t\tYou're stuck.\n\t\t\t*set turncoat false\n\t\t\t*set jailbreak true\n\t\t\t*goto Mothman_bridge\n\n\t#I ask Nessie if I can join the scheme. I want freedom from the PGPB as much as they do!\n\t\t*if (justice \u003c 30) and (rule_bender > 50) \n\t\t\t\"Nessie,\" you say. \"Please, let me go with you.\"\n\n\t\t\tNessie waves a flipper in a grand gesture. \"Oh, good heavens, young ${name}—oh, ${name}, do let me have my little indulgences—why ever would you want to? You'll get us caught.\"\n\n\t\t\t\"No.\" You elbow your way past a shocked ${silver}. \"I want out from the PGPB as much as you do. This is my jailbreak, too.\"\n\t\t\t*set relationship_silver %-15\n\t\t\t*goto Mothman_bridge\n\n\t\t*else\n\t\t\t*label sol_mc\n\t\t\t\"Nessie,\" you say. \"Please, let me go with you.\"\n\n\t\t\t\"Oh,\" says Nessie. \"I'm afraid we can't do that. You'll tell the PGPB. In fact, I think you and young ${silver}—you are young, ${silver}, don't scowl so—will have to stay right here….\"\n\t\t\t*set turncoat false\n\t\t\t*goto Mothman_bridge\n\n\t#I ask Nessie if I can join the scheme. If there's money involved, I want some.  \n\t\t*if (rule_bender > 70) and (stealth > 60)\n\t\t\t\"Nessie,\" you say, sidling up to her. \"Let me join you. I could be good at grifting. You know I could be….\"\n\n\t\t\tNessie bends her long neck, looking you up and down. \"You know…\" she says slowly, \"I do believe you're right. You've got that look, darling, you always have. You aren't one of them,\" she adds, tossing her head in ${silver}'s direction. \"You're one of us.\"\n\t\t\t*set relationship_silver %-15\n\t\t\t*goto Mothman_bridge\n\n\t\t*else\n\t\t\t*goto sol_mc\t\n\n*label Mothman_bridge\nThe aliens are circling closer. So many different faces: fur, scales, bare skin, sharp teeth, glowing eyes. Claustrophobia starts creeping up on you….\n\n*if relationship_Mothman > 50\n\tAnd then you notice him, further back in the crowd. Mothman is here. Instantly, you relax a little. You have an ally, you're fine. \"Mothman!\" you call.\n\n\tHe steps forward. \"I am here.\"\n\t*goto Mothman_appearance_two\n\n*else\n\tSuddenly, a tall, slender form slides through the crowd. Your jaw drops. You haven't seen him since your encounter in Virginia, but you would recognize those glowing red eyes, those wings, and that silhouette anywhere. Mothman has returned.\n\n\tHe inclines his head to you. \"Agent ${name}, we meet again.\"\n\n\t${silver} has ${silver_his} stunner out already. You draw yours. \"Mothman.\"\n\n\t\"Nessie is very kind,\" he says, giving the Plesian a slight bow. But when he turns back to you, his eyes are as cold as his voice. \"But I am very cautious. ${name}, you are a threat. And so…\" His wings flare wide. \"I must eliminate you.\"\n\n\tSeemingly from nowhere, he produces a gun. And fires.\n\t*goto Mothman_fight\n\n*label Mothman_appearance_two\nYou stumble towards him. \"I'm so glad to see you!\"\n\nMothman give a thin-lipped smile. \"And I, you.\"\n\nAnd with that, he draws a gun and fires.\n*goto Mothman_fight\n\n*label Mothman_fight\nAt first, you're too shocked to do anything. That first shot barely misses you. The air crackles with heat; you feel the energy rushing just over your hair. You duck as Mothman fires again. This time, he nearly hits ${silver}, but ${silver_she} dives to safety.\n\n*label Mothman_fight_choices \n*choice\n\t#I open fire right back!\n\t\t*if (combat > 60) or (chup_win = true)\n\t\t\tAmid the chaos, it's almost an impossible shot. Aliens run and yell. Anyone else would be distracted, but you're not anyone. \n\t\t\n\t\t\t*if (chup_win = true)\n\t\t\t\tThe blaster you got on Rigel IX has really good scopes and settings. You're a good shot anyway, but they certainly help. \n\t\t\t\t*goto shot_mm_chest\n\n\t\t\t*else\n\t\t\t\t*label shot_mm_chest\n\t\t\t\tYour shot gets Mothman in the chest. It was on a low setting; it won't kill him, but he has plenty of time for a last, hate-filled glare before his luminous red eyes close.\n\t\t\t\t*goto Mothman_fight_win\n\n\t\t*else\n\t\t\tAmid the chaos, it's an impossible shot. Part of you knows this, but you try anyway, firing through the stampeding aliens. The shot hits the wall. Mothman returns fire. It misses you. Relief washes over you…\n\n\t\t\tUntil you hear a small, surprised gasp beside you.\n\n\t\t\t${silver} has been shot.\n\t\t\t*goto Mothman_fight_lose\n\n\t*selectable_if (net = true) #I throw my weighted net on him!\n\t\t*if resolve > 50\n\t\t\tGood thing you picked up that net on Rigel IX/Valldellum. You whirl it expertly above your head and throw it over Mothman. His wings and long limbs tangle in it and he goes down hard, striking his head on the stone floor with a sickening crack. \n\n\t\t\tHe isn't dead, only stunned. But that's enough.\n\t\t\t*goto Mothman_fight_win\n\n\t\t*else\n\t\t\tYou've been itching to use this net again. Alas, you're still not that comfortable with it. You toss it at Mothman. It misses. He raises his gun and fires. You scramble out of the way, already planning how to try again.\n\n\t\t\tBut then you hear a small, surprised gasp beside you.\n\n\t\t\t${silver} has been shot.\n\t\t\t*goto Mothman_fight_lose\n\n\t*selectable_if(cloak = true) #I hurl my cloak in his face, to stun him!\n\t\t*if combat > 70\n\t\t\tEven by your childhood in the early 1800s, cloak-fighting had mostly gone out of style. You've done some reading, though. Besides looking cool, cloaks can be used for defense and offense. Twisting the cloak around your arm, you flick it at Mothman like a whip. Your aim is good—you get the corner in his large eye. He blinks and staggers back, distracted enough for ${silver} to stun him.\n\t\t\t*goto Mothman_fight_win\n\n\t\t*else\n\t\t\tCloak-fighting may look really cool, but like most cool things, it's really hard. You twist the cloak around your arm, hoping to use the end like a whip, but you can't get the flick of your wrist right. While you struggle, Mothman fires. Just once.\n\n\t\t\tYou hear a small, surprised gasp beside you.\n\n\t\t\t${silver} has been shot.\n\t\t\t*goto Mothman_fight_lose\n\n\t#I dart around him, to tire him out!\n\t\t*if stealth > 60\n\t\t\tYou're speedy and stealthy. Mothman doesn't know which way to turn. His movements get slower and slower, until ${silver} manages to get in a shot. The tall, winged alien falls to the ground, stunned.\n\t\t\t*goto Mothman_fight_win\n\n\t\t*else\n\t\t\tYou start weaving and bobbing around Mothman, but moves like this require a certain amount of stealth—enough to keep Mothman on his toes. Unfortunately, you don't have what it takes. Mothman calmly flares his wings, catches you in the face, and sends you flying.\n\n\t\t\tWhile you're still on the ground, you hear a shot. Just one. Then a small, surprised gasp.\n\n\t\t\t${silver} has been shot.\n\t\t\t*goto Mothman_fight_lose\n\n\t#I grab him in a death-grip!\n\t\t*if (combat > 65) or (armor = true)\n\t\t\tYou throw yourself on Mothman and squeeze. It's a hard move to pull off, but your ferocity and resolve have caught him off-guard. \n\t\t\t\n\t\t\t*if (armor = true)\n\t\t\t\tIt helps that you have the armor you bought on Rigel IX. It adds to your strength and makes it harder for Mothman to fight back against you. His long fingers scrabble uselessly at the shiny, metal-strengthened fibers. \n\t\t\t\t*goto reb\n\n\t\t\t*else\n\t\t\t\t*label reb\n\t\t\t\tHis red eyes bulge and he staggers across the warehouse…until finally, he sinks to the floor, unconscious.\n\t\t\t\t*goto Mothman_fight_win\n\n\t\t*else\n\t\t\tYou throw yourself on Mothman and squeeze. It's a hard move to pull off. At first, you're doing fine, but you lack the proper concentration. Your grip weakens. That's all Mothman needs to throw you off and send you flying. While you're still on the ground, you hear a shot. Just one. \n\n\t\t\tThen a small, surprised gasp.\n\n\t\t\t${silver} has been shot.\n\t\t\t*goto Mothman_fight_lose\n\n*label Mothman_fight_win\n\"Right,\" you say, standing over Mothman's unconscious form. \"Let's talk.\"\n\n\"No!\" a nearby chupacabra growls. \"The time for talking is over, PGPB oppressor!\" \n\nWithout warning, he lunges on ${silver}. You're quick with your stunner, but not quick enough. A single blast renders the attacking chupacabra unconscious…but he's taken quite a chunk out of ${silver}'s leg. Wordlessly, ${silver_she} faces you; ${silver_she} is white as a sheet. Your stomach turns.\n\nQuick! First aid!\n\n*fake_choice\n\t#I use my jacket to make a tourniquet!\n\t#I have ${silver} lie down and I compress the wound!\n\t#I use my water bottle to clean the gash!\n\n*label silver_alive_choices\nMaking ${silver} as comfortable as possible, you glare at Nessie. \"Was that really necessary?\"\n\nNessie sighs. \"He's a tad overexcitable, darling. Understandable, wouldn't you agree? Living so long under the yoke of PGPB oppression…\"\n\n${silver} lifts ${silver_his} head and sputters, \"You're convicts! This is your sentence!\"\n\nNessie bows her small head. \"But why did we turn to crime? There is a system in this universe, my dear, and it is broken. The Pan-Galactic Prisons Bureau has narrowed nearly all channels. It is harder to move, harder to work, harder to eat. And most of all, it is harder to live. Not only to survive, dears, but to truly live, unfettered in spirit as well as body…\" Nessie shakes herself. \"I'm sure you've seen that injustice, ${name}.\"\n\nShe extends a flipper. \"Will you join us?\"\n*label join_us_choices\n*choice\n\t*disable_reuse# No way! I fight!\n\t\t*if (chup_win = true)\n\t\t\tYou hoist your Rigellian blaster and fire several times in quick succession. Pandemonium erupts; the aliens scurry and dodge the bolts of energy streaking around them.\n\n\t\t\tWhen you've pushed them back to the far side of Nessie's lair, you pause. \"So,\" you say, \"A jailbreak. Who's responsible?\"\n\t\t\t*goto yeti_saves\n\n\t\t*elseif (armor = true)\n\t\t\tYour Rigellian armor is helpful here; you can take many hits that would normally put you out cold. The aliens can't stand against you. Slowly, you force them back towards the rear wall of the cavern.\n\n\t\t\tOn the ground, ${silver} stirs and moans. \"Something doesn't add up,\" ${silver_she} mumbles. \"Who's organizing them?\"\n\n\t\t\tYou pause. \"Good question.\"\n\t\t\t*goto yeti_saves\n\n\t\t*else\n\t\t\tYou do your best, but you're getting tired. Plus, you have to defend ${silver}. \n\t\t\t*if (net = true)\n\t\t\t\tFortunately, you still have the weighted net you purchased on Rigel IX. It's an unusual weapon, but it's enough to keep the aliens at bay. They huddle together in a defensive knot at the rear of the cavern.\n\t\t\t\t*goto yeti_saves\n\t\t\t\n\t\t\t*else\n\t\t\t\tFor a while, you hold your own…but then the Moehau Monster gets a lucky swipe in. You gasp in pain as blood seeps from a gash in your leg. \n\n\t\t\t\tNessie nudges the Moehau Monster aside and bends her long neck to meet you, face-to-face. \"Last chance, ${name}. Will you join us?\"\n\t\t\t\t*goto join_us_choices\n\n\t#Sounds great! Sign me up!\n\t\t*if (silver_date = true)\n\t\t\tWhen you give your assent, ${silver} pales even further. \"But…but what about us?\" ${silver_she} whispers.\n\n\t\t\tThis is hard. Deep in your heart, you know that if the choice comes between you and the PGPB, ${silver} will not hesitate. It's ${silver_his} family, ${silver_his} calling, ${silver_his} life purpose. To you, it feels like a chasm separating you from the one you love. Fighting a tiny flicker of hope, you can't look at ${silver_him}. \"I'm sorry. This is my choice.\" Then, hardly daring to breathe, you add, \"You could always join too.\"\n\n\t\t\tAs expected, ${silver} recoils. \"Never!\"\n\n\t\t\t\"Then I guess…\" This is so hard. The hardest thing you've ever said. It feels like your heart is tearing in two. \"I guess we're done.\"\n\n\t\t\tThere. The words hang in the air, ringing with finality. It's done. Out of respect for the love you had, you help ${silver} onto the transport. And watch as ${silver_she} leaves your life forever. \n\t\t\t*set relationship_silver %-25\n\t\t\t*set silver_date false\n\t\t\t*set turncoat true\n\t\t\t*goto Nessie_claps_her_fins\n\n\t\t*else\n\t\t\tWhen you give your assent, ${silver}'s eyes narrow. \"I wish we'd never met!\" ${silver_she} hisses. \n\n\t\t\tIt stings. Maybe, once, if life had followed a different path, you might have been good friends with ${silver}. The lost opportunities call to you. But then you shrug. Not much to do now—you know where your new loyalties lie. Out of respect for the partnership you once had, you help ${silver} onto the transport. And watch as ${silver_she} leaves your life forever. \n\t\t\t*set turncoat true\n\t\t\t*goto Nessie_claps_her_fins\n\n\t#What? She's insane! I am a loyal PGPB agent!\n\t\t\"Never!\" you declare loudly. \"You forget, Nessie—I'm with the PGPB.\"\n\n\t\t*if justice \u003c 50\n\t\t\t*label yeti_saves\n\t\t\tThe Yeti slips to the front of the crowd. He shifts uncomfortably from foot to foot. \"It's coming on June 31st,\" he whispers.\n\n\t\t\tYou freeze. \"You said that,\" you murmur. \"A long time ago.\"\n\n\t\t\tHe smiles sheepishly. \"I was trying to help you. Recognized you had a good heart, under all that PGPB training. Wyoming, they issue hunting licenses for the Jackalope on—\"\n\n\t\t\t\"June 31st.\"\n\n\t\t\t\"Next time, I'll pick a better code.\" The Yeti throws himself between you and the aliens. \"For now, go!\"\n\n\t\t\tYou assist ${silver} out of the warehouse and onto the transport. Poor thing, ${silver_his} face is tight with pain. \"Drop me on shore,\" ${silver_she} says. \"I'll get help. You need to get to the Jackalope.\"\n\n\t\t\t\"Done and done.\" You fire up the transport's engines. \"Tricky rabbit, deluding us this whole time.\"\n\n\t\t\t\"If anyone can stop her,\" ${silver} says, \"you can.\"\n\n\t\t\tAs you leave ${silver_him}, you wish you shared ${silver_his} confidence. Oh well. Texas ho!\n\t\t\t*finish\n\n\t\t*else\t\t\t\n\t\t\t\"Well…\" Nessie says. \"If that's the way you feel.\" Quick as a striking snake, she whips her neck at you. Her head catches you in the side, flinging you off-balance. You tumble through the warp gate as ${silver} screams.\n\t\t\t*goto early_end\n\n\t#I'll make them think I've joined them…but I'm actually sticking with the PGPB.\n\t\t*if persuasion > 55\n\t\t\t\"Sure,\" you say casually. \"I'll join you. Let me just take care of my ex-partner here.\" As you help ${silver} to the transport, you answer ${silver_his} glare with a murmured, \"Don't worry. I got this.\" \n\n\t\t\t${silver}'s eyes light up and ${silver_she} nods.\n\n\t\t\tYou return to the aliens, affecting an air of utter nonchalance. \"So,\" you said. \"Plotting a jailbreak, eh? Impressive. Who's the mastermind?\"\n\n\t\t\tThe Yeti pushes forward. \"The Jackalope, of course! Remember what I told you? It's coming on June 31st! Wyoming issues Jackalope hunting licenses, but they're only valid on—\"\n\n\t\t\t\"June 31st,\" you groan.\n\t\t\t*set turncoat false\n\n\t\t\t*label Nessie_claps_her_fins\n\t\t\tNessie claps her fins. \"Enough. ${name}, welcome aboard. Actually, darling, the Jackalope has been asking after you.\"\n\n\t\t\t\"Me?\"\n\n\t\t\t\"Yes.\" Nessie's tiny teeth glint in a smile. \"She said if you ever…ah, switched teams, she wanted to talk to you. Something about partnership.\"\n\n\t\t\t*if (turncoat = false)\n\t\t\t\tThis is the perfect opportunity! You fight to keep your face impassive, and nod. \"I'll be honored.\"\n\n\t\t\t\t\"The warp gate to her lair isn't operating correctly. Fortunately,\" Nessie continues, motioning to a transport so decrepit, you thought it was junk, \"we have alternate means of transit.\"\n\n\t\t\t\tIt worked. Somehow, your bit of deception worked. You've got an audience with the mastermind herself. Just don't blow it, okay?\n\t\t\t\t*finish\n\n\t\t\t*else \n\t\t\t\tPartnership? That was way more than Tweel ever gave you. You fight a grin. \"I'll be honored.\"\n\t\n\t\t\t\t\"The warp gate to her lair isn't operating correctly. Fortunately,\" Nessie continues, motioning to a transport so decrepit, you thought it was junk, \"we have alternate means of transit.\"\n\t\t\t\t\n\t\t\t\tYour hands shake as you take off. An audience with one of the galaxy's most notorious and slippery criminal masterminds? You've got it made!\n\t\t\t\t\n\t\t\t\tAs long as you don't blow it.\n\t\t\t\t*finish\n\n\t\t*else\n\t\t\t\"Yeah, sure, I'll join you,\" you say. \n\n\t\t\tMaybe there isn't enough persuasion in your voice. Nessie cocks her head. \"Oh, dear, dear ${name},\" she says softly. \"I have trouble believing that.\"\n\n\t\t\t\"What?\" You force a laugh. \"Why?\"\n\n\t\t\t\"You're trembling, ${name}.\" Nessie's long neck winds around you, like a cobra, and she stares directly into your eyes. \"You're sweating. There's a quiver about your lips that I do not trust.\"\n\n\t\t\tWith that, she jerks her head, catching you in the side and flinging you off-balance. You tumble through the warp gate as ${silver} screams.\n\t\t\t*goto early_end\n\n*label Mothman_fight_lose\nTime seems to stop. And then everything goes very fast. Your head swims, and you suddenly feel cold all over. Dropping to ${silver_his} side, you shout, \"${silver}!\"\n\n\"${name}…\" ${silver} coughs. It sounds wet, strained. \n\n\"I'm so sorry,\" you say. \"${silver}, hang in there, I'll get you help!\"\n\n*if (skeeret_flirt = true)\n\tThere's a small cough behind you. And then, a strangely familiar voice. \"I may have something.\"\n\n\tYou whirl around. A slight, grey-skinned Skeeret watches you with large, dark eyes. It's Ket, the Skeeret hustler from Spheron—the one you flirted with. \n\n\t\"I've got bandages,\" ${skeeret_she} says softly. \"Lifted them from an Earth pharmacy earlier. I have gauze, too.\" Ket pauses. \"If you care about ${silver_him}, really care about ${silver_him}, I'll give them to you.\n\n\tWordlessly, you hold out your hand. Working quickly, the two of you manage to staunch ${silver}'s bleeding. Your partner's still gasping for air, but the bandages feel secure. You exhale. \"${silver}, you're going to be all right.\" Not certain you believe yourself, you add, \"I promise.\"\n\n\t${silver} meets your eyes directly. \"I trust you.\"\n\t*goto silver_alive_choices\n*else\n\t*goto doomed_dead_silver\n\n*label doomed_dead_silver \n${silver} makes a rattling, wheezing sound. It takes you a moment to recognize it as laughter. \"Oh, ${name}…not this time. I lived well.\" There is so much blood. \"I'll die well.\"\n\n\"No!\"\n\nBut it's too late. ${silver}'s eyes go fixed, staring rigidly at nothing. The aliens are silent as those once-dazzling blue eyes glaze over and ${silver} gives one final, tiny sigh.\n*set silver_dead true\n*page_break There Are No Words\n\nYou wipe your eyes. Turn around. Mothman is gone. The Yeti slips to the front of the crowd. He shifts uncomfortably from foot to foot. \"It's coming on June 31st,\" he whispers.\n\nYou freeze. \"You said that,\" you murmur. \"A long time ago.\"\n\nHe smiles sheepishly. \"I was trying to help you. Recognized you had a good heart, under all that PGPB training. Wyoming, they issue hunting licenses for the Jackalope on—\"\n\n\"June 31st.\" You're hollow inside.\n\nNessie gives a delicate cough. \"If ever you wanted to switch sides, the Jackalope would be interested in taking you on as a partner.\"\n\n*choice\n\t#Never! They're the reason ${silver} is dead!\n\t\t*label silver_dead_refusal\n\t\t\"No,\" you say smoothly. \"You killed ${silver}. All of you. And I will bring the Jackalope to justice.\"\n\t\t\n\t\tNo one stops you as you leave the warehouse. The nanobots in your bloodstream—and ${silver}'s bloodstream—carry a self-destruct code. When the host organism dies, they ignite, disposing of the body to avoid detection. You want to leave before that happens; you can't bear the thought of it happening to ${silver}.\n\n\t\tBesides, you need to get to Texas.\n\t\t*set justice %+20\n\t\t*set turncoat false\n\t\t*finish\n\n\t#I can't go back to the PGPB after this. What else is there for me?\n\t\tYou've never known true despair until now. Your partner is dead; the PGPB will never accept you back. You could be shipped to an exile planet yourself. All of your options have dwindled to this one, and you will grab it.\n\n\t\t\"All right,\" you whisper.\n\n\t\tNessie blinks. \"I beg your pardon, darling?\"\n\n\t\t\"I'll partner with the Jackalope,\" you say, your throat thick. The nanobots in your bloodstream—and ${silver}'s bloodstream—carry a self-destruct code. When the host organism dies, they ignite, disposing of the body to avoid detection. You want to leave before that happens; you can't bear the thought of it happening to ${silver}. \"She's in Texas, still?\"\n\n\t\tNessie nods.\n\n\t\tThen it's time for you to go. \n\t\t*set resolve %-20\n\t\t*set turncoat true\n\t\t*finish\n\n\t#This is the Jackalope's fault. I'll make her pay!\n\t\t*goto silver_dead_refusal\n\n\t#It's too bad about ${silver}, but really, I'm done with the PGPB. Bring it. \n\t\tYou and ${silver} didn't always get along, but ${silver_she} was a good person. Once again, your work with the PGPB has ended in pain. They break everything they touch, and you are sick of it. You've seen the galaxy's underbelly, and it's not the alien convicts. It's the Pan-Galactic Prisons Bureau.\n\n\t\tYou lift your chin. \"All right.\"\n\n\t\tNessie blinks. \"I beg your pardon, darling?\"\n\n\t\t\"I'll partner with the Jackalope,\" you say, looking away from ${silver}'s body. The nanobots in your bloodstream—and ${silver}'s bloodstream—carry a self-destruct code. When the host organism dies, they ignite, disposing of the body to avoid detection. You want to leave before that happens; you can't bear the thought of it happening to ${silver}. \"She's in Texas, still?\"\n\n\t\tNessie nods.\n\n\t\tThen it's time for you to go. \n\t\t*set rule_bender %+20\n\t\t*set turncoat true\n\t\t*finish\n\n*label early_end\n*if (jailbreak = true)\n\tObjects sometimes pass through warp gates. Evidently, living things aren't meant to. Really, you're flying through a tiny section of hyperspace without the protection of a ship. The colors pulse around you, tearing at your skin and clothes. If the aliens are willing to undergo this maelstrom, they must be desperate to leave Earth.\n\n\tCurrents of pure energy tear at you. You would close your eyes, but you don't have eyelids anymore. You don't have a throat to scream. You don't even have a heart in your chest anymore; there is nothing to shudder and stop.\n\n\tYou have time for a few last thoughts. You wish you'd been able to dodge Nessie—crafty beast, lulling you into false security with her eccentricity and grandiose personality. You wish you could have destroyed the warp gate, prevented the mass jailbreak about to occur.\n\n\tYou wish you weren't dying alone in hyperspace.\n\n\t*label ee_death\n\tBut you knew that danger was part of the job. Extra centuries of adventure and excitement in exchange for…well, the possibility of [i]this[/i].\n\n\tYou can't breathe.\n\n\tAnd then…the brilliant colors fade to black. The wrenching pain stops. And there is only death.\n\t*goto_scene ending\n\n*else\n\tObjects sometimes pass through warp gates. Evidently, living things aren't meant to. Especially not when the warp gate is half-destroyed, anyway. You're glad you got in those shots. At least the jailbreak has been prevented. Hopefully ${silver} can handle things…and handle them alone.\n\n\tBecause you are dying. Currents of pure energy tear at you. You would close your eyes, but you don't have eyelids anymore. You don't have a throat to scream. You don't even have a heart in your chest anymore; there is nothing to shudder and stop.\n\n\tYou take comfort in one fact: you did your duty. Too bad you had to die doing it.\n\t*goto ee_death", "newzealand": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Yeti's Parole Officer[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n\nFortunately, once you get yourself back to Kathmandu, the weather will pose less of a burden. There is a PGPB safehouse in the Nepalese city specifically for agents checking in on the exiles assigned to the Himalayas. It's one apartment of a block tucked away on a side street.\n\nFrom the outside, it looks like the others, with a red balcony and narrow steps leading up to the front door. Yawning, you take the stairs to the \"top floor.\" Once there, you press your thumb to a hidden panel. Reading your genetic signature, the panel opens, revealing a set of stairs that go up to a hidden floor. Your apartment is there. By the time you reach it, you can barely keep your eyes open. \n\nWhat first?\n\n*fake_choice\n\t#A hot shower.\n\t\tGood choice. After your time in the mountains, your toes are still numb. As steaming water gushes over your knotted muscles, you sigh with relief.\n\t#My bed.\n\t\tAbsolutely! You stumble into your quarters and don't even bother to turn on the lights before collapsing face-first onto the bed. Your weary body sinks into the mattress—you don't even have time to worry about the Moehau Monster before you're asleep.\n\t#Dinner.\n\t\tThe PGPB's reconstituted food isn't the best. It's meant to be stored for years at a time and be edible for a wide variety of species. Someone polite might call it \"innocuous.\" You call it \"cardboard.\" Still, it's food, and you need your strength!\n\t#Nightlife!\n\t\tWork hard, play hard. There are plenty of would-be mountaineers eager to forget their trepidation with drinks and dancing. You have a wild night out, though you manage to resist showing off your PGPB badge in the clubs.\n\nThe next morning, you rendezvous just outside the city with the PGPB pilot who's prepared your personal transport. It's a stubby, rounded vehicle, designed for in-atmosphere flight only. Though it'll never reach orbit and it's easily thrown by extreme weather, it's invisible to radar and tracking devices.\n\nThe pilot salutes as you open the cockpit. \"She's all yours, Agent ${name}.\"\n\nBut wait! What is your ship's name?\n\n*choice\n\t#Andromeda.\n\t\t*set ship_name \"Andromeda\"\n\t\t*goto board\n\t#Serenity.\n\t\t*set ship_name \"Serenity\"\n\t\t*goto board\n\t#Defiant.\n\t\t*set ship_name \"Defiant\"\n\t\t*goto board\n\t#Stonecoaster.\n\t\t*set ship_name \"Stonecoaster\"\n\t\t*goto board\n\t#Summer Kite.\n\t\t*set ship_name \"Summer Kite\"\n\t\t*goto board\n\t#None of these!\n\t\t*input_text ship_name\n\t\t*comment check capitalization\n\t\t*goto board\n\n*label board\nYou board ${ship_name} and take the cockpit. The engines rumble as the ship lifts off. Vibrations judder all the way through your sternum, and then silence crashes down. Your stomach swoops—\n\nAnd then the ship settles into a smooth glide. The ocean leaps and flashes beneath you, and you smile as the orange-red shell of the Australian outback passes by. Another few moments over the Tasman Sea—\"Just crossing the ditch,\" as your southern hemisphere friends might say—and New Zealand's rugged coastline comes into view.\n\n*page_break\n\nWith half your attention caught by impossibly green hills and jagged mountains, you fumble for the Moehau Monster's file. It flashes across your screen. \n\nConvicted for running a crooked gambling ring with her cousin, the Yeti. Two prior charges, both dropped on technicalities. Currently settled in New Zealand's Coromandel region. No misdemeanors. \n\n*page_break\n\nThick trees mask the ground below. Carefully, you pilot ${ship_name} between them, finally coming to rest. After giving the Moehau Monster's file one final scan, you open the cockpit.\n\nImpossibly pure air floods your lungs. You just sit for a moment, breathing it in as birds shriek to each other overhead. Finally, you climb from the ship. Ferns carpet the forest floor, their fronds wrapping about your ankles.\n\nYour indicator lights up. The Moehau Monster is nearby. What's your plan?\n\n*choice\n\t#I'll approach her directly.\n\t\t*set combat %+10\n\t\tFollowing the blinking lights of your indicator, you weave through massive trees. Everything in New Zealand is so alive. Vines coil around the tree trunks, and you peer into every shadow.\n\t\t\n\t\t\"Moehau Monster?\" you call. \"This is PGPB Liaising Officer ${name}. Please report for an official evaluation.\"\n\t\t\n\t\tNothing but birdsong in the trees.\n\t\t*page_break Should Have Known\n\n\t\tThere's a gap in the forest ahead. You step from the shadows into streaming sunlight. The sky is a brilliant blue, and emerald fields stretch to a line of mountains in the distance. A clump of grass moves. \n\t\t*choice\n\t\t\t#I draw my weapon. Just in case.\n\t\t\t\t*set combat %+10\n\t\t\t\tYour fingers close around your force-beam before you're aware of it. The grass moves again, and you fire a warning shot.\n\t\t\t\t\n\t\t\t\tShaggy shoulders come into view, followed by an apelike head. \n\t\t\t\t*goto kia_ora\n\t\t\t#I scan for life-forms. No need to be hasty yet.\n\t\t\t\t*set observation %+15\n\t\t\t\tYou whip out your communicator. The built-in indicator shines nearly continuously. It must be the Moehau Monster. You take a deep breath and bellow with as much authority as you can muster, \"This is the Pan-Galactic Prisons Bureau! Show yourself—that's an order!\"\n\t\t\t\t\n\t\t\t\tShaggy shoulders come into view, followed by an apelike head. \n\t\t\t\t*goto kia_ora\n\t\t\t#I've got a communication system on the ship; I'm using it.\n\t\t\t\t*set rule_bender %-15\n\t\t\t\tReally, it's a technological marvel and far more efficient than crashing through the bush. You head back to the ${ship_name}.\n\t\t\t\t*goto communicate_ship\n\n\t#I'll communicate from the ship.\n\t\t*label communicate_ship\n\t\tSafely ensconced within the walls of your ship, you bring ${ship_name}'s external communication system online. Pulling the microphone close to you, you think for a moment and then say, \"This is the Pan-Galactic Prisons Bureau. Moehau Monster, if you're here, show yourself, or…\"\n\t\t\n\t\tOr what?\n\t\t*fake_choice\n\t\t\t#\"It's another century on your sentence!\"\n\t\t\t#\"I'll inform Commissioner Tweel!\"\n\t\t\t#\"I'll have to eat this pavlova all alone!\"\n\t\t\t#\"I'll find a worse penal colony!\"\n\n\t\tThe branches shake. Shaggy shoulders come into view, followed by an apelike head. Hurriedly, you disembark and race towards the Moehau Monster. \n\t\t*goto kia_ora\n\n\t#I'll sneak up on her.\n\t\t*set stealth %+10\n\t\tYou creep through the dense underbrush. Clumps of ferns block your view, but that's all right—it makes it harder for the Moehau Monster to see you. Every shade of green crowds around you, along with most shades of brown. Smiling, you flip over a silver leaf fern, admiring its shining white underside. The forest smells alive.\n\t\t*page_break On With The Job\n\t\t\n\t\tBut you're not just here to admire the scenery. The soil cushions your footfalls as you pad forward. You can track the Moehau Monster the old-fashioned way—she'll never hear you coming, but it might take a while. Or, you can use your all-purpose communicator—it's fast, but yours has been beeping erratically lately. It might be low on batteries.\n\t\t\n\t\t*choice\n\t\t\t#I'll track her on foot.\n\t\t\t\t*if observation > 60\n\t\t\t\t\tLong hairs glint on a tree trunk, swaying in the breeze. You don't need to scan them to know what they are: specimens of Hirsus hair. The Moehau Monster passed this way recently.\n\t\t\t\n\t\t\t\t\tYou crouch low to the ground. Deep indentations score the earth. Clawmarks. Moving quickly but carefully, you follow a trail of bent ferns and scratched bark to a field. Shaggy shoulders come into view, followed by an apelike head. \n\t\t\t\t\t*goto kia_ora\n\t\t\t\n\t\t\t\t*else\n\t\t\t\t\tThere's too much detail in the forest. The call of tui birds rattles your concentration. Everywhere you turn, there's another unfurling frond, another twisting path. After a few fruitless minutes, you concede defeat and slink back to the ship.\n\t\t\t\t\t*goto communicate_ship\n\n\t\t\t#I'll use my communicator.\n\t\t\t\tYour device glows instantly, a flashing light indicating the Moehau Monster in close proximity. Weaving between trees, you're hot on her trail when—\n\t\t\t\t*page_break Beep\n\n\t\t\t\tThe communicator's beeping pierces the forest. You frantically try to silence it, but it keeps shrieking, startling a flock of tui. A larger bird answers—probably a kea—and suddenly, the woods are in uproar. \n\n\t\t\t\tYou should have grabbed batteries.\n\t\t\t\t*goto backtrack\n\n\t\t\t#I'll backtrack to the ship for batteries.\n\t\t\t\t*set rule_bender %-15\n\t\t\t\t*label backtrack\n\n\t\t\t\tSighing, you retrace your steps. The forest enfolds you, the trees moaning as they sway in the wind. The sound sets your teeth on edge—you feel the passing of every second. \n\t\t\t\n\t\t\t\tIt occurs to you that Commissioner Tweel wouldn't like this delay. The thought makes you run, and you don't stop until you're back at the ship.\n\t\t\t\t*goto communicate_ship\n\t\n*label kia_ora\nThe Moehau Monster grins, revealing sharp teeth. \"Kia ora,\" she says, arms folded behind her back. Her voice is soft and low, almost a purr. \"Come to check up on me, have you?\"\n\
