chasing the truth, that's all I care about,\" Tracey says.\n\t\t\t*goto tracey_mistake\n\t\t*else\n\t\t\t$!{the} looks down at ${this} hands.\n\n\t\t\tMaris nods. \"Exactly. You're the one who has to make the call, even if it puts you in danger.\"\n\n\t\t\t\"Whatever you say,\" Tracey mutters.\n\t\t\t*set rel_tracey %-10\n\t\t\t*goto tracey_mistake\n\t#\"It was flashy. It was exciting. And it'll make a great story. Who cares if it makes more work for the lawyers?\"\n\t\t*if factual \u003c= 40\n\t\t\tTracey puts ${this} hand over ${this} mouth, trying to hide a smile.\n\n\t\t\tMaris frowns, and brushes a strand of dark hair out of her eyes. \"I don't think you understand how serious this is, ${pl_fname}. You need to be more careful with our resources. But I'll let it slide this time.\"\n\t\t\t*set rel_tracey %+10\n\t\t\t*goto tracey_mistake\n\t\t*else\n\t\t\tTracey raises an eyebrow. \"You don't usually go for the flashy options.\"\n\n\t\t\tMaris frowns, and brushes a strand of dark hair out of her eyes. \"I don't think you understand how serious this is, ${pl_fname}. You need to be more careful with our resources. So you'll share in the punishment.\"\n\n\t\t\tOuch.\n\t\t\t*set rel_tracey %+10\n\t\t\t*set infractions +1\n\t\t\t*goto tracey_mistake\n\n*label tracey_mistake\n\nMaris stops in front of her desk. \"Hermana, call up the current Infractions for the staff of the ${pl_fullname} show.\"\n\n\"We need a better name,\" Tracey mutters, as the floating display on Maris's desk changes. \n\n*if (infractions = 0) or (infractions > 1)\n\tIt shows that you have ${infractions} Infractions, and Tracey has 2.\n*if (infractions = 1)\n\tIt shows that you have 1 Infraction, and Tracey has 2.\n*comment endif\n\nTwo? You wonder what the other one was for.\n\n*if infractions = 0\n\tMaris nods to you. \"So far, ${pl_fname} has a clean record—something you could learn from, Tracey.\" She turns away to look back at her desk, and Tracey makes a face behind her back.\n*if (infractions = 1) or (infractions = 2)\n\tMaris frowns. \"It looks like you both have Infractions. Remember, there's only so far that INN and I will go to keep you both out of trouble.\" She turns away to look back at her desk, and Tracey makes a face behind her back.\n*if infractions > 2\n\tMaris frowns. \"Tracey's record is bad, but ${pl_fname}'s is even worse. There's only so far that INN and I will go to keep you out of trouble.\" She turns away to look at her desk.\n*comment endif\n\n\"I have the ability to remove an Infraction once in a while, at my leisure,\" she continues, picking up a tablet and turning back to both of you. \"But that's only if I think the story's worth it.\"\n\n\"Oh, it's worth it,\" you say, as you begin to tell her all about your investigation.\n\n*page_break\n[i]February 4th, 2062. Morning.[/i]\n\nAfter you laid the story out for Maris, you took a short nap in the on-call room near her studio. Now you sit next to Tracey at the editing desk, watching ${thim} put all the footage ${the} downloaded from your head into a rough cut for Maris to review. You're not sure you'll ever get used to the feeling of something magnetically adhering a data cable to the side of your head and pulling files out. You remember being told that the drive in your head is solid state, so there should be no movement or sensation associated with data transfer, but the process still felt disorienting, like your center of balance was just a little off the whole time. The coffee helps you recover.\n\n*if (tflirt = true) and (rel_tracey >= 60)\n\t*goto flirting\n*else\n\t*goto banter\n\n*label flirting\n\"Long night,\" ${the} says, looking at the coffee.\n\n\"Yeah,\" you say, before taking another sip.\n\n\"Shame it wasn't for a more interesting reason than being yelled at by Maris.\" $!{the} looks at you for a long moment before turning back to the editing display.\n\nWait. Is ${the} flirting with you?\n\n*choice\n\t#Flirt back.\n\t\t\"It is a shame,\" you say. \"Maybe next time when we go out for a drink, I'll uninvite the crooked cops and you can leave the security guards at home.\"\n\n\t\t$!{the} laughs. \"Sounds like a date, boss,\" ${the} says.\n\n\t\tYou motion to the screen with your cup of coffee. \"But for now, let's get this story done.\"\n\t\t*set rel_tracey %+10\n\t\t*page_break\n\t\t*goto banter\n\t#Be nice, but keep my relationship strictly professional.\n\t\t\"Look, Tracey. I think you're a very attractive ${tman}, but I don't do workplace romances. Maybe after the show's done and we go our separate ways…\" You leave the sentence hanging in the air.\n\n\t\t$!{the} stares intently at the display. \"No, that makes sense. That's a good idea, boss.\"\n\n\t\tYou take another sip of coffee to cover the awkward silence.\n\t\t*set tflirt false\n\t\t*page_break\n\t\t*goto banter\n\t#Shut Tracey down hard.\n\t\t\"No.\"\n\n\t\tTracey looks over at you. \"No what?\"\n\n\t\t\"I don't do workplace romances. So get over it. We have a job to do.\"\n\n\t\t$!{the} frowns and looks back at the display. \"Sure thing, boss.\"\n\n\t\tGood thing you got that settled before it became a problem.\n\t\t*set rel_tracey %-10\n\t\t*set tflirt false\n\t\t*page_break\n\t\t*goto banter\n\n*label banter\nTracey starts moving chunks of video back and forth on a timeline floating in front of both of you. \"About the show name—what about 'The Unvarnished Truth'?\"\n\n\"You mentioned that last night.\"\n\n\"This morning.\"\n\n\"Don't remind me,\" you say, trying to stifle another yawn. \"I don't know. Seems a bit grandiose.\"\n\n\"Oh come on, it's brilliant,\" ${the} says. \"The Unvarnished Truth. It sounds cooler every time I say it. The [i]Unvarnished[/i] Truth.\"\n\nYou point at the raw footage from St. Elizabeth. \"Wait. Here it is.\"\n\nTracey stops moving the footage around, and zooms in where you're pointing. \"Ah, right. This is the stuff. So I guess the big question is, are we going to air anything about the organ-selling operation?\"\n\n*if story_with_organ_sale = true\n\t*goto organ_sale_true\n*else\n\t*goto organ_sale_false\n\n*label organ_sale_true\nYou nod. \"Absolutely.\"\n\nTracey leans away from the workstation. \"Are you sure? I mean, I'm all for putting the truth out there, no matter what, but Sloane was acting weird. There's got to be a deeper reason why he doesn't want this stuff aired.\"\n\n*choice\n\t#\"Who cares? This will make a splash that no one will ever forget.\"\n\t\tTracey shrugs. \"It's your name it's going out under, not mine.\"\n\n\t\tYou smirk. \"Check the credits again.\"\n\n\t\tTracey throws up ${this} hands in mock outrage. \"My elaborate plan is undone!\"\n\t\t*set ambition %+10\n\t\t*goto check_for_blackmail\n\t#\"It's the truth.\"\n\t\tTracey shrugs. \"Good enough reason for me.\"\n\t\t*set factual %+10\n\t\t*goto check_for_blackmail\n\t#\"Because it'll be a good story.\"\n\t\tTracey shrugs. \"Your wish is my command, master.\"\n\n\t\t\"We're up to 'master' now?\"\n\n\t\t*if rel_tracey > 60\n\t\t\t\"Yeah, whenever I can't call you something else at work.\" $!{the} smiles at the joke.\n\t\t*if (rel_tracey \u003c= 60) and (rel_tracey >= 40)\n\t\t\t\"Yeah, whenever I can't call you something else at work.\" $!{the} smirks, and you aren't quite sure if ${the} is joking or not.\n\t\t*if rel_tracey \u003c 40\n\t\t\t\"Yeah, whenever I can't call you something else at work,\" $!{the} grumbles.\n\t\t*set factual %-10\n\t\t*goto check_for_blackmail\n\n*label check_for_blackmail\n*if blackmail\n\tYou take another sip of your coffee as Tracey gets to the material you recorded about Sloane's purchase of illegal organs. \"How about this?\" ${the} asks. \"Are we putting this in?\"\n\n\t*if blackmailed_Felix = true\n\t\t\"No. At least, not right now. We have Detective Sloane on a short leash, and he knows it. If we broadcast it, the blackmail loses its power.\"\n\n\t\tTracey turns and looks at you. \"Boss, I don't feel comfortable with this. I mean, blackmailing a police officer? Sure, he's as crooked as a badly hung picture frame, but does this make us any better?\"\n\t\t\n\t\t*choice\n\t\t\t#\"I'll do whatever it takes to get to the top.\"\n\t\t\t\t*if ambition >= 60\n\t\t\t\t\t\"And you'll step on anyone who gets in your way, huh?\" Tracey looks back at the screen, avoiding your eyes.\n\t\t\t\t\t*set rel_tracey %-10\n\t\t\t\t\t*goto voiceover\n\t\t\t\t*else\n\t\t\t\t\t\"Really? That surprises me.\" Tracey looks back at the screen, avoiding your eyes.\n\t\t\t\t\t*set rel_tracey %-10\n\t\t\t\t\t*goto voiceover\n\t\t\t#\"I don't like it either. I feel sick just thinking about it.\"\n\t\t\t\t*if ambition \u003c= 40\n\t\t\t\t\tTracey's face softens. \"I guess things were moving really fast for both of us. I'm sorry I came down on you.\"\n\t\t\t\t\t*set rel_tracey %+10\n\t\t\t\t\t*goto voiceover\n\t\t\t\t*else\n\t\t\t\t\tTracey's eyes widen in surprise. \"Really? I didn't expect you to worry about anything but your own career.\"\n\t\t\t\t\t*set rel_tracey %+10\n\t\t\t\t\t*goto voiceover\n\t\t\t#\"We need to play this game with him now so we can break the whole story down the road.\"\n\t\t\t\t*if factual >= 60\n\t\t\t\t\tTracey thinks about it for a moment, and then nods. \"I don't like it, but I can see the logic. As long as the truth ultimately gets out, I'll be quiet and play along.\"\n\t\t\t\t\t*set rel_tracey %+10\n\t\t\t\t\t*goto voiceover\n\t\t\t\t*else\n\t\t\t\t\tTracey's eyes widen in surprise. \"Really? I didn't expect you to worry so much about the facts.\"\n\t\t\t\t\t*set rel_tracey %+10\n\t\t\t\t\t*goto voiceover\n\t\t\t#\"Just think of it as building suspense before the big reveal, once we have all the pieces.\"\n\t\t\t\t*if factual \u003c= 40\n\t\t\t\t\tTracey frowns. \"I get that this is show business, boss, but don't forget that it's also news.\"\n\t\t\t\t\t*set rel_tracey %-10\n\t\t\t\t\t*goto voiceover\n\t\t\t\t*else\n\t\t\t\t\tTracey frowns. \"I figured you were worried more about presenting the facts than planning cheap stunts.\"\n\t\t\t\t\t*set rel_tracey %-10\n\t\t\t\t\t*goto voiceover\n\t*else\n\t\t*choice\n\t\t\t#\"Leave it out. We may need it against Detective Sloane later.\"\n\t\t\t\tTracey turns and looks at you. \"Boss, I don't feel comfortable with this. I mean, we're talking about potentially blackmailing a police officer. Sure, he's as crooked as a badly hung picture frame, but does this make us any better?\"\n\n\t\t\t\t*choice\n\t\t\t\t\t#\"I'll do whatever it takes to get to the top.\"\n\t\t\t\t\t\t*if ambition >= 60\n\t\t\t\t\t\t\t\"And you'll step on anyone who gets in your way, huh?\" Tracey looks back at the screen, avoiding your eyes.\n\t\t\t\t\t\t\t*set rel_tracey %-10\n\t\t\t\t\t\t\t*goto voiceover\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"Really? That surprises me.\" Tracey looks back at the screen, avoiding your eyes.\n\t\t\t\t\t\t\t*set rel_tracey %-10\n\t\t\t\t\t\t\t*goto voiceover\n\t\t\t\t\t#\"I don't like it either. I feel sick just thinking about it.\"\n\t\t\t\t\t\t*if ambition \u003c= 40\n\t\t\t\t\t\t\tTracey's face softens. \"I'm sorry I came down on you. I just want to make sure we keep our journalistic integrity.\"\n\t\t\t\t\t\t\t*set rel_tracey %+10\n\t\t\t\t\t\t\t*goto voiceover\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tTracey's eyes widen in surprise. \"Really? I didn't expect you to worry about anything but your own career.\"\n\t\t\t\t\t\t\t*set rel_tracey %+10\n\t\t\t\t\t\t\t*goto voiceover\t\t\t\t\t\t\t\n\t\t\t\t\t#\"We need to play this game with him now so we can break the whole story down the road.\"\n\t\t\t\t\t\t*if factual >= 60\n\t\t\t\t\t\t\tTracey thinks about it for a moment, and then nods. \"I don't like it, but I can see the logic. As long as the truth ultimately gets out, I'll be quiet and play along.\"\n\t\t\t\t\t\t\t*set rel_tracey %+10\n\t\t\t\t\t\t\t*goto voiceover\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tTracey's eyes widen in surprise. \"Really? I didn't expect you to worry so much about the facts.\"\n\t\t\t\t\t\t\t*set rel_tracey %+10\n\t\t\t\t\t\t\t*goto voiceover\n\t\t\t\t\t#\"Just think of it as building suspense before the big reveal, once we have all the pieces.\"\n\t\t\t\t\t\t*if factual \u003c= 40\n\t\t\t\t\t\t\tTracey frowns. \"I get that this is show business, boss, but don't forget that it's also news.\"\n\t\t\t\t\t\t\t*set rel_tracey %-10\n\t\t\t\t\t\t\t*goto voiceover\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tTracey frowns. \"I figured you were worried more about presenting the facts than planning cheap stunts.\"\n\t\t\t\t\t\t\t*set rel_tracey %-10\n\t\t\t\t\t\t\t*goto voiceover\n\t\t\t#\"Put it in. It's part of the story.\"\n\t\t\t\tTracey smiles. \"Sounds good, boss.\" $!{the} starts to edit the footage.\n\t\t\t\t*set rel_tracey %+10\n\t\t\t\t*set named_felix true\n\t\t\t\t*goto voiceover\n\t\t\t#\"You make the call, Tracey.\"\n\t\t\t\t\"Really? Me?\"\n\n\t\t\t\t\"Sure,\" you say.\n\n\t\t\t\tTracey stares at the footage for a minute, thinking it over. Finally, ${the} shrugs. \"He deserves it,\" ${the} says, as ${the} starts to edit the footage in.\n\t\t\t\t*set rel_tracey %+10\n\t\t\t\t*set named_felix true\n\t\t\t\t*goto voiceover\n*else\t\n\t*goto voiceover\n\n*label organ_sale_false\nYou shake your head. \"No. We're cutting it.\"\n\nTracey leans away from the workstation. \"Are you sure? I feel weird leaving a chunk of our investigation on the cutting-room floor.\"\n\n*choice\n\t#\"We're not in the business of ruining people's lives.\"\n\t\t\"I don't follow you.\"\n\n\t\t\"You weren't there, but Sloane made a good point. They're desperate people, doing what they can to survive in a broken system. If we tell the truth about what we found, other reporters will only showcase them as criminals.\"\n\n\t\tTracey nods. \"Okay. I'm not sure I completely agree, but I see why that's important.\"\n\t\t*set ambition %-10\n\t\t*goto voiceover\n\t#\"It ruins the human interest.\"\n\t\t\"What?\"\n\n\t\t\"Think of it this way. If we leave it in, they're just criminals—organ fencers with an unusual setup. But if we take it out, we can spin them as desperate people, willing to do whatever they need to survive another day.\"\n\n\t\tTracey shrugs. \"I guess it's your show, boss.\"\n\t\t*set factual %-10\n\t\t*goto voiceover\n\t#\"Just do it.\"\n\t\tTracey shrugs. \"Your wish is my command, master.\"\n\n\t\tYou smirk. \"We're up to 'master' now?\"\n\n\t\t*if rel_tracey > 60\n\t\t\t\"Yeah, whenever I can't call you something else at work.\" $!{the} smiles at the joke.\n\t\t*if (rel_tracey \u003c= 60) and (rel_tracey >= 40)\n\t\t\t\"Yeah, whenever I can't call you something else at work.\" $!{the} smirks, and you aren't quite sure if ${the} is joking or not.\n\t\t*if rel_tracey \u003c 40\n\t\t\t\"Yeah, whenever I can't call you something else at work,\" $!{the} grumbles.\n\t\t*set independence %+10\n\t\t*goto voiceover\n\n*label voiceover\nAs Tracey continues to work with the footage, you go back to staring at your tablet, where you're writing the script for your voice-over. It's too long for the material Tracey's putting together. You have to cut the script down.\n\n*choice\n\t#Focus on the families devastated by these acts.\n\t\t*if factual \u003c= 40\n\t\t\tYou focus on the emotional cost to the families of the deceased. It's great human-interest material, sure to pull at the audience's heartstrings.\n\t\t\t*set case2_marketshare +10\n\t\t\t*goto show_maris\n\t\t*else\n\t\t\tYou try to focus on the emotional cost to the families of the deceased. Unfortunately, none of it seems to hang together well, and the flow of the story is off, but you don't have enough time to change it.\n\t\t\t*set case2_marketshare -10\n\t\t\t*goto show_maris\n\t#Emphasize the decay of a system that fails to provide basic medical needs to a portion of the population.\n\t\t*if ambition \u003c= 40\n\t\t\tYou focus on the environment that keeps such desperate people in dire straits. It's a stark look at the nature of the system, sure to get your audience angry at the injustice.\n\t\t\t*set case2_marketshare +10\n\t\t\t*goto show_maris\n\t\t*else\n\t\t\tYou try to focus on the environment that keeps such desperate people in dire straits. Unfortunately, none of it seems to hang together well, and the flow of the story is off, but you don't have enough time to change it.\n\t\t\t*set case2_marketshare -10\n\t\t\t*goto show_maris\n\t#Talk about how talented I am, and how dangerous it was for me.\n\t\t*if ambition >= 60\n\t\t\tYou focus on your skill in getting inside and conducting the investigation, as well as the danger of speaking out about such controversial topics. You're sure the audience will remember your name after this story.\n\t\t\t*set case2_marketshare +10\n\t\t\t*goto show_maris\n\t\t*else\n\t\t\tYou try to focus on your skill in getting inside and conducting the investigation, as well as the danger of speaking out about such controversial topics. Unfortunately, none of it seems to hang together well, and the flow of the story is off, but you don't have enough time to change it.\n\t\t\t*set case2_marketshare -10\n\t\t\t*goto show_maris\n\t#Keep your voice-over to the facts at hand, embellishing nothing but leaving nothing out.\n\t\t*if factual >= 60\n\t\t\tYou confine yourself to the facts, speaking only about what's on the screen but leaving nothing out. You have a solid story, and your factual approach builds in a logical and compelling manner.\n\t\t\t*set case2_marketshare +10\n\t\t\t*goto show_maris\n\t\t*else\n\t\t\tYou confine yourself to the facts, speaking only about what's on the screen but leaving nothing out. Unfortunately, none of it seems to hang together well, and the flow of the story is off, but you don't have enough time to change it.\n\t\t\t*set case2_marketshare -10\n\t\t\t*goto show_maris\n\n*label show_maris\n*page_break\n*achieve ach_first_story\nYou point at the display. \"Let's start at the fifteen-second mark…\"\n\n[i]February 4th, 2062. Afternoon.[/i]\n\nMaris finishes watching the story on her desk display.\n\n\"Well?\" you ask, once the story ends. \"What do you think?\"\n\n*if case2_marketshare \u003c 20\n\tShe leans back. \"The case itself is interesting, but the story is lackluster.\"\n*if (case2_marketshare >= 20) and (case2_marketshare \u003c 30)\n\tShe leans back. \"It's not bad. The story is good, and the footage is adequate. A decent first effort.\"\n*if case2_marketshare >= 30\n\tShe leans back. \"It's good. It's very good. Not what I expected based on the original call, but it's good, solid investigative reporting.\"\n*comment endif\n*if named_felix = true\n\n\t\"I—\"\n\n\t\"There's one problem, though,\" Maris continues, cutting you off. \"The officer, Sloane. I need you to cut him out of the report.\"\n\n\tTracey stands up, outraged. \"What? Why in the hell would we do that?\"\n\n\tMaris frowns. \"Because I asked you to should be enough, but I'll also drop one of your team's Infractions. I have enough problems with the police right now that I don't need you name-dropping one of their detectives to boot. I'm sure I can leverage us taking Sloane out of the story to get the charges dropped against you.\"\n\n\tTracey sits back down. \"Well, my record could use some help, but I don't know if I'm comfortable censoring a story just to get out of some hot water.\"\n\n\t*choice\n\t\t#Refuse.\n\t\t\t\"I can't. I won't. It's what happened, and we have a responsibility to present everything.\"\n\n\t\t\tMaris laces her fingers together and leans on her desk. \"If that's how you feel, then we'll air it. But I can only do so much. I hope you know what you're doing, ${pl_fname}.\"\n\t\t\t*set factual %+10\n\t\t\t*goto early_enters\n\t\t#Change it to keep him anonymous.\n\t\t\t\"I won't take him out of the story,\" you say. \"But I'll have Tracey edit it so his face and name don't come into it.\" Tracey frowns, but nods.\n\n\t\t\t\"That's fair,\" Maris says. \n\t\t\t*if infractions > 0\n\t\t\t\tShe touches the surface of her desk. \"Hermana, remove one Infraction from the records of Tracey and ${pl_fname}.\"\n\t\t\t\t*set named_felix false\n\t\t\t\t*set infractions -1\n\t\t\t\t*set independence %+10\n\t\t\t\t*goto early_enters\n\t\t\t*else\n\t\t\t\tShe touches the surface of her desk. \"Hermana, remove one Infraction from Tracey's record.\"\n\t\t\t\t*set named_felix false\n\t\t\t\t*set independence %+10\n\t\t\t\t*goto early_enters\t\t\t\t\n\t\t#Leave it in unless the police department makes it worth my while.\n\t\t\t\"Let's leave it in,\" you say. \"Maybe you can get something out of the police if they think we're getting ready to run it.\"\n\n\t\t\tMaris laces her fingers together and leans on her desk. \"Are you seriously suggesting that we blackmail the NAPD?\"\n\n\t\t\tYou spread your hands wide. \"Only if I get a cut.\"\n\n\t\t\tShe shakes her head. \"I don't know what you're up to, but I hope you know what you're doing. This is a dangerous game you're playing, ${pl_fname}.\"\n\t\t\t*set ambition %+10\n\t\t\t*goto early_enters\n\t\t#Edit it out.\n\t\t\t\"No problem, Maris. We'll cut it.\" Tracey frowns, but nods.\n\n\t\t\t\"Thank you,\" Maris says. \n\t\t\t*if infractions > 0\n\t\t\t\tShe touches the surface of her desk. \"Hermana, remove one Infraction from the records of Tracey and ${pl_fname}.\"\n\t\t\t\t*set named_felix false\n\t\t\t\t*set infractions -1\n\t\t\t\t*set independence %+10\n\t\t\t\t*goto early_enters\n\t\t\t*else\n\t\t\t\tShe touches the surface of her desk. \"Hermana, remove one Infraction from Tracey's record.\"\n\t\t\t\t*set named_felix false\n\t\t\t\t*set independence %+10\n\t\t\t\t*goto early_enters\n*else\n\t*if (infractions > 0) and (case2_marketshare > 30)\n\t\t\n\t\t\"Thanks,\" you say. \"I had to do a few things to get this to you. Do you think the story is strong enough to justify dropping one of our Infractions?\"\n\n\t\tShe considers it for a moment, and looks to her desk. \"Hermana, remove one Infraction from the records of Tracey and ${pl_fname}.\"\n\t\t\n\t\tYou smile. \"Thanks, boss.\"\n\t\t*if rel_tracey > 55\n\n\t\t\tTracey pokes you. \"Hey, that's my line.\"\n\t\t*set infractions -1\n\t\t*goto early_enters\n\t*else\n\t\t*goto early_enters\n\n*label early_enters\n\nAt that point, you hear a slow clap. All of you turn to see that Early has entered the office, sarcastically applauding your effort as a cigarette dangles from his lips.\n\n\"Congratulations, ${pl_fname},\" he says. \n*if rel_early > 25\n\t\"I'm glad that you finally managed to learn something from a real talent like me.\"\n*if rel_early \u003c= 25\n\t\"I see that you and your trained monkey managed to muddle through a story somehow.\"\n*comment endif\n\nYou feel a headache building as the reporter sweeps into the office and sits on the edge of Maris's desk. \"Maris…\"\n\n\"Put that cigarette out before you speak to me, Early,\" Maris says, her voice low and dangerous.\n\nHe nods and pinches the ash off his cigarette, catching it in his other hand. You involuntarily wince as the tip smolders in his palm. \"I've been keeping an eye on your new pet here, Maris, and this story is terrible. Since the lead was called into my show's hotline, the story should run under my name.\" He rubs the ash over his hands to smother it. \"Of course, I'll have to change the voice-over, but I'm willing to give these two a contributor byline for the story.\"\n\nYou stand up. \"Why in the hell would I do that?\"\n\nEarly looks over at you. \"Settle down, rookie. The adults are talking.\"\n\n*choice\n\t#Trust Maris's judgment of my ability to put together an engaging story.\n\t\t*if (factual \u003c= 35) or (case2_marketshare >= 40)\n\t\t\tMaris shakes her head. \"No, Early. The story deserves a shot on its own merits. We'll send it out as a pilot for ${pl_fname}'s new show.\"\n\n\t\t\tEarly shakes his head. \"Your call, but I think you're making a mistake gambling on this rookie.\"\n\n\t\t\tTracey smirks. \"Like she took a gamble on you?\"\n\t\t\t*set celebrity +10\n\t\t\t*set rel_early %-10\n\t\t\t*goto early_tracey\n\t\t*else\n\t\t\tMaris considers. \"Running it on Early's show would give it a boost. Let's use it to test the market and build an audience for ${pl_fname}, in preparation for ${phis} pilot.\"\n\n\t\t\t\"That's not what we agreed to,\" you say.\n\n\t\t\tShe shakes her head. \"I said you'd get your own show, and you will. But I think you still need to find your feet a little.\"\n\n\t\t\tEarly nods. \"Exactly. No point in making a mistake gambling on the rookie.\"\n\n\t\t\tTracey snarls. \"Like she took a gamble on you?\"\n\t\t\t*set early_show true\n\t\t\t*set rel_early %+10\n\t\t\t*goto early_tracey\n\t#Remind Maris of our deal to give me a new show.\n\t\t*if ambition >= 60\n\t\t\t\"We agreed to a brand-new show,\" you say to Maris. \"How are you going to be able to test audience reaction if you're running my story in the B-slot of Early's show?\"\n\n\t\t\tMaris thinks for a moment, and then nods. \"That's a good point. Early, I'm sorry, but we're going to use this as the pilot for ${pl_fname}'s new show.\"\n\n\t\t\tEarly shakes his head. \"Your call, but I think you're making a mistake gambling on this.\"\n\n\t\t\tTracey smirks. \"Like she took a gamble on you?\"\n\t\t\t*set celebrity +10\n\t\t\t*set rel_early %-10\n\t\t\t*goto early_tracey\n\t\t*else\n\t\t\t\"But we agreed to a new show,\" you say to Maris.\n\n\t\t\tShe shakes her head. \"I said you'd get your own show, and you will. But I think you still need to find your feet a little.\"\n\n\t\t\tEarly nods. \"Exactly. No point in making a mistake gambling on the rookie.\"\n\n\t\t\tTracey snarls. \"Like she took a gamble on you?\"\n\t\t\t*set early_show true\n\t\t\t*set rel_early %+10\n\t\t\t*goto early_tracey\n\t#Point out that Tracey and I both worked hard on this.\n\t\t*if independence \u003c= 35\n\t\t\t\"This isn't just about me,\" you say, pointing to Tracey. \"We both worked hard on this, and despite what happened with INN security, I couldn't have made this story without ${thim}. We worked as a team, and we both deserve better than to be shoved into the B-slot of Early's show.\"\n\n\t\t\tMaris thinks for a moment, and then nods. \"That's a good point. Early, I'm sorry, but we're going to use this as the pilot for ${pl_fname}'s new show.\"\n\n\t\t\tEarly shakes his head. \"Your call, but I think you're making a mistake gambling on this.\"\n\n\t\t\tTracey smirks. \"Like she took a gamble on you?\"\n\t\t\t*set celebrity +10\n\t\t\t*set rel_early %-10\n\t\t\t*goto early_tracey\n\t\t*else\n\t\t\t\"But what about Tracey?\" you ask, pointing to ${thim}.\n\n\t\t\tShe shakes her head. \"I said you'd both get your own show, and you will. But I think you still need to find your feet a little.\"\n\n\t\t\tEarly nods. \"Exactly. No point in making a mistake gambling on the rookie.\"\n\n\t\t\tTracey snarls. \"Like she took a gamble on you?\"\n\t\t\t*set early_show true\n\t\t\t*set rel_early %+10\n\t\t\t*goto early_tracey\n\n*label early_tracey\n\nEarly turns to look at Tracey. \"Oh, it speaks. Didn't you learn your lesson last time?\"\n\nTracey balls ${this} hands into fists. \"Step a little closer and I'll show you what I've learned,\" ${the} says.\n\nMaris slams a hand down on her desk. \"I've made my decision. ${pl_fname}, you and Tracey prep the story. We're broadcasting it in two days, so be ready.\"\n\nYou nod, and grab Tracey's arm, dragging ${thim} out before ${the} can say anything else. \"What the hell is your problem with Early?\" you ask once you're both away from Maris's office.\n\n\"He's a jerk,\" Tracey says. \"Or hadn't you noticed?\"\n\n\"But you act like it's personal.\"\n\nTracey pulls ${this} arm out of your hand. \"It is. I used to be his editor.\"\n\n\"What happened?\"\n\n\"He and I worked together a lot during the first season of The Early Hour. But then he…made a deal.\"\n\n\"What kind of deal?\"\n\n\"I don't know the details. Said he had some dirt on someone big, some corporate VP or something. Early went to go talk to him, but he didn't tell me about the meeting. By the time he got back, Early said he was dropping the story. I said we had an obligation to air it, and he ordered me to back off.\" $!{the} rubs the back of ${this} neck. \"So I punched him, and then I tried to break into his files to get the data, but he had them password-locked. Next thing I knew, I was dinged with an Infraction and he threw me off his show.\"\n\n*if (rel_tracey >= 60)\n\t$!{the} smiles at you. \"I have a much better partner now.\"\n*if (rel_tracey \u003c 60) and (rel_tracey >= 50)\n\t$!{the} shrugs. \"I'm hoping I'm not going to be 0 for 2, but I have a good feeling about this.\"\n*if (rel_tracey \u003c 50)\n\t$!{the} shrugs. \"Maybe I'm just not cut out to be an editor. I seem to be going 0 for 2.\"\n*comment endif\n\nWell, that explains the second Infraction. \n\n*if early_show = true\n\tLooks like it's going to be an interesting couple of days trying to keep Early and Tracey apart….\n*if early_show = false\n\tHopefully creating a whole new show will keep Tracey distracted for a couple of days….\n*comment endif\n\n*page_break\n[i]February 6th, 2062. Showtime.[/i]\n\nYou're all sitting in Maris's office, watching the INN feed and the market share index as they hover over her desk. You glance over at Tracey, seeing if you can find any indication of ${this} state of mind. \n*if (rel_tracey >= 60)\n\t$!{the} smiles back and gives you a thumbs up.\n*if (rel_tracey \u003c 60) and (rel_tracey >= 40)\n\t$!{the} smiles back before turning back to the feed.\n*if (rel_tracey \u003c 40)\n\t$!{the} forces a smirk before turning back to the feed.\n*comment endif\n\n*if early_show = true\n\tThe opening music plays, and the graphic for The Early Hour swoops into view. The announcer speaks over the title graphic: \"It's The Early Hour, with your host, Early Roberts!\" Tracey snarls slightly at the graphic, but you pretend not to notice.\n\t*goto ratings\n*if early_show = false\n\tThe opening music plays, and the graphic for your show swoops into view. It's the first episode of your brand-new show…\n\t*choice\n\t\t#The $!{pl_fullname} Show.\n\t\t\t\"I still think we should have changed the name,\" Tracey mutters. You nudge ${thim} to be quiet.\n\t\t\t*set pl_showname \"The $!{pl_fullname} Show\"\n\t\t\t*goto title_card\n\t\t#Deep Secrets.\n\t\t\t\"It's a little…desperate, don't you think?\" Tracey mutters. You nudge ${thim} to be quiet.\n\t\t\t*set pl_showname \"Deep Secrets\"\n\t\t\t*goto title_card\n\t\t#The Unvarnished Truth.\n\t\t\t\"I knew you'd like that one,\" Tracey mutters. You nudge ${thim} to be quiet.\n\t\t\t*set pl_showname \"The Unvarnished Truth\"\n\t\t\t*goto title_card\n\t\t#A name I came up with.\n\t\t\t*input_text pl_showname\n\t\t\t*goto title_card\n\n*label title_card\n\nThe announcer speaks over the title graphic—one of the synthetic voices that INN has on hand, but it's a start. \"And now, ${pl_showname}, with your host, ${pl_fullname}!\" You feel a thrill as you hear that. Finally, your own show. \n*goto ratings\n\n*label ratings\n*set market_share + case2_marketshare\n*page_break\nThe introduction starts to play. As you wait for the story to air, you do a vanity search with your opticOS linkup to see what your online buzz is like.\n\n*if celebrity >= 60\n\tPeople are already talking about you online, in preparation for the show. Seems all the name-dropping and self-promotion you've been doing has been paying off.\n*if (celebrity \u003c 60) and (celebrity >= 40)\n\tSome people are chatting about you online, trying to convince others to watch your work. It's not instant celebrity, but it's good you're already building a loyal audience.\n*if (celebrity \u003c 40) and (celebrity >= 20)\n\tThere are a couple of places where people are talking about you online, but most people don't even seem to know about you. Still, it takes time to build a loyal and devoted audience.\n*if celebrity \u003c 20\n\tNo one appears to be talking about you much online. It seems your dreams of fame aren't going to be realized just yet.\n*comment endif\n\nYou focus on the screen as the story starts to air. Maris's digital assistant, Hermana, has superimposed a market share ticker on the screen. Market share is a complex algorithm that tracks the number of viewers watching, their reactions to the material (positive and negative), and their online interactions during the period. The scores are aggregated into a market share score for the reporter. INN tracks every reporter's market share in real time, so you can watch your score climb as the story plays out.\n\n*page_break\n*if market_share >= 40\n\tYou watch as the score climbs. And climbs. And climbs.\n\n\t\"Hey Early,\" Tracey says as you all watch the score continue to grow. \"Isn't that higher than the market share you got from your first story?\"\n\n\t*if early_show = true\n\t\tEarly snorts. \"It's only because my show's already a huge hit.\"\n\n\t\tMaris smiles. \"Actually, even accounting for that factor, I think ${pl_fname}'s market share is higher.\"\n\n\t\tEarly frowns, stands up, and walks out of the office.\n\t\t*achieve ach_luck\n\t\t*goto next_case\n\t*else\n\t\tEarly snorts. \"Beginner's luck.\"\n\n\t\tMaris smiles. \"Hardly. I think these are some of the biggest numbers I've ever seen for a pilot episode on this network.\"\n\n\t\tEarly frowns, stands up, and walks out of the office.\n\t\t*achieve ach_luck\n\t\t*goto next_case\n*if (market_share \u003c 40) and (market_share >= 30)\n\tYou watch as the score climbs. It's a really good score, especially for a first-time effort.\n\n\t\"Hey Early,\" Tracey says as you all watch the score. \"Isn't that about the same market share you got from your first story?\"\n\n\t*if early_show = true\n\t\tEarly snorts. \"I had to build my audience from the ground up. Luckily I'm gracious enough to give the rookie a hand.\"\n\n\t\t\"Yeah,\" Tracey says. \"You're all heart.\"\n\n\t\tEarly stands up. \"Well, as entertaining as this is, some of us have work to do.\" He walks out of the office.\n\t\t*goto next_case\n\t*else\n\t\tEarly snorts. \"Beginner's luck.\"\n\n\t\tMaris smiles. \"Hardly. I think this proves that ${pl_fname} has just as much talent as you do.\"\n\n\t\tEarly frowns, stands up, and walks out of the office.\n\t\t*goto next_case\n*if (market_share \u003c 30) and (market_share >= 20)\n\tYou watch as the score slowly rises. It's not great, but for a first-time effort it isn't bad.\n\n\tEarly snorts. \"Not nearly as good as my first outing.\"\n\n\tMaris nods. \"I agree, it's not as high as I would have hoped, but it's a good start.\"\n\n\t*if early_show = true\n\t\tEarly stands up. \"Well, as entertaining as this is, some of us have work to do.\" He walks out of the office.\n\t\t*goto next_case\n\t*else\n\t\tEarly stands up. \"Well, as entertaining as this is, I should go work on the show that actually brings in money for the network.\" He walks out of the office.\n\t\t*goto next_case\n*else\n\tYou watch as the score flutters but barely rises. The story has tanked.\n\n\tEarly laughs. \"Don't say I didn't warn you, Maris. I knew the rookie couldn't cut it.\"\n\n\tMaris frowns. \"I agree. The story isn't doing nearly as well as I would have hoped. We'll have a lot of work to do to increase the quality bar.\"\n\n\t*if early_show = true\n\t\tEarly stands up. \"Well, as entertaining as this is, I have to go undo the damage the rookie has done to my show.\" He walks out of the office.\n\t*if early_show = false\n\t\tEarly stands up. \"Well, as entertaining as this is, I have better things to do than watch a show self-destruct.\" He walks out of the office.\n\t*goto next_case\n\n*label next_case\n*page_break\n\"Good riddance,\" Tracey mutters.\n\n\"Play nice,\" you say.\n\n\"Well,\" Maris says. \n*if early_show = true\n\t\"You both have your work cut out for you in finding the next story to kick off your first episode.\"\n*if early_show = false\n\t\"You both have your work cut out for you in finding the next story to keep your momentum going.\"\n*comment endif\n\nTracey taps ${this} ear. \"I've set up our own number for tips. I'll check it and let you know as soon as I have leads, boss.\" $!{the} gets up and walks out after Early.\n\n*page_break\n\"$!{pl_fname},\" Maris says, as you start to stand up and follow Tracey. \"I've been going over how you handled this investigation, and I have some advice.\"\n\nYou sit back down. \"Sure, okay.\"\n\n*if factual >= 60\n\tShe folds her hands together, placing them on her desk. \"You have a strong-minded dedication to the facts.\"\n*if (factual \u003c 60) and (factual >= 40)\n\tShe folds her hands together, placing them on her desk. \"You seem to struggle between the facts of a story and its entertainment value.\"\n*if factual \u003c 40\n\tShe folds her hands together, placing them on her desk. \"You have a good eye for what makes for an entertaining story.\"\n*comment endif\n\n*if ambition >= 60\n\tYou nod. \"I just want to be the best.\"\n\n\t\"And your ambition will take you far, particularly at INN. I don't want people working for me who don't want to be the best.\"\n\n\t\"No problem there, Maris. I will do whatever it takes.\"\n*if (ambition \u003c 60) and (ambition >= 40)\n\tYou nod. \"I just want to be a good reporter.\"\n\n\t\"But you need to decide what kind of reporter you want to be. An ambitious reporter can get far, but so can a reporter with a lot of personal integrity and strong ethics. Both have been very successful in the past, but those reporters who try to pick and choose their way forward often get lost in the shuffle.\"\n\n\t\"Okay,\" you say. \"I'll think about that.\"\n*if ambition \u003c 40\n\tYou nod. \"I just want to be an inspiration.\"\n\n\t\"And your integrity will take you far. It's easy to focus on glory and fame, particularly at INN, but reporters with a strong moral center can get just as far. As long as you keep giving me reasons to support you.\"\n\n\t\"Of course, Maris. I'll do whatever I can to play it straight.\"\n*comment endif\n\n*page_break\n*if independence >= 60\n\tShe taps the surface of her desk. \"You also have a certain independent spirit that I appreciate. I like knowing that when the chips are down, you're not waiting for someone to come in and fix the problem for you.\"\n\n\t\"Well, as far as I'm concerned, it's my name on the byline. I have to do the job and live with the repercussions.\"\n*if (independence \u003c 60) and (independence >= 40)\n\tShe taps the surface of her desk. \"You're also having a problem fitting into the overall dynamic here at INN. Some reporters are strong team players, while others have very independent minds. Both can be successful, in their own ways, but staying in the middle you can come across as someone who doesn't like authority, yet still needs someone else to clean up their messes. Pick a working style and stick with it if you want to succeed.\"\n\n\t\"Okay. I'll think about that.\"\n*if independence \u003c 40\n\tShe taps the surface of her desk. \"You're also a strong team player, which I appreciate. I like knowing that I can rely on you to put the needs of the team ahead of your personal interests.\"\n\n\t\"Well, as far as I'm concerned, it's the whole team that gets the story on the air. We're all in this together, and we all have to be proud of what goes out, even if it's only my name on the byline.\"\n*comment endif\n\nMaris nods. \"That's all. I look forward to—\"\n\nHer desk surface lights up with an incoming call. \n\n*page_break\n*if met_rich\n\tShe taps the appropriate spot, and the display pops up with the face of Rich Watson.\n\n\t\"Rich?\" Maris looks at the display with confusion. \"It's nice to hear from you, but why is the Sports desk calling me?\"\n\n\t\"Actually, I was hoping to chat with ${pl_fname},\" he says. \"An anonymous source just passed me a lead, and I thought ${phe} might want it.\"\n\n\tYou smile to yourself. Sometimes it's good to have friends.\n\t*finish\n*if met_jenni\n\tShe taps the appropriate spot, and the display pops up with the face of Jenni, the blogger you met on your first day.\n\n\tMaris looks at the display with confusion. \"I'm sorry, you must have the wrong number, Miss—\"\n\n\t\"It's Jenni.\" Her voice is strained and awkward over the speaker. \"Sorry to bother you, but I was hoping to chat with ${pl_fname},\" she says. \"I ran across an anonymous tip, and…well, after our talk a while ago, I thought ${phe} might want it.\"\n\n\tMaris looks at you, and you just smile. \"What can I say? I'm a people person.\"\n\t*finish\n*else\n\tShe taps the appropriate spot, and the display pops up with Tracey's face.\n\n\t\"Hey you two. We've got a hit already. Looks like we have a new lead.\"\n\t*finish", "humantraffic": "*comment Chapter Seven\n*advertisement\n*temp hide_from_guards 0\n*temp help_coming false\n*text_image chap7.png\n\n[i]February 8th, 2062. Night.[/i]\n\n\"I want to go back in time,\" you say, watching your breath turn into fog in the freezing night air. You fiddle with the car's heater for the thousandth time.\n\n\"Why?\" Tracey asks in your ear.\n\n\"Because I will find whoever said climate change was a myth and punch them in the mouth.\"\n\n\"I'm sure it was more than one person who wrecked things.\"\n\n\"Sure, but punching someone will warm me up.\"\n\nTracey laughs. \"Oh come on. It can't be that cold out there.\"\n\n\"Says the ${tman} sitting back at INN with a warm cup of coffee.\"\n\n\"That's not true. I'm up to three or four cups by now.\"\n\n\"Punching,\" you repeat, shivering. \"Repeatedly.\"\n\nIt's your second night of watching boats come in and out of NA Harbor No. 7—what used to be called Long Beach. The anonymous tip you got was a message about a human trafficking ring operating out of No. 7. The only name the caller had was \"Katrina Gray.\"\n\nThis anonymous tip could have just been a way for someone to get attention, but Tracey pulled up some records on No. 7. The monthly reports of how many boats are going in and out of the harbor didn't match up with the footage ${the} was able to get of the boats actually docking—at least a few boats were coming in and out that weren't in the records. However, the footage came from privacy-enforced cameras, so they blocked out all of the faces and identifying marks of the boats. There was no way to match up which boats were legitimate and which weren't.\n\n\"Why don't we do a stakeout?\" Tracey suggested.\n\n\"You want us both to sit in the cold for days at a time hoping that we'll be able to catch someone in an undocumented boat sneaking people into New Angeles.\"\n\n\"Not at all,\" Tracey said with a wide grin on ${this} face. \"I won't be sitting in the cold. Boss.\"\n\nYou gave ${thim} a hard stare.\n\n*if rel_tracey >= 50\n\t$!{the} laughed. \"Don't worry. We'll work something out.\"\n*if rel_tracey \u003c 50\n\t$!{the} shrugged. \"Guess that's the life of being a glamorous reporter, huh?\"\n*comment endif\n\nSo you pitched it to Maris. Taking a cab wasn't going to be practical for the stakeout, so she assigned you one of INN's loaner cars. However, she could only justify the expense on her budget for three days—after that, you'd have to return the car and either find another way to stake out the dock, or move on to another lead. You figured that after three days, you'd have to come up with another story anyhow, in order to make the deadline for your show.\n\n*page_break\nYou found a parking spot that was close to the port and gave you a good view of most of the ships coming in. It was also next to a portable toilet, which was a huge help. Once in a while you would use your opticOS to order some food and have a freelance messenger bring it to you—expensive, but as long as INN was footing the bill for this stakeout, it was worth the money so you didn't have to leave your car.\n\nThe first night wasn't bad. It didn't get too cold, and you were able to check every ship as it came in, but each one looked legitimate. You and Tracey used the time to see what you could find on Katrina Gray, but there was hardly anything. Her name has been associated with similar smuggling operations every once in a while, but no one has ever taken a clear picture of her, and all signs point to \"Katrina Gray\" not being her real name. Both of you gave up on the research after several hours, hoping that the stakeout would yield more information.\n\nTonight the temperature drops to the lowest it's been in decades. That's when you learn that the car's heater is terrible. You call Maris about it, but she says something about an unnecessary expense for a vehicle that spends all of its time in California. You kill the time by…\n\n*fake_choice\n\t#Drinking a lot of coffee.\n\t\tAfter the fourth or fifth cup, your hands start to vibrate on the wheel, but you're not any less bored. \n\t#Toying with my opticOS.\n\t\tYou spend about an hour trying every feature of your opticOS. There's not much there that you didn't already know, but at least you finally figure out how to get the alarm to work. \n\t#Talking with Tracey.\n\t\tTracey chats with you about the case, office gossip, and even the sports scores. After a few hours, you're both bored with the conversation. \n*comment endif\nNow you're just staring at anything that moves. For the past fifteen minutes you've been watching a large ship—a freighter or a shipping boat or whatever they call them—as it slowly comes into the shipping dock.\n\nSomething catches your eye, and you see three black cars pulling into the dock area the ship's coming alongside. A large truck pulls in behind them.\n\n\"That's new,\" you mutter.\n\n\"Yeah. First time I've seen that many cars in one place.\"\n\nOn a hunch, you get out of your car. \"I'm going to take a closer look.\"\n\n*page_break\nYou carefully make your way to the short ramp that leads to the docks, as you watch six people in dark suits get out of the cars. They're all wearing dark netglasses, and four of them are looking in every direction while the other two watch the ship dock. You manage to duck behind the trunk of a tree as one of them looks in your direction.\n\n\"Maybe it's just me, but those people look very suspicious,\" Tracey says. \"Try to see what they're doing.\"\n\n*choice\n\t#Keep to the shadows and move closer to the vehicles.\n\t\tMoving slowly and carefully, you stay away from the lights as you make your way closer to the group of vehicles and people.\n\t\t*set hide_from_guards 1\n\t\t*goto loading\n\t#Use the zoom on my opticOS to get a better look at what's going on.\n\t\tAdjusting the settings of your opticOS, you manage to zoom in. The image is grainier and your peripheral vision is reduced, but you can see more clearly what's going on.\n\t\t*set hide_from_guards 2\n\t\t*goto loading\n\t#Climb the tree to watch them from above.\n\t\tCareful not to make any noise, you climb the tree you were hiding behind. Finding a few thick branches low to the ground, you crouch on one of them to get a better view of the shipping area.\n\t\t*set hide_from_guards 3\n\t\t*goto loading\n\n*label loading\nYou watch the suited people keep guard as a large metal shipping container is lowered by a crane onto the back of the truck. You can barely hear two of them talking about \"checking the shipment\" with the driver of the truck as they make their way around it. The shipping container settles onto the truck with a heavy thump, and you can hear automatic clamps snapping and hissing to secure it. \n\nThe two people who were talking finish their discussion and walk to a door in the side of the shipping container. They take off their dark netglasses and both of them pull out pistols, keeping them ready. Even from this distance, you can see that those are deadly, expensive weapons, not the cheap off-the-rack zappers you've seen before.\n\nYou can hear a long, low whistle in your ear. \"Damn,\" Tracey says. \"This is serious.\" You don't say anything, but you set your opticOS to record while you stream the low-quality footage to Tracey. Just in case.\n\nThe armed people nod to each other, and one of them reaches for the door and slowly opens it. There are some fluorescent lights inside that illuminate the faces of the suited guards. But your eye is drawn to the contents of the container.\n\n*page_break Look Inside\nPeople. The container is full of poor, hungry, desperate people.\n\nKnowing that you only have a few moments to record, you have to decide quickly where to focus your attention.\n\n*choice\n\t#Focus on the criminals, so they can be identified later.\n\t\tWith their dark netglasses off, you can get a good look at both of their faces. One of them has a scar on her cheek, while the other person looks nondescript. The one with the scar points her pistol at someone in the truck, while the other closes the door.\n\t\t*set case3_marketshare +10\n\t\t*set ambition %-10\n\t\t*set factual %+10\n\t\t*goto you_should_go\n\t#Focus on the people in the container, to give my story more emotional impact.\n\t\tYou focus on the people in the container. They shuffle around inside as if all hope has been beaten out of them. One of them tries to run for the door, but a guard points the pistol more firmly at the runner, who steps back again before the door is closed.\n\t\t*set case3_marketshare +10\n\t\t*set factual %-10\n\t\t*set independence %+10\n\t\t*goto you_should_go\n\t#Divide my attention between the two, so I have something for Maris no matter what.\n\t\tYou look back and forth, getting some quick footage of both the two suited guards and the people in the container. One of the captured people tries to run forward for the door, but a guard aims her pistol at the runner. You can't see anything else as the door is closed.\n\t\t*set case3_marketshare +10\n\t\t*set ambition %+10\n\t\t*set independence %-10\n\t\t*goto you_should_go\n\n*label you_should_go\n*achieve ach_criminal\n\"You should go,\" Tracey says. \"I think we have enough to work with.\"\n\n*if hide_from_guards = 1\n\tYou stop recording and look around for a path back to your car from the shadows. As you do, you notice that a guard is walking right toward you. You try to back up, deeper into the dark, but you bump into someone standing behind you. You're shoved onto the ground, rocks and grass digging into your face.\n*if hide_from_guards = 2\n\tYou stop recording and zoom back out. Your peripheral vision returns, just in time for you to notice that a guard is walking right toward you. You try to run, but the guard pulls out a gun. You stop, unsure of what to do, as the guard runs up to you. You're shoved onto the ground, rocks and grass digging into your face.\n*if hide_from_guards = 3\n\tYou stop recording, and look for a way down from the tree you're in. You notice that a guard is walking right toward you. You drop down to the ground, ready to run, but you bump into someone standing behind you. You're shoved onto the ground, rocks and grass digging into your face.\n*comment endif\n\n\"Should I send a team in after you?\" Tracey asks. \n*if rel_tracey >= 60\n\t$!{the} sounds worried and frustrated that ${the} can't do more.\n*if (rel_tracey \u003c 60) and (rel_tracey > 40)\n\t$!{the} sounds professional and concerned.\n*if rel_tracey \u003c= 40\n\tYou hear a little bit of sarcasm in the question.\n*comment endif\n\nYou start to struggle, to say something, but something hard is shoved into your back. \"Move and you're dead,\" the voice behind you says. You stop your attempts to escape as the person behind you roughly grabs your hands. You feel something tight bite into your wrists as you hear a plastic zipping sound. You pull up the plaintext software in your opticOS and start to spell out a command to Tracey as ${the} screams in your ear.\n\n\"$!{pl_fname}! Answer me! Ans—\"\n\nYour head is yanked up by the hair, and a bag is pulled over your head. Tracey's voice is immediately cut off, and the connection icon in the corner of your vision goes red. You feel hands roughly searching you, taking everything off of you. Including your press pass.\n\nYou are well and truly captured.\n\n*page_break\nYou are thrown in the back of a vehicle, and you ride for what seems like hours. Once the vehicle stops, you are dragged onto your feet, and the same hard object is jabbed into your back as you are led somewhere. You're shoved into a chair, feel two more restraints zipped around your ankles, and then nothing. You sit in silence for a long time. \n\n*fake_choice\n\t#Struggle to free my wrists.\n\t\tYou try to pull your wrists apart, but whatever you're bound with cuts into your flesh. You can feel warm blood ooze over your knuckles, but you can't get your hands apart.\n\t#Pull my legs out of the restraints.\n\t\tYou try to yank your legs out of your restraints, but you can't seem to move either one of them. They're bound fast to the legs of the chair, and every time you move the restraints threaten to cut through your clothes and into your flesh.\n\t#Shake the bag off my head.\n\t\tYou try to shake the bag off your head, but to no avail. It's heavy, and you can feel some kind of hard substance woven into the fabric. You can't see anything, no matter how you adjust your opticOS.\n*comment endif\n\n\"Stop struggling.\" The voice is muffled and barely audible. You stop what you're doing, trying to listen, and the bag is pulled from your head.\n\nYou're in a warehouse of some kind—a massive concrete building that's empty except for the chair you're in, a second chair across from you, and a small table off to the side. Now that the bag is off, every noise and sound echoes, like you're in a cavern. On the edge of your vision, you notice the opticOS has a faint connection. It's only one bar, but it's more than you had before.\n\nA woman is sitting across from you in the chair, legs crossed as she leans back. She's wearing a dark chocolate outfit that's well-tailored to her frame, matched with heavy brown boots. One of the boots has the hilt of a knife sticking out of it. Unfortunately, that's all you can make out, because there's some kind of electronic haze that obscures her features, hands, and any exposed skin.\n\n\"Confused?\" she says. Her voice is distorted, sounding like it's coming over a bad connection. The woman shifts, uncrossing her legs to lean forward. \"Don't worry. I just want to have a little talk.\"\n\n*fake_choice\n\t#\"What's going on?\"\n\t\t\"No no,\" she says, leaning back and crossing her legs again. \"You don't get to ask the questions yet.\"\n\t#\"Who are you?\"\n\t\t\"No no,\" she says, leaning back and crossing her legs again. \"You don't get to ask the questions yet.\"\n\t#\"Where am I?\"\n\t\t\"No no,\" she says, leaning back and crossing her legs again. \"You don't get to ask the questions yet.\"\n*comment endif\n\nOne of the suited guards you saw before steps forward and takes the earpiece from your ear. She points to him, and the guard brings the earpiece to her. The haze blurs whatever she's doing. You pull up the opticOS diagnostics program, and within seconds you discern that it's some kind of signal interference that's specific to her. Looking to the left and right, you don't see any similar disruption. One of the guards grabs your head and twists it, forcing you to look at the woman again.\n\n\"Nice tech,\" the woman says, still holding your earpiece. Now that the earpiece is out, her voice is clear and calm, with an edge of humor. She lets the earpiece drop to the concrete floor, and then she stomps on it with her boot. \"Surprised you don't have any netglasses, though,\" she says, as the earpiece expires with a [i]pop[/i] and a small wisp of smoke. \"I wore my nicest scrambler chip for you and everything.\"\n\n\"Can't afford it,\" you mutter, wondering if she doesn't notice your implants.\n\n*if celebrity >= 30\n\tShe laughs. \"Oh, I doubt that. I'm sure the [i]famous[/i] ${pl_fullname} can afford a simple pair of netglasses.\" You can hear her sneer on the word \"famous.\" She motions to a guard, who brings her your press pass. The woman doesn't even look at it before she slips it into her pocket. \"But now I have a little memento. Maybe you'll autograph it for me later.\"\n*if (celebrity \u003c 30) and (celebrity > 10)\n\tShe shakes her head, and the blur moves with her. \"I somehow doubt an INN reporter is paid that little.\" She motions to a guard, who brings her your press pass. The woman glances at it before she slips it into her pocket. \"But I guess we'll find out all about you, ${pl_fullname}.\"\n*if celebrity \u003c= 10\n\tShe shrugs. \"Maybe. Maybe not. Your earpiece certainly doesn't look off-the-rack.\" She motions to another guard, who brings her your press pass. The woman looks it over before she slips it into her pocket. \"But somehow I don't think you're just a poor reporter fighting for scraps, ${pl_fullname}.\"\n*comment endif\n\nAs she talks, you notice letters slowly crawl across your vision in the plaintext program of your opticOS.\n\nTHIS IS TRACEY. CAN YOU SEE THIS?\n\nIt's Tracey! Somehow ${the}'s sending a message back via the weak signal you have. You need to keep this woman talking while you communicate with ${thim}.\n\n\"You didn't bring me here to talk about my salary,\" you say. You speak slowly, as if you're tired, drawing out the words as you compose a message: I READ YOU.\n\nThe woman stands up. \"True,\" she says. \"I want to ask you some questions.\"\n\n\"Can I at least get a name? You already know mine.\"\n\nThe blur pauses for a moment. \"You've already seen my true face, so why not make things a little more comfortable? You can call me Katrina. Katrina Gray.\"\n\nWell, at least now you know why no one has a clear picture of her, although she doesn't know you can't see her clearly.\n\nMore text crawls across your vision. DO YOU NEED HELP? You have time to send a couple of words in reply.\n\n*choice\n\t#Ask for help.\n\t\tYES. NOW.\n\t\t*set help_coming true\n\t\t*set independence %-10\n\t\t*goto interrogation\n\t#Not yet. I have to get information first.\n\t\tSTAND BY.\n\t\t*set factual %+10\n\t\t*goto interrogation\n\t#Wait until I get something juicy for my story.\n\t\tSTAND BY.\n\t\t*set factual %-10\n\t\t*goto interrogation\n\t#I can get out on my own.\n\t\tI'M FINE.\n\t\t*set independence %+10\n\t\t*goto interrogation\n\n*label interrogation\nThe words blink in your vision. For a moment the connection icon flickers to red, but it switches back to a single green bar. You close your eyes, hoping the message got sent.\n\nThe woman starts pacing back and forth in front of her chair. \"Let's start with this. Why are you watching my business?\"\n\nUNDERSTOOD, the line in your vision says. Your message got through.\n\n*if help_coming\n\tNow you have to keep her talking until help arrives.\n*if help_coming = false\n\tNow you have to get some information out of her.\n*comment endif\n\nWatching the blur in your vision pace back and forth, you mentally review your options. \n\n*page_break\nA few years ago, you heard about \"reverse interrogation.\" It's a technique in which the victim being interrogated ends up getting more information out of the questioners than they get out of the victim. It's used more often by spies than reporters, so you only know that the concept exists—you've never had to do it in practice. It would take a lot of skill, but you might be able to pull it off.\n\nAlternatively, you can simply try to negotiate with her, relying on your natural charm and charisma to convince her to talk to you. You're not in a good bargaining position, but sometimes it's not what you have to trade, but how you sell what you do have to make it more attractive. If you play your cards right, you might be able to get out of here with your life.\n\nFinally, she doesn't seem to have noticed your implants. The bag over your head was probably made from some kind of wireless dampening fabric, but she thinks she destroyed your only link to the outside world when she stomped on your earpiece. You can't stream anything—the connection isn't strong enough for that—but there's a chance you can record the interrogation to your internal drive and use it in your story.\n\nThe woman kicks your chair, snapping your head back. You can taste blood in your mouth as she grabs your hair and pulls your head to look at her. She screams in your face, your vision filled with digital static. \"I said, why are you watching my business?!\"\n\n*choice\n\t#Attempt a reverse interrogation.\n\t\t*goto reverse_interrogation\n\t#Negotiate with her.\n\t\t*goto negotiation\n\t#Record her discreetly.\n\t\t*goto secret_recording\n\n*label reverse_interrogation\nYou decide to use your skills at questioning people to get whatever information you can out of her.\n\n*if investigation >= 60\n\t\"Word gets around,\" you say, hoping to entice her interest.\n\n\tShe steps back. \"Oh it does, does it? And what word is that?\"\n\t*choice\n\t\t#Tell some of the truth.\n\t\t\t*if factual >= 55\n\t\t\t\tYou try to shrug in the chair. \"Got an anonymous tip about unusual shipments on the waterfront. Thought there might be a story in it.\"\n\n\t\t\t\tShe sits down in her chair, watching you. \"And your so-called anonymous source wouldn't happen to be a police officer, would it?\"\n\n\t\t\t\tInteresting. She's worried about someone in the police.\n\n\t\t\t\t\"Could be. I bet if we put our heads together, we might both walk away with more than we had to start.\"\n\n\t\t\t\tYou can't read her face. You have no idea if what you're saying is having an impact on her. All she's doing is watching you. But after several minutes, she nods.\n\n\t\t\t\t\"Okay. Let's see if you're more useful to me alive, ${pl_fullname}.\"\n\t\t\t\t*set celebrity +15\n\t\t\t\t*goto deductions\n\t\t\t*else\n\t\t\t\tYou try to shrug in the chair. \"Got an anonymous tip about unusual shipments on the waterfront. Thought there might be a story in it.\"\n\t\t\t\t*goto failed\n\t\t#Flatter her.\n\t\t\t*if factual \u003c= 45\n\t\t\t\tYou try to shrug in the chair. \"Heard that Katrina Gray is the woman to see if you want something shipped discreetly.\"\n\n\t\t\t\tShe sits down in her chair, watching you. \"And where did you hear that from?\"\n\n\t\t\t\tYou feel more blood welling up in your mouth. \"Anonymous sources. You know how it is.\"\n\n\t\t\t\t\"Your 'anonymous source' wouldn't happen to be a police officer, would it?\"\n\n\t\t\t\tInteresting. She's worried about someone in the police.\n\n\t\t\t\t\"Could be. I bet if we put our heads together, we might both walk away with more than we had to start.\"\n\n\t\t\t\tYou can't read her face. You have no idea if what you're saying is having an impact on her. All she's doing is watching you. But after several minutes, she nods.\n\n\t\t\t\t\"Okay. Let's see if you're more useful to me alive, ${pl_fullname}.\"\n\t\t\t\t*set celebrity +15\n\t\t\t\t*goto deductions\n\t\t\t*else\n\t\t\t\tYou try to shrug in the chair. \"Heard that Katrina Gray is the woman to see if you want something shipped discreetly.\"\n\t\t\t\t*goto failed\n\t\t#Make it about me.\n\t\t\t*if ambition >= 55\n\t\t\t\tYou try to shrug in the chair. \"You're getting popular. A story about you could make my career.\"\n\n\t\t\t\tShe sits down in her chair, watching you. \"And where did you hear about me?\"\n\n\t\t\t\tYou feel more blood welling up in your mouth. \"Anonymous sources. You know how it is.\"\n\n\t\t\t\t\"Your 'anonymous source' wouldn't happen to be a police officer, would it?\"\n\n\t\t\t\tInteresting. She's worried about someone in the police.\n\n\t\t\t\t\"Could be. I bet if we put our heads together, we might both walk away with more than we had to start.\"\n\n\t\t\t\tYou can't read her face. You have no idea if what you're saying is having an impact on her. All she's doing is watching you. But after several minutes, she nods.\n\n\t\t\t\t\"Okay. Let's see if you're more useful to me alive, ${pl_fullname}.\"\n\t\t\t\t*set celebrity +15\n\t\t\t\t*goto deductions\n\t\t\t*else\n\t\t\t\tYou try to shrug in the chair. \"You're getting popular. A story about you could make my career.\"\n\t\t\t\t*goto failed\n*else\n\t\"Kind of hard not to notice it,\" you say. \"I mean, three cars and a truck aren't exactly inconspicuous.\"\n\n\t\"And I suppose you were just hanging around at night near the docks for fun, right?\"\n\n\tYou try to shrug in your chair.\n\t*goto failed\n\n*label negotiation\nYou decide to see if you can bargain with Katrina.\n\n*if charm >= 60\n\t\"I know an entrepreneur when I see her.\"\n\n\tShe steps back. \"Do you now? Are you thinking of changing careers?\"\n\t*choice\n\t\t#Tell some of the truth.\n\t\t\t*if factual >= 55\n\t\t\t\tYou try to shrug in the chair. \"So far all reporting has gotten me is a trip to the hospital, abuse from my peers, and captured.\"\n\n\t\t\t\tHer laugh is cold, heartless, devoid of humor. \"You're funny. But I don't have time for funny.\"\n\n\t\t\t\t\"Okay, how about this? I know of a cop who might be interested in a side business like this. I can put the two of you together and see if maybe there's some potential there. I wouldn't even ask for much of a commission.\"\n\n\t\t\t\tYou can't read her face. You have no idea if what you're saying is having an impact on her. All she's doing is watching you. But after several minutes, she nods.\n\n\t\t\t\t\"Okay. Let's see if you're more useful to me alive, ${pl_fullname}.\"\n\t\t\t\t*set celebrity +15\n\t\t\t\t*goto deductions\n\t\t\t*else\n\t\t\t\tYou try to shrug in the chair. \"So far all reporting has gotten me is a trip to the hospital, abuse from my peers, and problems with the police.\"\n\t\t\t\t*goto failed\n\t\t#Flatter her.\n\t\t\t*if factual \u003c= 45\n\t\t\t\tYou try to shrug in the chair. \"I'd love to see your benefits package before I entertain an offer, of course, but for a successful entrepreneur like you, I'm sure I can make a deal.\"\n\n\t\t\t\tHer laugh is cold, heartless, devoid of humor. \"You're funny. But I don't have time for funny.\"\n\n\t\t\t\t\"Okay, how about this? I know of a cop who might be interested in a side business like this. I can put the two of you together and see if maybe there's some potential there. I wouldn't even ask for much of a commission.\"\n\n\t\t\t\tYou can't read her face. You have no idea if what you're saying is having an impact on her. All she's doing is watching you. But after several minutes, she nods.\n\n\t\t\t\t\"Okay. Let's see if you're more useful to me alive, ${pl_fullname}.\"\n\t\t\t\t*set celebrity +15\n\t\t\t\t*goto deductions\n\t\t\t*else\n\t\t\t\tYou try to shrug in the chair. \"I'd love to see your benefits package before I entertain an offer, of course, but for a successful entrepreneur like you, I'm sure I can make a deal.\"\n\t\t\t\t*goto failed\n\t\t#Make it about you.\n\t\t\t*if ambition >= 55\n\t\t\t\tYou try to shrug in the chair. \"I'm a reporter because I thought it was the best way to make money. If being a criminal gets me there faster, then sign me up.\"\n\n\t\t\t\tHer laugh is cold, heartless, devoid of humor. \"You're funny. But I don't have time for funny.\"\n\n\t\t\t\t\"Okay, how about this? I know of a cop who might be interested in a side business like this. I can put the two of you together and see if maybe there's some potential there. I wouldn't even ask for much of a commission.\"\n\n\t\t\t\tYou can't read her face. You have no idea if what you're saying is having an impact on her. All she's doing is watching you. But after several minutes, she nods.\n\n\t\t\t\t\"Okay. Let's see if you're more useful to me alive, ${pl_fullname}.\"\n\t\t\t\t*set celebrity +15\n\t\t\t\t*goto deductions\n\t\t\t*else\n\t\t\t\tYou try to shrug in the chair. \"I'm a reporter because I thought it was the best way to make money. If being a criminal gets me there faster, then sign me up.\"\n\t\t\t\t*goto failed\n*else\n\t\"Look, maybe we can come to some kind of deal. I know a cop who might be interested in a side business like this.\"\n\t*goto failed\n\n*label secret_recording\nYou decide to risk recording the interrogation.\n\n*if technique >= 65\n\tYou spit some blood out of your mouth while you send the commands to configure silent recording. It's effortless, almost instinctual, as the opticOS quietly starts sending data to your internal drive.\n\t*set recorded_Katrina_interrogation true\n\t*set case3_marketshare +15\n\t*goto scared\n*if (technique \u003c 65) and (technique >= 55)\n\tSince you had lots of time to kill watching boats come in and out of the dock, you practiced with all the different settings on your opticOS and got pretty good at recording without being noticed—while you were sitting in a car by yourself, at least. Now comes the moment of truth. \n\n\tYou spit some blood out of your mouth while you send the commands to configure silent recording. You nearly forget to change one setting, but catch it in time. The opticOS quietly starts sending data to your internal drive.\n\t*set recorded_Katrina_interrogation true\n\t*set case3_marketshare +10\n\t*goto scared\n*else\n\tYou spit some blood out of your mouth and try to send the commands to configure silent recording. Your head immediately starts pounding: you can't focus on anything, and the command keeps misfiring in your opticOS display. \"Hang on,\" you say. \"I just need a moment to think.\"\n\t*goto failed\n\n*label scared\n\nThat's when you notice you're scared. Really scared. And Katrina is waiting for an answer. How you sound on camera can change the whole tone of the conversation, and can say a lot to your audience about what kind of reporter you are.\n\n*choice\n\t#Push past your fear, and keep from telling her anything.\n\t\t*if ambition \u003c= 40\n\t\t\t\"No,\" you say, keeping your voice steady.\n\n\t\t\tShe steps back. Her face is still an infuriating blur. \"No?\"\n\n\t\t\t\"I'm a reporter. I ask the questions. I don't answer them.\"\n\n\t\t\tYou watch her sit down in her chair. \"Do tell,\" she says, her voice intensely sarcastic.\n\n\t\t\t\"I want to know about your operation. I don't have to bring you into it. But there's a lot more going on, and I think you're part of it.\"\n\n\t\t\t\"And where did you get all this information?\"\n\n\t\t\tYou shake your head. \"I told you, I'm not going to give up my sources.\"\n\n\t\t\t\"This source you're protecting wouldn't happen to be a police officer, would it?\"\n\n\t\t\tThat surprises you. She's worried about someone in the police. You decide to change tactics.\n\n\t\t\t\"Some of the information I came up with on my own, but not all of it. If you're willing to share, we might both walk away with more than we had to start.\"\n\n\t\t\tYou can't read her face. You have no idea if what you're saying is having an impact on her. All she's doing is watching you. But after several moments, she nods.\n\n\t\t\t\"Okay. Let's see if you're more useful to me alive, ${pl_fullname}.\"\n\t\t\t*set case3_marketshare +5\n\t\t\t*goto deductions\n\t\t*else\n\t\t\t\"No,\" you say, keeping your voice steady.\n\n\t\t\tShe steps back. Her face is still an infuriating blur. \"No?\"\n\n\t\t\t\"I'm a reporter. I ask the questions. I don't answer them.\"\n\t\t\t*goto failed\n\t#Channel your fear into anger, and act tough to look better on camera.\n\t\t*if factual \u003c= 40\n\t\t\t\"Hell no,\" you say, snarling at her. \"There's nothing you can do to make me talk!\"\n\n\t\t\tShe steps back. Her face is an infuriating blur. \"No?\"\n\n\t\t\t\"I'm a reporter. I ask the questions.\"\n\n\t\t\tYou watch her sit down in her chair. \"Do tell,\" she says, her voice intensely sarcastic.\n\n\t\t\t\"I want to know about your operation. Everything. There's a lot going on, and I think it's all connected. I think you're part of it.\"\n\n\t\t\t\"And where did you get all this information?\"\n\n\t\t\tYou shake your head. \"Forget it. You can't make me give up my source.\"\n\n\t\t\t\"This source you're protecting wouldn't happen to be a police officer, would it?\"\n\n\t\t\tThat surprises you. She's worried about someone in the police. You decide to change tactics.\n\n\t\t\t\"Some of the information I came up with on my own, but not all of it. If you're willing to share, we might both walk away with more than we had to start.\"\n\n\t\t\tYou can't read her face. You have no idea if what you're saying is having an impact on her. All she's doing is watching you. But after several minutes, she nods.\n\n\t\t\t\"Okay. Let's see if you're more useful to me alive, ${pl_fullname}.\"\n\t\t\t*set case3_marketshare +5\n\t\t\t*goto deductions\n\t\t*else\n\t\t\t\"Hell no,\" you say, snarling at her. \"There's nothing you can do to make me talk!\"\n\n\t\t\tShe steps back. Her face is an infuriating blur. \"No?\"\n\n\t\t\t\"I'm a reporter. I ask the questions.\"\n\t\t\t*goto failed\n\t#Play up how scared you are, and use that to get information out of her.\n\t\t*if factual >= 60\n\t\t\t\"I'm just a reporter,\" you say, letting your voice crack in fear. \"I don't want to die.\"\n\n\t\t\tShe steps back. Her face is an infuriating blur. \"No?\"\n\n\t\t\t\"No, please. I just wanted to get a story.\"\n\n\t\t\tYou watch her sit down in her chair. \"Do tell,\" she says, her voice intensely sarcastic.\n\n\t\t\t\"I got an anonymous tip about your operation. About the people you're shipping.\"\n\n\t\t\t\"And this 'anonymous source' wouldn't happen to be a police officer, would it?\"\n\n\t\t\tThat surprises you. She's worried about someone in the police. You decide to change tactics.\n\n\t\t\t\"Some of the information I came up with on my own. But not all of it. Maybe…maybe we can work something out.\"\n\n\t\t\tYou can't read her face. You have no idea if what you're saying is having an impact on her. All she's doing is watching you. But after several minutes, she nods.\n\n\t\t\t\"Okay. Let's see if you're more useful to me alive, ${pl_fullname}.\"\n\t\t\t*set case3_marketshare +5\n\t\t\t*goto deductions\n\t\t*else\n\t\t\t\"I'm just a reporter,\" you say, letting your voice crack in fear. \"I don't want to die.\"\n\n\t\t\tShe steps back. Her face is an infuriating blur. \"No?\"\n\n\t\t\t\"No, please. I just wanted to get a story.\"\n\t\t\t*goto failed\n\n*label failed\n\nSuddenly, the knife is in her hand. She steps forward, and you feel a sharp pain down the side of your face.\n\n\"Wrong!\" she screams. \"I know you've been talking to the police, and now you're in my business!\" You feel the edge of the knife pressed against your throat. \"I'm running out of reasons to keep you alive,\" she hisses in your ear.\n\n\"Wait!\" you yell in desperation. \"I'll talk! I'll talk!\"\n\nThe edge of the knife pulls away. \"Tell me. Everything.\"\n\n*choice\n\t#You don't want to die. Tell her everything.\n\t\tYou tell her about the West Coast Kings, about the murders, about the hospital. You start to tell her about the police when she steps back, slamming the knife back into her boot.\n\n\t\t\"I knew it! I knew he was involved!\" She sits back in her chair, watching you carefully. \"It seems you still have some use to me.\"\n\t\t*set told_Katrina true\n\t\t*goto deductions\n\t#Keep your confession to just the murders.\n\t\tYou tell her a little about the murders. As soon as you mention talking to the police she steps back, slamming the knife back into her boot.\n\n\t\t\"I knew it! I knew he was involved!\" She sits back in her chair, watching you carefully. \"It seems you still have some use to me.\"\n\t\t*set told_Katrina true\n\t\t*goto deductions\n\t#Focus on the illegal hospital.\n\t\tYou tell her a little, primarily focused on the hospital, while she pushes to find out who else knows. As soon as you mention the police she steps back, slamming the knife back into her boot.\n\t\t\n\t\t\"I knew it! I knew he was involved!\" She sits back in her chair, watching you carefully. \"It seems you still have some use to me.\"\n\t\t*set told_Katrina true\n\t\t*goto deductions\n\n*label deductions\n\nYou close your eyes, try to control your shaking, and start thinking.\n\nIt's not unusual that she's worried about the police—she works under an alias, and uses some kind of chip to keep her identity secret—but she's worried about someone [i]specific[/i] in the police department. And she seems to know that you've been speaking to the police lately. But the only police officer you've been talking to is…\n\n\"Sloane,\" you say.\n\n*page_break\nShe sits up in her chair. \"You met with him at the Lame Duck, didn't you?\"\n\n\"How did you know about that?\"\n\nHer laugh is rich, but with an edge of hysteria. \"Oh, you still don't get it, do you? He told me, right before he disappeared.\"\n\n\"He what?\"\n\n\"Right after the police put him on 'administrative leave,' he got in touch with me. And now he's gone. I want to know why.\"\n*set deduction_KatrinaAndSloane true\n*if help_coming = true\n\t*goto help_arrives\n*else\n\t*if rel_tracey >= 70\n\t\t*set tracey_called true\n\t\t*goto help_arrives\n\t*else\n\t\t*goto no_escape\n\n*label no_escape\n\n\"I don't know,\" you say, trying to stall for time. \"But maybe if you tell me why you're looking for him, I can help.\"\n\nKatrina stands up, hooks her boot around the leg of your chair, and pulls. You fall backwards, slamming into the ground with a teeth-jarring crash. Your eyes swim as she looks down on you. \"I was worried, maybe even hoping, that you knew what was really going on. But you're just desperately fishing around for information.\"\n\n*if recorded_Katrina_interrogation = true\n\tAs she talks, a sharp pain starts building behind your eyes. Whether it's prolonged exposure to the scrambler chip, the impact to your skull, or some combination, it hurts to be recording. You mentally stop, and the pain subsides, reduced to a dull throb.\n*if recorded_Katrina_interrogation = false\n\tYou blink your eyes, trying to work past the aching throb in your head.\n*comment endif\n\n\"Maybe I don't know everything,\" you say, \"but it's not hard to connect the dots. You know Sloane. Sloane does a side business in selling murder victims and buying organs. You have a business in buying and selling people. I don't know if he's buying from you or you're buying from him, but it's not hard to find a connection there.\"\n\nShe steps over you and sits down, putting her weight on your ribs and stomach as she stares inches from your face. That disconcerting blur still mars her features as you feel the weight of your whole body press down on your bound wrists behind you. \"Well, aren't you clever? And do you have any proof of this, $!{pmister} clever reporter?\"\n\nUnder her weight, you feel something snap. The restraint on your wrists may have come loose.\n\n*fake_choice\n\t#Roll to the side to dislodge her.\n\t\tYou twist your body hard to the left, rolling the chair over and knocking her to the ground. She lands on her back, and in the moment of surprise you grab the knife in her boot.\n\t#Trick her into getting up so I can attack her.\n\t\t\"Can't…breathe…\" You gasp, as if her weight is crushing your ribs into your lungs. \n\n\t\tThere's a long pause, and you think your ruse has failed, but she slowly stands up. You quickly grab her leg, and pull hard. She falls over in surprise, and you pull the knife from her boot.\n\t#Head-butt her.\n\t\tYou jut your head forward, smashing into hers. The pain in your head intensifies, but she falls over in surprise. You pull your hands out from underneath you and grab the knife from her boot.\n*comment endif\n\nThe guards pull guns and point them at you, but you roll on top of Katrina, chair and all, and hold the knife to her throat. \"Tell them to drop the guns,\" you hiss in her ear. You can't see any expression behind the interference, but after a moment the guards lower their pistols. Using the knife, you cut the plastic restraints on your ankles and stand up, dragging Katrina with you.\n\n\"When I find you, I will spend days killing you, ${pl_fullname},\" she says. \n\nYou ignore her and start walking backwards to a door, keeping her between
