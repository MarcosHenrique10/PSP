re covered in bandages, thrashing in pain. Haggard-looking people in white coats rush between the cots. It looks more like a field hospital or an emergency medical center than something designed to handle patients long-term.\n\nOne wall contains a long row of metal filing cabinets and heavy shelving units. The shelves are packed with torn and ripped boxes containing a variety of medical equipment. The other wall has a heavy metal door that looks like it leads to a walk-in freezer area.\n\n*if captured = true\n\tThe guard drags you over to one of the cots and tells you to lie down. She takes a plastic binder and cuffs one of your wrists to the cot. \"Stay there until we're ready for you,\" she says, before walking off. No one seems to be paying any attention to you.\n\n\tAs she leaves, one of the devices connected to a patient sounds an alarm, and he screams in pain. All of the people in white coats rush over to frantically help the patient. One of them knocks over a rolling cart, scattering medical tools everywhere. A scalpel lands near you, but the hospital staff are too busy to notice. You look over to the doors—the guard has left.\n\n\tYou lean as far as you can to try and reach the scalpel. You can feel the plastic binder scraping at the skin of your wrist as you strain to reach. Finally, just when you think you can't reach any farther, you manage to get a single fingertip on the tool. You ease it into your hand, and you cut through the plastic in moments.\n\n\tYou turn your opticOS on and start recording, while you have a chance to explore.\n\t*set captured false\n\t*goto hospital_explore\n*else\n\tAs you look around, one of the devices connected to a patient sounds an alarm, and he screams in pain. All of the people in white coats rush over to frantically help the patient.\n\n\tYou turn your opticOS on and start recording, while you have a chance to explore.\n\t*goto hospital_explore\n\n*label hospital_explore\n*choice\n\t#Look around for clues.\n\t\tSneaking past the busy staff, you make your way to the wall with the large metal door. The handle lifts easily, and you step inside. It's even colder in here, but not freezing. Noticing that there isn't a handle on this side of the door, you stick your press pass in the frame and carefully close the door on it, so it doesn't lock behind you.\n\n\t\tThe room is packed floor to ceiling in foam coolers. Each one has a red cross on the side, and is covered in shrinkwrap. On the top of one you see a computer-printed sticker that reads \"Kidney (2).\" There's a picture of an Asian man next to it. The date is January 26th, about a week ago.\n\n\t\t\"Organs,\" Tracey says in your ear. \"The whole place is a low-tech organ farm.\"\n\n\t\tYou grab another cooler, which is empty. You read the label. \"Heart (1).\" Next to it is a picture you instantly recognize.\n\n\t\tTasha.\n\n\t\tAcross the bottom is a handwritten note that says \"Sold to J. Smith, 2/1/62.\" [i]Sold.[/i] These organs are being sold.\n\n\t\t\"Are those patients back in the other room being…?\" Tracey lets the thought trail off.\n\n\t\t\"I don't think so,\" you say, putting the case back down. \"The staff is trying to save someone right now. It's more likely that Tasha isn't the first corpse to be brought here and used as parts.\"\n\n\t\t\"Oh god,\" Tracey says. \"This is much bigger than I expected.\"\n\t\t*if investigation >= 60\n\n\t\t\tSomething catches your eye. Picking up another crate, you find an old cable outlet in the wall. Remembering the CCTV cameras you saw when you entered St. Elizabeth's, you mention it to Tracey.\n\n\t\t\t\"This place still has to be wired for video,\" ${the} says. \"I bet if you found a computer hooked into that system, we might be able to get a copy of their security footage.\"\n\n\t\t\t\"There are some old computers set up at the other end of the hospital. How do you suggest I get over there without being noticed?\"\n\n\t\t\t\"Move very quietly?\" Tracey says sarcastically.\n\n\t\t\tGreat. You grab your press pass out of the door and look through the crack. The staff are still finishing up with the patient, even though the alarm has stopped. \n\n\t\t\t*choice\n\t\t\t\t#Pretend to be a patient.\n\t\t\t\t\t*if factual \u003c= 40\n\t\t\t\t\t\tYou quickly creep out of the door and make your way across the large hospital. After a few steps, you notice an IV stand sitting next to an empty bed. You lean on it and start rolling it with you.\n\n\t\t\t\t\t\tOne of the staff members notices you and walks over. \"You should get back to bed, ${psir},\" she says. She looks back over her shoulder at another patient.\n\n\t\t\t\t\t\t\"I will in a moment,\" you say, trying to sound hoarse. \"I just want to get to my email and let my spouse know that I'll be here for another day or two, and then I'll lie back down.\"\n\n\t\t\t\t\t\tThe staff member nods, not paying attention to you. \"Be quick,\" she says, and goes to look at the patient she was staring at. You nod, and manage to walk the rest of the way to the computers without interruption.\n\t\t\t\t\t\t*goto examine_computers\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou quickly creep out of the door and make your way across the large hospital. After a few steps, you notice an IV stand sitting next to an empty bed. You lean on it and start rolling it with you.\n\n\t\t\t\t\t\tOne of the staff members notices you and walks over. \"You aren't supposed to be here, ${psir},\" she says. \"Patients only.\"\n\n\t\t\t\t\t\t\"I am a patient,\" you say, trying to sound hoarse. \"I just—\"\n\n\t\t\t\t\t\t\"Guards!\" she says, yelling as loud as she can. You start to run to the door, but before you can get there, a guard appears in the door frame, pointing a stunner at you.\n\n\t\t\t\t\t\t\"A spy. You're going to talk to the director,\" she says. Not seeing much of a choice, you go with her.\n\t\t\t\t\t\t*set disguised false\n\t\t\t\t\t\t*goto front_door\n\t\t\t\t#Claim to be a technician.\n\t\t\t\t\t*if factual \u003c= 40\n\t\t\t\t\t\tYou creep out of the door and start walking across the large hospital. After a few steps, one of the staff members notices you and walks over. \"Can I help you, ${psir}?\" she asks. She looks back over her shoulder at another patient.\n\n\t\t\t\t\t\t\"I'm here to fix the computers,\" you say. \"Heard there was a problem with them.\"\n\n\t\t\t\t\t\t\"Oh? We barely use them. They're more for security and the patients than anything else.\"\n\n\t\t\t\t\t\tYou shrug. \"Just trying to get a couple of hot meals by helping out, you know?\"\n\n\t\t\t\t\t\tThe staff member nods, not paying attention to you. \"Whatever. Be quick,\" she says, and goes to look at the patient she was staring at. You nod, and manage to walk the rest of the way to the computers without interruption.\n\t\t\t\t\t\t*goto examine_computers\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou creep out of the door and start walking across the large hospital. After a few steps, one of the staff members notices you and walks over. \"Can I help you, ${psir}?\" she asks.\n\n\t\t\t\t\t\t\"I'm here to fix the computers,\" you say.\n\n\t\t\t\t\t\tShe looks at you suspiciously. \"Who told you to fix the computers?\"\n\n\t\t\t\t\t\t\"The owner,\" you say out of desperation.\n\n\t\t\t\t\t\t\"Guards!\" she says, yelling as loud as she can. You start to run to the door, but before you can get there, a guard appears in the door frame, pointing a stunner at you.\n\n\t\t\t\t\t\t\"A spy. You're going to talk to the director,\" she says. Not seeing much of a choice, you go with her.\n\t\t\t\t\t\t*set disguised false\n\t\t\t\t\t\t*goto front_door\n\t\t\t\t#Move very quietly.\n\t\t\t\t\t*if independence >= 60\n\t\t\t\t\t\tYou quietly creep out of the door. Being careful to hide behind beds and equipment whenever anyone notices you, you slowly make your way across the floor.\n\n\t\t\t\t\t\tHalfway through your movement, one of the staff members notices you. \"Hey! What are you doing here?\"\n\n\t\t\t\t\t\tNot sure what to say, you cough slightly. \"Sick,\" you mutter.\n\n\t\t\t\t\t\t\"Great. Well, go to the desk and sign in, and someone will be with you. The sign-in sheet is over by the computers.\" She goes to examine another patient before you can say anything. You walk the rest of the way without interruption.\n\t\t\t\t\t\t*goto examine_computers\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou quietly creep out of the door. Being careful to hide behind beds and equipment whenever anyone notices you, you slowly make your way across the floor.\n\n\t\t\t\t\t\tHalfway through your movement, one of the staff members notices you. \"Guards!\" she says, yelling as loud as she can. You start to run to the door, but before you can get there, a guard appears in the door frame, pointing a stunner at you.\n\n\t\t\t\t\t\t\"A spy. You're going to talk to the director,\" she says. Not seeing much of a choice, you go with her.\n\t\t\t\t\t\t*set disguised false\n\t\t\t\t\t\t*goto front_door\n\t\t*else\n\n\t\t\tYou grab your press pass out of the door and stop recording. Time to go.\n\n\t\t\tLooking through the crack of the door, you see that the staff are still finishing up with the patient, even though the alarm has stopped. You quickly creep out of the door and make your way to the hospital entrance. From there, you find a knot of homeless folks who are quietly making their way outside. You slip in behind them, and walk right past the guards and out the front door.\n\t\t\t*set deduction_bodySold true\n\t\t\t*set case2_marketShare +5\n\t\t\t*goto cab_ride2\n\t#Question one of the patients.\n\t\tYou look for patients that appear to be coherent but out of earshot of the rest of the staff. A man with long gray hair and his arms wrapped in bandages looks to be awake but not in much distress. You sit on the empty bed next to him.\n\n\t\t\"Who…who are you?\" he asks.\n\n\t\t\"I'm a reporter,\" you say, keeping your voice low. \"I want to ask you some questions about what's going on here. Do you mind if I record this?\"\n\n\t\t\"Re…reporter?\" He looks confused, but he doesn't refuse his consent, which is sufficient.\n\n\t\t*fake_choice\n\t\t\t#\"Have you seen or heard anything unusual lately?\"\n\t\t\t\tHe looks confused, as if he doesn't hear you.\n\t\t\t#\"What are you here for?\"\n\t\t\t\tHe shakes his head, as if he doesn't hear you.\n\t\t\t#\"How long have you been here?\"\n\t\t\t\tHe stares blankly at you, as if he doesn't hear you.\n\t\t*comment endif\n\n\t\t\"Are you here about the bodies?\" he asks instead.\n\n\t\t\"Yes,\" you say. \"Tell me about the body of a young woman that was brought in here recently. Maybe a week or two ago.\"\n\n\t\tHe shifts in his bed, and his finger trembles as he points to the large metal door. \"She went in there. They all go in there.\"\n\n\t\t\"Do you know what happens to them in there?\"\n\n\t\t\"They go in there,\" he repeats. He doesn't seem to be listening to you anymore. \"And then, pieces of them come out. One woman got a new lung from there. Another got a…thing. Goes in your side, helps with drinking. Kidney, I think.\"\n\n\t\tTracey whispers in your ear, as if in disbelief. \"So they used Tasha as parts. The whole place is a low-tech organ farm.\"\n\n\t\tYou start to ask another question, but the patient keeps talking. \"Other people come and take boxes away. One man in particular brings money and takes away white boxes.\"\n\n\t\t\"What man?\" you say, trying not to shout in enthusiasm. \"Do you know who he was?\"\n\n\t\tThe patient shakes his head, although you can't tell if it's in response to your question or to something else only he can hear.\n\n\t\t\"Come on,\" Tracey says. \"Someone's going to notice that you're not a patient here.\"\n\n\t\t*if charm >= 60\n\t\t\t\"What's your name?\" you ask, ignoring Tracey.\n\n\t\t\tThe man's eyes focus on you. \"Patrick,\" he says.\n\n\t\t\t\"Patrick,\" you repeat. \"You remember the man who comes here with the bodies, don't you?\"\n\n\t\t\tPatrick shakes his head again. \"Not allowed to say,\" he murmurs.\n\n\t\t\t\"It's okay, Patrick. I'm a friend. I want to help you.\"\n\n\t\t\tHe keeps shaking his head, stronger this time. \"No. He told me he would arrest me if I told anyone.\"\n\n\t\t\t\"Arrest?\" Tracey says. \"He's a cop?\"\n\n\t\t\t\"He won't arrest you,\" you say, trying to reassure Patrick. \"I'll make sure of that.\"\n\n\t\t\t\"No,\" Patrick says, more emphatically. \"He's a detective, and he said that he'll arrest me and they'll take me away from my medicine and then I won't be able to think anymore.\"\n\n\t\t\t*if clue_detSloane = true\n\t\t\t\tPlaying a hunch, you ask, \"Was this man Detective Felix Sloane?\"\n\n\t\t\t\tPatrick's eyes go wide. \"Yes, it was him. You can read my mind,\" he whispers in awe. \"Please forgive my disgusting thoughts, oh master of the mind.\"\n\t\t\t*if clue_detSloane = false\n\t\t\t\t\"Do you remember the detective's name?\" you ask.\n\n\t\t\t\t\"The cat won't let me speak. The cat won't let me speak.\"\n\n\t\t\t\t\"Cat?\" Tracey asks. \"Wait…let me see if there's a detective with the name of Cat.\"\n\n\t\t\t\tAs Tracey works, you ask Patrick, \"Why won't the cat let you speak?\"\n\n\t\t\t\t\"Because he's a mean cat. I watched him once. He hissed at me.\"\n\n\t\t\t\t\"No one by the name of Cat or with 'cat' in their name,\" Tracey says. \"But there is a Felix Sloane.\"\n\n\t\t\t\t\"Was the cat named Felix?\" you ask Patrick.\n\n\t\t\t\tHis eyes go wide. \"Yes, it was him. You can read my mind,\" he whispers in awe. \"Please forgive my disgusting thoughts, oh master of the mind.\"\n\t\t\t*comment endif\n\n\t\t\t\"Why did Sloane threaten you?\"\n\n\t\t\t\"Because I saw him once. I was awake when he thought everyone was asleep. And he told me then that I would pay if I told anyone.\" His eyes grow wide. \"Oh no. I just remembered that I wasn't supposed to tell anyone.\"\n\n\t\t\t\"Hey!\" You see one of the staffers walk over to you. \"Leave that man alone! He's in a delicate mental state!\"\n\n\t\t\t\"I was just visiting with my friend here,\" you say, patting his shoulder. \"Take it easy, Patrick, and I'll be back tomorrow, okay?\"\n\n\t\t\t\"I would like that,\" Patrick says, as he starts to fall asleep.\n\n\t\t\t\"If you're not sick, you need to get out of here,\" the staffer says. \n\n\t\t\t\"Seems like a good idea, boss,\" Tracey says.\n\n\t\t\tTurning the recording off, you ease your way past the large rubber doors and out into the hallway. From there, you find a knot of homeless folks who are quietly making their way outside. You slip in behind them, and walk right past the guards and out the front door.\n\t\t\t*set deduction_bodySold true\n\t\t\t*set Felix_bought true\n\t\t\t*set case2_marketShare +10\n\t\t\t*set clue_detSloane true\n\t\t\t*set blackmail true\n\t\t\t*goto cab_ride2\n\t\t*else\n\t\t\tYou pat the man on the shoulder. \"Thank you,\" you say. Turning the recording off, you ease your way past the large rubber doors and out into the hallway. From there, you find a knot of homeless folks who are quietly making their way outside. You slip in behind them, and walk right past the guards and out the front door.\n\t\t\t*set deduction_bodySold true\n\t\t\t*set case2_marketShare +5\n\t\t\t*goto cab_ride2\n\t#Film some footage for my story.\n\t\tYou look around the whole hospital. The sense of desperation is almost palpable. Working with only limited resources, medical staffers seem to be constantly rushing between one patient and the next. You notice that instead of using tablets and netglasses to track records, they use old clipboards and paper. Paper doesn't come cheap—they must be getting their money from somewhere.\n\n\t\tPicking up a chart and looking it over, you see that there's a running total of the medical costs. At the bottom, however, there's no line showing what the cost is for the patient, although there's a \"VIP Services\" line. The next page lists a number of those services: gunshot wounds, plastic surgery, medical waste disposal, and organ transplants.\n\n\t\tOrgan transplants.\n\n\t\tMaking sure no one is watching you, you quickly move over to one of the filing cabinets and open it. The drawer is stuffed full of folders, but you skim the titles. One catches your eye, labeled \"Organ Donor Transactions.\"\n\n\t\t\"They sell organs,\" Tracey says in your ear. \"You think it's the organs of these people?\"\n\n\t\tYou shake your head a little—not too much, so the shot of the titles isn't spoiled—and close the drawer. That doesn't make sense. Why would they spend so much energy trying to save these people if they just used them for organs?\n\n\t\tSuddenly, you have it. Using the plaintext software in your opticOS, you write a single word so Tracey can see it: \"Corpses.\"\n\n\t\t\"Of course,\" Tracey says. \"That's why they picked up Tasha. They take the bodies, use what they can, and sell the rest.\"\n\n\t\t\"Hey!\" One of the staffers walks up to you. \"What are you doing here?\"\n\n\t\t*if technique >= 60\n\t\t\tYou turn and look at the woman. She's framed by the hospital behind her—people in white coats looking over patients in obviously poor conditions. The woman looks haggard, upset, and stressed. It's an amazing shot, showing the passion and struggle of this illegal medical facility.\n\n\t\t\t\"I'm just here to check on a few things,\" you say. \"You don't mind, do you?\"\n\n\t\t\tShe looks suspicious. \"Why? Is Detective Sloane planning to make another delivery tonight? And what's wrong with your eyes?\"\n\n\t\t\t*if clue_detSloane = true\n\t\t\t\t\"Sloane's in on this?\" Tracey says. \"That connects a few dots.\"\n\n\t\t\t\t\"I don't know for sure. He just wants to make sure everything's okay here,\" you say.\n\t\t\t*if clue_detSloane = false\n\t\t\t\t\"Running a check,\" Tracey says.\n\n\t\t\t\t\"I don't know for sure. He just wants to make sure everything's okay here,\" you say, stalling for time.\n\n\t\t\t\t\"Got it,\" Tracey says. \"Sloane's a detective in the NAPD all right. Better, he's the detective that was assigned to Tasha's murder, as well as some of the other King murders.\"\n\t\t\t*comment endif\n\n\t\t\tThe staffer looks like she's about to say something more, but an alarm goes off on one of the medical devices nearby. \"Just make sure you stay out of the way,\" she says, as she rushes off to check on the patient.\n\n\t\t\t\"Time to go,\" Tracey says. You ease your way past the large rubber doors and out into the hallway. From there, you find a knot of homeless folks who are quietly making their way outside. You slip in behind them, and walk right past the guards and out the front door.\n\t\t\t*set deduction_bodySold true\n\t\t\t*set Felix_bought true\n\t\t\t*set case2_marketShare +10\n\t\t\t*set clue_detSloane true\n\t\t\t*set blackmail true\n\t\t\t*goto cab_ride2\n\t\t*else\n\t\t\tYou quickly close the drawer and stop recording before you turn to face her. \"Nothing. The director wanted a file delivered. I thought it was in here.\"\n\n\t\t\t\"That drawer is for staff eyes only! Tell me what file it is and I'll get it for you.\"\n\n\t\t\t\"It's the organ transplant report.\"\n\n\t\t\tThe staffer sighs in frustration. \"We're drowning in patients here, and until the director gets us more staff, I don't have time to write their reports. Tell them I'll have it done tomorrow.\" She storms off before you can reply.\n\n\t\t\t\"Time to go,\" Tracey says. You ease your way past the large rubber doors and out into the hallway. From there, you find a knot of homeless folks who are quietly making their way outside. You slip in behind them, and walk right past the guards and out the front door.\n\t\t\t*set deduction_bodySold true\n\t\t\t*set case2_marketShare +5\n\t\t\t*goto cab_ride2\n\n*label examine_computers\nThe computer is severely outdated, with an old-school keyboard and a hardware monitor. Tracey talks you through the minimal security, while you respond to ${thim} using the plaintext program on your opticOS software, so ${the} can read your responses through the link. In a few minutes, you find where the security videos are stored. You speed-watch through a number of them, looking for anything unusual, while keeping one eye on the staff. After twenty minutes, you're about to give up and leave when Tracey says, \"Stop. Go back a couple minutes.\"\n\nYou rewind the footage and watch as a car pulls up to the rear entrance. A tanned man with dark hair and a dark suit gets out and opens the truck, while one of the guards hands him several coolers, one after another. You freeze the image and get a good look at the man's face.\n\n*if clue_detSloane = true\n\t\"I know him,\" Tracey says. \"That's Detective Felix Sloane.\"\n\n\t\"Are you sure?\" you spell out on your opticOS.\n\n\t\"Trust me, boss. That's the guy.\"\n*if clue_detSloane = false\n\t\"Do you recognize him?\" Tracey asks.\n\n\tYou call up a quick \"no\" on your opticOS display and stare at the image, looking for a clue. Finally, you notice something hanging on the man's belt that looks like a badge. You tap the screen to draw Tracey's attention to it.\n\n\t\"A badge? Maybe he's a cop. Let me see if I can run a facial recognition scan on NAPD officers.\" You wait, watching the staff carefully to make sure they aren't paying too much attention to you. At one point the staff member who noticed you earlier glances at you and frowns. She starts to make her way over, but another staff member asks for her help with another patient.\n\n\t\"Got it. That's Detective Felix Sloane. Turns out he's the same guy who was slated to investigate Tasha's murder. Looks like he's doing more than investigating.\" \n*comment endif\n\nYou decide you've pushed your luck enough. You stop recording, and while the staff members are still distracted, you ease your way past the large rubber doors and out into the hallway. From there, you find a knot of homeless folks who are quietly making their way outside. You slip in behind them, and walk right past the guards and out the front door.\n*set deduction_bodySold true\n*set Felix_bought true\n*set case2_marketShare +10\n*set clue_detSloane true\n*set blackmail true\n*goto cab_ride2\n\n*label cab_ride2\n*if disguised\n\n\tAs soon as you get away from the building, you toss your old coat, hat, and gloves into a garbage can.\n*comment endif\n\nYou walk a couple of blocks away from St. Elizabeth before you call your cab. Tracey is unusually quiet as you wait.\n\n*choice\n\t#\"Do you want to talk about it?\"\n\t\t\"Which part?\" Tracey says, barking out a laugh with no humor in it. \"The illegal sale of organs from the dead body of the woman who nearly killed you, or the crushing despair and poverty that leads an organization to consider body snatching as a serious alternative?\"\n\n\t\t\"Whichever one you prefer.\"\n\n\t\t\"I…no. Not right now. Maybe later.\"\n\n\t\t\"Suit yourself. Just wanted to make sure you're okay.\"\n\n\t\t\"I am, boss.\" A pause. \"And thanks. I appreciate it.\"\n\n\t\t\"No problem. Let's go talk to Sloane.\"\n\t\t*set independence %-10\n\t\t*set rel_tracey %+10\n\t\t*finish\n\t#\"Are you still working or what?\"\n\t\t\"Sorry, boss,\" Tracey says sarcastically. \"Not all of us can just casually accept the illegal sale of organs from the dead body of the woman who nearly killed you, or the crushing despair and poverty that leads an organization to consider body snatching as a serious alternative.\"\n\n\t\t\"Deal with your emotions later. I need you on the ball now. We're on the clock.\"\n\n\t\tA long pause. \"Fine, boss. I'm here. Let's go talk to Sloane.\"\n\t\t*set independence %+10\n\t\t*set rel_tracey %-10\n\t\t*finish\n\t#Stay silent. I have a lot on my mind.\n\t\t\"You too, huh?\" Tracey says finally.\n\n\t\t\"What do you mean?\"\n\n\t\t\"It's a lot to take in. The illegal sale of organs from the dead body of the woman who nearly killed you. The crushing despair and poverty that leads an organization to consider body snatching as a serious alternative. It's not…it's not what I expected.\"\n\n\t\t\"People need to know about it,\" you say. \"And we're the ones who get to tell them.\"\n\n\t\t\"You make it sound like we're doing something good by exposing all of this.\"\n\n\t\t\"We are,\" you say simply. \"And we're going to talk to Sloane about it.\"\n\t\t*set ambition %-10\n\t\t*set rel_tracey %+10\n\t\t*finish", "surgery": "*comment Chapter Two\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Ratings War[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n*set infractions +1\n*temp researched_maris false\n*text_image chap2.png\n*if case1_filed\n\t*set market_share +10\n*comment endif\n\n[i]January 15th, 2062. Three months later.[/i]\n\nYou feel yourself slowly wake up, as if consciousness is happening to someone else far away from you. Everything is dark, and there's a steady beeping sound nearby. \n\n*page_break Look Around\n\nYou try to open your eyes, but you can't—there's some kind of cloth tightly bound over your face. You move to take it off, but your arms and body are held fast, pressing you against the soft surface you're lying on. You can hear something plastic rattle as you try to pull your arm free.\n\nFor a brief moment, panic weighs on your chest like a frozen brick. The attack by the Kings feels like it was yesterday, like you were just there. But it was only a dream. You open your mouth to say something, and dry lips pull apart like plastic wrap. The croak that comes from your throat is barely recognizable, but after a moment you hear a man's voice next to you. His voice is calm, soothing.\n\n\"Good. You're awake, ${pmister} ${pl_lname}. How do you feel?\"\n\nIt takes a moment, but you finally manage to form words.\n\n*choice\n\t#\"Fine. Where…am I?\"\n\t\t\"You're at California Medical Hospital. You were in surgery for a long time, but the procedure went well.\"\n\t\t*set investigation %+15\n\t\t*goto hospital\n\t#\"Should have seen…the other one.\"\n\t\tA soft laugh. \"It's good to see you still have a sense of humor, ${pmister} ${pl_lname}. You'll be happy to know that the procedure went well.\"\n\t\t*set charm %+15\n\t\t*goto hospital\n\t#\"Terrible. Did someone…get footage?\"\n\t\t\"Of course, ${pmister} ${pl_lname}. We recorded the surgery as you requested. You'll be happy to know that the procedure went well.\"\n\t\t*set technique %+15\n\t\t*goto hospital\n\n*label hospital\n\nIt starts to come back to you. You're in the hospital, recovering from your latest operation. You've been in and out of surgery for months, but every time you wake up from the anesthetic, the assault feels fresh. The attack, the pain, the drugs—it all drains you, leaving you helpless.\n\nYou feel a cool hand on your arm and hear Velcro being pulled apart. The pressure holding your arms down disappears. \"I apologize for the restraints, but I was told about your previous problems with violent awakenings after surgery. We wanted to make sure you didn't accidentally hurt yourself.\"\n\nHe says something more, but you don't hear it as you fall back into unconsciousness.\n\n*page_break\n\nYou wake up again, the last in a series of vaguely remembered moments of consciousness. Sometimes you heard voices murmuring, or felt a hand adjust the bandages on your eyes. This time you can make out a female voice speaking loudly and distinctly. You recognize the faint Icelandic accent of Dr. Mínervudóttir.\n\n\"Good morning, ${pmister} ${pl_lname}! Today's the big day. You've been healing quite well, so let's take off those bandages and see if the procedure was a success.\"\n\nYou hear her talk to someone else, and you recognize the male voice that spoke to you earlier muttering something in reply. You feel hands pulling you off the bed and sitting you up. Then you hear cutting sounds, and feel the press of cold metal scissors against your temple. Hands touch your face as the bandage is slowly unwound, letting in more and more faint light. And then, the last bandage falls away.\n\n*page_break Look Around\n\nEverything is blurry. You can make out a couple of shapes—a tall green one to your left, and a smaller white one to your right. You blink your eyes a few times and start to move your hand to your face to rub at them, but the white shape moves forward and touches your arm. \"Don't touch your eyes yet,\" Dr. Mínervudóttir says. \"You're still recovering. Try blinking some more.\"\n\nYou do, blinking repeatedly. And suddenly it's clear, as if a switch has flipped. The green shape becomes a dark-skinned man wearing green scrubs—your nurse. The white shape is a short woman with pale skin and dark hair in a lab coat—Dr. Mínervudóttir. She's wearing a set of clear, understated netglasses, and as you look at her, you see pale green words floating just below your eyeline. The words are slowly pulsing, hanging in the air as you read them.\n\n[i]Valkyrie opticOS 1.1b loading plugins…[/i]\n\nThe crystal-clear Dr. Mínervudóttir smiles. \"Excellent. I see the implants are fully operational now.\"\n\n*page_break\n\nYou woke up in this room after days of being unconscious. The local doctors explained to you that a woman named Maria called for an ambulance after the attack. By the time the EMTs got to you, you had been severely beaten, with significant cranial damage. Your eyes were damaged beyond repair. You asked about Angel, and found out that he \n*if angel_dead\n\twas killed by the Kings. You couldn't even go to his funeral, because you were too badly beaten. His wife blamed you, blamed the network, blamed anyone she could.\n*if angel_dead = false\n\tmanaged to escape the Kings. He quit the network soon after, deciding he needed to focus on his family. You weren't invited to his farewell party. You couldn't have made it anyway, because you were too badly beaten. Still, you tried to call and talk to him, but he had changed his number. \n\n\tAt one point, one of your colleagues read you an email. Angel said that he was moving on to a different career, something safer for him and his wife. He suggested that you should, too.\n*comment endif\n\nYou've been thinking about it for a while, and you feel like…\n\n*choice\n\t#I lost a friend.\n\t\t*set independence %-10\n\t\t*goto case1\n\t#I'm better off alone.\n\t\t*set independence %+10\n\t\t*goto case1\n\t#I need to focus on my career.\n\t\t*set ambition %+10\n\t\t*goto case1\n\n*label case1\n*if case1_filed\n\tLuckily, Angel edited and filed what he had before he quit, giving you credit for the story. His camera and the footage were damaged in the attack, making it hard to identify anyone, but the story still got some good ratings. The NAPD wouldn't arrest Tasha without more \"conclusive\" evidence. Turns out witnesses and video footage aren't enough these days.\n\n\tHowever, the NAPD did put pressure on your network because you forged a press pass to get access to a crime scene. The network terminated your contract with generous severance pay. You used the money, together with your share of the ad revenue, to find the Icelandic surgeon who handled the optical implant procedure: Dr. Vigdis Mínervudóttir. The same one who performed the operation on Early.\n*if case1_filed = false\n\tUnfortunately, the story was lost before you or Angel could file it, and the NAPD wouldn't arrest Tasha without more \"conclusive\" evidence. Turns out witnesses aren't enough these days.\n\n\tYour network terminated your contract, claiming that your use of a forged press pass was \"conduct unbecoming of a journalist.\" When you threatened to sue them for failing to pay for the on-the-job injuries you suffered, however, they granted you generous severance pay to keep you quiet. You used the money to find the Icelandic surgeon who handled your optical implant procedure: Dr. Vigdis Mínervudóttir. The same one who performed the operation on Early.\n*comment endif\n\nDr. Mínervudóttir agreed to fly from Reykjavík to NA. She implanted a storage drive in your head first, and made sure that it transferred and retained data effectively. Then she implanted the aural pickups inside your ear canals, so they can record everything you hear. Once those operations healed, she moved on to this latest procedure, which was the most delicate—replacing both of your eyes with the specialized implants. \n\nIt cost you everything you had, but now you can get back to work as a freelance journalist and…\n\n*choice\n\t#Make a real name for myself.\n\t\t*set ambition %+10\n\t\t*goto the_letter\n\t#Make a real difference in the world.\n\t\t*set ambition %-10\n\t\t*goto the_letter\n\t#Not have to worry about someone else.\n\t\t*set independence %+10\n\t\t*goto the_letter\n\n*label the_letter\nDr. Mínervudóttir and the nurse fuss around you, performing tests and rattling numbers off to each other as you look around. They show you bar codes and strange charts, and ask you to read off text strings that appear in your opticOS display. Stray thoughts and movements cause random bits of information to appear in your vision. The whole experience is incredibly disorienting.\n\nAfter what seems like hours, Dr. Mínervudóttir takes her netglasses off and folds them into her pocket. \"That's enough for today, I think. You should get more rest.\" \n\nAs she leaves, the nurse walks over to you. \"By the way, I was told to give you this.\" He hands over something you haven't seen in years: an envelope, made out of real paper. Even with recycling, the number of trees has diminished so much that paper is expensive, and not used casually. The texture of the envelope in your hands makes you think it's made from a particularly fine stock. You turn it over to see your name on the front in neat handwriting: [i]${pmister} ${pl_fullname}[/i]. After a moment to savor this brush with wealth, you carefully tear the envelope open and slide the contents out. The letter is short, and has the same neat handwriting as the envelope.\n\n[i]${pmister} ${pl_lname},[/i]\n\n[i]My name is Maris Schenck, and I am a news director at the International News Network.[/i]\n\n*if case1_filed\n\t[i]I saw your report on the West Coast Kings murder. While it wasn't as polished as the INN story broadcast by Mr. Early Roberts, I was still impressed by your efforts.[/i]\n*if case1_filed = false\n\t[i]I heard about your investigation, both from my sources at the NAPD and from Mr. Early Roberts. It's a shame you were unable to get your report on air, but I was impressed by your efforts.[/i]\n*comment endif\n\n[i]I think you have the kind of talent and initiative we want at INN. Once you have recovered, I would like to meet with you in person. My address is enclosed.[/i]\n\n[i]Sincerely,[/i]\n[i]Director Maris Schenck[/i]\n[i]INN[/i]\n\nYou look over the address, and a small map to the INN building here in town appears in your peripheral vision. You carefully fold the letter up, sliding it back into the envelope with mixed emotions. On the one hand, you're not even recovered, and you already have a potential job offer with INN, one of the largest and most influential news networks in the world. But it feels like Early Roberts has a hand in this, whatever his motives might be. You set the letter aside and drift back to sleep, mulling over the possibilities.\n\n*page_break\n[i]February 3rd, 2062.[/i]\n\nThe clean-cut administrative assistant looks at you condescendingly from behind her clear netglasses. \"Can I help you?\" she asks. Her tone is cool, as if she's looking for a reason to dismiss you. \n\n\"${pl_fullname} to see Director Schenck. I'm her appointment at fifteen hundred hours.\"\n\nThe assistant gets the vacant stare of someone checking her netglasses, and then nods. \"Have a seat, please. Director Schenck will see you shortly. As a visitor, do not use any netglasses in the reception area, as it's privacy-restricted.\"\n\nWhen you called to schedule your appointment, you were told to go to the 17th floor of the INN building. \"Where on the 17th floor should I go?\" you asked, but the assistant—possibly the same assistant who is so eager to forget about you now—didn't bother to answer your question. And now you know why: Maris's office suite takes up the entire floor. Once you got off the elevator, there was only a short hallway leading to this reception area. The two heavy-looking double doors behind the assistant are the only other way out. \n\nThere are many chairs and couches around the large reception area. A few people sit there: absorbed in their tablets, talking with each other, or watching the screens set in every wall showing the current INN stream. Most of them are well dressed, but a few lounge in T-shirts and jeans. Those dressed up are seated away from those dressed down—a subconscious segregation between the successful and the hopefuls.\n\nYou rub at your eyes absentmindedly as you decide where to sit.\n\n*choice\n\t#Take a chair next to the well-dressed group. It's good to be seen with successful people.\n\t\tAs you sit down, a man wearing a crisp suit that looks like it just came off the rack smiles and sets down his tablet. \"I don't recognize you. New to Maris's lair?\"\n\n\t\tYou raise an eyebrow at that. \"Sounds like I should be worried.\"\n\n\t\tHe laughs. \"Only if you still have any soul left. If you're like the rest of us, you probably sold yours a long time ago.\"\n\n\t\tYou shrug, avoiding the implied question, and offer your hand. \"${pl_fullname}. I'm here for a job.\"\n\n\t\tThe man takes it. He has a confident handshake that's firm without too much strength. \"Rich Watson. Lead Sports Reporter.\"\n\n\t\t\"I heard,\" you say. You've been reading up as much as you can on INN during your hospital recovery. \"Congratulations on the well-deserved promotion.\"\n\n\t\tHe looks down, as if noticing the suit for the first time, and laughs. \"Yeah, I'm still getting used to the idea. But one of the team owners liked that I buried a story about his mistress. He put in a good word with his golf buddy, who's one of the other news directors, and now I'm here to hand off my last responsibilities to Maris before I chart my new path.\"\n\n\t\tThe assistant's voice cuts through the conversation, coming from a speaker hidden somewhere in the area. \"${pmister} ${pl_lname}, Director Schenck will see you now.\"\n\n\t\t\"Good luck,\" Rich says, winking at you as you get up and head to the assistant's desk.\n\t\t*set charm %+15\n\t\t*set met_rich true\n\t\t*goto timesup\n\t#Sit on a couch with some of the underdressed people. Maybe I can learn some useful information while I wait.\n\t\tYou find an empty space next to a woman wearing a faded shirt featuring a band that was popular a few years ago. She's sitting cross-legged at the far end of the couch, tapping away on an old tablet. \"Is this space free?\" you ask.\n\n\t\tShe looks up suddenly, as if she didn't notice you standing there. \"Huh? Oh, no, sure, whatever.\" She thumbs a switch on the side of the tablet and shoves it back into a ratty black messenger bag sitting next to her. \"Sorry, just had to finish an editorial for my blog.\"\n\n\t\t\"I understand. I'm ${pl_fname}.\" You offer a hand to her.\n\n\t\tShe looks at your hand, but doesn't take it. \"Jenni. Jenni Slate. Sorry, but I don't shake hands. Nothing personal, but I get sick at the drop of a hat.\"\n\n\t\tYou nod and let your hand drop. \"What kind of blog do you run?\"\n\n\t\t\"Oh, it's nothing big. There's so much going on that even a big news network like INN doesn't have time to cover it all, you know? So me and some of my friends down in IT have a deal with the company. We take some of the notes and stories that get cut and polish them up to put on the net. It's just so the truth doesn't get forgotten.\" She looks down. \"It's probably stupid.\"\n\n\t\t*set met_jenni true\n\t\t*choice\n\t\t\t#Agree with her.\n\t\t\t\t\"A little,\" you say, glad she sees it as well. \"Don't you want to report on important stories instead?\"\n\n\t\t\t\tShe frowns. \"Everybody asks me that. Forget it.\"\n\n\t\t\t\tThe assistant's voice cuts through the conversation, coming from a speaker hidden somewhere in the area. \"${pmister} ${pl_lname}, Director Schenck will see you now.\"\n\n\t\t\t\tYou go to say good-bye to Jenni, but she's already digging around in her bag, ignoring you. You stand up and head to the assistant's desk.\n\t\t\t\t*set ambition %+10\n\t\t\t\t*goto timesup\n\t\t\t#Tell her it's not stupid.\n\t\t\t\t\"I don't think so. The truth is always important. That's what news is all about, right?\"\n\n\t\t\t\tShe smiles a little at that. \"Yeah. Too bad the people here don't always think so.\"\n\n\t\t\t\tThe assistant's voice cuts through the conversation, coming from a speaker hidden somewhere in the area. \"${pmister} ${pl_lname}, Director Schenck will see you now.\"\n\n\t\t\t\t\"Nice talking with you,\" Jenni says as you get up. \"Hope to see you around.\"\n\n\t\t\t\t\"Thanks,\" you say, and head to the assistant's desk.\n\t\t\t\t*set factual %+10\n\t\t\t\t*goto timesup\n\t\t\t#Say nothing.\n\t\t\t\tYou aren't sure what to say, so you don't say anything. Jenni is looking increasingly awkward when suddenly the assistant's voice cuts through the conversation, coming from a speaker hidden somewhere in the area. \"${pmister} ${pl_lname}, Director Schenck will see you now.\"\n\n\t\t\t\tYou go to say good-bye to Jenni, but she's already digging around in her bag, ignoring you. You stand up and head to the assistant's desk.\n\t\t\t\t*set independence %+10\n\t\t\t\t*goto timesup\n\t#Do more research on Maris Schenck. I don't have time to make friends.\n\t\tNot bothering to acknowledge the other people in the reception area, you sit down in a chair and pick up a worn tablet sitting on the table next to you. The tablet is emblazoned with the INN logo and hooked into the company's internal network, so you decide to use your time doing some more reading on Maris Schenck.\n\n\t\tYou already know that she's been a news director for seven years, and a good one. From the internal site, you learn that she's managed some successful reporters and has had a couple of hit shows. Her current rising star is, naturally, Early Roberts. He was an investigative reporter out of Iceland that she lured to New Angeles to work for her.\n\n\t\tOut of curiosity, you do some searches for Maris on a few social media networks, to see what other people say about her. Most of it is the usual online trash, but in a few places, you find comments from people who have worked with her, ranging from high praise about her dedication to the truth to vulgar rants about how she's a perfectionist that refuses to let anything air without her direct oversight. One person rants incoherently about how she \"didn't exist\" fifteen years ago, but the net always has its share of cranks and nuts.\n\n\t\tAfter a few minutes, you hear the assistant's voice coming from a speaker hidden somewhere in the area. \"${pmister} ${pl_lname}, Director Schenck will see you now.\" You set the tablet aside and head to the assistant's desk.\t\t\n\t\t*set investigation %+15\n\t\t*set researched_maris true\n\t\t*goto timesup\n\n*label timesup\n*page_break\nThe assistant watches you walk up from behind her netglasses, and then nods. \"Go on in, ${pmister} ${pl_lname}.\" The huge double doors behind her ease open—likely from a command sent by the assistant's netglasses—and you walk inside.\n\nBehind the doors isn't just an office, but a bustling video studio. To the left are a couple of comfortable chairs next to a low table. Nearby lurk a set of lights and privacy-cleared studio cameras, waiting to be turned on to conduct an interview at a moment's notice. To the right are a handful of desks with embedded tablets all facing each other in a cluster—probably an ad hoc conference area and editing suite. On one wall are some small screens silently showing a variety of news streams. People carrying tablets and wearing netglasses scurry about, talking to each other in short bursts or staring at each other as they send data.\n\nPast the churning chaos is a smaller room. Its walls are entirely glass, although they have that distinctive hint of smoke from embedded polarization fibers. Inside you can see a tastefully appointed office, with Maris Schenck sitting behind a large desk with a dark glass top. She's tapping on the surface of her desk as she looks at a floating projection crawling with text and data.\n\n*fake_choice\n\t#Look around the area, waiting for her to acknowledge me.\n\t\tYou examine the small interview set. It's vaguely familiar—probably used for dozens of filler interviews with video stars, politicians, and media creators over the years.\n\n\t\tAs you're exploring, one of the people rushing back and forth taps you on the shoulder. She blinks from behind her thick netglasses. \"Hey, are you here to talk to Maris or what?\"\n\n\t\t\"Yes, I have an appointment.\"\n\n\t\t\"Well go on in and get out of our way!\" She points at Maris's door for emphasis.\n\n\t\tYou quickly thank the woman as she rushes off, and walk over to open the door to Maris's office. \n\t#Walk up to her office and knock on the door.\n\t\tYou walk up to the office door and knock, waiting to be let in. Maris doesn't look up from her work, and for a moment you wonder if you should knock again. \n\n\t\tAs you're debating, one of the people rushing back and forth taps you on the shoulder. She blinks from behind her thick netglasses. \"Go on in and get out of our way!\" she says brusquely, before going back to her task. \n\n\t\tYou quickly thank the woman as she rushes off, and open the door.\n\t#Open her office door and enter unannounced.\n\t\tYou decisively walk over to the office door and open it. \n*comment endif\n\nYou hear a brief tone as the knob turns under your hand, and the director looks up and smiles at you. \"Come on in and have a seat, ${pl_lname}.\"\n\nIn person, Maris Schenck is no different than her images online. She looks the same: a woman in her late 30s with a slight duskiness to her skin from her Latina heritage.\n*if researched_maris\n\tShe wears a tasteful and conservative business suit, and the silver rims of her clear netglasses match the wedding ring on her finger—unlike many other women in entertainment, she took her husband's last name of \"Schenck\" instead of keeping her maiden name. \n*if researched_maris = false\n\tShe wears a tasteful and conservative business suit, and the silver rims of her clear netglasses match the ring on her finger. \n*comment endif\nBut there's a feeling of energy and dynamism that you get from being in her presence that the images didn't convey. Even sitting behind a desk, you get a sense that she's always thinking, always working, always moving toward the next big thing.\n\nThe walls of the office quickly fade to a dark opacity, shutting out the bustle of the studio, and the room becomes eerily quiet as the door glides closed behind you. \"Maris Schenck. Thanks for coming in,\" she says, moving her hand over her desk to swipe away the projection she was looking at. \"If I'm out of the office for too long, things start to fall apart.\"\n\n*choice\n\t#\"Thank you for inviting me, Director Schenck. I hope we have a chance to work together.\"\n\t\t*set independence %-10\n\t\t*goto interview\n\t#\"Thanks for the letter, Director Schenck. I look forward to making a name for myself here at INN.\"\n\t\t*set independence %+10\n\t\t*goto interview\n\t#\"Love the office, Director Schenck. I hope I can get one like this someday.\"\n\t\t*set ambition %+10\n\t\t*goto interview\n\t#\"I like the studio, Director Schenck. It'll allow me to focus on my stories.\"\n\t\t*set ambition %-10\n\t\t*goto interview\n\n*label interview\n\"Maris, please. Let's have a short chat before we talk about your future here at INN.\" She smiles a little and waves you over to a pair of comfortable chairs in the corner of her office. You take one while she sits in the other, crossing her legs and folding her hands over her knee. \"How much do you know about me?\"\n\n*if researched_maris\n\t\"You've been a news director here for seven years,\" you say, carefully reciting what you've learned. \"From all accounts, you're a good one, too, responsible for some of the more successful INN reporters and news shows. It also seems that the people who work under you either love your devotion to good reporting or hate your need to get the details perfect.\"\n*if researched_maris = false\n\t\"Not much,\" you admit. \"I know that you've been a news director here for seven years, which tells me you're good at your job.\"\n\n\tShe laughs at that. \"I hope so. I've managed some of the more successful INN reporters and news shows over the past few years. I also make sure that whatever we air is good, solid, compelling journalism. I'm demanding, and I'm not ashamed of that. Some people love that, and others hate it.\"\n\nShe uncrosses her legs and leans forward, looking you in the eyes. \"So tell me. What do you demand out of the news? What, in your mind, is the primary goal of a news network?\"\n\n*choice\n\t#Facts.\n\t\t\"The news is about the facts, and there's no point in airing anything but the truth. We are tasked with revealing reality.\"\n\t\t*set factual %+10\n\t\t*goto interview_2\n\t#Story.\n\t\t\"Facts can be found anywhere nowadays. The news is about the story, and I air stories that can get attention and change minds.\"\n\t\t*set factual %-10\n\t\t*goto interview_2\n\t#Personality.\n\t\t\"Anyone can reel off facts or tell a story, but who provides those facts or tells that story is much more important. A network can get the right personality out there.\"\n\t\t*set ambition %+10\n\t\t*goto interview_2\n\n*label interview_2\n\nMaris nods. \"Good. I like reporters with passion. And the quality of your work…\"\n\n*if case1_filed\n\tShe turns to look at her desk. \"Hermana, play file ${pl_lname}-dash-final.\" The floating display reappears over her desk, and starts to play the story that Angel filed before he quit. \"Given the resources you had, it's quite good, and your instinct to follow the lead to the club was a strong one.\" \n*if case1_filed = false\n\tShe turns to look at her desk. \"Hermana, play file Roberts-dash-E107.\" The floating display appears over her desk and starts to play the story that Early filed—the story you never got a chance to air. \"I think this could have been your story. It's rare for a local reporter to get that close. Your instinct to follow the lead to the club was a strong one.\"\n\nShe motions to the wall behind her, vaguely indicating the studio you walked through. \"Anyone can learn investigation, charisma, and technique—all the ingredients to be a superstar reporter—but I can't teach passion or instinct. Those are special qualities. Qualities I think you have.\"\n\nYou both watch the floating video for a second before Maris says \"Hermana, off\" and turns back to you, waiting to see what you say.\n\n*choice\n\t#\"I can be the most popular superstar working for you.\"\n\t\tShe nods. \"I think so, too. With that kind of ambition, I think you'll go far, as long as you remember that I'm the boss and you do what I want.\"\n\t\t*set ambition %+10\n\t\t*goto hired\n\t#\"With time, I'll break any story you set me on.\"\n\t\tShe nods. \"I think so, too. Your devotion to the truth can take you far, as long as you remember that I'm the boss and you do what I want.\"\n\t\t*set ambition %-10\n\t\t*goto hired\t\n\t#\"I'm glad you recognize that I'm the talent here.\"\n\t\tShe nods. \"I do. I understand the value of independence and autonomy. But you need to remember that I'm the boss and you do what I want.\"\n\t\t*set independence %+10\n\t\t*goto hired\n\t#\"I know how to work with a team to get the best work done.\"\n\t\tShe nods. \"Good to hear that. I constantly have to remind most of my reporters that I'm the boss and they need to do what I want.\"\n\t\t*set independence %-10\n\t\t*goto hired\n\n*label hired\n\n\"So it sounds like you want to hire me,\" you say.\n\nMaris puts a finger to her lips, considering. \"I think I do,\" she says finally. \"You have the potential to be one of our celebrity reporters, like Early. There's a line of people around the block wanting to get a piece of the action, so I don't roll the dice often on new talent. But I wanted to meet you in person first before I came to a decision.\" \n\nShe stands back up and walks behind her desk, pulling an INN tablet out of a drawer. She taps it on the desk's surface, and the screen lights up, scrolling with text. She comes back around and hands the tablet to you. \"Look it over, and tell me what you think.\"\n\nA quick scan shows that it's a comprehensive freelance contract, combined with exclusivity and nondisclosure agreements. You struggle to read the dense legal jargon. \"What's the short version?\" you ask.\n\n\"Standard INN freelance reporter agreement. We hire you as a contractor, and you agree that all your investigation time and footage is exclusively for our use. We don't allow moonlighting or consulting, but I think you'll find our compensation to be attractive enough to discourage that.\"\n\n\"Such as?\"\n\n\"Starting you off on a clean slate, for one. If you sign, I'll get our legal department to expunge your attempt at falsifying a privacy-cleared license. Once you have an INN pass, you'll start fresh. They'll also help you with problems with the law and privacy violations in the name of a story, but don't assume it's a permanent get-out-of-jail-free card.\" She waves at the tablet. \"The rest is straightforward. You agree to keep any information about INN to yourself, revealing it only to me or to anyone I choose for you to work with. And if the market share of your stories gets high enough, we'll bring you in as a full-time employee.\"\n\n*page_break\nYou flick through the agreement, scrolling the text and pretending to skim it as she talks. \"What's the difference between a contractor and an employee?\"\n\n\"Better benefits, more legal protection, stock options, stuff like that.\" She smiles. \"Of course, we only offer employment to the small number of reporters who are ready to have their own show on INN.\"\n\nYou stop scrolling. Your own news show. A chance to not only be a reporter, but write and direct your own news stories. It was trivial to set up your own show back when you were just a vlogger, but to have one on INN would open you up to a massive audience.\n\nPart of you says you should have someone look over the agreement, to make sure there are no problems or loopholes. But as you're thinking it over, you see the signature field pop up on the screen. Before you realize it, you've swiped your finger over it in the shape of your signature. The tablet beeps softly, and suddenly you're an INN reporter.\n\nMaris smiles. \"That was fast. Ready to go?\"\n\n*set infractions 0\n*fake_choice\n\t#\"You had me at 'my own show.'\"\n\t\t*set ambition %+10\n\t#\"Yes. I want to work for someone devoted to the truth.\"\n\t\t*set ambition %-10\n\t#\"It's just me. I'm always ready.\"\n\t\t*set independence %+10\n\n\"Glad to hear it.\" She takes the tablet back and sets it on her desk to process the signature. As she does, she taps another section of the desk's surface. \"Tracey? Come into my office. I want you to meet ${pl_fname}.\"\n\n*page_break\n*if pl_likeswomen\n\t*set tr_gender_f true\n\t*set the \"she\"\n\t*set thim \"her\"\n\t*set this \"her\"\n\t*set thimself \"herself\"\n\t*set tman \"woman\"\n\t*set tsir \"ma'am\"\n\t*set tmister \"Ms.\"\n*if pl_likeswomen = false\n\t*set tr_gender_f false\n\n*if tr_gender_f\n\tAfter a moment, the office door opens again, and a woman walks in. She is tall, with short brown hair spiked all over. She's wearing a plain T-shirt with a dark, worn jacket thrown over it, along with comfortable jeans and heavy boots. Despite her casual look, however, you're struck by how attractive she is.\n\t*set tflirt true\n\t*goto meet_tracey_2\n*else\n\tAfter a moment, the office door opens again, and a man walks in. He is tall, with short brown hair spiked all over. He's wearing a plain T-shirt with a dark, worn jacket thrown over it, along with comfortable jeans and heavy boots.\n\t*if pl_likesmen\n\t\tDespite his casual look, however, you're struck by how attractive he is.\n\t\t*set tflirt true\n\t\t*goto meet_tracey_2\n\t*else\n\t\t*goto meet_tracey_2\n\n*label meet_tracey_2\n*set met_tracey true\n$!{the} offers you ${this} hand. \"Hey. Tracey Bellamy. Sorry I wasn't here earlier.\"\n\nYou shake it cautiously. \"${pl_fullname}.\"\n\n*if met_rich\n\tMaris walks over to Tracey. \"How'd the conversation go?\"\n\n\tTracey shrugs. \"Not bad. Rich was pretty pleased to see that the new ${pboy} was charming and ambitious.\"\n\n\tYou sit up a little straighter. \"Wait. You mean you interviewed the person I talked to in the lobby?\"\n\t*goto meet_tracey_3\n*if met_jenni\n\tMaris walks over to Tracey. \"How'd the conversation go?\"\n\n\tTracey shrugs. \"Not bad. Jenni never says much, but she certainly noticed that ${pl_fname} is inquisitive. No red flags, anyhow.\"\n\n\tYou sit up a little straighter. \"Wait. You mean you interviewed the person I talked to in the lobby?\"\n\t*goto meet_tracey_3\n*else\n\tMaris walks over to Tracey. \"Anything on the research?\"\n\n\tTracey shrugs. \"Nothing you don't already know. ${pl_fname} appears to be who ${phe} says ${phe} is.\"\n\n\tYou sit up a little straighter. \"Wait. You mean you were looking into my background?\"\n\t*goto meet_tracey_3\n\n*label meet_tracey_3\n\nTracey holds ${this} fingers close together, as if to say \"a little bit.\"\n\n\"Don't worry,\" Maris says. \"I wanted Tracey to learn some more about you, since the two of you will be working together.\" She nods at ${thim}. \"$!{the} will be your editor.\"\n\n\"Editor?\" you ask. \"I assumed I would be doing my own video editing.\"\n\nTracey laughs. \"She's using some INN jargon on you. 'Editors' are what Maris calls each reporter's support person. I'll be your video director, researcher, logistics support, and remote IT specialist. The little voice in your ear that keeps you company while you're out in the field.\" $!{the} taps ${this} ear to reinforce the point.\n\nMaris slides back behind her desk. \"I know you had difficulties working with a camera operator, ${pl_fname}, but this is different. Each of my reporters needs to have someone who can watch their back while they are alone in the field. Is this going to be a problem for you?\"\n\nTracey watches you carefully as you consider your response.\n\n*choice\n\t#\"Yes. Other people muddy my ability to focus on the truth.\"\n\t\tMaris frowns. \"That's too bad. Because you're working with ${thim} anyway.\"\n\n\t\tTracey shrugs. \"Don't worry, ${pl_fname}. You're in charge. But give me a chance to prove myself before you shut me down.\"\n\t\t*set factual %+10\n\t\t*set independence %+10\n\t\t*set rel_tracey %-10\n\t\t*goto ideal_editor\n\t#\"No. It's always good to have someone fact-check your work.\"\n\t\tMaris smiles. \"Good. Because you're working with ${thim} anyway.\"\n\n\t\tTracey shrugs. \"Don't worry, ${pl_fname}. You're in charge. But I appreciate you giving me a chance.\"\n\t\t*set factual %+10\n\t\t*set independence %-10\n\t\t*set rel_tracey %+10\n\t\t*goto ideal_editor\n\t#\"Yes. I need to keep full creative control over my stories.\"\n\t\tMaris frowns. \"That's too bad. Because you're working with ${thim} anyway.\"\n\n\t\tTracey shrugs. \"Don't worry, ${pl_fname}. You're in charge. But give me a chance to prove myself before you shut me down.\"\n\t\t*set factual %-10\n\t\t*set independence %+10\n\t\t*set rel_tracey %-10\n\t\t*goto ideal_editor\n\t#\"No. I like working in a creative, collaborative environment.\"\n\t\tMaris smiles. \"Good. Because you're working with ${thim} anyway.\"\n\n\t\tTracey shrugs. \"Thanks, ${pl_fname}. I appreciate you giving me a chance.\"\n\t\t*set factual %-10\n\t\t*set independence %-10\n\t\t*set rel_tracey %+10\n\t\t*goto ideal_editor\n\n*label ideal_editor\n\n\"And that's what this is,\" Maris adds. \"A chance. Tracey's worked here for a while now, so ${the} knows ${this} way around.\" Suddenly there's a soft buzzing sound as her netglasses ring. Her eyes lose focus for a moment, and she taps the arm of the netglasses. \"I have to take this. One moment.\" She spins her chair around, turning her back to you, as she starts chatting with someone on the other end in Chinese.\n\nTracey sits down in the other chair next to you. \"Since we have a minute, give it to me straight. I want to know what makes you tick, so I can work for you in the best way possible. What do you need from me?\"\n\n*choice\n\t#\"Just make sure to be honest with me.\"\n\t\t*if factual >50\n\t\t\t$!{the} smiles. \"That won't be a problem. I'm all about working for the truth.\"\n\t\t\t*set rel_tracey %+10\n\t\t\t*goto new_team\n\t\t*else\n\t\t\t$!{the} smirks at that. \"Sure, as long as you're honest with me in return. I'm all about working for the truth, so you never have to worry about where I stand with you. Just make sure it flows the other way.\"\n\t\t\t*goto new_team\n\t#\"Unless you can get me ratings, don't worry about it.\"\n\t\t*if ambition >50\n\t\t\t$!{the} frowns. \"I can. I want to be the best, just like you. But you have to be honest with me, or I can't do my job.\"\n\t\t\t*set rel_tracey %+10\n\t\t\t*goto new_team\n\t\t*else\n\t\t\t$!{the} shrugs. \"Sucks to be you, then, because Maris thinks differently.\"\n\t\t\t*set rel_tracey %-10\n\t\t\t*goto new_team\n\t#\"I need someone to watch my back.\"\n\t\t*if independence \u003c50\n\t\t\t$!{the} nods. \"That's what I'm here for.\"\n\t\t\t*set rel_tracey %+10\n\t\t\t*goto new_team\n\t\t*else\n\t\t\t$!{the} shakes ${this} head. \"Your track record doesn't exactly say 'team player' to me, but I'm willing to give this a shot. Just be honest with me, and we'll get along fine.\"\n\t\t\t*goto new_team\n\n*label new_team\n\nMaris finishes up her conversation and turns back around to face the two of you. \"Glad to see you're both talking already.\"\n\n*if rel_tracey > 55\n\tTracey nods. \"I think this will be a good fit.\" $!{the} smiles at you.\n*if (rel_early \u003c= 45) and (rel_early >= 55)\n\tTracey shrugs. \"It's been okay. We'll see how it goes.\" $!{the} smirks.\n*if rel_tracey \u003c 45\n\tTracey sighs. \"Sure. Whatever. Let's just get this over with.\" $!{the} doesn't look at you.\n*comment endif\n\n\"Tracey, get ${pl_fname} fitted with an earpiece and show ${phim} how it works. By the time you're done, I should have an assignment for you.\"\n\nTracey gives a vague salute and stands up. \"Come on, ${pl_fname}. Let's get you geared up.\"\n\n*page_break\nYou follow Tracey out of the office and through the studio to a door you didn't notice before. Beyond are more employees milling around wearing netglasses, many of them standing at short tables covered in electronic gear. There are tablets, cameras, attachments, cords, batteries, and other parts you can't identify, all in various states of repair. \n\n\"Welcome to the IT section,\" Tracey says. $!{the} reaches into a small box and plucks out a thick plastic card. \"Here's a blank press pass. Just press on the front so it can get your biometrics, and it'll automatically sync up with the INN computers and update your licenses.\"\n\n*if independence \u003c= 45\n\t\"Thanks,\" you say, taking the pass. \"This is much nicer than the one I used to have.\"\n*if (independence > 45) and (independence \u003c 65)\n\t\"Thanks,\" you say, taking the pass.\n*if independence >= 65\n\t\"Thanks,\" you say, taking the pass. \"I already know how to operate one.\"\n*comment endif\n\n$!{the} walks over to one table and picks up a small plastic nub between ${this} fingers. \"Now this is more interesting. It's a Mastronics ITE communication device, which is techspeak for 'put this in your ear.'\" $!{the} smiles a little. \"It's what I use to talk to you and hear you. We can get a mold of your ear canal later so it fits in better. And don't worry—the microphones also pick up the ambient sound and pass it through, so having the device in your ear shouldn't impact your hearing.\"\n\nYou take the nub. It's hard, but the surface feels slightly porous. You slip it into your right ear, and for a moment the bustle of the area is muffled. Then you can hear again, just like before.\n\n\"See?\" ${the} says. \"The tech's been around for ages in the medical field, but INN bought Mastronics a few years ago to develop it for our use.\" $!{the} looks around. \"Now we need to get you some netglasses.\"\n\n*choice\n\t#\"I don't need them. I have implants that take care of that.\"\n\t\t\"Oh, that's right. Your mysterious implants.\" Tracey taps ${this} temple. \"I've heard about those. Do you want to use those instead of netglasses?\"\n\n\t\t\"Yeah.\" \n\n\t\t\"I can use the earpiece to tap into your eyes' data feed, so I can see what you can see.\" $!{the} pulls a small tablet from ${this} pocket and makes some notes.\n\t\t*set independence %-10\n\t\t*set rel_tracey %+10\n\t\t*goto early_roberts\n\t#\"I don't want a pair. I have my own methods.\"\n\t\t\"What methods? I need to be able to see what you see, to give you proper support.\"\n\n\t\t\"Don't worry about it,\" you say, trying to end the discussion.\n\n\t\t\"Hey, you don't want to talk about your crazy eye implants with me, that's fine. I know about them from Early, anyhow. I'll just use the earpiece to tap into your eyes' data feed, so I can see what you can see.\"\n\t\t*set independence %+10\n\t\t*set rel_tracey %-10\n\t\t*goto early_roberts\n\t#\"Sure, let's see what's available.\"\n\t\t$!{the} grabs a pair sitting on a nearby table. \"Try these out. I hear they're good quality, and have a really fast upload/download speed.\" $!{the} hands them to you—a pair of dark netglasses that looks like a pair of retro sunglasses.\n\n\t\tYou put the netglasses on, and immediately your eyes get cloudy. Error messages scroll across your vision as a sudden headache cuts your skull in two. You rip the netglasses off, and they bounce across the floor.\n\n\t\t\"Shit!\" Tracey says. \"Are you all right?\"\n\n\t\t\"Yeah,\" you say, blinking your eyes as they recalibrate. \"Just a headache.\"\n\n\t\t\"Why would you get a headache from…?\" $!{the} smacks ${this} forehead. \"Right, your implants! Must be some kind of feedback loop. Well, I can tap into your eyes' data feed instead, so I can see what you see.\" $!{the} pulls a small tablet from ${this} pocket and makes some notes. \n\t\t*comment No loss or gain is intentional.\n\t\t*goto early_roberts\n\n*label early_roberts\n\nTracey finishes making notes on ${this} tablet, and puts it back into ${this} pocket. \"Let's head back to Maris's office. We'll test the setup later.\"\n\nYou make your way back and see that the walls to Maris' office are still opaque. Tracey turns the knob, and the chime sounds again as ${the} walks inside. You follow, and see that there's someone else inside the office.\n\nEarly Roberts.\n\n*page_break\n*if rel_early >= 20\n\t\"Hey there, rookie,\" Early says, smirking at you. \"Finally decided to get out of the little leagues and play with the big kids, huh?\"\n*if rel_early \u003c 20\n\t\"Ugh, the town blogger,\" Early says. \"Not sure how you stumbled into the big leagues, but you should leave and let the adults talk.\"\n*comment endif\n\nYou can feel yourself starting to get a headache.\n\n\"Enough of that, Early,\" Maris says. \"${pl_fname} works for me now.\"\n\nEarly shrugs. \"If you say so, Maris. I wouldn't give ${phim} a week, personally.\" He pulls a cigarette out of his pack and puts it into his mouth.\n\n\"I've told you, Early,\" Maris says. \"If you smoke in my office again, I'm cutting your royalties.\"\n\nGrumbling, he plucks the cigarette from between his lips and slides it behind his ear. \"Hey, ${pl_fname},\" he says, jerking his chin at Tracey.\n*if angel_dead\n\t\"You going to get Tracey killed, too?\"\n*if angel_dead = false\n\t\"You going to drive Tracey out of the industry, too?\"\n*comment endif\n\nTracey smiles at Early, but you notice ${this} fists are clenched tight by ${this} sides.\n\n*page_break\nMaris gets up from behind her desk and leans over it, staring at Early. \"Listen to me, Early. I don't care what your history is, but it gets wiped, starting today. I expect to see the hatchet buried, one way or another.\"\n\n\"In his head, maybe,\" Tracey mutters.\n\n\"Same goes for you, Tracey. I don't have time for workplace politics.\"\n\nTracey pinches two fingers and runs them across ${this} lips, as if zipping them shut.\n\nEarly sighs and turns to look at you. \"Look, it's great that you decided to emulate me. Become an INN reporter, get your eyes done just like mine—imitation is the best form of flattery. And for what it's worth, I'm sorry you ended up in the hospital.\" \n\n*if case1_filed\n\tHe shakes his head. \"But this is a rough business, and you can't afford to take stupid risks. Besides, my story was clearly superior to yours. So really, you got yourself hospitalized over nothing.\"\n*if case1_filed = false\n\tHe shakes his head. \"But this is a rough business, and you can't afford to take stupid risks. Besides, I already had the story wrapped up. So really, you got yourself hospitalized over nothing.\"\n*comment endif\n\n*choice\n\t#\"So why didn't you investigate the club? It was clearly connected.\"\n\t\t*if investigation >= 55\n\t\t\tEarly's lips twist into a snarl. \"Yeah, fine. I missed the connection to the club. A dozen nightclubs open and close every night in NA. How am I supposed to keep track of them all?\"\n\n\t\t\t\"I don't know,\" Tracey says, ${this} face carefully neutral. \"Maybe if you were better at your job \n\t\t\t*set rel_early %-10\n\t\t\t*set rel_tracey %+10\n\t\t\t*goto new_lead\n\t\t*else\n\t\t\tEarly shrugs. \"You're right. And your lack of talent will drag the team down. But I'm sure Maris will realize the mistake she's made before you screw things up too badly.\"\n\n\t\t\t\"I agree,\" Tracey says, ${this} face carefully neutral. \"We can only hope that Maris realizes how bad her hiring practices are.\"\n\n\t\t\t\"Damn right,\" Early says.\n\t\t\t*goto new_lead\n\t#\"I plan to do everything I can to put out higher-quality stories than you ever could.\"\n\t\t*if technique >= 55\n\t\t\tEarly shrugs. \"I have to admit that you do have some rudimentary talent in getting good footage, but that's only part of the package. Reporting is more than good camera work.\"\n\n\t\t\t\"That's true,\" Tracey says, ${this} face carefully neutral. \"It also requires not being a complete waste of skin.\"\n\n\t\t\t\"When I want lip from the help, I'll ask for it,\" Early snaps. Tracey puts ${this} hands up in mock surrender.\n\t\t\t*set independence %+10\n\t\t\t*set rel_early %+10\n\t\t\t*goto new_lead\n\t\t*else\n\t\t\tEarly laughs. \"With your amateurish technique? I've seen people get better footage on hacked netglasses than you got with a privacy-cleared camera. Call me when you bring something real to the table.\"\n\n\t\t\t\"Yeah,\" Tracey says, ${this} face carefully neutral. \"Because having the netglasses implanted directly in your face improves the quality of your footage dramatically.\"\n\n\t\t\t\"Damn right,\" Early says.\n\t\t\t*goto new_lead\n\n*label new_lead\n*achieve ach_confront_early\n\n\"Enough,\" Maris says. \"Tracey, go get your rig ready.\"\n\n\"But I need to calibrate with ${pl_fname}'s eyes and—\"\n\n\"You don't need to be here to do it,\" Maris insists, cutting ${thim} off. \"Get the specs from Early's new editor if you have to, but I want you in ${pl_fname}'s ear in fifteen.\"\n\nTracey turns to you. \"That okay with you, boss?\"\n\n*fake_choice\n\t#\"Don't mething won't fall through the cracks.\"\n\t\t\"Glad you think that way,\" Early says. \"You keep worrying about the truth, and I'll keep raking the credits in.\"\n\t\t*set factual %+10\n\t\t*set rel_early %+10\n\t\t*goto the_call\n\t#\"Just give me the file, and I'll dig into it. No need to stand around discussing it.\"\n\t\t\"Ease up, newbie,\" Early says. \"There isn't any harm in sharing information, is there?\"\n\n\t\t\"You didn't seem keen on sharing information last time we met,\" you point out.\n\n\t\t\"That was then. This is now.\"\n\t\t*set independence %+10\n\t\t*set rel_early %-10\n\t\t*goto the_call\n\n*label the_call\nEarly motions to the image. \"Anyway, this call came in this morning. I figure it's just a plebe looking for airtime, but maybe you'll find something different.\" He moves his finger near the start of the image, and a slider moves down the sound wave as audio comes from speakers hidden in the desk.\n\nA pleasant male voice comes from the speakers. \"Thank you for calling The Early Hour. How can we help you?\"\n\n*comment The older male doesn't speak perfect English, so some awkward transitions and dropped words are intentional in his lines.\n\"Hello? Is this the link for Mr. Roberts?\" The voice is older, male. There's a distinct Eastern European accent—maybe one of the old Russian states. NA ended up with plenty of refugees before the war ended.\n\n\"Yes, it is,\" the pleasant voice continues. \"How can we help you?\"\n\n\"I have story for him. I am told it is okay to call him with stories.\" Early rolls his eyes, and rotates his hand in a \"hurry up\" gesture while the voice patiently answers the question. \"Okay,\" the older voice says. \"My daughter…she was killed last night. By a gang.\"\n\n\"I'm sorry to hear that,\" the younger voice says. \"But unfortunately death is a common occurrence. It's not a story worth Mr. Roberts's time. Perhaps you are better served calling the police?\"\n\n\"No!\" The older man gets loud, and you can hear a tremor in his voice. \"I cannot. The police—they have stolen her.\"\n\n\"Her, sir?\"\n\n\"My daughter! Her body! It was taken!\"\n\n\"Well, sir, it is common for the police to take…evidence…from a crime scene.\"\n\n\"She was not evidence! She was a girl! And when we went to see her, police told us that she was never there. She was gone.\"\n\nThe younger man asks a follow-up question, but Early waves through the image, pausing the playback.\n\nYou look at him through the floating image. \"Don't tell me you know the gang involved.\"\n\nHe smiles. \"Oh yes. That's why I thought of you. The woman killed was a member of the West Coast Kings.\"\n*achieve ach_first_lead\n*finish"}};
