he ground. She spends the next few minutes ranting about how powerful and dangerous she and her gang are. You look for a way to extract yourself, but you can't do anything without leaving Angel behind.\n\n\t\t\tFinally, they stop. \"Yeah, that was fun,\" Tasha says. She points to Angel. \"You're pretty cool, buddy. Give me all your credits.\"\n\n\t\t\tAngel reaches into his jacket again and withdraws a worn debit card, holding it up in front of Tasha. The gangster pulls out her phone, a thick wedge of plastic colored purple and gold, and waves it over the card. A small beep, and you can see the balance on Angel's card spin to zero.\n\n\t\t\t\"Cool. You can go.\" Tasha tosses the empty card on Angel's chest. Angel carefully stands up, trying not to put any weight on his broken leg. He turns to look at you, but you shake your head. \"Go on,\" you say. He nods, and limps out of the alleyway.\n\n\t\t\tThe pipe hits you in the back of the head, and your skull bounces off the concrete. The pain is intense as you're rolled over. The pipe lands on your face, again and again. You can feel something crack, and blood runs into your eyes as you scream.\n\t\t\t*set factual %-10\n\t\t\t*set case1_filed true\n\t\t\t*achieve ach_angel_lives\n\t\t\t*finish\n\t\t*else\n\t\t\t\"Hey, don't you want to be video stars?\" you ask in desperation.\n\n\t\t\t\"What are you talking about?\" Tasha asks, suspiciously.\n\n\t\t\t\"I told you we were reporters,\" you explain. \"Going to have the hottest show on the net soon. We can cut you in for a slice of that fame.\"\n\n\t\t\t\"Yeah?\" Tasha's smile widens. \"You got a camera?\"\n\n\t\t\tAngel pulls the camera out of his jacket pocket with trembling hands. Tasha yanks it from him and looks it over for a moment, before casually tossing it to one of her friends. \"Ours now,\" she says.\n\n\t\t\t\"That's company property,\" you say, protesting out of habit as you try to think of a way out of here.\n\n\t\t\tTasha smiles, and then suddenly turns and cracks the pipe down on Angel's skull. The powerful blow splits his head wide open. You close your eyes, unable to watch as you hear the other gangsters beating Angel to death.\n\n\t\t\tYou don't get a chance to open your eyes again before the pipe hits you in the back of the head and your skull bounces off the concrete. The pain is intense as you're rolled over. The pipe lands on your face, again and again. You can feel something crack, and blood runs into your eyes as you scream.\n\t\t\t*finish\n", "screenshots": "screenshots!\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set factual 55\n*set ambition 45\n*set independence 47\n*set investigation 55\n*set charm 50\n*set technique 55\n*set market_share 0\n*set celebrity 0\n*set infractions 0\n*set rel_tracey 50\n*set rel_early 10\n*set tflirt true\n*set eflirt false\n*set pl_fname \"Michelle\"\n*set pl_lname \"Flynn\"\n*set pl_fullname \"Michelle Flynn\"\n*set pl_named false\n*set pl_gender \"f\"\n*set pl_likesmen true\n*set pl_likeswomen false\n*set phe \"she\"\n*set phim \"her\"\n*set phis \"her\"\n*set phimself \"herself\"\n*set pman \"woman\"\n*set psir \"ma'am\"\n*set pboy \"girl\"\n*set pmister \"Ms.\"\n*set tr_gender_f false\n*set the \"he\"\n*set thim \"him\"\n*set this \"his\"\n*set thimself \"himself\"\n*set tman \"man\"\n*set tsir \"sir\"\n*set tmister \"Mr.\"\n*set met_early false\n*set met_tracey false\n*set met_rich false\n*set met_jenni false\n\n\"But this is murder!\" Maria screams. \"You can't!\"\n\nOne of the gangsters looks nervously at both of you. \"I dunno…\"\n\nTasha shoves the gangster toward Maria and turns back to you. \"They know something about who's been killing us.\" She spits, and a gobbet of saliva lands next to you on the concrete. \"Maybe a few more broken bones will get them to talk.\"\n\n*fake_choice\n\t#Try to charm them by explaining it's stupid to do anything to me, since it might get on camera.\n\t#Tell them I've been investigating who is killing their gang members.\n\t#Offer to use my technical skills to make them video stars.\n\n*script changeBackgroundColor(\"black\")\n\n*set factual 60\n*set ambition 45\n*set independence 41\n*set investigation 60\n*set charm 55\n*set technique 55\n*set market_share 20\n*set celebrity 10\n*set infractions 0\n*set rel_tracey 55\n*set rel_early 10\n*set tflirt true\n*set eflirt false\n*set pl_fname \"Michelle\"\n*set pl_lname \"Flynn\"\n*set pl_fullname \"Michelle Flynn\"\n*set pl_named false\n*set pl_gender \"f\"\n*set pl_likesmen true\n*set pl_likeswomen false\n*set phe \"she\"\n*set phim \"her\"\n*set phis \"her\"\n*set phimself \"herself\"\n*set pman \"woman\"\n*set psir \"ma'am\"\n*set pboy \"girl\"\n*set pmister \"Ms.\"\n*set tr_gender_f false\n*set the \"he\"\n*set thim \"him\"\n*set this \"his\"\n*set thimself \"himself\"\n*set tman \"man\"\n*set tsir \"sir\"\n*set tmister \"Mr.\"\n*set met_early true\n*set met_tracey true\n*set met_rich false\n*set met_jenni true\n\n\"Of course, please. I will answer whatever I can.\"\n\nYou mentally instruct your opticOS to start recording. Ondrej looks startled. \"Are your eyes okay?\" he asks.\n\n\"Oh, yes. These are the electronic implants I use to record my interviews with.\"\n\nOndrej looks a little uncomfortable, but he nods. \"Go ahead.\"\n\n*fake_choice\n\t#\"Tell me about your family.\"\n\t#\"Who killed your daughter?\"\n\t#\"Why do you believe the police have stolen her?\"\n\t#\"Who was the detective in charge of the investigation?\"\n\t#\"Do you have anything you didn't hand over to the police?\"\n\t#\"That's all the questions I have.\"\n\n*script changeBackgroundColor(\"sepia\")\n\n*set factual 63\n*set ambition 40\n*set independence 35\n*set investigation 65\n*set charm 62\n*set technique 55\n*set market_share 20\n*set celebrity 20\n*set infractions 0\n*set rel_tracey 58\n*set rel_early 10\n*set tflirt true\n*set eflirt false\n*set pl_fname \"Michelle\"\n*set pl_lname \"Flynn\"\n*set pl_fullname \"Michelle Flynn\"\n*set pl_named false\n*set pl_gender \"f\"\n*set pl_likesmen true\n*set pl_likeswomen false\n*set phe \"she\"\n*set phim \"her\"\n*set phis \"her\"\n*set phimself \"herself\"\n*set pman \"woman\"\n*set psir \"ma'am\"\n*set pboy \"girl\"\n*set pmister \"Ms.\"\n*set tr_gender_f false\n*set the \"he\"\n*set thim \"him\"\n*set this \"his\"\n*set thimself \"himself\"\n*set tman \"man\"\n*set tsir \"sir\"\n*set tmister \"Mr.\"\n*set met_early true\n*set met_tracey true\n\nThere's a short line of people waiting outside the large double doors. They're all wearing multiple layers of shabby clothing, and the wear and grime has turned their garments shades of brown and gray. Most of them wear knit caps and frayed gloves to try and keep themselves warm. They don't pay any attention to you, but they are blocking the doors as they wait.\n\nYou feel a chill, but you aren't sure if it's from the winter wind or the bleakness of the area.\n\n*fake_choice\n\t#Talk to some of the people in line.\n\t#See if there's another way in.\n\t#Carefully examine the area.\n\n*script changeBackgroundColor(\"black\")\n*set factual 60\n*set ambition 42\n*set independence 35\n*set investigation 65\n*set charm 62\n*set technique 55\n*set market_share 20\n*set celebrity 20\n*set infractions 0\n*set rel_tracey 55\n*set rel_early 10\n*set tflirt true\n*set eflirt false\n*set pl_fname \"Michelle\"\n*set pl_lname \"Flynn\"\n*set pl_fullname \"Michelle Flynn\"\n*set pl_named false\n*set pl_gender \"f\"\n*set pl_likesmen true\n*set pl_likeswomen false\n*set phe \"she\"\n*set phim \"her\"\n*set phis \"her\"\n*set phimself \"herself\"\n*set pman \"woman\"\n*set psir \"ma'am\"\n*set pboy \"girl\"\n*set pmister \"Ms.\"\n*set tr_gender_f false\n*set the \"he\"\n*set thim \"him\"\n*set this \"his\"\n*set thimself \"himself\"\n*set tman \"man\"\n*set tsir \"sir\"\n*set tmister \"Mr.\"\n*set met_early true\n*set met_tracey true\n\nYou point at the raw footage you shot. \"Wait. Here it is.\"\n\nTracey stops moving the footage around, and zooms in where you're pointing. \"I guess the big question is, are we going to air anything about this?\"\n\nYou shake your head. \"No. We're cutting it.\"\n\nTracey leans away from the workstation. \"Are you sure? I feel weird leaving a chunk of our investigation on the cutting-room floor.\"\n\n*fake_choice\n\t#\"We're not in the business of ruining people's lives.\"\n\t#\"It ruins the human interest.\"\n\t#\"Just do it.\"\n\n*if choice_is_ios_app\n\t*finish\n\n*set factual 65\n*set ambition 38\n*set independence 43\n*set investigation 65\n*set charm 62\n*set technique 60\n*set market_share 40\n*set celebrity 30\n*set infractions 1\n*set rel_tracey 62\n*set rel_early 15\n*set tflirt true\n*set eflirt false\n*set pl_fname \"Michelle\"\n*set pl_lname \"Flynn\"\n*set pl_fullname \"Michelle Flynn\"\n*set pl_named false\n*set pl_gender \"f\"\n*set pl_likesmen true\n*set pl_likeswomen false\n*set phe \"she\"\n*set phim \"her\"\n*set phis \"her\"\n*set phimself \"herself\"\n*set pman \"woman\"\n*set psir \"ma'am\"\n*set pboy \"girl\"\n*set pmister \"Ms.\"\n*set tr_gender_f false\n*set the \"he\"\n*set thim \"him\"\n*set this \"his\"\n*set thimself \"himself\"\n*set tman \"man\"\n*set tsir \"sir\"\n*set tmister \"Mr.\"\n*set met_early true\n*set met_tracey true\n\nYou carefully make your way to the short ramp that leads to the docks, as you watch six people in dark suits get out of the cars. They're all wearing dark netglasses, and four of them are looking in every direction while the other two watch the ship dock. You manage to duck behind the trunk of a tree as one of them looks in your direction.\n\n*fake_choice\n\t#Keep to the shadows and move closer to the vehicles.\n\t#Use the zoom on my opticOS to get a better look at what's going on.\n\t#Climb the tree to watch them from above.", "startup": "*title Ratings War\n*author Eddy Webb\n\n*scene_list\n\tstartup\n\trunningfromkings\n\tsurgery\n\tmissingcorpse\n\tstelizabeths\n\tfelixsloane\n\tfirstshow\n\thumantraffic\n\tkatrinasloane\n\tjadensloane\n\tconfrontmaris\n\n*create factual 50\n*comment opposed by flamboyant\n*create ambition 50\n*comment opposed by integrity\n*create independence 50\n*comment opposed by synergy\n*create investigation 50\n*create charm 50\n*create technique 50\n*create market_share 0\n*create celebrity 0\n*create infractions 0\n\n*comment These are the protagonist's relationships.\n*create rel_tracey 50\n*create rel_early 10\n*create tflirt true\n*create eflirt false\n\n*comment These are default player chargen values.\n*create pl_fname \"Michelle\"\n*create pl_lname \"Flynn\"\n*create pl_fullname \"Michelle Flynn\"\n*create pl_named false\n*create pl_gender \"f\"\n*create pl_likesmen true\n*create pl_likeswomen false\n*create pl_showname \"The Unvarnished Truth\"\n\n*comment These are default player gender pronouns.\n*create phe \"she\"\n*create phim \"her\"\n*create phis \"her\"\n*create phimself \"herself\"\n*create pman \"woman\"\n*create psir \"ma'am\"\n*create pboy \"girl\"\n*create pmister \"Ms.\"\n\n*comment These are Tracey's gender pronouns.\n*create tr_gender_f false\n*create the \"he\"\n*create thim \"him\"\n*create this \"his\"\n*create thimself \"himself\"\n*create tman \"man\"\n*create tsir \"sir\"\n*create tmister \"Mr.\"\n\n*comment These are flags to track what characters the protagonist has met.\n*create met_early false\n*create met_tracey false\n*create met_rich false\n*create met_jenni false\n\n*comment These are flags about what cases are actually broadcast.\n*create case1_filed false\n*create case2_filed false\n*create case3_filed false\n*create case4_filed false\n\n*comment These are the decisions that lead to final market share increases.\n*create case2_marketShare 0\n*create case3_marketShare 0\n*create case4_marketShare 0\n\n*comment These track what clues the protagonist has found.\n*create clue_caliber false\n*create clue_disappearance false\n*create clue_neighbor false\n*create clue_detSloane false\n*create clue_photo false\n*create clue_KatrinaFace false\n\n*comment These are deductions the protagonist makes.\n*create deduction_serial false\n*create deduction_bodySold false\n*create deduction_detSloaneKnows false\n*create deduction_KatrinaAndSloane false\n*create deduction_shippingBodies false\n\n*comment These are miscellaneous story flags.\n*create angel_dead false\n*create chatty_cabbie false\n*create Felix_bought false\n*create blackmail false\n*create blackmailed_felix false\n*create recorded_felix_confession false\n*create story_with_organ_sale false\n*create named_felix false\n*create early_show false\n*create told_katrina false\n*create recorded_katrina_interrogation false\n*create katrina_arrested false\n*create katrina_dead false\n*create katrina_picture false\n*create tracey_called false\n*create named_katrina false\n*create named_ambrosia false\n*create named_jaden false\n*create accept_jaden_deal false\n\n*comment Achievements\n*achievement ach_presspass visible 5 Glitchy Press Pass \n\tGet your press pass working properly.\n*achievement ach_angel_lives visible 15 Fleeing Angel \n\tHelp Angel to escape.\n*achievement ach_confront_early visible 15 Stand Your Ground\n\tDefend your pre-INN work to Early.\n*achievement ach_first_lead visible 5 Your First Lead \n\tGet your first lead at a new job.\n\tYou got your first lead working for INN.\n*achievement ach_cabbie hidden 15 Ask The Driver\n\thidden\n\tQuestion a cabbie about the area.\n*achievement ach_coffee visible 5 A Cup of Coffee\n\tGrab a cup of coffee.\n\tMeet with Tracey at Coffee Coffee.\n*achievement ach_playground visible 15 A Walk In The Park\n\tVisit a playground.\n\tYou went to the playground where Tasha was murdered.\n*achievement ach_inside_job visible 5 Inside Job \n\tGet inside a place that doesn't want visitors.\n\tSee the inside of St. Elizabeth's.\n*achievement ach_beer visible 10 A Glass of Beer\n\tHave a glass of beer.\n\tShare a glass of beer with Felix Sloane in the Lame Duck Pub.\n*achievement ach_blackmail hidden 15 Whatever It Takes\n\thidden\n\tBlackmail Felix Sloane.\n*achievement ach_first_story visible 5 News Package\n\tHelp edit a news story.\n\tWork with Tracey on your first story with INN.\n*achievement ach_luck visible 15 Beginner's Luck\n\tYour first show on INN is a huge success.\n*achievement ach_criminal visible 5 Criminal Activity\n\tFilm a crime in progress.\n\tFilm Katrina Gray's human trafficking operation.\n*achievement ach_katrina_dead hidden 15 A Good-Looking Corpse\n\thidden\n\tKill Katrina Gray.\n*achievement ach_sex visible 15 Spend The Night \n\tGet busy.\n\tSpend the night with Tracey. You didn't sleep much.\n*achievement ach_see_jaden visible 5 One Last Ride\n\tTake a car ride you might not come back from.\n\tMeet Jaden Sloane in his office.\n*achievement ach_talk_jaden visible 5 Center of the Web\n\tTalk with a very important person.\n\tTalk with Jaden Sloane about his involvement.\n*achievement ach_punch_early visible 15 Come Out Swinging\n\tPunch Early. He probably deserves it.\n*achievement ach_the_end visible 5 Graveside Vigil\n\tVisit someone's grave.\n\tVisit Tasha'a grave with Ondrej.\n*achievement ach_date_early hidden 15 Didn't See That Coming\n\thidden\n\tYou went on a romantic date with Early.\n*achievement ach_market_share visible 10 Must-Watch Video\n\tEnd your career with over 100 Market Share\n*achievement ach_celebrity visible 10 World-Famous\n\tEnd your career with over 100 Celebrity.\n*achievement ach_infractions visible 10 Clean Record\n\tEnd the game with no infractions on your record.\n*achievement ach_factual visible 10 Factual\n\tDevote yourself to being accurate during your career.\n*achievement ach_flamboyant visible 10 Flamboyant\n\tDevote yourself to being entertaining during your career.\n*achievement ach_ambition visible 10 Ambition\n\tFocus on your own ambition during your career.\n*achievement ach_integrity visible 10 Integrity \n\tFocus on your personal integrity during your career.\n*achievement ach_independence visible 10 Independence\n\tWork alone during your career.\n*achievement ach_synergy visible 10 Synergy\n\tWork to help other people during your career.\n\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tImplant cameras in your eyes to win the news wars of 2061! Record your way through dystopian New Angeles, solving multiple murders and conquering the airwaves as you go!\n\n\t[i]Ratings War[/i] is a thrilling 80,000-word interactive novel by Eddy Webb, where your choices control the story. It's entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\n\tOutwit your rivals at the biggest news network in the industry to win market share and dominate the ratings. As one of the first reporters with a pair of cybernetic eyes, you’ll break stories while you live them—and become a celebrity when you uncover a vast criminal conspiracy. \n\n\tWhen you blow the whistle on a human trafficking operation, will you focus on facts or on fame? Will you strike out as an independent, or follow the guidelines of your network? You can escape from an underground organ farm—but can you get your footage on the air and win the Ratings War?\n\n\t*if choice_is_advertising_supported\n\t\t[i]Ratings War[/i] is supported by advertisements, but you can buy the unlimited version\n\t\tto turn off ads forever.\n\t\t\n\t\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t\t*page_break_advertisement\n\n\t\t*goto purchased\n\t*else\n\t\t[i]You can play the game for free, with 20 minute breaks between chapters, or you can buy the game now for unlimited play without breaks.[/i]\n\n\t\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t\t*page_break Play Now for Free\n\n*label purchased\n\n\n*goto_scene runningfromkings", "stelizabeths": "*comment Chapter Four\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Ratings War[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n*temp disguised false\n*temp captured false\n*temp have_pistol false\n*temp inside_st_elizabeth false\n*temp backup_plan 0\n*temp visited_director false\n*temp visited_hospital false\n*text_image chap4.png\n\nThe cab drops you off at an apartment building. Like much of the rest of the neighborhood, it's a pre-Merger building that has seen better days. The area is clean, with no graffiti or net pop-up spam—it's a poor area, but one that the locals take some pride in.\n\nMichael Cooper lives on the 15th floor. The place is too old and run-down to have an interface for netglasses, so you are forced to manually push a button marked with his name to get into the building and make your way to his door. The elevator takes you to a floor with a single hallway and two doors, one on each side. Remembering your experience with Ondrej, you knock on the one marked 151.\n\n\"Hang on,\" you hear from inside. After a moment you hear a deadbolt click, and the door opens a little. You can make out a single blue eye and white hair through the crack. \"Yeah? What do you want?\"\n\n\"My name is ${pl_fullname},\" you say.\n\n\"Yeah, Ondrej mentioned you,\" he says, but he doesn't open the door.\n\n*fake_choice\n\t#\"I'm a reporter for INN. I want to ask you a few questions about Natasha Kovac.\"\n\t\t\"A reporter? You're not with the cops?\"\n\n\t\t\"Not at all, Mr. Cooper. I just want to get the facts of what happened.\"\n\n\t\tHe thinks for a moment, and then opens the door. \"Sure. Why not? Maybe it'll give Ondrej some peace. Come on in.\"\n\t#\"He said you could tell me what happened to his daughter.\"\n\t\t\"Yeah? Tell me you're not with the cops.\"\n\n\t\t\"I'm not with the cops,\" you say, carefully.\n\n\t\t\"Of course, that's the sort of thing you would say if you were a cop,\" Tracey mutters in your ear.\n\n\t\tHe thinks for a moment, and then opens the door. \"Sure, come on in. Maybe someone can help Tasha rest easy.\"\n\t#\"I work with Early Roberts. I want to record a segment about Natasha Kovac for his show.\"\n\t\t\"Say what?\" Tracey says in your ear.\n\n\t\t\"You mean that reporter on INN?\" Michael asks.\n\n\t\t\"Yes, sir,\" you say, trying to keep your expression neutral.\n\n\t\tHe thinks for a moment, and then opens the door. \"Sure, come on in. She's already dead, so it can't hurt to talk about her.\"\n*comment endif\n\nYou thank him and step inside.\n\nThe apartment takes up half the entire floor of the building. It's an open plan, with different areas marked off by colored rugs on the glossy hardwood floor, and a few spots that are curtained off. Most of the furniture looks reupholstered or fixed by hand. Either he has the same flair for self-repair that Ondrej has, or the old man came over to fix some of Michael's furniture at one point. \n\nMichael himself is dressed very casually in a dark T-shirt and jeans, both covered with spots left by bleach or some other chemical. His hair is white, although it's hard to tell if it's because of age, because he's naturally pale blond, or both. One of his eyes is the deep blue you saw at the door, but the other is covered with a cloudy gray cataract.\n\n\"Pop a squat,\" he says, waving you over to a sitting room area. \"Lemme get out of these stinky clothes, and I'll be right there.\" He steps through one of the curtains, and you can hear drawers opening.\n\n\"You've got a few minutes,\" Tracey says in your ear. \"What do you want to do?\"\n\n*choice\n\t#Poke around the apartment.\n\t\tYou look around the apartment, moving away from the curtained areas. You notice that one corner contains a small old-school photography lab, from back before film became obsolete. Bottles of chemicals are carefully labeled and set along a high shelf, and there's a stack of developed pictures sitting next to a heavy camera case covered in scratches and tape.\n\t\t*if investigation >= 60\n\n\t\t\tYou quickly flip through the stack of pictures, and one photo in particular jumps out at you.\n\t\t\t*if clue_photo\n\t\t\t\tIt's an identical copy of the picture that Ondrej gave you.\n\n\t\t\t\t\"That confirms this is our guy,\" Tracey says in your ear. \"Something to work into the story.\"\n\t\t\t*if clue_photo = false\n\t\t\t\tIt's a picture of Tasha, shot through the head.\n\n\t\t\t\t\"The guy took a photo of her body before he told her father,\" Tracey says. \"That's a hell of a thing to work into the story.\"\n\n\t\t\t\tYou use your opticOS to store an image of the photo and send it to Tracey.\n\t\t\t*comment endif\n\n\t\t\tAs Michael comes out from the curtained area, you quickly put the stack back in order.\n\t\t\t*set clue_photo true\n\t\t\t*set case2_marketShare +10\n\t\t\t*goto question_Michael\n\t\t*else\n\n\t\t\tYou quickly flip through the stack of pictures, but you don't see anything interesting. You manage to put the stack back in order as you hear Michael coming out from the curtained area.\n\t\t\t*goto question_Michael\n\t#Talk to Michael through the curtain.\n\t\t*if charm >= 60\n\t\t\tYou walk closer to the curtain. \"Nice apartment,\" you say, hoping to prompt a conversation.\n\n\t\t\t\"Yeah,\" Michael says, his voice muffled by the heavy curtain. \"Between the dough for my husband's death, the insurance payment for my eye, and what I got when I sold the shop, I bought a chunk of this floor for myself. Ondrej and I both like working with our hands, even though I'm not nearly as good as he is, and he's no spring chicken. Took us a year to get this place into shape.\" You hear him laugh a little. \"Make yourself a drink, if you want. It's been a while since I had someone over. Joseph was always the social one, you know?\"\n\t\t\t\"Nice human interest bit for the story,\" Tracey says in your ear.\n\t\t\t*set case2_marketShare +10\n\t\t\t*goto question_Michael\n\t\t*else\n\t\t\tYou try to talk with him, but you only hear him laugh a little. \"Make yourself a drink, if you want. Almost done in here.\" You make your way to the kitchen, but after a couple of minutes, you find only water and beer to drink. You turn just as you hear Michael coming out from the curtained area.\n\t\t\t*goto question_Michael\n\t#Take some footage of the apartment.\n\t\t*if technique >= 60\n\t\t\tYou start recording as you look around. The apartment is an anomaly in this part of town—a bit of unexpected artistry. Just because an area is poor doesn't mean there aren't people with passion and creativity who stay and work to keep the community together. It's a slice of humanity, something that puts a face on the often overlooked people in this area. You already have a few ideas of how to use the footage to make the story really connect with your audience.\n\n\t\t\tAfter a couple of minutes, you stop recording and reset your eyes to normal as you hear Michael coming out from the curtained area.\t\t\t\n\t\t\t*set case2_marketShare +10\n\t\t\t*goto question_Michael\n\t\t*else\n\t\t\tYou start recording as you look around. The apartment is surprisingly comfortable for this part of town. You don't know what it has to do with the story, but it can't hurt to get a little extra footage to round things out.\n\n\t\t\tAfter a couple of minutes, you stop recording and reset your eyes to normal as you hear Michael coming out from the curtained area.\n\t\t\t*goto question_Michael\n\n*label question_Michael\n\n\"Sorry about that,\" he says. He's now wearing an outfit similar to the one before, but with no spots on it. \"I get wrapped up in my photos, so I don't notice the smell. But my husband, Joseph, used to tell me that when I'm done, I smell like a chemical factory.\" He walks over to a leather couch covered in scratches and worn spots and sits down. \"What can I do you for?\"\n\n\"Do you mind if I record our conversation?\" you ask. The question is rote, almost instinctual after being drilled into you during your training as a reporter.\n\nHe spreads his hands wide. \"Sure, whatever. It ain't anything I haven't told the cops anyhow.\"\n\n\"Thank you. I should warn you that my recording devices are implanted into my eyes.\" You mentally command opticOS to start recording.\n\nMichael leans forward at that, staring deep into your eyes. \"Really? Ain't that a thing. Never seen nothing like that before.\"\n\nYou nod and begin the interview.\n\n*page_break\n\"You are the person who found Natasha's body, correct?\"\n\nHe nods. \"Yeah. I guess I should say something about how she was a nice girl and it's a tragedy that it happened. Truth is, if she weren't Ondrej's kid, I'd be a lot more relieved than upset, if you know what I mean.\"\n\n\"Relieved?\"\n\nMichael looks away, staring at the opposite end of the apartment. \"This here's a good neighborhood, ${pmister} ${pl_lname}. It ain't flashy or modern, but there are good people here. Other folks think that 'poor' means 'crime-ridden,' and sure, once in a while the gangs try to move in, but we take care of our own.\"\n\nYou blink, trying to keep Michael in focus. \"So the gangs haven't been very successful here.\"\n\nHe shrugs. \"Some are. The violent ones don't stick around long, no thanks to the cops. And Tasha, she was one of the violent ones.\"\n\n[i]You have no idea[/i], you think to yourself, but you keep your face neutral. \"So you were relieved that a violent woman wasn't going to terrorize your home.\"\n\nMichael nods. \"Exactly. Maybe that makes me a bad person. To be honest, I'm too damned old to care much what other people think, but Ondrej is a nice guy. I care about what it did to him.\"\n\n\"Did you call the police?\"\n\n\"Sure I did,\" he says, a rough edge to his voice. \"It don't matter who she was, or how little the cops seem to care. Murder still ain't right.\"\n\n*choice\n\t#\"Yes. Any life is a waste.\"\n\t\tMichael nods. \"It is. You know, ten years ago, I probably wouldn't have even cared. Just another dead kid's name in the blogs, you know? But ever since Joseph passed, I've been thinking a lot about how fragile life is.\" He smiles to himself. \"He'd probably laugh now. 'Getting soft on me, Mikey?' he'd say. I wasn't this sappy when he was alive.\"\n\t\t*set ambition %-10\n\t\t*goto if_photo\n\t#\"She got what she deserved.\"\n\t\tMichael frowns. \"You know, ten years ago, I would've agreed with you. Let the scum wipe each other out, and leave us decent folk in peace. But ever since I lost Joseph, I've been thinking a lot about how fragile life is.\"\n\t\t*set independence %+10\n\t\t*goto if_photo\n\t#\"How do you know it was murder?\"\n\t\tMichael frowns. \"I ain't no Sherlock Holmes, but the bullet in her forehead gave me a clue.\" He pauses for a moment before continuing. \"You know, ten years ago, I wouldn't have even cared. Let the scum wipe each other out, and leave us decent folk in peace. But ever since I lost Joseph, I've been thinking a lot about how fragile life is.\"\n\t\t*set factual %+10\n\t\t*goto if_photo\n\n*label if_photo\n*if clue_photo\n\n\t\"Is that why you took the photograph of her body?\" you ask quietly.\n\t*if charm >= 60\n\n\t\tMichael looks at you for a long moment. Finally, he sighs. \"Ondrej told you about the picture, huh? I told him not to show it to the cops, but I guess you ain't a cop.\" \n\n\t\t\"Do you want me to stop recording?\" you ask.\n\n\t\t\"No. If Ondrej felt he could trust you, so can I.\" He rubs his good eye, as if tired. \"Yeah, I took it. I figured the police would botch things up, so I wanted to make sure there was some kind of evidence.\"\n\n\t\t\"So you took the photo before the police arrived, in case they tampered with the body.\"\n\n\t\t\"Before? No. I took the picture after the police arrived.\"\n\n\t\t*page_break\n\t\t\"What?\" Tracey says in your ear.\n\n\t\t\"What?\" you say.\n\n\t\t\"Before,\" Michael repeats. \"I heard the detective talking about how a meat wagon was going to pick the body up, and how it was 'off the books.' I don't think he even noticed I was there when he said it.\"\n\n\t\tYou lean forward, eagerly. \"Did you—\"\n\n\t\t\"Yeah, I saw the van that picked her up,\" he says, cutting you off. \"Got a picture of that, too.\" He gets up and walks over to a large bookcase, crammed with books on photography. He pulls one out and flips open the cover, pulling out a photo, and hands it to you before putting the book back.\n\n\t\t*page_break\n\t\tThe photo shows a dark gray van—not a hospital or coroner's ambulance. The side reads \"St. Elizabeth\" along with a cell number.\n\n\t\t\"Thank you, Mr. Cooper,\" you say, handing the photo back and ending your recording. \"You've been a great help.\"\n\n\t\t\"Just make sure Ondrej gets what he's looking for. Even if it hurts him now, he's better off knowing the truth.\"\n\n\t\tYou nod, shake hands with Michael, and leave the apartment.\n\t\t*set case2_marketShare +10\n\t\t*goto saint_elizabeth\n\t*else\n\n\t\tMichael looks at you for a long moment. Finally, he frowns. \"You need to turn those eyes off and go,\" he says.\n\n\t\t\"Wait,\" you ask, as you acquiesce to his request to stop recording. \"Can you at least tell me where you took the photo? Where the scene of the crime was?\"\n\n\t\t\"I didn't take any pictures, but if you want to know where she died, it was down at the playground across the street. Now go—I've got some things I need to finish up, and it ain't going to be pleasant in here.\"\n\n\t\tRecognizing the brush-off, you leave the apartment.\n\t\t*goto the_scene\n*else\n\t\"Can you tell me where she died?\"\n\n\t\"Sure. It was down at the playground across the street.\"\n\n\t\"Thank you, Mr. Cooper,\" you say, as you stop recording. \"You've been a great help.\"\n\n\t\"Just make sure Ondrej gets what he's looking for. Even if it hurts him now, he's better off knowing the truth.\"\n\n\tYou nod, shake hands with Michael, and leave the apartment.\n\t*goto the_scene\n\n*label the_scene\n\n*achieve ach_playground\nAs you exit the building, you scan the area, looking for a playground. The pre-Merger buildings huddle together, like a homeless family trying to keep warm, but you notice an alleyway right across the street from you. Your mind flashes back to another alleyway, the one where Tasha attacked you, but you shove it aside and walk across the street to investigate. It leads to a wider space beyond, and you can hear the sounds of laughter.\n\nBeyond is a small park, nestled between the worn buildings. The grass is dead and brown from the winter chill, but it's thick and was likely well maintained. In the grass are a couple of swing sets, a slide, and a merry-go-round, each showing signs of rust and regular repair. Around the edges are a number of worn benches facing the equipment. A half-dozen children are playing, with a few adults watching and chatting as they relax on the benches.\n\nAs you walk up, some of the children stop playing and stare at you. The adults notice and turn to look at you as well. One of them—a tall man with thick muscles—stands up and walks over to you. \"Can I help you?\" he asks in a carefully neutral tone.\n\n*label talk_to_parent\n*choice\n\t*disable_reuse #Show your press pass. \"I'm ${pl_fullname}, a reporter with INN.\"\n\t\t*if investigation >= 55\n\t\t\tThe man stares suspiciously at the press pass. \"I don't know what that is,\" he says finally, before looking up.\n\n\t\t\t\"It means I'm licensed to record and broadcast within the privacy laws,\" you say, carefully putting the pass back. \"I can tell the world all the facts of the murder that happened here.\"\n\n\t\t\tHe folds his arms over his chest. \"I don't want me or my girl to be filmed.\"\n\n\t\t\t\"And that's your right,\" you say. \"But if I can put together a story, I can make sure that no one tries to sweep it under the rug. People will know this park exists, but they'll also be able to keep it safe.\"\n\t\t\t*goto i_saw_something\n\t\t*else\n\t\t\tThe man stares suspiciously at the press pass, and frowns. \"I don't know what that is,\" he says finally, before looking up. \"And I don't know you. Anyone could say they're a reporter. So tell me what you're doing here.\"\n\n\t\t\tLooks like your credentials won't be enough to convince him.\n\t\t\t*goto talk_to_parent\n\t*disable_reuse #Try to look nonthreatening. \"I'm just here to ask about a young girl who was killed around here.\"\n\t\t*if charm >= 55\n\t\t\tThe man looks back at the children playing, and then back at you. \"Why? Are you the girl's parent?\"\n\n\t\t\t\"No,\" you admit. \"I'm a reporter.\"\n\n\t\t\tHe folds his arms over his chest. \"I don't want me or my girl to be filmed as part of whatever glory-seeking crap you're making.\"\n\n\t\t\tYou put your hands up, defensively. \"I can't record anything you don't want me to. I'm just here because the girl's father wants justice. I'm sure you can appreciate that.\"\n\t\t\t*goto i_saw_something\n\t\t*else\n\t\t\tThe man looks back at the children playing, and then back at you. \"Why? Are you the girl's parent?\"\n\n\t\t\t\"No,\" you admit. \"Her father is—\"\n\n\t\t\t\"Because I have a little girl,\" the man continues, as if you hadn't said anything. \"And I get nervous when people talk about killing girls around here.\"\n\n\t\t\tYou notice his hands are flexing. Time to try a different angle.\n\t\t\t*goto talk_to_parent\n\t*disable_reuse #Scan the area, looking for good angles. \"This is a great park. I've love to film it for my story.\"\n\t\t*if technique >= 55\n\t\t\tThe man looks back at the children playing, and then back at you. \"I don't want anyone filming my little girl or me.\"\n\n\t\t\t\"Not a problem. I'll get everyone's consent, or record when everyone's gone. I just want to give people some context for what happened here.\"\n\n\t\t\tHe frowns. \"You mean the Kovac girl.\"\n\n\t\t\tYou nod. \"I'm a reporter with INN. I got a call from her father. He wants to know what happened to his daughter. My technique might seem a little callous, but I know how to put a story together. And I think every father has a right to make sure his daughter is remembered.\"\n\t\t\t*goto i_saw_something\n\t\t*else\n\t\t\tThe man jerks a thumb over his shoulder. \"Do it when we're gone.\"\n\n\t\t\tDamn. You can't record anything now without breaking the law. Better try something else.\n\t\t\t*goto talk_to_parent\n\n*label i_saw_something\n\nAs you speak, a girl about nine or ten years old walks up to the man. She is wearing a blue coat, jeans, and blue sneakers. She slides her hand into his and looks up at him. \"Is everything okay, Daddy?\"\n\nThe man leans down and picks the girl up, holding her effortlessly in his arms. \"Of course, honey. I'm just talking with this ${pman} here.\"\n\nYou wave a little at the girl. She waves a little back.\n\n\"What was your name again?\" the man asks.\n\n\"${pl_fullname}.\"\n\n\"Listen, ${pl_fname}, I meant what I said about not being filmed. But I do know something about the Kovac girl.\" \n\nHe sets his daughter back down, and quietly tells her to go back and play. She looks at you again with obvious concern, but walks back to the playground. The man watches her go, and then turns to you.\n\n\"I'm part of the neighborhood watch. I didn't see the actual deed, but when I got back from work, my buddy Chloe told me what happened. I came down to look for myself, see if there was anything I could find to make sure we could find this sicko, when I saw a body being loaded into a gray van.\"\n\n\"Not an ambulance?\" you ask.\n\n\"No. That's why it stuck out in my head. It was more like a delivery van, and it had 'St. Elizabeth' written on the side.\"\n\nYou offer your hand, and he shakes it with a firm grip. \"Thank you. You've been a huge help.\"\n\n\"No problem. And I'll remember your name. If you're telling the truth, I'll let everyone know to stay tuned.\"\n\n\"You do that,\" you say, and make your way to the street.\n*set celebrity +10\n*goto saint_elizabeth\n\n*label saint_elizabeth\n\nYou stand out on the street, thinking about your next move. \"Tracey, tell me what you know about St. Elizabeth.\"\n\nText scrolls out of the corner of your right eye as you hear Tracey's voice in your ear. \"You mean besides the fact it's probably the most generic hospital name ever created? There are at least four with some variation on that name in New Angeles, and they're in completely different parts of the city.\"\n\n\"Don't give up so easily. How many of them use gray vans?\"\n\n\"That's the worst part,\" ${the} says, grumbling. \"None of them do.\"\n\nYou tap your earpiece to make sure you heard correctly. \"What?\"\n\n\"It's true, boss. There isn't a single hospital in this city that uses gray vans. They're all white or blue.\"\n\n\"So it must not be a hospital.\" \n\n\"That's what I was thinking. What if…?\" $!{this} voice trails off, and you hear a faint tapping at the edge of your hearing as Tracey searches for something. You fight the instinct to turn and look for it. After a moment, ${this} voice comes back. \"Right. There's a homeless shelter that is operated by St. Elizabeth's church. And they recently received a donation of two gray vans that were left unclaimed in police impound. Some kind of tax dodge by the local government, I guess.\"\n\nYou start to ask for the address, when it pops up in your peripheral vision. You mentally call for your cab and wait for it to arrive.\n\n*page_break\nThe ride is long, but you eventually arrive. Unlike Oldtown, which is poor but well maintained, this part of town looks like it collapsed and never recovered. A couple of buildings are nothing more than charred shells covered in ancient soot and still smelling of smoke. Abandoned cars with shattered windows and missing tires sit in front of homes covered in spray paint. Someone's set up a cheap pop-up projector around here, because your opticOS is flooded with advertisements for pawn shops, liquor stores, and numbers for \"escort\" services. You kick in your opticOS spam filter as the cab pulls away.\n\nIn front of you is one of the least vandalized buildings in the area. It's a long brick building, two stories in height, taking up most of the block. The windows are all blacked out, and the entire surface looks like it was sandblasted clean at some point. The hand-painted board over the door says \"St. Elizabeth Homeless Shelter,\" and a plastic folding sign standing on the sidewalk indicates that they'll be serving food in a few minutes.\n\nThere's a short line of people waiting outside the large double doors. They're all wearing multiple layers of shabby clothing, and the wear and grime has turned their garments shades of brown and gray. Most of them wear knit caps and frayed gloves to try and keep themselves warm. They don't pay any attention to you, but they are blocking the doors as they wait.\n\nYou feel a chill, but you aren't sure if it's from the winter wind or the bleakness of the area.\n\n*choice\n\t#Talk to some of the people in line.\n\t\tYou walk up to one of the people in line. Dirt covers their face, and they seem to shrink inside of a torn leather jacket over a grimy hoodie.\n\n\t\t\"Hi. I'm new here. Any idea how I can get inside?\"\n\n\t\tThey point to the end of the line.\n\t\t*if charm >= 60\n\n\t\t\tYou look over the line of people, and realize that you're not going to get anywhere dressed as you are. You stand out too much in this sea of despair. Your skill at interviewing kicks in—these folks are going to be far too suspicious if you just step up and start asking them questions. You thank the person in line and walk away.\n\n\t\t\t\"What's up?\" Tracey asks in your ear.\n\t\t\t*goto disguise\n\t\t*else\n\n\t\t\t\"No, I'm not here for the food. I just want to talk to someone in charge.\"\n\n\t\t\tThey shrug. \"Gotta wait in line,\" they say.\n\n\t\t\tYou try to grab someone else's attention, when you notice a commotion at the front of the line. A woman in a clean gray jumpsuit is pushing through the crowd, heading for you.\n\t\t\t*goto noticed\n\t#See if there's another way in.\n\t\tYou walk away from the line, looking to find another way inside. There should be a delivery dock, or a door for volunteers and employees. You decide to follow the road as it curves around to the left.\n\n\t\t*if investigation >= 60\n\t\t\tAs you turn the corner of the building, you notice someone moving. You catch a glimpse of a gray jumpsuit before you duck back out of sight.\n\n\t\t\tYou can't sneak around in the open like this. Between the ragged clothes of the homeless and what looks like some kind of gray uniform, your street clothes make you stand out far too much. You need to find a way to blend in. You push off from the wall and walk away from the building.\n\n\t\t\t\"Where are you going, boss?\" Tracey asks in your ear.\n\t\t\t*goto disguise\n\t\t*else\n\t\t\tAs you turn the corner of the building, you see a woman coming out of a side door. She's wearing a clean gray jumpsuit. You're out in the open, with no place to hide. As you turn to leave, she notices you and starts walking in your direction.\n\t\t\t*goto noticed\n\t#Carefully examine the area.\n\t\tYou decide to get a sense of the area, in order to plan out some good footage and see if you can learn anything. You climb up onto one of the abandoned cars to get a better vantage point.\n\n\t\tThe shelter was probably a pre-Merger office building of some kind. From where you're standing, you can just see how the road curves around the left side, possibly into an enclosed parking lot. You can't see into any of the windows, but you can make out some kind of movement near the rooftop. It may be spotters making sure no one suspicious causes problems.\n\t\t*if technique >= 60\n\n\t\t\tSomeone like you. Your clothes aren't gray and bland enough to blend in with the people around here.\n\n\t\t\tYou carefully step down off the car and walk away from the shelter, between two houses.\n\n\t\t\t\"Hey, where are you headed?\" Tracey asks in your ear.\n\t\t\t*goto disguise\n\t\t*else\n\n\t\t\tAs you're looking, you notice someone coming toward you. It's a woman wearing a clean gray jumpsuit. You scramble down off the car to see what she wants.\n\t\t\t*goto noticed\n\n*label disguise\n\n\"I'm too well-dressed for this party,\" you say quietly as you keep walking. \"I need some kind of disguise.\"\n\n\"Now we're talking,\" Tracey says. \"Some proper investigative journalism.\"\n\n\"Less enthusiasm, and more finding me a way inside,\" you grumble.\n\nYou hear tapping through the earpiece. \"There's a clothing donation bin about a block away from you.\" $!{the} gives you directions, and within minutes you see it—a battered metal box painted green and covered with a broken plastic flap, with the words \"Charity Clothing Donation\" painted on the front. You lift the flap, and find a smelly old coat that fits you, along with a hat and some mismatched gloves. You notice your reflection in a nearby window.\n\n\"You look appropriately desperate,\" Tracey says. \"What's the plan?\"\n\n*choice\n\t#\"Convince someone waiting in line to talk to me.\"\n\t\t*set disguised true\n\t\t*goto talk_to_homeless\n\t#\"Try to find a back way in.\"\n\t\t*set disguised true\n\t\t*goto back_door\n\t#\"Walk right through the front door.\"\n\t\t*set disguised true\n\t\t*goto front_door\n\n*label noticed\nShe stops in front of you. \"I think you need to leave, ${psir}.\"\n\n\"Actually, I'm a—\"\n\nThe woman raises a hand and cuts you off. \"You are trespassing on private property, and you need to leave.\"\n\n*fake_choice\n\t#\"What if I'm in need of help?\"\n\t\tShe looks you up and down. \"Then sell some of your nice clothes and fancy gadgets.\"\n\n\t\t\"Sounds like a good career move, boss,\" Tracey mutters in your ear.\n\n\t\t\"Okay, fine, you've got me,\" you say. \"I just want to ask some questions, that's all.\"\n\t#\"I'm a licensed reporter.\"\n\t\tShe doesn't even look at your press pass. \"We don't want anything to do with whatever story you're selling.\"\n\n\t\t\"If you don't want anything recorded, I understand,\" you say. \"I just want to ask a few questions, that's all.\"\n\t#\"Why are you so eager to get rid of me? Isn't this just a homeless shelter?\"\n\t\t\"It is. It's also a homeless shelter that's privately owned, and we don't want people gawking.\"\n\n\t\t\"I'm not here to watch these unfortunate people,\" you say. \"I just want to ask a few questions, and then I'll be on my way.\"\n*comment endif\n\nThe woman frowns, and reaches into her pocket, pulling out a small pistol. \"I don't have time for questions. Get inside—you're going to see the director.\"\n\nYou look down at the pistol. It's a type commonly called a \"stunner\" or \"zapper\"—the kind of off-the-rack nonlethal ordnance that was legalized last decade in the name of personal protection. They're inexpensive enough that even a charity operation like this can arm a small security crew. It won't kill you, but it'll hurt like hell, and the batteries for a cheap model like this will last for a few dozen shots before it needs to be recharged.\n\nBesides, you wanted to get inside. Being captured is as good a way as any. You raise your hands in surrender and walk to the front door.\n*page_break\n*goto front_door\n\n*label front_door\n*if visited_director = true\n\tYou're marched back through the graffiti-covered cafeteria, straight to the director's office door.\n\n\t*goto have_a_seat\n*if visited_director = false\n\t*set inside_st_elizabeth true\n\t*achieve ach_inside_job\n\n\tThe walls are covered in ancient graffiti—turf marks for gangs that haven't existed in decades. The ancient linoleum on the floor is split and peeling, revealing a concrete floor with spiderwebs of cracks. In the corners are old CCTV cameras in metal and Plexiglass cages. Their lights wink at you as they jerk back and forth, surveying the area.\n\n\tMore people inside shuffle down a short corridor and into a large cafeteria, filled with mismatched tables and chairs. Along one wall is an ancient kitchen, serving cheap food on cracked plastic trays. There's another hallway with a sign that simply says \"Rooms—Private, Keep Out\" and a door to the right that is labeled \"Director.\"\n\n\t*if investigation >= 60\n\t\tYou also notice a small red cross under the sign that says \"Rooms\"—the same kind of cross you'd see in a hospital.\n\t*comment endif\n\n\t*if disguised\n\t\t*choice\n\t\t\t#Talk to some of the people in the cafeteria.\n\t\t\t\t*goto talk_to_homeless\n\t\t\t#Follow the sign to the private rooms.\n\t\t\t\t*goto dorm\n\t\t\t#Enter the door labeled \"Director.\"\n\t\t\t\tYou examine the door. It's a simple wooden door with a knob—no security system, no sensor array, not even a lock with a key. Checking to make sure no one is watching, you open it and slip inside, carefully closing the door behind you.\n\n\t\t\t\tThe room is dark, so you switch your opticOS to night-vision mode. You see a room with a battered metal desk and matching metal filing cabinets, an old office chair repaired with lots of duct tape, and an ancient computer with a keyboard and flat-screen monitor. Lying next to the desk is a sleeping bag, with a figure stirring inside. They sit up and fumble for a switch on the wall next to them. You manage to switch your opticOS back to normal mode before the lights blind you.\n\n\t\t\t\t\"Who's there?\" you hear as the lights snap on. The person standing up has short red hair, blue eyes, and a weary face that implies a stressful middle age. They are wearing a dark T-shirt and gray flannel bottoms.\n\n\t\t\t\t\"Sorry, wrong room,\" you mutter, and start to walk out. \n\n\t\t\t\tThe person takes a quick step up to you and puts a hand on your shoulder.\n\n\t\t\t\t\"I don't think so,\" they say. \"Let's have a talk.\"\n\t\t\t\t*page_break\n\t\t\t\t*goto talk_to_director\n\n\t*else\n\t\tEveryone turns to stare at you as the guard marches you right to the door marked \"Director.\" It's a simple wooden door with a knob, which she tells you to open.\n\n\t\t*page_break\n\t\tThe room is dark when you walk in, but within a moment the lights come up as the guard clicks a switch by the door frame. The room has a battered metal desk with matching metal filing cabinets, an old office chair repaired with lots of duct tape, and an ancient computer with a keyboard and flat-screen monitor. Lying next to the desk is a sleeping bag, with a figure stirring inside. They sit up. \"Who's there?\" they ask. The person standing up has short red hair, blue eyes, and a weary face that implies a stressful middle age. They are wearing a dark T-shirt and gray flannel bottoms.\n\n\t\t\"Found this person sneaking around, comrade,\" the guard says.\n\n\t\tThe groggy figure walks over and puts a hand on your shoulder. \"Very well. Let's have a talk, you and I.\" They nod to the guard, who walks out the door and closes it behind you.\n\t\t*page_break\n\t\t*goto talk_to_director\n\n*label talk_to_homeless\nYou walk up to one of the homeless people patiently waiting for food. She's shivering in a threadbare coat and barely looks at you.\n\n\"Hey there,\" you say. \"I haven't been here before. What's the procedure?\"\n\nThe woman looks at you, as if noticing you for the first time. Then she shrugs. \"Go in, get food. Sometimes there's a free bed available. Food's terrible, but it's better than the alternative.\"\n\n\"How often are beds available?\"\n\n\"Depends on how sick people get. The worst ones get taken to the hospital.\"\n\n\"Which hospital?\"\n\nShe looks at you again. \"Are you trying to get me in trouble?\"\n\n\"No, not at all. I'm just…\"\n\nSuddenly she screams at the top of her lungs. \n\n*page_break\nEveryone stares at you, and the woman in the gray jumpsuit runs over to you. The homeless woman starts pointing at you. \"This person's asking questions! You said we get extra food if we point out people asking questions, and this one is asking questions!\"\n\nThe guard reaches into her pocket, pulling out a small pistol. \"I don't have time for troublemakers like you. You're going to see the director.\" Behind her the woman keeps asking when she'll get her extra food.\n\nYou look down at the pistol. It's a type commonly called a \"stunner\" or \"zapper\"—the kind of off-the-rack nonlethal ordnance that was legalized last decade in the name of personal protection. They're inexpensive enough that even a charity operation like this can arm a small security crew. It won't kill you, but it'll hurt like hell, and the batteries for a cheap model like this will last for a few dozen shots before it needs to be recharged.\n\nYou raise your hands in surrender.\n*page_break\n\n*if inside_st_elizabeth\n\tEveryone turns to stare at you as the guard marches you through the crowd and to the door marked \"Director.\" It's a simple wooden door with a knob, which she tells you to open.\n\n\tThe room is dark when you walk in, but within a moment the lights come up as the guard clicks a switch by the door frame. The room has a battered metal desk with matching metal filing cabinets, an old office chair repaired with lots of duct tape, and an ancient computer with a keyboard and flat-screen monitor. Lying next to the desk is a sleeping bag, with a figure stirring inside. They sit up. \"Who's there?\" they ask. The person standing up has short red hair, blue eyes, and a weary face that implies a stressful middle age. They are wearing a dark T-shirt and gray flannel bottoms.\n\n\t\"Found this person asking questions, comrade,\" the guard says.\n\n\tThe sleeping figure walks over and puts a hand on your shoulder. \"Very well. Let's have a talk.\" They nod to the guard, who walks out the door and closes it behind you.\n\t*set disguised false\n\t*page_break\n\t*goto talk_to_director\n*else\n\t*set disguised false\n\t*goto front_door\n\n*label back_door\nYou go to the end of the line outside. After a few moments of looking around to make sure there are no guards, you keep your head down and wander away. You follow the road as it curves around the building and into a fenced-in parking lot. The gate is open, so you walk in, trying to look as much as possible like a confused homeless person.\n\nThe parking lot contains two gray vans, each with the words \"St. Elizabeth\" painted on the side, but there are no other vehicles that you can see. Across the parking lot there's a short staircase leading to a concrete platform, which sits next to a heavy steel delivery door. Next to the door is a man in a gray jumpsuit, holding a pistol. From here, you can see that it's a cheap one—the type commonly called a \"stunner\" or \"zapper.\" It's the kind of off-the-rack nonlethal ordnance that was legalized last decade in the name of personal protection. They're inexpensive enough that even a charity operation like this can arm a small security crew. It won't kill you, but it'll hurt like hell, and the batteries for a cheap model like this will last for a few dozen shots before it needs to be recharged.\n\nThe guard is looking at you with a suspicious glare.\n\n*label bypass_guard\n*choice\n\t*disable_reuse #Try to convince the guard that I'm supposed to go inside.\n\t\t*if charm >= 60\n\t\t\t\"Hey, could you open the door for me? Won't be a moment.\" You start to walk to the door.\n\n\t\t\tThe guard steps in front of you. \"Hold it. Handouts are given out in front.\"\n\n\t\t\tYou shake your head. \"I'm not here for the handouts. The people in front asked me to come back here real quick and grab some supplies to help with the food distribution. Guess the supplies are running low. Don't worry—I'll be quick.\"\n\n\t\t\tA moment passes as the guard looks you over. You start to bounce up and down, as if from the cold. \"Look, it's freezing out here. The longer you keep me here, the longer everyone else stays out here. You want to keep those folks in the cold because you can't be bothered to open a door for me?\"\n\n\t\t\tAnother long moment, and then the guard opens the door and steps aside. \"Fine, but be quick, and don't go snooping around.\"\n\n\t\t\t\"No problem. Thanks!\" You quickly step inside before the guard can change his mind.\n\n\t\t\t*page_break\n\t\t\tInside, the walls are covered in ancient graffiti—turf marks for gangs that haven't existed in decades. The ancient linoleum on the floor is split and peeling, revealing a concrete floor with spider webs of cracks. In the corners are old CCTV cameras in metal and Plexiglass cages. Their lights wink at you as they jerk back and forth, surveying the area.\n\n\t\t\tAs you step inside, you see another hand-painted sign that says \"Rooms—Private\" pointing to the right. Underneath it is a smaller sign that is simply a red cross, pointing to the left.\n\t\t\t*choice\n\t\t\t\t#Head to the rooms.\n\t\t\t\t\t*goto dorm\n\t\t\t\t#Follow the sign of the red cross.\n\t\t\t\t\tYou follow the signs and eventually reach a pair of old rubber doors, like those from meatpacking plants. The sign above the doors says \"Hospital.\" Checking to make sure no one is looking, you push them open and walk through.\n\t\t\t\t\t*goto hospital\n\t\t*else\n\t\t\t\"Hey, could you open the door for me? Won't be a moment.\" You start to walk to the door.\n\n\t\t\tThe guard steps in front of you. \"Hold it. Handouts are given out in front.\"\n\n\t\t\t\"But I just need to…\"\n\n\t\t\tHe puts a hand on his stunner. \"In front. Now.\"\n\n\t\t\tClearly that's not going to work. You consider another plan.\n\t\t\t*goto bypass_guard\n\t#Attack the guard.\n\t\tIn desperation, you punch the guard in the jaw. Surprised, he sinks to the ground, dropping the stunner. You pick it up and shoot him with it. The combination of the punch and the intense pain is too much for him, and he falls unconscious.\n\n\t\t\"Stealing a weapon and shooting an unarmed man while breaking and entering. You're building quite the criminal record, boss,\" Tracey says.\n\n\t\t\"At least I'm inside,\" you say. Tracey doesn't respond to that.\n\n\t\tThe interior walls are covered in ancient graffiti—turf marks for gangs that haven't existed in decades. The ancient linoleum on the floor is split and peeling, revealing a concrete floor with spiderwebs of cracks. In the corners are old CCTV cameras in metal and Plexiglass cages. Their lights wink at you as they jerk back and forth, surveying the area.\n\n\t\tAs you step inside, you see another hand-painted sign that says \"Rooms—Private\" pointing to the right. Underneath of it is a smaller sign that is simply a red cross, pointing to the left.\n\t\t*set infractions +1\n\t\t*set have_pistol true\n\t\t*choice\n\t\t\t#Head to the rooms.\n\t\t\t\t*goto dorm\n\t\t\t#Follow the sign of the red cross.\n\t\t\t\tYou follow the signs, and eventually reach a pair of old rubber doors, like those from old meat packing plants. The sign above the doors says \"Hospital.\" Checking to make sure no one is looking, you push them open and walk through.\n\t\t\t\t*goto hospital\n\t#Turn around and leave.\n\t\t\"Sorry, wrong door,\" you mumble, and turn around to leave.\n\n\t\t\"Hold it!\" you hear behind you. You turn back around, and the guard has pulled his stunner out. \"You shouldn't be back here.\"\n\n\t\t\"Just got lost. No worries.\"\n\n\t\tThe guard looks unconvinced. \"I think you need to go see the director.\"\n\n\t\t\"No, that's okay,\" you say, trying to take a step backwards. \"I'll just go. No need to bother the director.\"\n\n\t\t\"You don't have a choice. Move!\"\n\n\t\tYou raise your hands in surrender, and a second, female guard steps forward with her own stunner in hand. She takes you and marches you back around to the front door.\n\n\t\t\"Well, you wanted to get inside anyhow,\" Tracey muses in your ear.\n\t\t*set disguised false\n\t\t*page_break\n\t\t*goto front_door\n\n*label talk_to_director\nThe person—presumably the director—guides you to the chair behind the desk. \"I didn't realize it was this late,\" they say. \"Haven't had a good night's sleep in days. Still, I'm awake enough to see if we can sort out what you're doing here.\"\n\n*if disguised = true\n\t\"Look, I'm just here for some food,\" you say.\n\n\t\"I think we're past that now,\" the director says, as they sit on the edge of the desk, watching you. \"It's your eyes, you see. No one as desperate as you're trying to look could afford eyes like those.\"\n\n\tTracey gives a low whistle in your ear. \"They noticed that in a split second, and from a fair distance away. I didn't even notice your eyes at first.\"\n\n\tThat's a good point. Your implants aren't exactly common knowledge, and they aren't that obvious from a casual look. Yet this person was able to spot them immediately.\n\n\tYou take off the hat and gloves. \"Guess there's no point in hiding,\" you say.\n\n\t\"Exactly my thought,\" they say, smiling at you.\n\t*set disguised false\n\t*goto have_a_seat\n*else\n\t\"I'm just here to ask some questions,\" you say.\n\n\t\"You're rather expensively equipped for a story in this part of town,\" the director says, as they sit on the edge of the desk, watching you. \"It's your eyes, you see. A very costly procedure, and not easily undertaken by people who are simply curious.\"\n\n\tTracey gives a low whistle in your ear. \"They noticed that in a split second, and from a fair distance away. I didn't even notice your eyes at first.\"\n\n\tThat's a good point. Your implants aren't exactly common knowledge, and they aren't that obvious from a casual look. Yet this person was able to spot them immediately.\n\n\tYou shrug. \"Okay. I'm willing to put my cards on the table if you are,\" you say.\n\n\t\"A good start,\" they say, smiling at you.\n\t*goto have_a_seat\n\n*label have_a_seat\n*page_break\n*if visited_director = true\n\n\tDirector Parker dismisses the guard and looks you over again. \"So here you are again. It seems you're not going to simply leave, so maybe we can try to have our talk again. I still don't give my consent to have the discussion recorded, though. Perhaps this time you will make a better decision.\"\n*if visited_director = false\n\n\t\"I'm ${pl_fullname}, and I'm a reporter.\" You carefully leave off what network you're reporting for—no need to give too much information away just yet. \"What should I call you?\"\n\n\tThe director smiles. \"My name is Jamie Parker. I run this shelter. And before you ask, my gender is not your business.\"\n\n\tYou shake your head. \"I wasn't going to ask.\"\n\n\t\"I'm glad. Forgive my bluntness, but it's a tiresome issue I'm forced to constantly address, particularly as many of the people here don't have access to netglasses to access pronoun preferences.\" They move their hands, as if to encompass the room. \"Of course, neither do I. Money is too tight for such luxuries.\"\n\n\t*page_break\n\t\"I'm more interested in why your organization picked up the corpse of a young woman recently.\"\n\n\tDirector Parker sighs. \"That is a private matter. Before we go any further, I should let you know that I do not give my consent to have this discussion recorded, nor to allow my name or face to appear in any future stories you or your network might do. Just so we're clear.\"\n\n\tDamn it. Not only do they know about your eyes, but they know their privacy law as well. If you turn on your opticOS, they'll know you're recording—sure, you could say you won't broadcast the footage (since your license allows for a certain amount of \"personal use\" material), but it might cause them to stay quiet. And this person is somehow involved with taking Tasha's corpse from the scene of her murder, so you need to get something. On the other hand, a show of trust might get you some good information—especially if this goes higher than a shady homeless shelter. Finally, you remember something from your opticOS training after the surgery: it's possible to record discreetly. The footage will be grainy, probably not even broadcast quality, but at least it would be something.\n\n\tThe director looks at you, waiting to see what you have to say.\n*comment endif\n\n*choice\n\t#Say I won't record anything, but use my skill to record discreetly.\n\t\t*if technique >= 60\n\t\t\t\"Of course I won't record our discussion,\" you say, as you carefully set your opticOS settings to discreet operation. The flashing square in your peripheral vision lets you know that it's working, and you mentally adjust a couple of settings to try and get the best quality picture you can in the circumstances. Luckily you're in a private, well-lit room, which helps. The footage won't be great, but at least the audience will be able to see what's going on.\n\t\t\t*set infractions +1\n\t\t\t*set case2_marketShare +10\n\t\t\t*goto confession\n\t\t*else\n\t\t\t\"Of course I won't record our discussion,\" you say, as you go to set your opticOS settings to discreet operation. However, you can't find the right menu, and accidentally trigger normal operation. The flashing square in your peripheral vision tells you that you're recording, and the change in Director Parker's face tells you they know you're recording as well.\n\n\t\t\t\"It's a shame we couldn't come to some kind of arrangement,\" they say, pulling a stunner out of a desk drawer. They point it at you while they call for the guard, who immediately opens the door. \"Take ${phim} out back and leave ${phim} with the others,\" they say.\n\n\t\t\t\"Trying to get backup to your location,\" Tracey says. You follow the guard's instructions as she leads you to the hallway marked \"Rooms,\" and you pass a number of doors as you walk through a series of identical hallways. Finally, you reach a pair of old rubber doors, like those from an meatpacking plant. The sign above the doors says \"Hospital.\" The guard shoves you through.\n\t\t\t*set captured true\n\t\t\t*set visited_director true\n\t\t\t*goto hospital\n\t#Openly record the conversation, but lie and say I won't use it in my story.\n\t\t*if charm >= 60\n\t\t\t\"I'll make you a deal,\" you say carefully as you start recording. \"You seem to know a lot about how this works. I need to record footage for my notes—something I can show my director. But it won't be used in the story, and your name won't come up. You can still refuse to talk, but I think you have something you want to get off your chest.\"\n\n\t\t\tDirector Parker watches you for a long moment. You stare back, watching their movements. Finally, they sigh. \"Fine. As long as you're only recording this for your personal use, I guess it's okay.\"\n\t\t\t*set infractions +1\n\t\t\t*set case2_marketShare +10\n\t\t\t*goto confession\n\t\t*else\n\t\t\t\"I'll make you a deal,\" you say carefully as you start recording. \"I'll go ahead and record this, and you—\"\n\n\t\t\t\"It's clear that we won't be able to come to an arrangement,\" they say, pulling a stunner out of a desk drawer. They point it at you while they call for the guard, who immediately opens the door. \"Take ${phim} out back and leave ${phim} with the others,\" they say.\n\n\t\t\t\"Trying to get backup to your location,\" Tracey says. You follow the guard's instructions, and she leads you to the hallway marked \"Rooms.\" You pass a number of doors as you walk through a series of identical hallways. Finally, you reach a pair of old rubber doors, like those from an meatpacking plant. The sign above the doors says \"Hospital.\" The guard shoves you through.\n\t\t\t*set captured true\n\t\t\t*set visited_director true\n\t\t\t*goto hospital\n\t#Agree not to record anything, as a show of trust to get more information.\n\t\t*if investigation >= 60\n\t\t\tYou spread your hands wide. \"Fine. No recording. You have my word. I just want to talk.\"\n\n\t\t\tDirector Parker watches you for a long moment. \"You're unusual for your breed. Most reporters aren't so—\"\n\n\t\t\t\"Gullible?\" Tracey says in your ear.\n\n\t\t\t\"I only care about one thing,\" you say, before Parker can finish and to distract yourself from Tracey's sarcasm.\n\t\t\t*if factual >= 60\n\t\t\t\t\"The truth.\"\n\t\t\t*if factual \u003c= 40\n\t\t\t\t\"The story.\"\n\t\t\t*if (factual > 40) and (factual \u003c 60)\n\t\t\t\t\"Getting to the bottom of this.\"\n\t\t\t*comment endif\n\n\t\t\tParker nods. \"Okay. Then let's talk.\"\n\t\t\t*set celebrity +10\n\t\t\t*goto confession\n\t\t*else\n\t\t\tYou spread your hands wide. \"Fine. No recording. Whatever you want.\"\n\n\t\t\tDirector Parker watches you for a long moment, before pulling a stunner out of a desk drawer. \"Good. That makes this easier.\" They point the stunner at you while they call out for the guard, who immediately opens the door. \"Take ${phim} out back and leave ${phim} with the others,\" they say.\n\n\t\t\t\"Trying to get backup to your location,\" Tracey says. You follow the guard's instructions, and she leads you to the hallway marked \"Rooms.\" You pass a number of doors as you walk through a series of identical hallways. Finally, you reach a pair of old rubber doors, like those that used to be in meatpacking plants. The sign above the doors says \"Hospital.\" The guard shoves you through.\n\t\t\t*set captured true\n\t\t\t*set visited_director true\n\t\t\t*goto hospital\n\n*label confession\n\nParker slides off the desk and walks over to one of the filing cabinets. Opening it, they pull out an old manila file filled with paper and drop it on the desk. The file is labeled simply \"Admissions.\" You flip it open. \"Very retro,\" you say, as you look through the pages.\n\n\"Expensive, but secure,\" Parker says. \"No netglasses. Outdated computers for minimal security and online access. It allows us to run our operation in secret.\"\n\nThe pages you're glancing over look like medical records. Everything from broken bones to long-term illnesses, with the occasional gunshot wound and stabbing thrown in. Looking at the dates, it seems all of the cases in this file are within the past month.\n\nYou close the file. \"You're running a hospital.\"\n\n\"That word implies measures of logistics and legality that we don't possess. It's an extension of our work here at the shelter.\"\n\n*choice\n\t#\"An illegal extension. And you know that.\"\n\t\t\"Of course,\" they say. \n\t\t*set factual %+10\n\t\t*goto confession_2\n\t#\"Isn't running a shelter enough?\"\n\t\t\"Not nearly enough,\" they say. \n\t\t*set factual %-10\n\t\t*goto confession_2\n\t#\"Sounds like a noble cause.\"\n\t\t\"I like to think so,\" they say. \n\t\t*set ambition %-10\n\t\t*goto confession_2\n\n*label confession_2\n\"We give medical attention to the uninsured and the uninsurable. Those that haven't committed any crime other than being sick and poor. Don't they also deserve medical care?\" Parker slams the filing cabinet shut. \"We do what we can without licenses, without sanction, to see that these poor souls get some kind of attention.\"\n\n\"But not without money,\" you counter. \"You said it yourself—this paper alone is expensive, but nothing else around here looks like you're spending money on it. And you're familiar with expensive surgical operations like mine.\"\n\nParker walks over to their sleeping bag and sits down on it, putting their head in their hands. \"The amount of money we get in charity donations is barely enough to cover the food we give out. So we've had to offer our medical services to those that desire discreet assistance. For a price.\"\n\n*choice\n\t#\"You're talking about criminals.\"\n\t\t\"I'm talking about any who don't wish to be part of the system,\" they say. \"And who are willing to pay.\" \n\t\t*set factual %-10\n\t\t*goto confession_3\n\t#\"So, not as charitable as you pretend to be.\"\n\t\t\"How is it different from any other donation?\" they ask. \"No matter where it comes from, money is money.\" \n\t\t*set ambition %+10\n\t\t*goto confession_3\n\t#\"What kind of services?\"\n\t\t\"Most times, simple surgical procedures, such as bullet and knife wounds.\" \n\t\t*set factual %+10\n\t\t*goto confession_3\n\n*label confession_3\nParker shrugs. \"Sometimes they ask for extravagant options, such as cosmetic surgery and implants, which brings in a little more money. After materials and expenses are covered, we aren't left with much, but it helps.\"\n\n\"But that doesn't explain Tasha Kovac. Why would you bring a corpse here?\"\n\nDirector Parker looks tired when they look up at you. \"I don't know their names when they come in. As I said, we don't have the logistics of a licensed hospital. That includes organ donors. If one of our patients needs a heart transplant, and we find a forgettable corpse with a healthy intact heart, what's the harm?\"\n\n\"That woman had a family. Friends. A life.\"\n\n\"So do these people!\" They slam their fist on the concrete floor. \"Don't they deserve a chance at life as well, a life they won't squander on violence and abuse?\"\n\nYou don't have an answer for that.\n\n*page_break\n\"As fascinating as this moral debate is, boss,\" Tracey says in your ear, \"why don't they just…I don't know, dig up bodies or something?\"\n\n\"Okay,\" you say to the director. \"You pick up corpses for their organs. Why not get the corpses after they're buried, or try to get organs through more legitimate channels?\"\n\nParker stands up and opens another filing cabinet drawer and pulls out a bottle of cheap, fabricated whiskey. Unscrewing the top, the director takes a drink from it before setting it on the desk. \"That can take weeks, or even months, and many of our patients can't wait that long. Plus, the doctors tell me that fresher is better. You never know when you'll need something.\"\n\nSuddenly, it all clicks into place.\n\n*page_break Someone told Parker where to find the body.\n\"Someone involved in the investigation told you where to find the body,\" you say, sounding out the thoughts spinning in your head. \"So you took it and brought it back here. Anything you can't use you hold on to, but you can't keep it for long.\" Director Parker starts to look pale as you continue. \"You said yourself that offering medical services to criminals isn't much money. So you ask them for information, find out where they've seen people die.\"\n\n\"Or the people they kill themselves,\" Tracey says, quietly. \"Some homeless folks get new organs, and the killers get a clean crime scene.\"\n\n\"So you sell the organs you don't use,\" you continue. \"That's how you make your money.\"\n\nParker takes another drink, and nods.\n\n*page_break\n\"Who do you sell them to?\" you ask.\n\n\"A man. I don't know his name. It works out best for both of us that way.\"\n\n\"What does he look like?\"\n\n\"Dark hair, dark netglasses, wears a suit. Tanned, a bit on the heavy side.\"\n\n\"Do you have a picture of him?\"\n\nParker shakes their head.\n\nYou stand up from the chair. \"So why are you telling me now? Aren't you worried I'll share this story with the world?\"\n\nParker puts the bottle down and leans against the wall. \"Maybe a part of me wants you to. Maybe if people knew how bad things were out here, how desperate we have to be, something would be done.\" They motion to the room around them. \"It's not as if I'm selling organs to make my life better. I sleep in my office and wear whatever old clothes I can find that fit me. Every credit I get goes into the people that come here, and there's more and more of them every day. Yes, I'm a criminal, but the crimes that society has perpetrated on these people are far, far worse.\" The director takes the chair from you and sits down in it. \"Get out, before I change my mind.\"\n\nYou don't have anything to say to that, so you open the door and walk out. Time to leave.\n*set deduction_bodySold true\n*goto cab_ride2\n\n*label dorm\n*set inside_st_elizabeth true\n*achieve ach_inside_job\nYou walk through a series of twisty hallways, with doors on either side. Each of them is cheap and wooden, with a simple knob. As you pass a few open doors, you see that the rooms inside hold a simple cot, an industrial metal toilet, and a standing chemical shower, along with a metal cabinet containing a couple of drawers. These must be where the homeless sleep for the night—probably grabbing any room they can.\n\nAs you wander around, you see a couple of signs pointing you back to the cafeteria, and from there to the director's office. You also see a number of smaller signs that are simply a red cross.\n\n*choice\n\t#Follow the signs with the red cross.\n\t\tYou follow the signs and eventually reach a pair of old rubber doors, like those from a meatpacking plant. The sign above the doors says \"Hospital.\" Checking to make sure no one is looking, you push them open and walk through.\n\t\t*goto hospital\n\t#Go to the director's office.\n\t\tYou head through the cafeteria, now packed with people quietly eating their food on cracked plastic trays. The door marked \"Director\" is wooden with a simple knob—no security system, no sensor array, not even a lock with a key. Checking to make sure no one is watching, you open it and slip inside, carefully closing the door behind you.\n\n\t\tThe room is dark, so you switch your opticOS to night-vision mode. You see a room with a battered metal desk and matching metal filing cabinets, an old office chair repaired with lots of duct tape, and an ancient computer with a keyboard and flat-screen monitor. Lying next to the desk is a sleeping bag, with a figure stirring inside. They sit up, and fumble for a switch on the wall next to them. You manage to switch your opticOS back to normal mode before the lights blind you.\n\n\t\t\"Who's there?\" you hear as the lights snap on. The person standing up has short red hair, blue eyes, and a weary face that implies a stressful middle age. They are wearing a dark T-shirt and gray flannel bottoms.\n\n\t\t\"Sorry, wrong room,\" you mutter, and start to walk out. \n\n\t\tThe person takes a quick step up to you and puts a hand on your shoulder.\n\n\t\t\"I don't think so,\" they say. \"Let's have a talk.\"\n\t\t*page_break\n\t\t*goto talk_to_director\n\n*label hospital\n*set inside_st_elizabeth true\n*achieve ach_inside_job\n*if visited_hospital\n\tThe doors swing closed behind you, as you stand in the hospital again. The guard leads you to a cot and forces you to lie down, as a man wearing a white coat walks over.\n\n\t\"This troublemaker needs to go away,\" the guard says, putting plastic binders on each of your wrists and the edges of the cot. \"Sedate ${phim} and use ${phim} as parts.\"\n\n\tThe man in the white coat looks nervous. \"I'm not sure that's wise…\"\n\n\t\"Just do it,\" the guard says, walking way.\n\n\tYou struggle against the binders as the man takes out a syringe and injects you with something. Your eyes start to blur, and the strength oozes out of your body. As you close you eyes, you can hear the man whispering to you.\n\n\t\"I'm so sorry.\"\n\t*page_break End\n\tWe hope you've enjoyed playing [i]Ratings War.[/i] Please play again! (There's more than half the story still to come.)\n\n\t*feedback\n\n\tWe release new games on a regular basis.\n\t*subscribe\n\t*page_break\n\n\tThanks for playing!\n\n\t*ending\n*else\n\t*set visited_hospital true\n\t*goto hospital_visit\n\n*label hospital_visit\n\nThe doors swing closed behind you, and you stand in a massive space. The area looks like it's either been converted from a warehouse or had all the walls knocked out to make one massive open room. The concrete and brick space is nearly as cold as it is outside, and you can see your breath.\n\nMost of the room is taken up with dozens and dozens of cots, full of people in various states of injury. Some look relatively healthy, attached to an IV drip or sleeping soundly under thin blankets. Others a
