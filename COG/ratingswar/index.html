<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ratings War — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "ratingswar", "title": "Ratings War", "scenes": {"choicescript_description": "Implant cameras in your eyes to win the news wars of 2061! Record your way through dystopian New Angeles, solving multiple murders and conquering the airwaves as you go!\n\n[i]Ratings War[/i] is a thrilling 80,000-word interactive novel by Eddy Webb, where your choices control the story. It's entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\nOutwit your rivals at the biggest news network in the industry to win market share and dominate the ratings. As one of the first reporters with a pair of cybernetic eyes, you’ll break stories while you live them—and become a celebrity when you uncover a vast criminal conspiracy.\n\nWhen you blow the whistle on a human trafficking operation, will you focus on facts or on fame? Will you strike out as an independent, or follow the guidelines of your network? You can escape from an underground organ farm—but can you get your footage on the air and win the Ratings War?\n", "choicescript_stats": "*temp early_title \"Unknown\"\n*if met_early = true\n\t*set early_title \"Relationship with Early\"\n\n*temp tracey_title \"Unknown\"\n*if met_tracey = true\n\t*set tracey_title \"Relationship with Tracey\"\n\n*temp market_share_titles \"No Viewers\"\n*if market_share \u003c 20\n\t*set market_share_titles \"Handful of Viewers\"\n*if (market_share >= 20) and (market_share \u003c 40)\n\t*set market_share_titles \"A Small Following\"\n*if (market_share >= 40) and (market_share \u003c 60)\n\t*set market_share_titles \"Trending\"\n*if (market_share >= 60) and (market_share \u003c 80)\n\t*set market_share_titles \"Incredible Subscriber Numbers\"\n*if (market_share >= 80) and (market_share \u003c 100)\n\t*set market_share_titles \"Viral Sensation\"\n*if market_share >= 100\n\t*set market_share_titles \"Must-Watch Video\"\n\n*temp celebrity_titles \"Starting Reporter\"\n*if celebrity \u003c 20\n\t*set celebrity_titles \"Breaking into the Business\"\n*if (celebrity >= 20) and (celebrity \u003c 40)\n\t*set celebrity_titles \"Rising Star\"\n*if (celebrity >= 40) and (celebrity \u003c 60)\n\t*set celebrity_titles \"Minor Celebrity\"\n*if (celebrity >= 60) and (celebrity \u003c 80)\n\t*set celebrity_titles \"A-Lister\"\n*if (celebrity >= 80) and (celebrity \u003c 100)\n\t*set celebrity_titles \"Household Name\"\n*if celebrity >= 100\n\t*set celebrity_titles \"World-Renowned Reporter\"\n\n*temp infraction_titles \"No Record\"\n*if infractions = 1\n\t*set infraction_titles \"Rulebreaker\"\n*if infractions = 2\n\t*set infraction_titles \"Problematic\"\n*if infractions = 3\n\t*set infraction_titles \"Close To Being Fired\"\n*if infractions = 4\n\t*set infraction_titles \"Pending Termination\"\n\n*if pl_named\n\t*text_image name.png none\n\t*stat_chart\n\t\ttext pl_fullname Name\n\n*text_image qualities.png none\n*stat_chart\n\topposed_pair Factual\n\t\tFlamboyant\n\topposed_pair Ambition\n\t\tIntegrity\n\topposed_pair Independence\n\t\tSynergy\n\n*text_image skills.png none\n*stat_chart\n\tpercent Investigation\n\tpercent Charm\n\tpercent Technique\n\n*text_image relationships.png none\n*stat_chart\n\tpercent rel_early ${early_title}\n\tpercent\trel_tracey ${tracey_title}\n\n*text_image success.png none\n*stat_chart\n\ttext market_share Market Share Numbers\n\ttext market_share_titles Market Share\n\ttext celebrity Celebrity Numbers\n\ttext celebrity_titles Celebrity\n\ttext infractions Number of Infractions\n\ttext infraction_titles Infractions", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game, including the thrilling conclusion!\n\n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n", "confrontmaris": "*comment Chapter Ten and Endings\n*temp ran_story false\n*temp tracey_leaves false\n*advertisement\n\n*text_image chap10.png\n\n[i]February 11th, 2062. Later that morning.[/i]\n\nYou walked into Maris's office a few minutes ago, with Early arriving soon after. There was some shouting, but eventually you got the whole story out. Maris offered to pay Early twice his usual kill fee to drop the story, and with barely a moment's thought, he downloaded all his files into Hermana, Maris's artificial assistant. \n*if rel_early >= 30\n\tHe then gave you a wink, said \"I'll see you later, ${pl_fname},\" and walked out.\n*if (rel_early \u003c 30) and (rel_early > 20)\n\tHe then walked past you without saying anything, and left the office.\n*if rel_early \u003c= 20\n\tHe then sneered at you, said \"Nice knowing you, ${pl_fname},\" and walked out.\n*comment endif\n\nMaris now sits behind her desk. For a moment she doesn't look at you, as she brushes a hair from her face and touches the surface of her desk. A picture comes up of a man holding a newborn baby, a small smile on his face as he stares at the child. A candid moment of pure joy taken in a hospital.\n\n\"Why are you blocking me at every turn?\" you ask her. You don't raise your voice, but her face twists into a frown and she slaps the picture away.\n\n\"Because I need to do what's best for the company,\" she says, not looking at you.\n\n*choice\n\t#\"What's best for this company is the truth. And I've got the truth right here.\"\n\t\t\"What's best for this company is the truth. And I've got the truth right here.\"\n\t\t*set factual %+10\n\t\t*goto my_story\n\t#\"What's best for the company is a good story. And this is a good one.\"\n\t\t\"What's best for the company is a good story. And this is a good one.\"\n\t\t*set factual %-10\n\t\t*goto my_story\n\t#\"What's best for this company is me. And you know it.\"\n\t\t\"What's best for this company is me. And you know it.\"\n\t\t*set ambition %+10\n\t\t*goto my_story\n\n*label my_story\n\n\"There's a lot going on that you don't know,\" she says.\n\n\"I know a lot,\" you say. \n*if independence >= 65\n\t\"I know I've done more in the past few weeks than most of your reporters ever have. \n*if (independence \u003c 65) and (independence > 35)\n\t\"I know I've put myself on the line for you time and again. \n*if independence \u003c= 35\n\t\"I know I've done everything I can for this company, and for this team. \n*comment endif\nI went to the hospital for this story. \n*if angel_dead\n\tI lost a partner to this story. \n*if blackmailed_felix\n\tI blackmailed a cop for this story. \n*if told_katrina\n\tI was tortured for this story. \n*comment endif\nAnd every step of the way, no matter what I do, you've cut my material, threatened me with Infractions, and even paid off your own reporters.\" You lean over her desk, staring into her eyes. \"I have a right to know what's going on.\"\n*page_break\n*if infractions \u003c 4\n\t*goto maris_story\n*if infractions >= 4\n\t*goto fired\n\n*label fired\n\"No, you don't,\" she says. Tapping another section of the surface of her desk, you see a file with your face on it. There's an X over the picture. \"You've been running around without oversight and making headaches for this company for too long. I don't have a choice.\"\n\n\"What are you saying?\" You hear a soft beep in your pocket. Pulling out your press pass, you see that your credentials have been remotely wiped out.\n\n\"I'm sorry, ${pl_fname}, but you're fired. I've taken possession of all your material, and I've circulated your file to the other major news stations. The legal department will contact you with the details of your severance, but I suggest you get out of my office before I call security.\"\n\nYou sit down on the chair, stunned. You pushed your luck too much and too often. And now, just like that, it's all over. \n*if celebrity >= 50\n\tWithin moments, your opticOS shows a number of messages from other reporters, recruiters, and networks: job offers, requests for interviews, and expressions of interest from agents all over the world. Your career with INN is finished, but you have a number of other options ahead of you.\n*if (celebrity \u003c 50) and (celebrity > 25)\n\tIt takes a few weeks, but eventually you get a few positive messages from recruiters and other networks. The job offers aren't as lucrative as INN's was, but you manage to continue your career as a journalist. Regardless, your career at INN is over.\n*if celebrity \u003c= 25\n\tFor weeks you try to talk to other networks, but none of them return your calls. No matter who you talk to or what you say, you can't seem to get any work as a reporter. Not only is your career with INN finished, but you never work as a licensed journalist again.\n*goto ending\n\n*label maris_story\n\"You don't…\" Her voice trails off, and she looks away again. \"It's not you.\"\n\n\"It sure feels like it's about me,\" you say.\n\n\"I hired you and Early because you're good reporters. But I also hired you because of your investigations.\"\n\n\"What?\"\n\n\"You were both looking into things that tied to the Sloanes. I wanted to…keep tabs on that.\" She looks back at you. \"Because my original name was Sloane.\"\n\nYou sit down on the chair, stunned. \"You're in on it.\"\n\n*page_break\n\"No!\" Her voice is loud and clear, but she shakes her head and repeats herself in a softer, calmer tone. \"No, I'm not. My mother had me after she and Jaden separated. She died soon after I was born. I always…I suspected that Jaden Sloane was responsible for that.\"\n\nThe accident Jaden told you about, the one that set him on his insane quest to get transplant organs. You recall reading that Jaden had three children, but you never got all their names. \"He seemed sincerely remorseful,\" you say. \"Why do you—\"\n\nShe keeps talking, cutting you off. \"The courts ruled me an orphan before Jaden knew about me. He tried to hire lawyers to get custody of me, but a combination of bad luck and worse bureaucracy kept him from me until I was old enough to decide for myself.\" The words start to pour out of her now. \"By that time, I didn't want anything to do with him. Even as a girl I got a sense of what kind of man he was like, him and my brother and sister. I never asked them for anything, even though Jaden kept trying to send me gifts and pay for things. I returned the money or items whenever I could. I've always wanted to live on my own terms, and I did everything possible to stay away from Felix and Kat.\"\n\nShe plays with the ring on her finger as she continues. \"So as soon as I could, I changed my last name and moved out here. I did whatever I could to remove any information he could use to find me. That's part of the reason I got into news—the same skills used to hide a story can uncover one. Jaden came to NA years later, but I never knew if it was because he suspected I was living here, or if it was just a coincidence.\"\n\nMaris stares blankly at the desk, and her hand strokes its surface absently. \"I have a husband and a child now. I can't risk them getting wrapped up in the twisted legacy of the Sloane family. Which is why I need you to drop this story.\" Her eyes focus on the desk, and she taps a new area. A contract appears on the surface. \"I'm authorized to offer you a full employee contract. Right here. Right now. Your show will be given a full season run. All you have to do is hand over everything you have on the Sloanes and sign.\"\n\n\"Don't do it, boss.\"\n\n*page_break\nBoth of you turn as Tracey walks into the office. $!{the} stares at you with ${this} intense brown eyes. \"Don't do it,\" ${the} says again. \"It's not worth your soul.\"\n\nMaris starts to speak. \"You don't know…\"\n\n\"I heard plenty,\" Tracey says. \"You want to buy ${pl_fname} off so your family stays safe and secure.\" $!{the} turns to look at you. \"But this isn't about safety. This is about the truth. That's where your obligation lies as a reporter.\"\n\n\"INN will never run this story,\" Maris says, her voice growing cold. You remember Jaden saying something very similar to you.\n\n\"Then screw INN,\" Tracey says. \"Go back to your old network, ${pl_fname}. Run the story there. I have backups of all our files. You have enough talent to be a sensation.\" $!{the} turns to look at Maris. \"And if ${pl_fname} breaks the story now, it's harder for Jaden to touch anyone. It'll all be out in the open.\"\n\n\"You don't know that for sure,\" Maris says.\n\n\"Then stop pretending to care about the news,\" Tracey says. $!{the} turns back to you. \"If you don't want to put yourself on the line, you can always just give it to the police or something. Some other officer than Felix.\"\n\n\"None of which will help your career,\" Maris says. \"I can make you a star.\"\n\n*if rel_tracey >= 60\n\t\"You're a good reporter,\" Tracey says. \"I know you'll make the right call.\"\n*if (rel_tracey \u003c 60) and (rel_tracey > 30)\n\t\"It's your call,\" Tracey says. \"I hope you make the right one.\"\n*if rel_tracey \u003c= 30\n\t\"It's your call,\" Tracey says. \"Your track record hasn't been great, but I can't take this away from you.\"\n*comment endif\n\nMaris looks to you as well, waiting for your decision.\n\n*choice\n\t#Drop the story and stay with INN.\n\t\tYour goal was always to find the biggest platform and spread the news. You can't do that if you walk away from INN. People won't listen to you if they haven't heard of you. You have to stay.\n\n\t\t\"I'm here,\" you say.\n\n\t\tMaris nods.\n\n\t\t*set rel_tracey %-10\n\t\t*if rel_tracey > 60\n\t\t\tTracey nods. \"I'm with you too, boss. I don't like it, but I trust that you know what you're doing.\"\n\t\t\t*goto drop_endings\n\t\t*if (rel_tracey \u003c= 60) and (rel_tracey > 35)\n\t\t\tTracey sighs. \"I'm not sure this is a good idea, but I'll stick with INN.\"\n\t\t\t*goto drop_endings\n\t\t*else\n\t\t\tTracey laughs bitterly. \"Well, you two can do it without me. I quit.\" $!{the} storms out, slamming the office door behind ${thim}.\n\t\t\t*set tracey_leaves true\n\t\t\t*goto drop_endings\n\t#Quit INN and run the story on Vlog 23.\n\t\tThe goal was always to tell the story. Whether you focus on the facts or the drama, it was always about the news. If you can't put your stories out there, there's no point in any of this. You have to go.\n\n\t\t\"I'm done,\" you say, throwing your badge on her desk.\n\n\t\tMaris quietly takes your badge and nods.\n\n\t\t*set rel_tracey %+10\n\t\t*set ran_story true\n\t\t*set market_share + case4_marketShare\n\t\t*if rel_tracey > 60\n\t\t\tTracey smiles. \"I'm with you, boss. Screw this dump.\"\n\t\t\t*goto vlog23_endings\n\t\t*if (rel_tracey \u003c= 60) and (rel_tracey > 35)\n\t\t\tTracey sighs. \"Yeah, I wasn't having much luck here. I quit, too.\"\n\t\t\t*goto vlog23_endings\n\t\t*else\n\t\t\tTracey laughs bitterly. \"I quit, too. Both of you. I'm done with everyone here.\" $!{the} storms out, slamming the office door behind ${thim}.\n\t\t\t*set tracey_leaves true\n\t\t\t*goto vlog23_endings\n\t#Give the story to the police.\n\t\tThe goal was always to tell the truth. If you can't do it through INN, you have to give it to someone. You can't entirely trust the police, but you don't have any other real options. You decide to give it a try.\n\n\t\t\"I'll hand it over to the police,\" you say.\n\n\t\tMaris nods.\n\n\t\t*if rel_tracey > 60\n\t\t\tTracey nods. \"I'm with you too, boss. It's a tough decision, and I trust that you know what you're doing.\"\n\t\t\t*goto legal_endings\n\t\t*if (rel_tracey \u003c= 60) or (rel_tracey > 35)\n\t\t\tTracey sighs. \"I'm not sure this is a great idea, but if that's the way this is going, I'll play along.\"\n\t\t\t*goto legal_endings\n\t\t*else\n\t\t\tTracey laughs bitterly. \"Well, you two can do it without me. I quit.\" $!{the} storms out, slamming the office door behind ${thim}.\n\t\t\t*set tracey_leaves . His first act is to fire Tracey. Maris ends up in a terrible car accident a week after her dismissal and dies on the way to the hospital. The police quickly close the investigation.\n\n\t\t\tYour show is cancelled after three more episodes, and you're moved to an ensemble show with three other reporters. \n\n\t\t\t*set eflirt false\n\t\t\t*set tracey_leaves true\n\t\t\t*goto hospital_finale\n\n*label hospital_finale\n*page_break\n*if katrina_dead = true\n\tOne of Katrina's former accomplices tells the police that you killed Katrina, and Egwu eventually brings you in for questioning. \n*if katrina_dead = false\n\tKatrina, surprisingly, tries to sue you for assault, and Egwu eventually brings you in for questioning. \n*comment endif\nThe legal department steps in and gives you the best defense money can buy. Ultimately, you are found to have acted in self-defense, and the investigation is dropped.\n\nSt. Elizabeth's is shut down, and Director Parker is arrested. \n*if story_with_organ_sale = true\n\tParker is sentenced to several years in prison for conspiracy and organ trafficking. \n*if story_with_organ_sale = false\n\tParker is sentenced to a few years in prison for practicing medicine without a license. \n*comment endif\nWithin months, you hear rumors of a new illegal hospital. So the cycle continues.\n\n*if tracey_leaves\n\t*goto no_tracey_endings\n*else\n\t*goto tracey_endings\n\n*label tracey_endings\n*if tflirt = true\n\t*if rel_tracey >= 70\n\t\tYou and Tracey continue to work well together as a team, and ${the} soon moves in with you. The two of you end up being known as a news-industry power couple.\n\n\t\tOne night, you watch ${thim} tapping on ${this} tablet. $!{the} looks up at you and smiles. And you realize that, no matter what, everything you've been through was worth it.\n\n\t\t*set celebrity +20\n\t\t*goto early_yes_no\n\t*if (rel_tracey \u003c 70) and (rel_tracey >= 50)\n\t\tYou and Tracey continue to work well together as a team, and ${the} soon ether as a team. You each end up with amazing opportunities, and eventually you end up working on different shows. You spend one last night having drinks together and celebrating all the good work you've done.\n\n\t\t*set tracey_leaves true\n\t\t*goto early_yes_no\n\t*if (rel_tracey \u003c 50) and (rel_tracey >= 35)\n\t\tYou and Tracey continue to work as a team for a while. A few months later, you come into the office to find ${thim} gone. A geofenced note pops up on your opticOS display. \"It was a good run, boss, but it's time I move on.\" \n\n\t\t*set tracey_leaves true\n\t\t*goto early_yes_no\n\t*else\n\t\tA few days after things calm down, you come into the office to find ${thim} gone, and most of your files missing. A geofenced note pops up on your opticOS display. \"It was a good run, boss, but it's time you realize who the real talent of the team is.\" \n\n\t\tThe next day, you see that ${the} has sold all of your work to a rival network, edited to showcase every mistake and lapse in judgment you've made. But the plan backfires: after seeing the human side of you, the struggles you've gone through to bring the news to people, your fans love you more than ever. Your popularity increases.\n\n\t\t*set tracey_leaves true\n\t\t*set celebrity +20\n\t\t*goto early_yes_no\n\n*label no_tracey_endings\n*if tflirt = true\n\t*if rel_tracey >= 70\n\t\tTracey gets back in touch with you as soon as things calm down. You meet for dinner to talk things over, and discover that you're both still interested in each other outside of the news. $!{the} soon moves in with you, and your celebrity grows as a result.\n\n\t\tOne night, you watch ${thim} tapping on his tablet. $!{the} looks up at you and smiles. And you realize that, no matter what, everything you've been through was worth it.\n\n\t\t*set tracey_leaves false\n\t\t*set celebrity +20\n\t\t*goto early_yes_no\n\t*if (rel_tracey \u003c 70) and (rel_tracey >= 50)\n\t\tTracey gets back in touch with you as soon as things calm n\t*if (rel_tracey \u003c 70) and (rel_tracey >= 50)\n\t\tTracey gets back in touch with you as soon as things calm down. You meet for dinner to talk things over, and discover that you have a lot in common outside of the news. The two of you become friends, but over time you drift apart. Now, you occasionally send an email or catch up on social media, but you've both moved on.\n\n\t\t*set tracey_leaves true\n\t\t*goto early_yes_no\n\t*if (rel_tracey \u003c 50) and (rel_tracey >= 35)\n\t\tTracey gets back in touch with you as soon as things calm down. You meet for dinner to talk things over, but you discover that you don't have much in common outside of working on the news.\n\n\t\tYou never hear from Tracey again.\n\n\t\t*set tracey_leaves true\n\t\t*goto early_yes_no\n\t*else\n\t\tA few days after things calm down, you receive an email on your opticOS display from Tracey. \"It's time you realize who the real talent of the team was.\" \n\n\t\tThe next day, you see that ${the} has sold copies of your files to a rival network, edited to showcase every mistake and lapse in judgment you've made. But the plan backfires: after seeing the human side of you, the struggles you've gone through to bring the news to people, your fans love you more than ever. Your popularity increases.\n\n\t\tYou never hear from Tracey again.\n\n\t\t*set tracey_leaves true\n\t\t*set celebrity +20\n\t\t*goto early_yes_no\n\n*label early_yes_no\n*if eflirt\n\t*page_break\n\tOver a year after the Sloane case is over, you're surprised to get a call from Early.\n\n\t\"Hey, newbie. Now that things have settled down, let's have dinner sometime.\"\n\n\t*choice\n\t\t#Politely refuse.\n\t\t\t\"I appreciate you thinking of me, Early, but I think it's best if we just remain colleagues.\"\n\n\t\t\tThere's a long pause at the other end, and then you hear forced laughter. \"What? Of course. I was just going to give you a free meal, but if you're not interested, I have lots of other people to give it to.\" He hangs up, and you don't hear from him again.\n\n\t\t\t*set eflirt false\n\t\t\t*goto achievement_check\n\t\t#Laugh and hang up.\n\t\t\tYou laugh at him and hang up. You don't hear from him again.\n\n\t\t\t*set eflirt false\n\t\t\t*set rel_early %-20\n\t\t\t*goto achievement_check\n\t\t#Go to dinner, but keep it professional.\n\t\t\t\"Sure, I'd love to. As long as we keep it professional.\"\n\n\t\t\tThere's a long pause at the other end, and then you hear forced laughter. \"What? Of course. It's just a free meal.\" \n\t\t\t*if (tracey_leaves = false)\n\t\t\t\tYou mention the call to Tracey, who just rolls ${this} eyes and tells you to call ${thim} when it's over.\n\t\t\t*comment endif\n\n\t\t\tYou end up meeting at Bottega, an expensive Italian restaurant in downtown NA. The conversation is awkward at first, but over time you both realize that you have a number of things in common. The evening ends, and you part as…not exactly friends, but as peers. You keep in touch, and share leads and advice from time to time.\n\n\t\t\t*set eflirt false\n\t\t\t*set rel_early %+10\n\t\t\t*goto achievement_check\n\t\t#Make it a date.\n\t\t\t\"Sure, I'd love to. But I thought it was a bed you weren't kicking me out of.\"\n\n\t\t\tThere's a long pause at the other end, and then you hear a deep, sincere laugh. \"You know, I've always liked you, ${pl_fname}.\"\n\n\t\t\t\"That's a lie.\"\n\n\t\t\t\"But a pretty one,\" Early says. \"I'll pick you up later tonight.\"\n\n\t\t\tYou end up meeting at Bottega, an expensive Italian restaurant in downtown NA. The conversation flows freely, heavily laden with flirting and innuendo. You both realize that you have a number of things in common. \n\n\t\t\tThe evening ends, and you go back to Early's place. True to his word, he leads you to his bed and keeps you there all through the night. \n\t\t\t*if (tflirt) and (tracey_leaves = false)\n\t\t\t\tBy the time you get back to your apartment, Tracey is there, waiting. $!{the} doesn't look at you, simply saying \"When you weren't here, I triangulated your opticOS location. I hope you're happy.\" $!{the} storms past you and slams the door behind ${thim}.\n\t\t\t*comment endif\n\n\t\t\tOver the next few weeks, you see more of each other, but over time the spark fades. One night Early sends a text to your opticOS telling you that it's over, but that it was a fun ride while it lasted.\n\n\t\t\t*if (tflirt) and (tracey_leaves = false)\n\t\t\t\t*set tflirt false\n\t\t\t\t*set tracey_leaves true\n\t\t\t\t*set rel_tracey %-20\n\t\t\t*set rel_early %+20\n\t\t\t*achieve ach_date_early\n\t\t\t*goto achievement_check\n\t\t*if (tflirt) and (tracey_leaves = false)\n\t\t\t#Tell Early that I'm with Tracey.\n\t\t\t\t\"I'm flattered, but I'm with Tracey.\"\n\n\t\t\t\tThere's a long pause at the other end, and then you hear forced laughter. \"What? Wow, I mean, I knew you had terrible taste, newbie, but that just takes the cake. Good luck to both of you.\" He hangs up, and you don't hear from him again.\n\n\t\t\t\t*set eflirt false\n\t\t\t\t*set rel_early %-10\n\t\t\t\t*set rel_tracey %+10\n\t\t\t\t*goto achievement_check\n*else\n\t*goto achievement_check\n\n*label achievement_check\n*if market_share >= 100\n\t*achieve ach_market_share\n*if celebrity >= 100\n\t*achieve ach_celebrity\n*if infractions = 0\n\t*achieve ach_infractions\n*if factual >= 70\n\t*achieve ach_factual\n*if factual \u003c= 30\n\t*achieve ach_flamboyant\n*if ambition >= 70\n\t*achieve ach_ambition\n*if ambition \u003c= 30\n\t*achieve ach_integrity\n*if independence >= 70\n\t*achieve ach_independence\n*if independence \u003c= 30\n\t*achieve ach_synergy\n*goto epilogue\n\n*label epilogue\n*page_break\n[i]Evergreen Cemetery. February 1st, 2067.[/i]\n\nEveryone else is gone. The rain pours down, pounding on the fabric of your disposable umbrella. You stare at the tombstone, reading the simple inscription over and over: [i]Natasha Kovac. 2038-2062.[/i] A cheap pop-up in your opticOS shows a floating image of Tasha's face, much younger and happier. \n\nOndrej carefully kneels down to set the orchid on the grave, his joints popping. You offer to pull him back up, but he waves you off, struggling to stand on his own. \n*if celebrity >= 60\n\tYou can faintly hear people murmuring behind you—fellow reporters waiting outside the cemetery to ask you why you're with an old man at the grave of the woman who attacked you five years ago. \n*if celebrity \u003c 60\n\tYou can imagine the questions—fellow reporters asking you why you're with an old man at the grave of the woman who attacked you five years ago. \n*comment endif\nOndrej finally stands and looks at you. \"Thank you for coming. I wasn't sure you would.\"\n\n*if ambition >= 60\n\tYou shrug. \"It's not a big deal. Besides, in a way, she helped to make my career.\"\n*if (ambition \u003c 60) and (ambition > 40)\n\tYou nod. \"Of course. You started me on my first big story, after all.\"\n*if ambition \u003c= 40\n\tYou put a hand on his shoulder. \"You wanted justice. I did what I could to give you that.\"\n*comment endif\n\nHe nods, and you both go back to staring at the tombstone.\n\nYou're used to death, because the biggest news stories seem to revolve around it. You've been to violent crime scenes, seen pictures of grisly murders, and even stared death in the face a few times yourself, but this is different—the long years of watching how those deaths affect the people around them. In Ondrej's case, he was left utterly alone. After Michael Cooper moved away a couple of years ago, you were the only person Ondrej knew. He wanted someone to come with him on the fifth anniversary of his daughter's murder. You sold the visit as a human-interest piece, interviewing people five years after the Sloane case. But the truth is…\n\n*fake_choice\n\t#I can't stop thinking about what that woman did to me in an alley.\n\t\tEvery time you wake up and watch your opticOS boot in the morning, you think about Tasha smashing at your face, watching the pipe come down again and again. You shiver, but it isn't from the cold rain. \n\t#I wanted to be there for a lonely old man who did the best he could.\n\t\tEven when you first met Ondrej years ago, you were struck by how lonely he was. He is a proud man who tries to do everything on his own, but you can see the pain etched on his face as clearly as you can see the temperature gauge in the corner of your vision.\n\t#I couldn't resist the opportunity to promote my involvement in the Sloane case.\n\t\tLooking back, running into Tasha and the Kings was the best thing that ever happened to you. It got you involved in an incredible conspiracy, and gave you a shot at the big leagues. It's good to reinforce how important that was for you.\n\n*if tracey_leaves = true\n\tA voice in your ear interrupts your thoughts—Chandra, your new editor. \n*if tracey_leaves = false\n\tTracey's voice in your ear interrupts your thoughts. \n*comment endif\n\"I got that interview with Maria booked for seventeen hundred hours. You should get going.\" \n\n\"In a minute.\"\n\nYou hear the soft click in your ear of the other person hanging up, and you look over at Ondrej. \"It's time for me to go,\" you say to him.\n\n\"I don't even know how much of her is really in that grave.\" He rubs at his face, wiping the rain and the tears away. \"It's still hard to think that she's gone for good.\"\n\n*if independence > 50\n\tYou watch him as he speaks. You know she's not gone. She lives on in…\n*if independence \u003c= 50\n\tYou put a hand on his shoulder as he speaks. You know she's not gone. She lives on in…\n*comment endif\n\n*fake_choice\n\t#Data.\n\t\t\"She's still here,\" you tell him. \"She lives on as data, as information. Your pictures and videos of her—those never really go away. Information lasts forever, and that information will tell her story for a long time.\"\n\t#Memories.\n\t\t\"She's still here,\" you tell him. \"She impacted people, and she lives on as memories, as experiences. Good memories, bad experiences—those never really go away, as long as someone remembers her story.\"\n\t#Stories.\n\t\t\"She's still here,\" you tell him. \"She lives on as stories, as anecdotes. Your videos and tales of her—those never really go away. Stories last forever, as long as someone tells them.\"\n\n\"Her story.\" Ondrej says. He nods, not looking at you. \"I understand, but I think…I think I want to be alone now. With her. Thank you for coming.\"\n\nYou nod back at him and walk away. There's a new story to tell.\n*achieve ach_the_end\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]Ratings War.[/i]\n\n*feedback\n\nWe release new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n*ending", "felixsloane": "*comment Chapter Five\n*advertisement\n*temp backup_plan 0\n*text_image chap5.png\n\nThe cab takes you to the NAPD Police Station, 6th District.\n\nThis building was clean and modern-looking at one point. Maybe a few decades ago, when lots of chrome, glass, and sandblasted stone were fashionable. Over the years, bits and pieces of the station have been renovated to offer more security, patch up broken glass, remove graffiti, and expand the building. But the changes were all haphazard, done in whatever style and with whatever materials the department could afford, so that now the station looks like a patchwork quilt of architectural styles. A number of police cruisers sit under a concrete underhang that doesn't match the building it's attached to.\n\nYou push open the doors and walk up to the reception desk. A weary-looking officer stares at you behind clear netglasses.\n\n\"Name and the nature of your problem?\"\n\n\"${pl_fullname}. I'm here to talk to Detective Sloane.\"\n\n\"Are you here in regards to an active investigation?\"\n\n\"You could say that,\" you say, pulling out your press pass. \"I'm a reporter.\"\n\nThe officer looks at the press pass, and you can see a green light oscillate on the lenses of his netglasses. \"Okay, ${pmister} ${pl_lname}. He's through the door on the right. Use your netglasses to follow the blue line.\" You hear a loud buzz, and the door to your right opens. Thanking him, you walk through.\n\n*page_break\nA blue line appears on your opticOS, clinging to the ground no matter how you move your head—a standard turn-by-turn direction broadcast. You walk through a series of hallways, connecting a few open-plan offices covering a variety of departments. Soon, you find yourself in Homicide, and the line points you to a particular desk. It's covered in empty plastic bottles and food wrappers, with a computer display floating above it. Your opticOS keeps you from seeing what's on the display: a privacy block.\n\nSitting at the desk is a heavyset man with dark hair, a white dress shirt, and a black tie. A black suit coat hangs off the back of his chair. He slips off a pair of dark netglasses and looks you up and down.\n\n\"The front desk mentioned you were coming. What does an INN reporter need from me?\"\n\nYou start recording. Consent isn't required for a licensed reporter speaking with a public official in a government building.\n\n*label talk_to_Sloane\n*choice\n\t*disable_reuse #\"Tell me about yourself.\"\n\t\t\"What is this, an interview?\"\n\n\t\tYou shrug. \"If you like.\"\n\n\t\t\"Well, I don't do interviews. If it's about a case, we'll talk about the case. Otherwise, go bother someone else.\"\n\t\t*goto talk_to_Sloane\n\t*disable_reuse #\"I'm surprised you don't recognize me. You were the detective on my assault case.\"\n\t\t\"Yeah? Which case?\"\n\n\t\t\"My camera operator and I were assaulted a few months ago by members of the West Coast Kings.\"\n\n\t\tSloane leans back in his chair. \"Well then, there you go. The woman who put you in the hospital is dead. Case closed. Are we done?\"\n\n\t\t\"That's interesting,\" you say, a smile growing on your face. \"I didn't mention who assaulted me.\"\n\n\t\tHe frowns. \"Ain't you clever. Yes, I do remember you, and your case. But like I said, the case is closed, on account of the person who attacked you turned out to be dead.\"\n\t\t*goto talk_to_Sloane\n\t*disable_reuse #\"What happened to the body of Tasha Kovac?\"\n\t\tThe detective shrugs. \"Probably in the morgue somewhere.\"\n\n\t\t\"Her father seems to think it was stolen by the police.\"\n\n\t\t\"Yeah well, I ain't gonna lose any sleep over the father of a gangbanger spreading rumors and gossip. And I don't have time for rumors and gossip myself. So if that's all you got, I need to get back to real work.\"\n\n\t\t\"There were eyewitnesses.\"\n\n\t\tSloane leans forward in his chair. \"I bet there were. And I bet they were willing to say anything for a little bit of airtime, weren't they? Like I said, rumors and gossip. Get out of here.\"\n\n\t\t*if clue_photo\n\t\t\t\"There's also a photograph.\"\n\n\t\t\tYou expected the revelation of the photo to shock Sloane, but you're disappointed. \"Oh yeah?\" he says, relaxed. \"How exactly do you have a picture of a missing body?\"\n\n\t\t\t\"It's actually—\"\n\n\t\t\t\"What it is, my friend, is trespassing on the scene of a crime at best, and more likely a complete fabrication created to cast the NAPD in a bad light. You ain't the first reporter to come in here claiming to have pictures of something that didn't happen, so unless you have something substantial, go back to making up celebrity gossip.\"\n\t\t*comment endif\n\t\t\n\t\t\"Well,\" Tracey says in your ear. \"That went well.\"\n\t\t*goto talk_to_Sloane\n\t*disable_reuse #\"All of the West Coast King murders are connected, aren't they?\"\n\t\tHe leans back in his chair, looking relaxed. \"Probably,\" he says. \"Gang murders happen all the time. It ain't something to be proud of, but it's the truth.\"\n\n\t\t\"Except all of the murders were done with a small-caliber weapon. Gangsters typically use large-caliber weapons.\"\n\n\t\tSloane shrugs. \"Okay, fine. So someone decided to get it into their head to go hunting gangsters. Again, it ain't pretty, but it happens. I'll get him before he kills again.\"\n\n\t\t\"'Him?'\" you ask innocently.\n\n\t\tThe detective snarls. \"A figure of speech. Don't go insinuating anything.\"\n\n\t\t\"No insinuations. Just deductions. Like the fact that none of the murders had any evidence of the victims defending themselves. As if they trusted or at least respected the person shooting them.\"\n\n\t\tSloane sits up and takes a sip of coffee. His hand shakes slightly. \"How do you figure that?\"\n\n\t\t\"The two victims I've seen were shot in the middle of the forehead. Not an easy shot to make if the target's firing back at you. And given that the gang in question seems very eager to find out who the murderer is, whoever's doing this is probably shooting first and questioning the bodies later.\"\n\n\t\t\"Not a bad piece of detective work,\" Sloane says. \"But that ain't evidence. You got anything else?\"\n\t\t*goto talk_to_Sloane\n\t*disable_reuse #\"Someone's buying organs harvested from corpses.\"\n\t\tSloane laughs. \"You've got guts, I'll give you that. Not many reporters would walk into a police station with a story like that.\"\n\n\t\t\"It's the truth,\" you say. \"I've been to St. Elizabeth.\"\n\n\t\t\"There's a dozen places with that name in the city,\" he says, taking a confident swig of coffee. \"You better narrow that story down some before you throw it around again.\"\n\n\t\t\"The homeless shelter. Or maybe I should say, the illegal hospital.\"\n\n\t\tHe spits coffee all over his hand. Sloane growls in frustration, and reaches into his desk for some napkins to mop it up. \"I suppose you have more people on camera telling you that there's an illegal hospital being run in this city.\"\n\n\t\t*if Felix_bought = true\n\t\t\t\"Better than that,\" you say, smiling. \"I know you're the one who bought the organs.\"\n\n\t\t\tHis face grows cold. \"I've had it with these games,\" he says. \"I don't care if you're recording this or not. I'll punch your lights out if you keep throwing these baseless accusations at me.\"\n\t\t*if Felix_bought = false\n\t\t\t\"I have enough evidence to raise a lot of questions in the minds of my audience.\"\n\n\t\t\tHis face grows cold. \"I don't give a rat's ass about your audience. I deal in two things: facts and evidence. And you ain't giving me either. So get to the point or get moving.\"\n\t\t*comment endif\n\n\t\t\"You've hit a nerve,\" Tracey says.\n\t\t*goto talk_to_Sloane\n\t*disable_reuse #\"It's over, Sloane. I know your dirty little secret.\"\n\t\t\"Oh yeah?\" he asks. He's smiling, but you can tell it's barely covering his fury. \"And what's that?\"\n\n\t\tYou decide to take a risk. \"You're the one selling the corpses to St. Elizabeth.\"\n\n\t\tHe stands up from his desk. \"You stop recording right now.\"\n\n\t\t*if factual >= 50\n\t\t\t\"Why? Are you afraid of the truth, Detective Sloane?\"\n\t\t*if factual \u003c 50\n\t\t\t\"Why? Afraid of how this will make you look in the public eye?\"\n\t\t*comment endif\n\n\t\t\"If you want to ask me about a case I'm working on, you have every right to record me here at the station. But if you want to accuse me of something, I don't have to sit here and take it.\" He puts on his suit coat and storms off. \"Chief! I'm taking my dinner at the Lame Duck,\" he shouts over his shoulder.\n\n\t\tYou stop recording and start to wander around the building, keeping to the public hallways as you think. \n\t\t*set deduction_detSloaneKnows true\n\t\t*goto lame_duck\n\n*label lame_duck\n\n*page_break\n\n\"That could have gone better,\" Tracey says.\n\n\"He knows something.\"\n\n\"So let's follow him. Why are you pacing around instead?\"\n\n\"I know this part of town. The Lame Duck is a pub a couple of blocks away that some cops frequent. I used to have a police informant that would meet me there for drinks so she could give me tips when she was off-duty.\"\n\n\"That's good.\"\n\n\"It's not good. It's a place where cops go to do things they don't want their superiors to know about. If something bad happens, it'll all get covered up.\" \n\n\"So get him back here, where you can nail him down.\"\n\nYou shrug, then realize that Tracey can't see you. \"He won't talk on the record,\" you say instead. \"But he knows I have something. If he does want to talk, it won't be here. And if he wants to cover something up, it won't be here either. It's a risk I have to take.\"\n\n\"Then let's kill some time before we go get a drink,\" Tracey says.\n\n*page_break One Hour Later\n\nAfter wandering for a while and making plans, you walk over to the Lame Duck. It's one of those trendy Irish-American fusion pubs, catering to nostalgia more than any attempt at authenticity. Everything looks like wood, even though you'd bet a million credits that none of it came from a real tree. There's dozens of people inside, making a pleasant buzz of discussion and camaraderie. The place makes enough money that they can invest in an anti-spammer to keep all the net pop-ups out, but every flat surface has a broadcaster that allows patrons to use their netglasses to tune into a variety of sporting events.\n\nTaking a deep breath, you mentally go over the backup plan you worked out with Tracey on the way over.\n\n*choice\n\t#Tracey streams my conversation to Maris.\n\t\tYou and Tracey set up a rip of your opticOS visuals from Tracey's workstation that streams right to Maris' office. The video quality is horrible, and it would be impossible to get any broadcast-quality footage from it (not without accusations of the footage being doctored), but at least your news director will see if anything happens to you. As long as no one jams your broadcast.\n\t\t*set factual %+10\n\t\t*set backup_plan 1\n\t\t*goto lame_duck_Sloane\n\t#Have Tracey coordinate with INN security.\n\t\tINN has a private security force for occasions when reporters are going into dangerous situations. Frivolous use of INN security can result in an Infraction, but you figure you have enough going on to justify it to Maris. Of course, even a corporation like INN can't just beat up a police officer without a very good reason, so you're hoping it doesn't come to that.\n\t\t*set independence %-10\n\t\t*set backup_plan 2\n\t\t*goto lame_duck_Sloane\n\t#Use the stunner that Tracey got for me.\n\t\tFiguring that Sloane might be paranoid enough to trace your purchases after your confrontation, you were more paranoid and had Tracey send you a stunner via personal messenger. Owning and carrying a stunner is perfectly legal, but using it against an officer without good reason is distinctly illegal. Hopefully, Sloane won't give you a good reason.\n\t\t*set factual %-10\n\t\t*set backup_plan 3\n\t\t*goto lame_duck_Sloane\n\n*label lame_duck_Sloane\n\nSloane is sitting in a booth near the back. A waiter brings a dark beer over and picks up an empty glass. You slide into the seat opposite him.\n\n\"I was wondering when you were going to get here,\" he says. \"I'm already three ahead of you. Catch up.\"\n\nThe waiter turns to take your order.\n\n*choice\n\t#\"I'll have what he's having.\"\n\t\tThe waiter brings you another dark beer like the one Sloane has in front of him. You take a sip. It's cool but not too cold, and it has a rich, almost nutty flavor. You like it.\n\n\t\t*achieve ach_beer\n\t\t*goto confront_felix\n\t#\"Bring me a glass of wine.\"\n\t\tSloane laughs, but the waiter brings you a large wine glass full of a dark red wine. You take a sip. It's got a nice, full flavor with strong floral notes. You like it.\n\n\t\t*goto confront_felix\n\t#\"Just some water.\"\n\t\tSloane laughs, but the waiter brings you a glass of ice water. You take a sip. It's cold and refreshing.\n\n\t\t*goto confront_felix\n\n*label confront_felix\n\"So, ready to confess on the record?\" you ask.\n\nThe detective snorts. \"Hell no. What, you think I'm an idiot? This is off the record, or no deal.\"\n\n\"Had to try,\" you say as you consider your options. Sloane pulls out a thick black plastic rectangle, about the size of an old remote control. He presses on it.\n\nTracey speaks in your ear. \"Hey, that's a—\" Suddenly, ${this} voice cuts out, and a small flashing icon in your vision tells you that you're no longer sending or receiving any signals except what's in your immediate area.\n\nSloane wiggles the device in his hand. \"A little something a friend of mine cooked up,\" he says, before putting it in his pocket. \"I don't know who you're talking to, but this chat stays between you and me. No video, no audio, nothing.\"\n\n*if backup_plan = 1\n\tDamn. Your feed to Tracey (and thus to Maris) has been cut. You're on your own. You need to make this fast before something happens.\n*if backup_plan = 2\n\tDamn. Your feed to Tracey has been cut. $!{the}'s probably scrambling INN security right now. You don't have much time.\n*if backup_plan = 3\n\tDamn. Your feed to Tracey has been cut. Luckily, you still have the stunner on you, but you don't relish having a shoot-out with this many cops around. You need to make this quick.\n*comment endif\n\n*page_break\nYou could try to record discreetly if you think your technique is good enough to talk, pretend to not be recording, and keep him in enough light that the footage is somewhat recognizable—Maris probably won't let you use it without a fantastically good reason, but at least you'll have a record of what was really said. Of course, you can also play it straight, and actually keep him off the record—you've already fallen pretty far down the rabbit hole, so there might be more pieces to the puzzle that you're missing. Finally, you could bluff and pretend to walk away, in the hopes that he's desperate enough to cave.\n\n*if blackmail\n\tThere's also the evidence you found at the hospital linking Sloane to the organ sale. You could try to blackmail him into talking on the record. But you only get to play that card once—you might need it later. Besides, blackmailing a police officer could make things tough for you down the road.\n*comment endif\n\nSloane takes another sip of his beer, watching you.\n\n*choice\n\t#Agree to the terms, but record the conversation discreetly.\n\t\t*if technique >= 60\n\t\t\tYou take a sip of your drink, stalling for time while you discreetly reconfigure your opticOS. Tracey handled some of this calibration on ${this} end, but you know enough to do it on the fly, even though it takes a minute. You make a show of thinking about it as you finish the final adjustments and activate the recording. \"Fine,\" you say, with a small smile. \"Off the record.\"\n\t\t\t*set independence %+10\n\t\t\t*set celebrity +10\n\t\t\t*set recorded_Felix_confession true\n\t\t\t*goto drop_the_angle\n\t\t*else\n\t\t\tYou take a sip of your drink, stalling for time while you discreetly reconfigure your opticOS. Tracey handled some of this calibration on ${this} end, and you're struggling to adjust on the fly without ${thim}. You make a show of thinking about it as you struggle, but eventually you give up. \"Fine,\" you say, keeping the frustration off your face. \"Off the record.\"\n\t\t\t*set independence %+10\n\t\t\t*goto drop_the_angle\n\t#Talk off the record, using my investigative skill to get more out of him.\n\t\t*if investigation >= 55\n\t\t\tYou lean forward, looking into Sloane's eyes. \"Let me make something clear. I will use everything at my disposal to get this story. If you talking to me off the record gets me closer to finding the truth, then I'll do it. But if you screw me, I don't care what happens to you as a result. You play right by me, and I'll play right by you, but if you double-cross me, I air everything I have on you.\"\n\n\t\t\tSloane watches you for a long moment, and then smiles. \"An honest-to-God investigative reporter. I'll drink to that.\"\n\n\t\t\t\"Great. Now talk.\"\n\t\t\t*set ambition %-10\n\t\t\t*set celebrity +10\n\t\t\t*goto drop_the_angle\n\t\t*else\n\t\t\t\"Sure, fine,\" you say. \"Off the record. Now talk.\"\n\t\t\t*set ambition %-10\n\t\t\t*goto drop_the_angle\n\t#Bluff and pretend to walk away in order to get him to crack.\n\t\t*if charm >= 55\n\t\t\tYou smile. There's a lot of teeth in it. \"I don't like being pressured. No deal.\" You stand up and start to walk off, counting steps in your head to see if you clear the jammer's range. [i]Three. Four. Fi—[/i]\n\n\t\t\t\"${pl_lname}. Wait.\"\n\n\t\t\tYou turn and look at him. He waves you back to the table, and you sit back down. \"Look, I came on strong, and I get that. But I'm not asking to go off the record just for me. It's important that we understand each other, and I can't do that if you've got a camera in my face.\"\n\n\t\t\t\"Next time,\" you say, tapping the table for emphasis, \"ask me before you mess with my tech.\"\n\n\t\t\t\"Sure, fine. Just…not used to a reporter like you. Trust me, I'll remember. But do we have a deal?\"\n\n\t\t\tYou nod. \"Fine. Off the record. Now talk.\"\n\t\t\t*set factual %-10\n\t\t\t*set celebrity +10\n\t\t\t*goto drop_the_angle\n\t\t*else\n\t\t\t\"I don't like being pressured,\" you say, frustration mounting in your voice. \"No deal.\" \n\n\t\t\tYou start to stand up, but Sloane puts a hand on your arm. \"Sit down.\"\n\n\t\t\t\"I told you—\"\n\n\t\t\t\"I know what you told me, and I don't give a damn. You and I both know that you want what I know, and I ain't talking until it's off the record. So stop bluffing, sit down, have a drink, and listen.\"\n\n\t\t\tHe's got a point. You need what he has. Reluctantly, you nod. \"Fine. Off the record. Now talk.\"\n\t\t\t*set factual %-10\n\t\t\t*goto drop_the_angle\n\t*if blackmail\n\t\t#Blackmail Sloane.\n\t\t\tYou reach into your pocket and pull out a small tablet. \"I don't think you understand the situation here. I have evidence right here that ties you to the purchase of illegally harvested organs.\" \n\n\t\t\tYou slide the tablet over, and let him review what you got on him from St. Elizabeth. His face pales as you continue. \"Don't worry—I have copies of that. But you see, whether we go off the record or not isn't the point. I've already got you where I want you. All you can do for me now is fill in the missing details.\"\n\n\t\t\tHe slides the tablet back. \"Look, I'm not asking just for me. There are other people involved in this.\"\n\n\t\t\tYou put the tablet back in your pocket. \"Fine. We'll stay off the record for now. But you need to understand that if you try to move against me, I'll destroy you. Don't make me have to use this.\"\n\n\t\t\tHe nods. \"I got it. You're in charge. And I'll remember this.\"\n\n\t\t\t\"Fine. Now talk.\"\n\t\t\t*set ambition %+10\n\t\t\t*achieve ach_blackmail\n\t\t\t*set blackmailed_Felix true\n\t\t\t*set celebrity +10\n\t\t\t*goto drop_the_angle\n\n*label drop_the_angle\n*page_break\nSloane takes another sip of his beer before continuing. \"I want you to drop the organ-sale angle.\"\n\n\"I'm sorry, I didn't get that. I thought I just heard you asking me to drop the whole point of my story.\"\n\nThe detective frowns. All of his bluster and bravado is gone. \"Look, ${pl_lname}, I'm not a nice guy. We both get that. You want to run a story about an illegal hospital for the homeless? Fine. \n*if blackmailed_Felix = true\n\tIf you even want to drag me into that, I can't exactly stop you. \n*if blackmailed_Felix = false\n\tIf you even want to say a police officer is looking the other way, fine. I want you to leave me out of it, though. Informant confidentiality and all that. \n*comment endif\nBut you can push the angle of how desperate their situation is without bringing up that they're selling the organs on the side. If you mention the organs, you'll just turn that organization into another bunch of criminals, instead of people who are trying to do some good in a bad situation.\"\n\n\"But—\"\n\n\"Besides,\" he says, setting the beer back down. \"I know who's been killing all the Kings.\"\n\n*fake_choice\n\t#\"Who is it?\"\n\t\t\"Who is it?\"\n\n\t\t\"Maria, the girlfriend.\"\n\n\t\t\"Really? You have proof?\" you ask.\n\n\t\t\"Call it an informed hunch. Besides, she's not in town anymore, so there's no one to contradict you.\"\n\n\t\t\"INN streams to more than just NA, you know.\"\n\n\t\tHe shrugs, and takes another sip of his beer.\n\t#\"I already know it's Tasha.\"\n\t\t\"I already know it's Tasha.\"\n\n\t\tSloane snorts. \"Yeah, she killed everyone and then conveniently committed suicide. Nice try.\"\n\n\t\t\"Then who do you think it is?\"\n\n\t\t\"Maria, the girlfriend.\"\n\n\t\t\"Really? You have proof?\" you ask.\n\n\t\t\"Call it an informed hunch. Besides, she's not in town anymore, so there's no one to contradict you.\"\n\n\t\t\"INN streams to more than just NA, you know.\"\n\n\t\tHe shrugs, and takes another sip of his beer.\n\t#\"Next you'll tell me it was her girlfriend.\"\n\t\t\"Next you'll tell me it was her girlfriend.\"\n\n\t\tSloane looks at you in surprise. \"Yeah. How did you guess?\"\n\n\t\t\"She hated the Kings, and Tasha forced her to stay with at least one gangbanger all the time. That gives her motive and access. But you have proof.\"\n\n\t\tHe shakes his head. \"Nope. I just had an informed hunch. Besides, she's not in town anymore, so there's no one to contradict you if you want to run with that story.\"\n\n\t\t\"INN streams to more than just NA, you know.\"\n\n\t\tHe shrugs, and takes another sip of his beer.\n*comment endif\n\nYou think about it for a long moment, considering all the options. The suspected killer of the Kings is another angle, but it's flimsy, and not nearly as big as the story you're on now. It's clear Sloane is willing to throw anyone under the bus to keep himself out of this. Maybe that's a reason to drop it, or a reason to keep going.\n\n*choice\n\t#Agree to drop it to avoid problems.\n\t\tAt the end of the day, you don't need to take on any more trouble than you already have.\n\n\t\t\"Okay,\" you say. \"I'll drop it.\"\n\n\t\tSloane takes another sip of his beer. \"That's all I'm asking,\" he says.\n\t\t*goto backup_arrives\n\t#Agree to drop it on principle.\n\t\t*if ambition \u003c= 40\n\t\t\t\"Okay, I'll drop it,\" you say. \"But it's not because you're asking me to.\"\n\n\t\t\t\"Oh? Then why?\"\n\n\t\t\t\"Because you're right—those people don't need to be painted as criminals. Their situation is terrible, and investigative reporting should be about protecting people, not making their lives worse.\"\n\n\t\t\tSloane takes another sip of his beer. \"You'll go far with that attitude,\" he says.\n\t\t\t*set celebrity +10\n\t\t\t*goto backup_arrives\n\t\t*else\n\t\t\t\"Okay, I'll drop it,\" you say. \"But it's not because you're asking me to.\"\n\n\t\t\t\"Oh? Then why?\"\n\n\t\t\t\"Because you're right—those people don't need to be painted as criminals. Their situation is terrible, and investigative reporting should be about protecting people, not making their lives worse.\"\n\n\t\t\tSloane takes another sip of his beer. \"That's all I'm asking,\" he says.\n\t\t\t*goto backup_arrives\n\t#Say I'll drop it, but secretly run it.\n\t\t*if ambition >= 60\n\t\t\t\"Sure, I'll drop it,\" you say. But you know you'll run it. It's too good not to run.\n\n\t\t\tSloane takes another sip of his beer. \"You'll go far with that attitude,\" he says.\n\t\t\t*set case2_marketShare +10\n\t\t\t*set story_with_organ_sale true\n\t\t\t*goto backup_arrives\n\t\t*else\n\t\t\t\"Sure, I'll drop it,\" you say. But you know you'll run it. It's too good not to run.\n\n\t\t\tSloane takes another sip of his beer. \"That's all I'm asking,\" he says.\n\t\t\t*set story_with_organ_sale true\n\t\t\t*goto backup_arrives\n\t#Tell him I have to present the whole truth.\n\t\t*if factual >= 60\n\t\t\t\"I won't drop it,\" you say firmly. \"The public needs to know what's happening to these corpses. I shouldn't decide what does or doesn't go into the news. All I can do—all I [i]will[/i] do—is present the facts.\"\n\n\t\t\tSloane scowls. \"Just as I figured. Sure, your name e, hard. \"So that's not how this works. You don't get to use me as your spin machine. I'll decide if I'm going to post that information or not.\"\n\n\t\t\tHe looks at his drink. \"Will you?\" he asks quietly.\n\t\t\t*goto if_blackmailed\n\t\t*if blackmailed_Felix = false\n\t\t\t\"I got some evidence that shows you were [i]buying[/i] those organs.\" \n\n\t\t\tHe looks at you and snarls. \"You better be lying about that. Because if you're not, it sounds an awful lot like you're blackmailing me.\"\n\n\t\t\t*choice\n\t\t\t\t#\"It's not blackmail. It's just a fact. A fact I'll decide whether to include in my story.\"\n\t\t\t\t\t\"Look, you've got me over a barrel and you know it,\" he says. \"So let's cut the crap and you tell me what I need to do to keep that information out of the story.\"\n\n\t\t\t\t\t\"You aren't hearing me. I said I'll decide whether it goes in or not. Not you.\"\n\n\t\t\t\t\tSloane looks at his beer, not meeting your eyes. \"Fine. At least tell me if you're going to run the organ-selling angle or not.\"\n\t\t\t\t\t*set factual %+10\n\t\t\t\t\t*goto if_blackmailed\n\t\t\t\t#\"That's because it is.\"\n\t\t\t\t\tSloane's face turns red. \"You son of a—\"\n\n\t\t\t\t\tYou reach into your pocket and slide a small tablet over to him with the evidence you found at St. Elizabeth. His face pales as he looks at it. \"Don't worry—I have copies of that. I've got you right where I want you.\"\n\n\t\t\t\t\tHe slides the tablet back. His face is cold, but he clearly looks scared. \"I got it. You're in charge. And I'll remember this. So are you going to run that angle or not?\"\n\t\t\t\t\t*set ambition %+10\n\t\t\t\t\t*set celebrity +10\n\t\t\t\t\t*achieve ach_blackmail\n\t\t\t\t\t*set blackmailed_Felix true\n\t\t\t\t\t*goto if_blackmailed\n\t\t\t\t#\"No. I'm not going to blackmail you, as long as you don't give me a reason to.\"\n\t\t\t\t\t\"Fine. You've got me over a barrel. At least tell me if you're going to run the organ-selling angle or not.\"\n\t\t\t\t\t*set ambition %-10\n\t\t\t\t\t*goto if_blackmailed\t\t\t\t\t\n\n*label if_blackmailed\n*choice\n\t#Agree to drop it. I can always use the evidence I have later—no need to push it.\n\t\tAt the end of the day, you don't need to take on any more trouble than you already have.\n\n\t\t\"Yeah,\" you say. \"I'll drop it.\"\n\n\t\tSloane wipes some sweat out of his eyes. \"That's all I'm asking,\" he says.\n\t\t*goto backup_arrives\n\t#Agree to drop it on principle.\n\t\t*if ambition \u003c= 35\n\t\t\t\"Yeah, I'll drop it,\" you say. \"But it's not because you're asking me to.\"\n\n\t\t\t\"Oh? Then why?\"\n\n\t\t\t\"Because you're right—those people don't need to be painted as criminals. Their situation is terrible, and investigative reporting should be about protecting people, not making their lives worse.\"\n\n\t\t\tSloane wipes some sweat out of his eyes. \"That's all I'm asking,\" he says.\n\t\t\t*set celebrity +20\n\t\t\t*goto backup_arrives\n\t\t*else\n\t\t\t\"Yeah, I'll drop it,\" you say. \"But it's not because you're asking me to.\"\n\n\t\t\t\"Oh? Then why?\"\n\n\t\t\t\"Because you're right—those people don't need to be painted as criminals. Because their situation is terrible, and investigative reporting should be about protecting people, not making their lives worse.\"\n\n\t\t\tSloane wipes some sweat out of his eyes. \"That's all I'm asking,\" he says.\n\t\t\t*goto backup_arrives\n\t#Say I'll drop it, but secretly run it.\n\t\t*if ambition >= 65\n\t\t\t\"Sure, I'll drop it,\" you say. But you know you'll run it. It's too good not to run, especially with the evidence of Sloane buying the organs.\n\n\t\t\tSloane wipes some sweat out of his eyes. \"That's all I'm asking,\" he says.\n\t\t\t*set case2_marketShare +10\n\t\t\t*set story_with_organ_sale true\n\t\t\t*goto backup_arrives\n\t\t*else\n\t\t\t\"Sure, I'll drop it,\" you say. But you know you'll run it. It's too good not to run, especially with the evidence of Sloane buying the organs.\n\n\t\t\tSloane wipes some sweat out of his eyes. \"That's all I'm asking,\" he says.\n\t\t\t*set story_with_organ_sale true\n\t\t\t*goto backup_arrives\n\t#Tell him I have to present the whole truth.\n\t\t*if factual >= 65\n\t\t\t\"I won't drop it,\" you say firmly. \"The public needs to know what's happening to these corpses. I shouldn't decide what does or doesn't go into the news. All I can do—all I [i]will[/i] do—is present the facts.\"\n\n\t\t\tSloane scowls. \"So you're just out to destroy me. Dress it up how you want, but you're another glory-seeking reporter out for ${phis} own ego.\"\n\t\t\t*set case2_marketShare +10\n\t\t\t*set story_with_organ_sale true\n\t\t\t*goto backup_arrives\n\t\t*else\n\t\t\t\"I won't drop it,\" you say firmly. \"The public needs to know what's happening to these corpses. I shouldn't decide what does or doesn't go into the news. All I can do—all I [i]will[/i] do—is present the facts.\"\n\n\t\t\tSloane scowls. \"So you're just out to destroy me. Dress it up how you want, but you're another glory-seeking reporter out for ${phis} own ego.\"\n\t\t\t*set story_with_organ_sale true\n\t\t\t*goto backup_arrives\n\t#Drop it to focus on the human-interest spin.\n\t\t*if factual \u003c= 35\n\t\t\t\"Sure, I'll drop it,\" you say. \"The story works better without it anyhow. The bodies of hardened criminals give life and hope to the downtrodden and unfortunate: I can see the online buzz already.\"\n\n\t\t\tSloane scowls. \"Don't get carried away, now.\"\n\t\t\t*set celebrity +10\n\t\t\t*goto backup_arrives\n\t\t*else\n\t\t\t\"Sure, I'll drop it,\" you say. \"It works better without it anyhow. The bodies of hardened criminals give life and hope to the downtrodden and unfortunate: I can see the online buzz already.\"\n\n\t\t\tSloane scowls. \"Don't get carried away, now.\"\n\t\t\t*set celebrity +10\n\t\t\t*goto backup_arrives\n\n*label backup_arrives\nAt that moment, the door to the pub crashes open. Two people in heavy armor with blank faceplates walk into the pub. They carry heavy-duty zappers, and their armor is in the INN corporate colors. \n\nGreat, the cavalry's here at the worst possible time.\n\n\"${pl_fullname},\" one of them says, in a heavily synthesized voice. \"We are here to extract you from this building. Anyone who takes any action to prevent this will be met with nonlethal force.\"\n\nYou turn to explain to Sloane, but he pulls out his pistol and points it at you. \"You set me up!\" he screams. \"You set me up, you—\" A few of the other patrons pull out pistols as well, pointing them at you and the INN guards. Probably Sloane's crooked friends.\n\n*if backup_plan \u003c 3\n\tOne of the INN guards shoots before Sloane can fire. Sloane jerks back, dropping his gun. The guard who fired turns to face the other police officers who are now pulling their weapons, while the second guard steps forward to take the weapon and grab your arm.\n*if backup_plan = 3\n\tYou grab your stunner before Sloane can fire, and you shoot him under the table. He jerks back, dropping his gun. One of the guards steps forward to grab you by the arm and take your weapon, while the second turns and points a stunner at the other police officers who are now pulling out their guns.\n*comment endif\n\n\"Your weapon will be left outside this establishment,\" the guard holding you says in that strange, modulated voice. \"But continued resistance to acquiring our corporate property will be met with additional force.\"\n\nYou are rushed out of the pub, with all of the patrons watching you. Some put their weapons away, while others keep them trained on the guards. Well, that's one way to get your face out there. As you move outside the pub, the connection to your earpiece and your opticOS reestablishes.\n\n\"Tracey?\" you say. \"What is going—\"\n\n\"Not Tracey,\" the voice on the other end says. You recognize it immediately, and your stomach drops. \"It's Maris. And you better have a damn good reason why I just sent an INN security team to a bar full of off-duty police officers.\"\n\nDamn it.\n*set celebrity +5\n*finish", "firstshow": "*comment Chapter Six\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Ratings War[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n*text_image chap6.png\n\n[i]February 6th, 2062. Three days later.[/i]\n\nYou sit in Maris's office, watching the feed. The story you put together is about to air, and you're watching the market share index. Tracey is sitting next to you while Maris is enthroned behind her desk, on the other side of the floating display. Early sits on the edge of the desk, looking bored.\n\nYou glance over at Tracey, seeing if you can find any indication of ${this} state of mind.\n\n*page_break\n[i]February 4th, 2062. After midnight.[/i]\n\nOnce Maris talked to you in the back of the INN vehicle, the link to your earpiece was cut. The security guards refused to speak to you, so you've been going over everything you learned during the investigation, trying to pull it all into some kind of sense. Now the guards are escorting you to Maris's office. As the door closes behind you, you see that Tracey is already here.\n\n*if rel_tracey >= 60\n\t$!{the} smiles a little at you. \"Whoops,\" ${the} says quietly, as you take the seat next to ${thim}.\n*if (rel_tracey \u003c 60) and (rel_tracey >= 40)\n\t$!{the} gives you a little wave as you take the seat next to ${thim}.\n*if rel_tracey \u003c 40\n\t$!{the} won't look at you as you take the seat next to ${thim}.\n*comment endif\n\nMaris barely acknowledges you. \"What were you thinking?\" she screams, staring daggers at Tracey as she paces back and forth in front of both of you. \"The owner of the pub is filing charges against INN in general and you two specifically, so now I have Legal on my back demanding answers. You're both lucky the police haven't done anything except release a statement that Sloane is going to be on administrative leave while they 'investigate' the incident.\"\n\n\"My link to ${pl_fname} was cut,\" Tracey says, \"and I knew ${phe} was walking into a bad situation. I had to make a call. And I made the right one.\" $!{the} turns and looks at you for support.\n\n*choice\n\t#\"Tracey made a good choice based on the information available.\"\n\t\t*if independence \u003c= 40\n\t\t\t$!{the} nods in appreciation.\n\n\t\t\tMaris frowns, and brushes a strand of dark hair out of her eyes. \"If you're that passionate about it, then I guess I can overlook your own involvement.\"\n\t\t\t*set rel_tracey %+10\n\t\t\t*goto tracey_mistake\n\t\t*else\n\t\t\t$!{the} looks at you in surprise. \"That's out of character for you, boss.\"\n\n\t\t\tMaris frowns, and brushes a strand of dark hair out of her eyes. \"If you're backing ${this} play, then you'll share in the punishment.\"\n\n\t\t\tOuch.\n\t\t\t*set rel_tracey %+10\n\t\t\t*set infractions +1\n\t\t\t*goto tracey_mistake\t\n\t#\"I was handling it. Tracey was out of line to call security in.\"\n\t\t*if independence >= 60\n\t\t\t$!{the} shrugs. \"You're not exactly a team player yourself, you know.\"\n\n\t\t\tMaris shakes her head. \"But ${pl_fname} is right. $!{phe}'s the one out in the field, and ${phe} needs to make those calls.\"\n\t\t\t*goto tracey_mistake\n\t\t*else\n\t\t\t$!{the} frowns and looks away.\n\n\t\t\tMaris nods. \"Exactly. You're the one in the field, and you need to make these calls. Tracey shouldn't have acted without orders.\"\n\n\t\t\t\"Whatever you say,\" Tracey mutters.\n\t\t\t*set rel_tracey %-10\n\t\t\t*goto tracey_mistake\n\t#\"Sloane was talking. I was getting good information. Right or wrong, security ruined my chance to follow this to the end.\"\n\t\t*if factual >= 60\n\t\t\tMaris nods. \"Exactly. You're the one who has to make the call, even if it puts you in danger.\"\n\n\t\t\t\"As long as ${phe} keeps
