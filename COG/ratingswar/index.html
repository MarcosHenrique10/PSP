hat woman kidnapped and assaulted an INN reporter, and now you're talking about covering it up.\"\n\n\t\t\t\"Are you threatening me?\"\n\n\t\t\t\"No, I'm just—\"\n\n\t\t\t*if aired_now\n\t\t\t\t\"This isn't a debate. Post a retraction, or I will.\"\n\n\t\t\t\t\"Fine.\" As she waits on the call, you grab your tablet and craft a brief retraction. You also see Maris pull down the original story and upload an edited one.\n\n\t\t\t\t\"Done,\" you say.\n\n\t\t\t\t\"Good. Thank you.\"\n\n\t\t\t*if aired_now = false\n\t\t\t\t*gosub maris_sends\n\t\t\t*set celebrity -5\n\t\t\t*set named_katrina false\n\t\t\t*goto time_with_tracey\n\t#Ask her why she's so worried about the story.\n\t\t*if factual >= 70\n\t\t\t\"Why are you so worried about this story?\"\n\n\t\t\t\"This isn't about what I want, but what the company wants.\"\n\n\t\t\t\"Then the company should trust me. [i]You[/i] should trust me. Unless there's a reason not to.\"\n\n\t\t\tMaris is quiet for a long moment. \"Okay. I'll take care of this, and I'll give you more room to work. But you'd better deliver something amazing.\"\n\n\t\t\t*if infractions > 0\n\t\t\t\t*set infractions -1\n\t\t\t*if aired_now = false\n\t\t\t\t*gosub you_send\n\t\t*if (factual \u003c 70) and (factual >= 60)\n\t\t\t\"Why are you so worried about revealing the identities of the Sloanes?\"\n\n\t\t\t\"This isn't about what I want, but what the company wants.\"\n\n\t\t\t\"Then the company should trust me. [i]You[/i] should trust me. Unless there's a reason not to.\"\n\n\t\t\tMaris is quiet for a long moment. \"Fine! Fine. I'll make it work.\"\n\n\t\t\t*if aired_now = false\n\t\t\t\t*gosub you_send\n\t\t\t*goto time_with_tracey\n\t\t*else\n\t\t\t\"Why are you so worried about revealing the identities of the Sloanes?\"\n\n\t\t\tMaris is quiet for a long moment. \"Drop it. Now.\"\n\n\t\t\t\"Maris—\"\n\n\t\t\t*if aired_now\n\t\t\t\t\"This isn't a debate. Post a retraction, or I will.\"\n\n\t\t\t\t\"Fine.\" As she waits on the call, you grab a tablet and craft a brief retraction. You also see Maris pull down the original story and upload an edited one.\n\n\t\t\t\t\"Done,\" you say.\n\n\t\t\t\t\"Good. Thank you.\"\n\n\t\t\t*if aired_now = false\n\t\t\t\t*gosub maris_sends\n\t\t\t*set celebrity -5\n\t\t\t*set named_katrina false\n\t\t\t*goto time_with_tracey\n\n*label you_send\n\n\"So the report's good to go?\"\n\n\"Yes. I'm sending it to Scheduling now.\"\n\n*set market_share + case3_marketshare\n*return\n\n*label maris_sends\n\n\"This isn't a debate.\"\n\n\"Fine, I'll upload an edited version shortly.\"\n\n\"No need. I've already edited the story down for you. It'll go to Scheduling shortly.\"\n\n*set market_share + case3_marketshare\n*return\n\n*label time_with_tracey\nThe call terminates.\n\n*if tracey_there\n\tYou fill Tracey in on your call with Maris.\n\n\t\"Damn. Sounds like you've had a full day.\"\n\n\t\"And I haven't even left my apartment,\" you grumble. \"Gotta love telecommuting.\"\n\n\t*if (rel_tracey >= 70) and (tflirt = true)\n\t\t$!{the} smiles, and walks up to you. \"Well, there are some things you can't do in the office.\"\n\n\t\t\"Such as?\"\n\n\t\t$!{the} stares into your eyes for a long moment, and then ${the} kisses you.\n\n\t\t*choice\n\t\t\t#Kiss ${thim} back, hard.\n\t\t\t\tYou return the kiss, hard. Want and need and passion well up in you as you pour it all into the kiss. All the stress, frustration, danger, and chaos of the past few days falls away as you feel ${this} arms around you.\n\n\t\t\t\tAfter a brief eternity, ${the} pulls back. \"You should go back to bed,\" ${the} says, softly.\n\n\t\t\t\t\"You should come with me,\" you say, staring into ${this} eyes.\n\n\t\t\t\tYou both head to the bed. Neither of you gets much sleep.\n\t\t\t\t*set rel_tracey %+20\n\t\t\t\t*achieve ach_sex\n\t\t\t\t*goto meet_jaden\n\t\t\t#Break off the kiss. Maybe next time.\n\t\t\t\tYou let the kiss linger for a moment, and then break it off. \"That's nice,\" you say, \"but I'm still really tired.\"\n\n\t\t\t\t$!{the} looks disappointed, but ${the} nods. \"Of course. I'll let you rest. Rain check?\"\n\n\t\t\t\t\"Rain check,\" you say.\n\n\t\t\t\t$!{the} smiles and packs up ${this} things before walking out, closing the door behind ${thim}. You make your way to bed, alone.\n\t\t\t\t*set tracey_there false\n\t\t\t\t*goto meet_jaden\n\t\t\t#Push ${thim} away.\n\t\t\t\tYou push ${thim} away as soon as the kiss starts. \"No,\" you say quietly. \"Please don't.\"\n\n\t\t\t\t$!{the} looks disappointed. \"I thought we—that you and I—\" $!{the} shakes ${this} head and laughs. \"You'd think I would have learned, huh?\"\n\n\t\t\t\t\"Tracey…\"\n\n\t\t\t\t\"No, it's okay,\" ${the} says, packing ${this} things. \"I should…I should go. I have to get some rest before tomorrow.\" $!{the} walks out, closing the door behind ${thim}.\n\n\t\t\t\tYou make your way to bed, alone.\n\t\t\t\t*set rel_tracey %-20\n\t\t\t\t*set tracey_there false\n\t\t\t\t*set tflirt false\n\t\t\t\t*goto meet_jaden\n\t*else\n\t\tTracey packs up ${this} things. \"Well, the story's done and out. I'm going to head back to my place and get something resembling sleep. We'll talk about next steps in the morning.\"\n\n\t\t\"Sure thing.\"\n\n\t\t$!{the} walks out, closing the door behind ${thim}, as you make your way to bed.\n\t\t*set tracey_there false\n\t\t*goto meet_jaden\n*else\n\tYou've had a full day, and you haven't even left your apartment. \"Gotta love telecommuting,\" you mutter, as you make your way back to bed.\n\t*goto meet_jaden\n\n*label meet_jaden\n*page_break\nA soft light pulses in your vision, slowly waking you from a deep sleep. Usually, your opticOS mutes all notifications when you enter REM sleep, but a priority call is waking you up. Blinking awake, you see the call is coming from Ambrosia Welltronics. You put the earpiece in and take the call.\n\n\"Good morning, ${pmister} ${pl_fullname}.\" The voice on the other end is soft, cold, and utterly professional. \"My employer, Mr. Jaden Sloane, would like to meet with you.\"\n\n\"Who is this?\" you ask.\n\n*if tracey_there\n\t\"There is a car waiting for you downstairs. Your partner is not invited, so please leave ${thim} behind. I suggest you hurry.\"\n*if tracey_there = false\n\t\"There is a car waiting for you downstairs. I suggest you hurry.\"\n*comment endif\n\nThe call terminates.\n*achieve ach_see_jaden\n*finish", "missingcorpse": "*comment Chapter Three\n*advertisement\n*text_image chap3.png\n\n[i]February 3rd, 2062. Later that day.[/i]\n\n\"The police stole a body?\" Tracey's voice is clear and distinct in your ear as you walk out of the INN building.\n\n\"That's what I heard,\" you say. \"Did you download the file of the call yet?\"\n\n\"Just came through now, boss, along with some additional notes from Maris,\" ${the} says. \"Give me a minute to parse it all.\"\n\nYou use your opticOS to pull up an app and hail a cab. After a moment, a green car pulls up to the curb in front of you, and you slide into the back seat. You press your thumb on the plate, reading the credit chip implanted there. A small indicator pops up in your opticOS display, showing your credit balance spin down slightly. The plate lights up with a question: \"Okay for driver to disrupt your privacy?\"\n\n*choice\n\t#Say yes. I don't mind talking to another person.\n\t\t\"How you doin', ${psir},\" comes a voice from the speaker in front of you. \"Name's Benedict, but you can call me Benny. Where can I take you?\"\n\n\t\tYou rattle off the address Early gave you, over on West 54th Street. Benny repeats it back, and you feel the cab pull away from the curb.\n\t\t*set chatty_cabbie true\n\t\t*goto cab_ride\n\t#Say no. I need to focus on this investigation.\n\t\tThe screen shows an additional prompt: \"Address?\"\n\n\t\tYou rattle off the address Early gave you, over on West 54th Street. The image is displayed on the screen, and you feel the cab pull away from the curb.\n\t\t*goto cab_ride\n\t#I don't have time for this. Tell the cab where I want to go so I can get back to work.\n\t\tYou rattle off the address Early gave you, over on West 54th Street. The image is displayed on the screen, and you feel the cab pull away from the curb.\n\t\t*goto cab_ride\n\n*label cab_ride\nYou watch the traffic out your window for a second before you hear Tracey's voice in your ear again. \n\n\"Okay, looks like the caller is a man named Ondrej Kovac,\" ${the} says. \"He's in his late 50s. Came over during the invasion of Slovakia, and has lived in Oldtown since. His wife passed away about ten years ago.\"\n\n\"And his daughter was a member of the West Coast Kings?\" you ask.\n\n\"Seems like it. Natasha Kovac. Went by Tasha, according to the records I have here.\"\n\n\"What?!\" The name surprises you, and you don't realize how loud your outburst is.\n\n*if chatty_cabbie\n\t\"Is there a problem back there?\" Benny asks through the grille.\n\n\t\"No, no problem,\" you say. \"Just got a surprising phone call.\"\n\n\t\"No worries, then. Just holler if you need anything.\"\n*if chatty_cabbie = false\n\t\"You might want to keep it down,\" Tracey says.\n*comment endif\n\nYou lower your voice. \"Are you sure about that name?\"\n\n\"As sure as I can be,\" Tracey says. \"Why? Did you know her?\"\n\n\"You could say that. She's the one who put me in the hospital.\"\n\nYou hear Tracey give a low whistle in your ear. \"Damn, boss. It's got to be hard to be objective about a story like that.\"\n\n*choice\n\t#\"It is, but we'll report the facts as we find them. It's not about me—it's about the story.\"\n\t\t\"That's a good attitude to have—keep things limited to the investigation.\"\n\t\t*set factual %+10\n\t\t*set rel_tracey %+10\n\t\t*goto cab_briefing\n\t#\"Are you kidding? It'll be an amazing story! The gangbanger who assaulted a reporter and got it in the end.\"\n\t\t\"Hadn't thought of it that way. It's a strong human-interest angle that can pull an audience into the truth of the case.\"\n\t\t*set factual %-10\n\t\t*set rel_tracey %+10\n\t\t*goto cab_briefing\n\t#\"Why be objective? I'll use her death to take my career where it needs to go. That'll be payback enough for what she did.\"\n\t\t\"Pretty coldhearted way of looking at it, but I can't fault your reasoning.\"\n\t\t*set ambition %+10\n\t\t*set rel_tracey %-10\n\t\t*goto cab_briefing\n\n*label cab_briefing\n\n\"What about her girlfriend?\" you ask. \"Her name was Maria, I think.\"\n\n\"I was just checking the main social media channels. Looks like they broke up soon after you went into the hospital. I'm reaching out to her to get a comment, but I think that's going to be a dead end.\"\n\n\"Great. What else do you have for me?\" you ask.\n\n\"Not a lot right now,\" Tracey says. \"Daddy made the call after the police told him they didn't have Tasha's body. He says he demanded to know what happened to it, but the cops stopped listening to his messages. So he called Early's hotline to see if he could get some justice that way.\"\n\nYou look out of the window again. Your opticOS display tells you the temperature is dropping outside. It seems like every winter gets colder and colder. \n*if ambition >= 65\n\t\"So if the police won't listen, call up the newsroom and hope some media exposure will get you a settlement, huh?\"\n\n\t\"I don't know if it's that cynical,\" Tracey says, \"but that's about the size of it. \n*if (ambition \u003c 65) and (ambition > 45)\n\t\"Maybe he felt like he had no other choice.\"\n\n\t\"Don't know for sure,\" Tracey says, \"but I think that's about the size of it. \n*if ambition \u003c= 45\n\t\"It seems like some days that's about the only justice you can get around here.\"\n\n\t\"I try not to be that cynical,\" Tracey says, \"but that's about the size of it. \n*comment endif\nHang on—I'm finally getting the feed from your eyes now.\"\n\n\"Great. I'll…\" You trail off as you notice the cab pulling to a halt. You're in a residential part of Oldtown, the area that used to be called South Los Angeles in the days before the Merger. The streets are full of pre-Merger houses that look like they're about to fall over. The one the cab is sitting in front of looks better than most—it's certainly not new, but someone's been repairing it, cleaning it, and generally doing what they can to keep it habitable.\n\n*if chatty_cabbie\n\t\"Here's your stop,\" Benny says through the speaker grille. \"Hope you find what you're looking for.\"\n\t*choice\n\t\t#\"What can you tell me about the area?\"\n\t\t\t\"I don't come down here much,\" Benny says. \"Most of the folks in Oldtown aren't exactly shelling out creds to take a cab, if you know what I mean. Though I hear the Kings have claimed a chunk of this area.\"\n\n\t\t\t\"Do you get a lot of problems with the gangs?\"\n\n\t\t\t\"Nah,\" Benny says. \"Once in a while a gangster will give me some lip, and I'll either give them some creds or a smack with my stick, depending on what colors they're flying. But in general they mind their business, and I mind mine.\"\n\n\t\t\t\"Thanks.\" You tap your thumb on the plate again to give him a tip, open the door, and get out.\n\t\t\t*achieve ach_cabbie\n\t\t\t*goto door_knock\n\t\t#\"Wait here for me.\"\n\t\t\tHe laughs. \"You crazy? This ain't no vid. You want me to pick you back up, I'll give you my number and you can call me back, but I ain't sticking around.\"\n\n\t\t\t\"Scared, Benny?\" you ask.\n\n\t\t\t\"It ain't about being scared. I have a tough time making ends meet as it is. If I ain't carrying a fare, I'm losing money, and I can't sit around waiting for someone.\"\n\n\t\t\t\"Thanks.\" You open the door and get out.\n\t\t\t*goto door_knock\n\t\t#Get out.\n\t\t\tYou open the door and get out. \"Don't hurt yourself thanking me or nothing,\" you hear behind you.\n\t\t\t*goto door_knock\n*else\n\tThe screen lights up again. \"You have arrived at your destination. Thank you for using Red-E Cab Services.\" You open the door and get out.\n\t*goto door_knock\n\n*label door_knock\nThe cabbie's number pops up in your opticOS as you walk away. You save it to your hard drive and hear the cab door close behind you with a soft purr. The frost on the grass crunches under your shoes as you walk up to the house. \n\nIt's a two-story home, with a small concrete porch and metal railings. The door looks solid, but you can see a couple of holes in the center where a knocker once stood. Beside the door is an old push-button doorbell, and there's a window on each side of the door. You don't see any security cameras or area sensors—you'll have to knock or ring the doorbell to get in. \n\n*fake_choice\n\t#Knock on the door.\n\t\tYou knock loudly on the door.\n\t#Ring the doorbell.\n\t\tYou push the doorbell button, but nothing seems to happen. Frustrated, you push it a few more times.\n\n\t\t\"The glamorous life of an investigative journalist. Eh, boss?\" Tracey says in your ear.\n\n\t\tWith no alternative, you knock loudly on the door.\n\t#Try to look in a window.\n\t\tYou glance at the window, and notice that it isn't polarized. \"This glass must have been around before the privacy laws,\" you mutter, trying to peer inside.\n\n\t\t\"Not a lot of reason for folks to upgrade to the latest and greatest down this way,\" Tracey says.\n\n\t\tThe interior is dark, and you can't make anything out except a few shadowy shapes. Ignoring the doorbell for the moment, you knock loudly on the door.\n*comment endif\n\nThe knock echoes in the house, and for a moment you don't hear anything. You debate knocking again when you think you make out the voice of someone muttering. A heavy chain slides behind the door, and it opens to reveal an older man with dark hair turning gray and soft brown eyes.\n\n\"Ondrej Kovac?\" you ask.\n\n\"Yes?\" he says, looking you over. \"Can I help you?\"\n\nYou show him your brand-new press pass. \"My name is ${pl_fullname}, and I'm a reporter for INN. I received your call and would like to ask you a few questions. Can I come in?\"\n\n\"Call?\" He looks confused for a moment, but then his face lights up. \"Oh! You must be one of Mr. Roberts's subordinates!\"\n\n*choice\n\t#\"That's right. I'm on the same team as Early Roberts.\"\n\t\t*if independence \u003c=40\n\t\t\t\"Wait until I tell my friends about this!\" he says enthusiastically.\n\t\t\t*set case2_marketShare +10\n\t\t\t*goto come_in\n\t\t*else\n\t\t\t\"Good, good,\" he says.\n\t\t\t*goto come_in\n\t#\"Actually, I'm just starting out as a reporter at INN, but I don't work with Early Roberts.\"\n\t\t*if factual >=60\n\t\t\t\"As long as I am on the news,\" he says, \"I am happy to tell my friends about meeting you.\"\n\t\t\t*set case2_marketShare +10\n\t\t\t*goto come_in\n\t\t*else\n\t\t\tHe looks concerned. \"I hope this means I still get to be on the news.\"\n\t\t\t*goto come_in\n\t#\"Not at all. I'm much more important than Early Roberts.\"\n\t\t*if ambition >=60\n\t\t\t\"Oh, another big shot reporter!\" he says enthusiastically.\n\t\t\t*set celebrity +10\n\t\t\t*goto come_in\n\t\t*else\n\t\t\t\"Oh, another big shot reporter!\" he says, but he sounds skeptical.\n\t\t\t*goto come_in\n\n*label come_in\n\nYou smile slightly at his comment. \n\n\"Where are my manners? Come in, come in.\" Ondrej opens the door wider and leads you down a hallway. You close the door behind you and follow him into his kitchen. There's a small table with peeling laminate and a couple of mismatched wooden chairs. The floor is covered in cracked tiles, which look like they've been meticulously repaired. The walls are similarly cracked and repaired. It's not modern, but the whole room looks clean and cared for. \n\nYou take one of the chairs, while Ondrej picks up a dented kettle and puts it under the sink's tap. \"How do you like your tea?\" Ondrej asks.\n\nYou spend the next few minutes on small talk, discussing the weather and the neighborhood while Ondrej makes the tea. Finally, he sets a steaming ceramic mug in front of you and takes the other chair at the table. \"Thank you,\" you say, sliding the mug closer to you. \"If you don't mind, I'd like to ask you some questions about the call you made. Is it okay if I record our conversation?\"\n\n\"Of course, please. I will answer whatever I can.\"\n\nYou mentally instruct your opticOS to start recording. Ondrej looks startled. \"Are your eyes okay?\" he asks.\n\n\"Oh, yes. I should have warned you. These are the electronic implants I use to record my interviews with.\"\n\nOndrej looks a little uncomfortable, but he nods. \"Go ahead.\"\n\nYou consider what you should ask Ondrej.\n\n*label questions\n*choice\n\t*disable_reuse #\"Tell me about your family.\"\n\t\tOndrej shrugs. \"There isn't much to say. I met my wife Patricia as we were fleeing Slovakia, after the invasion. We made a life here in New Angeles—I worked as a repairman, and she was a seamstress. We had a daughter, but Natasha never wanted to stay here. She always wanted to be rich and powerful.\" He sighs. \"That is how the gang got to her.\"\n\n\t\t\"Same old story,\" Tracey mutters. \"What a waste.\"\n\t\t*goto questions\n\t*disable_reuse #\"Who killed your daughter?\"\n\t\tOndrej slams his hand on the table. \"I don't know!\" A little bit of tea slops over onto the table, and he watches the liquid for a moment before leaning back in his chair, staring at the mug. \"I don't know,\" he says again, softly this time. \"I know she was shot with a gun. My neighbor told me, says he saw her, but by the time I got there, the police had already taken her.\" He stares at his mug a moment longer, and then gets up to grab a rag from the counter. He wipes up the tea, and puts the rag away before sitting back down. He gazes at the mug, silent.\n\n\t\t\"So you called the police,\" you say, prompting him.\n\n\t\t\"Yes, for all the good it did. They said that they never received any body. But I don't think they care much about murders out this way.\"\n\n\t\t\"What was the name of the person who saw it?\" you ask.\n\n\t\t\"Michael,\" Ondrej says, his voice tired. \"Michael Cooper.\"\n\n\t\t\"I'll research it,\" Tracey says in your ear.\n\t\t*set clue_neighbor true\n\t\t*goto questions\n\t*disable_reuse #\"Why do you believe the police have stolen her?\"\n\t\t\"It is…a rumor. Something I overheard.\" He looks down at the mug as he rotates it in his hands. \"Tasha would come home sometimes. Mostly she would ask for money, and then we would fight. But one night, a few weeks ago, she came back, and she wasn't yelling. And this concerned me.\"\n\n\t\t\"She was scared?\" you ask.\n\n\t\t\"I do not know if Tasha was ever scared of anything, but she was quiet. When I asked her about it, she said her friends had been dying. I started to tell her that her gang was dangerous, that she should come home, but when she looked at me, the words dried up in my mouth. Her eyes….\" Ondrej takes another sip of tea. \"Well, as I said. She was quiet when she told me.\"\n\n\t\t\"What did she tell you?\"\n\n\t\t\"That someone had been making the bodies of her friends disappear. She assumed someone was…selling them, maybe, or hiding them. She was the angriest I had ever seen her.\" He pointed to one of the larger cracks in the wall.\n\n\t\tSuddenly, you remember something from when Tasha confronted you outside the Warehouse: \"But someone has been killing Kings and making their corpses disappear…and now here you are, talking about Manny. For all I know, you two are the sick bastards behind it.\"\n\t\t*set clue_disappearance true\n\t\t*goto questions\n\t*disable_reuse #\"Who was the detective in charge of the investigation?\"\n\t\t\"The police said they didn't have anybody, but there was someone who was looking into all the gang killings,\" Ondrej says. \"Sloane, I think the name was. Detective Felix Sloane.\"\n\n\t\t\"I'll look the name up,\" Tracey says, as you start recording again.\n\t\t*set clue_detSloane true\n\t\t*goto questions\n\t*disable_reuse #\"Do you have anything you didn't hand over to the police?\"\n\t\tHe shakes his head and stares into his tea. After a moment, he looks up. \"Excuse me. Could you turn off your….\" He motions to your face.\n\n\t\t\"Off the record?\" you ask. Ondrej nods.\n\n\t\tYou hear Tracey's voice in your ear. \"I don't think you'll get anything without a show of trust, boss. I'll make sure to keep notes of everything that gets said.\"\n\n\t\tYou nod, and mentally tell your opticOS to stop recording. Ondrej smiles, looking relieved.\n\n\t\t\"Thank you,\" he says. \"There is one thing, but I would not want to get someone in trouble.\" Ondrej opens up the doors under his sink, and reaches up to the top of the compartment. There's a faint ripping sound, and he pulls out an envelope with tape dangling from all four corners. \"This is something I asked my neighbor to make a copy of, just in case the police were…uncooperative.\"\n\n\t\t*if clue_neighbor\n\n\t\t\t\"You mean Michael Cooper?\"\n\n\t\t\tOndrej nods and opens the envelope, dumping the contents onto the table.\n\t\t*if clue_neighbor = false\n\t\t\tHe opens the envelope and dumps the contents onto the table.\n\t\t*comment endif\n\n\t\tYou haven't seen a photo taken with camera film in a long time—since before the privacy laws. It looks new, but the device that took it has to be at least thirty years old, if not more. The picture, however, sends chills down your spine: Tasha, with a bullet hole in her head.\n\n\t\tPushing your emotions aside, you carefully pick up the picture, making sure you can see every edge of it. You signal the opticOS to capture the image, and file it away in your hard drive.\n\n\t\t\"Thank you,\" you say, handing the picture back. Ondrej's hand trembles slightly as he slides it back in the envelope and puts it back under the sink.\n\n\t\t\"I'll run an analysis on the image,\" Tracey says in your ear, ${this} voice soft.\n\t\t*set clue_photo true\n\t\t*goto questions\n\t#\"That's all the questions I have.\"\n\t\t\"That's all the questions I have,\" you say.\n\n\t\t*if (clue_photo = false)\n\t\t\t\"Are you sure, boss?\" Tracey asks. \"Maybe you should ask a few more questions before we go?\"\n\t\t\t*goto questions\n\t\t*else\n\t\t\t\"Yeah, I think we have enough to go on now,\" Tracey says.\n\t\t\t*goto done_asking\n\n*label done_asking\n\nOndrej finishes his tea and stands up. \"Thank you. I hope that was useful.\"\n\n\"I think so,\" you say, standing up and offering your hand. \"Me or my partner will give you a call if we need anything else.\" Ondrej shakes your hand firmly, and you step back outside.\n\n*page_break\nYou pull up the cabbie's number and signal for a ride. \"We should meet to go over the case,\" Tracey says. \"How about at Coffee Coffee? It's a couple of blocks from INN.\"\n\n\"Why a coffeehouse? Let's just meet in Maris's studio.\"\n\nTracey makes a disgusted noise in your ear. \"I don't want Early catching wind of this and stealing the story back from us. So let's use Coffee Coffee as a meeting place until you get your own office to work out of. Besides,\" ${the} adds, \"I could murder a chai.\"\n\n\"Sounds good,\" you say. Tracey beams you the address as the cab pulls up.\n\n*page_break\nCoffee Coffee is one of the dozens of independent coffee shops that seem to come and go all the time in downtown NA. This one has been around for five years, making the quaint and colorful brick building practically a staple of the area. \n\nThe doors open as you enter the sensory field, revealing a riot of color. Along the left side is a long bar and serving area. The surface is painted in a wide variety of styles, all clashing and competing with each other. Bar stools sit in front of it, each painted in a different color. The rest of the main area is a collection of wildly different tables with two or four chairs around them, and a set of mismatched booths along one wall.\n\nTracey waves at you from one of the booths, and you sit down across from ${thim}. \n\n*page_break\n*achieve ach_coffee\n$!{the} has a tablet in front of ${thim}, as well as a steaming mug of chai and a small electronic device that looks like a hockey puck with a large button set in the middle of it.\n\n\"This isn't exactly the most secure place to meet,\" you say, as Tracey takes a sip of the chai.\n\n$!{the} motions at you to sit down as ${the} swallows the sip. \"It's the best place to meet, you mean,\" ${the} says. \"No one would think that any reporter would be stupid enough to talk about their story in the middle of a coffee shop.\"\n\n\"That's because talking about my story in the middle of a coffee shop [i]is[/i] stupid.\"\n\n\"Sure, if you didn't have one of these.\" $!{the} pats the device, smiling. \"I took one of the anti-recording devices sitting around in IT, stripped it down, and made this. Push the button, and it sends out white noise outside a three-foot range. Anyone not sitting at the table won't be able to hear anything we say.\"\n\nYou look at the device dubiously. \"What about lipreading?\" you ask.\n\nTracey's smile falters. \"Uh…cover your mouth while you talk, I guess?\"\n\nYou shake your head. \"It'll do. Crank it up and tell me what you have.\"\n\n*page_break Tracey Pushes the Button\nTracey pushes the button and slides the tablet over to you. \"First, I was able to make a few deductions from this picture, combined with what little data I could get from the public police files. The first is that the bullet was small caliber.\"\n\n*if clue_caliber\n\t\"Wait a minute,\" you say, looking at the picture. \"Kollross was also killed with a small-caliber bullet.\"\n\n\tTracey blinks in surprise. \"Really? But gangs don't generally usually use small caliber guns. They tend to go with something…bigger.\"\n\n\tYou look over the image again. \"What's more, it was the same kind of shooting: once in the head.\"\n\n\t\"So you think there's a connection,\" ${the} says.\n*if clue_caliber = false\n\t\"What's significant about that?\"\n\t*if clue_disappearance\n\n\t\tTracey smirks. \"Nothing, until you mentioned it being related to your old case. I took the liberty of pulling up the video of the Kollross story. He was killed with a gun of the same or very similar caliber, and the method of the murder is identical: one bullet to the head, with no signs of a struggle.\"\n\t\t*set clue_caliber true\n\t*if clue_disappearance = false\n\n\t\tTracey smirks. \"Nothing, at first. But when I noticed both were members of the West Coast Kings, I took the liberty of pulling up the video of the Kollross story. He was killed with a gun of the same or very similar caliber, and the method of the murder is identical: one bullet to the head, with no signs of a struggle.\"\n\n\t\t\"So you think the cases are connected,\" you say.\n\n\t\t\"Don't you?\" Tracey asks.\n\n\t\tSuddenly, you remember something Tasha told you when you confronted her outside the Warehouse: \"But someone has been killing Kings and making their corpses disappear…and now here you are, talking about Manny.\"\n\t\t*set clue_disappearance true\n\t\t*set clue_caliber true\n*comment endif\n\n\"Let's assume the murderer in both cases is the same, or near enough,\" you say. \"Further, I think the police know that there's a connection.\"\n\n*if clue_detSloane = false\n\t\"Speaking of which,\" Tracey says, taking the tablet back and tapping on the screen a few times. \"One of the things I was able to find out was who the assigned detective was on both cases.\" $!{the} hands you the tablet again, with a picture of a middle-aged man on the screen and some biographical data below it. \"Detective Felix Sloane.\"\n\n\tYou glance at the screen. \"Well, now we have another lead. Assuming he'll talk to us.\"\n\t*set clue_detSloane true\n*comment endif\n\n\"Sloane either didn't connect these cases because he's a terrible detective, or he's covering something up,\" Tracey says.\n\n*page_break\nYou look around the coffee house. People are milling around, sipping at drinks and staring off into the distance as they gaze at the inside of their netglasses. No one seems to be paying attention to you.\n\n\"No offense to your device, but I'm not comfortable talking about this here.\" You hand the tablet back to Tracey. \"Is there anything else about this picture I need to know?\"\n\n*if clue_neighbor\n\t\"That's it, boss.\"\n*if clue_neighbor = false\n\t\"Just one more thing,\" ${the} says, tapping at the tablet one more time. \"I was able to skim the records of the network traffic in the area around the time of the murder, and I think I know who called 911: a man named Michael Cooper.\"\n\n\t\"Who's he?\" you ask.\n\n\t\"Cooper and his husband used to run a place a little north of here: Cooper Family Body Shop. Husband's dead, and Michael had an accident that blinded him in one eye, so he sold the business and retired. He lives pretty comfortably for a guy who used to replace and paint people's bumpers for a living.\"\n\n\t\"You have an address?\"\n\n\t\"Sending it to you now.\" $!{the} taps his tablet again, and you see an address pop up in your field of vision. You save it to your hard drive.\n*comment endif\n\n*choice\n\t#\"Nice work. Your insights really helped me out.\"\n\t\t*set rel_tracey %+10\n\t\t*set independence %-10\n\t\t*if (tr_gender_f = false) and (pl_likesmen = true)\n\t\t\tHe blushes. \"Thanks, boss. I'm glad you noticed.\"\n\t\t\t*goto coffee_cab\n\t\t*if (tr_gender_f = true) and (pl_likeswomen = true)\n\t\t\tShe blushes. \"Thanks, boss. I'm glad you noticed.\"\n\t\t\t*goto coffee_cab\n\t\t*else\n\t\t\t$!{the} smiles. \"Thanks, boss. I'm glad you noticed.\"\n\t\t\t*goto coffee_cab\n\t#\"Good thing my hard work on the last story paid off.\"\n\t\t\"Yeah,\" ${the} says, sarcastically. \"It was all you.\"\n\t\t*set rel_tracey %-10\n\t\t*set independence %+10\n\t\t*goto coffee_cab\n\t#\"A story about police corruption could really help me make my mark.\"\n\t\t\"I'm happy these murders could help your career,\" ${the} says, sarcastically.\n\t\t*set rel_tracey %-10\n\t\t*set ambition %+10\n\t\t*goto coffee_cab\n\t#\"We'll follow this to the end, no matter how it turns out.\"\n\t\t\"Good to hear, boss. I've got your back.\"\n\t\t*set rel_tracey %+10\n\t\t*set ambition %-10\n\t\t*goto coffee_cab\n\n*label coffee_cab\nYou get up from the booth and walk to the door, pulling up the cabbie's number as you do. Within a few minutes, the cab pulls up, and you slide into the back seat.\n\n*if chatty_cabbie\n\t\"Welcome back, ${pmister} ${pl_lname},\" Benny says. \"Where to now?\"\n*if chatty_cabbie = false\n\tThe plate lights up, asking you for an address.\n*comment endif\n\nYou give the address to Michael Cooper's apartment.\n*finish", "runningfromkings": "*comment Chapter One\n*advertisement\n*temp angel_here true \n*temp run_from_gang 0\n*text_image chap1.png\n\n[i]New Angeles. October 18th, 2061.[/i]\n\nYou feel your heart hammering in your chest as you run down the street, the rain pelting your face. The streetlights on this block burned out long ago, and you scan the dim scene for any sign of escape. You hear Angel, your camera operator, breathing heavily behind you as he splashes gritty rainwater all over your shoes. Screams and laughter echo in the background as the gang members chase after you. \n\nSuddenly, a dark alleyway appears on the right, a dark passage swallowed in darkness. You grab Angel's arm and yank him into the shadows. The taunts of your pursuers bounce off the concrete as you run blindly. They sound like they're all around you. \n\nA flash of lightning, and you can see for a split second. The alleyway continues straight ahead in the gloom. There's a branch to the left, which leads out to the lights of the main road, and maybe to safety. There's also a huge recycling bin against one wall.\n\n*choice\n\t#Keep running straight ahead as fast as possible.\n\t\tYou pour on the speed, hoping to outrun your pursuers.\n\t\t*temp run_from_gang 0\n\t\t*goto following_you\n\t#Cut to the left, hoping that the lights mean there are other people around.\n\t\tYou take the alley to the left, trying to get to safety.\n\t\t*temp run_from_gang 1\n\t\t*goto following_you\n\t#Dive into the recycling bin, hoping the gang will pass me by.\n\t\tYou open the recycling bin and let Angel get in first, before climbing in after him and closing the lid.\n\t\t*temp run_from_gang 2\n\t\t*goto following_you\n\n*label following_you\n\"Hey! There's nothing to be afraid of!\" you hear behind you. \"We just want to talk!\" But you know they're mocking you, and the loud cackling that follows tells you this is just a game to them. A game you're not sure either you or Angel are going to win.\n\nIt shouldn't be like this. You're a reporter with your whole career ahead of you. This should have been your biggest story, your break into the major news networks. No more stories like…\n\n*choice\n\t#The latest synthetic organ failure statistics.\n\t\t*set factual %+10\n\t\t*goto skill\n\t#Who's sleeping with whom in the local celebrity scene.\n\t\t*set factual %-10\n\t\t*goto skill\n\t#The local traffic reports, even if they get my face on screen.\n\t\t*set ambition %+10\n\t\t*goto skill\n\t#Lost pets being reunited with their owners.\n\t\t*set ambition %-10\n\t\t*goto skill\n\n*label skill\nThis was real, hard-hitting investigative journalism—a chance to investigate a murder. This story would have made you a rising star, known for your…\n\n*choice\n\t#Investigative instincts.\n\t\t*set investigation %+15\n\t\t*goto go_wrong\n\t#Charisma and personality.\n\t\t*set charm %+15\n\t\t*goto go_wrong\n\t#Polished production skills.\n\t\t*set technique %+15\n\t\t*goto go_wrong\n\n*label go_wrong\nInstead, you're running for your life from some members of one of the most dangerous gangs in NA: the West Coast Kings.\n\nAnd it all started to go wrong when you bluffed your way onto a crime scene.\n\n*page_break Earlier\nThe NAPD officer standing in front of the alleyway holds your press pass like it's covered in filth. A few tentative raindrops splatter on the thick plastic card as she carefully reads the scrolling text. Even on a cloudy afternoon she wears dark, police-issue netglasses that manage to hide her expression. You notice a small flash where the glasses don't quite meet her face, as she checks the credentials and biometrics embedded in the card against the police files on the network. Angel holds his camera to his side as he glances into the alleyway, the far end blocked off by crisscrossing plastic yellow tape.\n\nYou try to look bored, but you imagine dozens of scenarios in which your altered pass is discovered as a forgery. It's mostly authentic—the only thing you added to your file was full investigative reporter access so you could legally record with a licensed device. But it's enough to get you and Angel fined, fired, and maybe even put in jail. You hope the data holds out long enough to fool the officer before the hacked files force the card to reboot.\n\nAn eternity goes by before she hands the pass back. You notice the nameplate on her shirt: [i]Murray[/i]. \"Your pass checks out, but I can't let your partner do any recording of the crime scene. Detective's orders.\"\n\n*choice\n\t#\"Is there a problem? I'm happy to help, as a concerned citizen.\"\n\t\tThe officer stares at you. Behind her netglasses, you can't tell if she's pissed or bored. \"There's no problem. I'm not allowed to let anyone document or disturb the crime scene until the detective gets here, even if you have a privacy license.\"\n\t\t*set ambition %-10\n\t\t*goto no_access\n\t#\"Look, this is a big story for me. What will it take to get you to let me in?\"\n\t\tThe officer frowns at you. \"Look, I'm not allowed to let anyone document or disturb the crime scene, even if you have a privacy license. You just need to be patient until the detective gets here.\"\n\t\t*set ambition %+10\n\t\t*goto no_access\n\t#\"He'll just need two minutes to get some footage, and then we'll both be out of your hair.\"\n\t\tThe officer sighs. \"Look, I'm not allowed to let anyone document or disturb the crime scene right now, even if you have a privacy license. I'm sure you'll both have access once the detective gets here.\"\n\t\t*set independence %-10\n\t\t*goto no_access\n\n*label no_access\n\nThat's not good. You walk around the corner, away from Officer Murray. Angel follows you, the raindrops clinging to his worn leather jacket.\n\nYou're a journalist for a startup vlogging network, and your news director is constantly telling you that you need compelling video. \"Text is dead,\" he always says. \"People want to see the news, raw and bloody on their screens.\" That's why the press pass was so important: ever since portable devices became ubiquitous, the privacy laws around netglasses, tablets, and even ancient smartphones have turned draconian. Only hardwired devices coded to someone with an authentic license, like a reporter, are allowed to save video captured by camera. And if you don't have video, you don't have a story. \n\nNow, it seems like it was all for nothing. Worse, if the detective comes, they'll be able to do a more thorough scan of your credentials, and that'll be the end of your investigation into the murders. This is the third killing of a member of the West Coast Kings in as many days. The NAPD haven't been spending a lot of time on the deaths, probably because they assume the crimes are all gang-related—you've been watching Officer Murray guard the alley for over an hour, waiting for the detective to bother to visit the crime scene. At some point, though, the police could decide that the murders are something more than just gangland violence. If you can air your story before that happens, you'll have the scoop, which would be a huge boost to your market share, and that would mean a big rise in your credibility and your paycheck. Vlog 23 will overlook some fudged credentials and a few misdemeanors once the ad revenue and clickthroughs roll in. \n\n*page_break\nThere's no way around it: you have to get some footage for the story. Angel's camera is huge by modern standards, but it still fits in his hand or his pocket easily enough. You could sneak the camera onto the scene yourself, or you could convince the officer to step aside and let you both in.\n\n*choice\n\t#Take the camera from Angel, hide it, and tell Officer Murray I'll enter the crime scene alone without a camera.\n\t\tYou explain your plan to Angel. \n\n\t\t\"If anything happens to that camera,\" he says, \"it comes out of my paycheck.\"\n\n\t\t\"Just give it to me!\" you snap in frustration.\n\n\t\tHe grumbles and gives you the camera, and you hide it in your pocket. Both of you walk back, and you catch Officer Murray's attention. \"I'll just go ahead and enter by myself, without my camera operator.\"\n\n\t\tThe police officer frowns and looks at Angel, who mutters, \"I'll meet you around back when you're done.\" He walks off, and Murray watches him go. \n\n\t\tAfter a long moment, Murray steps aside, letting you in to the alleyway. \"Be quick,\" she mutters.\n\t\t*set independence %+10\n\t\t*temp angel_here false\n\t\t*goto crime_scene\n\t#Tell Officer Murray that I got permission from the detective already, and that we will start filming while she calls it in.\n\t\t\"I already have permission from the detective. Why don't you call it in while my partner and I get started?\"\n\n\t\tOfficer Murray frowns. \"Stay right here,\" she mutters, and steps away to call the detective. Once she looks away, you motion to Angel, and you both walk into the alleyway as if you have every right to be there.\n\t\t*set factual %-10\n\t\t*goto crime_scene\n\t#Explain to Officer Murray that I just want the family of the victim to know the truth of what happened.\n\t\t\"I just want the family of the victim to know the truth. I'm not here to sensationalize anything or disrupt the investigation.\"\n\n\t\tOfficer Murray seems to debate it for a long moment, but finally she sighs and steps aside. \"I'm sick of waiting anyhow. Be quick, both of you,\" she mutters.\n\t\t*set factual %+10\n\t\t*goto crime_scene\n\n*label crime_scene\n\nYou walk down the alleyway and step under the tape. \n*if angel_here\n\tAngel follows you. Standing on the other side, he turns the camera on and starts recording as you examine the scene.\n*if angel_here = false\n\tPulling the camera out and turning it on, you start recording as you examine the scene.\n*comment endif\n\nThe alleyway opens onto a concrete courtyard, surrounded on all sides by old, crumbling brick apartment buildings. They were new back when people still thought something could be done about climate change. Faded lines on the pockmarked concrete reveal the ghost of a basketball court, although the hoops are long gone. Circling the court you see short, flimsy plastic barricades with \"CRIME SCENE\" printed on the side. Looking over the barricades, you see some small plastic pyramids. They're net markers that track who enters and leaves the scene, as well as the locations of evidence. They record a variety of data so the police can recreate the scene digitally after it's cleaned up.\n\nIn the center of the court is the corpse of a young man, facedown. He's dressed in a New Angeles Hawks jersey and dark jeans. Blood has pooled around his body. A few of the people who live here peek out of windows or loiter around the edges of the courtyard, watching you.\n\nYou probably have only a few minutes before the detective arrives on the scene. What do you focus on?\n\n*choice\n\t#Gather clues from the scene.\n\t\tCareful to avoid touching anything, you put on your netglasses and examine the body. The police markers pop up the name of the victim: Manny Kollross, Caucasian, age 17. Busted for a number of petty crimes, and believed to be affiliated with the West Coast Kings. There's a small exit wound in his back, likely from a small-caliber gun—a little unusual, since most of the local gangsters prefer larger weapons to make sure what they shoot remains dead. You look around, but you don't see a gun in his hand or evidence of a struggle. One shot, and he was dead.\n\n\t\tGiven the exit wound and the lack of evidence, it's possible that he was shot suddenly. Probably by someone he knew.\n\n\t\tYou check the netglasses again to see where Kollross spent his money the past few days—maybe learning where he hangs out will help you find who knew him and wanted him dead. One place comes up over and over: The Warehouse, a nightclub about a dozen blocks from here. You save the directions to The Warehouse to your netglasses' memory.\n\t\t*set investigation %+15\n\t\t*set clue_caliber true\n\t\t*goto angel_sees_early\n\t#Talk to one of the witnesses.\n\t\tYou manage to get the attention of an elderly man. He eyes you warily.\n\n\t\t\"Nice night,\" you say.\n\n\t\t\"Not for some of us,\" he says, glancing meaningfully at the victim.\n\n\t\t\"Did you know him?\" you ask.\n\n\t\t\"Manny Kollross,\" the man says, warming up to the topic. \"I saw him around. Had a cup of fauxcaf with his mother once. He hung around with that gang, the Kings.\" He snorts. \"He weren't no king, I can tell you that for free. Just a punk barely old enough to drive. Broke his mother's heart.\"\n\n\t\t\"Did you see what happened?\" you ask.\n\n\t\tHe shrugs. \"I was watching the news when I heard a loud bang. Just the one. By the time I looked out, he was already dead.\"\n\n\t\tJust one shot? That means he didn't have a chance to return fire. Maybe he was shot by someone he knew.\n\n\t\t\"Do you know where he spends his time?\" you ask.\n\n\t\t\"All those punks go to that club down the way. The Warehouse, I think it's called.\" He snorts and heads back into the building. \"Whole damn club is pretty much owned by that gang,\" he mutters. \"Someone should do something.\"\n\n\t\tYou look up the directions to the club and save them to the netglasses' memory. Something to look into later.\n\t\t*set charm %+15\n\t\t*goto angel_sees_early\n\t#Look for the best camera shots and start recording my voice-over.\n\t\t*if (angel_here)\n\t\t\tYou direct Angel to take in the most dramatic angles of the scene. \n\t\t*if angel_here = false\n\t\t\tYou focus the camera on the most dramatic angles of the scene.\n\t\tAs you do, you start narrating the shots. Checking your own netglasses, you get some dry facts: Manny Kollross, Caucasian, age 17. Just a kid. You talk about the loneliness of the courtyard, the smell of the blood, the echoing sounds all around you. You put yourself in Manny's shoes, telling your audience what the young man must have felt in those last few moments. You realize as you frame the scene that he was probably surprised when he died, killed by someone he knew or trusted.\n\n\t\tYou check the netglasses again to see where Kollross spent his money the past few days—maybe digging up where he hangs out will help you find who knew him and wanted him dead. One place comes up over and over: The Warehouse, a nightclub about a dozen blocks from here. You have your netglasses save the directions to the club.\n\t\t*set technique %+15\n\t\t*goto angel_sees_early\n\n*label angel_sees_early\n*if angel_here\n\n\tAs you consider your next step, Angel points to the alleyway. \"Someone's coming,\" he says. \"And I don't think he's a cop.\"\n\t*goto early_arrives\n*else\n\n\tAs you consider your next step, you see Angel running up, pointing to the alleyway. \"I snuck through one of the buildings,\" he says, out of breath. He takes the camera back from you. \"Someone's coming, and I don't think he's a cop.\" \n\t*temp angel_here true\n\t*goto early_arrives\n\n*label early_arrives\n*page_break\n*set met_early true\nThe man who walks up doesn't look like a police detective. He's smoking some kind of dark cigarette, and wearing a tasteful black trench coat that repels the occasional raindrop like a jealous bouncer at a strip club. The suit underneath is gunmetal gray and looks more expensive than one of the nearby apartment buildings. He has unusually pale skin for California, but his short blond hair is teased in the latest NA style.\n\nBut all that pales in comparison to his eyes. They're as gray as the suit he's wearing, but as he gets closer you can see that they're implants. When he looks around the scene, they twitch in sharp, controlled movements. The left one glows slightly, and the right one has a faint red dot in the center that blinks occasionally. If his suit is expensive, his eyes are probably worth a year of your salary.\n\nHe steps up and smiles, his teeth perfectly white and symmetrical. \"Great, another newbie. Let's trade information so you can realize this is my turf and go away.\" The lights in both eyes fade as he pulls out his press pass and shows it to you. The card is clearly a newer model than your own, and the scrolling text reads \"Erlendur Robertsson, Senior Investigative Reporter, International News Network.\" \n\nHe puts it away and looks you up and down. \"Are you going to show me yours, or are you too awestruck at being this close to a real reporter?\"\n\n*choice\n\t#Doesn't matter what some guy thinks; I [i]am[/i] a real reporter.\n\t\t\"I'm a real reporter as well, actually,\" you say, offering the pass.\n\n\t\t\"Of course you are,\" he says before looking at it. He smiles and looks back at you. \"I can tell you're new at this.\"\n\t\t*set ambition %+10\n\t\t*goto press_pass\n\t#A new reporter, huh? Maybe we can share resources.\n\t\t\"Maybe I can help you out,\" you say, offering the pass.\n\n\t\t\"Let's not be hasty,\" he says before looking at it. He smiles and looks back at you. \"Besides, looks like you need some help yourself.\"\n\t\t*set independence %-10\n\t\t*goto press_pass\n\t#Great, someone here to steal my scoop. Play nice until I can ditch him.\n\t\t\"I was here first,\" you say, offering the pass.\n\n\t\t\"First only matters when the story is filed,\" he says before looking at it. He smiles and looks back at you. \"Are you sure you're even supposed to be here?\"\n\t\t*set independence %+10\n\t\t*goto press_pass\n\n*label press_pass\n\n\"What do you mean?\"\n\nHe laughs. \"Your press pass is blank.\"\n\nConfused, you flip your pass over to look at it. Damn. The pass has rebooted and now shows a blank surface. Ignoring the reporter's smirk, you press and hold against the face of the thick plastic of the card until it chirps, allowing it to read your biometrics. After a moment, text scrolls across the card, along with some touch-sensitive options.\n\n\"Reset to default or input new personal data?\"\n\n*choice\n\t#Reset to default.\n\t\t*set pl_gender \"f\"\n\t\t*set pl_fname \"Michelle\"\n\t\t*set pl_lname \"Flynn\"\n\t\t*goto scoop\n\t#Input new personal data.\n\t\t*goto gender\n\n*label gender\n\"What gender do you identify as?\"\n*choice\n\t#Male.\n\t\t*set pl_gender \"m\"\n\t\t*set phe \"he\"\n\t\t*set phim \"him\"\n\t\t*set phis \"his\"\n\t\t*set phimself \"himself\"\n\t\t*set pman \"man\"\n\t\t*set psir \"sir\"\n\t\t*set pboy \"boy\"\n\t\t*set pmister \"Mr.\"\n\t\t*goto fname\n\t#Female.\n\t\t*set pl_gender \"f\"\n\t\t*goto fname\n\t#Nonbinary.\n\t\t*set pl_gender \"n\"\n\t\t*set phe \"they\"\n\t\t*set phim \"them\"\n\t\t*set phis \"their\"\n\t\t*set phimself \"themself\"\n\t\t*set pman \"person\"\n\t\t*set psir \"comrade\"\n\t\t*set pboy \"kid\"\n\t\t*set pmister \"Mx.\"\n\t\t*goto fname\n\n*label fname\n\"What is your first name?\"\n*choice\n\t*if pl_gender = \"f\"\n\t\t#Jane.\n\t\t\t*set pl_fname \"Jane\"\n\t\t\t*goto lname\n\t\t#Michelle.\n\t\t\t*set pl_fname \"Michelle\"\n\t\t\t*goto lname\n\t\t#Sarena.\n\t\t\t*set pl_fname \"Sarena\"\n\t\t\t*goto lname\n\t\t#Tamika.\n\t\t\t*set pl_fname \"Tamika\"\n\t\t\t*goto lname\n\t\t#Choose my own name.\n\t\t\t*input_text pl_fname\n\t\t\t*goto lname\n\t*if pl_gender = \"m\"\n\t\t#John.\n\t\t\t*set pl_fname \"John\"\n\t\t\t*goto lname\n\t\t#Michael.\n\t\t\t*set pl_fname \"Michael\"\n\t\t\t*goto lname\n\t\t#Nikolai.\n\t\t\t*set pl_fname \"Nikolai\"\n\t\t\t*goto lname\n\t\t#Tyronne.\n\t\t\t*set pl_fname \"Tyronne\"\n\t\t\t*goto lname\n\t\t#Choose my own name.\n\t\t\t*input_text pl_fname\n\t\t\t*goto lname\n\t*if pl_gender = \"n\"\n\t\t#Hayden.\n\t\t\t*set pl_fname \"Hayden\"\n\t\t\t*goto lname\n\t\t#Jessie.\n\t\t\t*set pl_fname \"Jessie\"\n\t\t\t*goto lname\n\t\t#Rowan.\n\t\t\t*set pl_fname \"Rowan\"\n\t\t\t*goto lname\n\t\t#Shannon.\n\t\t\t*set pl_fname \"Shannon\"\n\t\t\t*goto lname\n\t\t#Choose my own name.\n\t\t\t*input_text pl_fname\n\t\t\t*goto lname\n\n*label lname\n\"What is your last name?\"\n*choice\n\t#Doe.\n\t\t*set pl_lname \"Doe\"\n\t\t*set pl_fullname (pl_fname&\" \")&pl_lname\n\t\t*set pl_named true\n\t\t*goto scoop\n\t#Flynn.\n\t\t*set pl_lname \"Flynn\"\n\t\t*set pl_fullname (pl_fname&\" \")&pl_lname\n\t\t*set pl_named true\n\t\t*goto scoop\n\t#Ilyin.\n\t\t*set pl_lname \"Ilyin\"\n\t\t*set pl_fullname (pl_fname&\" \")&pl_lname\n\t\t*set pl_named true\n\t\t*goto scoop\n\t#Rodriguez.\n\t\t*set pl_lname \"Rodriguez\"\n\t\t*set pl_fullname (pl_fname&\" \")&pl_lname\n\t\t*set pl_named true\n\t\t*goto scoop\n\t#Choose my own last name.\n\t\t*input_text pl_lname\n\t\t*set pl_fullname (pl_fname&\" \")&pl_lname\n\t\t*set pl_named true\n\t\t*goto scoop\n\n*label scoop\n*achieve ach_presspass\n\"${pl_fullname}. Reporter, Vlog 23. Angel Mendez, Camera Technician, Vlog 23.\" The press pass chirps a second time, and you show it to the INN reporter again. \n\nHe glances at it and rolls his eyes. \"Great, the town blogger. Step aside, ${pboy}, and let a pro handle this.\" He drops his cigarette and grinds it out with the sole of his 500-credit shoes. Paper cigarettes, not the electronic kind. Very retro. Very expensive. \n\nThe reporter starts to push past you, but Angel steps in front of him. \"Listen here, Robertsson…\"\n\nHe pokes a finger in Angel's chest. \"Don't let the name on the pass distract you, fossil. I go by Early Roberts now, and I didn't move here from Iceland to put up with the local news team stomping all over my story.\"\n\nAngel's hands clench into fists. \"Who are you calling a fossil? I'm the same age as you are.\"\n\nEarly snorts. \"And you're already outdated.\" He taps his temple. \"These babies are the wave of the future. No licensed cameras to get lost or broken. No worries about network failures or bad cloud backups. I've got optical and aural implants that record everything I see and hear, and it all gets saved to a redundant backup in my head. I'm my own camera crew, which means I don't have to worry about dragging some half-trained monkey around with me everywhere I go just to get around some outdated privacy laws.\"\n\n*choice\n\t#\"It's always good to have a second pair of hands when working a story.\"\n\t\tEarly raises his hands. \"Hey, if you're okay with wearing a suit of armor while trying to swim, it's your call. Me, I want to be as sleek and fast as I can.\"\n\t\t*set independence %-10\n\t\t*set rel_early %-10\n\t\t*goto work_together\n\t#\"Aren't those illegal here? The implants are cool, but I don't know if I would risk my job over them.\"\n\t\tEarly shrugs. \"Don't know. Don't care. Better for me if it isn't legal, honestly—I can keep running on the bleeding edge while all you locals live in the Stone Age.\"\n\t\t*set ambition %-10\n\t\t*goto work_together\n\t#\"Implants like those must be great to record things instantly.\"\n\t\tEarly smiles. \"It's not as easy as you might think, particularly trying to record discreetly. I can record without the lights, but the footage gets grainy when I do, especially at night. Still, it's better than the alternative of lugging around a privacy-licensed brick.\" He looks meaningfully at Angel, whose lip curls into a snarl.\n\t\t*set ambition %+10\n\t\t*set rel_early %+10\n\t\t*goto work_together\n\t#\"I'll just have to rely on actual talent. Your funky eyes don't suddenly make you a good reporter.\"\n\t\tEarly laughs. \"True, but they make a great reporter even better. I can stay focused on the story, instead of having to lug around a privacy-licensed brick.\" He looks meaningfully at Angel, whose lip curls into a snarl.\n\t\t*set independence %+10\n\t\t*set rel_early %-10\n\t\t*goto work_together\n\n*label work_together\n\n\"Look,\" you say, trying to change the subject, \"we need to get back to our story before the police kick us out of the area.\"\n\nEarly pulls a pack of cigarettes out of his coat pocket and puts another one to his lips. \"Kick [i]you[/i] out, you mean. I got permission from the detective for the case before coming over. Take your appendage here before you go, and let me get on with my work.\" He blinks, and the lights in his eyes come back on. \"Unless you have a lead for me?\"\n\nGreat, now he's even recording his conversation with you. Since you're a licensed reporter, it's assumed that you consent to the recording in a professional context like this.\n\n*choice\n\t#Offer to exchange information with him, so I can get the facts and report accurately.\n\t\t\"I did some initial work and research. I can have it all beamed over to your glasses.\" You wave your hand at his face. \"Or whatever you have in there.\"\n\n\t\tEarly raises an eyebrow. \"What do you want for it?\"\n\n\t\t\"Just to make sure the facts are right,\" you say.\n\n\t\tHe lights his cigarette, and takes in a big lungful of smoke before replying. \"Don't bother. I already got the information I needed as I was walking over here. But only a sucker gives anything away for free.\" \n\t\t*set factual %+10\n\t\t*set rel_early %-10\n\t\t*goto nightclub\n\t#Sell him what I have.\n\t\t\"I did some initial work and research. I can have it all beamed over to your glasses.\" You wave your hand at his face. \"Or whatever you have in there. That is, if you've got the credits.\"\n\n\t\tEarly laughs. \"How much do you want?\"\n\n\t\t\"Make me an offer,\" you say.\n\n\t\tHe lights his cigarette, and takes in a big lungful of smoke before replying. \"Good instincts, ${pl_lname}. You shouldn't give anyone anything for free. But I already got the information I needed as I was walking over here. Next time, try selling something valuable.\" \n\t\t*set ambition %+10\n\t\t*set rel_early %+10\n\t\t*goto nightclub\n\t#Give him my information if we can work the story together.\n\t\t\"I did some initial work and research. I can have it all beamed over to your glasses.\" You wave your hand a little at his face. \"Or whatever you have in there.\"\n\n\t\tEarly raises an eyebrow. \"What do you want for it?\"\n\n\t\t\"I just want to work with you on the story,\" you say.\n\n\t\tHe lights his cigarette, and takes in a big lungful of smoke before replying. \"I already got the information I needed as I was walking over here. Good to know that you recognize real talent when you see it, but I don't think I'll be conducting the kiddie tour today.\" \n\t\t*set independence %-10\n\t\t*set rel_early %+10\n\t\t*goto nightclub\n\t#Break this story on my own.\n\t\t\"Nope. I think us locals can handle this story just fine on our own without outsiders screwing things up.\"\n\n\t\tEarly lights his cigarette, and takes in a big lungful of smoke before replying. \"Good. Stay the hell out of my way, and we'll get along fine. Or maybe we won't, but I won't care because you'll be gone.\" \n\t\t*set independence %+10\n\t\t*set rel_early %-10\n\t\t*goto nightclub\n\n*label nightclub\nHe starts looking around the scene, already dismissing both of you. Angel taps his wrist, an old gesture that means \"we're running late\" from back when people wore devices that only told the time. He's right—you need to go before the police come back here. You hear Early mutter some voice-over to himself as you walk away.\n\n\"My wife is going to kill me,\" Angel says, sliding the camera back into the pocket of his worn leather jacket.\n\n\"I can't do anything about your overtime,\" you say. It's an old argument, and one you're not interested in going over again.\n\n\"Fine, but what now? We need to get ahead of that guy before he stomps all over our story, and I can't keep following you around all day.\"\n\nYou roll over the clues you have in your head. You didn't get much, and it's true that most of what you do have will be in the police report, or at least on the marker data. If Early doesn't have that information, he will soon. The victim's name, the gang he ran with—none of that is unique information. Then you realize you do have something that Early won't find right away: the nightclub Kollross frequented.\n\nAngel notices the change in your expression. \"You have something?\" he asks.\n\n\"Yeah. A lead. And it's not too far away.\"\n\n*page_break\nThe rain is starting to really come down. Angel pulls the lapels of his coat up and shoves his hands into his jacket pockets as you both walk up to The Warehouse, the club where the West Coast Kings hang out.\n\nThe club is aptly (if unoriginally) named. The building still has the faded signs of an old furniture warehouse from before people started 3-D printing their furnishings to order. Over one of the doors is a neon sign that just says \"Warehouse.\" A couple of guards are checking IDs and weapons, and there's a line that goes around the corner. Neither snow nor rain stays these clubbers from the swift acquisition of alcohol and loud music.\n\nPeople seem to be in good spirits, despite the rain. About half the people in line are wearing gold and purple—West Coast Kings colors. Near the front of the line, two women are watching both of you. Under transparent plastic raincoats, they're wearing tight dresses that leave little to the imagination. One of them smiles and winks at you, taking a step closer. \"Hey. You two want to come and party with us?\"\n\nBecause you're…\n\n*choice\n\t#Interested in men, not women…\n\t\tBecause you're interested in men, not women, you decide to…\n\t\t*set pl_likesmen true\n\t\t*set pl_likeswomen false\n\t\t*goto talk_with_woman\n\t#Interested in women, not men…\n\t\tBecause you're interested in women, not men, you decide to…\n\t\t*set pl_likesmen false\n\t\t*set pl_likeswomen true\n\t\t*goto talk_with_woman\n\t#Interested in both men and women…\n\t\tBecause you're interested in both women and men, you decide to…\n\t\t*set pl_likesmen true\n\t\t*set pl_likeswomen true\n\t\t*goto talk_with_woman\n\t#Not interested in sex at all…\n\t\tBecause you're not interested in sex, you decide to…\n\t\t*set pl_likesmen false\n\t\t*set pl_likeswomen false\n\t\t*goto talk_with_woman\n\n*label talk_with_woman\n*choice\n\t#Deflect her flirting and ask about Manny Kollross.\n\t\t\"I appreciate the offer,\" you say, \"but we're looking for someone who knows Manny Kollross.\"\n\n\t\tHer smile turns into a pout. \"Manny? What do you want someone like him for?\"\n\n\t\tAngel speaks up. \"We're just trying to find some friends of his. Pass on a message, you know?\"\n\n\t\tShe crosses her arms in front of her chest. \"Well, you might want to talk to…\"\n\n\t\t\"Hey!\" A muscular woman dressed in a tight purple and gold outfit steps around the corner and up to the four of you. \"Why are you two bothering my girl?\"\n\t\t*set investigation %+15\n\t\t*goto the_girlfriend\n\t*if (pl_likeswomen = true) #Flirt with her to see if I can get inside faster.\n\t\tYou smile. \"Absolutely. Mind if we get in line next to you?\"\n\n\t\t\"Sure!\" she says, as her friend giggles. \"Plenty of room under my coat to keep you dry.\"\n\n\t\t\"Hey!\" A muscular woman dressed in a tight purple and gold outfit steps around the corner and up to the four of you. \"What the hell do you think you're doing with my girl?\"\n\t\t*set charm %+15\n\t\t*goto the_girlfriend\n\t*if (pl_likeswomen = false) #Flirt with her anyway so I can get inside faster.\n\t\tYou smile. \"Absolutely. Mind if we get in line next to you?\"\n\n\t\t\"Sure!\" she says, as her friend giggles. \"Plenty of room under my coat to keep you dry.\"\n\n\t\t\"Hey!\" A muscular woman dressed in a tight purple and gold outfit steps around the corner and up to the four of you. \"What the hell do you think you're doing with my girl?\"\n\t\t*set charm %+15\n\t\t*goto the_girlfriend\n\t#Ask her if she and her friend want to be on camera.\n\t\t\"Of course,\" you say, \"but first I'd love to have a chance to interview you both for my show.\"\n\n\t\t\"Show?\" Her eyes grow wide. \"What network do you stream on?\"\n\n\t\tYou start to respond, but Angel steps up and cuts you off. \"INN. Brand new lifestyle show about all the hottest celebrities in NA. Good to get some sound bites from some good-looking people on the street, you know?\"\n\n\t\tShe and her friend both giggle. \"Sure thing,\" she says, straightening her see-through raincoat. \"What do you want to ask me?\"\n\n\t\t\"Hey!\" A muscular woman dressed in a tight purple and gold outfit steps around the corner and up to the four of you. \"Why are you two bothering my girl?\"\n\t\t*set technique %+15\n\t\t*goto the_girlfriend\n\n*label the_girlfriend\n*page_break\nShe towers over you, looking incredibly angry. You realize that not only does her tight outfit flatter her figure, but it would also be useful to keep someone from grabbing her in a fight.\n\n\"Look, we just want to talk to the ladies here,\" you say. \"I don't want any trouble.\"\n\n\"Well, you got trouble, ${pboy}.\" She cracks her knuckles. \"This is Kings turf, and you're messing with my girl.\"\n\n\"Let 'em be, Tasha,\" the woman who flirted with you says.\n\nTasha just shoves her. \"Shut up. I'll deal with you later, Maria.\"\n\nMaria steps back in line, looking angry but not saying anything.\n\n\"We're reporters,\" Angel says, talking over Maria. \"We're just looking into what happened to Manny Kollross.\"\n\nTasha's voice turns from being loud and angry to steely and cold. \"You need to get the hell out of here. Right now.\"\n\nYou can't leave. This is the only lead you have. You need to get this situation back under control.\n\n*choice\n\t#\"We just want the facts about what happened to Manny. We're not out to screw anyone.\"\n\t\tAngel backs you up. \"Yeah. We're just asking questions so we can report on what really happened.\"\n\t\t*set factual %+10\n\t\t*goto tasha_doesnt_care\n\t#\"Screw Manny Kollross, okay? We're doing a lifestyle program to show people having a good time.\"\n\t\tAngel backs you up. \"Yeah. Sorry about the Manny thing. We're just here to get some sexy people on camera.\" He pulls his camera out and focuses on Tasha. \"You want on, too?\"\n\t\t*set factual %-10\n\t\t*goto tasha_doesnt_care\n\t#\"All right, you got us. We're here to make the biggest story we can about the murders.\"\n\t\tAngel backs you up. \"Yeah. If we make it big, we'll be sure to pass on some of that success to the people who helped us out.\"\n\t\t*set ambition %+10\n\t\t*goto tasha_doesnt_care\t\t\n\n*label tasha_doesnt_care\n\nTasha snorts. \"I don't care if you're here to give me a million credits and a trip to North Mexico. The cops don't have enough resources to care about our business, so you ain't cops. No one is shocked by gang violence anymore, so you ain't reporters. But someone has been killing Kings and making their corpses disappear. It's gotten so I have to take my girl with me everywhere, just so some psycho doesn't kill her as well.\" She glances at Maria, who flips Tasha off. The gangster ignores her and looks back at you. \"And now here you are, talking about Manny. For all I know, you two are the sick bastards behind it.\"\n\nYou start to protest. \"We're not—\"\n\nShe cuts you off, putting a heavy hand on your shoulder. \"You've got about five seconds before me and my crew decide to get a little payback for the ones we lost.\"\n\nYou pull your press pass out and show it to her. \"Look. I'm serious. We're reporters.\"\n\nTasha slaps the pass out of your hands, and it falls to the pavement. \"Three seconds.\"\n\n*fake_choice\n\t#Call the police.\n\t\t\"Glasses, dial 911.\"\n\n\t\tTasha just laughs and slaps the netglasses off your face before stomping on them with her boot. \"You deaf? I told you that the cops don't rush getting here. By the time they show up, we'll be done having fun with you.\" \n\t#Yell for the guards to intervene.\n\t\t\"Hey! You guys at the door! Could use a little help over here.\"\n\n\t\tOne of the door guards comes over to see what's going on. \"Are these people bothering you, Tasha?\"\n\n\t\tTasha just laughs. \"Nah, Mikey. Just a little private business. I'll make sure you get a little something extra in your care package this week.\"\n\n\t\tThe guard shrugs. \"Just take it down the street. You're bothering the customers.\"\n\n\t\t\"Sure thing.\" The woman slaps the netglasses off your face before stomping on them with her boot. \"And don't think about calling anyone else, either.\"\n\t#Ask Maria for help.\n\t\tYou look over at Maria and her friend. \"Are you two just going to let her do this?\"\n\n\t\tThey both shrink inside their coats, looking between you and Tasha. After a moment, Maria tries to speak up. \"Hey, Tasha, maybe…\"\n\n\t\t\"Shut it, Maria,\" Tasha snarls. As she says it, she slaps the netglasses off your face before stomping on them with her boot. \"I told you to stop talking to my girl, so now you don't get to talk to anyone.\"\n\t#Run.\n\t\tYou look around. Everyone seems to be looking away from both of you. There's no help around here. As you're looking, Tasha slaps the netglasses off your face before stomping on them with her boot. \"You don't get to call for help.\"\n*comment endif\n\nShe cracks her knuckles again. \"Two seconds. You better start running, ${pboy}.\"\n\nYou and Angel both start running.\n*page_break Back to the Present\n\"Hey! There's nothing to be afraid of!\" you hear behind you, mockingly. \"We just want to talk to you!\" \n*if run_from_gang = 0\n\tYou keep sprinting blindly into the darkness. Angel's breathing is getting heavy, but you can't stop. You need to keep going, and hope you don't…\n\n\tYou hear a slam and a sharp, wet crack, like celery snapping. Angel screams, and you stop and turn as he falls to the ground. He swears over and over, and in the gloom you can barely make him out, holding his leg as he rolls on the ground. \"Tripped on something. Damn it,\" he moans. \"I think it's broken.\"\n\n\t\"Oh, buddy,\" comes Tasha's voice from down the alleyway. \"When we're done, that won't be the only thing broken.\"\n\t*goto talk_to_gang\n*if run_from_gang = 1\n\tYou turn left and run for the lights of the main street, hoping you can find some other people. Maybe a cop. No matter what Tasha said, they can't turn away from something like this. Let them arrest you for falsifying your pass, if only…\n\n\tAs you get near the end of the alleyway, Tasha steps in front of you, followed by several more gangsters in similar-looking tracksuits. \"Hey, ${pboy},\" Tasha says, palming a heavy metal pipe. \"I don't think we're done with you just yet.\"\n\n\tAngel tries to rush past them, but the second one grabs him and throws him back onto the concrete. Tasha brings her pipe down on Angel's leg. You hear a sharp, wet crack, like celery snapping, and Angel screams.\n\t*goto talk_to_gang\n*if run_from_gang = 2\n\tYou hold still inside the recycling bin, hoping the gang passes you by. You hear their muffled footsteps, and then silence. You wait for a minute, and then another. Maybe they're gone.\n\n\tThen you hear the laughter, and the lid flies open. It's Tasha, grinning madly at you. \"Sorry, ${pboy},\" Tasha says. \"I tried to keep them quiet to surprise you. Guess it's time to come out and get your beating.\" She leans in to reach for you.\n\n\tYou're trying to figure out a way to escape when Angel grabs Tasha's arm and slams it against the inside of the bin. She swears and yells \"Get them out of there!\" Hands reach in and pull Angel out first. You hear Angel being roughly thrown to the ground before they reach for you. \n\n\tAs you're being pulled out, you hear a sharp, wet crack, like celery snapping, and Angel screams. As you're thrown to the ground, you see Tasha brandishing a heavy metal pipe and Angel holding his leg. \"Damn it,\" Angel moans. \"I think it's broken.\"\n\n\t\"Oh, buddy,\" Tasha says. \"When we're done, that won't be the only thing broken.\"\n\t*goto talk_to_gang\n\n*label talk_to_gang\n*page_break\nYou try to look at Angel's leg, but Tasha shoves you hard, and you fall to the ground. \"No way, ${pboy},\" she says. \"Wait your turn. We'll beat your ass soon enough.\"\n\nYou hear footsteps, and Maria runs up. \"Stop this!\" she yells. \"Just stop it, Tasha!\"\n\n\"Get out of here,\" Tasha says. She motions to one of the gangsters. \"Take her home.\"\n\n\"But this is murder!\" she screams. \"You can't!\"\n\nOne of the gangsters looks nervously at both of you. \"I dunno, Tasha. Maybe Maria's…\"\n\n\"I said take her home!\" Tasha shoves the gangster toward Maria and turns back to you. \"They know something about who's been killing us.\" She spits, and a gobbet of saliva lands next to you on the concrete. \"Maybe a few more broken bones will get them to talk.\"\n\n*choice\n\t#Try to charm them by explaining it's stupid to do anything to me, since it might get on camera.\n\t\t*if charm >= 55\n\t\t\t\"You don't want to do this,\" you say, trying to sound as reasonable as possible.\n\n\t\t\tTasha smiles. \"Actually, I really do.\" She tightens her grip on the pipe.\n\n\t\t\t\"I can see that,\" you amend, putting your hands up to hold her off. \"But my friend here is my camera operator. If you beat him, or me, he'll record it and upload the file to my news manager in a nanosecond. Let us go, and we can pretend like this never happened.\"\n\n\t\t\t\"The ${pboy} has a point,\" one of the gangsters says.\n\n\t\t\t\"Shut up,\" Tasha suggests, before turning to Angel. \"That true, buddy? You got a camera?\"\n\n\t\t\tAngel nods, his face still screwed up in pain.\n\n\t\t\t\"Then you can walk, and take your camera with you.\" She laughs. \"You can try to walk, anyway. Get out of here.\"\n\n\t\t\tYou get up to help Angel, but Tasha shoves you back down. \"Not you, ${pboy}. We're not done with you yet.\"\n\n\t\t\tAngel carefully stands up, trying not to put any weight on his broken leg. He turns to look at you, but you shake your head. \"Go on,\" you say. He nods, and limps out of the alleyway.\n\n\t\t\tThe pipe hits you in the back of the head, and your skull bounces off the concrete. The pain is intense as you're rolled over. The pipe lands on your face, again and again. You can feel something crack, and blood runs into your eyes as you scream.\n\t\t\t*set factual %-10\n\t\t\t*set case1_filed true\n\t\t\t*achieve ach_angel_lives\n\t\t\t*finish\n\t\t*else\n\t\t\t\"You don't want to do this,\" you say, trying to sound as reasonable as possible.\n\n\t\t\tTasha smiles. \"Actually, I really do.\" She tightens her grip on the pipe.\n\n\t\t\t\"I can see that,\" you amend, putting your hands up to hold her off. \"But my friend here is my camera operator. If you beat him, or me, he'll record it and upload the file to my news manager in a nanosecond. Let us go, and we can pretend like this never happened.\"\n\n\t\t\t\"The ${pboy} has a point,\" one of the gangsters says.\n\n\t\t\t\"Shut up,\" Tasha suggests, before turning to Angel. \"That true, buddy? You got a camera?\"\n\n\t\t\tAngel nods, his face still screwed up in pain.\n\n\t\t\t\"Then give me your camera.\" She puts her left hand out, the one not holding the pipe. \"Now.\"\n\n\t\t\tAngel turns to look at you, and you nod. Wincing with pain, he reaches into his jacket pocket and pulls out the camera, badly battered after everything it's been through. Tasha looks at it a moment before tossing it to one of her friends. She laughs and grips the pipe in both hands before she suddenly turns and cracks the pipe down on Angel's skull. The powerful blow splits his head wide open. You close your eyes, unable to watch as you hear the other gangsters beating Angel to death.\n\n\t\t\tYou don't get a chance to open your eyes again before the pipe hits you in the back of the head and your skull bounces off the concrete. The pain is intense as you're rolled over. The pipe lands on your face, again and again. You can feel something crack, and blood runs into your eyes as you scream.\n\t\t\t*set angel_dead true\n\t\t\t*finish\n\t#Tell them I've been investigating who is killing their gang members.\n\t\t*if investigation >= 55\n\t\t\t\"Look, I've already started my investigation into Kollross,\" you say carefully, trying to sound nonthreatening. \"No matter how much you pay them, the police are going to get suspicious if we're suddenly hospitalized in King territory.\"\n\n\t\t\t\"The ${pboy} has a point,\" one of the gangsters says.\n\n\t\t\t\"Shut up,\" Tasha suggests, before turning back to you. \"So maybe we kill you and dump the bodies somewhere else?\"\n\n\t\t\tYou shrug, trying to look unintimidated. \"That could work. But then you'll never find out who's killing everyone in your crew. You said yourself that no one gives a damn if there's a few dead gangsters on the street. I'm the only shot you have to figure out who's taking the Kings out one by one.\"\n\n\t\t\tTasha kneels down next to you, her face in yours. You can smell stale beer on her breath. \"You better not be lying to me, ${pboy}. Like I said, for all I know, you're the one killing them.\"\n\n\t\t\t\"Tasha!\" one of the gangsters yells. \"The other one's getting away!\"\n\n\t\t\tYou all turn to look, and see Angel half-running, half-limping out of the alleyway. One of the other gangsters tries to run after him, but Angel manages to flag down a cab and get inside before the King can reach him.\n\n\t\t\tAs you watch Angel escape, the pipe hits you in the back of the head and your skull bounces off the concrete. The pain is intense as you're rolled over. The pipe lands on your face, again and again. You can feel something crack, and blood runs into your eyes as you scream.\n\t\t\t*set factual %+10\n\t\t\t*set case1_filed true\n\t\t\t*achieve ach_angel_lives\n\t\t\t*finish\n\t\t*else\n\t\t\t\"Look, I've already started my investigation into Kollross,\" you say carefully, trying to sound nonthreatening. \"No matter how much you pay them, the police are going to get suspicious if we're suddenly hospitalized in King territory.\"\n\n\t\t\t\"The ${pboy} has a point,\" one of the gangsters says.\n\n\t\t\t\"Shut up,\" Tasha suggests, before turning back to you. \"So maybe we kill you and dump the bodies somewhere else?\"\n\n\t\t\tYou shrug, trying to look unintimidated, but your hands are trembling. \"But then you'll never find out who's killing everyone in your crew. Don't you want us to help you?\"\n\n\t\t\tTasha thinks for a moment, then shrugs. \"Nah.\" She suddenly turns and cracks the pipe down on Angel's skull. The powerful blow splits his head wide open. You close your eyes, unable to watch as you hear the other gangsters beating Angel to death.\n\n\t\t\tYou don't get a chance to open your eyes again before the pipe hits you in the back of the head and your skull bounces off the concrete. The pain is intense as you're rolled over. The pipe lands on your face, again and again. You can feel something crack, and blood runs into your eyes as you scream.\n\t\t\t*set angel_dead true\n\t\t\t*finish\n\t#Offer to use my technical skills to make them video stars.\n\t\t*if technique >= 55\n\t\t\t\"Hey, don't you want to be video stars?\" you ask in desperation.\n\n\t\t\t\"What are you talking about?\" Tasha asks, suspiciously.\n\n\t\t\t\"I told you we were reporters,\" you explain. \"Going to have the hottest show on the net soon. We can cut you in for a slice of that fame.\"\n\n\t\t\t\"Yeah?\" Tasha's smile widens. \"You got a camera?\"\n\n\t\t\tAngel pulls the camera out of his jacket pocket with trembling hands, and the other gangsters laugh and push each other to get in front of it. Angel starts recording, and you try to think of a question, but Tasha pushes you back onto t
