you and the guards. After a few steps, you notice a thick black chip in the electronic haze that is Katrina, sitting behind one of her ears. Using the point of the knife, you pry it off. It falls to the ground with a soft click, and the haze instantly disappears. You see Katrina's true face: black hair, dark skin, with tasteful silver piercings in her ears and nose. She could be any corporate employee you'd pass on the street on her way to the office.\n\nAs you get to the door, you realize that you could simply kill her now. It's ruthless, but she'd be out of the picture. Alternatively, you could take a picture of her face and try to blackmail her, in the hope that the secret of her identity will be enough to keep her away. Or you could just let her go and see what happens.\n\n*choice\n\t#Kill her.\n\t\tYou drag the edge of the knife across her throat. Blood pours down her chest and over your hands as you let her go. She kicks and gasps with increasing desperation, but you run out the door as you hear gunshots behind you.\n\t\t*set deduction_shippingBodies true\n\t\t*set independence %+20\n\t\t*set infractions +1\n\t\t*set katrina_dead true\n\t\t*achieve ach_katrina_dead\n\t\t*goto escape\n\t#Blackmail her.\n\t\tYou shove her away and use your opticOS to take a quick picture of her. Your head feels like there's an ice pick jammed in your skull, but you manage to take a still image of her face, the light flashing briefly in her face.\n\n\t\t\"Your eyes…\" she says.\n\n\t\tWhile she's in shock, you turn and run out the door. You can hear gunshots behind you.\n\t\t*set deduction_shippingBodies true\n\t\t*set ambition %+10\n\t\t*set katrina_picture true\n\t\t*goto escape\n\t#Leave her.\n\t\tYou shove her away. She turns and looks at you, ready for a fight, but you bolt through the door.\n\n\t\t\"After ${phim}!\" she screams. You hear gunshots behind you.\n\t\t*set deduction_shippingBodies true\n\t\t*set ambition %-10\n\t\t*goto escape\n\n*label escape\n\nYou find yourself outside a warehouse by No. 7, late at night. The low-light mode of your opticOS doesn't hurt as much as recording does, so you stick to the darkness as the guards look around for you. After fifteen minutes of avoiding their search patterns, you make your way back to the parking lot. The car is gone, so you rush to a well-lit street and hail a cab. \n*if katrina_dead = true\n\tYou head to your apartment to wash the blood off and change your clothes. You feel numb as you go through the motions of cleaning up before taking another cab to Maris's office.\n*if katrina_dead = false\n\tThe cleaning crew give you strange looks as you drag yourself into Maris's office.\n*comment endif\n\n*goto police_statement\n\n*label help_arrives\n\n*if recorded_Katrina_interrogation\n\tA sharp pain starts building behind your eyes. Whether it's prolonged exposure to the scrambler chip, the impact to your skull, or some combination, it hurts to be recording. You mentally stop, and the pain subsides, reduced to a dull throb. \n*comment endif\nSuddenly, one of the doors to the warehouse smashes open, and men in black armored uniforms pour into the room. \"Police! Nobody move!\"\n\n*if help_coming = true\n\tBackup's here. And not a moment too soon.\n*if help_coming = false\n\tWhat the…? You close your eyes. Tracey. $!{the} must have jumped the gun. Again.\n*comment endif\n\nKatrina doesn't even get out of her chair. You can't tell what she's thinking, because that infuriating electronic haze is still hiding her features. As her guards are quickly disarmed and restrained, one of them walks up to her and pulls her upright. \"Where's the scrambling device?\" the officer says. \n\n\"Right ear,\" Katrina says, sounding almost bored.\n\nThe officer does something behind Katrina's head for a moment, and the haze instantly disappears. You see Katrina's true face: black hair, dark skin, with tasteful silver piercings in her ears and nose. She could be any corporate employee you'd pass on the street on her way to the office. She looks at you with a sneer. \"When I find you, I will spend days killing you, ${pl_fullname},\" she says.\n\nYour head feels like there's an ice pick jammed in your skull, but you manage to take a still image of her face, the light flashing briefly in her face.\n\n\"Your eyes…\" she says, but the officer grabs her arm and shoves her to the car waiting outside.\n\n*set katrina_arrested true\n*set katrina_picture true\n*page_break\nThe next half hour is a blur. An ambulance pulls up and checks you over, treating your various bumps and scrapes. One of the EMTs asks you about your eyes, but you wave him off, saying you have a specialist for them. An officer walks up to you as the medical workers finish. \"A detective wishes to take your statement, but he's just finishing up talking with your boss at INN. We'll take you there as soon as you're ready.\"\n\nThe EMT closes his medical kit. \"Short of going to a hospital, we've done all we can do for ${phim}.\"\n\nThe officer nods, and directs you to the car. You get the impression it isn't a request. The ride to INN is smooth and uneventful. The cleaning crew give you strange looks as you drag yourself into Maris's office.\n\n*goto police_statement\n\n*label police_statement\n*if (rel_tracey >= 60) and (tflirt = true)\n\tSuddenly, you are nearly knocked over as Tracey runs across the office and gives you a crushing hug. \"You're all right,\" ${the} says.\n\t*choice\n\t\t#Return the hug. I'm glad to see ${thim}.\n\t\t\tYou return the hug warmly.\n\t\t\t*goto maris_office\n\t\t#Give ${thim} a kiss. I've really missed ${thim}.\n\t\t\tYou kiss Tracey on the lips, briefly. $!{the} looks surprised, but smiles slightly as you pull away.\n\t\t\t*goto maris_office\n\t\t#Push ${thim} away. I need to keep things professional.\n\t\t\tYou push Tracey away from you. $!{the} looks flustered, but steps away from you.\n\t\t\t*set tflirt false\n\t\t\t*goto maris_office\n*if (rel_tracey >= 60) and (tflirt = false)\n\tTracey is standing in front of Maris's desk and smiles warmly as you walk through the door. \"You're all right,\" ${the} says.\n\t*goto maris_office\n*if (rel_tracey \u003c 60) and (rel_tracey > 40)\n\tTracey is standing in front of Maris's desk and smiles as you walk through the door. \"Glad you're all right,\" ${the} says.\n\t*goto maris_office\n*if rel_tracey \u003c= 40\n\tTracey is standing in front of Maris' desk, and nods at you as you walk through the door. \"Glad to see you're okay,\" ${the} says.\n\t*goto maris_office\n\n*label maris_office\n\nMaris is wearing a stunning evening dress as she stands behind her desk, but she isn't wearing any makeup, and there are a number of plastic coffee cups on her desk. Looks like her evening plans were cancelled. She looks tired, but relieved to see you. \"What happened, ${pl_fname}? Are you hurt?\"\n\n*page_break\nYou drop into a chair, suddenly aware of how tired you are. \"Just…something wrong with my eyes. It hurts to record. But I'm fine.\"\n\nMaris nods. \"Good, I'm glad. I need to call my husband and let him know that I'll be home soon. Tracey, call ${pl_fname}'s doctor and schedule an appointment as soon as possible to have ${phis} eyes checked.\" She points to the door. \"As for you, there's a police officer in conference room 2 who wants to discuss what happened.\"\n\nTracey looks at Maris. \"Surely tomorrow would be…\"\n\n\"Please. It's been a long night for all of us. The sooner you talk to the police, the sooner we can get ${pl_fname} looked at.\" She looks at you. \"And don't worry—it's not Sloane.\"\n\nYou laugh hard at her comment. That's when you realize that everything hurts, and you feel like you could sleep for a week. \"Best get it over with,\" you say, and walk to the conference room.\n\n*page_break\nInside the conference room is a young man in a well-pressed suit. He has a police badge clipped to his lapel, and his hair is short and neat. He takes off a pair of netglasses and sets them on the conference table before standing up and offering his hand. \"I'm Detective Egwu,\" he says. \"I understand you've had quite a night.\"\n\nYou shake his hand and sit down across from him. \"You could say that.\"\n\nHe nods, and sits back down. \"I won't take up too much of your time. I understand you were investigating a story about Katrina Gray. I've already talked to your boss and your partner, but I wanted to know if you had any statement of your own to make to add to our investigation.\"\n\n*choice\n\t#Cooperate, in hopes that the police will be able to close down the smuggling ring.\n\t\tYou sigh, close your eyes, and start telling Egwu everything from the time you got the tip. He puts on his netglasses and watches you, carefully transcribing your statement. You mention your attempt to ask Sloane about the case, but Egwu doesn't seem interested until you start to talk about meeting Katrina Gray. At that point, he puts a hand up, and you ramble to a stop. \"So you saw Gray's face?\"\n\n\t\t\"Yes.\"\n\n\t\t\"I'd appreciate a description of her.\"\n\n\t\t*if katrina_picture = true\n\t\t\t\"I can do better than that. I took a picture of her with my implants.\" You beam the file to his netglasses.\n\n\t\t\tHe smiles. \"Thank you. That's incredibly helpful.\"\n\t\t*if katrina_picture = false\n\t\t\t\"Sure.\" You do your best to describe her, as he pulls out a tablet and loads a facial reconstruction app. After a few minutes, the two of you work up a good likeness of Katrina Gray. Egwu uses the likeness to find a picture of her in the police database. As you confirm that it's her, you discreetly use your opticOS to save a copy for yourself.\n\n\t\t\tHe smiles behind his netglasses as he puts his tablet away. \"Thank you. That's incredibly helpful.\"\n\t\t*comment endif\n\n\t\tYou nod. \"Is that all? Because I think I need to see my bed, and maybe a doctor.\"\n\n\t\tEgwu slides the netglasses off and puts them in his suit pocket. \"I believe so. Thank you for your cooperation, ${pmister} ${pl_fullname}.\" He shakes your hand again, and you make your way downstairs to get a cab. \n\n\t\tYou don't remember the drive home.\n\t\t*set independence %-10\n\t\t*set katrina_picture true\n\t\t*finish\n\t#Give a statement, but protect my sources.\n\t\tYou sigh and close your eyes. \"I can tell you some of it, but I have to protect my sources.\"\n\n\t\tHe frowns. \"I'd rather have a full and complete statement,\" he says.\n\n\t\tYou shrug. \"That's the deal. Either you have a cooperative reporter, or an uncooperative witness. I have to uphold my journalistic ethics.\"\n\n\t\tEgwu nods, and puts his netglasses on. \"Go ahead.\"\n\n\t\tYou tell him most of what happened, leaving out any references to your previous case and the fact that you tried to ask Sloane for information. He uses his netglasses to carefully transcribe the conversation. At one point, he puts a hand up, and you ramble to a stop. \"So you saw Gray's face?\"\n\n\t\t\"Yes.\"\n\n\t\t\"I'd appreciate a description of her.\"\n\n\t\t*if katrina_picture = true\n\t\t\t\"I can do better than that. I took a picture of her with my implants.\" You beam the file to his netglasses.\n\n\t\t\tHe smiles. \"Thank you. That's incredibly helpful.\"\n\t\t*if katrina_picture = false\n\t\t\t\"Sure.\" You do your best to describe her, as he pulls out a tablet and loads a facial reconstruction app. After a few minutes, the two of you work up a good likeness of Katrina Gray. Egwu uses the likeness to find a picture of her in the police database. As you confirm that it's her, you discreetly use your opticOS to save a copy for yourself.\n\n\t\t\tHe smiles behind his netglasses as he puts his tablet away. \"Thank you. That's incredibly helpful.\"\n\t\t*comment endif\n\n\t\tYou nod. \"Is that all? Because I think I need to see my bed, and maybe a doctor.\"\n\n\t\tEgwu slides the netglasses off and puts them in his suit pocket. \"I believe so. Thank you for your cooperation, ${pmister} ${pl_fullname}.\" He shakes your hand again, and you make your way downstairs to get a cab. \n\n\t\tYou don't remember the drive home.\n\t\t*set katrina_picture true\n\t\t*set ambition %-10\n\t\t*finish\n\t#Refuse to cooperate so I can keep my exclusive.\n\t\tYou sigh and close your eyes. \"Not a chance.\"\n\n\t\tHe frowns. \"Excuse me?\"\n\n\t\tYou shrug. \"I'm in the middle of a story, and I can't have the police getting in my way.\"\n\n\t\t\"We don't get in the way, ${psir}. We [i]are[/i] the way. We're tasked to…\"\n\n\t\t\"Protect and serve, defend the innocent, leap tall buildings, blah blah blah. But I'm a licensed reporter, which means that I have some leeway in what I decide to hand over.\"\n\n\t\t\"Some,\" he says, grudgingly. \"But we will file a complaint with your network.\"\n\n\t\tYou shrug again. \"Is that all? Because I think I need to see my bed, and maybe a doctor.\"\n\n\t\tEgwu slides the netglasses off and puts them in his suit pocket. \"I believe so, ${pmister} ${pl_fullname}.\" He doesn't offer his hand this time, so you make your way downstairs to get a cab. \n\n\t\tYou don't remember the drive home.\n\t\t*set infractions +1\n\t\t*set ambition %+10\n\t\t*finish\n\t#Don't say anything. The police are too corrupt.\n\t\tYou sigh and close your eyes. \"I'm sorry, but I can't.\"\n\n\t\tHe frowns. \"You can't?\"\n\n\t\tYou shrug. \"Okay, I won't. I have reason to believe that the police might be involved, and I don't know where you fit into everything.\"\n\n\t\t\"If you have information on police corruption, ${psir}, it's your duty as a citizen to let us know.\"\n\n\t\tYou laugh. \"Are you listening to yourself? Tell the police that the police are corrupt? Pass.\"\n\n\t\t\"But if you—\"\n\n\t\t\"Look, I'm a licensed reporter, which means that I have some leeway in what I decide to hand over.\"\n\n\t\t\"Some,\" he says, grudgingly. \"But we will file a complaint with your network.\"\n\n\t\tYou shrug again. \"Is that all? Because I think I need to see my bed, and maybe a doctor.\"\n\n\t\tEgwu slides the netglasses off and puts them in his suit pocket. \"I believe so, ${pmister} ${pl_fullname}.\" He doesn't offer his hand this time, so you make your way downstairs to get a cab. \n\n\t\tYou don't remember the drive home.\n\t\t*set infractions +1\n\t\t*set independence %+10\n\t\t*finish", "jadensloane": "*comment Chapter Nine\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Ratings War[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-12-31 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n*temp early_bribed false\n*temp crusade 0\n*if (named_felix)\n\t*set crusade +1\n*if (told_katrina)\n\t*set crusade +1\n*if (named_katrina)\n\t*set crusade +1\n*if (named_jaden)\n\t*set crusade +1\n*text_image chap9.png\n\n[i]February 11th, 2062.[/i]\n\nThe car is waiting for you, as you were told: a long, black car that oozes expense. A man with dark netglasses stands outside and opens the rear door for you, and you see a second man inside at the wheel. Neither is wearing a coat in the winter chill, but a stray breeze causes the man's suit jacket to flutter open, revealing a very lethal-looking pistol in a holster. As you step into the car, you fondly remember the days when you weren't being abducted and dragged around. The man roughly pulls your earpiece out before he closes the door. The inside is comfortable but elegantly simple, and neither man speaks to you as the car glides in silence to the regional headquarters of Ambrosia Welltronics.\n\nAs you ride, you send a text message to Tracey to let ${thim} know where you are and what's going on. You don't get any reply. Being captured by an insane criminal was a lot simpler.\n\n*page_break\nThe building looks like it was poured instead of built. A seamless white substance artfully wraps around the facade, allowing the occasional window to peek through gaps. An arch looks like it was almost carved out of the substance, allowing for a pair of glass double doors. You notice an entwined A and W frosted on both doors the two men lead you through. \n\nYou are marched past a reception desk and to a bank of elevators. One of the men puts his hand on a blank plate, the doors close, and within a minute they open again on a second plush reception area. More marching, more doors, and soon you are in a large office outfitted in thick green carpet and highly polished furnishings. The chairs and desk look like they're entirely made from real wood—an expensive extravagance.\n\nSitting behind the desk is the man you saw on Tracey's tablet: dark hair with a touch of gray, and a midnight blue suit. He's holding a small tablet to his ear, and he motions to the chairs as he keeps talking in a language you don't understand. You can't remember the last time you saw someone use a tablet as a phone. The men forcefully push you into one of the chairs. They step back to the doorway, watching you, as Jaden taps the screen of his tablet and sets it on his otherwise empty desk.\n\n\"You know who I am.\" It isn't a question, although he tries to dress it up as one.\n\nYou nod. \"And I assume the reverse is true.\"\n\n*if celebrity >= 50\n\t\"Who hasn't heard of ${pl_fullname} these days?\"\n*if (celebrity \u003c 50) and (celebrity > 25)\n\t\"Of course. You're ${pl_fullname}. I've watched your work.\"\n*if celebrity \u003c= 25\n\t\"Your name is ${pl_fullname}. Not easy to find, since it seems very few people have heard of you.\"\n*comment endif\n\n\"It's always nice to meet a fan, Mr. Sloane, but I would prefer that you made an appointment with INN.\"\n\n*page_break\nHe laughs. It sounds polished, rehearsed. \"Quite the wit. I can see why you were hired. But no, this isn't a social call. I wish to have a quiet conversation. Just the two of us.\"\n\nYou motion to the two men by the door. \"So they're free to go grab a coffee?\"\n\n\"Ah, I see I've spoken in error. My associates will remain here in a purely observational capacity.\" His eyes bore into yours. \"Unless, of course, you give them reason to become more active participants.\"\n\nYou sigh and lean into the chair a little more. \"Had to ask.\"\n\nJaden smiles blandly. \"Indeed. And while we're on the subject of asking, you do not have my consent to record this. Mr. Robertsson has told me all about those fascinating gadgets you have implanted, and I've taken precautions to ensure they are not useful in my office or in my private cars.\"\n\n*choice\n\t#Agree not to record him.\n\t\t\"Fine, I won't record this conversation.\"\n\n\t\t\"You're too kind,\" he says with another bland smile.\n\n\t\tAs he talks, you try sending another text message to Tracey. Still no response. Looks like Jaden's precautions are no joke. \n\t\t*set independence %-10\n\t\t*goto your_crusade\n\t#Defy his request, and try to record.\n\t\tIgnoring his request, you set your opticOS to record. Suddenly, bright red warning text crawls across your vision: DRIVE CRASH DRIVE CRASH DRIVE CRASH. Your head feels like it's about to split in half. The recording stops, and the headache fades.\n\n\t\t\"I did warn you,\" Jaden says, still smiling. \"I know all about your implants, and made sure that certain countermeasures were installed.\"\n\n\t\tAs he talks, you try sending another text message to Tracey. Still no response; that seems to be blocked as well. \n\t\t*set independence %+10\n\t\t*goto your_crusade\n\t#Say I agree, but try to record discreetly.\n\t\t\"Fine, I won't record this conversation.\" As you talk, you set your opticOS to record. Suddenly, bright red warning text crawls across your vision: DRIVE CRASH DRIVE CRASH DRIVE CRASH. Your head feels like it's about to split in half. The recording stops, and the headache fades.\n\n\t\t\"I did warn you,\" Jaden says, still smiling. \"I know all about your implants, and made sure that certain countermeasures were installed.\"\n\t\t\n\t\tAs he talks, you try sending another text message to Tracey. Still no response; that seems to be blocked as well. \n\t\t*set factual %-10\n\t\t*goto your_crusade\n\n*label your_crusade\nYou keep him talking. \"So you know about me from Early.\"\n\n\"I do. Of course, I did some investigation on my own.\" He opens his arms, as if to encompass the office and the rest of the company. \"I do work for a medical technology corporation, after all, and it turns out your implants are based on early research conducted by a former employee.\"\n\n*page_break\nPieces start to fall into place. \"Dr. Mínervudóttir. That's why people involved with this keep recognizing my implants, even though they're bleeding edge technology. You told them.\"\n\nHe laughs. \"Hardly. You overestimate my reach, ${pmister} ${pl_lname}. The survival rate from implanted technology is still low enough that someone like you is a novelty. But again, we're not here to talk about me and the failures of my company.\"\n\n\"But I'm very interested in talking about you and your failures.\"\n\nHe frowns. \"Believe me. There's nothing you could say that would punish me more than I have punished myself. My wife died because the technology doesn't yet exist to reliably save people from organ failure. Even after all these years, we're still in a state where transplanted human organs are usually far superior to artificial options.\"\n\n\"Guess your company isn't good enough.\"\n\nJaden smiles. There's no humor in it. \"Let's get to the real matter of your crusade against me and my family.\"\n\n*page_break\n\"Crusade?\"\n\nJaden shakes his head. \"There's no point in denials now. \n*if ((((named_felix = false) and (told_katrina = false)) and (named_katrina = false)) and (named_jaden = false))\n\tI can read between the lines in your reports, and I know what allegations you're making. You haven't said as much, but you know about me, my son Felix, and my daughter Katrina. \n*if (named_felix = true) or (named_katrina = true)\n\tYou've named my children in horrible crimes. \n*if named_jaden = true\n\tYou've connected me to some very serious allegations without a shred of evidence. \n*comment endif\nAnd you would have me believe you're not a crusader, but simply a very tenacious reporter.\"\n\n\"Just putting pieces together. Your son sold organs. Your daughter sold people. You run a company that sells organs to people. That's a lot more than a coincidence.\"\n\n*page_break\nHe stands up, puts his hands behind his back, and starts pacing behind his desk. For the first time, you see emotion on his face, hear passion in his voice. \"And why not? They bring me organs that terminally ill people desperately need to survive. Why should anyone have to wait until a suitable donor comes along?\"\n\n\"Of course, when you say 'anyone' you aren't talking about the poor.\"\n\n\"My son…\" Jaden stops, and puts his hands on the back of his chair, staring at you. \"He was always the sensitive one. His mother, rest her soul, always took care of him. He feels something for the poor and downtrodden. Out of respect for my late wife, I allow him a measure of leniency in how he conducts his affairs. But we are the ones who must survive.\"\n\n\"We?\"\n\n\"The wealthy and powerful! The true contributors to society! We are the ones who make the hard decisions. We are the ones who allow everyone to have jobs, build homes, and raise families. We are the ones to make things and do things. In the grand scheme of things, who cares if a few nameless corpses or some insignificant moochers go missing?\"\n\n*choice\n\t#\"It's not worth the cost.\"\n\t\t\"It's not worth the cost,\" you say.\n\n\t\t\"Maybe not to you. Maybe not now.\" He goes back to pacing. \"My wife was considering a divorce. I still loved her…still [i]love[/i] her…but I agreed to a trial separation. She had an accident, and was rushed to the hospital before I could get there. She was in bad shape, and they tried to implant a cybernetic heart to keep her alive until a donor could be found. But her body rejected the heart, and she died.\"\n\n\t\tHe stops pacing and looks at you again. \"At some point, you'll be willing to spend any amount of money to stay alive, or keep someone else alive, even if it's only out of a desire for revenge.\" He waves at your face, in front of your eyes. \"I suspect you understand exactly what I mean.\"\n\t\t*set ambition %-10\n\t\t*goto next_steps\n\t#\"I agree. Money and power are important. Necessary.\"\n\t\t\"I agree,\" you say. \"Money and power are important. Necessary.\"\n\n\t\t\"Exactly.\" He goes back to pacing. \"My wife was considering a divorce. I still loved her…still [i]love[/i] her…but I agreed to a trial separation. She had an accident, and was rushed to the hospital before I could get there. She was in bad shape, and they tried to implant a cybernetic heart to keep her alive until a donor could be found. But her body rejected the heart, and she died.\"\n\n\t\tHe stops pacing and looks at you again. \"At some point, you'll be willing to spend any amount of money to stay alive, or keep someone else alive, even if it's out of a desire for revenge.\" He waves at your face, in front of your eyes. \"But you already know about that, don't you?\"\n\t\t*set ambition %+10\n\t\t*goto next_steps\n\t#\"You're talking about yourself, aren't you?\"\n\t\t\"You're talking about yourself, aren't you?\" you ask.\n\n\t\tHe goes back to pacing. \"My wife was considering a divorce. I still loved her…still [i]love[/i] her…but I agreed to a trial separation. She had an accident, and was rushed to the hospital before I could get there. She was in bad shape, and they tried to implant a cybernetic heart to keep her alive until a donor could be found. But her body rejected the heart, and she died.\"\n\n\t\tHe stops pacing and looks at you again. \"At some point, you'll be willing to spend any amount of money to stay alive, or keep someone else alive, even if it's out of a desire for revenge.\" He waves at your face, in front of your eyes. \"No need to lie. I know you already have.\"\n\t\t*set factual %+10\n\t\t*goto next_steps\n\n*label next_steps\n\nYou close your eyes, trying to send a third message to Tracey. Nothing.\n\n\"If you're convinced I'm out to get you and your family, then why am I here?\"\n\n\"Simple. I want to know why.\"\n\nYou stretch, trying to look bored. \"Sure, let's talk. That will give my editor plenty of time to call the police.\"\n\n*page_break\n\nHe laughs. This time, it sounds sincere, but it's also chilling. \"Come now. You know better than that. I'm on corporate soil. You can't touch me.\"\n\nDamn. Many high-level corporations have the ability to hire private contractors to protect their own assets and interests outside of local jurisdiction. That's why INN was able to get you out from a room full of cops, but the same law extends to AW. Now that you're inside, neither the police nor INN have any ability to storm the building without a damned good reason.\n\nYou stand up, clenching your fists. \"That doesn't mean you can just do whatever you…\" \n\nOne of the men steps forward and shoves you down into your chair, as Jaden sits back and folds his hands on his desk. \n*if crusade \u003c= 1\n\t\"Relax. I want to discuss an opportunity that could benefit both of us.\"\n\n\t*goto jaden_bribe\n*if (crusade > 1) and (crusade \u003c 3)\n\t\"Sit down. I need to understand why you've been doing this before I hurt you.\"\n\n\t*goto jaden_threaten\n*else\n\t\"Sit down. I need to understand why you've been doing this before I make you go away.\"\n\n\t*goto jaden_kill\n\n*label jaden_bribe\n\"What kind of opportunity?\" you ask.\n\n*if named_jaden = true\n\t\"It's really quite simple,\" he says. \"I give you a lot of money, and you publicly retract your allegations. Other reporters at your network have found me to be quite generous.\"\n*if named_jaden = false\n\t\"It's really quite simple,\" he says. \"I give you a lot of money, and you find other stories to pursue. Other reporters at your network have found me to be quite generous.\"\n*comment endif\n\n*if early_bribed = true\n\tHe's clearly talking about Early. You wonder what he did in this situation.\n*if early_bribed = false\n\tSomething Tracey told you days ago comes back to you. When you were asking ${thim} about ${this} Infraction, ${the} said that it was because of a fight with Early about dropping a story. A story about…\n\n\t\"You. You bribed Early Roberts.\"\n\n\t\"I did. And now I'm bribing you.\"\n*comment endif\n\n*choice\n\t#Accept the money. Maybe even use it as evidence against him.\n\t\t*if ambition >= 65\n\t\t\t\"Sure, sounds good. Wire it to my account, and we have a deal.\"\n\n\t\t\tJaden smiles. For the first time, you see his perfectly white teeth. They look unnatural in this light. \"Excellent. I knew I judged you correctly.\"\n\t\t\t*set early_bribed true\n\t\t\t*set accept_jaden_deal true\n\t\t\t*set celebrity +10\n\t\t\t*set rel_early %-10\n\t\t\t*goto early_arrives\n\t\t*else\n\t\t\t\"Sure, sounds good. Wire it to my account, and we have a deal.\"\n\n\t\t\tJaden smiles. For the first time, you see his perfectly white teeth. They look unnatural in this light. \"Excellent. I admit I'm a bit surprised, but I'm glad we came to an arrangement.\"\n\t\t\t*set early_bribed true\n\t\t\t*set accept_jaden_deal true\n\t\t\t*set rel_early %-10\n\t\t\t*goto early_arrives\n\t#Ask for more money.\n\t\t*if ambition >= 70\n\t\t\t\"I want 20% more than what you gave Early.\"\n\n\t\t\t\"Aggressive, but not surprising coming from you,\" Jaden says. \"I don't think you truly understand the situation you're in.\"\n\t\t\t*set early_bribed true\n\t\t\t*set accept_jaden_deal true\n\t\t\t*set celebrity +15\n\t\t\t*set rel_early %-10\n\t\t\t*goto jaden_kill\n\t\t*else\n\t\t\t\"I want 20% more than what you gave Early.\"\n\n\t\t\t\"Aggressive and surprising, coming from you,\" Jaden says. \"I don't think you truly understand the situation you're in.\"\n\t\t\t*set early_bribed true\n\t\t\t*set accept_jaden_deal true\n\t\t\t*set rel_early %-10\n\t\t\t*goto jaden_kill\n\t#Refuse the offer.\n\t\t*if ambition \u003c= 35\n\t\t\t\"I'm not as easily bribed as Early. No deal.\"\n\n\t\t\t\"I was expecting you to say something like that,\" Jaden says. \"I don't think you truly understand the danger you're in.\"\t\t\t\n\t\t\t*set early_bribed true\n\t\t\t*set celebrity +10\n\t\t\t*set rel_early %+10\n\t\t\t*goto jaden_kill\n\t\t*else\n\t\t\t\"I'm not as easily bribed as Early. No deal.\"\n\n\t\t\t\"I'm surprised to hear you say something like that,\" Jaden says. \"I don't think you truly understand the danger you're in.\"\t\n\t\t\t*set early_bribed true\n\t\t\t*set rel_early %+10\n\t\t\t*goto jaden_kill\n\n*label jaden_threaten\n\n\"What do you mean?\"\n\n*if named_jaden = true\n\t\"You're going to publicly retract your allegations, or my associates will find new and creative ways to hurt you.\" Jaden looks at his nails, as if inspecting them for dirt. \"Quite badly, I'm afraid.\"\n*if named_jaden = false\n\t\"You're going to drop your story, or my associates will find new and creative ways to hurt you.\" Jaden looks at his nails, as if inspecting them for dirt. \"Quite badly, I'm afraid.\"\n*comment endif\n\n*if early_bribed = false\n\t\"You can't just bully reporters.\"\n\n\tHe sighs. \"And I don't wish to. Some of your coworkers have been much more agreeable.\"\n\n\tSomething Tracey told you days ago comes back to you. When you were asking ${thim} about ${this} Infraction, ${the} said that it was because of a fight with Early about dropping a story. A story about…\n\n\t\"You. You bribed Early Roberts.\"\n\n\t\"I did. But you have brought this too far for that.\"\n*comment endif\n\n*choice\n\t#Agree to drop the story.\n\t\t*if ambition >= 65\n\t\t\t\"Sure, sounds good. Happy to do business, as it were.\"\n\n\t\t\tJaden smiles. For the first time, you see his perfectly white teeth. They look unnatural in this light. \"Excellent. I knew I judged you correctly.\"\n\t\t\t*set early_bribed true\n\t\t\t*set accept_jaden_deal true\n\t\t\t*set celebrity +10\n\t\t\t*set rel_early %-10\n\t\t\t*goto early_arrives\n\t\t*else\n\t\t\t\"Sure, sounds good. Just don't hurt me.\"\n\n\t\t\tJaden smiles. For the first time, you see his perfectly white teeth. They look unnatural in this light. \"Excellent. I admit I'm a bit surprised, but I'm glad we came to an arrangement.\"\n\t\t\t*set early_bribed true\n\t\t\t*set accept_jaden_deal true\n\t\t\t*set rel_early %-10\n\t\t\t*goto early_arrives\n\t#Ask for a lot of money.\n\t\t*if ambition >= 70\n\t\t\t\"Only for money. A lot of money.\"\n\n\t\t\t\"The opportunity to ask for money has passed,\" he says. \"Your options are rapidly dwindling, ${pmister} ${pl_lname}. Now I have to make sure that you go away.\"\n\t\t\t*set early_bribed true\n\t\t\t*set accept_jaden_deal true\n\t\t\t*set celebrity +15\n\t\t\t*set rel_early %-10\n\t\t\t*goto jaden_kill\n\t\t*else\n\t\t\t\"Only for money. A lot of money.\"\n\n\t\t\t\"The opportunity to ask for money has passed,\" he says. \"Your options are rapidly dwindling, ${pmister} ${pl_lname}. Now I have to make sure that you go away.\"\n\t\t\t*set early_bribed true\n\t\t\t*set accept_jaden_deal true\n\t\t\t*set rel_early %-10\n\t\t\t*goto jaden_kill\n\t#Refuse the offer.\n\t\t*if ambition \u003c= 35\n\t\t\t\"Threats won't work on me. No deal.\"\n\n\t\t\t\"Threats are only as effective as the man who is willing to implement them,\" he says. \"And I am. Your options are rapidly dwindling, ${pmister} ${pl_lname}. Now I have to make sure that you go away.\"\n\t\t\t*set early_bribed true\n\t\t\t*set celebrity +10\n\t\t\t*set rel_early %+10\n\t\t\t*goto jaden_kill\n\t\t*else\n\t\t\t\"Threats won't work on me. No deal.\"\n\n\t\t\t\"Threats are only as effective as the man who is willing to implement them,\" he says. \"And I am. Your options are rapidly dwindling, ${pmister} ${pl_lname}. Now I have to make sure that you go away.\"\n\t\t\t*set early_bribed true\n\t\t\t*set rel_early %+10\n\t\t\t*goto jaden_kill\n\n*label jaden_kill\n\nYou feel a chill, and your palms sweat. \"What do you mean?\" you ask, but you know what's coming.\n\n\"You've learned too much, said too much. I can't let you continue in this way.\"\n\n*if early_bribed = false\n\t\"You can't just bully reporters.\"\n\n\tHe sighs. \"And I don't wish to. Some of your coworkers have been much more agreeable.\"\n\n\tSomething Tracey told you days ago comes back to you. When you were asking ${thim} about ${this} Infraction, ${the} said that it was because of a fight with Early about dropping a story. A story about…\n\n\t\"You. You bribed Early Roberts.\"\n\n\t\"I did. But you have brought this too far. I must take more permanent measures.\"\n\n*comment endif\nThe two men pull out lethal-looking weapons and point them at you. Jaden waves a hand at them. \"Not here. It would take days to get the blood out of the carpet.\" They put the pistols away. \"Take ${phim} somewhere quiet and do it there. I need to get some work done.\"\n*goto early_arrives\n\n*label early_arrives\n\nAt that moment, you hear a commotion outside the doors to the office. The guards look at each other as Early knocks open the door steps ahead of an irate functionary. \"I have access!\" he yells, and throws a plastic badge at the person following him before he slams the door in their face. A headache starts to form behind your eyes as Early turns and looks at Jaden.\n\n*if accept_jaden_deal = true\n\t\"Mr. Sloane, do you have a comment on your attempt to bribe an INN reporter?\"\n*if accept_jaden_deal = false\n\t\"Mr. Sloane, do you have a comment on your attempt to murder an INN reporter?\"\n*comment endif\n\nJaden tries to smile at Early. \"Using a stolen badge to infiltrate my office hardly gives you the right to ask me questions, Mr. Robertsson.\"\n\nEarly waves his finger admonishingly. \"I've told you, it's Roberts, not Robertsson. And you're lucky I'm not smoking this time.\"\n\nJaden stands up from behind his desk. \"While this farce is vaguely amusing, I don't understand the point of it. You and I both know that your implanted cameras are useless in my office.\"\n\n\"That's absolutely true.\" Early reaches into his pocket and pulls out a small handheld camera, very similar to the one Angel used to have. \"But I'm willing to bet that this works just fine.\"\n\n*page_break\nJaden frowns. \"I thought we had reached an understanding, Mr. [i]Roberts[/i].\"\n\n\"We did. But our agreement didn't extend to your family, now did it?\" He puts the camera to his eye. \"And this story is just too damn good to pass up.\"\n\n\"You know I don't give my consent to be recorded.\"\n\nEarly shrugs. \"I think INN will be willing to pay the fines.\"\n\nThe businessman grabs the lapels of his coat, straightening them, and carefully sits down behind the desk. \"Whatever story you think you have, Mr. Roberts, it will never air on INN. Take your coworker and go, and if both of you know what's best, I will not see or hear from either of you again.\"\n\n*if accept_jaden_deal\n\t*goto get_out\n*else\n\t*choice\n\t\t#Fight through the pain and record him saying that.\n\t\t\t*if ambition \u003c= 30\n\t\t\t\tGritting your teeth, you manage to get your recorder working long enough to record him saying the story will never air on INN. You start to see red warning messages as you shut down the recording. It's not much, but it's a great piece for the story.\n\n\t\t\t\t*set case4_marketShare +20\n\t\t\t\t*goto get_out\n\t\t\t*else\n\t\t\t\tGritting your teeth, you try to engage your recorder long enough to record him saying the story will never air on INN. However, you see red warning messages before you can focus properly, and the moment is gone.\n\n\t\t\t\t*goto get_out\n\t\t#Tell Early this would make a great intro to my story.\n\t\t\t*if factual \u003c= 30\n\t\t\t\t\"Hey Early, wouldn't this be a great intro to my story?\"\n\n\t\t\t\tEarly laughs. \"My story, you mean. But I've already got some great footage. I'll even send you a copy.\"\n\n\t\t\t\t*set case4_marketShare +20\n\t\t\t\t*goto get_out\n\t\t\t*else\n\t\t\t\t\"Hey Early, wouldn't this be a great intro to my story?\"\n\n\t\t\t\tEarly laughs. \"My story, you mean.\"\n\n\t\t\t\t*goto get_out\n\t\t#Tell Jaden that I'll reveal the truth, no matter what.\n\t\t\t*if factual >= 70\n\t\t\t\t\"Oh, it'll air, Jaden. You won't be able to keep covering up your crimes.\"\n\n\t\t\t\t\"Nicely done, rookie,\" Early says. \"Got that little speech on tape and everything. I'll even shoot you a copy.\"\n\n\t\t\t\t*set case4_marketShare +20\n\t\t\t\t*goto get_out\n\t\t\t*else\n\t\t\t\t\"Oh, it'll air, Jaden. You won't be able to keep covering up your crimes.\"\n\n\t\t\t\t\"Nice speech, rookie,\" Early says. \"But you don't have to speak for me.\"\n\n\t\t\t\t*goto get_out\n\n*label get_out\n*achieve ach_talk_jaden\nOne of the men grabs you out of your seat. You shrug out of the grip as Early claps you on the back, smiles at Jaden, and shoves you through the doors of the office. \"Time to go,\" he says.\n\n*page_break\nAfter you make your way to the elevator, you turn to look at him. He stares back with gray eyes, smirking at you in his infuriating way. You have so many questions, but you manage to spit one out. \"Why?\"\n\n\"Huh. I figured you'd go with 'How?' first. And I had a speech all prepared.\"\n\n\"Early…\"\n\nHe pulls out a cigarette and puts it between his lips. \"Your implants, like mine, have a broadcast signal. It's how you can communicate with your earpiece. I can sometimes pick up on what you're seeing, but when I do it gives off a—what did the doc call it?—a biofeedback loop.\"\n\n\"Headaches.\" You rub your temples as you feel another one build.\n\n\"Got it in one, rookie. I've been trying for weeks, but I finally found a way to tap into that signal. And wasn't I surprised to find out you were talking to Jaden Sloane.\"\n\n\"This doesn't get us any closer to 'why.'\"\n\n*page_break\nThe doors to the elevator open. You see a few uniformed security guards walking toward you, but Early calmly shows his press pass to them. \"Sorry, folks. Just a misunderstanding. We'll be on our way.\" The guards look confused as you make your way outside. A cab pulls up, and you both get inside. You give the address for INN, and then turn to look at Early again.\n\n\"Fine, fine. The 'why'.\" He lights his cigarette and takes a long drag off of it.\n\n*if accept_jaden_deal = true\n\t*if rel_early \u003c= 15\n\t\t\"I've known since the beginning that you were a terrible reporter, ${pl_fname}. And now I have proof that you made a deal with Jaden Sloane to cover up this story.\"\n\t*if (rel_early > 15) and (rel_early \u003c= 22)\n\t\t\"You and I haven't seen eye to eye on a lot of things, ${pl_fname}, but I knew you'd screw up eventually. And now I have proof that you made a deal with Jaden Sloane to cover up this story.\"\n\t*if (rel_early > 22) and (rel_early \u003c 30)\n\t\t\"You and I haven't seen eye to eye on a lot of things, ${pl_fname}, but I have to admit that you've turned out to have some real talent. But now I have proof that you made a deal with Jaden Sloane to cover up this story.\"\n\t*if rel_early > 30\n\t\t\"You and I are more alike than you think, ${pl_fname}. I like you, and outside of work…well, I wouldn't kick you out of bed.\"\n\n\t\t\"Bed?\" you ask, stunned at the change in topic.\n\n\t\tHe ignores you and continues. \"But business is business, and now I have proof that you made a deal with Jaden Sloane to cover up this story.\"\n*if accept_jaden_deal = false\n\t*if rel_early \u003c= 15\n\t\t\"I've known since the beginning that you were a terrible reporter, ${pl_fname}. But at least you stumbled into giving me proof of Jaden threatening to kill you.\"\n\t*if (rel_early > 15) and (rel_early \u003c= 22)\n\t\t\"You and I haven't seen eye to eye on a lot of things, ${pl_fname}, and I knew you'd screw up eventually. But at least you stumbled into giving me proof of Jaden threatening to kill you.\"\n\t*if (rel_early > 22) and (rel_early \u003c 30)\n\t\t\"You and I haven't seen eye to eye on a lot of things, ${pl_fname}, but I have to admit that you've turned out to have some real talent. And now I have proof of Jaden threatening to kill you.\"\n\t*if rel_early >= 30\n\t\t\"You and I are more alike than you think, ${pl_fname}. I like you, and outside of work…well, I wouldn't kick you out of bed.\"\n\n\t\t\"Bed?\" you ask, stunned at the change in topic.\n\n\t\tHe ignores you and continues. \"But business is business, and now I have proof of Jaden threatening to kill you. I have to focus on that.\"\n*comment endif\n\n\"What proof?\"\n\n\"I told you,\" he says, tapping his temple. \"The implants. I saw what you saw in there, heard what you heard. And now I have a copy of it all.\"\n\n\"Great, give it to me.\"\n\nEarly blows smoke out in your face. \"Not so fast, rookie. We're going to go talk to Maris first.\"\n\n\"Talk about what? I don't even have a story yet.\"\n\nThe cab pulls up to INN, and Early smiles at you. \"That's right. But I do. Like Sloane said—I [i]did[/i] make a deal with him. He was watching me.\" He points his lit cigarette at your chest. \"So if I throw you under the bus, I get him off my back. Everyone wins.\" He puts the cigarette back between his lips. \"Everyone except for you.\"\n\n*choice\n\t#Punch him.\n\t\t*if factual \u003c= 35\n\t\t\tYou punch Early, and he slumps in the seat. His eyes roll back in his head as you open the door to the cab and step out.\n\n\t\t\tYou're going to pay for that, but it felt good. Really good. And you know that word will get out that you're not a reporter to mess with.\n\n\t\t\tThe doors to INN slide open, and you step inside, ready to face Maris.\n\t\t\t*achieve ach_punch_early\n\t\t\t*set celebrity +15\n\t\t\t*set rel_early %-10\n\t\t\t*set infractions +1\n\t\t\t*finish\n\t\t*else\n\t\t\tYou punch Early, and he grabs his jaw. \"Not in the face, damn it!\" he says, as you open the door to the cab and step out.\n\n\t\t\tYou're going to pay for that, but it felt good. Really good. Early gets out of the cab after you, and you don't even look at him as you walk to the building.\n\n\t\t\tThe doors to INN slide open, and you step inside, ready to face Maris.\n\t\t\t*set rel_early %-10\n\t\t\t*set infractions +1\n\t\t\t*finish\n\t#Get out of the cab and leave him behind.\n\t\t*if independence >= 65\n\t\t\tYou step out of the cab and slam the door in Early's face. His eyes roll back in his head as he slumps in the seat.\n\n\t\t\tThat felt good. Really good. And you know that word will get out you're not a reporter to mess with.\n\n\t\t\tThe doors to INN slide open, and you step inside, ready to face Maris.\n\t\t\t*set celebrity +10\n\t\t\t*set rel_early %-10\n\t\t\t*finish\n\t\t*else\n\t\t\tYou step out of the cab and slam the door in Early's face. He laughs and opens it again, getting out of the cab after you, but you don't look at him as you walk to the building.\n\n\t\t\tThe doors to INN slide open, and you step inside, ready to face Maris.\n\t\t\t*set rel_early %-10\n\t\t\t*finish\n\t#Offer to sell your story to Early.\n\t\t*if ambition >= 65\n\t\t\t\"I'll sell you everything. Right now.\"\n\n\t\t\tEarly looks at you in surprise. \"What?\"\n\n\t\t\t\"Sure, all of it. As long as I get paid for the story, I don't care if it comes from you or INN.\"\n\n\t\t\tHe laughs. \"It doesn't work that way, rookie. But good try. We're going upstairs.\"\n\n\t\t\tYou shrug and step out of the cab, with Early behind you. But you know that word will get out that you're willing to do anything to succeed.\n\n\t\t\tThe doors to INN slide open, and you step inside, ready to face Maris.\n\t\t\t*set celebrity +10\n\t\t\t*set rel_early %+10\n\t\t\t*finish\n\t\t*else\n\t\t\t\"I'll sell you everything. Right now.\"\n\n\t\t\tEarly laughs. \"Why pay for something that I can get for free? Nice try, rookie. We're going upstairs.\"\n\n\t\t\tYou shrug and step out of the cab, with Early behind you. The doors to INN slide open, and you step inside, ready to face Maris.\n\t\t\t*set rel_early %+10\n\t\t\t*finish\n\t#Give Early all your information.\n\t\t*if factual \u003c= 35\n\t\t\t\"I'll give you everything. Right now.\"\n\n\t\t\tEarly looks at you in surprise. \"What?\"\n\n\t\t\t\"Sure, all of it. As long as the story gets told, I don't care if it comes from you or me.\"\n\n\t\t\tHe laughs. \"It doesn't work that way, rookie. But good try. We're going upstairs.\"\n\n\t\t\tYou shrug and step out of the cab, with Early behind you. But you know that word will get out that you're willing to do anything to get the story out.\n\n\t\t\tThe doors to INN slide open, and you step inside, ready to face Maris.\n\t\t\t*set celebrity +10\n\t\t\t*set rel_early %+10\n\t\t\t*finish\n\t\t*else\n\t\t\t\"I'll give you everything. Right now.\"\n\n\t\t\tEarly laughs. \"Nice try, but I want Maris to see you handing it over. We're going upstairs.\"\n\n\t\t\tYou shrug and step out of the cab, with Early close behind you. The doors to INN slide open, and you step inside, ready to face Maris.\n\t\t\t*set rel_early %+10\n\t\t\t*finish\n\t*if rel_early >= 30\n\t\t#Flirt with Early\n\t\t\t\"I'll give you everything. Right now.\"\n\n\t\t\tEarly looks at you in surprise. \"What?\"\n\n\t\t\t\"Sure, all of it. Once you take me out to dinner. Maybe afterwards I'll make it worth your while.\"\n\n\t\t\tHe laughs. \"Good try, but we're going upstairs. And maybe we'll take about that dinner after.\"\n\n\t\t\tYou step out of the cab, with Early behind you. The doors to INN slide open, and you step inside, ready to face Maris.\n\t\t\t*set celebrity +10\n\t\t\t*set eflirt true\n\t\t\t*set rel_early %+10\n\t\t\t*finish", "katrinasloane": "*comment Chapter Eight\n*advertisement\n*temp aired_now false\n*temp aired_teasers false\n*temp tracey_there true\n*text_image chap8.png\n\n[i]February 10th, 2062.[/i]\n\nTracey's voice is in your ear. \"Are you okay, boss?\"\n\nYou keep your eyes closed. You're in bed—your bed. You've been asleep off and on for the past couple of days. Is this how other INN reporters live? You've been assaulted more in the past few months than you have in all your life. As you slept, you had dreams of INN security officers dragging you into an alleyway and beating you up just to justify the expense of your company insurance.\n\nINN paid to have Dr. Mínervudóttir stop by your apartment to check out your eyes. You recall her saying something about alignments and connections or something, as she ran instruments over your head. Every time she did you got sharp pains, like something was hammering inside your head to get out, a pressure building inside your head. And then it all disappeared in a moment, like a soap bubble popping, and you fell immediately back to sleep.\n\nYou carefully open your eyes. Daylight pours into your room, and the clock in your opticOS display tells you it's late in the morning. You can see the small bedroom table with your various detritus: press pass, pocket tablet, and a new earpiece.\n\n\"Good morning, sleepyhead. Time to make the news.\"\n\nEarpiece. If the earpiece is sitting on the table, then how are you hearing…?\n\nYou sit upright in bed. Standing in the doorway is Tracey, smirking at you.\n\n*if (tflirt = true) and (rel_tracey >= 65)\n\t$!{the} looks at you as you sit up, and you're suddenly thankful that, at some point since you got home, you changed into sleeping clothes.\n\n\t\"I have to say, boss, I never expected to get into your bedroom this way.\" The smirk stays on ${this} lips as ${the} says it.\n\n\t*choice\n\t\t#\"Well, maybe today's your lucky day.\"\n\t\t\t$!{this} smirk blooms into a smile. \"A tempting offer. But unfortunately we have work to do, and some of us haven't been lounging around in bed for days.\"\n\t\t\t*set rel_tracey %+10\n\t\t\t*goto early_calls\n\t\t#\"Trust me, it'll be the last time you will.\"\n\t\t\t$!{this} face drops. \"Ouch. Well, don't worry. Won't happen again. Besides, we have work to do.\"\n\t\t\t*set tflirt false\n\t\t\t*set rel_tracey %-10\n\t\t\t*goto early_calls\n\t\t#\"What are you doing here?\"\n\t\t\t*goto early_calls\n*else\n\t*if rel_tracey >= 60\n\t\t$!{the} smiles as you sit up. \"If you're feeling up for it, you should get out of those sleeping clothes and meet me in the living room. We have work to do.\"\n\t\t*goto early_calls\n\t*if (rel_tracey \u003c 60) and (rel_tracey > 40)\n\t\t$!{the} watches you as you sit up. \"If you're feeling okay, change out of those sleeping clothes and meet me in the living room. We have work to do.\"\n\t\t*goto early_calls\n\t*else\n\t\t$!{the} watches you as you sit up. \"If you're done sleeping in, change out of those sleeping clothes and meet me in the living room. Some of us have work to do.\"\n\t\t*goto early_calls\n\n*label early_calls\n\n\"What are you doing here, anyway?\" you ask.\n\n\"You called me a couple of days ago, suggested we work out of your apartment.\"\n\n\"I did?\" You don't remember doing that.\n\nTracey shrugs. \"You were pretty wiped out after talking to that detective. Anyhow, the doc helped me get the footage out while you slept, and I've been putting together a rough cut.\" $!{the} points at you. \"Change. Meet me in the living room. Let's get some work done.\" $!{the} shuts the door behind ${thim}.\n\nYou pull yourself out of bed. Everything aches, but the pain in your head seems to be gone. You manage to strip down and make your way to the shower. Once you're clean, groomed, and dressed in a new set of clothes, you feel more human than you have in a while. As you're about to leave the room, your opticOS notifies you that someone is calling you. Early. Grumbling, you pop the earpiece in and take the call.\n\n*if rel_early >= 30\n\t\"Hey newbie,\" Early says. \"Glad to hear you aren't dead.\"\n*if (rel_early \u003c 30) and (rel_early > 10)\n\t\"Hey newbie,\" Early says. \"I guess you aren't dead yet.\"\n*if rel_early \u003c= 10\n\t\"Hey newbie,\" Early says. \"I guess death was too much to hope for.\"\n*comment endif\n\nThere's the headache, right on time. \"Your concern for my welfare is touching,\" you say, rubbing at your temples. \"What can I do for you, Early?\"\n\n\"I'd like to say I'm just checking in, because that's what Maris would like to think. But I'm not. What did you get on Gray?\"\n\n*choice\n\t#Lie to preserve my scoop. Let him figure out it's not true.\n\t\t\"Nothing. Turns out it was all a dead end.\"\n\n\t\tEarly laughs. \"You really don't get how this works, newbie. I know you talked with a detective at INN soon after you got back. All I have to do is give an early donation to the police charity fund, and I'll get the information soon enough. Better you just tell me now.\"\n\n\t\t\"And deprive you of the fun of spending your money on nothing? Now why would I do that?\"\n\n\t\t\"Suit yourself. I'll remember this, ${pl_lname}.\"\n\n\t\tThe call terminates.\n\t\t*set ambition %+10\n\t\t*set rel_early %-10\n\t\t*goto gray_face\n\t#Tell him what I know, in the interest of cooperation.\n\t\t\"Turns out she was deep into human trafficking. She was paranoid about a particular officer in the police as well.\"\n\n\t\t\"Was? Why the past tense?\"\n\n\t\t*if katrina_dead = true\n\t\t\t\"She's dead.\"\n\t\t*if katrina_arrested = true\n\t\t\t\"She's been arrested.\"\n\t\t*if (katrina_dead = false) and (katrina_arrested = false)\n\t\t\t\"The police are probably after her now.\"\n\t\t*comment endif\n\n\t\t\"Really? Well, that'll make the story easier to tell, won't it?\"\n\n\t\t\"Yes,\" you say carefully. \"My story will be easier to tell.\"\n\n\t\t\"Thanks for the info. I'm still keeping an eye on you.\"\n\n\t\tThe call terminates.\n\t\t*set independence %-10\n\t\t*set rel_early %+10\n\t\t*goto gray_face\n\t#Refuse to answer. He's not my boss.\n\t\t\"Why should I tell you anything?\"\n\n\t\tEarly laughs. \"You really don't get how this works, newbie. I know you talked with a detective at INN soon after you got back. All I have to do is give an early donation to the police charity fund, and I'll get  the information soon enough. Better you just tell me now.\"\n\n\t\t\"Better for you. Not for me.\"\n\n\t\t\"Suit yourself. I'll remember this, ${pl_lname}. I'm still keeping an eye on you.\"\n\n\t\tThe call terminates.\t\t\n\t\t*set independence %+10\n\t\t*set rel_early %-10\n\t\t*goto gray_face\n\t#Give him a little. I need to spread the truth.\n\t\t\"Turns out she was deep into human trafficking.\"\n\n\t\t\"Was? Why the past tense?\"\n\n\t\t*if katrina_dead = true\n\t\t\t\"She's dead.\"\n\t\t*if katrina_arrested = true\n\t\t\t\"She's been arrested.\"\n\t\t*if (katrina_dead = false) and (katrina_arrested = false)\n\t\t\t\"The police are probably after her now.\"\n\t\t*comment endif\n\n\t\t\"Really? Well, that'll make the story easier to tell, won't it?\"\n\n\t\t\"Yes,\" you say carefully. \"My story will be easier to tell.\"\n\n\t\t\"Sure, sure. Anything else, newbie?\"\n\n\t\tYou decide to keep her concerns about the police to yourself. \"No, not much else.\"\n\n\t\t\"I doubt that, but thanks for the info. I'm still keeping an eye on you.\"\n\n\t\tThe call terminates.\n\t\t*set ambition %-10\n\t\t*set rel_early %+10\n\t\t*goto gray_face\n\n*label gray_face\n\n*page_break\nYou open the door and step out into…\n\n*fake_choice\n\t#My tiny, messy apartment.\n\t\tYour apartment is tiny, with a galley kitchen and cramped living room. Plastic dishes sit piled up on the counters, just inches away from the recycling unit. The couch is covered in clothes, electronics parts, and old pillows, with two places cleared off to allow someone to sit down. A small flat-screen that you picked up from a college student online is mounted on the wall. Other people call it \"messy,\" but you like to think of it as \"lived in.\"\n\t#A furnished apartment I hardly ever see.\n\t\tThe apartment is an open-plan space: aside from your bedroom suite and the spare bathroom, there aren't any walls dividing up the various rooms. The kitchen is demarcated by a polished granite island, while a large leather couch marks the space between the dining room and the living room. There are a handful of pictures and decorations around, but all of them came with the other furnishings when you got the apartment. The whole space feels like a high-quality hotel room, not a home.\n\t#The most expensive apartment in the area.\n\t\tThe apartment is half of an entire floor, redone with the most modern materials and in a very tasteful style. The kitchen is huge and contains a wide variety of cooking utensils you don't even recognize. The living room is big enough to host an eight-person meeting, with this year's flat-screen model tastefully watching over the whole area. It's far more than you can afford, but you figure that as long as you're on INN's salary, you might as well enjoy it.\n\nTracey is sitting cross-legged on the couch, a large tablet balanced on ${this} knees. $!{the} slides the pair of netglasses ${the} was wearing to the top of ${this} head as you walk in. \"Who were you talking to?\"\n\nYou walk over to the fridge, and you're surprised to see food and drink inside. Someone must have gone shopping for you while you were unconscious. \"Early,\" you say, grabbing a bottle of water and closing the door before sitting on the couch with Tracey.\n\n\"Ugh,\" Tracey says. \"Hope you remembered to wash after.\"\n\nYou point at ${this} tablet with your water bottle. \"How far have you gotten?\"\n\n$!{the} shrugs. \"I have all the footage and information we got from your head, plus what I've been able to piece together on my own. But there's one big thing we need to discuss first.\"\n\n\"What's that?\"\n\n\"Katrina Gray's real identity. If we tell people that, it changes the whole nature of the story.\"\n\n*if katrina_picture = true\n\t\"Well, I have a picture of her.\"\n\n\tTracey nods. \"Yeah, that was in the file dump. I did some digging.\" $!{the} pokes at ${this} tablet a few times, and hands it over to you. \"That's her, right?\"\n\n\tThe picture on the screen is the same woman you saw in the warehouse, down to the same silver piercings. She's smiling in the picture, but it's not with the same sadistic glee you remember. You hand the tablet back. \"That's her.\"\n\t*goto gray_face_2\n*else\n\t\"Well, I got a good look at her face.\"\n\n\tTracey nods. \"Good. I didn't see a picture in your hard drive, but maybe you can tell me what she looks like?\"\n\n\tYou think back and describe her in as much detail as you can manage. After a couple of minutes, Tracey starts swiping madly at ${this} tablet. \"Wait, wait…I saw this…aha!\" $!{the} hands it over to you. \"Is that her?\"\n\n\tThe picture on the screen is the same woman you saw in the warehouse, down to the same silver piercings. She's smiling in the picture, but it's not with the same sadistic glee you remember. \"That's her.\" You save a copy of her picture to your hard drive before you hand the tablet back.\n\t*set katrina_picture true\n\t*goto gray_face_2\n\n*label gray_face_2\n\n*page_break\n\"Her name is Katrina Sloane.\"\n\nYou were starting to take a sip from the bottle when ${the} said the name, and you just manage to avoid spitting the water out in surprise. You take a hard swallow instead. \"Katrina [i]what[/i]?\"\n\n\"You heard.\" Tracey smiles, satisfied at your reaction.\n\n\"So Detective Sloane is her…?\"\n\n\"Brother, it seems.\"\n\n\"So that's why he told her about my meeting with him.\"\n\n\"He did what?\"\n\nYou set the bottle down. \"When she had me captured, she mentioned that he told her about my meeting with him, right before he disappeared. I tried to find the connection, but that's when things got tense.\"\n\nTracey nods. \"Makes sense. But I have more for you.\"\n\n*if deduction_shippingbodies = false\n\t\"Wait, let's follow this line of thinking for a minute.\"\n\n\tTracey frowns, but leans back on the couch. \"Sure. What are you thinking?\"\n\n\t\"Sloane—[i]Felix[/i] Sloane, that is—knows Katrina. He's in the business of buying and selling organs. She's in the business of buying and selling humans.\"\n\n\t\"Do we know what they're being sold [i]for[/i]?\"\n\n\t\"No, but it's not a stretch to assume they're in business together. She handles one end, he handles the other.\"\n\n\t\"That fits in with the other piece I have,\" ${the} says.\n\t*set deduction_shippingbodies true\n\t*goto gray_face_3\n*else\n\t*goto gray_face_3\n\n*label gray_face_3\n*page_break\n\"What have you got?\" you ask.\n\nTracey swipes at ${this} tablet again. \"Brother and sister might have a daddy.\" $!{the} hands the tablet over. \"Jaden Sloane, the regional VP of Ambrosia Welltronics AG.\"\n\nYou take the tablet and look at it. The man in the picture has some gray in his hair, but that's the only indication you have of his age. His teeth are even and white as he smiles—probably as expensive as the suit he's wearing. You skim the text: VP of a medical technology corporation, loving father of three (although you can't find the names of the children anywhere), wife died years ago during a messy trial separation. His division promotes \"a pure, organic lifestyle\" of networking organ donors with needy patients to avoid the need for cybernetic substitutes. He claims a 90 percent transplant rate.\n\nIt fits. [i]It all fits.[/i] Your hand trembles slightly as you hold the tablet. \n\n\"This is huge,\" you say. \"Really, really huge.\"\n\n\"It can be. We have a lot of pieces. It's up to you how you want to fit them together.\"\n\nYou swipe the tablet to look over the footage you have. You have to decide how much you want to air—you don't have anything solid tying the picture of the woman you know as Katrina Sloane to the actions of Katrina Gray, but there's certainly enough circumstantial evidence to allege a connection. How much the direction of the story aligns with how you've presented yourself in past stories will have an impact on your career—audiences might reject an insecure reporter.\n\nFirst, you need to decide how to handle the Katrina Gray angle.\n\n*choice\n\t#Play it straight—only present the information about Katrina Gray, keeping the Sloanes out of it.\n\t\t*set case3_marketshare +10\n\t\t*if factual >= 70\n\t\t\t*set celebrity +10\n\t\t\t*goto naming_jaden\n\t\t*else\n\t\t\t*goto naming_jaden\n\t#Name Katrina Gray as Katrina Sloane without evidence.\n\t\t*set named_katrina true\n\t\t*set case3_marketshare +15\n\t\t*if factual \u003c= 30\n\t\t\t*set celebrity +10\n\t\t\t*goto naming_jaden\n\t\t*else\n\t\t\t*goto naming_jaden\t\t\t\n\t*if (named_felix) \n\t\t#Make a connection between Katrina Gray and Felix Sloane without naming Katrina Sloane.\n\t\t\t*set case3_marketshare +15\n\t\t\t*if factual >= 70\n\t\t\t\t*set celebrity +10\n\t\t\t\t*goto naming_jaden\n\t\t\t*else\n\t\t\t\t*goto naming_jaden\n\t*if (named_felix) \n\t\t#Connect Katrina and Felix, and name her as \"Katrina Sloane.\"\n\t\t\t*set case3_marketshare +20\n\t\t\t*set named_katrina true\n\t\t\t*if factual \u003c= 30\n\t\t\t\t*set celebrity +10\n\t\t\t\t*goto naming_jaden\n\t\t\t*else\n\t\t\t\t*goto naming_jaden\n\t*if (recorded_katrina_interrogation) \n\t\t#Play the blurry footage of Katrina questioning me without naming her as Sloane.\n\t\t\t*set case3_marketshare +20\n\t\t\t*if factual >= 70\n\t\t\t\t*set celebrity +10\n\t\t\t\t*goto naming_jaden\n\t\t\t*else\n\t\t\t\t*goto naming_jaden\n\t*if (recorded_katrina_interrogation) \n\t\t#Use the footage, and also name her as \"Katrina Sloane\" in the report.\n\t\t\t*set case3_marketshare +25\n\t\t\t*set named_katrina true\n\t\t\t*if factual \u003c= 30\n\t\t\t\t*set celebrity +10\n\t\t\t\t*goto naming_jaden\n\t\t\t*else\n\t\t\t\t*goto naming_jaden\n\t*if (named_felix) and (recorded_katrina_interrogation) \n\t\t#Allege a connection between Katrina and Felix, along with the blurry footage of Katrina, but use the name \"Katrina Gray.\"\n\t\t\t*set case3_marketshare +25\n\t\t\t*if factual >= 70\n\t\t\t\t*set celebrity +10\n\t\t\t\t*goto naming_jaden\n\t\t\t*else\n\t\t\t\t*goto naming_jaden\n\t*if (named_felix) and (recorded_katrina_interrogation) \n\t\t#Draw a connection between Felix and Katrina Sloane, in addition to the footage, and use her real name.\n\t\t\t*set case3_marketshare +30\n\t\t\t*set named_katrina true\n\t\t\t*if factual \u003c= 30\n\t\t\t\t*set celebrity +10\n\t\t\t\t*goto naming_jaden\n\t\t\t*else\n\t\t\t\t*goto naming_jaden\n\n*label naming_jaden\nThat decided, you consider the tenuous, unsubstantiated connection between Katrina and Jaden Sloane, and whether it belongs in the story you're putting together.\n\n*choice\n\t#Don't mention anything about Jaden Sloane.\n\t\t*if factual >= 70\n\t\t\t*set celebrity +10\n\t\t*goto editing\n\t#Leave the name \"Jaden Sloane\" out of it, but allege a connection between Katrina Gray and Ambrosia Welltronics.\n\t\t*if factual \u003c= 30\n\t\t\t*set celebrity +10\n\t\t*set named_ambrosia true\n\t\t*goto editing\n\t#Imply a connection between Katrina Gray, Jaden Sloane, and Ambrosia Welltronics.\n\t\t*if factual \u003c= 30\n\t\t\t*set celebrity +10\n\t\t*set named_ambrosia true\n\t\t*set named_jaden true\n\t\t*goto editing\n\n*label editing\nYou work with Tracey over the next few hours, putting the story together. \n*if (rel_tracey >= 70) and (tflirt = true)\n\tDuring that time you notice ${thim} giving you suggestive glances or brushing against you more often than expected, but you stay focused on editing the story. \n*comment endif\nAs the afternoon turns into evening, you finish watching the rough cut one last time.\n\n*if (((named_katrina) or (named_ambrosia)) or (named_jaden))\n\t\"Maris is going to love us,\" Tracey says.\n\n\t\"Or kill us. This is risky as hell.\"\n\n\tTracey shrugs. \"It might not be just the facts, but it's the truth. You know it is.\"\n\n\tYou smile. \"True.\"\n\n\t*goto pipeline\n*else\n\t\"Well, those are all the facts.\" Tracey sounds slightly disappointed.\n\n\t\"That's all we're supposed to do,\" you say.\n\n\tTracey shrugs. \"Maybe something solid will surface once we air this.\"\n\n\tYou smile. \"True.\"\n\n\t*goto pipeline\n\n*label pipeline\n\"Which leads me to something else I've conveniently forgotten to mention until now.\"\n\nYou raise an eyebrow at ${thim}. \"Oh?\"\n\n*if early_show\n\t\"Given the fact that our real pilot episode was stolen from us by Early, I've been looking into…alternatives.\"\n*if early_show = false\n\t\"Given the fact that our first show was nearly stolen from us by Early, I've been looking into…alternatives.\"\n*comment endif\n\n\"That sounds ominous.\"\n\n\"I wouldn't call it ominous,\" Tracey says. \"More sort of thrilling.\"\n\n\"And by 'thrilling,' you mean 'likely to get us an Infraction.'\"\n\n$!{the} smiles. \"You know me so well, boss.\" $!{the} swipes at ${this} tablet a few times and keeps talking. \"Now that we have our own show, there's a pipeline for us to send data directly to the INN feed. It's meant to be used to upload our promo spots so the scheduling monkeys can put them into the right places, but it turns out no one actually checks what gets uploaded there. We could quickly edit a 'breaking news' logo onto the story, dump it into the feed, and run it on INN without having to clear it with Maris.\"\n\n\"That seems suspiciously insecure.\"\n\n\"Probably just sloppy code. Happens in even the biggest companies.\" Tracey shrugs. \"But it's just an idea to consider. I can also send out early teasers for the story, or just send it to Maris for review just as easily.\"\n\n*choice\n\t#\"Put the story out now.\"\n\t\t\"Living dangerously!\" Tracey taps a few times on the tablet and sets it aside. \"It's done.\"\n\n\t\t*set ambition %+10\n\t\t*set infractions +1\n\t\t*set aired_now true\n\t\t*goto moment_of_peace\n\t#\"Send teasers out now, but submit the story to Maris.\"\n\t\t\"You got it, boss.\" Tracey taps a few times on the tablet and sets it aside. \"It's done.\"\n\n\t\t*set factual %-10\n\t\t*set aired_teasers true\n\t\t*goto moment_of_peace\n\t#\"No, just submit it to Maris as normal.\"\n\t\t\"You got it, boss.\" Tracey taps the tablet and sets it aside.\n\n\t\t*set ambition %-10\n\t\t*goto moment_of_peace\n\n*label moment_of_peace\n\"We have a little time until Maris calls, one way or another,\" you say.\n\n*if rel_tracey >= 70\n\t*if tflirt\n\t\tTracey slides over next to you and puts a hand on your leg. \"I can think of a few ways to pass the time.\"\n\t\t*goto maris_calls\n\t*else\n\t\tTracey stands up and stretches. You can hear popping sounds. \"I could use a drink,\" ${the} says, walking over to your fridge.\n\t\t*goto maris_calls\n*if (rel_tracey \u003c 70) and (rel_tracey > 30)\n\tTracey stands up and stretches. You hear popping sounds. \"You want me to stick around, boss?\"\n\n\t*choice\n\t\t#Ask ${thim} to stay.\n\t\t\t$!{the} smiles. \"Sure thing. I could use a drink, though.\" $!{the} walks over to your fridge.\n\t\t\t*set rel_tracey %+10\n\t\t\t*goto maris_calls\n\t\t#It doesn't matter to me.\n\t\t\t\"Up to you. Doesn't bother me either way.\"\n\n\t\t\t$!{the} shrugs. \"Then I'll stick around for a bit, just in case. I could use a drink, though.\" $!{the} walks over to your fridge.\n\t\t\t*goto maris_calls\n\t\t#Tell ${thim} to go.\n\t\t\t\"Go ahead and head out.\"\n\n\t\t\t$!{the} shrugs, and starts packing up ${this} things. \"Sure thing, boss. Catch you later.\" $!{the} walks out the door and closes it behind ${thim}.\n\t\t\t*set tracey_there false\n\t\t\t*goto maris_calls\n*else\n\tTracey stands up and starts packing up ${this} things. \"That's my cue to take off. See you tomorrow, boss.\" $!{the} walks out the door and closes it behind ${thim}.\n\t*set tracey_there false\n\t*goto maris_calls\n\n*label maris_calls\n\nSuddenly, your opticOS display lights up with a call from Maris. That was fast. You send the command to answer the call.\n\n\"Hey, Maris. How—\"\n\n*if aired_now\n\t\"What in the hell have you done?\"\n\n\t\"I told Tracey to—\"\n\n\t\"No, I don't want to hear the excuse. You went behind my back, ${pl_fname}. You have to know there are consequences for that.\"\n\n\t*if infractions >= 4\n\t\t*goto fired\n\t*else\n\t\t*set market_share + case3_marketshare\n\t\t*goto drop_the_angle\n*if aired_teasers\n\t\"What are these teasers for?\"\n\n\t\"For the story that should be on your desk now.\"\n\n\t\"I know it's on my desk, but now we don't have the option to spike the story.\"\n\n\t*if infractions >= 4\n\t\t*goto fired\n\t*else\n\t\t*set case3_marketshare +5\n\t\t*goto drop_the_angle\n*else\n\t\"I just reviewed your story. We need to have a talk.\"\n\n\t*if infractions >= 4\n\t\t*goto fired\n\t*else\n\t\t*goto drop_the_angle\n\n*label fired\n\"Look, I'll—\"\n\n\"No. No more excuses. You've been running around without oversight and making headaches for this company long enough. I don't have a choice.\"\n\n\"What are you saying?\" You hear a soft beep in your pocket. Pulling out your press pass, you see that your credentials have been remotely wiped out.\n\n\"I'm sorry, ${pl_fname}, but you're fired.\" The call terminates.\n\nYou sit down on your couch, stunned. You pushed your luck too much and too often. And now, just like that, it's all over.\n\n*if celebrity >= 50\n\tWithin moments, your opticOS shows a number of messages from other reporters, recruiters, and networks: job offers, requests for interviews, and expressions of interest from agents all over the world. Your career with INN is finished, but you have a number of other options ahead of you.\n*if (celebrity \u003c 50) and (celebrity > 25)\n\tIt takes a few weeks, but eventually you get a few positive messages from recruiters and other networks. The job offers aren't as lucrative as INN's was, but you manage to continue your career as a journalist. Regardless, your work with INN is over.\n*if celebrity \u003c= 25\n\tFor weeks you try to talk to other networks, but none of them return your calls. No matter who you talk to or what you say, you can't seem to get any work as a reporter. Not only is your career with INN finished, but you never work as a licensed journalist again.\n\n*page_break End\nWe hope you've enjoyed playing [i]Ratings War.[/i]\n\n*feedback\n\nWe release new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n*ending\n\n*label drop_the_angle\nYou can hear her muttering something to her AI, and then her voice clears up. \"We need to talk about the Katrina Gray angle.\"\n\n\"You like that, huh? I figured you would.\"\n\n*if named_katrina\n\t\"What evidence do you have that Katrina Gray is Katrina Sloane?\"\n\n\t*if katrina_picture\n\t\t\"I have a picture of her from when I was kidnapped.\"\n\t*if katrina_picture = false\n\t\t\"I was a witness. I saw her face.\"\n\t*comment endif\n\n\t\"That's not very solid.\"\n\n\t\"It's news,\" you say, frustrated. \"I'm a reporter, not a detective.\"\n\n*if katrina_dead\n\t\"Katrina Gray is dead.\"\n\n\t\"I'm glad you noticed that. It doesn't change the fact that she kidnapped me along with dozens of other people.\"\n\n*if (named_katrina = false) and (katrina_dead = false)\n\t\"There isn't much here.\"\n\n\t\"She's a notorious criminal with a scrambler chip and a massive paranoid streak. I worked with what I had.\"\n*comment endif\n\nMaris sighs. \"I'm getting pressure from the police on this.\"\n\n\"What kind of pressure?\"\n\n*if katrina_dead\n\t\"They don't have enough to go public with why they have the corpse on their hands. They can't investigate her operation if she's dead.\"\n\t*goto drop_the_angle_2\n*if katrina_arrested\n\t\"They haven't had much luck getting any information out of her.\"\n\t*goto drop_the_angle_2\n*else\n\t\"They've arrested her, but they haven't had much luck getting anything out of her.\"\n\t*set katrina_arrested true\n\t*goto drop_the_angle_2\n\n*label drop_the_angle_2\n\n\"Maris, this sounds like—\"\n\n\"I know what it sounds like, ${pl_fname}!\" she screams. Shocked, you drop what you were going to say. After an awkward silence, she sighs again. \"I'm sorry about that. Ever since your encounter with Gray, I've had Legal in here so often I'm waiting for them to move into my office permanently.\"\n\n\"We need to expose this, Maris. That's what we do.\"\n\n*if aired_now\n\t\"It's already exposed, but now INN is open to lawsuits. I just need you to post a retraction until we have something harder.\"\n\n\t\"You're kidding me. A retraction?\"\n\n\t\"I wouldn't ask if it wasn't important.\"\n\n*if aired_teasers\n\t\"It's already out there, but you can cut the Katrina Gray angle and air the rest.\"\n\n\t\"That's the entire story, Maris.\"\n\n\t\"You still have the footage of the actual human trafficking operation. That's plenty for this week. It'll buy us some time until the next show.\"\n\n*if (aired_now = false) and (aired_teasers = false)\n\t\"I need you to cut the Katrina Gray angle.\"\n\n\t\"That's the entire story, Maris.\"\n\n\t\"You still have the footage of the actual human trafficking operation. That's plenty for this week. It'll buy us some time until the next show.\"\n\n*comment endif\nYou can't believe this. You start pacing up and down in front of your couch. \"Maris, this is the second time you've asked me to cut something from my story.\" \n*if tracey_there\n\tTracey looks over at you, a questioning look on ${this} face. You motion for ${thim} to stay quiet.\n*comment endif\n\n\"I know,\" she says.\n\n\"I thought you trusted me.\"\n\n\"This isn't a normal situation. You've stumbled into something big, really big. We need to be careful how we proceed.\"\n\n\"We should be worried about the news, Maris.\"\n\n*if (aired_now) or (named_katrina)\n\t*if infractions = 3\n\t\t\"And you should worry about your career. INN already wants me to fire you for too many Infractions. If you post a retraction, I can talk them down, which will give you time to do the story right.\"\n\t\t*goto drop_the_angle_3\n\t*else\n\t\t\"And you should worry about your career. INN already wants me to hit you with an Infraction. If you post a retraction, I can talk them down, which will give you time to do the story right. In the end, it's a small setback.\"\n\t\t*goto drop_the_angle_3\n*else\n\t\"And you should worry about your career. There's nothing inflammatory in the story, but I want you to do some more digging and roll out a better story next week.\"\n\t*goto drop_the_angle_3\n\n*label drop_the_angle_3\n\n*choice\n\t#Point out that the unedited story means bigger market share (and ratings).\n\t\t*if ambition >= 70\n\t\t\t\"This story is huge, like you said. Putting a name to it will just make it bigger. And that means more ad revenue.\"\n\n\t\t\tMaris is silent for a moment. \"And an increase in your market share.\"\n\n\t\t\t\"Sure, that too. But it'll put me on the map, and it'll give you a second hit show under your name. Just smooth it over with INN, and I promise you it'll be worth your while.\"\n\n\t\t\t\"If you're sure you can pull this off…\"\n\n\t\t\t\"I'm sure,\" you say, putting as much sincerity in your voice as you can. \"Trust me.\"\n\n\t\t\t\"Okay. I'll take care of this, and I'll give you more room to work. But you'd better deliver something amazing.\"\n\n\t\t\t*if infractions > 0\n\t\t\t\t*set infractions -1\n\t\t\t*if aired_now = false\n\t\t\t\t*gosub you_send\n\t\t\t*goto time_with_tracey\n\t\t*if (ambition \u003c 70) and (ambition >= 60)\n\t\t\t\"This story is huge, like you said. Putting a name to it will just make it bigger. And that means more ad revenue.\"\n\n\t\t\tMaris is silent for a moment. \"And an increase in your market share.\"\n\n\t\t\t\"Sure, that too. But it'll put me on the map, and it'll give you a second hit show under your name. Just smooth it over with INN, and I promise you it'll be worth your while.\"\n\n\t\t\t\"Fine! Fine. I'll make it work.\"\n\n\t\t\t*if aired_now = false\n\t\t\t\t*gosub you_send\n\t\t\t*goto time_with_tracey\n\t\t*else\n\t\t\t\"This story is huge, like you said. Putting a name to it will just make it bigger. And that means more ad revenue.\"\n\n\t\t\t\"That money will go right into our legal fees.\"\n\n\t\t\t\"Maris—\"\n\n\t\t\t*if aired_now\n\t\t\t\t\"This isn't a debate. Post a retraction, or I will.\"\n\n\t\t\t\t\"Fine.\" As she waits on the call, you grab your tablet and craft a brief retraction. You also see Maris pull down the original story and upload an edited one.\n\n\t\t\t\t\"Done,\" you say.\n\n\t\t\t\t\"Good. Thank you.\"\n\n\t\t\t*if aired_now = false\n\t\t\t\t*gosub maris_sends\n\t\t\t*set celebrity -5\n\t\t\t*set named_katrina false\n\t\t\t*goto time_with_tracey\n\t#Argue that Gray assaulted an INN reporter. Covering that up sends a bad message to future freelancers.\n\t\t*if independence \u003c= 30\n\t\t\t\"That woman kidnapped and assaulted an INN reporter, and now you're talking about covering it up.\"\n\n\t\t\t\"I didn't say—\"\n\n\t\t\t\"No, you didn't say that, but that's what it will look like to other freelancers.\"\n\n\t\t\tMaris is quiet for a long moment. \"If you're sure you can pull this off…\"\n\n\t\t\t\"I'm sure,\" you say, putting as much sincerity in your voice as you can. \"Trust me.\"\n\n\t\t\t\"Okay. I'll take care of this, and I'll give you more room to work. But you'd better deliver something amazing.\"\n\n\t\t\t*if infractions > 0\n\t\t\t\t*set infractions -1\n\t\t\t*if aired_now = false\n\t\t\t\t*gosub you_send\n\t\t\t*goto time_with_tracey\n\t\t*if (independence > 30) and (independence \u003c= 40)\n\t\t\t\"That woman kidnapped and assaulted an INN reporter, and now you're talking about covering it up.\"\n\n\t\t\t\"I didn't say—\"\n\n\t\t\t\"No, you didn't say that, but that's what it will look like to other freelancers.\"\n\n\t\t\tMaris is quiet for a long moment. \"Fine! Fine. I'll make it work.\"\n\n\t\t\t*if aired_now = false\n\t\t\t\t*gosub you_send\n\t\t\t*goto time_with_tracey\n\t\t*else\n\t\t\t\"T
