ximum exposure.\n\t\t*set revenge %-40\n\t\t*set freedom %-40\n\t\t*set lawless %-10\n\t\t*set fame %+10\n\t\t*set feared %-30\n\t\t*set rlshp_tap %-10\n\t\t*set antipoweredsent -5\n\t\t*set rebellionknockout true\n\n\t\tThis is what you have to do, prioritizing the security of your mission by ensuring a swift escape. This will also be quite the act of ideals, choosing to merely knock out Rebellion instead of the more brutal revenge you could have enacted.\n\n\t\t\"I'm taking you out of the equation,\" you say as you step towards Rebellion, ready to end this.\n\t\t*goto jennyshot\n\t#Kill Rebellion to make an example of ${youhir} on live 3V.\n\t\t*set revenge %+40\n\t\t*set freedom %+40\n\t\t*set lawless %+40\n\t\t*set fame %+10\n\t\t*set feared %+30\n\t\t*set rlshp_tap %-40\n\t\t*set antipoweredsent +10\n\t\t*set rebellionkill true\n\n\t\tYou don't care if killing Rebellion endangers the security of your mission—this is an act of revenge you need the freedom to carry out.\n\n\t\t\"I'm going to kill you now,\" you say as you step towards Rebellion, ready to end this. Forever.\n\t\t*goto jennyshot\n\t#Cripple Rebellion off camera so ${youze} can't come after me anytime soon.\n\t\t*set revenge %+40\n\t\t*set freedom %-40\n\t\t*set lawless %+20\n\t\t*set fame %-10\n\t\t*set feared %+15\n\t\t*set rlshp_tap %-40\n\t\t*set antipoweredsent +5\n\t\t*set rebellioncripple true\n\n\t\tThis is what you have to do, prioritizing the security of your mission by ensuring a swift escape. The fact that it's also an act of satisfying revenge is just a bonus, really. \n\n\t\t\"I'm going to make sure you can't interfere in my life anymore,\" you say as you step towards Rebellion, ready to end this once and for all.\n\t\t*goto jennyshot\n\n*label healthdeath\n*set health 0\n*page_break\n\nThat's when you feel it—your Health Level is completely depleted. Between The American Protectorate's attacks and the strain from using your Powers, you took too many hits to survive….\n\nAs the world starts to swirl into excruciating blackness, your final thoughts are of Grandma and your parents…\n\nFor you've truly let them down.\n\n*choice\n\t#Return to the beginning of the fight to see if I can survive. (Legend Cost 20)\n\t\tYou have another shot to defeat Rebellion and The American Protectorate, but your Legend Level will probably never recover from this drop.\n\n\t\tLegendary heroes don't die, ${codename}. You had better make better decisions this time around.\t\t\n\t\t*set power 100\n\t\t*set health 100\n\t\t*set legend -20\n\t\t*set powerregain -3\n\t\t*set feared 50\n\t\t*set freedom 50\n\t\t*set revenge 50\n\t\t*set rebelliondown 0\n\t\t*set diedbefore true\n\t\t*page_break\n\t\t*goto beginningsevenfight\n\t#Start HeroFall over from the very beginning.\n\t\tBetter luck next time, ${codename}! \n\t\t*ending\n\n*label powerdeath\n*page_break\n*set power 0\n\nThat's when you feel it—your Power Level is completely depleted. Before you know what's happening, your body gives out and you crash to the floor. You weren't paying close enough attention and you overexerted your Powers.\n\nAs the world starts to swirl into excruciating blackness, your final thoughts are of Grandma and your parents…\n\nFor you've truly let them down.\n\n*choice\n\t#Return to the beginning of the fight to see if I can survive. (Legend Cost 20)\n\t\tYou have another shot to defeat Rebellion and The American Protectorate, but your Legend Level will probably never recover from this drop.\n\n\t\tLegendary heroes don't die, ${codename}. You had better make better decisions this time around.\t\t\n\t\t*set power 100\n\t\t*set health 100\n\t\t*set legend -20\n\t\t*set regimedamage -4\n\t\t*set powerregain -3\n\t\t*set feared 50\n\t\t*set freedom 50\n\t\t*set revenge 50\n\t\t*set diedbefore true\n\t\t*page_break\n\t\t*goto beginningsevenfight\n\t#Start HeroFall over from the very beginning.\n\t\tBetter luck next time, ${codename}! \n\t\t*ending\n\n*label jennyshot\n*page_break\n\nBut then you hear Jenny screaming somewhere over the raging battles.\n\n\"${codename}, we've got our way out!\" Jenny shouts as you spin towards her. \"Get here, now.\"\n\nYou hesitate for a moment, because you know that you still need to deal with Rebellion. But that split second gives you the chance to notice that Jury must have somehow broken free from Processor's cords, because he stands just beyond Jenny…\n\nWith the Infinity Equalizer in his hands, pointed directly at her.\n\n\"Let's make sure Null doesn't have any more Powered tricks up her sleeve!\" Jury shouts as he fires the Equalizer at Jenny.\n\nAs the shot fires, you react immediately.\n\n*choice\n\t#Move Jenny with my gravity Powers.\n\t\t*set power -2\n\t\t*set rlshp_jenny %+15\n\n\t\tYou alter the gravity around Jenny, but with your Powers this unreliable, the effect only manages to shift her a few inches. \n\t\t*if (rlshp_jenny > 50) or (jennygirlfriend)\n\t\t\t*goto highjennyrloutcome\n\t\t*else\n\t\t\tLuckily you know the blast shouldn't have any effect on Jenny, since she's unPowered.\n\t\t\t\n\t\t\t*goto lowjennyrloutcome\n\t#Warn Jenny by screaming at her.\n\t\t*set rlshp_jenny %+10 \n\t\t\"Jenny, move!\" you scream at the top of your lungs. \n\n\t\t*if (rlshp_jenny > 50) or (jennygirlfriend)\n\t\t\tJenny hears you and at the last second, she tries to dodge the blast—but she's too slow and it collides with her stomach. \n\t\t\t*label highjennyrloutcome\n\t\t\tLuckily you know this blast shouldn't have any effect on Jenny, since she's unPowered.\n\n\t\t\tThen you watch as Jury's face goes white and he drops the Infinity Equalizer to the floor. Your stomach immediately seizes as you follow Jury's gaze back to Jenny…\n\n\t\t\t*page_break\n\n\t\t\tWho stands frozen, blood gushing from the hole torn through the side of her stomach.\n\t\t\t*goto jurywhiteface\n\t\t*else\n\t\t\tBut Jenny doesn't hear you and the blast collides with her stomach. Luckily you know it shouldn't have any effect on Jenny, since she's unPowered.\n\n\t\t\t*label lowjennyrloutcome\n\t\t\t*set jennydead true\n\t\t\tThen you watch as Jury's face goes white and he drops the Infinity Equalizer to the floor. Your stomach immediately seizes as you follow Jury's gaze back to Jenny…\n\n\t\t\t*page_break\n\n\t\t\tWho stands frozen, blood gushing from the hole torn through the center of her stomach.\n\t\t\t*goto jurywhiteface\n\t#[i]Thank slugger Jury's too stupid to know that weapon is useless on Jenny[/i], I think as I see the smug look on Jury's face.\n\t\t*set youinchedjenny false\n\t\t*set rlshp_jenny %-10\n\n\t\t*if (jennygirlfriend)\n\t\t\tJenny tries to jump towards you, but she's too slow as the blast collides with her stomach.\n\t\t\t*goto highjennyrloutcome\n\t\t*else\n\t\t\t*goto lowjennyrloutcome\n\n*label jurywhiteface\n*page_break\n\nYou watch Jenny fall to the floor and every part of your body goes numb. The sound drowns out and you can't even be sure if what you're seeing is real. It can't be real. You have to do something to make this not real.\n\nThat Infinity Equalizer was supposed to be non-lethal, only used to dampen Powers. Unless it has some secret kill function? Or maybe it was damaged because of your blast earlier? \n\nYou push those thoughts aside and step forward and suddenly the sound rushes back in. That's when you realize you've been screaming. Everyone in The Millennial Group and The American Protectorate stands frozen, stunned. Jury kneels beside Jenny, his eyes wide and his hands trembling. \n\n*page_break\n\nYou all just saw Jury, the nation's first son, do the very same thing his father, the President of the United States, punished your parents for. \n\nNo, not the same. \n\nBecause that would mean Jenny is dead. \n\nAnd she can't be dead.\n\nPanicked, you run towards Jury and Jenny, praying that \n*if youinchedjenny\n\tyour attempt to save her was enough to make that blast non-lethal. You can't even consider the alternative: that moving Jenny somehow made the blast worse. \n\t*goto windowsblowout\n*else\n\tyour choice to not try and move Jenny doesn't mean the difference between life and death.\n\t*goto windowsblowout\n\n*label windowsblowout\n\nBut that's when the windows blow out.\n\n*page_break\n\nYou brace yourself and there's a flash of light so bright you have to close your eyes. You feel a blast of heat and then pain as your body thuds against the wall.\n\nSlumped on the floor, you open your eyes and see Prodigal kneeling beside you. But she isn't looking at you—instead she stares at something in the center of the museum.\n\nSo you turn your head and lose your breath, because floating there is…\n\n*page_break\n\nBlack Magic.\n\n*if luckyeleventh\n\t$!{Bmze} still wears a hospital gown, which flops open to reveal ${bmhis} perfect body. Black Magic courses with ${energycolor} energy and from the dazed look on ${bmhis} ${bmceleb} face, you figure ${bmze} must have just woken up from ${bmhis} coma, somehow.\n\n\t*if bmcomaspouse\n\t\tSeeing Black Magic awake like this, your heart swells, despite the insanity that surrounds you. But when you catch Black Magic's eye, you don't find anything there—${bmze} looks vacant. Crazed.\n\t\t*goto crazedbm\n\t*else\n\t\tYou manage to catch Black Magic's eye, but you don't find anything there—${bmze} looks vacant. Crazed.\n\t\t*goto crazedbm\n*else\n\tBlack Magic has been out of the public eye ever since ${bmhis} shameful exit from The Hero Project, but now ${bmze} wears a new, all-gold costume and courses with ${energycolor} energy. $!{Bmze} certainly picked one slugger of a time to make ${bmhis} comeback, or whatever this is.\n\n\tYou manage to catch Black Magic's eye, but you don't find anything there—${bmze} looks vacant. Crazed.\n\t*goto crazedbm\n\n*label crazedbm\n\n*if male\n\t*goto bmshout\n*elseif genderneutralhr\n\t*set youfriend \"person\"\n\t*goto bmshout\n*else\n\t*set youfriend \"girlfriend\"\n\t*goto bmshout\n\n*label bmshout\n*if bmcomaspouse\n\t\"Stay the slugger away from my ${youfriend}!\" Black Magic screams.\n\t*goto rebslam\n*elseif bmcomanothing\n\t\"What have you all done?\" Black Magic screams, whipping around.\n\t*goto rebslam\n*else\n\t\"You all ruined me for this?\" Black Magic screams. \"You stole my career and destroyed my life so you could do this to each other?\"\n\t*goto rebslam\n\n*label rebslam\n*page_break\n\nRebellion is the first to step towards Black Magic.\n\n\"${bmfirst}, listen to me, you do not—\"\n\nBut Black Magic swipes ${bmhis} hand and Rebellion stiffens as energy is suddenly pulled from ${youhis} body, flowing from Rebellion to Black Magic. Is Black Magic draining Rebellion's life force directly? Can ${bmze} even do that? \n\nYou realize that Black Magic hasn't been speaking any of ${bmhis} strange spells, either—${bmze} is just tapping directly into ${bmhis} reality-altering Powers.\n\n*page_break\n\n\"You don't get to tell me what to do ever again, Rebellion!\" Black Magic shrieks. \"I'll make it so you don't get to tell anyone what to do anymore!\"\n\nYou pull yourself back on your feet just in time to see Lucky running at Black Magic from behind. Before you can do anything to stop either of them, Black Magic twists and grabs Lucky by the throat.\n\n\"And you think I'd just let you take my place like this?\" Black Magic shouts. \"In my spot, on my team? You've tried to take everything that's mine! But I will end you!\"\n\nBlack Magic then tries to close ${bmhis} fist around Lucky's throat, but Lucky manages to detonate ${luckyhis} neck first. You have to look away as the both of them are engulfed in a burst of flames.\n\nThis is madness. \n*if (jennygirlfriend) or (jennytruefriend)\n\tYou have to stop this and get to Jenny. You have to—\n\t*goto thoughtinterrupted\n*else\n\tYou have to stop this. You have to—\n\t*goto thoughtinterrupted\n\n*label thoughtinterrupted\n*page_break\n\nThat thought is interrupted as the smoke clears and Black Magic appears to absorb all of the blast energy from Lucky's explosion. Black Magic floats there, pulsing with Power, hovering above Lucky and Rebellion's crumpled bodies.\n\nFloating there, eyes wild and with heroes underfoot, Black Magic looks like some mad villain. In this moment, you realize that if Black Magic is really this unhinged, if ${bmze} has decided to drain life-force without restraint, ${bmze} could have limitless Power to bend reality to ${bmhis} will. And that just might make Black Magic…\n\nOmnipotent.\n\nWhich means that you have to find a way to stop this. Now.\n\n*choice\n\t#\"Black Magic, I need your help.\"\n\t\t*if (bmcomaspouse) or (bmcomanothing)\n\t\t\t\"I…\" Black Magic starts. \"Yes. Help. Yes.\"\n\t\t\t*goto teleportationimmigration\n\t\t*else\n\t\t\t\"Like you helped me?!\" Black Magic shrieks. \"Fine!\"\n\t\t\t*goto teleportationimmigration\n\t#\"Black Magic, it's me you want.\"\n\t\t*if bmcomaspouse\n\t\t\t\"I…\" Black Magic starts. \"You're right.\"\n\t\t\t*goto teleportationimmigration\n\t\t*elseif bmcomanothing\n\t\t\t\"I…\" Black Magic starts. \"I want you to explain yourself.\"\n\t\t\t*goto teleportationimmigration\n\t\t*else\n\t\t\t\"You?! You did this to me, you made me this way!\" Black Magic shrieks. \"Now you reap the benefits!\"\n\t\t\t*goto teleportationimmigration\n\t#\"You're a hero, Black Magic. Don't do this.\"\n\t\t*if bmcomaspouse\n\t\t\t\"I…\" Black Magic starts. \"You're right.\"\n\t\t\t*goto teleportationimmigration\n\t\t*elseif bmcomanothing\n\t\t\t\"I do what I want, now,\" Black Magic starts. \"And now I want you to explain yourself.\"\n\t\t\t*goto teleportationimmigration\n\t\t*else\n\t\t\t\"A hero like you?! You did this to me, you made me this way!\" Black Magic shrieks. \"Now you reap the benefits!\"\n\t\t\t*goto teleportationimmigration\n\n*label teleportationimmigration\n\nBlack Magic points at you and light erupts from ${bmhis} fingertips. \n\nYou brace yourself and Prodigal tries to pull you away, but then you just feel weightless. And burning. And then…\n\n*page_break\n\nWind?\n\nYou smell the beach and taste sea spray before you open your eyes to find yourself standing on a jetty that cuts into a raging ocean. The sky is dark and stormy, but you can somehow still see the sun peeking over the horizon in the distance.\n\nYour brain scrambles to put the pieces together. Black Magic must have teleported you somewhere, but if the sun is rising over the ocean, that must mean you're on the east coast… \n\nCould Black Magic really be Powerful enough to teleport you across the entire country?\n\n*page_break\n\nNo, not just you. Prodigal stands beside you too, looking just as bewildered. \n\nThat is, until a burst of energy slams into the jetty and sends Prodigal careening towards the shore. You steady yourself, watching as Prodigal lands in the sand amidst raining rock debris.\n\nThen you turn to find Black Magic floating before you, ${energycolor} energy whipping around ${bmhir}, backed by the thundering sky and crashing waves.\n\nIt's a singularly terrifying sight.\n\n*if (jennygirlfriend) or (prodigalgirlfriend)\n\t*set romancetaken true\n\t*goto thebmfriendchoice\n*elseif (luckyromancefinale) or (luckycomaspouse)\n\t*set romancetaken true\n\t*goto thebmfriendchoice\n*else\n\t*goto thebmfriendchoice\n\n*label thebmfriendchoice\n*if bmcomaspouse\n\t\"Is this what you wanted?\" Black Magic asks. \"Near the capital? Did I do good?\"\n\t*goto eyerocks\n*elseif bmcomanothing\n\t\"Alone at last,\" Black Magic says. \"Near the nation's capital, no less. It was all I could see in your stupid little mind.\"\n\t*goto eyerocks\n*else\n\t\"There will be a reckoning!\" Black Magic says. \"Near the nation's capital, no less. It was all I could see in your stupid little mind.\"\n\t*goto eyerocks\n\n*label eyerocks\n\n*if bmcomaspouse\n\t*choice\n\t\t#Talk Black Magic down.\n\t\t\t*set rlshp_bm %+15\n\t\t\t*set offensive %-15\n\t\t\t\"You did good, ${bmfirst}. And I'm so happy you're okay,\" you say. \"But you need to tell me what happened so we can in to undo your costume and you stare at Black Magic.\n\n\t\t\t\"Is this what you really want?\" you ask.\n\n\t\t\tBlack Magic just stares down at you, unflinching.\n\t\t\t*page_break\n\t\t\t*goto bmtherant\n\n*label bmtherant\n\n\"I had everything taken from me! Everything!\" Black Magic screams. \"Someone needs to pay! Someone needs to give me what I deserve!\"\n\nThe storm rages a bit harder behind Black Magic as ${bmze} rants—${bmze} couldn't actually be affecting it…could ${bmze}?\n\n\"You think I haven't lost everything, too?\" you shout back, ignoring the wave of fear rising in your chest. \"You think what has happened to me is fair? That I haven't been a pawn in some twisted game? Well, I'm taking control now and it's time you did too. So tell me, what do you want? Tell me what you want from me!\"\n\nBlack Magic pauses and something in ${bmhis} face changes. $!{Bmze} considers your words carefully, actually seeming to calm down.\n\n\"I just want my old life back,\" Black Magic says, so softy you almost don't hear ${bmhir}. \"I want my career the way it was before everything was…broken. I was the most famous, the most loved hero on the planet. And now I'm…\"\n\nYou look at Black Magic, knowing what you say next will make all the difference.\n\n*choice\n\t#\"Whatever has happened between us, you can trust me as your friend. I mean it.\"\n\t\t*set bmfinalefriend true\n\t\t*set rlshp_bm %+25\n\t\tYou pause, your heart beating in your chest. \n\n\t\t\"I'm here for you, Black Magic,\" you say. \"I promise that we will rebuild things the way they're supposed to be together, as friends and allies.\"\n\n\t\tBlack Magic stares at you, ${bmhis} lip quivering.\n\n\t\t\"I…\"\n\n\t\t*page_break\n\n\t\t\"I need time to think,\" Black Magic says. \n\n\t\tWith one more ${energycolor} flash, Black Magic vanishes into thin air.\n\n\t\t*page_break\n\n\t\tDespite yourself, a wave of relief passes through you. There's no telling the amount of destruction Black Magic could have caused, if ${bmze} really wanted. The last thing this country needs right now is another Infini-Class Powered flying off the handle.\n\n\t\tYou feel for Black Magic, but right now you don't have time to deal with ${bmhis} issues. You just hope you get a chance to make things right with Black Magic, once all is said and done.\n\t\t*goto timetopresson\n\t#\"You're selfish and weak, Black Magic.\"\n\t\t*set bmfinalehates true\n\t\t*set rlshp_bm %-30\n\t\tYou say the words and pause, your heart beating in your chest as you summon the courage to go on.\n\t\t\n\t\t*if bmbrokencareer\n\t\t\t\"It's time you started accepting responsibility for your own mistakes, because those are what got you here, in this place. You can blame nothing and no one else.\"\n\n\t\t\tBlack Magic stares you down, fury blazing through ${bmhis} cold eyes. For a moment, you're sure ${bmze} is going to wipe you out of existence.\n\n\t\t\t*page_break\n\n\t\t\tThen Black Magic turns away, a tear rolling down ${bmhis} cheek.\n\n\t\t\t\"I…I will never forgive you for what happened,\" Black Magic says. \"But I am going to make things right. So for your sake, stay the slugger out of my way.\"\n\t\t\t*goto bmstaresyoudown\n\t\t*else\n\t\t\t\"Nothing about what happened to you was fair, but you don't get to throw a tantrum like a little child. You pick yourself up and you make it right.\"\n\n\t\t\tBlack Magic stares you down, fury blazing through ${bmhis} cold eyes. For a moment, you're sure ${bmze} is going to wipe you out of existence.\n\n\t\t\t*page_break\n\n\t\t\tThen Black Magic turns away, a tear rolling down ${bmhis} cheek.\n\n\t\t\t\"I am going to make things right,\" Black Magic says. \"So for your sake, stay the slugger out of my way.\"\n\n\t\t\t*label bmstaresyoudown\n\n\t\t\tWith one more ${energycolor} flash, Black Magic vanishes into thin air.\n\n\t\t\t*page_break\n\n\t\t\tDespite yourself, a wave of relief passes through you. There's no telling the amount of destruction Black Magic could have caused, if ${bmze} really wanted. The last thing this country needs right now is another Infini-Class Powered flying off the handle.\n\n\t\t\tYou just hope Black Magic doesn't get in your way again. As Powerful as ${bmze} might be, you're not going to let anything, or anyone, stop you.\n\t\t\t*goto timetopresson\n\t*selectable_if (romancetaken = false) #\"We've been through all the same things, ${bmfirst}. Maybe after all this, we belong together.\"\n\t\t*set bmfinaleromance true\n\t\t*set romancetaken true\n\t\t*set rlshp_bm %+50\n\t\t\"I know you, Black Magic,\" you say. \"You confound me, you're stubborn and selfish and fragile, but underneath all that I see who you really are. And what you really need. You're just like me.\"\n\n\t\tYou pause, your heart beating in your chest. \n\n\t\t\"I know we'd both have to forget a lot, that we've both not been there for each other when we needed it most,\" you say. \"But I'm willing to forget all that, if you are. When this is all over, if we're both still standing, I'm willing to give it a shot, to rebuild everything. With you.\"\n\n\t\tBlack Magic stares at you, ${bmhis} lip quivering.\n\n\t\t\"I…\"\n\n\t\t*page_break\n\n\t\t\"I need time to think,\" Black Magic says. \n\n\t\tAnd with one more ${energycolor} flash, Black Magic vanishes into thin air.\n\n\t\t*page_break\n\n\t\tDespite yourself, a wave of relief passes through you. There's no telling the amount of destruction Black Magic could have caused, if ${bmze} really wanted. The last thing this country needs right now is another Infini-Class Powered flying off the handle.\n\n\t\tThough part of you wishes Black Magic would have stayed, that ${bmze} would stand by you and choose to be selfless, just this once. \n\n\t\tBut a bigger part of you knows who Black Magic really is and understands why ${bmze} needs to go. You just hope you get a chance to make things right with Black Magic, once all is said and done.\n\t\t*goto timetopresson\n\t*if (bm_breakup) #\"We broke up because of this kind of self-centered behavior.\"\n\t\t*set rlshp_bm %-10\n\t\t\"You blame everyone else for what happens to you,\" you shout. \"We didn't break up because I betrayed you, we broke up because you forced us to keep our relationship a secret, then bullied me with terms and ultimatums. \n\n\t\t\"I went along because I thought you were someone else, but then you showed your true colors. All you ever care about is what's good for you, but it's time you grow up.\"\n\n\t\tBlack Magic stares you down, fury blazing through ${bmhis} cold eyes. For a moment, you're sure ${bmze} is going to wipe you out of existence.\n\n\t\t*page_break\n\n\t\tThen Black Magic turns away, a tear rolling down ${bmhis} cheek.\n\n\t\t\"I…I will never forgive you for what happened,\" Black Magic says. \"But I am going to make things right. So for your sake, stay the slugger out of my way.\"\n\n\t\tWith one more ${energycolor} flash, Black Magic vanishes into thin air.\n\n\t\t*page_break\n\n\t\tDespite yourself, a wave of relief passes through you. There's no telling the amount of destruction Black Magic could have caused, if ${bmze} really wanted. The last thing this country needs right now is another Infini-Class Powered flying off the handle.\n\n\t\tYou just hope Black Magic doesn't get in your way again. As Powerful as ${bmze} might be, you're not going to let anything, or anyone, stop you.\n\n\t\t*if (rlshp_bm > 50)\n\t\t\t*set bmfinalefriend true\n\t\t\t*set bmbreakupcivil true\n\t\t\t*goto timetopresson\n\t\t*else\n\t\t\t*set bmfinalehates true\n\t\t\t*goto timetopresson\n\n*label bmstammers\n\n\"I don't know what's going on,\" Black Magic stammers. \"I woke up in that hospital bed and the things they told me, what happened with The Hero Project and after… nothing is the same. It's all gone bad, it's all broken.\"\n\n\"But this, what you just did, it isn't you, ${bmfirst},\" you say. \"You're Black Magic. You're better than this.\"\n\n\"Am I?\" Black Magic says. \"I have the Power to change things, really change things. To make them go back the way they were, the way they should be. Isn't it my responsibility to use that Power?\"\n\n\"If you do that,\" you start, \"if you use your Power to take from others and do whatever you want, that just makes those hateful bigots right about us. We have to be better, ${bmfirst}.\"\n\n*page_break\n\nBlack Magic hovers back down onto the jetty, hugging you as ${bmze} bursts into tears. \n\n\"It's all so unfair,\" Black Magic cries. \"I'm so scared.\"\n\n*if (jennygirlfriend) or (prodigalgirlfriend)\n\t*set rlshp_bm %-50\n\n\tBlack Magic goes to kiss you and you instinctively step back, thinking of\n\t*if jennygirlfriend\n\t\tJenny. Now might not be the best moment, but you have to be honest with Black Magic about what you've chosen…right?\n\n\t\t\"I'm so happy to see you awake again, Black Magic. What happened to you was so…unfair,\" you start. \"And we've been through so much together, but after everything, we're just…in different places.\"\n\t\t*goto havetoendthingsuhoh\n\t*else\n\t\tProdigal. Now might not be the best moment, but you have to be honest with Black Magic about who you've chosen…right?\n\n\t\t\"I'm so happy to see you awake again, Black Magic. What happened to you was so…unfair,\" you start. \"And we've been through so much together, but after everything, we're just…in different places.\"\n\n\t\t*label havetoendthingsuhoh\n\n\t\t\"Wait, are you breaking up with me?\" Black Magic says, stepping away from you.\n\n\t\tYou look Black Magic directly in the eye and nod, because what else is there to do?\n\n\t\t*label breakupflipout\n\t\t*page_break\t\n\t\t*set bmfinalehates true\n\t\t*set bmcomaspouse false\n\n\t\tBlack Magic trembles in front of you, looking like ${bmze} might break in half.\n\n\t\t\"I…\" Black Magic tries, ${bmhis} voice shaking. \n\n\t\tBlack Magic then looks away from you to gather ${bmhir}self. It takes a few moments, but when ${bmze} turns back to you, ${bmze} looks like ${bmze} has turned to steel.\n\n\t\t\"I will never forgive you for this.\" \n\n\t\tWith one more ${energycolor} flash, Black Magic vanishes into thin air.\n\n\t\t*page_break\n\n\t\tDespite yourself, a wave of relief passes through you. There's no telling the amount of destruction Black Magic could have caused, if ${bmze} really wanted. The last thing this country needs right now is another Infini-Class Powered flying off the handle—especially one that you helped to push over the edge.\n\n\t\tYou feel for Black Magic, but right now, you don't have time to deal with ${bmhis} issues. Right now, you have to be selfish, the way Black Magic was during The Hero Project.\n\n\t\tYou just hope that once all is said and done, you get a chance to make things right with Black Magic. \n\n\t\tThough something tells you that's not likely to happen.\n\t\t*goto timetopresson\n*else\n\tBlack Magic goes to kiss you and you know you have to make a decision about ${bmhir}, right here and now.\n\n\t*choice\n\t\t#Stand by Black Magic, no matter what.\n\t\t\t*set romancetaken true\n\t\t\t*set rlshp_bm %+50\n\t\t\t*achieve bmso\n\n\t\t\t\"I know you, Black Magic,\" you say. \"You confound me, you're stubborn and selfish and fragile, but underneath all that I see who you really are. And that you really just need someone to take care of you.\"\n\n\t\t\tYou pause, your heart beating in your chest. \n\n\t\t\tBlack Magic stares at you, ${bmhis} lip quivering.\n\n\t\t\t*page_break\n\n\t\t\tBlack Magic rushes at you, knocking you down onto the jetty rocks. The pain stabs at your back, but you hardly notice it. All you can feel is Black Magic's body pressed against yours, ${bmhis} hands all over you.\n\n\t\t\tAll it takes is one firm tug to remove ${bmhis} hospital gown and a wave of Black Magic's hand to make your own costume disappear. \n\n\t\t\tAnd there, under the storming sky, you and Black Magic find each other again.\n\n\t\t\t*page_break LATER\n\n\t\t\t\"I…\" Black Magic sits beside you, staring off into the distance to make ${bmhis} decision.\n\n\t\t\tAfter you finished, ${bmfirst} conjured costumes for the both of you and you took the time to fill ${bmhir} in on everything that has happened to you. Knowing time was too short, you asked Black Magic a very important question: what was ${bmze} going to do next?\n\t\t\t\n\t\t\t\"I'm sorry,\" Black Magic finally says, having taken longer than you'd like to respond. \"I'm so sorry, but I think I just need some time to think.\"\n\n\t\t\tBlack Magic turns to you, tears welling in ${bmhis} beautiful eyes.\n\n\t\t\t\"Please don't hate me.\"\n\n\t\t\tWith one more ${energycolor} flash, Black Magic vanishes into thin air.\n\n\t\t\t*page_break\n\n\t\t\tA wave of disappointment and anger immediately rockets through you. A big part of you wishes Black Magic would have stayed, that ${bmze} would stand by you and choose to be selfless, just this once. \n\n\t\t\tBut then a bigger part of you knows who Black Magic really is. And that part understands why ${bmze} needs to go after all ${bmze} has been through, whether it's right or wrong.\n\n\t\t\tYou just hope that once everything is said and done, you get to be with Black Magic again. The way you both truly deserve.\n\t\t\t*goto timetopresson\n\t\t#Tell Black Magic I need to focus on saving my parents right now.\n\t\t\t*set rlshp_bm %-30\n\n\t\t\t\"I'm so happy to see you awake again, Black Magic. What happened to you was so…unfair,\" you start. \"And we've been through so much together, but after everything, we're just…in different places. I've got so much I have to face and the last thing I want to do is drag you into the middle of it, after everything you've been through.\"\n\n\t\t\t\"What the slugger are you talking about?\" Black Magic says, stepping away from you. \"What could be more important than me, right now?\"\n\n\t\t\tYou stare at Black Magic, wondering where to even begin answering that question after all that ${bmze} has missed. Or how to answer without hurting Black Magic, somehow.\n\t\t\t\n\t\t\t*if (rlshp_bm > 30)\n\t\t\t\t*set bmfinalefriend true\n\t\t\t\t*set bmbreakupcivil true\n\t\t\t\t*set bmcomaspouse false\n\t\t\t\t*page_break\n\n\t\t\t\t\"It's more important that I save my parents, right now,\" you say.\n\n\t\t\t\t\"Wait, are you breaking up with me?\" Black Magic asks, shaking ${bmhis} head.\n\n\t\t\t\t\"I'm just pressing the pause button until this is all over,\" you say. \"Assuming I even live to see the end of this.\"\n\n\t\t\t\tBlack Magic stares at you, ${bmhis} lip quivering.\n\n\t\t\t\t\"I…\"\n\n\t\t\t\t*page_break\n\n\t\t\t\t\"I need time to think,\" Black Magic says. \n\n\t\t\t\tWith one more ${energycolor} flash, Black Magic vanishes into thin air.\n\n\t\t\t\t*page_break\n\n\t\t\t\tDespite yourself, a wave of relief passes through you. There's no telling the amount of destruction Black Magic could have caused, if ${bmze} really wanted. The last thing this country needs right now is another Infini-Class Powered flying off the handle.\n\n\t\t\t\tYou just hope you get a chance to make things right with Black Magic, once all is said and done.\n\t\t\t\t*goto timetopresson\n\t\t\t*else\n\t\t\t\t\"Wait, are you breaking up with me?\" Black Magic says, shaking ${bmhis} head.\n\n\t\t\t\tYou look Black Magic directly in the eye and nod, because there's nothing else to do.\n\t\t\t\t*goto breakupflipout\n\t\t#Break up with Black Magic because I can't be with ${bmhir}.\n\t\t\t*set rlshp_bm %-40\n\n\t\t\t\"I'm so happy to see you awake again, Black Magic. What happened to you was so…unfair,\" you start. \"And we've been through so much together, but after everything, we're just…in different places. I've got so much I have to face and the last thing I want to do is drag you into the middle of it, after everything you've been through.\"\n\n\t\t\t\"What the slugger are you talking about?\" Black Magic says, stepping away from you. \"What could be more important than me, right now?\"\n\n\t\t\tYou stare at Black Magic, wondering where to even begin answering that question after all that ${bmze} has missed. Or how to answer without hurting Black Magic, somehow.\n\n\t\t\t\"Wait, are you breaking up with me?\" Black Magic says, shaking ${bmhis} head.\n\n\t\t\tYou look Black Magic directly in the eye and nod, because there's nothing else to do.\n\t\t\t*goto breakupflipout\n\n*label timetopresson\n*page_break TEN MINUTES LATER\n\n\"I owe that pile of crazy a few hits,\" Prodigal says, rubbing her head as she sits next to you on the beach, under the rising sun.\n\n\"I could say the same thing to you,\n*if prodigalgirlfriend\n\tmy dearest darling,\" you return.\n\t*goto keepmovingneed\n*else\n\tLady Archenemy,\" you return. \n\t*goto keepmovingneed\n\n*label keepmovingneed\n\"But we need to keep moving.\"\n\n\"Agreed,\" Prodigal says. \"Now that we seem to have magically appeared on the east coast, we have to press forward to the Blessed Vessel.\"\n\nYou clench your jaw, because as much as you hate to admit it, you arrived at this same conclusion while you were waiting for Prodigal to regain consciousness. \n\nAll you want to do is go back to Millennia City to see if Jenny is alive, to see what happened to The Millennial Group and The American Protectorate, but your parents are scheduled to be executed tomorrow. If the IRP really has advanced their dePowering technology the way Rebellion claims, Miss Artillery could be dead any second—assuming she isn't already.\n\nSo as much as it pains you, you don't have time to find a way to teleport back and forth across the country. If only there was some way you could know what happened…but your MeChip is restricted so you can stay hidden, which means you can't access most content.\n\n*page_break\n\n\"I scanned all the press frequencies I could without giving up our location,\" Prodigal says, as if reading your mind. \"There's nothing out there about what happened back at the MGHQ. The live 3V feed went offline right before Jury hit Jenny. There's no way Victon's people were going to air that.\"\n\nYou close your eyes for a moment and take a deep breath, trying to figure out how the slugger you ended up here, in this situation. Within days, your entire world seems to have come down around you.\n\n*if chip_diva\n\t\"Don't worry, ${firstname},\" MeChip ${chipname} says, appearing in a little black dress and veil. \"Jenny will be all right. She has to be.\"\n\t*goto closeeyesknow\n*elseif chip_butler\n\t\"Don't worry, ${firstname},\" MeChip ${chipname} says, appearing in an all-black suit. \"Jenny will pull through. She has to.\"\n\t*goto closeeyesknow\n*else\n\t\"Don't worry, ${firstname},\" MeChip ${chipname} says, appearing in a black dressing gown. \"Jenny will be all right. She just has to be.\"\n\t*goto closeeyesknow\n\n*label closeeyesknow\n\nYou close your eyes, knowing that all you can do is hope that ${chipname} is right.\n\n*page_break\n\n\"How are we going to get out to the Blessed Vessel?\" you ask, turning to Prodigal. \"I could try to fly us, but something tells me I should conserve my Power for whatever fresh hell waits for us there.\"\n\n\"About that,\" Prodigal starts. \"I pre-arranged for a way to make it across the ocean once we got here, but I'm not sure you're going like it.\"\n\n\"What choice do I have, at this point?\" you ask.\n\n*if male\n\t*set granny \"grandpa\"\n\t*goto sidekickarrive\n*else\n\t*goto sidekickarrive\n\n*label sidekickarrive\n*if sparrow\n\tProdigal sighs, then she pulls a tech-bar out of her weapons belt. With the push of a button, the bar expands into a set of wings covered with shiny, black feathers.\n\n\tSparrow feathers.\n\t*goto chaptersevenend\n*elseif pressie\n\tProdigal sighs and then points towards the water, where you see a tiny rock approaching the shoreline. \n\n\tWait, not a rock—a rotating piece of earth.\n\n\tOr rather, a dirt-y magic carpet ride… \n\n\tPiloted by Pressie.\n\t*goto chaptersevenend\n*else\n\tProdigal sighs and then points up the shore, towards a girl wearing a white trench coat.\n\n\tA girl who looks a whole lot like Tarana Rain.\n\t*goto chaptersevenend\n\n*label chaptersevenend\n*finish Next Chapter: Vessels\n", "chap_six": "*comment é\n\n*text_image chap_6.png center Clusterslugger\n\n\"Well, this is awkward.\"\n\nOn your way to the Millennial Tower, you decided with Jenny and Prodigal that the best way to access the teleporter would be to break into the Millennial Museum undetected. No matter how you sliced it, you all agreed that exposing yourself to The Millennial Group would be too big a risk.\n\n*if guard_reserve\n\tEven though you were a reserve member of the Group briefly before The Hero Project and are still on good terms with most of its roster, there's no telling how they might respond to you now as America's most wanted fugitive, especially fighting alongside one of its most infamous domestic terrorists.\n\t*goto howeverstand\n*elseif guard_possible\n\tEven though you were invited to join the Group and are still on good terms with most of its roster, there's no telling how they might respond to you now as America's most wanted fugitive, especially fighting alongside one of its most infamous domestic terrorists.\n\t*goto howeverstand\n*else\n\tEspecially given the fact that your relationship with the Group is non-existent at best and hostile at worst. They'd have no reason to trust you normally, but definitely not now that you're America's most wanted fugitive fighting alongside one of its most infamous domestic terrorists.\n\t*goto howeverstand\n\n*label howeverstand\n\n*if luckyeleventh\n\t*goto didntmatter\n*elseif luckycomacivilally\n\t*goto didntmatter\n*else\n\tNo matter your personal feelings, you all agreed it would also be safer for Lucky if ${luckyze} didn't get involved. Though part of you did secretly hope you'd get caught, so you'd get a chance to at least see Lucky. \n\t*goto didntmatter\n\n*label didntmatter\n\nThough that didn't end up mattering much, because the moment you got through the cargo entry into the Millennial Tower, a custom electro-carbonfiber cage erected itself around you, Jenny, and Prodigal.\n\nBefore any of you could even react, you found the entire Millennial Group assembled in front of you. \n\n*page_break\n\nTheir leader, The Diva, stands out in front, her once-long black hair cut short into a bob that frames her flawless caramel face. She also wears an unusually minimalist version of her standard white-gold-pink costume—it looks like someone might be going through some kind of mid-life crisis?\n\nNext to The Diva stands Fistfull and Monk, and you immediately notice an enormous wedding ring on Fistfull's sausage-like finger, which matches the one gleaming underneath Monk's ivory robes. You hadn't realized this couple had finally gone public.\n\nNext to them stands Static, one of the Group's newest members, famously known as a fellow Fringes champion whose undercover work helped shut down The Splice Circle. \n*if static_meet\n\tIn fact, you were the one to save Static when his cover was blown by Madame Vice, so you know he thinks very highly of you—and that he owes you.\n\t*goto heelaproce \n*else\n\tAn operation you and The Millennial Group helped to complete, of course.\n\t*goto heelaproce\n\n*label heelaproce\n\nProcessor and Heela stand together in the back, having reportedly bonded as best friends. They're quite the odd couple, since Processor is an anthropomorphized artificial intelligence construct and Heela is a feline Animalistic Powered. The tabloids actually dubbed this pair the Oz Couple, given their resemblance to the Tin Man and the Cowardly Lion.\n\n*if luckyeleventh\n\tFinally, next to them stands Lucky in ${luckyhis} skintight red costume, looking as cute as ever. And staring a hole through you.\n\t*goto bizarro\n*else\n\tUnfortunately, there's no sign of the person you want to see most: Lucky.\n\t*goto bizarro\n\n*label bizarro\n*page_break\n\n\"How lovely, to return from a grueling mission and find some bizarro brand of  \n*if male\n\tThree Musketeers lurking about,\"\n\t*goto insultover\n*else\n\tCharlie's Angels lurking about,\"\n\t*goto insultover\n\n*label insultover\nThe Diva says, her voice at once smooth and sharp.\n\nYou don't have time for The Diva's barbed bitchery right now—you need to figure out how to get yourself out of this standoff.\n\n*if diva\n\t*if diva_good\n\t\tSo one question now remains: how much do you trust your dearest frenemy, The Diva?\n\t\t*goto yoursepond\n\t*else\n\t\tEspecially considering how much the Diva loathes you.\n\t\t*goto yoursepond\n*elseif fistfull\n\t*if fistfull_good\n\t\tYou know that after keeping their then-secret relationship to yourself, Fistfull and Monk consider you both a friend and an ally. You suppose it's time to see how far their loyalty stretches.\n\t\t*goto yoursepond\n\t*else\n\t\tEspecially since Fistfull and Monk hate you for \n\t\t*if fistfull_article\n\t\t\tleaking the story on their then-secret relationship to Sonja.\n\t\t\t*goto yoursepond\n\t\t*else\n\t\t\tthreatening to blackmail them about their then-secret relationship.\n\t\t\t*goto yoursepond\n*else\n\t*goto yoursepond\n\n*label yoursepond\n\n*choice\n\t*if (diva_good) #\"Lady Diva, you need to let me explain myself before you do anything rash.\"\n\t\t*set soloist %-10\n\t\t*set offensive %-10\n\t\t\"There's no need, darling,\" The Diva says.\n\t\t*goto stepsforward\n\t*if (diva_bad) #\"Lady Diva, who styled that new look? You should consider a refund, whoever it was.\"\n\t\t*set soloist %+10\n\t\t*set offensive %+10\n\t\t\"Oh darling, as if I'd ever turn to you for style advice,\" The Diva says. \n\t\t*goto stepsforward\n\t*if (fistfull_good) #\"Fistfull and Monk, you know me. At least let me explain myself?\"\n\t\t*set soloist %-10\n\t\t*set offensive %-10\n\t\t\"Oh we know,\" Fistfull says, turning to The Diva. \"Want to do the honors?\"\n\t\t*goto stepsforward\n\t*if (fistfull_bad) #\"Happy to see my little push helped your happy couple to be so out and proud.\"\n\t\t*set soloist %+10\n\t\t*set offensive %+10\n\t\t\"Are you sure I can't just crush ${youhir}?\" Fistfull says, turning to The Diva.\n\n\t\t\"I'd enjoy nothing more,\" The Diva says. \"But not yet.\"\n\t\t*goto stepsforward \n\t*if (static_meet) #\"Static, we come from the same place. And it looks like I could use some saving of my own, now.\"\n\t\t*set soloist %-10\n\t\t*set offensive %-10\n\t\t\"I don't think so,\" Static says with a smile, turning to The Diva.\n\t\t*goto stepsforward\n\t*if (guard_reserve) #\"I was one of you, not too long ago. Can you give me the benefit of the doubt here?\"\n\t\t*set soloist %-10\n\t\t*set offensive %-10\n\t\t\"We haven't forgotten anything,\" The Diva says.\n\t\t*goto stepsforward\n\t#\"We just want to use the teleporter, we're not here for a fight.\"\n\t\t*set soloist %+10\n\t\t*set offensive %-10\n\t\tAs soon as you finish speaking, Jenny and Prodigal kick you in either shin. \n\n\t\tSlugger—that wasn't exactly your most stealthy moment.\n\t\t*goto stepsforward\n\t#Signal Jenny to attack.\n\t\t*set soloist %+20\n\t\t*set offensive %+20\n\t\t*goto nogo\n\t#Break free of the cage with my gravity Powers. (Power Cost 30-60)\n\t\t*set soloist %+20\n\t\t*set offensive %+20\n\t\t*label nogo\n\t\t\"Darling, there will be no need for such a display,\" The Diva says.\n\t\t*goto stepsforward\n\t#\"Do any of you actually believe in what President Victon is doing?\"\n\t\t*set soloist %-10\n\t\t*set offensive %-10\n\t\t\"Funny you should mention it, darling,\" The Diva says. \n\t\t*goto stepsforward\n\n*label stepsforward\n\nThe Diva steps forward, gearing up for a speech. \"We've all had quite the discussion about your recent trials. And we've decided collectively that we don't care what may have happened between us in the past.\" \n\nThe Diva pauses, her face stoic.\n\n\"We're here to stand with you against President Victon, the IRP, and Rebellion's ridiculous little team.\"\n\nYour mouth falls open—that was not the response you were expecting.\n\n*page_break\n\n\"None of us believe in what President Victon is doing,\" Processor says. \"Frankly, we're appalled our former leader has fallen in with such a corrupt regime.\"\n\n\"Especially since one of the IRP's second-round summons went to The Diva,\" Static adds. \"Slugging idiots.\"\n\n\"Apparently I'm now considered Infini-Level,\" The Diva says, clocking your stunned expression. \"My mandatory reporting date was this morning. Whoops.\"\n\n*if fistfull_bad\n\t\"Don't think this means we like you for one second,\" Fistfull snarls, clenching his massive fists.\n\t*goto anyway\n*else\n\t*goto anyway\n\n*label anyway\n*page_break\n\n\"I'm afraid we're on the same side, either way,\" The Diva continues. \"Besides, I'd hate to see that mother of yours finished this way. She was the only worthy rival I ever had.\"\n\nDespite this joke, The Diva catches your eye and you nod at each other.\n\n\"Processor, I think it's time to free our guests,\" The Diva orders.\n\n\"Prodigal, you almost had me fooled with that stealth tech of yours,\" Processor says, her ample chest glowing as she deconstructs the cage. \"But this Tower is like an extension of my body. No one gets in without me knowing.\"\n\n\"Is that a challenge, my dear droid?\" Prodigal returns.\n\n\"If you like,\" Processor answers as the last of the cage bars disintegrate. \"I'd bet we could learn a useful trick or two from one another.\"\n\n*page_break\n\n\"We can't tell you why,\" you interrupt, knowing that Prodigal would banter forever if given the chance. \"But we need to use the teleporter.\" \n\n\"Then step right this way,\" The Diva says. \n*if luckyeleventh\n\t*goto luckytalkwalk\n*elseif (luckycomacivilally) or (luckycomatruefriend)\n\t\n\t\"Sorry I couldn't be here earlier, I had some mandatory post-coma nap time scheduled.\"\n\n\tYou turn around and find Lucky standing across the cargo bay, in ${luckyhis} skintight red costume, looking as cute as ever. And staring a hole through you.\n\n\t*page_break\n\n\t\"Lucky,\" you say, without even realizing it. Pulling yourself together, you add, \"It's good to see you back on your feet.\"\n\n\t\"It's good to be back on my feet,\" Lucky says, practically blushing. \"Sounds like I missed quite a bit since going under. But good old Processor here has brought me up to speed on how The Hero Project ended and everything that happened afterwards. My head is still spinning from all of it, sometimes literally. I still can't believe…\"\n\n\tLucky pauses, emotion overtaking ${luckyhir}. You can't imagine what it must feel like, to be cut down at the pinnacle of your career; to be put down by one of your closest allies and to miss so much.\n\n\tThen again, you can imagine what that feels like, at least a little.\n\n\t*page_break\n\n\tLucky breathes in, pulling ${luckyhir}self together. \n\n\t\"What's important is that I'm definitely with the Group on this one,\" ${luckyze} finishes.\n\n\t\"Glad to hear it, pumpkin,\" Prodigal says, tapping her foot. \"But can we take this awkward little display on the road? Time's a-ticking.\"\n\n\tShaking your head, you nod at The Diva to lead you to the museum.\n\t*goto luckytalkwalk\n*else\n\t\"But first, there's someone who wants to see you.\"\n\t*goto luckycomatalk\n\t\n*label luckytalkwalk\n*page_break\n\nAs you make your way to the teleporter, you fall behind to walk with Lucky. \n\n*if luckycivilally \n\tYou don't exactly have the best history with Lucky—do you want to say anything to ${luckyhir}?\n\t*goto luckyallyresolution\n*elseif luckycomacivilally \n\tYou walk in awkward silence, not sure what to say. The last time you had any real interaction with Lucky—if you can even call it that—${luckyze} was furious about the way you sold out Jenny during The Hero Project. Lucky is supporting you as a member of the Group, but ${luckyhis} silence indicates ${luckyze} must still be upset with you, personally.\n\n\tDo you want to say anything to ${luckyhir}?\n\t*goto luckyallyresolution\n*elseif luckytruefriend\n\tYou haven't seen ${luckyhir} since The Hero Project, but ${luckyze} has proven ${luckyhir}self to be a true friend and ally. \n\n\tSo what do you want to say to Lucky, knowing this may be your last chance?\n\t*goto luckyfriendresolution\n*else\n\tLucky proved ${luckyhir}self to be a true friend and ally during The Hero Project and there's so much you want to say about how everything turned out. \n\n\tBut time is short, so what do you want to say to ${luckyhir}, knowing this may be your last chance?\t\n\t*goto luckyfriendresolution\n\n*label luckyallyresolution\n*set luckyfinalally true\n\n*choice\n\t#\"I'm glad to see you doing so well, Lucky. Really.\"\n\t\t*set rlshp_lucky %+15\n\t\t\"Thank you,\" Lucky says.\n\t\t*label civilallyreality\n\t\t\"And listen, I do support you as a member of The Millennial Group. I don't believe in anything Victon or Rebellion is doing. Period.\"\n\n\t\tLucky pauses. You have a feeling that there's a \"but\" coming.\n\n\t\t\"But after what happened during The Hero Project, I just…You sold out your best friend in the whole world, the number one person on your list. And I'm nowhere near number one. So I can't help but wonder, what would you do to me, if it came down to the wire?\" \n\n\t\tLucky sighs, looking exhausted.  \"I just can't trust you, ${codename}. And I don't know what you're doing working with a person like Prodigal. Honestly, the only reason I'm not freaking out is because Null is involved and I trust her judgment. So is it okay if we just leave it at that, for now?\"\n\n\t\tYou keep walking, not looking at Lucky. Because you don't have the time for anything other than going along with what ${luckyze} proposes.\n\t\t*goto teletime\n\t#\"I'm so sorry for the way things went down during The Hero Project.\"\n\t\t*set rlshp_lucky %+25\n\t\t\"Thank you, that really does mean something. Seriously,\" Lucky says. \n\t\t*goto civilallyreality\n\t#\"Thank you so much for helping me, after everything.\"\n\t\t*set rlshp_lucky %+15\n\t\t\"You're welcome,\" Lucky says. \n\t\t*goto civilallyreality\n\t#\"Lucky, I…I wish I had chosen to be with you when I had the chance.\"\n\t\t*set rlshp_lucky %+25\n\t\t\"There was I time I felt the same way. Truly,\" Lucky says.\n\t\t*goto civilallyreality\n\t#Don't say anything—what's done is done.\n\t\t*set rlshp_lucky %-25\n\t\tSo you finish the rest of the walk in silence.\n\t\t*goto teletime\n\n*label luckyfriendresolution\n\n*choice\n\t#\"I'm glad to see you doing so well, Lucky. Really.\"\n\t\t*set luckyfinalfriend true\n\t\t*set rlshp_lucky %+20\n\t\t\"Thank you, ${codename},\" Lucky says.\n\t\t*label luckycomewith\n\t\t\"And I do support you as a member of The Millennial Group, because I don't believe in anything Victon or Rebellion is doing. Period. \n\n\t\t\"But I'm also going to be your friend forever. So anything you need, don't hesitate to ask. Even if it means working with that crazy lady Prodigal. Which, by the way, I'm hoping you have a really good reason for doing.\"\n\n\t\tYou turn to Lucky and suddenly pull ${luckyhir} into a hug, surprising ${luckyhir} so much that ${luckyze} nearly explodes a limb. It's nice to have someone as genuine as Lucky by your side, especially after all you've been through.\n\n\t\tLucky hugs you back and then you walk on, feeling ready to face what comes next.\n\t\t*goto teletime\n\t#\"Thank you so much for always being there for me, Lucky.\"\n\t\t*set luckyfinalfriend true\n\t\t*set rlshp_lucky %+25\n\t\t\"That's never going to change,\" Lucky says. \n\t\t*goto luckycomewith\n\t#\"Lucky, I…I wish I had chosen to be with you when I had the chance.\"\n\t\t*set rlshp_lucky %+35\n\t\t*if ((jennygirlfriend) or (prodigalgirlfriend)) or (bmcomaspouse)\n\t\t\t*set luckyfinalfriend true\n\t\t\t\"There was I time I felt the same way. Truly,\" Lucky says. \"And it means a lot to hear you say that. But we both know that ship has sailed.\"\n\t\t\t\n\t\t\tYou hear Lucky's words and you can only think of \n\t\t\t*if jennygirlfriend\n\t\t\t\tJenny. And you know that Lucky is right.\n\n\t\t\t\t*goto luckycomewith\n\t\t\t*elseif prodigalgirlfriend\n\t\t\t\tProdigal. And you know that Lucky is right.\n\n\t\t\t\t*goto luckycomewith\n\t\t\t*else \n\t\t\t\tBlack Magic. And you know that Lucky is right.\n\n\t\t\t\t*goto luckycomewith\n\t\t*else\n\t\t\t*set luckyromancefinale true\n\t\t\t\"There was I time I felt the same way. Truly,\" Lucky says. \"And listen, I do support you as a member of The Millennial Group, because I don't believe in anything Victon or Rebellion is doing, period. \n\n\t\t\t\"But I'm also going to be your friend and ally forever. So anything you need, don't hesitate to ask. Even if it means working with that crazy lady Prodigal. Which, by the way, I'm really hoping you have a good reason for doing.\"\n\n\t\t\tLucky pauses and something tells you ${luckyze} isn't quite finished talking yet.\n\n\t\t\t\"And who knows? Maybe when all this is finished, we'll get our second chance.\"\n\n\t\t\tYou turn to Lucky and suddenly pull ${luckyhir} into a hug, surprising ${luckyhir} so much that ${luckyze} nearly busts a limb. It's nice to have someone as genuine as Lucky by your side, especially after all you've been through.\n\n\t\t\tLucky hugs you back and then you walk on, feeling ready to face what comes next. Especially because now you know that if you manage to somehow survive this current hell, you might have a little piece of heaven waiting for you on the other side.\n\t\t\t*goto teletime\n\n*label luckycomatalk\n*page_break MINUTES LATER\n\nYou walk into one of the private apartment suites and find Lucky waiting there, wearing ${luckyhis} skintight red costume, looking as cute as ever. And staring a hole through you.\n\nThat's ${luckyname} Smith, Lucky, finally awake and standing right in front of you.\n\nYou feel so many emotions, you think you might explode.\n\n*page_break\n\n*if luckycomaspouseangry\n\t*goto chillytalkfirst\n*else \n\t*if (jennygirlfriend) or (prodigalgirlfriend)\n\t\t*goto chillytalkfirst\n\t*else\n\t\t*goto kissthentalk\n\n*label chillytalkfirst\n\n\"Sorry I couldn't be here earlier, I had some mandatory post-coma nap time scheduled.\"\n\nYou search your brain, trying to find the right words. \n*if luckycomaspouseangry\n\tThe last time you had any real interaction with Lucky—if you can even call it that—${luckyze} was furious about the way you sold out Jenny during The Hero Project. Sure, Lucky is still supposed to be your ${bmfriend}, but so much has happened since then—who knows where you stand now.\n\t*goto whatdoyousaytol\n*else\n\t*goto whatdoyousaytol\n\n*label whatdoyousaytol\n\n\"${luckyname},\" you say, without even realizing it. Pulling yourself together, you then say, \"It's good to see you back on your feet.\"\n\n\"It's good to be back on my feet,\" Lucky says, blushing. \"Sounds like I missed quite a bit since going under. But good old Processor brought me up to speed on how The Hero Project ended and everything that happened afterwards. My head's still spinning from all of it, sometimes literally. I can't believe…\"\n\nLucky pauses, emotion overtaking ${luckyhir}. You can't imagine what it must feel like, to be cut down at the pinnacle of your career; to be put down by one of your closest allies and to miss so much.\n\nThen again, you can imagine what that feels like, at least a little bit.\n\n*page_break \n\n*if luckycomaspouseangry \n\t\"Lucky, I…\" you try. \"Are we—\"\n\n\t\"Listen,\" Lucky interrupts. \"I need you to know that I do support you as a member of The Millennial Group, because I don't believe in anything President Victon or Rebellion is doing. Period.\"\n\n\tLucky pauses. You have a bad feeling that there's a \"but\" coming.\n\n\t\"But after what happened during The Hero Project, I just…\" Lucky sighs. \"What you did to Jenny, I…I know a lot has happened since then, but to me, it still feels like yesterday. There's so much to process and now you show up here with Prodigal of all people and I want to trust you, but…\"\n\n\tLucky trails off, ${luckyhis} eyes on the floor, clearly not sure what to say next. Or rather, ${luckyze} knows what to say—Lucky just doesn't want to say that ${luckyze} doesn't trust you out loud.\n\n\tSo you fill in the gap for ${luckyhir}.\n\n\t*if prodigalgirlfriend\n\t\t*page_break\n\t\t*label luckyprodigalbreakupscene\n\t\t*set luckyprodigalbreakup true\n\t\t*set luckyfinalally true\n\t\t*set rlshp_lucky %-50\n\n\t\t\"I'm so happy to see you—and to see you recovered like this. What happened to you was so…unfair,\" you start. \"But I think you're right. After everything, we're just…in different places. And things with Prodigal…\"\n\n\t\tYou stop yourself, not sure that revealing the fact that you've shacked up with Prodigal would be the best for anyone, right now.\n\n\t\t\"Well I certainly didn't think you'd be the one breaking up with me,\" Lucky says, ${luckyhis} voice much colder than you've ever heard it. \"But I was going to say I need some distance from you, that I need to just be your ally in all this, until I can find a way to trust you again.\n\n\t\t\"But it looks like we're on the same page anyway,\" Lucky finishes. \"So ending things is probably for the best.\"\n\n\t\t*page_break\n\n\t\tYou nod at Lucky and a tense silence ensues. \n\n\t\tThankfully, Lucky then makes ${luckyhis} way towards the door—it looks like you've both said all that you need to say.\n\n\t\tYou just wish things could have ended on a better note.\n\t\t*goto teletime\n\t*else\n\t\t*choice\n\t\t\t#\"Lucky, I'm sorry for it all, truly. I know now that I was wrong and that I need to do better. And I will. Because I just want to be with you.\"\n\t\t\t\t*set luckycomaspouse true\n\t\t\t\t*set rlshp_lucky %+40\n\t\t\t\t\"Apology accepted,\" Lucky says, already grinning.\n\t\t\t\t\n\t\t\t\t*label luckyapologykiss\n\t\t\t\t*achieve luckyso\n\n\t\t\t\tYou immediately run forward and Lucky pulls you into a kiss that feels better than just about anything. After the hell you've had to endure since The Hero Project ended, you almost forgot what this felt like.\n\n\t\t\t\tEvery part of you wants to rip Lucky's costume off here and now and just be together.\n\n\t\t\t\t*page_break\n\n\t\t\t\t\"There will be plenty of time for that later, I promise,\" Lucky says, knowing exactly what you want to do. \"But you need to listen to me. Wherever you're going next, I am coming with you. And I don't want to hear any arguments about it.\"\n\n\t\t\t\tYou open your mouth to do just that, but Lucky is already walking towards the door, clearly set in ${luckyhis} ways. It looks like however you feel about Lucky coming with you, you'll have to sort it out later.\n\n\t\t\t\tWhich is fine, because as much as you want to protect Lucky, you never want to be separated from ${luckyhir} ever again.\n\t\t\t\t*goto teletime\n\t\t\t#\"Lucky, I'm sorry for it all, truly. But I think you might be right. After everything, we're just…in different places. I think it's time we ended things.\"\n\t\t\t\t*label luckybreakupscene\n\t\t\t\t*set luckybreakup true\n\t\t\t\t*set luckyfinalally true\n\t\t\t\t*set luckycomaspouse false\n\t\t\t\t*set rlshp_lucky %-40\n\n\t\t\t\t\"Well I certainly didn't think you'd be the one breaking up with me,\" Lucky says, ${luckyhis} voice much colder than you've ever heard it. \"But I was going to say I need some distance from you, that I need to just be your ally in all this, until I can find a way to trust you again.\n\n\t\t\t\t\"But it looks like we're on the same page anyway,\" Lucky finishes. \"So ending things probably for the best.\"\n\n\t\t\t\tYou nod at Lucky and a tense silence ensues. \n\n\t\t\t\tThankfully, Lucky then makes ${luckyhis} way towards the door—it looks like you've both said all that you need to say.\n\n\t\t\t\tYou just wish things could have ended on a better note.\n\t\t\t\t*goto teletime\n\t\t\t#\"Whatever happened, I always tried to do what I thought was right. I understand if you can't forgive me, but know that I will always try to do the right thing. And that I still want to be with you.\"\n\t\t\t\t*set luckycomaspouse true\n\t\t\t\t*set rlshp_lucky %+20\n\t\t\t\t\"I guess that's enough, for now,\" Lucky says, already grinning.\n\n\t\t\t\t*goto luckyapologykiss\n\t\t\t#\"Whatever happened, I always tried to do what I thought was best. And I think you might be right. After everything, we're just…in different places. I think it's time we ended things.\"\n\t\t\t\t*goto luckybreakupscene\n*else\n\t\"Lucky, I…\" you try.\n\n\t\"Listen,\" Lucky interrupts. \"I need you to know that I do support you as a member of The Millennial Group, because I don't believe in anything President Victon or Rebellion is doing. Period.\"\n\n\t*if jennygirlfriend\n\t\t*set luckyjennybreakup true\n\t\t*set luckyfinalfriend true\n\t\t*set luckycomaspouse false\n\t\t*set rlshp_lucky %+20\n\n\t\tLucky steps towards you and you instinctively step back. You need to tell Lucky about Jenny, before this goes any further.\n\n\t\t\"I'm so happy to see you—and to see you recovered like this. What happened to you was so…unfair,\" you start. \"And it means so much to me to have your support. But after everything, I'm afraid we're just…I think we are in different places and—\"\n\n\t\t\"And we need to break up because you're in love with Jenny?\" Lucky asks.\n\n\t\tYou freeze in your spot, having no idea how to answer that question without destroying Lucky.\n\n\t\t*page_break\n\n\t\t\"Don't worry,\" Lucky starts, filling in the silence. \"When I woke up from the coma and found out who Null really was, who you really made that noble sacrifice for, it all made sense.\" \n\n\t\t\"I really loved our time together,\" Lucky continues, \"but Jenny is your soulmate, we both know that. And like you said, we're in two different places—I have so much I still need to sort out, rebuilding my life. And it's best I do that on my own.\n\n\t\t\"But you need to know that I'm still here to help you however I can,\" Lucky finishes, reaching out ${luckyhis} hand to shake. \n\n\t\tInstead, you suddenly pull Lucky into a hug, surprising ${luckyhir} so much that ${luckyze} nearly busts a limb. It's nice to have someone as genuine as Lucky by your side, especially after all you've been through.\n\n\t\tLucky hugs you back and then you walk on, feeling ready to face what comes next.\n\t\t*goto teletime\n\t*else\n\t\t*set luckyprodigalbreakup true\n\t\t*set luckyfinalally true\n\t\t*set luckycomaspouse false\n\t\t*set rlshp_lucky %-50\n\n\t\tLucky steps towards you and you instinctively step back. Because you need to tell Lucky about Prodigal, before this goes any further.\n\n\t\t\"I'm so happy to see you—and to see you recovered like this. What happened to you was so…unfair,\" you start. \"And it means so much to me to have your support. But I think after everything, we're just…in different places. And things with Prodigal…\"\n\n\t\tYou stop yourself, not sure that revealing the fact that you've shacked up with Prodigal would be the best for anyone, right now.\n\n\t\t*page_break\n\n\t\t\"Well I certainly didn't think you'd be the one breaking up with me,\" Lucky says, ${luckyhis} voice much colder than you've ever heard it. \"But I was going to say that after this coma mess, I have so much I still need to sort out, rebuilding my life. And I though it might be best I do that on my own, especially given all that you're going through right now.\"\n\n\t\t\"I didn't want the separation to be permanent, but it looks like you beat me to the punch,\" Lucky finishes. \"I don't know, I guess this is probably for the best.\"\n\n\t\tYou nod at Lucky and a tense silence ensues. \n\n\t\tThankfully, Lucky then makes ${luckyhis} way towards the door—it looks like you've both said all that you need to say.\n\n\t\tYou just wish things could have ended on a better note.\n\t\t*goto teletime\n\n*label kissthentalk\n\nYou immediately run forward and hug Lucky, so happy to see ${luckyhir} you could burst. And Lucky hugs you back, then pulls you into a kiss that feels better than just about anything. After the hell you've had to endure since The Hero Project ended, you almost forgot what this felt like.\n\n\"Sorry I couldn't be here earlier,\" Lucky says, brushing your hair aside. \"I had some mandatory post-coma nap time scheduled.\"\n\nYou search your brain, trying to find the right words to say. \n\n\"${luckyname}, it's so good to see you back on your feet,\" you say. \"I missed you so much.\"\n\n\"It's good to be back on my feet. And I missed you too,\" Lucky says, blushing. \"Sounds like I missed quite a bit more since going under. Processor brought me up to speed on how The Hero Project ended and everything that happened afterwards. My head's still spinning from all of it, sometimes literally. I can't believe…\"\n\nLucky pauses, emotion overtaking ${luckyhir}. You can't imagine what it must feel like, to be cut down at the pinnacle of your career; to be put down by one of your closest allies and to miss so much.\n\nThen again, you can imagine exactly what that feels like.\n\n*page_break\n\nYou kiss Lucky again, pulling ${luckyhir} close. You thought you might never get to see ${luckyhir} again, but here ${luckyze} is, right in front of you.\n\n\"Listen to me,\" Lucky says. \"I need you to know that I support you not just as your ${bmfriend}, but also as a member of The Millennial Group. Because I don't believe in anything President Victon or Rebellion is doing. Period.\"\n\n\"That means the world to me,\" you say. \"Not to mention, I really like the sound of you being my ${bmfriend}.\"\n\n\"Good. Because wherever you're going next, I'm coming with you,\" Lucky says. \"And I don't want to hear any arguments about it.\"\n\nYou stare at Lucky, feeling so blessed to have ${luckyhir} standing by your side. But can you really let Lucky drag ${luckyhir}self into your mess and go up against the kind of danger you're bound to face?\n\nYou wish you had more time, but you know that you're going to have to decide, here and now.\n\n*choice\n\t#\"I'd be proud to have you stand by my side.\"\n\t\t*set rlshp_lucky %+50\n\t\t*achieve luckyso\n\n\t\tLucky smiles and pulls you into another deep kiss. Every part of you wants to rip Lucky's costume off here and now and just be together.\n\n\t\t\"There will be plenty of time for that later, I promise,\" Lucky says, knowing exactly what you want to do. \"But we have work to do first.\"\n\n\t\tLucky leads you towards the door and as you go, you can only feel thankful for having someone like Lucky in your life. Thankful and, well…\n\n\t\tLucky.\n\t\t*goto teletime\n\t#\"Lucky, you don't know how much your support really means. And I want to be with you. But I can't let you come with me, for so many reasons.\"\n\t\t*set rlshp_lucky %+40\n\t\t\"I'm afraid you don't get to decide that for me,\" Lucky says. \"Break up with me if you want to, but if we're going to do this, we're going to do it right.\"\n\n\t\t\"I'm not breaking up with you,\" you say. \"But I really mean it. I need you to stay here with The Millennial Group. If anything should happen, slugger forbid, I need to know that someone will—\"\n\n\t\tLucky places a finger on your lips and nods.\n\n\t\t\"I understand,\" Lucky says. \"I'll be here to pick up the pieces, no matter how this thing goes.\"\n\n\t\t*page_break\n\n\t\tYou suddenly pull Lucky into a hug, surprising ${luckyhir} so much that ${luckyze} nearly busts a limb. It's incredible to have someone as genuine as Lucky by your side, especially after all you've been through.\n\n\t\tLucky hugs you back and then you walk on, feeling ready to face what comes next. Especially because now you know that if you manage to somehow survive this current hell, you'll have a little piece of heaven waiting for you on the other side.\n\t\t*goto teletime\t\n\t#\"Lucky, you don't know how much your support really means. But after everything that has happened, we're just…in different places. I think it's time we ended things.\"\n\t\t*set luckybreakup true\n\t\t*set luckyfinalally true\n\t\t*set luckycomaspouse false\n\t\t*set rlshp_lucky %-50\n\t\t\"You don't mean that,\" Lucky says. \"I know it.\"\n\n\t\t\"I do,\" you say. \"I need to be on my own for this. And I need you to understand that.\"\n\n\t\tLucky stares at you and a tense silence ensues. \n\n\t\tThen Lucky just drops ${luckyhis} head and walks towards the door, looking completely broken.\n\n\t\t*page_break\n\n\t\tYou sigh, wishing things could have ended on a better note. That you could have said something different or that Lucky would have fought you harder or understood or…something. Anything. \n\n\t\tBut for now, you know that it's best for you and Lucky to be apart, no matter how much it hurts. \n\n\t\tEven if it means ${luckyze} may never forgive you.\n\t\t*goto teletime\n\n*label teletime\n*page_break\n\nIn the Millennial Tower's sprawling museum, you stand in front of the teleporter, a clunky thing that looks not-unlike several giant spoons fused together. While Processor begins the task of booting up the generator, you turn to The Diva and the rest of The Millennial Group assembled.\n\n\"I don't know how to thank you for this,\" you say. \n*if (soloist \u003c 50)\n\t\"But I'm afraid this might not be the last time I have to. There's probably a war coming. And I'm going to need all the help I can get, if it comes to a fight.\"\n\t*goto mgbehindyou\n*else\n\t\"I'm used to doing things on my own, but with the enemies I'll be facing…\"\n\t*goto mgbehindyou\n\n*label mgbehindyou\n\n\"We'll be there behind you,\" The Diva says. \"However dreary it may seem.\"\n\nThe Diva almost smiles, but the sound of faraway explosions whips her head towards Processor for an immediate answer.\n\n\"The American Protectorate is here,\" Processor announces. \"I don't know how, but—\"\n\nYou can't hear the rest of what Processor says, though, because you're too distracted by Fistfull suddenly smashing through the teleporter.\n\n*page_break\n\n\"Step aside!\" The Diva screams, though you feel her voice more than you hear it as she blasts Fistfull away from the wrecked teleporter with a vocal blast. \"Explain yourself!\"\n\n\"You're too busy railroading us to notice what's going on right under your nose!\" Fistfull shouts as he picks himself up off the ground. \"The only reason Monk can speak now is because the IRP Power dampening technology keeps hir telekinesis in check! And how do you think I got this strong? You think ${codename} and The Crush were the first heroes to get a Pump offer from Rebellion?\n\n\"I called The American Protectorate here!\" Fistfull booms at the top of his lungs, veins popping out of his forehead and neck. \n*if fistfull_bad\n\t\"And I'd do it again and again! It's what ${codename} deserves after all ${youze} has done!\"\n\t*goto tapcrash\n*else \n\t\"I didn't…my hands were tied. They said they'd cut us off if I didn't…I'm sorry, I…\"\n\t*goto tapcrash\n\n*label tapcrash\n\nFistfull looks like he has more that he wants to say, but he doesn't get a chance as his massive body is flung through the nearest wall with a deafening thud.\n\nYou turn to find Monk standing with hir hand outstretched, looking furious.\n\n\"I'm afraid my husband has been mistaken in this matter,\" Monk says, hir voice trembling as ze attempts to keep it even. \"He will be dealt with later.\"\n\n*page_break\n\nThis is all happening so fast, you don't have a second to think. You just need a moment to— \n\nThough as The American Protectorate comes crashing into the museum, it doesn't look like you're going to get one.\n\nGathered there are your old teammates and competitors, all wearing matching TAP costumes and surrounded by dozens of camera orbs: \n\nRebellion, Jury, Inherit, Wintry, Stage Show, and Summit. \n\nThe American Protectorate.\n\nThe embodiment of everything you stand against.\n\n*label beginningsixfight\n*page_break\n\n\"Everyone here is under arrest,\" Rebellion shouts from the front of the team. \"Surrender now and we'll sort out the details later.\"\n\nBefore you can blink, The Diva screams counter-commands, her voice laced with pure force.\n\n\"Millennial Group, take them!\" she shouts. \"${codename}, get out of here!\"\n\nAs the museum explodes in a fury of noise and action, you scan for an exit. Now that the teleporter is destroyed, you're going to have to find another way out of here and across the country. But you quickly realize that the only exit is through the raging battle between The Millennial Group and The American Protectorate. \n\nWhich means you're going to have to make your way through it.\n\n*page_break\n\nFirst in your escape path is Heela facing Summit. Both of them are crouched in battle-ready positions, circling one another.\n\n\"I was wondering when we'd meet again,\" Heela purrs. \"Looks like little Mr. Humble has gone for the big time. Never thought I'd see the day you sold out.\"\n\n\"No, selling out was always your thing,\" Summit returns. \"You're just pissed I did it better than you.\"\n\n\"Dumping you was the best thing I ever did,\" Heela says. \"Well, that is, next to destroying you right now.\"\n\nAs Heela launches at Summit, you pause—Summit and Heela dated? But Summit is the most anti-Powered slugger you've ever had the displeasure of meeting. Why would he date someone so visibly Powered?\n\n*page_break\n\nYou don't have time to mull this over, however, as Summit rolls under Heela's super-agile strike and tries to hit her with his collapsible pole. Heela flips over the swinging pole—she is extra nimble thanks to her feline Animalistic Powers and super-strong mega-legs. \n\nBut Summit is one of the fastest athletes and fiercest fighters on the planet. So how should Heela take him down?\n\n*if warningsys\n\t*if chip_diva\n\t\t\"You've faced all of these sluggers before,\" MeChip ${chipname} shouts in your ear. \"Help those Groupies take down their dancing partners by assessing Power types and exploiting past proven weaknesses!\"\n\t\t*goto heelatell\n\t*else\n\t\t\"You've faced all members of The American Protectorate before,\" MeChip ${chipname} shouts in your ear. \"Help the Millennial Group take down their opponents by assessing Power types and exploiting past proven weaknesses!\"\n\t\t*goto heelatell\n\n*label heelatell\n\n*choice\n\t#Tell Heela to scratch like crazy.\n\t\t*set jennyusedsix true\n\t\tHeela leaps back into the air and contorts her body in an impossible shape, swinging her arms and feet in a flurry of scratch swipes.\n\n\t\tSummit seems just as fast as Heela, though, spinning and flipping around her strikes to create enough space to open up his collapsible bow. With one precise shot, he blasts Heela away with an energy arrow. \n\n\t\tIt looks like relying on Heela's mega-leg attacks would have been more effective against Summit's set of skills.\n\n\t\t*page_break\n\n\t\t\"I'll handle Summit,\" Jenny says, stepping forward. \"Besides, we're old pals.\"\n\n\t\tBefore you can argue, Jenny launches at Summit. So you and Prodigal keep moving. \n\n\t\t\"We'll grab you once we have a new plan!\" you shout at Jenny as you go.\n\t\t*goto staticinherit\n\t#Tell Heela to land a mega-kick.\n\t\tHeela leaps back into the air and contorts her body in an impossible shape, so that when she shoots her leg out for a mega-kick, Summit doesn't see it coming.\n\n\t\tThe kick catches Summit in the chest and sends him flying across the museum, clearing your path. \n\n\t\tAs you, Jenny, and Prodigal run by, Heela runs in the opposite direction back towards Summit, winking at you as she goes.\n\t\t*goto staticinherit\n\t#Tell Heela to remove Summit from play with a mega-leap.\n\t\tHeela leaps back into the air and contorts her body in an impossible shape, so that when she reaches out to grab Summit's arm, he doesn't see the maneuver coming.\n\n\t\tLanding with her feet planted, Heela then launches back in the air, pulling Summit across the museum and clearing your path. \n\n\t\tAs you, Jenny, and Prodigal run by, Heela soars in the opposite direction with Summit in tow, winking at you as she goes.\n\t\t*goto staticinherit\n\n*label staticinherit\n*page_break\n\nNext you come across Static battling Inherit, the anti-Powered spokesperson you probably hate even more than Summit. \n\nFrom the looks of it, Static feels the same way about Inherit. He pounds away at the surface of Inherit's golden energy shield, trying to find a way to crack through, all while dodging mini energy-shield bullets hurtled by Inherit.\n\nStatic's anti-hypnotic Powers are useless against Inherit's MeChip-powered energy shields, but Static has a full array of electric taser weapons, in honor of his name. So what's his best move?\n\n*choice\n\t#Tell Static to slice through the shield with an electro-sword.\n\t\tStatic unsheathes an electro-sword, which crackles to life with the push of a button. Lurching forward, he slashes at Inherit's shield. \n\t\t*goto inheritfail\n\t#Tell Static to try sending an electric shock through.\n\t\tStatic pulls out a taser and fires a veritable lighting bolt at Inherit's shield.\n\t\t*label inheritfail\n\t\tBut this attack fails to penetrate the hard-energy surface.\n\n\t\tBefore Static can regroup, Inherit expands his personal shield rapidly, crushing Static against the nearest wall with an awful crunch. \n\n\t\tTrying to penetrate Inherit's shields directly is always going to be difficult, it seems.\n\n\t\t*page_break\n\t\t\n\t\t*if jennyusedsix\n\t\t\t*set prodigalusedsix true\n\n\t\t\t\"Keep moving,\" Prodigal says. \"I've been waiting for a piece of this crackerjack for years.\"\n\n\t\t\tYou want a piece of Inherit too, but someone has to figure out a new escape route. As Prodigal flips at Inherit, it looks like that responsibility falls to you. \n\n\t\t\tSo you keep running through the museum past this brawl.\n\t\t\t*goto monkss \n\t\t*else\n\t\t\t*set jennyusedsix true\n\t\t\t\"I'll handle Inherit,\" Jenny says, stepping forward. \"Find a new escape plan while I'm busy.\"\n\n\t\t\tBefore you can argue, Jenny launches at Inherit, so you and Prodigal keep moving. \n\n\t\t\t\"We'll grab you once we have a new plan!\" you shout at Jenny as you go.\n\t\t\t*goto monkss\n\t#Tell Static to use an EMP to deactivate Inherit's MeChip.\n\t\tStatic pulls out a circular device and pushes a button in the center, setting off an electromagnetic pulse. The pulse shorts out Inherit's MeChip, causing his shield to drop. \n\n\t\tStatic moves in to take Inherit down, but Inherit blocks his punch with surprising skill—looks like someone has had some fighting training since joining The American Protectorate.\n\n\t\tInherit falls back from Static and suddenly reactivates his shield. He must have some new anti-EMP protections for his MeChip that kick in after a few seconds, which makes sense, since you've used this move to take Inherit down before.\n\n\t\tLuckily you've already made your way through this battle, so you keep moving as Static goes back at Inherit. \n\t\t*goto monkss \n\n*label monkss\n*page_break\n\nNext you come across Monk fighting Stage Show. You'd think Monk's vast telekinetic Powers would have no problem handling Stage Show, but she's much more Powerful than you remember, keeping Monk on the defensive with massive surges of neon laser energy.\n\n\"I had always hoped I'd get to meet you, Monk,\" Stage Show shouts over her laser blasts. \"But certainly not like this.\"\n\n\"What a waste you are,\" Monk says, obviously still focusing on telekinetically blocking Stage Show's energy surges. \"This is what you choose to do with your platform as a transwoman?\"\n\n\"Says the Zehir who didn't talk for most of hir career,\" Stage Show shoots back. \"Though you speak volumes now, reducing my entire identity to being a transwoman. I'm proud to be one, but I'm so much more!\"\n\nWith Stage Show's anger doubled, Monk seems too ove
