 50\n\t\t\t\t\t*set freedom 50\n\t\t\t\t\t*set rlshp_prodigal 5\n\t\t\t\t\t*set diedbefore true \n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto chaptertwostart\n\t\t\t\t#Start HeroFall over from the very beginning.\n\t\t\t\t\tBetter luck next time, ${codename}! \n\t\t\t\t\t*ending\n\t\t*else\n\t\t\t*set power -30\n\t\t\t*set health -15\n\t\t\t*set powerregain +1\n\t\t\t*set unleash %+10\n\t\t\t*set offensive %+10\n\n\t\t\tClosing your eyes, you focus on the space inside one of the PowerBreaker Battlesuit's plasma packs. You try to nudge one of the atoms inside, straining so hard you feel beads of sweat collecting on your forehead.\n\n\t\t\tJust when it hurts so much you're sure you'll scream, you hear a screeching noise outside the garage. Opening your eyes, you look out the window to find that your atomic nudge caused the plasma pack to surge and shut the Battlesuit down. \n\n\t\t\tThe plasma overflow jumps from Battlesuit to Battlesuit, causing them all to crash to the ground in useless heaps, their occupants stuck inside.\n\n\t\t\tFeeling weak, you turn to the hovercar. It's time to get the slugger out of here.\n\n\t\t\t*if (useprodigalescape) or (turninprodigal)\n\t\t\t\t*goto prodigalreturnsmad\n\t\t\t*else\n\t\t\t\t*goto pileintocar\n\t#Ask Grandma if she has any cactus bombs on her.\n\t\t*set unleash %-10\n\t\t*set offensive %-10\n\n\t\t\"Grandma, do you have any of those old cactus bombs on you?\" you ask.\n\n\t\t\"I always keep a few in my pockets,\" Grandma says, fishing around in her cardigan and pulling out three marble-sized green balls. \"Why? These won't do a thing against those metal behemoths.\"\n\n\t\t\"Just trust me. I'm going to open the window, then you toss them outside, okay?\"\n\n\t\tGrandma nods and you creep over to the window. You silently count to three, then you pop open the glass. Before the squadron can respond, Grandma tosses the cactus marbles out the window.\n\n\t\tThey land just short of the squadron and suddenly expand and explode, launching dozens of needles in every direction. The thin, poison-tipped needles easily shoot through the seams of the Battlesuits and the squadron begins to drop one by one, falling unconscious.\n\n\t\tOnce the last of the Battlesuits drops, you turn to the hovercar. It's time to get the slugger out of here.\n\t\t\n\t\t*if (useprodigalescape) or (turninprodigal)\n\t\t\t*goto prodigalreturnsmad\n\t\t*else\n\t\t\t*goto pileintocar\n\t#Use the hovercar to plow through the squadron.\n\t\tYou jump behind the wheel of the hovercar and hit the ignition, making sure you're all set inside. Then you press the pedal down to the floor and feel the hovercar rocket forward.\n\n\t\tYou crash through the garage door and careen directly towards the squadron. You brace yourself for impact against the first Battlesuit, but then scream as it gears up to knock the hovercar aside. \n\n\t\tWith one massive swing, you feel the Battlesuit fists crush into the hovercar's side and send it reeling. As the hovercar spins out, you keep screaming, bracing for a crash.\n\n\t\tThe hovercar smashes into a nearby tree and the airbags deploy in your face.\n\n\t\t*page_break\n\n\t\t*if (health \u003c= 40)\n\t\t\tThat's when you feel it—your Health Level is completely depleted. You took too many hits to survive….\n\n\t\t\tAs the world starts to swirl into excruciating blackness, your final thoughts are of Grandma and your parents…\n\n\t\t\tFor you've truly let them down.\n\n\t\t\t*choice\n\t\t\t\t#Return to the beginning of the fight to see if I can survive. (Legend Cost 20)\n\t\t\t\t\tYou have another shot to escape from the police, but your Legend Level will probably never recover from this drop.\n\n\t\t\t\t\tLegendary heroes don't die, ${codename}. You had better make better decisions this time around.\t\t\n\t\t\t\t\t*set power 100\n\t\t\t\t\t*set health 100\n\t\t\t\t\t*set legend -20\n\t\t\t\t\t*set turninprodigal false\n\t\t\t\t\t*set regimedamage -1\n\t\t\t\t\t*set powerregain -1\n\t\t\t\t\t*set feared 50\n\t\t\t\t\t*set rlshp_prodigal 5 \n\t\t\t\t\t*set diedbefore true\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto chaptertwostart\n\t\t\t\t#Start HeroFall over from the very beginning.\n\t\t\t\t\tBetter luck next time, ${codename}! \n\t\t\t\t\t*ending\n\t\t*else\n\t\t\t*set health -40\n\t\t\t*set unleash %-10\n\t\t\t*set offensive %+15\n\n\t\t\tOnce the airbag deflates, you look around the inside of the hovercar and find Grandma sitting beside you, holding her head.\n\n\t\t\t\"Are you—\"\n\n\t\t\t\"I'm fine,\" she says. \"But you're never driving again.\"\n\n\t\t\t*if (useprodigalescape) or (turninprodigal)\n\t\t\t\tYou'd laugh, but you're too busy wondering what the sound of explosions outside the hovercar might be. \n\n\t\t\t\t*page_break\n\n\t\t\t\tStepping out, you see Prodigal standing behind the wrecked hovercar, arms crossed. All around her the Battlesuits begin to deactivate, crashing to the ground in useless heaps, their occupants stuck inside.\n\n\t\t\t\t\"I hit them with an EMP,\" Prodigal says, turning back to face you and Grandma. \"It's a good thing they were here so I had something to take out my anger on besides you two slugging fools.\"\n\n\t\t\t\tProdigal looks from you to Grandma, sending you daggers through her eyes. \"Now, I should crack both of your skulls, but I'm not going to do that, because we're in this together, whether any of us like it or not. So will you require any additional shows of heroic bravery to prove that I'm here to work with you?\"\n\n\t\t\t\tYou turn to Grandma and she sighs. Whether or not you trust Prodigal, she did just cover your exit. Twice. And you don't exactly have many options here…\n\n\t\t\t\t\"Good, great, grand,\" Prodigal finishes. \"That EMP also jammed any of the squadron's communication signals across the lake, which will buy us some much-needed time to come up with another escape plan. One that doesn't involve ${firstname} driving.\"\n\t\t\t\t*goto sandersescape\n\t\t\t*else\n\t\t\t\tYou'd laugh, but you're too busy wondering why Prodigal isn't still in the backseat of the hovercar.\n\n\t\t\t\tThen you hear an explosion outside.\n\n\t\t\t\t*page_break\n\n\t\t\t\tStepping out, you see Prodigal standing behind the wrecked hovercar, arms crossed. All around her the Battlesuits begin to deactivate, crashing to the ground in useless heaps, their occupants stuck inside. \n\n\t\t\t\t\"I hit them with an EMP after I got thrown from the hovercar,\" Prodigal says. \"That also jammed any communication signals, which will buy us some much-needed time to come up with another escape plan. One that doesn't involve ${firstname} driving.\"\n\t\t\t\t*goto sandersescape\n\t*if ((escapewithprodigal) or (standwithprodigal)) #Ask Prodigal if she can shut down the suits.\n\t\t*set unleash %-10\n\t\t*set offensive %-10\t\n\n\t\t\"Do chickens cluck?\" Prodigal answers, immediately producing a chicken-shaped EMP bomb. \"This will also jam their signals to the rest of the police across the lake, to buy us some extra escape time.\"\n\n\t\t\"What is your deal with chickens?\" you ask as Prodigal creeps under the window and props it open. Before the squadron can respond, Prodigal tosses the EMP bomb out the window.\n\n\t\t\"Wouldn't you love to know, chickadee?\" Prodigal says as the grenade flashes. \n\t\t\n\t\tOutside, the Battlesuits begin to deactivate, crashing to the ground in useless heaps, their occupants stuck inside. \n\n\t\t*page_break\n\n\t\tOnce the last of the squadron drops, you turn to the hovercar. Because it's time to get the slugger out of here. \n\n\t\t\"Time to make the great escape, my darlings,\" Prodigal says, sliding into the driver's seat before you can stop her. \"Hope you have a need for speed!\"\n\n\t\tProdigal smiles that insane smile, flips on the ignition, and presses the pedal to the floor… \n\n\t\t*page_break\n\n\t\tBut the hovercar just makes a sick sputtering sound. Prodigal tries again, but the same thing happens.\n\n\t\t\"That EMP wouldn't have happened to affect the hovercar's electrical systems, would it?\" you ask.\n\n\t\t\"Um,\" Prodigal says, her smile fading. \"Whoops?\"\n\t\t*page_break\n\t\t*goto sandersescape\n\n*label prodigalreturnsmad\n*page_break\n\nYou step up to the driver's door, but before you can get inside, you hear a whooshing sound and turn to find Prodigal soaring out of the pea shoot and into the garage. \n\n\"Grandma, down!\" you shout, because you see Prodigal running for the hovercar in a blind rage. You and Grandma jump out of the way just as Prodigal shrieks and produces a giant electro-sword, which she uses to slice the hovercar in two.\n\nYou immediately stand and ready yourself to fight Prodigal, but she sheathes the electro-sword and holds up her hands in surrender, breathing heavily.\n\n*page_break\n\n\"I'm sorry,\" Prodigal says. \"I simply had to take my anger out on something after you two fools ditched me. I should crack both of your skulls…\" \n\nProdigal looks from you to Grandma, sending you daggers through her eyes. \"But as you can see, I'm not going to do that. Because we're in this together now, whether any of us like it or not. So will you require any additional shows of heroic bravery to prove that I'm here to work with you?\"\n\nYou turn to Grandma and she sighs. Whether or not you trust Prodigal, she did just cover your exit. And you don't exactly have many options here…\n\n\"Good, great, grand,\" Prodigal finishes. \"Now, I set off an EMP to stop that gaggle of morons outside from sending any communication signals across the lake, which will buy us some much-needed time to come up with another escape plan. Admittedly, slicing our getaway car in two might have been a bit of a misstep…\"\n\n\"You think?\" you say, restraining yourself from cursing Prodigal out. \"Have any bright ideas for an escape then, you complete loon?\"\n*goto sandersescape\n\n*label pileintocar\n*page_break\n\n\"I jammed the squadron's communications signals so they couldn't alert anyone to our presence,\" Prodigal says, moving towards the driver door. \"But I think they might notice a hovercar blasting out of here. And even if they don't, they must have the surrounding roads blocked off.\"\n\nYou step in front of Prodigal to get in the driver's seat first, but she's right. Driving out of here might not be your best plan…but what other choice do you have?\n*goto sandersescape\n\n*label sandersescape\n*page_break\n\n\"I can help with that.\"\n\nYou turn to find another police officer stepping out of the shadows and you tense. How many of these sluggers are you going to have to take down?\n\n\"Hold steady, it's me.\"\n\n*if sanders\n\tYou hear that familiar gravelly voice and immediately recognize Officer Sanders. You haven't seen him since the whole Prodigal Death Wave went down—he has been on a special classified mission ever since.\n\n\t\"I did what I could to sneak in here, but we don't have long,\" Officer Sanders says, his eyes trained on Prodigal. \"Do you need me to put her down?\"\n\n\t\"I'd like to see you try, gramps,\" Prodigal snarls.\n\n\t*page_break\n\n\t\"It's all right, Baldwin,\" Grandma says. \"I know it sounds insane, but she's on our side. At least, for now.\"\n\n\t\"Officer Sanders, it's good to see you agai—wait, why did you just call him Baldwin?\" you ask.\n\n\t\"It's a longer story than we have time for,\" Officer Sanders starts, locking eyes with Grandma. \n\n\t\"Officer Sanders and I have a…history. From before I met your grandfather,\" Grandma finishes. \"It is good to see you, Baldwin.\"\n\n\tFrom the tense look that passes between Grandma and Officer Sanders, you can tell this history must have been serious…and you immediately realize that also explains why Officer Sanders was so willing to help you back when you were first starting out. You can't believe Grandma didn't tell you she knew Officer Sanders before—though if you know Grandma, she probably has a good reason.\n\n\t*page_break\n\n\t\"As captivating as all this geriatric gushing may be,\" Prodigal cuts in, \"we really must be on our way.\"\n\n\t\"When I heard they were coming for you, I knew I had to help,\" Officer Sanders says. \"I have an escape plan.\"\n\n\t\"Baldwin, that's—thank you,\" Grandma says, clasping her hands together.\n\n\t\"Of course I did it for you, but I also don't believe in a single thing our current president is doing. Consider this my own little act of rebellion,\" Officer Sanders responds, winking at Grandma. \"But ${codename}, I need to talk to you first.\"\n\t*goto sandersprodigalcall\n*else\n\tYou hear a gravelly voice and think you recognize the officer's face, but you're not sure how.\n\n\t\"Mrs. ${familyname}, I'm here to help. But we don't have long,\" the officer says, his eyes trained on Prodigal. \"Do you need me to put this one down?\"\n\n\t\"I'd like to see you try, gramps,\" Prodigal snarls.\n\n\t*page_break\n\n\t\"It's all right, Baldwin,\" Grandma says. \"I know it sounds insane, but she's on our side. At least, for now.\"\n\n\t\"Grandma?\" you ask. \"Who is—\"\n\n\t\"It's a longer story than we have time for, but Bald—Officer Sanders here and I have a…\" Grandma pauses. \"History. From before I met your grandfather. We can trust him. It's good to see you by the way, Baldwin.\"\n\n\tFrom the tense look that passes between Grandma and Officer Sanders, you can tell this history must have been serious. You can't believe Grandma didn't tell you about this MCPD connection earlier. Though if you know Grandma, she probably has a good reason.\n\n\t*page_break\n\n\t\"As captivating as all this geriatric gushing may be,\" Prodigal cuts in, \"we really must be on our way.\"\n\n\t\"When I heard they were coming for you, I knew I had to help,\" Officer Sanders says. \"I have an escape plan.\"\n\n\t\"Baldwin, that's—thank you,\" Grandma says, clasping her hands together. \"That means the world.\"\n\n\t\"Of course I did it for you, but I also don't believe in a single thing our current president is doing. Consider this my own little act of rebellion,\" Officer Sanders responds, winking at Grandma with his bushy white eyebrow. \"But it was not meant to include her.\"\n\n\tOfficer Sanders sets his eyes on Prodigal again, with a look of disgust.\n\n\t\"Trust me on this, Baldwin,\" Grandma sighs. \"I'll explain it all to you once we're gone. But we have to move. Now.\"\n\t*goto policecar\n\n*label sandersprodigalcall\n*page_break\n\nYou and Officer Sanders stand behind the garage and he furrows his bushy eyebrows—you've just caught him up to speed about this situation with Miss Artillery.\n\n\"Well, that certainly explains a lot,\" Officer Sanders starts. \"But if what Prodigal says is true, Victon will have been sure to cover his tracks very well. There probably won't be a way to tell if she's lying or not until it's too late…\"\n\nOfficer Sanders looks at his MeChip and frowns—you don't have any time to discuss this further.\n\n\"Listen, I understand why you have to go with Prodigal for now. I'd do the same if I were in your shoes. But you also have to know this before you go,\" Officer Sanders pauses, taking a deep breath. \"Prodigal was the one to call your location into the police. I don't know what game she's playing this time, but Prodigal is the reason we knew to come here for you both.\"\n\nSlugger. The words hit you like a punch in the gut. All you can think of is returning the punch to Prodigal… \n\nInstead, you respond by saying:\n\n*choice\n\t#\"Prodigal must have wanted to force me into going with her.\"\n\t\t\"Well, she certainly has an interesting way of making allies,\" Officer Sanders says.\n\n\t\t\"Let's hope that's all it is,\" you sigh.\n\t\t*goto policecar\n\t#\"Just another sign that I can't trust Prodigal.\"\n\t\t\"I'll have to get what I need from her and ditch her the first chance I get,\" you finish.\n\n\t\t\"Well, I'll be right there to arrest her crazy behind when that happens.\"\n\t\t*goto policecar\n\t#\"I have no idea why she'd do that.\"\n\t\t\"Well, you'd better find out once we're out of here,\" Officer Sanders sighs.\n\t\t*goto policecar\n\n*label policecar\n*page_break MINUTES LATER\n\nYou sit behind the controls of a hijacked police transport with Prodigal beside you, looking out at Officer Sanders and Grandma sitting on their own stolen MCPD hoverbike.\n\n\"I configured that transport to get you wherever you need to go without any trouble, if you play it smart,\" Officer Sanders says. \"I'll get myself and Mrs. ${familyname} here to a secret safe house I've got stashed for a rainy day. But once word of what I've done here gets out, I'm going to be in a world of trouble. So we'll have to stay on a communications blackout to remain hidden. I suggest you do the same.\"\n\nOfficer Sanders is right: all four of you are fugitives now. You're so grateful for what Officer Sanders is sacrificing for you—you can add clearing his name to the long list of reasons you need to find Miss Artillery and bring President Victon down.\n\n*page_break\n\nA few minutes ago, when you were deciding what to do, Officer Sanders offered to personally protect Grandma. You and Grandma agreed that it would be too dangerous for her to go with you and Prodigal, especially since you don't know how long you can trust Prodigal, if at all. \n\nSo before you got in your respective stolen transports, you hugged Grandma, knowing it would be the last chance you might have to talk for a while.\n\n\"${firstname}, you need to do whatever it takes to save your parents,\" Grandma said, already tearing up. \"I know that means working with that witch for now, but you make sure to keep both eyes open at all times.\"\n\n\"I will, Gran,\" you said, forcing a lump back down your throat.\n\n\"Now go serve that Victon bastard's balls on a platter,\" Grandma said, wiping her cheeks. \"And don't forget this.\"\n\nGrandma handed you the letter sent from your parents—she must have grabbed it somehow in all the chaos.\n\n\"Don't you ever forget where you come from,\" Grandma finished. \"Or what matters most, in all of this.\"\n\n*choice\n\t#\"I won't. I promise.\"\n\t\t*goto grandmagoodbye\n\t#\"I'm going to win this, Gran.\"\n\t\t*goto grandmagoodbye\n\t#\"${ring_lyric}.\"\n\t\t*goto grandmagoodbye\n\n*label grandmagoodbye\n\nNow, with Grandma's words still ringing in your ears, you watch as she speeds off on the back of Officer Sanders's hoverbike. \n\nThat is, until Prodigal grabs control of the police transport.\n\n\"Oh, you do not—\"\n\n\"Please, chicken,\" Prodigal interrupts. \"I'm a tech genius who makes toys like these for fun, remember? Besides, I'm taking us to my most secret lair in Millennia City. Unless you have a better plan?\"\n\nYou blink at Prodigal, because unfortunately, you don't.\n \n\"Divine. Now sit back and enjoy the ride, darling.\"\n\nAs Prodigal sends you hurtling forward just under the tree line, you figure that enjoying anything is going to be fairly impossible for a while….\n\n*page_break THIRTY MINUTES LATER\n\nAfter a tense and mostly silent ride, you and Prodigal manage to make it to her secret base undetected. Whatever Officer Sanders did to cover the theft of the transport (paired with some quick-rigged anti-tracking tech from Prodigal) worked perfectly.\n\nExcept now you stand outside a toy store in the Eastern Fringes with Prodigal—the same one that was your favorite as a kid. \n\n\"Your base is in here?\" you nearly shout. Is there no end to the bottomless pit of Prodigal's creepiness?\n\n\"Relax, jitterbug,\" Prodigal sighs. \"You think I'd park a stolen police transport outside my favorite secret hideout? You're so lucky you have me or you'd be caught in five minutes flat.\"\n\nProdigal whips up a homemade lock-pick to get into the dark toy store. \"I've got a Telelock to the base in there. Only way to get in or out of a doorless and windowless room, created by some wickedly diabolical beautiful mind.\"\n\nYou haven't seen one of Prodigal's golden Telelocks since the one she used to pull you to her lair underneath the Bigsur fusion plant. [i]So many fond memories[/i], you think as you follow Prodigal.\n\n*page_break\n\nOnce inside, Prodigal points to a [b]Not For Sale[/b] display case filled with rare action figures.\n\n\"Well, can you guess which one is my precious?\" Prodigal sings.\n\nYou have no patience for Prodigal's games, but then again, you already know which figure is the Telelock:\n\n*choice\n\t#A gold-cast version of my Hero of Tomorrow action figure.\n\t\t*goto snatchthattele\n\t#The limited gold edition The Sound & The Fury figures.\n\t\t*goto snatchthattele\n\t#The Death Wave action figure set, which features figures of me, my parents, Miss Artillery, Prodigal, and a golden Death Wave suit.\n\t\t*goto snatchthattele\n\t#An exact replica of my parents' golden engagement ring before it was destroyed, right down to the lyrics: [i]${ring_lyric}[/i].\n\t\t*goto snatchthattele\n\n*label snatchthattele\nNot waiting for Prodigal, you open the case and snatch the golden Telelock, then grab a hold of Prodigal.\n\n\"Wait, there's something I need to tell—\"\n\nBefore Prodigal can finish, you're enveloped in a flash of teleportation energy and you close your eyes.\n\n*page_break\n\nWhen you open your eyes again, you find yourself in a windowless room. The walls are lined with pictures of you, ranging from your tween years all the way to last year, posing in your original ${codename} costume. You'd be freaked out enough by that creepy collage, but then you see what's in the center of the room…\n\nSomeone tied to a chair, bound and gagged.\n\nSomeone who looks exactly like Sonja Challa.\n\n*finish Next Chapter: MindMaze\n", "choicescript_description": "Would a hero like you assassinate the president of the United States to defend the right to be Powered?\n\nAs the corrupt President Victon launches his oppressive campaign of Powered Regulation, your Legendary heroic rise transforms into something much more: you must become a political icon fighting to restore Powered rights in America. This new battle takes a twisted turn when your once-greatest enemy, Prodigal, tells you President Victon’s darkest secret....\n\nNow you are faced with the biggest choices of your career: Do you trust the word of your archenemy? Will you evade President Victon's gang of criminal bounty hunters? Can you save your family and complete your rise as a Legendary hero?\n\n[i]Heroes Rise: HeroFall[/i] completes the epic Heroes Rise trilogy by Zachary Sergi, featuring the smash hits [i]Heroes Rise: The Prodigy[/i] and [i]Heroes Rise: The Hero Project,[/i] interactive novels where your choices control the story. The Heroes Rise trilogy is entirely text-based—without graphics or sound effects—and driven by the vast, unstoppable power of your imagination.\n\nAll of your decisions lead to this epic conclusion, where you must truly define what you believe is right and what you stand for as a hero—and what (or whom) you’re willing to sacrifice for those ideals. Play as male, female, trans, intersex, nonbinary, or more and as gay, straight, or pansexual. Decide how your story will end. How many alternate endings can you unlock?\n\nHow high will you rise?\n", "choicescript_stats": "*if regimedamagerevealed\n\t*set regimedamagename \"Regime Damage Points\"\n*if powerregainrevealed\n\t*set powerregainname \"Power Regain Points\"\n\n*label display\n*text_image hero.png center Your Hero\n*stat_chart\n\ttext Codename\n\topposed_pair Fame\n\t\tJustice\n\topposed_pair Lawless\t\n\t\tLawful\n\topposed_pair Offensive\n\t\tDefensive\n\topposed_pair Soloist\n\t\tTeam Player\n\topposed_pair Unleash\n\t\tControl\n\topposed_pair Feared\n\t\tRevered\n\topposed_pair Revenge\n\t\tIdeals\n\topposed_pair Freedom\n\t\tSecurity\n\ttext Power\n\ttext Health\n\ttext Money\n\ttext Legend\n*comment endif\n\n*text_image relationships.png center Your Relationships\n*stat_chart\n\tpercent rlshp_grandma Grandma\n\tpercent rlshp_jenny Jenny\n\tpercent rlshp_victons The Victons\n\tpercent rlshp_prodigal Prodigal\n\tpercent rlshp_tap The American Protectorate\n\tpercent rlshp_bm Black Magic\n\tpercent rlshp_lucky Lucky\n*comment endif\n\n*text_image world.png center World Statistic\n*stat_chart\n\tpercent antipoweredsent Anti-Powered Sentiment\n*comment endif\n\n*stat_chart\n\ttext regimedamage ${regimedamagename}\n\ttext powerregain ${powerregainname}\n\n*check_achievements\n*if (choice_achieved_legendguide)\n\t*page_break View Legend Guide\n\t*text_image guide.png center HeroFall: Perfect Legend Guide\n\n\t[b]General Tip:[/b] You must load a saved The Hero Project game with a Legend Level greater than 60 to achieve perfect Legend in HeroFall. It will also help to have consistently high/low Opposed Pair Stat Levels (Opposed Pair Stats around Level 50 are undesirable).\n\n\t[b]Chapter Two:[/b] Make sure to keep your Power and Health Levels high enough to survive and avoid a Legend decrease. If you die in this chapter, you will lose 20 Legend. The MeChip Warning System helps advise wise battle decisions.\n\n\t[b]Chapter Three:[/b] Automatic Legend Recalibration. (Must load a saved The Hero Project game with a Legend Level greater than 60 to achieve perfect Legend). [i](Legend High: 50)[/i]\n\n\t[b]Chapter Four:[/b] You must choose to RECORD Rexford's Infinite Elite and then be sure to either escape OR fight and knock out Rexford for the most positive media outcomes in Chapter Five. If you choose not to record, or choose to cripple or kill Rexford, you will not gain maximum Legend.\n\t*line_break\n\t[b]Chapter Four:[/b] Make sure to keep your Power and Health Levels high enough to survive and avoid a Legend decrease. If you die in this chapter, you will lose 20 Legend. The MeChip Warning System helps advise wise battle decisions.\n\n\t[b]Chapter Five:[/b] If you chose to RECORD Rexford's Infinite Elite and then chose to escape OR fight and knock out Rexford, you will receive the maximum Legend Boost. [i](Legend High: 60)[/i]\n\n\t[b]Chapter Six:[/b] To avoid a Legend Loss, do not choose to kiss Jury. [i](Legend High: 60)[/i]\n\n\t[b]Chapter Seven:[/b] To gain the maximum Legend Boost, take down Rebellion with five hit points as quickly as possible (within the first three battle choices). [i](Legend High: 70)[/i]\n\t*line_break\n\t[b]Chapter Seven:[/b] Make sure to keep your Power and Health Levels high enough to survive and avoid a Legend decrease. If you die in this chapter, you will lose 20 Legend. The MeChip Warning System helps advise wise battle decisions. \n\n\t[b]Chapter Eight:[/b] You must clear the first three Blessed Vessel doors without any mistakes, then GRAB THE LASER GUN to receive Miss Artillery's clearest dying clue. This will enable you to use the clue for the maximum Legend Boost in Chapter Nine.\n\t*line_break\n\t[b]General Tip:[/b] If you do make any mistakes opening the doors, you may still get the maximum Legend Boost if you choose to PUSH PRODIGAL ASIDE and read the partial clue.\n\t*line_break\n\t[b]Chapter Eight:[/b] Make sure to keep your Power and Health Levels high enough to survive and avoid a Legend decrease. If you die in this chapter, you will lose 20 Legend. \n\t*line_break\n\t[b]General Tip:[/b] For help with the Blessed Vessel mission, check the Heroes Rise Social Media Pages for Strategy Guides.\n\n\t[b]Chapter Nine:[/b] If you heard Miss Artillery's dying words, make sure to choose to say: \"I think Miss Artillery was trying to tell Prodigal and me who Prodigal's father is.\" Correctly identifying President Victon as Prodigal's father grants you the maximum Legend Boost. [i](Legend High 80)[/i]\n\t*line_break\n\t[b]Chapter Nine:[/b] If you made a mistake and read Miss Artillery's dying message instead, make sure to choose to say: \"I think Miss Artillery was trying to tell Prodigal and me about Prodigal's father. And I think I know who it is.\" You must then correctly write \"President Victon\" as Prodigal's father to grant you the maximum Legend Boost. [i](Legend High 80)[/i]\n\n\t[b]Chapter Ten:[/b] When deciding whether to let ${reportername} record inside the Devoid, you must make a decision consistent with your Fame/Justice Level. To do so, Fame must be higher than 60 or Justice must be lower than 40. [i](Legend High 85)[/i]\n\t*line_break\n\t[b]Chapter Ten:[/b] When deciding whether to free the maximum security Prisoners inside the Devoid, you must make a decision consistent with your Lawless/Lawful Level. To do so, Lawless must be higher than 60 or Lawful must be lower than 40. [i](Legend High 90)[/i]\n\t*line_break\n\t[b]Chapter Ten:[/b] To avoid a Legend Loss, do not ask The Crush for help freeing The Millennial Group. [i](Legend High: 90)[/i]\n\n\t[b]Chapter Eleven:[/b] Create the perfect threat level matchups to gain a Legend Boost. [i](Legend High: 95)[/i]\n\t*line_break\n\t[b]Chapter Eleven:[/b] Make sure to keep your Power and Health Levels high enough to survive and avoid a Legend decrease. If you die in this chapter, you will lose 20 Legend. \n\t*line_break\n\t[b]General Tip:[/b] For help with the Devoid War mission, check the Heroes Rise Social Media Pages for Strategy Guides.\n\n\t[b]Chapter Twelve:[/b] Automatic final boost. [i](Legend High: 100)[/i]\n\t*line_break\n\t[b]General Tip:[/b] If you kill anyone in HeroFall irresponsibly and without good reason, you will receive a Legend decrease in Chapter Twelve as punishment.\n\t*line_break\n\t[b]General Tip:[/b] If you successfully expose or destroy The Meek movement, you receive an extra 5 Legend Boost if your Legend is below 90. So if you've made any mistakes, this may be a chance to gain back some lost Legend.\n\n\t[b]General Tip:[/b] In Heroes Rise, you are rewarded for sticking to your ideals. If trying to earn a high Legend Level, make sure to remain consistent once you decide what kind of hero you want to be.\n\n\t*page_break Back to the Stats Screen\n\t*goto display", "choicescript_upgrade": "*label start\n*check_purchase adfree warningsys adspace legendguide\n\n*if choice_purchased_adfree = false\n  [b]Chapters 5 through 12[/b]\n\n  Unlock chapters 5 through 12!\n\n  *purchase_discount adfree 2022-07-21 $4.99 $2.99 start\n\n*if choice_purchased_warningsys = false\n  [b]MeChip Warning System[/b]\n\n  It's one of the most valuable MeChip updates: the Warning System will enable your MeChip to alert you if your Power or Health Levels drop dangerously low (without having to go through the Show Stats screen on your MeChip). It will also enable your MeChip to inform you of strategic possibilities and warn you if you're about to make a decision with a high level of risk. Of course, you can always choose to ignore the Warning System, but it might come in handy keeping you alive in dangerous situations.\n\n  *purchase warningsys $0.99 start\n\n*if choice_purchased_adspace = false\n  [b]Ad Space[/b]\n\n  Purchase an ad campaign to attack President Victon. It will inflict four Regime Damage Points, worth $150,000 in in-game cash. After your purchase, you may unlock this option again the next time you play, at no additional charge.\n\n  *purchase adspace $0.99 start\n\n*if choice_purchased_legendguide = false\n  [b]Perfect Legend Guide[/b]\n\n  The Perfect Legend Guide lists the decisions necessary to achieve a perfect Legend score. (It's only available at the end of the game.)\n\n  *purchase legendguide $0.99 start\n\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 5 through 12[/b]\n\n  You've paid to unlock chapters 5 through 12.\n\n*if choice_purchased_warningsys\n  [b]MeChip Warning System[/b]\n\n  You've paid to unlock the MeChip Warning System.\n\n*if choice_purchased_adspace\n  [b]Ad Space[/b]\n\n  You've paid to unlock the ad campaign to attack President Victon.\n\n*if choice_purchased_legendguide\n  [b]Perfect Legend Guide[/b]\n\n  You've paid to unlock the Perfect Legend Guide at the end of the game.\n", "gameload": "*comment é\n*label startmenu\n[i]Heroes Rise: HeroFall[/i] is the third part of the Heroes Rise Trilogy.\n\nYou can choose to read a summary of the first two novels before beginning [i]HeroFall[/i], but first, would you like to load a saved game from [i]Heroes Rise: The Hero Project[/i]?\n \n*choice\n\t#I'd like to load my saved game from [i]Heroes Rise: The Hero Project[/i].\n\t\tPlease note, you must load a game from The Hero Project for HeroFall to work properly. Games loaded from The Prodigy will not work.\n\n\t\t*choice\n\t\t\t#Yes. Load my saved game from [i]Heroes Rise: The Hero Project[/i].\n\t\t\t\t*restore_game\n\t\t\t\t*goto startmenu\n\t\t\t#No. I want to start with fresh Stats.\n\t\t\t\t*goto newgame\n\t#I haven't read [i]The Hero Project[/i].\n\t\tTo fully enjoy [i]Heroes Rise: HeroFall[/i], we recommend you start Heroes Rise from the beginning.\n\n\t\tDownload the other two games here:\n\n\t\t*link https://www.choiceofgames.com/heroes-rise/redirect.php?src=hr3 Heroes Rise: The Prodigy\n\n\t\t*link https://www.choiceofgames.com/heroes-rise-2-hero-project/redirect.php?src=hr3 Heroes Rise: The Hero Project\n\n\t\tFor now, you can start [i]HeroFall[/i] with fresh Stats.\n\t\t*goto newgame\n\n*label readytostart\n\nBefore you start [i]Heroes Rise: HeroFall[/i], would you like to read a recap of your journey so far?\n\n*choice\n\t#Yes, I'd like to read a recap.\n\t\t*goto readtherecap\n\t#No, take me to [i]HeroFall[/i].\n\t\t*goto_scene chap_one\n\n*label newgame\n*page_break\n\n*set newgame true\n*set fame 50\n*set lawless 50\n*set offensive 50\n*set soloist 50\n*set unleash 50\n*set feared 50\n*set revenge 50\n*set freedom 50\n*set power 100\n*set health 100\n*set money 19500\n*set legend 0\n*set rlshp_grandma 70\n*set rlshp_jenny 50\n*set rlshp_victons 5\n*set rlshp_prodigal 5\n*set rlshp_tap 5\n*set rlshp_bm 50\n*set rlshp_lucky 50\n*set antipoweredsent 95\n\nBefore you start reading, you'll need to answer some basic questions.\n\nFirstly, your first name is:\n\n*choice\n\t#\"Kyle.\"\n\t\t*set firstname \"Kyle\"\n\t\t*goto exit\n\t#\"Gino.\"\n\t\t*set firstname \"Gino\"\n\t\t*goto exit\n\t#\"Stephen.\"\n\t\t*set firstname \"Stephen\"\n\t\t*goto exit\n\t#\"Shane.\"\n\t\t*set firstname \"Shane\"\n\t\t*goto exit\n\t#\"Aurelia.\"\n\t\t*set firstname \"Aurelia\"\n\t\t*goto exit\n\t#\"Morgan.\"\n\t\t*set firstname \"Morgan\"\n\t\t*goto exit\n\t#\"Ariel.\"\n\t\t*set firstname \"Ariel\"\n\t\t*goto exit\n\t#\"Julia.\"\n\t\t*set firstname \"Julia\"\n\t\t*goto exit\n\t#\"Chelsea.\"\n\t\t*set firstname \"Chelsea\"\n\t\t*goto exit\n\t#\"Sam.\"\n\t\t*set firstname \"Sam\"\n\t\t*goto exit\n\t#I'd rather create my own first name.\n\t\tYour first name is:\n\t\t*input_text firstname\n\t\t*goto exit\n\n*label exit\n\nYour last name is:\n\n*choice\n\t#Tricamo.\n\t\t*set familyname \"Tricamo\"\n\t\t*goto powers\n\t#Apple.\n\t\t*set familyname \"Apple\"\n\t\t*goto powers\n\t#Kastan.\n\t\t*set familyname \"Kastan\"\n\t\t*goto powers\n\t#Rosado.\n\t\t*set familyname \"Rosado\"\n\t\t*goto powers\n\t#Lee.\n\t\t*set familyname \"Lee\"\n\t\t*goto powers\n\t#Rizzo.\n\t\t*set familyname \"Rizzo\"\n\t\t*goto powers\n\t#Decter.\n\t\t*set familyname \"Decter\"\n\t\t*goto powers\n\t#Ito.\n\t\t*set familyname \"Ito\"\n\t\t*goto powers\n\t#I'd rather create my own family name.\n\t\tYour real last name is:\n\t\t*input_text familyname\n\t\t*goto powers\n\n*label powers\n\nYou identify as:\n\n*choice\n\t#Female.\n\t\t*label femalecodingsect\n\t\t*set male false\n\t\t*set genderinputhr \"Female\"\n\t\t*set mr_ms \"Miss\"\n\t\t*set sir_mad \"madame\"\n\t\t*set youze \"she\"\n\t\t*set youhir \"her\"\n\t\t*set youhis \"her\"\n\t\t*goto genderupdatelabe\n\t#Male.\n\t\t*goto genderupdatelabe\n\t#I was assigned as male at birth, but am truly female.\n\t\t*goto femalecodingsect\n\t#I was assigned as female at birth, but am truly male.\n\t\t*goto genderupdatelabe\n\t#I was born with intersex characteristics.\n\n\t\tYou are at ease with this element of your identity and consider yourself to be:\n\n\t\t*choice\n\t\t\t#Male.\n\t\t\t\t*goto genderupdatelabe\n\t\t\t#Female.\n\t\t\t\t*goto femalecodingsect\n\t\t\t#Intersex.\n\t\t\t\t*set genderinputhr \"Intersex\"\n\t\t\t\t*goto pronounchoicehrorig\n\t\t\t#I don't identify within binary gender categories.\n\t\t\t\t*set genderinputhr \"Nonbinary\"\n\t\t\t\t*goto pronounchoicehrorig\n\t\t\t#None of these options suit me, so I'd like to enter my own vocabulary.\n\t\t\t\t*goto inyouowngen\n\t#I don't identify within binary gender categories.\n\t\t*set genderinputhr \"Nonbinary\"\n\n\t\t*label pronounchoicehrorig\n\t\t*set genderneutralhr true\n\t\t*set male false\n\t\t*set mr_ms \"The\"\n\t\t*set sir_mad \"your grace\"\n\n\t\tGender is a spectrum with many identities--potentially as many identities as there are people. Language is imperfect thus far at naming all of these identities, but you try your best to find one that fits day to day.\n\n\t\tYou've also chosen to identify with these pronouns:\n\n\t\t*choice\n\t\t\t#Ze and hir.\n\t\t\t\t*set youze \"ze\"\n\t\t\t\t*set youhir \"hir\"\n\t\t\t\t*set youhis \"hir\"\n\t\t\t\t*goto genderupdatelabe\n\t\t\t#They, them, and their.\n\t\t\t\t*set youze \"they\"\n\t\t\t\t*set youhir \"them\"\n\t\t\t\t*set youhis \"their\"\n\t\t\t\t*goto genderupdatelabe\n\t\t\t#Zhe, zhim, and zhir.\n\t\t\t\t*set youze \"zhe\"\n\t\t\t\t*set youhir \"zhim\"\n\t\t\t\t*set youhis \"zhir\"\n\t\t\t\t*goto genderupdatelabe\n\t\t\t#I'm still comfortable using she and her.\n\t\t\t\t*set mr_ms \"Miss\"\n\t\t\t\t*set sir_mad \"madame\"\n\t\t\t\t*set youze \"she\"\n\t\t\t\t*set youhir \"her\"\n\t\t\t\t*set youhis \"her\"\n\t\t\t\t*goto genderupdatelabe\n\t\t\t#I'm still comfortable using he, him, and his.\n\t\t\t\t*set mr_ms \"Mr.\"\n\t\t\t\t*set sir_mad \"sir\"\n\t\t\t\t*goto genderupdatelabe\n\t\t\t#I'd like to input my own pronouns.\n\t\t\t\tInstead of he, she, or they, I prefer:\n\n\t\t\t\t*input_text youze\n\n\t\t\t\tInstead of him, her, or them, I prefer:\n\t\t\t\t\n\t\t\t\t*input_text youhir\n\n\t\t\t\tInstead of his, her, or their, I prefer:\n\n\t\t\t\t*input_text youhis\n\t\t\t\t*goto genderupdatelabe\n\t#None of these options suit me, so I'd like to enter my own vocabulary.\n\t\t*label inyouowngen\n\t\tYou identify as:\n\t\t*input_text genderinputhr\n\t\t*goto pronounchoicehrorig\n\n*label genderupdatelabe\n\nYou are attracted to:\n\n*choice\n\t#Men.\n\t\t*label men\n\t\t*set bmfriend \"boyfriend\"\n\t\t*if male\n\t\t\t*set male_straight false\n\t\t\t*goto codename\n\t\t*else\n\t\t\t*goto codename\n\t#Women.\n\t\t*label women\n\t\t*if male\n\t\t\t*set bmmale false\n\t\t\t*set bmze \"she\"\n\t\t\t*set bmhir \"her\"\n\t\t\t*set bmhis \"her\"\n\t\t\t*set bmfirst \"Lucia\"\n\t\t\t*set luckymale false\n\t\t\t*set luckyze \"she\"\n\t\t\t*set luckyhir \"her\"\n\t\t\t*set luckyhis \"her\"\n\t\t\t*set bmfriend \"girlfriend\"\n\t\t\t*goto codename\n\t\t*else\n\t\t\t*set female_straight false\n\t\t\t*set bmmale false\n\t\t\t*set bmze \"she\"\n\t\t\t*set bmhir \"her\"\n\t\t\t*set bmhis \"her\"\n\t\t\t*set bmfirst \"Lucia\"\n\t\t\t*set luckymale false\n\t\t\t*set luckyze \"she\"\n\t\t\t*set luckyhir \"her\"\n\t\t\t*set luckyhis \"her\"\n\t\t\t*set bmfriend \"girlfriend\"\n\t\t\t*goto codename\n\t#Everyone and anyone within the gender spectrum—or without.\n\t\t*set bisexual true\n\t\tYou're never attracted to just one type, but lately you've been more attracted to:\n\t\t*choice\n\t\t\t#Someone more male-identified.\n\t\t\t\t*goto men\n\t\t\t#Someone more female-identified.\n\t\t\t\t*goto women\n\n*label codename\n\nYour codename is:\n\n*choice\n\t#Maneuver.\n\t\t*set codename \"Maneuver\"\n\t\t*goto new_life\n\t#Rush.\n\t\t*set codename \"Rush\"\n\t\t*goto new_life\n\t#Conduit.\n\t\t*set codename \"Conduit\"\n\t\t*goto new_life\n\t#Charge.\n\t\t*set codename \"Charge\"\n\t\t*goto new_life\n\t#SFX.\n\t\t*set codename \"SFX\"\n\t\t*goto new_life\n\t#I'd rather create my own code name.\n\t\t*input_text codename\n\t\t*goto new_life\n\n*label new_life\n\n*set energycolor \"blue\"\n*set chip_butler true\n*set chipze \"he\"\n*set chiphir \"him\"\n*set chiphis \"his\"\n*set chipname \"Jeeves\"\n*set sanders false\n*set sidekick \"Sparrow\"\n*set sparrow true\n*set diva true\n*set diva_bad true\n*set guard false\n*set static_meet true\n*set jury_article true\n*set guard_possible false\n*set bm_rift true\n\t\t\n*if bmmale\n\t*set bmceleb \"Ryan Gosling\"\n\t*goto bmagic_sum\n*else\n\t*set bmceleb \"Angelina Jolie\"\n\t*goto bmagic_sum\n\n*label bmagic_sum\n\n*set ring_lyric \"At Last\"\n*set choose_sidekick true\n*set kill_prodigal true\n*set kill_town true\n*set outlaw true\n*set flower \"Golda\"\n*set gma_simple true\n*set artillery_brain true\n*set badassbonus false\n*set moralbonus false\n*set herounemployment true\n*set luckyname \"Alex\"\n*set luckyfriends true\n*set fumblethirteenth true\n*set nodate true\n*set bmeleventh true\n*set conspiracygo true\n*set takepills true\n*set selloutjenny false\n*set infinivicton true\n*set savejennyinfini true\n\nBefore you start [i]Heroes Rise: HeroFall[/i], would you like to read a recap of your journey so far?\n\n*choice\n\t#Yes, I'd like to read a recap.\n\t\t*goto readtherecap\n\t#No, take me to HeroFall.\n\t\tYou're ready to start [i]Heroes Rise: HeroFall[/i]!\n\t\t*finish HeroFall\n\n*label readtherecap\n\n[i]Previously in Heroes Rise:[/i]\n\nAlmost a year and a half ago, Grandma bought your Department for the Regulation of Powered Resources (DRPR) Powered Hero License so you could quit your video game testing job and start your rise to heroic Legend. Though becoming a Legendary hero meant more to you than just fulfilling your own dreams—it was also about redeeming your parents, The Sound and The Fury, who were sentenced by then-Judge Victon to a life term in The Devoid for accidentally murdering the villainess, Miss Artillery.\n\nYou set out with one ultimate goal: to become an A-list hero and reveal to Millennia City that you are actually ${firstname} ${familyname}, The Sound and The Fury's child.\n\nSo with your Power to fly and generate energy, you embarked on your heroic journey, deciding along the way what kind of hero to be and hoping to someday reach a Legend Level of 100. \n\n*page_break\n\nThe day you got your license was also the day that you set out on your first mission: to recover the stolen Gravitas, with Jenny and MeChip ${chipname} backing you up. \n\nThat first fateful night may have been a complete disaster, but it set you on the path that led you here today. It's mind-boggling to think that in one night you located Trackr, \n*if sanders\n\tstarted working with Officer Sanders,\n\t*goto gavesonja\n*else\n\t*goto gavesonja\n\n*label gavesonja\n*if sonja_meet\n\tgave Sonja Challa her first tip,\n\t*goto tookonvice\n*else\n\t*goto tookonvice\n\n*label tookonvice\ntook on Madame Vice, crossed paths with Jury, battled Smyther's Splice Circle, and pissed off Rexford Schillers for the first time. Not to mention it was the first night you were ambushed by the then-shadowy villainess, Prodigal, and had your first standoff with Mayor Victon. \n\nIt was an exhausting night, one that saw your heroic name dragged through the mud by none other than Sonja Challa, in her first major post about you.\n\n*page_break\n\nNever one to give up, you came back twice as strong—though not before Grandma forced you to take on a sidekick. You and ${sidekick} may have stopped that Ani-gang brawl in the Fringes and ${sidekick} may have saved your life, but it was all all a lie. If only you had known then that\n*if sparrow\n\tSparrow was secretly Prodigal, infiltrating your life…\n\t*goto jennythenhelped\n*elseif tarana\n\tTarana Rain was being blackmailed by Prodigal to infiltrate your life…\n\t*goto jennythenhelped\n*else\n\tPressie was secretly Prodigal's twisted sidekick, sent to infiltrate your life…\n\t*goto jennythenhelped\n\n*label jennythenhelped\n\nEven your first meeting with your biggest hero crush, Black Magic, was set up by Prodigal as part of her plan to build you up and break you down. \n\nMeeting Black Magic was the biggest thrill of your career at the time though, especially since ${bmze} took you to meet The Millennial Group and your ultimate idol, Rebellion. This was the first time you got to see what it was like for your dreams to come true—and realize your dreams might look much different in reality.\n\nStill, you got to play a major role in helping The Millennial Group shut down The Splice Circle.\n*if bmnoromance\n\t*goto thenexttwoweeks\n*else\n\tSoonafter you hooked up with Black Magic for the first time, in all ${bmhis} ${bmceleb} glory. That was also when you learned Black Magic's dark lifeforce draining secret\n\t*if bm_rift\n\t\tand decided ${bmze} wasn't who you thought ${bmze} was.\n\t\t*goto thenexttwoweeks\n\t*else\n\t\tand cemented your relationship by accepting ${bmhir} anyway.\n\t\t*goto thenexttwoweeks\n\n*label thenexttwoweeks\n*page_break\n\nThe next two weeks were a blur, all secretly orchestrated by Prodigal: leading you to her pool-killer warehouse with ${sidekick}, framing Jury for hiring The Wisp to kill you, and ensuring you became Millennia City's Hero of Tomorrow. The HoT coronation party was supposed to be the most exciting night of your life, but instead Prodigal set her endgame into motion, kidnapping Sonja and ${sidekick} and forcing you to choose which one would live.\n\nIt was the toughest decision you had ever faced as a hero, but it was just the first in a career filled with impossible decisions. You ultimately chose to save \n*if choose_sidekick\n\t${sidekick}, leaving Prodigal to murder Sonja in front of all of Millennia City. You thought you had made the right decision at the time, but if only you had known ${sidekick} was a fraud, maybe you could have saved Sonja…\n\t*goto firsthorror\n*else\n\tSonja, leaving Prodigal to fake ${sidekick}'s murder in front of all of Millennia City.\n\t*goto firsthorror\n\n*label firsthorror\n*page_break\n\nThough that was only Prodigal's first horror of the night: she then outed you as ${firstname} ${familyname} to the press and attacked Grandma, whom you had left at your apartment in the Eastern Fringes after learning she had been forging letters from you to your imprisoned parents.\n\nThe hits just kept on coming as Prodigal revealed ${sidekick}'s true self and proceeded to transport you, Grandma, and Jenny to her lair underneath the Bigsur Fusion Plant. It was there that Prodigal revealed her mad plans to destroy you and avenge her mother, Miss Artillery—the villain who your parents were in prison for murdering. \n\nProdigal's ultimate goal was to become a Legendary villain—even then, her life seemed to be a fun-house mirror version of your own. To this end, Prodigal's grand finale was to wipe out Millennia City in a nuclear holocaust, right after killing you, Grandma, and Jenny. \n\nHowever, Prodigal didn't bank on the fact that you were also an Infini-Class Powered, a secret Grandma and Jenny had been keeping even from you. You used these newfound Powers to manipulate atoms and gravity to save your family and stop Prodigal, though not before she presented you with one last horrifying choice: \n\nMurder Prodigal or allow Millennia City to be destroyed. \n\n*page_break\n\n*if kill_prodigal\n\tYou decided that saving the lives of the millions outweighed the toll of taking one life, so you killed Prodigal in order to save Millennia City.\n\t*if kill_town\n\t\tThough not before Prodigal's Death Wave managed to hit the Eastern Fringes of Millennia City, killing 314 innocent people.\n\t\t*goto prodigalnotdead\n\t*else\n\t\t*label prodigalnotdead\n\n\t\tOf course, Prodigal faked her death at your hands that night, but you wouldn't learn that until after the next major chapter in your heroic career:\n\n\t\tThe Hero Project.\n\t\t*goto startthp\n*else\n\tYou decided not to let Prodigal turn you into a murderer, instead using your new Infini Powers to shut her down. \n\t*if power_town\n\t\tThough not before Prodigal's Death Wave managed to hit the Eastern Fringes of Millennia City, killing 314 innocent people.\n\t\t*goto prodigalinprison\n\t*else\n\t\t*label prodigalinprison\n\n\t\tYou ultimately succeeding in sending Prodigal to prison, if only for a little while. You wouldn't learn about her escape until after the next major chapter in your heroic career:\n\n\t\tThe Hero Project.\n\t\t*goto startthp\n\n*label startthp\n*page_break\n\nYou had just come off your first major victory as a hero, though your infamy was contained mostly to Millennia City. You knew it was time to take your heroic rise to the next level: the national stage. Especially because your truly greatest enemy, Mayor Victon, was looking to do the same by entering the Presidential race with the support of the anti-Powered Meek movement.\n\nThat's how you found yourself on The Hero Project, America's #1 Reality Competition for Powered Heroes. When you first interviewed with the Executive Producers, handler GG and judge Rexford Schillers, you had no idea the show would eventually change your life in every way. \n\nThough there were some clues along the way: the cryptic MeMessages you received about The Hero Project being corrupt, Rexford's special interest in your Infini Powers, learning that Jenny was entering the competition as an undercover DRPR agent to investigate a potential anti-Infini plot, the Herologist's warning that your Infini Powers could kill you or others if not carefully developed….\n\n*page_break\n\nStill, you surged forward in The Hero Project, battling your way through the Semi-Finals\n*if wildcard\n\tas a Wildcard pick\n\t*goto finalselect\n*else\n\t*goto finalselect\n\n*label finalselect\nto become one of the 20 heroes advancing to the Final Selection. \n*if judgessave\n\tYou were then eliminated, until the judges decided to save you as the 14th contestant advancing to the Live Finals.\n\t*goto rexfordcall\n*else\n\tThen the judges put you through to the Live Finals as a member of the Final 14. \n\t*goto rexfordcall\n\n*label rexfordcall\n\nYou wouldn't learn until later that Rexford ensured your Final 14 spot so he'd have another Infini puppet to play with, so at the time, making it to the Live Finals was incredibly exciting. You knew that if you continued to do well, you could become the Legendary hero you had always dreamed of.\n\n*page_break\n\nYour dreams kept coming true as The Hero Project debuted to massive ratings, becoming 3V's biggest hit in years. America's obsession with Powered heroics was paired with a source of national news on The Hero Project, as you were cleared to fight missions against America's most wanted criminals at the time: the Powered terrorist Culic and his terrifying InfraOrder.\n\nYou battled against Culic and The InfraOrder at Manhattan's Midtown Tunnel and his Big Sur Wasteland castle headquarters, where you learned that Scoundrel, the turkey-girl hybrid eliminated in 14th place, was secretly a mole placed in the competition by Culic. Though that wasn't even the biggest scandal that would rock The Hero Project: as a part of his grand conspiracy, Rexford leaked Black Magic's lifeforce sourcing secret to create a story that would distract from The Hero Project's inability to capture Culic after two missions.\n\nBlack Magic\n*if bmeleventh\n\twas shamed and voted out of the competition by \n\t*if bm_breakup\n\t\tAmerica as a result, though the fact that your showmance endured a very public breakup probably didn't help.\n\t\t*goto luckynow\n\t*else\n\t\tAmerica, as a result.\n\t\t*goto luckynow\n*else\n\tsurvived this scandal,\t\n\t*if bm_reconcile\n\t\thowever, thanks in large part because you decided to stand by ${bmhir} as your ${bmfriend}.\n\t\t*goto luckynow\n\t*else\n\t\t*if bm_breakup\n\t\t\thowever, despite the fact that your brief showmance endured a very public breakup.\n\t\t\t*goto luckynow\n\t\t*else\n\t\t\thowever.\n\t\t\t*goto luckynow\n\n*label luckynow\n*if bmeleventh\n\tUp-and-comer Lucky survived instead,\n\t*if luckyfeelings\n\t\tthanks in large part to the showmance you started with ${luckyhir}. Though Black Magic's fall from grace was\n\t\t*goto oneofmanydiff\n\t*else\n\t\ttaking Black Magic's place in the competition in many ways. Though Black Magic's fall from grace was\n\t\t*goto oneofmanydiff\n*else\n\tUp-and-comer Lucky was eliminated instead,\n\t*goto oneofmanydiff \n\n*label oneofmanydiff\njust one of the many difficult eliminations you'd take part in…\n\nAs The Hero Project's reigning\n*if strathero\n\ttrue Hero, you ignored the rivalry between the Popular and Underdog alliances, surviving as\n\t*goto hatemelovemet\n*elseif stratloyal\n\tLoyal Ally,\n\t*if officialpopular\n\t\tyou stayed true to the Popular alliance and survived as\n\t\t*goto hatemelovemet\n\t*else\n\t\tyou stayed true to the Underdog alliance and survived as\n\t\t*goto hatemelovemet\n*elseif stratfloater\n\tFloater, you played both sides of the Popular and Underdog alliances and survived as\n\t*goto hatemelovemet\n*elseif stratruthless\n\tRuthless Strategist, you played the Popular and Underdog alliances against each other and survived as\n\t*goto hatemelovemet\n*elseif stratvillain\n\tVillain, you stirred up drama between the Popular and Underdog alliances,\n\t*goto hatemelovemet\n*else\n\tStrategic Chameleon, you reacted to the competition as it evolved. You helped pick off members of the rival Popular and Underdog alliances, surviving as\n\t*goto hatemelovemet\n\n*label hatemelovemet\nFumble, The Bear, and Mach Girl were also eliminated from The Hero Project.\n\n*page_break\n\nFinding yourself in the Final 9, you were then faced with the most difficult decisions of the entire competition.\n*if takepills\n\tAfter experiencing some trouble with your growing Infini Powers, you decided to take a Power-enhancing drug, Pump, offered by Rebellion, never thinking that your idol was setting you up for future failure.\n\t*goto jennyteim\n*else\n\tDespite experiencing some trouble with your growing Infini Powers, you decided not to take a Power-enhancing drug, Pump, offered by Rebellion, sensing something wasn't right with this offer. Though this left you open to great risk in the competition, since Rebellion was a judge, and a displeased one at that, after your rejection.\n\t*goto jennyteim\n\n*label jennyteim\n\n*if conspiracygo\n\tYou had also been assisting Jenny (who was was posing as the mysterious hero Null) with her conspiracy investigation throughout the competition, so you knew Jenny was getting close to discovering the identity of another mole within The Hero Project attempting to carry out an anti-Infini attack. \n\n\tWhich is why when it ultimately came down to you or Jenny for the 9th place elimination, you knew you had to take her request to drop out of the competition seriously.\n\t*goto thenrexwhen\n*else\n\tYou had also decided not to assist Jenny (who was was posing as the mysterious hero Null) with her anti-Infini conspiracy investigation throughout the competition. So when it ultimately came down to you or Jenny for the 9th place elimination, you didn't know if you could take her warning to drop out of the competition seriously.\n\t*goto thenrexwhen\n\n*label thenrexwhen\n*page_break\n\nWhen Rexford asked you to reveal Null's secret identity,\n*if selloutjenny\n\tyou decided that nothing was more important than winning The Hero Project. \n\n\tSo you committed the ultimate betrayal and revealed Jenny's identity as a secret DRPR agent, watching as she was eliminated from the competition. This single act broke your friendship, but you hoped it was worth the sacrifice.\n\n\tTurns out, it wasn't.\n\n\tYou did get to participate in the final mission taking down Culic's InfraOrder, though \n\t*goto takedownculic\n*else\n\tyou decided that nothing was more important than protecting your best friend and her investigation. Jenny had sacrificed so much to help you, so it was time to return the favor. Besides, you knew you didn't have to win The Hero Project to keep growing your heroic career… \n\n\tOr at least you hoped so, since having to watch the final mission defeating Culic's InfraOrder from home was pretty painful. Especially because it meant\n\t*goto takedownculic\n\n*label takedownculic\nyou were powerless to stop The Crush as his telekinetic Infini Powers surged out of control, slamming \n*if bmeleventh\n\tLucky\n\t*goto deepcoma\n*else\n\tBlack Magic\n\t*goto deepcoma\n\n*label deepcoma\ninto a deep coma. \n\n*page_break\n\nThis display of Infini Powered abuse sent the nation crashing through a wave of anti-Powered sentiment, one that Mayor Victon rode to become the next President of the United States, backed by his Powered Regulation Platform and The Meek movement. \n\nPresident Victon made his first appearance at The Hero Project Finale, where Inherit, Jury, Summit, Wintry, Stage Show, and\n*if selloutjenny\n\tyou \n\t*goto firstteam\n*else\n\tNull\n\t*goto firstteam\n\n*label firstteam\nwon The Hero Project and were named the original roster of The American Protectorate, America's first national Powered team, led by Rebellion and fully funded by the U.S. Government.\n\nThis was supposed to be an occasion to celebrate, but the event turned sinister when President Victon issued his first American Protectorate order: to have you submit to the Infinity Regulator, a new Power-dampening device meant to rehabilitate Infini-Class Powereds. \n\n*page_break\n\nYou ultimately refused President Victon's order—\n*if takepills\n\twhich is when the latent Pump in your system activated, causing you to lose control of your Infini Powers, just like The Crush.\n\n\tLuckily no one was hurt in your explosion of Power,\n\t*goto displayneeded\n*else\n\twhich is why Rexford intervened to make it look like you were losing control of your Infini Powers, just like The Crush.\n\n\tThis was an outright lie,\n\t*goto displayneeded\n\n*label displayneeded\nbut the damage was still done: President Victon now had the reason he needed to begin his oppressive reign of Powered Regulation, with you as its first target.\n\nA battle broke out between your allies and the newly formed American Protectorate, one where Jenny began to expose Rexford Schillers as a Secret Meek Apostle charged with orchestrating an elaborate anti-Infini plot throughout The Hero Project. \n\nWhen Rexford turned the Infinity Regulator on Jenny in a blind rage,\n*if savejennyinfini\n\tyou jumped to save Jenny, taking the shot heard around the world…\n\t*goto dustsetted\n*else\n\tyou tried to stop him, but ended up taking the shot heard around the world…\n\t*goto dustsetted\n\n*label dustsetted\n\nThe one that robbed you of your Powers.\n\n*page_break\n\nWhen the dust settled months later, Jenny visitied you at your lakeside safe house, where you were still struggling with the loss of your Powers. Jenny promised the effects should be temporary, but couldn't offer any insight into how long it would take to recover.\n\nThough Jenny was able to offer you her report on the conspiracy behind The Hero Project, which claimed President Victon, Constance Obach, Inherit, Rexford Schillers, and Rebellion all formed a secret cabal that orchestrated the series of events before, during, and after The Hero Project—a series of events that saw all of these members rise to positions of prominence and power, with the exception of Rexford, who was the only one to take the fall. Despite knowing the truth, Jenny and the DRPR only had enough concrete evidence to put Rexford behind bars.\n\nIt seemed you were at the center of yet another grand plot you couldn't stop, but your enemies hadn't bet on one thing: you becoming an Infini Icon, standing for Powered rights everywhere. With this one very powerful weapon in your arsenal, you knew it was time for you to take control of your destiny.\n\nBecause a war was brewing, one you'd soon be fighting on the front lines.\n*if selloutjenny\n\t*page_break\n\tThough you'd have to fight without Jenny this time, since she still couldn't forgive your betrayal.\n\t*goto prodarrive\n*if jennyfeelings\n\t*page_break\n\tOne you also hoped to fight alongside Jenny, who you finally kissed. It may have made things complicated, but you learned life was too unpredictable for you to waste any more time hiding your feelings.\n\t*goto prodarrive \n*else\n\t*goto prodarrive\n\n*label prodarrive\n*page_break\n\nAs you tried to process all that had happened, Grandma provided you with one major bright spot: she had been fighting to change The Devoid's no correspondence policy for months, which resulted in an actual letter sent from your parents. \n\nReading this letter made you feel better than you had in a long time, because you heard the words you needed to hear: that your parents were proud of all you had done, no matter what.\n\n*page_break\n\nThis moment was ruined, however, as Prodigal suddenly appeared, \n*if kill_prodigal\n\trevealing that she had faked her death at your hands.\n\t*goto baringbad\n*else\n\thaving escaped from prison.\n\t*goto baringbad\n\n*label baringbad\nThough even more shocking that this was the news Prodigal had come to deliver: \n\nThat her murdered mother, Miss Artillery, was actually still alive. \n\nAnd that she needed your help to find her. \n\n*page_break\n\nNow that you're all caught up, you're ready to start [i]Heroes Rise: HeroFall[/i]!\n\n*finish HeroFall\n", "save_herofall": "This saved game was created at the end of [i]Heroes Rise: HeroFall[/i]. You can only restore it when playing [i]The Hero Project: Redemption Season[/i].\n\n*goto_scene gameload startmenu", "save_heroproject": "You have successfully loaded your savegame.\n*set power 100\n*set health 100\n*set feared hated\n*set rlshp_tap rlshp_rebellion\n*if (legend \u003c 0)\n\t*set legend 0\n*goto_scene gameload readytostart", "screenshots": "\nscreenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set codename \"Conduit\"\n*set fame 19\n*set lawless 24\n*set offensive 43\n*set soloist 38\n*set unleash 40\n*set feared 33\n*set revenge 55\n*set freedom 60\n*set power 100\n*set health 100\n*set money 35000\n*set legend 44\n*set rlshp_grandma 83\n*set rlshp_jenny 69\n*set rlshp_victons 36\n*set rlshp_prodigal 44\n*set rlshp_tap 36\n*set rlshp_bm 41\n*set rlshp_lucky 51\n*set antipoweredsent 31\n*set regimedamage 5\n*set powerregain 3\n\nWith Rebellion neutralized and this many cameras watching, it's time for you to make a defining decision.\n\nOne that may affect your public image and idealistic stats more than any other so far.\n\n*fake_choice\n\t#In an attempt to recruit Rebellion, take the risk of pulling him back into the panic room to tell him that Miss Artillery is alive.\n\t#Knock Rebellion out on camera, for maximum exposure.\n\t#Kill Rebellion to make an example of him on live 3V.\n\t#Cripple Rebellion off camera so he can't come after me anytime soon.\n\t\n*script changeBackgroundColor(\"black\")\n*set codename \"Maneuver\"\n*set fame 66\n*set lawless 73\n*set offensive 64\n*set soloist 83\n*set unleash 76\n*set feared 81\n*set revenge 88\n*set freedom 68\n*set power 78\n*set health 90\n*set money 25000\n*set legend 36\n*set rlshp_grandma 43\n*set rlshp_jenny 23\n*set rlshp_victons 18\n*set rlshp_prodigal 56\n*set rlshp_tap 44\n*set rlshp_bm 67\n*set rlshp_lucky 43\n*set antipoweredsent 65\n*set regimedamage 4\n*set powerregain 4\n\nYou can already tell that how you respond here will redefine what it means for you to be lawful or lawless. Actually, rebelling against the police could  be the most lawful thing you do, considering how corrupt President Victon's laws have become. \n\nNot only that, you're going to have to decide what's more important to you: the security of saving your parents as swiftly as possible, or the freedom to stand up for what you believe in?\n\n\"So, chicken,\" Prodigal whispers. \"What's it going to be?\"\n\nYou stand here, with your arch-enemy at your side, and know that what you choose to do now will translate into a message seen by the entire nation.\n\nSo you had better choose wisely.\n\n*fake_choice\n\t#Use Prodigal as a distraction to escape with Grandma.\n\t#Escape the police with Prodigal and Grandma.\n\t#Take a stand against the police with Prodigal.\n\t#Turn Prodigal in to the police as a show of good faith.\n\n*script changeBackgroundColor(\"sepia\")\n*set codename \"Riposte\"\n*set fame 39\n*set lawless 56\n*set offensive 48\n*set soloist 17\n*set unleash 55\n*set feared 61\n*set revenge 29\n*set freedom 46\n*set power 44\n*set health 36\n*set money 52000\n*set legend 29\n*set rlshp_grandma 68\n*set rlshp_jenny 56\n*set rlshp_victons 61\n*set rlshp_prodigal 44\n*set rlshp_tap 36\n*set rlshp_bm 43\n*set rlshp_lucky 51\n*set antipoweredsent 42\n*set regimedamage 4\n*set powerregain 7\n\nNext you see that Processor has Jury restrained in a bundle of the copper wire coils she usually passes for hair.\n\n\"Since his Powers are useless,\" Processor starts, \"Jury tried to get fresh with my operating system using that advanced MeChip of his. Obviously that worked out very well for him.\"\n\nYou smile at Jury, who scowls as he struggles against Processor's bonds. \n\n\"Don't enjoy this too much, cutie,\" Jury hisses. \"We Victons tend to have the last laugh.\"\n\nYou stare Jury down, knowing that he's entirely defenseless at this moment—and that several cameras will film whatever you want to do next.\n\n*fake_choice\n\t#Knock Jury out with a punch.\n\t#Have Processor patch me through for an unblockable live speech.\n\t#Create a photo moment that will really anger President Victon by kissing Jury.\n\n*set codename \"Victory\"\n*set fame 53\n*set lawless 41\n*set offensive 77\n*set soloist 46\n*set unleash 55\n*set feared 40\n*set revenge 16\n*set freedom 34\n*set power 61\n*set health 77\n*set money 40000\n*set legend 42\n*set rlshp_grandma 52\n*set rlshp_jenny 39\n*set rlshp_victons 61\n*set rlshp_prodigal 48\n*set rlshp_tap 21\n*set rlshp_bm 53\n*set rlshp_lucky 51\n*set antipoweredsent 38\n*set regimedamage 6\n*set powerregain 7\n\nBlack Magic hovers back down onto the jetty, hugging you as he bursts into tears. \n\n\"It's all so unfair,\" Black Magic cries. \"I'm so scared.\"\n\nBlack Magic goes to kiss you and you know you have to make a decision, right here and now.\n\n*fake_choice\n\t#Stand by Black Magic, no matter what.\n\t#Tell Black Magic I need to focus on saving my parents right now.\n\t#Break up with Black Magic.\n\n*set codename \"Feedback\"\n*set fame 53\n*set lawless 48\n*set offensive 34\n*set soloist 33\n*set unleash 78\n*set feared 36\n*set revenge 44\n*set freedom 51\n*set power 75\n*set health 82\n*set money 100000\n*set legend 36\n*set rlshp_grandma 72\n*set rlshp_jenny 55\n*set rlshp_victons 36\n*set rlshp_prodigal 42\n*set rlshp_tap 36\n*set rlshp_bm 44\n*set rlshp_lucky 30\n*set antipoweredsent 41\n*set regimedamage 4\n*set powerregain 6\n\nRexford—or Devoid, you suppose—runs at you, equipping his rocket launchers, knuckle-uzis, and laser cannons.\n\nYou only have seconds to decide what's more important to you: do you value the freedom to engage in a grudge match with Rexford, even if it's risky and potentially compromises your mission to save your parents? \n\nOr do you value the security of doing the safe thing by running from a potentially satisfying fight with Rexford?\n\n*fake_choice\n\t#Focus on escaping, no matter what.\n\t#Risk staying to capture footage of the bounty hunters to send to Sonja.\n\t#Take Rexford down here and now.\n\n", "sitting_sun": "This save was created at the end of [i]Heroes Rise: The Prodigy[/i], the first game in the [i]Heroes Rise[/i] series. You can use it to resume playing in [i]Heroes Rise: The Hero Project[/i], but you can't use it here in [i]Heroes Rise: HeroFall[/i].\n*page_break\n*goto_scene gameload startmenu", "startup": "*title Heroes Rise: HeroFall\n*author Zachary Sergi\n\n*scene_list\n\ts
