reak\n\n\"Yes,\" Jenny says, ignoring your tone. \"But I deactivated hers, as well. She's safe with Officer Sanders—he actually came up with a pretty genius safe house down by the docks.\"\n\n\"I shouldn't know any more, for now,\" you cut in. \"In case I fall into the wrong hands somehow.\"\n\n\"I wasn't going to tell you any more than that,\" Jenny shoots back. \"I'm sorry, do we have a problem here? Is there something you find offensive about me keeping you safe, checking on your grandmother, and risking my entire life to save your behind, once again?\"\n\n*choice\n\t#\"No. Thank you, Master Jenny.\"\n\t\t*set rlshp_jenny %-15\n\t\t\"What's that supposed to mean?\"\n\n\t\t\"Your version of help can sometimes be pretty controlling,\" you say. \"And I am done being controlled. By anyone.\"\n\n\t\tJenny stares at you, her mouth half-open. But she doesn't quip back, for once.\n\t\t*goto wellfillin\n\t#\"I'm sorry, Jenny. I'm just exhausted.\"\n\t\t*set rlshp_jenny %+15\n\t\t\"I haven't slept either,\" Jenny sighs. \"Sorry for snapping. All of this is so…\"\n\n\t\t\"Insane?\" you finish. \n\n\t\tJenny just nods.\n\t\t*goto wellfillin\n\t#\"No. I'm just not as helpless as you make me out to be, sometimes.\"\n\t\t*set rlshp_jenny %+5\n\t\t\"I know,\" Jenny sighs. \"I'm sorry. All of this is so…\"\n\n\t\t\"Insane?\" you finish. \n\n\t\tJenny just nods.\n\t\t*goto wellfillin\n\n*label wellfillin\n\n\"Well, Grandma ${familyname} filled me in on the whole Prodigal story,\" Jenny says, moving on. \"But I have a feeling you need to update me on some things.\"\n\n*page_break FIVE MINUTES LATER\n\nAfter you explain everything you've learned over the past day to Jenny, she stares at the floor, trying to process it all.\n\n\"Slugger. I guess there's really only one question to ask now,\" Jenny says, looking back up at you. \"Do you think you can trust Prodigal?\"\n\n\"I know she's telling the truth,\" you say immediately, thinking back to your vivid mindtour. Then again, this is Prodigal you're dealing with, so you add: \"Or at least I'm as sure as I can be.\"\n\n\"Then that'll have to be good enough for now,\" Jenny says.\n*if selloutjenny\n\t\"Trust me when I say that I didn't want to come to your rescue this time. But this is bigger than whatever issues you and I might have at the moment. However I may feel about you, I cannot let Grandma ${familyname} down. So I'm here for her, because she asked me to be.\"\n\n\tYou stare at Jenny,\n\t*goto emotionbubbletwo\n*elseif askjennyfind\n\t\"I'm here because you asked me to be.\"\n\t*goto emotionbubble\t\n*elseif (askjennygrandma) or (askjennystayaway)\n\t\"I know what you asked me to do, but Grandma ${familyname} and I agreed that I had to be here, fighting by your side.\"\n\t*goto emotionbubble\t\n*else\n\t\"Listen, there was no way to corroborate Prodigal's claims on my end. The only way was to be here, fighting by your side. Grandma ${familyname} and I both decided that was the only thing for me to do.\"\n\t*goto emotionbubble\n\n*label emotionbubble\n\nJenny then pauses to pinch the skin on her elbow and you tense, knowing something uncomfortable is probably coming.\n\n${firstname},\" Jenny starts, \"how are you doing? I mean, are you okay?\"\n\nYou look back at Jenny, realizing no one has stopped to ask you that since all this madness began. Though you know the answer is simple:\n\n\"It doesn't matter,\" you say. \"I have to be okay.\"\n\nJenny nods and you stare at her,\n*label emotionbubbletwo\nemotion swelling in your chest. You've been through so much together.\n\nSo you decide, right here and now, that it's time you cemented your relationship.\n\n*if selloutjenny\n\t*choice\n\t\t*if (jennyfeelings) #\"I don't know what else to do except beg for your forgiveness for being so wrong during The Hero Project. I just want to make things right. Because I've always loved you, Jenny.\"\n\t\t\t*set jennytruefriend true\n\t\t\t*set rlshp_jenny %+30\n\n\t\t\tJenny takes a moment to absorb what you just said. When she does speak, you can tell she is doing so with great care.\n\n\t\t\t\"I forgive you, ${firstname}. And for better or worse, we will always be friends,\" Jenny starts. \"But after all we've been through, I don't think we're meant to be anything more than that.\"\n\n\t\t\tYou blink at Jenny, not sure what to say. You suppose you'll have to accept that friends is better than nothing at all. In the long run, Jenny is probably right.\n\n\t\t\t*if luckyfeelings\n\t\t\t\tAfter all, Lucky still lies in a coma and will expect you to be by ${luckyhis} side when ${luckyze} wakes up. \n\n\t\t\t\tOr rather, if {luckyze} wakes up.\n\t\t\t\t*goto saidyourpeace\n\t\t\t*elseif bm_reconcile\n\t\t\t\tAfter all, Black Magic still lies in a coma and will expect you to be by ${bmhis} side when ${bmze} wakes up. \n\n\t\t\t\tOr rather, if ${bmze} wakes up.\n\t\t\t\t*goto saidyourpeace\n\t\t\t*else\n\t\t\t\tYou hope.\n\t\t\t\t*goto saidyourpeace\n\t\t#\"I don't know what else to do except beg for your forgiveness for being so wrong during The Hero Project. I just want to make things right. Because you'll always be my best friend, Jenny.\"\n\t\t\t*set jennytruefriend true\n\t\t\t*set rlshp_jenny %+30\n\n\t\t\tJenny takes a moment to absorb what you just said. When she does speak, you can tell she is doing so with great care.\n\n\t\t\t\"I forgive you, ${firstname}. For better or worse, we will always be friends,\" Jenny says. \"Now can we stop it with all this sentimental mushiness?\"\n\n\t\t\tYou smile at Jenny and nod, because you wouldn't want her any other way.\n\t\t\t*goto saidyourpeace\n\t\t#\"I don't know what to say, except that I thought I was doing what was right during The Hero Project. I won't ask for your forgiveness because I don't believe I did anything wrong, but I will ask that you find a way to be my best friend, still.\"\n\t\t\t*set jennyjustally true\n\t\t\t*set rlshp_jenny %+10\n\n\t\t\t*label allynotfriendsad\n\t\t\tJenny takes a moment to absorb what you just said. When she does speak, you can tell she is doing so with great care.\n\n\t\t\t\"I can accept you as an ally, ${firstname},\" Jenny starts, \"but not as a friend, not after all that has happened. Especially if you're not taking any responsibility for what you've done.\"\n\n\t\t\tYou blink at Jenny, not sure what to say. You suppose you'll have to accept that allies is better than nothing at all, because it seems neither of you is willing to budge.\n\n\t\t\tAs sad as that may be, it's the reality you're going to have to face. \n\t\t\t*goto saidyourpeace\n\t\t#\"After all of it, I think maybe we're meant to be just allies, moving forward. A friendship might prove too…difficult, for us both.\"\n\t\t\t*set jennyjustally true\n\t\t\t*set rlshp_jenny %-10\n\n\t\t\tJenny takes a moment to absorb what you just said. When she does speak, you can tell she is doing so with great care.\n\n\t\t\t\"I think that's for the best,\" she says.\n\n\t\t\tAs a silence ensues, all you really hear is the sound of a lifelong friendship ending.\n\t\t\t*goto saidyourpeace\n\t\t#\"Jenny, it's time for you to stop controlling me. And if that means you have to stop helping me, so be it.\"\n\t\t\t*set jennyjustally true\n\t\t\t*set rlshp_jenny %-30\n\t\t\t*goto allynotfriendsad\n*else\n\t*label thejennychoicerepeat\n\t*choice\n\t\t*if (jennyfeelings) \n\t\t\t*hide_reuse #Ask Jenny to be my girlfriend. Finally.\n\t\t\t\t*if luckyfeelings\n\t\t\t\t\tEven if it means breaking up with Lucky, should ${luckyze} ever wake up from ${luckyhis} coma?\n\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Yes, I'm meant to be with Jenny.\n\t\t\t\t\t\t\tYou'll just have to let Lucky down easy, if it ever comes to it.\n\n\t\t\t\t\t\t\t\"Jenny, you're the only one I want to be with,\" you say. \"Lucky is great, but no one compares to you.\"\n\t\t\t\t\t\t\t*goto jennygfscene\n\t\t\t\t\t\t#No, I wasn't thinking. I really belong with Lucky. \n\t\t\t\t\t\t\tSo before you speak, you decide to instead say:\n\t\t\t\t\t\t\t*goto thejennychoicerepeat\n\t\t\t\t*elseif bm_reconcile\n\t\t\t\t\tEven if it means breaking up with Black Magic, should ${bmze} ever wake up from ${bmhis} coma?\n\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Yes, I'm meant to be with Jenny.\n\t\t\t\t\t\t\tYou'll just have to let Black Magic down easy, if it ever comes to it.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Jenny, you're the only one I want to be with,\" you say. \"Black Magic is great, but no one compares to you.\"\n\t\t\t\t\t\t\t*goto jennygfscene\n\t\t\t\t\t\t#No, I wasn't thinking. I really belong with Black Magic. \n\t\t\t\t\t\t\tSo before you speak, you decide to instead say:\n\t\t\t\t\t\t\t*goto thejennychoicerepeat\n\t\t\t\t*else\n\t\t\t\t\t\"Jenny, you're the only one I want to be with,\" you say. \"No one compares to you and no one ever will. I'm done waiting, not when tomorrow is so uncertain.\"\n\n\t\t\t\t\t*label jennygfscene\n\t\t\t\t\t*achieve jennygf\n\t\t\t\t\t*set jennygirlfriend true\n\t\t\t\t\t*set rlshp_jenny %+30\n\n\t\t\t\t\tJenny doesn't say anything.\n\n\t\t\t\t\tInstead, she grabs your face and kisses you.\n\n\t\t\t\t\tAnd it's a kiss you've been waiting for your entire life.\n\n\t\t\t\t\t*page_break\n\n\t\t\t\t\tYou're not sure how long the kiss lasts, but when Jenny finally does pull away, all you know is that you never want her to stop. Ever.\n\n\t\t\t\t\t\"I guess you've gone and gotten yourself a girlfriend, hotshot,\" Jenny says, actually blushing. You don't think you've ever seen her cheeks turn red like this.\n\n\t\t\t\t\tThough you do hope you get to see it every day, for the rest of your life.\n\t\t\t\t\t*goto saidyourpeace\n\t\t#\"I want to thank you for always standing by me. You're truly my best friend, in every way.\"\n\t\t\t*set jennytruefriend true\n\t\t\t*set rlshp_jenny %+30\n\n\t\t\t\"Well, duh,\" Jenny says, knocking you on the shoulder. \"Now can we stop it with all this sentimental mushiness?\"\n\n\t\t\tYou smile at Jenny and nod, because you wouldn't want her any other way.\n\n\t\t\t*label testgoodbyefeelings\n\t\t\t*if jennyfeelings\n\t\t\t\tThe kiss you and Jenny shared all that time ago was nice, but it was an isolated incident. One that feels like it was from another lifetime. \n\n\t\t\t\tSo you'll leave it in the past, where it belongs. \n\t\t\t\t*goto saidyourpeace\n\t\t\t*else\n\t\t\t\t*goto saidyourpeace\n\t\t#\"I appreciate all you've done for me, Jenny, but I need to go the rest of the way alone.\"\n\t\t\t*set jennytruefriend true\n\t\t\t*set rlshp_jenny %-10\n\t\t\t*goto saidyourpeace\n\t\t#\"Jenny, it's time for you to stop controlling me. If that means you have to stop helping me, then so be it.\"\n\t\t\t*set jennyjustally true\n\t\t\t*set rlshp_jenny %-30\n\n\t\t\tJenny takes a moment to absorb what you just said. When she does speak, you can tell she is doing so with great care.\n\n\t\t\t\"I can accept you as an ally, ${firstname},\" Jenny starts, \"but not as a friend, not if that's how you feel about everything I've done for you.\"\n\n\t\t\tYou blink at Jenny, not sure what to say. You suppose you'll have to accept that allies is better than nothing at all, because it seems neither of you is willing to budge.\n\n\t\t\tAs sad as that may be, it's the reality you're going to have to face. \n\t\t\t*goto saidyourpeace\n\n*label saidyourpeace\n*page_break\n\n\"You've said your piece,\" Jenny starts, \"but now you have to know this: I'm coming with you to find Miss Artillery.\"\n\n\"Jenny—\"\n\n\"No,\" Jenny interrupts. \"That is my choice to make, not yours. I have the right to see Victon taken down and it's my job to see justice served for your parents. Civil disobedience demands that when the law is unjust, it’s my duty as an American to stand against it. Besides, I helped start this war. Now I'm going to help end it.\"\n\nYou have many thoughts on this, but all you can really do is nod. Because no matter how you cut it, Jenny can be pretty formidable. \n\n*if jennygirlfriend\n\t*label foryou\n\t*page_break\n\t\"I guess I'm doing it for you, too,\" Jenny practically whispers—compliments aren't exactly her strong suit.\n\t*goto jennyfinishesbesides\n*elseif jennytruefriend\n\t*goto foryou\n*else\n\n\t*goto jennyfinishesbesides\n\n*label jennyfinishesbesides\n\"Not to mention that someone has to keep an eye on that crazy woman you've teamed up with. Just so you know, she's going to jail the moment this is all finished.\"\n\nYou can understand why Jenny feels this way, since Prodigal kidnapped and tried to kill her as well. Actually, the list of people Prodigal has kidnapped and tried to kill is pretty long, come to think of it….\n\n*page_break\n\nHearing Jenny say this reminds you of the decision you made about Prodigal before you left her creepy Fringe lair. You figure it's time to fill Jenny in, since you're calling the shots now.\n\n\"I already know how I'm going to handle Prodigal,\" you say.\n*if prodigalallythree \n\t*label acceptasally\n\t\"I'm going to fully accept Prodigal as an ally.\" \n\n\tJenny looks at you like you've lost your mind. Which, perhaps, you have. Still, you've made up your mind about this and Jenny has to start accepting some of your decisions, whether she likes it or not.\n\n\t\"You don't have to worry too much, Ms. Yu,\" Prodigal says, suddenly entering the room. \n\t*goto prodigalhasarrived\n*elseif prodigalmistrustthree \n\t\"I'm going to work with Prodigal, but always make sure to sleep with one eye open. I won't ever make the mistake of trusting her.\"\n\n\tJenny nods, agreeing with your decision. Luckily it will be much easier to keep watch over Prodigal with Jenny around.\n\n\t\"Oh, you don't have to worry too much, chickens,\" Prodigal says, suddenly entering the room. \n\t*goto prodigalhasarrived\n*elseif prodigalditchthree\n\t\"I decided that once I got Miss Artillery's location, I was going to ditch Prodigal.\"\n\n\t\"Well then,\" Jenny says, \"there's no time like the present.\"\n\t\n\t\"I'm afraid I must implore you to not leave me behind,\" Prodigal says, suddenly entering the room. \n\t*goto prodigalhasarrived\n*elseif prodigalturninthree \n\t\"I decided that once I got Miss Artillery's location, I was going to turn Prodigal in to the police.\"\n\n\t\"Well then,\" Jenny says, \"there's no time like the present.\"\n\t\n\t\"I'm afraid I must implore you to not double cross me,\" Prodigal says, suddenly entering the room. \n\t*goto prodigalhasarrived\n*elseif prodigalkillthree\n\t\"I decided that once I got Miss Artillery's location, I was going to kill Prodigal.\"\n\n\t\"Well then,\" Jenny says, \"there's no time like the present.\"\n\n\tYou're surprised to hear that Jenny would be okay with murder, but then again, you're not sure that word exactly applies when it comes to Prodigal.\n\t\n\t\"Oh, you don't have to worry about all that, chickens,\" Prodigal says, suddenly entering the room. \n\t*goto prodigalhasarrived\n*else \n\t*if jennygirlfriend\n\t\tYou're with Jenny now, which means that whatever you felt for Prodigal has to be a fluke. Instead, you're going to accept her as an ally.\n\t\t\n\t\t*goto acceptasally\n\t*else\n\t\t\"I'm going to start letting Prodigal in, because I'm actually developing feelings for her.\"\n\n\t\tJenny looks at you like you've lost your mind. Which, perhaps you have.\n\n\t\t\"Well, as heartscalding that sentiment is, Jenny doesn't have to worry terribly much,\" Prodigal says, suddenly entering the room.\n\t\t*goto prodigalhasarrived\n\n*label prodigalhasarrived\n*page_break\n\nProdigal's shoulder is wrapped in a fresh bandage, which means she must have successfully removed the wingbomb. You wonder how she managed to get out of GG's secure guest house lockdown, but then you remember that it's Prodigal you're dealing with. You doubt a maximum security prison could truly hold her, let alone whatever home system GG has in place.\n\nProdigal settles into one of the fancier chairs and crosses her legs, staring at you and Jenny as she finishes her thought:\n\n\"Because I'll be dead within the span of a month, anyway.\"\n\n*page_break\n\nYou stare at Prodigal, having no idea how to react to this news.\n\n\"I'm afraid I've been keeping one last secret from you,\" Prodigal continues. \"It appears that pushing my Infini Powers so hard and so quickly on the Death Wave did a considerable amount of damage. The herologists I kidnapped couldn't quite figure out which was the chicken or the egg of it all, but their conclusions were the same.\n\n\"Some irredeemable combination of Infini strain and nuclear exposure has given me an aggressive and irreversible form of Infini cancer.\"\n\nProdigal pauses, letting that information sink in before moving on.\n\n\"The experts always warned against overusing Infini Powers before one's body was truly ready, and it would seem they were correct. In fact, I probably should have died months ago—fighting this current war is the only thing keeping my Powers in order. In fact, it's probably the only thing keeping me alive, at this point. \n\n\"I'm afraid this is my last grand stand,\" Prodigal finishes. \"So you don't have to worry about what to do with me. Because once this war is over, so am I.\"\n\n*page_break\n\nYou listen to Prodigal and your mind immediately flashes to the trouble she's been having with her Powers, how pale and exhausted she has seemed, and it feels like a final puzzle piece is falling into place. You suppose this could be another elaborate Prodigal lie to save her skin once again, but you've seen her symptoms firsthand, sensed all along that something was wrong with Prodigal…\n\nSuddenly it becomes clear why Prodigal went to such lengths to recruit you—she probably couldn't pull this mission off on her own, not compromised like this. And if she does happen to go down before she can finish this little crusade, you're pretty much the only other person on the planet with even more incentive to find Miss Artillery and take down President Victon.\n\nIt appears that Prodigal is right about at least one thing—you do seem to be connected in some unavoidable way, destined to intersect from the sins of your parents.\n\n\"I just want to see my mother before it's too late,\" Prodigal offers, actual tears forming in her empty eyes. \"I have some questions I need answered before I die.\"\n\nYou turn to Jenny and find her visibly unmoved by Prodigal's revelation. It's understandable why there would be no love lost between these two, but how do you feel about Prodigal's impending death?\n\n*choice\n\t#It strikes a particularly personal chord, given the warnings and struggles I've had with my own Infini Powers. \n\t\t*goto whateverhappens\n\t#Prodigal and I are both strange orphans who want to reunite with our parents before it's too late.\n\t\t*set rlshp_prodigal %+5\n\t\t*goto whateverhappens\n\t#Prodigal brought this on herself—and after all she has done, this is what she deserves.\n\t\t*set rlshp_prodigal %-5\n\t\t*goto whateverhappens\n\t#All I care about is how Prodigal's sickness might affect my mission to find Miss Artillery.\n\t\t*set rlshp_prodigal %-5\n\t\t*goto whateverhappens\n\t*if ((prodigalallythree) or (prodromancewant)) #Surprisingly upset. It may be crazy after all she has put me through, but I don't want Prodigal to die.\n\t\t*set rlshp_prodigal %+5\n\t\t*goto whateverhappens\n\n*label whateverhappens\n\n\"Whatever happens, you still have a better chance of finding Miss Artillery with me than without me,\" Prodigal says, seeing Jenny's hesitation. \"Even at my weakest, my Powers will be invaluable navigating the Blessed Vessel and locating mother darling's whereabouts within.\"\n\n\"Unfortunately, Lady Batshit here has a point,\" Jenny says. \"Besides, she'd probably find a way to follow us anyway, cockroach that she is.\"\n\n\"Oh Jenny, don't you know that I'm rubber and you're glue?\" Prodigal sings. \"Whatever you say bounces off me and explodes onto you.\"\n\n\"Rubber roaches aside,\" you interrupt, \"Prodigal is coming with us.\"\n\n*label theprodigalchoicerepeat\n*choice\n\t#\"As bizarre as it may seem, Prodigal is one of us now. And we always look after our own.\"\n\t\t*set rlshp_prodigal %+40\n\t\t*set soloist %-20\n\t\t*set revenge %-10\n\t\t*set prodigalfinalally true\n\n\t\t*label prodigaltouched\n\t\t\"I…\" Prodigal starts, searching for the right words. \"I'm touched. Truly touched. And not in the 'want some candy from my van' kind of way.\"\n\n\t\tYou nod at Prodigal, figuring that's as close to sentimental as she might ever get.\n\t\t*goto twosluggers\n\t#\"Despite what Prodigal has done, she deserves to fight this last battle.\"\n\t\t*set rlshp_prodigal %+30\n\t\t*set soloist %-10\n\t\t*set revenge %-10\n\t\t*set prodigalfinalally true\n\n\t\t*goto prodigaltouched\n\t#\"I think we were always meant to fight this battle together.\"\n\t\t*set rlshp_prodigal %+35\n\t\t*set soloist %-25\n\t\t*set revenge %-10\n\t\t*set prodigalfinalally true\n\n\t\t\"I…\" Prodigal starts, searching for the right words. \"I'm touched. And I'm glad you finally see things my way.\"\n\n\t\tYou open your mouth to argue with Prodigal, because you certainly don't think you'll ever see things her way. \n\n\t\tBut for now, it's not worth getting into. You have much bigger concerns.\n\t\t*goto twosluggers\n\t#\"We will find Miss Artillery faster with Prodigal's Powers and knowledge at our disposal, impaired or not.\"\n\t\t*set rlshp_prodigal %+10\n\t\t*set soloist %-10\n\t\t*set revenge %-10\n\t\t*set prodigalfinalally true\n\n\t\t\"I love to say it, so…\" Prodigal starts. \"Told ya so!\"\n\n\t\tYou open your mouth to argue with Prodigal, but you bite your tongue. For now, it's not worth getting into. \n\n\t\tYou have much bigger concerns to address.\n\t\t*goto twosluggers\n\t#\"Prodigal just became an even more expendable soldier in this war.\"\n\t\t*set rlshp_prodigal %-30\n\t\t*set soloist %+20\n\t\t*set revenge %+10\n\t\t*set prodigalfinalenemy true\n\t\t\n\t\tProdigal doesn't say anything, she just sets her glare on you and crosses her arms.\n\n\t\t[i]Whatever[/i], you think. You don't have any time to placate Prodigal. You just need to get through this alive—and if that means Prodigal doesn't, that's fine.\n\n\t\tIt's just one less thing you'll have to worry about later.\n\t\t*goto twosluggers\n\t#\"I'd rather keep an eye on Prodigal. To be clear, I will never trust you.\"\n\t\t*set rlshp_prodigal %-40\n\t\t*set soloist %+10\n\t\t*set revenge %+10\n\t\t*set prodigalfinalenemy true\n\n\t\t\"Who gives a flying slugger,\" Prodigal says. \"As long as you don't get in my way, I'm fit as a fiddle.\"\n\n\t\tYou open your mouth to argue with Prodigal, but you bite your tongue. For now, it's not worth getting into. \n\n\t\tYou have much bigger concerns to address.\n\t\t*goto twosluggers\n\t*if ((prodromancewant) and (jennygirlfriend = false)) \n\t\t*hide_reuse #\"…Because Prodigal and I are meant to be together.\"\n\t\t\t*if luckyfeelings\n\t\t\t\tEven if it means breaking up with Lucky, should ${luckyze} ever wake up from ${luckyhis} coma?\n\n\t\t\t\t*choice\n\t\t\t\t\t#Yes, I'm meant to be with Prodigal.\n\t\t\t\t\t\tYou'll just have to let Lucky down easy, if it ever comes to it.\n\n\t\t\t\t\t\t*goto prodkiss\n\t\t\t\t\t#No, I wasn't thinking. I really belong with Lucky. \n\t\t\t\t\t\tSo before you speak, you decide to instead say:\n\t\t\t\t\t\t*goto theprodigalchoicerepeat\n\t\t\t*elseif bm_reconcile\n\t\t\t\tEven if it means breaking up with Black Magic, should ${bmze} ever wake up from ${bmhis} coma?\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#Yes, I'm meant to be with Prodigal.\n\t\t\t\t\t\tYou'll just have to let Black Magic down easy, if it ever comes to it.\n\n\t\t\t\t\t\t*goto prodkiss\n\t\t\t\t\t#No, I wasn't thinking. I really belong with Black Magic. \n\t\t\t\t\t\tSo before you speak, you decide to instead say:\n\t\t\t\t\t\t*goto theprodigalchoicerepeat\n\t\t\t*else\n\t\t\t\t*label prodkiss\n\t\t\t\t*set rlshp_prodigal %+50\n\t\t\t\t*set soloist %-20\n\t\t\t\t*set revenge %-10\n\t\t\t\t*set prodigalgirlfriend true\n\t\t\t\t*achieve prodigalgf\n\n\t\t\t\tWithout missing a beat, Prodigal walks up to you and pulls you into a kiss—one of the wildest you've ever experienced.\n\n\t\t\t\tYou're pretty sure you can hear Jenny gagging in the background, but you don't care. If Prodigal really is going to die sooner than later, you have to enjoy the time you have together, no matter what. It may be too crazy and too fast to fall for Prodigal like this, but everything about your life has become crazy and fast, so you're not going to fight your instincts.\n\n\t\t\t\t\"Chickens united, at last,\" Prodigal says, slipping her hand around your waist. \"Eat your heart out, Jenny Yu.\"\n\n\t\t\t\t\"Words fail me,\" Jenny says, unable to look directly at you.\n\n\t\t\t\tYou just shrug, because if Prodigal is really going to be your girlfriend, you figure you had better get used to handling disapproval. \n\n\t\t\t\t*page_break\n\n\t\t\t\t\"${firstname}, can I talk to you for a second?\" Jenny finally says. \"Alone?\"\n\n\t\t\t\t\"Anything you have to say to me you can say in front of Prodigal,\" you respond. \"There's no mind control here, no manipulation or foul play. Prodigal may be crazy, but she's the only one who understands what I've been through. So it turns out, she's just my kind of crazy.\"\n\n\t\t\t\tHearing this, Jenny scowls and crosses her arms. \"It sounds like you've already made up your mind. I just hope you've thought this through.\"\n\n\t\t\t\tYou turn to Prodigal and she beams at you with that wild smile, the curves of her body fitting perfectly against her kevlar bodysuit. Seeing her standing there, all you can think is:\n\n\t\t\t\t[i]Who cares if I didn't think this through[/i]?\n\n\t\t\t\t[i]It just feels right[/i].\n\t\t\t\t*goto twosluggers\n\n*label twosluggers\n*page_break\n\n\"Glad that's settled,\" you say. \"Now that makes two stubborn sluggers insisting they come with me. So let's skip the banter portion of the program and figure out how we're getting across the country to Washington DC.\"\n\n\"Oh darling, what makes you think we're not letting you come with us?\" Prodigal coos.\n\n\"Imply that we're a pair again and I will lacerate you both,\" Jenny fumes. \"I've already got an idea about how to get there, but I'm rethinking its safety after loony's little speech.\"\n\n\"Haven't we already established that safety isn't a primary concern for me, mother hen?\" Prodigal chides.\n\n\"As if I give two squats about your safety,\" Jenny sighs. \"I meant ours. The fastest way to DC is obviously to teleport, but the potential radiation damage on that kind of distance could be—\"\n\n\"We're doing it,\" you say. \n\nJenny is about to argue, but you point at your MeChip. \"We don't have the time for anything else. So it's a risk we're going to have to take.\"\n\n\"Agreed,\" Prodigal says. \"Besides, I'm already radiationally challenged, so what's a few more nukes to add to the pile?\"\n\n*page_break\n\n\"Then it's settled,\" you say. \"Now, where do we find a teleporter with that kind of long-distance capacity?\"\n\n\"I believe I can help with that,\" GG says, rolling back into the room with a golden tray of ambrosia in his lap.\n\n\"You gallivanting greyhound!\" Prodigal shouts. \"Tell me you have a teleporter stashed somewhere in this marvelous mansion!\"\n\n\"No, all I seem to have is a broken guest house security system,\" GG sighs, placing the tray next to the tea. \"But I do know there's only one facility with a teleporter powerful enough to make that kind of trip in all of Millennia City.\"\n\nAs GG says this, an uncharacteristically serious look passes over his face. And a stone of dread drops into your stomach.\n\n\"Please do not tell me it's in The Hero Project compound,\" you cringe, thinking that would place it right under the nose of The American Protectorate.\n\n*page_break\n\n\"Good heavens, no!\" GG laughs. \"The Hero Project couldn't have acquired something that illegal, what with all of our government contracts. But our transport department did some research into existing MC teleporters, just in case we had to make an emergency exception for an InfraOrder mission. It turned out that the only functioning teleporter was in the one place The Hero Project was most certainly not welcome.\"\n\nHearing this, a look of recognition passes over Jenny and Prodigal's faces. Then one of awkward tension as they turn to you.\n\n\"What?\" you ask. \"Where is it?\"\n\n*page_break\n\n\"The Millennial Tower,\" GG says cautiously. \"The headquarters of The Millennial Group.\"\n\nSuddenly you understand everyone's caution. Not just because of your history with The Millennial Group and with their former leader—and your former idol—Rebellion, but because \n*if luckyeleventh\n\tthat's where you met Black Magic, who still lies in a coma. The Millennial Group is also the team that extended an invitation to Lucky after ${luckyze} was voted out of The Hero Project.\n\t*goto decommed\n*else\n\tthat's where you met Black Magic, who hasn't been seen since ${bmhis} shameful exit from The Hero Project.\n\n\tNot to mention The Millennial Group is also the team that extended an invitation to Lucky, should ${luckyze} ever wake up from ${luckyhis} coma.\n\t*goto decommed\n\n*label decommed\n\n\"The teleporter is supposed to be decommissioned,\" GG continues, seeing that you need a moment to process. \"But we learned that the California government keeps it secretly operational for emergency situations.\"\n\nSnapping out of it, you push aside the swirling emotions in your chest and stand up.\n\n\"Then I guess we're paying a visit to The Millennial Tower.\"\n\n*page_break HOURS LATER\n*set power 100\n*set health 100\n\nYou wake up, having showered and slept as much as you could manage. You all decided to take today for some much-needed rest and recovery, agreeing that you'd meet to go to The Millennial Tower late tonight, under the cover of darkness.\n\nWith one more hour until your departure time, you decide to explore the Gay Gardens grounds in an attempt to clear your head.\n\nYou end up:\n\n*choice\n\t#Dipping in the infinity pool.\n\t\tWhich proves to be as relaxing as it is energizing.\n\t\t*goto reportercall\n\t#Roaming the gardens.\n\t\tWhich proves to be as relaxing as it is energizing.\n\t\t*goto reportercall\n\t*if (jennygirlfriend) #In Jenny's room.\n\t\tWith all that you're facing, who knows if or when you'll get another chance to be with Jenny.\n\n\t\tAll you do know is that when you enter Jenny's room, she's waiting for you under a layer of white silk sheets.\n\n\t\tAnd nothing else.\n\n\t\t\"What took you so long, hotshot?\" Jenny says, smirking. \"I had almost given up on you.\"\n\n\t\t\"You should know me better than that by now,\" you say, walking towards the bed.\n\n\t\t\"Not so fast,\" Jenny says, stopping you. \"This bed has a strict no clothes policy.\"\n\n\t\tYou pause, considering your options. Until you realize there's only one thing you want to do. \n\n\t\t*page_break\n\n\t\tStaring at Jenny, you begin to peel off your costume, inch by inch. Having her watch you like this feels so surreal…but also insanely hot.\n\n\t\tOnce you're naked, Jenny looks you over, her eyes practically burning.\n\n\t\t\"Get over here,\" she says before kicking the sheets back to reveal her own naked body.\n\n\t\tHoly. Slugger.\n\n\t\t*page_break \n\n\t\tWhen you finally are in bed, your bare skin pressed against Jenny's, you realize that you're both shaking. You've waited so long for this…\n\n\t\t\"Hey, ${firstname},\" Jenny whispers in your ear. \"Let's make it count, huh?\"\n\n\t\tJenny then holds you closer and kisses you and you start shaking for an entirely different reason.\n\n\t\t*page_break LATER\n\n\t\tYou lie beside Jenny, feeling completely content. You don't know how long you've been like this, but you could stay here forever.\n\n\t\tToo bad you don't have forever.\n\n\t\t\"${firstname},\" Jenny says, propping herself up on her elbows next to you. \"I know I asked you this already, but I need to do it again. Are you okay?\"\n\n\t\tYou look over at Jenny and try to think of the most honest answer you can.\n\n\t\t*choice\n\t\t\t#\"With you here, I am.\"\n\t\t\t\t\"In that case,\" Jenny says, crawling on top of you. \"I think we can spare five more minutes.\"\n\t\t\t\t\n\t\t\t\tAs Jenny disappears back under the sheets, you're rather inclined to agree.\n\t\t\t\t*goto reportercall\n\t\t\t#\"No. But we're going to make things okay.\"\n\t\t\t\t\"Yes we are,\" Jenny says,\n\t\t\t\t*label crawlingbackjenn\n\t\t\t\tcrawling on top of you. \"So I think we can spare five more minutes.\"\n\t\t\t\t\n\t\t\t\tAs Jenny disappears back under the sheets, you're rather inclined to agree.\n\t\t\t\t*goto reportercall\n\t\t\t#\"Honestly, I'm…terrified.\"\n\t\t\t\t\"We're going to save your parents and take Victon down,\" Jenny says,\n\t\t\t\t*goto crawlingbackjenn\n\t*if (prodigalgirlfriend) #In Prodigal's room.\n\t\tWith all that you're facing, who knows if or when you'll get another chance to be with Prodigal.\n\n\t\tAll you do know is that when you enter Prodigal's room, she waits for you in a set of red and black lingerie, a tasseled whip in her hand.\n\n\t\t\"I don't think you're ready for this jelly,\" Prodigal says, slapping the whip across the floor.\n\n\t\t\"Trust me,\" you say, pushing Prodigal onto the bed and grabbing the whip. \"You're the one not ready.\"\n\n\t\t*page_break\n\n\t\tProdigal moans loudly and rolls you across the bed, her fingernails digging into your back. As you kiss wildly, you continue to play-fight—at least you think it's play fighting.\n\n\t\tAs Prodigal literally tears open your clothes, you wonder if you'll ever know the difference, with her.\n\n\t\t*page_break LATER\n\n\t\tYou lie beside Prodigal, feeling completely spent. You don't know how long you've been like this, but you could stay here forever.\n\n\t\tToo bad you don't have forever.\n\n\t\t\"${firstname},\" Prodigal says, propping herself up on her elbows next to you. \n\n\t\tYou turn to look at Prodigal and are surprised to find that she actually looks…vulnerable.\n\n\t\t\"Do you think I'll get to see my mom again before I die?\" she asks.\n\n\t\tYou look over at Prodigal and try to think of the most honest answer you can.\n\n\t\t*choice\n\t\t\t#\"I have to believe you will. Not just for you, but for me too.\"\n\t\t\t\t*label crawlingbackproddy\n\t\t\t\t\"In that case,\" Prodigal says, that mad smile returning to her face, \"I think we can spare five more minutes.\"\n\t\t\t\t\n\t\t\t\tAs Prodigal climbs back on top of you, you're rather inclined to agree.\n\t\t\t\t*goto reportercall\n\t\t\t#\"I don't know, but I'll be there for you no matter what.\"\n\t\t\t\t*goto crawlingbackproddy\n\t\t\t#\"I think we should just enjoy the moment while we can.\"\n\t\t\t\t*goto crawlingbackjenn\n\t#Exploring the hedge maze, where GG told me a Power bonus might be hidden.\n\t\tWhen you walk up to the hedge maze entrance, there are massive doors that require you to present a Badge.\n\n\t\t*if moralbonus\n\t\t\tSo you pull out your Morality Badge and the doors open.\n\t\t\t*goto hedgebonus\n\t\t*elseif badassbonus\n\t\t\tSo you pull out your Badass Badge and the doors open.\n\t\t\t*goto hedgebonus\n\t\t*elseif (strathero) and (((selloutjenny = false) and (allowdampen = false)) and (keepjob = false))\n\t\t\tSo you pull out your Hero Badge and the doors open.\n\t\t\t*goto hedgebonus\n\t\t*elseif (selloutjenny) and ((stratloyal) and (officialpopular))\n\t\t\tSo you pull out your Popular Loyal Ally Badge and the doors open.\n\t\t\t*goto hedgebonus\n\t\t*elseif (selloutjenny = false) and ((stratloyal) and (officialunderdog))\n\t\t\tSo you pull out your Underdog Loyal Ally Badge and the doors open.\n\t\t\t*goto hedgebonus\n\t\t*elseif (stratfloater) and (stayfloater)\n\t\t\tSo you pull out your Floater Badge and the doors open.\n\t\t\t*goto hedgebonus\n\t\t*elseif (stratruthless) and (selloutjenny)\n\t\t\tSo you pull out your Ruthless Strategist Badge and the doors opened.\n\t\t\t*goto hedgebonus\n\t\t*elseif (stratvillain) and ((generalhated) and (selloutjenny))\n\t\t\tSo you pull out your Villain Badge and the doors open.\n\t\t\t*goto hedgebonus\n\t\t*elseif elimfive\n\t\t\tSo you pull out your Elimination Badge and the doors open.\n\t\t\t*goto hedgebonus\n\t\t*else\n\t\t\tHowever, you haven't earned a Badge from your heroic exploits as The Prodigy or in The Hero Project, so you turn away.\n\t\t\t*goto reportercall\n\n*label hedgebonus\n*page_break\n*achieve hedgemaze\n\nYou enter the maze, dragging your hand along its leaf-lined walls. As you come up to the first intersection, you notice four identical holo-emblems hovering in the middle: two ornate, intersecting G's, presumably in the same the shape of the maze.\n\n*image mazeemblem.jpg\n\nYou study the GG holo-emblem, which is labeled labeled [i]Number One[/i]. You figure that you must want to get to the center from your entry position where the top left G-hook hangs down. You decide to map your route now, before potentially getting lost inside.\n\n*if chip_diva\n\t\"I'm posting up a message from some Maze Maiden,\" MeChip ${chipname} suddenly says. \"Girl is saying that you want to keep track of any changing holo-emblems along your way, whatever that means.\"\n\n\t\"Thanks, ${chipname},\" you say as you walk forward.\n\t*page_break\n\t*goto isone\n*else\n\t\"I'm getting a message from the Maze Maiden,\" MeChip ${chipname} suddenly says. \"She's telling me that you'll want to keep track of any changing holo-emblems along the way, whatever that means.\"\n\n\t\"Thanks, ${chipname},\" you say as you walk forward.\n\t*page_break\n\t*goto isone\n\n*label isone\n\nYou then decide which way you want to go at the intersection:\n\n*choice\n\t#Right.\n\t\t*goto istwo\n\t#Straight.\n\t\t*goto iseight\n\t#Left.\n\t\t*goto rightexit\n\n*label istwo\n\nYou come to another intersection, this one with a holo-emblem that turns into a Turkey, labeled [i]Number Two[/i].\n\nAfter reviewing this holo-emblem, you decide to go:\n\n*choice\n\t#Right.\n\t\t*goto isthree\n\t#Straight.\n\t\t*goto isten\n\t#Left.\n\t\t*goto prizeone\n\n*label isthree\n\nYou come to another intersection, this one with a holo-emblem that turns into a Football, labeled [i]Number Three[/i].\n\nAfter reviewing this holo-emblem, you decide to go:\n\n*choice\n\t#Right.\n\t\t*goto isfour\n\t#Straight.\n\t\t*goto iseleven\n\t#Left.\n\t\t*goto istwelve\n\n*label isfour\n\nYou come to another intersection, this one with a holo-emblem that turns into a Mach Fighter Jet, labeled [i]Number Four[/i].\n\nAfter reviewing this holo-emblem, you decide to go:\n\n*choice\n\t#Right.\n\t\t*goto isthirteen\n\t#Straight.\n\t\t*goto prizetwo\n\t#Left.\n\t\t*goto isfive\n\n*label isfive\n\nYou come to another intersection, this one with a holo-emblem that turns into a Wand, labeled [i]Number Five[/i].\n\nAfter reviewing this holo-emblem, you decide to go:\n\n*choice\n\t#Right.\n\t\t*goto istwelve\n\t#Straight.\n\t\t*goto issix\n\t#Left.\n\t\t*goto isfour\n\n*label issix\n\nYou come to another intersection, this one with a holo-emblem that turns into a Bear, labeled [i]Number Six[/i].\n\nAfter reviewing this holo-emblem, you decide to go:\n\n*choice\n\t#Right.\n\t\t*goto isten\n\t#Straight.\n\t\t*goto prizeone\n\t#Left.\n\t\t*goto isseven\n\n*label isseven\n\nYou come to another intersection, this one with a holo-emblem that turns into a Flame, labeled [i]Number Seven[/i].\n\nAfter reviewing this holo-emblem, you decide to go:\n\n*choice\n\t#Right.\n\t\t*goto iseight\n\t#Straight.\n\t\t*goto rightexit\n\t#Left.\n\t\t*goto leftexit\n\n*label iseight\n\nYou come to another intersection, this one with a holo-emblem that turns into a Weight, labeled [i]Number Eight[/i].\n\nAfter reviewing this holo-emblem, you decide to go:\n\n*choice\n\t#Right.\n\t\t*goto prizetwo\n\t#Straight.\n\t\t*goto isfive\n\t#Left.\n\t\t*goto isnine\n\n*label isnine\n\nYou come to another intersection, this one with a holo-emblem that turns into a Justice Scale, labeled [i]Number Nine[/i].\n\nAfter reviewing this holo-emblem, you decide to go:\n\n*choice\n\t#Right.\n\t\t*goto iseleven\n\t#Straight.\n\t\t*goto istwelve\n\t#Left.\n\t\t*goto issix\n\n*label isten\n\nYou come to another intersection, this one with a holo-emblem that turns into a Snowflake, labeled [i]Number Ten[/i].\n\nAfter reviewing this holo-emblem, you decide to go:\n\n*choice\n\t#Right.\n\t\t*goto issix\n\t#Straight.\n\t\t*goto isfour\n\t#Left.\n\t\t*goto iseleven\n\n*label iseleven\n\nYou come to another intersection, this one with a holo-emblem that turns into a Laser Streak, labeled [i]Number Eleven[/i].\n\nAfter reviewing this holo-emblem, you decide to go:\n\n*choice\n\t#Right.\n\t\t*goto isnine\n\t#Straight.\n\t\t*goto isthirteen\n\t#Left.\n\t\t*goto prizetwo\n\n*label istwelve\n\nYou come to another intersection, this one with a holo-emblem that turns into a Gavel, labeled [i]Number Twelve[/i].\n\nAfter reviewing this holo-emblem, you decide to go:\n\n*choice\n\t#Right.\n\t\t*goto prizeone\n\t#Straight.\n\t\t*goto isseven\n\t#Left.\n\t\t*goto isthree\n\n*label isthirteen\n\nYou come to another intersection, this one with a holo-emblem that turns into an Energy Bubble, labeled [i]Number Thirteen[/i].\n\nAfter reviewing this holo-emblem, you decide to go:\n\n*choice\n\t#Right.\n\t\t*goto rightexit\n\t#Straight.\n\t\t*goto leftexit\n\t#Left.\n\t\t*goto istwo\n\n*label isfourteen\n\nYou come to another intersection, this one with a holo-emblem that turns into a Fist, labeled [i]Number Fourteen[/i].\n\nAfter reviewing this holo-emblem, you decide to go:\n\n*choice\n\t#Right.\n\t\t*goto leftexit\n\t#Straight.\n\t\t*goto istwo\n\t#Left.\n\t\t*goto iseight\n\n*label rightexit\n\nYou walk around a bend and find yourself at an exit at the top of the G. Whoops.\n\n*choice\n\t#Turn around and try again.\n\t\t*goto isfourteen\n\t#Stop trying and exit the maze.\n\t\t*goto reportercall\n\n*label leftexit\n\nYou walk around a bend and find yourself at an exit at the top of the G. Whoops.\n\n*choice\n\t#Turn around and try again.\n\t\t*goto isone\n\t#Stop trying and exit the maze.\n\t\t*goto reportercall\n\n*label prizetwo\n\nYou walk up to a set of giant, golden double doors and realize that you've reached the center—and you figure that something really good must be hidden in there.\n\nThen you see another holo-emblem hovering in front of the doors: what looks like a \"do not enter\" symbol. Or viewed another way, a Null Sign.\n*goto thenitdawns\n\n*label prizeone\n\nYou walk up to a set of giant, golden double doors and realize that you've reached the center—and you figure that something really good must be hidden in there.\n\nThen you see another holo-emblem hovering in front of the doors, which looks like your Silvered Ring. \n\n*label thenitdawns\n\nThen it dawns on you—those emblems must represent the heroes involved in The Hero Project. [i]Huh[/i], you think, [i]that GG sure does know how to make an interesting game[/i].\n\nAs you approach the doors, you see that you need to enter a password related to the holo-emblems at each intersection.\n\n*rand mazepasswordnumber 1 14\n*if (mazepasswordnumber = 1)\n\t[i]Please enter the exact capitalization and spelling of Holo-Emblem Number One:[/i]\n\n\t*input_text mazepassword\n\n\t*if (mazepassword = \"GG\")\n\t\t*goto prizebonuswinner\n\t*else\n\t\t*goto trapdoorfail\n*elseif (mazepasswordnumber = 2)\n\t[i]Please enter the exact capitalization and spelling of Holo-Emblem Number Two:[/i]\n\n\t*input_text mazepassword\n\n\t*if (mazepassword = \"Turkey\")\n\t\t*goto prizebonuswinner\n\t*else\n\t\t*goto trapdoorfail\n*elseif (mazepasswordnumber = 3)\n\t[i]Please enter the exact capitalization and spelling of Holo-Emblem Number Three:[/i]\n\n\t*input_text mazepassword\n\n\t*if (mazepassword = \"Football\")\n\t\t*goto prizebonuswinner\n\t*else\n\t\t*goto trapdoorfail\n*elseif (mazepasswordnumber = 4)\n\t[i]Please enter the exact capitalization and spelling of Holo-Emblem Number Four:[/i]\n\n\t*input_text mazepassword\n\n\t*if (mazepassword = \"Mach Fighter Jet\")\n\t\t*goto prizebonuswinner\n\t*else\n\t\t*goto trapdoorfail\n*elseif (mazepasswordnumber = 5)\n\t[i]Please enter the exact capitalization and spelling of Holo-Emblem Number Five:[/i]\n\n\t*input_text mazepassword\n\n\t*if (mazepassword = \"Wand\")\n\t\t*goto prizebonuswinner\n\t*else\n\t\t*goto trapdoorfail\n*elseif (mazepasswordnumber = 6)\n\t[i]Please enter the exact capitalization and spelling of Holo-Emblem Number Six:[/i]\n\n\t*input_text mazepassword\n\n\t*if (mazepassword = \"Bear\")\n\t\t*goto prizebonuswinner\n\t*else\n\t\t*goto trapdoorfail\n*elseif (mazepasswordnumber = 7)\n\t[i]Please enter the exact capitalization and spelling of Holo-Emblem Number Seven:[/i]\n\n\t*input_text mazepassword\n\n\t*if (mazepassword = \"Flame\")\n\t\t*goto prizebonuswinner\n\t*else\n\t\t*goto trapdoorfail\n*elseif (mazepasswordnumber = 8)\n\t[i]Please enter the exact capitalization and spelling of Holo-Emblem Number Eight:[/i]\n\n\t*input_text mazepassword\n\n\t*if (mazepassword = \"Weight\")\n\t\t*goto prizebonuswinner\n\t*else\n\t\t*goto trapdoorfail\n*elseif (mazepasswordnumber = 9)\n\t[i]Please enter the exact capitalization and spelling of Holo-Emblem Number Nine:[/i]\n\n\t*input_text mazepassword\n\n\t*if (mazepassword = \"Justice Scale\")\n\t\t*goto prizebonuswinner\n\t*else\n\t\t*goto trapdoorfail\n*elseif (mazepasswordnumber = 10)\n\t[i]Please enter the exact capitalization and spelling of Holo-Emblem Number Ten:[/i]\n\n\t*input_text mazepassword\n\n\t*if (mazepassword = \"Snowflake\")\n\t\t*goto prizebonuswinner\n\t*else\n\t\t*goto trapdoorfail\n*elseif (mazepasswordnumber = 11)\n\t[i]Please enter the exact capitalization and spelling of Holo-Emblem Number Eleven:[/i]\n\n\t*input_text mazepassword\n\n\t*if (mazepassword = \"Laser Streak\")\n\t\t*goto prizebonuswinner\n\t*else\n\t\t*goto trapdoorfail\n*elseif (mazepasswordnumber = 12)\n\t[i]Please enter the exact capitalization and spelling of Holo-Emblem Number Twelve:[/i]\n\n\t*input_text mazepassword\n\n\t*if (mazepassword = \"Gavel\")\n\t\t*goto prizebonuswinner\n\t*else\n\t\t*goto trapdoorfail\n*elseif (mazepasswordnumber = 13)\n\t[i]Please enter the exact capitalization and spelling of Holo-Emblem Number Thirteen:[/i]\n\n\t*input_text mazepassword\n\n\t*if (mazepassword = \"Energy Bubble\")\n\t\t*goto prizebonuswinner\n\t*else\n\t\t*goto trapdoorfail\n*else\n\t[i]Please enter the exact capitalization and spelling of Holo-Emblem Number Fourteen:[/i]\n\n\t*input_text mazepassword\n\n\t*if (mazepassword = \"Fist\")\n\t\t*goto prizebonuswinner\n\t*else\n\t\t*goto trapdoorfail\n\n*label prizebonuswinner\n*page_break\n\n[i]PASSWORD ACCEPTED[/i].\n\nThe double doors swing open and inside you find a fluid fountain flowing with rose-red liquid, surrounded by a sea of multi-colored roses. Above the fountain floats another holo-emblem of a locket—except you realize that it's not a holo-emblem.\n\nIt's an actual locket.\n\n*page_break\n\nYou pull down the golden locket and it pops open in your hand the moment you do. Pinkish mist floats out of the locket and seeps into your chest, making you feel all warm and fuzzy.\n\n\"Congratulations, ${codename},\" the Maze Maiden says, holo-appearing before you. \"You've unlocked Sir GG's Signature Power Booster Mist, which is worth 4 Power Regain Points. Please enjoy.\" \n\nAs you feel the mist make your Powers stronger, the ground shifts gently beneath you, opening an underground slide that glides you to the maze's exit.\n\n*set powerregain +4\n*goto reportercall\n\n*label trapdoorfail\n\n[i]PASSWORD DENIED[/i].\n\nBefore you can react, the ground beneath you shifts and a trap door opens underneath your feet. You plummet down into a winding underground slide, one that shoots you back to the beginning of the maze within seconds.\n\n\"I will ask you for one of fourteen possible holo-emblem passwords every time you attempt to enter the sacred center,\" the Maze Maiden says, holo-appearing before you. \"Please have the correct password ready next time.\"\n*page_break\n*goto isone\n\n*label reportercall\n*page_break LATER\n\nYou sit on a bluff overlooking the ocean, which you figured was a pleasant and private place to call ${reportername}. It's time you updated her on your encounter with Rexford. \n\n\"We have exactly one minute of secure talk time,\" ${reportername} says once you have her on the MeLine. \"So speak quickly.\"\n\n*if (recordandescape) or (recordandfight)\n\t\"Did you receive—\"\n\n\t\"Received and released,\" ${reportername} cuts in. \"Word of the existence of Rexford's little hit squad has traveled quickly.\n\t*if recordandescape\n\t\tThe footage of you refusing to engage Rexford, but also refusing to submit to him, has boosted you image considerably. In one move we raised your Legend Level, lowered anti-Powered sentiment, and scored Regime Damage Points against President Victon. It looks like you're Revered more than ever, ${codename}.\n\n\t\t\"Best of all, Rexford and his squad have been fully shamed and returned to prison,\" ${reportername} finishes.\n\n\t\t\"Finally, some good news,\" you say.\n\n\t\t\"Oh don't worry, it's not all good,\" ${reportername} responds.\n\t\t\n\t\t*set legend +10\n\t\t*set feared %-30\n\t\t*set antipoweredsent -5\n\t\t*set regimedamage +5\n\t\t*goto reporterirpexpl\n\t*elseif fightrexfordko\n\t\tThe footage of you refusing to submit to Rexford, but also fighting non-lethally has boosted you image considerably. In one move we raised your Legend Level, lowered anti-Powered sentiment, and scored Regime Damage Points against President Victon. It looks like you're Revered more than ever, ${codename}.\n\n\t\t\"Best of all, Rexford and his squad have been fully shamed and returned to prison,\" ${reportername} finishes.\n\n\t\t\"Finally, some good news,\" you say.\n\n\t\t\"Oh don't worry,\" ${reportername} responds. \"It's not all good.\"\n\t\t\n\t\t*set legend +10\n\t\t*set feared %-30\n\t\t*set antipoweredsent -5\n\t\t*set regimedamage +5\n\t\t*goto reporterirpexpl\n\t*elseif fightrexfordcripple\n\t\tThe footage of you refusing to submit to Rexford has been positively received, but the reaction to you crippling him has been more mixed.\"\n\n\t\t\"While your Legend Level has gone up slightly, you also managed to raise anti-Powered sentiment with this display. As a result, we scored Regime Damage Points against President Victon, but perhaps not as much as we possibly could have. Though it does appear that you're Feared more than ever, for better or worse.\n\n\t\t\"Lastly, it seems that Rexford garnered more sympathy for his critical injuries than outrage,\" ${reportername} finishes. \"But at least he and his squad will be returned to prison.\"\n\n\t\t\"Finally, some good news,\" you say.\n\n\t\t*set legend +5\n\t\t*set feared %+30\n\t\t*set antipoweredsent +5\n\t\t*set regimedamage +3\n\t\t*if choose_reporter\n\t\t\t\"Oh don't worry,\" ${reportername} responds. \"It's not all good.\"\n\t\t\t*goto reporterirpexpl\n\t\t*else\n\t\t\t\"I'm glad to hear that your support of brutally violent acts remains strong as ever,\" ${reportername} responds, the disgust practically dripping off her voice. \"Though don't worry, there's more bad news where that came from.\"\n\t\t\t*goto reporterirpexpl\n\t*else \n\t\tThe footage of you killing Rexford has wreaked havoc on your image. In one move, we lowered your Legend Level, raised anti-Powered sentiment considerably, and made Victon's Regime look moderate by comparison. And for better or worse, you are Feared more than ever.\n\n\t\t*set legend -10\n\t\t*set feared %+40\n\t\t*set antipoweredsent +10\n\t\t*set regimedamage +1\n\n\t\t\"While the Infinite Elite will be returned to prison, I'm afraid you may have crossed the line here, ${codename},\" ${reportername} finishes.\n\n\t\t*if choose_reporter \n\t\t\t\"No one likes a murderer, no matter how justified ${youhis} reasons for killing may be.\"\n\t\t\n\t\t\t\"Is there anything else?\" you ask, wanting to move the conversation along. What's done is done.\n\t\t\t*goto rexfordkillconsider\n\t\t*else\n\t\t\t\"I always knew you were a murderer, now you've just proven it. When this is all over, I hope the consequences are—\"\n\t\t\n\t\t\t\"Is there anything else?\" you ask, wanting to move the conversation along. What's done is done and you don't need a lecture from ${reportername}.\n\t\t\t*goto rexfordkillconsider\n*else\n\tYou don't have any evidence to prove that Rexford's Infinite Elite even exists, let alone that they attacked you illegally. So how do you want ${reportername} to proceed?\n\n\t*choice\n\t\t#Tell ${reportername} about Rexford's Infinite Elite and insist that she write about it without evidence.\n\t\t\t*set forcereportrex true\n\n\t\t\t\"I'm both surprised and unsurprised to learn about this hit squad, unfortunately,\" ${reportername} sighs. \n\t\t\t*if choose_reporter\n\t\t\t\t\"And as much as I'd like to blow the roof off this one, I'm afraid that reporting on this without evidence would do more harm than good for both of us, given Victon's resources.\"\n\n\t\t\t\t\"I don't care,\" you return. \"Just report it. The public deserves to know, no matter what damage is done to us messengers.\"\n\n\t\t\t\t${reportername} pauses for a moment, but then returns to say: \"Consider it done. Now, I just did a quick and highly illegal search on the matter and I do have some information for you.\"\n\t\t\t\t*goto rexfordkillconsider\n\t\t\t*else\n\t\t\t\t\"As much as I'd like to expose this crime, I'm afraid that reporting on this without evidence would do more harm than good for both of us, given Victon's resources.\"\n\n\t\t\t\t\"I don't care,\" you return. \"Just report it. The public deserves to know, no matter what damage is done to us messengers.\"\n\n\t\t\t\t${reportername} pauses for a moment, but then returns to say: \"I'll do it because you're right about that much, but don't ever presume to tell me what report ever again. \n\n\t\t\t\t\"Now, I just did a quick and highly illegal search on the matter and I do have some information for you.\"\n\t\t\t\t*goto rexfordkillconsider\n\t\t#Tell ${reportername} about Rexford's Infinite Elite, but leave the decision about reporting it up to her.\n\t\t\t*set reporternorexreport true\n\t\t\t\"I'm both surprised and unsurprised to learn about this hit squad, unfortunately,\" ${reportername} sighs. \"And as much as I'd like to report this, I'm afraid that doing so without evidence would do more harm than good for both of us, given Victon's resources.\"\n\n\t\t\t${reportername} pauses for a moment, but then returns to say: \"Still, I just did a quick and highly illegal search on the matter and I do have some information for you.\"\n\t\t\t*goto rexfordkillconsider\n\t\t#Tell ${reportername} about Rexford's Infinite Elite, but forbid her from reporting—it would be unsafe and damaging for her to do so without any actual proof.\n\t\t\t*set reporternorexreport true\n\t\t\t\"I'm both surprised and unsurprised to learn about this hit squad, unfortunately,\" ${reportername} sighs. \n\t\t\t*if choose_reporter\n\t\t\t\t\"Though I do agree with you. Reporting on this without any evidence would do more harm than good for both of us, given Victon's resources.\"\n\n\t\t\t\t${reportername} pauses for a moment, but then returns to say: \"Still, I just did a quick and highly illegal search on the matter and I do have some information for you.\"\n\t\t\t\t*goto rexfordkillconsider\n\t\t\t*else\n\t\t\t\t\"I agree that reporting on this without any evidence would do more harm than good for both of us, given Victon's resources, but don't ever presume to tell me what report ever again.\"\n\n\t\t\t\t${reportername} pauses for a moment, but then returns to say: \"Still, I just did a quick and highly illegal search on the matter and I do have some information for you.\"\n\t\t\t\t*goto rexfordkillconsider\n\n*label rexfordkillconsider\n*if fightrexfordkill\n\t*page_break\n\tBefore moving on, you know you need to reconcile here and now how you feel about killing Rexford, before public opinion begins to rain down upon you.\n\n\t*choice\n\t\t#I feel terrible about killing Rexford. It was an impulsive decision made in a moment of intense danger, but it was a mistake.\n\t\t\t*set lawless %+10\n\t\t\tYou made this decision in self defense, but all the same, you decide right now that you won't kill ever again.\n\t\t\t*goto reporterirpexpl\n\t\t#It's not a decision I take lightly, but it's a choice I feel I had to make. So I'm prepared to face the potential consequences.\n\t\t\t*set lawless %+20\n\t\t\tYou made this decision in self defense, but all the same, you will hold yourself properly accountable when all of this is finished.\n\t\t\t*goto reporterirpexpl\n\t\t#Killing isn't that big a deal to me. So it doesn't bother me much.\n\t\t\t*label sociopathic\n\t\t\t*set lawless %+40\n\t\t\t*set coldblooded true\n\t\t\tWhich makes you a cold-blooded murderer. Killing may be necessary as a last resort sometimes, but you take it too lightly.\n\n\t\t\tSo you'd better be ready to face the consequences of your actions, when they inevitably come.\n\t\t\t*goto reporterirpexpl\n\t\t#I enjoyed killing Rexford. A lot.\n\t\t\t*goto sociopathic\n*else\n\t*goto reporterirpexpl\n\n*label reporterirpexpl\n*page_break\n\n\"It looks like the IRP was able to exonerate select criminals with minimal sentences served to put them on The Infinite Elite,\" ${reportername} explains. \"This top-secret tracking team was billed as an opportunity for these criminals to redeem themselves, much like the opportunity given to The Crush during The Hero Project.\n\n\"The whole thing sounds massively illegal,\" ${reportername} continues. \"Which means that if President Victon is able to pull this kind of thing off, he must have other nasty plans brewing. So we both need to stay on high alert.\n\n*if reporternorexreport \n\t\"I suppose The Infinite Elite could still come after you, but they'll have a hard time finding you long-distance now that Trackr is dead.\"\n\t*goto rosterrundown\n*else\n\t\"At least after my report The Infinite Elite can't come after you again, since they have blown their one shot and landed back in jail. Though even if they could, they'd have a hard time finding you long-distance now that Trackr is dead.\"\n\t*goto rosterrundown\n\n*label rosterrundown\n*page_break\n\nYou take a second to process that thought: Prodigal's bomb must have killed Trackr, though apparently not The Hound. You try to decide how you feel about this, but ${reportername} keeps chattering before you get a chance.\n\n\"You must also remember that the public doesn't know Miss Artillery is alive and therefore doesn't understand the purpose of your current mission, or why you're teaming up with Prodigal,\" ${reportername} reminds you. \n*if choose_reporter\n\t\"But don't worry, once the potential risk to your mission is over, I'll make sure that everyone knows the truth.\"\n\n\tBefore you can respond, the line goes dead—it looks like your one minute is up.\n\t*goto justaswelllater \n*else\n\t\"Once the potential risk to your mission is over, I'll make sure that everyone knows the truth. Then the public can judge you based on—\"\n\n\tBefore ${reportername} can finish, the line goes dead—it looks like your one minute is up.\n\t*goto justaswelllater \n\n*label justaswelllater \n\nWhich is just as well, since you're not sure what you would have said to ${reportername} about all of this, given your current circumstances. For a moment, all you can feel is heavy: with all that you've had to endure, you can barely remember why you wanted to become a hero in the first place. You're not sure what your dream really even means, anymore.\n\nAll you are sure of is that the next time you speak to ${reportername}, you hope you'll be able to reveal everything to the public you've had to hold back.\n\n*if luckyeleventh\n\t*if selloutjenny\n\t\t*set luckycivilally true\n\t\t*goto thebmupdate\n\t*else\n\t\t*set luckytruefriend true\n\t\t*goto thebmupdate\n*else\n\t*if luckyfeelings\n\t\t*if selloutjenny\n\t\t\t*set luckycomaspouseangry true\n\t\t\t*goto thebmupdate\n\t\t*else\n\t\t\t*set luckycomaspouse true\n\t\t\t*goto thebmupdate\n\t*else\n\t\t*if selloutjenny\n\t\t\t*set luckycomacivilally true\n\t\t\t*goto thebmupdate\n\t\t*else\n\t\t\t*set luckycomatruefriend true\n\t\t\t*goto thebmupdate\n\n*label thebmupdate\n*if luckyeleventh\t\n\t*if bm_reconcile\n\t\t*set bmcomaspouse true\n\t\t*goto therealupdate\n\t*else\n\t\t*set bmcomanothing true \n\t\t*goto therealupdate\n*else\n\t*set bmbrokencareer true\n\t*goto therealupdate\n\n*label therealupdate\n*page_break THIRTY MINUTES LATER\n\nBack where the hoverpod landed, you're about to climb in behind Jenny and Prodigal, having said all your goodbyes and thank you's to GG. But before you can reach the first step, GG grabs your arm to stop you. He always did know how to sneak up on you…\n\n*if luckyeleventh\n\t\"I just wanted to wish you the best of luck,\" GG says. \n\t*if bmcomaspouse\n\t\t\"And I wanted to say that I hope Black Magic wakes up from ${bmhis} coma soon.\"\n\n\t\tYou just nod at GG, not sure what to say. You hope the same more than anything, but you can't stop to think about Black Magic. \n\n\t\tNot with your parents' execution scheduled for twenty-four hours from now.\n\t\t*goto scenecode\n\t*else\n\t\t\"You know, with everything. And The Millennial Group. And Lucky. And I even hear they're keeping Black Magic at the Tower until ${bmze} wakes up from—\"\n\n\t\t\"Thanks GG,\" you interrupt, silencing GG. For better or worse, your heroic relationships, good or bad, don't really rank terribly high on your list of concerns right now.\n\n\t\tNot with your parents' execution scheduled for twenty-four hours from now.\n\t\t*goto scenecode\n*else\n\t\"You need to know something before you go to The Millennial Tower,\" GG says. \"During our downtime this afternoon, I looked into the current status of the Millennial Group, just in case anything important had changed with their roster. And I'm afraid something has.\"\n\n\tYou stare at GG, imploring him to go on. He takes a deep breath, then says:\n\n\t\"It appears that Lucky woke up from ${luckyhis} coma yesterday.\" \n\n\t*if luckyfeelings\n\t\tGG says the words and your heart does a backflip.\n\t\t*goto veryfewnowyet\n\t*else\n\t\tGG says the words and you feel a wave of relief pass through you.\n\t\t*if luckycomatruefriend\n\t\t\tYou might not have ended up with Lucky, but you still consider ${luckyhir} a close friend. Besides, no one deserves the kind of blow that Lucky was dealt.\n\t\t\t*goto veryfewnowyet\n\t\t*else\n\t\t\tYou and Lucky might not have the best history, but no one deserves the kind of blow that Lucky was dealt.\n\t\t\t*goto veryfewnowyet\n\n*label veryfewnowyet\n*page_break \n\n\"Very few people know yet, of course,\" GG continues, a smile breaking across his wide face. \"But it would seem that Lucky doesn't have any permanent damage and will make a full recovery. Lucky is just waiting until fully restored and settled to make the news public.\"\n\n\"Settling where?\" you ask.\n\n\"Well, Lucky immediately accepted the standing offer extended to ${luckyhir} by The Millennial Group,\" GG finishes. \"And I'm told ${luckyze} has already moved in.\"\n\nAs you hear this news, you put the pieces together: \n\nYou're going to see Lucky at The Millennial Tower.\n\n*if luckyfeelings \n\tHoly. Slugger.\n\t*goto scenecode\n*else\n\t*page_break\n\tYou nod at GG and thank him for the update, but just keep moving. As happy as you are to hear that Lucky has recovered, ${luckyze} doesn't really rank terribly high on your list of concerns right now.\n\n\tNot with your parents' execution scheduled for twenty-four hours from now.\n\t*goto scenecode\n\n*label scenecode\n\n*finish Next Chapter: ClusterSlugger\n", "chap_four": "*comment é\n\n*text_image part_two.png center Part Two: Enemy Lines\n\n--------------------------------------------------\n\n*text_image chap_4.png center Chapter 4: Bounty\n\nYou stare up at the wall of paintings and your stomach turns. They're grouped by category with neat, minimalist headers like [b]POWERED BRUTALITY[/b] and [b]HUMBLE TALENTS[/b], with scenes depicting each subject. Though the most horrifying section by far is titled [b]MEEK INHERITANCE[/b], featuring futuristic portraits of bucolic family life set beside mass Powered graves or concentration camps.\n\nLooking these over, you feel sick, like someone has run poison through your veins. Then you feel cold rage pour through you instead. So this is what The Meek movement really stands for, behind closed doors?\n\n\"${firstname}, now is not the time for gallery gazing!\" Prodigal hisses from down the hall. \"I found their computer mainframe room.\"\n\n*page_break\n\nYou and Prodigal agreed that accessing the remote computer system at The Meek movement's Millennia City headquarters was the fastest way to determine the Blessed Vessel's current location. Since it was already the middle of the night—or really, the early morning—you both figured there was no time like the present to break and enter.\n\nBefore you left, Prodigal told you that her Fringes lair was going to be useless now that ${reportername} had seen you there. So you both ransacked it for anything that might prove useful and you snagged a grab-bag full of goodies. You never thought you'd be sporting a utility belt filled with Prodigal-invented weaponry, but since you can't use your Powers, you're going to have to find some creative ways to fight the enemies you're bound to face.\n\nYou've got a pretty sickening arsenal, but you're most excited about:\n\n*choice\n\t#A set of plasma pistols.\n\t\t*goto tookfromprodigal\n\t#A one-of-a-kind personal invisibility generator.\n\t\tThough it's only good for a one-time use, so you better choose your moment wisely.\n\t\t*goto tookfromprodigal\n\t#A bundle of EMP flashsticks. \n\t\t*goto tookfromprodigal\n\t#A fleet of micro-cameras.\n\t\tWho knows when you're going to need to record something during your mission to take down President Victon and exonerate your parents?\n\t\t*goto tookfromprodigal\n\t#A collapsible energy staff.\n\t\t*goto tookfromprodigal\n\t#A grappling gun.\n\t\t*goto tookfromprodigal\n\t#A pair of hoverwings.\n\t\t*goto tookfromprodigal\n\t#A healing dragnet.\n\t\tThough it's only good for a one-time use, so you better choose your moment wisely.\n\t\t*goto tookfromprodigal\n\t#A pack of flashbang stun grenades.\n\t\t*goto tookfromprodigal\n\t#The Telelock that brought me here.\n\t\tEspecially since it has sentimental value. Though you had to convince Prodigal to key the Telelock to your mental signature so it would work for you, too.\n\t\t*goto tookfromprodigal\n\n*label tookfromprodigal\n\nAs useful as this weapons belt might prove to be, you actually thought Prodigal would have some more traditional weapons at her disposal. But of course, she reminded you that her Powers enable her to create most simple kinds of weaponry on the fly, so there's not much need to have any extras around.\n\nYou also needed to change your outfit, since you were still in your civilian clothes from the lakeside safe house. Conveniently—and creepily—Prodigal had a few options available for you:\n\n*choice\n\t*if ((male) or (genderneutralhr)) #A replica of my dad's The Fury costume.\n\t\t*goto simpleform\n\t*if ((male) or (genderneutralhr)) #A replica of my mom's The Sound costume.\n\t\t*goto simpleform\n\t#A version of my original costume.\n\t\t*label simpleform\n\t\tThough you decided to scale it back to its simplest form—you don't exactly want to be recognized, right now.\n\t\t*goto afterthatyou\n\t#A sleek, all-black lycra costume.\n\t\tYou don't exactly want to be recognized right now—you need to be able to slip through the shadows. \n\t\t*goto afterthatyou\n\n*label afterthatyou\n\nAfter that, you piled into a custom-built hoverpod Prodigal had parked in a nearby garage. You asked Prodigal why she couldn't just whip up some teleport technology, but she said that she doesn't mess with teleportation much—apparently the science is crazy-complicated and the radiation damage wreaks havoc on the body, if overused. Prodigal only ever made her Telelocks because she was able to sell them for a small fortune, but apparently it takes her months to craft just one. And those are only good for short distances between one-way rooms.\n\nInstead, Prodigal stashed these egg-shaped hoverpods all over Millennia City to get around. In fact, Prodigal explained that she used one of these hoverpods to get to your lakeside safe house, but the police had already discovered it by the time you needed to escape. \n\nThe hoverpods are designed with completely smooth edges to avoid radar detection and are mirror-coated, making them near-invisible. They're also equipped with the finest anti-tracking security systems and are capable of hitting 400 mph with hairpin maneuverability, even in upper-atmosphere conditions.\n\n*page_break\n\nOnce you arrived at the Meek MC HQ, you had no trouble breaking in undetected—thanks to Prodigal's Powers—and luckily, the building appears to be empty. You were expecting some kind of high-tech complex, but really, this HQ is just a low-security building that houses some computers and private Meek collections, so it's not highly guarded.\n\nYou've been searching for The Meek's on-site computer hub so Prodigal can hack in and discover the Blessed Vessel's scheduled itinerary. Though once you entered the restricted halls, there were all kinds of nasty surprises: posters touting anti-Powered doctrine, pictures of secret celebrity Meek members, self-defense training rooms…the list goes on and on. Though you were most distracted by this little homemade art gallery, where you still stand. \n\nYou shake your head as you walk out, trying to brush off some of the disgust you feel. You've always known that beneath their peaceful, altruistic facade, The Meek movement is a militant organization built on fear and hatred. You just never realized how it would feel to see that hatred materialized and memorialized like this.\n\nEspecially as you spot your own face depicted in a portrait near the door. There you stand, right beside The Crush, Prodigal, and Black Magic, under a banner that reads: [b]INFINI DESPOTS: The Face of the Enemy[/b]. \n\nAs you stare at the painting, all you can think is:\n\n*choice\n\t#I'm going to burn The Meek movement to the ground.\n\t\t*set revenge %+5\n\t\t*goto mainfraime\n\t#How can anyone hate me before they've even met me?\n\t\t*goto mainfraime\n\t#Will humans always find arbitrary reasons to divide and discriminate?\n\t\t*goto mainfraime\n\t#I can't waste another moment of my time on these bigots.\n\t\t*goto mainfraime\n\t#I'm going to expose The Meek movement for who they truly are.\n\t\t*set revenge %-5\n\t\t*goto mainfraime\n\t#Is Black Magic even an Infini Powered?\n\t\tThat would make sense, given ${bmhis} Power level. But that's a question for another time.\n\t\t*goto mainfraime\n\n*label mainfraime\n\nYou exit the gallery and enter a room further down the hall to find Prodigal seated before a holo-screen, whizzing through menus and commands at a dizzying pace.\n\n\"See anything you like, schnookums?\" Prodigal asks. \"Something for the mantelpiece, perhaps?\"\n\n\"Let's just get the coordinates and get out of this slugging hellhole,\" you respond.\n\n\"Aw shucks, you mustn't let the naysayers get you all…oh, fudgeberries.\"\n\nProdigal falls silent as the holo-screen displays a 3D map of America, with a red route-line designating the Blessed Vessel's course. It appears that the ship navigates the international waters surrounding the country in random patterns, but about a month ago it switched from Pacific Ocean routes to new ones in the Atlantic Ocean. You figure that must have something to do with a certain Victon's upgrade from MC's City Hall to the White House.\n\n\"There,\" Prodigal says, pointing to a red dot off the coast of Washington DC indicating the Blessed Vessel's current location. \"Looks like we're going on a road trip, chicken!\"\n\nYou turn to give Prodigal your best withering stare, but you're surprised to find a plasma contrail streaking in the space where Prodigal used to be.\n\n*page_break\n\nYou don't even have a chance to scream before you feel someone slam into you, knocking you to the ground. Then you feel arms pin you down and hear a low growl beside your ear, with hot breath steaming onto your neck.\n\n\"That was for stealing my pterrot, you psycho bitch,\" a familiar voice says from across the room.\n\nYou look up to find a grubby-looking man standing with a smoking plasma cannon pointed at the hole in the wall where Prodigal just sat. One look at his shoulder-length hair and gaunt face and you realize that's Trackr, the Gravitas thief you encountered on your very first night as a hero. What the slugger is he doing—\n\nBut that thought fades as a grey-haired Rottweiler snout obscures your view, dripping frothy drool onto your chin.\n\n\"Grrrr I've been waiting for another taste of ${familyname} flesh for yearssssss.\"\n\nThe Rottweiler barks in your ear and you twist to find it's The Hound, one of the most prominent villains in your parents' Sound & Fury rogues gallery. From what you've seen of your parents' battles with The Hound, he was one of their most vicious enemies, since he chooses not to curb the canine instincts of his Animalistic Powers. \n\nThe Hound has been obsessed with your parents and your family for decades. You always figured one of your parents' old villains would come out of the woodwork once your identity was outed, and it makes sense that The Hound would choose to do so now…\n\n*page_break\n\nStill, a thousand questions about why and how these two are here together run through your mind. Until The Hound presses his wet nose against your neck.\n\n\"${familyname} fear always did smell so slugging sweet.\"\n\n\"Go to town,\" Trackr says. \"We just need ${youhis} body, dead or alive.\"\n\nWell, you can sort out the details later—assuming there is a later. Right now, you need to act. \n\n*if warningsys\n\t*if chip_diva\n\t\t\"You need to crop it like it's haute, honey!\" MeChip ${chipname} activates in your ear. \"Create some space between you and those fools.\"\n\t\t*goto pinneddown\n\t*else\n\t\t\"You need to create some space between you and your opponents,\" MeChip ${chipname} activates in your ear. \"Quickly.\"\n\t\t*goto pinneddown\n*else\n\t*goto pinneddown\n\n*label pinneddown\n\nThe Hound has you pinned down very tightly, but luckily your left hand rests on part of your weapons belt. You can just manage to reach a couple of the items there, if you're lucky.\n\n*choice \n\t#Use the invisibility generator to disappear.\n\t\t*gosub end_trial\n\t\t*set usehealingnet true\n\t\t*set useinvisibility true \n\n\t\tYou flip on the invisibility generator and feel your body rushed with warm air as you disappear.\n\n\t\tBut The Hound is already on top of you and he has enhanced canine senses. Which means he most definitely knows you're still pinned down underneath him.\n\n\t\tHowling, he bites down and rips into your neck.\n\n\t\t*page_break\n\n\t\tYou scream in pain as The Hound clamps down. Then you feel invisibility generator short out and emit a nasty shock, causing The Hound to release your neck. This gives you the chance to kick The Hound off of you and across the floor. \n\n\t\tWith blood pouring from your neck and your vision blurring, you reach for the healing dragnet in your weapons belt. You wrap yourself in the net and immediately feel better as it absorbs into your skin. As great as that feels, you know you won't be able to use the invisibility generator or the healing dragnet again, unfortunately.\n\n\t\tBrushing this off, you then pop to your feet, ready to make your next move.\n\t\t*goto assessthesit\n\t#Use the Telelock to escape and regroup.\n\t\t*gosub end_trial\n\t\tClutching the Telelock, you close your eyes and send a mental command by picturing Prodigal's Fringes lair. Next thing you know, the weight on top of you is gone and you open your eyes to find yourself back in the empty lair.\n\n\t\tStanding up, you try to think fast—the Telelock will only be able to teleport you back to the Meek HQ, so you've got a one way ticket. Which means you'll have to fight when you return. \n\n\t\tYou already cleared this place out of any useful weapons, but at least you'll have the element of surprise. Just as you think this, you see Terry's makeshift tomb in the corner and come up with an idea.\n\n\t\t*page_break TWO MINUTES LATER\n\n\t\tYou watch as Trackr screams in horror, scrambling across the floor. \n\n\t\tYou suppose that seeing you spontaneously reappear in the Meek HQ would spook anyone, but the fact that you then tossed the dead body of Trackr's former pet pterrot in his face probably pushed him over the edge. Trackr started screaming and flailing and nearly blasted The Hound square in the chest with his cannon.\n\n\t\tWith Trackr still reeling, The Hound tried to come at you again, but you knocked him back with a kick to the stomach. Now The Hound and Trackr both scramble to their feet, recovering from your attacks. At least now you have the upper hand…\n\t\t*goto assessthesit\n\t#Emit an energy pulse. (Power Cost 15)\n\t\t*gosub end_trial\n\t\t*set power -30\n\t\t*set health -15\n\t\t*set powerregain +2\n\n\t\tYou strain to emit an energy pulse, but you only succeed in letting off a few sparks before the pulse fizzles out. Slugger, you hate that your Powers are still so unreliable….\n\n\t\tThen you feel The Hound's teeth on your neck and force yourself to try again.\n\n\t\t*page_break\n\n\t\tThis time the pulse bursts from your skin and The Hound is sent reeling across the room. \n\n\t\tYou stand up, taking the moment to regroup before your next move.\n\t\t*goto assessthesit\n\n*label assessthesit\n*page_break\n\n\"Round on my location, I've got ${codename} and Prodigal,\" Trackr says into his MeChip.\n\nSlugger, it sounds like these two aren't here alone. The job you did breaking into this HQ must not have been as flawless as you first thought. There were probably no guards to bypass because the moment you entered, the Meek must have registered the break-in and alerted this squad to come take you out. \n\nYou look from Trackr to The Hound and see that they both wear black uniforms with navy blue accents—though they both should be wearing prison jumpsuits. Whoever sprang these two out of jail wanted to find you and Prodigal badly: Trackr has the Power to locate any person or object on the planet, while The Hound has first-rate canine tracking senses. \n\nYou push these thoughts aside; you can figure out who sent them after you take them down.\n\n\"I owe you some love, ${codename},\" Trackr says, training his plasma cannon on you. \"Open wide.\"\n\n*page_break\n\nYou're deciding how to send some of your own love back towards Trackr when suddenly Prodigal leaps through the hole in the wall, shrieking like a madwoman. Trackr quickly turns his plasma cannon and fires at her, but the blast just collides with one of Prodigal's kick-shields as she tumbles across the floor. \n\nThe Hound takes his turn, launching at Prodigal with his paw-claws extended. Prodigal just spins around him in one swift motion and grabs The Hound by the fur on the back of his neck, using her momentum to toss The Hound at Trackr. Trackr tries to sidestep The Hound, but he's too slow and they collide, crashing to the floor.\n\nStanding in front of you with her costume burnt and torn, Prodigal produces two of her biggest signature plasma guns.\n\n\"My turn,\" Prodigal says, raising both guns at The Hound and Trackr as they try to disentangle
