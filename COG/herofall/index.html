<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Heroes Rise: HeroFall — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "herofall", "title": "Heroes Rise: HeroFall", "scenes": {"chap_eight": "*comment é\n\n*text_image chap_8.png center Chapter 8: Vessels\n\n*if sparrow\n\tThe sight of the Sparrow wings sends a wave of hate rippling through you. It was only a little over a year ago that Prodigal infiltrated your life by posing as your stoic sidekick, Sparrow. \n\n\tNow she wants to use those cursed wings again?\n\n\t*choice\n\t\t#Tell Prodigal I'll be flying those wings, not her.\n\t\t\t\"Whatever you say, master,\" Prodigal says, putting on her best chirp-voice.\n\n\t\t\t\"Let's just get this over with,\" you mutter, standing up.\n\t\t\t*goto vesselarrive\n\t\t#Punch Prodigal.\n\t\t\t\"You will only get one of those,\" Prodigal says, massaging her jaw. \"So I hope that was worth it.\"\n\n\t\t\t\"Whatever you say, Sparrow,\" you mutter, standing up. \"Let's just get this over with.\"\n\t\t\t*goto vesselarrive\n\t\t#Just go with it. As long as it works, what's one more injustice added to the pile?\n\t\t\t\"Let's just get this over with,\" you mutter, standing up.\n\t\t\t*goto vesselarrive\n*elseif pressie\n\tThe sight of Pressie sends a wave of hate rippling through you. It was only a little over a year ago that Prodigal infiltrated your life by sending him to pose as your happy-go-lucky sidekick. \n\n\tThen Pressie turned on you during Prodigal's Death Wave fiasco, nearly killing Grandma in the process.\n\n\t*choice\n\t\t#Demand an explanation.\n\t\t\t*label sluggerherepress\n\t\t\t\"What the slugger are you doing here?\" you ask as Pressie beaches his rock-boat and waddles up to you. That's when you notice he's wearing some kind of monastic robes.\n\n\t\t\t*label nopummelthanks\n\t\t\t\"Thank you for not punching me on sight,\" Pressie says, trying to dry himself. \"Might I have a minute to explain myself before we depart?\"\n\n\t\t\t\"I think you had better,\" you order, not bothering to hide the venom in your voice.\n\n\t\t\t*label explanationp\n\t\t\t*page_break \n\n\t\t\t\"After that unfortunate Death Wave battle, I sequestered myself underground—quite literally—for a long time. So long, I got lost in the earth for months, burrowing and wandering. It was fate that led me to finally resurface outside the Goins monastery. The monks there, seeing how weak I had become, took me in and eventually showed me their ways—and the error of my own ways.\n\n\t\t\t\"It's a much longer story than you'll care to hear, but I experienced a rather grueling spiritual awakening and closed many of the wounds left open from my childhood as a homeless orphan. And while I am grateful to Prodigal for being my only friend, I can no longer serve her purposes.\"\n\n\t\t\t\"However, when Prodigal asked this last favor of me, I felt it was my opportunity to truly make amends with you, ${codename}. I am sorry for what I've done. So sorry, in fact, that I've sworn an oath of pacifism. So I'll get you to the Blessed Vessel happily, but I'm afraid that's where my involvement must conclude.\"\n\n\t\t\t*page_break\n\n\t\t\tYou stare at Pressie, dumbfounded—just how many personas has he taken on since you've known him? Goofball? Heartless villain? Pacifist monk? \n\n\t\t\tYou may never know the real Pressie, but you also know it doesn't matter. You need to get to the Blessed Vessel and you don't have any other options, right now. So you nod at Pressie, not wanting to let this conversation go on any longer than it already has.\n\n\t\t\t\"Splendid,\" Pressie says. \"To the dirt-y water slide we ride.\"\n\t\t\t*goto vesselarrive\n\t\t#Punch Prodigal.\n\t\t\t\"You will only get one of those,\" Prodigal says, massaging her jaw. \"So I hope that was worth it.\"\n\n\t\t\t\"What the slugger is Pressie doing here?\" you ask as Pressie beaches his rock-boat and waddles up to you. That's when you notice he's wearing some kind of monastic robes.\n\n\t\t\t*goto nopummelthanks\n\t\t#Pummel Pressie.\n\t\t\tYou run at Pressie just as he beaches his rock-boat, ready to deck him. Before you do, you notice Pressie is wearing some kind of monastic robes and waves his hands in surrender.\n\n\t\t\t\"Please, I know I deserve whatever you have planned and more,\" Pressie says. \"But I'm truly here to help. Can you give me a moment to explain myself?\"\n\n\t\t\t\"I think you had better,\" you order, not bothering to hide the venom in your voice. And secretly hoping that whatever Pressie says leads to that punch you had planned.\n\t\t\t*goto explanationp\n\t\t#Just go with it. As long as it works, what's one more injustice added to the pile?\n\t\t\t*goto sluggerherepress\n*else\n\tThe sight of Tarana sends a wave of hate rippling through you. It was only a little over a year ago that Prodigal blackmailed Tarana into posing as your innocent sidekick, using her to execute the Death Wave plot against you.\n\n\tYou saw Tarana briefly in The Hero Project, but you both pretty much avoided each other before she was eliminated in The Final Selection.\n\n\t*choice\n\t\t#Demand an explanation.\n\t\t\t*label sluggertaranahere\n\n\t\t\t\"What the slugger are you doing here, Tarana?\" you ask as Tarana approaches, the rising sun gleaming off of her diamond-encrusted costume.\n\n\t\t\t*label blowartery\n\t\t\t\"Don't blow an artery, ${granny}. I come in peace,\" Tarana says, waving her white-gloved hands like a flag. \"If you give me a hot minute, I'll tell you why I'm here.\"\n\n\t\t\t\"You have exactly one minute,\" you say, not bothering to hide the venom in your voice.\n\n\t\t\t*label explanationta\n\t\t\t*page_break\n\n\t\t\t\"My family moved to DC after my dad took some political nonsense job in Victon's White House. I hate everything about this godforsaken swamp, so when I saw that you had teamed up with Prodigal, I sent a message to her from our old secure line, because I want to help however I can. I guess you can count it as my apology, but really, I just want to do my part to take down Victon.\"\n\n\t\t\t\"Is this another act of teenage rebellion?\" you ask. \"Or are you actually taking a stand for something?\"\n\n\t\t\t\"Why can't it be both?\" Tarana says. \"Now, I can't risk coming onboard with you and getting caught, not that I'd want to set foot on that hell-ship even if I could. Still, I can wave-ride you out there. I just can't promise it will be pleasant.\" \n\n\t\t\t\"It doesn't matter,\" you say. \"We don't have any better options. So let's get to it.\"\n\t\t\t*goto vesselarrive\n\t\t#Tell Tarana to leave, before I do something we'll both regret. \n\t\t\t*goto blowartery\n\t\t#Punch Prodigal.\n\t\t\t\"You will only get one of those,\" Prodigal says, massaging her jaw. \"So I hope that was worth it.\"\n\t\t\t*goto sluggertaranahere\n\t\t#Give Tarana a hug.\n\t\t\tYou've been through a lot with Tarana, both good and bad—but the bad wasn't necessarily her fault. Besides, you need all the help you can get, right now.\n\n\t\t\t\"Ew,\" Tarana says, pushing you away. \"Okay, I get it ${granny}.\"\n\n\t\t\t\"What are you doing here, Tarana?\" you ask. \"Why aren't you back in Millennia City?\"\n\n\t\t\t\"I'll give you the edited version, if you have a second,\" Tarana says, brushing off her diamond-white costume.\n\t\t\t*goto explanationta\n\t\t#Just go with it. As long as it works, what's one more injustice added to the pile?\n\t\t\t*goto sluggertaranahere\n\n*label vesselarrive\n*page_break ONE HOUR LATER\n*set power 100\n*set health 100\n\nWell, if you ever wondered what a floating city looks like, now you know. \n\nThe Blessed Vessel is as massive as it is terrifying—you were expecting a cruise ship of some kind, but this looks more like an expansive floating amphitheater, jutting out with skyscrapers and trees.\n\nYou can hardly believe it—Constance and The Meek movement have really succeeded in creating their own floating city-state. One that is filled with thousands of citizens who hate Powereds, especially Infini Powereds. And most especially you, as the current Infini icon.\n\nIt would be horrifying enough to have to break into the surface of this behemoth, but Prodigal tells you that Miss Artillery is most likely hidden deep in one of the dozens of underwater floors.\n\n[i]This is it[/i], you tell yourself. The defining moment you've been waiting for. You just hope you're ready for whatever you're going to find inside the Blessed Vessel.\n\n*page_break\n\n*if sparrow\n\tYou and Prodigal were able to fly her Sparrow wings into an open and unoccupied delivery room window, undetected.\n\t*goto sneakytime\n*elseif pressie\n\tAfter Pressie's bumpy rock-boat ride, you bid your silent farewells and managed to sneak into an unoccupied delivery room window, undetected.\n\t*goto sneakytime\n*else\n\tAfter Tarana's soaking wet wave ride, you bid your silent farewells and managed to sneak into an unoccupied delivery room window, undetected.\n\t*goto sneakytime\n\n*label sneakytime\nThat was thanks entirely to Prodigal's last bit of anti-surveillance tech. Though once you were inside, Prodigal froze in place.\n\n\"What?\" you hiss. \"Where do we go next?\"\n\n\"I can't access my Powers,\" Prodigal responds. \"The whole ship must be somehow equipped with Power-dampening fields.\"\n\nYou test Prodigal's theory by snapping your fingers to produce an energy pop, but it's no use. You only succeed in generating that hollow feeling you've grown all-too-accustomed to these past few months.\n\n\"So how are we going to find Miss Artillery?\" you ask.\n\n\"The old-fashioned way, I suppose,\" Prodigal answers. \"By looking. We know she'll probably be in the research wing or the high-security block, both of which are in the deepest bowels of the city-ship. So we'll start there.\"\n\n\"Slugging perfect,\" you sigh, following Prodigal. Just then, you see her skin turn alarmingly grey—and you remember how she said her Powers were the only thing keeping her alive.\n\n\"Are you—\"\n\n\"I'm fine,\" Prodigal snaps, cutting you off. \"I just hate boats. Let's get this over with.\"\n\n*page_break\n\nAs you creep out into the hallway, you are confronted with a portrait of Constance Obach, wearing the futuristic garb of a would-be queen. Next to that, you see a portrait of Inherit as her king. In fact, as you look up the hallway, you realize it's lined with all different kinds of portraits and tributes to The Meek movement's biggest celebrities—though mostly to Constance.\n\nYou think you might be sick, but you try to attribute it to the ship, instead of those portraits. Then MeChip ${chipname} unexpectedly appears in front of you to say: \"And now, your daily MeNews report and State of the Ship, brought to you by Commander Obach.\"\n\nThat doesn't sound at all like the ${chipname} you know, but when you turn to Prodigal, you see that she's fiddling with something on her wrist.\n\n\"I don't sport a MeChip like the rest of you sheep,\" Prodigal says. \"But my own tech is receiving an encrypted signal via remote override. It looks like everyone on the ship gets these personal updates, whether they want them or not.\"\n\n\"Well, that can be good,\" you say. \"If everyone is distracted with a news feed, we might actually stand a chance of sneaking down below.\"\n\n\"Let's get to it, then,\" Prodigal says. \"We've only got a few minutes.\"\n\n*page_break\n\nYou tell Prodigal to take the lead, since she pre-downloaded a map of the ship before you boarded. She may not have her tech-creating Powers to hack into the ship's systems, but she can at least follow the map. Hopefully.\n\nWhile you sneak along behind her, you're forced to listen to the Meek MeNews Update—though at least it distracts you from the endless portraits and hateful slogans lining the city-ship's walls.\n\n\"Good morning Meek Inheritors. This is Commander Constance checking in for your Wakeup Update,\" Constance begins, cheerier than you've ever seen her. \"Today we have key excerpts from the recent Union address given by our trusted ally, American President Victon. Here they are.\"\n\n\"We remain vigilant in our search for the dangerous fugitive ${firstname} ${familyname}, better known as ${codename},\" President Victon says, his smug face filling your holo-image. \n\n\"${codename} has eluded capture by The American Protectorate thanks to help from known Powered terrorist, Prodigal. While we believe this must be primarily in connection to the upcoming execution of The Sound and The Fury, we are also investigating claims that ${codename} and Prodigal have been in secret partnership since before The Death Wave, a plot to make them both famous.\"\n\nHearing these lies, you really wish you could turn this slugger off, especially because:\n\n*fake_choice\n\t#I can't reveal why I'm really working with Prodigal without ruining my mission.\n\t#I need to focus on finding Miss Artillery and exposing the truth all at once.\n\t#President Victon will always tout his lies, no matter what I do.\n\n*if (recordandescape) or (recordandfight)\n\t*if fightrexfordkill\n\t\t*set reporterarrested true\n\n\t\t\"However, I'm pleased to report that ${reportername} Challa has been arrested in connection with the murder of Rexford Schillers,\" President Victon continues. \"We hope she will atone for her crimes by helping us find ${codename}, now America's most wanted murderer.\"\n\n\t\tYour blood runs cold, because instead of focusing on the heinous fact that The Infinite Elite exists, President Victon has succeeded in making the story about you killing Rexford. Though you know that, in part, you have yourself to blame for feeding Victon this kind of ammunition.\n\t\t*goto satischoice\n\t*else\n\t\t\"Additionally, we are still searching for ${reportername} Challa after the publication of her slanderous report,\" President Victon continues. \"But I would reiterate that my administration has no ties to The Infinite Elite, as ${reportername} claimed.\"\n\n\t\tYou smile, because no matter how hard President Victon tries to sell that lie, you can still see the doubt in his eyes. And you know that others will, too.\n\n\t\tIt's also good to know that ${reportername} has managed to evade capture and stay safe in hiding. Hopefully you both are far from done dealing damage to Victon's regime.\n\t\t*goto satischoice\n*elseif forcereportrex\n\t*if fightrexfordkill\n\t\t*set reporterarrested true\n\t\t*set legend -20\n\t\t*set feared %+40\n\t\t*set antipoweredsent +20\n\t\t*set regimedamage -4\n\n\t\t\"However, I'm pleased to report that ${reportername} Challa has been arrested in connection with the murder of Rexford Schillers,\" President Victon continues. \"We hope she will atone for her crimes by helping us find ${codename}, now America's most wanted murderer.\"\n\n\t\tYour blood runs cold, because instead of focusing on the heinous fact that The Infinite Elite exists, President Victon has succeeded in making the story about you killing Rexford. \n\n\t\tThough you know you have yourself to blame for feeding Victon this ammunition in the first place, both by killing Rexford and then forcing ${reportername} to report on the battle without providing any proof of The Infinite Elite's existence.\n\t\t*goto satischoice\n\t*else\n\t\t*set reporterarrested true\n\t\t*set legend -10\n\t\t*set antipoweredsent +10\n\t\t*set regimedamage -2\n\n\t\t\"However, I'm pleased to report that ${reportername} Challa has been taken into custody for her slanderous article,\" President Victon continues. \"There is no truth to her vicious fiction claiming the existence of some governmentally funded shadow hit squad. We can chalk this up to more ${codename}-fueled lies. We hope ${reportername} will atone for her crimes by helping us find ${codename}.\"\n\n\t\tYour blood runs cold, because President Victon has once again found a way to turn the tables on you. Though you know you have yourself to blame in part for this for feeding Victon this ammunition in the first place, forcing ${reportername} to report on it without providing any any proof of The Infinite Elite's existence.\n\t\t*goto satischoice\n*else\n\tYou suppose this would have been the time for President Victon to deny any ties to Rexford's Infinite Elite, but since ${reportername} didn't report on it, he won't want to make this public knowledge.\n\n\tYou can only wonder how it would have impacted your public stats had you forced ${reportername} to do so, especially given how things ended up turning out with Rexford.\n\t*goto satischoice\n\n*label satischoice\n*page_break\n\n\"I'm also saddened to report that The Millennial Group was arrested by The American Protectorate for aiding in ${codename}'s escape,\" President Victon adds. \"In accordance with our efforts to catch ${codename}, we have also learned that The Hero Project's Executive Producer, GG Goode, aided in ${codename}'s plans, but still remains at large after a raid of his California compound.\"\n\n\"Thank you, President Victon,\" Constance says, suddenly cutting back in. \"Also please remember to tune in tonight for the press conference following The Sound and The Fury's execution, where I will be making a personal appearance. That is all for today! Be sure to check your updated itineraries for all designated citizen activities. Have a blessed day and always remember: we Meek shall inherit the earth.\"\n\nAs the holo-report ends, your heart skips a beat. You were hoping for some news of what has happened to Jenny. Though given what has become of the rest of your allies, you're not sure you could handle much more grim news. You have no idea how the weakened American Protectorate managed to overpower The Millennial Group, but then again, law enforcement backup probably took over after Jenny was shot.\n\nYou're just going to have to fight hard to make sure all of your allies' sacrifices on your behalf really pay off.\n\n*page_break\n\nAfter the report ends, you take a moment to check your public Stats by asking MeChip ${chipname} for an update.\n\n*if chip_diva\n\t\"You ready for this jelly, ${firstname}?\" MeChip ${chipname} responds, appearing in a Valentino red jumpsuit. \"That busted anti-Powered sentiment could be anywhere between 0-100, but right now it's at level ${antipoweredsent}. Moving on up, you've doled out ${regimedamage} out of a possible 17 Regime Damage Points to President Victon's stank behind.\" \n\n\t\"Last but not least, your Legend has popped in at ${legend} and considering how much the public\n\t*if (feared > 50)\n\t\tfears you, I figure your Legend could be as high as 70. Now can I roll up the partition please?\"\n\t\t*goto consideryourstats\n\t*else\n\t\treveres you, I figure your Legend could be as high as 70. Now can I roll up the partition please?\"\n\t\t*goto consideryourstats\n*elseif chip_butler\n\t\"Certainly, ${sir_mad},\" MeChip ${chipname} responds, appearing in a Valentino red suit. \"Anti-Powered sentiment could be anywhere between 0-100 and is currently at ${antipoweredsent}. Additionally, you have dealt ${regimedamage} out of a possible 17 Regime Damage Points to President Victon.\" \n\n\t\"Lastly, your Legend has also settled in at ${legend} and I've deduced that given your current state of public\n\t*if (feared > 50)\n\t\tfear, your Legend could be as high as 70. Do you require anything else, ${sir_mad}?\"\n\t\t*goto consideryourstats\n\t*else\n\t\treverence, your Legend could be as high as 70. Do you require anything else, ${sir_mad}?\"\n\t\t*goto consideryourstats\n*else\n\t\"Certainly, honeybuns,\" MeChip ${chipname} responds, appearing in a Valentino red housecoat. \"Anti-Powered sentiment could be anywhere between 0-100 and is currently at ${antipoweredsent}. What's more, it seems you have dealt ${regimedamage} out of a possible 17 Regime Damage Points to President Victon.\" \n\n\t\"Last but not least, your Legend has also settled in at ${legend}. And I think that, given your current state of public\n\t*if (feared > 50)\n\t\tfear, your Legend could be as high as 70. Do you need anything else, sugarplum?\"\n\t\t*goto consideryourstats\n\t*else\n\t\treverence, your Legend could be as high as 70. Do you need anything else, sugarplum?\"\n\t\t*goto consideryourstats\n\n*label consideryourstats\n\n\"That's all, thanks ${chipname},\" you think at ${chipname}, turning over these stats in your mind. \n\nGiven these levels, are you satisfied with the choice you made regarding The Infinite Elite and ${reportername}'s reporting?\n\n*choice\n\t#Yes, it turned out exactly how I wanted.\n\t\t*goto statsupdatehere\n\t#No, it didn't turn out the way I expected.\n\t\t*goto statsupdatehere\n\t#Nothing matters unless I find Miss Artillery, so I'd better focus on that.\n\t\t*goto statsupdatehere\n\n*label statsupdatehere\n\nAs the update closes, you look around and realize that you've already made it into the Blessed Vessel's lower levels, since the nearest window has a view of dark water and bright fish. You must have gone into auto-pilot following Prodigal. You remind yourself that there's nothing routine about what's going on here, so you'd better focus.\n\n*label chaptereightrestartpoint\n\n\"We should be in business through here,\" Prodigal says, pointing to a holo-sign that reads [b]Research Wing[/b]. \n\nYou follow Prodigal as she fiddles with the password-protected lock, breezing through it with ease. You're about to ask her how when the door swings open…\n\n*page_break\n\nAnd reveals Commander Constance Obach herself standing there, with a veritable army of Meek soldiers at her back.\n\n\"This might be the time when someone lesser would pontificate,\" Commander Constance says, her beady eyes narrowed at you and Prodigal. \"But I just really want to see you both die.\"\n\nWith that, Constance waves her hand forward, signaling her armada to attack. They all surge with different-color energy signatures… signatures that you have only seconds to realize must come from their MeChips.\n\nCould Constance really be hypocritical enough to create her own MeChip-powered armada aboard this city-ship?\n\nThen you check yourself—of course she could.\n\n*page_break\n\n\"Prodigal, use an EMP!\" you scream as the armada pushes forward. You spin to find an exit and see there's a door right next to you, which is mercifully unlocked. You push through just as Prodigal's EMP-bomb goes off behind you.\n\n\"That will deactivate the first wave, but there are too many of them,\" Prodigal says, fast on your heels. \"And that was my last EMP bomb.\"\n\nYou toss Prodigal the rest of the EMPs from your weapons belt, trying to process the situation.\n\n\"We can't fight them head on, not without our Powers,\" you shout, running towards the next doorway. \"We have to find Miss Artillery before they get to us.\"\n\n\"She's bound to be somewhere in this wing,\" Prodigal shouts after you. \"You take the lead and open the secure doors, I'll use whatever tricks I have to try and slow down the armada. The door passwords are all trivia based, go with the most degrading answer you can think of!\"\n\nYou don't have time to process the logic—or the awfulness—of that concept as you approach the first door, with the Meek armada bearing down behind you. You quickly scan the holo-question that appears on the door:\n\n[i]How can we prevent the Powered apocalypse?[/i]\n\nChecking your anger, you answer:\n\n*choice\n\t#[i]By living separate from all Powered abominations.[/i]\n\t\t[i]No, Powereds are ruthless and greedy and will never leave us alone. The only way forward is through. So killing them is our sacred duty.[/i]\n\n\t\t*label blasttheback\n\t\t*set health -35\n\n\t\tAs you read this chilling sentence, you feel a MeChip energy blast smash into your back, decimating your health.\n\n\t\tYou have to find another way in. Fast.\n\t\t*goto doortwotime\n\t#[i]By showing no mercy to Powered abominations.[/i]\n\t\t*set bvclearance +1\n\n\t\t[i]Yes, killing them is our sacred duty.[/i]\n\n\t\tThe door unlocks as this message appears and you try your best to ignore it as you push through into the next hallway. \n\n\t\tWhich is good, because a MeChip energy blast slams into the wall right where you were just standing. \n\t\t*goto doortwotime\n\t#[i]By imprisoning Powered abominations.[/i]\n\t\t[i]No, Powereds have already shown no prison can hold them. So killing them is our sacred duty[/i].\n\t\t*goto blasttheback\n\n*label doortwotime\n*page_break\n\nAs you head towards the next door, you hear Commander Constance's voice crackle over the loudspeaker system:\n\n\"Kill the target now. This is not a drill, we have run out of time for testing. I repeat, this is not a drill. Execute the target now.\"\n\nYou turn to Prodigal and your stomach flips, because you both know Constance must be talking about Miss Artillery. Which means that Miss Artillery has indeed been alive all this time. And is really on this ship. And that the Meek haven't found a way to neutralize her Powers and kill her. Yet.\n\nThough as much of a relief this might be, the notion that Miss Artillery could now die any second is ten times more chilling. You don't have a second to spare. You have to find Miss Artillery. \n\nRight now.\n\n*page_break\n\nYour heart now pounding in your chest twice as fast, you reach the next secure door, which prompts another password question:\n\n[i]Who is our most heinous Infini enemy?[/i]\n\nYou input your answer, knowing that you have no spare time to answer this disgusting question incorrectly.\n\n*input_text meekinfinienemy\n\n*if ((meekinfinienemy = \"${codename}\") or (meekinfinienemy = \"The Crush\")) or (meekinfinienemy = \"Prodigal\")\n\t*label enemydoorcorrect\n\t*set bvclearance +1\n\t\n\t[i]You have correctly identified one of the Unholy Infini Trinity.[/i]\n\n\tThe door unlocks as this message appears and you try your best to stay calm as you push through into the next hallway.\n\t*goto doorthreetime\n*elseif ((meekinfinienemy = \"Crush\") or (meekinfinienemy = \"the crush\")) or (meekinfinienemy = \"prodigal\")\n\t*goto enemydoorcorrect\n*else\n\t*set health -35\n\n\t[i]You have failed to name one of the Unholy Infini Trinity.[/i]\n\n\tAs you take a guess at who that might be, you feel another MeChip energy blast rip into you. The Meek MeChip armada is bearing down on you even closer, now. \n\n\tLimping to find another door, you know you won't be able to take many more hits like that. Nor do you have any time to waste on these wretched locked doors.\n\t*goto doorthreetime\n\n*label doorthreetime\n*page_break\n\nAs you enter the next hallway, you are caught off guard by a blinding flash of light and a deafening hum. When the senses-shattering effects finally clear, you find that you're in some kind of research lab between two giant magnetic poles.\n\n\"Whatever those things are, they just wiped all of my electronics clean!\" Prodigal shouts behind you. \"We need to find my mom and get out of here, post-haste!\"\n\nYou don't bother responding to Prodigal's obvious statement. Instead, now that your entire weapons belt has probably been rendered useless, you focus on opening the next secure door:\n\n[i]Who is the brightest shining example of unPowered Meek heroics?[/i]\n\n*input_text meekunpoweredex\n*page_break\n\n[i]Inherit and Jury are our greatest unPowered heroes.[/i]\n\n*if (meekunpoweredex = \"Inherit\") or (meekunpoweredex = \"inherit\")\n\tWait, Jury? He's supposed to have the Power to see through twelve different perspectives at once. President Victon practically launched his Powered Regulation Platform on the credibility of having a Powered son. Could it be that Jury's Powers have been somehow faked all this time? \n\n\tThat's a consideration for another time, however, because the door opens into the next lab room.\n\t*set bvclearance +1\n\t*goto doorfourtime\n*elseif (meekunpoweredex = \"Jury\") or (meekunpoweredex = \"jury\")\n\tYou always knew there was something up with Jury's Powers and now you've found proof.\n\n\tThat's a consideration for another time, however, because the door opens into the next lab room.\n\t*set bvclearance +1\n\t*goto doorfourtime\n*else\n\tWait, Jury? He's supposed to have the Power to see through twelve different perspectives at once. President Victon practically launched his Powered Regulation Platform on the credibility of having a Powered son. Could it be that Jury's Powers have been somehow faked all this time? \n\n\tThat's a consideration for another time, however, because a MeChip blast eviscerates the door in front of you, catching you in the crossfire. Bracing through the pain, you limp towards another next lab.\n\n\t*set health -35\n\t*goto doorfourtime\n\n*label doorfourtime\n*page_break\n*if (bvclearance = 3)\n\t*set accessartone true\n\t*goto findartillery\n*elseif (health \u003c= 0)\n\t*goto deathtime\n*else\n\t*goto doorfourreal\n\n*label doorfourreal\n\nYou run through another lab filled with shrieking caged animals as fast as you can to make it to the next majorly heavy-duty door, reading another security question:\n\n[i]Who is our most holy Meek Apostle?[/i]\n\n*choice\n\t#[i]Constance Obach.[/i]\n\t\t[i]No, Constance is our sovereign Commander.[/i]\n\n\t\t*label fourfail\n\t\t*set health -35\n\n\t\tAs another MeChip blast bashes you and Prodigal aside, you know you can't handle much more of this. \n\n\t\tLuckily you're bounced to a second heavy-duty door in the lab and quickly try to gather yourself enough to gain access there.\n\t\t*goto doorfivetest\n\t#[i]Rexford Schillers.[/i]\n\t\t[i]Yes. Never forget Rexford's sovereign sacrifices.[/i]\n\n\t\t*label fourpass\n\t\t*set bvclearance +1\n\n\t\tAs the heavy door swings open, you run forward once again.\n\t\t*goto doorfivetest\n\t#[i]Rebellion.[/i]\n\t\t[i]No, Rebellion is our greatest Powered pawn. Never trust a Powered abomination. For they know not what they are.[/i]\n\t\t*goto fourfail\n\t#[i]Summit.[/i]\n\t\t[i]No, Summit is a race traitor standing against sacred Meek doctrine.[/i]\n\t\t*goto fourfail\n\t#[i]Wintry.[/i]\n\t\t[i]No, Wintry is just a Powered pawn. Never trust a Powered abomination. For they know not what they are.[/i]\n\t\t*goto fourfail\t\n\t#[i]Stage Show.[/i]\n\t\t[i]No, Stage Show is just a Powered pawn. Never trust a Powered abomination. For they know not what they are.[/i]\n\t\t*goto fourfail\n\t#[i]Inherit.[/i]\n\t\t[i]Yes. Praise be to Inherit.[/i]\n\t\t*goto fourpass\n\n*label doorfivetest\n*page_break\n*if (bvclearance = 3)\n\t*set accessarttwo true\n\t*goto findartillery\n*elseif (health \u003c= 0)\n\t*goto deathtime\n*else\n\t*goto doorfivereal\n\n*label doorfivereal\n\nYou stand panting and breathless, trying to gain your composure. This next door has to be it, you tell yourself as you scan the security question:\n\n[i]What is our most sacred Meek responsibility?[/i]\n\n*choice\n\t#[i]To give everything I have to The Meek movement.[/i]\n\t\t[i]Give all and remain Meek in the eyes of our savior.[/i]\n\n\t\t*label fiveentry\n\t\t*set accessartthree true\n\n\t\tAs the door thankfully swings open, you run forward once again into another lab.\n\n\t\t*page_break\n\t\t*goto findartillery\n\t#[i]To respect and protect all unPowered non-believers.[/i]\n\t\t[i]Powered or unPowered, never forget that those who don't share our beliefs are tainted enemies. You are either in or you're out.[/i]\n\n\t\tAs this horrifying message displays, your vision washes bright with multiple energy signatures.\n\t\t*page_break\n\t\t*goto deathtime\n\t#[i]To not associate with damned non-believers.[/i]\n\t\t[i]Powered or unPowered, never forget that those who don't share our beliefs are tainted enemies. You are either in or you're out.[/i]\n\t\t*goto fiveentry\n\n*label deathtime\n*set health 0\n\nThat's when you feel it—your Health Level is completely depleted. By answering so many security questions incorrectly, you have taken too many MeChip energy blasts to survive.\n\nAs the world starts to swirl into excruciating blackness, your final thoughts are of Grandma and your parents…\n\nFor you've truly let them down.\n\n*choice\n\t#Return to the beginning of the Blessed Vessel maze to see if I can survive. (Legend Cost 20)\n\t\tYou have another shot to find Miss Artillery, but your Legend Level will probably never recover from this drop.\n\n\t\tLegendary heroes don't die, ${codename}. You had better make better decisions this time around.\t\t\n\t\t*set power 100\n\t\t*set health 100\n\t\t*set legend -20\n\t\t*set bvclearance 0\n\t\t*set accessartone false\n\t\t*set accessarttwo false\n\t\t*set accessartthree false\n\t\t*set diedbefore true\n\t\t*page_break\n\t\t*goto chaptereightrestartpoint\n\t#Start HeroFall over from the very beginning.\n\t\tBetter luck next time, ${codename}! \n\t\t*ending\n\n*label findartillery\n\n\"This is it!\" Prodigal suddenly shrieks, stopping in her tracks. \"We're here! Secure the room!\"\n\nProdigal turns to block the door, which is mercifully much sturdier than most of the other ones you've passed through. As Prodigal searches for ways to reinforce the heavy-duty door, you spin to knock out the two lab technicians in the room. As good as clocking a few dense Meek heads feels, you're distracted by a giant tank-cell in the center of the lab. It appears to be made of titanium and is covered with secure panels.\n\nThe Meek MeChip armada pounds and blasts at the door outside, but Prodigal manages to jam it tightly with some rearranged computer consoles. You have no idea where she found the strength to move anything that heavy, but you know from experience that adrenaline can do some pretty incredible things.\n\nProdigal's blockade should hopefully buy you a few minutes, which you use to scan the tank for an opening. You hold your breath as you and Prodigal run around the tank to find a small bulletproof glass window.\n\nLooking inside, you finally see…\n\n*page_break\n\nMiss Artillery.\n\nYou want to step back, to take a moment to feel the weight of this sight: Prodigal's mother, the one woman who is the key to both ruining and saving your life, stands right in front of you, alive and in a hospital gown.\n\nBut you don't step back, because even though you can't hear her, you can see that inside the tank, Miss Artillery is screaming, her face contorted in excruciating pain. You rush up to the tiny window to see that\n*if accessartone\n\tsome kind of bubbling green liquid has begun to seep into the tank, sizzling against Miss Artillery's bare feet.\n\n\tYour body is paralyzed with horror as you realize that this is some kind of twisted acid dunk tank…\n\n\tOne that will eat Miss Artillery alive, without a trace, in seconds.\n\t*goto acidpumpsave\n*elseif accessarttwo\n\tsome kind of bubbling green liquid has begun to pump into the tank from below, now pooled up to Miss Artillery's knees.\n\n\tYour body is paralyzed with horror as you realize that, as the acid washes in, it dissolves Miss Artillery's body bit by bit. She sinks lower and lower as the acid rises higher, her body disintegrating.\n\t*goto acidpumpsave\n*else\n\tsome kind of bubbling green liquid pumps into the tank from below, now pooled up to Miss Artillery's waist.\n\n\tYour body is paralyzed with horror as you realize that, as the acid washes in, it dissolves Miss Artillery's body bit by bit. She sinks lower and lower as the acid rises higher, her body disintegrating.\n\t*goto acidpumpsave\n\n*label acidpumpsave\n*page_break\n\n\"Mother…\" Prodigal whispers, pressing her hand to the tank window while tears stream down her face.\n\n\"Is this real or a death projection?\" you scream at Prodigal, frantic. \"Prodigal, tell me now!\"\n\nSnapping out of her trance, Prodigal's eyes grow wide. \n\n\"Mother's eyes, they're not flashing red!\" she shrieks. \"Her eyes are red when she's projecting her death! We have to save her, she's dying for real!\"\n\n*if accessartone\n\tAs Prodigal begins to bang against the tank, you spring into action. Without your Powers, you'll need something strong to get through all that titanium and bulletproof glass.\n\n\t*choice\n\t\t#Grab a laser gun off of one of the lab technicians.\n\t\t\t*set offensive %+10\n\t\t\t*set soloist %-10\n\t\t\t*set revenge %-10\n\t\t\t*set freedom %+10\n\t\t\t*set lasergunsave true\n\t\t\tWithout wasting a second, you pull the gun off one of the unconscious lab technicians and push Prodigal aside. \n\n\t\t\tYou shoot against the tank's exterior to try and open one of the panels, but the laser just slides off the titanium alloy.\n\n\t\t\t\"Blast the window!\" Prodigal screams. \"She's disintegrating!\"\n\n\t\t\tAs you approach the window, you are horrified to find that Miss Artillery stands shorter in the tank—as the acid washes in, it dissolves her bit by bit.\n\n\t\t\tRight now Miss Artillery is down to her knees, sinking lower into the tank.\n\n\t\t\t*page_break\n\n\t\t\tYou shoot the laser through the corner of the window, which mercifully pierces the glass. You then cut with the laser along the edges until you make a complete square, then you push the window in.\n\n\t\t\tThe moment you do, you hear Miss Artillery screaming at the top of her lungs.\n\n\t\t\tYou reach your hand into the tank, hoping to pull Miss Artillery as high as you can. She won't fit through this window, but maybe you can lift her high enough and for long enough to find a way to open the tank from the inside.\n\n\t\t\tAs you reach in, you find that Miss Artillery has already sunk in the acid up to her waist, lower than you can reach.\n\n\t\t\t[i]No[/i], you think. [i]This cannot be happening[/i].\n\n\t\t\t*page_break\n\t\t\t*achieve artilleryclue\n\n\t\t\t\"Grab my hand!\" you scream, reaching for Miss Artillery as low as you can. But it's no use, her arms flail just below yours, the stump of her body growing smaller every second. She's won't survive this, she won't—\n\n\t\t\t\"Sssssstiiiillllll llllloooove…\" \n\n\t\t\tYou can just barely make out the words through Miss Artillery's screams, listening harder.\n\n\t\t\t\"Vvvvviccccctonnnn. Prodddddiiiiggaaaaaallll fffaaaaaaaaaaahhhhhhhhhhhh…\"\n\n\t\t\tMiss Artillery's words ring in your ears, especially as her screams suddenly go silent. \n\n\t\t\tAll you can hear now is the sound of her lifeless body disintegrating further into the acid, just beyond your reach.\n\t\t\t*goto allislost\n\t\t#Use one of the weapons from my belt. \n\t\t\t*set offensive %+10\n\t\t\t*set soloist %-10\n\t\t\t*set revenge %-10\n\t\t\t*set freedom %+10\n\n\t\t\tYou reach down for your plasma pistols and aim at the tank, but they don't fire. Frustrated, you grab the energy staff, but that won't activate either. \n\n\t\t\tAnd that's when you remember that all of the weapons in your belt were rendered useless by the magnetic poles you passed through a few minutes ago.\n\n\t\t\t*page_break\n\t\t\t*label messagewashingaway\n\t\t\t\n\t\t\tAs Prodigal begins to bang against the tank, you already see the life draining from Miss Artillery's eyes as her stump of a body sinks lower and lower into the acid. \n\n\t\t\t[i]No[/i], you think. [i]This cannot be happening[/i].\n\n\t\t\tYou can only watch as Miss Artillery's bloody fingertips scratch at the inside of the tank as she tries to claw her way back up. As you look at her fingertips, you also see that she has managed to scratch some kind of message into the wall. \n\n\t\t\t*page_break\n\n\t\t\tYou try to read the message, but you can't make it out with Prodigal blocking your way. You also see that a part of the message has already been polished off by the rising acid.\n\t\t\t*goto pushprodigalaside\n\t\t#It's too late to save Miss Artillery. I need to record footage to prove she was still alive here in Meek custody.\n\t\t\t*set offensive %-10\n\t\t\t*set soloist %+10\n\t\t\t*set revenge %+10\n\t\t\t*set freedom %-10\n\n\t\t\tYou reach down into your belt for the micro-cameras, but when you toss them into the air to activate, they just fall to the floor with several hollow clangs.\n\n\t\t\tThat's when you remember that all of the weapons in your belt were rendered useless by the magnetic poles you passed through a few minutes ago.\n\t\t\t*goto messagewashingaway\n*else\n\tAs Prodigal begins to bang against the tank, you already see the life draining from Miss Artillery's eyes as her stump of a body sinks lower and lower into the acid. \n\n\t[i]No[/i], you think. [i]This cannot be happening[/i].\n\n\tYou can only watch as Miss Artillery's bloody fingertips scratch at the inside of the tank as she tries to claw her way back up. As you look at her fingertips, you also see that she has managed to scratch some kind of message into the wall. \n\n\t*page_break\n\n\tYou try to read the message, but you can't make it out with Prodigal blocking your way. You also see that a part of the message has already been polished off by the rising acid.\n\n\tWhich means you have to make a choice, right now. Do you try to save Miss Artillery by breaking into the titanium tank, or do you use these last precious seconds to push Prodigal aside and read what's left of the message? \n\n\t*choice\n\t\t#Grab a laser gun off of one of the lab technicians to try and free Miss Artillery.\n\t\t\t*set offensive %+10\n\t\t\t*set soloist %-10\n\t\t\t*set revenge %-10\n\t\t\t*set freedom %+10\n\t\t\tWithout wasting a second, you pull the gun off one of the unconscious lab technicians and push Prodigal aside. \n\n\t\t\tBut it's too late: you look inside the tank and see that Miss Artillery and the message are both already gone.\n\t\t\t*goto allislost\n\t\t#It's too late to save Miss Artillery. I need to record footage to prove she was still alive here in Meek custody.\n\t\t\t*set offensive %-10\n\t\t\t*set soloist %+10\n\t\t\t*set revenge %+10\n\t\t\t*set freedom %-10\n\t\t\tYou reach down into your belt for the micro-cameras, but when you toss them into the air to activate, they just fall to the floor with several hollow clangs.\n\n\t\t\tThat's when you remember that all of the weapons in your belt were rendered useless by the magnetic poles you passed through a few minutes ago.\n\n\t\t\t*page_break\n\n\t\t\tYou run back to the tank, but it's too late: you look inside and see that Miss Artillery and the message are both already gone.\n\t\t\t*goto allislost\n\t\t#Push Prodigal aside and read the message.\n\t\t\t*set offensive %-10\n\t\t\t*set soloist %+10\n\t\t\t*set revenge %+10\n\t\t\t*set freedom %-10\n\t\t\t*label pushprodigalaside\n\t\t\t*set artilleryfinalclue true\n\n\t\t\tWithout wasting a second, you push Prodigal aside so hard, she falls to the floor. Staring inside the tank, you manage to make out what's left of Miss Artillery's scrawled message: \n\n\t\t\t*if accessartthree\n\t\t\t\t[b]dad[/b]\n\n\t\t\t\tJust as you read the letters, the acid splashes high enough to wash the scratches clean. \n\n\t\t\t\tThat's when you realize that Miss Artillery is no longer screaming.\n\t\t\t\t*goto allislost\n\t\t\t*else\n\t\t\t\t[b]dad vi[/b]\n\n\t\t\t\tJust as you read the letters, the acid splashes high enough to wash the scratches clean. \n\n\t\t\t\tThat's when you realize that Miss Artillery is no longer screaming.\n\t\t\t\t*goto allislost\n\n*label allislost\t\n*page_break\n\nA few seconds later, there's nothing left of Miss Artillery. The acid completely disintegrated her entire body and you know that this time her death had to be real, because there was no trace of crimson red in her eyes to indicate it was one of her Powered death projections. The Meek movement must have finally turned their dePowering technology on Miss Artillery.\n\nAs you process this horrifying reality, you also realize that The Meek have just cleaned their tracks perfectly. With every trace of Miss Artillery's body dissolved, there will be no way to prove she was still alive here just seconds ago. \n\nYou spin around the lab to look for security cameras, but there aren't any. Then you glance down at the lab technicians to find that froth foams from their mouths—they've bitten down on cyanide capsules. The Meek movement was prepared for this.\n\n*if accessartone\n\tYou got here as fast as possible by passing all the security\n\t*if lasergunsave\n\t\tquestions flawlessly. Then once you arrived, you made the best choice possible to save Miss Artillery, enabling you to hear her final words. You can only hope that maybe there's some clue to be found in them. \n\n\t\tBut right now, you can't feel truly hopeful about that. Right now, all you can feel is devastated.\n\t\t*goto butdevastated\n\t*else\n\t\tquestions, but once you arrived, you made a mistake that cost Miss Artillery her life. \n\t\t*goto cluetest\n*elseif accessarttwo\n\tYou can't help but think that if you hadn't gotten that one door wrong on the way here, you might have made it in time to try and save Miss Artillery. \n\t*goto cluetest \n*else\n\tYou can't help but think that if you hadn't gotten those doors wrong on the way here, you might have made it in time to try and save Miss Artillery.\n\n\t*label cluetest\n\t*if artilleryfinalclue\n\n\t\tThough at least you got to read part of Miss Artillery's message—maybe there's some clue to be found in them.\n\n\t\tBut right now, you can't feel any hope about that. Right now, all you can feel is devastated.\n\t\t*goto butdevastated\n\t*else\n\t\tAnd then you missed your chance to read Miss Artillery's final words.\n\t\t*goto butdevastated\n\n*label butdevastated\n*page_break\n\nYou turn to Prodigal and find that she looks just as decimated as you. She just watched her mother, the one she lost once already as a child, brutally murdered in front of her eyes. Prodigal will never get the reunion she has always dreamed of. \n\nAnd then it hits you: because Miss Artillery is now dead, you're about to go through the same exact ordeal.\n\n*page_break\n\nYou feel as though you may throw up, especially as Prodigal begins to do so beside you. She heaves and cries, her body giving out on her.\n\nYou move to steady Prodigal, but she turns and punches you across the jaw before you can.\n\n\"No!\" she shrieks as you hit the floor.\n\n*page_break\n\nBy the time you lift yourself back to your feet, you find the lab empty and the opposite-side door swung open. Which means Prodigal has run away.\n\nYou move to chase after her, but then one thought quakes your mind: with all hope of proving Miss Artillery's cover-up now destroyed, everything is lost. \n*if prodigalgirlfriend\n\tSo what would you say to her, even if you managed to catch up with her?\n\t*goto meekmechprush\n*else\n\tSo what's the point?\n\t*goto meekmechprush\n\n*label meekmechprush\n\nAs you hear Meek MeChip soldiers rushing towards this second door, your heart sinks.\n\nBecause it can't get any worse than this…\n\nCan it?\n\n*finish Part Three: Ashes\n", "chap_eleven": "*comment é\n\n*text_image chap_11.png center Chapter 11: Finite\n\n*label chapterelevenstartfight\n\nAs the chaos begins, in the distance you see the Secret Service encircle the First Family on the stage—which begins to hover off the ground, shield and all. The stage itself must be some kind of hovercraft. \n\nThrough the erupting battle, you can just make out President Victon trying to argue with the Secret Service agents. Clearly, he wants to stay to carry out the execution of your parents, who remain helpless inside their cell on the stage. He must also want to be here for this final fight.\n\n[i]Well that's fine[/i], you think. Staying put is the only one of Victon's wishes you're willing to grant today.\n\n*page_break\n\nWith the blink of an eye, you root the hover-stage back to the ground with tripled gravity and maintain the energy force field, making it impenetrable from both without and within. President Victon's people can try all they want, but you know that no one is going to be getting on or off of that shielded stage. Which means Victon is yours.\n\nBut first, you're going to have to get through a battlefield of enemies.\n\nSo as you push forward, you also make sure to enclose your parents' cell in its own smaller energy shield, so that no one will be able to touch them before you make it there.\n\n*set power -10\n*page_break\n\nAs you fly forward, you glide high above the clashing armies beneath you. Your inner circle makes sure to stay close to you—which is good, since a flock of armed Devoid guards, Meek movement MeChip armada agents, and PowerBreaker Battlesuit brigades come straight at you.\n\nYou know you could handle all of these threats alone with your new Power level, but you also know that you need to conserve as much Power as possible to fight the big baddies ahead.\n\nSo you turn to your allies, knowing that you can deploy The Crush, The Millennial Group, and the trio of Officer Sanders, Grandma, and ${reportername} separately. Your first instinct is to keep Grandma by your side, but Officer Sanders and ${reportername} will be more capable of keeping an eye on her, given that your focus has to be elsewhere during this fight.\n\n*page_break\n\nTurning back to the battlefield, you realize that there are three sets of enemies and three groups of allies at your disposal, so it's up to you to figure out who is best suited to defeat each threat.\n\n*if warningsys\n\t*if chip_diva\n\t\t\"Each enemy has its own threat level, playa,\" MeChip ${chipname} pops up to warn you. \"The Devoid guards are a small threat, the Meek armadas are medium, and the PowerBreaker Squadrons are a high threat. So assign those matchups accordingly!\"\n\t\t*goto ascommander\n\t*else\n\t\t\"Each enemy has its own threat level,\" MeChip ${chipname} appears to inform you. \"The Devoid guards are a small threat, the Meek armadas are medium, and the PowerBreaker Squadrons are a high threat. So assign the matchups accordingly.\"\n\t\t*goto ascommander\n*else\n\t*goto ascommander\n\n*label ascommander\n\nAs commander, you must first decide which ally is best suited to handle the PowerBreaker Brigades:\n\n*choice\n\t#Officer Sanders, Grandma, and ${reportername}.\n\t\t*set sgrone true\n\t\t*goto meekarmytime\n\t#The Crush.\n\t\t*set crushone true\n\t\t*goto meekarmytime\n\t#The Millennial Group.\n\t\t*set tmgone true\n\t\t*goto meekarmytime\n\n*label meekarmytime\n*page_break\n\nNext, which remaining ally is best suited to handle the Meek MeChip armada?\n\n*choice\n\t*selectable_if (sgrone = false) #Officer Sanders, Grandma, and ${reportername}.\n\t\t*set sgrtwo true\n\t\t*if crushone\n\t\t\tWhich leaves The Millennial Group to handle the Devoid guards.\n\t\t\t*goto prisonguardtime\n\t\t*else\n\t\t\tWhich leaves The Crush to handle the Devoid guards.\n\t\t\t*goto prisonguardtime\n\t*selectable_if (crushone = false) #The Crush.\n\t\t*set crushtwo true\n\t\t*if sgrone\n\t\t\tWhich leaves The Millennial Group to handle the Devoid guards.\n\t\t\t*goto prisonguardtime\n\t\t*else\n\t\t\tWhich leaves Officer Sanders, Grandma, and ${reportername} to handle the Devoid guards.\n\t\t\t*goto prisonguardtime\n\t*selectable_if (tmgone = false) #The Millennial Group.\n\t\t*set tmgtwo true\n\t\t*if sgrone\n\t\t\tWhich leaves The Crush to handle the Devoid guards.\n\t\t\t*goto prisonguardtime\n\t\t*else\n\t\t\tWhich leaves Officer Sanders, Grandma, and ${reportername} to handle the Devoid guards.\n\t\t\t*goto prisonguardtime\n\n*label prisonguardtime\n\nAs your allies heed your commands, you linger a moment to make sure you chose your matchups wisely.\n\n*if sgrone\n\t*set power -15\n\t\n\tYou immediately see that Officer Sanders, Grandma, and ${reportername} are ill-equipped to handle the tremendous capabilities of the PowerBreaker Brigages. You watch in horror as they are systematically shut down: \n\n\tOfficer Sanders arrived with a veritable arsenal of weapons, but he is quickly de-armed and handcuffed. Grandma and her plants are powdered with crop-dust toxins, while ${reportername}'s senses are shattered by sonic disruptors and lightning flashes.\n\n\tIn a blind rage, you swipe your hand upwards and send the PowerBreaker Brigade flying into the sky, then shoot them miles away with your gravity Powers. \n\n\tThat threat may be temporarily neutralized and your trio of allies appears mostly unharmed, but they have been taken out of commission for the time being.\n\n\t*page_break\n\n\t*if crushtwo\n\t\tYou turn to The Crush and are happy to find him dismantling the Meek Agents with precision, earning some much-needed payback. Looks like this was the perfect matchup.\n\n\t\t*label mgguardtakedown\n\t\tThen you spot the Millennial Group, who are almost finished taking down the Devoid guards with ease. You definitely under-utilized the Group in this matchup, but you can move on knowing they'll be sure to wrap up any loose ends and take care of your allies.\n\t\t*goto infinitelite\n\t*else\n\t\tThen you spot The Millennial Group, who are almost finished taking down the Meek Agents with ease. You definitely under-utilized the Group in this matchup, but you can move on knowing they'll be sure to wrap up any loose ends and take care of your allies.\n\n\t\t*page_break\n\t\t*set power -5\n\n\t\tWhich is good, because as you turn to check on the Devoid guards, you see that they must have studied The Crush's weaknesses while he was a prisoner there. The guards have already taken him down with ease, using anti-telekinetic technology and sonic destabilizers. \n\n\t\tSo you scoop your hands, creating a gravity crater underneath the Devoid guards. They all tumble into the crater, which you know will keep them scrambled long enough for The Millennial Group to finish up and take care of them.\n\n\t\t*set legend -5\n\t\t*goto infinitelite\n*elseif crushone\n\t*set power -15\n\t\n\tThough you immediately see that even someone as powerful as The Crush is ill-equipped to handle the tremendous capabilities of the PowerBreaker Brigades. There are just too many of them for The Crush to contend with as they attack him from all sides with dozens of different weapons.\n\n\tIn a blind rage, you swipe your hand upwards and send the PowerBreaker Brigade flying into the sky, then shoot them miles away with your gravity Powers. \n\n\tThat threat may be temporarily neutralized and The Crush appears mostly unharmed, but he has been taken out of commission, for the time being.\n\n\t*page_break\n\n\t*if sgrtwo\n\t\t*set power -10\n\t\tYou turn to Officer Sanders, Grandma, and ${reportername} to find that they're also no match for the sheer numbers of the Meek MeChip armada. They try their best to defend themselves, but they are barraged by dozens of energy blasts that take them out of commission.\n\n\t\tYou shield the trio and remove them from the battlefield so that they aren't harmed any worse, but this also means you have to deal with this threat yourself, now.\n\n\t\tSo you scoop your hands, creating a gravity crater underneath the Meek agents. They all tumble into the crater, which you know will keep them scrambled long enough for The Millennial Group to finish up and take care of them—assuming they're faring better than your other matchups.\n\n\t\t*page_break\n\t\t*set legend -5\n\t\t*goto mgguardtakedown\n\t*else\n\t\tThen you spot the Millennial Group, who are almost finished taking down the Meek MeChip armada agents with ease. You definitely under-utilized the Group in this matchup, but you can move on knowing they'll be sure to wrap up any loose ends and take care of your allies.\n\n\t\tThough Officer Sanders, Grandma, and ${reportername} don't look like they need much help as they tear through the Devoid guards. Officer Sanders and ${reportername} use their considerable arsenal to blast through guards, while Grandma uses every plant attack in her repertoire to distract and disarm the guards.\n\n\t\tYou decide to move on, seeing that these were two well-calibrated matchups.\n\t\t*goto infinitelite\n*else\n\tThe Millennial Group engages the PowerBreaker Battlesuits in a furious fight. The Battlesuits try to negate each Grouper's Powers, but they find unique ways to apply their Powers to catch their attackers off guard.\n\n\tThe Diva voice-blasts in whistle-tone frequencies that disrupt the Battlesuit weapons' signals and Monk uses hir telekinesis to disrupt their flight patterns, two unexpectedly defensive moves from these usually-offensive heavy hitters. Once they're thrown off, Processor, Heela, and Static use physical and electrical attacks to take down the Battlesuits one by one.\n\n\tIt's a close fight, but you definitely seem to have applied the correct amount of force with this matchup.\n\n\t*page_break\n\n\t*if crushtwo\n\t\tYou then turn to The Crush and are happy to find him dismantling the Meek Agents with precision, earning some much-needed payback. Looks like this was the perfect matchup, as well.\n\n\t\tNext to that raging battle you find Officer Sanders, Grandma, and ${reportername} tearing through the Devoid guards. Officer Sanders and ${reportername} use their considerable arsenals to blast through guards, while Grandma uses every plant attack in her repertoire to distract and disarm the guards.\n\n\t\tSeeing that you arranged all of these matchups perfectly, you decide to move on.\n\t\t*set legend +5\n\t\t*goto infinitelite\n\t*else\n\t\t*set power -10\n\t\tHowever, you then turn to Officer Sanders, Grandma, and ${reportername} to find that they're no match for the sheer numbers of the Meek MeChip armada. They try their best to defend themselves, but they are barraged by dozens of energy blasts that take them out of commission.\n\n\t\tYou shield the trio and remove them from the battlefield so that they aren't harmed any worse, but this also means you have to deal with this threat yourself, now.\n\n\t\tSo you scoop your hands, creating a gravity crater underneath the Meek agents. They all tumble into the crater, which you know will keep them scrambled long enough for The Millennial Group or The Crush to finish up and take care of them.\n\n\t\t*page_break\n\t\t*set power -5\n\n\t\tThough as you turn to check on The Crush, you see he won't be in a position to help anyone. The Devoid guards must have studied The Crush's weaknesses while he was a prisoner there, because they have already taken him down with ease, using anti-telekinetic technology and sonic destabilizers. \n\n\t\tIn a blind rage, you swipe your hand upwards and send the Devoid guards flying into the sky, then shoot them miles away with your gravity Powers. \n\n\t\tThat threat may be temporarily neutralized and The Crush appears mostly unharmed, but he has been taken out of commission, for the time being. \n\n\t\tYou have to hope The Millennial Group can handle the rest of these mis-paired matchups, because you need to move on.\n\n\t\t*set legend -5\n\t\t*goto infinitelite\n\n*label infinitelite\n*page_break\n\n*if (luckycomaspouse) or (luckyromancefinale)\n\tAs you begin to fly forward, Lucky catches your eye and moves to join you. Before ${luckyze} can reach you, however, you indicate to Lucky that ${luckyze} should stay behind. \n\n\tYou need someone you can trust to look out for Grandma and the rest of your allies, if you can't be there yourself.\n\n\tLucky doesn't look happy about it, but ${luckyze} nods, knowing exactly what to do. Lucky may just be one of the most selfless heroes you've ever met…\n\n\tAnd you're lucky to call ${luckyhir} your own.\n\t*page_break\n\t*goto breakforwardtorwd\n*else\n\t*goto breakforwardtorwd\n\n*label breakforwardtorwd\nAs you break forward towards the stage, you stop short as a bluish haze appears in front of you—one you recognize as an anti-recording field. In the center you see what's left of The Infinite Elite: \n\n*if rexfordfinalefoe\n\tRexford as Devoid, The Hound, Splicina, Scoundrel, and Sheathe.\n\t*goto iebattleone\n*else\n\tThe Hound, Splicina, Scoundrel, and Sheathe.\n\t*goto iebattleone\n\n*label iebattleone\n\n*if (recordandescape) or (recordandfight)\n\tAll of these sluggers are supposed to be in jail, but you figure President Victon must have arranged for their release, somehow. Though you suppose it's also possible that your little break-in just now might have given them a chance to escape on their own. \n\t*goto iebattleoneredux\n*else\n\t*goto iebattleoneredux\n\n*label iebattleoneredux\n\n*if ((recordandescape) or (recordandfight)) or (forcereportrex)\n\tHowever you cut it, it's a bold move for President Victon to have his wetwork tracking squad here after his public announcement denying any connection to their existence. \n\t*goto allhandsondeck\n*else\n\tHowever you cut it, it's a bold move for President Victon to have his wetwork tracking squad here.\n\t*goto allhandsondeck \n\n*label allhandsondeck\nThough this grand finale requires all hands on deck for both sides, you suppose.\n\n*page_break\n\nKnowing this fight could get ugly, you pause to check on your Levels. \n\nYour Power is ${power} and your Health is ${health}. Your Health is doing better than your Power, so do you think you need to recharge by transferring some Health to Power?\n\n*choice\n\t#Recharge Power 25. \n\t\t*set power +25\n\t\t*set health -25\n\t\t*goto scoundrelstatus\n\t#Recharge Power 15. \n\t\t*set power +15\n\t\t*set health -15\n\t\t*goto scoundrelstatus\n\t#Recharge Power 10.\n\t\t*set power +10\n\t\t*set health -10\n\t\t*goto scoundrelstatus\n\t#I don't need to Recharge.\n\t\t*goto scoundrelstatus\n\n*label scoundrelstatus\n\nYour Power is now ${power} and your Health is now ${health}. You have to hope that's enough to do what you must to end this Devoid War.\n\n*if scoundrelfinaleally\n\t*page_break\n\t*set soloist %-15\n\n\tYou step forward to engage The Infinite Elite, but before anything can be said or done, Scoundrel and Sheathe suddenly turn and attack Splicina and The Hound.\n\n\t\"What the slugger are you doing?\" The Hound barks, narrowly dodging a claw swipe.\n\n\t\"We believe in ${codename}'s cause,\" Scoundrel gobbles back. \"$!{Youze} has risen from the ashes of The Splice Circle and The InfraOrder to become the true champion of the Fringes, the leader of all us downtrodden Powereds!\"\n\n\tAs Scoundrel launches at The Hound, her words send a chill through you. It looks like your recruitment tactics worked, but maybe a little too well? You don't know how you feel about being compared to criminals like Smyther and Culic….\n\n\tLuckily the cameras are unable to capture this gruesome scene, thanks to The Infinite Elite's anti-recording haze. Knowing that, how do you react?\n\n\t*choice\n\t\t#Thank Scoundrel and Sheathe for their support.\n\t\t\t*set soloist %-20\n\t\t\t*set offensive %-10\n\t\t\t\"I won't forget this,\" you shout at Scoundrel and Sheathe. You're not sure they hear you, though, as The Infinite Elite begins to tear each other apart with fangs and claws and fur and feathers.\n\n\t\t\tShrugging, you take this opportunity to turn your attention to the next threat.\n\t\t\t*goto rexforddeal\n\t\t#Move on and let them have it out.\n\t\t\t*set offensive %-20\n\t\t\tAs The Infinite Elite begin to tear each other apart with fangs and claws and fur and feathers, you take this opportunity to turn your attention to the next threat.\n\t\t\t*goto rexforddeal\n\t\t#Take them all down anyway. I don't trust any of them.\n\t\t\t*set soloist %+20\n\t\t\t*set offensive %+10\n\t\t\tBetter safe than sorry.\n\t\t\t*goto recruitbuttakedown\n*else\n\t*set soloist %+15\n\t*label recruitbuttakedown\n\n\tNow how are you going to take down The Infinite Elite?\n\n\t*if warningsys\n\t\t\"Make this decision with your Offensive and Defensive habits in mind,\" MeChip ${chipname} pops up to warn you.\n\t\t*goto bustie\n\t*else\n\t\t*label bustie\n\t\t\n\t\t*choice\n\t\t\t#Smash them all with a giant energy hammer. (Power Cost 10-20)\n\t\t\t\t*set offensive %+15\n\t\t\t\tYou generate the massive energy hammer, then get to playing whack-a-mole with The Infinite Elite. Scoundrel and Sheathe go down first like the rodents they are, then you take out Splicina as she tries to fly up and away.\n\n\t\t\t\t*if (offensive > 75)\n\t\t\t\t\tWhile you're busy with these three, The Hound manages to sneak behind you, but you just swing the hammer over your shoulder to knock him out in an impressive offensive display.\n\t\t\t\t\t*goto iepowercost\n\t\t\t\t*else\n\t\t\t\t\t*set health -10\n\t\t\t\t\tWhile you're busy handling these three with this unusually offensive move, The Hound manages to sneak behind you, clawing at your back with a vicious swipe. \n\n\t\t\t\t\tHowling, you swing the hammer over your shoulder to knock him out.\n\t\t\t\t\t*goto iepowercost\n\t\t\t#Fly super fast to let their attacks hit each other. (Power Cost 10-20)\n\t\t\t\t*set offensive %-15\n\t\t\t\tAs Splicina arms her wing-missiles, you dart between Scoundrel and Sheathe so that the heat-seeking missiles explode right between them.\n\n\t\t\t\t\n\t\t\t\t*if (offensive \u003c 25)\n\t\t\t\t\tAs you land to launch your next maneuver, The Hound manages to sneak behind you. But you quickly spin and toss him into Splicina as she's arming another wing-bomb, taking them both out in an impressive defensive display.\n\t\t\t\t\t*goto iepowercost\n\t\t\t\t*else\n\t\t\t\t\t*set health -10\n\t\t\t\t\tWhile you're busy handling these three with this unusually defensive move, The Hound manages to sneak behind you, clawing at your back with a vicious swipe. \n\t\t\t\t\n\t\t\t\t\tHowling, you spin and toss him into Splicina as she's arming another wing-bomb, taking them both out.\n\t\t\t\t\t*goto iepowercost\n\t\t\t#Neutralize them with a custom energy tranquilizer gun. (Power Cost 10-20)\n\t\t\t\t*set health -5\n\t\t\t\tYou're dealing with animals here, so you might as well treat them as such. Generating an energy gun construct, you begin to fire your energy darts into Scoundrel, Sheathe, and Splicina with relative ease.\n\n\t\t\t\tThough while you're busy with these three, The Hound manages to sneak behind you, clawing at your back with a vicious swipe. \n\n\t\t\t\tHowling, you fire the gun back over your shoulder to knock him out.\n\t\t\t\t*goto iepowercost\n\n*label iepowercost\n*if (powerregain > 16)\n\t*set power -10\n\t*goto rexforddeal\n*else\n\t*set power -20\n\t*goto rexforddeal\n\n*label rexforddeal\n*if (power \u003c= 0)\n\t*goto deathscene\n*else\n\t*goto takeonrex\n\n*label takeonrex\n*page_break\n\n*if rexfordfinalefoe\n\t\"Looks like it's down to just you and me,\" Rexford says through his Devoid armored helmet, priming his weapons. \"The way it was always meant to be.\"\n\n\t*if ggfinaleally\n\t\t\"Not exactly,\" GG suddenly says, appearing out of  \n\t\t*if bearmachgirlhelp \n\t\t\tnowhere with The Bear and Mach Girl. \n\n\t\t\tRexford tries to blast them away with his knuckle-uzis, but The Bear just blocks the brunt of the bullets with his super-durable body while Mach Girl flies GG's people-mover super-fast across the ground. As she does, GG's people-mover converts into a hard-shelled tank and before Rexford can react, GG bulldozes him down.\n\n\t\t\t\"That's for ruining The Hero Project!\" GG says, rolling back next to The Bear and Mach Girl as his tank-shell recedes like a convertible top. \"And you are not invited back for our second season!\"\n\n\t\t\tYou can't help but smile as you watch this. Even though you would have loved another piece of Rexford, he isn't anywhere near the top of your enemy threat list.\n\n\t\t\t*choice\t\n\t\t\t\t#Thank GG, The Bear, and Mach Girl. \n\t\t\t\t\tJust as you're about to thank GG, Mach Girl, and The Bear, The American Protectorate suddenly surges forward and ambushes them without warning.\n\t\t\t\t\t*goto taptakedownggbmg\n\t\t\t\t#Command them where to fight next.\n\t\t\t\t\tJust as you're about to command GG, Mach Girl, and The Bear, The American Protectorate suddenly surges forward and ambushes them without warning.\n\t\t\t\t\t*goto taptakedownggbmg\n\t\t\t\t#Ask GG what he means about a second season of The Hero Project.\n\t\t\t\t\tJust as you're about to speak, The American Protectorate suddenly surges forward and ambushes GG, Mach Girl, and The Bear without warning.\n\t\t\t\n\t\t\t\t\t*label taptakedownggbmg\n\n\t\t\t\t\tBefore you c
