hapters end: Victon is no longer a Judge, a Mayor, or a President. Victon is now just\n*if finalekillvicton\n\tdead, thanks to you.\n\t*achieve killedvicton\n\n\tAfter you killed the President of the United States on live 3V, the nation was sent into a tailspin of anarchy. It seems your actions sparked a flame that spread across the country, signaling to the rest of the world that America was weakening. America seemed on the brink of war, both internally and internationally.\n\n\tIt took many months and many shows of power from you personally, but as of now, things have finally stabilized. What happens to the nation from here out will be on you, for better or worse. And with the nation teetering on the brink of such instability, you have no idea what that means for your career, moving forward.\n\n\t*page_break\n\n\tHowever, you do know this much: thanks to your actions, your family is safe from any Victon threat forever. If the price for that is this unsteady national shift, it's something you're just going to have to live with.\n\n\tGiven all that has happened, how do you feel about killing Victon?\n\n\t*choice\n\t\t#I wish I didn't have to, but my family would never be safe so long as President Victon was alive. It was a necessary last resort.\n\t\t\t*set lawless %+10\n\n\t\t\t*label nevercondone\n\t\t\tYou'd never condone murder, but this was an extremely special situation that calls for special measures.\n\n\t\t\tWhatever happens next, you're going to stand by your actions.\n\t\t\t*goto victonlegacy\n\t\t#It's not a decision I take lightly, but it's a choice I feel I had to make and I'm prepared to face the potential consequences.\n\t\t\t*set lawless %+20\n\t\t\t*goto nevercondone\n\t\t#Killing isn't that big a deal to me. So it doesn't bother me much.\n\t\t\t*label sociopathictime\n\t\t\t*set lawless %+40\n\t\t\t*set coldblooded true\n\t\t\tWhich makes you a cold-blooded murderer. Killing may be necessary as a last resort sometimes, but you take it lightly.\n\n\t\t\tSo you'd better be ready to face the consequences of your actions, when they inevitably come.\n\t\t\t*goto victonlegacy\n\t\t#I enjoyed killing Victon. A lot.\n\t\t\t*goto sociopathictime\n*else\n\tshamed and imprisoned, thanks to you.\n\t*achieve impeachvicton\n\n\tSince the end of the Devoid War, Victon has been officially impeached and now stands on trial for his many, many crimes. Victon will most likely be going to jail for the rest of his life. \n\n\tWhich is just fine by you, because it's most definitely his turn to rot in the Devoid, after all he has done.\n\n\t*page_break\n\n\t*if finaleimpeachvicton\n\t\tAfter you exposed the President of the United States as a fraud on live 3V, the nation was sent into a tailspin of anarchy. There was national uproar and calls for reform are still being dealt with today. As riotous as the reaction ended up being, it's still a legacy you're proud of. \n\n\t\tHowever, Victon is still alive. He may be in prison, but you'll always have to be sure he can't get to you from there. \n\n\t\tThough that's a sacrifice you know was worth making: you imagine that, had you indulged in some crazed act of vengeance by destroying the president live on 3V, the nation would have fallen into anarchy.\n\t\t*goto victonlegacy\n\t*else\n\t\tYou may not have enacted full acts of revenge or ideals by killing or exposing Victon fully, but at the end of it all, leaving Victon's fate in the hands of the public ended up being the best thing, not just for the nation, but for your career as well.\n\n\t\tYou just set the dominos tumbling, leaving it to the justice system to reprimand President Victon, instead of taking matters into your own hands. If you had, slugger only knows how it would have affected national sentiment.\n\t\t*goto victonlegacy\n\n*label victonlegacy\n*page_break\n\n*if (regimedamage > 22)\n\tIn the wake of Victon's steep fall from grace, the legacy left by the Victon administration is one of complete disgrace and corruption, thanks to all the Regime Damage you inflicted.\n\t*achieve maxregimedamage\n\t*goto tookvictondown\n*elseif (regimedamage > 8)\n\tIn the wake of Victon's steep fall from grace, the legacy left by the Victon administration is one primarily of disgrace, thanks to the Regime Damage you inflicted.\n\n\tHowever, there are still many who support the measures Victon took in the name of Powered Regulation. Luckily, those supporters remain in the minority.\n\t*goto tookvictondown\n*else\n\tDespite Victon's complete and utter downfall, he has still somehow managed to leave a legacy as a Powered Regulation icon, becoming a kind of martyr for his supporters, despite all he has done. \n\n\tIt's not a legacy you're thrilled with, but doing Regime Damage wasn't a high priority of yours during this war, so you suppose you'll have to live with it.\n\t*goto tookvictondown\n\n*label tookvictondown\n\n*choice\n\t#In the end, I took Victon down for good. I won and he lost. \n\t\t*goto whateverelesmay\n\t#All that truly matters is that Victon won't be able to touch my family ever again.\n\t\t*label whateverelesmay\n\t\tWhatever else may have happened, you overcame all the impossible odds to take down your most powerful enemy. \n\t\t*goto sentclearmessage\n\t#Victon should never have been able to cause the damage he did in the first place.\n\t\tSomeone should have put a stop to Victon's corruption long before you. Still, whatever else may have happened, you overcame all the impossible odds to take down your most powerful enemy.  \n\t\t*goto sentclearmessage\n\n*label sentclearmessage\n\nAnd you've sent a clear message to anyone else who might ever try to come after you: \n\nYou will not back down. No matter how long it takes, in the end, you will win.\n\n*page_break\n\nThe chapters in ${reportername}'s book that remain the most emotionally charged for you, however, are about Prodigal's legacy. You were sure Prodigal would reappear in the months after the Devoid War, but she never did. \n\nAnd she isn't ever going to.\n\nDespite the fact that Prodigal once wanted to kill you, you know now that was just a result of her horrendous childhood, a way to fill her life with purpose and fulfill her mother's legacy. As crazy as Prodigal might have been, those are certainly goals you can relate to.\n\nObviously everything changed for Prodigal once she discovered her mother was still alive. That's when she decided her fate was to work alongside you to uncover the truth about the man who destroyed both of your families. \n\n*page_break\n\nUltimately, Prodigal left a legacy as \n*if (rlshp_prodigal \u003c 40)\n\ta sociopathic villain who never tried to do the right thing. Even to the end, all of her motivations were selfish. \n\n\tShe may have died saving your life, but you simply chalk that up to Prodigal's desire to write the final twist in her grand opera.\n\t*goto prodigallegacy\n*elseif (rlshp_prodigal \u003c 60)\n\ta troubled figure who ended up becoming an unlikely hero, despite her misguided evil acts and many, many crimes.\n\n\tYou always half-expected Prodigal to turn on you during your time working together, but she really ended up being a changed woman. Whether it was because she came to her senses after ${reportername}'s mind-tour or because she just needed a real friend, Prodigal did right by you in the end. And she died saving your life. \n\n\tThis may be a sign she was beginning to change her ways, but you suppose you'll never really know. \n\t*goto prodigallegacy\n*else\n\ta troubled figure who ended up becoming an unlikely hero, despite her misguided evil acts and many, many crimes.\n\n\tYou always half-expected Prodigal to turn on you during your time working together, but she really ended up being a changed woman. Whether it was because she came to her senses after ${reportername}'s mind-tour or because she just needed a real friend, Prodigal did right by you in the end. And she died saving your life. \n\n\tFor this, Prodigal died a true icon. She will be remembered as a champion of the downtrodden, an inspirational figure who tried to make the best of a terrible situation. \n\t*goto prodigallegacy\n\n*label prodigallegacy\n\nDo you agree with this legacy left by Prodigal?\n\n*choice\n\t#Yes, I do. \n\t\tThat's good, since you had the biggest hand in shaping it through your relationship with Prodigal, after all.\n\t\t*goto putdownbook\n\t#No, it's completely unfair. \n\t\tWell, you had the biggest hand in shaping this legacy through your relationship with Prodigal. So you're going to have to live with it.\n\t\t*goto putdownbook\n\t#I just miss Prodigal.\n\t\t*if prodigalgirlfriend\n\t\t\tYou'll never know what could have been between you and Prodigal, but at least you got to truly connect while she was still here. You were always destined to be in each other's lives, for better or worse.\n\n\t\t\tAnd you'll hold on to her final sacrifice for the rest of your life.\n\t\t\t*page_break\n\t\t\t*goto putdownbook\n\t\t*elseif prodigalfinalally\n\t\t\tIn the end, you decided to accept Prodigal as an ally. Which perhaps was all she ever needed in the first place to shed her troubled past.\n\t\t\t*goto putdownbook\n\t\t*else\n\t\t\tYou hated Prodigal, but with all your arch-enemies defeated, what are you going to do now?\n\t\t\t*goto putdownbook\n\n*label putdownbook\n\nGiven all that happened to Prodigal and Miss Artillery, you can just be thankful that your own Powers haven't driven you crazy or killed you…yet. \n\nYou know the threat of being overwhelmed by such intense Power will always be a part of your life. Still, it's a fight you're going to win every day, if only to prove all the disbelievers wrong.\n\n*page_break\n\nAs the sun begins to set, you put ${reportername}'s holo-galley down. You know the final section is all about your own heroic journey, but you haven't been able to read it yet. \n\nAnd you don't have time now, as Grandma calls you inside for dinner…\n\nWith your entire family.\n\n*page_break\n\nAs you walk off the terrace and back inside your new place, you can't help but feel accomplished. \n\nYou were able to move into the home of your dreams, thanks entirely to the lucrative contact you signed after the Devoid War:\n\n*choice\n\t*selectable_if (soloist \u003c 30) #As leader of The Millennial Group.\n\t\t*set money +1000000\n\t\t*set soloist %-25\n\t\t*set lawless %-10\n\t\t*set mgleader true\n\t\t*achieve mgleader\n\n\t\tYou now live in the Millennial Tower penthouse townhouse formerly occupied by The Diva and Rebellion, before her. \n\n\t\tNot only that, your parents and Grandma were both given apartments in the Tower so you could all live close to one another. \n\t\t*goto dinnertable\n\t*selectable_if (soloist > 70) #As the first official Millennia City Hero of Tomorrow Resident Protector.\n\t\t*set money +1000000\n\t\t*set soloist %+25\n\t\t*set lawless %-10\n\t\t*set mchotrp true\n\t\t*achieve residentprotector\n\n\t\tThe position was created entirely for you, but hopefully you'll be the first in a legendary line of MC HoT resident heroes.\n\n\t\tThe contract also came with a downtown high rise penthouse, along with apartments for your parents and Grandma in the same building, so you could all live close to one another.\n\t\t*goto dinnertable\n\t*if (fame \u003c 60) #As the Champion of the Fringes.\n\t\t*set money +300000\n\t\t*set fame %-20\n\t\t*set champoffringes true\n\n\t\tThe position was created entirely for you as part of a stimulus package to revitalize the Fringes, so you'll hopefully be the first in a legendary line of Champion Fringe heroes.\n\n\t\tThe contract also came with a brand new Fringes high rise penthouse, along with apartments for your parents and Grandma in the same building, so you could all live close to one another. \n\t\t*goto dinnertable\n\t*if (fame > 40) #As a corporate sponsored hero.\n\t\t*set money +600000\n\t\t*set fame %+20\n\n\t\tYou've become a very rich and famous corporate sponsored hero, with the autonomy to take on missions and heroic endeavors at your discretion.\n\n\t\tThe contract also came with a downtown high rise penthouse, along with apartments for your parents and Grandma in the same building, so you could all live close to one another.\n\t\t*goto dinnertable\n\n*label dinnertable\n*page_break\n\n*if jennygirlfriend\n\tAs you walk back inside, you are greeted by your fiancée, Jenny Yu. [i]Fiancée[/i]. Slugger, do you like the sound of that.\n\n\tJenny now lives with you\n\t*if mgleader\n\t\tin the Millennial Tower, as the Millennial Group's newest member.\n\t\t*goto mgexplain\n\t*else\n\t\tdespite an invitation to live in the Millennial Tower, as the Millennial Group's newest member.\n\t\t*goto mgexplain\n*elseif (luckycomaspouse) or (luckyromancefinale)\n\t*set rlshp_lucky %+50\n\tAs you walk back inside, you are greeted by your ${bmfriend}, Lucky, who plants a kiss on you.\n\n\t\"Ready for dinner?\" ${luckyze} asks, taking your hand.\n\t*goto jennytherespoused\n*elseif (bmcomaspouse) or (bmfinaleromance)\n\t*set rlshp_bm %+50\n\tAs you walk back inside, you are greeted by your ${bmfriend}, Black Magic, who plants a kiss on you.\n\n\t\"Ready for dinner?\" ${bmze} asks, taking your hand.\n\t*goto jennytherespoused\n*elseif juryboyfriend\n\t*set rlshp_family %-20\n\t*set rlshp_victons %+30\n\tAs you walk back inside, you are greeted by Jury, even though your family isn't thrilled about him being here.\n\n\t\"Ready for dinner?\" he asks, taking a deep breath. \"Because I'm not sure I am.\"\n\t*goto jennytherespoused\n*else\n\t*goto jennythere\n\n*label jennythere\n\n*if (jennydead = false)\n\t*if jennytruefriend\n\t\tAs you walk back inside, you are greeted by your best friend, Jenny Yu, who\n\t\t*label wherejennylives\n\t\t*if mgleader\n\t\t\tnow lives in her own Millennial Tower apartment, as the Millennial Group's newest member.\n\n\t\t\t\"Took you long enough,\" Jenny says, shoving you. \"I'm bloody starving.\"\n\t\t\t*goto mgexplain\n\t\t*else\n\t\t\tnow proud of Jenny now that she has left her life as a DRPR agent behind and \n\t\t*goto wherejennylivesspoused\n*else\n\tAs you walk across the living room, you make sure to look at the portrait of Jenny Yu that hangs there.\n\t*if mgleader\n\t\tIt was actually a gift from The Millennial Group, the team you now lead. \n\n\t\tThough Jenny can't be here with you, now you'll always have a part of her in your home, a constant reminder of all she has done for you.\n\t\t*goto mgexplain\n\t*else\n\t\tIt was actually a gift from The Millennial Group, which has recently undergone yet another roster change. \n\n\t\tThough Jenny can't be here with you, now you'll always have a part of her in your home, a constant reminder of all she has done for you.\n\t\t*goto mgexplain\n\n*label mgexplain\n*page_break\n\nAfter the fall of Victon's regime, The Millennial Group has been fully exonerated and restored, now respected more than ever for their pivotal role standing against Victon's corruption.\n\n*if mgleader\n\tAnd now you're their leader, a position that feels as surreal as it is rewarding. To think, just a couple years ago, you were a starstruck newbie standing in their halls….\n\n\t*if (luckycomaspouse) or (luckyromancefinale)\n\t\tThe roster still has your ${bmfriend}, Lucky. \n\t\t*goto rosterexplainmg\n\t*elseif luckyfinalfriend\n\t\tThe roster still has Lucky, who remains one of your biggest supporters.\n\t\t*goto rosterexplainmg\n\t*else\n\t\tThe roster still has Lucky, who mostly tries to steer clear of you outside of missions.\n\t\t*goto rosterexplainmg\n*else \n\t*if (luckycomaspouse) or (luckyromancefinale)\n\t\tYou're proud to say that your ${bmfriend}, Lucky, has stepped up to be their leader.\n\t\t*goto rosterexplainmg\n\t*elseif luckyfinalfriend\n\t\tLucky has now stepped up to be their leader. You're so happy for Lucky, who remains one of your biggest supporters and best friends.\n\t\t*goto rosterexplainmg\n\t*else\n\t\tLucky has now stepped up to be their leader. You haven't seen or heard from ${luckyhir} since the Devoid War, which is just as well, you suppose.\n\t\t*goto rosterexplainmg\n\n*label rosterexplainmg\nStatic, Heela, and Processor also remain on the team, alongside Monk and Fistfull, who was only invited back after redeeming himself by supporting you against The American Protectorate at the Devoid War.\n\n*if mgleader\n\t*if jennygirlfriend\n\t\tLast but certainly not least, you're beyond excited to have your fiancée Jenny on the team, too.\n\n\t\t*label becomesnull\n\t\tJenny's bionic upgrades not only allowed her to make a full recovery, they also gave her to ability to finally become Null, without having to put on her suit. With all of her weapons and systems now built in, Jenny's bionic Null upgrades make her as strong as just about any regular Powered hero.\n\n\t\tIt's no surprise that Null has already proven herself a vital part of The Millennial Group.\n\t\t*goto restofroster\n\t*elseif (jennydead = false)\n\t\tLast but certainly not least, you're beyond excited to have Jenny on the team, too.\n\t\t*goto becomesnull\n\t*else\n\t\t*goto restofroster\n*else\n\t*if jennygirlfriend\n\t\tLast but certainly not least, you're beyond excited for your fiancée Jenny to make her true heroic debut on the team.\n\n\t\t*goto becomesnull\n\t*elseif (jennydead = false)\n\t\tLast but certainly not least, you're beyond excited for Jenny to make her true heroic debut on the team.\n\n\t\t*goto becomesnull\n\t*else\n\t\t*goto restofroster\n\n*label restofroster\n*page_break\n\n*if jennydead\n\tWith tensions still running high about Infini Powereds, \n\t*goto bmdiva\n*else\n\tThe rise of unPowered heroes becoming as Powerful as Powered heroes paired with tensions still running high about Infini Powereds, \n\t*goto bmdiva\n\n*label bmdiva\nThe Diva decided to leave the Millennial Group to do Infini Advocacy work (which is why the leadership position opened up in the first place). The Crush decided to join her as well, having been exonerated in the wake of Victon's downfall and thinking this a perfect way to redeem his own Infini crimes.\n\n*if (bmcomaspouse) or (bmfinaleromance)\n\tBlack Magic has also joined them, hoping to make up for all ${bmze} has done to abuse ${bmhis} Power and finally reclaim ${bmhis} good name. You're so proud of your ${bmfriend} for finally standing up, admitting fault, and doing the right thing, you could burst.\n\t*goto apssection\n*elseif bmfinalefriend\n\tBlack Magic has also joined them, hoping to make up for all ${bmze} has done to abuse ${bmhis} Power and finally reclaim ${bmhis} good name. You're proud of Black Magic for finally standing up, admitting fault, and doing the right thing.\n\n\tIt looks like showing up to help you at the Devoid War was just Black Magic's first step down the path to redemption.\n\t*goto apssection\n*else\n\t*if bmdepower\n\t\tAfter losing ${bmhis} Powers at your hand, Black Magic decided to join The Diva and The Crush on their advocacy tour. To your complete surprise, Black Magic actually forgave you for dePowering ${bmhir}, crediting the return of ${bmhis} sanity and moral compass with the loss of ${bmhis} Powers.\n\t\t*achieve bmdepowered\n\n\t\tWhatever your reasons for dePowering Black Magic, doing so on national 3V has heated up the debate on the dangers of Infini Powers. If you, the world's foremost Infini icon, feels it's necessary to dePower loose Infini cannons, there's a strong argument to be made that all Infini Powers should be partially dampened. More and more people are starting to believe that this kind of Power is too much for any one person to manage: there are just too many examples of absolute Infini Power corrupting absolutely.\n\n\t\tWhich means that anti-Powered sentiment skyrocketed from this one event alone.\n\n\t\t*if (antipoweredsent > 60)\n\t\t\t*set antipoweredsent 100\n\t\t\t*page_break\n\t\t\t*goto apssection\n\t\t*else\n\t\t\t*set antipoweredsent +40\n\t\t\t*page_break\n\t\t\t*goto apssection\n\t*else\n\t\tBlack Magic has also joined them, hoping to make up for all ${bmze} has done to abuse ${bmhis} Power and finally reclaim ${bmhis} good name. You're happy Black Magic is finally standing up, admitting fault, and doing the right thing, especially after ${bmhis} displays at The Millennial Tower and at the Devoid War.\n\n\t\tEven still, you know that you and Black Magic have no future together, after everything you've been through. \n\t\t*goto apssection\n\n*label apssection\n*page_break\n\nYou know firsthand how important The Diva and Black Magic's advocacy work is, given all you've been through personally as an Infini Powered. Despite all of your successes, there are still many barriers to break down when it comes to Infini Powered fear and Gene Hazard stigma. \n\nAdd to that the kind of abilities now offered by bionic upgrades and MeChip technology, and you know that the divisions that already fracture the Powered community are bound to worsen.\n\nEntering this new post-Victon age for heroes, anti-Powered sentiment ended up leveling out at at ${antipoweredsent}. \n*if (antipoweredsent = 5)\n\t*achieve peaceandharmony\n\tThis is the lowest anti-Powered sentiment rating in history, thanks to your efforts.\n\t*goto newgoldenage\n*elseif (antipoweredsent \u003c 31)\n\t*label newgoldenage\n\tThis level is indicative of a brand new Powered Golden Age to be ushered in by heroes like you.\n\t*goto splicebrew\n*elseif (antipoweredsent \u003c 61)\n\tThis level is indicative of the need for Powered heroes to redeem themselves in the eye of the public, after all of the ordeals the nation and the world have been through.\n\t*goto splicebrew\n*else\n\tWhich means there's still a major civil rights battle ahead for Powered individuals. The Golden Age of Powered Heroics has officially come to a close, thanks largely in part to your actions, for better or worse.\n\t*goto splicebrew\n\n*label splicebrew\n\nHow do you feel about the position of Powered individuals today?\n\n*choice\n\t#It's exactly where I want it to be.\n\t\tThat's good, since you had the heaviest hand in shaping national sentiment with your iconic status.\n\t\t*goto putdownbookfordinner\n\t#It's nowhere near where it should be.\n\t\tWell, you had the heaviest hand in shaping national sentiment, given your iconic status. So you're going to have to find a way to reshape this sentiment, moving forward.\n\t\t*goto putdownbookfordinner\n\t#Powered individuals are going to have to focus on repairing our internal disputes, first and foremost.\n\t\tGiven your iconic status, you're going to have to find a way to lead the charge in this endeavor.\n\t\t*goto putdownbookfordinner\n\n*label putdownbookfordinner\n\nThis all goes to show that, despite your monumental successes, your heroic work changing the world must still carry on. It's your responsibility to lead the heroic community into the next era and face any bold new social challenges that arise. \n\n*if (fightrexfordkill) or (finalekillvicton)\n\t*page_break\n\n\tThe only roadblock remaining in your way, however, has been the murder trial for killing\n\t*if (fightrexfordkill) and (finalekillvicton)\n\t\tboth Rexford Schillers and President Victon.\n\t\t*goto coldbloodedtest\n\t*elseif fightrexfordkill\n\t\tRexford Schillers.\n\t\t*goto coldbloodedtest\n\t*else\n\t\tPresident Victon.\n\t\t*goto coldbloodedtest\n*else\n\t*goto happydinnerscene\n\n*label coldbloodedtest\n\n*if coldblooded\n\t*if (prodigalkillthree) and (rebellionkill)\n\t\tIt has also been revealed that you planned to kill Prodigal at one point and intended to kill Rebellion in your final battle.\n\t\t*goto goingtojail\n\t*elseif prodigalkillthree\n\t\tIt has also been revealed that you planned to kill Prodigal at one point.\n\t\t*goto goingtojail\n\t*elseif rebellionkill\n\t\tIt has also been revealed that you intended to kill Rebellion in your final battle.\n\t\t*goto goingtojail\n\t*else\n\t\t*label goingtojail\n\t\tIt is widely predicted that, as a result of your apparent willingness to use lethal force without remorse, your upcoming trial is going to be a very difficult one. \n\n\t\tOne where you face the threat of life in the Devoid, just like your parents. Though the difference here is that your parents never killed anyone intentionally. \n\n\t\tYou did.\n\n\t\t*page_break\n\n\t\tAnd you didn't act in self defense or for the sake of your ideals. You acted as a cold-blooded murderer, not a hero worthy of Legend. Your actions will have consequences.\n\t\t*achieve stonecold\n\t\t\n\t\t*set legend -30\n\t\t*goto trytoenjoy\n*elseif (prodigalkillthree) and (rebellionkill)\n\t*set legend -15\n\tIt has also been revealed that you planned to kill Prodigal at one point and intended to kill Rebellion in your final battle. It is widely predicted that, as a result of your willingness to use lethal force, your upcoming trial is going to be a very difficult one. \n\n\tOne where you face the threat of life in the Devoid, just like your parents. Though the difference here is that your parents never killed anyone purposefully. \n\n\tYou did. \n\n\t*page_break\n\n\tWhich goes to show that, no matter your motivations, murder always has consequences.\n\n\t*label trytoenjoy\n\n\tFor now, you try your best to put this in the back of your mind and enjoy your freedom alongside your family, for however long it lasts.\n\t*goto happydinnerscene\n*else\n\tHowever, because of your justifications for doing so in self defense, you were acquitted.\n\n\tKilling is only ever a last resort, and you hope you never have to go there again.\n\t*goto happydinnerscene\n\n*label happydinnerscene\n*page_break\n*set rlshp_family %+30\n\nYou enter the dining room and can hardly believe your eyes. You fought so hard to save your family, and now here they sit in front of you, redeemed and reunited.\n\nYour parents sit side by side, beaming at you.\n\n\"You know, I never thought you'd be the one putting us up in a penthouse,\" your mom says.\n\n\"Really? I always did,\" your dad says, turning to wink at you.\n\n*if parentsdepowered\n\tHaving your parents here means everything to you…\n\n\t*page_break\n\t*achieve parentsdepowered\n\n\tThough it turns out that Victon's Infinity Equalizer blast stripped them of their Powers.\n\n\tPermanently. \n\n\tYou feel so guilty for allowing this to happen, but your parents just told you:\n\n\t*choice\n\t\t#\"It's not your fault. You stopped Victon in every way that matters.\"\n\t\t\t*goto gmacutsin\n\t\t#\"We're done being heroes. We're ready to be your parents.\"\n\t\t\t*goto gmacutsin\n\t\t#\"We'll always find a way to be heroes, we don't need Powers for that.\"\n\t\t\t*goto gmacutsin\n*else\n\tHaving them here means everything to you. You've become the heroic family you've always dreamed of.\n\t*achieve savedparents\n\n\t*choice\n\t\t#I can't wait to fight alongside my parents.\n\t\t\t*goto gmacutsin\n\t\t#They're going to retire so they can finally be my parents full-time.\n\t\t\t*goto gmacutsin\n\t\t#My parents will be handling my career now.\n\t\t\t*goto gmacutsin\n\n*label gmacutsin\n\nKnowing your parents have finally found their rightful place, you turn to the woman who truly got you to this moment:\n\nGrandma.\n\nGrandma is perhaps the only person who knows everything you've had to endure and overcome to secure this happy ending.\n*if prodigalgirlfriend\n\tShe even understood when you fell for Prodigal, claiming that \"love is truly blind.\"\n\n\t*goto gmahappyending\n*elseif juryboyfriend\n\tShe even understood when you fell for Jury, claiming that \"love is truly blind.\"\n\n\t*goto gmahappyending\n*else\n\t*goto gmahappyending\n\n*label gmahappyending\nWhich is why you're thrilled to know that Grandma has gotten a happy ending of her own, as she sits beside her new boyfriend: Officer Sanders.\n\n\"The dining room is looking particularly lovely,\" Grandma says, though of course she would. You let Grandma fill this room with housewarming plant presents. \n\nHaving all of the plants and flowers around reminds you of Grandma, though you only agreed because you had Grandma tell all the plants that you would only water them if they swore not to spill the details of your home life to Grandma whenever she visits.\n\nYou really do love all of the plants, but your favorite has to be:\n\n*choice\n\t#A dozen ${flower} roses.\n\t\t*goto sitatthetable\n\t#The Operatic Orchids.\n\t\t*goto sitatthetable\n\t#Venus De Milo's Flytrap children.\n\t\t*goto sitatthetable\n\n*label sitatthetable\n\nAs you sit down at the table and Grandma begins dolling out one of her famously meaty meals, you try to soak in the moment. Everyone you care about most sits around you, which means that right now, life couldn't get much better. \n\nRealizing this, you feel at peace. \n\nFinally.\n\n*label epiloguetime\n*page_break Epilogue\n\n[b]EPILOGUE:[/b] \n*line_break\n$!!{CODENAME} RISING\n\n*if jennygirlfriend\n\tYou lie in bed beside Jenny, staring down at ${reportername}'s holo-galley, specifically at the section on your heroic rise.\n\t*achieve jennyend\n\n\t\"Oh, quit being such a baby and just read it,\" Jenny says, slapping you on your leg. \"You're going to love it. Almost as much as I love you.\"\n\n\tYou turn to Jenny, not used to shows of sentimentality from her, on so many levels. Still, you lean in to kiss her, because you have to say: \n\n\t\"I love you too.\"\n\n\t*page_break THIRTY MINUTES LATER\n\n\tThirty minutes and several layers of clothing later, you lie beside Jenny again, relaxed and ready to read ${reportername}'s section on your heroic rise.\n\t*goto youreadsction\n*if (luckycomaspouse) or (luckyromancefinale)\n\t*achieve luckyend\n\tYou lie in bed beside Lucky, staring down at ${reportername}'s holo-galley, specifically at the section on your heroic rise.\n\n\t\"Come on, it's not like the thing is going to jump up and bite you,\" Lucky says, nudging you in the shoulder. \"You're going to love it. Almost as much as I love you.\"\n\n\tYou turn to Lucky and your jaw drops, because that's certainly the first time ${luckyze} has said that to you. If only you had known as a kid at camp that you'd end up with ${luckyname} Smith, you'd probably have exploded.\n\n\t\"I love you too,\" you say, leaning in to kiss Lucky. \n\n\tAs the kiss grows deeper, you let the holo-galley slide off the bed…\n\n\tYou've got something much more pressing to attend to.\n\n\t*page_break THIRTY MINUTES LATER\n\n\tThirty minutes and several layers of clothing later, you lie beside Lucky again, relaxed and ready to read ${reportername}'s section on your heroic rise.\n\t*goto youreadsction\n*elseif (bmcomaspouse) or (bmfinaleromance)\n\t*achieve bmend\n\tYou lie in bed beside Black Magic, staring down at ${reportername}'s holo-galley, specifically at the section on your heroic rise.\n\n\t\"Come on, it's not like the thing is going to jump up and bite you,\" Black Magic says, nudging you in the shoulder. \"You're going to love it. Almost as much as I love you.\"\n\n\tYou turn to Black Magic and your jaw drops, because that's certainly the first time ${bmze} has said that to you. If only you had known as rookie hero that you'd end up with Black Magic, your biggest ${bmceleb} crush, you'd probably have exploded.\n\n\t\"I love you too,\" you say, leaning in to kiss Black Magic. \n\n\tAs the kiss grows deeper, you let the holo-galley slide off the bed…\n\n\tYou've got something much more pressing to attend to.\n\n\t*page_break THIRTY MINUTES LATER\n\n\tThirty minutes and several layers of clothing later, you lie beside Black Magic again, relaxed and ready to read ${reportername}'s section on your heroic rise.\n\t*goto youreadsction\n*elseif jurykiss\n\tYou lie in bed beside Jury, staring down at ${reportername}'s holo-galley, specifically at the section on your heroic rise.\n\t*achieve juryend\n\n\t\"Oh, quit being such a baby and just read it,\" Jury says, slapping you on your leg. \"I'll give you a very sweaty reward if you do.\"\n\n\tYou turn to Jury, running your fingers up his rippled stomach. \n\n\t\"I think I'll take that reward now,\" you say, letting the holo-galley slide off the bed.\n\n\t*page_break THIRTY MINUTES LATER\n\n\tThirty minutes and several layers of clothing later, you lie beside Jury again, relaxed and ready to read ${reportername}'s section on your heroic rise.\n\t*goto youreadsction\n*elseif prodigalgirlfriend\n\tLater that night, you lie in bed beside a holo-picture of Prodigal on the nightstand. You wish she could be here next to you, but part of you knows you were always living on borrowed time with Prodigal, in so many ways.\n\t*achieve prodigalend\n\n\tPerhaps it's better this way, having connected with Prodigal on the run. At least now you'll know the fantasy will never have a chance to outdo the reality of being with her.\n\n\tPassing your finger through Prodigal's face in the holo-picture, you sigh and settle into bed.\n\n\tIt's time to read ${reportername}'s section on your heroic rise.\n\t*page_break\n\t*goto youreadsction\n*else\n\tLater that night, you lie in bed alone, ready to read ${reportername}'s section on your heroic rise.\n\t*goto youreadsction\n\n*label youreadsction\n*if (legend > 79)\n\t*set legend 100\n\t*goto finallegendcheck\n*else\n\t*set legend +20\n\t*goto finallegendcheck\n\n*label finallegendcheck\n\nAfter one last Legend boost for your iconic exposure at the Devoid War, you ended with a final Legend Level of ${legend}.\n\n*if (legend = 100)\n\tWhich means you finally reached your goal of a perfect Legend Level, a feat only ever achieved by Rebellion before you. Since ${youhis} Legend Level has dropped significantly in light of recent events, you are now the only hero on the planet with a Legend Level of 100.\n\t*goto fearedrevered\n*else\n\tYou could have had a Legend Level as high as 100, but you ended up here.\n\t*goto fearedrevered\n\n*label fearedrevered\n\nHow do you feel about your final Legend Level?\n\n*fake_choice\n\t#Fantastic.\n\t\t*goto youscrollthen\n\t#Terrible.\n\t\t*goto youscrollthen\n\t#It could be better—but it also could be worse.\n\t\t*goto youscrollthen\n\n*label youscrollthen\n\nYou then scroll down through your general heroic statistics, seeing that you are known as a \n*if (fame > 50)\n\thero who knows the true value of fame.\n\t*goto statrunone\n*else\n\thero who upholds justice above all else. \n\t*goto statrunone\n\n*label statrunone\n*if (lawless > 50)\n\tA hero who takes the law into your own hands in order to do the right thing.\n\t*goto statruntwo\n*else\n\tA hero who follows the letter of the law in order to do the right thing.\n\t*goto statruntwo\n\n*label statruntwo\n\n*if (soloist > 50)\n\tYou are a hero who works best alone.\n\t*goto statrunthree\n*else\n\tYou are a hero who works best with others.\n\t*goto statrunthree\n\n*label statrunthree\n*if (offensive > 50)\n\tA hero committed to Powerful offensive attacks,\n\t*goto statrunfour\n*else\n\tA hero committed to flawless defensive maneuvers, \n\t*goto statrunfour\n\n*label statrunfour\n*if (unleash > 50)\n\tpushing the boundaries of your expansive Infini Powers.\n\t*goto revengestatrun\n*else\n\tmaintaining control of your expansive Infini Powers.\n\t*goto revengestatrun\n\n*label revengestatrun\n\n*if (revenge > 50)\n\tYou're a vengeful hero, one who fights\n\t*goto statrunfive\n*else\n\tYou're an idealistic hero, one who fights\n\t*goto statrunfive\n\n*label statrunfive\n*if (freedom > 50)\n\tfor freedom at all costs. \n\t*goto statrunfinal\n*else\n\tto protect the public at all costs.\n\t*goto statrunfinal\n\n*label statrunfinal\n\nPerhaps most importantly, you are\n*if (feared > 75)\n\tone of the most feared heroes of all time, an icon that will be remembered forever.\n\t*goto dreamcometrue\n*elseif (feared > 50)\n\tviewed as a hero to be feared and respected.\n\t*goto dreamcometrue\n*if (feared \u003c 25)\n\tone of the most revered heroes of all time, an icon that will be remembered forever.\n\t*goto dreamcometrue\n*else\n\tviewed as a hero to be revered and respected.\n\t*goto dreamcometrue\n\n*label dreamcometrue\n*page_break\n\n*if chip_diva\n\t\"So, queen,\" MeChip ${chipname} says, appearing in a jumpsuit replica of your iconic costume. \"Now that I'm superfamous from the DNA scan heard round the world, how does it feel to be the most iconic and Powerful Infini Hero on the planet?\"\n\t*goto howitfeelsrightnow\n*elseif chip_butler\n\t\"So, ${sir_mad},\" MeChip ${chipname} says, appearing in a tuxedo version of your iconic costume. \"How does it feel to be the most Powerful Infini Hero on the planet?\"\n\t*goto howitfeelsrightnow\n*else\n\t\"So, sweetie,\" MeChip ${chipname} says, appearing in a muumuu replica of your iconic costume. \"How does it feel to be the most Powerful Infini Hero on the planet?\"\n\t*goto howitfeelsrightnow\n\n*label howitfeelsrightnow\n\nYou hear MeChip ${chipname}'s question and take a moment to reflect on all that you've been through. It was just two years ago that Grandma bought your DRPR Hero License and you began your heroic rise. That was the day that ${firstname} Sterling finally became ${codename}, Millennia City's newest hero, looking to redeem your true ${familyname} name.\n\nYou've been through so much since then: Shutting down The Splice Circle and the Eastern Fringes Ani-Gangs.\n*if bm_reconcile\n\tFalling for Black Magic, despite discovering ${bmhis} dark secret.\n\t*goto becomingmill\n*elseif bm_rift\n\tPulling away from Black Magic after discovering ${bmhis} dark secret.\n\t*goto becomingmill\n*else\n\t*goto becomingmill\n\n*label becomingmill\nBecoming Millennia City's Hero of Tomorrow. Choosing to save \n*if choose_sidekick\n\t${sidekick} over Sonja\n\t*goto prodtwistgame\n*else\n\tSonja over ${sidekick}\n\t*goto prodtwistgame\n\n*label prodtwistgame\nin Prodigal's twisted game. Being outed by Prodigal as ${firstname} ${familyname}. Learning the ugly truth about ${sidekick}. Stopping Prodigal's grand plans\n*if kill_prodigal\n\tby choosing to kill her. Learning about your budding Infini-Class Powers.\n\t*goto guardjoin \n*else\n\twith your brand new Infini-Class Powers. \n\t*goto guardjoin \n\n*label guardjoin \n*if guard_reserve\n\tJoining The Millennial Group as a reserve member.\nDeciding to write to your parents after all those silent years. \n\nThat first chapter of your heroic rise may have been chaotic and unexpected, but it showed you what you were made of, what you stood for and helped mold you into the hero you've become today.\n\n*page_break\n\nThen there was The Hero Project, where you were tested yet again: Enduring the manipulations of GG and Rexford. Managing the development of your unruly Infini Powers. Battling your way through the\n*if wildcard\n\tSemi-Finals as a Wildcard pick.\n\t*goto finalselecttwo\n*else\n\tSemi-Finals.\n\t*goto finalselecttwo\n\n*label finalselecttwo\n*if judgessave\n\tSurviving elimination at the Final Selection by advancing to the Final 14 as the Judges Save. \n\t*goto rexfordcalltwo\n*else\n\tAdvancing to the Live Finals as a member of the Final 14. \n\t*goto rexfordcalltwo\n\n*label rexfordcalltwo\nFighting Culic's InfraOrder at the Midtown Tunnel and his castle headquarters. \n*if bmeleventh\n\tWitnessing Black Magic's lifeforce sourcing scandal and ${bmhis} fall from \n\t*if bm_breakup\n\t\tgrace after your public breakup. \n\t\t*goto luckynowtwo\n\t*else\n\t\tgrace.\n\t\t*goto luckynowtwo\n*else\n\t*if bm_reconcile\n\t\tStanding by Black Magic's side throughout ${bmhis} lifeforce sourcing scandal.\n\t\t*goto luckynowtwo\n\t*else\n\t\tWitnessing Black Magic's lifeforce sourcing\n\t\t*if bm_breakup\n\t\t\tscandal after your public breakup.\n\t\t\t*goto luckynowtwo\n\t\t*else\n\t\t\tscandal.\n\t\t\t*goto luckynowtwo\n\n*label luckynowtwo\n*if bmeleventh\n\t*if luckyfeelings\n\t\tFalling for Lucky.\n\t*goto oneofmanydifftwo\n*else\n\tStruggling through Lucky's elimination.\n\t*goto oneofmanydifftwo \n\n*label oneofmanydifftwo\nEarning your spot as The Hero Project's reigning\n*if strathero\n\ttrue Hero\n\t*goto hatemelovemettwo\n*elseif stratloyal\n\t*if officialpopular\n\t\tLoyal Popular Ally\n\t\t*goto hatemelovemettwo\n\t*else\n\t\tLoyal Underdog Ally\n\t\t*goto hatemelovemettwo\n*elseif stratfloater\n\tFloater\n\t*goto hatemelovemettwo\n*elseif stratruthless\n\tRuthless Strategist\n\t*goto hatemelovemettwo\n*elseif stratvillain\n\tVillain\n\t*goto hatemelovemettwo\n*else\n\tStrategic Chameleon\n\t*goto hatemelovemettwo\n\n*label hatemelovemettwo\nand surviving as Fumble, The Bear and Mach Girl were eliminated.\n\nThen there was\n*if takepills\n\tchoosing to trust Rebellion and take Pump. \n\t*goto jennyteimtwo\n*else\n\tchoosing not to take Pump from Rebellion.\n\t*goto jennyteimtwo\n\n*label jennyteimtwo\n*if conspiracygo\n\tAssisting Jenny in solving her DRPR conspiracy investigation.\n*if selloutjenny\n\tDeciding to reveal Jenny's true Null identity to Rexford. Taking down Culic's InfraOrder.\n\t*goto takedownculictwo\n*else\n\tDeciding to protect Jenny's true Null identity by eliminating yourself from The Hero Project.\n\t*goto takedownculictwo\n\n*label takedownculictwo\nWatching helplessly as The Crush lost control and put\n*if bmeleventh\n\tLucky\n\t*goto deepcomatwo\n*else\n\tBlack Magic\n\t*goto deepcomatwo\n\n*label deepcomatwo\nin a coma.\n*if selloutjenny\n\tBecoming a member of The American Protectorate.\nStanding up to President Victon's Infinity Regulator order and losing your Powers. Learning about The Hero Project's secret cabal. Becoming an Infini Icon and vowing to bring down Victon's regime. Receiving that first letter from your parents and hearing they were proud of you. \n\n*page_break\n\nAll of this lead up to that fateful night six months ago, when Prodigal reappeared to tell you that Miss Artillery was still alive, when she convinced you to team up with her to finally take down your greatest enemies and free your parents. \n\nIn the days that followed, all slugger seemed to break loose: Learning to operate in the shadows with Prodigal. Teaming up with ${reportername} Challa.\n*if fightrexfordkill\n\tKilling Rexford and escaping his Infinite Elite tracking squad.\n\t*goto battlereb\n*if (recordandescape) or (recordandfight)\n\tRecording Rexford and exposing his Infinite Elite tracking squad.\n\t*goto battlereb\n*elseif fightrexfordcripple\n\tCrippling Rexford and escaping his Infinite Elite tracking squad.\n\t*goto battlereb\n*else\n\tEscaping Rexford and his Infinite Elite tracking squad.\n\t*goto battlereb\n\n*label battlereb\nBattling Rebellion and The American Protectorate alongside The Millennial Group. Watching Jenny get shot by Jury. Teleporting across the country courtesy of a crazed Black Magic. Breaking into The Blessed Vessel with ${sidekick}'s help. Witnessing Miss Artillery die a terrible death alongside a devastated Prodigal. \n\nRegaining your Powers and \n*if jennydead\n\tfinding that Jenny had died.\n\t*goto breakoutaa\n*else\n\treuniting with Jenny.\n\t*goto breakoutaa\n\n*label breakoutaa\nLearning that President Victon is really Prodigal's father. Breaking your allies out of the Devoid. Fighting the last battle by pitting your army against President Victon's.\n*if rexfordfinalefoe\n\tTaking down Rexford Schillers once and for all.\n*if rebellionrecruit\n\tShowing Rebellion the error of ${youhis} ways.\n\t*goto dismantprot\n*else\n\tBlinding your false idol, Rebellion.\n\t*goto dismantprot\n\n*label dismantprot\nDismantling The American Protectorate. Shutting down The Meek movement. Exposing Victon's dark secrets as Prodigal sacrificed her life to save yours.\n*if finalekillvicton \n\tKilling President Victon live on national 3V.\n\t*goto savpar\n*elseif finaleimpeachvicton\n\tCalling for President Victon's impeachment live on national 3V.\n\t*goto savpar\n*else\n\tDestroying President Victon's Presidency.\n\t*goto savpar\n\n*label savpar\nSaving and freeing your parents. \n*if mgleader\n\tBecoming the leader of The Millennial Group.\n\t*goto romancecodinglaterend\n*elseif mchotrp\n\tBecoming the first official Millennia City Hero of Tomorrow Resident Protector.\n\t*goto romancecodinglaterend\n*elseif champoffringes\n\tBecoming the Champion of the Fringes.\n\t*goto romancecodinglaterend\n*else\n\t*goto romancecodinglaterend\n\n*label romancecodinglaterend\n*if jennygirlfriend\n\tEnding up with the love of your life, Jenny.\n\t*goto reunitfam\n*elseif prodigalgirlfriend\n\tDiscovering your feelings for Prodigal.\n\t*goto reunitfam\n*elseif (luckycomaspouse) or (luckyromancefinale)\n\tEnding up with the love of your life, Lucky.\n\t*goto reunitfam\n*elseif (bmcomaspouse) or (bmfinaleromance)\n\tEnding up with the love of your life, Black Magic.\n\t*goto reunitfam\n*elseif jurykiss\n\tDiscovering your feelings for Jury.\n\t*goto reunitfam\n*else\n\t*goto reunitfam\n\n*label reunitfam\n\nReuniting your family and restoring the ${familyname} name.\n\n*page_break\n\nIt certainly has been a wild ride, one filled with more twists and turns, failures and successes, highs and lows than you could have imagined.\n\nFor a long time, with all that you were going through, you truly felt like you lost touch with your dream. Though in the end, all of the plots and manipulations and setbacks placed you on the unlikely road that made every single one of your dreams come true.\n\nAll you can think now is: \n\nWhat could be next for you? \n\n*page_break\n\nYou know whatever it is, you can handle anything that comes your way.\n\nBecause you're a Hero Riser.\n\n*if (legend = 100)\n\t*page_break Badge Unlocked\n\n\t*text_image perfect_legend_badge.png center Perfect Legend Badge Unlocked\n\t*achieve perfectlegend\n\n\tCongratulations, ${codename}—you became the second hero in history to reach a Legend Level of 100. You have unlocked a Legend Guide, which lists the decisions necessary to achieve a perfect Legend score. Though you already know how to do that on your own.\n\n\tNow wear your Perfect Legend Badge with honor.\n\t*goto decisionguide\n*elseif (regimedamage > 25)\n\t*page_break Badge Unlocked\n\n\t*text_image regime_damage_badge.png center Regime Damage Badge Unlocked\n\n\tCongratulations, ${codename}—for achieving an above-average Regime Damage tally, you have unlocked a Legend Guide, which lists the decisions necessary to achieve a perfect Legend score. Use this information wisely.\n\n\tNow wear your Regime Damage Badge with honor.\n\t*goto decisionguide\n*elseif (feared > 70) and (antipoweredsent > 45)\n\t*page_break Badge Unlocked\n\n\t*text_image feared_badge.png center Feared Badge Unlocked\n\n\tCongratulations, ${codename}—you're one of the most Feared heroes of all time, marked by an unusually high anti-Powered sentiment Level. No matter what, you demand respect.\n\n\tAs a reward, you have unlocked a Legend Guide, which lists the decisions necessary to achieve a perfect Legend score. \n\n\tNow wear your Feared Badge with honor.\n\t*goto decisionguide\n*elseif (feared \u003c 30) and (antipoweredsent \u003c 45)\n\t*page_break Badge Unlocked\n\n\t*text_image revered_badge.png center Revered Badge Unlocked\n\n\tCongratulations, ${codename}—you're one of the most Revered heroes of all time, marked by a low anti-Powered sentiment Level. No matter what, you demand respect.\n\n\tAs a reward, you have unlocked a Legend Guide, which lists the decisions necessary to achieve a perfect Legend score. \n\n\tNow wear your Revered Badge with honor.\n\t*goto decisionguide\n*elseif (lawless \u003c 30) and (fame \u003c 30)\n\t*page_break Badge Unlocked\n\n\t*text_image lawful_justice_badge.png center Lawful Justice Badge Unlocked\n\n\tCongratulations, ${codename}—you're one of the most lawfully just heroes of all time.\n\n\tAs a reward, you have unlocked a Legend Guide, which lists the decisions necessary to achieve a perfect Legend score. \n\n\tNow wear your Lawful Justice Badge with honor.\n\t*goto decisionguide\n*elseif (lawless \u003c 30) and (fame > 70)\n\t*page_break Badge Unlocked\n\n\t*text_image lawful_fame_badge.png center Lawful Fame Badge Unlocked\n\n\tCongratulations, ${codename}—you're one of the most famously lawful heroes of all time.\n\n\tAs a reward, you have unlocked a Legend Guide, which lists the decisions necessary to achieve a perfect Legend score. \n\n\tNow wear your Lawful Fame Badge with honor.\n\t*goto decisionguide\n*elseif (lawless > 70) and (fame \u003c 30)\n\t*page_break Badge Unlocked\n\n\t*text_image lawless_justice_badge.png center Lawless Justice Badge Unlocked\n\n\tCongratulations, ${codename}—you're one of the most lawlessly just heroes of all time.\n\n\tAs a reward, you have unlocked a Legend Guide, which lists the decisions necessary to achieve a perfect Legend score. \n\n\tNow wear your Lawless Justice Badge with honor.\n\t*goto decisionguide\n*elseif (lawless > 70) and (fame > 70)\n\t*page_break Badge Unlocked\n\n\t*text_image lawless_fame_badge.png center Lawless Fame Badge Unlocked\n\n\tCongratulations, ${codename}—you're one of the most famously lawless heroes of all time.\n\n\tAs a reward, you have unlocked a Legend Guide, which lists the decisions necessary to achieve a perfect Legend score. \n\n\tNow wear your Lawless Fame Badge with honor.\n\t*goto decisionguide\n*if (legend > 80)\n\t*page_break Badge Unlocked\n\t*text_image legend_badge.png center Legend Badge Unlocked\n\n\tCongratulations, ${codename}—for maintaining an above-average Legend Level, you have unlocked a Legend Guide, which lists the decisions necessary to achieve a perfect Legend score. Use this information wisely! \n\n\tNow wear your Legend Badge with honor.\n\t*goto decisionguide\n*else\n\t*check_achievements\n\t*page_break\n\t*if (choice_achieved_legendguide)\n\t\t*goto decisionguide\n\t*check_purchase legendguide\n\t*if choice_purchase_supported and choice_purchased_legendguide\n\t\t*goto decisionguide\n\t*else\n\t\t[i]Want to learn how to unlock Special Badges and a Perfect Legend Guide? Visit the Heroes Rise Facebook page!\n\n\t\t*link https://www.facebook.com/HeroesRise\n\n\t\t*if choice_purchase_supported\n\t\t\t[i]In the meantime, would you like to purchase the Perfect Legend Guide? It lists the decisions necessary to achieve a perfect Legend score.[/i]\n\n\t\t\t*purchase legendguide $0.99 decisionguide\n\t\t\t*page_break No, Thanks\n\t\t\t[i]To unlock The Hero Project Perfect Legend Guide for free, be sure to check out the Badge Guides at the Heroes Rise social media pages![/i]\n\t\t\t*goto timetoend\n\t\t*else\n\t\t\t*goto timetoend\n\n*label decisionguide\n*achieve legendguide\n*page_break Legend Guide\n*text_image guide.png center HeroFall: Perfect Legend Guide\n\n[b]General Tip:[/b] You must load a saved The Hero Project game with a Legend Level greater than 60 to achieve perfect Legend in HeroFall. It will also help to have consistently high/low Opposed Pair Stat Levels (Opposed Pair Stats around Level 50 are undesirable).\n\n[b]Chapter Two:[/b] Make sure to keep your Power and Health Levels high enough to survive and avoid a Legend decrease. If you die in this chapter, you will lose 20 Legend. The MeChip Warning System helps advise wise battle decisions.\n\n[b]Chapter Three:[/b] Automatic Legend Recalibration. (Must load a saved The Hero Project game with a Legend Level greater than 60 to achieve perfect Legend). [i](Legend High: 50)[/i]\n\n[b]Chapter Four:[/b] You must choose to RECORD Rexford's Infinite Elite and then be sure to either escape OR fight and knock out Rexford for the most positive media outcomes in Chapter Five. If you choose not to record, or choose to cripple or kill Rexford, you will not gain maximum Legend.\n*line_break\n[b]Chapter Four:[/b] Make sure to keep your Power and Health Levels high enough to survive and avoid a Legend decrease. If you die in this chapter, you will lose 20 Legend. The MeChip Warning System helps advise wise battle decisions.\n\n[b]Chapter Five:[/b] If you chose to RECORD Rexford's Infinite Elite and then chose to escape OR fight and knock out Rexford, you will receive the maximum Legend Boost. [i](Legend High: 60)[/i]\n\n[b]Chapter Six:[/b] To avoid a Legend Loss, do not choose to kiss Jury. [i](Legend High: 60)[/i]\n\n[b]Chapter Seven:[/b] To gain the maximum Legend Boost, take down Rebellion with five hit points as quickly as possible (within the first three battle choices). [i](Legend High: 70)[/i]\n*line_break\n[b]Chapter Seven:[/b] Make sure to keep your Power and Health Levels high enough to survive and avoid a Legend decrease. If you die in this chapter, you will lose 20 Legend. The MeChip Warning System helps advise wise battle decisions. \n\n[b]Chapter Eight:[/b] You must clear the first three Blessed Vessel doors without any mistakes, then GRAB THE LASER GUN to receive Miss Artillery's clearest dying clue. This will enable you to use the clue for the maximum Legend Boost in Chapter Nine.\n*line_break\n[b]General Tip:[/b] If you do make any mistakes opening the doors, you may still get the maximum Legend Boost if you choose to PUSH PRODIGAL ASIDE and read the partial clue.\n*line_break\n[b]Chapter Eight:[/b] Make sure to keep your Power and Health Levels high enough to survive and avoid a Legend decrease. If you die in this chapter, you will lose 20 Legend. \n*line_break\n[b]General Tip:[/b] For help with the Blessed Vessel mission, check the Heroes Rise Social Media Pages for Strategy Guides.\n\n[b]Chapter Nine:[/b] If you heard Miss Artillery's dying words, make sure to choose to say: \"I think Miss Artillery was trying to tell Prodigal and me who Prodigal's father is.\" Correctly identifying President Victon as Prodigal's father grants you the maximum Legend Boost. [i](Legend High 80)[/i]\n*line_break\n[b]Chapter Nine:[/b] If you made a mistake and read Miss Artillery's dying message instead, make sure to choose to say: \"I think Miss Artillery was trying to tell Prodigal and me about Prodigal's father. And I think I know who it is.\" You must then correctly write \"President Victon\" as Prodigal's father to grant you the maximum Legend Boost. [i](Legend High 80)[/i]\n\n[b]Chapter Ten:[/b] When deciding whether to let ${reportername} record inside the Devoid, you must make a decision consistent with your Fame/Justice Level. To do so, Fame must be higher than 60 or Justice must be lower than 40. [i](Legend High 85)[/i]\n*line_break\n[b]Chapter Ten:[/b] When deciding whether to free the maximum security Prisoners inside the Devoid, you must make a decision consistent with your Lawless/Lawful Level. To do so, Lawless must be higher than 60 or Lawful must be lower than 40. [i](Legend High 90)[/i]\n*line_break\n[b]Chapter Ten:[/b] To avoid a Legend Loss, do not ask The Crush for help freeing The Millennial Group. [i](Legend High: 90)[/i]\n\n[b]Chapter Eleven:[/b] Create the perfect threat level matchups to gain a Legend Boost. [i](Legend High: 95)[/i]\n*line_break\n[b]Chapter Eleven:[/b] Make sure to keep your Power and Health Levels high enough to survive and avoid a Legend decrease. If you die in this chapter, you will lose 20 Legend. \n*line_break\n[b]General Tip:[/b] For help with the Devoid War mission, check the Heroes Rise Social Media Pages for Strategy Guides.\n\n[b]Chapter Twelve:[/b] Automatic final boost. [i](Legend High: 100)[/i]\n*line_break\n[b]General Tip:[/b] If you kill anyone in HeroFall irresponsibly and without good reason, you will receive a Legend decrease in Chapter Twelve as punishment.\n*line_break\n[b]General Tip:[/b] If you successfully expose or destroy The Meek movement, you receive an extra 5 Legend Boost if your Legend is below 90. So if you've made any mistakes, this may be a chance to gain back some lost Legend.\n\n[b]General Tip:[/b] In Heroes Rise, you are rewarded for sticking to your ideals. If trying to earn a high Legend Level, make sure to remain consistent once you decide what kind of hero you want to be.\n\n*label timetoend\n*page_break The End…\n\n[i]A note from the author of Heroes Rise:[/i]\n\nThanks so much for taking the journey of Heroes Rise with me! What started as a single, newfangled interactive novel project turned into the trilogy of my dreams for one reason and one reason only: because all you Hero Risers out there read the novels and spread the word. Seriously, we've got no marketing machine here at Heroes Rise; just a few interactive novels and some seriously awesome fans.\n\nWhile this may be the end of the Heroes Rise Trilogy, I have big plans to expand the Heroes Rise universe with The Hero Project 2, featuring the Second Season of The Hero Project and some of your favorite faces from Heroes Rise.\n\nSo if you want to keep adventuring in Millennia City, keep doing what you're doing: read, leave those good reviews, tell your friends, post, share, like, tweet, and keep on supporting Heroes Rise! Also make sure to let us know via email and the Heroes Rise social media pages, which can be found in the ABOUT tab on your homescreen or by visiting: \n\n*link https://zacharysergi.com/ Zachary Sergi\n\nWe've got all kinds of other cool stuff there, including Strategy, Hidden Bonus, Badge, and Alternate Ending Guides, as well as news and extra stories from Millennia City, fan contests, and much, much more.\n\n*page_break\n\nThis is the end of the [i]Heroes Rise[/i] trilogy, but the [i]Hero Project[/i] reality show will continue in [i]The Hero Project: Redemption Season![/i]\n\nIn [i]Redemption Season[/i], you'll play as a new hero, but if you save your game below, you can use your saved game to bring your [i]Heroes Rise[/i] character, ${codename}, into the continuing story.\n\n*save_game save_herofall\n\nWe hope you've enjoyed playing [i]Heroes Rise: Herofall.[/i]\n\n*feedback\n\nThanks so much again and hope to see you all next time, Hero Risers!\n\nAll Best,\n*line_break\nZachary Sergi (Codename: Riser)\n\n*ending\n", "chap_two": "*comment é\n\n*text_image chap_2.png center Fought the Law\n\n*label chaptertwostart\n\nSomeone's head is going to roll. \n\nIt's the thought that rises above all the questions piling up: how did the police know to come to this DRPR safe house? Is there a leak at the DRPR? If so, Jenny won't be pleased…speaking of whom, where is Jenny? And why are the police here now—shouldn't you have a day to appear for your IRP summons? Did President Victon authorize this? Or did the police somehow follow Prodigal here? Is that why she kept saying you had to get going?\n\nThe simple answer to all of these questions remains: heads rolling. \n\nYou just hope one of them won't be yours.\n\n*page_break\n\n\"${firstname} ${familyname}, you are hereby called to report, with escort, to the Infinity Regulation Center,\" a voice crackles over a loudspeaker from outside. \"Additionally, it appears you are harboring a dangerous fugitive. We have the house completely surrounded. If you surrender peacefully and hand over Prodigal, your compliance will be noted. But know that resistance is futile.\"\n\n[i]Like slugger it is[/i], you think. \n\nStill, the decisions you're going to have to make in the next few minutes are going to be vital. President Victon's announcement about your parents and the arrival of the police changes everything. You wish you had more time to make a real plan, but time is a luxury you can't afford right now.\n\nBecause everything that matters in your life is at risk, in this moment. \n\n*if warningsys\n\t*label activatechip\n\tSo you mentally flip on the MeChip Warning System.\n\n\t*if chip_diva\n\t\t\"Two thangs, babydoll,\" MeChip ${chipname} starts. \"I'm picking up signals that those po-po aren't here to work with you, no matter what they say. And I don't have to tell you not to trust the psycho girl on your right. Now get to work, work!\"\n\t\t*goto stratinform\n\t*elseif chip_butler\n\t\t\"I can tell from the police chatter that they have no intention of working with you, despite what they say,\" MeChip ${chipname} starts. \"So don't make the mistake of trusting them, ${sir_mad}. Or Prodigal, but hopefully that goes without saying.\"\n\t\t*goto stratinform\n\t*else\n\t\t\"I can tell from the police chatter that they have no intention of working with you, despite what they say,\" MeChip ${chipname} starts. \"So don't make the mistake of trusting them, sweetie. Or Prodigal, but hopefully that goes without saying.\"\n\t\t*goto stratinform\n*else\n\t*page_break\n\t*label cancel_purchase\n\tWhich means you need all the help you can get. You think of the MeChip Warning System, which informs you of strategic possibilities and warns you if you're about to make a decision with a high level of risk.\n\n\tDid you purchase the MeChip Warning System in the last few weeks to prepare for an emergency like this one?\n\n\t*check_purchase warningsys\n\t*choice\n\t\t*selectable_if (money >= 50000) #Yes I did, with in-game money. (Cost: $50,000)\n\t\t\t*set money -50000\n\t\t\t*set warningsys true\n\t\t\t*achieve warningsys\n\t\t\t*page_break\n\t\t\t*goto activatechip\n\t\t*if (choice_purchase_supported)\n\t\t\t*if (choice_purchased_warningsys) #Unlock the MeChip Warning System again, at no additional charge.\n\t\t\t\t*label purchased_warningsys\n\t\t\t\t*set warningsys true\n\t\t\t\t*page_break\n\t\t\t\t*goto activatechip\n\t\t\t*if (not(choice_purchased_warningsys)) #Buy the MeChip Warning System as an In-App Purchase. (Approximate cost: $0.99)\n\t\t\t\t*check_purchase warningsys\n\t\t\t\t*if choice_purchased_warningsys\n\t\t\t\t\t*goto purchased_warningsys\n\t\t\t\t[i]The MeChip warning system is available for underfunded heroes as an in-app purchase.[/i]\n\n\t\t\t\t*purchase warningsys $0.99 purchased_warningsys\n\t\t\t\t*page_break No, Thanks\n\t\t\t\t*goto cancel_purchase\n\n\t\t#No I didn't.\n\t\t\t*goto stratinform\n\n*label stratinform\n*page_break\n\nYou can already tell that how you respond here will redefine what it means for you to be lawful or lawless. Actually, rebelling against the police could  be the most lawful thing you do, considering how corrupt President Victon's laws have become. \n\nNot only that, you're going to have to decide what's more important to you: the security of saving your parents as swiftly as possible, or the freedom to stand up for what you believe in?\n\n\"So, chicken,\" Prodigal whispers. \"What's it going to be?\"\n\nYou stand here, with your arch-enemy at your side, and know that what you choose to do now will translate into a message seen by the entire nation.\n\nSo you had better choose wisely.\n\n*choice\n\t#Use Prodigal as a distraction to escape with Grandma.\n\t\t*set freedom %-20\n\t\t*set lawless %+20\n\t\t*set rlshp_prodigal %-20\n\t\t*set useprodigalescape true\n\t\t*set regimedamage -1\n\t\t*goto escapescenario\n\t#Escape the police with Prodigal and Grandma.\n\t\t*set freedom %-20\n\t\t*set lawless %+20\n\t\t*set rlshp_prodigal %+20\n\t\t*set escapewithprodigal true\n\t\t*set regimedamage -1\n\t\t*goto escapescenario\n\t#Take a stand against the police with Prodigal.\n\t\t*set freedom %+20\n\t\t*set lawless %-25\n\t\t*set rlshp_prodigal %+20\n\t\t*set standwithprodigal true\n\t\t*set feared %+15\n\t\t*set regimedamage +1\n\n\t\tYou find the nearest camera orb hovering just outside the window and look directly into it. \n\n\t\t\"President Victon and the government want to persecute Infini Powereds?\" you say. \"Well, we won't allow it.\"\n\n\t\tThat's all you need to say, especially since you're standing right next to Prodigal, a sight that will most definitely strike fear into your enemies.\n\n\t\t[i]Good[/i], you think. [i]They should be afraid of me[/i].\n\n\t\t*choice\n\t\t\t#Ask Prodigal what tricks she has up her sleeve.\n\t\t\t\t*set offensive %-10\n\t\t\t\t*set unleash %-10\n\t\t\t\t*set youwantfight true\n\t\t\t\t*goto escapescenario\n\t\t\t#Find a way to shut down the cameras, then escape. This is not a fight I can really win, in many ways.\n\t\t\t\t*set offensive %-10\n\t\t\t\t*set unleash %-10\n\n\t\t\t\tYou just put on a nice little show, but you have to go. Even if you managed to somehow take down the police here right now, there would be more on the way very soon. And the army of Grandma, Prodigal, and a Powerless ${codename} wouldn't exactly stand a chance against that.\n\n\t\t\t\tSo you scan the living room and spot a lamp on the table beside the sofa. You grab it, turn back towards the camera orb hovering outside, and hurl the lamp through the window. The glass shatters and the lamp collides with the orb, sending it smoking to the ground. \n\n\t\t\t\t\"Prodigal, kill the other cameras so no one sees us running,\" you command. \"Then we go.\"\n\n\t\t\t\t\"I thought you'd never ask,\" Prodigal says, generating a coiled flare stick in her hand. Not wasting a second, Prodigal chucks the flare out the window and it flashes blue.\n\n\t\t\t\t\"That was a custom frequency flare. It will jam any signals those cameras try to send,\" Prodigal explains. \"And for my next trick, it's time to bring back an old fan favorite to cover our tracks!\"\n\n\t\t\t\t*page_break \n\t\t\t\t*goto poolkillersactivate\n\t\t\t#Power up and fight the police head on, no matter what the risk.\n\t\t\t\t*set offensive %+20\n\t\t\t\t*set unleash %+15\n\t\t\t\t*set powerregain +1\n\n\t\t\t\t\"Prodigal, please tell me you have a bomb I can throw,\" you say. You see the maniacal smile that spreads across her face and you add: \"Something non-lethal.\"\n\n\t\t\t\t\"Oh, you, always taking the fun out of everything,\" Prodigal sighs, handing you a metal sphere from one of her belt pouches. \"That's essentially a flash bang, emphasis on the bang. Short range, which means I'll have to cover you…\"\n\n\t\t\t\tAs soon as Prodigal finishes speaking, you spot red lights blinking on all around the outside of the lake house. One glance at a sleek metal tentacle tells you all you need to know:\n\n\t\t\t\tPool killers.\n\n\t\t\t\tYou've been on the receiving end of Prodigal's deadly pool-cleaner robots more than you'd ever like. And you don't even want to know how Prodigal managed to stash this many here at your safe house. All you're thinking right now is that it's nice to have them on your side, for a change.\n\n\t\t\t\t*page_break \n\t\t\t\t*set power -30\n\t\t\t\t*set health -15\n\n\t\t\t\tOnce you hear the pool killers begin to attack, you take your moment. You run out the front door and generate a shield around yourself. It hurts like slugger and costs way too much Power, but at least it works…for now. You have no idea how long you'll be able to sustain it.\n\n\t\t\t\tSo you toss Prodigal's flash bomb at the police line, bracing against the shots fired at your shield. Feeling the energy start to dissipate from the strain, you turn and run back inside, just as the flash bomb goes off.\n\n\t\t\t\tPanting just inside the doorway, you think about how strenuous and risky that was. Without the cover of Prodigal's pool killers, you would have been toast.\n\n\t\t\t\tStill, getting back into the fight after all this time on the sidelines felt really slugging good.\n\n\t\t\t\t*page_break\n\t\t\t\t*goto prodigalwarningright\n\t#Turn Prodigal in to the police as a show of good faith.\n\t\t*set rlshp_prodigal %-25\n\t\t*set turninprodigal true\n\t\t*set feared %-15\n\t\t*set regimedamage +1\n\n\t\tYou find the nearest camera orb and look directly into it. \n\n\t\t\"I don't believe in President Victon's persecution,\" you say. \"But I don't believe in teaming with criminals to fight him, either.\"\n\n\t\tIn the same breath, you spin and backhand a very-stunned Prodigal. Not giving her a second to react, you then hold her hands behind her back and push her towards the front door. If you give Prodigal the chance, she'll be able to free herself, so you hold your grip tightly.\n\n\t\tOnce outside, you shout: \"I'm handing over Prodigal so we can discuss this peacefully.\"\n\n\t\t\"This is a big mistake, you stupid slugger,\" Prodigal growls under her breath.\n\n\t\t\"Shut up,\" you whisper back.\n\n\t\t*page_break\n\t\t*set power -40\n\t\t*set health -40\n\t\t*set powerregain +1\n\n\t\tYou walk Prodigal forward, but as you do, you hear that same voice crackle over the loudspeaker: \n\n\t\t\"Take both targets down. Now!\"\n\n\t\tBefore you can form another thought, the police open fire at you and Prodigal. You feel a plasma beam burn into your arm and you release Prodigal. She immediately flips away, kick-shielding herself as she moves. Still stunned, you decide you had better do the same.\n\n\t\tYou try to generate a shield around yourself. It hurts like slugger and costs way too much Power, but at least it works…for now. You have no idea how long you'll be able to sustain it, especially as shots continue to collide against its surface. \n\n\t\t*page_break\n\n\t\t\"Get back inside, you slugging moron!\" Prodigal shouts. \"I'll cover you!\"\n\n\t\tAs soon as Prodigal finishes speaking, you spot red lights blinking on all around the outside of the lake house. One glance at a sleek metal tentacle tells you all you need to know:\n\n\t\tPool killers.\n\n\t\tYou've been on the receiving end of Prodigal's deadly pool-cleaner robots more than you'd ever like. And you don't even want to know how Prodigal managed to stash this many here at your safe house. All you're thinking right now is that it's nice to have them on your side, for a change. \n\n\t\t*page_break\n\n\t\tYou run back inside the house and find Grandma squatting behind the protection of some genetically reinforced indoor azalea bushes. You duck beside Grandma, catching a glimpse of Prodigal outside a now-broken window, crouched behind a wall of gathered pool killers, whispering battlefield commands to her army like some mad general. \n\n\t\tSeeing your opportunity, you turn to Grandma. \"We need to go. Now.\"\n\n\t\t*goto grandmacanthear\n\n*label escapescenario\n\n\"Prodigal, you're the war expert here,\" you say. You know that Prodigal has the Power to generate any wartime technology she can imagine, as well as to create movement-based shields—not to mention her skills as a world class gymnast and fighter. \"Show me what you got?\"\n\n\"I thought you'd never ask,\" Prodigal says, turning towards the nearest window. \"To me, my pets.\"\n\n*label poolkillersactivate\n\nAs soon as Prodigal finishes speaking, you spot red lights blinking on all around the outside of the lake house. One glance at a sleek metal tentacle tells you all you need to know:\n\nPool killers.\n\nYou've been on the receiving end of Prodigal's deadly pool-cleaner robots more than you'd ever like. And you don't even want to know how Prodigal managed to stash this many around your safe house. All you're thinking right now is that it's nice to have them on your side, for a change. \n\n*page_break\n\nWithin seconds, there's complete chaos. As the fleet of pool killers activates and attacks, the police respond with a barrage of gunfire and laser blasts. You jump to cover Grandma, but she has already ducked under the protection of some genetically-reinforced indoor azalea bushes. \n\nProdigal cartwheels across the living room, generating shields with every turn of her limbs and deflecting stray bullets and laser charges. \n*if useprodigalescape\n\tShe settles behind a wall of gathered pool killers, whispering battlefield commands to her army like some mad general. \n\n\tSeeing your opportunity, you turn to Grandma. \"We need to go. Now.\"\n\n\t*label grandmacanthear\n\t\"What?\" Grandma shouts, unable to hear you over the din of robotic screeching and police screaming. You've asked her to get a hearing aid application for her MeChip about a thousand times…\n\n\t\"We need to use the pea shoot,\" you shout into Grandma's ear. \n\n\tHearing this, Grandma grabs your hand and moves.\n\t*goto peashoot\n*elseif escapewithprodigal\n\t*label fiveatbest\n\tShe settles next to you and Grandma. \n\n\t\"That should buy us five minutes, at best,\" she says.\n\n\t\"Then we need to go. Now,\" you reply.\n\n\t*label prodgranwhat\n\t\"What?\" Grandma shouts, unable to hear over the din of robotic screeching and police screaming. You've asked her to get a hearing aid application for her MeChip about a thousand times…\n\n\t\"We need to use the pea shoot,\" you shout into Grandma's ear. \n\n\tHearing this, Grandma grabs your hand and moves.\n\n\t\"What in all holy slugger is the pea shoot?\" Prodigal asks, running after you.\n\t*goto peashoot\n*else\n\t*if youwantfight\n\t\tShe settles next to you and Grandma. \n\n\t\t*label prodigalwarningright\n\t\t\"That should buy us five minutes, at best,\" Prodigal starts. \"And we just put on a nice little show, but we have to go. This is not a fight we can win.\"\n\n\t\tThat thought makes you furious, but you know it's true. Even if you managed to somehow take down the police here right now, there would be more on the way very soon. And the army of Grandma, Prodigal, and a Powerless ${codename} wouldn't exactly stand a chance against that.\n\n\t\t*goto prodgranwhat\n\t*else\n\t\t*goto fiveatbest\n\t\n*label peashoot\n*page_break ONE MINUTE LATER\n\nYou find yourself rocketing through a moss-lined tube slide, one that winds underground to a secret garage across the lake. Jenny told you about the safe house's secret exit hatch the day you moved in, but it was Grandma's idea to grow slick moss throughout the tube for extra speed. It was also her idea to call it the pea shoot, naturally.\n\nToo bad Grandma didn't account for the slime factor, you think as you feel the wind boosters ease up, dropping you safely on your feet inside the garage. \n*if (useprodigalescape) or (turninprodigal)\n\tYou step aside as Grandma follows behind, her hair covered in mossy mess.\n\n\t\"We have to get out of here before the police or Prodigal find us. Especially Prodigal,\" you say, stepping towards the hovercar parked in the garage. \n\n\tHovercar traffic is mostly restricted in the city, but hovercars are much more necessary out here in the countryside. You haven't driven one since your driver's test, but the DRPR sprung for a Puksta x900, the latest eco-luxury model with fully equipped MeChip autopilot compatibility. You've missed real flying more than you can stand, so maybe taking this baby for a spin will be just what—\n\n\t\"Oh, heavens no,\" Grandma says, grabbing hold of the driver door. \"I may be able to stomach the occasional home invasion, but letting you drive will cause a stress my old frame won't survive.\"\n\t*goto abouttoprotest\n*else\n\tYou then step aside as Grandma follows behind, her hair covered in mossy mess. Prodigal drops in last, sneezing uncontrollably as she shakes off the greenery. \n\n\t\"We have to get out of here before the police find this place. Or they hear Prodigal's sneezing fit,\" you say, stepping towards the hovercar parked in the garage. \n\n\tHovercar traffic is mostly restricted in the city, but hovercars are much more necessary out here in the countryside. You haven't driven one since your driver's test, but the DRPR sprung for a Puksta x900, the latest eco-luxury model with fully equipped MeChip autopilot compatibility. You've missed real flying more than you can stand, so maybe taking this baby for a spin will be just what—\n\n\t\"Oh, heavens no,\" Grandma says, grabbing hold of the driver door. \"I may be able to stomach the occasional home invasion, but letting you drive will cause a stress my old frame won't survive.\"\n\n\t\"I…\" Prodigal tries to start, but is interrupted by a sneeze. \"I concur. I watched young ${firstname}'s driver's test way back when. Simply dreadful.\"\n\t*goto abouttoprotest\n\n*label abouttoprotest\n*page_break\n\nYou're about to protest, but you're distracted by the squadron of police you suddenly spot outside the garage window, all wearing PowerBreaker Battlesuits. What the slugger? You thought the DRPR banned those models back during the—\n\n[i]Snap out of it[/i], you scream at yourself, [i]that doesn't matter[/i]. Because you have about five seconds before the squadron realizes you're here and all slugger breaks loose. \n\nYou point out the window and bring a finger to your lips, sizing up the PowerBreaker Battlesuits. They're made of energy-resistant metal and have limbs reinforced with strength coils and agility-enhancing springs, not to mention a full array of plasma-powered weapons. You can probably add the BattleSuit's comeback to the list of things to thank President Victon for.\n\n*if warningsys\n\t*if chip_diva\n\t\t\"You do not want to engage those boogers directly,\" MeChip ${chipname} says, operating on auto Warning System protocols. \"Those Battlesuits are brutal, but they do have two soft spots: the compartment seams leave their squishy parts open to small projectiles. And then there are the volatile plasma packs, but those are heavily shielded from the outside.\"\n\t\t*goto egsquad \n\t*elseif chip_butler\n\t\t\"Do not engage this squadron directly,\" MeChip ${chipname} says, operating on auto Warning System protocols. \"Those Battlesuits are extremely dangerous, but they do have two key weaknesses: the compartment seams leave the occupants exposed to small projectiles. And their plasma packs, though heavily shielded from the outside, are extremely volatile.\"\n\t\t*goto egsquad \n\t*else\n\t\t\"Don't engage those nasties directly,\" MeChip ${chipname} says, operating on auto Warning System protocols. \"Those Battlesuits are extremely dangerous, sugarplum! But they do have two key weaknesses: the compartment seams leave the occupants exposed to small projectiles. And their plasma packs, though heavily shielded from the outside, are extremely volatile.\"\n\t\t*goto egsquad\n*else\n\t*goto egsquad\n\n*label egsquad\n\nHow are you going to get past the squadron?\n\n*if (power \u003c= 30)\n\t*if warningsys\n\t\t*if chip_diva\n\t\t\t\"Added Warning: Your Power Level is hella low,\" MeChip ${chipname} suddenly booms in your ear. \"No time to recharge, so no Power use!\" \n\t\t\t*goto sqaudchoicereal\n\t\t*else\n\t\t\t\"Additional Warning: Your Power Level is dangerously low,\" MeChip ${chipname} suddenly booms in your ear. \"There's no time to recharge, so please avoid Power use.\" \n\t\t\t*goto sqaudchoicereal\n\t*else\n\t\t*goto sqaudchoicereal\n*elseif (health \u003c= 40)\n\t*if warningsys\n\t\t*if chip_diva\n\t\t\t\"Added Warning: Your Health Level is hella low,\" MeChip ${chipname} suddenly booms in your ear. \"No time to recharge, so no brawls!\" \n\t\t\t*goto sqaudchoicereal\n\t\t*else\n\t\t\t\"Additional Warning: Your Health Level is dangerously low,\" MeChip ${chipname} suddenly booms in your ear. \"There's no time to recharge, so please avoid direct confrontation.\" \n\t\t\t*goto sqaudchoicereal\n\t*else\n\t\t*goto sqaudchoicereal\n*else\n\t*goto sqaudchoicereal\n\n*label sqaudchoicereal\n*choice\n\t#Nudge my atomic Power to spark a reaction in the plasma battery packs. (Power Cost 30)\n\t\t*if (power \u003c= 30)\n\t\t\tYou begin to activate your Powers, but then you feel an overwhelming stab of pain radiate through you. Before you know what's happening, your body gives out and you crash to the floor.\n\n\t\t\tThat's when you feel it—your Power Level is completely depleted. You weren't paying close enough attention and overexerted your Powers.\n\n\t\t\tAs the world starts to swirl into excruciating blackness, your final thoughts are of Grandma and your parents…\n\n\t\t\tFor you've truly let them down.\n\n\t\t\t*choice\n\t\t\t\t#Return to the beginning of the fight to see if I can survive. (Legend Cost 20)\n\t\t\t\t\tYou have another shot to escape from the police, but your Legend Level will probably never recover from this drop.\n\n\t\t\t\t\tLegendary heroes don't die, ${codename}. You had better make better decisions this time around.\t\t\n\t\t\t\t\t*set power 100\n\t\t\t\t\t*set health 100\n\t\t\t\t\t*set legend -20\n\t\t\t\t\t*set standwithprodigal false\n\t\t\t\t\t*set turninprodigal false\n\t\t\t\t\t*set regimedamage -1\n\t\t\t\t\t*set powerregain -1\n\t\t\t\t\t*set feared
