 themselves. \n\n*page_break\n\nThen Prodigal unexpectedly groans and doubles over, dropping both guns. What the slugger?\n\nYou step forward to finish this fight, but you spot movement in the hallway through a large window in the room's wall. Your blood runs cold as you see four figures:\n\n*label trackingteamchoice\n*choice\n\t*disable_reuse #Splicina.\n\t\tSplicina was the life force sourcing weapons specialist from Culic's InfraOrder who created his Animalistic bio-weapon, the same weapon that The Meek and President Victon later re-appropriated for their Infinity Regulator. You figure Splicina must have some kind of technologically-based Powers, since she also sports metal wings covered with all kinds of nasty-looking upgrades.\n\n\t\tSplicina is supposed to be serving a life prison sentence along with the rest of the InfraOrder, so what the slugger is she doing here?\n\t\t*goto trackingteamchoice\n\t*disable_reuse #Scoundrel.\n\t\tScoundrel was a fellow Fringe resident and 14th place Finalist from The Hero Project who served as a mole for Culic's InfraOrder. You'd recognize her anywhere, since she's an Animalistic Powered who looks like a massive turkey-human hybrid.\n\n\t\tScoundrel is also supposed to be in prison for a very long time, given her crimes….\n\t\t*goto trackingteamchoice\n\t*disable_reuse #Sheathe.\n\t\tSheathe was a Semi-Finalist from The Hero Project who got cut at the Final Selection. You're not sure what he's doing here.\n\n\t\tThough given the fact that he's a gnarly lion-ish Animalistic Powered with a shadowy, lethal past as a potential serial killer, it's not completely shocking he'd be hunting you.\n\t\t*goto trackingteamchoice\n\t*disable_reuse #Null.\n\t\tOr at least, there's someone in a Null bodysuit, since that's the heroic identity of your best friend, Jenny Yu. \n\n\t\tThis Null looks a little less sleek and a bit bulkier, plus it's missing Jenny's signature ponytail. Other than that, the suit is exactly the same. That couldn't be Jenny in some kind of upgraded Null suit, could it? Besides, she said she was retiring Null after The Hero Project….\n\n\t\tUnless maybe that really is Jenny, going undercover to help you? Or could it be someone else entirely? Either way, you had better tread carefully, with this one.\n\t\t*goto trackingteamchoice\n\t#I'm finished remembering these four.\n\t\t*goto allfourare\n\n*label allfourare\n\nAll of these hunters are from your days at The Hero Project and they all wear the same black and navy bodysuits. What are they doing here with Trackr and The Hound? Who could have put together this little horror show of a team?\n\nYou suppose you can just add these to the list of questions you don't have any time to answer right now. \n\n\"Prodigal, we've got company,\" you shout, pointing to the window. \n\nProdigal clocks the oncoming unfriendlies and strains to produce a blue-coiled bomb, a miniature version of the one she used back on that first night you battled Smyther's Splice Circle. \n\nYou know firsthand how deadly those things can be, but before you can say anything, Prodigal chucks the bomb at Trackr and The Hound, then spins to run by you.\n\n\"Follow me!\" Prodigal screams as she goes.\n\n*page_break\n\nYou turn to find a set of open vault doors leading to some kind of hardware storage closet—Prodigal must have noticed those before she decided to blow up the room. You turn and jump into the hardware vault and Prodigal slams the doors behind you, just in time to block out the bomb blast.\n\nAs the explosion clears, you're thankful to see that the doors have held. \n\nStill, you have no idea who that blast managed to take out, so you turn to Prodigal and say:\n\n*choice\n\t#\"You probably just killed them, you psycho! That is unacceptable!\"\n\t\t*set lawless %-20\n\t\t\"Those are two of the world's best trackers out there,\" Prodigal returns. \"We can't risk—\"\n\n\t\t\"No more killing,\" you say. \"We find another way. Do you understand me?\"\n\n\t\tProdigal looks like she wants to argue, but she knows you don't have the time. So she just nods grimly.\n\t\t*goto whodidyousee\n\t#\"Next time, let me get a piece of them, too.\"\n\t\t*set lawless %+20\n\t\t\"Something tells me you'll get your chance,\" Prodigal says. \n\n\t\tUnfortunately, you agree.\n\t\t*goto whodidyousee\n\t#\"What the slugger happened with your Powers, back there?\"\n\t\t*set rlshp_prodigal %-10\n\t\t\"Nothing. Trackr's plasma burst just knocked me for a loop, I was only fast enough to shield myself partially,\" Prodigal says as she dusts off her costume, which is burnt and battered where the blast broke through.\n\t\t*goto whodidyousee\n\t#\"Are you okay?\"\n\t\t*set rlshp_prodigal %+10\n\t\t\"Spickedy as spam, chicken,\" Prodigal says. \"Though Trackr's plasma burst did knock me for a loop. I was only fast enough to shield myself partially. Still, I think we both know who got the last laugh.\"\n\n\t\tProdigal dusts off her costume, which is burnt and battered where the blast broke through.\n\t\t*goto whodidyousee\n\n*label whodidyousee\n*page_break\n\n\"Who else was out there?\" Prodigal asks.\n\n\"Sheathe, Scoundrel, Splicina, and…\" you start, taking a deep breath. \"What looked like someone in a Null suit.\"\n\nYou and Prodigal both fall silent for a few beats, after that.\n\n\"Well, maybe if we're lucky that blast annihilated them all?\" Prodigal tries.\n\nYou stare back at Prodigal, not sure if you find that thought comforting or horrifying yet.\n\n*page_break\n\nLuckily you don't have to decide as a bang sounds against the other side of the door. For better or worse, someone survived to keep coming for you.\n\n\"We only have a few minutes before those doors bust open, if that,\" Prodigal says. \"So here's what I'm thinking—if more than two of them survived, I'll create holo-decoy versions of us programmed to run off. That should get whoever is left out there to split up or get off our tails for a bit. \n\n\"But if that Splicina witch is out there, I want a piece of her myself,\" Prodigal snarls. \"She's been trying to outshine me with her life force tech business for years. Anyway, do you think you can handle your old bestie, if it comes down to it?\"\n\n\"That is not Jenny out there,\" you say, a little too loudly. \"And yes I can handle whoever it is.\"\n\nYou say the words and hope they are true. Because really, without your Powers, you're going to have to rely on strategy, your smarts, and your surroundings to get out of here alive. \n\n\"If we get separated, I'll meet you in the back alley where we left the hoverpod,\" you say, trying to speak over the banging against the vault doors. \"Then we can figure out how we're getting to DC.\"\n\n\"Divine,\" Prodigal sings. \"Now before we break on through to the other side, I have a little tidbit I've been meaning to share with you, a tasty morsel about your dampened Powers that I uncovered during my IRP surveillance.\"\n\n*page_break ONE MINUTE LATER\n*set powerregainrevealed true\n\nYou stand ready to bust open the mainframe vault doors, amped for a fight. \n\nBecause Prodigal just explained that every time you use your Powers, you re-strengthen them a little. This translates into something you're both calling Power Regain Points. Every time you use your Powers, it adds a Power Regain Point. The more points you accumulate, the sooner you’ll regain your fully restored Powers. \n\nHowever, using Power has greatly increased costs, not to mention the strain also reduces half of the Power Cost to your Health Level. And your Powers will be unreliable at best—there's no guarantee they'll work the way you want them to. Though Prodigal explained that as you accumulate Power Regain Points, your Powers will become more effective and less costly. So you know moving forward you're going to have to strike a balance between using your Powers and relying on less traditional methods.\n\nAs of now, you have ${powerregain} Power Regain Points out of a possible 8. \n\nEquipped with this knowledge, you're ready to face off against whoever is on the other side. Especially whatever impostor is in that Null suit.\n\n*page_break\n\nAs you open the vault doors, the two surprisingly convincing holo-decoys of you and Prodigal dart out of the charred room and through the blasted hole in the wall. As they take off, you see that all four of the newcomers survived the blast unscathed, but Trackr and The Hound don't stand with them. \n\n\"Slugger,\" Null's distorted voice shouts. \"Sheathe and Scoundrel, go after the runners! Splicina, stick with me for these two.\"\n\n\"Perfect,\" Prodigal whispers, activating a frequency jammer in her hand—you know that'll keep Null from calling Scoundrel and Sheathe back, for now. But it won't buy you that much time, so you're going to have to act fast to escape this alive.\n\nAs Splicina takes a step towards you, Prodigal shrieks and leaps at her, shouting indiscernible obscenities. Splicina screams and twists her back, cutting at Prodigal with her sharp techno-wings. Prodigal dodges with a mid-air spin, then lands a kick that sends Splicina reeling into the next room.\n\nYou're distracted from watching the rest of this grudge match, however, as Null steps in front of you.\n\n*page_break\n\n\"Who the slugger is under there?\" you practically growl.\n\n\"What's the matter?\" Null says. \"Don't recognize an old friend when you see one, hotshot?\"\n\nYou scream and leap at Null in a blind rage—you need to take off that helmet's face mask to see who's underneath. \n\nThinking fast, you smash the helmet with:\n\n*choice\n\t#My bare fists.\n\t\t*goto stepbackwardsand\n\t#A girder that fell from the roof in Prodigal's explosion. \n\t\t*goto stepbackwardsand\n\t#The base of the energy staff from my weapons belt.\n\t\t*goto stepbackwardsand\n\n*label stepbackwardsand\nYou bash the helmet, even though Null tries to sidestep your blow. Whoever is in there is slow—another good sign it's not Jenny.\n\nAs Null staggers backwards, the black face mask shatters and Null struggles to rip it off. \n\nAnd underneath you see none other than… \n\n*page_break\n\nRexford Schillers. \n\nHe's the one wearing the Null suit, the representation of the very figure that ended up ruining his life.\n\n\"This Devoid suit costs a fortune,\" Rexford snarls. \"As usual, you're going to slugging pay for that, you Gene Hazard!\"\n\nAs you see the face of the man who took advantage of you in The Hero Project, the man who dampened your Powers and tried to publicly shame you, the man who is now working with your greatest enemies and defaming your best friend by stealing her persona, all you can feel is cold anger.\n\n\"Do you like my little covert squad?\" Rexford says, walking towards you. \"A nice cadre of enemies from your past, all with world-class tracking Powers. Your reporter friend and Prodigal put up some impressive defenses, but there is no one on earth who can hide from The Infinite Elite.\"\n\n\"So what, your buddy Victon sprung you out of jail?\" you ask, wanting to get as much information as possible out of Rexford, while you can.\n\n\"I'm sorry, the origin-revealing portion of this program has come to a close,\" Rexford says. \"We've come to the part where you die.\"\n\n*page_break\n\nRexford—or Devoid, you suppose—runs at you, equipping his rocket launchers, knuckle-uzis, and laser cannons.\n\nYou only have seconds to decide what's more important to you: do you value the freedom to engage in a grudge match with Rexford, even if it’s risky and potentially compromises your mission to save your parents? \n\nOr do you value the security of doing the safe thing by running from a potentially satisfying fight with Rexford?\n\n*choice\n\t#Focus on escaping, no matter what.\n\t\t*set freedom %-35\n\t\t*set offensive %-10\n\t\t*set revenge %-10\n\t\t*set escaperexford true\n\t\t*set rexfordfinalefoe true\n\t\t*label escapethistext\n\n\t\tNothing is more important than your mission, not even settling your score with Rexford. You simply do not have time for this fight right now.\n\n\t\tBesides, something tells you that you'll get to have your showdown with Rexford some day soon, anyway.\n\n\t\t*if warningsys \n\t\t\t*if chip_diva\n\t\t\t\t\"Hey hunty, make sure to skidaddle in a way that Rexford can't follow,\" MeChip ${chipname} says in your ear as you decide what to do.\n\t\t\t\t*goto escaperexchoice\n\t\t\t*else\n\t\t\t\t\"Make sure to depart in a manner that Rexford won't be able to follow,\" MeChip ${chipname} says in your ear as you decide what to do.\n\t\t\t\t*goto escaperexchoice\n\t\t*else\n\t\t\t*goto escaperexchoice\n\t#Risk staying to capture footage of The Infinite Elite to send to ${reportername}.\n\t\t*set freedom %+25\n\t\t*set revenge %-20\n\t\t*set fame %+20\n\t\t*set health -40\n\t\t*set usecameras true\n\n\t\tIf you can let the world see Rexford's illegal squad, it could do irreparable damage to President Victon's regime. And that's an opportunity you cannot pass up.\n\n\t\tYou reach into your belt and open a hidden pouch cover, releasing dozens of camera orbs the size of flies. The cameras record separate angles and then upload the composite images to your MeChip, so you mentally order MeChip ${chipname} to transfer the video directly to ${reportername} over her secure line.\n\n\t\tYou also know these cameras will self destruct automatically after use, so you had better make this something worth recording.\n\n\t\t*page_break\n\n\t\tLuckily Rexford doesn't seem to notice the cameras, but that's probably because he's too busy swinging an energy broadsword down on you.\n\n\t\tYou try to dodge at the last second, but the broadsword expands even wider and catches you in the shoulder. It burns like slugger and you scream, falling back to regroup. Good thing you moved when you did, otherwise that hit would have split your head open.\n\n\t\tThe whole world is going to see what you do next, so what example are you going to set? Is it more important to escape or fight, to be revered or feared?\n\n\t\t*choice\n\t\t\t#Focus on escaping.\n\t\t\t\t*set recordandescape true\n\t\t\t\t*set rexfordfinalefoe true\n\t\t\t\t*goto escapethistext\n\t\t\t#Take Rexford down here and now.\n\t\t\t\t*set recordandfight true\n\t\t\t\t*goto firstfightrexfordchoice\n\t#Take Rexford down here and now.\n\t\t*set freedom %+25\n\t\t*set revenge %+20\n\t\t*set fame %-20\n\t\t*set offensive %+10\n\t\t*set fightrexford true\n\t\t*label firstfightrexfordchoice\n\n\t\tThere's no question that Rexford is too big a threat to leave behind. And after all he has done to you, getting to settle the score with Rexford will be a very nice perk.\n\n\t\tSo how do you want to handle him? \n\t\n\t\t*choice\n\t\t\t#I just need to neutralize Rexford quickly so he can't trail my escape.\n\t\t\t\t*set fightrexfordko true\n\t\t\t\t*set rexfordfinalefoe true\n\t\t\t\t*set freedom %-15\n\t\t\t\t*set revenge %-15\n\t\t\t\t*set lawless %-20\n\t\t\t\t*set offensive %-20\n\t\t\t\t\n\t\t\t\tEscaping is still your priority, you just need to make sure Rexford can't follow you. Besides, something tells you that you'll get to have your showdown with Rexford someday soon, anyway.\n\n\t\t\t\tStill, for now, simply knocking him out is going to feel slugging good.\n\t\t\t\t*goto fightrexfordscene\n\t\t\t#Cripple Rexford so he can't come after me anytime soon.\n\t\t\t\t*set fightrexfordcripple true\n\t\t\t\t*set revenge %+10\n\t\t\t\t*set lawless %+10\n\t\t\t\t*set offensive %+10\n\t\t\t\t\n\t\t\t\tRexford has put you through hell. \n\n\t\t\t\tSo you figure it's time to return the favor.\n\t\t\t\t*goto fightrexfordscene\n\t\t\t#End this threat once and for all by killing Rexford now.\n\t\t\t\t*set fightrexfordkill true\n\t\t\t\t*set freedom %+15\n\t\t\t\t*set revenge %+15\n\t\t\t\t*set lawless %+30\n\t\t\t\t*set offensive %+25\n\n\t\t\t\tRexford has put you through hell. \n\n\t\t\t\tSo you figure it's time to return the favor.\n\t\t\t\t*goto fightrexfordscene\n\n*label escaperexchoice\n\n*choice\n\t*selectable_if (useinvisibility = false) #Use the invisibility generator to slip out undetected.\n\t\t*set unleash %-15\n\t\t*set useinvisibility true\n\n\t\tYou flip on the invisibility generator and feel your body rushed with warm air as it disappears. Then you run for the open door.\n\n\t\t\"Slugger, ${codename} just teleported somehow,\" Rexford screams as you run right by him. \"$!{Youze} just dropped off all of my sensors!\"\n\n\t\tWow. Apparently when Prodigal claims invisibility, she really means it in every way.\n\n\t\tHowever, you only have one minute left of this one-time invisibility use, so you know you had better make it count and get to the back alley as quickly as possible.\n\t\t*goto alleyback\n\t*disable_reuse #Use the hoverwings to fly out.\n\t\t*set unleash %-15\n\t\t*set usewings true\n\n\t\tYou grab the folded wings off your belt and slip the straps over your shoulders like a backpack. As you do, two hoverwings shoot out from behind you.\n\n\t\tNot wasting a second, you jump forward and feel the hoverwings whir to life, propelling you forward much faster than expected. You rocket towards Rexford and aim for the hole in the wall. \n\t\t\n\t\t*if (offensive > 50)\n\t\t\t*set health -20\t\n\t\t\tBut before you can reach it, Rexford hits you with a concentrated cyclone blast from his gauntlet. It connects with your stomach, knocking the wind out of you and messing with your flight path. \n\n\t\t\t*page_break\n\n\t\t\tAbout to fly into the wall, you slip out of the wings and tumble to the floor. You hear the wings explode above you, though you're distracted as Rexford's boot connects with your jaw.\n\n\t\t\tGoing limp and rolling away from Rexford, you try to decide what your next move should be, now that the wings are destroyed. \n\t\t\t*goto escaperexchoice\n\t\t*else\n\t\t\tBut before you can reach it, Rexford tries to hit you with a concentrated cyclone blast from his gauntlet. Luckily your defensive instincts kick in and you you slip out of the wings, tumbling to the floor.\n\n\t\t\tYou hear the wings explode against the wall as you go limp and roll away from Rexford. Now that the wings are destroyed, you have to decide what your next move should be. \n\t\t\t*goto escaperexchoice\n\t#Use the grappling hook to trap Rexford in the vault.\n\t\t*set unleash %-15\n\t\t*set usegrappling true\n\n\t\t*if (unleash > 50)\n\t\t\t*set health -10\n\t\t\tYou reach for the grappling hook gun on your belt as Rexford throws a punch at you. You duck beneath the blow and weave to the right, but are surprised to find Rexford's foot sinking into your stomach. You're so used to accessing your Powers, you have to adjust to using weapons like this. \n\n\t\t\t[i]And Rexford must have activated some speed upgrades in that Devoid suit[/i], you think as you roll across the ground. \n\n\t\t\tThat's fine—you can be speedy too.\n\n\t\t\t*page_break\n\t\t\t*goto traprexford\n\t\t*else\n\t\t\t*label traprexford\n\t\t\tAs Rexford runs  at you, you fire the grappling gun directly into his chest. The hook just cracks into the surface of the armor plate and doesn't slow Rexford down, but you can tell that it's in just deep enough for your purposes. \n\n\t\t\tTumbling away from Rexford, you make your way into the hardware vault, letting the grappling cord continue to slack loose. Then once you're inside the vault, you hit the retract button and pull hard. \n\n\t\t\tRexford comes flying deep into the vault and you make sure to toss the gun aside as he crashes to the ground. Then you run back to the door and slam it shut behind you, jamming the doors with some metal debris.\n\n\t\t\tRunning towards the exit, you know that won't hold Rexford for long. But it should hold him just long enough for you to shake him and make it to the back alley.\n\t\t\t*goto alleyback\n\t#Unleash some supersonic flight. (Power Cost 10-20)\n\t\t*set unleash %+15\n\t\t*set powerregain +1\n\n\t\tYou prime yourself for superfast flight, feeling the weight of your body much more than usual. Straining hard, you imagine yourself shooting forward at your top speed. \n\n\t\tBut as you start to float off the ground, you feel your feet touch back down. Slugger, you have to make this work.\n\n\t\t*if (powerregain > 4)\n\t\t\t*set power -10\n\t\t\t*set health -5\n\t\t\tFocusing harder as Rexford approaches, you try to rocket forward again. \n\n\t\t\t*label miraculousflight\n\n\t\t\tMiraculously, you find yourself bursting forward, knocking Rexford aside with the force of your sonic boom. \n\n\t\t\tManeuvering with precision, you rocket through the halls of the HQ, making your way towards the back alley. There's no way Rexford will be able to follow you directly at this speed, so it should buy you enough time to get into the hoverpod.\n\t\t\t*goto alleyback \n\t\t*else\n\t\t\t*set power -20\n\t\t\t*set health -20\n\t\t\tYou try to focus harder, but that's difficult to do as one of Rexford's steel fists smashes across your face. \n\n\t\t\t*page_break\n\n\t\t\tStumbling backwards, you use the pain to fuel your Powers, trying to rocket forward again.\n\t\t\t*goto miraculousflight\n\n*label fightrexfordscene\n\n*if warningsys\n\t*if chip_diva\n\t\t\"That knockoff Null armor is still hella energy resistant,\" MeChip ${chipname} says in your ear. \"But that ugly mug of his is exposed!\"\n\t\t*goto dodgethatblow\n\t*else\n\t\t\"Rexford's Devoid armor is highly energy resistant,\" MeChip ${chipname} says in your ear. \"But now that Rexford's face is exposed, that'll be his weak spot.\"\n\t\t*goto dodgethatblow\n*else\n\t*goto dodgethatblow\n\n*label dodgethatblow\n*page_break\n\nComing at you, Rexford tries to hit you with a left hook, but you duck underneath his fist. Rexford then tries to nail you with a roundhouse kick, but you stretch forward over his leg and leap into a somersault. \n\nAs Rexford spins to make his next move, you see your opening to make a move of your own.\n\n*label fightrexfordscenechoice\n*choice\n\t*disable_reuse #Blast Rexford with my plasma pistols.\n\t\t*set unleash %-15\n\n\t\tYou draw both pistols quickly and start firing rounds of plasma bullets at Rexford's face. \n\n\t\tBut Rexford spins into your shots and protects his face with both wrist gauntlets. The energy resistant wrist plates reflect the bullets—directly back at you.\n\n\t\t*if (unleash > 50)\n\t\t\t*set health -20\n\t\t\tYou jump away to avoid the blasts, but this puts you right in the path of Rexford's own plasma blast. You're so used to accessing your Powers, you have to adjust to using weapons.\n\n\t\t\tAs you roll across the floor and into a crouching position, you holster the plasma pistols and decide it's time to take another approach. \n\t\t\t*goto fightrexfordscenechoice\n\t\t*else\n\t\t\tAs you roll across the floor and dodge the blasts, you holster the plasma pistols and decide it's time to take another approach. \n\t\t\t*goto fightrexfordscenechoice\n\t#Impair Rexford's senses with flashbangs, then fight him down.\n\t\t*set unleash %-15\n\t\t*set useflashbangs true\n\n\t\t*if fightrexfordko\n\t\t\tYou wait until Rexford is right in front of you again, then you toss the entire pouch of flashbangs in front of Rexford's face. \n\n\t\t\tYou close your eyes and cover your ears to protect against the intense light and noise. When you open your eyes again, Rexford is stumbling, screaming about how he can't see or hear anything.\n\n\t\t\t[i]Perfect[/i].\n\n\t\t\t*page_break\n\n\t\t\tYou launch forward and crack Rexford across the cheek with your fist, since his exposed face is his only current weak spot. Then you spin into a roundhouse kick and finish with an uppercut to Rexford's chin that sends crumpling into a heap on the ground.\n\n\t\t\tTaking one moment to savor the sight of Rexford on the floor, you then run towards the door. It's time to get to the back alley and into that hoverpod.\n\t\t\t*goto alleyback\n\t\t*elseif fightrexfordcripple\n\t\t\tYou wait until Rexford is right in front of you again, then you spin around him and toss the entire pouch of flashbangs at Rexford's back. You close your eyes and cover your ears to protect against the intense flashes and bangs.  \n\n\t\t\tThough flashbangs are meant only to stun, they still pack a concussive explosion and burning heat—especially ten of them at once, that close. \n\n\t\t\tWhen you open your eyes again, Rexford lays on the ground, the back of his Devoid suit ripped open and his spine bent at an impossible angle. \n\n\t\t\t*page_break\n\n\t\t\tSeeing Rexford there on the floor, you doubt he'll ever be able to walk again. Though who knows, maybe he'll get a really great IRP surgeon… As Rexford once said to you, sometimes the ends justify the means for the greater good. \n\n\t\t\tTaking one moment to savor the sight, you then run towards the door. It's time to get to the back alley and into that hoverpod.\n\t\t\t*goto alleyback\n\t\t*else\n\t\t\tYou wait until Rexford is right in front of you again, then you spin around him and jump onto his back. Before Rexford can respond, you stuff your entire supply of flashbangs into his broken helmet. Then you jump off and roll away as they explode. \n\n\t\t\tThough flashbangs are meant only to stun, they still pack a concussive explosion and can burn in close proximity—especially ten of them at once. \n\n\t\t\t*page_break\n\n\t\t\tAs you turn back towards Rexford, you see his body lying motionless on the floor. \n\n\t\t\tAnd there's a smoking crater where his face should be. \n\n\t\t\t*page_break\n\n\t\t\tYou just killed Rexford Schillers. \n\n\t\t\tYou took a life with calm calculation, for the first time. As Rexford once said to you, sometimes the ends justify the means, for the greater good.\n\n\t\t\tTaking one more moment to absorb the sight, you run towards the door. It's time to get to the back alley and into that hoverpod. Though you can't shake the feeling that there will be consequences to pay for your actions here today.\n\t\t\t*goto alleyback\n\t#Flatten Rexford with a gravity crush. (Power Cost 40-60)\n\t\t*set unleash %+15\n\t\t*set powerregain +1\n\n\t\tYou need to really focus to create a strong enough gravity crush. As you close your eyes to do so, you start screaming uncontrollably from the strain.\n\n\t\t*if (powerregain > 4)\n\t\t\t*set power -40\n\t\t\t*set health -20\n\n\t\t\tIt uses a good chunk of Power and hurts like slugger, but you manage to triple the gravity field of Rexford's Devoid suit.\n\t\t\t*goto crushedrexford\n\t\t*else\n\t\t\t*set power -60\n\t\t\t*set health -30\n\t\t\t*if (health \u003c= 0)\n\t\t\t\t*set health 100\n\t\t\t\t*set usehealingnet true\n\t\t\t\tThen you feel it—you're about to die from the strain. So you stop trying to push your Powers and roll under a punch from Rexford.\n\n\t\t\t\tWhen you're in the clear, you pull out your healing dragnet. You wrap yourself in it and feel immediately better, as the net absorbs into your skin. Unfortunately, you know now you won't be able to use it again.\n\n\t\t\t\t*page_break\n\n\t\t\t\tNot missing a beat, you try to access your gravity Powers again.\n\n\t\t\t\tIt uses more than half of your Power and hurts like slugger, but you manage to triple the gravity field of Rexford's Devoid suit.\n\t\t\t\t*goto crushedrexford\n\t\t\t*else\n\t\t\t\tIt uses more than half of your Power and hurts like slugger, but you manage to triple the gravity field of Rexford's Devoid suit.\n\t\t\t\t*goto crushedrexford\n\n*label crushedrexford\n \nThen you hear one of Rexford's legs snap before he goes crashing through the floor—you thought this was the ground floor, but there must be a basement level down below.\n\n*page_break\n\n*if fightrexfordko\n\t*if (offensive > 60) and (unleash \u003c 40)\n\t\t*set fightrexfordcripple true\n\t\t*set fightrexfordko false\n\t\t*set rexfordfinalefoe false\n\n\t\tYou look down into the hole and see Rexford groaning on some metal lab floor, both legs twisted at impossible angles. From the look of it, you doubt he'll ever be able to walk again. \n\n\t\tYou didn't mean to break any bones or send Rexford through the floor, but then again, you aren't in full control of your Powers. Especially since you're fighting so offensively without much practice unleashing your Powers.\n\n\t\tThen you think, what if you had accidentally killed Rexford? That could have ruined everything you've been working to build as a hero. You remind yourself to be more careful accessing your Powers, in the future.\n\n\t\tStill, as you go, you can't help but think that seeing Rexford squirm like that was a pretty satisfying sight.\n\t\t*goto alleyback\n\t*else\n\t\tYou didn't mean to break any bones or send Rexford through the floor, but then again, you aren't in full control of your Powers. \n\n\t\tYou look down into the hole and see Rexford wriggling and groaning on some metal lab floor. Good, he's still alive.  \n\n\t\tThough you've got to get going, because you know Rexford will be back on your tail soon, broken leg or not.\n\n\t\tStill, as you go, you can't help but think that seeing Rexford squirm like that was a pretty satisfying sight.\n\t\t*goto alleyback\n*elseif fightrexfordcripple\n\tYou look down into the hole and see Rexford groaning on some metal lab floor, both legs twisted at impossible angles. From the look of it, you doubt he'll ever be able to walk again. Though who knows, maybe he'll get a really great IRP surgeon… As Rexford once said to you, sometimes the ends justify the means, for the greater good. \n\n\tAnd as you turn to go, you can't help but think that seeing Rexford broken like that was a pretty satisfying sight.\n\t*goto alleyback\n*else\n\tYou look down into the hole and see that Rexford lies still, both of his eyes wide open.\n\n\tYou just killed Rexford Schillers. \n\n\tYou took a life with calm calculation, for the first time. As Rexford once said to you, sometimes the ends justify the means, for the greater good. Still, you can't shake the feeling that there will be consequences to pay for your actions here today.\n\n\tTaking one more moment to absorb the sight, you run towards the door. It's time to get to the back alley and into that hoverpod. \n\t*goto alleyback\n\n*label alleyback\n*page_break MINUTES LATER\n\nRunning out into the back alley, you find Prodigal already outside, leaned against the mirrored surface of the hoverpod. As you approach, you realize there's a piece of metal wing jutting out of her shoulder.\n\n\"Splicina got in a few good hits,\" Prodigal chuckles. \"But guess who's the baddest bitch still standing?\"\n\nIgnoring Prodigal, you open the hoverpod door, because you can already hear the sound of police sirens approaching. \n\n\"We have to go now,\" you say. \"Do you need to try and heal before we—\"\n\n\"This little souvenir is actually a bomb,\" Prodigal says, sighing as your eyes grow wide. \"Don't worry, it won't go off as long as it stays in my shoulder. I'll have to disarm it before it comes out, but I need time and space for that. Which means we need to get someplace safe to regroup.\"\n\n\"Then let's get…\" you start, but stop because just underneath the sirens, you swear you can hear the sound of a turkey gobbling.\n\n*page_break\n\n\"Get down!\" you scream, ducking with Prodigal just in time to dodge a winged claw swipe from Scoundrel. You swing your foot around and knock Scoundrel's turkey-legs out from under her, then send an elbow into her snood. \n\nYou roll to the other side of the hoverpod, because if Scoundrel is here, Sheathe can't be too far behind.\n\n*page_break\n\nSure enough, as Prodigal slips beside you, you see Sheathe helping Scoundrel back to her turkey-feet. Though really, you probably could have smelled Sheathe before you saw him, because he is rank.\n\n\"What do you say, drumstick?\" Sheathe purrs at Scoundrel. \"Should we feast on their breast meat first? Or maybe make some of our own giblets?\"\n\nScoundrel just pushes Sheathe away—you know firsthand how much she hates turkey jokes. Calling out a shrill gobble, Scoundrel unfurls her turkey wings and prepares to charge.\n\n\"We need to end this immediately,\" Prodigal says, her skin already looking alarmingly gray. \n\nProdigal is right—those police sirens sound like they're right around the corner, now. Not to mention that Sheathe and Scoundrel are both extremely vicious, deadly Animalistic Powereds who you'd rather not tangle with.\n\n*if warningsys\n\t*if (power \u003c= 30) and (health \u003c= 15)\n\t\t\"Warning,\" MeChip ${chipname} shouts in your ear. \"Power and Health Levels dangerously low!\"\n\n\t\tSlugger—it looks like you shouldn't use your Powers and you need to be careful not to take any hits during this fight. \n\t\t*goto scoundsheathechoice\n\t*elseif (power \u003c= 30)\n\t\t\"Warning,\" MeChip ${chipname} shouts in your ear. \"Power Level dangerously low!\"\n\n\t\tSlugger—it looks like you shouldn't use your Powers during this fight. \n\t\t*goto scoundsheathechoice\n\t*elseif (health \u003c= 15)\n\t\t\"Warning,\" MeChip ${chipname} shouts in your ear. \"Health Level dangerously low!\"\n\n\t\tSlugger—it looks like you have to be careful not to take any hits during this fight. \n\t\t*goto scoundsheathechoice\n\t*else\n\t\t*goto scoundsheathechoice\n*else\n\t*goto scoundsheathechoice\n\n*label scoundsheathechoice\n\n*choice\n\t#Blast them out of existence, no mercy. (Power Cost 15-30)\n\t\t*set powerregain +1\n\t\t*set unleash %+15\n\n\t\tYou hold out both palms to create a wide-sweeping energy blast. Thankfully, ${energycolor} energy bursts from your arms without any glitches this time.\n\n\t\tThe blast washes over Sheathe and Scoundrel, knocking them back into the nearest wall.\n\n\t\t*if (powerregain > 4)\n\t\t\t*if (power \u003c= 15)\n\t\t\t\t*set power 0\n\t\t\t\t*set health -8\n\t\t\t\t*goto powerdeath\n\t\t\t*elseif (health \u003c= 8)\n\t\t\t\t*set power -15\n\t\t\t\t*goto sshealthnettime\n\t\t\t*else\n\t\t\t\t*set power -15\n\t\t\t\t*set health -8\n\n\t\t\t\tKnowing you shouldn't wait to give those two any time to recover, you turn to climb into the hoverpod.\n\t\t\t\t*goto hoverpodescape\n\t\t*else\n\t\t\t*if (power \u003c= 30)\n\t\t\t\t*set power 0\n\t\t\t\t*set health -15\n\t\t\t\t*goto powerdeath\n\t\t\t*elseif (health \u003c= 15)\n\t\t\t\t*set power -30\n\t\t\t\t*if usehealingnet\n\t\t\t\t\t*goto healthdeath\n\t\t\t\t*else\n\t\t\t\t\t*goto sshealthnettime\n\t\t\t*else\n\t\t\t\t*set power -30\n\t\t\t\t*set health -15\n\n\t\t\t\tNot giving those two any time to recover, you turn to get in the hoverpod.\n\t\t\t\t*goto hoverpodescape\n\t*selectable_if (useflashbangs = false) #Distract them with flashbangs, then escape.\n\t\t*set unleash %-10\n\t\t*set useflashbangs true\n\n\t\tYou throw down half of your supply of flashbangs, then cover your eyes and ears to protect from the sound and light bursts. A few seconds later, you find Scoundrel and Sheathe stumbling around, temporarily blind, deaf, and balance-impaired. \n\n\t\tNot wasting any time, you turn to get in the hoverpod. \n\t\t*if (unleash > 50) and (offensive > 50)\n\t\t\tYou're about to close the hatch door when you feel Sheathe's claws closing over your shoulder, pulling you out of the hoverpod. \n\n\t\t\tYou turn to face him and realize he is still blinded, but his flaring nostrils indicate that he found you with his keen sense of smell. Slugger.\n\n\t\t\t*page_break\n\n\t\t\tBefore Sheathe can remove you entirely, you grab the rest of the flashbangs from your belt and toss them directly in his face. \n\n\t\t\tBracing yourself as they explode, Sheathe drops you to the ground as the flashbangs send him reeling.\n\n\t\t\tThen you run for the hoverpod, anxious to get out of here. \n\t\t\t*goto hoverpodescape\n\t\t*else\n\t\t\t*goto hoverpodescape\n\t#Try to appeal to Scoundrel and get her to join me.\n\t\t\"Scoundrel, what would Smyther or Culic say about what you're doing now, signing up to work with these anti-Powered lunatics?\" you shout. \"Whatever you signed up for, it got you out of jail. So make it count and join the right side in this war.\"\n\n\t\tAs you finish speaking, Scoundrel pauses—it looks like you might have actually gotten through to her. Sheathe realizes this too and turns to Scoundrel, growling.\n\t\t\n\t\t*if (revenge \u003c 50)\n\t\t\t*set scoundrelfinalefoe false\n\t\t\t*set scoundrelfinaleally true\n\n\t\t\t\"Come on, butterball. What are you waiting—\"\n\n\t\t\tSheathe isn't able to finish as Scoundrel turns and swipes his throat with her turkey claws. Sheathe instinctively lurches for Scoundrel's throat too, tearing at her snood. Next you just see a ball of animal limbs, scratching and clawing.\n\n\t\t\t*page_break\n\n\t\t\tNot wasting a second, you turn to the hoverpod and climb inside. Unfortunately, you don't have time to stick around and help Scoundrel, even if she was willing to join you.\n\n\t\t\tThough the fact that your little speech actually worked on Scoundrel is amazing—and it probably only worked because of your dedication to your ideals. Who knows, maybe if she makes it out of that scrap alive, she'll be there to join your ranks later.\n\n\t\t\tIt looks like whether you meant to or not, you're starting to build an army behind your iconic status.\n\t\t\t*goto hoverpodescape\n\t\t*else\n\t\t\t\"Come on, butterball,\" he says. \"Don't let ${youhir} play you like that.\"\n\n\t\t\tScoundrel considers this for a few seconds, then charges at you alongside Sheathe. It looks like your prioritization of revenge over ideals makes it difficult to recruit anyone to your cause.\n\n\t\t\t*page_break\n\n\t\t\tChecking your surroundings for a quick fix, you see that you're right next to a dumpster. As Sheathe and Scoundrel come at you, you spin behind the dumpster and push it forward, so that it collides with the lethal duo. \n\n\t\t\tThen you run for the hoverpod—that hit will only buy you a few seconds. Luckily, a few seconds is all you need to make your exit.\n\t\t\t*goto hoverpodescape\n\t#Try to appeal to Sheathe and get him to join me.\n\t\t\"Sheathe, you wanted to be a hero, you don't belong with these thugs.\"\n\n\t\t\"Wrong,\" Sheathe snarls. \"I just want to be able to kill people on the up and up. Turns out covert ops really do suit me.\"\n\n\t\t[i]Well, so much for that approach[/i], you think as Sheathe comes at you, faster than you expected. \n\n\t\tSheathe swipes at you with his claws, but you manage to dodge his swing at the last second.\n\t\t*if (offensive \u003c 30)\n\n\t\t\tThen you leap across the alley, away from the deadly duo of Sheathe and Scoundrel.\n\n\t\t\t*goto hitdumpster\n\t\t*elseif (health > 15)\n\t\t\t*set health -15\n\t\t\tHowever, this leaves you open for a kick to the stomach—one that's so strong, it sends you flying across the alley.\n\n\t\t\t*label hitdumpster\n\t\t\t*page_break\n\n\t\t\tPicking yourself back up, you see that you're right next to a dumpster. As Sheathe and Scoundrel come at you again, you spin behind the dumpster and push it forward, so that it collides with the lethal duo. \n\n\t\t\tThen you run for the hoverpod—that hit will only buy you a few seconds. Luckily, a few seconds is all you need to make your exit.\n\t\t\t*goto hoverpodescape \n\t\t*else\n\t\t\t*if usehealingnet\n\t\t\t\t*goto healthdeath\n\t\t\t*else\n\t\t\t\t*set usehealingnet true\n\t\t\t\t*set health 100\n\n\t\t\t\tYou try to stand back up, but your Health has dropped too low. Before you start to pass out, you reach for the healing dragnet in your belt. \n\n\t\t\t\tYou wrap yourself in it and feel immediately better, as the net absorbs into your skin. Thankfully that restores your health, but you won't ever be able to use it again.\n\t\t\t\t*goto hitdumpster\n\n*label powerdeath\n*page_break\n\nThen you feel an overwhelming stab of pain radiate through you. Before you know what's happening, your body gives out and you crash to the floor.\n\nThat's when you feel it—your Power Level is completely depleted. You weren't paying close enough attention and overused your Powers in a series of very reckless moves, without enough prior use or practice.\n\nAs the world starts to swirl into excruciating blackness, your final thoughts are of Grandma and your parents…\n\nFor you've truly let them down.\n\n*choice\n\t#Return to the beginning of the fight to see if I can survive. (Legend Cost 20)\n\t\tYou have another shot to escape from The Infinite Elite, but your Legend Level will probably never recover from this drop.\n\n\t\tLegendary heroes don't die, ${codename}. You had better make better decisions this time around.\t\t\n\t\t*set power 100\n\t\t*set health 100\n\t\t*set legend -20\n\t\t*set usehealingnet false\n\t\t*set useinvisibility false\n\t\t*set usewings false\n\t\t*set usegrappling false\n\t\t*set usecameras false\n\t\t*set useflashbangs false\n\t\t*set escaperexford false\n\t\t*set recordandescape false\n\t\t*set recordandfight false\n\t\t*set fightrexford false\n\t\t*set fightrexfordko false\n\t\t*set fightrexfordcripple false\n\t\t*set fightrexfordkill false\n\t\t*set rexfordfinalefoe false\n\t\t*set powerregain -4\n\t\t*set freedom 50\n\t\t*set revenge 50\n\t\t*set unleash 50\n\t\t*set diedbefore true\n\t\t*page_break\n\t\t*goto mainfraime\n\t#Start HeroFall over from the very beginning.\n\t\tBetter luck next time, ${codename}! \n\t\t*ending\n\n*label healthdeath\n*set health 0\n*page_break\n\nThat's when you feel it—your Health Level is completely depleted. You made one too many mistakes, which is quite the feat, considering there was only one event pathway to lead to this death. \n\nAs the world starts to swirl into excruciating blackness, your final thoughts are of Grandma and your parents…\n\nFor you've truly let them down.\n\n*choice\n\t#Return to the beginning of the fight to see if I can survive. (Legend Cost 20)\n\t\tYou have another shot to escape from The Infinite Elite, but your Legend Level will probably never recover from this drop.\n\n\t\tLegendary heroes don't die, ${codename}. You had better make better decisions this time around.\t\t\n\t\t*set power 100\n\t\t*set health 100\n\t\t*set legend -20\n\t\t*set usehealingnet false\n\t\t*set useinvisibility false\n\t\t*set usewings false\n\t\t*set usegrappling false\n\t\t*set usecameras false\n\t\t*set useflashbangs false\n\t\t*set escaperexford false\n\t\t*set recordandescape false\n\t\t*set recordandfight false\n\t\t*set fightrexford false\n\t\t*set fightrexfordko false\n\t\t*set fightrexfordcripple false\n\t\t*set fightrexfordkill false\n\t\t*set rexfordfinalefoe false\n\t\t*set powerregain -1\n\t\t*set freedom 50\n\t\t*set revenge 50\n\t\t*set unleash 50\n\t\t*set diedbefore true\n\t\t*page_break\n\t\t*goto mainfraime\n\t#Start HeroFall over from the very beginning.\n\t\tBetter luck next time, ${codename}! \n\t\t*ending\n\n\n*label sshealthnettime\n*set health 0\n*page_break\n\nYou step to move, but find your Health has dropped too low from the strain of using your Powers. Before you start to pass out, you reach for the healing dragnet in your belt. You wrap yourself in it and feel immediately better, as the net absorbs into your skin.\n\nFeeling restored, you turn to get into the hoverpod before Scoundrel or Sheathe can recover. Thank slugger for that health dragnet, though you won't be able to use it again.\n\n*set health 100\n*set usehealingnet true\n*goto hoverpodescape\n\n*label hoverpodescape\n*page_break\n\nOnce inside the hoverpod, Prodigal tries to take control, but she slumps in her seat, obviously in a lot of pain.\n\nSo you take the driver's seat and bring the hoverpod up into the sky. It moves like a dream, light as a ping pong ball, but with the speed of a bullet. As you rev the engine, you realize this is going to be very fun.\n\nAt least that's what you think, until a squadron of PowerBreaker Battlesuits drops in front of the hoverpod. \n\nSlugger.\n\n*page_break\n\n\"Prodigal, please tell me this thing has some defense capabilities?\" you ask.\n\n\"That'd make it too heavy,\" Prodigal coughs. \"This baby is built for speed. So you're going to have to outrun them.\"\n\nBefore you can figure out a flight plan, you see a Null/Devoid battlesuit drop into the middle of the Squadron.\n*if (fightrexfordcripple) or (fightrexfordkill)\n\tSlugger, you thought Rexford was—\n\t*goto thenthenullsuit\n*else\n\tSlugger, you just can't seem to shake Rexford, can you?\n\t*goto thenthenullsuit\n\n*label thenthenullsuit\n*page_break\n\nBut then the Null/Devoid suit lights up, firing its rocket launchers and plasma cannons at full power, ripping into the surrounding PowerBreaker Battlesuits. \n\nThe squadron responds with fire of their own and bullets riddle the Null/Devoid's surface, but the Null/Devoid unsheathes two plasma swords and begins slicing into the hoverpacks of the Battlesuits, causing them to plummet.\n\nNow that has to be Jenny Yu.\n\n*page_break\n\nOnce the last of the PowerBreaker Battlesuits falls out of the sky, Null turns to your hoverpod, her black ponytail whipping in the wind. You open up the hoverpod hatch and let Null fly inside. \n\nNot missing a beat, Null pushes you into the passenger seat and takes control of the hoverpod, slipping open her facemask to reveal the real Jenny Yu.\n\n\"Well,\" Prodigal starts, \"if it isn't little miss—\"\n\nJenny just cracks Prodigal across the jaw with her fist, causing Prodigal to fall unconscious in the tiny back bench.\n\n*page_break\n\n\"Jenny, take it easy,\" you start, \"she's already—\"\n\n\"She'll live,\" Jenny says, lifting the hoverpod into the upper atmosphere for long distance flight. \"Now be quiet, I need to focus on getting us somewhere we can regroup.\"\n\n\"And where exactly would that be?\" you ask.\n\n\"A little place I like to call Gay Gardens.\"\n\n[i]Um… what?[/i]\n\n*finish Next Chapter: Garden Variety\n\n*label end_trial\n*temp discount_ends \"July 18\"\n*temp time_stamp timestamp(\"${discount_ends}, 2014\")\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first four chapters are available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n*purchase_discount adfree 2022-07-21 $4.99 $2.99 purchased\n*abort\n", "chap_nine": "*comment é\n\n*text_image part_three.png center Part Three: Ashes\n\n--------------------------------------------------\n\n*text_image chap_9.png center Chapter 9: Yunity\n\nThe Meek MeChip armada bears down on the open door and that's when you feel it break inside you. All the emotion, all the rage bottled up inside just snaps and—\n\nWait, it doesn't snap.\n\nIt surges. You can feel it flowing like a waterfall…\n\nYour Powers are returning.\n\n*page_break\n\nWith one final boost\n*if (unleash > 80)\n\t*set powerregain +8\n\tthanks to your high Unleash Level,\n\t*goto youcanfeelthat\n*elseif (unleash \u003c 20)\n\t*set powerregain +8\n\tthanks to your high Control Level,\n\t*goto youcanfeelthat\n*elseif (unleash > 65)\n\t*set powerregain +6\n\tthanks to your Unleash Level,\n\t*goto youcanfeelthat\n*elseif (unleash \u003c 35)\n\t*set powerregain +6\n\tthanks to your Control Level,\n\t*goto youcanfeelthat\n*else\n\t*set powerregain +4\n\t*goto youcanfeelthat\n\n*label youcanfeelthat\nyou can feel that your Power Regain Points tally has climbed to ${powerregain} out of a possible 27. This places you back in\n*if (powerregain > 16)\n\tan above-average range, lowering Power Costs while maximizing the scope of your abilities.\n\t*achieve maxpowerregain\n\t*goto armybursts\n*else\n\tan average range, returning your Power Costs to normal while expanding the scope of your abilities.\n\t*goto armybursts\n\n*label armybursts\n\nAs you feel your body surge with Power, the Meek MeChip armada finally reaches the lab. That's okay, though—you can tell that you're too strong now for any of the Blessed Vessel's Power dampeners to contain you anymore.\n\nWhich means someone is going to pay.\n\n*choice\n\t#Tilt the entire ship with my gravity Powers. (Power Cost 15-30)\n\t\t*set unleash %+15\n\t\tWith surprising ease, you flick your wrist and feel the Blessed Vessel tilt, sending the armada tumbling. It certainly helps that you lessen gravity's hold on the agents at the same time, so they go crashing into the walls like rag dolls.\n\n\t\t*if (powerregain > 16)\n\t\t\t*set power -15\n\t\t\tAnd because of your above-average final Power Regain Points tally, this only costs 15 Power. \n\n\t\t\tThat's…incredible.\n\t\t\t*goto flyup\n\t\t*else\n\t\t\t*set power -30\n\t\t\tAnd because of your returned Power Regain Points tally, this only costs 30 Power. \n\n\t\t\tNow that's more like it.\n\t\t\t*goto flyup\n\t#Clear the floor with a nuclear energy wipe. (Power Cost 10-20)\n\t\t*set unleash %+10\n\t\tWith surprising ease, you sweep your hands forward, generating a massive surge of energy that pushes the entire armada back through the hallway. Some of the agents are even sent crashing through the walls. [i]Whoops.[/i]\n\n\t\t*if (powerregain > 16)\n\t\t\t*set power -10\n\t\t\tAnd because of your above-average final Power Regain Points tally, this only costs 10 Power. \n\n\t\t\tThat's…incredible.\n\t\t\t*goto flyup\n\t\t*else\n\t\t\t*set power -20\n\t\t\tAnd because of your returned Power Regain Points tally, this only costs 20 Power. \n\n\t\t\tNow that's more like it.\n\t\t\t*goto flyup\n\t#Deactivate all the armada's MeChips with precise energy pops. (Power Cost 5-10)\n\t\t*set unleash %-15\n\t\tWith surprising ease, you focus on creating dozens of simultaneous energy pops in the center of each agent's MeChip. This may be a more traditional use of your Power, but focusing on a maneuver like this allows you to broaden the scope of the attack tenfold.\n\n\t\t*if (powerregain > 16)\n\t\t\t*set power -5\n\t\t\tAnd because of your above-average final Power Regain Points tally, this only costs 5 Power. \n\n\t\t\tThat's…incredible.\n\t\t\t*goto flyup\n\t\t*else\n\t\t\t*set power -10\n\t\t\tAnd because of your returned Power Regain Points tally, this only costs 10 Power. \n\n\t\t\tNow that's more like it.\n\t\t\t*goto flyup\n\n*label flyup\n\nAfter that kind of attack you usually feel drained, but right now you feel stronger than ever. It looks like being pushed over the edge finally smashed the remaining block on your Powers. \n\nAnd they're not just restored, they feel somehow…\n\nInfinite.\n\n*page_break\n*set power -4\n\nWith the threat of the armada temporarily neutralized, you gain your bearings and quickly realize that you need some time to regroup. And that's something you most certainly cannot do here.\n\nAs you try to decide where to go, you also realize that your parents' execution is scheduled for later tonight back outside Millennia City, at the Devoid. \n\nSo you'd best head west.\n\nBracing yourself, you generate a personal energy shield and fly directly up, crashing through ship floor after ship floor with ease until you find yourself in the sky, high above the Blessed Vessel. \n\nYou prime yourself for some supersonic flight, eager to see how fast you can go with your new souped-up Powers.\n\n*page_break\n\nAs you break forward, the world blurs into a smash of colors. You stop short and realize that you were briefly traveling at over a thousand miles an hour, without batting an eye. Which means you'll be back in MC in just about three hours.\n\nThat is so slugging cool.\n\nAs you take off again with another sonic boom, you have a moment to come to a haunting conclusion: with all else lost after Miss Artillery's death, you're out of options and you're out of time. Which means you're going to have to launch an assault against the Devoid to save your parents. \n\nIf you're going to do that, you'll need a good plan and a clear head. So there's only one place you need to go, right now…\n\nTo find Jenny Yu.\n\n*page_break THREE HOURS LATER\n*set power -20\n\nOnce you made it back to Millennia City, it didn't take you long to figure out that after the Millennial Group battle, Jenny was taken to the secure wing of MC General Hospital. \n\nThat was the easy part—the hard part was going to be finding a way to see Jenny, knowing that her room would be heavily guarded and rigged to detect any signs of visitors, especially you.\n\nThen you remembered that you've learned a trick or two about anonymous breaking and entering from your time with Prodigal.\n\n*choice\n\t#I went back to Prodigal's lair to find another invisibility generator.\n\t\t*set offensive %-20\n\t\t*set unleash %-15\n\t\t*goto onceinvisible\n\t#I made myself surveillance-invisible by manipulating delicate atomic structures.\n\t\t*set power -10\n\t\t*set offensive %-10\n\t\t*set unleash %+10\n\t\t*label onceinvisible\n\n\t\tOnce fully invisible, you flew outside the hospital's secure wing until you found Jenny's room and you simply entered through the window. \n\n\t\tThen, knowing your invisibility would run out soon, you threw a strong shield around the entire room, so you could be alone with Jenny. \n\n\t\t*set power -10\n\t\t*goto seejennynow\n\t#I busted into the hospital with an impenetrable energy shield.\n\t\t*set bustroomshield true\n\t\t*set power -15\n\t\t*set offensive %+20\n\t\t*set unleash %+15\n\n\t\tIgnoring anything and everything that tried to stop you, you just marched up through the hospital floors until you found Jenny's room.\n\n\t\tOnce inside, you encased the entire room in a larger energy shield to gain some privacy.\n\t\t*goto seejennynow\n\n*label seejennynow\n*page_break\n\nNow you stand in front of Jenny, who lies in a hospital bed with her eyes closed, looking alarmingly pale.\n\nAnd your heart stops.\n\n*page_break\n\n*if jennydead\n\t*goto jennyisdead\n*else\n\t*goto jennyisalive\n\n*label jennyisalive\n\nThen Jenny opens her eyes and smirks at you.\n*achieve savejenny\n\n\"I wish you could see the look on your face right now,\" she says weakly.\n\nYou know very well that Jenny could have died from Jury's shot, but now that you know she has survived, you could kill her for that stunt. \n\n\"Not! Funny!\" you almost shout. Though you can't stay angry for very long, because you're too relieved. You don't know what you would have done if Jury killed Jenny… and you don't ever want to know.\n\n*page_break\n\n*if jennygirlfriend\n\tYou just rush forward to kiss Jenny. You want to do so madly, but you try to remain gentle, knowing that her body is probably still recovering. \n\n\tJenny kisses you back and although you could go on like this for hours, you know you don't have unlimited time.\n\t*goto tellmetimeever\n*else\n\t*goto tellmetimeever\n\n*label tellmetimeever\n\n\"Tell me everything I missed, while we have time,\" you say. \"This shield is strong, but I shouldn't stay here long enough for the heavy artillery to arrive and bust through.\"\n\nYou turn back to find several police officers trying to shoot through your shield, without any luck. Considering you can't even feel their attacks, you know you have a few minutes, at least.\n\n*page_break\n\n\"It's all very complicated, but the short version is that they had to perform emergency surgery,\" Jenny explains, seeming fearless. \"Apparently the Infinity Equalizer was switched to kill mode. The doctors said another few inches and Jury's blast would have severed my\n*if youinchedjenny\n\tspine. Which means you saved my life, hotshot.\"\n\n\tJenny then stares at you, saying all the thank you she needs with her eyes.\n\n\t\"You know how many times you've saved my butt before?\" you say. \"Let's just call it even.\"\n\n\t\"I can agree to that,\" Jenny returns, smirking.\n\n\t*set rlshp_jenny %+25\n\t*if jennyjustally\n\t\tYou smile back at Jenny and even though you decided you should just remain allies, you know the truth: \n\n\t\tDespite everything that has happened, you'll always be friends.\n\t\t*goto longrecovery\n\t*else\n\t\t*goto longrecovery\n*else\n\tspine.\"\n\n\t\"I wish I would have tried to warn you or move you, but I didn't think—\"\n\n\t*if jennygirlfriend\n\t\t\"When Jury took that shot, I jumped towards you,\" Jenny interrupts. \"Because you're the person I trust most in the world. And if I hadn't jumped, I'd be dead right now. So you don't have anything to regret, love.\"\n\n\t\tJenny stares at you, giving all the thanks she needs with her eyes.\n\n\t\tAnd you think your heart might explode.\n\t\t*goto longrecovery\n\t*else\n\t\t\"Shoulda woulda coulda,\" Jenny interrupts. \"I'm here, aren't I?\"\n\n\t\tYou nod and Jenny tries her best to smile.\n\t\t*goto longrecovery\n\n*label longrecovery\n*page_break\n\n\"Anyway, it will still be a long road to recovery and an even longer stretch of physical therapy, but they say I'll get back to full health eventually. Actually, maybe even better than before.\"\n\nJenny smirks again, then pulls back her blankets to reveal some seriously advanced tech implants. They look like glowing metal plates with cybernetic veins, stretching from her torso down through her thighs. You'd expect something like this to look gruesome, especially so soon after major surgery, but these look somehow… graceful. \n\n\"Apparently they needed to put in these experimental bionic beauties to stabilize me and kickstart the healing process,\" Jenny says. \"They can be removed when I'm healed, but since I have access to the bionic pilot program as a DRPR agent, the implants can remain permanent, if I choose. If they stay in, the implants can provide me with some power enhancements of my very own.\"\n\n\"Looks like someone is really becoming Null,\" you say, looking over Jenny's new upgrades. As awful as today has been, maybe this will be a serious silver lining for Jenny. \n\nThough that's assuming President Victon doesn't succeed in throwing you all in prison for the rest of your lives—or worse.\n\n*page_break\n\n\"I've always wanted Powers, so this may be the next best thing,\" Jenny says, pulling her blankets back up. \"But enough about me, what the slugger happened to you after Black Magic teleported you out?\"\n\nYou sigh, not particularly wanting to relive this day just yet, but knowing that you have to.\n\n*page_break MINUTES LATER\n\n\"I'm so sorry, ${firstname},\" Jenny sighs, once she's had a few seconds to process everything you've just told her.\n*if lasergunsave\n\t\"But what do you think Miss Artillery meant? That she and President Victon had some kind of romantic history?\"\n\n\tYou were pondering that exact question yourself during your transcontinental flight. You already arrived at the conclusion that:\n\n\t*choice\n\t\t#\"I think Miss Artillery was trying to tell Prodigal and me who Prodigal's father is.\"\n\t\t\t\"Wait, you don't mean…\" Jenny starts, putting the pieces together. \"President Victon?!\"\n\n\t\t\t*label youdefthinkso\n\t\t\t*set legend +10\n\t\t\t*set guessedvictonfather true\n\n\t\t\t\"I think so,\" you answer, hardly able to believe it yourself.\n\n\t\t\t\"I think I have an answer for you,\" a new voice says from behind you.\n\t\t\t*goto juryconfirm\n\t\t#\"Yes. And if that's true, I need to somehow prove to the public that President Victon and Miss Artillery had a past beyond the conspiracy to ruin my parents.\"\n\t\t\t\"How the slugger are you going to do that?\" Jenny asks.\n\n\t\t\t\"I think I know how,\" a new voice says from behind you.\n\t\t\t*goto juryconfirm\n\t\t#\"It meant nothing. It was just the final ranting of a truly disturbed woman.\"\n\t\t\t*label meantnothingtome\n\t\t\t\"I don't know,\" Jenny answers. \"I think there's more to it than that.\"\n\n\t\t\t\"I think so too,\" a new voice says from behind you.\n\t\t\t*goto juryconfirm\n*elseif artilleryfinalclue\n\t\"But what do you think Miss Artillery meant with that message?\"\n\n\tYou were pondering that exact question during your transcontinental flight. You already arrived at the conclusion that:\n\n\t*choice\n\t\t#\"I think Miss Artillery was trying to tell Prodigal and me about Prodigal's father. And I think I know who it is.\"\n\t\t\t\"Wait, who?\" Jenny asks.\n\n\t\t\t*input_text prodigalfather\n\n\t\t\t*if (prodigalfather = \"Victon\") or (prodigalfather = \"President Victon\")\n\t\t\t\t*label youguessedvicton\n\n\t\t\t\t\"President Victon?!\" Jenny nearly screams.\n\t\t\t\t*goto youdefthinkso\n\t\t\t*elseif (prodigalfather = \"victon\") or (prodigalfather = \"president victon\")\n\t\t\t\t*goto youguessedvicton\n\t\t\t*else\n\t\t\t\t\"I don't think that's right,\" Jenny says.\n\n\t\t\t\t\"It's not. But I think I know who it really is,\" a new voice says from behind you.\n\t\t\t\t*goto juryconfirm\n\t\t#\"I think Miss Artillery was trying to tell Prodigal and me about Prodigal's father. But I have no idea who it is.\"\n\t\t\t\"I think I do,\" a new voice says from behind you.\n\t\t\t*goto juryconfirm\n\t\t#\"It meant nothing. It was just the final ranting of a truly disturbed woman.\"\n\t\t\t*goto meantnothingtome\n*else\n\t\"I wish you would have at least gotten to see Miss Artillery's message, then we might have some semblance of a clue to go on.\"\n\t\n\t\"I think I know what she was trying to tell you,\" a new voice says from behind you.\n\t*goto juryconfirm\n\n*label jennyisdead\n\nBecause Jenny isn't breathing. \n\nAnd she doesn't look like she has been for some time.\n\nWhich means…\n\nJenny Yu is dead.\n\n*page_break\n*achieve jennydies\nIt feels like every single emotion threatens to overwhelm you at once. \n\nBut all you can really think is:\n\n*choice\n\t*if (youinchedjenny) #I tried my best to save Jenny.\n\t\tIt just wasn't good enough.\n\n\t\t*label friendlost\n\t\tYou can't help but think that\n\t\t*if jennytruefriend\n\t\t\teven though you and Jenny found a way to remain friends, maybe you would have been able to save her if your relationship had ended up stronger, somehow.\n\t\t\t*goto devastatedbreakdown\n\t\t*else\n\t\t\tyou might have been able to save Jenny if you hadn't left things the way you did, if somehow your relationship had ended up stronger.\n\t\t\t*goto devastatedbreakdown\n\t*if (youinchedjenny = false) #Jenny died because I failed to save her.\n\t\tIf only you had warned Jenny or used your Power to move her, maybe she'd still be alive right now.\n\n\t\tBut you chose not to.\n\n\t\t*if jennytruefriend\n\t\t\tAnd now you've lost your best friend.\n\t\t\t*goto devastatedbreakdown\n\t\t*else\n\t\t\tAnd now you'll never get the chance to change the way you left things with Jenny.\n\t\t\t*goto devastatedbreakdown\n\t*if (jennytruefriend) #I just lost my best friend.\n\t\t*goto friendlost\n\t*if (jennyjustally) #Jenny and I may have had our differences, but I'm still devastated.\n\t\t*goto friendlost\n\t#Jenny's death is an awful loss, but I cannot let it slow me down.\n\t\t*set jennyunfeeling true\n\t\tYou just have to think of what Jenny would say if she were here.\n\t\t*goto findawayheartless\n\t*if (soloist > 60) #I always knew it would have been better to fight this war on my own, without endangering my allies.\n\t\tBut Jenny wouldn't listen to you.\n\n\t\tNow she has paid the ultimate price for fighting alongside you.\n\t\t*goto devastatedbreakdown\n\n*label devastatedbreakdown\n*page_break\n\nYour body doesn't know how to react to your mind, or maybe it's the other way around. You feel numb, like absolutely nothing—but you also feel everything at the same time. The world is upside down, but you still have to find a way to breathe somehow. Why can't you breathe?\n\nAs the room swirls around you, you find yourself on the floor. \n\nAnd you just cry.\n\n*page_break LATER\n\nYou don't know how long it takes you, but somehow you eventually find the resolve to stand again.\n\nWhen you finally do, it's for one reason and one reason alone. You know that Jenny died fighting for something she believed in. And if she were still alive right now, she'd have one thing to say to you:\n\n*label findawayheartless\n\n\"Find a way to take the Victons down and finish the war I started.\"\n\nIn this moment, you know that's just what you have to do, to make sure that Jenny didn't sacrifice her life for nothing. And to ensure that President Victon and Jury pay for what they've done.\n\n*page_break\n\nWith fire now burning in your eyes, you turn back to find several police officers trying to shoot through your shield, without any luck. Considering you can't even feel their attacks, you know you have a few minutes, at least.\n\nSo you take the time to figure out what to do next. You try to clear your head, but find that's nearly impossible. The only thing you can think to do is imagine the conversation you would have had with Jenny, if she were still alive right now. \n\nYou would have told her about what happened today, and she would have said:\n\n\"I'm so sorry, ${firstname}.\n*if lasergunsave\n\tBut what do you think Miss Artillery meant? That she and President Victon had some kind of romantic history?\"\n\n\tYou look at Jenny's body and answer out loud, as if she were still alive: \n\n\t*choice\n\t\t#\"I think Miss Artillery was trying to tell Prodigal and me who Prodigal's father is.\"\n\t\t\t\"Wait, you don't mean…\" Jenny would have said, putting the pieces together.\n\n\t\t\t*label youdefthinksodead\n\t\t\t*set legend +10\n\t\t\t*set guessedvictonfather true\n\n\t\t\t\"President Victon. I think so,\" you say, hardly able to believe it yourself.\n\n\t\t\t\"I think I have an answer for you,\" a new voice says from behind you.\n\t\t\t*goto juryconfirm\n\t\t#\"Yes. And if that's true, I need to somehow prove to the public that President Victon and Miss Artillery had a past beyond the conspiracy to ruin my parents.\"\n\t\t\t\"How the slugger are you going to do that?\" you imagine Jenny asking.\n\n\t\t\t\"I think I know how you can,\" a new voice says from behind you.\n\t\t\t*goto juryconfirm\n\t\t#\"Miss Artillery's words meant nothing. It was just the final ranting of a truly disturbed woman.\"\n\t\t\t*label meantnothingtomedead\n\t\t\t\"I don't know,\" Jenny would have answered. \"I think there's more to it than that.\"\n\n\t\t\t\"I think there's more to it than that,\" a new voice says from behind you.\n\t\t\t*goto juryconfirm\n*elseif artilleryfinalclue\n\tBut what do you think Miss Artillery meant with that message?\"\n\n\tYou look at Jenny and answer her out loud, as if she were still alive: \n\n\t*choice\n\t\t#\"I think Miss Artillery was trying to tell Prodigal and me about Prodigal's father. And I think I know who it is.\"\n\t\t\t\"Wait, who?\" you imagine Jenny asking.\n\n\t\t\t*input_text prodigalfather\n\n\t\t\t*if (prodigalfather = \"Victon\") or (prodigalfather = \"President Victon\")\n\t\t\t\t*goto youdefthinksodead\n\t\t\t*elseif (prodigalfather = \"victon\") or (prodigalfather = \"president victon\")\n\t\t\t\t*goto youdefthinksodead\n\t\t\t*else\n\n\t\t\t\t\"That's not right. But I think I know who it really is,\" a new voice says from behind you.\n\t\t\t\t*goto juryconfirm\n\t\t#\"I think Miss Artillery was trying to tell Prodigal and me about Prodigal's father. But I have no idea who it is.\"\n\t\t\t\"I think I do,\" a new voice says from behind you.\n\t\t\t*goto juryconfirm\n\t\t#\"Miss Artillery's words meant nothing. It was just the final ranting of a truly disturbed woman.\"\n\t\t\t*goto meantnothingtomedead\n*else\n\tI wish you would have at least gotten to see Miss Artillery's message, then we might have some semblance of a clue to go on.\"\n\t\n\t\"It probably meant nothing,\" you say out loud, to no one. \"Miss Artillery was insane. Her message was just the final ranting of a truly disturbed woman.\"\n\n\t\"I think I know what Miss Artillery was trying to tell you,\" a new voice says from behind you.\n\t*goto juryconfirm\n\n*label juryconfirm\n*page_break\n\nYou spin to find Jury just outside your shield, looking exhausted. After what he did to Jenny, just the sight of him sends energy rippling across your clenched fists. But then you realize that all of the police officers who were just attacking you—not to mention a few secret service agents—lie at Jury's feet, unconscious.\n\n\"Before you blow me away, I'm not here to fight,\" Jury says, his hands up. \"I've been here since they admitted Jenny, keeping watch. I'm supposed to call the rest of The American Protectorate if you show up, ${codename}, but I'm not going to.\n*if jennydead\n\tBecause I…I need to make things right. So can you let me in?\"\n\n\tYou stare at Jury and see something on his face you've never seen before: genuine remorse. Then you turn to look at Jenny, wishing more than anything she were still here to tell you what to do.\n\n\tThen you know what Jenny would do. She'd nod at you and you'd both be thinking the same thing: whatever you might want to do to Jury, it can wait. Right now, you need to hear what he has to say.\n\n\t*choice\n\t\t#Let Jury inside my shield. I believe him.\n\t\t\t*set rlshp_victons %+15\n\t\t\t*set soloist %-10\n\t\t\t*goto juryswearsdead\n\t\t#Let Jury inside my shield, knowing that I can handle him ten times over, if he tries anything shady.\n\t\t\t*set rlshp_victons %+5\n\t\t\t*set offensive %+10\n\t\t\t*goto juryswearsdead\n\t\t#Tell Jury I can hear him perfectly fine from outside my shield.\n\t\t\t*set rlshp_victons %-15\n\t\t\t*set offensive %-10\n\t\t\t*label juryswearsdead\n\n\t\t\t\"I swear I didn't know the Infinity Equalizer had a kill function,\" Jury stammers. \"It was a prototype made just for Rebellion, I didn't…I wasn't supposed to…I never would have used it if I had known. I never…\"\n\n\t\t\tJury can't go on as he finally looks up at Jenny's body, tears streaming down his face.\n\n\t\t\tYou stare at Jury, who seems to be genuinely broken up. What do you think?\n\t\t\t*goto jurytellsyouvicton\n*else\n\tBecause I want to apologize. To both of you. So can you let me in?\"\n\n\tYou stare at Jury and see something on his face you've never seen before: genuine remorse. It catches you off guard for a moment, so you turn to Jenny. \n\n\tShe practically shakes with anger, but Jenny nods at you. You can tell that you're both thinking the same thing: whatever you might want to do to Jury, it can wait. Right now, you need to hear what he has to say.\n\n\t*choice\n\t\t#Let Jury inside my shield. I believe him.\n\t\t\t*set rlshp_victons %+15\n\t\t\t*set soloist %-10\n\t\t\t*goto juryswearsalive\n\t\t#Let Jury inside my shield, knowing that I can handle him ten times over, if he tries anything shady.\n\t\t\t*set rlshp_victons %+5\n\t\t\t*set offensive %+10\n\t\t\t*goto juryswearsalive\n\t\t#Tell Jury I can hear him perfectly fine from outside my shield.\n\t\t\t*set rlshp_victons %-15\n\t\t\t*set offensive %-10\n\t\t\t*label juryswearsalive\n\n\t\t\t\"You were saying?\" Jenny snarls through clenched teeth.\n\n\t\t\t\"I swear I didn't know the Infinity Equalizer had a kill function,\" Jury stammers. \"It was a prototype made just for Rebellion, I didn't…I wasn't supposed to…I never would have used it if I had known it could really hurt you. I swear.\"\n\n\t\t\tYou stare at Jury, who seems to be genuinely broken up about this. But what do you think?\n\t\t\t*goto jurytellsyouvicton\n\n*label jurytellsyouvicton\n*choice\n\t#I think President Victon is the one truly responsible for what happened to Jenny.\n\t\tAll these terrible roads lead back to President Victon. And something tells you they always will until you find a way to put an end to his atrocities.\n\t\t*goto soyoutelljurry\n\t#I think The Meek movement are the ones truly responsible for what happened to Jenny.\n\t\tThe Meek movement created the Infinity dampening technology, spawned purely from their hatefulness. Something tells you this is only the beginning of the body count they'll pile up until you find a way to put an end to their atrocities.\n\t\t*goto soyoutelljurry\n\t#I think Rebellion is the one truly responsible for what happened to Jenny.\n\t\tRebellion was the one who brought that weapon to the Millennial Tower to use on you, so ${youze} was the one who enabled all of this horror to happen in the first place. \n\n\t\tAnd something tells you ${youze} will keep enabling until you find a way to put an end to ${youhis} atrocities.\n\t\t*goto soyoutelljurry\n\t#I still hold Jury responsible.\n\t\tYou'll make sure he pays for his atrocities. Very soon.\n\t\t*goto soyoutelljurry\n\t#I hold all of them responsible.\n\t\tYou'll make sure they all pay for their atrocities. Very soon.\n\t\t*goto soyoutelljurry\n\n*label soyoutelljurry\n\n\"What do you need to tell me about Miss Artillery?\" you ask Jury, just trying to keep your cool.\n\nJury takes a deep breath, composing himself. Then he turns to you.\n\n*page_break\n\n\"I never really got to spend much time with my dad growing up, he was always so busy with work,\" Jury starts.\n\n\"Save the sob story and get to the point,\" you interject, struggling to remain calm.\n\n\"The point is,\" Jury continues, glaring at you. \"When I was a little kid, I used to eavesdrop on his meetings whenever I could, to pretend we were hanging out. Usually I had no idea what they were about, but I remember one day I overheard something I actually understood.\n\n\"This crazy lady showed up at our house the day after my parents' divorce went public, which also happened to be the same day my step-mom, the First Lady, moved in,\" Jury sighs. \"Anyway, this crazy lady was ranting about finally getting back together with my dad, but he didn't want any part of it. He just kept saying that what they had was firmly in the past, that there was no place for someone like her in his life now. I didn't think much of it at the time—dad always seemed to have a lot of women on his plate.\n\n\"But I remember the day your parents were arrested very clearly,\" Jury says. \"Because they were arrested for killing the same crazy lady I had seen: Miss Artillery.\"\n\n*page_break\n\n*if guessedvictonfather\n\t\"So you think that's what Miss Artillery was trying to tell us, too?\" you ask, your heart pounding in your chest. \"That your dad, President Victon, is somehow also Prodigal's father?\"\n\t*goto scrollthru\n*elseif lasergunsave\n\tSo Miss Artillery and President Victon did have a romantic past, but could that really mean…\n\n\t\"Wait, you think that's what Miss Artillery was trying to tell us?\" you ask, your heart pounding in your chest. \"You're not saying that your dad, President Victon, is somehow also…\"\n\n\t*page_break\n\n\t\"Prodigal's father?\"\n\t*goto scrollthru\n*elseif artilleryfinalclue\n\tYour mind scrambles to put the pieces together: Miss Artillery and President Victon had a romantic past? That's completely insane.\n\n\tBut if that's really true, then what was Miss Artillery tying to tell you when she wrote…?\n\n\t\"Wait,\" you say, your heart suddenly pounding in your chest. \"You're not saying that your dad, President Victon, is somehow also…\"\n\n\t*page_break\n\n\t\"Prodigal's father?\"\n\t*goto scrollthru\n*else\n\tYour mind scrambles to put the pieces together: Miss Artillery and President Victon had a romantic past? That's completely insane.\n\n\tBut if that's really true, then what was Miss Artillery tying to tell you before she…?\n\n\t\"Wait,\" you say, your heart suddenly pounding in your chest. \"You're not saying that your dad, President Victon, is somehow also…\"\n\n\t*page_break\n\n\t\"Prodigal's father?\"\n\t*goto scrollthru\n\n*label scrollthru\n\nYou say the words even though you have no idea how it could be true. But if it somehow is…\n\nThis could change everything.\n\n*page_break\n\nJury just nods at you, looking disgusted. \"I never said anything about what I knew to my dad—in our house, you learned to keep quiet and do as you're told. Then when Prodigal first surfaced, I finally had to ask my dad if there was any chance she could be my sister.\n\n\"After he berated me for eavesdropping, dad told me that there was zero chance Prodigal could be his daughter. He hadn't known Prodigal even existed and if she was really his, Miss Artillery would have been sure to leverage that against him. Besides, he promised that he and Miss Artillery had stopped seeing each other years and years before Prodigal would have been born.\"\n\n\"And you just believed him?\" you ask, your fists involuntarily clenching.\n\n\"I did,\" Jury answers. \"I know my dad better than anyone. And if he thought there was even the most remote chance Prodigal was his, he would have had that loose end tied up tightly. But he didn't even lift a finger to stop Prodigal when she went public.\" \n\nYou blink back your anger, thinking that: \n\n*choice\n\t#[i]No, he most certainly did not. That task was left entirely to me[/i].\n\t\tWhich was probably just how President Victon wanted it.\n\t\t*goto tobehonesti\n\t#[i]Wait, didn't Victon claim to know about Prodigal's childhood[/i]?\n\t\tHe definitely did, the night after the Death Wave when he came to see you on Jenny's roof. Which means maybe President Victon did somehow suspect all along that Prodigal may be his daughter.\n\n\t\tWell, that's just another Victon lie you'll have to untangle.\n\t\t*goto tobehonesti\n\t#[i]Victon probably did try to take Prodigal out somehow, he just couldn't get the job done[/i].\n\t\tYou know firsthand just how hard Prodigal is to take down. Failing to neutralize Prodigal is probably the only thing you and President Victon will ever have in common.\n\t\t*goto tobehonesti\n\n*label tobehonesti\n\n\"To be honest I didn't give it much thought after that, especially once you took care of Prodigal the way you did,\" Jury sighs. \"But then when Prodigal resurfaced and you two teamed up, I got suspicious again.\"\n\n\"And now, knowing that Miss Artillery has still been alive all this time, it means my dad must have set her up to frame your parents, right?\" Jury says, his face grim. \"And if they are really crazy enough to do that, I'd believe they're crazy enough to cover up the identity of Prodigal's father, too.\"\n\n*page_break\n\nYou scroll through your memory, trying to make sense of this insane notion. When you were in Prodigal's mind, you saw a memory where Miss Artillery claimed to have murdered Prodigal's father. Though slugger knows, coming from that insane woman, that could easily have been a lie. \n\nIf that's all Prodigal was ever told about her father, combined with the fact she has no idea Victon and her mother were romantically involved, she'd probably never even consider the possibility that President Victon is her father. \n\n\"I still think it's possible that my father doesn't know,\" Jury adds. \"Or that we're wrong about this entirely. But either way, the world needs to know about what he did to Miss Artillery. And to your parents.\"\n\n\"Oh, you want to do the right thing now?\" you practically scream. No matter how you slice this, by staying silent, Jury is just as responsible as his father for what has happened to you and your family.\n\n*page_break\n\n\"Yes, I want to do the right thing now,\" Jury answers, matching your gaze. \"And I'll prove it to you by telling you something that would destroy my father and me both, if word got out.\"\n\nYou stare at Jury, knowing that whatever he might want to tell you, you won't have much time left to stay here uninterrupted. So now that you know this potential truth about Miss Artillery and President Victon, you have to decide what to do about Jury.\n\n*choice\n\t*if (jurykiss) #Kiss Jury again and accept him as an ally.\n\t\t*set rlshp_victons %+25\n\t\t*set soloist %-20\n\t\t*set revenge %-15\n\t\t*set freedom %+15\n\t\t*set juryboyfriend true\n\t\t*if jennydead\n\t\t\t*set kissjuryjennydead true\n\t\t\tYou grab Jury and pull him into another kiss, feeling your body light up as you do. \n\n\t\t\tThough a part of you thinks of what Jenny would say about you making out with the guy who just murdered her.\n\n\t\t\tStill, you want to be with Jury because:\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#However wrong it may be, I think I coul
