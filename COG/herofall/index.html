an intervene, Stage Show forces a laser rod into The Bear's mouth, Wintry freezes Mach Girl in place, and Rebellion lifts GG out of his people-mover with surprising ease.\n\n\t\t\t\t\t\"I'm going to make you—\" GG tries to start, but Rebellion tosses him aside before he can finish. As GG crumples to the ground with a heavy thud, Stage Show stands over The Bear's unconscious body, smiling to say:\n\n\t\t\t\t\t\"I've been waiting a long time to do that, you unbelievable oaf.\"\n\n\t\t\t\t\tThough next to her, Stage Show's best friend Wintry stares at Mach Girl, her former Hero Project ally, with dismay.\n\n\t\t\t\t\tSeeing this display, you clench your fists, ready for a fight.\n\t\t\t\t\t*goto tapbattle\n\t\t*elseif (fumbleluckyhelp) or (fumblehelp)\n\t\t\tnowhere with Fumble, suited up and ready for battle.\n\n\t\t\tRexford tries to blast them away with his knuckle-uzis, but Fumble just blocks the brunt of the bullets with his super-durable shoulders. Meanwhile, GG's people-mover converts into hard-shelled tank and before Rexford can react, GG bulldozes him down.\n\n\t\t\t\"That's for ruining The Hero Project!\" GG says, rolling back beside Fumble as his tank-shell recedes like a convertible top. \"And you are not invited back for our second season!\"\n\n\t\t\tYou can't help but smile as you watch this. Even though you would have loved another piece of Rexford, he isn't anywhere near the top of your enemy threat list.\n\n\t\t\t*choice\t\n\t\t\t\t#Thank GG and Fumble. \n\t\t\t\t\tJust as you're about to thank GG and Fumble, The American Protectorate suddenly surges forward and ambushes them without warning.\n\t\t\t\t\t*goto taptakedownggf\n\t\t\t\t#Command them where to fight next.\n\t\t\t\t\tJust as you're about to command GG and Fumble, The American Protectorate suddenly surges forward and ambushes them without warning.\n\t\t\t\t\t*goto taptakedownggf\n\t\t\t\t#Ask GG what he means about a second season of The Hero Project.\n\t\t\t\t\tJust as you're about to speak, The American Protectorate suddenly surges forward and ambushes GG and Fumble without warning.\n\n\t\t\t\t\t*label taptakedownggf\n\n\t\t\t\t\tBefore you can intervene, Stage Show forces a laser rod into Fumble's mouth, while Rebellion lifts GG out of his people-mover with surprising ease.\n\n\t\t\t\t\t\"I'm going to make you—\" GG tries to start, but Rebellion tosses him aside before he can finish. As GG crumples to the ground with a heavy thud, Stage Show stands over her ex-husband's body, looking miserable. \n\n\t\t\t\t\t\"Why couldn't you just stay out of this, you beautiful idiot?\" she sighs.\n\n\t\t\t\t\tSeeing this display, you clench your fists, ready for a fight.\n\t\t\t\t\t*goto tapbattle\n\t\t*else\n\t\t\tnowhere.\n\n\t\t\tRexford tries to blast him away with his knuckle-uzis, but GG's people-mover converts into hard-shelled tank. Before Rexford can react, GG bulldozes him down.\n\n\t\t\t\"That's for ruining The Hero Project!\" GG says, rolling away as his tank-shell recedes like a convertible top. \"And you are not invited back for our second season!\"\n\n\t\t\tYou can't help but smile as you watch this. Even though you would have loved another piece of Rexford, he isn't anywhere near the top of your enemy threat list.\n\n\t\t\t*choice\n\t\t\t\t#Thank GG. \n\t\t\t\t\tJust as you're about to thank GG, The American Protectorate suddenly surges forward and ambushes them without warning.\n\t\t\t\t\t*goto taptakedowngg\n\t\t\t\t#Command him where to fight next.\n\t\t\t\t\tJust as you're about to command GG, The American Protectorate suddenly surges forward and ambushes them without warning.\n\t\t\t\t\t*goto taptakedowngg\n\t\t\t\t#Ask GG what he means about a second season of The Hero Project.\n\t\t\t\t\tJust as you're about to speak, The American Protectorate suddenly surges forward and ambushes GG without warning.\n\t\t\t\t\t*label taptakedowngg\n\t\t\t\t\tBefore you can intervene, Rebellion lifts GG out of his people-mover with surprising ease.\n\n\t\t\t\t\t\"I'm going to make you—\" GG tries to start, but Rebellion tosses him aside before he can finish. As GG crumples to the ground with a heavy thud, you clench your fists, ready for a fight.\n\t\t\t\t\t*goto tapbattle\n\t*else\n\t\tYou almost laugh at Rexford, since he isn't anywhere near the top of your enemy threat list, right now. \n\n\t\tYou're going to take him down all the same.\n\n\t\t*if warningsys\n\t\t\t\"Make this decision with your Unleash and Control habits in mind,\" MeChip ${chipname} appears to warn you.\n\t\t\t*goto bustrexford\n\t\t*else\n\t\t\t*label bustrexford\n\n\t\t\t*choice\n\t\t\t\t#Blow Rexford away with a gravity bomb. (Power Cost 10-20)\n\t\t\t\t\t*set unleash %+15\n\n\t\t\t\t\t*if (unleash > 75)\n\t\t\t\t\t\t*set offensive %+15\n\t\t\t\t\t\t*label unleashonrex\n\n\t\t\t\t\t\tWithout hesitation, you create a ball of superdense gravity force and hurl it at Rexford.\n\n\t\t\t\t\t\tAs the invisible gravity-bomb bursts against Rexford's Devoid chest plate, he is launched backwards and shards of his armor suit fly everywhere.\n\n\t\t\t\t\t\tWatching Rexford go down for the count like this, you can't help but think:\n\n\t\t\t\t\t\t[i]Now that's how it was always meant to be.[/i]\n\t\t\t\t\t\t*goto rexpowercost\n\t\t\t\t\t*else\n\t\t\t\t\t\t*set health -10\n\t\t\t\t\t\t*set offensive %+5\n\t\t\t\t\t\tYou set your Powers to launch this unleashed attack, but are caught off guard when Rexford suddenly launches both his gauntlets at you.\n\n\t\t\t\t\t\tThey power off his wrists like rockets and while you are able to dodge the first one, the second gauntlet-fist-rocket succeeds in punching you square in the face.\n\n\t\t\t\t\t\tMassaging your nearly-broken jaw, you know you're going to make Rexford slugging pay for that cheap shot.\n\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto unleashonrex\n\t\t\t\t#Drain the energy from Rexford's Devoid suit. (Power Cost 10-20)\n\t\t\t\t\t*set unleash  %-15\n\n\t\t\t\t\t*if (unleash \u003c 25)\n\t\t\t\t\t\t*set offensive %-15\n\t\t\t\t\t\t*label controlonrex\n\n\t\t\t\t\t\tWithout hesitation, you mentally reach into Rexford's Devoid suit and tinker with its energy source, imagining the atoms there dissipating out into the sky.\n\n\t\t\t\t\t\tAs Rexford gears up to attack you again, his limbs suddenly go slack. Without enough energy to power the Devoid suit, the entire thing falls to the ground with a heavy thud, trapping Rexford helplessly inside.\n\n\t\t\t\t\t\tWatching Rexford go down for the count like this, you can't help but think:\n\n\t\t\t\t\t\t[i]Now that's how it was always meant to be[/i].\n\t\t\t\t\t\t*goto rexpowercost\n\t\t\t\t\t*else\n\t\t\t\t\t\t*set health -10\n\t\t\t\t\t\t*set offensive %-5\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou set your Powers to launch this controlled attack, but are caught off guard when Rexford suddenly launches both his gauntlets at you.\n\n\t\t\t\t\t\tThey power off his wrists like rockets and while you are able to dodge the first one, the second gauntlet-fist-rocket succeeds in punching you square in the face.\n\n\t\t\t\t\t\tMassaging your nearly-broken jaw, you know you're going to make Rexford slugging pay for that cheap shot.\n\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto controlonrex\n\t\t\t\t#Detonate all of Rexford's Devoid weapons at once. (Power Cost 10-20)\n\t\t\t\t\t*set health -5\n\t\t\t\t\t\n\t\t\t\t\tYou set your Powers to launch this  attack, but are caught off guard when Rexford suddenly launches both his gauntlets at you.\n\n\t\t\t\t\tThey power off his wrists like rockets and while you are able to dodge the first one, the second gauntlet-fist-rocket succeeds in punching you square in the face.\n\n\t\t\t\t\tMassaging your nearly-broken jaw, you know you're going to make Rexford slugging pay for that cheap shot.\n\n\t\t\t\t\t*page_break\n\n\t\t\t\t\tWithout hesitation, you mentally reach into Rexford's Devoid suit and tinker with its energy source, imagining all of the atoms inside of his weapons exploding.\n\n\t\t\t\t\tAs Rexford gears up to attack you again, his weapons suddenly begin to detonate, one by one. Rexford is launched backwards from the explosions, shards of his armor suit flying everywhere.\n\n\t\t\t\t\tWatching Rexford go down for the count like this, you can't help but think:\n\n\t\t\t\t\t[i]Now that's how it was always meant to be.[/i]\n\t\t\t\t\t*goto rexpowercost\n*else\n\t*if ggfinaleally\n\t\t*set soloist %-15\n\n\t\t\"Reporting for duty!\" GG suddenly says, appearing out of \n\t\t*if bearmachgirlhelp\n\t\t\tnowhere with The Bear and Mach Girl. \n\n\t\t\tJust as you're about to speak, The American Protectorate suddenly surges forward and ambushes GG, Mach Girl, and The Bear without warning.\n\t\t\t*goto taptakedownggbmg\n\t\t*elseif (fumbleluckyhelp) or (fumblehelp)\n\t\t\tnowhere with Fumble.\n\n\t\t\tJust as you're about to speak, The American Protectorate suddenly surges forward and ambushes GG and Fumble without warning.\n\t\t\t*goto taptakedownggf\n\t\t*else\n\t\t\tnowhere.\n\n\t\t\tJust as you're about to speak, The American Protectorate suddenly surges forward and ambushes GG without warning.\n\t\t\t*goto taptakedowngg\n\t*else\n\t\t*set soloist %+15\n\t\tNext, The American Protectorate appears before you. \n\n\t\tAnd just the sight of them causes you to clench your fists in fury.\n\t\t*goto tapbattle\n\n*label rexpowercost\n*if (powerregain > 16)\n\t*set power -10\n\t*goto rexdeathtest\n*else\n\t*set power -20\n\t*goto rexdeathtest\n\n*label rexdeathtest\n*if (power \u003c= 0)\n\t*goto deathscene\n*else\n\tNext, The American Protectorate appears before you. \n\n\tAnd just the sight of them causes you to clench your fists in fury.\n\t*goto tapbattle\n\n*label tapbattle\n*page_break\n\nAs The American Protectorate stand before you, you notice several cameras swivel to film—you must have exited the anti-recording haze. You also see that The American Protectorate is the last line of defense before you reach President Victon's stage.\n\n\"You are the biggest pain in the ass I have ever known,\" Rebellion says from ${youhis} spot at the point of the team.\n\n*choice\n\t#Reveal what Rebellion's weapon did to Jenny.\n\t\t*goto jennyapsset\n\t#Insult Rebellion back.\n\t\t*set antipoweredsent -10\n\t\t\"And you're irrelevant,\" you say, knowing that will cut Rebellion about as deeply as anything you can say.\n\t\t*goto finishreb\n\t#Just get to fighting.\n\t\t*set antipoweredsent -10\n\t\t*goto finishreb\n\n*label jennyapsset\n*if (antipoweredsent \u003c= 25) \n\t*set antipoweredsent 5\n\t*goto jennyshotreavealed\n*else\n\t*set antipoweredsent -20\n\t*goto jennyshotreavealed\n\n*label jennyshotreavealed\n*set regimedamage +4\n*set elevenjennyregime true\n\n*if jennydead\n\t\"That genocidal weapon you brought to The Millennial Tower killed my best friend, Jenny Yu,\" you respond, not in the mood for quippy games. \"And you, Rebellion, will be held accountable for the death of a DRPR agent.\"\n\t*goto finishreb\n*else\n\t\"That genocidal weapon you brought to The Millennial Tower nearly killed my best friend,\" you respond, not in the mood for quippy games. \"And you, Rebellion, will be held accountable.\"\n\t*goto finishreb\n\n*label finishreb\n\nAs Rebellion's rough face turns sour, you think back to the choice you made at The Millennial Tower, right before Jenny was shot.\n*if rebellionrecruit\n\tYou were going to try to recruit Rebellion by telling ${youhir} the truth.\n\n\tTo honor Jenny's sacrifice, that's just what you're going to do now.\n\n\t*page_break\n\n\tUsually Rebellion is fast enough to attack first with the element of surprise, but you're going to steal a trick out of ${youhis} playbook, this time. Rocketing forward super-fast, you grab Rebellion by ${youhis} costume. Before ${youze} even knows what's going on, you fly Rebellion high into the sky, away from the prying eyes of the cameras.\n\n\t\"I'm only telling you this once,\" you shout at Rebellion before ${youze} can try anything. \"President Victon framed my parents using Miss Artillery, who has been alive all this time. That's what I've been up to these past few days, finding a way to prove it. And I did.\"\n\n\tObviously there's much more to the story than that, but you don't have any time to spare. Besides, if Rebellion doesn't believe you, you've already compromised too much information, so there's no need to tell ${youhir} any more. \n\n\tYou scan Rebellion's face, looking for a trace of emotion.\n\n\t*page_break\n\n\t*if (revenge \u003c 50) \n\t\tThen you see it: Rebellion believes you, thanks to your ideological ways.\n\n\t\t$!{Youze} doesn't say anything, ${youze} just nods at you, ${youhis} eyes wide. Then Rebellion twists out of your grip and begins to free-fall back to the ground, a look of total devastation on ${youhis} face.\n\n\t\tRebellion must have had ${youhis} suspicions about all of this somehow, because it looks like you just confirmed every worst fear ${youze} has ever had.\n\n\t\tYou don't know what Rebellion is going to do when ${youze} hits the ground, but you do know one thing: ${youze} won't be trying to stop you, anymore.\n\t\t*goto fightthetap\n\t*else\n\t\t*set rebellionrecruit false\n\t\tBut there is none.\n\n\t\tInstead, Rebellion twists out of your grip and begins to free-fall back to the ground, because ${youze} knows ${youze} has no leverage up here.\n\n\t\t\"Nice try, ${codename},\" Rebellion screams. \"But no one will believe your vengeful lies.\"\n\n\t\tWell, you tried. \n\n\t\tAt least now you can kick Rebellion's slugging butt without a hint of remorse.\n\n\t\t*page_break\n\n\t\tYou fly down to where Rebellion lands to find ${youhir} in a crater ${youze} created upon impact, looking bruised and angry.\n\n\t\tNow you have to decide how to take Rebellion down. Permanently.\n\t\t*goto fightrebchoice\n*elseif rebellionknockout \n\tYou were going to knock Rebellion's lights out.\n\t*goto fightrebellion\n*elseif rebellioncripple\n\tYou were going to hurt Rebellion. Badly.\n\t*goto fightrebellion\n*else\n\tYou were going to end Rebellion.\n\t*goto fightrebellion\n\n*label fightrebellion\n\nTo honor Jenny's sacrifice, that's just what you're going to do now.\n\n*if warningsys\n\t\"Remember, Rebellion can usually withstand your gravity attacks,\" MeChip ${chipname} pops up to warn you.\n\t*goto fightrebchoice\n*else\n\t*goto fightrebchoice\n\n*label fightrebchoice\n*choice\n\t*disable_reuse #Take Rebellion down with a gravity crush. (Power Cost 5-10)\n\t\t*set health -15\n\t\t*set power -10\n\n\t\tYou try to force Rebellion to the ground with insanely heightened gravity levels, but ${youze} is too fast and strong for that.\n\n\t\tRebellion leaps at you and grabs you by the throat, attempting to choke you out. Panicking, you hit ${youhir} in the back of the head with a gravity punch to try and gain some space.\n\n\t\tRebellion is knocked forward and you spin away, gasping for air as you try to regroup.\n\t\t*goto fightrebchoice\n\t#Take Rebellion down with a pouring energy blast. (Power Cost 10)\n\t\t*set health -10\n\n\t\tYou blast at Rebellion, but ${youze} just shrugs through the force, leaping at you and landing a bone-rattling head-butt. \n\n\t\tKnocked backwards, you decide it's time to stop messing around.\n\n\t\tBracing yourself, you fly up into the sky and trigger the beginnings of a fusion reaction.\n\n\t\tYou scream as the energy begins to pour out of you and rocket to the ground in a mushroom-cloud blast of energy that crushes Rebellion into the ground.\n\n\t\t*if (feared > 50)\n\t\t\t*set feared %+20\n\t\t\t*goto rebellionpowercost\n\t\t*else\n\t\t\t*set feared %-20\n\t\t\t*goto rebellionpowercost\n\t#Take Rebellion down by fighting ${youhir} with energy armor. (Power Cost 10)\n\t\t*set health -10\n\n\t\tYou energy-armor yourself up, which gives Rebellion the split-second ${youze} needs to leap at you and land a bone-rattling head-butt. \n\n\t\tKnocked backwards, you decide it's time to stop messing around.\n\n\t\t*page_break\n\n\t\tYou come back at Rebellion with a doubled energy armor coating, screaming as you swing a mega-punch directly at ${youhis} face.\n\n\t\tYour punch lands and you feel Rebellion's rock-hard face nearly crack from the force of your blow.\n\n\t\t*if (feared > 50)\n\t\t\t*set feared %+20\n\t\t\t*goto rebellionpowercost\n\t\t*else\n\t\t\t*set feared %-20\n\t\t\t*goto rebellionpowercost\n\n*label rebellionpowercost\n*if (powerregain > 16)\n\t*set power -5\n\t*goto rebfightsurvive\n*else\n\t*set power -10\n\t*goto rebfightsurvive\n\n*label rebfightsurvive\n*if (power \u003c= 0) or (health \u003c=0)\n\t*goto deathscene\n*else\n\t*goto rebblind\n\n*label rebblind\n*page_break\n\nRebellion lies on the ground in the wake of your attack, screaming as ${youze} holds ${youhis} hands to ${youhis} face.\n\n\"I can't see!\" Rebellion shrieks. \"Why can't I see?!\"\n\nYou never thought you'd see Rebellion squirm like this, though you suppose being blinded is a fairly valid reason to freak out. You don't have time to wait and see whether Rebellion's blindness is temporary or permanent, though. \t\t\n\nAll you do know as you move on is that what goes around comes around. For all ${youze} has done, Rebellion might deserve this and worse.\n\n*label fightthetap\n*page_break\n\nWith their leader out of the picture, Inherit steps up as deputy leader to command the rest of The American Protectorate, which also currently counts Fistfull among its ranks. That slugger must have stuck around with them after turning on you at the Millennial Tower. \n\n\"${codename} has proven ${youhir}self to be a true Powered terrorist,\" Inherit shouts, pointing at you. \"And The American Protectorate does not tolerate terrorism.\"\n\nJust as you're thinking about all the ways you're going to pay Inherit back for that little speech, Fistfull suddenly turns and swings at Summit. \n\n\"I was wrong, ${codename}!\" Fistfull screams as Summit manages to swerve away from the blow. \"But I'm on the right side now.\"\n\n*page_break\n\nAs Summit and Fistfull go at it, Wintry suddenly stops in her tracks, too. On the verge of tears, her whole body starts to shake.\n\n\"I can't do this anymore,\" she whispers. Or at least, that's what you think she says.\n\n\"What are you doing, MJ?\" Stage Show turns and calls back at her. \"We need to end this. Now.\"\n\n\"Yes, we do,\" Wintry says, icicle-tears freezing on her cheeks as she clenches her fists. Wintry raises her hands to shoot an ice blast…\n\nDirectly at her supposed best friend. \n\nHuh. Looks like some people can change…again.\n\n*page_break\n\nAs Stage Show and Wintry go at it, all you can think is: [i]This is what happen when you build something on a rotten foundation.[/i]\n\n[i]You crumble.[/i]\n\nSo much for America's number one Powered team. \n\n*choice\n\t#Leave them to fight it out.\n\t\t*goto inheritstillcomes\n\t#Thank Wintry and Fistfull as I move on.\n\t\tWintry is too busy to hear your thanks, but Fistfull manages a quick nod before returning to pounding on Summit.\n\t\t*goto inheritstillcomes\n\t#Blast them all away anyway.\n\t\t*set power -10\n\t\tWithout warning, you let loose a massive energy blast that clears all four Millennial Group combatants from the field. Their unconscious bodies are sent reeling, landing in scattered, smoking heaps.\n\t\t*if (power \u003c= 0) \n\t\t\t*goto deathscene\n\t\t*else\n\t\t\t*goto inheritstillcomes\n\n*label inheritstillcomes\n\nThe American Protectorate may have fallen apart in front of you, but Inherit, the stubborn slugger that he is, still comes at you.\n\n\"No matter what lines you divide,\" Inherit shouts in a frenzy, \"The Meek shall Inherit!\"\n\n*if rebellionrecruit\n\t*set regimedamage +4\n\t*set elevenrebellionregime true\n\n\tBefore Inherit can come near you, Rebellion suddenly reappears, looking more furious than ever. With a guttural scream, ${youze} punches a hole straight through Inherit's golden shield.\n\n\tYou watch, stunned—you've never seen anyone break through one of Inherit's shields like that, ever. Let alone with their bare hands.\n\n\tAs Rebellion backhands Inherit to the ground, ${youze} turns to you.\n\n\t\"I'll finish things here,\" Rebellion says, determination burning in ${youhis} orange eyes.\n\n\tYou just nod at Rebellion before ${youze} turns back to face Inherit, because you've got more work to do.\n\t*goto podiumed\n*else\n\t*if warningsys\n\t\t\"Don't try to penetrate Inherit's shield, that never works,\" MeChip ${chipname} appears to warn you.\n\t\t*goto fightinheritchoice\n\t*else\n\t\t*label fightinheritchoice\n\n\t\t*choice\n\t\t\t#Shrink Inherit's shield to fry him in his own energy. (Power Cost 5-10)\n\t\t\t\tYou use your atomic energy manipulation to shrink Inherit's shield easily and watch as fear freezes on his face. Obviously no one has ever tried to turn his own MeChip shields against him.\n\n\t\t\t\tBut that's exactly what you do. Inherit screams as his own MeChip energy takes him out of the fight.\n\t\t\t\t*goto inherittest\n\t\t\t#Reverse the gravity around Inherit to send him flying away. (Power Cost 5-10)\n\t\t\t\tWith a blink of your eyes, you reverse the gravity around Inherit and watch with satisfaction as he and his MeChip shield go flying helplessly away from the battlefield, like some awful hot air balloon.\n\t\t\t\t*goto inherittest\n\t\t\t*disable_reuse #Blast through Inherit's shield. (Power Cost 5-10)\n\t\t\t\t*set health -10\n\t\t\t\t*set power -10\n\n\t\t\t\tYou blast Inherit's shield with an extra-focused beam, but it splashes against his impenetrable MeChip shield, as usual.\n\n\t\t\t\tThis gives Inherit the chance he needs to knock you in the gut with a shield energy spike, sending you tumbling onto the ground.\n\n\t\t\t\tPopping back up to your feet, you're very ready to take Inherit down with a different attack.\n\t\t\t\t*goto fightinheritchoice\n\n*label inherittest\n*if (powerregain > 16)\n\t*set power -5\n\t*goto inheritfightsurvive\n*else\n\t*set power -10\n\t*goto inheritfightsurvive\n\n*label inheritfightsurvive\n*if (power \u003c= 0) or (health \u003c=0)\n\t*goto deathscene\n*else\n\t*goto podiumed\n\n*label podiumed\n*page_break\n\nBattles still rage on all around you, but you know there's only one way to truly end this. So with a swipe of your hand, you open the shield you constructed earlier and float onto the stage that holds the Victons and your parents.\n\nAs you do, the Secret Service and Meek lieutenants open fire at you, but you easily stop their bullets with: \n\n*choice\n\t#A swift gravity shift.\n\t\t*goto swiftshift\n\t#An energy swipe.\n\t\t*goto swiftshift\n\t#A classic shield.\n\t\t*goto swiftshift\n\n*label swiftshift\nYou then knock the Secret Service and Meek lieutenants aside with ease. \n\nThough just as you do, Commander Constance runs to the front of the stage wearing a gold and green captain's uniform and brandishing two Infinity Regulator hand-cannons.\n\n\"You will be made Meek!\" Commander Constance shrieks, pointing her cannons at you.\n\n[i]Oh, slugger to the no.[/i]\n\n*if bmfinalehates\n\t*if warningsys\n\t\t\"Don't waste any Power on this fool,\" MeChip ${chipname} appears to warn you.\n\t\t*goto fightconstancechoice\n\t*else\n\t\t*label fightconstancechoice\n\n\t\t*choice\n\t\t\t#Fly-leap and disarm Constance.\n\t\t\t\tAs intimidating as Commander Constance tries to seem, she has pretty much zero battle experience.\n\n\t\t\t\tWhich is why it's painfully easy to fly-leap at her and knock her out with a simple clothesline hit before she can even prime her cannons to fire.\n\t\t\t\t*goto ccdeathtest\n\t\t\t#Use an old favorite, the fists of fury, to take Constance down.\n\t\t\t\tAs intimidating as Commander Constance tries to seem, she has pretty much zero battle experience.\n\n\t\t\t\tWhich is why it's painfully easy to fly spin at her and knock her out with your spinning fists of fury before she can even prime her cannons to fire.\n\t\t\t\t*goto ccdeathtest\n\t\t\t#Create an energy-gravity trap to disarm Constance. (Power Cost 10-20)\n\t\t\t\tAs intimidating as Commander Constance tries to seem, she has pretty much zero battle experience.\n\n\t\t\t\tWhich is why it's painfully easy to eliminate the gravity around her and send her flying up into a custom-made energy bubble before she can even prime her cannons to fire.\n\n\t\t\t\t*if (powerregain > 16)\n\t\t\t\t\t*set power -10\n\t\t\t\t\t*goto ccdeathtest\n\t\t\t\t*else\n\t\t\t\t\t*set power -20\n\t\t\t\t\t*goto ccdeathtest\n*else\n\t*page_break\n\tYou're about to annihilate Constance when suddenly her cannons turn into two enormous anacondas, one gold and one green. Constance screams as the anacondas slither and tighten around her body.\n\n\t\"Actually, I'd prefer The Meek be unmade.\"\n\n\tYou spin towards this new voice to find… \n\n\t*page_break\n\n\tBlack Magic, floating just inside a hole ${bmze} has opened in your stage-shield.\n\n\t*if (bmcomaspouse) or (bmfinaleromance)\n\t\tAnd you can't help but smile.\n\n\t\t$!{Bmze} showed up, after all.\n\n\t\t*page_break\n\n\t\tBlack Magic lands beside you, planting a quick kiss on you before saying:\n\n\t\t\"Sorry I've been so selfish. It took me a while to get past myself, but I'm here for you now. What do you need?\"\n\n\t\tYou look over Black Magic and are so happy you waited for ${bmhir} to do the right thing. Finally.\n\t\t*goto bmengages\n\t*elseif bmbreakupcivil\n\t\t\"Sorry I've been so selfish,\" Black Magic says, landing beside you. \"It took me a while to get past myself, but I realized that you were right. And I was…\"\n\n\t\tBlack Magic pauses, trying hard to get the words out, until ${bmze} says: \"I'm here for you now. What do you need?\"\n\n\t\tYou look over Black Magic and are happy ${bmze} finally decided to do the right thing. Finally.\n\t\t*goto bmengages\n\t*else\n\t\t\"I just heard this was happening,\" Black Magic says, landing beside you. \"Sorry I'm late. What do you need?\"\n\n\t\tYou look over Black Magic and are happy ${bmze} finally decided to do the right thing. Still, there's no time to waste on congratulations.\n\n\t\t*label bmengages\n\n\t\t*choice\n\t\t\t*if ((bmcomaspouse) or (bmfinaleromance)) \n\t\t\t\t*disable_reuse #Kiss Black Magic before I do anything else.\n\t\t\t\t\t*label bmkissfortheages\n\t\t\t\t\t*achieve bmfinale\n\t\t\t\t\t*set rlshp_bm %+20\n\t\t\t\t\tYou grab Black Magic and give ${bmhir} a long kiss. At first ${bmze} is caught off guard, but ${bmze} quickly leans into it.\n\n\t\t\t\t\t*if bmcomaspouse\n\t\t\t\t\t\t\"Keep doing that,\" Black Magic says when you finally let go, \"and I'll do anything you want.\"\n\n\t\t\t\t\t\t\"Good,\" you say, smiling. \n\t\t\t\t\t\t*goto bmengages\n\t\t\t\t\t*else\n\t\t\t\t\t\t\"What was that for?\" ${bmze} asks when you finally let go.\n\n\t\t\t\t\t\t\"Who knows how this last battle is going to turn out,\" you say. \"I just wanted to make sure I did that while I still had the chance.\"\n\n\t\t\t\t\t\t\"Well if that's what's waiting for me on the other end of this thing,\" Black Magic starts, \"then I will make damn sure we slugging win.\"\n\t\t\t\t\t\t*goto bmengages\n\t\t\t*if (bmbreakupcivil)\n\t\t\t\t*disable_reuse #Kiss Black Magic because you want ${bmhir} back.\n\t\t\t\t\t*set bmfinaleromance true\n\t\t\t\t\t*set bmfinalefriend false\n\t\t\t\t\t*goto bmkissfortheages\n\t\t\t#\"I need you to help our allies back out on the field. I've got this under control.\"\n\t\t\t\tBlack Magic nods and turns to leave, so you drop your shield to let ${bmhir} out. You know ${bmhis} Power will be better utilized in the raging war outside, especially since all that's left now is for you to face President Victon.\n\n\t\t\t\tAnd that's something you need to do alone.\n\t\t\t\t*goto victonfinale\n\t\t\t#\"I need you to make sure no one gets onto this stage and interferes.\"\n\t\t\t\tBlack Magic nods and turns to leave, so you drop your shield to let ${bmhir} out, watching as ${bmze} immediately is occupied fighting some Powered gang trying to rush the stage. Turning around, you know that all that's left now is for you to face President Victon.\n\n\t\t\t\tAnd that's something you need to do alone.\n\t\t\t\t*goto victonfinale\n\t\t\t*if ((bmcomaspouse) or (bmfinaleromance)) \n\t\t\t\t*disable_reuse #I've had enough. I want to lose control with Black Magic and show everyone who is truly in charge.\n\t\t\t\t\t*set unleash %+25\n\t\t\t\t\t*set lawless %+25\n\n\t\t\t\t\t*if (lawless > 70) and (unleash > 70)\n\t\t\t\t\t\tYou're about to say the words, but pause for a moment. If you unleash your Infini Powers this way, you may never get control back. You might end up wiping out everyone here.\n\n\t\t\t\t\t\tSlugger, you may wipe out the entire planet, for all you know.\n\n\t\t\t\t\t\tDo you still want to cut loose and reign supreme with Black Magic?\n\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Absolutely.\n\t\t\t\t\t\t\t\t*goto bmadameve\n\t\t\t\t\t\t\t#No, that outcome would be too extreme, even for me.\n\t\t\t\t\t\t\t\t*goto bmengages \n\t\t\t\t\t*else\n\t\t\t\t\t\tYou're about to say the words,\n\t\t\t\t\t\t*if (unleash \u003c 70)\n\t\t\t\t\t\t\tbut then you realize you're not one to unleash and lose control to that extent. \n\n\t\t\t\t\t\t\tThe consequences would be disastrous if you tried, so you decide to take another approach.\n\t\t\t\t\t\t\t*goto bmengages\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tbut then you realize you're not one to eradicate laws and replace them with your own rule. \n\n\t\t\t\t\t\t\tThe consequences would be disastrous if you tried, so you decide to take another approach.\n\t\t\t\t\t\t\t*goto bmengages\n\t\t\n*label ccdeathtest\n\n*if (power \u003c= 0)\n\t*goto deathscene\n*else\n\tOnce Commander Constance is downed, you drop your stage-shield to grav-toss her Infinity Regulator cannons far away, where they can't do any more harm.\n\n\t*page_break\n\n\tThough just as you drop the shield, you see none other than Black Magic in the distance, hurtling towards the stage like a human supernova.\n\n\t\"It's time for redemption!\" Black Magic screams.\n\n\tYou only have seconds before Black Magic hits the stage and you have no idea if ${bmhis} target is you, President Victon, or both. Black Magic must think saving the day here in some way will resurrect ${bmhis} fallen career.\n\n\tBut today is not Black Magic's day in the sun. No one is taking Victon down besides you.\n\n\t*label bmengageshatefully\n\t*choice\n\t\t#De-Power Black Magic with the Infinity Regulator cannons.\n\t\t\t*set bmdepower true\n\t\t\tWithout blinking, you turn the Infinity Regulator cannons towards Black Magic and fire. The pulsing blast hits ${bmhir} head on, before ${bmze} has a chance to correct course and dodge.\n\n\t\t\tBlack Magic falls from the sky, now Powerless. \n\n\t\t\tYou hate the idea of anyone losing their Powers the way you did, but Black Magic is too big a liability to be left unchecked. Besides, Black Magic has proven ${bmze} cannot be trusted with the levels of Power ${bmze} possesses.\n\n\t\t\tYou turn back to the stage, unable to fully absorb the weight of what you've just done to another Powered individual. Or the mixed message it may send to the public.\n\t\t\t*goto victonfinale\n\t\t#Send Black Magic into orbit by reversing gravity.\n\t\t\t*set bmputdown true\n\t\t\t*set power -15\n\n\t\t\tBlack Magic wants to be a star?\n\n\t\t\tFine. Then ${bmze} can burn out like one.\n\n\t\t\tWith a simple thought, you manipulate the gravity fields surrounding Black Magic's body specifically to send her through the upper atmosphere and into orbit. $!{Bmze} will be able to pull free eventually, but not until long after the war here is over.\n\n\t\t\tAs you watch Black Magic suddenly shoot up into the sky and out of view, you smirk, thinking that ${bmze} isn't the only one who can throw Power around here.\n\n\t\t\t*if (power \u003c= 0)\n\t\t\t\t*goto deathscene\n\t\t\t*else\n\t\t\t\t*goto victonfinale\n\t\t*disable_reuse #Lose control and match Black Magic's Power.\n\t\t\t*set unleash %+25\n\t\t\t*set lawless %+25\n\n\t\t\t*if (unleash > 70)\n\t\t\t\tYou're about to say the words, but pause for a moment. If you unleash your Infini Powers this way, you may never get control back. You might end up wiping out everyone here along with Black Magic.\n\n\t\t\t\tSlugger, you may wipe out the entire planet, for all you know.\n\n\t\t\t\tDo you still want to cut loose and take down Black Magic?\n\n\t\t\t\t*choice\n\t\t\t\t\t#Absolutely.\n\t\t\t\t\t\t*goto bmadameve\n\t\t\t\t\t#No, that outcome would be too extreme, even for me.\n\t\t\t\t\t\t*goto bmengageshatefully \n\t\t\t*else\n\t\t\t\tYou're about to say the words, but then you realize you're not one to unleash and lose control to that extent. \n\n\t\t\t\tThe consequences would be disastrous if you tried, so you decide to take another approach.\n\t\t\t\t*goto bmengageshatefully\n\n*label bmadameve\n*if bmfinalehates\n\tYou extend both your arms and point directly at Black Magic, letting your Powers surge and build. \n\n\tThen, once you feel as if you might burst, you unleash a torrent of nuclear-fueled energy, laced with anti-gravity concussive boosters.\n\n\tYou let loose enough force to level an entire city, thinking that this is without a doubt the most Powerful attack you've ever conjured. \n\n\t*page_break\n\n\tWhen the blast clears and your own scream of fury subsides, all you see is Black Magic floating in front of you, glowing ${energycolor} and coursing with Power. $!{Bmze} must have absorbed your attack somehow… \n\n\tWhich means you just depleted your own Powers to make Black Magic ten times stronger.\n\n\tYou try to search Black Magic's eyes for some kind of intention, but ${bmze} doesn't have eyes anymore. $!{Bmze} just has two burning holes of endless energy. You step back, paralyzed with fear.\n\n\tBlack Magic has gone blind with Power. Literally.\n\n\tAnd you're Powerless to stop whatever ${bmze} chooses to do next.\n\t*goto bmabsorbstorecreate\n*else\n\t\"How can we finish this?\" you ask, taking Black Magic's hand.\n\n\t\"Fuel me,\" Black Magic responds, stepping away from you and floating up into the sky. \"Pour yourself into me and I'll make it all right. I'll rewrite reality however you tell me to.\"\n\n\tBlack Magic smiles down at you and you can't resist. You're going to do this.\n\n\t*page_break\n\n\tYou extend both your arms and point directly at Black Magic, letting your Powers surge and build. \n\n\tThen, once you feel as if you might burst, you unleash a torrent of nuclear-fueled energy, laced with anti-gravity concussive boosters.\n\n\tYou let loose enough force to level an entire city, thinking that this is without a doubt the most Powerful attack you've ever conjured. \n\n\t*page_break\n\n\tWhen the blast clears and your own scream of fury subsides, all you see is Black Magic floating in front of you, glowing ${energycolor} and coursing with Power. $!{Bmze} absorbed your Power, just like ${bmze} said ${bmze} would… \n\n\tWhich means you just depleted your own Powers to make Black Magic omnipotent. And now ${bmze} will do whatever you say. \n\n\tYou try to search Black Magic's eyes for some kind of intention, but you find that ${bmze} doesn't have eyes anymore. $!{Bmze} just has two burning holes of endless energy. \n\n\tBlack Magic has gone blind with Power. Literally.\n\n\t\"${bmfirst}, are you okay?\" you ask. \n\n\tBlack Magic doesn't seem to hear you, instead raising ${bmhis} hands to the sky.\n\t*goto bmabsorbstorecreate\n\n*label bmabsorbstorecreate\n*page_break\n\n\"Artst atchscr.\"\n\nBlack Magic utters the unintelligible words and the world flashes ${energycolor}, so bright that you have to close your eyes.\n\nWhen you finally open your eyes again, you can't believe what you see.\n\n*page_break\n\nBecause you don't see anything at all. \n\nEverything is gone: the stage, the warring combatants, the Devoid. Slugger, even your clothes are gone. You look up at Black Magic, who floats naked before you in the empty field of grass.\n\n\"What did you do?\" you ask, barely managing to string the words together.\n\n\"I started from scratch,\" Black Magic says. \"Isn't it beautiful?\" \n\nBlack Magic smiles, looking more peaceful than you've ever seen ${bmhir}. Then ${bmze} snaps ${bmhis} fingers and a creature pops into existence beside you, something that looks like a cross between a koala bear and a vulture. Black Magic touches down to the ground to cradle the creature in ${bmhis} arms.\n\n\"It's all gone,\" Black Magic says. \"It's just us. We can begin anew.\"\n\nAs the reality of Black Magic's words begin to sink in, your mind struggles to keep up. Did Black Magic really just unmake the whole world? Could that even be possible? If it is, does that mean… \n\nDoes that mean that you and Black Magic became some kind of twisted\n*if (male_straight) or (female_straight)\n\tAdam and Eve, the originating gods of a new earthly Eden?\n\t*goto oggods\n*elseif male_gay\n\tAdam and Adam, the originating gods of a new earthly Eden?\n\t*goto oggods\n*else\n\tEve and Eve, the originating goddesses of a new earthly Eden?\n\t*goto oggods\n\n*label oggods\n*page_break\n*achieve bmhidden\n\nAt first you're horrified to know that everything you know and love has been erased from existence. All you can think is that everyone who hated you was right: absolute power corrupts absolutely.\n\nThen you feel an eerie sense of peace wash over you. Because if what Black Magic says is really true, that means that everything that was broken and wrong in the world has also been eradicated. \n\nAnd in place of what Black Magic has unmade, you can remake it. Together.\n\nWholly in your image.\n\nBut is that what you truly want?\n\n*choice\n\t#Yes. I want to end here, so that I can begin everything anew with Black Magic.\n\t\tLooking around the empty Earth, you take a deep breath.\n\n\t\tYou reach out your hand and let atoms flow from your fingertips, rearranging and bending to your will with astonishing speed.\n\n\t\tRight in front of you, a new city rises. A perfect city that you and Black Magic will fill with perfect beings.\n\n\t\tA city that will be the capitol of this new world of ${codename} Magic.\n\n\t\tYou wanted control? \n\n\t\tYou've now got a whole world's worth.\n\t\t*goto endingwrapup\n\t#As tempting as this notion is, I can't let this dream become a reality.\n\t\t*set power 0\n\t\tJust as soon as you think this thought, the air turns to glass that suddenly shatters all around you. \n\n\t\tAs the shards crash into the ground, you are returned to the world as it was, to the stage where the Devoid War still rages. At your feet lies Black Magic, drained from the beautiful illusion ${bmze} must have created.\n\n\t\tWhether or not that brave new world Black Magic dreamed up was real, you'll never know.\n\n\t\tBecause you realize that your own Power has been spent too.\n\t\t*goto deathscene\n\n*label victonfinale\n*page_break\n\nYou stand facing the First Lady, Jury, and President Victon, who are all that now remain between you and your imprisoned parents.\n\n\"How do you live with yourself, after all you've done?\" you say, staring President Victon straight in his eyes. But you find nothing there—no remorse, no emotion. Just cold calculation.\n\n\"All I've ever done is make this city, this nation, this world a safer place,\" President Victon returns. \"Now Jury, would you kindly arrest this terrorist?\"\n\n*page_break\n\n*if juryboyfriend\n\tJury moves forward, but not to fight you. Instead, he stands beside you and kisses you.\n\n\t\"What the slugger is this?\" President Victon spits, unable to control himself. Realizing how rabid he just sounded, Victon tries to re-compose himself, but you can see a vein in his forehead still pulsating madly.\n\n\tNo matter your true feelings for Jury, just seeing President Victon react this way makes it all worth it.\n\t*page_break\n\t*goto juryadmitsthetruth\n*elseif recruitjury\n\tJury moves forward, but not to fight you. Instead, he stands beside you and turns to face his father.\n\t*goto juryadmitsthetruth\n*else\n\tJury hesitates, his eyes falling to the floor.\n\n\tPresident Victon glares at his son, looking like he may explode. \"What are you waiting for?\"\n\n\t\"I'm waiting for you to tell everyone the truth,\" Jury spits, raising his smug face to meet his father's. \"The truth about what this family really stands for. About what you've—\"\n\t*goto doesntgettofinish\n\n*label juryadmitsthetruth\n*set regimedamage +5\n*set elevenjuryregime true\n\n\"We both know I couldn't take down ${codename} even if I wanted to,\" Jury says, this time his smug face directed at President Victon. \"Because you bought me my fake MeChip perspective Powers when I was a kid, to mold me in your image. Oh, and to lie to the nation about having a Powered son to further your political career.\"\n\nPresident Victon glares at Jury, looking like he may explode. In return, Jury just smiles his defiant smile, his chest puffed up as usual.\n\n\"And that's not all. I know that you—\"\n\n*label doesntgettofinish\n\nJury doesn't get to finish, however, as a diamond blast suddenly knocks him off the stage.\n\n\"You ungrateful little slugger,\" Mrs. Victon says, diamonds glowing around her clenched fists.\n\n*page_break\n\nWhat the slugger?\n\nYour mouth falls open—since when does Mrs. Victon have Powers? You freeze from the shock of seeing the First Lady's pulsating diamonds sparkle, which gives her enough time to raise her fists at you.\n\n\"You're not my slugging mother!\" Jury screams.\n\nNext thing you know, Jury is back up on his feet and tackling the First Lady off the stage. As they hit the ground, you decide to open up your shield and let them duke it out on their own.\n\nWhich means it's just down to you and President Victon facing off, with the world watching.\n\n*page_break\n\n\"That's some dysfunctional family you have there, Mr. President,\" you say.\n\n\"Not as dysfunctional as your family of criminals,\" President Victon snarls, turning to your parents' cell—with an Infinity Equalizer gun in his hand, set to kill.\n\n[i]No.[/i]\n\nAs you see the very weapon that downed Jenny, that once stripped you of your Powers, you raise your hands to explode it apart in Victon's grip. \n\n*choice\n\t#Trigger a tiny fission reaction inside the Equalizer. \n\t\t*goto butyourpowerseem\n\t#Blow the Equalizer apart with a gravity burst.\n\t\t*goto butyourpowerseem\n\t#Blast the Equalizer to a crisp.\n\t\t*goto butyourpowerseem\n\n*label butyourpowerseem\nYou activate your Powers, but they seem to just slide off of it—the IRP must have found some way to upgrade the weapons with mini-Power dampening fields.\n\nFrantic, you turn to your parents' cell, knowing this is your only chance to save them.\n\n*if warningsys\n\t\"Infinity Equalizers can shoot through shields,\" MeChip ${chipname} appears to warn you. \"So you need to move your parents!\"\n\t*goto savethosrents\n*else\n\t*goto savethosrents\n\n*label savethosrents\n\n*choice\n\t#Reinforce the shield already around my parents' cell. (Power Cost 5-10)\n\t\t*set parentsdepowered true\n\t\tYou spend the Power to do so, but then you remember that Infinity Equalizers can shoot through your shields.\n\n\t\tBut it's too late.\n\n\t\tPresident Victon's blast pierces your shield and slams into your parents.\n\n\t\t*page_break\n\n\t\tYour whole body freezes, paralyzed with fear. The breath sucks from your lungs and all you can do is stare…\n\n\t\tStare at your parents, who lie still on the floor of their cell.\n\n\t\tFull of fury, you rip apart the cell with your gravity Powers, wildly swinging your arms. Your parents can't be dead, not after all this, they can't be…\n\n\t\t*page_break\n\n\t\tJust then, you see your dad's eyes flutter open, followed by your mom's.\n\n\t\tThank slugger, the blast didn't kill them. \n\n\t\tThough could the blast have stripped them of their Powers, somehow? And if so, just how permanently?\n\n\t\tYou force these questions out of your mind, however, because you have more pressing matters to attend to.\n\t\t*goto parentsavetestsdepowered\n\t#Grav-lift the entire cell out of harm's way. (Power Cost 5-10)\n\t\tYou do so and breathe a sigh of relief as Victon's blast passes underneath your parents' cell.\n\t\t*goto parentsavetests\n\t#Blast the cell aside and knock my parents out of the way. (Power Cost 5-10)\n\t\tYou do so and breathe a sigh of relief as Victon's blast fires harmlessly past your parents.\n\t\t*goto parentsavetests\n\n*label parentsavetests\n\nKnowing you only have a few seconds before Victon's next blast, you finally break apart the cell, freeing your parents.\n\nAnd it feels really slugging good to do so.\n\n*label parentsavetestsdepowered\n*if (powerregain > 16)\n\t*set power -5\n\t*goto parentsfightsurvive\n*else\n\t*set power -10\n\t*goto parentsfightsurvive\n\n*label parentsfightsurvive\n*if (power \u003c= 0)\n\t*goto deathscene\n*else\n\t*goto thisisreallyit\n\n*label thisisreallyit\n*page_break\n\nYou fly towards your freed parents, who try to adjust to their surroundings, looking like they must have had some kind of sensory deprivation in that cell.\n\n\"${firstname}, no!\" your mom suddenly screams, pointing across the stage.\n\nYou spin towards President Victon and find an Infinity Equalizer blast rocketing at you. You only turned your back on him for an instant…and now there's no time to move.\n\n[i]This is it[/i], you think as the blast reaches you. You close your eyes, knowing that at least your final act will have been saving your parents.\n\n*page_break\n*set health -15\n\n*if (health \u003c=0)\n\t*if (prodigalfinalenemy) or (diedbefore)\n\t\t*goto victonshotdeath\t\n\t*else\n\t\tYou feel the blast rip into your back and knock you down and know that…\n\n\t\tWait, wasn't Victon's blast supposed to hit you from the front?\n\n\t\tThough it doesn't matter, because you weren't strong enough to survive this mysterious hit, either.\n\t\t*goto deathscene\n*else\n\tYou feel the blast rip into your back and knock you down and know that…\n\n\tWait, wasn't Victon's blast supposed to hit you from the front?\n\t*goto hurtbutfine\n\n*label deathscene\n*page_break\n\nThat's when you feel it—your Levels have dropped too low. You've been fighting too recklessly this battle, making irresponsible decisions. And it cost you your life.\n\nAs the world starts to swirl into excruciating blackness, your final thoughts are of Jenny and Grandma and your parents…\n\nFor you've truly let them down.\n\n*choice\n\t#Return to the beginning of the Devoid War to see if I can survive. (Legend Cost 20)\n\t\tYou have another shot to defeat President Victon and save your parents, but your Legend Level will probably never recover from this drop.\n\n\t\tLegendary heroes don't die, ${codename}. You had better make better decisions this time around.\t\t\n\t\t*set power 75\n\t\t*set health 100\n\t\t*set legend -20\n\t\t*set antipoweredsent +25\n\t\t*set sgrone false\n\t\t*set crushone false\n\t\t*set tmgone false\n\t\t*set sgrtwo false\n\t\t*set crushtwo false\n\t\t*set tmgtwo false\n\t\t*set diedbefore true\n\n\t\t*if elevenjuryregime\n\t\t\t*set regimedamage -5\n\t\t\t*set elevenjuryregime false\n\t\t\t*goto rebdamtest\n\t\t*else\n\t\t\t*label rebdamtest\n\t\t\t\n\t\t\t*if elevenrebellionregime\n\t\t\t\t*set regimedamage -4\n\t\t\t\t*set elevenrebellionregime false\n\t\t\t\t*goto jennydamtest\n\t\t\t*else\n\t\t\t\t*label jennydamtest\n\t\t\t\t\n\t\t\t\t*if elevenjennyregime\n\t\t\t\t\t*set regimedamage -4\n\t\t\t\t\t*set elevenjennyregime false\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto chapterelevenstartfight\n\t\t\t\t*else\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto chapterelevenstartfight\n\t#Start HeroFall over from the very beginning.\n\t\tBetter luck next time, ${codename}! \n\t\t*ending\n\n*label victonshotdeath\n\nYou feel President Victon's blast rip into you and for a moment, the world washes white.\n*achieve deathbyvicton\n\nWhen the color comes back, all you feel is empty. And pain. You try to move, but find that you can't.\n*if (prodigalfinalenemy)\n\tAll you can do is look up at Prodigal standing above you.\n\n\t\"I could have saved you, chicken,\" Prodigal says, a frown on her face. \"But where's the fun in that?\"\n\n\tAs Prodigal begins to cackle, the world starts to swirl into excruciating blackness. How long has Prodigal been here? Did she just arrive to watch you die, or has she been working with President Victon all along?\n\n\tThese questions swirl through your mind, but you fail to grasp the answers. Because this time, there will be no redemption. Prodigal and President Victon have won.\n\t*goto victondeathchoiceretal\n*else\n\tAll you can do is look up and see your parents above you, screaming and crying. But you can't hear them, not anymore.\n\n\tThis time, there will be no redemption: you've died too many times before to have a high enough Legend Level for a second chance.\n\t*goto victondeathchoiceretal\n\n*label victondeathchoiceretal\n\nWhich means this is really it.\n\nYou're dying.\n\n*page_break\n\nThough you think you have just enough life left for one final act.\n\nSo what's it going to be?\n\n*choice\n\t#Murder President Victon.\n\t\tWithout thinking twice, you jump up towards President Victon using the last shreds of energy in your body.\n\n\t\tWhen you get close enough, you snap President Victon's neck with your bare hands. \n\n\t\tFor a moment, he just hangs there, his own terrified eyes locked on yours.\n\n\t\tUntil you both fall to the ground, spent.\n\n\t\t*page_break\n\n\t\tYou just murdered your greatest enemy, the President of the United States, in front of the entire nation. You know that for better or worse, the image of you killing President Victon with your dying breath will probably live on in history forever.\n\n\t\tThough as the world starts to swirl into excruciating blackness, your final thoughts are of Jenny and Grandma and your parents…  \n\n\t\tAt least your dying act was to use your Power to save your parents and end President Victon's reign of terror. Hopefully you can allow that thought to let you rest in peace.\n\n\t\tBut the truth remains: Legendary heroes don't die, ${codename}. By letting your enemies get the best of you, you left everyone you care about most in the world to finish this war without you. \n\n\t\tFor better or worse, that will be the legacy you leave behind. \n\t\t*goto endingwrapup\n\t#Take everyone out with one final nuclear explosion.\n\t\tIf you're going down, then you're taking everyone you love and hate out with you.\n\n\t\tSo before your last breath escapes, you reach out your hand and let atoms flow from your fingertips, rearranging and bending to your will with astonishing speed. With one final scream, you push your body to the point of full atomic meltdown… \n\n\t\tAnd you feel yourself explode with the force of a hundred nuclear bombs.\n\n\t\t*page_break\n\n\t\tNext, there's only excruciating blackness as the world tears apart at your hands. Your final thoughts are of Jenny and Grandma and your parents…whom you've just obliterated. \n\n\t\tAll you can do is hope you see them again, wherever or whatever comes next. \n\n\t\tThough after claiming slugger-knows how many lives in your death, you're not sure what to expect. All you do know is that with this final release at your parting, the world will never be the same. \n\n\t\tAssuming there even is a world left anymore.\n\t\t*goto endingwrapup\n\t#Take the hit like a hero and die with dignity.\n\t\tAs the world starts to swirl into excruciating blackness, your final thoughts are of Jenny and Grandma and your parents…  \n\n\t\tAt least your dying act was to use your Power to save your parents and end President Victon's reign of terror. Hopefully you can allow that thought to let you rest in peace.\n\n\t\tBut the truth remains: Legendary heroes don't die, ${codename}. By letting your enemies get the best of you, you left everyone you care about most in the world to finish this war without you. \n\n\t\tFor better or worse, that will be the legacy you leave behind. \n\t\t*goto endingwrapup\n\n*label endingwrapup\n*page_break Alternate Ending Unlocked\n\nThe good news: \n\nYou just unlocked a rare alternate ending.\n\nThe bad news: \n\nThis is really the end. \n\nTo experience the main Heroes Rise body of endings, be sure to play again with different choices!\n\n*page_break End\nWe hope you've enjoyed playing [i]Heroes Rise: HeroFall.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\n[i]A note from the author of Heroes Rise:[/i]\n\nThanks so much for taking the journey of Heroes Rise with me! What started as a single, newfangled interactive novel project turned into the trilogy of my dreams for one reason and one reason only: because all you Hero Risers out there read the novels and spread the word. Seriously, we've got no marketing machine here at Heroes Rise; just a few interactive novels and some seriously awesome fans.\n\nWhile this may be the end of the Heroes Rise Trilogy, I have big plans to expand the Heroes Rise universe with The Hero Project 2, featuring the Second Season of The Hero Project and some of your favorite faces from Heroes Rise.\n\nSo if you want to keep adventuring in Millennia City, keep doing what you're doing: read, leave those good reviews, tell your friends, post, share, like, tweet, and keep on supporting Heroes Rise! Also make sure to let us know via email and the Heroes Rise social media pages, which can be found in the ABOUT tab on your homescreen or by visiting: \n\n*link https://www.facebook.com/HeroesRise\n\nWe've got all kinds of other cool stuff there, including Strategy, Hidden Bonus, Badge, and Alternate Ending Guides, as well as news and extra stories from Millennia City, fan contests, and much, much more.\n\nIn the meantime, watch out for my new series for Choice of Games, coming Winter 2015:\n\n[b]VERSUS[/b]\n*line_break\n[b]By Zachary Sergi[/b]\n*line_break\n[i]After being exiled to a sacred intergalactic prison planet, you must survive the deadly VERSUS competition in order to find the legendary lost warrior capable of saving your home planet.[/i]\n\nThanks so much again and hope to see you all next time, Hero Risers!\n\nAll Best,\n*line_break\nZachary Sergi (Codename: Riser)\n\n*ending\n\n*label hurtbutfine\n*page_break\n\nYou open your eyes and realize that you still lie on the stage, alive, because someone shot you in the back to knock you out of the way of the Infinity Equalizer blast. \n\nAs you stand to find out who, you see that Prodigal lies on the stage in front of you, beginning to bleed out of a wound in her chest.\n\n*if nocallprodigal \n\t\"How could I resist it?\" Prodigal croaks, blood trickling from her mouth.\n\t*goto reelingslugger\n*else\n\t\"You rang?\" Prodigal croaks, blood trickling from her mouth.\n\t*goto reelingslugger\n\n*label reelingslugger\n*page_break\n\nHoly slugger, Prodigal must have blasted you away and taken Victon's shot to save your life.\n\nReeling, you look back towards President Victon to find that your parents have already apprehended and disarmed him—they are consummate professionals, after all.\n\nLooking back down at Prodigal, you know you have to decide what to do right away, before she dies right here, on the stage in front of you.\n\n*choice\n\t*selectable_if ((prodigalfinalally) or (prodigalgirlfriend)) #Try to heal Prodigal.\n\t\t*set rlshp_prodigal %+25\n\t\t*set revenge %-15\n\n\t\tYou need Prodigal to live long enough to at least see this thing through, so you kneel down to try and heal her wounds.\n\n\t\t\"Don't bother,\" Prodigal chokes. \"My Powers are gone now, too. Even if you heal the shot wound, the incurable Infini cancer is killing me quickly anyway.\"\n\n\t\t\"Thank you for doing that,\" you say, holding Prodigal's hand and knowing that she's right—it doesn't matter how Powerful you are now, you can't find a way to cure an advanced Infini disease in seconds.\n\n\t\t\"Let's call it even,\" Prodigal chokes. \"You know, for all those times I tried to kill you.\"\n\n\t\t*label prodfinalgooodbyelat\n\n\t\t*if prodigalgirlfriend\n\t\t\t*page_break\n\t\t\t*set rlshp_prodigal %+40\n\t\t\t*label prodkissofdeath\n\n\t\t\tYou almost laugh, but instead you wipe Prodigal's face and hold it in your hands. \n\n\t\t\t\"I always loved you, chicken,\" Prodigal chokes out. \"You know that, right?\"\n\n\t\t\t\"I know,\" you say, kissing Prodigal to keep yourself from crying. You can hear the sound of gasps all around you, but you don't care. \n\n\t\t\tYou know the world might not ever understand your love, but you also know that you're about to make them understand, with what you have to say next.\n\t\t\t*page_break\n\t\t\t*goto scanthatprod \n\t\t*else\n\t\t\t*if nocallprodigal\n\t\t\t\tYou almost laugh, but then you realize this is your last chance to tell Prodigal the truth about her parents.\n\t\t\t\t*page_break\n\t\t\t\t*goto scanthatprod\n\t\t\t*else\n\t\t\t\tYou almost laugh, but then you realize this is your last chance to tell Prodigal why you called her here.\n\t\t\t\t*page_break\n\t\t\t\t*goto scanthatprod \n\t*selectable_if (prodigalfinalenemy) #Scan Prodigal's DNA to get the sample MeChip ${chipname} needs. I don't care if she dies.\n\t\t*set rlshp_prodigal %-25\n\t\t*set revenge %+15\n\n\t\tYou know there's no hope in trying to save Prodigal—nor do you have any particular desire to do so.\n\n\t\t*goto scanthatprod\n\t#Thank Prodigal for saving me.\n\t\t*set rlshp_prodigal %+5\n\t\t\"Thank you for that,\" you say, kneeling to hold Prodigal's hand.\n\n\t\t\"Let's call it even,\" Prodigal chokes. \"You know, for all those times I tried to kill you.\"\n\t\t*goto prodfinalgooodbyelat\n\n*label scanthatprod\nSo you mentally command MeChip ${chipname} to do a paternity DNA scan, now that President Victon and Prodigal share the same stage.\n\nWhile ${chipname} goes to work, you look Prodigal in the eyes, knowing that dozens of live cameras swivel to capture your words.\n\n\"President Victon and your mother, Miss Artillery, used to be a couple,\" you say, loud and clear. \"And I believe President Victon is your father.\"\n\n*page_break\n\nJust as your words fall onto the stage with a thud, MeChip ${chipname} appears with the official scan results. You switch ${chiphir} to the public setting so that the world can hear what ${chipname} is about to say.\n\n\"Uploading official DNA scan test to ${codename}'s MeTube page now,\" MeChip ${chipname} says.\n\n\"President Victon is a 100% match for Prodigal's biological father.\"\n\n*page_break\n\nAs this revelation rocks the stage, you look up to find President Victon and your parents looking utterly bewildered. Though when you look back down at Prodigal, you find that a twisted smile warps her dying face.\n\n\"Father murders secret daughter,\" Prodigal laughs. \"Now there's a real twist ending. Couldn't have planned it better myse…\"\n\nProdigal doesn't get to finish, though, as her face falls slack and her eyes roll blank. And this time, you know it's real: \n\nProdigal is dead.\n\n*if (prodigalgirlfriend) or (prodigalfinalally)\n\t*page_break\n\n\tYou feel cold grief spill through you, but you know that's useless right now.\n\n\tThe only thing that matters is making President Victon pay for what he has done.\n\t*goto lookupatpresvic\n*else\n\t*goto lookupatpresvic\n\n*label lookupatpresvic\n*page_break\n\nYou look up at President Victon standing next to your parents, still looking as defiant as ever.\n\n\"You have no concept of the damage you've done here today,\" President Victon seethes. \"You just destroyed this nation.\"\n\nYou stare at President Victon and think of Miss Artillery and Prodigal. Of your parents. And Grandma. And Jenny.\n\nYou think of all the lives President Victon has tried to ruin and you know what you have to do. Though you also know that what you choose here could change everything—not just for you, but for the entire nation.\n\n*choice\n\t#Kill President Victon here and now.\n\t\t*set revenge %+30\n\n\t\t*if (revenge > 65)\n\t\t\t*set finalekillvicton true\n\t\t\t*set lawless %+25\n\t\t\t*set feared %+25\n\t\t\t*set antipoweredsent +20\n\t\t\t*set rlshp_victons %-60\n\t\t\t*set regimedamage -6\n\n\t\t\tWithout thinking twice, you walk up to President Victon and say:\n\n\t\t\t\"No. I'm saving this nation.\"\n\n\t\t\tYou then use your bare hands to snap President Victon's neck.\n\n\t\t\t*page_break\n\n\t\t\tNo one tries to stop you, but then, you didn't give anyone the chance to.\n\n\t\t\tYou just murdered your greatest enemy, the President of the United States, in front of the entire nation.\n\n\t\t\tYou know that for better or worse, the image of you killing President Victon live on national 3V will probably live on in history forever.\n\t\t\t*goto youdiditfinally\n\t\t*else\n\t\t\tYou move to kill President Victon, but realize that you're not vengeful enough to really go through with murder. Maybe if your Revenge level were higher…\n\n\t\t\tInstead, you have to knock President Victon out.\n\t\t\t*goto attavictonfinal\n\t#Knock President Victon out to end this war. With the truth revealed, there's nothing left to fight over.\n\t\t*set revenge %+15\n\n\t\t*label attavictonfinal\n\t\t*set finaleattackvicton true\n\t\t*set lawless %+20\n\t\t*set feared %+20\n\t\t*set antipoweredsent +10\n\t\t*set rlshp_victons %-30\n\t\t*set regimedamage +2\n\n\t\tYou walk up to President Victon and say:\n\n\t\t\"No. I'm saving this nation.\"\n\n\t\tYou then punch President Victon across the face with your bare hands. And he goes down like the coward he has always been.\n\n\t\tYou know that for better or worse, the image of you knocking out President Victon live on national 3V will probably live on in history forever.\n\t\t*goto youdiditfinally\n\t#Make a speech that will dishonor President Victon and call for his arrest.\n\t\t*set revenge %-15\n\n\t\t*label dishonorvictonfinal\n\t\t*set finalespeechvicton true\n\t\t*set lawless %-20\n\t\t*set feared %-20\n\t\t*set rlshp_victons %-30\n\t\t*set regimedamage +4\n\n\t\tWithout thinking twice, you walk up to President Victon and say:\n\n\t\t\"No. I'm saving this nation. You have lied about everything and abused your Power to get where you are today. The truth of who you really are and all that you've done will be revealed.\n\n\t\t\"Until then, I'm placing you under arrest.\"\n\n\t\t*label handcuffvicton\n\t\t*page_break\n\n\t\tPresident Victon opens his mouth to respond, but you don't give him the chance. Instead, you create a binding energy gag around his mouth and turn him around, cuffing him with a pair of energy handcuffs.\n\n\t\tStanding there, you realize that the image of you arresting President Victon live on national 3V will probably live on in history for quite some time. \n\n\t\t*if (antipoweredsent \u003c 15)\n\t\t\t*set antipoweredsent 5\n\t\t\t*goto youdiditfinally\n\t\t*else\n\t\t\t*set antipoweredsent -10\n\t\t\t*goto youdiditfinally\n\t#Reveal all of the ugly truths about what President Victon has done and call for his impeachment.\n\t\t*set revenge %-30\n\n\t\t*if (revenge \u003c 35)\n\t\t\t*set finaleimpeachvicton true\n\t\t\t*set lawless %-25\n\t\t\t*set feared %-25\n\t\t\t*set rlshp_victons %-30\n\t\t\t*set regimedamage +6\n\n\t\t\tWithout thinking twice, you walk up to President Victon and say:\n\n\t\t\t\"No. I'm saving this nation. You have lied about everything and abused your Power to get where you are today. You framed my parents for murder using the mother of your daughter, Miss Artillery. Who I saw killed right before my eyes earlier today, after a life of imprisonment and experimentation at your hands.\"\n\n\t\t\t\"For your crimes, President Victon, I call for your immediate arrest. I can't wait to see you impeached and rotting in the Devoid, you slugging coward.\"\n\n\t\t\t*if (antipoweredsent \u003c 25)\n\t\t\t\t*set antipoweredsent 5\n\t\t\t\t*goto handcuffvicton\n\t\t\t*else\n\t\t\t\t*set antipoweredsent -20\n\t\t\t\t*goto handcuffvicton\n\t\t*else\n\t\t\tYou open your mouth to deliver this speech, but realize that you're not idealistic enough to reveal everything. Maybe if your Ideals level were higher…\n\n\t\t\tInstead, you have to go with the milder speech.\n\t\t\t*goto dishonorvictonfinal\n\n*label youdiditfinally\n*page_break\n\nYou did it.\n\nPresident Victon has been stopped, once and for all. And with their king removed from the board, your enemies on the field begin to surrender, calming the battles all around.\n\nWhich means the war is finally over. \n\nYou won.\n\nBut at what cost?\n\n*page_break\n\nThat doesn't matter to you, though. Not right now. \n\nAll that matters is that your parents stand in front of you, alive and free and redeemed. \n\nAs Grandma runs to join you all on stage, your family envelops you in a massive hug. None of you say anything, because after all that has happened, all this time apart, there are no words to describe this moment.\n\nYou feel better than you've ever felt.\n\nBecause you've finally restored the ${familyname} name.\n\n*finish Final Chapter: Aftershockers\n", "chap_five": "*comment é\n\n*text_image chap_5.png center Chapter 5: Garden Variety\n\nYou've been flying south out of Millennia City for twenty minutes now and Jenny still hasn't said a word to you. You tried to say something once you got to a cruising altitude, but Jenny just kept her eyes on the control panel and said:\n\n\"We both have more questions than we have time to answer in here, but we'll be somewhere safe soon. And hopefully out of earshot of that loon.\" \n\nJenny looked back at Prodigal, then returned to the controls. \"Now be quiet so I can concentrate.\"\n\nAfter that, you settled into your uncomfortable hoverpod seat and began trying to process everything that has happened over the past 24 hours. Though you're realizing it would be difficult to process even if you had a full year, let alone the brief length of this hoverpod ride.\n\n*page_break\n\nThe most pressing issue in your mind right now, however, is your battle with Rexford's Infinite Elite. It's completely insane that a hit squad like that even exists.\n\n*if (power \u003c 20) and (health \u003c 20)\n\tDuring that fight you almost overexerted your Powers, not to mention that you nearly died from the attacks you sustained—you finished with dangerously low Power and Health Levels.\n\t*goto hoverhealth\n*elseif (power \u003c 20)\n\tDuring that fight you almost overexerted your Powers, finishing with a dangerously low Power Level.\n\t*goto hoverhealth\n*elseif (health \u003c 20)\n\tDuring that fight you almost died from the strain of using your Powers and the attacks you sustained, finishing with a dangerously low Health Level.\n\t*goto hoverhealth\n*elseif usehealingnet\n\tDuring that fight you almost died from the strain of using your Powers and the attacks you sustained. In fact, you would have died if not for the healing dragnet you had in your weapons belt. Though now that you've used it, you won't be able to in your next fight.\n\t*goto hoverhealth\n*else\n\tThough you did manage to survive the fight with relatively safe Power and Health Levels—without needing to use the healing dragnet in your weapons belt—which means you'll have it available to use in your next fight. This is a feat worthy of boosting the public's \n\t*if (feared >= 50)\n\t\t*set feared %+25\n\t\tfear of you.\n\t\t*goto hoverhealth\n\t*else\n\t\t*set feared %-25\n\t\treverence for you.\n\t\t*goto hoverhealth\n\n*label hoverhealth\n\nYou know this Infinite Elite fight was probably just the beginning—who knows how many hunters and enemies will track you down before you can find Miss Artillery. \n\nAll you do know is that you can't let them stop you.\n\n*page_break\n\nYou're taken away from this thought, however, as something flashes from the tiny bench behind you. You turn to find a still-unconscious Prodigal thrashing in her sleep, generating kick-shields as she moves. She must be having a pretty terrible nightmare—you now know firsthand just how nasty things can be in Prodigal's head.\n\nYou don't necessarily mind seeing Prodigal get a dose of her own medicine, but the last thing you need is for her to take out the entire hoverpod with some nightmare-driven attack.\n\n\"You can wake that hag up,\" Jenny says. \"We're here, anyway.\"\n\nYou turn to look out the front windshield, but you can't see anything through the thick cloud cover, so you start to shake Prodigal awake instead.\n\n*page_break\n\n\"Squaaaaa murder Terry!\" Prodigal shouts before her eyes snap open. \"What is—oh, now that is some true eleganza!\"\n\nYou think Prodigal has really lost it, until you realize she's staring ahead out through the windshield. \n\nAnd when you turn to look, your own jaw drops.\n\nAs you descend through the clouds, you're most stunned to see:\n\n*fake_choice\n\t#A manicured mansion.\n\t#An oceanside bluff with an infinity pool.\n\t#A massive, sprawling garden.\n\t#A hedge maze.\n\t#Several peacocks roaming the grounds.\n\t#A guest house bigger than my lakeside safe house.\n\t#Two giant, golden G's on the front doors.\n\n\"Wait, Gay Gardens…?\" you say, starting to put the pieces together.\n\n\"On my way to get you from the Meek headquarters, I knew we'd need someplace safe to go, somewhere not connected to the DRPR,\" Jenny explains as she lands the hoverpod. \"Someplace we could make a plan off the grid, where no one would think to look for us, hosted by someone we can trust, someone who hates Victon just as much as all of us in this little hoverpod of hell.\"\n\n\"And people say I like to ramble?\" Prodigal sighs. \"Sheesh.\"\n\n\"Interrupt me again and I will quite literally slice you in half,\" Jenny barks, one hand on a sheathed plasma sword. \"Anyway, that list of requirements generated exactly one name…\"\n\n*page_break\n\nGG.\n\nAs you step out of the hoverpod, you see GG rolling towards you through a rose-lined path in his hot-pink people-mover. You then spot two leashes attached to the handles, leading a pair of unruly peacocks that trail behind him.\n\n\"Glorious gingersnaps, it is my distinct pleasure to welcome you to Gay Gardens!\" GG announces, outstretching his arms so that the peacocks behind him shimmy their tail feathers. \"Whatever shall we do first?\"\n\nAfter this display of ridiculata, GG catches your eye—you both know that there's still quite a bit of unfinished business between the two of you. You haven't spoken to GG since The Hero Project, where he was an executive producer and your personal handler, pushing you to make many damaging decisions. GG claims to have only done so in service of the show, though, positing that he was unaware of Rexford's cabal conspiracy. \n\nTo prove it, GG later cooperated with Jenny's investigation, acting as a major source of confidential information. Still, you haven't had a chance to decide whether you can truly trust—or forgive—GG yet.\n\n*choice\n\t#I'm still angry with GG for what he did to me during The Hero Project.\n\t\t*label avoidthateye\n\t\tSo you make sure to avoid GG's pleading gaze, looking elsewhere.\n\t\t*goto prodstep\n\t#After what GG did, how on earth can Jenny think it's okay to bring me here?\n\t\t*goto avoidthateye\n\t#At least GG did the right thing in the end.\n\t\t*label givethatsmile\n\t\tSo you offer a smile and see that GG relaxes immediately. \n\t\t*goto prodstep\n\t#No matter what, I'm happy to see GG.\n\t\t*goto givethatsmile\n\n*label prodstep\n\nBefore you or Jenny can say anything, Prodigal steps out of the hoverpod behind you.\n\n\"Goodness gracious, we have arrived!\" Prodigal sing-shouts, taking on a bizarre 1920s-style wealthy affectation. \"Now my little glam goose, I'd love to tour your gorgeous grounds, but it seems I have the minor issue of this tick-tocking wingbomb to attend to.\"\n\n\"My, well, we certainly can't have that, now can we?\" GG says, matching Prodigal's accent. \"But my dear rabblerouser, can you promise me you won't stir up any of your signature trouble in my humble home?\"\n\n\"What kind of girl do you take me for?\" Prodigal gasps. \"I'm nothing if not the most gregarious guest.\"\n\nYou turn to Jenny and she looks about ready to vomit, witnessing this exchange. You never really thought about what it would be like if GG ever met Prodigal—you can almost see the two of them living in this mansion together, like some twisted pair of Golden Girls.\n\n*page_break\n\n\"Not that this little display isn't endlessly entertaining,\" Jenny interjects. \"But we are on a deadline.\"\n\n\"Don't mind her,\" Prodigal whispers, leaning in towards GG. \"She lacks any and all imagination.\"\n\nGG giggles, though he abruptly stops when he catches the death glare shooting from Jenny's eyes. \n\n\"Quite right, we mustn't dally, then,\" GG says, unclipping the peacock leashes so they can roam free once again. \"Off we go!\"\n\n*page_break TEN MINUTES LATER\n\nWith Prodigal dropped in the guest house across the grounds to de-bomb herself, GG insisted you and Jenny settle in the \"grand parlor\" for \"high tea.\" All you really want to do is shower and catch some much-needed sleep, but you've got too much to discuss with Jenny first, especially since Prodigal is momentarily out of the picture.\n\n\"I still don't like leaving that nutbag alone,\" Jenny grumbles as she sits down in a plush golden chair.\n\n\"Fret not, I put Prodigal in the guest house for a reason,\" GG explains, fussing around an ornate tea set. \"It's in secure lockdown mode, so I'll know immediately if she tries anything fishy.\"\n\n\"And what if she blows herself up?\" you ask, sinking into a blissfully soft sofa.\n\n\"Well, I suppose I have been meaning to update the guest house…\" GG starts.\n\n\"See, it's a win-win,\" Jenny says, reaching for a teacup.\n\n*page_break\n\nAs GG breaks into another bout of giggles, you take a moment to survey the room. It's more cluttered than you'd expect a mansion like this to be, but your eye catches on a portrait hanging in the center wall. It's of two elderly women, one of them wearing some kind of blue headscarf.\n\n\"You must forgive the state of Gay Gardens,\" GG says. \"I sent all of the staff home when I got Jenny's secure MeMessage. I didn't want to take any chances, since the bounty on your head might prove rather enticing to some of the downstairs dwellers.\n\n\"I was raised here in this house and inherited the family estate when my parents passed,\" GG continues as he pours tea for everyone. \"They were a horribly wretched couple, so I refurbished and renamed the entire place to give it a fresh start. I'm afraid that's where Gay Gardens comes from, named after my childhood idols, the Beales.\n\n\"After I spruced the place up I was terribly bored, so I went into 3V producing as a hobby. It turns out I had quite the knack for it, so it ended up being my escape from all the dreariness of wealth. And that's where the name GG comes from—I'm afraid I haven't told anyone my real name in ages. I don't suppose I ever will…\"\n\nYou shift on the sofa as GG rambles—he seems pretty nervous to be around you. Which makes sense, since you still don't know how you feel about GG. Jenny obviously trusts him, which is another thing you need to talk to her about. In private.\n\n*choice\n\t#\"I'm sorry, I need to talk to Jenny. Alone.\"\n\t\t*goto ggpp\n\t#\"Thank you so much for all this, GG. I wish we had more time to talk, but Jenny and I need to plan and the less you know, the safer it is for you.\"\n\t\t*goto ggpp\n\t#\"GG, could you get us some snacks? I'm starving.\"\n\t\t*goto ggpp\n\n*label ggpp\n\"Precious puppet, I'll be out of your hair in a flash. I know you two require a recap moment,\" GG says. \"But I'm afraid I had some selfish intentions inviting you here—I really do need to say my piece while I have the chance.\n\n\"I shan't drag it out, though lord knows how I could,\" GG starts, already catching himself. \"There's no denying it, I was indeed manipulating you to join the Populars on The Hero Project. But I was only doing so because I believed it was what was best for you—my job was to steer you towards winning the show. And I'm sorry, I won't be apologizing for that.\n\n\"But you have to believe me when I say that I had no idea of Rexford's true intentions as a Meek Secret Apostle. I suppose I should have, given my level of access, but I didn't. And you need to understand that, had I known, I would have put a stop to it,\" GG says. \"I know that's easy for me to say now, but I hope I'm proving it to you by risking my life and home to protect you today.\"\n\nGG blinks back tears, gripping the handlebars of his people-mover. You sigh, knowing that now is the time for you to settle things with GG, once and for all.\n\n*choice\n\t#I believe GG. And I forgive him.\n\t\t*set ggfinaleally true\n\t\t*set soloist %-20\n\n\t\t*label gghappyclam\n\t\tYou tell GG exactly this and you think he might explode from joy, judging by the smile that stretches across his face.\n\n\t\t\"Then that is all there is to say on the matter,\" GG manages. \"Except that I shall continue to help you in any way possible, now and forevermore.\"\n\t\t*goto jenntalktime\n\t#I don't believe GG is innocent in this at all, but after doing this for me today, I forgive him.\n\t\t*set ggfinaleally true\n\t\t*set soloist %-30\n\t\t*goto gghappyclam\n\t#I believe GG's story, but he's still responsible for his actions. Knowing that, I can't trust him now.\n\t\t*set soloist %+20\n\t\t*label ggunderstands\n\t\t*set ggbroach true\n\t\t*set powerregain +2\n\n\t\tYou tell GG exactly this, and from the frown that stretches across his face, you think he might deflate from the disappointment.\n\n\t\t\"I understand, I suppose,\" GG manages. \"All the same, I wanted you to have this.\"\n\n\t\tGG rolls towards you, handing you an ancient looking brooch in the shape of a cross.\n\n\t\t\"It's an old family heirloom,\" GG explains. \"My grandparents made their fortune developing MeChip Power boosting technology; this is an early model booster. If you wear it, it should help you earn some points towards regaining your Powers.\"\n\n\t\t\"GG, isn't that…\" Jenny starts, staring at the brooch in your hand. \"Well, aren't those early artifacts worth a fortune?\"\n\n\t\t\"Indeed they are,\" GG sighs. \"But you see, I don't lack fortunes, dear. I lack friends.\"\n\n\t\tAs the room falls silent, you feel you should say something. But you've said all you need to.\n\n\t\tSo instead, you pin the brooch to your costume, hoping that's enough to make GG feel at ease.\n\t\t*goto jenntalktime\n\t#I don't believe GG's story, I don't forgive him for what he did, and I certainly don't trust him. \n\t\t*set soloist %+30\n\t\t*goto ggunderstands\n\n*label jenntalktime\n*page_break\n\n\"Right then, I've taken enough of your time,\" GG says, rolling towards the door. \"Off to check on Prodigal I go.\"\n\nOnce GG exits, you turn to talk to Jenny, but she starts speaking before you can.\n\n\"I already know what questions you're going to ask, so here are the short answers,\" she says. \"I was able to find you through a secret DRPR MeChip tracker app, one that only I have access to as your case agent.\"\n\nYou're about to protest to this secret tracker, but Jenny doesn't give you the chance.\n\n\"I had it installed a while back when it became standard protocol, but I haven't had to turn it on. Don't worry, once I got your location I deactivated the tracker and told the DRPR you had gone AWOL,\" Jenny explains. \"Though that didn't do much good, given the racket you made with that fight at the Meek headquarters.\n\n\"Anyway,\" Jenny continues, \"I was checking on Grandma ${familyname} before coming to find you, otherwise I'd have been there sooner.\"\n\n\"Did you install a secret tracking app in her MeChip too?\" you ask, the edge in your voice unhidden.\n\n*page_b
