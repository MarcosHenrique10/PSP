perfectly\n\n*label playedperfectly\n\n\"You played your part perfectly,\" Judge Victon says, pointing towards a nearby hoverjet. \"Now you get to disappear. Forever.\"\n\nSweet. Slugger. \n\nIt's true. Miss Artillery really did fake her death at your parents' hands. And it was arranged by Victon himself.\n\n*page_break\n\nBefore you can even process what you've just seen, Prodigal shrieks even louder and the stolen memory is torn to pieces. \n\nYou are tugged backwards through the submarine and into a vast office loft, one that overlooks a crystal-blue ocean. On the walls you see several Infinity Regulator prototypes with green and gold seals, so you figure you must be at some Meek HQ. Or rather, that's where Prodigal's memory is located.\n\n\"I've followed this long and winding road all the way here, mother darling.\" \n\nYou hear Prodigal's voice and spot her standing in front of a giant holo-file cabinet.\n\n\"You had better be alive, you beautiful nightmare.\"\n\n*page_break\n\nProdigal takes a deep breath and opens a file drawer marked [i]Operation Artillery[/i] and pulls out a holo-file that displays a picture of Miss Artillery, looking much older than you just saw her…and with a time stamp in the bottom right corner dated earlier this year. \n\nWith tears in her eyes, Prodigal goes to open another holo-image marked [i]Prisoner Transfer Location[/i], but the file begins to self-destruct.\n\n[i]Slugger[/i], you think as you are sent flying once again, [i]how many explosions can one mind contain[/i]?\n\n*page_break\n\n\"Time to go back to Millennia City and find our old friend, ${firstname}.\"\n\nYou hear Prodigal's voice, but you can't see her. There's only blackness and an incredible, unbreakable feeling of connection to you, to ${firstname} ${familyname}, to ${codename}. Somehow you are both the question and the answer. \n\nYou can tell the feeling isn't yours, that you're both within and without, but it's very hard to keep anything clear in here…\n\nThen the darkness lifts and you wish it hadn't, because you see ${reportername} in front of you, solid, and stuck to a giant, silvery spider web. You move to help her, but realize your limbs are stuck too…\n\nThen you can sense it behind you, the shadow of its eight massive legs falling across your body. The smell of rotting carcasses fills your nostrils and you just know it, you know the mindspider is ready to devour you.\n\n\"The passssssword,\" it hisses, like a snake, so close you can feel its breath on your neck. You resist the urge to scream or vomit and instead you rack your brain for the one word that might save you:\n\n*choice\n\t#\"Eat me.\"\n\t\t\"If that's what you wantttt,\" the mindspider hisses. \n\n\t\tAnd you scream.\n\n\t\t*page_break\n\n\t\tAs you feel fangs close around your neck, you suddenly begin to minddrop through a dark pit, pain riddling your body as you fall.\n\n\t\tWhen you land, you're back in Prodigal's landwrecked submarine, starting from the beginning of the memory tour as if nothing ever happened. \n\n\t\tIt looks like you're going to have to do a better job of navigating Prodigal's mind if you ever want to escape this winding memory maze….\n\t\t*page_break\n\t\t*set missileseq false\n\t\t*set hqseq false\n\t\t*set pterryseq false\n\t\t*set prpbonthree true\n\t\t*goto memoryscape\n\t#\"Intertwined.\"\n\t\t*goto wakeup\n\t#\"Bronwin.\"\n\t\t*goto wakeup\n\t#\"Explosion.\"\n\t\t\"If that's what you wantttt,\" the mindspider hisses. \n\n\t\tSuddenly you feel the web blow apart and you begin to mindfly back through Prodigal's memories. \n\n\t\tIt looks like you're going to have to do a better job of navigating Prodigal's mind if you ever want to escape this winding memory maze….\n\t\t*page_break\n\t\t*set prpbonthree true\n\t\t*goto explosionrocks\n\t#\"Dampen.\"\n\t\t*goto wakeup\n\t#\"Artillery.\"\n\t\t\"If that's what you wantttt,\" the mindspider hisses. \n\n\t\tAs you feel fangs close around your neck, you suddenly begin to minddrop through a dark pit, pain riddling your body as you fall.\n\n\t\tWhen you land, you're back at Victon and Artillery's meeting, starting from the beginning of that memory as if nothing ever happened. \n\n\t\tIt looks like you're going to have to do a better job of navigating Prodigal's mind if you ever want to escape this winding memory maze….\n\t\t*page_break\n\t\t*set prpbonthree true\n\t\t*goto artillerymeeting\n\t*if (prpbonthree) #\"I demand a Power bonus.\"\n\t\t*set powerregain +4\n\t\t*achieve bonuspower\n\n\t\t\"You wish is my command,\" the mindspider hisses. \n\n\t\tAs you feel fangs close around your neck, you suddenly begin to minddrop through a dark pit, pain riddling your body as you fall. But it's a cleansing pain, like a bone being reset or a cavity being filled.\n\n\t\tAnd somehow, you can feel your lost Powers returning just a bit faster. \n\n\t\tIt looks like you may have unlocked a special bonus here, one you may not have stumbled upon unless you had gotten a little lost.\n\n\t\tIsn't that always the way?\n\t\t*page_break\n\t\t*goto wakeup\n\n*label wakeup\n\nYou open your eyes and brace for the worst, especially when you hear ${reportername} screaming beside you. Then your eyes adjust and you realize that you're back in the real world, inside Prodigal's Fringe lair. You never thought you'd be so excited to be back here—though you suppose you never did really leave, at least not physically.\n\n\"You…crazy…\" ${reportername} gasps. \"Could have died…I…never…\"\n\nYou look from ${reportername} to Prodigal and find her sitting there with a blank expression, tears sliding down her cheeks and blood running out of her nose. \n\n\"I need a…transitional moment,\" Prodigal whispers, standing up and walking towards the corner, where Terry still sleeps in her cage. Prodigal starts to stroke Terry through the bars, choking back what sound like sobs.\n\n\"What the slugger was that?\" you whisper as you turn to ${reportername}, not sure what else to ask.\n\n*page_break\n\n\"Simply put? That was Prodigal's mind,\" ${reportername} sighs, her breathing slowly returning to normal. \"I'm inclined to be furious with her, but I don't think she knew how hostile her mind would seem to us. Everyone's brain functions differently—there's no way to predict how someone else's thoughts will work.\"\n\n\"Wait, do you mean that's how Prodigal always experiences her thoughts?\" you ask.\n\n\"I don't know,\" ${reportername} tries. \"I know very little of this makes any sense, but maybe it's not supposed to. Powered people are able to do things never possible before, so who knows the science behind any of this. But the best I can tell, what Prodigal just experienced is kind of like being in a dream. Everything in the dream makes perfect sense, until the moment you wake up. I think, maybe, seeing her mind from our outside perspective like that…\"\n\n${reportername} pauses, looking deeply haunted.\n\n\"I think maybe she just woke up a little.\"\n\n*page_break\n\n\"To be honest, I could be talking nonsense,\" ${reportername} goes on. \"I've rarely been that deep inside anyone else's mind. I usually only have to skim the surface to find what I need—there's no room to lie or fabricate when I enter someone's mind, it's all raw memory and truth.\" \n\nA chill runs up your spine at the thought of what your own mind might look like, invaded and analyzed like that. Would you be able to handle what you saw in there, unfiltered and laid totally bare in front of strangers? With no room to lie to yourself, no shred of denial or rationalization, what would you find?\n\n\"I almost feel bad for her, if that were ever possible,\" ${reportername} continues. \"What Prodigal has been through, her childhood, her incredible Power—she obviously has a very hard time connecting to reality. Though you seem to be a rather strong tether for her.\"\n\n${reportername} raises an eyebrow as she says this. All you can think is:\n\n*choice\n\t#I felt firsthand how deeply connected Prodigal feels to me. Her obsession makes a bit more sense now.\n\t\t*set rlshp_prodigal %+5\n\t\t*goto highlyunpleasant\n\t#Prodigal has been driven crazy by her terrible life.\n\t\t*set rlshp_prodigal %+5\n\t\t*goto highlyunpleasant\n\t#I'm even more convinced now that Prodigal is insane. And insanely dangerous.\n\t\t*set rlshp_prodigal %-10\n\t\t*goto highlyunpleasant \n\t#Whatever her intentions, Prodigal's unpredictability is a major liability.\n\t\t*set rlshp_prodigal %-5\n\t\t*goto highlyunpleasant\n\t#I feel a bond to Prodigal, one that might have always been there.\n\t\t*set rlshp_prodigal %+10\n\t\t*goto highlyunpleasant\n\t*if (prodromanceposs) #The bond I feel to Prodigal might be more than just one of friendship.\n\t\t*set rlshp_prodigal %+10\n\t\t*goto highlyunpleasant\n\n*label highlyunpleasant\n\n\"I know that was highly unpleasant for everyone,\" Prodigal says, walking back towards you and ${reportername}. She holds Terry in her arms and the pterrot wheezes through sleep like she's barely alive. \"But now do you believe me?\"\n\nYou look to ${reportername} and she nods at you. You have now seen proof that Miss Artillery not only faked her death at the hands of your parents, but that she also might even still be alive.\n\n\"Now you know everything I do,\" Prodigal continues. \"I believe that despite whatever deal Victon made with my mother all those years ago, she was subsequently taken against her will and held captive.\"\n\nYou look away from Prodigal—of course that's what she wants to believe. Because if Miss Artillery left willingly, that would mean she truly abandoned Prodigal all these years, leaving her to fend for herself.\n\n\"I know what you're thinking,\" Prodigal snaps. \"But lest we forget, I'm not the only poor little orphan in this room. Besides, we all saw that holo-file in the Artillery folder before it self-destructed. [i]Prisoner Transfer Location[/i]. Whether or not Miss Artillery left willingly back then, it sure seems like she's being held against her will now.\"\n\n\"Fine. But if they have her, why haven't they just killed her?\" ${reportername} cuts in. \"She's too much of a liability to Victon to be kept alive.\"\n\nThat drops a beat of silence into the room, because ${reportername} is very right.\n\n*page_break\n\n\"I've been asking myself that same question,\" Prodigal says. \"The only reason I can think of is that they're somehow unable to kill her. I think it's possible that my mother's death-illusion Powers keep protecting her, that she can't ever be murdered by external causes. That would certainly explain whatever 'research' they're doing in Operation Artillery.\"\n\n\"If that's the case,\" you say, \"then the fact that Victon and The Meek now have weaponized Power dampeners is a very bad thing.\"\n\n\"Hence my sense of urgency,\" Prodigal says. \"They've only developed a way to dampen Infini Powers, not yet normal Powers. But as we've all seen now, they're getting close.\"\n\n\"Well, we can't know for sure the reason they're holding Miss Artillery or what their plans are,\" you say. \"But we do know she was alive not too long ago, which means there's a good chance she's still alive now. So we need to either find her or find some concrete evidence she faked her death quickly, before Victon has a chance to kill our parents. So how do we do that?\"\n\n\"Oh my, that set of conclusions sounds mighty familiar, does it not?\" Prodigal chides, rolling her eyes. \"Once again, I'm ahead of the curve. You floaties probably couldn't see up close, but I did manage to get a gander at the Prisoner Transfer Location before the holo-file burst.\"\n\n*page_break\n\n\"Where was it?\" you ask, when Prodigal doesn't continue.\n\n\"I'll tell you when you need to know,\" Prodigal says. \"In particular, once ${reportername} leaves. She shouldn't know where we're headed, just in case she decides to sneak some cold revenge, or, even more likely, gets herself kidnapped by our enemies. Plus, what's to stop you from ditching me the moment I tell you, ${firstname}? No, we need to do this together.\"\n\n\"And why is that?\" you ask.\n\n\"I have my reasons,\" Prodigal mutters, turning away. \n\nProdigal makes a valid point about ${reportername}, but why do you think she seems to need you so badly? Prodigal definitely could have gone about finding her mother without you, but she has gone out of her way to loop you in. \n\nYou don't have the time to waste pressing Prodigal on the issue and enduring whatever half-baked monologue she'd create, so you're going to have to operate on instinct for now. \n\nHowever, as best you can tell, you think Prodigal needs you because:\n\n*choice\n\t#She obviously feels that we're connected and it is part of our destinies to work together. \n\t\t*label needsyouhere\n\t\tTrying to apply rational thought to Prodigal's motivations would be a monumental waste of time. For now, she clearly wants you here, which is a very good thing. Because Prodigal currently holds all the cards—she could ditch you or kill you anytime, if she wants. \n\n\t\tSo you'll have to play by some of her rules, until you can gain the upper hand. Until then, the fact that Prodigal feels she needs you is very good temporary protection.\n\t\t*goto motivation\n\t#The reason doesn't matter—if Prodigal thinks she needs me, she won't hurt me.\n\t\t*goto needsyouhere\n\t#I get the sense that Prodigal is still hiding another reason she needs me. \n\t\tThere's still something Prodigal is hiding, you can can feel it in your bones. \n\n\t\tBut for now, Prodigal clearly wants you here, which is a very good thing. Because Prodigal currently holds all the cards—she could ditch you or kill you anytime, if she wants. \n\n\t\tSo you'll have to play by some of her rules until you can figure out the real reason Prodigal recruited you. Until then, the fact that Prodigal feels she needs you is very good temporary protection.\n\t\t*goto motivation\n\t#Who cares? Demand that Prodigal tell me where Miss Artillery is.\n\t\t\"Don't mistake the amount of leverage you have here, ${firstname},\" Prodigal responds. \"I could easily leave you here and do this all myself. Or I could just kill you with a snap of my fingers. You're involved only because I want you to be. So don't test my limits, darling.\"\n\n\t\tSlugger. As much as you hate to admit it, Prodigal is right. It looks like you're going to have to play by her rules until you can gain the upper hand. At least until then, knowing Prodigal feels she needs you is very good temporary protection.\n\t\t*goto motivation\n\n*label motivation\n\nAnd if you really think about it, Prodigal's motivations don't truly matter. What's much more important is that, right now, it's in your best interest to team up with Prodigal. That's because: \n\n*choice\n\t#All evidence of President Victon's deal has been destroyed, so I have to find Miss Artillery herself. And Prodigal is the only one who knows how to do that fast enough.\n\t\t*set freedom %-15\n\t\t*set revenge %-15\n\t\t*set soloist %-10\n\t\t*label progialskillz\n\n\t\tYou might be able to work it all out on your own with some time and your Powers back, but with your parents' execution looming, your Powerless status, and an entire nation hunting you, time is a luxury you do not have. \n\n\t\tUnfortunately, Prodigal has the gathered intelligence and the perfect Power set to see you through this as quickly as possible.\n\t\t*goto reconcileprodigal\n\t#I really want to go after the Victons or bust my parents out of the Devoid, but doing that on my own would be a suicide mission, especially without my Powers.\n\t\t*set lawless %+15\n\t\t*set fame %-15\n\t\t*set soloist %+15\n\t\t*set offensive %+15\n\t\t*set revenge %+15\n\t\t*set freedom %+15\n\n\t\tUnfortunately, finding Miss Artillery quickly is your only viable option.\n\n\t\t*goto progialskillz\n\t#Looping in any of my allies would be insanely dangerous for them—the fact that Prodigal is expendable might be a very good thing.\n\t\t*set soloist %-15\n\t\t*set revenge %+15\n\t\t*set freedom %+15\n\n\t\tYou might be able to accomplish this task in time with the help of your allies, but asking them to do so would be incredibly dangerous and selfish. The fact that you don't care what happens to Prodigal might actually make her the best ally possible in this deadly scenario. \n\n\t\tIt also doesn't hurt that Prodigal has the gathered intelligence and the perfect Power set to see you through this as quickly as possible.\n\t\t*goto reconcileprodigal\n\t#It's just best to keep my enemies closer.\n\t\t*set soloist %+15\n\t\t*set offensive %-15\n\t\t*set revenge %+15\n\t\t*set freedom %-15\n\t\tThere are so many factors at play here, keeping Prodigal under your nose instead of scheming out there her own is going to be your best bet to keep this situation under control.\n\n\t\tBesides, Prodigal has the gathered intelligence and the perfect Power set to see you through this as quickly as possible.\n\t\t*goto reconcileprodigal\n\n*label reconcileprodigal\n*page_break\n\nSo you know you have to work with Prodigal right now. Which leaves you asking yourself one very important question: how are you possibly going to reconcile teaming up with your once-greatest enemy?\n\nYou know that very soon you're probably going to find yourself in a situation under immense pressure and without any time to think, so deciding what you want to do now will most definitely affect how you act later.\n\n*label prodigalworkchoice\n*choice\n\t*if (sanders) \n\t\t*hide_reuse #Before I decide, confront Prodigal about tipping off the police.\n\t\t\t\"Officer Sanders told me you were the one to call the police at the lakeside safe house,\" you say, your eyes set directly on Prodigal. \"I'm going to need some kind of explanation if we're going to—\"\n\n\t\t\t\"Oh, save the sanctimonious posturing,\" Prodigal whines. \"I did what I had to do to get us here. Would you have ever given me the chance to prove myself to you, otherwise?\"\n\n\t\t\t\"You thought the best way to gain my trust was to arrange a police ambush on my home?\" you nearly scream.\n\n\t\t\t\"Well, it worked, didn't it?\" Prodigal seethes. \"As you now realize, we don't have any time to waste. I did what I had to do to get you on board.\"\n\n\t\t\tYou want to come back at Prodigal with the dozens of reasons that calling the police was insane, but then you realize you're talking to an insane person. Prodigal is right about one thing, though: you don't have any time to waste, especially not arguing with her.\n\n\t\t\tSo now that you know Prodigal is still up to her old tricks, you need to make your decision about how to handle her in the future. \n\t\t\t*goto prodigalworkchoice\n\t#I'm going to fully accept Prodigal as an ally. \n\t\t*set rlshp_prodigal %+25\n\t\t*set soloist %-20\n\t\t*set revenge %-20\n\t\t*set prodigalallythree true\n\t\t\n\t\tIt's the only way you know to operate. And with stakes this high, any enemy of Victon has to be your friend. \n\t\t*goto rathercozy\n\t#I'm going to work with Prodigal, but make sure to sleep with one eye open. I won't make the mistake of trusting her.\n\t\t*set rlshp_prodigal %+5\n\t\t*set soloist %-5\n\t\t*set offensive %-10\n\t\t*set revenge %-10\n\t\t*set prodigalmistrustthree true\n\t\t\n\t\tYou're going to heed Grandma's warning. You'll never forget who Prodigal truly is or what she has done to you.\n\t\t*goto rathercozy\n\t#I'm going to use Prodigal to get the information I need, then I'm going to ditch her.\n\t\t*set rlshp_prodigal %-15\n\t\t*set soloist %+15\n\t\t*set revenge %+10\n\t\t*set prodigalditchthree true\n\t\n\t\tYou may need Prodigal for her information and her assistance right now, but the moment you decide that's no longer the case, you will ditch her.\n\t\t*goto rathercozy\n\t#I'm going to use Prodigal to get the information I need, then I'm going to turn her in to the police.\n\t\t*set rlshp_prodigal %-20\n\t\t*set lawless %-25\n\t\t*set revenge %+10\n\t\t*set prodigalturninthree true\n\n\t\tYou may need Prodigal for her information and her assistance right now, but the moment you decide that's no longer the case, you will put her where she belongs: behind bars. \n\n\t\tMaybe doing so will buy you some much-needed good will with the police, moving forward.\n\t\t*goto rathercozy\n\t#I'm going to use Prodigal to get the information I need, then I'm going to kill her.\n\t\t*set rlshp_prodigal %-25\n\t\t*set lawless %+25\n\t\t*set revenge %+25\n\t\t*set prodigalkillthree true\n\n\t\tYou may need Prodigal for her information and her assistance right now, but the moment you decide that she's expendable, you will kill Prodigal. \n\n\t\t*if kill_prodigal\n\t\t\tFor real, this time. \n\t\t\t*goto rathercozy\n\t\t*else\n\t\t\tPrisons can't hold her? Then you'll find a more permanent solution.\n\t\t\t*goto rathercozy\n\t*if (prodromanceposs) #I'm going to start letting Prodigal in, because I'm actually developing feelings for her.\n\t\t*set rlshp_prodigal %+25\n\t\t*set soloist %-20\n\t\t*set revenge %-20\n\t\t*set prodromancewant true\n\t\t*set prodigalromancethree true\n\t\n\t\tIt may sound insane, but after entering Prodigal's mind and seeing this new side of her, you're beginning to feel that she truly is a kindred spirit, in so many ways.\n\n\t\t*if luckyfeelings\n\t\t\tThough then you think of Lucky, still lying in that coma, and immediately feel conflicted. \n\n\t\t\tNot having the emotional energy to deal with that thought right now, you bury these feelings. \n\t\t\t*goto rathercozy\n\t\t*elseif bm_reconcile\n\t\t\tThough then you think of Black Magic, still lying in that coma, and immediately feel conflicted. \n\n\t\t\tNot having the emotional energy to deal with that thought right now, you bury these feelings. \n\t\t\t*goto rathercozy\n\t\t*elseif jennyfeelings\n\t\t\tThough then you think of Jenny and immediately feel conflicted. \n\n\t\t\tNot having the emotional energy to deal with that thought right now, you bury these feelings. \n\t\t\t*goto rathercozy\n\t\t*else\n\t\t\tThough you imagine that mostly everyone in your life, especially ${reportername}, would have a serious problem with this. \n\n\t\t\tNot having the emotional energy to deal with that thought right now, you bury these feelings. \n\t\t\t*goto rathercozy\n\n*label rathercozy\n*page_break\n\n\"This is all rather scintillating,\" ${reportername} finally says, breaking the silence. \"But I'd like to get the slugger out of here. Now.\"\n\n\"Yes, quite right,\" Prodigal says, walking towards her Telelock drawer. \"You played your part rather nicely, Ms. Challa.\"\n\n\"And I'm not done playing it yet,\" ${reportername} says. \"Before I go, I want to have a word with ${firstname}. Alone.\"\n\n${reportername} stares down an indignant Prodigal, letting her know she means business.\n\n\"Fine. I'll see to Terry in the bathroom, then,\" Prodigal huffs, stomping towards the only door in the room. She disappears inside with Terry and once she does, ${reportername} turns to you.\n\n\"You know this is her lair, right?\" you start. \"She can probably still hear—\"\n\n\"I know, it doesn't matter,\" ${reportername} sighs. \"This will just go faster without her constant rambling.\"\n\n*page_break\n\n*if choose_reporter\n\t\"Since the Death Wave, I've devoted my life to building a reporting career that really matters. No offense, but reporting about you supermorons was only ever a means to an end,\" Sonja explains. \n\n\tYou open your mouth to respond, but Sonja just keeps going, talking as fast as ever, nearly jumbling her words together.\n\n\t\"I've spent months trying to expose the truth about The Meek movement without much luck—they've got their stuff locked up tight. But what's going on right here, this mission you and lady crazy are tackling, it could be the bullet that kills the entire organization. Not to mention that President Victon's fraud might be the biggest story of the century. So I'm going to help you get where you need to go, because the moment you find Miss Artillery, I'm going to be the reporter to break the story. We clear?\"\n\n\t\"And here I thought you'd help because it's the right thing to do,\" you say. \"Or because you might actually like me.\"\n\n\t\"My motivations don't need to be mutually exclusive,\" Sonja cracks. \"Now here, give me your wrist.\"\n\t*goto recalibrationnation\n*else\n\t\"Since Sonja was murdered, I've devoted my life to a cause that was very important to her: reporting the truth about The Meek movement. I've spent months trying to expose the truth about them without much luck—they've got their secrets locked up tight,\" Juhi says, talking as fast as her sister used to, her words nearly jumbling together. \n\n\t\"But what's going on right here, this mission you and Prodigal are tackling, it could be the bullet that kills the entire organization. Not to mention that President Victon's fraud might be the biggest story of the century. So I'm going to help you get where you need to go, because the moment you find Miss Artillery, I'm going to be the reporter to break the story.\"\n\n\t\"That's fine,\" you answer. \n\n\t\"Good,\" Juhi finishes. \"Lastly, I need you to know I am not doing this for you, or because I forgive you in any way. Are we clear?\"\n\n\t\"Crystal,\" you say, because you don't really have the time to get into it with Juhi right now. Besides, you need all the help you can get, no matter what the reason.\n\n\t\"Stupendous,\" Juhi sighs. \"Now here, give me your wrist.\"\n\t*goto recalibrationnation\n\n*label recalibrationnation\n*page_break\n\n\"We need to upgrade the anti-tracking functions on your MeChip,\" ${reportername} says as she fiddles with the MeChip in your wrist. \"You have a decent security package, but it won't be enough. I need to take your MeChip into shadow territory.\"\n\n\"Can you do th—\"\n\n\"Of course I can,\" ${reportername} interrupts. \"I'm one of the world's finest undercover reporters. The only person who has ever been able to find me when I wanted to stay hidden is standing in that bathroom with a pet dinosaur.\"\n\n${reportername} takes a rare pause to sigh, then continues rapid-firing her words. \"Anyway, this should keep your MeChip signature untraceable. I've also established a secure, encrypted line to my MeChip so you and I can communicate, but you should not use your MeChip for any other communications or transactional functions.\"\n\n\"Not even spending money?\" you ask, wondering how you'll manage that.\n\n\"Especially not, since it's one of the easiest tracking methods,\" ${reportername} explains. \"But I have an idea about how to put your bank account to good use.\"\n\n*page_break FIVE MINUTES LATER\n\n\"So, what do you think?\"\n\n${reportername} has just walked you through a report on your updated image and the latest national sentiment since President Victon's announcement and the police raid. \n\n*if (antipoweredsent \u003c= 50)\n\t*set antipoweredsent 20\n\t*goto legendrecal\n*elseif (antipoweredsent \u003c= 75) and (antipoweredsent >= 51)\n\t*set antipoweredsent 40\n\t*goto legendrecal\n*else\n\t*set antipoweredsent 60\n\t*goto legendrecal\n\n*label legendrecal\n\n*if (legend \u003c 0)\n\t*goto rdpreport\n*if (legend \u003c= 30) and (legend >= 0)\n\t*set legend 0\n\t*goto rdpreport\n*elseif (legend \u003c= 60) and (legend >= 31)\n\t*set legend 25\n\t*goto rdpreport\n*else\n\t*set legend 50\n\t*goto rdpreport\n\n*label rdpreport\nFortunately, the combination has actually managed to lower anti-Powered sentiment to ${antipoweredsent}. It looks like President Victon's extreme tactics did not fully resonate with the nation. \n\nHowever, your own image suffered a blow, most likely because you were seen working with Prodigal. Your Legend dropped to ${legend}. This isn't ideal, but right now, your Legend Level is actually at the bottom of your list of concerns—you know you'll find a way to build it back up, just as you have time and time again over the course of your career.\n\nEspecially once you're able to tell the public the truth about Miss Artillery and the reason you're teaming up with Prodigal. Right now, doing so would only endanger the success of your mission by disclosing your motives to your enemies.\n\n*page_break\n*set regimedamagerevealed true\n\n${reportername} also generated a media trend report on the damage you've done to the Victon administration and The Meek movement since The Hero Project Finale. She summed it up by calculating something she named Regime Damage Points—the number of points reflects the image damage you've done to the Victon and Meek regime. Obviously, the more points you rack up, the more damage you inflict.\n\n*if (selloutjenny = false) and (conspiracygo) \n\t*set regimedamage +3\n\n\tSince you helped Jenny finish her investigation flawlessly, she was able to expose The Hero Project conspiracy and majorly tarnish the Victon and Meek regime.\n\t*goto totaltally\n*elseif (selloutjenny = false) and (conspiracygo = false) \n\t*set regimedamage +1\n\n\tSince you sacrificed your spot in the competition to protect Jenny, she was able to expose a bit of The Hero Project conspiracy and tarnish the Victon and Meek regime slightly.\n\t*goto totaltally\n*else\n\tUnfortunately, since you sold out Jenny by revealing her secret identity, she was unable to expose much of The Hero Project conspiracy or tarnish the Victon and Meek regime.\n\t*goto totaltally\n\n*label totaltally\nCombining that with \n*if (useprodigalescape) or (escapewithprodigal)\n\ta point loss for running from your fight with the police,\n\t*goto regimedamagetotal\n*elseif standwithprodigal\n\ta point gain for standing up to the police,\n\t*goto regimedamagetotal\n*else\n\ta point gain for the police betraying you after you tried to cooperate,\n\t*goto regimedamagetotal\n\n*label regimedamagetotal\nyou've tallied a Regime Damage Point Total of ${regimedamage}.\n\n${reportername} promised that you're sure to have many more opportunities to score Regime Damage Points over the course of your upcoming mission, especially since she'll be helping you rack them up by delivering any public announcements you want to send directly to the public. \n\nNow that you've become an Infini Powered icon, you have a platform and a following that will be looking to you for leadership. \n\n*page_break\n*label cancel_purchase\n\nSo far the public has seen that you’ve been subjected to huge plots, but now you’re going to show them that you're standing up for what you know is right and redefining your own rules. And ${reportername} will be putting her own life and reputation on the line to make sure your voice is truly heard.\n\nHer first suggestion to help you do so is to transfer money from your soon-to-be-frozen bank account to purchase some prominent ad space. Obviously, the more people your message reaches, the more Regime Damage Points you'll score. Sometimes, money truly is power.\n\nSo how much money do you want to transfer to ${reportername} to spend on the ad?\n\n*check_purchase adspace\n*choice\n\t*selectable_if (money >= 250000) #$250,000.\n\t\t*set regimedamage +6\n\t\t*set money -250000\n\t\t*label purchaseadsapce\n\n\t\t\"I'll purchase the ad space as soon as I leave this infernal hole,\" ${reportername} says, but you're distracted as MeChip ${chipname} pops up to approve the transfer. \n\n\t\tOnce you do approve it, ${reportername}'s MeChip, which is nothing more than a shadowy silhouette, slinks up to ${chipname} to retrieve the transfer.\n\n\t\t*goto officialmessagetime\n\t*selectable_if (money >= 150000) #$150,000.\n\t\t*set regimedamage +4\n\t\t*set money -150000\n\t\t*goto purchaseadsapce\n\t*selectable_if (money >= 100000) #$100,000.\n\t\t*set regimedamage +3\n\t\t*set money -100000\n\t\t*goto purchaseadsapce\n\t*selectable_if (money >= 50000) #$50,000.\n\t\t*set regimedamage +2\n\t\t*set money -50000\n\t\t*goto purchaseadsapce\n\t*selectable_if (money >= 10000) #$10,000.\n\t\t*set regimedamage +1\n\t\t*set money -10000\n\t\t*goto purchaseadsapce\n\t*if (choice_purchase_supported)\n\t\t*if (not(choice_purchased_adspace)) #Buy ad space as an In-App Purchase (Approximate Cost: $0.99)\n\t\t\t*check_purchase adspace\n\t\t\t*if choice_purchased_adspace\n\t\t\t\t*goto purchased_adspace_iap\n\t\t\t[i]Ad space is available for underfunded heroes as an in-app purchase. It will inflict four Regime Damage Points, worth $150,000 in in-game cash. After your purchase, you may unlock this option again the next time you play, at no additional charge.[/i]\n\n\t\t\t*purchase adspace $0.99 purchased_adspace_iap\n\t\t\t*page_break No, Thanks\n\t\t\t*goto cancel_purchase\n\t\t*if (choice_purchased_adspace) #I've already paid for the \"Ad Space\" upgrade. Unlock four Regime Damage Points again, at no additional charge.\n\t\t\t*label purchased_adspace_iap\n\n\t\t\t*set regimedamage +4\n\t\t\t*goto purchaseadsapce\n\t#Don't spend a single cent. I'm confident that my message will spread all on its own.\n\t\t*goto officialmessagetime\n\n*label officialmessagetime\n\"Now, what do you want your message to the public to say?\" ${reportername} asks.\n\nYou pause to consider your answer, but then realize you know exactly what you want to say:\n\n\"You all know what the ${familyname} name, and what the hero ${codename}, have always stood for. Today, I have two priorities.\"\n\n*choice\n\t#\"Saving my unjustly persecuted parents and making sure President Victon pays for his heinous crimes.\"\n\t\t*set freedom %-25\n\t\t*set revenge %+25\n\t\t*set fame %-25\n\t\t*goto encouragefollowers\n\t#\"Championing the kind of freedom that all Americans, Powered and unPowered, deserve. And making sure President Victon pays dearly for his heinous crimes.\"\n\t\t*set freedom %+25\n\t\t*set revenge %+25\n\t\t*set fame %-15\n\t\t*goto encouragefollowers\n\t#\"Saving my unjustly persecuted parents and standing against the discriminatory principles heralded by President Victon.\"\n\t\t*set freedom %-25\n\t\t*set revenge %-25\n\t\t*set fame %+15\n\t\t*goto encouragefollowers\n\t#\"Championing the kind of freedom that all Americans, Powered and unPowered, deserve. And standing against the discriminatory principles heralded by President Victon.\"\n\t\t*set freedom %+25\n\t\t*set revenge %-25\n\t\t*set fame %+25\n\t\t*goto encouragefollowers\n\n*label encouragefollowers\n\"In keeping with this stance, I encourage all those who share my vision to:\"\n\n*choice\n\t#\"Stand up for their rights peacefully.\"\n\t\t*set feared %-15\n\t\t*set offensive %-25\n\t\t*set lawless %-15\n\t\t*goto thatsreallyit\n\t#\"Follow my example and act on your beliefs.\"\n\t\t*set feared %-25\n\t\t*set offensive %-15\n\t\t*set lawless %+15\n\t\t*goto thatsreallyit\n\t#\"Help all Infini Powereds subjected to persecution.\"\n\t\t*set feared %-25\n\t\t*set soloist %-10\n\t\t*set lawless %-5\n\t\t*goto thatsreallyit\n\t#\"Rebel violently.\"\n\t\t*set feared %+25\n\t\t*set offensive %+25\n\t\t*set lawless %+15\n\t\t*goto thatsreallyit\n\t#\"Stand apart as proud Infini figures.\"\n\t\t*set feared %+25\n\t\t*set soloist %+10\n\t\t*set lawless %+5\n\t\t*goto thatsreallyit\n\t#\"Make your voice heard by speaking the ugly truth.\"\n\t\t*set feared %+15\n\t\t*set offensive %+15\n\t\t*set lawless %-15\n\t\t*goto thatsreallyit\n\n*label thatsreallyit\nYou finish speaking, knowing that there's no more you need to say. For now, at least.\n\n\"Consider the message sent,\" ${reportername} says, her eyes twitching back and forth as she takes her mental notes. \"Now…\"\n\n${reportername} is distracted as Prodigal reenters the lair with Terry in her arms. Terry is wrapped in a dirty towel and lies eerily still. Seeing this, ${reportername}'s jaw drops.\n\n\"Please tell me you did not just…\"\n\n\"Terry was suffering greatly,\" Prodigal says, her voice cold. \"And I don't know when I'll be able to come back to take care of her. So I put her out of her misery. Unless, of course, you would have offered to take her in?\"\n\n${reportername} is silent and so are you. Because for better or worse, you know this is Prodigal's idea of mercy.\n\n\"Don't presume you know what it is to be a stray, you uppity witch,\" Prodigal says, feeling the judgment thrown her way. \"Now let's see to your swift exit.\"\n\n*page_break FIFTEEN MINUTES LATER\n*set power 100\n*set health 100\n\nYou sit in the tiny bathroom, taking a few minutes to gather yourself while Prodigal \"lays Terry to rest,\" whatever that means. You perch on the toilet lid staring at the cellular burner phone in your hands. \n\nWhen you asked Prodigal if there was any way you could make a secure call, she handed you this: it's an older model from the days before they rolled out the MeChip. Prodigal says she rigged it to be untraceable and you believe her, though you assume she also must be able to listen in on every word, at the same time.\n\nIt doesn't matter, because you need to call Jenny.\n\nAll that's left is to decide what to say to her.\n*if selloutjenny\n\t*if savejennyinfini\n\t\tEspecially since when you saw her earlier today, Jenny had only barely begun to forgive you for selling her out in The Hero Project.\n\t\t*goto allthatsleft\n\t*else\n\t\tEspecially since when you saw her earlier today, Jenny made it very clear she doesn't want you in her life, after what you did.\n\t\t*goto allthatsleft\n*else\n\t*if jennyfeelings\n\t\tEspecially since when you saw her earlier today, you had your fist kiss.\n\t\t*goto allthatsleft\n\t*else\n\t\t*goto allthatsleft\n\n*label allthatsleft\n*page_break\n\n\"This had better not be who I think it is,\" Jenny's voice crackles over the cell phone. It's so strange to hear Jenny and not be able to see her. How did people ever carry on conversations like this?\n\n\"Jenny, it's me,\" you say. \n\n\"Have you lost your ever-slugging mind?\" Jenny hisses, obviously holding back a scream. \n\n\"I know what I'm doing seems crazy, but listen, you have to—\"\n\n\"No. I get a cryptic call from Grandma ${familyname} telling me to come over and when I get there, I find a police ambush and the news that you've both escaped with Prodigal? Crazy doesn't even begin to cover it! Where are you?\"\n\n\"I don't have time to explain, I don't know how secure this call really is,\" you start. \"But I need you to trust that I'm doing the right thing…\"\n\n*choice\n\t#\"Especially because I need you to find me and help me.\"\n\t\t*set soloist %+10\n\t\t*set askjennyfind true\n\n\t\tYou know it's selfish of you to ask Jenny this, considering the risks involved. You've asked Jenny for help before, but never on a mission this deadly and with such monumental consequences. Perhaps a true team player wouldn't ask this of anyone, but you need all the help you can get and Jenny is the only other person on the planet you'd trust to do that right now.\n\n\t\t*if selloutjenny\n\t\t\t*set rlshp_jenny %-15\n\t\t\tToo bad she doesn't feel the same way about trusting you, anymore.\n\n\t\t\t\"You've really got a pair, asking me that after what you've done,\" Jenny says. \n\t\t\t*goto parentletter\n\t\t*else\n\t\t\t*set rlshp_jenny %+5\n\t\t\t\"I'm on it,\" Jenny says.\n\n\t\t\t\"But how are you going to—\"\n\n\t\t\t\"I said I'm on it,\" Jenny interrupts. \"We need to hang up. Now.\"\n\t\t\t*goto parentletter\n\t#\"And I need you to make sure Grandma stays safe, no matter what.\"\n\t\t*set rlshp_grandma %+20\n\t\t*set rlshp_jenny %+15\n\t\t*set soloist %-25\n\t\t*set askjennygrandma true\n\n\t\t*if selloutjenny\n\t\t\t\"Fine,\" Jenny says. \"But don't call me again.\"\n\t\t\t*goto parentletter\n\t\t*else\n\t\t\t\"I'm on it,\" Jenny says.\n\n\t\t\t\"But how are you going to—\"\n\n\t\t\t\"I said I'm on it,\" Jenny interrupts. \"We need to hang up. Now.\"\n\t\t\t*goto parentletter\n\t#\"Please don't try to find me, I don't want you risking your life again.\"\n\t\t*set soloist %-15\n\t\t*set rlshp_jenny %+15\n\t\t*set askjennystayaway true\n\n\t\t*if selloutjenny\n\t\t\t\"Fine by me,\" Jenny says. \"While we're at it, don't call me again.\"\n\t\t\t*goto parentletter\n\t\t*else\n\t\t\tYou hang up before Jenny has a chance to argue with you. \n\n\t\t\tIt may be harsh, but you know it would be selfish of you to ask Jenny to help you, considering the risks involved. A true team player wouldn't ask that of anyone.\n\t\t\t*page_break\n\t\t\t*goto trueparentletter\n\t#\"And I need you to find out everything you can about what Prodigal has been up to the past six months.\"\n\t\t*set soloist %+5\n\t\t*set askjennyresearch true\n\n\t\t*if selloutjenny\n\t\t\t*set rlshp_jenny %-15\n\t\t\t\"You've really got a pair, asking me that after what you've done,\" Jenny says. \n\t\t\t*goto parentletter\n\t\t*else\n\t\t\t\"I'm on it,\" Jenny says.\n\n\t\t\t\"But how are you going to—\"\n\n\t\t\t\"I said I'm on it,\" Jenny interrupts. \"We need to hang up. Now.\"\n\t\t\t*goto parentletter\n\n*label parentletter\n\nYou're about to respond, but you hear the line click as Jenny hangs up.\n\nSlugger.\n\n*page_break\n\nYou know it would be a waste of time to try and call Jenny back, so all you can do is hope she does what you ask, now.\n\n*label trueparentletter\n\nTaking a deep breath, you lean back against the wall. So much has happened, so quickly. You haven't had a spare second to try and gather your thoughts—you've been acting purely on instinct, without any time to stop and think.\n\nSo you take a moment to read over the letter from your parents that Grandma managed to slip you, figuring that nothing else will help more to ground you and remind you what you're fighting for.\n\nHolding the letter in your hands, you scan the words, knowing that your favorite part has to be:\n\n*choice\n\t#[i]How does it feel to finally fly higher than you ever thought possible?[/i]\n\t\t*goto dothisforthem\n\t#[i]You'll always be our little ${flykid}.[/i]\n\t\t*goto dothisforthem\n\t#[i]This is not the life we had hoped for ourselves, but to see you doing such incredible things, it somehow makes it all worthwhile.[/i]\n\t\t*goto dothisforthem\n\t#[i]${firstname}, we have to start this letter by saying one thing first—we are so proud of you. And we know you did the right thing.[/i]\n\t\t*goto dothisforthem\n\t#My parents' signoff: [i]${ring_lyric}, Mom & Dad.[/i]\n\t\t*goto dothisforthem\n\n*label dothisforthem\nReading this over, you know that you have to do this for your parents, no matter the cost to your career as a hero. You have to save them. \n\nBecause if you don't, this could be the last you hear from them. Ever.\n\n*page_break\n\nThe odds are stacked against you: President Victon has placed a reward on you and Prodigal, so every bounty hunter, law enforcement agent, mercenary, hero, villain, and government agency will be looking for you to cash in. Not to mention that you have limited use of your Powers, are working with a madwoman, and have a very real ticking clock on your parents' execution.\n\nUnder these conditions, how will you navigate a hostile nation in time to save your parents and topple a president?\n\nDespite these overwhelming odds, you're going to have to find a way. \n\nBecause you don't have any other choice.\n\n*page_break\n\nWith that thought in mind, you place the letter in your pocket and step back into the lair to find Prodigal sitting in a massive swivel chair, legs crossed and waiting for you. \n\n\"Seriously, do you practice ways to be creepy?\" you ask, nearly jumping as you see her.\n\n\"What can I say? It's a gift,\" Prodigal says, springing to her feet. \"All-righty-roo, now that we're alone, I can finally tell you the secret location where Miss Artillery is being kept!\"\n\nYou pause, because you thought it was going to be much tougher to get that information out of Prodigal. You remain silent, hoping she'll just roll right into this very-important intel.\n\n\"Blessed be The Meek, for they shall inherit the earth,\" Prodigal hums. And as she does, your blood runs cold.\n\n\"Wait, are you saying that—\"\n\n*page_break\n\n\"Indeedily doo, The Meek are holding mother darling hostage,\" Prodigal finishes for you. \"On none other than the Blessed Vessel, the newly-created Meek movement independent nation, which is located on a giant mobile cruise ship that moves around the American coastline.\"\n\nAs Prodigal finishes her florid announcement with one final twirl, all you can think is: [i]Slugging perfect[/i].\n\nNow you can add breaking into the most remote, secure, and anti-Powered hub on the planet to your list of impossible tasks.\n\n[i]Great[/i], you think: [i]Bring. It. On.[/i]\n\n*finish Part Two: Enemy Lines\n", "chap_twelve": "*comment é\n\n*text_image chap_12.png center Aftershockers\n\n*set power 100\n*set health 100\n\n[b]SIX MONTHS LATER[/b]\n\nYou sit on a ledge high above Millennia City, looking down at the bustling metropolis, feeling its energy invigorate and calm you at once. This is where you've always felt most yourself, above the fray, yet ready to join in at any moment.\n\nThough right now you settle in to re-read the holo-galley that ${reportername} had her publisher send you. Her book is set to release tomorrow, so you wanted to review it one last time before the inevitable media storm kicks up.\n\nYou look over the glossy cover, which reads in big, bold letters: \n\n[b]HERORISE, HEROFALL[/b]\n*line_break\n[i]The Unrevealed Story of Three Families That Changed A Nation[/i]\n*line_break\n[i]By ${reportername} Challa[/i]\n\n*page_break\n\n${reportername} wrote the book in record time, documenting the scandal that ran from decades ago until today. The book draws from ${reportername}'s own research, from interviews with your family and the Victons, and from the now-famous psychic-investigation of President Victon.\n\n*if (regimedamage > 15)\n\t${reportername} claims she uncovered quite a bit more thanks to the unfettered access granted her after all the Regime Damage Points you two were able to rack up.\n\t*goto thebookreviewearly\n*else\n\t*goto thebookreviewearly\n\n*label thebookreviewearly\n\nYou've read through most of the book—slugger, you've lived through most of it—but you crack the holo-cover again, needing to take one last look at the story of your life. \n\n*if warningsys\n\t*if chip_diva\n\t\t\"I'd read that in order, if I were you,\" MeChip ${chipname} pops up to warn you. \"But it's your story, so you can read it however you want, boo.\"\n\t\t*goto thebookreview\n\t*else\n\t\t\"I suggest you read in chronological in order,\" MeChip ${chipname} pops up to warn you. \"But this is your story, so you should read it however you choose.\"\n\t\t*goto thebookreview\n*else\n\t*goto thebookreview\n\n*label thebookreview\n*choice\n\t*disable_reuse #[i]THE EARLY YEARS[/i].\n\t\tThis section outlines Victon and Miss Artillery's romantic relationship, which spanned several years long before you, Prodigal, or Jury were born. Apparently the two were very serious, even on track to get engaged, though reports indicate that Victon always kept this relationship separate from his friends and family. It seems even then, Victon had a compunction for secrecy.\n\n\t\tThough the relationship began to unravel when Miss Artillery began to lose her mind. As her death projection Powers grew stronger, the line between reality and fiction blurred, making her more and more paranoid.\n\n\t\tMiss Artillery had vowed never to tell anyone about this second Power set, but when the ability started to affect her sanity, she felt she had to tell her soon-to-be fiancé. Victon claims to have tried to help Miss Artillery and stay with her as long as possible, but eventually her mental health problems grew too great for either of them to handle.\n\n\t\tWith a political career on his horizon, Victon ultimately decided to break up with Miss Artillery in favor of a more suitable political wife: Jury's mother. After that, Miss Artillery disappeared, though apparently by then she had already been living on the streets against Victon's will for quite some time, thinking there were many conspiring forces out to murder her.\n\n\t\tAs heartless as this move may seem, Victon claims to have struggled with it greatly—he left behind the love of his life for his career, abandoning her at her lowest point. Ultimately, Victon felt the only way to truly help Miss Artillery and those like her was to create Powered Regulation policies in government. \n\n\t\tApparently, this was a huge part of what set Victon on his political path: watching his first love, Prodigal's mother, lose her mind because of her Powers. \n\n\t\t*page_break\n\n\t\tAfter this ordeal, Miss Artillery was left unbalanced and heartbroken, though Victon tried to support her secretly as long as he could. That stopped when Miss Artillery eventually dropped off the map entirely, retreating so far into her paranoid projection delusions that she decided to turn to a life of crime. \n\t\t\n\t\tOnce this happened, Victon had to cut all ties and destroy all evidence of their past to avoid the liability of Miss Artillery ruining his political aspirations.\n\n\t\tThe question still remained, however, how Prodigal was conceived, given that Victon had no contact with Miss Artillery through these subsequent years. \n\n\t\t*page_break\n\t\t\n\t\t*if (regimedamage > 15) or (lasergunsave)\n\t\t\t${reportername} was only able to hobble this story together thanks to the unprecedented access granted to Victon's memories, thanks largely to the high level of Regime Damage you inflicted, and your final interaction with Miss Artillery.\n\n\n\t\t\tThe answer came during a raid of one of Miss Artillery's lost lairs, where several freezers full of stolen Victon sperm samples were found. Since Miss Artillery was so reclusive during these years, no one will probably ever know how or why she acquired so much genetic material, but it is clear that she must have used this stolen sperm bank to artificially inseminate herself. \n\n\t\t\tThis process must have taken years though, given that Prodigal was born roughly around the same time as you and Jury.\n\n\t\t\t*label whatyouthinkspunk\n\t\t\t*choice\n\t\t\t\t#As tangled as this all seems, it makes perfect sense.\n\t\t\t\t\tThese circumstances set the stage for the events that would change the course of your life.\n\t\t\t\t\t*goto thebookreview\n\t\t\t\t#Miss Artillery was crazy enough to steal Victon's spunk?\n\t\t\t\t\tThat's… \n\n\t\t\t\t\tInsane.\n\n\t\t\t\t\tLiterally.\n\t\t\t\t\t*goto thebookreview\n\t\t\t\t#All of this is so hard to believe.\n\t\t\t\t\tThen again, nothing with Miss Artillery or Prodigal has ever proven to be uncomplicated.\n\t\t\t\t\t*goto thebookreview\n\t\t\t\t#As scary as it is to admit, the immensity of some Power sets can be extremely dangerous.\n\t\t\t\t\tAs much as you disagree with all that President Victon has done, there's no doubt that Powers are changing humanity. \n\n\t\t\t\t\tIt's going to be your job to help the world cope with these changes in a positive way.\n\t\t\t\t\t*goto thebookreview\n\t\t*else\n\t\t\tThere is no evidence of any correspondence between Victon and Miss Artillery after this, nor of Miss Artillery's whereabouts, for that matter. ${reportername} believes, however, she might have uncovered more details had you been granted greater access by doing more Regime Damage than you managed to.\n\n\t\t\tAs a result, there is no concrete evidence explaining how Miss Artillery conceived Victon's child, though the widely-accepted theory is that she must have stolen his sperm somehow, since there is no mental trace of any subsequent affair between the two. \n\n\t\t\tGiven Miss Artillery's paranoid mental state, doing something like this would be…well, conceivable. However, it must have taken Miss Artillery years, as Prodigal wasn't born until roughly around the same time as you and Jury.\n\t\t\t*goto whatyouthinkspunk\n\t*disable_reuse #[i]THE PRODIGAL CHILDREN[/i].\n\t\tThis section offers a much more detailed account of Miss Artillery's actions, since once Prodigal was born, Miss Artillery became a teacher at the underground Assassin Academy to support her daughter. While there, Miss Artillery was placed on anti-psychotic medicine for periods of lucidity, which were solely dependent on the school's somewhat-unsteady supply of illegal drugs.\n\n\t\tThere was very little to learn about Prodigal's early childhood, since it appears Miss Artillery decided to keep her daughter's existence a complete secret from everyone in her life. Prodigal was born inside one of Miss Artillery's secret bunkers and was kept there for over a decade, not allowed to leave. As a result, there's no way to know what Prodigal's real name is—or if she was ever even given one.\n\n\t\tWhile you and Jury were raised in stable homes, Prodigal was raised in seclusion by a madwoman. It is impossible to know the extent of the psychological damage done by Prodigal's childhood experiences, except of course to measure her criminally insane acts as an adult.\n\n\t\t*choice\n\t\t\t#At least Prodigal's crazed vendettas make a little more sense, now.\n\t\t\t\t*goto afterprodborn\n\t\t\t#I feel terrible for Prodigal. No one should have to go through what she did.\n\t\t\t\t*goto afterprodborn\n\t\t\t#People overcome terrible circumstances every day. Prodigal was dealt a particularly bad hand, but how she chose to play it is on her.\n\t\t\t\t*label afterprodborn\n\n\t\t\t\tAfter Prodigal was born, nothing directly relevant happened until around seven years later, when then-Judge Victon divorced Jury's mother to marry his second wife. According to Jury and Victon's public testimonies, Miss Artillery showed up to Victon's home, having heard of the divorce. \n\n\t\t\t\tApparently Miss Artillery tried to rekindle her romance with Victon, but was once again completely shut out. We'll probably never know why Miss Artillery didn't tell Victon about Prodigal, but this thorough rejection combined with her insane paranoia might provide all the answer we'll ever receive. One thing remains clear: whatever her reason, Miss Artillery was obviously invested in keeping Victon's status as the father of her baby a secret, even from Prodigal.\n\n\t\t\t\tThis was the last known contact between Victon and Miss Artillery until five years later.\n\t\t\t\t*goto thebookreview\n\t*disable_reuse #[i]THE CONSPIRACY THEORY[/i].\n\t\tHappily remarried and building his reputation as a judge strict on Powered Regulation policies, Victon was ready to reaffirm his political ambitions. He knew he needed some major publicity if he was going to successfully launch a mayoral campaign. \n\n\t\tThen when America's sweethearts, The Sound and The Fury, shut down the Assassin Academy, Victon saw something that shocked him in the arrest lineup: his former fiancée, Miss Artillery. Knowing about her secret death projection Powers, Victon saw his first perfectly-primed political opportunity. \n\n\t\tOr rather, he was going to create that opportunity out of thin air.\n\n\t\t*page_break\n\n\t\tUsing his influence as a judge, Victon was able to make a secret deal with Miss Artillery: fake her death at the hands of The Sound and The Fury and Victon would set Miss Artillery up with a secure life somewhere far away.\n\t\t\n\t\t*if ((regimedamage > 15) or (artilleryfinalclue)) or (lasergunsave)\n\t\t\tBarely understanding anything at this point, Miss Artillery agreed, thinking that this meant Victon was returning for her. While Victon did want to find a way to take care of Miss Artillery, he had decided to blatantly manipulate her for his own selfish causes, taking down your innocent family as further collateral damage for his political ascension.\n\n\t\t\tAfter pulling a few untraceable strings, Victon made it possible for Miss Artillery to escape and crash The Sound and The Fury's press conference, faking her death at their hands using her projection Powers. This then primed Judge Victon to convict the famous couple in a trial that launched him into fame of his own.\n\n\t\t\tAfter the incident, Victon admitted that he planned on putting Miss Artillery out of her misery to tie up all loose ends, but he found Miss Artillery was somehow unkillable thanks to her death projection Powers. \n\n\t\t\tKnowing she'd someday die of natural causes, or perhaps even by her own hand, Victon placed Miss Artillery in a secret compound on the other side of the world and destroyed all evidence of their dealings.\n\n\t\t\t*label asforprodigal\n\t\t\t*page_break\n\n\t\t\tAs for the young Prodigal, no one knew she existed and Miss Artillery was too crazy to even remember her. So Prodigal was left in the secret bunker alone, perhaps with no knowledge that an outside world even existed. \n\n\t\t\tProdigal eventually busted out of the bunker and raised herself, but she was mentally unbalanced and impressionable upon entering the world for the first time. When Prodigal pieced together the identity of her thought-to-be-deceased mother, she began obsessing about you as the center of her broken life. \n\t\t\t*goto thebookreview\n\t\t*else\n\t\t\tThere is no evidence to explain how Victon and Miss Artillery made this deal happen or what the arrangement was supposed to be afterwards, but obviously their plot succeeded. Miss Artillery was able to escape and crash The Sound and The Fury's press conference, faking her death at their hands using her projection Powers. This then primed Judge Victon to convict the famous couple in a trial that launched him into fame of his own.\n\n\t\t\tAfter this, all traces of Miss Artillery disappeared until you and Prodigal found her on the Blessed Vessel. Though Victon denies it, you're sure he was trying to find a way to kill Miss Artillery all these years, without luck.\n\t\t\t*goto asforprodigal\n\t*disable_reuse #[i]THE DEATH WAVE[/i].\n\t\tThis section details all of the events surrounding your debut as a hero and Prodigal's plot to kill you and your family. You obviously know this story very well, but you're particularly drawn to the night of the Death Wave that (temporarily) ended the feud between you and Prodigal. That's when then-Mayor Victon showed up to try and intimidate you with his little speech about Prodigal, where he claimed to have been tracking her.\n\n\t\tVicton has since admitted that he was lying to you about this. He had no idea Miss Artillery had a daughter until he began to track Miss Artillery's inheritance trust, which had recently been stolen. Once he discovered her existence, Victon launched a hunt to discover the identity of Prodigal's father, but had no luck. This worried him, but given Prodigal's age, he concluded that he couldn't be the father.\n\n\t\tObviously, Victon hadn't considered the possibility Miss Artillery had somehow stolen his sperm. At any rate, Victon thought the problem was solved\n\t\t*if kill_prodigal\n\t\t\twith Prodigal's death at your hands.\n\n\t\t\tThough obviously everyone was fooled by Prodigal's holo-death-projection decoy, granting her the freedom to begin to unravel the threads of Victon's conspiracy.\n\t\t\t*goto thebookreview\n\t\t*else\n\t\t\twith Prodigal's imprisonment. Victon made sure to keep a close eye on her in prison, however, because he didn't want Miss Artillery to have any reason to come back to America.\n\n\t\t\tThough obviously everyone was fooled by Prodigal's holo-projection prison decoy, granting her the freedom to begin to unravel the threads of Victon's conspiracy.\n\t\t\t*goto thebookreview\n\t*disable_reuse #[i]THE HERO PROJECT[/i].\n\t\tThis section includes much of the details in Jenny's DRPR report, which finally went public once all of its details were confirmed. Setting his sights on the presidency, Victon aligned with rising Meek leader Constance Obach and together they plotted a course for the White House. \n\n\t\tBefore putting together the elite cabal that created The Hero Project (which consisted of Secret Meek Apostle Rexford Schillers, Rebellion, and Inherit), Victon decided to tell Constance about Miss Artillery. \n\n\t\tVicton knew Constance's Meek anti-Powered scientists could find a way to kill Miss Artillery, plus, once Constance agreed to have Miss Artillery transferred into international Meek custody, it cemented their relationship with the possibility of mutually assured destruction. \n\n\t\tVicton and Constance became tied closely, knowing they'd rise or fall together. Now they needed to find technology to dampen Powers, both for their political agendas and to deal with Miss Artillery.\n\n\t\tTurns out The Hero Project ended up providing them with everything they needed. \n\n\t\t*page_break\n\n\t\t*if (regimedamage > 15) or (conspiracygo)\n\t\t\tIn creating The Hero Project, Victon and The Meek dispatched Rexford to arrange missions with Culic and his InfraOrder, not just to boost the show's ratings, but to also gain access to Splicina's Power-converting weapon, which Meek scientists believed could be the key to weaponizing Power-dampening technology.\n\n\t\t\tRexford claimed to have acted alone in coordinating with Culic, but obviously the entire Hero Project cabal was privy to all of these plans, including Victon.\n\n\t\tAfter manipulating national sentiment through The Hero Project, Victon and Constance used their considerable power and Culic's confiscated Bio-Weapon to fund ultra-secret research: \n\n\t\tThey sought to weaponize Power dampening technology not just to temporarily neutralize Infini Powers, but to also permanently neutralize normal Powers, thus providing the key to finally tying the one loose end that threatened to destroy all they had built: Miss Artillery.\n\t\t\n\t\t*choice\n\t\t\t#If only I had been able to stop this during The Hero Project.\n\t\t\t\tStill, you know you did everything you could with the knowledge you had, at the time.\n\t\t\t\t*goto thebookreview\n\t\t\t#Realizing that this plan had been in motion for so many years, I feel better about not being able to stop it sooner.\n\t\t\t\tAt least you stopped it in the end.\n\t\t\t\t*goto thebookreview\n\t\t\t#President Victon is either incredibly lucky, or an incredible political genius.\n\t\t\t\tYou're willing to bet it has been a healthy mix of both. \n\n\t\t\t\tThough you suppose it's a bit easier to make your own luck when you don't seem to have any moral boundaries.\n\t\t\t\t*goto thebookreview\n\t*disable_reuse #[i]THE DEVOID WAR[/i].\n\t\tWhile The Hero Project was occurring, Prodigal was able to figure out Miss Artillery was still alive thanks to her surveillance of Victon. From here, you know the rest of the story.\n\n\t\tWhat you didn't know was that Victon suspected Prodigal had learned this when she resurfaced and teamed up with you, which is why he pulled out all the stops to take you down, execute your parents, and kill Miss Artillery before the public could learn the truth. He had already planned for all this to happen someday, but he accelerated the timeline to stop you. \n\n\t\tVicton succeeded in slowing you down enough to kill Miss Artillery at the last second, without a trace. \n\t\t*if (lasergunsave) or (artilleryfinalclue)\n\t\t\tHowever, Miss Artillery's dying message paired with Jury's change of heart gave you the final clue you needed to unravel Victon's conspiracy.\n\n\t\t\tFrom there, it seems everyone on the planet watched the final battle between your forces and Victon's play out live on 3V.\n\t\t\t*goto thebookreview\n\t\t*else\n\t\t\tHowever, Jury's change of heart gave you the final clue you needed to unravel Victon's conspiracy.\n\n\t\t\tFrom there, it seems everyone on the planet watched the final battle between your forces and Victon's play out live on 3V.\n\t\t\t*goto thebookreview\n\t#I'm finished reviewing this part of ${reportername}'s book.\n\t\t*goto meekmove\n\n*label meekmove\n\nYou take a deep breath, because no matter how many times you review that story, you are always a little bit blown away by it.\n\nFlipping through the holo-pages, you take a deep breath, turning to ${reportername}'s takedown of The Meek movement. You know this is the section she is most proud of, since it's a culmination of years of in-depth reporting.\n\nIt's a point of pride for you as well, since The Meek movement's ultimate fate was the direct result of a choice you made, right after the Devoid showdown. You had to weigh the options carefully, knowing that if you shut down The Meek movement outright, it would be a massive blow to the principle of freedom of speech in this nation. \n\nHowever, if you left The Meek's freedoms unchecked, the risk they pose to Powered individuals might never cease.\n\n*choice\n\t#I decided to champion freedom of speech by leaving The Meek's fate to the public. Though I enhanced that freedom by exposing The Meek's true beliefs and everything I saw inside the Blessed Vessel.\n\t\t*set freedom %+40\n\n\t\tYou value a society that champions freedom of belief and expression above all else, so you felt it would be hypocritical to deny The Meek movement their freedom of speech.\n\n\t\tInstead, you enhanced their freedoms by revealing all of The Meek's bigoted beliefs and their illegal practices, opening them up to a slew of criminal investigations, massive financial loss, and great public shame. Most importantly, you made sure The Meek's genocidal Infinity Regulator weapons were permanently deactivated and banned.\n\n\t\t*if (freedom > 75)\n\t\t\t*achieve meekfreedom\n\t\t\tWhile The Meek's figureheads, Constance Obach and Inherit, tried to flee the country on the Blessed Vessel, they were both arrested before they could. They now await trial and face lifelong prison sentences for their crimes. \n\n\t\t\t*if (legend > 90)\n\t\t\t\t*set legend 95\n\t\t\t\t*goto meekstillexist\n\t\t\t*else\n\t\t\t\t*set legend +5\n\t\t\t\t*goto meekstillexist\n\t\t*else\n\t\t\tThe Meek's figureheads, Constance Obach and Inherit, have subsequently fled the country on the Blessed Vessel. They both face lifelong prison sentences for their crimes, should they ever return. \n\n\t\t\t*label meekstillexist\n\t\t\t*page_break\n\n\t\t\tDespite all of these positive achievements, The Meek movement still exists. Which means that they might someday crawl back out of the gutter to make trouble for you and for Powered individuals everywhere. \n\n\t\t\tHowever, weighing it all, you know this potential vulnerability is a price you're willing to pay for protecting everyone's freedom.\n\t\t\t*goto criticalblow\n\t#I decided to take down The Meek movement as thoroughly as possible.\n\t\t*set freedom %-20\n\t\t*label destroymeek\n\t\tYou value a balance between freedom and security, which means you have no problem limiting the freedom of bigoted fanatics like The Meek. So you didn't just expose everything you learned about The Meek movement, you made sure \"someone\" burned down all of their American headquarters.\n\n\t\tMost importantly, you made sure that all of The Meek's genocidal Infinity Regulator weapons were permanently destroyed in these attacks.\n\n\t\tAs a result of the public attacks and shame, Constance Obach and Inherit have fled the country and now live on the Blessed Vessel. \n\n\t\t*page_break\n\n\t\tDespite all of these positive achievements, you've now set a dangerous precedent: if any political or religious organization steps too far out of line, they'll be put down. This may seem like a rational theory, but it's totalitarian regulation like this that can backslide into dystopia with alarming speed.\n\n\t\tAnd while The Meek movement may be crippled, they have not yet gone extinct. After the hell you've put them through, you know there's always the possibility they may come crawling back out of the gutter someday, with a vengeance.\n\n\t\tAll that considered, you still feel you made the right decision. There's never going to be a world where things are purely black and white, so you're proud of how you've begun to navigate the grey.\n\t\t*goto criticalblow\n\t#I decided to destroy The Meek movement both figuratively and literally by sinking their ship. Personally.\n\t\t*set freedom %-40\n\n\t\t*if (freedom \u003c 25)\n\t\t\t*achieve meeksecurity\n\t\t\tYou value security above some freedoms, especially when those freedoms grant privileges to bigoted fanatics like The Meek. So you didn't just expose everything you learned about The Meek movement, you made sure \"someone\" steered the Blessed Vessel into a mysteriously-out-of-place iceberg.\n\n\t\t\tEveryone on board the ship was safely evacuated back into America, where key Meek figures, including Constance Obach and Inherit, were arrested.\n\n\t\t\tThey both now await trial and face lifelong prison sentences for their crimes. Most importantly, you made sure that any of The Meek's genocidal Infinity Regulator weapons that you didn't destroy were permanently deactivated and banned.\n\t\t\t\n\t\t\t*if (legend > 90)\n\t\t\t\t*set legend 95\n\t\t\t\t*goto freedomsgone\n\t\t\t*else\n\t\t\t\t*set legend +5\n\n\t\t\t\t*label freedomsgone\n\t\t\t\t*page_break\n\n\t\t\t\tDespite all of these positive achievements, you've now set a dangerous precedent: if any political or religious organization steps too far out of line, they'll be put down. This may seem like a rational theory, but it's totalitarian regulation like this that can backslide into dystopia with alarming speed.\n\n\t\t\t\tStill, you'll sleep a lot better at night knowing that The Meek movement has been eradicated. There's never going to be a world where things are purely black and white, so you're proud of how you've begun to navigate the grey.\n\n\t\t\t\tWeighing it all, you know this potential blow to freedom is a price you're willing to pay to keep the world safe from bigoted beliefs.\n\t\t\t\t*goto criticalblow\n\t\t*else\n\t\t\tThough you found you didn't value Security highly enough to enforce this expansive of an outcome.\n\n\t\t\tInstead you decided to destroy The Meek movement more locally.\n\t\t\t*page_break\n\t\t\t*goto destroymeek\n\n*label criticalblow\n*page_break\n\nAt the end of it all, The Meek have been rendered essentially inert and their great weapons have been destroyed. So this is a major victory not just for you, but for Powered individuals everywhere.\n\nIf nothing else, you can count this as one of the greatest accomplishments of your career. \n\n*page_break\n\nAs for the Infinite Elite,\n*if fightrexfordkill\n\t*achieve rexdead\n\tafter the Devoid War \n\t*goto infinitefree\n*else\n\t*achieve rexdevoid\n\tRexford Schillers will stay in the Devoid for life. However, \n\t*goto infinitefree\n\n*label infinitefree\nScoundrel, Sheathe, Splicina, and The Hound managed to escape. Rumor is they're trying to form a new Powered freedom rebel group, The InfraCircle.\n*if freecellblock\n\n\tAnd since you let out InfraOrder and Splice Circle prisoners from the Maximum Security Wing, it is possible that Culic and Smyther may be among their ranks.\n\t*goto stopthem\n*else\n\tWord is they're currently trying to find a way to free InfraOrder and Splice Circle prisoners from the Devoid.\n\t*goto stopthem\n\n*label stopthem\n\n*if scoundrelfinaleally\n\tYou were stunned to hear about this new formation, given the fact that Scoundrel and Sheathe turned on the rest of the Infinite Elite to support you. However, it would seem that they're forming this group in the hopes that you will become the InfraCircle's new leader.\n\n\tWhile you may respect the message of tolerance this new InfraCircle is promoting, you'd never associate yourself with this group, for more reasons than you can count. You're going to have to make it your life's work to put a stop to their criminal ways. You've always been the one to do so before.\n\t*goto gotohero\n*else\n\tWhile you may respect the message of tolerance this new InfraCircle is promoting, you'll make it your life's work to put a stop to their criminal ways, since you've always been the one to do so before.\n\t*goto gotohero\n\n*label gotohero\n\nAs a result, you've become the go-to hero when it comes to national Powered threats and issues.\n\n*page_break\n\nYou flip to the section on The American Protectorate, which seems to have splintered entirely after the collapse of Victon's regime.\n\nInherit left the team to deal with The Meek collapse, while \n*if rebellionrecruit\n\tRebellion has also temporarily retired to \"find ${youhir}self and regather purpose.\" No one knows if ${youze} will ever return to The American Protectorate or The Millennial Group, though ${youze} may not be welcome back at either organization after all ${youze} has done.\n\t*goto restoftap\n*else\n\tRebellion has also temporarily retired to recover after being blinded in one eye. No one knows if ${youze} will ever return to The American Protectorate or The Millennial Group, though ${youze} may not be welcome back at either organization after all ${youze} has done.\n\t*goto restoftap\n\n*label restoftap\n\nSlugger, no one knows if Rebellion will ever return to heroics, period. Or if ${youze} even should.\n\nAs for the rest of the team, Summit has taken over as temporary leader and seems to be more outspoken than ever about his anti-Powered views. Though he should probably be focusing all that energy on his team, since Wintry and Stage Show are still engaged in a very public feud after Wintry's betrayal supporting you at the Devoid War.\n\n*choice\n\t#I'm happy to see these \"heroes\" get what they deserve.\n\t\t*set rlshp_tap %-30\n\t\t*set soloist %+20\n\t\tThey should all be in jail, as far as you're concerned. \n\n\t\tThankfully, witnessing their fall from grace has been satisfying enough.\n\t\t*goto juryexplans\n\t#I still believe in the idea of The American Protectorate, just not in its current incarnation.\n\t\t*set rlshp_tap %-20\n\t\t*set soloist %-20\n\t\tWith another roster, this team could be just the kind of unifying factor that America needs right now.\n\t\t*goto juryexplans\n\t#I wish Wintry the best and hope she finds her way.\n\t\t*set rlshp_tap %+20\n\t\t*set soloist %-15\n\t\tWintry just wanted to be a hero and she got caught up in The Hero Project scandal. While she is still responsible for her actions, you imagine she also felt fairly helpless.\n\n\t\tYou just hope she continues to find a way to stand up for what's right.\n\t\t*goto juryexplans\n\t#I wish Stage Show the best and hope she finds her way.\n\t\t*set rlshp_tap %+20\n\t\t*set soloist %-15\n\t\tEspecially since rumor has it that she and Fumble might have started dating again. You're not sure either of them could ever live life outside the spotlight.\n\n\t\tSo you can bet they'll continue finding ways to stay in it, together or apart.\n\t\t*goto juryexplans\n\t#I wish Rebellion the best and hope ${youze} finds ${youhis} way.\n\t\t*set rlshp_tap %+20\n\t\t*set soloist %-15\n\t\tThere was a reason Rebellion was once your idol.\n\n\t\tYou just hope ${youze} can find a way to be that hero again.\n\t\t*goto juryexplans\n\n*label juryexplans\n*page_break\n\nWhile the future of this damaged roster remains bleak, there still seems to be hope for The American Protectorate franchise. It might be mired in a public relations disaster now, but the fact remains that the first season of The Hero Project had record-breaking ratings and the entire nation is waiting to see what happens to the team next.\n\nSo The Hero Project is actually gearing up for Season Two, which is rumored to be a Veterans Versus Rookies series aiming to redeem the franchise and re-brand it with a new, hopeful direction. GG has been brought back as Co-Executive Producer alongside some new producing hotshot, which means you have the inside scoop to know that Mach Girl, The Bear, Fumble, and Tarana Rain are already set to return as \"Veterans.\" Apparently casting is in full swing right now.\n\nYou're curious to see if The Hero Project can reshape The American Protectorate into the team it was meant to become, before all of Victon, Rexford, and Rebellion's meddling.\n\n*page_break\n\nPerhaps more than any other member, all eyes are on Jury to see what he does next. He technically remains on the team, but just barely, given all he currently has to face.\n\nThough you know you had a hand in shaping Jury's fate when you chose to:\n\n*choice\n\t*if (jennydead) #Make sure Jury faces a murder trial.\n\t\t*set rlshp_victon %-30\n\t\tYou hope Jury will go to jail for a very long time. \n\n\t\tIt would be the most fitting ending to your rivalry, seeing Jury go to prison while you live on as an Infini icon.\n\n\t\t*label jurybftest\n\n\t\t*if juryboyfriend\n\t\t\t*set juryboyfriend false\n\t\t\tWhatever you may have felt for Jury during all the madness, it most definitely faded with time, especially once things returned to normal.\n\n\t\t\tYou may have shared a few high-profile kisses with Jury, but you made it clear to him that you had no future together once the dust settled. Jury is convinced that you just tricked and used him, and whether or not that's true, you have no desire to dissuade him of this particular belief. \n\t\t\t*goto futureoftap\n\t\t*else\n\t\t\t*goto futureoftap\n\t*if (jennydead = false) #Back Jenny up and make sure Jury faces a criminal trial.\n\t\t*set rlshp_victon %-30\n\t\tYou hope Jury will be punished to the fullest extent of the law.\n\n\t\tIt would be the most fitting ending to your rivalry, seeing Jury go to prison while you live on as an Infini icon.\n\t\t*goto jurybftest\n\t#Leave Jury's shamed fate out of your hands.\n\t\t*set rlshp_victon %+10\n\t\t*label juryredeem\n\t\tJury claims that he wants to redeem himself and he started to back up this claim by finally standing up to his father at the Devoid.\n\n\t\tIt remains to be seen whether Jury will ever be able to make up for all the mistakes he has made, but you feel he at least deserves the chance to try. \n\n\t\tAll you know is this: if your rivalry were a real competition, you most certainly would have won.\n\t\t*page_break \n\t\t*goto jurybftest\n\t#Give Jury a chance to redeem himself. \n\t\t*set rlshp_victon %+20\n\t\t*goto juryredeem\n\t*if (juryboyfriend) #Continue to date Jury.\n\t\t*set rlshp_victon %+30\n\t\tJury claims that he wants to redeem himself and he started to back up this claim by finally standing up to his father at the Devoid. It remains to be seen whether Jury will ever be able to make up for all the mistakes he has made, but you feel he at least deserves the chance to try. \n\n\t\tAnd you plan to help him do so. Though you're not a couple yet, you've been dating Jury whenever possible these last several months. You're taking it slow, given everything you've been through, but you have high hopes for your future together.\n\n\t\t*if (jennydead) \n\t\t\t*set rlshp_family %-25\n\t\t\tThough after what Jury did to Jenny, just about everyone in your life disapproves. \n\n\t\t\tGood thing you don't care what anyone thinks.\n\t\t\t*page_break\n\t\t\t*goto futureoftap\n\t\t*else\n\t\t\t*page_break\n\t\t\t*goto futureoftap\n\n*label futureoftap\n\nWhether or not Jury gets to remain a member of The American Protectorate, he's not the only Victon looking for redemption. There are rumors that the newly-divorced former Mrs. Victon, now revealed as a Powered individual, is looking to escape the stigmas of her ex-husband by becoming a contestant on The Hero Project's Second Season. She claims to have had no knowledge of Victon's illegal dealings and has been cleared in court, but whether the public will ever accept her remains to be seen. She has kept her story mostly shrouded in secrecy, so you're sure many eyes will be glued to The Hero Project to hear the former First Lady's side of the story. \n\nAlong with Jury and his former stepmom, you wonder if any of the other original American Protectorate members will get a chance to redeem themselves by surviving the upcoming rebranding for Season Two.\n\nAll you know is that you'll be watching from behind your 3V set this time around. Quite happily, at that.\n\n*page_break\n\nOf course, you already know how the Victon c
