rwhelmed to make an offensive move. Having fought Stage Show before, what should you tell Monk to do?\n\n*choice\n\t#Tell Monk to fly in close range to fight Stage Show.\n\t\tMonk whizzes through the air, moving hir body with telekinetic precision, dodging Stage Show's laser blasts. And once ze gets close enough to Stage Show, she is forced to engage Monk in a hand-to-hand fight.\n\n\t\tThis distraction gives you the opportunity to run through to the next fight, thankfully.\n\t\t*goto luckywintry\n\t#Tell Monk to mind-move a giant metal shield from the museum as protection.\n\t\tMonk lifts the shield and you recognize it as an artifact from The Millennial Group's famous Tectonic Wars.\n\n\t\tBut just as the shield drops in front of Monk, Stage Show's redoubles her blast Power and shatters the shield, riddling Monk with laser energy. \n\n\t\tMonk must be having more trouble controlling hir telekinetic Powers than you had realized. Against Stage Show's long-distance energy attacks, going in close range may have been a smarter move.\n\n\t\t*page_break\n\t\t*if prodigalusedsix\n\t\t\t*set health -20\n\t\t\tNow it's up to you to get by Stage Show, so you grab a glass orb from the Tectonic War display. Without hesitating, you hurtle the orb at Stage Show.\n\n\t\t\tYou feel a neon blue laser rip into your torso and scream through the pain, bracing for another hit. But then the orb explodes behind Stage Show and showers her with glass shards. \n\n\t\t\tSeeing your window of opportunity open, you keep running. \n\t\t\t*goto luckywintry\n\t\t*elseif jennyusedsix\n\t\t\t*set prodigalusedsix true\n\t\t\t\"Keep moving,\" Prodigal says. \"It's time to prove who really wears the kevlar-bodysuit-pants in this relationship!\"\n\n\t\t\tYou'd like to prove a thing or two to Stage Show yourself, but someone has to figure out a new escape route. As Prodigal flips at Stage Show, it looks like that responsibility falls to you. \n\n\t\t\tSo you keep running through the museum past this brawl.\n\t\t\t*goto luckywintry\n\t\t*else\n\t\t\t*set jennyusedsix true\n\n\t\t\t\"I'll handle Stage Show,\" Jenny says, stepping forward. \"Find a new escape plan while I'm busy.\"\n\n\t\t\tBefore you can argue, Jenny launches at Stage Show, so you and Prodigal keep moving. \n\n\t\t\t\"We'll grab you once we have a new plan!\" you shout at Jenny as you go.\n\t\t\t*goto luckywintry\n\t#Tell Monk to mind-move objects to barrage Stage Show.\n\t\tMonk mind-lifts several artifacts from The Millennial Group's famous Tectonic Wars display. Metal weapons and blown-glass orbs begin to rain down on Stage Show, forcing her to switch from offensive to defensive maneuvers.\n\n\t\tThis gives Monk the opportunity to focus on launching a truly devastating telekinetic attack. Which in turn gives you the opportunity to move on to the next fight.\n\t\t*goto luckywintry\n\n*label luckywintry\n*page_break\n\nNext you come up against quite the grudge-match, Lucky versus Wintry. It's an impressive display, with Wintry's ice Powers blasting against Lucky's fiery limbomb explosions.\n\nThese two never got to sort out their differences after Wintry betrayed Lucky and the rest of the Underdogs by switching to the Popular alliance in The Hero Project—though it looks like they're getting the chance to do so now.\n\n\"I don't understand how you can live with yourself,\" Lucky screams over the sound of ${luckyhis} foot blowing apart a chunk of ice. \n\n\"We all do what we have to do,\" Wintry screams in response, redoubling her icy efforts. Wintry was always Powerful, but she seems stronger than ever, overwhelming Lucky with a veritable blizzard of attacks. Has Rebellion been forcing ${youhis} team to take Pump? It certainly seems like it, from what you've seen.\n\nLucky won't be able to stay on the defensive much longer, so how should ${luckyze} attack Wintry?\n\n*choice\n\t#Tell Lucky to explode into a human rocket.\n\t\tLucky leaps head-first at Wintry, nearly freezing in place from her wintry mix of attacks. But then Lucky explodes both of ${luckyhis} legs, the force of which sends ${luckyhis} entire body rocketing forward at Wintry.\n\n\t\tBefore she can react, Lucky crashes into Wintry like a human missile. As the two roll to the ground to recover and re-engage, you make your way through, wishing you could see the rest of this fight, for many reasons.\n\t\t*goto processorjury\n\t#Tell Lucky to explode and activate heat blasts.\n\t\tLucky leaps head-first at Wintry, nearly freezing in place from her wintry mix of attacks. But then Lucky explodes both of ${luckyhis} fists, creating a burst of heat energy.\n\n\t\tLucky then focuses the excess heat energy into two blasts and before Wintry can react, the blasts pummel her into submission. \n\n\t\tAs Lucky runs towards Wintry to finish this, you make your way through, wishing you could see the rest of this fight for many reasons.\n\t\t*goto processorjury\n\t#Tell Lucky to explode and use super-strength to fight.\n\t\tLucky leaps head-first at Wintry, nearly freezing in place from her wintry mix of attacks. But then Lucky explodes both of ${luckyhis} arms and when the explosion clears, ${luckyhis} muscles beef up to twice their normal size. \n\n\t\tLucky lands and charges at Wintry, but when ${luckyze} gets close enough, Wintry refocuses her attack into a pure ice beam—one that hits Lucky square in the chest. \n\n\t\tLucky is encased in a block of thick ice, which Wintry solidifies deeper with every second of blasting. It looks like a slower, close-range attack wasn't the right move here.\n\n\t\t*page_break\n\t\t*if prodigalusedsix\n\t\t\t*set health -10\n\t\t\tIt's up to you to get by Wintry now. \n\n\t\t\tYou scan the museum and spot Lord AshLeigh's infamous flame thrower in a display case, deciding that'll be your best bet. Rolling towards the flame thrower, you feel your body aching against Wintry's hypothermic conditions.\n\n\t\t\tJust when you're about to freeze in place, you reach the flame thrower and turn to blast fire in Wintry's direction. Overwhelmed, Wintry tries to freeze the flames, but they're so intense, the strain knocks her out. The rumors that Lord AshLeigh's flame thrower was extra souped-up must be true, to have exhausted Wintry that quickly.\n\n\t\t\tFeeling the heat slowly return to your body, you try to move your frozen limbs to get through the next matchup.\n\t\t\t*goto processorjury\n\t\t*elseif jennyusedsix\n\t\t\t*set prodigalusedsix true\n\n\t\t\t\"Keep moving,\" Prodigal says. \"This town's only big enough for one ice bitch.\"\n\n\t\t\tYou'd like to prove a thing or two to Wintry yourself, but someone has to figure out a new escape route. And as Prodigal flips at Wintry, it looks like that responsibility falls to you. \n\n\t\t\tSo you keep running through the museum past this brawl.\n\t\t\t*goto processorjury\n\t\t*else\n\t\t\t*set jennyusedsix true\n\n\t\t\t\"I'll handle Wintry,\" Jenny says, stepping forward. \"Find a new escape plan while I'm busy.\"\n\n\t\t\tBefore you can argue, Jenny launches at Wintry, so you and Prodigal keep moving. \n\n\t\t\t\"We'll grab you once we have a new plan!\" you shout at Jenny as you go.\n\t\t\t*goto processorjury\n\n*label processorjury\n*page_break\n\nNext you see that Processor has Jury restrained in a bundle of the copper wire coils she usually passes for hair.\n\n\"Since his Powers are useless,\" Processor starts, \"Jury tried to get fresh with my operating system using that advanced MeChip of his. Obviously that worked out very well for him.\"\n\nYou smile at Jury, who scowls as he struggles against Processor's bonds. \n\n\"Don't enjoy this too much, cutie,\" Jury hisses. \"We Victons tend to have the last laugh.\"\n\nYou stare Jury down, knowing that he's entirely defenseless at this moment—and that several cameras will film whatever you want to do next.\n\n*label juryredochoice\n*choice\n\t#Knock Jury out with a punch.\n\t\t*set regimedamage +3\n\t\t*set revenge %+10\n\t\t*set freedom %-10\n\t\tYou've hit Jury many times before, but this punch feels especially satisfying.\n\n\t\tEspecially as Jury crumples to the floor in a pathetic heap.\n\t\t*goto divarebellion\n\t#Have Processor patch me through for an unblockable live speech.\n\t\t*set regimedamage +4\n\t\t*set revenge %-10\n\t\t*set freedom %+10\n\t\tYou know that while these camera orbs are recording live, there's sure to be a team of IRP/TAP editors ready to switch feeds away from any undesirable content at a moment's notice. But this is Processor's house and when it comes to the electronics here, what she says goes.\n\n\t\t\"You Victons always have the last laugh because you are ruthless,\" you say to Jury. \"You play god with who should or shouldn't have Powers with your advanced MeChips and Power dampeners. How is that not just as bad as the Infini Power you claim to be fighting? It's just another example of why you Victons cannot be trusted.\"\n\n\t\tWhen you're done, Processor nods to indicate that your message has been pushed through to the live feed. \n\n\t\tSo you move on, leaving Jury behind to stew.\n\t\t*goto divarebellion\n\t*disable_reuse #Create a photo moment that will really anger President Victon by kissing Jury.\n\t\t*if (jennygirlfriend) or (prodigalgirlfriend)\n\t\t\tYou step forward to do so, but then you think of your brand new girlfriend and decide that's probably not your best move, at the moment.\n\t\t\t*goto juryredochoice\n\t\t*elseif (luckycomaspouse) or (luckyromancefinale)\n\t\t\tYou step forward to do so, but then you think of Lucky and decide that's probably not your best move, at the moment.\n\t\t\t*goto juryredochoice\n\t\t*elseif bmcomaspouse\n\t\t\tYou step forward to do so, but then you think of Black Magic and decide that's probably not your best move, at the moment.\n\t\t\t*goto juryredochoice\n\t\t*else\n\t\t\t*set regimedamage +1\n\t\t\t*set legend -5\n\n\t\t\tWithout hesitation, you walk up to Jury, grab his face and pull his lips into yours. At first he struggles against you, but then he leans into the kiss as the cameras swirl around you.\n\n\t\t\t*if ((female_straight) or (male_gay)) or (bisexual)\n\t\t\t\t*set jurykiss true\n\t\t\t\t*set rlshp_victons %+30\n\t\t\t\tTo your surprise, everything about the kiss feels electric. \n\n\t\t\t\tJury's hard body presses against yours and the kiss gets deeper, hotter with every second. You feel Jury against your leg and want to rip off his clothes right here and now.\n\n\t\t\t\t*page_break\n\n\t\t\t\tBut just when you think you might explode, you pull away, leaving Jury dazed and swaying on his feet. \n\n\t\t\t\tThen you spin to walk away, because you don't trust yourself around Jury. That was entirely…unexpected. \n\n\t\t\t\tYou probably just did damage to Victon's image, but you also probably did as much damage to your own image, confusing viewers with these blurred lines.\n\n\t\t\t\tAll you know right now is that you want to kiss Jury again. And that's a terrifying thought. \n\t\t\t\t*goto divarebellion\n\t\t\t*else\n\t\t\t\t*set rlshp_victons %+20\n\t\t\t\tEven though you're not into guys, the kiss is still way better than you would have expected. \n\n\t\t\t\tOnce you feel that the cameras have a good enough shot, you leave Jury dazed and swaying on his feet.\n\n\t\t\t\tYou probably just did damage to Victon's image, but you also probably did as much damage to your own image, confusing viewers with these blurred lines.\n\t\t\t\t*goto divarebellion\n\n*label divarebellion\n*page_break\n\nFinally you come across the battle royale: The Diva versus Rebellion. Two iconic leaders of the Millennial Group, past and present, now falling on opposite sides of an ideological war. It already looks like these two have been fighting for days—both of their costumes are ripped and they both bleed from several wounds.\n\n\"In case you hadn't guessed, my dear Elli,\" The Diva drawls. \"I say slugger to your IRP summons.\"\n\n\"You're making a huge mistake here, Diva,\" Rebellion responds. \"A career-ending one.\"\n\n\"Spoken like a true rebel,\" The Diva returns, sarcasm dripping off her every word.\n\n\"That's always been your primary conceit, 'darling,'\" Rebellion says. \"Assuming you've had a single thought in that shallow skull of yours that I didn't influence.\"\n\nAt this, The Diva's smile fades.\n\nThen you have to cover your ears from the decibels unleashed by The Diva's devastating vocal blast.\n\n*page_break\n\nWith your ears still ringing, you turn towards Rebellion to find ${youze} has dodged the brunt of The Diva's blast, shrugging off the bit that hit ${youhir} directly. Rebellion must be pretty slugging close to Infini Level ${youhir}self if ${youze} can take any amount of a blast that Powerful head-on and still be standing.\n\nYou watch as Rebellion launches at The Diva, ${youhis} skin still smoking. You try to warn The Diva, but Rebellion is too fast for the both of you, especially given The Diva's worn out state. Rebellion is able to snatch The Diva by the throat and smash her through the nearest wall before either of you can even open your mouth.\n\nWithout missing a beat, Rebellion then turns to you. It is clear that there's no way to avoid this showdown. \n\nBut that's fine; this is a rematch you want.\n\n*if prodigalusedsix\n\tRebellion owes you some very-long-overdue answers. \n\t*goto rebellionreveal\n*elseif jennyusedsix\n\t*page_break\n\n\t\"Prodigal,\" you whisper. \"Find an escape route.\n\t*goto dontargue \n*else\n\t*page_break\n\n\t\"Jenny, Prodigal,\" you whisper, \"find an escape route.\n\t*label dontargue\n\tThere's bound to be police backup somewhere nearby, so we'll need your firepower to get through that. I'll handle this.\"\n\n\tNot waiting for a response, you then step towards Rebellion.\n\n\tBecause ${youze} owes you some very-long-overdue answers.\n\t*goto rebellionreveal\n\n*label rebellionreveal \n\n*finish Next Chapter: Rebels\n", "chap_ten": "*comment é\n\n*text_image chap_10.png center Voids\n\n*set power 100\n*set health 100\n\nYou don't take any time to stand outside the barbed wire and gaze. You don't stop to reflect. You don't pause to prepare yourself. Because you're ready—you have your plan: \n\nBreak into the Devoid and free your allies. Then put an end to Victon's corruption and free your parents. Forever.\n\nYou're in control now and you know what needs to be done. So you're not going to give your enemies a second to see you coming.\n\nYou're just going to strike.\n\n*page_break\n\nAs your supersonic flight pulls the Devoid into full view, you know the prison grounds are bound to have all kinds of nasty and unique defenses.\n\nThough now that your Powers have returned, there are no Health consequences for Power use and your Power Costs have\n*if (powerregain > 16)\n\tlessened greatly,\n\t*goto youcanenter\n*else\n\tstabilized,\n\t*goto youcanenter\n\n*label youcanenter\nso you can finally use your abilities the way they're meant to be used. \n\n*if warningsys\n\t*if chip_diva\n\t\t\"My queen bee, in this grand battle you're going to need to use every one of your skills,\" MeChip ${chipname} says as she appears, wearing a silvered samurai-geisha getup, looking ready for war herself. \"Every decision will be based on your defining stats, so I'll be informing you of the battle trends as best I can. And sugar mama? Can I just say: best of luck.\"\n\n\t\t\"Thanks, ${chipname},\" you say. \"Now let's do this.\"\n\n\t\t\"Don't stop get it get it! Now, while breaking into the Devoid, make sure to stay true to your Offensive or Defensive ways!\"\n\t\t*page_break\n\t\t*goto breakinchoice\n\t*elseif chip_butler\n\t\t\"In this grand battle you'll be called upon to utilize every one of your skills,\" MeChip ${chipname} says as he appears, wearing a silvered McQueen armor suit, looking ready for war himself. \"Each decision will no doubt rely on your defining stats, so I'll be informing you of the battle trends as best I can. And ${sir_mad}? May I just say: best of luck.\"\n\n\t\t\"Thanks, ${chipname},\" you say. \"Now let's do this.\"\n\n\t\t\"Quite right. Now, as you break into the Devoid, please remain consistent with your Offensive or Defensive tendencies.\"\n\t\t*page_break\n\t\t*goto breakinchoice\n\t*else\n\t\t\"My dearest darling, in this grand battle, you'll be called upon to utilize every one of your skills,\" MeChip ${chipname} says as she appears, wearing a silvered pantsuit, looking ready for war herself. \"Each decision will rely on your defining stats, so I'll be informing you of the battle trends as best I can. And sweetie? May I just say: best of luck.\"\n\n\t\t\"Thanks, ${chipname},\" you say. \"Now let's do this.\"\n\n\t\t\"That's the spirit! Now, as you break into the Devoid, be sure to remain consistent with your Offensive or Defensive tendencies!\"\n\t\t*page_break\n\t\t*goto breakinchoice\n*else\n\tAs you enter this final battle, you know that you'll be called upon to utilize every one of your skills—and that each choice will no doubt be defined by your key stats.\n\t*goto breakinchoice\n\n*label breakinchoice\n\nAs the Devoid rushes into view before you, you speed up, already knowing that you plan to:\n\n*choice\n\t#Break into the Devoid with full Power, taking no mercy. I'm using Infini shields, nuclear blasts, and gravity slams to ram my way through, so slugger save anyone who tries to get in my way. (Power Cost 15-30)\n\t\t*set offensive %+25\n\n\t\tYou crash through the outer Devoid grounds with deafening force and through the haze of your energy shield you can just barely see your gravity-distorting atomic blasts tearing through shields, droids, guards, and walls—but it's all the same to you.\n\n\t\tEspecially since the more you use your newly returned Powers, the stronger you feel.\n\t\t*if (offensive > 75)\n\t\t\t*set lawless %+15\n\t\t\t*set unleash %+15\n\t\t\tAnd thanks to all your practice as a highly offensive fighter, this barrage carries off without a hitch.\n\t\t\t*goto choicetwo\n\t\t*else\n\t\t\t*set lawless %+5\n\t\t\t*set unleash %+5\n\t\t\t*set health -15\n\t\t\tThough you're not as well-practiced executing such an offensive barrage, so as you fly through one of the Devoid's stronger Power dampening fields, your energy shield shorts out.\n\n\t\t\tYou manage to reactivate your shield within seconds, but not before a plasma droid lands a blast to your chest that knocks the wind clear out of you.\n\t\t\t*goto choicetwo\n\t#Break into the Devoid by disarming all defenses and staying hidden as long as possible. I'm using every ounce of atomic and gravity stealth to sneak my way inside and increase my chances of success by avoiding unnecessary conflict. (Power Cost 15-30)\n\t\t*set offensive %-25\n\n\t\tWith all your best anti-surveillance nuclear, gravity, and super-speed tricks at hand, you manage to get through the Devoid's outer-perimeter shields, Power-dampening yards, guarded lobby, and droid-defended inner halls without a hitch.\n\n\t\tSomehow the more you use your returned Powers, the stronger you feel. \n\t\t*if (offensive \u003c 25)\n\t\t\t*set lawless %-15\n\t\t\t*set unleash %-15\n\t\t\tYou're also able to pull of this sneak-attack flawlessly thanks to all your practice as a highly defensive fighter.\n\t\t\t*goto choicetwo\n\t\t*else\n\t\t\t*set lawless %-5\n\t\t\t*set unleash %-5\n\t\t\t*set health -15\n\t\t\tThough you're not as well-practiced executing such a defensive sneak-attack, so as you fly through one of the Devoid's stronger Power-dampening fields, your Infini-manipulated invisibility betrays you.\n\n\t\t\tYou manage to activate a shield within seconds to continue your break in, but not before a plasma droid lands a blast to your chest that knocks the wind clear out of you.\n\t\t\t*goto choicetwo\n\t#Break into the Devoid with full Power, but be sure not to cause any undue harm or destruction. It's time I finally utilized the full range of my Power, but only when conflict appropriately calls for it. (Power Cost 15-30)\n\t\t*set unleash %+10\n\t\t*set lawless %-10\n\t\t*set health -10\n\n\t\tYou crash through the outer Devoid grounds with deafening force and through the haze of your energy shield you can just barely see your gravity-distorting atomic blasts tearing through shields, droids, and walls—but it's all the same to you. Especially since the more you use your returned Powers, the stronger you feel.\n\n\t\tHowever, you make sure not to hit any of the Devoid's guards, who are innocent in all of this. \n\n\t\tWhich is why when you come to a brigade of guards in an interior courtyard, you stop in your tracks. This gives the guards just enough time to send some anti-energy pulse blasts directly through your shield.\n\n\t\tThis knocks the wind clear out of you, but you wipe the guards aside with an anti-gravity sweep. You then continue on your way, shrugging off this attack and wishing you had just a bit less compassion. \n\t\t*goto choicetwo\n\n*label choicetwo\n*if (powerregain > 16)\n\t*set power -15\n\t*goto reportervariable\n*else\n\t*set power -30\n\t*goto reportervariable\n\n*label reportervariable\n*page_break\n\nYou never could have pulled off this kind of attack with your old Powers, even your old Infini Powers. But with these new, seemingly unlimited Powers, you feel like you can do anything.\n\nMaybe taking that Infinity Regulator shot had a hidden silver lining, because it seems to have made your Powers much stronger upon return. Or maybe your body has just finally had time to adjust and settle into these new Infini Powers through that period of dormancy.\n\nEither way, you can't wait to rub your returned Powers in President Victon and The Meek movement's faces.\n\n*page_break\n\nMoving along, you keep pushing your way through until you reach your first destination:\n\n*if reporterarrested\n\t${reportername} Challa's cell.\n\n\t${reportername} stands inside a standard cell, which consists of a green laser wall and a thick pane of bulletproof glass. You'd guess there must be some hidden failsafes beyond these visible security measures, but then again, ${reportername} is probably considered a low-security prisoner for the Devoid, so—\n\n\tYour thought is interrupted, however, as the laser wall suddenly deactivates, the glass door retracts, and ${reportername} then walks forward.\n\n\t\"I figured my way out of this cell the first hour here,\" ${reportername} says, speed-talking faster than usual. \"Figuring a way out of the rest of this place, however, was proving more difficult. But then you came along. So what's next?\"\n\n\t*if choose_reporter\n\t\tYou look at ${reportername} and know that you have to decide, before the madness truly begins, what you want the world to see. If you want ${reportername} to broadcast your actions inside the Devoid, now's the time to start.\n\t\t*goto justfamechoice\n\t*else\n\t\t\"Before we go, I wanted to thank you for—\"\n\n\t\t\"Don't thank me,\" Juhi interrupts. \"I didn't do what I did for you, I did it because it was the right thing to do. And because it's what Sonja would have wanted. Now, like I said, what's next?\"\n\n\t\tYou look at ${reportername} and know that you have to decide, before you move on to your next inmate, what you want the world to see. If you want ${reportername} to broadcast your actions inside the Devoid, now's the time to start.\n\t\t*goto justfamechoice\n*else\n\tThe Maximum Security & Infini Wing, where you're hoping to find your parents.\n\n\tThough before you break inside and the madness truly begins, you know you have to decide what you want the world to see. If you're going to connect with ${reportername} to broadcast your actions inside the Devoid, now's the time to start.\n\t*goto justfamechoice\n\n*label justfamechoice\n\n*if warningsys\n\t\"Make this decision with your Fame and Justice habits in mind,\" MeChip ${chipname} appears to warn you.\n\t*goto famejustreport\n*else\n\t*goto famejustreport\n\n*label famejustreport\n*choice\n\t#Allow footage to be broadcast live so I can achieve maximum exposure.\n\t\t*set fame %+25\n\t\tNow is your moment to seize the spotlight and cement your fame, once and for all.\n\t\t\n\t\t*if (fame > 60)\n\t\t\t*set legend +5\t\n\t\t\tSince this decision is in line with your mostly fame-seeking ways, you're sure to receive a Legend boost when the footage hits the public.\n\t\t\t*goto activatecameras\n\t\t*else\n\t\t\t*set legend -5\n\t\t\tHowever, since this decision isn't line with your usually justice-seeking ways, you're expecting a small hit to your Legend Level when the footage hits the public.\n\t\t\t*goto activatecameras\n\t#Allow footage to be broadcast live so I can expose the Devoid's injustices.\n\t\t*set fame %-20\n\t\tYou don't care how you end up looking, all that matters is showing the world what truly happens inside Victon's favorite little horror show, the Devoid.\n\n\t\t*if (fame \u003c 40)\n\t\t\t*set legend +5\n\t\t\tSince this decision is in line with your justice-seeking ways, you're sure to receive a Legend boost when the footage hits the public.\n\t\t\t*goto activatecameras\n\t\t*else\n\t\t\t*set legend -5\n\t\t\tHowever, since this decision isn't line with your usually fame-boosting ways, you're expecting a small hit to your Legend Level when the footage hits the public.\n\t\t\t*goto activatecameras\n\t#Don't broadcast a slugging thing. This is about doing what's right and standing up for what I believe in. That should send all the message I need.\n\t\t*set fame %-25\n\n\t\t*if (fame \u003c 40)\n\t\t\t*set legend +5\n\t\t\tSince this decision is in line with your justice-seeking ways, you're sure to receive a Legend boost among the heroic community.\n\t\t\t*goto nocameras\n\t\t*else\n\t\t\t*set legend -5\n\t\t\tHowever, since this decision isn't line with your usually fame-boosting ways, you're expecting a small hit to your Legend Level.\n\t\t\t*goto nocameras\n\t#Don't broadcast anything, because I'll become way more infamous if word of my actions spreads through heroic community on its own.\n\t\t*set fame %+20\n\n\t\t*if (fame > 60)\n\t\t\t*set legend +5\t\n\t\t\tSince this decision is in line with your fame-seeking ways, you're sure to receive a Legend boost among the heroic community.\n\t\t\t*goto nocameras\n\t\t*else\n\t\t\t*set legend -5\n\t\t\tHowever, since this decision isn't line with your usually justice-seeking ways, you're expecting a small hit to your Legend Level.\n\t\t\t*goto nocameras\n\n*label activatecameras\n\n*if reporterarrested\n\t\"I think that's a very wise decision,\" ${reportername} says, blinking several times. Without any proper recording devices in here, you guess she's going to have to rely on her natural reporting Powers.\n\n\tYou nod at ${reportername}, confident in your decision. Then you turn your attention to your next destination: \n\n\tThe Maximum Security & Infini Wing, where you're hoping to find your parents.\n\t*goto choicethree\n*else\n\tYou command MeChip ${chipname} to record everything and send the feed directly to ${reportername}, wherever she is. Recording with your MeChip like this will give up your GPS position, but that seems rather a moot point now that you're smack in the center of the Devoid.\n\n\tConfident in your decision, you push through to the Maximum Security & Infini Wing.\n\t*goto choicethree\n\n*label nocameras\n\n*if reporterarrested\n\t\"I don't think that's a very wise decision,\" ${reportername} says. \"But I'm not exactly in a position to argue.\"\n\n\t\"No, you're not,\" you say. \"So let's keep moving.\"\n\n\tWith that settled, you turn your attention to your next destination: \n\n\tThe Maximum Security & Infini Wing, where you're hoping to find your parents.\n\t*goto choicethree\n*else\n\tConfident in your decision, you push through to the Maximum Security & Infini Wing.\n\t*goto choicethree\n\n*label choicethree\n*page_break\n\nThere are dozens of unique cells in this wing, each tailored specifically to hold its high-risk inhabitant. The sight of them all sends a chill up your spine—you can think of few things worse than being trapped in a cell like this, deprived of your Powers.\n\nYour eye is first drawn to a cell suspended in midair—it appears to be made of a zero-gravity steel cage and pure energy windows. Which makes it the perfect prison for a telekinetic, since there's nothing to mind-move.\n\nAnd sure enough, you spot The Crush sitting inside this cell.\n\n\"${codename}, it's good to see you,\" The Crush says from his spot on the floor, his usually vibrant eyes eerily dull. \"Though if you're here, I can only imagine how dire things must have grown. I'm sorry to say it, but they already moved your parents hours ago.\"\n\nThe Crush's words cut you like a knife. You were hoping that your parents would be here and this could all be over quickly. Though you suppose you should have known better, after all that has happened. You're going to have to fight to keep your parents alive…assuming they're still alive in the first place.\n\n*page_break\n\n\"If you'll have me, I'd like to help you save them,\" The Crush says, standing and walking to the edge of his cell. \"If you don't believe me, my own execution is scheduled for next week. So you can trust that I'll do whatever you need to bring Victon's world tumbling down.\"\n\nHowever you feel about The Crush and what he has done in his life, you know that he was framed in The Hero Project and placed in the Devoid unjustly, at least this time around. Besides, you need all the firepower you can muster right now, not to mention someone who knows their way around this slugging hellhole.\n\nSo how are you going to bust The Crush out of his maximum security cell?\n\n*if warningsys\n\t\"Make this decision with your Unleash and Control habits in mind,\" MeChip ${chipname} appears to warn you.\n\t*goto bustcrush\n*else\n\t*goto bustcrush\n\n*label bustcrush\n*choice\n\t#Completely destroy The Crush's cell by unleashing my Powers. (Power Cost 10-20)\n\t\t*set unleash %+25\n\n\t\tWithout flinching, you raise your hand and wipe to the side, unleashing a fury of anti-gravity and atomic energy that obliterates the cell around The Crush like paper.\n\n\t\t*if (unleash > 75)\n\t\t\t*set offensive %+15\n\t\t\tThis display works perfectly, thanks to all your practice unleashing your Powers.\n\t\t\t*goto choicefour\n\t\t*else\n\t\t\t*set offensive %+5\n\t\t\t*set health -15\n\t\t\tThough since you're not used to unleashing your Powers this much, you are caught off guard when some of the rogue debris from the cell begins to crash around you. You jump back, but not before getting clipped by some of the raining shards.\n\t\t\t*goto choicefour\n\t#Disarm The Crush's cell by controlling its energy and gravity elements. (Power Cost 10-20)\n\t\t*set unleash %-25\n\n\t\tClosing your eyes, you pinpoint the cell's gravity and energy systems and disarm them with a thought. When you open your eyes, The Crush floats out of his cell with ease.\n\n\t\t*if (unleash \u003c 25)\n\t\t\t*set offensive %-15\n\t\t\tThanks to all your practice controlling your Powers, this move works perfectly.\n\t\t\t*goto choicefour\n\t\t*else\n\t\t\t*set offensive %-5\n\t\t\t*set health -15\n\t\t\tBut then the gravity core explodes and knocks you back unexpectedly. You shake this hit off, but you know this probably backfired slightly since you're not used to controlling your Powers this much.\n\t\t\t*goto choicefour\n\t#Destroy The Crush's cell with one focused, mega-nuclear Infini blast. (Power Cost 10-20)\n\t\t*set health -10\n\t\tYou build up a powerful energy surge, then focus it into one blast that rips through The Crush's cell like paper. \n\n\t\tThe Crush will be able to float out through the hole with ease, but you're distracted as some of the rogue debris from the cell begins to crash around you. You jump back, but not before getting clipped by some of the raining shards.\n\t\t*goto choicefour\n\n*label choicefour\n*if (powerregain > 16)\n\t*set power -10\n\t*goto freevillains\n*else\n\t*set power -20\n\t*goto freevillains\n\n*label freevillains\n*page_break\n\n\"Many thanks,\" The Crush says as he lands next to you. \"It would appear that the Devoid's Power dampeners are malfunctioning, but I assume I can thank you for that treat?\"\n\nYou hear The Crush, but you're too distracted by another malfunction—whatever you did to burst open The Crush's cell seems to have had a domino effect. You can see that some of the other unique cells are beginning to deconstruct.\n\n\"Who else is in this wing?\" you ask.\n\n\"Far too many innocent Infini Powereds, I can tell you that,\" The Crush starts. \"But for every one of them, there's also a dangerous criminal to match. I'm pretty sure The InfraOrder are somewhere in here, as well.\"\n\nYou turn back to the cells, knowing you don't have the time to curate who stays put and who escapes. So what should you do?\n\n*if warningsys\n\t\"Make this decision with your Lawless and Lawful habits in mind,\" MeChip ${chipname} appears to warn you.\n\t*goto freeblock\n*else\n\t*goto freeblock\n\n*label freeblock\n*choice\n\t#Let the prisoners all go free, good and bad, to cover my mission here with a distraction and send a message to the world about what happens when they mess with Powered individuals.\n\t\t*set lawless %+25\n\t\t*set fame %+15\n\n\t\t*label thecellblocklawless\n\t\t*set freecellblock true\n\n\t\t\"Let them go,\" you say. \"We have other inmates to attend to.\"\n\n\t\tYou turn to leave, not waiting for a second opinion—or to see who gets freed. You're here to challenge the way of things and that's exactly what you've done here.\n\n\t\t*if (lawless > 60)\n\t\t\t*set feared %+15\n\t\t\t*set legend +5\n\t\t\tSince this decision is in line with your usually lawless ways, you're sure to receive a Legend boost for this bold move.\n\t\t\t*goto choicefive\n\t\t*else\n\t\t\t*set feared %+5\n\t\t\t*set legend -5\n\t\t\tHowever, since this decision isn't line with your usually lawful ways, you're expecting a small hit to your Legend Level for this bold move.\n\t\t\t*goto choicefive\n\t#Let them all go free, good and bad, to save them from future IRP and Devoid mistreatment.\n\t\t*set lawless %+20\n\t\t*set fame %-15\n\t\t*goto thecellblocklawless\n\t#Put everyone back in the cells before they can escape, because it's not my place to decide their fate, good or bad.\n\t\t*set lawless %-25\n\t\t*set fame %-15\n\n\t\t*label thecellblocklawful\n\n\t\t\"Crush, use your Powers to place them all back,\" you say. \n\n\t\tWhen The Crush turns to you to question your order, you simply add: \"Your telekinesis will be more effective than my Power set. And we have other inmates to free.\"\n\n\t\tWith that, you end the conversation. Because you're here to right many wrongs, not to free dangerous criminals you helped place here in the first place.\n\n\t\t*if (lawless \u003c 40)\n\t\t\t*set feared %-15\n\t\t\t*set legend +5\n\t\t\tSince this decision in line with your usually lawful ways, you're sure to receive a Legend boost for this difficult choice.\n\t\t\t*goto choicefive\n\t\t*else\n\t\t\t*set feared %-5\n\t\t\t*set legend -5\n\t\t\tHowever, since this decision isn't line with your usually lawless ways, you're expecting a small hit to your Legend Level for this difficult choice.\n\t\t\t*goto choicefive\n\t#Put everyone back in the cells before they can escape, because it's most important to be seen stopping villains.\n\t\t*set lawless %-20\n\t\t*set fame %+15\n\t\t*goto thecellblocklawful\n\n*label choicefive\n*page_break\n\nAs you move through the Devoid with \n*if reporterarrested\n\tThe Crush and ${reportername},\n\t*goto youwatchthru\n*else\n\tThe Crush,\n\t*goto youwatchthru\n\n*label youwatchthru\nyou watch through an invisible wall as the high-tech, well-equipped Devoid guards try to take you down with all the force they can muster. \n\nWhen the guards finally did reach you a few minutes ago, you were about to throw up a shield when The Crush asked if he might provide a telekinetic bubble-shield instead. He wanted to \"stretch his Powered legs\" after such a long period of being denied the use of his Powers.\n\nWhich is just as well, because as you reach your final destination inside the Devoid, you realize that you're probably going to need the extra Power you saved up…\n\n*page_break\n\nSince the entire Millennial Group has been detained in adjoining units in their own cell block. The Diva, Processor, Monk, Heela, Static, and Lucky are all imprisoned in individual Power dampening cells connected in one big containment unit.\n\nAs the Devoid guards keep pouring in from all around you, you know it won't be long before some truly heavy artillery shows up to stop you, especially after your public announcement. There's no time to free each Millennial Group member individually, so what are you going to do set them loose?\n\n*if warningsys\n\t\"Make this decision based on your final Power Regain Point tally,\" MeChip ${chipname} says, popping up to warn you.\n\t*goto freemg\n*else\n\t*goto freemg\n\n*label freemg\n*choice\n\t#Take advantage of my high Power Regain return by grav-lifting the entire cell block back outside. (Power Cost 10)\n\t\t*if (powerregain > 16)\n\t\t\t*set power -10\n\t\t\t*set unleash %+15\n\t\t\t*set offensive %-15\n\t\t\t*set soloist %+15\n\t\t\t*goto gravlifecells\n\t\t*else\n\t\t\t*set power -30\n\t\t\t*set unleash %+5\n\t\t\t*set offensive %-5\n\t\t\t*set soloist %+5\n\n\t\t\tIt costs way more Power than you expect because of your lower Power Regain return, but you strain to pull the move off anyway.\n\n\t\t\t*label gravlifecells\n\n\t\t\tYou eliminate gravity of the entire cell so that it rockets upwards, straight through the roof. It must not be a fun ride for The Millennial Group, but you know they're all tough enough to handle it.\n\n\t\t\tFlying up beside the hovering cellblock, you continue to manipulate gravity to move the cells to the back of the Devoid, while The Crush shields you.\n\t\t\t*goto moveoutside\n\t#Don't push my Power Regain return and instead force the Devoid guards to open the cells with precise gravity manipulations. (Power Cost 10)\n\t\t*if (powerregain > 16)\n\t\t\t*set power -30\n\t\t\t*set unleash %-5\n\t\t\t*set offensive %+5\n\t\t\t*set soloist %+5\n\n\t\t\tIt costs way more Power than you expect, but you strain to pull the move off anyway.\n\n\t\t\t*label forceguardsopen\n\n\t\t\tYou choose one of the Devoid guards and focus all of your Power on him, using gravity to push him towards the cellblock. While The Crush continues to shield you, you then use precise gravity manipulations to move the guard's limbs and open each of the cells with his keycode fingerprint access.\n\n\t\t\tOnce the entire Millennial Group is freed, you have The Crush telekinetically lift you all outside.\n\t\t\t*goto moveoutside\n\t\t*else\n\t\t\t*set power -10\n\t\t\t*set unleash %-15\n\t\t\t*set offensive %+15\n\t\t\t*set soloist %+15\n\t\t\t*goto forceguardsopen\n\t#Ask The Crush to help with his telekinesis so I can save my own Power.\n\t\t*set soloist %-15\n\t\t*set legend -10\n\n\t\tAs The Crush telekinetically lifts the entire cellblock out to the back of the Devoid, you go along for the ride and conserve your Power. \n\n\t\tThis might be a smart move for the upcoming battle, but it's not exactly one worthy of Legend.\n\t\t*goto moveoutside\n\n*label moveoutside\n*page_break\n\nWith The Millennial Group freed, you gather behind the Devoid to regroup.\n*if luckycomaspouse\n\tThough before you start planning, you make sure to grab your ${bmfriend} Lucky and give ${luckyhir} a long kiss. \n\n\t*goto whatwasthatfor\n*elseif luckyromancefinale\n\tThough before you start planning, you make sure to grab Lucky and give ${luckyhir} a long kiss. At first ${luckyze} is caught off guard, but ${luckyze} quickly leans into it.\n\n\t*label whatwasthatfor\n\t*achieve luckyfinale\n\t\"What was that for?\" ${luckyze} asks when you finally let go.\n\n\t\"Who knows how this last battle is going to turn out,\" you say. \"I just wanted to make sure I did that while I still had the chance.\"\n\n\t\"Well if that's what's waiting for me on the other end of this thing,\" Lucky starts, \"then I will make damn sure we slugging win.\"\n\t*page_break\n\t*goto whatstheplan\n*elseif luckybreakup\n\tYou try to catch Lucky's eye while you have a moment, but ${luckyze} looks anywhere but at you—which makes sense, since you just broke up last night.\n\n\tStill, that doesn't make it sting any less.\n\t*page_break\n\t*goto whatstheplan\n*else\n\t*goto whatstheplan\n\n*label whatstheplan\n\n\"So what's the plan?\" The Diva asks, all business as usual.\n\n\"The plan is that we find President Victon and my parents and we end this,\" you say. \"Plain and simple.\"\n\n\"Well, locating them shouldn't prove too difficult,\" Processor says, pointing her spindly finger away from the Devoid.\n\nIn the distance, past a massive field, you see a large erected stage, one that appears to be heavily shielded. You immediately know that must be where Victon plans to execute your parents.\n\n*page_break\n\nFlying forward without another word, your trust your allies to all find a way to follow you. \n\nAs you approach the field, you see that not only is President Victon's stage shielded, it's also heavily guarded. In the field you can make out many more Devoid guards, a veritable PowerBreaker Battlesuit Police Army, Meek Movement MeChip Agents and The American Protectorate, to name just a few. \n\nWhat's more, there also seem to be dozens more Powered heroes and hundreds of unPowered citizens there to support Victon's cause. Now you know why you faced so little resistance inside the Devoid—all of your biggest enemies seem to be gathered out here already.\n\nIf this sight wasn't chilling enough, as you get close enough to see President Victon's stage, you size up its inhabitants: Commander Constance Obach stands surrounded by many Meek lieutenants, right next the First Family themselves: Mrs. Victon, President Victon, and Jury, who must have been teleported or hover-lifted over right after you saw him at the hospital. \n\nThe First Family are also surrounded by dozens of Secret Service agents and they all stand in front of a giant cell that holds…\n\nYour parents.\n\n*page_break\n\nSeeing your parents in person, handcuffed and detained like this, surges so many emotions through you that you almost drop out of the sky. But you steady your course, because you know that it's up to you to save them. \n\nThough so much stands in the way of you doing so, you also know that you'll have to be at your best to defeat the forces that stand tall against you.\n\nAs you reach the edge of the field where Victon's supporters gather in front of the stage, you see an entirely different crowd, one blocked off behind a massive energy fence…\n\nA crowd of protesters, there to support you. \n\nAt the head of the pack, you spot\n*if reporterarrested\n\tGrandma and Officer Sanders, both decked out for war and covered with weapons.\n\t*goto flydown\n*else\n\tGrandma, Officer Sanders, and ${reportername}, all decked out for war and covered with weapons.\n\t*goto flydown\n\n*label flydown\n*page_break\n\nYour heart swelling, you fly down behind the fence to join Grandma, caught off guard by the bursts of applause and cheers that greet you as you land. \n\nIt looks like many of these people have been here for hours, obviously having planned to protest your parents' execution no matter what. \n*if pastayaway\n\tThough you also see several new faces arriving and think: [i]I warned everyone to stay away[/i].\n\n\tThis is about to be a war zone and they've come to ground zero. Whatever happens the them, it's on their heads now.\n\t*goto inthedist\n*else\n\tYou also see several new faces arriving, no doubt spurred on by the announcement you posted before breaking into the Devoid.\n\t*goto inthedist\n\n*label inthedist\n\nIn the distance, it looks like Victon's crowd is beginning to react to the arrival of you and your allies, so this reunion won't last very long.\n\nYou pull Grandma into a huge hug and say:\n\n*choice\n\t#\"I'm so glad you're here. I couldn't do this without you.\"\n\t\t*label granonceall\n\t\t\"We're ending this,\" Grandma says in your ear. \"Once and for all.\"\n\t\t*goto gghasperhaps\n\t#\"I love you, but what the slugger are you doing here?\"\n\t\t*label noarguments\n\t\t\"We're ending this, once and for all,\" Grandma says in your ear. \"And we're doing it together. So I don't want to hear any arguments about it.\"\n\t\t*goto gghasperhaps\n\t#\"${ring_lyric}.\"\n\t\t*goto granonceall\n\t*if (soloist > 60) #\"You shouldn't be here! It's too dangerous!\"\n\t\t*goto noarguments\n\n*label gghasperhaps\n\nYou let Grandma go, both terrified and warmed to have her here. Though she's right, you all deserve to finish this thing. Together.\n\nSo you turn to Officer Sanders and say: \"Thank you for keeping Grandma safe. And for being here now.\"\n\t\n\"My pleasure,\" Officer Sanders says, lifting one of the many guns he has brought in a show of support.\n\n*if (reporterarrested)\n\t*goto ggrollcallaaba \n*else\n\tThen you turn to ${reportername} and say: \"Thank you too, for everything.\"\n\n\t*if choose_reporter\n\t\t\"We started this together, so we're going to finish this together, for better or worse,\" Sonja says, nodding at you. \t\n\t\t*goto ggrollcallaaba \n\t*else\n\t\t\"Don't thank me, I'm here because it's the right thing to do,\" Juhi says. \"And because it's what Sonja would have wanted. Now what's next?\"\n\t\t*goto ggrollcallaaba \n\n*label ggrollcallaaba\n*page_break\n\n\"Wait, where's Jenny?\" Grandma suddenly asks, looking around. \"I don't see her in your group there.\"\n\n*if jennydead\n\t\"Jenny didn't…\" you start to say, your voice cracking. Luckily you don't have to finish, because Grandma can read it all over your face.\n\n\tFor a moment, it looks like Grandma might break. Then she steels herself, standing up a little taller.\n\n\t\"Then we'll just have to win this one in Jenny's honor, won't we?\"\n\n\tYou nod at Grandma, thinking you couldn't have said it better yourself.\n\t*goto thanyounotice\n*else\n\t\"Jenny was injured along the way,\" you explain, \"but she's fine. She's safe and recovering right now. So let's win this one for her sake?\"\n\n\tGrandma nods, looking relieved.\n\t*goto thanyounotice\n\n*label thanyounotice\n*page_break\n\n*if ggfinaleally\n\tThen, behind Grandma and Officer Sanders, you notice GG sitting in a brand-new, tank-like people mover, decked out in a camouflage muumuu. \n\t*if bearmachgirlhelp \n\t\tBehind him stand The Bear and Mach Girl, suited up and ready for battle.\n\n\t\t*label ggdontpay\n\n\t\t\"Don't pay us any special attention,\" GG says. \"We talked it over and we're here to support you, just like we always have. Now go ahead, my genial general, command your army!\"\n\t\t*goto commandthatarmy\n\t*elseif (fumbleluckyhelp) or (fumblehelp)\n\t\tBehind him stands Fumble, suited up and ready for battle.\n\t\t*goto ggdontpay\n\t*else\n\t\t\"Don't pay me any special attention,\" GG says. \"I'm here to support you, just like I always have. Now go ahead, my genial general, command your army!\"\n\t\t*goto commandthatarmy\t\n*else\n\t\"We don't have much time,\" Officer Sanders says. \"So what do you want to do with your army, General?\"\n\t*goto commandthatarmy\n\n*label commandthatarmy\n\nAs you raise your gaze, you see that there are hordes of Powered heroes here to fight for you. You thought you'd just have The Millennial Group, \n*if luckycomaspouse\n\tyour ${bmfriend} Lucky,\n\t*goto endallylist\n*else\n\t*goto endallylist\n\n*label endallylist\nThe Crush, and your family to rely on, but as you look over the ranks gathered here, your heart nearly explodes. Especially as you recognize dozens of familiar faces, including the Molten Ladies, Skua, Johnny Biscotti, Galexa, and many, many more.\n\nAs amazing as this feels, you can't help but feel a tiny sting, because…\n\n*choice\n\t#I thought Prodigal would be here, for sure.\n\t\tEspecially because you need Prodigal to prove to the world who President Victon really is.\n\t\t*if (prodigalgirlfriend) or (prodigalfinalally)\n\t\t\tThough you suppose this fight is really just beginning—there may still be time for Prodigal to show up and help you finish things.\n\n\t\t\tKnowing her, she won't be able to resist having a part in this grand finale.\n\n\t\t\tYou hope.\n\t\t\t*page_break\n\t\t\t*goto armyofme\n\t\t*else\n\t\t\tThough given how you left things with Prodigal, you shouldn't really be surprised that she isn't here to support you.\n\n\t\t\tYou just hope she won't be able to resist having a part in this grand finale.\n\t\t\t*page_break\n\t\t\t*goto armyofme\n\t#I expected Black Magic to finally show some support.\n\t\t*if ((bmcomaspouse) or (bmfinaleromance)) or (bmfinalefriend)\n\t\t\tThough you suppose this fight is really just beginning—there may still be time for Black Magic to show up and help you finish things.\n\n\t\t\tYou hope.\n\t\t\t*page_break\n\t\t\t*goto armyofme\n\t\t*else\n\t\t\tThough given how you left things with Black Magic, you shouldn't really be surprised.\n\t\t\t*page_break\n\t\t\t*goto armyofme\n\t*if (ggfinaleally = false) #I was hoping that GG and some of The Hero Project cast members might show up.\n\t\tThough given your past with them, it's not really that surprising, you suppose.\n\t\t*page_break\n\t\t*goto armyofme\n\t#I just wish Jenny could be here.\n\t\t*if jennydead\n\t\t\tYou're still going to finish this fight for Jenny. Period.\n\n\t\t\tIt's the only way you can truly honor her memory.\n\t\t\t*page_break\n\t\t\t*goto armyofme\n\t\t*else\n\t\t\tHaving Null here, bionic upgrades or not, would have been a major advantage. Still, you're going to find a way to finish this fight without Jenny. \n\n\t\t\tYou just hope you can do her proud. \n\t\t\t*page_break\n\t\t\t*goto armyofme\n\t*if (soloist \u003c  60) #There's no sting. I'm proud of the army of supporters I've built.\n\t\t*set soloist %-15\n\t\t*goto armyofme\n\t*if (soloist > 40) #There's no sting. I don't need any more allies to end this.\n\t\t*set soloist %+15\n\t\t*goto armyofme\n\n*label armyofme\n\nAs you turn towards Victon's forces with your own army at your back, you feel a surge of adrenaline hit your system. It's so strong, you can feel it boosting your Power Level.\n\n*if (powerregain > 16)\n\t*set power +10\n\t*goto seevicton\n*else\n\t*set power +35\n\tYou may have had a lower Power Regain return, but it's because you often prioritized working with your allies over using your Powers. So having this many at your back definitely helps to surge your Power higher.\n\t*goto seevicton\n\n*label seevicton\n\nWhich is good, because you know that you're going to need all the Power you can get. You just hope that, after your performance breaking your allies out of the Devoid, your Levels will be high enough to survive. You have a feeling that the difference between life and death in this upcoming battle could all boil down to a few simple mistakes. \n\nSo you're going to have to be pretty slugging near flawless to win this thing.\n\n*page_break\n\nAs President Victon's forces finally surge forward, your own forces ready themselves. With dozens of camera orbs suddenly rolling out to capture the battle, you fire a rallying blast into the sky.\n\nAnd with this first shot fired, the final Devoid War begins.\n\n*finish Next Chapter: Finite\n", "chap_three": "*comment é\n\n*text_image chap_3.png center Mindmaze\n\n\n\"Prodigal, what the slugger is wrong with you?\"\n\nThe words slip out of your mouth before you can form a coherent thought. Though the moment you do, you realize that\n*if choose_reporter\n\tyou need to get the gag off of Sonja right away. You have no idea why Prodigal kidnapped her again, but your first priority must be getting her free.\n\n\t\"See, I meant to explain this before we arrived,\" Prodigal sighs as you untie Sonja. \"I meant Sonja no harm this time around. I just need her here to—\"\n\n\t*set reportername \"Sonja\"\n\t*goto prodpunch\n*else\n\tthis woman isn't Sonja—she just looks an awful lot like her, right down to the black clothing, gold jewelry, and braid-bun. You have no idea why Prodigal has kidnapped this woman, but your first priority is getting her free. \n\n\t\"See, I meant to explain this before we arrived,\" Prodigal sighs as you pull off the ropes. \"That's Juhi Challa, Sonja's sister. But I promise I mean her no harm, I just need her here to—\"\n\t*set reportername \"Juhi\"\n\t*goto prodpunch\n\n*label prodpunch\n\nBut ${reportername}'s fist connects with Prodigal's jaw before she can finish speaking.\n\n*page_break\n\n*if choose_reporter\n\t\"You bring me here again after what you did to me?\" Sonja screams. \"I will kill you!\"\n\n\tYou watch as Sonja lunges for Prodigal's throat, still trying to process what she's even doing here. \n\t*goto morefight\n*else\n\t\"You bring me here after what you did to my sister?\" Juhi screams. \"Do you know how many times I've dreamed of killing you?!\"\n\n\tYou watch as Juhi lunges for Prodigal's throat, still trying to wrap your head around the fact that Sonja even has a sister. \n\t*goto morefight\n\n*label morefight\nBut as ${reportername} grabs Prodigal, you figure you should decide whether you need to step in.\n\n*choice\n\t#Restrain ${reportername}. I don't have any time to waste.\n\t\t*set freedom %-10\n\t\t*set rlshp_prodigal %+5\n\t\t*label holdherback\n\t\tYou rush forward and peel ${reportername} off of Prodigal, restraining both arms behind her back. \n\t\t*goto murderouscow\n\t#Let ${reportername} get in a few good shots before stopping her.\n\t\t*set freedom %-5\n\t\t*set rlshp_prodigal %-5\n\n\t\t${reportername} kicks Prodigal in the stomach, then knees her in the chin—it looks like she has definitely had some self defense training. Once Prodigal is on the floor, ${reportername} jumps on top of her.\n\n\t\tAs much as you are enjoying this display, you decide it's time to intervene.\n\t\t*goto holdherback\n\t#Let ${reportername} go to town.\n\t\t*set freedom %+10\n\t\t*set rlshp_prodigal %-10\n\n\t\t${reportername} kicks Prodigal in the stomach, then knees her in the chin—it looks like she has definitely had some self defense training. Once Prodigal is on the floor, ${reportername} jumps on top of her.\n\n\t\t\"I'm of no use to anyone dead,\" Prodigal chokes out between ${reportername}'s strikes. \n\n\t\tAs much as you hate to admit it, Prodigal is right.\n\t\t*goto holdherback\n\n*label murderouscow\n\n\"I will decimate you, you murderous cow!\" ${reportername} screams, flailing in your arms. \n*if (kill_save) or (kill_town)\n\t*set kill_prodigal true\n\t\"I don't know how you're still alive, but I will make you die a thousand deaths!\"\n\t*goto youdareto\n*else\n\t\"Prison can't hold you? Fine! I'll finish this!\"\n\t*goto youdareto\n\n*label youdareto\n*page_break\n\n${reportername} is lost in full-on rage mode. And who can blame her, since this must have been the lair where Prodigal\n*if choose_reporter\n\ttook Sonja, back on the night of the Hero of Tomorrow ceremony.\n\t*goto wellgood\n*else\n\tkilled Sonja.\n\t*goto wellgood\n\n*label wellgood\n\n\"That's all well and good,\" Prodigal coughs, \"but notice how I let ${firstname} here untie you? And how I didn't fight back just now? I'm not going to hurt you. I need your help.\"\n\n\"You need my help? You need my help?!\" ${reportername} screams. \"I will end you!\"\n\n\"I admit, it's an unlikely scenario,\" Prodigal tries. \"But there was no one else to call on with such short notice. We need your unique skill set.\"\n\n\"Hey crazyface,\" you cut in. \"Did you ever think kidnapping and restraining ${reportername} might not have been the best way to 'call on' her?\"\n\n\"Well, I don't…\" Prodigal mutters, shrugging. \"Old habits?\"\n\n*page_break\n\n\"And what the slugger are you doing here with her?\" ${reportername} says, twisting to face you.\n*if choose_reporter\n\t*goto understandupset\n*else\n\t\"Don't you think for a second I forgive your part in this.\"\n\n\tSlugger, that one stings. If you were wondering why you haven't heard from Sonja's sister since she died, you just got your reason.\n\t*goto understandupset\n\n*label understandupset\n\n\"I understand that you're upset,\" you say. \"But I swear I'm here for a very good reason.\"\n\n\"Yes, little lamb, and if you simmer down you'll see I've got quite the journalistic opportunity for you,\" Prodigal cuts in. \"For it seems that we three musketeers have at least one common goal right now: taking down The Meek movement and President Victon.\"\n\nHearing this, ${reportername} pauses. \n*if choose_reporter\n\tLast you had heard, Sonja was doing some deep undercover reporting on The Meek movement. So it's no surprise this catches her attention.\n\n\t\"You had better explain yourselves,\" Sonja says, breaking free of your grasp and crossing her arms. \"Now.\"\n\t*goto explained\n*else\n\n\t\"I know you've been doing some deep undercover reporting against The Meek movement,\" Prodigal adds. \"You and your sister always had different ideas of what constituted journalistic integrity, didn't you?\"\n\n\t\"Don't you ever talk to me about my sister, you witch,\" Juhi says, breaking free of your grasp. You move to stop her, but she just crosses her arms and looks from you to Prodigal. \n\n\t\"You had better explain yourselves. Quickly.\"\n\t*goto explained\n\n*label explained\n*page_break TEN MINUTES LATER\n\nProdigal has been walking ${reportername} through everything she has already told you. While ${reportername} hasn't exploded into another rage, she still looks very unsettled. You can't really blame her, because you are equally unsettled.\n\nBeing here in this place turns your stomach for more reasons than you care to count. Your eyes have been wandering around Prodigal's base and you find that you're most creeped out by:\n\n*choice\n\t#Those pictures of me lining the walls.\n\t\t*goto terry\n\t#The video feeds to my old apartment, filming the new residents.\n\t\t*goto terry\n\t*if (sparrow) #A spare Sparrow feather-suit hanging on the wall.\n\t\t*goto terry\n\t*if (tarana) #A holo-stick labeled [i]Tarana Rain Blackmail File[/i].\n\t\t*goto terry\n\t*if (pressie) #A spare Pressie costume hanging on the wall.\n\t\t*goto terry\n\t#A Miss Artillery action figure.\n\t\tThough seeing this makes you realize how much Prodigal must miss her mother. Oddly, that's something you can relate to.\n\t\t*goto terry\n\n*label terry\n\nThen your eyes settle on a cage in the corner and they nearly bulge out of your head, because sleeping inside is what looks like a pterodactyl-parrot dino-hybrid. The last time you might have seen a pterrot like that was in Trackr's apartment… could it possibly be the same one?\n\nYou begin to sort through the many reasons that keeping a dino-hybrid in a lair like this is insane, but you're interrupted as ${reportername} finally speaks.\n\n\"So why do you need me?\" she asks flatly.\n\n\"Well, you see,\" Prodigal starts. \"I've done some things in my past that might make a select few question the integrity of my word….\"\n\n*if choose_reporter\n\tYou and Sonja share a look: [i]that's an understatement[/i].\n\t*goto soineedyouto\n*else\n\tYour eyes meet Juhi's and you actually seem to share a moment: [i]that's an understatement[/i].\n\t*goto soineedyouto\n\n*label soineedyouto\nIgnoring this, Prodigal moves on:\n\n\"I need you to use your investigative Powers to take ${firstname} through my memories and let ${youhir} see for ${youhir}self that I'm not lying about any of this.\"\n\n\"Wait, you can do that?\" you ask, turning to ${reportername}.\n\n*page_break \n\n*if choose_reporter\n\t\"I like to keep my full Power set a secret. Or at least I try to,\" Sonja says, with death eyes on Prodigal.\n\t*goto whatbetter\n*else\n\t\"Yes,\" Juhi says, without followup. \n\n\tNo wonder both of these sisters became reporters: Sonja had a full range of photographic and tracking Powers, but it sounds like Juhi's Powers go even deeper than that.\n\t*goto whatbetter\n\n*label whatbetter\n\n\"Who better to verify my story than someone who hates my guts, has no incentive to lie on my behalf, and who ${firstname}\n*if choose_reporter\n\talready trusts,\" Prodigal finishes.\n\t*goto looksatyoushrug\n*else\n\tis inclined to trust,\" Prodigal finishes.\n\t*goto looksatyoushrug\n\n*label looksatyoushrug\n\n${reportername} turns to you and you sigh. She looks like entering Prodigal's mind is the last thing she'd ever want to do, and you don't disagree.\n\n\"I'm…ugh, look, I'm sorry I brought you here against your will,\" Prodigal says, gnashing her teeth like she's forcing every word through her lips. \"But you're free to go whenever you please. Our time is short, so if you're not going to help…\"\n\n${reportername} clenches her jaw, still looking undecided. You consider what Prodigal has just said—if you could really verify that Prodigal is telling the truth about Miss Artillery, that would be one less concern you have to worry about moving forward. \n\nSo you turn to ${reportername} and say:\n\n*choice\n\t#\"Please. I need to know if Prodigal is lying if I'm going to have any shot of saving my parents.\"\n\t\t*set freedom %-5\n\t\t*set revenge %-5\n\t\t*set rlshp_prodigal %+5\n\t\t*goto fineilldoit\n\t#\"If we find out Prodigal is lying, I'll kill her for you.\"\n\t\t*set lawless %+5\n\t\t*set revenge %+5\n\t\t*set freedom %+5\n\t\t*set rlshp_prodigal %-5\n\t\t*goto fineilldoit\n\t#\"I'd never dream of asking this of you under any other circumstances, but you're here already. And I need you.\"\n\t\t*set freedom %-5\n\t\t*set revenge %-5\n\t\t*goto fineilldoit\n\t*if (choose_sidekick) #\"I know you don't know me, but Sonja believed in me.\"\n\t\t\"And look where that got her,\" Juhi shoots back, causing your heart to drop into your feet.\n\t\t*goto fineilldoit\n\t#\"Screw everything else, just think of the anti-Meek reporting opportunity you might have here.\"\n\t\t*set revenge %-10\n\t\t*goto fineilldoit\n\n*label fineilldoit\n\n${reportername} closes her eyes, obviously having an internal conversation with herself. Then she opens her eyes and looks directly at you.\n\n\"Fine, I'll do it,\" she finally says. \"But on one condition: after we're done, I want continued and unfettered access to report on your progress.\"\n\n\"You know we're fugitives now,\" you say. \"Associating with us will—\"\n\n\"I can take care of myself,\" ${reportername} cuts in. \"Do we have a deal?\"\n\nYou look to Prodigal and think, [i]what choice do you have?[/i] So you and Prodigal both nod.\n\n\"Then let's get to work,\" ${reportername} finishes.\n\n*page_break MINUTES LATER\n\nYou sit in a circle with ${reportername} and Prodigal, all holding hands.\n\n\"Everyone close your eyes and prepare your minds,\" ${reportername} says. \"This isn't an exact science, but if Prodigal focuses on the right memories, we should see only what we need to inside her thoughts. Are we ready?\"\n\n\"Yes,\" you say, suddenly experiencing a rush of dizziness. \n\n*page_break\n\nYou feel turned upside down, so you force your eyelids shut until the spinning stops. When it does, you open your eyes to find that you're in a submarine, one that sits cracked open on an airstrip. \n\nYou look around and realize you're in some kind of abandoned military base. Though \"looking\" isn't quite what you should call it. Your body isn't actually here, but you're somehow still aware of your surroundings. You feel like some kind of ghost, incorporeal and floating, and you can sense ${reportername} and Prodigal's presences nearby, too.\n\nThen you see the actual, physical Prodigal across the inside of the land-wrecked submarine and remember you're witnessing one of her memories.\n\n*page_break \n\n*label memoryscape\n\n\"This will do quite nicely, don't you think, Terry?\" Prodigal sings, twirling to pet a pterrot, which must be the same one you saw in her Fringe lair just now—it has the same raw pink skin interspersed with colorful feathers. Terry the pterrot screeches and tries to scratch Prodigal with a clawed wing, but her wingspan is too short and Prodigal easily sidesteps the swipe.\n\n\"Who'd have thought my Death Wave would clear out so much lovely abandoned lairspace?\" Prodigal continues, while Terry limps alongside. Terry doesn't look so good, like she's sick or something. You're not surprised—if Prodigal is in the Big Sur wasteland, the levels of radiation here are bound to be highly toxic. Though you're not sure why it doesn't affect Prodigal…maybe she is somehow immune, since her Powers partially fueled the whole thing?\n\n\"Squawk. Warspace. Artillerywar,\" Terry suddenly croaks. \"Chickensblood. Squawk.\"\n\n*page_break\n\n\"What a stunning poem, my dear Terry!\" Prodigal chimes. \"You are without doubt the best addition to my ${familyname} castoff collection!\"\n\nProdigal smiles as she sits down at a computer console and you see that she has customized the panel. There are several re-rigged screens and processors attached to the console, probably salvaged from other abandoned crafts on this base.\n\n*if kill_prodigal\n\tAnd you can't help but notice Prodigal's infamous Death Wave suit in the corner, which you now realize has a holo-illusion panel attached to the front, simulating a gaping chest wound. So that's how Prodigal faked her death…\n\n\tLike mother, like daughter, you suppose.\n\t*goto wartime\n*else\n\tAnd you can't help but notice a video feed on one of the screens, which displays a prison cell that appears to be holding Prodigal in solitary confinement. You can't tell if the fake-prison Prodigal is some kind of holo-projection or a decoy, but knowing Prodigal's insane imagination, nothing would surprise you.\n\t*goto wartime\n\n*label wartime\n*page_break\n\n\"What a truly fitting home indeed, Terry,\" Prodigal hums, petting Terry's feathered neck as she perches beside the computer console. Terry tries to snap at Prodigal's fingers with her long beak, but Prodigal just dodges her attempts absent-mindedly. \n\n\"A military base befitting a queen, the perfect place to plot some fresh scheme. And since we both know my Powers only operate at their peak when I'm waging war,\" Prodigal says, looking down at her console controls. \"Let's start one anew, shall we?\"\n\n\"Squawk. Warlife. Murderwar.\"\n\nIgnoring Terry's croaks, you can't help but think:\n\n*choice\n\t#Learning that Prodigal needs to be at war for her Powers to work correctly explains so much.\n\t\t*set missileseq true\n\t\t*goto deathseqone\n\t#This military base lair can't be too far away from Culic's castle headquarters.\n\t\t*set hqseq true\n\t\t*goto deathseqone\n\t#Do Terry's ramblings actually mean anything?\n\t\t*set pterryseq true\n\t\t*goto deathseqone\n\n*label deathseqone\n\nAs this thought crosses your mind, you find yourself suddenly \n*if missileseq\n\tstanding inside a giant missile silo, with dozens of armed warheads, each striped red and named [i]Prodigy[/i].\n\t*goto reporterbody\n*elseif hqseq\n\tinside a ruined castle, with red-striped bombs littered across the swampy floor, all named [i]Prodigy[/i].\n\t*goto reporterbody\n*else\n\tinside a massive bird cage filled with sleeping pterrots. They all have red stripes painted up their torsos, just like Prodigal.\n\t*goto reporterbody\n\n*label reporterbody\n\nYou turn and see ${reportername} standing next to you, then look down and see your own body has appeared as well.\n\n*if choose_reporter\n\t\"What the slugger?\" ${reportername} says. \"We shouldn't be physically present. And where is Prod—\"\n\t*goto interruptedaddlate\n*else\n\t\"Wait a moment,\" ${reportername} says. \"We shouldn't be physically present. And where is Prod—\"\n\t*goto interruptedaddlate\n\n*label interruptedaddlate\n\nBut ${reportername} is interrupted as \n*if missileseq\n\tthe missiles all shift and lock in position—pointed at you.\n\n\t\"Nobody's supposed to be here,\" a robotic voice announces over a loudspeaker. \"Gimme one reason to stay here and I'll turn right back around.\"\n\t*goto boobytrapped\n*elseif hqseq\n\tthe bombs all suddenly activate and start counting down.\n\n\t\"Nobody's supposed to be here,\" a robotic voice announces from all of the bombs at once. \"Gimme one reason to stay here and I'll turn right back around.\"\n\t*goto boobytrapped\n*else\n\tall of the pterrots suddenly stir, turning to look at you.\n\n\t\"Nobody's supposed to be here,\" all of the pterrots squawk at once. \"Gimme one reason to stay here and I'll turn right back around.\"\n\t*goto boobytrapped\n\n*label boobytrapped\n*page_break\n\n\"Oh my god,\" ${reportername} whispers.\n\n\"Uh, ${reportername}?\" you ask. \"What is this?\"\n\n\"I saw that Prodigal's mind was fractured when we entered it, but I didn't think it would…\" ${reportername} trails off, her eyes growing wide as she looks around. \"I think Prodigal's mind is booby trapped, somehow. That slugging witch should have warned us that—\"\n\n\"What do we do?\" you interrupt, sensing that things are about to get very nasty, very quickly.\n\n\"I think…\" ${reportername} starts. \"Okay, Prodigal wants us in here so we see certain memories. So if we finish the tour according to her desires, her mind should let us go. But if we enter uninvited areas like this, we're going to have to clear them by tricking her mind into believing we belong here. Then we should be able to move on. I think.\"\n\n*page_break\n\n\"And if we don't?\" you ask.\n\n\"Prepare to die,\" Prodigal's  mindvoice chimes in.\n\n\"Uh, what she said,\" ${reportername} says, backing away. \"I don't think we can actually die, since we're not really here. But we can definitely get lost, bouncing from broken memory to broken memory forever.\"\n\nYou're not quite sure how any of this is possible, but you also don't have time to work it all out right now. Because being trapped and tortured in Prodigal's crazy mind forever sounds like the very definition of hell. \n\nSo how are you going to convince Prodigal's fractured mind that you're not a hostile entity? \n\n*choice\n\t#Repeat one of Terry's squawk croak keywords.\n\t\tYou try to repeat one of Terry's croak-words, paying careful attention to recreate an exact one-word phrase:\n\n\t\t*input_text squawkword\n\n\t\t*if (squawkword = \"Warlife\") or (squawkword = \"Murderwar\")\n\t\t\t*goto passone\n\t\t*elseif (squawkword = \"Warspace\") or (squawkword = \"Artillerywar\")\n\t\t\t*goto passone\n\t\t*elseif (squawkword = \"Chickensblood\")\n\t\t\t*goto passone\n\t\t*elseif (squawkword = \"warlife\") or (squawkword = \"murderwar\")\n\t\t\t*goto passone\n\t\t*elseif (squawkword = \"warspace\") or (squawkword = \"artillerywar\")\n\t\t\t*goto passone\n\t\t*elseif (squawkword = \"chickensblood\")\n\t\t\t*goto passone\n\t\t*else\n\t\t\t*goto failone\n\t#Shout: \"We're reporting for war, Commander Prodigal!\"\n\t\t*label failone\n\t\t*set prpbonthree true\n\n\t\t*if pterryseq\n\t\t\t\"No go,\" the pterrots squawk in unison, right before they begin pecking the floor violently. \n\t\t\t*goto floordrop\n\t\t*else\n\t\t\t\"No go,\" the voice booms, right before explosions begin to rock the room.\n\n\t\t\t*label floordrop\n\n\t\t\tThe floor then drops out from underneath you and you begin to minddrop through a dark pit, pain riddling your body as you fall.\n\n\t\t\t*page_break\n\n\t\t\tWhen you finally land, you're back in Prodigal's land-wrecked submarine, starting from the beginning of the memory tour as if nothing ever happened. \n\n\t\t\tIt looks like you're going to have to do a better job of navigating Prodigal's mind if you ever want to escape this winding memory maze….\n\t\t\t*set missileseq false\n\t\t\t*set hqseq false\n\t\t\t*set pterryseq false\n\t\t\t*page_break\n\t\t\t*goto memoryscape  \n\t#Threaten Prodigal—she responds best to war, after all.\n\t\t\"We're here for war,\" you scream. \"And you're going to lose.\"\n\n\t\t\"Says you,\" \n\t\t*if pterryseq\n\t\t\tthe pterrots squawk in unison.\n\t\t\t*goto passone\n\t\t*else\n\t\t\tthe voice booms.\n\t\t\t*goto passone\n\n*label passone\n\nThere's a deafening screech and you feel yourself rocket upwards. ${reportername} screams beside you and you brace yourself, but when you finally stop reeling, you find that you're incorporeal again. \n\nYou must have cleared that first mindtrap to view another memory.\n\n*page_break\n\nProdigal sits in front of her submarine console again, looking up at a screen that shifts to display Mayor Victon in a hotel suite. As soon as the picture becomes clear, though, the screen shorts back out.\n\n\"How do they keep finding ways to jam my surveillance signals?\" Prodigal screams, looking exhausted and overtaxed. Junk food wrappers litter the floor of the submarine and it looks like she hasn't showered in days. \n\n\"I suppose I'll just have to invent another,\" she sighs before going back to work on the console, waves of clear energy emanating from her hands as she does. \n\nRealizing you have a few seconds, you decide to survey the submarine. The first thing you notice is a collage on the nearest wall, which is a combination of colorful holo-projections and printouts. You focus mostly on:\n\n*choice\n\t#A list that reads [i]The Hero Project Potential Cabal Members[/i]. \n\t\t*goto obviouslyprodigal\n\t#Outlines of potential anti-Infini plots.\n\t\t*goto obviouslyprodigal\n\t#Transcripts of the MeMessages sent to you during the early part of The Hero Project.\n\t\t*goto obviouslyprodigal\n\t#A screen displaying the Final 14 Midtown Tunnel Hero Project episode. \n\t\t*goto obviouslyprodigal\n\n*label obviouslyprodigal\n\nObviously Prodigal was tracking all of this for her latest plot. \n\nThough, not surprisingly, it looks like the work of a crazy person. It probably only makes any sense to you because you lived it all.\n\n*page_break\n\n\"Squawk. Wardeath. Chemokill,\" Terry chokes out. You turn to a cage beside the console and see that Terry looks even worse than Prodigal. Her cage floor is lined with shed feathers and a trickle of blood falls from her left eye.\n\n\"Now is not the time for your gorgeous musings, Terry!\" Prodigal shouts. \"I must—\"\n\n\"…greenlight Operation Artillery.\"\n\nThis sound bite cuts through from the screen before the footage of Victon shorts out again. But it's enough to shut Prodigal up as she stares at the now-blank screen, frozen in her seat.\n\n\"What on…\" Prodigal looks up at the screen, her lip quivering. \"Mother?\"\n\n\"Video and audio disabled,\" the console responds. \n\n\"Infernal Meek tech!\" Prodigal screams again, slamming her fists on the console. \"I must find their engineer and cut off her fingertips! Can you at least give me a location on the signal call?\"\n\n\"No,\" the console answers.\n\n\"Curiouser and curiouser,\" Prodigal hums, clasping her hands together. \"It looks like I'm going to have to launch a little Operation Artillery of my own….\"\n\n*page_break\n\nProdigal's words still ring in your ears when you suddenly realize that you actually have ears… \n\nYou're solid again. \n\nAnd you're standing in a pink-painted child's room, with Miss Artillery seated in a rocking chair, a toddler in her lap. That must be Prodigal…\n\n\"My darling little girl, I have a very important lesson to teach you today,\" Miss Artillery coos, rocking back and forth in her chair and combing baby Prodigal's hair with a pink brush. \"You must learn not to rely on this man's world. Not even your father, the ruthless criminal he was, could be trusted. That's why I murdered him the moment you were conceived.\" \n\n\"But that's not today's true lesson,\" Miss Artillery whispers, kissing Prodigal's forehead. \"Today, I'm going to teach you how to die.\"\n\n*page_break\n\nMiss Artillery holds up the brush to reveal a hidden bomb trigger at its base. She promptly trips it, her eyes flashing a crimson shade of red.\n\n\"Oh, you have got to be kidd—\"\n\nBefore you can finish, an explosion rocks the room and sends you hurtling backwards. \n*label explosionrocks\nYou keep flying, shards of shattered memory whipping around you. Still free-falling, you try desperately to grab onto something. \n\nWhen your fingers finally grasp something solid, you realize that it's:\n\n*choice\n\t#A dinosaur's neck.\n\t\tNext thing you know, you're in a dirty room with crumbling brick everywhere and streaks of sunlight pouring through the holes in the walls. You look around to try to get your bearings and see that you're in some kind of lab—one that was abandoned a long time ago, from the looks of it.\n\n\t\tThen you spot something else in the corner: a young Prodigal, playing with a brontosaurus-giraffe dino-hybrid on a soiled mattress.\n\n\t\t\"Bronwin, what a preposterously long neck you have!\" Prodigal giggles, hanging on the brontoraffe's neck. He bays playfully, nudging Prodigal's side. \n\n\t\tIs this where Prodigal was living? How did she end up in an abandoned lab, with an illegal dino-hybrid, no less? No wonder Prodigal has a thing for dino-hybrids, if this was her only friend growing up. \n\t\t*goto raggedsub\n\t#A massive needle.\n\t\tYou find yourself in a gallery of weapons, all displayed around the Infinity Regulator, the device that dampened your Powers. It looks like whoever built that awful thing has found ways to adapt the needle blaster into smaller, handheld weapons.\n\n\t\tThe sight of these weapons is absolutely horrifying.\n\t\t*goto raggedsub\n\t#Myself. \n\t\tYou find yourself staring face-to-face with a life size holo-projection of yourself. Beside it, a teenage Prodigal sits studying the image.\n\n\t\t\"Someday, you'll know how meant to be, how connected, how intertwined we are,\" Prodigal sighs. \"And you'll pay for what I've lost with all you've gained.\"\n\n\t\tYou feel a profound sense of longing, staring at yourself. One you're pretty sure doesn't actually belong to you….\n\t\t*goto raggedsub\n\n*label raggedsub\n*page_break\n\nThen there's a bright flash and suddenly you're back in the submarine again. This time Prodigal looks even more ragged: she has herself strapped into some elaborate contraption, wriggling into a headpiece that has wires tucked deep into her ears. In the background, you notice The Hero Project Finale playing on one of the collage screens.\n\n\"Well, Terry, this might just kill me,\" Prodigal says, wincing as she recalibrates the homemade machine. \"But I didn't drop all my scheming to come this far and quit. So what if Victon has destroyed any trace of my mother? I'll go the one place he can't erase: his memories.\"\n\n\"Squawk. Deathrace,\" Terry croaks, now sporting an eye-patch over her left eye. You also see that some of her feathers appear to be re-sewn into her rough, pink skin. \"Memorywar. Squawk.\"\n\n\"I couldn't have said it better myself, darling,\" Prodigal gasps, obviously in a great deal of pain from whatever this contraption is doing to her. \"We're embarking on a truly preposterous undertaking. This kind of memory surveillance is unprecedented—I'll be stretching my Powers to the limit for just a few seconds of memory, but what's the fun in being Infini if we can't break a few fundamental laws of physics?\"\n\nTrying to force one last smile, Prodigal then flips on her machine and screams at the top of her lungs. \n\nAnd as she does, you're suddenly sucked forward.\n\n*page_break\n*label artillerymeeting\n\nYou see in front of you, very clearly, a slightly younger Judge Victon standing in his robes with Miss Artillery. They're outside a morgue and Miss Artillery still has\n*if artillery_brain \n\tpink matter oozing from her nostrils.\n\t*goto playedperfectly\n*elseif artillery_spine\n\ta crooked back from her broken spine.\n\t*goto playedperfectly\n*else\n\tpale skin, like she's been dead for a while.\n\t*goto played
