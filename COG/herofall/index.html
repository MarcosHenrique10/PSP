d fall in love with Jury.\n\t\t\t\t\t*label despitejurydiffs\n\t\t\t\t\tDespite your differences, you've always felt a connection to Jury. This crazy situation has destroyed all of the rules in your life, so why not take the chance to act upon your true desires?\n\n\t\t\t\t\tStill, hooking up with Jury doesn't exactly make you friend of the year, does it?\n\n\t\t\t\t\tActually, it makes you kind of an awful person.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto yourecruitedjury\n\t\t\t\t#I'm tired of doing what's expected of me.\n\t\t\t\t\t*goto despitejurydiffs\n\t\t\t\t#Dating Jury is guaranteed to piss off the most people possible. I'm not sure if I'm using him or falling for him, but right now, I don't care.\n\t\t\t\t\t*goto despitejurydiffs\n\t\t*else\n\t\t\t*set rlshp_jenny %-20\n\t\t\tYou grab Jury and pull him into another kiss, feeling your body light up as you do. \n\n\t\t\t\"You're with me, now,\" you then say, pushing Jury away. \"Whether you like it or not.\"\n\n\t\t\tJury licks his lips and smiles, but as you turn to Jenny, she looks like she might destroy you. After all, you are making out with the guy who just temporarily paralyzed her.\n\n\t\t\tThat doesn't exactly make you friend of the year.\n\n\t\t\tStill, you say to Jenny:\n\n\t\t\t*choice\n\t\t\t\t#\"However wrong it may be, I think I could fall in love with Jury.\"\n\t\t\t\t\t*label jennyheadexami\n\t\t\t\t\t\"Do you want to have your head examined while you're here?\" Jenny asks, deadpan.\n\n\t\t\t\t\t\"Very funny,\" you say, turning back to Jury. It may be crazy or wrong, but one look at Jury's gorgeous face tells you none of that matters.\n\n\t\t\t\t\tThis crazy situation has destroyed all of the rules in your life, so why not take the chance to act upon your true desires?\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto yourecruitedjury\n\t\t\t\t#\"I'm tired of doing what's expected of me.\"\n\t\t\t\t\t*goto jennyheadexami\n\t\t\t\t#\"Maybe I'm just trying to piss people off. Maybe I'm using him. Maybe I'm falling for him. Right now, I don't care.\"\n\t\t\t\t\t*goto jennyheadexami\n\t#Take this opportunity to recruit Jury as an ally and perhaps even as a friend.\n\t\t*set rlshp_victons %+25\n\t\t*set soloist %-20\n\t\t*set revenge %-25\n\t\t*set freedom %+20\n\n\t\t*if jennydead\n\t\t\tThough a part of you thinks of what Jenny would say about you making nice with the guy who just murdered her.\n\n\t\t\tThat doesn't exactly make you friend of the year, does it?\n\t\t\t*page_break\n\t\t\t*goto yourecruitedjury\n\t\t*else\n\t\t\t*goto yourecruitedjury\n\t#Take this opportunity to recruit Jury as an ally, but only because it will help my mission to have him on my side.\n\t\t*set rlshp_victons %+15\n\t\t*set soloist %-15\n\t\t*set revenge %-10\n\t\t*set freedom %-25\n\t\t*label yourecruitedjury\n\t\t*set recruitjury true \n\n\t\t\"I believe you,\" you say. \"Now spill.\"\n\n\t\tJury takes a deep breath as he tries to find his courage somewhere on the floor, then he looks back up at you.\n\n\t\t\"I'm not really Powered,\" Jury says almost in a whisper. \"I always dreamed of being a Powered hero, so when I turned thirteen, my dad got me a special present: the prototype version of MeChip Power upgrades. He said that I could now be what I always dreamed of and that it would be our little secret. I loved my dad more than I ever thought I could, that day. I thought he did it because he loved me, too.\n\n\t\t\"I should have known better,\" Jury mutters. \"When I became a public Powered figure, spurred on by my dad, he used it to launch his first Powered Regulation campaign. Once I was really famous, Dad started using 'our little secret' to keep me in line. Any time I did something he didn't like, Dad would remind me that it would just take one quick revelation to ruin my life and take away everything I care about.\n\n\t\t\"It was my first important Victon lesson in mutually assured destruction,\" Jury sighs. \"It didn't take me very long to get good at following my dad's rules, because it got me what I thought I wanted.\" \n\n\t\t*page_break\n\n\t\tJury finishes his little confession and you're not quite sure how to feel about this. Though you think back, realizing that clues to the lie about Jury's Power have always been there…\n\n\t\t\"Satisfied?\" Jury asks. \"Whether you trust me or not, now you have something to use against us Victons, if all else fails.\"\n\n\t\t*if jennydead\n\t\t\t\"I'm not exactly going to say thank you, after all this,\" you say. \"But you should go and cover my escape. Can I count on you to make things right, when the time comes?\"\n\n\t\t\t*if juryboyfriend\n\t\t\t\tJury moves in to kiss you again, but it's a cursory one. He then turns to go, obviously wanting to get away from Jenny's body as quickly as possible.\n\n\t\t\t\tWhich is fine, because you have much to consider.\n\t\t\t\t*goto figureitout\n\t\t\t*else\n\t\t\t\tJury just nods, then turns to go, obviously wanting to get away from Jenny's body as quickly as possible. \n\n\t\t\t\tWhich is fine, because you have much to consider.\n\t\t\t\t*goto figureitout\n\t\t*else\n\t\t\t\"Good,\" Jenny cuts in, unable to hide the anger in her voice. \"Now you go back to the hole you crawled out of and cover for ${codename}'s escape. And when the time comes, can we count on you to make this right?\"\n\n\t\t\tJury nods at Jenny, silenced for once in his life.\n\n\t\t\t\"That's all,\" Jenny adds, sending Jury scurrying out of the room.\n\n\t\t\t*if juryboyfriend\n\t\t\t\tBefore he disappears, Jury turns to give you one last wink. Slugger, he may be sleazy, but he's also damn sexy.\n\n\t\t\t\tStill, once Jury goes, you turn to Jenny and sigh. Because you now have quite a bit to consider. \n\t\t\t\t*goto figureitout\n\t\t\t*else\n\t\t\t\tYou'd add something of your own, but you know Jenny needed to do that. Besides, you now have quite a bit to consider. \n\t\t\t\t*goto figureitout\n\t#Wipe Jury out of existence.\n\t\t*set rlshp_victons %-30\n\t\t*set soloist %+25\n\t\t*set revenge %+25\n\t\t*set freedom %+25\n\n\t\tSlugger Jury's tip—you have all the information you're going to need. Though you know you can't kill Jury right now, not when you might need him to back you up for your final move against President Victon.\n\n\t\tThough that doesn't mean you can't use your gravity Powers to toss him through your shield and out the window.\n\n\t\tWhich is exactly what you do.\n\n\t\t*page_break\n\n\t\tBesides, he'll find a soft place to land.\n\n\t\tVictons always do.\n\n\t\t*if jennydead\n\t\t\t[i]That was for you, Jenny[/i], you think as you sit on the edge of her bed.\n\n\t\t\tBecause you have a lot to consider. \n\t\t\t*goto figureitout\n\t\t*else\n\t\t\t*set rlshp_jenny %+10\n\t\t\t\"I wish I could have done that,\" Jenny says, a huge smile plastered on her face. \n\n\t\t\tYou smile back at Jenny, though not for too long, because you now have much to consider.\n\t\t\t*goto figureitout\n\n*label figureitout\n*page_break\n\nWhat you've just learned changes everything.\n\nAs absurd as it all may sound at first, the more you think about it, the more it makes sense that diabolical Prodigal would have some Victon in her. You still don't know how this possibly could have happened, but if it really is true, this may be your way to finally expose President Victon's conspiracy. \n\nIf you prove Prodigal is President Victon's daughter, that establishes a relationship between Miss Artillery and Victon, one that will make the public more likely to believe the two worked together to frame your parents—and that Miss Artillery was still alive all these years, even though you have no proof.\n\nAt the very least, it should open up President Victon to psychic investigation and will hopefully buy your parents more time, if not save their lives and finally grant them freedom.\n\nSo now your task seems clear: you need to get to the Devoid and prove that President Victon is Prodigal's father. Though you know that just your word won't be good enough, even if you're backed up by Jury. You'll need concrete evidence. \n\n*page_break\n\n*if chip_diva\n\t\"I can help with that, hunty!\" MeChip ${chipname} says, responding to your thoughts. \"I could easily perform a DNA scan to prove paternity, but I need samples from both the baby and the babydaddy. Even better, I could do the scan if Prodigal and President Victon were both physically present.\"\n\t*goto whichlaststand\n*else\n\t\"I may be able to help with that,\" MeChip ${chipname} says, responding to your thoughts. \"I could easily perform a DNA scan to prove paternity, but I'd need samples from both subjects. Or, of course, I'd need both Prodigal and President Victon physically present.\"\n\t*goto whichlaststand\n\n*label whichlaststand\n\nHearing this from MeChip ${chipname}, you realize that you won't have time to get separate samples—you'll only have time to get Prodigal and President Victon in the same place to do a scan. Though if you ultimately can't do that, you'll need to try and save your parents. \n\nSo, considering that President Victon is going to attend the broadcast of your parents' execution ceremony tonight, this means everything you need is in one place: \n\nThe Devoid, the most dreaded and dangerous stronghold any Powered individual could go. \n\nThough that's fine, because now you finally have the Power to do so.\n\nInfinite Power.\n\nWhich means it is time for this war's last stand. \n\n*page_break\n\n*if (soloist > 50)\n\tAs a proven Soloist, you know you don't need anyone else's help to finish this. However, you may need Prodigal, if only to expose President Victon.\n\t*goto issuethatcommand\n*else\n\tWhich also means that you're going to need to call every potential ally to your side, most of all Prodigal, to take President Victon down.\n\t*goto issuethatcommand\n\n*label issuethatcommand\n\nDo you want to tape a public announcement and put out a call for Prodigal?\n\n*choice\n\t#Yes, I have some things I need to say.\n\t\t*goto lingerholo\n\t#Yes, but I have to make sure the call is coded.\n\t\t*goto lingerholo\n\t#No, I'm done with Prodigal.\n\t\tAre you sure? You'll need Prodigal to scan her DNA and prove that Victon is her father—and you just might need her help, too.\n\n\t\t*choice\n\t\t\t#Yes, I'll put out the call in a public announcement.\n\t\t\t\t*goto lingerholo\n\t\t\t#Prodigal is too volatile. I'll take care of this on my own.\n\t\t\t\t*set rlshp_prodigal %-20\n\t\t\t\t*set soloist %+20\n\t\t\t\t*set nocallprodigal true\n\t\t\t\tInstead, you prepare to make a public announcement without a single mention of Prodigal.\n\t\t\t\t*page_break\n\t\t\t\t*goto lingerholo\n\t\t\t#I don't need to prove anything, because I'm going to kill President Victon.\n\t\t\t\t*set offensive %+20\n\t\t\t\t*set lawless %+20\n\t\t\t\t*set nocallprodigal true\n\t\t\t\tInstead, you prepare to make a public announcement without a single mention of Prodigal.\n\t\t\t\t*page_break\n\t\t\t\t*goto lingerholo\n\n*label lingerholo\n\nSo you issue a command to MeChip ${chipname}, who still lingers holographically.\n\n\"Record this message and upload it to MeTube,\" you say, clearing your throat. You know that any video you upload is bound to go viral, given your current iconic status. \n\nYou also know that recording and uploading like this will give up your GPS location, but you plan to be at the Devoid within minutes, thanks to your new supersonic flight prowess.\n\n*page_break\n\nAs MeChip ${chipname} counts you in, you stare straight ahead and deliver your message clearly:\n\n\"This is ${firstname} ${familyname}, but you probably know me as ${codename}. I'm sure many of you have been wondering what I'm up to, and trust me when I say I want to tell you. But right now I'm going to save my parents at the Devoid.\" \n\n\"Once I'm there, I'm going to reveal everything I've uncovered, all of the shocking truths about our President. So make sure to tune in.\"\n\n*choice\n\t#\"Or better yet: join me.\"\n\t\t*set soloist %-15\n\t\t*set feared %-10\n\t\t*goto callthosechicks\n\t#\"And if you know what's good for you, make sure to stay out of my way.\"\n\t\t*set soloist %+15\n\t\t*set feared %+10\n\t\t*set pastayaway true\n\t\t*goto callthosechicks\n\t#\"Because I'm going to tear everything down.\"\n\t\t*set lawless %+15\n\t\t*set feared %+15\n\t\t*set revenge %+15\n\t\t*set freedom %-15\n\t\t*goto callthosechicks\n\t#\"Because I'm going to ensure that today, justice wins.\"\n\t\t*set fame %-15\n\t\t*set lawless %-15\n\t\t*set feared %-15\n\t\t*set revenge %-15\n\t\t*set freedom %+15\n\t\t*goto callthosechicks\n\n*label callthosechicks\n\n*if nocallprodigal\n\t*goto uploedshtevideo\n*else\n\t\"That said: calling all chickens.\"\n\n\tYou cue MeChip ${chipname} to stop recording, immediately rethinking that ridiculous coded ending. But you know that telling Prodigal to come to the Devoid directly would not only undermine your message, it probably wouldn't work—you're much more likely to attract Prodigal by speaking her language.\n\t*goto uploedshtevideo\n\n*label uploedshtevideo\n\nAs MeChip ${chipname} begins to upload the holo-video, you just think about how you can't wait to reveal all the details surrounding your recent actions and President Victon's conspiracy. \n\nNot to mention what happened to Jenny. You only held off on telling the world about Jenny's status because you may still need Jury at the execution ceremony to back you up, and he won't be able to do that if he's hauled off to a jail cell somewhere for\n*if jennydead\n\tmurdering Jenny.\n\n\t*page_break\n\n\tAs you prepare to leave, you give Jenny once last look, knowing this will be the last time you get to see her.\n\n\tEver.\n\n\tYou wish you had more time, more time with Jenny, more time to say a proper goodbye…but time is a luxury you cannot afford right now.\n\n\tSo you say one last goodbye to Jenny Yu, the one friend who has been there for you, no matter what.\n\n\tThe thought of finishing this war without her, it's…\n\n\t*page_break\n\n\tYou're unable to finish that thought, fearing you'll just break down again if you do. So instead, you seal off your emotions and tell yourself the only thing that matters:\n\n\tYou have to do her memory proud.\n\t*goto publicannounce\n*else\n\tshooting Jenny.\n\n\t*page_break\n\n\t\"Sure you don't want to join me?\" you ask, turning to Jenny.\n\n\tShe returns your sarcasm with a hearty eye roll, then says: \"Just get the slugger out of here and do your job. I'll kick up my bionic feet and watch on 3V knowing I've done mine.\"\n\n\tYou give Jenny one last smile, because she has certainly earned that much.\n\t*if jennygirlfriend\n\t\tThen you lean in to give Jenny one last kiss.\n\n\t\tAfter a few seconds, Jenny pulls away, holding your face in her hands.\n\n\t\t\"${firstname},\" she starts, actual tears in her eyes. \"In case this is the last time—\"\n\n\t\t\"Don't,\" you interrupt, kissing Jenny again. \"It won't be.\"\n\n\t\t\"Glad to hear it,\" she says, leaning back against her pillow and wiping her eyes. \"Now go kick some slugging butt.\"\n\t\t*goto publicannounce\n\t*else\n\t\n\t\tThough as you turn to go, Jenny's face turns grim. She knows just as well as you the odds you're about to face. You're both wondering if this will be the last time you get to see each other…\n\n\t\tWhich are words better left unsaid.\n\t\t*goto publicannounce\n\n*label publicannounce\n*page_break MINUTES LATER\n\nYou rocket toward the Devoid in super-fast flight, hoping that despite your little public announcement, you'll still be fast enough to maintain the element of surprise.\n\nAs you tear through the sky, all you can think is that everything you hold dear is on the line. Will you be able to free your allies? Will you save your parents in time and reunite your family? Will you finally topple President Victon's regime? Will you succeed in becoming the kind of hero you've always known you could be?\n\nWill you finally become a Legend? \n\nFor better or worse, you're about to find out.\n\n*finish Next Chapter: Voids\n", "chap_one": "*comment é\n*if male\n\t*set flykid \"Flyboy\"\n\n*text_image title.png center Heroes Rise: HeroFall\n\nBy\n*line_break\n*link https://zacharysergi.com/ Zachary Sergi\n\n*page_break\n\n*text_image prologue.png center These Foolish Things\n\nYou remember the moment perfectly, despite all these years. The moment you knew you'd become a Powered hero.\n\nYou were leaving a holo-movie with your parents, the third installment of your favorite trilogy as a little kid: [i]${flykid}[/i]. You remember this outing especially because the [i]${flykid}[/i] movies were the only times your parents would make an exception to their stay-at-home rule—they were too famous to be in public most of the time. \n\nAfter watching the movie, all you wanted to do was fly, so your parents each held you by one arm and swung you around as you were leaving the lobby. Just as you were about to soar through the front doors, a woman approached your parents with her teenage daughter.\n\n\"I'm so sorry to bother you,\" the woman said, \"but I've been waiting to meet you both for almost ten years now. We were on the hoverbus that The Hound held hostage that one Christmas Eve, and you saved our lives. We can't thank you enough.\"\n\nYour parents just smiled and said it was their pleasure as they posed for a picture with the woman and her daughter. You watched in awe—this was the first time you'd ever seen anyone react to your parents this way. This woman and her daughter looked at them like they were some kind of gods, but your parents just acted like this was the most normal thing in the world. \n\nThat's when you knew you had to be a Powered Hero when you grew up, because:\n\n*choice\n\t#I wanted to save lives.\n\t\t*set fame %-25\n\t\t*goto flydream\n\t#I wanted people to look at me that way.\n\t\t*set fame %+25\n\t\t*goto flydream\n\t#I wanted to be just like my parents.\n\t\t*label flydream\n\t\t\"I want to be a hero, just like you!\" you shouted once you all got outside, leaping into the air.\n\n\t\tYour mom jumped forward and snatched you out of the air, spinning you around while she hugged you tightly.\n\n\t\t\"One day, you'll fly higher than you ever thought possible,\" Mom whispered in your ear as she placed you back on the ground. And in that moment, you wanted to believe those words more than anything. \n\n\t\tNow, for better or worse, you know that single experience set you on the path that has led you here, today.\n\t\t*goto startherofalltime\n\n*label startherofalltime\n*page_break Part One: Against All Odds\n\n*text_image part_one.png center Part One: Against All Odds\n\n--------------------------------------------------\n\n*text_image chap_1.png center Told You So\n\n\"What's the matter, chicken got your tongue?\"\n\nYou stare across the fire at Prodigal, her masked face flickering with shadows. The sight of her kevlar bodysuit, that red stripe running up her long, lean body and across her face…it sends a chill through you. \n\nProdigal is one of the most dangerous enemies you've ever faced and now she's standing ten feet from you, while Grandma is just inside the safe house. And you're Powerless. But that's not what bothers you most about this situation. No, what really matters is what Prodigal has just told you:\n\nThat her mother, Miss Artillery, the villain your parents were sent to jail for murdering, is actually alive.\n\nA thousand thoughts scramble through your brain at once, but your first instinct is to: \n\n*if male\n\t*set female_straight false\n\t*if male_straight\n\t\t*goto prodchoice\n\t*else\n\t\t*set male_gay true\n\t\t*goto prodchoice\n*else\n\t*set female true\n\t*set male_straight false\n\t*if female_straight\n\t\t*goto prodchoice\n\t*else\n\t\t*set female_gay true\n\t\t*goto prodchoice\n\n*label prodchoice\n\n*if ((male_straight) or (female_gay)) or (bisexual)\n\t*set prodromanceposs true\n\n*label firstchoice\n\n*choice\n\t#Take Prodigal down—I can sort out the truth once she is detained.\n\t\t*set offensive %+15\n\t\t*set revenge %+10\n\t\t*set rlshp_prodigal %-15\n\n\t\tProdigal is far too deadly to leave unchecked—you need to attack her before she expects it.\n\n\t\tYou know all too well that you still can't access your full Powers, so you're going to have to get creative here. What's your best move?\n\n\t\t*choice\n\t\t\t#Tackle Prodigal and knock her out.\n\t\t\t\tYou launch yourself over the fire at Prodigal, hoping she won't expect you coming at her from that precarious an angle. \n\n\t\t\t\tBut just as you are about to collide, Prodigal spins out of your path and you crash into the ground. \n\t\t\t\t*goto nothereto\n\t\t\t#Kick ash and dirt into Prodigal's eyes to distract her, then detain her.\n\t\t\t\tYou kick up dirt next to the fire, making sure to get a healthy dose of fiery ash in the mix. The dirt sprays in Prodigal's face and she screams in pain, jumping backwards. \n\n\t\t\t\tYou then launch forward to attack, but freeze when Prodigal produces a plasma cannon the size of her arm. Still screaming and wiping at her face, Prodigal blasts blindly. So you brace for the end…\n\n\t\t\t\tBut the plasma surge rockets up into the sky above Prodigal, nowhere near you.\n\t\t\t\t*goto nothereto\n\t\t\t#Practice strengthening my gravity Powers by snapping off a tree branch above Prodigal. (Power Cost 20)\n\t\t\t\t*set power -40\n\t\t\t\t*set health -20\n\t\t\t\t*set powerregain +1\n\n\t\t\t\tYou focus on a tree branch above Prodigal and try to increase its gravity. The strain hurts like slugger and it costs an insane amount of Power (and probably some Health) for such a small move, but it works. \n\n\t\t\t\tThe branch cracks and falls towards Prodigal, but she quickly launches into a backflip, generating a kick-shield to snap the branch. She lands and stares at you, eyes narrowed.\n\n\t\t\t\t*label nothereto\n\n\t\t\t\t\"I'm not here to fight, you remarkable imbecile,\" Prodigal snaps. \"But don't make me get all nasty on you.\"\n\n\t\t\t\tAfter this, you expect Prodigal to attack you back, but instead she just stands there with her arms crossed. \n\t\t\t\t*goto prodigalexplainsitall\n\t#Get as many answers out of Prodigal as possible, then decide how to deal with her.\n\t\t*set offensive %-15\n\t\t*set revenge %-10\n\t\t*set rlshp_prodigal %+10\n\n\t\tYou know taking Prodigal in a straight fight would be insanely difficult even if you were at full Power, so you don't stand a chance against her the way you are now. You're going to have to play this very carefully.\n\n\t\tBesides, all you have to do for now is get Prodigal talking—and luckily, that's one of her favorite activities. \n\n\t\t\"You have five seconds to tell me exactly what you're talking about,\" you say, clenching your fists.\n\n\t\t\"Or what, darling?\" Prodigal laughs. \"Let's not pretend you have any leverage in this situation whatsoever.\"\n\n\t\t\"Don't think I'd hesitate to—\"\n\n\t\t\"Oh, can it,\" Prodigal interrupts. \"I'm not here to fight. Just luxuriate and listen, for once in your sad life.\"  \n\t\t*goto prodigalexplainsitall\n\t#Play Prodigal's game and charm her to spill information.\n\t\t*set revenge %-15\n\t\t*set rlshp_prodigal %+15\n\n\t\tFighting against Prodigal would be useless right now. \n\n\t\tBesides, she claims to have come here for help. All you have to do is get Prodigal talking—luckily, that's one of her favorite activities. \n\n\t\t*choice\n\t\t\t#\"I'm listening, Prodigal. So do what you do best and get your rant on.\"\n\t\t\t\t\"Gladly, darling,\" Prodigal says, crossing her arms. \n\t\t\t\t*goto prodigalexplainsitall\n\t\t\t#\"What are you waiting for? An invitation to sit on my lap for story time?\"\n\t\t\t\t\"Now, wouldn't that be something?\" Prodigal says, smirking. \n\t\t\t\t*goto prodigalexplainsitall\n\t\t\t#\"You've got my attention.\"\n\t\t\t\t\"Oh, that's not all I have, darling,\" Prodigal says. \"But yes, let's get on with it.\"\n\t\t\t\t*goto prodigalexplainsitall\n\n*label prodigalexplainsitall\n*page_break\n\nAs Prodigal stands there staring you down, you notice the seams of her red-stripe face mask seem to be a bit frayed. Her long brown hair sits in wild tangles and her eyes look a little red. What exactly has Prodigal been through to get here?\n\n\"I've spent the past few months putting together the pieces of a rather elaborate puzzle,\" Prodigal begins. \"We don't have time to sort through all of it now, so I'll give you the big picture: I have reason to believe that my darling mother, the sumptuous Miss Artillery, is alive and well. And how do I know such a thing, you must be wondering?\"\n\nYou nod, trying your best to maintain some patience.\n\n\"It turns out that Miss Artillery had a second Power set, one she went to great lengths to keep secret. Apparently mother darling not only had the Power to project weaponry, like yours truly, but she also had the Power to project her own death in a million vivid ways. So that colorful, deathly display at the hands of your parents? A Powered projection.\"\n\n*page_break\n\n\"How do I know any of this—\"\n\n\"Do please hold all questions until the end!\" Prodigal barks. \"Anyway, as far as I've been able to see with my scintillating surveilling Powers, then-Judge Victon and Miss Artillery made a mutually beneficial deal: mother dearest needed a bailout once your do-gooder parents shut down her Assassin Academy and Victon needed a splashy case to launch his mayoral campaign.\n\n\"So it is my belief that, in exchange for her framing your parents with her death-projection Powers, Victon then placed my very-alive mother in a comfortably free setup, halfway around the world, where she still lives to this day.\"\n\nSlugger.\n\nThat all makes sense, in a way. But could any of it really be true? And if it is, how the slugger did Prodigal find all of this out?\n\n*page_break\n\n\"Since you seem to be processing this with all the speed of a racing tortoise, let me put the pieces together for you,\" Prodigal continues. \"You help me find Miss Artillery and we not only both reunite with our parents, but we get to take down our prominent anti-Infini enemy, President Victon.\"\n\nProdigal is right about that much, but this definitely seems too good to be true. You can't forget that you're dealing with an insane villain, after all.\n\n\"I need evidence that Miss Artillery is alive,\" you say.\n\n\"Now, little genius, if I had that, do you think I'd need you?\" Prodigal says.\n\n\"Why do you need me?\" you ask.\n\n\"That is a longer story than we have time for,\" Prodigal says, glancing at her wrist. \"I'm afraid we really must get somewhere safe, and then I can tell you everything.\"\n\nOf course Prodigal would say that. \n\nReally, this boils down to two very simple considerations. If Prodigal is telling the truth, finding Miss Artillery could exonerate your parents and prove President Victon is corrupt in one bold move. But if she is lying, this could just be another one of her plots to ruin you.\n\nWhat do you think?\n\n*choice\n\t#I believe Prodigal. I have to.\n\t\t*set rlshp_prodigal %+15\n\t\t*goto butwhatare\n\t#Prodigal is definitely lying. I can't trust her. Ever.\n\t\t*set rlshp_prodigal %-15\n\t\t*goto butwhatare\n\t#I'm not sure what to believe. So I'll hear Prodigal out, but keep my guard way up.\n\t\t*set rlshp_prodigal %-5\n\t\t*goto butwhatare \n\n*label butwhatare\nThen comes an even harder question: what are you going to do about it?\n\nBefore you can decide, you feel the ground beneath you shift. You watch as thick roots begin to erupt from the earth, spraying dirt everywhere and extinguishing the fire. You fall backwards to avoid a snapping root and it takes a few seconds for your eyes to adjust to the darkness, but when they do, you find Prodigal hanging upside down in the air, her body tightly wound with sturdy tree roots. \n\n\"Give me one reason why I shouldn't have Birchward here squeeze the life from your miserable bones.\"\n\nYou twist to find Grandma standing in the doorway, her hands outstretched and shaking. \n\n\"${firstname},\" Prodigal chokes out. \"Will you do the honors?\"\n\n\"She claims that Miss Artillery is alive,\" you say to Grandma. \"And she needs my help to find her.\"\n\nGrandma stares at you, blinking several times.\n\n*page_break\n\n*if kill_prodigal\n\t\"Shouldn't she be dead?\" Grandma asks.\n\n\t\"Which one?\" you return.\n\t*goto weapwom\n*else\n\t*goto weapwom\n\n*label weapwom\n\n\"Slugger,\" Grandma says, pinching her brow. \"Why do the craziest ones always seem to have nine lives?\"\n\n\"We weapon-women are rather resilient,\" Prodigal gasps, her face turning nearly as red as her mask.\n\n\"In that case: Birchward?\" Grandma says, turning back to you as the roots wrap even tighter around Prodigal's body. \"Does she have any way of proving her claim?\"\n\n\"No.\"\n\n\"How convenient,\" Grandma sighs. \"You shouldn't believe her, ${firstname}.\"\n\n*choice\n\t#\"I know, but…I want to.\"\n\t\t*set rlshp_prodigal %+5\n\t\t*goto shecray\n\t#\"I don't trust her for a second.\"\n\t\t*set rlshp_prodigal %-10\n\t\t*goto shecray\n\t#\"If there's even a sliver of truth to what she's saying, I have to know.\"\n\t\t*set rlshp_prodigal %-5\n\t\t*goto shecray\n\t#\"I don't think she'd lie about this, Grandma.\"\n\t\t*set rlshp_prodigal %+5\n\t\t*goto shecray\n\n*label shecray\n\n\"She's a lunatic who will say anything to warp our lives,\" Grandma answers. \"You have to know that.\"\n\nGrandma isn't wrong. Not too long ago, Prodigal nearly killed you, Grandma, and Jenny, not to mention a good chunk of Millennia City, as well. Her obsession with you and your family runs almost as deep as her insanity.\n\n\"You know,\" Prodigal wheezes, \"I'm hanging right here.\"\n\n\"Listen, I came outside to get you for a reason, before I discovered this nasty surprise,\" Grandma says, turning back inside. \"There's something on 3V you need to see.\"\n\n*page_break TEN MINUTES LATER\n\nAfter tying Prodigal tightly with some of Grandma's strongest vines and plopping her in the corner under the watch of the De Milo and her budding venus flytrap family, you sit with Grandma in front of the 3V.\n\n\"Wait, shouldn't we call—\"\n\n\"Jenny is already on her way,\" Grandma interrupts. \"You need to see this first.\"\n\n\"I'm sorry,\" Prodigal starts, \"but we really don't have oodles of time before—\"\n\n\"Shut up!\" you and Grandma both say in unison. You then turn back to the 3V to find…\n\nPresident Victon, giving his first live speech from the Oval Office.\n\n*choice\n\t#All I can think of is ruining his life, like he has tried to ruin mine.\n\t\t*set revenge %+15\n\t\t*goto liketoassure\n\t#I cannot wait to expose Victon's true self to all of America.\n\t\t*set fame %+10\n\t\t*goto liketoassure\n\t#I see the representation of everything I stand against. \n\t\t*set revenge %-15\n\t\t*set fame %-15\n\t\t*goto liketoassure\n\n*label liketoassure\n\"I'd like to assure the American people that we are moving forward fully with the Infinity Regulation Program, or IRP, for short,\" Victon starts, the ever-stylish Mrs. Victon at his side. \"The first notices will go out to registered Infini Powereds tomorrow to report for free testing and therapy at our brand new Infinity Regulation Center, which houses the Infinity Regulator.\n\n\"We expect full cooperation from all invited Infini citizens,\" President Victon says with a stern smile. \"However, The American Protectorate has been cleared to retrieve anyone who fails to appear.\"\n\nThe camera pans to show The American Protectorate standing in the corner of the Oval Office. And your blood boils a little hotter looking across the faces of the \"heroes\" who wronged you, all standing in such a prominent position. Though really, you feel the worst about:\n\n*choice\n\t#Rebellion.\n\t\t*set rlshp_tap %-5\n\t\tThe betrayal that hurts the most comes from Rebellion, your lifelong idol. You still hope to get a chance to confront ${youhir} someday. Hopefully very soon.\n\t\t*goto doestoprotect\n\t#Inherit.\n\t\t*set rlshp_tap %-5\n\t\tInherit, the principal spokesperson for The Meek movement, has always stood for everything you stand against.\n\t\t*goto doestoprotect\n\t#Jury.\n\t\t*set rlshp_victons %-5\n\t\tAt every one of the worst moments in your heroic career, Jury has been standing there to taunt you. You can't wait to turn the tables and wipe the smug smile off that pretty face of his.\n\t\t*goto doestoprotect\n\t#Summit.\n\t\t*set rlshp_tap %-5\n\t\tSummit had it out for you from day one of The Hero Project.\n\t\t*goto doestoprotect\n\t#Stage Show.\n\t\t*set rlshp_tap %-5\n\t\tStage Show turned out to be nothing but a sheep. And it looks like The American Protectorate is simply her current flock. \n\t\t*goto doestoprotect\n\t#Wintry.\n\t\t*set rlshp_tap %-5\n\t\tWintry betrayed the Underdog alliance in The Hero Project and sold out in the worst way.\n\t\t*goto doestoprotect\n\n*label doestoprotect\n\nBut that thought fades as President Victon continues his speech.\n\n\"The Victon administration has created the IRP to protect all American citizens, Powered and unPowered. America has a rich history of harnessing Powered resources and the IRP is the next bold phase of this great American tradition.\"\n\nHearing this, Prodigal laughs from her spot in the corner.\n\n\"Also continuing great American traditions like slavery, the McCarthy trials, and the Japanese internment camps,\" Prodigal mutters. \"And I know for a fact that great phallic dampener of his is just the beginning….\"\n\n\"What are you going on about now?\" Grandma snaps.\n\n\"Well, gracious Granny, wouldn't you know that I've been keeping tabs on our boy Victon as best I can, though admittedly, it's been far more difficult ever since he became—\"\n\n\"If you have a point, get to it,\" you bark. \"Now.\"\n\n*page_break\n\n\"Moody moody oh so broody!\" Prodigal hums. \"My point, dearest darlings, is that the IRP isn't finished inventing new genocidal wonders. I've seen firsthand that they're trying to make a smaller version of that jaunty Infinity Regulator to weaponize—one that also makes the Infini-dampening effects permanent.\"\n\n\"Slugger,\" you curse. Because while this development isn't necessarily unexpected, it is wholly terrifying. Especially as you turn to find a list of the first five Infini Powereds called to report to the IRP…\n\nAnd your name tops the list.\n\n*page_break\n\n\"Well, look at that,\" Prodigal chuckles. \"Someone's gone and gotten all famous, even without little old me!\"\n\nYou ignore Prodigal, scanning the other names on the list—there's no one else you recognize, at least not yet. It's no surprise that President Victon is trying to make you public enemy number one, given what happened at The Hero Project finale and your new status as an Infini icon. \n\nYou've become a symbol for Powered rights standing against The Meek movement, the Victon administration and all anti-Powered bigots. You inspire your followers as a figure to be  \n*if (feared >= 50)\n\tfeared, especially by your enemies.\n\t*set antipoweredsent +5\n\t*goto thenyourbrain \n*else\n\trevered, especially to your allies.\n\t*set antipoweredsent -5\n\t*goto thenyourbrain \n\n*label thenyourbrain\n\nPresident Victon and The American Protectorate will be coming for you very soon, with nearly unlimited resources….\n\n*page_break\n\n\"I hate to play a broken record, but we really should skedaddle,\" Prodigal says. \"If we're going to have any chance of escaping before—\"\n\n\"Do you ever shut up, you infernal hag?\" Grandma nearly shouts.\n\nAt this, Prodigal drops her smile. \"You know, grumpy Granny, this has all been well and good, but I can bust free from these dead drearies whenever I please. I'm only staying put as a show of faith, so don't make that good will run out.\"\n\n\"Oh, I'd like nothing more than a reason for De Milo to take a chunk out of your—\"\n\n\"Quiet, please, both of you,\" you say as Victon reappears on the screen, continuing his speech.\n\n*page_break\n\n\"I'd also like to announce a new feature of the IRP, one that many feel is far overdue. I stand on a platform of Powered Regulation—it is what I built my legal and political careers on, and ultimately what got me elected your president. As a man, a judge, and a mayor, I have always stood for punishing abhorrent acts of Powered abuse. And now as your president, I plan to do the same on a national level. To set a standard for us all.\n\n\"Which is why I've assembled a special tribunal to single out extreme acts of Powered abuse to be punished to the fullest extent of the law. I do this to send a message to the American people and the entire world that such abuse will not be tolerated.\n\n\"This special tribunal has been given authority to name the most egregious Powered offenders whose crimes have been the most heinous and, in many cases, whom they feel still pose a clear and present danger to America. This tribunal has thereby sanctioned the death penalty in these special cases.\"\n\nHearing this, your stomach drops and your limbs go numb. \n\nYour first thought is: how the slugger could Victon get away with something like this? Just how untouchable has Victon made the Infinity Regulation Program and The American Protectorate, establishing both so quickly and absolutely? Surely the other branches of government, especially the DRPR, must have something to say about this. Why are they just standing by as President Victon amasses this unprecedented executive power?\n\n*page_break\n\nThen again, it has been proven time and time again throughout history that if you get a population frightened enough, they'll accept anything. Slugger, even something as simple as airport security forces everyone to give up all personal freedoms in the name of safety, without thinking twice.\n\nAnd after Prodigal's Death Wave, Culic's reign of terror, The Crush coma incident, The Hero Project Finale and the rising tide of anti-Powered sentiment, America is most certainly afraid. \n\nWhich means it looks like in the coming months, you're all going to have to choose what is more valuable to you—freedom or security. If everyone is allowed to do what they want and live totally free, that leaves little space for security. On the other hand, a society can live completely securely if every aspect of life is checked and regulated, but that leaves no room for freedom.\n\nAmerica has always been about balancing freedom and security, but right now the scales seem to be tipping. And you believe:\n\n*choice\n\t#It's far more important to be free, even if that means never being truly safe.\n\t\t*set freedom %+15\n\t\t*set lawless %+15\n\t\t*goto executlist\n\t#I'd rather be safe and give up certain freedoms.\n\t\t*set freedom %-15\n\t\t*set lawless %-10\n\t\t*goto executlist\n\t#I think it's crucial to find the right balance between freedom and security.\n\t\t*set lawless %-10\n\t\t*goto executlist\n\n*label executlist\n\nYou have a feeling that, whether you like it or not, many of your decisions in the coming days are going to force you to decide which you value more, freedom or security.\n\n*page_break\n\nThat thought—and every other thought—washes away as President Victon posts the special tribunal's execution list. \n\nThe first name you see is The Crush, which doesn't necessarily come as a big surprise. The Crush has served as President Victon's scapegoat for months now; whether he truly deserves this after all he has done is a question for another time.\n\nBecause you've got one thought racing through your mind as you scroll through the short list. You just pray you don't find…\n\nBut then you see it, the last two names on the list:\n\n[i]The Sound and The Fury[/i].\n\nAnd you whimper out loud.\n\n*page_break\n\nBeside you, Grandma screams, rustling all of the indoor plants into a frenzy.\n\nThis can't… It couldn't… \n\nVicton has gone too far, this time.\n\n*choice\n\t#I'm going to kill Victon for this.\n\t\t*set revenge %+15\n\t\t*set lawless %+15\n\t\tYou don't care what it takes, revenge will be your priority above all else.\n\t\t*goto endofannounc\n\t#I have to show the entire nation that Victon is wrong.\n\t\t*set revenge %-15\n\t\t*set lawless %-10\n\t\tYour own personal vendetta doesn't matter as much as showing the world that the ideals President Victon stands for are truly corrupt and backwards.\n\t\t*goto endofannounc\n\t#I will take down Victon and prove him wrong at the same time.\n\t\t*set lawless %-10\n\t\t*set fame %+10\n\t\tThough something tells you that someday soon, you're going to have to choose whether your ideals or revenge is more important to you….\n\t\t*goto endofannounc\n\n*label endofannounc\n*page_break\n\n\"It troubles me greatly to live in an age where such decisions are necessary, but I have always believed in zero tolerance for Powered abuse,\" President Victon finishes. \"Which is why these executions are set to begin Sunday night.\"\n\nOnce again, you freeze. That's just two days from now. \n\nHearing this, an eerie sense of calm washes over you. Because now nothing else matters besides finding a way to save your parents. Fast.\n\nJust as you think this, you feel a hand on your shoulder.\n\n\"We're going to bring that mother slugger down,\" Prodigal says, standing beside you. \"I promise you that.\"\n\nThis time you and Grandma don't argue. You don't even wonder how Prodigal managed to free herself from Grandma's vines and De Milo's watch. Five minutes ago, you could never have imagined a world where you worked with Prodigal to achieve anything…\n\nBut it seems you just stepped into that world. \n\n*page_break\n\nSo for the moment, you let Prodigal stand beside you. \n\nThough you quickly realize that might not be the smartest move as you spot a camera orb hanging outside the nearest window…\n\nRight in front of a full SWAT team. \n\nSlugger.\n\n\"Well, I hate to say it, but…\" Prodigal starts, stepping away from the window. \"I told you so.\"\n\n*finish Next Chapter: Fought The Law\n", "chap_seven": "*comment é\n\n*text_image chap_7.png center Rebels\n\nThe next thing you know, Rebellion is already on you, tackling you through the closest museum exhibit. Rebellion is so fast, you didn't even see that hit coming.\n\nYou land and brace yourself for some brutal blow, but Rebellion rolls off of you and across the room you've entered, which appears to be some kind of hidden chamber. Rebellion stands and opens a secret panel, pushing a button hidden there. Then you watch as the walls suddenly turn a strange blue-ish color.\n\n\"A little panic room I built in my early days as Millennial Group leader,\" Rebellion explains. \"Which means I have about two minutes of camera-free time to tell you the truth about all of this. And don't bother trying to record anything, not even Processor has access in here—I plugged in all of her automatic override codes. I always know how to take down every one of my team members, just in case. You can let that thought comfort you, since we're truly alone in here.\"\n\nYou stare at Rebellion as you get back on your feet, not quite sure what to expect from this little stunt. $!{youze}'s right, though…you're ready to hear some answers from ${youhir}.\n\n*page_break\n\n\"I'm sure you've wondered why I'd involve myself with The Hero Project and how deep that involvement runs,\" Rebellion says. \"The truth is that I've been a part of it from the beginning. As drastic as it may seem, I'd do it all again in a heartbeat.\"\n\nRebellion plows on, not giving you a moment to process the weight of ${youhis} words.\n\n\"We live in a splintered nation, one that is increasingly populated with citizens unable to control the vast Powers they're burdened with,\" Rebellion says, ${youhis} voice full of passion. \"I did this for one reason and one reason only: to give America the unity it needs, to give the nation a common enemy to fight. And to save us from the apocalypse Infini Powereds will bring.\"\n\n\"You're insane,\" you blurt out. \"And you're a bigot, just like your old pal Constance. Don't tell me, you've been a Secret Apostle of The Meek movement this whole time, too?\"\n\n\"Constance is many things, but she's ultimately just a means to an end,\" Rebellion responds. \"No, I left my Meek roots behind long ago. But I've always believed that Infini Powers are too great a responsibility for any one person to shoulder. And that they need to be dampened.\"\n\n*page_break\n\n\"Now I know this system we've brought about may not be perfect, but you cannot argue with the results,\" Rebellion continues. \"I'm a leader, ${codename}. And I will always strive for what I think is right.\"\n\n\"You actually think you're still the hero in all this, don't you?\" you nearly shout. \"How could you—\"\n\n\"My legacy will be recreating a safe and unified America,\" Rebellion interrupts. \"I know that's the common goal we share. Which is why I'm telling you all of this, ${codename}. Because I know that you see the dangers that Infini Powers pose to all of our futures—you've experienced them firsthand. So I'm asking you to do the right thing. I'm asking you to be the hero I know you can be and not fight me on this.\"\n\nYou look at Rebellion, resisting the urge to laugh—this would almost be funny, if it weren't so horrifying. And enraging. You think back to before you were a hero, all those years you had Rebellion's poster hanging on your wall. And all you can say is:\n\n*choice\n\t#\"You're an old idiot stuck in an even older time.\" \n\t\t*goto rebsneer\n\t#\"You think manipulating national sentiment to your will is any less dangerous than wielding Infini Powers?\"\n\t\t*goto rebsneer\n\t#\"No matter what your intentions, how can you align with outright bigots who hate everything you are?\"\n\t\t*goto rebsneer\n\t#\"I am going to bring your slugging world crashing down around you.\"\n\t\t*goto rebsneer\n\t#\"And my parents? Are they just another part of your never ending collateral damage?\"\n\t\t*goto rebsneer\n\t#\"What a complete and utter disappointment you turned out to be.\"\n\t\t*goto rebsneer\n\n*label rebsneer\n\nRebellion sneers at your response, realizing the same thing you've known all along: \n\nThat the only way to end this is with a knock-down, drag-out fight.\n\n*label beginningsevenfight\n\n\"Have it your way,\" Rebellion says, pulling an oddly-shaped gun from ${youhis} shoulder-holster. One you instantly recognize as a smaller version of The Infinity Regulator.\n\n\"You can fight it all you want, but our change is coming,\" Rebellion continues, seeing the look of horror on your face. \"Recognize this? It's just a prototype, but it's set to work on normal powers, too. Permanently, if we want.\"\n\nYou look down at the gun and feel dread spreading through your body like poison.\n\n\"I think this is the perfect testing grounds for our new Infinity Equalizer, don't you?\" Rebellion finishes, flipping off the panic room settings so the secure walls retract.  \n\nAnd pointing the Infinity Equalizer directly at you.\n\n*choice\n\t#I cannot lose my Powers all over again. I will not.\n\t\t*goto gunash\n\t#It's terrifying to think what those weapons signify, socially.\n\t\t*goto gunash\n\t#This means that the IRP can de-Power Miss Artillery now.\n\t\tIf Prodigal's assumptions are correct and the only thing keeping Miss Artillery alive is her death-faking Power, she could be killed now. \n\n\t\tWhich means you have to go find her right away.\n\t\t*goto gunash\n\n*label gunash\n*set power -15\n*set powerregain +1\n\nFeeling all the bottled rage inside you suddenly burst open, you scream at the top of your lungs, letting loose an energy blast that rips the Infinity Equalizer from Rebellion's hands.\n\nRebellion is stunned by your shot for a moment, but then ${youze} comes at you impossibly fast with a super-strong right hook.\n\nAll you can think is: [i]Let's. Do. This.[/i]\n\n*if warningsys\n\t*page_break\n\t*if chip_diva\n\t\t\"This is gonna be a rapid fire fight, packed with fast choices based on staying consistent with Stat strategy, playa!\" MeChip ${chipname} warns you. \"You need to get 5 hit points on Rebellion to take ${youhir} down. Now make this first choice based on your Offensive/Defensive Level, for the most hit points!\"\n\t\t*goto rebfightone\n\t*else\n\t\t\"This will be a rapid-fire fight with fast choices based purely on remaining consistent with your previous Stat strategy,\" MeChip ${chipname} warns you. \"You need to get 5 hit points on Rebellion to take ${youhir} down. Respond to this first attack based on Offensive/Defensive for maximum hit points!\"\n\t\t*goto rebfightone\n*else\n\t*goto rebfightone\n\n*label rebfightone\n*choice\n\t#Duck and roll away.\n\t\t*set offensive %-15\n\t\t*if offensive > 50\n\t\t\t*set health -20\n\t\t\tUnfortunately, your reflexes are more attuned to offensive maneuvers, and so Rebellion lands ${youhis} punch with bone-shattering force.\n\t\t\t*goto attackrebtime\n\t\t*else\n\t\t\t*set rebelliondown +1\n\t\t\tYou pull off this defensive move flawlessly and Rebellion punches the nearest wall instead of you, racking up 1 hit point.\n\t\t\t*goto attackrebtime\n\t#Block and use a dirty move to make your point.\n\t\t*set offensive %-10\n\t\t*set lawless %-10\n\t\t*if offensive > 50\n\t\t\t*set health -20\n\t\t\tYou set a block and gear up for a return punch, but Rebellion is stronger than your defenses. \n\n\t\t\tSo Rebellion lands ${youhis} punch with bone-shattering force, dazing you too much to make your dirty move.\n\t\t\t*goto attackrebtime\n\t\t*else\n\t\t\t*set rebelliondown +1\n\t\t\tYou manage to successfully deflect Rebellion's super-strong punch and you take the opportunity to hit ${youhir} in the ear, racking up 1 hit point. $!{youze} lets out a brief grunt of pain.\n\t\t\t*goto attackrebtime\n\t#Hit Rebellion before ${youze} can hit me.\n\t\t*set offensive %+15\n\t\t*if offensive > 50\n\t\t\t*set rebelliondown +1\n\t\t\tSpinning into this offensive move works flawlessly and you crack Rebellion in the chin before ${youze} can hit you, racking up 1 hit point.\n\t\t\t*goto attackrebtime\n\t\t*else\n\t\t\t*set health -20\n\t\t\tUnfortunately, your normally defensive nature sells you short here. Your punch misses and leaves you wide open for Rebellion's counter-attack, which lands ${youhis} with bone-shattering force.\n\t\t\t*goto attackrebtime\n\n*label attackrebtime\n*page_break\n\nGathering yourself, you realize that you now have a rare shot to attack Rebellion with your Powers.\n\n*if warningsys\n\t*if chip_diva\n\t\t\"You have ${powerregain} Power Regain Points out of a possible 17. If that number is high, go hard!\" MeChip ${chipname} advises. \"If it's low, stay small with your attack.\"\n\t\t*goto rebfighttwo\n\t*else\n\t\t\"You have ${powerregain} Power Regain Points out of a possible 17. If that number is high, max out your Powers,\" MeChip ${chipname} advises. \"If it's low, stay conservative with your attack.\"\n\t\t*goto rebfighttwo\n*else\n\t*goto rebfighttwo\n\n*label rebfighttwo\n*set powerregain +1\n\n*choice\n\t#Hit Rebellion with a normal energy pulse. (Power Cost 5-15)\n\t\t*set unleash %-15\n\t\t*if (powerregain \u003c= 6)\n\t\t\t*set power -15\n\t\t\t*set health -8\n\t\t\t*set rebelliondown +3\n\n\t\t\tYou haven't been using your Powers much, so straining to generate the pulse is much harder than you anticipate.\n\n\t\t\tAs the pulse radiates out of you and stuns Rebellion with 3 hit points, you realize you were right to go with a conservative Power attack. Anything stronger surely would have backfired, given your Power Regain Point Level. \n\t\t\t*goto unleashcontrolchoice\n\t\t*elseif (powerregain \u003c= 12)\n\t\t\t*set power -10\n\t\t\t*set health -5\n\t\t\t*set rebelliondown +2\n\n\t\t\tAs the pulse radiates out of you and stuns Rebellion with relative ease, you realize you probably could have gone with a medium-level Power attack, given your Power Regain Point Level. \n\n\t\t\tStill, it looks like you got 2 out of a possible 3 hit points from this attack.\n\t\t\t*goto unleashcontrolchoice\n\t\t*else\n\t\t\t*set power -5\n\t\t\t*set health -3\n\t\t\t*set rebelliondown +1\n\n\t\t\tAs the pulse radiates out of you and stuns Rebellion with total ease, you realize you should have gone with a stronger Power attack, given your Power Regain Point Level. \n\n\t\t\tIt looks like you only got 1 out of a possible 3 hit points from this low-level attack.\n\t\t\t*goto unleashcontrolchoice\n\t#Hit Rebellion with an atomic-boosted energy blast. (Power Cost 15-30)\n\t\t*set unleash %+5\n\t\t*if (powerregain \u003c= 6)\n\t\t\t*set power -30\n\t\t\t*set health -15\n\t\t\t*set rebelliondown +2\n\n\t\t\tYou haven't been using your Powers much, so straining to generate the blast is much harder than you anticipate. You scream in pain, only managing to get out half of your intended blast to stun Rebellion.\n\n\t\t\tYou realize you probably should have gone with a lower-level Power attack, given your Power Regain Point Level. Still, it looks like you got 2 out of a possible 3 hit points from this attack.\n\t\t\t*goto unleashcontrolchoice\n\t\t*elseif (powerregain \u003c= 12)\n\t\t\t*set power -20\n\t\t\t*set health -10\n\t\t\t*set rebelliondown +3\n\n\t\t\tAs the blast bursts forward easily from your hands and stuns Rebellion with 3 hit points, you realize you were right to go with a medium-level Power attack. \n\n\t\t\tAnything stronger surely would have backfired, given your Power Regain Point Level. \n\t\t\t*goto unleashcontrolchoice\n\t\t*else\n\t\t\t*set power -15\n\t\t\t*set health -8\n\t\t\t*set rebelliondown +2\n\n\t\t\tAs the blast bursts forward easily from your hands and stuns Rebellion, you realize you could have gone with a stronger Power attack, given your Power Regain Point Level. \n\n\t\t\tStill, you got 2 out of a possible 3 hit points from this medium-level attack.\n\t\t\t*goto unleashcontrolchoice\n\t#Hit Rebellion with an atomic explosion. (Power Cost 30-50)\n\t\t*set unleash %+15\n\t\t*if (powerregain \u003c= 6)\n\t\t\t*set power -50\n\t\t\t*set health -25\n\t\t\t*set rebelliondown +1\n\n\t\t\tYou haven't been using your Powers much, so straining to generate an explosion is nearly impossible. You scream in pain, only managing to generate a tiny explosion that barely stuns Rebellion.\n\n\t\t\tYou probably should have gone with a low-level Power attack, given your Power Regain Point Level. It looks like you only got 1 out of a possible 3 hit points from this high-level attack.\n\t\t\t*goto unleashcontrolchoice\n\t\t*elseif (powerregain \u003c= 12)\n\t\t\t*set power -40\n\t\t\t*set health -20\n\t\t\t*set rebelliondown +1\n\n\t\t\tYou haven't been using your Infini Powers regularly, so straining to generate the explosion is much harder than you anticipate. You scream in pain, only managing to generate half of your intended explosion, which barely stuns Rebellion.\n\n\t\t\tYou probably should have gone with a medium-level Power attack, given your Power Regain Point Level. It looks like you only got 1 out of a possible 3 hit points from this high-level attack.\n\t\t\t*goto unleashcontrolchoice\n\t\t*else\n\t\t\t*set power -30\n\t\t\t*set health -15\n\t\t\t*set rebelliondown +3\n\n\t\t\tIt hurts like slugger, but you've been practicing the use of your Infini Powers and racking up Power Regain Points. \n\n\t\t\tSo the explosion slams into Rebellion with 3 hit points and you realize you were right to go with a high-level Power attack.\n\t\t\t*goto unleashcontrolchoice\n\n*label unleashcontrolchoice\n*page_break\n*set powerregain +1\n\nRebellion's skin is smoking, but ${youze} still seems ready for ${youhis} next attack. That's when Rebellion realizes that ${youze} stands next to the MG museum's space exhibit. \n\nWith a smile, Rebellion picks up an actual meteor and tosses it at you, not even breaking a sweat.\n\nSlugger.\n\n*if warningsys\n\t*if chip_diva\n\t\t\"This attack is gonna need some Power! Respond based on your Unleash/Control habits!\" MeChip ${chipname} advises. \"You've got ${rebelliondown} hit points out of the 5 you're gonna need!\"\n\t\t*goto rebfightthree\n\t*else\n\t\t\"Your response is going to require Power. React based on your Unleash/Control habits,\" MeChip ${chipname} advises. \"You currently have ${rebelliondown} hit points out of the 5 you will need.\"\n\t\t*goto rebfightthree\n*else\n\t*goto rebfightthree\n\n*label rebfightthree\n\n*choice\n\t#Eliminate all gravity around myself to neutralize the meteor.\n\t\tYou focus on the space around you and eliminate all gravitational pull, causing both you and the meteor to float harmlessly side-by-side.\n\n\t\tOnce out of range of the meteor, you let it crash to the ground beneath you by re-engaging gravity.\n\n\t\tRebellion growls across the room, angry this attack didn't work.\n\t\t*if (powerregain \u003c= 7)\n\t\t\t*set power -30\n\t\t\t*set health -15\n\t\t\t*goto weapbetltest\n\t\t*elseif (powerregain \u003c= 13)\n\t\t\t*set power -20\n\t\t\t*set health -10\t\t\n\t\t\t*goto weapbetltest\n\t\t*else\n\t\t\t*set power -10\n\t\t\t*set health -5\t\n\t\t\t*goto weapbetltest\n\t#Reverse the gravitational pull on the meteor and try to hit Rebellion with it.\n\t\t*set unleash %+15\n\t\t*if (unleash > 50)\n\t\t\t*set rebelliondown +2\n\t\t\tYou've been unleashing your Powers when you use them, so reversing the gravity of something this big isn't as daunting as it might otherwise be.\n\n\t\t\tIt takes a lot of Power and focus, but you reverse the meteor's gravity, sending it plummeting back towards a stunned Rebellion, scoring 2 hit points.\n\t\t\t*goto prtesttwo\n\t\t*else\n\t\t\t*set health -15\n\t\t\tUnfortunately, you've been controlling your Powers more than unleashing, so you find that the meteor is too big for you to affect. \n\n\t\t\tIt comes hurtling at you and you manage to dodge it at the last second, but it does clip you in the shoulder, knocking the wind out of you entirely. \n\t\t\t*goto prtesttwo\n\t#Fly and dodge the meteor.\n\t\t*set unleash %-15\n\t\t*if (unleash > 50)\n\t\t\t*set health -15\n\t\t\tThe meteor is too big for you to dodge entirely and it clips you in the shoulder, knocking the wind out of you.\n\n\t\t\tIt looks like unleashing more Power would have been a better move, here. \n\t\t\t*goto prtestone\n\t\t*else\n\t\t\t*set rebelliondown +2\n\t\t\tYou fly out of range easily thanks to your Power Control Level and the meteor shatters against the wall. \n\n\t\t\tMeteor shards then shoot everywhere and rain down on Rebellion, causing 2 hit points.\n\t\t\t*goto prtestone\n\n*label prtestone\n*if (powerregain \u003c= 7)\n\t*set power -20\n\t*set health -10\n\t*goto weapbetltest\n*elseif (powerregain \u003c= 13)\n\t*set power -15\n\t*set health -8\t\t\n\t*goto weapbetltest\n*else\n\t*set power -10\n\t*set health -5\t\n\t*goto weapbetltest\n\n*label prtesttwo\n*if (powerregain \u003c= 7)\n\t*set power -40\n\t*set health -20\n\t*goto weapbetltest\n*elseif (powerregain \u003c= 13)\n\t*set power -30\n\t*set health -15\t\t\n\t*goto weapbetltest\n*else\n\t*set power -20\n\t*set health -10\t\n\t*goto weapbetltest\n\n*label weapbetltest\n\n*if (health \u003c= 0)\n\t*if usehealingnet\n\t\t*goto healthdeath\n\t*else\n\t\t*page_break\n\t\t*set health 92\n\t\t*set usehealingnet true\n\n\t\tJust then you feel weak on your feet. Your Health Level has dropped too low!\n\n\t\tSo you reach for the healing dragnet in your weapons belt and wrap yourself in it as quickly as possible. You feel immediately better as the dragnet absorbs into your skin and restores your Health Level. \n\n\t\tAs great as that feels, you realize you won't be able to use the healing dragnet again, unfortunately.\n\n\t\tAt least you're still alive and ready to make your next move.\n\t\t*goto rebelliontestone\n*elseif (power \u003c= 0)\n\t*goto powerdeath\n*else\n\t*goto rebelliontestone\n\n*label rebelliontestone\n*if (rebelliondown >= 5) \n\t*page_break\n\t*achieve rebelliondown\n\tRebellion finally kneels on the ground, panting. It looks like ${youze} has taken too many hits, between ${youhis} brawl with The Diva and your fight.\n\n\t[i]Huh[/i], you think. [i]Maybe Rebellion's age is finally showing[/i]. \n\n\tOr maybe you've just gotten that good.\n\n\tYou turn to the nearest camera, realizing that taking Rebellion down this quickly in front of this big an audience is sure to boost your public stats the most.\n\n\t*set legend +10\n\t*if (feared > 50)\n\t\t*set feared %+25\n\t\t*goto rebellionweak\n\t*else\n\t\t*set feared %-25\n\t\t*goto rebellionweak\n*else\n\t*goto weapbelt\n\n*label weapbelt\n*page_break\n\nClearly frustrated that you're still standing, Rebellion comes at you again, relentless as ever.\n\n*if warningsys\n\t*if chip_diva\n\t\t\"Give them Powers a break and come at Rebellion with your weapons belt, this time based on your Lawful/Lawless Stat!\" MeChip ${chipname} advises. \"You've now got ${rebelliondown} hit points out of the 5 you're gonna need!\"\n\t\t*goto rebfightfour\n\t*else\n\t\t\"Please rest your Powers. Instead, attack Rebellion with your weapons belt, this time based on your Lawful/Lawless Stat,\" MeChip ${chipname} advises. \"You currently have ${rebelliondown} hit points out of the 5 you will need.\"\n\t\t*goto rebfightfour\n*else\n\t*goto rebfightfour\n\n*label rebfightfour\n\n*choice\n\t#Try to weaken Rebellion with the energy staff.\n\t\t*set lawless %-5\n\t\t*if (lawless > 50)\n\t\t\t*set rebelliondown +2\n\t\t\t*set health -20\n\t\t\tYou slam the staff into Rebellion's back and riddle ${youhir} with energy, scoring 2 hit points. \n\n\t\t\tBut you're not used to holding back and your attack isn't as effective as it could have been; Rebellion shrugs off the shock and snatches the energy staff, turning it on you with brutal force.\n\t\t\t*goto afterweapons\n\t\t*else\n\t\t\t*set rebelliondown +3\n\t\t\tSince this attack is right in line with your lawful ways, you slam the staff into Rebellion's back and riddle ${youhir} with energy, scoring 3 hit points.\n\t\t\t*goto afterweapons\n\t*selectable_if (usegrappling = false) #Try to restrain Rebellion with the grappling hook.\n\t\t*set rebelliondown +2\n\t\tThe grappling cord restrains Rebellion with some built-in energy charges, scoring you an unexpected 2 hit points.\n\n\t\tThis also buys you a few seconds to think about your next move before Rebellion inevitably breaks free…\n\n\t\tWhich happens instantly. So much for those few seconds.\n\t\t*goto afterweapons\n\t#Try to permanently injure Rebellion with plasma pistol fire.\n\t\t*set lawless %+5\n\t\t*if (lawless > 50)\n\t\t\t*set rebelliondown +3\n\t\t\tThe pistol fire riddles Rebellion with energy as the plasma bullets sink into ${youhis} skin.\n\n\t\t\tThe attack may not be enough to permanently injure someone as strong as Rebellion, but it does score you 3 hit points.\n\t\t\t*goto afterweapons\n\t\t*else\n\t\t\t*set rebelliondown +2\n\t\t\t*set health -20\n\t\t\tAt the last minute, your conscience gets the better of you; intentionally trying to injure your opponent is not what a hero does.\n\n\t\t\tWhile your shots find hit their target, they're not damaging as they could have been. Rebellion shrugs off the wounds and backhands you to floor.\n\t\t\t*goto afterweapons\n\n*label afterweapons\n*if (health \u003c= 0)\n\t*if usehealingnet\n\t\t*goto healthdeath\n\t*else\n\t\t*page_break\n\t\t*set health 92\n\t\t*set usehealingnet true\n\n\t\tJust then you feel weak on your feet. Your Health Level has dropped too low!\n\n\t\tSo you reach for the healing dragnet in your weapons belt and wrap yourself in it as quickly as possible. You feel immediately better as the dragnet absorbs into your skin and restores your Health Level. \n\n\t\tAs great as that feels, you realize you won't be able to use the healing dragnet again, unfortunately.\n\n\t\tAt least you're still alive and ready to make your next move.\n\t\t*goto rebelliontesttwo\n*else\n\t*goto rebelliontesttwo\n\n*label rebelliontesttwo\n*if (rebelliondown >= 5) \n\t*page_break\n\tRebellion finally kneels on the ground, panting. It looks like ${youze} has taken too many hits, between his brawl with The Diva and your fight.\n\n\t[i]Huh[/i], you think. [i]Maybe Rebellion's age is finally showing[/i]. \n\n\tOr maybe you've just gotten that good.\n\n\tYou then turn to the nearest camera, realizing that taking Rebellion down in front of this big an audience is sure to boost your public stats.\n\n\t*set legend +8\n\t*if (feared > 50)\n\t\t*set feared %+15\n\t\t*goto rebellionweak\n\t*else\n\t\t*set feared %-15\n\t\t*goto rebellionweak\n*else\n\t*goto solochoice\n\n*label solochoice\n*page_break\n\nObviously wanting to finish this brawl, Rebellion pulls you into a hand-to-hand fight.\n\nYou know the only way to finally end this is to let Rebellion get in one good hit, then fake ${youhir} out with a surprise return hit—one that will put Rebellion down for good.\n\nSo as Rebellion swings at you, you brace yourself for this blow, knowing you need to stay standing and spin into your reverse attack.\n\nYou just hope you have enough Health to withstand this last blow.\n\n*set health -20\n*if (health \u003c= 0)\n\t*if usehealingnet\n\t\t*goto healthdeath\n\t*else\n\t\t*page_break\n\t\t*set health 92\n\t\t*set usehealingnet true\n\n\t\tJust then you feel weak on your feet. Your Health Level has dropped too low!\n\n\t\tSo you reach for the healing dragnet in your weapons belt and wrap yourself in it as quickly as possible. You feel immediately better as the dragnet absorbs into your skin and restores your Health Level. \n\n\t\tAs great as that feels, you realize you won't be able to use the healing dragnet again, unfortunately.\n\n\t\tAt least you're still alive and ready to make your next move.\n\t\t*goto yourfinalhittwo\n*else\n\t*goto yourfinalhittwo\n\n*label yourfinalhittwo\n*page_break\n\nThe force of Rebellion's punch to your jaw sends you spinning—but
