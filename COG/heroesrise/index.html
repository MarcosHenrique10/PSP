I've got to get going,\" she says. \"I do have a little congratulatory present for you, though.\"\n\n\"What's this?\" you ask as she hands you a slip of paper (so old-school) with an address scribbled on it.\n\n\"I dug up all I could on Prodigal,\" Jenny says. \"I'm sad to say there isn't a whole lot out there. All I could find was that address, which is registered under the name 'Prodigal.' It's not much…\"\n\n\"But it's a start,\" you finish, knowing this is the perfect time to start looking into Prodigal—especially after Madame Vice's mysterious murder. \"I think I just figured out what I'm doing for the day.\"\n\n\"Ahem,\" Grandma coughs, nodding directly at ${sidekick}. \"What you both are doing for the day.\"\n\n*choice\n\t#\"Right, I'll put on my costume and we'll get to it.\"\n\t\t*set rlshp_sk %+10\n\t\tYou stand up and walk out of the kitchen, smiling at ${sidekick} as you go.\n\t\t*goto mega_convo\n\t#\"If I must…\"\n\t\t*set rlshp_sk %-10\n\t\tYou stand up and walk out of the kitchen, not wanting to see anyone's reaction to your less-than-warm reception of ${sidekick}.\n\t\t*goto mega_convo\n\t#I don't say anything.\n\t\tWithout another word, you stand up and walk out of the kitchen.\n\t\t*goto mega_convo\n\n*label mega_convo\n\n*if megability_use\n\tBut Jenny stops you.\n\n\t\"Keep me updated on what you find there. Wonderful brunch, Ms. Sterling,\" Jenny says, heading toward the door.\n\n\tAs she goes, a thought occurs to you—you've been meaning to ask Jenny about what happened last night with your so-called megability…but is now the right time?\n\n\t*choice\n\t\t#Yes, I want to ask Jenny what's going on with my Powers.\n\t\t\t\"Jenny, before you go,\" you start, \"last night I did something with my Powers I've never done before. After what you said, I tried to figure out the source of my Power and I totally swore that I could-\"\n\n\t\t\tYou stop as you see Jenny and Grandma exchange a loaded glance.\n\n\t\t\t\"What?\" you ask as Grandma crosses her arms.\n\n\t\t\t\"Nothing,\" Jenny says, her eyes down. \"We can talk about that later, ${firstname}. I've really got to be going.\"\n\n\t\t\tAs Jenny turns to leave, it's clear that she and Grandma are up to something. You make a mental note to push the issue later, when ${sidekick} isn't around.\n\n\t\t\tFor now, it's time to suit up.\n\t\t\t*goto flashes\n\t\t#No, not in front of Grandma and ${sidekick}.\n\t\t\tYou'll ask Jenny some other time when you have a bit more privacy. For now, it's time to suit up.\n\t\t\t*goto flashes\n\t\t#Tell Jenny I want to talk about it later.\n\t\t\t\"Jenny,\" you start, \"we need to talk about my Powers later. Last night I did something with my Powers I've never done before-\"\n\n\t\t\tYou stop as you see Jenny and Grandma exchange a loaded glance.\n\n\t\t\t\"What?\" you ask as Grandma crosses her arms.\n\n\t\t\t\"Nothing,\" Jenny says, her eyes down. \"We can talk about that later, ${firstname}. I've really got to be going.\"\n\n\t\t\tAs Jenny turns to leave, you make a mental note to push the issue later, when Grandma isn't around.\n\n\t\t\tFor now, it's time to suit up.\n\t\t\t*goto flashes\n\n*label flashes\n*page_break Ten Minutes Later\n\nAs you and ${sidekick} fly across the border of the Eastern Fringes, you catch the smallest trace of a flash in your peripheral vision.\n\nSonja.\n\nYou didn't see a flash like this at all last night, so you weren't sure whether Sonja was still following you. Obviously she is—and she must have some pretty advanced camouflaging abilities to boot.\n*if sonja_yes\n\tYour heart quickens a bit, excited at the prospect of another press appearance. You could definitely start getting used to these.\n\t*goto fear\n*else\n\tYou're not sure you'd be able to find Sonja even if you tried. She seems intent on following you, despite your direct refusal. At this point, the best you can do is give her some good things to report.\n\t*goto fear\n\n*label fear\n\nThough the fact that Sonja can be watching you at any time without your knowledge is quite jarring. You just hope that no matter what, she keeps her promise not to reveal your secret identity.\n\n*page_break\n\n*if fly_upgrade\n\t*goto convo_real\n*else\n\t*set power -2\n\t*goto convo_real\n\n*label convo_real\n\nOn the fly-ride over,\n*if sparrow\n\tSparrow is completely silent except for a quick thanks for improving the state of Ani-gang violence in the Fringes.\n\n\tAfter a rather awkward stretch of minutes,\n\t*goto address\n*elseif pressie\n\tPressie asks you a million questions a minute about every minor detail of your visit with The Millennial Group.\n\n\tAfter recounting the color of the walls in the Mission Control Hub,\n\t*goto address\n*else\n\tTarana Rain does not stop asking questions about her idol, The Diva (in between chugs from her flask, no less).\n\n\tAfter recounting the color of The Diva's lipstick (which you made up),\n\t*goto address\n\n*label address\nyou finally arrive at the address, which is all the way up on MC's northern shore, near the shipyard docks. It's located in the middle of several warehouses and appears to be a very large storage space with no windows and only one door.\n\nWhich makes your options for entrance rather limited. You and ${sidekick} land next to the front entrance. \n\n*if sparrow\n\t\"Do you think it's advisable to enter through the front door?\" Sparrow chirp-speaks. \"It could be a trap….\"\n\t*goto duh\n*elseif pressie\n\t\"Uh, ${mr_ms} ${codename}, do you think it's so smart to go through the front door?\" Pressie asks, looking around nervously. \"What if it's a trap?\n\t*goto duh\n*else\n\t\"Yo, spazoid,\" Tarana Rain grunts, \"you do realize walking through the front door will definitely lead to a trap, right?\" \n\t*goto duh\n\n*label duh\n\n\"If there's a stealthier option,\" you say, \"I'm happy to follow your lead.\"\n\n${sidekick} has no answer, so you turn back toward the door. There's a massive electronic lock on it with a password screen, but you assume the code will be impossible to crack.\n\nHow do you want to break in?\n\n*label lock\n*choice\n\t#Surge open the lock. (Power Cost 3)\n\t\tThe last few times you tried your Powers on technology, things didn't go too well—but you're hoping those were just isolated incidents. You reach forward and place your hand on the lock, feeling an energy surge trickle down your forearm.\n\n\t\tWith a gentle whoosh, the lock shorts out and the screen goes blank. You turn back to look at ${sidekick}, who nods, impressed.\n\n\t\tThat is, until the lock suddenly explodes.\n\n\t\tLuckily, it only singes your hand a bit, but you don't turn around to look at ${sidekick} again, instead pushing the door open. What is it with your energy Powers and electronics?\n\t\t*set power -3\n\t\t*set health -5\n\t\t*goto entrance \n\t*disable_reuse #Ask ${sidekick} if ${skze} can help.\n\t\t*set rlshp_sk %+15\n\t\t\"You have any tricks up your sleeve for getting inside?\" you ask, turning to ${sidekick}.\n\n\t\t*if sparrow\n\t\t\tSparrow shakes her beak back and forth—apparently breaking and entering isn't her forte.\n\t\t\t*goto lock\n\t\t*elseif pressie\n\t\t\tPressie grins from ear to ear, nearly trembling with delight. \"I thought you'd never ask!\"\n\n\t\t\tPressie waddle-walks forward and nuzzles his peg leg against the bottom of the door. Closing his eyes tightly and sticking his tongue out of the side of his mouth, he activates his Power. Suddenly, you see the ground beneath the door begin to dig itself out, forming a groove.\n\n\t\t\tIn a matter of seconds, Pressie clears enough dirt for you both to crawl under.\n\n\t\t\t\"Very impressive,\" you say as you crouch down. Pressie follows, looking like he might explode from happiness. \n\t\t\t*goto entrance\n\t\t*else\n\t\t\tTarana Rain looks up from her MeChip as if you're causing her the greatest inconvenience of her life.\n\n\t\t\t\"Must I always do everything around here?\" she says, pointing a finger toward the lock. A thin stream of water shoots from her fingertip into the lock and it begins to smoke. You suppress a giggle, since it looks like Tarana Rain is taking a leak on the lock….\n\n\t\t\tAfter a few seconds, the lock sizzles and shorts out, popping open the door.\n\n\t\t\t\"What would you ever do without me?\" Tarana Rain asks, striding into the warehouse. You shake your head as you follow.\n\t\t\t*goto entrance\t\t\n\t*disable_reuse #Try to unscramble the password.\n\t\tYou look down at the lock screen and see that, oddly enough, there's a jumble of letters—could figuring out the password be as simple as unscrambling them?\n\n\t\tFiguring it's worth a shot, you scan the letters.\n\t\t*rand scramble 1 3\n\t\t*if scramble = 1\n\t\t\tnrtee\n\n\t\t\tThen you type the answer into the touch pad, in all lower-case letters:\n\t\t\t*input_text password\n\t\t\t*if password = \"enter\"\n\t\t\t\t*goto correct\n\t\t\t*else\n\t\t\t\t*goto incorrect \n\t\t*elseif scramble = 2\n\t\t\tgprloadi\n\n\t\t\tThen you type the answer into the touch pad, in all lower-case letters:\n\t\t\t*input_text password\n\t\t\t*if password = \"prodigal\"\n\t\t\t\t*goto correct\n\t\t\t*else\n\t\t\t\t*goto incorrect\n\t\t*else\n\t\t\tswosrdap\n\n\t\t\tThen you type the answer into the touch pad, in all lower-case letters:\n\t\t\t*input_text password\n\t\t\t*if password = \"password\"\n\t\t\t\t*goto correct\n\t\t\t*else\n\t\t\t\t*goto incorrect\n\n*label correct\n\nSuddenly, the lock clears and the door pops open—looks like you were right! Though that felt way too simple, you think, as you step inside.\n*goto entrance\n\n*label incorrect\n\nAs an electric shock pulses through your hand, you jump back away from the lock. Looks like you were wrong….\n\n*set health -10\n*goto lock\n\n*label entrance\n\nBut then as you enter the warehouse, you gasp at what you find inside….\n\n*page_break\n\nShelf upon shelf of unactivated pool-killer robots—the same ones sent by The Splice Circle after you and Black Magic. There must be thousands lining the shelves in this warehouse. \n\nYour mind begins to race—what does Prodigal have to do with these pool-killers? Did she supply them to Madame Vice as a peace offering? Or did Madame Vice just put Prodigal's name on the building deed to frame her, out of revenge?\n\nThen you consider how, if these robots were suddenly to activate, you and ${sidekick} would be completely outnumbered. You and Black Magic had trouble handling four of these things, let alone four thousand. You hope that The Millennial Group shutting down the pool-killer mainframe at Ace's High last night put these things out of commission….\n\nBut everything else clears from your mind when you see a massive sign in the back of the warehouse that reads \"THE ARTILLERY.\"\n\nYour blood runs cold.\n\nMiss Artillery is the name of the heroine who your parents killed…what the slugger? Could that really just be a bizarre coincidence? Or is someone out there toying with-\n\n\"${codename},\" ${sidekick} says, tugging on your arm, \"I want to get out of here. This doesn't feel right.\"\n\n*page_break\n\nYou can't help but agree—a deep pit of dread overtook your stomach the moment you stepped into this place. You'd like nothing more than to get the hell out of here, but you know there's work to be done.\n\n\"I know,\" you say, \"but I need to check for clues. While I look around, you get clear of the building and call\n\n*fake_choice\n\t*if (sanders) #Officer Sanders at the MCPD.\"\n\t#Black Magic.\"\n\t#Jenny.\"\n\t#Rebellion.\"\n\n\"All right,\" ${sidekick} says, \"But what if those things come to life?\"\n\nYou turn to look over the gleaming metal cores of the dormant pool-killers, deadly tentacles wrapped around their bases.\n\n\"Then let's just hope we fly faster than they do….\"\n\n*page_break\n\nOnce ${sidekick} is clear, you creep farther into the warehouse, looking for anything that might lead you to finding Prodigal. Your mind just won't stop spinning—something about all of this is very, very wrong. \n\nSo wrong that you don't even notice as a soft strip of fabric slides around your waist….\n\nAt first, a warm feeling overcomes you, almost like slipping into a blanket. It isn't until two new strands of pearly, ivory fabric wrap around your arms that you snap out of it.\n\nYou spin to find an enchanting—yet eerie—figure standing about ten feet from you. The creature looks almost human but somehow more ethereal. He (at least you think it's a he) is bone thin and wrapped in never-ending silken strands of fabric, wisping as if in the wind. He looks like some kind of sheer mannequin mummy.\n\nYou can't help but get lost in the movement of the fabric, which billows like flowing water. But somewhere deep inside, an instinct screams in your head—fight back!\n\n*choice\n\t#Fly-spin to unravel this wisping mannequin. (Power Cost 5)\n\t\tYou hover off the ground and begin to spin. As you do, the fabric wraps around you in great loops, but doesn't seem to unravel from your attacker at all. You quickly stop, realizing that you're only tangling yourself further in a limitless strip….\n\n\t\t*set power -5\n\t\t*set offensive %-5\n\t\t*goto late\n\t#Charge some marbles from my belt into bombs. (Power Cost 3)\n\t\t*set offensive %+5\n\t\t*goto late\n\t#Send an energy charge rippling through the fabric strands. (Power Cost 5)\n\t\t*set offensive %+5\n\t\t*goto late\n\n*label late\nYou try to move your arms but the moment you do, the fabric constricts even more tightly around your body. The wispy figure then begins to hum a low, guttural chant.\n\nYou scream as the fabric squeezes against your bones.\n\nThough it's not a scream of pain. Even though your skin blisters from the constriction, the sensation feels almost like scratching an itch. Or sneezing. As the fabric's hold grows tighter, the feeling builds into something closer to pleasure.\n\nAnd when your bones finally do crack, it feels like an explosion. Your whole body quivers with shock waves of satisfaction. It's the best feeling you've ever had.\n\nThen, as suddenly as the feeling started, it stops. \n\n*set health -20\n*page_break\n\nYou open your eyes to find\n*if sparrow\n\tSparrow swooping down to peck at the Wisp's eyes.\n\t*goto pain\n*elseif pressie\n\tPressie clobbering the Wisp with a chunk of raised earth.\n\t*goto pain\n*else\n\tTarana Rain blasting the Wisp with a concentrated stream of water.\n\t*goto pain\n\n*label pain\n*set health -64\n\nThe Wisp recoils from the attack, beginning to reel in his strands. And as they leave your body, jolts of excruciating pain begin to rocket through you. The Wisp's fabric must have had some kind of poisonous effect on your nerve endings, because once the strips are fully gone, you feel the crush of it all: your broken arm and leg bones, your splintered rib cage, your shattered hips….\n\nWithin seconds, you begin to black out, overwhelmed by the unimaginable pain. The moment before you do, you manage to clear your brain enough to scream:\n\n*fake_choice\n\t#\"${sidekick}, save yourself!\"\n\t#\"${sidekick}, don't hold back!\"\n\t#\"${sidekick}, I need healing!\"\n\nThen everything goes black.\n\n*page_break\n\nYou find yourself in a dream, jumping up into the sky, climbing higher and higher…until fear grips you. What will happen when you stop rising? How will you stop yourself from falling? Can you even fly anymore?\n\nAs you drift into a bank of clouds, the fear wells up in your stomach…\n\nUntil finally you begin to plummet down to the ground, picking up speed as you fall, the ground racing up to meet you….\n\n*page_break Sometime Later\n*set health +30\n\nWhen you finally open your eyes again, you grind your teeth together, bracing for a fresh wave of pain.\n\nBut all you feel is sore, like you've just run a marathon. Wait—how are you even opening your eyes to begin with? That Wisp thing broke almost every bone in your body, shouldn't you be-\n\n${sidekick}! Where is ${skze}? Is ${skze} alive?\n\nYou bolt upright, causing a nasty head rush that clouds your vision. You rub your eyes and when you can finally see again, you find both the Wisp and ${sidekick} lying on the ground next to you.\n\n\"Oh slugger,\" you say, rushing to ${sidekick}'s side as fast as your sore body will take you. Please don't be dead, please don't be…\n\nBut ${sidekick}'s eyes flutter open just as you reach ${skhis} side. \n\n\"Did it work?\" ${sidekick} croaks, looking exhausted.\n\n*choice\n\t#\"Did what work?\"\n\t\t*goto explain\n\t#\"What did you do?\"\n\t\t*goto explain\n\t#\"Do you need to be healed?\"\n\t\t\"I think…\" ${sidekick} whispers, looking terribly fragile.\n\n\t\tYou immediately place your hand on ${skhis} arm and feel the uneasy sensation of draining your Power to heal ${sidekick}. \n\n\t\t*set power -25\n\n\t\tOnce done, you're relieved to see the color start to return to ${sidekick}'s face. When ${skze} is strong enough to sit up, ${skze} starts to tell you what happened.\n\t\t*goto explain\n\n*label explain\n\n\"I heard you screaming, so I didn't make the call and came back inside instead. I saw that…thing attacking you, so I hit it hard and knocked it out. You were in such bad shape, but I've never healed anyone before. Still, you were about to die….\"\n\n\"Whatever you did, it worked,\" you say.\n\n*if sparrow\n\t\"If I chirp at a very specific frequency, it has healing qualities,\" Sparrow says. \"I could only do it for a few seconds before passing out, though.\"\n\t*goto wonder\n*elseif pressie\n\t\"I guess I can pull certain essential nutrients out of the soil to heal people,\" Pressie says. \"But I could only do it for a few seconds before passing out.\"\n\t*goto wonder\n*else\n\t\"Looks like I can generate some kind of healing water,\" Tarana Rain says, grimacing. \"Though you don't want to know where the secretion comes from. I could only stand it for a couple of seconds before passing out.\"\n\t*goto wonder\n\n*label wonder\n\nOne evolutionary side effect of Powered individuals is Before ${chipname} even has a chance to ask if you want to answer, Black Magic appears in holographic form, evidently having placed an urgent priority call.\n\n\"${codename}, please help!\" Black Magic screams. \"Get to the headquarters now!\"\n\nWith that, the call goes dead. You try to call back, but get immediately bumped to holo-mail.\n\n*if bmnoromance\n\tYou may not want to get involved with Black Magic, but you can't leave ${bmhir} to die, either\n\n\tYou turn to ${sidekick}, your adrenaline already pumping. \"Can you get home on your own?\"\n\t*goto skresponses\n*else\n\tYou turn to ${sidekick}, your adrenaline already pumping. \"Can you get home on your own?\"\n\t*goto skresponses\n\n*label skresponses\n\n*if sparrow\n\t\"Yes. Go.\"\n\n\tWithout wasting another second, you take to the sky.\n\t*goto chapterfinale\n*else\n\t\"I want to come-\"\n\n\t\"Go home now and I promise I'll introduce you to The Millennial Group later. But if you follow, I'll just pretend you're a deranged stalker fan.\"\n\n\tIt may be harsh, but if someone as Powerful as Black Magic is really in trouble, it's bound to be serious. You can't be putting ${sidekick} in (yet another) dangerous situation. \n\n\tSo you take to the sky, leaving ${sidekick} to pout.\n\t*set rlshp_sk %-10\n\t*goto chapterfinale\n\n*label chapterfinale\n*finish Next Chapter: The Room\n\n*label delay\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Heroes Rise: The Prodigy[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2025-06-12 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n*return"}};
