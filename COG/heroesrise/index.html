<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Heroes Rise: The Prodigy — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>

        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "heroesrise", "title": "Heroes Rise: The Prodigy", "scenes": {"case_magic": "*comment é\n\n*text_image chap_9.png center Chapter 9: Case Magic\n\nAs you leave The Vigilante, you have to squint against the rising sun—morning has arrived already, but you're too amped for your mission to be tired.\n\nYour eyes adjust to the light just in time to catch another flash out of the corner of your eye. Why does that keep happening? Is it some side-effect of your energy Powers you haven't experienced before? Or maybe someone's following you?\n\nYou find your answer, however, as you look to the corner and see a woman waving at you—it's Sonja Challa, the reporter who published the Gravitas stories about you.\n\n*page_break\n\n\"How long have you been following me?\" you ask as you approach, not in the mood for niceties—especially not with this woman.\n\n\"How long have you been seeing flashes you can't quite spot?\" Sonja asks, speaking so quickly her words blur together. \"You only saw me now because I wanted you to, for the record.\"\n\n\"Great. And thanks so much for the glowing article on the Gravitas case. I really enjoyed it.\"\n\n\"I don't create the facts, I report them,\" Sonja says impatiently. \"If you want a good story, do better next time.\"\n\n*if sonja_meet\n\tSonja's eyeballs flash bright, white light, taking another mental picture of you. Then they begin to twitch back and forth, once again taking notes on your meeting.\n\t*goto offer\n*else\n\tSonja's eyeballs suddenly flash bright, white light, taking a mental picture of you (literally—it appears she has some kind of optic-photographic Power). The residual twinkling in your eyes catches on the dozens of gold bracelets lining Sonja's wrist. She's a short, Indian woman with two thick braids of hair tied into a bun, wearing shade upon indiscernible shade of black. Her liquid, brown eyes twitch back and forth, no doubt taking mental notes on your meeting.\n\t*goto offer\n\n*label offer\n\n\"Anyway, I've been following you for an in-depth piece,\" Sonja says, beginning to pace as she speaks. \"You should be flattered. Now I wanted to ask you if I could have further access to your life as a hero—nothing to break your secret identity, of course, but simply permission to follow all of your in-costume escapades.\"\n\nWell, that's quite an offer—what do you think?\n\n*choice\n\t*if (fame > 50) #Of course I'm going to say yes to such a fantastic press opportunity!\n\t\t*set fame %+15\n\t\t*goto press_yes\n\t#I'm not really sure, but I do know that Sonja is probably going to follow me no matter what I say. So I might as well say yes and have her on my good side….\n\t\t*set fame %+5\n\t\t*goto press_yes\n\t#I can't trust someone like Sonja—she already trashed me once. Why wouldn't she do so again, if given the chance?\n\t\t*set fame %-5\n\t\t*goto press_no\n\t*if (fame \u003c 50) #Press doesn't matter to me—no way am I giving someone like Sonja that kind of access.\n\t\t*set fame %-15\n\t\t*goto press_no\n\n*label press_yes\n*set sonja_yes true\n\n\"Fine, but there will be conditions as to-\"\n\n\"An excellent choice,\" Sonja cuts you off. \"I'll give you a heads-up before the article comes out, as a courtesy. But you won't be seeing me again….\"\n\nBefore you can respond, there's another bright, white flash. And when your eyes finally recover, Sonja is gone.\n\nExcited to see what kind of article Sonja will put together, you make sure to strike a pose while flying into the air, just in case she's still watching.\n\nAs you go, you also decide that your next move should be to:\n*goto gone\n\n*label press_no\n\"No, I don't think so,\" you say, crossing your arms.\n\n\"That's a shame,\" Sonja says. \"I was hoping we could do this the easy way.\"\n\nBefore you can respond, there's another bright, white flash. And when your eyes finally recover, Sonja is gone.\n\nGreat, you think, it looks like Sonja is going to do whatever she wants, no matter what you say. Adding this to the list of things you must eventually take care of, you take back to the sky, deciding to:\n*goto gone\n\n*label gone\n\n*if fly_upgrade\n\t*goto clue\n*else\n\t*set power -2\n\t*goto clue\n\n*label clue\n*choice\n\t#Look for clues at The Ryeval Bar, Kirkpatrick's former place of business.\n\t\tFifteen minutes later, you sit at the bar in The Ryeval and order your favorite soda so you can check out the place. As you look around, you're surprised by how nice the place is compared to its scuzzy clientele. You bet you can't swing your arm in here without finding some kind of criminal—a thought to keep in mind for finding future cases.\n\t\t*set money -6\n\n\t\tWhat interests you most, however, is the large woman sitting in a back booth with two police officers. From the look of her crocodile skin and spiked alligator tail, you guess that she's the new owner of The Ryeval (which would also make her Madame Vice's newest General). Seeing that the croc-lady is busy, you figure this is the perfect time to look for some clues \"Kirkpatrick\" may have left behind. \n\n\t\tYou leave a tip on the bar and walk toward the bathroom. Once you reach the back corridor, you slip behind a door marked \"Employees Only\" and immediately spot a door that reads \"Owner's Office.\" Jackpot.\n\n\t\tYou break in unseen, breathing a sigh of relief. That is, until you see the place….\n\n\t\tIt has been turned upside down, completely ransacked by the police and Madame Vice's crew, you assume. If there were ever any clues to be found here, you doubt there are any left at this point. Still, you figure there's no harm in trying to-\n\n\t\t\"Freeze!\" you hear someone shout from behind you. Keeping your cool, you turn around to find the two police officers standing in the doorway, aiming their guns at you. \n\n\t\tPerfect.\n\t\t*goto police\n\t#Look for clues at Kirkpatrick's apartment.\n\t\tWhile it was easy enough to figure out where \"Kirkpatrick\" lived and fly into his apartment through an open window, when you arrived you found that the place had been turned upside down, completely ransacked by the police and Madame Vice's crew.\n\n\t\tIf there were ever any clues to be found here, you doubt there are any left at this point. Still, you figure there's no harm in trying.\n\n\t\tLooking around the apartment, you spot a secret room in the back that has been left unlocked. You walk inside and are giddy to find yourself in Static's secret lair. \n\n\t\tSince Static's only Power is to resist mind control, he keeps a considerable amount of weapons and body armor for fighting. Most of his arsenal has been wiped clean by now but a few random weapons remain. You look over the training stations with envy—you wish you had a lair like this to-\n\n\t\t\"Freeze!\" you hear someone shout from behind you. Keeping your cool, you turn around to find two police officers standing in the doorway, aiming their guns at you. \n\n\t\tPerfect.\n\t\t*goto police\n\t*if (vice_friend) #Go to Shed—maybe I can find Madame Vice and cut a deal with her, since the chances of me finding Kirkpatrick's evidence aren't great.\n\t\tLooking for clues is silly since both the police and Madame Vice's crew have probably already ransacked Kirkpatrick's apartment and The Ryeval. Besides, there's no use trying to fight a solo war against The Splice Circle. You certainly don't approve of what they do but you also don't want them as enemies this early in your career.\n\n\t\tSince you gave Madame Vice that tip-off back at the Gravitas raid, perhaps she will give you some information on how to find Prodigal. It's not exactly ideal, but you'd still be bringing down a villain, knocking two enemies off your currently oversized list and helping your career all at the same time. The world isn't always black and white, after all.\n\n\t\t*page_break Ten Minutes Later\n\n\t\tStanding outside of Shed, you take a deep breath, beginning to form a strategy for what you'll do if this deal doesn't go quite as well as-\n\n\t\t\"Freeze!\" you hear someone shout from behind you. Keeping your cool, you turn around to find two police officers standing in the doorway, aiming their guns at you. \n\n\t\tPerfect.\n\t\t*goto police\n\n*label police\n*page_break\n\nAs you stand face to face with the officers, you try to decide how to handle the situation. You have to consider what has happened between you and the police so far: at best they absolutely hate you and at worst they think you're a fugitive.\n\nStill, maybe now is the time to set the record straight? Better decide quickly…\n\n*choice\n\t#Talk things over with the police.\n\t\t*set lawless %-20\n\t\t*set badassbonus false\n\t\t*if (sanders)\n\t\t\t\"Hey, listen,\" you say, \"I'm the hero who worked with Officer Sanders to help capture Trackr and find The Gravitas. I'm here to see if I can help to find the Static evidence, too.\"\n\n\t\t\tThe officers eye each other, obviously not expecting you to have that much information.\n\n\t\t\t\"So you're ${codename}? The hero that screwed everything up?\" the first Officer says, her gun still trained on you.\n\n\t\t\t\"Well, I'd say I'm the hero who solved the case and then had some trouble keeping several maniacs from killing each other,\" you say. \"But that's just my take.\"\n\n\t\t\tThe officers look to each other again and nod, then lower their weapons.\n\n\t\t\t\"You really screwed us on the Gravitas case,\" the second officer says. \"So just do us a favor and get out of here.\"\n\n\t\t\t\"I saw some things while I was in The Splice Circle's headquarters. Maybe I could help to identify-\"\n\n\t\t\t\"Don't get involved,\" the first officer says sternly. \"You won't get this chance twice.\"\n\n\t\t\tYou nod, moving to leave. This isn't exactly an ideal response but at least the police let you go.\n\t\t\t*set legend +2\n\t\t\t*page_break\n\t\t\t*goto escape\n\t\t*else\n\t\t\t\"Hey listen, I know you guys think I'm a villain,\" you say, putting your hands in the air, \"But I'm here to help you with-\"\n\n\t\t\t\"$!{Youze}'s moving!\" one of the officers shouts. \"Fire!\"\n\n\t\t\tBefore you can react, you feel electric tazer blasts jolt your body, and your vision starts to go black. Looks like the police were itching for an excuse to take you down no matter what you did.\n\n\t\t\tWhat else could you expect? You are a fugitive, after all.\n\t\t\t*set health -15\n\t\t\t*set legend -2\n\t\t\t*goto arrest\n\t#Try to escape from the police.\n\t\t*set lawless %+20 \n\t\t*if (sanders)\n\t\t\tYou may have a good relationship with Officer Sanders but you're not sure whether these officers will care about that. So you immediately take flight, hoping to escape without any further altercation.\n\n\t\t\t\"$!{Youze}'s moving!\" one of the officers shouts. \"Fire!\"\n\n\t\t\tBefore you can react, electric tazer blasts jolt your body, and your vision starts to go black. Looks like the police were itching for an excuse to take you down.\n\n\t\t\tAnd you just gave them one….\n\t\t\t*set health -15\n\t\t\t*set legend -2\n\t\t\t*goto arrest\n\t\t*else\n\t\t\tYou haven't wanted to work with the police in the past and you're not about to start now, especially not after the whole Gravitas debacle. You know the police will be out for blood—your blood.\n\n\t\t\tSo you immediately take flight, hoping to escape without any further altercation. You hear some shots go off behind you, but you don't stop flying until you're clear of the scene.\n\n\t\t\t*set legend +2\n\t\t\t*goto escape\n\t#Attack the police.\n\t\t*set lawless %+50\n\t\t*set moralbonus false\n\t\t*if (sanders)\n\t\t\tYou may have a good relationship with Officer Sanders but you're not sure whether these officers will care about that. So you raise your hands to blast, hoping you can end this before the police recognize you.\n\n\t\t\t\"Fire!\" one of the officers shouts.\n\n\t\t\tBefore you can react, electric tazer blasts jolt your body, and your vision starts to go black. Looks like the police were itching for an excuse to take you down.\n\n\t\t\tAnd you just gave them one….\n\t\t\t*set health -15\n\t\t\t*set legend -2\n\t\t\t*goto arrest\n\t\t*else\n\t\t\tYou haven't wanted to work with the police in the past and you're not about to start now, especially not after the whole Gravitas debacle. You know the police will be out for blood—your blood. So you raise your hands to blast, hoping you can end this before the police recognize you.\n\n\t\t\t\"Fire!\" one of the officers shouts.\n\n\t\t\tBefore you can react, electric tazer blasts jolt your body, and your vision starts to go black. Looks like the police were itching for an excuse to take you down.\n\n\t\t\tAnd you just gave them one….\n\t\t\t*set health -15\n\t\t\t*goto arrest\n\n*label arrest\n*page_break Ten Minutes Later\n\nYou wake up in the back of a police van, fitted with handcuffs that nullify your Powers. This is it. Your heroic career has ended before it even had the chance to begin. The police will haul you off somewhere and charge you with any number of crimes, many of which you may actually be guilty of committing.\n\nNow you're going to be thrown into some Powered prison just like your parents. You'll be disgraced, unable to clear your family name….\n\nNo, you think. You have to find a way out of this—there's no other option. You begin to search the back of the dark van for a way to pry yourself out of your handcuffs. If you can just get those off, you'll have no problem blasting your way out. But there's nothing back here….\n\nYou're contemplating dislocating your thumbs to wriggle free when the doors to the van swing open. The rush of sunlight blinds you and you can't make out anything through the doors.\n\n\"Officers, I can't tell you how much this means to me,\" says a smooth and friendly voice. \"This will really help our end of the investigation.\"\n\n\"Of course,\" you hear one of the officers say. \"We're big fans, by the way.\"\n\n\"Why, thank you,\" the voice says. \"I won't be forgetting that any time soon.\"\n\nThat's when your vision clears and you find yourself looking out at…\n\n*page_break\n\nBlack Magic.\n\nYou blink several times, sure that your eyes are deceiving you. \n\nBut they're not. That really is Black Magic, your biggest crush, bailing you out.\n\nHoly slugger.\n\n*page_break Two Minutes Later\n\nEven after the police set you free and Black Magic escorts you to a nearby rooftop, you still can't fathom what's going on.\n\n*goto black_magic\n\n*label escape\n*if fly_upgrade\n\t*goto roofit\n*else\n\t*set power -2\n\t*goto roofit\n\n*label roofit\nYou fly to a nearby rooftop to try and decide what to do—you're obviously not going to pull out of the case, no matter what. You're thinking that maybe you could go to another location you passed up when you hear a thud on the roof behind you.\n\nWhen you turn around, you're rather stunned to be standing face to face with…\n\n*page_break\n\nBlack Magic.\n\nYou blink several times, sure that your eyes are deceiving you.\n\nBut they're not. That really is Black Magic, your biggest crush, standing right in front of you.\n\n*goto black_magic\n\n*label black_magic\n\"I've had quite the time tracking you down,\" Black Magic says. \"I need your help with something.\"\n\nBlack Magic—the famous, gorgeous, amazing Black Magic has been looking for you? This cannot be real….\n\n\"You are ${codename}, aren't you?\" Black Magic asks, looking concerned.\n\nYou still get a thrill when anyone says your code name but hearing Black Magic say it sends a shock through your entire body. You look ${bmhir} over, happy to find ${bmze} looks as much like ${bmceleb} in person as ${bmze} does in photos.\n\n*set met_bm true\n*if male\n\t*if male_straight\n\t\tBlack Magic wears a sleek, black costume with a golden zipper running up the front (which she leaves partially undone, letting some cleavage show). The costume hugs her perfect body in all the right places, making her look like a supermodel.\n\t\t*goto girl_type\n\t*else\n\t\tBlack Magic wears a sleek, black costume with a golden zipper running up the front (which he leaves partially undone, letting just enough of his chest show). The costume fits his body perfectly, showing off his curling biceps and flat stomach.\n\t\t*goto boy_type\n*else\n\t*if female_straight\n\t\tBlack Magic wears a sleek, black costume with a golden zipper running up the front (which he leaves partially undone, letting just enough of his chest show). The costume fits his body perfectly, showing off his curling biceps and flat stomach.\n\t\t*goto boy_type\n\t*else\n\t\tBlack Magic wears a sleek, black costume with a golden zipper running up the front (which she leaves partially undone, letting some cleavage show). The costume hugs her figure in all the right places.\n\t\t*goto girl_type\n\n*label boy_type\n\nBest of all, you really love that Black Magic is…\n\n*choice\n\t#Rugged.\n\t\tBlack Magic has a five o'clock shadow and a thick, muscular body. He looks dangerous, like he's done some bad things. Like he could get you into some real trouble if he wanted to….\n\t\t*goto speechless\n\t#Clean Cut.\n\t\tBlack Magic is clean-shaven and his hair is perfectly cut—like some kind of unreal male model. But he still looks mischievous, like he can do anything he wants. Like he could get you into some real trouble if he wanted to….\n\t\t*goto speechless\n\t#Unique.\n\t\tBlack Magic has a way about him that you've never seen anyone else pull off—everything from his crazy haircut to his offbeat styling is completely original. It shouldn't work for him but somehow, it still does.\n\n\t\tAnd most of all, Black Magic looks free, like he can do anything he wants. Like he could get you into some real trouble if he wanted to….\n\t\t*goto speechless\n\t#I don't like Black Magic.\n\t\tSure, he's hot. But who cares? That's not what you're here for.\n\t\t*goto speechless\n\n*label girl_type\n\nBest of all, you really love that Black Magic is…\n\n*choice\n\t#Natural and easygoing.\n\t\tBlack Magic has an effortless beauty—she looks like the kind of girl who can eat whatever and always look impossibly perfect rolling out of bed in the morning.\n\n\t\tMost of all, Black Magic looks free, like she can do anything she wants. The kind of free that could probably get you into some real trouble….\n\t\t*goto speechless\n\t#Made up like a vixen. \n\t\tEverything about Black Magic is perfectly put together. She's a girl who cares about her appearance and takes care of her body in every way.\n\n\t\tAnd with looks like that, you know she can probably get anything (or anyone) she wants. Which means she's probably a girl who could get you into some real trouble….\n\t\t*goto speechless\n\t#Unique.\n\t\tBlack Magic has a way about her that you've never seen anyone else pull off—everything from her crazy haircut to her offbeat styling is completely original. It shouldn't work for her but somehow, it still does.\n\n\t\tAnd most of all Black Magic looks free, like she can do anything she wants. Like she could get you into some real trouble if she wanted to….\n\t\t*goto speechless\n\t#I don't like Black Magic.\n\t\tSure, she's hot. But who cares? That's not what you're here for.\n\t\t*goto speechless\n\n\n*label speechless\n\n\"Speechless, are we?\" Black Magic asks, smirking.\n\n\"Uh, yes, I'm ${codename},\" you say, snapping out of it. \"Why exactly do you need me?\"\n\n\"Well, I heard you were the hero who…'helped' with the Gravitas investigation,\" Black Magic says, coming closer to you. \"Hold on.\"\n\nBlack Magic whips around and mutters \"Gyener Scureob,\" encasing the roof in a bubble of shimmering, ${energycolor} light.\n\n*page_break\n\nYou're about to ask what ${bmze}'s doing until you see a duo of paparazzi on a nearby rooftop trying to snap pictures—Black Magic must have cast a spell to protect the two of you against their cameras.\n\n\"Sorry about that. Thought I lost them across town,\" Black Magic says, turning back to you. \"Anyway, I assume you also know about the Kirkpatrick-Static connection, if you're back snooping for evidence?\"\n\nYou nod, desperately trying to keep your eyes on Black Magic's face…which is equally as distracting as ${bmhis} body, unfortunately.\n\n\"All right,\" Black Magic continues, \"the MCPD has looped The Millennial Group into their investigation of The Splice Circle, since they'll need a Powered team to take down Madame Vice and her new Splice Circle if that evidence is found. I'm the new kid on the Group's block, so Rebellion dispatched me to help the MCPD find the evidence stockpile. Plus, I have a…particular hatred for Madame Vice.\"\n\nYou want to know what that's all about but first you have to decide how you want to play things with Black Magic:\n\n*choice\n\t#Flirt. I may never get this chance again.\n\t\t\"I might be able to help…\" you start, approaching Black Magic. \"But it's going to cost you.\"\n\n\t\tAs you get close, you realize Black Magic smells exactly as good as you thought ${bmze} would. Your heart threatens to explode in your chest.\n\n\t\t\"Oh yeah?\" Black Magic says, looking you up and down for the first time. \"What makes you think I can't just take anything I want from you?\"\n\n\t\tYou lock eyes with Black Magic, letting ${bmhir} know you'd like to see ${bmhir} try. \n\t\t*goto reckless\n\t#Keep things professional. This is my career, after all.\n\t\t\"So how can I help?\" you ask, still not quite believing your luck here. Black Magic is asking you for help—you, of all people! You'd better not screw this one up….\n\n\t\t\"Oh, you can help me in so many ways…\" Black Magic says, looking you up and down for the first time. Feeling ${bmhis} eyes on you, your heart threatens to explode.\n\t\t*goto reckless\n\t#Play hard to get.\n\t\t*set rlshp_bm %-10\n\t\t\"Why the hell would I help someone like you?\" you say, sighing audibly as if supremely bored.\n\n\t\t\"Drop the act, ${codename}. It's not cute,\" Black Magic says, rolling ${bmhis} eyes.\n\t\t*goto reckless\n\t#I don't want anything to do with Black Magic.\n\t\t*set rlshp_bm %-40\n\t\t\"Can we get this over with? I have places to be,\" you say, crossing your arms.\n\n\t\tBlack Magic looks you over, cocking ${bmhis} head to the side.\n\t\t*goto reckless\n\n*label reckless\n\n\"The police let me go through Static's things,\" ${bmze} says, getting back to business. \"Even though they didn't find anything, I got some weird vibes off of this pen. But I have no idea what it is….\"\n\nBlack Magic pulls out a fancy, black pen and your eyes practically bulge out of your head. There's a tiny, golden orb at the end of the pen—same as the one that was on the tip of Madame Vice's whip.\n\nIt's a Telelock!\n\n*page_break\n\n\"I was hoping that you might know what this is from your Splice run-ins,\" Black Magic says, placing a hand on your shoulder—a touch that threatens to buckle your knees. Slugger, does ${bmze} smell good…. \n\n\"So does it ring any bells?\"\n\nOf course, if that is a Telelock, it's probably the only way to access the secret place where Static has stockpiled his evidence against The Splice Circle.\n\nBut if you tell Black Magic this, you'll have to work together—assuming ${bmze} decides to include you in the next step of the investigation at all. However, if you don't tell Black Magic, getting ahold of that pen might be tricky business….\n\nSo do you want to work with Black Magic?\n\n*choice\n\t#Yes, I'd love to work with Black Magic (and if I'm really lucky, The Millennial Group).\n\t\t*set rlshp_bm %+20\n\t\t*set soloist %-30 \n\t\t\"As a matter of fact, I know exactly what- Arrrggghhhh!\"\n\t\t*goto mind\n\t#No, I don't care about working with other heroes. I need that clue for myself.\n\t\t*set rlshp_bm %-20\n\t\t*set soloist %+30\n\t\t\"I'm sorry, I have no idea what- Arrrrggghhhh!\"\n\t\t*goto mind\n\t#I don't mind working with other heroes, but I don't want to get involved with Black Magic.\n\t\t*set rlshp_bm %-30\n\t\t\"I'm sorry, I have no idea what- Arrrrggghhhh!\"\n\t\t*goto mind\n\t#As long as I'm involved in the case, I don't care what I have to do.\n\t\t*if (rlshp_bm >= 50)\n\t\t\t\"As a matter of fact, I know exactly what- Arrrggghhhh!\"\n\t\t\t*goto mind\n\t\t*else\n\t\t\t\"I'm sorry, I have no idea what- Arrrrggghhhh!\"\n\t\t\t*goto mind\n\n\n*label mind\n\nSuddenly, your brain feels like it has been split open. You fall to the ground, wondering if someone has taken an ice-cold blade and plunged it directly into your temple.\n\nSeveral images also begin to flash through your mind: a much younger Black Magic stands in front of a much younger Madame Vice in a dimly lit room. Madame Vice has a grin on her face as Black Magic begins to dance, peeling off ${bmhis} costume….\n\nJust as soon as this image sears itself into your brain, another replaces it. This time, you're in a bed and Black Magic hangs over you, ${bmhis} lips lightly touching your neck….\n\nAs much as you like that last image, it burns so badly you think you might pass out.\n\n*page_break\n\nThen the pain disappears as quickly as it came.\n\n*set health -5\n\n\"What the-\" you gasp, trying to ignore the dull buzzing at the base of your skull.\n\n\"I'm sorry, I couldn't risk you lying to me,\" Black Magic says. \"The Thought Swap is one of my more painful spells but it was necessary.\" \n\n\"So that was…\" you try to say, still finding it hard to form words. \"I saw your…\"\n\n\"We swapped our most prominent thoughts,\" Black Magic explains. \"I saw your knowledge of the Telelock and you saw my memory of my first meeting Madame Vice, from the beginning of my career. I was having a hard time pushing that thought from my mind today.\"\n\n\"And the other scene…?\" you ask.\n\n\"That second scene was where our thoughts met,\" Black Magic says with a grin, eyes boring into you. \"I like the way your brain feels, by the way….\"\n\n*choice\n\t#\"Thanks?\"\n\t\t*set rlshp_bm %+5\n\t\t*goto paces\n\t#\"Don't ever invade my mind like that again.\"\n\t\t*set rlshp_bm %-10\n\t\t*goto paces\n\t#\"I like the way your brain feels, too….\"\n\t\t*set rlshp_bm %+10\n\t\t*goto paces\n\t#\"That wasn't necessary, Black Magic.\"\n\t\t*set rlshp_bm %-5\n\t\t*goto paces\n\n*label paces\n*gosub delay\nBut Black Magic just walks across the roof, away from you.\n\n\"I knew that pen was emitting some kind of special energy,\" ${bmze} continues. \"Telelocks are tricky things…I know a spell that can activate it but I need to recharge. That Thought Swap took quite a lot out of me. We should head back to The Millennial Group headquarters.\"\n\nYou're about to tell Black Magic that you were able to override a Telelock on your own a few weeks ago but you stop yourself. The Millennial Group HQ is supposed to be one of the most amazing buildings in all of MC. No matter what your feelings on team-ups are, you're not going to pass up an opportunity to see how real heroes live—and maybe even meet some of them.\n\nThe excitement doesn't have much time to settle, however, as something long and metal suddenly screeches between you and Black Magic, crackling with grey energy.\n\n\"Watch out!\" Black Magic screams. But it's too late….\n\n*finish Next Chapter: Minterview\n\n*label delay\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Heroes Rise: The Prodigy[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2025-06-12 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n*return\n", "choicescript_description": "Do you have what it takes to become a legendary Powered hero?\n\nIn [i]Heroes Rise,[/i] Powered heroes have become the ultimate celebrities, and you dream of joining the A-list–but to get there, you'll first have to take down evil Powered gangs, compete with deadly rivals, choose a worthy sidekick, team up with famous champions, and prove to all of Millennia City that you're a true hero.\n\n[i]Heroes Rise: The Prodigy[/i] is a 100,000-word interactive novel by Zachary Sergi. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\nWill you play as male, female, trans, intersex, nonbinary, or more? Gay, straight, or pansexual? Crusade for justice, or gun for money? Will you work as a team with the world-famous Millennial Group, or will you steal their spotlight?\n\nHow high will your hero rise?\n", "choicescript_stats": "*if met_family\n\t*set rlshp_one \"Family\"\n*if met_victon\n\t*set rlshp_two \"Victon\"\n*if met_sk\n\t*set rlshp_three \"Sidekick\"\n*if met_bm\n\t*set rlshp_four \"Black Magic\"\n*if met_mg\n\t*set rlshp_five \"Millennial Group\"\n\n*label display\n*text_image hero.png center Your Hero\n*stat_chart\n\ttext Codename\n\topposed_pair Fame\n\t\tJustice\n\topposed_pair Lawless\t\n\t\tLawful\n\topposed_pair Offensive\n\t\tDefensive\n\topposed_pair Soloist\n\t\tTeam Player\n\ttext Power\n\ttext Health\n\ttext Money\n\ttext Legend\n\n*text_image relationships.png center Your Relationships\n*stat_chart\n\tpercent rlshp_family ${rlshp_one}\n\tpercent rlshp_victon ${rlshp_two}\n\tpercent rlshp_sk ${rlshp_three}\n\tpercent rlshp_bm ${rlshp_four}\n\tpercent rlshp_mg ${rlshp_five} \n\n*check_achievements\n*if (choice_achieved_legendguide)\n\t*page_break View Legend Guide\n\t*text_image guide.png center The Prodigy Perfect Legend Guide\n\n\tChapter Two: Automatic start increase. (Plus 1: 1)\n\n\tChapter Three: Do not choose to patrol the streets. (Avoid Decrease)\n\t*line_break\n\tChapter Three: Choose the correct fingertip color first--make sure to pay attention to the fingertip description, as the color changes. (Plus 3: 4)\n\n\tChapter Four: Automatic press boost. (Plus 5: 9)\n\n\tChapter Five: Do not choose to stay put and wait for the police in the Gravitas battle. (Plus 1: 10)\n\t*line_break\n\tChapter Five: Do not die--make sure to keep Power and Health levels above 0. (Avoid Decrease)\n\n\tChapter Six: Automatic bad press decrease. (Minus 5: 5)\n\t*line_break\n\tChapter Six: Choose the positive outlook when reflecting on your first heroic night. (Plus 1: 6)\n\t*line_break\n\tChapter Six: Choose Prodigal as your biggest threat. (Plus 1: 7)\n\t*line_break\n\tChapter Six: (Optional Tip) Whenever possible, purchase bonus Power Upgrades--this will help you conserve Power in battles for extra Legend boosts.\n\n\tChapter Seven: Automatic mission reward. (Plus 2: 9)\n\n\tChapter Eight: (Optional Tip) When speaking with Jenny, choose to go over her materials and then choose a fighting tip. This Power increase will help you in Chapter Eleven. \n\n\tChapter Nine: Choose wisely when handling the police--talk to the police if Officer Sanders is a contact OR flee if you've been lawless. (Plus 2: 11)\n\n\tChapter Ten: Reward for ideals & decision consistency--have a Solo stat greater than 60 OR a Team Player stat less than 40 when choosing how to interact with the Millennial Group. (Plus 3: 14)\n\t*line_break\n\tChapter Ten: Automatic Millennial Group boost. (Plus 5: 19)\n\n\tChapter Eleven: Finish mission with Power and Health both greater than 40. (Plus 10: 29)\n\t*line_break\n\tChapter Eleven: Do not die--make sure to keep Power and Health levels above 0. (Avoid Decrease)\n\n\tChapter Twelve: Automatic press boost. (Plus 10: 39)\n\t*line_break\n\tChapter Twelve: Ask Grandma what on earth she was thinking inviting your sidekick over--do not trust your sidekick whenever possible. (Plus 1: 40)\n\n\tChapter Fourteen: Choose to think that Prodigal has it out for you. (Plus 1: 41)\n\n\tChapter Fifteen: Tell Grandma you really don't trust your sidekick at all. (Plus 1: 42)\n\n\tChapter Sixteen: Reward for ideals & decision consistency--have a Fame stat greater than 85 OR a Justice stat less than 15 when choosing to save Sonja or your sidekick. (Plus 5: 47)\n\n\tChapter Seventeen: When making the phone call for backup, be sure to choose a contact you have a positive relationship with OR if a Solo player, call no one. (Plus 5: 52)\n\n\tChapter Nineteen: Choose to fight Prodigal close range. (Plus 3: 55)\n\t*line_break\n\tChapter Nineteen: Reward for ideals & decision consistency--have a Lawless stat greater than 85 OR a Lawful stat less than 15 when choosing to kill or spare Prodigal. (Plus 5: 60)\n\t*line_break\n\tChapter Nineteen: Do not die--make sure to keep Power and Health levels above 0. (Avoid Decrease)\n\n\tChapter Twenty: If you have an above-average Legend Level at this point, you won't cause any Fringe deaths. (Plus 10: 70).\n\n\tGeneral Tip: In Heroes Rise, you are rewarded for sticking to your ideals. If looking for a high Legend Level, make sure to remain consistent once you decide on either Lawless/Lawful, Solo/Team Player, Fame/Justice, and other heroic traits.\n\t*page_break Back to the Stats Screen\n\t*goto display", "choicescript_upgrade": "*label start\n*check_purchase adfree legendguide\n\n*if choice_purchased_adfree = false\n  [b]Chapters 5 through 21[/b]\n\n  Unlock chapters 5 through 21!\n\n  *purchase_discount adfree 2025-06-12 $4.99 $2.99 start\n\n*if choice_purchased_legendguide = false\n  [b]Perfect Legend Guide[/b]\n\n  An instruction guide for how to earn the maximum Legend score. (You'll need to play the entire game through once to see the Perfect Legend Guide.)\n\n  *purchase legendguide $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 5 through 21[/b]\n\n  You've paid to unlock chapters 5 through 21.\n\n*if choice_purchased_legendguide\n  [b]Perfect Legend Guide[/b]\n\n  You've paid to unlock the legend guide.", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Heroes Rise: The Prodigy.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 7200 $4.99\n", "equal_opp": "*comment é\n\n*text_image chap_20.png center Chapter 20: Equal and Opposite\n*set rlshp_sk %-100\n*set power 100\n*set health 100\n\nYou sit in Jenny's apartment wrapped in a blanket, a cup of steaming tea in front of you. Grandma is resting and Jenny is taking a shower, which leaves you alone, sitting in your costume, not quite able to move.\n\nYou just feel…\n\n*choice\n\t#Devastated.\n\t\tYour life is never going to be the same and you have no idea what to expect next.\n\t\t*goto staggering\n\t#Overwhelmed.\n\t\t*goto staggering\n\t#Numb.\n\t\tYou can't really feel anything. It's all just been…too much.\n\t\t*goto staggering\n\t#Relieved. \n\t\tIt's all over, this terrible night is finally over. And you survived.\n\t\t*goto staggering\n\n*label staggering\n\nWhat happened tonight was surreal. Your life has been ripped to shreds. Prodigal tried to take everything from you.\n \nYour sidekick. Your secret identity. Your reputation. Your privacy.\n*if choose_sidekick\n\tSonja.\n\nYour accomplishments. Your career. Your chance at a Legendary reveal.\n\nAnd the things Prodigal made you do, the choices she forced you to make…\n\nYou never once imagined that being a hero would be this hard.\n\nWas it always meant to be this way? Was Prodigal right? Were you two always destined to ruin each other, the way your parents did?\n\nAfter all Prodigal has done,\n\n*choice\n\t#I don't know what's real in my life anymore.\n\t\tEverything feels like a lie. Everything. Even Grandma has been lying to you about the letters, about your Powers…and who knows what else?\n\n\t\tHow can you ever trust anyone again?\n\t\t*goto murderer_status\n\t#I refuse to allow Prodigal to take away my ability to trust.\n\t\tSo what if you've been surrounded by lies? Now you know to look harder for the truth.\n\t\t*goto murderer_status\n\t#I don't want to make any decisions until I've had more time to think this through.\n\t\tEverything feels like a lie right now—which means you need to start looking harder for the truth.\n\t\t*goto murderer_status\n\n*label murderer_status\n\n*if kill_prodigal\n\tBut you can't help but think that you're now a murderer—just like your parents. You killed Prodigal.\n\n\tSure, you did it to save lives, but the fact remains that you've taken a life….\n\n\t*fake_choice\n\t\t#Still, I'd do it again, given the chance.\n\t\t\tIt was a tough call but you know you did the right thing. And that's all that matters at the end of the day.\n\t\t#I hate that it had to come to that.\n\t\t\tYou're still not sure you did the right thing. Maybe if you had just a bit more time to think it through…\n\t\t#While it may have been wrong to use fatal force, it was what the situation called for.\n\t\t\tIt was a tough call but you can't imagine having made a different decision. Maybe if you had just a bit more time to think it through…\n\n\tThough you have no idea what happened to Prodigal's body—right after the wave stopped, her corpse vanished. She must have had some war-tech rigged to remove her body if she were ever to die…or at least that's what Jenny thinks.\n\t\n\tThe same goes for Prodigal's interactive video masterpiece—it was automatically released to the press the moment the death wave went active. \n\t*goto watched\n*else\n\tAt least you didn't allow Prodigal to turn you into a murderer. You found a way to stop her without compromising your standards—if you had done that, Prodigal truly would have won.\n\n\t*page_break\n\n\tAfter you deactivated the wave, you Telelock-ported out of the bunker directly to\n\t*if bm_rescue\n\t\tthe MGHQ, where Black Magic was waiting to help you detain Prodigal for arrest. Calling ${bmhir} for help earlier was absolutely the right move.\n\n\t\tOnce things were taken care of with Prodigal, you and Grandma decided to head to Jenny's apartment to regroup.\n\t\t*goto jailtime\n\t*elseif sanders_rescue\n\t\tthe downtown MCPD station, where Officer Sanders was waiting to arrest Prodigal. Calling him for help earlier was absolutely the right move.\n\n\t\tOnce things were taken care of with Prodigal, you and Grandma decided to head to Jenny's apartment to regroup.\n\t\t*goto jailtime\n\t*elseif ffgoodcall\n\t\tthe MGHQ, where Fistfull was waiting to help you detain Prodigal for arrest. Calling him for help earlier was absolutely the right move.\n\n\t\tOnce things were taken care of with Prodigal, you and Grandma decided to head to Jenny's apartment to regroup.\n\t\t*goto jailtime\n\t*elseif rebellion_rescue\n\t\tthe MGHQ, where Rebellion was waiting to help you detain Prodigal for arrest. Calling ${youhir} for help earlier was absolutely the right move.\n\n\t\tOnce things were taken care of with Prodigal, you and Grandma decided to head to Jenny's apartment to regroup.\n\t\t*goto jailtime\n\t*else\n\t\tJenny's PFPP office, where she arranged to have Prodigal detained for immediate arrest.\n\n\t\tOnce things were taken care of with Prodigal, you and Grandma decided to head to Jenny's apartment to regroup.\n\t\t*goto jailtime\n\n\t*label jailtime\n\t\n\tHow do you feel knowing that Prodigal is going to be in jail for a very long time?\n\t\n\t*fake_choice\n\t\t#Fantastic. Prodigal deserves to rot in prison.\n\t\t#I just hope Prodigal gets the help she needs….\n\t\t\tYou can only imagine how difficult Prodigal's childhood must have been. Without someone like Grandma to take care of you…you don't even want to go there.\n\t\t#I'm comforted that she can't meddle in my life anymore.\n\t\t\tOr attack the people you love, ever again.\n\t\n\tOf course, Prodigal's interactive video masterpiece was still automatically released to the press the moment the death wave went active. \n\t*goto watched\n\n*label watched\nIn the wake of the wave, your grand battle with Prodigal has become a must-see news item. It's being viewed right now across all of MC, maybe even across the nation.\n\n*if kill_save\n\tBut at the end of it all, the fact remains that you saved Millennia City. Period. You succeeded in stopping the worst act of potential terrorism on American soil and now the entire city knows it.\n\n\tHowever, you also killed someone to do it. Even though many people must be congratulating your bravery, just as many will probably ask if there could have been another way….\n\t*set legend +10\n\t*goto jenny_talk\n*elseif kill_town\n\tBut at the end of it all, the fact remains that you saved Millennia City. Period. You succeeded in stopping the worst act of potential terrorism on American soil and now the entire city knows it.\n\n\tStill, even though you may have saved millions of lives, the portion of the Fringes you failed to save had 314 residents—that's hundreds of deaths on your conscience. All because you didn't act quickly enough.\n\n\tMany people must be congratulating your bravery, but just as many will probably ask if there could have been another way.\n\n\tPerhaps if your Legend Level had been higher, you might have been able to save everyone….\n\t*set legend +5\n\t*goto jenny_talk\n*elseif power_save\n\tBut at the end of it all, the fact remains that you saved Millennia City. Period. You succeeded in stopping the worst act of potential terrorism on American soil and now the entire city knows it.\n\n\tAnd because you found a way to master your Infini-Class Powers, no one had to die—not even Prodigal. \n\n\tThat's an outcome truly worthy of Legend.\n\t*set legend +10\n\t*goto jenny_talk\n*else\n\tBut at the end of it all, the fact remains that you saved Millennia City. Period. You succeeded in stopping the worst act of potential terrorism on American soil and now the entire city knows it.\n\n\tHowever, without mastery over your Infini-Class Powers, you were acting blind. You may have saved millions of lives, but the portion of the Fringes you failed to save had 314 residents—that's hundreds of deaths on your conscience.\n\n\tEven though many people must be congratulating your bravery, just as many will probably ask if there could have been another way.\n\n\tPerhaps if your Legend Level had been higher, you might have been able to save everyone….\n\t*set legend +5\n\t*goto jenny_talk\n\n*label jenny_talk\n*page_break\n\n\"Hello, hello,\" Jenny says as she walks in, scrubbing behind her ears with a towel. \"How are you?\"\n\nYou give Jenny a look. Does she even have to ask?\n\n\"I know we've been through hell tonight,\" she says, sitting next to you. \"But there are some decisions we have to make right away.\"\n\n\"Whatever it is, it can wait until the morning,\" you say, barely even recognizing your own voice. It sounds tinny, bouncing between your ears.\n\n\"No, actually, it can't. I replugged my MeChip and I've just been through my messages.\"\n\nYou and Jenny managed to scrounge up your MeChips before porting out of Prodigal's lair. You've been anxious to reconnect, but also afraid of what you'll find when you do. You'd much rather hear whatever news is coming in through Jenny right now.\n\n*if lawless > 50\n\t*set outlaw true\n\t*achieve outlaw\n\tJenny looks at you, growing stern.\n\n\t\"Nothing has been decided for certain yet but it's looking like they might try to press criminal charges, ${firstname}.\n\t*if kill_save\n\t\tFor murdering Prodigal.\"\n\t\t*goto slide\n\t*elseif kill_town\n\t\tFor murdering Prodigal. And maybe for the deaths in the Fringes as well…\"\n\t\t*goto slide\n\t*elseif power_save\n\t\tFor the whole mess with\n\t\t*if choose_sidekick\n\t\t\tSonja.\"\n\t\t\t*goto slide\n\t\t*else\n\t\t\t${sidekick}.\"\n\t\t\t*goto slide\n\t*else\n\t\tFor failing to stop the wave before it hit the Fringes…\"\n\t\t*goto slide\n*else\n\tJenny looks at you, growing stern.\n\n\t\"Nothing has been decided for certain yet but it's looking like the MCPD won't press criminal charges, ${firstname}. Your lawful track record seems to have served you well.\"\n\n\tThe words slide off of you. You find it impossible to absorb much of anything at this point but this is welcome good news, at least.\n\n\t*choice\n\t\t*if (sanders) #I should call Officer Sanders to thank him, since he probably had a hand in exonerating me.\n\t\t\t*if sanders_rescue\n\t\t\t\tCalling Officer Sanders earlier tonight was absolutely the right move—he has probably helped you through this mess in ways you can't even guess.\n\n\t\t\t\tWhen things settle, you definitely need to send him a big thank you.\n\t\t\t\t*goto press\n\t\t\t*else\n\t\t\t\tBefriending Officer Sanders early in your career was absolutely the right move—he has probably helped you through this mess in ways you can't even guess.\n\n\t\t\t\tWhen things settle, you definitely need to send him a big thank you.\n\t\t\t\t*goto press\n\t\t#Thankfully, I've chosen to follow the law, otherwise this could have been far worse for me.\n\t\t\t*goto press\n\t\t#I honestly don't care about any of this right now. It feels rather inconsequential after what has happened. \n\t\t\t*goto press\n\n*label slide\n\nThe words slide off of you. You find it impossible to absorb much of anything at this point.\n\n\"I know, you did your best to save whoever you could,\" Jenny tries. \"But it seems your lawless track record is coming back to bite you. The MCPD will know to come looking for you here soon. What do you want to do?\"\n\n*choice\n\t*selectable_if (lawless \u003c 85) #Turn myself in.\n\t\t*set lawless %-20\n\t\t*set badassbonus false\n\t\t\"If the time comes, I'll face a trial,\" you say. \"I'm done running from the law. Besides, I'm not going to be able to hide from something this big.\"\n\n\t\t\"I think that's the right move,\" Jenny sighs. \"Luckily, we shouldn't have to worry about that for another couple of hours, while they sort through the mess….\"\n\n\t\t*if (money > 5000)\n\t\t\t\"At least I have a bit of money saved up, I should be able to pay bail….\"\n\n\t\t\t\"Forgive me if I'm not bouncing with excitement,\" Jenny says, massaging her temples. \"You don't deserve this at all, ${firstname}.\"\n\n\t\t\tOf course you agree, but that doesn't seem to matter much.\n\t\t\t*goto press\n\t\t*else\n\t\t\t\"I won't have enough money for bail, though….\"\n\n\t\t\t\"We'll have to cross that bridge when we come to it, ${firstname}.\"\n\t\t\t*goto press\n\t#Evade the police.\n\t\t*set lawless %+20\n\t\t\"The law doesn't matter to me,\" you say, \"and I'm not going to start bending to its will now, especially when I was only trying to save lives.\"\n\n\t\tJenny sighs. \"If that's what you want, we'll figure out how to keep you hidden. Luckily, we shouldn't have to worry about that for another couple of hours, while they sort through the mess….\"\n\n\t\t*if (money > 5000)\n\t\t\t\"At least I have a bit of money saved up. I should be able to lie low for a while.\"\n\n\t\t\t\"Forgive me if I'm not bouncing with excitement,\" Jenny says, massaging her temples. \"You don't deserve this at all, ${firstname}.\"\n\n\t\t\tOf course you agree, but that doesn't seem to matter much.\n\t\t\t*goto press\n\t\t*else\n\t\t\t\"I won't have enough money for bail, so getting arrested isn't an option….\"\n\n\t\t\t\"We'll cross that bridge when we come to it, ${firstname}.\"\n\t\t\t*goto press\n\n*label press\n*page_break\n\n\"Next we have to decide how you want to handle the press, if at all,\" Jenny says, looking more tired than you've ever seen her. If she looks that rough, you don't even want to know what you look like.\n\n*if fame > 50\n\t\"I want to make a public statement,\" you say. You've been more focused on maintaining the right kind of fame, so you're going to have a say in how this plays to the public.\n\n\t*if choose_reporter\n\t\t\"Sonja's doing everything she can to work things in your favor—looks like you acquired an unofficial PR point-person. Saving her was the smartest thing you've done all night, unexpectedly enough….\"\n\n\t\tBut Jenny stops herself, knowing better than to bring up the mess with ${sidekick}.\n\n\t\t\"Anyway, she'll run your statement. I'll film it and send it to her now. What do you want to say?\"\n\t\t*goto press_release\n\t*else\n\t\t\"My MeChip camera is rolling whenever you want,\" Jenny says, holding up her wrist. \"I'll send it to my press contacts. Though I don't know how receptive they'll be after…\"\n\n\t\tBut Jenny stops herself, knowing better than to bring up the mess with Sonja.\n\n\t\t\"But if they're smart, they'll take it. You're all anyone is talking about tonight.\"\n\t\t*goto press_release\n*else\n\t\"I'm not saying a word to the press,\" you say. \n\n\tAt the end of the day, you've been more focused on justice than playing at fame. You've always tried to do the right thing and that's all that matters.\n\n\t*if choose_reporter\n\t\t\"Sonja wanted to know if you wanted to say anything. I'll tell her your decision,\" Jenny says. \"She's doing everything she can to work things in your favor—looks like you acquired an unofficial PR point-person. Saving her was the smartest thing you've done all night, unexpectedly enough….\"\n\n\t\tBut Jenny stops herself, knowing better than to bring up the mess with ${sidekick}.\n\n\t\t*choice\n\t\t\t#\"Tell Sonja to go radio silent. The more mysterious I am, the better.\"\n\t\t\t\t*goto noted\n\t\t\t#\"I don't care what Sonja says, if it helps.\"\n\t\t\t\t*goto noted\n\t\t\t#\"As long as people know I was trying to do the right thing, I'm fine with Sonja handling things.\"\n\t\t\t\t*goto noted\n\t*else\n\t\t*goto mcngh\n\n*label press_release\n\nYou pause for a moment, knowing that you want to keep things short and unrehearsed.\n\n*choice\n\t#\"All I want to say is that I did the best I possibly could have under the circumstances. And I will always continue to be the best hero I can be.\"\n\t\t*goto jennyonit\n\t#\"I must ask that, in the wake of these terrible events, my family and friends be spared. If you have something to say, please say it about me.\"\n\t\t*goto jennyonit\n\t*if (power_town) #\"More than anything, I just want to send my condolences to the Fringes residents who lost their lives tonight. I wish I could have done more to save them.\"\n\t\t*goto jennyonit\n\t*if (power_save) #\"I hope Prodigal, a very sick individual, gets the help she needs.\"\n\t\t*goto jennyonit\n\t*if (kill_save) #\"Whatever you may think about what I've done, just know that I tried to serve the greater good at all times. And hopefully the lives I saved speak to that.\"\n\t\t*goto jennyonit\n\t*if (choose_sidekick) #\"I want to reach out to Sonja's family and offer my sincerest apologies. I wish things could have been different tonight….\"\n\t\t*goto jennyonit\n\t*if (tarana) #\"I want to reach out to Tarana Rain and the McNeal family to offer my sincerest apologies. I wish things could have been different tonight….\"\n\t\t*goto jennyonit\n\n*label jennyonit\n\n\"Noted,\" Jenny says, commanding her MeChip to send. \"I do so relish being your secretary, by the way.\"\n\nJenny cracking a joke actually manages to make you feel better. Or a bit more normal, at least.\n*goto mcngh\n\n*label noted\n\"Noted,\" Jenny says with a smile. \"I do so relish being your secretary, by the way.\"\n\nJenny cracking a joke actually manages to make you feel better. Or a bit more normal, at least.\n*goto mcngh\n\n*label mcngh\n\n*if choose_reporter\n\t\"Oh, here's a bit of good news. Sonja made sure the HoT profile was still published—it has already been their most polarizingly popular edition ever, apparently. Which means you still get the grant check.\"\n\n\tYou always thought making an amount like $100,000 would feel like the best thing in the world. But somehow, after everything that happened tonight, it only feels like a small consolation prize….\n\n\t*set money +100000\n\t*goto sidekick\n*else\n\t*goto sidekick\n\n*label sidekick\n*page_break\n\n*if sparrow\n\t\"I'm so sorry about Sparrow, ${firstname},\" Jenny nearly whispers, moving on. \"Prodigal had us all fooled there.\"\n\n\tYou can't even stand to hear that name. Even though now you know that Sparrow was never real, losing her almost feels like another death.\n\n\tYou were really starting to bond with Sparrow—but it was all just another illusion manufactured by Prodigal.\n\n\t*choice\n\t\t#I should have been able to detect that Sparrow was really Prodigal.\n\t\t\tMaybe there was something, some clue that you overloooked…. But like Jenny said, Sparrow had you all fooled.\n\n\t\t\tYou'll definitely think twice about ever taking on another sidekick again.\n\t\t\t*goto realness\n\t\t#There's no way I could have known….\n\t\t\tLike Jenny said, Sparrow had you all fooled.\n\n\t\t\tThough you'll definitely think twice about ever taking on another sidekick again.\n\t\t\t*goto realness\n\t\t#I never want to hear Sparrow's name again.\n\t\t\tAnd there's nothing more to say on the matter.\n\t\t\t*goto realness\n*elseif pressie\n\t\"No one has heard from Pressie at all,\" Jenny says, moving on. \"I'm so sorry, ${firstname}. He had us all fooled.\"\n\n\tYou can't even stand to hear that name. Even though now you know that Pressie was never real, losing him almost feels like another death.\n\n\tYou were really starting to bond with Pressie—but it was all just another illusion manufactured by Prodigal. And poor Grandma—she really loved Pressie, you think. His betrayal might hit her hardest of all….\n\n\t*choice\n\t\t#I should have been able to detect that Pressie was really working for Prodigal.\n\t\t\tMaybe there was something, some clue that you overloooked…. But like Jenny said, Pressie had you all fooled.\n\n\t\t\tYou'll definitely think twice about ever taking on another sidekick again.\n\t\t\t*goto realness\n\t\t#There's no way I could have known….\n\t\t\tLike Jenny said, Pressie had you all fooled.\n\n\t\t\tThough you'll definitely think twice about ever taking on another sidekick again.\n\t\t\t*goto realness\n\t\t#I never want to hear Pressie's name again.\n\t\t\tAnd there's nothing more to say on the matter.\n\t\t\t*goto realness\n*else\n\t\"Tarana Rain is back with her parents safely,\" Jenny says, moving on. \"It's been quite a night for her but after Prodigal kidnapped us and left her behind, she went straight home….\"\n\n\tJenny pinches her elbow once again and you brace yourself.\n\n\t\"${firstname}, Tarana's parents…\"\n\n\t\"Never want me to see her again?\" you finish.\n\n\tJenny nods.\n\n\tHowever you feel about Tarana, you know that's probably for the best.\n\n\t*choice\n\t\t#I should have been able to detect that Tarana Rain was going to betray me.\n\t\t\tOnce a selfish brat, always a selfish brat.\n\n\t\t\tYou'll definitely think twice about ever taking on another sidekick again.\n\t\t\t*goto realness\n\t\t#There's no way I could have known….\n\t\t\tTarana Rain may have had her flaws but Prodigal put her in an impossible situation. It wasn't really her fault.\n\n\t\t\tThough you'll definitely think twice about ever taking on another sidekick again.\n\t\t\t*goto realness\n\t\t#I never want to hear Tarana Rain's name again.\n\t\t\tAnd there's nothing more to say on the matter.\n\t\t\t*goto realness\n\n*label realness\n*page_break\n\n*if guard_possible\n\t*goto invitation\n*else\n\t*goto grandma\n\n*label invitation\n\n\"All right, last order of business,\" Jenny says. \"Rebellion called. $!{Youze} wants to talk to you.\"\n\nYou're far too exhausted to talk to anyone, but you're not about to turn down a call from your idol.\n\n\"Dial Rebellion for me?\" you ask. \n\nJenny gives you another \"I'm not your personal assistant\" look, but still puts Rebellion on holo-speakerphone.\n\n\"${codename}, thank you for calling,\" Rebellion says, appearing in holo-form in the middle of the living room. \"I don't want to keep you too long, so I'll make this brief.\"\n\n\"First, I wanted to congratulate you on your efforts tonight—you performed admirably under the most difficult of situations, no matter what anyone says.\"\n\n\"Thank you,\" you say, managing a smile. Having Rebellion validate your actions actually goes a long way in helping to cheer you up.\n\n*page_break\n\n*if mg_demand\n\t\"Second, I meant what I said in that message I left. The Millennial Group could really use a hero like you in our ranks. I have been cleared to offer you an official reserve spot, should you wish to take\n\t*if guard_changemind\n\t\tit…and of course assuming you can smooth over\n\t\t*if diva\n\t\t\tthe bad blood between you and The Diva.\"\n\t\t\t*goto jaw_drop\n\t\t*else\n\t\t\tthe bad blood between you, Fistfull, and Monk.\"\n\t\t\t*goto jaw_drop\t\t\t\n\t*else\n\t\tit.\"\n\t\t*goto jaw_drop\n*else\n\t\"Second, I know you chose to give your reserve spot to Jury but The Millennial Group could really use a hero like you in our ranks. I'd like to offer you an official second reserve spot, should you wish to take it.\"\n\t*goto jaw_drop\n\n*label jaw_drop\n\nYour jaw drops—that is certainly not what you were expecting to hear.\n\nBut you don't even need to process your answer; you've already made up your mind about ever joining a Powered team….\n\n*choice\n\t*selectable_if (soloist > 40) #\"I'm honored by the invitation but I don't think the team life is quite right for me.\"\n\t\t*set soloist %+25\n\t\t\"I understand completely,\" Rebellion says. \"Still, do give us a call if you change your mind.\"\n\n\t\tWith that, Rebellion hangs up, leaving you and Jenny alone once again.\n\t\t*goto grandma\n\t*selectable_if (soloist \u003c 60) #\"Absolutely. I'd be honored.\"\n\t\t*set soloist %-25\n\t\t*set guard_reserve true\n\t\t*achieve guard\n\t\t\"Fantastic,\" Rebellion says, \"I'll be in touch soon. For now, get some rest. You deserve it.\"\n\n\t\tWith that, Rebellion hangs up, leaving you and Jenny alone once again.\n\t\t*goto grandma\n\t\n*label grandma\n\n*if male\n\t*goto nojennyromance\n*elseif genderneutralhr\n\t*goto nojennyromance\n*else\n\t*if female_straight\n\t\t*if bisexual\n\t\t\t*goto jennybeat\n\t\t*else\n\t\t\t*goto nojennyromance\n\t*else\n\t\t*goto jennybeat\n\n*label jennybeat\n*page_break\n\nYou look over at Jenny and find her eyes boring into you. \n\n\"${firstname}, listen,\" she starts, \"after everything we've been through tonight, I just…\"\n\nYou lock eyes with Jenny as she searches for the right words. But you know what she wants to say.\n\n*choice\n\t#Tell Jenny I have feelings for her.\n\t\t\"I don't want to waste any more time, Jenny,\" you say, putting your hand on Jenny's knee. \"But I also don't want to rush into anything.\"\n\n\t\tJenny reaches out her hand for yours—you can feel it shaking. So you reach up and pinch her elbow.\n\n\t\tJenny laughs.\n\n\t\t\"Then we'll just have to take some time to figure it out, won't we?\" she says, smirking at you. \n\n\t\tAnd for now, it's just enough to smirk back at her.\n\t\t*set jennyfeelings true\n\t\t*goto nojennyromance\t\t\n\t#Let Jenny know I want to stay just friends.\n\t\t\"You're my best friend, Jenny. And I wouldn't change that for the world.\"\n\n\t\tJenny nods and smiles back at you but you can see it behind her eyes—that's not the answer she wanted.\n\t\t*goto nojennyromance \n\n*label nojennyromance\n*page_break\n\nSilence ensues. And to your surprise, you find that your head isn't even spinning anymore—perhaps you're finally getting used to the level of insanity your life has reached?\n\nThen Grandma enters the living room and you get to reeling again.\n\nGrandma looks so sad, you just want to hug her—but you still haven't forgotten all of the lies she told you….\n\nWhat do you say to her?\n\n*choice\n\t#\"Grandma, how are you?\"\n\t\t*set rlshp_family %+10\n\t\t\"I'll be all right,\" Grandma says, sitting next to you.\n\n\t\tYou really want to believe her, but you can tell she's as not-all-right as you are right now.\n\t\t*goto pfpp_out\n\t#\"Jenny needs more plants around here, doesn't she?\"\n\t\t\"She sure does,\" Grandma says, sitting next to you.\n\n\t\tYou thought mentioning plants might help cheer Grandma up, but it appears to only have made her sadder.\n\t\t*set rlshp_family %+20\n\t\t*goto pfpp_out\n\t#I don't say anything to Grandma.\n\t\tGrandma sits next to you and neither of you says a word.\n\t\t*set rlshp_family %-15\n\t\t*goto pfpp_out\n\n*label pfpp_out\n\n\"Well, it's good you're up because I have some bad news,\" Jenny says. \"Your place in the PFPP as Sterlings is pretty useless now that you've both been publicly outed by Prodigal. The PFPP is most certainly going to kick you out.\"\n\nSo the hits just keep coming. What is that going to mean for life for you and Grandma? Everything is going to change now that everyone knows who you are, in every possible way. You suppose this is just the first shift….\n\n\"Don't worry, there are already talks of launching a special program to offer you both protection,\" Jenny says. \"But even still, you're going to have to move.\"\n\n*choice\n\t*if (guard_reserve) #\"We can move into the MGHQ for now—it'll be the safest place for us.\"\n\t\tGrandma and Jenny both nod—that sounds like the best idea.\n\n\t\tThough you haven't even begun to think about how to resolve things with Black Magic…\n\t\t*goto megability\n\t*if (choose_reporter) #\"I can probably afford to rent a new, safer place with the HoT money….\"\n\t\tGrandma and Jenny both nod—that sounds like the best idea.\n\t\t*goto megability\n\t#\"We'll have to find something in the Fringes. That's our home.\"\n\t\tGrandma looks at you and nods—you'll figure something out. You always have before.\n\t\t*goto megability\n\t#\"Whatever the PFPP can do to help would be amazing.\"\n\t\tJenny nods and you can't help but think about how much she has done for you….\n\t\t*goto megability\n\n*label megability\n\nAnother silence ensues and you know exactly what is on everyone's mind—when are you going to mention Jenny and Grandma's big Infini-Class Powered lie? And are you going to talk to Grandma about the letters she forged?\n\n*choice\n\t#\"Why didn't either of you tell me what my Powers can do?\"\n\t\t\"Listen to me, ${firstname},\" Grandma says, taking your hand, \"I want to clear the air about a few things. Anything I have ever done, I did because I thought it was what was best for you. This new level of Power you have, no one has seen anything like it before. The experts always said it might be possible in Powered legacy children, but we weren't sure.\" \n\n\t\t\"At least not until your Powers started flaring around technology,\" Jenny says, cutting in. \"We know the origin of all Powers is rooted in technological evolution, which is why your new Powers behaved strangely when mingling with technology. They say that's the first sign of Infini-Class Power—an odd interface with tech. At least that's the working theory, for now.\"\n\n\t\t\"All we did know was that kind of Power can change a person,\" Grandma finishes. \"We just wanted to protect you, to wait until we were sure you were mature enough handle the responsibility. After all, look what the Power did to Prodigal….\"\n\n\t\tYou look from Grandma to Jenny, then say:\n\n\t\t*choice\n\t\t\t#\"I understand. But I'm not Prodigal.\"\n\t\t\t\t*goto letter_explain\n\t\t\t#\"It still wasn't your decision to make.\"\n\t\t\t\t*goto letter_explain\n\t\t\t#\"I'll learn how to use these Powers responsibly—you should have always known that.\"\n\t\t\t\t*goto letter_explain\n\t#\"Grandma, how could you forge those letters from me?\"\n\t\t*goto letter_first\n\t#\"Is there anything else you two have been keeping from me?\"\n\t\t*goto letter_first\n\n*label letter_first\n\"Listen to me, ${firstname},\" Grandma says, taking your hand. \"I want to clear the air about a few things. Anything I have ever done, I did because I thought it was what was best for you. It may have been wrong to write to your parents on your behalf, but I knew someday you'd regret having stopped.\n\n\"I know you feel that your parents abandoned you, but they had no choice. But you abandoning them? That was your choice. And there's a difference, ${firstname}. A big difference.\"\n\nGrandma's words sink in and as much as you don't want to hear them, you know she's right.\n\n\"That being said, if tonight has proven anything, it's that you're all grown-up. You're not a child anymore and I need to realize that. So I won't write another letter, I promise. That choice is up to you now.\"\n\n\"Thank you, Grandma,\" you say, feeling a bit better. But you're not quite finished….\n\n\"And my Powers?\"\n\nYou look from Grandma to Jenny and they both sigh.\n\n*page_break\n\n\"This new level of Power you have, no one has seen anything like it before,\" Grandma starts. \"The experts always said it might be possible in Powered legacy children, but we weren't sure.\" \n\n\"At least not until your Powers started flaring around technology,\" Jenny says, cutting in. \"We know the origin of all Powers is rooted in technological evolution, which is why your new Powers behaved strangely when mingling with technology. They say that's the first sign of Infini-Class Power—an odd interface with tech. At least that's the working theory, for now.\"\n\n\"All we did know was that kind of Power can change a person,\" Grandma finishes.\"We just wanted to protect you, to wait until we were sure you were mature enough handle the responsibility. After all, look what the Power did to Prodigal….\"\n\nYou look from Grandma to Jenny, then say:\n\n*choice\n\t#\"I understand. But I'm not Prodigal.\"\n\t\tGrandma and Jenny stay silent—which you know means they think you're right. But you're not quite finished…\n\t\t*goto final_speech\n\t#\"It still wasn't your decision to make.\"\n\t\tGrandma and Jenny stay silent—which you know means they think you're right. But you're not quite finished…\n\t\t*goto final_speech\n\t#\"I'll learn how to use these Powers responsibly—you should have always known that.\"\n\t\tGrandma and Jenny stay silent—which you know means they think you're right. But you're not quite finished…\n\t\t*goto final_speech\n\n*label letter_explain\nGrandma and Jenny stay silent—which you know means they think you're right. Which further gives you the opening you need to say:\n\n\"And Grandma—the letters?\"\n\nGrandma folds her arms and looks you in the eye as she begins to speak.\n\n\"It may have been wrong to write to your parents on your behalf, but I knew someday you'd regret having stopped. I know you feel that your parents abandoned you, but they had no choice.\n\n\"But you abandoning them? That was your choice. And there's a difference, ${firstname}. A big difference.\"\n\nGrandma's words sink in and as much as you don't want to hear them, you know this time, she's right.\n\n\"That being said, if tonight has proven anything, it's that you're all grown-up,\" Grandma continues. \"You're not a child anymore and I need to realize that. So I won't write another letter, I promise. That choice is up to you now.\"\n\n\"Thank you, Grandma,\" you say, feeling a bit better. But you're not quite finished….\n*page_break\n*goto final_speech\n\n*label final_speech\n\n\"Listen, what's done is done. I think we need to start over with a clean slate, right here and now. No matter what, there can't be any more secrets. We all need to trust each other—there's too much at stake now. We have to be honest with each other, about everything…all right?\"\n\nGrandma and Jenny both nod, seemingly impressed with your speech. All you can do is hope that they'll continue to take you this seriously.\n\n*page_break\n\n\"Oh, and Grandma,\" you say, \"you're definitely getting a MeChip installed. You don't have a choice in the matter.\"\n\nGrandma opens her mouth to protest but catches herself and nods once again.\n\n\"I'm very proud of you, ${firstname},\" Grandma says. \"You're a hero. Don't let anyone ever tell you differently.\"\n\nJenny looks at you, reaffirming Grandma's thoughts.\n\nAll you can think is: what would you do without these two?\n\nFor a moment, sitting here with Jenny and Grandma, you start to feel right again.\n\n*set rlshp_family %+80\n*finish Final Chapter: Sitting in the Morning Sun\n", "falls_down": "*comment é\n\n*text_image chap_17.png center Chapter 17: All Falls Down\n\nThe crush of people surging toward you is the only thing that stirs your limbs to move. You grab @{choose_reporter Sonja|${sidekick}} and fly above the mass of press and socialites, making your way to the nearest window.\n \n*if tarana\n\t*if choose_sidekick\n\t\t\"Tarana? Is that you?\" a woman screams from somewhere below.\n\n\t\t\"It's my mom,\" Tarana Rain says. \"Just keep going, I'll deal with my parents later.\"\n\t\t*goto roof\n\t*else\n\t\t*goto roof\n*else\n\t*goto roof\n\n*label roof\n\nAs you crash outside, the implications of what just happened begin to settle in.\n\nProdigal has ruined you.\n\nYou'll never have your big moment, the one where you reveal your true identity as a Legend.\n\nYou'll never be able to redeem the ${familyname} name. Not now. Not after this.\n\n*page_break\n\nHow could this have even happened? All you can think is that Prodigal must have gotten your personal information out of ${sidekick},\n*if choose_sidekick\n\tbut before you can ask, ${skze} says:\n\n\t\"${codename}, I'm so sorry. The things she said she'd do…I didn't want to tell, but-\"\n\n\t\"It's all right,\" you say.\n\n\tEven though it's not ${sidekick}'s fault, you'd still like to give Grandma a big, fat I-told-you-so for inviting your sidekick into your personal life. \n\t*goto dominate\n*else\n\tbefore Prodigal…did what she did to ${skhir}.\n\n\tYou still can't quite allow the concept to form in your brain. That might make it real.\n\n\t*if rlshp_sk \u003c 30\n\t\tYou may not have liked or trusted ${sidekick} very much, but that doesn't mean ${skze} deserved to die.\n\t\t*goto dominate\n\t*else\n\t\t*goto dominate\n\n*label dominate\n\nBut then, something else strikes you—${sidekick} should only have known about your Sterling identity. How could ${skze} have known about your ${familyname} identity? Did ${skze} somehow put it together from your brunch with Jenny?\n\nStop, you tell yourself. The only thing that matters at
