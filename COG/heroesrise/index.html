set rlshp_victon %-5\n\t\t*goto flyback\n\n*label flyback\n*page_break\n\nYou fly back toward home once again, feeling completely worn out. Despite the ever-growing list of problems piling up in front of you, all you can currently think about is paying next month's rent.\n\nNow that the possibility of a Millennial Group membership is put on hold, how are you going to make money?\n\n*fake_choice\n\t#I'll find more heroic cases.\n\t#It may be time to apply for hero unemployment….\n\t*if (guard) #The money from my Millennial Group mission will last a couple months, at least.\n\t*if (jury_article) #The money from selling the Jury story will definitely help.\n\t*if (fistfull_article) #Good thing I sold that Fistfull story—that money will last a long time while I figure things out.\n*gosub delay\n\nWhatever your next move is, you know you need to focus on one thing: finding Prodigal. \n\nBut right now, all you're going to do is get some much-needed sleep.\n\nOr at least that's what you hope you'll be doing, until you find yet another surprise visitor waiting for you on your roof…\n\nSonja.\n\n*page_break\n\n*if jury_article\n\t*if fistfull_article\n\t\t\"Thanks for the tips, ${codename},\" Sonja says. \"You just bumped my career up quite a few notches.\"\n\t\t*goto landwait\n\t*else\n\t\t\"Thanks for the Jury tip, ${codename},\" Sonja says. \"You just bumped my career up quite a few notches, assuming it's true.\"\n\t\t*goto landwait\n*else\n\t*goto landwait\n\n*label landwait\n\nYou don't have any time for pleasantries, however—especially because if Sonja is standing on your roof, that means she must have figured out your secret identity.\n\n\"What the slugger are you doing here, Sonja?\" \n\n\"Don't worry, I'm not in the business of outing heroes,\" Sonja says, almost as if she's reading your mind. \"I'm in the business of making stars. Though it really is far too easy to track you down. I'd set up some illusion holos and anti-trace charms around your building, if I were you.\"\n\n*if sonja_yes\n\t\"What are you talking about?\" you ask wearily.\n\t*goto villains\n*else\n\t\"I told you I didn't want you writing anything about me, so why are you saying all this?\" you ask wearily.\n\t*goto villains\n\n*label villains\n\n\"So that villains and fans can't follow you home to learn your identity. All eyes will be on you, whether you like it or not. I'm about to make you very famous, ${codename}.\"\n\n\"Excuse me?\"\n\n\"You had better thank me,\" Sonja says, cracking a rare smile, \"because the article I've been writing about you just got approved.\"\n\n*page_break\n\n\"I'm about to name you Millennia City's Hero of Tomorrow.\"\n\nYour mouth falls open.\n\nThat's…not possible. The HoT grant? The same award that launched the careers of Rebellion, The Diva, Black Magic, and all the rest of MC's biggest heroes? There's no way Sonja could be the reporter chosen to write the HoT article…there's just no way.\n\n\"I've already forwarded the HoT profile to your MeChip. Check it if you don't believe me,\" Sonja says, flashing a quick mental photo of you. \"That's great, the dumbstruck look will be perfect for the cover shot….\" \n\nYou're currently unable to form any coherent thoughts but luckily, MeChip ${chipname} is a few steps ahead of you—${chipze} appears with a copy of the article.\n\n\"We're finally going to be Legends…\" ${chipname} whispers, wiping at ${chiphis} tear-soaked cheeks.\n\nYou stagger backward on the roof, trying desperately to catch your breath. Your life is never going to be the same.\n\nBecause this is it.\n\nYou've made it.\n\n*finish Part Three: Fallout\n\n*label delay\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Heroes Rise: The Prodigy[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2025-06-12 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n*return\n", "victon_visit": "*comment é\n\n*text_image chap_6.png center Chapter 6: Victonian Visions\n\nYour heart begins to pound and you clench your fists—it's just about all you can do not to pummel Mayor Victon on sight. The only thing holding you back is seeing Grandma sitting in the living room behind him.\n\n\"What are you doing here?\" you say, willing yourself to stop shaking.\n\n\"Now, now, there's no need to be rude,\" Mayor Victon says. \"After all, your grandmother was kind enough to invite me inside.\" \n\nYou send Grandma a look and she returns it with a calm nod. Not now, ${firstname}, you imagine her saying.\n\n\"I received an urgent call from my son, claiming that some rogue rookie attacked him and sabotaged his latest case,\" Mayor Victon says. \"I had my office discover which so-called hero this was and a quick background search gave us your address. Then I had some of my more…colorful staff pay you a visit.\"\n\nYour eyes flash back to Grandma, but she nods once again, indicating that she's all right. If this scum had hurt her…you don't even want to think about what you'd do.\n\nIt's terrifying that your private information is out there, too. Sure, you have a secret identity, but since all heroes have to register with the government, there's a secure database with all of the licensed heroes' information in it—a database that Mayor Victon clearly has access to, one way or another.\n\n*page_break\n\n\"Imagine my surprise when they found an old woman living here instead of some young buck hero. And then my absolute delight to learn that I had walked right into the new life of my dear, old friends, the ${familyname}s,\" Victon nearly coos. \"I had heard you'd both been enrolled in the PFPP but I rather frustratingly hadn't been informed of your whereabouts.\"\n\nMayor Victon pauses, hitting you with the warmest politician smile he can muster. He's got the same Kennedyesque good looks as his son, but you can slightly see his replugged hairline and concealer-covered cheeks. \n\n\"It is rather gratifying to finally have found you, after all these years. And even more gratifying to know exactly where you live,\" Victon says, his voice dropping. \"Do keep that in mind the next time you happen to come across my son.\"\n\nThat's enough, you think.\n\n*choice\n\t#Tell Mayor Victon to leave. Now.\n\t\t*set rlshp_victon %-20\n\t\t\"Get the hell out of my apartment, before I throw you out myself,\" you say, your voice trembling. This man took your parents away from you and now he has the audacity to threaten you in your own home? Not tonight.\n\t\t*goto espbec\n\t#Hear Mayor Victon out.\n\t\t*set rlshp_victon %+10\n\t\t\"What do you want?\" you say, your voice trembling. This man took your parents away from you and now has the audacity threaten you in your own home? It's too much. But attacking him right now would get you nowhere…\n\n\t\tEspecially because, for all of Mayor Victon's posturing, he has his eye on a bid for the upcoming presidential election. He's beloved by the people of Millennia City for regulating Powered activity and making the city a safer place to live. Taking down your \"murderous\" parents was spun as a positive, but coming after their innocent, shattered family won't play well to the public—especially not with the PFPP backing you up.\n\n\t\tSo Mayor Victon won't want to make any waves here…at least not today.\n\n\t\t\"Why, my dear child, what gives you the impression you could possibly have anything I might want?\"\n\t\t*goto presidential\n\t#Blast Mayor Victon away. (Power Cost 5)\n\t\t*set rlshp_victon %-30\n\t\tYou don't say a word, simply raising your hands toward Mayor Victon. This man took your parents away from you and now he has the audacity to threaten you in your own home? Not tonight.\n\t\t*goto espbec\n\n*label espbec\n\nEspecially because, for all Mayor Victon's posturing, he has his eye on a bid for the upcoming presidential election. He's beloved by the people of Millennia City for regulating Powered activity and making the city a safer place to live. Taking down your \"murderous\" parents was spun as a positive, but coming after their innocent, shattered family won't play well to the public—especially not with the PFPP backing you up.\n\nSo Mayor Victon won't want to make any waves here…at least not today.\n\nBut Mayor Victon eyes you, seemingly pleased by your aggression.\n\n\"Of course, I have a full security detail positioned outside your door, in addition to the considerable defenses afforded by my MeChip. So I'd caution against any…rash decisions.\"\n*goto presidential\n\n*label presidential\n*page_break\n\nMayor Victon smiles at you—a smile that sends ice through your veins.\n\nYou're about to respond when suddenly Mayor Victon shouts in pain and jumps sideways. You're quite delighted to see that one of Grandma's Venus flytraps has had its way with Mayor Victon's thigh. \n\n\"Oh, I'm terribly sorry about that,\" Grandma says. \"De Milo sometimes has a mind of her own. Now if you'll excuse me, I do think it's time you were leaving. That is, unless you have something constructive to add to this conversation?\"\n\nMayor Victon looks from Grandma to you, the smile draining from his face.\n\n\"I just wanted to drop by to let you know you always have a friend in me,\" Mayor Victon says as he walks toward the door. \"Feel free to call me any time. And now that I know where you two live, do remember that I can call you any time I'd like, too.\"\n\nOn that discomforting notion, Mayor Victon exits your apartment.\n\n\"Bastard,\" Grandma says, petting De Milo. She looks as if she wants to say more, but stops once she gets a closer look at you.\n\n\"Oh my word, you look dreadful, ${firstname}! Are you all right?\"\n\n*choice\n\t#Yes, I just need a moment to think….\n\t\tSo much has happened, so quickly. A few short hours ago, it was the best birthday of your life. But now…\n\n\t\tIf you just had a second to stop and collect your thoughts, you're sure you'd be all right. \n\t\t*goto breakdown\n\t#No, tonight has been so intense….\n\t\tA few short hours ago, it was the best birthday of your life. But now…\n\t\t*goto breakdown\n\t#I don't know.\n\t\tSo much has happened, so quickly. A few short hours ago, it was the best birthday of your life. But now…\n\n\t\tIf you just had a second to stop and collect your thoughts, you're sure you'd be all right.\n\t\t*goto breakdown\n\n*label breakdown\nYou try your hardest to block out the failures, to forget that your costume is still covered in bits of human ash. You thought being a hero would be glamorous and exciting but tonight was just…\n\nYou could barely save your own life, let alone anyone else's.\n\nAs the adrenaline finally drains from your body, one thought pounds in your brain, pushing out everything else. \n\nYou wish your parents were here.\n\nIt isn't long before you're on the floor, the room blotching into blackness. The last thing you make out is Grandma kneeling beside you, looking more worried than you've ever seen her.\n\n*page_break Two Weeks Later\n\n\"ROOKIE HERO $!!{CODENAME} RUINS EVERYTHING\"\n*line_break\n[i]Millennial Orbit[/i] Article Contributed by Sonja Challa\n\n*set power 100\n*set health 100\n\nIt's been weeks since this article came out but it still stings every time you read it. At this point, you can only bear to skim the clipping….\n\nNot only does the newsblog chew you out for destroying The Gravitas, there's also a quote from Rexford Schillers damning you for \"costing him hundreds of thousands of dollars.\" Of course there's a quote from Jury too, saying that you sabotaged what otherwise would have been a successful mission for him.\n\n*if sanders\n\tLuckily, Officer Sanders managed to do some damage control, citing you as the hero who helped the police locate Trackr. He also contributed your Prodigal story to the investigation and managed to clear your name of criminal charges, but most still think you're responsible for The Splice Circle murders.\n\n\tSo while you may not be a fugitive thanks to Officer Sanders, the MCPD still hates you.\n\t*goto article\n\n*else\n\tThe MCPD have also marked you as a dangerous fugitive, pinning The Splice Circle murders on you.\n\t*goto article\n\n*label article\nIn fact, the only reason the police haven't knocked down your door is…\n\n*choice\n\t#Jenny, my blessed PFPP agent, had the wherewithal to hack into the government database and alter my personal information after my Victonian visit. \n\t\tYou owe Jenny big-time for that one…though you haven't exactly expressed your gratitude yet, since you missed several of her calls as you took time to recover.\n\t\t*goto victon_comment\n\t#I splurged for one major MeChip upgrade: the anti-tracking function.\n\t\tThere have been major political battles surrounding electronic tracking and privacy rights. You're supposed to be protected from most tracking as a result, but you don't buy that for one second. You purchased anti-tracking software as soon as you could, so your MeChip does its best to keep you erased from GPS grids and clean up as many of your electronic footprints as possible.\n\n\t\tThe software wasn't cheap though, setting you back $400.\n\t\t*set money -400\n\t\t*goto victon_comment\n\t#I hacked the database myself and changed my information.\n\t\tYou've spent a lifetime looking out for yourself and this is no different—you know how to solve problems on your own. And it doesn't hurt that you happen to be fantastic with computers.\n\t\t*goto victon_comment\n\n*label victon_comment\n\nLast and certainly not least, Mayor Victon's office commented in the article, saying that it's \"amateur hero screwups like this one that Mayor Victon's hoping to further regulate during the rest of his term.\"\n\nWhile this [i]Orbit[/i] article probably helped to make Sonja Challa's career, it appears that she has done irreparable damage to yours. Even though she gave you a boost with that first piece on Trackr, she has thoroughly trashed your name with this second article—a fact you won't forget anytime soon.\n\n*set legend -5\n\nThe people of Millennia City now think of you not just as a hack, but as an actual danger to society. If you thought getting a good hero gig was hard before, it just got doubly difficult. \n\nAnd your Legend Level seems decimated before it has even had a chance to rise, down to a measly ${legend} according to your heroic license. You'd check the official Hero Legend Meter website that tracks your Legend like a credit score, but you know it's bound to be depressing.\n\n*page_break\n\nThe only positive news is that, good or bad, famous or infamous, you've placed yourself on the map in a big way. Getting people's attention is the first step to becoming a hero, even if it's only negative attention. \n\nAnd now that all of Millennia City is watching, it's up to you to decide what they see next. \n\nWith that thought in mind, you took some time to rest and recover from that first, traumatizing night. More importantly, you took time to reflect upon your actions.\n\nConsidering all that happened with The Gravitas case, how do you really feel about your first heroic night?\n\n*choice\n\t*if (fame \u003c= 50) #I put Trackr behind bars, saved as many lives as I could, and took a dangerous weapon off the streets. Despite what the press says, I did my duty as a hero to the best of my ability.\n\t\t*set fame %-25\n\t\t*set legend +1\n\t\tSometimes, remaining positive and having a good attitude is all that matters. You still believe in yourself—and that's a trait worthy of Legend.\n\t\t*goto fighting\n\t*if (fame >= 50) #I got my name out there, which is all I set out to do in the first place. Who cares what they're saying? This was an excellent start to my Legendary rise.\n\t\t*set fame %+25\n\t\t*set legend +1\n\t\tSometimes, remaining positive and having a good attitude is all that matters. You still believe in yourself—and that's a trait worthy of Legend.\n\t\t*goto fighting\n\t#My reputation is ruined—people think I'm useless at best and a criminal at worst. It's going to be impossible now to launch a successful heroic career.\n\t\tSometimes, remaining positive and having a good attitude is all that matters, so you have to find a way to believe in yourself (even if no one else does).\n\t\t*set fame %+15\n\t\t*goto fighting\n\t#I didn't save enough lives or complete my mission. As a hero, I completely failed.\n\t\tSometimes, remaining positive and having a good attitude is all that matters, so you have to find a way to believe in yourself (even if no one else does).\n\t\t*set fame %-15\n\t\t*goto fighting\n\n*label fighting\n*page_break\n\nUsing your Powers in real-life heroing situations was quite a rush, but it proved to be equally terrifying. Even though you managed to survive the night, your Power and Health Levels could have dropped to dangerously low levels.\n\nAfter a week's rest you're fully healed and rePowered, but how do you feel about your fighting decisions?\n\n*choice\n\t*if (offensive \u003c= 70) #I defended myself and stayed alive against insanely dangerous opponents, which is all that matters.\n\t\t*set offensive %-15\n\t\t*goto law\n\t*if (offensive \u003c= 70) #I was too timid. I could have benefited from fighting a bit more offensively.\n\t\t*set offensive %+15\n\t\t*goto law\n\t*if (offensive >= 30) #I was way too brazen. I need to make more strategic, defensive decisions.\n\t\t*set offensive %-15\n\t\t*goto law\n\t*if (offensive >= 30) #I followed my gut and it paid off, so I'll always listen to my first instincts.\n\t\t*set offensive %+15\n\t\t*goto law\n\n*label law\n\nYou certainly learned that your feelings regarding the law really matter—especially since these feelings have significantly affected your relationship with the MCPD.\n\nHow do you plan to react to the law and the police moving forward?\n\n*choice\n\t*if (sanders) #Even though Officer Sanders wasn't able to clear my name fully, things worked out way better with him than they would have without him.\n\t\tOfficer Sanders will definitely be a useful contact as you try to salvage your career.\n\t\t*set lawless %-25\n\t\t*goto enemy\n\t*if (fugitive) #The police hating me could be a serious issue moving forward with my career, but at least I'm free to act however I see fit.\n\t\tNo one's going to be able to tell you how to live your life as a hero—especially not the police.\n\t\t*set lawless %+25\n\t\t*goto enemy\t\n\t*if (fugitive) #I should have followed the law and worked with the police—having them on my side is way better than having them against me.\n\t\tHopefully, you can find a way to repair the damage you've done with the MCPD as you move forward and try to salvage your career.\n\t\t*set lawless %-15\n\t\t*goto enemy\n\t*if (sanders) #Following the law so closely ultimately hurt me—acting on my own in the future will help me handle missions more successfully. \n\t\tThis is a wicked industry and you need the freedom to operate as you see fit. If that vision doesn't align with the letter of the law, then so be it.\n\t\t*set lawless %+15\n\t\t*goto enemy\n\n*label enemy\n\nFinally, for only one night on the job, you amassed an impressive array of enemies. Who do you think is your biggest threat?\n\n*choice\n\t#The Splice Circle.\n\t\tOnce The Splice Circle inevitably settles into new leadership, you know they'll be targeting you—not just because of your involvement in Smyther's downfall, but also because of the knowledge you gained regarding their inner workings.\n\t\t*goto hopeful\n\t#Madame Vice.\n\t\t*if vice_friend\n\t\t\tEven though you helped Madame Vice escape the police raid on Smyther's headquarters, she may still come after you. After all, if she does succeed in taking over The Splice Circle, they'll be out for blood to avenge their former leader.\n\n\t\t\tWhether she wants to or not, Madame Vice may have to serve your head on a platter to appease her new underlings. You can only hope that after helping her out, she'll rank you low on her list of enemies.\n\t\t\t*goto hopeful\n\t\t*else\n\t\t\tWhether or not she succeeds in taking over The Splice Circle, Madame Vice has every reason to come after you. You knocked her out at Shed and gained knowledge regarding The Circle's inner workings. Not coming after you will certainly be seen as a sign of weakness, so you had better hope Vice doesn't survive The Splice Circle boss war….\n\t\t\t*goto hopeful\n\t#Mayor Victon.\n\t\tMayor Victon has more power and influence than everyone else on this list combined. He can make your life hell if he wants to.\n\n\t\tAnd after what he did to your parents, there's no way he won't think of you as a potential threat to his political aspirations.\n\t\t*goto hopeful\n\t#Jury.\n\t\tNever underestimate the power of an aspiring, power-hungry hero. You'd do anything to further your career—Jury will no doubt do the same.\n\n\t\tAnd after what you did to him on the Gravitas case, he'll probably stop at nothing to sabotage you.\n\t\t*goto hopeful\n\t#Rexford Schillers.\n\t\tMoney talks—and Rexford has more money than anyone in Millennia City. As far as he's concerned, you're responsible for losing one of his most valuable possessions.\n\n\t\tSo you can bet he'll be looking to pay you back in kind.\n\t\t*goto hopeful\n\t#Prodigal.\n\t\tThis crazy mystery girl clearly has it out for you—she knew your code name, sabotaged your first mission, and successfully framed you. It should be a top priority for you to figure out who she is and what she wants.\n\t\t*set legend +1\n\t\t*goto hopeful\n\t*if (fugitive) #The Police.\n\t\tThe police hate you—they think you're a fraud and a murderer. If the MCPD gets ahold of you, you'll end up imprisoned like your parents before your career can even start.\n\t\t*goto hopeful\n\n*label hopeful\n*page_break\n\nNo matter how you feel about your first case as a hero, you realize that this is going to be way harder than you expected. You're going to have to be stronger, smarter, and faster if you have any hope of surviving the deadly enemies you face, and of finding the success you so desperately crave.\n\nBut what if this is all a crazy pipe dream? What if you're not good enough? What if the odds just never work in your favor? Your dreams could simply not come true and no one would know except for you….\n\nYou quickly shake these doubts off, though. No one ever said this was going to be easy.\n\n*if (legend > 5)\n\t*goto bonus_upgrade\n*else \n\t*goto real_fighting\n\n*label bonus_upgrade\n*page_break\n-- LEGEND PRIZE UNLOCKED --\n\nAs a bonus for maintaining one of the highest possible Legend Levels (${legend}) at this point, you can choose to purchase another costume upgrade. You currently have $${money}.\n\n*if fly_upgrade\n\t*choice\n\t\t#Large, metal wristbands that store energy for blasting. ($500)\n\t\t\tThis offensively suited upgrade allows you to create blasts at half the Power Cost.\n\t\t\t*set money -500\n\t\t\t*set energy_blast true\n\t\t\t*set costume_wristbands true\n\t\t\t*set fly_blast true\n\t\t\t*goto real_fighting\n\t\t#Thin tubes that collect and channel excess energy for shielding purposes. ($700) \n\t\t\tThis defensively suited upgrade allows you to generate shields at half the Power Cost.\n\t\t\t*set money -700\n\t\t\t*set energy_shield true\n\t\t\t*set costume_tubes true\n\t\t\t*set fly_shield true\n\t\t\t*goto real_fighting\n\t\t#No thanks, I want to save my money.\n\t\t\t*goto real_fighting\n*elseif energy_blast\n\t*choice\n\t\t#Thin tubes that collect and channel excess energy for shielding purposes. ($700)\n\t\t\tThis defensively suited upgrade allows you to generate shields at half the Power Cost.\n\t\t\t*set money -700\n\t\t\t*set energy_shield true\n\t\t\t*set costume_tubes true\n\t\t\t*set blast_shield true\n\t\t\t*goto real_fighting\n\t\t#A rocket-backpack to channel excess energy and add propulsion to my flying. ($300)\n\t\t\tThis upgrade allows you to fly at normal speeds without lowering your Power Level.\n\t\t\t*set money -300\n\t\t\t*set fly_upgrade true\n\t\t\t*set costume_rocket true\n\t\t\t*set fly_blast true\n\t\t\t*goto real_fighting\n\t\t#No thanks, I want to save my money.\n\t\t\t*goto real_fighting\n*else\n\t*choice\n\t\t#Large, metal wristbands that store energy for blasting. ($500)\n\t\t\tThis offensively suited upgrade allows you to create blasts at half the Power cost.\n\t\t\t*set money -500\n\t\t\t*set energy_blast true\n\t\t\t*set costume_wristbands true\n\t\t\t*set blast_shield true\n\t\t\t*goto real_fighting\n\t\t#A rocket-backpack to channel excess energy and add propulsion to my flying. ($300)\n\t\t\tThis upgrade allows you to fly at normal speeds without lowering your Power Level.\n\t\t\t*set money -300\n\t\t\t*set fly_upgrade true\n\t\t\t*set costume_rocket true\n\t\t\t*set fly_shield true\n\t\t\t*goto real_fighting\n\t\t#No thanks, I want to save my money.\n\t\t\t*goto real_fighting\n\n*label real_fighting\n*page_break\n\nReady to get back to work, you pull on your ${codename} costume. You know Grandma will kill you if you don't say goodbye before leaving, so you walk into the living room, where you find her wrestling with a rather large palm frond.\n*if gma_simple\n\tGrandma wears her usual, comfortable clothes, though her short hair is matted down to her face with beads of sweat.\n\t*goto fine\n*elseif gma_elegant\n\tGrandma's brooches are all askew, she has lost an earring, and her usually tidy, blonde hair has come undone.\n\t*goto fine\n*elseif gma_kooky\n\tGrandma has lost one lilac earring and her floral dress is covered in dirt stains.\n\t*goto fine\n*else\n\tGrandma has lost several of the tools from her gardening belt and her hair has come undone, matted down to her face with beads of sweat.\n\t*goto fine\n\n*label fine\n\n\"I'm fine!\" Grandma says, wiping her brow. \"Tropez here is just having a bit of a hard time adjusting but he'll feel right at home in no time. By the way, that video game woman called again…and she sounded rather angry.\"\n\nIn your haste to start your heroic career, you quit the video game testing job without telling the company (or returning your advance deposit). Perhaps not the smartest move, especially now that you have no idea how you're going to start making money as a hero.\n\nUnfortunately, your bank account also took another hit this morning after you paid $800 for rent; Grandma's pension doesn't cover all the bills.\n\n\"Anyway, are you going to go see Jenny?\" Grandma asks, returning to her battle with Tropez.\n\nGrandma thinks that with all of this fresh, heroic hell on your plate, it'd be smart to strategize with your PFPP agent, Jenny. She has access to government information and claims to have a lead that could help you sort out the mess with the Gravitas case. But you probably bit off too much too fast taking on The Splice Circle, so you've got your sights set on a smaller-scale mission for tonight….\n\n*set money -800\n*page_break\n\n\"Oh ${firstname},\" Grandma says, \"have you made a decision yet about the sidekick-mentoring project?\" \n\nDespite your heroic false start, Grandma has still been insisting that you take on a sidekick-mentee. She's always been involved in mentoring Powered youth—you even had your own hero-mentor back when you were younger (though the most exciting thing he asked you to do was pick up his dry cleaning).\n\nYou'd never tell Grandma but you don't have much faith in the program. Besides, you can't imagine why any young Powered person would want to work with an amateur like you. You've been rather reluctant to choose all week but at this point you're just tired of Grandma's constant and \"helpful\" reminders.\n\n\"All right, all right,\" you say, pulling up the applicant files on your MeChip. As they scroll in front of your face, you decide to go with…\n\n*choice \n\t#Sparrow: a sixteen-year-old orphan from the Eastern Fringes who has the appearance and abilities of a typical bird. Coming from a neighborhood like the Fringes, she won't have many heroic opportunities within her reach (a fact you know all too well).\n\t\t*set fame %-5\n\t\t*achieve sparrow\n\t\tSparrow's profile says she's extremely smart but painfully shy. She definitely looks older than sixteen but you know that's just a side effect of growing up in the Fringes without parents. You're happy to take on someone who's as eager to become a hero as you are, especially someone with such a similar background.\n\t\t*set sparrow true\n\t\t*set sidekick \"Sparrow\"\n\t\t*goto depart\n\t#Pressie: a fourteen-year-old, four-foot-tall, gnomish-looking boy. He believes his Power to manipulate the Earth comes solely from his \"magical\" peg leg. His only dream is to become a hero but given his rather cutesy appearance, that seems highly unlikely.\n\t\t*set fame %-5 \n\t\t*achieve pressie\n\t\tYou love an underdog story, so you want to work with Pressie—you both can overcome the odds together. Plus, with his earth-manipulating Powers, he and Grandma will definitely get along famously.\n\t\t*set pressie true\n\t\t*set skze \"he\"\n\t\t*set sidekick \"Pressie\"\n\t\t*set skhir \"him\"\n\t\t*set skhis \"his\"\n\t\t*goto depart\n\t#Tarana Rain: a fifteen-year-old girl who has the Power to generate and manipulate water. She goes to a ritzy Rein Hill Powered private school and comes from a wealthy family—one that owns the [i]Millennial Orbit[/i], MC's best-selling newsblog.\n\t\t*set fame %+10\n\t\t*achieve tarana\n\t\tTarana Rain sounds like she might be a real pain and you can't fathom why she's applying to this program, but you do like the idea of having a connection to the [i]Orbit[/i]. Impressing her parents might come in very handy, given their considerable influence within the media world. \n\n\t\tHey, if you're going to do this mentor-a-sidekick thing, why not get something out of it for yourself, too?\n\t\t*set tarana true\n\t\t*set sidekick \"Tarana Rain\"\n\t\t*goto depart\n\n*label depart\n\n*if chip_butler\n\t\"Divine choice, ${sir_mad},\" MeChip ${chipname} says, appearing today in one of his standard-issue outfits, a tweed suit. \"I think ${sidekick} will make a fine sidekick.\"\n\n\t\"I hope you're right, ${chipname},\" you think, figuring it's best to practice the thought-command function as much as possible.\n\t*page_break\t\n\t*gosub delay\n\t*goto tell_gma\n*elseif chip_diva\n\t\"Oooh, I smell trouble,\" MeChip ${chipname} says, appearing today in one of her standard-issue outfits, a naughty secretary. \"That mess is going to be too hot to handle!\"\n\t*page_break\n\t*gosub delay\n\tIgnoring ${chipname} and wishing you'd chosen a potentially less-offensive personality template for your MeChip, you look up. \n\t*goto tell_gma\n*else\n\t\"What a great choice, sweetheart,\" MeChip ${chipname} says, appearing today in one of her standard-issue outfits, a loose-fitting housedress. \"I do hope ${sidekick} turns out to be the best sidekick ever!\"\n\n\t\"Let's hope, ${chipname},\" you think, figuring it's best to practice the thought-command function as much as possible.\n\t*page_break\t\n\t*gosub delay\n\t*goto tell_gma\n \n*label tell_gma\n*set met_sk true\n\n\"I'm going to go with ${sidekick},\" you say to Grandma.\n\n\"I had a feeling you might,\" Grandma says, a mischievous smirk stretching across her face, \"which is why I told ${skhir} to meet you in Ringe Square in five minutes to help you with whatever you've got planned for tonight.\"\n\nYou open your mouth to protest but know it's no use—arguing with Grandma once she has made up her mind is mind-numbingly futile. So you simply nod, jaw clenched. This is certainly going to be…interesting.\n\nBefore you go, you walk over to say goodbye to ${flower}, stroking her petals for good luck.\n\n\"And for heavens sake, ${firstname},\" Grandma starts, once again looking more worried than you can stand. \"Please be careful out there?\"\n\nYou nod at Grandma, knowing it will be hard to screw things up worse than you did last time….\n\n*page_break\n\nIn your room, you prepare for takeoff, checking over your costume one last time. Then you look up at the poster of your parents, causing another streak of guilt to run through you. Maybe you should write to them?\n\nBut then you stop yourself, thinking that nothing has changed. You've been left to live your life without your parents so that's exactly what you're going to do. \n\nInstead you glance over at the poster of Rebellion, thinking that getting to ${youhis} level seems further away than ever before….\n\n*finish Part Two: Pride Comes Before\n\n*label delay\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Heroes Rise: The Prodigy[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2025-06-12 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n*return\n", "vigilante": "*comment é\n\n*text_image chap_8.png center Chapter 8: The Vigilante\n\nAs you fly to meet Jenny, your thoughts are consumed with ${sidekick} and your own younger years. It makes you remember why Jenny is not just your PFPP agent, she's also your best friend.\n\nWhen your life was turned upside down by your parents' imprisonment and you moved in with Grandma, you couldn't talk to any of your old friends. Going from your sheltered private school to the rougher public school was a big change—especially as you began to learn that there are all kinds of social complications to being Powered.\n\nThe Ani-gang rivalries in the Eastern Fringes are just the tip of the iceberg when it comes to Powered politics—entire textbooks have been written on the subject. So to say that Powered kids are cliquey would be an understatement.\n\nUpon arriving at your new school, there was one group that immediately tortured you the most:\n\n*choice\n\t#The Telepaths.\n\t\tTelepaths are notoriously the most insular Powereds, only wanting to have lightning-fast psychic interactions with one another. The Telepaths targeted you because\n\t\t*goto outcast\n\t#The Natural Resource Elementals.\n\t\tNatural Resource Elementals tend to be terribly self-satisfied, thinking their Powers are the most useful to society (though typically fire/ice and water/earth types have intense internal rivalries).\n\n\t\tHowever, despite their own issues, the Elementals targeted you because\n\t\t*goto outcast\n\t#The Animalistics.\n\t\tEven though Animal-types tend to hang together, there are fierce rivalries between specific animal groups—for example, mammal- and reptilian-based Animalistics hate each another more than anything.\n\n\t\tHowever, despite their internal issues, the Animalistics targeted you because\n\t\t*goto outcast\n\t#The Strong.\n\t\tTypically emerging as the jocks, the Strong are always the most popular. They targeted you because\n\t\t*goto outcast\n\t#The Clairvoyants.\n\t\tClairvoyants are notoriously difficult to speak to since they see the world in a way very few others (even fellow Clairvoyants) can understand. However, despite their internal issues, the Clairvoyants targeted you because\n\t\t*goto outcast\n\t#The Techies.\n\t\tThere's a whole sect of Powered people that interface with technology, and they tend to consider themselves more cutting-edge than anyone else (though there's still a massive rift between the two major operating-system factions). However, despite their internal issues, the Techies targeted you because\n\t\t*goto outcast\n\t#The normal, unPowered kids.\n\t\tThe Powered kids were a minority at school to begin with, which meant that the majority of the school already hated you, since unPowered kids are notoriously wary of Powered kids. Though the normal kids targeted you especially because\n\t\t*goto outcast\n\n*label outcast\nif there's anything teenagers hate most, it's when they can't squeeze you into a specific group.\n\nAnd you had a lot of trouble finding a group, even though you tried to befriend:\n\n*choice\n\t#The other Energy Wielders.\n\t\tHowever, Energy Wielders hate Fliers\n\t\t*goto handler\n\t#The other Fliers.\n\t\tHowever, Fliers hate Energy Wielders\n\t\t*goto handler\n\n*label handler\nbased on some age-old feud dating back to the earliest Powered individuals. Apparently, the first Flier and the first Energy Wielder were mortal enemies….\n\nSince you have both flight and energy Powers, you were seen as a particularly heinous \"Gene Hazard.\" No one wanted you in their group and as a result of your solo status, you were hounded by just about everyone at school.\n\nYou can imagine\n*if sparrow\n\tSparrow at school, embroiled in the intense Animalistic rivalries of the Fringes. It makes perfect sense that she was so passionate about taking on the Ani-gangs.\n\n\tYou wonder how she deals with it, \n\t*goto handle\n*elseif pressie\n\tPressie at school, probably treated like an outcast by everyone for his strange Power set—just like you were. You wonder how he survives there, \n\t*goto handle\n*else\n\tTarana Rain at her fancy, private, Powered school, with trained social mediators and guidance counselors. You also bet Tarana Rain, with her elemental Power set, must be one of the popular girls. She probably would have tortured you in high school.\n\n\tThough you'd know exactly what to do, \n\t*goto handle\n\n*label handle\nbecause when you were at school, you handled the social politics by:\n*choice\n\t#Keeping to myself.\n\t\t*set offensive %-10\n\t\tStaying quiet and in the shadows meant the other kids left you alone…most of the time.\n\t\t*goto lonely\n\t#Not letting anyone bully me—ever. \n\t\t*set offensive %+10\n\t\tDespite hating you, everyone knew not to mess with you after you cracked a few of the bullies' skulls.\n\t\t*goto lonely\n\t#Always trying to make friends, despite how the other kids treated me.\n\t\tYou weren't ever going to let other people tell you what you could or couldn't have, so you always tried your best to make as many friends as you could.\n\t\t*goto lonely\n\n*label lonely\n\n*if agent\n\tStill, you felt very alone. Actually, you've always felt alone but it's not something you allow yourself to give much thought to. It's just the way things are—there are some things in life you can't control.\n\n\tThe only thing you can control is how hard you work to change everything.\n\t*page_break\n\t*goto meet\n*else\n\tWhen your life was turned upside down by your parents' imprisonment, one of the only people you could trust was the PFPP agent assigned to your case: Jenny Yu. Even though Jenny doesn't have Powers of her own, she loves Powered Hero stuff just as much as you do. So when you had no one else to talk to, you and Jenny would spend hours gushing about all of your favorite heroes, games, and comics.\n\t*goto meet\n\n*label meet\n\nYou're meeting Jenny at your favorite spot, The Vigilante, MC's largest comic/game/collectible store (which luckily happens to be open twenty-four hours). Occupying four stories, The Vigilante is practically a department store for all things hero-related. You and Jenny always meet in one of the private gaming rooms, usually over your favorite Virtuous Reality games.\n\n*if fly_upgrade\n\t*goto prep\n*else\n\t*set power -2\n\t*goto prep\n\n*label prep\n\n\"Sorry ${firstname}, I'm afraid there's no time for fun today,\" she says,\n*if agent\n\tsitting down. As usual, she wears her ponytail-pantsuit uniform, though you notice she has added an unexpected red heel to the ensemble.\n\t*goto game_time\n*else\n\ttraces of her British accent still present despite years of living in Millennia City.\n\n\tSince she's such a geek, you tend to forget how pretty Jenny is—she's half-Korean, half-British. She always wears her hair in a tight ponytail and never applies a bit of makeup, causing her to appear sleek and no-nonsense at all times.\n\t*set agent true\n\t*goto dynamics\n\n*label dynamics\n\n*if male\n\t*if male_straight\n\t\tActually, you think Jenny is super hot. Sadly, she also happens to be super gay.\n\t\t*goto game_time\n\t*else\n\t\tJenny is your best gal-pal and you even go to clubs together sometimes, since Jenny likes the ladies just as much as you like the fellas.\n\t\t*goto game_time\n*elseif genderneutralhr\n\tJenny is your closest friend and you hope it always stays that way.\n\t*goto game_time\n*else\n\t*if female_straight\n\t\t*if bisexual\n\t\t\t*goto jenny_bi\n\t\t*else\n\t\t\tJenny is your closest girlfriend and luckily there's no threat of you going for the same guys, since she's gay.\n\t\t\t*goto game_time\n\t*else\n\t\t*label jenny_bi\n\t\tYou think Jenny is beautiful. And since she also happens to be into girls, there's always sexual tension lingering in your relationship….\n\t\t*goto game_time\n\n*label game_time\n\n\"I hear you've been rather busy,\" Jenny says. \"Too busy to return my calls, it seems.\"\n\n\"I know, I know. But before you rip into me,\" you start, \"let me tell you my side of the story….\"\n\n*page_break Twenty Minutes Later\n\nHaving heard every detail of your first heroing night, Jenny pauses to mull it all over.\n\n\"Well, you certainly dove head-first into the deep end, didn't you? Ever heard of paying your dues? Climbing the ladder? There's a reason people aren't supposed to skip steps, ${codename}. You should have called for help. You should have-\"\n\n\"Jenny,\" you interrupt, \"I get it. I took on too much, too fast. Which is exactly why I went back to basics earlier tonight—I stopped the Ani-gang rumble.\"\n\n\"Well, that's certainly a smarter—though no less dangerous—place to start,\" Jenny offers. \"Still, you've dug yourself quite a hole here….\"\n\n\"Yes I did,\" you say, tired of mulling over the horrors of your situation. \"So what are we going to do now to make it better?\"\n\n\"I suppose that's the spirit! Well, I'll start looking into Prodigal, though there's not much to go on. Black kevlar bodysuits are pretty common purchases these days. I could look into her Power set but I bet she's unregistered. It's clear that she has some kind of mad-on for you, though. Perhaps you have your first genuine villain stalker?\"\n\n\"Yeah, right,\" you say, wishing you were enough of a somebody for that to be true. \"She probably saw that silly \"Hero Press\" post and wanted me out of her way. She's just another nobody trying to make a name for herself. Still, anything you can find would be helpful.\"\n\n\"I'm on it. Now before we move on to The Splice Circle, I've got a bit of a briefing prepared for you—all the basics on Powered heroing, plus some gems of advice. Do you want to go over it now?\"\n\n*set health 100\n*set power +30\n*choice\n\t#\"Yes, I can use all the help I can get.\"\n\t\t\"Good,\" Jenny says, looking down at her MeChip. \"Inspector Detector will forward you the folder. There's a PFPP handbook on heroing in there, but since you're maintaining a secret identity, you've already got most of it covered. The more interesting stuff involves some comprehensive information on Powered history and science.\"\n\n\t\tSuddenly, Jenny's MeChip, Inspector Detector (a British man in a long trench coat), appears in your mind, holding a folder. MeChip ${chipname} appears to take it from him and as they begin to chat, you start to read the contents:\n\n\t\t\"Powered Humans: A Brief History.\" Fairly certain you already know most of this information, you begin to skim through the articles, catching glimpses of paragraphs here and there….\n\t\t*goto lesson\n\t#\"No, we don't have time for that.\"\n\t\t\"Suit yourself,\" Jenny says, looking down at her MeChip. \"Inspector Detector will forward you the folder. It includes a PFPP handbook on heroing and some comprehensive information on Powered history and science.\"\n\n\t\tSuddenly, Jenny's MeChip, Inspector Detector (a British man in a trench coat), appears in your mind, holding a folder. MeChip ${chipname} appears to take it from him and as they begin to chat, you nod at Jenny, thinking you probably know all of that stuff already, anyway.\n\t\t*goto mob\n\n*label lesson\n\n\"Humans first began developing extraordinary talents in the late twenty-first century, all appearing in the same generation and spanning across the globe. On the heels of the Industrial Revolution, the Millennial Tech Boom, and the Energy Regenesis, the Powered Renaissance has been marked as the next great step in human history….\"\n\nYou stop reading, scrolling to another document.\n\n\"…had evolved beyond racism, sexism, and sexual orientationism, but these hot-button issues were quickly supplanted by geneism. This first crop of Powered individuals (“Powereds,” as they were soon dubbed, though less polite circles referred to them as \"Gene Hazards\") were greatly shunned by the general public. So many of these international Powered individuals fled to Millennia City, an emerging urban center on the American west coast, where they could be free to form their own community…\"\n\n\"…backed by the United States government (which realized that fast-acting acceptance and regulation of Powered individuals could kick-start a resurgence in their declining prominence against the then-dominant world power, China), the American Powered Renaissance began. Solidified by both the Powered Citizen Equality Act and the creation of the Department for the Regulation of Powered Resources, the world’s first Powered Heroes began to flourish in America's Millennia City, sparking a cultural trend that would sweep the globe (though anti-Powered regulations in China remain as tightly controlled as…\"\n\n*if male\n\t*if male_straight\n\t\t*goto skimming\n\t*else\n\t\t\"Many credit First Gentleman Harrison St. Hill (husband of the first gay president) with pushing President DeNicola into approving pro-Powered legislation…\"\n\t\t*goto skimming\n*else\n\t*if female_straight\n\t\t\"Many credit President Colangelo (the first female president) for supporting pro-Powered legislation…\"\n\t\t*goto skimming\n\t*else\n\t\t\"Many credit First Lady Christine Bush (wife of the first gay president) with pushing President Cunneen into approving pro-Powered legislation…\"\n\t\t*goto skimming\n\n*label skimming\n*page_break\n\nYou keep skimming, hoping to find some tidbit you don't know already….\n\n\"As it is widely known, the progress of the Millennial Tech Boom curved off with the onset of the Third World War, which in turn sparked the perfection of nuclear technology that spawned the Energy Regenesis (at the unthinkable cost of losing a sizable portion of Northern Russia in the Fusion Eclipse).\n\n\"Many scientists have posited that, in light of this massive world upheaval, human evolution took the next leap to satisfy society's inefficiencies. With technology now eliminating the need for many basic human functions, and with the energy crisis seemingly solved, humanity was free to unlock further potential in their genomes and take on new abilities.\n\n\"The onset of Powered abilities has sparked another period of rapid growth and change, unlocking potential previously thought unimaginable. With humans now regulating weather patterns, generating clean water, and building cities with their minds, the limits of progress seem to have once again been shattered. Just this week, NASA reported that they're prepping their first mission of Powered astronauts, capable of traveling through space at previously unrecorded speeds and distances.\n\n\"Others—most notably the growing cult movement called The Meek—possess a decidedly less positive outlook on the Powered Renaissance. Many see an upswing in violence, unrest, and conflict that will most assuredly lead to a Fourth World War, especially as the Eastern and Western worlds seem deadlocked in a Powered-individual arms race.\"\n\nYou stop reading, looking up at Jenny with an eye roll. \n\n\"Come on, I know my heroing history inside out and backward. Don't you have anything new for me?\"\n\n\"As a matter of fact, I do,\" Jenny says. \"I've got a special tip for you….\"\n\n*choice\n\t#Receive a fighting tip.\n\t\t\"When fighting with your Powers, the smartest thing you can do is consider the appropriate level of force. It's important not to use too much Power but equally important not to use too little. Assessing the appropriate level of Power necessary for certain battles can mean the difference between life and death.\"\n\n\t\tYou nod at Jenny, thinking that even though this seems like common sense, you never really thought about it in exactly those terms before.\n\n\t\tEven better, this knowledge increases the current ceiling for your Power to 120.\n\t\t*set power 120\n\t\t*page_break\n\t\t*goto mob\n\t#Receive a Power tip.\n\t\t\"Given the stigma surrounding flying-energy unification, I'm sure you never really thought of this before, but you can utilize your flying and energy powers in all kinds of useful combinations. Even though it's more costly in terms of Power Level, these combinations might pack the extra punch you need.\"\n\n\t\tYou nod at Jenny, thinking that even though this seems like common sense, you never thought about it in exactly those terms before. Suddenly, endless combinations start to run through your mind—cyclonic spinning with crushing energy blasts, turning yourself into a charged battering ram…the possibilities seem endless.\n\n\t\tYou want to start testing these out right away but Jenny interrupts you.\n\t\t\"You've got levels of Power I don't think you quite understand, ${firstname}. With the new breakthroughs in energized atom-splitting, if you really wanted to, I think you could-\" Jenny starts, but almost immediately looks like she regrets having said anything at all.\n\n\t\t\"Jenny, what are you talking about?\" you ask, completely confused.\n\n\t\t\"Never mind,\" she says, going all steely again. \"We've already wasted enough time, let's get back to business.\"\n\n\t\tJenny has just given you quite a bit to think about, so you make a mental note to investigate this Powered potential later—a note that your MeChip records without you even asking.\n\t\t*set megability true\n\t\t*page_break\n\t\t*goto mob\n\t#Get back to talking about The Splice Circle.\n\t\t\"Enough, Jenny,\" you say. \"Let's get back to the task at hand.\"\n\t\t*goto mob\n\n*label mob\n\n\"All right, so you've started a fine mess with The Splice Circle,\" Jenny says. \"One of my contacts at the downtown precinct interrogated Trackr—turns out Smyther didn't just want The Gravitas to increase his offensive Powers, he was also trying to expand into the ancient weapons business. He contracted Trackr to acquire The Gravitas and become The Splice Circle's newest General. Apparently Trackr already had his gene-deep penile enlargement scheduled….\"\n\nJenny lets out a giggle, but quickly pulls herself back to seriousness. \"There was some concern within The Splice Circle that the blatantly illegal nature of Smyther's latest enterprise was too bold. So Madame Vice began placing her ducks in a row for a coup, a move she had been waiting to make since Smyther dumped her….\"\n\n\"Then Prodigal showed up,\" you fill in, \"taking out Smyther and giving Madame Vice the chance she needed to make her move.\"\n\n\"Right you are. Here's the latest intel on The Splice Circle operation,\" Jenny says, sending another Inspector Detector MeMessage, this time displaying the organizational Splice Circle chart you pulled up earlier.\n\nTHE SPLICE CIRCLE (UPDATED) ROSTER\n\nBOSS\n*line_break\nSmyther  (DECEASED)\n\nSECURITY GENERAL\n*line_break\nBoulder  (DECEASED)\n\n*choice\n\t#BUSINESS GENERALS.\n\t\t*goto estab_one\n\t#CRIME GENERALS.\n\t\t*goto crime_one\n\n*label estab_one\nSHED CLUB\n*line_break\nMadame Vice  (EMERGING BOSS)\n\nTHE RYEVAL BAR\n*line_break\nKirkpatrick   (MISSING)\n\nFETISH SIN DEN\n*line_break\nJuanda W  (EMERGING COUNSELOR)\n\t\t\nACES HIGH CASINO\n*line_break\nThird Degree  (DECEASED)\n\n*if jennygen\n\t*goto revelation\n*else\n\tDo you want to see the Crime Generals updated roster as well?\n\t*choice\n\t\t#Yes.\n\t\t\t*set jennygen true\n\t\t\t*goto crime_one\n\t\t#No, just let Jenny fill me in.\n\t\t\t*goto revelation\n\n*label crime_one\nPROSTITUTION\n*line_break\nLolli  (EMERGING UNDERBOSS)\n\t\t\nFIREARMS\n*line_break\nCasing  (DECEASED)\n\nDRUGS\n*line_break\nFracture  (DECEASED)\n\nANCIENT WEAPONS\n*line_break\nTrackr  (INCARCERATED)\n\n*if jennygen\n\t*goto revelation\n*else\n\tDo you want to see the Business Generals updated roster as well?\n\t*choice\n\t\t#Yes.\n\t\t\t*set jennygen true\n\t\t\t*goto estab_one\n\t\t#No, just let Jenny fill me in.\n\t\t\t*goto revelation\n\n*label revelation\n\"Our intel isn't perfect but as far as we can tell, as soon as Smyther went down, Madame Vice made her move. She had already recruited the 'female-centered generals,' Juanda W and Lolli, bringing the Club, Sin Den, and Prostitution Ring together. However, the former Underboss, Casing, made a play for his rightful ascension just as fast.\n\n\"But Madame Vice moved faster…\" Jenny finishes, \"since Casing's body washed up on the docks this morning.\"\n\n\"Looks like someone's been rather busy,\" you say, thinking that all you've done in the past couple weeks was stop an Ani-gang rumble.\n\n\"Madame Vice has already seized control of the Circle and started restructuring, but there was a hiccup with Kirkpatrick,\" Jenny starts. \"Do you remember who Static was?\"\n\n*choice\n\t#\"Yes, you don't need to remind me.\"\n\t\t*goto kirk\t\t\n\t#\"No, tell me who he is.\"\n\t\t\"You really don't remember? He's the current champion of the Fringes,\" Jenny explains. \"And he's the only hero insane enough to take on The Splice Circle, besides you and Prodigal. Though he hasn't been heard from in months.\"\n\t\t*goto kirk\n\n*label kirk\n\n\"Well, it turns out he hasn't been heard from because he abandoned the cape route and went undercover—Static was Kirkpatrick,\" Jenny says, almost proudly. \"Turns out he has the Power to avoid all forms of mind control, making him the perfect mole against Hypno-Powereds like Smyther and Madame Vice.\n\n\"When Smyther went down, Kirkpatrick panicked and got trigger happy. No one knows exactly how, but Madame Vice found him out and he's been missing ever since.\"\n\n\"Any hunches?\" you ask, not wanting to think about what's probably happening to Static/Kirkpatrick right now.\n\n\"Apparently Kirkpatrick had been collecting evidence against The Splice Circle for months, waiting for the right time to strike. The police think Madame Vice has taken him hostage, trying to find the location of his evidence stockpile. She needs to get her hands on it for the new and improved Splice Circle to survive, not to mention to cement her Boss status.\"\n\nJenny then looks at you, growing serious. \n\n\"Here's the thing, only the MCPD and Madame Vice know about this evidence, which gives you a unique opportunity here. If you find that stockpile, it will help the police take down both Vice and Splice. I don't think I have to tell you what will happen if The Splice Circle destroys that evidence and finishes restructuring….\"\n\n\"I'll be at the top of their target list,\" you say.\n\n*page_break\n\n\"But so will Prodigal,\" Jenny says. \"The Splice Circle probably already has information on her that we don't, so taking them out may also help lead you to her.\"\n\n\"So if I find that evidence stockpile, I give the police exactly what they need to arrest The Splice Circle at their weakest juncture. In the process, I also clear my name and salvage my reputation as a hero. And as a bonus, I might learn something about this Prodigal lady. This seems like a no-brainer….\"\n\n\"Precisely,\" Jenny says, smirking. \"So what the slugger are you waiting for?\" \n\n*choice\n\t#I'm waiting because getting wrapped up in this craziness again is downright suicidal.\n\t\t*gosub delay\n\t\tYou barely survived against The Splice Circle once, why on earth would you want to take them on again?\n\n\t\t\"I know you're nervous,\" Jenny says, seeing the look on your face. \"And I know I told you not to jump into the deep end so fast. But you're not taking on The Splice Circle again; you're just looking for that evidence stockpile. That's something you can handle.\"\n\n\t\tJenny's right—if you do your job well, you can stop all of this before it escalates to something really terrible. You won't get involved with battling The Circle—you know better than that by now.\n\n\t\t*goto champ\n\t#I'm not waiting for anything.\n\t\t*gosub delay\n\t\tThis is a second chance to get things right after that terrible first night.\n\t\t*goto champ\n\t#I'm not sure.\n\t\t*gosub delay\n\t\tYou barely survived against The Splice Circle once, why on earth would you want to take them on again?\n\n\t\tThen again, this could be a second chance to get things right after that terrible first night.\n\t\t*goto champ\n\n*label champ\nBest of all, if you are successful in shutting down The Splice Circle and saving Static, you'll surely be seen as the next champion of the Fringes—an excellent\n*if fame > 50\n\tplace to continue your climb to fame.\n\t*goto how\n*else\n\tway to prove you're a hero committed to justice.\n\t*goto how\n\t\n*label how\n\n\"Yeah, but Jenny, how am I going to find the evidence faster than the police, Madame Vice, or some other meddling hero?\" you ask. \"I'm not a detective. That was a lucky break with Trackr's fingertips.\"\n\n\"Well you better start getting used to some intrigue-solving, oh mighty ${codename}!\" Jenny proclaims. \"Besides, you were in Smyther's headquarters and you confronted Madame Vice, so I'm betting you saw and heard things in there that might help you, even if you don't know what they are yet….\n\n\"The real question is,\" Jenny says with a wink, \"where are you going to start?\"\n\n*finish Next Chapter: Case Magic\n\n*label delay\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Heroes Rise: The Prodigy[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2025-06-12 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n*return\n", "wisped_away": "*comment é\n*text_image chap_12.png center Chapter 12: Wisped Away\n\n*set power 100\n*set health 100\n\n\"Gran, I need to sleep…\" you mumble, rolling over as Grandma tries to shake you awake. You can't have been asleep for more than an hour or two. \n\n\"You've been out cold for thirteen hours,\" Grandma says, poking you again. \"Don't make me bring De Milo in here….\"\n\nIgnoring Grandma, you generate an energy shield around your bed and settle deeper into your pillow.\n\n\"Fine. I suppose the 3DVR will save your first appearance on HeroLine.\"\n\nGrandma's voice is muffled through your shield, so you're sure you've misheard her as she leaves your room.\n\n\"What are you—\" you start, dropping the shield.\n\n\"Ah, you and that Black Magician character seem rather chummy….\"\n\nHearing this, you jolt out of bed and run into the living room.\n\n*page_break\n\n\"Two rookie heroes received the opportunity of a lifetime last night as they pitched in on The Millennial Group's most high-profile case of the year—taking down the once-untouchable Splice Circle.\"\n\nYour picture flashes on the 3V screen next to HeroLine's main correspondent, Sheri Saw. You must be hallucinating—HeroLine is one of MC's top gossip shows.\n\n\"What do you want to know most about this smashing mission?\" Sheri asks as interactive 3D-touch options pop out of the screen. You turn to Grandma.\n\n\"Don't look at me,\" she says, beaming. \"This is your 3V debut, you choose!\"\n\n*disable_reuse\n*label news_options\n*choice\n\t*hide_reuse #Splice Circle in Disarray!\n\t\t*goto splice_disarray\n\t*hide_reuse #Jury vs. ${codename} for a Millennial Group Reserve Spot!\n\t\t*goto reserve\n\t*hide_reuse #${codename}: Hero or Hack?\n\t\t*goto redeem\n\t#I've watched enough for now.\n\t\t*goto congrats\n\n*label splice_disarray\n\"Thanks to the joint efforts of the MCPD, The Millennial Group, and undercover Fringes hero Static, all remaining high-level members of The Splice Circle have been arrested. After such a devastating blow, the organization seems to be scrambled beyond repair, concluding a near decade-long reign of terror in the Eastern Fringes.\n\n\"Additionally, reports of Ani-gang violence have decreased by nearly fifty percent since the Splice fall and the breakup of a recent turf rumble, performed by a slew of anonymous heroes.\"\n\nYou smile, knowing that both accomplishments are in large part thanks to your efforts.\n\nAnd thankfully, there's no mention of the S that was burned into Madame Vice's corpse—the authorities were very careful not to release any images of her body. The last thing anyone wants are rumors circulating that Smyther is indeed alive. For the moment, everyone hopes Vice's murder was the work of a loyalist copycat, obviously equipped with some speedy teleportation Powers….\n\n*goto news_options\n\n*label reserve\n\"Rumor has it a fierce rivalry is brewing between rookie heroes Jury and ${codename}. Apparently, some heated words were exchanged between the two post-mission, which is understandable, considering it's widely known that ${codename} usurped Jury's spot in The Gravitas case—a move many believe led to the unnecessary destruction of the valuable artifact. \n\n\"Now it seems the two would-be heroes are in direct competition for an open reserve member position in The Millennial Group….\"\n\nYou think back to the end of the mission, after all the press and police had cleared. Rebellion patted you on the shoulder and said:\n\n*if guard\n\t\"After what you did here tonight, ${codename}, you have a very good shot at filling that reserve spot. We'll let you know in a few days.\"\n\n\tThose words have been ringing in your ears ever since, reinforced by a nod from\n\t*if diva_good\n\t\tThe Diva, who was having her dislocated shoulder reset by Monk.\n\t\t*goto prospect \n\t*else\n\t\tFistfull, who was having his dislocated shoulder reset by Monk.\n\t\t*goto prospect\n*else\n\t\"Following us and crashing our mission like that showed some real gumption, kid, I have to admit it. Still, it doesn't make you much of a team player. I'm not sure you're meant for the Group lifestyle but I'm going to keep you in the running anyway. We'll let you know in a few days.\"\n\n\tYou can just imagine how that vote will look, with Black Magic vouching for you and\n\t*if diva_bad\n\t\tThe Diva bashing you in every way she can imagine.\n\t\t*goto decide\n\t*else\n\t\tFistfull and Monk discrediting you in any way they can.\n\t\t*goto decide\n\n*label prospect\n\nAfter those reassuring displays and connecting with Black Magic (not to mention totally outshining Jury), you know that you have a real chance of filling that reserve spot.\n\nYou think back to the sprawling MGHQ and the Legendary heroes filling its halls—you're so close to being a part of that.\n\nYou can't imagine ever wanting anything more.\n*goto news_options\n\n*label decide\nYou definitely don't like the idea of disappointing Rebellion, but you're still not sure if you want to be on any team, even one as prestigious as The Millennial Group.\n\nDid working with the team on the Splice mission do anything to change your mind?\n\n*choice\n\t#Yes, I didn't mind the team thing as much as I thought I would.\n\t\t*set soloist %-35\n\t\t*set guard_changemind true\n\t\tYou think back to the sprawling MGHQ and the legendary heroes filling its halls—you're so close to being a part of that. This is the opportunity of a lifetime and you're not about to let it pass you by. You just hope you've done enough to prove yourself.\n\t\t*goto news_options\n\t#No, I always work better solo.\n\t\t*set soloist %+35\n\t\tIt's a great opportunity but you got all of this press because you broke the team rules, not because you followed them.\n\n\t\tYou're going to make it to the top all on your own.\n\t\t*goto news_options\n\n*label redeem\n\"Newcomer ${codename} has certainly burst on to MC's hero scene in the past few weeks. First widely known for sabotaging the Gravitas case and suspected of the original Splice Circle murders, ${codename} was at the top of the heroic black list.\n\n\"However, after ${codename} stepped up to play a key role in shutting down The Splice Circle, the MCPD has cleared ${codename} of all charges. And with rumors circulating of a steamy potential romance with heartthrob Black Magic, this hero is definitely one to watch.\n\n\"But it still remains to be seen whether ${codename} is a true hero or just a hack on an unprecedented lucky streak….\"\n\nYou watch the 3V, your jaw just about ready to hit the floor. It's certainly a mixed review, but press like that is absolutely invaluable for an aspiring hero. If you keep up the good work, you might even be able to undo the rest of the damage still spotting up your reputation….\n\n*goto news_options\n\n*label congrats\nYou hit the mute button, overwhelmed by what you've just seen. That was…unreal. You were on 3V! Although it's not quite as glamorous as you always imagined it would be all these years, it's definitely a moment to remember.\n\nYou turn to Grandma, who seems just as overwhelmed. She grips you in a monster hug.\n\n\"I always knew you had what it takes,\" Grandma says. \"Now you go get washed up because I'm cooking you the biggest brunch of your life to celebrate!\"\n\nAs Grandma hurries into the kitchen, you make your way back toward your room, still feeling rather dazed.\n\n*page_break\n\nInside your room, MeChip ${chipname} beeps with several alerts. But before you open any of them, ${chipname} appears in your mind, wearing\n*if chip_butler\n\this finest three-piece suit and his favorite top hat.\n\n\t\"Fine showing, young ${sir_mad},\" MeChip ${chipname} says. \"I couldn't possibly be more proud!\"\n\n\t\"Aw, thanks ${chipname},\" you think.\n\n\t\"Yes, and I suppose I'll even forgive you for not introducing me to Processor….\"\n\t*goto sanders_text\n*elseif chip_diva\n\ta floor-length dress covered in flashing, multicolored sequins.\n\n\t\"I like the way you work it, ${firstname},\" MeChip ${chipname} sings. \"No diggity!\"\n\n\t\"Aw, thanks ${chipname},\" you think.\n\n\t\"I'm so excited, I won't even shade you for not introducing me to that fine piece of machinery, Processor….\"\n\t*goto sanders_text\n*else\n\ta maroon, crushed-velvet gown and clapping with glee. \n\n\t\"Oh, how terribly exciting!\" MeChip ${chipname} coos. \"I'm so gosh darn proud of you!\"\n\n\t\"Aw, thanks ${chipname},\" you think.\n\n\t\"I've even forgotten all about the fact that you didn't introduce me to Processor….\"\n\t*goto sanders_text\n\n*label sanders_text\n\n\"Next time, I promise,\" you think, just hoping that there will be a next time.\n\n*if sanders\n\tMoving on, you open the alerts and first find a text from Officer Sanders. It reads:\n\n\t\"Job well done. I knew there was something special about you.\"\n\n\tYou smile—it's really fantastic to have someone like Officer Sanders on your side. It's definitely going to be a good thing for your career, moving forward….\n\n\t*page_break\n\n\tNext, you open a MeCard sent to your ${codename} account from\n\t*goto ecard\n*else\n\tMoving on, you open the alerts and are greeted by a MeCard sent to your ${codename} account from\n\t*goto ecard\n\n*label ecard\n*if guard\n\tthree teenage sisters. Slugger, you think—it's the Molten Ladies!\n\n\t\"We just wanted to thank you for saving us from Madame Vice,\" they say, waving at you from the holographic card. \"We only hope we can repay you one day.\"\n\n\tYou immediately save the MeCard to your HeroSpace ${codename} page. You don't even want to think about what those poor girls must have gone through. With all the heinous crimes attributed to The Splice Circle, Madame Vice's recruitment methods were mostly overlooked….\n\n\tSuddenly, her murder seems far less tragic.\n\t*goto just_fame\n*else\n\tStatic, who appears to be fully healed after his ordeal with The Splice Circle. His short dreadlocks are the only thing showing from under his all-black costume, which is covered in dozens of technological enhancements and weapons.\n\n\t\"I can't thank you enough for rescuing me and helping to shut down the Circle,\" he says, waving at you from the holographic card. \"If you ever need anything, don't hesitate to ask. We Fringes heroes have to stick together, after all.\"\n\n\tYou immediately save the MeCard to your HeroSpace ${codename} page. In all the craziness, you almost forgot that you were the one to save Static from Lolli after Black Magic and Processor went down.\n\t*goto just_fame\n\n*label just_fame\n*page_break\n\nThinking back, you really can't believe how well things went. You did some real good and boosted your heroic reputation at the same time.\n\nBut what do you consider your greatest accomplishment from the night?\n\n*choice\n\t#The lives I saved while fighting The Splice Circle.\n\t\t*set fame %-20\n\t\t*goto check\n\t#Salvaging my heroic reputation and reaching a new level of notoriety.\n\t\t*set fame %+20\n\t\t*goto check\n\t#Improving conditions in The Eastern Fringes by shutting down the Circle's operations.\n\t\t*set fame %-20\n\t\t*goto check\n\t#The prestige of working with an A-list team like The Millennial Group.\n\t\t*set fame %+20\n\t\t*goto check\n\t#The opportunity to learn from Legendary heroes.\n\t\t*set fame %-20\n\t\t*goto check\n\n*label check\nAs you continue to scroll through your alerts, you find you have to sit down as you open the next one: a paycheck from The Millennial Group.\n\n\"Enclosed is a MeCheck for your work with The Millennial Group.\"\n\n*if guard\n\tYou look over the check, which is listed with the standard day rate for reserve members: $2,000.\n\n\tYour eyes nearly fall out of your head—not only is that more money than you have in your bank account right now, but it also means that even the lowest-level Group members make half a million dollars a year. That's…insane.\n\t*set money +2000\n\t*goto money_bonus\n*else\n\tYou look over the check, which is listed with the standard work-for-hire rate for approved mission assists: $1,000.\n\n\tThat's quite a bit of money for one mission—you can't even begin to imagine what actual Group members must get paid…. \n\t*set money +1000\n\t*goto money_bonus\n\n*label money_bonus\n\n*if (legend > 15)\n\tThen you nearly faint as you read the bottom of the MeCheck:\n\n\t\"Additionally, you have received a Legend bonus of $2,000.\"\n\n\tYou had heard certain Powered teams gave mission bonuses based on Legend Levels, but you always thought that was just a myth….\n\t*set money +2000\n\t*goto license\n*else\n\t*goto license\n\n*label license\n\nThen another thought occurs to you—after last night, your Legend Level must have gone up!\n\n*page_break\n*set legend +10\n\nAfter pressing the \"Deposit\" button on the MeCheck, you open your heroic license and check your Legend Level, which has risen to ${legend}.\n\nIt looks like your Legend has gotten quite a boost as word of your recent success spread.\n*if power_eleven\n\tEven better, it appears you got an extra boost for finishing the mission with such a high Power Level remaining.\n\t*goto double\n*else\n\t*goto health_boost\n\n*label double\n*if health_eleven\n\tAnd an additional boost for finishing with a high Health Level, as well!\n\t*goto amazing\n*else\n\t*goto amazing\n\n*label health_boost\n*if health_eleven\n\tEven better, it appears you got an extra boost for finishing the mission with such a Health Level remaining.\n\t*goto amazing\n*else\n\t*goto amazing\n\n*label amazing\n\nEcstatic, you click the link to the Hero Legend Meter website to see how you're doing:\n\n*if (legend > 29)\n\tFor this point in your career, your Legend Level is above average. Congratulations on making excellent heroic decisions thus far! Keep up the good work.\n\t*goto bonustime\n*elseif (legend > 19) and (legend \u003c 30)\n\tFor this point in your career, your Legend Level is about average. You've made some good heroic decisions but there's definitely room for improvement.\n\t*goto bonustime\n*else\n\tFor this point in your career, your Legend Level is below average. Despite your Legend rise, it looks like you could still stand to make some smarter heroic decisions….\n\t*goto bonustime\n\n*label bonustime\n\n*if (legend > 29)\n\t*goto costume_bonus\n*else\n\t*goto surprise\n\n*label costume_bonus\n*page_break\n-- LEGEND PRIZE UNLOCKED --\n\nAs a bonus for maintaining one of the highest possible Legend Levels at this point, you can choose to purchase another costume upgrade. You currently have $${money}.\n\n*if fly_blast\n\t*choice\n\t\t#Thin tubes that collect and channel excess energy for shielding purposes. ($700) \n\t\t\tThis defensively-suited upgrade allows you to generate shields at half the Power Cost.\n\t\t\t*set money -700\n\t\t\t*set energy_shield true\n\t\t\t*set costume_tubes true\n\t\t\t*set costume_three true\n\t\t\t*goto surprise\n\t\t#No thanks, I want to save my money.\n\t\t\t*goto surprise\n*elseif fly_shield\n\t*choice\n\t\t#Large, metal wristbands that store energy for blasting. ($500)\n\t\t\tThis offensively-suited upgrade allows you to create blasts at half the Power Cost.\n\t\t\t*set money -500\n\t\t\t*set energy_blast true\n\t\t\t*set costume_wristbands true\n\t\t\t*set costume_three true\n\t\t\t*goto surprise\n\t\t#No thanks, I want to save my money.\n\t\t\t*goto surprise\n*elseif blast_shield\n\t*choice\n\t\t#A rocket-backpack to channel excess energy and add propulsion to your flying. ($300)\n\t\t\tThis upgrade allows you to fly at normal speeds without lowering your Power Level.\n\t\t\t*set money -300\n\t\t\t*set fly_upgrade true\n\t\t\t*set costume_rocket true\n\t\t\t*set costume_three true\n\t\t\t*goto surprise\n\t\t#No thanks, I want to save my money.\n\t\t\t*goto surprise\n*else\n\t*goto one_upgrade\n\n*label one_upgrade\n\n*if fly_upgrade\n\t*choice\n\t\t#Large, metal wristbands that store energy for blasting. ($500)\n\t\t\tThis offensively-suited upgrade allows you to create blasts at half the Power Cost.\n\t\t\t*set money -500\n\t\t\t*set energy_blast true\n\t\t\t*set costume_wristbands true\n\t\t\t*set fly_blast true\n\t\t\t*goto surprise\n\t\t#Thin tubes that collect and channel excess energy for shielding purposes. ($700) \n\t\t\tThis defensively-suited upgrade allows you to generate shields at half the Power Cost.\n\t\t\t*set money -700\n\t\t\t*set energy_shield true\n\t\t\t*set costume_tubes true\n\t\t\t*set fly_shield true\n\t\t\t*goto surprise\n\t\t#No thanks, I want to save my money.\n\t\t\t*goto surprise\n*elseif energy_blast\n\t*choice\n\t\t#Thin tubes that collect and channel excess energy for shielding purposes. ($700) \n\t\t\tThis defensively-suited upgrade allows you to generate shields at half the Power Cost.\n\t\t\t*set money -700\n\t\t\t*set energy_shield true\n\t\t\t*set costume_tubes true\n\t\t\t*set fly_shield true\n\t\t\t*goto surprise\n\t\t#A rocket-backpack to channel excess energy and add propulsion to your flying. ($300)\n\t\t\tThis upgrade allows you to fly at normal speeds without lowering your Power Level.\n\t\t\t*set money -300\n\t\t\t*set fly_upgrade true\n\t\t\t*set costume_rocket true\n\t\t\t*set fly_blast true\n\t\t\t*goto surprise\n\t\t#No thanks, I want to save my money.\n\t\t\t*goto surprise\n*else\n\t*choice\n\t\t#Large, metal wristbands that store energy for blasting. ($500)\n\t\t\tThis offensively-suited upgrade allows you to create blasts at half the Power Cost.\n\t\t\t*set money -500\n\t\t\t*set energy_blast true\n\t\t\t*set costume_wristbands true\n\t\t\t*set blast_shield true\n\t\t\t*goto surprise\n\t\t#A rocket-backpack to channel excess energy and add propulsion to your flying. ($300)\n\t\t\tThis upgrade allows you to fly at normal speeds without lowering your Power Level.\n\t\t\t*set money -300\n\t\t\t*set fly_upgrade true\n\t\t\t*set costume_rocket true\n\t\t\t*set fly_shield true\n\t\t\t*goto surprise\n\t\t#No thanks, I want to save my money.\n\t\t\t*goto surprise\n\n*label surprise\n*page_break\n\nAfter throwing on some clothes, you make your way back to the kitchen, ready to reward yourself with an unhealthy amount of food. As you enter the kitchen, you're quite stunned to hear three voices shout, \"Surprise!\"\n\nSitting in front of a massive, meaty brunch feast are Grandma, Jenny, and ${sidekick}, the shimmer tree shaking loose behind them.\n\nYou smile, happy to see your little, makeshift family gathered here on such a happy day.\n\nUntil you realize that, thanks to Grandma, ${sidekick} now knows your secret identity!\n\n*if tarana_hate\n\tYou never wanted to see Tarana Rain again and now she's in your kitchen. Fantastic.\n\t*goto sk_response\n*else\n\t*goto sk_response\n\n*label sk_response\n*choice\n\t*selectable_if (rlshp_sk > 40) #It's not ideal but you do want ${sidekick} to be a part of your life.\n\t\t*goto doesnt_matter\n\t*selectable_if (rlshp_sk \u003c 60) #What on earth was Grandma thinking?\n\t\t*set rlshp_sk %-15\n\t\t*set legend +1\n\t\t\"Grandma, can I have a word?\" you ask, trying to fight a frown.\n\n\t\t\"Oh, ${firstname},\" Grandma says, wiping her hands on her apron. \"${sidekick} is our guest and I trust ${skhir} completely. After all, ${skze} saved your life. And we've had a nice long chat about the importance of keeping your secret identity, haven't we?\"\n\n\t\t*if sparrow\n\t\t\tSparrow nods, making sure to keep her head down as much as possible. Oh well, you think, there's nothing you can do about it now. Besides, Sparrow could probably use the social experience….\n\t\t\t*goto stuffed\n\t\t*elseif pressie\n\t\t\t\"Yes indeed, Ms. Sterling,\" Pressie says, beaming. \"We spent all of this morning talking about soil techniques. Your Grandma knows quite a bit about sodden matters!\"\n\n\t\t\tPressie laughs loudly and even though you're still not pleased, it's probably not the worst thing in the world for Grandma and Pressie to be friends. They both are in desperate need of one, after all….\n\t\t\t*goto stuffed\n\t\t*else\n\t\t\t\"Oh, yes we have,\" Tarana Rain says in the most polite voice. \"I'm very good at keeping secrets.\"\n\n\t\t\tTarana Rain winks at you and your hands curl into fists. What the slugger was Grandma thinking, inviting this brat into your home? You plan on having quite the word with her later….\n\t\t\t*goto stuffed\n\t#I guess it doesn't really matter that much.\n\t\t*label doesnt_matter\n\t\t*set rlshp_sk %+15\n\t\t*set rlshp_family %+5\n\t\t\"Don't worry,\" Grandma says, reading the expression on your face, \"${sidekick} is our guest and I trust ${skhir} completely. After all, ${skze} saved your life. And we've had a nice long chat about the importance of keeping your secret identity, haven't we?\"\n\n\t\t*if sparrow\n\t\t\tSparrow simply nods, making sure to keep her head down as much as possible.\n\n\t\t\tThis is just as well, you suppose. Besides, Sparrow could definitely use the social experience….\n\t\t\t*goto stuffed\n\t\t*elseif pressie\n\t\t\t\"Yes indeed, Ms. Sterling,\" Pressie says, beaming. \"We spent all of this morning talking about soil techniques. Your Grandma knows quite a bit about sodden matters!\"\n\n\t\t\tPressie laughs loudly. You sigh, thinking it's probably not the worst thing in the world for Grandma and Pressie to be friends….\n\t\t\t*goto stuffed\n\t\t*else\n\t\t\t\"Oh, yes we have,\" Tarana Rain says in the most polite voice. \"I'm very good at keeping secrets.\"\n\n\t\t\tTarana Rain winks at you and your hands curl into fists. What on earth was Grandma thinking, inviting this brat into your home? You plan on having quite the word with her later….\n\t\t\t*goto stuffed\n\n*label stuffed\n*page_break One Hour Later\n\nAfter consuming more food than you thought humanly possible, Jenny pats you on the back.\n\n\"All right, this was lovely, but
