d kevlar-girl get her hands on something like that? \n\nYou look up at Shed and see people flooding out of the front door as the top half of the building rages with flames. Could it really be that kevlar-girl has done the impossible—did she just take out Smyther and half of The Splice Circle in one attack?\n\nThrough the raging fire, you manage to make out kevlar-girl's shadow leaping onto a rooftop…holding The Gravitas! She must have gone back in after the blast and sifted through the wreckage to recover it, no doubt protected by her shield-movements. You don't know whether to be horrified or impressed—this girl has some serious moxie.\n\nStill, you're not about to let her escape, not after she murdered all those people. And especially not with the one thing that's going to launch your career.\n\n*page_break\n\nYou fly after kevlar-girl but as you reach the roof you find that she isn't fleeing—she's pointing The Gravitas directly at you. Before you can react, you feel the air around you twist with a sucking noise and feel yourself being pulled downward.\n\nYou try to fight it but you can't stop yourself from crashing into the roof. It's like someone suddenly turned your Powers off and a giant, invisible hand is crushing you down.\n\nThen it clicks—The Gravitas must control gravity. No wonder Smyther wanted to get his hands on it. An object that powerful would be useful to anyone, let alone a mob boss with a strictly defensive Power set.\n\n\"Feels nice, huh?\" you hear kevlar-girl say from above you.\n\nBut you don't have the patience for snappy banter—you know this girl won't hesitate to kill you. So what are you going to do?\n\n*set power -5\n*set health -10\n*choice\n\t#Try to cut a deal with her—we're both working toward the same goal here, collecting the reward for recovering The Gravitas.\n\t\t*set offensive %-5\n\t\t\"Listen, I don't know who you are,\" you start, \"but we both want the reward for The Gravitas and we both found it at the same time. Why don't we split the credit and I'll tell the police you killed all those people in self-defense?\"\n\n\t\tIn response, you feel the weight pushing down on you double and hear kevlar-girl start to laugh. \n\n\t\t\"Is that what you think I want, ${codename}?\"\n\t\t*goto destroy\n\t#Threaten her—she may have the upper hand now, but not for long.\n\t\t\"Give me The Gravitas right now and I'll let you go,\" you start, \"or you'll be in jail for a very long time once I hand you over to the police.\"\n\n\t\tIn response, you feel the weight pushing down on you double and hear kevlar-girl start to laugh. \n\n\t\t\"Nice try, ${codename},\" she says, \"but I think I'll take my chances.\"\n\t\t*goto destroy\n\t*selectable_if (power > 7) #Use an energy surge to disarm her. (Power Cost 5)\n\t\t*set offensive %+5\n\t\t*set power -5\n\t\tAnti-gravity may affect your flight Power but it won't affect your energy Power. You let off a quick surge in kevlar-girl's direction, unable to turn your head to see if you've hit her.\n\n\t\tBut as you feel the weight pushing down on you double, you realize that you must have missed….\n\n\t\t\"Nice try, ${codename},\" she says, \"but you'll have to do better than that.\"\n\t\t*goto destroy \n\n*label destroy\n*set health -10\n\n*if (health = 0)\n\t*page_break\n\tYou groan under the weight of The Gravitas push, but then you start to scream as you feel two of your ribs crack. The pain only intensifies as another couple of ribs shatter, puncturing your lungs.\n\n\tYou gasp for air, realizing that your Health Level has dropped to 0 and your body can't handle the pressure of The Gravitas. \n\n\tFeeling your skull begin to compress in a series of snaps, you start to black out. Looks like your heroic career has ended before it ever really had a chance to begin. Your final thoughts are of Grandma and your parents….\n\n\tFor you've truly let them down.\n\n\t*choice\n\t\t#Return to the last choice I made in this chapter. (Legend Cost 20)\n\t\t\tYour Power and Health Levels have been restored to full, but your Legend Level will probably never recover from this drop….\n\n\t\t\tLegendary heroes don't die, ${firstname}. You had better make better decisions this time around.\n\t\t\t*set power 100\n\t\t\t*set health 100\n\t\t\t*set legend -20\n\t\t\t*page_break\n\t\t\tWhat's your next move?\n\t\t\t*goto destroyed\n\t\t#Start the experience over from the very beginning.\n\t\t\tBetter luck next time, hero! \n\t\t\t*ending\n\n*else\n\t*goto destroyed\n\n*label destroyed\nYou groan under the weight of The Gravitas push, knowing kevlar-girl is about to kill you, just like all those Splice Circle members. As your ribs start to creak under the pressure, you hear police sirens blaring from the street below. You've never been so happy to hear that sound!\n\nSuddenly, you feel the weight lifted off your shoulders and you spring to your feet, just in time to see kevlar-girl strapping a layer of plastic explosives to The Gravitas.\n\n\"Wait, stop! What are you—\" you start, moving forward.\n\nBut kevlar-girl just pulls away from you and holds The Gravitas out in front of her body.\n\n\"The name is Prodigal, chicken,\" she says. \"And you'll be seeing me again.\"\n\nWithout another word, the girl named Prodigal drops The Gravitas.\n\n*page_break\n\nHorrified, you watch as The Gravitas explodes at Prodigal's feet. A plume of silver smoke erupts into the sky as shards of shattered gemstones go flying in every direction. You step back, covering your eyes to protect them from the explosion.\n\nAnd when the smoke finally clears, you find that Prodigal has vanished. Only The Gravitas remains in charred pieces, destroyed beyond repair.\n\nNo! Why would she destroy The Gravitas? Now it's of no use to anyone. It doesn't make any sense!\n\nThen another thought hits you—before she left, Prodigal called you ${codename}. She knows your codename! But how? You've only been on the hero scene for a few hours. How would she know…?\n\nYou hear the sound of police choppers swooping overhead, so you don't have much time to ponder this question. What are you going to do?\n\n*choice\n\t*if (sanders) #Try to find my contact from the Trackr arrest, Officer Sanders.\n\t\t*set lawless %-25\n\t\t*goto sanders_talk\n\t#Explain the situation to the police.\n\t\t*set lawless %-25\n\t\t*if sanders\n\t\t\t*goto sanders_talk\n\t\t*else\n\t\t\tYou're about to wave down a police chopper when suddenly, every nerve in your body screams at you to stop. Think for a second….\n\t\t\t*goto flee\n\t#Flee the scene before anyone sees me.\n\t\t*set lawless %+25\n\t\t*if sanders\n\t\t\tYou're about to take off but then you think of Officer Sanders—he stuck his neck out for you earlier. Fleeing now would really screw him over. Do you want to ruin your relationship with him?\n\t\t\t*choice\n\t\t\t\t#I owe it to Officer Sanders to let him know what really happened here. Keeping him as a good contact is important.\n\t\t\t\t\t*goto sanders_talk\n\t\t\t\t#Officer Sanders won't be able to help me, I've got to escape—even if it ruins our relationship.\n\t\t\t\t\t*set moralbonus false\n\t\t\t\t\t*set sanders false\n\t\t\t\t\t*goto flee\n\t\t*else\n\t\t\t*goto flee\n\n*label sanders_talk\n\n\"All right, here's what you're going to do,\" Officer Sanders says quickly.\n\nWhen the police arrived, you ducked out of sight. Not trusting anyone else to believe your story, you waited to see if Officer Sanders would show. Once he did, you managed to pull him into a back alley unseen (with the help of some mega fast flying).\n\nYou've just finished explaining everything that happened—and Officer Sanders does not look happy.\n\n*set power -7\n\n\"I'll tell you what you're going to do,\" Officer Sanders starts, \"you're going to get the hell out of here. Right now.\"\n\n\"What?\" you ask. \"Don't you need to take my statement or-\"\n\n\"I believe your story, ${codename}. But with a case this big ruined, not to mention over a dozen murders involving The Splice Circle committed, no one else is going to care. They're just going to want a scapegoat. And that will be you.\"\n\n\"But it was Prodigal!\" you start. \"She's the one who-\"\n\n\"Don't be stupid,\" Officer Sanders growls. \"You're going to get blamed for all of this, one way or another. I'll try to vouch for you but the best thing I can do for you is pretend I never saw you here.\"\n*achieve sanders\n\nAs much as you don't want to believe what Officer Sanders is saying, you know he's right. This whole debacle is going to make the MCPD look really bad and it'll lessen the blow if they have a rookie hero to pin it all on…which brings one major question to your mind.\n\n\"Why are you doing this for me?\" you ask. \"Arresting me would only be a good thing for you….\"\n\nOfficer Sanders stares you down, probably wondering the same thing himself.\n\n*page_break\n\nThen he just shakes his head and walks out of the alley.\n\n\"Let's just say I have a soft spot for emerging heroes. Now disappear and lie low for a while—I think things are about to get very rough for you.\"\n*goto home\n\n*label flee\n\nWith a case this big ruined, not to mention over a dozen murders involving The Splice Circle committed, no one in the MCPD is going to care whether you're innocent or not. This whole debacle is going to make the police look terrible and they're just going to want a scapegoat to pin it all on.\n\nAnd if you stay, that scapegoat will be you, considering that with Prodigal gone, you're currently the only one standing next to the destroyed Gravitas and a building full of dead mobsters.\n\n*set fugitive true\n*goto home\n\n*label home\n*page_break\n\nYou fly toward home, your mind racing with questions. What will happen to your reputation now that The Gravitas is destroyed? Will the police blame everything on you? Will you become a fugitive?\n\nThen your thoughts spin completely out of control. Will Jury and Madame Vice be gunning for you after what you did to them? Even worse, will the remnants of The Splice Circle be out for revenge? And who is this mysterious Prodigal, the girl who sabotaged your first mission? Why didn't she kill you when she had the chance?\n\nYou're too exhausted to even begin to contemplate the answers to these questions. You've pushed your Powers to their limit and have taken more than a few hits tonight.\n\n*if (power \u003c 25)\n\tYou glance down at your MeChip and open the Show Stats button to find that your Power Level has dropped dangerously low, to ${power}.\n\t*if (health \u003c 25)\n\t\tEven worse, your Health Level has dropped to ${health}. If you'd exerted much more Power or lost more Health, you definitely would have died….\n\t\t*goto all_think\n\t*else\n\t\tIf you'd exerted much more Power, you would have died….\n\t\t*goto all_think\n*elseif (health \u003c 25)\n\tYou glance down at your MeChip and open the Show Stats button to find that your Health Level has dropped dangerously low, to ${health}. If you had lost much more Health, you would have died….\n\t*goto all_think\n*else\n\t*goto all_think\n\n*label all_think\n\nBut all you can think about right now is getting home to your bed, knowing that Grandma will help you sort it all out in the morning.\n\n*if fly_upgrade\n\t*goto home_time\n*else\n\t*set power -2\n\t*goto home_time\n\n*label home_time\n*page_break Fifteen Minutes Later\n\nIt isn't long before you see your bedroom window waiting for you invitingly. Thinking you might collapse before you can reach it, you give one final push to land inside.\n\nAll you want to do is get in bed immediately, but you need to let Grandma know that you're all right. Your muscles aching, you move slowly toward the door.\n\n\"Gran, it's me,\" you shout. \"I'm all right, but I'm—\"\n\n\"Well, look who it is,\" you hear a familiar voice say, stopping you in your tracks.\n\nSitting in your living room is none other than…\n\n*page_break\n\n…Mayor Victon.\n\nAnd he does not look pleased.\n\n*finish Next Chapter: Victonian Visions\n\n*label end_trial\n*check_purchase adfree\n*if not(choice_is_steam or choice_randomtest) or (((choice_is_web or choice_is_omnibus_app) or choice_purchased_adfree) or not(choice_purchase_supported))\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first five chapters are available for free? This is the end of the free content.\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2025-06-12 $4.99 $2.99 purchased\n*abort\n", "prodigy": "*comment é\n\n*image title.png center Heroes Rise: The Prodigy\n\nBy\n*line_break\n*link https://zacharysergi.com/ Zachary Sergi\n\n*page_break\n\n*text_image part_one.png center Part One: Legend Had It\n\n*text_image chap_1.png center Chapter 1: Homeward Bound\n\nA helicopter blade slices through the air inches away from your face, filling your nostrils with the smell of burning metal. You don't have time to process this, however, as a ball of flame unfurls in your direction.\n\nYou leap onto a neighboring rooftop and tumble around a smoldering chunk of engine. Today was supposed to be your day off, but when you saw a news chopper careening out of control above the city, you couldn't just stand by like a common pedestrian.\n\nAs you pull clear of the wreckage, you see that the ejected pilot floats high above the rooftops from a parachute—one that is crawling with licks of flame. It won't be long before the parachute burns through and the pilot drops hundreds of stories to his death…\n\nSo, how are you going to save him?\n\n*choice\n  #Rip up the cables that run along the roof and use them to lasso the pilot down.\n    You reach down to pull the cables off the roof, not noticing the \"Danger: High Voltage\" sign on a nearby ledge. You tug on the cables and scream as electricity rips through you like a thousand needles.\n    *goto tester\n  #Use the zip-cord from your wrist holster to reel in the pilot.\n    You jump onto the ledge and use your finger to trigger the zip-cord. It shoots from the top of your wrist, with a magnetized tip set to latch on to the pilot's metal seat.\n\n    Your shot lands perfectly. Then, with great care, you begin to retract the zip-cord, pulling the pilot safely onto the roof beside you.\n    *goto tester\n  #Forget the pilot—he'll be able to steer himself onto one of the rooftops. It's much more important to stop the burning wreckage from falling to the busy streets below.\n    You spin around and see the severed tail of the helicopter teetering on a ledge. You rush back across the roof to stop it from falling, completely forgetting about the chunk of fuel-soaked engine that you dodged before.\n\n    As you approach the helicopter tail, an explosion rocks the engine. A blast of heat hits you full-force, searing the skin from your bones.\n    *goto tester\n\n*label tester\n*page_break\n\nAs your vision fades to black, you remove the virtual reality helmet and end your 3D gaming experience. You blink several times to adjust to the sunlight in the room, which pours in through sleek glass windows. Then you look across the conference table at a buttoned-up executive eyeing you.\n\n\"So, what do you think? They really ramped up the graphics, right?\" she blurts out. \"Oh, don't spoil the surprise—take the game home for your full report. You can collect your advance from the front desk on your way out. Thanks, as always, um…\"\n\nYou are Virtuous Reality's best game tester, but this executive still doesn't know your name. You force a smile and remind her that you are named:\n\n*choice\n  #\"Kyle.\"\n    *set firstname \"Kyle\"\n    *goto exit\n  #\"Gino.\"\n    *set firstname \"Gino\"\n    *goto exit\n  #\"Stephen.\"\n    *set firstname \"Stephen\"\n    *goto exit\n  #\"Shane.\"\n    *set firstname \"Shane\"\n    *goto exit\n  #\"Aurelia.\"\n    *set firstname \"Aurelia\"\n    *goto exit\n  #\"Morgan.\"\n    *set firstname \"Morgan\"\n    *goto exit\n  #\"Ariel.\"\n    *set firstname \"Ariel\"\n    *goto exit\n  #\"Julia.\"\n    *set firstname \"Julia\"\n    *goto exit\n  #\"Chelsea.\"\n    *set firstname \"Chelsea\"\n    *goto exit\n  #\"Sam.\"\n    *set firstname \"Sam\"\n    *goto exit\n  #I'd rather create my own first name.\n    Your first name is:\n    *input_text firstname\n    *goto exit\n\n*label exit\n\n\"Right, ${firstname}. Always a pleasure.\"\n\nThe executive then strides out the door—no doubt on her way to a more important meeting. So you walk toward the front desk alone, thinking that you'd much rather be out there saving real helicopter crashes than testing fake ones. But hey, at least it pays the bills.\n\nThough not very well, you think as you accept a deposit for $100 at the front desk.\n\n*set money +100\nAdding this amount to your bank account brings you to a grand total of $${money}. Not exactly rolling in dough, are you?\n\n*page_break\n\nYou push all thoughts of money from your mind as you exit into the bustling streets of Millennia City. Nestled on America's west coast between Los Angeles and San Francisco, Millennia City is the shining beacon of twenty-second-century progress—not to mention the city you've called home for your entire life.\n\nYou step into the crowd next to a woman whose skin is covered in fishy scales, each one reflecting a different color. You suppose this might surprise some people, but not you. NYC has finance, LA has entertainment, and DC has politics, but MC has heroes—it's the Powered capitol of the country.\n\nA fact you're reminded of as a sonic boom pulses through the air. You look up to see twin blondes rocketing across the sky, a cloud of smoke left in their wake. You sigh, knowing that you belong up there with the Legends instead of down here with the masses.\n\nThese days, one out of every three people is born with Powered abilities and pretty much every one of them wants to be a hero. Especially now that Powered Heroes have eclipsed movie stars and music icons to set the standard for A-list celebrity.\n\nYou'd also love to be flying home right now, considering that you have the Power to fly. However, after one too many gruesome midair collisions, the Department for the Regulation of Powered Resources (DRPR) designated the skies for government-licensed travelers only.\n\nSo flying is definitely off-limits for you…but do you let that stop you?\n\n*choice\n  #Absolutely—heroes are meant to enforce the law, not break it.\n    *set lawless %-15\n    *goto metro\n  #Of course not—I was born to fly, no matter what the law says.\n    *set lawless %+15\n    *goto fly_home\n\n*label metro\nBreaking the law now will only hinder your heroic rise later, so you know you'll just have to be patient—extremely patient, considering that if you were a big-time hero, you could be flying home in a fraction of the time.\n\nAs you walk down to the Metro-Way platform, you pay for the ticket by rolling up your sleeve and accessing your MeChip, a bit of personal tablet technology embedded in the underside of your wrist. Not too long ago people used paper slips to pay for things and little plastic devices for phones, but that was before all communication, identification, entertainment, and banking functions became standard in MeChips. \n\nEach MeChip comes fully customizable, with robotic personality programming that adapts to your habits and desires. There are three standard templates available for the robotic personality, so you decided to go with the:\n\n*choice\n  #Polite Butler.\n    *set chip_butler true\n    *set chipze \"he\"\n    *set chiphir \"him\"\n    *set chiphis \"his\"\n    You then decided to name your MeChip Butler:\n    *choice\n      #Algernon.\n        *set chipname \"Algernon\"\n        *goto butler\n      #Winston.\n        *set chipname \"Winston\"\n        *goto butler\n      #Jeeves.\n        *set chipname \"Jeeves\"\n        *goto butler\n      #Barcia.\n        *set chipname \"Barcia\"\n        *goto butler\n      #Create your own name.\n        *input_text chipname\n        *goto butler\n  #Sassy Diva.\n    *set chip_diva true\n    You then decided to name your MeChip Diva:\n    *choice\n      #Aretha.\n        *set chipname \"Aretha\"\n        *goto diva\n      #Whitney.\n        *set chipname \"Whitney\"\n        *goto diva\n      #Halleloo.\n        *set chipname \"Halleloo\"\n        *goto diva\n      #LaClarkson.\n        *set chipname \"LaClarkson\"\n        *goto diva\n      #Create your own name.\n        *input_text chipname\n        *goto diva\n  #Supportive Caretaker.\n    *set chip_care true\n    You then decided to name your MeChip Caretaker:\n    *choice\n      #Bertha.\n        *set chipname \"Bertha\"\n        *goto care\n      #Alice.\n        *set chipname \"Alice\"\n        *goto care\n      #Poppy.\n        *set chipname \"Poppy\"\n        *goto care\n      #Fernan.\n        *set chipname \"Fernan\"\n        *goto care\n      #Create your own name.\n        *input_text chipname\n        *goto care\n\n*label butler\n\"Your ticket is paid for,\" MeChip ${chipname} says inside your head, with a slight British accent.\n\nAll MeChip functions are connected directly to your senses, so ${chipname} floats in front of your eyes thanks to holographic imaging wired to your retinas. Only you are able to see MeChip ${chipname}, who appears as a slender gentleman wearing a full tuxedo.\n\n\"Two dollars deducted from your account. Please enjoy your travels,\" ${chipname} says before fading away.\n*goto pricing\n\n*label diva\n\"Your ticket is paid for, sugar,\" MeChip ${chipname} says inside your head, sounding snappy.\n\nAll MeChip functions are connected directly to your senses, so ${chipname} floats in front of your eyes thanks to holographic imaging wired to your retinas. Only you are able to see MeChip ${chipname}, who appears as a drag queen wearing roller skates.\n\n\"I transferred two dollars from your account, so you best enjoy the ride, m'kay?\" ${chipname} says before fading away.\n*goto pricing\n\n*label care\n\"I have paid for your ticket, ${firstname},\" MeChip ${chipname} says inside your head in a soothing voice.\n\nAll MeChip functions are connected directly to your senses, so ${chipname} floats in front of your eyes thanks to holographic imaging wired to your retinas. Only you are able to see MeChip ${chipname}, who appears as a girthy woman wearing an apron.\n\n\"It cost two dollars. Have a very pleasant journey,\" ${chipname} says before fading away.\n*goto pricing\n\n*label pricing\n*set money -2\n\nWaiting on the platform, you spot an old-fashioned newsstand and decide to reward your flying-restraint with a gossip MeZine. Usually you try to get your hero news from more credible sources, but you secretly love the trashy magazines.\n\nSo you skim the screen that runs across the newsstand, looking over the digital covers displayed. You then wave your MeChip, aiming to purchase…\n\n*choice\n  #Hero People ($3)\n    That was an easy choice, since your favorite hero, Rebellion, is on the cover. Rebellion has been the leader of MC's premier Powered team, The Millennial Group, for years.\n\n    In this issue of Hero People, Rebellion is giving an interview on the Group's latest roster change.\n    *set money -3\n    *goto arrive\n  #The Dirt Rag ($1)\n    Specializing in the comings and goings of famous Powered villains, most of the articles in The Dirt Rag are pure fiction. Occasionally though, the Rag does have some credible leads for aspiring heroes like yourself.\n    *set money -1\n    *goto arrive\n  #Capes and Cowls ($5)\n    Capes and Cowls is the premier hero-fashion MeZine, currently featuring a special on recent trends in hero bootwear. Of course, Heela is on the cover, modeling ankle boots that show off her sinewy mega-calves.\n    *set money -5\n    *goto arrive\n\n*label arrive\n*page_break Thirty Minutes Later\n\nYou finally emerge from the Metro-Way in your neighborhood: MC's Eastern Fringes, \n*goto deed\n\n*label fly_home\n*set fly_home true\n\nWhy on earth would you take the Metro-Way when you could be careening through the air, cutting your trip to a fraction of the time? Sure, the cost of transportation has grown insanely cheap since the Bigsur fusion plant was constructed and the economist Maria Prisco calculated the cure for inflation. But that doesn't stop the Metro-Way from taking forever during rush hour.\n\nEven though it would be very bad to get caught flying illegally, you've been soaring around MC ever since you could crawl-fly, so you know all the best routes to keep yourself hidden from view. Stepping into a deserted alley, you leap into the air and tense your muscles to kick-start your flight Powers.\n\nMost people think flying feels like floating, but you know it really feels more like swimming—it takes a lot of muscle control and endurance. Luckily, you've been training for years, the way a runner trains for a marathon, so you can fly today without much trouble. You pull upward, feeling gravity work with you instead of against you.\n\nKeeping close to the cover of the rooftops, you begin to weave your way home, cruising in and out of clearings with missile precision.\n\nAnd when a helicopter buzzes its way through the sky above you, you can't help but smile.\n\n*set power -2\n*page_break Five Minutes Later\n\nYou drop down to the street as you enter your neighborhood: MC's Eastern Fringes, \n*goto deed\n\n*label deed\nwhich consist mostly of public housing projects, pawnshops, and liquor marts. Despite its lack of charm, the Fringes are still home, so you start to relax as you approach your apartment building.\n\nA loud crunch of glass snaps your senses to attention. Half a block up you spot a body that has been thrown through the windshield of a car. A teenage boy with writhing snakes coiled around his outstretched arms stands on the sidewalk nearby.\n\nBefore you can even blink, the body in the windshield leaps into the sky. It's another teenage boy whose woolly knees bend backward, like a goat's.\n\nSlugger, you curse to yourself—another animal gang fight. The Eastern Fringes are home to a large portion of the animalistic Powered population, widely known to have the most interspecies tension. There's an especially fierce feud between two local Ani-gangs, The Cloven and The Scales.\n\nAs goat-boy bounds through the air, snake-boy reacts. His arm-snakes surge forward, straightening their impossibly long bodies and clamping on to goat-boy's thighs with their teeth. Snake-boy then whips his arms back, using the snakes as levers to smash goat-boy into the pavement.\n\nKnowing goat-boy won't be able to survive much more snake-thrashing, you run toward the scene and…\n\n*choice\n  #Jump into the fray, striking hard and fast.\n    *set offensive %+15\n    You're on snake-boy so fast, he doesn't even see you coming.\n\n    In addition to your flight Powers, you also have the ability to generate and wield surges of energy.\n\n    Which Power set do you want to utilize here?\n    *choice\n      #Take snake-boy out with a focused blast of energy. (Power Cost 5)\n        Palms facing outward, you concentrate on activating your energy Powers. You feel a familiar pressure build up in your forearms and with one push, a burst of energy erupts from your hands.\n\n        The blast connects with snake-boy's torso, knocking him into a nearby wall.\n        *set power -5\n        *goto crowd\n      #Fly-tackle snake-boy like a human battering ram. (Power Cost 3)\n        Running at full speed, you jump forward and give yourself a boost with your flight Powers. Rocketing like a bullet, you slam into snake-boy and knock him into a nearby wall.\n        *set power -3\n        *goto crowd\n      #I don't need to use my Powers to end this.\n        Running at full speed, you jump to tackle snake-boy. Before he can defend himself, you shoulder-check snake-boy and knock him into a nearby wall.\n        *goto crowd\n  #Hang back and contain the situation from a distance.\n    *set offensive %-15\n    In addition to your flight Powers, you also have the ability to generate and wield surges of energy.\n\n    Which Power set do you want to utilize here?\n    *choice\n      #Generate an energy wall to separate the teens. (Power Cost 5)\n        Palms facing outward, you concentrate on activating your energy Powers. You feel a familiar pressure build up in your forearms and visualize a wall between the teens.\n\n        With one push, a burst of energy erupts between the fighters, crackling through the arm-snakes. Snake-boy screams, releasing his grip on goat-boy.\n        *set power -5\n        *goto crowd\n      #Fly snake-boy into the sky to detain him. (Power Cost 2)\n        Running at full speed, you jump forward and give yourself a boost with your flight Powers. Rocketing like a bullet, you grab snake-boy under his arms and lift him into the sky.\n\n        Before he can get his bearings, you let go and send snake-boy headlong into a nearby wall.\n        *set power -2\n        *goto crowd\n\n*label crowd\n*page_break\n\nWith snake-boy diverted, you turn your attention back to goat-boy. He's already bounding up the street, bleating curses as he flees. Which is just as well—your only goal here was to stop the teens from killing each other, since getting involved is technically an illegal act of vigilantism.\n\nBefore any Powered individual can start a career as a professional hero, he or she must apply for a Powered Hero License. To lessen the number of applicants, the DRPR makes the process rather lengthy and expensive. You've completed all the paperwork and passed the Power competency tests, but you've been saving up for a while to pay the hefty application fee.\n\nSo, with goat-boy gone and snake-boy neutralized, it's time to leave before you get into any unnecessary trouble.\n\n\"They were at it for almost five minutes and no one did a thing.\"\n\nYou turn around to find a mother and her young daughter standing on the sidewalk, both looking relieved. The mother presses a tissue to the little girl's forehead, against a small cut.\n\n\"They were blocking the door to our building,\" the mother says. \"We tried to run inside but got hit with some debris. These Ani-gang fights have been getting so much worse lately…Anyway, who do I have to thank for stopping them?\"\n\n*choice\n  #Tell her who you are—the neighborhood needs to know you're watching over them, license or no license.\n    *set fame %+15\n    *set tellanimom true\n    \"I'm ${firstname} Sterling,\" you say, shaking her hand. \"Just doing my part to keep the neighborhood safe.\"\n\n    \"Thank you, ${firstname},\" the mother says.\n    *goto home \n  #Stay anonymous—you don't do good deeds like this for the attention, especially since it's not even legal.\n    *set fame %-15\n    \"I'm just doing my part to keep the neighborhood safe,\" you say, shaking her hand.\n\n    \"Well, thank you,\" the mother says.\n    *goto home\n\n*label home\n\n\"Are you a real live Powered Hero?\" the little girl whispers, gazing up at you.\n\n\"Oh, yes they are,\" the mother answers.\n\n\"Just get home safely,\" you say as you continue toward home, not wanting to admit that you aren't a real hero—\n\nAt least not yet.\n\n*page_break\n*set met_family true\n*set rlshp_family 90\n\nWhen you finally walk into your apartment, you're hit with the familiar fragrance of flowers. That's thanks to your grandma, who is also Powered. Her special ability enables her to communicate with plants, so as far back as you can remember, Grandma has filled your home with every kind of flower and foliage imaginable. Your apartment has always felt like a lush greenhouse, and you couldn't imagine it any other way. \n\nYou drop your bag near the door and approach your favorite flower:\n\n*choice\n  #Golda.\n    *set flower \"Golda\"\n    ${flower} is a golden\n    *goto grandma\n  #Bronzina.\n    *set flower \"Bronzina\"\n    ${flower} is a bronze-rusted\n    *goto grandma\n  #Gunne Metallia.\n    *set flower \"Gunne Metallia\"\n    ${flower} is a silver\n    *goto grandma\n\n*label grandma\nrose from a species with metallic foliage that Grandma has spent years breeding. You lean in to get a whiff of the rose, which always smells faintly of caramel—another one of Grandma's unique touches.\n\n\"I'm afraid ${flower} has been especially cross with me today,\" Grandma says, entering the living room. \"I had to de-thorn her this morning and now she feels particularly vulnerable. You know how roses get about their thorns, such a sore point.\"\n\n\"Well, tell ${flower} I think she's still a stunner, thorns or no thorns,\" you say, approaching Grandma. You know Grandma better than anyone, so you'd describe her style as…\n\n*choice\n  #Simple.\n    *set gma_simple true\n    Grandma cares about her appearance, but wears comfortable clothing and keeps her silver-grey hair trimmed short.\n    *goto kiss\n  #Elegant.\n    *set gma_elegant true\n    Grandma always wears her finest blouses, dyes her hair blonde weekly and drips with large jewels and elaborate broaches.\n    *goto kiss\n  #Kooky.\n    *set gma_kooky true\n    Grandma loves plants and isn't afraid to show it. She wears nothing but dresses with floral patterns and plant-themed accessories.\n    *goto kiss\n  #Practical.\n    *set gma_practical true\n    Grandma mostly cares about tending her plants, so she wears overalls with gardening tools in the pockets and keeps her hair tied back at all times.\n    *goto kiss\n\n*label kiss\nYou kiss her hello, then step back and point to the new video game you've brought home.\n\n\"Another whopping Virtuous Reality deposit to add to the pot.\"\n\n\"Every little bit helps, you know that,\" Grandma says. \"Now if only I could teach one of these little darlings to start growing money for leaves…\"\n\n\"If anyone can do it, it's you, Gran,\" you say, walking toward the kitchen. \"What are we having for dinner? I'm starving.\" \n\nBut you stop short as you see the feast laid out on the kitchen table. It appears Grandma has cooked your favorite meal! \n\n\"Happy Birthday,\" she says with a grin, hugging your side.\n\n*page_break One Hour Later\n*set power 100\n\nYou finally push your plate away, your stomach uncomfortably full. You love Grandma's cooking, but it's usually pretty heavy: all meat and bread and pasta, since vegetables tend to scream at Grandma when she tries to eat them.  \n\n\"Well then, now that you've eaten a proper meal I can finally give you your present!\" Grandma says, turning to a shelf above the table where several potted plants sit. Their leafy vines hang down across the wall and create a lush, green curtain.\n\n\"Guadalupe, would you please?\"\n\nAt Grandma's request, the nearest vine swings toward you, an envelope nestled between its lowest leaves. \n\n\"Go ahead, take it,\" Grandma practically squeals. \"I can't wait any longer!\"\n\nKnowing it'd be useless to object, you open the envelope—which is made of silk fabric, never paper—and pull out a card made entirely out of dried rose petals. Grandma never lets anything go to waste, especially not the remains of her best friends.\n\nAnd while this rose-card is especially lovely, you're really stunned by what's inside…\n*page_break\n\nA brand new DRPR-issued Powered Hero License.\n\nFor you.  \n\nYou read the license, double-checking that the information listed really belongs to you.\n\nDEPARTMENT FOR THE REGULATION OF POWERED RESOURCES: HERO LICENSE\n*line_break\nName: ${firstname} Sterling\n*line_break\nGender:\n\nYou identify as:\n\n*choice\n  #Female.\n    *label femalecodingsect\n    *set male false\n    *set genderinputhr \"Female\"\n    *set mr_ms \"Miss\"\n    *set sir_mad \"madame\"\n    *set youze \"she\"\n    *set youhir \"her\"\n    *set youhis \"her\"\n    *goto genderupdatelabe\n  #Male.\n    *goto genderupdatelabe\n  #I was assigned as male at birth, but am truly female.\n    *goto femalecodingsect\n  #I was assigned as female at birth, but am truly male.\n    *goto genderupdatelabe\n  #I was born with intersex characteristics.\n\n    You are at ease with this element of your identity and consider yourself to be:\n\n    *choice\n      #Male.\n        *goto genderupdatelabe\n      #Female.\n        *goto femalecodingsect\n      #Intersex.\n        *set genderinputhr \"Intersex\"\n        *goto pronounchoicehrorig\n      #I don't identify within binary gender categories.\n        *set genderinputhr \"Nonbinary\"\n        *goto pronounchoicehrorig\n      #None of these options suit me, so I'd like to enter my own vocabulary.\n        *goto inyouowngen\n  #I don't identify within binary gender categories.\n    *set genderinputhr \"Nonbinary\"\n\n    *label pronounchoicehrorig\n    *set genderneutralhr true\n    *set male false\n    *set mr_ms \"The\"\n    *set sir_mad \"your grace\"\n\n    Gender is a spectrum with many identities--potentially as many identites as there are people. Language is imperfect thus far at naming all of these identities, but you try your best to find one that fits day to day.\n\n    You've also chosen to identify with these pronouns:\n\n    *choice\n      #Ze and hir.\n        *set youze \"ze\"\n        *set youhir \"hir\"\n        *set youhis \"hir\"\n        *goto genderupdatelabe\n      #They, them, and their.\n        *set youze \"they\"\n        *set youhir \"them\"\n        *set youhis \"their\"\n        *goto genderupdatelabe\n      #Zhe, zhim, and zhir.\n        *set youze \"zhe\"\n        *set youhir \"zhim\"\n        *set youhis \"zhir\"\n        *goto genderupdatelabe\n      #I'm still comfortable using she and her.\n        *set mr_ms \"Miss\"\n        *set sir_mad \"madame\"\n        *set youze \"she\"\n        *set youhir \"her\"\n        *set youhis \"her\"\n        *goto genderupdatelabe\n      #I'm still comfortable using he, him, and his.\n        *set mr_ms \"Mr.\"\n        *set sir_mad \"sir\"\n        *goto genderupdatelabe\n      #I'd like to input my own pronouns.\n        Instead of he, she, or they, I prefer:\n\n        *input_text youze\n\n        Instead of him, her, or them, I prefer:\n\n        *input_text youhir\n\n        Instead of his, her, or their, I prefer:\n\n        *input_text youhis\n        *goto genderupdatelabe\n  #None of these options suit me, so I'd like to enter my own vocabulary.\n    *label inyouowngen\n    You identify as:\n    *input_text genderinputhr\n    *goto pronounchoicehrorig\n\n*label genderupdatelabe\n\nDEPARTMENT FOR THE REGULATION OF POWERED RESOURCES: HERO LICENSE\n*line_break\nName: ${firstname} Sterling\n*line_break\nGender: ${genderinputhr}\n*line_break\nMarital Status: Single\n*line_break\nOrientation:\n\nSince the twenty-first-century political disputes regarding sexual orientation and marriage, the government has required all citizens to declare their orientation along with their marital status. You may think it's a bit of an invasion of privacy, but it was a required field on your application. \n\nSo, you answered that you are attracted to:\n\n*choice\n  #Men.\n    *label men\n    *if male\n      You guess you don't mind too much about the requirement to declare your orientation, however, since it came after the hard-fought legalization of marriage equality.\n      *set male_straight false\n      *goto codename\n    *else\n      *goto codename\n  #Women.\n    *label women\n    *if male\n      *set bmmale false\n      *set bmze \"she\"\n      *set bmhir \"her\"\n      *set bmhis \"her\"\n      *set bmfirst \"Lucia\"\n      *goto codename\n    *else\n      You guess you don't mind too much about the requirement to declare your orientation, however, since it came after the hard-fought legalization of marriage equality.\n      *set female_straight false\n      *set bmmale false\n      *set bmze \"she\"\n      *set bmhir \"her\"\n      *set bmhis \"her\"\n      *set bmfirst \"Lucia\"\n      *goto codename\n  #Everyone and anyone within the gender spectrum—or without.\n    *set bisexual true\n    You're never attracted to just one type, but lately you've been more attracted to:\n    *choice\n      #Someone more male-identified.\n        *goto men\n      #Someone more female-identified.\n        *goto women\n\n*label codename\n\nNext, your code name is:\n\n*choice\n  #Maneuver.\n    *set codename \"Maneuver\"\n    *goto new_life\n  #Rush.\n    *set codename \"Rush\"\n    *goto new_life\n  #Conduit.\n    *set codename \"Conduit\"\n    *goto new_life\n  #Charge.\n    *set codename \"Charge\"\n    *goto new_life\n  #SFX.\n    *set codename \"SFX\"\n    *goto new_life\n  #I'd rather create my own code name.\n    *input_text codename\n    *goto new_life\n\n*label new_life\n\nDEPARTMENT FOR THE REGULATION OF POWERED RESOURCES: HERO LICENSE\n*line_break\nName: ${firstname} Sterling\n*line_break\nGender: ${genderinputhr}\n*line_break\nMarital Status: Single\n*line_break\nOrientation:\n*if bisexual\n  Pansexual\n  *goto cd\n*else\n  *if male\n    *if male_straight\n      Attracted To Women\n      *goto cd\n    *else\n      Attracted To Men\n      *goto cd\n  *else\n    *if female_straight\n      Attracted To Men\n      *goto cd\n    *else\n      Attracted To Women\n      *goto cd\n*label cd\n*line_break\nCode name: ${codename}\n\nYou stare down in disbelief at the license—Grandma has just given you the best birthday present. Ever.\n\n\"How…?\" you start to ask, not sure where to begin. \n\n\"Someone just needed to pay the outstanding bill on your application,\" Grandma says, beaming. \n\n\"But Gran, this is too much. We can't possibly afford—\"\n\n\"Hush,\" Grandma says, crossing her arms. \"I had to spend all that extra potpourri money on something useful, didn't I?\"\n\nGrandma smiles at you, then looks at the tree in the corner of the kitchen. She nods and right on cue the tree begins to shake, letting loose a shower of sparkling seeds. Grandma only has that old tree shake shimmers on the most special of occasions… \n\n\"Thank you, Gran\" is all you can manage.\n\n\"It's only what you deserve, ${firstname},\" Grandma says, leaning back in her chair and stroking the shimmer tree. \"Besides, it's what your parents would have wanted.\"\n\n*finish Next Chapter: By The Roots", "room": "*comment é\n\n*text_image chap_13.png center Chapter 13: The Room\n\n*set power -5\n\nYou careen toward the MGHQ, flying at your top speed. As you approach, everything appears to be normal—there doesn't seem to be a raging battle like you expected.\n\nThough you do make out the glint of something bright on one of the upper residential terraces, so you head there and land with a thud.\n\nThen your eyes bulge as you see that there are flames raging inside the apartment. Through the thick plumes of smoke, you think you can make out an oil panting of Black Magic going up in flames.\n\n$!{Bmze} must be trapped inside.\n\nBut how? You thought Black Magic could do anything with ${bmhis} Powers. And where's the rest of the Group? The only thing you can think is that someone very Powerful found a way to contain Black Magic…and if that's the case, you may be way out of your league here.\n\nSo what do you do?\n\n*choice\n\t#Generate a strong energy shield and break inside. (Power Cost 16)\n\t\t*set offensive %+15\n\t\t*set power -16\n\t\tWrapping yourself in a ${energycolor} energy cocoon and hoping there's enough oxygen enclosed to keep you breathing, you crash into the apartment. You can barely see through all the smoke and flames, but you manage to work your way deeper inside.\n\n\t\tYou find yourself in what you think is a bedroom when suddenly, you hear a massive explosion pound from somewhere nearby.\n\t\t*goto explosion \n\t#Call for backup.\n\t\t*set offensive %-15\n\t\t*goto raisechip\n\t#See if Processor is online.\n\t\t\"Processor, are you active?\" you scream. When there's no response, you realize that her systems must be down. Perhaps this attack is even more extensive than you thought….\n\t\t*set offensive %-15\n\t\t*goto raisechip\n\n*label raisechip\n\nYou raise your MeChip, mentally commanding ${chipname} to call the Group's emergency line. You hope Rebellion\n*if diva_good\n\tor The Diva answers and not someone inclined to ignore you.\n\t*goto help\n*elseif fistfull_good\n\tor Fistfull answers and not someone inclined to ignore you.\n\t*goto help\n*elseif diva_bad\n\tanswers and not The Diva, who is definitely bound to ignore you.\n\t*goto help\n*else\n\tanswers and not Fistfull or Monk, who are definitely bound to ignore you.\n\t*goto help\n\n*label help\n\n\"${codename}?!\" you hear Black Magic scream from inside, choking through coughs. \"I'm trapped in the bedroom, there's not much air!\"\n\nWithout thinking, you wrap yourself in a ${energycolor} energy cocoon. Hoping there's enough oxygen enclosed to keep you breathing, you crash into the apartment. You can barely see through all the smoke and flames, but you manage to work your way deeper inside.\n\nYou find yourself in what you think is the bedroom when suddenly you hear a massive explosion pound from somewhere nearby.\n\n*set power -16\n*goto explosion\n\n*label explosion\n*page_break\n\nYou brace yourself for impact…until you realize that the explosion isn't one of fire. Instead, it's a technological explosion as the room begins to twist and distort. The flames vanish, the smoke clears, and the room grows temperate, the intense flash of heat cooling.\n\nBefore you can process this, however, you spot Black Magic on the bed.\n*if male\n\t*if male_straight\n\t\t*goto female_model\n\t*else\n\t\t*goto male_model\n*else\n\t*if female_straight\n\t\t*goto male_model\n\t*else\n\t\t*goto female_model\n\n*label female_model\nShe wears black-and-gold lingerie, modeled after her costume. She looks like she belongs in an underwear ad, curved in all the right places…. \n*goto seduce\n\n*label male_model\nHe wears black-and-gold boxer-briefs, modeled after his costume. He looks like he belongs in an underwear ad, muscly in all the right places….\n*goto seduce\n\n*label seduce\n\nWhat the slugger is going on here? \n\n\"Thanks Processor,\" Black Magic says, \"your little show worked like a charm.\"\n\n\"You're most welcome,\" Processor responds through the walls. \"I can sense ${codename}'s presence, so I am initiating privacy settings, level red.\"\n\nThen it all clicks—Processor is capable of controlling all of the MGHQ's systems. She must have put on a holographic show and altered the room's temperature, making it appear as if a fire was raging inside Black Magic's apartment to lure you in….\n\n*if bmnoromance\n\tYou know exactly where this is going. So before Black Magic can try to seduce you, you spin around and fly directly back out of the window, without another word.\n\n\tYou don't have any time to waste on this nonsense.\n\t*set power 100\n\t*set health 100\n\t*set rlshp_bm %-99\n\t*finish Next Chapter: Unto Others\n*else\n\t*goto distraction\n\n*label distraction\nYou're distracted from this thought, however, as your eyes settle on the beads of sweat accumulating on Black Magic's chest.\n\n\"My eyes are up here,\" Black Magic says, standing up.\n\n*choice\n\t#\"Are you absolutely out of your mind?\"\n\t\t*set rlshp_bm %-15\n\t\t\"I know it's a bit dramatic but I wanted you to come right away,\" Black Magic says, approaching. \"I've been thinking about you all night.\"\n\n\t\tYou're definitely angry for being duped like this, but still, you can't help but focus on the fact that your biggest fantasy is coming true right in front of your eyes.\n\t\t*goto come_on\n\t#\"I know exactly where your eyes are…\"\n\t\t*set rlshp_bm %+15\n\t\t\"I've been thinking about you all night,\" Black Magic says, approaching. You force yourself to blink, unable to focus on anything but the fact that your biggest fantasy is coming true right in front of your eyes.\n\t\t*goto come_on\n\t#\"Why did you do all this?\"\n\t\t*goto come_on\n\n*label come_on\n\n\"I wanted to thank you for saving my life,\" Black Magic continues, drawing ${bmhis} finger across your arm. \"What do you think about that?\"\n\n*choice\n\t#Push Black Magic onto the bed.\n\t\tBlack Magic falls back onto the bed and gasps, excited. You stand above ${bmhir} and start to unzip your costume….\n\t\t*goto big_kiss\n\t#Let Black Magic take the lead.\n\t\tBlack Magic grabs your waist and pushes you onto the bed, ${bmhis} fingers pulling at the zipper to your costume….\n\t\t*goto big_kiss\n\t#Flirt back.\n\t\t\"Thank me…how?\" you ask.\n\n\t\t\"I'm sure we can think of some way,\" Black Magic whispers in your ear.\n\t\t*goto big_kiss\n\t#Back away—nothing is going to happen here.\n\t\tWell, maybe not nothing—just not everything, that's for sure. You're not ready for that. \n\n\t\t\"It's OK,\" Black Magic says, reading your face. \"We can take it slow if you want….\"\n\t\t*set just_kiss true\n\t\t*goto big_kiss\n\n*label big_kiss\n\nThen Black Magic kisses you.\n\nAnd it feels more perfect than you could possibly imagine.\n\n*if just_kiss\n\t*goto post_coit\n*else\n\t*goto placings\n\n*label placings\n\"By the way,\" Black Magic starts, ${bmhis} lips impossibly close to yours, \"I can make the room look like anything you want with a simple illusion charm. So where do you want to be?\"\n\n*choice\n\t#\"The beach.\"\n\t\tBlack Magic whispers \"Sionillu Chbea\" and after a ${energycolor} flash, you can feel sand beneath your feet and sea mist on your face.\n\t\t*goto lose\n\t#\"Under the Eiffel Tower.\"\n\t\tBlack Magic whispers \"Sionillu Rispa\" and after a ${energycolor} flash, you look up to see the twinkling light show of the Eiffel Tower directly above you.\n\t\t*goto lose\n\t#\"Turn the fire back on.\"\n\t\tBlack Magic whispers \"Sionillu Refi\" and after a ${energycolor} flash, flames erupt around the room again. \n\t\t*goto lose\n\t#\"The real thing is perfect.\"\n\t\tBlack Magic just smiles—${bmze} wasn't expecting that.\n\t\t*set rlshp_bm %+10\n\t\t*goto lose\n\t#Choose my ideal location.\n\t\t*input_text bm_location\n\t\tBlack Magic whispers something and after a ${energycolor} flash, the room fades away, beginning to look exactly like ${bm_location}.\n\t\t*goto lose\n\n*label lose\n\nYou and Black Magic lock eyes for a few moments, then lean in for another kiss. It's so good, it makes you shiver uncontrollably.\n\nYou feel ${bmhis} soft skin press against yours and hear ${bmhir} begin to breathe heavier. Feeling yourself getting turned on, you slide your hands down Black Magic's bare back and kiss ${bmhir} harder, deeper.  \n\nAnd then you both lose yourselves.\n*goto post_coit\n\n*label post_coit\n*page_break Later\n\nYou lie in Black Magic's enormous bed, staring out of ${bmhis} window, watching the sunset. You feel dizzy with happiness, like you're in a dream.\n\nYour encounter with the Wisp seems like ages ago, despite the dull ache still lingering from all the bone-breaking and healing.\n\nRight now, Black Magic is off in the kitchen, whipping up your favorite junk food. You try your hardest to soak up this moment, to freeze time for as long as possible—a task Black Magic might actually be capable of, come to think of it. \n\nWhy can't life always be like this?\n\n*if bmfling\n\tYou may just want a fling with Black Magic but you can't see yourself doing this only one time….\n\t*goto returned\n*else\n\t*goto returned\n\n*label returned\n*page_break\n\nWhen Black Magic does finally return, a tray of amazing food hovers beside ${bmhir} (including pancakes and french fries). $!{Bmze} also pulls a present out from under the bed and hands it to you.\n\n*if just_kiss\n\t\"I bought this for you,\" Black Magic says, \"since my first thank you didn't go over exactly as expected….\"\n\t*goto notquitesure\n*else\n\t\"I bought this for you,\" Black Magic says, \"just in case my first thank you didn't go over as expected….\"\n\t*goto notquitesure\n\n*label notquitesure\n\nNot quite sure what to say, you unwrap the present to find a top-level flight enhancer: the Cruise Pro Twin-Grav Bracelets. This costume upgrade will allow you to access your flight Powers without draining any of your Power Level, which is unbelievable.\n\nEspecially because this upgrade also happens to cost tens of thousands of dollars.\n\n*choice\n\t#\"Black Magic, I can't take this….\"\n\t\t\"Oh, just be quiet and take it. Like I said, I owed you,\" Black Magic says with a smile. \"I'm not taking it back, so you can throw it out if you really want.\"\n\n\t\tYou've never taken handouts before…but then again, you've never received a present quite as extravagant as this one. It couldn't hurt to hang on to it, just to test it out…right?\n\t\t*goto bundle\t\t\t\t\n\t#\"This is incredible. Thank you so much!\"\n\t\t\"Like I said, I owed you,\" Black Magic says with a smile. \"Hope you enjoy it.\"\n\n\t\tYou look down at the box, thinking that you can't wait to test the bracelets out and see how they look with your costume….\n\t\t*goto bundle\n\t#\"I don't know how I feel about this….\"\n\t\t\"Oh, just be quiet and take it. Like I said, I owed you,\" Black Magic says with a smile. \"I'm not taking it back, so you can throw it out if you really want.\"\n\n\t\tYou've never taken handouts before…but then again, you've never received a present quite as extravagant as this one. It couldn't hurt to hang on to it, just to test it out…right?\n\t\t*goto bundle\n\n*label bundle\n\n\"Oh, I also got you a MeChip personality bundle,\" Black Magic says, sitting back down on the bed. \"${chipname} will have new look options and…\"\n\nBut you are distracted from what ${bmze} is saying as Black Magic's MeChip, Kadabra, appears holographically in your mind. $!{Bmze}'s a gorgeous golden retriever who currently holds a package in ${bmhis} mouth, which MeChip ${chipname} promptly appears to accept.\n\n*if chip_butler\n\t\"Oh deary me, you must thank Black Magic for me!\" MeChip ${chipname} says, suddenly wearing a brand new Prada suit. \"This fabric is absolutely divine!\"\n\t*goto quiet\n*elseif chip_diva\n\t\"Hot damn, that Magic really knows how to hook a lady up!\" MeChip ${chipname} shouts, suddenly wearing a brand-new DVF wrap dress. \"This look is serving up so much ferocity!\" \n\t*goto quiet\n*else\n\t\"My goodness, I don't know what to say,\" MeChip ${chipname} sobs, suddenly sporting a brand new perm-tastic hairdo. \"I've never felt so pretty in all my MeLife! You must thank Black Magic for me!\"\n\n*label quiet\n\nMeChip Kadabra barks and winks at ${chipname}, then runs out of sight.\n\n*page_break\n\n\"I don't…thank you so much,\" you say to Black Magic, beside yourself with gratitude. It seems ${bmze} can give you the things you've always dreamed of having, in every way…a notion you find as terrifying as you do exciting.\n\n\"Oh, don't get all weepy on me,\" Black Magic says. \"It was nothing compared to what you did for me.\"\n\nYou smile back at Black Magic and all you can think is: how can this really be happening?\n\n*page_break Three Hours Later\n*set power 100\n*set health 100\n\nYou're still in bed with Black Magic, talking about anything and everything. You can't remember the last time you spent this much time with someone—and still it has felt like only a few minutes have gone by. Lying here with Black Magic, you feel oddly…at home.\n\nIt's not a feeling you're used to.\n\n\"I don't know,\" you start to say. \"What do I want most in life? That's a really tough one….\"\n\n\"Well I certainly know my answer,\" Black Magic says, playing with your hair. \n\n\"Fine then, let's both say it on the count of three. One, two…\"\n\n*choice\n\t#\"To be a Legend.\"\n\t\t\"To be a Legend,\" Black Magic says at the same time.\n\n\t\tYou start to laugh. Of course you both would say the same thing. It's almost sickeningly sweet, but you two just seem to understand each other….\n\t\t*goto histquest\n\t#\"To fall in love.\"\n\t\t\"To find love,\" Black Magic says at the same time. \n\n\t\tYou start to laugh. Of course you both would say the same thing. It's almost sickeningly sweet, but you two just seem to understand each other….\n\t\t*goto histquest\n\t#\"To start a family.\"\n\t\t\"To have kids,\" Black Magic says at the same time.\n\n\t\tYou start to laugh. Of course you both would say the same thing. It's almost sickeningly sweet, but you two just seem to understand each other….\n\t\t*goto histquest\n\t#\"Money.\"\n\t\t\"To fall in love,\" Black Magic says at the same time. \n\n\t\tAwkward.\n\n\t\tAt least Black Magic laughs, breaking the tension a bit.\n\t\t*goto histquest\n\t#\"To help others.\"\n\t\t\"Helping others,\" Black Magic says at the same time.\n\n\t\tYou start to laugh. Of course you both would say the same thing. It's almost sickeningly sweet, but you two just seem to understand each other….\n\t\t*goto histquest\n\t#\"To be famous.\"\n\t\t\"To stay famous,\" Black Magic says at the same time.\n\n\t\tYou start to laugh. Of course you both would say the same thing. It's almost sickeningly sweet, but you two just seem to understand each other….\n\t\t*goto histquest\n\t#\"To see my parents.\"\n\t\t\"To find love,\" Black Magic says at the same time.\n\n\t\tAwkward.\n\n\t\t\"Wait, what happened to your parents?\" Black Magic says, causing you to freeze. You've gotten so comfortable with Black Magic, you totally forgot that ${bmze} doesn't know who you really are—you've even kept your mask on this entire time.\n\n\t\t\"I…\" you start, searching your brain for an answer, \"don't like talking about it.\"\n\n\t\t\"Oh, all right,\" Black Magic says, trying to seem unaffected.\n\t\t*goto histquest\n\n*label histquest\n\n\"This has been…nice,\" Black Magic starts. \"Ever since I became a celebrity, it's been really hard to find people to trust. Everyone seems to want something from me, instead of just wanting me….\"\n\nYou just smile at Black Magic, afraid you might say the wrong thing.\n\n\"By the way, I've been wanting to ask you this,\" you say, rolling on to your side. \"Hopefully I'm not prying, but…\"\n\n*fake_choice\n\t*if (diva) #\"What's the story with you and The Diva?\"\n\t#\"What is your history with Madame Vice?\"\n\t#\"When I revived you back at Ace's High, I heard your thoughts….\"\n\t#\"So where are you from?\"\n\t#\"What was it like winning the HoT grant?\"\n\t#\"Why do you look so much like ${bmceleb}?\"\n\n\"Oh, you don't want to hear about that,\" Black Magic says, sitting up.\n\nYour eyes drop—clearly ${bmze} doesn't want to tell you about this.\n\n\"But hey,\" Black Magic says, able to read you perfectly, \"how would you like to know what my first name is?\"\n\n\"Really? You'd tell me that?\"\n\n\"Only if you tell me yours, that way neither of us can go tattling the other,\" Black Magic says, holding out ${bmhis} pinky.\n\n\"Deal,\" you say, extending your own pinky for a swear. \"On the count of three again?\"\n\n\"Fine. One, two…\" Black Magic starts.\n\nThink fast: Do you trust Black Magic with your real name? \n\n*choice\n\t#Yes, I tell Black Magic my real first name.\n\t\t\"${firstname},\" you say, just as Black Magic says, \"${bmfirst}.\"\n\n\t\t\"That's really pretty,\" you say, \"${bmfirst}. I like it.\"\n\t\t*set rlshp_bm %+15\n\t\t*goto prodigal\n\t#No, I give Black Magic a fake first name.\n\t\t*input_text fakefirst\n\n\t\t\"${fakefirst},\" you say, just as Black Magic says, \"${bmfirst}.\"\n\n\t\t\"${fakefirst},\" Black Magic says, \"That's really nice.\"\n\n\t\tYou force a smile, hoping Black Magic won't be able to tell you just lied right to ${bmhis} face.\n\t\t*set rlshp_bm %-15\n\t\t*set wrong_name true\n\t\t*goto prodigal\n\n*label prodigal\n\n\"Oh, I almost forgot!\" Black Magic says, changing the subject quickly. \"I've been meaning to tell you this, but it kept slipping my mind. You have to thank your friend for me, the one who wears that kevlar bodysuit.\"\n\n\"What?\" you ask, freezing.\n\n\"She wouldn't tell me her name, but she's the one who approached me and told me to come looking for you on the Static case. Obviously that worked out very well….\"\n\nYou stand up, beginning to pace. \"Why didn't you tell me that sooner?\"\n\n\"I told you, it slipped my mind,\" Black Magic says, defensive. \"Why? Who is she?\"\n\n\"Some nut named Prodigal, she's the one who destroyed The Gravitas. I thought she might have a thing for me—this definitely confirms it.\"\n\n\"Wait, what?\" Black Magic says. \"She seemed like she was a friend of yours, like she knew you really well. I didn't even think to question her.\"\n\n\"I just…I need a second,\" you say, walking toward the bathroom before Black Magic can say anything else.\n\n*page_break\n\nThis is…impossible. Why did Prodigal send Black Magic looking for you to help with the Static case, especially after destroying The Gravitas? Maybe she isn't after you—maybe she's just using you to take down The Splice Circle? If not, what is she playing at, pulling all these strings?\n\nYou throw water on your face and force yourself to snap out of it—you're not going to let Prodigal ruin this night for you. No, you can sort this all out later with Jenny. Right now, you're going to enjoy your time with Black Magic.\n\nYou reach for a towel blindly, water still dripping from your face. Your hand gropes against the wall and, to your surprise, you feel something click under your fingers. With a soft whoosh, a door appears in the center of the wall, swinging slightly ajar.\n\n\"What the-\" you start to say, dripping water all over the floor as you stare at the opening in the wall. What could be inside? Black Magic clearly wanted to keep it hidden….\n\nWhat do you think it could be?\n\n*choice\n\t#It's probably nothing, an extra-large closet or something.\n\t\t*goto enter\n\t#Maybe it's some kind of advanced safe. \n\t\t*goto enter\n\t#If Black Magic keeps it this hidden, it must be something important.\n\t\t*goto enter\n\n*label enter\nUnable to tame your curiosity, you peer inside and find a small closet leading to a teleportation door. Through the milky, fluid portal you can make out another room.\n\nYou walk forward to see if you can get a better look but as you do, an intense sucking feeling pulls you through and spits you out on the other side.\n\n\"What's taking you so- No!\" you hear Black Magic scream and suddenly ${bmze} sucks into the room next to you.\n\nBut it's too late—you've already taken in the scene.\n\n*page_break\n\nYou stand in a comfortably decorated bedroom with no windows or doors, save for the teleportation portal you just came through. There are four large beds against two opposite walls.\n\nThe two beds to your right are occupied by twin girls with special needs. They both have long, blonde hair and wear pink dresses, wet stains of drool pooled on the collars.\n\nYou slowly turn to the opposite wall and find the third bed is occupied by a comatose middle-aged man. An elderly woman sleeps in the last bed, snoring softly.\n\nYour eyes stay fixed, however, on a large vat in the center of the room, which glows gold with shining liquid. The vat is attached to each of the bedridden occupants by some kind of organic umbilical cord.\n\nYou try to speak but are interrupted by the pink girls, who moan and clap their hands at your arrival.\n\n\"Oh no…\" Black Magic chokes at your side, ${bmhis} eyes wide.\n\n\"What…what is this?\" you whisper, a sick feeling creeping into your stomach.\n\n\"No one knows, not even Processor,\" Black Magic mutters to ${bmhir}self. \"The protective enchantments must have…I let my guard down…wasn't thinking…\"\n\n\"No one knows what?\" you ask. \"${bmfirst}, what is this?\"\n\n*page_break\n\nBlack Magic takes a deep breath and walks over to the nearest bed, parting the girl's hair and causing her to coo. \n\n\"They're given the best care here. I visit them every day,\" Black Magic says, looking at the girl instead of you. \"They're as happy here as they would be anywhere else.\"\n\n\"Who are these people? Why are you…keeping them here?\" you ask, still bewildered. \n\n\"They're all supposed to be dead, at least their families think so—not that they'd care enough to think otherwise. These people were unwanted, left for dead. I'm always careful when I choose-\"\n\n*choice\n\t#\"Black Magic, you're not making any sense.\"\n\t\t*goto pumping\n\t#\"Answer me now!\"\n\t\t*set rlshp_bm %-10\n\t\t*goto pumping\n\t#\"${bmfirst}, you can tell me anything.\"\n\t\t*set rlshp_bm %+10\n\t\t*goto pumping\n\n*label pumping\n\nFor several moments, the only sound comes from the faint pumping of the strange, slimy vat in the center of the room. You try to breathe through your mouth since the room smells stale and…sick.\n\nBlack Magic finally looks at you.\n\n\"I need-\" ${bmze} starts, trying to find the right words. \"My Powers let me do anything. I don't know if magic really exists but I think my Powers are what magic would feel like if it did. What my Powers really let me do is play with the laws of the universe, somehow. They allow me to harness life force itself, it seems…\"\n\nAs Black Magic speaks, you start to piece things together. \"Oh no…\"\n\n\"But I can't create that force, I can only manipulate it. And my own life force is so little—it isn't enough. It keeps my abilities too limited. If I was ever going to make it to the big leagues, I needed to do more. I needed more Power. So-\"\n\n\"So you keep these people here, against their will, and drain their life forces to fuel your Power?\" you finish. \n\n*page_break\n\n\"It's not like that!\" Black Magic shouts. \"They're in comas or worse—they can't move or think, they're not alive, not like you and me. I give their lives value! I'd never use their life forces for anything other than good! I wouldn't!\"\n\nBlack Magic's shrieks echo against the walls, causing one of the twins to cry. Black Magic tries to calm ${bmhir}self, stroking the girl's hair.\n\n\"I never take enough to hurt them.\" $!{Bmze} speaks in barely a whisper. \"I could take from anyone, but I don't. Do you know how tempting it is to lose control? To draw the life force out of everyone around me? To take all that Power and make the world how I want it? But I don't do that. I won't, ever. This…this is the only alternative.\"\n\nYou stare at Black Magic, who has now started to tremble. \n\n*if wrong_name\n\t\"Please, ${fakefirst},\n\t*goto respond\n*else\n\t\"Please. ${firstname},\n\t*goto respond\n\n*label respond\nyou have to understand,\" Black Magic begs, \"I had no choice….\"\n\nYou continue to stare at Black Magic but all you can see is your own desire for success reflected back at you. Is this how you look to others, on your mad climb to become a Legend? If it came down to it, what would you be willing to do to succeed? Would you do what Black Magic did?\n\n*choice\n\t*if (rlshp_bm > 60) #\"I understand.\"\n\t\t*gosub delay\n\t\t*set rlshp_bm %+60\n\t\t*goto understand\n\t#\"I don't like this…but I just need time to process everything.\"\n\t\t*gosub delay\n\t\t*set rlshp_bm %+40\n\t\t*goto understand\n\t#\"I don't think I'll ever be all right with this….\"\n\t\t*gosub delay\n\t\t*set rlshp_bm %-40\n\t\t*goto reject\n\t*if (rlshp_bm \u003c 40) #\"You absolutely disgust me.\"\n\t\t*gosub delay\n\t\t*set rlshp_bm %-60\n\t\t*goto reject\n\t#\"To be honest, I don't really think this is that big a deal.\"\n\t\t*gosub delay\n\t\t*set rlshp_bm %+60\n\t\t*set bm_dontcare true\n\t\t\"You…don't?\" Black Magic says.\n\n\t\t\"We all do what we have to do,\" you say. \"I'm not here to judge anyone.\"\n\n\t\tBlack Magic stares back at you in awe, though you can't quite tell if ${bmze}'s impressed or upset. Does ${bmze} want you to be against this?\n\t\t*goto mystery\n\n*label understand\nYou still aren't sure exactly how you feel about all of this, but you can at least understand why Black Magic has done it. And you're not willing to burn your bridges with ${bmhir} just yet, no matter what ${bmze} has done.\n\n\"No one knows?\" you ask, not sure what else to say.\n\n\"No one. And if they did…I'd be ruined.\" \n*goto mystery\n\n*label reject\n\"Don't you see?\" you continue. \"This is just…it's…you're like a ghoul, a vampire. You…\"\n\nIt's too much. All Black Magic can do is shudder.\n\n\"If you can't understand,\" ${bmze} says, \"please just don't tell anyone. I'd be ruined.\"\n*goto mystery\n\n*label mystery\n\nSuddenly, it makes sense why Black Magic's origins remain so shrouded in mystery—${bmze} doesn't want anyone finding out about the secret source of ${bmhis} Powers….\n\nFinally breaking, Black Magic begins to sob, clutching the bed-ridden girl tightly.\n\nThe sight sends a shiver through you.\n\n*page_break\n\n*if bm_dontcare\n\t\"I need…can you give me a minute…?\" Black Magic chokes out between sobs.\n\n\t\"Sure,\" you say, backing toward the teleportation door. The smell of the room is starting to make you queasy anyway….\n\n\tWithout another word, you walk back into Black Magic's apartment. And ${bmze} doesn't stop you.\n\n\tYou really are fine with what Black Magic is doing here—so then why do you still feel… \n\n\tUnsettled?\n\n\t*finish Next Chapter: Unto Others\n*else\n\t\"I have to go,\" you say, the smell of the room causing you to feel queasy….\n\n\tWithout another word, you move toward the teleportation door.\n\n\tBlack Magic doesn't stop you.\n\n\t*finish Next Chapter: Unto Others\n\n\n*label delay\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Heroes Rise: The Prodigy[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2025-06-12 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n*return", "roots": "*comment é\n\n*text_image chap_2.png center Chapter 2: By the Roots\n\nOnce upon a time, your parents, The Sound and The Fury, were Millennia City's most famous Powered couple. When they met in high school, they discovered that your mother's ability to generate vocal sonic waves perfectly complemented your father's ability to harness sound energy. Almost immediately after they arrived on MC's hero scene, the public became enamored with their budding romance and their harmonious Power set.\n\nAs they rose rapidly to the hero A-list, no villain was too dangerous for them to battle and no party was too exclusive for them to attend. This meant that you got to spend your childhood immersed in MC's finest hero high life, knowing that someday you'd fight alongside your parents as a famous hero.\n\nUntil your thirteenth birthday. It was going to be the best night of your life, the first time your Powers might begin to manifest. Your parents were at a press conference speaking about one of their recent successes—shutting down an assassin training academy masquerading as a public high school. They were supposed to say a few words about the mission and then come straight home to celebrate your big night. \n\nHowever, just as they were preparing to leave, a young villainess crashed the event. She was Miss Artillery, one of the assassin academy's teachers, and she entered ranting about how The Sound and The Fury had ruined her life. She quickly went on the offensive with her Power to generate weaponry and your parents moved to apprehend her. But for some strange reason—perhaps because they were in such a rush to get home to you—they miscalculated their joint attack.\n\nIn what became the biggest news story of the year, The Sound and The Fury murdered Miss Artillery by…\n\n*choice\n\t#Liquefying her brain.\n\t\tWhile your father used his sound-enhanced strength to restrain Miss Artillery, your mother aimed to disable her with a quick sonic blast.\n\n\t\tYou still don't know whether your mother misjudged the strength of her blast or your father miscalculated the angle.\n\n\t\tEither way, when the blast cleared, Miss Artillery drooped in your father's arms, pink matter oozing from her nostrils.\n\t\t*set artillery_brain true\n\t\t*goto judgement\n\t#Snapping her spine.\n\t\tWhile your mother disoriented Miss Artillery with a shot of sonic vertigo, your father moved to physically disarm her with his sound-enhanced strength.\n\n\t\tYou still don't know whether your mother miscalculated the power of her sonic boost or your father misjudged the pump-up he had received.\n\n\t\tEither way, when your father grabbed Miss Artillery, her spine crumbled like rubble underneath his fingers.\n\t\t*set artillery_spine true\n\t\t*goto judgement\n\t#Blowing out her heart.\n\t\tWhile your father used his sound-enhanced strength to restrain Miss Artillery, your mother aimed to disable her with a quick sonic blast. \n\n\t\tYou still don't know whether your mother misjudged the strength of her blast or your father miscalculated the angle.\n\n\t\tEither way, when the blast cleared, Miss Artillery was twisted up in your father's arms, her fingers clutching her chest.\n\t\t*set artillery_heart true\n\t\t*goto judgement\n\n*label judgement\n*page_break\n\nThis certainly wasn't the first time a hero had accidentally used fatal force against a villain. Traditionally, this mistake would require a fair amount of community service and a hefty fine, especially for heroes of your parents' caliber. \n\nHowever, this accident came on the heels of a recent string of excessive hero-on-villain brutality and their case fell into the hands of Judge Victon, an up-and-comer who was making a play to become MC's mayor. Deciding that a harsh ruling would set the perfect example for his zero-tolerance campaign against heroic brutality, Judge Victon passed the harshest sentence ever given to any Powered Hero. \n\nCiting a \"murderous misuse of Powered ability,\" he sentenced your parents to a life term in The Devoid, a maximum security facility for Powereds. \n\nWithout visitation rights.\n\nThe last time you saw your parents was on the day of that infamous sentencing, right before the police escorted them to The Devoid. You'll never forget the image of your mother and father in orange jumpsuits, handcuffed and shamed, their spirits broken.\n\nJudge Victon wouldn't even let them hug you goodbye.\n\nYour mom couldn't stop crying as the police escorted her away. But as your dad followed, he turned to you and said the words you'd come to live by:\n\n\"Don't let this stop you, ${firstname}. Become a hero—for us.\"\n\n*set met_victon true\n*set rlshp_victon 10\n*page_break\n\nYour father could not have known the profound effect those words would have on you, especially after his unjust treatment at the hands of the legal system.\n\nAs a result, you have very strong beliefs regarding the law:\n\n*choice\n\t*if (lawless \u003c 50) #I respect the law—it may not always be right, but it's the best (and the only) system we have.\n\t\tMinor acts of vigilantism aside, you follow the law so closely that you won't even fly illegally. You hope to maintain those standards as best you can as you begin your career as a hero.\n\t\t*set lawless %-30\n\t\t*page_break\n\t\t*goto pfpp\n\t#I'll always follow the law in order to avoid my parents' fate. However, I don't necessarily mind getting a bit \"creative\" with the law if the situation absolutely calls for it.\n\t\t*set lawless %-15\n\t\t*page_break\n\t\t*goto pfpp\n\t#I have no problem with breaking the law, but I try to follow it whenever it seems reasonable enough.\n\t\t*set lawless %+15\n\t\t*goto pfpp\n\t*if (lawless > 50) #I have absolutely no respect for the law—I know that I have to live by my own rules.\n\t\tFlying illegally and small acts of vigilantism are child's play—you're not going to let anything, especially not the broken legal system, stand in the way of your heroic rise.\n\t\t*set lawless %+30\n\t\t*page_break\n\t\t*goto pfpp\n\n*label pfpp\n\nAfter the trial, your parents' considerable fortune was transferred to Miss Artillery's estate and you were assigned to live with your only living relative—your grandma. However, moving in with her wasn't so simple….\n\nOver the course of their careers, your parents had amassed a deadly collection of enemies—each of whom would be thrilled to seek revenge on The Sound and The Fury's now-defenseless family. So the court enrolled you and Grandma in the Powered Family Protection Program (PFPP). \n\nYou and Grandma were given brand new identities: the Sterling name was assigned to you, though you at least got to keep your first name. Grandma suddenly found herself forced to live on a pitiful PFPP stipend and had to move you into a small apartment in the Eastern Fringes. She also had to pull you out of your fancy, Powered-only private school and enroll you in the local public school. \n\nIn the course of a few short months, your life became entirely unrecognizable to you…and it has never been the same since. That's why, every day, you remind yourself of who you really are.\n\nYour real family name is:\n\n*choice\n\t#Tricamo.\n\t\t*set familyname \"Tricamo\"\n\t\t*goto powers\n\t#Apple.\n\t\t*set familyname \"Apple\"\n\t\t*goto powers\n\t#Kastan.\n\t\t*set familyname \"Kastan\"\n\t\t*goto powers\n\t#Rosado.\n\t\t*set familyname \"Rosado\"\n\t\t*goto powers\n\t#Lee.\n\t\t*set familyname \"Lee\"\n\t\t*goto powers\n\t#Rizzo.\n\t\t*set familyname \"Rizzo\"\n\t\t*goto powers\n\t#Decter.\n\t\t*set familyname \"Decter\"\n\t\t*goto powers\n\t#Ito.\n\t\t*set familyname \"Ito\"\n\t\t*goto powers\n\t#I'd rather create my own family name.\n\t\tMy real last name is:\n\t\t*input_text familyname\n\t\t*goto powers\n\n*label powers\n\nSo ${firstname} ${familyname} was no more, giving way instead to ${firstname} Sterling. And you found that the Sterling version of yourself was vastly different, forced to grow up way faster than anyone ever should….\n\nBack in the kitchen, you look across the table at Grandma. She's the only other person in the world who understands how you feel—after all, she was forced to abandon the life she had built for over seventy years to enter the PFPP with you. Despite this, Grandma has still managed to start over and find a way to be happy once again. \n\nAnd without her, you'd have had no shot at becoming a hero.\n\n\"Thank you, Gran,\" you repeat, fighting against the lump forming in your throat.\n\n\"Oh, hush up,\" Grandma says, wiping at her cheeks. \"What are you waiting for? You've got a career to start!\"\n\n*page_break\n\nYou run into your room (where you've made sure not to keep any plants, since you don't need Grandma's best spies hanging around). It is decorated plainly but what truly makes the room yours is the wall filled with framed posters of your favorite Powered Heroes.\n\nFeatured centrally are your parents in their classic Sound and Fury costumes, right next to your favorite Powered Hero, Rebellion. $!{Youze} has been your idol ever since you were a little kid.\n \nYou've got plenty of other posters on your hero-worship wall but whose career do you want to emulate most—the team player's or the solo hero's? \n\n*choice\n\t#Rebellion, leader of The Millennial Group, MC's #1 Powered team.\n\t\tRebellion was initially raised among The Meek, a fervent anti-Powered cult. $!{Youze} eventually broke free of their influence to become a shining symbol of Powered progress, doing everything from fighting in the Third World War to receiving the very first Millennia City's Hero of Tomorrow (HoT) grant (and making it the highest honor possible for any aspiring hero).\n\n\t\tRebellion also reshaped The Millennial Group, which has been MC's most famous Powered team for decades. The Group has gone through countless roster changes (the history of which you know by heart, of course). Today the Group's roster consists of:\n\n\t\tRebellion: the team's long-standing leader.\n\t\t*line_break\n\t\tThe Diva: the wickedly powerful team matriarch.\n\t\t*line_break\n\t\tFistfull: the steroid-pumping muscle from New Jersey.\n\t\t*line_break\n\t\tMonk: a spiritual guru turned hero.\n\t\t*line_break\n\t\tProcessor: an artificial intelligence strategist and information hub.\n\t\t*set
