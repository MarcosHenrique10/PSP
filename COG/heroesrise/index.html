olli charges you again, you slam your energy fists down onto her back. She hits the ground and you step back to wind up for another blow.\n\n\t\tBut before you can strike, Lolli bounces to her feet and pulls out a miniature rocket launcher. You have zero time to react before she fires at you, point blank. With nothing else to do but brace yourself, you scream as the rocket explodes against your armor.\n\n\t\tYour shields drop from the strain, allowing Lolli to jerk her shoulder, causing her twisted jewel-antler to pierce your arm and pin you to the wall.\n\t\t*goto pinned\n\t#Trap Lolli with a shrinking energy containment field. (Power Cost 15)\n\t\t*set power -15\n\t\tWithout wasting a second, you encase Lolli in a containment field. She tries to ram her way out but you made this field too strong for that. Lolli screams as the walls begin to close in on her, and she doubles her efforts to break free. Realizing this isn't working, Lolli crouches down and pulls something out of her pocket…\n\n\t\tA miniature rocket launcher. Before you can respond, she fires directly at your containment field. The force of the explosion obliterates your energy and you scream from the strain. Lolli then leaps at you shoulder-first, so that her twisted jewel-antler pierces your arm, pinning you to the wall.\n\t\t*goto pinned\n\n*label pinned\n\n*set health -15\n\nAs you feel your arm start to bleed, Lolli moans loudly. You need to find a way to free yourself while she is distracted, but the edges of your vision have already begun to blur.\n\nNo! Not like this—you can't go down this way….\n\n*fake_choice\n\t#Try to supercharge the antler and force Lolli to retreat. (Power Cost 5)\n\t#See if an energy shield will expel the antler. (Power Cost 8)\n\t#Generate an energy bomb to take Lolli out. (Power Cost 5)\n\nYou're about to launch your attack when, without warning, something crashes through the wall behind Lolli. You can feel Lolli's antler slide out of your arm and, ignoring the pain, you quickly roll to escape her reach.\n\nAcross the room, Rebellion tumbles to ${youhis} feet, chunks of debris sticking out of ${youhis} skin. $!{Youze} strides forward and brushes ${youhir}self off—someone just put ${youhir} through a wall and ${youze}'s not even batting an eye. \n\nLolli turns towards Rebellion and cries, \"Yes! Stabbing you is going to be the best-\"\n\nShe doesn't finish, though, as Rebellion punches her across the face. Decimated, Lolli crumbles to the ground.\n\n\"So you decided to follow us here, even though I told you not to?\" Rebellion says, staring you down. All you can manage is a nod.\n\n*goto magic_down\n\n*label magic_down\n\n\"Revive Black Magic and follow me,\" Rebellion says to you as ${youze} runs back through the hole in the wall.\n\nYou can't help but smile—that's why ${youze} is the best.\n\n*page_break\n\nYou fly to Black Magic's side and put your ear to ${bmhis} lips—thankfully ${bmze}'s still breathing, but just barely. \n*if guard\n\tThe initial explosion from The Molten Ladies'\n\t*goto hithard\n*else\n\tThe initial explosion from Lolli's\n\t*goto hithard\n\n*label hithard\nentrance must have hit ${bmhir} hardest. You need to heal Black Magic with your energy Power, so you take ${bmhis} hand. You can't afford to give up too much Power; you decide on the minimum level that will revive ${bmhir}: 15.\n\n*set power -15\n\nAs you pour life energy into Black Magic, it feels like you're lying on a bed of needles.\n\n*if bmnoromance\n\tLuckily, the transfer works quickly and you step away, not wanting to get too close.\n\t*goto nokissjump\n*else\n\t*goto onethoughtrings\n\n*label onethoughtrings\nThen one thought rings in your mind like an alarm: I'm so lonely. Someone take care of me, please, the burden is too much….\n\nSuddenly, Black Magic's eyes flutter open and the thought fades. Wait, that thought wasn't yours—it was Black Magic's….\n\nYou look down at\n*if male\n\t*if male_straight\n\t\ther and brush a strand of hair away from her face. She's\n\t\t*goto ache \n\t*else\n\t\thim and rub some dirt off of his cheek. He's\n\t\t*goto ache\n*else\n\t*if female_straight\n\t\thim and rub some dirt off of his cheek. He's\n\t\t*goto ache\n\t*else\n\t\ther and brush a strand of hair away from her face. She's\n\t\t*goto ache \n\n*label ache\nso beautiful, it makes you ache someplace deep in your chest.\n\nBlack Magic looks up at you and for a moment the world drains away—${bmze} seems so vulnerable. How could you not have seen it before?\n\n*if guard\n\t\"Thank you,\" Black Magic whispers, your eyes locked together.\n\t*goto make_move\n*else\n\t\"Just couldn't help yourself, huh?\" Black Magic whispers, your eyes locked together.\n\t*goto make_move\n\n*label make_move\n*choice\n\t#Kiss ${bmhir}.\n\t\tYou lean down and pull Black Magic's face up to meet yours.\n\n\t\tAnd then you kiss ${bmhir}.\n\t\t*set rlshp_bm %+20\n\t\t*goto kiss\n\t#Get back to the fight.\n\t\t\"We had better go help-\"\n\n\t\tBefore you can finish, Black Magic pulls your head down and kisses you.\n\t\t*goto kiss\n\t#Just hug ${bmhir}—I don't want The Millennial Group potentially seeing the two of us together.\n\t\tYou lean down and give Black Magic a tight hug, hoping ${bmze} understands the gesture.\n\n\t\t\"We had better go help-\"\n\n\t\tBut before you can finish, Black Magic pulls your head down and kisses you.\n\t\t*goto kiss\n\n\n*label kiss\n\nAs your lips meet, something stirs inside of you—something you haven't ever really felt before.\n\nIt feels like fireworks.\n\n*page_break\n\nBut as another explosion rocks the room, you remember there's a whole different kind of fireworks going on all around you. You break apart from Black Magic—this is insanity.\n*goto nokissjump\n\n*label nokissjump\n\n\"We need to get back in the game,\" Black Magic says, hopping to ${bmhis} feet. \"Are you good to go?\" \n\nThat's a very good question. Your Power Level is down to ${power} and your Health Level is at ${health}. Do you think you need to recharge your Power before you dive back into the fight?\n\n*choice\n\t#Recharge 10.\n\t\t*set health -10\n\t\t*set power +10\n\t\t*goto fray\n\t#Recharge 20.\n\t\t*set health -20\n\t\t*set power +20\n\t\t*goto fray\n\t*if (power \u003c 71) #Recharge 30.\n\t\t*set health -30\n\t\t*set power +30\n\t\t*goto fray\n\t#Don't recharge.\n\t\t*goto fray\n\n*label fray\n\"Good to go,\" you say, now that your Power Level is ${power} and your Health Level is ${health}. You hope these will be high enough to survive the rest of this fight, knowing that if either of them drops too low, you'll die on the spot.\n\nYou and Black Magic run into the casino lobby to find Rebellion facing off against Madame Vice. Surrounding her are dozens of guards, all firing at Rebellion. The ground is strewn with destruction, bodies splayed everywhere (you can make out some Splice Generals and Group members amidst the chaos).\n\nThen, out of nowhere, a deranged-looking crocodile-woman comes bounding at Rebellion.\n\n\"You help Rebellion,\" you shout at Black Magic. \"I'll handle Vice!\"\n\n*if vice_friend\n\tAfter listening to your Gravitas tip at Shed last time, maybe Vice will listen to reason now. What do you think?\n\n\t*choice\n\t\t#Try to talk Madame Vice down.\n\t\t\t*set offensive %-5\n\t\t\t\"Madame Vice,\" you say, approaching slowly, sure to keep your eyes from meeting hers. \"Remember me? I'm on your-\"\n\n\t\t\tBut Madame Vice doesn't let you finish, instead lashing you across the face with her whip.\n\n\t\t\tWell then, no more talking.\n\t\t\t*set health -5\n\t\t\t*goto megattack\n\t\t#Attack Madame Vice.\n\t\t\t*set offensive %+5\n\t\t\t*goto megattack\n*else\n\t*goto megattack\n\n*label megattack\n\n*if megability\n\tBefore you choose an attack method, you remember what Jenny mentioned to you back at The Vigilante. She claims you have levels of Power that you haven't tested yet. The idea that you might have some kind of \"megability\" is one you've wanted to test ever since—perhaps now might be the time.\n\n\tIf it works, you would seriously impress Rebellion and Black Magic. But if it backfires, things could be disastrous.\n\n\tDo you want to try to use your megability?\n\n\t*choice\n\t\t#Yes. (Power Cost Unknown)\n\t\t\t*set megability_use true\n\t\t\tYou're not entirely sure what you're doing here, so you focus on what it feels like to access your energy Power—kind of like pulling from a well deep inside.\n\n\t\t\tYou concentrate on accessing that well and when you do, the air around your fingertips begins to dance with shimmers, as if on fire. You look closer and you swear you can see spinning…atoms?\n\n\t\t\tYou focus on one of the shimmers closest to your index finger and imagine yourself nudging it ever so slightly….\n\n\t\t\tAnd as you do, a brilliant explosion of light envelops the room.\n\n\t\t\t*if (power \u003c 30)\n\t\t\t\t*goto death\n\t\t\t*else\n\t\t\t\t*set power -30\n\t\t\t\t*goto mega_over\n\t\t#No.\n\t\t\t*set badassbonus false\n\t\t\t*goto normal_attack\n*else\n\t*goto normal_attack\n\n*label normal_attack\n*page_break\n\nBefore you can attack Madame Vice, she pulls out a nasty-looking gun and tries to catch your gaze. You close your eyes to avoid being hypno-seduced again, so you have to dodge her blast blindly—which way do you go?\n\n*rand dodge 1 2\n\n*if (dodge = 1)\n\t*set right_miss true\n\t*goto dodge_choice\n*else\n\t*set left_miss true\n\t*goto dodge_choice\n\n*label dodge_choice\n\n*choice\n\t#Dodge right.\n\t\t*if right_miss\n\t\t\t*goto miss\n\t\t*else\n\t\t\t*goto hit\n\t#Dodge left.\n\t\t*if left_miss\n\t\t\t*goto miss\n\t\t*else\n\t\t\t*goto hit\n\t#Don't dodge at all.\n\t\t*goto steady_hit\n\n*label miss\nYou swerve and narrowly miss a particle beam that would have burned a hole right through your chest—very lucky move.\n*goto retaliate\n\n*label hit\nYou swerve and feel a particle beam rip into your thigh, causing you to howl with pain. Looks like you dodged the wrong way—luckily for you, Vice is a lousy shot, otherwise you might have suffered far worse than a Health drop….\n*set health -15\n*goto retaliate\n\n*label steady_hit\nYou stand still and feel a particle beam rip into your thigh, causing you to howl with pain and curse at yourself—why didn't you try to dodge?! Luckily for you, Madame Vice is a lousy shot, otherwise you might have suffered far worse than a Health drop….\n*set health -15\n*goto retaliate\n\n*label retaliate\n\nHow are you going to take Vice down?\n\n*choice\n\t#Use a flight-based attack. (Power Cost 5)\n\t\t*if (offensive \u003c= 50)\n\t\t\t*set power -5\n\t\t\tAs Madame Vice takes aim to blast at you again, you decide to deflect her shot with a cyclone ricochet. You quickly fly-spin to create another cyclone. Vice fires at you but you feel the particle beam hit your wind-wall and bounce back, hitting Madame Vice and taking a nasty chunk out of her shoulder.\n\n\t\t\tScreaming in pain, she falls to the floor. You then turn to help Rebellion and Black Magic but they've already put down the croc-lady and all of the guards.\n\n\t\t\tSo this is what it's like to fight in the big leagues, huh?\n\t\t\t*goto warning\n\t\t*else\n\t\t\t*set power -5\n\t\t\tLaunching into the air, you push your flight Powers into overdrive and rocket at Madame Vice. She tries to hit you with another particle blast but there's no way she can hit you moving at this speed.\n\n\t\t\tBefore she can fire again, you slam into her waist and lift her into the air, pushing her forward as you fly. You then flex your muscles and slam the brakes on your flight Powers, letting go of Madame Vice.\n\n\t\t\tShe continues to fly through the air until she hits the nearest wall with a cracking thud. As she falls to the floor, you turn to help Rebellion and Black Magic, but they've already put down the croc-lady and all of the guards.\n\n\t\t\tSo this is what it's like to fight in the big leagues, huh?\n\t\t\t*goto warning\n\t#Use an energy-based attack. (Power Cost 5)\n\t\t*if (offensive \u003c= 50)\n\t\t\t*set power -5\n\t\t\tAs Madame Vice takes aim to blast at you again, you decide to deflect her shot with a mini energy shield. Vice fires at you but you feel the particle beam hit your hand-shield and bounce back, hitting Madame Vice and taking a nasty chunk out of her shoulder.\n\n\t\t\tScreaming in pain, she falls to the floor. You then turn to help Rebellion and Black Magic but they've already put down the croc-lady and all of the guards.\n\n\t\t\tSo this is what it's like to fight in the big leagues, huh?\n\t\t\t*goto warning\n\t\t*else\n\t\t\t*set power -5\n\t\t\tBefore Madame Vice can fire again, you fire off a fast energy blast that connects with her gun. As it explodes with particle energy, Madame Vice screams in pain and falls to the floor.\n\n\t\t\tYou then turn to help Rebellion and Black Magic but they've already put down the croc-lady and all of the guards.\n\n\t\t\tSo this is what it's like to fight in the big leagues, huh?\n\t\t\t*goto warning\t\t\t\n\t#Sweep past her at superspeed and hit her with a sonic boom. (Power Cost 15)\n\t\t*if (power \u003c 15)\n\t\t\t*goto death\n\t\t*else\n\t\t\t*label sweep_back\n\t\t\t*set power -15\n\t\t\tLaunching into the air, you push your flight Powers into overdrive. The surrounding air begins to whine and you feel your lips peel away from your face. Madame Vice is before you instantly, ready to blast again—but you're moving too fast.\n\n\t\t\tAs you pass her, you give one hard push to your flight Powers and feel a sonic boom burst around you.\n\n\t\t\tSmiling at this impressive display, you flex your muscles to stop your flight. But you're moving too fast in an enclosed space—before you know it, you're careening into a solid wall….\n\n\t\t\t*page_break\n\n\t\t\tThen you find you have to peel yourself out of a pile of plaster—slugger, that hurt.\n\n\t\t\tYou stand up shakily and walk back into the lobby.\n\t\t\t*if (health \u003c 15)\n\t\t\t\t*goto death_health\n\t\t\t*else\n\t\t\t\t*label reenter_death\n\t\t\t\t*set health -15\n\t\t\t\tAs you reenter, you find Madame Vice groaning on the floor. Black Magic and Rebellion have also already taken out the croc-lady and the guards.\n\n\t\t\t\t\"A bit overkill, no?\" Black Magic says to you, suppressing a smirk.\n\n\t\t\t\t\"Well it worked, didn't it?\" you say, trying desperately to stop from turning bright red.\n\t\t\t\t*goto warning\n\n*label death\n*set power 0\n*set die_girls true\n\nYou move forward, but then you feel an overwhelming stab of pain radiate through you. Before you know what's happening, your body gives out and you crash to the floor.\n\nThat's when you feel it—your abilities are completely depleted. Your Power Level has dropped too low! You didn't have enough juice to power that attack and keep yourself alive. As the world starts to swirl into excruciating blackness, you think you can hear Black Magic calling your name…. \n\nIt's too late: your body is already shutting down. Looks like your heroic career has ended before it ever really had a chance to begin. Your final thoughts are of Grandma and your parents…\n\nFor you've truly let them down.\n\n*choice\n\t#Return to the last choice I made in this chapter. (Legend Cost: 20)\n\t\tYour Power and Health Levels have been restored to full but your Legend Level will probably never recover from this drop….\n\n\t\tLegendary heroes don't die, ${firstname}. You had better make better decisions this time around.\n\t\t*set power 100\n\t\t*set health 100\n\t\t*set legend -20\n\t\t*if megability_use\n\t\t\t*page_break\n\t\t\t*goto mega_over\n\t\t*else\n\t\t\t*page_break\n\t\t\t*goto sweep_back\n\t#Start the experience over from the very beginning.\n\t\tBetter luck next time, hero! \n\t\t*ending\n\n*label death_health\n*page_break\n*set die_girls true\n\nBut then you feel an overwhelming stab of pain radiate through you. Before you know what's happening, your body gives out and you crash to the floor.\n\nThat's when you feel it—your Health Level is completely depleted. You weren't strong enough to survive that last blow! As the world starts to swirl into excruciating blackness, you think you can hear Black Magic calling your name…. \n\nIt's too late: your body is already shutting down. Looks like your heroic career has ended before it ever really had a chance to begin. Your final thoughts are of Grandma and your parents…\n\nFor you've truly let them down.\n\n*choice\n\t#Return to the last choice I made in this chapter. (Legend Cost: 20)\n\t\tYour Power and Health Levels have been restored to full but your Legend Level will probably never recover from this drop….\n\n\t\tLegendary heroes don't die, ${firstname}. You had better make better decisions this time around.\n\t\t*set power 100\n\t\t*set health 100\n\t\t*set legend -20\n\t\t*page_break\n\t\t*goto reenter_death\n\t#Start the experience over from the very beginning.\n\t\tBetter luck next time, hero! \n\t\t*ending\n\n*label mega_over\n*page_break\n\nWhen the light clears, Madame Vice and her army of guards have all crashed to the floor. Black Magic and Rebellion stare at you, their mouths hanging open.\n\n\"How did you do that?\" Black Magic asks. \"Wait, what did you even just do?\"\n\n\"I…I don't know,\" you say, looking down at your hands. Did you just touch an atom? Is that where your energy Powers come from? Does it have something to do with-\n*goto warning\n\n*label warning\n*page_break\n\n\"That was way tougher than any of us expected. We really needed all hands on deck there,\" Rebellion says.\n*if guard\n\t\"Very impressive work, ${codename}.\"\n\n\tAs battered and exhausted as you are right now, you still feel invincible. You just successfully fought a mission alongside The Millennial Group.\n\t*set rlshp_mg %+25\n\t*goto detain\n*else\n\t\"Good thing you crashed our little party, ${codename}. Impressive work.\"\n\n\tAs battered and exhausted as you are right now, you still feel invincible. You not only successfully infiltrated The Millennial Group's mission, but you also helped finish it for them.\n\t*set rlshp_mg %+5\n\t*goto detain\n\n*label detain\nAnd Rebellion just said you were impressive.\n\nNow that is awesome.\n\nEven better, it appears you have just effectively shut down The Splice Circle, which will do more good for the Fringes than you can begin to imagine. You'd pinch yourself if you weren't already highly worried about your drooping Health Level. You really should spring for the Health-Power Low-Level warning function for your MeChip sometime soon.\n\n*if (power \u003c 30)\n\tPausing for a moment, you ask MeChip ${chipname} to open the Show Stats button and find that your Power Level has dropped to ${power}.\n\t*if (health \u003c 30)\n\t\tEven worse, your Health Level has dropped to ${health}. You'd better watch your Levels until they raise a bit, or you might die….\n\t\t*goto rebellion_check\n\t*else\n\t\tThat's pretty low—you had better conserve your Power for the rest of this mission….\n\t\t*goto rebellion_check\n*elseif (health \u003c 30)\n\tPausing for a moment, you ask MeChip ${chipname} to open the Show Stats button and find that your Health Level has dropped dangerously low, to ${health}. You'd better keep yourself protected for the rest of this mission, or you might die….\n\t*goto rebellion_check\n*else\n\t*goto rebellion_check\n\n*label rebellion_check\n*page_break\n\n\"I'm going to check that all Group members are all right,\" Rebellion says. \"You two make sure Vice and the rest of her goons are detained.\" \n\nAs Rebellion gets to it, Black Magic waves ${bmhis} hands and mutters, \"Talme Sesca.\" Immediately, metal cages begin to erect themselves around the unconscious bodies of The Splice Circle.\n\nSlugger, you think, is there anything Black Magic's Power won't allow ${bmhir} to do?\n\n\"I can help, you know,\" you say, stepping forward.\n\n\"I got this, ${codename},\" Black Magic says, moving in front of you. \"You've already done more than enough for me tonight.\" \n\nAs Black Magic keeps erecting containment cages, you can't help but detect the edge in ${bmhis} voice—${bmze} must not be very used to being vulnerable.\n\n*if bmnoromance\n\t*page_break\n\t\"Why so serious, you two?\"\n\t*goto vice_spite\n*else\n\t*goto responsivity\n\n*label responsivity\n*choice\n\t#Don't let Black Magic push me away.\n\t\t*set rlshp_bm %+20\n\t\tThe moment Black Magic finishes with the cages, you grab ${bmhis} shoulders and spin ${bmhir} around. \n\n\t\t\"What the-\"\n\n\t\tYou wrap your arms around Black Magic and pull ${bmhir} into a tight hug. Black Magic stays tense for a few moments but then you feel ${bmhis} body press into yours.\n\n\t\t*page_break\n\n\t\t\"Well, look at this, ${codename} and Black Magic sitting in a tree?\"\n\t\t*goto vice_spite\n\t#Give Black Magic space.\n\t\t*set rlshp_bm %-20\n\t\tYou watch in silence as Black Magic finishes erecting the cages. You went above and beyond to save everyone today, especially ${bmhir}. So if ${bmze} isn't going to be thankful, that's not your problem.\n\n\t\t\"Well, look at this, ${codename} and Black Magic caught in a lovers' quarrel?\"\n\t\t*goto vice_spite\n\n*label vice_spite\nMadame Vice says, gripping her battle wounds. \"I can't imagine a more repulsively pathetic pair.\"\n\n\"Says the witch about to spend the rest of her life in jail,\" Black Magic snarls, hatred burning in ${bmhis} eyes. \"Don't think I forgot for one second what you made me do all those years ago.\"\n\n\"Oh dear little Black Magic, no one ever forgets,\" Madame Vice says, smiling. \"Or don't you know, what goes around comes around? You've had your revenge today but I'll have mine another….\" \n\nMadame Vice then turns to you, the cruelty in her voice doubling, \"And as for you, ${codename}, there's a rather wicked lady out there coming for you. I wouldn't want to be in your boots, oh no I wouldn't….\"\n\n\"What on earth is that supposed to-\" you start, but are interrupted as Jury comes running into the room.\n\n\"I'm here! What do you need me to-\" But Jury stops in his tracks as he sees the finished battle. \n\n*fake_choice\n\t#\"Did you enjoy your nap while the grown-ups wrapped things up?\"\n\t#\"Oh thank goodness, what would we do without you here to help?\"\n\t#\"At ease, Jury.\"\n*gosub delay\n\nBlack Magic stifles a chuckle and Jury glares at you, his hands curling into fists.\n\n\"I'm going to make you eat those words.\"\n\n\"I'd like to see you try,\" you say, smiling widely. \n\nJury opens his mouth to fire back, but before he can, Madame Vice lets out a blood-curdling scream.\n\n*set rlshp_victon %-10\n*page_break\n\nYou, Black Magic, and Jury all spin to find Madame Vice's body limp in the cage, her limbs splayed open. Blood trickles down her ample chest from a gaping slash across her throat. \n\n\"What?!\" Black Magic gasps. \"We only turned around for a second. Who could have-\"\n\nBut Black Magic doesn't have to finish as ${bmhis} eyes travel up to Madame Vice's face…\n\nWhere the letter S is burned into her forehead.\n\n*if die_girls = false\n\t*if (power >= 40)\n\t\t*set legend +5\n\t\t*set power_eleven true\n\t*if (health >= 40)\n\t\t*set legend +5\n\t\t*set health_eleven true\n*finish Next Chapter: Wisped Away\n\n*label delay\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Heroes Rise: The Prodigy[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2025-06-12 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n*return\n", "splice_vice": "\n*comment é\n\n*text_image chap_4.png center Chapter 4: Smyther, Vice & Everything Splice\n\nPulling up into the sky, you shudder as you think about Smyther. He owns four \"legitimate\" businesses in the Static Lane section of the Eastern Fringes, but everyone knows these are fronts used to launder money from his prostitution, drug, and illegal firearms operations.\n\nEven worse, Smyther fancies himself the Boss of an elite Powered mob. All of his \"business\" Generals form an exclusive club called The Splice Circle. Aside from possessing dangerous Powered abilities, The Splice Circle Generals all indulge in their splicing poison of choice, whether it be animal-human hybridization, hypersteroid usage, or gene-deep cosmetic alteration.\n\nNot having time to fiddle with your MeChip for a search while flying, you decide to test the new thought-command function. The first wave of thought-command technology has just been released but it hasn't replaced voice-commands entirely yet, since the software is rumored to still be rather buggy.\n\nClearing your mind and focusing on your MeChip, you think: \"${chipname}, search Current Splice Circle Roster.\" \n\nWithin seconds, you get a response from MeChip ${chipname}:\n  \n*if chip_butler\n\t\"Apologies ${sir_mad}, but an Internet package upgrade is required for your requested search.\"\n\t*goto class\n*elseif chip_diva\n\t\"Sorry boo, but you need to upgrade your Internet package for that search.\"\n\t*goto class\n*else\n\t\"Oh no, it appears you need to upgrade your Internet package to conduct that search.\"\n\t*goto class\n\n*label class\n*page_break\n\nThere used to be a time when the Internet was available for one base price, but ever since the government allowed Internet providers to bundle packages for speed and website access during The Greater Depression, you've been operating out of the lowest-cost bundle.\n\nActually, your entire MeChip is operating at similarly low-level. The potential functions of the MeChip are endless—if you have the money to pay for the services. MeChips can do everything from multiple perspective surveillance to acquisition of downloadable skills, but that all requires high-level processing chips and additional fees.\n\nPoor ${chipname} could also have dozens of different outfits and personality dimensions if you had more money for upgrades…. Welcome to the twenty-second century, where class status is determined primarily by tablet functionality.\n\nAnd unfortunately for you, it looks like it's time for an Internet upgrade, which is going to cost you.\n\n\"Authorize Upgrade and Execute Search,\" you think, trying to focus the command through the cloud of frustration in your head—it won't be long before they start charging for air-per-breath, you think.\n\n*set money -100\n\nImmediately, several holographic web-images flash before your eyes. One is a chart listing The Splice Circle's current roster, another is a review of air humidifiers, and the last is a list of services for anger management. Understanding why many reviewers have bashed the MeChip thought-command function for acting glitchy, you try to focus on the roster listing:\n\nTHE SPLICE CIRCLE (RUMORED) ROSTER\n\nBOSS\n*line_break\nSmyther\n\nSECURITY GENERAL\n*line_break\nBoulder\n\nWhich roster do you want to read next?\n\n*choice\n\t#BUSINESS GENERALS.\n\t\t*label estab_gen\n\t\tSHED CLUB\n\t\t*line_break\n\t\tMadame Vice (STATUS??)\n\n\t\tTHE RYEVAL BAR\n\t\t*line_break\n\t\tKirkpatrick (COUNSELOR)\n\n\t\tFETISH SIN DEN\n\t\t*line_break\n\t\tJuanda W\n\t\t\n\t\tACE'S HIGH CASINO\n\t\t*line_break\n\t\tThird Degree\n\n\t\tNOTES: Kirkpatrick is the latest addition to the Circle, brought in to run Smyther's newest establishment, The Ryeval Bar. Kirkpatrick also serves as Smyther's replacement Counselor, after the remains of Smyther's last Counselor were found split between West Port and Valor Park.\n\n\t\tMadame Vice and Smyther have recently ended their multi-year affair on a sour note, causing many to wonder how long Vice will hold her position within the Circle….\n\n\t\t*if read_generals\n\t\t\t*goto press\n\t\t*else\n\t\t\tDo you want to read about the Crime Generals, too?\n\t\t\t*choice\n\t\t\t\t#Yes, I want to be as well-prepared as possible.\n\t\t\t\t\t*set offensive %-15\n\t\t\t\t\t*set read_generals true\n\t\t\t\t\t*goto crime_gen\n\t\t\t\t#No, I need to get to the scene as fast as possible.\n\t\t\t\t\t*set offensive %+15\n\t\t\t\t\t*goto press\n\t#CRIME GENERALS.\n\t\t*label crime_gen\n\t\tPROSTITUTION\n\t\t*line_break\n\t\tLolli\n\t\t\n\t\tFIREARMS\n\t\t*line_break\n\t\tCasing (UNDERBOSS)\n\n\t\tDRUGS\n\t\t*line_break\n\t\tFracture\n\n\t\tNOTES: Lolli is the Circle's longest-standing General, infamous for the spree of disfiguring attacks that pushed her up through the ranks of her Eastern Fringe Ani-gang and into the Circle.\n\n\t\tCasing remains Smyther's most prized General, currently serving as The Splice Circle's Underboss.\n\n\t\t*if read_generals\n\t\t\t*goto press\n\t\t*else\n\t\t\tDo you want to read about the Business Generals too?\n\t\t\t*choice\n\t\t\t\t#Yes, I want to be as well-prepared as possible.\n\t\t\t\t\t*set offensive %-15\n\t\t\t\t\t*set read_generals true\n\t\t\t\t\t*goto estab_gen\n\t\t\t\t#No, I need to get to the scene as fast as possible.\n\t\t\t\t\t*set offensive %+15\n\t\t\t\t\t*goto press\n\n*label press\n*page_break\n\nSatisfied with your knowledge of The Splice Circle, you prepare to take off towards Static Lane—until you notice a bright flash coming from one of the surrounding rooftops. Focusing on the source, you see it's a reporter, obviously working overtime to break the first scoop on this story.\n\nYou really need to find to Smyther quickly,\n*if (fame > 65)\n\tbut getting your name in the press could be a major plus. You promised yourself you'd focus on achieving fame, so you really don't have much of a choice to make.\n\t*goto interview\n*elseif (fame \u003c 35)\n\tbesides, you promised yourself you'd focus on upholding justice first and foremost. So you don't have time for something as trite as an interview.\n\t*goto interview\n*else \n\tbut should you take the time to swoop down for a quick interview?\n\t*goto interview\n\n*label interview\t\n*choice\n\t*selectable_if (fame > 35) #Yes, I'll always have time for the press.\n\t\t*set sonja_meet true\n\t\tYou fly down onto the roof and the reporter's eyeballs flash bright, white light upon your arrival—it appears she has some kind of optic-photographic Power. The residual twinkling in your eyes catches on the dozens of gold bracelets lining the reporter's wrist. She's a short, Indian woman with two thick braids of hair tied into a bun, wearing shade upon indiscernible shade of black. She doesn't smile.\n\n\t\t\"Damn police found a way to block my Observancy Knacks,\" she says, her eyes twitching back and forth, no doubt taking mental notes. \"I saw you fly out of there. What's going on?\"\n\n\t\tYou stare at the reporter—she's talking so fast her words blur together.\n\n\t\t\"It's nice to meet you, too,\" you say with a smile, \"I'm ${codename} and I just cracked the Rexford Schillers Gravitas case.\"\n\n\t\tThe reporter shows a momentary burst of excitement but does a good job of covering it quickly. You look her over—she doesn't have a press pass and she's spying from afar, which means she must be a newbie. Good—better to give the scoop to someone just as hungry for success as you.\n\n\t\t\"So what can you tell me?\" the reporter asks, still not quite looking at you as her liquid brown eyes tick back and forth.\n\n\t\t\"Depends,\" you say. \"What are you going to do with it?\"\n\n\t\t*page_break Five Minutes Later\n\n\t\tYou fly back into the sky, having given Sonja Challa (a freelance blog-reporter, as you learned) the rundown of your evening. Literally writing the article as you spoke, she promised she'd send it to her contact at \"Hero Press Blog\" as soon as she was done.\n\n\t\tAs you soar up into the clouds, you send your MeChip a thought-command to set a search alert for any mentions of your heroic personage. You'll definitely want to archive the first official press-related Legend boost of your career.\n\t\t*set fame %+25\n\t\t*set legend +5\n\t\t*if fly_upgrade\n\t\t\t*goto bonus\n\t\t*else\n\t\t\t*set power -2\n\t\t\t*goto bonus\n\t*selectable_if (fame \u003c 65) #No, fulfilling my duty as a hero is way more important than talking to the press.\n\t\tYou fly into the sky, knowing you don't have a single second to waste. But as you pull up into a bank of clouds, your MeChip sends you a web alert.\n\n\t\t*if chip_butler \n\t\t\t\"Sorry to interrupt, ${sir_mad},\" MeChip ${chipname} says. \"One of the priority alerts has activated: the heroic personage press scan.\"\n\t\t\t*goto blog_alert\n\t\t*elseif chip_diva\n\t\t\t\"Hi ho! Your ego-scan sent an alert,\" MeChip ${chipname} says. \"Looks like there's an article in the press about you. You do you, honey child!\"\n\t\t\t*goto blog_alert\n\t\t*else\n\t\t\t\"Sorry to be a bother, dear,\" MeChip ${chipname} says. \"But it appears your hero press alert has picked something up.\"\n\t\t\t*goto blog_alert \n\n*label blog_alert\n\nYou forgot you had even set the press alert, but it's a good thing you did—whether you want the attention or not, you should be aware of what's being said about you in the press. Though you didn't think it would start happening quite this quickly….\n\nThe alert takes you to \"Hero Press Blog\", where you find a photo of yourself—taken literally seconds ago—flying away from Trackr's penthouse. The caption reads:\n\n\"Unknown Newcomer Cracks First Lead in Gravitas Case—More to Come. Photo Capture by Sonja Challa.\"\n\nEven though getting press isn't your priority, it's not the worst thing in the world for people to start recognizing you. Despite yourself, you tell ${chipname} to archive the article—it is the first official press-related Legend boost of your career, after all.\n*set fame %-25\n*set legend +5\n*goto bonus\n\n*label bonus\n*if (legend >= 6)\n\t*page_break\n\t-- LEGEND PRIZE UNLOCKED --\n\n\tAs a bonus for achieving one of the highest possible Legend Levels at this point, (${legend}), your Health Level has been restored and raised to 110. \n\n\tGood work, hero.\n\t*set health 110\n\t*goto final_flight\n*else\n\t*goto final_flight\n\n*label final_flight\n*page_break\n\nYou take off high across the sky at top speed, knowing you need to get to Static Lane before the police do—or before another hero encroaching on your case does.\n\nAs you fly, you consider how any Powered Heroes stupid enough to take on The Splice Circle in the past have always ended up dead.\n*if static_poster\n\tThe latest victim appears to be the Eastern Fringes's one-time champion, Static. He's one of your idols for protecting the Fringes, but even he has been missing for months after taking on The Splice Circle.\n\t*goto intention\n*else\n\tThe only notable exception has been Static, the self-proclaimed champion of the Eastern Fringes (named after the Fringes's most crime-clogged neighborhood, Static Lane). While most heroes concentrate on more glamorous and less dangerous heroing outside of the Fringes, Static has done good work cleaning up some of The Splice Circle's mess.\n\n\tHowever, no one has seen Static in months, a troubling mystery that has gone unsolved….\n\t*goto intention \n\n*label intention\n\nWorst of all, Smyther and The Splice Circle are responsible for funding the rival Ani-gang activity in the Fringes, using the gangs as a recruitment base to pipeline \"employees\" into the various branches of the organization. The Ani-gangs are constantly vying for top billing with the Circle and a gang war has been brewing for months (as evidenced by the fight you broke up earlier today).\n\nWithout a doubt, Smyther is responsible for making life in the Eastern Fringes highly hazardous. Knowing that he is involved with The Gravitas theft hits close to home but you want to take on this case mostly because:\n\n*choice\n\t#It will serve as a blow to The Splice Circle's criminal practices and further disorganize Ani-gang activity in the Fringes.\n\t\tSmyther has remained untouchable thanks to a team of high-priced lawyers and some corrupt contacts within the MC government. So catching him with The Gravitas could be a rare, illegal thread capable of unraveling the entire Splice Circle organization. And doing so would definitely improve life in your hometown quite a bit—you can't think of a more worthwhile heroic pursuit.\n\t\t*set fame %-15\n\t\t*goto nerves\n\t#Being the hero that takes down Smyther will make me famous.\n\t\tSmyther has remained untouchable thanks to a team of high-priced lawyers and some corrupt contacts within the MC government. So catching him with The Gravitas could be a rare, illegal thread capable of unraveling the entire Splice Circle organization. No one has ever been able to put a dent in their operations, so if you're the first to do so, your career will be made instantly.\n\t\t*set fame %+15\n\t\t*goto nerves\n\t#More than anything, it's just going to be fun!\n\t\tAs long as you're doing what you love, the success will come on its own. And taking on The Splice Circle is bound to be a fantastic way to start your heroic career.\n\t\t*goto nerves\n\n*label nerves\n\nHowever, as you begin to breathe a bit heavier from the exertion of flying so fast, you think about how advanced this case could prove to be. Smyther is no joke—he and his crew will kill you in a thousand different ways, without hesitation. Perhaps this might be a bit more than you can handle on your first night out….\n\nThen you remind yourself that you were born for major-league cases like this. Moving forward, no matter how successful you become, this kind of fear and doubt are going to be a part of your career at every level.\n\nIn fact, the pressure to stay afloat is only going to get worse so you'd better learn to cope with it now.\n\n*if fly_upgrade\n\t*set power -5\n\t*goto landing\n*else\n\t*set power -7\n\t*goto landing\n\n*label landing\n*page_break\n\nAfter a super fast flight back to the Fringes, you land on a roof across the street from Smyther's club, Shed. Your favorite hero-tipoff blog, \"Just The Tip\", says it's rumored that Smyther has his secret base of operations hidden somewhere in Shed, since he was once romantically linked to Madame Vice, Shed's owner.\n\nMadame Vice has the Power to seduce people into doing her bidding, and you've also read that, ever since being unceremoniously dumped by Smyther, she might have aspirations to take over his head-honcho role….\n\nWhile this is a tidbit you may be able to use to your advantage if things get nasty inside, right now you need to discover the location of Smyther's hidden headquarters within Shed. What's the fastest way to do so?\n\n*choice\n\t#Go inside posing as a customer and try to discretely get some intel.\n\t\t*set offensive %-10\n\t\tYou float down to the street and walk up to the front door, which is blocked by two very large bouncers. From the massive horns protruding from their foreheads, you gather they're both part gene-spliced rhinoceros—not really dudes you have time to mess with. So you pull out your ID and hand it to one of them, hoping it will be that easy to get in.\n\n\t\tThe rhino-bouncer looks you over from head to toe—which makes sense since you completely forgot that you're wearing your ${codename} costume. You're sure Shed doesn't want hero-types snooping around, so you clench your fists, ready for a fight.\n\n\t\tBut the rhino-bouncer just hands your ID back and opens the door.\n\n\t\t\"Twenty-dollar cover. And absolutely no Power use allowed inside,\" he says in a thundering voice. \"Got it?\"\n\n\t\tYou nod, thankful to not have to crack any rhino skulls at this particular moment.\n\n\t\t*page_break\n\t\t*set money -20\n\n\t\tPaying the cover and stepping inside, you stop. It's very dark and all you can make out at first are iridescent glows coming from all around. But when your eyes do adjust, you realize that those glows are actually figures dancing. Each one's skin glows in a different neon-bright color as they move across various stages. \n\n\t\tYou take a second to stare at the mesmerizing colors but pull yourself away—that's not what you're here for. You walk toward the bar to see what you can learn but before you get there, you spot a deep-red light coming from somewhere in the back of the place.\n\n\t\tYou look at the light and suddenly one step follows another. \n\n\t\tFuzz…feels nice…moving…back, back, back…there stands…\n\t\t*goto madame_vice\n\t#Break into the back and search the premises without being seen.\n\t\t*set lawless %+10\n\t\tYou drop down into the alley behind Shed and walk up to the backdoor. Using an energy crackle to pop open the lock, you slip inside and find yourself in a darkened room.\n\n\t\tAs your eyes adjust, you spot a deep-red light coming from somewhere across the room. You look at the light and suddenly one step follows another.\n\n\t\tFuzz…feels nice…moving…back, back, back…there stands…\n\t\t*goto madame_vice \n\t#Burst in, Powers blazing, and demand to see Smyther.\n\t\t*set offensive %+10\n\t\tYou float down to the street and walk up to the front door, which is blocked by two very large bouncers. From the massive horns protruding from their foreheads, you gather they're both part gene-spliced rhinoceros—not really dudes you have time to mess with.\n\n\t\tBefore they can say a word, you…\n\t\t*choice\n\t\t\t#Blow them away with a powerful energy blast. (Power Cost 10)\n\t\t\t\t*if energy_blast\n\t\t\t\t\t*set power -5\n\t\t\t\t\t*goto forced_entry\n\t\t\t\t*else\n\t\t\t\t\t*set power -10\n\t\t\t\t\t*goto forced_entry\n\t\t\t#Spin fast through the air and whip them away with a cyclone. (Power Cost 5)\n\t\t\t\t*set power -5\n\t\t\t\tThe guards go flying in opposite directions, immediately blown away by your gust of cyclone wind. The coast now clear (at least for the moment), you walk right into Shed.\n\t\t\t\t*goto bartender\n\n*label forced_entry\n\nThe guards go flying in opposite directions, immediately knocked out by your blast. The coast now clear (at least for the moment), you walk right into Shed.\n*goto bartender\n\n*label bartender\n*page_break\n\nStepping inside, you have to stop. It's very dark so all you can make out at first are iridescent glows coming from all around. But when your eyes do adjust, you realize that those glows are actually figures dancing. Each one's skin glows in a different neon-bright color as they move across various stages. \n\nYou take a second to stare at the mesmerizing colors but pull yourself away—that's not what you're here for. \n\nYou fire off a shower of ${energycolor} energy sparks into the air. The dancers start to scream and some of the clients reach for weapons but you see that the bartender is the first to start running. You fly quickly to his side and wrap your arm around his neck from behind.\n\n\"Now would someone like to tell me where…\" you start to say, until you spot a deep-red light coming from somewhere in the back of the place.\n\nAs you look at it, suddenly one step follows another. Fuzz…feels nice…moving…back, back, back…there stands…\n*goto madame_vice\n\n*label madame_vice\n*page_break\n\nMadame Vice. So pretty, you think. So, so pretty with the blood-red eyes.\n\n\"Tell me, rude thing,\" she says, her voice oozing, \"what on earth brings you to my dark corner of the world?\"\n\nYou want to tell her everything. Her with her flowing, auburn hair. Wrapped in that tight, red leather. Her body impossibly curved with plastic enhancements.\n*if male\n\t*if male_straight\n\t\t*label manvice_bi\n\t\tHer perfect chest spilling out of that corset. Her full lips wet. You want her to trust you more than anything. You want to touch, you want to tell. She's so pretty. Just tell.\n\t\t*goto snapout\n\t*else\n\t\t*if bisexual\n\t\t\t*goto manvice_bi\n\t\t*else\n\t\t\tYou want her to trust you more than anything. Who cares if you're not attracted to women, you still want to touch, you want to tell. She's so pretty. Just tell.\n\t\t\t*goto snapout\n*else\n\t*if female_straight\n\t\t*if bisexual\n\t\t\t*goto manvice_bi\n\t\t*else\n\t\t\tYou want her to trust you more than anything. Who cares if you're not attracted to women, you still want to touch, you want to tell. She's so pretty. Just tell.\n\t\t\t*goto snapout\n\t*else\n\t\t*goto manvice_bi\n\n*label snapout\n\n\"I'm here to-\" But as the words leave your lips, one thought breaks through the rest—Madame Vice has hypno-seduction Powers! Which must be why you can't seem to think straight…. \n\nAs you feel the slightest bit of control creep back, you decide that you'd better not waste the opportunity. How are you going to handle Madame Vice?\n\n*choice\n\t#Tip her off about the police—perhaps she'll choose to save herself if I do.\n\t\t\"You'll want to get out of here,\" you say with real concern. \"Very soon.\"\n\n\t\t\"Why would I want to do such a silly thing?\" Madame Vice purrs, causing your head to feel woozy again. Concentrate. Concentrate!\n\n\t\t\"Because the police will be here any minute to recover The Gravitas,\" you manage. \"Don't go down with the ship, Madame!\"\n\n\t\tNo more smile. Angry Vice. Eyes bore, not good. Not good! Bad…. You want Vice to like you. Love you. Will Vice hurt you?\n\n\t\tSuddenly something snaps and you can feel your thoughts return to normal. You watch as Madame Vice crosses the dark room and opens a safe in the corner. \n\n\t\t\"Well then, I think it's a lovely time for a stroll around the block, isn't it?\" Madame Vice says, approaching you. She grabs your hand and her touch feels better than anything you've ever felt.\n\n\t\t\"Be a dear and do forget you saw me, yes?\"\n\n\t\tYour heart flutters and you blink, overwhelmed with desire.\n\n\t\t*page_break\n\n\t\tA moment later you open your eyes to find that Madame Vice is nowhere to be found. You feel a cold rush of emptiness wash over you, but try to force away the feelings by telling yourself it's only the after-effects of Madame Vice's hypno-seduction. \n\n\t\tThen you realize there's something in your hand—a long, red whip tipped with gold.\n\t\t*goto hq\n\t#Attack her while I have the chance. (Power Cost 5)\n\t\tWith all your willpower, you raise your hands to blast Madame Vice point-blank. You fire off a shot and the guilt threatens to overwhelm you. \n\n\t\tAs Madame Vice dodges your blast and breaks her concentration, you immediately feel your senses return to normal. But before you can totally regain your bearings, Madame Vice pulls out a long whip and lashes you with it. The whip must be charged with some kind of electric current because a shock sends you reeling across the room.\n\n\t\tYou hit the ground hard. Making sure to keep your eyes closed (since you don't need Madame Vice hypno-seducing you again), you let out a quick energy pulse, hoping that will do the trick.\n\t\t*set health -5\n\t\t*if energy_blast\n\t\t\t*set power -8\n\t\t\t*goto whip\n\t\t*else\n\t\t\t*set power -10\n\t\t\t*goto whip\n\n*label whip\n*page_break\n\nWhen you open your eyes, you see Madame Vice sprawled across the floor, unconscious. You experience an intense rush of sadness but push the emotions from your brain, knowing it's just the aftereffects of Madame Vice's Powers. You stand and walk over to her, seeing that there's something attached to the end of her whip. Curious, you reach down and grab it.\n*set vice_friend false\n*goto hq\n\n*label hq\n\nYou examine the gold tip of the whip and can't believe your eyes. The gold mechanism is a Telelock—a wildly expensive (and wildly illegal) security measure that grants teleportation entrance into doorless rooms. The only way into Smyther's secret headquarters must be through one of these Telelocks, which you imagine only his Splice Generals carry.\n\nSince Telelocks take the form of tokens unique to each owner and only respond to their brain waves, it's useless to you without Madame Vice. Though there is one trick you might try….\n\nBut before you can give it a shot, you feel a tap on your shoulder.\n\n*page_break \n\nYou raise your fists and spin around, freezing the moment you do. You instantly recognize the face smirking back at you; it belongs to Jury, another aspiring hero. He stands with his arms crossed, the wind from the open door flaring his black-and-white costume, which was made to look like a sleeker version of judge's robes. \n\nWhich makes total sense because Jury's real name is Aaron Victon. He's the son of Judge Victon, who is now better known as the long-standing mayor of Millennia City….\n\nAnd the man who sentenced your parents to their lifelong prison exile.\n\n*page_break\nJury has the Power to see through the eyes of any twelve nearby people at once, hence the codename. He's become a C-list hero, thanks mostly to his father's position. Anything Jury has gotten, he has bullied or bribed out of people thanks to his last name, or charmed them with his good looks and social status. If you'd had the advantages Jury had, you'd already be MC's #1 hero and you know it. \n\nYou really are inclined to hate Jury for just about every reason under the sun, but you have to be careful not to give away your real identity. The last thing you want is for the Victon family to know the connection between your ${codename}, Sterling, and ${familyname} identities.\n\n\"Well, you're new, aren't you?\" Jury says, looking you over from head to toe like a piece of meat.\n*if male\n\t\"What's your name, stud?\"\n\t*if male_straight\n\t\t*if bisexual\n\t\t\t*goto dudes\n\t\t*else\n\t\t\t*goto no_dudes\n\t*else\n\t\t*goto dudes\n*else\n\t\"What's your name, darling?\"\n\t*if female_straight\n\t\t*goto dudes\n\t*else\n\t\t*if bisexual\n\t\t\t*goto dudes\n\t\t*else\n\t\t\t*goto no_dudes\n\n*label dudes\n\nJury seems to like what he sees, though you wonder if he just treats everyone like this. He's a conventionally gorgeous blond guy, so he must be used to flashing a smile and getting his way. Even you have to force yourself not to linger on the imprint of Jury's abs or the curve of his broad chest through his costume.\n\nHe may be hot but you want nothing to do with a creep like Jury. \n\nStill, he doesn't necessarily have to know that yet. How do you want to play this?\n*goto treatment\n\n*label no_dudes\n\nYour skin crawls under Jury's gaze and you force yourself not to consider what's running through his mind. Jury is a conventionally attractive blond guy, so you're sure he does quite well for himself. And obviously, Jury likes what he sees.\n\nBut you're definitely not into guys. And even if you were, you wouldn't touch Jury with a ten-foot pole.\n\nStill, he doesn't necessarily have to know that yet. How do you want to play this?\n*goto treatment\n\n*label treatment\n*choice\n\t#Flirt with Jury to get my way.\n\t\t\"I'm ${codename},\" you say, placing a hand on Jury's chest. \"I'm a big fan of yours and I'd love to talk sometime. But I've got to get going.\"\n\t\t*set rlshp_victon %+15\n\t\t*goto block\n\t#Treat Jury like the scum he really is.\n\t\t\"I've got to go,\" you practically growl, walking toward the exit.\n\t\t*set jury_scum true\n\t\t*set rlshp_victon %-15\n\t\t*goto block\n\t#Jury doesn't deserve to occupy even one second of my time.\n\t\t\"I've got to go,\" you practically growl, walking toward the exit.\n\t\t*set jury_scum true\n\t\t*set rlshp_victon %-15\n\t\t*goto block\n\n*label block\n\n\"Yeah, about that,\" Jury says, blocking your path. \"You're cute and all but you don't know how things work yet. I just got a call from Rexford Schillers himself; the police told him they have a lead on his missing Gravitas. He's a dear friend of my father's—you do know who Mayor Victon is, don't you?\"  \n\nJury gets closer to you, way closer than you'd like. His breath smells like stale beer and you're pretty sure you can make out the beginnings of a cold sore on his lower lip.\n\n\"Tell me what you know now and I'll see it as a serious favor. And I'm the kind of guy you want to owe you, if you get my drift.\"\n\nJury puts his hand on your hip and you pull away, trying desperately to keep your cool.\n\n\"And if I don't?\" you ask through clenched teeth.\n\nJury's slick smile fades.\n\n\"Then let's just say that having the mayor of Millennia City as an enemy isn't a really great thing for any aspiring hero, is it?\"\n\n*page_break\n\nThere's no way in hell you're backing down from this case, no matter what Jury threatens you with. Still, you do need to find a way to get him off of your tail—he could cause some serious trouble for you if he gets to The Gravitas first. \n\nHow do you want to deal with him?\n\n*if jury_scum\n\t*choice\n\t\t#Knock Jury out with a punch to the face.\n\t\t\tYou launch your fist directly at Jury's face and feel his perfect nose crunch under your knuckles.\n\n\t\t\tAs Jury hits the ground, you shake out your hand—that hurt like hell. Jury will definitely want to pay you back for this but as you look at him lying helplessly on the floor, you know it was totally worth it.\n\t\t\t*goto telekey\n\t\t#Incapacitate Jury with an energy barrage. (Power Cost 10)\n\t\t\tWithout wasting a second, you emit a fierce energy pulse. The shock wave takes Jury by surprise, lighting his body up with ${energycolor} energy.\n\n\t\t\tJury will definitely want to pay you back for this but as you look at him lying helplessly on the floor, you know it was totally worth it.\n\t\t\t*set power -10\n\t\t\t*goto telekey\n*else\n\t*choice\n\t\t#Seduce Jury and knock him out.\n\t\t\t\"I'd never want to cross you, Jury,\" you say, pulling close to whisper in his ear. He smells like cigar smoke and you have to hold your breath to keep from gagging. \"I just want to knock you out.\"\n\n\t\t\tBefore Jury can pull away, you knee him hard in the gut, then crack an elbow across his face.\n\n\t\t\tJury will definitely want to pay you back for this but as you look at him lying helplessly on the floor, you know it was totally worth it.\n\t\t\t*goto telekey\n\t\t#Send Jury on the wrong trail with a false tip. \n\t\t\t\"Listen, the police gave me a special tip,\" you say with a warm smile, \"They said—\"\n\n\t\t\t\"Save your breath,\" Jury says. \"I know exactly where I'm going. I just need the amateurs to stay out of my way. Got it?\"\n\n\t\t\tOh well—you tried.\n\n\t\t\tWithout wasting another second, you knee Jury hard in the gut, then crack an elbow across his face.\n\n\t\t\tJury will definitely want to pay you back for this but as you look at him lying helplessly on the floor, you know it was totally worth it.\n\t\t\t*goto telekey\n\n*label telekey\n*page_break\n*gosub delay\n\nIt won't be long before Jury wakes up, so you turn your attention back to the Telelock and your one shot at accessing it….\n\nSometimes, if you channel your energy Power through electronics in just the right amount, it can jump-start their functions. However, too much Power fries electronics (a talent that comes in handy for some situations but not this one).\n\nFiguring it's worth a shot, you grasp the golden tip at the end of the whip and close your eyes. You allow a small wisp of energy to flow from your fingertips through the Telelock, hoping this will coax it into cooperating.\n\nThen out of nowhere, you feel a massive surge build in your forearms.\n\n*set power -10\n*page_break\n\n\"No!\" you shout out loud, unable to stop a wave of ${energycolor} energy from bursting through your hands.\n\nWhen the light from your blast clears, you can see the charred remains of the whip in your hand—and the golden Telelock is completely shorted out. Despite years of training, your Powers can sometimes act…unpredictably. Though this was a rather inopportune time for a surge to flare up. \n\nWhat are you going to do now?\n\nBut before you can even finish forming that thought, you feel your insides turn fluid. The room swirls around you and you stagger backward.\n\nThen you scream.\n\n*finish Next Chapter: Prodigies\n\n*label delay\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Heroes Rise: The Prodigy[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2025-06 n*achievement fringesburn hidden 50 Goodbye, Fringes\n  hidden\n  Let the Fringes burn.\n*achievement prodigaldies hidden 25 Kill Prodigal\n  hidden\n  Killed Prodigal.\n*achievement mercy hidden 25 Grant Prodigal Mercy\n  hidden\n  Granted Prodigal mercy.\n*achievement sanders visible 10 Officer Sanders\n  Befriend Officer Sanders.\n  Befriended Officer Sanders.\n*achievement juryarticle visible 10 Article: Jury\n  Print an article on Jury.\n  Printed an article on Jury.\n*achievement fistfullarticle visible 10 Article: Fistfull\n  Print an article on Fistfull.\n  Printed an article on Fistfull.\n*achievement outlaw visible 25 Outlaw\n  End the game as an outlaw.\n  Ended the game as an outlaw.\n\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Do you have what it takes to become a legendary Powered hero? \n\n  In [i]Heroes Rise,[/i] Powered heroes have become the ultimate celebrities, and you dream of joining the A-list–but to get there, you'll first have to take down evil Powered gangs, compete with deadly rivals, choose a worthy sidekick, team up with famous champions, and prove to all of Millennia City that you're a true hero. \n\n  [i]Heroes Rise: The Prodigy[/i] is an interactive novel where you control the main character. In each chapter, your choices determine how the story proceeds. \n\n  Will you play as male, female, trans, intersex, nonbinary, or more? Gay, straight, or pansexual? Crusade for justice, or gun for money? Will you work as a team with the world-famous Millennial Group, or will you steal their spotlight?\n\n  How high will your hero rise?\n\n  *if choice_is_steam\n    [i]You can play the first five chapters of the game for free. Purchase the rest of the game below.[/i]\n    *if choice_is_advertising_supported\n      [i]Purchasing the rest of the game \n*else\n\tYou probably should tell Jenny about Prodigal sending Black Magic your way on the Static case, but you don't have the energy to explain that situation right now. Thankfully, Jenny just keeps talking, already in mission-control mode.\n\t*goto ididhowever\n\n*label ididhowever\n\n\"I did, however, look up the origin of those machines,\" Jenny says, pointing toward your bed…\n\nWhere a dormant pool-killer rests. \n\n*page_break\n\nYou jump back at the sight of it. \n\n\"How'd you-\"\n\n\"Oh, come off it. You know how resourceful I can be,\" Jenny says. \"Anyway, the design features match the basic profile of a large array of illegal weapons that have recently flooded the market. The MCPD knows they come from one source but no one has figured out what that source is just yet.\"\n\n*choice\n\t#\"I think Prodigal may be the weapons source.\"\n\t\t\"It makes total sense—Prodigal produced an array of advanced weapons during our fight,\" you continue. \"And her name was on the deed for the warehouse.\"\n\t\t*goto artillery\n\t#\"I think The Splice Circle was the weapons source.\"\n\t\t\"The Splice Circle already has an arms division, so it makes perfect sense. And Madame Vice probably tried to frame Prodigal by placing her name on that deed. You know, as retribution for her attack on Smyther.\"\n\t\t*goto artillery\n\t#\"Maybe this was part of Smyther's plan for expansion.\"\n\t\t\"Perhaps there's someone out there who's supplying Madame Vice and they're both trying to frame Prodigal by placing her name on the warehouse deed? You know, as retribution for her attack on Smyther.\"\n\t\t*goto artillery\n\n*label artillery\n\n\"That's all well and good,\" Jenny starts, \"but it still doesn't explain why Prodigal seems to have taken an interest in you.\" \n\n*choice\n\t#\"I think Prodigal was just using me as a pawn to take down The Splice Circle.\"\n\t\tIf that is indeed the case, now that The Splice Circle has collapsed, Prodigal is bound to leave you alone. Still, that doesn't mean you're about to let her get away with everything she has done….\n\t\t*goto whoshe\n\t#\"I definitely think Prodigal has it out for me, though I have no idea why.\"\n\t\t*set legend +1\n\t\t*if bmnoromance\n\t\t\tProdigal appeared in the Gravitas case and might have supplied the pool-killers to Madame Vice—all the signs point to Prodigal messing with you directly.\n\n\t\t\tBut if she is coming after you, why hasn't she attacked you since the Gravitas case? And she hasn't taken credit for anything yet…it just doesn't make sense. Which is why finding Prodigal needs to be a top priority.\n\t\t\t*goto whoshe\n\t\t*else\n\t\t\tProdigal appeared in the Gravitas case, sent Black Magic looking for you, and might have supplied the pool-killers to Madame Vice—all the signs point to Prodigal messing with you directly.\n\n\t\t\tBut if she is coming after you, why hasn't she attacked you since the Gravitas case? And she hasn't taken credit for anything yet…it just doesn't make sense. Which is why finding Prodigal needs to be a top priority.\n\t\t\t*goto whoshe\n\n*label whoshe\n\nJenny pauses, pinching her elbows—which you know means she's about to bring up something uncomfortable.\n\n\"And why was that warehouse named The Artillery?\"\n\n*fake_choice\n\t#\"Whoever owns that warehouse, the name Artillery has to be a coincidence.\"\n\t#\"I don't know….\"\n\t#\"Could it be connected to my parents somehow?\"\n\nJenny just works on her elbow, not answering.\n\nYou start to think it through—how could anyone know your connection to Miss Artillery? It's too obscure. Someone would have to know not only your secret Sterling identity, but also the PFPP cover-up of your ${familyname} identity as well.\n\nAnd even after all of that, they would then have to make sure you received the right tip-off to break into the warehouse. That all seems too elaborate and far-fetched to be true.\n\nBesides, The Artillery is a very predictable name for a weapons company. The connection must be negligible. But even if that is the case, you still need to make finding Prodigal a priority.\n\n\"Does this give us any leads on finding Prodigal?\" you ask.\n\n\"Yes and no. If Prodigal is involved in The Artillery, we can find a way to make a false transaction and hope it leads to her—but that will require some deeply unpleasant undercover work.\"\n\n\"Sounds like a good place to start,\" you say.\n\n\"${firstname}, there's something else…\" Jenny starts, taking a deep breath. \"Now I need you to stay calm once I tell you this. Promise me you won't do anything rash?\"\n\n*fake_choice\n\t#\"I promise.\"\n\t#\"Absolutely not.\"\n\t#\"Do you know me at all?\"\n\t#\"Why don't you tell me before I make any promises?\"\n\nJenny gives you a menacing look but keeps talking.\n\n\"The thing that attacked you was called the Wisp—he's a well-known contract killer. I know you probably just assumed he was there to protect the warehouse, but…\"\n\n\"He followed me there to kill me?\" you finish, stunned. \"Was the Wisp waiting there for me in the first place? Was it a trap? Do we have any idea who hired him? How long-\"\n\n\"Hold on, let me finish,\" Jenny says, holding a hand up. \"I don't know how or when he tracked you down, but I did do some digging and managed to find out who hired him.\"\n\nJenny just looks at the floor and works over her elbows, clearly not wanting to deliver whatever news she has.\n\n\"Well, who was it? Was it The Splice Circle? Rexford Schillers? Is Smyther back? Was it-\"\n\n\"No, ${firstname},\" Jenny says, \"it was…\"\n\n*page_break\n\n\"Jury.\" \n\nThe name rings in your ears, causing a cold rage to spill through you.\n\nJury did this? You knew he'd be out for revenge but trying to have you killed—could he really be that ruthless? Or that bold to think he'd get away with it?\n\nThen you think about what his father did to you and your family and you have your answer.\n\n\"Are you sure?\" you ask Jenny, your whole body beginning to quake.\n\n\"He tried to make an untraceable payment but it didn't work. The MCPD tracked the deposit back to a hidden account linked to Jury's MeChip.\" \n\nJenny looks like she wants to say more but you don't let her. \n\nBecause you already know exactly what you're going to do about Jury.\n\n*choice\n\t#Get revenge: I'll leak this story to the press and ruin the Victon family. I'll do to them exactly what they did to me.\n\t\t*set fame %+20\n\t\t*set rlshp_victon %-40\n\t\t*set jury_article true\n\t\t*achieve juryarticle\n\t\t*set moralbonus false\n\t\tThere's no way in hell you're letting Jury get away with this. And you definitely can't waste this opportunity to deal both Jury and Mayor Victon's careers a deadly blow. \n\n\t\tYou glance down at your MeChip to call Sonja Challa but Jenny grabs your arm.\n\n\t\t\"${firstname}, what are you doing?\" \n\n\t\t\"I'm letting the world know exactly who the Victons really are.\" \n\n\t\tJenny pauses, looking severe. \"Are you sure you want to do this? If you do, you'll be declaring war with the Victons.\"\n\n\t\tYou pull your arm away and look Jenny dead in the eye. \n\n\t\t\"This already is war.\"\n\n\t\tSonja answers on the first ring.\n\t\t*goto jury_meet \n\t#Rise above: I won't allow the Victons to turn me into the kind of monsters they are. Plus, it's smarter to keep this information as a bargaining chip.\n\t\t*set fame %-20\n\t\t*set rlshp_victon %+15\n\t\t*set badassbonus false\n\t\tYou're not about to compromise your moral standards for anyone, especially not scum like Jury. But that doesn't mean you can't use this position to your advantage….\n\n\t\t\"I know that look,\" Jenny says. \"What are you planning?\"\n\n\t\t\"Just trust me,\" you say, turning to leave.\n\t\t*goto jury_meet\n\n*label jury_meet\n*page_break Later That Night\n\nYou make sure to be late to your meeting with Jury, letting him sweat it out in Ringe Square for a while. The pretty, rich boy definitely won't be used to hanging out in derelict parks. Plus, his Power to see through multiple perspectives will only worsen his nerves, considering he'll be able to see exactly how many eyes are on him….\n\n*if jury_article\n\t*goto article_pay\n*else\n\t*goto non_article\n\n*label article_pay\nIt's been a few hours since Sonja's article broke and it has already spread like wildfire through MC. You couldn't be happier—especially because you also got a $2,500 paycheck for the scoop.\n\n*set money +2500\n*if fistfull_bad\n\tAnd seeing how much that scoop got you, the Fistfull and Monk romance scandal immediately crossed your mind. Did you sell them out while you were at it?\n\n\t*choice\n\t\t#Yes.\n\t\t\t*set money +10000\n\t\t\t*set rlshp_mg %-30\n\t\t\t*set fistfull_article true\n\t\t\t*achieve fistfullarticle\n\t\t\tSelling this story got you an additional $10,000, since it was a seriously A-list tidbit. \n\t\t\t*goto faceoff\n\t\t#No.\n\t\t\tAs much as you wanted to, you're not quite ready to have Monk, Fistfull, and the rest of The Millennial Group coming after you full force. Once things settle down a bit, you'll reconsider spilling that particular scoop. After all, it's better to save some things for a rainy day….\n\t\t\t*goto faceoff\n*else\n\t*goto faceoff\n\n*label faceoff\n\n*if (rlshp_bm \u003c 40)\n\t*if bmnoromance\n\t\t*goto flydown\n\t*else\n\t\tYou also considered selling Black Magic out, but you found the idea of ruining ${bmhis} life didn't sit right with you….\n\t\t*page_break\n\t\t*goto flydown\n*else\n\t*goto flydown\n\n*label flydown\n\nOnce you see a droplet of sweat begin to run down Jury's forehead, you decide it's time to fly down to face him.\n\n\"I keep underestimating you, cutie,\" Jury says, flicking a half-finished cigarette into the nearby bushes. \"That will never happen again.\"\n\n\"Had a fun night, did we?\"\n\n\"You know, it's a good thing you screwed up the Gravitas case so badly. Otherwise people might actually have believed that half-baked story of yours.\"\n\n\"People do,\" you say through clenched teeth.\n\n\"Sure, but most think it's just the desperate attempt of a no-name hero trying to eliminate ${youhis} far-superior competition,\" Jury says, picking a speck of dirt out from under his fingernail. \"My father already arranged for the criminal charges to be dropped. It was fairly easy, since I didn't actually hire that Wisp weirdo.\"\n\n\"The MCPD already traced the Wisp's payment to you.\"\n\n\"A transaction they have since discovered was not cleared by me, considering my account was hacked yesterday morning,\" Jury says, reveling in the doubt that crosses your face. \"Looks like someone out there wanted to take you out and set me up for the fall.\"\n\nYour mind immediately begins to race. Could Jury be telling the truth?\n\n*choice\n\t#Maybe….\n\t\t\"That's a bit of a stretch,\" you say, though you immediately think of Prodigal and The Splice Circle.\n\t\t*goto wartime\n\t#Of course not. \n\t\t\"How convenient,\" you say, not believing this lying lowlife for a second.\n\t\t*goto wartime\n\t#Why would Jury lie?\n\t\tBesides, Prodigal or The Splice Circle could probably pull off framing Jury in a second….\n\t\t*goto wartime\n\n*label wartime\n\n\"Believe whatever you want,\" Jury says, \"but know this: you just made some powerful enemies very, very angry.\"\n\n\"Really?\" you laugh. \"Because I always thought we were going to be the best of friends.\"\n\n\"Yeah, well the gloves are off now. My father didn't care much about you before, but your little stunt started messing with his potential campaign. Let's just say that he's become rather…motivated.\"\n\nHowever motivated he might be, it doesn't seem as if Mayor Victon has told Jury who you really are. Which means at least one of them has some sense….\n\n\"But you didn't call me here just to gloat,\" Jury says. \"What do you want?\"\n\n*goto guard_spot\n\n*label non_article\n\nOnce you see a droplet of sweat begin to run down Jury's forehead, you decide it's time to fly down to face him.\n\n\"There you are, cutie,\" Jury says, flicking a half-finished cigarette into the nearby bushes. \"Let's get one thing straight from the start: I didn't hire that Wisp weirdo to kill you.\"\n\n\"Right, of course you didn't,\" you start, \"except that the MCPD already traced the Wisp's payment to one of your hidden accounts.\"\n\n\"A transaction they have since discovered was not cleared by me, considering my account was hacked yesterday morning,\" Jury says, reveling in the doubt that crosses your face. \"Looks like someone out there wanted to take you out and set me up for the fall.\"\n\nYour mind immediately begins to race. Could Jury be telling the truth?\n\n*choice\n\t#Maybe….\n\t\t\"That's a bit of a stretch,\" you say, though you immediately think of Prodigal and The Splice Circle. \n\t\t*goto jury_warning\n\t#Of course not. \n\t\t\"How convenient,\" you say, not believing this lying scum for a second.\n\t\t*goto jury_warning\n\t#Why would Jury lie?\n\t\tBesides, Prodigal or The Splice Circle could probably pull off framing Jury in a second….\n\t\t*goto jury_warning\n\n*label jury_warning\n\n\"Believe what you want,\" Jury says. \"It doesn't matter to me.\"\n\n\"Well it should. Just because I haven't told the press yet doesn't mean that I won't.\"\n\n\"Watch it, ${codename},\" Jury says. \"Blackmail doesn't look so good on you. Please tell me this pathetic little showing isn't the reason you called me here?\"\n\n\"No,\" you say, gearing up.\n*goto guard_spot\n\n*label guard_spot\n\nYou did call Jury here for a reason—you have one last play to make.\n\n*choice\n\t#\"I'm going to resign from The Millennial Group reserve spot so we can call a truce.\"\n\t\t*set mg_resign true\n\t\t*if guard\n\t\t\tAs much as you want that spot, you need to keep the peace with the Victons somehow. You can keep Mayor Victon off of your back with your ${familyname} identity. And whether or not Jury really did hire that assassin, this gesture might keep him at bay, too.\n\t\t\t*if jury_article\n\t\t\t\t*goto jury_accept\n\t\t\t*else\n\t\t\t\t*set guard_possible true\n\t\t\t\t*goto jury_accept\n\t\t*if guard_changemind\n\t\t\tActually working with The Millennial Group may have changed your mind about teams, but you need to keep the peace with the Victons somehow. You can keep Mayor Victon off of your back with your ${familyname} identity. And whether or not Jury really did hire that assassin, this gesture might keep him at bay, too.\n\t\t\t*goto jury_accept\n\t\t*else\n\t\t\tYou never wanted that spot to begin with—and let's face it, you probably weren't going to get it after all you've done with The Millennial Group.\n\n\t\t\tThis is the smart move—you can keep Mayor Victon off of your back with your ${familyname} identity. And whether or not Jury really did hire that assassin, this gesture might keep him at bay, too.\n\t\t\t*goto jury_accept\n\t#\"After all that has happened, you're going to give me The Millennial Group reserve spot.\"\n\t\t*set mg_demand true\n\t\t*if guard\n\t\t\tYou've always wanted that spot and you'll do anything to get it. This is the perfect opportunity to eliminate the competition and leverage your way on to The Millennial Group.\n\t\t\t*goto rebellion_message\n\t\t*if guard_changemind\n\t\t\tActually working with The Millennial Group changed your mind about teams and you want that spot. This is the perfect opportunity to eliminate the competition and leverage your way on to The Millennial Group.\n\t\t\t*goto rebellion_message \n\t\t*else\n\t\t\tYou don't really care all that much about The Millennial Group spot but you'll be damned if Jury gets it over you. \n\t\t\t*goto rebellion_message\n\n*label jury_accept\n\n\"Why, that's mighty big of you,\" Jury says, a broad smile smearing across his face. \"I think that'll do quite nicely for now. So what do you say, truce?\"\n\nJury holds out his hand and you desperately want to rip it off of his wrist.\n\nInstead, you shake. \n\n\"Truce,\" you say. \n\nAt least for now…\n*set jury_truce true\n*set rlshp_victon %+25\n*goto flyback\n\n*label rebellion_message\n*set rlshp_victon %-25\n\n*if jury_article\n\t\"You haven't checked your messages lately, have you?\" Jury sneers.\n\n\tYou glance down at your MeChip and sure enough, ${chipname} has a message waiting for you. As you open it, Rebellion appears in holographic form.\n\t*if guard\n\t\t*goto article_and_guard\n\t*if guard_changemind\n\t\t*goto article_and_guard\n\t*else\n\t\t*goto article_and_solo\n*else\n\tAnd whether he really tried to have you killed you or not, Jury owes you for not going to the press with this story. And if he doesn't see it that way, you're more than happy to show him exactly how blackmail really looks on you….\n\n\t\"You haven't checked your messages lately, have you?\" Jury sneers.\n\n\tYou glance down at your MeChip and sure enough, ${chipname} has a message for you. As you open it, Rebellion appears in front of you in holographic form.\n\t*if guard\n\t\t*goto noarticle_and_guard\n\t*if guard_changemind\n\t\t*goto noarticle_and_guard\n\t*else\n\t\t*goto noarticle_and_solo\n\n\n*label article_and_guard\n*page_break\n*set rlshp_mg %-20\n\n\"After the litany of false accusations and acts of slander you have committed against \n*if fistfull_article\n\tJury, Fistfull, and Monk,\"\n\t*goto message_finish\n*else\n\tJury,\"\n\t*goto message_finish\n\n*label message_finish\nRebellion starts, sounding cold, \"The Millennial Group has decided you aren't fit to be part of our heroic community. I'm sorry, but I have to revoke your bid, ${codename}. Which is such a shame after the kind of promise you showed.\"\n\nWithout another word, the message finishes and Rebellion disappears.\n\nYour heart sinks.\n\nIt looks like you just ruined your chances at ever joining The Millennial Group by going to Sonja with\n*if fistfull_article\n\tthose articles. For that, you have no one to blame but yourself….\n\t*goto harsh\n*else \n\tthat Jury article. For that, you have no one to blame but yourself….\n\t*goto harsh\n\n*label article_and_solo\n*page_break\n*set rlshp_mg %-30\n\n\"After the litany of false accusations and acts of slander you have committed against \n*if fistfull_article\n\tJury, Fistfull, and Monk,\"\n\t*goto message_finishtwo\n*else\n\tJury,\"\n\t*goto message_finishtwo\n\n*label message_finishtwo\nRebellion starts, sounding cold, \"The Millennial Group has decided you aren't fit to be part of our heroic community, though I doubt you ever really wanted to be a part of it in the first place. I'm sorry, but I have to revoke your bid, ${codename}.\"\n\nWithout another word, the message finishes and Rebellion disappears.\n\nYou never really had a shot at getting that reserve spot, especially not after going to Sonja with\n*if fistfull_article\n\tthose articles.\n\t*goto stupid\n*else \n\tthat Jury article.\n\t*goto stupid\n\n*label stupid\nNow you have no spot and Jury hates you more than ever. Passing up an opportunity for a truce and demanding that spot probably wasn't a very smart move….\n*goto harsh\n\n*label noarticle_and_guard\n*page_break\n*set guard_possible true\n*set rlshp_mg %+20\n\n\"After careful consideration,\" Rebellion starts, \"The Millennial Group has decided that Jury will be a great fit for our community of heroes. However, I'm negotiating now with human resources on the possibility of adding another reserve member because I really believe you deserve another shot at being a part of The Millennial Group, ${codename}. I'll be in touch soon.\"\n\nWithout another word, the message finishes and Rebellion disappears.\n\nYour heart sinks—Jury will be getting the reserve spot, even after all you've done to prove yourself to The Millennial Group. There doesn't appear to have been anything more you could have done, though. And maybe you'll still have a shot at joining later….\n*goto harsh\n\n*label noarticle_and_solo\n*page_break\n*set rlshp_mg %-10\n\n\"After careful consideration,\" Rebellion starts, sounding cold, \"The Millennial Group has decided that Jury will be a better fit for our community of heroes. I'm terribly sorry, but I have to revoke your bid, ${codename}. Best of luck in all your heroic endeavors and please do keep in touch.\"\n\nWithout another word, the message finishes and Rebellion disappears.\n\nYou knew your shot at the reserve spot was slim after everything you did during your Minterview, but this still stings a bit—not because you really wanted that spot, but more because Jury's career has just taken another step up above yours.\n*goto harsh\n\n*label harsh\n*page_break\n\n\"That spot was always mine,\" Jury says. \"Why on earth would The Millennial Group pass up a direct line to City Hall and maybe even the White House, someday? Rexford Schillers was also quite happy to back my bid with a hefty donation to the Group. What did you think, they'd choose some no-name loser over me, with everything that I have to offer? Come on now, I thought you were brighter than that….\"\n\nYour mind flashes white with anger.\n\nJury tried to kill you and he doesn't even get punished for it? Instead, he not only gets exonerated, he gets rewarded with a Millennial Group membership? Does the world really work that differently for the privileged?\n\nWhatever, you think, curling up your fists. You're going to create your own privilege. \n\n*choice\n\t#Leave—Jury doesn't deserve any more of my time.\n\t\t\"Best of luck,\" you say, taking off into the sky. \"I'm sure everyone will get to see your true colors very soon.\"\n\t\t*goto flyback\n\t#Punch Jury in the face before leaving.\n\t\tIt may not be the smartest move but slugger does it feel good.\n\n\t\tAs you take to the sky, you leave Jury on the ground, nursing a fresh black eye.\n\t\t*set rlshp_victon %-10\n\t\t*goto flyback\n\t#Give Jury the middle finger as I fly away.\n\t\tIt may not change anything, but as you fly away with your fingers in the air, it certainly makes you feel better. At least you didn't punch the guy….\n\t\t*
