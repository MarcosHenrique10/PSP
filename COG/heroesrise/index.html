 terror-reigning empire. I can just see the movie version now. They'll call it something grand like 'Prodigal Children.' I'll have to clear room on my mantle for the Oscars….\"\n\nAs Prodigal continues to pontificate, you can hardly gather your thoughts. She has been pulling the strings since the day you got your Hero License—would anything have happened in your career without her meddling?\n\n*choice\n\t#It doesn't matter what Prodigal did—I'm proud of what I've accomplished.\n\t\tBesides, it doesn't matter what has happened in the past—all that matters now is taking this lunatic down once and for all.\n\t\t*goto piece\n\t#My entire career has been a lie.\n\t\tProdigal has been behind every one of your major successes—there's no way to know where you might be in your career without her influence….\n\t\t*goto piece\n\t#Who cares what Prodigal did…?\n\t\tAll that matters now is what you're going to do to her.\n\t\t*goto piece\n\n*label piece\n\n\"And now, it is time to film the pièce de résistance,\" Prodigal exclaims. \"The final chapter in the story of my villainous rise!\"\n\nYou stare at Prodigal, wondering what possibly could have turned her into this twisted person. Despite her penchant for explaining things, she hasn't said much about her life before this ridiculous plot….\n\nWhat's most chilling, however, is how much you and Prodigal seem to have in common….\n\n*choice\n\t#I see shadows of myself in Prodigal.\n\t\tProdigal is so blinded by her twisted ambition, she doesn't see anything else. Is that what you're like, focusing only on your career and avenging your fallen parents? In your quest to become a Legend, have you forgotten how to be a real person, just like Prodigal?\n\t\t*goto gwake\t\n\t#I'm nothing like Prodigal.\n\t\tYou've been through just as much adversity as Prodigal, but you didn't turn out like her. The saddest part is that she has a vastly useful Power set—if it were used for good, she could really change the world.\n\n\t\tBut instead, Prodigal has chosen this path. You may have your faults, but Prodigal is truly damaged.\n\t\t*goto gwake\n\t#Any similarities that may exist are only due to Prodigal's twisted manipulations.\n\t\tThere's no use reasoning with the insane, so you're not going to waste any time comparing yourself to this lunatic.\n\t\t*goto gwake\n\n*label gwake\n\n\"Ah, good, Grandma ${familyname} is back with us,\" Prodigal says as Grandma begins to stir at your side. \"She will want to hear what's coming next.\"\n\nYou immediately squat down and help Grandma sit up. She nods at you, indicating that she's all right…for now.\n\nMeanwhile Prodigal has begun to pace, filmed on all sides by her floating cameras.\n\n\"And now, the time has finally come to break ${codename}'s spirit. First, I shall make the ${familyname}s watch as I murder their beloved agent, Jenny.\"\n\nJenny balls up her fists—she's clearly not going down without a fight. Still, cold fear creeps its way into your chest. You have to find a way to escape….\n\n\"Then I'll make ${codename} watch as I kill sweet Grandma ${familyname},\" Prodigal says. \"I think strangling her with some dead vines will do quite nicely…such poetic symmetry, don't you think?\"\n\n*page_break\n\nThis sends you over the edge—Prodigal isn't coming near Grandma. Ever again.\n\nYou're about to attack when you see that Jenny holds out a slip of paper through the bars of her cell. Where the slugger did Jenny get a pen and paper? What is this, the twenty-first century?\n\nYou glance at Prodigal but she's too busy with her monologue performance to notice Jenny's note.\n\n\"Then I shall commit the ultimate act of my career—I shall finally murder ${codename}. It's rather silly that I haven't done so already but the narrative arc demanded some dramatic pause. For when ${youze} finally does die, I want ${youhir} to be truly alone, without hope or trust left in this world.\"\n\nBut you've already stopped listening to Prodigal, instead deciding whether to risk grabbing the note from Jenny….\n\n*choice\n\t#No, I don't want to put Jenny in any immediate danger.\n\t\t*gosub delay\n\t\tYou know if you grab the note, Prodigal will just kill Jenny immediately. It's best to keep Prodigal talking, try to stall her so you can come up with a plan.\n\t\t*goto devoid\n\t#Yes, maybe Jenny has an idea for an escape.\n\t\t*gosub delay\n\t\t*set jenny_note true\n\t\tYou inch toward Jenny and grab the note without Prodigal seeing. You then glance down at it and read:\n\n\t\t\"You are Infini, too. Powers uncharted. Use when I say.\"\n\n\t\tYou read these words and force them to digest—what does this mean? What exactly are you capable of?\n\t\t*goto devoid\n\t#Only take the note if the right opportunity presents itself.\n\t\t*gosub delay\n\t\t*if (offensive > 50)\n\t\t\tYou wait for a few seconds, until Prodigal turns her back to the cages. Then you manage to inch toward Jenny and grab the note without Prodigal seeing.\n\n\t\t\tYou glance down at it and read: \"You are Infini, too. Powers uncharted. Use when I say.\"\n\n\t\t\tYou read these words and force them to digest—what does this mean? What exactly are you capable of?\n\t\t\t*goto devoid\n\t\t*else\n\t\t\tYou wait for a few seconds, until Prodigal turns her back to the cages. But she could turn around and catch you at any moment. You know if you grab the note, Prodigal will just kill Jenny immediately.\n\n\t\t\tForget the note, you think. It's best to keep Prodigal talking, try to stall her so you can come up with a plan.\n\t\t\t*goto devoid\n\n*label devoid\n\n\"Then I'll send this little interactive video right to The Devoid,\" Prodigal continues, in her own world, \"ensuring The Sound and The Fury will suffer the way I have suffered. They will be served the ultimate justice, as I take away their family the way they took away mine. Then it will be off to the presses with my little video project, so everyone can marvel at my evil genius!\"\n\nProdigal pauses, evidently winding up for some final, unhinged announcement.\n\n\"Of course, by then I'll have decimated all of Millennia City with a nuclear holocaust, so people will be very interested in who I am.\"\n\n*page_break\n\nJust when you thought things couldn't get any worse, Prodigal plunges to a new depth of hell.\n\nThis must be why you're under the Fusion Plant—she's going to somehow cause a nuclear event….\n\nThat is not something you can allow to happen.\n\nProdigal lets out a ridiculous fake laugh—she's really playing at this villainess thing pretty hard. Which isn't all that stupid, you think—the more convincing her performance, the more people she will probably get to tune in to her little video project, no doubt.\n\n\"Only then will I be the most Legendary villainess of all time!\" Prodigal yells. \"After I achieve the greatest act of terrorism ever committed on American soil, ${codename} will be known as the most useless hero of all time. And I will become a living Legend.\"\n\nProdigal finally stops pacing and takes a massive breath, immensely pleased with herself. \n\n\"Now then. Let's do some killing, shall we?\"\n\n*finish Next Chapter: The Prodigal Daughter\n\n*label delay\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Heroes Rise: The Prodigy[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2025-06-12 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n*return\n\n", "homeward_bound": "*restart", "lower_case": "*comment é\n\n*text_image chap_3.png center Chapter 3: The Lower Case\n\nYou free fall to the streets below, dropping ten stories before you tense your muscles and feel your flight Powers kick in.\n\n*if fly_home\n\t*goto route\n*else\n\tMost people think flying feels like floating but you know it really feels more like swimming—it takes a lot of muscle control and endurance. Luckily, you've been training for years, the way a runner trains for a marathon, so you can fly today without much trouble. You pull upward, feeling gravity work with you instead of against you. You stretch out your arms and climb up into the sky, the exertion causing a familiar tingling in your abs.\n\t*goto route\n\n*label route\n\nYou allow yourself one joy ride up into a bank of clouds before swooping back down toward the cover of the skyline. Having your Hero License makes flying legal but you still don't need to start your career with an unregistered flying ticket. So you cruise low against the buildings toward the heart of the city, toward downtown MC.\n\nEvery time you use your Powers, your Power Level lowers. Different Power uses exert different costs. For example, this kind of normal flying only lowers your Power by 2.\n*if fly_upgrade\n\tHowever, thanks to the flying upgrade on your costume, regular travel-flying doesn't exert any Power at all.\n\n\t*goto pshow\n\n*else\n\t*set power -2\n\t*goto pshow\n\n*label pshow\nIt's important to keep an eye on your Power Level as you begin to enter battles but right now you're strong at ${power}.\n\n*page_break\n\nYour flight from the Eastern Fringes takes you across the quaint brownstones of Rein Hill and through Valor Park. Pulling in closer to the high-end metal giants that mark downtown, you land on a ledge lined with silver statues of Greek gods and goddesses.\n\nOne of the hardest parts of being a rookie hero is finding cases—a fact you're reminded of as a pink-clad heroine bothers some teenagers in a nearby alley and three metal sentries thunder through the sky above you. Even if you are lucky enough to stumble upon a decent case, you'll still have to beat out dozens of other aspiring heroes to accomplish the mission and get the credit.\n\nSo how are you going to find your very first legitimate hero opportunity?\n\n*label case_choice\n*choice\n\t*disable_reuse #Patrol the streets.\n\t\tMaybe it's a bit stereotypical but you like to look at pounding the pavement as a true classic. You're about to dive off the roof and begin combing the streets….\n\n\t\tUntil you think of all the heroes you just saw trying the exact same thing. You have to ask yourself: is this really the best use of your time? You're looking to rise as fast as possible, which means you want to do more than stop petty robberies and assaults. You want a case that's going to make a splash.\n\n\t\tSo you settle back on the ledge, realizing you're going to have to start thinking bigger if you're ever going to make it in this industry….\n\t\t*set legend -1\n\t\t*goto case_choice\n\t#Search the Hero Classifieds.\n\t\t*goto mechip_history\n\t#Talk to my PFPP agent, Jenny Yu.\n\t\t*set soloist %-10\n\t\t*set rlshp_family %+5\n\t\t*set agent true\n\t\t*goto high_school\n\n*label mechip_history\n\nYou hold your arm up and press a button on your metal wristband, popping open a panel to reveal your embedded MeChip. You can't imagine what life was like before humans merged with their tablets—${chipname} does so much for you. Hell, most days ${chipze} even feels like your best friend.\n\nYou also have your MeChip to thank for your Powers, since the current accepted \"Powered Origin\" theory is that advanced technology paved the way for Powered abilities. This theory suggests that once humans integrated with tablet technology, these tablets began to cover many basic functions (like memory and navigation, for example). Once adjusted to this technological enhancement, the human body was able to evolve and unlock new potential in the form of Powered abilities. \n\nThese Powers then began to solve pressing global problems, since humans could now do things like generate natural resources and survive in harsher conditions. It seems that the early twenty-first-century technological boom laid the groundwork for the twenty-second-century Powered boom, which has once again caused the world to change in startling and exciting ways.\n\n*if agent\n\t*goto jcall\n*else\n\t*goto ad_app\n\n*label ad_app\nHowever, despite the MeChip's ceaseless wonders, you currently just need it to search the Internet.\n\n\"${chipname},\" you say, \"open the Hero Classifieds App.\"\n\n*if chip_butler\n\t\"Right away, ${sir_mad},\" MeChip ${chipname} echoes in your ear. \"Do pick a good one.\"\n\t*goto holo_list\n*elseif chip_diva\n\t\"Sure thing, sugarplum,\" MeChip ${chipname} echoes in your ear. \"Pick a winner, ya hear?\"\n\t*goto holo_list\n*else\n\t\"Of course, dear,\" MeChip ${chipname} echoes in your ear. \"I'm sure you'll make a wonderful choice.\"\n\t*goto holo_list\n\n*label holo_list\n\nAs the listings suddenly appear holographically in front of your face, you begin to look for a case that might be suitable. You want your first impression to be a good one so you open the most prominently featured ad on the home page.\n*goto case_listing\n\n*label high_school\nWhen your life was turned upside down by your parents' imprisonment, one of the only people you could trust was the PFPP agent assigned to your case: Jenny Yu. Even though Jenny doesn't have Powers of her own, she loves Powered Hero stuff just as much as you do. So when you had no one else to talk to, you and Jenny would spend hours gushing about all of your favorite heroes, games, and comics.\n\nOf course Jenny is the first person you want to call to tell about your heroic start, especially since she'll have advice on how to find a good first case.\n*goto mechip_history\n\n*label jcall\nHowever, despite the MeChip's ceaseless wonders, you currently just need it to make a call.\n\n\"${chipname},\" you say, \"call Jenny Yu.\"\n\n*if chip_butler\n\t\"Right away, ${sir_mad},\" MeChip ${chipname} echoes in your ear. \"Please send Miss Yu my warmest regards.\"\n\t*goto pickup\n*elseif chip_diva\n\t\"Sure thing, sugarplum,\" MeChip ${chipname} echoes in your ear. \"Remind Jenny I have that makeover file ready for her, whenever she's ready….\"\n\t*goto pickup\n*else\n\t\"Of course, dear,\" MeChip ${chipname} echoes in your ear. \"Please ask Jenny how she's doing for me.\"\n\t*goto pickup\n\n*label pickup\n*page_break\n\nJenny picks up right away, her face appearing holographically in front of you. Since she's such a geek, you tend to forget how pretty Jenny is—she's half-Korean, half-British. She always wears her hair in a tight ponytail and never applies a bit of makeup, causing her to appear sleek and no-nonsense at all times.\n\n*if male\n\t*if male_straight\n\t\tActually, you sometimes think Jenny is super hot. Sadly, she also happens to be super gay.\n\t\t*goto call_time\n\t*else\n\t\tJenny is your best gal-pal and you even go to clubs together sometimes since Jenny likes the ladies just as much as you like the fellas.\n\t\t*goto call_time\n*elseif genderneutralhr\n\tJenny is your closest friend and you hope it always stays that way.\n\t*goto call_time\n*else\n\t*if female_straight\n\t\t*if bisexual\n\t\t\t*goto female_bi\n\t\t*else\n\t\t\tJenny is your closest girlfriend and luckily there's no threat of you going for the same guys since she's gay.\n\t\t\t*goto call_time\n\t*else\n\t\t*label female_bi\n\t\tYou think Jenny is beautiful, and since she also happens to be into girls, there's always sexual tension lingering in your relationship….\n\t\t*goto call_time\n\n*label call_time\n\nRight now, Jenny looks a bit surprised to see you, probably because she has never seen your ${codename} costume before.\n\n\"I assume this means your grandma gave you your license?\" Jenny says, traces of her British accent still present despite years of living in Millennia City. \n\n\"You mean you knew Grandma had my license and you didn't tell me?\" you ask, mildly offended.\n\n\"Please, your grandmother would have murdered me if I had ruined her surprise. Anyway, check your email for your birthday present,\" Jenny says, looking you over. \"And just so you know, that costume makes your waist look bloody enormous.\"\n\nThat Jenny, such a charmer. Not missing a beat, you shoot back:\n\n*choice\n\t#\"Says the girl who channels a pony every day of her life.\"\n\t\t\"Look at you, with the witty banter. Well,\n\t\t*goto fingertip\n\t#\"We all can't be as gorgeous as you, Jenny.\"\n\t\t\"Flattery will get you absolutely everywhere, ${firstname}. Now,\n\t\t*goto fingertip\n\t#\"Oh, you're just jealous.\"\n\t\t\"You've caught me, I'm positively batty with envy. Now,\n\t\t*goto fingertip\n\n*label fingertip\nI have to run but I've got another tip for you. A [i]fingertip[/i], if you will!\" Jenny says, chuckling to herself.\n\n\"Wait, what does that-\"\n\nBefore you can finish, Jenny hangs up on you (one of her favorite things to do). Knowing that calling her back would be useless, you ask MeChip ${chipname} to open your email instead.\n\nAnd sure enough, Jenny has sent you quite a fantastic birthday present: a link to a hand-picked heroic case listing. Maybe she's not so intolerable after all….\n*goto case_listing\n\n*label case_listing\n*page_break\n\nYou smile as you start to read, because the case has been sponsored by Rexford Schillers, MC's wealthiest playboy (his family had a major stake in the construction of the Big Sur fusion plant that now powers all of western America). Turns out Rexford recently held a charity gala at his townhouse for the Powered Orphan Fund. Naturally it was the must-attend event of the social season, especially since the theme was a Powered masquerade ball.\n\nThe party was a smashing success but the next day Rexford woke up to find one of his most prized possessions had been stolen. A party guest managed to get past the considerable security measures and steal a valuable Angelino artifact: The Gravitas, a mysterious rod rumored to have hidden powers.\n\nWhat little is known about The Gravitas makes it one of a kind, highly valuable and potentially dangerous. The police are looking into the theft but Rexford wants the artifact back so badly that he has opened the case up to any Powered Hero…\n\n…with a reward of $150,000.\n\n*page_break\n\nYou nearly choke—that's a lot of money.\n\nWith such a large reward at stake, along with inevitable media coverage surrounding the high-profile case, you know the competition on this one is going to be fierce. You check the page views on the listing and of course it has already been visited thousands of times.\n\nStill, you promised yourself you'd go big or go home. This would certainly qualify as going big.\n\nThough the real reason you want to take this case is because…\n\n*choice\n\t#I really need that reward.\n\t\tBeing a hero is expensive and having financial security will give you more freedom to operate (not to mention the funds to buy more costume upgrades).\n\t\t*goto fingertips\n\t#The press coverage will get my name out in the heroic world.\n\t\tThis can help launch you into at least D-list fame in MC, a solid place to start your climb.\n\t\t*set fame %+15\n\t\t*goto fingertips\n\t*if (lawless > 50) #I want to show the police that I can do their job better than them any day of the week.\n\t\tHeroes should be the new standard for justice. You're going to prove that by solving this case.\n\t\t*set lawless %+20 \n\t\t*goto fingertips\n\t#The Gravitas really could hurt a lot of people if it falls into the wrong hands.\n\t\tThat artifact is a major public hazard and it's your duty as a hero to keep the threat contained.\n\t\t*set fame %-15 \n\t\t*goto fingertips \n\n*label fingertips\n\n*rand fingertip 1 4\n*if fingertip = 1\n\t*set fingertip_color \"red\"\n\t*goto unfort\n*elseif fingertip = 2\n\t*set fingertip_color \"blue\"\n\t*goto unfort\n*elseif fingertip = 3\n\t*set fingertip_color \"yellow\"\n\t*goto unfort\n*else\n\t*set fingertip_color \"purple\"\n\t*goto unfort\n\n*label unfort\nUnfortunately, the only clue available on this case is a photo of the suspected thief who was an unnamed plus-one guest at the gala. The photo features a man dressed in an expensive suit and wearing a mask themed after Regalia, a very flamboyant hero/rock star. To match his emerald-encrusted mask, the thief's suit is lined with green piping and his fingertips are painted ${fingertip_color}.\n\nThe photo isn't a whole lot to go on, so you start to wonder what kind of-\n\nBut then a thought hits you so hard, you almost fall off of the ledge….\n\n*page_break\n\n*if agent\n\tJenny's \"fingertip\"! She's a genius, you think, knowing those fingertips may be your one shot at solving this case before anyone else.\n\t*goto guess_color\n*else\n\tThe thief's painted fingertips! This detail may be your one shot at solving this case before anyone else….\n\t*goto guess_color\n\n*label guess_color\n\nDo you remember what color the thief's fingertips were painted?\n\n*label try_again\n*choice\n\t*hide_reuse #Blue.\n\t\t*if fingertip = 2\n\t\t\t*set legend +3\n\t\t\t*goto orchid\n\t\t*else\n\t\t\tNo, that wasn't right…try again?\n\t\t\t*set legend -2\n\t\t\t*goto try_again\t\n\t*hide_reuse #Yellow.\n\t\t*if fingertip = 3\n\t\t\t*set legend +3\n\t\t\t*goto orchid\n\t\t*else\n\t\t\tNo, that wasn't right…try again?\n\t\t\t*set legend -2\n\t\t\t*goto try_again\t\n\t*hide_reuse #Red.\n\t\t*if fingertip = 1\n\t\t\t*set legend +3\n\t\t\t*goto orchid\n\t\t*else\n\t\t\tNo, that wasn't right…try again?\n\t\t\t*set legend -2\n\t\t\t*goto try_again\t\n\t*hide_reuse #Purple.\n\t\t*if fingertip = 4\n\t\t\t*set legend +3\n\t\t\t*goto orchid\n\t\t*else\n\t\t\tNo, that wasn't right…try again?\n\t\t\t*set legend -2\n\t\t\t*goto try_again\t\n\t\n*label orchid\nThat's right, his fingertips were ${fingertip_color}! This is a very important detail that no one else is bound to know the significance behind….\n\nMC's government requires that large-scale building projects designate a portion of their budget to Powered Arts spending. Since Grandma has a particularly green thumb, she sometimes cultivates unique flowers commissioned by emerging property owners. \n\nOne of Grandma's biggest sales was a species of crossbred orchids that sing classic operas. It took Grandma years to achieve this horticultural miracle, but there was one flaw in the design. If you touch one of these orchids, it turns your fingertips a different color, depending on the opera it was trained to sing.\n\nGrandma sold these orchids exclusively to one downtown high-rise building. This means that if the thief's fingertips were painted ${fingertip_color} from Grandma's orchids, you know exactly where he lives (since only the penthouse apartment got the ${fingertip_color} Carmen orchids)!\n\n*if agent\n\tThat's the reason Jenny sent you this case listing—she also knows about the operatic orchid imprinting. She must have seen the thief's fingertips in the case photo and waited on the information, knowing you'd be legally licensed to investigate today, on your birthday.\n\t*goto thoughts\n*else\n\tOther people might think this kind of case-break is too good to be true but you know better—it's fate. Still, this hunch is a bit of a long shot, so you try to keep your hopes from rising too much.\n\t*goto thoughts\n\n*label thoughts\n\nYou leap off the roof in the direction of the ${fingertip_color}-orchid penthouse, excitement coursing through your veins. This is a very big case. How do you feel about taking it on?\n\n*choice\n\t#This case is a bit much for my first night but I'm going to try to rise to the occasion.\n\t\tA case with this much money and publicity at stake should be handled by someone with more experience—or any experience, for that matter.\n\n\t\tStill, the fingertip lead is one that very few other heroes could follow, so ready or not, you have to follow your instincts.\n\t\t*goto arrival\t\t\n\t#This is the perfect case for me to start with.\n\t\tThis case has a lot of money and publicity attached, and while other emerging heroes might not be ready to handle it on their first night out, you certainly are.\n\t\t*goto arrival\n\t#This case is way too easy—I can't wait to move on to much bigger and badder stuff.\n\t\tSure, there's money and publicity at stake with this case but you're not some errand-runner. You should be taking on major villains and saving lives, not recovering a rich boy's toy.\n\n\t\tBut this fingertip lead is one that very few other heroes could follow, so it would be silly of you to pass this opportunity up.\n\t\t*goto arrival\n\n*label arrival\n*page_break\n\nThe orchid apartment is in central downtown, so your flight over will be super short. It's also good this thief can afford a penthouse because it will be pretty easy for you to access by flight.\n\nYour first priority is finding The Gravitas, but catching the thief would be an added bonus. What's the best way to approach the entry?\n\n*if fly_upgrade\n\t*goto entry\n*else\n\t*set power -2\n\t*goto entry\n\n*label entry\n*choice\n\t#Hover near the windows to see if anyone is home first, then act accordingly.\n\t\t*set lawless %-15\n\t\t*set offensive %-10\n\t\t*set badassbonus false\n\t\tAs the ritzy high-rise comes into view, you can already see Grandma's ${fingertip_color} orchids on the balcony. You relax your muscles and slow your pace as you approach the building, which proves difficult as adrenaline pulses through your veins.\n\n\t\tYou drop down along the wall, trying to keep out of sight—a building like this is bound to have anti-Powered security measures. Hovering close to the penthouse's window, you peer into the living room to see if anyone is home….\n\n\t\tYour heart nearly stops when you come face to face with a man standing inside the apartment, inches away from the glass!\n\t\t*page_break\n\n\t\tIt's definitely the thief from the case photo, right down to the ${fingertip_color}-stained fingertips. Currently, he looks far less regal and far more menacing, with overgrown stubble and long, greasy hair. You freeze, trying to decide what to do.\n\n\t\tUnfortunately, the thief thinks faster—he whips out a handgun and points it directly at you.\n\t\t*goto trackr_shot\n\t#Break into the apartment to try to find The Gravitas inside.\n\t\t*set lawless %+15\n\t\t*set offensive %+10\n\t\t*set moralbonus false\n\t\tAs the ritzy high-rise comes into view, you can already see Grandma's ${fingertip_color} orchids on the balcony. You relax your muscles and slow your pace as you approach the building, which proves difficult as adrenaline pulses through your veins.\n\n\t\tYou drop down onto the balcony, trying to keep out of sight. A building like this is bound to have anti-Powered security measures, so you had better act quickly. This is a pretty risky move, considering that if The Gravitas isn't here and you get caught, you'll look like a thief yourself.\n\n\t\tKeeping control of your breathing, you creep up to the locked door of the balcony. You put your hand on the handle and concentrate, causing a small crackle of energy to ripple through your forearm and down through your fingers. As the ${energycolor} energy trickles into the handle, you feel it start to melt away. The door then pushes open, triggering a very loud alarm.\n\n\t\t\"Slugger!\" you curse, praying that you really are right about this hunch.\n\n\t\tThough as you step into the apartment, all doubts are squashed as you see the man from the case photo, ${fingertip_color} fingertips and all, running across the apartment to escape! He currently looks far less regal and far more menacing, with overgrown stubble and long, greasy hair.\n\n\t\tYou immediately launch after him, blood pounding in your ears.\n\t\t*set power -2\n\t\t*goto chase\n\n*label trackr_shot\n\nHow do you defend yourself?\n\n*choice\n\t#Throw up an energy shield. (Power Cost 8)\n\t\t*set offensive %-5\n\t\tPanicked, you close your eyes and focus on generating a protective energy shield around yourself.\n\t\t*if energy_shield\n\t\t\tA very smart move, considering your costume upgrade cuts the Power Cost down to 4. Every time you choose to generate an energy shield, the deduction will automatically be half of the indicated Power Cost.\n\n\t\t\tThe thief fires at you, immediately shattering the wall of glass in front of him and triggering a loud alarm. You hold your breath and brace yourself….\n\n\t\t\tBut the bullet just ricochets off your energy shield. \n\n\t\t\tSeeing that his attacks will be useless, the thief turns and makes a run for it. And with the glass window now broken, you're able to fly right after him. \n\t\t\t*set power -4\n\t\t\t*goto post_shot\n\t\t*else\n\t\t\tThe thief fires at you, immediately shattering the wall of glass in front of him and triggering a loud alarm. You hold your breath and brace yourself….\n\n\t\t\tBut the bullet just ricochets off your energy shield.\n\n\t\t\tSeeing that his attacks will be useless, the thief turns and makes a run for it. And with the glass window now broken, you're able to fly right after him. \n\t\t\t*set power -8\n\t\t\t*goto post_shot\n\t#Let out an energy pulse. (Power Cost 5)\n\t\tPanicked, you close your eyes and let out a low-level energy pulse. You hear the glass wall separating you from the thief shatter and when you open your eyes, the thief's gun lies on the floor, melted beyond repair.\n\n\t\tA loud alarm begins to sound and the thief makes a run for it. Luckily, with the glass window now broken, you're able to fly right after him. \n\t\t*set power -5\n\t\t*set offensive %+5\n\t\t*goto post_shot\n\n*label chase\n*page_break\n\nYou run after the thief as he moves deeper into the lavishly decorated apartment. You're a bit confused—shouldn't he be going for the front door? And why isn't he trying to slow you down?\n\nBut as the thief disappears into the master bedroom suite, you get your first answer as something slams into the side of your head, hard. You hit the nearest wall before crashing to the ground, holding your arms up to guard your face from something sharp stabbing at you.\n\nKnowing your Health Level is decreasing, how do you defend yourself?\n\n*set health -5\n*choice\n\t#Throw up an energy shield. (Power Cost 8)\n\t\t*set offensive %-5\n\t\tPanicked, you close your eyes and focus on generating a protective energy shield around yourself.\n\t\t*if energy_shield\n\t\t\tA very smart move, considering your costume upgrade cuts the Power Cost down to 4. Every time you choose to generate an energy shield, the deduction will automatically be half of the indicated Power Cost.\n\n\t\t\tAs another stab comes your way, the energy shield crackles and you hear an awful screeching noise. The stabbing stops and you spring to your feet.\n\t\t\t*set power -4\n\t\t\t*page_break\n\t\t\t*goto pterrot\n\t\t*else\n\t\t\tAs another stab comes your way, the energy shield crackles and you hear an awful screeching noise. The stabbing stops and you spring to your feet.\n\t\t\t*set power -8\n\t\t\t*page_break\n\t\t\t*goto pterrot\n\t#Let out an energy pulse. (Power Cost 5)\n\t\tPanicked, you close your eyes and let out a low-level energy pulse. You hear an awful screeching noise and feel the stabbing stop, so you spring to your feet.\n\t\t*set power -5\n\t\t*set offensive %+5\n\t\t*page_break\n\t\t*goto pterrot\n\n*label pterrot\n\nSprawled out on the floor before you is a massive, stunned bird that looks like a mix between a parrot and a pterodactyl, with colorful feathers jutting out of its raw, pink skin. You read about some geneticists toying around with dinosaur DNA a couple years back, but the government shut them down after a T-Rabbit got loose and killed a little girl. All the dino-hybrids are supposed to be extinct but it looks like this thief collects all kinds of illegal oddities….\n\nLeaving the Pterrot behind and regaining your focus, you head into the master suite to confront the thief. And as you do, your question about his escape plan is suddenly answered: \n\nThe thief didn't head for the front door because he's got a teleportation unit in his bedroom!\n*goto teleport_out\n\n*label post_shot\n*page_break\n\nAs you pursue the thief, you expect him to run for the front door—which is why you're puzzled when he heads deeper into the lavishly decorated apartment.\n\nYou race after him into the master bedroom suite and as you do, your question about his escape plan is suddenly answered: \n\nThe thief didn't head for the front door because he's got a teleportation unit in his bedroom!\n*goto teleport_out\n\n*label teleport_out\n*page_break\n\nPersonal teleportation units were supposed to be the next wave of the transportation future but the automotive industry piled millions of dollars into research that revealed the potential cancer risks of atomic fission. So the government had to ban the sale of the units, putting everyone back into planes, trains, and automobiles.\n\nThis thief doesn't seem to care about potential carcinogens, however, since he is already inside the unit and programming the machine's teleportation course.\n\nWithout hesitation, you point your hands at the console and let an energy burst rip into the controls.\n\n*if energy_blast\n\t*set power -3\n\t*goto scream\n*else\n\t*set power -5\n\t*goto scream\n\n*label scream\nThe thief screams and jumps from the smoking unit. Furious, he looks up at you and snarls, \"that was a very big mistake, rookie.\"\n\nYou can barely hear him over the alarm blaring in your ears—you know it's only going to be minutes before the police show up, so you've got to act fast. The thief seems to be thinking the same thing as he jumps to his feet and pulls something out of his belt.\n\nWhat's your best move?\n\n*choice\n\t#Stun the thief with a focused energy blast. (Power Cost 5)\n\t\t*set offensive %+5\n\t\tNot wasting a second, you fire a controlled energy beam directly at the thief.\n\t\t*if energy_blast\n\t\t\tA very smart move, considering your costume upgrade cuts the Power Cost down to 3. Every time you choose to generate an energy blast, the deduction will automatically be half of the indicated Power Cost.\n\n\t\t\tOr at least you think it is smart, until the thief unsheathes an oversized, red-hot sword that slices through your blast with ease. Looks like he has a high-tech energy disruptor blade!\n\t\t\t*set power -3\n\t\t\t*goto attack_choice\n\t\t*else\n\t\t\tBut the thief unsheathes an oversized, red-hot sword that slices through your blast with ease. Looks like he has a high-tech energy disruptor blade!\n\t\t\t*set power -5\n\t\t\t*goto attack_choice\n\t#Fly and physically attack the thief before he can act. (Power Cost 3)\n\t\tYou fly straight for the thief, seeing that he has unsheathed an oversized sword that glows red-hot—it's a high-tech energy disruptor blade. Good thing you went with a physical attack, since he could easily have shorted your energy attacks with that sword.\n\n\t\tAs you reach the thief, he takes a swipe at you with the blade but you duck under the blow. While he's off-guard, you hold out your fists and hover a few feet off the ground, beginning to spin quickly (a move you like to call the fists of fury).\n\n\t\tYou immediately barrage the thief with a series of spinning punches, knocking the sword out of his hand and sending him reeling across the room.\n\t\t*set power -3\n\t\t*set offensive %+5\n\t\t*goto police_arrive\n\t#Use an energy crackle to disarm the thief. (Power Cost 2)\n\t\tYou let out a small crackle of energy meant to knock the weapon from the thief's hand but he unsheathes an oversized, red-hot sword that slices through your crackle with ease. Looks like he has a high-tech energy disruptor blade!\n\t\t*set power -2\n\t\t*set offensive %-5\n\t\t*goto attack_choice\n\t#Throw up an energy shield to discern the nature of the thief's weapon. (Power Cost 8)\n\t\tAs the thief charges at you, you see he has unsheathed an oversized sword that glows red-hot. You throw up an energy shield to protect yourself but the thief slices through it with ease. Looks like he has a high-tech energy disruptor blade!\n\n\t\tThis gives the thief the opening he needs—he hits you square in the chest with the butt of his sword, knocking you to the ground. He then plunges the sword down at you, a deadly blow you only manage to dodge at the last second.\n\n\t\tHowling with rage, you leap to your feet and tackle the thief. Caught off guard, he drops his sword and goes reeling across the room.\n\t\t*set offensive %-10\n\t\t*set health -10\n\t\t*if energy_shield\n\t\t\t*set power -4\n\t\t\t*goto police_arrive\n\t\t*else\n\t\t\t*set power -8\n\t\t\t*goto police_arrive\n\t#Let loose a powerful energy barrage—who cares if the thief survives the attack? (Power Cost 15)\n\t\tYou close your eyes and let a massive surge of energy build throughout your entire body. Once you feel you're about to burst, you release a powerful barrage toward the thief.\n\n\t\tBut he unsheathes an oversized, red-hot sword that slices through your attack with ease. Looks like he has a high-tech energy disruptor blade!\n\t\t*set moralbonus false\n\t\t*set power -15\n\t\t*set lawless %+15\n\t\t*set offensive %+10\n\t\t*goto attack_choice\n\n*label attack_choice\n\nThe thief launches at you and takes a swipe with the blade, an attack you narrowly dodge. He has now come near enough that a close-range attack should take him down. What's your next move?\n\n*choice\n\t#A couple of well-placed punches should do the trick. (Power Cost 3)\n\t\tKnowing the thief's blade can block your energy attacks, you shift to a physical attack—smart move. You hold out your fists and hover a few feet off the ground, beginning to spin quickly (a move you like to call the fists of fury).\n\n\t\tYou immediately barrage the thief with a series of spinning punches, knocking the sword out of his hand and sending him reeling across the room.\n\t\t*set power -3\n\t\t*goto police_arrive\n\t#A short-range energy pulse will take him out. (Power Cost 5)\n\t\tYou let out a pulse of energy but the thief once again deflects your attack with his disruptor blade—fool you twice, shame on you.\n\n\t\tThis gives the thief the opening he needs—he hits you square in the chest with the butt of his sword, knocking you to the ground. He then plunges the sword down at you, a deadly blow you only manage to dodge at the last second.\n\n\t\tHowling with rage, you leap to your feet and tackle the thief as fast as you can. Caught off guard, he drops his sword and goes reeling across the room.\n\t\t*set power -5\n\t\t*set health -10\n\t\t*goto police_arrive\n\n*label police_arrive\n*page_break\n\nJust as you have the thief disabled, you hear the wail of police sirens from the streets below. \n\n\"Slugger!\" you curse, knowing you're almost out of time. You still aren't sure if The Gravitas is even here in the apartment….\n\nYou consider your options. You could wait for the police, then work with them to locate The Gravitas. This would garner some good will with the MCPD, but it also might compromise your access to Schillers's reward. \n\nOr you could interrogate the thief before the police arrive and try to find The Gravitas on your own, taking all the reward and credit for yourself. But if you do this, you'd definitely be pissing off the MCPD.\n\nWhat are you going to do? Better decide quickly….\n*if (lawless > 60)\n\tThough for you, there's really no decision to make at all. You've chosen to break the law too many times today to be able to work safely with the police.\n\t*goto police_choice\n*else\n\t*goto police_choice\n\n*label police_choice\n*choice\n\t#Screw the police; I'm going to handle this on my own.\n\t\t*set moralbonus false\n\t\t*set lawless %+25\n\t\t\"Tell me where The Gravitas is.\"\n\n\t\tYou stand over the now-defenseless thief, allowing ${energycolor} energy to crackle across your fingertips.\n\n\t\t\"All right, all right,\" the thief starts. \"The Gravitas is in the safe in the—YEARRRGHHH!!\"\n\n\t\tThe thief knows that you don't have time to check the apartment before the police arrive, so you need to make sure he's telling the truth. Which is why you fired a thin energy beam directly through his thigh.\n\n\t\t\"Do not lie to me,\" you growl.\n\n\t\t\"Slugger! OK!\" the thief shouts, writhing on the floor. \"I was hired to steal The Gravitas—I'm Trackr. I have the Power to discover the location of anything on the planet, so finding and stealing things is—\"\n\n\t\t\"Stop stalling! Who hired you?\" you cut him off, hearing the police already banging on the front door.\n\n\t\t\"Oh no, no way. That is one bad dude, he will kill me for sure if I-\"\n\n\t\tBut another energy crackle from you is enough to convince Trackr that you'd be able to give his employer a run for his money.\n\n\t\t\"All right, it was Smyther!\" he screams. \"I forked The Gravitas over to him right away. But that's all I know, I swear!\"\n\n\t\tYou freeze because you know exactly who Smyther is. And hearing that he's involved is not good news.\n\n\t\t*page_break\n\n\t\tAs the front door comes crashing down, you knock Trackr out with one swift punch.\n\n\t\tYou then pull out a small card that reads \"${codename}\". Even though you don't want to work with the police, they should still know the name of the hero who helped them on this case.\n\n\t\tYou drop the card on Trackr and run for the window, bursting outside just as the police come swarming into the bedroom.\n\t\t*if energy_blast\n\t\t\t*set power -5\n\t\t\t*finish Next Chapter: Smyther, Vice & Everything Splice\n\t\t*else\n\t\t\t*set power -7\n\t\t\t*finish Next Chapter: Smyther, Vice & Everything Splice\n\t*selectable_if (lawless \u003c 60) #Working with the police is the best way to solve this case and start off my career.\n\t\t*set badassbonus false\n\t\t*set lawless %-25\n\n\t\tFifteen minutes later, you stand outside the building, watching as the police haul the thief into the back of a detainment van. Next to you stands Officer Sanders, a grisly veteran with dark, almost-black skin that contrasts with his grayish-white hair. He has a long scar where his left eyebrow should be, making his face appear lopsided (considering his right eyebrow is bushy and white).\n\n\t\tHis aged look doesn't seem to go with the technologically-upgraded MCPD uniform that's now standard-issue, but he still has quite the commanding presence.\n\n\t\tYou've just told Officer Sanders everything about finding the thief. (Well, not everything—you said you figured out the fingertip lead with an anonymous tip, since no one needs to know about your connections to Grandma and Jenny, nor that you're not necessarily a brilliant detective just yet.)\n\n\t\t\"Turns out the thief's a gun-for-hire named Trackr,\" Officer Sanders says in a low, gravelly voice. \"He's got the Power to discover the location of any person or object on the planet, so finding and stealing things is his specialty. You just helped us solve about thirty open theft cases.\"\n\n\t\t\"Anything to help, sir,\" you say, laying it on a bit thick. \"So are you sure he's the one who stole The Gravitas?\"\n\n\t\t\"Listen,\" Officer Sanders says, leaning in to whisper, \"I'm technically not supposed to say anything to you but you found this guy when no one else could, so we owe you one. If anyone asks, you figured this next part out on your own, got it?\"\n\n\t\t\"Got it.\" You nod, already thinking that it was a good move to work with the police.\n\n\t\t\"Trackr says he was hired by Smyther to steal The Gravitas,\" Officer Sanders says, his remaining eyebrow crinkling with severity.\n\n\t\tYou freeze because you know exactly who Smyther is. And learning that he's involved is not good news.\n\n\t\t*page_break\n\n\t\t\"We've already got officers en route to Smyther's headquarters but my guess is if you leave now, you can get there first. I'll tell my guys you're a friendly face—just don't get in their way.\"\n\n\t\t\"I won't,\" you say, reaching to shake Officer Sanders's hand. \"Thank you, sir.\"\n\n\t\t\"You sure you can handle this? I don't need another dead rookie on my conscience.\"\n\n\t\t\"Don't worry, you'll be seeing a whole lot more of me,\" you promise. \"The name is ${codename}, by the way.\"\n\t\t\n\t\t\"Well, good luck, ${codename},\" Officer Sanders says. \"Against Smyther, you're sure as hell gonna need it.\"\n\t\t*set sanders true\n\t\t*finish Next Chapter: Smyther, Vice & Everything Splice\n", "minterview": "*comment é\n\n*text_image chap_10.png center Chapter 10: Minterview\n\nYou dodge the tentacle arm just in time, leaping back onto the nearest roof and catching a glimpse of your attackers: four robotic creatures that remind you of automatic pool sweepers. They have sleek, globular cores that host a swinging tentacle, which is armed with a blade-tip and energy cannons.\n\nAfter you evade the pool-killers, they zero in on Black Magic. You know ${bmze} is still weak from the Thought Swap, so what's your plan of attack?\n\n*choice\n\t#Work with Black Magic to take out the pool-killers.\n\t\t*set soloist %-20\n\t\t*set rlshp_bm %+10\n\t\t\"I'll generate energy shields, you take them out!\" you shout, zooming to Black Magic's side. \n\n\t\tAs your ${energycolor} energy encases you both, Black Magic shouts, \"Refi Deexplo!\" Immediately, one of the pool-killers erupts in a ball of flame.\n\n\t\t\"You take the offensive,\" Black Magic says, dropping ${bmhis} arms. \"I'm running out of Power.\"\n\n\t\tNot missing a beat, you unleash a focused burst at the two nearest pool-killers. But without warning, your Power surges wildly, doubling the radius of the blast. It still incinerates two of the pool-killers on contact, but was way overkill.\n\n\t\tWhat the slugger? That's the second time your Powers have surged unexpectedly like that. Looking down at your smoking forearms, you wonder why this keeps—\n\n\t\t\"Gyener Tectpro!\" you hear Black Magic shout beside you. Another wave of ${energycolor} flashes, though this time it's Black Magic's energy. It protects you as the remaining pool-killer tries to hack at your face with its knife-tentacle.\n\n\t\t\"Want to pull it together here, ${codename}?\" Black Magic shouts. \"I know you have a terrible Power combo but I was hoping you could actually use them!\"\n\n\t\t\"Drop the shield,\" you say, reaching into your utility belt and pulling out a bunch of metal marbles. You charge them with energy, not wanting to chance another surge like the last one.\n\n\t\tOnce the shield drops, you hurtle the marbles at the last pool-killer. Mini energy explosions riddle the robot's core, sending it smoking down onto the rooftop.\n\n\t\t*page_break\n\n\t\t\"What were those things?\" you ask, not wanting to discuss your Power flare.\n\t\t*if energy_shield\n\t\t\t*set power -27\n\t\t\t*goto invite\n\t\t*else\n\t\t\t*set power -31\n\t\t\t*goto invite\n\t#End this battle on my own with one powerful blast. (Power Cost 15)\n\t\t*set soloist %+20\n\t\tYou build a powerful surge in your forearms, knowing one large blanket blast should be enough to disable the pool-killers. Soon feeling ready to burst, you let the energy loose.\n\n\t\tHowever, instead of one wide blast, a massive pulse emits from your entire body. The ${energycolor} energy wave still incinerates all of the pool-killers on contact, but was way overkill. Even Black Magic has to shield ${bmhir}self to keep from getting scorched.\n\n\t\tWhat the slugger? That's the second time your powers have surged unexpectedly like that. Looking down at your smoking forearms, you wonder why this keeps—\n\n\t\t\"Efficient display, ${codename},\" Black Magic says. \"What a harmonious Power set you have. It really does instill confidence in your abilities.\"\n\n\t\t*page_break\n\n\t\t\"What were those things?\" you ask, just wanting to change the subject from your Power flare.\n\t\t*set power -30\n\t\t*goto invite\n\t#Take the Telelock from Black Magic and make a run for it.\n\t\t*set rlshp_bm %-30\n\t\t*set moralbonus false\n\t\tThis battle isn't any of your concern—all that matters is getting ahold of that Telelock and finding Static's evidence stockpile. Your eyes settle on the pen in Black Magic's hands—how are you going to steal it?\n\n\t\tBefore you can decide, there's a bright flash of ${energycolor} and you're temporarily blinded. When your vision finally clears, you find Black Magic standing in front of you, the charred remains of the pool-killers lying on the roof around ${bmhir}.\n\n\t\t\"I was low on Power so I had to borrow some of yours,\" Black Magic says. \"Hope you don't mind.\"\n\n\t\t\"What? How did you…I didn't even feel anything?\" you say, stunned.\n\n\t\t\"I'm that good,\" Black Magic says, ${bmhis} eyes boring into you.\n\n\t\t\"Uh…what were those things?\" you ask, hoping that Black Magic didn't foresee your plan—who knows what ${bmhis} Powers allow ${bmhir} to do…?\n\t\t*set power -30\n\t\t*goto invite\n\n*label invite\n\n\"I have no idea but I'd bet they're a present from Madame Vice,\" Black Magic says. \"Whatever they are, we don't have time for this. I have just enough spell Power left to get us back to The Millennial Group HQ. I can recharge and do the ritual on the Telelock there. You coming?\"\n\n*choice\n\t#\"Of course.\"\n\t\t*set soloist %-20\n\t\t*set rlshp_bm %+10\n\t\t\"Stand close to me,\" Black Magic says, and you have no trouble doing so. You're about to put your hand on ${bmhis} arm when ${bmze} says, \"Porttrans Quartershead.\"\n\n\t\tSuddenly, you feel as if someone has thrown you into the middle of a hurricane. Wind rips at your body and you open your mouth to scream, but before you know it, you find yourself in the foyer of the MGHQ.\n\n\t\tAnd it's completely surreal.\n\t\t*goto base_details\n\t#\"I guess?\"\n\t\t\"Then stand close to me,\" Black Magic says, and you have no trouble doing so. You're about to put your hand on ${bmhis} arm when ${bmze} says, \"Porttrans Quartershead.\"\n\n\t\tSuddenly, you feel as if someone has thrown you into the middle of a hurricane. Wind rips at your body and you open your mouth to scream, but before you know it, you find yourself in the foyer of the MGHQ.\n\n\t\tAnd it's completely surreal.\n\t\t*goto base_details\n\t#\"Can I look at that Telelock first?\"\n\t\t*set rlshp_bm %-10\n\t\t\"Sure,\" Black Magic says, holding out the pen. You reach for it but Black Magic spins around you and wraps ${bmhis} arms around your neck.  \n\n\t\tBefore you can resist, you hear ${bmhir} say \"Porttrans Quartershead\" and suddenly, you feel as if someone has thrown you into the middle of a hurricane. Wind rips at your body and you open your mouth to scream, but before you know it, you find yourself in the foyer of MGHQ.\n\n\t\tBreathless, you stagger backwards.\n\n\t\t\"Try to trick me like that again and you're not going to like what happens,\" Black Magic says, walking away from you.\n\n\t\tYou're not sure whether you find Black Magic's intrusive actions annoying or sexy. Either way, you don't have time to decide as you take in the headquarters. It's completely surreal.\n\t\t*goto base_details\n\n*label base_details\n*page_break\n\nLocated on MC's western shore, the MGHQ is a sleek tower shaped like a massive bullet. Currently, you stand in a dazzlingly white foyer overlooking the ocean. The walls are lined with wax-tech statues of every Millennial Group member, dating all the way back to the original roster.\n\n*if (soloist > 50)\n\tYou're pretty certain that you don't want to be part of a team, but you suppose there's no harm in checking out how MC's finest heroes live. And no matter how hot Black Magic might be, ${bmze} is essentially trying to steal this case out from under you. You need to be here to keep tabs and make sure you stay involved….\n\t*goto bmcome_with\n*else\n\tWhat you wouldn't give to have a statue like that someday….\n\t*goto bmcome_with\n\n*label bmcome_with\n\n\"Come with me,\" Black Magic says, walking toward a bank of elevators. You snap out of it and follow, your eye catching a holographic map of the headquarters.\n\nYou look over the map, settling on:\n\n*fake_choice\n\t#The Mission Control Hub.\n\t#The training levels.\n\t#The governmental liaison offices.\n\t#The marketing and PR department.\n\t#The transportation hangar.\n\t#The advanced-weapons arsenal. \n\t#The tech support office.\n\t#The research and development labs. \n\t#The detainment block.\n\t#The hospital floor.\n\t#The recreational wing.\n\t#The five-star dining complex.\n\t#The Millennial Hero Museum.\n\nYou start to think about how much fun it would be to explore there, but then your eyes settle at the top of the hologram, which shows the residential levels. Each Group member gets their own first-class luxury floor, with 360-degree views of the Pacific Ocean and downtown MC (or so you've heard). Of course, the top three penthouse levels belong to Rebellion….\n\n\"Greetings, Black Magic,\" a soothing automated voice says. \"How may I help you?\"\n\n\"Hey Prossy,\" Black Magic says, \"${codename} here is my guest and we need to go to the Mission Control Hub. Can you request that the other Group members meet us there along with Officer Spillane? I've got a lead on the Splice Circle case.\"\n\n\"Processing requests now,\" says the automated voice. \"Well done, Black Magic, by the way.\"\n\n\"Thanks, Prossy,\" Black Magic says as the doors swing open to reveal a glass elevator overlooking Millennia City. $!{Bmze} steps inside and motions for you to follow.\n\n\"That's Processor, she's the building's operating system. She also happens to be the Group's oldest member, an artificial intelligence construct that…\"\n\n\"…was the Group's first computer system back in the twenty-first century, but has since evolved into one of the most advanced sentient AI beings on the planet,\" you finish, never one to be outdone on your heroic history. Plus, MeChip ${chipname} has always had quite the MeCrush on Processor.\n\n\"Yes, some people think that Japanese Wire-Maiden is the most advanced, but Prossy is actually scheduled for a systems upgrade that's supposed to kick her ass,\" Black Magic says. \"And you should see her mainframe body since she decided to gender identify—she's got a legendary rack.\"\n\n*page_break\n*set met_mg true\n\nYou start to chuckle but it catches in your throat as the glass elevator flies away from the wall and shoots diagonally downward. You feel your stomach lurch as the elevator enters a complex network of twisting tubes.\n\n\"You going to be OK there, champ?\" Black Magic asks, smiling. \n\nBefore you can even gain your bearings, the elevator doors swing open and Black Magic strides forward. $!{Bmze} makes a few quick turns down slick, metal corridors and finally enters a large room. You follow and try to catch your breath, but lose it entirely as you walk inside. \n\nFor The Millennial Group is assembled before you.\n\nYou can't help but stare, each member more impressive than the last. Who are you most excited to see?\n\n*if rlshp_bm > 40\n\t*set rlshp_mg %+10\n\t*goto guard_choice\n*else\n\t*set rlshp_mg %-10\n\t*goto guard_choice\n\n*label guard_choice\n*choice\n\t#Fistfull, who sits in a custom chair (since he takes up the space of three normal people).\n\t\t*set rlshp_mg %+5\n\t\t*goto scorned\n\t#Monk, a spiritual-guru-turned-hero.\n\t\t*set rlshp_mg %+5\n\t\t*goto scorned\n\t#The Diva, the wickedly powerful team matriarch perched in an ornate throne-chair.\n\t\t*set rlshp_mg %+5\n\t\t*goto scorned\n\t#Processor, whose \"legendary rack\" glows white underneath her glass skin. \n\t\t*set rlshp_mg %+5\n\t\t*goto scorned\n\t#Officer Spillane, the Group's police liaison, who hasn't noticed you (since her eyes remain glued to her MeChip).\n\t\t*goto scorned\n\t#None of them—I only care about Rebellion.\n\t\t*set rlshp_mg %-10\n\t\t*goto scorned\n\n*label scorned\nBlack Magic walks inside and takes ${bmhis} seat next to The Diva. \n\n\"And who is this?\" The Diva says in a thick South African accent, looking you over from head to toe. You swear you can feel your skin start to prickle under her gaze.\n\n\"There'll be plenty of time for introductions in the official debrief,\" someone says as they enter, nearly knocking you over. You're about to say something until you realize that the voice belongs to…\n\n*page_break\n\nRebellion.\n\nThe sight of your idol, decked out in ${youhis} simple blue-and-gold fatigues, nearly makes you faint. $!{Youze} has quite the intimidating presence, which is helped considerably by ${youhis} seven-foot height. Rebellion's eyes also glow a dim orange, pulsating with Power.\n\nAs you gaze in awe at Rebellion, you remember that ${youze} is your favorite hero because:\n\n*choice\n\t#$!{Youze} overcame adversity to become MC's most famous hero, just like I plan to.\n\t\t*set fame %+5\n\t\tRebellion represents everything that a hero should be and that's why ${youze} has remained your idol ever since you were a kid.\n\t\t*goto seatbegin\n\t#$!{Youze} stands for all the things that matter to me most as a hero.\n\t\t*set fame %-5\n\t\tRebellion represents everything that a hero should be and that's why ${youze} has remained your idol ever since you were a kid.\n\t\t*goto seatbegin\n\t#$!{Youze} is the best of the best. \n\t\tAnd you always strive for the best, no matter what.\n\t\t*goto seatbegin\n\t#$!{Youze} does what ${youze} thinks is right, whether or not it lines up with the law.\n\t\tAnd that's exactly how you want to operate.\n\t\t*goto seatbegin\n\t#$!{Youze} was the very first recipient of the prestigious MC's Hero of Tomorrow grant—an honor I hope to achieve someday myself.\n\t\tThe HoT grant is announced every two years at a fancy, star-studded party and the recipient is instantly launched to fame—not to mention granted a large cash prize to jump-start their career. All of MC's most Legendary heroes have received the HoT grant (including The Diva and Black Magic) and you know you will too, someday.\n\t\t*goto seatbegin\n\n*label seatbegin\n\n*if genderneutralhr\n\tIt also has meant a lot to you to see a hero like Rebellion become the best of the best, because ${youze} happens to identify similarly on the gender spectrum.\n\t*goto genderneutover\n*else\n\t*goto genderneutover\n\n*label genderneutover\n\n\"Now if our guest might take a seat, we can begin,\" Rebellion says as ${youze} stands at the head of the table, the impatience in ${youhis} voice unhidden. \n\nYou force your legs to move and you sit in the nearest empty seat, which you hope doesn't belong to someone more important. As you settle in, you try to will your heart to stop pounding in your chest because this is absolutely unreal. \n\n*if (soloist \u003c= 50)\n\tLast month you didn't even have your hero license and today you're sitting at a Mission Control debrief with The Millennial freaking Group, led by Rebellion. It's certainly enough to make your head spin….\n\n\tThis is the opportunity of a lifetime, so you had better not screw it up.\n\t*goto rundowntime\n*else\n\tLast month you didn't even have your hero license and today you're sitting at a Mission Control debrief led by Rebellion. It's certainly enough to make your head spin…. \n\t*goto rundowntime\n\n*label rundowntime\n*page_break Twenty Minutes Later\n\nBlack Magic has given the rundown on your Telelock findings and your encounter with the pool-killers. You thought you might be asked to speak but, aside from a brief acknowledgment of your Telelock tip, everyone ignored your presence entirely.\n\nRebellion's plan formed quickly: Black Magic is to report to the hospital floor for immediate recharging. Once restored, ${bmze} will discern the location of Static's evidence stockpile from the Telelock. If the evidence is successfully secured by the MCPD, The Millennial Group will then take action against The Splice Circle (whose current whereabouts are to be researched remotely by Processor).\n\nYou hoped you might get a chance to introduce yourself to Rebellion but ${youze} was out of the door before you could even stand up, followed by Officer Spillane (who sent you a rather dirty look on her way out). You've dreamed of meeting Rebellion for years, rehearsed speeches and introductions, but this all turned out to be rather…anticlimactic.\n\nNow, as the other Group members begin to stir, you have no idea what you're supposed to do. Luckily, Black Magic approaches you on ${bmhis} way out. \n\n\"Stick around,\" ${bmze} says, placing a hand on your hip. \"Things are about to heat up.\"\n\nEverything has happened so fast, you've barely had time to think about what you really want with Black Magic. But now, with ${bmhir} standing right in front of you, you know you want:\n\n*choice\n\t#A fling.\n\t\tBlack Magic may be just about perfect but you're not looking to jump into anything serious right now. You just want to have some fun.\n\t\t*set bmfling true\n\t\t*goto question\n\t#Something serious.\n\t\tBlack Magic seems perfect in just about every way and you can't stop thinking about ${bmhir}. You feel there's something potentially deep between the two of you—hopefully you'll have the opportunity to find out.\n\t\t*set bmserious true\n\t\t*set rlshp_bm %+10\n\t\t*goto question\n\t#Who knows?\n\t\tYou don't want to assign any labels or pressure things—you'd rather just see how it plays out on its own.\n\t\t*goto question\n\t#Nothing at all.\n\t\tYou're not attracted to Black Magic and even if you were, you're not looking for a romance right now. You'll stick this out only as long as you have to, for your career.\n\t\t*set bmnoromance true\n\t\t*set rlshp_bm %-20\n\t\t*goto question\n\n*label question\n\n\"What should I do while you're gone?\" you ask.\n\n\"The other Group members will probably just hang around until our next order,\" Black Magic says, leaning in to whisper in your ear. \"Go talk to them. Consider it a part of your 'Minterview,' as they call it.\" \n\nBefore you can respond, Black Magic winks at you and strides toward the door. \"You didn't think I brought you here just for giggles, did you? Play nice, now.\"\n\nWith that, Black Magic leaves you with the rest of the Group. So you aren't just here to help—you're here to audition for The Millennial Group? That's insane. Why on earth would they want a rookie like you on the team, especially one with your brief-but-miserable track record?\n\n*if (soloist > 50)\n\tBesides, you don't play backup to anyone—you're meant to be a solo star. Even so, being a part of a team like The Millennial Group could be a perfect platform from which to launch a solo career…. \n\t*goto guard_talk\n*else\n\tYou know without a doubt that you want to be a part of a community of heroes as prestigious as The Millennial Group. But you've certainly learned that it's useless to obtain opportunities that you're not ready to handle….\n\t*goto guard_talk\n\n*label guard_talk\n\nKnowing this, who do you think you should talk to?\n\n*label guard_talktwo\n\n*choice \n\t#The Diva, whose mega-sonic voice makes her one of the most Powerful women on the planet. Now in her early sixties, The Diva has been in The Millennial Group for nearly twenty years (after her first profession as a cardiac surgeon was taken over by advanced robotics). She has since risen to be one of the Group's most respected (and feared) members.\n\t\t*goto diva\n\t*hide_reuse #Monk, a former spiritualist-turned-playboy-hero (whose raunchy transformation has been splayed across the hero tabloids for years). The gender-neutral Zehir still adheres to hir vow of silence, mostly because focusing hir vast telekinetic Powers requires hir full concentration.\n\t\tGender theory has evolved quite a bit in the last century, as the concept of binary gender gave way to the conceptualization of a full spectrum. Many new gender categories have emerged as a result and Monk chooses to identify under the designation \"Zehir,\" which specifically represents an ever-evolving rotation of male and female.\n\n\t\t*if genderneutralhr\n\t\t\tAs someone who also identifies with a unique identity along the gender spectrum, you're excited to meet another famous nonbinary hero….\n\t\t\t*goto walktowardmonk\n\t\t*else\n\t\t\t*goto walktowardmonk\t\t\t\n\n\t\t*label walktowardmonk\n\n\t\tYou walk toward Monk, seeing that ze wears hir standard ivory-robed costume and is drinking a large mug of tea that you can (rather unpleasantly) smell from here. You're about to introduce yourself when Monk suddenly vanishes from sight—you weren't aware ze possessed teleportation Powers.\n\n\t\tSo much for that plan.\n\n\t\tNot wanting to miss your opportunity, you decide to pick another Millennial Group member to talk to.\n\t\t*goto guard_talktwo\n\t#Fistfull, who is torn straight from that old Jersey Shore stereotype. He is one of the most controversial Group members, especially since many people think he uses illegal Powered steroids to amp up his already considerable strength.\n\t\t*goto fistfull\n\n*label diva\n*set diva true\n\nYou approach The Diva with caution—you remember your mother telling you the worst stories about her. Since they both had vocally-based powers, The Sound and The Diva ended up bitter rivals. As a matter of fact, your mother always thought that The Diva was the reason she and your father were never invited to be a part of the Group…. \n\n\"Uh, Diva,\" you say, trying to keep your voice steady, \"do you think I could-\"\n\n\"Walk with me,\" The Diva says before sauntering out of the door. You hurry along to catch up, studying her as she goes.\n\nThe Diva's long, black hair cascades across her flawless, caramel skin. She has chosen to wear her House of McQueen costume today—every major fashion house has taken a stab at her iconic costume during the past two decades. The Diva's closet houses a collection of some of the finest costume couture ever created. While the styling of the costumes vacillates wildly, they're always in her signature colors: white and gold, with a bold splash of pink.\n\nThe Diva's current costume is a skin-tight, white bodysuit, hand-sewn with silver seams. The bodysuit serves as a clean template to feature a structural, dark-pink collar that juts into the air in a sharp, asymmetrical tower. The collar's lapels then curve down into a point at the waist, creating a striking shape.\n\nTaking the costume in, you decide to speak up:\n\n*choice\n\t#\"Diva, I love your costume today.\"\n\t\t*set soloist %-5\n\t\t*set rlshp_mg %+10\n\t\t*goto ignore\n\t#\"Diva, you are going to change that costume for the mission, right?\"\n\t\t*set soloist %+5\n\t\t*set rlshp_mg %-10\n\t\t*goto ignore\n\t#\"Diva, where are we going?\"\n\t\t*goto ignore\n\n*label ignore\nThe Diva takes a moment to glance back at you, then continues walking without a word. You follow her for what seems like a long time, through corridors, up stairs, down stairs—all without a word uttered in your direction.\n\nYou finally arrive at The Diva's residential floor and she walks inside with a wave of her MeChip, not bothering to hold the door for you.\n\nYou slip inside and find that the space is decorated impeccably, the perfect mix between a Park Avenue apartment and a Hamptons beach house (or at least what they look like in the holo-movies). There's lots of white paneling, traditional furniture, french doors, and hydrangeas.\n\n\"Do take your shoes off, darling,\" The Diva says. \"Glad you could keep up. I hate those wretched elevator traps.\"\n\nYou pull off your costume's boots as quickly as you can manage and trail after The Diva, noting that she hasn't removed her own stilettos. She finally stops in a palatial bathroom suite—which appears more like a fully functioning spa, considering there's a staff gathered to tend to The Diva.\n\n\"Come sit, darling,\" The Diva says to you, perching herself in a luxury recliner. \"Hair, makeup, and massages are always necessary before public missions. Now remind me, who are you again?\"\n\n*choice\n\t#\"I'm ${codename},\" I say, forcing a smile.\n\t\tThe Diva doesn't respond, evidently expecting you to go on.\n\t\t*set soloist %-5\n\t\t*set rlshp_mg %+15\n\t\t*goto here\n\t#\"I'm ${codename},\" I start. \"Don't worry, my Grandma has trouble remembering names, too.\"\n\t\tThe Diva just scowls so you decide to keep talking.\n\t\t*set soloist %+5\n\t\t*set rlshp_mg %-15\n\t\t*goto here\n\t#\"${codename},\" I say flatly.\n\t\tThe Diva doesn't respond, evidently expecting you to go on.\n\t\t*set soloist %-5\n\t\t*set rlshp_mg %+15\n\t\t*goto here\n\t#\"Oh, I'm sure you already know what my codename is, darling,\" I say in a fake accent.\n\t\tThe Diva just scowls so you decide to keep talking.\n\t\t*set soloist %+5\n\t\t*set rlshp_mg %-15\n\t\t*goto here\n\n*label here\n\n\"I'm here to help with the Static case because-\"\n\n\"Yes, I'm sure that's a fascinating tale,\" The Diva interrupts, closing her eyes as a mascara brush descends upon her face. \"But why are you really here?\"\n\n\"I don't think I understand?\"\n\n\"Ah, I am always rather charmed by slowness.\"\n\nA stretch of silence ensues that is only broken by the sound of a curling iron hissing against The Diva's hair.\n\n\"All Group members have the privilege of bringing in new recruits, but the poor dear does seem to have rather interesting tastes,\" Diva finally says with a sigh. \"I never expected ${bmhir} to bring in anything quite so…stray.\"\n\nIs The Diva talking about you and…Black Magic?\n*if male\n\t*if male_straight\n\t\tYou had always heard that Black Magic was a bit wild but you never gave much credit to the rumor mill—apparently you should have. While the thought of Black Magic and The Diva together is rather…intriguing, you're not about to let The Diva walk all over you.\n\t\t*goto comeback\n\t*else\n\t\tYou had always heard that Black Magic was a bit wild but you never gave much credit to the rumor mill—apparently you should have. If what The Diva says is true, it sounds like Black Magic isn't gay all the way….\n\n\t\tBut you're not about to let The Diva walk all over you.\n\t\t*goto comeback\n*else\n\tLooks like even though Black Magic is new to the team, ${bmze} hasn't wasted any time making new \"friends.\" Unless having a thing with The Diva is the reason ${bmze} was asked to join in the first place….\n\n\tEither way, you're not about to let The Diva walk all over you.\n\t*goto comeback\n\n*label comeback\n\n*if (soloist \u003c= 40)\n\tStill, you're a team player and you want things to go well with your Minterview, so your decision is as good as made already.\n\t*set legend +3\n\t*goto breaker\n*elseif (soloist >= 60)\n\tAnd since you could care less about joining The Millennial Group, you know exactly what to do….\n\t*set legend +3\n\t*goto breaker\n*else\n\tHow do you respond, knowing it will definitely affect your Minterview?\n\t*goto breaker\n\n*label breaker\n*choice\n\t*selectable_if (soloist \u003c 60) #Play The Diva's game—it doesn't matter if I like her, it's just important that she like me.\n\t\t\"Well, I'd certainly argue that there's more than enough Black Magic to go around,\" you start. \"But I'm happy to concede ${bmhir} to the world's most enrapturing heroine, if that is your wish.\"\n\n\t\tHey, if The Diva needs to mark her territory, you're happy to let her spray wherever she may. But you don't necessarily have to back off of Black Magic, especially since The Diva won't ever know what happens behind closed doors….\n\n\t\t\"How now, kitty's got claws!\" The Diva says, her thick lips stretching into an actual smile. \"I do think we're going to get on famously. When it comes to Black Magic, there's a certain…history. History that bears repeating.\"\n\n\t\t\"We understand each other perfectly,\" you say, smiling back at The Diva as widely as you can manage.\n\n\t\t\"You know darling, you do look remarkably familiar,\" The Diva says. \"You remind me of someone I can't quite place….\"\n\n\t\tYou immediately think of your mother—it looks like you're going to be able to get some additional revenge for the ${familyname} name….\n\n\t\tBut before you can respond, Processor's voice comes over the intercom: \"All Group members kindly reconvene in Mission Control.\"\n\n\t\t\"It appears as if we'll have to finish our chat some other time,\" The Diva says, waving away her style minions. \"I'll be sure to put in a word so that may happen.\"\n\n\t\t\"Yes,\" you say, \"I'd like that very much.\"\n\t\t*set soloist %-25\n\t\t*set rlshp_mg %+50\n\t\t*set diva_good true\n\t\t*goto go_time\n\t*selectable_if (soloist > 40) #Stand up to The Diva, no matter what the consequences.\n\t\t\"Excuse me, but is there a point to this?\" you ask. If The Diva feels the need to mark her territory, you're not about to let her spray wherever she may.\n\n\t\t\"How now, kitty's got claws!\" The Diva says, her thick lips stretching into an actual smile. \"I do think you know exactly what the point is, darling. When it comes to Black Magic, there's a certain…history. History that bears repeating—unimpaired by the would-be.\"\n\n\t\tThe Diva turns to you, her crystal-green eyes narrowing. \"Do we understand each other?\"\n\n\t\t\"Oh, we understand each other perfectly,\" you say, smiling back as widely as you can manage.\n\n\t\t\"But let's just let the chips fall where they may, shall we?\" you say. \"After all, I hear most magicians find ancient relics passably amusing.\"\n\n\t\tYou can almost make out the traces of a frown flashing across The Diva's tightened jaw. But then she simply settles back into her chair, turning back toward her reflection.\n\n\t\t\"Noted,\" she says.\n\n\t\tYou press your brain for a suitable return, but you're interrupted as Processor's voice comes over the intercom: \"All Group members kindly reconvene in Mission Control.\"\n\n\t\t\"It appears we'll have to finish our chat some other time. But darling, I have one parting gem of wisdom for you,\" The Diva says, waving away her style minions. As they disappear, she walks directly up to you, leaning in to whisper in your ear.\n\n\t\t\"I'm going to ruin you.\"\n\n\t\tAnd as The Diva strides away, all you can think is: bring it on, bitch.\n\t\t*set soloist %+25\n\t\t*set rlshp_mg %-50\n\t\t*set diva_bad true\n\t\t*goto go_time\n\n*label fistfull\n*set fistfull true\n\nFistfull may seem like a bit of a joke but he still somehow managed to claw his way from obscurity onto The Millennial Group. Besides, spending some time with him is bound to be entertaining, at the very least.\n\n\"Excuse me, Fistfull,\" you ask. \"Do you think I could hang with you until the mission?\"\n\n\"Whatever floats your boat,\" Fistfull says, standing up to his full, imposing ten feet. \"I'm headed to the gym for some pre-game pumping. You can spot me!\"\n\n*page_break Thirty Minutes Later\n\nYou find yourself in the Group's extensive training wing, more specifically in its sprawling weight-training section. You watch as Fistfull bench presses half-ton weights, encircled by robotic spray-tanners.\n\n\"…key is to just push through. Don't let no one tell you anything other than what you want to hear. I didn't get here by playing it safe, that's for sure. And image counts for everything. You could be the best damn hero in the world, but if you ain't looking right, it don't matter for…\"\n\nTo your immense pleasure, Fistfull has been imparting his wisdom on you without pause. You haven't been able to get a word in edgewise. Instead, you occupy yourself by watching the robot-tanners, keeping your eyes trained on the orange stickiness that clings to Fistfull's ridiculous muscles (which look more like ripe, veined cantaloupes than anything else).\n\n\"Yo, I gotta take a leak. Use whatever you want in here,\" Fistfull says, tossing the weights aside. He then waddles over toward the bathroom, his massive thighs rubbing together as he goes.\n\nYou look over the first-rate training equipment and practically drool. Where do you even begin? \n\n*fake_choice\n\t#Target practice. \n\t#Holo-sparring. \n\t#Flight obstacles. \n\nYou walk toward the station but have to take the long way around as the robot-tanners swivel in your direction menacingly. \n\nBefore you can arrive, Processor's voice comes over the intercom: \"All Group members kindly reconvene in Mission Control.\"\n\nAll you want to do is get back to Mission Control but you know it would be rude to leave without Fistfull. Plus, you're not particularly sure how to retrace your steps.\n\nSo you reluctantly make your way over to the bathroom, pushing the door open to call for Fistfull.\n\nBut you freeze dead in your tracks at what you see inside….\n\n*page_break\n\nFistfull, propped up against the wall, is ferociously making out with Monk.\n\nYour brain doesn't even know where to begin processing this image. Aside from the fact that Fistfull is nearly three times the size of Monk (who levitates in midair to reach Fistfull's face), Monk is an incredibly progressive figure. \n\nFistfull is supposed to be a sports-watching, beer-guzzling, weight-lifting womanizer, so the thought that these two are involved in a secret relationship is scandalous on just about every level. It may not be taboo to be queer anymore, but forbidden romances are a true classic.\n\nYou don't have any time to react, however, as Fistfull and Monk both turn to look at you, their jaws nearly hitting the floor.\n\nThis is a shred of information that could be highly valuable to you, one way or another.\n*if (soloist \u003c= 40)\n\tBut you're a team player and you want things to go well with your Minterview, so your decision is as good as made already.\n\t*set legend +3\n\t*goto breaker_two\n*elseif (soloist >= 60)\n\tAnd since you could care less about joining The Millennial Group, your decision is as good as made already.\n\t*set legend +3\n\t*goto breaker_two\n*else\n\tHow do you respond, knowing it will definitely affect your Minterview?\n\t*goto breaker_two\n\n*label breaker_two\n\n*choice\n\t*selectable_if (soloist \u003c 60) #Let the couple know their secret is safe with me.\n\t\t\"I didn't see anything here,\" you say before Fistfull or Monk can respond.\n\n\t\t\"What?\" Fistfull asks, dumbstruck.\n\n\t\t\"I said that I didn't see anything here. And even if I did, I've completely forgotten about it already.\"\n\n\t\t\"I…this isn't…\" Fistfull holds your gaze, not sure what to say.\n\n\t\t\"I don't need any explanation,\" you say. \"Let's just get back to Mission Control.\"\n\n\t\tFistfull's eyes hit the floor and all he can mutter is a weak \"thank you.\"\n\n\t\tYou then look up as black words begin to skywrite from thin air above Monk's head. Before you can read them, Monk and Fistfull vanish from sight, leaving you alone.\n\n\t\tYou linger to take in Monk's words, a smile spreading across your face as you read:\n\n\t\t\"We owe you.\"\n\t\t*set soloist %-25\n\t\t*set fistfull_good true\n\t\t*set rlshp_mg %+40\n\t\t*set badassbonus false\n\t\t*goto go_time\n\t*selectable_if (soloist > 40) #Blackmail, baby.\n\t\tYou can definitely leverage this information into something useful, not the least of which could be a fat check from any major MeZine or newsblog.\n\n\t\t\"Hey, this isn't-\" Fistfull starts to say, but you don't let him.\n\n\t\t\"That was exactly what I think it was,\" you say, allowing a smirk to wrap around your face. \"Now let's talk about what you're going to do for me.\"\n\n\t\tFistfull takes a moment to look you over, his guilt quickly boiling into anger.\n\n\t\t\"I don't respond too well to threats,\" he says, approaching you with his muscles flexed. \"Wanna run that by me again?\"\n\n\t\t\"I don't respond well to threats, either,\" you say, standing your ground. \"So maybe you'd like to rethink your approach?\"\n\n\t\tFistfull's nostrils flare as his hands ball into fists. You blink—one hit from him and it'd all be over. Maybe this wasn't such a good idea….\n\n\t\tBut before Fistfull can do anything, Monk places a hand on his shoulder. Good, you think, someone who can handle this rationally.\n\n\t\tYou then look up as black words begin to skywrite from thin air above Monk's head. Before you can read them, Monk and Fistfull vanish from sight, leaving you alone.\n\n\t\t\"One word from my lips would end you.\"\n\n\t\tYou shudder
